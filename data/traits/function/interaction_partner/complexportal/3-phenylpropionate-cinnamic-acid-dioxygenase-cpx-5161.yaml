label: "3-phenylpropionate/cinnamic acid dioxygenase"
definition: >-
  Protects against the toxic effect of dioxygenases by converting 3-phenylpropionic acid into 3-phenylpropionate-dihydrodiol and cinnamic acid into cinnamic acid-dihydrodiol. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
