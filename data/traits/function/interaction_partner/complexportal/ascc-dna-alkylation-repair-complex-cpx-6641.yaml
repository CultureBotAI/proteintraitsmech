identifier: ComplexPortal:CPX-6641
label: "ASCC DNA alkylation repair complex"
definition: >-
  Plays a role in ALKBH3 (Q96Q83)-mediated demethylation of N-alkyl lesions in DNA. ASCC3 is a DNA helicase that unwinds DNA by translocating on one strand in 3'-to-5' direction, thus potentially providing single-stranded DNA as a substrate for de-alkylation repair by ALKBH3. Recruitment of the ASCC complex requires recognition of Lys-64-linked poly-ubiquitin chains by the CUE (IPR003892) domain of ASCC2 whilst ASCC1 appears to modulate the localization of the complex during alkylation damage. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
