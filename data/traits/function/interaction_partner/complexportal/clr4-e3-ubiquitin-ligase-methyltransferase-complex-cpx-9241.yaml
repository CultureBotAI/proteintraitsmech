identifier: ComplexPortal:CPX-9241
label: "CLR4 E3 ubiquitin ligase/methyltransferase complex"
definition: >-
  Multi-enzyme complex required for heterochromatin assembly by RNAi. rik1, pcu4, pip1, and raf1 form an active E3 ubiquitin ligase. The pip1 pprotein referentially ubiquitylates H3K14. This H3 ubiquitination promotes clr4 methylation of H3K9. Methylated H3K9 acts as a specific tag for epigenetic transcriptional repression by recruiting swi6 (P40381), leading to transcriptional silencing within centromeric heterochromatin, telomeres, ribosomal DNA repeats, and the silent mating-type region. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
