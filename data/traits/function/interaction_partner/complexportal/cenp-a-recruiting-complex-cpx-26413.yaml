identifier: ComplexPortal:CPX-26413
label: "CENP-A recruiting complex"
definition: >-
  Ensures the integrity of mitotic spindles by playing a role in the loading of kinetochore factors mis6/CENP-I (P87227) and cnp1/CENP-A (Q9Y812). CENP-A-containing nucleosomes have the ability to bind inner kinetochore proteins, such as cnp3/ CENP-C (Q9USR9) and mis15/CENP-N (Q9C0W0), initiating kinetochore formation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
