label: "Mitochondrial pyruvate dehydrogenase serine/threonine phosphatase complex"
definition: >-
  Serine/threonine phosphatase complex believed to activate the pyruvate dehydrogenase (E1) subunit of the pyruvate dehydrogenase complex (CPX-6233/CPX-6242) by dephosphorylating PDHA1/PDHA2 (P08559/P29803). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
