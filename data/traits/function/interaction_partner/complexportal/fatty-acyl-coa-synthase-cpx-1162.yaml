identifier: ComplexPortal:CPX-1162
label: "Fatty-acyl-CoA synthase"
definition: >-
  Catalyzes the formation of long-chain fatty acids from acetyl-CoA, malonyl-CoA and NADPH. Consists of a multifunctional enzyme composed of two non-identical alpha and beta subunits which are organized in an alpha6beta6 complex with 6 sites of fatty acid synthesis. The alpha subunit, FAS2, contains domains for acyl carrier protein, 3-oxoacyl-[acyl-carrier-protein] reductase, and 3-oxoacyl-[acyl-carrier-protein] synthase. The beta subunit, FAS 1, contains domains for [acyl-carrier-protein] acetyltransferase and malonyltransferase, S-acyl fatty acid synthase thioesterase, enoyl-[acyl-carrier-protein] reductase, and 3-hydroxypalmitoyl-[acyl-carrier-protein] dehydratase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
