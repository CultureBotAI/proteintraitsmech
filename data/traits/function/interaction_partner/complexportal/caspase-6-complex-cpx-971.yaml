identifier: ComplexPortal:CPX-971
label: "Caspase-6 complex"
definition: >-
  A cysteine protease complex that specifically cleaves substrates with an aspartic acid residue at position P1 and has a preferred cleavage sequence of Val-Glu-His-Asp-|-. Caspase-6 is an initiator enzyme involved in the activation cascade of caspases responsible for apoptosis execution. Caspase-6 is capable of autoactivation and/or may be activated via proteolytic cleavage by Caspase-3 (CPX-970), Caspase-8 (CPX-975) or Caspase-10 (Q92851). Once activated it cleaves pro-Caspase-2 (P42575), pro-Caspase-8 (Q14790) and pro-Caspase-10 allowing their oligomerization into active Caspase-2 (CPX-969), Caspase-8 and Caspase-10. Caspase-6 induces mitochondrial permeabilisation, which leads to cytochrome c release and activation of the Apotosome (CPX-3762). Caspase-6 plays a role in neurodegenerative disease such as Huntigton disease (HD) and Alzheimer's disease. In HD, a mutant huntingtin (mHTT) protein features expanded polyglutamine repeats at its N-terminus. Caspase-6 is a key processing enzyme responsible for the cleavage of mHTT. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
