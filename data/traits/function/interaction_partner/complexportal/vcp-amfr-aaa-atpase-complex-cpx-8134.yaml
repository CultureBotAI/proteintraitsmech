identifier: ComplexPortal:CPX-8134
label: "VCP-AMFR AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Plays a role in endoplasmic reticulum-associated degradation (ERAD). AMFR is an endoplasmic reticulum membrane-anchored ubiquitin ligase that mediates the ubiquitylation of a key enzyme in the synthesis of cholesterol and other isoprenoids, HMGCR (P04035) when cholesterol is abundant. The ubiquitinated protein is then extracted from the membrane by VCP. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
