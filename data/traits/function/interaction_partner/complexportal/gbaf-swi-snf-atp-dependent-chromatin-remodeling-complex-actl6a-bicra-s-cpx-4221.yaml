identifier: ComplexPortal:CPX-4221
label: "GBAF (SWI/SNF) ATP-dependent chromatin remodeling complex, ACTL6A-BICRA-SMARCA4 variant"
definition: >-
  An ATP-dependent chromatin remodeling complex that is predominately recruited to Ctcf (Q61164), Klf4 (Q60793) and Sp5-dependent targets sites, promoters and enhancers, depending on cell type. Targeted to chromatin, especially to H3K27ac, H3K4me1 and H3K4me3 markers, via by the bromo domain of its BRD9 subunit. Recruitment may be aided by Brd4 (Q9ESU6), especially in embryonic stem cells (ESC). Acts predominantly as a transcriptional activator that regulates tissue development, cell differentiation and cell proliferation and maintains naive pluripotency in ESC. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
