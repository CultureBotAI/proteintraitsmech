label: "RUNX-CBFB transcription factor complex, RUNX3 variant"
definition: >-
  Transcription factor complex that plays an essential role in the in the DNA damage response by regulating positively regulates homologous recombination repair. The RUNX protein binds to binds to TGTGGNNN core sequences, typically TGTGGTTT or TGTGGTCA. DNA binding is stabilised by the presence of CBFB. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
