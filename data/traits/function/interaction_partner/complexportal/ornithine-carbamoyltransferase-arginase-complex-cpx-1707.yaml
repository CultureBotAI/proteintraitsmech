identifier: ComplexPortal:CPX-1707
label: "Ornithine carbamoyltransferase arginase complex"
definition: >-
  Complex in which the activity of ornithine carbamoyltransferase (OTCase) is inhibited whereas arginase remains catalytically active thus preventing the recycling of ornithine produced by arginase by OTCase - an example of epiarginase control. Complex forms in the presence of ornithine and arginine. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
