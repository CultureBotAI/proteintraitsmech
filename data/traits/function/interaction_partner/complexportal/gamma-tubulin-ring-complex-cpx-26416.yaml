label: "Gamma tubulin ring complex"
definition: >-
  Templates the formation of microtubules, determining the position and direction of microtubule growth from alpha/beta-tubulin dimers that join head-to-tail to form protofilaments. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
