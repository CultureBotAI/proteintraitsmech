identifier: ComplexPortal:CPX-1925
label: "DNA polymerase III core complex"
definition: >-
  Catalytic complex with both 5'-3' DNA polymerase and 3'-5' proofreading exonuclease activity. Active as a proofreading DNA polymerase in addition to forming the catalytic core of the DNA polymerase III (Pol III) holoenzyme which functions as the leading- and lagging-strand replicase in DNA replication. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
