identifier: ComplexPortal:CPX-1294
label: "Mitochondrial ribonuclease P complex"
definition: >-
  Responsible for the 5' endonucleolytic cleavage of precursor tRNAs (pre-tRNAs) to remove approximately 12 leader nucleotides to yield mature tRNAs. The RNA subunit of the mitochondrial RNase P is most probably a catalytically active ribozyme that is capable of both recognizing and cleaving substrates efficiently and accurately. The protein component serves as an absolutely required cofactor. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
