identifier: ComplexPortal:CPX-1036
label: "DNA mismatch repair MutSbeta complex"
definition: >-
  Mismatch repair complex, involved in the recognition and repair of insertion/deletion mismatches. Active in both targeted gene replacement in which a targeted sequence in the genome is replaced with a selectable gene from a linear targeting DNA, and the single-strand annealing pathway of recombination between direct repeats. Direct repeats flanking a double-stranded break is annealed by RAD52 (P06778) and further stabilized by MSH2-MSH3 which has similar activities on both the leading and lagging strands of replication. MSH2-MSH3 appear to facilitate targeted integration by the two-end invasion pathway while simultaneously inhibiting the single-strand assimilation pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
