identifier: ComplexPortal:CPX-26575
label: "ATG13-ATG14-BECN1-PIK3C3-PIK3R4-RB1CC1, autophagy initiation complex"
definition: >-
  Serine/threonine-protein kinase complex required to initiate autophagy to drive the disposal of molecular aggregates as well as damaged or superfluous organelles. Complex formed between the scaffolding subunit RB1CC1 (CPX-373) and endosomal sorting and late stage of autophagy components PIK3C3 and PIK3R4, regulatory subunit BECN1 (CPX-73) and the autophagy-specific subunit ATG14, which is responsible for autophagy-initiation and autophagy-specific functions. Autophagic dysfunction has been linked Parkinson's disease, as well several other major neurodegenerative diseases. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
