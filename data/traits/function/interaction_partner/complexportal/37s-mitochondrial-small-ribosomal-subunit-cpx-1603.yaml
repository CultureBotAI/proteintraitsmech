identifier: ComplexPortal:CPX-1603
label: "37S mitochondrial small ribosomal subunit"
definition: >-
  Component of the ribsome, the site of protein biosynthesis resulting from translation of messenger RNA (mRNA). Acts as the decoding centre of the ribosome which brings mRNA and aminoacylated transfer (t)RNAs. The mitochondrial ribosome (mitoribosome) is responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. The mitoribosomes are tethered to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. The inner membrane protein MBA1 (P38300) aligns the mitochondrial peptide exit tunnel with the membrane insertion machinery and supports the transfer of the mitochondrial nascent peptides towards the membrane. A curated stable macromolecular complex (Complex Portal) with 35 subunits.
