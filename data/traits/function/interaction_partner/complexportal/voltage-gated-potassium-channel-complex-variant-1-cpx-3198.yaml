identifier: ComplexPortal:CPX-3198
label: "Voltage-gated potassium channel complex variant 1"
definition: >-
  Mediates the repolarizing IKr current in the cardiac action potential, conducting potassium (K+) ions out of the muscle cells of the cardiac myocyte. This current is critical in correctly timing the return to the resting state (repolarization) of the cell membrane during the cardiac action potential. In the nervous system, the complex is mainly involved in regulating spike-frequency adaptation and controlling resting potential, and abnormal expression is associated with the onset of schizophrenia. The complex also participates in cell proliferation and differentiation, regulating apoptosis, and is involved in regulating the secretory activity of pancreatic beta cells and chromaffin cells, as well as in regulating the contractility of smooth-muscle cells in the portal vein, the jejunum, and the epididymal duct, possibly by regulating the excitability of these cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
