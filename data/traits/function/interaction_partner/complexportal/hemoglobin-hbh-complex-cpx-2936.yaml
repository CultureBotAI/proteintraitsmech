identifier: ComplexPortal:CPX-2936
label: "Hemoglobin HbH complex"
definition: >-
  Hemoglobin H (HbH) is formed when mutations in the gene expressing hemoglobin alpha chain results in a lack of available alpha hemoglobin. The excess beta chains form homotetrameric hemoglobin H that severely reduces oxygen binding and transport. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
