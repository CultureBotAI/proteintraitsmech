identifier: ComplexPortal:CPX-995
label: "KEOPS tRNA N6-adenosine threonylcarbamoyltransferase complex"
definition: >-
  Catalyses the transfer of the threonylcarbamoyl-moiety of threonylcarbamoyladenylate (TCA) onto A37 of substrate tRNA in the cytoplasm. The N6-threonylcarbamoyladenosine (t6A) modification is present at position 37 of tRNAs that recognize ANN-codons, with N being any nucleotide, enhancing the codon-anti-codon interaction and is required for recognition of the AUG start codon. The modification is thus important for maintaining translational fidelity and also appears to play a role in transcription and telomere homeostasis. The unstable TCA intermediate is synthesised from ATP, threonine and bicarbonate by the SUA5 (P32579) enzyme. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
