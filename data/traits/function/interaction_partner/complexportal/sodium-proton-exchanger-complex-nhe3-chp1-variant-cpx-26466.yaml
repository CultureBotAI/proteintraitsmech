identifier: ComplexPortal:CPX-26466
label: "Sodium/proton exchanger complex, NHE3-CHP1 variant"
definition: >-
  Electroneutral ATP-dependent, secondary active transporter present in the basolateral plasma membrane of polarized epithelia where it mediates the exchange of extracellular Na+ for intracellular H+ thus maintaining a neutral intracellular pH and cell volume. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
