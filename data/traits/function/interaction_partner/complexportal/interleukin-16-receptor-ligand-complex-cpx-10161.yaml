identifier: ComplexPortal:CPX-10161
label: "Interleukin-16 receptor-ligand complex"
definition: >-
  Chemoattractant cytokine-receptor complex. Processing of precursor IL16 by CASP3 (P42574) cleavage is required to produce bioactive IL16 capable of chemoattractant functions. IL16 activity is dependent on the cell surface expression of CD4, the target signal transducing receptor for IL16. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
