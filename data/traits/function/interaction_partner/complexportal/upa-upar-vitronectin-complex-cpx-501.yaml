identifier: ComplexPortal:CPX-501
label: "uPA-uPAR-vitronectin complex"
definition: >-
  Links proteolytic degradation of the extracellular matrix to integrin-mediated adhesion. The formation of this complex results in altered cell adhesion, migration, survival and proliferation. Components of the plasminogen activation system including urokinase plasminogen activator uPA (PLAU) and its cell surface receptor uPAR (PLAUR) have been implicated in a wide variety of biological processes related to tissue homoeostasis. The high affinity binding of uPA regulates the binding of uPAR to matrix-embedded vitronectin. Activated uPA cleaves the zymogen plasminogen, generating the protease plasmin. uPA and plasmin induces a potent negative feedback on cell adhesion through specific cleavage of the RGD motif in vitronectin. Cleavage of vitronectin by uPA requires concomitant binding of both uPA and vitronectin to uPAR. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
