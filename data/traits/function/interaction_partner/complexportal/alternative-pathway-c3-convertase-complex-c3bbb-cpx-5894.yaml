identifier: ComplexPortal:CPX-5894
label: "Alternative pathway C3 convertase complex C3bBb"
definition: >-
  A serine-type endopeptidase complex of the alternative pathway of complement activation of the innate immune system. Cleaves Complement C3 precurser (P01027) into anaphylatoxin C3A (P01027-PRO_0000005920) and nascent core-convertase component C3b (CPX-988). Occurs in the fluid-phase and binds host and pathogen cells. C3bBb convertase is unstable. In fluid-phase or when bound to the host cell it is readily inactivated by Factor H (P06909) thus preventing autoimmune activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
