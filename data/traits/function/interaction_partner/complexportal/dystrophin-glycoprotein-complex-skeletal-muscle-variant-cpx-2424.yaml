identifier: ComplexPortal:CPX-2424
label: "Dystrophin glycoprotein complex, skeletal muscle variant"
definition: >-
  A plasma membrane transmembrane complex that links the actin cytoskeleton to the extracellular matrix. In skeletal muscle, it limits mechanical damage during contraction and thus prevents muscle degeneration. The complex also functions as a scaffold for proteins involved in signaling such as neuronal nitric oxide synthase (NOS1, P29475). A curated stable macromolecular complex (Complex Portal) with 11 subunits.
