label: "Peptide:N-glycanase-Rad23 complex"
definition: >-
  Role in the proteasomal degradation of a specific set of ER-associated protein degradation (ERAD) substrates, specifically deglycosylates the denatured form of N-linked glycoproteins in the cytoplasm and assists proteasome-mediated glycoprotein degradation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
