identifier: ComplexPortal:CPX-4721
label: "BRCA1-B complex"
definition: >-
  DNA helicase complex that binds and unwids DNA in a 5-prime to 3-prime direction during S phase at DNA damage sites. BRCA1-B complex is required for replication stress induced checkpoint control and DNA repair through homologous recombination (HR). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
