identifier: ComplexPortal:CPX-135
label: "RISC-loading complex, TARBP2 variant"
definition: >-
  Binds to precursor miRNAs (pre-miRNAs). DICER then cleaves approximately 22 nucleotides from the 5' end of the stem-loop to form mature double-stranded miRNAs. The duplex miRNA is then loaded onto Argonaute (AGO) proteins which, with the scaffolding proteins TNRC6, form the RNA-induced silencing complex (RISC). During this loading process, the passenger strand is removed from the RNA duplex leaving the guide strand. May also process pre-siRNAs. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
