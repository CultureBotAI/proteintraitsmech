identifier: ComplexPortal:CPX-26584
label: "Cytoplasmic histone acetyltransferase type B, HAT1 complex"
definition: >-
  Type B histone acetyltransferase (HAT-B) complex capable of acetylating both free histones and nucleosomes by transferring an acetyl group from acetyl coenzyme A (CHEBI:15351) to acetyllysine (CHEBI:17752). Required for chromatin assembly following DNA replication. Complex primarily acetylates Lys-12 of histone H4 (H4K12). Additionally, HAT1 can also acetylate H4K5 while RBBP7 has been shown to increase the catalytic activity of the HAT complex's activity as well as its specificity for H4K12. Located primarily in the cytoplasm and thought to play more of a house-keeping role, the complex is responsible for acetylating newly synthesized histones H3, H4 prior to their assembly into nucleosome. In addition to the complex's catalytic activity, its association with histones H4 (P62805) and H3 (P68431) is thought to extend to a role in nuclear import of these histones and their subsequent delivery to chromatin assembly factors. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
