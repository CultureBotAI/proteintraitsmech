identifier: ComplexPortal:CPX-1093
label: "LptDE outer membrane translocon complex"
definition: >-
  Required for the assembly of the dense outer membrane coating of lipopolysaccharides( LPS) required by Gram-negative bacteria to protect themselves from chemical stressors. Part of a seven-subunit assembly that spans the cellular envelope. Inserts LPS laterally into the outer leaflet of the outer membrane where it is dispersed across the extracellular surface.A lateral gate in the beta-barrel of LptD allows LPS to proceed to the outer leaflet of the outer membrane. The specific disulfide bond configuration of the lptDE heterodimer restricts the size of the lateral gate on the periplasmic side, and may prevent incorrect insertion of LPS into the inner leaflet of the outer membrane. lptE is embedded into the lptD lumen, thus potentially preserving membrane impermeability. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
