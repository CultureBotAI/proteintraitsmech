identifier: ComplexPortal:CPX-6016
label: "ISGF3 complex"
definition: >-
  Transcription factor complex that is activated in response to type I interferon. Binds to the IFN stimulated response element (ISRE) to activate the transcription of interferon stimulated genes, which drive the cell into an antiviral state. STAT1 and STAT2 are usually phosphorylated in this complex but a continuous exposure of cells to a low level of IFN-beta induces the expression of the related, unphosphorylated complex. This unphosphorylated complex maintains the expression of a subset of the initially IFN-beta‐stimulated genes whose protein products lead to extended resistance to virus infection and DNA damage. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
