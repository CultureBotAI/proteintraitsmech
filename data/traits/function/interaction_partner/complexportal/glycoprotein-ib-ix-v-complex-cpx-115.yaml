identifier: ComplexPortal:CPX-115
label: "Glycoprotein Ib-IX-V complex"
definition: >-
  Serves as a receptor for many proteins involved in hemostasis and thrombosis, such as von Willebrand factor (VWF). Through its interaction with VWF immobilized at the damaged blood vessel wall, the GP Ib-IX-V complex mediates the initial tethering and rolling of circulating platelets to the injury site. The rolling reduces platelet velocity and prolongs the contact time with components of the cell matrix, facilitating platelet activation and subsequent integrin-mediated firm attachment. Ligation of VWF to the complex sends an activating signal into the platelet, which helps to activate platelet integrin alphaIIb-beta3 (CPX-1799), and induces calcium mobilization, the rearrangement of the cytoskeleton, granule release and platelet aggregation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
