identifier: ComplexPortal:CPX-3577
label: "Ferric-catecholate outer membrane transporter complex"
definition: >-
  A member of the TonB-dependent transporter family (TBDTs) which binds and then transports Fe3+ complexed to linear catecholates, such as dihydroxybenzoyl, across the outer membrane. Catecholate transport requires an outer membrane receptor (cirA), which is relatively specific for its ligand. The ligand-bound receptor then physically interacts with the TonB protein. TBDTs are energy-dependent gated channels that usually transport large metal complexes which cannot fit through porins, and are too scarce to enter by mass-action-driven transport. Energy-dependent uptake through TBDTs requires interaction with TonB in complex with exbB and exbD in the inner membrane, ExbBD. TonB undergoes rapid energized movement driven by ExbBD which harvests the electrochemical force from the electrochemical proton gradient created by the proton gradient across the inner membrane and convert it into rotational motion. Hence, tonB may pull or twist the N-termini of TBDTs to promote transport of substrates into the periplasm. ATP-binding-cassette (ABC) transporters subsequently move the ferric-catecholate (Fe3+) through the periplasm and inner membrane. The complex has also implicated in the uptake of catechol‐substituted cephalosporins and is used by Group B colicins (E. coli‐specific bacteriocins) to bind and cross the outer membrane. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
