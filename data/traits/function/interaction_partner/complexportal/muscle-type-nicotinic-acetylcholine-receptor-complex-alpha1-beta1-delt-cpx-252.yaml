identifier: ComplexPortal:CPX-252
label: "Muscle-type nicotinic acetylcholine receptor complex, alpha1-beta1-delta-gamma"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous nicotinic agents. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron and ultimately producing muscle contractions. Mediates fast, short-lived synaptic transmission of neurotransmitters at the foetal extrajunctional, non-innervated muscle but acts slower than the adult receptor. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
