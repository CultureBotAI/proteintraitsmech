identifier: ComplexPortal:CPX-715
label: "BRCA1-BARD1 complex"
definition: >-
  A ligase complex that catalyses monoubiquitylation of heterologous substrates (especially core nucleosome histones) and Lys-6-linked polyubiquitylation of itself and coordinates a diverse range of cellular pathways such as DNA damage repair, ubiquitination and transcriptional regulation to maintain genomic stability. Unusually, autopolyubiquitylation activates its ubiquitin ligase function >20-fold rather than marking the protein for degredation. Plays a central role in the control of the cell cycle in response to DNA damage. Is a subcomplex of at least three mutually exclusive complexes: BRCA1-A (CPX-4425), BRCA1-B (CPX-4426) and BRCA1-C (CPX-4441). Its E3 ligase activity is required for its tumor suppressor function. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
