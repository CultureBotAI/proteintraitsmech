identifier: ComplexPortal:CPX-6149
label: "Prefoldin co-chaperone complex"
definition: >-
  Co-chaperone that works together with HSP90 in the activation and assembly of several macromolecular complexes. It binds specifically to cytosolic CCT complex (CPX-6030) and transfers target proteins to it. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
