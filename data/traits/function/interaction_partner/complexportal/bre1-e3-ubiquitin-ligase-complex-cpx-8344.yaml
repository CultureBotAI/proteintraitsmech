identifier: ComplexPortal:CPX-8344
label: "BRE1 E3 ubiquitin ligase complex"
definition: >-
  E3 ubiqitin ligase complex which ubiquitinates Lys-120 of histone H2B. This then acts as a epigenetic tag for both transcriptional activation and repression of specific genes potentially, in some cases via recruitment by TP53 (P04637). Interacts with the PAF1 (CPX-2381) complex, which plays a role in transcriptional elongation and also with RNA polymerase II (CPX-2387/CPX-7481) via the WAC adapter protein (Q9BTA9). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
