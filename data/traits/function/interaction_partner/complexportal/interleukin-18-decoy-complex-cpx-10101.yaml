identifier: ComplexPortal:CPX-10101
label: "Interleukin-18 decoy complex"
definition: >-
  Decoy cytokine-receptor complex which acts as an antagonist to moderate the potent proinflammatory activities of IL18 (CPX-10041). IL18 plays key roles in driving autoimmune and inflammatory diseases and its sequestration by its soluble decoy receptor IL18BP is critical to the regulation of IL18 activity. Therefore, IL18BP is present in human serum at a 20-fold molar excess and binds IL18 with a several-fold higher affinity than it's receptor, IL18R1 (Q13478). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
