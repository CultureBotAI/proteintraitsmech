identifier: ComplexPortal:CPX-2811
label: "Lactose synthase complex"
definition: >-
  Catalyzes the production of lactose, the primary carbohydrate in milk, in the lactating mammary gland. The complex forms in the Golgi apparatus and transfers D-galactose (derived from UDP-galactose) to the OH-4 position of glucose forming a beta-1-4 glycosidic bond to create lactose. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
