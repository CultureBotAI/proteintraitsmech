identifier: ComplexPortal:CPX-8084
label: "CRL3 E3 ubiquitin ligase complex, KLHL7 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. RL3-KLHL7 target proteins include the Ras GTPase-activating protein RASA2 (Q15283) which acts as an inhibitory regulator of the Ras-cyclic AMP pathway. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
