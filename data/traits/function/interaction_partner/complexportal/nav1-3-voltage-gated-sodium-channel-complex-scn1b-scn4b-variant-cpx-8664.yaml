label: "Nav1.3 voltage-gated sodium channel complex, SCN1B-SCN4B variant"
definition: >-
  Voltage-gated sodium (Nav) channel required for the initiation and transmission of electrical impulses and carries Na+ inward across an excitable membrane. SNCA3 channels are found primarily in the central nervous system and are involved in neuronal development, hormone secretion and pain perception. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
