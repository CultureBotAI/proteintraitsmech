identifier: ComplexPortal:CPX-1614
label: "Nucleosome, variant HTZ1-HTB2"
definition: >-
  Nucleosomes wrap and compact DNA into chromatin, limiting DNA accessibility to the cellular machineries which require DNA as a template. Histones thereby play a central role in transcription regulation, DNA repair, DNA replication and chromosomal stability. The H2A.Z nucleosome acts as a barrier that occludes the transcription start sites at the edge of the nucleosome-free region, potentially keeping promoters in a repressed state. The complex additionally helps position downstream nucleosomes in the coding region. SWR1 (CPX-2122) replaces the canonical H2A/H2B dimer at nucleosomes flanking histone-depleted regions, such as promoters, with the variant histone H2A.Z/H2B dimer. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
