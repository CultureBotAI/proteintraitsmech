identifier: ComplexPortal:CPX-1758
label: "Collagen type XVII trimer"
definition: >-
  Nonfibrillar collagen that is a transmembrane protein. Collagen XVII is a structural component of hemidesmosomes, multiprotein complexes at the dermal-epidermal basement membrane zone that mediate adhesion of keratinocytes to the underlying membrane. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
