identifier: ComplexPortal:CPX-5152
label: "AP-2 Adaptor complex, alpha1 variant"
definition: >-
  Adaptor complex that links clathrin to the membrane surface of a vesicle, and the cargo receptors during receptor/clathrin mediated endocytosis. Together with CLASP proteins (a family of microtubule-associated proteins involved in attachment of microtubules to the cell cortex), it binds to the phosphatidylinositol 4,5-bisphosphate (PIP2) moieties of the inner side of the plasma membrane, recognizes LL and Y-X-X-Phi (Phi = hydrophobic residue) endocytosis signal motifs within the cytosolic tails of transmembrane cargo molecules and serves as a cargo receptor to selectively sort the membrane proteins involved in receptor-mediated endocytosis. It also seems to play a role in the recycling of synaptic vesicle membranes from the presynaptic surface. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
