identifier: ComplexPortal:CPX-6215
label: "Coagulation factor Xa complex"
definition: >-
  A serine-type endopeptidase complex of the common blood coagulation pathway. Cleaves Arg-|-Thr and then Arg-|-Ile bonds in prothrombin (P00734) by limited proteolysis to form thrombin (CPX-6222) and contributes to factor VIIa-TF complex (CPX-2808) activation. While factor Xa is constitutively active, it is 300,000-fold more active when bound to factor Va (CPX-6216). The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form is activated by limited proteolysis by factor VIIa-TF complex and factor VIIIa-IXa complex (CPX-6204) to form active factor Xa. Inhibited by antithrombin (SERPINC1, P01008). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
