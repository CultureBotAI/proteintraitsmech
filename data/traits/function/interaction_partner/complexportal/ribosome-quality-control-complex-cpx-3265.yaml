identifier: ComplexPortal:CPX-3265
label: "Ribosome quality control complex"
definition: >-
  A 60S-ribosomal subunit-associated complex involved in ubiquitin proteasome mediated degradation of polypeptides whose translation is stalled on the ribosome. The abnormal stalled ribosome is recognized and ubiquitinated at one or more specific residues by the E3 ubiquitin ligase HEL2 (Q05580) . Ribosome ubiquitination induces subunit dissociation by the RQT complex (CPX-6643). Dissociation of the 40S subunits allows binding of 60S ribosome-nascent chains to RQC2, which recruits the LTN1 E3 ubiquitin ligase. LTN1 ubiquitinates the nascent polypeptide chains, targeting them for degradation. RQC2 attaches C-terminal alanyl/threonyl sequences to stalled polypeptides. The ATPase CDC48 and cofactors UFD1 and NPL4 unfold ubiquitinated polypeptides, then extracts the peptidyl-tRNA from the 60S, thereby recruiting it to the 26S proteasome for degradation. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
