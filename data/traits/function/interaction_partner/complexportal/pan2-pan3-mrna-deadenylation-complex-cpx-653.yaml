identifier: ComplexPortal:CPX-653
label: "PAN2-PAN3 mRNA deadenylation complex"
definition: >-
  A poly(A)-specific 3' exoribonuclease required to regulate Poly(A) tails added to mRNA co-transcriptionally and which are required for the export of mature mRNAs to the cytoplasm The complex is responsible for the poly(A) trimming of the tail length to a transcript specific size which regulates translation repression and mRNA decay. The complex is non-essential, but its deletion results in increased polyA-tail length. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
