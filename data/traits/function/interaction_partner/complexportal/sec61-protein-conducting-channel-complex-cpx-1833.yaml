identifier: ComplexPortal:CPX-1833
label: "SEC61 protein-conducting channel complex"
definition: >-
  Cotranslational protein conducting channel (PCC) that also assembles with the Sec62-Sec63 complex (CPX-3056) to form the post-translational translocon complex (CPX-3055). Transports secretory proteins across, and inserts integral membrane proteins into, the membrane of the endoplasmic reticulum. The ribosome with an emerging signal sequence is targeted to the membrane by the signal recognition particle (CPX-609) and its receptor. The Sec61 complex acts as a receptor for the ribosome via its cytosolic loops. The alignment of the ribosomal tunnel with a central pore of the PCC allows direct movement of the nascent chain from the ribosomal tunnel exit across or into the membrane. The SEC61 channel appears to be responsible for the transport of glycoproteins. Binds to the oligosaccharyl transferase complex variant 2 (CPX-1639) which selectively glycosylates nascent polypeptide chains in the endoplasmic reticulum. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
