identifier: ComplexPortal:CPX-10309
label: "Interleukin-22 decoy receptor complex"
definition: >-
  Inhibitory cytokine-receptor complex. IL22RA2 competitively binds IL22 with over 1000-fold affinity than its specific membrane-bound receptor IL22RA1 (Q8N6P7). There are three functionally different isoforms of IL22RA2 in humans, the non-functional isoform 1, isoform 2 which has a strong inhibitory effect on IL22 activity and isoform 3, which is abundantly distributed but binds IL22 with an affinity that is 27-fold lower than that of isoform 2. Though constitutively expressed by a range of epithelial cells, IL22RA2 expression is rarely detected during acute inflammatory responses. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
