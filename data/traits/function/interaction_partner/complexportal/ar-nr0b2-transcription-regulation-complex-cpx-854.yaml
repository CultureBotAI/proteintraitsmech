identifier: ComplexPortal:CPX-854
label: "AR-NR0B2 transcription regulation complex"
definition: >-
  Transcriptional repressor complex. The agonist-stabilized conformation of AR recruits regulatory proteins necessary to regulate transcriptional machinery and gene expression. Binding of NR0B2/SHP to form this complex inhibits transactivation of AR. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
