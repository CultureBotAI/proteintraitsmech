identifier: ComplexPortal:CPX-1939
label: "TRAPP II complex"
definition: >-
  Tethering complexes which provide the initial recognition event that links a particular vesicle with its target membrane. Participates in intra-Golgi and endosome-Golgi transport. Binds to a component of the COPI coat. BET3, BET5, TRS23, and TRS31 create a catalytic site for promoting GDP/GTP exchange in YPT1. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
