identifier: ComplexPortal:CPX-6147
label: "SARS-CoV-2 ORF8 complex"
definition: >-
  SARS-CoV-2 coronavirus complex that negatively regulates the innate immune response. Binds MHC-I molecules intracellularly at the endoplasmic reticulum and targets them for lysosomal degradation by an autophagy-dependent mechanism. This down-regulates MHC-I cell surface expression and reduces the recognition and elimination of virus-infected cells by cytotoxic T-cells. Also inhibits type I interferon (IFN-beta) activation and downstream innate immune responses. Produces antibodies that are one of the principal markers of SARS-CoV-2 infections. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
