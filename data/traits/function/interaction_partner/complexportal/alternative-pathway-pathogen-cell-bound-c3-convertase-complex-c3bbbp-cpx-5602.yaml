identifier: ComplexPortal:CPX-5602
label: "Alternative pathway pathogen cell-bound C3 convertase complex C3bBbP"
definition: >-
  A serine-type endopeptidase complex of the alternative pathway of complement activation of the innate immune system. Cleaves Complement C3 precurser (P01024) into anaphylatoxin C3A (P01024-PRO_0000005910) and nascent convertase core-component C3b (CPX-973). Only occurs bound to pathogen cells and binds to target cells via its reactive thioester moiety. Properdin-binding stablises C3bBb convertase (CPX-5601) and prevents its inactivation by Factor H (P08603). Lack of protection, due to familial mutations in the complement genes or the presence of autoantibodies against regulators has been linked to atypical hemolytic uremic syndrome (aHUS) and C3 glomerulopathies (C3G) in kidneys and age-related macular degeneration (AMD) in eyes. Conditions of chronic and acute inflammations, as in rheumatoid arthritis, strokes, and heart attacks, become aggravated by complement activation against the disturbed tissue. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
