identifier: ComplexPortal:CPX-10330
label: "Histone H2B ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase required for ubiquitination of histone H2B (P04913) Lys-119/123, a specific tag for epigenetic transcriptional activation and also a prerequisite for H3K4me and H3K79me formation. H2BK119ub1 also modulates the formation of double-strand breaks during meiosis and is a prerequisite for DNA-damage checkpoint activation. The complex localizes to heterochromatic sequences where it functions with the COMPASS complex to regulate mating-type switching. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
