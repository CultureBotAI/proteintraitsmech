identifier: ComplexPortal:CPX-26603
label: "ATP9A-DOP1B-MON2, golgi transporter complex"
definition: >-
  Plays a role in endosomal recycling. Enables SNX3 (O60493) retromer-mediated endosomal sorting of WLS (Q5T9L3), which transports WNT morphogens to the cell surface in developing tissues. Complex is involved in the formation of endosomal carriers that direct WLS trafficking from the endoplasmic reticulum back to Golgi, and away from lysosomal degradation. MON2 and ATP9A mutations have been implicated in neurodevelopmental disorders, characterized by global developmental delay. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
