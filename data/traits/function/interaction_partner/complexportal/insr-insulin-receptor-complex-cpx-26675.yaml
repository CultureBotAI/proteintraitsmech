identifier: ComplexPortal:CPX-26675
label: "INSR, insulin receptor complex"
definition: >-
  Insulin (P01308) binding tyrosine kinase receptor complex. Regulates glucose homeostasis and normal human growth. Initiates key signalling pathways upon insulin binding. Activation of INSR leads to autophosphorylation and recruitment of insulin receptor substrates (IRS proteins), which in turn activate the PI3K-AKT and MAPK pathways, thereby regulating critical metabolic functions such as glucose uptake (via GLUT4 translocation), glycogen synthesis, lipid metabolism, and inhibition of hepatic glucose production. INSR also influences physiological processes including growth, development, and bone formation, partly through interactions with the growth hormone/IGF. INSR function is tightly regulated by internalization and recycling mechanisms, and its dysfunction can result in severe insulin resistance syndromes or contribute to the pathogenesis of diabetes mellitus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
