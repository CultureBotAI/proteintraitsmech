identifier: ComplexPortal:CPX-1617
label: "EDS1-SAG101 complex, variant EDS1B"
definition: >-
  Functions in basal disease resistance and resistance (R) gene-mediated effector triggered immunity (ETI), regulates accumulation of the hormone salicylic acid (SA) which is a necessary component of systemic immunity. Part of a family of systemic immunity complexes: EDS1-PAD4 complexes (CPX-1324 & CPX-1618) alone are sufficient for basal resistance, partly mediated via SA. EDS1-SAG101 complexes (this complex & CPX-1321) contribute to basal and TIR-NB-LRR-type R gene-triggered resistance in the absence of PAD4. Loss of SAG101 can be compensated for by the presence of PAD4 in both resistance responses. EDS1-PAD4-SAG101 complexes (CPX-1325 & CPX-1619) are required for resistance signalling against turnip crinkle virus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
