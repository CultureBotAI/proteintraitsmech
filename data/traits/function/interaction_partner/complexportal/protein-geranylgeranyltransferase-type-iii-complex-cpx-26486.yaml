identifier: ComplexPortal:CPX-26486
label: "Protein geranylgeranyltransferase type III complex"
definition: >-
  Catalyzes the transfer of a 20-hydrocarbon geranyl-geranyl moiety from geranyl-geranyl pyrophosphate to YKT6 (P36015) via a thioether linkage to a cysteine residue located within a conserved C-terminal tandem cysteine motif (CCIIM), where the second cysteine is mono-farnseylated, resulting in a doubly prenylated protein. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
