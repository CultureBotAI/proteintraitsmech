identifier: ComplexPortal:CPX-2876
label: "Ribonuclease MRP complex"
definition: >-
  Essential endoribonuclease closely related to RNAse P complex (CPX-2877). RNAse MRP is involved in the processing of precursor ribosomal RNAs (pre-rRNA) at ITS1 site 2, mitochondrial RNAs and certain messenger RNAs. The RNA subunit RMRP is a catalytically active ribozyme that is capable of both recognizing and cleaving substrates. POP4, RPP14, POP5, RPP20, RPP30, RPP38, RPP40, and RMRP are required for pre-rRNA ITS1 site 2 cleavage. Mutations in RMRP or in the complex's promoter regions of its proteins components or the protein components themselves are associated with ribosomopathies. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
