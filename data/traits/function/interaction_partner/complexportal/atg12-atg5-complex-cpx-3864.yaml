identifier: ComplexPortal:CPX-3864
label: "ATG12-ATG5 complex"
definition: >-
  Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. Contributes to nutrition homeostasis and damage control in eukaryotic cells. Acts as an E3-like ligase dependent on ATP and two enzymes, atg-7 (G5EBK4) as an E1-like activating enzyme and atg-10 (Q18991) as an E2-like conjugating enzyme. Required for lipidation of lgg-1 (Q09490), for example by phosphatidylethanolamine, and associates to the vesicle membranes once bound to atg-16.1 (Q19124) in the atg-5-atg-12-atg-16.1 complex (CPX-3865), atg-16.2 (Q09406) in the atg-5-atg-12-atg-16.2 complex (CPX-3866), and atg-16.1/atg-16.2 in the complex atg-5-atg-12-atg-16.1-atg-16.2 complex (CPX-3863). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
