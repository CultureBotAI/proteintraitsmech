label: "Mitochondrial inner membrane peptidase complex"
definition: >-
  Processes certain precursor proteins that are exported from the matrix into the inner membrane or the intermembrane space. The two IMP subunits are associated with the inner membrane, and their catalytic sites are exposed to the intermembrane space. The IMP1 and IMP2 proteins both display proteolytic activity and have non-overlapping substrate specificities. IMP1 has been shown to catalyse the maturation of cytochrome oxidase subunit 2, cytochrome b2 and the 32-kDa form of NADH-dependent cytochrome b5 reductase, while IMP2 participates in the second processing step during the maturation of cytochrome c1. SOM1 appears to functions as a molecular chaperone, which binds to specific substrates and directs them to the catalytic site. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
