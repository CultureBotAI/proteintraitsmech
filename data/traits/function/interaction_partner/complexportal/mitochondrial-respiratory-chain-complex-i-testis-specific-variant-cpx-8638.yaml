identifier: ComplexPortal:CPX-8638
label: "Mitochondrial respiratory chain complex I, testis-specific variant"
definition: >-
  Catalyses the first step of electron transport by the oxidation of NADH, thus providing two electrons for the reduction of ubiquinone. Electron transfer is coupled with the translocation of protons across the membrane, generating a proton motive force. A curated stable macromolecular complex (Complex Portal) with 43 subunits.
