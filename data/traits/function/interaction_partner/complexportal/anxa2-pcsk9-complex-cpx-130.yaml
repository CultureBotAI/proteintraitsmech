identifier: ComplexPortal:CPX-130
label: "ANXA2-PCSK9 complex"
definition: >-
  The formation of the AnxA2-PCSK9 complex reduces the degradation of the LDLR (low density lipoprotein receptor, P01130), leading to increased clearance of LDLs (low density lipoproteins). The reduced levels of circulating LDLs in plasma could lead to protection from coronary heart disease and premature atherosclorosis. This activity opposes that of a closely related complex the LDLR-PCSK9 complex CPX-128. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
