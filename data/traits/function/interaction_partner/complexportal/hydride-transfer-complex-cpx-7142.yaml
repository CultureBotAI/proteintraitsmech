identifier: ComplexPortal:CPX-7142
label: "Hydride transfer complex"
definition: >-
  Catalyzes a metabolic cycle that transfers a hydride anion (H−) from NADH to NADP+, thus regenerating NAD+ and supplying NADPH. Cytosolic PC appears to supply oxaloacetate for NAD+ regeneration via MDH1, which also produces malate that is then converted back to pyruvate by cytosolic ME1, transferring the hydride ion from NADH to NADP+. This cycle overcomes mitochondrial dysfunction and confers fitness to cells under hypoxic conditions but by-passes senescence which prevents cells bearing oncogenic mutations from expanding. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
