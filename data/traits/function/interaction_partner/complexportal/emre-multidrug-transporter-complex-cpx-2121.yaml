identifier: ComplexPortal:CPX-2121
label: "EmrE multidrug transporter complex"
definition: >-
  Transmembrane homodimer that transports positively charged hydrophobic xenobiotics across the plasma membrane into the periplasmic space, coupling efflux to the inward movement of protons across the cell membrane thereby conferring resistance to a wide range of toxic compounds (e.g. methyl viologen, ethidium bromide and acriflavine). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
