identifier: ComplexPortal:CPX-2746
label: "Brahma SWI/SNF ATP-dependent chromatin remodeling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). A curated stable macromolecular complex (Complex Portal) with 11 subunits.
