identifier: ComplexPortal:CPX-7971
label: "SCF E3 ubiquitin ligase complex, FBXO31 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO31 target proteins include the phospholipid hydroperoxide glutathione peroxidase (P36969) thus regulating ferroptosis and the retinal cell surface receptor CD147 (P35613), resulting in repression of lipid synthesis. Acts as a dedicated DNA damage checkpoint protein causing cell cycle arrest at G1 and G2/M phases through two independent pathways, either via the degradation of MDM2 (Q00987) in p53-positive cells which results in increased levels of p53, leading to growth arrest and senescence through transcriptional activation of CDKN1A (P38936) or in p53-deficient cells, the complex mediates the degradation of CCND1 (P24385) resulting in G1 arrest. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
