identifier: ComplexPortal:CPX-1279
label: "LMA1 complex, TRX2 variant"
definition: >-
  Required for the trafficking of yeast vacuoles, such as homotypic vacuole and ER-derived COPII vesicle fusion with the Golgi. Acts synergistically with SEC18 to support vacuole fusion and acts in an early stage of the vacuole inheritance reaction. The reduction-oxidation activity of thioredoxin does not appear to be required for this function. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
