identifier: ComplexPortal:CPX-6503
label: "GPI-anchor transamidase complex"
definition: >-
  Transamidase enzyme complex that transfers the glycosylphosphatidylinositol (GPI) lipid to the newly made GPI protein in the endoplasmic reticulum, replacing the C-terminal GPI attachment signal peptide of a protein with the lipid. GPI is a complex glycolipid with a core structure (phosphoethanolamine-6-mannose-alpha1,2-mannose-alpha1,6-mannose-alpha1,4-glucosamine-alpha1,6-inositol-phospholipid) that functions as a membrane anchor for many cell surface proteins. The complex cleaves the GPI attachment signal peptide between the omega and omega + 1 amino acids, generating a substrate-enzyme intermediate linked by a thioester bond between the omega amino acid carboxyl group and a catalytic cysteine side chain of the enzyme. The thioester bond is attacked by an amino group of the terminal ethanolamine of GPI, completing the transfer of GPI by transamidation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
