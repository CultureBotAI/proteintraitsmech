identifier: ComplexPortal:CPX-20753
label: "Chromosomal passenger complex, AURKC variant"
definition: >-
  A serine/threonine kinase complex essential for accurate chromosome segregation and early cytokinesis. It ensures proper chromosome bi-orientation on the mitotic spindle during metaphase by phosphorylating multiple kinetochore components, thereby destabilizing incorrect, monopolar attachments. The complex also regulates cytokinesis and chromatin-induced spindle assembly. Structurally, it consists of INCENP, BIRC5, CDCA8, and an Aurora kinase, primarily AURKB (see CPX-116), though AURKC (this complex) can perform similar roles in certain cellular contexts, such as during meiosis in germline cells. Disruption of any of these four components leads to structural impairment of the complex and mislocalization from its key mitotic sites, ultimately compromising faithful chromosome segregation and successful cell division. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
