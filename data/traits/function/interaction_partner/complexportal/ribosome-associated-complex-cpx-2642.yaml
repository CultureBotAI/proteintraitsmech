identifier: ComplexPortal:CPX-2642
label: "Ribosome-associated complex"
definition: >-
  Chaperone complex involved in regulation of accurate translation termination and in folding or maintaining nascent polypeptides in a folding-competent state. RAC stimulates the ATPase activity of the ribosome-associated pool of Hsp70-type chaperones that bind to the nascent polypeptide chain. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
