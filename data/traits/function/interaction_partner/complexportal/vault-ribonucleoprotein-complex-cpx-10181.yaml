identifier: ComplexPortal:CPX-10181
label: "Vault ribonucleoprotein complex"
definition: >-
  May act to facilitate protein exchange between the cytoplasm and nucleus. Rapidly redistributed in response to external stimuli or stress. The VTRNA-1 locus contains the genetic information for three vault RNAs (vtRNA1-1, vtRNA1-2, and vtRNA1-3). vtRNA1-1 is involved in the regulation of apoptosis and autophagy and associated with homeostasis. vtRNA1-2 is localized predominantly in the nucleus and may regulate expression of cell membrane proteins. vtRNA1-3 has been linked to multi-drug resistance. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
