identifier: ComplexPortal:CPX-426
label: "PAN1 actin cytoskeleton-regulatory complex"
definition: >-
  Actin cytoskeleton-regulatory complex which is believed to be required for the internalization of endosomes during actin-coupled endocytosis. The complex links the site of endocytosis to the cell membrane-associated actin cytoskeleton, coordinating ARP2/3 stimulation at the later stages of endocytosis. Present in the late endocytic coat. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
