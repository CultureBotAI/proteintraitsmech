identifier: ComplexPortal:CPX-5885
label: "Flagellar export complex"
definition: >-
  A type III protein export apparatus that transports the rod, hook and filament axial component proteins from the cytoplasm to the distal end of the growing flagellar structure. The transmembrane export gate (flhA, flhB, fliP, fliQ and fliR) acts as a proton-protein antiporter to couple an inward-directed proton translocation with an outward-directed protein export. fliH, fliI and fliJ form a cytoplasmic ATPase ring which hydrolyzes ATP to activate the export gate. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
