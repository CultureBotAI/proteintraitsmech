identifier: ComplexPortal:CPX-5853
label: "AMPK complex, alpha1-beta2-gamma1 variant"
definition: >-
  Energy sensor serine/threonine kinase that plays a key role in regulating cellular energy metabolism. Energy stress manifests as a drop in the ratio of adenosine triphosphate (ATP) to AMP/ADP, which activates AMPK's kinase activity, allowing it to upregulate ATP-generating catabolic pathways and to reduce energy-consuming catabolic pathways and cellular programs: inhibits protein, carbohydrate and lipid biosynthesis, as well as cell growth and proliferation. AMPK acts via direct phosphorylation of metabolic enzymes, and by longer-term effects via phosphorylation of transcription regulators. Only three AMPK complexes are present in skeletal muscle: alpha2-beta2-gamma3 (CPX-5854) which is activated during exercises; and alpha1-beta2-gamma1(CPX-5853) and alpha2-beta2-gamma1 (CPX-5851) predominant in resting conditions. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
