identifier: ComplexPortal:CPX-155
label: "RB1-E2F1-DP1 transcriptional repressor complex"
definition: >-
  Formation of this complex, by binding to RB1 to the E2F1-DP1 transcription factor complex (CPX-175), negatively regulates the G1-S transition by blocking the transactivation domain of E2F1. RB1 dissociates from the complex following hyperphosphorylation by cyclin-dependent kinases. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
