identifier: ComplexPortal:CPX-140
label: "MICOS mitochondrial contact site and cristae organizing system complex"
definition: >-
  MICOS (MItochondrial contact site and Cristae Organizing System) is a mitochondrial inner membrane complex that extends into the intermembrane space and has a role in the maintenance of crista junctions, inner membrane architecture, and formation of contact sites to the outer membrane. The Mic60 subunit also has a role in import of inter-membrane space proteins. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
