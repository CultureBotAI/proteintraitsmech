identifier: ComplexPortal:CPX-3180
label: "Mitochondrial degradosome complex"
definition: >-
  Plays an essential role in mitochondrial RNA turnover, degrading structured RNA in an ATP-dependent manner. Helicase activity of the degradosome is more efficient with substrates with 3'-overhangs, and requires the presence of DSS1. Unprocessed rRNA and mRNA accumulate in cells lacking degradosome activity, however, tRNA maturation is unaffected, indicating that this complex is not directly involved in RNA processing. Instead, the degradosome complex is likely part of the mitochondrial RNA surveillance system, which degrades aberrant and unprocessed RNAs. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
