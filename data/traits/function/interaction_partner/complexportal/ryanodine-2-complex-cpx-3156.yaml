identifier: ComplexPortal:CPX-3156
label: "Ryanodine 2 complex"
definition: >-
  A large homotetrameric intracellular calcium channel predominantly of the cardiac muscle that is crucial for excitation-contraction (E-C) coupling. Following the depolarization of the transverse tubule (T-tubule) membrane, RyR2 opening releases Ca2+ stored in the sarcoplasmic reticulum (SR) into the myoplasm. This increase of cytoplasmic Ca2+ triggers the interaction of actin and myosin that causes contraction of the cardiac muscle fibers. The E-C coupling in cardiac muscle involves RyR2 calcium release triggered by Ca2+ influx due to activation of the L-type calcium channel Cav1.2 (CPX-3195). RyR2 is required for heart development. Aberrant channel activation can lead to cardiac arrhythmia. RyR2 is also shown to play a role in beta cell survival in vitro. RyR2 physically interacts with various other proteins, small molecules and ions that modulate its activity: Low Ca+2 concentration activates RyR2, by binding to specific high-affinity Ca+2 sites. High Ca+2 concentration inhibits RyR2, by binding to less specific low-affinity Ca+2 sites. PKA binds to RyR2 altering the gating. S100A1 binding enhances the open probability of RyR2. ASPH and ATP stimulates RyR2 channel activity. Magnesium ions (Mg+2) inhibits the RyR2 channel activity. Homer-1c binding inhibits RyR2 channel opening. Calmodulin binding may inhibit open basal probability and alter the Ca-dependent activation of RyR2. FKBP binding is believed to physically stabilize the coordinated gating of the four RyRs in one RyR homotetramer and may be involved in the physical coupling between RyR tetramers. Binding to sorcin decreases open channel probability. CaMKIId binds and phosphorylates RyR2 strongly activating Ca2+ release during both diastole and systole. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
