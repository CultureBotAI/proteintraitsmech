identifier: ComplexPortal:CPX-2152
label: "UvrB pre-incision complex"
definition: >-
  Helicase that couples ATP binding and hydrolysis with domain motion to implement 5'->3' ssDNA translocase activity. The UvrB DNA pre‐incision complex is part of the UvrABC repair system that catalyzes the recognition and processing of DNA lesions. Upon binding of the UvrAB complex (CPX-2151) to a putative damaged site, the DNA wraps around one of the uvrB subunits. If a lesion is found the uvrA subunits dissociate and the UvrB-DNA preincision complex is formed. This complex is subsequently bound by uvrC (P0A8G0) and one of the UvrB monomers is released (CPX-2153). If no lesion is found, the DNA wraps around the other uvrB subunit that will check the other stand for damage. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
