identifier: ComplexPortal:CPX-1814
label: "R2TP co-chaperone complex"
definition: >-
  Co-chaperone that plays a role in box C/D snoRNP assembly/maintenance, especially under stress conditions. Also involved in the proper accumulation of box H/ACA small nucleolar RNAs. Regulates the stability of phosphatidylinositol 3-kinase-related protein kinases (PIKKs) such as TEL1 (P38110) and MEC1 (P38111), which are required for checkpoint signaling. Newly synthesized PIKK interacts with TEL2, in the TEL2–TTI1–TTI2 complex (CPX-1422), assisted by HSP90 (P02829). Phosphorylated TEl2 then mediates the interaction between PIKK and R2TP complex to eventually lead to the proper assembly of PIKK. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
