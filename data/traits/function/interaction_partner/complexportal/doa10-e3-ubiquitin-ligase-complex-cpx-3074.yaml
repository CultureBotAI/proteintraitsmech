identifier: ComplexPortal:CPX-3074
label: "Doa10 E3 ubiquitin ligase complex"
definition: >-
  Transmembrane E3 ubiquitin ligase complex involved in the endoplasmic reticulum-associated degradation (ERAD) pathway, directing misfolded proteins to proteasomal degradation. Required for ERAD-C subpathway which degrades proteins with misfolded cytoplasmic domains. The Doa10 core complex acts together with the E2 ubiquitin conjugating enzymes Ubc6 (P33296) and Cue1-Ubc7 (CPX-2948) and also the Cdc48p-Npl4p-Ufd1p AAA ATPase complex (CPX-2946). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
