identifier: ComplexPortal:CPX-9305
label: "Interleukin-17C complex"
definition: >-
  Member of the interleukin-17 (IL17) family which consists of six structurally related cytokines: IL17A (CPX-9301), IL17B (CPX-9302), IL17C (this complex), IL17D, IL25 (CPX-9306) and IL17F (CPX-9303) IL17C is predominantly produced by non-immune cells such as colonic and lung epithelial cells, keratinocytes and smooth muscle cells. IL17C production is up-regulated in pethelial cells at an early stage in several diseases. Unrestrained IL17C signalling is associated with autoimmune diseases and cancer progression, but it is also crucial for protection from fungal and bacterial infections such as Pseudomonas aeruginosa. IL17C is induced under hypoxic and hyperglycemic conditions and is thought to drive a pathogenic inflammatory response in kidney disease. IL17C may also be involved in the development of atherosclerosis, COPD and cystic fibrosis. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
