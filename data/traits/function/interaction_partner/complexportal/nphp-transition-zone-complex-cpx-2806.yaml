identifier: ComplexPortal:CPX-2806
label: "NPHP transition zone complex"
definition: >-
  Part of the transition zone, a barrier located at the base of cilia which separates the interior and exterior of cilia. The transition zone is characterized by Y-shaped structures that span from the axoneme to the ciliary membrane and comprises of the MKS and NPHP modules. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
