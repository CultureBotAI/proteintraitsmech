identifier: ComplexPortal:CPX-370
label: "Ribonucleoside-diphosphate reductase RR1 complex, RRM2 variant"
definition: >-
  Catalyzes the reduction of ribonucleotides to the corresponding deoxyribonucleotides, an essential step in the de novo synthesis of monomeric precursors for DNA replication and repair, while reducing either glutaredoxin (Q9QUH0/Q923X4) or thioredoxin (P10639). Supplies nucleotides for DNA replication during G1/S phase. The RRM1 subunit binds 2 Mg2+ ions and RRM2 contains a ferric iron-tyrosyl free radical center. The enzyme is allosterically regulated: stimulated by ATP and inhibited by dATP binding to the activity site on the RRM1 subunit. Possibly suppressed by DNA damage which primarily activates related RRM1-RRM2B complex (CPX-371) during G0/G1 and G2/M transitions. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
