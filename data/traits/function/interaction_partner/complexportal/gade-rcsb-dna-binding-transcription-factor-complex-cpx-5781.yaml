identifier: ComplexPortal:CPX-5781
label: "gadE-rcsB DNA-binding transcription factor complex"
definition: >-
  Transcription factor complex regulated independently of rcsB phosphorylation status. Required for survival in extreme acidic conditions, regulating expression of several genes involved in acid resistance.These include two glutamate decarboxylase isoforms, gadA and gadB, which consume intracellular protons in decarboxylating glutamate. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
