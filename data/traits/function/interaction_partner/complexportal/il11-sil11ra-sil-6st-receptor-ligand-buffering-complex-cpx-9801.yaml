identifier: ComplexPortal:CPX-9801
label: "IL11-sIL11RA-sIL-6ST receptor-ligand buffering complex"
definition: >-
  Antagonist cytokine-receptor complex that acts as a buffer to IL11 activity. IL11 binds to a soluble form of its specific receptor component, sIL11RA, and recruits a soluble form of IL6ST (sIL6ST) to form a complex which abrogates IL11-mediated trans-signalling. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
