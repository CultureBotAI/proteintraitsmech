identifier: ComplexPortal:CPX-4781
label: "Citrate lyase complex"
definition: >-
  An anaerobic citrate lyase transferase that also catalyzes the cleavage of citrate to acetate and oxaloacetate. The citrate molecule is very stable, and needs to be activated prior to cleavage by forming a thioester bond with the enzyme. The enzyme is a complex of three subunits, one of them a dedicated acyl carrier protein which is synthesized in an apo form, and is converted to its holo form by the covalent binding of a prosthetic S-acetyl-O-[2'-(5-phosphoribosyl)-3'-dephospho-CoA]-L-serine(3-) group, resulting in the formation of an inactive citrate-lyase. To be fully catalytically active, the SH-group of the enzyme-bound CoA-derivative is converted to an acetyl-thioester by a citrate lyase ligase (citC, P77390). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
