identifier: ComplexPortal:CPX-1636
label: "Protein geranylgeranyltransferase type II complex"
definition: >-
  Catalyzes the transfer of a 20-hydrocarbon geranyl-geranyl moiety from geranyl-geranyl pyrophosphate to a Rab protein having the C-terminal sequence -XXCC, -XCXC and -CCXX , where both cysteines may become modified. Requires both Zn2+ and Mg2+ for maximal activity. The Rab escort protein, MRS6, is the substrate-binding subunit (component A) of the complex which binds unprenylated Rab proteins and presents the substrate peptide to the catalytic component B. Component A is thought to be regenerated by transferring its prenylated Rab back to the donor membrane. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
