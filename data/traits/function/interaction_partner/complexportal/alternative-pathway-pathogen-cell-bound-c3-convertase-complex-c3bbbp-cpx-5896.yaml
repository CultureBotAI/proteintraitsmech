identifier: ComplexPortal:CPX-5896
label: "Alternative pathway pathogen cell-bound C3 convertase complex C3bBbP"
definition: >-
  A serine-type endopeptidase complex of the alternative pathway of complement activation of the innate immune system. Cleaves Complement C3 precurser (P01027) into anaphylatoxin C3A (P01027-PRO_0000005920) and nascent convertase core-component C3b (CPX-988). Only occurs bound to pathogen cells and binds to target cells via its reactive thioester moiety. Properdin-binding stablises C3bBb convertase (CPX-5894) and prevents its inactivation by Factor H (P06909). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
