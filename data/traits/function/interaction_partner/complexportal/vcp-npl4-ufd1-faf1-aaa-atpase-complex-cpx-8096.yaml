identifier: ComplexPortal:CPX-8096
label: "VCP-NPL4-UFD1-FAF1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. The complex targets proteins ubiquinylated on Lys-48 for degradation, including the DNA replication licensing factor CDT1 (Q9H211) thus enabling DNA replication fork progression and extracts topologically trapped DNA repair factor KU70/80 complex (CPX-1993) from DNA, specifically targeting XRCC5/KU80 (P13010). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
