label: "beta1-catenin - LEF1 complex"
definition: >-
  Transcription factor complex that activates Wnt responsive genes. Binds DNA in a sequence-specific manner. Repressed by TLE1 (Q04724), TLE2 (Q04725), TLE3 (Q04726) and TLE4 (Q04727). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
