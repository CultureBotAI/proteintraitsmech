identifier: ComplexPortal:CPX-1129
label: "Atk-1/Akt-2/Sgk-1 protein kinase complex"
definition: >-
  Serine/threonine protein kinase complex. Component of the daf-2 insulin receptor-like signalling cascade that controls daf-16-mediated gene expression. The forkhead transcription factor daf-16 regulates the expression of genes involved in metabolism, development, dauer formation, longevity and the response to stress. The complex functions downstream of pkd-1 in the signalling cascade to antagonize daf-16 by phosphorylation. The complex is activated by pdk-1 phosphorylation. The activated complex then controls the intracellular localisation and activation of daf-16. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
