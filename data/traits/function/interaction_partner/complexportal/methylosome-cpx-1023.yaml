identifier: ComplexPortal:CPX-1023
label: Methylosome
definition: >-
  The methylomose is a large protein complex (20S) that possesses arginine methyltransferase activity and modifies specific arginines to dimethylarginines in the arginine- and glycine-rich domains of several spliceosomal Sm proteins. This modification targets these proteins to the survival of motor neurons (SMN) complex for assembly into small nuclear ribonucleoprotein (snRNP) core particles. Binding to Chtop(Q9CY57) recruits the methylosome complex to selective sites on the chromosome, where it methylates Histone H4 Arg-3 and activates the transcription of cancer-related genes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
