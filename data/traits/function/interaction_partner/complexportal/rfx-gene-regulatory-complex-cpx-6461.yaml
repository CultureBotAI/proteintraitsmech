identifier: ComplexPortal:CPX-6461
label: "RFX gene regulatory complex"
definition: >-
  Regulates the transcription of major histocompatibility complex class II (MHC II) molecules, nucleating the assembly of cell-specific multi-protein complexes on the MHC II promoters. Specifically recognizes and binds to the X-box regulatory element present at the enhancer region of MHC II genes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
