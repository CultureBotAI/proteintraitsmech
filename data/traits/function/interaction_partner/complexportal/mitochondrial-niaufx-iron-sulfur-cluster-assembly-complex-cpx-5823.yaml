identifier: ComplexPortal:CPX-5823
label: "Mitochondrial NIAUFX iron-sulfur cluster assembly complex"
definition: >-
  Required for the de novo synthesis of iron-sulfur (Fe-S) clusters within mitochondria, which is required for maturation of both mitochondrial and cytoplasmic [2Fe-2S] and [4Fe-4S] proteins. NFS1 provides sulfur for Fe-S cluster assembly by cleaving this atom from the side chain of the substrate L-cysteine and storing it in the form of a persulfide. The Iscu scaffold protein performs the transient assembly of the 2Fe-2S cluster using persulfide sulfur and Fe(II). Electrons are provided by a mitochondrial ferredoxin, Fdx2. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
