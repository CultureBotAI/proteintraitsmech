identifier: ComplexPortal:CPX-936
label: "HOPS tethering complex"
definition: >-
  Multisubunit tethering complex involved in endo-lysosomal vesicle trafficking and lysosome biogenesis by cross-linking two membranes, and facilitating the formation of a SNARE complex during fusion. Required for the delivery of vacuolar proteins and homotypic fusion of vacuoles and controls the clearance of late endosomes and autophagosomes during heterophagy and autophagy through promoting fusion of these vesicles with the vacuole. Appears to instigate autophagosome-lysosome fusion by binding autophagosome associated Syx17 (Q9VZC9) and promoting assembly of a trans-SNARE complex Plays a role in crinophagy and eye pigment granule biogenesis. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
