identifier: ComplexPortal:CPX-3031
label: "Laminin-421 complex"
definition: >-
  Major component of basment membranes which binds to cells via a high affinity, cell-surface receptor. Role in the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. Implicated in the regulation of endothelial cell survival, as well as endothelial cell migration and adhesion, which occurs in association with the activation of the Rac1 small GTPase. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
