identifier: ComplexPortal:CPX-7963
label: "SCF E3 ubiquitin ligase complex, FBXO24 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO24 target proteins include the arginine methyltransferase PRMT6 (Q96LA8) and the nucleoside diphosphate kinase A (P15531) thus regulating cell proliferation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
