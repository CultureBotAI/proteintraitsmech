identifier: ComplexPortal:CPX-6701
label: "Dehydrodolichyl diphosphate synthase complex"
definition: >-
  A cis-prenyltransferase which catalyzes the rate-limiting step in the synthesis of glycosyl carrier lipids required for protein glycosylation in the lumen of endoplasmic reticulum. Essential for the synthesis of dolichol phosphate (CHEBI:23875), an indispensable lipid carrier for protein N-glycosylation, O-mannosylation, C-mannosylation, and GPI-anchor formation, catalyzing the formation of its precursor dehydrodolichyl diphosphate (ditrans,polycis-polyprenyl diphosphate(3-), CHEBI:136960), a long-chain isoprenoid, by chain elongation of farnesyl diphosphate (CHEBI:175763) via multiple condensations with isopentenyl pyrophosphate (CHEBI:128769). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
