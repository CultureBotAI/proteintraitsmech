identifier: ComplexPortal:CPX-9102
label: "Interleukin-7 mIL7R-IL2RG receptor-ligand signalling complex"
definition: >-
  Transmembrane complex formed on the binding of extracellular interleukin-7 (IL7) to its high-affinity receptor, IL7R and the shared IL2RG. Ligand binding results in the assembly of the complete complex, inducing the transphosphorylation of JAK1/JAK3 molecules as well as phosphorylation of the cytoplasmic tails of the receptors. STAT5 (P42229) monomers then bind to the phosphorylated site of the receptor and are phosphorylated by JAK1, while PIK3R associated with survival signalling, interacts with JAK3. Phosphorylated STATs dissociates from the receptors, dimerize and translocate into the nucleus where they induce the transcription of target genes. IL7 is a key regulator of immune homeostasis, critical for B cell development, and IL7 signalling is essential for the proliferation and survival of memory and naive T cells, as well as T cell development in the thymus. A potent immunomodulator of tumours, it has both the ability to eradicate tumours but also exert strong pro-tumour effects. There are two major isoforms of IL7R, the membrane-bound IL7R (mIL7R, P16871-1) and an alternatively spliced soluble IL7R (sIL7R, P16871-4) lacking the transmembrane region encoding exon 6 (CPX-493). Competition between mIL7R and sIL7R, which binds IL7 with greater affinity, diminishes STAT5 phosphorylation and therefore excessive signalling but increases overall bioavailability of the limited resource IL7. IL7 signalling contributes to autoimmunity and has been implicated as a cofactor in multiple sclerosis, autoimmune-related colitis, diabetes and lupus. IL7R associated insertion/deletion mutations have been linked to Philadelphia chromosome-like acute lymphoblastic leukemia (Ph-like ALL), a high-risk sub-type of B-ALL, as well as T-ALL. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
