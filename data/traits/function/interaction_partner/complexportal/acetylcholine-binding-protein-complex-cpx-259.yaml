identifier: ComplexPortal:CPX-259
label: "Acetylcholine binding protein complex"
definition: >-
  A protein complex released from perisynaptic astrocytes (a type of glial cell) into the synaptic cleft where it binds acetylcoline released from cholinergic presynapses suppressing cholinergic synaptic transmission. Release of AchBP balances the level of cholinergic neurotransmission. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
