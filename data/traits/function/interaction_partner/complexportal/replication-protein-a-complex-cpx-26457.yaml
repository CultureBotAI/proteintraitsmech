identifier: ComplexPortal:CPX-26457
label: "Replication protein A complex"
definition: >-
  Single-stranded DNA binding protein complex involved in all processes that involve single-stranded (ss)DNA by binding to and protecting exposed ssDNA from nucleases. Forms a physical platform to recruit other factors to the DNA including those involved in DNA damage signaling, DNA repair, and DNA replication. RPA protects against inappropriate telomere recombination, and upon telomere uncapping, prevents cell proliferation by a checkpoint-independent pathway. RPA prevents degradation of ssDNA and prevents formation of secondary structures. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
