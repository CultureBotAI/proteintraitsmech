identifier: ComplexPortal:CPX-2525
label: "MLXIP-MLX transcription factor complex"
definition: >-
  Transcriptional activator which recognizes an E box hexanucleotide DNA consensus sequence 5'-CACGTG-3' located within gene promoters. Regulates genes involved in glucose and glutamine metabolism. MondoA associates with the mitochondrial outer membrane, where it acts as a nutrient senor, binding glycolytic intermediates such as glucose 6-phosphate which trigger migration to the nucleus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
