identifier: ComplexPortal:CPX-1292
label: "REC102-REC104 meiotic recombination initiation complex"
definition: >-
  Required for the formation and repair of programmed DNA double-strand breaks (DSBs) catalyzed by SPO11 (Q22236) during meiotic recombination. May act to bridge the MER2-MEI4-REC114 complex (CPX-1809) with SPO11 and SKI8 (Q02793). Required for SPO11 nuclear localization, chromatin association, and binding to hot spots. Preferentially localizes to sites on the structural axis, where the series of loops (10-20kb) that pairs of sister chromatids organise into are anchored. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
