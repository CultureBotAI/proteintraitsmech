identifier: ComplexPortal:CPX-112
label: "LSM1-7-PAT1 complex"
definition: >-
  Lsm1-7-Pat1 is a complex conserved in all eukaryotes. It is an important part of cytoplasmic mRNA degradation. It preferentially binds oligo-adenylated (but not poly-A) mRNAs at their 3' end and promotes decapping at the 5' end thereby directing the mRNA for degradation through the 5' to 3' pathway. Lsm1-7-Pat1 complex might also be involved in protein-protein recognition in the nucleus in the context of the nuclear Lsm2-8 complex (CPX-44). A curated stable macromolecular complex (Complex Portal) with 8 subunits.
