identifier: ComplexPortal:CPX-600
label: "Cytoplasmic exosome complex, DIS3L-EXOSC10 variant"
definition: >-
  3' to 5' exoribonuclease complex that is involved in RNA maturation and degradation which include the removal of unstable and aberrant transcripts and may also regulate the levels of specific transcripts in response to environmental factors. Restricted to processing linear and circular single-stranded RNAs only. RNAs with complex secondary structures, particularly at the 3' end of the molecule, may have to be unwound or pre-processed by co-factors prior to entering the complex. Although some RNAs may be targeted directly to the catalytic subunits, the majority of substrates enter the barrel-like structure of the exosome through a pore at the centre of the cap and are threaded through the central channel in a 3' to 5' orientation. The exoribonuclease activity of the catalytic subunits facilitates the degradation process. A number of different exosome variants exist in the cell that are distinguished by the inclusion of their respective catalytic subunit(s): the main cytoplasmic exosome with DIS3L (CPX-592) or DIS3L and EXOSC10 (this complex), the main nuclear exosome with DIS3 and EXOSC10 (CPX-476), the nucleolar exosome with EXOSC10 (CPX-591) and a rare variant found in both, the nucleus and cytosol, (CPX-593). The cytoplasmic RNA exosome is involved in general mRNA turnover (esp of Polymerase III transcripts) and specifically degrades inherently unstable mRNAs containing AU-rich elements (AREs) within their 3' untranslated regions and cytoplasmic rRNAs that have undergone polyadenylation. Degrades mRNAs subject to RNA interference and is involved in the following mRNA decay pathways: mRNAs with prem-primature termination codons (PTCs; the nonsense mediated decay (NMD) pathway), ones lacking termination codons altogether (the non-stop decay (NSD) pathway) and ones where ribosomes stall (the no-go decay (NGD) pathway). Seems to be involved in degradation of histone mRNA. This cytoplasmic exosome variant is rare compared to the variant lacking the Exosc10 catalytic subunit (CPX-592). A curated stable macromolecular complex (Complex Portal) with 11 subunits.
