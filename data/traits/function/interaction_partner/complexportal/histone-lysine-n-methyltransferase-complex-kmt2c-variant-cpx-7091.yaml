identifier: ComplexPortal:CPX-7091
label: "Histone-lysine N-methyltransferase complex, KMT2C variant"
definition: >-
  Histone lysine methyltransferase complex which methylates lysine-4 on the histone H3 tail at important regulatory regions in the genome and thus modulates chromatin structures and DNA accessibility. Distinct H3K4 methylation states are recognized by chromatin reader modules leading to specific transcription outcomes. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
