identifier: ComplexPortal:CPX-26730
label: "Cdr2 medial cortical node complex"
definition: >-
  Acts to control cell division by regulating cell surface area and thus size-dependent control of entry into mitosis. Forms punctate structures (nodes) on the medial cortex to regulate the wee1 protein kinase which phosphorylates and inhibits Cdk1, preventing mitotic entry during interphase. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
