identifier: ComplexPortal:CPX-6464
label: "GET complex"
definition: >-
  Required for the post-translational delivery of tail-anchored (TA) proteins to the endoplasmic reticulum. GET1 and CAMLG (GET2) act as a membrane receptor for soluble GET3, which recognizes and selectively binds the transmembrane domain of TA proteins in the cytosol, delivered to it by the BAT3 transmembrane domain recognition complex (CPX-132). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
