identifier: ComplexPortal:CPX-583
label: "Trehalose-6-phosphate synthase/phosphatase complex, tsl1 variant"
definition: >-
  Catalyzes the production of trehalose from glucose-6-phosphate and UDP-glucose in a two step process. The Tps1 subunit is a trehalose-6-phosphate synthase (TPS) and catalyses the production of alpha,alpha-trehalose 6-phosphate from UDP-glucose and D-glucose 6-phosphate. Tps2 acts as a trehalose-6-phosphate phosphatase (TPP) to release trehalose as a final product. Tsl1 is a regulatory subunit and may act to stabilize the complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
