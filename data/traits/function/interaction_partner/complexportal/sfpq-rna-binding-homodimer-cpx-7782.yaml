identifier: ComplexPortal:CPX-7782
label: "SFPQ RNA-binding homodimer"
definition: >-
  RNA-binding complex which is a core component of paraspeckles, discrete subnuclear bodies in the interchromatin nucleoplasmic space, often located adjacent to nuclear specks. Biogenesis and structural integrity of paraspeckles mainly depend on the interaction of NONO, SFPQ, and PSPC1 homo/heterodimers with the long non-coding RNA nuclear-enriched autosomal non-coding transcripts (NEAT1). The complex plays a role in several nuclear processes, such as pre-mRNA splicing, DNA repair, and transcriptional regulation An excess of Zion ions, in conditions such as Alzheimer Disease, results in SFPQ oligermerisation and misloaction to the cytoplasm. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
