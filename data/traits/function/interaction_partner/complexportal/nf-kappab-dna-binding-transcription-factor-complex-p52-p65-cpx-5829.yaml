identifier: ComplexPortal:CPX-5829
label: "NF-kappaB DNA-binding transcription factor complex, p52/p65"
definition: >-
  Transcription factor that binds at kappa-B sites in the DNA of it target genes where it acts as a transcriptional activator. Present in almost all cell types and is the endpoint of a series of signal transduction events that are initiated by a vast array of stimuli related to many biological processes such as inflammation, immunity, differentiation, cell growth, tumorigenesis and apoptosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
