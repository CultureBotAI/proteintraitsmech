identifier: ComplexPortal:CPX-4231
label: "Gamma-secretase complex, APH1A-PSEN2 variant"
definition: >-
  Integral membrane aspartyl protease which performs the intramembrane cleavage of integral membrane proteins such as Notch receptors, clearing the anchors of type-I membrane proteins left in the membrane after shedding of their ectodomain. Cleaves proteins consisting of a single hydrophobic transmembrane helix and with a remaining ectodomain of limited length. Responsible for generating the carboxyl terminus of the amyloid beta-protein (Abeta) from the amyloid protein precursor, APP (P05067). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
