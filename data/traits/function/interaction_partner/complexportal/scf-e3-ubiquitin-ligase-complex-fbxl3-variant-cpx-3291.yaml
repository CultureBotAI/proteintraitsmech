identifier: ComplexPortal:CPX-3291
label: "SCF E3 ubiquitin ligase complex, FBXL3 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL3 target proteins include circadian rhythm proteins CRY1 (Q16526) and CRY2 (Q49AN0), thus maintaining circadian clock oscillations, and MYC (P01106) which controls cell proliferation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
