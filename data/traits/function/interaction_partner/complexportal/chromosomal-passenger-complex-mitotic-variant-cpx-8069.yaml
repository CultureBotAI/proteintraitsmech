identifier: ComplexPortal:CPX-8069
label: "Chromosomal passenger complex, mitotic variant"
definition: >-
  Serine/threonine kinase complex which ensures chromosome bi-orientation on the mitotic spindle during metaphase by phosphorylating multiple kinetochore components. It destabilizes monopolar attachments by phosphorylating key proteins at the kinetophore. The chromosomal passenger complex (CPC) regulates chromosome segregation and cytokinesis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
