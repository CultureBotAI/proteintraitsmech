identifier: ComplexPortal:CPX-2610
label: "Retromer complex"
definition: >-
  A coat complex that mediates the recycling of transmembrane proteins from endosomes to the trans-Golgi network. Snx3 and Snx6 have been implicated in lysosomal enzyme trafficking in larval fat body cells. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
