identifier: ComplexPortal:CPX-470
label: "L3MBTL1 complex"
definition: >-
  L3MBTL1 complex functions as a transcriptional repressor, by compacting chromatin in a manner that is strictly dependent on histone methylation marks, specifically H4K20me1/2 and Hb1K26me1/2. It also activates chromatin looping. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
