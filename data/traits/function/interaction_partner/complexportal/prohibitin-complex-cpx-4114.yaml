identifier: ComplexPortal:CPX-4114
label: "Prohibitin complex"
definition: >-
  Chaperone which is essential for mitochondrial biogenesis and degradation, and for the mitochondrial stress response. Functions to protect the cell from imbalances in the production of mitochondrial proteins by stabilizing newly synthesised mitochondrial-encoded proteins . Also acts as a scaffold that recruits membrane proteins to a specific lipid environment. Plays a role in longevity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
