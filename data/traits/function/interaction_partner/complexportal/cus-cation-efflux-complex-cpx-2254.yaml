identifier: ComplexPortal:CPX-2254
label: "Cus cation efflux complex"
definition: >-
  Transmembrane complex that mediates resistance to copper and silver by cation efflux directly from the cell using the proton-motive force. Spans the inner membrane, periplasm, and outer membrane. CusF delivers metal ions to the CusCBA tripartite efflux system in the periplasm, CusB then appears to deliver the bound metal ion from CusB to the three-methionine cluster (Met-573, Met-623 and Met-672) inside the periplasmic cleft of CusA from where it is passed into the central funnel of CusA and eventually the CusC channel for final extrusion. Primarily activated under anaerobic conditions by CusR (P0ACZ8) and CusS (P77485) but also expressed under extreme copper stress, in aerobic growth. Member of the heavy-metal efflux resistance-nodulation-cell division (HME-RND) superfamily. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
