identifier: ComplexPortal:CPX-105
label: "Mad-Max transcriptional repressor complex"
definition: >-
  Transcriptional repressor which recognizes an E box hexanucleotide DNA consensus sequence 5'-CACGTG-3' located within gene promoters. MXD family members contain a short conserved amino acid sequence, which directly interacts with the SIN3A (CPX-3443.CPX-3441) or SIN3B (CPX-3444) histone deacetylase co-repressor complexes which mediate gene silencing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
