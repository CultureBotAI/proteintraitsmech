identifier: ComplexPortal:CPX-1948
label: "dnaA-dps DNA replication initiation inhibitory complex"
definition: >-
  Complex formation reduces replication initiation on oriC under oxidative stress conditions, preventing DNA opening by dnaA thus allowing DNA repair to proceed prior to new rounds of replication. The incomplete blockage of replication initiation is thought to produce genetic variation in the bacterial population inhibits replication. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
