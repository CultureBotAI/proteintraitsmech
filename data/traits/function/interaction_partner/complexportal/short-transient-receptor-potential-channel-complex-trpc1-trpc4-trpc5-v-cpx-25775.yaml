identifier: ComplexPortal:CPX-25775
label: "Short transient receptor potential channel complex,TRPC1-TRPC4-TRPC5 variant"
definition: >-
  Non-selective, multimeric cation channel permeable by Na+ and Ca2+. Activators and modulators of channel activity may include endogenous and dietary lipids and metal ions such as Zn2+. Appear to play a role in a wide range of cellular processes that require calcium signaling. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
