identifier: ComplexPortal:CPX-393
label: "Phosphopantothenoylcysteine decarboxylase complex"
definition: >-
  Catalyses the third step of the coenzyme A (CoA) biosynthetic pathway, namely the decarboxylation of 4'-phosphopantothenoylcysteine to form 4′-phosphopantetheine. May potentially be part of a larger Coenzyme A-synthesizing protein complex (CPX-396) but this is not yet clear. The synthesis of CoA involves the phosphorylation of pantothenate (vitamin B5) to 4'-phosphopantothenate, to which a cysteine is then added to form 4'-phospho-N-pantothenoylcysteine (PCC). PPC is decarboxylated to 4'-phosphopantetheine by phosphopantothenoylcysteine decarboxylase (this complex). 4'-phosphopantetheine is adenylylated to form dephospho-CoA which is then phosphorylated to form coenzyme A. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
