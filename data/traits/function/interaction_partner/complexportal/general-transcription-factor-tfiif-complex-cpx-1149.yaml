identifier: ComplexPortal:CPX-1149
label: "General transcription factor TFIIF complex"
definition: >-
  General transcription factor that interacts with RNAPII and can recruit RNAPII to a preinitiation complex containing TFIID and TFIIB. Required for the opening of DNA, to allow transcription initiation. DNA opening occurs around the tip of the Pol II clamp and the TFIIE (CPX-1658) ‘extended winged helix’ domain. TFIIF and TFIIE bind open promoter DNA from opposite sides of the Pol II cleft. TFIIF adopts an extended induced structure that allows it to retain the upstream DNA–SPT15–TFIIB assembly on the wall and to bind the DNA bubble. TFIIF and TFIIE encircle and retain the DNA and TFIIE may then act to stabilize the open DNA structure. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
