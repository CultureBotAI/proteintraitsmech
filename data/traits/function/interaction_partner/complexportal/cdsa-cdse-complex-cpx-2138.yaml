identifier: ComplexPortal:CPX-2138
label: "cdsA-cdsE complex"
definition: >-
  Acts as a L-cysteine desulfurase and sufurtransferase. csdA desulfurases L-cysteine to produce L-alanine atomic sulfur (in the form of a persulfide). It transfers the sulfur to csdE which increases the cysteine desulfurase activity of csdA. csdE accepts the sulfur on Cys-61. While the csdE dimer can be isolated in vitro it is uncertain whether it also exists on its own in vivo. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
