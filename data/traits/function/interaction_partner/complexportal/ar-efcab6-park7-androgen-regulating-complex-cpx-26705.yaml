identifier: ComplexPortal:CPX-26705
label: "AR-EFCAB6-PARK7 androgen regulating complex"
definition: >-
  Dihydrotestosterone regulating complex. EFCAB6 directly interacts with both PARK7 and the androgen receptor (AR) in a testosterone-dependent manner, facilitating the formation of a ternary complex in cells. In prostate cells, AR activity can be repressed by EFCAB6, which acts as a regulatory partner. PARK7 modulates AR activity in a hormone-dependent manner by binding to EFCAB6, and forming a complex that relieves this repression, thereby enhancing AR transactivation. Physiologically, this interaction allows cells to fine-tune AR signalling in response to hormonal cues, balancing gene expression programs involved in growth, differentiation, and cellular homeostasis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
