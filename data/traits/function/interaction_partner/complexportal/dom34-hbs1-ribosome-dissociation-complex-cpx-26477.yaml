identifier: ComplexPortal:CPX-26477
label: "DOM34-HBS1 ribosome dissociation complex"
definition: >-
  Plays a role in RNA quality control in No-Go decay, releasing ribosomes that are stalled at the 3' end of mRNAs lacking a termination codon, promoting release of the nascent peptide or a tRNA-peptide conjugate, thus committing the remaining ribosome–mRNA complex to ribosome release or endonucleolytic cleavage Also mediates dissociation of inactive 80S ribosomes associated in a non-translating, inactive pool, for example following stress-induced global shut-down of translation. Binds to the ribosomal A site. GTP hydrolysis, dissociation of HBS1 and accommodation of DOM34 in the ribosome, results in the binding of RLI1 (O60102) followed by ATP-dependent subunit dissociation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
