identifier: ComplexPortal:CPX-117
label: "Glycoprotein Ib-IX-V-Filamin-A complex"
definition: >-
  The cytoplasmic domain of GPIBA of the GPIb-IX-V complex (CPX-114) binds to actin filaments through Filamin A. This may serve to anchor the complex and help it to withstand high shear stress and also enable communication with the actin cytoskeleton. The complex plays an important role in mediating the initial tethering and rolling of circulating platelets to a damaged blood vessel wall, for maintaining normal platelet integrity and shape and regulating platelet activation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
