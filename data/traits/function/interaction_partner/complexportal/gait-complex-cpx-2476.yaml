identifier: ComplexPortal:CPX-2476
label: "GAIT complex"
definition: >-
  Inhibits translation of mRNAs encoding inflammatory proteins, in particular chemokine and chemokine receptors, in myeloid cells in response to Interferon gamma. Binds to the GAIT element present in the 3' untranslated region of its target mRNAs, and inhibits translation at least in part by repressing the translation initiation factor eIF4G (Q04637/P78344/O43432}. An interaction between eIF4G and RPL13A blocks the 43S preinitiation complex and prevents translation initiation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
