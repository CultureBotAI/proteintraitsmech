identifier: ComplexPortal:CPX-2147
label: "Ire1 serine/threonine-protein kinase/endoribonuclease complex"
definition: >-
  Endoplasmic reticulum localized, type-I transmembrane homodimer which forms in response to the accumulation of unfolded protein in the ER and evokes the unfolded protein response (UPR) by splicing the mRNA encoding master transcriptional regulator of the UPR, HAC1 (P41546). IRE1 cleaves a single phosphodiester bond in each of two RNA hairpins (with non-specific base paired stems and loops of consensus sequence CNCNNGN, where N is any base) to remove an intervening intron from the target transcript. IRE1 auto-activates via transphosphorylation following binding of unfolded proteins to its N-termini. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
