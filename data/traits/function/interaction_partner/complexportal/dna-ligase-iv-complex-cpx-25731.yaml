identifier: ComplexPortal:CPX-25731
label: "DNA ligase IV complex"
definition: >-
  DNA ligase which catalyses the final ligation step in the non-homologous end-joining DNA repair pathway. Ligates DNA strands to restore the continuity of the chromosome in non-homologous end joining DNA double-strand break repair. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
