identifier: ComplexPortal:CPX-5122
label: "XdhABC xanthine dehydrogenase complex"
definition: >-
  Cytoplasmic xanthine dehydrogenase complex which uses NAD+ as terminal electron acceptor. Predominantly converts xanthine and hypoxanthine to uric acid and participates in limited purine salvage. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
