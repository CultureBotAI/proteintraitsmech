label: "TASL-SLC15A4, endolysosomal TLR signalling complex"
definition: >-
  Positive regulator of the innate immune response via toll-like receptor (TLR) activation to promote the induction of proinflammatory mediators and type I interferons; Complex formation results in the recruitment and activation of IRF5 (Q13568) downstream of endolysosomal toll-like receptors TLR7, TLR8 and TLR9. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
