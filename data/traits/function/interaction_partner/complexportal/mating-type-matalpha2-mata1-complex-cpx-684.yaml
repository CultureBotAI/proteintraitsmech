identifier: ComplexPortal:CPX-684
label: "Mating-type MATalpha2-MATa1 complex"
definition: >-
  Transcriptional repressor with a role in determining the three cell types of Saccharomyces cerevisiae: the a and alpha haploid cells and the a/alpha diploid cell type. Binds to a 21-base pair DNA sequence, the haploid-specific gene (hsg) operator, to repress transcription of haploid-specific genes and of MATALPHA1 (P0CY06). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
