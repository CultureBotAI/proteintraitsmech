identifier: ComplexPortal:CPX-1386
label: "Synapsis initiation complex"
definition: >-
  Forms at axial association sites, where the chromosomes are in close contact, and is required for polymerization of ZIP1 (P31111) along the lengths of chromosomes during synapsis, the pairing of two homologous chromosomes that occurs during meiosis. ZIP1 polymerization into oligomeric arrays of transverse filaments leads to the formation of the synaptonemal complex, a proteinaceous connection between homologous chromosomes which forms during meiotic prophase. The accumulation of the ZIP1 appears to require the SUMO E3 ligase activity of CST9. The complex may also promote MSH4-MSH5 complex (CPX-1704)-mediated crossovers, the exchange of genetic material between homologous chromosomes during meiosis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
