identifier: ComplexPortal:CPX-1059
label: "Sorf-1-Sorf-2 complex"
definition: >-
  Endosomal trafficking complex. The complex acts in conjunction with rab switching proteins to negatively regulate the levels of phosphatidylinositol 3-phosphate (PtdIns3P) to allow for the conversion of early endosomes into late endosomes. In addition, the complex recruits bec-1 to suppress phosphatidylinositol 3-kinase (PI3K) activity in order to negatively regulate endosomal PtdIns3P. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
