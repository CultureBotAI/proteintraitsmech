identifier: ComplexPortal:CPX-262
label: "VCP-NSFL1C AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Required for the monoubiquitylation of Golgi proteins during mitotic Golgi disassembly essential for postmitotic Golgi membrane fusion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
