identifier: ComplexPortal:CPX-5101
label: "Coagulation factor IXa complex"
definition: >-
  Part of the intrinsic blood coagulation pathway (contact activation pathway). When bound to factor VIIIa (Q06194) forms the intrinsic tenase complex that cleaves Arg-|-Ile bonds of factor X (O88947) by limited proteolysis to form active factor X (factor Xa) in the presence of vitamin K, Ca2+ ions, phospholipids and factor VII (P70375). The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form is activated by selective cleavage of Arg-|-Ala and Arg-|-Val bonds by limited proteolysis by factor XI (Q91Y47) to form active factor IXa. Factor VIIa-TF complex (CPX-279) also contributes to its activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
