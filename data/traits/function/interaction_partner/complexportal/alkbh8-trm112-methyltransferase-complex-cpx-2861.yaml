identifier: ComplexPortal:CPX-2861
label: "ALKBH8-TRM112 methyltransferase complex"
definition: >-
  S-adenosylmethionine-dependent methyltransferase which catalyzes tRNA methylation to generate 5-methylcarboxymethyl uridine (mcm5U) at the wobble position of certain tRNAs, a critical anticodon loop modification linked to DNA damage survival. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
