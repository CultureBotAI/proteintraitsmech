identifier: ComplexPortal:CPX-7727
label: "MINU1/2-associated SWI/SNF ATP-dependent chromatin remodeling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to promoters and enhancers of target genes in cells and alters chromatin structure by altering DNA-histone contacts within a nucleosome, leading eventually to a change in nucleosome position, thus facilitating or repressing binding of gene-specific transcription factors. The complex binds between the transcription start site flanking regions to the downstream intragenic region of protein-coding genes and contains one histone acetylation reader (BRD5) and two H3K4me3 readers (SHH2 and PMS2A/B. A curated stable macromolecular complex (Complex Portal) with 19 subunits.
