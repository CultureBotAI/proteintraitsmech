identifier: ComplexPortal:CPX-6024
label: "Interferon gamma complex"
definition: >-
  Cytokine secreted in response to infectious agents. Coordinates a diverse array of cellular programs through transcriptional regulation of immunologically relevant genes. Type II interferons exert their function through triggering the formation of a Receptor complex (CPX-6015). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
