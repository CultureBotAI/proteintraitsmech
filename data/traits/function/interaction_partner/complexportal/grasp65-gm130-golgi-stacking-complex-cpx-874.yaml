identifier: ComplexPortal:CPX-874
label: "GRASP65-GM130 Golgi stacking complex"
definition: >-
  Peripheral membrane complex that plays a key role in Golgi stacking. Each Golgi stack is formed by five to eight tightly aligned flattened cisternae, GRASP65-GM130 forms mitotically regulated trans-oligomers that act to hold adjacent Golgi cisternae into a stack, in particular the cis-Golgi network, which is close to the endoplasmic reticulum (ER) and receives the ER output. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
