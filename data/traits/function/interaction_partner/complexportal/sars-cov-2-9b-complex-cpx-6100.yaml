identifier: ComplexPortal:CPX-6100
label: "SARS-CoV-2 9b complex"
definition: >-
  Outer mitochondrial membrane-attached complex of SARS-CoV-2 coronavirus that triggers proteasome-mediated degradation of DNM1L (O00429) and the MAVS signalosome components MAVS, TRAF3, TRAF6 and TOM70. Although the precise mechanisms remain unknown, it leads to suppression of mitochondrial fission, triggers mitochondria elongation, decreases type I interferon signalling and triggers formation of autophagosomes. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
