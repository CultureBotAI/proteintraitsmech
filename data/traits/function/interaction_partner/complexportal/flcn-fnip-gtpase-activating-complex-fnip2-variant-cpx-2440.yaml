identifier: ComplexPortal:CPX-2440
label: "FLCN-FNIP GTPase-activating complex, FNIP2 variant"
definition: >-
  GTPase-activating complex which specifically stimulates GTP hydrolysis by RRAGC or RRAGD in the RAG guanosine triphosphatase complexes (CPX-2542, CPX-2513, CPX-2514, CPX-767) promoting the conversion to the GDP-bound state of RRAGC or RRAGD and thereby activating the kinase activity of mTORC1. Membrane sequestration of the FLCN-FNIP complex by GABARAP family members uncouples its regulation of RRAGC/RRAGD resulting in impaired substrate-specific mTOR-dependent phosphorylation of transcription factor TFE3 (P19532) and TFEB (P19484) which act as master regulators of lysosomal biogenesis, autophagy, lysosomal exocytosis, lipid catabolism, energy metabolism and immune response. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
