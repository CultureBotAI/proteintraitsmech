identifier: ComplexPortal:CPX-916
label: "TFTC histone acetylation complex"
definition: >-
  A chromatin-acetylating transcription coactivator with histone acetyltransferase activity. TFTC is a TBP (TATA binding protein) independent transcription initiation factor, able to nucleate RNA polymerase II transcription. It acetylates histone H3 in both a free and a nucleosomal context, but preferentially in nucleosomes assembled on UV-irradiated DNA, indicating that TFTC may also function as a facilitator of DNA repair. It interacts with the splicing factor Sf3b3 (Q921M3). The complex also has histone H2A and H2B deubiquitinase activity which counteracts heterochromatin silencing. May include TAF6L (Q8R2K4). Because of the similar subunit composition between the TFTC complex and the SAGA (also called STAGA) complex, it has been considered as the same complex in some publications (PMID:19114550, 25111486, 18206972, 15115762). A curated stable macromolecular complex (Complex Portal) with 17 subunits.
