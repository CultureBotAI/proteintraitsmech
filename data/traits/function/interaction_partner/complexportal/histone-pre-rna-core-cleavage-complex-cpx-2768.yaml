identifier: ComplexPortal:CPX-2768
label: "Histone pre-RNA core cleavage complex"
definition: >-
  Required for cotranscriptional 3' end processing of pre-mRNA.Maturation of histone pre-mRNAs only requires a single cleavage event between an upstream stem–loop mRNAs, and the histone downstream element. The complex is also component of two distinct complexes, the cleavage/polyadenylation complex and the histone pre-mRNA cleavage complex that processes nonpolyadenylated histone pre-mRNAs. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
