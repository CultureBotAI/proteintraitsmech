identifier: ComplexPortal:CPX-338
label: "VPS4A/B complex"
definition: >-
  An AAA-ATPase that is probably the main energy-providing system for the membrane deformation and abscission function of the ESCRT machinery. Required for the dissociation and recycling of ESCRT-III complex (CPX-329) subunits from vesicle and plasma membranes as well as the midbody during the final stages of cytokinesis where it causes constriction of the ESCRT-III polymer and fission of the associated membrane neck. Multiple disassembly reactions are performed until ESCRT-III dissociation has been completed. VPS4 ATPase activity is regulated by a) ESCRT-III interactions with VPS4 which enhance ATP hydrolysis by relieving autoinhibition of the AAA domain and b) binding of the VTA1 homodimers (Q9NP79) which both promotes VPS4 oligomerization and enhances ATP hydrolysis. Binding of ESCRT-III subunits CHMP1B (Q7LBR1) or CHMP5 (Q9NZZ3) to the amino-terminal of VTA1 relieves autoinhibition within VTA1 to further enhance stimulation of VPS4 ATP hydrolysis. Binding of IST1 (P53990) to VPS4 negatively regulates VPS4 activity by blocking binding to the ESCRT machinery. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
