identifier: ComplexPortal:CPX-4316
label: "Branched chain amino acid ABC transporter complex"
definition: >-
  High-affinity branched-chain amino acid transport system, catalysing the uptake of the branched chain amino acids: L-leucine, L-isoleucine and L-valine. livJ also interacts weakly with threonine, serine, and alanine. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
