identifier: ComplexPortal:CPX-384
label: "CBP3-CBP6 complex"
definition: >-
  Role in both the efficient synthesis of cytochrome b and protection of the newly synthesized protein from proteolysis. Associates with mitochondrial ribosomes at the polypeptide tunnel exit and is necessary for efficient translation of cytochrome b transcript. Also interacts directly with newly synthesized cytochrome b in an assembly intermediate that is not ribosome bound and coordinates cytochrome b synthesis with mitochondrial electron transport complex III (CPX-567) assembly. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
