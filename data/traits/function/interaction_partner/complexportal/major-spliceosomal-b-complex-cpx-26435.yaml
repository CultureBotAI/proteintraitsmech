identifier: ComplexPortal:CPX-26435
label: "Major Spliceosomal B complex"
definition: >-
  Spliceosomal B complex: a key intermediate assembly prior to becoming the catalytically activated B (B-act) complex. The spliceosome executes pre-mRNA splicing through a highly dynamic series of compositional and conformational transitions encompassing assembly, activation, catalysis and disassembly of a highly dynamic structure, involving the binding and release of the small nuclear RNAs (snRNA) and protein factors which remove intronic sequence from pre-mRNA. Spliceosome stages are characterized as E, A, B and remodelling of the pre-catalytic spliceosome (B complex) into the activated spliceosome (Bact complex) and subsequently, the catalytically activated C* spliceosome to carry out two RNA-catalysed transesterification reactions that lead to intron removal and splicing together of the flanking exon sequences. A curated stable macromolecular complex (Complex Portal) with 44 subunits.
