identifier: ComplexPortal:CPX-8740
label: "Cav1.1 voltage-gated calcium channel complex, CACNA2D2-CACNB1-CACNG1 variant"
definition: >-
  Voltage‐gated calcium channel which reacts to membrane depolarization by opening to allow Ca2+ to move down an electrochemical gradient. The L-type, high voltage-activated Cav1.1 channel is responsible for the excitation-contraction coupling that causes contraction of skeletal muscles in response to changes in membrane potential, relaying an excitatory depolarization in the T-tubular membrane to the calcium release channel in the sarcoplasmic membrane. The action potential-induced conformational changes of the complex activates the type 1 ryanodine receptor ( [RyR1: CPX-3135, RyR3: CPX-3162]), which releases Ca2+ from the sarcoplasmic reticulum, triggering muscle contraction. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
