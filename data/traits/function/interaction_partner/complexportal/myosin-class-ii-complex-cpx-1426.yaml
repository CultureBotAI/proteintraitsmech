identifier: ComplexPortal:CPX-1426
label: "Myosin class II complex"
definition: >-
  Building block of the class II myosin bipolar filament, responsible for the anti-parallel sliding of actin filaments. Plays a role in cell separation, appearing to form thick filaments that scaffold the assembly of the division machinery. The myosin heavy chain motor domain mediates the ATP-dependent interaction with the F-actin cytoskeleton. The myosin neck region with the bound light chains acts as a rigid lever arm that amplifies movements within the myosin motor domain into a large mechanical stroke that directionally propels the myosin along the actin filament. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
