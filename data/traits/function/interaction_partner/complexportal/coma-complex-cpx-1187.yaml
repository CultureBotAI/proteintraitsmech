identifier: ComplexPortal:CPX-1187
label: "COMA complex"
definition: >-
  Heterotetrameric subcomplex of a larger central kinetochore CTF19 complex (CPX-1156). COMA is part of a tridentate linker layer, which also contains the Ndc80 (CPX-548) and MIND (CPX-1186) complexes. Although the COMA, MIND, and Ndc80 complexes assemble independently, evidence suggests subsequent interactions. COMA is a platform onto which outer kinetochore proteins assemble, including microtubule-binding proteins. It is proposed to have a distinct function with respect to force generation and microtubule attachment. In the absence of COMA, there is bipolar binding without the generation of sufficient pulling force to cause centromere stretching and transient sister-chromatid separation. COMA requires CBF3 complex (CPX-1898) for assembly onto centromeric DNA. Different combinations of COMA subunits have been found, which may reflect the regulated steps in kinetochore assembly. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
