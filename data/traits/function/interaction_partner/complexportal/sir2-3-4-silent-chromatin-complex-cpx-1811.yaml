identifier: ComplexPortal:CPX-1811
label: "Sir2-3-4 silent chromatin complex"
definition: >-
  Required for transcriptional repression of the silent mating type loci, HML and HMR. Spreads from sites of nucleation by first deacetylating the H3 and H4 histone tails, and then binding stably to nucleosomes to silence promoters up to 3 kb from the telomeric repeat. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
