identifier: ComplexPortal:CPX-26611
label: "RNA decapping and exonuclease complex"
definition: >-
  Removes the 7-methyl guanine cap structure from mRNA molecules, yielding a 5'-phosphorylated mRNA fragment and 7m-GDP. Necessary for the degradation of mRNAs, both in normal mRNA turnover and in nonsense-mediated mRNA decay. The activity of this complex is tightly regulated to prevent premature degradation of the transcript. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
