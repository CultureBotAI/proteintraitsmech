identifier: ComplexPortal:CPX-6209
label: "Coagulation factor XIIa complex"
definition: >-
  A serine-type endopeptidase complex of the intrinsic blood coagulation pathway (contact activation pathway) whose formation in the plasma membrane initiates the blood coagulation process by initiating the cell-surface assembly and propagation of the coagulation protease cascade. Cleaves Arg-|-Ile bonds in factor VII (P08709) and factor XI (P03951) by limited proteolysis to form active factors VIIa (CPX-6211) and XIa (CPX-6205). Also activates prekallikrein (P03952) to form kallikrein (CPX-6234), angiotensinogins (P01019) to form angiotensins and kininogen (P01042) to form bradykinin (P01042-PRO_0000006688). The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form is activated by damaged cell surface and by limited proteolysis by thrombin (CPX-6222) and kallikrein (CPX-6234) to form active factor XIIa. Inhibited by SERPING1 (P05155), SERPINA1 (P01009) and SERPINE1 (P05121). Factor XII and kallikrein activate each other in a reciprocal reaction. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
