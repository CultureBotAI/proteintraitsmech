identifier: ComplexPortal:CPX-4263
label: "AcrAB-TolC multidrug efflux transport complex"
definition: >-
  Responsible for the transport of xenobiotics, such as drugs, out of the cell, in particular from the periplasm. Single-component efflux transporters remove toxic compounds from the cytoplasm to the periplasmic space where tolC-dependent transporters expel them from the cell. Capable of recognizing a wide range of dissimilar lipophilic and amphiphilic substrates that may differ in structure, size or electrical charge. These include beta-lactams, quinolones, tetracyclines, chloramphenicol and steroid hormones. Substrate specificity is conferred by a pair of large periplasmic loops containing more than 300 amino acid residues each. Member of the Resistance-Nodulation-Division (RND) family of efflux pumps. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
