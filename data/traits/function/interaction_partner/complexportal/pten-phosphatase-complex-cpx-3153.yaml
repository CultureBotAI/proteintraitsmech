identifier: ComplexPortal:CPX-3153
label: "PTEN phosphatase complex"
definition: >-
  PTEN is a phospholipid phosphatase, catalyzing the hydrolysis of the second messenger PtdIns (3,4,5)P3. Will also dephosphorylate PtdIns(3,4)P2, PtdIns3P, and Ins(1,3,4,5)P4. Dimerization is critical for its lipid phosphatase function. Antagonizes the PI3K-AKT/PKB signaling pathway by dephosphorylating phosphoinositides and thus modulates cell cycle progression and cell survival. Also active as a dual-specificity protein phosphatase dephosphorylating tyrosine-, serine- and threonine-phosphorylated proteins but it is not yet clear if the enzyme is dimeric or monomeric for this activity. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
