identifier: ComplexPortal:CPX-2653
label: "SNIP1/SkIP associated RNA-processing complex"
definition: >-
  Role in RNA processing and transcription, potentially by controlling mRNA stability. Recruited to both the 3' end of the Cyclin D1 (P24385) gene and to Cyclin D1 RNA and plays a role in Cyclin D1 expression and thus cell proliferation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
