identifier: ComplexPortal:CPX-7321
label: "Crotoxin complex, aCA1/2/4-bCA1-CBa variant"
definition: >-
  Class II, beta-neurotoxin, composed of an acidic, non-toxic and non-enzymatic subunit (CA), and a basic, weakly toxic, phospholipase A2 protein (CB). The neurotoxin causes paralysis by both pre- and postsynaptic blocking of acetylcholine signalling. The CA subunit increases the lethal potency of the uncomplexed CB subunit by enabling the toxin to reach the specific protein crotoxin receptor at the neuromuscular junction. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
