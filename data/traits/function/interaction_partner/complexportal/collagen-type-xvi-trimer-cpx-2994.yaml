identifier: ComplexPortal:CPX-2994
label: "Collagen type XVI trimer"
definition: >-
  Fibril-associated collagen with interrupted triple helices (FACIT) found in association with fibril-forming collagens such as type I and II, and serve to maintain the integrity of the extracellular matrix. Involved in mediating cell attachment and inducing integrin-mediated cellular reactions, such as cell spreading and alterations in cell morphology. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
