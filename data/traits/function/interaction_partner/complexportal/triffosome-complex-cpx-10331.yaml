identifier: ComplexPortal:CPX-10331
label: "Triffosome complex"
definition: >-
  Supramolecular organizing centre (SMOC) thought to assemble in the endosome in response to activated TLR4(O00206) and TLR3(O15455) to facilitate the inducible expression of inflammatory genes. The triffosome is considered to complement myddosome (CPX-10281) activity, through an IRAK4 (Q9NWZ3) scaffold. Activates TRAF6 (Q9Y4K3) leading to prolonged NFKB1 and AP1 activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
