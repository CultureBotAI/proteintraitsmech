identifier: ComplexPortal:CPX-400
label: "Bub-1-Bub-3 complex"
definition: >-
  Present throughout the cell cycle, this complex promotes spindle assembly checkpoint signalling. The spindle checkpoint ensures accurate chromosome segregation by sending a signal from an unattached kinetochore to inhibit anaphase onset. Localises to the kinetochore region of mitotic chromosomes to promote the onset of anaphase in a fashion that is independent of its function in spindle assembly checkpoint signalling and chromosome alignment. The complex also recruits other spindle components to the kinetochore region. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
