identifier: ComplexPortal:CPX-389
label: "Interleukin-23-receptor complex"
definition: >-
  Receptor complex that activates and stimulates proliferation of a wide range of lymphocytes, in particular memory T cells and Th17 cells. The IL23 ligand complex (CPX-3293) binds the receptors chains Il12rb1 and Il23r which are associated with the kinases Tyk2 and Jak2, respectively. Transphosphorylation of Il23r and the JAK-family kinases initiates the JAK-STAT signaling cascade via phosphorylation and heterodimerisation of STAT3 and STAT4 (P42227/P42228). This ultimately leads to the activation of transcription of interferon-gamma or Interleukin-17. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
