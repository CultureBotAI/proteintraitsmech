identifier: ComplexPortal:CPX-2392
label: "U1 small nuclear ribonucleoprotein complex"
definition: >-
  Recognizes the 5' splice site within precursor messenger RNAs and initiates the assembly of the spliceosome. U1 snRNP interacts with the pre-mRNA, via base-pairing between the 5' end of U1 snRNA and the 5' splice site in pre-mRNA. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
