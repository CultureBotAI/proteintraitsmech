identifier: ComplexPortal:CPX-2892
label: "PDGF receptor alpha-beta - PDGF-AB complex"
definition: >-
  Platelet-derived growth factor (PDGF) receptors alpha and beta (PDGFRalpha-beta) that are activated by their bound ligand, PDGF-AB. PDGFRalpha-beta is a tyrosine-protein kinase that acts as a cell-surface receptor for PDGF-AB, and its related C- and D-chains, PDGFC (Q9NRA1) and PDGFD (Q9GZP0). It autophosphorylates on multiple tyrosines upon ligand binding initiating several signalling cascades and phosphorylation of downstream targets. Growth factor that plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Potent mitogen for cells of mesenchymal origin. Required for normal proliferation and recruitment of pericytes and vascular smooth muscle cells in the central nervous system, skin, lung, heart and placenta. Required for normal blood vessel development, and for normal development of kidney glomeruli. Plays an important role in wound healing. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
