identifier: ComplexPortal:CPX-2665
label: "CASTOR1 arginine-sensing complex"
definition: >-
  Binds arginine, leading to the disruption of the interaction between CASTOR1 and the GATOR2 complex (CPX-6227), allowing GATOR2 to plays its role as a positive regulator of the mTORC1 pathway. In the absence of arginine, interacts with GATOR2 to negatively regulate mTORC1 activity. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
