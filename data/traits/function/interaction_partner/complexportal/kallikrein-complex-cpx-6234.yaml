identifier: ComplexPortal:CPX-6234
label: "Kallikrein complex"
definition: >-
  A serine-type endopeptidase complex of the intrinsic blood coagulation pathway (contact activation pathway). Activates factor XII (P00748) to form active factor XIIa (CPX-6209) after its binding to a negatively charged surface. Cleaves Arg-|-Xaa and Lys-|-Xaa bonds, including Lys-|-Arg and Arg-|-Ser bonds in HMW kininogen-1 (P01042) by limited proteolysis to release bradykinin (P01042-PRO_0000006688). May also play a role in the renin-angiotensin system by converting prorenin (P00797) into renin (P00797-PRO_0000026082). The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form, prekallikrein, is activated, in a reciprocal reaction, by limited proteolysis by factor XIIa to form active kallikrein. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
