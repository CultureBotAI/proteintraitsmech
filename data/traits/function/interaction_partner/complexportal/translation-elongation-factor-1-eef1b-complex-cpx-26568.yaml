identifier: ComplexPortal:CPX-26568
label: "Translation elongation factor 1, eEF1B complex"
definition: >-
  Plays a key role in protein biosynthesis through the delivery of aminoacylated-tRNA (aa-tRNA) to а corresponding codon of the mRNA-programmed ribosome. The eEF1 family of translation elongation factors is comprised of the two variants of eEF1A (EEF1A1 and EEF1A2 (Q05639)), and the eEF1B complex (this complex). EEF1A1 (CPX-26572) and EEF1A2 (CPX-26573) transfer aa-tRNA from aa-tRNA synthetase to the ribosome, and then a deacylated tRNA back to aa-tRNA synthetase. EEF1B2 and EEF1D stimulate the exchange of GDP bound to eEF1A to GTP. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
