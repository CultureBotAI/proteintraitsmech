identifier: ComplexPortal:CPX-6132
label: "TIM8B-TIM13 mitochondrial intermembrane space protein transporter complex"
definition: >-
  Facilitates transport of hydrophobic precursors of a distinct subgroup of inner membrane proteins through the aqueous intermembrane space as they exit the TOM40 channel complex (CPX-6121) in the outer membrane. Functions as a chaperone to maintain the hydrophobic membrane proteins in an import competent state and escorts substrates to the TIM22 insertion complex (CPX-6124), which mediates protein insertion into the membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
