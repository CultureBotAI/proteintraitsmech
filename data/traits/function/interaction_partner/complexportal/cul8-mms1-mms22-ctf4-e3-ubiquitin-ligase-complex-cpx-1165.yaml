identifier: ComplexPortal:CPX-1165
label: "CUL8-MMS1-MMS22-CTF4 E3 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex required for the ubiquition of acetylated histone H3, thus facilitating nucleosome assembly during replication and promoting replication progression during S-phase. CTF4 is a component of the replisome, and may retain the CUL8 complex at a stalled replication fork. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
