identifier: ComplexPortal:CPX-2339
label: "MKS complex"
definition: >-
  Plays a key role in establishing the ciliary transition zone (TZ), a structure found at the cilia base. Organises the TZ Y-shaped links which act as part of a selective barrier that prevents diffusion of proteins between the ciliary cytoplasm and cellular cytoplasm and between the ciliary membrane and plasma membrane. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
