identifier: ComplexPortal:CPX-5906
label: "CcdB-poisoned gyrase complex"
definition: >-
  Prevents the formation of the GyrA-GyrB DNA Gyrase complex (CPX-2177) by both inhibiting free gyrase and stabilizing covalent gyrase:DNA intermediates in a conformation such that the gyrase A subunit is covalently closed to the cleaved DNA. This results in DNA strand breakage, inhibition of cell proliferation and cell death. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
