identifier: ComplexPortal:CPX-3601
label: "TGA2 complex"
definition: >-
  Transcriptional repressor complex binding to the cognate DNA sequence TGACG of the promoter region of the PR-1 gene and represses its expression both in the absence and in the presence of salicylic acid (SA). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
