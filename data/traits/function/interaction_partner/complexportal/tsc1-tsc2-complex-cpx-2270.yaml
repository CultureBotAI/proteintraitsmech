identifier: ComplexPortal:CPX-2270
label: "TSC1-TSC2 complex"
definition: >-
  Acts as a GTPase-activating protein (GAP) for the small GTPase RHEB (Q9VND8) thus negatively regulating Tor (Q9VK45) signaling. TBC1d7 has been shown to interact with Tsc1 in drosophila and may act to stabilize the complex but does not appear to itself regulate Tor, instead affecting growth through insulin-related pathways. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
