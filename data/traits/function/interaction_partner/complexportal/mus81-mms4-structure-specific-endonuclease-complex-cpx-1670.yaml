identifier: ComplexPortal:CPX-1670
label: "MUS81-MMS4 structure-specific endonuclease complex"
definition: >-
  Structure-specific endonuclease that plays an important role in rescuing stalled replication forks and resolving the mitotic recombination intermediates. Has a substrate preference for branched DNA structures with a 5-prime end at the branch nick with cleavage probably occurring approximately half a helical turn upstream of the free 5-prime end. Resolves the four-way Holliday junction (HJ) in which the two recombining DNAs are covalently-linked junctions in crossover formation during meiotic recombination, however, its ability to cut intact HJs was found to be very limited in comparison with other structures, suggesting that a HJ precursor (such as a nicked HJ) might be its preferred DNA substrate. In mitotic cells, the activity of MUS81-MMS4 is low during S-phase, but phosphorylation of the MMS4 leads to complex activation at the onset of mitosis by the collaborative actions of two cell cycle kinases: CDC28 (P00546) and CDC5 (P32562). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
