identifier: ComplexPortal:CPX-2141
label: "iscS-iscU iron-sulfur cluster assembly complex"
definition: >-
  Involved in the sulfur transfer during iron-sulfur cluster assembly. iscU forms a scaffold for sequential cluster assembly of first one [2Fe-2S]2+ cluster is observed that first first to a form containing two [2Fe-2S]2+ clusters and finally to a form that contains one [4Fe-4S]2+ cluster. iscA transfers sulfur to iscU while the latter is in the D-state, a partly disordered state that contains an ordered domain that stabilizes two cis peptidyl-prolyl peptide bonds. After Fe-S cluster formation on IscU, IscU converts to the S-state, which has a lower affinity for IscS and minimizes product inhibition. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
