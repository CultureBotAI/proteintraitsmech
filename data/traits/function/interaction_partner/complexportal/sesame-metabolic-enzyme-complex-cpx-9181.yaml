identifier: ComplexPortal:CPX-9181
label: "SESAME metabolic enzyme complex"
definition: >-
  Multi-enzyme complex which regulates the crosstalk between Histone H3 (HHt1/HHT2, P61830) methylation and phosphorylation by sensing glycolysis and glucose-derived serine metabolism. This leads to auto-regulation of the expression of the PYK1 pyruvate kinase. Complex activity is stimulated by glycolysis and serine metabolism to repress gene expression and confer cell resistance to oxidative stress. In the presence of sufficient glucose, PYK1 is activated, and SET1 (P38827) is recruited at the promoter of PYK1 by active RNA polymerase II. PYK1 phosphorylates Thr-12 of histone H3 using phosphoenolpyruvate as a substrate, while serine biosynthetic enzymes in SESAME generate serine from 3-phosphoglyceric acid to stimulate this phosphorylation. The COMPASS complex (CPX-1039) then recruits SESAME to the PYK1 coding region, allowing COMPASS to utilize SAM synthesized by SESAME to methylate H3 Lys-5. This interaction with COMPASS promotes SESAME recruitment, which phosphorylates H3 Thr-12 at the gene body and suppresses PYK1 transcription. The acetyl-coenzyme A synthetase ACS2 is required for the regulation of telomere silencing and cellular senescence. SESAME interacts with the SAS histone acetyltransferase complex (CPX-777) to promote histone H4 (HHF1/ HHF2) Lys-17 acetylation and the occupancy of the transcription factor , BDF1 (P35817), at subtelomeric regions. This interaction maintains telomere silencing by antagonizing the spreading of SIR2 (P06700) histone deacetylase along the telomeres, which is enhanced by acetate. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
