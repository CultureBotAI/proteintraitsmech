identifier: ComplexPortal:CPX-21210
label: "Methyltransferase complex, METTL3-METTL14"
definition: >-
  N6-methyltransferase complex. Mediates methylation of adenosine residues at the N6 position of some RNAs inside mammalian cells, an event considered as an epitranscriptomic and post-transcriptional regulatory mark. N6-methyladenosine (m6A) modification regulates various biological processes such as the circadian clock, differentiation of embryonic and hematopoietic stem cells, cortical neurogenesis, differentiation of T-cells and primary miRNA processing, and the regulation of DNA damage response (DDR) and genomic stability. Dysregulated m6A modification and m6A-associated proteins play a complex and contradicting role in driving tumorigenesis and cancer progression. METTL3-METTL14 has also been implicated in musculoskeletal diseases in both an m6A-dependent or independent manner. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
