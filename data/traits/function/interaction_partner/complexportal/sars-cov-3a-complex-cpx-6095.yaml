identifier: ComplexPortal:CPX-6095
label: "SARS-CoV 3a complex"
definition: >-
  Outward rectifier potassium channel complex of SARS-CoV coronavirus that is also sensitive to calcium. May modulate virus release. Up-regulates expression of fibrinogen subunits FGA (P02671), FGB (P02675) and FGG (P02679) in host lung epithelial cells. Downregulates the type 1 interferon receptor by inducing serine phosphorylation within the IFN alpha-receptor subunit 1 (IFNAR1, P17181) degradation motif and increasing IFNAR1 ubiquitination. Induces NLRP3 inflammasome (CPX-4141) activation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
