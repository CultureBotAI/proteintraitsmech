identifier: ComplexPortal:CPX-1978
label: "Enzyme IIA-maltose transport inhibitory complex"
definition: >-
  Binding of enzyme IIA (EIIA-Glc), a component of the glucose-specific phosphotransferase system, inhibits maltose transport from the periplasm to the cytoplasm. Two molecules of EIIA-Glc each bind allosterically to both subunits of MalK thereby fastening the maltose transporter in the open, inward-facing conformation which prevents the binding of maltose-loaded maltose binding protein MBP (MalE) (CPX-1932). Only the non-phosphorylated form of enzyme IIA functions as a maltose uptake inhibitor. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
