identifier: ComplexPortal:CPX-2149
label: "Thioredoxin reductase complex"
definition: >-
  Catalyses the reversible reduction and reoxidation of NADP+ and thioredoxin to NADPH and thioredoxin disulfide. In this process, the dithiol-disulfide residues in the active site of TrxR and the flavin adenine dinucleotide (FAD) cofactor are also reduced and reoxidised. Reduced thioredoxin is a reductant for ribonucleotide reductase and an activator of T7 DNA polymerase. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
