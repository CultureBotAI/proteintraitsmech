identifier: ComplexPortal:CPX-24049
label: "TP63-TP73, transcription regulatory complex"
definition: >-
  Sequence specific DNA binding transcriptional regulator complex. Contributes to maintaining tissue integrity, cell differentiation, and genomic stability. Acts as a tumour‑suppressing regulator, controlling transcription of genes linked to DNA repair, survival, differentiation and stem/progenitor cell maintenance. This complex or its isoforms may engage in skin/epidermal repair. Under certain contexts it can activate some TP53‑target genes including CDKN1A (P38936), BAX (Q07812) and BBC3 (Q9BXH1). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
