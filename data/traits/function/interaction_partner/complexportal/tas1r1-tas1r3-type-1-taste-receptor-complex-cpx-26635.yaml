identifier: ComplexPortal:CPX-26635
label: "TAS1R1-TAS1R3 type 1 taste receptor complex"
definition: >-
  A class C G-protein-coupled receptor (GPCR) heterodimer which senses umami taste stimulus (the taste of monosodium glutamate). The receptor is expressed in specialized taste receptor cells in the taste bud and signal primarily through the G-alpha subunit of gustducin (GNAT3, GNB1, GNG13), initiating downstream physiological responses. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
