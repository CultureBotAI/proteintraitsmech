identifier: ComplexPortal:CPX-9262
label: "USP46 deubiquitinase complex"
definition: >-
  Deubiquitinase complex responsible for the removal of ubiquitin chains from proteins. The complex appears to play a role in increasing the low-density lipoprotein receptor-related protein arr/LRP6 (Q95V09) stability and therefore protein levels at the cell surface, enhancing the sensitivity of cells to Wingless (P09615) stimulation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
