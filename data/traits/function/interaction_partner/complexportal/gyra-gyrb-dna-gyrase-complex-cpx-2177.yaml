identifier: ComplexPortal:CPX-2177
label: "GyrA-GyrB DNA Gyrase complex"
definition: >-
  A DNA gyrase of type IIA topoisomerase that negatively supercoils closed circular double-stranded DNA in an ATP-dependent manner and also catalyzes the interconversion of other topological isomers of double-stranded DNA rings, including catenanes and knotted rings. It alters DNA topology by effecting a transient double-strand break in the DNA backbone, cleaving both strands and passing the double helix through 3 pairs of N-gates formed by ATPase domains of the gyrB subunit and resealing the gaps. It facilitates DNA melting at oriC in order for replication initiation to take place. DNA Gyrase also removes the left-handed positive supercoiling generated in front of moving replication forks. Structure-guided deletion of a 170-amino acid insertion (Thr565 - Arg731) in gyrB greatly reduces the DNA binding, supercoiling and DNA-stimulated ATPase activities of gyrase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
