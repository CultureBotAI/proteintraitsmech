identifier: ComplexPortal:CPX-6269
label: "tRNA (adenine(58)-N(1))-methyltransferase complex"
definition: >-
  Methyltransferase complex which post-transcriptionally modifies initiator methionyl-tRNA by catalyzing the transfer of a methyl group from the cofactor S-adenosyl-l-methionine (CHEBI:67040) to N1 of adenine 58 to give 1-methyladenosine (m1A58). Also catalyses this modification at low levels in the tRNA-like T-loop-like structures of a small subset of mRNAs. This disrupts Watson–Crick base pairing at internal sites of mRNAs and may result in translational repression. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
