identifier: ComplexPortal:CPX-2935
label: "RAD6-UBR2 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex. May act in a quality control pathway for proteins synthesized on cytosolic ribosomes. UBR2 is a paralog of UBR1 (P19812) but lacks the conserved sequence motifs required for N-end rule degradation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
