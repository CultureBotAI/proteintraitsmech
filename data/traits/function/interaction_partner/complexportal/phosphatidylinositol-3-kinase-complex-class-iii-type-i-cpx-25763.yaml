label: "Phosphatidylinositol 3-kinase complex, class III, type I"
definition: >-
  A phosphatidylinositol 3-kinase complex that specifically phosphorylates 1-phosphatidyl-1D-myo-inositol(1-) (CHEBI:57880) in an ATP- and Mn(2+)-dependent manner. Functions in autophagy. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
