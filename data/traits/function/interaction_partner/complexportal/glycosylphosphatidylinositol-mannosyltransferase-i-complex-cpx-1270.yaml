identifier: ComplexPortal:CPX-1270
label: "Glycosylphosphatidylinositol-mannosyltransferase I complex"
definition: >-
  Mannosyltransferase complex responsible for the transfer of the first alpha-1,4-mannose to the glycosylphosphatidylinositol (GPI) during GPI precursor assembly. GPI is a complex glycolipid with a core structure, phosphoethanolamine-6-mannose-alpha1,2-mannose-alpha1,6-mannose-alpha1,4-glucosamine-alpha1,6-inositol-phospholipid that functions as a membrane anchor for many cell surface proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
