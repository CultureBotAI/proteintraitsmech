identifier: ComplexPortal:CPX-5302
label: "39S mitochondrial large ribosomal subunit"
definition: >-
  Component of the ribosome, the site of protein biosynthesis resulting from translation of messenger RNA (mRNA). Responsible for the catalytic activity of the ribosome, the peptidyltransferase activity required to catalyze peptide bond formation. The mitochondrial ribosome (mitoribosome) is responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. All proteins synthesized by mouse mitoribosomes are hydrophobic, integral membrane proteins and some require prosthetic groups for folding and functioning. The mitoribosomes are tethered to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. The inner membrane protein Mrpl45 aligns the mitochondrial peptide exit tunnel with the membrane insertion machinery and supports the transfer of the mitochondrial nascent peptides towards the membrane. A curated stable macromolecular complex (Complex Portal) with 53 subunits.
definition_source: Complex Portal
