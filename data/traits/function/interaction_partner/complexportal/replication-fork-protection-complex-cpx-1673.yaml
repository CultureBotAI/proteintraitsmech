identifier: ComplexPortal:CPX-1673
label: "Replication fork protection complex"
definition: >-
  Required for chromosome segregation during meiosis and DNA damage repair. Acts at the intra-S-phase checkpoint pathway to stabilize stalled replication forks by maintaining the replisome at the arrested sites. Coordinates leading and lagging strand synthesis and moves with the replication fork, transfering cohesin from the front of the fork to the newly synthesized DNA. Stabilizes replication forks in a configuration that is recognized by replication checkpoint sensors and protects stalled replication forks against the fork-releasing activity of RRM3 helicase. The complex recruits the checkpoint mediator MRC1 (P25588) to the replisome to perform its checkpoint function. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
