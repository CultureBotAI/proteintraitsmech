identifier: ComplexPortal:CPX-1693
label: "CLG1-PHO85 kinase complex"
definition: >-
  Cyclin-dependent protein kinase with a role in cell integrity and polarized cell growth. Phosphorylates the chaperone protein SSA1 (P10591), a chaperone that is essential for protection of the cyclin CLN3 (P13365), essential for the control of the cell cycle at the G1/S (start) transition, from the degradation machinery. Acts to positively regulate autophagy through promoting the degradation of SIC1, a negative regulator of autophagy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
