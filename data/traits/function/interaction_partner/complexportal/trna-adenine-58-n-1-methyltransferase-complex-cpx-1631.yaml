identifier: ComplexPortal:CPX-1631
label: "tRNA (adenine(58)-N(1))-methyltransferase complex"
definition: >-
  Catalyzes the transfer of a methyl group from the cofactor S-adenosyl-l-methionine (CHEBI:67040) to N1 of adenine-58 to give 1-methyladenosine (m1A58) in initiator methionyl-tRNA. This is required for maintaining the stability of the initiator methionine tRNAiMet. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
