identifier: ComplexPortal:CPX-3039
label: "PMT4 dolichyl-phosphate-mannose-protein mannosyltransferase complex"
definition: >-
  Initiates protein O-mannosylation by catalyzing the transfer of a mannosyl residue from dolichol-phosphate-beta-D-Mannose to Ser and Thr residues of proteins in an alpha-D-mannosidic linkage. O-mannosyl glycans are important for the stability, localization and/or function of various secretory and membrane proteins and hence cell wall integrity. Acts on membrane-bound proteins. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
