identifier: ComplexPortal:CPX-5225
label: "28S mitochondrial small ribosomal subunit"
definition: >-
  Component of the ribosome, the site of protein biosynthesis resulting from translation of messenger RNA (mRNA). Responsible for the catalytic activity of the ribosome, the peptidyltransferase activity required to catalyze peptide bond formation. The mitochondrial ribosome (mitoribosome) is responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. All proteins synthesized by human mitoribosomes are hydrophobic, integral membrane proteins and some require prosthetic groups for folding and functioning. The mitoribosomes are tethered to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. The inner membrane protein MRPL45 aligns the mitochondrial peptide exit tunnel with the membrane insertion machinery and supports the transfer of the mitochondrial nascent peptides towards the membrane. The mt-SSU binds mRNA, is involved in accurate initiation and decoding, and undergoes large-scale conformational changes during the elongation cycle. Mutations in mitochondrial ribosome subunits have been found associated to cardiomyopathies, developmental abnormalities, cancer and hearing loss (ototoxicity). A curated stable macromolecular complex (Complex Portal) with 31 subunits.
