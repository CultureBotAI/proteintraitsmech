identifier: ComplexPortal:CPX-10341
label: "Interleukin-36G receptor ligand complex"
definition: >-
  Proinflammatory cytokine-receptor complex involved in immune cell activation, driving T helper 1 responses, and inducing inflammatory responses at barrier sites such as the skin, lungs and intestines. The complex is formed in a two-step process where IL36G first binds to IL1RL2, and the intermediary binary complex recruits IL1RAP. The ternary complex formation brings TIR domains of the receptors together which recruit MyD88 (Q99836). This activates NFKB and MAPK signalling. Both IL36RN (Q9UBH0) and IL1F10 (Q8WWZ1) play a role inhibiting IL36 function by binding to IL1RL2, preventing recruitment of IL1RAP. Dysregulation of IL36 cytokines is associated with inflammatory diseases such as inflammatory bowel disease (IBD), rheumatoid and psoriatic arthritis, and various inflammatory and infectious skin disorders. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
