identifier: ComplexPortal:CPX-3093
label: "PKM1 pyruvate kinase complex"
definition: >-
  A pyruvate kinase that catalyzes the phosphotransfer reaction between phosphoenolpyruvate (PEP, CHEBI:18021) and ADP (CHEBI:16761), producing pyruvate (CHEBI:15361) and ATP (CHEBI:15422), the final step in glycolysis. Found in most normal differentiated tissues and predominately in organs that require a high rate of energy generation, muscle, heart and brain. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
