identifier: ComplexPortal:CPX-1038
label: "PIP2-OAF1 transcription factor complex"
definition: >-
  Acts as a transcriptional activator to induce the transcription of genes encoding proteins involved in fatty acid beta-oxidation, a response called oleic acid induction, when cells grow on fatty acids as the sole carbon source. Recognizes and binds to the oleate response element (ORE or peroxisome box), two inverted CGG triplets spaced by 14 to 18 intervening nucleotides recently refined to CGGN3TNA/(R)N8-12CCG, in the promoter region of a number of peroxisomal genes. Activity is inhibited by OAF1 under non-inducing conditions and repressed by glucose. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
