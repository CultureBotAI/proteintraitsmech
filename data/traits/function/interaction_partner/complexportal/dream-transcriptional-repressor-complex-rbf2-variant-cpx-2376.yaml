identifier: ComplexPortal:CPX-2376
label: "drEAM transcriptional repressor complex, Rbf2 variant"
definition: >-
  Mediates gene repression during the G0 phase and coordinates periodic gene expression with peaks during the G1/S and G2/M phases. Also represses ectopic expression of the carbon dioxide receptor in olfactory neurons. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
