identifier: ComplexPortal:CPX-1179
label: "DCS1 decapping scavenger complex"
definition: >-
  m7G(5')pppN diphosphatase which degrades the 5-prime mRNA cap when the cap is no longer attached to the mRNA body but rather within short capped mRNA fragments that are generated from 3' to 5' mRNA decay. Releases m7GMP. Mononucleoside diphosphates (m7GDP and m3 2,2,7GDP) are not hydrolyzed by the complex, however mononucleoside triphosphates (m7GTP and m3 2,2,7GTP) are, demonstrating the importance of a triphosphate chain for DCS1 hydrolytic activity. Has a high binding affinity for m7GDP, which inhibits the complex, making this mononucleoside diphosphate a potential regulator of cap-dependent cellular processes. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
