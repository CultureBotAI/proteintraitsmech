identifier: ComplexPortal:CPX-1674
label: "MON1-CCZ1 guanyl-nucleotide exchange factor complex"
definition: >-
  Guanyl-nucleotide exchange factor complex required to activate the endosomal GTPase Rab7 required for fusion of multivesicular bodies/late endosomes and of autophagosomes to lysosomes. Maintains proper vacuole morphology in vacuole delivery pathways by regulating fusion of vesicles with the vacuole at the tethering/docking stage. Regulates the SNARE complex during the coordinated priming and docking stages of fusion. May play a role in early-to-late endosome conversion. Mon1 interacts with Rab5 family GTPases and phosphatidylinositol phosphate lipids to recruit the complex to endosomes. For binding to autophagosomes, Ccz1 instead interacts with ATG8 and lipid packing defects. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
