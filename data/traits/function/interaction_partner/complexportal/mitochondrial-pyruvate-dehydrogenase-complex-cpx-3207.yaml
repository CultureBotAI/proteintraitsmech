identifier: ComplexPortal:CPX-3207
label: "Mitochondrial pyruvate dehydrogenase complex"
definition: >-
  Mitochondrial matrix enzyme that converts pyruvate to acetyl-CoA and CO2. This provides a metabolic connection between glycolysis, whose end product is pyruvate, and the tricarboxylic acid cycle, which starts with acetyl-CoA. Pyruvate dehydrogenase (PDH) activity is negatively regulated via phosphorylation of its PDA1 subunit. The protein kinases PKP1 (P40530) and PKP2 (P53170) phosphorylate PDA1, and the protein phosphatases PTC5 (Q12511) and PTC6 (P25646) mediate its dephosphorylation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
