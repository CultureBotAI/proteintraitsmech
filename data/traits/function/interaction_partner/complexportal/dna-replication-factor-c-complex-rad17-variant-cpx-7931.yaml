label: "DNA replication factor C complex, RAD17 variant"
definition: >-
  DNA-dependent ATPase clamp-loader complex that uses the energy of ATP binding and hydrolysis to recruit the checkpoint clamp complex (CPX-1829) to the recessed 5' end of a dsDNA-ssDNA junction as part of a DNA damage checkpoint system. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
