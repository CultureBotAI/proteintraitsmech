identifier: ComplexPortal:CPX-2389
label: "Prefoldin co-chaperone complex"
definition: >-
  Co-chaperone that works together with HSP90 in the activation and assembly of several macromolecular complexes. It binds specifically to cytosolic CCT complex (CPX-2772) and transfers target proteins to it. Synergistically regulates the asymmetric division of neuroblasts and intermediate neural progenitor cells with infertile partners (Pins, Q9VB22) by stabilizing tubulin, and hence inhibits neuroblast overgrowth in the brain of Drosophila larvae. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
