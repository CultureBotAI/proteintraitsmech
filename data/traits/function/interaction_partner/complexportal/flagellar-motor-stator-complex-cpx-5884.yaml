identifier: ComplexPortal:CPX-5884
label: "Flagellar motor stator complex"
definition: >-
  Transmembrane unit of the flagellar motor which conducts protons and exerts force on the rotor. Each core rotor complex (CPX-1082/CPX-1085) is typically surrounded by 10 stator complexes, each of which can independently produce torque for flagellar rotation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
