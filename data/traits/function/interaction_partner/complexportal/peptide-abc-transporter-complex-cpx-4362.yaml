identifier: ComplexPortal:CPX-4362
label: "Peptide ABC transporter complex"
definition: >-
  Probable high affinity peptide transporter. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. Imports Microcin C (McC), a peptide-nucleotide antibiotic, which targets aspartyl-tRNA synthetase (P21889). Analogues require a minimal peptide chain length of 6 amino acids and the presence of an N-terminal formyl-methionyl-arginyl sequence for uptake. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
