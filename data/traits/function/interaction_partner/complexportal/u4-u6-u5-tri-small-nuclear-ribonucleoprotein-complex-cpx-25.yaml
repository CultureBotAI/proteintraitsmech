identifier: ComplexPortal:CPX-25
label: "U4/U6.U5 tri-small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex that is involved in mRNA splicing. The U4/U6 x U5 tri-snRNP complex binds to the pre-spliceosome complex to form the pre-activation complex. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. A curated stable macromolecular complex (Complex Portal) with 33 subunits.
