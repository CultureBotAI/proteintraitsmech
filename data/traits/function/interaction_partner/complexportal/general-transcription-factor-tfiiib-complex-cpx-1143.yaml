identifier: ComplexPortal:CPX-1143
label: "General transcription factor TFIIIB complex"
definition: >-
  Transcription factor complex required for Pol III transcription complex (CPX-2660) assembly which transcribes short noncoding RNA genes. Cooperates with TFIIIC (CPX-1656) to recruit Pol III to different types of gene promoters and form the preinitiation complex (PIC). In the case of PIC formation at transfer DNA (tDNA) genes, TFIIIC recognizes the gene-internal box A and B elements, while TFIIIB localizes further upstream. TFIIIA (P39933) is required only for the transcription of 5S rRNA, where it recognizes the gene-internal control element, box C, to further recruit TFIIIC and TFIIIB. Once assembled upstream of the start site, TFIIIB generates a significant DNA distortion of the class III gene promoter through the SPT15 and BDP1 subunits. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
