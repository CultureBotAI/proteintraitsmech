identifier: ComplexPortal:CPX-2211
label: "Commander complex"
definition: >-
  Role in endosomal protein sorting and in trafficking of transporter proteins between plasma membrane, trans-Golgi network, nucleus, and lysosomes along cargo networks. Required for endosomal recycling of transmembrane cargoes. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
