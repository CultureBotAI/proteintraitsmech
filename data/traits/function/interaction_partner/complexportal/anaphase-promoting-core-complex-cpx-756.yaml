identifier: ComplexPortal:CPX-756
label: "Anaphase-Promoting core complex"
definition: >-
  APC, a key regulator of cell cycle progression, is a conserved cullin-RING E3 ubiqutin ligase which facilitates multiubiqutination of cell cycle proteins, including cyclins, so marking them for proteasomal destruction. Generally believed that APC acts as a scaffold that brings E2 enzymes and substrates into close proximity. APC activity is required for metaphase-anaphase transition, mitotic exit, G1 phase and DNA replication. Targets securin for destruction, which is necessary for chromosome segregation. APC seems to have similar function in meiosis. Co-activators, CDC20 and CDH1, associate with APC core complex at specific stages of cell cycle, and are thought to be involved in substrate specificity. APC-Cdc20 (CPX-760) is active in presence of high cyclin-cdk activity in M phase but after metaphase when cyclin-cdk activity decreases, Cdh1 is dephosphorylated, CDC20 is degraded and APC-CDH1 (CPX-761) activated. Ama1 (CPX-762) is meiotic co-activator required for sporulation and contributes to securin degradation and cyclin Clb5 in anaphase of meiosis. All APC co-activators, characterized by the presence of sequence elements, C-box and the IR-tail, that mediate their binding to APC, contain a C-terminal WD40 domain, predicted to fold into a propeller-like structure, believed to recognize APC substrates by interacting with specific recognition elements in substrates, D-boxes and KEN-boxes. Genetic inactivation of APC is lethal. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
