identifier: ComplexPortal:CPX-3178
label: "Endopeptidase ClpP complex"
definition: >-
  ATP-dependent serine protease which degrades intracellular unfolded or misfolded proteins. ClpP on its own can degrade only small peptides (<5 amino acids) or full-length unfolded proteins with low efficiency and requires association to the ClpA or ClpX ATPases to efficiently process larger peptides and folded proteins. In the absence of the ATPase complex, ClpP is assumed to be in a closed conformation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
