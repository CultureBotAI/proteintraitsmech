identifier: ComplexPortal:CPX-8782
label: "VCP-DERL2 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Part of the endoplasmic reticulum-associated degradation (ERAD) for misfolded lumenal proteins A transmembrane channel formed by DERL2 provides a pathway for large ERAD substrates to exit the endoplasmic reticulum membrane driven by coordinated movement in both DERL2 and VCP. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
