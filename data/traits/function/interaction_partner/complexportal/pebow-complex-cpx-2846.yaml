identifier: ComplexPortal:CPX-2846
label: "PeBoW complex"
definition: >-
  Role in coordinating ribosome biogenesis with cell cycle progression, required for pre-rRNA processing and the maturation of the 60S ribosomal subunit. Forms an extensive protein-protein and protein-RNA interaction network within early ribosome assembly intermediates in the nucleolus, thereby potentially serving as a hub for stabilizing or remodeling ribonucleoprotein neighborhoods during 60S subunit biogenesis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
