identifier: ComplexPortal:CPX-1679
label: "TRAMP complex variant 4-2"
definition: >-
  Recognises and bind to pre-ribosomal RNA and snoRNAs leading to their rapid degradation by the nuclear exosome (CPX-599). Adds a short oligo(A) tail to the RNA which is assumed to make it a better substrate for 3'-end degradation. There is evidence that the various TRAMP complexes (CPX-1678, CPX-1679, CPX-1680) exhibit some substrate specificity with TRAMP4-2 targetting RNAPII transcripts, particularly mRNA 5' ends, close to the transition start site and also the CUT, SUT, and XUT ncRNAs. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
