identifier: ComplexPortal:CPX-778
label: "TRM11-TRM112 tRNA (m2G10) methyltransferase complex"
definition: >-
  S-adenosylmethionine-dependent methyltransferase responsible for the formation of N2-monomethylguanosine at position 10 (m2G10) in yeast cytoplasmic tRNA. The m2G10 is part of the body of the tRNA and is likely involved in tRNA folding and stability. m2G10 is stacked onto the m22G26 nucleotide which is methylated by Trm1 (P15565). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
