identifier: ComplexPortal:CPX-1268
label: "Glycine decarboxylase multienzyme complex"
definition: >-
  Catalyzes the oxidative cleavage of glycine into CO2 and NH3, utimately playing a role in the conversion of glycine to serine. The concomitant transfer of a methylene carbon unit to THF1 generates the C1 donor 5,10-methylene tetrahydrofolate. Located in the mitochondrion. The P protein (GCV2, P49095) binds the alpha-amino group of glycine through its pyridoxal phosphate cofactor; CO2 is released and the remaining methylamine moiety is then transferred to the lipoamide cofactor of the H protein (GV3, P39726). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
