identifier: ComplexPortal:CPX-4082
label: "NLRP1 inflammasome"
definition: >-
  A pro-inflammatory thiol protease complex that is activated in response to pathogen infections and toxins (e.g. Anthrax lethal toxin). Primarily acts in monocytes and macrophages. Activating platform for Caspase-1 (CPX-952) through proximity-induced self-cleavage in an ATP-dependent reaction. Activated Caspase-1 cleaves interleukins 1beta (IL1B, P01584) and IL18 (Q14116) releasing the mature cytokines which are involved in a variety of inflammatory processes and is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves GSDMD (P57764). Belongs to the family of Inflammasomes that includes NLRP3 inflammasome (CPX-4141), NLRC4 inflammasome (CPX-4144), AIM2 inflammasome (CPX-4142) and Pyrin inflammasome (CPX-4143). Single-nucleotide polymorphisms in the NLRP1 gene are associated with vitiligo. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
