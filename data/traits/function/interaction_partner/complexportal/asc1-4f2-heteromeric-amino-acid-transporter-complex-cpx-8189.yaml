identifier: ComplexPortal:CPX-8189
label: "ASC1-4F2 heteromeric amino acid transporter complex"
definition: >-
  Amino acid transporter which catalyses the transmembrane electroneutral antiport of small neutral L- and D-amino acids across the plasma membrane in a sodium-independent manner. Important for the transport of D-amino acids involved in neural signalling and adipocyte differentiation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
