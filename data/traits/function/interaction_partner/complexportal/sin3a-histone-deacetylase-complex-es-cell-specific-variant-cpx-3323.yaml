identifier: ComplexPortal:CPX-3323
label: "SIN3A histone deacetylase complex, ES cell-specific variant"
definition: >-
  A embryonic stem cell-specific histone deacetylation complex (HDAC) that is distinguished from the common SIN3A complex (CPX-3321) by the additional core subunits FAM60A, OCT, TET1. Negatively regulates gene expression of genes regulating G1/S and G2/M cell cycle transitions and required to promote rapid proliferation while preventing unscheduled differentiation. May bind to DNA directly via subunit FAM60A and is recruited to gene promoters by specific transcription factor such as REST (Q13127), RB (P06400), HBP1 (O60381), the Myc-inhibitors MXI1 (P50539) and MAD1L1/MAD1 (Q9Y6D9), KlF13 (Q9Y2Y9), FOXK1 (P85037) and FOXK2 (Q01167) as well as with the nuclear hormone repressors, NCOR1 (O75376) and NCOR2/SMRT (Q9Y618) and/or SWI/SNF chromatin remodelling complexes. Binds H3K4me2 and H3K4me3 histones via subunits ING1 and ING2 and hypoacetylated histones via subunits RBBP4 and RBBP7. Mutations that abrogate its repressor activity may activate the TGF-beta signaling pathway leading to changes in cell morphology and increase in cell migration related to cancer progression. Cancer cell lines appear to express canonical and mutated versions of SIN3A complexes. May include several accessory proteins such as BAHCC1 (Q9P281), BBX (Q8WY36), IRS4 (O14654), PHF23 (Q9BUL5), SAP18 (O00422) and TNRC18 (O15417). A curated stable macromolecular complex (Complex Portal) with 18 subunits.
