identifier: ComplexPortal:CPX-1388
label: "bicd-1-dlc-1-egal-1 microtubule-associated dynein motor complex"
definition: >-
  Motor complex that trafficks organelles, proteins and RNA towards the minus ends of microtubules. In particular, the complex plays a role in cellular processes including cell division, mitosis, meiosis, cell proliferation. Its role in organelle trafficking is through interactions with the nuclear migration protein unc-83. bicd-1 and dlc-1 interact with unc-83 within the unc-83-unc-84 complex (CPX-1385) and this recruits the motor complex to nuclear envelope where it is involved in the regulation of nuclear migrations in hypodermal precursor cells. In addition, during cell division, the complex is involved in the pairing of homologous chromosomes, and also maintains germline development and homeostasis by inhibiting germ cell proliferation. The complex is a component of a larger assembly that associates with microtubules through dynein. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
