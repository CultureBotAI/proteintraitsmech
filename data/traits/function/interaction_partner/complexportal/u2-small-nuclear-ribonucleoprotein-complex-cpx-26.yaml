identifier: ComplexPortal:CPX-26
label: "U2 small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex that is involved in mRNA splicing. U2 snRNP binds to the intron branch site of the commitment complex (CPX-1418) to form the pre-spliceosome in an ATP dependent step. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. During formation of the activated spliceosome, U2 will replace the dissociating U4 (CPX-31) to form base pairs with U6 (CPX-24). Prior to the first catalytic reaction, the SF3a (CPX-1648) and SF3b (CPX-1647) sub-complexes dissociate from the spliceosome, presumably making the branch site accessible to lariat formation. A curated stable macromolecular complex (Complex Portal) with 23 subunits.
