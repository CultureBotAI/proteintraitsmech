identifier: ComplexPortal:CPX-505
label: "RXRalpha-PXR nuclear receptor complex"
definition: >-
  Member of the nuclear receptor (NR) family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in metabolism. The pregnane X receptor (Nr1i2/Pxr) is a central xenobiotic sensor that detects potentially toxic chemicals and regulates the expression of genes central to their breakdown and removal. Nr1i2 binds as a heterodimer with the 9-cis retinoic acid receptor (Rxra) to xenobiotic response elements in cytochrome P450 3A (CYP3A) gene promoters and is activated by the spectrum of chemicals that are known to induce CYP3A gene expression. Like other NRs, Rxra and Nr1i2 contain DNA-binding and ligand-binding domain (DBD, LBD). Upon ligand binding, corepressors dissociate from Rxra and transcriptional coactivators, such as Ncoa1 (P70365), are recruited leading to transcriptional activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
