identifier: ComplexPortal:CPX-10336
label: "Interleukin-35 receptor ligand type 3 complex"
definition: >-
  Inhibitory cytokine-receptor complex that plays a key role in immune regulation by suppressing effector T cells, Th1 cells, Th17 cells and macrophages. IL35 signals through four receptors: IL12RB2 homodimers, IL6ST homodimers, and heterodimers comprised of IL12RB2/IL6ST and IL12RB2/IL27RA. IL35 binding to IL12RB2 homodimers (this complex) induces IL12A and EBI3 transcription and the activation of the JAK-STAT pathway through JAK2/STAT4 phosphorylation. Although IL12RB2 homodimers partially mediate IL35-led immunosuppressive signalling, maximal function is effected by the IL12RB2-IL6ST heterodimer. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
