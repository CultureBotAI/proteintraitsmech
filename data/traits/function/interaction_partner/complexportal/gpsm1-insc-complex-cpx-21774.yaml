identifier: ComplexPortal:CPX-21774
label: "GPSM1-INSC complex"
definition: >-
  A key regulator of asymmetric cell division in polarized progenitor cells, the complex plays a fundamental role in generating diverse cell types during development. It is essential for cell fate determination and the maintenance of tissue architecture, primarily through its ability to precisely control spindle orientation. Additionally, it may be involved in macroautophagy in intestinal cells and has been implicated in processes related to drug addiction. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
