identifier: ComplexPortal:CPX-4381
label: "Phosphate ABC transporter complex"
definition: >-
  High affinity phosphate transporter. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. Expressed by the pstSCAB-phoU operon which is induced in response to low levels of environmental phosphate. Sufficient Pi generates a signal through the PstSCAB2 transporter that leads to repression of this operon. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
