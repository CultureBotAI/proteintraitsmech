identifier: ComplexPortal:CPX-4921
label: "E3 ligase (RANBP2) complex"
definition: >-
  SUMOylated E3 ligase complex that takes part in the termination of CRM1-mediated export by facilitating the hydrolysis of GTP by Ran (P62827), resulting in export complex disassembly. The subunit Ranbp2/Nup358 links the E3 ligase complex to the Nuclear Pore Complex (CPX-4474). SUMOylation, mediated by the enzymatic activity of Ranbp2, might play a role in the directionality of nucleo-cytoplasmic transport through the nuclear pore. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
