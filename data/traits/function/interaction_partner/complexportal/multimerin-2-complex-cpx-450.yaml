identifier: ComplexPortal:CPX-450
label: "Multimerin-2 complex"
definition: >-
  Glycoprotein complex of the C1q/TNF superfamily involved in cell adhesion of vascular endothelial cells via binding to VEGF-A (P15692, complex CPX-1977) and involved in epithelial tube formation. Impairs cell migration, organization of a functional vessel network, tumor growth and tumor angiogenesis and downregulates tyrosine kinase activity of VEGFR2 (P35968) by interfering with the VEGF-A/VEGFR2 interaction. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
