identifier: ComplexPortal:CPX-4982
label: "Exocyst, Exoc6 variant"
definition: >-
  Recruited to sites of active exocytosis and membrane expansion, where it mediates the tethering of secretory vesicles to the plasma membrane in preparation for soluble N-ethylmaleimide-sensitive factor (NSF) attachment protein receptor (SNARE)-mediated membrane fusion. The targeting of secretory vesicles to the plasma membrane involves direct interactions of the Exocyst with PI(4,5)P2. In addition, a number of small GTP-binding proteins interact with components of the exocyst and regulate the assembly, localization, and function of this complex. The Exocyst participates in a number of biological processes such as ciliogenesis, migration, autophagy, trafficking and cytokinesis. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
