identifier: ComplexPortal:CPX-1851
label: "RPD3S histone deacetylase complex"
definition: >-
  Histone deacetylase which functions by deacetylating chromatin, thereby limiting accessibility of the transcriptional machinery to the underlying DNA. RPD3S recognizes the SET2 methylated histones and deacetylates histones within transcribed sequences. This erases transcription elongation-associated histone acetylation and serves to repress the occurrence of spurious transcription initiation from cryptic start sites within open reading frames. May also act to promote nucleosome assembly like a histone chaperone and prevent RSC-dependent histone eviction from nucleosomes. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
