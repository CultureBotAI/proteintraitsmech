identifier: ComplexPortal:CPX-3077
label: "Integrin alpha4-beta7 complex"
definition: >-
  Adhesion molecule that mediates lymphocyte transendothelial migration and homing to gut-associated lymphoid tissue (GALT). Mediates rolling as well as firm adhesion through signals from within the cell. Primary ligand is mucosal adhesion molecule-1 (MAdCAM-1, Q13477), an addressin with two immunoglobulin superfamily (IgSF) domains and a mucin-like stalk. Also binds VCAM-1 (P19320) and fibronectin (P02751). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
