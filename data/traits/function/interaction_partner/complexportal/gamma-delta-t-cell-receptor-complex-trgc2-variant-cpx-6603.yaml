identifier: ComplexPortal:CPX-6603
label: "Gamma-delta T cell receptor complex, TRGC2 variant"
definition: >-
  Antigen-specific receptor on the cell surface of T lymphocytes essential to the immune response. While alpha-beta TCR (CPX-6482, CPX-6581) expressing T cells are more commonly found in peripheral blood, gamma-delta TCR-expressing T cells constitute the major subset of resident T cells in tissues bordering the external environment such as the dermis, the intestine, the lung and the uterus. Gamma-delta TCRs do not absolutely require classic antigen priming and clonal expansion in the thymus and appear to recognise microorganism-derived proteins and self-proteins (such as heat-shock proteins) without a requirement for antigen pre-processing or major-histocompatibility-complex (MHC) presentation of peptide epitopes. Some gamma-delta T-cell receptors recognise MHC class Ib molecules or structurally diverse and biologically unrelated compounds such as lipopeptides on cell surfaces. Activated cells produce cytokines (IFN-gamma, TNF-alpha, IL-17) and chemokines (RANTES, IP-10, lymphotactin), contributing to a rapid, innate-like immune response to a broad spectrum of pathogens during the initiation phase of the immune response. This rapid response bridges the transition from the innate to adaptive immune response. Each TCR possesses unique antigen specificity, determined by the antigen binding site created by the variable regions of the gamma and delta subunits (TRGC2, TRDC). Downstream signalling is activate by LCK (P06239) and FYN (P06241) kinases which phosphorylate the cytoplasmic immunoreceptor tyrosine-based activation motifs (ITAMs) of subunits CD3G, CD3E and CD247. As antigens only bind to the extracellular domains of the gamma and delta subunits and they do not possess ITAMs, information is probably relayed via the ITAMs of the cytoplasmic tails of the CD3 subunits. Gamma-delta TCRs appear to be more efficient in signalling than alpha-beta TCRs. This rapid and un-primed response by T cells expressing gamma-delta TCRs and IL-17 can also induce inflammatory diseases, autoimmunity (in particular psoriasis), and metastasis. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
