identifier: ComplexPortal:CPX-4312
label: "Taurine ABC transporter complex"
definition: >-
  A sulfonate-sulfur utilization system required for the import of taurine (2-aminoethanesulfonic acid, CHEBI:15891) as a source of sulfur. The complex is expressed only under conditions of sulfate or cysteine starvation. Member of the ATP-binding cassette (ABC) transporter family, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
