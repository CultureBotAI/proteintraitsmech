identifier: ComplexPortal:CPX-1742
label: "tRNA-specific adenosine-34 deaminase complex"
definition: >-
  Deaminates adenosine-34 (wobble position) to inosine in double-stranded tRNA. When present at the wobble position, inosine can pair degenerately with uracil, cytosine, or adenosine, enabling a single tRNA to recognize up to three different codons. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
