identifier: ComplexPortal:CPX-8094
label: "SWI5-SFR1 recombination accessory factor complex"
definition: >-
  Regulates homologous recombination repair by binding to, and stimulating, the homologous DNA strand exchange activity of RAD51 (P36601) and meiosis-specific DMC1 (O42634). Enhances ATP hydrolysis-dependent transitioning of the first three-strand intermediate (a paranemic joint) of RAD51-driven DNA strand exchange into the second three-strand intermediate (a plectonemic joint), and then into reaction products, thus potentiating RAD51 activity in both the presynaptic and synaptic phases of DNA strand exchange. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
