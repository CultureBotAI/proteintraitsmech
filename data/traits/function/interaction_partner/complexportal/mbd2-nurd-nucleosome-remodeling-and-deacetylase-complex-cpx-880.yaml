identifier: ComplexPortal:CPX-880
label: "MBD2/NuRD nucleosome remodeling and deacetylase complex"
definition: >-
  Corepressor complex that couples histone deacetylase and ATP-dependent chromatin remodeling activities. It regulates the higher-order structure of chromatin, making chromatin more compact by removing acetyl groups from nucleosomes, and has important roles in the regulation of gene expression and DNA damage repair. The core of the complex is composed of six groups of proteins, each one with several paralogues (HDAC1/2, MTA1/2/3, RBBP4/7, GATAD2A/B, MBD2, and CHD3/4). Combinatorial assembly of these isoforms contributes to the targeting and function of the complex. It is currently not known whether GATAD2A/GATAD2B, RBBP4/RBBP7, and MTA1/MTA2/MTA3 form heterodimers/trimers or mutually exclusive homodimers/trimers. The CHD3/4 ATPase, utilizes energy derived from hydrolysis of ATP for DNA sliding and repositioning of nucleosomes. The second catalytic subunit, HDAC1/2 (histone deacetylase), deacetylates acetylated lysine residues of histone and non-histone proteins. This dual enzymatic activity is proposed to be important for the efficient formation of heterochromatin with densely packed hypoacetylated nucleosomes and the rapid termination of gene transcription. In addition to the well-described core subunits, a large number of proteins have been reported to interact with the NuRD complex, like DOC1 (O14519), KPNA2 (P52292), ZMYND8(Q9ULU4), ZNF512B/532/592/687(Q96KM6, Q9HCE3, Q92610, Q8N1G0), SALL4 (Q9UJQ4), PRMT5 (O14744), MEP50 (Q9BQA1). They also contribute to dictate the different biological functions of the NuRD complex. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
