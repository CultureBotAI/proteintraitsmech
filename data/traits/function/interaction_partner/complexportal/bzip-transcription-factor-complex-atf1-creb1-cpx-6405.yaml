identifier: ComplexPortal:CPX-6405
label: "bZIP transcription factor complex, ATF1-CREB1"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The DNA recognition sequence depends on the composition of the bZIP dimer with the complex either binding to the preferred region of one of the partners or to a novel bZIP cognate site. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
