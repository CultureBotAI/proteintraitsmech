identifier: ComplexPortal:CPX-8174
label: "PSMG3-PSMG4 proteasomal chaperone complex"
definition: >-
  Chaperone complex with a role in the early stage assembly of the 26S proteasome (CPX-2262). Binds to the alpha-subunits before alpha-rings are complete, functioning as a scaffold for alpha-ring assembly and preventing unregulated aggregation of alpha-ring intermediates. The complex binds to the underside of the alpha-ring where the beta-subunits will later assemble. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
