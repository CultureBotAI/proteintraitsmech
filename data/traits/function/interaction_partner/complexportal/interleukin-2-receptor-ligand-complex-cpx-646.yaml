identifier: ComplexPortal:CPX-646
label: "Interleukin-2 receptor-ligand complex"
definition: >-
  Transmembrane complex formed on the binding of extracellular interleukin-2 (IL-2) to a differentially expressed receptor which can be composed of up to three distinct receptor chains: IL2RA (alpha-chain, IL2RB (beta-chain) and IL2RG (gamma-chain), where IL2RB and IL2RG are essential for signal transduction, whilst IL2RA plays a key role in cytokine presentation to the signaling receptors. Ligand binding results in the assembly of the complete complex, inducing signal transduction through three different signaling pathways: the JAK-STAT pathway, the PI3K/Akt/mTOR pathway and the MAPK/ERK pathway. Binding to IL-2 stimulates phosphorylation of three critical tyrosine residues on the cytoplasmic tail of IL2RB as well as tyrosine phosphorylation of the JAKs. Activation of the JAK/STAT signaling cascade is through IL-2RB-JAK1 and IL-2RG-JAK3 recruitment of predominantly STAT5A and STAT5B. Originally recognized for its ability to stimulate lymphocyte proliferation, the IL-2-IL2R pathway is an integral regulator of healthy and pathalogical immune responses but also plays a key role in regulating the homeostasis of regulatory T cells (T-regs), which express the IL-2R constitutively. Whilst, IL2 shares several actions with IL15, such as stimulating cytotoxic T cells and Natural Killer (NK) cell proliferation, they are not functionally redundant. IL-2 favours maintaining T-reg homeostasis and regulating T helper (Th) differentiation whereas IL-15 favors expansion of CD8 memory cells, NK cells, and NKT cells. Immune activation leads to the shedding of IL2RA, leaving behind a soluble form of IL2R (sIL-2R). Increased levels of sIL2R are considered to be indicative of an on-going immune response making it a useful biomarker for monitoring disease progression. sIL-2R's role in providing immunity or governing self-tolerance is unclear and it is capable of either functioning as a decoy-receptor that reduces the bio-availability of IL2, or enabling in trans activation by presenting IL2 to dimeric IL2R expressing immune cells. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
