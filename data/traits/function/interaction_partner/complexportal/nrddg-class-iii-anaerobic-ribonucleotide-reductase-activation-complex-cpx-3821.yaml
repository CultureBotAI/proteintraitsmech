identifier: ComplexPortal:CPX-3821
label: "nrdDG class III anaerobic ribonucleotide reductase activation complex"
definition: >-
  Formation of this complex leads to the activation of the nrdD glycyl radical homodimer (CPX-3822) which catalyzes the conversion of ribonucleotides into the deoxyribonucleotides required for DNA synthesis and repair. nrdG generates an organic free radical, using S-adenosylmethionine and reduced flavodoxin as cosubstrates to produce 5'-deoxy-adenosine, nrdG then dissociates from the complex to leave the activated homodimer. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
