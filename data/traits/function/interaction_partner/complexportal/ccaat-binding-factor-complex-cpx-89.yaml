identifier: ComplexPortal:CPX-89
label: "CCAAT-binding factor complex"
definition: >-
  Transcription factor which binds to the CCAAT box, which occurs in 30% of eukaryotic promoters and appears to be crucial for promoter activity. May also play a role in histone methylations and some acetylations through recruitment of relevant enzymes to active promoters. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
