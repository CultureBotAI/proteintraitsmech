identifier: ComplexPortal:CPX-15
label: "CST complex"
definition: >-
  RPA-like (replication protein A) complex, that has high affinity for telomeric ssDNA. The complex is assembled during late S-G2 and is involved in capping, and thus protecting, single stranded telomeric DNA and preventing chromosomal damage by inhibiting telomerase activity. Plays a role in the regulation of the synthesis of C strand via its interaction with polymerase alpha primase. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
