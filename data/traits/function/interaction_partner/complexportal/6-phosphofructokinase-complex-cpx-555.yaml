identifier: ComplexPortal:CPX-555
label: "6-phosphofructokinase complex"
definition: >-
  6-phosphofructokinase catalyzes the phosphorylation of fructose 6-phosphate to fructose 1,6-bisphosphate in the presence of MgATP, the first irreversible step for glycolysis. The enzyme exhibits weak cooperative binding of Fructose 6-P. Its activity is controlled by many allosteric activators and inhibitors (including ATP),showing its crucial role in regulation of glycolytic flux. The effectors either modulate the affinity of Pfk for Fructose 6-P or overcome inhibitory effects. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
