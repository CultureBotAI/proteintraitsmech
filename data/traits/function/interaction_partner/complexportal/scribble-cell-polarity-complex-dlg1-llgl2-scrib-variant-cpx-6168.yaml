identifier: ComplexPortal:CPX-6168
label: "Scribble cell polarity complex, DLG1-LLGL2-SCRIB variant"
definition: >-
  Evolutionarily conserved complex that acts as a key regulator of cell polarity and cell shape. It plays a major role in establishment, regulation, and maintenance of apicobasal polarity in epithelial cells. It localizes to the basolateral membrane in epithelial cells and is required for proper localization of the other PDZ protein complexes involved in apicobasal polarity: CRUMBS (CPX-6166, CPX-6167 and CPX-6180) and PAR. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
