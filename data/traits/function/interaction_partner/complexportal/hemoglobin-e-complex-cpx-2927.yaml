identifier: ComplexPortal:CPX-2927
label: "Hemoglobin E complex"
definition: >-
  Embryonic hemoglobin E (HbE) complex is the main embryonic hemoglobin type, expressed predominantly in fetal liver and embryonic erythrocytes. Binds and transports oxygen and carbon dioxide to/from the peripheral tissues. It replaces embryonic Gower-1 hemoglobin (CPX-2928) and is itself replaced by fetal hemoglobin (CPX-2932, CPX-2933) after about 8 weeks gestation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
