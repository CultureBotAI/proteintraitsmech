identifier: ComplexPortal:CPX-320
label: "DmaABC DMSO reductase complex"
definition: >-
  Terminal reductase required for the reduction of dimethyl sulfoxide (DMSO) to dimethyl sulfide (DMS) and that of a broad array of S- and N-oxide compounds during anaerobic growth. Induced in the presence of fumarate. The expression of the enzyme is dependent on molybdenum. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
