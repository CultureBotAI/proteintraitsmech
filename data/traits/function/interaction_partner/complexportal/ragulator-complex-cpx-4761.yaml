identifier: ComplexPortal:CPX-4761
label: "Ragulator complex"
definition: >-
  Involved in amino acid sensing and activation of mTORC1 (CPX-4473) promoting cell growth in response to growth factors, energy levels, and amino acids. Activated by amino acids through a mechanism involving the lysosomal V-ATPases and the membrane sensor SLC38A9 (Q8BGD6) which couples amino acid transport to activation of complex, Ragulator functions as a guanine nucleotide exchange factor activating the small Rag GTPases. Activated Ragulator and Rag GTPases function as a scaffold recruiting mTORC1 to lysosomes where it is in turn activated. LAMTOR1 is directly responsible for anchoring the Ragulator complex to membranes. Also required for late endosomes/lysosomes biogenesis, it may regulate both the recycling of receptors through endosomes and the MAPK signaling pathway through recruitment of some of its components to late endosomes. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
