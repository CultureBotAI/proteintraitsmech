identifier: ComplexPortal:CPX-6169
label: "Mitochondrial propionyl-CoA carboxylase complex"
definition: >-
  Biotin-dependent propionyl-CoA carboxylase which catalyzes the carboxylation of propionyl-CoA to produce D-methylmalonyl-CoA. Methylmalonyl-CoA is subsequently converted to succinyl-CoA, an intermediate in the tricarboxylic acid cycle The enzyme complex is required for the metabolism of odd chain fatty acids, branched-chain amino acids isoleucine, threonine, methionine, and valine and also cholesterol. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
