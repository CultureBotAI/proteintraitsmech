identifier: ComplexPortal:CPX-5681
label: "Enoyl CoA hydratase/isomerase complex"
definition: >-
  Catalyzes consecutive steps along the phenylacetate degradation pathway: the unusual rearrangement of the 2-oxepin-2(3H)-ylideneacetyl-CoA (oxepin-CoA) to the alpha,beta-unsaturated thioester 2,3-dehydroadipyl-CoA and the reversible conversion of 2,3-dehydroadipyl-CoA into 3-hydroxyadipyl-CoA. The PA utilization pathway is the main mechanism for degradation of a variety of organic compounds. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
