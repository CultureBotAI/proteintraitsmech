identifier: ComplexPortal:CPX-637
label: "ISW1a chromatin remodeling complex"
definition: >-
  ATP-dependent chromatin remodeling complex which modulates the structure of chromatin to regulate a variety of cellular processes, including DNA replication, repair, chromosome segregation and transcription. Slides mononucleosomes from the end to the center of DNA and requires the flexible, acidic patch of the histone H4 tail to efficiently dock its translocase on the nucleosome, for stimulating the ATPase activity and inducing nucleosome mobility. Positions histone octamers in dinucleosomes more specifically than in mononucleosomes. Regularly spaces nucleosomes in vitro every 175 bp. ISW1a bound to 33 bp of extranucleosomal DNA at both entry/exit sites is in an inactive conformation, it becomes activated on binding to extranucleosomal DNA at only one entry/exit site. ISW1a bound to only one extranucleosomal DNA makes a stable contact with nucleosomal DNA two helical turns from the dyad axis, and this interaction is lost when ISW1a is bound to extranucleosomal DNA at both entry/exit sites. Required for the transcriptional repression of a number of genes, this set differs from those repressed by ISW1b (CPX-636) with which it shares a catalytic subunit. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
