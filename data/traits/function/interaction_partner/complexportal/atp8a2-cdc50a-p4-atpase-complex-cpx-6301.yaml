identifier: ComplexPortal:CPX-6301
label: "ATP8A2-CDC50A P4-ATPase complex"
definition: >-
  A membrane pump which actively translocates, or flips, phospholipids across cell membranes from the exoplasmic to the cytoplasmic leaflet of the lipid bilayer. This generates and maintains membrane lipid asymmetry, a property essential for a wide variety of cellular processes such as vesicle budding and intracellular vesicle trafficking. Transport is accomplished by cyclic changes between two main enzyme conformations, during which the ATP8A2 ATPase is phosphorylated by ATP at a conserved aspartate residue (Asp-428) and subsequently dephosphorylated. CDC50 proteins are required for transport of P4‐ATPases from the endoplasmic reticulum to their final destinations and may also affect the catalytic cycle of the complex. Preferentially translocates phosphatidylserine in the plasma membrane. Preferentially expressed in brain and testes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
