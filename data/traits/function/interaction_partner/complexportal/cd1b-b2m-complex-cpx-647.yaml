identifier: ComplexPortal:CPX-647
label: "CD1B-B2M complex"
definition: >-
  An antigen-presenting complex that binds self and non-self lipid and glycolipid antigens and presents them to T-cell receptors on natural killer T-cells. The antigen binding specificity of CD1B is very broad in terms of length of the acyl chains. CD1B also presents endogenous gangliosides, such as GM1, to specific T cells, suggesting their involvement in autoimmune diseases such as multiple sclerosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
