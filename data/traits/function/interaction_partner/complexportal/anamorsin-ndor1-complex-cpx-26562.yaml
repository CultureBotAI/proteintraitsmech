identifier: ComplexPortal:CPX-26562
label: "Anamorsin-NDOR1 complex"
definition: >-
  Iron-sulfur (Fe-S) complex required for the maturation of extramitochondrial Fe-S proteins. Protein complex that supplies reducing equivalents to the early steps of the cytosolic Fe-S assembly (CIA) pathway and also functions in ribonucleotide reductase cluster assembly, potentially also supplying reducing equivalents to the di-iron cluster. Electrons from NADPH are transferred via FAD and FMN, the two flavin cofactors in NDOR1, to the Fe-S cluster(s) in CIAPIN1, which subsequently deliver the electrons to proteins in the CIA pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
