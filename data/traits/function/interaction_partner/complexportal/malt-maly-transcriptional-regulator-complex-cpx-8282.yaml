identifier: ComplexPortal:CPX-8282
label: "MalT-MalY transcriptional regulator complex"
definition: >-
  Complex formation represses the activity of MALT (CPX-8283) as a signal transduction ATPase which transcriptionally activates the maltose system responsible for the uptake and metabolism of maltodextrins. MALY represses MALT activity by blocking its oligomerization and strengthening ADP-mediated MALT autoinhibition. Maltotriose binding results in complex disassociation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
