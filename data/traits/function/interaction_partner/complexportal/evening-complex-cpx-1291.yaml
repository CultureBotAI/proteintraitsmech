identifier: ComplexPortal:CPX-1291
label: "Evening Complex"
definition: >-
  A transcription factor complex that is regulated by the circadian clock and negatively regulates hypocotyl growth. Represses the expression of the hypocotyl growth proteins PIF4 (Q8W2F3) and PIF5 (Q84LH8) in the early evening by directly binding to their promoter regions. Signals from both the clock and light pathways converge on PIF4 and PIF5 which permits maximal hypocotyl growth at dawn in diurnal conditions. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
