identifier: ComplexPortal:CPX-2018
label: "BCL-2 dimer"
definition: >-
  Suppresses apoptosis in a variety of cell systems including factor-dependent lymphohematopoietic and neural cells. Regulates cell death by controlling the mitochondrial membrane permeability. Inhibits caspase activity either by preventing the release of cytochrome c from the mitochondria and/or by binding to the apoptosis-activating factor (APAF-1). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
