identifier: ComplexPortal:CPX-3012
label: "Laminin-332 complex variant A"
definition: >-
  Major component of basment membranes which binds to cells via a high affinity, cell-surface receptor. Role in the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. Laminin-5 is thought to be involved in cell adhesion via integrin alpha-3/beta-1 in focal adhesion and integrin alpha-6/beta-4 in hemidesmosomes, signal transduction via tyrosine phosphorylation of pp125-FAK and p80, differentiation of keratinocytes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
