identifier: ComplexPortal:CPX-2242
label: "mlc-EIIB transcriptional regulator complex"
definition: >-
  Transcriptional regulation complex that acts to sequester the mlc transcriptional repressor that regulates the expression of proteins that are part of the phosphotransferase system for sugar uptake. In the absence of glucose, ptsG mainly exists in a phosphorylated form and does not bind mlc. When glucose is available, transported glucose takes the glucose-specific enzyme II complex (CPX-5943) forms and transfer the phosphate residue onto its glucose ligand. Dephosphorylated membrane-bound ptsG binds mlc and sequesters it from its target promoters. This leads to increased synthesis of ptsG and other phosphotransferase system proteins required for glucose import and metabolism. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
