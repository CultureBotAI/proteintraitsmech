identifier: ComplexPortal:CPX-1326
label: "CAX1-CAX3 complex"
definition: >-
  Cation antiporter complex that facilitates influx of cations, mainly Ca(2+) ions, into the cell and proton out of the cell. Required for normal growth, ion homeostasis and the functioning of stomata. Contribute to plant defense responses. Loss of CAX1 or CAX1 and CAX3 subunits results in severe reduction in growth, including leaf tip and flower necrosis and pronounced sensitivity to exogenous Ca(2+) and other ions. This effect is more pronounced if both subunits are missing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
