identifier: ComplexPortal:CPX-8767
label: "GluA1-GluA2 AMPA receptor complex"
definition: >-
  Ligand-gated ion channel implicated in nearly all aspects of development and function of the central nervous system (CNS). Post-synaptic ionotropic transmembrane receptor which increases membrane permeability for sodium, calcium, and potassium. Mediates the majority of excitatory synaptic transmissions upon binding to the excitatory neurotransmitter L-glutamate released from the presynapse of an adjacent cell. Activation of AMPARs induces depolarization of the postsynaptic membrane to mediate rapid synaptic signaling and precise information transfer at synapses. Assemble into tetramers in various combinations from four key subunits, GluA1 to GluA4. The GluA1/A2 heterodimer, dominant throughout the forebrain, is selectively recruited during long-term potentiation (LTP) at the key hippocampal synapse, CA3-CA1. The hippocampus is particularly vulnerable to AMPAR-mediated delayed neuronal death (DND) following ischemic stroke. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
