identifier: ComplexPortal:CPX-417
label: "Glucosidase II complex"
definition: >-
  Glycoprotein-processing enzyme that successively cleaves the innermost two alpha1,3-linked glucose residues from N-linked oligosaccharides in the endoplasmic reticulum during glycoprotein biogenesis. The enzyme has dual activity, cleaving two alpha1,3-linked glucose residues in succession from Glc2Man9GlcNAc2 (G2M9) to Glc1Man9GlcNAc2 (G1M9) (cleavage-1), and then to Man9GlcNAc2 (M9) (cleavage-2). G1M9 plays a key role in glycoprotein quality control in the ER, because it is a primary ligand of the lectin chaperones calnexin (CNX) and calreticulin (CRT). Therefore, the cleavage-2 activity provides an exit for correctly folded glycoproteins from the CNX/CRT cycle, while the cleavage-1 activity provides an entry for immature glycoproteins into the cycle. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
