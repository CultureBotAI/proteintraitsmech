identifier: ComplexPortal:CPX-2563
label: "Wnt enhanceosome complex"
definition: >-
  Forms in the nucleus to drive Wnt-dependent gene transcription.. Activation of the canonical Wnt signaling pathway leads to beta-catenin/arm accumulation in the nucleus, incorporation into the enhanceosome and the stimulation of transcription. The Wnt response of this complex is conferred by Pygo, which facilitates loading of arm via an adaptor, lgs, thereby promoting transcriptional activation. In the absence of arm, Wnt-responsive genes are silenced by the repressor gro (P16371) binding to the enhanceosome. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
