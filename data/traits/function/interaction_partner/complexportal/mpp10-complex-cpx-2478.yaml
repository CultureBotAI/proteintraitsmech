identifier: ComplexPortal:CPX-2478
label: "MPP10 complex"
definition: >-
  Required for early co-transcriptional events in ribosome biogenesis, acting as an RNA chaperone to initiate ribosome assembly. IMP3 protein directly associates with the first 70 nucleotides of the U3 snoRNA, with a stem-loop structure within the hinge region, and thereby directs the preassembled MPP10 complex to the U3 preprocessome. A sub-unit of the small subunit (SSU) processome, a 2.2 MDa ribonucleoprotein complex involved in the processing, assembly and maturation of nascent pre-ribosomal RNA to form the small ribosomal subunit. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
