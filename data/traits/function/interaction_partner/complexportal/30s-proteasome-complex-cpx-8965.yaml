identifier: ComplexPortal:CPX-8965
label: "30S proteasome complex"
definition: >-
  Multi-enzyme complex that functions as the primary degradation machinery for the selective turnover of surplus or damaged proteins within the cell. Proteins targeted for degradation are covalently labelled with polyubiquitin chains which are recognized and removed by the proteasome. The core contains the protease active sites (chymotrypsin-like, trypsin-like and peptidylglutamyl-peptide hydrolysing) that perform the proteolysis reactions in an internal chamber. The regulatory particles act as a discriminating gateway for potential substrates. This complex is composed of the 20S Proteasome and two 19S regulatory particles. The 19S regulatory particle (CPX-8962) is the major activator that allows the 20S Proteasome to degrade almost any protein tagged with the small protein modifier ubiquitin. The 19S recognises and deubiquitinates substrates as they enter the 20S catalytic core, thereby enabling protein degradation and maintaining cellular protein homeostasis. Attachment of the 19S to one end of the 20S forms the 26S proteasome (single-capped), and two ends, the 30S Proteasome (double-capped, this complex). While both 19S regulatory particles can engage with a protein substrate and be functional, it is thought that the proteasome function is more efficient if the opposite side to substrate entry side serves for peptide exit. Thus, concurrent functionality of both 19S particles may be mutually exclusive and the 30S Proteasome may function most efficiently as a single capped 26S Proteasome. A curated stable macromolecular complex (Complex Portal) with 33 subunits.
