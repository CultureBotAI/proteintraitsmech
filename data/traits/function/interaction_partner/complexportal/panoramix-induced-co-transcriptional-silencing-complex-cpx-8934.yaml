identifier: ComplexPortal:CPX-8934
label: "Panoramix-induced co-transcriptional silencing complex"
definition: >-
  Directs piRNA-guided co-transcriptional gene silencing (TGS) of transposon insertions, anchoring Piwi‐(RNA‐induced silencing complex) to target RNAs through the Nxf2 LRR domain (IPR001611). Tethering of the complex to nascent RNA induces heterochromatin formation independent of Piwi and piRNAs. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
