identifier: ComplexPortal:CPX-26526
label: "Septin1-Septin2-pnut complex"
definition: >-
  Complex regulates actomyosin ring assembly, contraction and disassembly during cell wound repair, playing a key role in preventing cell damage and death during physiological and environmental stresses. Interacts with F-actin and promotes its bundling and bending. Complex formation and function is regulated by Anillin (Q9V4P1). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
