identifier: ComplexPortal:CPX-8172
label: "PBA3-PBA4 proteasomal chaperone complex"
definition: >-
  Chaperone complex with a role in the early stage assembly of the 26S proteasome (CPX-2262). Binds to the bottom of the alpha ring as it assembles, on the opposite side to the PBA1-PBA2 complex (CPX-8171) and is assumed to enforce the proper configuration of the ring and prevent the premature binding of other complexes which interact with the core barrel-shaped chamber. PBA3-PBA4 appears to disengage shortly after completion of the alpha-ring. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
