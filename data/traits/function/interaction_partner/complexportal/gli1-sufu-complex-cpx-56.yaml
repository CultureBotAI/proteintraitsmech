identifier: ComplexPortal:CPX-56
label: "GLI1-SUFU complex"
definition: >-
  Transcriptional modulator complex, the formation of which regulates the activity of GLI transcription factors. Role as a negative regulator of the hedgehog-signalling network and plays a fundamental role in the control of development, cell proliferation and differentiation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
