identifier: ComplexPortal:CPX-26563
label: "Phosphopantothenoylcysteine decarboxylase complex"
definition: >-
  Catalyzes decarboxylation of 4'-phosphopantothenoylcysteine to yield 4'-phosphopantetheine; the third step in the biosynthesis of Coenzyme A (CoA). The synthesis of CoA involves the phosphorylation of pantothenate (vitamin B5) to 4'-phosphopantothenate, to which a cysteine is then added to form 4'-phospho-N-pantothenoylcysteine (PCC). PPC is decarboxylated to 4'-phosphopantetheine by phosphopantothenoylcysteine decarboxylase (this complex). 4'-phosphopantetheine is adenylylated to form dephospho-CoA which is then phosphorylated to form coenzyme A. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
