identifier: ComplexPortal:CPX-1874
label: "Platelet-derived growth factor AA complex"
definition: >-
  A-chain of the platelet-derived growth factor (PDGF). Binds to and activates PDGF receptor alpha subunit (PDGFRalpha, P16234) by inducing receptor dimerisation and tyrosine phosphorylation. Is a potent mitogen for cells of mesenchymal origin. Plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Required for normal lung alveolar septum formation during embryogenesis, normal development of the gastrointestinal tract, normal development of Leydig cells and spermatogenesis. Required for normal oligodendrocyte development and normal myelination in the spinal cord and cerebellum. Plays an important role in wound healing. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
