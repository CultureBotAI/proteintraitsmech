identifier: ComplexPortal:CPX-2131
label: "alpha-D-mannose 1,6-phosphomutase"
definition: >-
  Catalyzes the conversion of d-mannose 6-phosphate to alpha-d-mannose 1-phosphate. Required for GDP-mannose and dolichol-phosphate-mannose biosynthesis. Mutations in this protein may cause the congenital disease congential disorder of glycosylation type 1a (CDG-1a). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
