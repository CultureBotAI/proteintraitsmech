identifier: ComplexPortal:CPX-3296
label: "Fucose-binding lectin II complex"
definition: >-
  Fucose-binding lectin responsible for adhesion of Pseudomonas aeruginosa to the lung mucins. P. aeruginosa infection is a major cause of morbidity and mortality in cystic fibrosis patients. It colonises patients with chronic lung diseases, particularly those on assisted ventilation, and especially cystic fibrosis patients. Adheres to surfaces, forms biofilms and secretes hydrolytic enzymes and toxic compounds. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
