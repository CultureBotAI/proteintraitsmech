identifier: ComplexPortal:CPX-5770
label: "MERS-CoV nucleocapsid complex"
definition: >-
  Forms the helical ribonucleocapsid (RNP) of the SARS-CoV coronavirus. Packages the positive strand viral genome RNA and plays a fundamental role during virion assembly through its interactions with the viral genome and membrane protein M (K9N7A1). Recognises and binds to a packaging signal, a cis-regulatory element encoded within the viral RNA. Plays an important role in enhancing the efficiency of subgenomic viral RNA transcription as well as viral replication. May form viral-like particles (VLPs) together with proteins M, E (K9N5R3) and S (K9N5Q8) without the requirement of genomic RNA (by similarity from SARS-CoV, CPX-5720). By analogy from SARS-CoV-2 (CPX-5686), may inhibit type I interferon (IFN-beta) activation and downstream innate immune responses. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
