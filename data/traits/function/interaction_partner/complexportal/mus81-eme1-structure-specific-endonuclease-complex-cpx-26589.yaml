identifier: ComplexPortal:CPX-26589
label: "MUS81-EME1 structure-specific endonuclease complex"
definition: >-
  Structure-specific endonuclease that plays an important role in rescuing stalled replication forks and resolving the mitotic recombination intermediates. Has a substrate preference for branched DNA structures with a 5' end at the branch nick with cleavage probably occurring approximately half a helical turn upstream of the free 5-prime end. Resolves the four-way Holliday junction (HJ) in which the two recombining DNAs are covalently-linked junctions in crossover formation during meiotic recombination. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
