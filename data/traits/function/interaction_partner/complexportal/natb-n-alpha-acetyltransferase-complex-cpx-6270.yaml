identifier: ComplexPortal:CPX-6270
label: "NatB N-alpha-acetyltransferase complex"
definition: >-
  N(alpha)-acetyltransferases responsible for the covalent attachment of an acetyl group (CH3CO) to the free alpha-amino group (NH3+) at the N-terminal end of a polypeptide, one of the most common co-translational modifications. This changes the electrostatic properties of proteins and therefore protein function, stability and localization. NatB is responsible for the acetylation of methionine-acidic/hydrophilic N-termini (Met-Asp-, Met-Asn-, Met-Glu-, and Met-Gln-). Required for normal cell cycle progression. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
