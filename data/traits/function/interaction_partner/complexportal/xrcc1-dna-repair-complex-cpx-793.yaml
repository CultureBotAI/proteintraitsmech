identifier: ComplexPortal:CPX-793
label: "XRCC1 DNA repair complex"
definition: >-
  DNA repair scaffold that supports base excision repair, single strand break repair, and other repair pathways. sensing of single strand breaks relies primarily on poly(ADP-ribose)polymerase 1 (PARP1)-dependent auto PARylation. The ADP-ribose of PAR polymers mediate recruitment of XRCC1 via binding at its BRCT I domain. DNA end processing; Poly(ADP-ribosylation) results in the recruitment of the XRCC1 complex which converts different types of damaged termini to 3'-hydroxyl and 5'-phosphate termini. POLB removes 5'-deoxyribose phosphate termini during break excision repair, PNKP removes 3'-phosphate and 5'-hydroxyl termini. APTX removes 5'-AMP during abortive DNA ligation events, and TDP1 can remove a variety of covalent adducts from DNA through hydrolysis of a 3'-phosphodiester bond, giving rise to DNA with a free 3' phosphate. Gap filling. POLB replaces the single missing nucleotide at the SSBs during short-patch repair. The remaining nick is ligated by the LIG3. APLF supports non-homologous end joining and requires binding to XRCC1 for transport into the nucleus. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
