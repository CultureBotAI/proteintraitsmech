identifier: ComplexPortal:CPX-4821
label: "unc-51-atg-13 complex"
definition: >-
  Serine/threonine kinase complex. Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. The complex is recruited to preautophagosomes by lgg-1 (Q09490) and is in turn required for the recruitment of other autophagy proteins, and for autophagosome formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
