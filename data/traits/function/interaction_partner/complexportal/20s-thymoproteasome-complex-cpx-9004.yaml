identifier: ComplexPortal:CPX-9004
label: "20S thymoproteasome complex"
definition: >-
  Multi-enzyme complex that functions as the primary degradation machinery for the selective turnover of surplus or damaged proteins within the cell. An immune-type proteasome expressed exclusively and constitutively expressed in the cortex of the thymus by cortical thymic epithelial cells (cTECs). The beta-5i (P28062) subunit is replaced by the cTEC-specific beta-5t (A5LHX3) subunit along with beta-1i (P28065) and beta-2i (P40306) subunits.. The thymoproteasome is essential for the optimal production and repertoire formation of CD8+ cells, and their homeostasis. Thymoproteasome-generated self-peptides associated with MHC class I molecules expressed by cTECs are thought to contribute to this positive selection of CD8+ cells. Specific to the thymoproteasome, the beta-5t subunit is a useful diagnostic marker in tracking disease progression of certain thymic epthelial tumours. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
