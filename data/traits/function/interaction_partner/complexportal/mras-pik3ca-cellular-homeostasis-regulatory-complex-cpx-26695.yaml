identifier: ComplexPortal:CPX-26695
label: "MRAS-PIK3CA cellular-homeostasis regulatory complex"
definition: >-
  Phosphatidylinositol 3-kinase (PI3K) activation complex which acts as a molecular switch maintaining cellular homeostasis by coordinating a broad range of essential processes, including glucose absorption, anabolic metabolism, cell growth, and survival. Once active, PIK3CA phosphorylates its substrate, PIP2 (ChEBI:18348), to generate PIP3 (ChEBI:16618), which in turn activates downstream signalling, including the AKT-mTOR pathway. This promotes cell survival by inhibiting pro-apoptotic factors, stimulate cell growth and proliferation through mTORC1 activation, and regulates metabolism by enhancing glucose uptake and glycolysis. Mutations in MRAS and PIK3CA are implicated in various cancers. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
