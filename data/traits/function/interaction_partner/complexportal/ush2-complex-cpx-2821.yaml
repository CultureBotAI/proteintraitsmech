identifier: ComplexPortal:CPX-2821
label: "USH2 complex"
definition: >-
  Required for cochlear stereociliary bundle development. essential for stereociliary diameter and differentiation in inner ear hair cells and for stereociliary rigidity and V-shaped three-row organization in outer ear hair cells. Form ankle links, thin fibers that connect the bases of neighboring stereocilia and only exist during development. Defects in the complex result in disorganization of the stereocilia bundle. The complex may also form in photo receptors although the presence of PDZD7 has not been proven in that location. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
