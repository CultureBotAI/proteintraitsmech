identifier: ComplexPortal:CPX-2747
label: "BBSome complex"
definition: >-
  The BBSome complex is thought to function as a coat complex required for sorting of specific membrane proteins to the primary cilia. The BBSome complex is required for ciliogenesis but is dispensable for centriolar satellite function. It is involved in the trafficking of membrane proteins to primary cilia and interacts with IFT-A and IFT-B complexes in the intraflagella transport system. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
