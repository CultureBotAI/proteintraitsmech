identifier: ComplexPortal:CPX-8109
label: "CRL3 E3 ubiquitin ligase complex, KLHL20 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL20 target proteins include the transcription regulator ZBTB7A (O95365) which regulates the transcription of genes involved in cell proliferation and differentiation and the alcium/calmodulin-dependent serine/threonine kinase DAPK (P53355/Q9UIK4/O43293), a mediator of interferon-induced cell death. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
