identifier: ComplexPortal:CPX-3023
label: "Thrombospondin 2 complex"
definition: >-
  Secreted glycoprotein that functions during the tissue remodeling that is associated with development, wound healing, synaptogenesis, angiogenesis, and cancer. Through its interactions with proteins and proteoglycans, such as glycosaminoglycans, low density lipoprotein receptor-related protein-1, various integrins, calreticulin, and fibrinogen, TSP-2 functions at the interface of the cell membrane and the extracellular matrix to regulate matrix structure and cellular behaviour. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
