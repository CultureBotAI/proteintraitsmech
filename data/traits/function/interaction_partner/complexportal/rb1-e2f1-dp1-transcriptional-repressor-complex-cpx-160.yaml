identifier: ComplexPortal:CPX-160
label: "RB1-E2F1-DP1 transcriptional repressor complex"
definition: >-
  Formation of this complex, by binding to Rb1 to the E2F1-DP1 transcription factor complex (CPX-159), negatively regulates the G1-S transition by blocking the transactivation domain of E2F1. RB1 dissociates from the complex following hyperphosphorylation by cyclin-dependent kinases. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
