identifier: ComplexPortal:CPX-7665
label: "60S cytosolic large ribosomal subunit, striated muscle variant"
definition: >-
  Component of the ribosome, the site of protein biosynthesis resulting from translation of messenger RNA (mRNA). Responsible for the catalytic activity of the ribosome, the peptidyltransferase activity required to catalyze peptide bond formation. The nascent polypeptides leave the ribosome through a tunnel in the large subunit and interact with protein factors that function in enzymatic processing, targeting, and the membrane insertion of nascent chains at the exit of the ribosomal tunnel. This variant is found only in the heart and skeletal muscle and regulates striated muscle function. A curated stable macromolecular complex (Complex Portal) with 48 subunits.
