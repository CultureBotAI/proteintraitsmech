identifier: ComplexPortal:CPX-324
label: "Positive transcription elongation factor B, CDK9-cyclinT2b complex"
definition: >-
  A serine kinase complex that phosphorylates elongation pausing factors (e.g. DSIF - DRB sensitivity-inducing factor and NELF - negative elongation factor) and Ser-2 and Ser-5 of RNA polymerase II (RNA Pol II), thus positively regulating productive mRNA elongation through the gene body after promoter-proximal pausing of RNA Pol II. Involved in cotranscriptional histone modification, mRNA processing mRNA export and myocyte differentiation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
