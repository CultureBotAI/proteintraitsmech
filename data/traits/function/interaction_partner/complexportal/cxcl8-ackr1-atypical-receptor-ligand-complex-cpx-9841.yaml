identifier: ComplexPortal:CPX-9841
label: "CXCL8-ACKR1, atypical receptor-ligand complex"
definition: >-
  Atypical chemokine-receptor complex that controls the bioavailability of CXCL8 and its localization. Produced mainly by non-leukocytes, ACKR1 primarily acts as a scavenging receptor to dampen CXCL8 mediated immune responses by binding, internalizing, and degrading it. However, ACKR1 can promote CXCL8 transcytosis promoting inflammation. ACKR1 is used by Plasmodium vivax and Plasmodium knowlesi as an entry receptor for erythrocyte invasion and a silencing mutation in ACKR1's promoter region is associated with a resistance to malaria found in the majority of Sub-saharan Afrian populations. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
