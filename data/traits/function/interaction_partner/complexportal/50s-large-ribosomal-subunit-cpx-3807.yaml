identifier: ComplexPortal:CPX-3807
label: "50S large ribosomal subunit"
definition: >-
  Component of the ribosome, the site of protein biosynthesis resulting from translation of messenger RNA (mRNA). A ribosome is made two subunits - a smaller 30S subunit (CPX-3802) which binds to a larger subunit and the mRNA pattern, and a larger 50S subunit which binds to the tRNA, the amino acids, and the smaller subunit. When a ribosome finishes reading an mRNA molecule, these two subunits split apart. The 30S subunit is responsible for the catalytic activity of the ribosome, the peptidyltransferase activity required to catalyze peptide bond formation. A curated stable macromolecular complex (Complex Portal) with 36 subunits.
