identifier: ComplexPortal:CPX-4948
label: "NLRP1 inflammasome, variant 2"
definition: >-
  A pro-inflammatory thiol protease complex that assembles in the cytosol in response to pathogens and other damage-associated signals and play critical roles in innate immunity and inflammation. Activating platform for caspa and caspb through proximity-induced self-cleavage in ATP-dependent reactions. Pro-caspa is preferentially recruited and then activated. . Activated caspa (CPX-4947) causes the initial cleavage of pro-il1b (E0WCW4), the first step in the activation process of this protein. This is followed by the recruitment of caspb, which is activated and further cleaves il1b resulting in il1b maturation and secretion in the extracellular milieu. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
