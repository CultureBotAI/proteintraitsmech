identifier: ComplexPortal:CPX-2850
label: "METTL5-TRM112 methyltransferase complex"
definition: >-
  S-adenosylmethionine-dependent methyltransferase which catalyzes the N6-methyl-adenine (m6A) modification at position 1832 of 18S rRNA m6A modification thus playing a role in translation and embryonic stem cells pluripotency and differentiation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
