identifier: ComplexPortal:CPX-1305
label: "SLBP-SLIP1 complex"
definition: >-
  As part of the histone translation initiation machinery SLBP-SLIP1 complex binds the 3-prime-stem-loop structure of histone mRNA (hmRNA), facilitates its translation initiation and may also be involved in its processing and nuclear export. Remodels the mRNA ribonucleoprotein complexes (RNPs) from nuclear to cytoplasmic specificity. mif4gd subunit interacts with the eIF4F complex, the cytoplasmic cap-binding complex that binds the 5-prime histone mRNA cap. eIF4F complex binding facilitates the circularisation of hmRNA that is required for its translation. Acts exclusively during G1/S transition when histones are in greatest demand. Both the complex and hmRNA are degraded at the end of S phase when Thr-80 and Thr-81 of slbp are phosphorylated (as shown in human ortholog). Translation of histones during other cell phases cause defects and can be toxic to the cell. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
