identifier: ComplexPortal:CPX-850
label: "AHNAK - Annexin A2 - S100-A10 complex"
definition: >-
  Calcium-dependent membrane-tethering complex that acts on ruptured membranes and aids general membrane organisation. Rapid influx of Ca2+ at the rupture site activates complex formation by Ca2+ binding to Annexin A2; repair activity may also require dysferlin (O75923). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
