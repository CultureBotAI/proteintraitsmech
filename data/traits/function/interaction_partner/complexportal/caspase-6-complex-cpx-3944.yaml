identifier: ComplexPortal:CPX-3944
label: "Caspase-6 complex"
definition: >-
  A cysteine protease complex that specifically cleaves substrates with an aspartic acid residue at position P1 and has a preferred cleavage sequence of Val-Glu-His-Asp-|-. Caspase-6 is an initiator enzyme involved in the activation cascade of caspases responsible for apoptosis execution. Caspase-6 is capable of autoactivation and/or may be activated via proteolytic cleavage by Caspase-3 (CPX-3803) or Caspase-8 (CPX-3663). Once activated it cleaves pro-Caspase-2 (P29594) and pro-Caspase-8 (O89110) allowing their oligomerization into active Caspase-2 (CPX-3901) and Caspase-8. Caspase-6 induces mitochondrial permeabilisation, which leads to cytochrome c (P62897) release and activation of the Apotosome (CPX-3824). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
