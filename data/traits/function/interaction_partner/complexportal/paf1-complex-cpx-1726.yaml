identifier: ComplexPortal:CPX-1726
label: "PAF1 complex"
definition: >-
  A multifunctional complex involved in many aspects of RNA polymerase II (Pol II) transcriptional regulation, including transcriptional elongation, 3'-terminal end processing, and histone modification. Role in 3'-end formation of mRNAs, required for the recruitment of cleavage and polyadenylation factors CFT1 and PCF11 to RNA polymerase II. Required for activation of the RAD6/UBC2-BRE1 ubiquitin ligase complex, which ubiquitinates histone H2B to form H2BK123ub1. Also required for the methylation of histone H3 by the COMPASS complex (CPX-1039) to form H3K4me, by SET2 to form H3K36me, and by DOT1 to form H3K79me. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
