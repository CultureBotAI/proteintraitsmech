identifier: ComplexPortal:CPX-5601
label: "Alternative pathway C3 convertase complex C3bBb"
definition: >-
  A serine-type endopeptidase complex of the alternative pathway of complement activation of the innate immune system. Cleaves Complement C3 precurser (P01024) into anaphylatoxin C3A (P01024-PRO_0000005910) and nascent core-convertase component C3b (CPX-973). Occurs in the fluid-phase and binds host and pathogen cells. C3bBb convertase is unstable. In fluid-phase or when bound to the host cell it is readily inactivated by Factor H (P08603), CR1 (P17927) or DAF (P08174, only on host cells) thus preventing autoimmune activation. Lack of protection, due to familial mutations in the complement genes or the presence of autoantibodies against regulators has been linked to atypical hemolytic uremic syndrome (aHUS) and C3 glomerulopathies (C3G) in kidneys and age-related macular degeneration (AMD) in eyes. Conditions of chronic and acute inflammations, as in rheumatoid arthritis, strokes, and heart attacks, become aggravated by complement activation against the disturbed tissue. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
