identifier: ComplexPortal:CPX-1132
label: "gls-1-gld-3 complex"
definition: >-
  Translation regulator complex which, in early embryos, promotes the expression of mRNAs that encode germline survival factors. During hermaphrodite development, the complex promotes the sperm/oocyte switch by freeing the translational repressor fbf-1 to turn off sperm promoting factors. The complex is essential for germline survival during post-embryonic germline development. Upon dissociation of the complex, germ cells fail to survive into adulthood. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
