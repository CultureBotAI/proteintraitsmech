identifier: ComplexPortal:CPX-956
label: "GET complex"
definition: >-
  Required for the post-translational delivery of tail-anchored (TA) proteins to the endoplasmic reticulum. GET1 and GET2 act as a membrane receptor for soluble GET3, which recognizes and selectively binds the transmembrane domain of TA proteins in the cytosol, delivered to it by the GET4-GET5 transmembrane domain recognition complex (CPX-1861). Cooperates with the HDEL receptor ERD2 (P18414) to mediate the ATP-dependent retrieval of resident endoplasmic reticulum proteins that contain a C-terminal HDEL retention signal from the Golgi to the endoplasmic reticulum. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
