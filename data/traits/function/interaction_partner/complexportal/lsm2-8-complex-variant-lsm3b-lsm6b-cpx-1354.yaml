identifier: ComplexPortal:CPX-1354
label: "LSM2-8 complex, variant LSM3B-LSM6B"
definition: >-
  A ringshaped protein complex that selectively binds to snRNAs and to unspliced transcripts localized within the nucleus. In the U6 snRNP spliceosome machinery stabilises U6 small nuclear RNA (U6 snRNA) to ensure the efficiency and accuracy of constitutive and alternative splicing of selected pre-mRNAs depending on the environmental conditions. Loss of LMS8 leads to a range of severe developmental abnormalities. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
