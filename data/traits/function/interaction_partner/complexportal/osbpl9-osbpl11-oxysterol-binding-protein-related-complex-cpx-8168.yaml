identifier: ComplexPortal:CPX-8168
label: "OSBPL9-OSBPL11 oxysterol-binding protein-related complex"
definition: >-
  Lipid binding complex which plays a critical role in regulating phosphatidylinositol 4-phosphate in the trans-Golgi network, maintaining maintain lipid homeostasis between the endoplasmic reticulum and trans-Golgi network and regulating vesicle trafficking..Recruited by phosphatidylinositol-4 kinase type 2-alpha PI4K2A (Q9BTU6) following lysosomal membrane permeabilization to create new membrane contact sites between damaged lysosomes and the endoplasmic reticulum and transfer phosphatidylserine and cholesterol to support rapid lysosomal repair. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
