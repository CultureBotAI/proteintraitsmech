identifier: ComplexPortal:CPX-5022
label: "Intraflagellar transport complex B"
definition: >-
  IFT particles, composed of the IFT-A (CPX-5021) and IFT-B complexes, enable bidirectional motility along axoneme microtubules essential for the formation (ciliogenesis) and maintenance of cilia that assemble within a membrane projection from the cell surface. Outward or anterograde movement from the cell body to the ciliary tip is powered by kinesin-2 while the inward or retrograde movement back to the cell body is powered by cytoplasmic Dynein-2 motor. Required to recruit TULP3 (O75386) to primary cilia to allow entry into cilia of G protein-coupled receptors (GPCRs). Interacts with the BBSome complex (CPX-1908) to mediate ciliary transport. Patients with mutations in IFT-B complex subunits develop ciliopathies. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
