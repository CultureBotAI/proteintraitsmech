identifier: ComplexPortal:CPX-1706
label: "Acyl-CoA ceramide synthase complex"
definition: >-
  Synthesizes ceramide from the reaction of a C26 fatty acyl-CoA with a sphingoid base, thus controlling cell growth, and mediating different cellular events, such as apoptosis, growth arrest, endocytosis and stress response. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
