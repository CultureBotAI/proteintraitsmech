identifier: ComplexPortal:CPX-26736
label: "Eukaryotic translation initiation factor 2B complex"
definition: >-
  Plays a critical regulatory role in eukaryotic translation initiation. Acts as a guanine nucleotide exchange factor (GEF) catalyzing the exchange of GDP on eIF2-GDP for GTP, thus reactivating eIF2 and allowing subsequent rounds of translation initiation. This activity is inhibited by the when phosphorylated eIF2 (alpha subunit) binds to eIF2B. Phosphorylation of eIF2 occurs in response to nutrient starvation and thus prevents further protein synthesis. eIF2B also acts as a GDP dissociation inhibitor (GDI) displacement factor that can recruit eIF2 from the eIF2.GDP/eIF5 GDI complex prior to GEF action. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
