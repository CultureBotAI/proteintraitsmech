identifier: ComplexPortal:CPX-3568
label: "CcmABCDE system I cytochrome c biogenesis complex"
definition: >-
  Required for the covalent ligation of heme to a C1XXC2H heme-binding site in an apo-cytochome C. CcmABCD is homologous to the eukaryotic-type ABC transporters and are responsible for conveying heme b to the periplasm and loading it to the heme-chaperone CcmE ccmC binds heme b non-covalently via its two transmembrane His residues. Once heme b reaches the periplasm, it is thought to interact with the WWD domain of ccmC and the hydrophobic heme-binding region of ccmE. ATP hydrolysis by ccmAB may be required for the release of heme-bound ccmE from the complex. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
