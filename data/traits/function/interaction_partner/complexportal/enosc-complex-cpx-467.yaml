identifier: ComplexPortal:CPX-467
label: "eNoSc complex"
definition: >-
  A chromatin silencing complex that recruits histone-modifying enzymes and upregulates silencing of rDNA in response to glucose starvation. Upon glucose starvation, elevation of NAD+/NADP+ ratio activates SIRT1, leading to histone H3 deacetylation followed by dimethylation of H3 at Lys-9 (H3K9me2) by SUV39H1 and the formation of silent chromatin in the rDNA locus. Glucose deprivation increases the affinity between SIRT1 and SUV39H1 and consequently strengthens the interaction between RRP8 and SIRT1. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
