identifier: ComplexPortal:CPX-8468
label: "GluK2 glutamate ionotropic kainate-type receptor complex"
definition: >-
  An ionotropic glutamate receptor which localizes either post-synaptically to drive synaptic depolarization or pre-synaptically to regulate neurotransmitter release. Belonging to the kainate-type glutamate receptors (KARs) sub-family, GluKs are ligand-gated cation channels activated by the neurotransmitter L-glutamate. GluKs play complex roles in neural development and CNS function. Implicated in neurodevelopmental disorders leading to intellectural disability as well as, nervous system disorders including epilepsy, neuropathic pain, austism, bipolar disorder and schizophrenia. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
