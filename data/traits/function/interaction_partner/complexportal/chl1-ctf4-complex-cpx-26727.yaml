identifier: ComplexPortal:CPX-26727
label: "CHL1-CTF4 complex"
definition: >-
  Functions as a replisome-organizing module that coordinates DNA replication fork progression with sister chromatid cohesion establishment during S phase. CTF4 acts as a replisomal interaction hub, recruiting the CHL1 helicase to the CMG helicase (CPX-297) via a conserved binding motif shared with GINS (CPX-1641) and DNA polymerase-alpha. This coupling links DNA unwinding to lagging-strand priming, promoting efficient replication, particularly under conditions of nucleotide depletion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
