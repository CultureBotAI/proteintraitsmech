identifier: ComplexPortal:CPX-11781
label: "Lyric-SND1 RNA regulator complex"
definition: >-
  Regulator of RNA metabolism with potential roles in modulating RNA alternative splicing, maturation, and stability. It inhibits T-cell infiltration and activation by binding to "TAP1/2" mRNA and promoting its degradation, thereby preventing formation of the TAP antigen peptide transporter complex (CPX-25769). The complex enhances malignant phenotypes by orchestrating tumour-promoting processes particularly during the initiation phase of tumor development. It is implicated in various cancer types and has been shown to be essential for cancer cell survival under oncogenic stress. Complex is implicated in breast and prostate cancer, and is thought to bind and degrade SESN2 (P58004) mRNA, modulating prostate cancer progression through the AMPK/mTOR pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
