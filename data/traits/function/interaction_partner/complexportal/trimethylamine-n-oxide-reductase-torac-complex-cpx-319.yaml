identifier: ComplexPortal:CPX-319
label: "Trimethylamine-N-oxide reductase TorAC complex"
definition: >-
  Reduces trimethylamine-N-oxide (TMAO) to trimethylamine, enabling its use under anaerobic conditions as an electron acceptor for the oxidation of organic substrates and the production of energy. TorAC is also present under aerobic conditions, when production of alkaline trimethylamine may balance the acidification of the cell caused by generation of acetic acid caused by glycerol utilization. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
