identifier: ComplexPortal:CPX-2735
label: "Nuclear exosome targeting complex"
definition: >-
  Promotes the exosomal degradation of a subset of non-coding promoter-upstream transcripts, enhancer RNAs and 3′-extended products of histone and small nuclear RNA transcription. It also targets intronic RNA for decay and/or processing of embedded small nucleolar RNAs. Most probably acts by disentangling ribonucleoprotein complexes and threading unwound RNAs into the nuclear exosome channel (CPX-476, CPX-591). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
