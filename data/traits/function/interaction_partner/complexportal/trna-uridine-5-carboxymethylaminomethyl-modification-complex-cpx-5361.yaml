identifier: ComplexPortal:CPX-5361
label: "tRNA uridine 5-carboxymethylaminomethyl modification complex"
definition: >-
  Catalyzes the formation of a carboxymethylaminomethyl (cmnm)4 group at the 5 position of the wobble uridine (U34) of tRNAs reading 2-fold degenerated codons ending with A or G. This modification (cmnm5U34) combined with thiolation at the 2 position favors the interaction with A and G but suppresses base pairing with C and U and plays a regulatory role in gene expression. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
