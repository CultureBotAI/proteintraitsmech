identifier: ComplexPortal:CPX-3964
label: "fadBA fatty acid oxidation complex, aerobic conditions"
definition: >-
  Catalyzes the final step of fatty acid oxidation in the beta-oxidation pathway. The beta-oxidation pathway acts in a cyclic fashion, in which each cycle results in shortening the input acyl-CoA by two carbon atoms to give acetyl-CoA. Produced acetyl-CoA molecules enter the citric acid cycle (Krebs cycle) to be oxidized for energy production. This complex has five separate enzymatic activities including hydration, oxidation and thiolytic cleavage functions. Escherichia coli uses fatty acids as a sole carbon and energy source during aerobic growth. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
