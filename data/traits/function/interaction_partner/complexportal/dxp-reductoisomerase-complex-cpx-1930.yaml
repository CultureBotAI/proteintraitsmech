identifier: ComplexPortal:CPX-1930
label: "DXP reductoisomerase complex"
definition: >-
  Enzyme involved in the 2-C-methyl-D-erythritol 4-phosphate pathway of isopentenyl diphosphate biosynthesis. It catalyzes the NADP-dependent rearrangement and reduction of 1-deoxy-D-xylulose-5-phosphate (DXP) to 2-C-methyl-D-erythritol 4-phosphate (MEP). DXR is a promising target for the design of herbicidal, antibacterial, and antimalarial substances. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
