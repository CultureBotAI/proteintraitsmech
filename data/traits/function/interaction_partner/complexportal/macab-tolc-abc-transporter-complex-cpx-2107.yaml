identifier: ComplexPortal:CPX-2107
label: "MacAB-TolC ABC transporter complex"
definition: >-
  Tripartite, ATP-dependent efflux pump spanning the entire cell membrane system. Drives the efflux of antibiotics and other toxins (specifically macrolide compounds containing 14- and 15-membered lactones). May also play a role in the transport of glycolipids. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
