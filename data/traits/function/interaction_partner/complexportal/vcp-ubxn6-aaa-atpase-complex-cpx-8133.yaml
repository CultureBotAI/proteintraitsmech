identifier: ComplexPortal:CPX-8133
label: "VCP-UBXN6 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Promotes PRKN (O60260)-dependent mitophagy by specifically recognizing damaged mitochondria undergoing autophagic clearance. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
