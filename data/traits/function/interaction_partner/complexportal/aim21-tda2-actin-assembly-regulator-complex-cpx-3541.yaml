identifier: ComplexPortal:CPX-3541
label: "AIM21-TDA2 actin assembly regulator complex"
definition: >-
  Localizes to actin cortical patches at sites of endocytosis and negatively regulates barbed end F-actin assembly, resulting in the generation of free actin pools. Necessary for efficient endocytosis and balancing the distribution of actin between patches and cables. Interacts with, and may regulate the activity of, the F-actin capping protein complex (CPX-1637). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
