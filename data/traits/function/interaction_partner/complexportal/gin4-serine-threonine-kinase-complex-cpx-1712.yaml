identifier: ComplexPortal:CPX-1712
label: "Gin4 serine/threonine kinase complex"
definition: >-
  Serine/threonine kinase complex that assembles when cells enter mitosis. The associated GIN4 molecules present in this complex phosphorylate each other, leading to GIN4 hyperphosphorylation and activation. This mechanism appears to ensure GIN4 is only activated during mitosis. GIN4 is involved in septin ring formation during mitosis. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
