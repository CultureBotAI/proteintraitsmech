identifier: ComplexPortal:CPX-1754
label: "Collagen type XIII trimer"
definition: >-
  Nonfibrillar collagen that has been detected at low levels in all connective tissue-producing cells so may serve a general function in connective tissues. Collagen XIII contains a transmembrane domain and the protein has been localized to the plasma membrane. Binds heparin. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
