identifier: ComplexPortal:CPX-1145
label: "E2F2-DP1 transcription factor complex"
definition: >-
  Probable transcription factor complex which binds DNA through the E2 recognition site, 5'-TTTC[CG]CGC-3', typically associated with the promoters of genes active in S phase, activating genes that stimulate DNA synthesis and cell cycle advancement. Regulates the expression of genes such as ced-3 and ced-4, which are involved in programmed cell death in germ cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
