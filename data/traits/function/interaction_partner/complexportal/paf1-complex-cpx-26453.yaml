identifier: ComplexPortal:CPX-26453
label: "PAF1 complex"
definition: >-
  A multifunctional complex involved in many aspects of RNA polymerase II (Pol II) transcriptional regulation, including transcriptional elongation, 3'-terminal end processing, and histone modification. Role in 3'-end formation of mRNAs, required for the recruitment of cleavage and polyadenylation factors cft1 (O74733) and pcf11 (Q1023) to RNA polymerase II. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
