identifier: ComplexPortal:CPX-6662
label: "tRNA-guanine transglycosylase complex"
definition: >-
  Catalyzes the base-exchange of a guanine (G) residue with queuine (Q) at position 34 (anticodon wobble position) in tRNAs with GUN anticodons (tRNA-Asp, -Asn, -His and Tyr), resulting in the hypermodified nucleoside queuosine (7-(((4,5-cis-dihydroxy-2-cyclopenten-1-yl)amino)methyl)-7-deazaguanosine). Q34 appears to enhance the speed of translation of C-ending codons but reduced that of U-ending codons. In human cytoplasm, tRNAs for His and Asn have queuosine, whilst in mitochondria, queuosine occurs at the wobble positions of tRNAs for Tyr, His, Asn and Asp. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
