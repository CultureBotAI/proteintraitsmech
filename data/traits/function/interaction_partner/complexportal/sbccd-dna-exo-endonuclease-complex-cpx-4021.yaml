identifier: ComplexPortal:CPX-4021
label: "sbcCD DNA exo/endonuclease complex"
definition: >-
  Combined ATPase/endo/ 3-prime exonuclease complex which both senses and removes blocked DNA ends. The hydrolysis of ATP enables the complex to cleave DNA 15–25 base pairs away from diverse blocks through endonuclease activity. Displays a preference for hairpin secondary structures in DNA which it cleaves close to the unpaired tip. SbcCD can also cleave 4-strand cruciforms and can open hairpin-capped ends. Cleaves at secondary structures formed by inverted repeats, or palindromic DNA sequences, producing double-strand breaks. The complex is also required to repair breaks made by restriction endonuclease activity and its exonuclease activity may process the ends of broken chromosomes. May bind and coordinate the two ends of broken DNA molecules to assist in their repair and may remove covalently attached or tightly bound proteins that interfere with end processing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
