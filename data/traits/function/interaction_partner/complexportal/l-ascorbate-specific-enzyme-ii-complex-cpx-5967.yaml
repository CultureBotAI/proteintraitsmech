identifier: ComplexPortal:CPX-5967
label: "L-ascorbate-specific enzyme II complex"
definition: >-
  Involved in the transport of L-ascorbic acid across the cell membrane as part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS). A phosphoryl group is transferred from hpr (P0AA04) to ulaC (IIA), from ulaC to ulaB (IIB) and finally from ulaB onto the incoming sugar bound to membrane-embedded laA (IIC). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
