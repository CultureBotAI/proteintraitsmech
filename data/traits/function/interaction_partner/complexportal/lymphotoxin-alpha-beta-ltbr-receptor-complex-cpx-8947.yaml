identifier: ComplexPortal:CPX-8947
label: "Lymphotoxin-alpha-beta-LTBR receptor complex"
definition: >-
  Asymmetric receptor complex which plays a broad role in thymic function including the development and maintenance of lymphoid organs as well as lymph node remodelling and the induction of IFNG (P01579) and T cell responses during systemic viral infections. The complex's effects are mediated by activating NF-KB. LTA-LTB-LTBR signalling also promotes apoptosis via TRAF3 (Q13114) and TRAF5 (O00463). Expressed by non-hematopoeitic and follicular dendritic cells, dysregulation of LTA and LTB expression on the surface on subsets of activated T and B cells and NK cells is responsible for the pathogenesis of autoimmune diseases. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
