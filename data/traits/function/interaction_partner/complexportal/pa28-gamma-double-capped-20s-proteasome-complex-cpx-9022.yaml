identifier: ComplexPortal:CPX-9022
label: "PA28-gamma double-capped 20S proteasome complex"
definition: >-
  Multi-enzyme complex that functions as the primary degradation machinery for the selective turnover of surplus or damaged proteins within the cell. The core contains the protease active sites (chymotrypsin-like, trypsin-like and peptidylglutamyl-peptide hydrolyzing) that perform the proteolysis reactions in an internal chamber. Regulatory particles referred to as 'caps' act as a discriminating gateway for potential substrates. This complex is formed upon the endogenous proteasomal activator, PA28, a 28 kDa protein binding to the 20S proteasome (CPX-8806). PA28 exists as three highly homologous isoforms, alpha, beta and gamma (Q06323, Q9UL46 and P61289 respectively), which differ significantly in their biochemical and biological properties. PA28-gamma is thought to be the most similar to the common PA28 ancestor and likely to have retained its original functions. PA28-gamma is prevalent in the nucleus and is integral to enhancing degradation rates in diverse cellular processes including cell growth and proliferation, apoptosis, chromatin structure and organization and response to DNA damage. PA28-gamma binds in an ubiquitin- and ATP-independent manner to either one (single-cap, CPX-9001) or both ends (double-capped, this complex) of the 20S Proteasome, but the efficiency of substrate processing by single and double-capped proteasomes in not known. Binding of the activator modifies the 20S peptidase and opens its outer alpha-ring gates allowing substrate entry to the antechamber. PA28 also modifies the proteolytic activities of the 20S Proteasome. Complex regulates protein degradation either in a regulated manner upon specific molecular cues or acts on damaged and disordered proteins. Plays a key role under oxidative stress conditions to degrade damaged and unfolded proteins. Promotes proteasomal degradation of several important regulatory proteins including SRC-3 and the tumour suppressor p53, as well as growth-related proteins such as the cyclin-dependent kinase inhibitors p21, p19 and p16 and c-Myc. PA28-gamma subunit is a key regulator of cell growth and proliferation and apoptosis. Dysregulation of PA28-gamma results in induction of malignant tumours in several cancers. PA28-gamma promotes the degradation of multiple proteins including p53 via MDM2-mediated interaction but over-expression of PA28-gamma leads to carcinogenesis through its ability to modulate the Wnt/b-catenin pathway. PA28-gamma in association with PA200, plays a key role in male fertility by their ability to regulate sperm motility. A curated stable macromolecular complex (Complex Portal) with 15 subunits.
