identifier: ComplexPortal:CPX-1967
label: "Plasma membrane fumarate reductase complex"
definition: >-
  Catalyzes the terminal step of anaerobic respiration. Electrons are donated to membrane-bound subunits FrdC and FrdD by 2 quinol (hydroquinone) molecules and transferred to a flavin adenine nucleotide (FAD, covalently-bound to subunit FrdA) through three distinct Fe-S clusters (within subunit FrdB). Ultimately, the electrons are used to reduce FAD-bound fumarate to succinate. Electrons can also be transported in the opposite direction where they are donated by succinate and ultimately reduce quinone to quinol. Member of the Complex II family. The functionally inverse complex found in aerobic respiration is the SQR complex (CPX-1931). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
