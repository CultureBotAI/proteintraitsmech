identifier: ComplexPortal:CPX-430
label: "Eukaryotic translation initiation factor 4F complex, variant TIF4631"
definition: >-
  Binds the 5-prime cap of messenger RNAs to recruit mRNA to the ribosome during translation initiation. During cap-dependent translation, eIF4G1 (TIF4631) brings the 5' end of the mRNA in proximity with the helicase eIF4A (TIF1,TIF2) through interactions with eIF4E (CDC33). Facilitates 48S pre-initiation complex formation through interaction with eIF3 (CPX-1831) in the 43S pre-initiation complex. The relatively weak helicase activity of eIF4A is presumed to be required for unwinding mRNA secondary structures. The poly(A) binding protein PAB1 can bind to eIF4G1 act to stimulate cap-dependent translation initiation, even in the absence of a poly(A) tail. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
