identifier: ComplexPortal:CPX-2759
label: "CRL4-CRBN E3 ubiquitin ligase complex, CUL4A variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor CRBN. The complex is active in a wide range of biological functions, including ion channel regulation, cancer development and biological regulation, immune regulation, energy metabolism regulation through the ubiquitination and subsequent proteasomal degradation of a range of target proteins. Target of thalidomide, lenalidomide and pomalidomide, therapeutically important drugs for multiple myeloma and other B-cell malignancies. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
