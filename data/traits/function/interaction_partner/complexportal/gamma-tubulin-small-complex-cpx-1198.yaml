identifier: ComplexPortal:CPX-1198
label: "Gamma tubulin small complex"
definition: >-
  Seeds microtubule nucleation at microtubule-organizing centres, controlling the location and timing of nucleation. Component of the spindle pole body, which is responsible for the nucleation and organisation of microtubules within the cell, thus playing a role in chromosome segregation in mitosis and meiosis and controlling cytoplasmic interphase microtubules. The complex is bound directly to the spindle pole body by SPC110 (P32380) on the nuclear face and SPC72 (P39723) on the cytoplasmic face. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
