identifier: ComplexPortal:CPX-3135
label: "Ryanodine 1 complex"
definition: >-
  A large homotetrameric intracellular calcium channel predominantly of the skeletal muscle that is crucial for excitation-contraction (E-C) coupling. Following the depolarization of the transverse tubule (T-tubule) membrane, RyR1 opening releases Ca2+ stored in the sarcoplasmic reticulum (SR) into the myoplasm. This increase of cytoplasmic Ca2+ triggers the interaction of actin and myosin that causes contraction of the muscle fibers. Implicated in skeletal muscle development, ossification, dermatogenesis and cardiovascular development. Expressed in the brain, where it can mediate the NO-induced release of Ca2+ from intracellular stores in neurons. The E-C coupling involves the mechanical interaction between RyR1 in the SR and DHPR (also known as L-type Ca2+ channel, CPX-3192) in the T-tubule. There is some evidence to suggest that this happens through the direct physical interaction of the two channels. FKBP12 binds and co-purifies with RyR1, but the intrinsic isomerase activity is not essential for RyR effects. FKBP is believed to physically stabilize the coordinated gating of the four RyRs in one RyR homotetramer and may be involved in the physical coupling between RyR tetramers. RyR1 physically interacts with various other proteins, small molecules and ions that modulate its activity: Low Ca+2 concentration activates RyR1, by binding to specific high-affinity Ca+2 sites. High Ca+2 concentration inhibits RyR1, by binding to less specific low-affinity Ca+2 sites. S100A1 binds speciﬁcally to the puriﬁed RyR1 in a Ca2+ dependent manner, at regions overlapping with CaM binding sites, and enhances the open probability of RyR1 reconstituted in lipid bilayers. TRDN, ASPH, CACNA1S, Homer-1 and ATP stimulates RyR1 channel activity. Calmodulin with bound calcium inhibits the RYR1 channel activity, as is binding to magnesium ions (Mg+2). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
