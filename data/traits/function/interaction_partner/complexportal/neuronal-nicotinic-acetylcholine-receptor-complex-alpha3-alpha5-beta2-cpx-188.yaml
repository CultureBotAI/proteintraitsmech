identifier: ComplexPortal:CPX-188
label: "Neuronal nicotinic acetylcholine receptor complex, alpha3-alpha5-beta2"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous nicotinic agents. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron. Mediates fast, short-lived, predominantly post-synaptic (PMID:8461135) synaptic transmission of neurotransmitters. alpha5 subunit increases burst duration and rate of desensitization compared to alpha3-beta2 variant. Upregulated by pro-inflammatory cytokines, like TNF-alpha. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
