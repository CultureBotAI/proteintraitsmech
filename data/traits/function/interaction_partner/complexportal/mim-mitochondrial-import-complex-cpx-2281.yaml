identifier: ComplexPortal:CPX-2281
label: "MIM mitochondrial import complex"
definition: >-
  Major translocase complex which orchestrates the insertion of precursors of multi-spanning alpha-helical proteins, both N-terminal (signal-anchored) or C-terminal (tail-anchored) anchored, into the mitochondrial outer membrane. Accept precursor proteins from the TOM70 receptor in the TOM40 mitochondrial outer membrane translocase core complex (CPX-474) and also inserts single-spanning proteins that are imported in a Tom70-independent manner. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
