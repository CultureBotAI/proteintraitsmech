label: "PAR cell polarity complex"
definition: >-
  Conserved serine/threonine kinase complex that localises at tight junctions where it is required for the establishment of a cell polarity axis during the cell division cycle of epithelial cells. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
