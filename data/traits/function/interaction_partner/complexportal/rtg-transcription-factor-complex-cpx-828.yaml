identifier: ComplexPortal:CPX-828
label: "RTG transcription factor complex"
definition: >-
  Heterodimeric transcription factor involved in the regulation of nuclear genes, such as CIT2, in response to mitochondrial stress. Also essential for peroxisome proliferation. Binds to each of two identical non-E-box core sequences, 5-GGTCAC-3, in the 76-bp regulatory upstream activation sequence element of the CIT2 promoter. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
