identifier: ComplexPortal:CPX-26696
label: "SMG5-SMG7, nonsense-mediated decay complex"
definition: >-
  The complex binds phosphorylated UPF1 (Q92900), the central NMD effector, with high affinity and recruits decay factors to the target mRNA through SMG7, thereby promoting target degradation via the nonsense-mediated decay (NMD) pathway, an mRNA quality control mechanism that detects and degrades aberrant transcripts containing premature translation termination codons (PTCs). Recognition of UPF1 by the complex enables the recruitment of protein phosphatase 2A (PPP2CA; P67775), which promotes UPF1 dephosphorylation, a step required for NMD progression. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
