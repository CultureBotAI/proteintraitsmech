identifier: ComplexPortal:CPX-26602
label: "DOP1A-MON2, golgi-endosome traffic complex"
definition: >-
  Phosphatidic acid and phosphatidylinositol-4-phoshate (PI4P)-dependent kinesin-1 adaptor complex which regulates membrane trafficking of cargo proteins between the late Golgi and early endosomes and is crucial for the peripheral positioning of organelles. The DOP1A-MON2 complex promotes centrifugally biased bidirectional transport, whilst inhibiting centripetal-membrane-trafficking and organelle positioning. Missense mutations in the extreme MON2 C-terminal end which interacts with DOP1A is thought to cause a deficit in golgi-endosome protein movement and has been implicated in congenital neurodevelopmental disorders. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
