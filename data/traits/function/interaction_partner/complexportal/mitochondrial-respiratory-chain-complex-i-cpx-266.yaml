identifier: ComplexPortal:CPX-266
label: "Mitochondrial respiratory chain complex I"
definition: >-
  Catalyses the first step of electron transport by the oxidation of NADH, thus providing two electrons for the reduction of ubiquinone. Electron transfer is coupled with the translocation of protons across the membrane, generating a proton motive force. Human has one additional member of the complex, NDUFB1 (O75438) but an orthologue of this cannot be found in rodents. An additional protein, NDUFA4L2 (Q4FZG9), may also be apart of the complex. A curated stable macromolecular complex (Complex Portal) with 44 subunits.
