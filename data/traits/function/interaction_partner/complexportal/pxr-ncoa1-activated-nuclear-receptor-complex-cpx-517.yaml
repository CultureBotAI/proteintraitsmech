identifier: ComplexPortal:CPX-517
label: "PXR-NCOA1 activated nuclear receptor complex"
definition: >-
  Member of the nuclear receptor (NR) family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in metabolism. The pregnane X receptor (NR1I2/PXR) is a central xenobiotic sensor that detects potentially toxic chemicals and regulates the expression of genes central to their breakdown and removal. Like other members of the orphan class of the NR superfamily, NR1I2 contains DNA-binding and ligand-binding domain (DBD, LBD). Upon ligand binding, transcriptional coactivators, such as NCOA1 (Q15788), are recruited leading to transcriptional activation. NR1I2 also binds as a heterotetramer with the 9-cis retinoic acid receptor (RXRA, P19793, CPX-496) to xenobiotic response elements in cytochrome P450 3A (CYP3A) gene promoters and is activated by the spectrum of chemicals that are known to induce CYP3A gene expression. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
