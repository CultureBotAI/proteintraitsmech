identifier: ComplexPortal:CPX-3572
label: "TGA2-NPR1 complex"
definition: >-
  Transcriptional co-activator required for the systemic acquired resistance (SAR) via the regulation of pathogenesis-related genes (e.g. PR-1) under induction of salicylic acid (SA). May bind to promotor region via TGA2 subunit. Functions in plant defence against pathogens. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
