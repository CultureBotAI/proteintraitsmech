identifier: ComplexPortal:CPX-3145
label: "Cyclin-dependent protein kinase 5 holoenzyme complex, p39 variant"
definition: >-
  A proline-directed serine/threonine kinase complex that functions in neuronal activities unrelated to cell-cycle progression, including neuronal migration during the development of the central nervous system, dendritic spine morphogenesis, cortical lamination, fasciculation of axon fibres, synaptic activity, neuronal survival, and neuronal cell death in post-mitotic neurons. Phosphorylates cytoskeletal proteins. Predominantly found at the cytoplasmic side of the plasma membrane. Closely related to CDK5-p35 complex (CPX-3143). Unlike most CDKs, CDK5 is directly activated by the specific activators CDK5R1 (P61809) and CDK5R2 (O35926). Although cyclin I (Q9Z2V9) appears to be involved in the activation of CDK5 in the anti-apoptotic pathway (PMID:19729834) direct binding assays have yet to be published. A proteolytic variant p29-CDK5 akin to p25-CDK5 (CPX-3144) may also exist but experimental evidence is scarce. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
