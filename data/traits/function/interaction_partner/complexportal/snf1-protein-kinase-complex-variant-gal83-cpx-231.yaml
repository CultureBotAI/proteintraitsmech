identifier: ComplexPortal:CPX-231
label: "Snf1 protein kinase complex variant GAL83"
definition: >-
  Energy sensor protein kinase complex, activated by glucose depletion. Regulates cellular energy metabolism by activating energy-producing pathways and inhibiting energy-consuming processes via derepression of glucose-repressed genes. Required for the diauxic shift, in which genes required for mitochondrial oxidative metabolism (normally repressed by glucose) are switched on; growth then resumes at a lower rate. Role in filamentous invasive growth, on glucose depletion, in haploid cells. Regulates haploid invasive growth in response to glucose depletion by affecting adherence by antagonizing NRG1- and NRG2-mediated repression of the FLO11 flocculin and adhesin gene. The activity of this complex is modulated by reversible phosphorylation of SNF1 Thr-210 which increases in response to glucose starvation and correlates with large increases in cellular ADP-to-ATP and AMP-to-ATP ratios. Binding of ADP, but not AMP, to the complex protects against dephosphorylation of Thr-210, suggesting that ADP, rather than AMP, may be the critical activating signal. When glucose levels are high, the complex is cytoplasmic. Upon glucose depletion, Gal83-containing SNF1 locates to the nucleus. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
