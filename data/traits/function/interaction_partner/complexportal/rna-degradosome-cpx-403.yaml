identifier: ComplexPortal:CPX-403
label: "RNA degradosome"
definition: >-
  Key role in mRNA degradation and RNA processing. RNA binds to RnaE, RhlB helicase is necessary to unwind the RNA secondary structures and, once unwound, the 3'-5' decay of the transcripts is ensued by phosphate-dependent PNPase. RNase E bound-enolase may connect cellular metabolic status with post-transcriptional gene regulation and link RNA degradation to glycolytic processes. A dynamic set of minor components of this complex may regulate its function and compartmentalization. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
