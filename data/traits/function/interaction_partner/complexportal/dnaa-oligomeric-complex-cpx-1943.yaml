identifier: ComplexPortal:CPX-1943
label: "dnaA oligomeric complex"
definition: >-
  A dnaA homo-oligomer consisting of some 20 dnaA molecules binds specific DNA regions (dnaA boxes, R sites, I sites and tau sites) at the replication origin oriC. The dnaA box has a 9bp consensus structure 5'-TTATC[CA]A[CA]A-3'. ATP-dnaA binds to low affinity boxes and oligomerizes to form a helical filament on oriC. Aided by diaA (P66817) and HU (CPX-1958/CPX-1959) and catalysed through ATP hydrolysis, dnaA undergoes a major conformational change and unwinds double-stranded DNA at specific 13mer sites. DNA wrapping around the dnaA filament causes torsional strain in the AT-rich DNA unwinding element (DUE), contributing to DNA melting. The dnaA filament then extends beyond the dnaA boxes with the AAA+ domain interacting with DnaA-trio.This sequesters and stretches one strand of the DUE ,facilitating DNA melting and bubble formation before recruiting the dnaB-dnaC complex (CPX-1934) and associated proteins to initiate DNA replication. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
