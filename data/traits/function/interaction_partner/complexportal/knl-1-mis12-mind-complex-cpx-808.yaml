identifier: ComplexPortal:CPX-808
label: "Knl-1/Mis12/MIND complex"
definition: >-
  Required for the stable kinetochore-microtubule attachments that are needed to sustain the centromere tensions involved in achieving proper chromosome alignment in eukaryotic cells. Kinetochore protein knl-1 is essential for the kinetochore-microtubule interactions and increases the microtubule binding affinity of the Mis12 complex to aid in chromosome segregation during meiotic and mitotic cell division. knl-3 recruits knl-1 to the Mis12 complex which in turn recruits the Ndc80 complex to microtubules. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
