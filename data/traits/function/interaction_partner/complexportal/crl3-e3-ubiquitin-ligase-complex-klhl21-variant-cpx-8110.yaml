identifier: ComplexPortal:CPX-8110
label: "CRL3 E3 ubiquitin ligase complex, KLHL21 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL21 target proteins include the microtubule-plus-end interacting proteins (+TIPs), MAPRE1 (Q15691) thus promoting cell migration by controlling microtubuke and focal adhesion dynamics at the cell cortex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
