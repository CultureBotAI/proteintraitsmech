identifier: ComplexPortal:CPX-539
label: "TIM23 mitochondrial inner membrane pre-sequence translocase complex, motor variant"
definition: >-
  Major pre-protein translocase in the inner membrane of mitochondria, mediates the translocation of N-terminal, positively charged pre-sequence-containing proteins. TIM50 interacts with incoming pre-sequence-carrying pre-proteins as they reach the trans site of the TOM40 complex (CPX-474). Pre-proteins are directed by the intermembrane space-exposed domains of TIM50, and TIM23 to the protein-conducting channel of the TIM23 complex. The pre-sequence translocase-associated motor (PAM) drives the completion of pre-protein translocation into the matrix. In most cases, the pre-sequence is proteolytically removed by the mitochondrial-processing peptidase (CPX-1630). A curated stable macromolecular complex (Complex Portal) with 9 subunits.
