identifier: ComplexPortal:CPX-2516
label: "SCF E3 ubiquitin ligase complex, FBXL6 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL6 target proteins include the molecular chaperone HSP90AA1 (P07900). Ubiquitinaton at Lys-63 stabilizes this protein which in turn activates the cell cycle regulator MYC (P01106). May also play role in the quality control of neosynthesized mitochondrial proteins in coordination with the ribosome quality control complex (CPX-2656). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
