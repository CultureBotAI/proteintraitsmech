identifier: ComplexPortal:CPX-1683
label: "DBF2-MOB1 protein kinase complex"
definition: >-
  Serine/threonine proein kinase complex with a role in exit from mitosis during the cell cycle. Once activated, the complex translocates to the nucleus where it phosphorylates an unknown protein to dislodge CDC14 (Q00684) from NET1 (P47035), resulting in diffusion of CDC14 throughout the nucleus. Phosphorylates CDC14 on several sites that flank the C-terminal nuclear localization signal (NLS) sequences, thereby inhibiting the NLS. Because of this, phosphorylated CDC14 molecules that escape to the cytoplasm cannot efficiently return to the nucleus and dephosphorylate substrates such as CDH1 (P53197) and SWI5 (P08153). Phosphorylates chitin synthase CHS2 (P14180) to regulate cytokinesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
