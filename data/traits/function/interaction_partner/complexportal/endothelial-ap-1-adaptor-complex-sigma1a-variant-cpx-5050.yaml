identifier: ComplexPortal:CPX-5050
label: "Endothelial AP-1 Adaptor complex, sigma1a variant"
definition: >-
  Adaptor complex that links clathrin to the membrane surface of trans-Golgi network vesicles and is involved in basolateral transport and the polarized sorting of vesicle in epithelial cells. Reduced expression of AP1M2 was reported in patients affected by colorectal cancer and by Crohn's disease. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
