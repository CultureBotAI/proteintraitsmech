identifier: ComplexPortal:CPX-26594
label: "Eukaryotic translation initiation factor 2 complex, Eif2s3x variant"
definition: >-
  Guides the initiator methionyl-tRNA to the 40S ribosomal subunit (CPX-5261) as a eukaryotic translation initiation factor 2 (eIF2).GTP.Met-tRNAiMet) carrier complex. The resulting 43S complex, which also includes eIF3 and eIF1A, binds at or near the 5'-end of capped eukaryotic messenger RNAs. Recognition of the AUG codon translational start site by Met-tRNAi(Met) is accompanied by GTP hydrolysis (stimulated by the eIF5 complex), which subsequently releases Met-tRNA to the ribosomal peptidyl site, and converts eIF2-GTP to eIF2-GDP. Binding of nucleotide exchange factor eIF2B complex replaces GDP again for GTP. This activity is inhibited when phosphorylated Eif2s1 binds to Eif2s3x. The gamma subunit in mouse eIF2 complex can be either X-linked (this complex) or Y-linked (CPX-26595). Eif2s3x along with its paralog, Eif2s3y (Q9Z0N2) is suspected to contribute to spermatogenesis up to the round spermatid stage. The two paralogs are functionally interchangeable in spermatogenesis, but differ in expression, with the stronger Eif2s3y expression in spermatogonia thought to be required for subsequent meiotic stages but not for mitotic proliferation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
