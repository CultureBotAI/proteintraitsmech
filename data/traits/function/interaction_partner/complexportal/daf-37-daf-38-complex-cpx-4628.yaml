identifier: ComplexPortal:CPX-4628
label: "daf-37-daf-38 complex"
definition: >-
  G-protein coupled receptor complex, which mediates cAMP inhibition in response to dauer-inducing pheromones such as the ascaroside (2R)-5-oxohexan-2-yl 3,6-dideoxy-α-L-arabino-hexopyranoside (CHEBI:78812). Plays a role in controlling dauer formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
