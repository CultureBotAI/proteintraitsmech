identifier: ComplexPortal:CPX-2369
label: "Nuclear origin recognition complex"
definition: >-
  Binds and encircles origins of replication. DNA-binding is ATP-dependent, however specific DNA sequences that define origins of replication have not yet been identified. ORC recruits cdc6 (Q9VSM9) and dup/cdt1 (Q7JVY2) to promote the loading of the MCM2-7 mini-chromosome maintenance complex (CPX-2942) onto chromatin to form the pre-replication complex necessary to initiate DNA replication. ORC is dynamically assembled and disassembled during the cell cycle. The complex is formed in an ATP-dependent manner at the exit from anaphase of mitosis and the complex binds to chromatin in an ORC1-dependent manner. ORC is disassembled in S phase, either by degradation of ORC1 or by a process involving ATP hydrolysis in the complex. ORC1 is thought to be regenerated and to cooperate with ORC4 to initiate a new cycle of pre-RC formation. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
