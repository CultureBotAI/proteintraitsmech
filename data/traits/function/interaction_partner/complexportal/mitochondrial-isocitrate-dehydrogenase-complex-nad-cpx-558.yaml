identifier: ComplexPortal:CPX-558
label: "Mitochondrial isocitrate dehydrogenase complex (NAD+)"
definition: >-
  A tricarboxylic acid cycle enzyme which catalyzes the conversion of threo-Ds-isocitrate to alpha-ketoglutarate and carbon dioxide, important for regulatory control of mitochondrial energy metabolism. Allosterically regulated, activated by citrate and ADP, inhibited by ATP and NADH. Binds specifically and with high affinity to 5'-untranslated regions of yeast mitochondrial mRNAs. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
