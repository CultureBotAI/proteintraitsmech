identifier: ComplexPortal:CPX-6741
label: "CD8alpha-beta complex"
definition: >-
  Integral membrane glycoprotein coreceptor complex that plays an essential role in the immune response and serves multiple functions in responses against both external and internal attacks. In T-cells, functions primarily as a T-cell receptor (TCR, CPX-6581, CPX-6482, CPX-6582, CPX-6603) coreceptor for the peptide-bound MHC (pMHC) class I complex. Interacts with the pMHC class I complex via its extracellular immunoglobulin domains, and potentially enhances TCR-pMHC binding of low-affinity TCRs. In turn, recruits the intracellular Src kinase LCK (P06239) to the vicinity of the TCR complex. LCK then initiates different intracellular signaling pathways by phosphorylating various substrates ultimately leading to lymphokine production, motility, adhesion and activation of cytotoxic T-lymphocytes (CTLs). This mechanism enables CTLs to recognize and eliminate infected cells and tumour cells. Additionally, plays a critical role in thymic selection of CD8+ T-cells. A palmitoylation site in the cytoplasmic tail of CD8B subunit contributes to partitioning of CD8 into the plasma membrane lipid rafts where signaling proteins are enriched. CD8ab complex is a stronger co-receptor than the related CD8aa (CPX-6743) complex. Both may occur on the same cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
