identifier: ComplexPortal:CPX-3743
label: "pgaCD beta-glycosyltransferase complex"
definition: >-
  Required for the synthesis of poly-beta-1,6-N-acetylglucosamine (poly‐GlcNAc), catalyzing the polymerization of single monomer units of UDP-N-acetylglucosamine to produce the linear homopolymer. Poly-GlcNAc is required for the formation of an extracellular polymeric matrix produced when cells switch to growth in surface-associated multicellular communities or biofilms. The activity of the complex is allosterically regulated by the secondary messenger bis-(3'-5')-cyclic dimeric GMP (c‐di‐GMP) which binds to both proteins, stabilizing and activating the complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
