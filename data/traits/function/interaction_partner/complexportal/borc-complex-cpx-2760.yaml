identifier: ComplexPortal:CPX-2760
label: "BORC complex"
definition: >-
  Lysosome associated multi-subunit protein complex that promotes lysosome positioning through coupling to the small GTPase Arl8. This initiates a chain of interactions that promotes the kinesin-dependent movement of lysosomes toward the plus ends of microtubules in the peripheral cytoplasm. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
