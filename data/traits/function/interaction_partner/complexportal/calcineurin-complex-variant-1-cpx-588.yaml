identifier: ComplexPortal:CPX-588
label: "Calcineurin complex variant 1"
definition: >-
  A Ca2+/calmodulin-regulated Ser/Thr protein phosphatase, highly conserved through evolution and a critical component of Ca2+-regulated signaling in a wide range of unicellular and multicellular eukaryotes. Calcineurin is a heterodimer containing a catalytic (A) subunit complexed with an essential regulatory (B) subunit. Calcineurin function requires interaction of both subunits. The catalytic subunit contains an active site dinuclear metal center. The regulatory subunit is tightly associated, myristoylated and binds Ca2+ via four Ca2+-binding EF-hand motifs. Two redundant genes, CNA1 and CNA2, encode the catalytic subunit and their expression is regulated in a cell cycle-dependent manner. In the yeast, Ca2+ signaling mediated by calcineurin, is required for survival during environmental stress. One role of the phosphatase under these conditions is to activate gene expression through its regulation of the CRZ1 (P53968) transcription factor. Calcineurin controls many other physiological processes in yeast, including cell cycle progression, cation homeostasis, morphogenesis, establishment of cell polarity and regulation of cell wall biosynthesis. Cells deficient for calcineurin are unable to survive pheromone-induced G1 arrest. When mobilization of internal calcium stores occurs, the catalytic subunit is bound by Ca2+-calmodulin and the active site is freed by displacement of the autoinhibitory domain. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
