label: "IscA complex"
definition: >-
  Transfers [2Fe2S] clusters to apo-protein forms of other iron-sulfur proteins. It may also function as a [2Fe2S] scaffold protein for the formation of [2Fe2S] clusters. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
