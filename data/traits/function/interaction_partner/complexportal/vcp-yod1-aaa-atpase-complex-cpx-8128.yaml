identifier: ComplexPortal:CPX-8128
label: "VCP-YOD1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Binds Lys-11-, Lys-27-, Lys-29- and Lys-33-linked polyubiquitin chains and may play a role in autohagy and endoplasmic reticulum-associated protein degradation (ERAD). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
