identifier: ComplexPortal:CPX-6268
label: "Dolichol-phosphate mannosyltransferase complex"
definition: >-
  Transfers mannose from GDP-mannose to dolichol monophosphate to form dolichol phosphate mannose (Dol-P-Man). Required for the biosynthesis of N-glycans which begins at the endoplasmic reticulum (ER) with the assembly of dolichol-linked tetra-decasaccharide (Glc3Man9GlcNAc2-PP-Dol). Dol-p-man is also a mannose donor for GPI anchor biosynthesis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
