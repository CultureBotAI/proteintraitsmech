identifier: ComplexPortal:CPX-1374
label: "SAS-5-SAS-6 complex"
definition: >-
  Forms the initial central tube of the centriole, to which other proteins may be recruited during centriole formation, assembly and duplication in mitosis. The complex interacts with and is targeted to centrioles by the PP2A-SUR-6 phosphatase complex (CPX-1366) during centriole formation. sas-5 is dephosphorylated by the serine/threonine phosphatase let-92 (G5EGK8) within the PP2A-SUR-6 complex During centriole duplication, the complex may also be recruited to centrioles by the kinase zyg-1. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
