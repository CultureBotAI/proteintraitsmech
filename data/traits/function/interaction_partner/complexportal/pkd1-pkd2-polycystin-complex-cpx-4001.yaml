identifier: ComplexPortal:CPX-4001
label: "PKD1-PKD2 Polycystin complex"
definition: >-
  Appears to form a calcium-permeable ion channel in the primary cilia with a role in fluid-flow mechano-sensation in the renal epithelium. May act as a regulator of cilium length. Recent results suggest that PKD2 may function independently as a monovalent cation-selective channel and that PDK1 serves as the receptor to sense chemical and mechanical force stimuli. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
