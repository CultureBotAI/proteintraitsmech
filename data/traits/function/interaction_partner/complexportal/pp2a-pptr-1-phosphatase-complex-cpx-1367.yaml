identifier: ComplexPortal:CPX-1367
label: "PP2A-PPTR-1 phosphatase complex"
definition: >-
  Serine/threonine phosphatase complex that negatively regulates the insulin receptor signaling cascade composed of daf-2 (Q968Y9), age-1 (Q94125), akt-1 (Q17941), akt-2 (Q9XTG7) and sgk-1 (Q2PJ68) by promoting the dephosphorylation of akt-1 on 'Thr-350'. Negatively regulates several functions controlled by the insulin pathway including dauer formation, lifespan, fat storage and stress resistance. In addition, the complex may play a role in the asymmetric segregation of the P granule components during embryonic cell divisions but does not play an essential role in specifying germ cell fate. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
