identifier: ComplexPortal:CPX-2949
label: "Protein geranylgeranyl transferase type I complex"
definition: >-
  Catalyzes the transfer of a 20-carbon lipid, the geranyl-geranyl moiety, from geranyl-geranyl pyrophosphate to a cysteine at the fourth position from the C-terminus of several proteins having the C-terminal sequence Cys-aliphatic-aliphatic-X (CaaX box). The Zn2+ is required for peptide, but not for isoprenoid, substrate binding. The hydrophobic geranyl-geranyl moiety aids membrane attachment of the target proteins which include many essential signal transduction proteins, including members of the Ras superfamily. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
