identifier: ComplexPortal:CPX-1843
label: "PPP4C-PPP4R2-PPP4R3A protein phosphatase 4 complex"
definition: >-
  PP2A-type phosphatase implicated in a variety of critical biological processes. Specifically dephosphorylates H2AFX phosphorylated on 'Ser-140' (gamma-H2AFX) generated during DNA replication and required for DNA DSB repair. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
