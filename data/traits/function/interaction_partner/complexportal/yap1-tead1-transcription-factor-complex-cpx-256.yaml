identifier: ComplexPortal:CPX-256
label: "YAP1-TEAD1 transcription factor complex"
definition: >-
  Transcription factor complex of enhancer factor TEF-1 (TEAD) and coactivator YAP1. Plays key role in Hippo signaling pathway involved in organ size control and tumor supression by restricting proliferation and promoting apoptosis. Connective tissue growth factor (CTGF) has been identified as a direct target gene. Associated also with Sveinsson's chorioretinal atrophy caused by TEAD mutation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
