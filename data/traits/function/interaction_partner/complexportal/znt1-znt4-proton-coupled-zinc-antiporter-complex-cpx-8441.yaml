label: "ZNT1-ZNT4 proton-coupled zinc antiporter complex"
definition: >-
  Proton-coupled zinc ion antiporter present in the plasma membrane and required for exporting cytosolic zinc into the extracellular space thus protecting cells from zinc toxicity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
