label: "6-phosphofructokinase, L4 homotetramer"
definition: >-
  Catalyzes the phosphorylation of fructose 6-phosphate to fructose 1,6-bisphosphate in the presence of MgATP, the first irreversible step for glycolysis. Predominant form in the liver. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
