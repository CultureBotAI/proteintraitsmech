identifier: ComplexPortal:CPX-2512
label: "SCF E3 ubiquitin ligase complex, FBXL4 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL4 acts to restrain basal mitophagy, the mitochondrial quality control mechanism that removes dysfunctional or excessive mitochondria by autophagy. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
