identifier: ComplexPortal:CPX-3563
label: "PYL3 ABA receptor complex"
definition: >-
  Abscisic acid (ABA) receptor that inhibits group-A protein phosphatases type 2C (PP2Cs), e.g. HAB1 (Q9CAJ0), in the presence of ABA. Leads to phosphorylation and activation of SnRK2 kinases which in turn activate transcription factors that are required for ABA-mediated responses such as stomatal closure, germination inhibition and adaption to environmental stress. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
