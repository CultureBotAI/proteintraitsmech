identifier: ComplexPortal:CPX-3586
label: "WHY3 complex"
definition: >-
  Modulates DNA repair in plant chloroplasts by binding single-stranded DNA in a non-sequence-specific manner. Contributes to both basal and specific defense responses. Transcription can be induced by salicylic acid (SA). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
