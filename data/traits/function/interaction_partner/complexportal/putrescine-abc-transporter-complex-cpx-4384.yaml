identifier: ComplexPortal:CPX-4384
label: "Putrescine ABC transporter complex"
definition: >-
  High affinity putrescine importer, a polycation that interacts with negatively charged molecules such as DNA, RNA and proteins that plays a role in stress response. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
