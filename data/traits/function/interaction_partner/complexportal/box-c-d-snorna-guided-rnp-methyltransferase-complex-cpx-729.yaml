identifier: ComplexPortal:CPX-729
label: "Box C/D snoRNA-guided RNP methyltransferase complex"
definition: >-
  Small nucleolar RNA (snoRNA) dependent 2'-O-methyltransferase complex. Upon forming a snoRNP complex with a box C/D snoRNA and other core proteins, FBL transfers a methyl group to the 2'-hydroxyl of the ribose moiety in substrate RNAs. Complex plays a role in pre-rRNA cleavage and in 2'-O-methylation of nucleotides at specific positions in rRNAs, snoRNAs, and other RNAs during maturation. The snoRNA present in the complex guides the site-specific 2'-O-ribose methylation by base pairing with the rRNA for 10 to 21 nucleotides immediately 5' of box D. The residue targeted for methylation in the substrate RNA invariably pairs with the fifth nucleotide upstream of box D in the guide snoRNA. The complex also acts to direct pre-rRNA folding and rRNA processing through base pairing to the rRNA or flanking precursor sequences. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
