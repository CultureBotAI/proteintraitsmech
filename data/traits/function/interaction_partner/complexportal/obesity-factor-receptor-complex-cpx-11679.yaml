identifier: ComplexPortal:CPX-11679
label: "Obesity factor-receptor complex"
definition: >-
  Mainly produced by adipocytes, LEP acts on LEPR to regulate adipose tissue via hypothalamic control of satiety and energy expenditure, thereby maintaining food intake and body weight homeostasis. The complex is also involved in other processes, including adaptive and innate immune function, reproduction, and bone metabolism. Leptin, therefore, functions as a metabolic switch, linking the body's nutritional status to energy-demanding physiological activities. Proper functioning of this complex is crucial for preventing obesity and associated secondary diseases such as diabetes, inflammation, cardiovascular disease, and cancer. Human obesity is characterized by elevated serum leptin concentrations, which appear to impair leptin transport into the central nervous system. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
