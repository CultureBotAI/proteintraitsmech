identifier: ComplexPortal:CPX-1755
label: "Collagen type XIV trimer"
definition: >-
  Fibril-associated collagen with interrupted triple helices (FACIT) which appear to play an adhesive role by integrating collagen bundles. It is probably associated with the surface of interstitial collagen fibrils via COL1. The COL2 domain may then serve as a rigid arm which sticks out from the fibril and protrudes the large N-terminal globular domain into the extracellular space, where it might interact with other matrix molecules or cell surface receptors. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
