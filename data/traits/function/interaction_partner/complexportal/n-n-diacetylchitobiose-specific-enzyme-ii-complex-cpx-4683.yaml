identifier: ComplexPortal:CPX-4683
label: "N,N'-diacetylchitobiose-specific enzyme II complex"
definition: >-
  Involved in the transport of the chitin disaccharide N,N'-diacetylchitobiose (GlcNAc2) and N,N',N''-triacetyl chitotriose (GlcNAc3) across the cell membrane as part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS). A phosphoryl group is transferred from hpr (P0AA04) to chbA (IIA), from chbA to chbB (IIB) and finally from chbB onto the incoming sugar bound to membrane-embedded chbC (IIC). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
