identifier: ComplexPortal:CPX-1600
label: "CAX3 homodimer"
definition: >-
  Cation antiporter complex that facilitates influx of cations, mainly Ca(2+) ions, into the cell and proton out of the cell. Required for normal growth and ion homeostasis. Loss of CAX3 results in a reduction in fresh growth weight under Ca(2+) stress and reduced vacuolar Ca(2+)-ATPase activity. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
