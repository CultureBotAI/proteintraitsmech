identifier: ComplexPortal:CPX-23
label: "U1 small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex that is involved in mRNA splicing. U1 snRNP binds to the 5-prime splice site contributing to the formation of the Commitment complex (CPX-1418) during spliceosome assembly. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. After assembly of the precatalytic spliceosome, U1 is released during the activation of the spliceosome. A curated stable macromolecular complex (Complex Portal) with 18 subunits.
