identifier: ComplexPortal:CPX-26415
label: "U6 small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex, part of the pre-B complex that acts as a chaperone for U6 spliceosomal-RNA. The spliceosome executes pre-mRNA splicing through a highly dynamic series of compositional and conformational transitions encompassing assembly, activation, catalysis and disassembly of a highly dynamic structure, involving the binding and release of the small nuclear RNAs (snRNA) and protein factors which remove intronic sequence from pre-mRNA. Spliceosome stages are characterized as E, A, B and remodelling of the pre-catalytic spliceosome (B complex) into the activated spliceosome (Bact complex) and subsequently, the catalytically activated spliceosome (B* complex) to carry out two RNA-catalysed transesterification reactions that lead to intron removal and splicing together of the flanking exon sequences. U6 is part of the activated spliceosome and is involved in the first trans-estherification step of splicing. After splicing is complete, the spliceosome disassembles and free U6 snRNP forms. It then reassociates with U4 to form U4/U6 snRNP. PRP24 (P49960) functions as a snRNP recycling factor to re-anneal U4 and U6 snRNAs in Saccharomyces cerevisiae (CPX-24). SART3 (Q15020) the PRP24 orthologue in humans, is thought to associate with U6 and U4/U6 snRNP during the recycling phase of the spliceosome cycle but it dissociates during the formation of the U4/U6.U5 tri-complex. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
