identifier: ComplexPortal:CPX-26631
label: "ESCRT-0 complex"
definition: >-
  The ESCRT machinery consists of ESCRT-0 (this complex), -I , -II , -III and -IV (VPS4 complex) and is required for the downregulation of cell-surface receptors and for the final membrane scission step during endocytosis. ESCRT-0 binds PI3P on endosomes and ubiquitinated cargo via VPS27, recruiting clathrin and sequestering ubiquitylated cargo in clathrin-coated microdomains. HSE1 recruits ESCRT-1 and initiates the multivesicular body (MVB) pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
