identifier: ComplexPortal:CPX-1501
label: "Myosin class V complex, MYO4 variant"
definition: >-
  Building block of the class V myosin processive molecular motor involved in a range of organelle-transporting functions, including the transport of vacuoles and mRNA. The myosin heavy chain motor domain mediates the ATP-dependent interaction with the F-actin cytoskeleton. The myosin neck region with the bound light chains acts as a rigid lever arm that amplifies movements within the myosin motor domain into a large mechanical stroke that directionally propels the myosin along the actin filament. Myosin V has a high duty cycle, i.e. remains attached to actin for a large fraction of the mechanochemical cycle due to the slow rate of ADP release, the rate-limiting step in the ATPase cycle. This kinetic adaptation allows myosin V to take multiple steps without dissociating from the actin filament. Myosin V can take large steps of approximately 36nm, a distance equal to the helical repeat of the actin filament allowing Myosin V to walk in a straight line on the actin filament, in a hand-over-hand fashion. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
