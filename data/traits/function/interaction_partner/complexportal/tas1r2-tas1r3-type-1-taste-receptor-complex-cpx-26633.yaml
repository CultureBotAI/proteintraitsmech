identifier: ComplexPortal:CPX-26633
label: "TAS1R2-TAS1R3 type 1 taste receptor complex"
definition: >-
  A class C G-protein-coupled receptor (GPCR) heterodimer which senses sweet compounds. The receptor is expressed in specialized taste receptor cells in the taste bud and also in tissues involved in the regulation of energy metabolism such as adipose tissue, endocrine cells of the gut and the beta-islet cells of the pancreas signal through GNAT-3-containing (gustducin) G-protein heterotrimers, initiating downstream physiological responses. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
