identifier: ComplexPortal:CPX-2181
label: "Protein farnesyltransferase complex"
definition: >-
  Catalyzes the transfer of a 15-carbon lipid, the farnesyl moiety, from farnesyl pyrophosphate to a cysteine at the fourth position from the C-terminus of several proteins having the C-terminal sequence Cys-aliphatic-aliphatic-X (CaaX box). The hydrophobic farnesyl moiety aids membrane attachment of the target proteins which include many essential signal transduction proteins, including members of the Ras superfamily. Farnesylation is essential both for normal functioning of these proteins, and for the transforming activity of oncogenic mutants. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
