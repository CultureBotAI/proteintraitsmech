identifier: ComplexPortal:CPX-3883
label: "daf-16-sir-2.1 complex"
definition: >-
  Functions to regulate gene expression and promote longevity in the stress response pathway. Complex most likely sequesters the forkhead transcription factor FOXO/daf-16 (O16850) to the nucleus and thus serves to promote the transcriptional activity of FOXO/daf-16 in response to stress. The 14-3-3 proteins par-5 (P41932) or ftt-2 (P41932) may be required as scaffolding proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
