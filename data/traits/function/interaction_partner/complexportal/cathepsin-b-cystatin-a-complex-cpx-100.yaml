identifier: ComplexPortal:CPX-100
label: "Cathepsin-B - cystatin-A complex"
definition: >-
  Complex of cathepsin-B with its inhibitor cystatin-A. Cystatin displaces the occluding loop in the catalytic cleft thus inhibiting the enzyme's peptidase activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
