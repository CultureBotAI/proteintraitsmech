identifier: ComplexPortal:CPX-650
label: "CRL4-DDB2 E3 ubiquitin ligase complex, CUL4A variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor Ddb2. The complex recognises UV-induced cyclobutane pyrimidine dimers in chromatin and facilitates nucleotide excision repair. Ubiquitinates XPC (P51612), histones and other chromatin-associated proteins located within approximately 100 A around the DNA lesion. Ubiquitination of histones may facilitate their removal from the nucleosome and promote subsequent DNA repair. Involved in Xeroderma pigmentosum and other solar photosensitivity related diseases. Inactivated by the binding of the COP9 signalosome which is overcome by substrate binding to the DDB2 subunit. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
