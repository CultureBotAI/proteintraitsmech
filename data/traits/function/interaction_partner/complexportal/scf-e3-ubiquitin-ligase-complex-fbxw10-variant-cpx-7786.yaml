identifier: ComplexPortal:CPX-7786
label: "SCF E3 ubiquitin ligase complex, FBXW10 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. The cellular levels and function of FBXW10 depend on the protein O-GlcNAcylation and overexpression of this protein results in the degradation of CBX5 (P45973) and CBX1 (P83916). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
