identifier: ComplexPortal:CPX-8503
label: "GLUK2-GLUK5 glutamate ionotropic kainate-type receptor complex"
definition: >-
  An ionotropic glutamate receptor which localizes either post-synaptically to drive synaptic depolarization or pre-synaptically to regulate neurotransmitter release. Belonging to the kainate-type glutamate receptors (KARs) sub-family, GluKs are ligand-gated cation channels activated by the neurotransmitter l-glutamate. GluKs play complex roles in neural development and CNS function. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
