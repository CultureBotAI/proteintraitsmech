identifier: ComplexPortal:CPX-812
label: "Knl1-Zwint1 complex"
definition: >-
  Recruits the Rzz (CPX-810) and mad-1/mad-2 (CPX-402) complexes to the outer kinetochore to allow for the formation of stable microtubule and kinetochore attachments during chromosome segregation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
