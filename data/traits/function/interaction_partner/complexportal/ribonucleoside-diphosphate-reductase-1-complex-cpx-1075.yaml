identifier: ComplexPortal:CPX-1075
label: "Ribonucleoside-diphosphate reductase 1 complex"
definition: >-
  Catalyzes the reduction of ribonucleotides to the corresponding deoxyribonucleotides, an essential step in the de novo synthesis of monomeric precursors for DNA replication and repair. The binding of effector dATP alters the active site to select for pyrimidines over purines, whereas effectors dGTP and TTP select for substrates ADP and GDP, respectively. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
