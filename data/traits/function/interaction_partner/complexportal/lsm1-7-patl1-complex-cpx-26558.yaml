identifier: ComplexPortal:CPX-26558
label: "LSM1-7, PATL1 complex"
definition: >-
  LSM1-7-Pat1 is a complex conserved in all eukaryotes. LSM1-7 complex (CPX-26554) associates with PATL1 to modulate mRNA degradation. The complex preferentially binds oligo-adenylated (but not poly-A) mRNAs at their 3' end and promotes decapping at the 5' end thereby directing the mRNA for degradation through the 5' to 3' pathway. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
