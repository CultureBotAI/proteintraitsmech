identifier: ComplexPortal:CPX-5223
label: "40S cytosolic small ribosomal subunit"
definition: >-
  Component of the ribosome, the site of protein biosynthesis resulting from translation of messenger RNA (mRNA). Acts as the decoding centre of the ribosome which brings mRNA and aminoacylated transfer (t)RNAs together, with the 16S ribosomal (r)RNA being required for the selection of the cognate tRNA. A curated stable macromolecular complex (Complex Portal) with 32 subunits.
