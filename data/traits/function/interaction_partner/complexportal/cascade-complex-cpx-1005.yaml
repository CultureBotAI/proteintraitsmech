identifier: ComplexPortal:CPX-1005
label: "Cascade complex"
definition: >-
  CRISPR (clustered regularly interspaced short palindromic repeat), is an adaptive immune system that provides protection against mobile genetic elements (viruses, transposable elements and conjugative plasmids). The system memorizes previous infections by integrating short sequences of invading genomes (spacers) into the CRISPR locus. The spacers, interspaced with repeats, are expressed as small guide CRISPR RNAs (crRNAs) that are employed by Cas proteins to target invaders sequence-specifically upon a reoccurring infection. Upon viral invasion, the Cascade complex binds double-stranded DNA exhibiting sequence complementary to the crRNA spacer sequence, while displacing the non-target strand to form an R-loop, and then recruits the nuclease Cas3/ygcB (P38036) for target degradation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
