identifier: ComplexPortal:CPX-656
label: "SAGA complex"
definition: >-
  A transcriptional co-activator complex with histone acetyltransferase activity. Recruited to gene loci by the interaction of TRA1 with specific transcriptional activators, and the bromodomain of GCN5 binds acetylated H3 and H4 N-terminal tails which potentiates cooperative nucleosome acetylation of histone H3 catalysed by the acetylation module. This opens up the chromatin landscape for binding of additional transcription factors and the pre-initiation complex. The DUB module facilitates elongation through deubiquitination of H2B which allows for the recruitment of the CTK1 kinase (Q03957) and subsequent Ser-2 phosophorylation of the Pol II C-terminal domain. A curated stable macromolecular complex (Complex Portal) with 20 subunits.
