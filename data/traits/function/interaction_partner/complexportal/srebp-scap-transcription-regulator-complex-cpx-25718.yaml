identifier: ComplexPortal:CPX-25718
label: "SREBP-SCAP transcription regulator complex"
definition: >-
  scp1 binds and stabilizes full-length sre1 in the endoplasmic reticulum (ER). Under conditions of low sterols or low oxygen, the complex translocates from the ER to the Golgi where sre1 is proteolytically cleaved and freed from the membrane to act as a master regulator of cellular lipid homeostasis which plays a critical role in the cells adaptation to hypoxia. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
