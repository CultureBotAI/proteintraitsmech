label: "YdcSTUV ABC transporter complex"
definition: >-
  Putative putreceine transporter, may also act as the channel for double-stranded DNA uptake during natural transformation. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
