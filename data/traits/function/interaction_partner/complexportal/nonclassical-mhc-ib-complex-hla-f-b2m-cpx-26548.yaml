identifier: ComplexPortal:CPX-26548
label: "Nonclassical MHC Ib complex, HLA-F-B2M"
definition: >-
  Antigen-presenting major histocompatibility complex which presents the bound peptide antigen to CD8+ cytotoxic T-lymphocytes. The complex assembles in the endoplasmic reticulum and is transported to the cell surface. Peptide-bound HLA-F-B2M acts as a ligand for LILRB1 inhibitory receptor, a major player in maternal-fetal tolerance. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
