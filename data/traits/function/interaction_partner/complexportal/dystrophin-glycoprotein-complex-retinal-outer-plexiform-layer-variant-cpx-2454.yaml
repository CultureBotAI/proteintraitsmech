identifier: ComplexPortal:CPX-2454
label: "Dystrophin glycoprotein complex, retinal outer plexiform layer variant"
definition: >-
  A plasma membrane transmembrane complex that links the actin cytoskeleton to the extracellular matrix. In the retina the complex is required for correct electrical activity and retina formation and is present in the presynapse. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
