identifier: ComplexPortal:CPX-5986
label: "Phosphatidylinositol 3-kinase complex class IB, p110gamma/p101"
definition: >-
  Uses 1-phosphatidyl-1D-myo-inositol 4,5-bisphosphate/PI(4,5)P2 (CHEBI:18348) as a substrate to generate the product 1-phosphatidyl-1D-myo-inositol 3,4,5-trisphosphate/PI(3,4,5)P3 (CHEBI:16618) which initiates major signaling pathways downstream. Also has serine/threonine protein kinase activity. Performs a central role in cellular signaling, mediating responses to growth factors and extracellular stimuli. Links G-protein coupled receptor activation to PIP3 production. Involved in immune, inflammatory and allergic responses. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
