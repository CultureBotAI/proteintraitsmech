identifier: ComplexPortal:CPX-8004
label: "Non-canonical FBXO45-MYCBP2-SKP1 E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. FBXO45-MYCBP2-SKP1 target proteins include the Nicotinamide/nicotinate-nucleotide adenylyltransferase NMNAT2 (Q9BZQ4) that acts as an axon maintenance factor thus playing a role in neuromuscular synaptogenesis, axon pathfinding and neuronal migration. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
