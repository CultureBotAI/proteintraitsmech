identifier: ComplexPortal:CPX-2819
label: "CRL4-DCAF10 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF10. The complex is active in the activation of the caspase‐dependent apoptosis pathway through the ubiquitination and subsequent degradation of BCL-2 family member MCL1 (Q07820). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
