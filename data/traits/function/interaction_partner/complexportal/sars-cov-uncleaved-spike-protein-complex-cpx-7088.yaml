identifier: ComplexPortal:CPX-7088
label: "SARS-CoV uncleaved Spike protein complex"
definition: >-
  Spike protein complex of the SARS-CoV coronavirus that binds to human receptor ACE2 (Q9BYF1) and CLEC4M/DC-SIGNR (Q9H2X3). Cell entry via binding of Spike to the ACE2 receptor (CPX-5695) relies on two proteolytic cleavage events facilitated by host proteases, such as furin (P09958) and TMPRSS2 (O15393): the first cleavage occurs at the S1/S2 site, the second at the S2' site. Cleavage at the S1/S2 site can occur prior to exit from an infected cell or once bound to ACE2 on the surface of a new host cell. Cleavage at the S2' site occurs only on the surface of the new host cell. While furin is active in the Golgi and on the plasma membrane and can cleave Spike at both cleavage sites, TMPRSS2 only facilitates S2' cleavage on the plasma membrane. While cleaved Spike (CPX-5694) greatly enhances viral entry into the host cell, it is not strictly required for infection and not all Spike complexes on the viral surface are cleaved. Contrary to the activity of Spike in related SARS-CoV-2 (CPX-5682), owing to a different furin cleavage site, cleavage and activation of SARS-CoV Spike by furin and TMPRSS2 is less efficient. It is therefore thought that SARS-CoV virions may rely more heavily on the less efficient cell entry process via endosomes and the use of an alternative protease, e.g. cathepsin L (P07711). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
