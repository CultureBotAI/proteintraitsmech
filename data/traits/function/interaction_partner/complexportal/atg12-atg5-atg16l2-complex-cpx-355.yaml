identifier: ComplexPortal:CPX-355
label: "Atg12-Atg5-Atg16l2 complex"
definition: >-
  No known role is ascribed to this complex. Unlike the closely related Atg12-Atg5-Atg16l1 complex (CPX-328), it does not appear to be required for autophagy. Assumed to act as an E3-like enzyme to recruit the E2-like protein ATG3, conjugated to LC3-I, to the endoplasmic reticulum-derived omegasome. Atg3 binds to and is activated by Atg12, facilitating conjugation of the LC3 to phosphatidylethanolamine, thus converting LC3-I to LC3-II. Therefore, the site of Atg12-Atg5-Atg16l2 complex recruitment determines the site of LC3-II formation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
