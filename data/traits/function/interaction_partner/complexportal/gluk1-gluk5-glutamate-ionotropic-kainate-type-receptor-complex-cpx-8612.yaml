identifier: ComplexPortal:CPX-8612
label: "GluK1-GluK5 glutamate ionotropic kainate-type receptor complex"
definition: >-
  An ionotropic glutamate receptor which localizes either post-synaptically to drive synaptic depolarization or pre-synaptically to regulate neurotransmitter release. Belonging to the kainate-type glutamate receptors (KARs) sub-family, GluKs are ligand-gated cation channels activated by the neurotransmitter l-glutamate. GluKs play complex roles in neural development and CNS function. GluKs 1-3 can assemble in any combination of homo- or heterotetrameic structures to form functions ion channels but GluKs 4-5 are obligate heterotetramers which require GluKs 1-3 to reach the neuronal surface. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
