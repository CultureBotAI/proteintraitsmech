identifier: ComplexPortal:CPX-26458
label: "Major Spliceosomal Post-B-act complex"
definition: >-
  Step-1 catalytically-activated B (B-act) spliceosome. The B to B-act to post-B-act transition involves at least six stages, pre-B-act, B-act-I, B-act-II, B-act-III, B-act-IV and post-B-act (this complex). The spliceosome executes pre-mRNA splicing through a highly dynamic series of compositional and conformational transitions encompassing assembly, activation, catalysis and disassembly of a highly dynamic structure, involving the binding and release of the small nuclear RNAs (snRNA) and protein factors which remove intronic sequence from pre-mRNA. Spliceosome stages are characterized as E, A, B and remodelling of the pre-catalytic spliceosome (B complex) into the activated spliceosome (B-act) and subsequently, the catalytically activated spliceosome (C complex) to carry out two RNA-catalysed transesterification reactions that lead to intron removal and splicing together of the flanking 5' and 3'-exons. B-act in humans bears little resemblance to the B complex. The B to B-act to C transitions involve extensive re-shuffling of spliceosome components; the B-act to C transition, propelled by the ATPase helicases is less dramatic compared to the B to B-act transition but involves a flux of considerably more proteins than the C to C* and P (post-catalytic spliceosome) to ILS (intron lariat spliceosome) transitions, which is driven by the ATPase/helicases DHX38 and DHX8, respectively. A curated stable macromolecular complex (Complex Portal) with 40 subunits.
