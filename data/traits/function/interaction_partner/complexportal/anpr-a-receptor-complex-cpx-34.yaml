identifier: ComplexPortal:CPX-34
label: "ANPR-A receptor complex"
definition: >-
  Dimeric receptor complex expressed in the atrium. Binding of the ligand AMP in response to atrial distension (high blood volume) plays a major role in the regulation of blood pressure and salt-fluid volume homeostasis. Binding of ANP to ANPR-A dimer activates the receptor and stimulates its guanylate cyclase activity, thereby elevating intracellular cGMP levels. cGMP, in return mediates the hormonal actions through cGMP-regulated ion channels, protein kinases and phosphodiesterases. The end result is a reduction in blood volume and, therefore, a reduction in cardiac output and systemic blood pressure. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
