identifier: ComplexPortal:CPX-3174
label: "raps-insc complex"
definition: >-
  Required for the asymmetric division of neuroblasts. Coordinates asymmetric localization of cell fate determinants with orientation of the mitotic spindle resulting in different daughter cells upon division. Localizes at the apical cortex of the neuroblast: Raps maintains, but does not initiate, Insc apically, while Insc segregates Raps asymmetrically. Requires the G protein alpha i subunit (Galphai, P20353) for partial activity resulting in the selective recruitment of Discs large 1 (Dlg1, P31007) but not Mushroom body defect (Mud, Q8IR55). This ensures that the spindle is attached to the cortex (via Dlg) before activation of spindle pulling forces by Dynein/Dynactin (via Mud). The selective recruitment of Dlg1 occurs by a steric mechanism: Insc and Mud compete for binding to the tetratricopeptide repeats (TPRs, IPR019734) of Raps. Complex activity appears to be conserved. Mammalian Insc (Q1MX18) functions similar to Insc, GPSM1 (also called AGS3, Q86YR5) and GPSM2 (also called LGN, P81274) to Raps, and NuMA (Q14980) to Mud. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
