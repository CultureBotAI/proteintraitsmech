identifier: ComplexPortal:CPX-3081
label: "Microprocessor complex"
definition: >-
  Responsible for the processing of the primary transcripts during the generation of microRNAs, cleaving the primary transcript (pri-miRNA) at the stem of a hairpin structure to form the mature approximately 22 nucleotide miRNA. May also play a role in the destabilization of mRNAs and other RNA types. DGCR8 may play a major role in substrate recognition by directly anchoring at the ssRNA-dsRNA junction. DGCR8 also interacts with the stem of approximately 33 bp and the terminal loop for full activity although the terminal loop structure is not critical for DGCR8 binding and cleavage reaction. Binding of DGCR8 to the RNA positions the processing center of DROSHA approximately 11 bp from the junction, DROSHA then catalyses the substrate, with its two RNase III domains forming an intramolecular dimer where the domain 1 cuts the 3-prime strand while the domain 2 cleaves the 5-prime strand of pri-miRNAs, independently of each other. The Microprocessor recognizes and cleaves hairpin structures at the 5-prime UTR and the coding region of Dgcr8 mRNA. This self-regulation by the negative feedback loop contributes to the homeostatic control of miRNA generation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
