identifier: ComplexPortal:CPX-1319
label: "PSTB lipid transfer acceptor membrane complex"
definition: >-
  Lipid transfer complex that is responsible for interorganelle transport of phospholipids, specifically for the non-vesicular transport of phospholipids such as phosphatidylserine from the endoplasmic reticulum to the endosome. Resides in the acceptor (endosomal) membrane and binds to specific lipids on the donor membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
