identifier: ComplexPortal:CPX-1916
label: Fibrinogen
definition: >-
  Soluble glycoprotein synthesized by hepatocytes which participates in the final step of blood coagulation. Converted to fibrin in a reaction catalyzed by thrombin, which releases fibrinopeptides A and B from amino-termini of the alpha and beta chains to produce fibrin monomers. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
