identifier: ComplexPortal:CPX-8086
label: "Nexin-dynein regulatory complex"
definition: >-
  Present in the axonemes of cilia where it plays a critical role in ciliary motility, by linking adjacent outer microtubule duplexes. Maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
