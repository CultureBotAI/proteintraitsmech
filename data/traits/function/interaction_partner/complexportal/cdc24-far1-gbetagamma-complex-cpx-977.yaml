identifier: ComplexPortal:CPX-977
label: "CDC24-FAR1-Gbetagamma complex"
definition: >-
  Required for oriented growth of haploid cells in response to a pheromone gradient created by a mating partner of the opposite mating type. Forms at the cell cortex during mating, when a Far1-Cdc24 complex translocates from the nucleus. Recruits Cdc42 (P19073) and Bem1 (P29366) away from the bud site, thus providing the switch from bud growth to polarized growth, enabling the cell to project a shmoo towards the source of a pheromone gradient, and thus grow towards the mating partner. Binding to Gbetagamma may trigger a conformational change in Far1 that is required for its ability to activate Cdc24. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
