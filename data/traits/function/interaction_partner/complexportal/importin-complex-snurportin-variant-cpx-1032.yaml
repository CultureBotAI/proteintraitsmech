identifier: ComplexPortal:CPX-1032
label: "Importin complex, Snurportin variant"
definition: >-
  A nuclear import complex that functions as a nuclear import receptor and specifically imports m3G-capped U snRNAs. Docking of the importin/substrate complex to the nuclear pore complex (NPC) is mediated by KPNB1. KPNB1 binds to nucleoporin FxFG repeats and the complex is subsequently translocated through the pore by an energy requiring, Ran-dependent mechanism. At the nucleoplasmic side of the NPC, Ran-GTP (P62826) binds to KPNB1, the three components separate and SNUPN and KPNB1 are re-exported from the nucleus to the cytoplasm where GTP is hydrolysed. The directionality of nuclear import is thought to be conferred by an asymmetric distribution of the GTP- and GDP-bound forms of Ran between the cytoplasm and nucleus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
