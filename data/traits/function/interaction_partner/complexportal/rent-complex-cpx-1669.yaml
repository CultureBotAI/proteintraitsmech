identifier: ComplexPortal:CPX-1669
label: "RENT complex"
definition: >-
  Regulates transcriptional silencing at the rDNA locus. Silencing within the yeast rDNA repeats inhibits hyperrecombination, represses transcription from foreign promoters, regulates cell cycle progression and extends replicative life span.Interaction with FOB1 is required for the association of the RENT complex with the rDNA non-transcribed spacer region and for silencing at this location. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
