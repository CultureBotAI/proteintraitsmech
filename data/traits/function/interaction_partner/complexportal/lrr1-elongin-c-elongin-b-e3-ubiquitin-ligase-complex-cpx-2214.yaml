identifier: ComplexPortal:CPX-2214
label: "LRR1-Elongin C-Elongin B E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which targets the MCM7 (P33993) subunit of the replicative CMG helicase complex (CPX-4526). Polyubiquitylated CMG is then disassembled leading to replication termination. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
