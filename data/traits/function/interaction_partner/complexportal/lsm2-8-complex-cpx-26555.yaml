identifier: ComplexPortal:CPX-26555
label: "LSM2-8 complex"
definition: >-
  Hetero-heptameric complex of seven LSM proteins (LSM2-8) which affects the processing of small stable RNAs (including tRNAs, rRNAs) and pre-mRNAs in the nucleus. The complex is a core part of the U6 snRNP (CPX-26415), where it binds to the U6 RNA and contributes to stabilizing the U6 snRNA and chaperoning it through the splicing process. The LSM2-8 complex is thought to pre-exist in the cell and bind to U6 as a complex. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
