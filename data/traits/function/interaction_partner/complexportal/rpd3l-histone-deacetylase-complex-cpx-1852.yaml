identifier: ComplexPortal:CPX-1852
label: "RPD3L histone deacetylase complex"
definition: >-
  Histone deacetylase recruited to promoters in association with specific transcription factors such as UME6 (P39001), ASH1 (P34233), IME1 (P21190), WHI5 (Q12416), and STB1 (P42845) where it acts as a promoter targeted regulator of transcription.. At the promoter region, RPD3 deacetylates specific lysine residues on histones H3 and H4 in a localized region spanning about two nucleosomes. May also act to promote nucleosome assembly like a histone chaperone and prevent RSC-dependent histone eviction from nucleosomes. During vegetative growth, the complex functions as a negative regulator for all genes, whereas upon nitrogen depletion it functions as a positive regulator early during meiosis. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
