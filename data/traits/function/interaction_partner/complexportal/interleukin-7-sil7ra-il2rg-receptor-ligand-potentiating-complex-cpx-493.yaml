identifier: ComplexPortal:CPX-493
label: "Interleukin-7 sIL7RA-IL2RG receptor-ligand potentiating complex"
definition: >-
  Complex formed on the binding of extracellular interleukin-7 (IL7) to its receptor composed of a soluble form of IL7R (sIL7R) and the shared IL2RG. IL7 is expressed in lymphoid as well as in non-lymphoid sites, and is a key regulator of immune homeostasis. IL7 is critical for B cell development, and tonic IL7 signalling is essential for the proliferation and survival of memory and naive T cells, as well as T cell development in the thymus. A potent immunomodulator of tumours, it has both the ability to eradicate tumours but also exert strong pro-tumour effects. There are two major isoforms of IL7R, the membrane-bound IL7R (mIL-7R, p16871-1, CPX-9102) and an alternatively spliced sIL7R lacking the transmembrane region encoding exon 6 (p16871-4). sIL7R circulates at a high molar excess compared with IL7 in healthy humans and binds IL7 with moderate affinity to diminish the availability of free IL7. The competition diminishes STAT5 phosphorylation and therefore excessive signalling but increases overall bioavailability of the limited resource IL7. IL7 signalling contributes to autoimmunity and has been implicated as a cofactor in multiple sclerosis, autoimmune colitis autoimmune diabetes and lupus. Individuals with a predisposing IL7R genotype have increased rates of IL7R mRNA splicing resulting in elevated levels of sIL7R and are thought to be at increased risk of autoimmune disorders. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
