identifier: ComplexPortal:CPX-5245
label: "Aminodeoxychorismate synthase complex"
definition: >-
  Converts chorismate and glutamine to 4-amino-4-deoxychorismate and glutamate as part of a pathway for the biosynthesis of para-aminobenzoic acid, a precursor for the production of folate cofactors required for one-carbon transfer reactions, and tetrahydrofolate. PabA generates ammonia from glutamine, PabB then synthesizes 4-amino-4-deoxychorismate from chorismate and ammonia. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
