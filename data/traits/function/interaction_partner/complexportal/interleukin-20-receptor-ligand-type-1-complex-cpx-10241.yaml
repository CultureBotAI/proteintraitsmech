identifier: ComplexPortal:CPX-10241
label: "Interleukin-20 receptor-ligand Type 1 complex"
definition: >-
  Pleiotropic cytokine-receptor complex which plays a role in regulating tissue inflammation, angiogenesis, hemopoiesis, and epidermal cell and keratinocyte differentiation The bioactive complex is formed through crosstalk between IL20 cytokine producing immune cells and receptor complex expressing epthelial cells. Complex formation results in the transphosphorylation of JAK1 and TYK2, which in turn leads to the phosphorylation and activation of transcription factors STAT3 which subsequently translocates into the nucleus where it induces the transcription of target genes. Dysregulation of IL20-mediated signalling is implicated in the pathophysiology of psoriasis, rheumatoid arthritis and atherosclerosis. IL20's arteriogenic and angiogenic properties may be important in treating ischemic disease. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
