identifier: ComplexPortal:CPX-9021
label: "20S spermatoproteasome complex"
definition: >-
  Multi-enzyme complex that functions as the primary degradation machinery for the selective turnover of surplus or damaged proteins within the cell. Specifically found in the testis, spermatoproteasomes (s20S) are comprised of the constitutive 20S Proteasome subunits (alpha 1-3 and 5-6 and beta 1-7), as well as a novel alpha-4s subunit (Q8TAA3) in lieu of the alpha-4 subunit (O14818). The s20S associates with proteasomal activators to form large (19S-s20S-PA200, hybrid) and small s20S-PA200 (single-capped), PA200-s20S-PA200 (double-capped) spermatoproteasomal complexes. Mammalian s20S are known to degrade acetylated histones through association with PA200 (Q14997) and play a role in DNA damage repair in spermatocytes and the maturation of spermatids. Promotes acetylation-dependent degradation of histones through PA200's BRDL (bromodomain like) region, thereby participating actively in the exchange of histones during spermatogenesis. Essential for the degradation of meiotic proteins RAD51 and RPA1 at late prophase I and the progression of meiosis I during spermatogenesis. Localizes to the synaptonemal complex, a 'zipper-like' structure that holds homologous chromosome pairs in synapsis during meiotic prophase I. Loss of PA200 in mouse models revealed defects in spermatogenesis in meiotic spermatocytes as well as during postmeiotic haploid spermatids maturation, with a marked reduction in male fertility. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
