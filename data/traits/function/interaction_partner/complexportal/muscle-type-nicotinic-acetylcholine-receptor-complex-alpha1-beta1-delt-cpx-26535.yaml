identifier: ComplexPortal:CPX-26535
label: "Muscle-type nicotinic acetylcholine receptor complex, alpha1-beta1-delta-epsilon"
definition: >-
  Ligand-gated ion channel receptor complex. Found in the post-synaptic membrane of neuromuscular junctions, it is sensitive to endogenous achetylcholine and exogenous nicotinic agents. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron and ultimately producing muscle contractions. Mediates fast, short-lived synaptic transmission of neurotransmitters at the foetal extra-junctional, non-innervated muscle but acts slower than the adult receptor. Mutations in several of the actylcholine receptor genes are implicated in Congenital myasthenic syndrome, a disorder of the postsynaptic neuromuscular junction, characterized by early-onset muscle weakness of variable severity. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
