identifier: ComplexPortal:CPX-2269
label: "TORC2 complex"
definition: >-
  Serine/threonine protein kinase complex that regulates cellular processes including cell growth, survival and organization of the cytoskeleton in response to hormones and growth factors. Lst8 is a non-essential component of the TORC2 complex. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
