identifier: ComplexPortal:CPX-2974
label: "rst cell adhesion complex"
definition: >-
  Multi-purpose cell adhesion molecule (CAM) complex. Expressed in inter-ommatidial cells and is required for correct axonal pathway formation in the optic lobe and for programmed cell death in the developing retina. Expressed on myoblast founder cells and play a role in myoblast fusion during muscle development. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
