identifier: ComplexPortal:CPX-26553
label: "LSM2-8 complex"
definition: >-
  The hetero-heptameric complex of seven Lsm proteins (Lsm2-8) affects the processing of small stable RNAs (including tRNAs, rRNAs) and pre-mRNAs in the nucleus. The complex is part of the U6 snRNP, where it binds to the U6 RNA and contributes to stabilizing the U6 snRNA and chaperoning it through the splicing process. The LSM2-8 complex (this complex) is thought to pre-exist in the cell and act as chaperone for U6 spliceosomal RNA (CPX-26415). The cytoplasmic LSM1-7 complex (CPX-26554) initiates mRNA decay. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
