identifier: ComplexPortal:CPX-495
label: "uPA-PAI-1 complex"
definition: >-
  Regulates the activity of the plasminogen activation system, an extracellular proteolytic cascade. Inhibited form of urokinase plasminogen activator uPA (Plau), an enzyme responsible for the cleavage of plasminogen (P20918) to form plasmin. Formation of the complex plays a crucial role in fibrinolysis, cell adhesion and migration and tissue remodeling including tumor progression and metastasis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
