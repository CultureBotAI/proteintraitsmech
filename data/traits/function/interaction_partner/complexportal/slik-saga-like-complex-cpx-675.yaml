identifier: ComplexPortal:CPX-675
label: "SLIK (SAGA-like) complex"
definition: >-
  A transcriptional co-activator complex that accompanies Pol II during elongation, preferentially acetylates nucleosomal histones H3 and H2B and subsequently evicts nucleosomes from gene coding regions. Required for growth under stressful conditions to activate transcription of stress-responsive, Pol II-transcribed genes. Plays a role in the yeast retrograde response pathway that is important for gene expression changes during mitochondrial dysfunction. A curated stable macromolecular complex (Complex Portal) with 19 subunits.
