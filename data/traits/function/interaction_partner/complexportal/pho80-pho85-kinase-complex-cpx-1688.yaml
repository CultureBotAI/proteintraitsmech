identifier: ComplexPortal:CPX-1688
label: "PHO80-PHO85 kinase complex"
definition: >-
  Cyclin-dependent protein kinase that negatively regulates the phosphate starvation response by controlling both the localization and activity of the transcription factor PHO4 (P07270). PHO4, in turn, activates transcription of phosphate acquisition genes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
