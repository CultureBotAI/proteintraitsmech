identifier: ComplexPortal:CPX-978
label: "NuA4 histone acetyltransferase complex"
definition: >-
  Histone acetyl transferase (HAT) complex involved in transcriptional activation of selected genes, mostly involved in apoptosis, cell-cycle regulation and hypoxia. Examples of regulated genes include TP53 (P04637)-dependent transcription genes, those containing promoters regulated by MYC (P01106) and highly transcribed genes such as those encoding ribosomal proteins. The major acetylation targets are lysines-5, 8, and 12 on nucleosomal H4, K5 and K15 on H2A, histone variants H2AZ and H2AX, as well as non-histone substrates such as TP53. The NuA4 complex can also acetylate H3 in free histones. A core complex formed by the subunits KAT5, EPC1, and ING3 is sufficient to enable strong HAT activity on nucleosomal templates (Piccolo NuA4 CPX-709). The NuA4 complex is rapidly recruited at double-strand breaks (DSBs) during double strand break repair to acetylate H4, H2A, and H2AX, thereby facilitating chromatin opening. A curated stable macromolecular complex (Complex Portal) with 19 subunits.
