identifier: ComplexPortal:CPX-471
label: "Tenascin-C complex"
definition: >-
  A matricellular glycoprotein complex of the extracellular matrix found in the basement membrane of many cell types. Its expression is highly specific and restricted in space and time: it is expressed transiently in many developing organs and persists in the adult mainly in a few structures bearing high tensile stress, such as tendons, ligaments, and the smooth muscle walls of arteries. Transcriptionally regulated by a large number of transcription factors, growth factors and cytokines as well as mechanical stress and negatively regulated by microRNAs (e.g. miR-335). Involved in the regulation of many embryogenesis and organogenesis pathways such as cell adhesion, cell migration, cell growth, gene expression of Pdgfra and Pdgfrb (P26618/P05622) (through activation via Wnt/beta-catenin signalling pathway), epithelial morphogenesis and neuromuscular junction development. Only widely expressed in adult tissues upon inflammation in response to injury and also appears to play a role in peripheral nervous system axon regeneration. May act as a pro-oncogene. Binds syndecans and a range of different integrins. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
