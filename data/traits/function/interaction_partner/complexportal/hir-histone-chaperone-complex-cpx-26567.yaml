identifier: ComplexPortal:CPX-26567
label: "HIR histone chaperone complex"
definition: >-
  Histone chaperone complex which promotes nucleosome assembly. Cooperates with the cia1 (O74515) co-chaperone to deposit histone (H3/H4)2 tetramers on DNA for replication-independent chromatin assembly. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
