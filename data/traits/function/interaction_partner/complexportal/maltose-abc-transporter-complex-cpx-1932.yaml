label: "Maltose ABC transporter complex"
definition: >-
  High affinity maltose transporter, binding maltooligosaccharides up to seven glucose units long. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
