identifier: ComplexPortal:CPX-1079
label: "DinJ-YafQ toxin-antitoxin complex"
definition: >-
  Type II toxin-antitoxin (TA) system formed by the toxin (yafQ), and the antitoxin (dinJ). TA systems act as effectors of dormancy and persistence, with the toxin causing growth arrest by interfering with a vital cellular process, such as transcription, translation or DNA replication, and the cognate antitoxin neutralizing the toxin activity during normal growth conditions. The toxin yafQ degrades mRNA at adenosine-rich codons, most likely while it is bound to the ribosome. The binding of dinJ occludes the active site of yafQ. Under conditions of stress the antitoxins are selectively degraded by cellular proteases such as Lon (P0A9M0) and ClpXP (CPX-3176), leaving the toxins to exert their effectsl which result in growth arrest and cell dormancy. Both the antitoxin and, in most cases, the TA complex bind the TA promoter to repress transcription, with TA complexes repressing transcription more efficiently than the antitoxins alone by increasing the co-operativity of antitoxin binding to operators.The toxin yafQ degrades mRNA at adenosine-rich codons, most likely while it is bound to the ribosome. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
