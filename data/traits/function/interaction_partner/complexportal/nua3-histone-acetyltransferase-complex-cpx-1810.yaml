identifier: ComplexPortal:CPX-1810
label: "NuA3 histone acetyltransferase complex"
definition: >-
  Acetylates Histone H3 on Lys-14 of the mature histone protein, resulting in transcription elongation. Histone H3 methylation leads to the recruitment of NuA3 to nucleosomes, via binding of the Yng1 subunit. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
