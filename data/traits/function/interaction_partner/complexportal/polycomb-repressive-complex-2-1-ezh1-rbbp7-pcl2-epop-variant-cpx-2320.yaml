identifier: ComplexPortal:CPX-2320
label: "Polycomb repressive complex 2.1, EZH1-RBBP7-PCL2-EPOP variant"
definition: >-
  Histone-lysine N-methyltransferase which trimethylates Lys-10 (H3K9me3) and Lys-28 on histone H3 (H3K27me3) leading to transcriptional silencing of genes critical for development and stem cell differentiation. Also mediates mono and dimethylation of H3K27. PRC2 is preferably targeted to CpG islands in cells. EZH1-containing PRC2 displays a high binding affinity towards nucleosomes and exhibits chromatin compaction activity. MTF2 regulates the transcriptional networks during embryonic stem cell self-renewal and differentiation. EPOP acts as a bridge between the PRC2 complex and the elongin BC E3 ubiquitin ligase complexes. This interaction is required to fine-tune the transcriptional status of polycomb group target genes in embryonic stem cells by restricting excessive activity of the PRC2 complex. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
