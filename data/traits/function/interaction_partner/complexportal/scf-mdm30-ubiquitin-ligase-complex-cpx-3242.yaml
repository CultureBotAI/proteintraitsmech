identifier: ComplexPortal:CPX-3242
label: "SCF-Mdm30 ubiquitin ligase complex"
definition: >-
  SCF-Mdm30 is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, in which the F-box protein, Mdm30, forms the substrate recognition subunit. The complex is required for the degradation of Fzo1 and Gal80, and is thereby involved in mitochondrial fusion and regulation of galactose metabolism. The active complex may be a homodimer. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
