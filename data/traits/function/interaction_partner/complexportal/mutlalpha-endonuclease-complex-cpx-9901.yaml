identifier: ComplexPortal:CPX-9901
label: "MutLalpha endonuclease complex"
definition: >-
  Endonuclease complex which nicks a DNA strand containing a pre-existing nick, presumably to provide an entry site for a mispair excision reaction. Required for DNA mismatch repair (MMR), correcting base-base mismatches and insertion-deletion loops resulting from DNA replication, DNA damage or from recombination events between non-identical sequences during meiosis. ATP binding induces a conformational change in the MutSalpha/MSH2-MSH6 (CPX-80) and MutSbeta/MSH2-MSH3 (CPX-77) complexes which converts these to a clamp form that slides along the DNA and leads to recruitment of MutLalpha/MLH1-PMS2, MutLbeta/MLH1-PMS1 (CPX-9941) and MLH1-MLH3 (CPX-9961). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
