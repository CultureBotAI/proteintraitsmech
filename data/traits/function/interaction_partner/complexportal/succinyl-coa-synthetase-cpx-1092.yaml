identifier: ComplexPortal:CPX-1092
label: "Succinyl-CoA synthetase"
definition: >-
  Succinyl-CoA synthetase functions in the citric acid cycle (TCA), coupling the hydrolysis of succinyl-CoA to the synthesis of either ATP or GTP and thus represents the only step of substrate-level phosphorylation in the TCA. It catalyzes the reversible interchange of purine nucleoside diphosphate, succinyl-CoA and phosphate with purine nucleoside triphosphate, succinate, and CoA via a phosphorylated histidine intermediate. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
