identifier: ComplexPortal:CPX-394
label: "YAP1-TEAD1 transcription factor complex"
definition: >-
  Transcription factor complex of enhancer factor TEF-1 (Tead) and coactivator Yap1. Plays key role in Hippo signaling pathway involved in organ size control and tumor supression by restricting proliferation and promoting apoptosis. Connective tissue growth factor (Ctgf) has been identified as a direct target gene. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
