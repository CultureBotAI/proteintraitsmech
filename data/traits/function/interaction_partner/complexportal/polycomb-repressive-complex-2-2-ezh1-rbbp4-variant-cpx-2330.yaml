identifier: ComplexPortal:CPX-2330
label: "Polycomb repressive complex 2.2, EZH1-RBBP4 variant"
definition: >-
  Histone-lysine N-methyltransferase which trimethylates Lys-10 (H3K9me3) and Lys-28 on histone H3 (H3K27me3) leading to transcriptional silencing of genes critical for development and stem cell differentiation. Also mediates mono and dimethylation of H3K27. PRC2 is preferably targeted to CpG islands in cells. PRC2.2 preferentially mediates de novo repression of active genes. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
