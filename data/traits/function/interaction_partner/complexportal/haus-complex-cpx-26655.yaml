identifier: ComplexPortal:CPX-26655
label: "HAUS complex"
definition: >-
  Regulates mitotic spindle assembly and centrosome integrity and is required for completion of cytokinesis. The complex interacts with the gamma-tubulin ring complex and this interaction is required for spindle assembly. May regulate microtubule nucleation events to control neuronal development. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
