identifier: ComplexPortal:CPX-2823
label: "NUBP1-NUBP2 iron-sulfur cluster assembly scaffold complex"
definition: >-
  Scaffold complex that assembles nascent FeS clusters as part of the iron-sulfur cluster (ISC)/cytosolic iron–sulfur protein assembly (CIA) assembly system, which generates and inserts [4Fe-4S] (CHEBI:49883) clusters to both cytosolic and nuclear Fe/S proteins. Assembly of a [4Fe-4S] cluster requires interaction with the BOLA2-GLRX3 iron-sulfur cluster assembly complex (CPX-6861). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
