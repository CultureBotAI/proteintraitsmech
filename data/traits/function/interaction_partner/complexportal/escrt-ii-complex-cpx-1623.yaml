identifier: ComplexPortal:CPX-1623
label: "ESCRT-II complex"
definition: >-
  The ESCRT machinery consists of ESCRT-0 (CPX-1622), -I (CPX-940), -II (this complex), -III (CPX-1624) and -IV (VPS4 complex, CPX-334) and is required for the downregulation of cell-surface receptors and for the final membrane scission step during endocytosis. ESCRT-II transiently associates with endosomes and facilitates recruitment of ESCRT-III components to membranes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
