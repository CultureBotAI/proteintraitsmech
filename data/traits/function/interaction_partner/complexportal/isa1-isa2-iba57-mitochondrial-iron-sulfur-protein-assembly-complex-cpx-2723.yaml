identifier: ComplexPortal:CPX-2723
label: "ISA1-ISA2-IBA57 mitochondrial iron-sulfur protein assembly complex"
definition: >-
  Assembles [4Fe-4S] clusters from reductive coupling of two [2Fe-2S] clusters received from GLRX5 homodimers (CPX-6957). The [4Fe-4S] clusters can then be inserted into mitochondrial [4Fe-4S]-requiring proteins. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
