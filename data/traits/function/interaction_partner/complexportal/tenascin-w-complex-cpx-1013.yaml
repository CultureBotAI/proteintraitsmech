identifier: ComplexPortal:CPX-1013
label: "Tenascin-W complex"
definition: >-
  A matricellular glycoprotein complex of the extracellular matrix found in a range of tissues, predominantly neuronic and bone tissues. Expression is highly controlled and more prominent in developing embryos than adult tissues. Involved in neurite outgrowth, cell adhesion and cell migration. Appears to be a marker for transformed cells in adult tumors, esp the stroma of most solid tumors and blood vessels of gliomas where it displays pro-angiogenic activity. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
