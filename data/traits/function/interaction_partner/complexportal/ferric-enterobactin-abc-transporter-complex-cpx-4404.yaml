identifier: ComplexPortal:CPX-4404
label: "Ferric-enterobactin ABC transporter complex"
definition: >-
  High affinity ferric-enterobactin transporter. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. Transports Fe3+ complexed to the catecholate ferric enterobactin across the inner membrane. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
