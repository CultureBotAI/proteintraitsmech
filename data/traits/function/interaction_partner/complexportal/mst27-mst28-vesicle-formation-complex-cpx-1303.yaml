identifier: ComplexPortal:CPX-1303
label: "MST27-MST28 vesicle formation complex"
definition: >-
  Role in promoting vesicle formation. Appears to provide nucleation sites, which recruit and locally concentrate cytosolic coat complexes onto the membranes of the early secretory pathway. The complexes cycles between the endoplasmic reticulum (ER) and Golgi apparatus, however, its steady-state localization is probably in the ER. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
