identifier: ComplexPortal:CPX-26724
label: "Clathrin complex"
definition: >-
  Building block of the polyhedral coat of coated pits and vesicles, forming a polymeric mechanical scaffold on the vesicle surface. Clathrin-coated vesicles participate in selective protein transport processes from the plasma membrane and the Golgi complex, including endocytosis, sorting of newly made lysosomal proteins, secretory granule formation and localization of certain Golgi membrane proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
