identifier: ComplexPortal:CPX-3822
label: "nrdD class III anaerobic ribonucleotide reductase complex"
definition: >-
  Glycyl radical deoxyribonucleotides reductase required for DNA synthesis and repair. The formation of the nrdDG class III anaerobic ribonucleotide reductase activation complex (CPX-3821) leads to activation of the NRD homodimer. This then dissociates and catalyzes several rounds of NTP reduction in the presence of formate as an electron donor, with ATP as the allosteric effector and requiring Mg2+ and K+ to stimulate the reaction. Exposure of the activated reductase to oxygen leads to C-terminal truncation and inactivation of the protein, by cleavage at the N-terminal side of Gly-681. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
