identifier: ComplexPortal:CPX-4467
label: "Matrilin-2 complex"
definition: >-
  A extracellular matrix complex that mediates interactions between major components of the extracellular matrix and contributes to their fibrillar network. Compared to cartilage-specific Matrilin-1 and -3, Matrilin-2 and -4 have a broad tissue distribution. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
