identifier: ComplexPortal:CPX-4025
label: "pph-6-saps-1 phosphatase complex"
definition: >-
  A protein phosphatase complex that dephosphorylates targets to modulate processes such as cytokinesis during cell division. Specifically, the complex is required for the organisation of cortical non-muscle myosin II (nmy-2) (G5EBY3) and spindle positioning in one-cell stage embryos. Plays a role in nmy-1 distribution during anaphase and cytokinesis. Required for proper pulling forces that drive mitotic spindle movement during anaphase, by promoting the cortical localization of components of the gpr-1-gpr-2-lin-5 complex (CPX-4027). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
