identifier: ComplexPortal:CPX-1906
label: "Peroxisomal PEX7-PEX21 receptor complex"
definition: >-
  Receptor complex which recognises peroxisomal targeting signal type 2 containing proteins synthezised on cytosolic ribosomes. The receptor-cargo complex is then transported from the cytosol to the peroxisomal docking complex (CPX-1904). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
