identifier: ComplexPortal:CPX-6665
label: "Serine palmitoyltransferase complex, SPTLC1-SPTLC3-SPTSSA variant"
definition: >-
  Catalyzes the first, rate-limiting step of the sphingolipid synthesis pathway, driving the condensation of L-serine and acyl-CoA thioester substrates to form 3-dehydrosphinganinium (CHEBI:58299). The SPTLC1-SPTLC3-SPTSSA complex uses C12-CoA, C14-CoA and C16-CoA as substrates, with a slight preference for C14-CoA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
