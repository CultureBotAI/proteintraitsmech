identifier: ComplexPortal:CPX-26610
label: "slx1-slx4 structure-specific endonuclease complex"
definition: >-
  A structure-specific DNA endonuclease that cleaves the phosphodiester backbone on the 3'-side of the DNA branchpoint of branched DNA substrates including stem-loops and Y-structures, replication forks, 5'- and 3'-flaps, and nicked or intact Holliday junctions and is therefore involved in DNA recombination and repair. It is involved in rDNA copy number regulation and appears to act at the termination of rDNA replication. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
