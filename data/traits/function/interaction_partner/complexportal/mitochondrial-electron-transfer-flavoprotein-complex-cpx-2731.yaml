identifier: ComplexPortal:CPX-2731
label: "Mitochondrial electron transfer flavoprotein complex"
definition: >-
  Functions as a specific electron acceptor for primary dehydrogenases involved in mitochondrial fatty acid and amino acid catabolism, transferring the electrons to terminal respiratory systems the electron transfer flavoprotein-ubiquinone oxidoreductase protein (Q16134) which then transfers the electron to the ubiquinone pool in the inner mitochondrial membrane. Located on the matrix face of the inner mitochondrial membrane and docks onto the surface of partner proteins via a recognition peptide element located within an anchor domain. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
