identifier: ComplexPortal:CPX-26731
label: "ERG25-ERG26-ERG27 ergosterol biosynthesis complex"
definition: >-
  Ergosterol biosynthesis complex. The ERG25-ERG26-ERG27 multienzyme complex is formed primarily in the endoplasmic reticulum (ER) during the late stages of the ergosterol synthesis pathway, which involves the conversion of lanosterol to zymosterol through a series of demethylation, reduction, and desaturation reactions. Ergosterol is essential for mitochondrial DNA maintenance, and is also an immunoactive lipid which induces host cell pyroptosis, a necrotic and inflammatory programmed cell death. Ergosterol abundance is critical for yeast stress adaptation, including hypoxic and iron deficiency responses in yeast. Loss-of-function of complex components within the late pathway is thought to be lethal and lead to sterol auxotrophy. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
