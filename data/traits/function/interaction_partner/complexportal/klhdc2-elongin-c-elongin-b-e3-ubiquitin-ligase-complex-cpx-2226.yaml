identifier: ComplexPortal:CPX-2226
label: "KLHDC2-Elongin C-Elongin B E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which targets degradation signals (degrons) within the C-termini of substrate proteins in a pathway termed destruction via C-end degrons (DesCEND). The C-degron is generally a motif of fewer than ten residues ending with -Gly-Gly and can be present in full-length proteins, truncated proteins or proteolytically cleaved forms. Substrates include early terminated selenoproteins SelK (Q9Y6D0) and SelS (Q9BQE4) and the N-terminal proteolytic product of the USP1 deubiquitinating enzyme (O94782),. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
