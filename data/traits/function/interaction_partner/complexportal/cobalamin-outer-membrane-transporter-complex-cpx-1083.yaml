identifier: ComplexPortal:CPX-1083
label: "Cobalamin outer membrane transporter complex"
definition: >-
  A member of the TonB-dependent transporter family (TBDTs) which binds and then transports cobalamine (vitamin B12) across the outer membrane. TBDTs are energy-dependent gated channels that usually transport large metal complexes which cannot fit through porins, and are too scarce to enter by mass-action-driven transport. Energy-dependent uptake through TBDTs requires interaction with tonB in complex with exbB and exbD in the inner membrane, ExbBD. tonB undergoes rapid energized movement driven by ExbBD which harvest the electrochemical force from the electrochemical proton gradient created by the proton gradient across the inner membrane and convert it into rotational motion. Hence, tonB may pull or twist the N-termini of TBDTs to promote transport of substrates into the periplasm. ATP-binding-cassette (ABC) transporters subsequently move the cyanocobalamine through the periplasm and inner membrane. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
