identifier: ComplexPortal:CPX-1364
label: "SMC5-SMC6 SUMO ligase complex"
definition: >-
  SUMO ligase complex with a role in homologous recombination (HR) and replication. Required for chromosome segregation at repetitive sequences. Localizes to repetitive elements such as the rDNA and telomeres where is is thought to promote and resolve HR-dependent intermediates using ATP-hydrolysis to symmetrically reel DNA into loops. Also required for telomere maintenance during replication and telomere elongation and for SUMOylating components of the replisome, such as MCM2 (P29469) and the POL2 (P21951) subunit of the DNA polymerase epsilon complex (CPX-2110), which is important for replication fork progression in the presence of DNA-damaging agents. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
