identifier: ComplexPortal:CPX-9085
label: "19S-20S-PA28-gamma hybrid proteasome complex"
definition: >-
  Multi-enzyme complex that functions as the primary degradation machinery for the selective turnover of surplus or damaged proteins within the cell. Proteins targeted for degradation are covalently labelled with polyubiquitin chains which are recognized and removed by the proteasome. The core contains the protease active sites (chymotrypsin-like, trypsin-like and peptidylglutamyl-peptide hydrolysing) that perform the proteolysis reactions in an internal chamber. Regulatory particles referred to as 'caps' act as a discriminating gateway for potential substrates. This double-capped hybrid proteasome complex comprises the proteasome regulator PA28gamma (PSME3-P61289) at one end of the 20S catalytic core (CPX-8806), and the 19S regulatory particle (CPX-8964) at the other end. Protein degradation is directed in an ATP-dependent manner by the 19S cap, while the PA28gamma cap acts through an ATP and ubiquitin independent pathway. A curated stable macromolecular complex (Complex Portal) with 34 subunits.
