identifier: ComplexPortal:CPX-142
label: "HCN2 channel complex"
definition: >-
  Hyperpolarization-activated cyclic nucleotide-gated (HCN) ion channel that is dually activated by hyperpolarization and binding of cAMP to their cyclic nucleotide binding domain (CNBD) thereby releasing the tonic inhibition exerted by the cytoplasmic CNBD on the channel pore. Exhibits weak selectivity for potassium over sodium ions and contributes to the native pacemaker currents in heart (If) and in neurons (Ih). Together with HCN4 (O70507, CPX-139), HCN2 is the dominant form of HCN expressed in the heart. Produces a large instantaneous current. Modulated by intracellular chloride ions and pH; acidic pH shifts the activation to more negative voltages. Contrary to other ion-gated channels, HCN channels do not require an accessory unit but depolarisation activity is affected by optional accessory proteins such as TRIP8b (Pex5l, Q8C437) or lipids such as phosphatidylinositol-4,5-biphosphate. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
