identifier: ComplexPortal:CPX-1262
label: "Brain-specific SWI/SNF ATP-dependent chromatin remodeling complex, ARID1A-SMARCA4 variant"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. Also targeted to chromatin by phosphatidylinositol-4,5-bisphosphate which promotes the complex binding to actin filaments. The complex additionally interacts with a range of nuclear receptors and the vitamin D receptor (Vdr, P48281) via Smarcd subunits. Regulates cell differentiation specifically in post-mitotic brain tissue. In this variant of the complex transcriptional repression is probably driven by the presence of the Arid1a subunit. The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. It is likely that the two ATPases, Smarca2/Brm (CPX-1261) and Smarca4/Brg1 (this complex) do not co-occur in the same complex. In contrast to the neuron-specific SWI/SNF complex the brain-specific SWI/SNF complex misses core subunit Smarcc1 (P97496) and alternative subunits Actl6a (Q9Z2N8), Smarcd1 (Q61466) or Smarcd3 (Q6P9Z1). May contain pBAF-specific subunit Pbrm1 (Baf180, Q8BSQ9). Mutations in several subunits affect tissue and developmental processes such as nervous system and cardiac development and maintenance of pluripotency resulting in tumorigenesis or the development of intellectual disorders. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
