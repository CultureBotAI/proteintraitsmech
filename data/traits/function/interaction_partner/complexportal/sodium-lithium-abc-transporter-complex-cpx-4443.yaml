identifier: ComplexPortal:CPX-4443
label: "Sodium/lithium ABC transporter complex"
definition: >-
  ABC transporter complex implicated in multi-drug resistance, exhibiting dual functionality as a drug efflux pump, binding tetracyclines, and a Na+ (Li+)/H+ antiporter. Member of the ATP-binding cassette (ABC) superfamily of transporters, eukaryote-type (EK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
