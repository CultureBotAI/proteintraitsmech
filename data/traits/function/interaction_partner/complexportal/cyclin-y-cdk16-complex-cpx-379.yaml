identifier: ComplexPortal:CPX-379
label: "Cyclin Y-CDK16 complex"
definition: >-
  Cyclin-dependent protein kinase complex which appears to play an essential role in spermatogenesis. The AMPK complex activates Cyclin Y/CDK16 to initiate an early step in the formation of autophagosomes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
