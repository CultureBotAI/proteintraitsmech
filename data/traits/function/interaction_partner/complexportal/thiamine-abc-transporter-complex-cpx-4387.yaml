identifier: ComplexPortal:CPX-4387
label: "Thiamine ABC transporter complex"
definition: >-
  High affinity thiamine transporter. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. Thiamine is required for the synthesis of thiamine pyrophosphate (TPP), a required cofactor in central metabolism as an electron carrier and nucleophile for such enzymes as pyruvate dehydrogenase (CPX-3943) and acetolactate synthase (CPX-3575). The operon is transcriptionally repressed in the presence of excess thiamine. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
