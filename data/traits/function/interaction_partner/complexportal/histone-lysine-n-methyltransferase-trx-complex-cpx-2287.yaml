identifier: ComplexPortal:CPX-2287
label: "Histone-lysine N-methyltransferase TRX complex"
definition: >-
  Histone lysine methyltransferase complex which methylates lysine-4 on the histone H3 tail at important regulatory regions in the genome and thus modulates chromatin structures and DNA accessibility. Distinct H3K4 methylation states resulting in activation of cis-regulatory enhancer elements that control the transcriptional regulation of developmental genes. Plays a role in the early regulation of homeotic genes expressed only in the posterior region of the embryo. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
