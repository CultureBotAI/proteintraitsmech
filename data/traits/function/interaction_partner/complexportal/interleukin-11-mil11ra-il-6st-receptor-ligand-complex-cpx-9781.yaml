identifier: ComplexPortal:CPX-9781
label: "Interleukin 11-mIL11RA-IL-6ST receptor-ligand complex"
definition: >-
  Cytokine-receptor complex. IL11 binds to a membrane-bound form of its specific receptor component, mIL11RA and recruits the ubiquitously expressed IL6ST to activate signalling via IL6ST's Tyr-759 initiating either the apoptotic MAPK (ERK) pathway, or to a lesser extent, the pro-survival STAT3 pathway. IL11 is produced by fibroblasts and epithelial cells in addition to various immune cell types. It is classically-associated with a regenerative role in megakaryocytopoiesis but has also been critically implicated in the tumourigenesis of gastrointestinal and epithelial cancers. IL11 is thought to be a contributor in driving the pathogenesis of autoimmune inflammatory diseases such as rheumatoid arthiritis and multiple sclerosis as well as chronic inflammatory conditions such as asthma. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
