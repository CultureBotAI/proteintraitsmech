identifier: ComplexPortal:CPX-578
label: "Cyclin-dependent protein kinase-activating kinase complex"
definition: >-
  Cyclin-dependent kinase (CDK) activation minimally depends on two events: binding to a cyclin and phosphorylation of a conserved Thr residue in the activation (T) loop. CAK activates the cyclin-associated kinases CDK1 (P06493), CDK2 (P24941), CDK4 (P11802) and CDK6 Q00534) by threonine phosphorylation, thus regulating cell cycle progression. CAK activity is itself regulated throughout the cell cycle by T-loop phosphorylation of CDK7 on Thr-170. Phosphorylation of Ser-164 during mitosis inactivates the enzyme. In the transcription cycle, CAK serine phosphorylates the carboxyl-terminal domain (CTD) of RNA polymerase II (POLR2A, P24928) and other proteins, as part of the general transcription factor TFIIH. Phosphorylation of POLR2A in complex with DNA promotes transcription initiation by triggering dissociation from DNA. CAK also phosphorylates CDK9 (P-TEFb, P50750), which releases POLR2A from the promoter and and enables elongation of the transcripts. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
