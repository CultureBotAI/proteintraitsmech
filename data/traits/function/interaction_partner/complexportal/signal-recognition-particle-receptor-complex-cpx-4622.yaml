identifier: ComplexPortal:CPX-4622
label: "Signal recognition particle receptor complex"
definition: >-
  Mediates the co-translational targeting of membrane and secretory proteins. The signal recognition particle (SRP) binds to 9-12 large hydrophobic residues that constitute the signal sequences of nascent proteins as they emerge from the exit tunnel of the ribosome. The resulting targeting complex, composed of the SRP and the ribosome-nascent chain complex, then docks with the Signal recognition particle receptor. This interaction catalyzes the GTP-dependent transfer of the nascent chain from SRP to the protein translocation apparatus in the ER membrane. Following GTP hydrolysis, the complex dissociates. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
