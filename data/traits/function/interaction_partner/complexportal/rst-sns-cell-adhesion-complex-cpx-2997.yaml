identifier: ComplexPortal:CPX-2997
label: "rst-sns cell adhesion complex"
definition: >-
  Multi-purpose cell adhesion molecule (CAM) complex. Probable role in epithelial remodeling process in the developing eye. Role in myoblast fusion during muscle development, may be required for the recognition of founder cells and myotubes by fusion-competent myoblasts. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
