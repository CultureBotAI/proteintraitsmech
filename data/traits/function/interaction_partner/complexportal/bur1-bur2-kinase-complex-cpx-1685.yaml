identifier: ComplexPortal:CPX-1685
label: "BUR1-BUR2 kinase complex"
definition: >-
  Implicated in transcription elongation. Phosphorylates the UBC2/RAD6 ubiquitin-conjugating enzyme (E2), leading to monoubiquitination of histone H2B, the localization of the PAF1 complex (CPX-1726) to chromatin, and the silencing of telomeric-associated genes. Also required for histone H3 Lys-4 trimethylation. Recruited to the C-terminal repeat domain of the largest subunit of RNA Pol II, RPB1 (P04050), phosphorylated on Ser-5 to augment Ser-2 phosphorylation by the carboxy-terminal domain protein kinase complex (CPX-1710) early in the transcription cycle. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
