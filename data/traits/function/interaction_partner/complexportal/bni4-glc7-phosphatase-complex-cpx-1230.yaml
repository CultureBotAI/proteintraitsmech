identifier: ComplexPortal:CPX-1230
label: "BNI4-GLC7 phosphatase complex"
definition: >-
  Protein phosphatase complex which is important for the regulation of bud site emergence. The asymmetric localization of BNI4-GLC7 is essential for proper morphological development and correct deposition of the chitin ring as the complex recruits chitin synthase III to the cell cortex on the mother-side of the septin collar. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
