identifier: ComplexPortal:CPX-1200
label: "RAP1-GCR1 transcription activation complex"
definition: >-
  Transcription factor required for the transcription of ribosomal protein and glycolytic genes. Appears to simultaneously bind to two adjacent DNA elements (UAS(RPG) and the CT box, bound specifically by RAP1 and GCR1, respectively). The complex can activate transcription through isolated UAS(RPG) (upstream activating sequence in (ribosomal protein genes)) but not CT elements. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
