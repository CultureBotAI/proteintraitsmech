identifier: ComplexPortal:CPX-1860
label: "Anaphase-promoting core complex"
definition: >-
  APC, a key regulator of cell cycle progression, is a conserved cullin-RING E3 ubiqutin ligase which facilitates multiubiqutination of cell cycle proteins, including cyclins, so marking them for proteasomal destruction. Generally believed that APC acts as a scaffold that brings E2 enzymes and substrates into close proximity. APC activity is required for metaphase-anaphase transition, mitotic exit, G1 phase and DNA replication. Targets securin for destruction, which is necessary for chromosome segregation. APC seems to have similar function in meiosis. Co-activators, CDC20 (Q12834) and FRZ1/CDH1 (Q9UM11), associate with APC core complex at specific stages of cell cycle, and are thought to be involved in substrate specificity. APC-CDC20 (CPX-6087) is active in presence of high cyclin-cdk activity in M phase but after metaphase when cyclin-cdk activity decreases, FRZ1 is dephosphorylated, CDC20 is degraded and APC-FRZ1 (CPX-6088) activated. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
