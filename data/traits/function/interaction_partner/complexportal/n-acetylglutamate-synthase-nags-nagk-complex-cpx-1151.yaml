identifier: ComplexPortal:CPX-1151
label: "N-acetylglutamate synthase NAGS/NAGK complex"
definition: >-
  Required for the controlling initial step of L-arginine biosynthesis. Forms a metabolon, i.e. a complex formed by the supramolecular association of two sequentially acting enzymes of the pathway that synthesizes N(2)-acetyl-L-ornithine from L-glutamate. Regulated by arginine binding. The ARG5,6 kinase can exist independently of ARG2, ARG2 appears only to exist as a part of the metabolon. ARG5,6 may therefore also act as a chaperone and/or an essential stabilizing agent for ARG2. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
