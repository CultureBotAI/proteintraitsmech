identifier: ComplexPortal:CPX-7964
label: "COP9 signalosome complex, testis-specific variant"
definition: >-
  Plays a central role in the regulation of the E3-cullin RING ubiquitin ligases, deNEDDylating the cullin subunit via the isopeptidase activity of the CNS5 subunit. CSN1a lacks a PCI domain (IPR000717) and is primarily expressed in the testis. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
