identifier: ComplexPortal:CPX-9224
label: "Interleukin-3 receptor-ligand complex"
definition: >-
  Transmembrane complex formed on the binding of a monomeric extracellular interleukin-3 (IL3) to its receptor composed of IL3A and CSF2RB. Ligand binding results in the assembly of the complete complex, inducing the transphosphorylation of JAK2 molecules as well as phosphorylation of the cytoplasmic tails of the receptors. STAT5 monomers bind to the phosphorylated site of the receptor and are phosphorylated by JAK2. Phosphorylated STAT5 dissociates from the receptors, dimerizes, and the dimer translocates into the nucleus where it induces the transcription of target genes. IL3 can also mediate its signal through the c-myc and Ras pathways. The pleiotropic cytokine-receptor complex is implicated in the physiological inflammation for pathogen clearance but also the pathophysiology of inflammatory and autoimmune diseases. Produced mainly by activated T cells to stimulate the growth and differentiation of several multi-potential haematopoietic cells. IL3 is thought to fuel acute inflammation to create a cytokine storm. IL3 has been implicated in immune disorders including, sepsis, colitis and acts as a predictive marker for SARS-CoV-2. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
