identifier: ComplexPortal:CPX-2938
label: "Early embryonic hemoglobin complex"
definition: >-
  Embryonic hemoglobin zeta-beta complex is the early embryonic hemoglobin type and expressed predominantly in the yolk sac. Binds and transports oxygen and carbon dioxide to/from the peripheral tissues. It is replaced by embryonic hemoglobin zeta-epsilon (CPX-2939). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
