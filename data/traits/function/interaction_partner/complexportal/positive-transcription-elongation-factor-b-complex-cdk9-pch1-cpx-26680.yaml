identifier: ComplexPortal:CPX-26680
label: "Positive transcription elongation factor B complex, cdk9-pch1"
definition: >-
  A serine kinase complex that phosphorylates Ser-2 and Ser-5 of the rpb1 subunit (P36594) of RNA polymerase II (RNA Pol II) heptapeptide repeat, thus positively regulating productive mRNA elongation through the gene body after promoter-proximal pausing of RNA Pol II . A curated stable macromolecular complex (Complex Portal) with 2 subunits.
