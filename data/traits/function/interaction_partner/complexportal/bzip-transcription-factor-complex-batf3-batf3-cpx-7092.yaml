identifier: ComplexPortal:CPX-7092
label: "bZIP transcription factor complex, BATF3-BATF3"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. BATF3 has been implicated in the differentiation of CD8+ thymic conventional dendritic cells in the immune system but this may be as a heterodimer with other transcription factors. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
