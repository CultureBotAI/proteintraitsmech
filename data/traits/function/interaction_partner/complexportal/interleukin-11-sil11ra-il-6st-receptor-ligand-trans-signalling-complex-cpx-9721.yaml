identifier: ComplexPortal:CPX-9721
label: "Interleukin 11-sIL11RA-IL-6ST receptor-ligand trans-signalling complex"
definition: >-
  Trans-signalling cytokine-receptor complex that acts as an agonist to induce signalling in cells that do not express membrane-bound IL11RA (mIL11RA). IL11 binds to a soluble form of its specific receptor component, sIL11RA and recruits the ubiquitously expressed IL6ST to activate signalling via IL6ST's tyrosine residue Tyr-759 initiating the apoptotic MAPK (ERK) pathway, or to a lesser extent, the pro-survival STAT3 pathway. sIL11RA is formed either by proteolysis of mIL11RA by ADAM10 (O14672) at Arginine 355, or directly secreted from cells after alternative mRNA splicing. IL11 is produced by fibroblasts and epithelial cells in addition to various immune cell types. It is classically-associated with a regenerative role in megakaryocytopoiesis but has also been critically implicated in the tumourigenesis of gastrointestinal and epithelial cancers. The exact role of IL11 mediated trans-signalling is yet to be elucidated but it is thought that IL11 trans-signalling may drive disease conditions. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
