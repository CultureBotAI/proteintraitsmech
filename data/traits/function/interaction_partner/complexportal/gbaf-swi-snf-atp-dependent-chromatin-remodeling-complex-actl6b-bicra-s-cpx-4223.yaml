identifier: ComplexPortal:CPX-4223
label: "GBAF (SWI/SNF) ATP-dependent chromatin remodeling complex, ACTL6B-BICRA-SMARCA2 variant"
definition: >-
  An ATP-dependent chromatin remodeling complex that is predominately recruited to CTCF (P49711), KLF4 (O43474) and Sp5-dependent targets sites, promoters and enhancers, depending on cell type. Targeted to chromatin, especially to H3K27ac, H3K4me1 and H3K4me3 markers, via by the bromo domain of its BRD9 subunit. Recruitment may be aided by BRD4 (O60885), especially in embryonic stem cells (ESC). Acts predominantly as a transcriptional activator that regulates tissue development, cell differentiation and cell proliferation and maintains naive pluripotency in ESC. Mutation is several subunits are linked to various cancers. SS18-SSX fusion gene is a hallmark for synovial sarcoma and malignant rhabdoid tumour. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
