identifier: ComplexPortal:CPX-26030
label: "DNA replication factor C complex, ATAD5 variant"
definition: >-
  DNA-dependent ATPase clamp-unloader complex that acts to remove PCNA (P12004, CPX-538) remaining on DNA after the completion of DNA replication and repair during the S phase of the cell cycle. The complex binds to DNA-loaded PCNA to induce opening of the PCNA ring, leading to the release of ATAD5-RFC bound-PCNA. ATAD5-RFC is thought to unload PCNA many-fold more efficiently than the canonical RFC complex (CPX-415). PCNA release from the chromatin after chromosomal duplication is crucial in preventing inappropriate recruitment of replication enzymes and preventing premature termination of DNA replication. Additionally, ATAD5-RFC also participates in de-ubiquiniation of ubiquinated PCNA (Ub-PCNA) to aid in the removal of chromatin-bound Ub-PCNA from DNA to resume normal DNA replication after bypass. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
