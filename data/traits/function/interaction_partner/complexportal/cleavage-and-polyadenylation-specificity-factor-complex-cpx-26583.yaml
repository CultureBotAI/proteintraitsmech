identifier: ComplexPortal:CPX-26583
label: "Cleavage and polyadenylation specificity factor complex"
definition: >-
  Endonuclease complex required for mRNA 3' end processing to form a defined 3' end of the transcribed RNA. The complex cleaves pre-mRNAs, adds a polyadenylate tail, and triggers transcription termination. The 3' end of mature mRNAs is generated by a site-specific endonucleolytic cleavage of an internal phosphodiester bond of the primary transcript by YSH1. The upstream cleavage product generated is then polyadenylated by PAP1 to form a 50-90 adenosine tail at its 3-prime hydroxyl end, which is required for nuclear export, translation, and stability of mRNA. The downstream cleavage product is rapidly degraded. Cleavage and polyadenylation cycles are regulated by phosphorylation/dephosphorylation. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
