identifier: ComplexPortal:CPX-1605
label: "WMM N6-adenosine-methyltransferase complex"
definition: >-
  An N6-methyltransferase complex that methylates adenosine residues (m6A) at the 5'-[AG]GAC-3' consensus sites of some mRNAs. M6A acts as a key regulator of mRNA stability, methylation is completed upon the release of mRNA into the nucleoplasm and promotes mRNA destabilization and degradation. See also related METT3-METTL14 sub-complex (CPX-21210). Regulates various processes such as the circadian clock, differentiation of embryonic, haematopoietic and spermatogonial stem cells as well as T-cells, cortical neurogenesis, response to DNA damage, and primary miRNA processing. TRIM28 (Q13263), HNRNPH proteins (P31943/P55795/P31942) and RBM15/RBM15B (Q96T37/Q8NDT2) have also been postulated to be members of or are associated with this complex. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
