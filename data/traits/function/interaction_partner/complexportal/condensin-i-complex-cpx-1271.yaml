identifier: ComplexPortal:CPX-1271
label: "Condensin I complex"
definition: >-
  Involved in chromosome segregation, both in meiosis and mitosis. Binds to autosomes of both sexes to promote chromosome segregation. Initially located in cytoplasm and associates with chromosomes after nuclear breakdown. Assembles in alternating pattern with Condensin II complex (CPX-1272) along metaphase chromosomes with fully resolved sister chromatids. Specifically, the complex is required for conversion of interphase chromatin into mitotic-like condense chromosomes. During meiosis, localizes to the region between paired homologs at meiosis I and between sister chromatids at meiosis II. In addition, the complex probably introduces positive supercoils into relaxed DNA in the presence of type I topoisomerases and converts nicked DNA into positive knotted forms in the presence of type II topoisomerases. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
