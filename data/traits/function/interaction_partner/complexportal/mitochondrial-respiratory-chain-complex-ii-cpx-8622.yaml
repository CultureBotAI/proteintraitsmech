identifier: ComplexPortal:CPX-8622
label: "Mitochondrial respiratory chain complex II"
definition: >-
  Key role in aerobic respiration, in which mitochondrial enzymes accept electrons from electron carriers reduced in glycolysis and the tricarboxylic acid cycle. Catalyzes the oxidation of succinate to fumarate as part of tricarboxylic acid cycle and and transfers the electrons to coenzyme Q of the respiratory chain to form ubiquinol. Under most conditions the electrons are used to reduce oxygen, allowing ATP synthesis. SDHA and SDHB form the catalytic dimer that is anchored to the matrix surface of the mitochondrial inner membrane by SDHC and SDHD, integral membrane proteins of the membrane dimer. Electrons flow from succinate to the FAD, and sequentially through the [2Fe:2S], the [4Fe:4S], and the [3Fe:4S] clusters. From there, electrons enter the membrane dimer which contains a b-type heme and the active site for ubiquinone reduction. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
