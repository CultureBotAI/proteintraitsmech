identifier: ComplexPortal:CPX-8095
label: "VCP-FAF1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of retrotranslocation of misfolded proteins from the endoplasmic reticulum (ER) into the cytosol where they are degraded by the proteasome as part of the ER-associated protein degradation (ERAD) pathway. Targets proteins ubiquinated on Lys-48 for degradation, including the DNA replication licensing factor CDT1 (Q9H211) thus enabling DNA replication fork progression. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
