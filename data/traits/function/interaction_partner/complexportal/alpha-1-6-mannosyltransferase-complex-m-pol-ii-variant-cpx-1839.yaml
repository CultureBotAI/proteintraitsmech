identifier: ComplexPortal:CPX-1839
label: "alpha-1,6-mannosyltransferase complex, M-Pol II variant"
definition: >-
  Role in the initiation and extension of an alpha -1,6-linked polymannose backbone as a first step in mannan synthesis, a branched polymer attached to the glycans of many of the proteins destined for the cell wall. May play the major role in the the extension of the mannan backbone after it is initiated by M-Pol I (CPX-1672). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
