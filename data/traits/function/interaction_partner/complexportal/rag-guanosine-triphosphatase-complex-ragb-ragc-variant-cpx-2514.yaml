identifier: ComplexPortal:CPX-2514
label: "RAG guanosine triphosphatase complex, RAGB-RAGC variant"
definition: >-
  GTPase which is tethered to lysosomal membranes through its association with the Ragulator complex (CPX-4741). High amino acid levels drive GTP binding and the resulting active complex binds to RPTOR (Q8N122) thus recruiting the mTORC1 complex (CPX-503) to the lysosomal surface. Amino acid deprivation induces the conversion of the complex to its inactive GDP-bound state. GATOR1 (CPX-6226) functions as a GTPase activating protein (GAP) complex and stimulates RRAGB GTPase activity to turn it into its inactive GDP-bound form. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
