identifier: ComplexPortal:CPX-506
label: "Interleukin-5 receptor-ligand complex"
definition: >-
  Transmembrane complex formed on the binding of a dimeric, extracellular interleukin (IL-5) to its receptor, IL-5R, a Class I hematopoietin receptor. Ligand binding results in the assembly of the complete complex, inducing the transphosphorylation of JAK1/2 molecules as well as phosphorylation of the cytoplasmic tails of the receptors. STAT1/5 monomers bind to the phosphorylated site of the receptor and are phosphorylated by JAK1/2. Phosphorylated STAT1/5 dissociate from the receptors, dimerize, and translocate into the nucleus where they induce the transcription of target genes. IL-5 is a powerful pro-inflammatory cytokine produced by T-helper type 2 cells, mast cells, eosinophils, and natural killer T-cells. Essential for the maturation of eosinophils in the bone marrow and their release into the blood. Also acts on activated and resting B-cells to induce immunoglobulin production, growth, and differentiation. Overactive IL-5 is implicated in the pathogenesis of allergic inflammatory diseases, such as asthma, and various hypereosinophilic diseases. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
