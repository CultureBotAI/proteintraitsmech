identifier: ComplexPortal:CPX-1881
label: "Phosphatidylinositol 3-kinase complex, class III, type I"
definition: >-
  Catalyzes phosphorylation of phosphatidyl inositol, one of the major phospholipids in the cell, specifically at the d-3 position of the inositol ring, to generate PtdIns(3)P (CHEBI:17283). The formation of PtdIns(3)P is crucial for membrane recruitment of ATG proteins and the early stage of autophagosome formation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
