identifier: ComplexPortal:CPX-1868
label: "SCC2-SCC4 cohesin loader complex"
definition: >-
  Required for the stable association of the cohesin complex (CPX-1867) with DNA and ensures its enrichment at the mitotic spindle of the centromere thus ensuring correct segregation of the sister chromatids into the daughter cells during cell replication. The RSC chromatin remodeling complex (CPX-1889/CPX-1888) recruits budding yeast SCC2/SCC4 to broad nucleosome-free regions and thhe SCC2/SCC4 complex cooperates with RSC to maintain nucleosome depletion at its binding sites. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
