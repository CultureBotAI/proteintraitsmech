identifier: ComplexPortal:CPX-2887
label: "PDGF receptor alpha - PDGF-CC complex"
definition: >-
  Platelet-derived growth factor (PDGF) receptor alpha (PDGFRalpha) that is activated by its bound ligand, PDGF C-chain. PDGFRalpha is a tyrosine-protein kinase that acts as a cell-surface receptor for PDGFC, and its related A- and B-chains, PDGFA (P04085) and PDGFB (P01127). It autophosphorylates on multiple tyrosines upon ligand binding initiating several signalling cascades and phosphorylation of downstream targets. Is a potent mitogen for cells of mesenchymal origin. Plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Required for normal skeleton formation during embryonic development, especially for normal development of the craniofacial skeleton and for normal development of the palate. Required for normal skin morphogenesis during embryonic development. Plays an important role in wound healing, where it appears to be involved in three stages: inflammation, proliferation and remodeling. Plays an important role in angiogenesis and blood vessel development. Involved in fibrotic processes, in which transformation of interstitial fibroblasts into myofibroblasts plus collagen deposition occurs. The CUB domain has mitogenic activity in coronary artery smooth muscle cells, suggesting a role beyond the maintenance of the latency of the PDGF domain. In the nucleus, PDGFC seems to have additional function. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
