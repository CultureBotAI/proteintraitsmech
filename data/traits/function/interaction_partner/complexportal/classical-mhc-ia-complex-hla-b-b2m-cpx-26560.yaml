identifier: ComplexPortal:CPX-26560
label: "Classical MHC Ia complex, HLA-B-B2M"
definition: >-
  Antigen-presenting major histocompatibility complex which presents the bound peptide antigen to CD8+ cytotoxic T-lymphocytes. The complex assembles in the endoplasmic reticulum and is transported to the cell surface. Presents primarily viral and tumor-derived peptides. SpecificHLA-B alleles with protection against infection severity or susceptibility to autoimmunity and hypersensitivity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
