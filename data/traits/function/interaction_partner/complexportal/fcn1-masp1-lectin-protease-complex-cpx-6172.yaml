identifier: ComplexPortal:CPX-6172
label: "FCN1-MASP1 lectin-protease complex"
definition: >-
  Calcium-dependent pattern-recognition receptor and serine protease complex of the lectin pathway (LP) of complement activation. Activates the LP by binding sugar moieties and acetyl groups of pathogen-associated molecular patterns (PAMPs) displayed on microbes via the lectin FCN1 subcomplex. Binds preferentially to 9-O-acetylated 2-6-linked sialic acid derivatives and to various glycans containing sialic acid engaged in a 2-3 linkage. May also activate monocytes. Mainly present in peripheral blood leukocytes, monocytes and granulocytes. MASP1 protease is probably activated by cleavage by a MASP1 from a neighbouring FCN1-MASP1 complex and in turn cleaves and activates MASP2 protease in FCN1-MASP2 complex (CPX-6237) and complement precursor C4 (P0C0L4). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
