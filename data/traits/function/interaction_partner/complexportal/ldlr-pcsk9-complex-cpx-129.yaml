identifier: ComplexPortal:CPX-129
label: "LDLR-PCSK9 complex"
definition: >-
  The formation of the LDLR- PCSK9 complex at neutral pH promotes degradation of the low density lipoprotein receptor (LDLR) component, the major clearance route of circulating cholesterol through the endosome/lysosome pathway. Consequently, a reduction in the internalisation of circulating low density lipoproteins (LDLs) occurs, leading to high plasma levels of LDLs, causing familial hypercholesterolemia type 3. Formation of the complex interferes with an acid-dependent conformational change of LDLR required for receptor recycling via the endosome. Instead, PCSK9 binding to LDLR can induce its ubiquitination leading to rerouteing of LDLR to the lysosome where it is degraded. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
