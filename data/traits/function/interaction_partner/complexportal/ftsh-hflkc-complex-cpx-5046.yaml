identifier: ComplexPortal:CPX-5046
label: "FtsH-HflKC complex"
definition: >-
  Formation of this complex prevents the proteolytic cleavage of ftsH substrates such as unfolded secY (P0AGA2), the rpoH transcription factor (P0AGB3) and CII (P03042) the key tetrameric transcription factor determining the lysis/lysogeny decision for coliphage lambda. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
