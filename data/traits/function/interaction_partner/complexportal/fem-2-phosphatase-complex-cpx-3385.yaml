identifier: ComplexPortal:CPX-3385
label: "Fem-2 phosphatase complex"
definition: >-
  Ca(2+)/Calmodulin-dependent protein phosphatase complex that mediates the degradation of target proteins. Required for sex determination, specifically male sexual development. Promotes the degradation of tra-1 (P34708), a transcriptional repressor of male-specific genes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
