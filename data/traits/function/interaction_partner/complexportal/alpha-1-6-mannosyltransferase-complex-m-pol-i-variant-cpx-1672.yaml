label: "alpha-1,6-mannosyltransferase complex, M-Pol I variant"
definition: >-
  Role in the initiation and extension of an alpha -1,6-linked polymannose backbone as a first step in mannan synthesis, a branched polymer attached to the glycans of many of the proteins destined for the cell wall. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
