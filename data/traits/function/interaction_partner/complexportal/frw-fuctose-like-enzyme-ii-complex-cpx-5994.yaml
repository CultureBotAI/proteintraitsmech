identifier: ComplexPortal:CPX-5994
label: "Frw fuctose-like enzyme II complex"
definition: >-
  Involved in the transport of fructose across the cell membrane as part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS). The fructose-specific PTS has no requirement for hpr/ptsH (P0AA04), ptsA/fruA combines a IIA domain with a HPr domain. The frw operon contains two IIB encoding genes (frwB and frwD) rather than duplicated domains on a single polypeptide chains. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
