identifier: ComplexPortal:CPX-1715
label: "TORC1 serine/threonine-protein kinase complex, TOR1 variant"
definition: >-
  Serine/threonine-protein kinase signalling complex which senses diverse inputs, such as nitrogen- and carbon-containing nutrients, hormonal stimulation, various stresses, availability of energy within the cell and oxygen and mediates temporal control of cell growth via regulation of translation, transcription, ribosome biogenesis, nutrient transport, and autophagy. Coordinates cell size by regulating timing of G1-S cell cycle progression by mediating G1 cyclin/CDK activation as well as through destabilization of the SIC1 (P38634) CDK inhibitor. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
