label: "6-phosphofructokinase, M3L heterotetramer"
definition: >-
  Catalyzes the phosphorylation of fructose 6-phosphate to fructose 1,6-bisphosphate in the presence of MgATP, the first irreversible step for glycolysis. Present in the erythrocyte (By similarity). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
