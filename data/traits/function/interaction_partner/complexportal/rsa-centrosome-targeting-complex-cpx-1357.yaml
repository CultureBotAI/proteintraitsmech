identifier: ComplexPortal:CPX-1357
label: "RSA centrosome-targeting complex"
definition: >-
  Serine/threonie phosphatase complex specifically localized to the centrosome. Required for the regulation of microtubule outgrowth from centrosomes and also for mitotic spindle assembly by ensuring the stability of kinetochore microtubules. May regulate microtubule outgrowth from centrosomes by restricting the levels of the microtubule destabilizer klp-7 (Q9XU12) at centrosomes and mitotic spindle assembly by targeting the Aurora kinase activator tpxl-1 (G5EDE7) to centrosomes. rsa-2 is required to recruit rsa-1 to the centrosome, but both regulatory subunits rsa-1 and rsa-2 are required for targeting let-92 to the centrosome. Furthermore, rsa-2 may act as a linker protein, connecting the core centrosomal protein spd-5 to let-92 via rsa-1. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
