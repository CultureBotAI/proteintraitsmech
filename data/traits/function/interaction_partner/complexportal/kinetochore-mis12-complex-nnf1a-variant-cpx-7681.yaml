identifier: ComplexPortal:CPX-7681
label: "Kinetochore MIS12 complex, Nnf1a variant"
definition: >-
  Required for normal chromosome alignment and segregation, kinetochore formation during mitosis, proper kinetochore microtubule attachments and for the spindle assembly checkpoint. Binds to the centromeric protein CENP-C (Q9VHP9) to create the foundation on which the mitotic kinetochore is constructed and enable the nucleation of the KMN (Knl1, Mis12, and Ndc80 complex) network. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
