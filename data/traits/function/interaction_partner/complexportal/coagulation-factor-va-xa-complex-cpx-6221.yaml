identifier: ComplexPortal:CPX-6221
label: "Coagulation factor Va-Xa complex"
definition: >-
  A serine-type endopeptidase complex of the common blood coagulation pathway. In the presence of vitamin K cleaves Arg-|-Thr and then Arg-|-Ile bonds in prothrombin (P00734) by limited proteolysis to form thrombin and contributes to factor VIIa-TF complex (CPX-2808) activation. While factor Xa is constitutively active on its own it is 300,000-fold more active when in a complex with factor Va. The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
