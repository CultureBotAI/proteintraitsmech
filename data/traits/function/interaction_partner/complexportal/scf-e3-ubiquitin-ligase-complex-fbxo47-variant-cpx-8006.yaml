identifier: ComplexPortal:CPX-8006
label: "SCF E3 ubiquitin ligase complex, FBXO47 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO47 target proteins include HOMAD1 (Q86X24) which plays a key role in meiotic progression. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
