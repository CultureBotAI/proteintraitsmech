identifier: ComplexPortal:CPX-26528
label: "Ragulator complex"
definition: >-
  Involved in amino acid sensing and activation of TORC1 (CPX-26512) promoting cell growth in response to growth factors, energy levels, and amino acids. Ragulator functions as a guanine nucleotide exchange factor activating the small Rag GTPase Gtr1-Gtr2 (CPX-26516). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
