identifier: ComplexPortal:CPX-7584
label: "Non-canonical polycomb repressive complex 1.5, RING1-YAF2-CKIIA2 variant"
definition: >-
  Acts as a transcriptional activator. Lacks ubiquitin ligase activity potentially due to phosphorylation by casein kinase 2. The neuronal transcription factor AUTS2, recruits the EP300 transcriptional co-activator to promote gene activation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
