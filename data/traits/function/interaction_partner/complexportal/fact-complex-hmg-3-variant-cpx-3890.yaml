identifier: ComplexPortal:CPX-3890
label: "FACT complex hmg-3 variant"
definition: >-
  FACT is an H2A-H2B histone chaperon complex that helps reorganize nucleosomes in an ATP-independent fashion. It is involved in various processes related to chromatin dynamics: DNA replication, DNA damage and repair, transcription initiation and elongation. Binds histone H2A-H2B dimers and possibly small amounts of H3H4. Facilitates RNAPol II driven transcription through chromatin by destabilizing nucleosomal structure so that one of the H2A-H2B dimers is removed upon RNA Pol II passage. Subsequently brings back the histones and thereby maintains nucleosome integrity after RNA Pol II passage. Involved in cell cycle progression and chromosomal segregation in embryos. Plays a role in the development of the anterior pharynx. The FACT complex may also include hmg-4 (P41848) instead of hmg-3 (O01683) in the FACT complex hmg-4 variant (CPX-3891). There may be some redundancy between the roles of hmg-3 and hmg-4, however, hmg-3 expression seems to be germline specific. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
