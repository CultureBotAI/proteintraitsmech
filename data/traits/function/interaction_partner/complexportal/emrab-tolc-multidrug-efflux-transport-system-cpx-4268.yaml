identifier: ComplexPortal:CPX-4268
label: "EmrAB-TolC multidrug efflux transport system"
definition: >-
  Responsible for the transport of xenobiotics, such as drugs, out of the cell, in particular from the periplasm. Single-component efflux transporters remove toxic compounds from the cytoplasm to the periplasmic space where tolC-dependent transporters expel them from the cell. Responsible for the extrusion of hydrophobic xenobiotics such as carbonyl cyanide m-chlorophenyl-hydrazone (CCCP) and steroid hormones. Member of the major facilitator superfamily (MFS). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
