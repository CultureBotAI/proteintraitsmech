identifier: ComplexPortal:CPX-8781
label: "mRNA cap guanine-N7 methyltransferase complex"
definition: >-
  Methylates the N7 position of the added guanosine to the 5'-cap structure of mRNAs. The resulting basic cap structure is sufficient for recognition by cap-binding effector proteins however additional methylations enhance translation and mark an RNA as “self” to evade innate immunity responses. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
