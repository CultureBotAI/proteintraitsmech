identifier: ComplexPortal:CPX-7525
label: "Polycomb repressive complex 1, RING2-PCGF2-CBX4-PHC3 variant"
definition: >-
  E3 ubiquitin-protein ligase that acts as a transcriptional repressor by mediating the monoubiquitination of Lys-119 of histone H2A, compacting chromatin, stalling RNA polymerase II and transcriptionally silencing genes critical for development. CBX4 contributes to the maintenance of epithelial identity in the developing epidermis by repressing non-epidermal gene expression programs. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
