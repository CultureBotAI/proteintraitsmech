identifier: ComplexPortal:CPX-728
label: "ISW2 chromatin remodeling complex"
definition: >-
  ATP-dependent chromatin remodeling complex which is required for repression of early meiotic genes during mitotic cell growth. Slides mononucleosomes from the end to the center of DNA and requires the flexible, acidic patch of the histone H4 tail to efficiently dock its translocase on the nucleosome, for stimulating the ATPase activity and inducing nucleosome mobility. Preferentially bind nucleosome substrates containing ~70 bp extranucleosomal DNA at one entry/exit site of the nucleosome. ISW2 interacts with three nucleosomal and extranucleosomal regions. Itc1 and Isw2 bind to the region 2 helical turns from the dyad axis and a region closest to the entry/exit site. Itc1 subunit makes extensive contacts with extranucleosomal DNA. The DPB4 subunit contacts extranucleosomal DNA 37-53 bp away from the entry/exit site of the nucleosome and probably serves as an anchor point for ISW2 on DNA. The DPB4/DLS1 dimer acts to affect the nucleosome spacing activity of the complex, the ability to sense an adjacent nucleosome and to regulate remodeling and may affect the target gene profile it regulates. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
