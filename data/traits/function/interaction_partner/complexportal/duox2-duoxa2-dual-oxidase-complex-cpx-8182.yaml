identifier: ComplexPortal:CPX-8182
label: "DUOX2-DUOXA2 dual oxidase complex"
definition: >-
  Calcium-dependent NADPH oxidase which catalyzes cross-membrane electron transfer resulting in the production of hydrogen peroxide (H2O2). Electrons are transferred from NADPH to FAD, to a heme molecule on the cytoplasmic side of the membrane, to Phe-1097 of DUOX2, and finally to the heme group on the extracellular side of the membrane where they react with oxygen. Required for the H2O2-dependent activity of thyroperoxidase (P07202) which catalyzes the three steps of thyroid hormone biosynthesis. May also have an antimicrobial role at mucosal surfases such as salivary glands in the trachea and play a role in wound response at the airway epithelium. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
