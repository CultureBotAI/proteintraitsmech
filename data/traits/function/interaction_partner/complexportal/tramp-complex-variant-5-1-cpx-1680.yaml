identifier: ComplexPortal:CPX-1680
label: "TRAMP complex variant 5-1"
definition: >-
  Recognises and bind to pre-ribosomal RNA and snoRNAs leading to their rapid degradation by the nuclear exosome (CPX-599). Adds a short oligo(A) tail to the RNA which is assumed to make it a better substrate for 3'-end degradation. There is evidence that the various TRAMP complexes (CPX-1678, CPX-1679, CPX-1680) exhibit some substrate specificity with TRAMP5-1 preferentially targeting the ITS1 spacer region of 35S pre-rRNA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
