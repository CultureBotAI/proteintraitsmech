identifier: ComplexPortal:CPX-8175
label: "SLX1-SLX4 structure-specific endonuclease complex"
definition: >-
  A structure-specific DNA endonuclease that cleaves the phosphodiester backbone on the 3'-side of the DNA branchpoint of branched DNA substrates including stem-loops and Y-structures, replication forks, 5'- and 3'-flaps, and nicked or intact Holliday junctions and is therefore involved in DNA recombination and repair. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
