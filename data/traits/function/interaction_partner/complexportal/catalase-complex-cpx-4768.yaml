identifier: ComplexPortal:CPX-4768
label: "Catalase complex"
definition: >-
  A heme-binding peroxidase that reduces hydrogen peroxide to water and oxygen thus protecting cells from its toxic effects. Protects hemoglobin by removing over half of the hydrogen peroxide generated in erythrocytes. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
