identifier: ComplexPortal:CPX-784
label: "Vacuolar transporter chaperone complex, VTC3 variant"
definition: >-
  Polyphosphate (polyP) polymerase that synthesizes polyP from ATP and translocates polyP across the vacuolar membrane to maintain an intracellular phosphate (Pi) homeostasis. Integral membrane complex enriched at the vacuolar membrane, but also localizes to other cellular compartments. VTC proteins have been implicated in several membrane-related processes, such as sorting of H+-translocating ATPases, endocytosis, ER-Golgi trafficking, vacuole fusion, and the microautophagic scission of vesicles into the vacuolar lumen. May bind calmodulin during some, or all, of these processes. This VTC3 variant is located mostly in the vacuole. VTC5 (P38966) can associate with the VTC complex and may act as an optional regulatory subunit. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
