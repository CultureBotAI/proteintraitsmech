identifier: ComplexPortal:CPX-8070
label: "SCC2-SCC4 cohesin loader complex"
definition: >-
  Required for the stable association of the cohesin complex (CPX-5989/CPX-5991) with DNA. Dynamically loads cohesin to chromatin accessible sites and guides the bidirectional loop extrusion mechanism of genomic DNA. May act to convert cohesin into an active loop-extruding holoenzyme. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
