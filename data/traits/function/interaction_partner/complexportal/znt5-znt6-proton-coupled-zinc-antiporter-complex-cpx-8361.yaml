identifier: ComplexPortal:CPX-8361
label: "ZNT5-ZNT6 proton-coupled zinc antiporter complex"
definition: >-
  Proton-coupled zinc ion antiporter required for the entry of zinc into the lumen of organelles associated with the secretory pathway, thus regulating the folding and activation of a number of ecto-enzymes including alkaline phosphatases, such as ALPL (P05186) and ALPL (P05187), and enzymes involved in phosphatidylinositol glycan anchor biosynthesis. Also plays a role in the storage and secretion of insulin via the transport of zinc into secretory granules of pancreatic beta-cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
