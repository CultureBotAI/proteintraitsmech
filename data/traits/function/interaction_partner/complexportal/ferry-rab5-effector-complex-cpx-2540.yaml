identifier: ComplexPortal:CPX-2540
label: "FERRY RAB5 effector complex"
definition: >-
  Recruited to the early endosome by binding of RAB5, the complex is involved in the localization and the distribution of specific mRNAs such as transcripts encoding mitochondrial proteins (e.g., mdh2 mRNA), most likely by mediating their endosomal transport. The complex recruits mRNAs and ribosomes to early endosomes through direct mRNA-interaction. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
