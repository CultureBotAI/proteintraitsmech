identifier: ComplexPortal:CPX-4885
label: "DNA-directed RNA polymerase holoenzyme complex, SigmaE variant"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3-prime end of an RNA transcript. Five subunits, rpoA/alpha, rpoB/beta, rpoC/beta-prime and rpoZ/omega form the catalytic core. To initiate promoter specific DNA transcription, the core enzyme has to bind a sigma factor, which helps to direct the polymerase to specific promoters. rpoE transcribes genes involved in envelope stress response, responding to extracellular stress and the resulting disruption of proteins in the outer membrane or periplasm leading to an accumulation of misfolded and/or mis-translocated outer membrane proteins or lipopolysaccharide within the periplasm. Induces biofilm formation and appears to play a role in the virulence of some pathogenic strains. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
