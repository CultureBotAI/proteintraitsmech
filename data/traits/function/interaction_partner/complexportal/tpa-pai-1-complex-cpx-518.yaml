identifier: ComplexPortal:CPX-518
label: "tPA-PAI-1 complex"
definition: >-
  Regulates the activity of the plasminogen activation system, an extracellular proteolytic cascade. Inhibited form of tissue plasminogen activator tPA (Plat), an enzyme responsible for the cleavage of plasminogen (P20918) to form plasmin, which then degrades fibrin. PAI-1 (Serpine1) inhibits tPA rapidly and irreversibly and is the primary negative regulator of the fibrinolytic system. High levels of PAI-1 therefore prevent formation of plasmin, resulting in fibrin accumulation and thrombosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
