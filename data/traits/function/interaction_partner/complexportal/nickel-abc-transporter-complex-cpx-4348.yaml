identifier: ComplexPortal:CPX-4348
label: "Nickel ABC transporter complex"
definition: >-
  High affinity nickel transporter. Transport observed in the presence of L- (but not D-) histidine, as Ni-(L-His)2, suggesting that nickel-speciation in different growth environments may affect the mechanism of nickel transport. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. The nik operon is expressed under anaerobic growth conditions. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
