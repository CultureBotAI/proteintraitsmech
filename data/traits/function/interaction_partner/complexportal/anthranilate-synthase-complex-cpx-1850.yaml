identifier: ComplexPortal:CPX-1850
label: "Anthranilate synthase complex"
definition: >-
  Catalyses the conversion of chorismic acid to anthranilic acid in the first step in the tryptophan branch of aromatic amino acid biosynthesis. Tryptophan-specific regulation of enzyme activity level occurs through feedback regulation by the end product of the pathway, regulated by a tryptophan regulatory element (62LLESAKTNNELDRYS76) within Trp2. Component I (Trp2) and Component II (Trp3) are required for glutamine-dependent ASase activity while component I can use ammonia as cosubstrate without need of complex formation. . The C-terminal half of Trp3 also has indole-3-glycerol phosphate synthase activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
