identifier: ComplexPortal:CPX-1877
label: "LUBAC ubiquitin ligase complex"
definition: >-
  Catalyzes the synthesis of linear ubiquitin chains, conjugating linear polyubiquitin chains through the N-terminal Met of ubiquitin and linking to substrates. Plays a key role in inflammatory response through the activation of NF-kappa-B and inflammsone activation, protection from programmed cell death and autophagy. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
