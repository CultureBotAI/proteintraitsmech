identifier: ComplexPortal:CPX-26393
label: "Integrator-PP2A complex"
definition: >-
  Plays a role the regulation of gene expression by targeting RNA polymerase II (CPX-2387/CPX-7481) to cause the premature transcription termination of coding and non-coding RNAs, inducing promoter-proximal termination at promoters and attenuating nonproductive transcription at enhancers. The Integrator positions its cleavage module (INTS4, INTS9 and INTS11) at the RNA exit tunnel of RNA polymerase II ensuring that the exiting nascent RNA moves directly into the endonuclease active site for cleavage. INTS2, INTS5, INTS6 and INTS8 bind to and position PP2A to dephosphorylate the C-terminal domain of RNA polymerase II subunit POLR2A (P24928) at serine-2, -5, and -7 preventing the release of paused Pol II and limiting transcriptional activation. A curated stable macromolecular complex (Complex Portal) with 17 subunits.
