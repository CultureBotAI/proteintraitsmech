identifier: ComplexPortal:CPX-5667
label: "CCAAT-binding factor complex, nfya-2 variant"
definition: >-
  Transcription factor complex, which binds to the 5'-CCAAT-3' box motif found in the promoters of its target genes to regulate their expression. May repress the expression of the T-box transcription factor tbx-2 (Q19691) throughout larval development, which restricts its expression to certain tissue types. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
