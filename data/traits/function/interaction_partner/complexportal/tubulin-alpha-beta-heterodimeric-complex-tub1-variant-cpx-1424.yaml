label: "Tubulin alpha-beta heterodimeric complex, TUB1 variant"
definition: >-
  Building block of the non-covalent cylindrical polymers that make up the hollow water-filled microtubule structures required for the migration and proper orientation of the nucleus, spindle pole body separation, spindle function, and nuclear division. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
