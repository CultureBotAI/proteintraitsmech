identifier: ComplexPortal:CPX-2872
label: "bZIP transcription factor complex, BACH1-MAFG"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The DNA recognition sequence depends on the composition of the bZIP dimer with the complex either binding to the preferred region of one of the partners or to a novel bZIP cognate site. Acts as a transcriptional repressor binding to the MARE (Maf recognition element) site in gene promoters, thus repressing the expression of NFE2L2 (Q16236) target genes which play a key role in the response to oxidative stress. Represses the transcription of heme oxygenase 1 (P09601) under low heme conditions. When free heme levels rise, activated NFE2L2 partners with MAF proteins to enable transactivation of HMOX1. Heme binds to BACH1 and heme-bound BACH1 undergoes nuclear export and ubiquitin-dependent degradation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
