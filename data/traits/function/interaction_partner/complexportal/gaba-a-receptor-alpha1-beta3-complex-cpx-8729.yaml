identifier: ComplexPortal:CPX-8729
label: "GABA-A receptor, alpha1-beta3 complex"
definition: >-
  Ligand-gated chloride channel which acts as the main driver of fast inhibitory neurotransmission in the nervous system. GABA (CHEBI:16865), the major inhibitory neurotransmitter in the vertebrate brain, mediates neuronal inhibition by binding to the GABA/benzodiazepine (BZD) receptor and opening a chloride ion-selective pore. GABA-A receptors assemble in specific combinations of receptor subunits from a pool of nineteen in a cell-type specific manner, giving rise to receptors with distinct distributions and functions in both physiological and disease states. Their many allosteric sites, which bind compounds with anticonvulsant, anti-anxiety, analgesic, sedative and anaesthetic properties make GABA-A receptors attractive drug targets. GABA-A alpha/beta receptors comprise a sizeable population of extrasynaptic receptors known for tonic inhibition and share common properties regardless of the specific alpha or beta subtype. Two distinct traits of tonic inhibition include: 1) a low open-channel probability (Po) in response to GABA to avoid over-damping neuronal circuitry. 2) high sensitivity to inhibition by endogenous Zn2+, with alpha/beta receptors being the most sensitive of all isoforms, with physiological and pathological consequences during development and in conditions such as temporal lobe epilepsy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
