identifier: ComplexPortal:CPX-577
label: "Mitochondrial respiratory chain complex I"
definition: >-
  Catalyses the first step of electron transport by the oxidation of NADH, thus providing two electrons for the reduction of ubiquinone. Electron transfer is coupled with the translocation of protons across the membrane, generating a proton motive force. An additional protein, NDUFA4L2 (Q9NRX3), may also be part of the complex. A curated stable macromolecular complex (Complex Portal) with 44 subunits.
