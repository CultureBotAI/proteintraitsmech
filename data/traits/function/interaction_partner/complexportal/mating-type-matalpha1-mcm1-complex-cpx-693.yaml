identifier: ComplexPortal:CPX-693
label: "Mating-type MATalpha1-MCM1 complex"
definition: >-
  Transcriptional activator with a role in determining the three cell types of Saccharomyces cerevisiae: the a and alpha haploid cells and the a/alpha diploid cell type. Binds P-primeQ promoter elements to activate the expression of alpha-specific genes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
