identifier: ComplexPortal:CPX-3143
label: "Cyclin-dependent protein kinase 5 holoenzyme complex, p35 variant"
definition: >-
  A proline-directed serine/threonine kinase complex that functions in neuronal activities unrelated to cell-cycle progression, including neuronal migration during the development of the central nervous system, dendritic spine morphogenesis, cortical lamination, fasciculation of axon fibres, synaptic activity, neuronal survival, and neuronal cell death in post-mitotic neurons. Phosphorylates cytoskeletal proteins. Participates in the regulation of the circadian clock by modulating the function of CLOCK protein (O08785). Unlike most CDKs, CDK5 is directly activated by the specific activators CDK5R1 (P61809) and CDK5R2 (O35926). Although cyclin I (Q9Z2V9) appears to be involved in the activation of CDK5 in the anti-apoptotic pathway (PMID:19729834) direct binding assays have yet to be published. Predominantly cytoplasmic, in association with plasma membrane. The proteolytic variant p25-CDK5 (CPX-3144) is nuclear. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
