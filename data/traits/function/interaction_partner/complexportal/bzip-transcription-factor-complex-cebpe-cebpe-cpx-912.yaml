identifier: ComplexPortal:CPX-912
label: "bZIP transcription factor complex, CEBPE-CEBPE"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. Required for the terminal differentiation of neutrophils, promyelocyte-myelocyte transition in myeloid differentiation, regulating the expression of neutrophil-specific granule proteins such as lactotransferrin (P02788). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
