identifier: ComplexPortal:CPX-2313
label: "Ethanolamine ammonia-lyase complex"
definition: >-
  Catalyzes the adenosylcobalamin (coenzyme B12)-dependent conversion of ethanolamine to acetaldehyde and ammonia and enabling growth on ethanolamine. The complex acts on both enantiomers of ethanolamine. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
