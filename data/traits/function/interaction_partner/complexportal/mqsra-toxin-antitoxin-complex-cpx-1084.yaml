identifier: ComplexPortal:CPX-1084
label: "MqsRA toxin-antitoxin complex"
definition: >-
  Type II toxin-antitoxin (TA) module consisting of MqsR toxins bound to MqsA antitoxin dimer. TA systems act as effectors of dormancy and persistence and are composed of a toxin, which causes growth arrest by interfering with a vital cellular process, and a cognate antitoxin, which neutralizes the toxin activity during normal growth conditions. Under conditions of stress the antitoxins are selectively degraded, leaving the toxins to exert their toxic effects, leading to growth arrest and dormancy. Type II TA complexes are small protein-protein pairs; under growth conditions, the toxin is bound to the antitoxin, which inhibits its activity. Unlike other type II toxins, mqsR does not enhance the binding of mqsA to the mqsRA promoter. Instead, MqsR disrupts the MqsA-DNA interaction. Under stress conditions, cellular proteases such as Lon (P0A9M0) and ClpXP (CPX-3176) are activated that preferentially cleave the antitoxins, freeing the toxins to inhibit growth by inhibiting translation or replication, enabling cells to enter a metabolically dormant state until the stress is removed. MqsR toxin is the most up-regulated gene in the persister phenotype of cells. When active, MqsA binds its promoter with extremely tight affinity, however this is destabilized by TA complex formation as the binding sites of MqsR and DNA on MqsA overlap and their binding is mutually exclusive. Plays a role in biofilm formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
