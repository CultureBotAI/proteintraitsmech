identifier: ComplexPortal:CPX-8187
label: "Y+LAT1-4F2 heteromeric amino acid transporter complex"
definition: >-
  L-type amino acid transporter which catalyses the transmembrane electroneutral antiport of cationic and neutral amino acids, such as phenylalanine, tyrosine, leucine, histidine, methionine, tryptophan, valine, isoleucine and alanine, and also cysteine in a sodium-dependent manner. Asymmetric antiporter, causing the basolateral efflux of cationic amino acids and influx of neutral amino acids together with sodium ions. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
