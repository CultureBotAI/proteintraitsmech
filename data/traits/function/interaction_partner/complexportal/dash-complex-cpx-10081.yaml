identifier: ComplexPortal:CPX-10081
label: "DASH complex"
definition: >-
  Heterodecameric component of the kinetochore necessary for accurate chromosome segregation, supporting the dynamic attachment of mitotic chromosomes to the ends of shortening spindle microtubules. DASH forms closed rings around microtubules with a large gap between the DASH ring and the microtubule cylinder. A DASH-microtubule interface is believed to form, in which extensions from DASH rings reach across a gap between the ring and the microtubule and dock on the microtubule wall. DASH rings spontaneously oligomerize in the presence of microtubules of the mitotic spindle. DASH rings are processivity factors that allow kinetochores to translate along a single microtubule without dissociating. Each DASH ring may contain from 16-30 heterodecamers. The NDC80 complex (CPX-549) can simultaneously bind and bridge across two DASH complex rings through a tripartite interaction. This ensures a consistent spacing between rings. The complex may also may serve as a link between the kinetochore and the mitotic spindle. DASH is assembled and localized onto kinetochores specifically in mitosis. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
