identifier: ComplexPortal:CPX-8914
label: "Nucleolar exosome complex"
definition: >-
  3' -5' exo- and endoribonuclease complex that is involved in RNA maturation and degradation which include the removal of unstable and aberrant transcripts and may also regulate the levels of specific transcripts in response to environmental factors. Restricted to processing linear and circular single-stranded RNAs only. RNAs with complex secondary structures, particularly at the 3' end of the molecule, may have to be unwound or pre-processed by co-factors prior to entering the complex. Although some RNAs may be targeted directly to the catalytic subunits, the majority of substrates enter the barrel-like structure of the exosome through a pore at the centre of the cap and are threaded through the central channel in a 3' to 5' orientation. The ribonuclease activity of the catalytic subunits facilitates the degradation process. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
