identifier: ComplexPortal:CPX-3292
label: "SCF E3 ubiquitin ligase complex, FBXL2 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL2 target proteins include the chromosomal passenger complex (CPX-116) AURKB (Q96GD4), CCND2 (P30279) and CCND3 (P30281), activators of the G1 phase CDKs and the transcription factor FOXM1 (Q08050), the downstream targets of which include several cell cycle regulators. The complex also acts as a crucial, pan-reactive inhibitor of TRAF function by mediating their ubiquitination and degradation in epithelia and human monocytes. FBXL2 can be modified by O-GlcNAcylation, which suppresses FOXM1 degradation and contributes to gastric cancer pathogenesis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
