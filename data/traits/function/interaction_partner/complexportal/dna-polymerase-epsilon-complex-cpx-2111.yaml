identifier: ComplexPortal:CPX-2111
label: "DNA polymerase epsilon complex"
definition: >-
  Believed to play a role in the elongation of both leading and lagging strands of chromosomal DNA in eukaryotic cells. Required for DNA replication, DNA repair, transcriptional silencing and sister-chromatid cohesion. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
