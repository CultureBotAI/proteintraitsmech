label: "3-isopropylmalate dehydratase complex"
definition: >-
  Catalyses the stereo-specific isomerisation of 2-isopropylmalate and 3-isopropylmalate, via the formation of 2-isopropylmaleate, the second step in the biosynthesis of leucine. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
