identifier: ComplexPortal:CPX-1837
label: "CUL3-HRT1-ELC1-ELA1 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex. Required for lysine 48-linked polyubiquitylation of Rpb1, the largest subunit of RNA polymerase II, which targets Pol II for proteasomal degradation, removing stalled RNA polymerase II from a DNA lesion site enabling the repair machinery to bind. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
