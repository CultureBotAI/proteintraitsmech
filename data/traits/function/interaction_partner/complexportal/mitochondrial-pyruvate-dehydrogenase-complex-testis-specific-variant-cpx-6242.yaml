identifier: ComplexPortal:CPX-6242
label: "Mitochondrial pyruvate dehydrogenase complex, testis-specific variant"
definition: >-
  Mitochondrial matrix enzyme that converts pyruvate to acetyl-CoA and CO2. This provides a metabolic connection between glycolysis, whose end product is pyruvate, and the tricarboxylic acid cycle, which starts with acetyl-CoA. Pyruvate dehydrogenase (PDH) activity is negatively regulated via phosphorylation of its PDHA2 subunit. In the reaction mediated by the PDH complex, pyruvate becomes covalently linked to the thiamine diphosphate (TPP) cofactor of E1 (PDHA2 and PDHB), creating 2-alpha-hydroxy-ethyl-TPP. The alpha-hydroxy group of 2-alpha-hydroxy-ethyl-TPP is subsequently oxidized, creating an acetyl group that becomes bound to the dihydrolipoyllysine group of E2 (DLAT). DLAT transfers this acetyl group to CoA to generate acetyl-CoA. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
