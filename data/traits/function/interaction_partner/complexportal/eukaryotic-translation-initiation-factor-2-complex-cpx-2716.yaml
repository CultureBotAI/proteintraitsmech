identifier: ComplexPortal:CPX-2716
label: "Eukaryotic translation initiation factor 2 complex"
definition: >-
  Guides the initiator methionyl-tRNA to the 40S ribosomal subunit (CPX-5223) as a eukaryotic translation initiation factor 2 (eIF2).GTP.Met-tRNAiMet) carrier complex. The resulting 43S complex, which also includes eIF3 (CPX-6036) and eIF1A, binds at or near the 5'-end of capped eukaryotic messenger RNAs. Recognition of the AUG codon translational start site by Met-tRNAi(Met) is accompanied by GTP hydrolysis (stimulated by the eIF5 complex), which subsequently releases Met-tRNA to the ribosomal peptidyl site, and converts eIF2-GTP to eIF2-GDP. Binding of nucleotide exchange factor eIF2B complex (CPX-429) replaces GDP again for GTP. This activity is inhibited when phosphorylated EIF2S1 binds to EIF2S3. Mutations in EIF2S3 affects complex formation and the development of severe neurological diseases. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
