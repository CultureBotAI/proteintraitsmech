identifier: ComplexPortal:CPX-1792
label: "THO complex"
definition: >-
  Functions in the formation and nuclear export of translation-competent messenger ribonucleoprotein particles. Functions at the interface between transcription and mRNA export via its interaction with SUB2 in the TREX complex (CPX-1793). Recruited to transcribed genes and moves along the gene with the elongating polymerase during transcription. THO is important for stabilizing nascent RNA in the RNA polymerase II elongation complex by preventing formation of DNA:RNA hybrids behind the elongating polymerase. The inclusion o Tex1 in this complex is debated in the literature. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
