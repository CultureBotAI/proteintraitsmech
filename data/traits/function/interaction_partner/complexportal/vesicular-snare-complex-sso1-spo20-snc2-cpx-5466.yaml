identifier: ComplexPortal:CPX-5466
label: "Vesicular SNARE complex SSO1-SPO20-SNC2"
definition: >-
  SNARE complex required for the fusion of post-Golgi secretory vesicles with the pre-spore membrane. Mediates membrane fusion through the spontaneous assembly of four complementary SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptors) motifs. SNAREs bind to each other in-trans, that is, with SNAREs anchored in each apposed tethered membrane. The assembly process leads to a tight connection between the linked membranes and initiates membrane fusion. SPO20 induction is sporulation-specific. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
