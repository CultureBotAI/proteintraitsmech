identifier: ComplexPortal:CPX-2045
label: "6-phosphofructo-2-kinase/fructose-2,6-biphosphatase 4 complex"
definition: >-
  Catalyzes the synthesis and degradation of fructose 2,6-bisphosphate, therefore required for both glycolysis and gluconeogenesis. Regulated in the long term at the transcriptional level but the acute response may be controlled by phosphorylation (By similarity). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
