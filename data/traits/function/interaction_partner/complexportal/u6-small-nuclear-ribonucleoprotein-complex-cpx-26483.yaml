identifier: ComplexPortal:CPX-26483
label: "U6 small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex, part of the pre-B complex that acts as a chaperone for U6 spliceosomal-RNA. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs (snRNA) and protein factors which removes intronic sequence from pre-mRNA. U6 is part of the activated spliceosome and is involved in the first trans-estherification step of splicing. After splicing is complete, the spliceosome disassembles and free U6 snRNP forms. It then reassociates with U4 to form U4/U6 snRNP. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
