identifier: ComplexPortal:CPX-2544
label: "TGF-beta-3-TGFR complex"
definition: >-
  Cytokine-receptor complex that plays an important role in embryogenesis, tissue development, cell proliferation, differentiation and maturation, immune regulation and carcinogenesis. Binding of TGFB3 (CPX-606) to its receptor subunits results in the phosphorylation of TGFBR1 on Thr-185 and Thr-186 by the constitutively active TGFBR2. Activated TGFBR1 phosphorylates SMAD2 (Q15796) which dissociates from the receptor and activates the canonical SMAD-dependent TGF-beta signaling cascade. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
