identifier: ComplexPortal:CPX-9322
label: "B-T lymphocyte attenuator, BTLA-TNFRSF14 complex"
definition: >-
  Receptor complex that acts as a potent inhibitor of T-cell and cytokine activation, it triggers an inhibitory signalling pathway to negatively regulate lymphocyte proliferation. TNFRSF14 binding to BTLA results in a molecular switch to a co-inhibitory form from a co-stimulatory role when bound to TNFSF14 (CPX-9309). BTLA-TNFRSF14 mediates immune tolerance by inhibiting B-cell receptor (BCR) signalling molecules. BTLA's trans-engagement with HVEM on effector T cells results in the recruitment of PTPN6/SHP-1 (P29350) and PTPN11/SHP-2 (Q06124), two potent tyrosine phosphatases, to disable early T cell activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
