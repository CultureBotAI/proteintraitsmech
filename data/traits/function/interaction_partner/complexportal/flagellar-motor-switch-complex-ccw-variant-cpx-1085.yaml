identifier: ComplexPortal:CPX-1085
label: "Flagellar Motor Switch Complex, CCW variant"
definition: >-
  Plays a role in chemotaxis, the movement toward or away from chemicals. The flagellar motor of bacteria is a rotary device energized by the membrane ion gradient and the complex is required for the rotation and directional switching of the flagellum and also functions in flagellar assembly. Motor torque is produced at the top of the switch complex, where the fliG C-terminal domain bears several conserved charged residues that interact with charged groups of the stator protein motA (P09348). The conformation of this complex is such that the flagellum rotates in a counter-clockwise (CCW) direction. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
