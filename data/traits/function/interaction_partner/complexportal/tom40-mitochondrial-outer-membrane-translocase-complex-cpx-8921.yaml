identifier: ComplexPortal:CPX-8921
label: "TOM40 mitochondrial outer membrane translocase complex"
definition: >-
  Translocase in the outer mitochondrial membrane that mediates the import of precursor protein and mediates inset of some resident outer membrane proteins. Most mitochondrial proteins are synthesised in the cytosol, imported into mitochondria, sorted to one of the four sub-mitochondrial compartments, where they function, and attain their functional native conformation, which is often facilitated by assembly into the membrane or a multi-protein complex. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
