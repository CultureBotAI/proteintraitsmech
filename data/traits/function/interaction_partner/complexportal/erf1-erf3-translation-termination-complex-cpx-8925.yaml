identifier: ComplexPortal:CPX-8925
label: "ERF1-ERF3 translation termination complex"
definition: >-
  Required for the termination of protein synthesis which occurs when one of three stop codons (UAA, UAG or UGA) enters the ribosomal A site. eRF1 stimulates GTP binding to eRF3, inducing the GTPase activity of eRF3 that couples codon recognition and peptidyl-tRNA hydrolysis mediated by eRF1 to ensure rapid and efficient peptide release on the ribosome. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
