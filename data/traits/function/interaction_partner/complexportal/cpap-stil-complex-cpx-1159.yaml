identifier: ComplexPortal:CPX-1159
label: "CPAP-STIL complex"
definition: >-
  A protein complex that is required for centriole biogenesis and duplication. During procentriole formation during G1/S transition, PKL4 (O00444) activates STIL by phosphorylating its STAN domain, then activated STIL loads SASS6 and CENPJ (CPAP) to the base of the procentriole to initiate procentriole assembly. Together with CEP135 (Q66GS9), CENPJ and SASS6 form the central scaffolding of the 9-fold symmetry of the procentriole. In the assembled centriole 9 homodimers of SASS6 form the central waggon wheel while CEP135 and CENPJ connect SASS6 to the microtubules. Lack of the complex or any of its subunits leads to a loss of centriole formation or spindle formation while overexpression leads to overly long centrioles. Patients with autosomal recessive primary microcephaly often present with aberrant spindle positioning in progenitor cells during brain development and mutations in CENPJ or STIL. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
