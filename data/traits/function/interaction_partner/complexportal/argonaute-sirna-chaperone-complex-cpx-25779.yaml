identifier: ComplexPortal:CPX-25779
label: "Argonaute siRNA chaperone complex"
definition: >-
  Chaperone complex required for the assembly of heterochromatin and silencing of reporter genes inserted in the pericentromeric region of chromosomes. Binds double-stranded, rather than single-stranded siRNAs, and loads these molecule onto the RITS complex (CPX-25777). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
