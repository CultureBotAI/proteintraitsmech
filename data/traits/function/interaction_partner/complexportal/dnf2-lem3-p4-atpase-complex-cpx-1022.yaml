identifier: ComplexPortal:CPX-1022
label: "DNF2-LEM3 P4-ATPase complex"
definition: >-
  A membrane pump which actively translocates, or flips, phospholipids across cell membranes from the exoplasmic to the cytoplasmic leaflet of the lipid bilayer. This generates and maintains membrane lipid asymmetry, a property essential for a wide variety of cellular processes such as vesicle budding and intracellular vesicle trafficking. Transport is accomplished by cyclic changes between two main enzyme conformations, during which the DNF2 ATPase is phosphorylated by ATP at a conserved aspartate residue (Asp-712) and subsequently dephosphorylated. These processes are coupled to vectorial transport and counter-transport by a controlled opening and closing of cytoplasmic and exoplasmic pathways, which give access to the ion-binding sites that are buried inside the membrane-spanning region of the pump. Also involved in transport of the tryptophan permease TAT2 to the plasma membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
