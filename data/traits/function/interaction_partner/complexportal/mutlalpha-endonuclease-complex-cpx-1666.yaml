identifier: ComplexPortal:CPX-1666
label: "MutLalpha endonuclease complex"
definition: >-
  Mn2+-dependent endonuclease which nicks a DNA strand containing a pre-existing nick, presumably to provide an entry site for a mispair excision reaction. Required for DNA mismatch repair (MMR), correcting base-base mismatches and insertion-deletion loops resulting from DNA replication, DNA damage or from recombination events between non-identical sequences during meiosis. ATP binding induces a conformational change in the MSH2-MSH6 (CPX-1037) and MSH2-MSH3 (CPX-1036) complexes which converts these to a clamp form that slides along the DNA and leads to recruitment of MutLalpha, MutLbeta (CPX-1667) and MLH1-MLH3 (CPX-1668). Plays a major role in maintaining the genetic stability of simple sequence repeats, by suppressing recombination between slightly divergent or homeologous DNA sequences, and in the repair of heteroduplex sites present in meiotic recombination intermediates. The MLH1-PMS1 heterodimer acts as the major Mlh heterodimer in MMR and is thought to coordinate Msh-DNA binding with downstream repair factors. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
