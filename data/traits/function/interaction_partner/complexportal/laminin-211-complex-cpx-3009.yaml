identifier: ComplexPortal:CPX-3009
label: "Laminin-211 complex"
definition: >-
  Major component of basment membranes which binds to cells via a high affinity, cell-surface receptor. Role in the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. Promotes basement membrane assembly and peripheral myelinogenesis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
