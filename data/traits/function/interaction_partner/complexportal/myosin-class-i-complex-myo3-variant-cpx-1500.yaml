identifier: ComplexPortal:CPX-1500
label: "Myosin class I complex, MYO3 variant"
definition: >-
  Responsible for endocytic internalization. Required for proper actin cytoskeleton assembly polarization via the formation of actin patches. The myosin heavy chain motor domain mediates the ATP-dependent interaction with the F-actin cytoskeleton. The myosin neck region with the bound light chains acts as a rigid lever arm that amplifies movements within the myosin motor domain into a large mechanical stroke that directionally propels the myosin along the actin filament. The C-terminal extension (long-tail) of Myosin-5 can trigger Arp2/3 complex (CPX-607)-dependent actin polymerization. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
