identifier: ComplexPortal:CPX-8063
label: "CRL3 E3 ubiquitin ligase complex, KLHL5 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL5 target proteins include the sphingosine kinase SK1 (Q9NYA1) which phosphorylates sphingosine to generate sphingosine 1-phosphate, a bioactive lipid that acts as both an intracellular second messenger, and as a ligand for a family of five S1P-specific G protein-coupled receptors. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
