identifier: ComplexPortal:CPX-1295
label: "MKT1-PBP1 translation regulation complex"
definition: >-
  Translational regulation complex which modulates levels of the HO endonucease in the mother cells of budding yeast, enabling the cells to switch mating types. The mechanism is unclear but the nuclease activity activity of MKT1 appears to be equired for the function. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
