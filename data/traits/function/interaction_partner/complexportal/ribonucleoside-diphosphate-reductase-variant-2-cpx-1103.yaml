identifier: ComplexPortal:CPX-1103
label: "Ribonucleoside-diphosphate reductase variant 2"
definition: >-
  Catalyzes the reduction of ribonucleotides to the corresponding deoxyribonucleotides, an essential step in the de novo synthesis of monomeric precursors for DNA replication and repair. The catalytically active form of the enzyme (CPX-1102) is an alpha2beta2 tetramer. The heterodimeric alpha subunits, called R1, house the active site, composed of redox-active disulfides, and binding sites for allosteric effectors, ribonucleoside diphosphates. The beta subunit, called R2, contains a di-iron cluster that in its reduced state reacts with dioxygen to form a stable tyrosyl radical (Y*) and a di-iron(III) cluster. This essential Y* is proposed to generate a thiyl radical, located on a cysteine residue in the R1 active site, that initiates ribonucleotide reduction. The enzyme is allosterically controlled by relative levels of dNTPs. In damaged cells or cells arrested for DNA synthesis, the small subunits (RNR2-RNR4) associate with a heterodimer of RNR1 and the damage-inducible RNR3. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
