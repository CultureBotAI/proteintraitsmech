label: "RAG guanosine triphosphatase complex"
definition: >-
  GTPase which is tethered to vacuole membranes through its association with the Lam/Ragulator complex (CPX-26512). Plays a role in TORC1 signalling, modulating cellular response to nutrients. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
