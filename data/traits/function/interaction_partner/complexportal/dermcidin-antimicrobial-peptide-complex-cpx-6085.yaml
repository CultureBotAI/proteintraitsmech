identifier: ComplexPortal:CPX-6085
label: "Dermcidin antimicrobial peptide complex"
definition: >-
  Negatively charged antimicrobial peptide that is constitutively produced in sweat glands as a precursor protein, processed and secreted into human sweat. The peptide forms a high-conductance transmembrane channel which inserts into bacterial membranes, disrupting the bacterial transmembrane potential that is essential for cell survival. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
