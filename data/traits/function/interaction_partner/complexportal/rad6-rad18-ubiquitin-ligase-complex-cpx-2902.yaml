identifier: ComplexPortal:CPX-2902
label: "RAD6-RAD18 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex invovled in post-replicative repair of damaged DNA. Mono-ubiquitinates PCNA at a highly conserved lysine, lys-164, in response to replication-stalling DNA damage. This promotes the recruitment of a class of specialized polymerases capable of using damaged DNA as a template for trans-lesion synthesis. Also plays a role in the prevention of spontaneous mutations caused by oxidation of guanine to 7,8-dihydo-8-oxoguanine, caused by free radicals and reactive oxygen species. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
