identifier: ComplexPortal:CPX-6012
label: "Interferon lambda receptor-ligand complex, IFNL2 variant"
definition: >-
  Receptor-ligand complex whose formation is triggered in response to viral infection to engage downstream signalling pathways that activate anti-viral responses. Following complex assembly TYK2 (P29597) and/or members of the JAK family of tyrosine-protein kinases are activated by reciprocal transphosphorylation. Subsequently, they phosphorylate several tyrosine residues in the membrane-distal, intracellular domains of IFNLR1 and IL10RB, which, in turn, recruit further effector proteins that propagate downstream signalling. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
