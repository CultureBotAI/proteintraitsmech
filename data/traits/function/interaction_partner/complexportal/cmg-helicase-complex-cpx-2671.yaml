identifier: ComplexPortal:CPX-2671
label: "CMG helicase complex"
definition: >-
  DNA helicase that unwinds or rearranges duplex DNA during replication, recombination and repair. Surrounds the leading strand during DNA replication and recruits the DNA polymerase epsilon complex (CPX-2422) for leading-strand synthesis. CDC45 adds the GINS complex (CPX-2670) onto each MCM complex (CPX-2942) to form two active CMG helicases that surround each strand of parental DNA. CMG then translocates along single-strand DNA in the 3-prime to 5-prime direction for bidirectional replication.The complex unwinds duplex regions up to 500 bp. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
