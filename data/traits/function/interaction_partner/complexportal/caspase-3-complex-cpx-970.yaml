identifier: ComplexPortal:CPX-970
label: "Caspase-3 complex"
definition: >-
  A thiol protease complex that is activated by caspase-9 (CPX-3762 and CPX-991) and is one of the main effector caspases in mammalian cells. Cleaves and activates Caspase-6 (CPX-971), Caspase-7 (CPX-2862) and Caspase-9. At the onset of apoptosis it proteolytically cleaves poly[ADP-ribose] polymerase 1 (PARP1, P09874) at a '216-Asp-|-Gly-217' bond. It is also the primary activator of apoptotic DNA fragmentation through inactivation of DNA fragmentation factor subunit alpha (DFFA - O00273). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
