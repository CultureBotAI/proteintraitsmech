identifier: ComplexPortal:CPX-1412
label: "UBP3-BRE5 ubiquitin hydrolase complex"
definition: >-
  Specifically deubiquitylates and consequently controls the expression level of the SEC23 (P15303) and SEC27 (P41811) subunits of the COPII (CPX-2523) and COPI complexes that regulate anterograde and retrograde transport between the endoplasmic reticulum and the Golgi apparatus respectively. Also required for the assmbly of nonmembranous ribonucleoprotein stress granules. Inhibits mitophagy but promotes other types of autophagy, including ribophagy. The complex translocates dynamically from the cytosol to the mitochondria upon induction of mitophagy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
