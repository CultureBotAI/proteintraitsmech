identifier: ComplexPortal:CPX-65
label: "bZIP transcription factor complex, Cebpa-Ddit3"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The DNA recognition sequence depends on the composition of the bZIP dimer with the complex either binding to the preferred region of one of the partners or to a novel bZIP cognate site. Ddit3 binding to Cebpa inhibits Cebpa homodimerisation and therefore activation of transcription of Cebpa-specific genes. Induced in response to ER stress, nutrient deprivation and certain toxins. Induces cell cycle arrest and apoptosis in response to ER stress. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
