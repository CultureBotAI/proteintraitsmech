identifier: ComplexPortal:CPX-2552
label: "E2F6-DP1 transcriptional repressor complex"
definition: >-
  Transcriptional repressor complex which binds DNA with a preference for the 5'-TTTCCCGC-3' E2F recognition site. E2F6 lacks the transcriptional activation and Retinoblastoma family pocket protein binding domains present in related E2F family members. During S-phase, the complex interacts with E2F target genes that are activated at G1/S, thus restricting their expression and promoting progression through the cell cycle. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
