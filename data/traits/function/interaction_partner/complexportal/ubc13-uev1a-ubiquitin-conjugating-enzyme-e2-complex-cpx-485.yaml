identifier: ComplexPortal:CPX-485
label: "UBC13-UEV1A ubiquitin-conjugating enzyme E2 complex"
definition: >-
  Implicated in the non-proteolytic regulation of signaling pathways by contributing to the addition of lysine 63-linked ubiquitin chains to proteins. Transfers the thioester-bound donor ubiquitin from UBE2N onto the UBE2V1 catalytically inactive E2 variant. The heterodimer, together with the RING ubiquitin ligase TRAF6, then catalyzes the formation of multiubiquitin chains linked by isopeptide bonds between Lys-63 and the C-terminus of the next monomer in the chain. This type of polyubiquitination does not lead to protein degradation by the proteasome but instead mediates activation of target genes by activating intracellular signaling cascades, in particular TRAF-dependent NF-kappa-B signaling. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
