identifier: ComplexPortal:CPX-26706
label: "CLTA-CLTC-CKAP5-TACC3, mitotic spindle organizing complex"
definition: >-
  Complex stabilizes the mitotic spindle by crosslinking adjacent microtubules within kinetochore fibres, enhancing their mechanical integrity and suppressing microtubule-catastrophe events. This stabilization is essential for maintaining spindle architecture and strengthening kinetochore-microtubule attachments, thereby ensuring accurate chromosome segregation during mitosis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
