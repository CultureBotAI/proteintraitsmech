identifier: ComplexPortal:CPX-8901
label: "CARD-BCL10-MALT1 complex, CARD11 variant"
definition: >-
  Scaffolding platform that bridges T- and B-cell receptor proximal signaling to the canonical I-kappa-B kinase, NF-kappa-B and JNK pathway in lymphocytes thus triggering the adaptive immune response in lymphocytes and lymphoma cells. Activation of the CARD protein results in its interaction with BCL10 and facilitates its forming of large macromolecular filaments, providing a large scaffold for binding and activation of MALT1, which is the enzymatic caspase-like subunit of the complex. This results in the further downstream activation of a variety of effector molecules. CARD11 is expressed in haematopoietic cells. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
