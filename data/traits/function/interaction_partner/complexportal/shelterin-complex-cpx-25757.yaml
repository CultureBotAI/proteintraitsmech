identifier: ComplexPortal:CPX-25757
label: "Shelterin complex"
definition: >-
  The Shelterin complex is a DNA-binding protein complex that associates with the telomeres that cap the ends of eukaryotic chromosomes and distinguishes them from sites of DNA damage thus sheltering chromosome ends from being inappropriately processed by the DNA repair machinery. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
