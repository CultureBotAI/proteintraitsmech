identifier: ComplexPortal:CPX-4027
label: "gpr-1-gpr-2-lin-5 complex"
definition: >-
  Controls nuclear rotation and spindle elongation during mitosis in early embryonic divisions, activating G-protein signaling to affect mitotic spindle forces that drive spindle movement. Within the complex, gpr-1 binds to G protein goa-1 (P51875; ADP-bound form), which plays a role in the cortical localization of gpr-1 and gpr-2. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
