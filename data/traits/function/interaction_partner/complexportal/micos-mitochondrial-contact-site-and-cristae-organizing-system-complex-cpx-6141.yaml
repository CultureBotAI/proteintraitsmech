identifier: ComplexPortal:CPX-6141
label: "MICOS mitochondrial contact site and cristae organizing system complex"
definition: >-
  Required to maintain the folding of the mitochondrial inner membrane into cristae, crista junctions, inner membrane architecture, and the formation of contact sites to the outer mitochondrial membrane. Part of the mitochondrial intermembrane space bridging (MIB) super-complex. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
