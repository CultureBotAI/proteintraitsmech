identifier: ComplexPortal:CPX-2720
label: "bZIP transcription factor complex, BACH1-BACH1"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. Acts as a metabolic driver which inhibits mitochondrial metabolism through transcriptional suppression of mitochondrial membrane genes. and regulating key genes in the citric acid (TCA) cycle, in glucose uptake and in lactate secretion. BACH1 can bind heme, causing it to be released from DNA and undergo nuclear export for ubiquitin-dependent degradation, thus releasing transcription suppression of the BACH1 target gene, heme oxygenase 1.(P09601). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
