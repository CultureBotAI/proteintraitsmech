identifier: ComplexPortal:CPX-5979
label: "Frv fructose-like enzyme II complex"
definition: >-
  Probably involved in the transport of fructose across the cell membrane as part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS). The fructose-specific PTS has no requirement for hpr/ptsH (P0AA04), fvuB combines a IIA domain with a HPr domain. frvA contains a duplicated EIIB domain (EIIB' domain) in the N-terminal which lacks the active site and functions to facilitate phosphoryl transfer between the EIIA domain of diphosphoryl transfer protein and the EIIB domain. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
