identifier: ComplexPortal:CPX-26468
label: "Carboxy-terminal domain protein kinase complex"
definition: >-
  Cyclin-dependent protein that phosphorylates RNA polymerase II (RNAPII, CPX-2661) on the carboxyl-terminal repeat domain (CTD) of its largest subunit RPB1 (P36594), which is important for efficient transcription elongation, mRNA 3′-end processing, and transcription termination of small noncoding RNAs. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
