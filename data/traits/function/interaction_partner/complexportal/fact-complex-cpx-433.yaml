identifier: ComplexPortal:CPX-433
label: "FACT complex"
definition: >-
  FACT is an H2A-H2B histone chaperon complex that helps reorganize nucleosomes in an ATP-independent fashion. It is involved in various processes related to chromatin dynamics: DNA replication, DNA damage and repair, transcription initiation and elongation. Binds histone H2A-H2B dimers and possibly small amounts of H3H4. Facilitates RNA Pol II driven transcription through chromatin by destabilizing nucleosomal structure so that one of the H2A-H2B dimers is removed upon RNA Pol II passage. Subsequently brings back the histones and thereby maintains nucleosome integrity after RNA Pol II passage. Interacts with the active forms of the MCM complexes facilitating its unwinding activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
