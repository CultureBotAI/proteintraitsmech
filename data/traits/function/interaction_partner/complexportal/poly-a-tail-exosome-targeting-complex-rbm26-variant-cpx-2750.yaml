identifier: ComplexPortal:CPX-2750
label: "Poly(A) tail exosome targeting complex, RBM26 variant"
definition: >-
  Present in the nucleoplasm where it recognises and directs a subset of long and polyadenylated poly(A) RNAs for exosomal degradation. Most probably acts by disentangling ribonucleoprotein complexes and threading unwound RNAs into the nuclear exosome channel (CPX-476, CPX-591). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
