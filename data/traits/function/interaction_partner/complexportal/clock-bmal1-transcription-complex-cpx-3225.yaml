identifier: ComplexPortal:CPX-3225
label: "CLOCK-BMAL1 transcription complex"
definition: >-
  Transcription factor complex which interacts with E-box regulatory elements in target genes, including Period (Per1, Per2, Per3) and Cryptochrome (Cry1, Cry2), to activate their transcription during the daytime. The CRY-PER complexes (CPX-3209, CPX-3210, CPX-3214, CPX-3216, CPX-3217, CPX-3218) then inhibit Clock-Bmal1-driven transcription in a negative feedback loop to generate circadian rhythms. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
