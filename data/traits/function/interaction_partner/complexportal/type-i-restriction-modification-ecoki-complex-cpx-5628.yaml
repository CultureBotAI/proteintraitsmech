identifier: ComplexPortal:CPX-5628
label: "Type I restriction-modification EcoKI complex"
definition: >-
  Defense mechanisms against foreign DNA introduced by an infectious agent (such as a bacteriophage). Comprises of two enzymatic activities: a restriction endonuclease (REase) and a methyltransferase (MTase). The REase recognizes and cleaves foreign DNA sequences at specific sites, cleaving endonucleolytically at phosphodiester bonds to generate 5′ or 3′ overhangs or blunt ends while the MTase activity ensures discrimination between self and non-self DNA, by transferring methyl groups to the same specific DNA sequence within the host's genome. The complex binds to a bipartite, asymmetric DNA sequence, 5'-AACN6GTGC-3', the MTase transfers the methyl group from S-adenosyl methionine to the C-5 carbon or the N4 amino group of cytosine or to the N6 amino group of adenine on newly replicated, hemimethylated host DNA and switches to an endonuclease activity on unmethylated foreign DNA, cleaving from approximately 100 base pairs to tens of thousands of base pairs away from the target. The latter reaction requires massive ATP hydrolysis to drive translocation of up to 50 kb of DNA at rates of up to 1 kb per second. The DNA is then cleaved at a random sequence remote from the original specificity sequence, with the generation of variable length single-strand overhangs Type-I DNA restriction-modification (R/M) systems are important agents in limiting the transmission of mobile genetic elements responsible for spreading bacterial resistance to antibiotics. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
