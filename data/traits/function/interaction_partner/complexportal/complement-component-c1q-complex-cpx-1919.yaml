identifier: ComplexPortal:CPX-1919
label: "Complement component C1q complex"
definition: >-
  Recognition unit of the classical pathway of complement which associates with the Ca2+ - dependent C1r(2)-C1s(2) tetramer to form C1 (CPX-1920), the first component of the classical complement system. The complex's role in C1 is the recognition of immune complexes, or other molecules, which trigger the classical pathway of the complement system. Independent of complement activation C1q appears to have additional roles in homeostasis and cellular development, superoxide (O2-) production by neutrophils, blood coagulation and neurological synapse pruning. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
