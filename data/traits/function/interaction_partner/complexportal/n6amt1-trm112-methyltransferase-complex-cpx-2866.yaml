identifier: ComplexPortal:CPX-2866
label: "N6AMT1-TRM112 methyltransferase complex"
definition: >-
  S-adenosylmethionine-dependent methyltransferase which catalyzes the monomethylation of histone H4 lysine-12 thus controlling the expression of genes encoding molecules involved in the cell cycle. Catalyzes N5-methylation of Glu residue of proteins with a Gly-Gln-X-X-X-Arg motif. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
