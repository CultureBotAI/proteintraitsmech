identifier: ComplexPortal:CPX-6423
label: "Trehalose-6-phosphate synthase/phosphatase complex"
definition: >-
  Catalyzes the production of trehalose from glucose-6-phosphate and UDP-glucose in a two step process. The Tps1 subunit is a trehalose-6-phosphate synthase (TPS) and catalyses the production of alpha,alpha-trehalose 6-phosphate from UDP-glucose and D-glucose 6-phosphate. Tpp1 acts as a trehalose-6-phosphate phosphatase (TPP) to release trehalose as a final product. The role of ntp1 in the complex is unclear. Depending on the subunit stoichiometries it is either neutral or gives the complex neutral trehalase activity, converting trehalose to glucose. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
