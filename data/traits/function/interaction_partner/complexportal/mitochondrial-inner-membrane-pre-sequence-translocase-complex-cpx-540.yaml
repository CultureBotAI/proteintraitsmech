identifier: ComplexPortal:CPX-540
label: "Mitochondrial inner membrane pre-sequence translocase complex"
definition: >-
  Mediates the translocation of presequence-containing proteins across the inner membrane. Tim50 promotes the interaction of a presequence-carrying preprotein emerging from the Tom40 channel with the intermembrane space domain of the receptor Tom22. Tethering of Tim21 to Tom22 may allow the preprotein to be released from the TOM complex and engage with the Tim23 channel. Tim21 also promotes dissociation of the motor PAM from the TIM23 complex, a PAM-free TIM23 complex promotes inner membrane sorting of of cleavable preproteins with a hydrophobic sorting signal. Tim17 causes PAM association to the TIM23core upon Tim21 dissociation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
