identifier: ComplexPortal:CPX-2714
label: "Little elongation complex, ELL3 variant"
definition: >-
  Regulates the initiation and elongation of RNA polymerase II (Pol II)-transcribed genes encoding small nuclear RNAs (snRNAs). Recruited by Mediator complex (CPX-3227) subunit MED26 (O95402) to regulate transcription termination at replication-dependent histone and snRNA genes and 3′-processing of mRNAs encoding replication-dependent histones and snRNA precursors into mature, non-polyadenylated transcripts. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
