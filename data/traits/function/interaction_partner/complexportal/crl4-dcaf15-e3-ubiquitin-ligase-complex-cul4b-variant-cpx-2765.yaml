identifier: ComplexPortal:CPX-2765
label: "CRL4-DCAF15 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF15. The complex acts as a regulator of the natural killer cell effector functions, possibly by mediating ubiquitination and degradation of cohesin complex (CPX-5989, CPX-5991, CPX-6082) subunits SMC1A (Q14683) and SMC3 (Q9UQE7) and/or the splicing factor RBM39 (Q14498). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
