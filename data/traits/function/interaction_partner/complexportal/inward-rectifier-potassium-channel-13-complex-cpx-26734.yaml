identifier: ComplexPortal:CPX-26734
label: "Inward rectifier potassium channel 13 complex"
definition: >-
  Inward rectifier potassium channel that mediates potassium ion flux across the plasma membrane. Contributes to the maintenance of membrane potential and potassium homeostasis, particularly in epithelial and retinal cells. Displays weak inward rectification, low single-channel conductance, and reduced sensitivity to classical inward rectifier blockers compared with other Kir channels. Plays an essential role in epithelial potassium recycling and in maintaining the ionic environment of the retina; loss of channel function disrupts retinal physiology and leads to inherited retinal degenerative disorders. Throught to be particularly abundant in the Purkinje cell layer of the cerebellum and pyramidal cells of the hippocampus. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
