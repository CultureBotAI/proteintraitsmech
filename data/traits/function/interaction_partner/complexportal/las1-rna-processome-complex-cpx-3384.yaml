identifier: ComplexPortal:CPX-3384
label: "LAS1 RNA processome complex"
definition: >-
  Endonuclease responsible for the removal of the second internal transcribed spacer region (ITS2) from 35S pre-ribosomal RNA, located between the 5.8S and 25S rRNA. LAS1 within this complex functions as RNA endonuclease, which cleaves at site C2, yielding a 2′,3′ cyclic phosphate at the 7S pre-rRNA and a hydroxyl group at the 5′ end of the 26S pre-rRNA. Subsequently, GRC3, phosphorylates 26S pre-rRNA at its free 5′-OH group, allowing the associated RAT1 5′ to 3′ exonuclease and its co-factor RAI1 to trim 26S pre-rRNA to 25′S pre-rRNA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
