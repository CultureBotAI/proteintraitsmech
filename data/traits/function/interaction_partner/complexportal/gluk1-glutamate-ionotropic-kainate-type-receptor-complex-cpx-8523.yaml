identifier: ComplexPortal:CPX-8523
label: "GluK1 glutamate ionotropic kainate-type receptor complex"
definition: >-
  An ionotropic glutamate receptor which localizes either post-synaptically to drive synaptic depolarization or pre-synaptically to regulate neurotransmitter release. Belonging to the kainate-type glutamate receptors (KARs) sub-family, GluKs are ligand-gated cation channels activated by the neurotransmitter L-glutamate. GluKs play complex roles in neural development and CNS function. Implicated in developmental disorders including Down's syndrome as well nervous system disorders such as epilepsy. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
