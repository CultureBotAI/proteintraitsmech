identifier: ComplexPortal:CPX-2258
label: "General transcription factor TFIIH complex"
definition: >-
  General transcription factor involved in transcriptional initiation, activation and elongation, the cell cycle and nucleotide excision repair. The ATPase/helicase activities of ERCC2/xpd and ERCC3/hay are required for promoter melting at transcription initiation sites and damaged DNA opening at nucleotide excision repair sites and the protein kinase activity of CDK7 is necessary for phosphorylation of the C-terminal domain of the largest subunit of RNA polymerase II, other transcription factors and nuclear receptors. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
