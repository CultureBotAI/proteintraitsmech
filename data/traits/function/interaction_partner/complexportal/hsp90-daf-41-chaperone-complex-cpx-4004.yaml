identifier: ComplexPortal:CPX-4004
label: "Hsp90-daf-41 chaperone complex"
definition: >-
  A chaperone complex that may be required for the proper folding, maturation and stabilization of target proteins. As in human (but not in yeast), the complex in C.elegans exhibits little ATP hydrolysis activity due to the binding of p23/daf-41 to daf-21/Hsp90, which inhibits the ATPase of daf-21/Hsp90. Within the complex, p23/daf-41 controls the ATP hydrolysis rate to regulate the formation of stable complexes between Hsp90/daf-21 and its target proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
