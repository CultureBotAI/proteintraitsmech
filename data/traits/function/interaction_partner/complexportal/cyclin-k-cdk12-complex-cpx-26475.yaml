identifier: ComplexPortal:CPX-26475
label: "Cyclin K-CDK12 complex"
definition: >-
  Cyclin-dependent protein kinase complex involved in regulation of different transcription phases. Phosphorylates the C-terminal domain (CTD) of RNA polymerase II (CPX-2625). Preferentially phosphorylates 'Ser-5' in CTD repeats that are already phosphorylated at 'Ser-7', but can also phosphorylate 'Ser-2'. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
