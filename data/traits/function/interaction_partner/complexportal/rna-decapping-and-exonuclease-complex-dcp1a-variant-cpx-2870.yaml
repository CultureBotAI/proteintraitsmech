identifier: ComplexPortal:CPX-2870
label: "RNA decapping and exonuclease complex, DCP1A variant"
definition: >-
  Removes the 7-methyl guanine cap structure from mRNA molecules, yielding a 5'-phosphorylated mRNA fragment and 7m-GDP. This is a critical step in bulk mRNA turnover and also in specific mRNA decay pathways triggered by the presence of AU-rich elements, a nonsense codon or miRNA-binding sites. Decapping inhibits translation initiation and commits the mRNA to full degradation by the 5'-to-3' exonuclease XRN1. Additional proteins, for example the microprotein NBDY (A0A0U1RRE5) may bind to the protein and regulate target specificity and also subcellular location of the complex. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
