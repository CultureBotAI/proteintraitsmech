identifier: ComplexPortal:CPX-2761
label: "C/D small nucleolar ribonuclear protein complex"
definition: >-
  S-adenosyl-L-methionine-dependent methyltransferase complex that catalyzes the site-specific 2'-O-methylation of ribosomal RNAs using box C/D snoRNAs as guides thus assisting the assembly of ribosomes. Methylation occurs at a characteristic distance from the sequence involved in base pairing with the guide RNA. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
