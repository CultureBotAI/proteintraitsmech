identifier: ComplexPortal:CPX-3100
label: "mago-y14 exon-exon junction subcomplex"
definition: >-
  A nucleocytoplasmic transport complex that transports proteins and RNAs in and out of the nucleus. Shuttles between the nucleus, where it is loaded onto specific mRNAs, and the cytoplasm and functions in translational regulation. Component of the core exon-exon-junction complex (EJC), an assembly that endows the mature messenger ribonucleoprotein (mRNP) complexes with architectural information on the pre-mRNA intron structure and is important for coupling nuclear and cytoplasmic events in gene expression. Inhibits the ATPase activity of eIF4AIII (Q9VHS8) to ensure a stable association of the EJC core with the mRNA. Binds mRNA in the nucleus and is exported into the cytoplasm where it is dissociated from the mRNA by formation of Pym-mago-Y14 complex (CPX-3147). Following dissociation of Pym, mago-Y14 binds cdm (Imp13, Q9VEC5) to form nuclear import complex cdm-Mago-Y14 (CPX-3171). Released from cdm by Ran-GTP (Q9VZ23) forming cdm-Ran-GTP complex (CPX-3170) to enable mago-Y14 to act in next round of mRNP incorporation. Involved in regulation of pole plasma oskar mRNA localization. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
