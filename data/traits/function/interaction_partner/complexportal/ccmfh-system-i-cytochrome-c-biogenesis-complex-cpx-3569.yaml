identifier: ComplexPortal:CPX-3569
label: "CcmFH system I cytochrome c biogenesis complex"
definition: >-
  Required for the covalent ligation of heme to a C1XXC2H heme-binding site in an apo-cytochome C. Acts as a Cytochrome C synthetase that accepts heme from the ccmE (P69490) chaperone for attachment to apo-cytochrome c via the formation of a thioether. Thioreduction is mediated by dsbE/ccmG (P0AA86) which appears to bind to this complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
