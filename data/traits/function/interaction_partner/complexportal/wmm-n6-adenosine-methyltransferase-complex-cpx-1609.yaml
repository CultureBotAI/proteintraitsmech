identifier: ComplexPortal:CPX-1609
label: "WMM N6-adenosine-methyltransferase complex"
definition: >-
  An N6-methyltransferase complex that methylates adenosine residues (m6A) at the 5'-[AG]GAC-3' consensus sites of some mRNAs. M6A acts as a key regulator of mRNA stability, methylation is completed upon the release of mRNA into the nucleoplasm and promotes mRNA destabilization and degradation. Regulates various processes such as the circadian clock, differentiation of embryonic, haematopoietic and spermatogonial stem cells as well as T-cells, cortical neurogenesis, response to DNA damage, and primary miRNA processing. Trim28 (Q62318), Hnrnph proteins (P31942/P70333/P70333) and Rbm15/Rbm15b (Q0VBL3/Q6PHZ5) have also been postulated to be members of or are associated with this complex. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
