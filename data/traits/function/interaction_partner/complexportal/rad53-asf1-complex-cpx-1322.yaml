identifier: ComplexPortal:CPX-1322
label: "RAD53-ASF1 complex"
definition: >-
  Role in recovery from the DNA damage checkpoint. ASF1 binds most of the free and unmodified RAD53 in the cell and this is required for complete dephosphorylation of Rad53 when the upstream DNA damage checkpoint signaling is turned off. Phosphorylation of RAD53 following DNA damage causes dissociation and frees RAD53 to undergo autophosphorylation and activation and to participate in double-strand break repair. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
