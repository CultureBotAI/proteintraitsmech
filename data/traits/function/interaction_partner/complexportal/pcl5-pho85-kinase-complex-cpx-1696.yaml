identifier: ComplexPortal:CPX-1696
label: "PCL5-PHO85 kinase complex"
definition: >-
  Cyclin-dependent protein kinase that positively controls degradation of transcription factor GCN4 (P03069) under favorable growth conditions. GCN4 is a master transcriptional regulator of amino acid and vitamin biosynthetic enzymes, whose expression is upregulated in response to amino acid starvation Phosphorylation of GCN4 is required for its degradation by the E3 ubiquitin ligase complex SCF-Cdc4 (CPX-3234). Amino acid starvation reduces PCL5-PHO85-associated GCN4 kinase activity and leads to stabilization of GCN4. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
