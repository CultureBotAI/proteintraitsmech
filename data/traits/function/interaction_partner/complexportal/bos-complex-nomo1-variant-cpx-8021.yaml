identifier: ComplexPortal:CPX-8021
label: "BOS complex, NOMO1 variant"
definition: >-
  Mediates insertion of transmembrane regions of multi-spanning membrane proteins into the endoplasmic reticulum (ER) membrane. Acts as part of an ER translocon that functions co-translationally with the SEC61 channel-forming translocon complex (CPX-8073) during biogenesis of multi-pass membrane proteins, along with the PAT intramembrane chaperone complex (CPX-7020) and the GEL multi-spanning membrane protein insertion complex (CPX-5606). The multipass translocon co-assembles on ribosomes containing the SEC61 and TRAP (CPX-8024) complexes, when two transmembrane domains of a multi-pass protein have been membrane inserted and the third is inside the ribosome exit tunnel which displaces the OST oligosaccharyl transferase complex (CPX-5621/CPX-5622). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
