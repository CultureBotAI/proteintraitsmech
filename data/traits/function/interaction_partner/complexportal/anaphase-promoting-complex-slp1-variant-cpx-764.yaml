identifier: ComplexPortal:CPX-764
label: "Anaphase-promoting complex, slp1 variant"
definition: >-
  APC, a key regulator of cell cycle progression, is a conserved E3 ubiqutin ligase which facilitates multiubiqutination of cell cycle proteins, including cyclins, so marking them for proteasomal destruction. Generally believed that APC acts as a scaffold that brings E2 enzymes and substrates into close proximity. APC activity is required for metaphase-anaphase transition, mitotic exit, G1 phase and DNA replication. Targets securin for destruction, which is necessary for chromosome segregation. APC seems to have similar function in meiosis. Co-activators, Slp1 and Srw1/Ste9, associate with APC core (CPX-763) complex at specific stages of cell cycle, and are thought to be involved in substrate specificity. APC-Slp1 is active in presence of high cyclin-cdk activity in M phase but after metaphase when cyclin-cdk activity decreases, Srw1/Ste9 is dephosphorylated, Slp1 is degraded and APC-Srw1/Ste9 (CPX-765) activated. Mfr1/Fzr1 (CPX-766) is meiotic co-activator required for sporulation. All APC co-activators, characterized by the presence of sequence elements, C-box and the IR-tail, that mediate their binding to APC, contain a C-terminal WD40 domain, predicted to fold into a propeller-like structure, believed to recognize APC substrates by interacting with specific recognition elements in substrates, D-boxes and KEN-boxes. Genetic inactivation of APC is lethal. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
