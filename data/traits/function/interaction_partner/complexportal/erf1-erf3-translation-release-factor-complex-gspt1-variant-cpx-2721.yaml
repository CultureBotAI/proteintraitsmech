identifier: ComplexPortal:CPX-2721
label: "ERF1-ERF3 translation release factor complex, GSPT1 variant"
definition: >-
  Required for the termination of protein synthesis which occurs when one of three stop codons (UAA, UAG or UGA) enters the ribosomal A site.ETF1 stimulates GTP binding to GSPT1, inducing the GTPase activity of GSPT1 that couples codon recognition and ETF1 peptidyl-tRNA hydrolysis to ensure rapid and efficient peptide release from the ribosome. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
