identifier: ComplexPortal:CPX-1815
label: "Integrin alpha8-beta1 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Functions in the genesis of kidney and probably of other organs by regulating the recruitment of mesenchymal cells into epithelial structures. Recognizes the sequence R-G-D in a wide array of ligands including Tenascin, Fibronectin, Osteopontin, Transforming growth factor beta-1, Transforming growth factor beta-3 and Vitronectin. Nephronectin is probably its functional ligand in kidney genesis. Neuronal receptor for Tenascin, it mediates cell-cell interactions and regulates neurite outgrowth of sensory and motor neurons. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
