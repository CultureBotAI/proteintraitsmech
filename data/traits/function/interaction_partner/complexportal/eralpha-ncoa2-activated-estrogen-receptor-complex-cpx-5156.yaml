identifier: ComplexPortal:CPX-5156
label: "ERalpha-NCOA2 activated estrogen receptor complex"
definition: >-
  Member of the nuclear receptor (NR) family of ligand-regulated transcription factor complexes controlling the expression of numerous genes. Like other NRs, estrogen receptor alpha (ESR1) contains a DNA-binding and a ligand-binding domain (DBD, LBD). In the absence of an agonist ligand, the complex recruits the corepressor proteins NCoR or SMRT and associated factors such as histone deacetylases (HDAC) or DNA-methyl transferases that may lead to an inactive condensed chromatin structure, preventing transcription. Upon ligand binding, ESR1 undergoes a conformational change that results in the release of corepressors, and transcriptional coactivators such as NCOA2 (SRC2) are recruited to the LBD, which activates transcription. ESR1 is able to form heterodimers with a range of other NRs, such as ESR2 (Q92731), retinoic acid receptor (RARs & RXRs) or thyroid hormone receptors. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
