identifier: ComplexPortal:CPX-1667
label: "MutLbeta endonuclease complex"
definition: >-
  Mn2+-dependent endonuclease which nicks a DNA strand containing a pre-existing nick, presumably to provide an entry site for a mispair excision reaction. Required for DNA mismatch repair (MMR), correcting base-base mismatches and insertion-deletion loops resulting from DNA replication, DNA damage or from recombination events between non-identical sequences during meiosis. ATP binding induces a conformational change in the MSH2-MSH6 (CPX-1037) and MSH2-MSH3 (CPX-1036) complexes which converts these to a clamp form that slides along the DNA and leads to recruitment of MutLalpha (CPX-1666) , MutLbeta and MLH1-MLH3 (CPX-1668).. This complex has been proposed to be an accessory factor that acts in conjunction with MLH1-PMS1 (CPX-1666) in maintaining the genetic stability of simple sequence repeats, by suppressing recombination between slightly divergent or homeologous DNA sequences, and in the repair of heteroduplex sites present in meiotic recombination intermediates. It may play a role in regulating between different crossover pathways. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
