identifier: ComplexPortal:CPX-2543
label: "Glutathione-regulated potassium-efflux system KefC-KefF complex"
definition: >-
  Potassium efflux pore which protects the bacteria from the toxic effects of electrophilic compounds which react with nucleophiles found in the bases of DNA and the side chains of proteins, especially cysteine. Potassium efflux via KefC is accompanied by H+ and Na+ influx and hence causes acidification of the cytoplasm. KefC is activated by glutathione adducts and inactivated by glutathione which bind to the cytosolic regulatory K+ transport and nucleotide binding domain of KefC. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
