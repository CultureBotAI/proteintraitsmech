identifier: ComplexPortal:CPX-3983
label: "Hsp90-cdc-37-pph-5 phosphatase complex"
definition: >-
  Serine-threonine phosphatase complex that most likely dephosphorylates a myriad of proteins involved in different signaling pathways. The complex may also act as a chaperone complex that is required for the proper folding, maturation and stabilization of target protein. Implicated in wide ranging cellular processes, including apoptosis, differentiation, DNA damage response, cell survival, regulation of ion channels or circadian rhythms, in response to steroid and thyroid hormones, calcium, fatty acids, TGF-beta as well as oxidative and genotoxic stresses. Dephosphorylates cdc-37-Ser14 within the complex. pph-5 resides in an autoinhibited state, in which its TPR domain interacts with the catalytic region and prevents substrate access to the catalytic pocket. Binding of pph-5 to daf-21/Hsp90 releases the autoinhibition of pph-5 to promote phosphatase activity of the complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
