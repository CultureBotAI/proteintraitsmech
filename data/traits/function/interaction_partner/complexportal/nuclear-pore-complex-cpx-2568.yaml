identifier: ComplexPortal:CPX-2568
label: "Nuclear pore complex"
definition: >-
  The nuclear pore complex (NPC) is a large assembly embedded in the nuclear envelope of eukaryotic cells. The NPC exclusively mediates all transport between cytoplasm and nucleus. A curated stable macromolecular complex (Complex Portal) with 30 subunits.
