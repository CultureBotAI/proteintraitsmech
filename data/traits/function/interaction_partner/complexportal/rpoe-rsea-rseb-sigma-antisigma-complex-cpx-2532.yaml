identifier: ComplexPortal:CPX-2532
label: "rpoe-rsea-rseb sigma-antisigma complex"
definition: >-
  Regulates RpoE-mediated transcription activation by preventing the interaction between the primary sigma factor RpoE with DNA-directed RNA polymerase (RNAP). rpoE-mediated envelope stress response is the major pathway to ensure homeostasis in the envelope compartment of the cell. In response to stress, outer membrane proteins accumulate in the periplasm and activate cleavage of rseA periplasmic domain by degS (P0AEE3), triggering a proteolytic cascade that frees rpoE to activate gene expression. rseB binding to RseA prevents activated degS from cleaving rseA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
