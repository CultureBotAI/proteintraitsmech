identifier: ComplexPortal:CPX-946
label: "SBF transcription complex"
definition: >-
  Heteromeric transcription factor, composed of a regulatory subunit SWI6) and a DNA-binding protein (SWI4), that activates gene expression during the G1/S transition of the cell cycle. Binds to a sequence motif called the SCB element (Swi4/6 cell cycle box, CACGAAA) which acts as a late Gl-specific UAS element in genes predominantly involved in budding, and in membrane and cell-wall biosynthesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
