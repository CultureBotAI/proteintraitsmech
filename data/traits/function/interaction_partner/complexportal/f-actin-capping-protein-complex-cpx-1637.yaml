identifier: ComplexPortal:CPX-1637
label: "F-actin capping protein complex"
definition: >-
  Caps the barbed end of the actin filament thereby blocking the exchange of subunits at these ends. The complex is an essential component for the reconstitution of movement powered by actin polymerization and is important for actin assembly and cell motility. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
