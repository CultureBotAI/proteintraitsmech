identifier: ComplexPortal:CPX-1095
label: "Holo-translocon SecYEG-SecDF-YajC-YidC complex"
definition: >-
  Functions in both protein secretion to the trans side of the plasma membrane and insertion of membrane proteins into the lipid bilayer. The HTL complex is more proficient in cotranslational membrane protein insertion compared with SecYEG (CPX-1096) alone and the post-translational secretion of a beta-barreled outer-membrane protein driven by secA and ATP becomes much more dependent on the proton-motive force than is the case for SecYEG. The yidC periplasmic and secD periplasmic region P1-head domains are positioned to interact with translocation substrates preventing backsliding of the polypeptide through the translocation channel. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
