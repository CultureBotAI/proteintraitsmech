identifier: ComplexPortal:CPX-3028
label: "1,3-beta-D-glucan synthase complex, FKS3-RHO1 variant"
definition: >-
  Synthesizes 1,3-beta-glucan, a major structural component of the yeast cell wall and of the yeast spore wall. FKS3 variant is responsible for normal spore wall assembly. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
