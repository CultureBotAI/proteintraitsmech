identifier: ComplexPortal:CPX-5742
label: "SARS-CoV-2 polymerase complex"
definition: >-
  RNA-directed 5'-3' RNA polymerase of the SARS-CoV-2 coronavirus which consists of the main polymerase protein NSP12 and a stoichiometric variant of the primase complex (CPX-5690). Extends partially double-stranded RNA templates and is probably also required for transcription initiation, though the mechanism for this has yet to be determined. Complex formation enhances dsRNA binding of the individual protomers. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
