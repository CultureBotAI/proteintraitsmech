identifier: ComplexPortal:CPX-353
label: "Cyclin L2-CDK11B(p58) complex"
definition: >-
  Cyclin-dependent protein kinase complex. Appears to be involved in early events in the establishment of the centromere protection machinery and is required for centrosome maturation and centriole duplication, including sister chromatid cohesion. Also plays a role in apoptosis, apparently by phosphorylating and down-regulating members of the BCL-2 family of proteins. The p58 isoform of CDK11B is expressed during G2 and M phases, upon activation of an internal ribosome entry site present in the CDK11 mRNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
