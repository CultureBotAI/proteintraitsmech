identifier: ComplexPortal:CPX-2698
label: "pre-mRNA cleavage and polyadenylation specificity factor complex"
definition: >-
  Endonuclease required for the 3' end processing of most mRNAs. Endonucleolytic cleavage of the nascent pre-mRNA defines the 3' end of the mature transcript and a poly(A) tail is added to the resultant free 3' end, marking the mRNA for nuclear export and controlling mRNA stability and translational efficiency in the cytoplasm. CPSF is an inherently inactive endonuclease, which is activated by accessory factors cleavage stimulatory factor (CPX-2701), cleavage factor IIm (CPX-2692) and RBBP6 (Q7Z6E9). The poly(A) polymerase enzyme (P51003) is not a stable subunit of this complex but is recruited to cleaved transcripts by FIP1L1. RBBP6 is transiently recruited in an RNA-dependent manner. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
