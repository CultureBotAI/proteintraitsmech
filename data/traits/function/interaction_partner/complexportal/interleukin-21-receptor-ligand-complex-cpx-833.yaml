identifier: ComplexPortal:CPX-833
label: "Interleukin-21 receptor-ligand complex"
definition: >-
  Transmembrane complex formed on the binding of an extracellular interleukin-21 (IL21) to its receptor. Ligand binding results in the assembly of the complete complex where signalling is dependent upon IL21 binding to the unique ligand-binding IL21R and the common-gamma chain receptor, IL2RG. IL21R and IL2RG dimerization leads to the transphosphorylation of Janus kinases, JAK1 and JAK3, which in turn leads to the phosphorylation and activation of transcription factors, Signal transducer and activator of transcription 3, STAT3 and, to a lesser extent, STAT1 and STAT5, which subsequently translocate into the nucleus where they induce the transcription of target genes. In addition to the JAK/STAT pathway, IL21 also signals via the phosphoinositide 3-kinase (PI3K) and mitogen-activated protein kinase (MAPK) pathways. IL21 mediates signalling through the IL21 receptor, exerting pleiotropic effects on B, CD4 T cells, cytotoxic CD8 T and natural killer (NK) cells. IL21 activates T follicular helper cells and B cells to promote germinal centre response and thereby the formation of immunological memory. Implicated in multiple autoimmune disorders including systemic lupus erythematosus, rheumatoid arthritis, multiple sclerosis and inflammatory bowel disease, but capable of stimulating antiviral and antitumor responses. IL21 signalling strength correlates with antibody production and IL21 signalling is considered important in antibody production post-immunisation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
