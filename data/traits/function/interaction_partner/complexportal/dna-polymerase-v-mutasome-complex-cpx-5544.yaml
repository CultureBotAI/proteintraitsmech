identifier: ComplexPortal:CPX-5544
label: "DNA polymerase V mutasome complex"
definition: >-
  Low fidelity DNA polymerase required for mutagenic SOS DNA repair, replicating DNA across the lesions. Y-family DNA polymerases, such as umuC, have more open active sites and thus can more easily accommodate bulky DNA lesions and lack the 3'-5' exonucleolytic proofreading activity typical of high-fidelity DNA polymerases. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
