identifier: ComplexPortal:CPX-8171
label: "PBA1-PBA2 proteasomal chaperone complex"
definition: >-
  Chaperone complex with a role in the early stage assembly of the 26S proteasome (CPX-2262). Binds to the top of the alpha ring as it assembles, on the opposite side to the PBA3-PBA4 complex (CPX-8172) and is assumed to enforce the proper configuration of the ring and prevent the premature binding of other complexes which interact with the core barrel-shaped chamber. Release of the PBA1-PBA2 complex is one of the final stages of proteasome assembly. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
