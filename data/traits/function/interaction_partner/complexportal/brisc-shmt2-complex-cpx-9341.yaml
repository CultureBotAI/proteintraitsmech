identifier: ComplexPortal:CPX-9341
label: "BRISC-SHMT2 complex"
definition: >-
  Endogenous deubiquitinase (DUB) inhibitor that specifically recognizes Lys63-linked ubiquitinated chains during cellular stress responses and immune signalling functions. Required for viral protein degradation, as well as IFNAR1 (P17181)/ IFNAR2 (P48551) deubiquitylation and receptor stabilization on the cell membrane. Deubiquitination of Lys63 chains on IFNAR1/IFNAR2 limits their endocytosis and lysosomal degradation, thereby increasing their cell surface expression and stability to promote type 1 interferon activity. SHMT2 performs counterintuitive functions, acting as both an inhibitor of BRISC activity as well as a key mediator of BRISC association at sites of DUB action, in its role as a reversible endogenous BRISC inhibitor that prevents non-specific DUB activity. Pyridoxal-5'-phosphate (Viatmin B6-PLP, CHEBI:18405) is key for the transition of SHMT2 from dimeric to a tetrameric state. Only the inactive, dimeric SHMT2 can interact with BRISC. An increase in intracellular PLP is associated with a reduction in BRISC-SHMT2 interaction and inflammatory signalling. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
