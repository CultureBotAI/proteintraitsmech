identifier: ComplexPortal:CPX-3289
label: "HSP90A-CDC37 chaperone complex"
definition: >-
  A protein kinase chaperone complex required for the proper folding, maturation and stabilization of target proteins (mostly signalling protein kinases, some steroid hormone receptors), usually during or immediately after completion of translation. The complex prevents the aggregation and degradation of protein kinases while maintaining the proper structure of their domains, recognizing and binding the extended kinase domain formed by reorganisation of the client protein to enable replacement of a hydrolyzed ADP with a new ATP molecule. The highly conserved, phosphorylated CDC37 Ser-13 is essential for complex assembly and target protein binding. CDC37 Ser-13 is phosphorylated by Casein kinase II (CK2), which in turn is a target of CDC37 creating a positive feedback loop. CDC37 Ser-13 is de-phosphorylated by PP5 (P53041). Target proteins are recognised by the CDC37 subunit. The complex associates with intrinsically unstable kinases, recognizing and folding both nascent kinase polypeptides emerging from ribosomes and mature kinases to maintain their activity and stability. Complex binding also prevents rapid ubiquitin-dependent proteosomal degradation of target proteins.kinases to maintain their activity and stability Complex binding also prevents rapid ubiquitin-dependent proteosomal degradation of target proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
