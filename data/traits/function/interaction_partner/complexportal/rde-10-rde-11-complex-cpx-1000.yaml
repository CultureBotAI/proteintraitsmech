identifier: ComplexPortal:CPX-1000
label: "Rde-10/Rde-11 complex"
definition: >-
  The complex interacts with primary siRNA bound target mRNA and is required for the small interfering RNA (siRNA) amplification which triggers RNA interference (RNAi)-induced mRNA degradation. Required in the endogenous and exogenous siRNA pathways for the biogenesis and accumulation of secondary siRNA intermediates, such as 22G-siRNAs derived from ergo-1 targets. These potentiate the silencing effect of primary siRNAs at low dsRNA concentrations. The complex thus links the amplification of the RNAi response to the initial processing and utilization of the exogenous dsRNA trigger. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
