identifier: ComplexPortal:CPX-15113
label: "cFLIP-CASP8-FADD complex"
definition: >-
  Anti-apoptosis regulator complex. Complex regulates death receptor (DR)-mediated apoptosis and RIPK1 (Q13546)-mediated necroptosis. However, its function remains controversial, where a hierarchical death-effector domain (DED) assembly mechanism is thought to confer resistance to both DR-mediated and DR-independent death signaling in tumor cells with elevated CFLAR levels. The catalytic activity of the cFLIP-CASP8-FADD complex blocks RIPK3-dependent signaling (including necrosis) by cleaving RIPK1, whilst CFLAR blocks RIPK3-independent apoptosis promoted by the FADD-caspase-8 complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
