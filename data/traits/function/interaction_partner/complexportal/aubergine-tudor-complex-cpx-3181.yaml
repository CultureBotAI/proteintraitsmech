identifier: ComplexPortal:CPX-3181
label: "aubergine-tudor complex"
definition: >-
  Required for gametogenesis. PIWI proteins associate specifically with PIWI-interacting RNAs (piRNAs), small RNAs expressed predominantly in germlines, and silence transposable DNA elements, thus maintaining the integrity of the genome and the development of gametes. The presence of Tudor in the complex appears to be required for the quality control of transposon-derived piRNAs. Symmetric dimethylated arginines (sDMA) result from methylation of Aub by dPRMT5 (csul, Q9U6Y9) and act as binding sites for Tud domains. This complex accumulates in the P granule (meiotic nuage) of primordial germ cells where it is found in the posterior pole plasm. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
