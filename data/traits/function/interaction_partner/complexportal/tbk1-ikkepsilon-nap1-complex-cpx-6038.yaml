identifier: ComplexPortal:CPX-6038
label: "TBK1-IKKepsilon-NAP1 complex"
definition: >-
  Serine/threonine-protein kinase complex activated by MAVS-TRAF3 complex (CPX-6037) upon RNA virus infection. It phosphorylates transcription factors IRF3 (Q14653) and IRF7 (Q92985), causing their translocation to the nucleus and the transcriptional activation of promoters containing IFN-stimulated response elements (ISREs). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
