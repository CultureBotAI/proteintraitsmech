identifier: ComplexPortal:CPX-9002
label: "PA28-alphabeta single-capped 20S proteasome complex"
definition: >-
  Multi-enzyme complex that functions as the primary degradation machinery for the selective turnover of surplus or damaged proteins within the cell. The core contains the protease active sites (chymotrypsin-like, trypsin-like and peptidylglutamyl-peptide hydrolyzing) that perform the proteolysis reactions in an internal chamber. Regulatory particles referred to as 'caps' act as a discriminating gateway for potential substrates. This complex is formed upon the endogenous proteasomal activator, PA28, a 28 kDa protein binding to the 20S proteasome (CPX-8806). PA28 exists as three highly homologous isoforms, alpha, beta and gamma (Q06323, Q9UL46 and P61289 respectively). The three subunits differ significantly in their biochemical and biological properties. PA28-alpha and PA28-beta favour the release of peptide products by the proteasome and are specifically involved in optimizing MHC class 1 antigen presentation. PA28-alpha and PA28-beta bind in an ATP-independent manner to either one (single-cap, this complex) or both ends (double-capped, CPX-8842) of the of the 20S proteasome, but the efficiency of substrate processing by single and double-capped proteasomes in not known. Binding of the activator modifies the 20S peptidase and opens its outer alpha-ring gates allowing substrate entry to the antechamber through an internal activation loop. Regulates protein degradation either in a regulated manner upon specific molecular cues or acts on damaged and disordered proteins. Plays a key role under oxidative stress conditions to degrade damaged and unfolded proteins and is up-regulated by interferon-gamma during antigen presentation. Tumorigenesis of PA28-alpha is unclear but up-regulation of the subunit is associated with several cancers, including ovarian, prostate and oral squamous cell carcinoma (OSCC), and interestingly, silencing it suppressed OSCC cell growth and metastasis. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
