identifier: ComplexPortal:CPX-6275
label: "NatC N-alpha-acetyltransferase complex"
definition: >-
  N(alpha)-acetyltransferases responsible for the covalent attachment of an acetyl group (CH3CO) to the free alpha-amino group (NH3+) at the N-terminal end of a polypeptide, one of the most common co-translational modifications. This changes the electrostatic properties of proteins and therefore protein function, stability and localization. NatC acetylates N-terminal methionine of proteins with hydrophobic/amphipathic N-termini (Met-Leu- Met-Ile-, Met-Phe-, Met-Trp-, Mat-Val-, Met-Met-, Met-His-, and Met-Lys-) to varying degrees. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
