identifier: ComplexPortal:CPX-2773
label: "SCF E3 ubiquitin ligase complex, FBXL17 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. The complex selectively binds and ubiquitylates dimers of proteins containing a BTB/POZ domain of aberrant composition and triggers their clearance by proteasomal degradation. SCF-FBXL17 target proteins include KBTBD8 (Q8NFY9), the substrate-specific adapter of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a regulator of neural crest specification and also SPAST (Q9UBP0) an ATP-dependent polyglutamylated microtubule severing protein. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
