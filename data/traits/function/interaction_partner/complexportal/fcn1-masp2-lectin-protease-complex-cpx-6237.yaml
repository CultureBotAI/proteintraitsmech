identifier: ComplexPortal:CPX-6237
label: "FCN1-MASP2 lectin-protease complex"
definition: >-
  Calcium-dependent pattern-recognition receptor and serine protease complex of the lectin pathway (LP) of complement activation. Activates the LP by binding sugar moieties and acetyl groups of pathogen-associated molecular patterns (PAMPs) displayed on microbes via the lectin FCN1 subcomplex. Binds preferentially to 9-O-acetylated 2-6-linked sialic acid derivatives and to various glycans containing sialic acid engaged in a 2-3 linkage. May also activate monocytes. Mainly present in peripheral blood leukocytes, monocytes and granulocytes. MASP2 protease is probably activated by cleavage by a MASP1 from a neighbouring FCN1-MASP1 complex (CPX-6172) and in turn cleaves and activates complement precursors C4 (P0C0L4) and C2 (P06681) to form C3 convertase complexes C4b2a-A (CPX-5675) and C4b2a-B (CPX-6156). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
