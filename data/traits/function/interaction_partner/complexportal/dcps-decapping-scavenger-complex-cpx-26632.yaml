identifier: ComplexPortal:CPX-26632
label: "DCPS decapping scavenger complex"
definition: >-
  Decapping complex which catalyzes the degradation of the residual cap structure following 3'->5' mRNA decay, to prevent the premature decapping of the capped long mRNA and misincorporation of methylated nucleotides in nucleic acids, thereby averting accumulation of intermediates that might interfere with RNA processing, export, and translation. Hydrolyzes cap analog structures such as 7-methylguanosine nucleoside triphosphate (m7GpppG) with up to 10 nucleotide substrates (small capped oligoribonucleotides), releasing m7G monophosphate (m7Gp) and diphosphate terminated oligo mRNA (ppRNA). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
