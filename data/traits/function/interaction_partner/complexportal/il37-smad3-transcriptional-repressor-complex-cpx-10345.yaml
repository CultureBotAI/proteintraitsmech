identifier: ComplexPortal:CPX-10345
label: "IL37-SMAD3 transcriptional repressor complex"
definition: >-
  Functions to suppress the innate immune inflammatory response through an intracellular pathway. After stimulation by lipopolysaccharide (LPS), the carboxyl-domain of IL37-isoform B, IL37B (Q9NZH6-1) binds to SMAD3 and is transported to the nucleus where it suppresses activation of the gene expression of inflammatory cytokines. IL37D (Q9NZH6-4) also binds SMAD3 to drive the suppression LPS-induced pro-inflammatory cytokines expression. Expression of IL37 in macrophages and epithelial cell is correlated with the suppression of pro-inflammatory cytokines. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
