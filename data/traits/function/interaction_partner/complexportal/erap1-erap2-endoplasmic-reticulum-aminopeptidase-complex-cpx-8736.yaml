identifier: ComplexPortal:CPX-8736
label: "ERAP1-ERAP2 endoplasmic reticulum aminopeptidase complex"
definition: >-
  Zn2+ aminopeptidases required for peptide trimming. Generates antigenic peptides from N-terminally elongated precursors to fit them to the correct length required for presentation on MHC class I molecules May also degrade some antigenic peptides to lengths too short to allow binding onto MHC-I. Both enzymes are active as monomers however heterodimer formation could result in synergistic effects, in that ERAP1 shows a preference for hydrophbic N-terminal amino acids, ERAP2 for positively charged and also ERAP1 cleaves peptides longer than 9 amino acids, while ERAP2 can efficiently trim shorter peptides. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
