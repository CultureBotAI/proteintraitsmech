identifier: ComplexPortal:CPX-6276
label: "DNA (cytosine-5)-methyltransferase 3B complex"
definition: >-
  DNA methyltransferase, which methylates DNA by a non-cooperative or processive mechanism. Required for genome-wide de novo methylation, a major epigenetic mechanism that controls gene expression, genomic stability, and cell differentiation. Predominantly occurs at the C-5 position of cytosine within the symmetric CpG dinucleotide, affecting approximately 70-80% of the CpG sites throughout the genome. Also responsible fornon-CpG methylation (mainly CpA ) in oocytes, embryonic stem cells, and neural cells DNA. the DNMT3B–3L complex plays a role in early embryonic development and in minor satellite repeat methylation. Methylates pericentric satellite repeats and actively transcribed genes within the gene body to prevent spurious transcription initiation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
