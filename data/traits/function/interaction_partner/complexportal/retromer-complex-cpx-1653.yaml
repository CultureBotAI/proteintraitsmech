identifier: ComplexPortal:CPX-1653
label: "Retromer complex"
definition: >-
  A coat complex that mediates the recycling of transmembrane proteins from endosomes to the trans-Golgi network. Functions in endosomal membrane protein sorting and transport for endosome-to-Golgi retrieval. Involved in the retrieval of a vacuolar protein sorting VPS10 (P32319) protein, from endosome for retrograde transport to the trans-Golgi network. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
