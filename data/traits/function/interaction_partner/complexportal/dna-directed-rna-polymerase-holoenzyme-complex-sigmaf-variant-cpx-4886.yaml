identifier: ComplexPortal:CPX-4886
label: "DNA-directed RNA polymerase holoenzyme complex, SigmaF variant"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3' end of an RNA transcript. Five subunits, rpoA/alpha, rpoB/beta, rpoC/beta' and rpoZ/omega form the catalytic core. To initiate promoter specific DNA transcription, the core enzyme has to bind a sigma factor, which helps to direct the polymerase to specific promoters. rpoF transcribes genes involved in motility and flagellar synthesis including a set of the structural genes for flagella formation, and the chemotaxis genes encoding sensor of environmental signals affecting motility control. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
