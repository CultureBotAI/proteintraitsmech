identifier: ComplexPortal:CPX-26686
label: "RecQ helicase-Topo III complex"
definition: >-
  Required for the repair of a two-ended DSB, the complex may contribute to DSB end resection by facilitating the formation of a single-strand 3' overhang on which the homologous recombination (HR) factor Rad51 (P36601) filament assembles. The complex may also contribute to the unwinding of strand invasion after extension of the invading 3' end by DNA synthesis to promote DSB repair by synthesis-dependent strand annealing, as well as reversal of strand invasion prior to 3' end extension. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
