identifier: ComplexPortal:CPX-80
label: "DNA mismatch repair MutSalpha complex"
definition: >-
  Mismatch repair complex, involved in the recognition and repair of base-base and small insertion/deletion mismatches that appear as a consequence of DNA polymerase errors during DNA synthesis. MutSalpha recognizes single base mismatches and 1- or 2- nucleotide insertion or deletion mis-pairs. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
