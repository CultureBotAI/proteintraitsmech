identifier: ComplexPortal:CPX-367
label: "Cyclin Y-Cdk14 complex"
definition: >-
  Cyclin-dependent protein kinase complex which acts as a cell-cycle regulator of Wnt signaling pathway during G2/M phase. Cdk14 can be recruited to the plasma membrane via the N-terminal myristoylation site of cyclin Y where it can then phosphorylate Lrp6 (O88572) at Ser-1490, a transmembrane receptor that initiates Wnt/Beta-catenin signaling, leading to the activation of the Wnt signaling pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
