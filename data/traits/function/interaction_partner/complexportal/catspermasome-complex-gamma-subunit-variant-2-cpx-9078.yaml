identifier: ComplexPortal:CPX-9078
label: "CatSpermasome complex, gamma subunit variant 2"
definition: >-
  Sperm-specific cation channel, CatSper mediated Ca2+ signalling initiates the tyrosine phosphorylation cascade thereby controlling sperm motility. Also plays a central role in sperm chemotaxis, and mediates the Ca2+ influx induced by the steroid sex hormone progesterone in human sperm. This complex contains a variant gamma 2 subunit (CatSperg2, C6KI89), and though CatSperg1 exists, (E9Q355) the protein has not been identified in the mouse CatSper complex and its expression is not restricted to the testis. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
