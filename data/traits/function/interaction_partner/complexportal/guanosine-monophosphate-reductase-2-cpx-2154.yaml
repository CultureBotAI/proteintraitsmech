identifier: ComplexPortal:CPX-2154
label: "Guanosine monophosphate reductase 2"
definition: >-
  Plays an important role in the conversion of nucleoside and nucleotide derivatives of guanine (G) to adenine (A) nucleotides, and the maintenance of the intracellular balance between G and A nucleotides. As one of the purine salvage enzymes, GMPR catalyzes the irreversible reductive deamination of GMP to IMP (GMP + 2 H+ + NADPH => IMP + NADP+ + NH4+) and participates in the re-utilization of free intracellular bases and purine nucleosides. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
