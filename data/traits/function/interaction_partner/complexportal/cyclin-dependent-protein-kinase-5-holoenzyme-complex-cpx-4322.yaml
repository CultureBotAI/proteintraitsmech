identifier: ComplexPortal:CPX-4322
label: "Cyclin-dependent protein kinase 5 holoenzyme complex"
definition: >-
  A proline-directed serine/threonine kinase complex that functions in neuronal activities unrelated to cell-cycle progression. Regulates the axonal transport of synaptic vesicle precursors by inhibiting dynein-mediated retrograde transport In DA motor neurons. Regulates the trafficking of dense-core vesicles in DA and DB motor neurons by promoting anterograde trafficking to the axon and preventing dynein-dependent trafficking to the dendrite. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
