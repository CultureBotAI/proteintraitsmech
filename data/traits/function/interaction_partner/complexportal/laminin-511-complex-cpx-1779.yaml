identifier: ComplexPortal:CPX-1779
label: "Laminin-511 complex"
definition: >-
  Major component of basment membranes which binds to cells via a high affinity, cell-surface receptor. Role in the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. The matrix assembly and cell adhesion activity of laminin-10 is induced by the beta-3 chain short arm of laminin-5 (CPX-1774). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
