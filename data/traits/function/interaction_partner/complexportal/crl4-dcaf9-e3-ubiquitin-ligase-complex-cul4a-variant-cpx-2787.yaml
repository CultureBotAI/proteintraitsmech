identifier: ComplexPortal:CPX-2787
label: "CRL4-DCAF9 E3 ubiquitin ligase complex, CUL4A variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor WDTC1/DCAF9. The complex is active in the negative regulation of adipogenesis and fat formation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
