identifier: ComplexPortal:CPX-5763
label: "bglJ-rcsB DNA-binding transcription factor complex"
definition: >-
  Transcription factor complex regulated independently of rcsB phosphorylation status. Activates the expression of the cryptic bgl operon, required for beta-glucoside degradation, by relieving repression by H-NS (P0ACF8). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
