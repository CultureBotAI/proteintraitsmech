identifier: ComplexPortal:CPX-1976
label: "Glutamate dehydrogenase complex"
definition: >-
  Catalyses the reversible oxidative deamination of L-glutamate to alpha-ketoglutarate via oxidative deamination using NADH+ as the cofactor. Links amino acid metabolism to the tricarboxylic acid (TCA) cycle. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
