identifier: ComplexPortal:CPX-399
label: "ced-9-ced-4 complex"
definition: >-
  Complex plays a major role in programmed cell death (apoptosis), by causing the sequestration and inhibition of ced-4. egl-1 binds to and directly inhibits the activity of ced-9, releasing the cell death activator ced-4 from the ced-9-ced-4 complex and allowing ced-4 to activate the cell-killing caspase ced-3. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
