identifier: ComplexPortal:CPX-26574
label: "HIR histone chaperone complex, UBN2 variant"
definition: >-
  Histone chaperone complex which promotes nucleosome assembly. Cooperates with the ASF1A (Q9Y294) co-chaperone to deposit histone (H3/H4)2 tetramers on DNA for replication-independent chromatin assembly. It is currently believed that ASF1A delivers histone H3.3/H4 dimers to a HIRA/UBN complex, H3.3/H4 tetramerization drives the association of two HIRA/UBN subunits, and histone binding to DNA drives release of ASF1A and subsequent histone deposition. The complex regulates H3.3 deposition within transcriptionally active chromatin at genes, promoters, and enhancer elements. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
