identifier: ComplexPortal:CPX-2450
label: "UTP-A complex"
definition: >-
  Required for early co-transcriptional events in ribosome biogenesis, acting as an RNA chaperone to initiate ribosome assembly. At the earliest stages of transcription, three subunits of UTPA (UTP8, UTP9 and UTP17) bind to nascent pre-rRNA at the very 5′ end while the remaining four subunits (UTP10, UTP4, UTP5 and UTP15) interact with nucleotides further downstream in the 5'-external transcribed spacer (ETS). May also act to stimulate U3 snoRNP recruitment. A sub-unit of the small subunit (SSU) processome, a 2.2 MDa ribonucleoprotein complex involved in the processing, assembly and maturation of nascent pre-ribosomal RNA to form the small ribosomal subunit. The SSU processome is a giant particle composed of numerous ribosome assembly factors, including the UTP-A, UTP-B (CPX-2688) and MPP10 (CPX-2478) complexes, the U3 small nucleolar ribonucleoprotein (snoRNP) and many individual proteins. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
