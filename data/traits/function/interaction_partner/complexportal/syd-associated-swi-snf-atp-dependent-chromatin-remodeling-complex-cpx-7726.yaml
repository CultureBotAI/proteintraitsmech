identifier: ComplexPortal:CPX-7726
label: "SYD-associated SWI/SNF ATP-dependent chromatin remodeling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to promoters and enhancers of target genes in cells and alters chromatin structure by altering DNA-histone contacts within a nucleosome, leading eventually to a change in nucleosome position, thus facilitating or repressing binding of gene-specific transcription factors. The complex binds between the transcription start site flanking regions to the upstream distal region of protein-coding genes and lacks any known readers of active histone modifications. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
