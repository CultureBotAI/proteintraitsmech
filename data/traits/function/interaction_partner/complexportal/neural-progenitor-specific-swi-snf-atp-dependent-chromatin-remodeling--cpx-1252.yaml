identifier: ComplexPortal:CPX-1252
label: "Neural progenitor-specific SWI/SNF ATP-dependent chromatin remodeling complex, ARID1A-SMARCA2 variant"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. Also targeted to chromatin by phosphatidylinositol-4,5-bisphosphate which promotes the complex binding to actin filaments. The complex additionally interacts with a range of nuclear receptors and the vitamin D receptor (Vdr, P48281) via Smarcd subunits. The neural progenitor-specific SWI/SNF complex is critical for self-renewal, maintenance and pluripotency of neural progenitor stem cells by selectively activating or repressing its target genes. In this variant of the complex transcriptional repression is probably driven by the presence of the Arid1a subunit. During neural development a switch from a progenitor to a post-mitotic chromatin remodeling mechanism occurs as neurons exit the cell cycle and become committed to their adult state. This process requires a switch of two subunits: Actl6a is replaced by Actl6b (Q99MR0) and PHF10 replaced by Dpf1 (Q9QX66) or Dpf3 (P58269) in neuron-specific SWI/SNF complexes. The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. Although similar in function to the embryonic stem cell-specific SWI/SNF complex the composition of the neural progenitor-specific SWI/SNF complexes is more similar to the standard SWI/SNF complexes. It is likely that the two ATPases, Smarca2/Brm (this complex) and Smarca4/Brg1 (CPX-1253) do not co-occur in the same complex. Smarcd1 (Baf60a) and Smarcd3 (Baf60c) also may not co-occur. It is not clear yet if Dpf2/Baf45d (Q61103) is a member of the neural progenitor-specific SWI/SNF complex. Mutations in several subunits affect tissue and developmental processes such as nervous system and cardiac development and maintenance of pluripotency resulting in tumorigenesis or the development of intellectual disorders. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
