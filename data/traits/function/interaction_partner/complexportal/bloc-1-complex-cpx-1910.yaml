identifier: ComplexPortal:CPX-1910
label: "BLOC-1 complex"
definition: >-
  Critical for melanosome biogenesis and also implicated in neurological function and disease. Implicated in the formation and/or maturation of tubular vesicular intermediates between endosomes and lysosome-related organelles. Possible role in intracellular protein trafficking. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
