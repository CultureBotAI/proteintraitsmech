identifier: ComplexPortal:CPX-2743
label: "ATG12-ATG5-ATG16 complex"
definition: >-
  Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. May promote autophagosome formation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
