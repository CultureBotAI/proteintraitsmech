identifier: ComplexPortal:CPX-1797
label: "Integrin alpha3-beta1 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for fibronectin, laminin, collagen, epiligrin, thrombospondin and CSPG4 which its binds via the sequence R-G-D in the ligand. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
