identifier: ComplexPortal:CPX-2675
label: "Box H/ACA ribonucleoprotein complex"
definition: >-
  Pseudouridine synthesis complex that converts uridine into pseudouridine at numerous specific sites within ribosomal RNAs (rRNAs) and spliceosomal small nuclear RNAs (snRNAs), isomerizing the uridine such that the ribose is subsequently attached to C5, instead of the normal N1. Pseudouridine residues may serve to stabilize the conformation of rRNAs. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
