identifier: ComplexPortal:CPX-3055
label: "Translocon complex"
definition: >-
  Post-translationally translocates nascent proteins into the endoplasmic reticulum. The complex is composed of the SEC61 translocon complex protein-conducting channel (CPX-1833) and the tetrameric SEC62-63 complex (CPX-3056). The SEC62-63 complex plays a crucial role in targeting of the signal recognition particle-independent protein substrate to the protein-conducting channel and also in the assembly of the post-translocon complex. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
