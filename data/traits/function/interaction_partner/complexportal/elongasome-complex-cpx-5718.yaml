label: "Elongasome complex"
definition: >-
  Mediates the process of cell elongation and the maintenance of rod-shaped cell morphology by orchestrating the synthesis and insertion of peptidoglycan into the cylindrical part of the cell wall. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
