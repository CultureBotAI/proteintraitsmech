identifier: ComplexPortal:CPX-1820
label: "Integrin alphav-beta6 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for fibronectin and cytotactin. It recognizes the sequence R-G-D in its ligands. Internalisation of integrin alpha-V/beta-6 via clathrin-mediated endocytosis promotes carcinoma cell invasion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
