identifier: ComplexPortal:CPX-7884
label: "GID E3 ubiquitin ligase complex, GID10 variant"
definition: >-
  E3 ubiquitin ligase complex that triggers polyubiquitylation and subsequent proteasomal degradation of selected substrates. The complex functions as a specific N-recognin of the Pro/N-degron pathway, binding substrates with N-terminal proline residues. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
