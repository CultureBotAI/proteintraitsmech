identifier: ComplexPortal:CPX-3882
label: "daf-16-ftt-2 complex"
definition: >-
  The complex functions in the insulin-like daf-2 (Q968Y9) signaling pathway to negatively regulate the transcriptional activity of the forkhead transcription factor FOXO/daf-16 (O16850). Binding of fft-2 (Q20655) to daf-16 sequesters daf-16 to the cytoplasm. This negatively regulates the expression of daf-16 target genes which are involved in a range of processes including apoptosis, the oxidative stress response, DNA repair and metabolism. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
