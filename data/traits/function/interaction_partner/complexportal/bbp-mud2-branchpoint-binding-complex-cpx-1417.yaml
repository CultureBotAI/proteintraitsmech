identifier: ComplexPortal:CPX-1417
label: "BBP-MUD2 branchpoint-binding complex"
definition: >-
  Orchestrates spliceosome assembly by binding the intron branchpoint sequence 5-prime-UACUAAC and establishes cross intron-bridging interactions with the U1 snRNP (CPX-23) at the 5-prime splice site of an unspliced intron in an RNA transcript. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
