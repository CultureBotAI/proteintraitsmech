identifier: ComplexPortal:CPX-2027
label: "PUMA:BCL-2 complex"
definition: >-
  BH3 domain-containing PUMA interacts with and inhibits anti-apoptotic BCL-2. May act to prevent BCL-2 from sequestering BID and other pro-apoptotic molecules. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
