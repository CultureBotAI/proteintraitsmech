identifier: ComplexPortal:CPX-1731
label: "DNA replication factor C complex, CTF18 variant"
definition: >-
  DNA-dependent ATPase clamp-loader/unloader complex required for efficient establishment of chromosome cohesion during S-phase and may load or unload POL30/PCNA. During a clamp loading circle, the RFC:clamp complex binds to DNA and the recognition of the double-stranded/single-stranded junction stimulates ATP hydrolysis by RFC. The complex presumably provides bipartite ATP sites in which one subunit supplies a catalytic site for hydrolysis of ATP bound to the neighboring subunit. Dissociation of RFC from the clamp leaves the clamp encircling DNA. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
