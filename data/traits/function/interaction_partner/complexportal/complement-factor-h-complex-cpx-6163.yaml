identifier: ComplexPortal:CPX-6163
label: "Complement factor H complex"
definition: >-
  Glycoprotein complex of the alternative pathway (AP) of complement activation that discriminate between self-structures and foreign structures to maintain a well-balanced immune response by modulating complement activation. Downregulates the AP by enhancing dissociation of the C3bBb (CPX-5601) complexes and by acting as a cofactor for factor I (P05156) in proteolytic inactivation of already-deposited C3b (CPX-973). It inactivates C3b by competitively binding it thereby reducing available C3b molecules for the next factor, factor B (P00751), of the cascade. Binds to self markers such as glycan structures to prevent complement activation and amplification on self-surfaces. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
