identifier: ComplexPortal:CPX-1722
label: "Mitochondrial respiratory chain complex IV, COX5B variant"
definition: >-
  Key role in aerobic respiration, in which mitochondrial enzymes accept electrons from electron carriers reduced in glycolysis and the tricarboxylic acid cycle. A complex metalloprotein that transfers electrons from reduced cytochrome c to molecular oxygen and conserves the free energy released in this exergonic reaction by maintaining a transmembrane proton gradient which is utilized to drive the synthesis of ATP or ion transport across the membrane. The four protons consumed in the reduction of one oxygen molecule to water are taken from the mitochondrial matrix and, coupled to this reaction, four additional protons are translocated from the matrix to the intermembrane space. This variant contains subunit 5B, in place of 5a, expression of which is switched on when the O2 concentration drops below a threshold of 0.5 uM O2, and results in a cytochrome-c oxidase which has a higher turnover rate for nitric oxide production. This thought to be a positive feedback mechanism in which mitochondrially produced nitric oxide induces expression of COX5b, whose protein product then functions to enhance the ability of Cytochrome c to produce nitric oxide in hypoxic/anoxic cells. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
