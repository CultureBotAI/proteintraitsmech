identifier: ComplexPortal:CPX-2117
label: "Alkanesulfonate monooxygenase complex"
definition: >-
  An alkanesulfonate monooxygenase that catalyses the conversion of alkanesulfonates into aldehydes and sulfite under conditions of sulfate or cysteine starvation. This process absolutely requires the presences of oxygen and FMNH2, the latter is provided by the flavin oxidoreductase SsuE (CPX-2118). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
