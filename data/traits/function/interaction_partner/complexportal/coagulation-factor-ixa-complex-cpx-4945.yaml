identifier: ComplexPortal:CPX-4945
label: "Coagulation factor IXa complex"
definition: >-
  Part of the intrinsic blood coagulation pathway (contact activation pathway). When bound to factor VIIIa (CPX-929) forms the intrinsic tenase complex that cleaves Arg-|-Ile bonds of factor X (P00742) by limited proteolysis to form active factor Xa (CPX-6215) in the presence of vitamin K, Ca2+ ions, phospholipids and factor VII (P08709). The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form is activated by selective cleavage of Arg-|-Ala and Arg-|-Val bonds by limited proteolysis by factor XI (CPX-6205) to form active factor IXa. Factor VIIa-TF complex (CPX-2808) also contributes to its activation. Inhibited by antithrombin (SERPINC1, P01008). Defects in the coagulation pathway lead to hemophilia B or venous thrombosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
