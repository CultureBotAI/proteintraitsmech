identifier: ComplexPortal:CPX-3575
label: "Acetolactate synthase III complex"
definition: >-
  Catalyzes the first step that is common to the biosynthesis of branched-chain amino acids. The reaction involves the irreversible decarboxylation of pyruvate to a bound hydroxyethyl group that then condenses with either a second pyruvate molecule to form 2-acetolactate as the first step in the biosynthesis of valine and leucine. or with 2-ketobutyrate to form 2-aceto-2-hydroxybutyrate as the initial step in the biosynthesis of isoleucine. The AHAS I (CPX-3573) and AHAS III complexes are both sensitive to feedback inhibition by valine, whereas the AHAS II complex (CPX-3570) is not, enabling bacteria expressing this complex to grow in valine-rich conditions. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
