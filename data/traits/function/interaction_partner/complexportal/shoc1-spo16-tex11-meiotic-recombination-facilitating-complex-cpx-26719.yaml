identifier: ComplexPortal:CPX-26719
label: "SHOC1-SPO16-TEX11, meiotic recombination facilitating complex"
definition: >-
  Plays a key role in facilitating meiotic recombination by binding and stabilizing early recombination intermediates. Required for the elongation of the synaptonemal complex (CPX-2461). Loss-of-function mutations result in defects in the formation of crossovers and the synaptonemal complex, leading to zipper-like structures between homologous pairs and causing meiotic arrest, chromosome mis-segregation, and infertility. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
