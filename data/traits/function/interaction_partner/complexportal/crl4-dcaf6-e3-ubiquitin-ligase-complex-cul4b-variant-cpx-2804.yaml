label: "CRL4-DCAF6 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF6. The complex is active in nuclear receptor homeostasis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
