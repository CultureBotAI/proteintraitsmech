identifier: ComplexPortal:CPX-3581
label: "AMT1-3 homotrimer"
definition: >-
  High affinity ammonium transporter complex that enables the transfer of ammonium across the plasma membrane into the cell under nitrogen-deficient growth conditions. Critical for allosteric regulation of transport activity which enables plant roots to repress ammonium uptake at elevated ammonium supplies. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
