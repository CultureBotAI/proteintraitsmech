identifier: ComplexPortal:CPX-1957
label: "Integration host factor complex"
definition: >-
  Nucleoid-associated, sequence-specific DNA-binding complex that functions in genetic recombination as well as in transcriptional and translational control. Binding of IHF to the IHF-binding site of DNA (5'-(A/T)ATCAAnnnnTT(A/G)-3') causes a sharp (120-180 degree) bend in the double helix, thereby bringing towdnaA bding regions of the DNA, R1 (moderate-affinity) and R5 (low-affinity) in proximity ofeach other, and allows for the formation of the rightward filament responsible for duplex opening at the duplex unwinding element of the replication origin (oriC) by dnaA as a first step in DNA replication. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
