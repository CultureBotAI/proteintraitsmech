identifier: ComplexPortal:CPX-2119
label: "MdtABC-TolC multidrug efflux transport complex"
definition: >-
  Responsible for the transport of xenobiotics, such as drugs, out of the cell, in particular from the periplasm. Single-component efflux transporters remove toxic compounds from the cytoplasm to the periplasmic space where tolC-dependent transporters expel them from the cell. Responsible for the extrusion of xenobiotics such as novobiocin, bile salts, quinolones, fosfomycin, detergents, zinc and myricetin. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
