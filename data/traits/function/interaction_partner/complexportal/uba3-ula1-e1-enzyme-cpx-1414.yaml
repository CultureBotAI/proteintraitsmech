identifier: ComplexPortal:CPX-1414
label: "UBA3-ULA1 E1 enzyme"
definition: >-
  E1 enzyme complex that activates the Ubiquitin-like protein modifier RUB1 (Q03919) by adenylating its C-terminal glycine residue using ATP, then linking this residue to the side chain of the catalytic cysteine of UBA3 (Cys-168), yielding NEDD8-UBA3. This is conjugated by the E2 UBC12 (P52491) to a single site in the carboxyl termini of cullins, a family of hydrophobic proteins providing a scaffold for E3 ubiquitin ligases, thus modulating the E3 enzymatic activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
