identifier: ComplexPortal:CPX-6144
label: "Prefoldin co-chaperone complex, URI1 variant"
definition: >-
  Co-chaperone that works together with HSP90 in the activation and assembly of several macromolecular complexes. Together with R2TP complex (CPX-6143), POLR2E (P19388), ASDURF (L0R819) and WDR92 (Q96MX6) it forms the PAQosome complex (CPX-6145), that acts as co-chaperone as well, but with different target specificity. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
