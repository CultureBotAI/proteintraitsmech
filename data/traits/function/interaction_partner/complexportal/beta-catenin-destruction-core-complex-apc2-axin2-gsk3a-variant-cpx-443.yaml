identifier: ComplexPortal:CPX-443
label: "Beta-catenin destruction core complex, APC2-AXIN2-GSK3A variant"
definition: >-
  Phosphorylates cytoplasmic beta-catenin (CTNNB1) by CSNK1A1 and glycogen synthase kinase 3 (GSK3) in the absence of WNT-signalling, thus positively controlling its continuous proteasome-mediated degradation. CSNK1A1 phosphorylates CTNNB1 on Ser-45 and primes successive phosphorylation of Thr-41, Ser-37, and Ser-33 by GSK3. Phosphorylation of CTNNB1 promotes its subsequent ubiquitination which targets the protein for degradation by the proteasome. Without WNT, Axin is also phosphorylated by GSK3, and thereby kept in an active (‘open’) conformation for beta-catenin binding and degradation. Upon WNT stimulation, the ternary WNT-FZ-LRP6 complex is formed and recruits the scaffold protein DVL and the beta-catenin destruction complex. As a result, GSK3 is inhibited, CTNNB1 is not ubiquitinated and accumulates in the nucleus, where it acts as a coactivator for transcription factors of the TCF/LEF family, leading to activation of WNT responsive genes. GSK3A is normally excluded from the nucleus and appears to only accumulate there, and regulate CTNNB1 levels, following activation of calpain in response to calcium levels. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
