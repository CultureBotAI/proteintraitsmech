identifier: ComplexPortal:CPX-1849
label: "ATG12-ATG5-ATG16 complex"
definition: >-
  Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. Functions as an E3-like enzyme in the ATG8 conjugation system. The ATG12-ATG5-ATG16 complex targets the autophagic membrane via the ATG5-ATG16 complex moiety and then recruits an ATG3:ATG8 thioester intermediate via the interaction between ATG3 and ATG12. The ATG12-ATG5 (CPX-1848) conjugate facilitates the transfer reaction of ATG8 from ATG3 to phosphatidylethanolamine (PE) through a reorganization of the catalytic centre of the E2-like enzyme ATG3. The C-terminal glycine of ATG8 is then conjugated to the amine moiety of PE. The role of ATG16, which has no E3-like activity appears to be to target the ATG12-ATG5 conjugate to the autophagic membranes. ATG8-PE/ATG12-ATG5 complexes form homogeneous oligomers, comprising two to four subunits. ATG16 may then act to reorganize ATG8-PE/ATG12-ATG5 oligomers to form a continuous, flat protein layer with meshwork-like architecture on membranes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
