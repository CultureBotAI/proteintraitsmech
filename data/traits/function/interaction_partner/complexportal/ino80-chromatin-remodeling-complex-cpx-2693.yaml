identifier: ComplexPortal:CPX-2693
label: "INO80 chromatin remodeling complex"
definition: >-
  ATP-dependent nucleosome remodeling complex which slides mononucleosomes to a central position on a DNA template while tightly organizing nucleosomes within arrays. Functions in maintaining genome stability and removes H2AZ from nucleosomes. May play a largely repressive role in gene transcription, blocking H3K79 methylation and restricting transcription to gene units in euchromatin and away from silent regions, such as heterochromatin. Activates the expression of pluripotency factors by facilitating the recruitment of Mediator and Pol II at their promoters. Required for fork maintenance and progression in stalled replication forks. It is recruited to DNA damage sites. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
