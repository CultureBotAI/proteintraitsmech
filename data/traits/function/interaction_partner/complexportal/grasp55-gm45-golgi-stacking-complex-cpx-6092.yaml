identifier: ComplexPortal:CPX-6092
label: "GRASP55-GM45 Golgi stacking complex"
definition: >-
  Peripheral membrane complex that plays a key role in Golgi stacking. Each Golgi stack is formed by five to eight tightly aligned flattened cisternae, GRASP55-GM45 forms mitotically regulated trans-oligomers that act to hold adjacent Golgi cisternae into a stack, in particular the medial-trans-cisternae-Golgi network, which contain glycosylation enzymes and process cargo proteins and lipids. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
