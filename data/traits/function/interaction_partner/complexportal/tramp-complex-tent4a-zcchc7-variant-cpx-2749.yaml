identifier: ComplexPortal:CPX-2749
label: "TRAMP complex, TENT4A-ZCCHC7 variant"
definition: >-
  Recognises and binds to splicing-defective pre-mRNAs and spliced-out introns leading to their rapid degradation by the nuclear exosome (CPX-476, CPX-591). Adds a short oligo(A) tail to the RNA which is assumed to make it a better substrate for 3'-end degradation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
