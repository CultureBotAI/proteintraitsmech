identifier: ComplexPortal:CPX-9941
label: "MutLabeta endonuclease complex"
definition: >-
  Endonuclease complex which nicks a DNA strand containing a pre-existing nick, presumably to provide an entry site for a mispair excision reaction. Required for DNA mismatch repair (MMR), correcting base-base mismatches and insertion-deletion loops resulting from DNA replication, DNA damage or from recombination events between non-identical sequences during meiosis. ATP binding induces a conformational change in the MutSalpha/MSH2-MSH6 (CPX-80) and MutSbeta/MSH2-MSH3 (CPX-77) complexes which converts these to a clamp form that slides along the DNA and leads to recruitment of MutLalpha/MLH1-PMS2 (CPX-9901), MutLbeta/MLH1-PMS1 and MutLgamma/MLH1-MLH3 (CPX-9961). MutLbeta appears to function in repair of single base pair mismatches and small insertion/deletion mispairs. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
