identifier: ComplexPortal:CPX-2932
label: "Hemoglobin HbF Variant 1 complex"
definition: >-
  Fetal hemoglobin (HbF) complex is expressed in the fetal liver from around 9 weeks gestation until 4-5 week after birth. It can be detected for up to 6 months after birth. Binds and transports oxygen and carbon dioxide to/from the peripheral tissues. It replaces embryonic hemoglobins Gower-1 (CPX-2928) and hemoglobin HbE (Gower-2) (CPX-2927). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
