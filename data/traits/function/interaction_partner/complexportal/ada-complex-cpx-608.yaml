identifier: ComplexPortal:CPX-608
label: "ADA complex"
definition: >-
  Chromatin remodelling complex that primarily acetylates nucleosomal histones H3 and H2B. May not participate directly in transcription. ADA2 is thought to potentiate GCN5 catalytic activity and ADA3 to facilitate nucleosomal acetylation and an expanded lysine specificity. Shares the HAT module of ADA2-GCN5-NGG1-SGF29 with the related SAGA complex (CPX-656). A curated stable macromolecular complex (Complex Portal) with 6 subunits.
