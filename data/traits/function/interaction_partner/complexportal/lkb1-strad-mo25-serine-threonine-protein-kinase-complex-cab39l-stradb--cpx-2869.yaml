identifier: ComplexPortal:CPX-2869
label: "LKB1-STRAD-MO25 serine/threonine protein kinase complex, CAB39L-STRADB variant"
definition: >-
  Directly phosphorylates adenosine monophosphate-activated protein kinase (AMPK) family members on the T-loop thereby activating them. Couples cellular growth and division to the availability of cellular energy. by activating the AMP kinases when energy levels are low, inhibiting signalling pathways that promote proliferation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
