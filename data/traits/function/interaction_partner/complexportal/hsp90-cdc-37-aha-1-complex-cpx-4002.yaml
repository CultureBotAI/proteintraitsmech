identifier: ComplexPortal:CPX-4002
label: "Hsp90-cdc-37-aha-1 complex"
definition: >-
  A chaperone complex that may be required for the proper folding, maturation and stabilization of target protein. Most likely plays a role in the maturation of protein kinases. Aha-1 has a strong affinity for Hsp90/daf-21, and aha-1 binding to the Hsp90-cdc37 complex relieves ATPase hydrolysis inhibition and eventually displaces cdc-37. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
