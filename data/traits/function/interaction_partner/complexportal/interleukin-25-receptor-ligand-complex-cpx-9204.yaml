identifier: ComplexPortal:CPX-9204
label: "Interleukin-25 receptor-ligand complex"
definition: >-
  Pro-inflammatory cytokine receptor which plays a key role in both adaptive and innate immunity. TRAF3IP2 polyubiquitinates TRAF6 (Q9Y4K3) leading to the recruitment of downstream molecules and the activation of NF-KB and the mitogen-activated protein kinase (MAPK) pathways. Expressed by CD4+ type 17 helper cells and Tc17 cells, IL17 is also produced by several innate immune cells. IL25 binds only to IL17RB but requires the IL17RA:IL17RB receptor complex to mediate its effects. Unrestrained IL17 signalling is associated with autoimmune diseases and cancer progression, but it is also crucial for protection from fungal and bacterial infections, including the commensal Candida albicans and Klebsiella pneumoniae. Both IL25 and IL17B promote IL33-driven (O95760) type 2 immune responses, but perform contradictory roles in colitis; IL25 is pathogenic and IL17B is protective. IL17B is thought to inhibit IL25 binding to IL17RA:IL17RB expressed on epithelial cells thereby limiting IL25 induced IL6 (P05231) production by colonic epithelial cells. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
