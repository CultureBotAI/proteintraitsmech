identifier: ComplexPortal:CPX-2187
label: "Acetylcholine receptor, alpha1-beta1-gamma-delta"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to achetylcholine. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron and ultimately producing muscle contractions. Mediates fast, short-lived synaptic transmission of neurotransmitters. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
