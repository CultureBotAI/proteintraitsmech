identifier: ComplexPortal:CPX-7675
label: "LINC complex, SUN1-SYNE4 variant"
definition: >-
  Forms immediately below the outer nuclear membrane and traverses the nuclear envelope to mechanically couple cytoskeletal and nuclear components across the nuclear envelope, allowing the transmission of force. SYNE4 interacts with the motor protein kinesin and consequently, with the microtubule network. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
