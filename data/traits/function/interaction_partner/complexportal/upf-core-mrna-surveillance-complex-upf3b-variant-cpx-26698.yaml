identifier: ComplexPortal:CPX-26698
label: "UPF core mRNA surveillance complex, UPF3B variant"
definition: >-
  Core effector and catalytic module in nonsense-mediated decay (NMD), an mRNA surveillance pathway that recognizes and degrades transcripts harboring premature termination codons (PTCs). Interaction with the exon-junction complex (EJC) enhances the efficiency of PTC recognition by coupling translation termination to UPF1 activation. This activation promotes the recruitment of mRNA decay factors that mediate deadenylation, decapping, and exonucleolytic degradation of aberrant transcripts. UPF3 paralogs, UPF3A/UPF3B act in a cross-regulatory feedback circuit, buffering NMD in response to environmental and genetic perturbations. UPF3A (Q9H1J1) and UPF3B competitively bind UPF2; UPF3B, activates NMD while UPF3A is generally a less potent activator of NMD, except in cells lacking UPF3B. This mechanism extends to cell type-specific control of NMD by being differentially engaged in the complex across cell types. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
