identifier: ComplexPortal:CPX-25736
label: "SMC5-SMC6 SUMO ligase complex"
definition: >-
  SUMO ligase complex with a role in homologous recombination (HR) and replication. Required for chromosome segregation at repetitive sequences. Localizes to repetitive elements such as the rDNA and telomeres where is is thought to promote and resolve HR-dependent intermediates using ATP-hydrolysis to symmetrically reel DNA into loops. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
