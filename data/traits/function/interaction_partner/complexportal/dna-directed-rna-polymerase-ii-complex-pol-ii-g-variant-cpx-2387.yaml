identifier: ComplexPortal:CPX-2387
label: "DNA-directed RNA polymerase II complex, Pol II(G) variant"
definition: >-
  Catalyzes the transcription of RNA from a DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3' end of an RNA transcript. Synthesizes precursors of mRNAs, and most snRNA and microRNAs. In the absence of Mediator, Pol II(G), unlike Pol II, inhibits transcription. During a transcription cycle, Pol II, general transcription factors and the mediator complex (CPX-3227) assemble as the preinitiation complex (PIC) at the promoter. 11-15 base pairs of DNA surrounding the transcription start site are melted and the single-stranded DNA template strand of the promoter is positioned deeply within the central active site cleft of Pol II to form the open complex. After synthesis of about 30 bases of RNA, Pol II releases its contacts with the core promoter and the rest of the transcription machinery (promoter clearance) and enters the stage of transcription elongation in which it moves on the template as the transcript elongates. Pol II appears to oscillate between inactive and active conformations at each step of nucleotide addition. The formation of PolII(G) by the binding of POLR2M represses RNA polymerase II function by preventing TFIIF (CPX-79) and TFIIB (CPX-2398) from binding to Pol II, which contributes to the maintenance of Pol II an inactive state in the absence of Mediator. POLR2M and TFIIF associate with Pol II in a mutually exclusive manner, thus the formation of Pol II(G) prevents TFIIF from binding and leads to inhibition of PIC assembly. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
