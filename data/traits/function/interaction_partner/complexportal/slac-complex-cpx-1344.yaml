identifier: ComplexPortal:CPX-1344
label: "SLAC complex"
definition: >-
  Regulates actin polymerization during clathrin-mediated endocytosis. Complex formation inhibits the Arp2/3 nucleation-promoting factor activity of LAS17 and maintains it in an inactive state during the last 20 seconds of the immobile phase of endocytosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
