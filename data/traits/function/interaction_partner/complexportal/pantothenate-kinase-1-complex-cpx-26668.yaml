identifier: ComplexPortal:CPX-26668
label: "Pantothenate kinase 1 complex"
definition: >-
  Critical regulator of intracellular levels of coenzyme A (CoA). Catalyzes the first and rate-limiting step in CoA biosynthesis by phosphorylating pantothenate to produce 4′-phosphopantothenate. The biosynthesis of CoA from pantothenate involves five universally conserved steps. First, pantothenate is phosphorylated by a pantothenate kinase (this complex, see also CPX-26669, CPX-26670). In the second step, 4′-phosphopantothenate is conjugated with cysteine by phosphopantothenoylcysteine synthetase (see CPX-26667). The resulting intermediate is then converted to 4′-phosphopantetheine by phosphopantothenoylcysteine decarboxylase (see CPX-26563). The final two steps are catalyzed by phosphopantetheine adenylyltransferase (COASY, Q13057), which adenylates 4′-phosphopantetheine to form dephospho-CoA, followed by phosphorylation of dephospho-CoA by dephospho-CoA kinase (also COASY) to yield the final CoA product. Complex is expressed in liver, kidney, and heart tissues, and its expression is key to controlling the cellular level of CoA. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
