identifier: ComplexPortal:CPX-1787
label: "Nem1-Spo7 phosphatase complex"
definition: >-
  Phosphatase complex with an essential role in formation of a spherical nucleus and meiotic division. Dephosphorylates PAH1 (P32567), a critical factor in coordinating phospholipid biosynthesis at the nuclear/ER membrane with nuclear growth during the cell cycle. NEM1-SPO7-mediated regulation of membrane biogenesis is required to promote mitophagy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
