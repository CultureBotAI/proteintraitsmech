identifier: ComplexPortal:CPX-1045
label: "ERV41-ERV46 retrograde receptor complex"
definition: >-
  Transporter complex that recognises, binds and returns endoplasmic reticulum (ER) resident proteins that have trafficked to Golgi compartments. Targets proteins lacking the HDEL motif recognised by COPI-coated vesicles. Transported back to the Golgi by COPII (CPX-2523) for the next round of retrograde transport. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
