identifier: ComplexPortal:CPX-3401
label: "Interleukin-17-like receptor complex"
definition: >-
  Interleukin-17 (IL-17) related receptor complex, which upon activation acts as a modulator of neuronal activity. Binding of the ligand ilc-17.1 (Q22687) to the receptor complex triggers a signalling cascade that increases neuronal activity in RGM interneurons in response to input from oxygen-sensing neurons, and leads to increased animal movement and aggregation behaviour. Actl-1 (Q18008) may function as an adaptor for the complex to allow for further downstream signalling. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
