identifier: ComplexPortal:CPX-6097
label: "Luteinizing hormone complex"
definition: >-
  Glycoprotein hormone synthesized and secreted by gonadotropic cells in the anterior pituitary gland. An acute rise in levels of LH triggers ovulation and development of the corpus luteum in females. In males, it stimulates Leydig cell production of testosterone. It acts synergistically with the follicle-stimulating hormone complex (CPX-665). A member of the family of pituitary glycoprotein hormones that play key roles in human fertility. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
