identifier: ComplexPortal:CPX-26628
label: "Fatty acid synthase complex"
definition: >-
  Catalyzes the synthesis of the 16-carbon saturated fatty acid palmitate from acetyl-Coenzyme A (acetyl-CoA) and malonyl-CoA, in the presence of NADPH. Complex is a key component in de novo lipogenesis (DNL), a process essential in mammals to produce fatty acids for membrane formation, energy storage, cell signalling and protein modifications. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
