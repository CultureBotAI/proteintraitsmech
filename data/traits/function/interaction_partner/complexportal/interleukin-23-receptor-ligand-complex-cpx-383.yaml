identifier: ComplexPortal:CPX-383
label: "Interleukin-23 receptor-ligand complex"
definition: >-
  Receptor complex that activates and stimulates proliferation of a wide range of lymphocytes, in particular memory T cells and Th17 cells. The IL23 ligand complex (CPX-3290) binds the receptors chains IL12RB1 and IL23R which are associated with the kinases TYK2 and JAK2, respectively. Transphosphorylation of IL23R and the JAK-family kinases initiates the JAK-STAT signaling cascade via phosphorylation and heterodimerisation of STAT3 and STAT4 (P40763/Q14765). This ultimately leads to the activation of transcription of interferon-gamma or Interleukin-17. Associated with the pathogenesis of autoimmune inflammations, including rheumatoid and Lyme arthritis, multiple sclerosis, psoriasis, and inflammatory bowel disease as well as mycobacterial diseases of varying severity, primarily bacillus Calmette-Guerin and Salmonella infections. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
