identifier: ComplexPortal:CPX-1040
label: "SKI complex"
definition: >-
  Central component of the 3'-5' cytoplasmic mRNA degradation pathway which interacts with Ski7 (Q08491) to mediate degradation by the exosome. The Ski complex appears to thread RNAs directly to the exosome, coupling the helicase and the exoribonuclease through a continuous RNA channel. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
