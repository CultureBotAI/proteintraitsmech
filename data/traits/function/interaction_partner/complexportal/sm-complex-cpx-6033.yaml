identifier: ComplexPortal:CPX-6033
label: "Sm complex"
definition: >-
  Essential role in pre-mRNA splicing. Form a heteroheptameric complex on binding to a conserved Sm site [consensus AU(4-6)G] found in single-stranded regions of U1, U2, U4 and U5 snRNAs. U1, U2, U4 and U5 snRNAs are produced in the nucleus by RNA polymerase II and exported to the cytoplasm, where the Sm proteins bind to them and promote the hypermethylation of the N7-monomethyl guanosine cap at their 5'-ends, to produce the 2,2,7-trimethyl guanosine cap structure. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
