identifier: ComplexPortal:CPX-141
label: "ANXA2-PCSK9 complex"
definition: >-
  The formation of the AnxA2-PCSK9 complex reduces the degradation of the LDLR (low density lipoprotein receptor, P35951), leading to increased clearance of LDLs (low density lipoproteins) in plasma. This activity opposes that of a closely related complex the LDLR-PCSK9 complex CPX-129. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
