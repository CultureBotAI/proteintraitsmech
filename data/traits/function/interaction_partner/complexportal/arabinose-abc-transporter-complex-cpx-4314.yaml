identifier: ComplexPortal:CPX-4314
label: "Arabinose ABC transporter complex"
definition: >-
  High-affinity arabinose transporter, also transports fructose and xylose. Member of the ATP-binding cassette (ABC) transporter family, prokaryote-type (PK-type) subfamily. Transcription of the araFGH operon is positively regulated by the AraC protein (P0A9E0) in the presence of arabinose and cAMP bound to a cAMP receptor protein. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
