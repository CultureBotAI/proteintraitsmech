identifier: ComplexPortal:CPX-3382
label: "Anaphase-promoting complex"
definition: >-
  APC, a key regulator of cell cycle progression, is a conserved E3 ubiqutin ligase which facilitates multiubiqutination of cell cycle proteins, including cyclins, so marking them for proteasomal destruction. Generally believed that APC acts as a scaffold that brings E2 enzymes and substrates into close proximity. APC activity is required for metaphase-anaphase transition, mitotic exit, G1 phase and DNA replication. Acts by mediating the ubiquitination and subsequent degradation of target proteins. Has a developmental role in early embryogenesis and the metaphase to anaphase transition in oocyte and spermatocyte meiosis and mitosis in germ cells. Required for embryonic anterior-posterior axis formation. Involved in regulating GABA neurotransmitter release at neuromuscular junctions in GABA motor neurons. In particular, targets the inactive phosphatase egg-3, a component of the Egg-3/4/5 MBK-2 complex (CPX-3381), which is involved in oocyte-to-zygote transition, for degradation by the proteasome during meiotic divisions. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
