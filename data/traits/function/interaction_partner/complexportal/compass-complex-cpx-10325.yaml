identifier: ComplexPortal:CPX-10325
label: "COMPASS complex"
definition: >-
  Histone methyltransferase that catalyzes methylation of Lys-4 of histone H3 and thus controls the silencing of telomeric regions. Recruited to the 5' transcriptional start site of actively transcribed genes and associates with transcription elongation machinery responsible for mono-, di- and tri-methylation on H3K4. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
