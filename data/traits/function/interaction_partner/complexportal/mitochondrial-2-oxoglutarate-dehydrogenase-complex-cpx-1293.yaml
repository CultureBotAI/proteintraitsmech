identifier: ComplexPortal:CPX-1293
label: "Mitochondrial 2-oxoglutarate dehydrogenase complex"
definition: >-
  Catalyzes the oxidative decarboxylation of alpha-ketoglutarate to succinyl-CoA, NADH and CO2. Succinyl-CoA is then converted to succinate by succinyl-CoA synthetase or used as a substrate in heme biosynthesis. Acts as a major site of reactive oxygen species generation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
