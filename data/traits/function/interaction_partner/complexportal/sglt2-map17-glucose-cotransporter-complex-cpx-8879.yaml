identifier: ComplexPortal:CPX-8879
label: "SGLT2-MAP17 glucose cotransporter complex"
definition: >-
  Na+-coupled sugar simporter that actively transports D-glucose at the plasma membrane and is responsible for reabsorption of glucose in the kidney proximal tubules after filtration through the glomerulus. SGLT2/SLC5A2 binds a single Na2+ ion and undergoes a resulting conformational change which enablies the protein to bind one sugar molecule. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
