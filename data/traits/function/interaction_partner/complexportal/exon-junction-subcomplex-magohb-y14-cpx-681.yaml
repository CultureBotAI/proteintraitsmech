identifier: ComplexPortal:CPX-681
label: "Exon junction subcomplex Magohb-Y14"
definition: >-
  Component of the exon-junction complex (EJC, CPX-635) that is formed in the nucleus and exported to the cytoplasm as part of the mature messenger ribonucleoprotein particle. Binding of the EJC key regulator Pym1 (Q8CHP5) to Magohb-Y14 in the cytoplasm triggers disassembly of the EJC. Magohb-Y14 complex remains bound in the same position on the spliced mRNA and requires translation of the mRNA for removal. When interacting with Pym1, associates with mRNA-degradation factors, including the mRNA-decapping complex and exoribonucleases and may play a role in preventing mRNA degradation during mRNA biogenesis. This complex itself does not bind RNA. Binding to Ipo13 (Q8K0C1) leads to import back into the nucleus prior to reassembly of the EJC. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
