identifier: ComplexPortal:CPX-3801
label: "Caspase-9 complex"
definition: >-
  A cysteine protease complex that is an apical protease of the intrinsic apoptosis pathway. Generates the active forms of Caspases-3 (CPX-3803) and Caspase-7 (CPX-3947) by limited proteolysis, and thereby transmit the apoptotic signal to the execution phase. Caspase-9 is mostly active as part of a multicomponent complex known as the apoptosome (CPX-3824), however it has residual catalytic activity on its own. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
