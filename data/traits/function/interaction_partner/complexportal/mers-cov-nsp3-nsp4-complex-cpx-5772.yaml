identifier: ComplexPortal:CPX-5772
label: "MERS-CoV NSP3-NSP4 complex"
definition: >-
  Complex of the MERS coronavirus involved in inducing rearrangement of the host membranes to form double-membrane vesicles which may form a framework for viral genome replication by localizing and concentrating the necessary factors and possibly providing protection from host cell defenses. The multi-spanning transmembrane domains in nsp3 and nsp4 may serve as a scaffold for the assembly of the membrane-associated replication/transcription complex (RTC), a large multisubunit assembly that is comprised of more than a dozen proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
