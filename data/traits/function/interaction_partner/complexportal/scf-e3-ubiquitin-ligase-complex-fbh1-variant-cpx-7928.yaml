identifier: ComplexPortal:CPX-7928
label: "SCF E3 ubiquitin ligase complex, FBH1 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBH1 target proteins include the constitutively active protein kinase GSK3B (P49841) thus regulating WNT/CTNNB1 signaling. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
