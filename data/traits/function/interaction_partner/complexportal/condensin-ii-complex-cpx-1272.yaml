identifier: ComplexPortal:CPX-1272
label: "Condensin II complex"
definition: >-
  Involved in chromosome condensation and segregation, both in meiosis and mitosis. Specifically, plays a role in prophase chromosome condensation and organization, where the complex concentrates on chromosomes when condensation initiates at prophase, and anaphase segregation. Almost exclusively found in the nucleus where it assembles in alternating pattern with Condensin I complex (CPX-1271) along metaphase chromosomes with fully resolved sister chromatids. During meiosis, localizes within the core of meiotic sister chromatids. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
