identifier: ComplexPortal:CPX-6596
label: "bZIP transcription factor complex, ATF6B-ATF6B"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. ATF6 is a master regulator of one of the three main branches of the endoplasmic reticulum (ER) unfolded protein response, regulating numerous genes that restore ER protein-folding capacity, after which it is rapidly degraded. ATF6B can bind to and transcriptionally induce many of the same genes as ATF6 (P18850-PRO_0000296200), but is a much weaker transcriptional activator and may primarily act as a modulator of ATF6. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
