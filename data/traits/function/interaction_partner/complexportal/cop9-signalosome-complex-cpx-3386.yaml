identifier: ComplexPortal:CPX-3386
label: "COP9 signalosome complex"
definition: >-
  Essential regulator of the ubiquitin (Ubl) conjugation pathway by mediating the deneddylation of the cullin subunits of SCF-type E3 ligase complexes. This leads to decreased Ubl ligase activity of SCF-type complexes. Mediates the deneddylation of the cullin cul-3 (Q17391), which leads to the targeting of mei-3/katanin (P34808) for degradation at the meiosis to mitosis transition. Plays an essential role in embryogenesis and oogenesis and is required to regulate microtubule stability in the early embryo. The complex localises to the cytoplasm during mitosis, and to the nucleus during interphase of early embryos. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
