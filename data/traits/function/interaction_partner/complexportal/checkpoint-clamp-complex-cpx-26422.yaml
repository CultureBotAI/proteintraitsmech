identifier: ComplexPortal:CPX-26422
label: "Checkpoint clamp complex"
definition: >-
  Enables the DNA repair pathways to restore the integrity of the DNA prior to DNA synthesis or separation of the replicated chromosomes. In response to genotoxic damage, the 9-1-1 complex is loaded around DNA by the Rad17-containing clamp loader. The DNA-bound 9-1-1 complex then facilitates ATR-mediated phosphorylation and activation of chk1 (O61661), a protein kinase that regulates S-phase progression, G2/M arrest, and replication fork stabilization. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
