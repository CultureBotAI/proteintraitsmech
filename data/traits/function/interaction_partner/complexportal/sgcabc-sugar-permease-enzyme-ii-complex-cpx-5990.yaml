identifier: ComplexPortal:CPX-5990
label: "sgcABC sugar permease enzyme II complex"
definition: >-
  Involved in the transport of sugars across the cell membrane as part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS). A phosphoryl group is transferred from hpr (P0AA04) to sgc (IIA), from sgcB to srlE (IIB) and finally from sgcB onto the incoming sugar bound to membrane-embedded sgcC (IIC). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
