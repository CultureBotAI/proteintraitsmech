identifier: ComplexPortal:CPX-2752
label: "Poly(A) tail exosome targeting complex, RBM27 variant"
definition: >-
  Recognises and binds to splicing-defective pre-mRNAs and spliced-out introns leading to their rapid degradation by the nuclear exosome (CPX-476, CPX-591). Adds a short oligo(A) tail to the RNA which is assumed to make it a better substrate for 3'-end degradation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
