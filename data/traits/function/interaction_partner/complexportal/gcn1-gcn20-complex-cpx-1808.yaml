identifier: ComplexPortal:CPX-1808
label: "GCN1-GCN20 complex"
definition: >-
  Functions on translating ribosomes to promote binding of uncharged tRNA to the A-site or in the transfer of uncharged tRNA from the A-site to the histidyl-tRNA synthetase (HisRS)-like domain in GCN2 for kinase activation. It is thus required for activation of GCN2 and the consequent induction of GCN4 translation in amino acid-starved cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
