identifier: ComplexPortal:CPX-2745
label: "ATG1 protein kinase complex"
definition: >-
  Central regulator of autophagy initiation. Essential for recruitment of Atg proteins to the pre-autophagosomal structure, the putative site for autophagosome formation, under starvation condition, resulting in the sequestration of cytoplasmic proteins and organelles for bulk degradation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
