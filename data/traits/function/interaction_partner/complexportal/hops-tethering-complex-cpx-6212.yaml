identifier: ComplexPortal:CPX-6212
label: "HOPS tethering complex"
definition: >-
  Multisubunit tethering complex involved in endo-lysosomal vesicle trafficking and lysosome biogenesis by cross-linking two membranes, and facilitating the formation of a SNARE complex during fusion. Required for the delivery of vacuolar proteins and homotypic fusion of vacuoles and controls the clearance of late endosomes and autophagosomes during heterophagy and autophagy through promoting fusion of these vesicles with the vacuole. Interacts with Rab GTPases RAB7 (P51149 and Q96AH8). Possibly attaches endosomes to the cytoskeleton and required for the fusion of lysosomes with late endosomes and autophagosomes. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
