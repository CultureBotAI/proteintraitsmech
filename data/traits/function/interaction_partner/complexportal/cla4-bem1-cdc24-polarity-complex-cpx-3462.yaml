identifier: ComplexPortal:CPX-3462
label: "CLA4-BEM1-CDC24 polarity complex"
definition: >-
  Required for the establishment of cell polarity during the cell division cycle, and essential for bud emergence. Binds directly to activated CDC42 GTPase and is required for orchestrating a cellular gradient of CDC42. The complex assembles in late G1 and BEM1 directly augments the guanine exchange factor (GEF) activity of CDC24, promoting the exchange of CDC42-bound GDP with GTP. BEM1 also increases CDC24 phosphorylation by CLA4. Phosphorylation inhibits scaffold-dependent stimulation of CDC24 GEF activity, thus BEM1 stimulates GEF activity in a reversible fashion, controlling the flux of cellular signalling through CDC42. The core circuit appears to be a positive feedback loop with GTP-CDC42 at the membrane recruiting the complex from the cytoplasm to promote activation of neighbouring CDC42. A corresponding negative feedback loop appears to ensure only one bud forms. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
