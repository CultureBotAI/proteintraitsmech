identifier: ComplexPortal:CPX-805
label: "MORF2 histone acetyltransferase complex"
definition: >-
  Regulates chromatin modification and structure via histone acetylation. The MORF2 complex is a histone H4-specific acetyltransferase which acetylates free histones H3, H4, H2A and H2B and has been shown to control expression of HOX genes. The complex is a strong co-activator of the RUNX transcription factors, the master regulators of hematopoiesis and is required for the development and maintenance of hematopoietic stem cells. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
