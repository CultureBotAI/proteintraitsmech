identifier: ComplexPortal:CPX-6164
label: "Complement factor I-H-C3b complex"
definition: >-
  Serine-type endopeptidase complex of the alternative pathway (AP) of complement activation that maintains a well-balanced immune response by modulating complement activation. Downregulates the AP by proteolytically inactivating fluid-phase and already-deposited C3b (CPX-973). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
