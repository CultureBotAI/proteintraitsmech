identifier: ComplexPortal:CPX-1125
label: "BUG1-GRH1 complex"
definition: >-
  Appears to play a role in the tethering of COPII (CPX-2523), though an interaction with Sec23/24, and thus formation of the cis-Golgi and endoplasmic reticulum to Golgi vesicle-mediated transport. The complex is anchored to membranes through an acetylated amino-terminal region in Grh1. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
