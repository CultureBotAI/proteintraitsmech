identifier: ComplexPortal:CPX-8691
label: "Nax cation channel complex, SCN2B-SCN3B variant"
definition: >-
  Ion channel that may be non-selective for monovalent cations, inhibited by extracellular calcium, and sensitive to classical NaV channel blockers, such as tetrodotoxin. May play a role as a Ca2+-modulated Na+ leak channel. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
