identifier: ComplexPortal:CPX-847
label: "TMEM219-Interleukin-13 decoy-receptor-ligand alpha 2 complex"
definition: >-
  Transmembrane receptor complex. IL13RA2 was initially considered solely as a decoy receptor which elicited IL13 antagonistic responses, because of its short cytoplasmic tail. However, the phosphorylation of a Tyr-369 allows for the recruitment of phosphatases and kinases enabling IL13-mediated IL13RA2 signalling to occur via STAT6 (P42226) independent pathways. This leads to the subsequent activation of the activator protein 1 (AP-1) complex composed of proteins from the FOS (P01100), JUN (P05412), ATF and JDP families as well as the extracellular signal-related kinase (ERK1/2) to promote tumour invasion, metastasis, and fibrosis through the production of TGFB1 (P01137). TMEM219 facilitates IL13 and IL13RA2 binding and enhances the role of IL13RA2 as mostly, a decoy receptor. IL13RA2 also forms a complex with Chitinase-3-like protein 1 (CHI3L1, P36222) and TMEM219 (CPX-9184). IL13RA2 N-glycosylation is a critical determinant of whether it binds CHI3L1 or IL13; IL13 binding to IL13RA2 is dependent on each of four sites of N-glycosylation in IL13RA2, with increased N-glycosylation resulting in increased IL13 binding and signalling. The over-expression of IL13RA2 in the epidermal and dermal compartments in skin lesions of patients with atopic dermatitis suggests that it attenuates IL13 mediated inflammatory responses. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
