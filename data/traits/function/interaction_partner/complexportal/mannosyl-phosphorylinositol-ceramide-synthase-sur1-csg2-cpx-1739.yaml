identifier: ComplexPortal:CPX-1739
label: "Mannosyl phosphorylinositol ceramide synthase SUR1-CSG2"
definition: >-
  Catalyzes the addition of mannosyl to phosphorylinositol ceramide, and essential step in the synthesis of mannosylinositol phosphorylceramide. Function in the Golgi. Preferentially active against IPC-B and IPC-C in comparison with Mannosyl phosphorylinositol ceramide synthase CSH1-CSG2 (CPX-1740). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
