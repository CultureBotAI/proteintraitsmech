identifier: ComplexPortal:CPX-3280
label: "Cardiac Troponin complex"
definition: >-
  Regulates contraction-relaxation cycles in response to changes in intracellular calcium. Together with tropomyosin, cTn is generally located along polymerised actin, which forms the backbone of the cardiomyocyte thin filament. At resting levels of intracellular calcium, the cTn complex keeps tropomyosin in a position that prevents force-producing interactions between myosin heads and actin. When the muscle cell is stimulated to contract by an action potential, calcium channels open in the sarcoplasmic membrane and release calcium into the sarcoplasm. Some of this calcium binds to specific sites in the N-domain of TnC, triggering a series of protein structural changes and tropomyosin is rolled away from myosin-binding sites on actin, allowing myosin to attach to the thin filament and produce force and/or shorten the sarcomere of the cardiomyocyte. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
