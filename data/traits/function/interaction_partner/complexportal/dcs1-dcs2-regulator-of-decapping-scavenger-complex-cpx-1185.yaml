identifier: ComplexPortal:CPX-1185
label: "DCS1-DCS2 regulator of decapping scavenger complex"
definition: >-
  m7G(5')pppN diphosphatase with a kcat/KM value that is significantly lower than that of the Decapping Scavenger complex, DCS1 (CPX-1179) and has almost lost the preference for m7GpppG as a substrate shown by the homodimer. Degrades the 5' mRNA cap, releasing m7GMP, when the cap is no longer attached to the mRNA body but rather within short capped mRNA fragments that are generated from 3' to 5' mRNA decay. DCS2 is only expressed by the cell under conditions of diauxic stress, and the formation of this complex may allow the cell to change the distribution and relative activities of the mRNA decay pathways in the stationary phase cell. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
