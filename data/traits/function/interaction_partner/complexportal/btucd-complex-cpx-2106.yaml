identifier: ComplexPortal:CPX-2106
label: "BtuCD complex"
definition: >-
  Core subunit of the cobalamin transport complex containing the transmembrane homodimer BtuC and the cytoplasmic ATPase homodimer BtuD. Requires the binding of cobalamin (vitamin B12)-bound subunit BtuF to bind to the periplasmic site of the transmembrane subunit in order to transport cobalamin through the periplasmic membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
