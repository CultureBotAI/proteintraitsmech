label: "Urease activation complex"
definition: >-
  Facilitates the activation of urease. Involves the channeling of two nickel ions into the active site of urease. UREG is crucial for nickel delivery during urease activation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
