identifier: ComplexPortal:CPX-2421
label: "DNA polymerase delta complex"
definition: >-
  Believed to be the major polymerase for the elongation of both leading and lagging strands of chromosomal DNA in eukaryotic cells duringDNA synthesis. A multi-subunit enzyme in which PolD1 encodes the catalytic subunit with polymerase and 3'-5' exonuclease proofreading activities. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
