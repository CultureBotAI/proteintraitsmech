identifier: ComplexPortal:CPX-3170
label: "cdm-RanGTP complex"
definition: >-
  A protein complex that has a role in the transport of proteins and RNAs in and out of the nucleus. Complex forms in the nucleus upon Ran-GTP binding to the cdm component of the nuclear import complex cdm-mago-Y14 (CPX-3171) and causes release of mago-Y14 (mago-tsu) (CPX-3100) for another round of messenger ribonucleoprotein (mRNP) incorporation. cdm translocates back into the cytosol for another round of cdm-mago-Y14 complex formation. The mago-Y14 heterodimer shuttles between the nucleus, where it is loaded onto specific mRNAs, and the cytoplasm and functions in translational regulation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
