identifier: ComplexPortal:CPX-6266
label: "Fanconi anemia FANCM-FAAP24-MHF anchoring complex"
definition: >-
  Required for the repair of DNA interstrand crosslinks (ICL) and related lesions. Recognizes different DNA structures, and recruits the Fanconi anemia ubiquitin ligase complex (CPX-6263) and other core Fanconi anemia pathway proteins to ICL sites. ICL repair is activated when a replication fork stalls at an ICL. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
