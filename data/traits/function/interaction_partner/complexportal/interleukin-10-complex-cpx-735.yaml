identifier: ComplexPortal:CPX-735
label: "Interleukin-10 complex"
definition: >-
  The founding member of a family of nine cytokines that also includes IL-20 and its subfamily members IL-19, IL-22, IL-24, IL-26, and the distantly related IL-28A, IL-28B, and IL-29. Discovered as a secreted cytokine synthesis inhibitory factor, produced by T helper (Th) 2 cell clones shown to inhibit cytokine production by Th1 cells. Produced by both innate and adaptive immune cells including activated Th cells, B cells, keratinocytes, macrophages and monocytes to function as effector and regulatory molecules of the immune system. A pleiotropic cytokine that inhibits cell-mediated immune responses while enhancing humoral immunity. Its primary role is to suppress immune function by blocking the synthesis of proinflammatory cytokines, including IFN-gamma, IL-1, IL-2, IL-3, IL-6, IL-8, IL-12, TNF and GM-CSF in T cells, monocytes, and macrophages, and by inhibiting the expression of cell surface molecules involved in antigen presentation and costimulation. Possessing both anti-inflammatory and immunostimulatory properties, it is a highly immunosuppressive cytokine and is frequently dysregulated in many human diseases including cancer, chronic inflammation and HIV. The genetic loss of either IL-10 or the IL-10 receptor results in severe inflammatory bowel disease (IBD). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
