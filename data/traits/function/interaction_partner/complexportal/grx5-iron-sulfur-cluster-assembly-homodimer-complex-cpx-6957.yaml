identifier: ComplexPortal:CPX-6957
label: "GRX5 iron-sulfur cluster assembly homodimer complex"
definition: >-
  Reversibly binds Fe-S clusters and appears to play a role in Fe-S cluster assembly and trafficking. May also participate in the maturation of [4Fe-4S]2+ cluster-containing proteins in a glutathione-independent manner, possibly as a carrier protein to mediate the transfer of preassembled [4Fe-4S]2+ cluster to target proteins. Active in the mitchondria. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
