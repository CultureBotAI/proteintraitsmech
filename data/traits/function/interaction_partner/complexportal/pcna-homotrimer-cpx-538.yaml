identifier: ComplexPortal:CPX-538
label: "PCNA homotrimer"
definition: >-
  Role in DNA replication, repair, cell-cycle control, and chromatin remodeling. Exists as a double back-to-back homotrimeric ring which encircles double-stranded DNA and slides spontaneously across it. Loaded onto at template-primer junctions synthesized on unwound DNA during S phase in an ATP-dependent process by replication factor C (CPX-415), where it recruits replicative DNA polymerases and stimulates their activity. The process of chromatin assembly is tightly coupled to DNA replication or repair and the double homotrimer allows DNA polymerase delta to binds to one homotrimer whilst the chromatin assembly factor-1 CNOT7 binds to the other. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
