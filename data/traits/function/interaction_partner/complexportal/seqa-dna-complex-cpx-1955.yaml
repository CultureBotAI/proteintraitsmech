identifier: ComplexPortal:CPX-1955
label: "SeqA-DNA complex"
definition: >-
  Believed to be involved in negative supercoiling of the DNA forming nucleoid compaction. SeqA forms filaments on methylated and hemimethylated DNA but has a higher avidity for hemimethylated GATC sites. Hemimethylated DNA is created during complementary strand synthesis before Dam protein fully methylates the new stand. Binding of SeqA to hemimethylated DNA sequesters the chromosomal replication origin, oriC, preventing re-methylation of DNA by Dam and in turn stopping premature re-initiation of replication during one replication cycle. Depletion of the SeqA pool towards the end of the replication cycle allows Dam protein to displace SeqA from the hemimethylated DNA, allowing it to fully methylate the DNA and initiate a new cycle of DNA replication. The SeqA-DNA complex travels with the replication folk sequentially binding to the majority of hemimethylated GATC sites of the newly-synthesized dsDNA. SeqA can form multimers consisting of dimers, tetramers octamers and higher order filaments but it is believed that the main form in vivo are filaments. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
