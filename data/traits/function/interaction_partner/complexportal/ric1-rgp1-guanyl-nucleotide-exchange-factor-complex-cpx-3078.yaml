identifier: ComplexPortal:CPX-3078
label: "Ric1-Rgp1 guanyl-nucleotide exchange factor complex"
definition: >-
  Guanine nucleotide exchange factor (GEF) that activates YPT6 (Q99260), by exchanging bound GDP for free GTP. YPT6 is a Rab GTPase which mediates the fusion of vesicles from endosomes at the Golgi apparatus and, once activated, recruits the GARP tethering complex (CPX-1718). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
