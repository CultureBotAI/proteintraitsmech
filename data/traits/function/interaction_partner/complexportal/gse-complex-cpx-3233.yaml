identifier: ComplexPortal:CPX-3233
label: "GSE complex"
definition: >-
  GTPase complex that stimulates TORC1 in response to amino acid stimulation. The GSE complex was shown to be localized to late endosomes, and to be required for sorting of GAP1 - a general amino acid permease - to the plasma membrane from endosomes. Regulates exit from rapamycin-induced growth arrest. GSE shares common components with the EGO complex (CPX-3172). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
