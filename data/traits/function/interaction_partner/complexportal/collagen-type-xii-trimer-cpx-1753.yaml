identifier: ComplexPortal:CPX-1753
label: "Collagen type XII trimer"
definition: >-
  Triple-helices consisting of about 1000 amino acids per chain forming a coiled coil structure. Each polypeptide forms a left-handed helix in which every third residue, glycine, comes into the centre of the superhelix. This is a fibril-associated collagen with interrupted triple helices (FACIT) that associate to form a structure that interacts with type I collagen-containing fibrils. The molecules contain three functional regions, the COL1 domain could be associated with the surface of the fibrils, and the COL2 and NC3 domains may be localized in the perifibrillar matrix. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
