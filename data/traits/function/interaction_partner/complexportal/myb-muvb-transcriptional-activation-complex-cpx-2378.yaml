identifier: ComplexPortal:CPX-2378
label: "Myb-MuvB transcriptional activation complex"
definition: >-
  Transcriptional activation complex which forms in the S phase and transactivates cell-cycle genes related to the S/G2/M phase. Genes activated by Myb-MuvB contain a cell-cycle homology region (CHR) DNA element in their promoters which is bound by mip120. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
