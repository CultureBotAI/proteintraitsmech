identifier: ComplexPortal:CPX-1963
label: "dnaA-diaA complex"
definition: >-
  A diaA tetramer binds to up 4 molecules of dnaA and stimulates dnaA assembly at the dnaA-oligomerization region of the chromosomal origin, oriC. This drastically increases the affinity of the linked dnaA molecules for DNA. diaA also has a negative effect on the initiation of DNA replication by inhibiting. dnaA from binding to the DnaB-DnaC complex (CPX-1934). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
