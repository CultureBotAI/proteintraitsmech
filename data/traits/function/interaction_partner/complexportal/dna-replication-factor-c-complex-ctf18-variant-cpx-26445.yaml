identifier: ComplexPortal:CPX-26445
label: "DNA replication factor C complex, ctf18 variant"
definition: >-
  DNA-dependent ATPase clamp-loader complex specific for leading strand DNA synthesis but also establishing cohesion between sister chromatids. Binds the leading strand DNA pol2 (P87154) which stimulates the complex to load DNA polymerase processivity factor PCNA (Q03392, CPX-547) onto primed and gapped leading strand DNA in an ATP-dependent manner. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
