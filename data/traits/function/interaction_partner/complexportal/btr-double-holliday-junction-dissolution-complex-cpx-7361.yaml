identifier: ComplexPortal:CPX-7361
label: "BTR double Holliday Junction dissolution complex"
definition: >-
  Processes the double Holliday Junction, a DNA intermediate formed during homologous recombination, by convergent DNA branch migration of the two Holliday junctions in the structure and DNA strand decatenation, to yield non-crossover recombinants. Unwinds D-loops to promote the formation of non-crossover recombinants through the synthesis-dependent strand annealing pathway. Involved in homologous recombination during meiotic double strand break repair in the germline. Plays a role in double strand break repair by positively regulating the accumulation of rad-51 at double strand breaks. Positively regulates chiasma formation and DNA crossover designation, formation and positioning on chromosome arms (away from the chromosome center) during meiotic homologous recombination. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
