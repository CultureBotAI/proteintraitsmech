identifier: ComplexPortal:CPX-3564
label: "KdpFABC potassium import complex"
definition: >-
  A potassium pump that maintains intracellular homeostasis as well as cell shape and turgor under conditions where potassium is limiting. The complex exhibits high selectivity and binding-affinity (Kd = 2uM)4 and is able to maintain cytoplasmic K+ concentrations against gradients up to 10,000-fold. Mutagenesis has been used to establish that K+ is transported through KdpA and that the energy of ATP is harnessed by KdpB. During catalysis, the KdpFABC complex cycles between two main conformational states, each of which comprises different structural properties together with different binding affinities for both ATP and the transport substrate. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
