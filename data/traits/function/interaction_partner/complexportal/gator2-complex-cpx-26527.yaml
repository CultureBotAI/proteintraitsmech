identifier: ComplexPortal:CPX-26527
label: "GATOR2 complex"
definition: >-
  Functions as an activator of the amino acid-sensing branch of the TORC1 pathway. Indirectly activates TORC1 (CPX-26512) through the inhibition of the GATOR1 complex (CPX-26523). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
