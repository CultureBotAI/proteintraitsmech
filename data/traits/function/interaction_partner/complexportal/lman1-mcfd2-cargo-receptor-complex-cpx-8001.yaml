label: "LMAN1-MCFD2 cargo receptor complex"
definition: >-
  Cargo receptor which cycles between the endoplasmin reticulum and the cis-Golgi, binding and ensuring the transportation of glycoproteins such as coagulation factors FV (P12259) and FVIII (P00451). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
