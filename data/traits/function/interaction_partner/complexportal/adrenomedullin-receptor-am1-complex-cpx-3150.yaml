identifier: ComplexPortal:CPX-3150
label: "Adrenomedullin receptor AM1 complex"
definition: >-
  A transmembrane, G-protein-coupled signalling receptor complex that serves as the adrenomedullin (AM) receptor to control neovascularization and the stabilization of vascular integrity. AM, a polypeptide, belongs to the calcitonin family of peptides. It is produced by vascular smooth muscle cells and endothelial cells and has strong hypotensive and vasodilation activity. RAMP2 is responsible for transporting CALCRL to the plasma membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
