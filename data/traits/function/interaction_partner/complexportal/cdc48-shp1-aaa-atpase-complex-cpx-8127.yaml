identifier: ComplexPortal:CPX-8127
label: "CDC48-SHP1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Acts to separate the substrate receptor MET30 (P39014) from the SCF-Met30 (CPX-3249) ubiquitin ligase complex when methionine limitation blocks the interaction between SCF-MET30 and its substrates MET4 (P32389) and MET32 (Q12041). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
