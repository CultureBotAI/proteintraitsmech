identifier: ComplexPortal:CPX-8543
label: "UDP-glucuronosyltransferase 1A9 complex, UGT1A9-1 variant"
definition: >-
  Membrane-bound UDP-glucuronosyltransferase present in the endoplasmic reticulum that catalyzes the transfer of glucuronic acid to hydroxyl, carboxyl, or amine group compounds. Required for the biotransformation of lipophilic xenobiotics, increasing the conjugated metabolite's water solubility and facilitating excretion into either the urine or bile. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
