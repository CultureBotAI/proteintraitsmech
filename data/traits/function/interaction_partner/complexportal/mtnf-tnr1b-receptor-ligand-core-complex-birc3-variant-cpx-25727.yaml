identifier: ComplexPortal:CPX-25727
label: "mTNF-TNR1B receptor-ligand core complex, BIRC3 variant"
definition: >-
  A membrane-bound tumor necrosis factor-receptor signaling complex formed on the binding of the membrane-bound form of the pro-inflammatory cytokine, tumour necrosis factor (mTNF, CPX-8931). TNFRSF1B is similar in its extracellular structure to TNFRSF1A (P19438) at the mTNF and sTNF binding sites, but it lacks the death domain found in TNFRSF1A. Instead, TNFRSF1B containss a TNF receptor associated factor (TRAF) binding site. mNF-stimulated TNFRSF1B complexes recruit TRAF2-BIRC2/3, reducing their availability for triggering MAP3K14/NIK (Q99558) degradation. As a result, NIK accumulates and drives NF-kappa-B signaling. Aggregation of the TNF-TNFR2 complexes brings two or more TRAF2-BIRC2/3 complexes into proximity, enabling BIRC2/3 transactivation of their E3 ligase activity resulting in Lys-63-ubiquitination of TRAF2. This generates docking sites for classical NF-kappa-B signaling-stimulating kinases. TNFA is a key regulator of T regulatory cells, mainly secreted by macrophages, T helper 1 and natural killer cells, and while TNFRSF1A is ubiquitously expressed, TNFRSF1B is mainly expressed by immune cells, neurons and endothelial cells. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
