identifier: ComplexPortal:CPX-1190
label: "TUL1 E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex required in cells lacking the multivesicular body pathway and under conditions of ubiquitin depletion. Functions in protein homeostasis under non-stress conditions and support a role in protein quality control. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
