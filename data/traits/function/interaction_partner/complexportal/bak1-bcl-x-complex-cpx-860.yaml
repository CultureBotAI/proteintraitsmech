identifier: ComplexPortal:CPX-860
label: "BAK1-Bcl-X complex"
definition: >-
  The apoptosis effector system is largely controlled by the balance of, and interactions between, proapoptotic and prosurvival, antiapoptotic members of the Bcl-2 family of proteins.. Bcl-X acts as an apoptosis inhibitor and BAK as an activator, heterodimerization of these antagonists regulates cell survival. When not in a complex with a prosurvival protein, BAK oligomerizes in the outer mitochondrial membrane to form pores and induce the release of cytochrome c and other signaling factors. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
