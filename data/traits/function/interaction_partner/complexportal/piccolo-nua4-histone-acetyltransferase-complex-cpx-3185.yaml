identifier: ComplexPortal:CPX-3185
label: "Piccolo NuA4 histone acetyltransferase complex"
definition: >-
  Histone acetyltransferase complex which is involved in transcriptional activation of selected genes, principally by acetylation of nucleosomal histone H4 and H2A. Strongly prefers chromatin over free histones as substrate. Also acts as the catalytic core of the 1.3-MDa NuA4 histone acetyltransferase complex (CPX-3155). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
