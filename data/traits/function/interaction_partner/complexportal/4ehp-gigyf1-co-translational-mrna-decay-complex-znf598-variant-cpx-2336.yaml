identifier: ComplexPortal:CPX-2336
label: "4EHP-GIGYF1 co-translational mRNA decay complex, ZNF598 variant"
definition: >-
  Triggers the co-translational decay of damaged or improperly processed mRNAs and induce decay of mRNAs with disturbed elongation. The E3 ubiquitin ligase ZNF598 acts to recruit 4EHP-GIGYF1 to bind the the mRNA molecules. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
