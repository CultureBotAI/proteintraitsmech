label: "TORC1 complex"
definition: >-
  Serine/threonine protein kinase complex that regulates cellular metabolism, growth and survival in response to hormones, growth factors, nutrients, energy and stress signals. The complex can be inhibited by rapamycin. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
