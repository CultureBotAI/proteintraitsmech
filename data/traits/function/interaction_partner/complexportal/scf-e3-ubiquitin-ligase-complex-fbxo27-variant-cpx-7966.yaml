identifier: ComplexPortal:CPX-7966
label: "SCF E3 ubiquitin ligase complex, FBXO27 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO27 target proteins include the luminal part of the lysosome-associated membrane glycoprotein LAMP2 (P13473), following membrane permeabilization, thus acting as a sensor of lysosomal damage. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
