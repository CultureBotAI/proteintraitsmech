identifier: ComplexPortal:CPX-3149
label: "CGRP receptor complex"
definition: >-
  A transmembrane, G-protein-coupled signalling receptor complex that serves as receptor for calcitonin gene-related peptides (CGRP). CGRPs are produced in both peripheral and central neurons and are one of the most potent peptide vasodilators known. They are expressed at trigeminal nerve endings that innervate cerebral blood vessels, and this localization, its vasodilatory effect, and other evidence suggest a direct role of CGRPs in migraine. RAMP1 is responsible for transporting CALCRL to the plasma membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
