identifier: ComplexPortal:CPX-26612
label: "Cytosolic ASF1A-IPO4 histone H3-H4 chaperone-importin complex"
definition: >-
  ASF1A, a histone chaperone, forms a cytosolic complex with Importin-4 (IPO4) and newly synthesized histones H3 and H4, facilitating their transport into the nucleus for chromatin assembly. Complex specifically recognizes histone H3 monomethylated at lysine 9 (H3K9me1) and histone H4 diacetylated at lysines 5 and 12 (H4K5ac, H4K12ac), modifications characteristic of newly made histones. These post-translational marks are acquired in a stepwise fashion during histone maturation, beginning shortly after synthesis, and help guide the histones through their processing and transport stages. ASF1A not only shields the H3-H4 dimer to prevent premature tetramer formation but also facilitates its binding to IPO4, ensuring proper nuclear import. This sequential, modification-dependent process ensures that only properly processed histones are delivered into the nucleus for incorporation into chromatin. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
