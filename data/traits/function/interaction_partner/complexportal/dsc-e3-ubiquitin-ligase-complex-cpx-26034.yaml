identifier: ComplexPortal:CPX-26034
label: "DSC E3 ubiquitin ligase complex"
definition: >-
  Required for the proteolytic cleavage of the sre1 transcriptional activator (Q9UUD1) to release the soluble transcription factor from the membrane. The sre1/SREBP-SCAP transcription regulator complex (CPX-25718) forms in the endoplasmic reticulum (ER). Under conditions of low sterols or low oxygen, the complex translocates from the ER to the Golgi where sre1 is proteolytically cleaved and freed to act as a master regulator of cellular lipid homeostasis which plays a critical role in the cells adaptation to hypoxia. cdc48 binds to the Dsc E3 ligase complex through the UBX domain of dsc5 and is required for sre1 cleavage under low oxygen. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
