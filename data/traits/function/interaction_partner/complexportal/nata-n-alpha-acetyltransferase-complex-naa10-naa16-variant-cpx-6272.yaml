identifier: ComplexPortal:CPX-6272
label: "NatA N-alpha-acetyltransferase complex, NAA10-NAA16 variant"
definition: >-
  N(alpha)-acetyltransferases responsible for the covalent attachment of an acetyl group (CH3CO) to the free alpha-amino group (NH3+) at the N-terminal end of a polypeptide, one of the most common co-translational modifications. This changes the electrostatic properties of proteins and therefore protein function, stability and localization. NatA co-translationally acetylates N-termini that bear a small amino acid (Ala, Ser, Thr, Cys, and occasionally Val and Gly), which is exposed after methionine cleavage by methionine aminopeptidases. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
