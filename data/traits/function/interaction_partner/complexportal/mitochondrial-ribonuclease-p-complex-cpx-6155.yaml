identifier: ComplexPortal:CPX-6155
label: "Mitochondrial ribonuclease P complex"
definition: >-
  Catalytically active H1 RNA responsible for cleaving the 5′ leader sequence from long pre-mitochondrial (mt)tRNAs polycistronic transcripts by phosphodiester bond hydrolysis to generate tRNAs with mature 5′-ends The complex only forms in the presence of the pre-(mt)tRNA substrate. May methylate (mt)tRNA independently of the related mitochondrial tRNA:m(1)R9 methyltransferase complex (CPX-6161). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
