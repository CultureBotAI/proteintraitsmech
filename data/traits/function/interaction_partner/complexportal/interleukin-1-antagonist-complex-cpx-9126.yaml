identifier: ComplexPortal:CPX-9126
label: "Interleukin-1 antagonist complex"
definition: >-
  Complex formed on the binding of the interleukin-1 receptor (IL1R1) to the interleukin-1 receptor agonist (IL1RA). IL1RA competitively binds to the IL1R1 with a high affinity thereby preventing it binding to IL1A (P01583) and IL1B (P01584), resulting in the non-recruitment of the accessory protein subunit responsible for signalling, IL1RAP (Q9NPH3) and abrogation of signal transduction. Overproduction of IL1B and IL1A and the consequent up-regulation of IL1R1 are responsible for driving various chronic inflammatory and auto-immune disorders. Therapeutic approaches have targeted IL1 neutralization through antagonists or by inhibiting IL1 signalling. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
