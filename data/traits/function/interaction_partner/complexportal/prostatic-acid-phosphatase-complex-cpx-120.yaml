identifier: ComplexPortal:CPX-120
label: "Prostatic acid phosphatase complex"
definition: >-
  Dephosphorylates orthophosphate monoesters and phosphorylated proteins, primaryly on tyrosine. Optimal activity in acidic environment (pH 4-6). Prediminantly expressed in and secreted from prostate but also found in many other tissues at lower concentration. TM-PAP splice variant is membrane bound. Modulates nociception at the dorsal root ganglia. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
