identifier: ComplexPortal:CPX-3866
label: "atg-5-atg-12-atg-16.2 complex"
definition: >-
  Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. Promotes autophagosome formation playing a role in the recruitment of lipidated lgg-1 (Q09490) to the autophagosome membrane. Also required for the nucleation of lgg-1 positive autophagosomes. Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. May promote autophagosome formation. Specifically, functions as an E3-like enzyme in the lgg-1 conjugation system. The atg-5-atg-12-atg-16.1 (CPX-3865), atg-5-atg-12-atg-16.2 (CPX-3866) and atg-5-atg-12-atg-16.1-atg-16.2 (CPX-3863) complexes target the autophagic membrane via the atg-5-atg-16.1 and/or atg-5-atg-16.2 complex moieties and then recruits an atg-3:lgg-1 thioester intermediate via the interaction between atg-3 (Q9N369) and atg-12/lgg-3 (Q10931). The ATG12-ATG5 complex (CPX-3864) conjugate facilitates the transfer reaction of lgg-1 (Q09490) from atg-3 to phosphatidylethanolamine (PE) through a reorganization of the catalytic centre of the E2-like enzyme atg-3 (Q9N369). The C-terminal glycine of lgg-1 is then conjugated to the amine moiety of PE. The roles of atg-16.1 (Q19124) and atg-16.2 (Q09406), which have no E3-like activity appears to be to target the ATG12-ATG5 conjugate to the autophagic membranes. lgg-1-PE/ATG12-ATG5 complexes form homogeneous oligomers, comprising two to four subunits. Atg-16.1 and/or atg-16.2 may then act to reorganize lgg-1-PE/ATG12-ATG5 oligomers to form a continuous, flat protein layer with meshwork-like architecture on membranes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
