identifier: ComplexPortal:CPX-1277
label: "INO2-INO4 transcription activation complex"
definition: >-
  Binds to a cis-acting promoter element, designated ICRE (inositol/choline-responsive element, consensus sequence WYTTCAYRTGS). Induces expression of CHO1, the enzyme responsible for the synthesis of phosphatidylethanolamine from CDP-diacylglycerol, under growth conditions when the level of phosphatidate is elevated and tethers the OPI1 repressor to the nuclear/endoplasmic reticulum membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
