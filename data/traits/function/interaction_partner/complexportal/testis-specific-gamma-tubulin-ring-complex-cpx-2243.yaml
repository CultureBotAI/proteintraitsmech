identifier: ComplexPortal:CPX-2243
label: "Testis-specific gamma-tubulin ring complex"
definition: >-
  Tissue specific gamma-tubulin complex localized to the testis during spermatogenesis. Required for the nucleation of microtubules, the process in which several tubulin molecules interact to form a microtubule seed. Localised on the centromere. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
