identifier: ComplexPortal:CPX-222
label: "Positive transcription elongation factor B, CDK9-cyclinT1 complex"
definition: >-
  A serine kinase complex that phosphorylates elongation pausing factors such as DSIF (CPX-891) and NELF (CPX-6267) and Ser-2 and Ser-5 of RNA polymerase II (RNA Pol II), thus positively regulating productive mRNA elongation through the gene body after promoter-proximal pausing of RNA Pol II. Involved in cotranscriptional histone modification, mRNA processing and mRNA export. Potential target of anticancer drugs. Binds to the transactivation domain of the HIV-1, HIV-2 and SIV nuclear transcriptional activator, Tat, thereby increasing Tat's affinity for the transactivating response RNA element (TAR RNA) leading to RNA Pol II activation and transcription of viral genes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
