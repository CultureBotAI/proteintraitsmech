identifier: ComplexPortal:CPX-1658
label: "General transcription factor complex TFIIE"
definition: >-
  Required for mRNA synthesis of many, but not all, genes in yeast. In the transcription process, TFIIE regulates TFIIH kinase activity that phosphorylates the carboxy-terminal domain of the largest subunit of RNA polymerase II. Required for the opening of DNA, to allow transcription initiation. DNA opening occurs around the tip of the Pol II clamp and the TFIIE ‘extended winged helix’ domain. TFIIF (CPX-1149) and TFIIE bind open promoter DNA from opposite sides of the Pol II cleft. TFIIF adopts an extended induced structure that allows it to retain the upstream DNA-SPT15-TFIIB assembly on the wall and to bind the DNA bubble. TFIIF and TFIIE encircle and retain the DNA and TFIIE may then act to stabilize the open DNA structure. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
