identifier: ComplexPortal:CPX-238
label: "Neuronal nicotinic acetylcholine receptor complex, alpha7-beta2"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous agonists such as nicotine and alpha-bungarotoxin. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron. Mediates fast, short-lived synaptic transmission of neurotransmitters but has lower activity than the alpha7 homopentamer. Found in the forebrain, hippocampus and cerebellum. Upregulated by pro-inflammatory cytokines, like TNF-alpha. Activity highly sensitive to beta-amyloid(1-42) peptides. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
