identifier: ComplexPortal:CPX-3171
label: "cdm-mago-Y14 complex"
definition: >-
  A nuclear import complex that functions as a nuclear import receptor for the mago-Y14 (mago-tsu) complex (CPX-3100) for each round of messenger ribonucleoprotein (mRNP) complex incorporation and regulation. Complex formation occurs in the cytosol and requires the action of translating ribosomes on the mRNP and the ribosomally associated protein Pym (P82804, in complex CPX-3147). cdm (Imp13) binds to and releases Pym from the mago-Y14 complex. mago-Y14 shuttles between the nucleus, where it is loaded onto specific mRNAs, and the cytoplasm and functions in translational regulation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
