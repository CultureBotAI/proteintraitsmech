identifier: ComplexPortal:CPX-5124
label: "RuvAB Holliday junction DNA helicase complex"
definition: >-
  ATP-dependent helicase that catalyzes Holliday junction branch migration, the process by which base pairs on homologous DNA strands are consecutively exchanged at a Holliday junction, moving the branch point up or down the DNA sequence. RuvAB unwinds the duplex DNA, final resolution requires the subsequent formation of the RuvABC complex (CPX-5125). The removal of these four-way DNA intermediates during late-stage recombination: is crucial for chromosome segregation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
