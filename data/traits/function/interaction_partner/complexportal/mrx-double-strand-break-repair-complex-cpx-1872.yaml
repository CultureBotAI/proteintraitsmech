identifier: ComplexPortal:CPX-1872
label: "MRX double-strand break repair complex"
definition: >-
  Endo- and exonuclease complex that plays a central role in double-strand break (DSB) repair, DNA recombination, maintenance of telomere integrity and meiosis via non-homologous end joining and homologous recombination.. The complex possesses both single-strand endonuclease activity and double-strand-specific 3'-5' exonuclease activity, which are provided by MRE11. Mre11 and Rad50 form an ATP-regulated nuclease that senses DSBs and tethers DNA via long Rad50 coiled-coil domains. Required for the formation of the DSB catalysed by the transesterase SPO11 (P23179) protein and subsequently removes covalently attached Spo11 from the 5' extremity of the breaks through its nuclease activity, to allow further break resection. The MRX complex also plays a role during meiosis in bridging DNA molecules together and in sensing SPO11 DSB and activating the DNA damage checkpoint. Clips double-stranded DNA in the vicinity of protein-blocked DNA ends. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
