identifier: ComplexPortal:CPX-1197
label: "PPG1-FAR complex"
definition: >-
  Multisubunit protein phosphatase complex. Localised at the mitochondria, where it mediates the inhibition of mitophagy via ATG32 (Q06671) dephosphorylation and at the endoplasmic reticulum where it is plays a role in the regulation of the TORC2 (CPX-1717) signaling pathway. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
