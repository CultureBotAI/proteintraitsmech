identifier: ComplexPortal:CPX-7725
label: "DISP septin regulator complex"
definition: >-
  Promotes the formation of septin rings, indicative of septin displacement from actin, thus regulating the actin cytoskeleton, potentially via the guanine nucleotide exchange factor activity of DOCK7 which activates RAC1 (P63000). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
