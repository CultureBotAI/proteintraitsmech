identifier: ComplexPortal:CPX-5782
label: "Tol-Pal cell envelope complex"
definition: >-
  Required for the co-ordinated invagination of the envelope layers during cell fission, using proton motive force to establish transient trans-envelope connections at/near the septal ring to draw the outer membrane onto the invaginating proteoglycan and inner membrane layers. Ion potential over the inner membrane is converted by tolQ and R to drive a conformational change in tolA, extending it through meshes of newly split murein to reach for free pal in the outer membrane. On bindng a pal molecule, tolA snaps back, drawing pal inwards, and then disassociates, allowing pal to engage the proteoglycan layer. Also acts to transport colicins classified in group A (colicins A, E1 to E9, K, N, and cloacin DF13) from the outer membrane across the periplasm. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
