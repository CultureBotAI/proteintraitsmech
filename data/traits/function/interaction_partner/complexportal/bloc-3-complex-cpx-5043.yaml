identifier: ComplexPortal:CPX-5043
label: "BLOC-3 complex"
definition: >-
  A guanine exchange factor (GEF) complex required for the biogenesis of specialized organelles of the endosomal-lysosomal system, such as melanosomes and platelet dense granules. Acts as GEF for RAB32 (Q13637) and RAB38 (P57729), promoting the exchange of GDP to GTP, converting them into an active GTP-bound form and inducing their recruitment to membrane. Once active, both interact with the AP-1 (CPX-5047, CPX-5048 and CPX-5049), the AP-3 (CPX-5051 and CPX-5052) and the BLOC-2 (CPX-5044) adapter complexes, to regulate cargo delivery to nascent melanosomes and platelet dense granules. Mutations in HPS1 are the most frequent cause of Hermansky-Pudlak syndrome. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
