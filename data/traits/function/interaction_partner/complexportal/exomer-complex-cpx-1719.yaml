identifier: ComplexPortal:CPX-1719
label: "Exomer complex"
definition: >-
  Cargo adaptor complex that mediates the trafficking of certain cargoes from the trans-Golgi network/early endosomes to the plasma membrane. Forms a coat structure on vesicles involved in exocytosis of specific cargo proteins, including chitin synthase CHS3 (P29465), from the trans-Golgi network to the cell surface. Recruited by GTP-bound ARF1 (P11076). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
