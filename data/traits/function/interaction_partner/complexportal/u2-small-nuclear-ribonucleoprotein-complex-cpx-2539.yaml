identifier: ComplexPortal:CPX-2539
label: "U2 small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex that is involved in mRNA splicing. U2 snRNP binds to the intron branch site of the commitment complex to form the pre-spliceosome in an ATP dependent step. Stably interacts with the pre-RNA intron branch site (BS), forming the spliceosomal A complex in which U2 snRNA base pairs with the BS, causing the branch site adenosine to bulge out from the U2/BS helix. The U2-BS interaction is reinforced by the U2AF65/35 heterodimer (CPX-1921), which binds the intron pyrimidine-rich region, and by the U2-associated, heteromeric protein complexes SF3A (CPX-2565) and SF3B (CPX-2227) that contact the intron 6 to 26 nucleotides upstream of the BS-A (anchoring site) Prior to the first catalytic reaction, SF3A and SF3B dissociate from the spliceosome, presumably making the branch site accessible to lariat formation. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. During formation of the activated spliceosome, U2 will replace the dissociating U4 to form base pairs with U6. A curated stable macromolecular complex (Complex Portal) with 23 subunits.
