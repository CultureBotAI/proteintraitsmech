identifier: ComplexPortal:CPX-2005
label: "Cyclin A1-CDK2 complex"
definition: >-
  Cyclin-dependent protein kinase complex. Essential for spermatogenesis, essential for passage of spermatocytes into meiosis I. Overexpression enhances S phase entry consistent with an oncogenic function. Complex formation enables substrate binding to the kinase, leads to a rearrangement of the catalytic site and exposes Thr-160 of CDK2 for phosphorylation and subsequent activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
