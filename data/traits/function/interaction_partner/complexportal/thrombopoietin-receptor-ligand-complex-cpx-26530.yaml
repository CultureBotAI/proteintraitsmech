label: "Thrombopoietin receptor-ligand complex"
definition: >-
  Class I cytokine receptor-ligand complex essential for hematopoietic stem cell maintenance and the primary driver of megakaryocyte differentiation and platelet production. Signal transduction is initiated by associated Janus kinase (JAK) proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
