identifier: ComplexPortal:CPX-1380
label: "TAP42-RRD2-PPH21 phosphatase complex"
definition: >-
  A serine/threonine protein phosphatase complex that plays a major role in TOR1/2 (P35169/P32600)-mediated signaling and gene expression. Rapamycin causes release of the phosphatase-RRD dimer from TAP42. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
