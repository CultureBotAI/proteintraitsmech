identifier: ComplexPortal:CPX-303
label: "Mitochondrial pyruvate carrier, respiratory isoform"
definition: >-
  The respiratory isoform of the mitochondrial pyruvate carrier resides in the mitochondrial inner membrane and mediates uptake of pyruvate into the mitochondrion during growth on respiratory carbon sources such as ethanol and glycerol. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
