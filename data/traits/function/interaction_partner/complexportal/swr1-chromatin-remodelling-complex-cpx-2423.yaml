identifier: ComplexPortal:CPX-2423
label: "SWR1 chromatin remodelling complex"
definition: >-
  ATP-dependent chromatin-remodeling complex. SWR1 replaces the canonical H2A/H2B dimer at nucleosomes flanking histone-depleted regions, such as promoters, with a variant histone H2A.V/H2B dimer. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
