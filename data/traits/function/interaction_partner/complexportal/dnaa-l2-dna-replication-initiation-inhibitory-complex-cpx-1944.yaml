identifier: ComplexPortal:CPX-1944
label: "DnaA-L2 DNA replication initiation inhibitory complex"
definition: >-
  Contributes to the regulation of replication initiation preventing multiple replication origins during one replication cycle: L2 interacts with the N-terminal domain of DnaA destabilizing dnaA oligomers at the replication origin (oriC) and thus inhibits DNA-dependent duplex unwinding element unwinding. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
