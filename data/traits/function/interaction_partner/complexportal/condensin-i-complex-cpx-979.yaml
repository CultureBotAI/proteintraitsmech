identifier: ComplexPortal:CPX-979
label: "Condensin I complex"
definition: >-
  Involved in chromosome condensation and segregation, both in meiosis and mitosis. Assembles in alternating pattern with Condensin II (CPX-985) complex along metaphase chromosomes with fully resolved sister chromatids. Also affects nuclear architecture and chromosome stability during interphase. Defects in Condensin complexes lead to anaphase bridges and apoptosis. In meiosis, only stably associates with chromosomes after anaphase I. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
