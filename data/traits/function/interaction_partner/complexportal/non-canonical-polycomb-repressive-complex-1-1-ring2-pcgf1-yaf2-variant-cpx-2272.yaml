identifier: ComplexPortal:CPX-2272
label: "Non-canonical polycomb repressive complex 1.1, RING2-PCGF1-YAF2 variant"
definition: >-
  E3 ubiquitin-protein ligase that acts as a transcriptional repressor by mediating the monoubiquitination of Lys-119 of histone H2A, compacting chromatin, stalling RNA polymerase II and transcriptionally silencing genes critical for development. KDM2B contributes to generic genomic localization of this complex variant around promoters and other loci enriched for unmethylated CpG islands. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
