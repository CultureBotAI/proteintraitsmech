identifier: ComplexPortal:CPX-3742
label: "cysEK cysteine synthase complex"
definition: >-
  Catalyzes the final steps in cysteine biosynthesis. The complex is comprised of the two enzymes that catalyze the final steps in cysteine biosynthesis. Serine acetyltransferase (CysE) catalyzes an acyl transfer from acetyl-CoA to L-Ser using a random-order kinetic mechanism to form O-acetyl-l-serine (OAS). OAS allosterically regulates CysB (P0A9F3), a transcriptional activator of the cysteine regulon, up-regulating CysB expression by binding to and preventing CysB from binding to its own promoter, where it inhibits transcription. OAS also regulates the balance of the bound and free forms of CysE and CysK by binding to and dissociating the complex. CysK a pyridoxal 5′-phosphate (PLP)-dependent enzyme, appears to be inactive in the complex, but when active, displaces the acetoxy group from OAS with bisulfide to yield L-Cys. Dissociation therefore stimulates both OAS consumption and cysteine synthesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
