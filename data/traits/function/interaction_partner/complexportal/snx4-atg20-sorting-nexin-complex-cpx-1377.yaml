identifier: ComplexPortal:CPX-1377
label: "SNX4-ATG20 sorting nexin complex"
definition: >-
  Required on a maturing endosome to sort and export distinct cargo proteins. The heterodimers oligomerize and coat the membrane, driving a transition in topology from a flat membrane to a form the tubular endosomal network thus generating transport vesicles for trafficking of retromer cargoes. SNX4-ATG20 functions on the SNC1 (P31109) v-SNARE recycling pathway to transport SNC1 to the Golgi. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
