identifier: ComplexPortal:CPX-5084
label: "BLOC-2 complex"
definition: >-
  Adaptor complex required for the biogenesis of specialized organelles of the endosomal-lysosomal system, such as melanosomes and platelet dense granules. Once Rab32 (Q9CZE3) and Rab38 (Q8QZZ8) are activated by BLOC-3 (CPX-5083), they interact with AP-3 (CPX-5145, CPX-5146, CPX-5147, CPX-5148), AP-1 (CPX-5141, CPX-5142, CPX-5143, CPX-5144) and BLOC-2 complexes which function as adaptor complexes on early/recycling endosome tubules, where cargo are loaded into vesicles or transport intermediates and transported to nascent melanosomes and platelet dense granules. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
