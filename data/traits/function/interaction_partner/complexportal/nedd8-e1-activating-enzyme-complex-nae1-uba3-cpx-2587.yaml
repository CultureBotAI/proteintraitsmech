identifier: ComplexPortal:CPX-2587
label: "NEDD8 E1 activating enzyme complex, NAE1-UBA3"
definition: >-
  E1 activating enzyme which binds ATP, Mg2+, and NEDD8, and catalyzes adenylation of the NEDD8 C-terminus. Its catalytic cysteine attacks the NEDD8~adenylate, producing a covalent thioester-linkage between UBA3 catalytic cysteine and the NEDD8 C-terminus. The thioester-linked NEDD8 will be transferred directly to the E2 UBE2M NEDD8-conjugating enzyme (P61081). Before this transfer, UBA3 binds a second NEDD8 molecule at the adenylation active site. Thus, during the activation cycle, UBA3 binds two NEDD8 molecules, each at a distinct site: the catalytic cysteine via a thioester, and the adenylation active site. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
