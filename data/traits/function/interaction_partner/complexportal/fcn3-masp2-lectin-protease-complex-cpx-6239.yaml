identifier: ComplexPortal:CPX-6239
label: "FCN3-MASP2 lectin-protease complex"
definition: >-
  Calcium-dependent pattern-recognition receptor and serine protease complex of the lectin pathway (LP) of complement activation. Activates the LP by binding sugar moieties and acetyl groups of pathogen-associated molecular patterns (PAMPs) displayed on microbes via the lectin FCN3 subcomplex. Binds preferentially to N-acetylglucosamines (GlcNAc), GlcNAc, D-fucose, mono/oligosaccharide and lipopolysaccharides. Mainly expressed in liver and kidney. Mainly present in peripheral blood leukocytes, monocytes and granulocytes. MASP2 protease is probably activated by cleavage by a MASP1 from a neighbouring FCN3-MASP1 complex (CPX-6179) and in turn cleaves and activates complement precursors C4 (P0C0L4) and C2 (P06681) to form C3 convertase complexes C4b2a-A (CPX-5675) and C4b2a-B (CPX-6156). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
