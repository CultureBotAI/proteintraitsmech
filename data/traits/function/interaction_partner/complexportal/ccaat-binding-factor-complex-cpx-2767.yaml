identifier: ComplexPortal:CPX-2767
label: "CCAAT-binding factor complex"
definition: >-
  Transcription factor complex which binds to the 5'-CCAAT-3' box motif found in the promoters of its target genes to regulate their expression. Important for developmental processes such as eye disc development. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
