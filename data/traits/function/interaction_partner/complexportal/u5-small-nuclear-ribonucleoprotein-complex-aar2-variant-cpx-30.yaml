identifier: ComplexPortal:CPX-30
label: "U5 small nuclear ribonucleoprotein complex, AAR2 variant"
definition: >-
  A - presumably immature - form of the U5 snRNP (CPX-29), that is mainly found in the cytoplasm. AAR2 is mutually exclusive with BRR2, which is present in the form of U5 localized at the spliceosome. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
