identifier: ComplexPortal:CPX-26550
label: "Centriole forming tubulin complex"
definition: >-
  Plays a direct role in forming and/or maintaining centriole structure by regulating triplet microtubule formation and stability. Acts as a positive regulator of the hedgehog signalling pathway in primary cilia. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
