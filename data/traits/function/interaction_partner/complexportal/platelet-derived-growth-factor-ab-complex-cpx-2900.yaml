identifier: ComplexPortal:CPX-2900
label: "Platelet-derived growth factor AB complex"
definition: >-
  A- and B-chain of the platelet-derived growth factor (PDGF). Binds to and activates PDGF receptor alpha (PDGFRalpha, P26618) and beta (PDGFRbeta, P05622) subunits by inducing receptor dimerisation and tyrosine phosphorylation. Is a potent mitogen for cells of mesenchymal origin. Plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Plays an important role in wound healing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
