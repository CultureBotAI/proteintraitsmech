identifier: ComplexPortal:CPX-26549
label: "Nonclassical MHC Ib complex, HLA-G-B2M"
definition: >-
  Antigen-presenting major histocompatibility complex which presents the bound peptide antigen to CD8+ cytotoxic T-lymphocytes. The complex assembles in the endoplasmic reticulum and is transported to the cell surface. Peptide-bound HLA-G-B2M complex acts as a ligand for inhibitory/activating KIR2DL4 (Q99706), LILRB1 (Q8NHL6) and LILRB2 (Q8N423) receptors on uterine immune cells to promote fetal development while maintaining maternal-fetal tolerance. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
