identifier: ComplexPortal:CPX-5666
label: "CCAAT-binding factor complex, nfya-1 variant"
definition: >-
  Transcription factor complex, which binds to the 5'-CCAAT-3' box motif found in the promoters of its target genes to regulate their expression. Represses the expression of the T-box transcription factor tbx-2 (Q19691) throughout larval development, which restricts its expression to certain tissue types. May act to repress txb-2 expression in conjunction with tbx-2 itself, which has an autoregulatory role. Negatively regulates the expression of the homeobox protein egl-5 (P17486) to spatially restrict its expression in tissues such as the head. May regulate egl-5 expression in association with the Polycomb Repressive Complex 2 (CPX-368). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
