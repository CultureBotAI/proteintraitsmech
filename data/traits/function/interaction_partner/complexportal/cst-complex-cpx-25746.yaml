identifier: ComplexPortal:CPX-25746
label: "CST complex"
definition: >-
  Acts to suppress aberrant telomerase and recombination activities at telomeres, restricting telomerase action via its sumoylation-mediated interaction with the telomeric DNA-binding protein Tpz1 (O14246). Promotes DNA synthesis at telomeres to limit single-strand DNA accumulation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
