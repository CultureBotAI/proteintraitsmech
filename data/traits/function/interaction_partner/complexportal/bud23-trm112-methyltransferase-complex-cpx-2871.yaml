identifier: ComplexPortal:CPX-2871
label: "BUD23-TRM112 methyltransferase complex"
definition: >-
  S-adenosylmethionine-dependent methyltransferase which plays a role in the synthesis of the small ribosomal subunit by catalyzing the N7-methylation of a specific guanosine residue (G1639) of 18S rRNA at the 20S pre-rRNA stage. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
