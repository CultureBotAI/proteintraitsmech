identifier: ComplexPortal:CPX-5126
label: "RecOR complex"
definition: >-
  Required for recA (P0A7G6) loading onto single-stranded DNA binding protein (ssb, P0AGE0)-coated ssDNA. When ssb is prebound to single-stranded DNA, it creates a significant kinetic barrier to recA nucleation and thus inhibits the ATP-driven homologous pairing and strand exchange of DNA molecules necessary for DNA recombinational repair. RecOR may stimulate recA nucleation by creating a suitable DNA binding site on ssb-coated ssDNA and/or activate the intrinsic capacity of recA to displace ssb and nucleate on single-stranded DNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
