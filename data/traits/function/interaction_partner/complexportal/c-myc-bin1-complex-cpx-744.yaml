label: "c-MYC-BIN1 complex"
definition: >-
  Transcriptional suppressor complex. Binding of BIN1 to c-MYC inhibits the transcription factor activity of c-MYC and the complex thus acts as a tumor suppressor. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
