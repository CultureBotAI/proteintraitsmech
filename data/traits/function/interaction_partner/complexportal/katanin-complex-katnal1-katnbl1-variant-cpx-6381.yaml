identifier: ComplexPortal:CPX-6381
label: "Katanin complex, KATNAL1-KATNBL1 variant"
definition: >-
  Uses the energy of ATP hydrolysis to sever microtubules enabling reorganisation during mitosis, meiosis, and development. Localizes to spindle poles during mitosis and plays an important role in spindle organization. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
