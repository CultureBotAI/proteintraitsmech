identifier: ComplexPortal:CPX-7020
label: "PAT intramembrane chaperone complex"
definition: >-
  Intramembrane chaperone that minimizes the misfolding of multi-spanning membrane protein in the endoplasmic reticulum. The complex protects transmembrane domains (TMDs) during assembly by engaging nascent TMDs that contain unshielded hydrophilic side chains within the lipid bilayer. The protein is released upon correct folding. Acts as part of an ER translocon that functions co-translationally with SEC61 channel-forming translocon complex during biogenesis of multi-pass membrane proteins, along with the GEL multi-spanning membrane protein insertion complex (CPX-5606) and the BOS complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
