identifier: ComplexPortal:CPX-3006
label: "Collagen type XXV trimer"
definition: >-
  Type II orientated transmembrane collagen. Inhibits fibrillization of beta amyloid peptide during the elongation phase. Has also been shown to assemble amyloid fibrils into protease-resistant aggregates. Binds heparin. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
