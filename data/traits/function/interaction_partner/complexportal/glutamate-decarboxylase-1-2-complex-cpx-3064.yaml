identifier: ComplexPortal:CPX-3064
label: "Glutamate decarboxylase 1/2 complex"
definition: >-
  An essential enzyme that catalyzes the production of the inhibitory neurotransmitter GABA (γ-aminobutyric acid, CHEBI:16865) from glutamate (CHEBI:16015) and controls fundamental processes such as neurogenesis, synaptogenesis, movement and tissue development, and protection against neural injury. Involved in intermediary metabolism, participating in the GABA shunt, which bypasses two steps of the TCA cycle. It is estimated that GAD1-GAD2 heterodimers constitute around 28% of the total GAD activity in cerebellar membranes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
