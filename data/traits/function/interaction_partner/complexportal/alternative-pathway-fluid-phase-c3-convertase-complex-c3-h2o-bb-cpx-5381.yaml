identifier: ComplexPortal:CPX-5381
label: "Alternative pathway fluid-phase C3 convertase complex C3(H2O)Bb"
definition: >-
  A serine-type endopeptidase complex of the alternative pathway of complement activation of the innate immune system. Cleaves Complement C3 precurser (P01024) into anaphylatoxin C3A (P01024-PRO_0000005910) and nascent convertase core-component C3b (CPX-973). Restricted to the fluid-phase. C3(H2O)Bb convertase is very unstable and readily inactivated by Factor H (P08603) thus regulating the amount of spontaneously available C3 convertase initiating the alternative pathway. Lack of protection, due to familial mutations in the complement genes or the presence of autoantibodies against regulators has been linked to atypical hemolytic uremic syndrome (aHUS) and C3 glomerulopathies (C3G) in kidneys and age-related macular degeneration (AMD) in eyes. Conditions of chronic and acute inflammations, as in rheumatoid arthritis, strokes, and heart attacks, become aggravated by complement activation against the disturbed tissue. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
