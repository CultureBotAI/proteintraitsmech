identifier: ComplexPortal:CPX-26609
label: "ASF1A-NASP, histone H3-H4 co-chaperone complex"
definition: >-
  Histone H3-H4 chaperone complex. Binds and stabilizes unbound histone H3-H4 to maintain a soluble reservoir and modulate degradation by autophagy. Both splicing variants of NASP (testicular (tNASP, P49321-1 and somatic (sNASP, P49321-2, part of this complex) are essential in maintaining a soluble pool of the H3-H4 dimers during the cell cyle and shield them from degradation by chaperone-mediated autophagy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
