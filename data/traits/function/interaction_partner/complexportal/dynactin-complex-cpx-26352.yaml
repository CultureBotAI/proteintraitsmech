identifier: ComplexPortal:CPX-26352
label: "Dynactin complex"
definition: >-
  Recruited to autoinhibited dynein, a retrograde microtubule motor complex, by a coiled-coil-containing adaptor (Bicaudal-D or Hook family) protein to form the tripartite dynein-dynactin-adaptor assembly which activates the processive, unidirectional movement of dynein. Dynactin and dynein contribute to a number of motility associated events including endomembrane movement, nuclear envelope breakdown, and mitotic spindle assembly. Mutations in DCTN1 have been implicated in several neurodegenerative diseases. Co-localization of DCTN1 in Lewy body pathology has been associated with Perry syndrome, motor neuron diseases and progressive supranuclear palsy. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
