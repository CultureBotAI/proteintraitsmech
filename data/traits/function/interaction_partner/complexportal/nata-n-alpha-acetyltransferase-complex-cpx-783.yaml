identifier: ComplexPortal:CPX-783
label: "NatA N-alpha-acetyltransferase complex"
definition: >-
  N(alpha)-acetyltransferases, NatA, NatB (CPX-782) and NatC (CPX-781), carry out N-terminal acetylation, one of the most common co-translational modifications. NatA is the major Nalpha-terminal acetyltransferase in the yeast cytosol, responsible for the acetylation of serine, alanine, threonine, and glycine. NAT1 anchors to the ribosome and interacts with nascent polypeptides. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
