identifier: ComplexPortal:CPX-2502
label: "CD94-NKG2A natural killer receptor complex"
definition: >-
  C-type lectin inhibitory receptor present on natural killer (NK) cells and a subset of T cells. Binds the HLA-E class I histocompatibility antigen molecule, specifically the peptide-bound HLA-E-B2M heterotrimeric complex, resulting in a suppression of the activation of signaling processes and the inhibition of NK cell-mediated cytolysis. The interaction of CD94-NKG2A with HLA-E is a central mechanism by which NK cells indirectly monitor the expression of other MHC class I molecules within a target cell. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
