identifier: ComplexPortal:CPX-68
label: "bZIP transcription factor complex, Cebpb-Cebpb"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The DNA recognition sequence depends on the composition of the bZIP dimer with the complex either binding to the preferred region of one of the partners or to a novel bZIP cognate site. This complex regulates the expression of genes involved in immune and inflammatory responses, binding to the regulatory regions of several acute-phase and cytokines genes and probably playing a role in the regulation of acute-phase reaction, inflammation and hemopoiesis. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
