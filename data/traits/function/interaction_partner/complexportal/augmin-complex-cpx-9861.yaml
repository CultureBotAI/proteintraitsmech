identifier: ComplexPortal:CPX-9861
label: "Augmin complex"
definition: >-
  Regulates mitotic spindle assembly and centrosome integrity and is required for completion of cytokinesis. The complex interacts with the gamma-tubulin ring complex (CPX-2801) and this interaction is required for spindle assembly. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
