identifier: ComplexPortal:CPX-1144
label: "FOXO3-MYC complex"
definition: >-
  A transcription factor repressor complex involved in regulating cell proliferation by repressing transcription of genes involved in negative regulation of mitotic cell cycle. The interaction of Myc with Foxo3 is likely to occur at the target gene promoter and inhibits Foxo3s activating effect on target gene transcription. The half life of the Foxo3-Myc complex is not known, but most likely to be of limited time span, in line with rapid dynamics of changes in transcription regulation in response to internal and external cues. Another variant of Foxo3-Myc interaction has been observed where Foxo3 seems to facilitate displacement of Myc from its promoters, thereby antagonizing Myc function in metabolic adaption to hypoxia. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
