identifier: ComplexPortal:CPX-1934
label: "dnaB-dnaC complex"
definition: >-
  After the formation of a DNA bubble, two dnaB helicase hexamers are recruited and loaded onto each of the separated single-stranded DNA strands as dnaB-dnaC complexes. Binding of the helicase loader dnaC inhibits the ATPase and helicase activities of dnaB. dnaC needs to be displaced by the binding of primase dnaG to dnaB before dnaB can initiate its helicase function. Upon binding DNA, dnaC hydrolyzes ATP, allowing dnaB to isomerize into a topologically closed, pre-translocation state competent to bind primase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
