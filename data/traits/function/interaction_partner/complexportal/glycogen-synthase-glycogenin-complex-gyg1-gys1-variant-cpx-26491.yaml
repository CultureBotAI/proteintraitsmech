identifier: ComplexPortal:CPX-26491
label: "Glycogen synthase-glycogenin complex, GYG1-GYS1 variant"
definition: >-
  Glycogen synthase complex which extends the oligosaccharide chain formed by homodimeric glycogenin (GYG) glycosyltransferase. GYG initiates glucose polymerization by catalyzing the formation of a short alpha (1,4)-glucosyl chain which it covalently attaches via auto-glucosylation to form a glucose 1-O-tyrosyl linkage to Tyr-195 This primer glucose chain of 8-12 residues is then further elongated by the GYG-GYS complex, successively adding alpha-1,4-linked glucose residues to the nonreducing end of the polysaccharide chain, using UDP-glucose as the sugar donor with the release of UDP after which, GYG and GYS dissociate. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
