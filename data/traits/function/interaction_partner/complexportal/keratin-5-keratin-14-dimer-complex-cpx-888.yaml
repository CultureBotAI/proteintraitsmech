identifier: ComplexPortal:CPX-888
label: "Keratin-5 - Keratin-14 dimer complex"
definition: >-
  Part of the intermediate filaments of the cytoskeleton. Mostly found in skin. Mutations in either KRT5 or KRT14 can result in epidermolysis bullosa simplex (EBS). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
