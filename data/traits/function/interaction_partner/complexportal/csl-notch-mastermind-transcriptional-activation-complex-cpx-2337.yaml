identifier: ComplexPortal:CPX-2337
label: "CSL-Notch-Mastermind transcriptional activation complex"
definition: >-
  Transcriptional activation complex. Assembles in the nucleus following engagement of a Notch receptor ligand which results in the release of the intracellular portion of Notch (ICN, NICD or Notch-Intra) from the membrane allowing this to translocate to the nucleus. The complex binds to the promoter of genes containing a conserved pair of CSL binding sites in a psuedo-symmetrical head-to-head orientation that are separated by 15-19 base pairs - a Su(H)-paired site or sequence paired site (SPS). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
