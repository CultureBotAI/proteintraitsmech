identifier: ComplexPortal:CPX-2708
label: "KIP1 E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which is found only in males. Highly enriched in testis where it plays a role in sperm storage. Required for the polycystin-2 protein, Amo (Q9VK95), to reach the tip of the sperm tail. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
