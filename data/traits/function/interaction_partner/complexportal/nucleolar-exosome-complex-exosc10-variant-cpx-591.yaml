identifier: ComplexPortal:CPX-591
label: "Nucleolar exosome complex, EXOSC10 variant"
definition: >-
  3'-5' exoribonuclease complex that is involved in RNA maturation and degradation which include the removal of unstable and aberrant transcripts and may also regulate the levels of specific transcripts in response to environmental factors. Restricted to processing linear and circular single-stranded RNAs only. RNAs with complex secondary structures, particularly at the 3' end of the molecule, may have to be unwound or pre-processed by co-factors prior to entering the complex. Although some RNAs may be targeted directly to the catalytic subunit, the majority of substrates enter the barrel-like structure of the exosome through a pore at the centre of the cap and are threaded through the central channel in a 3-prime to 5-prime orientation. The exoribonuclease activity of the catalytic subunit facilitates the degradation process. A number of different exosome variants exist in the cell that are distinguished by the inclusion of their respective catalytic subunit(s): the main cytoplasmic exosome with DIS3L (CPX-592) or DIS3L and EXOSC10 (CPX-600), the main nuclear exosome with DIS3 and EXOSC10 (CPX-476), the nucleolar exosome with EXOSC10 (this complex) and a rare variant found in both, the nucleus and cytosol, (CPX-593). The precise function of the nucleolar RNA exosome has not been determined but as it shares the EXOSC10 subunit with the nuclear exosome it is thought its functions are related. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
