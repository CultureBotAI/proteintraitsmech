identifier: ComplexPortal:CPX-8576
label: "GABA-A receptor, alpha5-beta2-gamma2"
definition: >-
  Ligand-gated chloride channel which acts as the main driver of fast inhibitory neurotransmission in the nervous system. GABA (CHEBI:16865), the major inhibitory neurotransmitter in the vertebrate brain, mediates neuronal inhibition by binding to the GABA/benzodiazepine receptor and opening a chloride ion-selective pore. GABA-A receptor assemble in specific combinations of receptor subunits from a pool of nineteen in a cell-type specific manner, giving rise to receptors with distinct distributions and functions in both physiological and disease states. Predominantly expressed in the cerebral cortex, the GABA-A, alpha-5 receptor subtypes constitute less than 5% of the entire receptor population but up to 25% of the receptor subtype are located in the crucial learning and memory-associated area of the brain; the hippocampus. Largely absent at GABAergic synapses, exhibit little synaptic phasic inhibition, but abundant in the dendritic regions of extrasynaptic sites, and mediate tonic inhibition with continuously occurring smaller amplitude. Their many allosteric sites, which bind compounds with anticonvulsant, anti-anxiety, analgesic, sedative and anaesthetic properties make GABA-A receptors attractive drug targets: 1) Positive allosteric modulation of GABA-A alpha-5 receptor subtypes can selectively decrease hippocampal activity and reverse psychosis-like physiological and behavioural changes in rats; may potentially help treat patients with post-traumatic stress disorder (PTSD) and comorbid psychosis; allopregnanolone (CHEBI:50169), a naturally occurring progesterone derivative, is a PAM referred to as brexanolone when used for the medical treatment of moderate to severe postpartum depression. 2) Negative-allosteric modulators for reducing their tonic inhibition have been shown to enhance learning and memory in neurological disorders such as schizophrenia, Down syndrome, and autism with a possible alternative benzodiazepine binding site. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
