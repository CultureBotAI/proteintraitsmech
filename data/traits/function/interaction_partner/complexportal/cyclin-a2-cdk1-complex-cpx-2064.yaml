identifier: ComplexPortal:CPX-2064
label: "Cyclin A2-CDK1 complex"
definition: >-
  Contributes to G1 to S and G2 to M cell cycle progression in somatic cells by activating DNA replication and preventing subsequent re-replication. Complex formation enables substrate binding to the kinase, leads to a rearrangement of the catalytic site and exposes Thr-161 of CDK1 for phosphorylation and subsequent activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
