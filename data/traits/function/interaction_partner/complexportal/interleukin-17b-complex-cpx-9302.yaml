identifier: ComplexPortal:CPX-9302
label: "Interleukin-17B complex"
definition: >-
  A proinflammatory cytokine. Member of the IL17 family which consists of six structurally related cytokines: IL17A (CPX-9301), IL17B (this complex), IL17C (CPX-9305), IL17D, IL25 (CPX-9306) and IL17F (CPX-9303). Expressed by CD4+ type 17 helper cells and Tc17 cells, IL17 is also produced by several innate immune cells. Unrestrained IL17 signalling is associated with autoimmune diseases and cancer progression, but it is also crucial for protection from fungal and bacterial infections, including the commensal Candida albicans and Klebsiella pneumoniae. Both IL17B and IL25 promote IL33-driven (O95760) type 2 immune responses, but perform contradictory roles in colitis; IL-25 is pathogenic and IL17B is protective. IL17B is thought to inhibit IL25 binding to IL17RA:IL17RB expressed on epithelial cells thereby limiting IL25 induced IL6 production by colonic epithelial cells. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
