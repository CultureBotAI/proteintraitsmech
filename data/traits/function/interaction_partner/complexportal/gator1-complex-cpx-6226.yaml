identifier: ComplexPortal:CPX-6226
label: "GATOR1 complex"
definition: >-
  GTPase activating complex which functions as an inhibitor of the amino acid-sensing branch of the mTORC1 pathway. In response to amino acid depletion, the complex strongly increases GTP hydrolysis by RRAGA or RRAGB within heterodimeric Rag complexes (CPX-2513, CPX-2514, CPX-2542, CPX-767) converting them to their inactive GDP-bound form. This releases mTORC1 (CPX-503) from the lysosomal surface and inhibits mTORC1 signaling The GATOR1 complex is negatively regulated by GATOR2 (CPX-6227). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
