identifier: ComplexPortal:CPX-8122
label: "CRL3 E3 ubiquitin ligase complex, KLHL22 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL22 target proteins include the transcriptional regulator IRF7 (Q92985), catalyzing its Lys-48-linked ubiquitination and proteasomal degradation and thus role in the innate immune response against DNA and RNA viruses.Also promotes Lys-48-linked polyubiquitination and degradation of DEPDC5 (O75140), an essential subunit of the GATOR1 complex (CPX-6226) which inhibits the amino acid-sensing branch of the mTORC1 pathway, Targets the glutamate dehydrogenase GLUD1 (P00367) which catalyzes the conversion of glutamate to alpha-ketoglutarate, a tricarboxylic acid (TCA) cycle intermediate. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
