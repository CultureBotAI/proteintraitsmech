identifier: ComplexPortal:CPX-4323
label: "Galactofuranose ABC transporter complex"
definition: >-
  High affinity galactofuranose transporter enabling carbon scavenging via the utilization of rarer furanose forms of sugars. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
