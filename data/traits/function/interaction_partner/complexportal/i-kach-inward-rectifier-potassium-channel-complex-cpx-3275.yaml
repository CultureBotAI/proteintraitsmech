identifier: ComplexPortal:CPX-3275
label: "I(KACh) inward rectifier potassium channel complex"
definition: >-
  The GIRK1-GIRK4, or I(KACh) potassium channel is a member of the G protein-coupled inward rectifier potassium channels. Inward rectifier potassium channels are characterized by a greater tendency to allow potassium to flow into the cell rather than out of it. I(KACh) is expressed in cardiac muscle, specifically the sinoatrial node and atria. Regulation of I(KACh) via G protein-coupled receptor signaling underlies the control of heart rate. I(KACh) channel couples to the muscarinic M2 and adenosine A1 receptors. Binding of acetylcholine or adenosine to its respective receptor activates I(KACh), which plays a crucial role in regulating the heartbeat. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
