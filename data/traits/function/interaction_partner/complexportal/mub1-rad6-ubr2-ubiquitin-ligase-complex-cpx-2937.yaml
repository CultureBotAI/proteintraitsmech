identifier: ComplexPortal:CPX-2937
label: "MUB1-RAD6-UBR2 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex. Ubiquitylates, and targets for destruction, the RPN4 (Q03465) transcription factor, which upregulates the proteasome genes. The binding of MUB1 may position the RPN4 ubiquitylation site proximal to the Ub∼RAD6 thioester and allowing the transfer of Ubiquitin from RAD6 to RPN4. MUB1 is a short-lived protein and is ubiquitinated by the UBR2-RAD6 ubiquitin conjugating enzyme (CPX-2935). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
