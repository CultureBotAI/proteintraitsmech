identifier: ComplexPortal:CPX-1014
label: "Tenascin-X complex"
definition: >-
  A matricellular glycoprotein complex of the extracellular matrix (ECM) constitutively expressed in collagen-rich connective tissues and peripheral nerves. Present in particularly highly levels in developing heart, skeletal muscles, tendons, ligaments and limbs. Plays an important role in ECM architecture, tissue integrity and in the biomechanical properties of connective tissues. Binds to and bridges collagen fibrils and regulates collagen deposition. Binds heparin but, unlike other members of the Tenascin family, does not bind fibronectin. May also interact with heparin-sulfate proteoglycan receptors. Involved in the regulation of many cellular processes such as cell adhesion, cell migration, cell fate determination or cell differentiation, epithelial cell plasticity (e.g. epithelial to mesenchymal transition or vice versa), cell proliferation and the vascular endothelial growth factor (VEGF) signaling pathway. Regulates transforming growth factor beta activation via cell adhesion by binding of the FBG-like domain (Fibrinogen-like globular domain, IPR002181) of Tenascin-X to alpha11beta1 integrin (CPX-1818). May act as a tumour suppressor. An alternative promoter and transcription start site is activated by hypoxia in the adrenal gland resulting in a transcript encoding a truncated short TNXB protein with cytoplasmic localization. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
