identifier: ComplexPortal:CPX-26532
label: "Neuronal nicotinic acetylcholine receptor complex, alpha6-beta4"
definition: >-
  Ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous nicotinic agents. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron. Mediates fast, short-lived synaptic transmission of neurotransmitters. Found in the sensory neurons of dorsal root ganglia, agonists such as nicotine (CHEBI:18723) and its synthetic derivative, tebanicline (CHEBI:234304) act as effective analgesics to modulation pain. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
