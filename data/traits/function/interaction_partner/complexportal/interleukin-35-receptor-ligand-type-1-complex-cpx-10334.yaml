identifier: ComplexPortal:CPX-10334
label: "Interleukin-35 receptor ligand type 1 complex"
definition: >-
  Inhibitory cytokine-receptor complex that plays a key role in immune regulation by promoting the expansion of regulatory T cells (Tregs) and Bregs, while simultaneously suppressing effector T cells, Th1 cells, Th17 cells and macrophages. IL35 signals through four receptors: IL12RB2 homodimers, IL6ST homodimers, IL12RB2/IL6ST heterodimers (this complex) and IL12RB2/IL27RA (Q6UWB1). Although homodimeric receptors partially mediate IL35's immunosuppressive signalling, maximal function is effected by the IL12RB2-IL6ST heterodimer. IL35 binding to IL12RB2-IL6ST induces immunosuppressive effects on Treg cells mediated through JAK1/JAK2 and STAT1/STAT4. Heterodimerization of the receptor phosphorylated by JAK1 and JAK2 promotes expression of IL12A and EBI3 leading to the generation of Foxp3-negative IL35-producing induced Treg (iTr35) cells, thereby creating a positive feedback loop to induce further iTr35 cell differentiation resulting in infectious tolerance. Suppresses autoimmune diseases by converting resting B- and T-cells into IL10 (P22301) and IL35-producing Breg and Treg cells. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
