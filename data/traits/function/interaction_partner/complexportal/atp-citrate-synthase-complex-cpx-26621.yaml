identifier: ComplexPortal:CPX-26621
label: "ATP citrate synthase complex"
definition: >-
  Catalyzes the synthesis of cytosolic acetyl coenzyme A (acetyl-CoA), a fundamental cellular building block. Complex cleaves citrate into oxaloacetate and acetyl-acetyl-CoA, the latter serving as common substrate in multiple biochemical reactions in protein, carbohydrate and lipid metabolism. Aberrant activity of ACLY has been linked to cardiovascular diseases, metabolic disorders and many cancers. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
