identifier: ComplexPortal:CPX-770
label: "Casein kinase II complex, CKA2 variant"
definition: >-
  CK2 is involved in regulation of cell cycle progression, presumably through phosphorylation of target proteins. CK2 may also have role(s) in inhibiting apoptosis.Phosphorylates serine or threonine residues proximal to acidic amino acids (consensus Ser-Xaa-Xaa-Acidic where acidic residue may be Glu, Asp, pSer or pTYr). Thought to be a dual-specificity kinase in yeast, also able to phosphorylate tyrosine residues, although with less favourable kinetic parameters. ATP or GTP can serve as a phosphate donor. Disruption of CKA1 or CKA2 is not lethal, but disruption of both is synthetic lethal. CKA1 and CKA2 functional overlap is not complete, as yeast with temperature sensitive alleles of CKA1 or CKA2 display distinct phenotypes and different combinations of CKA subunits affect substrate specificity and sub-cellular localization. Disruption of CKB1 or CKB2 causes sensitivity to NaCl and LiCl. Disruption of both CKB1 and CKB2 is not synthetic lethal, although the regulatory subunits are responsible for the structural integrity of the holoenzyme. Much of CK2B is phosphorylated on autophosphorylation site and also in a cell cycle-dependent manner. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
