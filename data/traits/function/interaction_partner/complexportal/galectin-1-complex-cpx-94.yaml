identifier: ComplexPortal:CPX-94
label: "Galectin-1 complex"
definition: >-
  Galectin-1 complex binds a wide array of complex carbohydrates and takes part in several key cellular processes such as growth regulation, adhesion of cells, and release of mediator. High expression increases tumour survival and metastasis. Contributes to intestinal inflammation suppression by induction of apoptosis in activated T cells. It is a potential target of glycomimetics such as glycoclusters. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
