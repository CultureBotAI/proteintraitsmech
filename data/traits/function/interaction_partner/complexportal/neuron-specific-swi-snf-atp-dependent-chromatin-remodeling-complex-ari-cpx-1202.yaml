identifier: ComplexPortal:CPX-1202
label: "Neuron-specific SWI/SNF ATP-dependent chromatin remodeling complex, ARID1A-SMARCA2 variant"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. Also targeted to chromatin by phosphatidylinositol-4,5-bisphosphate which promotes the complex binding to actin filaments. The complex additionally interacts with a range of nuclear receptors and the vitamin D receptor (VDR, P11473) via SMARCD subunits. The neuron-specific SWI/SNF complex is critical for the proliferation of post-mitotic neurons and regulates genes specific for dendritic growth by binding tightly with CREST (O75177). In this variant of the complex transcriptional repression is probably driven by the presence of the ARID1A subunit. During neural development a switch from a progenitor to a post-mitotic chromatin remodeling mechanism occurs as neurons exit the cell cycle and become committed to their adult state. This process requires a switch of two subunits: ACTL6A (O96019) is replaced by ACTL6B and PHF10 (Q8WUB8) replaced by DPF1 or DPF3 in neuron-specific SWI/SNF complexes. The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. It is likely that the two ATPases, SMARCA2/BRM (this complex) and SMARCA4/BRG1 (CPX-1216) do not co-occur in the same complex. SMARCD1 (BAF60A) and SMARCD3 (BAF60C) as well as DPF1 and DPF3 also may not co-occur. Mutations in several subunits affect tissue and developmental processes such as nervous system and cardiac development and maintenance of pluripotency resulting in tumorigenesis or the development of intellectual disorders. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
