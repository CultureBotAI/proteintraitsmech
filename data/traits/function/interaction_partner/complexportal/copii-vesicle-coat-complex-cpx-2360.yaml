identifier: ComplexPortal:CPX-2360
label: "COPII vesicle coat complex"
definition: >-
  Mediates formation of the membrane vesicles that export newly synthesised proteins from the endoplasmic reticulum. Gene duplications have led to expansions of most COPII proteins in vertebrates suggesting multiple complex variants exist. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
