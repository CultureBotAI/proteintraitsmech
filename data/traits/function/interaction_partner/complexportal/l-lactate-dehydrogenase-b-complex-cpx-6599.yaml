label: "L-lactate dehydrogenase B complex"
definition: >-
  Catalyzes the NAD(H)-dependent interconversion of lactate and pyruvate. Mainly expressed in cardiac muscles, erythrocytes and brain and preferentially converts lactate to pyruvate. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
