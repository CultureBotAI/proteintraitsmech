identifier: ComplexPortal:CPX-2736
label: "SKI complex"
definition: >-
  Central component of the 3'-5' cytoplasmic mRNA degradation pathway which mediates degradation by the exosome (CPX-592,CPX-600). The SKI complex appears to thread RNAs directly to the exosome, coupling the SKIV2L helicase and the exoribonuclease of the exosome through a continuous RNA channel. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
