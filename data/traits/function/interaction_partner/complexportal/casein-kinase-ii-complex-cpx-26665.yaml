identifier: ComplexPortal:CPX-26665
label: "Casein kinase II complex"
definition: >-
  Serine/threonine-protein kinase that phosphorylates substrates containing acidic residues both N- and C-terminal to the phosphorylated serine or threonine. CK2 plays an important role in Notch signaling during development of two sensory organs (eye and bristle), through its targeting of the bHLH transcription factors E(spl)m5-HLH (P13096), E(spl)m7-HLH (P13097) and E(spl)m8-HLH (P13098). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
