identifier: ComplexPortal:CPX-267
label: "HCN3 channel complex"
definition: >-
  Hyperpolarization-activated cyclic nucleotide-gated (HCN) ion channel that is activated by membrane hyperpolarization but contrary to other HCN channels, HCN3 is not activated by cAMP (which may even act as a weak inhibitor for the HCN3 channel). Exhibits selectivity for potassium over sodium ions and contributes to the native pacemaker currents in heart (If) and in neurons (Ih). Contrary to other ion-gated channels, HCN channels do not require an accessory unit but depolarisation activity is affected by optional accessory proteins such as TRIP8b (PEX5L, Q8IYB4) or lipids such as phosphatidylinositol-4,5-biphosphate. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
