identifier: ComplexPortal:CPX-4402
label: "mTORC2 complex"
definition: >-
  Serine/threonine protein kinase complex that regulates cellular processes including cell growth, survival and organization of the cytoskeleton in response to hormones and growth factors by way of, directly or indirectly, affecting the phosphorylation of several substrate proteins. While rapamycin acutely and directly inhibits mTORC1 (CPX-503), only chronic administration of rapamycin can inhibit mTORC2 in some, but not all, cell lines or tissues. There is also emerging evidence for a role for mTORC2 in cancer. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
