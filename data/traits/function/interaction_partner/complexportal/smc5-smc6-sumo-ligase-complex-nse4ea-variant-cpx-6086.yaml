identifier: ComplexPortal:CPX-6086
label: "SMC5-SMC6 SUMO ligase complex, NSE4EA variant"
definition: >-
  SUMO ligase complex with a role in homologous recombination (HR) and replication. Required for chromosome segregation at repetitive sequences. Localizes to repetitive elements such as the rDNA and telomeres where is is thought to promote and resolve HR-dependent intermediates, using ATP hydrolysis to symmetrically reel DNA into loops . The complex may promote sister chromatid homologous recombination by recruiting the SMC1-SMC3 cohesin complex (CPX-5989 and CPX-5991) to double-strand breaks. Mutations within its subunits might result in chromosome breakage syndrome. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
