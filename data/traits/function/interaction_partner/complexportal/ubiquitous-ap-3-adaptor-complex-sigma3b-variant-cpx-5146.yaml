identifier: ComplexPortal:CPX-5146
label: "Ubiquitous AP-3 Adaptor complex, sigma3b variant"
definition: >-
  Adaptor complex that links clathrin to the membrane surface of endosomal vesicles and is required for the biogenesis of specialized organelles of the endosomal-lysosomal system, such as melanosomes and platelet dense granules. Once Rab32 (Q9CZE3) and Rab38 (Q8QZZ8) are activated by BLOC-3 (CPX-5083), they interact with AP-3, AP-1 (CPX-5141, CPX-5142 and CPX-5143) and BLOC-2 (CPX-5084) complexes which function as adaptor complexes on early/recycling endosome tubules, where cargoes are loaded into vesicles or transport intermediates and transported to nascent melanosomes and platelet dense granules. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
