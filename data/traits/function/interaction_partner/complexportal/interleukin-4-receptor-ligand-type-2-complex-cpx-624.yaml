identifier: ComplexPortal:CPX-624
label: "Interleukin-4 receptor-ligand type-2 complex"
definition: >-
  Transmembrane complex formed on the binding of extracellular interleukin-4 (IL4) to either a type-1 IL4 receptor composed of IL4R and IL2RG (CPX-8834) or a type-2 IL4 receptor, composed of IL4R and IL13RA1. Ligand binding results in the assembly of the complete complex, which induces signalling mediated principally through the IL4R chain and involves activation of the transcription factor, signal transducer and activator of transcription-6 (STAT6). Signalling via the type-2 receptor occurs upon IL4 binding to IL4R first and then recruiting IL13RA1 to form the signalling complex. IL4 binding to IL4RAinduces the phosphorylation of JAK1 and JAK2 associated with IL4R and TYK2 associated with IL13RA1, resulting in STAT6 phosphorylation and translocation to the nucleus and transcription of IL4-responsive genes. IL4 mediated signalling through the IL4 receptor generates immunity to helminthic infections and enables the inactivation of toxins. Expressed in neurons, IL4R plays a key role in modulating neuronal death through STAT6 activation during ischemic attacks. Stimulating microglial phagocytosis, IL4 enables efficient clearance of apoptotic neurons allowing for repair. Systemic administration of IL4 has been shown to reduce ischemic lesions and improves neurologic function after a stroke. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
