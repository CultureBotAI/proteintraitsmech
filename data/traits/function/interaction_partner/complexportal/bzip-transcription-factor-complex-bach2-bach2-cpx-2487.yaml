identifier: ComplexPortal:CPX-2487
label: "bZIP transcription factor complex, BACH2-BACH2"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. Active as a transcriptional repressor during specific stages of B-cell development and in neuronal cells. Modulates class-switch recombination during the differentiation of mature B cells to antibody-secreting plasma cells and it is also an important regulator of apoptotic responses to oxidative stress. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
