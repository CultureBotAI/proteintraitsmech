identifier: ComplexPortal:CPX-8261
label: "CRL3 E3 ubiquitin ligase complex, KLHL40 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL40 target proteins include the transcription factor TFDP1 (Q14186) thus playing a role in skeletal muscle myogenesis. It may also ubiquitinate the GTP-binding protein SAR1A (Q9NR31), regulating membrane tubulation and the trafficking of collagen. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
