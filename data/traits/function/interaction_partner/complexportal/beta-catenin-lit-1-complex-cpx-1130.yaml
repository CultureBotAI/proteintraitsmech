identifier: ComplexPortal:CPX-1130
label: "Beta-catenin-lit-1 complex"
definition: >-
  Serine/threonine protein kinase complex. Acts as an effector in the wnt signalling pathway to control the asymmetry of cell divisions in embryogenesis by down-regulating pop-1 activity. pop-1 is a protein related to the vertebrate TCF/LEF transcription factors, and is required for cell fate decisions and in particular, for anterior/posterior cell divisions. The complex regulates pop-1 localization and is required for the pop-1/par-5 interaction. Specifically lit-1 Interacts with wrm-1 (via N-terminus); activates lit-1 kinase activity and the lit-1/wrm-1 dimer phosphorylates pop-1 at Ser-118 and Ser-127. This promotes pop-1 interaction with par-5 and translocation of pop-1 from the nucleus to the cytoplasm. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
