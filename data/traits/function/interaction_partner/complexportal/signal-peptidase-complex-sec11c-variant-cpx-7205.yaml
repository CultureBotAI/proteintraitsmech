identifier: ComplexPortal:CPX-7205
label: "Signal peptidase complex, SEC11C variant"
definition: >-
  Catalyzes the cleavage of N-terminal signal sequences of proteins targeted to the endoplasmic reticulum. The complex cleaves the signal peptides of most secretory and many membrane proteins as soon as the lumenal domain of the translocating polypeptide is large enough to expose its cleavage site to the enzyme, during the translocation of the protein through the translocon pore into the endoplasmic reticulum. The complex specifically cleaves N-terminal signal peptides that contain a hydrophobic alpha-helix (h-region) shorter than 18-20 amino acids. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
