identifier: ComplexPortal:CPX-8568
label: "Vacuolar transporter chaperone complex, VTC2 variant"
definition: >-
  High-molecular-weight integral membrane complex enriched at the vacuolar membrane, but also localizes to other cellular compartments. VTC proteins have been implicated in several membrane-related processes, such as sorting of H+-translocating ATPases, endocytosis, ER-Golgi trafficking, vacuole fusion, vacuolar polyphosphate homeostasis and the microautophagic scission of vesicles into the vacuolar lumen. May bind calmodulin during some, or all, of these processes. This VTC2 variant is mostly located at the ER and nuclear envelope. VTC5 (P38966) can associate with the VTC complex and may act as an optional regulatory subunit. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
