identifier: ComplexPortal:CPX-6143
label: "R2TP core co-chaperone complex"
definition: >-
  Co-chaperone that works together with HSP90 in the activation and assembly of several macromolecular complexes, including RNA polymerase II, TSC1-TSC2 (CPX-6142) and mTORC1 (CPX-503). Together with URI1 prefoldin complex (CPX-6144), POLR2E (P19388), ASDURF (L0R819) and WDR92 (Q96MX6) it forms the PAQosome complex (CPX-6145), which also acts as co-chaperone, but with different target specificities. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
