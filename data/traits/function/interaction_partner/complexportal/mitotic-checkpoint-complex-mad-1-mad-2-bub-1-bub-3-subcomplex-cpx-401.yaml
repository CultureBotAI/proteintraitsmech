identifier: ComplexPortal:CPX-401
label: "Mitotic checkpoint complex, Mad-1-Mad-2-Bub-1-Bub-3 subcomplex"
definition: >-
  This complex forms during mitosis, as a result of the activation of the spindle checkpoint. bub-3 and bub-1 are associated through the cell cycle, however, the addition of mdf-1 is cell cycle dependent. The interaction of bub-1 and mdf-1 recruits mdf-1 to unattached kinetochores during mitosis and between homologous chromosomes in early anaphase of meiosis I. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
