label: "LSM2-7 complex"
definition: >-
  Sml2-7 proteins form a complex that is found associated with snR5 and pre-Rnase P in yeast nucleoli. The function of this complex is unclear. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
