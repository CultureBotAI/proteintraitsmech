identifier: ComplexPortal:CPX-4127
label: "ZFP-1(AF10)/DOT-1 complex"
definition: >-
  Histone methylation complex which preferentially methylates 'Lys-79' of histone H3 to modulate transcription. Part of a negative feedback mechanism opposing H2B ubiquitination and contributing to the pausing of transcription elongation by RNA polymerase II that occurs on essential genes widely expressed during development. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
