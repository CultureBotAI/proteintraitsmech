identifier: ComplexPortal:CPX-26640
label: "Signal recognition particle"
definition: >-
  A conserved ribonucleoprotein particle, which includes in its structure a small cytoplasmic RNA (scRNA). In co-translational targeting of membrane and secretory proteins, SRP recognizes signal sequences as soon as they emerge from the ribosomal polypeptide exit tunnel and binds to the ribosome-nascent chain complex (RNC), leading to retardation of peptide elongation. The SRP-RNC complex is targeted to the endoplasmic reticulum (ER) membrane by interaction with the SRP receptor (SR). After docking to the membrane, the RNC is transferred to the protein-conducting channel, the translocon, and protein synthesis continues. The SRP-SR complex dissociates from the ribosome and, as a result of GTP hydrolysis, SRP and SR dissociate from each other. The genes encoding scR1 and SRP54 are not essential for growth, although SRP-deficient cells grow poorly, suggesting that an alternative, SRP-independent targeting pathway(s) to the ER membrane exists. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
