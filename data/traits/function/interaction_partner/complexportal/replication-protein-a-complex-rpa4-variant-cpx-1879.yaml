identifier: ComplexPortal:CPX-1879
label: "Replication protein A complex, RPA4 variant"
definition: >-
  Single-stranded DNA binding protein complex involved in processes that involve single-stranded DNA (ssDNA) by binding to and protecting exposed ssDNA from nucleases and preventing formation of secondary structures. Forms a physical platform to recruit other factors to the DNA involved in DNA repair. Involved in DNA repair via support for DNA synthesis by DNA polymerase delta (CPX-2097) in the presence of PCNA (CPX-538) and RFC (CPX-415). The complex does not play a role in chromosomal DNA replication or cell cycle progression through S-phase. This appears to be due to a reduced interaction with DNA polymerase alpha:primase (CPX-2087), required for DNA replication initiation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
