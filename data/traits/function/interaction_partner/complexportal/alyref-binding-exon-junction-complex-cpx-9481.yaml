identifier: ComplexPortal:CPX-9481
label: "ALYREF-binding exon junction complex"
definition: >-
  Exon junction complexes (EJCs) are multi-protein complexes (CPX-680,CPX-682, CPX-1941, CPX-1942) that help regulate mRNA metabolism. There are on average eight EJC binding sites per human mRNA, making them a major component of mature ribonucleoprotein complexes (mRNPs). EJCs selectively bind mRNPs through close association with the transcription-export complex (TREX) complex (CPX-2488, CPX-7261). TREX selectively recognizes mRNPs through its subunits ALYREF (this complex) and DDX39B. ALYREF is initially recruited by the Nuclear cap binding complex (CPX-1427) but its binding to the mRNA relies on the splicing and deposition of EJCs. EJC's and their auxiliary factors have considerable influence over the nonsense mediated mRNA decay pathway and their dysfunction is thought to be implicated in developmental and neurological diseases. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
