identifier: ComplexPortal:CPX-8406
label: "ZNT2 proton-coupled zinc antiporter homodimer"
definition: >-
  Proton-coupled zinc ion antiporter which is expressed in specialized secretory tissues, including the mammary gland where it imports Zn2+ into vesicles for secretion into milk during lactation. Relocates to the lysosomes and activates lysosomal-mediated cell death during early mammary gland involution. Associated with the inner mitochondrial membrane and acts as an auxiliary Zn2+ importer into mitochondria in mammary cells. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
