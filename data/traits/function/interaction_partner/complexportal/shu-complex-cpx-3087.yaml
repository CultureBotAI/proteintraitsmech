identifier: ComplexPortal:CPX-3087
label: "Shu complex"
definition: >-
  Role in the early stages of the homologous recombination DNA damage repair process. Recruits the Rad55-Rad57 complex (CPX-3139) and the homologous recombination machinery to the sites of single-stranded DNA gaps left by replication-blocking lesions to complete error-free DNA-damage tolerance. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
