identifier: ComplexPortal:CPX-690
label: "Beta-hexosaminidase B complex"
definition: >-
  Hydrolyses the terminal non-reducing N-acetyl-D-hexosamine residues, such as N-acetylglucosamine and N-acetylgalactosamine, which are beta-linked to oligosaccharides, glycolipids, glycoproteins, and glycosaminoglycans (GAGs). Facilitates the degradation of GAGs in lysosomes of the central and peripheral nervous system. Member of the Family 20 glycoside hydrolases (glycosidase). Active predominantly on water-soluble neutral substrates. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
