identifier: ComplexPortal:CPX-261
label: "HCN1 channel complex"
definition: >-
  Hyperpolarization-activated cyclic nucleotide-gated (HCN) ion channel that is dually activated by hyperpolarization and binding of cAMP to their cyclic nucleotide binding domain (CNBD) thereby releasing the tonic inhibition exerted by the cytoplasmic CNBD on the channel pore. Contrary to other HCN channels, HCN1 CNBD tetramerises at basal cAMP concentrations and therefore only exhibits a moderate response to cAMP binding. Located presynaptically. Exhibits weak selectivity for potassium over sodium ions and contributes to the native pacemaker currents in heart (If) and in neurons (Ih). Contrary to other ion-gated channels, HCN channels do not require an accessory unit but depolarisation activity is affected by optional accessory proteins such as TRIP8b (PEX5L, Q8IYB4) or lipids such as phosphatidylinositol-4,5-biphosphate. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
