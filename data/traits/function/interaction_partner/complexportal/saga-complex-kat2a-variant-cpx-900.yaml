identifier: ComplexPortal:CPX-900
label: "SAGA complex, KAT2A variant"
definition: >-
  A histone acetyltransferase transcriptional co-activator complex that preferably acetylates histone H3 and possibly H4. Acetyl-CoA-dependent and appears to require the presence of ATP-dependent chromatin remodeling factors to enable its coactivator activity. Recruited to the promoter region by co-operatively binding to factors such as MYC (P01106) and TP53 (P04637). Also has histone H2A and H2B deubiquitinase activity which counteracts heterochromatin silencing. Interacts with the UV-damaged DNA binding proteins DDB1 (Q16531) and DDB2 (Q92466), suggesting possible roles in transcription-coupled pre-mRNA splicing and DNA damage repair. SAGA complex has also been called STAGA complex, it is considered as the same complex in later publications (PMID:19114550, 25111486, 18206972, 15115762). The subunit composition also largely overlaps with TFTC complex (CPX-903) which has been separately described but may prove to be a different form of the same complex. A curated stable macromolecular complex (Complex Portal) with 20 subunits.
