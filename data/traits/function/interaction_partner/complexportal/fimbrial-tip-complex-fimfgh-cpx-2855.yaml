identifier: ComplexPortal:CPX-2855
label: "Fimbrial Tip Complex FimFGH"
definition: >-
  Forms the linear tip of the Type1 fimbria, a macromolecular cell surface structure required for cellular adhesion. The fimbria consists of a 1-2 um long fimbrial rod, built by thousands of copies of the non-adhesive major subunit, FimA (P04128). The tip is optimized to have a dual functionality: flexible exploration and force sensing. The FimFGH subunits interact through donor strand complementation where a beta-strand from one subunit completes the beta-sandwich structure of the neighboring subunit. FimH contains a lectin domain which binds mannose derivatives on the surface of neighboring cells. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
