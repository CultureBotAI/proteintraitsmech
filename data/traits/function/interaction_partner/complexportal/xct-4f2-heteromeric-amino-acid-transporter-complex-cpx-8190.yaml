identifier: ComplexPortal:CPX-8190
label: "XCT-4F2 heteromeric amino acid transporter complex"
definition: >-
  Amino acid transporter which catalyses the transmembrane electroneutral exchange of intracellular glutamate for extracellular cysteine thus playing an important role in the maintenance of the redox balance in cells by providing cysteine for glutathione biosynthesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
