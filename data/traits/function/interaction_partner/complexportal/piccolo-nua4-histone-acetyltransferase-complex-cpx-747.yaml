identifier: ComplexPortal:CPX-747
label: "Piccolo NuA4 histone acetyltransferase complex"
definition: >-
  Histone acetyltransferase complex which is involved in transcriptional activation of selected genes, principally by acetylation of nucleosomal histone H4 and H2A. Also acts as the catalytic core of the NuA4 histone acetyltransferase complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
