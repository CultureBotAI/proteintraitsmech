identifier: ComplexPortal:CPX-5541
label: "MutHLS methyl-directed mismatch repair complex"
definition: >-
  Mismatch repair complex, involved in the recognition and repair of base-base and small insertion/deletion mismatches that appear as a consequence of DNA polymerase errors during replication or homologous recombination. Strand recognition necessary for removal of DNA biosynthetic errors from the daughter strand is based on the transient absence of d(GATC) methylation in newly synthesized DNA (hemimethylation). Repair is initiated by the binding of mutS to a mismatch or to a small insertion-deletion loop. Assembly of the rotation-coupled diffusion-mediated MutHLS complex leads to activation of the mutH endonuclease which can cleave either side of the mismatch and increases mutH interactions with the mismatched DNA by at least 1000-fold, dramatically enhancing its GATC incision activity. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
