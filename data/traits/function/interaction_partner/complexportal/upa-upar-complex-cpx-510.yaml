identifier: ComplexPortal:CPX-510
label: "uPA-uPAR complex"
definition: >-
  Regulates the activity of the plasminogen activation system, an extracellular proteolytic cascade. uPAR (Plaur) localizes uPA (Plau) and its zymogen form, pro-uPA, to the cell surface. Activated uPA cleaves the zymogen plasminogen (P20918), generating the protease plasmin. Plasmin cleaves a range of extra-cellular matrix components, is essential for fibrinolysis, the degradation and clearance of fibrin blood clots, and activates matrix metalloproteases, affecting a number of physiological and disease processes including tumor growth and metastasis, angiogenesis and inflammation. May also mediates the proteolysis-independent signal transduction activation effects of uPA. uPAR is subject to negative-feedback regulation by uPA which cleaves it into an inactive form. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
