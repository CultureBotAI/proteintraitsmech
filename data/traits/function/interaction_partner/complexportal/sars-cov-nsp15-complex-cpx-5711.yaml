identifier: ComplexPortal:CPX-5711
label: "SARS-CoV NSP15 complex"
definition: >-
  The SARS-CoV coronavirus uridylate-specific endoribonuclease complex which cleaves RNA of uridylates through the formation of a 2′-3′ cyclic phosphodiester and 5'-hydroxyl termini, acting on both, single-and double stranded RNA. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
