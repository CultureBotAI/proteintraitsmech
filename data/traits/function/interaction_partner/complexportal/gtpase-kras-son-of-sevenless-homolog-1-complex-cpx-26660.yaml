identifier: ComplexPortal:CPX-26660
label: "GTPase KRAS - Son of sevenless homolog 1 complex"
definition: >-
  A RAS GTPase complex responsible for intracellular transduction of signals received through cell-surface receptor tyrosine kinases. KRAS and SOS1 allosterically activate each other: binding of inactive KRAS.GDP to SOS1 stimulates SOS1 nucleotide exchange activity which in turn leads to KRAS binding GTP in place of GDP. KRAS accounts for around 85% of RAS-related mutations which lead to several cancers (including pancreatic, colon and small intestine) and rasopathies and of these, the more abundant KRAS-4B isoform (P01116-2) is dominant. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
