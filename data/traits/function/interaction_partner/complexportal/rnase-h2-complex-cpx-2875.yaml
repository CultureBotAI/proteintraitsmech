identifier: ComplexPortal:CPX-2875
label: "RNase H2 complex"
definition: >-
  Specifically degrades the RNA species of RNA:DNA duplexes and removal of ribonucleotides misincorporated in genomic DNA, thus, preventing genomic instability and the accumulation of aberrant nucleic acid. Participates in DNA replication, possibly by mediating the removal of lagging-strand Okazaki fragment RNA primers during DNA replication. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
