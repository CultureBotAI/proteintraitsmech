identifier: ComplexPortal:CPX-5626
label: "Ornithine transcarbamoylase complex, argFFI variant"
definition: >-
  Catalyzes the first reaction in the urea cycle, in which l-ornithine is carbamoylated via transfer of the carbamoyl group from carbamoyl phosphate (CP) to form citrulline. Required for arginine biosynthesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
