identifier: ComplexPortal:CPX-1705
label: "BUD14-GLC7 phosphatase complex"
definition: >-
  Protein phosphatase complex which is important for bud site selection. Regulates microtubule dynamics at the cortex by acting as a specific activator of the dynein complex at the bud cortex. May also play a role in the regulation of transcription by the CCR4-NOT complex (CPX-1800) by phosphorylating and modifying the activity of the MSN2 transcription factor (P33748). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
