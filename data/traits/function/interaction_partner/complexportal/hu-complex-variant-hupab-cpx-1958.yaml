identifier: ComplexPortal:CPX-1958
label: "HU complex, variant hupAB"
definition: >-
  Non-sequence specific DNA binding protein complex that is capable of wrapping DNA forming nucleosome-like structures. May play a role in replication initiation, transcription, DNA repair and protect DNA against UV or gamma radiation. Binds with high affinity to structurally distorted, kinked or distorted DNA and double-stranded DNA containing a single-stranded break but also has a key architectural roles in DNA nucleoid compaction and in constraining negative supercoils in DNA via largely sequence-independent DNA binding. Introduces flexible bends (10-180 degrees) into DNA. HU also causes stiffening of DNA at high concentrations. Also binds to dnaA during replication initiation as does the alpha homodimer (CPX-1959). The alpha/beta heterodimer is predominantly present during the transition phase, end of exponential phase and stationary phase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
