identifier: ComplexPortal:CPX-1076
label: "mCRD-poly(A)-bridging complex"
definition: >-
  mRNA-bridging complex that forms between the 3-prime poly(A) tail and the major coding-region determinant of instability (mCRD) domain. Protects mRNA containing an mCRD domain prior to translation by stabilizing the poly(A) tail/PABP complex, thus blocking poly(A) nuclease access to the poly(A) tail. During translation, ribosomal movement up to or across the mCRD displaces or reorganizes the bridging complex, thereby allowing formation of metastable structures which expose the poly(A) tail to nuclease attack. The complex is disrupted by competitive binding of PAIP2 (Q9BPZ3) to PABPC1, thus displacing PAIP1 from PABPC1 and PABPC1 from the poly(A) tail leading to premature deadenylation and mRNA decay. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
