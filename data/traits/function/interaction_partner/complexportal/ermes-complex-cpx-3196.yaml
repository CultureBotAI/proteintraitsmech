identifier: ComplexPortal:CPX-3196
label: "ERMES complex"
definition: >-
  The ERMES complex serves as a physical connection between the endoplasmic reticulum (ER) and the mitochondrion. The complex, or simply the physical connection provided by the complex, may facilitate transfer of lipids, calcium ions, or other metabolites between the organelles. Mitochondrial nucleoids are located near ERMES, and the complex is required for accurate segregation of the mitochondrial genome. Mutations is any of the complex subunit genes confer aberrant mitochondrial morphology and inheritance. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
