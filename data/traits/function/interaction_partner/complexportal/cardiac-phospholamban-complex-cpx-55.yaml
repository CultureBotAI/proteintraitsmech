identifier: ComplexPortal:CPX-55
label: "Cardiac phospholamban complex"
definition: >-
  The cardiac PLN complex is a homopentamer found in the sarcoplasmic reticulum (SR) membrane of the cardiomyocytes and acts as a regulator of intracellular calcium levels. Therefore, cardiac PLN is a main determinant of muscle contraction and relaxation. In the unphosphorylated form PLN inhibits the sarco(endo)plasmic reticulum calcium ATPase (SERCA), a membrane protein responsible for the pumping most of the calcium from the cytoplasm to the SR, thereby causing a relaxation of myofibrils. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
