identifier: ComplexPortal:CPX-8732
label: "GABA-A receptor, beta3-delta complex"
definition: >-
  Ligand-gated chloride channel which acts as the main driver of fast inhibitory neurotransmission in the nervous system. GABA-A receptor (beta-3/delta) binding to histamine (CHEBI:35678) is thought to promote wakefulness. Assemble in specific combinations of receptor subunits from a pool of nineteen in a cell-type specific manner, giving rise to receptors with distinct distributions and functions in both physiological and disease states. Their many allosteric sites, which bind compounds with anticonvulsant, anti-anxiety, analgesic, sedative and anaesthetic properties make GABA-A receptors attractive drug targets. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
