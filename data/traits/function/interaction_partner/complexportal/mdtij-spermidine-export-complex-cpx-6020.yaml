label: "MdtIJ spermidine export complex"
definition: >-
  Catalyzes spermidine:proton antiport activity where the proton motive force provides the driving force for spermidine efflux. May transport other, generally cationic, compounds. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
