identifier: ComplexPortal:CPX-4625
label: "ubc-13-uev-1 ubiquitin-conjugating enzyme E2 complex"
definition: >-
  Implicated in the non-proteolytic regulation of signaling pathways by contributing to the addition of lysine 63-linked ubiquitin chains to proteins. Transfers the thioester-bound donor ubiquitin from ubc-13 onto the uev-1 catalytically inactive E2 variant. The heterodimer then catalyzes the formation of multiubiquitin chains linked by isopeptide bonds between Lys-63 and the C-terminus of the next monomer in the chain. This type of polyubiquitination does not lead to protein degradation by the proteasome but instead mediates activation of target genes by activating intracellular signaling cascades. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
