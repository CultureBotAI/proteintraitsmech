identifier: ComplexPortal:CPX-2349
label: "eIF4E-CYFIP1-FMRP translational repressor complex"
definition: >-
  Represses the translation of specific classes of mRNAs by competing with the binding of eIF4G to m7GTP cap-bound eIF4E on the 5′UTR of mRNA. The complex is present at synapses and synaptic activity releases CYFIP1 from eIF4E, as well as from bound RNAs, resulting in the alleviation of translation repression. Complex formation increases in presence of the brain cytoplasmic RNA BC1. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
