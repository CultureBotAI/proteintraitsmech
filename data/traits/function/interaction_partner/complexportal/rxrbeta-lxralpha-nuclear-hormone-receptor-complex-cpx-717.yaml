identifier: ComplexPortal:CPX-717
label: "RXRbeta-LXRalpha nuclear hormone receptor complex"
definition: >-
  Member of the nuclear receptor (NR) family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in cellular differentiation, proliferation and apoptosis. Liver X receptors (LXR) function as transcription factors that mediate cholesterol, glucose and lipid metabolism and reverse cholesterol transport. The 9-cis retinoic acid receptor (retinoid X receptor, RXR) is an important member of the nuclear receptor family because it forms heterodimers with many other receptors, including the all-trans retinoic acid receptor (RAR). The effects of ligands on LXR, RXR, and other NRs are mediated through the ligand-binding domain (LBD). Upon ligand binding, the LBD undergoes a conformational change that results in the release of corepressors, the recruitment of coactivators, and the activation of transcription. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
