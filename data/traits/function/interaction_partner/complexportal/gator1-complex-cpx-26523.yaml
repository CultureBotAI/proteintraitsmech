identifier: ComplexPortal:CPX-26523
label: "GATOR1 complex"
definition: >-
  GTPase activating complex which functions as an inhibitor of the amino acid-sensing branch of the TORC1 pathway. In response to amino acid depletion, the complex strongly increases GTP hydrolysis by RRAGAB within the heterodimeric Rag complex (CPX-26516) converting the protein to its inactive GDP-bound form. This releases TORC1 (CPX-26512) from the lysosomal surface and inhibits TORC1 signaling The GATOR1 complex is negatively regulated by GATOR2 complex (CPX-26527). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
