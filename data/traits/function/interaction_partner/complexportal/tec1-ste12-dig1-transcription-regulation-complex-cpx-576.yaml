identifier: ComplexPortal:CPX-576
label: "Tec1/Ste12/Dig1 transcription regulation complex"
definition: >-
  Translational repressor complex which binds to the filamentation response elements (FREs) on filamentous growth-specific target genes and, at much lower levels, at the pheremone response elements (PREs) of mating genes. Upon pheromone stimulation, Fus3 MAPK (P16892) phosphorylates members of the Ste12 complex leading to dissociation and/or conformational change of the complex and to relief of Ste12 repression. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
