identifier: ComplexPortal:CPX-4305
label: "DHIC complex"
definition: >-
  Inhibitory complex which modulates longevity by sequestering the heat-shock transcription factor hsf-1 to negatively regulate its binding to DNA and transcriptional activity. Phosphorylation of ddl-1, possibly by the insulin/IGF-1-like signalling (IIS) pathway, promotes the dissociation of the complex and activates the hsf-1-induced transcription of stress response and longevity genes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
