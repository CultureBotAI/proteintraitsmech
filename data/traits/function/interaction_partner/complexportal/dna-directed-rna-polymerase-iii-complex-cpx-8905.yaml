identifier: ComplexPortal:CPX-8905
label: "DNA-directed RNA polymerase III complex"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3-prime end of an RNA transcript. Responsible for the transcription of genes encoding small structured RNAs such as tRNAs, the 7 SL lncRNA, spliceosomal U6 snRNA and ribosomal 5S RNA. Pol III machinery recognizes conserved promoter elements located within the transcribed region, generally the box A and box B sequences, which contribute to the D- and T-loops in the tRNA structure. rpc6, rpc31 and rpc82 play a role in transcription initiation whereas the rpc37-rpc53 heterodimer is crucial for the correct recognition of the termination signals of class III genes. rpc11 is required for RNA cleavage. Pol III is capable of reinitiating transcription more rapidly on the same gene after the first transcription cycle without being released (facilitated reinitiation), resulting in a higher initiation efficiency; this appears to require an rpc11-dependent conformational change of Pol III. The core complex is believed to assemble in the cytoplasm before being transported to the nucleus. A curated stable macromolecular complex (Complex Portal) with 17 subunits.
