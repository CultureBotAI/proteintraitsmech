identifier: ComplexPortal:CPX-695
label: "Adenylyl cyclase complex"
definition: >-
  An adenylate cyclase complex probably required for an enhanced response of adenylyl cyclase to activated RAS family members. Adenylyl cyclase catalyzes the synthesis of a second messenger, cAMP. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
