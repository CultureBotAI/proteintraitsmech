identifier: ComplexPortal:CPX-2412
label: "CRL4-DCAF14 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor PHIP/DCAF14. The complex is active in stabilizing stalled replication forks, protecting nascent DNA from nuclease-mediated digestion. This activity is RAD51-dependent. PHIP binds replication origins and recruits the complex to chromatin prior to DNA replication. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
