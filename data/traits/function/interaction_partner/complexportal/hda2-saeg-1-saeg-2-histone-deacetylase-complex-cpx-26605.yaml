label: "HDA2-SAEG-1-SAEG-2 histone deacetylase complex"
definition: >-
  Class I histone deacetylase complex specifically recruited by activated nuclear egl-4 (O76360) to regulate gene expression related to behavioral and physiological responses to cGMP, including the regulation of the egg-laying rate and body length. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
