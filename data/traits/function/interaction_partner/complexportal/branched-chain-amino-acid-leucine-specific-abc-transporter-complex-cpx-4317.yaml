identifier: ComplexPortal:CPX-4317
label: "Branched chain amino acid, leucine-specific ABC transporter complex"
definition: >-
  High-affinity branched-chain amino acid transport system, catalysing the uptake of the branched chain amino acids, such as L-leucine and the non-polar, aromatic amino acid, phenylalanine. Amino acids such as isoleucine and valine are not thought to bind with appreciable affinity. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
