identifier: ComplexPortal:CPX-1152
label: "ARGR-MCM1 transcription regulation complex"
definition: >-
  Transcriptional regulation complex which binds, in the presence of arginine, to the promoter regions of genes co-regulated by arginine, repressing the synthesis of five anabolic enzymes, e.g. ornithine carbamoyltransferase and inducing the synthesis of two catabolic enzymes, e.g. arginase. The inositol polyphosphate multikinase, ARG82 appears to be required for the recruitment and stability of complex components but its activity in this complex has not been linked to its enzymatic activity. ARG82 is not required for the formation of an arginine-dependent protein-DNA complex in vitro so may not be a component of the mature complex. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
