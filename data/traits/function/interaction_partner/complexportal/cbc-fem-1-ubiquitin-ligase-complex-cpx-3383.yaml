identifier: ComplexPortal:CPX-3383
label: "CBC-fem-1 Ubiquitin Ligase complex"
definition: >-
  Member of the CBC (Cullin-2-Elongin-B-Elongin-C) E3 ubiquitin ligase family. Complexes within this family mediate the ubiquitination and subsequent proteasomal degradation of target proteins involved in cell cycle progression, signal transduction, transcription and transcription-coupled nucleotide excision repair. The substrate recognition subunit binds substrates, positioning them for ubiquitination by ubiquitin-conjugating enzymes (E2s) that bind to the complex through the E3 ubiquitin ligase rbx-1 (Q23457). The complex plays a role in sex-determination, specifically regulating male sexual development. Promotes the proteasomal-mediated degradation of tra-1 (P34708), a transcription repressor of male-specific genes. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
