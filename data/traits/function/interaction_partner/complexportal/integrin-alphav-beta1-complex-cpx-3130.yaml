identifier: ComplexPortal:CPX-3130
label: "Integrin alphav-beta1 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for vitronectin, cytotactin, fibronectin, fibrinogen, laminin, matrix metalloproteinase-2, osteopontin, osteomodulin, prothrombin, thrombospondin and von Willibrand Factor. Recognize the sequence R-G-D in a wide array of ligands. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
