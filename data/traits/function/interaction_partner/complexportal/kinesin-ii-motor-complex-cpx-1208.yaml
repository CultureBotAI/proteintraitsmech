identifier: ComplexPortal:CPX-1208
label: "Kinesin II motor complex"
definition: >-
  Motor complex required for intraflagellar transport (IFT) responsible for the formation and maintenance of the cilia. Together with the kinesin motor protein osm-3, the complex moves along microtubules and is required for anterograde IFT along the middle segment of the sensory neuron cilia. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
