identifier: ComplexPortal:CPX-7967
label: "SCF E3 ubiquitin ligase complex, FBXO28 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO28 target proteins include the master transcriptional regulator of the adaptive response to hypoxia HIF1A (Q16665) and also the MYC (P01106) transcription factor, ubuiqination of which by the complex stimulates MYC-p300 interactions at target promoters rather than degradation. SCF-FBXO28 activity and stability are regulated during the cell cycle by CDK1/2-mediated phosphorylation of FBXO28. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
