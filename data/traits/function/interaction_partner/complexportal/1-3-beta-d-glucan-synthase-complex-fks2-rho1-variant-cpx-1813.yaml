identifier: ComplexPortal:CPX-1813
label: "1,3-beta-D-glucan synthase complex, FKS2-RHO1 variant"
definition: >-
  Synthesizes 1,3-beta-glucan, a major structural component of the yeast cell wall and of the yeast spore wall. GSC2/FKS2 variant is active during sporulation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
