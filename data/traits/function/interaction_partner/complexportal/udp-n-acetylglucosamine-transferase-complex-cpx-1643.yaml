identifier: ComplexPortal:CPX-1643
label: "UDP-N-acetylglucosamine transferase complex"
definition: >-
  Catalyses the second step of eukaryotic N-linked glycosylation in endoplasmic reticulum, transferring an N-acetylglucosamine (GlcNAc) from UDP-GlcNAc to GlcNAc-PP-Dolichol. Alg14 is a membrane protein that recruits the cytosolic Alg13 protein to the ER, Alg13 contains the catalytic domain of the UDP-GlcNAc transferase, but cytosolic Alg13 is not active unless bound to Alg14 at the ER membrane suggesting the formation of the Alg13/14 complex is crucial for UDP-GlcNAc transferase activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
