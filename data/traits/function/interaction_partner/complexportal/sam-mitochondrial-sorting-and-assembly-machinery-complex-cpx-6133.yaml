identifier: ComplexPortal:CPX-6133
label: "SAM mitochondrial sorting and assembly machinery complex"
definition: >-
  Mediates insertion of beta-barrel proteins into the mitochondrial outer membrane. These are synthesized on cytosolic ribosomes and recognized initially by the import receptors of the translocase of the mitochondrial outer membrane (TOM40 complex CPX-6121). They are then translocated across the outer membrane via the general-import pore of the TOM40 complex and relayed to the SAM complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
