identifier: ComplexPortal:CPX-26714
label: "Inhibitor of acetyltransferases complex"
definition: >-
  Histone acetylation suppressor complex which inhibits HAT/co-activator-mediated acetylation by masking core histones and nucleosomes. Plays a regulatory role in chromatin modification and serves as a distinct mechanism of transcriptional regulation. Impairment of histone acetylation is causally linked to the cognitive decline in Alzheimer's disease. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
