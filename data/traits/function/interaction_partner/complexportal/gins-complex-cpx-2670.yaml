identifier: ComplexPortal:CPX-2670
label: "GINS complex"
definition: >-
  Required for the initiation of replication and for replication fork progression, mediating interactions with replication factors. Binds to and enhances the enzymatic function of the MCM helicase (CPX-2942) during the initiation and elongation stages of replication. Core component of the replicative helicase CMG complex that serves as the replicative helicase unwinding duplex DNA ahead of moving replication fork during chromosome duplication. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
