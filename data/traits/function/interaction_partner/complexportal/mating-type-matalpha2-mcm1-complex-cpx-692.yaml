identifier: ComplexPortal:CPX-692
label: "Mating-type MATalpha2-MCM1 complex"
definition: >-
  Transcriptional repressor with a role in determining the three cell types of Saccharomyces cerevisiae: the a and alpha haploid cells and the a/alpha diploid cell type. Binds to a 30- or 31-base-pair (bp) a-specific operator DNA, which contains the pseudosymmetric MCM1 16-bp P-box-binding site flanked on either side by alpha2-binding sites, to repress transcription of a-specific genes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
