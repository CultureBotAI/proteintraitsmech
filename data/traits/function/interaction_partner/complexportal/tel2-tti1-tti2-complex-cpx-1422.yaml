identifier: ComplexPortal:CPX-1422
label: "TEL2-TTI1-TTI2 complex"
definition: >-
  Regulates the stability of phosphatidylinositol 3-kinase-related protein kinases (PIKKs) such as TEL1 (P38110) and MEC1 (P38111), which are required for checkpoint signaling. Newly synthesized PIKK interacts with TEL2, in the TEL2-TTI1-TTI2 complex assisted by HSP90 (P02829). Phosphorylated TEL2 then appears to mediate the interaction between PIKK and R2TP complex to eventually lead to the proper assembly of PIKK. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
