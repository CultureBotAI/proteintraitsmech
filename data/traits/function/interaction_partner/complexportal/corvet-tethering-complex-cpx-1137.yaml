identifier: ComplexPortal:CPX-1137
label: "CORVET tethering complex"
definition: >-
  Multisubunit tethering complex involved in early endosomal fusions by cross-linking two membranes, and facilitating the formation of a SNARE complex during fusion.. Cooperates with Rab GTPases to capture vesicles and trap them prior to the action of SNAREs. During endosome maturation, it is replaced by the late endosomal/lysosomal HOPS complex (CPX-1136). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
