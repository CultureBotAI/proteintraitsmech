identifier: ComplexPortal:CPX-5892
label: "PspBC inner membrane stress response complex"
definition: >-
  Stress-responsive regulatory switch, which responds to membrane stresses, such as the mislocalisation of proteins to the inner membrane. Stress-induced alteration in its properties appears to lead to recruitment of pspA (P0AFM6), enabling at least a partial release of pspA from pspF (P37344) in the pspAF transcription regulation complex (CPX-5745). This allows transcription of the Psp membrane-stabilizing system through binding of pspF to the sigma factor rpoN (P24255). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
