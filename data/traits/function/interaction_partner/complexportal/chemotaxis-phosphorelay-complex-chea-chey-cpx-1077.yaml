identifier: ComplexPortal:CPX-1077
label: "Chemotaxis phosphorelay complex CheA-CheY"
definition: >-
  Plays a role in chemotaxis, the movement toward or away from chemicals. The complex is formed to activate cheY protein that then induces the change of the flagellar rotors from counterclocwise to clockwise rotation. cheA interacts with transmembrane chemoreceptors to generate stimulus signals via autophosphorylion of cheA which then serves as a phosphodonor for cheY. The P-cheY generated by this interaction binds to fliM (P06974), the switch component of the flagellar motor. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
