label: "APPBP2-Elongin C-Elongin B E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which targets degradation signals (degrons) within the C-termini of substrate proteins in a pathway termed destruction via C-end degrons (DesCEND). The C-degron is generally a motif of fewer than ten residues C-degrons ending with -Arg-X-X-Gly or -Arg-X-X-X-Gly and can be present in full-length proteins, truncated proteins or proteolytically cleaved forms.Targets include PRDM16, thus regulating the biogenesis of beige adipocytes. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
