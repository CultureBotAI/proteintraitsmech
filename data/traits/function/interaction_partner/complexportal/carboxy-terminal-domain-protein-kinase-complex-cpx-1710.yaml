identifier: ComplexPortal:CPX-1710
label: "Carboxy-terminal domain protein kinase complex"
definition: >-
  Cyclin-dependent protein that phosphorylates RNA polymerase II (RNAPII, CPX-2662) on the carboxyl-terminal repeat domain (CTD) of its largest subunit RPB1 (P04050), which is important for efficient transcription elongation, mRNA 3′-end processing, and transcription termination of small noncoding RNAs. Also plays a role in RNA polymerase I (RNAPI, CPX-1664) transcription. Increases the correct decoding of mRNA during translation elongation by phosphorylating residue Ser-238 of RPS2 (P25443), a protein of the small ribosomal subunit (CPX-1599). Directs the association of SET2 (P46995) to RNAP II, which results in the establishment of H3K36 methylation and deacetylated chromatin in the bodies of genes. Also regulates SET1-mediated H3K4 methylation which marks the 5′ end of transcribed genes, promoting association of chromatin-remodeling and histone-modifying enzymes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
