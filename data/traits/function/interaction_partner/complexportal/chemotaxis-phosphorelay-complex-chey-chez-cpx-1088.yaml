identifier: ComplexPortal:CPX-1088
label: "Chemotaxis phosphorelay complex CheY-CheZ"
definition: >-
  Plays a role in chemotaxis, the movement toward or away from chemicals. The flagellar motor of bacteria is a rotary device energized by the membrane ion gradient and the complex is required for the rotation and directional switching of the flagellum and also functions in flagellar assembly. Motor torque is produced at the top of the switch complex, where the fliG C-terminal domain bears several conserved charged residues that interact with charged groups of the stator protein motA (P09348). The directionality of the rotation is determined by binding of cheY-P to the lower part of the C-ring which switches the directionality from counter-clockwise to clockwise. The cheY-cheZ complex enhances the dephosphorylation rate of P-cheY. This dephosphorylation reduces the binding of cheY to the switch and ensures rapid locomotor responses to changes in the supply of signaling phosphoryl groups to cheY, thus enabling a continuous response to environmental changes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
