identifier: ComplexPortal:CPX-9309
label: "TNFSF14-TNFRSF6B receptor-ligand complex"
definition: >-
  Decoy receptor complex known to promote anti-apoptotic pathways. Binding to TNFRSF6B (this complex) competitively inhibits TNFSF14's interaction with LTBR (CPX-9310) and TNFRSF14 (CPX-9223). TNFRSF6B circulating in plasma and found anchored in tissues regulates TNFSF14 bioavailability in tissue microenvironments, and TNFRSF6B binds and sequesters TNFSF14 with an affinity equal to that of TNFRSF14 and LTBR. Inflammatory signals during sepsis by elipthelial and innate immune T-cells induces TNFRSF6B secretion and decoy receptor complex formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
