identifier: ComplexPortal:CPX-1091
label: "DNA polymerase zeta complex"
definition: >-
  Low-fidelity non-essential DNA polymerase that is involved in translesion DNA synthesis. Required for the majority of spontaneous mutagenesis in wild-type yeast cells, as well as for mutagenesis associated with transcription, with double-strand break repair, and with defective DNA repair. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
