identifier: ComplexPortal:CPX-3293
label: "Interleukin-23 complex"
definition: >-
  Cytokine complex that activates and stimulates proliferation of a wide range of lymphocytes, in particular memory T cells and Th17 cells, upon binding to its receptor subunits Il12rb1 (Q60837) and Il23r (Q8K4B4). Formation of the ligand-receptor complex (CPX-389) and tyrosine phosphorylation of the Il23r subunit initiates the JAK-STAT signaling cascade which ultimately activates transcription of interferon-gamma or Interleukin-17. Produced by antigen-presenting cells in response to Interleukin-18. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
