identifier: ComplexPortal:CPX-1101
label: "RNA polymerase I upstream activating factor complex"
definition: >-
  Binds tightly to the upstream element of the yeast Pol I promoter and is essential for a high level of transcription of the 35S rRNA gene. UAF has dual functions: both as a positive transcription factor for Pol I, and as a silencer for Pol II transcription of rRNA genes. Deletion of any one of the subunit protein genes encoding essential nonhistone proteins causes derepression of Pol II transcription of the 35S rRNA genes. The association of H3 and H4 with the other UAF components is important for the stability of UAF in vivo and, hence, for rRNA transcription by Pol I. Initiation of transcription requires the assembly of UAF, the core factor (CPX-1836), the TATA binding protein SPT15 (P13393), and RNAP-I (CPX-1664) with RRN3 (P36070) on the upstream element and core promoter. Upon transcription initiation, UAF, RRN3 and CF dissociate from the promoter. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
