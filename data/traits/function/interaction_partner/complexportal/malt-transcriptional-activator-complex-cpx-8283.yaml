identifier: ComplexPortal:CPX-8283
label: "MalT transcriptional activator complex"
definition: >-
  Signal transduction ATPase which transcriptionally activates the maltose system responsible for the uptake and metabolism of maltodextrins. Maltotriose binding drives oligomerization and together these stabilize the C-terminal domains of MALT, allowing cooperative binding of MalT to promoter region of its target genes, via a short DNA motif, the MalT box (5'-GGA[TG]GA-3') and enable RNA polymerase recruitment for subsequent transcription initiation. Oligomerization requires ATP binding but the ATPase activity of the protein does not appear to be required for activity. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
