identifier: ComplexPortal:CPX-1859
label: "Serine/threonine-protein phosphatase PP2A variant 3"
definition: >-
  A serine/threonine phosphatase, the activity of the catalytic subunit of which is highly regulated by members of a family of regulatory subunits, which determine the substrate specificity, (sub)cellular localization and catalytic activity of the PP2A holoenzymes. The catalytic subunits are subject to two types of post-translational modification, phosphorylation and methylation, which are also thought to be important regulatory devices. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
