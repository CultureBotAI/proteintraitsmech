identifier: ComplexPortal:CPX-5685
label: "SARS-CoV-2 main protease complex"
definition: >-
  The 3C-like protease of the SARS-CoV-2 coronavirus required for processing the polyproteins that are translated from the viral RNA. Cleaves at 11 cleavage sites on the large polyprotein 1ab (P0DTD1); the recognition sequence at most sites is [ILMVF]-Q-|-[SGACN]. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
