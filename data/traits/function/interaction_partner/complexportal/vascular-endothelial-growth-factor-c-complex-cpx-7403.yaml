label: "Vascular endothelial growth factor C complex"
definition: >-
  Binds and activates VEGFR-2 (P35968), which potently promotes angiogenesis, and VEGFR3 (P35916) which is responsible for adult lymphangiogenesis and proliferation of endothelial cells. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
