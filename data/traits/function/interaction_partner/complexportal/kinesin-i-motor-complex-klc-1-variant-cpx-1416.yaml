identifier: ComplexPortal:CPX-1416
label: "Kinesin I motor complex, klc-1 variant"
definition: >-
  Probable motor complex that is involved in the trafficking of organelles and cellular components along microtubules. The complex is recruited to the nuclear envelope to regulate nuclear migrations in hypodermal precursor cells. Its role in nuclear trafficking is through interactions with the nuclear migration protein unc-83. klc-1 interacts with unc-83 within the unc-83-unc-84 LINC complex (CPX-1385) and this recruits the motor complex to nuclear envelope where it is involved in the regulation of nuclear migrations in hypodermal precursor cells. The complex plays a role in the localization and transport of components of synaptic vesicles through interactions with the cargo adaptor protein unc-16. The complex is a component of a larger assembly that associates with microtubules through kinesin. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
