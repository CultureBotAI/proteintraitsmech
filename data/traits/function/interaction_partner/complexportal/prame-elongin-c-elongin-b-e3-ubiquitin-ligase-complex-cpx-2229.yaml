identifier: ComplexPortal:CPX-2229
label: "PRAME-Elongin C-Elongin B E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which targets epigenetically and transcriptionally active promoter regions bound by the CCAAT-binding factor complex (CPX-1956) and probably plays a role in chromatin regulation. PRAME is upregulated by signalling pathways that are activated in response to infection/inflammation and may target bacterial proteins for destruction. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
