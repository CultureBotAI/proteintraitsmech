identifier: ComplexPortal:CPX-8304
label: "UFM1 ribosome E3 ligase complex"
definition: >-
  E3 ligase which covalently attaches the ubiquitin-like modifier UFM1 (P61960) to lysine residues on substrates. Ufmylation is involved in processes such as endoplasmic reticulum-associated protein degradation, ribosome-associated protein quality control at the endoplasmic reticulum (ER), and ER-phagy that drives the removal of damaged ER. Required for the release and recycling of stalled or terminated ribosomes from the ER membrane. The presence of the substrate adapter CDK5RAP3 alters the specificity of the E3 complex from autoUFMylation of DDRGK1 to that of RPL26 (P61254), thus switching cellular processes from ER-phagy to ER-ribosome-associated protein quality control. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
