identifier: ComplexPortal:CPX-26406
label: "SPT4-SPT5 transcription elongation factor complex"
definition: >-
  An essential RNA polymerase II elongation factor which functions in the control of RNAP II processivity. Mediates both activation and inhibition of transcription elongation, and plays a role in pre-mRNA processing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
