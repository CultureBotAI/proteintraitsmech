identifier: ComplexPortal:CPX-710
label: "RXRalpha-TRbeta nuclear hormone receptor complex"
definition: >-
  Member of the nuclear receptor family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in cellular differentiation, proliferation and apoptosis. Thyroid hormone receptors (TRs) regulate gene expression in response to thyroid hormone, predominantly triiodothyronine, T3. Thyroid hormones are essential for early development and also for metabolic balance. The 9-cis retinoic acid receptor (retinoid X receptor, RXR) is an important member of the nuclear receptor family because it forms heterodimers with many other receptors, including the all-trans retinoic acid receptor (RAR). Receptors bind to T3 response elements (TREs) via their DNA-binding domains (DBD) and contain a C-terminal ligand-binding domain (LBD) that binds the hormone. Both Thrb isoforms contribute to T3 feedback on thyrotropin-releasing hormone (TRH), with Thrb1 having a more important role in the activation of TRH transcription. Unliganded receptor generally represses basal transcription. Rxra-Thrb is a non-permissive receptor that cannot be activated by an RXR agonist but only by an agonist of the dominant partner receptor, Thrb. Binding of Thrb induces a conformation changes which allosterically silences RXR. Upon ligand binding, the LBD undergoes a conformational change that results in the release of corepressors, the recruitment of coactivators, and the activation of transcription. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
