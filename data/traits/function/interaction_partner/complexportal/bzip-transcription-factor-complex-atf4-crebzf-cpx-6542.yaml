identifier: ComplexPortal:CPX-6542
label: "bZIP transcription factor complex, ATF4-CREBZF"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The DNA recognition sequence depends on the composition of the bZIP dimer with the complex either binding to the preferred region of one of the partners or to a novel bZIP cognate site. ATF4 acts both as a regulator of normal cellular processes and also coordinates the general retrograde response to stress, acting downstream of the integrated stress response signaling pathways to decrease global translation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
