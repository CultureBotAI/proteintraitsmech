label: "Catenin-Cadherin complex"
definition: >-
  Adherens junction component that regulates cell-cell adhesion during development and specifically during tissue organization. Important for gastrulation, ventral enclosure and embryonic elongation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
