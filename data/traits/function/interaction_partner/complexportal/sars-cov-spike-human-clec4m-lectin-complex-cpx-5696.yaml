identifier: ComplexPortal:CPX-5696
label: "SARS-CoV Spike - human CLEC4M lectin complex"
definition: >-
  Binding of SARS-CoV coronavirus Spike protein to human lectin CLEC4M expressed on innate immune cells and subsequent internalisation may lead to virus clearance or, on the contrary, result in spread of the virus to susceptible cells, or even other hosts. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
