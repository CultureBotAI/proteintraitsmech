identifier: ComplexPortal:CPX-11548
label: "DBF4-dependent CDC7 kinase complex"
definition: >-
  Serine/threonine-protein kinase essential for the initiation of DNA replication. Associates with replication origins where it phosphorylates components of the prereplicative complex including the MCM helicase (CPX-2940). Phosphorylates the RAD9 component of the checkpoint clamp complex component (CPX-1829) in response to replication-induced DNA damage. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
