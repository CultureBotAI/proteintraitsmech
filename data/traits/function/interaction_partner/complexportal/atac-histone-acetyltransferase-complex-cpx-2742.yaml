identifier: ComplexPortal:CPX-2742
label: "ATAC histone acetyltransferase complex"
definition: >-
  Histone acetyltransferase complex with two separate acetyltransferase enzymes with distinct preferences for histone substrates. It positively regulates gene transcription and, although it does not have any intrinsic remodeling activity, facilitates nucleosome sliding of ISWI and SWI-SNF families of chromatin-remodeling complexes. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
