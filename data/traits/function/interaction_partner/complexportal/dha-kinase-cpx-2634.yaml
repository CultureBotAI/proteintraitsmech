identifier: ComplexPortal:CPX-2634
label: "Dha Kinase"
definition: >-
  Catalyses the phosphorylation of dihydroxyacetone (Dha) using phosphoenolpyruvate (PEP) as a phosphoryl donor. Dihydroxyacetone phosphate (Dha-P) is an intermediate for the synthesis of pyruvate. The E1 domain of DhaM catalyses the phosphoryl transfer from PEP to the small (9 kDa) soluble HPr (histidine-containing phosphoryl carrier protein) domain. Phosphorylated DhaM binds to ADP-bound DhaL and transiently phosphorylates the ADP. ATP-loaded DhaL associates with DhaK containing the Dha substrate covalently bound to His-218 through a hemiaminal bond. Coenzyme, ATP-bound DhaL transfers a phosphate to Dha yielding Dha-P. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
