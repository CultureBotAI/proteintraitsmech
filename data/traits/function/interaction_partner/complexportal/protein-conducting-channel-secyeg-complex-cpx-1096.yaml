identifier: ComplexPortal:CPX-1096
label: "Protein-conducting channel SecYEG complex"
definition: >-
  Functions in both protein secretion to the trans side of the plasma membrane and insertion of membrane proteins into the lipid bilayer. Associates with the motor ATPase SecA, which drives post-translational translocation of pre-proteins across the membrane.Membrane proteins are targeted to the membrane co-translationally by the signal recognition particle (SRP) associating with its receptor at the cytosolic surface. The ribosome nascent chain complex is then passed onto the dimeric SecYEG complex and the nascent membrane protein is threaded through the protein channel and into the bilayer via a lateral gate. Also forms a holo-translocon super-complex comprising of the SecYEG core complex, the accessory sub-complex SecDF-YajC and YidC. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
