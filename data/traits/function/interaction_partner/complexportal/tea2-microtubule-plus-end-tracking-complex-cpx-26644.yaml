label: "Tea2 microtubule plus-end tracking complex"
definition: >-
  Kinesin motor complex which acts as a microtubule plus-end tracking (MPET) system crucial for establishing cell polarity by asymmetrically transporting polarity markers to the cellular cortex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
