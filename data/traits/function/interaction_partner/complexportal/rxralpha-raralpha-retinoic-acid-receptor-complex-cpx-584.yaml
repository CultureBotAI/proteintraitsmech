identifier: ComplexPortal:CPX-584
label: "RXRalpha-RARalpha retinoic acid receptor complex"
definition: >-
  Member of the nuclear receptor family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in cellular differentiation, proliferation and apoptosis. The 9-cis retinoic acid receptor (retinoid X receptor, RXR) is an important member of the nuclear receptor family because it forms heterodimers with many other receptors, including the all-trans retinoic acid receptor (RAR). RAR and RXR transduce the retinoid signal into a variety of genetic responses, and their functions underlie the essential role played by retinoids in the development and homeostasis of vertebrates. In the absence of RAR agonist, the RXR-RAR heterodimer recruits the corepressor proteins NCoR or SMRT and associated factors such as histone deacetylases or DNA-methyl transferases that may lead to an inactive condensed chromatin structure, preventing transcription. Rxra-Rara is a non-permissive receptor that cannot be activated by an RXR agonist but only by an agonist of the dominant partner receptor, Rara. Upon RAR agonist binding, corepressors are released, and coactivator complexes such as histone acetyltransferases or histone arginine methyltransferases are recruited to activate transcription. The RXR-RAR heterodimer binds more efficiently to retinoic acid response elements (RAREs), composed typically of two direct repeats of a core hexameric motif, PuG [G/T] TCA, than do either of the homodimeric forms of RXR or RAR. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
