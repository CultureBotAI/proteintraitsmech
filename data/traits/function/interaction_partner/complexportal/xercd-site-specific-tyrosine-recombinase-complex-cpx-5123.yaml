identifier: ComplexPortal:CPX-5123
label: "XerCD site-specific tyrosine recombinase complex"
definition: >-
  Catalyzes the cutting and rejoining of two consecutive pairs of recombining strands of DNA molecules thus ensuring segregation of the circular bacterial chromosome during replication. Binds to specific 11 base pair consensus sequences that are separated by a 6-8 base pair central region (the dif region) at the borders of which the DNA strands are cleaved and exchanged. xerC binds to one repeat and XerD to the other, two dif sites bound by XerCD can then be synapsed by protein-protein interactions between the two dif-XerCD complexes. The synapse of (XerCD-dif)2 is not catalytically competent; the presence of the DNA translocase ftsK (P46889) is required for cleavage to occur. xerC exchanges the top pair of DNA strands and xerD exchanges the bottom strands. Xer recombination also contributes to the segregational stability of a variety of natural multicopy plasmids by resolving multimeric forms arising from homologous recombination. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
