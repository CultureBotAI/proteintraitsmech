identifier: ComplexPortal:CPX-3213
label: "Rhino-Deadlock-Cutoff complex"
definition: >-
  Binds to dual-strand-cluster chromatin, probably via the H3K9me3-binding activity of Rhi, and licenses transcription of dual-strand PIWI interacting RNA (piRNA) source loci. piRNAs are a germline-specific class of small noncoding RNAs that protect the genome of animal germ cells from the action of transposable elements by silencing these via Piwi-piRNA complex formation. Rhi binding brings the putative termination cofactor Cuff in close proximity to the nascent piRNA precursor transcript which it appears to protect from degradation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
