identifier: ComplexPortal:CPX-1192
label: "Vacuolar proton translocating ATPase complex, Golgi variant"
definition: >-
  Translocates protons across a lipid bilayer via an ATP-driven rotary mechanism, thus acidifing the lumen of its resident organelle. As newly synthesized proteins traverse the Golgi apparatus they undergo post-translational modifications, including glycosylation, sulfation, and phosphorylation, and are targeted to their appropriate destination in a pH-dependent manner. Membrane-bound ion transporters/proton exchangers use the pH gradient to sequester metal ions to the vacuole and other cellular organelles. The combined action of the V-ATPase and membrane transporters plays a key role in maintaining cellular homoeostasis. The variant of the complex containing the STV1 subunit results in the retention of the V-ATPase complex on Golgi and endosomal membranes. The N-terminal domain of STV1 contains the W83KY sequence, which is necessary and sufficient for targeting the complex to the Golgi apparatus. When yeast cells are deprived of glucose, the V1 and VO regions separate and are no longer able to hydrolyze ATP and transport protons. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
