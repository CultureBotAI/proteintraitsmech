identifier: ComplexPortal:CPX-6223
label: "Thrombin-Thrombomodulin complex"
definition: >-
  A serine-type endopeptidase complex of the common blood coagulation pathway. Cleaves vitamin K-dependent protein C (P04070) by limited proteolysis to form activated protein C (APC, CPX-6224). APC negatively regulates blood coagulation by inactivating factors Va (CPX-6216) and VIIIa (CPX-929). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
