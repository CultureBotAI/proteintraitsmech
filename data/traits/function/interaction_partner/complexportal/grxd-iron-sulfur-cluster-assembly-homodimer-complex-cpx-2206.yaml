identifier: ComplexPortal:CPX-2206
label: "GRXD iron-sulfur cluster assembly homodimer complex"
definition: >-
  Reversibly binds [2Fe-2S] clusters and appears to play a role in Fe-S cluster assembly and trafficking, and in transferring an intact [2Fe-2S] cluster to an apo acceptor protein. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
