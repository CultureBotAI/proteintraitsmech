identifier: ComplexPortal:CPX-2255
label: "General transcription factor TFIIF complex"
definition: >-
  TFIIF is a general transcription factor associated with RNA polymerase II (CPX-2625). It prevents the non-specific interaction of RNA Pol II with DNA and stabilizes the pre-initiation complex (PIC), in particular stabilizing TFIIB within the PIC, thus .promoting initiation and elongation. May also interact with paused Pol II causing a conformational change that facilitates the re-entry into elongation mode. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
