identifier: ComplexPortal:CPX-3036
label: "PMT1-PMT2 dolichyl-phosphate-mannose-protein mannosyltransferase complex"
definition: >-
  Initiates protein O-mannosylation by catalyzing the transfer of a mannosyl residue from dolichol-phosphate-beta-D-Mannose to Ser and Thr residues of proteins in an alpha-D-mannosidic linkage. Some proteins with moderate Ser/Thr content are O-mannosylated when they are not properly folded. In the endoplasmic reticulum this removes them from folding cycles by reducing engagement with the KAR2 chaperone (P164740). O-mannosyl glycans are important for the stability, localization and/or function of various secretory and membrane proteins and hence cell wall integrity. Acts on both soluble and membrane proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
