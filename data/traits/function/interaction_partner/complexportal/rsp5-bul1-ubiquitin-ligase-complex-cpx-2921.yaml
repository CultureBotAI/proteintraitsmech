identifier: ComplexPortal:CPX-2921
label: "RSP5-BUL1 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex. Polyubiquinates plasma membrane transporters and permeases, required for their endocytosis and subsequent degradation in the vacuole. BUL1 binds to the target protein, enabling ubiquitylation by RSP5. Phosphorylation of BUL1 results in binding to 14-3-3 proteins proteins, protecting the permeases from down-regulation. Appears to be redundant with the RSP5-BUL2 ubiquitin ligase complex (CPX-2923). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
