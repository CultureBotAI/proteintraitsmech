identifier: ComplexPortal:CPX-9169
label: "Precursor interleukin-1 alpha-membrane-bound receptor type 1 complex"
definition: >-
  Complex formed on the binding of a pre-bound precursor form of interleukin-1 alpha (IL1A) and the membrane-bound form of its receptor, interleukin-1R1 (IL1R1) to its coreceptor, interleukin-1 receptor accessory protein (IL1RAP). A member of the IL1 family of cytokines, IL1A is closely related to interleukin-1 beta (IL1B, P01584) carrying out similar biological functions by binding to their shared receptor complex. Although both IL1A and IL1B function via the same IL1R1 to drive an inflammatory response, IL1A acts as an alarmin and is thought to focus its efforts on local inflammation while IL1B acts as a master regulator of systemic inflammation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
