identifier: ComplexPortal:CPX-10324
label: "IL33-IL1RL1 decoy complex"
definition: >-
  Buffering complex formed upon soluble IL1RL1 (sIL1RL1) binding to IL33 to prevent its interaction with transmembrane IL1RL1 thereby neutralizing IL33 activity in plasma and serum. sIL1RL1 is generated as a result of differential expression of two distinct promoters and alternative splicing and its secretion is thought to be promoted by type 1 cytokines. Increased serum levels of sIL1RL1 is associated with impaired IL33-IL1R1 signalling and is thought to contribute to the pathogenesis of Alzheimer's Disease. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
