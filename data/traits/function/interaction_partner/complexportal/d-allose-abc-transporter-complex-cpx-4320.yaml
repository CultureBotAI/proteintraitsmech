label: "D-allose ABC transporter complex"
definition: >-
  High affinity D-allose binding transporter, also capable of the low-affinity transport of D-ribose. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
