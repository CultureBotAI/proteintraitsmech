label: "beta1-catenin - LEF1 complex"
definition: >-
  Transcription factor complex that activates Wnt responsive genes. Binds DNA in a sequence-specific manner. Repressed by TLE1 (Q62440), TLE2 (Q9WVB2), TLE3 (Q08122) and TLE4 (Q62441). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
