identifier: ComplexPortal:CPX-2363
label: "BCDX2 complex"
definition: >-
  Functions during fork protection by restraining fork progression, driving reversed replication fork formation, presumably by assisting the central recombinase RAD51 (Q06609). It may also assist DNA translocases and RAD51 in driving parental strand reannealing. BCDX2 stimulates the nucleation and extension of RAD51 filaments,, essential for recombinational DNA repair in reactions that depend on the coupled ATPase activities of RAD51B and RAD51C. The complex binds to the intersection of the four duplex arms of the Holliday junction and to junction of replication forks and appears to be active downstream of BRCA2 recruitment and upstream of RAD51 recruitment. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
