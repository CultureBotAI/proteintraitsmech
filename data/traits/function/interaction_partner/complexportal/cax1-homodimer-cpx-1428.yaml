identifier: ComplexPortal:CPX-1428
label: "CAX1 homodimer"
definition: >-
  Cation antiporter complex that facilitates influx of cations, mainly Ca(2+) ions, into the cell and proton out of the cell. Required for normal growth and ion homeostasis. Loss of CAX1 results in a significant alteration in flowering time and disruption in Ca(2)/H(+) antiport activity. The cax1 mutant displays reduced vacuolar Ca(2+)-ATPase activity and increased expression of CAX3 (Q93Z81) and CAX4 (Q945S5). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
