identifier: ComplexPortal:CPX-2144
label: "TusBCDE complex"
definition: >-
  Involved in the sulfur-relay system required for 2-thiolation of 5-methylaminomethyl-2-thiouridine (mnm5s2U) at tRNA wobble positions. It transfers sulfur (most likely in persulfide form) from TusA (P0A890) to the TusE-MnmA complex (CPX-2145) via Cys78-TusD and Cys108-TusE. Although TusBCD complex has been crystallised it has not yet been shown experimentally that it exists in vivo without subunit TusE attached. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
