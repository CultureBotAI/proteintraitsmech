identifier: ComplexPortal:CPX-863
label: "INO80 chromatin remodeling complex"
definition: >-
  Chromatin remodeling complex with both DNA-dependent ATPase activity, as well as 3'-5' helicase activity. Mobilizes mononucleosomes in an ATP-dependent manner thus regulating a distinct subset of genes. Also involved in multiple DNA repair pathways by its nucleosome remodeling ability, by regulating the accessibility of DNA repair proteins around the DNA double strand break site and by facilitating efficient homologous recombination. A curated stable macromolecular complex (Complex Portal) with 15 subunits.
