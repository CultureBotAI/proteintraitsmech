identifier: ComplexPortal:CPX-1128
label: "Calcineurin-Calmodulin complex"
definition: >-
  A calcium-dependent, calmodulin-stimulated serine/threonine protein phosphatase complex that is activated by elevated cytoplasmic calcium ion concentrations. Important for many cellular processes including development, egg-laying, fertility, cuticle formation, proliferation, thermotaxis, behaviour and lifespan. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
