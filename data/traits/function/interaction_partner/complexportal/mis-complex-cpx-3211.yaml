identifier: ComplexPortal:CPX-3211
label: "MIS complex"
definition: >-
  The MIS complex is a methyltransferase which methylates adenosine at the N6 position to form N6-methyladenosine. mRNA methylation in Saccharomyces cerevisiae occurs only during meiosis. During meiosis, complete mRNA methylation requires MIS complex localization to the nucleolus in a Slz1-dependent manner. NDT80 also regulates Mum2 and Ime4 nucleolar localization during meiosis. Methylation of mRNA by this complex suppresses pseudohyphal development. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
