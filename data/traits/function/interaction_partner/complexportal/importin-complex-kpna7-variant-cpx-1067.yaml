identifier: ComplexPortal:CPX-1067
label: "Importin complex, KPNA7 variant"
definition: >-
  A nuclear import complex that functions as a nuclear import receptor for proteins containing a nuclear localisation signal (NLS). Subunit Kpna7 specifically and directly binds to substrates containing either a simple or bipartite NLS motif. Docking of the importin/substrate complex to the nuclear pore complex (NPC) is mediated by Kpnb1. Kpnb1 binds to nucleoporin FxFG repeats and the complex is subsequently translocated through the pore by an energy requiring, Ran-dependent mechanism. At the nucleoplasmic side of the NPC, Ran-GTP (P62827) binds to Kpnb1, the three components separate and Kpna7 and Kpnb1 are re-exported from the nucleus to the cytoplasm where GTP is hydrolysed. The directionality of nuclear import is thought to be conferred by an asymmetric distribution of the GTP- and GDP-bound forms of Ran between the cytoplasm and nucleus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
