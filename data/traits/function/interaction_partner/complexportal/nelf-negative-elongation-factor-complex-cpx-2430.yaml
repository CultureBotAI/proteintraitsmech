identifier: ComplexPortal:CPX-2430
label: "NELF negative elongation factor complex"
definition: >-
  Negatively regulates the elongation of transcription by RNA polymerase II. Required for promoter-proximal pausing when elongating Pol II pauses near the promoter, about 20-60 base pairs downstream of the transcription start site, a key event in post-initiation regulation of transcription. SUPT5H (Q9V460) docks the DSIF complex (CPX-2429) to Pol II near the RNA exit channel where it facilitates capping of the nascent RNA. NELF then recognizes the Pol II-SUPT5H interface and associates with the elongation complex as it transcribes through the promoter-proximal region. Binding of newly synthesized RNA by NELF may stabilize its interactions with elongating Pol II at specific loci. Phosphorylation of SUPT5H by P-TEFb appears to trigger dissociation of NELF from Pol II, enabling Pol II reactivation and resumption of elongation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
