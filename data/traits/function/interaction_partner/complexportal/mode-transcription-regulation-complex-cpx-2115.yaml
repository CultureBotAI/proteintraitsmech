identifier: ComplexPortal:CPX-2115
label: "modE transcription regulation complex"
definition: >-
  Transcriptional regulator involved in various aspects of molybdenum metabolism by both limiting molybdate uptake by repressing the molybdate transporter operon modABCD, and enhancing the transcription of molybdenum-dependent and of molybdenum cofactor biosynthesis enzymes. It is activated by the binding of 2 molecules of molybdate to the dimerization interface. Upon binding of molybdate, the conformation of the dimer changes probably enhancing the DNA affinity of the complex. It recognizes an 8-base inverted repeat 5'-TAACGTTA-3' flanked by two CAT boxes upstream of the modABCD operon. ModE also interacts with tungstate. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
