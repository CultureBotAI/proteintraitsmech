identifier: ComplexPortal:CPX-813
label: "Palmitoyltransferase ERF2-SHR5 complex"
definition: >-
  Palmitoyltransferase complex that catalyzes the palmitoylation of proteins through a two step reaction - the autopalmitoylation of the enzyme to create a palmitoyl-ERF2 intermediate followed by the transfer of the palmitoyl moiety to the RAS substrate. Palmitoyl-CoA serves as the palmitate donor. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
