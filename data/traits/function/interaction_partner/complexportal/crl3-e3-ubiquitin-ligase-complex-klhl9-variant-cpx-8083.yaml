identifier: ComplexPortal:CPX-8083
label: "CRL3 E3 ubiquitin ligase complex, KLHL9 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL9 target proteins include the serine/threonine-protein kinase Aurora B (Q96GD4), which as a component of the Chromosomal Passenger complex (CPX-116) ensures chromosome bi-orientation on the mitotic spindle during metaphase by phosphorylating multiple kinetochore components. AURKB also acts as a critical regulator of the assembly and disassembly of type III intermediate filaments, including vimentin and desmin suggesting a role for this complex in skeletal muscle function. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
