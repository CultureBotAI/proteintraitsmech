identifier: ComplexPortal:CPX-3188
label: Polarisome
definition: >-
  Controls thepolarized (unidimensional) cell growth in yeast and other fungi. Required for tip growth and acts as a central hub for coordinating exocytosis with actin cable formation. One of the targets of polarisome is the Rab GTPase SEC4, which associates with secretory vesicles and stimulates their fusion with the exocytic sites at the plasma membrane. Thus, the primary function of polarisome appears to be guiding polarized transport and secretion along actin cables and bringing secretory vesicles to the sites of polarized growth. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
