identifier: ComplexPortal:CPX-10328
label: "Platelet-activating factor acetylhydrolase IB complex, alpha2-alpha2 variant"
definition: >-
  Catalyzes the hydrolysis of an acetyl ester at the sn-2 position of platelet-activating factor (PAF; 1-O-alkyl-2-acetyl-sn-glycero-3-phosphocholine)) and its analogs and modulates the action of PAF. The exact substrate specificity of the enzyme is determined by the dimeric alpha subunits and is further modulated by the non-catalytic beta homodimer. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
