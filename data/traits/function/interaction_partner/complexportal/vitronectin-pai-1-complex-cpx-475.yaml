identifier: ComplexPortal:CPX-475
label: "Vitronectin-PAI-1 complex"
definition: >-
  Regulates the activity of the plasminogen activation system, an extracellular proteolytic cascade. Vitronectin binding extends the lifetime of active PAI-1, by slowing its transition to an inactive latent form, thus directly influencing angiogenesis and affecting cell adhesion and motility. Inhibits fibrinolysis, the breakdown of the fibrin clot which is the product of coagulation, transition to the inactive latent form. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
