identifier: ComplexPortal:CPX-1904
label: "Peroxisomal PEX13-PEX14-PEX17 docking complex"
definition: >-
  Facilitates the peroxoisomal-membrane docking of cargo-loaded, peroxisomal targeting signal type 1 (PTS1) and PTS2 proteins. Proteins designated for peroxisomes are synthezised on cytosolic ribosomes and are recognised by the receptor PEX5 (P35056) via their PTS1 or the PEX7-PEX18 receptor complex via their PTS2 The receptor-cargo-complexes bind to the docking-complex at the peroxisomal membrane. It is assumed that the binding between the docking complex and cargo-loaded receptors leads to the formation of a transient pore. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
