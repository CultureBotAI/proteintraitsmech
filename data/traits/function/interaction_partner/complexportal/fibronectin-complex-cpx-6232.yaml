identifier: ComplexPortal:CPX-6232
label: "Fibronectin complex"
definition: >-
  Extracellular matrix (ECM) complex that binds cell surfaces and various compounds including collagen, fibrin, heparin, DNA, and actin. Involved in cell adhesion, cell motility, opsonization, wound healing, and maintenance of cell shape. Involved in osteoblast compaction through the fibronectin fibrillogenesis cell-mediated matrix assembly process, essential for osteoblast mineralization. Participates in the regulation of type I collagen deposition by osteoblasts. Anastellin (a splice form of fibronectin) binds fibronectin and induces fibril formation. This fibronectin polymer, named superfibronectin, exhibits enhanced adhesive properties. Both anastellin and superfibronectin inhibit tumor growth, angiogenesis and metastasis. Anastellin activates p38 MAPK and inhibits lysophospholipid signaling. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
