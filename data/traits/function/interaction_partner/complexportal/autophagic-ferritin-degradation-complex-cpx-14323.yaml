identifier: ComplexPortal:CPX-14323
label: "Autophagic ferritin degradation complex"
definition: >-
  Complex formed between NCOA4 and the iron-binding ferritin complex (CPX-26673), directing it to autolysosomes to undergo ferritinophagy (a ferritin-selective autophagy process). Ferritin degradation enables the controlled release and reuse of iron, maintaining iron homeostasis. Iron is released into the labile iron pool, where it is used for essential cellular functions such as DNA synthesis, mitochondrial respiration, and erythropoiesis. The process is tightly regulated and plays a vital role in maintaining iron balance, especially during periods of iron deficiency. When ferritinophagy is disrupted, it can lead to either iron accumulation or depletion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
