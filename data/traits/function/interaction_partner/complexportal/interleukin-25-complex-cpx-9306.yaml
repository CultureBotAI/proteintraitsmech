identifier: ComplexPortal:CPX-9306
label: "Interleukin-25 complex"
definition: >-
  A member of the IL17 family which consists of six structurally related cytokines: IL17A (CPX-9301), IL17B (CPX-9302), IL17C (CPX-9305), IL17D, IL25 (this complex) and IL17F (CPX-9303). IL17 is expressed by CD4+ type 17 helper cells, the Tc17 subset of CD8+ cells, as well as innate-acting gamma-delta T cells, natural killer T cells and TCR-beta+ natural Th17 cells. Unrestrained IL17 signalling is associated with autoimmune diseases and cancer progression, but it is also crucial for protection from fungal and bacterial infections, including the commensal Candida albicans and Klebsiella pneumoniae. Both IL25 and IL17B promote IL33-driven (O95760) type 2 immune responses, but perform contradictory roles in colitis; IL25 is pathogenic and IL17B is protective. IL17B is thought to inhibit IL25 binding to IL17RA:IL17RB expressed on epithelial cells thereby limiting IL25 induced IL6 production by colonic epithelial cells. IL25 expression is up-regulated in skin inflammatory diseases such as psoriasis and atopic and contact dermatitis. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
