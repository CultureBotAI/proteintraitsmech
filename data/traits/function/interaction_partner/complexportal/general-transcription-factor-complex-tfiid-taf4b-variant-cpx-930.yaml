identifier: ComplexPortal:CPX-930
label: "General transcription factor complex TFIID, TAF4B variant"
definition: >-
  General transcription factor complex primarily found in spermatocytes that acts as the primary core promoter recognition factor in the initiation of RNA polymerase II (Pol II)-dependent transcription. The TBP subunit of TFIID recognizes and binds to the TATA box (if present), while TAF1 and TAF2 interact with the Initiator element (Inr), and TAF1 and the TAF6-TAF9 module recognizes the downstream core promoter element (DPE). Other core promoter elements, such as the motif ten element (MTE), may also be involved. Binding of the general transcription factor complex TFIIA (CPX-519) enhances binding of TFIID to the core promoter and nucleates pre-initiation complex (PIC) assembly. Following recruitment of TFIIA to TFIID, TFIIB, TFIIF (CPX-79), Pol II, TFIIE and TFIIH are successively assembled at the core promoter, allowing the PIC to initiate Pol II transcription. While TFIID is essential for transcription and its post-mitotic reinitiation, the loss of one or more subunits does not harm ongoing transcription during any given cell cycle. TFIID promoter binding appears to be regulated by histone modifications: TAF1 bromodomains (1361-1617 aa, IPR001487) bind the modified histone tails of acetylated H4K16, H4K5/K12 and H4K8/K16. TAF1 also appears to exhibit histone acetyltransferase activity towards histones H3 and H4. TAF3 and the PHD domains of other TFIID subunits bind modified histone tails carrying trimethylated H3K4 in combination with acetylated H3K9 and H3K14. TAF1 phosphorylates TP53 (P046370) on Thr-55, leading to TP53 degradation and G1 cell cycle progression. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
