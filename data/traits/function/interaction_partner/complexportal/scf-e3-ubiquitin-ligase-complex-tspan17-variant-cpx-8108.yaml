identifier: ComplexPortal:CPX-8108
label: "SCF E3 ubiquitin ligase complex, TSPAN17 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-TSPAN17 target proteins include the GTPase-activating protein FLCN (Q8NFG4) which plays a role in the cellular response to amino acid availability through regulation of the mTORC1 signaling cascade. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
