label: "Non-canonical BRAHMA-associated SWI/SNF ATP-dependent chromatin remodeling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
