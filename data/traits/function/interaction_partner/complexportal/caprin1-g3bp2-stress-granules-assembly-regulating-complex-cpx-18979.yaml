identifier: ComplexPortal:CPX-18979
label: "CAPRIN1-G3BP2, stress granules assembly regulating complex"
definition: >-
  Complex promotes stress granule (SG) formation, a process key to regulating gene expression during cellular stress. Colocalizes in cytoplasmic RNA granules on microtubules and when overexpressed, promotes SG assembly through RNA binding and induction of EIF2A (Q9BY44) phosphorylation. Polyadenylated mRNAs, eukaryotic initiation factors (eIFs), and RNA-binding proteins (RBPs) can localize into stress granules in response to a variety of stress-related stimuli leading to the accumulation of translationally stalled mRNA, and dysregulation in mRNA translation plays an important role in the pathogenesis of several neurodevelopmental diseases. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
