identifier: ComplexPortal:CPX-4502
label: "GINS complex"
definition: >-
  Required for the initiation of replication and for replication fork progression, mediating interactions with replication factors. Binds to and enhances the enzymatic function of the MCM helicase (CPX-2941) during the initiation and elongation stages of replication. Core component of the replicative helicase CMG (CPX-4541) complex that serves as the replicative helicase unwinding duplex DNA ahead of moving replication fork during chromosome duplication. Also appears to interact with and stimulate the polymerase activities of DNA polymerase epsilon complex (CPX-2109) and the DNA polymerase alpha:primase complex (CPX-2088). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
