identifier: ComplexPortal:CPX-1965
label: "H-NS complex, dimeric"
definition: >-
  Involved in bacterial nucleoid condensation and regulation of global gene expression by directly binding to promoter regions, regulation is generally negative although examples of positive regulation are known. Repression of transcription is mediated by cooperative spreading along the DNA (DNA stiffening) and by creating looped structures through formation of DNA-protein-DNA bridges. Recognises both structural and sequence-specific motifs in double-stranded DNA and binds preferably to bent DNA. Whilst dimerization is essential for its transcriptional repressor activity it may be the tetrameric form is more commonly found in vivo. Tetramerization is environmentally dependent and decreases under low ionic strength or temperature conditions. This environmental-dependency of the H-NS tetramer may allow for gene regulation under extreme conditions. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
