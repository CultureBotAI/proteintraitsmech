identifier: ComplexPortal:CPX-8784
label: "FOXP3 transcription factor homodimer"
definition: >-
  Transcriptional regulator with a role in the development of the central nervous system, regulating transcription of genes involved in early neuronal development mainly through transcriptional repression. FOXP3 plays a critical role in the development of regulatory T cells, CD4+ T cells that suppress immune functions to prevent autoimmunity and excessive inflammation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
