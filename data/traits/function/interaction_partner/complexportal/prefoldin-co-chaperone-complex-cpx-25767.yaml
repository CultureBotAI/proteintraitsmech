identifier: ComplexPortal:CPX-25767
label: "Prefoldin co-chaperone complex"
definition: >-
  Multi-functional complex that plays a key role in proteostasis, acting as a co-chaperone to assist protein folding, assembly and stabilization. Prefoldin-like (PFDL) complex (this complex) and Prefoldin (PFDN, CPX-6149) are thought to interact with the PAQosome (CPX-6145) which is crucial for the stable assembly and maturation of large RNA-binding protein assemblies, and multiple phosphatidylinositol 3-kinase-related kinase (PIK3) complexes. Overexpression of prefoldins is associated with certain types of cancers. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
