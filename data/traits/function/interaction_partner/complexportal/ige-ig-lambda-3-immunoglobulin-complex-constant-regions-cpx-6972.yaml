identifier: ComplexPortal:CPX-6972
label: "IgE - Ig lambda 3 immunoglobulin complex, constant regions"
definition: >-
  Membrane-bound or secreted glycoprotein produced by B lymphocytes. In the recognition phase of humoral immunity, the membrane-bound immunoglobulins serve as receptors which, upon binding of a specific antigen, trigger the clonal expansion and differentiation of B lymphocytes into immunoglobulin-secreting plasma cells. Secreted immunoglobulins (also known as antibodies) mediate the effector phase of humoral immunity, which results in the elimination of bound antigens. IgE is associated with hypersensitivity, allergies and a response to parasitic worms. Binds with extremely high affinity to FcERI/MS4A2 (Q01362) which is expressed on mast cells, basophils, Langerhans cells and eosinophils, up-regulating the FceR on these cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
