identifier: ComplexPortal:CPX-2101
label: "DNA polymerase delta complex"
definition: >-
  Believed to be the major polymerase for the elongation of both leading and lagging strands of chromosomal DNA in eukaryotic cells. Required for Okazaki fragment maturation together with Fen1 and proliferating cell nuclear antigen (PCNA). The 3'-5'-exonuclease activity of DNA polymerase delta is important for this process. Also involved in telomerase-mediated telomere addition and participates in several DNA repair pathways. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
