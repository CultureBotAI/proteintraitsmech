identifier: ComplexPortal:CPX-1229
label: "RAP1-GCR1-GCR2 transcription activation complex"
definition: >-
  Transcription factor required for the transcription of glycolytic genes. Appears to simultaneously bind to two adjacent DNA elements (UAS(RPG) and the CT box, bound specifically by RAP1 and GCR1, respectively). The complex can activate transcription through isolated UAS(RPG) ((upstream activating sequence in ribosomal protein genes)) but not CT elements. CT box-dependent transcriptional activation requires GCR2. GCR2 is essential only for the expression of CT box-containing glycolytic genes, but not for ribosomal genes, which do not have a CT box. GCR2 tappears to induce a conformation change in GCR1 and/or stimulate its hyperphosphorylation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
