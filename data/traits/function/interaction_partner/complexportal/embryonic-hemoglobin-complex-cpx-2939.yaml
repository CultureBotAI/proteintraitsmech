identifier: ComplexPortal:CPX-2939
label: "Embryonic hemoglobin complex"
definition: >-
  Embryonic hemoglobin zeta-epsilon complex is the embryonic hemoglobin type and expressed predominantly in embryonic erythrocytes. Binds and transports oxygen and carbon dioxide to/from the peripheral tissues. It replaces the early embryonic hemoglobin zeta-beta (CPX-2938) and is replaced by the adult hemoglobin types alpha-beta (CPX-2924, CPX-2922) in late pregnancy. It can be detected for a while in neonates. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
