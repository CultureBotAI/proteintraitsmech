identifier: ComplexPortal:CPX-3290
label: "Interleukin-23 complex"
definition: >-
  Cytokine complex that activates and stimulates proliferation of a wide range of lymphocytes, in particular memory T cells and Th17 cells, upon binding to its receptor subunits IL12RB1 (P42701) and IL23R (Q5VWK5). Formation of the ligand-receptor complex (CPX-383) and tyrosine phosphorylation of the IL23R subunit initiates the JAK-STAT signaling cascade which ultimately activates transcription of interferon-gamma or Interleukin-17. Produced by antigen-presenting cells in response to Interleukin-18. Associated with the pathogenesis of autoimmune inflammations, including rheumatoid and Lyme arthritis, multiple sclerosis, psoriasis, and inflammatory bowel disease as well as mycobacterial diseases of varying severity, primarily bacillus Calmette-Guerin and Salmonella infections. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
