identifier: ComplexPortal:CPX-1031
label: "PBAF chromatin remodeling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex that is part of the SWI/SNF chromatin remodeling complex superfamily and is involved in remodeling chromatin structure by destabilizing the histone-DNA interaction. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. The complex is involved in a variety of developmental processes including embryonic cell divisions, larval asymmetric cell divisions, generation of neuroblasts and neurons, muscle differentiation, somatic gonadogenesis, vulval induction, and timing of larval development. The complex mediates the response to stress resistance. Subunits pbrm-1 and swsn-7 are recruited to ethanol and stress response elements (ESRE) within the promoters of stress-inducible genes to positively regulate the expression, in response to heat stress and hypoxia. Plays a role in the terminal differentiation of neurons. Specifically, the ham-3 subunit is involved in HSN motor neuron positioning, axon guidance and serotonin synthesis. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
