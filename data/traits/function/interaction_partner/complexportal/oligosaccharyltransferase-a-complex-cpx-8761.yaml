identifier: ComplexPortal:CPX-8761
label: "Oligosaccharyltransferase A complex"
definition: >-
  Transfers the dolicholphosphate-linked core oligosaccharide to selected Asn-X-Ser/Thr sequences of the nascent polypeptide chain, a key step in N-glycosylation of secretory and membrane-bound proteins in the lumen of the endoplasmic reticulum. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
