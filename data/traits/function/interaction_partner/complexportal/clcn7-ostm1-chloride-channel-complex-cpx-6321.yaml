identifier: ComplexPortal:CPX-6321
label: "CLCN7-OSTM1 chloride channel complex"
definition: >-
  Electrogenic chloride ion/proton antiporter that translocates chloride ions across cell membranes to maintain the membrane potential, regulate trans-epithelial chloride transport, and control intravesicular pH. Displays slow voltage-dependent activation and deactivation in comparison to other chloride channels, resulting in strongly outwardly rectifying currents. Mainly present in lysosomes and osteoclast ruffled membranes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
