identifier: ComplexPortal:CPX-596
label: "Cytoplasmic exosome complex, Dis3l variant"
definition: >-
  3'-5' exoribonuclease complex that is involved in RNA maturation and degradation which include the removal of unstable and aberrant transcripts and may also regulate the levels of specific transcripts in response to environmental factors. Restricted to processing linear and circular single-stranded RNAs only. RNAs with complex secondary structures, particularly at the 3' end of the molecule, may have to be unwound or pre-processed by co-factors prior to entering the complex. Although some RNAs may be targeted directly to the catalytic subunit, the majority of substrates enter the barrel-like structure of the exosome through a pore at the centre of the cap and are threaded through the central channel in a 3' to 5' orientation. The exoribonuclease activity of the catalytic subunit facilitates the degradation process. A number of different exosome variants exist in the cell that are distinguished by the inclusion of their respective catalytic subunit(s): the main cytoplasmic exosome with DIS3L (this complex) or DIS3L and EXOSC10 (CPX-601), the main nuclear exosome with DIS3 and EXOSC10 (CPX-594), the nucleolar exosome with EXOSC10 (CPX-595) and a rare variant found in both, the nucleus and cytosol, (CPX-598). The cytoplasmic RNA exosome is involved in general mRNA turnover (esp of Polymerase III transcripts) and specifically degrades inherently unstable mRNAs containing AU-rich elements (AREs) within their 3-prime untranslated regions and cytoplasmic rRNAs that have undergone polyadenylation. Degrades mRNAs subject to RNA interference and is involved in the following mRNA decay pathways: mRNAs with premature termination codons (PTCs; the nonsense mediated decay (NMD) pathway), ones lacking termination codons altogether (the non-stop decay (NSD) pathway) and ones where ribosomes stall (the no-go decay (NGD) pathway). Seems to be involved in degradation of histone mRNA. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
