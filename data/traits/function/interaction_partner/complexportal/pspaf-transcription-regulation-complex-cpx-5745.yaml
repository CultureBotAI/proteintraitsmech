identifier: ComplexPortal:CPX-5745
label: "pspAF transcription regulation complex"
definition: >-
  Transcription regulator, formation of which in the absence of membrane stress inhibits the ATPase activity of the enhancer binding and activator protein pspF. ATPase activity of pspF is required to induce an open complex formation of the DNA‐bound RNA polymerase at its target promoters. The pspAF complex retains only a basal ATPase activity. Membrane stresses, such as the mislocalisation of proteins to the inner membrane, appear to lead to the recruitment of pspA to the pspBC complex (CPX-5892), enabling at least a partial release of pspA from pspF. This allows transcription of the Psp membrane-stabilizing system through binding of pspF to the sigma factor rpoN (P24255). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
