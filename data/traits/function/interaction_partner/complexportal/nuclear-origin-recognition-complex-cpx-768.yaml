identifier: ComplexPortal:CPX-768
label: "Nuclear origin recognition complex"
definition: >-
  Protein complex that binds to origin DNA in an ATP-dependent manner and recruits other essential proteins, such as the initiation factors CDC6 (P09119), Cdt1 (P47112), and the presumptive DNA helicase complex MCM (CPX-2944), to the autonomously replicating sequence (ARS) to form a pre-replicative complex before the initiation of DNA replication that occurs in S phase. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
