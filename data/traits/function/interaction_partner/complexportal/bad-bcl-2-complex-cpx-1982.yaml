identifier: ComplexPortal:CPX-1982
label: "BAD:BCL-2 complex"
definition: >-
  BH3 domain-containing BAD interacts with and inhibits anti-apoptotic BCL-2. Acts to prevent BCl-2 from sequestering BID and other pro-apoptotic molecules. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
