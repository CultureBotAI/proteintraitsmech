identifier: ComplexPortal:CPX-26519
label: "RUNX-CBFB transcription factor complex, RUNX2 variant"
definition: >-
  Transcription factor complex that plays an essential role in osteogenesis and is essential for the formation of mature osteocytes and for controlling the expression of genes required for mineralization of the bone extracellular matrix. The RUNX protein binds to binds to TGTGGNNN core sequences, typically TGTGGTTT or TGTGGTCA. DNA binding is stabilised by the presence of CBFB. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
