identifier: ComplexPortal:CPX-3441
label: "SIN3A histone deacetylase complex, ES cell-specific variant"
definition: >-
  A embryonic stem cell-specific histone deacetylation complex (HDAC) that is distinguished from the common SIN3A complex (CPX-3443) by the additional core subunits FAM60A, OCT, TET1. Negatively regulates gene expression of genes regulating G1/S and G2/M cell cycle transitions and required to promote rapid proliferation while preventing unscheduled differentiation. May bind to DNA directly via subunit FAM60A and is recruited to gene promoters by specific transcription factor such as Rest (Q8VIG1), Rb (P13405), Hbp1 (Q8R316), the Myc‐inhibitors Mxi1 (P50540) and Mad1l1/MAD1 (Q9WTX8), Klf13 (Q9JJZ6), Foxk1 (P42128) and Foxk2 (Q3UCQ1) as well as with the nuclear hormone repressors, Ncor1 (Q60974) and Ncor2/SMRT (Q9WU42) and/or SWI/SNF chromatin remodelling complexes. Binds H3K4me2 and H3K4me3 histones via subunits Ing1 and Ing2 and hypoacetylated histones via subunits Rbbp4 and Rbbp7. Mutations that abrogate its repressor activity may activate the TGF-beta signaling pathway leading to changes in cell morphology and increase in cell migration related to cancer progression. Cancer cell lines appear to express canonical and mutated versions of SIN3A complexes. May include several accessory proteins such as Bahcc1 (Q3UHR0), Bbx (Q8VBW5), Irs4 (Q9Z0Y7), Phf23 (Q8BSN5), Sap18 (O55128) and Tnrc18 (Q80WC3). A curated stable macromolecular complex (Complex Portal) with 18 subunits.
