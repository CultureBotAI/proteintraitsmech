identifier: ComplexPortal:CPX-5966
label: "Mitochondrial calcium uniporter complex, MICUB variant"
definition: >-
  Highly selective, inward-rectifying Ca2+ channel located on the inner mitochondrial membrane. The uniporter is quiescent in resting cellular conditions and becomes activated only when local Ca2+ levels rise above approximately 1 microM with the MCU tetramer forming a calcium-conducting pore. Ca2+ uptake is driven by the large negative inner mitochondrial membrane potential generated by proton pumping into the intermembrane space by the electron transport chain. Under certain conditions MCUB integrates into the normal importer complex (CPX-5961/CPX-5963/CPX-5965), displacing at least some of the MCU and MCU-bound MICU1/MICU2/MICU3 subunits. This appears to be a stress-responsive mechanism to alter mtCU gating and limit cooperative activation of the channel. For example, MCUB is not normally present in the uniporter complex of the heart at baseline, but only after stress or ischemic injury, and thus limits mitochondrial Ca2+ overload during cardiac injury. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
