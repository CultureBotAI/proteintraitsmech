identifier: ComplexPortal:CPX-2842
label: "Mitochondrial degradosome complex"
definition: >-
  Plays an essential role in mitochondrial RNA turnover, degrading structured RNA in an ATP-dependent manner. SUPV3L1 unwind double-stranded RNA, DNA-RNA, or double-stranded DNA, and PNPT1 then promotes 3′-5′ degradation of the RNA molecules. Also counteracts deleterious R loops at specific hybrid-prone regions in the mitochondrial genome. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
