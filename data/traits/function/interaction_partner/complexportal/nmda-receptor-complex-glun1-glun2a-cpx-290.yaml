identifier: ComplexPortal:CPX-290
label: "NMDA receptor complex, GluN1-GluN2A"
definition: >-
  Voltage-gated ion channel of the ionotrophic glutamate receptor (iGluR) family that is characterised by high calcium permeability and very slow deactivation. Activated by simultaneous binding of glycine to GluN1 and L-glutamate to GluN2. Blocked by physiological concentrations of extracellular magnesium which is released by membrane depolarization. Predominantly post-synaptic receptor that mediates mostly the late/slow phase of the majority of the fast excitatory neurotransmission in the mammalian brain where it plays a key role in synaptic plasticity, synaptogenesis, excitotoxicity, memory acquisition and learning. Combinations of different receptor isoforms and their splice variants result in formation of ion channels with distinct spatiotemporal expression patterns and pharmacological and electrophysiological properties. Replacement of one or more subunits with GluN3A (A2AIR5) or GluN3B (Q91ZU9) subunits results in relatively Ca2+-impermeable cation channels that are resistant to Mg2+. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
