identifier: ComplexPortal:CPX-2562
label: "WASH complex"
definition: >-
  Acts as a nucleation-promoting factor to stimulate the Arp2/3 complex (CPX-2739) to mediate actin polymerisation and create patches of actin filaments on early endosomes that may be involved in the production and/or scission of endosomal tubules. The complex is required for the trafficking of specific proteins as actin filaments also mediate myosin-driven short-range movement of proteins within endosomal compartments. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
