identifier: ComplexPortal:CPX-636
label: "ISW1b chromatin remodeling complex"
definition: >-
  ATP-dependent chromatin remodeling complex, however ISW1b has a low affinity for nucleosomes resulting in a loss of nucleosome spacing and sliding activities. Appears to play a role in response to increases in temperature and is required for the transcriptional repression of a number of genes, this set differs from those repressed by ISW1a (CPX-637) with which it shares a catalytic subunit. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
