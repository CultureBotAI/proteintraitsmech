identifier: ComplexPortal:CPX-3238
label: "SUMO activating enzyme complex"
definition: >-
  SUMO activating complex provides an E1-like activity that catalyzes the first step in conjugation of Smt3 (SUMO) to proteins (sumoylation). The activated Smt3 is then transferred to the E2-like SUMO conjugating enzyme Ubc9. In subsequent steps, Smt3 is covalently attached to lysine residues on target proteins by one of the E3-like SUMO ligases that include Siz1, Mms21, Cst9, and Nfi1. Attachment of Smt3 alters protein-protein and protein-DNA interactions, as well as subcellular localization of the target proteins, among which are septins, several DNA repair proteins, and cell division regulators, therefore affecting chromosome segregation, cell cycle control, and likely many other regulatory pathways. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
