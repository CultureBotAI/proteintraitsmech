identifier: ComplexPortal:CPX-4273
label: "EmrKY-TolC multidrug efflux transport system"
definition: >-
  Responsible for the transport of xenobiotics, such as drugs, out of the cell, in particular from the periplasm. Single-component efflux transporters remove toxic compounds from the cytoplasm to the periplasmic space where tolC-dependent transporters expel them from the cell. Member of the major facilitator superfamily (MFS). Play an important role in the antibiotic resistance during biofilm formation and expression of both proteins is induced by antibiotics such as tetracycline. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
