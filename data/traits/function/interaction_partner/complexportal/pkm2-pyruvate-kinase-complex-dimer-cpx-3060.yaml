identifier: ComplexPortal:CPX-3060
label: "PKM2 pyruvate kinase complex (dimer)"
definition: >-
  A protein kinase promoting aerobic glycolysis under glucose starvation conditions when it switches from the highly active tetrameric pyruvate kinase (CPX-3058) to the less active dimeric protein kinase. Regulates gene expression and cell proliferation by binding transcription factors such as Histone pThr12-H3, Oct-4 (P20263), Stat3 (P42227), pTyr333-β-catenin (Q02248). Often, but not always, phosphorylates the transcription factor using beta-d-fructofuranose 1,6-bisphosphate (CHEBI:28013) as phosphate donor. Nuclear translocation is induced by PIAS3-mediated sumoylation and ERK2-mediated phosphorylation on Ser-37. Redirects glucose-derived carbons towards biosynthesis indirectly supporting the Warburg effect by regulating gene expression in the nucleus. This switch is tightly controlled by oncogenes, tumor suppressors and growth signals and affected by post-translational modifications of PKM2. Important allosteric affectors for the dimeric state are human papilloma virus E7, promyelocytic leukemia (PML, Q60953), EGFR-mediated-pY46-MUC1-C (Q02496), phosphor-tyrosine proteins and SAICAR (succinyl-5-aminoimidazole-4-carboxamide-1-ribose-50-phosphate). The protein kinase activity is inhibited by the presence of ADP (CHEBI:16761) and the PKM2 activator beta-d-fructofuranose 1,6-bisphosphate (CHEBI:28013) in which case PKM2 reverts to pyruvate kinase activity. When bound to SAICAR it most likely forms a heterodimer but may retain its function as pyruvate kinase. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
