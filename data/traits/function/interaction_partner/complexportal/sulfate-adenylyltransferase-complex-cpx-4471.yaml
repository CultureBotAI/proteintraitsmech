identifier: ComplexPortal:CPX-4471
label: "Sulfate adenylyltransferase complex"
definition: >-
  An sulfate adenylyltransferase complex that activates sulfate through adenylation to form adenosine 5-phosphosulfate (APS, CHEBI:58243). Catalyzes and couples the Gibbs potentials of GTP hydrolysis to the synthesis of APS. This is the first step in the sulfate assimilation pathway required for the biosynthesis of sulfur-containing amino acids and cofactors, and sulfated metabolites. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
