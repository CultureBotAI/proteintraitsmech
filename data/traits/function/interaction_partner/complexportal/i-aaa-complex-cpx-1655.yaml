identifier: ComplexPortal:CPX-1655
label: "i-AAA complex"
definition: >-
  Mitochondrial ATP-dependent protease, crucial for mitochondrial DNA-independent growth. Proteins residing in the IMS are transported across the outer membrane in a largely unfolded state and the complex appears to play a role as a folding assistant. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
