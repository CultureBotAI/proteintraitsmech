identifier: ComplexPortal:CPX-26626
label: "Adaptor complex AP-2"
definition: >-
  Adaptor complex that orchestrates the formation of membrane coats that mediate cargo selection and vesicle budding, for example by linking clathrin to the membrane surface of trans-Golgi network vesicles. AP-2 is involved in plasma membrane to endosome traffic. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
