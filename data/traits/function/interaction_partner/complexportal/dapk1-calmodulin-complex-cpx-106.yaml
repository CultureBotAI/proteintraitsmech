identifier: ComplexPortal:CPX-106
label: "DAPK1 - calmodulin complex"
definition: >-
  Serine/threonine protein kinase associated with cell survival, apoptosis and autophagic cell death pathways. DAPK2 is activated by dephosphorylation of Ser-308 and calcium-calmodulin binding. Complex activity is regulated via various phosphorylation sites, two of which (Ser-298 and Ser-308) are located on the autoregulatory domain (ARD) of DAPK2. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
