identifier: ComplexPortal:CPX-4703
label: "MRN double-strand break repair complex"
definition: >-
  Endo- and exonuclease complex that plays a central role in double-strand break (DSB) repair, DNA recombination, maintenance of telomere integrity and meiosis. It possesses single-strand endonuclease activity and double-strand-specific 3'-5' exonuclease activity, which are provided by Mre11.The complex may also be required for DNA damage signaling via activation of the Atm kinase (Q62388). In telomeres the MRN complex may modulate t-loop formation. MRN complex is part of the BRCA1-C complex (CPX-4722). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
