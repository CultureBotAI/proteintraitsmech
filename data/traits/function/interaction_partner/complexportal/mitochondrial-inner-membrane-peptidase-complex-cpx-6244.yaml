label: "Mitochondrial inner membrane peptidase complex"
definition: >-
  Catalyzes the removal of transit peptides required for the targeting of a range of nuclear encoded and most mitochondrial encoded precursor proteins from the mitochondrial matrix to the inner membrane or the inter-membrane space. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
