identifier: ComplexPortal:CPX-3099
label: "FtsQBL complex"
definition: >-
  Sub-complex of the divisome, required for cell division. FtsQBL appears to form independently of the divisome and is hypothesized to link cytoplasmic to periplasmic events during cell division through a multitude of transient interactions. May have a structural role as a scaffold in the assembly of the divisome recruiting late divisome components. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
