identifier: ComplexPortal:CPX-3058
label: "PKM2 pyruvate kinase complex (tetramer)"
definition: >-
  A pyruvate kinase that catalyzes the phosphotransfer reaction between phosphoenolpyruvate (PEP, CHEBI:18021) and ADP (CHEBI:16761), producing pyruvate (CHEBI:15361) and ATP (CHEBI:15422), the final step in glycolysis. Beta-d-fructofuranose 1,6-bisphosphate (FBP) is the allosteric activator required for tetramerization of PKM2 (Lys-433 is critical). PKM2 is the predominant pyruvate kinase in fetal tissues, which is replaced by PKR (P30613-1) in red blood cells, PKL (P30613-2) in the liver, and PKM1 (P14618-2) in skeletal muscle, heart, and brain in adults. PKM2 remains the dominant M isoform in most adult tissues, and is the major pyruvate kinase in proliferating and cancer cells. Certain allosteric affectors stabilise the tetrameric state and promote tumorigenesis: e.g. non-phosphorylated MUC1-C (P15941) and death-associated protein kinase (DAPK, P53355). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
