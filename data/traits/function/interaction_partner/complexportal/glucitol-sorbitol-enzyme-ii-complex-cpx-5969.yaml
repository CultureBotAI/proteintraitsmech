identifier: ComplexPortal:CPX-5969
label: "Glucitol/sorbitol enzyme II complex"
definition: >-
  Involved in the transport of glucitol/sorbitol across the cell membrane as part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS). May also bind and transport and D-mannitol with low affinity. A phosphoryl group is transferred from hpr (P0AA04) to srlB (IIA), from srlB to srlE (IIB) and finally from srlE onto the incoming sugar bound to membrane-embedded srlA (IIC). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
