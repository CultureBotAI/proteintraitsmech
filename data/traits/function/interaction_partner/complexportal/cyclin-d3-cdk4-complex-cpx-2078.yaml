identifier: ComplexPortal:CPX-2078
label: "Cyclin D3-CDK4 complex"
definition: >-
  Required for G1 to S phase transition of the mitotic cell cycle. Phosphorylation of Rb proteins by cyclin D:CDK4 complexes leads to their partial inactivation which allows transcription of E2F-controlled genes such as cyclin E1, which activates the downstream Cdk2 kinase. Complex formation enables substrate binding to the kinase, leads to a rearrangement of the catalytic site and exposes Thr-172 of CDK4 for phosphorylation and subsequent activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
