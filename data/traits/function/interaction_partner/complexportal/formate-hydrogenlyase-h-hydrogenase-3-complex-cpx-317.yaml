identifier: ComplexPortal:CPX-317
label: "Formate hydrogenlyase-H/Hydrogenase-3 complex"
definition: >-
  Role in the mixed-acid fermentation that takes place under anaerobic conditions, ultimately producing molecular hydrogen. Consists of two enzymatic activities: a formate dehydrogenase‐H (encoded by fdhF) for producing 2H+, 2 electrons and CO2 from formate and HycE for synthesizing molecular hydrogen (H2) from 2H+ and 2 electrons. HycE catalyzes production of H2 even at high partial pressures of H2. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
