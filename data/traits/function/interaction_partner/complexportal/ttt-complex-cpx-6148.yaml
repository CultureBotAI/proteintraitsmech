identifier: ComplexPortal:CPX-6148
label: "TTT complex"
definition: >-
  Co-chaperone complex that acts as a regulator of the DNA damage response (DDR). It is required to stabilize protein levels of the phosphatidylinositol 3-kinase-related protein kinase (PIKK) family proteins. Newly synthesized PIKK interacts with TELO2 assisted by HSP90. Phosphorylated TELO2 then appears to mediate the interaction between PIKK and R2TP (CPX-6143) complex to eventually lead to the proper assembly of PIKK. Promotes assembly, stabilizes and maintains the activity of mTORC1 (CPX-503) and mTORC2 (CPX-4402) complexes, which regulate cell growth and survival in response to nutrient and hormonal signals. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
