identifier: ComplexPortal:CPX-4022
label: "ATP synthase complex"
definition: >-
  Acts to convert the energy of oxidation-reduction reactions of the electron transport chain (respiration) to the phosphorylation of ADP. The synthesis of ATP is coupled to the respiratory chain via the proton potential. The ATP synthase is a molecular motor composed of two separable parts: F1 and F0. The F0 motor spans the membrane converting the potential energy of the proton motive force (pmf) into rotation of the central stalk that in turn drives conformational changes in the F1 catalytic sites. Bacterial F-ATPase can also function in reverse, employing ATP hydrolysis to generate a proton gradient across the membrane when needed. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
