identifier: ComplexPortal:CPX-25755
label: "Hexasome complex"
definition: >-
  Noncanonical nucleosome complex with six instead of eight histones which functions to compact and control access to DNA. Stable hexasomes can be formed adjacent to nucleosomes; although hexasomes can be formed as an intermediary of nucleosome assembly, hexasomes can also be formed by histone chaperones and chromatin remodelling complexes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
