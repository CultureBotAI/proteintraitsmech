identifier: ComplexPortal:CPX-3270
label: "IkappaB kinase complex"
definition: >-
  Phosphorylates inhibitory-kappaB (I-kappaB) proteins and a range of other substrates, many found in the NF-kappaB signalling cascade thereby both positively and negatively regulating the NF-kappaB signalling pathway. Also active in the insulin signalling pathway, mTOR pathway and other tumorigenesis promoting pathways. The activation of IKBKB and presence of NEMO are required for the canonical NF-kappaB pathway triggered by proinflammatory stimuli while the activation of CHUK is required for the alternative NF-kappaB pathway triggered by a multitude of ligands. The kinase subunits are activated by phosphorylation on Ser-177 and Ser-181 of Ikbkb/Ikkb and Ser-176 and Ser-180 of Chuk/Ikka. Kinase subunits may cis-autophosphorylate, trans-autophosphorylate or be phosphorylated by other kinases (the identity of which is not certain). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
