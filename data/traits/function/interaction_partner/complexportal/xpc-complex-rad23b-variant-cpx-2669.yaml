identifier: ComplexPortal:CPX-2669
label: "XPC complex, RAD23B variant"
definition: >-
  A nucleotide-excision repair complex that is involved in damage sensing during global genome nucleotide excision repair. Acts as a DNA-binding damage sensor which rapidly screens duplex DNA for non-hydrogen-bonded bases by forming a transient nucleoprotein intermediate complex which matures into a stable recognition complex. Recognizes a wide spectrum of damaged DNA characterized by distortions of the DNA helix including single-stranded loops, mismatched bubbles or single-stranded overhangs. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
