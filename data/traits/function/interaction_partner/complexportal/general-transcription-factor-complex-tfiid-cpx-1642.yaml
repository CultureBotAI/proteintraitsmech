identifier: ComplexPortal:CPX-1642
label: "General transcription factor complex TFIID"
definition: >-
  General transcription factor complex that acts as the primary core promoter recognition factor in the initiation of RNA polymerase II (Pol II)-dependent transcription. The TBP subunit of TFIID recognizes and binds to the TATA box (if present), while TAF1 and TAF2 interact with the Initiator element (Inr), and TAF1 and the TAF6-TAF9 module recognizes the downstream core promoter element (DPE). Other core promoter elements, such as the motif ten element (MTE), may also be involved. Binding of the general transcription factor complex TFIIA (CPX-1633) enhances binding of TFIID to the core promoter and nucleates pre-initiation complex (PIC) assembly. Following recruitment of TFIIA to TFIID, TFIIB, TFIIF, Pol II, TFIIE (CPX-1658) and TFIIH are successively assembled at the core promoter, allowing the PIC to initiate Pol II transcription. A curated stable macromolecular complex (Complex Portal) with 15 subunits.
