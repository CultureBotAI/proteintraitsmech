identifier: ComplexPortal:CPX-2418
label: "Beta-catenin destruction complex, Apc variant"
definition: >-
  Phosphorylates cytoplasmic beta-catenin (arm, P18824) in the absence of WNT-signalling, thus positively controlling its continuous proteasome-mediated degradation. This constitutively suppresses the canonical Wnt signaling pathway by preventing the accumulation of cytoplasmic beta-catenin. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
