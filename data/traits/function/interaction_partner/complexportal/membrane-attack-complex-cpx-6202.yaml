identifier: ComplexPortal:CPX-6202
label: "Membrane attack complex"
definition: >-
  Transmembrane complex of the terminal pathway of complement activation that plays a key role in the innate and adaptive immune response by forming pores in the plasma membrane of target cells due for destruction. Sublytic MAC modulates inflammation and proliferation when formed on self-cells; host cells are protected from bystander damage by the GPI-anchored receptor CD59 (O55186/P58019). A curated stable macromolecular complex (Complex Portal) with 8 subunits.
