identifier: ComplexPortal:CPX-2794
label: "COG tethering complex"
definition: >-
  Peripheral membrane oligomeric protein complex which acts as a retrograde vesicle tethering factor in intra-Golgi protein trafficking, bringing cargo vesicles in close proximity to their target compartment. May play a role in protein glycosylation by directly or indirectly effecting transport, retention, or retrieval to appropriate cisternae of resident Golgi glycosylation enzymes. Plays a role in cleavage furrow ingression in dividing spermatocytes and cell elongation in differentiating spermatids and formation and/or stability of the Golgi‐based spermatid acroblast. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
