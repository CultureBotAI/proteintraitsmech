identifier: ComplexPortal:CPX-2365
label: "SCF E3 ubiquitin ligase complex, BTRC variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-BTRC target proteins include PDCD4 (Q53EL6), proteasomal destruction of which prevents inhibition of the eukaryotic translation initiation factor eIF4A (P6084/Q14240) by PDCD4, enabling efficient protein translation and cell growth, and CDC25A (P30304) thus regulating CDK1 (P06493) activity.during S-phase. By late G2 SCF-BTRC no longer targets CDC25A but instead ubiquitinates the WEE1 (P06493) G2 checkpoint kinase. Ubiquitinates phosphorylated CTNNB1 (P35222) thus participating in the regulation of Wnt signaling, and phosphorylated NFKBIA (P25963), degradation of which frees the associated NFKB1 (P19838) to translocate into the nucleus and to activate transcription. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
