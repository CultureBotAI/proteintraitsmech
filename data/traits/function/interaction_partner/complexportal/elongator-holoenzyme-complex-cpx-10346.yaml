identifier: ComplexPortal:CPX-10346
label: "Elongator holoenzyme complex"
definition: >-
  N-acetyltransferase which acts to form modified wobble uridines in tRNA, such as 5-methoxycarbonylmethyl-uridine (mcm5U), 5-methoxycarbonylmethyl-2-thio-uridine (mcm5s2U), and 5-carbamoylmethyl-uridine (ncm5U). These sites influence the recognition rate and affinity between incoming tRNAs and codons in the A site of the translating ribosome, stablizing transient pausing events thus supporting proper domain folding of the nascent polypeptide chains during the elongation phase of the ribosome‐mediated translation process. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
