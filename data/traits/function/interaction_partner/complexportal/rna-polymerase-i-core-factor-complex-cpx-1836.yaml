identifier: ComplexPortal:CPX-1836
label: "RNA polymerase I core factor complex"
definition: >-
  Transcription preinitiation complex which binds tightly to the upstream element of the RNA Polymerase I (RNAP-I, CPX-1664) promoter of 35S rRNA genes. Initiation of transcription requires the assembly of the upstream activating factor (UAF, CPX-1101), the core factor (CF), the TATA binding protein SPT15, and RNAP-I with RRN3 on the upstream element and core promoter. Upon transcription initiation, UAF, RRN3 and CF dissociate from the promoter. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
