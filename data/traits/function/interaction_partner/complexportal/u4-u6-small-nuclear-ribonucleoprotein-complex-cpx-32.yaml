identifier: ComplexPortal:CPX-32
label: "U4/U6 small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex that is involved in mRNA splicing. Intermediate complex in the assembly of U4/U6 x U5 tri-snRNP complex (CPX-25) and the precatalytic spliceosome. Its main function is to deliver U6 (CPX-24) to the spliceosome, a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. A curated stable macromolecular complex (Complex Portal) with 20 subunits.
