identifier: ComplexPortal:CPX-5707
label: "SARS-CoV 3'-5' exoribonuclease proof-reading complex"
definition: >-
  The SARS-CoV coronavirus 3'-5' exoribonuclease complex which strictly targets double-stranded RNA and can also selectively remove a mismatched ribonucleotide at the 3'-end of a dsRNA substrate. Formation of the NSP10-NSP14 complex strongly enhances the exonuclease activity of the bifunctional NSP14 and enhances the fidelity of RNA synthesis by correcting nucleotide incorporation errors made by the RNA-dependent RNA polymerase. May bind to, and act with the nsp7/nsp8/nsp12 polymerase complex (CPX-5717). Proof-reading exonuclease activity may explain why coronaviruses have the largest RNA genomes known to date. Complex formation does not appear to effect the C-terminal N7-methyltransferase activity of NSP14 involved in RNA cap modification. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
