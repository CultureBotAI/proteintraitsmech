identifier: ComplexPortal:CPX-4602
label: "FtsEX ABC cell division complex"
definition: >-
  Member of a small subclass of eukaryote-type (EK-type) ABC transporters that uses mechano-transmission to perform work in the periplasm rather than for transmembrane transport. Involved in the recruitment of proteins to the Z ring of the divisome by activating the membrane anchor protein ftsA (P0ABH0), thus ensuring the safe separation of daughter cells during division. Also participates in the activation and regulation of septal peptidoglycan (sPG) synthesis and is responsible for the activation of hydrolases which split sPG to form new cell poles by recruiting envC (P37690), the activator of the cell wall hydrolases amiA (P36548) and amiB (P26365), to the septum. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
