identifier: ComplexPortal:CPX-1267
label: "REG2-GLC7 phosphatase complex"
definition: >-
  Protein phosphatase complex with a role in theresponse to glucose levels. During steady-state growth in high glucose, the SNF1 kinase complex (CPX-232/CPX-2800/CPX-231) is inactive and REG2 is not expressed. Prolonged glucose starvation leads to SNF1-dependent accumulation of REG2. Once glucose becomes abundant, REG2-GLC7 contributes to the rapid dephosphorylation and inactivation of SNF1 which acts as a central regulator of cellular energy homeostasis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
