identifier: ComplexPortal:CPX-8737
label: "Mitochondrial respiratory chain complex III, testis-specific variant"
definition: >-
  Key role in aerobic respiration, in which mitochondrial enzymes accept electrons from electron carriers reduced in glycolysis and the tricarboxylic acid cycle. Ubiquinol-cytochrome c reductase pumps protons into the intermembrane space, creating an electrochemical gradient. This is achieved by oxidizing ubiquinol (ubihydroquinone) which reacts from the membrane phase, reducing cytochrome c in the intermembrane space, and using the free energy change to transport H+ ions across the membrane from the matrix to the inter membrane space. Quinol oxidation occurs in a bifurcated reaction, in which one electron is transferred to a high potential chain and the other to a low potential chain. The high potential chain, consisting of the iron sulfur protein, cyt c1 and cyt c2, transfers the first electron from quinol to an acceptor (cytochrome oxidase). The low potential chain consists of two cyt b hemes, which serve as a pathway through which electrons are transferred across the coupling membrane. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
