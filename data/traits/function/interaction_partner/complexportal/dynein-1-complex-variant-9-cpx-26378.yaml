label: "Dynein-1 complex, variant 9"
definition: >-
  Multi-protein molecular motor. Dynein-1 is one of three major classes of dynein, which share a conserved motor domain that couples ATP hydrolysis with conformational changes to power intracellular retrograde movement of cargoes including vesicles and organelles along microtubules within the cytoplasm. Mutations in DYNC1H1 have been implicated in neurological disorders including an axonal form of Charcot-Marie-Tooth disease. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
