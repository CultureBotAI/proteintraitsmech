identifier: ComplexPortal:CPX-2816
label: "CRL4-DCAF8 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF8. The complex is active in epigenetic regulation through the ubiquitination and subsequent destruction of the HELLS lymphoid-specific helicase (Q9NRZ9) and DNMT3A cysteine methyltransferase DNMT3A (Q9Y6K1). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
