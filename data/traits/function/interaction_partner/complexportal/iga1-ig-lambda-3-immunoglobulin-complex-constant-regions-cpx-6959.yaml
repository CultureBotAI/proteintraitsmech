identifier: ComplexPortal:CPX-6959
label: "IgA1 - Ig lambda 3 immunoglobulin complex, constant regions"
definition: >-
  Membrane-bound or secreted glycoprotein produced by B lymphocytes. In the recognition phase of humoral immunity, the membrane-bound immunoglobulins serve as receptors which, upon binding of a specific antigen, trigger the clonal expansion and differentiation of B lymphocytes into immunoglobulin-secreting plasma cells. Secreted immunoglobulins (also known as antibodies) mediate the effector phase of humoral immunity, which results in the elimination of bound antigens. IgA is the major immunoglobulin class in body secretions such as saliva and breast milk and protects mucosal surfaces from toxins, virus and bacteria by direct neutralization or by prevention of binding to the mucosal surface. Predominantly a monomer in serum, secretory IgA, is a dimer (sometimes trimer and tetramer) associated with a J-chain (P01591) and another polypeptide chain, the secretory component polymeric Ig receptor, PIGR (P01833-PRO_0000014901). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
