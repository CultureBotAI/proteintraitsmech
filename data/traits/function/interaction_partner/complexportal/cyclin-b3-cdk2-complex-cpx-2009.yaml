identifier: ComplexPortal:CPX-2009
label: "Cyclin B3-CDK2 complex"
definition: >-
  Cyclin-dependent protein kinase complex. Required for G2 to M phase transition of the mitotic cell cycle. Complex formation enables substrate binding to the kinase, leads to a rearrangement of the catalytic site and exposes Thr-161 of CDK2 for phosphorylation and subsequent activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
