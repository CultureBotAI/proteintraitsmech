identifier: ComplexPortal:CPX-8962
label: "19S proteasome regulatory complex"
definition: >-
  Functions as a proteasome regulator when bound to the barrel-shaped 20S Proteasome to form the 26S Proteasome. Recognises and deubiquitinates substrates as they enter the 20S catalytic core, thereby enabling protein degradation and maintaining cellular protein homeostasis. Abundantly found as free 19S near synapses, where there is a large demand for protein turnover. Independently regulates synaptic proteins in the absence of the 20S core proteasome. Free 19S moonlights as a deubiquitinase (DUB) by binding and deubiquitynating lysine 63-ubiquitin (Lys63-ub) a non-proteasome-targeting ubiquitin linkage in AMPARs (alpha-amino-3-hydroxy-5-methyl-4-isoxazolepropionic acid receptor) to regulate synaptic transmission. A curated stable macromolecular complex (Complex Portal) with 19 subunits.
