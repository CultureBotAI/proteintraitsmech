identifier: ComplexPortal:CPX-969
label: "Caspase-2 complex"
definition: >-
  Thiol-dependent aspartate-specific protease complex possessing features of both initiator and executioner caspases and required in stress-induced apoptosis. Genotoxic stress, mitotic catastrophe, heat shock, ER stress or bacterial toxins can stimulate Caspase-2 activation. It is activated by autocatalytic cleavage in the Caspase-2-PIDDosome (CPX-3905). Once activated, it is released from the PIDDosome and induces BID (P55957) cleavage, BAX (Q07812) translocation to mitochondria, subsequent Cytochrome c (P99999) release and consequent activation of the apoptotic process. Specifically cleaves substrates with an aspartic acid residue at position P1 and has a preferred cleavage sequence of Val-Asp-Val-Ala-Asp-|-. In addition, Caspase-2 has been reported to be a negative regulator of necroptosis and to be indispensable for correct cell proliferation and genomic stability acting as a potential tumor suppressor factor. Caspase-2 is negatively regulated by phosphorylation at distinct sites (Ser157 and Ser340) during cell division and in nutrient abundance conditions. In response to heat shock, Caspase-2 activity is suppressed by the chaperone HSP90AA1(P07900). Decreased level of Caspase-2 associated with childhood forms of drug-resistance acute lymphoblastic leukaemia and decreased Caspase-2 expression was observed in mantle cell lymphoma tumor samples. Caspase-2 is associated with neurodegenerative disorders such as Alzheimer's and Huntington'd diseases. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
