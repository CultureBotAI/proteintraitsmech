identifier: ComplexPortal:CPX-2782
label: "CRL4-DCAF5 E3 ubiquitin ligase complex, CUL4A variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF5. The complex is active in the ubiquitination and degradation of lysine-methylated non-histone proteins. Regulates the self-renewal and pluripotency or multipotency of embryonic and many adult stem cells. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
