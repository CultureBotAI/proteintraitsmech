identifier: ComplexPortal:CPX-6019
label: "Putative dimethyl sulfoxide reductase"
definition: >-
  Probably required for the reduction of dimethyl sulfoxide (DMSO) to dimethyl sulfide (DMS) and other S- and N-oxide compounds during anaerobic growth. Has also been suggested to be a selenate reductase. The operon is induced under anaerobic conditions but is repressed by nitrate ions. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
