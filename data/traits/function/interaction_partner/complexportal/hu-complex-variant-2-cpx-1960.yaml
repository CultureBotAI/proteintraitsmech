identifier: ComplexPortal:CPX-1960
label: "HU complex variant 2"
definition: >-
  Histone-like DNA-binding complex. Preferentially binds cruciform DNA in comparison to the alpha/beta heterodimer (CPX-1958) or alpha homodimer (CPX-1959) that bind to several forms of bent, kinked or damaged DNA. The precise role for the beta homodimer is unknown as knock-out mutants produce no measurable phenotype. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
