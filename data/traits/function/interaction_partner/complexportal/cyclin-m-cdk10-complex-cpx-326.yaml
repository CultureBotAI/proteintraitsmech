identifier: ComplexPortal:CPX-326
label: "Cyclin M-CDK10 complex"
definition: >-
  Cyclin-dependent protein kinase. Acts as a cell cycle regulator in some cells and as a tumor suppressor in others. Inhibits the transcriptional activity of Ets2 (P15036) by positively controlling its degradation by the proteasome, through the phosphorylation of Ser-220 and Ser-225. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
