identifier: ComplexPortal:CPX-166
label: "Dehydrodolichyl diphosphate synthase complex variant SRT1"
definition: >-
  One of two complexes involved in dolichol synthesis. An essential part of the dolichol monophosphate biosynthetic machinery; creates dehydrodolichyl diphosphate (Dedol-PP), a precursor of dolichol, by adding multiple isopentenyl pyrophosphates (IPP) to farnesyl pyrophosphate (FPP). Predominate product is 17-19 IPP units. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
