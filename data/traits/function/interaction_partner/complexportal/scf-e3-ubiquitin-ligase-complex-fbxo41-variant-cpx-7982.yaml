identifier: ComplexPortal:CPX-7982
label: "SCF E3 ubiquitin ligase complex, FBXO41 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO41 target proteins include the S-phase kinase-associated protein 2 SKP2 (Q13309) thus playing a role in the regulation of autophagy. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
