identifier: ComplexPortal:CPX-5897
label: "Alternative pathway pathogen cell-bound C5 convertase complex C3bBbC3bP"
definition: >-
  A serine-type endopeptidase complex of the alternative pathway of complement activation of the innate immune system. Cleaves Complement C5 precurser (P06684) into anaphylatoxin C5a (P06684-PRO_0000005994) and Complement C5b (P06684-PRO_0000005991, P06684-PRO_0000005995). Only occurs bound to pathogen cells and to target cells via its reactive thioester moiety. Properdin-binding stablises C3bBbC3b convertase (CPX-5895) and prevents its inactivation by Factor H (P06909). Following properdin dissociation the complex combines with C5b, C6 (E9Q6D8), C7 (D3YXF5), C8A (Q8K182), C8B (Q8BH35) & C8G (Q8VCG4) and C9 (P06683) to form the Membrane Attack Complex (CPX-6159). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
