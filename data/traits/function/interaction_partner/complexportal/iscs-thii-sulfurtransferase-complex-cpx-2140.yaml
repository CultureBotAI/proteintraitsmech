identifier: ComplexPortal:CPX-2140
label: "iscS-thiI sulfurtransferase complex"
definition: >-
  tRNA sulfurtransferase which catalyzes the ATP-dependent transfer of a persulfide sulfur formed at the active site of iscS to tRNA to produce 4-thiouridine in position 8 of tRNAs, which functions as a near-UV photosensor. Also catalyzes the transfer of sulfur to the sulfur carrier protein thiS, forming thiS-thiocarboxylate, a step in the synthesis of thiazole, in the thiamine biosynthesis pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
