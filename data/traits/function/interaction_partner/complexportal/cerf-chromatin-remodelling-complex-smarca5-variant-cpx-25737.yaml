identifier: ComplexPortal:CPX-25737
label: "CERF chromatin remodelling complex, Smarca5 variant"
definition: >-
  Chromatin remodelling complex which plays a role in neural tube closure and reproduction. CERF complex facilitates the perturbation of chromatin structure in an ATP-dependent manner. Cerc2 Loss-of-function mutations results in lethal neural tube defect and is associated with suboptimal spermatogenesis in mice that reach adulthood. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
