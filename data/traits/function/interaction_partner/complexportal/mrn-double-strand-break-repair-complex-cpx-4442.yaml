identifier: ComplexPortal:CPX-4442
label: "MRN double-strand break repair complex"
definition: >-
  Endo- and exonuclease complex that plays a central role in double-strand break (DSB) repair, DNA recombination, maintenance of telomere integrity and meiosis. It possesses single-strand endonuclease activity and double-strand-specific 3'-5' exonuclease activity, which are provided by MRE11.The complex may also be required for DNA damage signaling via activation of the ATM kinase (Q13315). In telomeres the MRN complex may modulate t-loop formation. MRN complex is part of the BRCA1-C complex (CPX-4441). MRE11, RAD50 and NBS1 are known tumor suppressors. Loss of function of any of these proteins results in genome instability. Defective MRN function has been linked to many types of cancer. Hypomorphic mutations in any of the human genes for MRN result in cancer predisposing genome-instability syndromes: mutations in the MRE11 and NBS1 genes cause ataxia telangiectasia-like disorder (ATLD) and Nijmegen breakage syndrome (NBS), respectively. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
