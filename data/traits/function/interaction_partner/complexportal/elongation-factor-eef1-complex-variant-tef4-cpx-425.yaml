identifier: ComplexPortal:CPX-425
label: "Elongation Factor eEF1 complex, variant TEF4"
definition: >-
  Transports an aminoacylated-tRNA (aa-tRNA) to the ribosomal A-site during the elongation phase of protein synthesis. GTP bound to eEF1A (TEF1/2) is hydrolyzed upon codon-anticodon match between an aa-tRNA in the ribosomal RNA A-site and mRNA bound to the ribosome. Inactive eEF1A-GDP leaves the ribosome and must be recycled to eEF1A-GTP before binding another molecule of aa-tRNA. The guanine nucleotide exchange factor eEF1B catalyzes the exchange of GDP for GTP. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
