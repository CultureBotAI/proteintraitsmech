identifier: ComplexPortal:CPX-26412
label: "ATR-ATRIP DNA damage-sensing kinase complex"
definition: >-
  Master regulator of the DNA damage response controlling a signaling cascade required for the maintenance of genomic integrity. Activated by RPA complex -coated single-stranded DNA at the site of DNA double-strand breaks and stalled replication forks. Appears to control the production of an adequate and balanced pool of deoxyribonucleotides and maintain replication fork stability. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
