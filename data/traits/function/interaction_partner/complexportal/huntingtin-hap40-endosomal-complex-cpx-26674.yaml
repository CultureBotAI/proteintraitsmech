label: "Huntingtin-HAP40 endosomal complex"
definition: >-
  The HTT-HAP40 complex plays several key biological roles, including maintaining protein stability, regulating intracellular transport, and modulating cellular homeostasis. The complex acts as a RAB5 (Q9V3I2) effector, regulating early endosome motility by by recruiting kinesins to facilitate anterograde motility along microtubules, thereby affecting intracellular cargo transport and membrane dynamics. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
