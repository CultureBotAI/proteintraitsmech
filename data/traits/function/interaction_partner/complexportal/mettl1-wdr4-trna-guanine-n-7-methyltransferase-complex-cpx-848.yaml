identifier: ComplexPortal:CPX-848
label: "METTL1-WDR4 tRNA (guanine-N(7)-)-methyltransferase complex"
definition: >-
  7-Methyltransferase that modifies guanosine-46 in the variable loop of certain tRNAs that contain the 5'-RAGGU-3' motif. m7G46 makes triple-base interactions with cytosine-13 and guanosine-22. The tertiary interactions increase the thermal stability of the tRNAs and thus modulates steady-state tRNA levels. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
