identifier: ComplexPortal:CPX-113
label: "Survivin homodimer complex"
definition: >-
  An anti-apoptotic pre-assembly complex that provides one protomer to the chromosomal passenger complex (CPC). Survivin cycles through alternating monomer-dimer states that are capably of diverse functions. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
