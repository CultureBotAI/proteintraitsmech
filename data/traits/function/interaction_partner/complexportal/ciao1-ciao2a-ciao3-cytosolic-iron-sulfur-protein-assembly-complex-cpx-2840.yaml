identifier: ComplexPortal:CPX-2840
label: "CIAO1-CIAO2A-CIAO3 cytosolic iron-sulfur protein assembly complex"
definition: >-
  Transfers [4Fe-4S] clusters assembled on the NUBP1-NUBP2 Fe-S cluster assembly scaffold complex (CPX-2823) on to cytosolic and/ or nuclear Fe/S proteins. CIAO3 receives the [4Fe-4S] cluster from the scaffold complex and then binds to the CIAO2A-CIAO1 heterodimer. May act to regulate ACO1 (P21399), a bifunctional iron sensor. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
