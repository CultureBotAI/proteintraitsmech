identifier: ComplexPortal:CPX-2153
label: "UvrBC excinuclease repair complex"
definition: >-
  The UvrBC excinuclease repair complex is part of the UvrABC repair system that catalyzes the recognition and processing of DNA lesions. It scans the DNA for abnormalities. Upon binding of the UvrAB complex (CPX-2151) to a putative damaged site, the DNA wraps around one of the uvrB subunits. uvrB probes one DNA strand for the presence of a lesion. If a lesion is found the uvrA subunits dissociate and the uvrB-DNA preincision complex (CPX-2152) is formed. This complex is subsequently bound by uvrC and one of the uvrB monomers is released. uvrC is a dual endonuclease making incisions on either side of the lesion. The first incision is damage-dependent and is made at the 4th or 5th phosphodiester bond 3' to the lesion by the N-terminal domain of uvrC, while the second, damage-independent incision is made at the 8th phosphodiester bond 5' to the lesion by another endonuclease domain located towards the C-terminus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
