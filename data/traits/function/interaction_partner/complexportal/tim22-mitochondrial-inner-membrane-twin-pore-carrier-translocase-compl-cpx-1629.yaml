identifier: ComplexPortal:CPX-1629
label: "TIM22 mitochondrial inner membrane twin-pore carrier translocase complex"
definition: >-
  Mediates the insertion and lateral release of multi-spanning membrane precursor proteins into the mitochondrial inner membrane in a membrane potential-dependent manner following translocation into the mitochondrion. Most mitochondrial proteins are synthesized in the cytosol, imported into mitochondria, sorted to one of the four submitochondrial compartments, where they function, and attain their functional native conformation, which is often facilitated by assembly into the membrane or a multiprotein complex. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
