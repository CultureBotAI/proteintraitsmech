identifier: ComplexPortal:CPX-26455
label: "Nuclear origin recognition complex"
definition: >-
  Protein complex that binds to the autonomously replicating sequence (ARS) origin of DNA replication in an ATP-dependent manner and recruits other proteins, such as the initiation factors cdc18 (P54789), to form a pre-replicative complex before the initiation of DNA replication that occurs in S phase. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
