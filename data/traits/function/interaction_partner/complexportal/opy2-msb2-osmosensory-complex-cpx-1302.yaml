identifier: ComplexPortal:CPX-1302
label: "OPY2-MSB2 osmosensory complex"
definition: >-
  Osmosensor that activates the HOG1 mitogen-activated protein kinase (P32485), which regulates diverse osmoadaptive responses. Increased external osmolarity induces conformational changes in the complex formed between the Hkr1-Msb2 homology (HMH) domain of MSB2 and the cysteine-rich region of OPY2. This conformational change is transmitted across the plasma membrane to induce an interaction between the associated STE20 (Q03497) and STE11 (P23561) protein kinases, thus activating a signal cascade which culminates in HOG1 activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
