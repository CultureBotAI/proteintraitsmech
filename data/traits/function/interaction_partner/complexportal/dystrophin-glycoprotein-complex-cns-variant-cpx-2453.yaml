identifier: ComplexPortal:CPX-2453
label: "Dystrophin glycoprotein complex, CNS variant"
definition: >-
  A plasma membrane transmembrane complex that links the actin cytoskeleton to the extracellular matrix. Essential for cognition and memory involving hippocampal and forebrain function. Also plays a role in modulating synapse function at inhibitory GABAergic synapses in the cerebellum, the amygdala, and the hippocampus where it is present in the post-synapse. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
