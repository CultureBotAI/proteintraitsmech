identifier: ComplexPortal:CPX-2466
label: "FACT complex"
definition: >-
  An H2A-H2B histone chaperon complex that helps reorganize nucleosomes in an ATP-independent fashion. It is involved in various processes related to chromatin dynamics: DNA replication, DNA damage and repair, transcription initiation and elongation. Binds histone H2A-H2B dimers and possibly small amounts of H3H4. Facilitates RNA Polymerase II driven transcription through chromatin by destabilizing nucleosomal structure so that one of the H2A-H2B dimers is removed upon RNA Pol II passage. Subsequently brings back the histones and thereby maintains nucleosome integrity after RNA Pol II passage. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
