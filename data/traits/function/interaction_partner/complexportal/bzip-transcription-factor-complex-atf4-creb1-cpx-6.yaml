identifier: ComplexPortal:CPX-6
label: "bZIP transcription factor complex, Atf4-Creb1"
definition: >-
  Transcription factor complex which binds to a specific DNA site to regulate transcription. This complex binds the cAMP response element (CRE) (consensus: 5'-GTGACGT[AC][AG]-3'). Involved in the ER stress response pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
