identifier: ComplexPortal:CPX-522
label: "Interleukin-1 beta ligand-decoy receptor type 2 complex"
definition: >-
  A decoy receptor complex which acts by competitively binding both IL1B and IL1RAP with high affinity, preventing their binding to IL1R1 thus inhibiting IL1 induced inflammation Non-signaling IL1R2 is the predominant IL1 binding receptor expressed by monocytes, neutrophils and B cells. Regulatory T-cells also express membrane-bound and soluble IL1R2 (sIL1R2) but pro-inflammatory molecules are thought to inhibit IL1R2 expression. Plasma of healthy individuals are thought to contain high levels of sIL1R2, while defective or increased expression sIL1R2 in tissue or bodily fluids are ascribed to a range of pathological conditions, including critical autoimmune diseases, tumours and neuroinflammatory diseases. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
