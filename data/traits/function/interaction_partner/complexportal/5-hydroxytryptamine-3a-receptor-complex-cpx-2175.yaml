identifier: ComplexPortal:CPX-2175
label: "5-hydroxytryptamine-3A receptor complex"
definition: >-
  Inward-rectifying, ligand-gated ion channel, which when activated by 5-hydroxytryptamine (5-HT, serotonin) causes fast neuronal depolarization and excitation or modulation of neurotransmitter release depending on their neuronal localisation (central and/or peripheral nervous system). A cation-specific, but otherwise relatively non-selective, ion channel with low conductance. Ca2+-permeability is related to subunit composition with 5HT3A homopentamers being more permeable than 5HT3A/B heteropentamers. Found pre- and post-synaptically but with different properties - pre-synaptic 5-HT3 receptors are predominantly calcium-permeant while post-synaptic receptors are permeant to Na+ and K+. Also Mg2+ permeant. Pre-synaptic depolarisations are generally slower than post-synaptic depolarisations. 5-HT3 receptors increase the frequency of spontaneous excitatory post-synaptic currents (sEPSCs) or miniature EPSCs (mEPSCs). These may be related to 5-HT3-induced depolarisation of pre-synaptic membranes and subsequent activation of cholinergic or glutamatergic neurotransmissions or evoked excitatory post-synaptic currents (eEPSCs) or spontaneous inhibitory post-synaptic currents (sIPSCs) related to GABAergic neurotransmissions post-synaptic 5-HT3 receptor activation. Due to different residues in transmembrane domain M2 of the 5-HT3A and 5-HT3B subunits the 5-HT3A/B heteromeric receptors are more efficient conductors than 5-HT3A homomeric receptors and have increased agonist and antagonist affinity. Homomeric receptors recover faster from desensitisation but are probably less prevalent in vivo. High levels of expression are found in the vagal terminals of the dorsal vagal complex where it is involved in the vomiting reflex (especially post-operative and chemotherapy- and radiation-induced vomiting and nausea), in the amygdala and the hippocampi. 5-HT3 receptor antagonists therefore act as effective anti-emetic drugs. Lower levels of expression are found in the forebrain with higher relative expression in the striatum than the cortical regions. Involved in processes associated with emotion, cognition, memory and pain perception. Involved in ganglionic transmission in the myenteric plexus in the mucosal layer and expressed in the gastrointestinal (GI) tract where serotonin mediates control over a variety of physiological functions such as the contraction/relaxation of smooth muscle, and peristaltic and secretory reflexes, directly or indirectly through intrinsic primary afferent neurons. Plays an important role in the regulation of inflammation and immune responses in the peripheral nervous system. Activation of 5-HT3 receptors on visceral afferents in some irritable bowel syndrome (IBS) patients results in visceral hypersensitivity. Chaperone proteins assist assembly, modifications and export from the ER followed by transport in vesicle-like structures along microtubules to the plasma membrane where they typically form clusters in F-actin-rich regions. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
