identifier: ComplexPortal:CPX-953
label: "MBD2/NuRD nucleosome remodeling and deacetylase complex"
definition: >-
  Corepressor complex that couples histone deacetylase and ATP-dependent chromatin remodeling activities. It regulates the higher-order structure of chromatin, making chromatin more compact by removing acetyl groups from nucleosomes, and has important roles in the regulation of gene expression and DNA damage repair. The core of the complex is composed of six groups of proteins, each one with several paralogues (Hdac1/2, Mta1/2/3, Rbbp4/7, Gatad2a/b, Mbd2, and Chd3/4). Combinatorial assembly of these isoforms contributes to the targeting and function of the complex. It is currently not known whether Gatad2a/Gatad2b, Rbbp4/Rbbp7, and Mta1/Mta2/Mta3 form heterodimers/trimers or mutually exclusive homodimers/trimers. The Chd3/4 ATPase, utilizes energy derived from hydrolysis of ATP for DNA sliding and repositioning of nucleosomes. The second catalytic subunit, Hdac1/2 (histone deacetylase), deacetylates acetylated lysine residues of histone and non-histone proteins. This dual enzymatic activity is proposed to be important for the efficient formation of heterochromatin with densely packed hypoacetylated nucleosomes and the rapid termination of gene transcription. In addition to the well-described core subunits, a large number of proteins have been reported to interact with the NuRD complex, like Doc1 (O35207), Kpna2 (P52293), Zmynd8 (A2A484), Znf512b/532/592/687(Q6PHP4, Q6NXK2 , Q8BHZ4, Q9D2D7), Sall4 (Q8BX22), Prmt5 (Q8CIG8), Mep50 (Q99J09). They also contribute to dictate the different biological functions of the NuRD complex. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
