identifier: ComplexPortal:CPX-2462
label: "VPS4-VTA1 compex"
definition: >-
  The ESCRT machinery, consisting of ESCRT-0 (CPX-2452), -I (CPX-2457/CPX-2460), -II (CPX-2458), -III (CPX-2459) and -IV (VPS4-VTA1 complex, this complex) has been implicated in membrane scission steps, transforming a single, continuous bilayer into two distinct bilayers, either from within the neck of a vesicle budding away from the cytoplasm or from within a membrane tubule, while segregating cargo throughout the process. ESCRT-0 binds to and clusters ubiquitinated cargo for delivery into multivesicular bodies, and recruits clathrin, ubiquitin ligases, and deubiquitinating enzymes. ESCRT-0 recruits ESCRT-I which engages ESCRT-II to nucleate ESCRT-III polymerization. VPS4-VTA1 complex, also known as ESCRT-IV, disassembles ESCRT-III to recycle its subunits. The ESCRT-III complex facilitates changes in membrane architecture by oligomerizing to form spiral, filament-like tubules, accumulation of which is associated with membrane constriction and fission. Disassembly of ESCRT-III by VPS4-VTA1 may be a required step for fission. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
