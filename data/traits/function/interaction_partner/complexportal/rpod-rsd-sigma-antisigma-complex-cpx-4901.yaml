identifier: ComplexPortal:CPX-4901
label: "rpod-rsd sigma-antisigma complex"
definition: >-
  Regulates RpoD-mediated transcription activation by preventing the interaction between the primary sigma factor RpoD with DNA-directed RNA polymerase (RNAP) and with promoter DNA.The complex forms only during the stationary phase possibly due to rsd preferentially binding the non-phosphorylated form of the phosphoenolpyruvate-dependent phosphotransferase system control protein ptsH/HPr (P0AA04), which is the dominant form of HPr when cells are growing exponentially. Sequestration of rpoD into this complex biases the competition between rpoD and alternative Sigma factors for the available core RNAP. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
