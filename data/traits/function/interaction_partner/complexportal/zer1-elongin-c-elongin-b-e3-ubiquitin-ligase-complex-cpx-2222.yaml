identifier: ComplexPortal:CPX-2222
label: "ZER1-Elongin C-Elongin B E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which targets degradation signals (degrons) within the N-termini of substrate proteins. Plays a role in apoptosis as N-terminal glycine degrons are strongly enriched at caspase cleavage sites. Important in the quality control of protein N-myristoylation in which N-terminal glycine degrons are conditionally exposed after a failure of N-myristoylation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
