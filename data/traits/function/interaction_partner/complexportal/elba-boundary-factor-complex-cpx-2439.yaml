identifier: ComplexPortal:CPX-2439
label: "ELBA boundary factor complex"
definition: >-
  A chromatin boundary factor which binds to specific DNA and confers insulator activity, subdividing eukaryotic chromosomes into functionally autonomous domains of genetic activity during early embryogenesis. Associates with the asymmetric site 'CCAATAAG' in the Fab-7 insulator element. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
