identifier: ComplexPortal:CPX-1604
label: "Small ribosomal subunit processome"
definition: >-
  Mediates the early stages of maturation of the small ribosomal subunit by coupling RNA folding to subsequent RNA cleavage and processing steps. A 47S precursor transcript contains coding segments for the small ribosomal subunit (18S) and large ribosomal subunit (28S and 5.8S) and regulatory regions including the 5' external transcribed spacer (5' ETS). The SSU processome binds to the 5' ETS and cleaves the precursor transcript at site A1, which separates the 5′ ETS and 18S segments. and then drives the transition toward a pre-40S particle. A curated stable macromolecular complex (Complex Portal) with 33 subunits.
definition_source: Complex Portal
