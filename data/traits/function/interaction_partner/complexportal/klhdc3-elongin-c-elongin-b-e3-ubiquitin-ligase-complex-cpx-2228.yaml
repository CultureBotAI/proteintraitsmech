identifier: ComplexPortal:CPX-2228
label: "KLHDC3-Elongin C-Elongin B E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which targets degradation signals (degrons) within the C-termini of substrate proteins in a pathway termed destruction via C-end degrons (DesCEND). The C-degron is generally a motif of fewer than ten residues ending with -Arg-(Xaa)n-Arg-Gly, -Arg-(Xaa)n-Lys-Gly, or -Arg-(Xaa)n-Gln-Gly and can be present in full-length proteins, truncated proteins or proteolytically cleaved forms. Substrates include the cell cycle regulator CDKN2A (Q8N726). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
