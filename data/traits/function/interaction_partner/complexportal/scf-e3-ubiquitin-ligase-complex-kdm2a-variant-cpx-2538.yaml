identifier: ComplexPortal:CPX-2538
label: "SCF E3 ubiquitin ligase complex, KDM2A variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
