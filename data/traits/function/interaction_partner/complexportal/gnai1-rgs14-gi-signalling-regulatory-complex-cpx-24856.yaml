identifier: ComplexPortal:CPX-24856
label: "GNAI1-RGS14, Gi-signalling regulatory complex"
definition: >-
  A multifunctional signalling assembly in which RGS14 binds GDP-GNAI1₁ stabilizes it in its inactive state and coordinates cross-talk between heterotrimeric G-protein and Ras/MAPK signalling pathways. The complex acts as a regulator of Gi-mediated signalling in neurons and other tissues. GDP-GNAI1 binding to RGS14 also prevents the latters association with centrosomes. GDP-GNAI1 binding results in the translocation of RGS14 from the cytoplasm to the plasma membrane where it acts as a scaffold and regulator of G-protein signalling; translocation switches RGS14's from a potential structural role in centrosomal organization to a dynamic signalling role at the cell surface. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
