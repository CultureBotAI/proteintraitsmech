identifier: ComplexPortal:CPX-461
label: "155 kDa platelet multimerin complex"
definition: >-
  Glycoprotein complex of the C1q/TNF superfamily involved in cell adhesion of vascular endothelial cells and platelets via binding to integrins alphaIIb-beta3 (CPX-1799) and alphav-beta3 (CPX-1795). Binding to Factor V (P12259) and Factor Va (activated Factor V) inhibits thrombin generation. Sequestered in platelet alpha granules prior to secretion into the extracellular matrix (ECM). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
