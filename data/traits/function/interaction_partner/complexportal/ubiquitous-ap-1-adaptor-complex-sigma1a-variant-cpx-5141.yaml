identifier: ComplexPortal:CPX-5141
label: "Ubiquitous AP-1 Adaptor complex, sigma1a variant"
definition: >-
  Adaptor complex that orchestrates the formation of membrane coats that mediate cargo selection and vesicle budding, for example by linking clathrin to the membrane surface of trans-Golgi network vesicles. Also recruits proteins involved in downstream vesicle functions such as motility, vesicle tethering and fusion with the target organelle. Required for the biogenesis of specialised organelles of the endosomal-lysosomal system, such as melanosomes and platelet dense granules. Once Rab32 (Q9CZE3) and Rab38 (Q8QZZ8) are activated by BLOC-3 (CPX-5083), they interact with AP-3 (CPX-5145 and CPX-5146), AP-1 and BLOC-2 (CPX-5084) complexes which function as adaptor complexes on early/recycling endosome tubules, where cargoes are loaded into vesicles or transport intermediates and transported to nascent melanosomes and platelet dense granules. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
