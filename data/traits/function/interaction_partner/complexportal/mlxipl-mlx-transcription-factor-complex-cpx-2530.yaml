identifier: ComplexPortal:CPX-2530
label: "MLXIPL-MLX transcription factor complex"
definition: >-
  Glucose-responsive transcriptional activator which recognizes an E box hexanucleotide DNA consensus sequence 5'-CACGTG-3' located within gene promoters. Regulates transcription of genes encoding enzymes involved in de novo lipogenesis such as liver-type pyruvate kinase, acetyl-CoA carboxylase 1, and fatty acid synthase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
