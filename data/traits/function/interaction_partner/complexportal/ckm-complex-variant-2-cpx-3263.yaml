identifier: ComplexPortal:CPX-3263
label: "CKM complex variant 2"
definition: >-
  Reversibly associates with the Mediator complex (CPX-3227). Mediator lacking the CKM complex has a stimulatory effect on basal transcription. In contrast, Mediator containing the sub-complex represses basal transcription. This effect is independent of kinase activity but binding of the complex to Mediator may interfere with RNAPII recruitment and repress transcription re-initiation. Variant 1 and 2 have been shown to regulate different, but overlapping sets of target genes. Other variants of this complex may exist, containing MED12L (Q86YW9) and/or MED13L (Q71F56) but their existence has not been proven. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
