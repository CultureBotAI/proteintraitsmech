identifier: ComplexPortal:CPX-3464
label: "MlaFEDB lipid transport complex"
definition: >-
  Required for the maintenance of asymmetery of the outer membrane, with an outer leaflet rich in lipopolysaccharide and an inner leaflet composed of phospholipids. MlaC (P0ADV7) shuttles phospholipid substrates between the inner membrane MlaFEDB transporter and an outer membrane complex, diffusing across the periplasm to the MlaFEDB complex in the inner membrane, where ATP hydrolysis may facilitate extraction of the lipid from MlaC and/or the translocation of the lipid into the inner membrane. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
