identifier: ComplexPortal:CPX-1195
label: "Embryonic stem cell-specific SWI/SNF ATP-dependent chromatin remodeling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. Also targeted to chromatin by phosphatidylinositol-4,5-bisphosphate which promotes the complex binding to actin filaments. The complex additionally interacts with a range of nuclear receptors and the vitamin D receptor (VDR, P11473) via SMARCD subunits. The embryonic stem cell-specific SWI/SNF complex is critical for self-renewal, maintenance and pluripotency of embryonic stem cells. The lack of subunit ARID1B suggests it primarily acts as a transcriptional repressor but also has the ability to activate some genes. The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. The embryonic stem cell-specific (esc-)SWI/SNF complex specifically lacks subunits ACTL6B (O94805), ARID1B (Q8NFD5), SMARCA2 (P51531), SMARCC2 (Q8TAQ2) and SMARCD3 (Q6STE5). SMARCD2 (Q92925) may be present in esc-SWI/SNF complexes in which case it probably forms a variant, replacing SMARCD1. BCL7A, BCL7B and BCL7C have been shown to be part of the esc-SWI/SNF complex but may be mutually exclusive and therefore probably forms further variants. Mutations in several subunits affect tissue and developmental processes such as nervous system and cardiac development and maintenance of pluripotency resulting in tumorigenesis or the development of intellectual disorders. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
