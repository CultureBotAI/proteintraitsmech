identifier: ComplexPortal:CPX-1638
label: "Oligosaccharyltransferase complex, OST6 variant"
definition: >-
  Transfers the dolicholphosphate-linked core oligosaccharide to selected Asn-X-Ser/Thr sequences of the nascent polypeptide chain, a key step in N-glycosylation of secretory and membrane-bound proteins in the lumen of the endoplasmic reticulum. The two variant complexes may be involved in the recognition of different protein substrates, perhaps in combination with their recruitment to the two different protein translocation machineries. Variant 1 may be involved in N-glycosylation of a group of proteins, necessary for cell wall formation or for growth at high temperature and binds to the Ssh1 translocon complex (CPX-1834). A curated stable macromolecular complex (Complex Portal) with 8 subunits.
