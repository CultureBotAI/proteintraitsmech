identifier: ComplexPortal:CPX-9166
label: "Precursor interleukin-1 alpha-soluble receptor type 1 complex"
definition: >-
  Complex formed on the binding of a pre-bound precursor form of interleukin-1 alpha (IL1A) and a soluble form of its receptor, interleukin-1R1 (IL1R1) to its coreceptor, interleukin-1 receptor accessory protein (IL1RAP). A member of the IL1 family of cytokines, IL1A is closely related to interleukin-1 beta (IL1B, P01584) carrying out similar biological functions by binding to their shared receptor complex. Although both IL1A and IL1B function via the same IL1R1 to drive an inflammatory response, IL1A acts as an alarmin and is thought to focus its efforts on local inflammation while IL1B acts as a master regulator of systemic inflammation. IL1A precursor protein (ProIL1A) is constitutively expressed by many cell types and is released upon necrotic cell death as a bioactive mediator, making it central to the pathogenesis of all conditions characterized by organ or tissue inflammation where the epitheilal barrier is disrupted. ProIL1A (this complex) is processed by calpain II (P17655) to produce the more biologically active, secreted form. IL1A activity is regulated by two forms of the IL1R1: a membrane-bound form (mIL1R1, CPX-9169) and a soluble form (sIL1R1, this complex) created through proteolytic release of the ectodomain (ECD) of mIL1R1 by matrix metalloproteases. Both forms of IL1R1 are biologically active and the ECD in both forms is vital for ligand recognition and binding. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
