identifier: ComplexPortal:CPX-2727
label: "Adaptor complex AP-3"
definition: >-
  Adaptor complex that orchestrates the formation of membrane coats that mediate cargo selection and vesicle budding, for example by linking clathrin to the membrane surface of trans-Golgi network vesicles. AP-3 is associated with endosomes and, to a less extent, the trans-Golgi network and appears to function independently of clathrin. Drosophila AP-3 genes were first linked to defects in the biogenesis of visual pigment granules. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
