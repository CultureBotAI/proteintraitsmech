identifier: ComplexPortal:CPX-2096
label: "Mitochondrial DNA polymerase gamma complex"
definition: >-
  A high-fidelity mitochondrial 5'-3' polymerase responsible for the replication recombination and repair of mitochondrial DNA. Utilizes a wide variety of DNA substrates, being most efficient on substrates with high primer density. Also has a highly mispair-specific 3'-5' exonuclease activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
