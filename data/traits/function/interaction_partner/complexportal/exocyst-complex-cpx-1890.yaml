identifier: ComplexPortal:CPX-1890
label: "Exocyst complex"
definition: >-
  Recruited to sites of active exocytosis and membrane expansion, where it mediates the tethering of secretory vesicles to the plasma membrane in preparation for soluble N-ethylmaleimide-sensitive factor (NSF) attachment protein receptor (SNARE)-mediated membrane fusion. The exocyst is localized to the emerging bud tip, where it mediates exocytosis for the asymmetric expansion of daughter cell surfaces during polarized cell growth. During cytokinesis, the exocyst is localized to the mother–daughter cell junction to mediate abscission. The targeting of secretory vesicles to the plasma membrane involves direct interactions of the exocyst with PI(4,5)P2. In addition, a number of small GTP-binding proteins interact with components of the exocyst and regulate the assembly, localization, and function of this complex. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
