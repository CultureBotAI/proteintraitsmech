identifier: ComplexPortal:CPX-1016
label: "CBF1-MET4-MET28 sulfur metabolism transcription factor complex"
definition: >-
  Transcription factor complex regulating sulfur metabolism. MET4 lacks DNA-binding ability and relies on its interaction with CBF1 to activate its targets. CBF1 is a basic helix–loop–helix factor protein that that homodimerizes to bind a cis-regulatory element CACGTGA motif and then recruits the transactivator MET4 to promoters. MET28 acts to stabilise the complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
