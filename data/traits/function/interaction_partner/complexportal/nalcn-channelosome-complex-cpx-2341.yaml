identifier: ComplexPortal:CPX-2341
label: "NALCN channelosome complex"
definition: >-
  Voltage-gated ion channel responsible for the depolarizing sodium (Na+) leak currents that determine resting Na(+) permeability and control neuronal excitability. Plays a role in the regulation of neuronal excitability, motor function, pain sensitivity, and circadian rhythm. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
