identifier: ComplexPortal:CPX-6091
label: "LPL-GPIHBP1 triglyceride-rich lipoprotein processing complex"
definition: >-
  Lipoprotein processing complex required for the hydrolysis of triglycerides in the bloodstream and for the delivery of lipid nutrients to vital tissues. GPIHBP1 recruits LPL to the luminal surface of vascular endothelium, capturing it within the interstitial spaces and shuttling it across endothelial cells to the capillary lumen where it then catalyzes the hydrolysis of triglycerides from circulating chylomicrons and very low density lipoproteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
