identifier: ComplexPortal:CPX-2879
label: "Platelet-derived growth factor CC complex"
definition: >-
  C-chain of the platelet-derived growth factor (PDGF). Binds to and activates PDGF receptor alpha (PDGFRalpha, P16234) and beta (PDGFRbeta, P09619) subunits by inducing receptor dimerisation and tyrosine phosphorylation. Is a potent mitogen for cells of mesenchymal origin. Plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Required for normal skeleton formation during embryonic development, especially for normal development of the craniofacial skeleton and for normal development of the palate. Required for normal skin morphogenesis during embryonic development. Plays an important role in wound healing, where it appears to be involved in three stages: inflammation, proliferation and remodeling. Plays an important role in angiogenesis and blood vessel development. Involved in fibrotic processes, in which transformation of interstitial fibroblasts into myofibroblasts plus collagen deposition occurs. The CUB domain has mitogenic activity in coronary artery smooth muscle cells, suggesting a role beyond the maintenance of the latency of the PDGF domain. In the nucleus, PDGFC seems to have additional function. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
