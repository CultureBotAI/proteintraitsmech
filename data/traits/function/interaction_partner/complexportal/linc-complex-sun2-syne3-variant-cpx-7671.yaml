identifier: ComplexPortal:CPX-7671
label: "LINC complex, SUN2-SYNE3 variant"
definition: >-
  Forms immediately below the outer nuclear membrane and traverses the nuclear envelope to mechanically couple cytoskeletal and nuclear components across the nuclear envelope, allowing the transmission of force. SYNE3 interacts with intermediate filaments via the adapter protein plectin (Q15149). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
