identifier: ComplexPortal:CPX-2082
label: "Cyclin E2-CDK2 complex"
definition: >-
  Required for G1 to S phase transition of the mitotic cell cycle. Hyper-phosphorylation of Rb proteins by cyclin E:CDK2 complexes leads to their inactivation which allows transcription of E2F-controlled genes such as cyclin E1 itself. Additional substrates include the p27 cell cycle inhibitor and the NPAT/p220 transcription factor Complex formation enables substrate binding to the kinase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
