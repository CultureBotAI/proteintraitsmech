identifier: ComplexPortal:CPX-2733
label: "miRNA RISC complex"
definition: >-
  Incorporates one strand of a micro RNA (miRNA) and uses this as a template for recognizing complementary mRNA. Once bound to a complementary strand, it activates RNase and cleaves the RNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
