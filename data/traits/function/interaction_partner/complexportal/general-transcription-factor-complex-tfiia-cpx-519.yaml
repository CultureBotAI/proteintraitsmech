identifier: ComplexPortal:CPX-519
label: "General transcription factor complex TFIIA"
definition: >-
  Transcription factor complex that regulates transcription initiation from RNA polymerase II promoters. Binding to the transcription factor complex TFIID-TBP enhances assembly of the transcriptional preinitiation complex PIC and its binding to the DNA at the TATA-box by displacing transcription inhibitors, such as DRAP1 (Q14919) or DR1 (Q01658), from TBP (P20226). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
