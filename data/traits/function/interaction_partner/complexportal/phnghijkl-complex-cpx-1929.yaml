identifier: ComplexPortal:CPX-1929
label: "PhnGHIJKL complex"
definition: >-
  Formed from components of the phn operon in gram-negative bacteria that facilitates the internalization and degradation of organophosphonates. Carbon-phosphorous lyase (CP lyase) and alpha-D-ribose 1-methylphosphonate 5-triphosphate synthase activites have been attributed to at least the PhnG, PhnH, PhnI, PhnJ, PhnK and PhnL components of the Phn operon. It is unclear which of the subunits are absolutely necessary for each activity. PhnG, PhnH, PhnI and PhnL have alpha-D-ribose 1-methylphosphonate 5-triphosphate synthase activity and PhnJ has alpha-D-ribose 1-methylphosphonate 5-phosphate C-P-lyase activity in vitro. However, PhnJ can only be isolated in a complex of at least PhnG, PhnH, PhnI, PhnJ and PhnK but this complex is catalytically inactive, possibly because it lacks PhnL. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
