identifier: ComplexPortal:CPX-8569
label: "PUCH ribonuclease complex, slfl-4 variant"
definition: >-
  piRNA precursor endonuclease which processes single-stranded piRNA precursor molecules to define the 5'-end of a new piRNA. This is then bound by a PIWI protein, such as ergo-1 (O61931). PUCH-mediated processing absolutely requires requires a 7-methyl-G cap (m7 G-cap) and an uracil at position three and exhibits a strong preference for an adenine or guanine residue at position 1. The complex interacts with PETISCO (CPX-4306/CPX-4307), a complex that binds to and stabilizes piRNA precursors. This enhances piRNA processing. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
