identifier: ComplexPortal:CPX-2137
label: "csdA L-cysteine desulfurase complex"
definition: >-
  An L-cysteine desulfurase and L-selenocysteine lyase that catalyses the removal of elemental sulfur and selenium atoms from L-cysteine, L-cystine, L-selenocysteine, and L-selenocystine to produce L-alanine, and transiently retains the released sulfur atom on a cysteine residue, in the form of a persulfide. It transfers the sulfur to (a) csdE that increases the cysteine desulfurase activity of csdA (csdA-csdE complex CPX-2138) or to (b) tcdA/csdL where it appears to support the function of TcdA in the generation of cyclic threonylcarbamoyladenosine at position 37 (ct6A37) in tRNAs that read codons beginning with adenine (in vitro). csdA also desulfinates L-cysteine sulfinate, which is the best substrate of the enzyme. csdA functions as a selenium delivery protein in the pathway for the biosynthesis of selenophosphate and participates in Fe/S biogenesis (by recruiting the sufBCD-sufE proteins). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
