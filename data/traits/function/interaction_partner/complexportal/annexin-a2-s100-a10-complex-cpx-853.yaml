identifier: ComplexPortal:CPX-853
label: "Annexin A2 - S100-A10 complex"
definition: >-
  Calcium-dependent membrane-tethering complex that acts on ruptured membranes and aids general membrane organisation. Annexin A2 binds to negatively charged phospholipids at rupture sites while the S100-A10 dimer binds one molecule of annexin A2 at each end forming a junctions between adjacent bilayers. Rapid influx of Ca2+ at the rupture site activates complex formation by Ca2+ binding to Annexin A2. Membrane tethering is further aided by additional proteins forming larger complexes, such as the AHNAK - Annexin A2 - S100-A10 complex (CPX-850) or the SMARCA3 - Annexin A2 - S100-A10 complex (CPX-856); repair activity may also require dysferlin (O75923). Also plays a role in the organization of membrane-associated actin at sites of cholesterol-rich membrane domains. Found at sites of plasma membrane/secretory granule membrane contact and intergranule contact and therefore possibly involved in exocytotic processes and vesicles aggregation. Can indirectly affect a number of membrane transport events. Linked to Cl− channel regulation. As an extracellular complex, it regulates the stimulation of t-PA-dependent activation of plasminogen. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
