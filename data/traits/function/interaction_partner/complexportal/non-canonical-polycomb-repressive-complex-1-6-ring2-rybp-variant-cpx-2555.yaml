identifier: ComplexPortal:CPX-2555
label: "Non-canonical polycomb repressive complex 1.6, RING2-RYBP variant"
definition: >-
  E3 ubiquitin-protein ligase that acts as a transcriptional repressor by mediating the monoubiquitination of Lys-119 of histone H2A, compacting chromatin, stalling RNA polymerase II and transcriptionally silencing genes critical for development. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
