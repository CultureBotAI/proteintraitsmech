identifier: ComplexPortal:CPX-1316
label: "NRD1 snoRNA termination complex"
definition: >-
  ATP-dependent 5-prime->3-prime DNA/RNA helicase complex required for transcription termination at genes encoding snRNAs and snoRNAs30 and at cryptic unstable transcripts, which are an important class of transcription units that code for ncRNA. May also include some mRNAs as substrates. NRD1 and NAB3 recognize and bind to specific motifs on the nascent RNA (GUAA/G and UCUUG respectively) NRD1 additionally interacts with phosphoryated Ser-5 of the C-terminal domain of the largest subunit of RNAPII (CPX-2662). This positions SEN1 onto the nascent RNA in close proximity to RNAPII and the complex translocates along the RNA causing dismantling of the elongation complex (ternary complexes composed of the transcribing RNA polymerase, the DNA template and the nascent RNA) in a reaction that requires the action of the helicase domain of SEN1. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
