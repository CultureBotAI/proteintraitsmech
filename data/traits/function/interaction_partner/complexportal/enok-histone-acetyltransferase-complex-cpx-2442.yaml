identifier: ComplexPortal:CPX-2442
label: "Enok histone acetyltransferase complex"
definition: >-
  Histone lysine acetyltransferase 6 complex which preferentially acetylates histone H3 residues in nucleosomes. May modulate PCNA levels on chromatin during cell cycle progression via an interaction with the Elg1-RFC-like complex (CPX-2441). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
