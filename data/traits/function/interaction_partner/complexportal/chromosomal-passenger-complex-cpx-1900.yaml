identifier: ComplexPortal:CPX-1900
label: "Chromosomal passenger complex"
definition: >-
  Serine/threonine kinase complex which ensures chromosome bi-orientation on the mitotic spindle during metaphase by phosphorylating multiple kinetochore components. It destabilizes monopolar attachments by phosphorylating key proteins at the kinetophore. The opposing Chromosomal Passenger complex and Glc7 (P32598) activities ensure that chromosomes achieve a bipolar attachment to the spindle. Monopolar attachments do not produce tension across sister kinetochores (and the complex may act by sensing this absence of tension). The Chromosome passenger complex is conserved from yeast to man and is an essential regulator of diverse aspects of mitosis that ensure faithful chromosome segregation. The complex undergoes changes in its localization throughout mitosis: in early mitosis it presumably localizes to chromosome arms while later in metaphase it is found at the centromere. At anaphase onset it re-localizes to mitotic spindle microtubules accumulating in the midbody in late anaphase where it promotes spindle disassembly and cytokinesis. In budding yeast it seems to follow the positive ends of depolimerizing microtubules in late anaphase. It also plays a role in contractile ring formation and regulation of abscission in cytokinesis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
