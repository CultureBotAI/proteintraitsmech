identifier: ComplexPortal:CPX-8927
label: "CRL3 E3 ubiquitin ligase complex, KBTBD4 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate.CRL3-KBTBD4 target proteins include components of the LSD1/RCOR1 corepressor complex for proteasomal degradation, hence re-establishing the transcripition-activating dimethyl-lysine-4 histone and acetyl-lysine-27 histone H3 epigenetic marks. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
