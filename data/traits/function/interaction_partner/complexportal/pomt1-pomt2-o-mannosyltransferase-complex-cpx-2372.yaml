identifier: ComplexPortal:CPX-2372
label: "POMT1-POMT2 O-mannosyltransferase complex"
definition: >-
  Catalyzes the addition of an O-linked mannose to the hydroxyl group of serines or threonines of proteins such as the transmembrane protein dystroglycan (A0A0C4DHF6). Drosophila O-mannose exists on proteins as a monosaccharide. Activity is required during early development to establish proper muscle contractions and body posture. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
