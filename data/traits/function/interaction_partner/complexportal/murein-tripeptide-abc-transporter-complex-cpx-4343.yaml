identifier: ComplexPortal:CPX-4343
label: "Murein tripeptide ABC transporter complex"
definition: >-
  High affinity transporter of the cell wall component murein tripeptide (Mtp, l-Ala-gamma-D-Glu-meso-diaminopimelic acid, CHEBI:61564), which contains a D-amino acid and a gamma-peptide linkage. Diaminopimelic acid (DAP) is then used for peptidoglycan biosynthesis.Import allows recycling of DAP from either exogenous sources or DAP that is released by the N-acetylmuramoyl-l-alanine amidase AmiD (P75820) outer membrane amidase into the periplasm during cell growth. Member of the ATP-binding cassette (ABC) transporter family, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
