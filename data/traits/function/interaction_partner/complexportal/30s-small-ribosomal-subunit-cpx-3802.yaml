identifier: ComplexPortal:CPX-3802
label: "30S small ribosomal subunit"
definition: >-
  Component of the ribosome, the site of protein biosynthesis resulting from translation of messenger RNA (mRNA). A ribosome is made two subunits - a smaller 30S subunit which binds to a larger subunit and the mRNA pattern, and a larger 50S subunit (CPX-3807) which binds to the tRNA, the amino acids, and the smaller subunit. When a ribosome finishes reading an mRNA molecule, these two subunits split apart. The 50S subunit acts as the decoding centre of the ribosome which brings mRNA and aminoacylated transfer (t)RNAs together, with the 16S ribosomal (r)RNA being required for the selection of the cognate tRNA. Guides the initiating start codon AUG of mRNA into position by recognizing the Shine-Dalgarno sequence, a complementary binding site about 8 base pairs upstream from the start codon. In order to form the translation complex with the 50S subunit, the 30S subunit must bind the Translation Initiation factor complex (CPX-2244), mRNA, and f-met-tRNA. A curated stable macromolecular complex (Complex Portal) with 22 subunits.
