identifier: ComplexPortal:CPX-4141
label: "NLRP3 inflammasome"
definition: >-
  A pro-inflammatory thiol protease complex that is activated by Gram-positive bacteria such as Staphylococcus aureus and Group B Streptococcus, viruses such as influenza virus, pore-forming toxins such as hemolysin and pneumolysin, as well as by endogenous ligands and crystalline substances such as ATP, silica, and alum. Primarily acts in monocytes and macrophages. NLRP3 activation is triggered by two sequential signals. The basal level of NLRP3 in macrophages is quite low. Before activation, NLRP3 needs to be “primed” by Toll-like receptor (TLR) agonists such as lipopolysaccharide (LPS). Activation of TLR signaling not only transcriptionally up-regulates NLRP3 expression, but also post-transcriptionally activates NLRP3 by phosphorylation and deubiquitination. The second step, defined as “activation,” can be induced by several potent stimuli such as pore-forming toxins, leading to the oligomerization of NLRP3 and the subsequent assembly of inflammasome. Activating platform for Caspase-1 (CPX-952) through proximity-induced self-cleavage in an ATP-dependent reaction. Activated Caspase-1 cleaves interleukins 1beta (IL1B, P01584) and IL18 (Q14116) releasing the mature cytokines which are involved in a variety of inflammatory processes and is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves GSDMD (P57764). Activation of NLRP3 inflammasome is also required for HMGB1 (P09429) secretion which stimulate inflammatory responses. It belongs to the family of Inflammasomes that includes NLRP1 inflammasome (CPX-4082), NLRC4 inflammasome (CPX-4144), AIM2 inflammasome (CPX-4142) and Pyrin inflammasome (CPX-4143). The expression of NLRP3 and PYCARD is up-regulated in adipocytes from obese patients. Elevation of NLRP3 inflammasome activity has been observed in myeloid cells of patients affected by type 2 diabetes. Moreover, animal models support a role of this complex in multiple sclerosis, Alzheimer's disease, Parkinson's disease, gout, Cryopyrin-associated periodic syndromes and atherosclerosis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
