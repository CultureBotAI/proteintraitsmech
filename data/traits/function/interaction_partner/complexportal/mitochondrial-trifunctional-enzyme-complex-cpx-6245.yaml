identifier: ComplexPortal:CPX-6245
label: "Mitochondrial trifunctional enzyme complex"
definition: >-
  Catalyzes the last three of the four reactions in the fatty acid beta-oxidation process, adding water to the double bond of 2,3-enoyl-CoA, yielding 3-hydroxyacyl-CoA, dehydrogenating 3-hydroxyacyl-CoA to form 3-ketoacyl-CoA, and thiolyzing 3-ketoacyl-CoA between the alpha- and beta-carbons to remove a two-carbon unit which is released in the form of acetyl-CoA. These steps are repeated until all carbons in the fatty acyl-CoA are turned into acetyl-CoA, which enters the citric acid cycle. Exhibits specificity for long-chain fatty acids. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
