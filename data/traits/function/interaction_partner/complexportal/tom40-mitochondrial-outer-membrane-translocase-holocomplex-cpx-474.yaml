identifier: ComplexPortal:CPX-474
label: "TOM40 mitochondrial outer membrane translocase holocomplex"
definition: >-
  Translocase in the outer mitochondrial membrane that mediates the import of precursor protein and mediates inset of some resident outer membrane proteins. Most mitochondrial proteins are synthesized in the cytosol, imported into mitochondria, sorted to one of the four submitochondrial compartments, where they function, and attain their functional native conformation, which is often facilitated by assembly into the membrane or a multiprotein complex. The holo TOM complex contains two or three pores, each of which has a diameter of approximately 20A. When translocation by the TOM complex is coupled with that by the TIM23 or TIM22 complex, the TOM channel can operate as a passive pore to allow passage of the polypeptide segment, which is `pulled' by the TIM complex with the aid of differenial membrane potential and/or ATP. When translocation is uncoupled from the inner-membrane translocators, the TOM complex uses both the stop-transfer pathway, which consists of two steps, the first requiring a membrane potential and an ATP-dependent chaperone mHsp70, and a second mechanism involving the folding of an N-terminal domain that has already crossed the outer membrane and can function as a trap in the intermembrane space to drive translocation of the C-terminal part of the protein by a Brownian ratchet mechanism. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
