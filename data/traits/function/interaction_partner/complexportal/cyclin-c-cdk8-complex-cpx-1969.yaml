identifier: ComplexPortal:CPX-1969
label: "Cyclin C-CDK8 complex"
definition: >-
  Cyclin-dependent protein kinase complex. Forms part of the Mediator complex and also the CDK module sub-complex but also exists as a heterodimer which is involved in transcription and regulation of transcription initiation from RNA polymerase II promoter. Decreases Notch acetylation and transcriptional activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
