identifier: ComplexPortal:CPX-171
label: "Neuronal nicotinic acetylcholine receptor complex, 3xalpha4-2xbeta2"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous nicotinic agents. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron. Mediates fast, short-lived, mainly pre-synaptic transmission of neurotransmitters. Major receptor in Central Nervous System and predominantly found in cerebellum, cortex, forebrain, hippocampus, mesencephalon, striatum, superior colliculus and thalamus. Up-regulated by pro-inflammatory cytokines, for example TNF-alpha. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
