identifier: ComplexPortal:CPX-1251
label: "Embryonic stem cell-specific SWI/SNF ATP-dependent chromatin remodeling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. Also targeted to chromatin by phosphatidylinositol-4,5-bisphosphate which promotes the complex binding to actin filaments. The complex additionally interacts with a range of nuclear receptors and the vitamin D receptor (Vdr, P48281) via Smarcd subunits. The embryonic stem cell-specific SWI/SNF complex is critical for self-renewal, maintenance and pluripotency of embryonic stem cells. The lack of subunit Arid1b suggests it primarily acts as a transcriptional repressor but also has the ability to activate some genes. The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. The embryonic stem cell-specific (esc-)SWI/SNF complex specifically lacks subunits Actl6b (Q99MR0), ARID1B (E9Q6R4), SMARCA2 (Q6DIC0), SMARCC2 (Q6PDG5) and SMARCD3 (Q6P9Z1). SMARCD2 (Q99JR8) may be present in esc-SWI/SNF complexes in which case it probably forms a variant, replacing SMARCD1. BCL7A, BCL7B and BCL7C have been shown to be part of the esc-SWI/SNF complex but may be mutually exclusive and therefore probably forms further variants. Mutations in several subunits affect tissue and developmental processes such as nervous system and cardiac development and maintenance of pluripotency resulting in tumorigenesis or the development of intellectual disorders. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
