identifier: ComplexPortal:CPX-4887
label: "DNA-directed RNA polymerase holoenzyme complex, SigmaH variant"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3' end of an RNA transcript. Five subunits, rpoA/alpha, rpoB/beta, rpoC/beta' and rpoZ/omega form the catalytic core. To initiate promoter specific DNA transcription, the core enzyme has to bind a sigma factor, which helps to direct the polymerase to specific promoters. rpoH acts in response to higher temperature, markedly and transiently inducing a set of heat-shock proteins which control the folding, assembly, transport, repair and degradation of various proteins. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
