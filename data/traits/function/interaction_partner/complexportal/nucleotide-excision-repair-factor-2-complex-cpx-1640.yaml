identifier: ComplexPortal:CPX-1640
label: "Nucleotide excision repair factor 2 complex"
definition: >-
  Nucleotide excision repair damage-recognition heterodimer. Binds damaged DNA and recruits the NEF1 and NEF3 complexes. Rad4 inserts a beta-hairpin through the DNA duplex, causing the two damaged base pairs to flip out of the double helix. Lesion recognition does not appear to be based in structural discrimination between normal and damaged DNA by Rad4/XPC, but may be due to a ‘kinetic gating’ mechanism, whereby the DNA lesion selectivity arises mainly from the kinetic competition between Rad4-induced DNA opening and the residence time of Rad4 at a given site. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
