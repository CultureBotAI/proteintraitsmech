identifier: ComplexPortal:CPX-1260
label: "SDS22-GLC7-YPI1 phosphatase complex"
definition: >-
  Protein phosphatase complex implicated in acting in opposition to the Chromosomal Passenger complex (CPX-1900) at the kinetochore. GLC7 dephosphorylation of kinetochore proteins promotes mitotic spindle attachment. The opposing Chromosomal Passenger complex and GLC7 activities ensure that chromosomes achieve a bipolar attachment to the spindle. SDS22 appears to both act as a targeting subunit for the enzyme and also to regulate phosphatase activity. YPI1 may target the complex to the nucleus and also act to maintain the complex in a largely inactive state, preventing inactivation of the spindle checkpoint. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
