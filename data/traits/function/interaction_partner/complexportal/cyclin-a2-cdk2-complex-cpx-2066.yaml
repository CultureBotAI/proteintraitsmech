identifier: ComplexPortal:CPX-2066
label: "Cyclin A2-CDK2 complex"
definition: >-
  Required in G1 phase of cell cycle. Complex formation enables substrate binding to the kinase, leads to a rearrangement of the catalytic site and exposes Thr-160 of CDK2 for phosphorylation and subsequent activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
