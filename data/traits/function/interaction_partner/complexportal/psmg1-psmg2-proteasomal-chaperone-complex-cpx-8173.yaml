identifier: ComplexPortal:CPX-8173
label: "PSMG1-PSMG2 proteasomal chaperone complex"
definition: >-
  Chaperone complex with a role in the early stage assembly of the 26S proteasome (CPX-2262). Binds to the alpha-subunits before alpha-rings are complete, functioning as a scaffold for alpha-ring assembly and preventing unregulated aggregation of alpha-ring intermediates. The complex binds to the top-side of the alpha-ring, the opposite surface to which the PSMG3-PSMG4 (CPX-8174) complex binds. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
