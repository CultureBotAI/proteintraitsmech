identifier: ComplexPortal:CPX-26390
label: "Dynactin complex"
definition: >-
  Recruited to autoinhibited dynein, a retrograde microtubule motor complex, by a coiled-coil-containing adaptor (Bicaudal-D or Hook family) protein to form the tripartite dynein-dynactin-adaptor assembly which activates the processive, unidirectional movement of dynein. Dynactin and dynein contribute to a number of motility associated events including endomembrane movement, nuclear envelope breakdown, and mitotic spindle assembly. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
