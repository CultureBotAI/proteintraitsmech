identifier: ComplexPortal:CPX-182
label: "Neuronal nicotinic acetylcholine receptor complex, alpha2-beta4"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous nicotinic agents. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron. Mediates fast, short-lived synaptic transmission of neurotransmitters. Upregulated by pro-inflammatory cytokines, like TNF-alpha. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
