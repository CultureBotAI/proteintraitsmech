identifier: ComplexPortal:CPX-26580
label: "Bub1-Bub3 complex"
definition: >-
  Promotes spindle assembly checkpoint signalling. The spindle checkpoint ensures accurate chromosome segregation by sending a signal from an unattached kinetochore to inhibit anaphase onset. Binds to kinetochores during prometaphase and metaphase. Recruitment of bub1 and bub3 to spc7 (O59757) when phosphorylated on MELT motifs by mph1 kinase (O94235) maintains the spindle checkpoint. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
