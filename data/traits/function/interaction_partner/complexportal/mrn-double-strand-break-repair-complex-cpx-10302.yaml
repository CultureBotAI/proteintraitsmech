identifier: ComplexPortal:CPX-10302
label: "MRN double-strand break repair complex"
definition: >-
  Endo- and exonuclease complex that plays a central role in double-strand break (DSB) repair, DNA recombination, maintenance of telomere integrity and meiosis via non-homologous end joining and homologous recombination.. The complex possesses both single-strand endonuclease activity and double-strand-specific 3'-5' exonuclease activity, which are provided by MRE11. Mre11 and Rad50 form an ATP-regulated nuclease that senses DSBs and tethers DNA ends in close proximity via long Rad50 coiled-coil domains. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
