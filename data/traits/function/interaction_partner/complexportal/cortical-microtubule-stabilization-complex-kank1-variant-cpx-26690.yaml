identifier: ComplexPortal:CPX-26690
label: "Cortical microtubule stabilization complex, KANK1 variant"
definition: >-
  Tethers microtubule plus ends to the cell cortex, linking microtubule dynamics with cell adhesion and polarity. By anchoring microtubules at sites of exocytosis, cell migration, and neuronal morphogenesis, the complex ensures proper cytoskeletal organization and spatial coordination of cellular processes. Complex also clusters strongly around focal adhesions at the leading cell edge and promote their disassembly. Disruption of complex components KANK1, PPFIBP1, or KIF21A leads to defects in microtubule organization, focal adhesion turnover, and cell motility. Moreover, pathogenic mutations, such as those in KIF21A associated with congenital fibrosis of the extraocular muscles (CFEOM), disturb this regulatory interface, underscoring the complex’s essential role in coordinating cytoskeletal dynamics with cellular function. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
