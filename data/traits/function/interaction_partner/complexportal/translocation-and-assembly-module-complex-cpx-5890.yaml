identifier: ComplexPortal:CPX-5890
label: "Translocation and assembly module complex"
definition: >-
  A two-membrane spanning complex required for the proper assembly of a subset of autotransporters, outer membrane proteins which either expose on the cell surface or release into the extracellular space an effector passenger domain which is responsible for an associated virulence function. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
