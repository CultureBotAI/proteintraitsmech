identifier: ComplexPortal:CPX-6156
label: "Classical and lectin pathway C3 convertase complex C4b2a-B"
definition: >-
  A serine-type endopeptidase complex of the classical and lectin pathway of complement activation of the innate immune system. Cleaves Complement C3 precurser (P01024) into anaphylatoxin C3A (P01024-PRO_0000005910) and nascent convertase core-component C3b (CPX-973). Components are cleaved by the C1s component of Complement C1 complex (CPX-1920) of the classical pathway or lectins of the lectin pathway. Occurs in the fluid-phase and binds to pathogen cells via its reactive thioester moiety. If bound to another C4b molecule it can also act as C5 convertase by cleaving Complement C5 precurser (P01031) into anaphylatoxin C5A (P01031-PRO_0000005988) and C5b (P01031-PRO_0000005985, P01031-PRO_0000005989) but with low efficiency. Acts as an opsonin and interacts with glycoproteins and carbohydrates on pathogenic or apoptotic target cell surfaces through its reactive thioester moiety. Opsonization of target cells leads to enhanced phagocytosis, lysis of target cells via membrane attack complex assembly, clearance of antibody-antigen complexes and up-regulation of the adaptive response. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
