label: "STAT1/STAT3 complex"
definition: >-
  Signal transducer and transcription activator that mediates cellular responses to interleukins and other growth factors. It mediates the response to IL6 (P05231) and IL27 (Q8NEV9, Q14213). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
