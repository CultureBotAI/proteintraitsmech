identifier: ComplexPortal:CPX-26721
label: "G3BP1-USP10, deubiquitinase complex"
definition: >-
  Deubiquitinase complex with a key role in the ribosome-associated quality control (RQC) pathway. USP10 plays a key role in regulating the ubiquitylation of the ribosomal proteins RPS2 (P15880) and RPS3 (P23396), with prolonged ubiquitylation of RPS2/RPS3 driving the selective degradation of 40S ribosomal proteins through a pathway that is independent of canonical autophagy. The complex also plays a role in stress granule (SG) regulation. The complex suppresses SG formation, and can impair stress recovery, increasing apoptosis and exacerbating disease. USP10 acts as a negative regulator of stress-granule assembly by lowering G3BP1 valence, thereby preventing G3BP1 from undergoing liquid-liquid phase separation (LLPS) and forming stress granules. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
