identifier: ComplexPortal:CPX-4766
label: "TRAPP III complex"
definition: >-
  Multimeric vesicle tethering complex involved in vesicle transport between endoplasmic reticulum and Golgi compartments and in the regulation of COPII vesicle coating. Acts as guanine exchange factors towards RAB1 (P62821) and RabE/Rab11 (P62492). A curated stable macromolecular complex (Complex Portal) with 10 subunits.
