identifier: ComplexPortal:CPX-25744
label: "Interleukin-35 complex"
definition: >-
  Inhibitory cytokine complex that plays a key role in immune regulation by promoting the expansion of regulatory T cells (Tregs) and Bregs, while simultaneously suppressing effector T cells, Th1 cells, Th17 cells and macrophages. IL35 signals through four receptors: IL12RB2 (Q99665) homodimers, IL6ST (P40189) homodimers, IL12RB2/IL6ST heterodimers and IL12RB2/IL27RA (Q6UWB1). The complex is constitutively secreted by Tregs but not T effector cells and suppresses autoimmune diseases by converting resting B- and T-cells into IL10 (P22301) and IL35-producing Breg and Treg cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
