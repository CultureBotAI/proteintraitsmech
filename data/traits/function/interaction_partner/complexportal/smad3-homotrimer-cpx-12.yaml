label: "SMAD3 homotrimer"
definition: >-
  In the absence of Smad4, R-Smad phosphorylation results in homotrimerization, however, this complex does not appear to import into the nucleus and is assumed to be transcriptionally inactive. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
