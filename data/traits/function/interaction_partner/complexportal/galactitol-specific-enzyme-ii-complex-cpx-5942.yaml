identifier: ComplexPortal:CPX-5942
label: "Galactitol-specific enzyme II complex"
definition: >-
  Involved in the transport of galactitol and D-glucitol across the cell membrane as part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS). A phosphoryl group is transferred from hpr (P0AA04) to gatA (IIA), from gatA to chbgatB (IIB) and finally from gatB onto the incoming sugar bound to membrane-embedded gatC (IIC). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
