identifier: ComplexPortal:CPX-387
label: "Interleukin-12 complex"
definition: >-
  Cytokine complex that activates and stimulates proliferation of a wide range of lymphocytes, in particular natural killer cells and T helper 1 (Th1) cells, upon binding to its receptor subunits Il12rb1 (Q60837) and Il12rb2 (P97378). Formation of the ligand-receptor complex (CPX-388) initiates the JAK-STAT signaling pathway which ultimately activates transcription of interferon (IFN)-gamma which, in turn, stimulates production of IL12 leading to a positive regulation loop. Produced by antigen-presenting cells in response to Interleukin-18 and/or the related Interleukin-23 (CPX-3293). Anti-inflammatory agent that counteracts Interleukin-23 and inhibits Interleukin-17 secretion by activated T cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
