identifier: ComplexPortal:CPX-363
label: "Heparanase complex"
definition: >-
  An endo-beta-D-glucuronidase of the glycoside hydrolase 79 (GH79) family complex that cleaves the extracellular matrix heparan sulfate proteoglycans (HSPGs) into HS side chains and core proteoglycans. Selectively cleaves the linkage between a glucuronic acid unit and an N-sulfo glucosamine unit of HSPGs carrying either a 3-O-sulfo, a 6-O-sulfo or a 2-O-sulfo group, but not linkages between a glucuronic acid unit and a 2-O-sulfated iduronic acid moiety. HS sulfation serves as a molecular signal that directs heparanase to cleave only certain glycan sites and acts as mechanistic handles by which the enzyme can prize open the substrate HS helix and more effectively access the trisaccharide cleavage site via heparanase-binding induced distortion of the substrate helix. Present in a variety of cellular locations where it performs an essential housekeeping role in catabolic processing of internalized HSPGs and at the cell surface or released into the ECM where it participates in ECM degradation and remodeling. HSPGs ensure that bioactive molecules such as growth factors, chemokines, lipoproteins, and enzymes are localized to the cell surface and ECM and function in the control of normal and pathological processes. These include morphogenesis, osteogenesis, hair follicle inner root sheath differentiation and hair homeostasis, wound healing, shedding of syndecans, inflammation, pre-eclampsia, autoimmunity, cell proliferation and migration associated with metastasis, endothelial invasion and angiogenesis. Cleavage of HSPGs is likely to release these regulators that can alter the functional state of tissues and provide a mechanism by which cells can respond rapidly to changes in the extracellular environment. The proliferative advantages conferred by heparanase lead to its up-regulation in tumors in a variety of tissues, and its over-expression correlates strongly with metastasis and worsened clinical prognoses. Also acts as pro-coagulant by increasing the generation of activation factor X in the presence of tissue factor and activation factor VII. Increases cell adhesion to the extracellular matrix (ECM) independent of its enzymatic activity. HPSE is the only mammalian gene so far identified to have heparanase activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
