identifier: ComplexPortal:CPX-4462
label: "Prolow-density lipoprotein receptor-related protein 1 complex"
definition: >-
  Endocytic, low-densitiy lipoprotein receptor involved in two major processes, as scavenger receptor in the internalisation of extracellular molecules and their clearance via the endosome and as transducer of multiple intracellular signal pathways. Often acts in corporation with other cell-surface receptors. Lrp-1 is recycled to the plasma membrane. Involved in cholesterol import and clearance of a range of toxins. Ligands range from matrix metalloproteinases (MMP) and urokinase-type plasminogen activator (uPA-uPAR, P29598 and P49616) or tissue-type plasminogen activator (Plat/tPA, P19637), bound directly to Lrp-1 or in complex with their target inhibitor, e.g. plasminogen activator inhibitor type 1 (Serpine1/PAI-1, P20961), to amyloid-beta peptides. Instead of being internalised, Lrp-1 ligands may also shed the extracellular domains of the alpha and beta chains resulting in an extracellular, soluble LRP-1 (sLRP-1) decoy receptor. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
