identifier: ComplexPortal:CPX-1285
label: "Laminin221-nidogen complex"
definition: >-
  An extracellular matrix complex responsible for basement membrane stabilization and cell-matrix adhesion. Crosslinking of the nidogen subunit from one complex to a laminin arm of a second by tissue transglutaminases forms large assemblies. Facilitates cell adhesion by binding collagens (e.g. collagen type I, CPX-1650 or collagen type IV, CPX-1723) and integrins (e.g. alpha3beta1, CPX-1797 or alphavbeta3, CPX-1795). May modify type I collagen scaffolds and thereby enhance myotube formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
