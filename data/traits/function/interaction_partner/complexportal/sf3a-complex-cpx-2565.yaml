identifier: ComplexPortal:CPX-2565
label: "SF3A complex"
definition: >-
  Role in in pre-mRNA splicing. The SF3A complex (CPX-2565) is incorporated into the 15S U2 small nuclear ribonucleoprotein (snRNP) consisting of the SF3B complex (CPX-2227) and 12S U2snRNP, to form the functional 17S U2 snRNP. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
