identifier: ComplexPortal:CPX-500
label: "Interleukin-5 complex"
definition: >-
  Powerful pro-inflammatory cytokine produced by T-helper type 2 (Th2) cells, Mast cells, Eosinophils and Natural killer (NK, NKT) cells. Essential for the maturation of eosinophils in the bone marrow and their release into the blood. Also acts on activated and resting B-cells to induce immunoglobulin production, growth, and differentiation. Exerts a pathogenic role in the differentiation, recruitment, survival, and degranulation of eosinophils. Overactive IL-5 is implicated in the pathogenesis of allergic inflammatory diseases, such as asthma, and various hypereosinophilic diseases. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
