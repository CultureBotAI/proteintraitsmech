identifier: ComplexPortal:CPX-8162
label: "Radial spoke complex, flagellar variant"
definition: >-
  Mechanochemical signal transducer acting between the central pair of microtubules and dyneins in motile cilia and flagella to modulates the beat frequency, amplitude, and waveform of their movement. The majority of motile cilia and flagella are composed of an array of microtubules, typically arranged in in nine doublet pairs around the central pair (the 9+2 axoneme). Each 96-nm-long axonemal unit contains three radical spokes, RS1, RS2, and RS3 which each maintain a T-shaped morphology. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
