identifier: ComplexPortal:CPX-5158
label: "Imidazole glycerol phosphate synthase complex"
definition: >-
  Essential enzyme on the pathway synthesizing L-histidine from 5-phospho-alpha-D-ribose 1-diphosphate, catalyzing the closure of the imidazole ring thus also providing the substrate for de novo purine biosynthesis. Converts the biosynthetic intermediate 5-[(5-phospho-1-deoxy-D-ribulos-1-ylimino)methylamino]-1-(5-phospho-β-D-ribosyl)imidazole-4-carboxamide (PRFAR, CHEBI:27735) to D-erythro-1-(imidazol-4-yl)glycerol 3-phosphate(2-) (IGP, CHEBI:58278) and 5-amino-1-(5-phospho-D-ribosyl)imidazole-4-carboxamide(2-) (AICAR, CHEBI:58475). The hisH glutaminase hydrolysis of glutamine yields ammonia which acts as a nitrogen source for the synthesis of histidine and purines. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
