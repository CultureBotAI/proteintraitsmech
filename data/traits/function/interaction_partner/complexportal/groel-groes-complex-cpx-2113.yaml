identifier: ComplexPortal:CPX-2113
label: "GroEL-GroES complex"
definition: >-
  Member of the chaperonin class of molecular chaperones required for the ATP-driven assisted folding of many proteins. Direct contact between substrate proteins and the C-terminal tails of the GroEL subunits helps prevent premature substrate protein escape during encapsulation. Encapsulation seals the GroEL cavity and results in the release of the substrate protein into an enlarged GroEL-GroES chamber. Protein folding is initiated by a conformational shift within the GroEL-GroES complex. Hydrolysis of ATP and binding of a new substrate protein to the opposite cavity sends an allosteric signal causing GroES and the encapsulated protein to be released into the cytosol. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
