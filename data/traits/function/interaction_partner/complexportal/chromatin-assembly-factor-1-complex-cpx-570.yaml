identifier: ComplexPortal:CPX-570
label: "Chromatin assembly factor 1 complex"
definition: >-
  Catalyzes de novo assembly of nucleosomes onto newly synthesized DNA, involved in chromatin assembly following both DNA replication and some forms of DNA repair. Binds modified histones H3 and H4 and deposits them as a tetramer, preferentially onto replicating DNA, in a step coupled to the replication process. This is followed by deposition of a pair of dimers of histones H2A and H2B mediated by other factor(s) in a process not necessarily coupled to DNA replication. The histone core of nucleosomes consists of two copies of each of histones H2A, H2B, H3 and H4. CAF-1 nucleosome deposition is thought to be involved in heterochromatic silencing. CAF-1 is essential for S-phase progression in mammalian cells. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
