identifier: ComplexPortal:CPX-2488
label: "TREX transcription-export complex, DX39B variant"
definition: >-
  Selectively binds maturing mRNA at the messenger ribonucleoprotein complex 5'-end, splice junctions, and 3'-end and licenses mRNA for nuclear export by loading the global mRNA-export factor NXF1-NXT (CPX-725/CPX-2435) . Also acts to chaperone the nascent mRNA by inhibiting the formation of harmful DNA-RNA hybrids, (R-loops), thus protecting genome integrity. The THO subcomplex is recruited to the mRNP and delivers DDX39B, which clamps the mRNA. THO-DDX39B binds export adapters such as ALYREF and together they promote loading of NXF1-NXT onto mRNA.. It is predicted that the multiple variants of this complex may exist with different compositional rearrangements of its adapter subunits. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
