identifier: ComplexPortal:CPX-6096
label: "Thyroid-stimulating hormone complex"
definition: >-
  Glycoprotein hormone synthesized and secreted by thyrotrope cells in the anterior pituitary gland, which regulates the endocrine function of the thyroid. TSH stimulates the thyroid gland to produce thyroxine (T4, CHEBI:18332), which is subsequently converted to triiodothyronine (T3, CHEBI:18258) the active hormone that stimulates metabolism throughout the body. A member of the family of pituitary glycoprotein hormones that play key roles in human fertility. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
