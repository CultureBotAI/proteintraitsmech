identifier: ComplexPortal:CPX-1778
label: "Laminin-421 complex"
definition: >-
  Major component of basement membranes which binds to cells via a high affinity, cell-surface receptor. Role in the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. Appears to mediate IGFBP-5-induced migration. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
