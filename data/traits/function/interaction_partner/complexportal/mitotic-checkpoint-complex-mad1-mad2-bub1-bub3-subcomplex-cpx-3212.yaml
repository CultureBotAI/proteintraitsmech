identifier: ComplexPortal:CPX-3212
label: "Mitotic checkpoint complex, MAD1-MAD2-BUB1-BUB3 subcomplex"
definition: >-
  This complex forms during mitosis, as a result of the activation of the spindle checkpoint. BUB3 and BUB1 are associated through the cell cycle, however, the addition of MAD1 is cell cycle dependent. The formation of a stable complex requires the functions of MAD2, BUB3, and MPS1. In addition, a highly conserved Arg-Leu-Lys motif at 653-655 of MAD1 is required for the formation of a complete complex. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
