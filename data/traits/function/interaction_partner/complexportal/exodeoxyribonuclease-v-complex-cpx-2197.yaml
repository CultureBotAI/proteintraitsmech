identifier: ComplexPortal:CPX-2197
label: "Exodeoxyribonuclease V complex"
definition: >-
  An exonuclease complex essential in DNA double-strand break repair by homologous recombination. It catalyzes the unwinding of double-stranded DNA at DNA damage sites and cleaves the resulting single-stranded DNA (through recB activity). This process is ATP-hydrolysis-dependent which is provided by the ATPase activity of recD. The two helicases act with opposite polarity: recB is an SF1A enzyme with a 3'-5' polarity and recD an SF1B enzyme with a 5'-3' polarity. They cooperate to unwind DNA in a highly processive manner where the DNA gets unwound in the recB-recC interface with the 5' single-stranded (ss)DNA single-strand fed into the recD subunit and the 3'ssDNA remaining in the recB-recC dimer. The nuclease activity of the recB subunit might be regulated by the recD protein. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
