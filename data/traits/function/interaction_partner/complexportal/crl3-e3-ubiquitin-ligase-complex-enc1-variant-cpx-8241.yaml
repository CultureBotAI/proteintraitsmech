identifier: ComplexPortal:CPX-8241
label: "CRL3 E3 ubiquitin ligase complex, ENC1 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-ENC1 target proteins include the serine/threonine-protein kinases LATS1 (O95835) and LATS2 (Q9NRM7) which control the Hippo signaling pathway and thus cell proliferation and apoptosis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
