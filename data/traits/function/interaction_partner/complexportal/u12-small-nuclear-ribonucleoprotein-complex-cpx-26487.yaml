identifier: ComplexPortal:CPX-26487
label: "U12 small nuclear ribonucleoprotein complex"
definition: >-
  Minor spliceosome building block. The minor spliceosome catalyses the removal of an atypical (U12) class of eukaryotic precursor-mRNA (pre-mRNA) introns and is thought to excise approximately 1 in 300 introns in human pre-mRNA. U12 introns constitute roughly 0.5% of all introns, and are recognizable by their non-consensus AT-AC termini as well as a high degree of conservation at the 5' splice site. The minor spliceosome contains several specific low-abundance snRNPs, including U11, U12 (this complex), U4atac, U6atac and the common U5 snRNP also present in the major spliceosome. U12-type intron containing genes are mainly related to information processing functions, including DNA replication and repair, transcription, RNA processing, and translation, but can also be found in genes related to cytoskeletal organization, vesicular transport, and voltage-gated ion channel activity. U12-dependent introns are thought to be evolutionarily ancient but absent in many species including model organisms such as Caenorhabditis elegans and Saccharomyces cerevisiae. Mutations in SF3B4 is associated with recessive skeletal dysplasia and eye disorders. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
