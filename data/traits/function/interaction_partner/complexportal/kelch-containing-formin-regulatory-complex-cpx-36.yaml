identifier: ComplexPortal:CPX-36
label: "Kelch-containing Formin Regulatory Complex"
definition: >-
  Regulates BNR1 (P40450)-mediated actin cable formation, polarized cell growth, and cytokinesis. Localizes to the bud neck and cortex and binds to the FH2 domain of the formin, displacing BNR1 from the growing ends of actin filaments to control actin cable architecture. Actin cables serve as linear tracks for myosin V-based transport of secretory vesicles, organelles, and daughter-specific transcripts to the bud, as well as guiding astral microtubule plus ends to the cell cortex to position and orient the mitotic spindle. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
