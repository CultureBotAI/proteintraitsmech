identifier: ComplexPortal:CPX-2253
label: "General transcription factor TFIIE complex"
definition: >-
  General transcription factor complex which recruits TFIIH to complete the assembly of the preinitiation complex which forms on gene promoters during a transcription cycle and consists of Pol II (CPX-2625), general transcription factors (TFIID, TFIIA, TFIIB, TFIIF, TFIIE, and TFIIH) and the mediator complex (CPX-2308). Both subunits of the complex act to anchor the TFIIH kinase module (CAK) within the preinitiation complex. The TFIIE complex appears to directly influence the transition from initiation to elongation during transcription. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
