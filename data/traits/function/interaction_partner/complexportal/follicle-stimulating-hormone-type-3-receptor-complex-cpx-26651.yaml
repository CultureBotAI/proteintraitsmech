identifier: ComplexPortal:CPX-26651
label: "Follicle Stimulating Hormone, type 3 receptor complex"
definition: >-
  Gonadotropin-receptor complex. Follicle stimulating hormone (FSH) mediates a diverse range of functions by binding to one of four FSH receptor (FSHR) isoforms. Follicle stimulating receptor isoform 3 (FSHR-3) binds FSH promoting mitotic activity and cell growth by activating the MAPK-ERK pathway in granulosa cells in a cyclic adenosine monophosphate (cAMP)-independent manner. MAPK-ERK activation regulates cell proliferation (including ovarian stem cells) through the modulation of calcium-dependent channels. FSHR-3 is thought to be the dominant form in developing follicles and ovarian stem cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
