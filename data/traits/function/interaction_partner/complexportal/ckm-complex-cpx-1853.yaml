identifier: ComplexPortal:CPX-1853
label: "CKM complex"
definition: >-
  Cyclin-dependent kinase complex which reversibly associates with the Mediator complex (CPX-3226). The mediator complex lacking the CKM complex has a stimulatory effect on basal transcription. In contrast, the mediator complex containing the sub-complex represses basal transcription. This effect is independent of kinase activity but binding of the complex to the Mediator may interfere with RNAPII recruitment and repress transcription re-initiation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
