identifier: ComplexPortal:CPX-2573
label: "Separin-securin complex"
definition: >-
  Regulates the metaphase-to-anaphase transition during cell cycle progression, playing a role in control of the metaphase-anaphase transition and anaphase onset. Required for sister chromatid separation and also spindle elongation. At the onset of anaphase, the anaphase-promoting complex–dependent degradation of securin/cut2 allows the release of the separase/cut1 protease, which cleaves rad21 (P30776) of the nuclear mitotic cohesin complex (CPX-26544) and releases sister chromatid cohesion, leading to the separation of sister chromatids. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
