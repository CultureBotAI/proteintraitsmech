identifier: ComplexPortal:CPX-4406
label: "L-cystine ABC transporter complex"
definition: >-
  High affinity L-cystine and L-cysteine transporter, will also import DL-2,6-diaminopimelic acid and L-cystathionine. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
