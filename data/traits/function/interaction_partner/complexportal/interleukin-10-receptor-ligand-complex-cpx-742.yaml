identifier: ComplexPortal:CPX-742
label: "Interleukin-10 receptor-ligand complex"
definition: >-
  Interleukin-10, a pleiotropic cytokine with a role in promoting both anti-inflammatory and pro-inflammatory responses, exerts its function upon binding to its receptor complex, IL10R. Secreted as a homodimer, IL10 activates signaling in receiver cells by engaging two copies of a heterodimeric receptor complex consisting of a high-affinity, IL10 specific receptor subunit, IL10RA, and a low-affinity, shared receptor subunit, IL10RB. IL10RB is essential for signal transduction and is a common receptor for IFNG (P01579) and other IL10 family members including IL22, IL26, IFNL1, IFNL2 and IFNL3. IL10 drives the dimerization of IL10RA and IL10RB, resulting in the transphosphorylation of members of the JAK family of tyrosine-protein kinases as well as phosphorylation of the cytoplasmic tails of the receptors and activation of the transcription factor signal transducer and activator of transcription STAT3 and to a slightly lesser extent STAT1, which mediate the diverse functional effects of IL10. The limiting factor for IL10 signaling is the formation of the ternary IL10-IL10RA-IL10RB complex, thought to be influenced both by the affinity of the IL10-IL10RB interaction, as well as the quantity of IL10RB on the cell surface. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
