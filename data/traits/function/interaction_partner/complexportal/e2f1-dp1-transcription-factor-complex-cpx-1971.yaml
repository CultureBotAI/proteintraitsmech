identifier: ComplexPortal:CPX-1971
label: "E2F1-DP1 transcription factor complex"
definition: >-
  Transcription factor complex which binds DNA through the E2 recognition site, 5'-TTTC[CG]CGC-3', typically associated with the promoters of genes active in S phase. Activates genes that stimulate DNA synthesis and cell cycle advancement. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
