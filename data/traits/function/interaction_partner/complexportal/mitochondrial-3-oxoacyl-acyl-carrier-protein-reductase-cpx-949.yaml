identifier: ComplexPortal:CPX-949
label: "Mitochondrial 3-oxoacyl-[acyl-carrier-protein] reductase"
definition: >-
  Catalyses the second step of the mitochondrial fatty acid synthesis (mtFAS) pathway, reducing 3-oxoacyl-[ACP] to (3R)-hydroxyacyl-[ACP] in a NADPH-dependent manner with no chain length preference, thereby participating in mitochondrial fatty acid biosynthesis. The.mtFAS pathway is essential for mammalian embryonic survival and provides the precursor of mitochondrially synthesized aloha-lipoic acid, a key cofactor for oxidative decarboxylation of alpha-keto acids and glycine within eukaryotic cells. Deficiency of mtFAS leads to respiratory chain defects and mitochondrial dysfunction. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
