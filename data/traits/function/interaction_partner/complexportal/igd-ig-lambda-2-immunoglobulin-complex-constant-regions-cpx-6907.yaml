identifier: ComplexPortal:CPX-6907
label: "IgD - Ig lambda 2 immunoglobulin complex, constant regions"
definition: >-
  Membrane-bound or secreted glycoprotein produced by B lymphocytes. In the recognition phase of humoral immunity, the membrane-bound immunoglobulins serve as receptors which, upon binding of a specific antigen, trigger the clonal expansion and differentiation of B lymphocytes into immunoglobulin-secreting plasma cells. Secreted immunoglobulins (also known as antibodies) mediate the effector phase of humoral immunity, which results in the elimination of bound antigens. IgD is the major antigen receptor isotype on the surface of most peripheral B-cells, where it is coexpressed with IgM. IgM and IgD molecules present on B cells have identical V regions and antigen-binding sites. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
