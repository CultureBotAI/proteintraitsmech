identifier: ComplexPortal:CPX-7404
label: "Tenascin-C complex"
definition: >-
  A matricellular glycoprotein complex of the extracellular matrix found in the basement membrane of many cell types. Its expression is highly specific and restricted in space and time: it is expressed transiently in many developing organs and persists in the adult mainly in a few structures bearing high tensile stress, such as tendons, ligaments, and the smooth muscle walls of arteries. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
