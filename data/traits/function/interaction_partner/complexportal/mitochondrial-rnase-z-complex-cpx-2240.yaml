identifier: ComplexPortal:CPX-2240
label: "Mitochondrial RNase Z complex"
definition: >-
  Responsible for the 3' endonucleolytic cleavage of precursor tRNAs (pre-tRNAs), catalyzing phosphodiester bond hydrolysis to remove approximately 12 leader nucleotides to yield mature tRNAs. This immediately follows tRNA 5′-processing by the RNase P complex (CPX-6155). Also important for nuclear RNA processing of tRNAs and other non-coding RNAs such as sno-RNAs. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
