identifier: ComplexPortal:CPX-2795
label: "CRL4-CDT2 E3 ubiquitin ligase complex, CUL4A variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DTL/CDT2. The complex is active in regulating cell cycle control, DNA damage response and translesion DNA synthesis. Responsible for the S phase-dependent proteolysis of CDT1 (Q9H211), an essential replication protein for licensing DNA replication origins. The binding of CDT1 and DTL/CDT2 to the same trimeric PCNA clamp (CPX-538) during DNA synthesis promotes the ubiquitination of CDT1, resulting in its ubiquitin-dependent proteolysis and prevents DNA re-replication and genome instability. Also responsible for the degradation of CDKN1A/p21Cip1 (P38936) both during S-phase and following UV damage thus inhibiting p53-dependent G1 arrest that occurs following DNA damage. This again is mediated by PCNA binding. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
