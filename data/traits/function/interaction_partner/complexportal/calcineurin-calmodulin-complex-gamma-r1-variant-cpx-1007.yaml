identifier: ComplexPortal:CPX-1007
label: "Calcineurin-Calmodulin complex, gamma-R1 variant"
definition: >-
  A calcium-dependent, calmodulin-stimulated protein phosphatase complex that is activated by elevated cytoplasmic calcium ion concentrations. Important for many cellular activities such as homeostasis, angiogenesis, myogenesis, adipogenesis, osteogenesis, chondrocyte differentiation, cardiovascular system development, pancreatic beta-cell proliferation, hair follicle cell differentiation and remodeling, and activities of cells of the immune. Plays a pivotal role during nervous system development and in various functions of mature central and peripheral nervous system. Regulates the NFAT signaling cascade by binding to and dephosphorylating NFAT leading to nuclear translocation of this larger complex and increasing the DNA-binding affinity of the NFAT family of transcription factors. Calcineurin also promotes nuclear retention of NFAT by masking nuclear export signals (NES) and preventing NES-dependent nuclear export. Altered calcineurin-NFAT activation can mediate both neuroprotective and neurodegenerative signals. Modulates Ca2+-dependent inactivation (CDI) of voltage-gated L-type Ca2+ channels. CDI is initiated by Ca2+ binding to channel-associated calmodulin and subsequent activation of calcineurin, which is targeted to L channels by the A-kinase-anchoring protein AKAP5. Channel activity is activated by phosphorylation of AKAP5-bound Protein Kinase A. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
