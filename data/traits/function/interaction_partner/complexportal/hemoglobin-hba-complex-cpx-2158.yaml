identifier: ComplexPortal:CPX-2158
label: "Hemoglobin HbA complex"
definition: >-
  Adult hemoglobin A (HbA) is expressed in erythrocytes in the bone marrow. Binds oxygen in the lungs and transports it to the various peripheral tissues. Transports CO2 from cells back to the lungs. It appears in late pregnancy and becomes the dominant hemoglobin type in adults, replacing fetal hemoglobin (CPX-2932 & CPX-2933). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
