identifier: ComplexPortal:CPX-7482
label: "DNA-directed RNA polymerase III complex, POLR3GL variant"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3' end of an RNA transcript. Responsible for the transcription of genes encoding short non-coding RNAs, such as tRNA, 5S rRNA and U6 snRNA transcripts. Pol III machinery recognizes conserved promoter elements located within the transcribed region, generally the box A and box B sequences, which contribute to the D- and T-loops in the tRNA structure. POLR3F, POLR3GL and POLR3C play a role in transcription initiation whereas the POLR3D-POLR3E heterodimer is crucial for the correct recognition of the termination signals of class III genes. POLR3K is required for RNA cleavage. Pol III initiation does not require ATP hydrolysis to open a transcription bubble to isolate and secure the template strand in the catalytic site and Pol III is capable of reinitiating transcription more rapidly on the same gene after the first transcription cycle without being released (facilitated reinitiation), resulting in a higher initiation efficiency; this appears to require an POLR3K-dependent conformational change of Pol III. A curated stable macromolecular complex (Complex Portal) with 17 subunits.
