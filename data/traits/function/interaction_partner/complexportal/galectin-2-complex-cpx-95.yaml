identifier: ComplexPortal:CPX-95
label: "Galectin-2 complex"
definition: >-
  Sugar-binding protein complex specific for lactose and lactose related saccharides. Plays role in cell-cell and cell-matrix interactions based on sugar recognition. Induces apoptosis of mucosal T cells thus ameliorating intestinal inflammation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
