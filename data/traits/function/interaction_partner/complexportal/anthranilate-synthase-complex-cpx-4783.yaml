identifier: ComplexPortal:CPX-4783
label: "Anthranilate synthase complex"
definition: >-
  Catalyzes the two-step formation of anthranilate, an intermediate in the biosynthesis of L-tryptophan, from chorismate and glutamine. The glutamine-binding beta subunit (trpGD) provides the glutamine amidotransferase activity which generates ammonia as a substrate and then delivers this to the active site of the large alpha subunit (trpE) to produce anthranilate from ammonia and chorismate. Cooperatively binds and is inhibited by tryptophan, binding is competitive with chorismate binding but not at the same site. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
