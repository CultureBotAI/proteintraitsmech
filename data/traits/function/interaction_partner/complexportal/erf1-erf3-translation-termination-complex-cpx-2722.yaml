identifier: ComplexPortal:CPX-2722
label: "ERF1-ERF3 translation termination complex"
definition: >-
  Required for the termination of protein synthesis which occurs when one of three stop codons (UAA, UAG or UGA) enters the ribosomal A site. sup45 stimulates GTP binding to sup35, inducing the GTPase activity of sup35 that couples codon recognition and peptidyl-tRNA hydrolysis mediated by sup45 to ensure rapid and efficient peptide release on the ribosome. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
