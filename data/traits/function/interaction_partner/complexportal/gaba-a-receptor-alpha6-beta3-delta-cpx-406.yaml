identifier: ComplexPortal:CPX-406
label: "GABA-A receptor, alpha6-beta3-delta"
definition: >-
  Ligand-gated chloride channel which acts as the main driver of fast inhibitory neurotransmission in the nervous system. GABA (CHEBI:16865), the major inhibitory neurotransmitter in the vertebrate brain, mediates neuronal inhibition by binding to the GABA/benzodiazepine receptor and opening a chloride ion-selective pore. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
