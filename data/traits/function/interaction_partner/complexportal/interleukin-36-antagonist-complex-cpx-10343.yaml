identifier: ComplexPortal:CPX-10343
label: "Interleukin-36 antagonist complex"
definition: >-
  Buffering complex which negatively regulates the IL36 signalling pathway by blocking IL1RL1-IL1RAP mediated activation of NFKB and MAP kinase pathways. IL36RN performs an antagonistic role by competitively binding to IL1RL1, suppressing IL36 agonist recognition and IL1RAP recruitment. In addition to its inhibitory role, IL36RN can proactively induce upregulation of IL4 (P05112) expression in glial cells. Loss-of-function mutations in IL36RN are implicated in DITRA, a recessive autoinflammatory disease characterised by pustular psoriasis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
