identifier: ComplexPortal:CPX-6158
label: "Classical and lectin pathway C5 convertase complex C4b2a3b-B"
definition: >-
  A serine-type endopeptidase complex of the classical and lectin pathway of complement activation of the innate immune system. Cleaves Complement C5 precurser (P01031) into anaphylatoxin C5a (P01031-PRO_0000005988) and Complement C5b (P01031-PRO_0000005985, P01031-PRO_0000005989). Binds to pathogen cells via its reactive thioester moiety. Acts as an opsonin and interacts with glycoproteins and carbohydrates on pathogenic or apoptotic target cell surfaces through its reactive thioester moiety. Opsonization of target cells leads to enhanced phagocytosis, lysis of target cells via membrane attack complex assembly, clearance of antibody-antigen complexes and up-regulation of the adaptive response. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
