identifier: ComplexPortal:CPX-26533
label: "FACT complex"
definition: >-
  A heterodimeric H2A-H2B histone chaperone, that helps reorganize nucleosomes in an ATP independent fashion. It promotes histone removal, deposition and replacement on chromatin. Due to its role in chromatin dynamics, it has a role in many cellular processes related to chromatin: DNA replication, DNA damage and repair, transcription initiation and elongation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
