identifier: ComplexPortal:CPX-1028
label: "NEO1-DOP1-MON2 golgi transporter complex"
definition: >-
  Functions in vesicle trafficking within the Golgi/endosomal system to regulate retrograde recycling of cargoes from endosomes back to and within the Golgi. In contrast to the DOP1-MON2 interaction in humans, DOP1 weakly interacts with MON2 in yeast, and therefore the complex's role in membrane remodelling at the tubular endosomal network and the trans-Golgi network interface is unclear. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
