identifier: ComplexPortal:CPX-490
label: "bZIP transcription factor complex, JUN-JUN"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The JUN dimer acts as co-activator for a range of transcription factors, e.g. PU.1 (P17947), CEBPB (P17676) and bZIP domain-containing proteins (e.g. complex CPX-486), but is probably not functional on its own. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
