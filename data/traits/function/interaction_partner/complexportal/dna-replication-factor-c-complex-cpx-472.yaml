identifier: ComplexPortal:CPX-472
label: "DNA replication factor C complex"
definition: >-
  DNA-dependent ATPase that functions with PCNA (CPX-541) to confer processivity on DNA polymerase delta. RFC uses the energy of ATP binding and hydrolysis to recruit PCNA to DNA, break one clamp interface, and topologically link the clamp to primed template DNA during the duplication of chromosomal DNA prior to cell division. After loading PCNA, RFC then dissociates, allowing PCNA to function with Pol-delta RFC consists of five subunits in a spiral arrangement, each subunit being AAA+ family proteins, and the complex contains four ATP sites located at subunit interfaces. A cavity exists in the center of this protein spiral that accommodates double-stranded DNA. Conserved polar and positively charged residues line the cavity and interact with DNA. There is a gap between two subunits, RFC1 and RFC5, which may provide an exit path for single-stranded DNA from the central cavity. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
