label: "FEB1B-Elongin C-Elongin B E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which targets degradation signals (degrons) within the C-termini of substrate proteins in a pathway termed destruction via C-end degrons (DesCEND). The C-degron is generally a motif of fewer than ten residues C-degrons ending with -G-L-D-R and can be present in full-length proteins, truncated proteins or proteolytically cleaved forms.Targets include the C-degron of CDK5R1 (Q15078). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
