identifier: ComplexPortal:CPX-1365
label: "Vesicular SNARE complex SSO1-SEC9-SNC1"
definition: >-
  An exocytic SNARE complex required for the fusion of post-Golgi secretory vesicles with the plasma membrane and is active primarily in vegetative cells. Mediates membrane fusion through the spontaneous assembly of four complementary SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptors) motifs. SNAREs bind to each other in-trans, that is, with SNAREs anchored in each apposed tethered membrane. The assembly process leads to a tight connection between the linked membranes and initiates membrane fusion. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
