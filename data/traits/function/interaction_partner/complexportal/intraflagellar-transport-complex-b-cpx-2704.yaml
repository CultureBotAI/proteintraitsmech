identifier: ComplexPortal:CPX-2704
label: "Intraflagellar transport complex B"
definition: >-
  IFT particles, composed of the IFT-A (CPX-2702) and IFT-B complexes, enable bidirectional motility along axoneme microtubules essential for the formation (ciliogenesis) and maintenance of cilia that assemble within a membrane projection from the cell surface. Outward or anterograde movement from the cell body to the ciliary tip is powered by kinesin-2 while the inward or retrograde movement back to the cell body is powered by cytoplasmic Dynein-2 motor. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
