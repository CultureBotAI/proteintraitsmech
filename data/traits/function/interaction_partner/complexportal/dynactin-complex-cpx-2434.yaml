identifier: ComplexPortal:CPX-2434
label: "Dynactin complex"
definition: >-
  Enhances the processivity of cytoplasmic dynein, the major minus end-directed microtubule motor, and acts as an adapter between dynein and the cargo by increasing dynein processivity. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
