identifier: ComplexPortal:CPX-1403
label: "LSM1-7-PAT1 complex, variant LSM1B-LSM3A-LSM6A-PAT1H2"
definition: >-
  A cytoplasmic complex essential for P-body formation and deadenylation-dependent decapping of mRNA thereby regulating mRNA decay and subsequent degradation by the 5-to-3-prime pathway. Loss of LMS1 subunits leads to a range of severe developmental abnormalities. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
