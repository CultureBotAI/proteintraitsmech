identifier: ComplexPortal:CPX-380
label: "ULK1-ATG13-RB1CC1-ATG101 autophagy initiation complex"
definition: >-
  Serine/threonine-protein kinase complex required for pre-autophagosomal structure assembly in response to starvation. Ultimately facilitates sequestration of cytoplasmic proteins and organelles for bulk degradation via autophagy and mitophagy, respectively. Under glucose starvation conditions activated through phosphorylation of Ulk1 on Ser-317 and Ser-777 by AMPK complex. Under amino acid starvation conditions ULK1 and ATG13 are phosphorylated by mTorc1. Activated Ulk1 represses mTorc1 kinase activity via phosphorylation of Rptor(Q8K4Q0, subunit of mTORC1 complex) and phosphorylates ATG13, Rb1cc1 and itself. Under nutrient-rich conditions inhibited through phosphorylation of Atg13 and Ulk1 on Ser-757 by Rptor (subunit of mTORC1 complex), leading to cell proliferation and cell mass increase. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
