identifier: ComplexPortal:CPX-4328
label: "Histidine ABC transporter complex"
definition: >-
  High-affinity polar amino acid transporter, in particular linked to the import of histidine but also binds arginine, ornithine and lysine.. Member of the ATP-binding cassette (ABC) transporter family, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
