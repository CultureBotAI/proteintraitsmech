identifier: ComplexPortal:CPX-2155
label: "TRCF-UvrA complex"
definition: >-
  An SF2 ATPase that orchestrates a preferential pathway for nucleotide excision repair (NER) called transcription-coupled repair (TCR) by specific recognition of the transcription and NER assemblies. mfd recruits the UvrABC repair system (CPX-2151, CPX-2152, CPX-2153) to the unmasked lesion by binding to uvrA, a subunit of the UvrAB complex (CPX-2151). uvrA binding to mdf and uvrB are probably mutually exclusive owing to the conserved interface on uvrA. Formation of the TRCF-UvrA complex initiates a cascade of events resulting in lesion excision and gap filling. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
