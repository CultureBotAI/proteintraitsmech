identifier: ComplexPortal:CPX-6211
label: "Coagulation factor VIIa complex"
definition: >-
  Part of the extrinsic blood coagulation pathway (tissue factor pathway) whose formation in the plasma membrane initiates the blood coagulation process by initiating the cell-surface assembly and propagation of the coagulation protease cascade. Forms factor VIIa-TF complex (CPX-2808) that activates coagulation factors IX (P00740) and X (P00742) by limited proteolysis to form active factors IXa (CPX-4945) and Xa (CPX-6215). The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form is activated by selective cleavage of Arg-|-Ile bonds to form active factor VIIa. Activation is triggered by trauma and minor proteolysis by thrombin (CPX-6222), factor Xa (CPX-6215), factor XIa (CPX-6205) and factor XIIa (CPX-6209). Also constitutively activated at very low levels. Inhibited by complex formation with TFPI (P10646/P48307) and factor Xa. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
