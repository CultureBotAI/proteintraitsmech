identifier: ComplexPortal:CPX-873
label: "Nuclear pore complex"
definition: >-
  The nuclear pore complex (NPC) is a large assembly embedded in the nuclear envelope of eukaryotic cells. The NPC exclusively mediates all transport between cytoplasm and nucleus. A single NPC in a human cell can transport up to 80 MDa of material within 1 second. The nuclear basket subunits play an active role in transcription, transcriptional memory and chromatin organization by recruiting members of the transcription machinery to the nuclear side of the complex. A curated stable macromolecular complex (Complex Portal) with 32 subunits.
