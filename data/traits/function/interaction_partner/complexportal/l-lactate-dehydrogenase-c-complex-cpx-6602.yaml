label: "L-lactate dehydrogenase C complex"
definition: >-
  Catalyzes the NAD(H)-dependent interconversion of lactate and pyruvate. Mainly expressed in testes where it is possibly involved in sperm mobility and preferentially converts pyruvate to lactate. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
