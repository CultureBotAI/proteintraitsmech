identifier: ComplexPortal:CPX-26489
label: "U11/U12 di-small nuclear ribonucleoprotein complex"
definition: >-
  U11/U12 di-snRNP minor spliceosome intron recognition complex. The minor spliceosome catalyses the removal of an atypical (U12) class of eukaryotic precursor-mRNA introns. U12 introns constitute roughly 0.5% of all introns, and are recognizable by their non-consensus AT-AC termini as well as a high degree of conservation at the 5' splice site. U12-dependent introns are thought to be evolutionarily ancient but absent in many species including model organisms such as Caenorhabditis elegans and Saccharomyces cerevisiae. The minor spliceosome contains several specific low-abundance snRNPs, including U11 (CPX-26485), U12 (CPX-26487), U4atac, U6atac and the common U5 snRNP also present in the major spliceosome. U12-type intron containing genes are mainly related to information processing functions, including DNA replication and repair, transcription, RNA processing, and translation, but can also be found in genes related to cytoskeletal organization, vesicular transport, and voltage-gated ion channel activity. Several disease-related mutations in RNPC3 implicated in pituitary growth hormone deficiency is suspected to compromise U11/U12 snRNA bridging and/or recruitment of ZMAT5. A curated stable macromolecular complex (Complex Portal) with 23 subunits.
