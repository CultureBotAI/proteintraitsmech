identifier: ComplexPortal:CPX-743
label: "Transcription factor complex TFIIA"
definition: >-
  Transcription factor complex that regulates transcription initiation from RNA polymerase II promoters. Binding to the transcription factor complex TFIID-TBP enhances assembly of the transcriptional preinitiation complex PIC and its binding to the DNA at the TATA-box by displacing transcription inhibitors, such as Drap1 (Q9D6N5) or Dr1 (Q91WV0), from TBP (P29037). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
