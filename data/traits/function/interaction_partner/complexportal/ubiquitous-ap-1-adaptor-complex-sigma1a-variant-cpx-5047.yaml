identifier: ComplexPortal:CPX-5047
label: "Ubiquitous AP-1 Adaptor complex, sigma1a variant"
definition: >-
  Adaptor complex that orchestrates the formation of membrane coats that mediate cargo selection and vesicle budding, for example by linking clathrin to the membrane surface of trans-Golgi network vesicles. Also recruits proteins involved in downstream vesicle functions such as motility, vesicle tethering and fusion with the target organelle. Required for the biogenesis of specialised organelles of the endosomal-lysosomal system, such as melanosomes and platelet dense granules. Once RAB32 (Q13637) and RAB38 (P57729) are activated by BLOC-3 (CPX-5043), they interact with AP-3 (CPX-5051 and CPX-5052), AP-1 and BLOC-2 (CPX-5044) complexes which function as adaptor complexes on early/recycling endosome tubules, where cargoes are loaded into vesicles or transport intermediates and transported to nascent melanosomes and platelet dense granules. Mutations in AP1S1 are related to the MEDNIK syndrome. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
