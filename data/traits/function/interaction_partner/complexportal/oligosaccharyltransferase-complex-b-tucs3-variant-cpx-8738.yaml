identifier: ComplexPortal:CPX-8738
label: "Oligosaccharyltransferase complex B, TUCS3 variant"
definition: >-
  Oligosaccharyl transferase (OST) complex that catalyzes the initial transfer of a defined glycan (Glc3Man9GlcNAc2 in eukaryotes) from the lipid carrier dolichol-pyrophosphate to an asparagine residue within an Asn-X-Ser/Thr consensus motif in nascent polypeptide chains, the first step in protein N-glycosylation. N-glycosylation occurs post-translocationally. The OST-B complex binds MLEC (Q14165) which associates with misfolded glycoproteins and guides these to the proteasome for degradation suggesting that the complex may encounter a relatively high number of unfolded glycoproteins. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
