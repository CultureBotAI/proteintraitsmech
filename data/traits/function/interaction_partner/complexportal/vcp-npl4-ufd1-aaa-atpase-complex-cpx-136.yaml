identifier: ComplexPortal:CPX-136
label: "Vcp-Npl4-Ufd1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of retrotranslocation of misfolded proteins from the endoplasmic reticulum (ER) into the cytosol where they are polyubiquitinated and degraded by the proteasome as part of the ER-associated protein degradation (ERAD) pathway. The AAA+ ATPase VCP is essential to a wide range of cellular functions which are regulated by ubiquitination, extracting its substrate proteins from cellular structures or multiprotein complexes in an ATP hydrolysis-dependent process. Substrate-recruiting components determine the specificity of each complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
