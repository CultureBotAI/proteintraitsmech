identifier: ComplexPortal:CPX-8721
label: "GABA-A receptor, alpha3-beta1-gamma2 complex"
definition: >-
  Ligand-gated chloride channel which acts as the main driver of fast inhibitory neurotransmission in the nervous system. GABA (CHEBI:16865), the major inhibitory neurotransmitter in the vertebrate brain, mediates neuronal inhibition by binding to the GABA/benzodiazepine receptor and opening a chloride ion-selective pore. GABA-A receptors assemble in specific combinations of receptor subunits from a pool of nineteen in a cell-type specific manner, giving rise to receptors with distinct distributions and functions in both physiological and disease states. GABA-A alpha-3 receptor subtypes undergo pre-mRNA editing by adenosine desaminase (ADAR) resulting in reduced cell surface expression and the total number of alpha-3 subunits, suggesting that editing plays a role in receptor trafficking. Their many allosteric sites, which bind compounds with anticonvulsant, anti-anxiety, analgesic, sedative and anaesthetic properties make GABA-A receptors attractive drug targets. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
