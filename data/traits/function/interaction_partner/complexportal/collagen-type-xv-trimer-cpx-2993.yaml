identifier: ComplexPortal:CPX-2993
label: "Collagen type XV trimer"
definition: >-
  Fibril-associated collagen with interrupted triple helices (FACIT) that stabilizes microvessels and muscle cells, both in heart and in skeletal muscle. Its strongest expression is localized to basement membrane zones so it may function to adhere basement membranes to underlying connective tissue stroma. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
