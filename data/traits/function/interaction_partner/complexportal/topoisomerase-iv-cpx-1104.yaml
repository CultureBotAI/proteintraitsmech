identifier: ComplexPortal:CPX-1104
label: "Topoisomerase IV"
definition: >-
  Type II DNA topoisomerase responsible for relaxing supercoiled DNA by introducing a double-stranded break in DNA and passing a second duplex segment of DNA through the break before resealing it. Acts on topologically different substrates including (+) and negative (−) supercoiled DNA and knotted and catenated DNA. Decatenates newly replicated DNA, removing the majority of links behind the replication forks. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
