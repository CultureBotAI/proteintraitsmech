identifier: ComplexPortal:CPX-1387
label: "Synaptonemal complex"
definition: >-
  Liquid crystalline structure that forms a large scaffold connecting homologous chromosomes from end to end during meiotic prophase I. . Required for stabilising chromosome pairing and alignment, and for crossover events and chiasmata formation between homologous chromosome pairs. Mediates the lengthwise alignment of homologous chromsomes within 100 nm of each other with thread-like axial or lateral elements are paired together by transverse filaments formed by oligomerized ZIP1 proteins. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
