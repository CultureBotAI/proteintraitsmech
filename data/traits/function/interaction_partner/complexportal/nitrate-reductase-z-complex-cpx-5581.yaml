identifier: ComplexPortal:CPX-5581
label: "Nitrate reductase Z complex"
definition: >-
  Constitutively expressed nitrate reductase complex, which constitutes only 2% of total nitrate reductase activity when Nitrate reductase A (CPX-1974) is fully induced. Involved in electron transport during anaerobic respiration: electrons are passed from the formate dehydrogenase-N (Fdh-N) complex (CPX-1975) to the nitrate reductase complex via a quinone-quinol redox reaction. Within Nitrate reductase Z, the distal heme molecule of NarV receives electrons from quinol (hydroquinone), passes them on to the proximal heme which passes it down a Fe-S cluster chain to the molybdopterin cofactor Mo-bisMGD where nitrate is reduced to nitrite. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
