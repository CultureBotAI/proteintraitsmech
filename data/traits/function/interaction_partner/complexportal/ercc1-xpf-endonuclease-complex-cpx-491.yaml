identifier: ComplexPortal:CPX-491
label: "Ercc1-Xpf endonuclease complex"
definition: >-
  Structure-specific DNA endonuclease with a role in multiple DNA repair pathways. Participates in nucleotide excision repair mechanism by incising a DNA strand on the 5-prime side of the lesion. The complex is also involved in homologous recombination that assists in removing interstrand cross-links. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
