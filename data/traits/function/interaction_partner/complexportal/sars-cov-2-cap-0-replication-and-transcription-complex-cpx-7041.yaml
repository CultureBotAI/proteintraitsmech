identifier: ComplexPortal:CPX-7041
label: "SARS-CoV-2 Cap(0)-replication and transcription complex"
definition: >-
  Cap(0)-Replication and transcription complex (RTC) of the SARS-CoV-2 coronavirus. The nsp12 nucleotidyltransferase (NiRAN) domain of the RTC (CPX-6442) possesses guanylyltransferase activity which catalyzes the formation of the cap core structure (GpppA) on the nascent mRNA. nsp9 and nsp12 NiRAN domain recruit the nsp14 ExoN domain of the exoribonuclease proof-reading complex, nsp14-nsp10 (CPX-5692), into the Cap(0)-RTC, forming the N7-CCC (co-transcriptional capping complex) to yield cap(0) (7MeGpppA) at the 5' end of pre-mRNA. RNA polymerase has been known to possess a “backtrack” feature, in which the productive elongation and translocation complexes are in the same conformation to facilitate reversible backward motion during RNA synthesis. The SARS-CoV-2 Cap(0)-RTC structure suggests it has the same function here. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
