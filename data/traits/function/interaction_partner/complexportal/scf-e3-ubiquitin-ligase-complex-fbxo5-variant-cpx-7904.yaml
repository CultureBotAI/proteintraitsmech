identifier: ComplexPortal:CPX-7904
label: "SCF E3 ubiquitin ligase complex, FBXO5 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. FBXO5 interacts with the anaphase-promoting complex, FRZ1 variant (CPX-6088), which acts as a substrate of this E3 ligase during G1 phase and as an inhibitor of the complex during S and G2 phase, regulating cell-cycle commitment. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
