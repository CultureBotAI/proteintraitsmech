identifier: ComplexPortal:CPX-1878
label: "Replication protein A complex, RPA2 variant"
definition: >-
  Single-stranded DNA binding protein complex involved in all processes that involve single-stranded DNA (ssDNA) by binding to and protecting exposed ssDNA from nucleases and preventing formation of secondary structures. Forms a physical platform to recruit other factors to the DNA including those involved in DNA damage signaling, DNA repair, and DNA replication. RPA protects against inappropriate telomere recombination, and upon telomere uncapping, prevents cell proliferation by a checkpoint-independent pathway. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
