identifier: ComplexPortal:CPX-328
label: "Atg12-Atg5-Atg16l1 complex"
definition: >-
  Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. Required for the elongation of isolation membranes (phagophores). Acts as an E3-like enzyme to recruit the E2-like protein Atg3, conjugated to LC3-I, to the endoplasmic reticulum-derived omegasome. Atg3 binds to and is activated by Atg12, facilitating conjugation of the LC3 to phosphatidylethanolamine, thus converting LC3-I to LC3-II. Therefore, the site of Atg12-Atg5-Atg16l1 complex recruitment determines the site of LC3-II formation. The LC3 family is required for phagophore expansion, closure, and cargo recruitment. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
