identifier: ComplexPortal:CPX-3210
label: "Cry2-Per2 complex"
definition: >-
  Gradually accumulates in the nucleus to negatively regulate CLOCK-BMAL (CPX-3225, CPX-3228) -dependent transactivation of genes in a delayed negative feedback mechanism which generates circadian rhythms. Phosphorylation of PER2 by CSNK1D/CSNK1E (Q9DC28/Q9JMK2) effects stability and nuclear localisation of the complex. Phosphorylation of CRY2 Ser-71 stimulates the direct binding of FBXL3 (Q8C4V4), targeting it for ubiquitin-mediated degradation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
