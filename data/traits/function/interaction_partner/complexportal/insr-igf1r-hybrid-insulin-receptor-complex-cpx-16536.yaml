identifier: ComplexPortal:CPX-16536
label: "INSR-IGF1R, hybrid insulin receptor complex"
definition: >-
  Complex regulates glucose homeostasis and normal human growth. Hybrid receptors are formed when one half (alpha-beta) of INSR pairs with one half (alpha-beta) of the IGF1R. The specific INSR isoform involved, either the long form (P06213-1, INSR-B which includes exon 11) or the short form (P06213-2, INSR-A which excludes exon 11) can influence the ligand-binding and activation properties of the resulting hybrid complex. Hybrids containing INSR-B are reported to be strongly activated by IGF1 (P05019), exhibit low affinity for IGF2 (P01344), and show minimal responsiveness to INS (P01308). In contrast, hybrids involving the INSR-A have been reported in some studies to respond to IGF1, IGF2, and, to a limited extent, INS. However, INS activation of hybrid receptors remains significantly weaker than that of homodimeric INSR, regardless of isoform. The extent to which isoform identity determines hybrid receptor function remains unclear, and INS binding may vary depending on cell type, receptor abundance, and experimental context. Dysregulation of insulin receptor (INSR) signalling is a well-established contributor to the pathogenesis of diabetes mellitus. In parallel, aberrant activation of the hybrid INS-IGF1R receptors has been implicated in tumourigenesis and cancer progression, as well as in the molecular mechanisms underlying neurodegenerative diseases such as Alzheimer’s disease. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
