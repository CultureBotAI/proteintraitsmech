identifier: ComplexPortal:CPX-1150
label: "SWI/SNF chromatin remodelling complex"
definition: >-
  An ATP-dependent chromatin remodelling complex which disrupts the nucleosome structure, increases the binding of transcription factors to nucleosomes, mobilizes histone octamers along DNA in cis, transfers histone octamers to different DNA fragments, displaces histone H2A/H2B dimers and generates superhelical torsion in DNA. Binds preferentially to four-way DNA and promotes resection initiation at a DNA double-strand break. Binds to DNA and nucleosomes without any DNA sequence specificity. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
