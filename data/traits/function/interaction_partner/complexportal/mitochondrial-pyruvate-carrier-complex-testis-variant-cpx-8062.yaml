label: "Mitochondrial pyruvate carrier complex, testis variant"
definition: >-
  Regulates the uptake of pyruvate from the mitochondrial intermembrane space into the mitochondrial matrix. This variant forms in the testis, specifically in post meiotic germ cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
