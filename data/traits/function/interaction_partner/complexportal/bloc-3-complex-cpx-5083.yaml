identifier: ComplexPortal:CPX-5083
label: "BLOC-3 complex"
definition: >-
  A guanine exchange factor (GEF) complex required for the biogenesis of specialized organelles of the endosomal-lysosomal system, such as melanosomes and platelet dense granules. Acts as GEF for Rab32 (Q9CZE3) and Rab38 (Q8QZZ8), promoting the exchange of GDP to GTP, converting them into an active GTP-bound form and inducing their recruitment to membrane. Once active, both interact with the AP-1, the AP-3 and the BLOC-2 (CPX-5084) adaptor complexes, to regulate cargo delivery to nascent melanosomes and platelet dense granules. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
