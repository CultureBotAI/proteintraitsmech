identifier: ComplexPortal:CPX-2358
label: "CCDC36-MEI4-REC114 meiotic recombination initiation complex"
definition: >-
  Plays a role in homologous chromosome pairing and recombination during meiosis, potentially by activating double-strand break formation in unsynapsed regions, an essential step to ensure completion of synapsis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
