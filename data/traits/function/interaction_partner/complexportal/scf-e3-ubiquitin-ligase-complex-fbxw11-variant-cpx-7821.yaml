identifier: ComplexPortal:CPX-7821
label: "SCF E3 ubiquitin ligase complex, FBXW11 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXW11 target proteins include phosphorylated CTNNB1 (P35222) thus participating in the regulation of Wnt signaling, and phosphorylated NFKBIA (P25963), degradation of which frees the associated NFKB1 (P19838) to translocate into the nucleus and to activate transcription. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
