identifier: ComplexPortal:CPX-5154
label: "AP-4 Adaptor complex"
definition: >-
  Adaptor complex that forms a non clathrin-associated coat on vesicles departing the trans-Golgi network (TGN) and may be involved in the targeting of proteins from the trans-Golgi network to the endosomal-lysosomal system. AP-4 is involved in the recognition and binding of tyrosine-based sorting signals found in the cytoplasmic part of cargos, but may also recognize other types of sorting signal. AP-4 is expressed at lower levels compared to AP-1, -2 and -3 complexes, however its expression is acutely sensitive to disturbances in clathrin-mediated trafficking, and seems to be upregulated as a compensatory mechanism. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
