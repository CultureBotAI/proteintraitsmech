identifier: ComplexPortal:CPX-1418
label: "Spliceosomal commitment complex"
definition: >-
  Formation of this complex is the first defined step in the yeast splicing pathway and is responsible for intron recognition, which targets pre-mRNA to the splicing pathway. Binding of the 5-prime end of U1 snRNP (CPX-23) to the 5-prime splice site through base-pairing forms first a basal complex only dependent on a 5-prime splice site (CC1) and then a more stable second complex dependent on a branchpoint as well as a 5-prime splice site region (CC2). Interactions between the BBP-MUD2 branchpoint-binding complex (CPX-1417) and the U1 snRNP protein PRP40 (P33203) defines a bridge between the two ends of the intron. PRP5 may interact with U1 snRNP and other proteins to bridge the 5' splice site and the UACUAACA box of the pre-mRNA's branchpoint region. It may also recruit U2 snRNP (CPX-26) which binds to the intron branch site of the commitment complex to form the pre-spliceosome in an ATP dependent step. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
