identifier: ComplexPortal:CPX-72
label: "NKX2-5 homodimer complex"
definition: >-
  Nkx-2.5 is an evolutionary conserved transcription factor important for the specification and differentiation of cardiomyocytes during heart development and also required for spleen development. It binds DNA either as a monomer, homodimer, or heterodimer complex to activate or inhibit expression of genes. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
