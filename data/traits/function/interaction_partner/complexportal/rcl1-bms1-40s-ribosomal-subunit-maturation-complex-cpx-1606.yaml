identifier: ComplexPortal:CPX-1606
label: "RCL1-BMS1 40S ribosomal subunit maturation complex"
definition: >-
  Required for 40S ribosomal subunit maturation. Formation of the complex is required for the import of RCL1 into the nucleus. In the absence of GTP, BMS1 acts as a chaperone and masks the RCL1 active site. GTP binding to BMS1 and/or GTP hydrolysis unveils the RNA binding surface of RCL1 and promotes 20S pre-rRNA cleavage to form the mature 18S RNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
