identifier: ComplexPortal:CPX-2391
label: "U4/U6.U5 small nuclear ribonucleoprotein complex"
definition: >-
  Major pre-formed spliceosome building block. The spliceosome executes pre-mRNA splicing through a highly dynamic series of compositional and conformational transitions encompassing assembly, activation, catalysis and disassembly of a highly dynamic structure, involving the binding and release of the small nuclear RNAs (snRNA) and protein factors which remove intronic sequence from pre-mRNA. Spliceosome stages are characterized as E, A, B and remodelling of the pre-catalytic spliceosome (B complex) into the activated spliceosome (Bact complex) and subsequently, the catalytically activated spliceosome (B* complex) to carry out two RNA-catalysed transesterification reactions that lead to intron removal and splicing together of the flanking exon sequences. Association of the U4/U6.U5 tri-snRNP with the pre-spliceosomes E and A (i.e CPX-2392, CPX-2539 snRNPs bound to the 5' splice site and the branch site of the pre-mRNA intron respectively) leads to the formation of the mature spliceosomes, B and C. The DEAD-box helicase DDX23 releases the 5' splice site from U1 snRNP and transfers it to the ACAGAGA box within U6 snRNA. The RNA helicase SNRNP200 then separates U4 snRNA from U6 snRNA and allows the U6 snRNA sequence adjacent to the 5' splice site-bound ACAGAGA box to fold and associate with part of U2 snRNA to yield the active site harboring two catalytic metal ions. When the branch site adenosine is docked into the active site, the branching reaction produces the cleaved 5' exon and the lariat-intron intermediate. The 5' exon remains in the active site, but the branch site adenosine must leave the active site for the incoming 3′ splice site site for the exon–ligation reaction. Finally, the 5' and 3' exons are ligated, and the resulting mRNA is released from the active site. A curated stable macromolecular complex (Complex Portal) with 32 subunits.
