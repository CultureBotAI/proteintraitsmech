identifier: ComplexPortal:CPX-6123
label: "Mitochondrial respiratory chain complex IV"
definition: >-
  Terminal oxidase of the electron transport chain in mitochondria. It accepts electrons from cytochrome c to reduce the oxygen to water and pumps two protons from the matrix side to the intermembrane space. Electrons originating from reduced cytochrome c in the intermembrane space are transferred via the dinuclear copper center of mt:CoII and heme A of mt:CoI to the active site in mt:CoI, a binuclear center formed by heme A3 and a second copper atom.. The binuclear center reduces molecular oxygen to 2 water molecules using 4 electrons from cytochrome c in the intermembrane space and 4 protons from the mitochondrial matrix. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
