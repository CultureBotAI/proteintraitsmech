identifier: ComplexPortal:CPX-6241
label: "CHEVI tethering complex"
definition: >-
  Multisubunit tethering complex that plays an essential role in in delivery of cargoes in several cell types. it is also implicated in phagosome-lysosome and in endosome-lysosome fusion. Genetic defects in its subunits lead to the arthrogryposis, renal dysfunction and cholestasis syndrome (ARC). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
