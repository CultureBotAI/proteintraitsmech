identifier: ComplexPortal:CPX-2116
label: "MsbA transporter complex"
definition: >-
  Member of the ATP-binding cassette (ABC) transporter proteins that facilitates the export of lipid A and lipopolysaccheride (LPS) across the plasma membrane, flipping LPS synthesized in the cytoplasmic leaflet of the inner membrane to the periplasmic leaflet Couples substrate transport to a transmembrane electrochemical proton gradient in addition to hydrolysis of ATP at the nicleotide-binding domains. The MabA dimer is also capable of transporting a wide spectrum of drugs through the plasma membrane. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
