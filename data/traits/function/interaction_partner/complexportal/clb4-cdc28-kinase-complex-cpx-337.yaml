label: "CLB4-CDC28 kinase complex"
definition: >-
  Cyclin-dependent protein kinase complex required for the control of the cell cycle at the G2/M (mitosis) transition. Mitotic cyclin-CDKs (M-CDKs) regulate accurate chromosome segregation through mitosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
