label: "integrin alpha6-beta4 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for laminin. It plays a critical structural role in the hemidesmosome of epithelial cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
