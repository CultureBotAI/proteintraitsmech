identifier: ComplexPortal:CPX-9221
label: "Lymphotoxin-alpha-TNFRSF1B receptor complex"
definition: >-
  Receptor complex whose primary role is in lymphoid organ development, organization and the maintenance of lymphoid microenvironments to promote host defense, and inflammation. LTA mediates its effects through one of three receptors: TNFRSF1A (CPX-8945), TNFRSF1B (this complex) or TNFRSF14 (CPX-9222). TNFRSF1B lacks the death domain and is a prototypical TNFRSF receptor with a TRAF2 (Q12933) binding site at its C-terminal. Signalling can lead to apoptosis but preferentially results in cell proliferation and survival via NF-KB-NIK activation. LTA is produced by activated innate and adaptive immune cells and its effects are mediated through TNFRSF1B which is expressed on almost most cells, including tumour cell types. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
