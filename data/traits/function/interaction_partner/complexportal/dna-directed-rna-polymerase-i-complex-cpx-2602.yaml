identifier: ComplexPortal:CPX-2602
label: "DNA-directed RNA polymerase I complex"
definition: >-
  Catalyzes the transcription of ribosomal RNA from a DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3' end of an RNA transcript synthesizing precursors of rRNAs. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
