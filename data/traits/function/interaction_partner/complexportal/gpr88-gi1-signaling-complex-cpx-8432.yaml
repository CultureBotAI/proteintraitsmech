identifier: ComplexPortal:CPX-8432
label: "GPR88-Gi1 signaling complex"
definition: >-
  A transmembrane signaling complex which couples an orphan receptor, GPR88, to guanine nucleotide-binding proteins. Ligand binding induces a conformation change that facilitates the exchange of GDP for GTP on GNAI2. This exchange leads to the dissociation of the complex and both GTP-bound GNAI2 and the GNB1-GNG1 stimulate a number of downstream effectors, modulating GABAergic and glutamatergic signaling. May also affect the activity of several other G-protein-coupled receptors such as dopamine receptors and opioid receptors. May play a role in regulating brain and behavioral functions. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
