identifier: ComplexPortal:CPX-2368
label: "DREAM transcriptional repressor complex, RBL1 variant"
definition: >-
  Mediates gene repression during the G0 phase and coordinates periodic gene expression with peaks during the G1/S and G2/M phases. In early G1, the complex binds to E2F, CHR, CDE (cell cycle-dependent element), and CLE (CHR-like element) promoter sites and represses more than 800 cell cycle-dependent genes in quiescent cells, mediating TP53 activity. In the late stage of G1, DREAM-specific protein separates from the MuvB core (LIN9, LIN37, LIN52, LIN53, and LIN54) and then binds to MYBB (P10244) in the S phase to form the MMB complex (CPX-2366) which transactivates cell-cycle genes related to the S/G2/M phase. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
