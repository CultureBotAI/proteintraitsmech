identifier: ComplexPortal:CPX-3905
label: "Caspase-2 PIDDosome"
definition: >-
  Cysteine-type endopeptidase complex that assembles in response to genotoxic stress, mitotic catastrophe, heat shock, ER stress or bacterial toxins and is considered to be the primary activating platform for Caspase-2 (CPX-969). Facilitates Caspase-2 autocatalytic cleavage. Once activated, Caspase-2 is released and induces BID (P55957) cleavage, BAX (Q07812) translocation to mitochondria, subsequent cytochrome c (P99999) release and consequent activation of the apoptotic process. Altered Caspase-2 and CRADD expressions were observed in mantle cell lymphoma tumor samples. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
