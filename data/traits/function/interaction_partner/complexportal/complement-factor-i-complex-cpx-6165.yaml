identifier: ComplexPortal:CPX-6165
label: "Complement factor I complex"
definition: >-
  Serine-type endopeptidase complex of the alternative pathway (AP) of complement activation that maintains a well-balanced immune response by modulating complement activation. Downregulates the AP by proteolytically inactivating fluid-phase and already-deposited C3b (CPX-973), iC3b and C4b (P0C0L4/P0C0L5) in the presence of cofactors such as C4b binding protein (P04003 & P20851), Complement receptor 1 (CR1, P17927) or MCP (CD46, P15529) and as part of I-H-C3b complex (CPX-6164). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
