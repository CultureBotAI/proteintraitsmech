identifier: ComplexPortal:CPX-8806
label: "20S proteasome complex"
definition: >-
  Primordial protein-degrading machine essential for maintaining cellular homeostasis, possibly aided by loosely associated ATPase activators. An integral part of the 26S proteasome, but also exists as a free complex in many cell types. Once considered as either a proteasome assembly intermediate, 26S breakdown product from disassembly or stand-alone proteolytic enzyme complex, there is evidence for the independent direct action of the 20S proteasome on disordered, oxidized and damaged proteins. Plays an important role in adaptation to oxidative stress and the adaptive immune response. Mediates ubiquitin-independent protein degradation through association with PA200 and PA28. Required in several pathways including spermatogenesis (20S-PA200 complex) or generation of a subset of MHC class I-presented antigenic peptides (20S-PA28 complex). Circulating 20S proteasomes present in human plasma are known to increase significantly under various pathological conditions including acute respiratory disease, autoimmune disorders and cancerous tumours. The correlation with disease progression suggests a potential role as a biomarker for disease state and treatment efficacy. Dysregulated proteasome function has been implicated, as a primary cause or a secondary consequence, in the pathogenesis of a broad array of neurodegenerative diseases, including Alzheimer’s, Parkinson’s, and Huntington’s diseases. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
