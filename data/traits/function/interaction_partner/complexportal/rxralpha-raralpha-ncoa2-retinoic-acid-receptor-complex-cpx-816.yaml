identifier: ComplexPortal:CPX-816
label: "RXRalpha-RARalpha-NCOA2 retinoic acid receptor complex"
definition: >-
  Member of the nuclear receptor family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in cellular differentiation, proliferation and apoptosis. The 9-cis retinoic acid receptor (retinoid X receptor, RXR) is an important member of the nuclear receptor family because it forms heterodimers with many other receptors, including the all-trans retinoic acid receptor (RAR). RAR and RXR transduce the retinoid signal into a variety of genetic responses, and their functions underlie the essential role played by retinoids in the development and homeostasis of vertebrates. A general model of RAR-RXR-mediated transcription proposes that unliganded RAR-RXR heterodimers are bound to regulatory elements of their target genes and interact with transcriptional repressor complexes such as NCOR/SMRT/SIN3 to recruit histone deacetylases that lead to repression of target gene transcription. Binding of agonist ligand to the nuclear receptor, triggers a conformational change in the ligand binding domain (LBD) with the repositioning of the C-terminal helix H12 creating a binding surface that allow coactivator to bind. Antagonist ligands that prevent the C-terminal helix H12 from adopting its active conformation facilitate the interactions with corepressors. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
