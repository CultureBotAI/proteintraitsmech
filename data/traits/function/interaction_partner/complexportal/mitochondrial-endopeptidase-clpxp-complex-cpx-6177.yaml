identifier: ComplexPortal:CPX-6177
label: "Mitochondrial endopeptidase ClpXP complex"
definition: >-
  ATP-dependent serine protease which degrades proteins, potentially playing a central housekeeping function rather than targeting specific substrates. May contribute to mitochondrial protein quality control by degrading misfolded proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
