identifier: ComplexPortal:CPX-386
label: "TAH18-DRE2 complex"
definition: >-
  Protein complex that supplies reducing equivalents to the early steps of the cytosolic Fe-S assembly (CIA) pathway and also functions in ribonucleotide reductase cluster assembly, potentially also supplying reducing equivalents to the di-iron cluster. Electrons from NADPH are transferred via FAD and FMN, the two flavin cofactors in TAH18, to the Fe-S cluster(s) in DRE2, which subsequently deliver the electrons to proteins in the CIA pathway and RNR2 (P09938). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
