identifier: ComplexPortal:CPX-3173
label: "Collagen type XVIII trimer"
definition: >-
  Component of basement membranes (BMs) with the structural properties of both a collagen and a proteoglycan. Appears to play a major role in determining retinal structure as well as in the closure of the neural tube. Proteolytic cleavage within its C-terminal domain releases a fragment, endostatin, which has been reported to have anti-angiogenesis effects. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
