identifier: ComplexPortal:CPX-2662
label: "DNA-directed RNA polymerase II complex"
definition: >-
  Catalyzes the transcription of RNA from a DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3' end of an RNA transcript. Synthesizes precursors of mRNAs, and most snRNA and microRNAs. During a transcription cycle, Pol II, general transcription factors and the mediator complex (CPX-3226) assemble as the preinitiation complex (PIC) at the promoter. 11-15 base pairs of DNA surrounding the transcription start site are melted and the single-stranded DNA template strand of the promoter is positioned deeply within the central active site cleft of Pol II to form the open complex. After synthesis of about 30 bases of RNA, Pol II releases its contacts with the core promoter and the rest of the transcription machinery (promoter clearance) and enters the stage of transcription elongation in which it moves on the template as the transcript elongates. Pol II appears to oscillate between inactive and active conformations at each step of nucleotide addition. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
