identifier: ComplexPortal:CPX-9162
label: "MIER1 histone deacetylase complex, HDAC2 variant"
definition: >-
  Class I histone deacetylase complex with a role in transcriptional repression, by acting as an epigenetic eraser removing acetyl groups from histone tails. This results in the loss of binding sites for regulatory reader proteins and causes chromatin compaction by restoring the positive charge on histone tails. May act downstream of the Polycomb repressive 2 family of complexes to expand regions of repressed chromatin and may bind and deposit histone octamers onto nucleosome-depleted regions of DNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
