identifier: ComplexPortal:CPX-21307
label: "ADAM22-LGI1 synaptic receptor complex"
definition: >-
  Synaptic organizing complex. LGI1 positively modulates the voltage-gated potassium channel (Kv1) through its interaction with ADAM22 to maintain normal synaptic function and brain homeostasis. The complex interacts with AMPA-type glutamate receptors via DLG4 (P78352) intracellularly to maintain normal synaptic signal transmission. Also acts as a key synaptic organizer, anchoring signalling molecules and stabilizing synaptic connections, to ensure normal glutamatergic signalling and neuronal excitability balance, which are essential for normal brain function. Dysfunction in the LGI1-ADAM22-Kv1 complex is linked to autoimmune limbic encephalitis and epilepsy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
