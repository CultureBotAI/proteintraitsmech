identifier: ComplexPortal:CPX-2673
label: "Gamma-secretase complex"
definition: >-
  Integral membrane aspartyl protease which performs the intramembrane cleavage of integral membrane proteins such as Notch receptors, clearing the anchors of type-I membrane proteins left in the membrane after shedding of their ectodomain. Cleaves proteins consisting of a single hydrophobic transmembrane helix and with a remaining ectodomain of limited length. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
