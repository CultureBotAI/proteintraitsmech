identifier: ComplexPortal:CPX-667
label: "RARalpha-NCOA1 activated retinoic acid receptor complex"
definition: >-
  Member of the nuclear receptor (NR) family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in cellular differentiation, proliferation and apoptosis. The all-trans retinoic acid receptor (Rara) is an important member of the nuclear receptor family because it forms heterodimers with many other receptors, including 9-cis retinoic acid receptors (retinoid X receptor, RXRs). Like other NRs, Rara contains DNA-binding and ligand-binding domains (DBD, LBD). In the absence of agonist, the complex recruits the corepressor proteins NCoR or SMRT and associated factors such as histone deacetylases or DNA-methyl transferases that may lead to an inactive condensed chromatin structure, preventing transcription. Upon ligand binding, RARs undergo a conformational change that results in the release of corepressors and transcriptional coactivators, such as Ncoa1, are recruited to the LBD which activates transcription. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
