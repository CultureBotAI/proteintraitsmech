identifier: ComplexPortal:CPX-2486
label: "THUMPD3-TRM112 methyltransferase complex"
definition: >-
  S-adenosylmethionine-dependent methyltransferase which catalyzes methylation of the amino group at the C2 position of guanine-6 to form N2-methylguanosine (m2G6) in a wide range of G6-containing human cytoplasmic tRNAs. The complex recognizes the characteristic 3′-CCA of mature tRNAs. The m2G7 of tRNATrp is also introduced by THUMPD3-TRMT112. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
