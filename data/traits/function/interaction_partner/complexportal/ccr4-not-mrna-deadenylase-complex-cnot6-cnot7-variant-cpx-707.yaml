identifier: ComplexPortal:CPX-707
label: "CCR4-NOT mRNA deadenylase complex, CNOT6-CNOT7 variant"
definition: >-
  Major cellular mRNA deadenylase complex at least in part by removing polyA tails that protect mRNA transcripts from degradation. Involved in the regulation of the cell cycle, chromatin modification, activation and inhibition of transcription initiation, control of transcription elongation, RNA export, nuclear RNA surveillance, and DNA damage repair in the nucleus. The CNOT4 ubiquitin ligase only weakly associates with the complex but is required for optimal deadenylation activity by the full CCR4-NOT complex. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
