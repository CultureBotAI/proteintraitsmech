identifier: ComplexPortal:CPX-4344
label: "Oligopeptide ABC transporter complex"
definition: >-
  High affinity transporter of oligopeptides that can accept peptides from 2 to 5 residues in length, with the highest affinity for tripeptides. Member of the ATP-binding cassette (ABC) transporter family, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
