identifier: ComplexPortal:CPX-1730
label: "Peroxisomal ABC transporter complex PXA1-PXA2"
definition: >-
  Peroxisomal ABC transporter involved in transmembrane transport of long chain fatty acids, most likely in their CoA ester form, into the peroxisomal matrix prior to beta-oxidation. Very long chain acyl-CoA esters are hydrolyzed by the PXA1-PXA2 complex prior to the transport of their fatty acid portion into the peroxisomes with the CoA being released into the cytoplasm. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
