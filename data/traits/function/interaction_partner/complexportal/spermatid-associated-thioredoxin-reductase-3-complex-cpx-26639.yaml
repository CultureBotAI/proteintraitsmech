identifier: ComplexPortal:CPX-26639
label: "Spermatid-associated thioredoxin reductase 3 complex"
definition: >-
  Flavoprotein complex which reduces thioredoxin/TXN (P10599) to its dithiol-containing form. The complex is involved in the regulation of cellular redox reactions, growth and differentiation. Essential for maintaining thiol redox homeostasis to protect sperm from radical oxygen species (ROS) which are particularly susceptible during critical phases of sperm development. Binding to NADPH, results in the transportation of electrons from NADPH via FAD to the disulfide region in the N-terminal active site, and from there onwards to the C-terminal redox center of the adjacent subunit, where substrate reduction occurs. Largely restricted to the testis, TXNRD3 is thought to be involved in the process of sperm maturation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
