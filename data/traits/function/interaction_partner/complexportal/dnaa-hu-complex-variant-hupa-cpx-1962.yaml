identifier: ComplexPortal:CPX-1962
label: "DnaA-HU complex, variant hupA"
definition: >-
  HU dimers (alpha homodimers as well as alpha-beta dimers [CPX-1958]) are essential proteins during the DnaA-dependent initiation of replication. They facilitate DnaA oligomerization and proper timing of initiation of replication, potentially by suppressing dnaA binding to DNA at a low affinity binding site, I3. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
