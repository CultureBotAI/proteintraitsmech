identifier: ComplexPortal:CPX-2730
label: "siRNA RISC-loading complex, R2D2 variant"
definition: >-
  Endoribonclease complex that has dicing, slicing, guide-strand selection, and AGO2-loading activities.The complex binds asymmetrically to duplex siRNAs, selecting one strand of exogenous siRNAs according to the relative thermodynamic stability of base-pairing at either end and loading it onto AGO2 to form RNA-induced silencing complexes (RISCs). The siRNA is processed into 21 nucleotide siRNA duplexes with 2 nucleotide 3′-overhangs by the RNase III family enzyme Dcr-1 (Q9VCU9). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
