identifier: ComplexPortal:CPX-774
label: "CURI complex variant 1"
definition: >-
  Plays a role in coupling ribosomal protein gene transcription and ribosomal RNA synthesis and processing. Acts to sequester the ribosomal protein (RP)-specific transcription factor, IFH1, to reduce transcription of RP genes during periods of growth inhibition. Upon growth inhibition, the key regulator of cell growth, TORC1 is inactivated, which leads to rapid release of IFH1 from the RP gene promoter. RNA polymerase I activity inhibits the ability of UTP22, a component of both this complex and the SSU processome, to titrate IFH1 from RPG promoters. The CURI complex also activate transcription of RP genes since the CK2 component of the CURI complex can phosphorylate IFH1 at the sites essential for strong binding to FHL1 at the RP promoters. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
