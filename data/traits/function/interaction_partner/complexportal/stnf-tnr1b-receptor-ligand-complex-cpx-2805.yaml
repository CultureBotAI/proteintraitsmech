identifier: ComplexPortal:CPX-2805
label: "sTNF:TNR1B receptor-ligand complex"
definition: >-
  Complex formed on the binding of the soluble form of the pro-inflammatory cytokine, Tumour necrosis factor alpha (sTNFa, CPX-8826) to its type-2 receptor (TNFRSF1B, P20333). TNF, a key regulator of T regulatory cells, is mainly secreted by macrophages, T helper 1 and natural killer cells, and while TNFRSF1A (P19438) is ubiquitously expressed, TNFRSF1B is mainly expressed by immune cells, neurons and endothelial cells. TNFRSF1B is similar in its extracellular structure to TNFRSF1A at the mTNF (transmembrane TNF, CPX-8931) and sTNF binding sites, but it lacks the death domain (DD) found in TNFRSF1A that is central to its intracellular signalling activities. Instead, TNFRSF1B holds a TNF receptor associated factor (TRAF) binding site, allowing it to interact directly with TRAF2 and TRAF1 or TRAF3. Lacking the DD, TNFRSF1B cannot trigger cell death, instead uses TRAF to activate the NF-KB and MAPK signalling cascade, most frequently resulting in cell proliferation and survival. sTNF is relatively poor at activating TNFRSF1B but complex formation between mTNF and TNFRSF1B can induce reverse signalling where TNFRSF1B binding mTNF results in phosphorylation within the ligand-bearing cell, resulting in triggering the NF-KB signalling cascade. TNF-TNFRSF1B activation indirectly influences the formation of TNF-TNFRSF1A signalling complexes and the cross-talk between the receptor complexes is central to cell-survival, proliferation or death. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
