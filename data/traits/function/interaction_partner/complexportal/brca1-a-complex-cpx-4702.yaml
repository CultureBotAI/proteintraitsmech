identifier: ComplexPortal:CPX-4702
label: "BRCA1-A complex"
definition: >-
  Deubiquitinase complex that predominantly binds polyubiquitin chains and specifically recognizes Lys-63-linked ubiquitinated histones H2A and H2afx (P27661) at DNA lesions sites, and targets the BRCA1-BARD1 heterodimer (CPX-4701) to sites of DNA damage at double-strand breaks (DSBs). Critical for G2-M checkpoint control in response to ionising radiation, to ensure that entry into mitosis is transiently inhibited to avoid aberrant chromosome segregation. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
