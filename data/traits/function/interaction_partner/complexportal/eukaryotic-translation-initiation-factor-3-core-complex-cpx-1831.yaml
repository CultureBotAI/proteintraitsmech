identifier: ComplexPortal:CPX-1831
label: "Eukaryotic translation initiation factor 3 core complex"
definition: >-
  Orchestrates several crucial steps in the translation initiation pathway. eIF3, eIF2 (CPX-427), eIF5, and eIF1 bind to each other to form a multifactor complex (MFC) which then binds to the 40S ribosome to form the 43S preinitiation complex. Thus formed, 43S preinitiation complex binds to mRNA to form 48S PIC and scans the mRNA leader region for the start codon. In addition to the five core subunits, yeast eIF3 complex has a loosely associated subunit, namely, Hcr1 (eIF3j/Q05775). This protein promotes the binding of eIF3 to the ribosome and is involved in ribosomal biogenesis as well as proper selection of the AUG start site. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
