identifier: ComplexPortal:CPX-3249
label: "SCF-MET30 E3 ubiquitin ligase complex"
definition: >-
  SCF-Met30 is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, in which the F-box protein, MET30, forms the substrate recognition subunit. The complex is required for the ubiquitylation of the transcription factor MET4 (P32389), resulting in its deactivation, and destabilization of the cell cycle inhibitor MET32 (Q12041), thus enabling cell cycle progression. MET4 is the master regulator of genes governing the synthesis of sulfur-containing amino acids, therefore SCF-MET30 coordinates cell cycle progression with biosynthetic pathways of sulfur-containing metabolites, such as methionine, cysteine, and S-adenosylmethionine. The complex may form a homodimer. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
