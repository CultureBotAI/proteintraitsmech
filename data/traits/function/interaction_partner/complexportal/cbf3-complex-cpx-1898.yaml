identifier: ComplexPortal:CPX-1898
label: "CBF3 complex"
definition: >-
  Binds to the CDEIII DNA element, conserved between all yeast chromosomes, early in kinetochore assembly and acts as the the primary determinant of assembly. Binding of the CBF3 complex and presence of the unique N-terminal tails of the two CSE4 (P36012) molecules in the nucleosome could cooperate to induce a sharp bending of the centromeric DNA, thus creating a C-loop structure in which the CSE4 nucleosome is proximal to the plus end of the kinetochore. Alternatively, CSE4-nucleosomes are part of the highly phased array of nucleosomes on either side of the CEN-sequence, while CFB3 occupies CDEIII and additional Ndc10 molecules occupy the CDEII sites to form an extended binding platform. microtubule. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
