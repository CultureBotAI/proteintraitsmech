identifier: ComplexPortal:CPX-1721
label: "Mitochondrial respiratory chain complex IV, COX5A variant"
definition: >-
  Key role in aerobic respiration, in which mitochondrial enzymes accept electrons from electron carriers reduced in glycolysis and the tricarboxylic acid cycle. A complex metalloprotein that transfers electrons from reduced cytochrome c to molecular oxygen and conserves the free energy released in this exergonic reaction by maintaining a transmembrane proton gradient which is utilized to drive the synthesis of ATP or ion transport across the membrane. The four protons consumed in the reduction of one oxygen molecule to water are taken from the mitochondrial matrix and, coupled to this reaction, four additional protons are translocated from the matrix to the intermembrane space. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
