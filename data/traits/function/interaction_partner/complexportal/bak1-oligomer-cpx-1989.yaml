label: "BAK1 oligomer"
definition: >-
  Form membrane associated oligomers which create pore-like structures in the mittochondrial outer membrane, in response to cytotoxic signals, resulting in membrane damage and release of apoptotic mediators such as cytochrome C. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
