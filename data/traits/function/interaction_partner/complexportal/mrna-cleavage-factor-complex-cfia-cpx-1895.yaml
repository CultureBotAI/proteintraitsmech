identifier: ComplexPortal:CPX-1895
label: "mRNA cleavage factor complex CFIA"
definition: >-
  Required for the posttranscriptional maturation of mRNA 3' ends. CFI binds signal sequences at the 3' end of yeast mRNA. and is required for correct positioning of a larger protein complex, CPF (CPX-1053), which contains the catalytic subunits executing mRNA cleavage and polyadenylation. CFI (CPX-1896) and CFII recognize the processing signals of the RNA and perform the endonucleolytic cleavage, whereas CFI, polyadenylation factor I (PFI), and the single-polypeptide PAP1 are required for the polyadenylation step. CFIA forms a stable sub-complex. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
