identifier: ComplexPortal:CPX-2531
label: "MKS transition zone complex"
definition: >-
  Part of the transition zone, a barrier located at the base of cilia which separates the interior and exterior of cilia. The transition zone is characterized by Y-shaped structures that span from the axoneme to the ciliary membrane and comprises of the MKS and NPHP (CPX-2806) modules. The MKS1-B9D2-B9D1 sub-complex functions as a diffusion barrier preventing exchange of transmembrane proteins between the cilia and plasma membranes. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
