identifier: ComplexPortal:CPX-869
label: "FET5-FTH1 high affinity iron exporter complex"
definition: >-
  High-affinity vacuolar exporter complex which transports ferrous iron ions (Fe(II), Fe2+) from the vacuole, the main storage component of intracellular free iron, into the cytoplasm in a low iron environment. The complex forms in the endoplasmic reticulum and then traffics to the vacuolar membrane. Plays a role in the switch from fermentative metabolism to respiratory metabolism. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
