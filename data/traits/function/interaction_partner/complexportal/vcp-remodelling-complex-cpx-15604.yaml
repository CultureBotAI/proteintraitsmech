identifier: ComplexPortal:CPX-15604
label: "VCP-remodelling complex"
definition: >-
  Lysine-specific methyltransferase that catalyzes the trimethylation of Lys-315 of VCP. ASPSCR1 enables the disassembly of VCP allowing the methyltransferase VCPKMT to bind and trimethylate VCP at the lysine side chain, which is deeply buried inside functional VCP hexamers. VCP is an ATPase involved in a number of cellular functions, including endoplasmic reticulum associated degradation (ERAD), membrane fusion, protein degradation and transcription factor regulation. Maintains cellular homeostasis under both physiological and stress conditions. Its activity is essential for clearing misfolded or damaged proteins, resolving stalled replication forks, terminating transcription complexes, and regulating the turnover of membrane-bound and nuclear signalling factors. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
