identifier: ComplexPortal:CPX-5774
label: "Cubam cobalamin uptake receptor complex"
definition: >-
  Endocytic receptor essential for intestinal vitamin B12 (B12/cobalamin, CHEBI:30411) uptake and for protein reabsorption from the kidney filtrate. B12, bound to the carrier protein CBLIF (P27352), docks to the receptor and is then internalized via receptor-mediated endocytosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
