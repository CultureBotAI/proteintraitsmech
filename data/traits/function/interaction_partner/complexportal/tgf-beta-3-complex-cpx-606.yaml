identifier: ComplexPortal:CPX-606
label: "TGF-beta-3 complex"
definition: >-
  Cytokine complex that plays an important role in embryogenesis, tissue development, cell proliferation, differentiation and maturation, immune regulation and carcinogenesis. Binding to form its receptor complex (CPX-2544) results in the phosphorylation of TGFBR1 on Thr-185 and Thr-186 by the constitutively active TGFBR2. Activated TGFBR1 phosphorylates SMAD2 (Q15796) which dissociates from the receptor and activates the canonical SMAD-dependent TGF-beta signaling cascade. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
