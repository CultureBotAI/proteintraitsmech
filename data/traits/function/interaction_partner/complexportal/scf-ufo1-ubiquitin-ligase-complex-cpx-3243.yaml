identifier: ComplexPortal:CPX-3243
label: "SCF-Ufo1 ubiquitin ligase complex"
definition: >-
  SCF-Ufo1 is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, in which the F-box protein, Ufo1, forms the substrate recognition subunit. The complex is required for the degradation of HO and Gal80, thereby involved in mating type switching and regulation of galactose metabolism. The complex may form a homodimer. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
