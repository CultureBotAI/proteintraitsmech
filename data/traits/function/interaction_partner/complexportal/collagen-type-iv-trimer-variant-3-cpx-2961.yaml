identifier: ComplexPortal:CPX-2961
label: "Collagen type IV trimer variant 3"
definition: >-
  Basement membranes are formed by a fine network of collagen IV fibres that are laced together and entrap large associated molecules. This assembly process requires lateral interactions between triple helices at two levels. In the short N-terminal triple-helical 7S domain, four triple helical domains from four different molecules assemble head to tail to form the structure known as a spider whose legs are made of a long triple helical region made of several triple helical domains interrupted by short nontriple helical sequences. In the tissue the molecules interact laterally by this region in a staggered fashion. Finally, interactions of nontriple helical COOH-terminal NC1 domains (IPR001442) to form dimers are responsible for tail-to-tail binding of type IV molecules. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
