identifier: ComplexPortal:CPX-349
label: "Cyclin L2-CDK11B(p110) complex"
definition: >-
  Cyclin-dependent protein kinase complex. Role in pre-mRNA splicing and transcription regulation, possibly through phosphorylation of the splicing factor SFRS7 (Q16629). Phosphorylated by CHK2 (O96017), a key mediator in the response to DNA damage, however the phosphorylation appears to occur in a DNA damage-independent manner and is not required for kinase activity but does promote pre-mRNA splicing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
