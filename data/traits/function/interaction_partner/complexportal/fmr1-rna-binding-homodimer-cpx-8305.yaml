identifier: ComplexPortal:CPX-8305
label: "FMR1 RNA-binding homodimer"
definition: >-
  mRNA binding complex that plays a critical role in mRNA metabolism, regulating alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of target mRNAs. Undergoes liquid-liquid phase separation on binding to target mRNAs leading to their assembly into cytoplasmic membrane‐less ribonucleoprotein stress granules that both concentrates mRNAs with associated regulatory factors and also sequesters them in the cytoplasm preventing nuclear functions such as alternative splicing, transcriptional regulation or mRNA processing. Formation of membraneless foci is driven by the C-terminal 188-residue low-complexity region of the protein and is enhanced by phosphorylation of this region. The complex plays a central role in neuronal development and synaptic plasticity. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
