identifier: ComplexPortal:CPX-6222
label: "alpha-thrombin complex"
definition: >-
  A serine-type endopeptidase complex of the common blood coagulation pathway. Initiates the terminal stage when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Cleaves Arg-|-Gly bonds in fibrinogen by limited proteolysis to form fibrin and contributes to the activation of factors Va (CPX-6216), VIIa (CPX-6211), VIIIa (CPX-929), XIa (CPX-6205), XIIa (CPX-4945), XIIIa (CPX-6231). May also activate itself at low levels before factor Xa (CPX-6215) is available. Forms a complex with thrombomodulin that negatively regulates its own activation. Its zymogen form is initially activated by minor proteolysis by factor Xa and then by factor Va-Xa complex (CPX-6221) leading to a positive feedback cycle of factor Va, Xa and thrombin activation. Inhibited by antithrombin (SERPINC1, P01008). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
