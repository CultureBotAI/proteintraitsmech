identifier: ComplexPortal:CPX-1371
label: "SNO2-SNZ1 pyridoxal 5'-phosphate synthase complex"
definition: >-
  Catalyzes the hydrolysis of glutamine to glutamate and ammonia, thus supplying ammonia as a source of the ring nitrogen of pyridoxine as part of the biosynthesis of pyridoxal 5'-phosphate. SNZ1 may act as a synthetase that mediates the coupling of ammonia with an unknown acceptor substrate, possibly via a tunnel in the synthetase subunit. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
