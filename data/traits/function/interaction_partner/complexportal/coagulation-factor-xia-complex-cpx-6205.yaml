identifier: ComplexPortal:CPX-6205
label: "Coagulation factor XIa complex"
definition: >-
  A serine-type endopeptidase complex of the intrinsic blood coagulation pathway (contact activation pathway). Cleaves Arg-|-Ala and Arg-|-Val bonds of factor IX (P00740) by limited proteolysis to form active factor IXa (CPX-4945) and contributes to factor VIIa-TF complex (CPX-2808) activation. Also binds platelet glycoprotein Ib:IX:V complex. The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form is activated by limited proteolysis by factor XIIa (CPX-6209) and thrombin (CPX-6222) to form active factor XIa. Inhibited by antithrombin (SERPINC1, P01008). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
