identifier: ComplexPortal:CPX-26447
label: "Retention and splicing complex"
definition: >-
  The retention and splicing complex (RES) is a splicing factor which interacts with precursor mRNA at the onset of the first trans-esterification reaction, playing a critical role in splicing and retention of precursor mRNA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
