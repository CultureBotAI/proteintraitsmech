identifier: ComplexPortal:CPX-3446
label: "TrpAB tryptophan synthase complex"
definition: >-
  Catalyzes the final two steps in the biosynthesis of L-tryptophan. Complex formation stimulates the separate enzymatic activities of the alpha and beta subunit by one to two orders of magnitude, due to conformational changes of the subunits on binding. The alpha-subunit catalyses the cleavage of indole-glycerol-phosphate to indole and glyceraldehyde-3-phosphate. In the beta-subunit, indole is condensed with l-serine to l-tryptophan and water in a pyridoxal-5-prime-phosphate dependent reaction. Indole diffuses from the alpha to the beta-active site through a tunnel formed by the subunits, preventing its loss through absorption by the cell membranes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
