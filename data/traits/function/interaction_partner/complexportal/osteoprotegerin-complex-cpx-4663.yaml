identifier: ComplexPortal:CPX-4663
label: "Osteoprotegerin complex"
definition: >-
  A soluble decoy receptor for osteoclastogenic cytokine TNFSF11/RANKL (O14788). Binding of osteoprotegerin to cytokine TNFSF11 prevents the cytokine from binding its receptor TNFRSF11A/RANK (Q9Y6Q6) and thus inhibits osteoclastogenesis. Bone homeostasis seems to depend on the local ratio between cytokine and decoy receptor. Osteoprotegerin may also play a role in preventing arterial calcification. Plays some as yet to-be-defined role in mammary gland physiology and hormone-driven epithelial proliferation during pregnancy and may act as a protective factor in bone microenvironment by preventing breast cancer-induced bone loss and reducing intra-osseous tumour growth. Also possible decoy receptor for pro-apoptotic cytokine TNFSF10/TRAIL (P50591) which competes with TNFSF11 and releases the inhibition of osteoclastogenesis. In vitro, binding affinity is 500x higher for TNFSF11 than TNFSF10. Binding of osteoprotegerin to TNFSF10 appears to contribute to tumour growth of breast cancer cells and progression at the primary tumour site. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
