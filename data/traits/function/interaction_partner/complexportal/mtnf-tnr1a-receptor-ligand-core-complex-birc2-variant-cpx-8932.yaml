identifier: ComplexPortal:CPX-8932
label: "mTNF-TNR1A receptor-ligand core complex, BIRC2 variant"
definition: >-
  A membrane-bound tumour necrosis factor-receptor signalling complex (Complex I) formed on the binding of the membrane-bound form of the pro-inflammatory cytokine, tumour necrosis factor (mTNF, CPX-8931). This activates the mitogen-activated protein kinase and nuclear factor-kappa-B (NF-kappa-B) signalling pathways, leading to proinflammatory gene expression and promoting cell survival. The Ripoptosome (CPX-1907, Complex II) originates from the dissociation of Complex I components from the receptor and promotes cell apoptosis. TNF, a key regulator of T regulatory cells, is mainly secreted by macrophages, T helper 1 and natural killer cells, while its receptor component TNFRSF1A is ubiquitously expressed on almost all human tissues. Intracellular signaling is triggered by ligand-bound receptors assembling into higher-order clusters. Soluble TNFA triggers more robust clustering of TNFR1 than membrane-bound ligand. TNFR1-mediated signaling is therefore generally caused by the activation due to sTNFA over mTNFA. TNFA-TNFRSF1A signalling complex formation is indirectly influenced by TNFA-TNFRSF1B activation and the cross-talk between the receptor complexes is central to cell-survival, proliferation or death. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
