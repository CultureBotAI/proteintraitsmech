identifier: ComplexPortal:CPX-1926
label: "DNA polymerase III clamp loader complex"
definition: >-
  A member of the AAA+ family of ATPases which utilizes ATP hydrolysis to load the sliding clamp onto the DNA at the primer template junction. The holA/delta subunit is responsible for clamp binding and opening. holB/delta' acts as a stator and stabilizes the interaction of holA with the sliding clamp. The tau (P06710-1) and gamma (P06710-2) subunits are active ATPases. The clamp loading function of the tau and gamma subunits is interchangeable but only tau oligomerizes Pol III. Each dnaX subunit binds one molecule of ATP, and the clamp loader binds and hydrolyses three ATP molecules for each loading cycle.The holD/psi and holC/chi subunits bridge the clamp loader complex with the SSB complex (CPX-1928). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
