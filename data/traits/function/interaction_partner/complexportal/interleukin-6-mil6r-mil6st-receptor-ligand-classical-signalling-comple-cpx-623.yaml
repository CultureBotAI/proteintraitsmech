identifier: ComplexPortal:CPX-623
label: "Interleukin-6-mIL6R-mIL6ST receptor-ligand classical signalling complex"
definition: >-
  Symmetrical 2:2:2 complex formed on the binding of interleukin-6 (IL6) to the IL6 specific alpha receptor (IL6R) and the signal transducing component, IL6ST (glycoprotein 130, gp130). IL6 binds to IL6R with low affinity but the IL6:IL6R dimer binds to IL6ST with high affinity resulting in trimer formation. A hexameric complex is formed upon the interaction between IL6 of one trimer and the D1 domain on site-3 of IL6ST of the other trimer. IL6R exists as soluble (sIL6R) and membrane bound mIL6R, and complex formation results in the induction of either a pro-inflammatory trans-signalling pathway (CPX-8967), or a classical anti-inflammatory signalling cascade (CPX-623, this complex) leading to protective and regenerative outcomes, respectively. Ligand-receptor assembly results in the formation of the complete complex, inducing the transphosphorylation of IL6ST-associated JAK1/2 and TYK2 molecules as well as phosphorylation of the cytoplasmic tails of the IL6ST receptor. Phosphorylated STAT3 dissociates from the receptors, dimerize and translocate into the nucleus where they induce the transcription of IL6 target genes. IL6-induced trans- and classical signalling is indifferent in canonical intracellular JAK-STAT pathway, but trans-signalling is considered to be the more potent of the two. The ratio of mIL6R to IL6ST on a cell's surface decides how trans- and classical signalling are sensed by a cell. IL6 is a pleiotropic cytokine involved in regulating inflammatory responses as well as co-ordinating developmental, metabolic and neuronal processes. Plays an essential role in B-cell differentiation and modulation of acute-phase responses. Involved in lymphocyte and monocyte differentiation. Acts on B-cells, T-cells, hepatocytes, hematopoietic progenitor cells and cells of the CNS. Dysregulation of the IL6 signalling pathway and in particular JAK1/STAT3 activity is associated with diseases such as Rheumatoid arthritis (RA), inflammatory bowel disease (IBD), and various cancers. The IL6/JAK/STAT3 signalling pathway is aberrantly overactive in patients with chronic inflammatory conditions and in those with haematopoietic malignancies or solid tumours, and targeting components of the IL6/JAK/STAT3 pathway has been shown to inhibit growth of tumour cells and relieve immunosuppression in the tumour microenvironment. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
