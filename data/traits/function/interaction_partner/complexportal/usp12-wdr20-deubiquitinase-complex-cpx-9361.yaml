label: "USP12-WDR20 deubiquitinase complex"
definition: >-
  Deubiquitinase complex responsible for the removal of ubiquitin chains from proteins.The complex shuttles between the plasma membrane, cytoplasm and nucleus in a XPO1 (O14980)-dependent manner. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
