identifier: ComplexPortal:CPX-2123
label: "sufBCD complex"
definition: >-
  Scaffold complex that assembles an Fe-S cluster. The sufB protomer of the sufBCD complex accepts the atomic sulfur from the sulfur transfer protein SufE (CPX-2125) and incorporates it into an [4Fe-4S] cluster. sufBCD further transfers the Fe-S cluster to the carrier protein sufA (CPX-2142). sufBCD is a component of the sufABCDSE operon, which is activated and required under specific conditions such as oxidative stress and iron limitation. The sufBCD complex is a putative ATP-binding cassette (ABC) complex, inferred by its structural similarity with ABC transporters. sufC has been shown to be an ATPase whose activity is enhanced by the presence of sufB and sufD (PMID:20857974). Under aerobic conditions FADH2 is oxidised to FAD and dissociates from sufBCD. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
