identifier: ComplexPortal:CPX-4382
label: "Phosphonate ABC transporter complex"
definition: >-
  High affinity phosphonate (phosphorus-containing organic molecules in which the P atom is linked directly to C in a stable chemical bond) transporter. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. Also has the ability to take up phosphate in the absence of canonical phosphate-transport systems. E. coli K-12 laboratory strains do not express the PhnE permease, due to the presence of an 8 bp insertion in phnE, and consequently are unable to take up phosphonates. This cryptic mutation readily reverts and most E.coli strains carry a functional phnE gene. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
