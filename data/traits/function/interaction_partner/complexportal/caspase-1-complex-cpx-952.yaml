identifier: ComplexPortal:CPX-952
label: "Caspase-1 complex"
definition: >-
  A pro-inflammatory thiol protease complex that is activated in response to pathogen infections and toxins. Primarily acts in monocytes and macrophages. Activation by autocatalytic cleavage is an ATP-dependent reaction and occurs within an activation platform, the Inflammasome (CPX-4141, CPX-4082, CPX-4144, CPX-4142 and CPX-4143). Once activated, it has a strict requirement for an Asp residue at position P1 and preferred cleavage sequence of Asp-Glu-Val-Asp-|-. It cleaves interleukins 1beta (IL1B, P01584) and IL18 (Q14116) between an Asp and an Ala, releasing the mature cytokines which are involved in a variety of inflammatory processes. Cleaves and activates sterol regulatory element binding proteins (SREBPs). Related to, but independent of, IL1B activation it is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves GSDMD (P57764). However, as a side effect of pyroptosis active IL1B is often released form the dead cells and therefore some link exists between both activities. While primarily a pro-inflammatory caspase it can also promote apoptosis in non-immune cells, especially in response to brain, kidney and renal cell injury. Caspase-1-deficient mice are protected from several acute and chronic inflammatory diseases, including sepsis and colitis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
