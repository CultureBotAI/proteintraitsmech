identifier: ComplexPortal:CPX-4407
label: "Zinc ABC transporter complex"
definition: >-
  High affinity zinc transporter. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. The expression of znuABC is repressed by the zinc uptake regulator, Zur, which acts as a dimer, containing four zinc ions in its active repressor form, when it competes with RNA polymerase for znuABC promoter occupancy. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
