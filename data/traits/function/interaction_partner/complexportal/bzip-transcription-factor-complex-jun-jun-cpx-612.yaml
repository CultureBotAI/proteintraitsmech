identifier: ComplexPortal:CPX-612
label: "bZIP transcription factor complex, Jun-Jun"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The DNA recognition sequence depends on the composition of the bZIP dimer with the complex either binding to the preferred region of one of the partners or to a novel bZIP cognate site. The Jun dimer acts as co-activator for a range of transcription factors, e.g. PU.1 (P17433), Cebpb (P28033) and bZIP domain-containing proteins (e.g. complex CPX-611), but probably not functional on its own. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
