identifier: ComplexPortal:CPX-24
label: "U6 small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex that is involved in mRNA splicing. Instead of the Sm ring found in the other spliceosomal snRNPs, it contains an Sm-like ring. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. U6 is part of the activated spliceosome and is involved in the first transestherification step of splicing. After splicing is complete, the spliceosome disassembles and free U6 snRNP forms. It then reassociates with U4 (CPX-31) to form U4/U6 snRNP (CPX-32). A curated stable macromolecular complex (Complex Portal) with 9 subunits.
