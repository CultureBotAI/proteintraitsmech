identifier: ComplexPortal:CPX-9223
label: "TNFSF14-TNFRSF14 receptor complex"
definition: >-
  Receptor complex which coordinates innate and adaptive immune responses. TNFSF14 mediated signalling through TNFRSF14 provides a costimulatory signal for T and B cell activation, and in particular signalling through the TRAF2-cIAP complex (Q12933,Q13489) which initiates the NF-KB-RelA (Q04206) led transcription of genes important for inflammatory, proliferative, and survival functions. TNFSF14 also mediates its effects through LTBR (CPX-9310), and the decoy receptor TNFRSF6B (CPX-9309). Potent modulator of T-cell driven inflammatory responses but its effects are negatively modulated by herpes simplex virus (HSV) 1 virion glycoprotein D (gD); HSV1 gD inhibits the interaction of TNFRSF14 with TNFSF14, and TNFSF14 and HSV1 gD interfere with TNFRSF14-dependent cell entry by HSV1. Elevated levels of TNFSF14 is associated with the pathogenesis of inflammatory and autoimmune disorders such as asthma and IBD. TNFSF14 expression is a prognostic biomarker for COVID-19 through its ability to instigate ARDS. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
