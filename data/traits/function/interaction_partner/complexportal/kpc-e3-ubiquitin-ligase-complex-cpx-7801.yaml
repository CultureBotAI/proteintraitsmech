identifier: ComplexPortal:CPX-7801
label: "KPC E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase which regulates degradation of the cyclin-dependent kinase inhibitor CDKN1B (P46527) at the G1 phase of the cell cycle. Ubiquitinates NFKB1 (P19838) which rsults in limited proteosomal processing and generation of the active NF-kappa-B p50 protein (PRO_0000030311). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
