identifier: ComplexPortal:CPX-8262
label: "CRL3 E3 ubiquitin ligase complex, KLHL41 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL41 target proteins include the thin filament chaperone, NRAP (Q86VF7) which regulates the dynamics of myofibril formation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
