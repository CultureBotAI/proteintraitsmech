identifier: ComplexPortal:CPX-49
label: "S100A9 complex"
definition: >-
  Homodimer, stabilised by Ca2+ binding. Binds to toll-like receptor 4 (TLR4) and the receptor for advanced glycation end products (RAGE) initiating signal transduction through NF-kappa-B pathways. S100A9 transports arachidonic acid between the cytosol and the NADPH oxidase complex at the plasma membrane in neutrophils as part of an inflammatory signal cascade leading to an oxidative burst. S100A9 complexes with microtubules increasing cell motility. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
