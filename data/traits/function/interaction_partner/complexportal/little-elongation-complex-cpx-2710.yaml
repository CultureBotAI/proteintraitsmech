identifier: ComplexPortal:CPX-2710
label: "Little elongation complex"
definition: >-
  Regulates the initiation and elongation of RNA polymerase II (Pol II)-transcribed genes encoding small nuclear RNAs (snRNAs), potentially by decreasing transient pausing by Pol II along the transcribed regions by keeping the 3' OH of the nascent transcript properly aligned with the catalytic site of Pol II. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
