identifier: ComplexPortal:CPX-3284
label: "Ribonuclease MRP complex"
definition: >-
  Site-specific endonuclease, closely related to RNAse P complex (CPX-1873). Most protein subunits are common between the two complexes, only SNM1 and RNP1 are unique to MRP, as well as the RNA component NME1. RNAse MRP is involved in rRNA processing in the nucleolus, but during exit from mitosis it also localizes to specialized cytoplasmic P bodies and participates in cleaving CLB2 mRNA. The RNA subunit NME1 is a catalytically active ribozyme that is capable of both recognizing and cleaving substrates, Despite its name (Mitochondrial RNA Processing) the nucleolar complex is not involved in processing mitochondrial RNA. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
