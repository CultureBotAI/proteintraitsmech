identifier: ComplexPortal:CPX-631
label: "RXRalpha-VDR nuclear hormone receptor complex"
definition: >-
  Member of the nuclear receptor family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in cellular differentiation, proliferation and apoptosis. The Vitamin D receptor (VDR) mediates the transcriptional effects of Vitamin D and plays a central role in calcium homeostasis. The 9-cis retinoic acid receptor (retinoid X receptor, RXR) is an important member of the nuclear receptor family because it forms heterodimers with many other receptors, including the all-trans retinoic acid receptor (RAR). Receptors bind to hormone response elements (HREs) via their DNA-binding domains (DBD) and contain a C-terminal ligand-binding domain (LBD) that binds the hormone. Unliganded VDR can occupy its response elements as a homodimer. RXRA-VDR is a non-permissive receptor that cannot be activated by an RXR agonist but only by an agonist of the dominant partner receptor, VDR. Upon binding of ligand, VDR forms a heterodimer with RXRA through their LBDs and binds to Vitamin D response elements. The ligand for RXRA, 9-cis retinoic acid, has the opposite effect of destabilizing the heterodimeric-DNA complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
