identifier: ComplexPortal:CPX-4601
label: "Glutathione/cysteine ABC exporter complex"
definition: >-
  Eukaryotic-type ATP-binding cassette transporter which exports low molecular weight thiols (CHEBI:29917), glutathione (CHEBI:16856) and cysteine (CHEBI:15356) to the periplasm, thus playing redox balancing role in the periplasm. Required for the correct assembly of cytochrome bd (CPX-268)-type quinol oxidases, haem ligation during the assembly of c-type cytochromes and the disulfide folding of periplasmic and secreted protein. Structural modelling has identified a potential haem-binding site on the periplasmic surface of the complex which may be important in redox sensing and tolerance to nitric oxide. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
