identifier: ComplexPortal:CPX-8149
label: "PRMT5 methylosome complex, COPR5 variant"
definition: >-
  Type II arginine methyltransferase which dimethylates substrate proteins by catalyzing a 2-step transfer of 2 methyl groups from 2 S-adenosyl methionine (SAM) cofactor molecules to substrate arginine residues. COPRS recruits PRMT5 to nucleosomes and promotes methylation of arginine residues including H3R8 and H4R3 thus regulating chromatin remodelling. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
