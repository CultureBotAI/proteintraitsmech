identifier: ComplexPortal:CPX-3069
label: "CDC48-NPL4-VMS1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Required for the destruction of damaged, misfolded and ubiquitinated proteins in the mitochondrion. Under conditions of mitochondrial stress, VMS1 (Q04311) recruits CDC48 and NPL4 and extracts ubiquitinated proteins for proteasomal degradation. May also play a role in endoplasmic reticulum-associated protein degradation (ERAD). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
