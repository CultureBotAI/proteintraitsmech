identifier: ComplexPortal:CPX-4441
label: "BRCA1-C complex"
definition: >-
  Endo- and Exonuclease complex that plays a central role in double-stranded break repair (DSB), DNA recombination, maintenance of telomere integrity and meiosis. It possesses single-strand endonuclease activity and double-strand-specific 3-prime-5-prime exonuclease activity, which are provided by MRN. The complex formation of BRCA1-CtIP-MRN is important for facilitating DSB resection to generate single-stranded DNA that is needed for homologous recombination-mediated DSB repair, a process that also involves EXO1 (Q9UQ84) and DNA2 (P51530). It is required for tolerance to etoposide during DNA replication, for DNA topoisomerase 2-DNA adduct removal, and for subsequent processing of DNA ends to generate a 3-prime ssDNA. It is critical for G2-M checkpoint control in response to ionising radiation, to ensure that entry into mitosis is transiently inhibited to avoid aberrant chromosome segregation. BRCA1-C complex is also important for restart of stalled replication forks. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
