identifier: ComplexPortal:CPX-10348
label: "Interleukin-37 complex"
definition: >-
  Anti-inflammatory cytokine. Powerful inhibitor of inflammation and immunity. Released in an alarmin-like fashion upon stimulation by monocytes. IL37 is thought to autoregulate its anti-inflammatory effects by transitioning from a dimeric to a monomeric state as it moves away from its site of release. IL37 is predominantly produced by peripheral blood mononuclear cells but its isoforms (IL37a-e) have a variable expression profile in human blood, with IL37B and IL37C (Q9NZH6-3) detected in PBMCs whilst IL37A (Q9NZH6-2) and IL37E (Q9NZH6-5) are not. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
