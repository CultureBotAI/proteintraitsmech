identifier: ComplexPortal:CPX-16835
label: "AMH-AMHR2 reproduction development complex"
definition: >-
  Plays a crucial role in male sexual differentiation by mediating Mullerian duct regression during fetal development, thereby preventing the formation of internal female reproductive structures. In female sexual development, the complex contributes to ovarian physiology by regulating follicle activation, restraining excessive early folliculogenesis, and maintaining the ovarian reserve. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
