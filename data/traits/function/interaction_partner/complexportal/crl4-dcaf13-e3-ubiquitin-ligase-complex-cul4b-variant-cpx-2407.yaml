identifier: ComplexPortal:CPX-2407
label: "CRL4-DCAF13 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF13. The complex is active in preimplantation embryonic development by ubiqitinating and targeting for destruction SUV39H1/2 (O43463/Q9H5I1) thereby triggering histone H3 lysine‐9 demethylation and zygotic genome reprogramming. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
