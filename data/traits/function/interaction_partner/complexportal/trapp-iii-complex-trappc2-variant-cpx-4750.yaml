identifier: ComplexPortal:CPX-4750
label: "TRAPP III complex, TRAPPC2 variant"
definition: >-
  Multimeric vesicle tethering complex involved in vesicle transport between endoplasmic reticulum and Golgi compartments and in the regulation of COPII vesicle coating. Acts as guanine exchange factors towards RAB1 (P62820) and RabE/Rab11 (P62491). Mutations in the core subunit TRAPPC2 are known to cause Spondyloepiphyseal dysplasia tarda (SEDT), while TRAPPC4 was implicated in tumorigenesis of colorectal cancer. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
