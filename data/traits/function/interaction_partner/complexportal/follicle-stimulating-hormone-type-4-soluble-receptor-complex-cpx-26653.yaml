identifier: ComplexPortal:CPX-26653
label: "Follicle Stimulating Hormone, type 4 soluble receptor complex"
definition: >-
  Gonadotropin-receptor complex. Follicle stimulating hormone (FSH) mediates a diverse range of functions by binding to one of four FSH receptor (FSHR) isoforms. The alternatively-spliced isoform 4 FSHR (FSHR-4) may function like a prohormone of the active molecule but its physiological significance is yet to be determined. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
