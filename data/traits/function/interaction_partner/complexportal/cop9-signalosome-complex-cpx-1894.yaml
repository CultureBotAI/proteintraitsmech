identifier: ComplexPortal:CPX-1894
label: "COP9 signalosome complex"
definition: >-
  Essential regulator of the ubiquitin (Ubl) conjugation pathway by mediating the deneddylation of the cullin subunits of SCF-type E3 ligase complexes. Plays a role in the regulation of the mating pheromone response. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
