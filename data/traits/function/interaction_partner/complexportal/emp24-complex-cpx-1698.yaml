identifier: ComplexPortal:CPX-1698
label: "EMP24 complex"
definition: >-
  Plays a role in selective transport processes at the ER-Golgi interface by tethering both COPI (CPX-1652) and COPII (CPX-2523) complexes via dilysine motives on EMP24 and ERV25. May initially recruit the deactivated form of ARF1 (P11076), facilitating the formation of a COPI priming complex and subsequently enabling efficient budding. In addition, the ability of p24 proteins to oligomerize and to present multiple coatomer-binding motifs may promote COPI budding by docking coatomer more firmly to the membrane. Required for the export of glycosylphosphatidylinositol-anchored proteins to the Golgi apparatus through interaction with the SEC23-LST1 COPII cargo recruitment complex (CPX-1341). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
