identifier: ComplexPortal:CPX-859
label: "MSL histone acetyltransferase complex"
definition: >-
  Responsible for genome-wide H4K16 acetylation. Important for ATM-dependent cell cycle checkpoint control as well as transcriptional activation of Hox genes in coordination with the H3K4 methyltransferase, MLL. May achieve dosage compensation, equalizing the expression levels of X-chromosomal genes between males and females, by stochastic inactivation of one of the female X chromosomes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
