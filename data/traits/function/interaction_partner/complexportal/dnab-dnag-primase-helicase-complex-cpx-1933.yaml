identifier: ComplexPortal:CPX-1933
label: "DnaB-DnaG primase-helicase complex"
definition: >-
  Involved in the synthesis of RNA primer sequences used in DNA replication. dnaG binding to dnaB displaces dnaC from dnaB (CPX-1934), activates the helicase and transposition activity of dnaB and thereby moves replication from the initiation to the priming phase. The interaction of the dnaB helicase and dnaG primase at the replication folk stimulates each others activities: As the helicase unwinds the parental DNA, the primase synthesises Okasaki RNA primers. Finally, DNA Polymerase III holoenzyme docks onto the primer-ssDNA duplex and initiates DNA synthesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
