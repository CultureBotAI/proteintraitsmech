identifier: ComplexPortal:CPX-7722
label: "Fukutin-FKRP-TMEM5 multienzyme complex"
definition: >-
  Contributes to the biosynthesis of glycans required for dystroglycan function. O-mannosyl glycans essential for the ligand-binding activity of alpha-dystroglycan (PRO_0000021065) are connected to [- 3-xylosyl-alpha-1,3-glucuronic acid-beta-1-] repeats by a tandem ribitol-phosphate (Rbo-P). FKTN and FKRP encode Rbo-P transferases that synthesize the tandem Rbo-P structure and the ribitol xylosyltransferase, RXYL1, forms a Xylosyl-Rbo-P linkage. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
