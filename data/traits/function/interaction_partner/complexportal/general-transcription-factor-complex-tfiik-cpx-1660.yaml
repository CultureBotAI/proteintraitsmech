identifier: ComplexPortal:CPX-1660
label: "General transcription factor complex TFIIK"
definition: >-
  Protein kinase component of transcription factor IIH (TFIIH) which phosphorylates the C-terminal domain of RNA polymerase II during transition from transcription to elongation after preinitiation complex (PIC) formation, thereby positively regulating transcription. TFIIH is essential for both basal and activated transcription, and is involved in nucleotide excision repair of damaged DNA. It is unclear whether this module has a role independent of that as a sub-complex of TFIIH. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
