identifier: ComplexPortal:CPX-2402
label: "Calcium release-activated calcium channel"
definition: >-
  Ca[2+] release-activated Ca[2+] channel which functions in store-operated Ca[2+] entry, a mechanism for Ca[2+] entry across the plasma membrane modulated by intracellular (mainly endoplasmic reticulum) Ca[2+] stores. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
