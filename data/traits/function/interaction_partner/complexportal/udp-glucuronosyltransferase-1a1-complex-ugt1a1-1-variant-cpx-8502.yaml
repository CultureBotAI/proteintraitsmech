identifier: ComplexPortal:CPX-8502
label: "UDP-glucuronosyltransferase 1A1 complex, UGT1A1-1 variant"
definition: >-
  Membrane-bound UDP-glucuronosyltransferase present in the endoplasmic reticulum that catalyzes the transfer of glucuronic acid to hydroxyl, carboxyl, or amine group compounds. Required for the biotransformation of lipophilic xenobiotics, increasing the conjugated metabolite's water solubility and facilitating excretion into either the urine or bile. UGT1A1 glucuronidates relatively bulky molecules such as bilirubin and planar or smaller molecules such as estradiol. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
