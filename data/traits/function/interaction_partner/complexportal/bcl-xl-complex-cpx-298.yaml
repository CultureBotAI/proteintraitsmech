identifier: ComplexPortal:CPX-298
label: "BCL-XL complex"
definition: >-
  Anti-apoptotic key regulator of the intrinsic apoptotic pathway, preventing activation of the cell death mediators BAX and BAK, one or both of which are required for the execution phase of apoptosis, preventing the release of mitochondrial proteins. Normally cytosolic, binds to the membrane upon activation by caspase cleavage. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
