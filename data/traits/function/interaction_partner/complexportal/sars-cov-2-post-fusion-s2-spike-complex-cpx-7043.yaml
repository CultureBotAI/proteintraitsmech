identifier: ComplexPortal:CPX-7043
label: "SARS-CoV-2 post-fusion S2 Spike complex"
definition: >-
  Post-fusion Spike protein complex of the SARS-CoV-2 coronavirus consisting of three chains of the S2 domain. Cell entry via binding of Spike to the ACE2 receptor (CPX-5683) relies on two proteolytic cleavage events facilitated by host proteases, such as furin (P09958) and TMPRSS2 (O15393): the first cleavage occurs at the S1/S2 site, the second at the S2' site. Cleavage at the S1/S2 site can occur prior to exit from an infected cell or once bound to ACE2 on the surface of a new host cell. Cleavage at the S2' site occurs only on the surface of the new host cell. While furin is active in the Golgi and on the plasma membrane and can cleave Spike at both cleavage sites, TMPRSS2 only facilitates S2' cleavage on the plasma membrane. While cleaved Spike (CPX-5682) greatly enhances viral entry into the host cell, it is not strictly required for infection and not all Spike complexes on the viral surface are cleaved (CPX-7042). Alternatively, virions can enter the cell via the endosomal pathway and the use of an alternative protease, e.g. cathepsin L (P07711). Some variants of Spike carry mutations in the furin cleavage site that increases the proportion of cleaved Spike complexes which is linked to a higher infectivity of these variants. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
