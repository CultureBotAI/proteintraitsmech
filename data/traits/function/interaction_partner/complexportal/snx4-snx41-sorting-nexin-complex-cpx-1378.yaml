identifier: ComplexPortal:CPX-1378
label: "SNX4-SNX41 sorting nexin complex"
definition: >-
  Required on a maturing endosome to sort and export distinct cargo proteins. The heterodimers oligomerize and coat the membrane, driving a transition in topology from a flat membrane to a form the tubular endosomal network thus generating transport vesicles for trafficking of retromer cargoes . SNX4-SNX41 mediates retrograde sorting of ATG27(P46989), an integral membrane protein implicated in selective autophagy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
