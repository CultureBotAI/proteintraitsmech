identifier: ComplexPortal:CPX-26662
label: "SPO11 DNA endo-reduplication complex"
definition: >-
  Involved in chromatin organization and endoreduplication in somatic cells, with the latter process contributing to both the increase in level as well as variation in nuclear ploidy levels. Complex plays crucial roles in plant growth and development, including cell-elongation processes mediated by brassinosteroids. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
