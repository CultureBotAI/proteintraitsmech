identifier: ComplexPortal:CPX-3322
label: "SIN3B histone deacetylase complex"
definition: >-
  A histone deacetylation complex (HDAC) that negatively regulates gene expression especially of genes regulating G1/S and G2/M cell cycle transitions as well as cell differentiation. Interacts with the Rb family of proteins (RB [P06400], RBL1/p107 [P28749], and RBL2/p130 [Q08999]) and E2F4 (Q16254) downstream of the transcription start sites to repress the transcription of E2F target genes during cell cycle withdrawal. Probably does not directly bind to DNA but is recruited to gene promoters by specific transcription factor such as REST (Q13127), RB (P06400), HBP1 (O60381), the Myc-inhibitors MXI1 (P50539) and MAD1 (Q9Y6D9), Klf13 (Q9Y2Y9), FOXK1 (P85037) and FOXK2 (Q01167) as well as with the nuclear hormone repressors, N-CoR (O75376) and SMRT (Q9Y618) and/or SWI/SNF chromatin remodelling complexes. Binds H3K4me2 and H3K4me3 histones via subunits ING1 and ING2 and hypoacetylated histones via subunits RBBP4 and RBBP7. Unlike the SIN3A complex (CPX-3321) it is only found in differentiated cells. May include several accessory proteins such as BAHCC1 (Q9P281), BBX (Q8WY36), IRS4 (O14654), PHF23 (Q9BUL5), SAP18 (O00422) and TNRC18 (O15417). A curated stable macromolecular complex (Complex Portal) with 15 subunits.
