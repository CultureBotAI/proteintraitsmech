identifier: ComplexPortal:CPX-3184
label: "EAF5-7-3 nucleosome disassembly/reassembly complex"
definition: >-
  Plays a role in co-transcriptional RNA processing and maturation by associating with the coding region of transcriptionally active genes and affecting RNA polymerase II processivity. Promote the disruption, and subsequent reassembly, of nucleosomes. Also exists as a component of the NuA4 histone acetyltransferase complex (CPX-3155) which is involved in transcriptional activation of selected genes principally by acetylation of nucleosomal histone H4 and H2A. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
