identifier: ComplexPortal:CPX-5977
label: "Phosphatidylinositol 3-kinase complex class IA, p110beta/p55gamma"
definition: >-
  Uses PI(4,5)P2 as a substrate to generate the product PI(3,4,5)P3 which initiates major signaling pathways downstream. Performs a central role in cellular signaling, mediating responses to growth factors and extracellular stimuli. This variant is found to be ubiquitously expressed in human cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
