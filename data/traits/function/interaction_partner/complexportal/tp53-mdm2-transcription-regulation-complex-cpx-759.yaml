identifier: ComplexPortal:CPX-759
label: "TP53-MDM2 transcription regulation complex"
definition: >-
  Transcriptional repressor complex, formation of which inhibits the ability of TP53/p53 to induce cell cycle arrest. The mechanism of action is primarily through the ubiquitinylation of p53, a critical step in mediating its degradation by nuclear and cytoplasmic proteasomes, and by directly inhibiting p53 transactivation capacity and by promoting the nuclear export of p53. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
