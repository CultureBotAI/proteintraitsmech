identifier: ComplexPortal:CPX-1891
label: "RPB4-RPB7 subcomplex"
definition: >-
  Shuttles between the nucleus and cytoplasm and mediates both transcription and the two major cytoplasmic mRNA decay pathways, enhancing the deadenylation process of specific mRNAs. Interacts with components of the translation initiation factor 3 (eIF3), and is required for efficient translation initiation. Efficient translation in the cytoplasm depends on association of RPB4/7 with RNA polymerase II (CPX-2662) in the nucleus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
