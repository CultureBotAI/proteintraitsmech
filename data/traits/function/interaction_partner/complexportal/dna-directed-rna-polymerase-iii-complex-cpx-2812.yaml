identifier: ComplexPortal:CPX-2812
label: "DNA-directed RNA polymerase III complex"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3-prime end of an RNA transcript. Responsible for the transcription of genes encoding small structured RNAs such as tRNAs, the 7 SL lncRNA, spliceosomal U6 snRNA and ribosomal 5S RNA. Pol III machinery recognizes conserved promoter elements located within the transcribed region, generally the box A and box B sequences, which contribute to the D- and T-loops in the tRNA structure. A curated stable macromolecular complex (Complex Portal) with 17 subunits.
