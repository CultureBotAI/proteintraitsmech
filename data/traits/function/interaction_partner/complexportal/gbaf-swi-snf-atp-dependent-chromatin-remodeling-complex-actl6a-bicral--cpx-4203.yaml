identifier: ComplexPortal:CPX-4203
label: "GBAF (SWI/SNF) ATP-dependent chromatin remodeling complex, ACTL6A-BICRAL-SMARCA2 variant"
definition: >-
  The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. It is likely that the two ATPases, SMARCA2/BRM and SMARCA4/BRG1, do not co-occur in the same complex. It is unclear if the 3 BCL7 protein occur in the same complex or form further variants. May contain 2 instances of subunit SMARCC1. Closely related to BICRA (GLTSCR1) variant (CPX-4084). Distinguished from the canonical SWI/SNF complexes by the inclusion of BCL7A/B/C, BICRAL, BRD9 and SS18 and lack of canonical core subunits ARID1A/B (O14497/Q8NFD5), DPF2 (Q92785), SMARCB1 (Q12824), or SMARCE1 (Q969G3). A curated stable macromolecular complex (Complex Portal) with 11 subunits.
