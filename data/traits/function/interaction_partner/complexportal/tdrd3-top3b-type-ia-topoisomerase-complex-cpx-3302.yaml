identifier: ComplexPortal:CPX-3302
label: "TDRD3-TOP3B type IA topoisomerase complex"
definition: >-
  DNA/RNA type IA topoisomerase family, which transiently cleaves and rejoins one strand of the DNA duplex, relaxing supercoiled DNA and torsional tension of DNA introduced during DNA replication and transcription, resolving recombination intermediates during meiosis and DNA repair. Transiently traps the 5-prime end of the cleaved DNA by covalent bonding via catalytic tyrosine residues. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
