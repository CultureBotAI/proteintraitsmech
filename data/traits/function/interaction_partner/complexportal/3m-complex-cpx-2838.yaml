identifier: ComplexPortal:CPX-2838
label: "3M complex"
definition: >-
  Core component of one of more ubiquitin ligases which play a role in maintaining microtubule and genome integrity. Known substrates include PHLDB2 (Q86SQ0) which is involved in the regulation of focal adhesion. The core complex binds additional proteins, including RBX1 (P62877) which confers E3 ubiquitin ligase activity, and also FBXW8 (Q8N3Y1) and ANKRA2 (Q9H9E1) which may give substrate specificity or themselves be substrates. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
