identifier: ComplexPortal:CPX-3481
label: "Shieldin complex"
definition: >-
  Promotes the repair of DNA double-stranded breaks (DSBs). Functions as a downstream effector of 53BP1-RIF1 during the G1 and S phases of the cell cycle to promote non-homologous end joining (NHEJ) and suppress DNA end resection. Also plays a role in NHEJ-dependent fusion of unprotected telomeres and is required for immunoglobulin class-switch recombination. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
