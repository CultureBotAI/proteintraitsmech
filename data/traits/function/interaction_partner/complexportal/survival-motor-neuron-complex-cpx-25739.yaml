label: "Survival motor neuron complex"
definition: >-
  Molecular chaperone that plays a catalyst role in the assembly of small nuclear ribonucleoproteins (snRNPs), the building blocks of the spliceosome, thus playing an important role in the splicing of cellular pre-mRNAs. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
