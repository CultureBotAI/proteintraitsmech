identifier: ComplexPortal:CPX-2694
label: "Histone pre-RNA core cleavage complex"
definition: >-
  Endonuclease complex required for processing of mRNA precursors in a U7 snRNP (U7 machinery) for replication-dependent histone pre-mRNAs which are cleaved at the 3' end but not polyadenylated. The cleavage reaction depends on U7 snRNP complex (CPX-2705) and on CASP8AP2 (Q9UKL3). The 5' end of U7 snRNA recognizes histone pre-mRNAs by base pairing with the histone downstream element located 3' of the cleavage site. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
