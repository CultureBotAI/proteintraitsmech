identifier: ComplexPortal:CPX-5304
label: "Endoplasmic reticulum snare complex UFE1-USE1-SEC20-SEC22"
definition: >-
  SNARE complex required for the fusion of retrograde transport vesicles with the endoplasmic reticulum. Mediates membrane fusion through the spontaneous assembly of four complementary SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptors) motifs. SNAREs bind to each other in-trans, that is, with SNAREs anchored in each apposed tethered membrane. The assembly process leads to a tight connection between the fusing membranes and initiates membrane fusion. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
