identifier: ComplexPortal:CPX-1626
label: "CORVET tethering complex"
definition: >-
  Multisubunit tethering complex involved in early endosomal fusions by cross-linking two membranes, and facilitating the formation of a SNARE complex during fusion. Cooperates with Rab GTPases to capture vesicles and trap them prior to the action of SNAREs. Catalyses either vacuole fission into sub-compartments or vacuole-endosome fusion, or both, by interacting with the Rab GTPase VPS21 (P36017) to promote tethering and fusion of RAB5/VPS21-positive membranes. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
