identifier: ComplexPortal:CPX-26396
label: "PtdIns(3,5)P2 regulatory complex"
definition: >-
  Regulates both the synthesis, from phosphatidylinositol 3-phosphate (PI3P), and turnover of the low abundance, signaling lipid phosphatidylinositol 3,5-bisphosphate (PtdIns(3,5)P2; CHEBI:16851). Primarily localized at endosomal membranes with PtdIns(3,5)P2 regulating the activity of ion channels. FIG4 is active as both a lipid phosphatase and also as a serine phosphatase that acts on PIKFYVE to increase its lipid kinase activity. PIKFYVE autophosphorylation represses its lipid kinase activity and stimulates FIG4 lipid phosphatase activity. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
