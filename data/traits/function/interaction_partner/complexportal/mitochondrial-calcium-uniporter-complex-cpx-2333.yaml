identifier: ComplexPortal:CPX-2333
label: "Mitochondrial calcium uniporter complex"
definition: >-
  Highly selective, inward-rectifying Ca2+ channel located on the inner mitochondrial membrane. The uniporter is quiescent in resting cellular conditions and becomes activated only when local Ca2+ levels rise above approximately 1 microM with the MCU tetramer forming a calcium-conducting pore. Ca2+ uptake is driven by the large negative inner mitochondrial membrane potential generated by proton pumping into the intermembrane space by the electron transport chain. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
