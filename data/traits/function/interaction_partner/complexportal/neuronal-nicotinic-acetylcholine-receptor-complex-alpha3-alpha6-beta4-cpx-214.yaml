identifier: ComplexPortal:CPX-214
label: "Neuronal nicotinic acetylcholine receptor complex, alpha3-alpha6-beta4"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous nicotinic agents. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron. Mediates fast, short-lived synaptic transmission of neurotransmitters. (Mainly found in chick retina). Upregulated by pro-inflammatory cytokines, like TNF-alpha. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
