identifier: ComplexPortal:CPX-3444
label: "SIN3B histone deacetylase complex"
definition: >-
  A histone deacetylation complex (HDAC) that negatively regulates gene expression especially of genes regulating G1/S and G2/M cell cycle transitions as well as cell differentiation. Interacts with the Rb family of proteins (Rb [P13405], Rbl1/p107 [Q64701], and Rbl2/p130 [Q64700]) and E2f4 (Q8R0K9) downstream of the transcription start sites to repress the transcription of E2F target genes during cell cycle withdrawal. Probably does not directly bind to DNA but is recruited to gene promoters by specific transcription factor such as Rest (Q8VIG1), Rb (P13405), Hbp1 (Q8R316), the Myc‐inhibitors Mxi1 (P50540) and Mad1l1/MAD1 (Q9WTX8), Klf13 (Q9JJZ6), Foxk1 (P42128) and Foxk2 (Q3UCQ1) as well as with the nuclear hormone repressors, Ncor1 (Q60974) and Ncor2/SMRT (Q9WU42) and/or SWI/SNF chromatin remodelling complexes. Binds H3K4me2 and H3K4me3 histones via subunits Ing1 and Ing2 and hypoacetylated histones via subunits Rbbp4 and Rbbp7. Unlike the SIN3A complex (CPX-3443) it is only found in differentiated cells. May include several accessory proteins such as Bahcc1 (Q3UHR0), Bbx (Q8VBW5), Irs4 (Q9Z0Y7), Phf23 (Q8BSN5), Sap18 (O55128) and Tnrc18 (Q80WC3). A curated stable macromolecular complex (Complex Portal) with 15 subunits.
