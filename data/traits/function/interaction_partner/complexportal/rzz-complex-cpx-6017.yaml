identifier: ComplexPortal:CPX-6017
label: "RZZ complex"
definition: >-
  A kinetochore component required for mitotic spindle assembly checkpoints. Builds a fibrous corona that assembles on mitotic kinetochores before microtubule attachment to promote chromosome alignment and robust spindle assembly checkpoint signaling. Required for the assembly of the dynein-dynactin and MAD1-MAD2 (CPX-85) complexes onto kinetochores. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
