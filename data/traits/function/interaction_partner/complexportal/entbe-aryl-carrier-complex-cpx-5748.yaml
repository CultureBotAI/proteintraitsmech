identifier: ComplexPortal:CPX-5748
label: "entBE aryl carrier complex"
definition: >-
  Required for a step in the synthesis of enterobactin (CHEBI:28855), a catecholate-type siderophore. entE-2,3-dihydroxy-benzoate (DHB, CHEBI:36654) -AMP binds to dimeric phosphopantetheinylated entB, resulting in the transfer of DHB to the phosphopantetheine group on Ser-245 of entB, resulting in the production of acyl-entB; this is followed by release of AMP from entE and dissociation of entE from the complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
