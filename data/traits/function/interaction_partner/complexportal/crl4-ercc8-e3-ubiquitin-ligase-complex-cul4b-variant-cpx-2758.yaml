identifier: ComplexPortal:CPX-2758
label: "CRL4-ERCC8 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor ERCC8. The complex is is active in the transcription coupled branch of nucleotide excision repair through the ubiquitination and subsequent proteasomal degradation of ERCC6 (Q03468) in a UV-dependent manner. This enables the recovery of RNA synthesis after transcription-coupled repair. ERRC6 is a component of the B-WICH chromatin remodelling complex (CPX-1099). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
