identifier: ComplexPortal:CPX-664
label: "RXRalpha-RXRalpha retinoic acid receptor complex"
definition: >-
  Member of the nuclear receptor family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in cellular differentiation, proliferation and apoptosis. Retinoid X nuclear receptors (RXRs) forms transcriptionally active homodimers although their physiological significance is not clear. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
