identifier: ComplexPortal:CPX-1226
label: "Muscle cell-specific SWI/SNF ATP-dependent chromatin remodeling complex, ACTL6B-ARID1A-SMARCA4 variant"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to promoters and enhancers of target genes in muscle cells and alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. Also targeted to chromatin by phosphatidylinositol-4,5-bisphosphate which promotes the complex binding to actin filaments. The complex additionally interacts with a range of nuclear receptors and the vitamin D receptor (VDR, P11473) via SMARCD subunits. SWI/SNF complexes containing DPF3 are specific to muscle cells where they play an essential role in the development of heart and skeletal muscle cells. Also found in brown adipocytes where they regulate gene-expression of brown fat-selective genes. Acts as transcriptional repressor of neuronal genes in non-neuronal cells by interacting with the REST repressor complex and histone deacetylases (HDACs). In this variant of the complex transcriptional repression is probably driven by the presence of the ARID1A subunit. The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. It is likely that the two ATPases, SMARCA2/BRM (CPX-1225) and SMARCA4/BRG1 (this complex) do not co-occur in the same complex. SMARCD1 (BAF60A) and SMARCD2 (BAF60B) also may not co-occur. The following proteins may be associated with SWI/SNF (BAF) complex variants, with one or more from each family present in any given complex: DPF2/BAF45D (Q92785), BRD9 (Q9H8M2), SS18 (Q15532), BCL11A (Q9H165), BCL11B (Q9C0K0), BCL7A (Q4VC05), BCL7B (Q9BQE9), BCL7C (Q8WUZ0). Mutations in several subunits affect tissue and developmental processes such as nervous system and cardiac development and maintenance of pluripotency resulting in tumorigenesis or the development of intellectual disorders. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
