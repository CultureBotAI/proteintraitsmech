identifier: ComplexPortal:CPX-2256
label: "ASAP splicing-associated complex"
definition: >-
  Binds RNA in a sequence-independent manner and is recruited to the exon junction complex prior to or during the splicing process where it appears to regulate the excision of specific introns. The related complexes ASAP and PSAP (CPX-2257) confer distinct alternative splicing regulatory activities to exon-junction complexes. Also may play a role in aspects of RNA metabolism involved in transcription, translation and nonsense-mediated mRNA decay. Promotes apoptosis and is disassembled after induction of apoptosis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
