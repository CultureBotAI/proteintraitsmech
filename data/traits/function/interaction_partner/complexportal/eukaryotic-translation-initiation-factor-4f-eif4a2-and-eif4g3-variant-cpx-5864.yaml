identifier: ComplexPortal:CPX-5864
label: "Eukaryotic translation initiation factor 4F, EIF4A2 and EIF4G3 variant"
definition: >-
  Eukaryotic translation initiation factor 4F (eIF4F) consists of three subunits, eIF4A, eIF4E, and eIF4G. Cap-dependent translation initiation commences with the binding of the cap structure (m7GTP) found at the 5 prime end of mRNA to eIF4E subunit. The eIF4F complex then loads mRNAs onto the 40S ribosomal subunit together with eIF3. Subunit eIF4A is an ATP-dependent RNA helicase involved in cap recognition and is required for mRNA binding to ribosome. eIF4G subunit serves as a scaffold for eIF4A and eIF4E subunits. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
