identifier: ComplexPortal:CPX-5044
label: "BLOC-2 complex"
definition: >-
  Adaptor complex required for the biogenesis of specialized organelles of the endosomal-lysosomal system, such as melanosomes and platelet dense granules. Once RAB32 (Q13637) and RAB38 (P57729) are activated by BLOC-3 (CPX-5043), they interact with AP-3 (CPX-5051 and CPX-5052), AP-1 (CPX-5047, CPX-5048 and CPX-5049) and BLOC-2 complexes which function as adaptor complexes on early/recycling endosome tubules, where cargo are loaded into vesicles or transport intermediates and transported to nascent melanosomes and platelet dense granules. Mutations in HPS genes are frequent cause of Hermansky-Pudlak syndrome. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
