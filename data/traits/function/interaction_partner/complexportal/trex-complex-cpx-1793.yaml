identifier: ComplexPortal:CPX-1793
label: "TREX complex"
definition: >-
  Couples transcription elongation by RNA polymerase II to mRNA export. Associates with the polymerase and travels with it along the length of the transcribed gene. TREX is composed of the THO transcription elongation complex (CPX-1792) as well as other proteins that couple THO to mRNA export proteins. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
