identifier: ComplexPortal:CPX-1695
label: "PCL1-PHO85 kinase complex"
definition: >-
  Cyclin-dependent protein kinase essential for the control of the cell cycle at the G1/S (start) transition. Positively controls degradation of sphingoid long chain base kinase LCB4 (Q12246) by phosphorylation, which is required for its ubiquitination and degradation. LCB4 catalyses the formation of sphingoid long-chain base 1-phosphates which have roles in roles in heat stress resistance, diauxic shift, and Ca2+ mobilization. Also involved in phosphorylation of the CDK inhibitor (CKI) SIC1 (P38634), which is required for its ubiquitination and degradation, releasing repression of B-type cyclins and promoting exit from mitosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
