identifier: ComplexPortal:CPX-9303
label: "Interleukin-17F complex"
definition: >-
  A proinflammatory cytokine, interleukin-17F (IL17F) is a member of the IL17 family which consists of six structurally related cytokines: IL17A, (CPX-9301) IL17B (CPX-9302), IL17C (CPX-9305), IL17D, IL25 (CPX-9306) and IL17F (CPX-9303). Expressed by CD4+ type 17 helper cells and Tc17 cells, IL17 is also produced by several innate immune cells. Unrestrained IL17 signalling is associated with autoimmune diseases and cancer progression, but it is also crucial for protection from fungal and bacterial infections, including the commensal Candida albicans and Klebsiella pneumoniae. IL17 is also thought to play a dominant protective role in maintaining intestinal barrier integrity. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
