identifier: ComplexPortal:CPX-4947
label: "NLRP1 inflammasome, variant 1"
definition: >-
  A pro-inflammatory thiol protease complex that assembles in the cytosol in response to pathogens and other damage-associated signals and plays a critical role in innate immunity and inflammation. Activating platform for caspa through proximity-induced self-cleavage in an ATP-dependent reaction. Activated caspa causes the initial cleavage of pro-il1b (E0WCW4), the first step in the activation process of this protein. This is followed by the recruitment of caspb (CPX-4948), which is activated and further cleaves il1b resulting in il1b maturation and secretion in the extracellular milieu. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
