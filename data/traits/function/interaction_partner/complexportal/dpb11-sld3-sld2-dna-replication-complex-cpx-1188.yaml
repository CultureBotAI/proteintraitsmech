identifier: ComplexPortal:CPX-1188
label: "DPB11-SLD3-SLD2 DNA replication complex"
definition: >-
  Associate with replication origins and promotes loading of DNA polymerases onto the origins to initiate chromosomal DNA replication when cyclin-dependent kinase activity increases at the G1/S cell cycle boundary. May play an active role in assembly or activation of the replication fork CMG helicase (CPX-297) thus playing a role in a critical S phase regulatory mechanism that restricts DNA replication to S phase. Interaction of the complex with with single-stranded DNA may be important for GINS attachment to MCM. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
