identifier: ComplexPortal:CPX-4142
label: "AIM2 inflammasome"
definition: >-
  A pro-inflammatory thiol protease complex that is activated by direct binding to cytosolic dsDNA, which may be encountered during pathogenic and viral infection or can be released upon loss of nuclear envelope integrity. It requires a dsDNA of at least 80base pairs for optimal activation. Primarily acts in monocytes and macrophages. Activating platform for Caspase-1 (CPX-952) through proximity-induced self-cleavage in an ATP-dependent reaction. Activated Caspase-1 cleaves interleukins 1beta (IL1B, P01584) and IL18 (Q14116) releasing the mature cytokines which are involved in a variety of inflammatory processes and is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves GSDMD (P57764). It belongs to the family of Inflammasomes that includes NLRP1 inflammasome (CPX-4082), NLRP3 inflammasome (CPX-4141), NLRC4 inflammasome (CPX-4144) and Pyrin inflammasome (CPX-4143). AIM2 acts as a tumor suppressor. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
