identifier: ComplexPortal:CPX-1220
label: "Brain-specific SWI/SNF ATP-dependent chromatin remodeling complex, ARID1B-SMARCA2 variant"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. Also targeted to chromatin by phosphatidylinositol-4,5-bisphosphate which promotes the complex binding to actin filaments. The complex additionally interacts with a range of nuclear receptors and the vitamin D receptor (VDR, P11473) via SMARCD subunits. Regulates cell differentiation specifically in post-mitotic brain tissue. In this variant of the complex transcriptional activation is probably driven by the presence of the ARID1B subunit. Removes Polycomb repressive complex 1 and 2 (PRC1 & PRC2) resulting in promoter activation via deubiquitination of H2AK119 and demethylation of H3K27. Activates, among others, transcription of oestrogen-responsive genes, glucocorticoid receptor-dependent genes and genes activating the Notch-signalling pathway. The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. It is likely that the two ATPases, SMARCA2/BRM (this complex) and SMARCA4/BRG1 (CPX-1221) do not co-occur in the same complex. In contrast to the neuron-specific SWI/SNF complex the brain-specific SWI/SNF complex misses core subunit SMARCC1 (Q92922) and alternative subunits ACTL6A (O96019), SMARCD1 (Q96GM5) or SMARCD3 (Q6STE5). May contain pBAF-specific subunit PBRM1 (BAF180, Q86U86). Mutations in several subunits affect tissue and developmental processes such as nervous system and cardiac development and maintenance of pluripotency resulting in tumorigenesis or the development of intellectual disorders. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
