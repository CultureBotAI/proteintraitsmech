identifier: ComplexPortal:CPX-1633
label: "Transcription factor TFIIA complex"
definition: >-
  Transcription factor complex that regulates transcription initiation from RNA polymerase II promoters. Binding to the transcription factor complex TFIID-TBP enhances assembly of the transcriptional preinitiation complex PIC and its binding to the DNA at the TATA-box by displacing transcription inhibitors. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
