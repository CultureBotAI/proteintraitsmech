identifier: ComplexPortal:CPX-444
label: "ACF chromatin remodeling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex, that regulates the even spacing of nucleosomes along the chromatin thus promoting chromatin assembly and the repression of transcription. The Baz1a subunit can enhance and direct the process provided by the ATPase subunit,Smarca5, probably through targeting pericentromeric heterochromatin in late S phase. Moves end-positioned nucleosomes to a predominantly central position. The ATPase activity of the complex is regulated by the length of flanking DNA. Also involved in facilitating the DNA replication process. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
