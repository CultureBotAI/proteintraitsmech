identifier: ComplexPortal:CPX-648
label: "CRL4-DDB2 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DDB2. The complex recognises UV-induced cyclobutane pyrimidine dimers in chromatin and facilitates nucleotide excision repair. Ubiquitinates XPC (Q01831), histones and other chromatin-associated proteins located within approximately 100A around the DNA lesion. Ubiquitination of histones may facilitate their removal from the nucleosome and promote subsequent DNA repair. Mutations in DDB2 can cause Xeroderma pigmentosum and other solar photosensitivity related diseases. Mutations in CUL4B are related to the Cabezas type of X-linked intellectual disabilities. Inactivated by the binding of the COP9 signalosome (CPX-1870 & CPX-1871) which is overcome by substrate binding to the DDB2 subunit. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
