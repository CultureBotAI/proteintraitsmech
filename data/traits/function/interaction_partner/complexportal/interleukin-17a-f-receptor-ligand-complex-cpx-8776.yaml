identifier: ComplexPortal:CPX-8776
label: "Interleukin-17A-F receptor-ligand complex"
definition: >-
  Pro-inflammatory cytokine receptor which plays a key role in both adaptive and innate immunity. TRAF3IP2 polyubiquitinates TRAF6 (Q9Y4K3) leading to the recruitment of downstream molecules and the activation of NF-KB and the mitogen-activated protein kinase (MAPK) pathways. Expressed by CD4+ type 17 helper cells and Tc17 cells, IL17 is also produced by several innate immune cells. IL17RA is the common subunit for all of the IL17 receptors and IL17 signalling is moderated by the restricted expression of IL17RC to non-hematopoietic epithelial and mesenchymal cells. Unrestrained IL17 signalling is associated with autoimmune diseases and cancer progression, but it is also crucial for protection from fungal and bacterial infections, including the commensal Candida albicans and Klebsiella pneumoniae. IL17 is also thought to play a dominant protective role in maintaining intestinal barrier integrity. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
