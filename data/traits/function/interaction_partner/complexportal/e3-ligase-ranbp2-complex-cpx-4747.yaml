identifier: ComplexPortal:CPX-4747
label: "E3 ligase (RANBP2) complex"
definition: >-
  SUMOylated E3 ligase complex that takes part in the termination of CRM1-mediated export by facilitating the hydrolysis of GTP by RAN (P62826), resulting in export complex disassembly. The subunit RANBP2/NUP358 links the E3 ligase complex to the Nuclear Pore Complex (CPX-873). SUMOylation, mediated by the enzymatic activity of RANBP2, might play a role in the directionality of nucleo-cytoplasmic transport through the nuclear pore. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
