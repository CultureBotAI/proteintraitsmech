identifier: ComplexPortal:CPX-7666
label: "LINC complex, SUN2-KASH5 variant"
definition: >-
  Forms immediately below the outer nuclear membrane and traverses the nuclear envelope to mechanically couple cytoskeletal and nuclear components across the nuclear envelope, allowing the transmission of force. KASH5 binds to the dynein motor and through this with the microtubule network. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
