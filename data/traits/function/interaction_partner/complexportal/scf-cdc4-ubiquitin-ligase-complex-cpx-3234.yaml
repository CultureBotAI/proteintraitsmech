identifier: ComplexPortal:CPX-3234
label: "SCF-Cdc4 ubiquitin ligase complex"
definition: >-
  SCF-Cdc4 is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, in which the F-box protein, Cdc4, forms the substrate recognition subunit. It is required for both G1/S and G2/M cell cycle transitions, when it ubiquitinates and targets to degradation its substrates such as SIC1, FAR1, CLN1/2 and CLB6. The active complex may be a homodimer. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
