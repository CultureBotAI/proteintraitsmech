identifier: ComplexPortal:CPX-3179
label: "Slx5-Slx8 SUMO-targeted ubiquitin ligase (STUbL) complex"
definition: >-
  The Slx5-Slx8 complex is a heterodimeric ubiquitin ligase (E3) that recognizes sumoylated proteins and causes the transfer of ubiquitin from an E2 to its target, attaching polyubiquitin chains to it. The complex has DNA-binding activity and is involved in various cellular processes, including targeting poly-sumoylated proteins for degradation; DNA damage repair and genome stability. The complex is localized to the nucleus and has been implicated in protein quality control of nuclear proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
