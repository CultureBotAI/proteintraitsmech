identifier: ComplexPortal:CPX-1318
label: "WHI2-PSR2 phosphatase complex"
definition: >-
  Protein phosphatase complex required for full activation of the general stress response, possibly through the dephosphorylation of MSN2 (P33748). MSN2 is a transcription factor which binds to cis-acting STREs (stress response elements) in the promoter regions of many stress-responsive genes, and activate their transcription. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
