identifier: ComplexPortal:CPX-3381
label: "Egg-3/4/5 MBK-2 complex"
definition: >-
  Pseudophosphatase complex required for oocyte-to-zygote transition. Components of the complex sequester and modulate the kinase activity of mbk-2 before and during the early phases of meiosis to regulate oocyte maturation and egg activation. The complex localises to the cortex of the oocyte before the meiotic divisions and it is retained there during the early meiotic divisions. The inactive phosphatases egg-3, egg-4 and egg-5 are required for the cortical localisation of mbk-2. In particular, egg-3 acts as scaffold to tether mbk-2, egg-4 and egg-5 to the oocyte cortex, and thus restricts mbk-2 activity to the cortex during meiosis I. egg-4 and egg-5 bind to mbk-2 and inhibit its kinase activity. egg-3 does not affect mbk-2 activity. During anaphase of meiosis I, egg-3 relocalises to the cytoplasm and is targeted for degradation by the Anaphase Promoting Complex/Cyclosome (CPX-3382). This releases mbk-2 from the complex to modify the oocyte proteins required after meiosis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
