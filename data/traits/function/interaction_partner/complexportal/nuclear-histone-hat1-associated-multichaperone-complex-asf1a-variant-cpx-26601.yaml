identifier: ComplexPortal:CPX-26601
label: "Nuclear histone-HAT1-associated multichaperone complex, ASF1A variant"
definition: >-
  Type B histone acetyltransferase (HAT-B)-containing multichaperone complex capable of acetylating both free histones and nucleosomes by transferring an acetyl group from acetyl coenzyme A (CHEBI:15351) to acetyllysine (CHEBI:17752). Required for chromatin assembly following DNA replication. Complex both directly and indirectly influences genome stability and integrity, gene transcription, as well as DNA replication and repair. Complex buffers newly formed soluble H3-H4 dimers accumulated during replication stress, possibly also re-actylating evicted H3-H4 dimers. Both splicing variants of NASP (testicular (tNASP, P49321-1 and somatic (sNASP, P49321-2, part of this multi-chaperone complex) are required to maintain a soluble pool of the H3-H4 dimers during the cell cyle and shield them from degradation by chaperone-mediated autophagy. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
