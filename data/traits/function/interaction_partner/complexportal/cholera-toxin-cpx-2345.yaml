identifier: ComplexPortal:CPX-2345
label: "Cholera toxin"
definition: >-
  A-B type toxin, the key virulence factor responsible for the clinical manifestations (watery stools, vomiting) of cholera. The toxin binds to the ganglioside GM1 of the intestinal epithelium leading to endocytosis by the cell. ctxA1 catalyzes the ADP ribosylation of members of the signaling protein family guanine nucleotide-binding protein G(s) subunit alpha which results in activation of adenylate cyclase..This increases intracellular cAMP levels, which in turn causes an imbalance in electrolyte movement in the epithelial cell. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
