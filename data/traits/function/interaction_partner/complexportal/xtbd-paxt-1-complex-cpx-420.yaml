identifier: ComplexPortal:CPX-420
label: "xtbd-paxt-1 complex"
definition: >-
  5'-3' exonuclease complex that maintains the steady-state concentration and turnover of microRNAs (miRNA) by degradation of mature miRNA. Paxt-1 stabilizes and enhances the activity of xrn-2 within the complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
