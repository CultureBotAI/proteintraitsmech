label: "7SK small nuclear ribonuclearprotein"
definition: >-
  Plays a central role in RNA polymerase II elongation control by sequestering positive transcription elongation factor complex b (P-TEFb, CPX-2432) and therefore regulating the availability of active P-TEFb. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
