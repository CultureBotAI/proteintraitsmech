identifier: ComplexPortal:CPX-1953
label: "Replication restart pre-primosome complex priC-rep variant"
definition: >-
  Required for the restart of replication at sites of premature termination of DNA replication which leaves collapsed/abandoned replication forks that would otherwise create double-strand DNA breaks (DSBs) on the next round of replication. Serves to reload the replicative helicase dnaB on sites far removed from the origin of replication in a DNA structure-dependent manner. On replication forks lacking nascent leading and lagging strands priC is sufficient to load DnaB from the DnaB-DnaC complex in the absence of any other restart proteins but appears to require the rep helicase to create single-stranded DNA on the lagging strand for restart pathway progression or to remove nascent lagging strand DNA to enable priC-mediated loading of dnaB. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
