identifier: ComplexPortal:CPX-101
label: "Titin-Telethonin complex"
definition: >-
  The complex between the N-terminus of the giant sarcomeric filament protein titin with the Z-disk ligand, telethonin is believed to anchor titin in the Z-disk of the skeletal and cardiac sarcomere. The extensive interactions between the two proteins indicate that Telethonin provides a 'bridge' that anchors the ends of two different Titin molecules to the Z disk. There is evidence that Telethonin binding to Titin might be essential for the initial assembly, stabilization and functional integrity of the Titin filament and hence important for muscle contraction relaxation in mature myofibrils. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
