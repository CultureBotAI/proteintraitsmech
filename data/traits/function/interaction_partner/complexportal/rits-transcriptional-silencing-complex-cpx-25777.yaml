identifier: ComplexPortal:CPX-25777
label: "RITS transcriptional silencing complex"
definition: >-
  RNAi effector complex. Dcr1 (Q09884)-processed siRNAs bind to the complex where Ago1 endonuclease activity cleaves the passenger strand siRNA forming an effector complex. This then targets specific chromosome regions by sequence-specific interactions involving either siRNA-DNA or siRNA-nascent transcript base pairing. The complex also acts as a platform for binding of Clr4 E3 ubiquitin ligase/methyltransferase complex (CPX-9241) resulting in heterochromatin formation and the RNA-dependent RNA polymerase complex to promote the synthesis of double-stranded RNA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
