identifier: ComplexPortal:CPX-3026
label: "Thrombospondin 5 complex"
definition: >-
  Secreted glycoprotein that functions through its interactions with proteins and proteoglycans, such as collagens, various integrins and fibronectin. May play a role in the structural integrity of cartilage. Acts to stimulate collagen fibrillogenesis, interacting with free collagen I and II molecules, bringing multiple molecules into close proximity, to promote further assembly. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
