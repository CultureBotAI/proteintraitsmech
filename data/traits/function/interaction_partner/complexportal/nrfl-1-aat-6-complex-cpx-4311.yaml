identifier: ComplexPortal:CPX-4311
label: "nrfl-1-aat-6 complex"
definition: >-
  Amino acid transporter complex that is required for the absorption of amino acids in the intestine. nrfl-1 sequesters the amino acid transporter aat-6 to the plasma membrane, where it probably mediates the uptake of the L-enantiomers of various amino acids, including L-glutamate. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
