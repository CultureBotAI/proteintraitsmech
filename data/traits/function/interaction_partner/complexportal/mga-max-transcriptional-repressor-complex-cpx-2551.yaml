identifier: ComplexPortal:CPX-2551
label: "MGA-MAX transcriptional repressor complex"
definition: >-
  Transcriptional repressor which recognizes an E box hexanucleotide DNA consensus sequence 5'-CACGTG-3' located within gene promoters. Antagonises transcriptional activation by MYC family members by competing for available MAX to form heterodimers, competiing with other heterodimers for E-box-binding sites, and also potentially directly repressing bound genes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
