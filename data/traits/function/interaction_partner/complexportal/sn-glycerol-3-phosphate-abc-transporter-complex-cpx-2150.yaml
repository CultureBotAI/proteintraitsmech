identifier: ComplexPortal:CPX-2150
label: "sn-glycerol-3-phosphate ABC transporter complex"
definition: >-
  High affinity glycerol-3-phosphate (G3P) and glycerol-3-phosphocholine (GPC) transporter. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. sn-glycerol-3-phosphate, a degradation product of phospholipids, is utilized as a source of carbon and phosphate under starvation conditions. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
