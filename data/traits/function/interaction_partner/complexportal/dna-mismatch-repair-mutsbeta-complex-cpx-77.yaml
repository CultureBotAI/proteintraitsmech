identifier: ComplexPortal:CPX-77
label: "DNA mismatch repair MutSbeta complex"
definition: >-
  Mismatch repair complex, involved in the recognition and repair of base-base and small insertion/deletion mismatches that appear as a consequence of DNA polymerase errors during DNA synthesis. MutSbeta recognises insertions or deletions loops 1-15 nucleotides as well as DNA with a 3prime single-stranded overhang. Also required for the mutagenic expansion of trinucleotide repeats. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
