identifier: ComplexPortal:CPX-8877
label: "CORVET tethering complex"
definition: >-
  Multisubunit tethering complex involved in early endosomal fusions by cross-linking two membranes, and facilitating the formation of a SNARE complex during fusion. Interacts with Rab GTPase RAB5 (Q9V3I2). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
