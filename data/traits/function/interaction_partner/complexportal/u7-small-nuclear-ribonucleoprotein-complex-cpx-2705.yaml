identifier: ComplexPortal:CPX-2705
label: "U7 small nuclear ribonucleoprotein complex"
definition: >-
  Essential role in histone pre-mRNA splicing. The heteroheptameric complex forms on binding to a conserved Sm site [consensus AU(4-6)G] found in single-stranded regions of U7 snRNA.U7 snRNA is produced in the nucleus by RNA polymerase II and exported to the cytoplasm, where the Sm proteins bind and promote the hypermethylation of the N7-monomethyl guanosine cap at their 5'-ends, to produce the 2,2,7-trimethyl guanosine cap structure. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
