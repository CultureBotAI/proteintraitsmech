identifier: ComplexPortal:CPX-7965
label: "SCF E3 ubiquitin ligase complex, FBXO25 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO25 target proteins include the histone H2A monoubiquitinating the protein at lysine 120 (H2BK120), promoting trimethylation of histone 3 trimethylated at lysine 4 (H3K4). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
