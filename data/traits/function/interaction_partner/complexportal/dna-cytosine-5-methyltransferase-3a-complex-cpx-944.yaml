identifier: ComplexPortal:CPX-944
label: "DNA (cytosine-5)-methyltransferase 3A complex"
definition: >-
  DNA methyltransferase which methylates DNA by a cooperative mechanism via multimerization on DNA forming nucleoprotein filaments. Required for genome-wide de novo methylation, a major epigenetic mechanism that controls gene expression, genomic stability, and cell differentiation. Predominantly occurs at the C-5 position of cytosine within the symmetric CpG dinucleotide, affecting approximately 70-80% of the CpG sites throughout the genome. Also responsible fornon-CpG methylation (mainly CpA ) in oocytes, embryonic stem cells, and neural cells DNA the DNMT3A-3L complex is critical for establishing methylation at major satellite repeats and allele-specific imprinting during gametogenesis. Plays a role in paternal and maternal imprinting and is required for methylation of most imprinted loci in germ cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
