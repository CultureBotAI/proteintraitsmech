identifier: ComplexPortal:CPX-388
label: "Interleukin-12-receptor complex"
definition: >-
  Receptor complex that activates and stimulates proliferation of a wide range of lymphocytes, in particular natural killer cells and T helper 1 (Th1) cells. The IL12 ligand complex (CPX-387) binds the receptors chains Il12rb1 and Il12rb2 which are associated with the kinases Tyk2 and Jak2, respectively. Transphosphorylation of Il12rb2 and the JAK-family kinases initiates the JAK-STAT signaling cascade via phosphorylation and homodimerisation of Stat3/Stat4 (P42227/P42228). This ultimately leads to the activation of transcription of interferon-gamma which, in turn, stimulates production of IL12 leading to a positive regulation loop. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
