identifier: ComplexPortal:CPX-781
label: "NatC N-alpha-acetyltransferase complex"
definition: >-
  N(alpha)-acetyltransferases, NatA (CPX-781), NatB (CPX-782) and NatC, carry out N-terminal acetylation, one of the most common co-translational modifications. Mak3 is the catalytic subunit of NatC. All three subunits are required for NatC activity. NatC substrates are rare but subclasses of proteins with Met-Ile, Met-Leu, Met-Trp, or Met-Phe termini are not acetylated in Mak3 deletion mutants. All three deletion strains showed similar phenotypes, including slower growth on non-fermentable carbon sources at elevated temperature. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
