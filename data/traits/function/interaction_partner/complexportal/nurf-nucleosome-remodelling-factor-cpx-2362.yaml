identifier: ComplexPortal:CPX-2362
label: "NuRF nucleosome remodelling factor"
definition: >-
  ATP-dependent chromatin-remodelling complex with intrinsic nucleosome dependent ATPase activity. Appears to promote ATP-dependent nucleosome sliding and transcription from chromatin templates. NURF binds the nucleosome near the DNA entry sites in an asymmetrical fashion and nucleosome sliding occurs in increments of 10 base pairs. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
