identifier: ComplexPortal:CPX-3968
label: "Mitotic Checkpoint Complex"
definition: >-
  Acts as a crucial surveillance mechanism to ensure faithful chromosome segregation. MCC prevents the onset of anaphase until all chromosomes are properly attached with the spindle microtubules. The checkpoint can be considered as a signal transduction pathway. The activation of the checkpoint is initiated when unoccupied kinetochores or kinetochores lacking tension are detected in the cell. The MCC prevents premature chromosome segregation by inhibiting the APC/C-CDC20 holoenzyme, an E3 ubiquitin ligase responsible for targeting securin (Q9CQJ7/Q3Y5K5) and cyclin B for degradation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
