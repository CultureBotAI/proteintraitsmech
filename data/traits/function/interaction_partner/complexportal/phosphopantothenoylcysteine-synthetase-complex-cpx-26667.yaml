identifier: ComplexPortal:CPX-26667
label: "Phosphopantothenoylcysteine synthetase complex"
definition: >-
  Catalyzes the second step in the biosynthesis of coenzyme A (CoA) from vitamin B5, in which cysteine is conjugated to 4′-phosphopantothenate to form 4′-phosphopantothenoylcysteine. The biosynthesis of CoA from pantothenate involves five universally conserved steps. First, pantothenate is phosphorylated by pantothenate kinases (CPX-26668). In the second step, 4′-phosphopantothenate is conjugated with cysteine by phosphopantothenoylcysteine synthetase (this complex). The resulting intermediate is then converted to 4′-phosphopantetheine by phosphopantothenoylcysteine decarboxylase (see CPX-26563). The final two steps are catalyzed by phosphopantetheine adenylyltransferase (COASY, Q13057), which adenylates 4′-phosphopantetheine to form dephospho-CoA, followed by phosphorylation of dephospho-CoA by dephospho-CoA kinase (also COASY) to yield the final CoA product. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
