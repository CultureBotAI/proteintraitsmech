identifier: ComplexPortal:CPX-10041
label: "Interleukin-18 receptor-ligand complex"
definition: >-
  Proinflammatory cytokine-receptor complex which strongly augments IFNG production (P01579) in synergy with IL12 (CPX-381) from T helper-1 and natural killer cells. Synthesised as a biological inactive precursor upon exposure to intracellular pathogens, proIL18 is stored in the cytoplasm until cleavage by inflammasome-mediated CASP1 (P29466), CASP4 (P49662) or CASP5 (P51878), when it is secreted extracellularly. Mature IL18 initiates signalling by binding IL18R1 and IL18RAP in a step-wise fashion at the immunocyte plasma membrane. Complex formation and heterodimerization of the receptors' Toll/IL-1 receptor domains triggers recruitment of MyD88(Q99836), which initiates downstream signalling through phosphorylation of IRAKs,TRAF6 (Q9Y4K3), and NFKB (P19838) activation. IL18 is tightly regulated at the gene level by CASP1 and at the protein level by IL18BP (O95998), and over-expression of IL18 is associated with several autoimmune diseases including, rheumatoid arthritis, Crohn's diseases and systemic lupus erythematosus. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
