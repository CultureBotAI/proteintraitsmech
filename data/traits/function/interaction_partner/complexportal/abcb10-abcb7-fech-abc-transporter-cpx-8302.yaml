label: "ABCB10-ABCB7-FECH ABC transporter"
definition: >-
  Required for heme biosynthesis, incorporating iron into protoporphyrin IX and may also act as a mitochondrial matrix heme exporter. Also plays a role in cellular iron homeostasis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
