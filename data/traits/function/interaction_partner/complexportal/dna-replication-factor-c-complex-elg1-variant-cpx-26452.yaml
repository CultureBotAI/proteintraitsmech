identifier: ComplexPortal:CPX-26452
label: "DNA replication factor C complex, elg1 variant"
definition: >-
  DNA-dependent ATPase clamp-unloader complex that acts to remove PCNA (Q03392, CPX-547) remaining on DNA after the completion of DNA replication and repair during the S phase of the cell cycle. The complex binds to DNA-loaded PCNA to induce opening of the PCNA ring, leading to the release of ELG1-RFC bound-PCNA. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
