identifier: ComplexPortal:CPX-1799
label: "Integrin alphaIIb-beta3 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Integrin alphaIIb-beta3 is the most abundant surface-expressed integrin (40,000-80,000 copies per platelet) with another pool located in internal membranes and which can be exposed after platelet activation. Receptor for von Willebrand factor, fibronectin, fibrinogen, plasminogen, prothrombin, thrombospondin and vitronectin. It recognizes the sequence R-G-D in a wide array of ligands or H-H-L-G-G-G-A-K-Q-A-G-D-V in the case of fibrinogen gamma chain. Following activation integrin alpha-IIb/beta-3 brings about platelet/platelet interaction through binding of soluble fibrinogen. This step leads to rapid platelet aggregation which physically plugs ruptured endothelial cell surface. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
