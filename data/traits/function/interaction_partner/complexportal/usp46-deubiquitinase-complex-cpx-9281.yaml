identifier: ComplexPortal:CPX-9281
label: "USP46 deubiquitinase complex"
definition: >-
  Deubiquitinase complex responsible for the removal of ubiquitin chains from proteins. The complex appears to be required for the deubiquitination of proteins involved in cell development and cellular signaling. May act as a positive regulator of Wnt signaling by deubiquitylating the cell surface LRP6 (O75581), inhibiting its turnover. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
