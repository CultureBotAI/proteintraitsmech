identifier: ComplexPortal:CPX-2799
label: "CRL4-DCAF4 E3 ubiquitin ligase complex, CUL4A variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF4. The complex is active in controlling cell proliferation, ubiquitinating and targetting the tumour suppressor ST7 (Q9NRC1) for degradation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
