identifier: ComplexPortal:CPX-550
label: "Ndc80 complex"
definition: >-
  Crucial for the stable kinetochore-microtubule attachments that are needed to sustain the centromere tensions involved in achieving proper chromosome alignment in eukaryotic cells, with a role in chromosome alignment and microtubule-dependent control of MAD1/MAD2 and dynein complexes at kinetochores. The Ndc80 complex localizes to kinetochores and acts as direct or indirect kinetochore receptor for Mps1, Mad1, Mad2, Zw10 and Rod. The effects of Ndc80 depletion on the spindle checkpoint range from complete inactivation to sustained activation followed by cell death. This range of effects may be explained by penetrance of depletion phenotype. Ndc80 complex is rod-like with a globular head at each end. Ndc80 and Nuf2 form one head and part of rod and Spc24 and Spc25 form rest of rod and other head. KNL1 (CPX-5644), MIS12 (CPX-5643) and NCD80 form the KMN protein network. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
