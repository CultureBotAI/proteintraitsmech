identifier: ComplexPortal:CPX-9003
label: "20S immunoproteasome complex"
definition: >-
  Multi-enzyme complex that functions as the primary degradation machinery for the selective turnover of surplus or damaged proteins within the cell. Found only in jawed vertebrates, formed upon exposure to inflammatory stimuli such as interferon-gamma (IFN-g) or tumour necrosis factor, the proteolytic activity of the 20S immunoproteasome (20Si) differs from its standard 20S (CPX-8806) counterpart with the constitutive subunits beta-1 (P28072), beta-2 (Q99436), and beta-5 (P28074) replaced by its immune counterparts beta-1i (P28065), beta-2i (P40306), and beta-5i (P28062), respectively. Constitutively expressed in lymphoid tissues at high levels but requires induction by pro-inflammatory cytokines such as IFN-g in non-lymphoid tissues. Has lower caspase-like activity than the standard 20S Proteasome but a higher chymotrypsin-like and trypsin-like activity, resulting in alternative cleavage of proteins, to generate peptides with hydrophobic or basic C-termini, which are preferred by major histocompatibility complex (MHC) class I. Expressed by medullary thymic epithelial cells (mTECs), which contribute to the establishment of self-tolerance in T cells. Implicated in proteasome-mediated generation of CD8+ T cell epitopes thereby expanding the diversity of the epitopes presented by MHC class I molecules through a mechanism known as PCPS (proteasome-catalyzed peptide splicing), with up to one-third of self-peptides presented on the cell surface generated by PCPS . Plays a role in macrophage activation and T-cell differentiation, as well as the differentiation of non-immune cells like skeletal muscle cells, and the preservation of general homeostasis. Implicated in disorders such as cancer, neurodegerative and autoimmune diseases. Immunoproteasome-specific inhibitors targeting beta-5i have demonstrated some success at the pre-clinical stage for the treatment of diseases such as colitis, colitis-associated cancer and rheumatoid arthritis. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
