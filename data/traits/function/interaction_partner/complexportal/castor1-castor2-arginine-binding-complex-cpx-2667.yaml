identifier: ComplexPortal:CPX-2667
label: "CASTOR1-CASTOR2 arginine binding complex"
definition: >-
  Interacts with GATOR2 to negatively regulate mTORC1 activity. Binding of arginine to CASTOR1, leads to the disruption of the interaction between CASTOR1 and the GATOR2 complex (CPX-6227), allowing GATOR2 to plays its role as a positive regulator of the mTORC1 pathway. CASTOR2 constitutively associates with GATOR2 and does not bind arginine. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
