identifier: ComplexPortal:CPX-696
label: "PRMT5 methylosome complex, CLNS1A variant"
definition: >-
  Type II arginine methyltransferase which dimethylates substrate proteins by catalyzing a 2-step transfer of 2 methyl groups from 2 S-adenosyl methionine (SAM) cofactor molecules to substrate arginine residues. CLNS1A recruits the complex to subunits of the spliceosome, SmB/B (P14678), SmD1 (P62314), and SmD2 (P62316), and ribosomal proteins, LSM4 (Q9Y4Z0), LSM10 (Q969L4) and LSM11 (P83369), for methylation thus regulating cellular splicing activity and the formation of RNA processing bodies. Binding to CHTOP (Q9Y3Y2) recruits the methylosome complex to selective sites on the chromosome, where it methylates Histone H4 Arg-3 and activates transcription. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
