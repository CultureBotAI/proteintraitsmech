identifier: ComplexPortal:CPX-6178
label: "FCN2-MASP1 lectin-protease complex"
definition: >-
  Calcium-dependent pattern-recognition receptor and serine protease complex of the lectin pathway (LP) of complement activation. Activates the LP by binding sugar moieties and acetyl groups of pathogen-associated molecular patterns (PAMPs) displayed on microbes via the lectin FCN2 subcomplex. Binds preferentially to heparin, N-acetylglucosamines (GlcNAc), sulfate and phosphate groups as well as DNA. Mainly expressed in liver. MASP1 protease is probably activated by cleavage by a MASP1 from a neighbouring FCN2-MASP1 complex and in turn cleaves and activates MASP2 protease in FCN2-MASP2 complex (CPX-6238) and complement precursor C4 (P0C0L4). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
