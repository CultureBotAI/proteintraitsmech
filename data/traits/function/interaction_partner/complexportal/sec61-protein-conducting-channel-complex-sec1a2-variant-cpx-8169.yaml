identifier: ComplexPortal:CPX-8169
label: "SEC61 protein-conducting channel complex, SEC1A2 variant"
definition: >-
  Translocates hydrophilic polypeptide segments of newly synthesized proteins across the endoplasmic reticulum membrane and integrates hydrophobic transmembrane segments into the membrane for subsequent transport to other subcellular locations via vesicular trafficking. The complex associates with several other molecular machines and enzymes, such as the ribosome, the SEC62-SEC63 complex, and oligosaccharyltransferase complex (CPX-5621/CPX-5622). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
