identifier: ComplexPortal:CPX-26649
label: "Follicle Stimulating Hormone, type 1 receptor complex"
definition: >-
  Gonadotropin-receptor complex. Follicle stimulating hormone (FSH) mediates a diverse range of functions by binding to one of four FSH receptor (FSHR) isoforms. Canonical FSHR (FSHR-1) is expressed on the granulosa cell surface in ovaries and the Sertoli cell surface in testes. FSHR-1 activation leads to dissociation of the heterotrimeric inhibitory G (Gi) protein resulting in Gi-alpha activation of adenylyl cyclase and a consequent elevation in cyclic adenosine monophosphate (cAMP) levels and a consequent increase in steroid production necessary for follicular growth and ovulation in women. The canonical FSHR (FSHR-1) is expressed only in ovarian granulosa and testicular Sertoli cells and its primary function is to participate in follicular development and granulosa cell differentiation. Loss-of-function in the FSH-FSHR pathway is linked to hypogonadism characterized by absent or incomplete sexual maturation by the expected age, as well as amenorrhea-associated ovarian dysgenesis and ovarian cancer. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
