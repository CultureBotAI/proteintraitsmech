identifier: ComplexPortal:CPX-1069
label: "Amyloid-beta protein 40 complex"
definition: >-
  Protein complex involved in modulation of signaling and synaptic function in the brain, predominantly in the cerebral cortex and hippocampus. May have a role in depressing synaptic activity thus preventing excitotoxicity. Influences synaptic plasticity through various receptors, including NMDAR, mGluR and alpha7 nicotinic acetylcholine receptors (CPX-236). Mediates dendritic spine loss leading to decreased synapse density, inhibition of long-term potentiation (LTP), enhancement of long-term depression (LTD), excessive calcium influx and mitochondrial impairment. May affect metal ion homeostasis by celating synaptic copper, zinc or iron ions. Mostly found in the extracellular space with a small proportion occurring as membrane-bound species. Dimers and oligomers of soluble amyloid-beta peptides are the main pathogenic species linked to Alzheimer's disease. Insoluble fibrils and plaques form during the latter stages of the disease. Chaperones, such as alphaB-crystallins or clusterin (P10909), bind to misfolded oligomeric species and form long-lived complexes, thereby preventing both their further growth into fibrils and their dissociation into synaptotoxic dimers. Amyloid-beta peptide may act as transcription factor for its own precursor protein APP and its cleavage enzyme BACE1 (P56817) initiating a positive feedback mechanism that ultimately leads to amyloidogenesis and Alzheimer's disease. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
