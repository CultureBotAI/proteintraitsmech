identifier: ComplexPortal:CPX-1136
label: "HOPS tethering complex"
definition: >-
  Multisubunit tethering complex involved in endo-lysosomal vesicle trafficking and lysosome biogenesis by cross-linking two membranes, and facilitating the formation of a SNARE complex during fusion. Required for the delivery of vacuolar proteins and homotypic fusion of vacuoles and controls the clearance of late endosomes and autophagosomes during heterophagy and autophagy through promoting fusion of these vesicles with the vacuole. Controls homotypic vacuole-vacuole fusion by regulating vesicle docking to the vacuole through its interaction with soluble SNAREs, the GTP-bound form of the Rab protein rab-7 and phosphoinositides. Proposed to be involved in the rab-5-to-rab-7 endosome conversion probably by the sand-1/ccz-1 complex (CPX-1135), and via binding SNAREs and SNARE complexes to mediate tethering and docking events during SNARE-mediated membrane fusion. Functions in late endosomes/lysosomes and during endosome maturation, replaces the early endosome tethering complex CORVET (CPX-1137). A curated stable macromolecular complex (Complex Portal) with 6 subunits.
