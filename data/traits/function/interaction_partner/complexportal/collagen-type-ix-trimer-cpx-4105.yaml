identifier: ComplexPortal:CPX-4105
label: "Collagen type IX trimer"
definition: >-
  Nonfibrillar collagen (FACIT) that associate to form a structure that links glycosaminoglycans to type II collagen fibrils. The molecules contain three functional regions. One region comprises one or two triple helical domains and serves for the interaction and adhesion of these molecules to the fibrils. A second region, comprising another triple helical domain, serves as a rigid arm that projects out of the fibril and a third region, which does not include triple helices and may serve for interaction with other matrix elements or with cells. The various triple helical domains are separated by short nontriple helical domains (NC domains). Type IX collagen is found in ECMs containing type II collagen as their main fibril-forming structure, such as hyaline cartilage and the vitreous body of the eye. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
