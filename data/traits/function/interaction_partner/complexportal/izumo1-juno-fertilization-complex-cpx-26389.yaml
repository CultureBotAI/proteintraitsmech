identifier: ComplexPortal:CPX-26389
label: "IZUMO1-JUNO fertilization complex"
definition: >-
  Complex formation provides the first known physical link between egg (IZUMO1R/JUNO) and sperm (IZUMO1) as part of the fertilization process, initiating recognition and adhesion of the two gametes and possibly triggering their fusion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
