identifier: ComplexPortal:CPX-2924
label: "Hemoglobin HbA complex, variant HBB2"
definition: >-
  Adult hemoglobin A (HbA) is expressed in erythrocytes in the bone marrow. Binds oxygen in the lungs and transports it to the various peripheral tissues. Transports CO2 from cells back to the lungs. It replaces embryonic haemoglobin zeta-epsilon (CPX-2939) during late pregnancy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
