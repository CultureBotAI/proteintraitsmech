identifier: ComplexPortal:CPX-2311
label: "Polycomb repressive complex 2.1, EZH2-RBBP7-PCL1-PALI1 variant"
definition: >-
  Histone-lysine N-methyltransferase which trimethylates Lys-10 (H3K9me3) and Lys-28 on histone H3 (H3K27me3) leading to transcriptional silencing of genes critical for development and stem cell differentiation. Also mediates mono and dimethylation of H3K27. PRC2 is preferably targeted to CpG islands in cells. EZH2, rather than EZH1, appears to be the main PRC2 methyltransferase and is responsible for the deposition of most H3K27me3 marks. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
