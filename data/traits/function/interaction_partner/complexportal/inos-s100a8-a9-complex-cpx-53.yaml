identifier: ComplexPortal:CPX-53
label: "iNOS-S100A8/A9 complex"
definition: >-
  Stimulus-inducible, S-nitrosylase complex which S-nitrosylates cysteine residues in target proteins, a principal mechanism of nitric oxide (NO)-mediated signal transduction. S100A9 acts both as an adaptor linking NOS2 to its target via protein-protein interaction and as a transnitrosylase that transfers the nitric oxide moiety from NOS2 to its target, via its own S-nitrosylated Cys-3. S100A8 interacts with the target and dictates site-specificity of the S-nitrosylase complex by [I/L]-X-C-X2-[D/E] motif recognition. S100A8 binding induces a conformational change in the target protein and restricts transfer of NO from S100A9 to the motif-associated cysteine. Stimulated by oxidised LDL (CHEBI:60151) and interferon-gamma. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
