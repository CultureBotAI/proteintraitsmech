identifier: ComplexPortal:CPX-2940
label: "MCM complex"
definition: >-
  Essential for 'once per cell cycle' DNA replication initiation and elongation in eukaryotic cells, associates with the origins of DNA replication to form part of the pre-replicative complex. Activation of the MCM complex at origins by cyclin-dependent kinases and the Cdc7 protein kinase leads to initiation of DNA synthesis. MCM2-7 complexes unwind the double stranded DNA at the origins, recruit DNA polymerases and initiate DNA synthesis. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
