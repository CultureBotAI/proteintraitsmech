identifier: ComplexPortal:CPX-7942
label: "PHO transcriptional repressor complex, PHOL variant"
definition: >-
  Polycomb group protein complex which binds Polycomb Response Elements (PREs) in the promoters of specific genes, for example HOX genes, and represses transcription. Recruits additional proteins to form higher-order polycomb repressive complexes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
