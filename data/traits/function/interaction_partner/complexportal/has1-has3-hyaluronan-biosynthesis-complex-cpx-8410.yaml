identifier: ComplexPortal:CPX-8410
label: "HAS1-HAS3 hyaluronan biosynthesis complex"
definition: >-
  Glycosyltransferase required for the elongation of hyaluronan, a glycosaminoglycan present in the pericellular and extracellular matrix. Has enzyme complex catalyze the alternating transfer of UDP-alpha-D-glucuronate(3-) (CHEBI:58052) in beta 1-3 linkage to N-acetylglucosamine and UDP-N-acetyl-alpha-D-glucosamine(2-) (CHEBI:57705) in beta 1-4 linkage to glucuronic acid. The combination of HAS enzymes and the cellular environment have specific effects on Hyaluronan biosynthesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
