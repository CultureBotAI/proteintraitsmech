identifier: ComplexPortal:CPX-26418
label: "U4/U6 small nuclear ribonucleoprotein complex"
definition: >-
  Small RNA (snRNA) containing complex that is involved in mRNA splicing as part of the spliceosome. U4/6 snRNP complex, an intermediate in the assembly of the spliceosome.The spliceosome executes pre-mRNA splicing through a highly dynamic series of compositional and conformational transitions encompassing assembly, activation, catalysis and disassembly. Spliceosome stages are characterized as E, A, B and remodelling of the pre-catalytic spliceosome (B complex) into the activated spliceosome (Bact complex) and subsequently, the catalytically activated spliceosome (B* complex) to carry out two RNA-catalysed transesterification reactions that lead to intron removal and splicing together of the flanking exon sequences. PRP24 (P49960) functions as a snRNP recycling factor to re-anneal U4 and U6 snRNAs in Saccharomyces cerevisiae (CPX-24). SART3 (Q15020) the PRP24 orthologue in humans, is thought to associate with U6 and U4/U6 snRN during the recycling phase of the spliceosome cycle but it dissociates during the formation of the U4/U6.U5 tri-complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
