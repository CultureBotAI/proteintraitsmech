identifier: ComplexPortal:CPX-1885
label: "NineTeen complex"
definition: >-
  Required for spliceosome activation, associates with the spliceosome after the release of U1 and U4 to stabilize the association of U5 and U6 with the spliceosome. The NTC plays an important role in promoting or stabilizing high-specificity interactions between U6 and the 5' splice site and between U5 and the exon sequence at the splice junctions after U1 and U4 have dissociated. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
