identifier: ComplexPortal:CPX-5285
label: "McrBC 5-methylcytosine-specific restriction endonuclease complex"
definition: >-
  A DNA endonuclease that acts as an antiphage defense system by specifically cleaving invading DNA that are methylated. McrBC specifically cleaves DNA containing the recognition sequence 5prime-G/A(5mC)-3prime, where 5mC can be 5-methylcytosine, 5-hydroxymethylcytosine, or 4-methylcytosine. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
