identifier: ComplexPortal:CPX-18972
label: "ADAM23-LGI1 synaptic receptor complex"
definition: >-
  Synaptic organizing complex which regulates excitatory synaptic transmission and neuronal excitability in the brain. ADAM23 acts as a negative regulator of Kv1.1 currents, removing LGI1 from the axon initial segment (AIS), and appears to have a role in neurite outgrowth. In contrast, ADAM22 is positively regulated by LGI1 (CPX-21307), promoting Kv1.1 currents, and is enriched at the AIS. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
