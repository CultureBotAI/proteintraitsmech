identifier: ComplexPortal:CPX-3949
label: "Glycine cleavage system complex"
definition: >-
  Multienzyme complex that catalyses the reversible oxidation of glycine, yielding carbon dioxide (CO), ammonia (NH3), 5,10-methylenetetrahydrofolate and a reduced pyridine nucleotide. The 1-carbon units thus generated are used in the synthesis of purines, histidine, thymine, pantothenate, and methionine and in the formylation of the aminoacylated initiator fMet-TRNAfMet required for translation initiation. gcvP binds the alpha-amino group of glycine through its pyridoxal phosphate cofactor; CO2 is released and the remaining methylamine moiety is transferred to the lipoamide cofactor of gcvH, which is bound to the P protein prior to decarboxylation of glycine. gcvT catalyzes the release of NH3 from the methylamine group and transfers the remaining C1 unit to tetrahydrofolate, forming 5,10-methylenetetrahydrofolate. lpdA then oxidizes the lipoic acid component of the H protein and transfers the electrons to NAD+, to form NADH . A curated stable macromolecular complex (Complex Portal) with 4 subunits.
