identifier: ComplexPortal:CPX-3089
label: "EFF-1 complex"
definition: >-
  Cell-cell fusion complex. EFF-1 prefusion monomers cluster at the surface of adjacent cells. Parallel EFF-1 interactions occur across cells and a third monomer, which can come from either cell, adds on to make an intermediate, extended trimer. The EFF-1 trimer then serves as a scaffold for zippering up the extracellular domains, bringing the transmembrane segments into close proximity such that they can continue zippering two membranes into one. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
