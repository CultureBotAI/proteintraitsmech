identifier: ComplexPortal:CPX-4321
label: "Dipeptide ABC transporter complex"
definition: >-
  D,D-dipeptide transporter that imports D-alanyl-D-alanine for use as an energy source under starvation conditions, ensuring that this is a a component of peptidoglycan that can be recycled by the cell. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. Thought to have evolved from the general dipeptide (Dpp) transporter complex (CPX-4345),. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
