identifier: ComplexPortal:CPX-3762
label: Apoptosome
definition: >-
  A protease complex that cleaves loops in pro-Caspase-3 (P42574) and pro-Caspase-7 (P55210) in an ATP-dependent manner to create active caspases (CPX-970 and CPX-2862) that execute the death program. Its formation is triggered by the release of Cytochrome c (P99999) from the mitochondria in response to intrinsic cell death stimuli. When released, Cytochrome c binds to APAF1 in a 1:1 stoichiometry to trigger nucleotide exchange and stepwise assembly of a heptameric structure. Pro-Caspase-9 is then recruited to form a multimeric Apaf1-Cytochrome c - pro-Caspase-9 complex. Once recruited, pro-Caspase-9 undergoes auto-cleavage resulting in two subunits: p35 and a p10. This step leads to the formation of a proteolytically active Apoptosome. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
