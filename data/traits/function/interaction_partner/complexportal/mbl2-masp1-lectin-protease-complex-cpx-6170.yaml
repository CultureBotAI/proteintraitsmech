identifier: ComplexPortal:CPX-6170
label: "MBL2-MASP1 lectin-protease complex"
definition: >-
  Calcium-dependent pattern-recognition receptor and serine protease complex of the lectin pathway (LP) of complement activation. Activates the LP by binding sugar moieties of pathogen-associated molecular patterns (PAMPs) displayed on microbes via the lectin MBL2 subcomplex. Binds preferentially to mannose, fucose and N-acetylglucosamine. Also binds to late, but not early, apoptotic cells, as well as to apoptotic blebs and to necrotic cells facilitating their uptake by macrophages. MASP1 protease is probably activated by cleavage by a MASP1 from a neighbouring MBL2-MASP1 complex and in turn cleaves and activates MASP2 protease in MLB2-MASP2 complex (CPX-6203) and complement precursor C4 (P0C0L4). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
