identifier: ComplexPortal:CPX-8935
label: "CRL3 E3 ubiquitin ligase complex, KBTBD6-KBTBD7 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate.CRL3-KBTBD6/7 target proteins include TIAM1 (Q13009), a RAC1-specific guanine exchange factor which controls actin rearrangements and cell motility. Recruitment of the complex to the plasma membrane is dependent on member of the GABARAP protein family. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
