identifier: ComplexPortal:CPX-26503
label: "Spastizin-spatacsin complex"
definition: >-
  Essential in the formation of lysosomal tubulation and autophagic lysosome reformation. Binds to the AP-5 adaptor complex (CPX-5181) to drive membrane remodelling of auto-lysosomal tubules. ZFYVE26 is thought to be required for SPG11 localization to the late endosome and lysosome membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
