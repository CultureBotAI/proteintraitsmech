identifier: ComplexPortal:CPX-1974
label: "Nitrate reductase A complex"
definition: >-
  Inducible nitrate reductase complex involved in electron transport during anaerobic respiration: electrons are passed from the formate dehydrogenase-N (Fdh-N) complex (CPX-1975) to the nitrate reductase complex via a quinone-quinol redox reaction. Within Nitrate redctase A, the distal heme molecule of NarI receives electrons from quinol (hydroquinone), passes them on to the proximal heme which passes it down a Fe-S cluster chain to the molybdopterin cofactor Mo-bisMGD where nitrate is reduced to nitrite. The collaboration of these two complexes contributes to the proton motive force: electrons are ultimately donated to Fdh-N by formate in the periplasm, transported to the cytoplasm and accepted by nitrate. Hydrogen ions are transported in the opposite direction: Quinone is reduced to quinol by cytoplasmic protons which are in turn released into the periplasm when quinol is oxidized to quinone. Expression of the thenarGHJI operon isinduced by nitrate. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
