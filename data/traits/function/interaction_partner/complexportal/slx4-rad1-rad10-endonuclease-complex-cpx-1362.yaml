identifier: ComplexPortal:CPX-1362
label: "SLX4-RAD1-RAD10 endonuclease complex"
definition: >-
  Endonuclease, which cuts branched DNA structures at the transition between dsDNA and ssDNA. Required for the repair of double-stranded breaks flanked by direct repeat sequences (boxes) which can occur by single-strand annealing), if a 5-prime to 3-prime resection is allowed to progress past the repeats. The complementary single-stranded repeats can anneal, leaving heterologous flaps to be removed by the RAD1–RAD10 endonuclease, before gap-filling and ligation completes the repair thereby deleting one of the repeats and the intervening sequence. SLX4 functions as a scaffold, following phosphorylation by MEC1 (P38111) or TEL1 (P38110), and may participate in proper positioning of RAD1-RAD10 or directing proper assembly/disassembly of one or more tail removal proteins, such as SAW1 (P39735), at 3-prime tailed intermediates. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
