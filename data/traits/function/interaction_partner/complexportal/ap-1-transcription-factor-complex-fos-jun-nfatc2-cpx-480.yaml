identifier: ComplexPortal:CPX-480
label: "AP-1 transcription factor complex FOS-JUN-NFATC2"
definition: >-
  Member of the AP-1 transcription factor family which assemble through the homo- or hetrodimerization of proteins containing a characteristic bZIP domain (basic region leucine zipper). Regulates DNA transcription and gene expression of many immuno-response genes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
