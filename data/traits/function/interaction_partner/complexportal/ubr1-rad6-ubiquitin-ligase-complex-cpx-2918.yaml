identifier: ComplexPortal:CPX-2918
label: "UBR1-RAD6 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex. Polyubiquitinates proteins containing unacetylated N-terminal residues causing their subsequent degradation by the proteasome as part of the Ac/N-End Rule pathway. Recognizes unacetylated N-terminal methionine if it is followed by a hydrophobic residue. Additionally, acts in an N-end rule independent manner as a component of a novel quality control pathway for proteins synthesized on cytosolic ribosomes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
