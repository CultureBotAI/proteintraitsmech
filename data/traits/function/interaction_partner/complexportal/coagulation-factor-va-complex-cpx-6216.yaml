identifier: ComplexPortal:CPX-6216
label: "Coagulation factor Va complex"
definition: >-
  Part of the common blood coagulation pathway. Forms factor Va-Xa complex (CPX-6221) that cleaves prothrombin (P00734) by limited proteolysis to form thrombin (CPX-6222) and contributes to factor VIIa-TF complex (CPX-2808) activation. The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form is activated by minor proteolysis by thrombin leading to a positive feedback cycle of factor Va and thrombin activation. Inhibited by Active Protein C (CPX-6224) and SERPINA5 (P05154). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
