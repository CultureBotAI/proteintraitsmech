identifier: ComplexPortal:CPX-682
label: "Exon junction core complex, MAGOHB variant"
definition: >-
  Plays a role in translation, surveillance and localization of the maturing mRNA molecules. Deposited by spliceosomes at a conserved position of a pre-messenger RNA strand located upstream of exon junctions formed during RNA splicing. The EJC remains stably bound at this position as the mature messenger ribonucleoprotein particle is exported to the cytoplasm, potentially promoting export through its close association with the TREX complex. Binds RNA primarily through EIF4A3, a sequence-independent DEAD box protein that grasps RNA stably only when associated with its partners, RBM8A/Y14 and MAGOHB which inhibit the DEAD-box protein EIF4A3 ATPase activity, trapping the ATP-bound EJC core onto spliced mRNA in a stable conformation. The EJC core serves as a binding platform for additional factors which together then interface with numerous machineries controlling mRNA export, translation, and decay. Discriminates between premature and normal translation termination events by providing architectural information regarding the position of (former) introns. When translation terminates on an mRNA upstream of at least one EJC, UPF3 (Q9H1J1/Q9BZI7) and its cofactors UPF1 (Q9H1J1) and UPF2 (Q9HAU5) orchestrate a series of events that destabilize the message by a process known as nonsense-mediated mRNA decay (NMD). Also enhances translation of newly synthesized mRNAs through interactions between POLDIP3 (Q9BY77) and activated S6-kinase. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
