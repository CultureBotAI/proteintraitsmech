identifier: ComplexPortal:CPX-3342
label: "Seipin complex"
definition: >-
  Required for resulating the size, morphology and content of lipid droplets. Acts to stabilize the contact points between the endoplasmic reticulum and lipid droplet, preventing the equilibration of the two membrane systems and establishing a diffusion barrier. The complex modulates the balance between neutral lipid and phospholipid synthesis and appears to affect the distribution of enzymes involved in phosphatidic acid to diacyl glycerol conversion. Mutations in human seipin cause lipodystrophy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
