identifier: ComplexPortal:CPX-2133
label: "Spermidine N(1)-acetyltransferase complex"
definition: >-
  Regulates polyamine concentration in the cell. Transfers an acetyl group from acetyl-coenzyme A to an N-terminal amino group of intracellular spermidine forming N(1)- and N(8)-acetylspermidine.This transformis spermidine into a less toxic form that can be easily exported from or kept within the cell. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
