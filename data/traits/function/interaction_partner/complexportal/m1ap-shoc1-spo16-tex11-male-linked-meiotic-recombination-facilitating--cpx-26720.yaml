identifier: ComplexPortal:CPX-26720
label: "M1AP-SHOC1-SPO16-TEX11, male-linked meiotic recombination facilitating complex"
definition: >-
  Complex promotes crossover formation and meiotic progression in males. Disruption of M1AP leads to a reduced number of recombination intermediates and class I crossover which in turn results in meiotic metaphase I arrest and impairs male fertility; indeed, loss-of-function of any of the complex components leads to meiotic arrest and male infertility. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
