identifier: ComplexPortal:CPX-5980
label: "Phosphatidylinositol 3-kinase complex class IA, p110delta/p85beta"
definition: >-
  Uses 1-phosphatidyl-1D-myo-inositol 4,5-bisphosphate/PI(4,5)P2 (CHEBI:18348) as a substrate to generate the product 1-phosphatidyl-1D-myo-inositol 3,4,5-trisphosphate/PI(3,4,5)P3 (CHEBI:16618) which initiates major signaling pathways downstream. Performs a central role in cellular signaling, mediating responses to growth factors and extracellular stimuli. Expressed predominantly in leukocytes, where it mediates immune responses. Gain-of-function mutations in the phosphoinositide 3-kinase (PI3K) genes PIK3CD and PIK3R1 can cause a combined immunodeficiency syndrome, referred to as activated PI3Kdelta syndrome (APDS). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
