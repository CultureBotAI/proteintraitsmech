identifier: ComplexPortal:CPX-2469
label: "Multiaminoacyl-tRNA synthetase complex"
definition: >-
  Multi-enzyme complex which brings into close proximity 8 cytoplasmic aminoacyl-tRNA synthetases which catalyze ATP-dependent charging of tRNA with cognate amino acids for delivery to the A-site of the ribosome. The function of the assembly is uncertain but may support a processive pathway in which a tRNA cycles from an aminoacyl-tRNA synthetase in the complex to the elongation factor EEF1A1 /2 (P68104/Q05639), then to the ribosome, and back to the multiaminoacyl-tRNA synthetase complex, without requiring a high affinity interaction between the aminoacyl-tRNA synthetase and EEF1A. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
