identifier: ComplexPortal:CPX-2441
label: "DNA replication factor C complex, elg1 variant"
definition: >-
  DNA-dependent ATPase clamp-unloader complex that acts to remove PCNA (P1791, CPX-543) remaining on DNA after the completion of DNA replication and repair during the S phase of the cell cycle. The complex binds to DNA-loaded PCNA to induce opening of the PCNA ring, leading to the release of elg1-RFC bound-PCNA. Role in sister chromatid cohesion, unloading both unmodified and SUMOylated PCNA from DNA following replication. This is a genome-wide process and follows Okazaki fragment ligation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
