identifier: ComplexPortal:CPX-5041
label: "Glutamate synthase [NADPH] complex"
definition: >-
  Glutamate synthase complex that plays a key role in assimilating nitrogen by catalyzing the conversion of L-glutamine and 2-oxoglutarate into two molecules of L-glutamate. One of the glutamate molecules enters back into the cycle, enabling glnA (P0A9C5) to produces glutamine from ammonia, glutamate and ATP, and the other represents net ammonia incorporation. gltBD is active in a low nitrogen evironment, whilst gdhA (P00370) glutamate dehydrogenase activity dominates in high nitrogen conditions. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
