identifier: ComplexPortal:CPX-2934
label: "Hemoglobin Bart's complex"
definition: >-
  Fetal hemoglobin Bart's complex consisting of only four beta-type, gamma chains. It is non-functional, exhibiting neither Bohr effect nor heme-heme cooperativity and is a poor transporter of oxygen. Its formation is usually lethal in utero. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
