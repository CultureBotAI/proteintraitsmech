identifier: ComplexPortal:CPX-8429
label: "ZNT4 proton-coupled zinc antiporter homodimer"
definition: >-
  Proton-coupled zinc ion antiporter which is expressed in the lysosome where it imports Zn2+ from the the cytoplasm into the lysosmal lumen. Expressed in specialized secretory tissues, including the mammary gland where it imports Zn2+ into vesicles for secretion into milk during lactation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
