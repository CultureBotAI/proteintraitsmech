identifier: ComplexPortal:CPX-2091
label: "DNA polymerase alpha:primase complex"
definition: >-
  Initiates DNA replication by synthesizing short RNA primers on the leading and lagging strand templates in a minimum of five steps: template binding, NTP binding, dinucleotide formation, extension to a functional RNA primer, and primer transfer to the POLA catalytic site for elongation into hybrid primers of about 35 nucleotides. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
