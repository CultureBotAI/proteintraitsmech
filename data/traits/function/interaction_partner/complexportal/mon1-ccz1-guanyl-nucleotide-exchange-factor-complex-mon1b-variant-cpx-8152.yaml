identifier: ComplexPortal:CPX-8152
label: "MON1-CCZ1 guanyl-nucleotide exchange factor complex, MON1B variant"
definition: >-
  Guanyl-nucleotide exchange factor complex required to activate the endosomal GTPase RAB7A/B (P51149/Q96AH8). The complex is recruited to endosomal membranes by phosphatidylinositol 3-phosphate and its activation of RAB7 drives RAB5 (P20339/P61020)-to-RAB7 conversion, endosome maturation and fusion with the vacuolar/lysosomal compartment. RAB7 activation additionally causes NPC1 (O15118)-dependent lysosomal cholesterol export. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
