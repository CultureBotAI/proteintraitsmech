identifier: ComplexPortal:CPX-473
label: "TOM40 mitochondrial outer membrane translocase core complex"
definition: >-
  Core cation-selective high-conductance channel of the mitochondrial outer membrane preprotein translocase, through which nuclear-encoded precursor proteins cross the membrane in an unfolded state. Most mitochondrial proteins are synthesized in the cytosol, imported into mitochondria, sorted to one of the four submitochondrial compartments, where they function, and attain their functional native conformation, which is often facilitated by assembly into the membrane or a multiprotein complex. The existance of this core complex may be an artefact of the purification process but yeast cells lacking the receptor subunits (TOM20 and TOM70) are viable and import proteins at a reduced rate into the mitochondria. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
