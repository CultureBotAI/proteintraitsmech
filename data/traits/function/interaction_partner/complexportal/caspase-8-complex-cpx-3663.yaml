identifier: ComplexPortal:CPX-3663
label: "Caspase-8 complex"
definition: >-
  Cysteine protease that specifically cleaves substrates with an aspartic acid residue at the P(1) position and has an optimal recognition motif that incorporates four amino acid residues N-terminal to the cleavage site. Caspase-8 is an initiator enzyme in death receptors induced pathways of which the downstream executioner Caspase-3 (CPX-3803) is a physiological target. It is activated via proteolytic cleavage by the DISC complex. Once activated Caspase-8 cleaves and activates Caspase-3, Caspase-4 (P70343), Caspase-6 (CPX-3944), Caspase-7 (CPX-3947) and Caspase-9 (CPX-3801 and CPX-3824). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
