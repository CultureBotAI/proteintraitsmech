identifier: ComplexPortal:CPX-2728
label: "Anaphase-promoting complex"
definition: >-
  APC, a key regulator of cell cycle progression, is a conserved E3 ubiqutin ligase which facilitates multiubiqutination of cell cycle proteins, including cyclins, so marking them for proteasomal destruction. Generally believed that APC acts as a scaffold that brings E2 enzymes and substrates into close proximity. APC activity is required for metaphase-anaphase transition, mitotic exit, G1 phase and DNA replication. Acts by mediating the ubiquitination and subsequent degradation of target proteins. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
