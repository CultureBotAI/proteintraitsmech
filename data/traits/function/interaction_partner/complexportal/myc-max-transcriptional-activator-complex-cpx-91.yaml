identifier: ComplexPortal:CPX-91
label: "MYC-MAX transcriptional activator complex"
definition: >-
  Proto-oncogenic transcriptional activator recognizing E box hexanucleotides containing the DNA consensus sequence CACGTG within gene promoters. The MYC-MAX heterodimer upregulates gene transcription by interaction with TATA binding protein (TBP, P20226), which in turn upregulates RNA polymerase transcription of the gene. Role in cellular proliferation and division. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
