identifier: ComplexPortal:CPX-26552
label: "U5 small nuclear ribonucleoprotein complex, AAR2 variant"
definition: >-
  A form of the U5 snRNP (CPX-26421), that is mainly found in the cytoplasm. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. AAR2 may play a role in preventing the premature association of the U4/U6 di-snRNP complex (CPX-26418) with pre-U5 snRNP components, and AAR2 is thought to be exclusively associated with U5 snRNPs (this complex) but not with the U4/U6.U5 tri-snRNP (CPX-2391). In man, AAR2 is thought to play a role in the spliceosomal assembly process beyond that of a placeholder to prevent premature assembly of SNRNP200 as in yeast complex (CPX-29, CPX-30); AAR2's ability to impede transition to the next stage of U5 snRNP formation may in turn impede gene expression. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
