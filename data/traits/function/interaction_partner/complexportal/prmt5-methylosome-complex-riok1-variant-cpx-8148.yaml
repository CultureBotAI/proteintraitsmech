identifier: ComplexPortal:CPX-8148
label: "PRMT5 methylosome complex, RIOK1 variant"
definition: >-
  Type II arginine methyltransferase which dimethylates substrate proteins by catalyzing a 2-step transfer of 2 methyl groups from 2 S-adenosyl methionine (SAM) cofactor molecules to substrate arginine residues. RIOK1 recruits nucleolin (P19338) and ribosomal subunit RPS10 (P46783) to the complex for methylation thus regulating ribosome biogenesis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
