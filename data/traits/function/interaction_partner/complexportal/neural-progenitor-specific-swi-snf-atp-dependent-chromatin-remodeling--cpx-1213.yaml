identifier: ComplexPortal:CPX-1213
label: "Neural progenitor-specific SWI/SNF ATP-dependent chromatin remodeling complex, ARID1B-SMARCA2 variant"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. Also targeted to chromatin by phosphatidylinositol-4,5-bisphosphate which promotes the complex binding to actin filaments. The complex additionally interacts with a range of nuclear receptors and the vitamin D receptor (VDR, P11473) via SMARCD subunits. The neural progenitor-specific SWI/SNF complex is critical for self-renewal, maintenance and pluripotency of neural progenitor stem cells by selectively activating or repressing its target genes. In this variant of the complex transcriptional activation is probably driven by the presence of the ARID1B subunit. Removes Polycomb repressive complex 1 and 2 (PRC1 & PRC2) resulting in promoter activation via deubiquitination of H2AK119 and demethylation of H3K27. Activates, among others, transcription of oestrogen-responsive genes, glucocorticoid receptor-dependent genes and genes activating the Notch-signalling pathway. During neural development a switch from a progenitor to a post-mitotic chromatin remodeling mechanism occurs as neurons exit the cell cycle and become committed to their adult state. This process requires a switch of two subunits: ACTL6A is replaced by ACTL6B (O94805) and PHF10 replaced by DPF1 (Q92782) or DPF3 (Q92784) in neuron-specific SWI/SNF complexes. The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. Although similar in function to the embryonic stem cell-specific SWI/SNF complex the composition of the neural progenitor-specific SWI/SNF complexes is more similar to the standard SWI/SNF complexes. It is likely that the two ATPases, SMARCA2/BRM (this complex) and SMARCA4/BRG1 (CPX-1215) do not co-occur in the same complex. SMARCD1 (BAF60A) and SMARCD3 (BAF60C) also may not co-occur. It is not clear yet if DPF2/BAF45D (Q92785) is a member of the neural progenitor-specific SWI/SNF complex. Mutations in several subunits affect tissue and developmental processes such as nervous system and cardiac development and maintenance of pluripotency resulting in tumorigenesis or the development of intellectual disorders. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
