identifier: ComplexPortal:CPX-974
label: "SRCAP chromatin remodeling complex"
definition: >-
  ATP-dependent chromatin remodeling complex that catalyzes the exchange of H2A/H2B for H2A.Z/H2B in nucleosomes, thus regulating transcription of a specific subset of genes. Whether VPS72 and ZNHIT1 are part of the core complex is unclear. The first study (PMID:16634648) to show the histone exchange activity were not able to identify these two proteins in the purified active complex, whereas a previous study (PMID:15647280) purified a complex that contained the two proteins, but showed no functional activity in the exchange assay. A recent study (PMID: 25176633) claimed that the SRCAP complex may also be involved in double strand DNA repair by homologous recombination. However, this was only demonstrated for the SRCAP protein, and not the complex. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
