identifier: ComplexPortal:CPX-5821
label: "Oligosaccharyltransferase complex A"
definition: >-
  Oligosaccharyl transferase (OST) complex that catalyzes the initial transfer of a defined glycan (Glc3Man9GlcNAc2 in eukaryotes) from the lipid carrier dolichol-pyrophosphate to an asparagine residue within an Asn-X-Ser/Thr consensus motif in nascent polypeptide chains, the first step in protein N-glycosylation. N-glycosylation occurs cotranslationally and the complex associates with the Sec61 complex at the channel-forming translocon complex that mediates protein translocation across the endoplasmic reticulum (ER). A curated stable macromolecular complex (Complex Portal) with 9 subunits.
