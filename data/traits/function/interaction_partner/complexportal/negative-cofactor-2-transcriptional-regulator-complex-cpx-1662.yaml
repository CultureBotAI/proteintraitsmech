identifier: ComplexPortal:CPX-1662
label: "Negative cofactor 2 transcriptional regulator complex"
definition: >-
  Represses RNA polymerase II transcription through binding to SPT15/TBP and thereby inhibiting the assembly of the preinitiation complex. The NC2 complex may also mediate transcriptional activation from TATA-driven promoters through association with SPT15/TBP and may form a larger, DNA-dependent, assembly with the Mot1-TBP complex (CPX-1141). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
