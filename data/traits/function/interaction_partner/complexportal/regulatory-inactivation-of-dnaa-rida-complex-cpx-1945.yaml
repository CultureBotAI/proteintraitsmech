identifier: ComplexPortal:CPX-1945
label: "Regulatory inactivation of dnaA (RIDA) complex"
definition: >-
  Regulatory role in DNA replication. dnaA-ATP-hydrolysis at oriC results in replication initiation. Formation of the RIDA complex promotes the hydrolysis of ATP bound to dnaA. The resultant ADP–dnaA is inactive in initiation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
