identifier: ComplexPortal:CPX-6130
label: "TIM23 mitochondrial inner membrane pre-sequence translocase complex, TIM17B variant"
definition: >-
  Major pre-protein translocase in the inner membrane of mitochondria, mediates the translocation of N-terminal, positively charged pre-sequence-containing proteins. TIM50 interacts with incoming pre-sequence-carrying pre-proteins as they reach the trans site of the TOM40 complex (CPX-6121). The pre-sequence translocase-associated motor (PAM) drives the completion of preprotein translocation into the matrix. Proteins in which the charged sequence is followed by a hydrophobic sorting signal are laterally transferred and inserted into the inner membrane. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
