identifier: ComplexPortal:CPX-3091
label: "Aspartate carbamoyltransferase complex"
definition: >-
  Catalyzes the committed step in pyrimidine nucleotide biosynthesis and allosterically regulates the pathway. The enzyme is activated by ATP, inhibited by CTP and can be further inhibited by UTP, although UTP alone has little effect on activity. The catalytic mechanism is ordered, Carbamoyl phosphate binds before aspartate and carbamoyl aspartate leaves before phosphate. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
