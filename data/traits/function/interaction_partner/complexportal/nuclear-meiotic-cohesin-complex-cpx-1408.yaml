identifier: ComplexPortal:CPX-1408
label: "Nuclear meiotic cohesin complex"
definition: >-
  Required for sister chromatid cohesion during meiotic cell division, which enables cells to attach sister kinetochores to microtubules with opposing polarity (bi-orientation) and subsequently resists the tendency of these microtubules to pull chromatids toward opposite spindle poles. Before the commencement of replication, the cohesin complex is loaded onto DNA. The arms of the SMC1/3 molecules embrace the DNA, thereby forming a ring of approx. 40 nm diameter. The head domains of SMC1 and SMC3 are locked together by REC8. Cohesion might be generated as the replication fork passes through the ring, entrapping both sister chromatids inside. At the metaphase to anaphase transition, REC8 is cleaved by separase, thereby opening the lock of the SMC1/3 head domains. The ring opens and sister chromatids can be pulled to opposite spindle poles. REC8 is required to efficiently recruit meiotic axis proteins such as RED1 and evenly distribute these along the meiotic chromosomes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
