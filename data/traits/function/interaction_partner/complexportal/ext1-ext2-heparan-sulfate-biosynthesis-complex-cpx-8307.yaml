identifier: ComplexPortal:CPX-8307
label: "EXT1-EXT2 heparan sulfate biosynthesis complex"
definition: >-
  Glycosyltransferase required for the elongation of heparin sulfate chains, long complex polysaccharides which are attached to a serine residue of a large number of cell surface proteins to form a proteoglycan. Heparin sulfate backbone extension involves the alternating transfer of UDP-alpha-D-glucuronate(3-) (CHEBI:58052) in beta 1-3 linkage to N-acetylglucosamine and UDP-N-acetyl-alpha-D-glucosamine(2-) (CHEBI:57705) in beta 1-4 linkage to glucuronic acid by the enzyme complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
