identifier: ComplexPortal:CPX-2264
label: "NuA4 histone acetyltransferase complex"
definition: >-
  Histone acetyl transferase (HAT) complex involved in transcriptional activation of selected genes. The major acetylation targets are lysines-5, 8, and 12 on nucleosomal H4, K5 and K15 on H2A, histone variants H2AZ and H2AX. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
