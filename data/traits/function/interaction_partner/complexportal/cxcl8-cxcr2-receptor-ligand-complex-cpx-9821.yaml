identifier: ComplexPortal:CPX-9821
label: "CXCL8-CXCR2 receptor-ligand complex"
definition: >-
  Chemotactic receptor complex involved in neutrophil activation. CXCL8 is a member of the ELR+ CXC subfamily of chemokines known to activate neutrophils and dimerise under physiological conditions. CXCL8 mediates its effects through binding to its G-protein coupled receptors, CXCR1 (CPX-9601) and CXCR2 (this complex). CXCL8 is secreted by cells at sites of injury and infection to trigger a transient increase in cytosolic calcium in neutrophils via a GTP-binding protein and chemotaxis through both CXCR1 and CXCR2, but only CXCR1 can mediate phospholipase D activation and respiratory burst. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
