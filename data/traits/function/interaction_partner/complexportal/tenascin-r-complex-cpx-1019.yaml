identifier: ComplexPortal:CPX-1019
label: "Tenascin-R complex"
definition: >-
  A matricellular glycoprotein complex of the extracellular matrix (ECM), and in particularly of the perineuronal net, where it assembles complexes of ECM proteins, glycosaminoglycans and proteoglycans. Almost exclusively expressed by and located on oligodendrocyte and myelin in the central nervous system. Also appears transiently on Schwann cells during peripheral nerve development and at differentiated nodes of Ranvier. Not expressed by astrocytes or fibroblasts but may regulate their adhesion properties. Expression is low in embryos and increases with progression to adulthood but decreases with individual cell differentiation. Regulated by various growth factors and lectins. Regulates cell adhesion, migration and differentiation and neurite outgrowth through domain-specific interactions depending on cell type and developmental context. Positively regulates cell adhesion and differentiation by binding surface sulfatides on O4+ oligodendrocytes. Negatively regulates fibronectin- and integrin-mediated neurite outgrowth and cell adhesion by interacting with contactin-1 (CNTN1/F3, Q12860) or fibronectin FN1 (P02751) itself or by binding cell-surface chondroitin sulfate glycosaminoglycans or gangliosides of oligodendrocyte or their precursors. Oligomerisation negatively affects its inhibitory role on cell adhesion and neural outgrowth. Regulates cell plasticity by regulating secretion of growth factor and cytokines. Induces the generation of GABAergic neurons. Involved in synapse formation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
