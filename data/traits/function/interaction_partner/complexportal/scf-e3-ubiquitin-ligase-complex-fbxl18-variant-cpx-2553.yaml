identifier: ComplexPortal:CPX-2553
label: "SCF E3 ubiquitin ligase complex, FBXL18 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL18 target proteins include the FBXL7 (Q9UJT9) substrate-recognition component of the SCF-FBXL18 E3 ubiquitin ligase complex (CPX-2683) thus potentially regulating apoptosis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
