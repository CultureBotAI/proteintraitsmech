identifier: ComplexPortal:CPX-1909
label: "BBSome complex"
definition: >-
  The BBSome complex is thought to function as a coat complex required for sorting of specific membrane proteins to the primary cilia. The BBSome complex is required for ciliogenesis but is dispensable for centriolar satellite function. This ciliogenic function is mediated in part by the Rab8 GDP/GTP exchange factor (P55258/P61028), which localizes to the basal body and contacts the BBSome. Rab8(GTP) enters the primary cilium and promotes extension of the ciliary membrane. Firstly the BBSome associates with the ciliary membrane and binds to Rab3ip/Rabin8, the guanosyl exchange factor (GEF) for Rab8 and then the Rab8-GTP localizes to the cilium and promotes docking and fusion of carrier vesicles to the base of the ciliary membrane. The BBSome complex, together with the Ltzl1, controls Smo ciliary trafficking and contributes to the sonic hedgehog pathway regulation. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
