identifier: ComplexPortal:CPX-5061
label: "BORC complex"
definition: >-
  Lysosome associated multi-subunit protein complex that promotes lysosome positioning at the cytosolic face of lysosomal membrane through coupling to the small GTPase Arl8b (Q9CQW2). This initiates a chain of interactions that promotes the kinesin-dependent movement of lysosomes toward the plus ends of microtubules in the peripheral cytoplasm. BORC interacts with the Ragulator complex (CPX-4761) to regulate late endosomal/lysosomal size in response to glucose levels. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
