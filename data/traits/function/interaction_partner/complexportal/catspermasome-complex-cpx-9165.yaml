identifier: ComplexPortal:CPX-9165
label: "CatSpermasome complex"
definition: >-
  Sperm-specific cation channel, CatSper mediated Ca2+ signalling initiates the tyrosine phosphorylation cascade thereby controlling sperm motility. Also plays a central role in sperm chemotaxis, and mediates the Ca2+ influx induced by the steroid sex hormone progesterone in human sperm. Defective CatSper function affects migration, possibly preventing sperm reaching the site of fertilization, thereby displaying an infertility phenotype in mice and humans. Deletions of CatSper2 and CatSper epsilon variants c.2394_2399del are associated with CatSper-related male infertility. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
