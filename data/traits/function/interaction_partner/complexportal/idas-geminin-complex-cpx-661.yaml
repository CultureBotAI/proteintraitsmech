label: "IDAS-Geminin complex"
definition: >-
  Required for cell cycle progression, inhibiting the formation of the Cdt1-Geminin complex (CPX-659), thus inhibiting the function of Geminin in DNA replication licensing regulation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
