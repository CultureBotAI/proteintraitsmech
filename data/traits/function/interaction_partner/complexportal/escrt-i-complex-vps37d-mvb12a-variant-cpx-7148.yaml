identifier: ComplexPortal:CPX-7148
label: "ESCRT-I complex, VPS37D-MVB12A variant"
definition: >-
  The ESCRT machinery, consisting of ESCRT-0 (this complex), -I, -II (CPX-2506), -III (CPX-329) and -IV (VPS4A/B complex, CPX-338) has been implicated in membrane scission steps, transforming a single, continuous bilayer into two distinct bilayers, either from within the neck of a vesicle budding away from the cytoplasm or from within a membrane tubule, while segregating cargo throughout the process. Membrane fission processes include: a) the sorting of multivesicular bodies (MVB) in the endocytic pathway; cargoes destined for inclusion into the MVB pathway are covalently modified with ubiquitin, recognized by ubiquitin-binding domains in the early ESCRTs (ESCRT-0, -I, and -II) and sequestered into endosomal microdomains that bud into the endosome as intralumenal vesicles aided by ESCRT-III, b) downregulation of cell-surface receptors, c) repair of plasma membrane wounds, d) abscission of the cellular bridge during cytokineses, d) nuclear envelope sealing by annular fusion and e) budding of virions (especially HIV-1) from the plasma membrane. The ESCRT machinery seems to play an indirect role in the proper functioning of cellular polarity and migration, the miRNA machinery and gene expression regulation. ESCRT-0 binds to and clusters ubiquitinated cargo for delivery into MVBs, and recruits clathrin, ubiquitin ligases, and deubiquitinating enzymes. ESCRT-0 recruits ESCRT-I which engages ESCRT-II to nucleate ESCRT-III polymerization. VPS4A/B complex, also known as ESCRT-IV, disassembles ESCRT-III to recycle its subunits. The ESCRT-III complex facilitates changes in membrane architecture by oligomerizing to form spiral, filament-like tubules, accumulation of which is associated with membrane constriction and fission. Disassembly of ESCRT-III by VPS4A/B may be a required step for fission. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
