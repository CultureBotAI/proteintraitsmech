identifier: ComplexPortal:CPX-6661
label: "HOP2-MND1 recombination assembly factor complex"
definition: >-
  Recombinase cofactor complex that activates both RAD51 (Q06609)- and DMC1 (Q14565)-mediated homologous pairing during homologous recombination. Acts to stabilize the presynaptic filament, a right-handed helical nucleoprotein strand generated by RAD51 and DMC1 from single-stranded DNA derived from the nucleolytic processing of a primary lesion. The HOP2-MND1 complex synergizes with the filament to assemble the synaptic complex, and promotes DMC1-/RAD51-mediated strand exchange between the presynaptic filament and recombining double-stranded DNA to form a D-loop, acting with RAD54L (Q92698), a nucleosome remodeler, to promote homologous pairing with the nucleosomal double-stranded DNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
