identifier: ComplexPortal:CPX-3984
label: "Hsp90-Cdc37 chaperone complex"
definition: >-
  A chaperone complex required for the proper folding, maturation and stabilization of target proteins (mostly signalling protein kinases, some steroid hormone receptors), usually during or immediately after completion of translation. Complex binding also prevents rapid ubiquitin-dependent proteosomal degradation of target proteins. The complex exhibits little ATP hydrolysis activity due to the binding of cdc-37 to daf-21/Hsp90, which inhibits the ATPase of daf-21/Hsp90. However, inhibition may be relieved by the binding of aha-1 to the complex; aha-1 eventually displaces cdc-37 from the complex. The highly conserved, phosphorylated cdc-37 Ser-14 is essential for complex assembly and binding to its target protein. cdc-37-Ser14 is phosphorylated by Casein kinase II/kin-3 (P18334), which in turn is a target of cdc-37 creating a positive feedback loop. cdc-37-Ser14 is de-phosphorylated by pph-5 (Q9NES8) within the serine/threonine phosphatase Hsp90-cdc-37-pph-5 complex (CPX-3983). HSP90/daf-21 does not bind any particular motif but rather associates with intrinsically unstable kinases. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
