identifier: ComplexPortal:CPX-5743
label: "Prohibitin complex"
definition: >-
  Chaperone which is essential for mitochondrial biogenesis and degradation, and for the mitochondrial stress response. Inhibits m-AAA and OMA1 proteases (Q9D8H7) and is recruited to cardiolipin-enriched mitochondrial membranes by STOML2 protein (Q99JB2), resulting in a reciprocal protein stabilization. The stabilization of the PHB complex affects the maturation of cardiolipin (CHEBI:28494) that, in turn, together with the PHB complex, promotes the stabilization of the dynamin-related GTPase OPA1 (P58281) and the formation of a respiratory chain supercomplex. The PHB complex also ensures a correct biogenesis of ATP synthase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
