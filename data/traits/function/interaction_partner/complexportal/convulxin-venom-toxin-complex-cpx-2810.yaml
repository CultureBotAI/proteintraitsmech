identifier: ComplexPortal:CPX-2810
label: "Convulxin venom toxin complex"
definition: >-
  C-type lectin-related protein complex that is a potent platelet agonist acting on glycoprotein VI collagen receptor (GPVI) to induce platelet aggregation. May also activate the NLRP3 inflammasome complex (CPX-4141) in peripheral blood mononuclear cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
