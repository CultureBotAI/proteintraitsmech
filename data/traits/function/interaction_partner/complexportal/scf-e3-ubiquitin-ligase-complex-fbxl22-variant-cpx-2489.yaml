identifier: ComplexPortal:CPX-2489
label: "SCF E3 ubiquitin ligase complex, FBXL22 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL22 target proteins include ACTN2 (P35609) and FLNC (Q14315) suggesting a role in sacomeric muscle contraction and sarcomeric structure. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
