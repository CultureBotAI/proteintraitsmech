identifier: ComplexPortal:CPX-1784
label: "Laminin-523 complex"
definition: >-
  Major component of basment membranes which binds to cells via a high affinity, cell-surface receptor. Role in the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
