identifier: ComplexPortal:CPX-627
label: "Interleukin-15 receptor-ligand complex"
definition: >-
  Transmembrane complex formed on the binding of extracellular interleukin-15 (IL15) to its receptor (IL15R). IL15 binding to the unique high affinity IL15RA and the shared IL2RB and IL2RG subunits results in the assembly of the complete complex, inducing activation of Janus kinases, JAK1 and JAK3, resulting in the phosphorylation of STAT3 via IL2RB and of STAT5 via IL2RG. This causes activation of PI3K/Akt/mTOR and Ras/Raf/MAPK signaling cascades, resulting in an anti-apoptotic program. Other signalling pathways include, PDGFR and IL15/Akt/XBP1 to mediate Natural Killer (NK) cell survival, and the trans-endocytosis of the membrane-associated IL15-IL15RA complex into NK cells, leading to the activation of STAT5 and subsequent induction of proliferation and survival signals. IL15 is a pleiotropic cytokine expressed constitutively by monocytes, macrophages, dendritic cells (DCs), keratinocytes, epidermal skin cells, fibroblasts, various epithelial cells, bone marrow stromal cells, and nerve cells. IL15 binding to IL15R mediates signalling activities including the proliferation of Natural Killer (NK) cells, NK-T cells, CD8+ cytotoxic T cells, memory-T cells, intestinal intraepithelial lymphocytes and large granular lymphocytes. Thought to have a role in respiratory diseases such as sarcoidosis and tuberculosis through its role in Th1-driven-inflammation, IL15 also negatively regulates apoptosis and its anti-tumour potential makes it an attractive target for cancer immunotherapy. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
