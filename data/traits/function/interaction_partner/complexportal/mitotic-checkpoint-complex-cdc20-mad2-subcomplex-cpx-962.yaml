identifier: ComplexPortal:CPX-962
label: "Mitotic checkpoint complex, CDC20-MAD2 subcomplex"
definition: >-
  Acts at the spindle checkpoint, in a surveillance mechanism that mediates a metaphase delay, until all chromosomes are properly attached to the mitotic or meiotic spindle, by sequestering Cdc20, thus preventing the activation of the the ubiquitin ligase activity of the anaphase-promoting complex (CPX-760). This ensures all chromosomes are correctly attached in a bipolar fashion to the mitotic spindle. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
