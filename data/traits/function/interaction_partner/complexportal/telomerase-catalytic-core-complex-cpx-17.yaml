identifier: ComplexPortal:CPX-17
label: "Telomerase catalytic core complex"
definition: >-
  A ribonucleoprotein complex essential for the replication of chromosome termini in most eukaryotes. Catalytic component of the telomerase holoenzyme complex whose main activity is the elongation of telomeres. Acts as a reverse transcriptase that adds simple sequence repeats to chromosome ends by copying a template sequence within the RNA component of the enzyme. Catalyzes the RNA-dependent extension of 3'-chromosomal termini with the 6-nucleotide telomeric repeat unit, 5'-TTAGGG-3'. The catalytic cycle involves primer binding, primer extension and release of product once the template boundary has been reached or nascent product translocation followed by further extension. Overexpressed telomerase results in telomere lengthening which may lead to cell immortalization and cancer cell pathogenesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
