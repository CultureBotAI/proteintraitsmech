identifier: ComplexPortal:CPX-3271
label: "KCNQ1-KCNE1 I(Ks) channel complex"
definition: >-
  A voltage-gated K+ channel that produces the delayed rectifier, slow K+ current (IKs) in cardiac myocytes. IKs is a major repolarization current in the heart that responds rapidly and robustly to sympathetic nervous system stimulation. Binding of beta subunit MinK (KCNE1) modifies the gating properties of the channel: it increases the single channel conductance, slows the rate of activation and removes (or greatly slows) inactivation of KCNQ1 alpha subunits. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
