identifier: ComplexPortal:CPX-1081
label: "RelBE toxin-antitoxin complex"
definition: >-
  Type II toxin-antitoxin (TA) system formed by the toxin (relE), and the antitoxin (relB). TA systems act as effectors of dormancy and persistence, with the toxin causing growth arrest by interfering with a vital cellular process, such as transcription, translation or DNA replication, and the cognate antitoxin neutralizing the toxin activity during normal growth conditions. Free relE toxin is capable of cleaving mRNA during translation at the ribosomal A site, thus inhibiting translation during amino acid starvation (the stringent response). The antitoxin, relB, both binds and inhibits relE by inducing conformational changes in the relE active site. Under conditions of stress the antitoxins are selectively degraded by cellular proteases such as Lon (P0A9M0) and ClpXP (CPX-3176), leaving the toxins to exert their effectsl which result in growth arrest and cell dormancy. Both the antitoxin and, in most cases, the TA complex bind the TA promoter to repress transcription, with TA complexes repressing transcription more efficiently than the antitoxins alone by increasing the co-operativity of antitoxin binding to operators. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
