identifier: ComplexPortal:CPX-1420
label: "Spindle pole body intermediate layer 2 complex"
definition: >-
  Component of the spindle pole body, which is responsible for the nucleation and organisation of microtubules within the cell, thus playing a role in chromosome segregation in mitosis and meiosis and controlling cytoplasmic interphase microtubules. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
