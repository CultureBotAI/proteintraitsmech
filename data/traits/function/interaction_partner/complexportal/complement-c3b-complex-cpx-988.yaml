identifier: ComplexPortal:CPX-988
label: "Complement C3b complex"
definition: >-
  A protein complex of the alternative pathway of complement activation of the innate immune system. Complement C3 precurser is activated by cleavage into C3a and C3b by C3 convertases, either C4bC2a in the classical and lectin pathways or C3(H2O)Bb, C3bBb, C3bBbC3b, C3bBbP or C3bBbC3bP in the alternative pathway. C3b acts as an opsonin and interacts with glycoproteins and carbohydrates on pathogenic or apoptotic target cell surfaces through its reactive thioester moiety. Opsonization of target cells leads to enhanced phagocytosis, lysis of target cells via membrane attack complex (CPX-6159) assembly, clearance of antibody-antigen complexes and upregulation of the adaptive response. Activation of C3b leads to an amplification cascade that generates more C3 convertase, deposits more C3b at the local site and switches C3 convertases to C5 convertases. To protect host cells from inadvertent complement activation the activation of C3b is tightly regulated by either disrupting the C3 convertases or aiding in the proteolytic degradation of C3b. Bacteria and viruses possess C3b proteases to evade the complement response. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
