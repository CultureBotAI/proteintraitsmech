identifier: ComplexPortal:CPX-8841
label: "PA200-20S single-capped proteasome"
definition: >-
  Complex formed upon a 200 kDa proteasome activator (PA200) binding either symmetrically or asymmetrically to the alpha-rings of the multicatalytic constitutive cylindrical 20S core complex (CPX-8806), composed of four heteroheptameric rings, of which the outer two are composed of alpha subunits (1-7) and the inner two of beta subunits (1-7). PA200 binds in an ubiquitin- and ATP-independent manner to either one (single-cap, this complex) or both ends (double-capped, CPX-9063) of the 20S Proteasome, but the efficiency of substrate processing by single and double-capped proteasomes in not known. A nuclear-localized proteasomal regulator, PA200 enhances the 20S proteasome's ability to degrade short peptides, disordered proteins, and PA200-bound inositol phosphates act on acetylated core (AC) histones during DNA repair and replication stress in an ubiquitin-independent manner. Also implicated in mitochondrial fission, turnover of ribosome-related transcription factor Sfp1 and maintaining intracellular glutamine levels. Thought not essential for DNA repair, the PA200 component is more sensitive to DNA damage and PA200-hybrid proteasomes are known to form in response to ionizing radiation. External stimuli and diseases can change a proteasome's composition, thereby affecting the proteasome's substrate specificity and consequently protein homeostasis within a cell. Decreased proteasome activity is linked to neurodegerative disorders and cardiac dysfunction through the accumulation of proteins while, enhanced proteasome activity and induced-expression of certain proteasome components are implicated in muscle wasting conditions and several cancers. A curated stable macromolecular complex (Complex Portal) with 15 subunits.
