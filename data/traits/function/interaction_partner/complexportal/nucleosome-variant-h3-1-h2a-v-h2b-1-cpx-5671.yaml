identifier: ComplexPortal:CPX-5671
label: "Nucleosome, variant H3.1-H2A.V-H2B.1"
definition: >-
  Nucleosomes wrap and compact DNA into chromatin, limiting DNA accessibility to the cellular machineries which require DNA as a template. Histones thereby play a central role in transcription regulation, DNA repair, DNA replication and chromosomal stability. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
