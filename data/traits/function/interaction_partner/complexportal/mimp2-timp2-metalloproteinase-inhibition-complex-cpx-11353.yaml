identifier: ComplexPortal:CPX-11353
label: "MIMP2-TIMP2, metalloproteinase inhibition complex"
definition: >-
  Regulates metalloproteinase activity at the extracellular matrix. TIMP2 regulates MMP2 activity through distinct interactions involving its N- and C-terminal domains. The N-terminal domain binds to the catalytic site of MMP2, inhibiting its enzymatic activity, while the C-terminal domain binds to the hemopexin domain of MMP2 within the cellular activation complex. These interactions are mutually exclusive; one TIMP2 molecule cannot simultaneously bind both the catalytic and hemopexin domains of MMP2. At higher concentrations, TIMP2 inhibits the activation of proMMP-2 (30-109) through two possible mechanisms: by binding to membrane type 1 matrix metalloproteinase (MT1-MMP) via its N-terminal domain and preventing cleavage of the prodomain, or by excess TIMP2 occupying the hemopexin domain of free proMMP2, thereby blocking its integration into the activation complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
