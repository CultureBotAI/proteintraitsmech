identifier: ComplexPortal:CPX-1711
label: "RIX1 complex"
definition: >-
  Required for 3-prime maturation of the 5.8 S rRNA, a late pre-rRNA processing step. May also play an essential role in ATP-dependent maturation and nuclear export of nascent 60S subunits from the nucleoplasm to the cytoplasm. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
