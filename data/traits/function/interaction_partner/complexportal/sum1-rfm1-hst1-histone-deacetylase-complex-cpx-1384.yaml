identifier: ComplexPortal:CPX-1384
label: "SUM1-RFM1-HST1 histone deacetylase complex"
definition: >-
  Histone deacetylase complex which represses the expression of middle sporulation genes during vegetative growth. The histone H3 specific methyltransferase SET1 (P38827) promotes association of the locus-specific SUM1-RFM1-HST1 repressor complex with the middle sporulation element in the promoter region of a subset of genes. Once bound, the complex maintains histone H4 lys-5 in a deacetylated state. The complex is also required for full initiation capacity of ORC-mediated replication initiation at consensus sequence within origins of replication in the genome. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
