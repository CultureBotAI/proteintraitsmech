identifier: ComplexPortal:CPX-2778
label: "CRL4-AMBRA1 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor AMBRA1. The complex is active in the regulation of the transition from G1 to S cell phase, binding and ubiquitinating phosphorylated Cyclin-D (CCND1 (P24385), CCND2 (P30279) and CCND3 (P30281)),. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
