identifier: ComplexPortal:CPX-22
label: "TERT-RMRP complex"
definition: >-
  A ribonucleoprotein complex that has RNA-directed RNA polymerase (RdRP) activity and produces double-stranded RNAs that can be processed into small interfering RNA in a Dicer (Q8R418)-dependent manner. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
