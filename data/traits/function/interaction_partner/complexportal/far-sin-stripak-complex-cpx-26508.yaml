identifier: ComplexPortal:CPX-26508
label: "FAR/SIN/STRIPAK complex"
definition: >-
  Multisubunit protein phosphatase complex which acts as a negative inhibitor of the septation initiative network (SIN)-related Hippo pathway. The SIN is a signaling network consisting of a GTPase and a cascade of kinases assembled at the spindle pole body which promotes cytokinetic ring function and stability. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
