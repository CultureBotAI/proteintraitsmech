identifier: ComplexPortal:CPX-9061
label: "Mitochondrial 2-oxoglutarate dehydrogenase complex"
definition: >-
  Catalyzes the oxidative decarboxylation of alpha-ketoglutarate to succinyl-CoA, NADH and CO2 in the tricarboxylic acid (TCA) cycle. 2-oxoglutarate is decarboxylated by the thiamine pyrophosphate (TPP)-containing E1 OGDH and the resulting 2-succinyl intermediate is transferred to the flexible lipoyl domain of E2 DLST. DLST transfers the succinyl functional group from its lipoyl domain onto CoA-SH generating succinyl-CoA. In a final reaction, the lipoyl domain of DLST is re-oxidized by E3 DLD, a FAD-containing subunit that transfers electrons to NAD+ producing NADH Succinyl-CoA is then converted to succinate by succinyl-CoA synthetase. The enzyme complex thus generates metabolites and reduced electron carriers for oxidative phosphorylation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
