identifier: ComplexPortal:CPX-8904
label: "General transcription factor TFIIIB complex"
definition: >-
  Transcription factor complex required for Pol III transcription complex assembly which transcribes short noncoding RNA genes. Cooperates with TFIIIC (CPX-8903) to recruit Pol III to different types of gene promoters and form the preinitiation complex (PIC). Once assembled upstream of the start site, TFIIIB generates a significant DNA distortion of the class III gene promoter through the SPT15 and BDP1 subunits. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
