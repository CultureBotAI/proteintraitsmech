label: "SIT4-SAP190 phosphatase complex"
definition: >-
  Forms in response to nutrient deprivation, mediates G1 to S cell cycle progression and a number of signaling events controlled by the target of rapamycin TOR signaling cascade including growth, budding, NCR gene expression and Gcn2-regulated translation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
