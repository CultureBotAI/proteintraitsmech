identifier: ComplexPortal:CPX-5701
label: "Kinetochore MIS12 complex"
definition: >-
  Required for normal chromosome alignment and segregation, kinetochore formation during mitosis, proper kinetochore microtubule attachments and for the spindle assembly checkpoint. The complex plays a role in establishing a bipolar spindle-kinetochore interaction by joining kinetochore subunits contacting DNA to those contacting microtubules KNL1 (CPX-5702), MIS12 and NDC80 (CPX-551) form the KMN protein network. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
