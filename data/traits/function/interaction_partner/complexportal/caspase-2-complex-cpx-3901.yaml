identifier: ComplexPortal:CPX-3901
label: "Caspase-2 complex"
definition: >-
  Thiol-dependent aspartate-specific protease complex possessing features of both initiator and executioner caspases and required in stress-induced apoptosis. Genotoxic stress, mitotic catastrophe, heat shock, ER stress or bacterial toxins can stimulate Caspase-2 activation. It is activated by autocatalytic cleavage in the Caspase-2-PIDDosome (CPX-3963). Once activated, it is released from the PIDDosome and induces BID (P70444) cleavage, BAX (Q07813) translocation to mitochondria, subsequent cytochrome c (P62897) release and consequent activation of the apoptotic process. Specifically cleaves substrates with an aspartic acid residue at position P1 and has a preferred cleavage sequence of Val-Asp-Val-Ala-Asp-|-. In addition, Caspase-2 has been reported to be a negative regulator of necroptosis and to be indispensable for correct cell proliferation and genomic stability acting as a potential tumor suppressor factor. Caspase-2 is negatively regulated by phosphorylation at distinct sites (Ser157 and Ser340) during cell division and in nutrient abundance conditions. Also, in response to heat shock, Caspase-2 activity is suppressed by the chaperone HSP90AA1(P07901). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
