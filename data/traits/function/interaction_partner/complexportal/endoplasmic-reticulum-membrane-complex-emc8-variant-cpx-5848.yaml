identifier: ComplexPortal:CPX-5848
label: "Endoplasmic reticulum membrane complex, EMC8 variant"
definition: >-
  Insertase complex required for the post-translational integration of tail-anchored proteins and co-translational insertion of some multi-pass membrane proteins into the endoplasmic reticulum membrane. The complex reduces the energetic cost of insertion by inducing a local thinning of the membrane by approximately 10A, thus decreasing the distance that a substrate's soluble lumenal domain must travel through the hydrophobic bilayer, and also by creating a positively charged patch in the bilayer. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
