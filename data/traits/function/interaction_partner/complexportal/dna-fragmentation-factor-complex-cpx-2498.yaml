identifier: ComplexPortal:CPX-2498
label: "DNA fragmentation factor complex"
definition: >-
  Inhibits the catalytic activity of DFFB, a caspase-activated endo-nuclease that cleaves naked and chromosomal DNA during apoptotic cell death. During protein biosynthesis, DFFA acts as a specific chaperone, helping DFFB to adopt a catalytically competent structure. The complex then translocates into the nucleus, a process that requires cooperation of the nuclear localization signals found at the C-termini of these proteins. When apoptotic stimuli activate effector caspases such as caspase-3 (CPX-970), the DFFA is cleaved at residues 117 and 224, resulting in the dissociation of DFFB. Dissociated DFFB dimerizes, and cleaves chromosomal DNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
