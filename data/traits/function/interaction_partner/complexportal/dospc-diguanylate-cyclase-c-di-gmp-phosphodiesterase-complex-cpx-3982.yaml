identifier: ComplexPortal:CPX-3982
label: "dosPC diguanylate cyclase/c-di-GMP phosphodiesterase complex"
definition: >-
  Oxygen sensor complex that controls the production and removal of cyclic diguanylate (c-di-GMP), a second messenger which is important in the regulation of biofilm production and changes in motility and virulence. The dosCP operon encodes two oxygen sensors that have antagonistic enzyme properties, with dosP being a heme-based c-di-GMP phosphodiesterase and dosC displaying diguanylate cyclase (DGC) activity in response to oxygen availability. dosC contains an N-terminal sensory globin domain that binds heme in an apolar binding pocket and catalyzes the synthesis of c-di-GMP via the condensation of 2 GTP molecules. Binding of O2 to the reduced heme in dosP enhances c-di-GMP phosphodiesterase activity, possibly die to a conformational change which releases catalytic suppression caused by the heme sensor domain. The complex may also be part of a larger ribonucleoprotein assembly which performs oxygen-dependent RNA processing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
