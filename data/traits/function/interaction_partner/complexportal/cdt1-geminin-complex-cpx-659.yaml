identifier: ComplexPortal:CPX-659
label: "CDT1-Geminin complex"
definition: >-
  Regulates DNA replication during the S and G2 phases of the cell cycle. Complex formation inhibits the DNA replication licensing factor CDT1 from initiating a further round of DNA replication, preventing the MCM complex (CPX-2940) from being reloaded to chromatin until the end of mitosis.This maintains genomic stability, ensuring once-per-cell-cycle genome replication. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
