label: "Menin-JUND transcription inhibition complex"
definition: >-
  Transcription inhibitor complex. Menin binds the Jun family transcription factor JUND and blocks JNK kinase-mediated JUND phosphorylation, thereby inhibiting transcriptional activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
