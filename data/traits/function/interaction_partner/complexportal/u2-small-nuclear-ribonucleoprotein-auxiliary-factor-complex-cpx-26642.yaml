identifier: ComplexPortal:CPX-26642
label: "U2 small nuclear ribonucleoprotein auxiliary factor complex"
definition: >-
  Ribonucleoprotein complex that recognizes an consensus AG-dinucleotide at the splice site junction and a preceding polypyrimidine tract and recruits the U2 small nuclear ribonucleoprotein particle (snRNP) of the spliceosome during the removal of intervening sequences (introns) separating protein-coding regions within pre-mRNAs. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
