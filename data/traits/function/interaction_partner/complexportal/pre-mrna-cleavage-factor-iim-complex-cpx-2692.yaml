label: "pre-mRNA cleavage factor IIm complex"
definition: >-
  Required for the activation of the mRNA cleavage and polyadenylation specificity factor complex (CPX-2698), an endonuclease responsible for the 3' end processing of most mRNAs.The cleavage of PSFC additionally requires the cleavage stimulatory factor (CPX-2701/CPX-2703) and RBBP6 (Q7Z6E9),. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
