identifier: ComplexPortal:CPX-26657
label: "SPO11 meiotic recombination initiation complex"
definition: >-
  Catalyzed by SPO11, the complex mediates DNA cleavage to generate double-strand breaks (DSBs) to initiate meiotic recombination. Complex promotes the relaxation of negative and positive supercoiled DNA and DNA decatenation through cleavage and ligation cycles. Mutations in SPO11 cause defects in meiotic recombination. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
