identifier: ComplexPortal:CPX-1090
label: "MukBEF condensin complex"
definition: >-
  Key mediator of chromosome condensation, ensuring chromosomes are efficiently separated during replication and are faithfully segregated into daughter cells. A direct interaction between ParC of Topoisomerase IV (CPX-1104) and MukB leads to a fraction of TopoIV molecules being bound to MukBEF clusters Involved in chromosome condensation and segregation. MukB can stimulate the ability of topoisomerase IV to relax negatively supercoiled DNA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
