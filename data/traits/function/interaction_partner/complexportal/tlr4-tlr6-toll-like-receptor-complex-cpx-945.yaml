identifier: ComplexPortal:CPX-945
label: "TLR4-TLR6 toll-like receptor complex"
definition: >-
  Type I membrane receptor that plays a crucial role in innate immunity by recognizing conserved patterns in diverse microbial molecules including lipoproteins, lipopeptides, lipopolysaccharide, flagellin, and nucleic acids. Initiates innate immune activation of macrophages and microglia.through binding of atherogenic lipids susch as oxidised LDL (CHEBI:60151) or beta-amyloid 42 complex (CPX-1070) to a shared receptor, CD36 (P16671), that provides the proximal signalling event required for TLR4-TLR6 activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
