identifier: ComplexPortal:CPX-2419
label: "Hemoglobin HbA2 complex"
definition: >-
  Adult hemoglobin A2 (HbA2) is expressed in erythrocytes in the bone marrow. Binds oxygen in the lungs and transports it to the various peripheral tissues. Transports CO2 back from the cells to the lungs. It is a minor form and makes up about 2-3% of adult hemoglobins, first appearing in late pregnancy. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
