identifier: ComplexPortal:CPX-3388
label: "Synaptonemal complex"
definition: >-
  Liquid crystalline structure that forms a large scaffold connecting homologous chromosomes from end to end during meiotic prophase I. Required for stabilising chromosome pairing and alignment, and for crossover events and chiasmata formation between homologous chromosome pairs. Once assembly of the complex has been initiated, the ZHP heterodimers zhp-1-zhp-2 (CPX-5801) and zhp-3-zhp-4 (CPX-5802) are recruited to the complex to promote the accumulation of pro-crossover factors at a single recombination intermediate to drive accurate chromosome segregation. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
