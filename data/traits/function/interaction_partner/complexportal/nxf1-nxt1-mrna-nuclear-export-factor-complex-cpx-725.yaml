identifier: ComplexPortal:CPX-725
label: "NXF1-NXT1 mRNA nuclear export factor complex"
definition: >-
  Mediates the export of bulk mRNA through direct interactions with both the mRNA cargo and nuclear pore proteins that contain characteristic phenylalanine-glycine repeating sequence motifs (FG-nucleoporins). Also facilitates the export of unspliced retroviral genomic RNA from simple type-D retro-viruses such as SRV-1 that contains a constitutive transport element (CTE), a cis-acting 2-fold symmetric RNA stem-loop motif. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
