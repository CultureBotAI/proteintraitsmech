identifier: ComplexPortal:CPX-663
label: "TP53-MDM4 transcription regulation complex"
definition: >-
  Transcriptional repressor complex, formation of which inhibits the ability of TP53/p53 to induce cell cycle arrest. The mechanism of action is primarily through the binding of MDM4 binds to the p53 transactivation domain. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
