identifier: ComplexPortal:CPX-2371
label: "TIM8-TIM13 mitochondrial intermembrane space protein transporter complex"
definition: >-
  Facilitates transport of hydrophobic precursors of a distinct subgroup of inner membrane proteins through the aqueous intermembrane space as they exit the TOM40 channel complex (CPX-474) in the outer membrane. Plays a role in the import of a distinct subgroup of inner membrane proteins, functioning as a chaperone to maintain the hydrophobic membrane proteins in an import competent state and escort substrates to the TIM22 insertion complex (CPX-1629), which mediates protein insertion into the membrane. Cross-links to the COOH-terminal domain of the essential import translocase protein TIM23 (P32897) and plays a key role in TIM23 import to the mitochondrial inner membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
