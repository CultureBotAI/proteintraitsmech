identifier: ComplexPortal:CPX-2413
label: "CRL4-DCAF16 E3 ubiquitin ligase complex, CUL4A variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF16. The complex is active in regulating serine biosynthesis, 1-carbon metabolism, and epigenetics by mono-ubiqitinating PHGDH (O43175). This increases PHGDH activity by facilitating tetramer formation, and thus increases the downstream levels of methyl donor S-adenosylmethionine (CHEBI:15414), thereby upregulating cell adhesion gene expression via SETD1A (O15047)-mediated histone methylation. Also mediates ubiquitination and proteasome-dependent degradation of nuclear proteins such a SPIN4 (Q56A73) which interacts with the trimethylated lysine-3 of histone H3 (H3K4me3). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
