identifier: ComplexPortal:CPX-26622
label: "tat-5-mon-2-pad-1, golgi transporter complex"
definition: >-
  Plays a role in endosomal recycling, as well as an important role in regulating lipid asymmetry and inhibiting extracellular vesicle formation. Enables snx-3 (Q9XW41) retromer-mediated endosomal sorting of mig-14 (Q7YWX7), which transports WNT morphogens to the cell surface in developing tissues. Complex is involved in the formation of endosomal carriers that direct mig-14 trafficking from the endoplasmic reticulum back to Golgi, and away from lysosomal degradation. Depletion of pad-1 results in embryonic lethality, whilst depleted tat-5 results in gastrulation defects and embryonic lethality. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
