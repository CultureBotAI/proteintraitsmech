identifier: ComplexPortal:CPX-1946
label: "dnaB helicase complex"
definition: >-
  Homohexameric helicase which participates in initiation and elongation during DNA replication, using the energy of ATP hydrolysis to translocate down the lagging-strand template, splitting two strands apart in advance of the leading-strand replicase, Pol III (CPX-1925). Exhibits DNA-dependent ATPase activity and contains distinct active sites for ATP binding, DNA binding, and interaction with dnaA, dnaC, dnaG (primase), and other prepriming proteins. Two DnaB helicase hexamers are recruited and loaded onto each of the separated single-stranded (ss)DNA strands and unwind DNA bi-directionally away from the replication fork by translocating along and encircling the ssDNA. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
