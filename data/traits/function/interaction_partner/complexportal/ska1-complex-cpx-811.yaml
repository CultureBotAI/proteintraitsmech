identifier: ComplexPortal:CPX-811
label: "Ska1 complex"
definition: >-
  A microtubule-binding subcomplex of the outer kinetochore that is essential for proper chromosome segregation. The Ska1 complex is a direct component of the kinetochore-microtubule interface and directly associates with microtubules as oligomeric assemblies. The complex tracks with depolymerizing microtubule ends and associates with the microtubule lattice and curved protofilaments, and thus facilitates the processive movement of microspheres along a microtubule in a depolymerization-coupled manner. Synergistically enhances the affinity of the Ndc80 complex (CPX-806) for microtubules, which may furthermore allow the Ndc80 complex to track depolymerizing microtubules. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
