identifier: ComplexPortal:CPX-2748
label: "SCF E3 ubiquitin ligase complex, FBXL21 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL21 target proteins include CRY1 (Q16526)/CRY2 (Q49AN0) to which it binds with a higher affinity than does SCF-FBXL3 (CPX-3291). In the nucleus, where both FBXL21 and FBXL3 are present, FBXL21 sequesters CRY proteins from FBXL3 and protects them from FBXL3-induced proteasomal degradation. In the cytosol, where FBXL3 is absent, FBXL21 triggers the slow degradation of CRY1/2 thus playing a role in maintaining circadian clock oscillations. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
