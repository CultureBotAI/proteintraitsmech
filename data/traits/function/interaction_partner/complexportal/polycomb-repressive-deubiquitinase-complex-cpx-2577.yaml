identifier: ComplexPortal:CPX-2577
label: "Polycomb repressive deubiquitinase complex"
definition: >-
  Removes ubiquitin from lysine-119 of Histone 2A (P84051) resulting in the deprepression of developmental genes. Hydrolyses ester, thioester, amide, peptide and isopeptide bonds formed by the C-terminal Gly of ubiquitin in a thiol-dependent manner. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
