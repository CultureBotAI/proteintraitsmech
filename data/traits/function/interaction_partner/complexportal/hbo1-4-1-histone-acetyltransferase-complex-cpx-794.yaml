identifier: ComplexPortal:CPX-794
label: "HBO1-4.1 histone acetyltransferase complex"
definition: >-
  Regulates chromatin modification and structure via histone acetylation. The HBO1 complex is a histone H4-specific acetyltransferase which targets H4K5/8/12 on chromatin and appears to be responsible for the bulk of histone H4 acetylation in vivo. It may also have a reduced activity toward histone H3. The p53 pathway appears to be a main target of the complex, at least in part through direct transcription regulation at the initiation site of p21/CDKN1A. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
