identifier: ComplexPortal:CPX-9141
label: "Silencing factor of the integrated stress response complex"
definition: >-
  E3 ubiquitin ligase complex which silences the cellular response to mitochondrial protein import stress. The complex turns off a general stress response after a specific stress event has been resolved by recognizing bifunctional substrate motifs that equally encode protein localization and degradation. Ubiquitinylates DELE1 (Q14154) a sensor of mitochondrial import stress, and EIF2AK1 (Q9BQI3), a kinase involved in the integrated stress response promoting the degradation of these proteins that actively mediate the cellular response to mitochondrial import stress. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
