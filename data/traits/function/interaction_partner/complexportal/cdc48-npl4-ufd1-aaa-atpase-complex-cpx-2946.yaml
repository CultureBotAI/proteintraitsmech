identifier: ComplexPortal:CPX-2946
label: "CDC48-NPL4-UFD1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Recruited by the integral membrane protein UBX2 (Q04228) and interacts with ubiquitin ligase complexes involved in the endoplasmic reticulum-associated degradation (ERAD) pathway. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
