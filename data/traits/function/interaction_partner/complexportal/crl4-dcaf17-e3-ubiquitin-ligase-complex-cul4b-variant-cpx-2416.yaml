identifier: ComplexPortal:CPX-2416
label: "CRL4-DCAF17 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF17. The complex is potentially active in regulating spermatogenesis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
