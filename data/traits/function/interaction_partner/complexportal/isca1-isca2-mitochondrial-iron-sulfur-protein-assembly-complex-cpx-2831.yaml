identifier: ComplexPortal:CPX-2831
label: "ISCA1-ISCA2 mitochondrial iron-sulfur protein assembly complex"
definition: >-
  Assembles [4Fe-4S] clusters from reductive coupling of two [2Fe-2S] clusters received from GLRX5 complexes (CPX-6862, CPX-6863). The [4Fe-4S] clusters can then be inserted into mitochondrial [4Fe-4S]-requiring proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
