identifier: ComplexPortal:CPX-3071
label: "Inward rectifier potassium channel 2 complex"
definition: >-
  Inward rectifier potassium channel Kir2.1 (coded for by the KCNJ2 gene) plays a key role in maintaining the correct resting potential and action potential duration in eukaryotic cells. The Kir2.1 channel is characterized by a strong inward rectification, in which K+ ions flow preferentially into rather than out of the cell. Their voltage dependence is regulated by the concentration of extracellular potassium; as external potassium is raised, the voltage range of the channel opening shifts to more positive voltages. Inward rectification is produced by cytosolic polyamines and Mg2+ occluding the ion conductance pathway as K+ ions are flowing outward. These positively charged particles are then removed from the pore when K+ ions flow into the cell. Rectification is the primary means of gating for Kir2 channels. In addition to rectification, another common feature of Kir channels is regulation by the membrane phospholipid PIP2. Opening of Kir channels requires PIP2 binding to basic and polar amino acids in the cytoplasmic domains, whereas depletion of PIP2 seems to close the channel. Expressed in brain, heart and skeletal muscle. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
