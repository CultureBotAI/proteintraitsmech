identifier: ComplexPortal:CPX-44
label: "LSM2-8 complex"
definition: >-
  The hetero-heptameric complex of seven Lsm proteins (Lsm2-8) affects the processing of small stable RNAs (including tRNAs, rRNAs) and pre-mRNAs in the nucleus. The complex is part of the U6 snRNA, where it binds to the U6 RNA and contributes to stabilizing the U6 snRNA and chaperoning it through the splicing process. The Lsm2-8 complex is thought to pre-exist in the cell and bind to U6 as a complex. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
