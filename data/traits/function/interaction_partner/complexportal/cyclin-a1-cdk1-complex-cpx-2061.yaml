identifier: ComplexPortal:CPX-2061
label: "Cyclin A1-CDK1 complex"
definition: >-
  Essential for spermatogenesis, essential for passage of spermatocytes into meiosis I. Overexpression enhances S phase entry consistent with an oncogenic function. Complex formation enables substrate binding to the kinase, leads to a rearrangement of the catalytic site and exposes Thr-161 of CDK1 for phosphorylation and subsequent activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
