identifier: ComplexPortal:CPX-1097
label: "C-to-U editosome complex"
definition: >-
  mRNA editing complex that deaminates a CAA (Gln) to an UAA (Stop) codon in the ApoB mRNA in the luminal gastrointestinal tract and liver in healthy individuals, resulting in the generation of a truncated ApoB48 protein (P04114-PRO_0000020751) which mediates the absorption of dietary lipid from the intestine. The complex recognizes, and binds to, an 11-nucleotide mooring sequence downstream of the editing site and, in addition to C to U editing, also protects the edited ApoB mRNA from nonsense-mediated decay. APOBEC1 mediates nucleocytoplasmic shuttling via its respective nuclear localisation and export signals. The editosome binds its target mRNA in the nucleus and retains its edited form during nuclear export, transporting the ApoB48 RNA to the cytoplasm for translation. In neurofibromatosis type I patients the complex deaminates a CGA (Arg) to an UGA (Stop) in the NF1 mRNA. May play a role in the epigenetic regulation of gene expression via APOBEC1's oxidative demetylation activity of 5-hydroxymethylcytosines (5hmCs). The holocomplex contains at a minimum APOBEC1, A1CF and SYNCRIP. HNRNPAB may form a separate complex with APOBEC1. High concentrations of SYNCRIP preferentially bind to A1CF causing abrogation of mRNA editing. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
