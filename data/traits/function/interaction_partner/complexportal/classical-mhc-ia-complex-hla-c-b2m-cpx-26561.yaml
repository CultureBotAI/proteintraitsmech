identifier: ComplexPortal:CPX-26561
label: "Classical MHC Ia complex, HLA-C-B2M"
definition: >-
  Antigen-presenting major histocompatibility complex which presents the bound peptide antigen to CD8+ cytotoxic T-lymphocytes. The complex assembles in the endoplasmic reticulum and is transported to the cell surface. Presents primarily viral and tumor-derived peptides. HLA-C is expressed at relatively low levels on the cell surface and presents antigens less efficiently than HLA-A and -B. Its primary function may be in natural killer cell recognition. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
