identifier: ComplexPortal:CPX-2304
label: "Heat-labile enterotoxin IIB complex"
definition: >-
  Member of the AB class of bacterial toxins. Binds to the ganglioside receptors on epithelial host cells and forms a pore in the host cell membrane, leading to the endocytosis of the A subunit. The A1 chain then ADP-ribosylates the alpha-subunit of the host heterotrimeric G-protein Gs, inducing constitutive activation of the cell’s adenylate cyclase and dramatically increasing the intracellular concentration of the host cAMP (CHEBI:17489) cellular signaling molecule. This originally evolved as a strategy to capture energy from host biological systems but leads to degradation of the host intestinal epithelium, resulting in severe diarrhoea in humans, pigs and bovine species. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
