label: "Polycomb repressive complex 2, Jarid2-jing variant"
definition: >-
  Histone-lysine N-methyltransferase which trimethylates Lys-10 (H3K9me3) and Lys-28 on histone H3 (H3K27me3) leading to transcriptional silencing of genes critical for development. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
