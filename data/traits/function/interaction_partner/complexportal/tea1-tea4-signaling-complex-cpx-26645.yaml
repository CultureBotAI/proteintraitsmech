identifier: ComplexPortal:CPX-26645
label: "Tea1-Tea4 signaling complex"
definition: >-
  Binds to the microtubule plus end by interaction with the Tea2 complex (CPX-26644). Signals from the tip cortex to polarisome proteins which play a role in positioning polarized growth through the formation of actin cables. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
