identifier: ComplexPortal:CPX-1290
label: "Intraflagellar transport complex B"
definition: >-
  IFT particles, composed of the IFT-A (CPX-1289) and IFT-B complexes, enable bidirectional motility along axoneme microtubules essential for the formation (ciliogenesis) and maintenance of cilia that assemble within a membrane projection from the cell surface. Outward or anterograde movement from the cell body to the ciliary tip is powered by kinesin-2 while the inward or retrograde movement back to the cell body is powered by cytoplasmic Dynein-2 motor. May be required for ciliary entrance and transport of specific ciliary cargo proteins such as che-3 (Q19542) which are related to motility. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
