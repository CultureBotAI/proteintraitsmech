identifier: ComplexPortal:CPX-1273
label: "Condensin I-like dosage compensation complex"
definition: >-
  Modulates chromosome and sex-specific gene expression. Binds to the two X chromosomes of hermaphrodites to negatively regulate transcription during interphase, and thus ensures that X-linked gene dosage from the X chromosome is equal to the single X in the XO males. In C.elegans, this complex does not appear to have mitotic function. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
