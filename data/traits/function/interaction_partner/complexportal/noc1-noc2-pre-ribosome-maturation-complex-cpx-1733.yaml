label: "NOC1-NOC2 pre-ribosome maturation complex"
definition: >-
  Associates with 90S and 66S pre-ribosomes and is enriched in the nucleolus. Required for for intranuclear movement and maturation of ribosomal precursor particles. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
