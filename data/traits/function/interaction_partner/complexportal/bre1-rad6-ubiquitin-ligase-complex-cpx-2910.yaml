identifier: ComplexPortal:CPX-2910
label: "BRE1-RAD6 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex. Mono-ubiquitinates the histone H2B residue lysine-123. This provides a specific tag for epigenetic transcriptional activation in addition to modulating the formation of double-strand breaks during meiosis and being a prerequisite for DNA-damage checkpoint activation. Ubiquitination of lys-123 is a prerequisite for the subsequent di- and trimethylation of histone H3 on K4 and K79 which is important for telomeric gene silencing. A BRE1-associated protein, LGE1, is also required for H2B monoubiquitination and may be part of a larger complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
