identifier: ComplexPortal:CPX-1039
label: "COMPASS complex"
definition: >-
  Histone methyltransferase that catalyzes methylation of Lys-4 of histone H3 and thus controls the silencing of telomeric regions. SWD1, SWD3, and SET1 constitute a core of the complex, and the absence of any of these subunits abolishes methylation of lysine 4 on histone H3. Subunits BRE2 and SDC1 are essential for trimethylation and important for mono- and dimethylation by the COMPASS complex. SPP1 is important for trimethylation, while SHG1 plays a minor role in trimethylation. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
