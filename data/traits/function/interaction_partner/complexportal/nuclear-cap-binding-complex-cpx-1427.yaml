identifier: ComplexPortal:CPX-1427
label: "Nuclear cap-binding complex"
definition: >-
  Binds co-transcriptionally to the 5-prime, m7GpppG-cap (m7G-cap) structures of all RNA polymerase II transcripts (pre-mRNAs and pre-miRNAs). Required for processes such as transcription elongation, pre-mRNA splicing through commitment and NELF complexes and spliceosome formation, classic mRNA 3-prime end processing, suppression of poly-A tail formation in histone 3-prime end pre-mRNA processing in complex with serrate (SRRT/ARS2, Q9BXP5) and NELF complex, nuclear export of mRNAs and U snRNAs in complex with importin-alpha and either ALYREF (Q86V81) and TREX complex (mRNAs) or PHAX-XPO1/CRM1-RAN.GTP complex (U snRNAs), degradation of nuclear mRNAs via nonsense-mediated decay (NMD), primary miRNA processing in complex with serrate (SRRT/ARS2), miRNA-mediated RNA interference and the pioneer round of translation. During the pioneer round of translation it interacts with CTIF (O43310) which facilitates the eventual release of CBC from the transcript and its replacement by the cytoplasmic cap-binding complex eIF4F. In the cytosol, importin-beta interacts with CBC-bound importin-alpha and promotes the dissociation of the RNA from CBC. Importin-complex-bound CBC gets reimported into the nucleus for reuse. NCBP1 phosphorylation correlate with increased cap-dependent splicing activity. Histone pre-mRNA processing and the pioneer round of translation may be restricted to mammalian CBC. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
