identifier: ComplexPortal:CPX-26637
label: "Cytoplasmic thioredoxin reductase 1 complex"
definition: >-
  Flavoprotein complex which reduces thioredoxin/TXN (P10599) to its dithiol-containing form. The complex is present in the cytoplasm in various tissues and is involved in the regulation of cellular redox reactions, growth and differentiation. Essential for oxygen radical scavenging to protect cells from radical oxygen species (ROS), and thereby cellular dysfunction. Binding to NADPH, results in the transportation of electrons from NADPH via FAD to the disulfide region in the N-terminal active site, and from there onwards to the C-terminal redox center of the adjacent subunit, where substrate reduction occurs. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
