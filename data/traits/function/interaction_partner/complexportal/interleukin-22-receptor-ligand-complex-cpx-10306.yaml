identifier: ComplexPortal:CPX-10306
label: "Interleukin-22 receptor-ligand complex"
definition: >-
  Transmembrane proinflammatory cytokine receptor complex. Primarily impacts non-hematopoietic epithelial cells and fiborblasts where it has a profound impact on tissue regeneration post injury. IL22 function is regulated by the restricted expression of its receptor, IL22RA1 on epithelial cells and some monoctyic subsets. IL22RA2 (Q969J5), a soluble form of IL22RA1 also binds IL22 and antagonize the effector functions of IL22. IL22 signals through the JAK-STAT pathway, utilizing JAK1/Tyk2 and primarily STAT3, but it can also activate the MAPK pathways. Elevated levels of IL22 expression have been implicated in the pathology of malignancy and psoriasis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
