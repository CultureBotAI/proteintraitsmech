identifier: ComplexPortal:CPX-4962
label: "CyclinY-CDK17 complex"
definition: >-
  Cyclin-dependent serine/threonine-protein kinase complex, which is required to traffic presynaptic components to axons. Regulates the trafficking of synaptic vesicle precursors in DA motor neurons by promoting anterograde trafficking to the axon and preventing dynein-dependent trafficking to the dendrite. May also regulate synaptic vesicle trafficking in DD motor neurons and in RIA interneurons. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
