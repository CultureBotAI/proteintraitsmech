identifier: ComplexPortal:CPX-93
label: "MutS DNA mismatch repair complex"
definition: >-
  Mismatch repair complex, involved in the recognition and repair of base-base and small insertion/deletion mismatches that appear as a consequence of DNA polymerase errors during replication or homologous recombination. Strand recognition necessary for removal of DNA biosynthetic errors from the daughter strand is based on the transient absence of d(GATC) methylation in the newly synthesized DNA strand (hemimethylation). Repair is initiated by the binding of mutS to a mismatch or to a small insertion-deletion loop. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
