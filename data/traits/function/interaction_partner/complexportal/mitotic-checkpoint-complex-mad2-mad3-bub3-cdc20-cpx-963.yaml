identifier: ComplexPortal:CPX-963
label: "Mitotic checkpoint complex, MAD2-MAD3-BUB3-CDC20"
definition: >-
  Acts at the spindle checkpoint in a surveillance mechanism that mediates a delay in the onset of anaphase until all chromosomes are properly attached to the mitotic or meiotic spindle by inhibiting the anaphase-promoting complex (CPX-760), an E3 ubquitin ligase complex required for onset of anaphase. The Mitotic checkpoint complex is a more potent inhibitor of the APC/C than Mad2-Cdc20 alone (CPX-962). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
