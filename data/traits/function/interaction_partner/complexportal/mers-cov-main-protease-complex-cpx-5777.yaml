identifier: ComplexPortal:CPX-5777
label: "MERS-CoV main protease complex"
definition: >-
  The 3C-like protease of the MERS coronavirus required for processing the polyproteins that are translated from the viral RNA. Cleaves at 11 cleavage sites on the large polyprotein 1ab (K9N7C7); the recognition sequence at most sites is [ILMVF]-Q-|-[SGACN]. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
