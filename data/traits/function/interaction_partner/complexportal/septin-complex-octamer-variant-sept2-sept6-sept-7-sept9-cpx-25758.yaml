identifier: ComplexPortal:CPX-25758
label: "Septin complex, octamer variant, SEPT2-SEPT6-SEPT-7-SEPT9"
definition: >-
  Cytoskeletal complex that polymerizes to form filaments. Mediates organization of the cytoskeleton, vesicle transport and fusion, chromosome alignment and segregation, and cytokinesis. Septin complexes also bind and bundle filamentous actin, anchoring and stabilizing actin filaments at the plasma membrane. Septins play wide ranging roles in development and homeostatic biological processes such as cell motility, sperm integrity, neuron development, tissue morphogenesis, and host-pathogen interactions. Septins are thought to play a protective role in stabilizing epithelial and endothelial barriers to limit immune cell exposure during tissue inflammation in response to enironmental pathogens. Mutations in septins have also been implicated in cancer and neurodegenerative diseases. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
