identifier: ComplexPortal:CPX-7922
label: "SCF E3 ubiquitin ligase complex, FBXO9 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO9 target proteins include TELO2 (Q9Y4R8) and TTI1 (O43156) found in TORC1 (CPX-503) and TTT (CPX-6148) complexes thus limiting cell growth and protein translation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
