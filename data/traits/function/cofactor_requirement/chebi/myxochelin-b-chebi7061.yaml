label: "requires myxochelin B"
definition: >-
  The functional requirement for myxochelin B (CHEBI:7061) as a siderophore. A member of the class of benzamides obtained by formal condensation of the 1- and 6-amino groups of hexane-1,2,6-triamine with the carboxy groups from two molecules of 2,3-dihydroxybenzoic acid followed by reduction of the amide carbonyl at position 5 to a hydroxy group.
