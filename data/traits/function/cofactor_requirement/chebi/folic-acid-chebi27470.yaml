identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_27470
label: "requires folic acid"
definition: >-
  The functional requirement for folic acid (CHEBI:27470) as a cofactor (vitamins). An N-acyl-amino acid that is a form of the water-soluble vitamin B9. Its biologically active forms (tetrahydrofolate and others) are essential for nucleotide biosynthesis and homocysteine remethylation.
