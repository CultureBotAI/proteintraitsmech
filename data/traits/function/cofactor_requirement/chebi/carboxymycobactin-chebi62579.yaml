definition: >-
  The functional requirement for carboxymycobactin (CHEBI:62579) as a siderophore. Any one of a class of α-amino acid ester-lactams secreted by, amongst others, Mycobacterium tuberculosis and which are both lipid- and water-soluble and act as siderophores.
