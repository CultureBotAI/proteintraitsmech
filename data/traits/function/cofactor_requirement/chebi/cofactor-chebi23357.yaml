label: "cofactor cofactor class"
definition: >-
  The requirement for a cofactor — a cofactor class. An organic molecule or ion (usually a metal ion) that is required by an enzyme for its activity. It may be attached either loosely (coenzyme) or tightly (prosthetic group).
