label: "requires cobamamide"
definition: >-
  The functional requirement for cobamamide (CHEBI:18408) as a prosthetic group, coenzyme, cofactor. A member of the class of cobalamins that is vitamin B12 in which the cyano group is replaced by a 5'-deoxyadenos-5'-yl moiety. It is one of the two metabolically active form of vitamin B12.
