identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_29707
label: "requires yersiniabactin"
definition: >-
  The functional requirement for yersiniabactin (CHEBI:29707) as a siderophore. A member of the class of thiazolidines that is (4S)-4-methyl-4,5-dihydro-1,3-thiazole-4-carboxylic acid which is substituted at position 2 by a (1S)-1-hydroxy-1-{(4R)-2-[(4R)-2-(2-hydroxyphenyl)-4,5-dihydro-1,3-thiazol-4-yl]-1,3-thiazolidin-4-yl}-2-methylpropan-2-yl group. A siderophore found in the gram-negative bacterium species, Yersinia enterocolitica and Yersinia pestis.
