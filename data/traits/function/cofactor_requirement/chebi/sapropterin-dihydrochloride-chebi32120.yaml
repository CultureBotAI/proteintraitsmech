identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_32120
label: "requires sapropterin dihydrochloride"
definition: >-
  The functional requirement for sapropterin dihydrochloride (CHEBI:32120) as a coenzyme. The dihydrochloride salt of sapropterin. It is used for the diagnosis and treatment of variant forms of phenylketonuria (hyperphenylalaninaemia) associated with tetrahydrobiopterin deficiency. Natural cofactor for phenylalanine hydroxylase, tyrosine hydroxylase, tryptophan hydroxylase, and nitric oxide synthetase.
