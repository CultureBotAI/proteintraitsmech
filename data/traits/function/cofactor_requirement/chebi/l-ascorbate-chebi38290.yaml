identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_38290
label: "requires L-ascorbate"
definition: >-
  The functional requirement for L-ascorbate (CHEBI:38290) as a cofactor. The L-enantiomer of ascorbate and conjugate base of L-ascorbic acid, arising from selective deprotonation of the 3-hydroxy group. Required for a range of essential metabolic reactions in all animals and plants.
