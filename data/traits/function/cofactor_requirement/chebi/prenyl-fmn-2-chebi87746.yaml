identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_87746
label: "requires prenyl-FMN(2−)"
definition: >-
  The functional requirement for prenyl-FMN(2−) (CHEBI:87746) as a cofactor. An organophosphate oxoanion obtained by deprotonation of the phosphate OH groups of prenyl-FMN; major species at pH 7.3. It is an essential cofactor for the decarboxylase enzymes UbiD (Fdc1).
