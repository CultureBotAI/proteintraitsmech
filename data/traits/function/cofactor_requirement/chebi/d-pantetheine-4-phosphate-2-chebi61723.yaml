identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_61723
label: "requires D-pantetheine 4'-phosphate(2−)"
definition: >-
  The functional requirement for D-pantetheine 4'-phosphate(2−) (CHEBI:61723) as a prosthetic group. Pantetheine 4'-phosphate(2−) with D (R) configuration at the 2' position. The dianion formed from D-pantetheine 4'-phosphate by deprotonation of the phosphate group; major microspecies at pH 7.3.
