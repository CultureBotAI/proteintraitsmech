identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_15373
label: "requires biopterin"
definition: >-
  The functional requirement for biopterin (CHEBI:15373) as a coenzyme. A pterin derivative that consists of pterin bearing amino, oxo and 1,2-dihydroxypropyl substituents at positions 2, 4 and 6 respectively. The parent of the class of biopterins; the L-erythro isomer occurs widely in nature.
