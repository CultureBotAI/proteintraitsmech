identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_9973
label: "requires vibriobactin"
definition: >-
  The functional requirement for vibriobactin (CHEBI:9973) as a siderophore. A catecholate siderophore produced exclusively by Vibrio cholerae. It contains three molecules of 2,3-dihydroxybenzoate linked either directly or through L-threonine residues to the polyamine norspermidine.
