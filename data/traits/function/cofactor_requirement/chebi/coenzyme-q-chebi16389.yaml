identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_16389
label: "requires coenzyme Q"
definition: >-
  The functional requirement for coenzyme Q (CHEBI:16389) as a cofactor (vitamins). Any benzoquinone derived from 2,3-dimethoxy-5-methylbenzoquinone; one of a group of naturally occurring homologues. The redox-active quinoid moiety usually carries a polyprenoid side chain at position 6, the number of isoprenoid units in which is species-specific. Ubiquinones are involved in the control of mitochondrial electron transport, and are also potent anti-oxidants.
