identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_77805
label: "requires enterobactin(1−)"
definition: >-
  The functional requirement for enterobactin(1−) (CHEBI:77805) as a siderophore. A phenolate anion that is the conjugate base of enterobactin, obtained by deprotonation of one of the phenolic hydroxy groups. It is the major microspecies at pH 7.3 (according to Marvin v 6.2.0.).
