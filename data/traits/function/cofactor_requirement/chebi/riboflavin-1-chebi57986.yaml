identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_57986
label: "requires riboflavin(1−)"
definition: >-
  The functional requirement for riboflavin(1−) (CHEBI:57986) as a cofactor. An organic anion that is the conjugate base of riboflavin resulting from the removal of a proton from the nitrogen at position 3 (between the two carbonyl groups). Major microspecies at pH 7.3.
