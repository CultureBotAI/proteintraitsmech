definition: >-
  The functional requirement for NAD+ (CHEBI:15846) as a cofactor. The oxidised form of nicotinamide adenine dinucleotide found in all living cells. In metabolism, NAD+ is involved in redox reactions, carrying electrons from one reaction to another.
