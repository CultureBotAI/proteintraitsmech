identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_4356
label: "requires desferrioxamine B"
definition: >-
  The functional requirement for desferrioxamine B (CHEBI:4356) as a siderophore. An acyclic desferrioxamine that is butanedioic acid in which one of the carboxy groups undergoes formal condensation with the primary amino group of N-(5-aminopentyl)-N-hydroxyacetamide and the second carboxy group undergoes formal condensation with the hydroxyamino group of N1-(5-aminopentyl)-N1-hydroxy-N4-[5-(hydroxyamino)pentyl]butanediamide. It is a siderophore native to Streptomyces pilosus biosynthesised by the DesABCD enzyme cluster as a high affinity Fe(III) chelator.
