identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_9532
label: "requires thiamine(1+) diphosphate"
definition: >-
  The functional requirement for thiamine(1+) diphosphate (CHEBI:9532) as a cofactor. A thiamine phosphate that is thiamine(1+) in which the hydroxy group has been replaced by a diphosphate group. It is the active form of vitamin B1 and an essential cofactor for enzymes in key metabolic pathways.
