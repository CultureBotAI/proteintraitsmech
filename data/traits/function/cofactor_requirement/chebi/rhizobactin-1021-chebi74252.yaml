identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_74252
label: "requires rhizobactin 1021"
definition: >-
  The functional requirement for rhizobactin 1021 (CHEBI:74252) as a siderophore. A hydoxy monocarboxylic acid that is citric acid in which the two carboxy groups attached to methylene groups have each been converted to the carboxamide arising by formal condensation with the primary amino group of N-hydroxypropane-1,3-diamine and in which the nitrogen of one of the hydroxylamino groups has been acetylated while the other has been acylated with a (2E)-dec-2-enoyl group. Rhizobactin 1021 is a siderophore obtained fromj the nitrogen-fixing alfalfa symbiont Rhizobium meliloti 1021.
