label: "requires prenyl-FMN"
definition: >-
  The functional requirement for prenyl-FMN (CHEBI:87749) as a cofactor. A flavin mononucleotide resulting from the formal dehydrogenation of prenyl-FMNH2. It is an essential cofactor for the decarboxylase enzymes UbiD (Fdc1).
