identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_83198
label: "requires desferrialbomycins"
definition: >-
  The functional requirement for desferrialbomycins (CHEBI:83198) as a siderophore. A class of pentapeptides comprising three N5-acetyl-N5-hydroxy-L-ornithyl residues, an L-seryl residue, and an unusual D-amino acid [containing a variably-substituted pyrimidine (R = NCONH2, NH, or O) linked through a ring nitrogen to a thiafuranose moiety] coupled in sequence. The iron(III) complexes of desferrialbomycins, albomycins, have been isolated from various Streptomyces species; they are antibiotics that inhibit bacterial growth.
