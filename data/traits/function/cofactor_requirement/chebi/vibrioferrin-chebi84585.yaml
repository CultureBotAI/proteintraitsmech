identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_84585
label: "requires vibrioferrin"
definition: >-
  The functional requirement for vibrioferrin (CHEBI:84585) as a siderophore. A tricarboxylic acid that is citric acid in which the pro-R carboxy group has been esterified with the primary hydroxy group of 2-hydroxy-1-{(2S)-1-[(2-hydroxyethyl)amino]-1-oxopropan-2-yl}-5-oxoproline. It is a siderophore isolated from bacteria closely associated or symbiotic with toxic, bloom-forming dinoflagellates.
