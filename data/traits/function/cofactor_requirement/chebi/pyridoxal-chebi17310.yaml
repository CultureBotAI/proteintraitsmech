identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_17310
label: "requires pyridoxal"
definition: >-
  The functional requirement for pyridoxal (CHEBI:17310) as a cofactor. A pyridinecarbaldehyde that is pyridine-4-carbaldehyde bearing methyl, hydroxy and hydroxymethyl substituents at positions 2, 3 and 5 respectively. The 4-carboxyaldehyde form of vitamin B6, it is converted into pyridoxal phosphate, a coenzyme for the synthesis of amino acids, neurotransmitters, sphingolipids and aminolevulinic acid.
