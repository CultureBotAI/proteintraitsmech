identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_209443
label: "requires bisucaberin B"
definition: >-
  The functional requirement for bisucaberin B (CHEBI:209443) as a siderophore. A secondary carboxamide resulting from the formal condensation of the carboxy group of N-(3-carboxypropanoyl)-N-hydroxycadaverine with the amino group of N-(3-carboxypropanoyl)-N-hydroxycadaverine. It is a siderophore isolated from the marine bacterium Tenacibaculum mesophilum.
