identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_84582
label: "requires schizokinen"
definition: >-
  The functional requirement for schizokinen (CHEBI:84582) as a siderophore. A hydroxamic acid resulting from the formal condensation of the primary amino group of N-(3-aminopropyl)-N-hydroxyacetamide (2 mol eq.) with the carboxy groups at positions 1 and 3 of citric acid. It is a siderophore produced by Bacillus megaterium and Anabaena species.
