label: "requires iron-sulfur-molybdenum cofactor"
definition: >-
  The functional requirement for iron-sulfur-molybdenum cofactor (CHEBI:30409) as a cofactor. A molybdenum coordination entity consisting of a {Mo:7Fe:9S:C]:homocitrate cluster, having carbide(4−) at its centre. Active site of the enzyme nitrogenase (EC 1.18.6.1).
