label: "requires β-carotene"
definition: >-
  The functional requirement for β-carotene (CHEBI:17579) as a cofactor. A cyclic carotene obtained by dimerisation of all-trans-retinol. A strongly-coloured red-orange pigment abundant in plants and fruit and the most active and important provitamin A carotenoid.
