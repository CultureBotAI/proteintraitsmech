identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_4746
label: "requires echinenone"
definition: >-
  The functional requirement for echinenone (CHEBI:4746) as a cofactor. A carotenone that is β-carotene in which the 4 position has undergone formal oxidation to afford the corresponding ketone. Isolated as orange-red crystals, it is widely distributed in marine invertebrates.
