identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_58201
label: "requires 6,7-dimethyl-8-(1-D-ribityl)lumazine(1−)"
definition: >-
  The functional requirement for 6,7-dimethyl-8-(1-D-ribityl)lumazine(1−) (CHEBI:58201) as a cofactor. The anion formed from 6,7-dimethyl-8-(1-D-ribityl)lumazine by removal of a proton from the nitrogen at position 3 (i.e. between the oxo groups). It is the major species at physiological pH.
