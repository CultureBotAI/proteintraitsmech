identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_157682
label: "requires vanchrobactin"
definition: >-
  The functional requirement for vanchrobactin (CHEBI:157682) as a siderophore. A catechol-type natural product that is composed of 2,3-dihydroxybenzoic acid, D-arginine and L-serine joined in sequence by peptide linkages. It is a siderophore synthesized by the bacterial fish pathogen Vibrio anguillarum.
