identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_16709
label: "requires pyridoxine"
definition: >-
  The functional requirement for pyridoxine (CHEBI:16709) as a cofactor. A hydroxymethylpyridine with hydroxymethyl groups at positions 4 and 5, a hydroxy group at position 3 and a methyl group at position 2. The 4-methanol form of vitamin B6, it is converted intoto pyridoxal phosphate which is a coenzyme for synthesis of amino acids, neurotransmitters, sphingolipids and aminolevulinic acid.
