identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_196587
label: "requires pseudomonine"
definition: >-
  The functional requirement for pseudomonine (CHEBI:196587) as a siderophore. A secondary carboxamide resulting from the formal condensation of the of the carboxy group of 2-hydroxybenzoic acid with the primary amino group of (4S,5S)-4-amino-2-[2-(1H-imidazol-4-yl)ethyl]-5-methyl-1,2-oxazolidin-3-one. It is a siderophore isolated from Pseudomonas fluorescens AH2.
