identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_15635
label: "requires (6S)-5,6,7,8-tetrahydrofolic acid"
definition: >-
  The functional requirement for (6S)-5,6,7,8-tetrahydrofolic acid (CHEBI:15635) as a cofactor. A derivative of folic acid in which the pteridine ring is fully reduced; it is the parent compound of a variety of coenzymes that serve as carriers of one-carbon groups in metabolic reactions.
