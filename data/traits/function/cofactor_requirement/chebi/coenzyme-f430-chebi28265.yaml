identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_28265
label: "requires coenzyme F430"
definition: >-
  The functional requirement for coenzyme F430 (CHEBI:28265) as a prosthetic group, cofactor. A nickel tetrapyrrole found only in methanogenic Archaea. It is the prosthetic group of the enzyme methyl coenzyme M reductase which catalyses the release of methane in the final step of methanogenesis.
