identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_150862
label: "requires premycofactocin"
definition: >-
  The functional requirement for premycofactocin (CHEBI:150862) as a cofactor. A member of the class of pyrrolidin-2-ones that is pyrrolidine-2,3-dione which is substituted by two methyl groups at position 4 and by a 4-hydroxybenzyl group at position 5. It is a biologically active redox cofactor used by Mycobacterium smegmatis carveol dehydrogenase in the oxidation of carveol.
