label: "requires iron-sulfur-vanadium cofactor"
definition: >-
  The functional requirement for iron-sulfur-vanadium cofactor (CHEBI:60357) as a cofactor. A 7Fe-V-9S-X-homocitryl cluster, the structure of which is assumed to be analogous to the 7Fe-Mo-9S-X-homocitryl cluster. The identity of the X atom is not known, possibly carbon or oxygen.
