label: "requires mycothiol"
definition: >-
  The functional requirement for mycothiol (CHEBI:16768) as a cofactor. A pseudodisaccharide, 1D-myo-inosityl-α-D-glucopyranoside, in which the hydroxy group at the 2-position of the glucose moiety is replaced by an (N-acetyl-L-cysteinyl)amido group.
