label: "requires biotin"
definition: >-
  The functional requirement for biotin (CHEBI:15956) as a prosthetic group, coenzyme, cofactor. An organic heterobicyclic compound that consists of 2-oxohexahydro-1H-thieno[3,4-d]imidazole having a valeric acid substituent attached to the tetrahydrothiophene ring. The parent of the class of biotins.
