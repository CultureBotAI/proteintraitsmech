identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_140376
label: "requires cefiderocol"
definition: >-
  The functional requirement for cefiderocol (CHEBI:140376) as a siderophore. A fourth-generation siderophore cephalosporin antibiotic having {1-[2-(2-chloro-3,4-dihydroxybenzamido)ethyl]pyrrolidinium-1-yl}methyl and [(2Z)-2-(2-amino-1,3-thiazol-4-yl)-2-{[(2-carboxypropan-2-yl)oxy]imino}acetyl]amino side groups located at positions 3 and 7 respectively, developed to combat a variety of bacterial pathogens, including β-lactam- and carbapenem-resistant organisms.
