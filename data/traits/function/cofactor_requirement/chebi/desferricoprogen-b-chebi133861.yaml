identifier: proteintraitsmech:COFACTOR_REQ_CHEBI_133861
label: "requires desferricoprogen B"
definition: >-
  The functional requirement for desferricoprogen B (CHEBI:133861) as a siderophore. A member of the class of 2,5-diketopiperazines that is 2,5-diketopiperazine which is substituted at positions 3 and 6 by 3-(hydroxyamino)propyl groups in which the nitrogens have been acylated by (2E)-5-hydroxy-3-methylpent-2-enoyl groups. The substituent at position 3 has been further modified by having its terminal hydroxy group esterified by condensation with the carboxy group of N5-hydroxy-L-ornithine in which the N5 nitrogen has been acylated by a (2E)-5-hydroxy-3-methylpent-2-enoyl group.
