label: "requires prenyl-FMNH2"
definition: >-
  The functional requirement for prenyl-FMNH2 (CHEBI:87531) as a cofactor. A flavin mononucleotide obtained by prenylation of the N-10 position of FMNH2 followed by cyclisation. An essential cofactor for the decarboxylase enzymes UbiD and Fdc1.
