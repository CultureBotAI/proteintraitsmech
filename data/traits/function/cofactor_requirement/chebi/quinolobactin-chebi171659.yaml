label: "requires quinolobactin"
definition: >-
  The functional requirement for quinolobactin (CHEBI:171659) as a siderophore. A quinolinemonocarboxylic acid that is xanthurenic acid in which the hydroxy group at position 4 is replaced by a methoxy group. It is a siderophore isolated from Pseudomonas fluorescens ATCC 17400.
