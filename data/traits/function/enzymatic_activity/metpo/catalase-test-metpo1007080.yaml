identifier: METPO:1007080
label: "catalase test"
definition: >-
  A biochemical test that detects catalase enzyme activity by exposing cells to hydrogen peroxide and observing for visible bubbling. The test outcome (positive or negative) is captured by its child classes; this class itself does not assert that the organism has catalase activity.
definition_source: "METPO (2026-06-12)"
