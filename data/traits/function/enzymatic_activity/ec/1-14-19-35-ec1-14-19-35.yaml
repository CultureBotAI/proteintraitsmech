identifier: EC:1.14.19.35
label: "sn-2 acyl-lipid omega-3 desaturase (ferredoxin)"
definition: >-
  Enzymatic activity — sn-2 acyl-lipid omega-3 desaturase (ferredoxin) (EC 1.14.19.35). Catalysed reaction: (1) a (7Z,10Z)-hexadecadienoyl-containing glycerolipid + 2 reduced [2Fe- 2S]-[ferredoxin] + O2 + 2 H(+) = a (7Z,10Z,13Z)-hexadecatrienoyl- containing glycerolipid + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O. (2) a (9Z,12Z)-octadecadienoyl-containing glycerolipid + 2 reduced [2Fe- 2S]-[ferredoxin] + O2 + 2 H(+) = (9Z,12Z,15Z)-octadecatrienoyl-containing glycerolipid + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
