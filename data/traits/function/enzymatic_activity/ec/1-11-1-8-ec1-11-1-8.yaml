identifier: EC:1.11.1.8
label: "iodide peroxidase"
definition: >-
  Enzymatic activity — iodide peroxidase (EC 1.11.1.8). Catalysed reaction: (1) 2 iodide + H2O2 + 2 H(+) = diiodine + 2 H2O. (2) [thyroglobulin]-L-tyrosine + iodide + H2O2 + H(+) = [thyroglobulin]- 3-iodo-L-tyrosine + 2 H2O. (3) [thyroglobulin]-3-iodo-L-tyrosine + iodide + H2O2 + H(+) = [thyroglobulin]-3,5-diiodo-L-tyrosine + 2 H2O. (4) 2 [thyroglobulin]-3,5-diiodo-L-tyrosine + H2O2 = [thyroglobulin]-L- thyroxine + [thyroglobulin]-dehydroalanine + 2 H2O. (5) [thyroglobulin]-3-iodo-L-tyrosine + [thyroglobulin]-3,5-diiodo-L- tyrosine + H2O2 = [thyroglobulin]-3,3',5-triiodo-L-thyronine + [thyroglobulin]-dehydroalanine + 2 H2O.
