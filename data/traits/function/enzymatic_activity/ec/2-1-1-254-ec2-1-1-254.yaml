identifier: EC:2.1.1.254
label: "erythromycin 3''-O-methyltransferase"
definition: >-
  Enzymatic activity — erythromycin 3''-O-methyltransferase (EC 2.1.1.254). Catalysed reaction: (1) erythromycin C + S-adenosyl-L-methionine = erythromycin A + S-adenosyl-L-homocysteine + H(+). (2) erythromycin D + S-adenosyl-L-methionine = erythromycin B + S-adenosyl-L-homocysteine + H(+).
