identifier: EC:1.14.14.109
label: "3-hydroxyindolin-2-one monooxygenase"
definition: >-
  Enzymatic activity — 3-hydroxyindolin-2-one monooxygenase (EC 1.14.14.109). Catalysed reaction: 3-hydroxyindolin-2-one + reduced [NADPH--hemoprotein reductase] + O2 = 2-hydroxy-2H-1,4-benzoxazin-3(4H)-one + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
