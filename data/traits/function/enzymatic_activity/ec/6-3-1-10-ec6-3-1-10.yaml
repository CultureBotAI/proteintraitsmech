identifier: EC:6.3.1.10
label: "adenosylcobinamide-phosphate synthase"
definition: >-
  Enzymatic activity — adenosylcobinamide-phosphate synthase (EC 6.3.1.10). Catalysed reaction: (1) (R)-1-aminopropan-2-yl phosphate + adenosylcob(III)yrate + ATP = adenosylcob(III)inamide phosphate + ADP + phosphate + H(+). (2) (R)-1-aminopropan-2-ol + adenosylcob(III)yrate + ATP = adenosylcob(III)inamide + ADP + phosphate + H(+).
