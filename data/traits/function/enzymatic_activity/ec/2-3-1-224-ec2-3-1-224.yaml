  Enzymatic activity — acetyl-CoA-benzylalcohol acetyltransferase (EC 2.3.1.224). Catalysed reaction: (1) benzyl alcohol + acetyl-CoA = benzyl acetate + CoA. (2) (E)-cinnamyl alcohol + acetyl-CoA = (E)-cinnamyl acetate + CoA.
