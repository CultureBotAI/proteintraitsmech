  Enzymatic activity — (+)-sabinene 3-hydroxylase (EC 1.14.13.153). Catalysed reaction: (1R,5R)-sabinene + NADPH + O2 + H(+) = (1S,3R,5S)-sabinol + NADP(+) + H2O.
