definition: >-
  Enzymatic activity — 4alpha,5beta-5,20-epoxytax-11-ene-4,9-diol 9-dehydrogenase (EC 1.14.20.16). Catalysed reaction: 4alpha,5beta-5,20-epoxytax-11-ene-4,9-diol + 2-oxoglutarate + O2 = 4alpha-hydroxy-5beta-5,20-epoxytax-11-en-9-one + succinate + CO2 + H2O.
