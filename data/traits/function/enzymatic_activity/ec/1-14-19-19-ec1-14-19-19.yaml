identifier: EC:1.14.19.19
label: "sphingolipid 10-desaturase"
definition: >-
  Enzymatic activity — sphingolipid 10-desaturase (EC 1.14.19.19). Catalysed reaction: a (4E,8E)-4-sphinga-4,8-dienine ceramide + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = an N-acyl-(4E,8E,10E)-sphingatrienine + 2 Fe(III)- [cytochrome b5] + 2 H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
