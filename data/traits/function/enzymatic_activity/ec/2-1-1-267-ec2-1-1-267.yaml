identifier: EC:2.1.1.267
label: "flavonoid 3',5'-methyltransferase"
definition: >-
  Enzymatic activity — flavonoid 3',5'-methyltransferase (EC 2.1.1.267). Catalysed reaction: (1) S-adenosyl-L-methionine + a 3'-hydroxyflavonoid = S-adenosyl-L- homocysteine + a 3'-methoxyflavonoid. (2) S-adenosyl-L-methionine + a 5'-hydroxy-3'-methoxyflavonoid = S-adenosyl-L-homocysteine + a 3',5'-dimethoxyflavonoid.
