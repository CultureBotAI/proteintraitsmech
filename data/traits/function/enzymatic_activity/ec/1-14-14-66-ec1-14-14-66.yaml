identifier: EC:1.14.14.66
label: "marmesin synthase"
definition: >-
  Enzymatic activity — marmesin synthase (EC 1.14.14.66). Catalysed reaction: demethylsuberosin + reduced [NADPH--hemoprotein reductase] + O2 = (7S)- marmesin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
