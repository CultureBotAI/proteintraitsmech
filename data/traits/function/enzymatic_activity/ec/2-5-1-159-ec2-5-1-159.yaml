identifier: EC:2.5.1.159
label: "hapalindole G dimethylallyltransferase"
definition: >-
  Enzymatic activity — hapalindole G dimethylallyltransferase (EC 2.5.1.159). Catalysed reaction: (1) hapalindole G + dimethylallyl diphosphate = ambiguine A + diphosphate. (2) hapalindole U + dimethylallyl diphosphate + H(+) = ambiguine H + diphosphate.
