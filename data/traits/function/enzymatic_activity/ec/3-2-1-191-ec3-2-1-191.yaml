identifier: EC:3.2.1.191
label: "ginsenosidase type III"
definition: >-
  Enzymatic activity — ginsenosidase type III (EC 3.2.1.191). Catalysed reaction: a protopanaxadiol-type ginsenoside with two glucosyl residues at position 3 + 2 H2O = a protopanaxadiol-type ginsenoside with no glycosidic modification at position 3 + 2 D-glucopyranose.
