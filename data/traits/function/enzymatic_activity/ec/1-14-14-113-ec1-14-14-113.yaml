identifier: EC:1.14.14.113
label: "alpha-humulene 10-hydroxylase"
definition: >-
  Enzymatic activity — alpha-humulene 10-hydroxylase (EC 1.14.14.113). Catalysed reaction: alpha-humulene + reduced [NADPH--hemoprotein reductase] + O2 = 10-hydroxy-alpha-humulene + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
