identifier: EC:2.1.1.114
label: "polyprenyldihydroxybenzoate methyltransferase"
definition: >-
  Enzymatic activity — polyprenyldihydroxybenzoate methyltransferase (EC 2.1.1.114). Catalysed reaction: a 3,4-dihydroxy-5-(all-trans-polyprenyl)benzoate + S-adenosyl-L- methionine = a 4-hydroxy-3-methoxy-5-(all-trans-polyprenyl)benzoate + S-adenosyl-L-homocysteine + H(+).
