identifier: EC:2.1.1.166
label: "23S rRNA (uridine(2552)-2'-O)-methyltransferase"
definition: >-
  Enzymatic activity — 23S rRNA (uridine(2552)-2'-O)-methyltransferase (EC 2.1.1.166). Catalysed reaction: uridine(2552) in 23S rRNA + S-adenosyl-L-methionine = 2'-O- methyluridine(2552) in 23S rRNA + S-adenosyl-L-homocysteine + H(+).
