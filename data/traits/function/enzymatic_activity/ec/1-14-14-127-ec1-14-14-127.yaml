identifier: EC:1.14.14.127
label: "methyl farnesoate epoxidase"
definition: >-
  Enzymatic activity — methyl farnesoate epoxidase (EC 1.14.14.127). Catalysed reaction: methyl (2E,6E)-farnesoate + reduced [NADPH--hemoprotein reductase] + O2 = juvenile hormone III + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
