identifier: EC:2.8.3.21
label: "L-carnitine CoA-transferase"
definition: >-
  Enzymatic activity — L-carnitine CoA-transferase (EC 2.8.3.21). Catalysed reaction: (1) crotonobetainyl-CoA + (R)-carnitine = crotonobetaine + (R)- carnitinyl-CoA. (2) 4-(trimethylamino)butanoyl-CoA + (R)-carnitine = (R)-carnitinyl-CoA + 4-(trimethylamino)butanoate.
