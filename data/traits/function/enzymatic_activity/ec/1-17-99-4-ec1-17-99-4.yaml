  Enzymatic activity — uracil/thymine dehydrogenase (EC 1.17.99.4). Catalysed reaction: (1) uracil + A + H2O = barbiturate + AH2 + H(+). (2) thymine + A + H2O = 5-methylbarbiturate + AH2 + H(+).
