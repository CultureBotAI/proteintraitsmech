label: "arabinofuranan 3-O-arabinosyltransferase"
definition: >-
  Enzymatic activity — arabinofuranan 3-O-arabinosyltransferase (EC 2.4.2.47). Catalysed reaction: Adds an alpha-D-arabinofuranosyl group from trans,octacis- decaprenylphospho-beta-D-arabinofuranose at the 3-O-position of an alpha- (1->5)-arabinofuranan chain attached to a beta-(1->5)-galactofuranan chain.
