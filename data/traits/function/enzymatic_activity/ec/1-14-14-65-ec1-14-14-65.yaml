definition: >-
  Enzymatic activity — sugiol synthase (EC 1.14.14.65). Catalysed reaction: ferruginol + 2 reduced [NADPH--hemoprotein reductase] + 2 O2 = sugiol + 2 oxidized [NADPH--hemoprotein reductase] + 3 H2O + 2 H(+).
