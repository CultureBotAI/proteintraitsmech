identifier: EC:1.14.16.1
label: "phenylalanine 4-monooxygenase"
definition: >-
  Enzymatic activity — phenylalanine 4-monooxygenase (EC 1.14.16.1). Catalysed reaction: (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin + L-phenylalanine + O2 = (4aS,6R)-4a-hydroxy-L-erythro-5,6,7,8-tetrahydrobiopterin + L-tyrosine.
