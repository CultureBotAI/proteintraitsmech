identifier: EC:1.14.19.33
label: "Delta(12) acyl-lipid conjugase (11E,13E-forming)"
definition: >-
  Enzymatic activity — Delta(12) acyl-lipid conjugase (11E,13E-forming) (EC 1.14.19.33). Catalysed reaction: (1) a (9Z,12Z)-octadecadienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = a (9Z,11E,13E)-octadecatrienoyl- containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) (9Z,12Z,15Z)-octadecatrienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = a (9Z,11E,13E,15Z)-octadecatetraenoyl- containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
