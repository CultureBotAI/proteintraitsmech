definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with oxidation of a pair of donors resulting in the reduction of molecular oxygen to two molecules of water.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) a (9Z,12Z)-octadecadienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = a (9Z,11E,13E)-octadecatrienoyl- containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) (9Z,12Z,15Z)-octadecatrienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = a (9Z,11E,13E,15Z)-octadecatetraenoyl- containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O
