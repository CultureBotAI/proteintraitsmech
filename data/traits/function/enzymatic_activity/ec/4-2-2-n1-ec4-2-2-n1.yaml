identifier: EC:4.2.2.n1
label: "peptidoglycan lytic exotransglycosylase"
definition: >-
  Enzymatic activity — peptidoglycan lytic exotransglycosylase (EC 4.2.2.n1). Catalysed reaction: Exolytic cleavage of the (1->4)-beta-glycosidic linkage between N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc) residues in peptidoglycan, from either the reducing or the non-reducing ends of the peptidoglycan chains, with concomitant formation of a 1,6-anhydrobond in the MurNAc residue.
