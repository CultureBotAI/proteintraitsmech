identifier: EC:1.14.99.46
label: "pyrimidine monooxygenase"
definition: >-
  Enzymatic activity — pyrimidine monooxygenase (EC 1.14.99.46). Catalysed reaction: (1) uracil + FMNH2 + NADH + O2 = (Z)-3-ureidoacrylate + FMN + NAD(+) + H2O + H(+). (2) thymine + FMNH2 + NADH + O2 = (Z)-2-methylureidoacrylate + FMN + NAD(+) + H2O + H(+).
