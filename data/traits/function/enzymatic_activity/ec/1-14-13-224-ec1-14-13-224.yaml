identifier: EC:1.14.13.224
label: "violacein synthase"
definition: >-
  Enzymatic activity — violacein synthase (EC 1.14.13.224). Catalysed reaction: (1) protoviolaceinate + NADH + O2 + H(+) = violaceinate + NAD(+) + H2O. (2) protoviolaceinate + NADPH + O2 + H(+) = violaceinate + NADP(+) + H2O. (3) protodeoxyviolaceinate + NADPH + O2 + H(+) = deoxyviolaceinate + NADP(+) + H2O. (4) protodeoxyviolaceinate + NADH + O2 + H(+) = deoxyviolaceinate + NAD(+) + H2O.
