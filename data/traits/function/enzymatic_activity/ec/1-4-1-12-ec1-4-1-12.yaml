identifier: EC:1.4.1.12
label: "2,4-diaminopentanoate dehydrogenase"
definition: >-
  Enzymatic activity — 2,4-diaminopentanoate dehydrogenase (EC 1.4.1.12). Catalysed reaction: (1) (2R,4S)-2,4-diaminopentanoate + NADP(+) + H2O = (2R)-2-amino-4- oxopentanoate + NH4(+) + NADPH + H(+). (2) (2R,4S)-2,4-diaminopentanoate + NAD(+) + H2O = (2R)-2-amino-4- oxopentanoate + NH4(+) + NADH + H(+).
