identifier: EC:3.4.24.57
label: "O-sialoglycoprotein endopeptidase"
definition: >-
  Enzymatic activity — O-sialoglycoprotein endopeptidase (EC 3.4.24.57). Catalysed reaction: Hydrolysis of O-sialoglycoproteins. Cleaves 31-Arg-|-Asp-32 bond in glycophorin A. Does not cleave unglycosylated proteins, desialylated glycoproteins or glycoproteins that are only N-glycosylated.
