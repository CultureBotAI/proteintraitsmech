identifier: EC:1.14.11.39
label: "L-asparagine oxygenase"
definition: >-
  Enzymatic activity — L-asparagine oxygenase (EC 1.14.11.39). Catalysed reaction: L-asparagine + 2-oxoglutarate + O2 = (2S,3S)-3-hydroxyasparagine + succinate + CO2.
