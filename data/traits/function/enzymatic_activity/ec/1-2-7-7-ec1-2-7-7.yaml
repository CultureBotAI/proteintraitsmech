identifier: EC:1.2.7.7
label: "3-methyl-2-oxobutanoate dehydrogenase (ferredoxin)"
definition: >-
  Enzymatic activity — 3-methyl-2-oxobutanoate dehydrogenase (ferredoxin) (EC 1.2.7.7). Catalysed reaction: 3-methyl-2-oxobutanoate + 2 oxidized [2Fe-2S]-[ferredoxin] + CoA = 2-methylpropanoyl-CoA + 2 reduced [2Fe-2S]-[ferredoxin] + CO2 + H(+).
