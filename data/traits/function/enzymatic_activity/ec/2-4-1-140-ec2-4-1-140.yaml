identifier: EC:2.4.1.140
label: alternansucrase
definition: >-
  Enzymatic activity — alternansucrase (EC 2.4.1.140). Catalysed reaction: Transfers alternately an alpha-D-glucosyl residue from sucrose to the 6-position and the 3-position of the non-reducing terminal residue of an alpha-D-glucan, thus producing a glucan having alternating alpha-(1->6)- and alpha-(1->3)-linkages.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:2.4.1.-
synonyms:
  - synonym_text: "sucrose:1,6-, 1,3-alpha-D-glucan 3-alpha- and 6-alpha-D-"
    synonym_type: EXACT_SYNONYM
  - synonym_text: glucosyltransferase
    synonym_type: EXACT_SYNONYM
  - synonym_text: "sucrose-1,6(3)-alpha-glucan 6(3)-alpha-glucosyltransferase"
    synonym_type: EXACT_SYNONYM
definitions:
