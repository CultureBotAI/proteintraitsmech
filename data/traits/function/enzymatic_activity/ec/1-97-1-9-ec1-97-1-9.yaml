identifier: EC:1.97.1.9
label: "selenate reductase (cytochrome c)"
definition: >-
  Enzymatic activity — selenate reductase (cytochrome c) (EC 1.97.1.9). Catalysed reaction: (1) selenite + A + H2O = selenate + AH2. (2) selenite + 2 Fe(III)-[cytochrome c] + H2O = 2 Fe(II)-[cytochrome] + selenate + 2 H(+).
