identifier: EC:2.5.1.149
label: "lycopene elongase/hydratase (flavuxanthin-forming)"
definition: >-
  Enzymatic activity — lycopene elongase/hydratase (flavuxanthin-forming) (EC 2.5.1.149). Catalysed reaction: (1) all-trans-lycopene + dimethylallyl diphosphate + A + H2O = nonaflavuxanthin + AH2 + diphosphate. (2) nonaflavuxanthin + dimethylallyl diphosphate + A + H2O = flavuxanthin + AH2 + diphosphate.
