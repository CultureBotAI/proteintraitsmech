identifier: EC:1.14.19.17
label: "sphingolipid 4-desaturase"
definition: >-
  Enzymatic activity — sphingolipid 4-desaturase (EC 1.14.19.17). Catalysed reaction: an N-acylsphinganine + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = an N-acylsphing-4-enine + 2 Fe(III)-[cytochrome b5] + 2 H2O.
