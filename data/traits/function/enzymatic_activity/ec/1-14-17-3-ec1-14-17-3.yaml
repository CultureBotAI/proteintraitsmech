label: "peptidylglycine monooxygenase"
definition: >-
  Enzymatic activity — peptidylglycine monooxygenase (EC 1.14.17.3). Catalysed reaction: a [peptide]-C-terminal glycine + 2 L-ascorbate + O2 = a [peptide]-C- terminal (2S)-2-hydroxyglycine + 2 monodehydro-L-ascorbate radical + H2O.
