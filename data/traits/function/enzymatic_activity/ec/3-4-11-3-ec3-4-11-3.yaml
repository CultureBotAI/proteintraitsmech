identifier: EC:3.4.11.3
label: "cystinyl aminopeptidase"
definition: >-
  Enzymatic activity — cystinyl aminopeptidase (EC 3.4.11.3). Catalysed reaction: Release of an N-terminal amino acid, Cys-|-Xaa-, in which the half- cystine residue is involved in a disulfide loop, notably in oxytocin or vasopressin. Hydrolysis rates on a range of aminoacyl arylamides exceed that for the cystinyl derivative, however.
