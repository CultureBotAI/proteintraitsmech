identifier: EC:3.4.24.70
label: "oligopeptidase A"
definition: >-
  Enzymatic activity — oligopeptidase A (EC 3.4.24.70). Catalysed reaction: Hydrolysis of oligopeptides, with broad specificity. Gly or Ala commonly occur as P1 or P1' residues, but more distant residues are also important, as is shown by the fact that Z-Gly-Pro-Gly-|-Gly-Pro-Ala is cleaved, but not Z-(Gly)(5).
