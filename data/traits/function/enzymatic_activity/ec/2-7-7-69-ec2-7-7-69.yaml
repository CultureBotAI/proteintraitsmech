identifier: EC:2.7.7.69
label: "GDP-L-galactose/GDP-D-glucose: hexose 1-phosphate guanylyltransferase"
definition: >-
  Enzymatic activity — GDP-L-galactose/GDP-D-glucose: hexose 1-phosphate guanylyltransferase (EC 2.7.7.69). Catalysed reaction: (1) GDP-beta-L-galactose + alpha-D-mannose 1-phosphate = beta-L-galactose 1-phosphate + GDP-alpha-D-mannose. (2) GDP-alpha-D-glucose + alpha-D-mannose 1-phosphate = alpha-D-glucose 1-phosphate + GDP-alpha-D-mannose.
