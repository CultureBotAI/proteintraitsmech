identifier: EC:3.5.99.2
label: "aminopyrimidine aminohydrolase"
definition: >-
  Enzymatic activity — aminopyrimidine aminohydrolase (EC 3.5.99.2). Catalysed reaction: (1) 4-amino-5-aminomethyl-2-methylpyrimidine + H2O = 4-amino-5- hydroxymethyl-2-methylpyrimidine + NH4(+). (2) thiamine + H2O = 5-(2-hydroxyethyl)-4-methylthiazole + 4-amino-5- hydroxymethyl-2-methylpyrimidine + H(+).
