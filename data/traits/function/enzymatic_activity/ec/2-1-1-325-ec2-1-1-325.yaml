identifier: EC:2.1.1.325
label: "juvenile hormone-III synthase"
definition: >-
  Enzymatic activity — juvenile hormone-III synthase (EC 2.1.1.325). Catalysed reaction: (1) (2E,6E)-farnesoate + S-adenosyl-L-methionine = methyl (2E,6E)- farnesoate + S-adenosyl-L-homocysteine. (2) juvenile hormone III carboxylate + S-adenosyl-L-methionine = juvenile hormone III + S-adenosyl-L-homocysteine.
