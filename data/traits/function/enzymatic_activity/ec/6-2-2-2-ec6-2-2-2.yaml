identifier: EC:6.2.2.2
label: "oxazoline synthase"
definition: >-
  Enzymatic activity — oxazoline synthase (EC 6.2.2.2). Catalysed reaction: (1) L-amino acyl-L-seryl-[protein] + ATP = (S,S)-2-(C-substituted- aminomethyl)-4-acyl-2-oxazoline-[protein] + ADP + phosphate + H(+). (2) L-amino acyl-L-threonyl-[protein] + ATP = (S,S)-2-(C-substituted- aminomethyl)-4-acyl-5-methyl-2-oxazoline-[protein] + ADP + phosphate + H(+). (3) L-amino acyl-L-cysteinyl-[protein] + ATP = (1S,4R)-2-(C-substituted- aminomethyl)-4-acyl-2-thiazoline-[protein] + ADP + phosphate + H(+).
