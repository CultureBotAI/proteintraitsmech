identifier: EC:1.1.1.295
label: "momilactone-A synthase"
definition: >-
  Enzymatic activity — momilactone-A synthase (EC 1.1.1.295). Catalysed reaction: (1) 3beta-hydroxy-9beta-pimara-7,15-dien-19,6beta-olide + NAD(+) = momilactone A + NADH + H(+). (2) 3beta-hydroxy-9beta-pimara-7,15-dien-19,6beta-olide + NADP(+) = momilactone A + NADPH + H(+).
