identifier: EC:1.5.3.17
label: "non-specific polyamine oxidase"
definition: >-
  Enzymatic activity — non-specific polyamine oxidase (EC 1.5.3.17). Catalysed reaction: (1) spermine + O2 + H2O = 3-aminopropanal + spermidine + H2O2. (2) spermidine + O2 + H2O = 3-aminopropanal + putrescine + H2O2. (3) N(1)-acetylspermine + O2 + H2O = 3-acetamidopropanal + spermidine + H2O2. (4) N(1)-acetylspermidine + O2 + H2O = 3-acetamidopropanal + putrescine + H2O2.
