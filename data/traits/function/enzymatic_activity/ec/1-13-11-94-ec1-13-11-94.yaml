identifier: EC:1.13.11.94
label: "4-vinylguaiacol dioxygenase"
definition: >-
  Enzymatic activity — 4-vinylguaiacol dioxygenase (EC 1.13.11.94). Catalysed reaction: (1) 2-methoxy-4-vinylphenol + O2 = vanillin + formaldehyde. (2) 4-vinylphenol + O2 = 4-hydroxybenzaldehyde + formaldehyde.
