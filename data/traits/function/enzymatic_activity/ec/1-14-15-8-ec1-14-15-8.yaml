label: "steroid 15beta-monooxygenase"
definition: >-
  Enzymatic activity — steroid 15beta-monooxygenase (EC 1.14.15.8). Catalysed reaction: reduced 2[4Fe-4S]-[ferredoxin] + progesterone + O2 + 2 H(+) = 15beta- hydroxyprogesterone + oxidized 2[4Fe-4S]-[ferredoxin] + H2O.
