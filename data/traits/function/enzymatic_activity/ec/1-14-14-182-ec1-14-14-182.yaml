identifier: EC:1.14.14.182
label: "taxoid 7beta-hydroxylase"
definition: >-
  Enzymatic activity — taxoid 7beta-hydroxylase (EC 1.14.14.182). Catalysed reaction: (1) taxusin + reduced [NADPH--hemoprotein reductase] + O2 = 7beta- hydroxytaxusin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) 2alpha-hydroxytaxusin + reduced [NADPH--hemoprotein reductase] + O2 = 2alpha,7beta-dihydroxytaxusin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
