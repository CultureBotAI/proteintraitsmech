label: "6-deoxyerythronolide B hydroxylase"
definition: >-
  Enzymatic activity — 6-deoxyerythronolide B hydroxylase (EC 1.14.15.35). Catalysed reaction: 6-deoxyerythronolide B + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = erythronolide B + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O.
