identifier: EC:2.5.1.88
label: "trans,polycis-polyprenyl diphosphate synthase [(2Z,6E)-farnesyl diphosphate specific]"
definition: >-
  Enzymatic activity — trans,polycis-polyprenyl diphosphate synthase [(2Z,6E)-farnesyl diphosphate specific] (EC 2.5.1.88). Catalysed reaction: (1) (2Z,6E)-farnesyl diphosphate + 9 isopentenyl diphosphate = di-trans,nona-cis-dodecaprenyl diphosphate + 9 diphosphate. (2) (2Z,6E)-farnesyl diphosphate + 10 isopentenyl diphosphate = di-trans,deca-cis-tridecaprenyl diphosphate + 10 diphosphate. (3) (2Z,6E)-farnesyl diphosphate + 11 isopentenyl diphosphate = di-trans,undeca-cis-tetradecaprenyl diphosphate + 11 diphosphate.
