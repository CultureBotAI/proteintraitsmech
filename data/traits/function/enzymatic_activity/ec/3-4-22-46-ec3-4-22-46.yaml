identifier: EC:3.4.22.46
label: L-peptidase
definition: >-
  Enzymatic activity — L-peptidase (EC 3.4.22.46). Catalysed reaction: Autocatalytically cleaves itself from the polyprotein of the foot- and-mouth disease virus by hydrolysis of a Lys-|-Gly bond, but then cleaves host cell initiation factor eIF-4G at bonds -Gly-|-Arg- and -Lys-|-Arg-.
