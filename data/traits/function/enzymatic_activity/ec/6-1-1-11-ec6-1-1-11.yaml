identifier: EC:6.1.1.11
label: "serine--tRNA ligase"
definition: >-
  Enzymatic activity — serine--tRNA ligase (EC 6.1.1.11). Catalysed reaction: (1) tRNA(Ser) + L-serine + ATP = L-seryl-tRNA(Ser) + AMP + diphosphate + H(+). (2) tRNA(Sec) + L-serine + ATP = L-seryl-tRNA(Sec) + AMP + diphosphate + H(+).
