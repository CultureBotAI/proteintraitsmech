identifier: EC:3.4.21.32
label: brachyurin
definition: >-
  Enzymatic activity — brachyurin (EC 3.4.21.32). Catalysed reaction: Hydrolysis of proteins, with broad specificity for peptide bonds. Native collagen is cleaved about 75% of the length of the molecule from the N-terminus. Low activity on small molecule substrates of both trypsin and chymotrypsin.
