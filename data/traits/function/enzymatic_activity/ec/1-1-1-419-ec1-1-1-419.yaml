  Enzymatic activity — nepetalactol dehydrogenase (EC 1.1.1.419). Catalysed reaction: (1) cis-cis-nepetalactol + NAD(+) = cis-cis-nepetalactone + NADH + H(+). (2) cis-trans-nepetalactol + NAD(+) = cis-trans-nepetalactone + NADH + H(+).
