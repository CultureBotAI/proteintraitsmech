identifier: EC:1.14.14.87
label: "2-hydroxyisoflavanone synthase"
definition: >-
  Enzymatic activity — 2-hydroxyisoflavanone synthase (EC 1.14.14.87). Catalysed reaction: (1) (2S)-liquiritigenin + reduced [NADPH--hemoprotein reductase] + O2 = (2R,3S)-2,4',7-trihydroxyisoflavanone + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) (2S)-naringenin + reduced [NADPH--hemoprotein reductase] + O2 = 2-hydroxy-2,3-dihydrogenistein + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
