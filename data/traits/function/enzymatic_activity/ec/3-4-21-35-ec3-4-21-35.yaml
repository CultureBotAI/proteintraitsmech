identifier: EC:3.4.21.35
label: "tissue kallikrein"
definition: >-
  Enzymatic activity — tissue kallikrein (EC 3.4.21.35). Catalysed reaction: Preferential cleavage of Arg-|-Xaa bonds in small molecule substrates. Highly selective action to release kallidin (lysyl-bradykinin) from kininogen involves hydrolysis of Met-|-Xaa or Leu-|-Xaa.
