identifier: EC:1.14.11.80
label: "methylcytosine dioxygenase"
definition: >-
  Enzymatic activity — methylcytosine dioxygenase (EC 1.14.11.80). Catalysed reaction: (1) a 5-methyl-2'-deoxycytidine in DNA + 2-oxoglutarate + O2 = a 5-hydroxymethyl-2'-deoxycytidine in DNA + succinate + CO2. (2) a 5-hydroxymethyl-2'-deoxycytidine in DNA + 2-oxoglutarate + O2 = a 5-formyl-2'-deoxycytidine in DNA + succinate + CO2 + H2O. (3) a 5-formyl-2'-deoxycytidine in DNA + 2-oxoglutarate + O2 = a 5-carboxyl-2'-deoxycytidine in DNA + succinate + CO2 + H(+).
