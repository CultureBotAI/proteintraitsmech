identifier: EC:4.2.2.23
label: "rhamnogalacturonan endolyase"
definition: >-
  Enzymatic activity — rhamnogalacturonan endolyase (EC 4.2.2.23). Catalysed reaction: Endotype eliminative cleavage of L-alpha-rhamnopyranosyl-(1->4)-alpha-D- galactopyranosyluronic acid bonds of rhamnogalacturonan I domains in ramified hairy regions of pectin leaving L-rhamnopyranose at the reducing end and 4-deoxy-4,5-unsaturated D-galactopyranosyluronic acid at the non- reducing end.
