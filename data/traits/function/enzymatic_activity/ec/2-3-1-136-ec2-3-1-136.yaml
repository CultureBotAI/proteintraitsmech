identifier: EC:2.3.1.136
label: "polysialic-acid O-acetyltransferase"
definition: >-
  Enzymatic activity — polysialic-acid O-acetyltransferase (EC 2.3.1.136). Catalysed reaction: (1) [N-acetyl-alpha-D-neuraminosyl-(2->8)](n) + n acetyl-CoA = [O(7),N-diacetyl-alpha-D-neuraminosyl-(2->8)](n) + n CoA. (2) [N-acetyl-alpha-D-neuraminosyl-(2->8)](n) + n acetyl-CoA = [N,O(9)- diacetyl-alpha-D-neuraminosyl-(2->8)](n) + n CoA.
