label: "(11Z)-hexadec-11-enoyl-CoA conjugase"
definition: >-
  Enzymatic activity — (11Z)-hexadec-11-enoyl-CoA conjugase (EC 1.14.19.15). Catalysed reaction: (11Z)-hexadecenoyl-CoA + AH2 + O2 = (10E,12Z)-hexadecadienoyl-CoA + A + 2 H2O.
