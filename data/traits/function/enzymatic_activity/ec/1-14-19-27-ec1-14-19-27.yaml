identifier: EC:1.14.19.27
label: "sn-2 palmitoyl-lipid 9-desaturase"
definition: >-
  Enzymatic activity — sn-2 palmitoyl-lipid 9-desaturase (EC 1.14.19.27). Catalysed reaction: a 1-acyl-2-hexadecanoyl-glycerolipid + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = a 1-acyl-2-[(9Z)-hexadecenoyl]-glycerolipid + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
