identifier: EC:2.1.1.244
label: "protein N-terminal methyltransferase"
definition: >-
  Enzymatic activity — protein N-terminal methyltransferase (EC 2.1.1.244). Catalysed reaction: (1) N-terminal L-alanyl-L-prolyl-L-lysyl-[protein] + 3 S-adenosyl-L- methionine = N-terminal N,N,N-trimethyl-L-alanyl-L-prolyl-L-lysyl- [protein] + 3 S-adenosyl-L-homocysteine + 3 H(+). (2) N-terminal L-seryl-L-prolyl-L-lysyl-[protein] + 3 S-adenosyl-L- methionine = N-terminal N,N,N-trimethyl-L-seryl-L-prolyl-L-lysyl- [protein] + 3 S-adenosyl-L-homocysteine + 3 H(+). (3) N-terminal L-prolyl-L-prolyl-L-lysyl-[protein] + 2 S-adenosyl-L- methionine = N-terminal N,N-dimethyl-L-prolyl-L-prolyl-L-lysyl-[protein] + 2 S-adenosyl-L-homocysteine + 2 H(+).
