identifier: EC:1.14.15.28
label: "cholest-4-en-3-one 26-monooxygenase [(25R)-3-oxocholest-4-en-26-oate forming]"
definition: >-
  Enzymatic activity — cholest-4-en-3-one 26-monooxygenase [(25R)-3-oxocholest-4-en-26-oate forming] (EC 1.14.15.28). Catalysed reaction: cholest-4-en-3-one + 6 reduced [2Fe-2S]-[ferredoxin] + 3 O2 + 5 H(+) = (25R)-3-oxocholest-4-en-26-oate + 6 oxidized [2Fe-2S]-[ferredoxin] + 4 H2O.
