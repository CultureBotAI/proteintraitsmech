identifier: EC:3.2.1.220
label: "ipecoside beta-D-glucosidase"
definition: >-
  Enzymatic activity — ipecoside beta-D-glucosidase (EC 3.2.1.220). Catalysed reaction: (1) ipecoside + H2O = ipecoside aglycone + D-glucose. (2) deacetylipecoside + H2O = deacetylipecoside aglycone + D-glucose. (3) 6-O-methyldeacetylipecoside + H2O = 6-O-methyldeacetylipecoside aglycone + D-glucose.
