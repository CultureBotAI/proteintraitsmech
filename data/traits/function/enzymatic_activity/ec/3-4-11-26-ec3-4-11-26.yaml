identifier: EC:3.4.11.26
label: "intermediate cleaving peptidase 55"
definition: >-
  Enzymatic activity — intermediate cleaving peptidase 55 (EC 3.4.11.26). Catalysed reaction: The enzyme cleaves the 36-Pro-Pro-37 bond of cysteine desulfurase (EC 2.8.1.7) removing three amino acid residues (Tyr-Ser-Pro) from the N-terminus after cleavage by mitochondrial processing peptidase.
