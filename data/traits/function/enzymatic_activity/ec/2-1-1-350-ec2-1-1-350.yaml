identifier: EC:2.1.1.350
label: "menaquinone C(8)-methyltransferase"
definition: >-
  Enzymatic activity — menaquinone C(8)-methyltransferase (EC 2.1.1.350). Catalysed reaction: (1) reduced [flavodoxin] + a menaquinone + 2 S-adenosyl-L-methionine = an 8-methylmenaquinone + oxidized [flavodoxin] + 5'-deoxyadenosine + L-methionine + S-adenosyl-L-homocysteine + 3 H(+). (2) a 2-demethylmenaquinone + reduced [flavodoxin] + 2 S-adenosyl-L- methionine = a 2-demethyl-8-methylmenaquinone + oxidized [flavodoxin] + 5'-deoxyadenosine + L-methionine + S-adenosyl-L-homocysteine + 3 H(+).
