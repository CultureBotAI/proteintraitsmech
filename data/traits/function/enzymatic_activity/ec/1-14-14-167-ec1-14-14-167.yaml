definition: >-
  Enzymatic activity — (13S,14R)-13-O-acetyl-1-hydroxy-N-methylcanadine 8-hydroxylase (EC 1.14.14.167). Catalysed reaction: (13S,14R)-13-O-acetyl-1-hydroxy-N-methylcanadine + reduced [NADPH- -hemoprotein reductase] + O2 = (13S,14R)-13-O-acetyl-1,8-dihydroxy-N- methylcanadine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
