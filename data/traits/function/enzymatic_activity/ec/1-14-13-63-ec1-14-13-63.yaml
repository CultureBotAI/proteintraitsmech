identifier: EC:1.14.13.63
label: "3-hydroxyphenylacetate 6-hydroxylase"
definition: >-
  Enzymatic activity — 3-hydroxyphenylacetate 6-hydroxylase (EC 1.14.13.63). Catalysed reaction: (1) 3-hydroxyphenylacetate + NADPH + O2 + H(+) = homogentisate + NADP(+) + H2O. (2) 3-hydroxyphenylacetate + NADH + O2 + H(+) = homogentisate + NAD(+) + H2O.
