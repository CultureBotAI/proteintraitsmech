identifier: EC:3.4.19.13
label: "glutathione gamma-glutamate hydrolase"
definition: >-
  Enzymatic activity — glutathione gamma-glutamate hydrolase (EC 3.4.19.13). Catalysed reaction: (1) glutathione + H2O = L-cysteinylglycine + L-glutamate. (2) an S-substituted glutathione + H2O = an S-substituted L-cysteinylglycine + L-glutamate.
