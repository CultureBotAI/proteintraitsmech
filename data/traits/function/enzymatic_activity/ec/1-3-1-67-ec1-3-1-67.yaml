identifier: EC:1.3.1.67
label: "cis-1,2-dihydroxy-4-methylcyclohexa-3,5-diene-1-carboxylate dehydrogenase"
definition: >-
  Enzymatic activity — cis-1,2-dihydroxy-4-methylcyclohexa-3,5-diene-1-carboxylate dehydrogenase (EC 1.3.1.67). Catalysed reaction: (1) (1R,6S)-1,6-dihydroxy-4-methylcyclohexa-2,4-diene-1-carboxylate + NADP(+) = 4-methylcatechol + CO2 + NADPH. (2) (1R,6S)-1,6-dihydroxy-4-methylcyclohexa-2,4-diene-1-carboxylate + NAD(+) = 4-methylcatechol + CO2 + NADH.
definition_source: ExPASy ENZYME
