identifier: EC:4.2.2.11
label: "guluronate-specific alginate lyase"
definition: >-
  Enzymatic activity — guluronate-specific alginate lyase (EC 4.2.2.11). Catalysed reaction: Eliminative cleavage of alginate to give oligosaccharides with 4-deoxy- alpha-L-erythro-hex-4-enuronosyl groups at their non-reducing ends and alpha-L-guluronate at their reducing end.
