identifier: EC:4.2.2.3
label: "mannuronate-specific alginate lyase"
definition: >-
  Enzymatic activity — mannuronate-specific alginate lyase (EC 4.2.2.3). Catalysed reaction: Eliminative cleavage of alginate to give oligosaccharides with 4-deoxy- alpha-L-erythro-hex-4-enuronosyl groups at their non-reducing ends and beta-D-mannuronate at their reducing end.
