  Enzymatic activity — calcium/calmodulin-dependent protein kinase (EC 2.7.11.17). Catalysed reaction: (1) L-seryl-[protein] + ATP = O-phospho-L-seryl-[protein] + ADP + H(+). (2) L-threonyl-[protein] + ATP = O-phospho-L-threonyl-[protein] + ADP + H(+).
