identifier: EC:2.4.2.41
label: "xylogalacturonan beta-1,3-xylosyltransferase"
definition: >-
  Enzymatic activity — xylogalacturonan beta-1,3-xylosyltransferase (EC 2.4.2.41). Catalysed reaction: Transfers a xylosyl residue from UDP-D-xylose to a D-galactose residue in xylogalacturonan, forming a beta-1,3-D-xylosyl-D-galactose linkage.
