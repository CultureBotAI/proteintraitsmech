label: "phenacrylate decarboxylase"
definition: >-
  Enzymatic activity — phenacrylate decarboxylase (EC 4.1.1.102). Catalysed reaction: (1) (E)-4-coumarate + H(+) = 4-vinylphenol + CO2. (2) (E)-cinnamate + H(+) = styrene + CO2. (3) (E)-ferulate + H(+) = 2-methoxy-4-vinylphenol + CO2.
