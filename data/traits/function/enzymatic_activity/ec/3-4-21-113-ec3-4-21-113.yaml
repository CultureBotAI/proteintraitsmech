identifier: EC:3.4.21.113
label: "pestivirus NS3 polyprotein peptidase"
definition: >-
  Enzymatic activity — pestivirus NS3 polyprotein peptidase (EC 3.4.21.113). Catalysed reaction: Leu is conserved at position P1 for all four cleavage sites. Alanine is found at position P1' of the NS4A-NS4B cleavage site, whereas serine is found at position P1' of the NS3-NS4A, NS4B-NS5A and NS5A-NS5B cleavage sites.
