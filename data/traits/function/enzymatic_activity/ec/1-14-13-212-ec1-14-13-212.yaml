identifier: EC:1.14.13.212
label: "1,3,7-trimethyluric acid 5-monooxygenase"
definition: >-
  Enzymatic activity — 1,3,7-trimethyluric acid 5-monooxygenase (EC 1.14.13.212). Catalysed reaction: 1,3,7-trimethylurate + NADH + O2 + H(+) = 1,3,7-trimethyl-5- hydroxyisourate + NAD(+) + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
