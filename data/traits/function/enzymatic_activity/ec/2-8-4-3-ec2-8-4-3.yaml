identifier: EC:2.8.4.3
label: "tRNA-2-methylthio-N(6)-dimethylallyladenosine synthase"
definition: >-
  Enzymatic activity — tRNA-2-methylthio-N(6)-dimethylallyladenosine synthase (EC 2.8.4.3). Catalysed reaction: N(6)-dimethylallyladenosine(37) in tRNA + (sulfur carrier)-SH + AH2 + 2 S-adenosyl-L-methionine = 2-methylsulfanyl-N(6)- dimethylallyladenosine(37) in tRNA + (sulfur carrier)-H + 5'-deoxyadenosine + L-methionine + A + S-adenosyl-L-homocysteine + 2 H(+).
