  Enzymatic activity — undecaprenyl-diphosphooligosaccharide--protein glycotransferase (EC 2.4.99.19). Catalysed reaction: tritrans,heptacis-undecaprenyl diphosphooligosaccharide + [protein]-L- asparagine = tritrans,heptacis-undecaprenyl diphosphate + a glycoprotein with the oligosaccharide chain attached by N-beta-D-glycosyl linkage to protein L-asparagine.
