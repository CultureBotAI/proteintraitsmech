identifier: EC:1.11.2.4
label: "fatty-acid peroxygenase"
definition: >-
  Enzymatic activity — fatty-acid peroxygenase (EC 1.11.2.4). Catalysed reaction: (1) a 1,2-saturated fatty acid + H2O2 = a 2-hydroxy fatty acid + H2O. (2) a 2,3-saturated fatty acid + H2O2 = a 3-hydroxy fatty acid + H2O.
