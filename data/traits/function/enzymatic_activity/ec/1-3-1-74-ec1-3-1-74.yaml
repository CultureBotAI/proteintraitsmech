identifier: EC:1.3.1.74
label: "2-alkenal reductase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — 2-alkenal reductase [NAD(P)(+)] (EC 1.3.1.74). Catalysed reaction: (1) an n-alkanal + NAD(+) = an alk-2-enal + NADH + H(+). (2) an n-alkanal + NADP(+) = an alk-2-enal + NADPH + H(+).
