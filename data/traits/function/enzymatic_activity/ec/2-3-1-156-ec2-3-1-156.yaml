identifier: EC:2.3.1.156
label: "phloroisovalerophenone synthase"
definition: >-
  Enzymatic activity — phloroisovalerophenone synthase (EC 2.3.1.156). Catalysed reaction: (1) 3-methylbutanoyl-CoA + 3 malonyl-CoA + 3 H(+) = phlorisovalerophenone + 3 CO2 + 4 CoA. (2) 2-methylpropanoyl-CoA + 3 malonyl-CoA + 3 H(+) = phlorisobutanophenone + 3 CO2 + 4 CoA.
