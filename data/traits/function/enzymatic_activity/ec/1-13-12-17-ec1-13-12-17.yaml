identifier: EC:1.13.12.17
label: "dichloroarcyriaflavin A synthase"
definition: >-
  Enzymatic activity — dichloroarcyriaflavin A synthase (EC 1.13.12.17). Catalysed reaction: dichlorochromopyrrolate + 4 NADH + 4 O2 + 6 H(+) = dichloroarcyriaflavin A + 2 CO2 + 4 NAD(+) + 6 H2O.
