  Enzymatic activity — (N-acetylneuraminyl)-galactosylglucosylceramide N-acetylgalactosaminyltransferase (EC 2.4.1.92). Catalysed reaction: a ganglioside GM3 (d18:1(4E)) + UDP-N-acetyl-alpha-D-galactosamine = a ganglioside GM2 (d18:1(4E)) + UDP + H(+).
