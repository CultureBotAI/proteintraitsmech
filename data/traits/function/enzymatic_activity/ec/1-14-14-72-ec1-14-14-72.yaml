identifier: EC:1.14.14.72
label: "drimenol monooxygenase"
definition: >-
  Enzymatic activity — drimenol monooxygenase (EC 1.14.14.72). Catalysed reaction: (5S,9S,10S)-drim-7-en-11-ol + reduced [NADPH--hemoprotein reductase] + O2 = (5S,10S)-(9R)-7-drimene-11,12-diol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
definition_source: ExPASy ENZYME
