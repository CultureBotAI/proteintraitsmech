identifier: EC:2.4.1.212
label: "hyaluronan synthase"
definition: >-
  Enzymatic activity — hyaluronan synthase (EC 2.4.1.212). Catalysed reaction: (1) [hyaluronan](n) + UDP-N-acetyl-alpha-D-glucosamine = N-acetyl-beta-D- glucosaminyl-(1->4)-[hyaluronan](n) + UDP + H(+). (2) N-acetyl-beta-D-glucosaminyl-(1->4)-[hyaluronan](n) + UDP-alpha-D- glucuronate = [hyaluronan](n+1) + UDP + H(+).
