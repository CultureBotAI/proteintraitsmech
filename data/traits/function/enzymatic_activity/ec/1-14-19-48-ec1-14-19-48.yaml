  Enzymatic activity — tert-amyl alcohol desaturase (EC 1.14.19.48). Catalysed reaction: 2-methylbutan-2-ol + NADPH + O2 + H(+) = 3-hydroxy-3-methylbut-1-ene + NADP(+) + 2 H2O.
