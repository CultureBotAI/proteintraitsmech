identifier: EC:2.7.11.18
label: "[myosin light-chain] kinase"
definition: >-
  Enzymatic activity — [myosin light-chain] kinase (EC 2.7.11.18). Catalysed reaction: (1) L-seryl-[myosin light chain] + ATP = O-phospho-L-seryl-[myosin light chain] + ADP + H(+). (2) L-threonyl-[myosin light chain] + ATP = O-phospho-L-threonyl-[myosin light chain] + ADP + H(+).
