label: "pyridoxal 5'-phosphate synthase (glutamine hydrolyzing)"
definition: >-
  Enzymatic activity — pyridoxal 5'-phosphate synthase (glutamine hydrolyzing) (EC 4.3.3.6). Catalysed reaction: aldehydo-D-ribose 5-phosphate + D-glyceraldehyde 3-phosphate + L-glutamine = pyridoxal 5'-phosphate + L-glutamate + phosphate + 3 H2O + H(+).
