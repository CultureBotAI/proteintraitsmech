identifier: EC:1.1.1.43
label: "phosphogluconate 2-dehydrogenase"
definition: >-
  Enzymatic activity — phosphogluconate 2-dehydrogenase (EC 1.1.1.43). Catalysed reaction: (1) 6-phospho-D-gluconate + NADP(+) = 6-phospho-2-dehydro-D-gluconate + NADPH + H(+). (2) 6-phospho-D-gluconate + NAD(+) = 6-phospho-2-dehydro-D-gluconate + NADH + H(+).
