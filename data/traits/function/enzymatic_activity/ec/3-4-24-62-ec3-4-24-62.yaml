identifier: EC:3.4.24.62
label: magnolysin
definition: >-
  Enzymatic activity — magnolysin (EC 3.4.24.62). Catalysed reaction: Hydrolysis of polypeptides with Arg or Lys in P1 and P2, e.g. to hydrolyze pro-oxytocin at -Lys-Arg-|-Ala-Val-. The specificity further depends on the organization of a beta-turn-alpha-helix of nine or more residues containing the paired basic amino acids near the center.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
