identifier: EC:2.7.7.108
label: "protein adenylyltransferase"
definition: >-
  Enzymatic activity — protein adenylyltransferase (EC 2.7.7.108). Catalysed reaction: (1) L-seryl-[protein] + ATP = 3-O-(5'-adenylyl)-L-seryl-[protein] + diphosphate. (2) L-threonyl-[protein] + ATP = 3-O-(5'-adenylyl)-L-threonyl-[protein] + diphosphate. (3) L-tyrosyl-[protein] + ATP = O-(5'-adenylyl)-L-tyrosyl-[protein] + diphosphate.
