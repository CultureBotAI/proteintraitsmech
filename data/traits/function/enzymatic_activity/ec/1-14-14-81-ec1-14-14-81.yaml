  Enzymatic activity — flavonoid 3',5'-hydroxylase (EC 1.14.14.81). Catalysed reaction: a 3',5'-unsubstituted flavanone + 2 reduced [NADPH--hemoprotein reductase] + 2 O2 = a 3',5'-dihydroxyflavanone + 2 oxidized [NADPH- -hemoprotein reductase] + 2 H2O + 2 H(+).
