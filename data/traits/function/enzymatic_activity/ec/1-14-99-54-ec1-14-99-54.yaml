  Enzymatic activity — lytic cellulose monooxygenase (C1-hydroxylating) (EC 1.14.99.54). Catalysed reaction: [(1->4)-beta-D-glucosyl]n+m + reduced acceptor + O2 = [(1->4)-beta-D- glucosyl]m-1-(1->4)-D-glucono-1,5-lactone + [(1->4)-beta-D-glucosyl]n + acceptor + H2O.
