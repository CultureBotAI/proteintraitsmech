identifier: EC:2.1.1.137
label: "arsenite methyltransferase"
definition: >-
  Enzymatic activity — arsenite methyltransferase (EC 2.1.1.137). Catalysed reaction: (1) arsenic triglutathione + [thioredoxin]-dithiol + S-adenosyl-L- methionine + 2 H2O = methylarsonous acid + [thioredoxin]-disulfide + 3 glutathione + S-adenosyl-L-homocysteine + H(+). (2) arsenic triglutathione + 2 [thioredoxin]-dithiol + 2 S-adenosyl-L- methionine + H2O = dimethylarsinous acid + 2 [thioredoxin]-disulfide + 3 glutathione + 2 S-adenosyl-L-homocysteine + 2 H(+). (3) arsenic triglutathione + 3 [thioredoxin]-dithiol + 3 S-adenosyl-L- methionine = trimethylarsine + 3 [thioredoxin]-disulfide + 3 glutathione + 3 S-adenosyl-L-homocysteine + 3 H(+).
