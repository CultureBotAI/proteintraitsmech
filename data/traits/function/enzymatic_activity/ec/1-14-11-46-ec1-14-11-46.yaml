identifier: EC:1.14.11.46
label: "2-aminoethylphosphonate dioxygenase"
definition: >-
  Enzymatic activity — 2-aminoethylphosphonate dioxygenase (EC 1.14.11.46). Catalysed reaction: (2-aminoethyl)phosphonate + 2-oxoglutarate + O2 = (1R)-(2-amino-1- hydroxyethyl)phosphonate + succinate + CO2.
