identifier: EC:1.14.13.135
label: "1-hydroxy-2-naphthoate hydroxylase"
definition: >-
  Enzymatic activity — 1-hydroxy-2-naphthoate hydroxylase (EC 1.14.13.135). Catalysed reaction: (1) 1-hydroxy-2-naphthoate + NADH + O2 + 2 H(+) = naphthalene-1,2-diol + CO2 + NAD(+) + H2O. (2) 1-hydroxy-2-naphthoate + NADPH + O2 + 2 H(+) = naphthalene-1,2-diol + CO2 + NADP(+) + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
