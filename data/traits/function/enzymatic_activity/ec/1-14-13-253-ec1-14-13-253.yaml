  Enzymatic activity — 3-demethoxyubiquinone 3-hydroxylase (NADH) (EC 1.14.13.253). Catalysed reaction: a 5-methoxy-2-methyl-3-(all-trans-polyprenyl)benzoquinone + NADH + O2 = a 3-demethylubiquinone + NAD(+) + H2O.
