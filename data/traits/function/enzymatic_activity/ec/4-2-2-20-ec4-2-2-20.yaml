identifier: EC:4.2.2.20
label: "chondroitin-sulfate-ABC endolyase"
definition: >-
  Enzymatic activity — chondroitin-sulfate-ABC endolyase (EC 4.2.2.20). Catalysed reaction: Endolytic cleavage of (1->4)-beta-galactosaminic bonds between N-acetylgalactosamine and either D-glucuronic acid or L-iduronic acid to produce a mixture of Delta(4)-unsaturated oligosaccharides of different sizes that are ultimately degraded to Delta(4)-unsaturated tetra- and disaccharides.
