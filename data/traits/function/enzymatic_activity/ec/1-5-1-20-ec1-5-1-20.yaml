label: "methylenetetrahydrofolate reductase [NAD(P)H]"
definition: >-
  Enzymatic activity — methylenetetrahydrofolate reductase [NAD(P)H] (EC 1.5.1.20). Catalysed reaction: (1) (6S)-5-methyl-5,6,7,8-tetrahydrofolate + NADP(+) = (6R)-5,10- methylene-5,6,7,8-tetrahydrofolate + NADPH + H(+). (2) (6S)-5-methyl-5,6,7,8-tetrahydrofolate + NAD(+) = (6R)-5,10- methylene-5,6,7,8-tetrahydrofolate + NADH + H(+).
