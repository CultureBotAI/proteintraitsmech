identifier: EC:1.14.13.127
label: "3-(3-hydroxy-phenyl)propanoic acid hydroxylase"
definition: >-
  Enzymatic activity — 3-(3-hydroxy-phenyl)propanoic acid hydroxylase (EC 1.14.13.127). Catalysed reaction: (1) 3-(3-hydroxyphenyl)propanoate + NADH + O2 + H(+) = 3-(2,3- dihydroxyphenyl)propanoate + NAD(+) + H2O. (2) (2E)-3-(3-hydroxyphenyl)prop-2-enoate + NADH + O2 + H(+) = (2E)-3- (2,3-dihydroxyphenyl)prop-2-enoate + NAD(+) + H2O.
