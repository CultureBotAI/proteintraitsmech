identifier: EC:6.1.2.2
label: "nebramycin 5' synthase"
definition: >-
  Enzymatic activity — nebramycin 5' synthase (EC 6.1.2.2). Catalysed reaction: (1) tobramycin + carbamoyl phosphate + ATP + H2O = nebramycin 5' + AMP + phosphate + diphosphate + H(+). (2) kanamycin A + carbamoyl phosphate + ATP + H2O = 6''-O- carbamoylkanamycin A + AMP + phosphate + diphosphate + H(+).
