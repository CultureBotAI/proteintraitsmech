identifier: EC:2.1.1.201
label: "2-methoxy-6-polyprenyl-1,4-benzoquinol methylase"
definition: >-
  Enzymatic activity — 2-methoxy-6-polyprenyl-1,4-benzoquinol methylase (EC 2.1.1.201). Catalysed reaction: a 2-methoxy-6-(all-trans-polyprenyl)benzene-1,4-diol + S-adenosyl-L- methionine = a 5-methoxy-2-methyl-3-(all-trans-polyprenyl)benzene-1,4- diol + S-adenosyl-L-homocysteine + H(+).
