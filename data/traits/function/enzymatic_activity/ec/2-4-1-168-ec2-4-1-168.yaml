identifier: EC:2.4.1.168
label: "xyloglucan 4-glucosyltransferase"
definition: >-
  Enzymatic activity — xyloglucan 4-glucosyltransferase (EC 2.4.1.168). Catalysed reaction: Transfers a beta-D-glucosyl residue from UDP-glucose on to a glucose residue in xyloglucan, forming a beta-(1->4)-D-glucosyl-D-glucose linkage.
