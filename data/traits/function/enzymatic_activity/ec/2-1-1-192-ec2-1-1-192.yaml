identifier: EC:2.1.1.192
label: "23S rRNA (adenine(2503)-C(2))-methyltransferase"
definition: >-
  Enzymatic activity — 23S rRNA (adenine(2503)-C(2))-methyltransferase (EC 2.1.1.192). Catalysed reaction: (1) adenosine(2503) in 23S rRNA + 2 reduced [2Fe-2S]-[ferredoxin] + 2 S-adenosyl-L-methionine = 2-methyladenosine(2503) in 23S rRNA + 5'-deoxyadenosine + L-methionine + 2 oxidized [2Fe-2S]-[ferredoxin] + S-adenosyl-L-homocysteine. (2) adenosine(37) in tRNA + 2 reduced [2Fe-2S]-[ferredoxin] + 2 S-adenosyl-L-methionine = 2-methyladenosine(37) in tRNA + 5'-deoxyadenosine + L-methionine + 2 oxidized [2Fe-2S]-[ferredoxin] + S-adenosyl-L-homocysteine.
