identifier: EC:1.14.19.75
label: "very-long-chain acyl-lipid omega-9 desaturase"
definition: >-
  Enzymatic activity — very-long-chain acyl-lipid omega-9 desaturase (EC 1.14.19.75). Catalysed reaction: (1) a 1-hexacosanoyl-2-acyl-phosphoglycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a 1-[(17Z)-hexacos-17-enoyl]-2-acyl- phosphoglycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) a 1-tetracosanoyl-2-acyl-phosphoglycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a 1-[(15Z)-tetracos-15-enoyl]-2-acyl- phosphoglycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
definition_source: ExPASy ENZYME
