identifier: EC:2.5.1.21
label: "squalene synthase"
definition: >-
  Enzymatic activity — squalene synthase (EC 2.5.1.21). Catalysed reaction: (1) 2 (2E,6E)-farnesyl diphosphate + NADPH + H(+) = squalene + 2 diphosphate + NADP(+). (2) 2 (2E,6E)-farnesyl diphosphate + NADH + H(+) = squalene + 2 diphosphate + NAD(+).
