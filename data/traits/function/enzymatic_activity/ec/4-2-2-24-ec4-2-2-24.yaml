identifier: EC:4.2.2.24
label: "rhamnogalacturonan exolyase"
definition: >-
  Enzymatic activity — rhamnogalacturonan exolyase (EC 4.2.2.24). Catalysed reaction: Exotype eliminative cleavage of alpha-L-rhamnopyranosyl-(1->4)-alpha-D- galactopyranosyluronic acid bonds of rhamnogalacturonan I oligosaccharides containing alpha-L-rhamnopyranose at the reducing end and 4-deoxy-4,5-unsaturated D-galactopyranosyluronic acid at the non- reducing end. The products are the disaccharide 2-O-(4-deoxy-beta-L- threo-hex-4-enopyranuronosyl)-alpha-L-rhamnopyranose and the shortened rhamnogalacturonan oligosaccharide containing one 4-deoxy-4,5-unsaturated D-galactopyranosyluronic acid at the non-reducing end.
