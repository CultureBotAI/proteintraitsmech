label: "phosphatidylcholine--retinol O-acyltransferase"
definition: >-
  Enzymatic activity — phosphatidylcholine--retinol O-acyltransferase (EC 2.3.1.135). Catalysed reaction: all-trans-retinol--[retinol-binding protein] + a 1,2-diacyl-sn-glycero-3- phosphocholine = apo--[retinol-binding protein] + an all-trans-retinyl ester + a 2-acyl-sn-glycero-3-phosphocholine.
