  Enzymatic activity — chlorophyllide a 3(1)-hydratase (EC 4.2.1.165). Catalysed reaction: (1) 3-devinyl-3-(1-hydroxyethyl)chlorophyllide a = chlorophyllide a + H2O. (2) 3-deacetyl-3-(1-hydroxyethyl)bacteriochlorophyllide a = 3-deacetyl-3- vinylbacteriochlorophyllide a + H2O.
