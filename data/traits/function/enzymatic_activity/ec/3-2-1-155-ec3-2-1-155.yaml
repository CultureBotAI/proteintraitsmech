identifier: EC:3.2.1.155
label: "xyloglucan-specific endo-processive beta-1,4-glucanase"
definition: >-
  Enzymatic activity — xyloglucan-specific endo-processive beta-1,4-glucanase (EC 3.2.1.155). Catalysed reaction: Hydrolysis of (1->4)-D-glucosidic linkages in xyloglucans so as to successively remove oligosaccharides from the newly-formed chain end after endo-initiation on a polymer molecule.
