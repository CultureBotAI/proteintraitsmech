identifier: EC:3.2.1.6
label: "endo-1,3(4)-beta-glucanase"
definition: >-
  Enzymatic activity — endo-1,3(4)-beta-glucanase (EC 3.2.1.6). Catalysed reaction: Endohydrolysis of (1->3)- or (1->4)-linkages in beta-D-glucans when the glucose residue whose reducing group is involved in the linkage to be hydrolyzed is itself substituted at C-3.
