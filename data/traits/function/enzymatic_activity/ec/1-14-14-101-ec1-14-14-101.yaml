identifier: EC:1.14.14.101
label: "dihydrochelirubine 12-monooxygenase"
definition: >-
  Enzymatic activity — dihydrochelirubine 12-monooxygenase (EC 1.14.14.101). Catalysed reaction: dihydrochelirubine + reduced [NADPH--hemoprotein reductase] + O2 = 12-hydroxydihydrochelirubine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
