identifier: EC:1.1.1.n4
label: "(-)-trans-carveol dehydrogenase"
definition: >-
  Enzymatic activity — (-)-trans-carveol dehydrogenase (EC 1.1.1.n4). Catalysed reaction: (1) (1S,5R)-carveol + NAD(+) = (R)-carvone + NADH + H(+). (2) (1S,5S)-carveol + NAD(+) = (S)-carvone + NADH + H(+).
