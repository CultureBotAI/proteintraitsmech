identifier: EC:3.2.2.17
label: "deoxyribodipyrimidine endonucleosidase"
definition: >-
  Enzymatic activity — deoxyribodipyrimidine endonucleosidase (EC 3.2.2.17). Catalysed reaction: Cleaves the N-glycosidic bond between the 5'-pyrimidine residue in cyclobutadipyrimidine (in DNA) and the corresponding deoxy-D-ribose residue.
