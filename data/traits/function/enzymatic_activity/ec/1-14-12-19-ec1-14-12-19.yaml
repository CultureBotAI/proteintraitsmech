identifier: EC:1.14.12.19
label: "3-phenylpropanoate dioxygenase"
definition: >-
  Enzymatic activity — 3-phenylpropanoate dioxygenase (EC 1.14.12.19). Catalysed reaction: (1) 3-phenylpropanoate + NADH + O2 + H(+) = 3-(cis-5,6- dihydroxycyclohexa-1,3-dien-1-yl)propanoate + NAD(+). (2) (E)-cinnamate + NADH + O2 + H(+) = (2E)-3-(cis-5,6- dihydroxycyclohexa-1,3-dien-1-yl)prop-2-enoate + NAD(+).
