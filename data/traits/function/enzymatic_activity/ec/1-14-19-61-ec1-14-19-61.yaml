    text: >-
      Catalyses: dihydrorhizobitoxine + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = rhizobitoxine + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O
