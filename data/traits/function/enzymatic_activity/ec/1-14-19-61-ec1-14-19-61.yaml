identifier: EC:1.14.19.61
label: "dihydrorhizobitoxine desaturase"
definition: >-
  Enzymatic activity — dihydrorhizobitoxine desaturase (EC 1.14.19.61). Catalysed reaction: dihydrorhizobitoxine + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = rhizobitoxine + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
