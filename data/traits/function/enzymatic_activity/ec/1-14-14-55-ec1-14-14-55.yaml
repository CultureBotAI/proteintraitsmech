identifier: EC:1.14.14.55
label: "quinine 3-monooxygenase"
definition: >-
  Enzymatic activity — quinine 3-monooxygenase (EC 1.14.14.55). Catalysed reaction: quinine + reduced [NADPH--hemoprotein reductase] + O2 = 3-hydroxyquinine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
