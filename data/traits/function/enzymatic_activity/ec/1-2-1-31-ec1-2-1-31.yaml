identifier: EC:1.2.1.31
label: "L-aminoadipate-semialdehyde dehydrogenase"
definition: >-
  Enzymatic activity — L-aminoadipate-semialdehyde dehydrogenase (EC 1.2.1.31). Catalysed reaction: (1) (S)-2-amino-6-oxohexanoate + NADP(+) + H2O = L-2-aminoadipate + NADPH + 2 H(+). (2) (S)-2-amino-6-oxohexanoate + NAD(+) + H2O = L-2-aminoadipate + NADH + 2 H(+).
