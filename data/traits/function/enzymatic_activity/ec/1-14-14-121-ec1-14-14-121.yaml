label: "protopanaxadiol 6-hydroxylase"
definition: >-
  Enzymatic activity — protopanaxadiol 6-hydroxylase (EC 1.14.14.121). Catalysed reaction: (20S)-protopanaxadiol + reduced [NADPH--hemoprotein reductase] + O2 = (20S)-protopanaxatriol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
