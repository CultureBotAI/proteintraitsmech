identifier: EC:3.2.1.10
label: "oligo-1,6-glucosidase"
definition: >-
  Enzymatic activity — oligo-1,6-glucosidase (EC 3.2.1.10). Catalysed reaction: (1) Hydrolysis of (1->6)-alpha-D-glucosidic linkages in some oligosaccharides produced from starch and glycogen by alpha-amylase, and in isomaltose. (2) isomaltose + H2O = alpha-D-glucose + D-glucose.
