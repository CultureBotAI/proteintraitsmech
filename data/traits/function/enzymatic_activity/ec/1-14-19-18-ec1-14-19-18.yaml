identifier: EC:1.14.19.18
label: "sphingolipid 8-(E)-desaturase"
definition: >-
  Enzymatic activity — sphingolipid 8-(E)-desaturase (EC 1.14.19.18). Catalysed reaction: an N-acylsphing-4-enine + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (4E,8E)-4-sphinga-4,8-dienine ceramide + 2 Fe(III)-[cytochrome b5] + 2 H2O.
