label: "nitric oxide reductase [NAD(P)(+), nitrous oxide-forming]"
definition: >-
  Enzymatic activity — nitric oxide reductase [NAD(P)(+), nitrous oxide-forming] (EC 1.7.1.14). Catalysed reaction: (1) nitrous oxide + NAD(+) + H2O = 2 nitric oxide + NADH + H(+). (2) nitrous oxide + NADP(+) + H2O = 2 nitric oxide + NADPH + H(+).
