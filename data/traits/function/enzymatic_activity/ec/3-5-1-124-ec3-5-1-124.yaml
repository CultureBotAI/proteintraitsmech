identifier: EC:3.5.1.124
label: "protein deglycase"
definition: >-
  Enzymatic activity — protein deglycase (EC 3.5.1.124). Catalysed reaction: (1) N(omega)-(1-hydroxy-2-oxopropyl)-L-arginyl-[protein] + H2O = lactate + L-arginyl-[protein] + H(+). (2) N(6)-(1-hydroxy-2-oxopropyl)-L-lysyl-[protein] + H2O = lactate + L-lysyl-[protein] + H(+). (3) S-(1-hydroxy-2-oxopropyl)-L-cysteinyl-[protein] + H2O = lactate + L-cysteinyl-[protein] + H(+).
