identifier: EC:2.1.1.202
label: "multisite-specific tRNA:(cytosine-C(5))-methyltransferase"
definition: >-
  Enzymatic activity — multisite-specific tRNA:(cytosine-C(5))-methyltransferase (EC 2.1.1.202). Catalysed reaction: (1) cytidine(34) in tRNA precursor + S-adenosyl-L-methionine = 5-methylcytidine(34) in tRNA precursor + S-adenosyl-L-homocysteine + H(+). (2) cytidine(40) in tRNA precursor + S-adenosyl-L-methionine = 5-methylcytidine(40) in tRNA precursor + S-adenosyl-L-homocysteine + H(+). (3) cytidine(48) in tRNA + S-adenosyl-L-methionine = 5-methylcytidine(48) in tRNA + S-adenosyl-L-homocysteine + H(+). (4) cytidine(49) in tRNA + S-adenosyl-L-methionine = 5-methylcytidine(49) in tRNA + S-adenosyl-L-homocysteine + H(+).
