label: "5-phospho-D-xylono-1,4-lactonase"
definition: >-
  Enzymatic activity — 5-phospho-D-xylono-1,4-lactonase (EC 3.1.1.104). Catalysed reaction: (1) D-xylono-1,4-lactone 5-phosphate + H2O = 5-phospho-D-xylonate + H(+). (2) L-arabino-1,4-lactone 5-phosphate + H2O = 5-phospho-L-arabinonate + H(+).
