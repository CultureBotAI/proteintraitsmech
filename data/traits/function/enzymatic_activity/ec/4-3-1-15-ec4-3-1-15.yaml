identifier: EC:4.3.1.15
label: "diaminopropionate ammonia-lyase"
definition: >-
  Enzymatic activity — diaminopropionate ammonia-lyase (EC 4.3.1.15). Catalysed reaction: (1) (S)-2,3-diaminopropanoate + H2O + H(+) = pyruvate + 2 NH4(+). (2) (R)-2,3-diaminopropanoate + H2O + H(+) = pyruvate + 2 NH4(+).
