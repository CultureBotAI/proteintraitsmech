  Enzymatic activity — flavanone 3-dioxygenase (EC 1.14.11.9). Catalysed reaction: a (2S)-flavan-4-one + 2-oxoglutarate + O2 = a (2R,3R)-dihydroflavonol + succinate + CO2.
