identifier: EC:1.1.1.375
label: "L-2-hydroxycarboxylate dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — L-2-hydroxycarboxylate dehydrogenase [NAD(P)(+)] (EC 1.1.1.375). Catalysed reaction: (1) a (2S)-2-hydroxycarboxylate + NAD(+) = a 2-oxocarboxylate + NADH + H(+). (2) a (2S)-2-hydroxycarboxylate + NADP(+) = a 2-oxocarboxylate + NADPH + H(+).
