identifier: EC:1.14.14.165
label: "indole-3-carbonyl nitrile 4-hydroxylase"
definition: >-
  Enzymatic activity — indole-3-carbonyl nitrile 4-hydroxylase (EC 1.14.14.165). Catalysed reaction: indole-3-carbonyl nitrile + reduced [NADPH--hemoprotein reductase] + O2 = 4-hydroxy-indole-3-carbonyl nitrile + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
