identifier: EC:1.14.19.40
label: "hex-5-enoyl-[acyl-carrier protein] acetylenase"
definition: >-
  Enzymatic activity — hex-5-enoyl-[acyl-carrier protein] acetylenase (EC 1.14.19.40). Catalysed reaction: 5-hexenoyl-[ACP] + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = 5-hexynoyl-[ACP] + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
