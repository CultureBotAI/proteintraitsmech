identifier: EC:2.7.1.147
label: "ADP-specific glucose/glucosamine kinase"
definition: >-
  Enzymatic activity — ADP-specific glucose/glucosamine kinase (EC 2.7.1.147). Catalysed reaction: (1) D-glucose + ADP = D-glucose 6-phosphate + AMP + H(+). (2) D-glucosamine + ADP = D-glucosamine 6-phosphate + AMP + H(+).
