identifier: EC:1.14.11.10
label: "pyrimidine-deoxynucleoside 1'-dioxygenase"
definition: >-
  Enzymatic activity — pyrimidine-deoxynucleoside 1'-dioxygenase (EC 1.14.11.10). Catalysed reaction: 2'-deoxyuridine + 2-oxoglutarate + O2 = 2-deoxy-D-ribono-1,4-lactone + uracil + succinate + CO2.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
