definition: >-
  Enzymatic activity — neutrophil collagenase (EC 3.4.24.34). Catalysed reaction: Cleavage of interstitial collagens in the triple helical domain. Unlike EC 3.4.24.7, this enzyme cleaves type III collagen more slowly than type I.
