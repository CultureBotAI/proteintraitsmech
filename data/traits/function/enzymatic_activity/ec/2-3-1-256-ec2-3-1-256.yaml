identifier: EC:2.3.1.256
label: "N-terminal methionine N(alpha)-acetyltransferase NatC"
definition: >-
  Enzymatic activity — N-terminal methionine N(alpha)-acetyltransferase NatC (EC 2.3.1.256). Catalysed reaction: (1) N-terminal L-methionyl-L-leucyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-leucyl-[protein] + CoA + H(+). (2) N-terminal L-methionyl-L-isoleucyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-isoleucyl-[protein] + CoA + H(+). (3) N-terminal L-methionyl-L-phenylalanyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-phenylalanyl-[protein] + CoA + H(+). (4) N-terminal L-methionyl-L-tryptophyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-tryptophyl-[protein] + CoA + H(+). (5) N-terminal L-methionyl-L-tyrosyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-tyrosyl-[protein] + CoA + H(+).
