identifier: EC:1.1.1.232
label: "15-hydroxyicosatetraenoate dehydrogenase"
definition: >-
  Enzymatic activity — 15-hydroxyicosatetraenoate dehydrogenase (EC 1.1.1.232). Catalysed reaction: (1) (15S)-hydroxy-(5Z,8Z,11Z,13E)-eicosatetraenoate + NAD(+) = 15-oxo- (5Z,8Z,11Z,13E)-eicosatetraenoate + NADH + H(+). (2) (15S)-hydroxy-(5Z,8Z,11Z,13E)-eicosatetraenoate + NADP(+) = 15-oxo- (5Z,8Z,11Z,13E)-eicosatetraenoate + NADPH + H(+).
