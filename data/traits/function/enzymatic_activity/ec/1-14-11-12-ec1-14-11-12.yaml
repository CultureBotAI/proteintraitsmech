identifier: EC:1.14.11.12
label: "gibberellin-44 dioxygenase"
definition: >-
  Enzymatic activity — gibberellin-44 dioxygenase (EC 1.14.11.12). Catalysed reaction: gibberellin A44 + 2-oxoglutarate + O2 = gibberellin A19 + succinate + CO2 + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:1.14.11.-
synonyms:
  - synonym_text: "Gibberellin A44 oxidase"
    synonym_type: EXACT_SYNONYM
mapped_xrefs:
  - object: RHEA:16033
    mapping_source: rhea2ec
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with 2-oxoglutarate as one donor, and incorporation of one atom each of oxygen into both donors.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: gibberellin A44 + 2-oxoglutarate + O2 = gibberellin A19 + succinate + CO2 + H2O
    source: "ExPASy ENZYME"
    method: SOURCED
