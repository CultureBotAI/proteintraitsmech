label: "sirohydrochlorin cobaltochelatase"
definition: >-
  Enzymatic activity — sirohydrochlorin cobaltochelatase (EC 4.99.1.3). Catalysed reaction: (1) Co-sirohydrochlorin + 2 H(+) = sirohydrochlorin + Co(2+). (2) Co-precorrin-2 + 3 H(+) = precorrin-2 + Co(2+).
