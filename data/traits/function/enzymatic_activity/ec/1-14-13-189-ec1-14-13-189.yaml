label: "5-methyl-1-naphthoate 3-hydroxylase"
definition: >-
  Enzymatic activity — 5-methyl-1-naphthoate 3-hydroxylase (EC 1.14.13.189). Catalysed reaction: 5-methyl-1-naphthoate + NADPH + O2 + H(+) = 3-hydroxy-5-methyl-1- naphthoate + NADP(+) + H2O.
