identifier: EC:1.14.14.117
label: "aflatoxin B synthase"
definition: >-
  Enzymatic activity — aflatoxin B synthase (EC 1.14.14.117). Catalysed reaction: (1) 8-O-methylsterigmatocystin + 2 reduced [NADPH--hemoprotein reductase] + 2 O2 = aflatoxin B1 + methanol + 2 oxidized [NADPH--hemoprotein reductase] + CO2 + H2O + 2 H(+). (2) 8-O-methyldihydrosterigmatocystin + 2 reduced [NADPH--hemoprotein reductase] + 2 O2 = aflatoxin B2 + methanol + 2 oxidized [NADPH- -hemoprotein reductase] + CO2 + H2O + 2 H(+).
