definition: >-
  Enzymatic activity — aminopeptidase Ey (EC 3.4.11.20). Catalysed reaction: Differs from other aminopeptidases in broad specificity for amino acids in the P1 position and the ability to hydrolyze peptides of four or five residues that contain Pro in the P1' position.
