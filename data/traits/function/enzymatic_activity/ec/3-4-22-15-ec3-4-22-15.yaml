identifier: EC:3.4.22.15
label: "cathepsin L"
definition: >-
  Enzymatic activity — cathepsin L (EC 3.4.22.15). Catalysed reaction: Specificity close to that of papain. As compared to cathepsin B, cathepsin L exhibits higher activity toward protein substrates, but has little activity on Z-Arg-Arg-NHMec, and no peptidyl-dipeptidase activity.
