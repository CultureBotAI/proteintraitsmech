identifier: EC:1.14.15.24
label: "beta-carotene 3-hydroxylase"
definition: >-
  Enzymatic activity — beta-carotene 3-hydroxylase (EC 1.14.15.24). Catalysed reaction: all-trans-beta-carotene + 4 reduced [2Fe-2S]-[ferredoxin] + 2 O2 + 4 H(+) = all-trans-zeaxanthin + 4 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
