identifier: EC:1.14.14.116
label: "averantin hydroxylase"
definition: >-
  Enzymatic activity — averantin hydroxylase (EC 1.14.14.116). Catalysed reaction: (1) (1'S)-averantin + reduced [NADPH--hemoprotein reductase] + O2 = (1'S,5'R)-5'-hydroxyaverantin + oxidized [NADPH--hemoprotein reductase] + H2O. (2) (1'S)-averantin + reduced [NADPH--hemoprotein reductase] + O2 = (1'S,5'S)-5'-hydroxyaverantin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
