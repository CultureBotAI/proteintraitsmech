identifier: EC:1.1.1.92
label: "oxaloglycolate reductase (decarboxylating)"
definition: >-
  Enzymatic activity — oxaloglycolate reductase (decarboxylating) (EC 1.1.1.92). Catalysed reaction: (1) (R)-glycerate + CO2 + NAD(+) = 2-hydroxy-3-oxosuccinate + NADH + 2 H(+). (2) (R)-glycerate + CO2 + NADP(+) = 2-hydroxy-3-oxosuccinate + NADPH + 2 H(+).
