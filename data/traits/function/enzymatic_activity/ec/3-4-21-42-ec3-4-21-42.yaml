identifier: EC:3.4.21.42
label: "complement subcomponent C1s"
definition: >-
  Enzymatic activity — complement subcomponent C1s (EC 3.4.21.42). Catalysed reaction: Cleavage of Arg-|-Ala bond in complement component C4 to form C4a and C4b, and Lys(or Arg)-|-Lys bond in complement component C2 to form C2a and C2b: the 'classical' pathway C3 convertase.
