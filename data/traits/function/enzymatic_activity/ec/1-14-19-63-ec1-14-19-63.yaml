identifier: EC:1.14.19.63
label: "pseudobaptigenin synthase"
definition: >-
  Enzymatic activity — pseudobaptigenin synthase (EC 1.14.19.63). Catalysed reaction: (1) calycosin + reduced [NADPH--hemoprotein reductase] + O2 = pseudobaptigenin + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+). (2) pratensein + reduced [NADPH--hemoprotein reductase] + O2 = 5-hydroxypseudobaptigenin + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
