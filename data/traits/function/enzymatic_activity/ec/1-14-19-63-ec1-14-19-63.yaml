    mapping_source: rhea2ec
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with oxidation of a pair of donors resulting in the reduction of molecular oxygen to two molecules of water.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) calycosin + reduced [NADPH--hemoprotein reductase] + O2 = pseudobaptigenin + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+). (2) pratensein + reduced [NADPH--hemoprotein reductase] + O2 = 5-hydroxypseudobaptigenin + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+)
    source: "ExPASy ENZYME"
    method: SOURCED
