identifier: EC:1.14.14.90
label: "isoflavone 2'-hydroxylase"
definition: >-
  Enzymatic activity — isoflavone 2'-hydroxylase (EC 1.14.14.90). Catalysed reaction: a 2'-unsubstituted isoflavone + reduced [NADPH--hemoprotein reductase] + O2 = a 2'-hydroxyisoflavone + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
