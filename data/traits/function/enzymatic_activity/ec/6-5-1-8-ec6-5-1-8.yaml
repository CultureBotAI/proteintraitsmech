identifier: EC:6.5.1.8
label: "3'-phosphate/5'-hydroxy nucleic acid ligase"
definition: >-
  Enzymatic activity — 3'-phosphate/5'-hydroxy nucleic acid ligase (EC 6.5.1.8). Catalysed reaction: (1) a 3'-end 3'-phospho-ribonucleotide-RNA + a 5'-end dephospho- ribonucleoside-RNA + GTP = a ribonucleotidyl-ribonucleotide-RNA + GMP + diphosphate. (2) a 3'-end 2',3'-cyclophospho-ribonucleotide-RNA + a 5'-end dephospho- ribonucleoside-RNA + GTP + H2O = a ribonucleotidyl-ribonucleotide-RNA + GMP + diphosphate + H(+).
