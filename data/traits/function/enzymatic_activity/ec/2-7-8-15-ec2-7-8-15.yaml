identifier: EC:2.7.8.15
label: "UDP-N-acetylglucosamine--dolichyl-phosphate N-acetylglucosaminephosphotransferase"
definition: >-
  Enzymatic activity — UDP-N-acetylglucosamine--dolichyl-phosphate N-acetylglucosaminephosphotransferase (EC 2.7.8.15). Catalysed reaction: a di-trans,poly-cis-dolichyl phosphate + UDP-N-acetyl-alpha-D-glucosamine = an N-acetyl-alpha-D-glucosaminyl-diphospho-di-trans,poly-cis-dolichol + UMP.
