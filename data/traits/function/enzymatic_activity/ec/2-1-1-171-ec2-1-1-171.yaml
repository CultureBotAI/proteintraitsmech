  Enzymatic activity — 16S rRNA (guanine(966)-N(2))-methyltransferase (EC 2.1.1.171). Catalysed reaction: guanosine(966) in 16S rRNA + S-adenosyl-L-methionine = N(2)- methylguanosine(966) in 16S rRNA + S-adenosyl-L-homocysteine + H(+).
