identifier: EC:2.1.1.74
label: "methylenetetrahydrofolate--tRNA-(uracil(54)-C(5))-methyltransferase [NAD(P)H-oxidizing]"
definition: >-
  Enzymatic activity — methylenetetrahydrofolate--tRNA-(uracil(54)-C(5))-methyltransferase [NAD(P)H-oxidizing] (EC 2.1.1.74). Catalysed reaction: (1) uridine(54) in tRNA + (6R)-5,10-methylene-5,6,7,8-tetrahydrofolate + NADH + H(+) = 5-methyluridine(54) in tRNA + (6S)-5,6,7,8-tetrahydrofolate + NAD(+). (2) uridine(54) in tRNA + (6R)-5,10-methylene-5,6,7,8-tetrahydrofolate + NADPH + H(+) = 5-methyluridine(54) in tRNA + (6S)-5,6,7,8- tetrahydrofolate + NADP(+).
