identifier: EC:2.7.8.38
label: "archaetidylserine synthase"
definition: >-
  Enzymatic activity — archaetidylserine synthase (EC 2.7.8.38). Catalysed reaction: (1) CDP-2,3-bis-O-(geranylgeranyl)-sn-glycerol + L-serine = archaetidylserine + CMP + H(+). (2) CDP-2,3-bis-O-(phytanyl)-sn-glycerol + L-serine = 2,3-bis-O-phytanyl- sn-glycero-3-phospho-L-serine + CMP + H(+).
