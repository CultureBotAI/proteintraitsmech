identifier: EC:1.1.1.282
label: "quinate/shikimate dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — quinate/shikimate dehydrogenase [NAD(P)(+)] (EC 1.1.1.282). Catalysed reaction: (1) L-quinate + NADP(+) = 3-dehydroquinate + NADPH + H(+). (2) L-quinate + NAD(+) = 3-dehydroquinate + NADH + H(+). (3) shikimate + NADP(+) = 3-dehydroshikimate + NADPH + H(+). (4) shikimate + NAD(+) = 3-dehydroshikimate + NADH + H(+).
