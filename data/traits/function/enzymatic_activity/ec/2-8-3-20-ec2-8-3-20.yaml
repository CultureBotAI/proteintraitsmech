label: "succinyl-CoA--D-citramalate CoA-transferase"
definition: >-
  Enzymatic activity — succinyl-CoA--D-citramalate CoA-transferase (EC 2.8.3.20). Catalysed reaction: (1) (3R)-citramalate + succinyl-CoA = (3R)-citramalyl-CoA + succinate. (2) (R)-malate + succinyl-CoA = (R)-malyl-CoA + succinate.
