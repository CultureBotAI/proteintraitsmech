identifier: EC:4.2.2.n2
label: "peptidoglycan lytic endotransglycosylase"
definition: >-
  Enzymatic activity — peptidoglycan lytic endotransglycosylase (EC 4.2.2.n2). Catalysed reaction: Endolytic cleavage of the (1->4)-beta-glycosidic linkage between N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc) residues in peptidoglycan with concomitant formation of a 1,6-anhydrobond in the MurNAc residue.
