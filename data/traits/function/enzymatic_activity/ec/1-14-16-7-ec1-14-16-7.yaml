identifier: EC:1.14.16.7
label: "phenylalanine 3-monooxygenase"
definition: >-
  Enzymatic activity — phenylalanine 3-monooxygenase (EC 1.14.16.7). Catalysed reaction: (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin + L-phenylalanine + O2 = 3-hydroxy-L-phenylalanine + (4aS,6R)-4a-hydroxy-L-erythro-5,6,7,8- tetrahydrobiopterin.
