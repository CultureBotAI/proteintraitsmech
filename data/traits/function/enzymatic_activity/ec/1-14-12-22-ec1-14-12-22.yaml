identifier: EC:1.14.12.22
label: "carbazole 1,9a-dioxygenase"
definition: >-
  Enzymatic activity — carbazole 1,9a-dioxygenase (EC 1.14.12.22). Catalysed reaction: (1) 9H-carbazole + NADH + O2 + H(+) = 2'-aminobiphenyl-2,3-diol + NAD(+). (2) 9H-carbazole + NADPH + O2 + H(+) = 2'-aminobiphenyl-2,3-diol + NADP(+).
