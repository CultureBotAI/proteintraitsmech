  Enzymatic activity — berbamunine synthase (EC 1.14.19.66). Catalysed reaction: (R)-N-methylcoclaurine + (S)-N-methylcoclaurine + reduced [NADPH- -hemoprotein reductase] + O2 = berbamunine + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
