identifier: EC:2.1.1.268
label: "tRNA(Thr) (cytosine(32)-N(3))-methyltransferase"
definition: >-
  Enzymatic activity — tRNA(Thr) (cytosine(32)-N(3))-methyltransferase (EC 2.1.1.268). Catalysed reaction: (1) cytidine(32) in tRNA(Thr) + S-adenosyl-L-methionine = N(3)- methylcytidine(32) in tRNA(Thr) + S-adenosyl-L-homocysteine + H(+). (2) cytidine(32) in tRNA(Ser) + S-adenosyl-L-methionine = N(3)- methylcytidine(32) in tRNA(Ser) + S-adenosyl-L-homocysteine + H(+).
