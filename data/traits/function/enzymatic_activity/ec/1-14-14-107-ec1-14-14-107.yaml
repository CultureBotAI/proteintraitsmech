identifier: EC:1.14.14.107
label: "ent-kaurenoic acid monooxygenase"
definition: >-
  Enzymatic activity — ent-kaurenoic acid monooxygenase (EC 1.14.14.107). Catalysed reaction: ent-kaur-16-en-19-oate + 3 reduced [NADPH--hemoprotein reductase] + 3 O2 = gibberellin A12 + 3 oxidized [NADPH--hemoprotein reductase] + 4 H2O + 4 H(+).
