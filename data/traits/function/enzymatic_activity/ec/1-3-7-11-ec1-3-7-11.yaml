identifier: EC:1.3.7.11
label: "2,3-bis-O-geranylgeranyl-sn-glycero-phospholipid reductase"
definition: >-
  Enzymatic activity — 2,3-bis-O-geranylgeranyl-sn-glycero-phospholipid reductase (EC 1.3.7.11). Catalysed reaction: a 2,3-bis-O-phytanyl-sn-glycerol 1-phospholipid + 8 oxidized 2[4Fe-4S]- [ferredoxin] = a 2,3-bis-O-(geranylgeranyl)-sn-glycerol 1-phospholipid + 8 reduced 2[4Fe-4S]-[ferredoxin] + 16 H(+).
