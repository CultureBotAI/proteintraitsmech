identifier: EC:1.1.1.209
label: "3(or 17)alpha-hydroxysteroid dehydrogenase"
definition: >-
  Enzymatic activity — 3(or 17)alpha-hydroxysteroid dehydrogenase (EC 1.1.1.209). Catalysed reaction: (1) androsterone + NADP(+) = 5alpha-androstan-3,17-dione + NADPH + H(+). (2) androsterone + NAD(+) = 5alpha-androstan-3,17-dione + NADH + H(+).
