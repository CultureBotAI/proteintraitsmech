identifier: EC:1.14.19.78
label: "decanoyl-[acyl-carrier protein] acetylenase"
definition: >-
  Enzymatic activity — decanoyl-[acyl-carrier protein] acetylenase (EC 1.14.19.78). Catalysed reaction: decanoyl-[ACP] + 4 reduced [2Fe-2S]-[ferredoxin] + 2 O2 + 4 H(+) = dec-9- ynoyl-[ACP] + 4 oxidized [2Fe-2S]-[ferredoxin] + 4 H2O.
