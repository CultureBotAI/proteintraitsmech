  Enzymatic activity — medium-chain acyl-CoA dehydrogenase (EC 1.3.8.7). Catalysed reaction: a medium-chain 2,3-saturated fatty acyl-CoA + oxidized [electron-transfer flavoprotein] + H(+) = a medium-chain (2E)-enoyl-CoA + reduced [electron- transfer flavoprotein].
