identifier: EC:1.14.14.41
label: "(E)-2-methylbutanal oxime monooxygenase"
definition: >-
  Enzymatic activity — (E)-2-methylbutanal oxime monooxygenase (EC 1.14.14.41). Catalysed reaction: (1) (1E,2S)-2-methylbutanal oxime + reduced [NADPH--hemoprotein reductase] + O2 = 2-hydroxy-2-methylbutanenitrile + oxidized [NADPH- -hemoprotein reductase] + 2 H2O + H(+). (2) (E)-2-methylpropanal oxime + reduced [NADPH--hemoprotein reductase] + O2 = 2-hydroxy-2-methylpropanenitrile + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
