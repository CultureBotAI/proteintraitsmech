identifier: EC:2.1.1.332
label: "bacteriochlorophyllide d C-8(2)-methyltransferase"
definition: >-
  Enzymatic activity — bacteriochlorophyllide d C-8(2)-methyltransferase (EC 2.1.1.332). Catalysed reaction: (1) 8,12-diethyl-3-vinylbacteriochlorophyllide d + S-adenosyl-L- methionine = 12-ethyl-8-propyl-3-vinylbacteriochlorophyllide d + S-adenosyl-L-homocysteine + H(+). (2) 12-ethyl-8-propyl-3-vinylbacteriochlorophyllide d + S-adenosyl-L- methionine = 12-ethyl-8-isobutyl-3-vinylbacteriochlorophyllide d + S-adenosyl-L-homocysteine + H(+).
