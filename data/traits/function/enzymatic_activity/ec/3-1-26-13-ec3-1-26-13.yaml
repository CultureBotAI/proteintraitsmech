identifier: EC:3.1.26.13
label: "retroviral ribonuclease H"
definition: >-
  Enzymatic activity — retroviral ribonuclease H (EC 3.1.26.13). Catalysed reaction: Endohydrolysis of RNA in RNA/DNA hybrids. Three different cleavage modes: 1. sequence-specific internal cleavage of RNA. Human immunodeficiency virus type 1 and Moloney murine leukemia virus enzymes prefer to cleave the RNA strand one nucleotide away from the RNA-DNA junction. 2. RNA 5'-end directed cleavage 13-19 nucleotides from the RNA end. 3. DNA 3'-end directed cleavage 15-20 nucleotides away from the primer terminus.
