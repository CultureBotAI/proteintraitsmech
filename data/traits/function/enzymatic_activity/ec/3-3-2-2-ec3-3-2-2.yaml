identifier: EC:3.3.2.2
label: lysoplasmalogenase
definition: >-
  Enzymatic activity — lysoplasmalogenase (EC 3.3.2.2). Catalysed reaction: (1) a 1-O-(1Z-alkenyl)-sn-glycero-3-phosphocholine + H2O = a 2,3- saturated aldehyde + sn-glycerol 3-phosphocholine. (2) a 1-O-(1Z-alkenyl)-sn-glycero-3-phosphoethanolamine + H2O = a 2,3- saturated aldehyde + sn-glycero-3-phosphoethanolamine.
