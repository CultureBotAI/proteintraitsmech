identifier: EC:2.5.1.137
label: "2-acyl-4-prenylphloroglucinol 6-prenyltransferase"
definition: >-
  Enzymatic activity — 2-acyl-4-prenylphloroglucinol 6-prenyltransferase (EC 2.5.1.137). Catalysed reaction: (1) a 2-acyl-4-prenylphloroglucinol + dimethylallyl diphosphate = a 2-acyl-4,6-diprenylphloroglucinol + diphosphate. (2) a 2-acyl-4,6-diprenylphloroglucinol + dimethylallyl diphosphate = a 2-acyl-4,6,6-triprenylphloroglucinol + diphosphate.
