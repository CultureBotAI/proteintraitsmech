identifier: EC:3.4.14.6
label: dipeptidyl-dipeptidase
definition: >-
  Enzymatic activity — dipeptidyl-dipeptidase (EC 3.4.14.6). Catalysed reaction: Preferential release of dipeptides from a tetrapeptide, e.g. Ala- Gly-|-Ala-Gly. Acts more slowly on Ala-Ala-|-Ala-Ala and Gly-Gly-|-Gly- Gly.
