identifier: EC:2.2.1.11
label: "6-deoxy-5-ketofructose 1-phosphate synthase"
definition: >-
  Enzymatic activity — 6-deoxy-5-ketofructose 1-phosphate synthase (EC 2.2.1.11). Catalysed reaction: (1) beta-D-fructose 1,6-bisphosphate + methylglyoxal = 1-deoxy-D-threo- hexo-2,5-diulose 6-phosphate + D-glyceraldehyde 3-phosphate. (2) beta-D-fructose 1-phosphate + methylglyoxal = 1-deoxy-D-threo-hexo- 2,5-diulose 6-phosphate + D-glyceraldehyde.
