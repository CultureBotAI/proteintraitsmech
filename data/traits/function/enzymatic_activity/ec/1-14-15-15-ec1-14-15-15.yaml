identifier: EC:1.14.15.15
label: "cholestanetriol 26-monooxygenase"
definition: >-
  Enzymatic activity — cholestanetriol 26-monooxygenase (EC 1.14.15.15). Catalysed reaction: 5beta-cholestane-3alpha,7alpha,12alpha-triol + 6 reduced [adrenodoxin] + 3 O2 + 5 H(+) = (25R)-3alpha,7alpha,12alpha-trihydroxy-5beta-cholestan- 26-oate + 6 oxidized [adrenodoxin] + 4 H2O.
