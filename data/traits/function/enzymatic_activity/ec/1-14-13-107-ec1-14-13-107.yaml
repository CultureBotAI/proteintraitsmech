identifier: EC:1.14.13.107
label: "limonene 1,2-monooxygenase"
definition: >-
  Enzymatic activity — limonene 1,2-monooxygenase (EC 1.14.13.107). Catalysed reaction: (1) (4S)-limonene + NADPH + O2 + H(+) = limonene 1,2-epoxide + NADP(+) + H2O. (2) (4S)-limonene + NADH + O2 + H(+) = limonene 1,2-epoxide + NAD(+) + H2O. (3) (4R)-limonene + NADH + O2 + H(+) = limonene 1,2-epoxide + NAD(+) + H2O. (4) (4R)-limonene + NADPH + O2 + H(+) = limonene 1,2-epoxide + NADP(+) + H2O.
