identifier: EC:1.14.11.n4
label: "ankyrin-repeat-histidine dioxagenase"
definition: >-
  Enzymatic activity — ankyrin-repeat-histidine dioxagenase (EC 1.14.11.n4). Catalysed reaction: (1) L-histidyl-[ankyrin-repeat domain protein] + 2-oxoglutarate + O2 = (3S)-3-hydroxy-L-histidyl-[ankyrin-repeat domain protein] + succinate + CO2. (2) L-asparaginyl-[ankyrin-repeat domain protein] + 2-oxoglutarate + O2 = (3S)-3-hydroxy-L-asparaginyl-[ankyrin-repeat domain protein] + succinate + CO2. (3) L-aspartyl-[ankyrin-repeat domain protein] + 2-oxoglutarate + O2 = (3S)-3-hydroxy-L-aspartyl-[ankyrin-repeat domain protein] + succinate + CO2.
