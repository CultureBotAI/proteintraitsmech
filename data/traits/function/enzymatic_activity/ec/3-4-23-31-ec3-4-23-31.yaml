synonyms:
  - synonym_text: "Scytalidium aspartic proteinase A"
    synonym_type: EXACT_SYNONYM
definitions:
  - kind: GENERAL
    text: >-
      A hydrolase; acting on peptide bonds (peptidases); aspartic endopeptidases.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: Hydrolysis of proteins with specificity similar to that of pepsin A, but also cleaves 7-Cys(SO3H)-|-Gly-8 and 17-Leu-|-Val-18 in the B chain of insulin
    source: "ExPASy ENZYME"
    method: SOURCED
