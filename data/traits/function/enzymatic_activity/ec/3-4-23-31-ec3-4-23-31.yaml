identifier: EC:3.4.23.31
label: "scytalidopepsin A"
definition: >-
  Enzymatic activity — scytalidopepsin A (EC 3.4.23.31). Catalysed reaction: Hydrolysis of proteins with specificity similar to that of pepsin A, but also cleaves 7-Cys(SO3H)-|-Gly-8 and 17-Leu-|-Val-18 in the B chain of insulin.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
