identifier: EC:1.1.1.170
label: "3beta-hydroxysteroid-4alpha-carboxylate 3-dehydrogenase (decarboxylating)"
definition: >-
  Enzymatic activity — 3beta-hydroxysteroid-4alpha-carboxylate 3-dehydrogenase (decarboxylating) (EC 1.1.1.170). Catalysed reaction: (1) a 3beta-hydroxysteroid-4alpha-carboxylate + NADP(+) = a 3-oxosteroid + CO2 + NADPH. (2) a 3beta-hydroxysteroid-4alpha-carboxylate + NAD(+) = a 3-oxosteroid + CO2 + NADH.
definition_source: ExPASy ENZYME
