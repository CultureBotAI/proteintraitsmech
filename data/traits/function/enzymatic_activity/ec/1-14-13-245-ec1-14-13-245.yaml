identifier: EC:1.14.13.245
label: "assimilatory dimethylsulfide S-monooxygenase"
definition: >-
  Enzymatic activity — assimilatory dimethylsulfide S-monooxygenase (EC 1.14.13.245). Catalysed reaction: (1) dimethyl sulfide + NADH + O2 + H(+) = dimethyl sulfoxide + NAD(+) + H2O. (2) dimethyl sulfoxide + NADH + O2 + H(+) = dimethyl sulfone + NAD(+) + H2O.
definition_source: ExPASy ENZYME
