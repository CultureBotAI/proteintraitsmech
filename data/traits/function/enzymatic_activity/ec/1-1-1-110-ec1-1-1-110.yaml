identifier: EC:1.1.1.110
label: "aromatic 2-oxoacid reductase"
definition: >-
  Enzymatic activity — aromatic 2-oxoacid reductase (EC 1.1.1.110). Catalysed reaction: (1) (R)-3-phenyllactate + NAD(+) = 3-phenylpyruvate + NADH + H(+). (2) (2R)-2-hydroxy-3-(4-hydroxyphenyl)propanoate + NAD(+) = 3-(4-hydroxyphenyl)pyruvate + NADH + H(+). (3) 3-(indol-3-yl)lactate + NAD(+) = indole-3-pyruvate + NADH + H(+).
