identifier: EC:3.1.3.33
label: "polynucleotide 5'-phosphatase"
definition: >-
  Enzymatic activity — polynucleotide 5'-phosphatase (EC 3.1.3.33). Catalysed reaction: (1) a 5'-end 5'-phospho-ribonucleoside-RNA + H2O = a 5'-end dephospho- ribonucleoside-RNA + phosphate. (2) a 5'-end 5'-phospho-2'-deoxyribonucleoside-DNA + H2O = a 5'-end dephospho-2'-deoxyribonucleoside-DNA + phosphate.
