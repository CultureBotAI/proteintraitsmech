identifier: EC:3.4.23.18
label: "aspergillopepsin I"
definition: >-
  Enzymatic activity — aspergillopepsin I (EC 3.4.23.18). Catalysed reaction: Hydrolysis of proteins with broad specificity. Generally favors hydrophobic residues in P1 and P1', but also accepts Lys in P1, which leads to activation of trypsinogen. Does not clot milk.
