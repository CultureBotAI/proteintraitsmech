identifier: EC:1.1.1.264
label: "L-idonate 5-dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — L-idonate 5-dehydrogenase [NAD(P)(+)] (EC 1.1.1.264). Catalysed reaction: (1) L-idonate + NAD(+) = 5-dehydro-D-gluconate + NADH + H(+). (2) L-idonate + NADP(+) = 5-dehydro-D-gluconate + NADPH + H(+).
