label: "vinorine hydroxylase"
definition: >-
  Enzymatic activity — vinorine hydroxylase (EC 1.14.14.104). Catalysed reaction: vinorine + reduced [NADPH--hemoprotein reductase] + O2 = vomilenine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
