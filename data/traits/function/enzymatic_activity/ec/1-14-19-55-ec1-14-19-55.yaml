identifier: EC:1.14.19.55
label: "4-hydroxybenzoate brominase (decarboxylating)"
definition: >-
  Enzymatic activity — 4-hydroxybenzoate brominase (decarboxylating) (EC 1.14.19.55). Catalysed reaction: (1) 2 bromide + 4-hydroxybenzoate + 2 NADPH + 2 O2 + 5 H(+) = 2,4- dibromophenol + CO2 + 2 NADP(+) + 4 H2O. (2) 3,4-dihydroxybenzoate + 2 bromide + 2 NADPH + 2 O2 + 5 H(+) = 3,5- dibromobenzene-1,2-diol + CO2 + 2 NADP(+) + 4 H2O.
definition_source: ExPASy ENZYME
