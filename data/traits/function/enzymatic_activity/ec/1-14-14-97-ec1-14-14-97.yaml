identifier: EC:1.14.14.97
label: "methyltetrahydroprotoberberine 14-monooxygenase"
definition: >-
  Enzymatic activity — methyltetrahydroprotoberberine 14-monooxygenase (EC 1.14.14.97). Catalysed reaction: (1) (S)-cis-N-methylcanadine + reduced [NADPH--hemoprotein reductase] + O2 = allocryptopine + oxidized [NADPH--hemoprotein reductase] + H2O + 2 H(+). (2) (S)-cis-N-methylstylopine + reduced [NADPH--hemoprotein reductase] + O2 = protopine + oxidized [NADPH--hemoprotein reductase] + H2O + 2 H(+).
