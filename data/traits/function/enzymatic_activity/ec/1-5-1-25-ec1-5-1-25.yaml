identifier: EC:1.5.1.25
label: "thiomorpholine-carboxylate dehydrogenase"
definition: >-
  Enzymatic activity — thiomorpholine-carboxylate dehydrogenase (EC 1.5.1.25). Catalysed reaction: (1) (3R)-1,4-thiomorpholine-3-carboxylate + NADP(+) = 3,4- dehydrothiomorpholine-3-carboxylate + NADPH + 2 H(+). (2) (3R)-1,4-thiomorpholine-3-carboxylate + NAD(+) = 3,4- dehydrothiomorpholine-3-carboxylate + NADH + 2 H(+).
