  Enzymatic activity — 4alpha-methylsterol monooxygenase (EC 1.14.18.9). Catalysed reaction: 4,4-dimethyl-5alpha-cholest-7-en-3beta-ol + 6 Fe(II)-[cytochrome b5] + 3 O2 + 5 H(+) = 4alpha-carboxy-4beta-methyl-5alpha-cholest-7-ene-3beta-ol + 6 Fe(III)-[cytochrome b5] + 4 H2O.
