identifier: EC:3.4.24.77
label: snapalysin
definition: >-
  Enzymatic activity — snapalysin (EC 3.4.24.77). Catalysed reaction: Hydrolyzes proteins with a preference for Tyr or Phe in the P1' position. Has no action on amino-acid p-nitroanilides.
