identifier: EC:4.4.1.37
label: "intrinsic cysteine-dependent pyridinium-3,5-bisthiocarboxylic acid mononucleotide synthase"
definition: >-
  Enzymatic activity — intrinsic cysteine-dependent pyridinium-3,5-bisthiocarboxylic acid mononucleotide synthase (EC 4.4.1.37). Catalysed reaction: (1) pyridinium-3,5-dicarboxylate mononucleotide + [LarE protein]-L- cysteine + ATP = [LarE protein]-dehydroalanine + pyridinium-3- carboxylate-5-thiocarboxylate mononucleotide + AMP + diphosphate + H(+). (2) [LarE protein]-L-cysteine + pyridinium-3-carboxylate-5- thiocarboxylate mononucleotide + ATP = pyridinium-3,5-bisthiocarboxylate mononucleotide + [LarE protein]-dehydroalanine + AMP + diphosphate + H(+).
