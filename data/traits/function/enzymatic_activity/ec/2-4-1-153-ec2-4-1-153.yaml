identifier: EC:2.4.1.153
label: "UDP-N-acetylglucosamine--dolichyl-phosphate N-acetylglucosaminyltransferase"
definition: >-
  Enzymatic activity — UDP-N-acetylglucosamine--dolichyl-phosphate N-acetylglucosaminyltransferase (EC 2.4.1.153). Catalysed reaction: a di-trans,poly-cis-dolichyl phosphate + UDP-N-acetyl-alpha-D-glucosamine = an N-acetyl-alpha-D-glucosaminyl-phospho-di-trans,poly-cis-dolichol + UDP.
