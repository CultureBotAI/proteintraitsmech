identifier: EC:1.14.13.196
label: "L-ornithine N(5)-monooxygenase [NAD(P)H]"
definition: >-
  Enzymatic activity — L-ornithine N(5)-monooxygenase [NAD(P)H] (EC 1.14.13.196). Catalysed reaction: (1) L-ornithine + NADPH + O2 = N(5)-hydroxy-L-ornithine + NADP(+) + H2O. (2) L-ornithine + NADH + O2 = N(5)-hydroxy-L-ornithine + NAD(+) + H2O.
