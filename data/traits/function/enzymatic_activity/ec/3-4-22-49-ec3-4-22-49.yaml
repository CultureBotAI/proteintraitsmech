identifier: EC:3.4.22.49
label: separase
definition: >-
  Enzymatic activity — separase (EC 3.4.22.49). Catalysed reaction: All bonds known to be hydrolyzed by this endopeptidase have arginine in P1 and an acidic residue in P4. P6 is often occupied by an acidic residue or by a hydroxy-amino-acid residue, the phosphorylation of which enhances cleavage.
