identifier: EC:1.14.13.62
label: "4-hydroxyquinoline 3-monooxygenase"
definition: >-
  Enzymatic activity — 4-hydroxyquinoline 3-monooxygenase (EC 1.14.13.62). Catalysed reaction: quinolin-4-ol + NADH + O2 + H(+) = quinoline-3,4-diol + NAD(+) + H2O.
