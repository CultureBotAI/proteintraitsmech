identifier: EC:1.1.1.344
label: "dTDP-6-deoxy-L-talose 4-dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — dTDP-6-deoxy-L-talose 4-dehydrogenase [NAD(P)(+)] (EC 1.1.1.344). Catalysed reaction: (1) dTDP-6-deoxy-beta-L-talose + NADP(+) = dTDP-4-dehydro-beta-L-rhamnose + NADPH + H(+). (2) dTDP-6-deoxy-beta-L-talose + NAD(+) = dTDP-4-dehydro-beta-L-rhamnose + NADH + H(+).
