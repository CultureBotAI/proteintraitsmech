identifier: EC:1.3.1.122
label: "(S)-8-oxocitronellyl enol synthase"
definition: >-
  Enzymatic activity — (S)-8-oxocitronellyl enol synthase (EC 1.3.1.122). Catalysed reaction: (1) (S)-8-oxocitronellyl enol + NADP(+) = (6E)-8-oxogeranial + NADPH + H(+). (2) (S)-8-oxocitronellyl enol + NAD(+) = (6E)-8-oxogeranial + NADH + H(+).
