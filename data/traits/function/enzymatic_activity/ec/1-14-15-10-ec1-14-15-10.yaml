identifier: EC:1.14.15.10
label: "(+)-camphor 6-endo-hydroxylase"
definition: >-
  Enzymatic activity — (+)-camphor 6-endo-hydroxylase (EC 1.14.15.10). Catalysed reaction: 2 reduced [2Fe-2S]-[putidaredoxin] + (1R,4R)-camphor + O2 + 2 H(+) = (+)- 6-endo-hydroxycamphor + 2 oxidized [2Fe-2S]-[putidaredoxin] + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
