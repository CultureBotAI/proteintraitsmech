identifier: EC:3.4.21.103
label: physarolisin
definition: >-
  Enzymatic activity — physarolisin (EC 3.4.21.103). Catalysed reaction: Milk clotting activity. Preferential cleavage of 8-Gly-|-Ser-9 in B chain of insulin most rapidly, followed by 11-Leu-|-Val-12, 19-Cys(SO(3)H)-|-Gly and 24-Phe-|-Phe-25. No action on Ac-Phe-Tyr(I)2.
