identifier: EC:1.2.1.92
label: "3,6-anhydro-alpha-L-galactose dehydrogenase"
definition: >-
  Enzymatic activity — 3,6-anhydro-alpha-L-galactose dehydrogenase (EC 1.2.1.92). Catalysed reaction: (1) 3,6-anhydro-alpha-L-galactopyranose + NAD(+) + H2O = 3,6-anhydro-L- galactonate + NADH + 2 H(+). (2) 3,6-anhydro-alpha-L-galactopyranose + NADP(+) + H2O = 3,6-anhydro-L- galactonate + NADPH + 2 H(+).
