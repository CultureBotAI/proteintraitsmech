identifier: EC:3.6.1.53
label: "Mn(2+)-dependent ADP-ribose/CDP-alcohol diphosphatase"
definition: >-
  Enzymatic activity — Mn(2+)-dependent ADP-ribose/CDP-alcohol diphosphatase (EC 3.6.1.53). Catalysed reaction: (1) CDP-choline + H2O = phosphocholine + CMP + 2 H(+). (2) ADP-D-ribose + H2O = D-ribose 5-phosphate + AMP + 2 H(+).
