identifier: EC:2.3.1.258
label: "N-terminal methionine N(alpha)-acetyltransferase NatE"
definition: >-
  Enzymatic activity — N-terminal methionine N(alpha)-acetyltransferase NatE (EC 2.3.1.258). Catalysed reaction: (1) N-terminal L-methionyl-L-alanyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-alanyl-[protein] + CoA + H(+). (2) N-terminal L-methionyl-L-seryl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-seryl-[protein] + CoA + H(+). (3) N-terminal L-methionyl-L-valyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-valyl-[protein] + CoA + H(+). (4) N-terminal L-methionyl-L-threonyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-threonyl-[protein] + CoA + H(+). (5) N-terminal L-methionyl-L-lysyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-lysyl-[protein] + CoA + H(+). (6) N-terminal L-methionyl-L-leucyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-leucyl-[protein] + CoA…
