identifier: EC:1.14.13.105
label: "monocyclic monoterpene ketone monooxygenase"
definition: >-
  Enzymatic activity — monocyclic monoterpene ketone monooxygenase (EC 1.14.13.105). Catalysed reaction: (1) (1R,4S)-menthone + NADPH + O2 + H(+) = (4R,7S)-7-isopropyl-4- methyloxepan-2-one + NADP(+) + H2O. (2) dihydrocarvone + NADPH + O2 + H(+) = 4-isopropenyl-7-methyloxepan-2- one + NADP(+) + H2O. (3) dihydrocarvone + NADPH + O2 + H(+) = 6-isopropenyl-3-methyloxepan-2- one + NADP(+) + H2O. (4) 1-hydroxylimonen-2-one + NADPH + O2 = 3-isopropenyl-6-oxoheptanoate + NADP(+) + H2O.
