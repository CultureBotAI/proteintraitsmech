definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with NADH or NADPH as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) (1R,4S)-menthone + NADPH + O2 + H(+) = (4R,7S)-7-isopropyl-4- methyloxepan-2-one + NADP(+) + H2O. (2) dihydrocarvone + NADPH + O2 + H(+) = 4-isopropenyl-7-methyloxepan-2- one + NADP(+) + H2O. (3) dihydrocarvone + NADPH + O2 + H(+) = 6-isopropenyl-3-methyloxepan-2- one + NADP(+) + H2O. (4) 1-hydroxylimonen-2-one + NADPH + O2 = 3-isopropenyl-6-oxoheptanoate + NADP(+) + H2O
    source: "ExPASy ENZYME"
