label: "acyl-lipid omega-3 desaturase (cytochrome b5)"
definition: >-
  Enzymatic activity — acyl-lipid omega-3 desaturase (cytochrome b5) (EC 1.14.19.25). Catalysed reaction: a (9Z,12Z)-octadecadienoyl-containing glycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (9Z,12Z,15Z)-octadecatrienoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
