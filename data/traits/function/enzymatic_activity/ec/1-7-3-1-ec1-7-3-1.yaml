identifier: EC:1.7.3.1
label: "nitroalkane oxidase"
definition: >-
  Enzymatic activity — nitroalkane oxidase (EC 1.7.3.1). Catalysed reaction: (1) a primary nitroalkane + O2 + H2O = an aldehyde + nitrite + H2O2 + H(+). (2) a secondary nitroalkane + O2 + H2O = a ketone + nitrite + H2O2 + H(+).
