identifier: EC:3.4.24.47
label: horrilysin
definition: >-
  Enzymatic activity — horrilysin (EC 3.4.24.47). Catalysed reaction: Cleavage of only the single bond 14-Ala-|-Leu-15 in the insulin B chain, 12-Ser-|-Leu-13 in the A chain, and Ile-|-Gly, Pro-|-Ala, and Ser-|-Trp in mellitin.
