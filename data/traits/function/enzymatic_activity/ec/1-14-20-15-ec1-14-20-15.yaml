identifier: EC:1.14.20.15
label: "L-threonyl-[L-threonyl-carrier protein] 4-chlorinase"
definition: >-
  Enzymatic activity — L-threonyl-[L-threonyl-carrier protein] 4-chlorinase (EC 1.14.20.15). Catalysed reaction: L-threonyl-[peptidyl-carrier protein] + chloride + 2-oxoglutarate + O2 + H(+) = 4-chloro-L-threonyl-[peptidyl-carrier protein] + succinate + CO2 + H2O.
