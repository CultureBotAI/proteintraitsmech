identifier: EC:1.14.14.96
label: "5-O-(4-coumaroyl)-D-quinate 3'-monooxygenase"
definition: >-
  Enzymatic activity — 5-O-(4-coumaroyl)-D-quinate 3'-monooxygenase (EC 1.14.14.96). Catalysed reaction: trans-5-O-(4-coumaroyl)-D-quinate + reduced [NADPH--hemoprotein reductase] + O2 = 5-O-[(E)-caffeoyl]-D-quinate + oxidized [NADPH- -hemoprotein reductase] + H2O + H(+).
