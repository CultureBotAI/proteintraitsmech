label: "2-methoxy-6-polyprenylphenol 4-hydroxylase"
definition: >-
  Enzymatic activity — 2-methoxy-6-polyprenylphenol 4-hydroxylase (EC 1.14.15.46). Catalysed reaction: a 2-methoxy-6-(all-trans-polyprenyl)phenol + 2 reduced [2Fe-2S]- [ferredoxin] + O2 + 2 H(+) = a 2-methoxy-6-(all-trans-polyprenyl)benzene- 1,4-diol + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O.
