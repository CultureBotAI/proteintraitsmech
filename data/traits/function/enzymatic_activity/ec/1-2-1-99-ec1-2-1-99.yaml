identifier: EC:1.2.1.99
label: "4-(gamma-glutamylamino)butanal dehydrogenase"
definition: >-
  Enzymatic activity — 4-(gamma-glutamylamino)butanal dehydrogenase (EC 1.2.1.99). Catalysed reaction: (1) 4-(gamma-L-glutamylamino)butanal + NAD(+) + H2O = 4-(gamma-L- glutamylamino)butanoate + NADH + 2 H(+). (2) 4-(gamma-L-glutamylamino)butanal + NADP(+) + H2O = 4-(gamma-L- glutamylamino)butanoate + NADPH + 2 H(+).
