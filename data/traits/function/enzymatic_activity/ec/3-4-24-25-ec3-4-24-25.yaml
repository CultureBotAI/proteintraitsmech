identifier: EC:3.4.24.25
label: vibriolysin
definition: >-
  Enzymatic activity — vibriolysin (EC 3.4.24.25). Catalysed reaction: Preferential cleavage of bonds with bulky hydrophobic groups in P2 and P1'. Phe at P1' is the most favored residue, which distinguished this enzyme from thermolysin.
