identifier: EC:5.5.1.24
label: "tocopherol cyclase"
definition: >-
  Enzymatic activity — tocopherol cyclase (EC 5.5.1.24). Catalysed reaction: (1) delta-tocopherol = 2-methyl-6-phytyl-1,4-benzene-1,4-diol. (2) gamma-tocopherol = 2,3-dimethyl-6-phytylbenzene-1,4-diol. (3) delta-tocotrienol = 6-geranylgeranyl-2-methylbenzene-1,4-diol. (4) gamma-tocotrienol = 6-geranylgeranyl-2,3-dimethylbenzene-1,4-diol.
