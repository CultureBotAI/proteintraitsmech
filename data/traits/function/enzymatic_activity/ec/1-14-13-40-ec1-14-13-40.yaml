label: "anthraniloyl-CoA monooxygenase"
definition: >-
  Enzymatic activity — anthraniloyl-CoA monooxygenase (EC 1.14.13.40). Catalysed reaction: (1) anthraniloyl-CoA + 2 NADPH + O2 + 2 H(+) = 2-amino-5-oxocyclohex-1- enecarbonyl-CoA + 2 NADP(+) + H2O. (2) anthraniloyl-CoA + 2 NADH + O2 + 2 H(+) = 2-amino-5-oxocyclohex-1- enecarbonyl-CoA + 2 NAD(+) + H2O.
