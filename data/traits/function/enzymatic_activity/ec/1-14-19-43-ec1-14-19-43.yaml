label: "palmitoyl-[glycerolipid] 3-(E)-desaturase"
definition: >-
  Enzymatic activity — palmitoyl-[glycerolipid] 3-(E)-desaturase (EC 1.14.19.43). Catalysed reaction: a 1-acyl-2-hexadecanoyl-glycerolipid + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = a 1-acyl-2-[(3E)-hexadec-3-enoyl]-glycerolipid + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
