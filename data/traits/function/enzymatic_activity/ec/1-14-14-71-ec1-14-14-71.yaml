identifier: EC:1.14.14.71
label: "cucurbitadienol 11-hydroxylase"
definition: >-
  Enzymatic activity — cucurbitadienol 11-hydroxylase (EC 1.14.14.71). Catalysed reaction: cucurbitadienol + 2 reduced [NADPH--hemoprotein reductase] + 2 O2 = 11-oxocucurbitadienol + 2 oxidized [NADPH--hemoprotein reductase] + 3 H2O + 2 H(+).
