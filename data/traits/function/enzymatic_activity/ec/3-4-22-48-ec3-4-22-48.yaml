identifier: EC:3.4.22.48
label: staphopain
definition: >-
  Enzymatic activity — staphopain (EC 3.4.22.48). Catalysed reaction: Broad endopeptidase action on proteins including elastin, but rather limited hydrolysis of small-molecule substrates. Assays are conveniently made with hemoglobin, casein or Z-Phe-Arg-NHMec as substrate.
