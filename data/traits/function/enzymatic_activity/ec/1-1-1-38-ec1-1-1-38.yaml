identifier: EC:1.1.1.38
label: "malate dehydrogenase (oxaloacetate-decarboxylating)"
definition: >-
  Enzymatic activity — malate dehydrogenase (oxaloacetate-decarboxylating) (EC 1.1.1.38). Catalysed reaction: (1) (S)-malate + NAD(+) = pyruvate + CO2 + NADH. (2) oxaloacetate + H(+) = pyruvate + CO2.
