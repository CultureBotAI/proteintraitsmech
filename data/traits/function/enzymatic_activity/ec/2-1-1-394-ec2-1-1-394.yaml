identifier: EC:2.1.1.394
label: "2-(S-pantetheinyl)-carbapenam-3-carboxylate methyltransferase"
definition: >-
  Enzymatic activity — 2-(S-pantetheinyl)-carbapenam-3-carboxylate methyltransferase (EC 2.1.1.394). Catalysed reaction: (1) (2R,3R,5R)-2-(S-pantetheinyl)-carbapenam-3-carboxylate + AH2 + 2 S-adenosyl-L-methionine = (2R,3R,5S,6R)-6-(methyl)-2-(S-pantetheinyl)- carbapenam-3-carboxylate + 5'-deoxyadenosine + L-methionine + A + S-adenosyl-L-homocysteine + 2 H(+). (2) (2R,3R,5S,6R)-6-(methyl)-2-(S-pantetheinyl)-carbapenam-3-carboxylate + AH2 + 2 S-adenosyl-L-methionine = (2R,3R,5S,6R)-6-(ethyl)-2- (S-pantetheinyl)-carbapenam-3-carboxylate + 5'-deoxyadenosine + L-methionine + A + S-adenosyl-L-homocysteine + 2 H(+).
