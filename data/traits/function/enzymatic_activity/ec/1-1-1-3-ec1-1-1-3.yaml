identifier: EC:1.1.1.3
label: "homoserine dehydrogenase"
definition: >-
  Enzymatic activity — homoserine dehydrogenase (EC 1.1.1.3). Catalysed reaction: (1) L-homoserine + NAD(+) = L-aspartate 4-semialdehyde + NADH + H(+). (2) L-homoserine + NADP(+) = L-aspartate 4-semialdehyde + NADPH + H(+).
