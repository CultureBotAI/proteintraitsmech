identifier: EC:1.14.19.44
label: "acyl-CoA (8-3)-desaturase"
definition: >-
  Enzymatic activity — acyl-CoA (8-3)-desaturase (EC 1.14.19.44). Catalysed reaction: (1) (8Z,11Z,14Z)-eicosatrienoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (5Z,8Z,11Z,14Z)-eicosatetraenoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) (8Z,11Z,14Z,17Z)-eicosatetraenoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (5Z,8Z,11Z,14Z,17Z)-eicosapentaenoyl-CoA + 2 Fe(III)- [cytochrome b5] + 2 H2O.
