identifier: EC:1.14.15.25
label: "p-cymene methyl-monooxygenase"
definition: >-
  Enzymatic activity — p-cymene methyl-monooxygenase (EC 1.14.15.25). Catalysed reaction: p-cymene + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = 4-isopropylbenzyl alcohol + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:1.14.15.-
synonyms:
  - synonym_text: "p-cymene methyl hydroxylase"
    synonym_type: EXACT_SYNONYM
mapped_xrefs:
  - object: GO:0018694
    mapping_source: ec2go
  - object: RHEA:51604
    mapping_source: rhea2ec
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced iron-sulfur protein as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: p-cymene + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = 4-isopropylbenzyl alcohol + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O
    source: "ExPASy ENZYME"
    method: SOURCED
