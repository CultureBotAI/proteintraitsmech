identifier: EC:7.4.2.12
label: "ABC-type cystine transporter"
definition: >-
  Enzymatic activity — ABC-type cystine transporter (EC 7.4.2.12). Catalysed reaction: (1) L-cystine(out) + ATP + H2O = L-cystine(in) + ADP + phosphate + H(+). (2) D-cystine(out) + ATP + H2O = D-cystine(in) + ADP + phosphate + H(+).
