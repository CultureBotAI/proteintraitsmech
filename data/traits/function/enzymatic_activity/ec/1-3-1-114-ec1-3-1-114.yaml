identifier: EC:1.3.1.114
label: "3-dehydro-bile acid Delta(4,6)-reductase"
definition: >-
  Enzymatic activity — 3-dehydro-bile acid Delta(4,6)-reductase (EC 1.3.1.114). Catalysed reaction: (1) 3-oxocholan-24-oyl-CoA + NAD(+) = 3-oxochol-4-en-24-oyl-CoA + NADH + H(+). (2) 3-oxochol-4-en-24-oyl-CoA + NAD(+) = 3-oxochol-4,6-dien-24-oyl-CoA + NADH + H(+). (3) 12alpha-hydroxy-3-oxocholan-24-oyl-CoA + NAD(+) = 12alpha-hydroxy-3- oxochol-4-en-24-oyl-CoA + NADH + H(+). (4) 12alpha-hydroxy-3-oxochol-4-en-24-oyl-CoA + NAD(+) = 12alpha-hydroxy- 3-oxochola-4,6-dien-24-oyl-CoA + NADH + H(+).
