identifier: EC:1.14.99.34
label: "monoprenyl isoflavone epoxidase"
definition: >-
  Enzymatic activity — monoprenyl isoflavone epoxidase (EC 1.14.99.34). Catalysed reaction: 7-O-methylluteone + NADPH + H(+) + O2 = dihydrofurano derivatives + NADP(+) + H2O.
