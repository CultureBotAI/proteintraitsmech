identifier: EC:1.14.18.6
label: "4-hydroxysphinganine ceramide fatty acyl 2-hydroxylase"
definition: >-
  Enzymatic activity — 4-hydroxysphinganine ceramide fatty acyl 2-hydroxylase (EC 1.14.18.6). Catalysed reaction: (1) an N-(1,2 saturated acyl)-(4R)-hydroxysphinganine + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = an N-(2R-hydroxyacyl)- 4R-hydroxysphinganine + 2 Fe(III)-[cytochrome b5] + H2O. (2) an N-(1,2 saturated very-long-chain fatty acyl)-(R)-4- hydroxysphingoid base + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = an N-(2R-hydroxy-very-long-chain fatty acyl)-(R)-4-hydroxysphingoid base + 2 Fe(III)-[cytochrome b5] + H2O.
