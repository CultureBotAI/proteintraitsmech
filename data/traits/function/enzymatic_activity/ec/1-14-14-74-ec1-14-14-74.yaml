identifier: EC:1.14.14.74
label: "albendazole monooxygenase (hydroxylating)"
definition: >-
  Enzymatic activity — albendazole monooxygenase (hydroxylating) (EC 1.14.14.74). Catalysed reaction: albendazole + reduced [NADPH--hemoprotein reductase] + O2 = hydroxyalbendazole + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
