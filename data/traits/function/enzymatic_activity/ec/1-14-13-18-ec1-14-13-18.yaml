identifier: EC:1.14.13.18
label: "4-hydroxyphenylacetate 1-monooxygenase"
definition: >-
  Enzymatic activity — 4-hydroxyphenylacetate 1-monooxygenase (EC 1.14.13.18). Catalysed reaction: (1) 4-hydroxyphenylacetate + NADPH + O2 + H(+) = homogentisate + NADP(+) + H2O. (2) 4-hydroxyphenylacetate + NADH + O2 + H(+) = homogentisate + NAD(+) + H2O.
