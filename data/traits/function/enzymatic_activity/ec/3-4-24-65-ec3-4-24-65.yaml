  Enzymatic activity — macrophage elastase (EC 3.4.24.65). Catalysed reaction: Hydrolysis of soluble and insoluble elastin. Specific cleavages are also produced at 14-Ala-|-Leu-15 and 16-Tyr-|-Leu-17 in the B chain of insulin.
