identifier: EC:1.1.1.213
label: "3alpha-hydroxysteroid dehydrogenase (Re-specific)"
definition: >-
  Enzymatic activity — 3alpha-hydroxysteroid dehydrogenase (Re-specific) (EC 1.1.1.213). Catalysed reaction: (1) a 3alpha-hydroxysteroid + NAD(+) = a 3-oxosteroid + NADH + H(+). (2) a 3alpha-hydroxysteroid + NADP(+) = a 3-oxosteroid + NADPH + H(+).
