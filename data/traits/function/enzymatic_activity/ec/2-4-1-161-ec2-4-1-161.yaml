identifier: EC:2.4.1.161
label: "oligosaccharide 4-alpha-D-glucosyltransferase"
definition: >-
  Enzymatic activity — oligosaccharide 4-alpha-D-glucosyltransferase (EC 2.4.1.161). Catalysed reaction: Transfers the non-reducing terminal alpha-D-glucose residue from a (1->4)-alpha-D-glucan to the 4-position of a free glucose or of a glucosyl residue at the non-reducing terminus of a (1->4)-alpha-D-glucan, thus bringing about the rearrangement of oligosaccharides.
