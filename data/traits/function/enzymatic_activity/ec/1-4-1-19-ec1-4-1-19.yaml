identifier: EC:1.4.1.19
label: "tryptophan dehydrogenase"
definition: >-
  Enzymatic activity — tryptophan dehydrogenase (EC 1.4.1.19). Catalysed reaction: (1) L-tryptophan + NAD(+) + H2O = indole-3-pyruvate + NH4(+) + NADH + H(+). (2) L-tryptophan + NADP(+) + H2O = indole-3-pyruvate + NH4(+) + NADPH + H(+).
