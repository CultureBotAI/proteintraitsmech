identifier: EC:1.14.13.187
label: "L-evernosamine nitrososynthase"
definition: >-
  Enzymatic activity — L-evernosamine nitrososynthase (EC 1.14.13.187). Catalysed reaction: dTDP-beta-L-evernosamine + 2 NADPH + 2 O2 + H(+) = dTDP-2,3,6-trideoxy-3- C-methyl-4-O-methyl-3-nitroso-beta-L-arabino-hexopyranose + 2 NADP(+) + 3 H2O.
