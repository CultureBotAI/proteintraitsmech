identifier: EC:3.1.4.54
label: "N-acetylphosphatidylethanolamine-hydrolyzing phospholipase D"
definition: >-
  Enzymatic activity — N-acetylphosphatidylethanolamine-hydrolyzing phospholipase D (EC 3.1.4.54). Catalysed reaction: an N-acyl-1,2-diacyl-sn-glycero-3-phosphoethanolamine + H2O = an N-acylethanolamine + a 1,2-diacyl-sn-glycero-3-phosphate + H(+).
