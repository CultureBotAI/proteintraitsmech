identifier: EC:1.14.13.161
label: "(+)-camphor 6-exo-hydroxylase"
definition: >-
  Enzymatic activity — (+)-camphor 6-exo-hydroxylase (EC 1.14.13.161). Catalysed reaction: (1R,4R)-camphor + NADPH + O2 + H(+) = (+)-6-exo-hydroxycamphor + NADP(+) + H2O.
