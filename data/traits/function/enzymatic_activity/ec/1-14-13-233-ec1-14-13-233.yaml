label: "4-hydroxy-6-methylpretetramide 12a-monooxygenase"
definition: >-
  Enzymatic activity — 4-hydroxy-6-methylpretetramide 12a-monooxygenase (EC 1.14.13.233). Catalysed reaction: 4-hydroxy-6-methylpretetramide + NADPH + O2 = 4-dedimethylamino-4-oxo- anhydrotetracycline + NADP(+) + H2O.
