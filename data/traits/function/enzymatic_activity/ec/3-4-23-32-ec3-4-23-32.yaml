  Enzymatic activity — scytalidopepsin B (EC 3.4.23.32). Catalysed reaction: Hydrolysis of proteins with broad specificity, cleaving 24-Phe-|-Phe-25, but not 15-Leu-|-Tyr-16 and 25-Phe-|-Tyr-26 in the B chain of insulin.
