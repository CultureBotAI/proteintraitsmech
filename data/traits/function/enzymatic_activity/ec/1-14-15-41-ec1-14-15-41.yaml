identifier: EC:1.14.15.41
label: "L-tryptophan 4-nitrase"
definition: >-
  Enzymatic activity — L-tryptophan 4-nitrase (EC 1.14.15.41). Catalysed reaction: nitric oxide + L-tryptophan + reduced [2Fe-2S]-[ferredoxin] + O2 + H(+) = 4-nitro-L-tryptophan zwitterion + oxidized [2Fe-2S]-[ferredoxin] + H2O.
