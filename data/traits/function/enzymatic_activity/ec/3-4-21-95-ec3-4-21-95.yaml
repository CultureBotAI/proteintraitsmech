identifier: EC:3.4.21.95
label: "snake venom factor V activator"
definition: >-
  Enzymatic activity — snake venom factor V activator (EC 3.4.21.95). Catalysed reaction: Fully activates human clotting factor V by a single cleavage at the 1545- Trp-Tyr-Leu-Arg-|-Ser-Asn-Asn-Gly-1552 bond. Cattle, but not rabbit, factor V is cleaved, and no other proteins of the clotting system are attacked. Esterase activity is observed on Bz-Arg-OEt and Tos-Arg-OMe, and amidase activity on Phe-pipecolyl-Arg-NHPhNO2.
