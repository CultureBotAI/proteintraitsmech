identifier: EC:3.4.24.83
label: "anthrax lethal factor endopeptidase"
definition: >-
  Enzymatic activity — anthrax lethal factor endopeptidase (EC 3.4.24.83). Catalysed reaction: Preferred amino acids around the cleavage site can be denoted BBBBxHx-|-H, in which B denotes Arg or Lys, H denotes a hydrophobic amino acid, and x is any amino acid. The only known protein substrates are mitogen-activated protein (MAP) kinase kinases.
