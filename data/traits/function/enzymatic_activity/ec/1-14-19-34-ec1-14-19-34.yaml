identifier: EC:1.14.19.34
label: "acyl-lipid (9+3)-(E)-desaturase"
definition: >-
  Enzymatic activity — acyl-lipid (9+3)-(E)-desaturase (EC 1.14.19.34). Catalysed reaction: (1) a (9Z)-octadecenoyl-containing glycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (9Z,12E)-octadecadienoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) a (9Z)-hexadecenoyl-containing glycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (9Z,12E)-hexadecadienoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
