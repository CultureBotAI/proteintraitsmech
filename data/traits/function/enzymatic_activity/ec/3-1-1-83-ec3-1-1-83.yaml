identifier: EC:3.1.1.83
label: "monoterpene epsilon-lactone hydrolase"
definition: >-
  Enzymatic activity — monoterpene epsilon-lactone hydrolase (EC 3.1.1.83). Catalysed reaction: (1) 4-isopropenyl-7-methyloxepan-2-one + H2O = 6-hydroxy-3- isopropenylheptanoate + H(+). (2) 7-isopropyl-4-methyloxepan-2-one + H2O = 6-hydroxy-3,7- dimethyloctanoate + H(+).
