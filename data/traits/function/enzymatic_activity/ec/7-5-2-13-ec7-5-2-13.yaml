identifier: EC:7.5.2.13
label: "ABC-type D-xylose/L-arabinose transporter"
definition: >-
  Enzymatic activity — ABC-type D-xylose/L-arabinose transporter (EC 7.5.2.13). Catalysed reaction: (1) D-xylose(out) + ATP + H2O = D-xylose(in) + ADP + phosphate + H(+). (2) L-arabinose(out) + ATP + H2O = L-arabinose(in) + ADP + phosphate + H(+).
