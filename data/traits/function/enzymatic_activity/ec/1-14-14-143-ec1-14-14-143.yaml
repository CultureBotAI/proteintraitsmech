  Enzymatic activity — (+)-menthofuran synthase (EC 1.14.14.143). Catalysed reaction: (R)-pulegone + reduced [NADPH--hemoprotein reductase] + O2 = (R)- menthofuran + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
