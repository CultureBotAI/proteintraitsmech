identifier: EC:2.4.1.37
label: "fucosylgalactoside 3-alpha-galactosyltransferase"
definition: >-
  Enzymatic activity — fucosylgalactoside 3-alpha-galactosyltransferase (EC 2.4.1.37). Catalysed reaction: an alpha-L-fucosyl-(1->2)-beta-D-galactosyl derivative + UDP-alpha-D- galactose = an alpha-D-galactosyl-(1->3)-[alpha-L-fucosyl-(1->2)]-beta-D- galactosyl derivative + UDP + H(+).
