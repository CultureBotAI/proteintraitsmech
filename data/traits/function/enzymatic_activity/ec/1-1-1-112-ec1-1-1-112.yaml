identifier: EC:1.1.1.112
label: "indanol dehydrogenase"
definition: >-
  Enzymatic activity — indanol dehydrogenase (EC 1.1.1.112). Catalysed reaction: (1) (S)-indan-1-ol + NAD(+) = indan-1-one + NADH + H(+). (2) (S)-indan-1-ol + NADP(+) = indan-1-one + NADPH + H(+).
