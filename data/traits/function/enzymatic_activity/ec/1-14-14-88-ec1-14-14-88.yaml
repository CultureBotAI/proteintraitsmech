  Enzymatic activity — isoflavone 3'-hydroxylase (EC 1.14.14.88). Catalysed reaction: formononetin + reduced [NADPH--hemoprotein reductase] + O2 = calycosin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
