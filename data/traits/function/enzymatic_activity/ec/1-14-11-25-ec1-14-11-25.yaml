identifier: EC:1.14.11.25
label: "mugineic-acid 3-dioxygenase"
definition: >-
  Enzymatic activity — mugineic-acid 3-dioxygenase (EC 1.14.11.25). Catalysed reaction: (1) mugineate + 2-oxoglutarate + O2 = 3-epihydroxymugineate + succinate + CO2 + H(+). (2) 2'-deoxymugineate + 2-oxoglutarate + O2 = 3-epihydroxy- 2'-deoxymugineate + succinate + CO2 + H(+).
