identifier: EC:3.2.1.174
label: "rhamnogalacturonan rhamnohydrolase"
definition: >-
  Enzymatic activity — rhamnogalacturonan rhamnohydrolase (EC 3.2.1.174). Catalysed reaction: Exohydrolysis of the alpha-L-Rha-(1->4)-alpha-D-GalA bond in rhamnogalacturonan oligosaccharides with initial inversion of configuration releasing beta-L-rhamnose from the non-reducing end of rhamnogalacturonan oligosaccharides.
