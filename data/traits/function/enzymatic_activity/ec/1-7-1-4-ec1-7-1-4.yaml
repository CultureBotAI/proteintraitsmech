identifier: EC:1.7.1.4
label: "nitrite reductase [NAD(P)H]"
definition: >-
  Enzymatic activity — nitrite reductase [NAD(P)H] (EC 1.7.1.4). Catalysed reaction: (1) NH4(+) + 3 NAD(+) + 2 H2O = nitrite + 3 NADH + 5 H(+). (2) NH4(+) + 3 NADP(+) + 2 H2O = nitrite + 3 NADPH + 5 H(+).
