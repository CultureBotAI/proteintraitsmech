identifier: EC:1.14.14.170
label: "8-epi-inunolide synthase"
definition: >-
  Enzymatic activity — 8-epi-inunolide synthase (EC 1.14.14.170). Catalysed reaction: germacra-1(10),4,11(13)-trien-12-oate + reduced [NADPH--hemoprotein reductase] + O2 = 8-epi-inunolide + oxidized [NADPH--hemoprotein reductase] + 2 H2O.
