identifier: EC:2.1.5.1
label: "sesamin methylene transferase"
definition: >-
  Enzymatic activity — sesamin methylene transferase (EC 2.1.5.1). Catalysed reaction: (1) (+)-sesamin + (6S)-5,6,7,8-tetrahydrofolyl-(gamma-L-Glu)(n) = (+)- sesamin monocatechol + (6R)-5,10-methylenetetrahydrofolyl-(gamma-L- Glu)(n). (2) (+)-sesamin monocatechol + (6S)-5,6,7,8-tetrahydrofolyl-(gamma-L- Glu)(n) = (+)-sesamin dicatechol + (6R)-5,10-methylenetetrahydrofolyl- (gamma-L-Glu)(n).
