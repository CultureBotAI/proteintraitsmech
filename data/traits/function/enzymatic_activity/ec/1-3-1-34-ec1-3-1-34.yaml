identifier: EC:1.3.1.34
label: "2,4-dienoyl-CoA reductase [(2E)-enoyl-CoA-producing]"
definition: >-
  Enzymatic activity — 2,4-dienoyl-CoA reductase [(2E)-enoyl-CoA-producing] (EC 1.3.1.34). Catalysed reaction: (1) a 4,5-saturated-(2E)-enoyl-CoA + NADP(+) = a (2E,4E)-dienoyl-CoA + NADPH + H(+). (2) a (2E,4Z)-dienoyl-CoA + NADPH + H(+) = a 4,5-saturated-(2E)-enoyl-CoA + NADP(+).
