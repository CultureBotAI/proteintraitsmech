identifier: EC:1.1.1.322
label: "(-)-endo-fenchol dehydrogenase"
definition: >-
  Enzymatic activity — (-)-endo-fenchol dehydrogenase (EC 1.1.1.322). Catalysed reaction: (1) (1S,2S,4R)-endo-fenchol + NAD(+) = (1S,4R)-fenchone + NADH + H(+). (2) (1S,2S,4R)-endo-fenchol + NADP(+) = (1S,4R)-fenchone + NADPH + H(+).
