identifier: EC:1.14.14.129
label: "long-chain acyl-CoA omega-monooxygenase"
definition: >-
  Enzymatic activity — long-chain acyl-CoA omega-monooxygenase (EC 1.14.14.129). Catalysed reaction: (1) (9Z)-octadecenoyl-CoA + reduced [NADPH--hemoprotein reductase] + O2 = (9Z)-18-hydroxyoctadecenoyl-CoA + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) (9Z,12Z)-octadecadienoyl-CoA + reduced [NADPH--hemoprotein reductase] + O2 = (9Z,12Z)-18-hydroxyoctadecadienoyl-CoA + oxidized [NADPH- -hemoprotein reductase] + H2O + H(+).
