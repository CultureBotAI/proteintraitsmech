identifier: EC:1.1.1.153
label: "sepiapterin reductase (L-erythro-7,8-dihydrobiopterin forming)"
definition: >-
  Enzymatic activity — sepiapterin reductase (L-erythro-7,8-dihydrobiopterin forming) (EC 1.1.1.153). Catalysed reaction: (1) L-erythro-7,8-dihydrobiopterin + NADP(+) = L-sepiapterin + NADPH + H(+). (2) (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin + 2 NADP(+) = 6-pyruvoyl- 5,6,7,8-tetrahydropterin + 2 NADPH + 2 H(+).
