identifier: EC:2.3.1.265
label: "phosphatidylinositol dimannoside acyltransferase"
definition: >-
  Enzymatic activity — phosphatidylinositol dimannoside acyltransferase (EC 2.3.1.265). Catalysed reaction: (1) a 2,6-O-bis(alpha-D-mannopyranosyl)-1-phosphatidyl-1D-myo-inositol + an acyl-CoA = a 2-O-(alpha-D-mannosyl)-6-O-(6-O-acyl-alpha-D-mannosyl)-1- phosphatidyl-1D-myo-inositol + CoA. (2) a 1,2-diacyl-sn-glycero-3-phospho-[alpha-D-mannopyranosyl-(1<->6)-D- myo-inositol] + an acyl-CoA = a 1,2-diacyl-sn-glycero-3-phospho-[alpha-D- 6-acyl-mannopyranosyl-(1<->6)-D-myo-inositol] + CoA.
