identifier: EC:1.1.1.256
label: "fluoren-9-ol dehydrogenase"
definition: >-
  Enzymatic activity — fluoren-9-ol dehydrogenase (EC 1.1.1.256). Catalysed reaction: (1) 9H-fluoren-9-ol + NADP(+) = 9H-fluoren-9-one + NADPH + H(+). (2) 9H-fluoren-9-ol + NAD(+) = 9H-fluoren-9-one + NADH + H(+).
