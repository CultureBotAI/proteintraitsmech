label: "dynein ATPase"
definition: >-
  Enzymatic activity — dynein ATPase (EC 5.6.1.2). Catalysed reaction: ATP + H2O + a dynein associated with a microtubule at position (n) = ADP + phosphate + a dynein associated with a microtubule at position (n-1, toward the minus end).
