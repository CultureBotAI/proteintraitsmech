identifier: EC:3.4.22.39
label: adenain
definition: >-
  Enzymatic activity — adenain (EC 3.4.22.39). Catalysed reaction: Cleaves proteins of the adenovirus and its host cell at two consensus sites: -Yaa-Xaa-Gly-Gly-|-Xaa- and -Yaa-Xaa-Gly-Xaa-|-Gly- (in which Yaa is Met, Ile or Leu, and Xaa is any amino acid).
