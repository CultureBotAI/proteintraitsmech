label: "3beta,22alpha-dihydroxysteroid 3-dehydrogenase"
definition: >-
  Enzymatic activity — 3beta,22alpha-dihydroxysteroid 3-dehydrogenase (EC 1.14.19.79). Catalysed reaction: (1) (22S)-22-hydroxycampesterol + reduced [NADPH--hemoprotein reductase] + O2 = (22S)-22-hydroxycampest-4-en-3-one + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+). (2) 6-deoxoteasterone + reduced [NADPH--hemoprotein reductase] + O2 = 3-dehydro-6-deoxoteasterone + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
