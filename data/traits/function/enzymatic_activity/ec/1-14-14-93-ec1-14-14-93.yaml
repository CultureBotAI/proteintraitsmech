identifier: EC:1.14.14.93
label: "3,9-dihydroxypterocarpan 6a-monooxygenase"
definition: >-
  Enzymatic activity — 3,9-dihydroxypterocarpan 6a-monooxygenase (EC 1.14.14.93). Catalysed reaction: (6aR,11aR)-3,9-dihydroxypterocarpan + reduced [NADPH--hemoprotein reductase] + O2 = (6aS,11aS)-3,6a,9-trihydroxypterocarpan + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
