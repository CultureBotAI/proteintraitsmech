identifier: EC:1.14.19.69
label: "biflaviolin synthase"
definition: >-
  Enzymatic activity — biflaviolin synthase (EC 1.14.19.69). Catalysed reaction: (1) 2 flaviolin + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + H(+) = 3,3'-biflaviolin + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O. (2) 2 flaviolin + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + H(+) = 3,8'-biflaviolin + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
