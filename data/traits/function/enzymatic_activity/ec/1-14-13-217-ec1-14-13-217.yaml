identifier: EC:1.14.13.217
label: "protodeoxyviolaceinate monooxygenase"
definition: >-
  Enzymatic activity — protodeoxyviolaceinate monooxygenase (EC 1.14.13.217). Catalysed reaction: (1) protodeoxyviolaceinate + NADPH + O2 + H(+) = protoviolaceinate + NADP(+) + H2O. (2) protodeoxyviolaceinate + NADH + O2 + H(+) = protoviolaceinate + NAD(+) + H2O.
