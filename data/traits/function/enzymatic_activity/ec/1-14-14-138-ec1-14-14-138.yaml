label: "lithocholate 6beta-hydroxylase"
definition: >-
  Enzymatic activity — lithocholate 6beta-hydroxylase (EC 1.14.14.138). Catalysed reaction: lithocholate + reduced [NADPH--hemoprotein reductase] + O2 = 6beta- hydroxylithocholate + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
