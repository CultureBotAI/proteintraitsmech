identifier: EC:3.4.23.25
label: saccharopepsin
definition: >-
  Enzymatic activity — saccharopepsin (EC 3.4.23.25). Catalysed reaction: Hydrolysis of proteins with broad specificity for peptide bonds. Cleaves -Leu-Leu-|-Val-Tyr- bond in a synthetic substrate. Does not act on esters of Tyr or Arg.
