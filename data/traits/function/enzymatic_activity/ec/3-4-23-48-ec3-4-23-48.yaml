identifier: EC:3.4.23.48
label: "plasminogen activator Pla"
definition: >-
  Enzymatic activity — plasminogen activator Pla (EC 3.4.23.48). Catalysed reaction: Converts human Glu-plasminogen to plasmin by cleaving the 560-Arg-|-Val- 561 peptide bond that is also hydrolyzed by the mammalian u-plasminogen activator and t-plasminogen activator. Also cleaves arginyl bonds in other proteins.
