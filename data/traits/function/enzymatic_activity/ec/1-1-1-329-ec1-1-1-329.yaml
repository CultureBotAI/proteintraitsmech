identifier: EC:1.1.1.329
label: "2-deoxy-scyllo-inosamine dehydrogenase"
definition: >-
  Enzymatic activity — 2-deoxy-scyllo-inosamine dehydrogenase (EC 1.1.1.329). Catalysed reaction: (1) 2-deoxy-scyllo-inosamine + NADP(+) = 3-amino-2,3-dideoxy-scyllo- inosose + NADPH + H(+). (2) 2-deoxy-scyllo-inosamine + NAD(+) = 3-amino-2,3-dideoxy-scyllo- inosose + NADH + H(+).
