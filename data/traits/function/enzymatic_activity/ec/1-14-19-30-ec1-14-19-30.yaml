identifier: EC:1.14.19.30
label: "acyl-lipid (8-3)-desaturase"
definition: >-
  Enzymatic activity — acyl-lipid (8-3)-desaturase (EC 1.14.19.30). Catalysed reaction: (1) an (8Z,11Z,14Z)-icosatrienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = (5Z,8Z,11Z,14Z)-eicosatetraenoyl- containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) an (8Z,11Z,14Z,17Z)-eicosatetraenoyl-containing glycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (5Z,8Z,11Z,14Z,17Z)- eicosapentaenoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
