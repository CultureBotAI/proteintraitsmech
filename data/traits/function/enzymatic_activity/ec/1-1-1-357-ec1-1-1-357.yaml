identifier: EC:1.1.1.357
label: "3alpha-hydroxysteroid 3-dehydrogenase"
definition: >-
  Enzymatic activity — 3alpha-hydroxysteroid 3-dehydrogenase (EC 1.1.1.357). Catalysed reaction: (1) a 3alpha-hydroxysteroid + NADP(+) = a 3-oxosteroid + NADPH + H(+). (2) a 3alpha-hydroxysteroid + NAD(+) = a 3-oxosteroid + NADH + H(+).
