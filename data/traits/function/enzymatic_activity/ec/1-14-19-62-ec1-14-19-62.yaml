definition: >-
  Enzymatic activity — secologanin synthase (EC 1.14.19.62). Catalysed reaction: loganin + reduced [NADPH--hemoprotein reductase] + O2 = secologanin + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
