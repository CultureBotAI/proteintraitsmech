identifier: EC:3.4.24.67
label: "choriolysin H"
definition: >-
  Enzymatic activity — choriolysin H (EC 3.4.24.67). Catalysed reaction: Hydrolysis of the inner layer of fish egg envelope. Also hydrolysis of casein and small molecule substrates such as succinyl-Leu-Leu- Val-Tyr-|-7-(4-methyl)coumarylamide.
