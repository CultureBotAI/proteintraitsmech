identifier: EC:2.1.1.113
label: "site-specific DNA-methyltransferase (cytosine-N(4)-specific)"
definition: >-
  Enzymatic activity — site-specific DNA-methyltransferase (cytosine-N(4)-specific) (EC 2.1.1.113). Catalysed reaction: a 2'-deoxycytidine in DNA + S-adenosyl-L-methionine = an N(4)-methyl- 2'-deoxycytidine in DNA + S-adenosyl-L-homocysteine + H(+).
