identifier: EC:2.7.4.24
label: "diphosphoinositol-pentakisphosphate 1-kinase"
definition: >-
  Enzymatic activity — diphosphoinositol-pentakisphosphate 1-kinase (EC 2.7.4.24). Catalysed reaction: (1) 1D-myo-inositol hexakisphosphate + ATP = 1-diphospho-1D-myo-inositol 2,3,4,5,6-pentakisphosphate + ADP. (2) 5-diphospho-1D-myo-inositol 1,2,3,4,6-pentakisphosphate + ATP + H(+) = 1,5-bis(diphospho)-1D-myo-inositol 2,3,4,6-tetrakisphosphate + ADP.
