identifier: EC:3.6.1.60
label: "diadenosine hexaphosphate hydrolase (AMP-forming)"
definition: >-
  Enzymatic activity — diadenosine hexaphosphate hydrolase (AMP-forming) (EC 3.6.1.60). Catalysed reaction: (1) P(1),P(6)-bis(5'-adenosyl) hexaphosphate + H2O = adenosine 5'-pentaphosphate + AMP + 2 H(+). (2) P(1),P(5)-bis(5'-adenosyl) pentaphosphate + H2O = adenosine 5'-tetraphosphate + AMP + 2 H(+).
