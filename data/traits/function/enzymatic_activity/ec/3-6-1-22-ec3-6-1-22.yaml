identifier: EC:3.6.1.22
label: "NAD(+) diphosphatase"
definition: >-
  Enzymatic activity — NAD(+) diphosphatase (EC 3.6.1.22). Catalysed reaction: (1) NAD(+) + H2O = beta-nicotinamide D-ribonucleotide + AMP + 2 H(+). (2) NADH + H2O = reduced beta-nicotinamide D-ribonucleotide + AMP + 2 H(+).
