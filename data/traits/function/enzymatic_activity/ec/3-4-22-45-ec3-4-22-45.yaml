label: "helper-component proteinase"
definition: >-
  Enzymatic activity — helper-component proteinase (EC 3.4.22.45). Catalysed reaction: Hydrolyzes a Gly-|-Gly bond at its own C-terminus, commonly in the sequence -Tyr-Xaa-Val-Gly-|-Gly, in the processing of the potyviral polyprotein.
