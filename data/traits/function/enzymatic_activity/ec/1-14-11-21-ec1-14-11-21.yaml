identifier: EC:1.14.11.21
label: "clavaminate synthase"
definition: >-
  Enzymatic activity — clavaminate synthase (EC 1.14.11.21). Catalysed reaction: (1) deoxyamidinoproclavaminate + 2-oxoglutarate + O2 = amidinoproclavaminate + succinate + CO2. (2) proclavaminate + 2-oxoglutarate + O2 = dihydroclavaminate + succinate + CO2 + H2O. (3) dihydroclavaminate + 2-oxoglutarate + O2 = clavaminate + succinate + CO2 + H2O.
