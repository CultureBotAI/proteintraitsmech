definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with 2-oxoglutarate as one donor, and incorporation of one atom each of oxygen into both donors.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) deoxyamidinoproclavaminate + 2-oxoglutarate + O2 = amidinoproclavaminate + succinate + CO2. (2) proclavaminate + 2-oxoglutarate + O2 = dihydroclavaminate + succinate + CO2 + H2O. (3) dihydroclavaminate + 2-oxoglutarate + O2 = clavaminate + succinate + CO2 + H2O
    source: "ExPASy ENZYME"
