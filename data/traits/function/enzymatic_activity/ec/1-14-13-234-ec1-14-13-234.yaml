  Enzymatic activity — 12-dehydrotetracycline 5-monooxygenase (EC 1.14.13.234). Catalysed reaction: 5a,11a-dehydrotetracycline + NADPH + O2 + H(+) = 5a,11a- dehydrooxytetracycline + NADP(+) + H2O.
