identifier: EC:1.1.1.135
label: "GDP-6-deoxy-D-talose 4-dehydrogenase"
definition: >-
  Enzymatic activity — GDP-6-deoxy-D-talose 4-dehydrogenase (EC 1.1.1.135). Catalysed reaction: (1) GDP-6-deoxy-alpha-D-talose + NADP(+) = GDP-4-dehydro-alpha-D-rhamnose + NADPH + H(+). (2) GDP-6-deoxy-alpha-D-talose + NAD(+) = GDP-4-dehydro-alpha-D-rhamnose + NADH + H(+).
