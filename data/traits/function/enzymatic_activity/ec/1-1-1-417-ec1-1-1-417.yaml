identifier: EC:1.1.1.417
label: "3beta-hydroxysteroid-4beta-carboxylate 3-dehydrogenase (decarboxylating)"
definition: >-
  Enzymatic activity — 3beta-hydroxysteroid-4beta-carboxylate 3-dehydrogenase (decarboxylating) (EC 1.1.1.417). Catalysed reaction: (1) a 3beta-hydroxy-4alpha-methylsteroid-4beta-carboxylate + NAD(+) = a 4alpha-methyl-3-oxosteroid + CO2 + NADH. (2) a 3beta-hydroxy-4alpha-methylsteroid-4beta-carboxylate + NADP(+) = a 4alpha-methyl-3-oxosteroid + CO2 + NADPH.
