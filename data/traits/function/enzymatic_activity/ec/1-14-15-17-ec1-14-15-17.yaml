  Enzymatic activity — pheophorbide a oxygenase (EC 1.14.15.17). Catalysed reaction: pheophorbide a + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = red chlorophyll catabolite + 2 oxidized [2Fe-2S]-[ferredoxin].
