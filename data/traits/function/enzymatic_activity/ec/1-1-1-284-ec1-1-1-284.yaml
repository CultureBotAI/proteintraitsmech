identifier: EC:1.1.1.284
label: "S-(hydroxymethyl)glutathione dehydrogenase"
definition: >-
  Enzymatic activity — S-(hydroxymethyl)glutathione dehydrogenase (EC 1.1.1.284). Catalysed reaction: (1) S-(hydroxymethyl)glutathione + NADP(+) = S-formylglutathione + NADPH + H(+). (2) S-(hydroxymethyl)glutathione + NAD(+) = S-formylglutathione + NADH + H(+).
