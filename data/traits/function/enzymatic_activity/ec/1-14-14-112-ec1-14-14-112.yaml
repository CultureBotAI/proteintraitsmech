identifier: EC:1.14.14.112
label: "ent-cassa-12,15-diene 11-hydroxylase"
definition: >-
  Enzymatic activity — ent-cassa-12,15-diene 11-hydroxylase (EC 1.14.14.112). Catalysed reaction: ent-cassa-12,15-diene + reduced [NADPH--hemoprotein reductase] + O2 = ent-11beta-hydroxycassa-12,15-diene + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
