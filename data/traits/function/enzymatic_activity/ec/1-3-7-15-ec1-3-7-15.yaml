identifier: EC:1.3.7.15
label: "chlorophyllide a reductase"
definition: >-
  Enzymatic activity — chlorophyllide a reductase (EC 1.3.7.15). Catalysed reaction: (1) 3-deacetyl-3-vinylbacteriochlorophyllide a + 2 oxidized [2Fe-2S]- [ferredoxin] + ADP + phosphate = chlorophyllide a + 2 reduced [2Fe-2S]- [ferredoxin] + ATP + H2O + H(+). (2) bacteriochlorophyllide a + 2 oxidized [2Fe-2S]-[ferredoxin] + ADP + phosphate = 3-acetyl-3-devinylchlorophyllide a + 2 reduced [2Fe-2S]- [ferredoxin] + ATP + H2O + H(+). (3) 3-deacetyl-3-(1-hydroxyethyl)bacteriochlorophyllide a + 2 oxidized [2Fe-2S]-[ferredoxin] + ADP + phosphate = 3-devinyl-3- (1-hydroxyethyl)chlorophyllide a + 2 reduced [2Fe-2S]-[ferredoxin] + ATP + H2O + H(+).
