identifier: EC:3.4.21.115
label: "infectious pancreatic necrosis birnavirus Vp4 peptidase"
definition: >-
  Enzymatic activity — infectious pancreatic necrosis birnavirus Vp4 peptidase (EC 3.4.21.115). Catalysed reaction: Cleaves the (Ser/Thr)-Xaa-Ala-|-(Ser/Ala)-Gly motif in the polyprotein NH2-pVP2-VP4-VP3-COOH of infectious pancreatic necrosis virus at the pVP2-VP4 and VP4-VP3 junctions.
