label: "lytic starch monooxygenase"
definition: >-
  Enzymatic activity — lytic starch monooxygenase (EC 1.14.99.55). Catalysed reaction: starch + reduced acceptor + O2 = D-glucono-1,5-lactone-terminated malto- oligosaccharides + short-chain malto-oligosaccharides + acceptor + H2O.
