  Enzymatic activity — (Kdo)-lipid IVA 3-deoxy-D-manno-octulosonic acid transferase (EC 2.4.99.13). Catalysed reaction: an alpha-Kdo-(2->6)-lipid IVA + CMP-3-deoxy-beta-D-manno-octulosonate = an alpha-Kdo-(2->4)-alpha-Kdo-(2->6)-lipid IVA + CMP + H(+).
