identifier: EC:2.2.1.15
label: "6-deoxy-6-sulfo-D-fructose transketolase"
definition: >-
  Enzymatic activity — 6-deoxy-6-sulfo-D-fructose transketolase (EC 2.2.1.15). Catalysed reaction: (1) 6-deoxy-6-sulfo-D-fructose + D-glyceraldehyde 3-phosphate = 4-deoxy- 4-sulfo-D-erythrose + D-xylulose 5-phosphate. (2) 4-deoxy-4-sulfo-D-erythrulose + D-glyceraldehyde 3-phosphate = sulfoacetaldehyde + D-xylulose 5-phosphate.
