identifier: EC:2.4.1.86
label: "N-acetyl-beta-D-glucosaminide beta-(1,3)-galactosyltransferase"
definition: >-
  Enzymatic activity — N-acetyl-beta-D-glucosaminide beta-(1,3)-galactosyltransferase (EC 2.4.1.86). Catalysed reaction: an N-acetyl-beta-D-glucosaminyl derivative + UDP-alpha-D-galactose = a beta-D-galactosyl-(1->3)-N-acetyl-beta-D-glucosaminyl derivative + UDP + H(+).
