identifier: EC:1.14.99.57
label: "heme oxygenase (mycobilin-producing)"
definition: >-
  Enzymatic activity — heme oxygenase (mycobilin-producing) (EC 1.14.99.57). Catalysed reaction: (1) heme b + 3 AH2 + 3 O2 + 2 H(+) = mycobilin a + Fe(2+) + 3 A + 3 H2O. (2) heme b + 3 AH2 + 3 O2 + 2 H(+) = mycobilin b + Fe(2+) + 3 A + 3 H2O.
