identifier: EC:1.5.1.43
label: "carboxynorspermidine synthase"
definition: >-
  Enzymatic activity — carboxynorspermidine synthase (EC 1.5.1.43). Catalysed reaction: (1) carboxynorspermidine + NADP(+) + H2O = L-aspartate 4-semialdehyde + propane-1,3-diamine + NADPH + H(+). (2) carboxyspermidine + NADP(+) + H2O = L-aspartate 4-semialdehyde + putrescine + NADPH + H(+).
