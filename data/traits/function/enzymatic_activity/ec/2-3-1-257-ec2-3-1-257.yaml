identifier: EC:2.3.1.257
label: "N-terminal L-serine N(alpha)-acetyltransferase NatD"
definition: >-
  Enzymatic activity — N-terminal L-serine N(alpha)-acetyltransferase NatD (EC 2.3.1.257). Catalysed reaction: (1) N-terminal L-seryl-[histone H4] + acetyl-CoA = N-terminal N(alpha)- acetyl-L-seryl-[histone H4] + CoA + H(+). (2) N-terminal L-seryl-[histone H2A] + acetyl-CoA = N-terminal N(alpha)- acetyl-L-seryl-[histone H2A] + CoA + H(+).
