identifier: EC:1.14.13.128
label: "7-methylxanthine demethylase"
definition: >-
  Enzymatic activity — 7-methylxanthine demethylase (EC 1.14.13.128). Catalysed reaction: (1) 7-methylxanthine + NADPH + O2 + H(+) = xanthine + formaldehyde + NADP(+) + H2O. (2) 7-methylxanthine + NADH + O2 + H(+) = xanthine + formaldehyde + NAD(+) + H2O.
