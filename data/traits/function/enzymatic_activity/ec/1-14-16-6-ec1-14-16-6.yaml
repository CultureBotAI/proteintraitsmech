identifier: EC:1.14.16.6
label: "mandelate 4-monooxygenase"
definition: >-
  Enzymatic activity — mandelate 4-monooxygenase (EC 1.14.16.6). Catalysed reaction: (S)-mandelate + (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin + O2 = (S)-4- hydroxymandelate + (6R)-L-erythro-6,7-dihydrobiopterin + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
