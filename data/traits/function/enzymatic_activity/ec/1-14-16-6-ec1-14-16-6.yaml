definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced pteridine as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (S)-mandelate + (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin + O2 = (S)-4- hydroxymandelate + (6R)-L-erythro-6,7-dihydrobiopterin + H2O
    source: "ExPASy ENZYME"
    method: SOURCED
