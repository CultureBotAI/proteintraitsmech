identifier: EC:2.8.2.14
label: "bile-salt sulfotransferase"
definition: >-
  Enzymatic activity — bile-salt sulfotransferase (EC 2.8.2.14). Catalysed reaction: (1) glycolithocholate + 3'-phosphoadenylyl sulfate = glycolithocholate 3-sulfate + adenosine 3',5'-bisphosphate + H(+). (2) taurolithocholate + 3'-phosphoadenylyl sulfate = taurolithocholate 3-sulfate + adenosine 3',5'-bisphosphate + H(+).
