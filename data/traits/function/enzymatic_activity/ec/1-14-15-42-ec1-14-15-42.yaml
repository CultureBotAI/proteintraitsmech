identifier: EC:1.14.15.42
label: "L-tyrosine 3-nitrase"
definition: >-
  Enzymatic activity — L-tyrosine 3-nitrase (EC 1.14.15.42). Catalysed reaction: L-Met-L-Arg-L-Tyr-L-Leu-L-His + nitric oxide + reduced [2Fe-2S]- [ferredoxin] + O2 = L-Met-L-Arg-(3-NO2)-L-Tyr-L-Leu-L-His + oxidized [2Fe-2S]-[ferredoxin] + H2O.
