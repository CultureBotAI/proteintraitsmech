identifier: EC:1.2.99.10
label: "4,4'-diapolycopenoate synthase"
definition: >-
  Enzymatic activity — 4,4'-diapolycopenoate synthase (EC 1.2.99.10). Catalysed reaction: (1) all-trans-4,4'-diapolycopen-4-al + A + H2O = all-trans- 4,4'-diapolycopen-4-oate + AH2 + H(+). (2) all-trans-4,4'-diapolycopene-4,4'-dial + 2 A + 2 H2O = all-trans- 4,4'-diapolycopene-4,4'-dioate + 2 AH2 + 2 H(+).
