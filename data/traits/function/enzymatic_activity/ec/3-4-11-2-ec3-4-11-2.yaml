identifier: EC:3.4.11.2
label: "membrane alanyl aminopeptidase"
definition: >-
  Enzymatic activity — membrane alanyl aminopeptidase (EC 3.4.11.2). Catalysed reaction: Release of an N-terminal amino acid, Xaa-|-Yaa- from a peptide, amide or arylamide. Xaa is preferably Ala, but may be most amino acids including Pro (slow action). When a terminal hydrophobic residue is followed by a prolyl residue, the two may be released as an intact Xaa-Pro dipeptide.
