label: "rhazimal synthase"
definition: >-
  Enzymatic activity — rhazimal synthase (EC 1.14.14.187). Catalysed reaction: (19E)-geissoschizine + reduced [NADPH--hemoprotein reductase] + O2 = rhazimal + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
