identifier: EC:1.1.1.351
label: "phosphogluconate dehydrogenase [NAD(P)(+)-dependent, decarboxylating]"
definition: >-
  Enzymatic activity — phosphogluconate dehydrogenase [NAD(P)(+)-dependent, decarboxylating] (EC 1.1.1.351). Catalysed reaction: (1) 6-phospho-D-gluconate + NAD(+) = D-ribulose 5-phosphate + CO2 + NADH. (2) 6-phospho-D-gluconate + NADP(+) = D-ribulose 5-phosphate + CO2 + NADPH.
