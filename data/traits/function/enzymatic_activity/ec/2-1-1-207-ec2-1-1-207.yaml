identifier: EC:2.1.1.207
label: "tRNA (cytidine(34)-2'-O)-methyltransferase"
definition: >-
  Enzymatic activity — tRNA (cytidine(34)-2'-O)-methyltransferase (EC 2.1.1.207). Catalysed reaction: (1) cytidine(34) in tRNA + S-adenosyl-L-methionine = 2'-O- methylcytidine(34) in tRNA + S-adenosyl-L-homocysteine + H(+). (2) 5-carboxymethylaminomethyluridine(34) in tRNA(Leu) + S-adenosyl-L- methionine = 5-carboxymethylaminomethyl-2'-O-methyluridine(34) in tRNA(Leu) + S-adenosyl-L-homocysteine + H(+).
