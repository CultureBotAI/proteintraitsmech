identifier: EC:1.14.14.146
label: "geranylgeraniol 18-hydroxylase"
definition: >-
  Enzymatic activity — geranylgeraniol 18-hydroxylase (EC 1.14.14.146). Catalysed reaction: (2E,6E,10E)-geranylgeraniol + reduced [NADPH--hemoprotein reductase] + O2 = plaunotol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
