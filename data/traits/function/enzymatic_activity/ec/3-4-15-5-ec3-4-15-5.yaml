identifier: EC:3.4.15.5
label: "peptidyl-dipeptidase Dcp"
definition: >-
  Enzymatic activity — peptidyl-dipeptidase Dcp (EC 3.4.15.5). Catalysed reaction: Hydrolysis of unblocked, C-terminal dipeptides from oligopeptides, with broad specificity. Does not hydrolyze bonds in which P1' is Pro, or both P1 and P1' are Gly.
