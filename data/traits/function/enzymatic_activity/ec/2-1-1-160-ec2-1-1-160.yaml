identifier: EC:2.1.1.160
label: "caffeine synthase"
definition: >-
  Enzymatic activity — caffeine synthase (EC 2.1.1.160). Catalysed reaction: (1) theobromine + S-adenosyl-L-methionine = caffeine + S-adenosyl-L- homocysteine + H(+). (2) 1,7-dimethylxanthine + S-adenosyl-L-methionine = caffeine + S-adenosyl-L-homocysteine + H(+). (3) 7-methylxanthine + S-adenosyl-L-methionine = theobromine + S-adenosyl-L-homocysteine + H(+).
