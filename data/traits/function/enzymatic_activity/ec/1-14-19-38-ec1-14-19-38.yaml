identifier: EC:1.14.19.38
label: "acyl-lipid Delta(6)-acetylenase"
definition: >-
  Enzymatic activity — acyl-lipid Delta(6)-acetylenase (EC 1.14.19.38). Catalysed reaction: (1) (6Z,9Z,12Z)-octadecatrienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = a (9Z,12Z)-octadeca-9,12-dien-6-ynoyl- containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) (6Z,9Z,12Z,15Z)-octadecatetraenoyl-containing glycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (9Z,12Z,15Z)-octadeca-9,12,15- trien-6-ynoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
definition_source: ExPASy ENZYME
