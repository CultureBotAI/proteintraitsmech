identifier: EC:3.4.21.82
label: "glutamyl endopeptidase II"
definition: >-
  Enzymatic activity — glutamyl endopeptidase II (EC 3.4.21.82). Catalysed reaction: Preferential cleavage: -Glu-|-Xaa- >> -Asp-|-Xaa-. Preference for Pro or Leu at P2 and Phe at P3. Cleavage of -Glu-|-Asp- and -Glu-|-Pro- bonds is slow.
