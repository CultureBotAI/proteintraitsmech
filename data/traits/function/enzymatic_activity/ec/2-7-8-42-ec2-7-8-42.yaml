identifier: EC:2.7.8.42
label: "Kdo2-lipid A phosphoethanolamine 7''-transferase"
definition: >-
  Enzymatic activity — Kdo2-lipid A phosphoethanolamine 7''-transferase (EC 2.7.8.42). Catalysed reaction: (1) alpha-Kdo-(2->4)-alpha-Kdo-(2->6)-lipid A (E. coli) + a 1,2-diacyl- sn-glycero-3-phosphoethanolamine = 7-O- [2-aminoethoxy(hydroxy)phosphoryl]-alpha-Kdo-(2->4)-alpha-Kdo-(2->6)- lipid A + a 1,2-diacyl-sn-glycerol. (2) alpha-Kdo-(2->4)-alpha-Kdo-(2->6)-lipid IVA (E. coli) + a 1,2-diacyl- sn-glycero-3-phosphoethanolamine = 7-O- [2-aminoethoxy(hydroxy)phosphoryl]-alpha-Kdo-(2->4)-alpha-Kdo-(2->6)- lipid IVA (E. coli) + a 1,2-diacyl-sn-glycerol.
