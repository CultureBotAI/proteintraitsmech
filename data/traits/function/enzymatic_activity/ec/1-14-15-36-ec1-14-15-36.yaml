label: "sterol 14alpha-demethylase (ferredoxin)"
definition: >-
  Enzymatic activity — sterol 14alpha-demethylase (ferredoxin) (EC 1.14.15.36). Catalysed reaction: a 14alpha-methyl steroid + 6 reduced [2Fe-2S]-[ferredoxin] + 3 O2 + 5 H(+) = a Delta(14) steroid + formate + 6 oxidized [2Fe-2S]-[ferredoxin] + 4 H2O.
