identifier: EC:3.4.19.1
label: acylaminoacyl-peptidase
definition: >-
  Enzymatic activity — acylaminoacyl-peptidase (EC 3.4.19.1). Catalysed reaction: (1) Cleavage of an N-acetyl or N-formyl amino acid from the N-terminus of a polypeptide. (2) Internal cleavage of oxidized and glycated proteins.
