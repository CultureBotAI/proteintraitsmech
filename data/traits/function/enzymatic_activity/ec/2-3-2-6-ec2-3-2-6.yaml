identifier: EC:2.3.2.6
label: "lysine/arginine leucyltransferase"
definition: >-
  Enzymatic activity — lysine/arginine leucyltransferase (EC 2.3.2.6). Catalysed reaction: (1) N-terminal L-lysyl-[protein] + L-leucyl-tRNA(Leu) = N-terminal L-leucyl-L-lysyl-[protein] + tRNA(Leu) + H(+). (2) N-terminal L-arginyl-[protein] + L-leucyl-tRNA(Leu) = N-terminal L-leucyl-L-arginyl-[protein] + tRNA(Leu) + H(+).
