identifier: EC:1.14.14.118
label: "tryprostatin B 6-hydroxylase"
definition: >-
  Enzymatic activity — tryprostatin B 6-hydroxylase (EC 1.14.14.118). Catalysed reaction: tryprostatin B + reduced [NADPH--hemoprotein reductase] + O2 = 6-hydroxytryprostatin B + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
