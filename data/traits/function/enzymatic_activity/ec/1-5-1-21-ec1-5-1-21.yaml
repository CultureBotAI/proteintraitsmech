identifier: EC:1.5.1.21
label: "1-piperideine-2-carboxylate/1-pyrroline-2-carboxylate reductase (NADPH)"
definition: >-
  Enzymatic activity — 1-piperideine-2-carboxylate/1-pyrroline-2-carboxylate reductase (NADPH) (EC 1.5.1.21). Catalysed reaction: (1) L-pipecolate + NADP(+) = Delta(1)-piperideine-2-carboxylate + NADPH + H(+). (2) L-proline + NADP(+) = 1-pyrroline-2-carboxylate + NADPH + H(+).
