identifier: EC:1.14.14.83
label: "geraniol 8-hydroxylase"
definition: >-
  Enzymatic activity — geraniol 8-hydroxylase (EC 1.14.14.83). Catalysed reaction: (2E)-geraniol + reduced [NADPH--hemoprotein reductase] + O2 = (6E)-8- hydroxygeraniol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
