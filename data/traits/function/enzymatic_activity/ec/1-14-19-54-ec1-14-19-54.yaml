identifier: EC:1.14.19.54
label: "1,2-dehydroreticuline synthase"
definition: >-
  Enzymatic activity — 1,2-dehydroreticuline synthase (EC 1.14.19.54). Catalysed reaction: (S)-reticuline + reduced [NADPH--hemoprotein reductase] + O2 = 1,2- dehydroreticuline + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
