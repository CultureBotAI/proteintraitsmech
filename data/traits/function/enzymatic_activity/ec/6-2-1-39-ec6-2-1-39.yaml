identifier: EC:6.2.1.39
label: "[butirosin acyl-carrier protein]--L-glutamate ligase"
definition: >-
  Enzymatic activity — [butirosin acyl-carrier protein]--L-glutamate ligase (EC 6.2.1.39). Catalysed reaction: (1) holo-[BtrI ACP] + L-glutamate + ATP = gamma-L-glutamyl-[BtrI ACP] + ADP + phosphate. (2) 4-aminobutanoyl-[BtrI ACP] + L-glutamate + ATP = 4-(gamma-L- glutamylamino)butanoyl-[BtrI ACP] + ADP + phosphate + H(+).
