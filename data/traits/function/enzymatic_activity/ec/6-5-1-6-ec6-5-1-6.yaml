identifier: EC:6.5.1.6
label: "DNA ligase (ATP or NAD(+))"
definition: >-
  Enzymatic activity — DNA ligase (ATP or NAD(+)) (EC 6.5.1.6). Catalysed reaction: (1) ATP + (deoxyribonucleotide)n-3'-hydroxyl + 5'-phospho- (deoxyribonucleotide)m = (deoxyribonucleotide)n+m + AMP + diphosphate. (2) NAD(+) + (deoxyribonucleotide)n-3'-hydroxyl + 5'-phospho- (deoxyribonucleotide)m = (deoxyribonucleotide)n+m + AMP + beta- nicotinamide D-nucleotide.
