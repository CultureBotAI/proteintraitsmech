definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) 3-epi-6-deoxocathasterone + reduced [NADPH--hemoprotein reductase] + O2 = 6-deoxotyphasterol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) (22S,24R)-22-hydroxy-5alpha-ergostan-3-one + reduced [NADPH- -hemoprotein reductase] + O2 = 3-dehydro-6-deoxoteasterone + oxidized [NADPH--hemoprotein reductase] + H2O + H(+)
