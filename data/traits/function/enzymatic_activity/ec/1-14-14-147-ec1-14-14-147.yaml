identifier: EC:1.14.14.147
label: "22alpha-hydroxysteroid 23-monooxygenase"
definition: >-
  Enzymatic activity — 22alpha-hydroxysteroid 23-monooxygenase (EC 1.14.14.147). Catalysed reaction: (1) 3-epi-6-deoxocathasterone + reduced [NADPH--hemoprotein reductase] + O2 = 6-deoxotyphasterol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) (22S,24R)-22-hydroxy-5alpha-ergostan-3-one + reduced [NADPH- -hemoprotein reductase] + O2 = 3-dehydro-6-deoxoteasterone + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
