identifier: EC:6.3.5.3
label: "phosphoribosylformylglycinamidine synthase"
definition: >-
  Enzymatic activity — phosphoribosylformylglycinamidine synthase (EC 6.3.5.3). Catalysed reaction: N(2)-formyl-N(1)-(5-phospho-beta-D-ribosyl)glycinamide + L-glutamine + ATP + H2O = 2-formamido-N(1)-(5-O-phospho-beta-D-ribosyl)acetamidine + L-glutamate + ADP + phosphate + H(+).
