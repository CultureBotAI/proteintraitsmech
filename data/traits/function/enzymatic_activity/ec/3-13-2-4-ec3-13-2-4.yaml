identifier: EC:3.13.2.4
label: "lanthipeptide synthase"
definition: >-
  Enzymatic activity — lanthipeptide synthase (EC 3.13.2.4). Catalysed reaction: (1) a [protein]-L-serine + a [protein]-L-cysteine = a [protein] with lanthionine cross-link + H2O (overall reaction). (2) a [protein]-L-threonine + a [protein]-L-cysteine = a [protein] with 3-methyllanthionine cross-link + H2O (overall reaction).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:3.13.2.-
definitions:
  - kind: GENERAL
    text: >-
      A hydrolase; acting on carbon-sulfur bonds; thioether and trialkylsulfonium hydrolases.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) a [protein]-L-serine + a [protein]-L-cysteine = a [protein] with lanthionine cross-link + H2O (overall reaction). (2) a [protein]-L-threonine + a [protein]-L-cysteine = a [protein] with 3-methyllanthionine cross-link + H2O (overall reaction)
    source: "ExPASy ENZYME"
