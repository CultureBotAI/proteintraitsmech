  Enzymatic activity — L-proline amide hydrolase (EC 3.5.1.101). Catalysed reaction: (1) (S)-piperazine-2-carboxamide + H2O = (S)-piperazine-2-carboxylate + NH4(+). (2) L-prolinamide + H2O = L-proline + NH4(+).
