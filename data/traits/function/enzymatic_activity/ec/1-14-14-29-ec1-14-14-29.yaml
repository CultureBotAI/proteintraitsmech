identifier: EC:1.14.14.29
label: "25/26-hydroxycholesterol 7alpha-hydroxylase"
definition: >-
  Enzymatic activity — 25/26-hydroxycholesterol 7alpha-hydroxylase (EC 1.14.14.29). Catalysed reaction: (1) 25-hydroxycholesterol + reduced [NADPH--hemoprotein reductase] + O2 = 7alpha,25-dihydroxycholesterol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) (25R)-cholest-5-ene-3beta,26-diol + reduced [NADPH--hemoprotein reductase] + O2 = (25R)-cholest-5-en-3beta,7alpha,26-triol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
