identifier: EC:4.1.2.63
label: "2-hydroxyacyl-CoA lyase"
definition: >-
  Enzymatic activity — 2-hydroxyacyl-CoA lyase (EC 4.1.2.63). Catalysed reaction: (1) a 2-hydroxy-3-methyl fatty acyl-CoA = a 2-methyl-branched fatty aldehyde + formyl-CoA. (2) an (R)-2-hydroxy-long-chain-fatty acyl-CoA = a long-chain fatty aldehyde + formyl-CoA.
