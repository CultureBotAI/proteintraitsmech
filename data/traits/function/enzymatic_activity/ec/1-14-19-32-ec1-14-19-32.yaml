identifier: EC:1.14.19.32
label: "palmitoyl-CoA 14-(E/Z)-desaturase"
definition: >-
  Enzymatic activity — palmitoyl-CoA 14-(E/Z)-desaturase (EC 1.14.19.32). Catalysed reaction: (1) hexadecanoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (14E)- hexadecenoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) hexadecanoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (14Z)- hexadecenoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
