identifier: EC:3.4.23.39
label: "plasmepsin II"
definition: >-
  Enzymatic activity — plasmepsin II (EC 3.4.23.39). Catalysed reaction: Hydrolysis of the bonds linking certain hydrophobic residues in hemoglobin or globin. Also cleaves small molecules substrates such as Ala-Leu-Glu-Arg-Thr-Phe-|-Phe(NO2)-Ser-Phe-Pro-Thr.
