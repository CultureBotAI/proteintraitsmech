identifier: EC:1.14.19.47
label: "acyl-lipid (9-3)-desaturase"
definition: >-
  Enzymatic activity — acyl-lipid (9-3)-desaturase (EC 1.14.19.47). Catalysed reaction: (1) (9Z,12Z,15Z)-octadecatrienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = (6Z,9Z,12Z,15Z)-octadecatetraenoyl- containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) a (9Z,12Z)-octadecadienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = (6Z,9Z,12Z)-octadecatrienoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
