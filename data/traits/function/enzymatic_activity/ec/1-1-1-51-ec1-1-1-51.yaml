identifier: EC:1.1.1.51
label: "3(or 17)beta-hydroxysteroid dehydrogenase"
definition: >-
  Enzymatic activity — 3(or 17)beta-hydroxysteroid dehydrogenase (EC 1.1.1.51). Catalysed reaction: (1) testosterone + NAD(+) = androst-4-ene-3,17-dione + NADH + H(+). (2) testosterone + NADP(+) = androst-4-ene-3,17-dione + NADPH + H(+).
