definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with 2-oxoglutarate as one donor, and incorporation of one atom each of oxygen into both donors.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
