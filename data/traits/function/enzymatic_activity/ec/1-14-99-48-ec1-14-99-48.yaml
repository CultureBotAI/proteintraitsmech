identifier: EC:1.14.99.48
label: "heme oxygenase (staphylobilin-producing)"
definition: >-
  Enzymatic activity — heme oxygenase (staphylobilin-producing) (EC 1.14.99.48). Catalysed reaction: (1) heme b + 5 AH2 + 4 O2 + 2 H(+) = delta-staphylobilin + Fe(2+) + formaldehyde + 5 A + 4 H2O. (2) heme b + 5 AH2 + 4 O2 + 2 H(+) = beta-staphylobilin + Fe(2+) + formaldehyde + 5 A + 4 H2O.
