  Enzymatic activity — salutaridine synthase (EC 1.14.19.67). Catalysed reaction: (R)-reticuline + reduced [NADPH--hemoprotein reductase] + O2 = salutaridine + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
