identifier: EC:1.5.1.2
label: "pyrroline-5-carboxylate reductase"
definition: >-
  Enzymatic activity — pyrroline-5-carboxylate reductase (EC 1.5.1.2). Catalysed reaction: (1) L-proline + NAD(+) = (S)-1-pyrroline-5-carboxylate + NADH + 2 H(+). (2) L-proline + NADP(+) = (S)-1-pyrroline-5-carboxylate + NADPH + 2 H(+).
