label: "3-dehydro-2,22-dideoxyecdysone 22-hydroxylase"
definition: >-
  Enzymatic activity — 3-dehydro-2,22-dideoxyecdysone 22-hydroxylase (EC 1.14.15.44). Catalysed reaction: 3-dehydro-2,22-dideoxyecdysone + 2 reduced [adrenodoxin] + O2 + 2 H(+) = 3-dehydro-2-deoxyecdysone + 2 oxidized [adrenodoxin] + H2O.
