identifier: EC:3.7.1.14
label: "2-hydroxy-6-oxonona-2,4-dienedioate hydrolase"
definition: >-
  Enzymatic activity — 2-hydroxy-6-oxonona-2,4-dienedioate hydrolase (EC 3.7.1.14). Catalysed reaction: (1) (2Z,4E)-2-hydroxy-6-oxonona-2,4-dienedioate + H2O = (2Z)-2- hydroxypenta-2,4-dienoate + succinate + H(+). (2) (2Z,4E,7E)-2-hydroxy-6-oxonona-2,4,7-trienedioate + H2O = (2Z)-2- hydroxypenta-2,4-dienoate + fumarate + H(+).
