identifier: EC:2.4.1.244
label: "N-acetyl-beta-glucosaminyl-glycoprotein 4-beta-N- acetylgalactosaminyltransferase"
definition: >-
  Enzymatic activity — N-acetyl-beta-glucosaminyl-glycoprotein 4-beta-N- acetylgalactosaminyltransferase (EC 2.4.1.244). Catalysed reaction: an N-acetyl-beta-D-glucosaminyl derivative + UDP-N-acetyl-alpha-D- galactosamine = an N-acetyl-beta-D-galactosaminyl-(1->4)-N-acetyl-beta-D- glucosaminyl derivative + UDP + H(+).
