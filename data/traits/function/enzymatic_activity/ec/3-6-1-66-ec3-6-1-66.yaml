identifier: EC:3.6.1.66
label: "XTP/dITP diphosphatase"
definition: >-
  Enzymatic activity — XTP/dITP diphosphatase (EC 3.6.1.66). Catalysed reaction: (1) XTP + H2O = XMP + diphosphate + H(+). (2) dITP + H2O = dIMP + diphosphate + H(+). (3) ITP + H2O = IMP + diphosphate + H(+).
