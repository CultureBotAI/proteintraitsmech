identifier: EC:1.2.1.80
label: "long-chain acyl-[acyl-carrier-protein] reductase"
definition: >-
  Enzymatic activity — long-chain acyl-[acyl-carrier-protein] reductase (EC 1.2.1.80). Catalysed reaction: (1) a long-chain fatty aldehyde + holo-[ACP] + NADP(+) = a long-chain fatty acyl-[ACP] + NADPH + H(+). (2) a long-chain fatty aldehyde + holo-[ACP] + NAD(+) = a long-chain fatty acyl-[ACP] + NADH + H(+).
