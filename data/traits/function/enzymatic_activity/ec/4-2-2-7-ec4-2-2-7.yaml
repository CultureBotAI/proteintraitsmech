identifier: EC:4.2.2.7
label: "heparin lyase"
definition: >-
  Enzymatic activity — heparin lyase (EC 4.2.2.7). Catalysed reaction: Eliminative cleavage of polysaccharides containing (1->4)-linked D-glucuronate or L-iduronate residues and (1->4)-alpha-linked 2-sulfoamino-2-deoxy-6-sulfo-D-glucose residues to give oligosaccharides with terminal 4-deoxy-alpha-D-gluc-4-enuronosyl groups at their non- reducing ends.
