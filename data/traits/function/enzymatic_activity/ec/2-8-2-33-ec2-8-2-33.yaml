identifier: EC:2.8.2.33
label: "N-acetylgalactosamine 4-sulfate 6-O-sulfotransferase"
definition: >-
  Enzymatic activity — N-acetylgalactosamine 4-sulfate 6-O-sulfotransferase (EC 2.8.2.33). Catalysed reaction: (1) dermatan 4'-sulfate + n 3'-phosphoadenylyl sulfate = dermatan 4',6'-bissulfate + n adenosine 3',5'-bisphosphate + n H(+). (2) chondroitin 4'-sulfate + n 3'-phosphoadenylyl sulfate = chondroitin 4',6'-bissulfate + n adenosine 3',5'-bisphosphate + n H(+).
