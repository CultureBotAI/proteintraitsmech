identifier: EC:1.1.1.323
label: "(+)-thujan-3-ol dehydrogenase"
definition: >-
  Enzymatic activity — (+)-thujan-3-ol dehydrogenase (EC 1.1.1.323). Catalysed reaction: (1) (+)-thujan-3-ol + NADP(+) = (+)-thujan-3-one + NADPH + H(+). (2) (+)-thujan-3-ol + NAD(+) = (+)-thujan-3-one + NADH + H(+).
