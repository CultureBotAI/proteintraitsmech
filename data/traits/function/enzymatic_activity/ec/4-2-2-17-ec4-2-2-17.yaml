identifier: EC:4.2.2.17
label: "inulin fructotransferase (DFA-I-forming)"
definition: >-
  Enzymatic activity — inulin fructotransferase (DFA-I-forming) (EC 4.2.2.17). Catalysed reaction: Produces alpha-D-fructofuranose beta-D-fructofuranose 1,2':2,1'-dianhydride (DFA I) by successively eliminating the diminishing (2->1)-beta-D-fructan (inulin) chain from the terminal D-fructosyl-D- fructosyl disaccharide.
