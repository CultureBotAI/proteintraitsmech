identifier: EC:3.4.21.119
label: "kallikrein 13"
definition: >-
  Enzymatic activity — kallikrein 13 (EC 3.4.21.119). Catalysed reaction: Hydrolyzes mouse Ren2 protein (a species of prorenin present in the submandibular gland) on the carboxy side of the arginine residue at the Lys-Arg-|- pair in the N-terminus, to yield mature renin.
