label: "peptide-tryptophan 2,3-dioxygenase"
definition: >-
  Enzymatic activity — peptide-tryptophan 2,3-dioxygenase (EC 1.13.11.26). Catalysed reaction: [protein]-L-tryptophan + O2 = [protein]-N-formyl-L-kynurenine.
