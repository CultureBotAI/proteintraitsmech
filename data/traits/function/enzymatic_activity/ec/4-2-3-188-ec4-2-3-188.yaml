identifier: EC:4.2.3.188
label: "beta-geranylfarnesene synthase"
definition: >-
  Enzymatic activity — beta-geranylfarnesene synthase (EC 4.2.3.188). Catalysed reaction: (1) (2E,6E,10E,14E)-geranylfarnesyl diphosphate = beta-geranylfarnesene + diphosphate. (2) all-trans-hexaprenyl diphosphate = beta-hexaprene + diphosphate. (3) all-trans-heptaprenyl diphosphate = beta-heptaprene + diphosphate.
