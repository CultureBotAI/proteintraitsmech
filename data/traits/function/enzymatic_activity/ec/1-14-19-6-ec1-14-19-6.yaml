identifier: EC:1.14.19.6
label: "acyl-CoA (9+3)-desaturase"
definition: >-
  Enzymatic activity — acyl-CoA (9+3)-desaturase (EC 1.14.19.6). Catalysed reaction: (1) (9Z)-octadecenoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (9Z,12Z)-octadecadienoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) (9Z)-hexadecenoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (9Z,12Z)-hexadecadienoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O.
