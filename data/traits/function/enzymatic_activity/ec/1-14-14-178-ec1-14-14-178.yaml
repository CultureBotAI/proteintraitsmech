identifier: EC:1.14.14.178
label: "steroid 22S-hydroxylase"
definition: >-
  Enzymatic activity — steroid 22S-hydroxylase (EC 1.14.14.178). Catalysed reaction: (1) a C27-steroid + reduced [NADPH--hemoprotein reductase] + O2 = a (22S)-22-hydroxy C27-steroid + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) a C28-steroid + reduced [NADPH--hemoprotein reductase] + O2 = a (22S)-22-hydroxy C28-steroid + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (3) a C29-steroid + reduced [NADPH--hemoprotein reductase] + O2 = a (22S)-22-hydroxy C29-steroid + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
