identifier: EC:1.2.1.59
label: "glyceraldehyde-3-phosphate dehydrogenase (NAD(P)(+)) (phosphorylating)"
definition: >-
  Enzymatic activity — glyceraldehyde-3-phosphate dehydrogenase (NAD(P)(+)) (phosphorylating) (EC 1.2.1.59). Catalysed reaction: (1) D-glyceraldehyde 3-phosphate + phosphate + NADP(+) = (2R)-3-phospho- glyceroyl phosphate + NADPH + H(+). (2) D-glyceraldehyde 3-phosphate + phosphate + NAD(+) = (2R)-3-phospho- glyceroyl phosphate + NADH + H(+).
