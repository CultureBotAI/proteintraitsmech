identifier: EC:1.14.14.166
label: "(S)-N-methylcanadine 1-hydroxylase"
definition: >-
  Enzymatic activity — (S)-N-methylcanadine 1-hydroxylase (EC 1.14.14.166). Catalysed reaction: (S)-cis-N-methylcanadine + reduced [NADPH--hemoprotein reductase] + O2 = (S)-1-hydroxy-N-methylcanadine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
