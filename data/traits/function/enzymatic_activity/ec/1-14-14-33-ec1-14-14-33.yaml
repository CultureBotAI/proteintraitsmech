identifier: EC:1.14.14.33
label: "ethylenediaminetetraacetate monooxygenase"
definition: >-
  Enzymatic activity — ethylenediaminetetraacetate monooxygenase (EC 1.14.14.33). Catalysed reaction: EDTA + 2 FMNH2 + 2 O2 = ethylenediaminediacetate + 2 FMN + 2 glyoxylate + 2 H2O + 3 H(+).
