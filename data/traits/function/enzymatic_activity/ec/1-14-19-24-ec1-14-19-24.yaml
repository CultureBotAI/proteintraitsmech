identifier: EC:1.14.19.24
label: "acyl-CoA 11-(E)-desaturase"
definition: >-
  Enzymatic activity — acyl-CoA 11-(E)-desaturase (EC 1.14.19.24). Catalysed reaction: an 11,12-saturated fatty acyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = an (11E)-Delta(11)-fatty acyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:1.14.19.-
mapped_xrefs:
  - object: GO:0050600
    mapping_source: ec2go
  - object: RHEA:46396
    mapping_source: rhea2ec
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with oxidation of a pair of donors resulting in the reduction of molecular oxygen to two molecules of water.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: an 11,12-saturated fatty acyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = an (11E)-Delta(11)-fatty acyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O
    source: "ExPASy ENZYME"
    method: SOURCED
