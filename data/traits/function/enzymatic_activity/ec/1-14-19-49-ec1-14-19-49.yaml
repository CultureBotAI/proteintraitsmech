label: "tetracycline 7-halogenase"
definition: >-
  Enzymatic activity — tetracycline 7-halogenase (EC 1.14.19.49). Catalysed reaction: tetracycline + FADH2 + chloride + O2 = 7-chlorotetracycline + FAD + 2 H2O + H(+).
