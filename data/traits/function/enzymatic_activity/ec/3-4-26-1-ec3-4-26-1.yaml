identifier: EC:3.4.26.1
label: "intramembrane prenyl-peptidase Rce1"
definition: >-
  Enzymatic activity — intramembrane prenyl-peptidase Rce1 (EC 3.4.26.1). Catalysed reaction: Hydrolyzes the peptide bond -P2-(S-farnesyl or geranylgeranyl)C-P1'-P2'-P3'-COOH where P1' and P2' are amino acids with aliphatic sidechains and P3' is any C-terminal residue.
