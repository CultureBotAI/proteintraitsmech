identifier: EC:1.14.19.59
label: "tryptophan 6-halogenase"
definition: >-
  Enzymatic activity — tryptophan 6-halogenase (EC 1.14.19.59). Catalysed reaction: (1) L-tryptophan + FADH2 + chloride + O2 = 6-chloro-L-tryptophan + FAD + 2 H2O. (2) D-tryptophan + FADH2 + chloride + O2 = 6-chloro-D-tryptophan + FAD + 2 H2O.
