identifier: EC:1.1.1.149
label: "20alpha-hydroxysteroid dehydrogenase"
definition: >-
  Enzymatic activity — 20alpha-hydroxysteroid dehydrogenase (EC 1.1.1.149). Catalysed reaction: (1) (17R,20S)-17,20-dihydroxypregn-4-en-3-one + NAD(+) = 17alpha- hydroxyprogesterone + NADH + H(+). (2) (17R,20S)-17,20-dihydroxypregn-4-en-3-one + NADP(+) = 17alpha- hydroxyprogesterone + NADPH + H(+).
