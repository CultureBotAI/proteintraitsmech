identifier: EC:1.14.15.14
label: "methyl-branched lipid omega-hydroxylase"
definition: >-
  Enzymatic activity — methyl-branched lipid omega-hydroxylase (EC 1.14.15.14). Catalysed reaction: a methyl-branched lipid + O2 + 2 reduced ferredoxin [iron-sulfur] cluster + 2 H(+) = an omega-hydroxy-methyl-branched lipid + H2O + 2 oxidized ferredoxin [iron-sulfur] cluster.
