identifier: EC:1.1.1.285
label: "3''-deamino-3''-oxonicotianamine reductase"
definition: >-
  Enzymatic activity — 3''-deamino-3''-oxonicotianamine reductase (EC 1.1.1.285). Catalysed reaction: (1) 2'-deoxymugineate + NADP(+) = 3''-deamino-3''-oxonicotianamine + NADPH + H(+). (2) 2'-deoxymugineate + NAD(+) = 3''-deamino-3''-oxonicotianamine + NADH + H(+).
