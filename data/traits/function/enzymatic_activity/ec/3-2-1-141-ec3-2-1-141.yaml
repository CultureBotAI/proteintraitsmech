identifier: EC:3.2.1.141
label: "4-alpha-D-{(1->4)-alpha-D-glucano}trehalose trehalohydrolase"
definition: >-
  Enzymatic activity — 4-alpha-D-{(1->4)-alpha-D-glucano}trehalose trehalohydrolase (EC 3.2.1.141). Catalysed reaction: hydrolysis of (1->4)-alpha-D-glucosidic linkage in 4-alpha-D-[(1->4)- alpha-D-glucanosyl]n trehalose to yield trehalose and (1->4)-alpha-D- glucan.
