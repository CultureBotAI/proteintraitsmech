identifier: EC:1.14.13.54
label: "ketosteroid monooxygenase"
definition: >-
  Enzymatic activity — ketosteroid monooxygenase (EC 1.14.13.54). Catalysed reaction: (1) progesterone + NADPH + O2 + H(+) = testosterone acetate + NADP(+) + H2O. (2) androst-4-ene-3,17-dione + NADPH + O2 + H(+) = testololactone + NADP(+) + H2O. (3) 17alpha-hydroxyprogesterone + NADPH + O2 = androst-4-ene-3,17-dione + acetate + NADP(+) + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
