definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with NADH or NADPH as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) progesterone + NADPH + O2 + H(+) = testosterone acetate + NADP(+) + H2O. (2) androst-4-ene-3,17-dione + NADPH + O2 + H(+) = testololactone + NADP(+) + H2O. (3) 17alpha-hydroxyprogesterone + NADPH + O2 = androst-4-ene-3,17-dione + acetate + NADP(+) + H2O
    source: "ExPASy ENZYME"
