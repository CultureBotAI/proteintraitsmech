identifier: EC:1.1.1.111
label: "3-(imidazol-5-yl)lactate dehydrogenase"
definition: >-
  Enzymatic activity — 3-(imidazol-5-yl)lactate dehydrogenase (EC 1.1.1.111). Catalysed reaction: (1) (S)-3-(imidazol-5-yl)lactate + NAD(+) = 3-(imidazol-5-yl)pyruvate + NADH + H(+). (2) (S)-3-(imidazol-5-yl)lactate + NADP(+) = 3-(imidazol-5-yl)pyruvate + NADPH + H(+).
