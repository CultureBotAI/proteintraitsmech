  Enzymatic activity — L-isoleucine 4-hydroxylase (EC 1.14.11.45). Catalysed reaction: L-isoleucine + 2-oxoglutarate + O2 = (4S)-4-hydroxy-L-isoleucine + succinate + CO2.
