label: "fraxetin 5-hydroxylase"
definition: >-
  Enzymatic activity — fraxetin 5-hydroxylase (EC 1.14.14.164). Catalysed reaction: fraxetin + reduced [NADPH--hemoprotein reductase] + O2 = sideretin (reduced form) + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
