identifier: EC:1.14.15.37
label: "luteothin monooxygenase"
definition: >-
  Enzymatic activity — luteothin monooxygenase (EC 1.14.15.37). Catalysed reaction: luteothin + 4 reduced [2Fe-2S]-[ferredoxin] + 2 O2 + 4 H(+) = aureothin + 4 oxidized [2Fe-2S]-[ferredoxin] + 3 H2O.
