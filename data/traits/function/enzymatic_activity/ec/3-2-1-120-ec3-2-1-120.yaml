identifier: EC:3.2.1.120
label: "oligoxyloglucan beta-glycosidase"
definition: >-
  Enzymatic activity — oligoxyloglucan beta-glycosidase (EC 3.2.1.120). Catalysed reaction: Hydrolysis of (1->4)-beta-D-glucosidic links in oligoxyloglucans so as to remove successive isoprimeverose [i.e. alpha-xylo-(1->6)-beta-D-glucosyl- ] residues from the non-reducing chain ends.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
