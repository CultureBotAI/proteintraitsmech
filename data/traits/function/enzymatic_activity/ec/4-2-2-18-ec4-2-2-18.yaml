identifier: EC:4.2.2.18
label: "inulin fructotransferase (DFA-III-forming)"
definition: >-
  Enzymatic activity — inulin fructotransferase (DFA-III-forming) (EC 4.2.2.18). Catalysed reaction: Produces alpha-D-fructofuranose beta-D-fructofuranose 1,2':2,3'-dianhydride (DFA III) by successively eliminating the diminishing (2->1)-beta-D-fructan (inulin) chain from the terminal D-fructosyl-D-fructosyl disaccharide.
