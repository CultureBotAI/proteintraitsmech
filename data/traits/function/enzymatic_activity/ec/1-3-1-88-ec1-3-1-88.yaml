identifier: EC:1.3.1.88
label: "tRNA-dihydrouridine(16/17) synthase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — tRNA-dihydrouridine(16/17) synthase [NAD(P)(+)] (EC 1.3.1.88). Catalysed reaction: (1) 5,6-dihydrouridine(16) in tRNA + NADP(+) = uridine(16) in tRNA + NADPH + H(+). (2) 5,6-dihydrouridine(16) in tRNA + NAD(+) = uridine(16) in tRNA + NADH + H(+). (3) 5,6-dihydrouridine(17) in tRNA + NADP(+) = uridine(17) in tRNA + NADPH + H(+). (4) 5,6-dihydrouridine(17) in tRNA + NAD(+) = uridine(17) in tRNA + NADH + H(+).
