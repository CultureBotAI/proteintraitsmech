identifier: EC:2.3.2.1
label: D-glutamyltransferase
definition: >-
  Enzymatic activity — D-glutamyltransferase (EC 2.3.2.1). Catalysed reaction: (1) D-glutamine + D-glutamate = gamma-D-glutamyl-D-glutamate + NH4(+). (2) L(or D)-glutamine + (gamma-D-glutamyl)n-[peptide] = NH3 + (gamma-D- glutamyl)n+1-[peptide].
