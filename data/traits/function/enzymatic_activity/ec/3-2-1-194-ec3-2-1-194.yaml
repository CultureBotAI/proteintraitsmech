identifier: EC:3.2.1.194
label: "ginsenosidase type IV"
definition: >-
  Enzymatic activity — ginsenosidase type IV (EC 3.2.1.194). Catalysed reaction: a protopanaxatriol-type ginsenoside with two glycosyl residues at position 6 + 2 H2O = a protopanaxatriol-type ginsenoside with no glycosidic modification at position 6 + D-glucopyranose + a monosaccharide.
