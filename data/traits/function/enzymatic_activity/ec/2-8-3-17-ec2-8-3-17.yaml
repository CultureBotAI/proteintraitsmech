identifier: EC:2.8.3.17
label: "3-(aryl)acryloyl-CoA:(R)-3-(aryl)lactate CoA-transferase"
definition: >-
  Enzymatic activity — 3-(aryl)acryloyl-CoA:(R)-3-(aryl)lactate CoA-transferase (EC 2.8.3.17). Catalysed reaction: (1) (E)-cinnamoyl-CoA + (R)-3-phenyllactate = (R)-3-phenyllactoyl-CoA + (E)-cinnamate. (2) (2R)-2-hydroxy-3-(4-hydroxyphenyl)propanoate + (E)-4-coumaroyl-CoA = (R)-3-(4-hydroxyphenyl)lactoyl-CoA + (E)-4-coumarate. (3) (R)-3-(indol-3-yl)lactate + (E)-3-(indol-3-yl)acryloyl-CoA = (R)-3- (indol-3-yl)lactoyl-CoA + (E)-3-(indol-3-yl)acrylate.
