identifier: EC:1.14.14.32
label: "17alpha-hydroxyprogesterone deacetylase"
definition: >-
  Enzymatic activity — 17alpha-hydroxyprogesterone deacetylase (EC 1.14.14.32). Catalysed reaction: (1) 17alpha-hydroxyprogesterone + reduced [NADPH--hemoprotein reductase] + O2 = androst-4-ene-3,17-dione + acetate + oxidized [NADPH--hemoprotein reductase] + H2O + 2 H(+). (2) 17alpha-hydroxypregnenolone + reduced [NADPH--hemoprotein reductase] + O2 = 3beta-hydroxyandrost-5-en-17-one + acetate + oxidized [NADPH- -hemoprotein reductase] + H2O + 2 H(+).
