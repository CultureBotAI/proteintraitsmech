definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) 17alpha-hydroxyprogesterone + reduced [NADPH--hemoprotein reductase] + O2 = androst-4-ene-3,17-dione + acetate + oxidized [NADPH--hemoprotein reductase] + H2O + 2 H(+). (2) 17alpha-hydroxypregnenolone + reduced [NADPH--hemoprotein reductase] + O2 = 3beta-hydroxyandrost-5-en-17-one + acetate + oxidized [NADPH- -hemoprotein reductase] + H2O + 2 H(+)
