identifier: EC:2.3.1.300
label: "branched-chain beta-ketoacyl-[acyl-carrier-protein] synthase"
definition: >-
  Enzymatic activity — branched-chain beta-ketoacyl-[acyl-carrier-protein] synthase (EC 2.3.1.300). Catalysed reaction: (1) 3-methylbutanoyl-CoA + malonyl-[ACP] + H(+) = 5-methyl-3-oxohexanoyl- [ACP] + CO2 + CoA. (2) 2-methylpropanoyl-CoA + malonyl-[ACP] + H(+) = 4-methyl-3- oxopentanoyl-[ACP] + CO2 + CoA. (3) (2S)-2-methylbutanoyl-CoA + malonyl-[ACP] + H(+) = (4S)-4-methyl-3- oxohexanoyl-[ACP] + CO2 + CoA.
