identifier: EC:1.14.20.11
label: "3-[(Z)-2-isocyanoethenyl]-1H-indole synthase"
definition: >-
  Enzymatic activity — 3-[(Z)-2-isocyanoethenyl]-1H-indole synthase (EC 1.14.20.11). Catalysed reaction: (2S)-3-(1H-indol-3-yl)-2-isocyanopropanoate + 2-oxoglutarate + O2 + H(+) = 3-[(Z)-2-isocyanoethenyl]-1H-indole + succinate + 2 CO2 + H2O.
