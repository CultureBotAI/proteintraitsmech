identifier: EC:1.3.1.5
label: "cucurbitacin Delta(23)-reductase"
definition: >-
  Enzymatic activity — cucurbitacin Delta(23)-reductase (EC 1.3.1.5). Catalysed reaction: (1) 23,24-dihydrocucurbitacin B + NADP(+) = cucurbitacin B + NADPH + H(+). (2) 23,24-dihydrocucurbitacin B + NAD(+) = cucurbitacin B + NADH + H(+).
