identifier: EC:2.4.1.122
label: "N-acetylgalactosaminide beta-1,3-galactosyltransferase"
definition: >-
  Enzymatic activity — N-acetylgalactosaminide beta-1,3-galactosyltransferase (EC 2.4.1.122). Catalysed reaction: an N-acetyl-alpha-D-galactosaminyl derivative + UDP-alpha-D-galactose = a beta-D-galactosyl-(1->3)-N-acetyl-alpha-D-galactosaminyl derivative + UDP + H(+).
