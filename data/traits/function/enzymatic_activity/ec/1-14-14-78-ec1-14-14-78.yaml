identifier: EC:1.14.14.78
label: "phylloquinone omega-hydroxylase"
definition: >-
  Enzymatic activity — phylloquinone omega-hydroxylase (EC 1.14.14.78). Catalysed reaction: phylloquinone + reduced [NADPH--hemoprotein reductase] + O2 = omega- hydroxyphylloquinone + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
