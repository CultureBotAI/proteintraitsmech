identifier: EC:3.2.1.48
label: "sucrose alpha-glucosidase"
definition: >-
  Enzymatic activity — sucrose alpha-glucosidase (EC 3.2.1.48). Catalysed reaction: (1) sucrose + H2O = beta-D-fructose + alpha-D-glucose. (2) D-maltose + H2O = alpha-D-glucose + D-glucose.
