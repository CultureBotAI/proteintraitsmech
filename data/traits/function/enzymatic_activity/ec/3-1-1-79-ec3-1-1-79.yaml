identifier: EC:3.1.1.79
label: "hormone-sensitive lipase"
definition: >-
  Enzymatic activity — hormone-sensitive lipase (EC 3.1.1.79). Catalysed reaction: (1) a diacylglycerol + H2O = a monoacylglycerol + a fatty acid + H(+). (2) a triacylglycerol + H2O = a diacylglycerol + a fatty acid + H(+). (3) a monoacylglycerol + H2O = glycerol + a fatty acid + H(+).
