identifier: EC:1.14.13.64
label: "4-hydroxybenzoate 1-hydroxylase"
definition: >-
  Enzymatic activity — 4-hydroxybenzoate 1-hydroxylase (EC 1.14.13.64). Catalysed reaction: (1) 4-hydroxybenzoate + NADPH + O2 + 2 H(+) = hydroquinone + CO2 + NADP(+) + H2O. (2) 4-hydroxybenzoate + NADH + O2 + 2 H(+) = hydroquinone + CO2 + NAD(+) + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
