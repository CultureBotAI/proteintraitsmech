label: "vanillate/3-O-methylgallate O-demethylase"
definition: >-
  Enzymatic activity — vanillate/3-O-methylgallate O-demethylase (EC 2.1.1.341). Catalysed reaction: (1) vanillate + (6S)-5,6,7,8-tetrahydrofolate = (6S)-5-methyl-5,6,7,8- tetrahydrofolate + 3,4-dihydroxybenzoate. (2) 3-O-methylgallate + (6S)-5,6,7,8-tetrahydrofolate = 3,4,5- trihydroxybenzoate + (6S)-5-methyl-5,6,7,8-tetrahydrofolate.
