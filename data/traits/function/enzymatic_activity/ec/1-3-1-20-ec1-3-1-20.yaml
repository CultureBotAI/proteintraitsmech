identifier: EC:1.3.1.20
label: "trans-1,2-dihydrobenzene-1,2-diol dehydrogenase"
definition: >-
  Enzymatic activity — trans-1,2-dihydrobenzene-1,2-diol dehydrogenase (EC 1.3.1.20). Catalysed reaction: (1) (1R,2R)-1,2-dihydrobenzene-1,2-diol + NADP(+) = catechol + NADPH + H(+). (2) (1S,2S)-1,2-dihydrobenzene-1,2-diol + NADP(+) = catechol + NADPH + H(+).
