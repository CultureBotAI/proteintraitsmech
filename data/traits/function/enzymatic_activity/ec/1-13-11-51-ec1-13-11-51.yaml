definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on single donors with incorporation of molecular oxygen (oxygenases). The oxygen incorporated need not be derived from O2; with incorporation of two atoms of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) a 9-cis-epoxycarotenoid + O2 = a 12'-apo-carotenal + 2-cis,4-trans- xanthoxin. (2) 9-cis-violaxanthin + O2 = (3S,5R,6S)-5,6-epoxy-3-hydroxy-5,6-dihydro- 12'-apo-beta-caroten-12'-al + 2-cis,4-trans-xanthoxin. (3) 9'-cis-neoxanthin + O2 = (3S,5R,6R)-3,5-dihydroxy-6,7-didehydro-5,6- dihydro-12'-apo-beta-caroten-12'-al + 2-cis,4-trans-xanthoxin
