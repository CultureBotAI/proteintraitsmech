label: "5-deoxyribulose 1-phosphate aldolase"
definition: >-
  Enzymatic activity — 5-deoxyribulose 1-phosphate aldolase (EC 4.1.2.62). Catalysed reaction: (1) 5-deoxy-D-ribulose 1-phosphate = dihydroxyacetone phosphate + acetaldehyde. (2) 5-(methylsulfanyl)-D-ribulose 1-phosphate = 2-(methylsulfanyl)acetaldehyde + dihydroxyacetone phosphate.
