identifier: EC:3.2.1.91
label: "cellulose 1,4-beta-cellobiosidase (non-reducing end)"
definition: >-
  Enzymatic activity — cellulose 1,4-beta-cellobiosidase (non-reducing end) (EC 3.2.1.91). Catalysed reaction: Hydrolysis of (1->4)-beta-D-glucosidic linkages in cellulose and cellotetraose, releasing cellobiose from the non-reducing ends of the chains.
