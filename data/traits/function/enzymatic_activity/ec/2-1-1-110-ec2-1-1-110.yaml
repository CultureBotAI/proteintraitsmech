identifier: EC:2.1.1.110
label: "sterigmatocystin 8-O-methyltransferase"
definition: >-
  Enzymatic activity — sterigmatocystin 8-O-methyltransferase (EC 2.1.1.110). Catalysed reaction: (1) sterigmatocystin + S-adenosyl-L-methionine = 8-O- methylsterigmatocystin + S-adenosyl-L-homocysteine + H(+). (2) dihydrosterigmatocystin + S-adenosyl-L-methionine = 8-O- methyldihydrosterigmatocystin + S-adenosyl-L-homocysteine + H(+).
