identifier: EC:3.4.23.36
label: "signal peptidase II"
definition: >-
  Enzymatic activity — signal peptidase II (EC 3.4.23.36). Catalysed reaction: Release of signal peptides from bacterial membrane prolipoproteins. Hydrolyzes -Xaa-Yaa-Zaa-|-(S,diacylglyceryl)Cys-, in which Xaa is hydrophobic (preferably Leu), and Yaa (Ala or Ser) and Zaa (Gly or Ala) have small, neutral side chains.
