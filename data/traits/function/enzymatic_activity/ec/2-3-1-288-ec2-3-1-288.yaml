identifier: EC:2.3.1.288
label: "2-O-sulfo trehalose long-chain-acyltransferase"
definition: >-
  Enzymatic activity — 2-O-sulfo trehalose long-chain-acyltransferase (EC 2.3.1.288). Catalysed reaction: (1) 2-O-sulfo-alpha,alpha-trehalose + octadecanoyl-CoA = 2-O-sulfo-2'-O- octadecanoyl-alpha,alpha-trehalose + CoA. (2) 2-O-sulfo-alpha,alpha-trehalose + hexadecanoyl-CoA = 2-O-sulfo-2'-O- hexadecanoyl-alpha,alpha-trehalose + CoA.
