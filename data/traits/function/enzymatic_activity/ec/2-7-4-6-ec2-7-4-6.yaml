identifier: EC:2.7.4.6
label: "nucleoside-diphosphate kinase"
definition: >-
  Enzymatic activity — nucleoside-diphosphate kinase (EC 2.7.4.6). Catalysed reaction: (1) a ribonucleoside 5'-diphosphate + ATP = a ribonucleoside 5'-triphosphate + ADP. (2) a 2'-deoxyribonucleoside 5'-diphosphate + ATP = a 2'-deoxyribonucleoside 5'-triphosphate + ADP.
