identifier: EC:4.2.1.175
label: "(R)-3-(aryl)lactoyl-CoA dehydratase"
definition: >-
  Enzymatic activity — (R)-3-(aryl)lactoyl-CoA dehydratase (EC 4.2.1.175). Catalysed reaction: (1) (R)-3-phenyllactoyl-CoA = (E)-cinnamoyl-CoA + H2O. (2) (R)-3-(4-hydroxyphenyl)lactoyl-CoA = (E)-4-coumaroyl-CoA + H2O. (3) (R)-3-(indol-3-yl)lactoyl-CoA = (E)-3-(indol-3-yl)acryloyl-CoA + H2O.
