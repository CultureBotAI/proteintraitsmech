identifier: EC:2.5.1.151
label: "alkylcobalamin dealkylase"
definition: >-
  Enzymatic activity — alkylcobalamin dealkylase (EC 2.5.1.151). Catalysed reaction: (1) apo-[alkylcobalamin reductase] + methylcob(III)alamin + glutathione = S-methyl glutathione + cob(I)alamin-[alkylcobalamin reductase] + H(+). (2) apo-[alkylcobalamin reductase] + adenosylcob(III)alamin + glutathione = S-adenosylglutathione + cob(I)alamin-[alkylcobalamin reductase] + H(+).
