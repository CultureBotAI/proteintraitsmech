identifier: EC:1.14.14.158
label: "carotene epsilon-hydroxylase"
definition: >-
  Enzymatic activity — carotene epsilon-hydroxylase (EC 1.14.14.158). Catalysed reaction: (1) alpha-carotene + reduced [NADPH--hemoprotein reductase] + O2 = alpha- cryptoxanthin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) zeinoxanthin + reduced [NADPH--hemoprotein reductase] + O2 = lutein + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
