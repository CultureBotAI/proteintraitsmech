label: "acyl-lipid (n+3)-(Z)-desaturase (ferredoxin)"
definition: >-
  Enzymatic activity — acyl-lipid (n+3)-(Z)-desaturase (ferredoxin) (EC 1.14.19.23). Catalysed reaction: a (9Z)-octadecenoyl-containing glycerolipid + 2 reduced [2Fe-2S]- [ferredoxin] + O2 + 2 H(+) = a (9Z,12Z)-octadecadienoyl-containing glycerolipid + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
