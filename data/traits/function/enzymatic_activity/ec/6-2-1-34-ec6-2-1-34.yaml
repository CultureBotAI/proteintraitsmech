  Enzymatic activity — trans-feruloyl-CoA synthase (EC 6.2.1.34). Catalysed reaction: (1) (E)-ferulate + ATP + CoA = (E)-feruloyl-CoA + ADP + phosphate. (2) (E)-ferulate + ATP + CoA = (E)-feruloyl-CoA + AMP + diphosphate.
