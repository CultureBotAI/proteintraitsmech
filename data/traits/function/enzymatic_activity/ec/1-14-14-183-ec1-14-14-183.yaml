definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) taxusin + reduced [NADPH--hemoprotein reductase] + O2 = 2alpha- hydroxytaxusin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) 7beta-hydroxytaxusin + reduced [NADPH--hemoprotein reductase] + O2 = 2alpha,7beta-dihydroxytaxusin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+)
