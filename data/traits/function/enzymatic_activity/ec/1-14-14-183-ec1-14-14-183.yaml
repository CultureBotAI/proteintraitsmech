identifier: EC:1.14.14.183
label: "taxoid 2alpha-hydroxylase"
definition: >-
  Enzymatic activity — taxoid 2alpha-hydroxylase (EC 1.14.14.183). Catalysed reaction: (1) taxusin + reduced [NADPH--hemoprotein reductase] + O2 = 2alpha- hydroxytaxusin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) 7beta-hydroxytaxusin + reduced [NADPH--hemoprotein reductase] + O2 = 2alpha,7beta-dihydroxytaxusin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
