identifier: EC:3.4.23.52
label: "preflagellin peptidase"
definition: >-
  Enzymatic activity — preflagellin peptidase (EC 3.4.23.52). Catalysed reaction: Cleaves the signal peptide of 3 to 12 amino acids from the N-terminal of preflagellin, usually at Arg-Gly-|- or Lys-Gly-|-, to release flagellin.
