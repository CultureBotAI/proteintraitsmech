identifier: EC:3.4.24.42
label: "atrolysin C"
definition: >-
  Enzymatic activity — atrolysin C (EC 3.4.24.42). Catalysed reaction: Cleavage of 5-His-|-Leu-6, 10-His-|-Leu-11, 14-Ala-|-Leu-15, 16-Tyr-|-Leu-17 and 23-Gly-|-Phe-24 of insulin B chain. With small molecule substrates prefers hydrophobic residue at P2' and small residue such as Ala, Gly at P1.
