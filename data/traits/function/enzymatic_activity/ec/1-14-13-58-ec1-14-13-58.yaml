identifier: EC:1.14.13.58
label: "benzoyl-CoA 3-monooxygenase"
definition: >-
  Enzymatic activity — benzoyl-CoA 3-monooxygenase (EC 1.14.13.58). Catalysed reaction: benzoyl-CoA + NADPH + O2 + H(+) = 3-hydroxybenzoyl-CoA + NADP(+) + H2O.
