identifier: EC:3.5.1.14
label: "N-acyl-aliphatic-L-amino acid amidohydrolase"
definition: >-
  Enzymatic activity — N-acyl-aliphatic-L-amino acid amidohydrolase (EC 3.5.1.14). Catalysed reaction: (1) an N-acyl-L-amino acid + H2O = an L-alpha-amino acid + a carboxylate. (2) an N-acetyl-L-cysteine-S-conjugate + H2O = an S-substituted L-cysteine + acetate.
