label: "homospermidine synthase"
definition: >-
  Enzymatic activity — homospermidine synthase (EC 2.5.1.44). Catalysed reaction: (1) 2 putrescine = sym-homospermidine + NH4(+). (2) putrescine + spermidine = sym-homospermidine + propane-1,3-diamine.
