label: "polyneuridine aldehyde synthase"
definition: >-
  Enzymatic activity — polyneuridine aldehyde synthase (EC 1.14.19.81). Catalysed reaction: (19E)-geissoschizine + reduced [NADPH--hemoprotein reductase] + O2 = polyneuridine aldehyde + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
