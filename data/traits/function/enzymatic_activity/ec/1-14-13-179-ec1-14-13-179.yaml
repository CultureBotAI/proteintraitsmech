identifier: EC:1.14.13.179
label: "methylxanthine N(3)-demethylase"
definition: >-
  Enzymatic activity — methylxanthine N(3)-demethylase (EC 1.14.13.179). Catalysed reaction: (1) theobromine + NADH + O2 + H(+) = 7-methylxanthine + formaldehyde + NAD(+) + H2O. (2) theobromine + NADPH + O2 + H(+) = 7-methylxanthine + formaldehyde + NADP(+) + H2O. (3) 3-methylxanthine + NADH + O2 + H(+) = xanthine + formaldehyde + NAD(+) + H2O. (4) 3-methylxanthine + NADPH + O2 + H(+) = xanthine + formaldehyde + NADP(+) + H2O.
