label: "L-arabinose 1-dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — L-arabinose 1-dehydrogenase [NAD(P)(+)] (EC 1.1.1.376). Catalysed reaction: (1) alpha-L-arabinopyanose + NAD(+) = L-arabinono-1,4-lactone + NADH + H(+). (2) alpha-L-arabinopyanose + NADP(+) = L-arabinono-1,4-lactone + NADPH + H(+).
