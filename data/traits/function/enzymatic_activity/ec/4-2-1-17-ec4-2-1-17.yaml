label: "enoyl-CoA hydratase"
definition: >-
  Enzymatic activity — enoyl-CoA hydratase (EC 4.2.1.17). Catalysed reaction: (1) a 4-saturated-(3S)-3-hydroxyacyl-CoA = a (3E)-enoyl-CoA + H2O. (2) a (3S)-3-hydroxyacyl-CoA = a (2E)-enoyl-CoA + H2O.
