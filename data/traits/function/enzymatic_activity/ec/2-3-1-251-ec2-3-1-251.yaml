identifier: EC:2.3.1.251
label: "lipid IVA palmitoyltransferase"
definition: >-
  Enzymatic activity — lipid IVA palmitoyltransferase (EC 2.3.1.251). Catalysed reaction: (1) lipid A (E. coli) + a 1-hexadecanoyl-2-acyl-sn-glycero-3- phosphocholine = hepta-acyl lipid A (E. coli) + a 2-acyl-sn-glycero-3- phosphocholine. (2) lipid IIA + a 1-hexadecanoyl-2-acyl-sn-glycero-3-phosphocholine = lipid IIB + a 2-acyl-sn-glycero-3-phosphocholine. (3) lipid IVA (E. coli) + a 1-hexadecanoyl-2-acyl-sn-glycero-3- phosphocholine = lipid IVB (E. coli) + a 2-acyl-sn-glycero-3- phosphocholine.
