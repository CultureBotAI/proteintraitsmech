identifier: EC:2.4.1.207
label: "xyloglucan:xyloglucosyl transferase"
definition: >-
  Enzymatic activity — xyloglucan:xyloglucosyl transferase (EC 2.4.1.207). Catalysed reaction: breaks a beta-(1->4) bond in the backbone of a xyloglucan and transfers the xyloglucanyl segment on to O-4 of the non-reducing terminal glucose residue of an acceptor, which can be a xyloglucan or an oligosaccharide of xyloglucan.
