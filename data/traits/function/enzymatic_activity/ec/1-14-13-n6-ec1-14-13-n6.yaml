identifier: EC:1.14.13.n6
label: "hexahomomethionine N-hydroxylase"
definition: >-
  Enzymatic activity — hexahomomethionine N-hydroxylase (EC 1.14.13.n6). Catalysed reaction: (1) hexahomomethionine + 2 O2 + 2 NADPH + 2 H(+) = 9-methylthiononanaldoxime + 3 H2O + CO2 + NADP(+). (2) pentahomomethionine + 2 O2 + 2 NADPH + 2 H(+) = 8-methylthiooctanaldoxime + 3 H2O + CO2 + NADP(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:1.14.13.-
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with NADH or NADPH as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) hexahomomethionine + 2 O2 + 2 NADPH + 2 H(+) = 9-methylthiononanaldoxime + 3 H2O + CO2 + NADP(+). (2) pentahomomethionine + 2 O2 + 2 NADPH + 2 H(+) = 8-methylthiooctanaldoxime + 3 H2O + CO2 + NADP(+)
    source: "ExPASy ENZYME"
    method: SOURCED
