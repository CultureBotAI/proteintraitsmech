identifier: EC:1.3.1.77
label: "anthocyanidin reductase [(2R,3R)-flavan-3-ol-forming]"
definition: >-
  Enzymatic activity — anthocyanidin reductase [(2R,3R)-flavan-3-ol-forming] (EC 1.3.1.77). Catalysed reaction: (1) a (2R,3R)-flavan-3-ol + 2 NAD(+) = an anthocyanidin with a 3-hydroxy group + 2 NADH + 2 H(+). (2) a (2R,3R)-flavan-3-ol + 2 NADP(+) = an anthocyanidin with a 3-hydroxy group + 2 NADPH + 2 H(+).
