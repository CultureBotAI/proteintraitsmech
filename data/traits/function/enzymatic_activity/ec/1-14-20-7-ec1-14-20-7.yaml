identifier: EC:1.14.20.7
label: "2-oxoglutarate/L-arginine monooxygenase/decarboxylase (succinate- forming)"
definition: >-
  Enzymatic activity — 2-oxoglutarate/L-arginine monooxygenase/decarboxylase (succinate- forming) (EC 1.14.20.7). Catalysed reaction: L-arginine + 2-oxoglutarate + O2 = guanidine + L-glutamate 5-semialdehyde + succinate + CO2.
