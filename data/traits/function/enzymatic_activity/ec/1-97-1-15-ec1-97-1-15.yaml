identifier: EC:1.97.1.15
label: "2-(all-trans-polyprenyl)phenol 6-hydroxylase (prephenate)"
definition: >-
  Enzymatic activity — 2-(all-trans-polyprenyl)phenol 6-hydroxylase (prephenate) (EC 1.97.1.15). Catalysed reaction: (1) a 2-(all-trans-polyprenyl)phenol + prephenate + A + H(+) = a 3-(all- trans-polyprenyl)benzene-1,2-diol + 3-phenylpyruvate + AH2 + CO2. (2) a 2-methoxy-6-(all-trans-polyprenyl)phenol + prephenate + A + H(+) = a 2-methoxy-6-(all-trans-polyprenyl)benzene-1,4-diol + 3-phenylpyruvate + AH2 + CO2. (3) a 5-methoxy-2-methyl-3-(all-trans-polyprenyl)benzene-1,4-diol + prephenate + A + H(+) = a 3-demethylubiquinol + 3-phenylpyruvate + AH2 + CO2.
