identifier: EC:5.6.1.3
label: "plus-end-directed kinesin ATPase"
definition: >-
  Enzymatic activity — plus-end-directed kinesin ATPase (EC 5.6.1.3). Catalysed reaction: ATP + H2O + a kinesin associated with a microtubule at position (n) = ADP + phosphate a kinesin associated with a microtubule at position (n+1, toward the plus end).
