label: "2,4-dinitrotoluene dioxygenase"
definition: >-
  Enzymatic activity — 2,4-dinitrotoluene dioxygenase (EC 1.14.12.24). Catalysed reaction: 2,4-dinitrotoluene + NADH + O2 = 4-methyl-5-nitrocatechol + nitrite + NAD(+).
