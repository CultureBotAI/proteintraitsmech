identifier: EC:2.7.11.1
label: "non-specific serine/threonine protein kinase"
definition: >-
  Enzymatic activity — non-specific serine/threonine protein kinase (EC 2.7.11.1). Catalysed reaction: (1) L-seryl-[protein] + ATP = O-phospho-L-seryl-[protein] + ADP + H(+). (2) L-threonyl-[protein] + ATP = O-phospho-L-threonyl-[protein] + ADP + H(+).
