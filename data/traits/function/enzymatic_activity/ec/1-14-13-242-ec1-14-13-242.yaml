identifier: EC:1.14.13.242
label: "3-hydroxy-2-methylpyridine-5-carboxylate monooxygenase"
definition: >-
  Enzymatic activity — 3-hydroxy-2-methylpyridine-5-carboxylate monooxygenase (EC 1.14.13.242). Catalysed reaction: (1) 3-hydroxy-2-methylpyridine-5-carboxylate + NADH + O2 = 2-(acetamidomethylene)succinate + NAD(+). (2) 3-hydroxy-2-methylpyridine-5-carboxylate + NADPH + O2 = 2-(acetamidomethylene)succinate + NADP(+).
