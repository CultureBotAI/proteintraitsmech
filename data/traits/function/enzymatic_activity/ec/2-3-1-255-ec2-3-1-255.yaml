identifier: EC:2.3.1.255
label: "N-terminal amino-acid N(alpha)-acetyltransferase NatA"
definition: >-
  Enzymatic activity — N-terminal amino-acid N(alpha)-acetyltransferase NatA (EC 2.3.1.255). Catalysed reaction: (1) N-terminal glycyl-[protein] + acetyl-CoA = N-terminal N(alpha)- acetylglycyl-[protein] + CoA + H(+). (2) N-terminal L-alanyl-[protein] + acetyl-CoA = N-terminal N(alpha)- acetyl-L-alanyl-[protein] + CoA + H(+). (3) N-terminal L-seryl-[protein] + acetyl-CoA = N-terminal N(alpha)- acetyl-L-seryl-[protein] + CoA + H(+). (4) N-terminal L-valyl-[protein] + acetyl-CoA = N-terminal N(alpha)- acetyl-L-valyl-[protein] + CoA + H(+). (5) N-terminal L-cysteinyl-[protein] + acetyl-CoA = N-terminal N(alpha)- acetyl-L-cysteinyl-[protein] + CoA + H(+). (6) N-terminal L-threonyl-[protein] + acetyl-CoA = N-terminal N(alpha)- acetyl-L-threonyl-[protein] + CoA + H(+).
