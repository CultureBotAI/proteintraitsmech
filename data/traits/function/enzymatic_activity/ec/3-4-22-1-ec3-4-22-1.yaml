identifier: EC:3.4.22.1
label: "cathepsin B"
definition: >-
  Enzymatic activity — cathepsin B (EC 3.4.22.1). Catalysed reaction: Hydrolysis of proteins with broad specificity for peptide bonds. Preferentially cleaves -Arg-Arg-|-Xaa bonds in small molecule substrates (thus differing from cathepsin L). In addition to being an endopeptidase, shows peptidyl-dipeptidase activity, liberating C-terminal dipeptides.
