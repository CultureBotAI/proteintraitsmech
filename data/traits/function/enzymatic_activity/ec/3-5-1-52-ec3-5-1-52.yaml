identifier: EC:3.5.1.52
label: "peptide-N(4)-(N-acetyl-beta-glucosaminyl)asparagine amidase"
definition: >-
  Enzymatic activity — peptide-N(4)-(N-acetyl-beta-glucosaminyl)asparagine amidase (EC 3.5.1.52). Catalysed reaction: Hydrolysis of an N(4)-(acetyl-beta-D-glucosaminyl)asparagine residue in which the glucosamine residue may be further glycosylated, to yield a (substituted) N-acetyl-beta-D-glucosaminylamine and a peptide containing an aspartate residue.
