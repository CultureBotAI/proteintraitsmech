identifier: EC:1.14.13.216
label: "asperlicin C monooxygenase"
definition: >-
  Enzymatic activity — asperlicin C monooxygenase (EC 1.14.13.216). Catalysed reaction: (1) asperlicin C + NADH + O2 + H(+) = asperlicin E + NAD(+) + H2O. (2) asperlicin C + NADPH + O2 + H(+) = asperlicin E + NADP(+) + H2O.
