identifier: EC:3.1.6.20
label: "S-sulfosulfanyl-L-cysteine sulfohydrolase"
definition: >-
  Enzymatic activity — S-sulfosulfanyl-L-cysteine sulfohydrolase (EC 3.1.6.20). Catalysed reaction: (1) S-sulfosulfanyl-L-cysteinyl-[SoxY protein] + H2O = S-sulfanyl-L- cysteinyl-[SoxY protein] + sulfate + H(+). (2) S-(2-sulfodisulfanyl)-L-cysteinyl-[SoxY protein] + H2O = S-disulfanyl-L-cysteinyl-[SoxY protein] + sulfate + H(+).
