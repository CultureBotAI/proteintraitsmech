label: indole-2-monooxygenase
definition: >-
  Enzymatic activity — indole-2-monooxygenase (EC 1.14.14.153). Catalysed reaction: indole + reduced [NADPH--hemoprotein reductase] + O2 = indolin-2-one + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
