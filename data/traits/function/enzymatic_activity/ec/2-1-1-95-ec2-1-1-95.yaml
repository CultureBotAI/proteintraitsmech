identifier: EC:2.1.1.95
label: "tocopherol C-methyltransferase"
definition: >-
  Enzymatic activity — tocopherol C-methyltransferase (EC 2.1.1.95). Catalysed reaction: (1) gamma-tocopherol + S-adenosyl-L-methionine = (+)-alpha-tocopherol + S-adenosyl-L-homocysteine + H(+). (2) delta-tocopherol + S-adenosyl-L-methionine = beta-tocopherol + S-adenosyl-L-homocysteine + H(+). (3) gamma-tocotrienol + S-adenosyl-L-methionine = alpha-tocotrienol + S-adenosyl-L-homocysteine + H(+). (4) delta-tocotrienol + S-adenosyl-L-methionine = beta-tocotrienol + S-adenosyl-L-homocysteine + H(+).
