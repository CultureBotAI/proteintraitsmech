identifier: EC:1.14.19.37
label: "acyl-CoA 5-desaturase"
definition: >-
  Enzymatic activity — acyl-CoA 5-desaturase (EC 1.14.19.37). Catalysed reaction: (1) (11Z,14Z)-eicosadienoyl-CoA + AH2 + O2 = (5Z,11Z,14Z)-eicosatrienoyl- CoA + A + 2 H2O. (2) (11Z,14Z,17Z)-eicosatrienoyl-CoA + AH2 + O2 = (5Z,11Z,14Z,17Z)- eicosatetraenoyl-CoA + A + 2 H2O.
