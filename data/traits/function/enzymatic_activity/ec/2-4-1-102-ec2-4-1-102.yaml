identifier: EC:2.4.1.102
label: "beta-1,3-galactosyl-O-glycosyl-glycoprotein beta-1,6-N- acetylglucosaminyltransferase"
definition: >-
  Enzymatic activity — beta-1,3-galactosyl-O-glycosyl-glycoprotein beta-1,6-N- acetylglucosaminyltransferase (EC 2.4.1.102). Catalysed reaction: (1) a 3-O-[beta-D-galactosyl-(1->3)-N-acetyl-alpha-D-galactosaminyl]-L- seryl-[protein] + UDP-N-acetyl-alpha-D-glucosamine = 3-O-{beta-D- galactosyl-(1->3)-[N-acetyl-beta-D-glucosaminyl-(1->6)]-N-acetyl-alpha-D- galactosaminyl}-L-seryl-[protein] + UDP + H(+). (2) a 3-O-[beta-D-galactosyl-(1->3)-N-acetyl-alpha-D-galactosaminyl]-L- threonyl-[protein] + UDP-N-acetyl-alpha-D-glucosamine = a 3-O-{beta-D- galactosyl-(1->3)-[N-acetyl-beta-D-glucosaminyl-(1->6)]-N-acetyl-alpha-D- galactosaminyl}-L-threonyl-[protein] + UDP + H(+).
