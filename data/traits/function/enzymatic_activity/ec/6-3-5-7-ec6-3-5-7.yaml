identifier: EC:6.3.5.7
label: "glutaminyl-tRNA synthase (glutamine-hydrolyzing)"
definition: >-
  Enzymatic activity — glutaminyl-tRNA synthase (glutamine-hydrolyzing) (EC 6.3.5.7). Catalysed reaction: L-glutamyl-tRNA(Gln) + L-glutamine + ATP + H2O = L-glutaminyl-tRNA(Gln) + L-glutamate + ADP + phosphate + H(+).
