identifier: EC:1.14.13.223
label: "3-hydroxy-4-methyl-anthranilyl-[aryl-carrier protein] 5-monooxygenase"
definition: >-
  Enzymatic activity — 3-hydroxy-4-methyl-anthranilyl-[aryl-carrier protein] 5-monooxygenase (EC 1.14.13.223). Catalysed reaction: 3-hydroxy-4-methylanthranilyl-[aryl-carrier protein] + NADH + O2 + H(+) = 3,5-dihydroxy-4-methylanthranilyl-[aryl-carrier protein] + NAD(+) + H2O.
