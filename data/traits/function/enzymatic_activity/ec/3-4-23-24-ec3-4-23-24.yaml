identifier: EC:3.4.23.24
label: candidapepsin
definition: >-
  Enzymatic activity — candidapepsin (EC 3.4.23.24). Catalysed reaction: Preferential cleavage at the carboxyl of hydrophobic amino acids, but fails to cleave 15-Leu-|-Tyr-16, 16-Tyr-|-Leu-17 and 24-Phe-|-Phe-25 of insulin B chain. Activates trypsinogen, and degrades keratin.
