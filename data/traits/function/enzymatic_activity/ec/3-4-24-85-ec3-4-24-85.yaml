identifier: EC:3.4.24.85
label: "S2P endopeptidase"
definition: >-
  Enzymatic activity — S2P endopeptidase (EC 3.4.24.85). Catalysed reaction: Cleaves several transcription factors that are type-2 transmembrane proteins within membrane-spanning domains. Known substrates include sterol regulatory element-binding protein (SREBP) -1, SREBP-2 and forms of the transcriptional activator ATF6. SREBP-2 is cleaved at the site 477-DRSRILL-|-CVLTFLCLSFNPLTSLLQWGGA-505. The residues Asn-Pro, 11 residues distal to the site of cleavage in the membrane-spanning domain, are important for cleavage by S2P endopeptidase. Replacement of either of these residues does not prevent cleavage, but there is no cleavage if both of these residues are replaced.
