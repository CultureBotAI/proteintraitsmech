identifier: EC:2.3.1.282
label: "phenolphthiocerol/phthiocerol/phthiodiolone dimycocerosyl transferase"
definition: >-
  Enzymatic activity — phenolphthiocerol/phthiocerol/phthiodiolone dimycocerosyl transferase (EC 2.3.1.282). Catalysed reaction: (1) 2 a mycocerosyl-[mycocerosic acid synthase] + a phthiocerol = a dimycocerosyl phthiocerol + 2 holo-[mycocerosic acid synthase]. (2) 2 a mycocerosyl-[mycocerosic acid synthase] + a phthiodiolone = a dimycocerosyl phthiodiolone + 2 holo-[mycocerosic acid synthase]. (3) 2 a mycocerosyl-[mycocerosic acid synthase] + a phenolphthiocerol = a dimycocerosyl phenolphthiocerol + 2 holo-[mycocerosic acid synthase].
definition_source: ExPASy ENZYME
