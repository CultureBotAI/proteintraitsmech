identifier: EC:1.2.1.16
label: "succinate-semialdehyde dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — succinate-semialdehyde dehydrogenase [NAD(P)(+)] (EC 1.2.1.16). Catalysed reaction: (1) succinate semialdehyde + NADP(+) + H2O = succinate + NADPH + 2 H(+). (2) succinate semialdehyde + NAD(+) + H2O = succinate + NADH + 2 H(+).
