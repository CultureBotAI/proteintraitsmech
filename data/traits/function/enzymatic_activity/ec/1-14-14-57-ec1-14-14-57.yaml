identifier: EC:1.14.14.57
label: "taurochenodeoxycholate 6alpha-hydroxylase"
definition: >-
  Enzymatic activity — taurochenodeoxycholate 6alpha-hydroxylase (EC 1.14.14.57). Catalysed reaction: (1) taurochenodeoxycholate + reduced [NADPH--hemoprotein reductase] + O2 = taurohyocholate + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) lithocholate + reduced [NADPH--hemoprotein reductase] + O2 = hyodeoxycholate + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
