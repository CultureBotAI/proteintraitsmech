identifier: EC:2.1.1.163
label: "demethylmenaquinone methyltransferase"
definition: >-
  Enzymatic activity — demethylmenaquinone methyltransferase (EC 2.1.1.163). Catalysed reaction: a 2-demethylmenaquinol + S-adenosyl-L-methionine = a menaquinol + S-adenosyl-L-homocysteine + H(+).
