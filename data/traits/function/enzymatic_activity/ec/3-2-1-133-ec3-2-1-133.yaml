identifier: EC:3.2.1.133
label: "glucan 1,4-alpha-maltohydrolase"
definition: >-
  Enzymatic activity — glucan 1,4-alpha-maltohydrolase (EC 3.2.1.133). Catalysed reaction: hydrolysis of (1->4)-alpha-D-glucosidic linkages in polysaccharides so as to remove successive alpha-maltose residues from the non-reducing ends of the chains.
