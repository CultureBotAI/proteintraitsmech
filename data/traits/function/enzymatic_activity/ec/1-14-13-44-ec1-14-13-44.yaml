identifier: EC:1.14.13.44
label: "2-hydroxybiphenyl 3-monooxygenase"
definition: >-
  Enzymatic activity — 2-hydroxybiphenyl 3-monooxygenase (EC 1.14.13.44). Catalysed reaction: biphenyl-2-ol + NADH + O2 + H(+) = biphenyl-2,3-diol + NAD(+) + H2O.
