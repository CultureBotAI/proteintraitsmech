label: "dihydroceramide fatty acyl 2-hydroxylase"
definition: >-
  Enzymatic activity — dihydroceramide fatty acyl 2-hydroxylase (EC 1.14.18.7). Catalysed reaction: an N-(1,2-saturated acyl)sphinganine + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = an N-[(2'R)-hydroxyacyl]sphinganine + 2 Fe(III)-[cytochrome b5] + H2O.
