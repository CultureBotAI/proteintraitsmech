identifier: EC:1.1.1.237
label: "hydroxyphenylpyruvate reductase"
definition: >-
  Enzymatic activity — hydroxyphenylpyruvate reductase (EC 1.1.1.237). Catalysed reaction: (1) (2R)-2-hydroxy-3-(4-hydroxyphenyl)propanoate + NADP(+) = 3-(4-hydroxyphenyl)pyruvate + NADPH + H(+). (2) (2R)-2-hydroxy-3-(4-hydroxyphenyl)propanoate + NAD(+) = 3-(4-hydroxyphenyl)pyruvate + NADH + H(+). (3) (2R)-3-(3,4-dihydroxyphenyl)lactate + NAD(+) = 3-(3,4- dihydroxyphenyl)pyruvate + NADH + H(+). (4) (2R)-3-(3,4-dihydroxyphenyl)lactate + NADP(+) = 3-(3,4- dihydroxyphenyl)pyruvate + NADPH + H(+).
