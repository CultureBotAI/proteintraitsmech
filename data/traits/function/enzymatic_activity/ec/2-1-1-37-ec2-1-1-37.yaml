identifier: EC:2.1.1.37
label: "DNA (cytosine-5-)-methyltransferase"
definition: >-
  Enzymatic activity — DNA (cytosine-5-)-methyltransferase (EC 2.1.1.37). Catalysed reaction: a 2'-deoxycytidine in DNA + S-adenosyl-L-methionine = a 5-methyl- 2'-deoxycytidine in DNA + S-adenosyl-L-homocysteine + H(+).
