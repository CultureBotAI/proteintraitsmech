identifier: EC:1.14.13.34
label: "leukotriene-E4 20-monooxygenase"
definition: >-
  Enzymatic activity — leukotriene-E4 20-monooxygenase (EC 1.14.13.34). Catalysed reaction: leukotriene E4 + NADPH + O2 + H(+) = 20-hydroxy-leukotriene E4 + NADP(+) + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
