identifier: EC:3.1.1.94
label: "versiconal hemiacetal acetate esterase"
definition: >-
  Enzymatic activity — versiconal hemiacetal acetate esterase (EC 3.1.1.94). Catalysed reaction: (1) (2S,3S)-versiconal hemiacetal acetate + H2O = (2S-3S)-versiconal hemiacetal + acetate + H(+). (2) (3S)-versiconol acetate + H2O = (S)-versiconol + acetate + H(+).
