identifier: EC:1.14.14.54
label: "phenylacetate 2-hydroxylase"
definition: >-
  Enzymatic activity — phenylacetate 2-hydroxylase (EC 1.14.14.54). Catalysed reaction: 2-phenylacetate + reduced [NADPH--hemoprotein reductase] + O2 = (2-hydroxyphenyl)acetate + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
