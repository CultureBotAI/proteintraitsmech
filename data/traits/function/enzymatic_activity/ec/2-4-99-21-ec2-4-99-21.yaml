identifier: EC:2.4.99.21
label: "dolichyl-phosphooligosaccharide-protein glycotransferase"
definition: >-
  Enzymatic activity — dolichyl-phosphooligosaccharide-protein glycotransferase (EC 2.4.99.21). Catalysed reaction: an archaeal dolichyl phosphooligosaccharide + [protein]-L-asparagine = an archaeal dolichyl phosphate + a glycoprotein with the oligosaccharide chain attached by N-beta-D-glycosyl linkage to a protein L-asparagine.
