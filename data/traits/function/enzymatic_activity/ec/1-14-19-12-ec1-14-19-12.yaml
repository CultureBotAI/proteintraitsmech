identifier: EC:1.14.19.12
label: "acyl-lipid omega-(9-4) desaturase"
definition: >-
  Enzymatic activity — acyl-lipid omega-(9-4) desaturase (EC 1.14.19.12). Catalysed reaction: (1) a (9Z,12Z)-octadecadienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = a (5Z,9Z,12Z)-octadecatrienoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) (9Z,12Z,15Z)-octadecatrienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = a (5Z,9Z,12Z,15Z)-octadecatetraenoyl- containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
