identifier: EC:1.14.14.110
label: "2-hydroxy-1,4-benzoxazin-3-one monooxygenase"
definition: >-
  Enzymatic activity — 2-hydroxy-1,4-benzoxazin-3-one monooxygenase (EC 1.14.14.110). Catalysed reaction: 2-hydroxy-2H-1,4-benzoxazin-3(4H)-one + reduced [NADPH--hemoprotein reductase] + O2 = DIBOA + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
