identifier: EC:6.2.1.57
label: "long-chain fatty acid adenylase/transferase FadD23"
definition: >-
  Enzymatic activity — long-chain fatty acid adenylase/transferase FadD23 (EC 6.2.1.57). Catalysed reaction: (1) holo-[(hydroxy)phthioceranic acid synthase] + octadecanoate + ATP = octadecanoyl-[(hydroxy)phthioceranic acid synthase] + AMP + diphosphate. (2) holo-[(hydroxy)phthioceranic acid synthase] + hexadecanoate + ATP = hexadecanoyl-[(hydroxy)phthioceranic acid synthase] + AMP + diphosphate.
