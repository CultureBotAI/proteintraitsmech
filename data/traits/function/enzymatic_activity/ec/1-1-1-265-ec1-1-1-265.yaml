identifier: EC:1.1.1.265
label: "3-methylbutanal reductase"
definition: >-
  Enzymatic activity — 3-methylbutanal reductase (EC 1.1.1.265). Catalysed reaction: (1) 3-methylbutan-1-ol + NADP(+) = 3-methylbutanal + NADPH + H(+). (2) 3-methylbutan-1-ol + NAD(+) = 3-methylbutanal + NADH + H(+).
