identifier: EC:3.4.22.28
label: "picornain 3C"
definition: >-
  Enzymatic activity — picornain 3C (EC 3.4.22.28). Catalysed reaction: Selective cleavage of Gln-|-Gly bond in the poliovirus polyprotein. In other picornavirus reactions Glu may be substituted for Gln, and Ser or Thr for Gly.
