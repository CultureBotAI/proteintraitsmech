identifier: EC:1.1.1.147
label: "16alpha-hydroxysteroid dehydrogenase"
definition: >-
  Enzymatic activity — 16alpha-hydroxysteroid dehydrogenase (EC 1.1.1.147). Catalysed reaction: (1) a 16alpha-hydroxysteroid + NADP(+) = a 16-oxosteroid + NADPH + H(+). (2) a 16alpha-hydroxysteroid + NAD(+) = a 16-oxosteroid + NADH + H(+).
