identifier: EC:1.1.1.62
label: "17beta-estradiol 17-dehydrogenase"
definition: >-
  Enzymatic activity — 17beta-estradiol 17-dehydrogenase (EC 1.1.1.62). Catalysed reaction: (1) 17beta-estradiol + NAD(+) = estrone + NADH + H(+). (2) 17beta-estradiol + NADP(+) = estrone + NADPH + H(+).
