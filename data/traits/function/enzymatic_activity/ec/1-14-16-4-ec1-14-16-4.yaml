identifier: EC:1.14.16.4
label: "tryptophan 5-monooxygenase"
definition: >-
  Enzymatic activity — tryptophan 5-monooxygenase (EC 1.14.16.4). Catalysed reaction: (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin + L-tryptophan + O2 = 5-hydroxy-L-tryptophan + (4aS,6R)-4a-hydroxy-L-erythro-5,6,7,8- tetrahydrobiopterin.
