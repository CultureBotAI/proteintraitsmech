label: "inositol-1,3,4-trisphosphate 5/6-kinase"
definition: >-
  Enzymatic activity — inositol-1,3,4-trisphosphate 5/6-kinase (EC 2.7.1.159). Catalysed reaction: (1) 1D-myo-inositol 1,3,4-trisphosphate + ATP = 1D-myo-inositol 1,3,4,5- tetrakisphosphate + ADP + H(+). (2) 1D-myo-inositol 1,3,4-trisphosphate + ATP = 1D-myo-inositol 1,3,4,6- tetrakisphosphate + ADP + H(+).
