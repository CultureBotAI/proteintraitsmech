identifier: EC:2.1.1.183
label: "18S rRNA (adenine(1779)-N(6)/adenine(1780)-N(6))-dimethyltransferase"
definition: >-
  Enzymatic activity — 18S rRNA (adenine(1779)-N(6)/adenine(1780)-N(6))-dimethyltransferase (EC 2.1.1.183). Catalysed reaction: adenosine(1779)/adenosine(1780) in 18S rRNA + 4 S-adenosyl-L-methionine = N(6)-dimethyladenosine(1779)/N(6)-dimethyladenosine(1780) in 18S rRNA + 4 S-adenosyl-L-homocysteine + 4 H(+).
