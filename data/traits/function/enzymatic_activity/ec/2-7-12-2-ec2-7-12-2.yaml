identifier: EC:2.7.12.2
label: "mitogen-activated protein kinase kinase"
definition: >-
  Enzymatic activity — mitogen-activated protein kinase kinase (EC 2.7.12.2). Catalysed reaction: (1) L-seryl-[protein] + ATP = O-phospho-L-seryl-[protein] + ADP + H(+). (2) L-threonyl-[protein] + ATP = O-phospho-L-threonyl-[protein] + ADP + H(+). (3) L-tyrosyl-[protein] + ATP = O-phospho-L-tyrosyl-[protein] + ADP + H(+).
