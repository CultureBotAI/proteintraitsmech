identifier: EC:1.14.16.5
label: "alkylglycerol monooxygenase"
definition: >-
  Enzymatic activity — alkylglycerol monooxygenase (EC 1.14.16.5). Catalysed reaction: 1-O-(1,2-saturated-alkyl)-sn-glycerol + (6R)-L-erythro-5,6,7,8- tetrahydrobiopterin + O2 = a 1-(1-hydroxyalkyl)-sn-glycerol + (6R)-L- erythro-6,7-dihydrobiopterin + H2O.
