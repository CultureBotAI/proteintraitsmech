identifier: EC:4.4.1.45
label: "extrinsic cysteine-dependent pyridinium-3,5-bisthiocarboxylic acid mononucleotide synthase"
definition: >-
  Enzymatic activity — extrinsic cysteine-dependent pyridinium-3,5-bisthiocarboxylic acid mononucleotide synthase (EC 4.4.1.45). Catalysed reaction: (1) a [4Fe-5S] iron-sulfur cluster linked by 3 L-cysteine residues + pyridin-1-ium-3,5-dicarboxylate mononucleotide + ATP + reduced acceptor = a [4Fe-4S] iron-sulfur cluster linked by 3 L-cysteine residues + pyridin- 1-ium-3-carboxylate-5-thiocarboxylate mononucleotide + AMP + diphosphate + acceptor. (2) a [4Fe-5S] iron-sulfur cluster linked by 3 L-cysteine residues + pyridin-1-ium-3-carboxylate-5-thiocarboxylate mononucleotide + ATP + reduced acceptor = a [4Fe-4S] iron-sulfur cluster linked by 3 L-cysteine residues + pyridin-1-ium-3,5-bisthiocarboxylate mononucleotide + AMP + diphosphate + acceptor.
