identifier: EC:2.5.1.36
label: "trihydroxypterocarpan dimethylallyltransferase"
definition: >-
  Enzymatic activity — trihydroxypterocarpan dimethylallyltransferase (EC 2.5.1.36). Catalysed reaction: (1) (6aS,11aS)-3,6a,9-trihydroxypterocarpan + dimethylallyl diphosphate = (6aS,11aS)-2-dimethylallyl-3,6a,9-trihydroxypterocarpan + diphosphate. (2) (6aS,11aS)-3,6a,9-trihydroxypterocarpan + dimethylallyl diphosphate = (6aS,11aS)-4-dimethylallyl-3,6a,9-trihydroxypterocarpan + diphosphate.
