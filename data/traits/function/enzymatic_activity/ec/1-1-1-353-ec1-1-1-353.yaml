identifier: EC:1.1.1.353
label: "versiconal hemiacetal acetate reductase"
definition: >-
  Enzymatic activity — versiconal hemiacetal acetate reductase (EC 1.1.1.353). Catalysed reaction: (1) (2S)-versicolorone + NADP(+) = 1'-hydroxyversicolorone + NADPH + H(+). (2) (3S)-versiconol acetate + NADP(+) = (2S,3S)-versiconal hemiacetal acetate + NADPH + H(+). (3) (S)-versiconol + NADP(+) = (2S-3S)-versiconal hemiacetal + NADPH + H(+).
