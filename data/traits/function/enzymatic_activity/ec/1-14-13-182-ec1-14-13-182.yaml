  Enzymatic activity — 2-heptyl-3-hydroxy-4(1H)-quinolone synthase (EC 1.14.13.182). Catalysed reaction: 2-heptyl-4(1H)-quinolone + NADH + O2 + H(+) = 2-heptyl-3-hydroxy-4(1H)- quinolone + NAD(+) + H2O.
