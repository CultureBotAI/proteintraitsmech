label: "ipsdienol dehydrogenase"
definition: >-
  Enzymatic activity — ipsdienol dehydrogenase (EC 1.1.1.386). Catalysed reaction: (1) (4R)-ipsdienol + NADP(+) = ipsdienone + NADPH + H(+). (2) (4R)-ipsdienol + NAD(+) = ipsdienone + NADH + H(+).
