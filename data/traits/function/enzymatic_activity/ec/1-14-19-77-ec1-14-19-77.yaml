identifier: EC:1.14.19.77
label: "plasmanylethanolamine desaturase"
definition: >-
  Enzymatic activity — plasmanylethanolamine desaturase (EC 1.14.19.77). Catalysed reaction: a 1-(1,2-saturated alkyl)-2-acyl-sn-glycero-3-phosphoethanolamine + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a 1-O-(1Z-alkenyl)-2-acyl- sn-glycero-3-phosphoethanolamine + 2 Fe(III)-[cytochrome b5] + 2 H2O.
