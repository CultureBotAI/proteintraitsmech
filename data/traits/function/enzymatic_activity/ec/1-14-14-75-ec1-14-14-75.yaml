identifier: EC:1.14.14.75
label: "fenbendazole monooxygenase (4'-hydroxylating)"
definition: >-
  Enzymatic activity — fenbendazole monooxygenase (4'-hydroxylating) (EC 1.14.14.75). Catalysed reaction: fenbendazole + reduced [NADPH--hemoprotein reductase] + O2 = 4'-hydroxyfenbendazole + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
