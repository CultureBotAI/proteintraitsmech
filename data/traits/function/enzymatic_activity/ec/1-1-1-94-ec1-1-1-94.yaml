identifier: EC:1.1.1.94
label: "glycerol-3-phosphate dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — glycerol-3-phosphate dehydrogenase [NAD(P)(+)] (EC 1.1.1.94). Catalysed reaction: (1) sn-glycerol 3-phosphate + NAD(+) = dihydroxyacetone phosphate + NADH + H(+). (2) sn-glycerol 3-phosphate + NADP(+) = dihydroxyacetone phosphate + NADPH + H(+).
