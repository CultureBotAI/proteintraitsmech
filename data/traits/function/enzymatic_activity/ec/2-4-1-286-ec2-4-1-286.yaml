  Enzymatic activity — chalcone 4'-O-glucosyltransferase (EC 2.4.1.286). Catalysed reaction: (1) 2',4,4',6'-tetrahydroxychalcone + UDP-alpha-D-glucose = 2',4,4',6'-tetrahydroxychalcone 4'-O-beta-D-glucoside + UDP + H(+). (2) 2',3,4,4',6'-pentahydroxychalcone + UDP-alpha-D-glucose = 2',3,4,4',6'-pentahydroxychalcone 4'-O-beta-D-glucoside + UDP + H(+).
