  Enzymatic activity — taxane oxetanase 1 (EC 1.14.14.191). Catalysed reaction: taxa-4(20),11-dien-5alpha-yl acetate + reduced [NADPH--hemoprotein reductase] + O2 = 5,20-epoxytaxa-11-en-4alpha-yl acetate + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
