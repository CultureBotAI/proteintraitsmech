identifier: EC:1.3.1.89
label: "tRNA-dihydrouridine(47) synthase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — tRNA-dihydrouridine(47) synthase [NAD(P)(+)] (EC 1.3.1.89). Catalysed reaction: (1) 5,6-dihydrouridine(47) in tRNA + NADP(+) = uridine(47) in tRNA + NADPH + H(+). (2) 5,6-dihydrouridine(47) in tRNA + NAD(+) = uridine(47) in tRNA + NADH + H(+).
