identifier: EC:1.5.1.49
label: "1-pyrroline-2-carboxylate reductase [NAD(P)H]"
definition: >-
  Enzymatic activity — 1-pyrroline-2-carboxylate reductase [NAD(P)H] (EC 1.5.1.49). Catalysed reaction: (1) L-proline + NADP(+) = 1-pyrroline-2-carboxylate + NADPH + H(+). (2) L-proline + NAD(+) = 1-pyrroline-2-carboxylate + NADH + H(+).
