identifier: EC:2.4.2.1
label: "purine-nucleoside phosphorylase"
definition: >-
  Enzymatic activity — purine-nucleoside phosphorylase (EC 2.4.2.1). Catalysed reaction: (1) a purine D-ribonucleoside + phosphate = a purine nucleobase + alpha- D-ribose 1-phosphate. (2) a purine 2'-deoxy-D-ribonucleoside + phosphate = a purine nucleobase + 2-deoxy-alpha-D-ribose 1-phosphate.
