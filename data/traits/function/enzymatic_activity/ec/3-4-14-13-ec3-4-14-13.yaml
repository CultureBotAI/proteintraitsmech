identifier: EC:3.4.14.13
label: "gamma-D-glutamyl-L-lysine dipeptidyl-peptidase"
definition: >-
  Enzymatic activity — gamma-D-glutamyl-L-lysine dipeptidyl-peptidase (EC 3.4.14.13). Catalysed reaction: The enzyme releases L-Ala-gamma-D-Glu dipeptides from cell wall peptides via cleavage of an L-Ala-gamma-D-Glu-|-L-Lys bond.
