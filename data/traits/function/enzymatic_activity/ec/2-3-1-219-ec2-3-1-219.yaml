identifier: EC:2.3.1.219
label: "demethoxycurcumin synthase"
definition: >-
  Enzymatic activity — demethoxycurcumin synthase (EC 2.3.1.219). Catalysed reaction: (1) (E)-feruloylacetyl-CoA + (E)-4-coumaroyl-CoA + H2O = demethoxycurcumin + CO2 + 2 CoA. (2) (4-coumaroyl)acetyl-CoA + 4-coumaroyl-CoA + H2O = bisdemethoxycurcumin + CO2 + 2 CoA.
