identifier: EC:3.4.14.2
label: "dipeptidyl-peptidase II"
definition: >-
  Enzymatic activity — dipeptidyl-peptidase II (EC 3.4.14.2). Catalysed reaction: Release of an N-terminal dipeptide, Xaa-Yaa-|-, preferentially when Yaa is Ala or Pro. Substrates are oligopeptides, preferentially tripeptides.
