identifier: EC:1.14.19.56
label: "1H-pyrrole-2-carbonyl-[peptidyl-carrier protein] chlorinase"
definition: >-
  Enzymatic activity — 1H-pyrrole-2-carbonyl-[peptidyl-carrier protein] chlorinase (EC 1.14.19.56). Catalysed reaction: (1H-pyrrole-2-carbonyl)-[peptidyl-carrier protein] + 2 FADH2 + 2 chloride + 2 O2 = (4,5-dichloro-1H-pyrrole-2-carbonyl)-[peptidyl-carrier protein] + 2 FAD + 4 H2O.
