identifier: EC:1.4.3.15
label: "D-glutamate(D-aspartate) oxidase"
definition: >-
  Enzymatic activity — D-glutamate(D-aspartate) oxidase (EC 1.4.3.15). Catalysed reaction: (1) D-glutamate + O2 + H2O = 2-oxoglutarate + H2O2 + NH4(+). (2) D-aspartate + O2 + H2O = oxaloacetate + H2O2 + NH4(+).
