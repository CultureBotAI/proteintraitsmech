identifier: EC:1.14.99.64
label: "zeaxanthin 4-ketolase"
definition: >-
  Enzymatic activity — zeaxanthin 4-ketolase (EC 1.14.99.64). Catalysed reaction: (1) all-trans-zeaxanthin + 2 AH2 + 2 O2 = all-trans-adonixanthin + 2 A + 3 H2O. (2) all-trans-adonixanthin + 2 AH2 + 2 O2 = all-trans-(3S,3'S)- astaxanthin + 2 A + 3 H2O.
