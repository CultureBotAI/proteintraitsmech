identifier: EC:3.4.22.2
label: papain
definition: >-
  Enzymatic activity — papain (EC 3.4.22.2). Catalysed reaction: Hydrolysis of proteins with broad specificity for peptide bonds, but preference for an amino acid bearing a large hydrophobic side chain at the P2 position. Does not accept Val in P1'.
