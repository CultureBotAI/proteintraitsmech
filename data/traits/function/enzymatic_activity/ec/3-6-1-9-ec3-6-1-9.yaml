identifier: EC:3.6.1.9
label: "nucleotide diphosphatase"
definition: >-
  Enzymatic activity — nucleotide diphosphatase (EC 3.6.1.9). Catalysed reaction: (1) a ribonucleoside 5'-triphosphate + H2O = a ribonucleoside 5'-phosphate + diphosphate + H(+). (2) a 2'-deoxyribonucleoside 5'-triphosphate + H2O = a 2'-deoxyribonucleoside 5'-phosphate + diphosphate + H(+).
