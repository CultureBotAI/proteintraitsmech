identifier: EC:2.5.1.17
label: "corrinoid adenosyltransferase"
definition: >-
  Enzymatic activity — corrinoid adenosyltransferase (EC 2.5.1.17). Catalysed reaction: (1) 2 cob(II)alamin + reduced [electron-transfer flavoprotein] + 2 ATP = 2 adenosylcob(III)alamin + 2 triphosphate + oxidized [electron-transfer flavoprotein] + 3 H(+). (2) 2 cob(II)yrinate a,c diamide + reduced [electron-transfer flavoprotein] + 2 ATP = 2 adenosylcob(III)yrinate a,c-diamide + 2 triphosphate + oxidized [electron-transfer flavoprotein] + 3 H(+).
