identifier: EC:3.2.1.164
label: "galactan endo-1,6-beta-galactosidase"
definition: >-
  Enzymatic activity — galactan endo-1,6-beta-galactosidase (EC 3.2.1.164). Catalysed reaction: Endohydrolysis of (1->6)-beta-D-galactosidic linkages in arabinogalactan proteins and (1->3):(1->6)-beta-galactans to yield galactose and beta- (1->6)-galactaobiose as the final products.
