identifier: EC:1.7.1.9
label: "nitroquinoline-N-oxide reductase"
definition: >-
  Enzymatic activity — nitroquinoline-N-oxide reductase (EC 1.7.1.9). Catalysed reaction: (1) 4-(hydroxyamino)quinoline N-oxide + 2 NADP(+) + H2O = 4-nitroquinoline N-oxide + 2 NADPH + 2 H(+). (2) 4-(hydroxyamino)quinoline N-oxide + 2 NAD(+) + H2O = 4-nitroquinoline N-oxide + 2 NADH + 2 H(+).
