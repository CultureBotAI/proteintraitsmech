identifier: EC:1.3.1.81
label: "(+)-pulegone reductase"
definition: >-
  Enzymatic activity — (+)-pulegone reductase (EC 1.3.1.81). Catalysed reaction: (1) (1R,4S)-menthone + NADP(+) = (R)-pulegone + NADPH + H(+). (2) (2R,5R)-isomenthone + NADP(+) = (R)-pulegone + NADPH + H(+).
