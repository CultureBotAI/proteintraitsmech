identifier: EC:3.4.24.80
label: "membrane-type matrix metalloproteinase-1"
definition: >-
  Enzymatic activity — membrane-type matrix metalloproteinase-1 (EC 3.4.24.80). Catalysed reaction: Endopeptidase activity. Activates progelatinase A by cleavage of the propeptide at 37-Asn-|-Leu-38. Other bonds hydrolyzed include 35-Gly-|-Ile-36 in the propeptide of collagenase 3, and 341-Asn-|-Phe- 342, 441-Asp-|-Leu-442 and 354-Gln-|-Thr-355 in the aggrecan interglobular domain.
