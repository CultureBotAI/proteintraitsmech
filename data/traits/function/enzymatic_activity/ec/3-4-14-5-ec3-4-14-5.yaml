identifier: EC:3.4.14.5
label: "dipeptidyl-peptidase IV"
definition: >-
  Enzymatic activity — dipeptidyl-peptidase IV (EC 3.4.14.5). Catalysed reaction: Release of an N-terminal dipeptide, Xaa-Yaa-|-Zaa-, from a polypeptide, preferentially when Yaa is Pro, provided Zaa is neither Pro nor hydroxyproline.
