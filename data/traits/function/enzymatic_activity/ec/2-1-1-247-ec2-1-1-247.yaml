identifier: EC:2.1.1.247
label: "[methyl-Co(III) methylamine-specific corrinoid protein]:coenzyme M methyltransferase"
definition: >-
  Enzymatic activity — [methyl-Co(III) methylamine-specific corrinoid protein]:coenzyme M methyltransferase (EC 2.1.1.247). Catalysed reaction: methyl-Co(III)-[methylamine-specific corrinoid protein] + coenzyme M = Co(I)-[methylamine-specific corrinoid protein] + methyl-coenzyme M + H(+).
