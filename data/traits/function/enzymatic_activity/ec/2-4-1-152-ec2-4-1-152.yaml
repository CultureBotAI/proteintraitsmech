identifier: EC:2.4.1.152
label: "4-galactosyl-N-acetylglucosaminide 3-alpha-L-fucosyltransferase"
definition: >-
  Enzymatic activity — 4-galactosyl-N-acetylglucosaminide 3-alpha-L-fucosyltransferase (EC 2.4.1.152). Catalysed reaction: a beta-D-galactosyl-(1->4)-N-acetyl-beta-D-glucosaminyl derivative + GDP- beta-L-fucose = a beta-D-galactosyl-(1->4)-[alpha-L-fucosyl-(1->3)]-N- acetyl-beta-D-glucosaminyl derivative + GDP + H(+).
