identifier: EC:1.14.11.51
label: "DNA N(6)-methyladenine demethylase"
definition: >-
  Enzymatic activity — DNA N(6)-methyladenine demethylase (EC 1.14.11.51). Catalysed reaction: an N(6)-methyl-2'-deoxyadenosine in DNA + 2-oxoglutarate + O2 = a 2'-deoxyadenosine in DNA + formaldehyde + succinate + CO2.
