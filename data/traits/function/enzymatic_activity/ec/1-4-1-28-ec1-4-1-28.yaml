identifier: EC:1.4.1.28
label: "secondary-alkyl amine dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — secondary-alkyl amine dehydrogenase [NAD(P)(+)] (EC 1.4.1.28). Catalysed reaction: (1) a secondary alkyl amine + NAD(+) + H2O = a ketone + NH4(+) + NADH + H(+). (2) a secondary alkyl amine + NADP(+) + H2O = a ketone + NH4(+) + NADPH + H(+).
