identifier: EC:1.14.14.64
label: "beta-amyrin 6beta-monooxygenase"
definition: >-
  Enzymatic activity — beta-amyrin 6beta-monooxygenase (EC 1.14.14.64). Catalysed reaction: beta-amyrin + reduced [NADPH--hemoprotein reductase] + O2 = daturadiol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
