identifier: EC:1.14.15.22
label: "vitamin D 1,25-hydroxylase"
definition: >-
  Enzymatic activity — vitamin D 1,25-hydroxylase (EC 1.14.15.22). Catalysed reaction: (1) calciol + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = calcidiol + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O. (2) calcidiol + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = calcitriol + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O.
