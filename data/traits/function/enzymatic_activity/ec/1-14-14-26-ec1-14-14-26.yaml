identifier: EC:1.14.14.26
label: "24-hydroxycholesterol 7alpha-hydroxylase"
definition: >-
  Enzymatic activity — 24-hydroxycholesterol 7alpha-hydroxylase (EC 1.14.14.26). Catalysed reaction: (24S)-hydroxycholesterol + reduced [NADPH--hemoprotein reductase] + O2 = (24S)-7alpha-dihydroxycholesterol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
