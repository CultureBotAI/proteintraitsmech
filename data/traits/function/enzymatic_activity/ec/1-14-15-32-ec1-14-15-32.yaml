identifier: EC:1.14.15.32
label: "pentalenene oxygenase"
definition: >-
  Enzymatic activity — pentalenene oxygenase (EC 1.14.15.32). Catalysed reaction: pentalenene + 4 reduced [2Fe-2S]-[ferredoxin] + 2 O2 + 4 H(+) = pentalen- 13-al + 4 oxidized [2Fe-2S]-[ferredoxin] + 3 H2O.
