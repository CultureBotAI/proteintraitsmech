identifier: EC:2.1.1.296
label: "methyltransferase cap2"
definition: >-
  Enzymatic activity — methyltransferase cap2 (EC 2.1.1.296). Catalysed reaction: a 5'-end (N(7)-methyl 5'-triphosphoguanosine)-(2'-O-methyl- ribonucleoside)-(ribonucleotide) in mRNA + S-adenosyl-L-methionine = a 5'-end (N(7)-methyl 5'-triphosphoguanosine)-(2'-O-methyl- ribonucleoside)-(2'-O-methyl-ribonucleotide) in mRNA + S-adenosyl-L- homocysteine + H(+).
