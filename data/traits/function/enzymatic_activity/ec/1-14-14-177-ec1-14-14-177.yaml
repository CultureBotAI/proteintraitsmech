identifier: EC:1.14.14.177
label: "ultra-long-chain fatty acid omega-hydroxylase"
definition: >-
  Enzymatic activity — ultra-long-chain fatty acid omega-hydroxylase (EC 1.14.14.177). Catalysed reaction: an omega-methyl-ultra-long-chain fatty acid + reduced [NADPH--hemoprotein reductase] + O2 = an omega-hydroxy-ultra-long-chain fatty acid + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
