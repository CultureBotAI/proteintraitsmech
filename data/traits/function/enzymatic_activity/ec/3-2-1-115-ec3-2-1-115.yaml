label: "branched-dextran exo-1,2-alpha-glucosidase"
definition: >-
  Enzymatic activity — branched-dextran exo-1,2-alpha-glucosidase (EC 3.2.1.115). Catalysed reaction: Hydrolysis of (1->2)-alpha-D-glucosidic linkages at the branch points of dextrans and related polysaccharides, producing free D-glucose.
