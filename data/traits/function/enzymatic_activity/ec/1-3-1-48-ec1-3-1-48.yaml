identifier: EC:1.3.1.48
label: "15-oxoprostaglandin 13-reductase"
definition: >-
  Enzymatic activity — 15-oxoprostaglandin 13-reductase (EC 1.3.1.48). Catalysed reaction: (1) 13,14-dihydro-15-oxo-prostaglandin E2 + NADP(+) = 15-oxoprostaglandin E2 + NADPH + H(+). (2) 13,14-dihydro-15-oxo-prostaglandin E2 + NAD(+) = 15-oxoprostaglandin E2 + NADH + H(+).
