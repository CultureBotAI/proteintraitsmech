identifier: EC:2.1.1.299
label: "protein N-terminal monomethyltransferase"
definition: >-
  Enzymatic activity — protein N-terminal monomethyltransferase (EC 2.1.1.299). Catalysed reaction: (1) N-terminal L-alanyl-L-prolyl-L-lysyl-[protein] + S-adenosyl-L- methionine = N-terminal N-methyl-L-alanyl-L-prolyl-L-lysyl-[protein] + S-adenosyl-L-homocysteine + H(+). (2) N-terminal L-prolyl-L-prolyl-L-lysyl-[protein] + S-adenosyl-L- methionine = N-terminal N-methyl-L-prolyl-L-prolyl-L-lysyl-[protein] + S-adenosyl-L-homocysteine + H(+). (3) N-terminal L-seryl-L-prolyl-L-lysyl-[protein] + S-adenosyl-L- methionine = N-terminal N-methyl-L-seryl-L-prolyl-L-lysyl-[protein] + S-adenosyl-L-homocysteine + H(+).
