identifier: EC:2.7.8.35
label: "UDP-N-acetylglucosamine--decaprenyl-phosphate N-acetylglucosaminephosphotransferase"
definition: >-
  Enzymatic activity — UDP-N-acetylglucosamine--decaprenyl-phosphate N-acetylglucosaminephosphotransferase (EC 2.7.8.35). Catalysed reaction: trans,octa-cis-decaprenyl phosphate + UDP-N-acetyl-alpha-D-glucosamine = N-acetyl-alpha-D-glucosaminyl-1-diphospho-trans,octa-cis-decaprenol + UMP.
