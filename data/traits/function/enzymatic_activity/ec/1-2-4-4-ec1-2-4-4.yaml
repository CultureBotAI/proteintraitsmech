  Enzymatic activity — 3-methyl-2-oxobutanoate dehydrogenase (2-methylpropanoyl-transferring) (EC 1.2.4.4). Catalysed reaction: N(6)-[(R)-lipoyl]-L-lysyl-[protein] + 3-methyl-2-oxobutanoate + H(+) = N(6)-[(R)-S(8)-2-methylpropanoyldihydrolipoyl]-L-lysyl-[protein] + CO2.
