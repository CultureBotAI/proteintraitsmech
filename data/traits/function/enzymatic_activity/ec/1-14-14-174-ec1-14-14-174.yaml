identifier: EC:1.14.14.174
label: "geranylhydroquinone 3''-hydroxylase"
definition: >-
  Enzymatic activity — geranylhydroquinone 3''-hydroxylase (EC 1.14.14.174). Catalysed reaction: (2E)-geranylhydroquinone + reduced [NADPH--hemoprotein reductase] + O2 = (2Z)-3''-hydroxygeranylhydroquinone + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
