identifier: EC:2.4.1.202
label: "2,4-dihydroxy-7-methoxy-2H-1,4-benzoxazin-3(4H)-one 2-D- glucosyltransferase"
definition: >-
  Enzymatic activity — 2,4-dihydroxy-7-methoxy-2H-1,4-benzoxazin-3(4H)-one 2-D- glucosyltransferase (EC 2.4.1.202). Catalysed reaction: (1) DIMBOA + UDP-alpha-D-glucose = DIMBOA beta-D-glucoside + UDP + H(+). (2) DIBOA + UDP-alpha-D-glucose = DIBOA beta-D-glucoside + UDP + H(+).
