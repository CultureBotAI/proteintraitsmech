identifier: EC:3.4.23.20
label: penicillopepsin
definition: >-
  Enzymatic activity — penicillopepsin (EC 3.4.23.20). Catalysed reaction: Hydrolysis of proteins with broad specificity similar to that of pepsin A, preferring hydrophobic residues at P1 and P1', but also cleaving 20-Gly-|-Glu-21 in the B chain of insulin. Clots milk, and activates trypsinogen.
