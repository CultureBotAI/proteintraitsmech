identifier: EC:1.14.14.172
label: "3,5,6-trichloropyridin-2-ol monooxygenase"
definition: >-
  Enzymatic activity — 3,5,6-trichloropyridin-2-ol monooxygenase (EC 1.14.14.172). Catalysed reaction: (1) 3,5,6-trichloropyridin-2-ol + FADH2 + O2 = 3,6-dichloropyridine-2,5- dione + FAD + chloride + H2O + 2 H(+). (2) 3,6-dichloropyridine-2,5-diol + FADH2 + O2 = 6-chloro-3- hydroxypyridine-2,5-dione + FAD + chloride + H2O + 2 H(+). (3) 6-chloropyridine-2,3,5-triol + FADH2 + O2 = 3,6-dihydroxypyridine- 2,5-dione + FAD + chloride + H2O + 3 H(+).
