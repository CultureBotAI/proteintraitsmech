identifier: EC:1.14.14.19
label: "steroid 17alpha-monooxygenase"
definition: >-
  Enzymatic activity — steroid 17alpha-monooxygenase (EC 1.14.14.19). Catalysed reaction: a C21-steroid + reduced [NADPH--hemoprotein reductase] + O2 = a 17alpha- hydroxy-C21-steroid + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
