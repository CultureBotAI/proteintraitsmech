identifier: EC:1.14.14.102
label: "N-methylcoclaurine 3'-monooxygenase"
definition: >-
  Enzymatic activity — N-methylcoclaurine 3'-monooxygenase (EC 1.14.14.102). Catalysed reaction: (S)-N-methylcoclaurine + reduced [NADPH--hemoprotein reductase] + O2 = (S)-3'-hydroxy-N-methylcoclaurine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
