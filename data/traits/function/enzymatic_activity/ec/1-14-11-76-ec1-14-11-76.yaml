label: "L-glutamate 3(R)-hydroxylase"
definition: >-
  Enzymatic activity — L-glutamate 3(R)-hydroxylase (EC 1.14.11.76). Catalysed reaction: L-glutamate + 2-oxoglutarate + O2 = (3R)-3-hydroxy-L-glutamate + succinate + CO2.
