label: "sn-1 stearoyl-lipid 9-desaturase"
definition: >-
  Enzymatic activity — sn-1 stearoyl-lipid 9-desaturase (EC 1.14.19.28). Catalysed reaction: a 1-octadecanoyl 2-acyl-glycerolipid + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = a 1-[(9Z)-octadecenoyl]-2-acyl-glycerolipid + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
