label: "HycI peptidase"
definition: >-
  Enzymatic activity — HycI peptidase (EC 3.4.23.51). Catalysed reaction: This enzyme specifically removes a 32-amino acid peptide from the C-terminus of the precursor of the large subunit of E.coli hydrogenase 3 by cleavage at the C-terminal side of Arg-537.
