identifier: EC:2.4.2.39
label: "xyloglucan 6-xylosyltransferase"
definition: >-
  Enzymatic activity — xyloglucan 6-xylosyltransferase (EC 2.4.2.39). Catalysed reaction: Transfers an alpha-D-xylosyl residue from UDP-D-xylose to a glucose residue in xyloglucan, forming an alpha-(1->6)-D-xylosyl-D-glucose linkage.
