identifier: EC:1.14.14.162
label: "flavanone 2-hydroxylase"
definition: >-
  Enzymatic activity — flavanone 2-hydroxylase (EC 1.14.14.162). Catalysed reaction: a flavanone + reduced [NADPH--hemoprotein reductase] + O2 = a 2-hydroxyflavanone + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
