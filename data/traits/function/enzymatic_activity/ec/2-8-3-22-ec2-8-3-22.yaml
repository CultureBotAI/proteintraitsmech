identifier: EC:2.8.3.22
label: "succinyl-CoA--L-malate CoA-transferase"
definition: >-
  Enzymatic activity — succinyl-CoA--L-malate CoA-transferase (EC 2.8.3.22). Catalysed reaction: (1) succinyl-CoA + (S)-malate = (S)-malyl-CoA + succinate. (2) (3S)-citramalate + succinyl-CoA = (3S)-citramalyl-CoA + succinate.
