identifier: EC:1.14.14.171
label: "beta-amyrin 16alpha-hydroxylase"
definition: >-
  Enzymatic activity — beta-amyrin 16alpha-hydroxylase (EC 1.14.14.171). Catalysed reaction: beta-amyrin + reduced [NADPH--hemoprotein reductase] + O2 = 16alpha- hydroxy-beta-amyrin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
