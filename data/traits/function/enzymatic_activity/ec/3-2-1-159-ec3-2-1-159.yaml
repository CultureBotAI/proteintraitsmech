identifier: EC:3.2.1.159
label: "alpha-neoagaro-oligosaccharide hydrolase"
definition: >-
  Enzymatic activity — alpha-neoagaro-oligosaccharide hydrolase (EC 3.2.1.159). Catalysed reaction: Hydrolysis of the 1,3-alpha-L-galactosidic linkages of neoagaro- oligosaccharides that are smaller than a hexamer, yielding 3,6-anhydro-L- galactose and D-galactose.
