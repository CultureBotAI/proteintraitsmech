identifier: EC:3.4.14.11
label: "Xaa-Pro dipeptidyl-peptidase"
definition: >-
  Enzymatic activity — Xaa-Pro dipeptidyl-peptidase (EC 3.4.14.11). Catalysed reaction: Hydrolyzes Xaa-Pro-|- bonds to release unblocked, N-terminal dipeptides from substrates including Ala-Pro-|-p-nitroanilide and (sequentially) Tyr-Pro-|-Phe-Pro-|-Gly-Pro-|-Ile.
