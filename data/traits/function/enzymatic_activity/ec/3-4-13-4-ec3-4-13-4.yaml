identifier: EC:3.4.13.4
label: "Xaa-Arg dipeptidase"
definition: >-
  Enzymatic activity — Xaa-Arg dipeptidase (EC 3.4.13.4). Catalysed reaction: (1) beta-alanyl-L-lysine + H2O = beta-alanine + L-lysine. (2) beta-alanyl-L-ornithine + H2O = beta-alanine + L-ornithine. (3) beta-alanyl-L-arginine + H2O = beta-alanine + L-arginine. (4) N(2)-(4-aminobutanoyl)-L-lysine + H2O = 4-aminobutanoate + L-lysine. (5) N(2)-(4-aminobutanoyl)-L-ornithine + H2O = 4-aminobutanoate + L-ornithine. (6) N(2)-(4-aminobutanoyl)-L-arginine + H2O = 4-aminobutanoate + L-arginine.
