identifier: EC:1.14.19.29
label: "sphingolipid 8-(E/Z)-desaturase"
definition: >-
  Enzymatic activity — sphingolipid 8-(E/Z)-desaturase (EC 1.14.19.29). Catalysed reaction: (1) an N-acyl-(4R)-4-hydroxysphinganine + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (4R,8E)-4-hydroxysphingenine ceramide + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) an N-acyl-(4R)-4-hydroxysphinganine + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (4R,8Z)-4-hydroxysphing-8-enine ceramide + 2 Fe(III)- [cytochrome b5] + 2 H2O.
