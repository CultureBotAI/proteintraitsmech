identifier: EC:1.14.11.59
label: "2,4-dihydroxy-1,4-benzoxazin-3-one-glucoside dioxygenase"
definition: >-
  Enzymatic activity — 2,4-dihydroxy-1,4-benzoxazin-3-one-glucoside dioxygenase (EC 1.14.11.59). Catalysed reaction: DIBOA beta-D-glucoside + 2-oxoglutarate + O2 = TRIBOA beta-D-glucoside + succinate + CO2.
