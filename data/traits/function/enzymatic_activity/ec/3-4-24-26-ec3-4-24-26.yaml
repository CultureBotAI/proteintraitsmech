identifier: EC:3.4.24.26
label: pseudolysin
definition: >-
  Enzymatic activity — pseudolysin (EC 3.4.24.26). Catalysed reaction: Hydrolysis of proteins including elastin, collagen types III and IV, fibronectin and immunoglobulin A, generally with bulky hydrophobic group at P1'. Insulin B chain cleavage pattern identical to that of thermolysin, but specificity differs in other respects.
