identifier: EC:3.4.22.56
label: caspase-3
definition: >-
  Enzymatic activity — caspase-3 (EC 3.4.22.56). Catalysed reaction: Strict requirement for an Asp residue at positions P1 and P4. It has a preferred cleavage sequence of Asp-Xaa-Xaa-Asp-|- with a hydrophobic amino-acid residue at P2 and a hydrophilic amino-acid residue at P3, although Val or Ala are also accepted at this position.
