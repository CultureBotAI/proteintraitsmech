synonyms:
  - synonym_text: "dihydrosanguinarine 10-hydroxylase"
    synonym_type: EXACT_SYNONYM
mapped_xrefs:
  - object: GO:0047088
    mapping_source: ec2go
  - object: RHEA:10528
    mapping_source: rhea2ec
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: dihydrosanguinarine + reduced [NADPH--hemoprotein reductase] + O2 = 10-hydroxydihydrosanguinarine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+)
    source: "ExPASy ENZYME"
    method: SOURCED
