identifier: EC:1.14.14.100
label: "dihydrosanguinarine 10-monooxygenase"
definition: >-
  Enzymatic activity — dihydrosanguinarine 10-monooxygenase (EC 1.14.14.100). Catalysed reaction: dihydrosanguinarine + reduced [NADPH--hemoprotein reductase] + O2 = 10-hydroxydihydrosanguinarine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
