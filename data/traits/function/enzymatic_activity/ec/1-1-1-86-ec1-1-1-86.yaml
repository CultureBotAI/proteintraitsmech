identifier: EC:1.1.1.86
label: "ketol-acid reductoisomerase (NADP(+))"
definition: >-
  Enzymatic activity — ketol-acid reductoisomerase (NADP(+)) (EC 1.1.1.86). Catalysed reaction: (1) (2R)-2,3-dihydroxy-3-methylbutanoate + NADP(+) = (2S)-2-acetolactate + NADPH + H(+). (2) (2R,3R)-2,3-dihydroxy-3-methylpentanoate + NADP(+) = (S)-2-ethyl-2- hydroxy-3-oxobutanoate + NADPH + H(+).
