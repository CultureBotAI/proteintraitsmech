identifier: EC:1.14.14.18
label: "heme oxygenase (biliverdin-producing)"
definition: >-
  Enzymatic activity — heme oxygenase (biliverdin-producing) (EC 1.14.14.18). Catalysed reaction: heme b + 3 reduced [NADPH--hemoprotein reductase] + 3 O2 = biliverdin IXalpha + CO + Fe(2+) + 3 oxidized [NADPH--hemoprotein reductase] + 3 H2O + H(+).
