label: "all-trans-retinol 3,4-desaturase"
definition: >-
  Enzymatic activity — all-trans-retinol 3,4-desaturase (EC 1.14.19.53). Catalysed reaction: all-trans-retinol + 2 reduced [adrenodoxin] + O2 + 2 H(+) = all-trans- 3,4-didehydroretinol + 2 oxidized [adrenodoxin] + 2 H2O.
