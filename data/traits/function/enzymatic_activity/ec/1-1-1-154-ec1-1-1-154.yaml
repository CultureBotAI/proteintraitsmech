identifier: EC:1.1.1.154
label: "ureidoglycolate dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — ureidoglycolate dehydrogenase [NAD(P)(+)] (EC 1.1.1.154). Catalysed reaction: (1) (S)-ureidoglycolate + NAD(+) = N-carbamoyl-2-oxoglycine + NADH + H(+). (2) (S)-ureidoglycolate + NADP(+) = N-carbamoyl-2-oxoglycine + NADPH + H(+).
