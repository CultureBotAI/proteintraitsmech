identifier: EC:3.1.3.56
label: "inositol-polyphosphate 5-phosphatase"
definition: >-
  Enzymatic activity — inositol-polyphosphate 5-phosphatase (EC 3.1.3.56). Catalysed reaction: (1) 1D-myo-inositol 1,4,5-trisphosphate + H2O = 1D-myo-inositol 1,4- bisphosphate + phosphate. (2) 1D-myo-inositol 1,3,4,5-tetrakisphosphate + H2O = 1D-myo-inositol 1,3,4-trisphosphate + phosphate.
