identifier: EC:2.5.1.112
label: "adenylate dimethylallyltransferase (ADP/ATP-dependent)"
definition: >-
  Enzymatic activity — adenylate dimethylallyltransferase (ADP/ATP-dependent) (EC 2.5.1.112). Catalysed reaction: (1) dimethylallyl diphosphate + ADP = N(6)-(dimethylallyl)adenosine 5'-diphosphate + diphosphate. (2) dimethylallyl diphosphate + ATP = N(6)-(dimethylallyl)adenosine 5'-triphosphate + diphosphate.
