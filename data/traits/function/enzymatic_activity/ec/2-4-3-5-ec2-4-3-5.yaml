  Enzymatic activity — galactosyldiacylglycerol alpha-2,3-sialyltransferase (EC 2.4.3.5). Catalysed reaction: a 1,2-diacyl-3-O-(beta-D-galactosyl)-sn-glycerol + CMP-N-acetyl-beta- neuraminate = a 1,2-diacyl-3-[3-(N-acetyl-alpha-D-neuraminyl)-beta-D- galactosyl]-sn-glycerol + CMP + H(+).
