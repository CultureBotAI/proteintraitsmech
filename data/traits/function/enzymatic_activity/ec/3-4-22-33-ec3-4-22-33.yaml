identifier: EC:3.4.22.33
label: "fruit bromelain"
definition: >-
  Enzymatic activity — fruit bromelain (EC 3.4.22.33). Catalysed reaction: Hydrolysis of proteins with broad specificity for peptide bonds. Bz-Phe- Val-Arg-|-NHMec is a good synthetic substrate, but there is no action on Z-Arg-Arg-|-NHMec (cf. stem bromelain).
