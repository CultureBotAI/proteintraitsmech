label: "acyl-CoA 11-(Z)-desaturase"
definition: >-
  Enzymatic activity — acyl-CoA 11-(Z)-desaturase (EC 1.14.19.5). Catalysed reaction: an 11,12-saturated fatty acyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = an (11Z)-Delta(11)-fatty acyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O.
