identifier: EC:1.14.15.38
label: "N,N-dimethyl phenylurea N-demethylase"
definition: >-
  Enzymatic activity — N,N-dimethyl phenylurea N-demethylase (EC 1.14.15.38). Catalysed reaction: a 1,1-dimethyl-3-phenylurea + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = a 1-methyl-3-phenylurea + formaldehyde + 2 oxidized [2Fe-2S]- [ferredoxin] + H2O.
