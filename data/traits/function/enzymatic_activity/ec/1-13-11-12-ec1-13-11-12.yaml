identifier: EC:1.13.11.12
label: "linoleate 13S-lipoxygenase"
definition: >-
  Enzymatic activity — linoleate 13S-lipoxygenase (EC 1.13.11.12). Catalysed reaction: (1) (9Z,12Z)-octadecadienoate + O2 = (13S)-hydroperoxy-(9Z,11E)- octadecadienoate. (2) (9Z,12Z,15Z)-octadecatrienoate + O2 = (13S)-hydroperoxy-(9Z,11E,15Z)- octadecatrienoate.
