identifier: EC:1.1.99.41
label: "3-hydroxy-1,2-didehydro-2,3-dihydrotabersonine reductase"
definition: >-
  Enzymatic activity — 3-hydroxy-1,2-didehydro-2,3-dihydrotabersonine reductase (EC 1.1.99.41). Catalysed reaction: (1) (3R)-3-hydroxy-16-methoxy-2,3-dihydrotabersonine + A = (3R)-1,2- didehydro-3-hydroxy-16-methoxy-2,3-dihydrotabersonine + AH2. (2) (3R)-3-hydroxy-2,3-dihydrotabersonine + A = (3R)-1,2-didehydro-3- hydroxy-2,3-dihydrotabersonine + AH2.
