label: "8'-apo-beta-carotenoid 14',13'-cleaving dioxygenase"
definition: >-
  Enzymatic activity — 8'-apo-beta-carotenoid 14',13'-cleaving dioxygenase (EC 1.13.11.67). Catalysed reaction: 8'-apo-beta-carotenol + O2 = 14'-apo-beta-carotenal + (3E,5E)-7-hydroxy- 6-methylhepta-3,5-dienal.
