identifier: EC:2.3.1.302
label: "hydroxycinnamoyl-CoA:5-hydroxyanthranilate N-hydroxycinnamoyltransferase"
definition: >-
  Enzymatic activity — hydroxycinnamoyl-CoA:5-hydroxyanthranilate N-hydroxycinnamoyltransferase (EC 2.3.1.302). Catalysed reaction: (1) 5-hydroxyanthranilate + (E)-4-coumaroyl-CoA = avenanthramide A + CoA. (2) 5-hydroxyanthranilate + (E)-caffeoyl-CoA = avenanthramide C + CoA.
