identifier: EC:1.14.14.111
label: "9beta-pimara-7,15-diene oxidase"
definition: >-
  Enzymatic activity — 9beta-pimara-7,15-diene oxidase (EC 1.14.14.111). Catalysed reaction: 9beta-pimara-7,15-diene + 3 reduced [NADPH--hemoprotein reductase] + 3 O2 = 9beta-pimara-7,15-dien-19-oate + 3 oxidized [NADPH--hemoprotein reductase] + 4 H2O + 4 H(+).
