identifier: EC:3.6.1.61
label: "diadenosine hexaphosphate hydrolase (ATP-forming)"
definition: >-
  Enzymatic activity — diadenosine hexaphosphate hydrolase (ATP-forming) (EC 3.6.1.61). Catalysed reaction: (1) P(1),P(6)-bis(5'-adenosyl) hexaphosphate + H2O = 2 ATP + 2 H(+). (2) P(1),P(5)-bis(5'-adenosyl) pentaphosphate + H2O = ADP + ATP + 2 H(+). (3) P(1),P(4)-bis(5'-adenosyl) tetraphosphate + H2O = AMP + ATP + 2 H(+).
