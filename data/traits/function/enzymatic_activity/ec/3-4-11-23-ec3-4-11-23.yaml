identifier: EC:3.4.11.23
label: "PepB aminopeptidase"
definition: >-
  Enzymatic activity — PepB aminopeptidase (EC 3.4.11.23). Catalysed reaction: Release of an N-terminal amino acid, Xaa, from a peptide or arylamide. Xaa is preferably Glu or Asp but may be other amino acids, including Leu, Met, His, Cys and Gln.
