label: "20-oxo-5-O-mycaminosyltylactone 23-monooxygenase"
definition: >-
  Enzymatic activity — 20-oxo-5-O-mycaminosyltylactone 23-monooxygenase (EC 1.14.15.34). Catalysed reaction: 20-oxo-5-O-beta-D-mycaminosyltylonolide + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = 5-O-beta-D-mycaminosyltylonolide + 2 oxidized [2Fe-2S]- [ferredoxin] + H2O.
