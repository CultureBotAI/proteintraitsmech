identifier: EC:3.2.1.100
label: "mannan 1,4-mannobiosidase"
definition: >-
  Enzymatic activity — mannan 1,4-mannobiosidase (EC 3.2.1.100). Catalysed reaction: Hydrolysis of (1->4)-beta-D-mannosidic linkages in (1->4)-beta-D-mannans, to remove successive mannobiose residues from the non-reducing chain ends.
