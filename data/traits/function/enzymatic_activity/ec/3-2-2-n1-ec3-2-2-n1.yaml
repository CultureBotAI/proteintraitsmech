label: "cytokinin riboside 5'-monophosphate phosphoribohydrolase"
definition: >-
  Enzymatic activity — cytokinin riboside 5'-monophosphate phosphoribohydrolase (EC 3.2.2.n1). Catalysed reaction: (1) N(6)-(dimethylallyl)adenosine 5'-phosphate + H2O = N(6)- dimethylallyladenine + D-ribose 5-phosphate. (2) 9-ribosyl-trans-zeatin 5'-phosphate + H2O = trans-zeatin + D-ribose 5-phosphate.
