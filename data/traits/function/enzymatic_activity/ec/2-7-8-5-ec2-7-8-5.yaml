identifier: EC:2.7.8.5
label: "CDP-diacylglycerol--glycerol-3-phosphate 1-phosphatidyltransferase"
definition: >-
  Enzymatic activity — CDP-diacylglycerol--glycerol-3-phosphate 1-phosphatidyltransferase (EC 2.7.8.5). Catalysed reaction: a CDP-1,2-diacyl-sn-glycerol + sn-glycerol 3-phosphate = a 1,2-diacyl- sn-glycero-3-phospho-(1'-sn-glycero-3'-phosphate) + CMP + H(+).
