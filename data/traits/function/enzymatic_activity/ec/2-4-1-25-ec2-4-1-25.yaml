identifier: EC:2.4.1.25
label: 4-alpha-glucanotransferase
definition: >-
  Enzymatic activity — 4-alpha-glucanotransferase (EC 2.4.1.25). Catalysed reaction: Transfers a segment of a (1->4)-alpha-D-glucan to a new position in an acceptor, which may be glucose or a (1->4)-alpha-D-glucan.
