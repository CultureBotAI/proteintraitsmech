identifier: EC:4.2.2.16
label: "levan fructotransferase (DFA-IV-forming)"
definition: >-
  Enzymatic activity — levan fructotransferase (DFA-IV-forming) (EC 4.2.2.16). Catalysed reaction: Produces di-beta-D-fructofuranose 2,6':2',6-dianhydride (DFA IV) by successively eliminating the diminishing (2->6)-beta-D-fructan (levan) chain from the terminal D-fructosyl-D-fructosyl disaccharide.
