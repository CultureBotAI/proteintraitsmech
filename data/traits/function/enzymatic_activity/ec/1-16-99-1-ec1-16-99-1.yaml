identifier: EC:1.16.99.1
label: "[Co(II) methylated amine-specific corrinoid protein] reductase"
definition: >-
  Enzymatic activity — [Co(II) methylated amine-specific corrinoid protein] reductase (EC 1.16.99.1). Catalysed reaction: (1) 2 Co(II)-[methylamine-specific corrinoid protein] + AH2 + ATP + H2O = 2 Co(I)-[methylamine-specific corrinoid protein] + A + ADP + phosphate + 3 H(+). (2) 2 Co(II)-[dimethylamine-specific corrinoid protein] + AH2 + ATP + H2O = 2 Co(I)-[dimethylamine-specific corrinoid protein] + A + ADP + phosphate + 3 H(+). (3) 2 Co(II)-[trimethylamine-specific corrinoid protein] + AH2 + ATP + H2O = 2 Co(I)-[trimethylamine-specific corrinoid protein] + A + ADP + phosphate + 3 H(+).
