identifier: EC:1.1.1.294
label: "chlorophyll(ide) b reductase"
definition: >-
  Enzymatic activity — chlorophyll(ide) b reductase (EC 1.1.1.294). Catalysed reaction: (1) 7(1)-hydroxychlorophyllide a + NAD(+) = chlorophyllide b + NADH + H(+). (2) 7(1)-hydroxychlorophyllide a + NADP(+) = chlorophyllide b + NADPH + H(+).
