identifier: EC:1.1.1.187
label: "GDP-4-dehydro-D-rhamnose reductase"
definition: >-
  Enzymatic activity — GDP-4-dehydro-D-rhamnose reductase (EC 1.1.1.187). Catalysed reaction: (1) GDP-alpha-D-rhamnose + NAD(+) = GDP-4-dehydro-alpha-D-rhamnose + NADH + H(+). (2) GDP-alpha-D-rhamnose + NADP(+) = GDP-4-dehydro-alpha-D-rhamnose + NADPH + H(+). (3) GDP-6-deoxy-alpha-D-talose + NADP(+) = GDP-4-dehydro-alpha-D-rhamnose + NADPH + H(+). (4) GDP-6-deoxy-alpha-D-talose + NAD(+) = GDP-4-dehydro-alpha-D-rhamnose + NADH + H(+).
