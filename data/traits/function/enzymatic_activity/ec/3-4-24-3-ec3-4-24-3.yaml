identifier: EC:3.4.24.3
label: "microbial collagenase"
definition: >-
  Enzymatic activity — microbial collagenase (EC 3.4.24.3). Catalysed reaction: Digestion of native collagen in the triple helical region at Xaa-|-Gly bonds. With synthetic peptides, a preference is shown for Gly at P3 and P1', Pro and Ala at P2 and P2', and hydroxyproline, Ala or Arg at P3'.
