label: "1,8-cineole 2-endo-monooxygenase"
definition: >-
  Enzymatic activity — 1,8-cineole 2-endo-monooxygenase (EC 1.14.14.133). Catalysed reaction: 1,8-cineole + reduced [flavodoxin] + O2 = 2-endo-hydroxy-1,8-cineole + oxidized [flavodoxin] + H2O + H(+).
