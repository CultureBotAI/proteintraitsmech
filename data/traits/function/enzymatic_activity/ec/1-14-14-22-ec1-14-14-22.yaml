label: "dibenzothiophene sulfone monooxygenase"
definition: >-
  Enzymatic activity — dibenzothiophene sulfone monooxygenase (EC 1.14.14.22). Catalysed reaction: dibenzothiophene 5,5-dioxide + FMNH2 + NADH + O2 = 2'-hydroxybiphenyl-2- sulfinate + FMN + NAD(+) + H2O + H(+).
