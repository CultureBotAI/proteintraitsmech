identifier: EC:3.4.21.108
label: "HtrA2 peptidase"
definition: >-
  Enzymatic activity — HtrA2 peptidase (EC 3.4.21.108). Catalysed reaction: Cleavage of non-polar aliphatic amino-acids at the P1 position, with a preference for Val, Ile and Met. At the P2 and P3 positions, Arg is selected most strongly with a secondary preference for other hydrophilic residues.
