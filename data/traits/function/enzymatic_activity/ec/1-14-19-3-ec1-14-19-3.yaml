identifier: EC:1.14.19.3
label: "acyl-CoA 6-desaturase"
definition: >-
  Enzymatic activity — acyl-CoA 6-desaturase (EC 1.14.19.3). Catalysed reaction: (1) (9Z,12Z)-octadecadienoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (6Z,9Z,12Z)-octadecatrienoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) (9Z,12Z,15Z)-octadecatrienoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (6Z,9Z,12Z,15Z)-octadecatetraenoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O.
