label: "N-acetyllactosaminide beta-1,3-N-acetylglucosaminyltransferase"
definition: >-
  Enzymatic activity — N-acetyllactosaminide beta-1,3-N-acetylglucosaminyltransferase (EC 2.4.1.149). Catalysed reaction: a beta-D-galactosyl-(1->4)-N-acetyl-beta-D-glucosaminyl derivative + UDP- N-acetyl-alpha-D-glucosamine = an N-acetyl-beta-D-glucosaminyl-(1->3)- beta-D-galactosyl-(1->4)-N-acetyl-beta-D-glucosaminyl derivative + UDP + H(+).
