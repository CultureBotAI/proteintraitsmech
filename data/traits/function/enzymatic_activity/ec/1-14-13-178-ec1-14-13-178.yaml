identifier: EC:1.14.13.178
label: "methylxanthine N(1)-demethylase"
definition: >-
  Enzymatic activity — methylxanthine N(1)-demethylase (EC 1.14.13.178). Catalysed reaction: (1) caffeine + NADH + O2 + H(+) = theobromine + formaldehyde + NAD(+) + H2O. (2) caffeine + NADPH + O2 + H(+) = theobromine + formaldehyde + NADP(+) + H2O. (3) theophylline + NADPH + O2 + H(+) = 3-methylxanthine + formaldehyde + NADP(+) + H2O. (4) theophylline + NADH + O2 + H(+) = 3-methylxanthine + formaldehyde + NAD(+) + H2O. (5) 1,7-dimethylxanthine + NADH + O2 + H(+) = 7-methylxanthine + formaldehyde + NAD(+) + H2O. (6) 1,7-dimethylxanthine + NADPH + O2 + H(+) = 7-methylxanthine + formaldehyde + NADP(+) + H2O.
