identifier: EC:2.4.1.69
label: "type 1 galactoside alpha-(1,2)-fucosyltransferase"
definition: >-
  Enzymatic activity — type 1 galactoside alpha-(1,2)-fucosyltransferase (EC 2.4.1.69). Catalysed reaction: a beta-D-galactosyl-(1->3)-N-acetyl-beta-D-glucosaminyl derivative + GDP- beta-L-fucose = an alpha-L-Fuc-(1->2)-beta-D-Gal-(1->3)-beta-D-GlcNAc derivative + GDP + H(+).
