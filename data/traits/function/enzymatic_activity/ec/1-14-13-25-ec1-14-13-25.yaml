identifier: EC:1.14.13.25
label: "methane monooxygenase (soluble)"
definition: >-
  Enzymatic activity — methane monooxygenase (soluble) (EC 1.14.13.25). Catalysed reaction: (1) methane + NADH + O2 + H(+) = methanol + NAD(+) + H2O. (2) methane + NADPH + O2 + H(+) = methanol + NADP(+) + H2O.
