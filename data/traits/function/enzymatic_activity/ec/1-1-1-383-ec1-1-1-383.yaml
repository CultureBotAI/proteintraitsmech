identifier: EC:1.1.1.383
label: "ketol-acid reductoisomerase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — ketol-acid reductoisomerase [NAD(P)(+)] (EC 1.1.1.383). Catalysed reaction: (1) (2R)-2,3-dihydroxy-3-methylbutanoate + NAD(+) = (2S)-2-acetolactate + NADH + H(+). (2) (2R)-2,3-dihydroxy-3-methylbutanoate + NADP(+) = (2S)-2-acetolactate + NADPH + H(+).
