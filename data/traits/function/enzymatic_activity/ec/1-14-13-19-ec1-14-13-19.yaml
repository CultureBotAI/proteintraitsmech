identifier: EC:1.14.13.19
label: "taxifolin 8-monooxygenase"
definition: >-
  Enzymatic activity — taxifolin 8-monooxygenase (EC 1.14.13.19). Catalysed reaction: (1) (2R,3R)-dihydroquercetin + NADH + O2 + H(+) = (2R,3R)-2,3- dihydrogossypetin + NAD(+) + H2O. (2) (2R,3R)-dihydroquercetin + NADPH + O2 + H(+) = (2R,3R)-2,3- dihydrogossypetin + NADP(+) + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
