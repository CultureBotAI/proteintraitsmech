identifier: EC:1.14.11.82
label: "5-dehydro-6-demethoxyfumagillol dioxygenase"
definition: >-
  Enzymatic activity — 5-dehydro-6-demethoxyfumagillol dioxygenase (EC 1.14.11.82). Catalysed reaction: 5-dehydro-6-demethoxyfumagillol + 2-oxoglutarate + O2 = 5-dehydro-6- demethoxy-6-hydroxyfumagillol + succinate + CO2.
