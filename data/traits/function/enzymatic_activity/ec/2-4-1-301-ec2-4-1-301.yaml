identifier: EC:2.4.1.301
label: "2'-deamino-2'-hydroxyneamine 1-alpha-D-kanosaminyltransferase"
definition: >-
  Enzymatic activity — 2'-deamino-2'-hydroxyneamine 1-alpha-D-kanosaminyltransferase (EC 2.4.1.301). Catalysed reaction: (1) 2'-deamino-2'-hydroxyneamine + UDP-alpha-D-kanosamine = kanamycin A + UDP + H(+). (2) neamine + UDP-alpha-D-kanosamine = kanamycin B + UDP + H(+). (3) paromamine + UDP-alpha-D-kanosamine = kanamycin C + UDP + H(+). (4) 2'-deamino-2'-hydroxyparomamine + UDP-alpha-D-kanosamine = kanamycin X + UDP + H(+).
