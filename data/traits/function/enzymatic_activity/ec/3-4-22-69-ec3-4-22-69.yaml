identifier: EC:3.4.22.69
label: "SARS coronavirus main proteinase"
definition: >-
  Enzymatic activity — SARS coronavirus main proteinase (EC 3.4.22.69). Catalysed reaction: TSAVLQ-|-SGFRK-NH2 and SGVTFQ-|-GKFKK the two peptides corresponding to the two self-cleavage sites of the SARS 3C-like proteinase are the two most reactive peptide substrates. The enzyme exhibits a strong preference for substrates containing Gln at P1 position and Leu at P2 position.
