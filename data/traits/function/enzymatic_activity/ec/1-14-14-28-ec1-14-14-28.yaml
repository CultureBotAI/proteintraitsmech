identifier: EC:1.14.14.28
label: "long-chain alkane monooxygenase"
definition: >-
  Enzymatic activity — long-chain alkane monooxygenase (EC 1.14.14.28). Catalysed reaction: a long-chain alkane + FMNH2 + O2 = a long chain fatty alcohol + FMN + H2O + H(+).
