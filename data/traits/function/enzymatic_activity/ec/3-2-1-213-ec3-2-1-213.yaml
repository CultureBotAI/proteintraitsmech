identifier: EC:3.2.1.213
label: "galactan exo-1,6-beta-galactobiohydrolase (non-reducing end)"
definition: >-
  Enzymatic activity — galactan exo-1,6-beta-galactobiohydrolase (non-reducing end) (EC 3.2.1.213). Catalysed reaction: Hydrolysis of (1->6)-beta-D-galactosidic linkages in arabinogalactan proteins and (1->3):(1->6)-beta-galactans to yield (1->6)-beta- galactobiose as the final product.
