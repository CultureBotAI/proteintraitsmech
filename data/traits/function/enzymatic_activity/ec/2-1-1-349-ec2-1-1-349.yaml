identifier: EC:2.1.1.349
label: "toxoflavin synthase"
definition: >-
  Enzymatic activity — toxoflavin synthase (EC 2.1.1.349). Catalysed reaction: (1) 1,6-didemethyltoxoflavin + S-adenosyl-L-methionine = reumycin + S-adenosyl-L-homocysteine + H(+). (2) reumycin + S-adenosyl-L-methionine = toxoflavin + S-adenosyl-L- homocysteine + H(+).
