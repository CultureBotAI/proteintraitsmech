identifier: EC:3.4.21.92
label: "endopeptidase Clp"
definition: >-
  Enzymatic activity — endopeptidase Clp (EC 3.4.21.92). Catalysed reaction: Hydrolysis of proteins to small peptides in the presence of ATP and magnesium. alpha-casein is the usual test substrate. In the absence of ATP, only oligopeptides shorter than five residues are hydrolyzed (such as succinyl-Leu-Tyr-|-NHMec, and Leu-Tyr-Leu-|-Tyr-Trp, in which cleavage of the -Tyr-|-Leu- and -Tyr-|-Trp bonds also occurs).
