identifier: EC:1.1.1.266
label: "dTDP-4-dehydro-6-deoxyglucose reductase"
definition: >-
  Enzymatic activity — dTDP-4-dehydro-6-deoxyglucose reductase (EC 1.1.1.266). Catalysed reaction: (1) dTDP-alpha-D-fucose + NAD(+) = dTDP-4-dehydro-6-deoxy-alpha-D-glucose + NADH + H(+). (2) dTDP-alpha-D-fucose + NADP(+) = dTDP-4-dehydro-6-deoxy-alpha-D- glucose + NADPH + H(+).
