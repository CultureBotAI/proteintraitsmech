identifier: EC:3.4.22.40
label: "bleomycin hydrolase"
definition: >-
  Enzymatic activity — bleomycin hydrolase (EC 3.4.22.40). Catalysed reaction: Inactivates bleomycin B2 (a cytotoxic glycometallopeptide) by hydrolysis of a carboxyamide bond of beta-aminoalanine, but also shows general aminopeptidase activity. The specificity varies somewhat with source, but amino acid arylamides of Met, Leu and Ala are preferred.
