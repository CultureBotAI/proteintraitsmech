identifier: EC:1.3.1.1
label: "dihydrouracil dehydrogenase (NAD(+))"
definition: >-
  Enzymatic activity — dihydrouracil dehydrogenase (NAD(+)) (EC 1.3.1.1). Catalysed reaction: (1) 5,6-dihydrouracil + NAD(+) = uracil + NADH + H(+). (2) 5,6-dihydrothymine + NAD(+) = thymine + NADH + H(+).
