label: "fumitremorgin C synthase"
definition: >-
  Enzymatic activity — fumitremorgin C synthase (EC 1.14.19.71). Catalysed reaction: tryprostatin A + reduced [NADPH--hemoprotein reductase] + O2 = fumitremorgin C + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
