identifier: EC:3.2.1.64
label: "2,6-beta-fructan 6-levanbiohydrolase"
definition: >-
  Enzymatic activity — 2,6-beta-fructan 6-levanbiohydrolase (EC 3.2.1.64). Catalysed reaction: Hydrolysis of (2->6)-beta-D-fructofuranan, to remove successive disaccharide residues as levanbiose, i.e. 6-(beta-D-fructofuranosyl)-D- fructose, from the end of the chain.
