    text: >-
      A hydrolase; glycosylases; glycosidases, i.e. enzymes hydrolyzing O- and S-glycosyl compounds.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: a protopanaxadiol-type ginsenoside with two glycosyl residues at position 20 + H2O = a protopanaxadiol-type ginsenoside with a single glucosyl residue at position 20 + a monosaccharide
