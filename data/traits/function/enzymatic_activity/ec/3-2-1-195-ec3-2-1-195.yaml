identifier: EC:3.2.1.195
label: "20-O-multi-glycoside ginsenosidase"
definition: >-
  Enzymatic activity — 20-O-multi-glycoside ginsenosidase (EC 3.2.1.195). Catalysed reaction: a protopanaxadiol-type ginsenoside with two glycosyl residues at position 20 + H2O = a protopanaxadiol-type ginsenoside with a single glucosyl residue at position 20 + a monosaccharide.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
