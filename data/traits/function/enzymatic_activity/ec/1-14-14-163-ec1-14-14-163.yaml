identifier: EC:1.14.14.163
label: "(S)-1-hydroxy-N-methylcanadine 13-hydroxylase"
definition: >-
  Enzymatic activity — (S)-1-hydroxy-N-methylcanadine 13-hydroxylase (EC 1.14.14.163). Catalysed reaction: (S)-1-hydroxy-N-methylcanadine + reduced [NADPH--hemoprotein reductase] + O2 = (13S,14R)-1,13-dihydroxy-N-methylcanadine + oxidized [NADPH- -hemoprotein reductase] + H2O + H(+).
