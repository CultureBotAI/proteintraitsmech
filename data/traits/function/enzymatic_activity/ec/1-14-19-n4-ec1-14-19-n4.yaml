label: "stearoyl-CoA 9-desaturase (NADPH)"
definition: >-
  Enzymatic activity — stearoyl-CoA 9-desaturase (NADPH) (EC 1.14.19.n4). Catalysed reaction: octadecanoyl-CoA + NADPH + O2 + H(+) = (9Z)-octadecenoyl-CoA + NADP(+) + 2 H2O.
