  Enzymatic activity — corticosterone 18-monooxygenase (EC 1.14.15.5). Catalysed reaction: corticosterone + 2 reduced [adrenodoxin] + O2 + 2 H(+) = 18-hydroxycorticosterone + 2 oxidized [adrenodoxin] + H2O.
