identifier: EC:1.14.15.31
label: "2-hydroxy-5-methyl-1-naphthoate 7-hydroxylase"
definition: >-
  Enzymatic activity — 2-hydroxy-5-methyl-1-naphthoate 7-hydroxylase (EC 1.14.15.31). Catalysed reaction: 2-hydroxy-5-methyl-1-naphthoate + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = 2,7-dihydroxy-5-methyl-1-naphthoate + 2 oxidized [2Fe-2S]- [ferredoxin] + H2O.
