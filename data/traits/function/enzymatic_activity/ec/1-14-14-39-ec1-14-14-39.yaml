  Enzymatic activity — isoleucine N-monooxygenase (EC 1.14.14.39). Catalysed reaction: L-isoleucine + 2 reduced [NADPH--hemoprotein reductase] + 2 O2 = (1E,2S)- 2-methylbutanal oxime + 2 oxidized [NADPH--hemoprotein reductase] + CO2 + 3 H2O + 2 H(+).
