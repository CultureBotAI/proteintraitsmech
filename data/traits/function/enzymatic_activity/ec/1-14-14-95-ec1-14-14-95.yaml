label: "germacrene A hydroxylase"
definition: >-
  Enzymatic activity — germacrene A hydroxylase (EC 1.14.14.95). Catalysed reaction: (+)-(R)-germacrene A + 3 reduced [NADPH--hemoprotein reductase] + 3 O2 = germacra-1(10),4,11(13)-trien-12-oate + 3 oxidized [NADPH--hemoprotein reductase] + 4 H2O + 4 H(+).
