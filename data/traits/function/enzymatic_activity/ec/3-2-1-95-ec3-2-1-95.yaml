identifier: EC:3.2.1.95
label: "dextran 1,6-alpha-isomaltotriosidase"
definition: >-
  Enzymatic activity — dextran 1,6-alpha-isomaltotriosidase (EC 3.2.1.95). Catalysed reaction: Hydrolysis of (1->6)-alpha-D-glucosidic linkages in dextrans, to remove successive isomaltotriose units from the non-reducing ends of the chains.
