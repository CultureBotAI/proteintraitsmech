identifier: EC:3.4.11.19
label: "D-stereospecific aminopeptidase"
definition: >-
  Enzymatic activity — D-stereospecific aminopeptidase (EC 3.4.11.19). Catalysed reaction: Release of an N-terminal D-amino acid from a peptide, Xaa-|-Yaa-, in which Xaa is preferably D-Ala, D-Ser or D-Thr. D-amino acid amides and methyl esters also are hydrolyzed, as is glycine amide.
