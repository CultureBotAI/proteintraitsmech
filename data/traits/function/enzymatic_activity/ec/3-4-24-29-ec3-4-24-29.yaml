identifier: EC:3.4.24.29
label: aureolysin
definition: >-
  Enzymatic activity — aureolysin (EC 3.4.24.29). Catalysed reaction: Cleavage of insulin B chain with specificity similar to that of thermolysin, preferring hydrophobic P1' residues. Activates the glutamyl endopeptidase (EC 3.4.21.19) of Staphylococcus aureus.
