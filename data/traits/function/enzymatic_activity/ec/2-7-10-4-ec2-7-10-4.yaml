identifier: EC:2.7.10.4
label: "[Src-family] C-terminal protein kinase"
definition: >-
  Enzymatic activity — [Src-family] C-terminal protein kinase (EC 2.7.10.4). Catalysed reaction: ATP + [a protein]-(L-tyrosine) = ADP + [a protein]-(L-tyrosine)- phosphate. The optimal peptide substrate contains the sequence (relative to the phosphorylated tyrosine): Glu-Glu-Asp/Glu-Ile-Tyr-Phe-Phe-Phe-Phe. Physiological substrates are C-terminal tail of Src-family protein kinases.
