identifier: EC:2.3.1.254
label: "N-terminal methionine N(alpha)-acetyltransferase NatB"
definition: >-
  Enzymatic activity — N-terminal methionine N(alpha)-acetyltransferase NatB (EC 2.3.1.254). Catalysed reaction: (1) N-terminal L-methionyl-L-asparaginyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-asparaginyl-[protein] + CoA + H(+). (2) N-terminal L-methionyl-L-glutaminyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-glutaminyl-[protein] + CoA + H(+). (3) N-terminal L-methionyl-L-aspartyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-aspartyl-[protein] + CoA + H(+). (4) N-terminal L-methionyl-L-glutamyl-[protein] + acetyl-CoA = N-terminal N(alpha)-acetyl-L-methionyl-L-glutamyl-[protein] + CoA + H(+).
