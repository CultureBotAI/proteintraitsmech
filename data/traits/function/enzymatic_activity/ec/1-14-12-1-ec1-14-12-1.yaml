identifier: EC:1.14.12.1
label: "anthranilate 1,2-dioxygenase (deaminating, decarboxylating)"
definition: >-
  Enzymatic activity — anthranilate 1,2-dioxygenase (deaminating, decarboxylating) (EC 1.14.12.1). Catalysed reaction: (1) anthranilate + NADPH + O2 + 3 H(+) = catechol + NH4(+) + CO2 + NADP(+). (2) anthranilate + NADH + O2 + 3 H(+) = catechol + NH4(+) + CO2 + NAD(+).
