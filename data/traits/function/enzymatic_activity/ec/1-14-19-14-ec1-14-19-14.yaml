label: "linoleoyl-lipid Delta(9) conjugase"
definition: >-
  Enzymatic activity — linoleoyl-lipid Delta(9) conjugase (EC 1.14.19.14). Catalysed reaction: a (9Z,12Z)-octadecadienoyl-containing glycerolipid + AH2 + O2 = a (8E,10E,12Z)-octadecatrienoyl-containing glycerolipid + A + 2 H2O.
