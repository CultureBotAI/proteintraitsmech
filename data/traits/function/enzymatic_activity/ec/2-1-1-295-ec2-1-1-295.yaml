identifier: EC:2.1.1.295
label: "2-methyl-6-phytyl-1,4-hydroquinone methyltransferase"
definition: >-
  Enzymatic activity — 2-methyl-6-phytyl-1,4-hydroquinone methyltransferase (EC 2.1.1.295). Catalysed reaction: (1) 2-methyl-6-phytyl-1,4-benzene-1,4-diol + S-adenosyl-L-methionine = 2,3-dimethyl-6-phytylbenzene-1,4-diol + S-adenosyl-L-homocysteine + H(+). (2) 2-methyl-6-(all-trans-nonaprenyl)benzene-1,4-diol + S-adenosyl-L- methionine = plastoquinol-9 + S-adenosyl-L-homocysteine + H(+). (3) 6-geranylgeranyl-2-methylbenzene-1,4-diol + S-adenosyl-L-methionine = 6-geranylgeranyl-2,3-dimethylbenzene-1,4-diol + S-adenosyl-L-homocysteine + H(+).
