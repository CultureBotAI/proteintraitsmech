identifier: EC:3.2.1.193
label: "ginsenosidase type I"
definition: >-
  Enzymatic activity — ginsenosidase type I (EC 3.2.1.193). Catalysed reaction: (1) a protopanaxadiol-type ginsenoside with two glucosyl residues at position 3 + H2O = a protopanaxadiol-type ginsenoside with one glucosyl residue at position 3 + D-glucopyranose. (2) a protopanaxadiol-type ginsenoside with one glucosyl residue at position 3 + H2O = a protopanaxadiol-type ginsenoside with no glycosidic modifications at position 3 + D-glucopyranose. (3) a protopanaxadiol-type ginsenoside with two glycosyl residues at position 20 + H2O = a protopanaxadiol-type ginsenoside with a single glucosyl residue at position 20 + a monosaccharide.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
