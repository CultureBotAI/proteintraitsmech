  Enzymatic activity — bursehernin 5'-monooxygenase (EC 1.14.14.131). Catalysed reaction: (-)-bursehernin + reduced [NADPH--hemoprotein reductase] + O2 = (-)- 5'-demethylyatein + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
