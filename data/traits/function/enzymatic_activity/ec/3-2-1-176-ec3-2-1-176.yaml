identifier: EC:3.2.1.176
label: "cellulose 1,4-beta-cellobiosidase (reducing end)"
definition: >-
  Enzymatic activity — cellulose 1,4-beta-cellobiosidase (reducing end) (EC 3.2.1.176). Catalysed reaction: Hydrolysis of (1->4)-beta-D-glucosidic linkages in cellulose and similar substrates, releasing cellobiose from the reducing ends of the chains.
