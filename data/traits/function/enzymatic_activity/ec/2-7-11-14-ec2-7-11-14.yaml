identifier: EC:2.7.11.14
label: "rhodopsin kinase"
definition: >-
  Enzymatic activity — rhodopsin kinase (EC 2.7.11.14). Catalysed reaction: (1) L-seryl-[rhodopsin] + ATP = O-phospho-L-seryl-[rhodopsin] + ADP + H(+). (2) L-threonyl-[rhodopsin] + ATP = O-phospho-L-threonyl-[rhodopsin] + ADP + H(+).
