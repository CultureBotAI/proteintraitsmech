identifier: EC:1.14.20.12
label: "3-[(E)-2-isocyanoethenyl]-1H-indole synthase"
definition: >-
  Enzymatic activity — 3-[(E)-2-isocyanoethenyl]-1H-indole synthase (EC 1.14.20.12). Catalysed reaction: (2S)-3-(1H-indol-3-yl)-2-isocyanopropanoate + 2-oxoglutarate + O2 + H(+) = 3-[(E)-2-isocyanovinyl]indole + succinate + 2 CO2 + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:1.14.20.-
mapped_xrefs:
  - object: RHEA:56704
    mapping_source: rhea2ec
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with 2-oxoglutarate as one donor, and the other dehydrogenated.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (2S)-3-(1H-indol-3-yl)-2-isocyanopropanoate + 2-oxoglutarate + O2 + H(+) = 3-[(E)-2-isocyanovinyl]indole + succinate + 2 CO2 + H2O
    source: "ExPASy ENZYME"
    method: SOURCED
