identifier: EC:1.4.3.5
label: "pyridoxal 5'-phosphate synthase"
definition: >-
  Enzymatic activity — pyridoxal 5'-phosphate synthase (EC 1.4.3.5). Catalysed reaction: (1) pyridoxamine 5'-phosphate + O2 + H2O = pyridoxal 5'-phosphate + H2O2 + NH4(+). (2) pyridoxine 5'-phosphate + O2 = pyridoxal 5'-phosphate + H2O2.
