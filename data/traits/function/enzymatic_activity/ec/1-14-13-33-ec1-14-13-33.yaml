identifier: EC:1.14.13.33
label: "4-hydroxybenzoate 3-monooxygenase [NAD(P)H]"
definition: >-
  Enzymatic activity — 4-hydroxybenzoate 3-monooxygenase [NAD(P)H] (EC 1.14.13.33). Catalysed reaction: (1) 4-hydroxybenzoate + NADH + O2 + H(+) = 3,4-dihydroxybenzoate + NAD(+) + H2O. (2) 4-hydroxybenzoate + NADPH + O2 + H(+) = 3,4-dihydroxybenzoate + NADP(+) + H2O.
definition_source: ExPASy ENZYME
