identifier: EC:1.1.1.352
label: "5'-hydroxyaverantin dehydrogenase"
definition: >-
  Enzymatic activity — 5'-hydroxyaverantin dehydrogenase (EC 1.1.1.352). Catalysed reaction: (1) (1'S,5'S)-5'-hydroxyaverantin + NAD(+) = (S)-5'-oxoaverantin + NADH + H(+). (2) (1'S,5'R)-5'-hydroxyaverantin + NAD(+) = (S)-5'-oxoaverantin + NADH + 2 H(+).
