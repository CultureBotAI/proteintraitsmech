identifier: EC:6.3.1.9
label: "trypanothione synthase"
definition: >-
  Enzymatic activity — trypanothione synthase (EC 6.3.1.9). Catalysed reaction: (1) spermidine + glutathione + ATP = glutathionylspermidine + ADP + phosphate + H(+). (2) glutathionylspermidine + glutathione + ATP = trypanothione + ADP + phosphate + H(+).
