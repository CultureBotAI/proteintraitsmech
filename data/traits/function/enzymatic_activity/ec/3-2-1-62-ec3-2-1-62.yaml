identifier: EC:3.2.1.62
label: glycosylceramidase
definition: >-
  Enzymatic activity — glycosylceramidase (EC 3.2.1.62). Catalysed reaction: (1) a beta-D-glucosyl-N-acylsphingosine + H2O = a ceramide + beta-D- glucose. (2) a beta-D-galactosyl-N-acylsphingosine + H2O = a ceramide + beta-D- galactose. (3) a flavonol 3-O-beta-D-glucoside + H2O = a flavonol + D-glucose.
