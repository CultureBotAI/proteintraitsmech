identifier: EC:3.1.26.11
label: "ribonuclease Z"
definition: >-
  Enzymatic activity — ribonuclease Z (EC 3.1.26.11). Catalysed reaction: Endonucleolytic cleavage of RNA, removing extra 3' nucleotides from tRNA precursor, generating 3' termini of tRNAs. A 3'-hydroxy group is left at the tRNA terminus and a 5'-phosphoryl group is left at the trailer molecule.
