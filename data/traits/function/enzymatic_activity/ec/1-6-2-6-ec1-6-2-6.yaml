identifier: EC:1.6.2.6
label: "leghemoglobin reductase"
definition: >-
  Enzymatic activity — leghemoglobin reductase (EC 1.6.2.6). Catalysed reaction: (1) 2 Fe(III)-[leghemoglobin] + NADPH = 2 Fe(II)-[leghemoglobin] + NADP(+) + H(+). (2) 2 Fe(III)-[leghemoglobin] + NADH = 2 Fe(II)-[leghemoglobin] + NAD(+) + H(+).
