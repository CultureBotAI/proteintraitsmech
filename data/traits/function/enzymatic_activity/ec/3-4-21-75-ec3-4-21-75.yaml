identifier: EC:3.4.21.75
label: furin
definition: >-
  Enzymatic activity — furin (EC 3.4.21.75). Catalysed reaction: Release of mature proteins from their proproteins by cleavage of -Arg- Xaa-Yaa-Arg-|-Zaa- bonds, where Xaa can be any amino acid and Yaa is Arg or Lys. Releases albumin, complement component C3 and von Willebrand factor from their respective precursors.
