identifier: EC:2.4.1.315
label: "diglucosyl diacylglycerol synthase (1,6-linking)"
definition: >-
  Enzymatic activity — diglucosyl diacylglycerol synthase (1,6-linking) (EC 2.4.1.315). Catalysed reaction: (1) a 1,2-diacyl-3-O-(beta-D-glucopyranosyl)-sn-glycerol + UDP-alpha-D- glucose = a 1,2-diacyl-3-O-(beta-D-Glc-(1->6)-beta-D-Glc)-sn-glycerol + UDP + H(+). (2) a 1,2-diacyl-3-O-(beta-D-Glc-(1->6)-beta-D-Glc)-sn-glycerol + UDP- alpha-D-glucose = a 1,2-diacyl-3-O-(beta-D-Glc-(1->6)-beta-D-Glc-(1->6)- beta-D-Glc)-sn-glycerol + UDP + H(+).
