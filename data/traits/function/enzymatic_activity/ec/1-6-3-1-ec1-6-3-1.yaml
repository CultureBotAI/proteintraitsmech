  Enzymatic activity — NAD(P)H oxidase (H2O2-forming) (EC 1.6.3.1). Catalysed reaction: (1) NADPH + O2 + H(+) = H2O2 + NADP(+). (2) NADH + O2 + H(+) = H2O2 + NAD(+).
