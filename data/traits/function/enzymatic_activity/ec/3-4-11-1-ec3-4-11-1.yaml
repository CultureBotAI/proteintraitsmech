identifier: EC:3.4.11.1
label: "leucyl aminopeptidase"
definition: >-
  Enzymatic activity — leucyl aminopeptidase (EC 3.4.11.1). Catalysed reaction: Release of an N-terminal amino acid, Xaa-|-Yaa-, in which Xaa is preferably Leu, but may be other amino acids including Pro although not Arg or Lys, and Yaa may be Pro. Amino acid amides and methyl esters are also readily hydrolyzed, but rates on arylamides are exceedingly low.
