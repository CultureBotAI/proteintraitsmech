    text: >-
      Catalyses: an N(2)-[(3R)-3-(2-saturated-acyloxy)acyl]-L-ornithine lipid + 2-oxoglutarate + O2 = a 2-hydroxyornithine lipid + succinate + CO2
    source: "ExPASy ENZYME"
