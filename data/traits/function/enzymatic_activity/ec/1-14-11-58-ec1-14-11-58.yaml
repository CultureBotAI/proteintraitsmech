identifier: EC:1.14.11.58
label: "ornithine lipid ester-linked acyl 2-hydroxylase"
definition: >-
  Enzymatic activity — ornithine lipid ester-linked acyl 2-hydroxylase (EC 1.14.11.58). Catalysed reaction: an N(2)-[(3R)-3-(2-saturated-acyloxy)acyl]-L-ornithine lipid + 2-oxoglutarate + O2 = a 2-hydroxyornithine lipid + succinate + CO2.
