identifier: EC:1.14.15.43
label: "nocardicin C N-oxygenase"
definition: >-
  Enzymatic activity — nocardicin C N-oxygenase (EC 1.14.15.43). Catalysed reaction: nocardicin C + 4 reduced [2Fe-2S]-[ferredoxin] + 2 O2 + 2 H(+) = nocardicin A + 4 oxidized [2Fe-2S]-[ferredoxin] + 3 H2O.
