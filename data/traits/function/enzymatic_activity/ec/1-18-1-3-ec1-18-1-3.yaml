identifier: EC:1.18.1.3
label: "ferredoxin--NAD(+) reductase"
definition: >-
  Enzymatic activity — ferredoxin--NAD(+) reductase (EC 1.18.1.3). Catalysed reaction: (1) 2 reduced [2Fe-2S]-[ferredoxin] + NAD(+) + H(+) = 2 oxidized [2Fe- 2S]-[ferredoxin] + NADH. (2) reduced 2[4Fe-4S]-[ferredoxin] + NAD(+) + H(+) = oxidized 2[4Fe-4S]- [ferredoxin] + NADH.
