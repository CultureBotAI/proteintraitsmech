identifier: EC:1.5.1.34
label: "6,7-dihydropteridine reductase"
definition: >-
  Enzymatic activity — 6,7-dihydropteridine reductase (EC 1.5.1.34). Catalysed reaction: (1) 5,6,7,8-tetrahydropteridine + NADP(+) = 6,7-dihydropteridine + NADPH + H(+). (2) 5,6,7,8-tetrahydropteridine + NAD(+) = 6,7-dihydropteridine + NADH + H(+).
