identifier: EC:3.2.1.173
label: "rhamnogalacturonan galacturonohydrolase"
definition: >-
  Enzymatic activity — rhamnogalacturonan galacturonohydrolase (EC 3.2.1.173). Catalysed reaction: Exohydrolysis of the alpha-D-GalA-(1->2)-alpha-L-Rha bond in rhamnogalacturonan oligosaccharides with initial inversion of configuration releasing D-galacturonic acid from the non-reducing end of rhamnogalacturonan oligosaccharides.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
