synonyms:
  - synonym_text: RG-galacturonohydrolase
    synonym_type: EXACT_SYNONYM
definitions:
  - kind: GENERAL
    text: >-
      A hydrolase; glycosylases; glycosidases, i.e. enzymes hydrolyzing O- and S-glycosyl compounds.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Exohydrolysis of the alpha-D-GalA-(1->2)-alpha-L-Rha bond in rhamnogalacturonan oligosaccharides with initial inversion of configuration releasing D-galacturonic acid from the non-reducing end of rhamnogalacturonan oligosaccharides
