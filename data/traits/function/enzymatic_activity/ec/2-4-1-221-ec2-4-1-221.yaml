  Enzymatic activity — peptide-O-fucosyltransferase (EC 2.4.1.221). Catalysed reaction: (1) L-seryl-[protein] + GDP-beta-L-fucose = 3-O-(alpha-L-fucosyl)-L- seryl-[protein] + GDP + H(+). (2) L-threonyl-[protein] + GDP-beta-L-fucose = 3-O-(alpha-L-fucosyl)-L- threonyl-[protein] + GDP + H(+).
