identifier: EC:1.14.12.9
label: "4-chlorophenylacetate 3,4-dioxygenase"
definition: >-
  Enzymatic activity — 4-chlorophenylacetate 3,4-dioxygenase (EC 1.14.12.9). Catalysed reaction: 4-chlorophenylacetate + NADH + O2 = 3,4-dihydroxyphenylacetate + chloride + NAD(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
