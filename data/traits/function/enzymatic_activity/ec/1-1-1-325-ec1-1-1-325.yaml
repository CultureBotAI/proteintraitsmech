identifier: EC:1.1.1.325
label: "sepiapterin reductase (L-threo-7,8-dihydrobiopterin forming)"
definition: >-
  Enzymatic activity — sepiapterin reductase (L-threo-7,8-dihydrobiopterin forming) (EC 1.1.1.325). Catalysed reaction: (1) L-threo-7,8-dihydrobiopterin + NADP(+) = L-sepiapterin + NADPH + H(+). (2) L-threo-tetrahydrobiopterin + 2 NADP(+) = 6-pyruvoyl-5,6,7,8- tetrahydropterin + 2 NADPH + 2 H(+).
definition_source: ExPASy ENZYME
