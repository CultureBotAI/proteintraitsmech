identifier: EC:3.4.21.102
label: "C-terminal processing peptidase"
definition: >-
  Enzymatic activity — C-terminal processing peptidase (EC 3.4.21.102). Catalysed reaction: The enzyme shows specific recognition of a C-terminal tripeptide, Xaa- Yaa-Zaa, in which Xaa is preferably Ala or Leu, Yaa is preferably Ala or Tyr, and Zaa is preferably Ala, but then cleaves at a variable distance from the C-terminus. A typical cleavage is -Ala-Ala-|-Arg-Ala-Ala- Lys-Glu-Asn-Tyr-Ala-Leu-Ala-Ala.
