identifier: EC:1.14.14.98
label: "protopine 6-monooxygenase"
definition: >-
  Enzymatic activity — protopine 6-monooxygenase (EC 1.14.14.98). Catalysed reaction: protopine + reduced [NADPH--hemoprotein reductase] + O2 = 6-hydroxyprotopine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
