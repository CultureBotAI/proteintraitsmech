identifier: EC:1.3.1.112
label: "anthocyanidin reductase [(2S)-flavan-3-ol-forming]"
definition: >-
  Enzymatic activity — anthocyanidin reductase [(2S)-flavan-3-ol-forming] (EC 1.3.1.112). Catalysed reaction: (1) a (2S,3R)-flavan-3-ol + 2 NADP(+) = an anthocyanidin with a 3-hydroxy group + 2 NADPH + 2 H(+). (2) a (2S,3S)-flavan-3-ol + 2 NADP(+) = an anthocyanidin with a 3-hydroxy group + 2 NADPH + 2 H(+).
