identifier: EC:1.14.14.16
label: "steroid 21-monooxygenase"
definition: >-
  Enzymatic activity — steroid 21-monooxygenase (EC 1.14.14.16). Catalysed reaction: (1) progesterone + reduced [NADPH--hemoprotein reductase] + O2 = 21-hydroxyprogesterone + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) 17alpha-hydroxyprogesterone + reduced [NADPH--hemoprotein reductase] + O2 = 11-deoxycortisol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
