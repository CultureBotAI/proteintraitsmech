identifier: EC:3.4.14.12
label: "Xaa-Xaa-Pro tripeptidyl-peptidase"
definition: >-
  Enzymatic activity — Xaa-Xaa-Pro tripeptidyl-peptidase (EC 3.4.14.12). Catalysed reaction: Hydrolysis of Xaa-Xaa-Pro-|-Yaa- releasing the N-terminal tripeptide of a peptide with Pro as the third residue (position P1) and where Yaa is not proline.
