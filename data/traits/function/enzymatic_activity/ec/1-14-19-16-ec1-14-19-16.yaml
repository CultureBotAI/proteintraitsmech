identifier: EC:1.14.19.16
label: "linoleoyl-lipid Delta(12) conjugase (11E,13Z-forming)"
definition: >-
  Enzymatic activity — linoleoyl-lipid Delta(12) conjugase (11E,13Z-forming) (EC 1.14.19.16). Catalysed reaction: a (9Z,12Z)-octadecadienoyl-containing glycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (9Z,11E,13Z)-octadeca-9,11,13-trienoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
