identifier: EC:1.14.11.81
label: "(-)-cyclopenine synthase"
definition: >-
  Enzymatic activity — (-)-cyclopenine synthase (EC 1.14.11.81). Catalysed reaction: (1) (-)-cyclopeptine + 2-oxoglutarate + O2 = (Z)-dehydrocyclopeptine + succinate + CO2 + H2O. (2) (Z)-dehydrocyclopeptine + 2-oxoglutarate + O2 = (-)-cyclopenine + succinate + CO2.
