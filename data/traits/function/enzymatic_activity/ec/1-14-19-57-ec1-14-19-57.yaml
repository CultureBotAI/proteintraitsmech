identifier: EC:1.14.19.57
label: "1H-pyrrole-2-carbonyl-[peptidyl-carrier protein] brominase"
definition: >-
  Enzymatic activity — 1H-pyrrole-2-carbonyl-[peptidyl-carrier protein] brominase (EC 1.14.19.57). Catalysed reaction: (1H-pyrrole-2-carbonyl)-[peptidyl-carrier protein] + 3 bromide + 3 FADH2 + 3 O2 = (3,4,5-tribromo-1H-pyrrole-2-carbonyl)-[peptidyl-carrier protein] + 3 FAD + 6 H2O.
