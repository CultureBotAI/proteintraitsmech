identifier: EC:3.4.21.123
label: kumamolysin
definition: >-
  Enzymatic activity — kumamolysin (EC 3.4.21.123). Catalysed reaction: The enzyme preferentially hydrolyzes peptides having an Ala or Pro residue at P2 position and prefers such charged amino acid residues as Glu or Arg at the P2' position. In the oxidized insulin B chain, kumamolysin preferentially cleaves between Leu(15) and Tyr(16).
