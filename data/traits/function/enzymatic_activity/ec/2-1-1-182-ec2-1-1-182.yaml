label: "16S rRNA (adenine(1518)-N(6)/adenine(1519)-N(6))-dimethyltransferase"
definition: >-
  Enzymatic activity — 16S rRNA (adenine(1518)-N(6)/adenine(1519)-N(6))-dimethyltransferase (EC 2.1.1.182). Catalysed reaction: adenosine(1518)/adenosine(1519) in 16S rRNA + 4 S-adenosyl-L-methionine = N(6)-dimethyladenosine(1518)/N(6)-dimethyladenosine(1519) in 16S rRNA + 4 S-adenosyl-L-homocysteine + 4 H(+).
