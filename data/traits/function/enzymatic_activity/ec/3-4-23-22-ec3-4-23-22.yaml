identifier: EC:3.4.23.22
label: endothiapepsin
definition: >-
  Enzymatic activity — endothiapepsin (EC 3.4.23.22). Catalysed reaction: Hydrolysis of proteins with specificity similar to that of pepsin A, prefers hydrophobic residues at P1 and P1', but does not cleave 14-Ala-|-Leu-15 in the B chain of insulin or Z-Glu-Tyr. Clots milk.
