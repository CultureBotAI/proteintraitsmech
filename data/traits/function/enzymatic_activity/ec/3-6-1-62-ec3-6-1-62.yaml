identifier: EC:3.6.1.62
label: "5'-(N(7)-methylguanosine 5'-triphospho)-[mRNA] hydrolase"
definition: >-
  Enzymatic activity — 5'-(N(7)-methylguanosine 5'-triphospho)-[mRNA] hydrolase (EC 3.6.1.62). Catalysed reaction: a 5'-end (N(7)-methyl 5'-triphosphoguanosine)-ribonucleoside in mRNA + H2O = N(7)-methyl-GDP + a 5'-end phospho-ribonucleoside in mRNA + 2 H(+).
