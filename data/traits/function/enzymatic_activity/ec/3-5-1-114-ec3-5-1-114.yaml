identifier: EC:3.5.1.114
label: "N-acyl-aromatic-L-amino acid amidohydrolase"
definition: >-
  Enzymatic activity — N-acyl-aromatic-L-amino acid amidohydrolase (EC 3.5.1.114). Catalysed reaction: (1) an N-acyl-aromatic L-alpha-amino acid + H2O = an aromatic L-alpha- amino acid + a carboxylate. (2) an N-acetyl-L-cysteine-S-conjugate + H2O = an S-substituted L-cysteine + acetate.
