identifier: EC:3.4.22.68
label: "Ulp1 peptidase"
definition: >-
  Enzymatic activity — Ulp1 peptidase (EC 3.4.22.68). Catalysed reaction: Hydrolysis of the alpha-linked peptide bond in the sequence Gly- Gly-|-Ala-Thr-Tyr at the C-terminal end of the small ubiquitin-like modifier (SUMO) propeptide, Smt3, leading to the mature form of the protein. A second reaction involves the cleavage of an epsilon-linked peptide bond between the C-terminal glycine of the mature SUMO and the lysine epsilon-amino group of the target protein.
