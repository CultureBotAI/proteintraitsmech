identifier: EC:1.14.19.36
label: "sn-1 acyl-lipid omega-3 desaturase (ferredoxin)"
definition: >-
  Enzymatic activity — sn-1 acyl-lipid omega-3 desaturase (ferredoxin) (EC 1.14.19.36). Catalysed reaction: (1) a 1-[(6Z,9Z,12Z)-octadectrienoyl]-2-acyl-glycerolipid + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = a 1-[(6Z,9Z,12Z,15Z)- octadectetraenoyl]-2-acyl-glycerolipid + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O. (2) a 1-[(9Z,12Z)-octadecdienoyl]-2-acyl-glycerolipid + 2 reduced [2Fe- 2S]-[ferredoxin] + O2 + 2 H(+) = a 1-[(9Z,12Z,15Z)-octadectrienoyl]-2- acyl-glycerolipid + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
