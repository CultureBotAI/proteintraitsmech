identifier: EC:3.4.24.84
label: "Ste24 endopeptidase"
definition: >-
  Enzymatic activity — Ste24 endopeptidase (EC 3.4.24.84). Catalysed reaction: Hydrolyzes the peptide bond -P2-(S-farnesyl or geranylgeranyl)C-P1'-P2'-P3'-COOH where P1' and P2' are amino acids with aliphatic side chains and P3' is any C-terminal residue.
