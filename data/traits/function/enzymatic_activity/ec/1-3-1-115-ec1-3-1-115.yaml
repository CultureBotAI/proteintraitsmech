identifier: EC:1.3.1.115
label: "3-oxocholoyl-CoA 4-desaturase"
definition: >-
  Enzymatic activity — 3-oxocholoyl-CoA 4-desaturase (EC 1.3.1.115). Catalysed reaction: (1) 7alpha,12alpha-dihydroxy-3-oxochol-24-oyl-CoA + NAD(+) = 7alpha,12alpha-dihydroxy-3-oxochol-4-en-24-oyl-CoA + NADH + H(+). (2) 7alpha-hydroxy-3-oxochol-24-oyl-CoA + NAD(+) = 7alpha-hydroxy-3- oxochol-4-en-24-oyl-CoA + NADH + H(+).
