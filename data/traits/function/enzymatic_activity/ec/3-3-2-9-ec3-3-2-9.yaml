identifier: EC:3.3.2.9
label: "microsomal epoxide hydrolase"
definition: >-
  Enzymatic activity — microsomal epoxide hydrolase (EC 3.3.2.9). Catalysed reaction: (1) cis-stilbene oxide + H2O = (1R,2R)-hydrobenzoin. (2) 1-(4-methoxyphenyl)-N-methyl-N-[(3-methyloxetan-3- yl)methyl]methanamine + H2O = 2-{[(4-methoxybenzyl)(methyl)amino]methyl}- 2-methylpropane-1,3-diol.
