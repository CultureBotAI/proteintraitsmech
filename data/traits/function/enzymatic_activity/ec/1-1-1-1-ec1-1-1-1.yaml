identifier: EC:1.1.1.1
label: "alcohol dehydrogenase"
definition: >-
  Enzymatic activity — alcohol dehydrogenase (EC 1.1.1.1). Catalysed reaction: (1) a primary alcohol + NAD(+) = an aldehyde + NADH + H(+). (2) a secondary alcohol + NAD(+) = a ketone + NADH + H(+).
