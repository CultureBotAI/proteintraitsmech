identifier: EC:1.13.11.77
label: "oleate 10S-lipoxygenase"
definition: >-
  Enzymatic activity — oleate 10S-lipoxygenase (EC 1.13.11.77). Catalysed reaction: (1) (9Z)-octadecenoate + O2 = (8E,10S)-10-hydroperoxy-octadeca-8-enoate. (2) (9Z,12Z)-octadecadienoate + O2 = (8E,10S,12Z)-10-hydroperoxyoctadeca- 8,12-dienoate. (3) (9Z,12Z,15Z)-octadecatrienoate + O2 = (8E,10S,12Z,15Z)-10- hydroperoxyoctadeca-8,12,15-trienoate.
