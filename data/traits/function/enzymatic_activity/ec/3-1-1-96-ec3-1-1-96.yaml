identifier: EC:3.1.1.96
label: "D-aminoacyl-tRNA deacylase"
definition: >-
  Enzymatic activity — D-aminoacyl-tRNA deacylase (EC 3.1.1.96). Catalysed reaction: (1) a D-aminoacyl-tRNA + H2O = a tRNA + a D-alpha-amino acid + H(+). (2) glycyl-tRNA(Ala) + H2O = tRNA(Ala) + glycine + H(+).
