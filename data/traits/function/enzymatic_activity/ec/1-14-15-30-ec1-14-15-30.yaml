identifier: EC:1.14.15.30
label: "3-ketosteroid 9alpha-monooxygenase"
definition: >-
  Enzymatic activity — 3-ketosteroid 9alpha-monooxygenase (EC 1.14.15.30). Catalysed reaction: androsta-1,4-diene-3,17-dione + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = 9alpha-hydroxyandrosta-1,4-diene-3,17-dione + 2 oxidized [2Fe- 2S]-[ferredoxin] + H2O.
