identifier: EC:3.6.1.71
label: "adenosine-5'-diphospho-5'-[DNA] diphosphatase"
definition: >-
  Enzymatic activity — adenosine-5'-diphospho-5'-[DNA] diphosphatase (EC 3.6.1.71). Catalysed reaction: (1) a 5'-end adenosine-5'-diphospho-5'-2'-deoxyribonucleoside-DNA + H2O = a 5'-end 5'-phospho-2'-deoxyribonucleoside-DNA + AMP + 2 H(+). (2) a 5'-end adenosine-5'-diphospho-5'-ribonucleoside- 2'-deoxyribonucleotide-DNA + H2O = a 5'-end 5'-phospho-ribonucleoside- 2'-deoxyribonucleotide-DNA + AMP + 2 H(+).
