definition: >-
  Enzymatic activity — (S)-dichlorprop dioxygenase (2-oxoglutarate) (EC 1.14.11.43). Catalysed reaction: (1) (S)-2-(4-chloro-2-methylphenoxy)propanoate + 2-oxoglutarate + O2 = 2-methyl-4-chlorophenol + pyruvate + succinate + CO2. (2) (S)-(2,4-dichlorophenoxy)propanoate + 2-oxoglutarate + O2 = 2,4- dichlorophenol + pyruvate + succinate + CO2.
