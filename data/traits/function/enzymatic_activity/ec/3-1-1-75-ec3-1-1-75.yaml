identifier: EC:3.1.1.75
label: "poly(3-hydroxybutyrate) depolymerase"
definition: >-
  Enzymatic activity — poly(3-hydroxybutyrate) depolymerase (EC 3.1.1.75). Catalysed reaction: (1) [(3R)-hydroxybutanoate](n) + H2O = [(3R)-hydroxybutanoate](n-1) + (R)-3-hydroxybutanoate + H(+). (2) [(3R)-hydroxybutanoate](n) + H2O = [(3R)-hydroxybutanoate](n-2) + (3R)-hydroxybutanoate dimer + H(+). (3) [(3R)-hydroxybutanoate](n) + H2O = [(3R)-hydroxybutanoate](n-3) + (3R)-hydroxybutanoate trimer + H(+). (4) [(3R)-hydroxybutanoate](n) + H2O = [(3R)-hydroxybutanoate](n-4) + (3R)-hydroxybutanoate tetramer + H(+). (5) [(3R)-hydroxybutanoate](n) + H2O = [(3R)-hydroxybutanoate](n-5) + (3R)-hydroxybutanoate pentamer + H(+).
