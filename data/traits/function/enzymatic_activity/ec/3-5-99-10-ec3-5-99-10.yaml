identifier: EC:3.5.99.10
label: "2-iminobutanoate/2-iminopropanoate deaminase"
definition: >-
  Enzymatic activity — 2-iminobutanoate/2-iminopropanoate deaminase (EC 3.5.99.10). Catalysed reaction: (1) 2-iminobutanoate + H2O = 2-oxobutanoate + NH4(+). (2) 2-iminopropanoate + H2O = pyruvate + NH4(+).
