identifier: EC:2.7.8.43
label: "lipid A phosphoethanolamine transferase"
definition: >-
  Enzymatic activity — lipid A phosphoethanolamine transferase (EC 2.7.8.43). Catalysed reaction: (1) lipid A (E. coli) + a 1,2-diacyl-sn-glycero-3-phosphoethanolamine + H(+) = lipid A hexaacyl 1-(2-aminoethyl diphosphate) (E. coli) + a 1,2- diacyl-sn-glycerol. (2) lipid A (E. coli) + a 1,2-diacyl-sn-glycero-3-phosphoethanolamine + H(+) = lipid A 4'-(2-aminoethyl diphosphate) (E. coli) + a 1,2-diacyl- sn-glycerol. (3) lipid A hexaacyl 1-(2-aminoethyl diphosphate) (E. coli) + a 1,2- diacyl-sn-glycero-3-phosphoethanolamine + H(+) = lipid A 1,4'-bis(2-aminoethyl diphosphate) (E. coli) + a 1,2-diacyl-sn-glycerol.
