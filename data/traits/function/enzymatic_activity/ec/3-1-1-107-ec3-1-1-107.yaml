identifier: EC:3.1.1.107
label: "apo-salmochelin esterase"
definition: >-
  Enzymatic activity — apo-salmochelin esterase (EC 3.1.1.107). Catalysed reaction: (1) enterobactin + H2O = N-(2,3-dihydroxybenzoyl)-L-serine trimer. (2) triglucosyl-enterobactin + H2O = [N-(C-5-[deoxy-beta-D-glucosyl]-2,3- dihydroxybenzoyl)-L-serine]3 + H(+). (3) diglucosyl-enterobactin + H2O = N-(2,3-dihydroxybenzoyl)-L-seryl- [N-(C-5-[deoxy-beta-D-glucosyl]-2,3-dihydroxybenzoyl)-L-serine]2 + H(+). (4) monoglucosyl-enterobactin + H2O = [N-(2,3-dihydroxybenzoyl)-L- seryl]2-N-(C-5-[deoxy-beta-D-glucosyl]-2,3-dihydroxybenzoyl)-L-serine + H(+).
