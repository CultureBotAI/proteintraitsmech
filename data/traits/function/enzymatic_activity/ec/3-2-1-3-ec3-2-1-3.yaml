identifier: EC:3.2.1.3
label: "glucan 1,4-alpha-glucosidase"
definition: >-
  Enzymatic activity — glucan 1,4-alpha-glucosidase (EC 3.2.1.3). Catalysed reaction: Hydrolysis of terminal (1->4)-linked alpha-D-glucose residues successively from non-reducing ends of the chains with release of beta-D- glucose.
