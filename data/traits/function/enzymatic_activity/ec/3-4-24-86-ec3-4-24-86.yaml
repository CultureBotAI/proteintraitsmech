identifier: EC:3.4.24.86
label: "ADAM 17 endopeptidase"
definition: >-
  Enzymatic activity — ADAM 17 endopeptidase (EC 3.4.24.86). Catalysed reaction: Narrow endopeptidase specificity. Cleaves Pro-Leu-Ala-Gln-Ala-|-Val- Arg-Ser-Ser-Ser in the membrane-bound, 26-kDa form of tumor necrosis factor alpha (TNFalpha). Similarly cleaves other membrane-anchored, cell- surface proteins to 'shed' the extracellular domains.
