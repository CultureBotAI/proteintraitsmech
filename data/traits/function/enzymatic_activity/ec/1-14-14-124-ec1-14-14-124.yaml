identifier: EC:1.14.14.124
label: "dihydromonacolin L hydroxylase"
definition: >-
  Enzymatic activity — dihydromonacolin L hydroxylase (EC 1.14.14.124). Catalysed reaction: dihydromonacolin L carboxylate + reduced [NADPH--hemoprotein reductase] + O2 = monacolin L carboxylate + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
