identifier: EC:2.7.8.26
label: "adenosylcobinamide-GDP ribazoletransferase"
definition: >-
  Enzymatic activity — adenosylcobinamide-GDP ribazoletransferase (EC 2.7.8.26). Catalysed reaction: (1) alpha-ribazole + adenosylcob(III)inamide-GDP = adenosylcob(III)alamin + GMP + H(+). (2) alpha-ribazole 5'-phosphate + adenosylcob(III)inamide-GDP = adenosylcob(III)alamin 5'-phosphate + GMP + H(+).
