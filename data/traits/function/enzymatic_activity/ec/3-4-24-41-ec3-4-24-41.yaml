identifier: EC:3.4.24.41
label: "atrolysin B"
definition: >-
  Enzymatic activity — atrolysin B (EC 3.4.24.41). Catalysed reaction: Cleavage of 5-His-|-Leu-6, 10-His-|-Leu-11, 14-Ala-|-Leu-15, 16-Tyr-|-Leu-17 and 23-Gly-|-Phe-24 of insulin B chain. Identical to the cleavage of insulin B chain by atrolysin C. Also cleaves Xaa-|-Ser bonds in glucagon.
