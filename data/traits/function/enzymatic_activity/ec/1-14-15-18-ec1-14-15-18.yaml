identifier: EC:1.14.15.18
label: "calcidiol 1-monooxygenase"
definition: >-
  Enzymatic activity — calcidiol 1-monooxygenase (EC 1.14.15.18). Catalysed reaction: (1) calcidiol + 2 reduced [adrenodoxin] + O2 + 2 H(+) = calcitriol + 2 oxidized [adrenodoxin] + H2O. (2) secalciferol + 2 reduced [adrenodoxin] + O2 + 2 H(+) = calcitetrol + 2 oxidized [adrenodoxin] + H2O.
