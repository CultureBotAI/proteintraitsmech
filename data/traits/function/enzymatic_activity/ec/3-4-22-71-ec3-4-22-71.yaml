identifier: EC:3.4.22.71
label: "sortase B"
definition: >-
  Enzymatic activity — sortase B (EC 3.4.22.71). Catalysed reaction: The enzyme catalyzes a cell wall sorting reaction in which a surface protein with a sorting signal containing a NPXTN motif is cleaved between the Thr and Asn residue. The resulting threonine carboxyl end of the protein is covalently attached to a pentaglycine cross-bridge of peptidoglycan.
