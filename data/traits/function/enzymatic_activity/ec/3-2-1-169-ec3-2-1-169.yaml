identifier: EC:3.2.1.169
label: "protein O-GlcNAcase"
definition: >-
  Enzymatic activity — protein O-GlcNAcase (EC 3.2.1.169). Catalysed reaction: (1) 3-O-(N-acetyl-beta-D-glucosaminyl)-L-seryl-[protein] + H2O = N-acetyl-D-glucosamine + L-seryl-[protein]. (2) 3-O-(N-acetyl-beta-D-glucosaminyl)-L-threonyl-[protein] + H2O = L-threonyl-[protein] + N-acetyl-D-glucosamine.
