identifier: EC:2.6.1.52
label: "phosphoserine transaminase"
definition: >-
  Enzymatic activity — phosphoserine transaminase (EC 2.6.1.52). Catalysed reaction: (1) O-phospho-L-serine + 2-oxoglutarate = 3-phosphooxypyruvate + L-glutamate. (2) 4-(phosphooxy)-L-threonine + 2-oxoglutarate = (R)-3-hydroxy-2-oxo-4- phosphooxybutanoate + L-glutamate.
