  Enzymatic activity — D-arabinitol dehydrogenase (NADP(+)) (EC 1.1.1.287). Catalysed reaction: (1) D-arabinitol + NADP(+) = D-xylulose + NADPH + H(+). (2) D-arabinitol + NADP(+) = D-ribulose + NADPH + H(+).
