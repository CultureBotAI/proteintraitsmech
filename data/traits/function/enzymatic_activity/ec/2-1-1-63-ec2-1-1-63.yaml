identifier: EC:2.1.1.63
label: "methylated-DNA--[protein]-cysteine S-methyltransferase"
definition: >-
  Enzymatic activity — methylated-DNA--[protein]-cysteine S-methyltransferase (EC 2.1.1.63). Catalysed reaction: (1) a 6-O-methyl-2'-deoxyguanosine in DNA + L-cysteinyl-[protein] = S-methyl-L-cysteinyl-[protein] + a 2'-deoxyguanosine in DNA. (2) a 4-O-methyl-thymidine in DNA + L-cysteinyl-[protein] = a thymidine in DNA + S-methyl-L-cysteinyl-[protein].
