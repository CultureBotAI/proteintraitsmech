identifier: EC:2.5.1.3
label: "thiamine phosphate synthase"
definition: >-
  Enzymatic activity — thiamine phosphate synthase (EC 2.5.1.3). Catalysed reaction: (1) 2-[(2R,5Z)-2-carboxy-4-methylthiazol-5(2H)-ylidene]ethyl phosphate + 4-amino-2-methyl-5-(diphosphooxymethyl)pyrimidine + 2 H(+) = thiamine phosphate + CO2 + diphosphate. (2) 2-(2-carboxy-4-methylthiazol-5-yl)ethyl phosphate + 4-amino-2-methyl- 5-(diphosphooxymethyl)pyrimidine + 2 H(+) = thiamine phosphate + CO2 + diphosphate. (3) 4-methyl-5-(2-phosphooxyethyl)-thiazole + 4-amino-2-methyl-5- (diphosphooxymethyl)pyrimidine + H(+) = thiamine phosphate + diphosphate.
