identifier: EC:1.14.15.16
label: "vitamin D3 24-hydroxylase"
definition: >-
  Enzymatic activity — vitamin D3 24-hydroxylase (EC 1.14.15.16). Catalysed reaction: (1) calcitriol + 2 reduced [adrenodoxin] + O2 + 2 H(+) = calcitetrol + 2 oxidized [adrenodoxin] + H2O. (2) calcidiol + 2 reduced [adrenodoxin] + O2 + 2 H(+) = secalciferol + 2 oxidized [adrenodoxin] + H2O.
