identifier: EC:3.4.23.50
label: "human endogenous retrovirus K endopeptidase"
definition: >-
  Enzymatic activity — human endogenous retrovirus K endopeptidase (EC 3.4.23.50). Catalysed reaction: Processing at the authentic HIV-1 PR recognition site and release of the mature p17 matrix and the p24 capsid protein, as a result of the cleavage of the -SQNY-|-PIVQ- cleavage site.
