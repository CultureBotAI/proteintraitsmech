label: "acyl-[acyl-carrier-protein] 6-desaturase"
definition: >-
  Enzymatic activity — acyl-[acyl-carrier-protein] 6-desaturase (EC 1.14.19.26). Catalysed reaction: hexadecanoyl-[ACP] + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = (6Z)-hexadecenoyl-[ACP] + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
