identifier: EC:1.14.13.222
label: "aurachin C monooxygenase/isomerase"
definition: >-
  Enzymatic activity — aurachin C monooxygenase/isomerase (EC 1.14.13.222). Catalysed reaction: (1) aurachin C + NADH + O2 + H(+) = 4-hydroxy-2-methyl-3-oxo-4-[(2E,6E)- farnesyl]-3,4-dihydroquinoline 1-oxide + NAD(+) + H2O. (2) aurachin C + NADPH + O2 + H(+) = 4-hydroxy-2-methyl-3-oxo-4-[(2E,6E)- farnesyl]-3,4-dihydroquinoline 1-oxide + NADP(+) + H2O.
