identifier: EC:1.14.14.134
label: "beta-amyrin 24-hydroxylase"
definition: >-
  Enzymatic activity — beta-amyrin 24-hydroxylase (EC 1.14.14.134). Catalysed reaction: (1) beta-amyrin + reduced [NADPH--hemoprotein reductase] + O2 = 24-hydroxy-beta-amyrin + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) sophoradiol + reduced [NADPH--hemoprotein reductase] + O2 = soyasapogenol B + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
