label: "norfluorocurarine 18-hydroxylase"
definition: >-
  Enzymatic activity — norfluorocurarine 18-hydroxylase (EC 1.14.14.188). Catalysed reaction: norfluorocurarine + reduced [NADPH--hemoprotein reductase] + O2 = 18-hydroxynorfluorocurarine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
