label: "epi-isozizaene 5-monooxygenase"
definition: >-
  Enzymatic activity — epi-isozizaene 5-monooxygenase (EC 1.14.15.39). Catalysed reaction: (+)-epi-isozizaene + 4 reduced [2Fe-2S]-[ferredoxin] + 2 O2 + 4 H(+) = albaflavenone + 4 oxidized [2Fe-2S]-[ferredoxin] + 3 H2O.
