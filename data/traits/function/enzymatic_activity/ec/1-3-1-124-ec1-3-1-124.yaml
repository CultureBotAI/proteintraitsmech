identifier: EC:1.3.1.124
label: "2,4-dienoyl-CoA reductase [(3E)-enoyl-CoA-producing]"
definition: >-
  Enzymatic activity — 2,4-dienoyl-CoA reductase [(3E)-enoyl-CoA-producing] (EC 1.3.1.124). Catalysed reaction: (1) a (2E,4E)-dienoyl-CoA + NADPH + H(+) = a 4,5-saturated-(3E)-enoyl-CoA + NADP(+). (2) a (2E,4Z)-dienoyl-CoA + NADPH + H(+) = a 4,5-saturated-(3E)-enoyl-CoA + NADP(+).
