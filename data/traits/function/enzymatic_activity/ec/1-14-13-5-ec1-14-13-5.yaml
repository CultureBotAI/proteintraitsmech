identifier: EC:1.14.13.5
label: "imidazoleacetate 4-monooxygenase"
definition: >-
  Enzymatic activity — imidazoleacetate 4-monooxygenase (EC 1.14.13.5). Catalysed reaction: imidazole-4-acetate + NADH + O2 + H(+) = 5-hydroxyimidazole-4-acetate + NAD(+) + H2O.
