identifier: EC:1.21.98.5
label: "tetraether lipid synthase"
definition: >-
  Enzymatic activity — tetraether lipid synthase (EC 1.21.98.5). Catalysed reaction: (1) 2 archaetidylglycerol + 2 AH2 + 4 S-adenosyl-L-methionine = glycerol dibiphytanyl glycerol tetraether glycerophospholipid + 4 5'-deoxyadenosine + 4 L-methionine + 2 A + 4 H(+). (2) archaetidylglycerol + AH2 + 2 S-adenosyl-L-methionine = macrocyclic archaetidylglycerol + 2 5'-deoxyadenosine + 2 L-methionine + A + 2 H(+).
