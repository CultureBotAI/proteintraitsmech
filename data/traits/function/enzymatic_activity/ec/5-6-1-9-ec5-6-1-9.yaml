label: "(R)-2-hydroxyacyl-CoA dehydratase activating ATPase"
definition: >-
  Enzymatic activity — (R)-2-hydroxyacyl-CoA dehydratase activating ATPase (EC 5.6.1.9). Catalysed reaction: 2 ATP + a reduced flavodoxin + an inactive (R)-2-hydroxyacyl-CoA dehydratase + 2 H2O = 2 ADP + 2 phosphate + a flavodoxin semiquinone + an active (R)-2-hydroxyacyl-CoA dehydratase.
