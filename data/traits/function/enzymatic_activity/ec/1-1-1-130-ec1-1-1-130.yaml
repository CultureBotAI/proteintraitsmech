identifier: EC:1.1.1.130
label: "3-dehydro-L-gulonate 2-dehydrogenase"
definition: >-
  Enzymatic activity — 3-dehydro-L-gulonate 2-dehydrogenase (EC 1.1.1.130). Catalysed reaction: (1) 3-dehydro-L-gulonate + NAD(+) = 2,3-dioxo-L-gulonate + NADH + H(+). (2) 3-dehydro-L-gulonate + NADP(+) = 2,3-dioxo-L-gulonate + NADPH + H(+).
