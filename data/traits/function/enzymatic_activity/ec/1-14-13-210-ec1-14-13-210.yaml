identifier: EC:1.14.13.210
label: "4-methyl-5-nitrocatechol 5-monooxygenase"
definition: >-
  Enzymatic activity — 4-methyl-5-nitrocatechol 5-monooxygenase (EC 1.14.13.210). Catalysed reaction: (1) 4-methyl-5-nitrocatechol + NADPH + O2 = 2-hydroxy-5-methylquinone + nitrite + NADP(+) + H2O + H(+). (2) 4-methyl-5-nitrocatechol + NADH + O2 = 2-hydroxy-5-methylquinone + nitrite + NAD(+) + H2O + H(+).
