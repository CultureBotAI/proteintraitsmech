definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) 5beta-cholestane-3alpha,7alpha-diol + reduced [NADPH--hemoprotein reductase] + O2 = 5beta-cholestane-3alpha,7alpha,12alpha-triol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) 7alpha-hydroxycholest-4-en-3-one + reduced [NADPH--hemoprotein reductase] + O2 = 7alpha,12alpha-dihydroxycholest-4-en-3-one + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (3) chenodeoxycholate + reduced [NADPH--hemoprotein reductase] + O2 = cholate + oxidized [NADPH--hemoprotein reductase] + H2O + H(+)
    source: "ExPASy ENZYME"
