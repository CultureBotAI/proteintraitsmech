identifier: EC:1.14.14.139
label: "5beta-cholestane-3alpha,7alpha-diol 12alpha-hydroxylase"
definition: >-
  Enzymatic activity — 5beta-cholestane-3alpha,7alpha-diol 12alpha-hydroxylase (EC 1.14.14.139). Catalysed reaction: (1) 5beta-cholestane-3alpha,7alpha-diol + reduced [NADPH--hemoprotein reductase] + O2 = 5beta-cholestane-3alpha,7alpha,12alpha-triol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) 7alpha-hydroxycholest-4-en-3-one + reduced [NADPH--hemoprotein reductase] + O2 = 7alpha,12alpha-dihydroxycholest-4-en-3-one + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (3) chenodeoxycholate + reduced [NADPH--hemoprotein reductase] + O2 = cholate + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
definition_source: ExPASy ENZYME
