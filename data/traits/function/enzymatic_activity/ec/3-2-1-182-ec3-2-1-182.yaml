identifier: EC:3.2.1.182
label: "4-hydroxy-7-methoxy-3-oxo-3,4-dihydro-2H-1,4-benzoxazin-2-yl glucoside beta-D-glucosidase"
definition: >-
  Enzymatic activity — 4-hydroxy-7-methoxy-3-oxo-3,4-dihydro-2H-1,4-benzoxazin-2-yl glucoside beta-D-glucosidase (EC 3.2.1.182). Catalysed reaction: (1) DIMBOA beta-D-glucoside + H2O = DIMBOA + D-glucose. (2) DIBOA beta-D-glucoside + H2O = DIBOA + D-glucose.
