identifier: EC:6.3.2.47
label: "dapdiamide synthase"
definition: >-
  Enzymatic activity — dapdiamide synthase (EC 6.3.2.47). Catalysed reaction: (1) 3-[[[(2R,3R)-3-carboxyoxiran-2-yl]carbonyl]amino]-L-alanine + L-valine + ATP = dapdiamide E + ADP + phosphate + H(+). (2) N(3)-fumaramoyl-(S)-2,3-diaminopropanoate + L-valine + ATP = dapdiamide A + ADP + phosphate + H(+). (3) N(3)-fumaramoyl-(S)-2,3-diaminopropanoate + L-isoleucine + ATP = dapdiamide B + ADP + phosphate + H(+). (4) N(3)-fumaramoyl-(S)-2,3-diaminopropanoate + L-leucine + ATP = dapdiamide C + ADP + phosphate + H(+).
