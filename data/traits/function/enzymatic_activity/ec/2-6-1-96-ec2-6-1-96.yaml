identifier: EC:2.6.1.96
label: "4-aminobutyrate--pyruvate transaminase"
definition: >-
  Enzymatic activity — 4-aminobutyrate--pyruvate transaminase (EC 2.6.1.96). Catalysed reaction: (1) 4-aminobutanoate + pyruvate = succinate semialdehyde + L-alanine. (2) 4-aminobutanoate + glyoxylate = succinate semialdehyde + glycine.
