identifier: EC:3.2.1.171
label: "rhamnogalacturonan hydrolase"
definition: >-
  Enzymatic activity — rhamnogalacturonan hydrolase (EC 3.2.1.171). Catalysed reaction: Endohydrolysis of alpha-D-GalA-(1->2)-alpha-L-Rha glycosidic bond in the rhamnogalacturonan I backbone with initial inversion of anomeric configuration releasing oligosaccharides with beta-D-GalA at the reducing end.
