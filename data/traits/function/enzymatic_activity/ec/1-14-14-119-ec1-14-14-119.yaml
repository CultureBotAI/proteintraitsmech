label: "fumitremorgin C monooxygenase"
definition: >-
  Enzymatic activity — fumitremorgin C monooxygenase (EC 1.14.14.119). Catalysed reaction: fumitremorgin C + 2 reduced [NADPH--hemoprotein reductase] + 2 O2 = 12alpha,13alpha-dihydroxyfumitremorgin C + 2 oxidized [NADPH--hemoprotein reductase] + 2 H2O + 2 H(+).
