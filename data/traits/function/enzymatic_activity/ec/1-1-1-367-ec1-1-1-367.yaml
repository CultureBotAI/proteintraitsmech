identifier: EC:1.1.1.367
label: "UDP-2-acetamido-2,6-beta-L-arabino-hexul-4-ose reductase"
definition: >-
  Enzymatic activity — UDP-2-acetamido-2,6-beta-L-arabino-hexul-4-ose reductase (EC 1.1.1.367). Catalysed reaction: (1) UDP-2-acetamido-2,6-dideoxy-beta-L-arabino-hex-4-ulose + NADPH + H(+) = UDP-2-acetamido-2,6-dideoxy-beta-L-talose + NADP(+). (2) UDP-2-acetamido-2,6-dideoxy-beta-L-arabino-hex-4-ulose + NADH + H(+) = UDP-2-acetamido-2,6-dideoxy-beta-L-talose + NAD(+).
