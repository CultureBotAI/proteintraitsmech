identifier: EC:1.14.11.72
label: "[2-(trimethylamino)ethyl]phosphonate dioxygenase"
definition: >-
  Enzymatic activity — [2-(trimethylamino)ethyl]phosphonate dioxygenase (EC 1.14.11.72). Catalysed reaction: [2-(trimethylamino)ethyl]phosphonate + 2-oxoglutarate + O2 = [(1R)-1- hydroxy-2-(trimethylamino)ethyl]phosphonate + succinate + CO2.
