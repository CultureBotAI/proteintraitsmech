label: "dimethylnonatriene synthase"
definition: >-
  Enzymatic activity — dimethylnonatriene synthase (EC 1.14.14.59). Catalysed reaction: (3S,6E)-nerolidol + reduced [NADPH--hemoprotein reductase] + O2 = (3E)- 4,8-dimethylnona-1,3,7-triene + but-3-en-2-one + oxidized [NADPH- -hemoprotein reductase] + 2 H2O + H(+).
