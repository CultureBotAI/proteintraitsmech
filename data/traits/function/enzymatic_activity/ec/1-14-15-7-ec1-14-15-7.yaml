definition: >-
  Enzymatic activity — choline monooxygenase (EC 1.14.15.7). Catalysed reaction: choline + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = betaine aldehyde hydrate + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O.
