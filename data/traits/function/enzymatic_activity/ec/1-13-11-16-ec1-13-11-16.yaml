identifier: EC:1.13.11.16
label: "3-carboxyethylcatechol 2,3-dioxygenase"
definition: >-
  Enzymatic activity — 3-carboxyethylcatechol 2,3-dioxygenase (EC 1.13.11.16). Catalysed reaction: (1) 3-(2,3-dihydroxyphenyl)propanoate + O2 = (2Z,4E)-2-hydroxy-6-oxonona- 2,4-dienedioate + H(+). (2) (2E)-3-(2,3-dihydroxyphenyl)prop-2-enoate + O2 = (2Z,4E,7E)-2- hydroxy-6-oxonona-2,4,7-trienedioate + H(+).
