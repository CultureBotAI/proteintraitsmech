label: "5-epiaristolochene 1,3-dihydroxylase"
definition: >-
  Enzymatic activity — 5-epiaristolochene 1,3-dihydroxylase (EC 1.14.14.149). Catalysed reaction: (+)-5-epi-aristolochene + 2 reduced [NADPH--hemoprotein reductase] + 2 O2 = capsidiol + 2 oxidized [NADPH--hemoprotein reductase] + 2 H2O + 2 H(+).
