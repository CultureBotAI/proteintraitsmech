identifier: EC:2.5.1.150
label: "lycopene elongase/hydratase (dihydrobisanhydrobacterioruberin-forming)"
definition: >-
  Enzymatic activity — lycopene elongase/hydratase (dihydrobisanhydrobacterioruberin-forming) (EC 2.5.1.150). Catalysed reaction: (1) all-trans-lycopene + dimethylallyl diphosphate + H2O = dihydroisopentenyldehydrorhodopin + diphosphate. (2) isopentenyldehydrorhodopin + dimethylallyl diphosphate + H2O = dihydrobisanhydrobacterioruberin + diphosphate.
