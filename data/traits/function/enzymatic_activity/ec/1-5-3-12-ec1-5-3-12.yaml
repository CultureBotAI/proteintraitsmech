identifier: EC:1.5.3.12
label: "dihydrobenzophenanthridine oxidase"
definition: >-
  Enzymatic activity — dihydrobenzophenanthridine oxidase (EC 1.5.3.12). Catalysed reaction: (1) dihydrosanguinarine + O2 + H(+) = sanguinarine + H2O2. (2) dihydrochelirubine + O2 + H(+) = chelirubine + H2O2. (3) dihydromacarpine + O2 + H(+) = macarpine + H2O2.
