identifier: EC:1.14.13.50
label: "pentachlorophenol monooxygenase"
definition: >-
  Enzymatic activity — pentachlorophenol monooxygenase (EC 1.14.13.50). Catalysed reaction: (1) pentachlorophenol + NADPH + O2 + H(+) = 2,3,5,6-tetrachloro-1,4- benzoquinone + chloride + NADP(+) + H2O. (2) 2,3,5,6-tetrachlorophenol + NADPH + O2 = 2,3,5,6- tetrachlorohydroquinone + NADP(+) + H2O.
