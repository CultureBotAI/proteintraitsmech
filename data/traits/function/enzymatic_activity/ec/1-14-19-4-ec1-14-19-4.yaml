identifier: EC:1.14.19.4
label: "acyl-lipid (11-3)-desaturase"
definition: >-
  Enzymatic activity — acyl-lipid (11-3)-desaturase (EC 1.14.19.4). Catalysed reaction: (1) an (11Z,14Z)-icosadienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = an (8Z,11Z,14Z)-icosatrienoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) an (11Z,14Z,17Z)-icosatrienoyl-containing glycerolipid + 2 Fe(II)- [cytochrome b5] + O2 + 2 H(+) = an (8Z,11Z,14Z,17Z)-eicosatetraenoyl- containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
