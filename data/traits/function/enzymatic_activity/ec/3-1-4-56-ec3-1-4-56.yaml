identifier: EC:3.1.4.56
label: "7,8-dihydroneopterin 2',3'-cyclic phosphate phosphodiesterase"
definition: >-
  Enzymatic activity — 7,8-dihydroneopterin 2',3'-cyclic phosphate phosphodiesterase (EC 3.1.4.56). Catalysed reaction: (1) 7,8-dihydroneopterin 2',3'-cyclic phosphate + H2O = 7,8- dihydroneopterin 3'-phosphate + H(+). (2) 7,8-dihydroneopterin 2',3'-cyclic phosphate + H2O = 7,8- dihydroneopterin 2'-phosphate + H(+).
