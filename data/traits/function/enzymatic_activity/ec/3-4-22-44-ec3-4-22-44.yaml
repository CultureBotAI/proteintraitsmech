identifier: EC:3.4.22.44
label: "nuclear-inclusion-a endopeptidase"
definition: >-
  Enzymatic activity — nuclear-inclusion-a endopeptidase (EC 3.4.22.44). Catalysed reaction: Hydrolyzes glutaminyl bonds, and activity is further restricted by preferences for the amino acids in P6 - P1' that vary with the species of potyvirus, e.g. Glu-Xaa-Xaa-Tyr-Xaa-Gln-|-(Ser or Gly) for the enzyme from tobacco etch virus. The natural substrate is the viral polyprotein, but other proteins and oligopeptides containing the appropriate consensus sequence are also cleaved.
