identifier: EC:3.4.23.43
label: "prepilin peptidase"
definition: >-
  Enzymatic activity — prepilin peptidase (EC 3.4.23.43). Catalysed reaction: Typically cleaves a -Gly-|-Phe- bond to release an N-terminal, basic peptide of 5-8 residues from type IV prepilin, and then N-methylates the new N-terminal amino group, the methyl donor being S-adenosyl-L- methionine.
