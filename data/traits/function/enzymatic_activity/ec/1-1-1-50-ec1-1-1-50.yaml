identifier: EC:1.1.1.50
label: "3alpha-hydroxysteroid 3-dehydrogenase (Si-specific)"
definition: >-
  Enzymatic activity — 3alpha-hydroxysteroid 3-dehydrogenase (Si-specific) (EC 1.1.1.50). Catalysed reaction: (1) a 3alpha-hydroxysteroid + NAD(+) = a 3-oxosteroid + NADH + H(+). (2) a 3alpha-hydroxysteroid + NADP(+) = a 3-oxosteroid + NADPH + H(+).
