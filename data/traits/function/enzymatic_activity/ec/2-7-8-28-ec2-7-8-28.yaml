identifier: EC:2.7.8.28
label: "2-phospho-L-lactate transferase"
definition: >-
  Enzymatic activity — 2-phospho-L-lactate transferase (EC 2.7.8.28). Catalysed reaction: (1) (2S)-lactyl-2-diphospho-5'-guanosine + 7,8-didemethyl-8-hydroxy-5- deazariboflavin = oxidized coenzyme F420-0 + GMP + H(+). (2) enolpyruvoyl-2-diphospho-5'-guanosine + 7,8-didemethyl-8-hydroxy-5- deazariboflavin = dehydro coenzyme F420-0 + GMP + H(+). (3) 3-[(R)-glyceryl]-diphospho-5'-guanosine + 7,8-didemethyl-8-hydroxy-5- deazariboflavin = oxidized 3PG-factor420-0 + GMP + H(+).
