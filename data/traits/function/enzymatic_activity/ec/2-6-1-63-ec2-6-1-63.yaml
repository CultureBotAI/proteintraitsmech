identifier: EC:2.6.1.63
label: "kynurenine--glyoxylate transaminase"
definition: >-
  Enzymatic activity — kynurenine--glyoxylate transaminase (EC 2.6.1.63). Catalysed reaction: (1) L-kynurenine + glyoxylate = kynurenate + glycine + H2O. (2) 3-hydroxy-L-kynurenine + glyoxylate = xanthurenate + glycine + H2O.
