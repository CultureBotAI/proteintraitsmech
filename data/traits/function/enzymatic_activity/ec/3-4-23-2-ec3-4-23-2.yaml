identifier: EC:3.4.23.2
label: "pepsin B"
definition: >-
  Enzymatic activity — pepsin B (EC 3.4.23.2). Catalysed reaction: Degradation of gelatin, little activity on hemoglobin. Specificity on B chain of insulin more restricted than that of pepsin A. Does not cleave 1-Phe-|-Val-2, 4-Gln-|-His-5 or 23-Gly-|-Phe-24.
