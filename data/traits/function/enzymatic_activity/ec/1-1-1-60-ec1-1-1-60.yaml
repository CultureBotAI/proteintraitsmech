identifier: EC:1.1.1.60
label: "2-hydroxy-3-oxopropionate reductase"
definition: >-
  Enzymatic activity — 2-hydroxy-3-oxopropionate reductase (EC 1.1.1.60). Catalysed reaction: (1) (R)-glycerate + NADP(+) = 2-hydroxy-3-oxopropanoate + NADPH + H(+). (2) (R)-glycerate + NAD(+) = 2-hydroxy-3-oxopropanoate + NADH + H(+).
