identifier: EC:2.7.8.48
label: "ceramide phosphoethanolamine synthase"
definition: >-
  Enzymatic activity — ceramide phosphoethanolamine synthase (EC 2.7.8.48). Catalysed reaction: (1) CDP-ethanolamine + an N-acyl-sphingoid base = an N-acyl-sphingoid 1-phosphoethanolamine + CMP + H(+). (2) an N-acylsphing-4-enine + a 1,2-diacyl-sn-glycero-3- phosphoethanolamine = an N-acylsphing-4-enine 1-phosphoethanolamine + a 1,2-diacyl-sn-glycerol.
