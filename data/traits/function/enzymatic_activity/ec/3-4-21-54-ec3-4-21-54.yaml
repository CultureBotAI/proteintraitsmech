label: gamma-renin
definition: >-
  Enzymatic activity — gamma-renin (EC 3.4.21.54). Catalysed reaction: Cleavage of the Leu-|-Leu bond in synthetic tetradecapeptide renin substrate, to produce angiotensin I, but not active on natural angiotensinogen. Also hydrolyzes Bz-Arg-p-nitroanilide.
