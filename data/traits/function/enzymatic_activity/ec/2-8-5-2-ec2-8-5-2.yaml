identifier: EC:2.8.5.2
label: "L-cysteine S-thiosulfotransferase"
definition: >-
  Enzymatic activity — L-cysteine S-thiosulfotransferase (EC 2.8.5.2). Catalysed reaction: (1) L-cysteinyl-[SoxY protein] + thiosulfate + 2 Fe(III)-[cytochrome c] = S-sulfosulfanyl-L-cysteinyl-[SoxY protein] + 2 Fe(II)-[cytochrome c] + 2 H(+). (2) S-sulfanyl-L-cysteinyl-[SoxY protein] + thiosulfate + 2 Fe(III)- [cytochrome c] = S-(2-sulfodisulfanyl)-L-cysteinyl-[SoxY protein] + 2 Fe(II)-[cytochrome c] + 2 H(+).
