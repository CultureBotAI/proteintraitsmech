identifier: EC:3.4.23.23
label: mucorpepsin
definition: >-
  Enzymatic activity — mucorpepsin (EC 3.4.23.23). Catalysed reaction: Hydrolysis of proteins, favoring hydrophobic residues at P1 and P1'. Clots milk. Does not accept Lys at P1, and hence does not activate trypsinogen.
