identifier: EC:2.4.1.197
label: "high-mannose-oligosaccharide beta-1,4-N-acetylglucosaminyltransferase"
definition: >-
  Enzymatic activity — high-mannose-oligosaccharide beta-1,4-N-acetylglucosaminyltransferase (EC 2.4.1.197). Catalysed reaction: Transfers an N-acetyl-D-glucosamine residue from UDP-N-acetyl-D- glucosamine to the 4-position of a mannose linked alpha-(1->6) to the core mannose of high-mannose oligosaccharides produced by Dictyostelium discoideum.
