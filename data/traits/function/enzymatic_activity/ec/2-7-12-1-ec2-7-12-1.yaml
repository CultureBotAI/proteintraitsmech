identifier: EC:2.7.12.1
label: "dual-specificity kinase"
definition: >-
  Enzymatic activity — dual-specificity kinase (EC 2.7.12.1). Catalysed reaction: (1) L-seryl-[protein] + ATP = O-phospho-L-seryl-[protein] + ADP + H(+). (2) L-threonyl-[protein] + ATP = O-phospho-L-threonyl-[protein] + ADP + H(+). (3) L-tyrosyl-[protein] + ATP = O-phospho-L-tyrosyl-[protein] + ADP + H(+).
