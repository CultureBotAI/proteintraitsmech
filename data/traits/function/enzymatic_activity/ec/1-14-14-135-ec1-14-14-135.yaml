identifier: EC:1.14.14.135
label: "glyceollin synthase"
definition: >-
  Enzymatic activity — glyceollin synthase (EC 1.14.14.135). Catalysed reaction: (1) (6aS,11aS)-2-dimethylallyl-3,6a,9-trihydroxypterocarpan + reduced [NADPH--hemoprotein reductase] + O2 = glyceollin II + oxidized [NADPH- -hemoprotein reductase] + 2 H2O + H(+). (2) (6aS,11aS)-2-dimethylallyl-3,6a,9-trihydroxypterocarpan + reduced [NADPH--hemoprotein reductase] + O2 = glyceollin III + oxidized [NADPH- -hemoprotein reductase] + 2 H2O + H(+). (3) (6aS,11aS)-4-dimethylallyl-3,6a,9-trihydroxypterocarpan + reduced [NADPH--hemoprotein reductase] + O2 = glyceollin I + oxidized [NADPH- -hemoprotein reductase] + 2 H2O + H(+).
