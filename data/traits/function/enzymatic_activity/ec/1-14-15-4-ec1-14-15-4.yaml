  Enzymatic activity — steroid 11beta-monooxygenase (EC 1.14.15.4). Catalysed reaction: a steroid + 2 reduced [adrenodoxin] + O2 + 2 H(+) = an 11beta- hydroxysteroid + 2 oxidized [adrenodoxin] + H2O.
