identifier: EC:3.4.13.21
label: "dipeptidase E"
definition: >-
  Enzymatic activity — dipeptidase E (EC 3.4.13.21). Catalysed reaction: Dipeptidase E catalyzes the hydrolysis of dipeptides Asp-|-Xaa. It does not act on peptides with N-terminal Glu, Asn or Gln, nor does it cleave isoaspartyl peptides.
