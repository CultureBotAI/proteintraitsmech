label: "phosphoribosyl 1,2-cyclic phosphate 1,2-diphosphodiesterase"
definition: >-
  Enzymatic activity — phosphoribosyl 1,2-cyclic phosphate 1,2-diphosphodiesterase (EC 3.1.4.57). Catalysed reaction: (1) alpha-D-ribose 1,2-cyclic phosphate 5-phosphate + H2O = D-ribose 2,5- bisphosphate + H(+). (2) D-ribose 2,5-bisphosphate + H2O = D-ribose 5-phosphate + phosphate.
