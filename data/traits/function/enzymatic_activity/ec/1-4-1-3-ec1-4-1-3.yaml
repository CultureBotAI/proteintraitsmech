identifier: EC:1.4.1.3
label: "glutamate dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — glutamate dehydrogenase [NAD(P)(+)] (EC 1.4.1.3). Catalysed reaction: (1) L-glutamate + NAD(+) + H2O = 2-oxoglutarate + NH4(+) + NADH + H(+). (2) L-glutamate + NADP(+) + H2O = 2-oxoglutarate + NH4(+) + NADPH + H(+).
