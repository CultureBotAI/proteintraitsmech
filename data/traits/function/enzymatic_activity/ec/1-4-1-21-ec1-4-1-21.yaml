identifier: EC:1.4.1.21
label: "aspartate dehydrogenase"
definition: >-
  Enzymatic activity — aspartate dehydrogenase (EC 1.4.1.21). Catalysed reaction: (1) L-aspartate + NADP(+) + H2O = oxaloacetate + NH4(+) + NADPH + H(+). (2) L-aspartate + NAD(+) + H2O = oxaloacetate + NH4(+) + NADH + H(+).
