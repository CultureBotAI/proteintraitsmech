identifier: EC:2.1.1.62
label: "mRNA (2'-O-methyladenosine-N(6)-)-methyltransferase"
definition: >-
  Enzymatic activity — mRNA (2'-O-methyladenosine-N(6)-)-methyltransferase (EC 2.1.1.62). Catalysed reaction: a 5'-end (N(7)-methyl 5'-triphosphoguanosine)-(2'-O-methyladenosine) in mRNA + S-adenosyl-L-methionine = a 5'-end (N(7)-methyl 5'-triphosphoguanosine)-(N(6),2'-O-dimethyladenosine) in mRNA + S-adenosyl-L-homocysteine + H(+).
