identifier: EC:1.5.7.3
label: "N,N-dimethylglycine/sarcosine dehydrogenase (ferredoxin)"
definition: >-
  Enzymatic activity — N,N-dimethylglycine/sarcosine dehydrogenase (ferredoxin) (EC 1.5.7.3). Catalysed reaction: (1) oxidized 2[4Fe-4S]-[ferredoxin] + N,N-dimethylglycine + H2O = reduced 2[4Fe-4S]-[ferredoxin] + sarcosine + formaldehyde + 2 H(+). (2) oxidized 2[4Fe-4S]-[ferredoxin] + sarcosine + H2O = reduced 2[4Fe- 4S]-[ferredoxin] + formaldehyde + glycine + 2 H(+).
