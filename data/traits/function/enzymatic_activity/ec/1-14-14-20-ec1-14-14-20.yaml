identifier: EC:1.14.14.20
label: "phenol 2-monooxygenase (FADH2)"
definition: >-
  Enzymatic activity — phenol 2-monooxygenase (FADH2) (EC 1.14.14.20). Catalysed reaction: phenol + FADH2 + O2 = catechol + FAD + H2O + H(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:1.14.14.-
mapped_xrefs:
  - object: RHEA:49280
    mapping_source: rhea2ec
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: phenol + FADH2 + O2 = catechol + FAD + H2O + H(+)
    source: "ExPASy ENZYME"
    method: SOURCED
