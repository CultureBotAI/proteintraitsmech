  Enzymatic activity — icosanoyl-CoA 5-desaturase (EC 1.14.19.10). Catalysed reaction: eicosanoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = (5Z)- eicosenoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O.
