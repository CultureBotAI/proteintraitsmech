  Enzymatic activity — (S)-corytuberine synthase (EC 1.14.19.51). Catalysed reaction: (S)-reticuline + reduced [NADPH--hemoprotein reductase] + O2 = (S)- corytuberine + oxidized [NADPH--hemoprotein reductase] + 2 H2O + 2 H(+).
