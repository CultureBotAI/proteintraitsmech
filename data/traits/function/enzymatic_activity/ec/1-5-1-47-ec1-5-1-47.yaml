identifier: EC:1.5.1.47
label: "dihydromethanopterin reductase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — dihydromethanopterin reductase [NAD(P)(+)] (EC 1.5.1.47). Catalysed reaction: (1) 5,6,7,8-tetrahydromethanopterin + NADP(+) = 7,8-dihydromethanopterin + NADPH + H(+). (2) 5,6,7,8-tetrahydromethanopterin + NAD(+) = 7,8-dihydromethanopterin + NADH + H(+).
