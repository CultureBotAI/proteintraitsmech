identifier: EC:3.2.1.98
label: "glucan 1,4-alpha-maltohexaosidase"
definition: >-
  Enzymatic activity — glucan 1,4-alpha-maltohexaosidase (EC 3.2.1.98). Catalysed reaction: Hydrolysis of (1->4)-alpha-D-glucosidic linkages in amylaceous polysaccharides, to remove successive maltohexaose residues from the non- reducing chain ends.
