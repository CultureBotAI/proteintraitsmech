identifier: EC:3.4.19.16
label: "glucosinolate gamma-glutamyl hydrolase"
definition: >-
  Enzymatic activity — glucosinolate gamma-glutamyl hydrolase (EC 3.4.19.16). Catalysed reaction: (1) an S-[(1E)-1-(hydroxyimino)-omega-(methylsulfanyl)alkyl]-L- glutathione + H2O = an S-[(1E)-1-(hydroxyimino)-omega- (methylsulfanyl)alkyl]-L-cysteinylglycine + L-glutamate. (2) (E)-1-(glutathione-S-yl)-2-(1H-indol-3-yl)acetohydroximate + H2O = (E)-1-(glycyl-L-cystein-S-yl)-2-(1H-indol-3-yl)acetohydroximate + L-glutamate. (3) 2-(glutathion-S-yl)-2-(1H-indol-3-yl)acetonitrile + H2O = 2-(glycyl- L-cystein-S-yl)-2-(1H-indol-3-yl)acetonitrile + L-glutamate. (4) (Z)-1-(glutathione-S-yl)-2-phenylacetohydroximate + H2O = (Z)-1- (glycyl-L-cystein-S-yl)-2-phenylacetohydroximate + L-glutamate.
