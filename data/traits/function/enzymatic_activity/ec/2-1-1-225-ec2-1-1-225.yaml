identifier: EC:2.1.1.225
label: "tRNA:m(4)X modification enzyme"
definition: >-
  Enzymatic activity — tRNA:m(4)X modification enzyme (EC 2.1.1.225). Catalysed reaction: (1) cytidine(4) in tRNA(Pro) + S-adenosyl-L-methionine = 2'-O- methylcytidine(4) in tRNA(Pro) + S-adenosyl-L-homocysteine + H(+). (2) cytidine(4) in tRNA(Gly)(GCC) + S-adenosyl-L-methionine = 2'-O- methylcytidine(4) in tRNA(Gly)(GCC) + S-adenosyl-L-homocysteine + H(+). (3) adenosine(4) in tRNA(His) + S-adenosyl-L-methionine = 2'-O- methyladenosine(4) in tRNA(His) + S-adenosyl-L-homocysteine + H(+).
