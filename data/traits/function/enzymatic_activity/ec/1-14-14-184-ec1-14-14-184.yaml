identifier: EC:1.14.14.184
label: "5-dehydro-6-demethoxyfumagillol synthase"
definition: >-
  Enzymatic activity — 5-dehydro-6-demethoxyfumagillol synthase (EC 1.14.14.184). Catalysed reaction: (+)-exo-beta-bergamotene + 2 reduced [NADPH--hemoprotein reductase] + 3 O2 = 5-dehydro-6-demethoxyfumagillol + 2 oxidized [NADPH--hemoprotein reductase] + 3 H2O + 2 H(+).
