identifier: EC:1.3.8.15
label: "3-(aryl)acrylate reductase"
definition: >-
  Enzymatic activity — 3-(aryl)acrylate reductase (EC 1.3.8.15). Catalysed reaction: (1) phloretate + oxidized [electron-transfer flavoprotein] + H(+) = (E)- 4-coumarate + reduced [electron-transfer flavoprotein]. (2) 3-phenylpropanoate + oxidized [electron-transfer flavoprotein] + H(+) = (E)-cinnamate + reduced [electron-transfer flavoprotein]. (3) indole-3-propanoate + oxidized [electron-transfer flavoprotein] + H(+) = (E)-3-(indol-3-yl)acrylate + reduced [electron-transfer flavoprotein].
