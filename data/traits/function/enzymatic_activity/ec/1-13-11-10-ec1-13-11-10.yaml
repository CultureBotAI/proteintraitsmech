identifier: EC:1.13.11.10
label: "7,8-dihydroxykynurenate 8,8a-dioxygenase"
definition: >-
  Enzymatic activity — 7,8-dihydroxykynurenate 8,8a-dioxygenase (EC 1.13.11.10). Catalysed reaction: 7,8-dihydroxykynurenate + O2 = 5-(3-carboxy-3-oxoprop-1-en-1-yl)-4,6- dihydroxypyridine-2-carboxylate + H(+).
