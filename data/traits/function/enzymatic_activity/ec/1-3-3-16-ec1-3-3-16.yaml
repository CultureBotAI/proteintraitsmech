identifier: EC:1.3.3.16
label: "oxazoline dehydrogenase"
definition: >-
  Enzymatic activity — oxazoline dehydrogenase (EC 1.3.3.16). Catalysed reaction: (1) (1S,4R)-2-(C-substituted-aminomethyl)-4-acyl-2-thiazoline-[protein] + O2 = (S)-2-(C-substituted-aminomethyl)-4-acyl-1,3-thiazole-[protein] + H2O2. (2) (S,S)-2-(C-substituted-aminomethyl)-4-acyl-2-oxazoline-[protein] + O2 = (S)-2-(C-substituted-aminomethyl)-4-acyl-1,3-oxazole-[protein] + H2O2. (3) (S,S)-2-(C-substituted-aminomethyl)-4-acyl-5-methyl-2-oxazoline- [protein] + O2 = (S)-2-(C-substituted-aminomethyl)-4-acyl-5-methyl-1,3- oxazole-[protein] + H2O2.
