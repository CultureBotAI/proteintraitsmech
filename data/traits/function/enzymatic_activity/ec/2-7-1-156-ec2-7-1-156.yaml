  Enzymatic activity — adenosylcobinamide kinase (EC 2.7.1.156). Catalysed reaction: (1) adenosylcob(III)inamide + GTP = adenosylcob(III)inamide phosphate + GDP + H(+). (2) adenosylcob(III)inamide + ATP = adenosylcob(III)inamide phosphate + ADP + H(+).
