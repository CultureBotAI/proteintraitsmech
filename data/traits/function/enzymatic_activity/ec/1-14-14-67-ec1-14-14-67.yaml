identifier: EC:1.14.14.67
label: "11-hydroxysugiol 20-monooxygenase"
definition: >-
  Enzymatic activity — 11-hydroxysugiol 20-monooxygenase (EC 1.14.14.67). Catalysed reaction: 11-hydroxysugiol + reduced [NADPH--hemoprotein reductase] + O2 = 11,20- dihydroxysugiol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
