identifier: EC:3.4.19.11
label: "gamma-D-glutamyl-meso-diaminopimelate peptidase"
definition: >-
  Enzymatic activity — gamma-D-glutamyl-meso-diaminopimelate peptidase (EC 3.4.19.11). Catalysed reaction: Hydrolysis of gamma-D-glutamyl bonds to the L-terminus (position 7) of meso-diaminopimelic acid (meso-A2pm) in 7-(L-Ala-gamma-D-Glu)-meso-A2pm and 7-(L-Ala-gamma-D-Glu)-7-(D-Ala)-meso-A2pm. It is required that the D-terminal amino and carboxy groups of meso-A2pm are unsubstituted.
