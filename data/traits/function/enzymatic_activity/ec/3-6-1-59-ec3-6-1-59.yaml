identifier: EC:3.6.1.59
label: "5'-(N(7)-methyl 5'-triphosphoguanosine)-[mRNA] diphosphatase"
definition: >-
  Enzymatic activity — 5'-(N(7)-methyl 5'-triphosphoguanosine)-[mRNA] diphosphatase (EC 3.6.1.59). Catalysed reaction: a 5'-end (N(7)-methyl 5'-triphosphoguanosine)-ribonucleoside in mRNA + H2O = a 5'-end diphospho-ribonucleoside in mRNA + N(7)-methyl-GMP + 2 H(+).
