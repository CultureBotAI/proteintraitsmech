identifier: EC:1.3.1.24
label: "biliverdin reductase"
definition: >-
  Enzymatic activity — biliverdin reductase (EC 1.3.1.24). Catalysed reaction: (1) (4Z,15Z)-bilirubin IXalpha + NADP(+) = biliverdin IXalpha + NADPH + H(+). (2) (4Z,15Z)-bilirubin IXalpha + NAD(+) = biliverdin IXalpha + NADH + H(+).
