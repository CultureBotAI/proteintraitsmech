identifier: EC:3.1.1.80
label: "acetylajmaline esterase"
definition: >-
  Enzymatic activity — acetylajmaline esterase (EC 3.1.1.80). Catalysed reaction: (1) 17-O-acetylajmaline + H2O = ajmaline + acetate + H(+). (2) 17-O-acetylnorajmaline + H2O = norajmaline + acetate + H(+).
