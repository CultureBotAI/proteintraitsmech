identifier: EC:1.8.4.11
label: "peptide-methionine (S)-S-oxide reductase"
definition: >-
  Enzymatic activity — peptide-methionine (S)-S-oxide reductase (EC 1.8.4.11). Catalysed reaction: (1) L-methionyl-[protein] + [thioredoxin]-disulfide + H2O = L-methionyl- (S)-S-oxide-[protein] + [thioredoxin]-dithiol. (2) [thioredoxin]-disulfide + L-methionine + H2O = L-methionine (S)-S- oxide + [thioredoxin]-dithiol.
