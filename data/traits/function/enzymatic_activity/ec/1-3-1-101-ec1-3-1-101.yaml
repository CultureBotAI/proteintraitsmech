identifier: EC:1.3.1.101
label: "2,3-bis-O-geranylgeranyl-sn-glycerol 1-phosphate reductase [NAD(P)H]"
definition: >-
  Enzymatic activity — 2,3-bis-O-geranylgeranyl-sn-glycerol 1-phosphate reductase [NAD(P)H] (EC 1.3.1.101). Catalysed reaction: (1) 2,3-bis-O-(phytanyl)-sn-glycerol 1-phosphate + 8 NADP(+) = 2,3-bis-O- (geranylgeranyl)-sn-glycerol 1-phosphate + 8 NADPH + 8 H(+). (2) 2,3-bis-O-(phytanyl)-sn-glycerol 1-phosphate + 8 NAD(+) = 2,3-bis-O- (geranylgeranyl)-sn-glycerol 1-phosphate + 8 NADH + 8 H(+).
