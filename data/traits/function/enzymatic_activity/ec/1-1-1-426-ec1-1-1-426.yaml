identifier: EC:1.1.1.426
label: "UDP-N-acetyl-alpha-D-quinovosamine dehydrogenase"
definition: >-
  Enzymatic activity — UDP-N-acetyl-alpha-D-quinovosamine dehydrogenase (EC 1.1.1.426). Catalysed reaction: (1) UDP-N-acetyl-alpha-D-quinovosamine + NADP(+) = UDP-2-acetamido-2,6- dideoxy-alpha-D-xylo-hex-4-ulose + NADPH + H(+). (2) UDP-N-acetyl-alpha-D-quinovosamine + NAD(+) = UDP-2-acetamido-2,6- dideoxy-alpha-D-xylo-hex-4-ulose + NADH + H(+).
