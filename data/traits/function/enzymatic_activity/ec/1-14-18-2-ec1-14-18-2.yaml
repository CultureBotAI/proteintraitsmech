identifier: EC:1.14.18.2
label: "CMP-N-acetylneuraminate monooxygenase"
definition: >-
  Enzymatic activity — CMP-N-acetylneuraminate monooxygenase (EC 1.14.18.2). Catalysed reaction: CMP-N-acetyl-beta-neuraminate + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = CMP-N-glycoloyl-beta-neuraminate + 2 Fe(III)-[cytochrome b5] + H2O.
