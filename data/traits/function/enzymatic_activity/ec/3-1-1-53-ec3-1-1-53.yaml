identifier: EC:3.1.1.53
label: "sialate O-acetylesterase"
definition: >-
  Enzymatic activity — sialate O-acetylesterase (EC 3.1.1.53). Catalysed reaction: (1) N-acetyl-9-O-acetylneuraminate + H2O = N-acetylneuraminate + acetate + H(+). (2) N-acetyl-4-O-acetylneuraminate + H2O = N-acetylneuraminate + acetate + H(+).
