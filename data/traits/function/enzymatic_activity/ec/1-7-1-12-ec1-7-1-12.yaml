label: "N-hydroxy-2-acetamidofluorene reductase"
definition: >-
  Enzymatic activity — N-hydroxy-2-acetamidofluorene reductase (EC 1.7.1.12). Catalysed reaction: (1) 2-acetamidofluorene + NAD(+) + H2O = N-hydroxy-2-acetamidofluorene + NADH + H(+). (2) 2-acetamidofluorene + NADP(+) + H2O = N-hydroxy-2-acetamidofluorene + NADPH + H(+).
