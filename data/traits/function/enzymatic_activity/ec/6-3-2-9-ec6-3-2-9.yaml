identifier: EC:6.3.2.9
label: "UDP-N-acetylmuramoyl-L-alanine--D-glutamate ligase"
definition: >-
  Enzymatic activity — UDP-N-acetylmuramoyl-L-alanine--D-glutamate ligase (EC 6.3.2.9). Catalysed reaction: UDP-N-acetyl-alpha-D-muramoyl-L-alanine + D-glutamate + ATP = UDP-N- acetyl-alpha-D-muramoyl-L-alanyl-D-glutamate + ADP + phosphate + H(+).
