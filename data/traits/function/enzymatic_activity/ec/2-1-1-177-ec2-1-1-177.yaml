identifier: EC:2.1.1.177
label: "23S rRNA (pseudouridine(1915)-N(3))-methyltransferase"
definition: >-
  Enzymatic activity — 23S rRNA (pseudouridine(1915)-N(3))-methyltransferase (EC 2.1.1.177). Catalysed reaction: pseudouridine(1915) in 23S rRNA + S-adenosyl-L-methionine = N(3)- methylpseudouridine(1915) in 23S rRNA + S-adenosyl-L-homocysteine + H(+).
