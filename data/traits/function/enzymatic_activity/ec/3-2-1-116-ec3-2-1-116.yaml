identifier: EC:3.2.1.116
label: "glucan 1,4-alpha-maltotriohydrolase"
definition: >-
  Enzymatic activity — glucan 1,4-alpha-maltotriohydrolase (EC 3.2.1.116). Catalysed reaction: Hydrolysis of (1->4)-alpha-D-glucosidic linkages in amylaceous polysaccharides, to remove successive maltotriose residues from the non- reducing chain ends.
