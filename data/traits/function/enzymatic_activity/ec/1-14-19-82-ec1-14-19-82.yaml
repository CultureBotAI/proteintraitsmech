label: "tryptophan 5-brominase (NADPH)"
definition: >-
  Enzymatic activity — tryptophan 5-brominase (NADPH) (EC 1.14.19.82). Catalysed reaction: bromide + L-tryptophan + NADPH + O2 + 2 H(+) = 5-bromo-L-tryptophan + NADP(+) + 2 H2O.
