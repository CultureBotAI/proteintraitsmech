  Enzymatic activity — isocitrate--homoisocitrate dehydrogenase (EC 1.1.1.286). Catalysed reaction: (1) D-threo-isocitrate + NAD(+) = 2-oxoglutarate + CO2 + NADH. (2) (2R,3S)-homoisocitrate + NAD(+) = 2-oxoadipate + CO2 + NADH.
