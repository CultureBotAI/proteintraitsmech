identifier: EC:1.1.1.117
label: "D-arabinose 1-dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — D-arabinose 1-dehydrogenase [NAD(P)(+)] (EC 1.1.1.117). Catalysed reaction: (1) D-arabinose + NADP(+) = D-arabinono-1,4-lactone + NADPH + H(+). (2) D-arabinose + NAD(+) = D-arabinono-1,4-lactone + NADH + H(+).
