identifier: EC:1.14.11.54
label: "mRNA N(1)-methyladenine demethylase"
definition: >-
  Enzymatic activity — mRNA N(1)-methyladenine demethylase (EC 1.14.11.54). Catalysed reaction: an N(1)-methyladenosine in mRNA + 2-oxoglutarate + O2 = an adenosine in mRNA + formaldehyde + succinate + CO2.
