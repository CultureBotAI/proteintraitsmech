identifier: EC:4.6.1.18
label: "pancreatic ribonuclease"
definition: >-
  Enzymatic activity — pancreatic ribonuclease (EC 4.6.1.18). Catalysed reaction: (1) an [RNA] containing cytidine + H2O = an [RNA]-3'-cytidine- 3'-phosphate + a 5'-hydroxy-ribonucleotide-3'-[RNA]. (2) an [RNA] containing uridine + H2O = an [RNA]-3'-uridine-3'-phosphate + a 5'-hydroxy-ribonucleotide-3'-[RNA].
