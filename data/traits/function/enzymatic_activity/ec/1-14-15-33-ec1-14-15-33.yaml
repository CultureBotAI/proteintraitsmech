      Catalyses: (1) narbomycin + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = pikromycin + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O. (2) narbomycin + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = neopikromycin + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O. (3) narbomycin + 4 reduced [2Fe-2S]-[ferredoxin] + 2 O2 + 4 H(+) = novapikromycin + 4 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O. (4) 10-deoxymethymycin + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = methymycin + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O. (5) 10-deoxymethymycin + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = neomethymycin + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O. (6) 10-deoxymethymycin + 4 reduced [2Fe-2S]-[ferredoxin] + 2 O2 + 4 H(+) = novamethymycin + 4 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O
