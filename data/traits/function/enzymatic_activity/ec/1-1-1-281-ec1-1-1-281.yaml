identifier: EC:1.1.1.281
label: "GDP-4-dehydro-6-deoxy-D-mannose reductase"
definition: >-
  Enzymatic activity — GDP-4-dehydro-6-deoxy-D-mannose reductase (EC 1.1.1.281). Catalysed reaction: (1) GDP-alpha-D-rhamnose + NAD(+) = GDP-4-dehydro-alpha-D-rhamnose + NADH + H(+). (2) GDP-alpha-D-rhamnose + NADP(+) = GDP-4-dehydro-alpha-D-rhamnose + NADPH + H(+).
