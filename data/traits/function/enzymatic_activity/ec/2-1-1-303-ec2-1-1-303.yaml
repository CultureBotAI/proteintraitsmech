  Enzymatic activity — 2,7-dihydroxy-5-methyl-1-naphthoate 7-O-methyltransferase (EC 2.1.1.303). Catalysed reaction: 2,7-dihydroxy-5-methyl-1-naphthoate + S-adenosyl-L-methionine = 2-hydroxy-7-methoxy-5-methyl-1-naphthoate + S-adenosyl-L-homocysteine + H(+).
