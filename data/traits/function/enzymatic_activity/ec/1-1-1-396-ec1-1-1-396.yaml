identifier: EC:1.1.1.396
label: "bacteriochlorophyllide-a dehydrogenase"
definition: >-
  Enzymatic activity — bacteriochlorophyllide-a dehydrogenase (EC 1.1.1.396). Catalysed reaction: (1) 3-deacetyl-3-(1-hydroxyethyl)bacteriochlorophyllide a + NAD(+) = bacteriochlorophyllide a + NADH + H(+). (2) 3-devinyl-3-(1-hydroxyethyl)chlorophyllide a + NAD(+) = 3-acetyl-3- devinylchlorophyllide a + NADH + H(+).
