identifier: EC:3.4.11.16
label: "Xaa-Trp aminopeptidase"
definition: >-
  Enzymatic activity — Xaa-Trp aminopeptidase (EC 3.4.11.16). Catalysed reaction: Release of a variety of N-terminal residues (especially glutamate and leucine) from peptides, provided tryptophan (or at least phenylalanine or tyrosine) is the penultimate residue. Also acts on Glu-|-Trp, Leu-|-Trp and a number of other dipeptides.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
