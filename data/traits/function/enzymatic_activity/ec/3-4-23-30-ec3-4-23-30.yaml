identifier: EC:3.4.23.30
label: pycnoporopepsin
definition: >-
  Enzymatic activity — pycnoporopepsin (EC 3.4.23.30). Catalysed reaction: Specificity similar to pepsin A, but narrower, cleaving only three bonds in the B chain of insulin: 14-Ala-|-Leu-15, 16-Tyr-|-Leu-17, and 24-Phe-|-Phe-25.
