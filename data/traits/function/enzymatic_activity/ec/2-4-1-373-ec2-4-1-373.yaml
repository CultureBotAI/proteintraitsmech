identifier: EC:2.4.1.373
label: "alpha-(1->2) branching sucrase"
definition: >-
  Enzymatic activity — alpha-(1->2) branching sucrase (EC 2.4.1.373). Catalysed reaction: sucrose + a (1->6)-alpha-D-glucan = D-fructose + a (1->6)-alpha-D-glucan containing a (1->2)-alpha-D-glucose branch.
