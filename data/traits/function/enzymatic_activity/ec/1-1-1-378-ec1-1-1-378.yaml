label: "L-rhamnose 1-dehydrogenase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — L-rhamnose 1-dehydrogenase [NAD(P)(+)] (EC 1.1.1.378). Catalysed reaction: (1) L-rhamnofuranose + NAD(+) = L-rhamnono-1,4-lactone + NADH + H(+). (2) L-rhamnofuranose + NADP(+) = L-rhamnono-1,4-lactone + NADPH + H(+).
