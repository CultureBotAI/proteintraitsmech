identifier: EC:1.17.1.1
label: "CDP-4-dehydro-6-deoxyglucose reductase"
definition: >-
  Enzymatic activity — CDP-4-dehydro-6-deoxyglucose reductase (EC 1.17.1.1). Catalysed reaction: (1) CDP-4-dehydro-3,6-dideoxy-alpha-D-glucose + NAD(+) + H2O = CDP-4- dehydro-6-deoxy-alpha-D-glucose + NADH + H(+). (2) CDP-4-dehydro-3,6-dideoxy-alpha-D-glucose + NADP(+) + H2O = CDP-4- dehydro-6-deoxy-alpha-D-glucose + NADPH + H(+).
