label: "alpha-N-acetylneuraminyl-2,3-beta-galactosyl-1,3-N-acetylgalactosaminide 6-alpha-sialyltransferase"
definition: >-
  Enzymatic activity — alpha-N-acetylneuraminyl-2,3-beta-galactosyl-1,3-N-acetylgalactosaminide 6-alpha-sialyltransferase (EC 2.4.3.7). Catalysed reaction: an alpha-Neu5Ac-(2->3)-beta-D-Gal-(1->3)-D-GlcNAc derivative + CMP-N- acetyl-beta-neuraminate = an alpha-Neu5Ac-(2->3)-beta-D-Gal-(1->3)- [alpha-Neu5Ac-(2->6)]-D-GlcNAc derivative + CMP + H(+).
