identifier: EC:1.14.14.31
label: "ipsdienol synthase"
definition: >-
  Enzymatic activity — ipsdienol synthase (EC 1.14.14.31). Catalysed reaction: beta-myrcene + reduced [NADPH--hemoprotein reductase] + O2 = (4R)- ipsdienol + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
