  Enzymatic activity — phenylpropanoylacetyl-CoA synthase (EC 2.3.1.218). Catalysed reaction: (1) (E)-feruloyl-CoA + malonyl-CoA + H(+) = (E)-feruloylacetyl-CoA + CO2 + CoA. (2) 4-coumaroyl-CoA + malonyl-CoA + H(+) = (4-coumaroyl)acetyl-CoA + CO2 + CoA.
