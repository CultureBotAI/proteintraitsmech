  Enzymatic activity — C-19 steroid 1alpha-hydroxylase (EC 1.14.15.19). Catalysed reaction: testosterone + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = 1alpha- hydroxytestosterone + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O.
