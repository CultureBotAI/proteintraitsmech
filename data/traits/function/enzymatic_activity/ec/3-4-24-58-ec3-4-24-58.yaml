identifier: EC:3.4.24.58
label: russellysin
definition: >-
  Enzymatic activity — russellysin (EC 3.4.24.58). Catalysed reaction: Specifically activates several components of the blood clotting system, including coagulation factor X, coagulation factor IX and protein C by cleavage of Arg-|-Xaa bonds. Has no action on insulin B chain.
