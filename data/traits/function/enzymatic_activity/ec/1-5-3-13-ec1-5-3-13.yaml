  Enzymatic activity — N(1)-acetylpolyamine oxidase (EC 1.5.3.13). Catalysed reaction: (1) N(1)-acetylspermidine + O2 + H2O = 3-acetamidopropanal + putrescine + H2O2. (2) N(1)-acetylspermine + O2 + H2O = 3-acetamidopropanal + spermidine + H2O2.
