identifier: EC:6.5.1.7
label: "DNA ligase (ATP, ADP or GTP)"
definition: >-
  Enzymatic activity — DNA ligase (ATP, ADP or GTP) (EC 6.5.1.7). Catalysed reaction: (1) ATP + (deoxyribonucleotide)n-3'-hydroxyl + 5'-phospho- (deoxyribonucleotide)m = (deoxyribonucleotide)n+m + AMP + diphosphate. (2) ADP + (deoxyribonucleotide)n-3'-hydroxyl + 5'-phospho- (deoxyribonucleotide)m = (deoxyribonucleotide)n+m + AMP + phosphate. (3) GTP + (deoxyribonucleotide)n-3'-hydroxyl + 5'-phospho- (deoxyribonucleotide)m = (deoxyribonucleotide)n+m + GMP + diphosphate.
