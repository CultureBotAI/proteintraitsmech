identifier: EC:5.6.1.4
label: "minus-end-directed kinesin ATPase"
definition: >-
  Enzymatic activity — minus-end-directed kinesin ATPase (EC 5.6.1.4). Catalysed reaction: ATP + H2O + a kinesin associated with a microtubule at position (n) = ADP + phosphate + a kinesin associated with a microtubule at position (n-1, toward the minus end).
