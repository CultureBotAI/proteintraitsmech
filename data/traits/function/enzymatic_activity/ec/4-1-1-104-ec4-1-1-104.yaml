identifier: EC:4.1.1.104
label: "3-dehydro-4-phosphotetronate decarboxylase"
definition: >-
  Enzymatic activity — 3-dehydro-4-phosphotetronate decarboxylase (EC 4.1.1.104). Catalysed reaction: (1) 3-dehydro-4-O-phospho-D-erythronate + H(+) = dihydroxyacetone phosphate + CO2. (2) 3-dehydro-4-O-phospho-L-erythronate + H(+) = dihydroxyacetone phosphate + CO2.
