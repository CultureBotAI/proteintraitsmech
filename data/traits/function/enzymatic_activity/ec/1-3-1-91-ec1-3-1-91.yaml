identifier: EC:1.3.1.91
label: "tRNA-dihydrouridine(20) synthase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — tRNA-dihydrouridine(20) synthase [NAD(P)(+)] (EC 1.3.1.91). Catalysed reaction: (1) 5,6-dihydrouridine(20) in tRNA + NADP(+) = uridine(20) in tRNA + NADPH + H(+). (2) 5,6-dihydrouridine(20) in tRNA + NAD(+) = uridine(20) in tRNA + NADH + H(+).
