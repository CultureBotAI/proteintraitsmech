identifier: EC:1.3.1.90
label: "tRNA-dihydrouridine(20a/20b) synthase [NAD(P)(+)]"
definition: >-
  Enzymatic activity — tRNA-dihydrouridine(20a/20b) synthase [NAD(P)(+)] (EC 1.3.1.90). Catalysed reaction: (1) 5,6-dihydrouridine(20a) in tRNA + NADP(+) = uridine(20a) in tRNA + NADPH + H(+). (2) 5,6-dihydrouridine(20a) in tRNA + NAD(+) = uridine(20a) in tRNA + NADH + H(+). (3) 5,6-dihydrouridine(20b) in tRNA + NAD(+) = uridine(20b) in tRNA + NADH + H(+). (4) 5,6-dihydrouridine(20b) in tRNA + NADP(+) = uridine(20b) in tRNA + NADPH + H(+).
