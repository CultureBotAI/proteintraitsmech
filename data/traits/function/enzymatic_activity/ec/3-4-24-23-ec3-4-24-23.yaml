identifier: EC:3.4.24.23
label: matrilysin
definition: >-
  Enzymatic activity — matrilysin (EC 3.4.24.23). Catalysed reaction: Cleavage of 14-Ala-|-Leu-15 and 16-Tyr-|-Leu-17 in B chain of insulin. No action on collagen types I, II, IV, V. Cleaves gelatin chain alpha2(I) > alpha1(I).
