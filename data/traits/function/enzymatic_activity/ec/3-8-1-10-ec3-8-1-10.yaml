identifier: EC:3.8.1.10
label: "2-haloacid dehalogenase (configuration-inverting)"
definition: >-
  Enzymatic activity — 2-haloacid dehalogenase (configuration-inverting) (EC 3.8.1.10). Catalysed reaction: (1) an (S)-2-haloacid + H2O = a (2R)-2-hydroxycarboxylate + a halide anion + H(+). (2) an (R)-2-haloacid + H2O = a (2S)-2-hydroxycarboxylate + a halide anion + H(+).
