identifier: EC:3.4.14.4
label: "dipeptidyl-peptidase III"
definition: >-
  Enzymatic activity — dipeptidyl-peptidase III (EC 3.4.14.4). Catalysed reaction: Release of an N-terminal dipeptide from a peptide comprising four or more residues, with broad specificity. Also acts on dipeptidyl 2-naphthylamides.
