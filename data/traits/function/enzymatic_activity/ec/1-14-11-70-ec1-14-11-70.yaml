identifier: EC:1.14.11.70
label: "7-deoxycylindrospermopsin hydroxylase"
definition: >-
  Enzymatic activity — 7-deoxycylindrospermopsin hydroxylase (EC 1.14.11.70). Catalysed reaction: (1) 7-deoxycylindrospermopsin + 2-oxoglutarate + O2 = cylindrospermopsin + succinate + CO2. (2) 7-deoxycylindrospermopsin + 2-oxoglutarate + O2 = 7-epi- cylindrospermopsin + succinate + CO2.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:1.14.11.-
mapped_xrefs:
  - object: RHEA:18757
    mapping_source: rhea2ec
  - object: RHEA:61612
    mapping_source: rhea2ec
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with 2-oxoglutarate as one donor, and incorporation of one atom each of oxygen into both donors.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) 7-deoxycylindrospermopsin + 2-oxoglutarate + O2 = cylindrospermopsin + succinate + CO2. (2) 7-deoxycylindrospermopsin + 2-oxoglutarate + O2 = 7-epi- cylindrospermopsin + succinate + CO2
    source: "ExPASy ENZYME"
    method: SOURCED
