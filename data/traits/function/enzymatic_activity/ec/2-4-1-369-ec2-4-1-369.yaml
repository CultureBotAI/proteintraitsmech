identifier: EC:2.4.1.369
label: "enterobactin C-glucosyltransferase"
definition: >-
  Enzymatic activity — enterobactin C-glucosyltransferase (EC 2.4.1.369). Catalysed reaction: (1) enterobactin + UDP-alpha-D-glucose = monoglucosyl-enterobactin + UDP. (2) monoglucosyl-enterobactin + UDP-alpha-D-glucose = diglucosyl- enterobactin + UDP + H(+). (3) diglucosyl-enterobactin + UDP-alpha-D-glucose = triglucosyl- enterobactin + UDP + H(+).
