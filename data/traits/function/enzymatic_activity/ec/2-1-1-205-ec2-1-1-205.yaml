  Enzymatic activity — tRNA (cytidine(32)/guanosine(34)-2'-O)-methyltransferase (EC 2.1.1.205). Catalysed reaction: cytidine(32)/guanosine(34) in tRNA + 2 S-adenosyl-L-methionine = 2'-O- methylcytidine(32)/2'-O-methylguanosine(34) in tRNA + 2 S-adenosyl-L- homocysteine + 2 H(+).
