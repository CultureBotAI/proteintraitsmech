identifier: EC:1.14.13.6
label: "orcinol 2-monooxygenase"
definition: >-
  Enzymatic activity — orcinol 2-monooxygenase (EC 1.14.13.6). Catalysed reaction: orcinol + NADH + O2 + H(+) = 2,3,5-trihydroxytoluene + NAD(+) + H2O.
definition_source: ExPASy ENZYME
