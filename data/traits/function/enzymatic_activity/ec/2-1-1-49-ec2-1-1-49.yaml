identifier: EC:2.1.1.49
label: "amine N-methyltransferase"
definition: >-
  Enzymatic activity — amine N-methyltransferase (EC 2.1.1.49). Catalysed reaction: (1) a primary amine + S-adenosyl-L-methionine = a methylated primary amine + S-adenosyl-L-homocysteine + H(+). (2) a secondary amine + S-adenosyl-L-methionine = a methylated secondary amine + S-adenosyl-L-homocysteine + H(+). (3) a tertiary amine + S-adenosyl-L-methionine = a methylated tertiary amine + S-adenosyl-L-homocysteine + H(+).
