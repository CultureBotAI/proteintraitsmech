identifier: EC:1.4.1.25
label: "L-arginine dehydrogenase"
definition: >-
  Enzymatic activity — L-arginine dehydrogenase (EC 1.4.1.25). Catalysed reaction: (1) L-arginine + NAD(+) + H2O = 5-guanidino-2-oxopentanoate + NH4(+) + NADH + H(+). (2) L-arginine + NADP(+) + H2O = 5-guanidino-2-oxopentanoate + NH4(+) + NADPH + H(+).
