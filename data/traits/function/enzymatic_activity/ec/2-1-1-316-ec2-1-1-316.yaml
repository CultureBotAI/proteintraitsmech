identifier: EC:2.1.1.316
label: "mitomycin 6-O-methyltransferase"
definition: >-
  Enzymatic activity — mitomycin 6-O-methyltransferase (EC 2.1.1.316). Catalysed reaction: (1) 6-demethylmitomycin A + S-adenosyl-L-methionine = mitomycin A + S-adenosyl-L-homocysteine. (2) 6-demethylmitomycin B + S-adenosyl-L-methionine = mitomycin B + S-adenosyl-L-homocysteine.
