identifier: EC:3.5.1.109
label: "sphingomyelin deacylase"
definition: >-
  Enzymatic activity — sphingomyelin deacylase (EC 3.5.1.109). Catalysed reaction: (1) a sphingomyelin + H2O = sphing-4-enine-phosphocholine + a carboxylate. (2) a beta-D-glucosyl-(1<->1')-N-acylsphing-4-enine + H2O = beta-D- glucosyl-(1<->1)-sphing-4-enine + a fatty acid.
