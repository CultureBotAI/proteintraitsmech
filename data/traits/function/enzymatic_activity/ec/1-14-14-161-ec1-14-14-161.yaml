label: "nepetalactol monooxygenase"
definition: >-
  Enzymatic activity — nepetalactol monooxygenase (EC 1.14.14.161). Catalysed reaction: (+)-cis-trans-nepetalactol + 3 reduced [NADPH--hemoprotein reductase] + 3 O2 = 7-deoxyloganetate + 3 oxidized [NADPH--hemoprotein reductase] + 4 H2O + 4 H(+).
