identifier: EC:1.16.1.10
label: "ferric-chelate reductase [NAD(P)H]"
definition: >-
  Enzymatic activity — ferric-chelate reductase [NAD(P)H] (EC 1.16.1.10). Catalysed reaction: (1) 2 a Fe(II)-siderophore + NAD(+) + H(+) = 2 a Fe(III)-siderophore + NADH. (2) 2 a Fe(II)-siderophore + NADP(+) + H(+) = 2 a Fe(III)-siderophore + NADPH.
