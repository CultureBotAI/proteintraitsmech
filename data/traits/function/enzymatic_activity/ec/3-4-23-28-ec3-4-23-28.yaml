identifier: EC:3.4.23.28
label: acrocylindropepsin
definition: >-
  Enzymatic activity — acrocylindropepsin (EC 3.4.23.28). Catalysed reaction: Preference for hydrophobic residue at P1 and P1'. Action on the B chain of insulin is generally similar to that of pepsin A, but it also cleaves 6-Leu-|-Cys(SO3H)-7, 21-Glu-|-Arg-22 and 3-Asn-|-Gln-4, although not 4-Gln-|-His-5.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:3.4.23.-
synonyms:
  - synonym_text: "Acrocylindrium proteinase"
    synonym_type: EXACT_SYNONYM
definitions:
  - kind: GENERAL
    text: >-
      A hydrolase; acting on peptide bonds (peptidases); aspartic endopeptidases.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
