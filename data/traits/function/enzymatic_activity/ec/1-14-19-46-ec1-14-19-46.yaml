identifier: EC:1.14.19.46
label: "sn-1 linoleoyl-lipid 6-desaturase"
definition: >-
  Enzymatic activity — sn-1 linoleoyl-lipid 6-desaturase (EC 1.14.19.46). Catalysed reaction: a 1-[(9Z,12Z)-octadecdienoyl]-2-acyl-glycerolipid + 2 reduced [2Fe-2S]- [ferredoxin] + O2 + 2 H(+) = a 1-[(6Z,9Z,12Z)-octadectrienoyl]-2-acyl- glycerolipid + 2 oxidized [2Fe-2S]-[ferredoxin] + 2 H2O.
