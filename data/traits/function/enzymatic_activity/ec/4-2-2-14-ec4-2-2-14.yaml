identifier: EC:4.2.2.14
label: "glucuronan lyase"
definition: >-
  Enzymatic activity — glucuronan lyase (EC 4.2.2.14). Catalysed reaction: Eliminative cleavage of (1->4)-beta-D-glucuronans to give oligosaccharides with 4-deoxy-beta-D-gluc-4-enuronosyl groups at their non-reducing ends. Complete degradation of glucuronans results in the formation of tetrasaccharides.
