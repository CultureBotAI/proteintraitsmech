identifier: EC:2.4.1.38
label: "beta-N-acetylglucosaminylglycopeptide beta-1,4-galactosyltransferase"
definition: >-
  Enzymatic activity — beta-N-acetylglucosaminylglycopeptide beta-1,4-galactosyltransferase (EC 2.4.1.38). Catalysed reaction: an N-acetyl-beta-D-glucosaminyl derivative + UDP-alpha-D-galactose = a beta-D-galactosyl-(1->4)-N-acetyl-beta-D-glucosaminyl derivative + UDP + H(+).
