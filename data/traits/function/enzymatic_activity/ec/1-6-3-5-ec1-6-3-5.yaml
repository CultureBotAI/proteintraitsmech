identifier: EC:1.6.3.5
label: renalase
definition: >-
  Enzymatic activity — renalase (EC 1.6.3.5). Catalysed reaction: (1) 1,2-dihydro-beta-NAD + O2 + H(+) = H2O2 + NAD(+). (2) 1,2-dihydro-beta-NADP + O2 + H(+) = H2O2 + NADP(+). (3) 1,6-dihydro-beta-NAD + O2 + H(+) = H2O2 + NAD(+). (4) 1,6-dihydro-beta-NADP + O2 + H(+) = H2O2 + NADP(+).
