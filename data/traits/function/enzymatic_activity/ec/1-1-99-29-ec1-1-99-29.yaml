identifier: EC:1.1.99.29
label: "pyranose dehydrogenase (acceptor)"
definition: >-
  Enzymatic activity — pyranose dehydrogenase (acceptor) (EC 1.1.99.29). Catalysed reaction: (1) pyranose + acceptor = pyranos-2-ulose + reduced acceptor. (2) pyranose + acceptor = pyranos-3-ulose + reduced acceptor. (3) pyranose + acceptor = pyranos-2,3-diulose + reduced acceptor. (4) a pyranoside + acceptor = a pyranosid-3-ulose + reduced acceptor. (5) a pyranoside + acceptor = a pyranosid-3,4-diulose + reduced acceptor.
