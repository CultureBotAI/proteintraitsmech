identifier: EC:1.14.14.94
label: "leukotriene-B4 20-monooxygenase"
definition: >-
  Enzymatic activity — leukotriene-B4 20-monooxygenase (EC 1.14.14.94). Catalysed reaction: leukotriene B4 + reduced [NADPH--hemoprotein reductase] + O2 = 20-hydroxy-leukotriene B4 + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
