identifier: EC:3.4.24.7
label: "interstitial collagenase"
definition: >-
  Enzymatic activity — interstitial collagenase (EC 3.4.24.7). Catalysed reaction: Cleavage of the triple helix of collagen at about three-quarters of the length of the molecule from the N-terminus, at 775-Gly-|-Ile-776 in the alpha1(I) chain. Cleaves synthetic substrates and alpha-macroglobulins at bonds where P1' is a hydrophobic residue.
