identifier: EC:1.1.1.40
label: "malate dehydrogenase (oxaloacetate-decarboxylating) (NADP(+))"
definition: >-
  Enzymatic activity — malate dehydrogenase (oxaloacetate-decarboxylating) (NADP(+)) (EC 1.1.1.40). Catalysed reaction: (1) (S)-malate + NADP(+) = pyruvate + CO2 + NADPH. (2) oxaloacetate + H(+) = pyruvate + CO2.
