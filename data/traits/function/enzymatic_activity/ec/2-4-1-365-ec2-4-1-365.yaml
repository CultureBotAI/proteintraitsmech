label: "protopanaxadiol-type ginsenoside-3-O-glucoside 2''-O-glucosyltransferase"
definition: >-
  Enzymatic activity — protopanaxadiol-type ginsenoside-3-O-glucoside 2''-O-glucosyltransferase (EC 2.4.1.365). Catalysed reaction: (1) (20S)-ginsenoside Rh2 + UDP-alpha-D-glucose = (20S)-ginsenoside Rg3 + UDP + H(+). (2) (20S)-ginsenoside F2 + UDP-alpha-D-glucose = (20S)-ginsenoside Rd + UDP + H(+).
