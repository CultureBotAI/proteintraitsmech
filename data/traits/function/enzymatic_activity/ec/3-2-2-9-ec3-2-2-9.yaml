identifier: EC:3.2.2.9
label: "adenosylhomocysteine nucleosidase"
definition: >-
  Enzymatic activity — adenosylhomocysteine nucleosidase (EC 3.2.2.9). Catalysed reaction: (1) S-adenosyl-L-homocysteine + H2O = S-(5-deoxy-D-ribos-5-yl)-L- homocysteine + adenine. (2) 5'-deoxyadenosine + H2O = 5-deoxy-D-ribose + adenine. (3) S-methyl-5'-thioadenosine + H2O = 5-(methylsulfanyl)-D-ribose + adenine.
