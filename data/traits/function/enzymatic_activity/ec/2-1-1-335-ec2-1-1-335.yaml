identifier: EC:2.1.1.335
label: "4-amino-anhydrotetracycline N(4)-methyltransferase"
definition: >-
  Enzymatic activity — 4-amino-anhydrotetracycline N(4)-methyltransferase (EC 2.1.1.335). Catalysed reaction: (1) 4-amino-4-dedimethylamino-anhydrotetracycline + S-adenosyl-L- methionine = 4-methylamino-4-dedimethylamino-anhydrotetracycline + S-adenosyl-L-homocysteine + H(+). (2) 4-methylamino-4-dedimethylamino-anhydrotetracycline + S-adenosyl-L- methionine = anhydrotetracycline + S-adenosyl-L-homocysteine + H(+).
