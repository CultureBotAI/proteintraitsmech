identifier: EC:3.5.1.46
label: "6-aminohexanoate-oligomer exohydrolase"
definition: >-
  Enzymatic activity — 6-aminohexanoate-oligomer exohydrolase (EC 3.5.1.46). Catalysed reaction: (1) [N-(6-aminohexanoyl)](n) + H2O = [N-(6-aminohexanoyl)](n-1) + 6-aminohexanoate. (2) N-(6-aminohexanoyl)-6-aminohexanoate + H2O = 2 6-aminohexanoate.
