identifier: EC:3.1.3.62
label: "multiple inositol-polyphosphate phosphatase"
definition: >-
  Enzymatic activity — multiple inositol-polyphosphate phosphatase (EC 3.1.3.62). Catalysed reaction: (1) 1D-myo-inositol hexakisphosphate + H2O = 1D-myo-inositol 1,2,4,5,6- pentakisphosphate + phosphate. (2) 1D-myo-inositol 1,2,4,5,6-pentakisphosphate + H2O = 1D-myo-inositol 1,2,5,6-tetrakisphosphate + phosphate. (3) 1D-myo-inositol 1,2,5,6-tetrakisphosphate + H2O = 1D-myo-inositol 1,2,6-trisphosphate + phosphate. (4) 1D-myo-inositol 1,2,6-trisphosphate + H2O = 1D-myo-inositol 1,2- bisphosphate + phosphate. (5) 1D-myo-inositol 1,2-bisphosphate + H2O = 1D-myo-inositol 2-phosphate + phosphate.
