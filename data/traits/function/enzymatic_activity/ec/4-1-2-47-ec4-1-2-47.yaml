identifier: EC:4.1.2.47
label: "(S)-hydroxynitrile lyase"
definition: >-
  Enzymatic activity — (S)-hydroxynitrile lyase (EC 4.1.2.47). Catalysed reaction: (1) a monosubstituted aliphatic (S)-hydroxynitrile = an aldehyde + hydrogen cyanide. (2) a disubstituted aliphatic (S)-hydroxynitrile = a ketone + hydrogen cyanide. (3) an aromatic (S)-hydroxynitrile = an aromatic aldehyde + hydrogen cyanide.
