  Enzymatic activity — ent-kaurene monooxygenase (EC 1.14.14.86). Catalysed reaction: ent-kaur-16-ene + 3 reduced [NADPH--hemoprotein reductase] + 3 O2 = ent- kaur-16-en-19-oate + 3 oxidized [NADPH--hemoprotein reductase] + 4 H2O + 4 H(+).
