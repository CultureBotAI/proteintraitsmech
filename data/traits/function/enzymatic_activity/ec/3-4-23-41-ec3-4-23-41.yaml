identifier: EC:3.4.23.41
label: "yapsin 1"
definition: >-
  Enzymatic activity — yapsin 1 (EC 3.4.23.41). Catalysed reaction: Hydrolyzes various precursor proteins with Arg or Lys in P1, and commonly Arg or Lys also in P2. The P3 amino acid is usually non-polar, but otherwise additional basic amino acids are favorable in both non- prime and prime positions.
