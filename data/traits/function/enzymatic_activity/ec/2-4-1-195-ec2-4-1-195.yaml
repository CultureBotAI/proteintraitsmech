identifier: EC:2.4.1.195
label: "N-hydroxythioamide S-beta-glucosyltransferase"
definition: >-
  Enzymatic activity — N-hydroxythioamide S-beta-glucosyltransferase (EC 2.4.1.195). Catalysed reaction: (1) (Z)-2-phenyl-1-thioacetohydroximate + UDP-alpha-D-glucose = (Z)- desulfoglucotropeolin + UDP. (2) a (Z)-omega-(methylsulfanyl)alkyl-thiohydroximate + UDP-alpha-D- glucose = an aliphatic (Z)-desulfo-glucosinolate + UDP. (3) (Z)-2-(indol-3-yl)-1-thioacetohydroximate + UDP-alpha-D-glucose = (Z)-indolylmethyl desulfoglucosinolate + UDP.
