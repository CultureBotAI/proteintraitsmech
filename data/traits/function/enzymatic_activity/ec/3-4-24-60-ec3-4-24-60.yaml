identifier: EC:3.4.24.60
label: dactylysin
definition: >-
  Enzymatic activity — dactylysin (EC 3.4.24.60). Catalysed reaction: Hydrolysis of peptides of at least six residues, with bulky hydrophobic residues in the P1' position. Shows a preference for hydrophobic doublets such as -Phe-|-Phe- and -Phe-|-Leu- in somatostatin-(1-14)-peptide and dynorphin A-(1-6)-peptide, respectively.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:3.4.24.-
synonyms:
  - synonym_text: "peptide hormone inactivating endopeptidase"
    synonym_type: EXACT_SYNONYM
definitions:
  - kind: GENERAL
    text: >-
      A hydrolase; acting on peptide bonds (peptidases); metalloendopeptidases.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Hydrolysis of peptides of at least six residues, with bulky hydrophobic residues in the P1' position. Shows a preference for hydrophobic doublets such as -Phe-|-Phe- and -Phe-|-Leu- in somatostatin-(1-14)-peptide and dynorphin A-(1-6)-peptide, respectively
    source: "ExPASy ENZYME"
