identifier: EC:2.4.1.330
label: "beta-D-glucosyl crocetin beta-1,6-glucosyltransferase"
definition: >-
  Enzymatic activity — beta-D-glucosyl crocetin beta-1,6-glucosyltransferase (EC 2.4.1.330). Catalysed reaction: (1) beta-D-glucosyl crocetin + UDP-alpha-D-glucose = beta-D-gentiobiosyl crocetin + UDP + H(+). (2) bis(beta-D-glucosyl) crocetin + UDP-alpha-D-glucose = beta-D- gentiobiosyl beta-D-glucosyl crocetin + UDP + H(+). (3) beta-D-gentiobiosyl beta-D-glucosyl crocetin + UDP-alpha-D-glucose = bis(beta-D-gentiobiosyl) crocetin + UDP + H(+).
