identifier: EC:2.4.1.271
label: "crocetin glucosyltransferase"
definition: >-
  Enzymatic activity — crocetin glucosyltransferase (EC 2.4.1.271). Catalysed reaction: (1) crocetin + UDP-alpha-D-glucose = beta-D-glucosyl crocetin + UDP. (2) beta-D-glucosyl crocetin + UDP-alpha-D-glucose = bis(beta-D-glucosyl) crocetin + UDP. (3) beta-D-gentiobiosyl crocetin + UDP-alpha-D-glucose = beta-D- gentiobiosyl beta-D-glucosyl crocetin + UDP.
