identifier: EC:1.3.1.47
label: "alpha-santonin 1,2-reductase"
definition: >-
  Enzymatic activity — alpha-santonin 1,2-reductase (EC 1.3.1.47). Catalysed reaction: (1) 1,2-dihydro-alpha-santonin + NAD(+) = alpha-santonin + NADH + H(+). (2) 1,2-dihydro-alpha-santonin + NADP(+) = alpha-santonin + NADPH + H(+).
