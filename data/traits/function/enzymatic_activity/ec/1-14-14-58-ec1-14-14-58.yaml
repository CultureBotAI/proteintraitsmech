label: "trimethyltridecatetraene synthase"
definition: >-
  Enzymatic activity — trimethyltridecatetraene synthase (EC 1.14.14.58). Catalysed reaction: (6E,10E)-geranyllinalool + reduced [NADPH--hemoprotein reductase] + O2 = (3E,7E)-4,8,12-trimethyltrideca 1,3,7,11-tetraene + but-3-en-2-one + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H(+).
