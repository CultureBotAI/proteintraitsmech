identifier: EC:1.18.1.4
label: "rubredoxin--NAD(P)(+) reductase"
definition: >-
  Enzymatic activity — rubredoxin--NAD(P)(+) reductase (EC 1.18.1.4). Catalysed reaction: (1) 2 reduced [rubredoxin] + NADP(+) + H(+) = 2 oxidized [rubredoxin] + NADPH. (2) 2 reduced [rubredoxin] + NAD(+) + H(+) = 2 oxidized [rubredoxin] + NADH.
