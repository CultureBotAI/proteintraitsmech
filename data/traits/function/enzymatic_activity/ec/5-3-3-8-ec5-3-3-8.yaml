identifier: EC:5.3.3.8
label: "Delta(3)-Delta(2)-enoyl-CoA isomerase"
definition: >-
  Enzymatic activity — Delta(3)-Delta(2)-enoyl-CoA isomerase (EC 5.3.3.8). Catalysed reaction: (1) a (3Z)-enoyl-CoA = a 4-saturated (2E)-enoyl-CoA. (2) a (3E)-enoyl-CoA = a 4-saturated (2E)-enoyl-CoA.
