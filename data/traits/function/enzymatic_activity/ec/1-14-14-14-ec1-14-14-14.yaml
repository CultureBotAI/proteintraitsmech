definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) testosterone + 3 reduced [NADPH--hemoprotein reductase] + 3 O2 = 17beta-estradiol + formate + 3 oxidized [NADPH--hemoprotein reductase] + 4 H2O + 4 H(+). (2) androst-4-ene-3,17-dione + 3 reduced [NADPH--hemoprotein reductase] + 3 O2 = estrone + formate + 3 oxidized [NADPH--hemoprotein reductase] + 4 H2O + 4 H(+)
