identifier: EC:1.14.14.80
label: "long-chain fatty acid omega-monooxygenase"
definition: >-
  Enzymatic activity — long-chain fatty acid omega-monooxygenase (EC 1.14.14.80). Catalysed reaction: an omega-methyl-long-chain fatty acid + reduced [NADPH--hemoprotein reductase] + O2 = an omega-hydroxy-long-chain fatty acid + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
