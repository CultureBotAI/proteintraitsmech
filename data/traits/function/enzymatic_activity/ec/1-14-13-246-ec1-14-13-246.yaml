identifier: EC:1.14.13.246
label: "4beta-methylsterol monooxygenase"
definition: >-
  Enzymatic activity — 4beta-methylsterol monooxygenase (EC 1.14.13.246). Catalysed reaction: a 3beta-hydroxy-4,4-dimethylsteroid + 3 NADH + 3 O2 + 2 H(+) = a 3beta- hydroxy-4alpha-methylsteroid-4beta-carboxylate + 3 NAD(+) + 4 H2O.
