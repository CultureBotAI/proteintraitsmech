identifier: EC:1.2.1.97
label: "3-sulfolactaldehyde dehydrogenase"
definition: >-
  Enzymatic activity — 3-sulfolactaldehyde dehydrogenase (EC 1.2.1.97). Catalysed reaction: (1) (2S)-3-sulfolactaldehyde + NADP(+) + H2O = (2S)-3-sulfolactate + NADPH + 2 H(+). (2) (2S)-3-sulfolactaldehyde + NAD(+) + H2O = (2S)-3-sulfolactate + NADH + 2 H(+).
