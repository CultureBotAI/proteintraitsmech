label: "6-oxocineole dehydrogenase"
definition: >-
  Enzymatic activity — 6-oxocineole dehydrogenase (EC 1.14.13.51). Catalysed reaction: 6-oxocineole + NADPH + O2 + H(+) = 1,6,6-trimethyl-2,7- dioxabicyclo[3.2.2]nonan-3-one + NADP(+) + H2O.
