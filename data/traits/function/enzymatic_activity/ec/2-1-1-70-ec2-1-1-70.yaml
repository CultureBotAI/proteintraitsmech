identifier: EC:2.1.1.70
label: "8-hydroxyfuranocoumarin 8-O-methyltransferase"
definition: >-
  Enzymatic activity — 8-hydroxyfuranocoumarin 8-O-methyltransferase (EC 2.1.1.70). Catalysed reaction: (1) an 8-hydroxyfurocoumarin + S-adenosyl-L-methionine = an 8-methoxyfurocoumarin + S-adenosyl-L-homocysteine + H(+). (2) xanthotoxol + S-adenosyl-L-methionine = xanthotoxin + S-adenosyl-L- homocysteine + H(+).
