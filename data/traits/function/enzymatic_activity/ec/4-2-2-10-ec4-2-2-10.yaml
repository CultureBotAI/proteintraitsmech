identifier: EC:4.2.2.10
label: "pectin lyase"
definition: >-
  Enzymatic activity — pectin lyase (EC 4.2.2.10). Catalysed reaction: Eliminative cleavage of (1->4)-alpha-D-galacturonan methyl ester to give oligosaccharides with 4-deoxy-6-O-methyl-alpha-D-galact-4-enuronosyl groups at their non-reducing ends.
