identifier: EC:7.4.2.11
label: "ABC-type methionine transporter"
definition: >-
  Enzymatic activity — ABC-type methionine transporter (EC 7.4.2.11). Catalysed reaction: (1) L-methionine(out) + ATP + H2O = L-methionine(in) + ADP + phosphate + H(+). (2) D-methionine(out) + ATP + H2O = D-methionine(in) + ADP + phosphate + H(+).
