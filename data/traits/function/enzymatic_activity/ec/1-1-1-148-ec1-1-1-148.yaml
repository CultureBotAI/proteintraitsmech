identifier: EC:1.1.1.148
label: "estradiol 17alpha-dehydrogenase"
definition: >-
  Enzymatic activity — estradiol 17alpha-dehydrogenase (EC 1.1.1.148). Catalysed reaction: (1) 17alpha-estradiol + NAD(+) = estrone + NADH + H(+). (2) 17alpha-estradiol + NADP(+) = estrone + NADPH + H(+).
