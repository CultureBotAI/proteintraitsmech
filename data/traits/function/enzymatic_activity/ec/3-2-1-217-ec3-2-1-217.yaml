identifier: EC:3.2.1.217
label: "exo-acting protein-alpha-N-acetylgalactosaminidase"
definition: >-
  Enzymatic activity — exo-acting protein-alpha-N-acetylgalactosaminidase (EC 3.2.1.217). Catalysed reaction: (1) a 3-O-[N-acetyl-alpha-D-galactosaminyl]-L-seryl-[protein] + H2O = N-acetyl-D-galactosamine + L-seryl-[protein]. (2) a 3-O-[N-acetyl-alpha-D-galactosaminyl]-L-threonyl-[protein] + H2O = N-acetyl-D-galactosamine + L-threonyl-[protein].
