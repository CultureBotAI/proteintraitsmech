identifier: EC:1.14.14.69
label: "ent-cassadiene hydroxylase"
definition: >-
  Enzymatic activity — ent-cassadiene hydroxylase (EC 1.14.14.69). Catalysed reaction: ent-cassa-12,15-diene + 3 reduced [NADPH--hemoprotein reductase] + 3 O2 = ent-3beta-hydroxycassa-12,15-dien-2-one + 3 oxidized [NADPH--hemoprotein reductase] + 4 H2O + 3 H(+).
