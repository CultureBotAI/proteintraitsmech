identifier: EC:1.17.7.4
label: "4-hydroxy-3-methylbut-2-enyl diphosphate reductase"
definition: >-
  Enzymatic activity — 4-hydroxy-3-methylbut-2-enyl diphosphate reductase (EC 1.17.7.4). Catalysed reaction: (1) isopentenyl diphosphate + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O = (2E)-4-hydroxy-3-methylbut-2-enyl diphosphate + 2 reduced [2Fe-2S]- [ferredoxin] + 2 H(+). (2) dimethylallyl diphosphate + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O = (2E)-4-hydroxy-3-methylbut-2-enyl diphosphate + 2 reduced [2Fe-2S]- [ferredoxin] + 2 H(+).
