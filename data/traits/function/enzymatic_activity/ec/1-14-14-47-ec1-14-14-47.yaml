identifier: EC:1.14.14.47
label: "nitric-oxide synthase (flavodoxin)"
definition: >-
  Enzymatic activity — nitric-oxide synthase (flavodoxin) (EC 1.14.14.47). Catalysed reaction: 3 reduced [flavodoxin] + 2 L-arginine + 4 O2 = 3 oxidized [flavodoxin] + 2 L-citrulline + 2 nitric oxide + 4 H2O + 5 H(+).
