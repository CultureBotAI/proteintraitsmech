identifier: EC:1.14.20.14
label: "hapalindole-type alkaloid chlorinase"
definition: >-
  Enzymatic activity — hapalindole-type alkaloid chlorinase (EC 1.14.20.14). Catalysed reaction: (1) hapalindole U + chloride + 2-oxoglutarate + O2 + H(+) = hapalindole G + succinate + CO2 + H2O. (2) 12-epi-fischerindole U + chloride + 2-oxoglutarate + O2 + H(+) = 12-epi-fischerindole G + succinate + CO2 + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:1.14.20.-
mapped_xrefs:
