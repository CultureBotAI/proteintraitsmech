    mapping_source: rhea2ec
  - object: RHEA:57356
    mapping_source: rhea2ec
definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with 2-oxoglutarate as one donor, and the other dehydrogenated.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) hapalindole U + chloride + 2-oxoglutarate + O2 + H(+) = hapalindole G + succinate + CO2 + H2O. (2) 12-epi-fischerindole U + chloride + 2-oxoglutarate + O2 + H(+) = 12-epi-fischerindole G + succinate + CO2 + H2O
    source: "ExPASy ENZYME"
    method: SOURCED
