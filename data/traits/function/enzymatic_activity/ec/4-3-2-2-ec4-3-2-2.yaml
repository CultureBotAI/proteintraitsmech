  Enzymatic activity — adenylosuccinate lyase (EC 4.3.2.2). Catalysed reaction: (1) N(6)-(1,2-dicarboxyethyl)-AMP = fumarate + AMP. (2) (2S)-2-[5-amino-1-(5-phospho-beta-D-ribosyl)imidazole-4- carboxamido]succinate = 5-amino-1-(5-phospho-beta-D-ribosyl)imidazole-4- carboxamide + fumarate.
