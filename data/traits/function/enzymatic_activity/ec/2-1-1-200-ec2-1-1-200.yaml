identifier: EC:2.1.1.200
label: "tRNA (cytidine(32)/uridine(32)-2'-O)-methyltransferase"
definition: >-
  Enzymatic activity — tRNA (cytidine(32)/uridine(32)-2'-O)-methyltransferase (EC 2.1.1.200). Catalysed reaction: (1) cytidine(32) in tRNA + S-adenosyl-L-methionine = 2'-O- methylcytidine(32) in tRNA + S-adenosyl-L-homocysteine + H(+). (2) uridine(32) in tRNA + S-adenosyl-L-methionine = 2'-O- methyluridine(32) in tRNA + S-adenosyl-L-homocysteine + H(+).
