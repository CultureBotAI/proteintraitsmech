identifier: EC:1.3.1.107
label: "sanguinarine reductase"
definition: >-
  Enzymatic activity — sanguinarine reductase (EC 1.3.1.107). Catalysed reaction: (1) dihydrosanguinarine + NADP(+) = sanguinarine + NADPH. (2) dihydrosanguinarine + NAD(+) = sanguinarine + NADH. (3) dihydrochelirubine + NAD(+) = chelirubine + NADH. (4) dihydrochelirubine + NADP(+) = chelirubine + NADPH.
