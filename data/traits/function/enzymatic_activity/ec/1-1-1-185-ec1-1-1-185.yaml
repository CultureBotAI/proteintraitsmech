identifier: EC:1.1.1.185
label: "L-glycol dehydrogenase"
definition: >-
  Enzymatic activity — L-glycol dehydrogenase (EC 1.1.1.185). Catalysed reaction: (1) an L-glycol + NADP(+) = a 2-hydroxycarbonyl + NADPH + H(+). (2) an L-glycol + NAD(+) = a 2-hydroxycarbonyl + NADH + H(+).
