identifier: EC:1.14.19.31
label: "acyl-lipid (7-3)-desaturase"
definition: >-
  Enzymatic activity — acyl-lipid (7-3)-desaturase (EC 1.14.19.31). Catalysed reaction: (1) a (7Z,10Z,13Z,16Z,19Z)-docosapentaenoyl-containing glycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (4Z,7Z,10Z,13Z,16Z,19Z)- docosahexaenoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. (2) a (7Z,10Z,13Z,16Z)-docosatetraenoyl-containing glycerolipid + 2 Fe(II)-[cytochrome b5] + O2 + 2 H(+) = a (4Z,7Z,10Z,13Z,16Z)- docosapentaenoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O.
