identifier: EC:1.14.11.3
label: "pyrimidine-deoxynucleoside 2'-dioxygenase"
definition: >-
  Enzymatic activity — pyrimidine-deoxynucleoside 2'-dioxygenase (EC 1.14.11.3). Catalysed reaction: 2'-deoxyuridine + 2-oxoglutarate + O2 = uridine + succinate + CO2.
