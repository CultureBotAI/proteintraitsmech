  Enzymatic activity — indoleamine 2,3-dioxygenase (EC 1.13.11.52). Catalysed reaction: (1) D-tryptophan + O2 = N-formyl-D-kynurenine. (2) L-tryptophan + O2 = N-formyl-L-kynurenine.
