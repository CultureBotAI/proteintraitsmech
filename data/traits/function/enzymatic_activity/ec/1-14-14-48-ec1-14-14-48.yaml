identifier: EC:1.14.14.48
label: "jasmonoyl-L-amino acid 12-hydroxylase"
definition: >-
  Enzymatic activity — jasmonoyl-L-amino acid 12-hydroxylase (EC 1.14.14.48). Catalysed reaction: a jasmonyl-L-amino acid + reduced [NADPH--hemoprotein reductase] + O2 = a 12-hydroxyjasmonyl-L-alpha-amino acid + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
