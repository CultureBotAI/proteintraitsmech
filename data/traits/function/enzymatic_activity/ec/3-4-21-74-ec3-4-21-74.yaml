identifier: EC:3.4.21.74
label: "venombin A"
definition: >-
  Enzymatic activity — venombin A (EC 3.4.21.74). Catalysed reaction: Selective cleavage of Arg-|-Xaa bond in fibrinogen, to form fibrin, and release fibrinopeptide A. The specificity of further degradation of fibrinogen varies with species origin of the enzyme.
