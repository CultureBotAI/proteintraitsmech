identifier: EC:3.4.21.100
label: sedolisin
definition: >-
  Enzymatic activity — sedolisin (EC 3.4.21.100). Catalysed reaction: Hydrolysis of the B chain of insulin at 13-Glu-|-Ala-14, 15-Leu-|-Tyr-16 and 25-Phe-|-Tyr-26 and angiotensin I at 4-Tyr-|-Ile-5. A good synthetic substrate is Lys-Pro-Ile-Glu-Phe-|-Phe(NO2)-Arg-Leu.
