identifier: EC:1.14.15.26
label: "toluene methyl-monooxygenase"
definition: >-
  Enzymatic activity — toluene methyl-monooxygenase (EC 1.14.15.26). Catalysed reaction: (1) toluene + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = benzyl alcohol + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O. (2) p-xylene + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = 4-methylbenzyl alcohol + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O. (3) m-xylene + 2 reduced [2Fe-2S]-[ferredoxin] + O2 + 2 H(+) = 3-methylbenzyl alcohol + 2 oxidized [2Fe-2S]-[ferredoxin] + H2O.
