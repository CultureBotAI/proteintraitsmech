identifier: EC:3.4.24.44
label: "atrolysin E"
definition: >-
  Enzymatic activity — atrolysin E (EC 3.4.24.44). Catalysed reaction: Cleavage of 3-Asn-|-Gln-4, 9-Ser-|-His-10 and 14-Ala-|-Leu-15 bonds in insulin B chain and 14-Tyr-|-Gln-15 and 8-Thr-|-Ser-9 in A chain. Cleaves type IV collagen at 73-Ala-|-Gln-74 in alpha1-(IV) and at 7-Gly-|-Leu-8 in alpha2-(IV).
