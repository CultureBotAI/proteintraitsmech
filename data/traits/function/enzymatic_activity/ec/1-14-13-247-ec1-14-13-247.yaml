identifier: EC:1.14.13.247
label: "stachydrine N-demethylase"
definition: >-
  Enzymatic activity — stachydrine N-demethylase (EC 1.14.13.247). Catalysed reaction: (1) L-proline betaine + NADPH + O2 + H(+) = N-methyl-L-proline + formaldehyde + NADP(+) + H2O. (2) L-proline betaine + NADH + O2 + H(+) = N-methyl-L-proline + formaldehyde + NAD(+) + H2O.
