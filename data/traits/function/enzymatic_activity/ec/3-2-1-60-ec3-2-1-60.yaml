identifier: EC:3.2.1.60
label: "glucan 1,4-alpha-maltotetraohydrolase"
definition: >-
  Enzymatic activity — glucan 1,4-alpha-maltotetraohydrolase (EC 3.2.1.60). Catalysed reaction: Hydrolysis of (1->4)-alpha-D-glucosidic linkages in amylaceous polysaccharides, to remove successive maltotetraose residues from the non-reducing chain ends.
