identifier: EC:1.14.14.190
label: "beta-colubrine 11-hydroxylase"
definition: >-
  Enzymatic activity — beta-colubrine 11-hydroxylase (EC 1.14.14.190). Catalysed reaction: beta-colubrine + reduced [NADPH--hemoprotein reductase] + O2 = 11-demethylbrucine + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
