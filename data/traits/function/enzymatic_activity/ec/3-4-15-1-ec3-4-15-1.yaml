identifier: EC:3.4.15.1
label: "peptidyl-dipeptidase A"
definition: >-
  Enzymatic activity — peptidyl-dipeptidase A (EC 3.4.15.1). Catalysed reaction: Release of a C-terminal dipeptide, oligopeptide-|-Xaa-Yaa, when Xaa is not Pro, and Yaa is neither Asp nor Glu. Thus, conversion of angiotensin I to angiotensin II, with increase in vasoconstrictor activity, but no action on angiotensin II.
