identifier: EC:1.14.18.12
label: "2-hydroxy fatty acid dioxygenase"
definition: >-
  Enzymatic activity — 2-hydroxy fatty acid dioxygenase (EC 1.14.18.12). Catalysed reaction: a (2R)-2-hydroxy Cn-fatty acid + O2 = a Cn-1-fatty acid + H2O + CO2.
