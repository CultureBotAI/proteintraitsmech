identifier: EC:2.3.2.29
label: "aspartate/glutamate leucyltransferase"
definition: >-
  Enzymatic activity — aspartate/glutamate leucyltransferase (EC 2.3.2.29). Catalysed reaction: (1) N-terminal L-glutamyl-[protein] + L-leucyl-tRNA(Leu) = N-terminal L-leucyl-L-glutamyl-[protein] + tRNA(Leu) + H(+). (2) N-terminal L-aspartyl-[protein] + L-leucyl-tRNA(Leu) = N-terminal L-leucyl-L-aspartyl-[protein] + tRNA(Leu) + H(+).
