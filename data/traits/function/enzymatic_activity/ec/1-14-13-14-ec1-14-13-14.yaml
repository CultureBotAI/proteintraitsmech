identifier: EC:1.14.13.14
label: "trans-cinnamate 2-monooxygenase"
definition: >-
  Enzymatic activity — trans-cinnamate 2-monooxygenase (EC 1.14.13.14). Catalysed reaction: (E)-cinnamate + NADPH + O2 + H(+) = trans-2-coumarate + NADP(+) + H2O.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
