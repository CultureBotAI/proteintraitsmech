identifier: EC:4.2.2.29
label: "peptidoglycan lytic transglycosylase"
definition: >-
  Enzymatic activity — peptidoglycan lytic transglycosylase (EC 4.2.2.29). Catalysed reaction: a peptidoglycan chain = a peptidoglycan chain with N-acetyl-1,6- anhydromuramyl-[peptide] at the reducing end + a peptidoglycan chain with N-acetylglucosamine at the non-reducing end.
