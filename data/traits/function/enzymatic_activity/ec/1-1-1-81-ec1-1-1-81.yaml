identifier: EC:1.1.1.81
label: "hydroxypyruvate reductase"
definition: >-
  Enzymatic activity — hydroxypyruvate reductase (EC 1.1.1.81). Catalysed reaction: (1) (R)-glycerate + NAD(+) = 3-hydroxypyruvate + NADH + H(+). (2) (R)-glycerate + NADP(+) = 3-hydroxypyruvate + NADPH + H(+).
