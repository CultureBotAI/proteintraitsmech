identifier: EC:1.14.14.159
label: "dolabradiene monooxygenase"
definition: >-
  Enzymatic activity — dolabradiene monooxygenase (EC 1.14.14.159). Catalysed reaction: (1) dolabradiene + reduced [NADPH--hemoprotein reductase] + O2 = 15,16- epoxydolabrene + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) 15,16-epoxydolabrene + reduced [NADPH--hemoprotein reductase] + O2 = 3beta-hydroxy-15,16-epoxydolabrene + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
definition_source: ExPASy ENZYME
