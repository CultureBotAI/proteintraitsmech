definitions:
  - kind: GENERAL
    text: >-
      An oxidoreductase; acting on paired donors, with incorporation or reduction of molecular oxygen. The oxygen incorporated need not be derived from O2; with reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) dolabradiene + reduced [NADPH--hemoprotein reductase] + O2 = 15,16- epoxydolabrene + oxidized [NADPH--hemoprotein reductase] + H2O + H(+). (2) 15,16-epoxydolabrene + reduced [NADPH--hemoprotein reductase] + O2 = 3beta-hydroxy-15,16-epoxydolabrene + oxidized [NADPH--hemoprotein reductase] + H2O + H(+)
    source: "ExPASy ENZYME"
