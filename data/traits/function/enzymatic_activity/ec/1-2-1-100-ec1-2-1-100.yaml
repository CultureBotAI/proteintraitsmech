  Enzymatic activity — 5-formyl-3-hydroxy-2-methylpyridine 4-carboxylate 5-dehydrogenase (EC 1.2.1.100). Catalysed reaction: 5-formyl-3-hydroxy-2-methylpyridine-4-carboxylate + NAD(+) + H2O = 5-hydroxy-6-methylpyridine-3,4-dicarboxylate + NADH + 2 H(+).
