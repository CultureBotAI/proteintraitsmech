identifier: EC:1.1.1.441
label: "polyprenol dehydrogenase [NAD(P)H]"
definition: >-
  Enzymatic activity — polyprenol dehydrogenase [NAD(P)H] (EC 1.1.1.441). Catalysed reaction: (1) a di-trans,poly-cis-polyprenol + NAD(+) = a di-trans,poly- cis-polyprenal + NADH + H(+). (2) a di-trans,poly-cis-polyprenol + NADP(+) = a di-trans,poly- cis-polyprenal + NADPH + H(+). (3) a di-trans,poly-cis-dolichol + NADP(+) = a di-trans,poly-cis-dolichal + NADPH + H(+). (4) a di-trans,poly-cis-dolichol + NAD(+) = a di-trans,poly-cis-dolichal + NADH + H(+).
