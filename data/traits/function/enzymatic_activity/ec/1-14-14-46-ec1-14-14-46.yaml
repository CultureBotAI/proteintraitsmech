identifier: EC:1.14.14.46
label: "pimeloyl-[acyl-carrier protein] synthase"
definition: >-
  Enzymatic activity — pimeloyl-[acyl-carrier protein] synthase (EC 1.14.14.46). Catalysed reaction: a C2-C8-saturated long-chain fatty acyl-[ACP] + 2 reduced [flavodoxin] + 3 O2 = 6-carboxyhexanoyl-[ACP] + a fatty aldehyde + 2 oxidized [flavodoxin] + 3 H2O + 3 H(+).
