identifier: EC:1.14.14.128
label: "farnesoate epoxidase"
definition: >-
  Enzymatic activity — farnesoate epoxidase (EC 1.14.14.128). Catalysed reaction: (2E,6E)-farnesoate + reduced [NADPH--hemoprotein reductase] + O2 = juvenile hormone III carboxylate + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
