identifier: EC:2.1.1.69
label: "5-hydroxyfuranocoumarin 5-O-methyltransferase"
definition: >-
  Enzymatic activity — 5-hydroxyfuranocoumarin 5-O-methyltransferase (EC 2.1.1.69). Catalysed reaction: (1) a 5-hydroxyfurocoumarin + S-adenosyl-L-methionine = a 5-methoxyfurocoumarin + S-adenosyl-L-homocysteine + H(+). (2) bergaptol + S-adenosyl-L-methionine = bergapten + S-adenosyl-L- homocysteine.
