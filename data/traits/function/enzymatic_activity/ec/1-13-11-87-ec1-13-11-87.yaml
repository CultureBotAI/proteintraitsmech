identifier: EC:1.13.11.87
label: "endo-cleaving rubber dioxygenase"
definition: >-
  Enzymatic activity — endo-cleaving rubber dioxygenase (EC 1.13.11.87). Catalysed reaction: Cleavage of cis-1,4-polyisoprene polymers into a mixture of compounds, including a C20 compound ((4Z,8Z,12Z,16Z,20Z,24Z)-4,8,12,16,20,24- hexamethyl-28-oxononacosa-4,8,12,16,20,24-hexaenal), a C25 compound ((4Z,8Z,12Z,16Z,20Z)-4,8,12,16,20-pentamethyl-24-oxopentacosa- 4,8,12,16,20-pentaenal), a C30 compound ((4Z,8Z,12Z,16Z)-4,8,12,16- tetramethyl-20-oxohenicosa-4,8,12,16-tetraenal), and higher molecular weight compounds.
