identifier: EC:1.14.13.243
label: "toluene 2-monooxygenase"
definition: >-
  Enzymatic activity — toluene 2-monooxygenase (EC 1.14.13.243). Catalysed reaction: (1) toluene + NADH + O2 + H(+) = 2-hydroxytoluene + NAD(+) + H2O. (2) 2-hydroxytoluene + NADH + O2 + H(+) = 3-methylcatechol + NAD(+) + H2O.
