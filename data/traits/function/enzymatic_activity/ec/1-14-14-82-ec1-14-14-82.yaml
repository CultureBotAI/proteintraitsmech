  Enzymatic activity — flavonoid 3'-monooxygenase (EC 1.14.14.82). Catalysed reaction: a 3'-unsubstituted flavone + reduced [NADPH--hemoprotein reductase] + O2 = a 3'-hydroxyflavone + oxidized [NADPH--hemoprotein reductase] + H2O + H(+).
