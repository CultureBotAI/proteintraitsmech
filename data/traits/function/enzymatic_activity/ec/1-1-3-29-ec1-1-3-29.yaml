identifier: EC:1.1.3.29
label: "N-acylhexosamine oxidase"
definition: >-
  Enzymatic activity — N-acylhexosamine oxidase (EC 1.1.3.29). Catalysed reaction: (1) N-acetyl-D-glucosamine + O2 + H2O = N-acetyl-D-glucosaminate + H2O2 + H(+). (2) N-acetyl-D-galactosamine + O2 + H2O = N-acetyl-D-galactosaminate + H2O2 + H(+).
