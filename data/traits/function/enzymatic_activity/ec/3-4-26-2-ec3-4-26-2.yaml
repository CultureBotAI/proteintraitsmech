identifier: EC:3.4.26.2
label: "scytalidoglutamic peptidase"
definition: >-
  Enzymatic activity — scytalidoglutamic peptidase (EC 3.4.26.2). Catalysed reaction: Hydrolysis of proteins, with a strong preference for Phe or Tyr at position P1 and one of the smaller amino-acids at P1' in the sequence - P3 - P2 - P1 -|-P1'- P2'- P3'-. Cleaves the Tyr(26)-Thr(27) bond in the B chain of oxidized insulin, which is not cleaved by pepsin.
