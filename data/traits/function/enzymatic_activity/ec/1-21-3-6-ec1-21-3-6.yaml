identifier: EC:1.21.3.6
label: "aureusidin synthase"
definition: >-
  Enzymatic activity — aureusidin synthase (EC 1.21.3.6). Catalysed reaction: (1) 2',4,4',6'-tetrahydroxychalcone 4'-O-beta-D-glucoside + O2 = aureusidin 6-O-beta-glucoside + H2O. (2) 2 2',3,4,4',6'-pentahydroxychalcone 4'-O-beta-D-glucoside + O2 + 2 H(+) = 2 aureusidin 6-O-beta-glucoside + 2 H2O. (3) 2',3,4,4',6'-pentahydroxychalcone 4'-O-beta-D-glucoside + O2 + H(+) = bracteatin 6-O-beta-glucoside + H2O.
