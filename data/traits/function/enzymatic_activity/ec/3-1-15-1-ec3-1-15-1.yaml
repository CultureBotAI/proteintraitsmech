identifier: EC:3.1.15.1
label: "venom exonuclease"
definition: >-
  Enzymatic activity — venom exonuclease (EC 3.1.15.1). Catalysed reaction: Exonucleolytic cleavage in the 3'- to 5'- direction to yield nucleoside 5'-phosphates.
definition_source: ExPASy ENZYME
trait_axis: FUNCTION
trait_category: FUNC_ENZYMATIC_ACTIVITY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - EC:3.1.15.-
synonyms:
  - synonym_text: "venom phosphodiesterase"
    synonym_type: EXACT_SYNONYM
definitions:
  - kind: GENERAL
    text: >-
      A hydrolase; acting on ester bonds; exonucleases active with either ribo- or deoxyribonucleic acids and producing 5'-phosphomonoesters.
    source: "EC nomenclature (enzclass)"
    method: SOURCED
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Exonucleolytic cleavage in the 3'- to 5'- direction to yield nucleoside 5'-phosphates
    source: "ExPASy ENZYME"
    method: SOURCED
