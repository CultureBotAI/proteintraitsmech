identifier: EC:2.4.1.65
label: "3-galactosyl-N-acetylglucosaminide 4-alpha-L-fucosyltransferase"
definition: >-
  Enzymatic activity — 3-galactosyl-N-acetylglucosaminide 4-alpha-L-fucosyltransferase (EC 2.4.1.65). Catalysed reaction: a beta-D-galactosyl-(1->3)-N-acetyl-beta-D-glucosaminyl derivative + GDP- beta-L-fucose = a beta-D-galactosyl-(1->3)-[alpha-L-fucosyl-(1->4)]-N- acetyl-beta-D-glucosaminyl derivative + GDP + H(+).
