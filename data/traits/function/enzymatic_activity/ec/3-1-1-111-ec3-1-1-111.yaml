identifier: EC:3.1.1.111
label: "phosphatidylserine sn-1 acylhydrolase"
definition: >-
  Enzymatic activity — phosphatidylserine sn-1 acylhydrolase (EC 3.1.1.111). Catalysed reaction: (1) a 1,2-diacyl-sn-glycero-3-phospho-L-serine + H2O = a 2-acyl- sn-glycero-3-phospho-L-serine + a fatty acid + H(+). (2) a 1-acyl-sn-glycero-3-phospho-L-serine + H2O = sn-glycero-3-phospho- L-serine + a fatty acid + H(+).
