identifier: EC:1.18.1.7
label: "ferredoxin--NAD(P)(+) reductase (naphthalene dioxygenase ferredoxin- specific)"
definition: >-
  Enzymatic activity — ferredoxin--NAD(P)(+) reductase (naphthalene dioxygenase ferredoxin- specific) (EC 1.18.1.7). Catalysed reaction: (1) 2 reduced [2Fe-2S]-[ferredoxin] + NADP(+) + H(+) = 2 oxidized [2Fe- 2S]-[ferredoxin] + NADPH. (2) 2 reduced [2Fe-2S]-[ferredoxin] + NAD(+) + H(+) = 2 oxidized [2Fe- 2S]-[ferredoxin] + NADH.
