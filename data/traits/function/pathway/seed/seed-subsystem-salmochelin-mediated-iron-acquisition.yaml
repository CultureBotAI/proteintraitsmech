# subsystem_id: Salmochelin-mediated_Iron_Acquisition
identifier: proteintraitsmech:SEED_SUBSYSTEM_Salmochelin-mediated_Iron_Acquisition
label: "Salmochelin-mediated Iron Acquisition"
definition: >-
  A gene cluster (the iroA locus) comprising genes for the synthesis and utilization of the glucosylated enterobactin derivatives salmochelins. Salmochelins are glucosylated derivatives of enterobactin produced by Salmonella and uropathogenic E. coli strains, and secreted in response to iron deprivation. A portion of the synthesized enterobactin is C-glucosylated by IroB to produce salmochelin. This imparts enhanced hydrophobicity to the siderophore and the inability to be bound by the host protein siderocalin, contributing to pathogenesis. Salmochelin is secreted via the ABC transporter IroC, which can also export enterobactin. Once loaded with iron, the siderophore is transported to the periplasm via IroN. Finally, iron is released by the periplasmic esterase IroE which degrades salmochelin to the linear trimeric form. After uptake into the cytoplasm, IroD degrades salmochelin.
