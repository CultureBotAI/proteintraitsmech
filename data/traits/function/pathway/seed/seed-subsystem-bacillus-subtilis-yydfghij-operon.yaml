label: "Bacillus subtilis yydFGHIJ operon"
definition: >-
  Appears to make a modified peptide, which induces the LiaRS two-component system J Bacteriol. 2007 Dec;189(23):8616-25, PMID: 17921301 The yydFGHIJ operon of Bacillus subtilis encodes a peptide that induces the LiaRS two-component system. Butcher BG1, Lin YP, Helmann JD. Abstract The Bacillus subtilis LiaRS two-component system (TCS) responds to perturbations of the cell envelope induced by lipid II-interacting antibiotics, such as vancomycin, ramoplanin, nisin, and bacitracin. Here, we characterize Tn7-generated mutations that induce the liaRS TCS. In addition to insertions in liaF, a known negative regulator of the LiaRS TCS, we identified two disruptions in the last two genes of the yydFGHIJ operon. This operon is predicted to encode a 49-amino-acid peptide (YydF), a modification enzyme (YydG), a membrane-embedded protease (YydH), and an ATP-binding cassette (ABC) transporter (YydIJ). Genome sequence comparisons suggest that the yydFGHIJ operon may have been acquired by horizontal transfer. Inactivation of the YydIJ transporter resulted in increased expression from the LiaR-dependent P(liaI) promoter only in the presence of the yydFGH genes. Cells harboring the complete yydFGHIJ operon induced LiaR activity in cocultured cells lacking either this transporter or the complete operon. These results suggest that this operon is involved in the synthesis and export of a modified peptide (YydF*) that elicits cell envelope stress sensed by the LiaRS TCS.
