# subsystem_id: Carnitine_metabolism_and_transport
identifier: proteintraitsmech:SEED_SUBSYSTEM_Carnitine_metabolism_and_transport
label: "Carnitine metabolism and transport"
definition: >-
  Betaines, like carnitine are amino acid derivatives in which the nitrogen atom is fully methylated, i.e. they are quaternary ammonium compounds. Carnitine is an essential metabolite that enables intracellular transport of fatty acids and acetyl units. Bacteria are able to metabolize this trimethylammonium compound in three different ways: - Enterobacteriaceae are able to convert carnitine, via crotonobetaine, to gamma-butyrobetaine in the presence of C and N sources and under anaerobic conditions. This two-step pathway, including a L-(-)-carnitine dehydratase and the crotonobetaine reductase, is encoded by the cai genes. - Pseudomonas species, assimilate L-(-)-carnitine as sole source of carbon and nitrogen. The first catabolic step is catalysed by the L-(-)-carnitine dehydrogenase. - Acinetobacter species, degrade only the carbon backbone, with formation of trimethylamine. - Some bacteria are also able to metabolize the non-physiological D-(+)-carnitine, which results as a waste product in some chemical procedures for L-(-)-carnitine production based on the resolution of racemic carnitine.
