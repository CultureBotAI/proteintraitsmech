# subsystem_id: Tol-Pal_Cell_Envelope_Complex
identifier: proteintraitsmech:SEED_SUBSYSTEM_Tol-Pal_Cell_Envelope_Complex
label: "Tol-Pal Cell Envelope Complex"
definition: >-
  The Tol-PAL system is required for the maintenance of outer membrane integrity and the import of certain organic molecules as nutrients. It consists of five critical genes. Inner membrane proteins TolQ and TolR convert protomotive force to energy that is transduced through TolA to an outer membrane complex of TolB and Pal(peptidoglycan-associated lipoprotein). TolA is anchored to the cytoplasmic membrane by a single membrane spanning segment near the N-terminus, leaving most of the protein exposed to the periplasm. Most of the length of the TolA consists of low-complexity sequence that may differ in both length and composition from one species to another, complicating efforts to discriminate TolA (the most divergent gene in the tol-pal system) from paralogs such as TonB. TolA undergoes a conformational change in response to changes in the proton-motive force, and interacts with Pal in an energy-dependent manner. The C-terminal periplasmic domain of TolA also interacts with the N-terminal domain of TolB. The Tol-Pal system is exploited by colicin and filamentous phage DNA to enter the cell. It is also implicated in pathogenesis in several bacterial species. The homologous ExbB/ExbD/TonB protein complex, powers transport of siderophores and vitamin B12 across the bacterial outer membrane.
