identifier: proteintraitsmech:SEED_SUBSYSTEM_Proline_Synthesis
label: "Proline Synthesis"
definition: >-
  This universal pathway is found in organisms ranging from bacteria to H. sapiens. However, the first reaction (conversion of 2-oxoglutarate to glutamate) is catalyzed by different enzymes in different organisms. In mammals, this reaction occurs in the mitochondrial matrix by an NAD(P)+-dependent glutamate dehydrogenase (EC 1.4.1.3). Glutamate is then transported to the cytoplasm, where the rest of the reactions occur. In bacteria, the first step is catalyzed by a NADP+-dependent enzyme (EC 1.4.1.4). Net Reaction Equation: glutamate + ATP + 2 NADPH = L-proline + 2 NADP+ + Pi gdhA and proB enzymes form a complex necessary for the activity of the first enzyme -glutamate dehydrogenase
