# subsystem_id: Bacillus_cannibalism_system
identifier: proteintraitsmech:SEED_SUBSYSTEM_Bacillus_cannibalism_system
label: "Bacillus cannibalism system"
definition: >-
  From Swiss-Prot Produces a 42-residue extracellular sporulation delaying protein (SDP) that collapses the proton motive force (probably both the membrane potential and pH gradient) across the cell membrane, which leads to autolysis; may form a proton channel (PubMed:22469514). Induces the lysis of other B.subtilis cells that have not entered the sporulation pathway, inducing cannibalism to provide a source of nutrients to support sporulation, and at the same time delaying commitment to the energetically expensive and irreversible onset of sporulation (PubMed:12817086). Addition of SDP to liquid cultures halts growth, leads to increased cell permeability and eventually cell lysis in a significant subset of the population, although some cells survive and resume growth after a lag period (PubMed:20805502). Effects of SDP are irreversible within 10 minutes (PubMed:22469514). Addition of SDP to solid cultures induces killing, it is much more effective than SKF (AC O31422) (PubMed:20805502). Has antibiotic action against Gram-positive Firmicutes (L.acidophilus, M.megaterium, P.polymyxa, S.aureus, S.epidermidis) but not Actinobacteria M.luteus or Gram-negative P.aeruginosa or K.pneumoniae (PubMed:20805502, PubMed:22469514). SDP induces expression of the sdpR-sdpI operon (PubMed:12817086). Its maturation is dependent on SdpA and SdpB. Also functions as a ligand, binds to SdpI triggering a signal transduction cascade that protects the cell against the toxic effects of its own SDP.
