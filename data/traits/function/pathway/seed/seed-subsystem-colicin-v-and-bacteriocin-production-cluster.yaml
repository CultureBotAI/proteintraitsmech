label: "Colicin V and Bacteriocin Production Cluster"
definition: >-
  This is a cluster-based subsystem. It describes 8 genes that tend to co-occur together. One of these genes is thought to be a membrane bound gene implicated in colicin V (or bacteriocin) production. A paper in J. Bact (1991, pp 7018-7020) implicated another gene (which we have called tRNA pseudouridine synthase A (EC 4.2.1.70)) in colicin production.
