identifier: proteintraitsmech:SEED_SUBSYSTEM_Pore-forming_cytolytic_toxins
label: "Pore-forming cytolytic toxins"
definition: >-
  single component: alpha hemolysin (Hla; &#945;-toxin)of Streptococcus and Hemolysin II and Cytotoxin K of Bacilli, bicomponent leukotoxins: leukocidins (Luk), phage-encoded Pantone�Valentine leukocidin (PVL) and gamma hemolysin (Hlg). Hla monomers assemble into heptameric pre-pores at the plasma membrane followed by formation of the pore. The bicomponent pore-forming toxins (BCPFTs), consist of two subunits with a beta barrel structure that acquire pore-forming conformation upon binding to specific cellular receptors followed by hetero-oligomerization at the plasma membrane of the target cells. The oligomeric toxins then insert a pore into the plasma membrane leading to ion influx and efflux, initiation of a variety of apoptotic and necrotic processes, and ultimately cell death. The S and F subunits of the BCPFTs are produced and secreted separately and the association does not occur until the binding to the cell surface receptor is initiated. Upon binding of the S subunit to its cellular receptor it forms a heterodimer with the F component followed by multimerization leading to a ring-like structure of ~200 KDa with an external diameter of 7�9 nm and internal diameter of 2�3 nm on red blood cells and polymorphonuclear cells (PMN). While the pore-forming conformation of Hla consists of homo-heptamers, crystal structure studies have proposed heptameric, hexameric and octameric structures (four S and four F subunits assembled into an octamer with an alternating arrangement) for the functional BCPFT complexes.
