identifier: proteintraitsmech:SEED_SUBSYSTEM_Ribonuclease_J_family
label: "Ribonuclease J family"
definition: >-
  This family was first defined by a pair of enzymes RNase J1 and RNase J2 in B. subtilis, which play roles in cellular RNA processing, especially ribosomal RNAs. Many taxa include only one related enzyme, called RNase J in Mycobacterium smegmatis. There are related proteins in cyanobacteria, alpha, delta and epsilon proteobacteria.
