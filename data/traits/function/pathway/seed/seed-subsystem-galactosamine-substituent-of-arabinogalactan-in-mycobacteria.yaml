identifier: proteintraitsmech:SEED_SUBSYSTEM_Galactosamine_Substituent_of_Arabinogalactan_in_Mycobacteria
label: "Galactosamine Substituent of Arabinogalactan in Mycobacteria"
definition: >-
  The cell wall arabinogalactan (AG) of slow growing pathogenic Mycobacterium spp. is characterized by the presence of galactosamine (GalN) modifying some of the interior branched arabinosyl residues (Skovierova et al., 2010). Notably, fast growing Mycobacterium spp. appear to be devoid of GalN substituents (e.g. M. smegmatis, M. neoaurum, and M. phlei). The function of this substituent is not known. Galactosamine moieties lacking an acetyl group on the nitrogen are rather uncommon in prokaryotes. Thus far, they have been described as components of the lipopolysaccharide (LPS) of some Gram-negative bacteria (Skovierova et al., 2010). In Gram-positive bacteria, GalN and glucosamine (GlcN) have been reported in the glycosylation motif of a glycoprotein toxin from Bacillus thuringiensis subsp. israelensis and proposed to be important to the biological activities of the toxin (PMID:3804977). GalN was also identified as a possible component of a galactose-containing polysaccharide from Streptococcus mutans (PMID:3196739) The synthesis and transfer of this amino sugar in Mycobacterium spp. depends on a polyprenyl-phosphate-linked sugar donor (rather than nucleotide-sugar donor), namely polyprenyl-linked galactosamine or N-acetylgalactosamine. PpgS, a sugar nucleotide-utilizing glycosyltransferase, catalyzes the formation of polyprenyl (C35/C50)-P-d-GalNAc from UDP-&#945;-d-GalNAc and polyprenyl-P on the cytosolic side of the plasma membrane. This sugar donor is then presumably deacylated by an as yet unknown deacetylase before or after the membrane-associated glycosyltransferase Rv3779 transfers the d-GalNp (or d-GalNAc) residue from polyprenyl-P-d-GalN(Ac) to the C2 position of a portion of the internal 3,5-branched d-Araf residues of AG (Skovierova et al., 2010). References Skovierov� H1, Larrouy-Maumus G, Pham H et al., and Jackson M. 2010. Biosynthetic Origin of the Galactosamine Substituent of Arabinogalactan in Mycobacterium tuberculosis J Biol Chem. Dec 31, 2010; 285(53): 41348�41355. PMID: 21030587
