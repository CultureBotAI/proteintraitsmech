definition: >-
  This Subsystem has been encoded for the review "Evolution of Proline biosynthesis: Enzymology, bioinformatics, genetics and transcriptional regulation" (Journal ??). You are now in the Subsystem viewer of the SEED database. The narrow green banner above provides links to genome analysis tools and data. Please use them to see - I. The �Spreadsheet� Tab contains a Table where each row represents a genome, each column corresponds to a Functional Role (FR), and each cell is populated with the gene(s)/protein(s) that implement this Functional Role in each organism. Each gene/protein is identified with a blue number � the Protein-Encoding Gene (PEG) ID - which is linked to an underlying detailed PEG page. Multiple, serially numbered gene IDs may appear in the same cell in eukaryotic genomes. These correspond to multiple gene models called for the same locus. This complexity reflects the uncertainty attending gene prediction in Eukaryotes, and is expected to diminish with time. 'Variant codes' in the SEED database capture most common variations in a 'lay-out' of a pathway (e.g. proline biosynthesis in this SS) that might occur in different taxa. A specific variant code is associated with every genome in the Spreadsheet; hovering over it brings up its brief explanation (also given below in the "Variants" section) II. The �Functional Roles� Tab above contains the list of protein families included in this Subsystem, and explains abbreviations used in the heading of the Subsystem Spreadsheet. Follow blue links on the left ("show FR") to web pages with detailed descriptions of each Functional Role (protein family) III. Further help in navigating the SEED database is available here - <a href="http://www.theseed.org/wiki/SEED_Viewer_Tutorial">SEED_Viewer_Tutorial</a> <a href="http://www.theseed.org/wiki/Glossary">Glossary</a>
