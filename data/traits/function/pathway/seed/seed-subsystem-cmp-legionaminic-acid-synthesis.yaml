identifier: proteintraitsmech:SEED_SUBSYSTEM_CMP-legionaminic_acid_synthesis
label: "CMP-legionaminic acid synthesis"
definition: >-
  The sialic acid-like sugar 5,7-diacetamido-3,5,7,9-tetradeoxy-D-glycero-D-galacto-nonulosonic acid (legionaminic acid)is produced by pathogens like Legionella pneumophila and Campylobacter coli. L. pneumophila serogroup 1 strains(causative agents of Legionnaire's disease). The alpha2,4-linked homopolymer of legionaminic acid is found in their lipopolysaccharide O-chains, whereas the gastrointestinal pathogen C. coli modifies its flagellin with this monosaccharide via O-linkage.
