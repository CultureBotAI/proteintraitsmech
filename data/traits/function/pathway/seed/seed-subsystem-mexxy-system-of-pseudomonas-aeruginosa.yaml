label: "MexXY System of Pseudomonas aeruginosa"
definition: >-
  The RND-type multidrug efflux system of P. aeruginosa PAO1 MexXY was Identified by three Different Groups in parallel. MexXY was shown to confer natural resistance of P. aeruginosa PAO1 to aminoglycosides as well as tetracycline and erythromycin.
