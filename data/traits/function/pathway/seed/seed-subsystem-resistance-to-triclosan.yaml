# subsystem_id: Resistance_to_Triclosan
identifier: proteintraitsmech:SEED_SUBSYSTEM_Resistance_to_Triclosan
label: "Resistance to Triclosan"
definition: >-
  The widely used biocide triclosan [5-chloro-2-(2,4-dichlorophenoxy)-phenol, TCS] has a broad-spectrum capacity to kill many microorganisms and is a constituent in a variety of personal care products. An enormous amount of TCS has been released into the environment (PMID: 26006133), and TCS-resistant bacteria are abundant in nature. Several known mechanisms that confer resistance to this biocide include: (i) overexpression of ENR; (ii) presence of mutated and/or TCS-tolerant ENR; (iii) changes in the outer membrane; (iv) up regulation of efflux pumps and (v) the presence of other potential target genes (PMID:16922622; PMID: 27577999) Triclosan targets enoyl-acyl carrier protein reductases (ENRs), which catalyze the last enoyl reduction step in bacterial fatty acid elongation cycle (PMID:10196195). Namely, the reduction of a trans-2-acyl-ACP (an enoyl-ACP) to the fully saturated acyl-ACP species. The reductant is either NADH or NADPH, although in one case a reduced flavin (FMNH2) is used as an intermediate in the reduction (PMID: 19151923) Notably, ENRs display an unusual diversity among organisms (unlike other enzymes of fatty acid biosynthesis). Selective emergence of different types of ENR could be due to the fact that a variety of both synthetic and natural antibacterial compounds are shown to specifically target their activity, e.g. triclosan and isoniazid (PMID: 27577999). So far, four ENR isozymes have been characterized in bacteria, namely FabI, FabL, FabV, and FabK (PMID:19151923). Most of them are members of the short-chain dehydrogenase/reductase (SDR) superfamily, except for FabK, which is completely TCS-refractory and is a non-SDR ENR (PMID:27577999) Enoyl-[ACP] reductases of the FabI/InhA type are highly susceptible to triclosan, while FabV and FabK are essentially refractory to it (e.g. expression of S. pneumoniae FabK in E. coli raises the TCL concentration required to inhibit growth by over 4 orders of magnitude (PubMed: 12487627)). FabL is only poorly inhibited by TCL, and this inhibition is reversible (PMID: 21185310) A important feature of the well-studied inhibitors of SDR family ENRs (InhA and FabI) is that inhibition requires the NAD+ product to be bound within the active site. That is, the inhibitor forms a stable ternary complex with the protein and the oxidized cofactor. Some inhibitors form a covalent bond with NAD+ whereas others do not. The fact that each of these inhibitors must complete a catalytic cycle and bind the inhibitor before the weakly bound NAD+ product is released accounts for the observed slow inhibition of ENR activity. The extensive interactions made by the inhibitors with both the NAD+ moiety and the protein in the ternary complex readily explains the tight binding properties of these inhibitors (PMID: 19151923) In addition to the 4 prototypic ENR types, recent functional screening of the soil metagenome revealed that a variety of target ENR homologues are responsible for the TCS resistance (PMID: 27577999). Diverse ENRs similar to 7-&#945;-hydroxysteroid dehydrogenase (7-&#945;-HSDH) or the unusual YX7K-type ENR conferred extreme tolerance to TCS. The TCS-refractory 7-&#945; HSDH-like ENR and the TCS-resistant YX7K-type ENR seem to be prevalent in human pathogenic bacteria, suggesting that a selective enrichment occurred in pathogenic bacteria in soil (PMID: 27577999. These additional types of ENR are included in this Subsystem as well, flagged as "via_metagenomics" Surprisingly, nonfunctional FabV and FabK ENR homologues with moderate TCS resistance were described by Khan R. and colleagues (PMID: 27577999). They proposed that the FabK-like and FabV-like ENR homologues, which lack conserved FAD-binding domain and/or catalytically active residues, although devoid of ENR activity, may still act as biocide load reducers by binding and sequestering a certain amount of TCS, thereby reducing the overall biocide burden of the functional ENR in bacterial cells. In addition to being targeted by TCS, ENRs are also targeted by a variety of other clinically important antibiotics and antimicrobials, such as Isoniazid (PMID: 18193820), the soon to be marketed AFN-1252 (PMID:24189061), hexachlorophene, diflufenican, and various other antimicrobials. Some mutations in the active sites of ENRs, such as the substrate- and cofactor-binding domains, lead to tolerance of the ENR inhibitors (PMID:27577999).
