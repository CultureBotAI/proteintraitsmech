label: "BarA-UvrY(SirA) two-component regulatory system"
definition: >-
  The barA and sirA genes of Salmonella enterica serovar Typhimurium encode a two-component sensor kinase and a response regulator, respectively. This system increases the expression of virulence genes and decreases the expression of motility genes.
