# subsystem_id: Head-to-head_olefinic_hydrocarbon_biosynthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Head-to-head_olefinic_hydrocarbon_biosynthesis
label: "Head-to-head olefinic hydrocarbon biosynthesis"
definition: >-
  This subsystem encodes a head-to-head fatty acid condensation biosynthetic pathway dependent on genes denoted as ole (for olefin biosynthesis). It was deciphered in a series of publications by Sukovich and colleagues (ref.2-3) and independently by Keasling group (ref.1). The same cluster was independently predicted to be involved in biosynthesis of polyunsaturated fatty acids or related compounds by this database (see "Notes" section below) Sukovich et al. (ref.3) tested experimentally selected microorganisms from the phyla Verucomicrobia, Planctomyces, Chloroflexi, Proteobacteria, and Actinobacteria and showed that they produce long-chain olefinic hydrocarbons. However, different species from the same genera sometimes lack the ole genes and fail to produce olefinic hydrocarbons. The type of olefins produced by different bacteria differed greatly with respect to the number of carbon-carbon double bonds. The greatest number of organisms surveyed biosynthesized a single long-chain olefin, 3,6,9,12,15,19,22,25,28-hentriacontanonaene, that contains nine double bonds (ref.3). It was further proposed (ref.2) that these long-chain polyunsaturated compounds aid in adapting cells to a rapid drop in temperature, based on three observations. In S. oneidensis wild-type cells, the cellular concentration of polyunsaturated compounds increased significantly with decreasing growth temperature. Second, the oleABCD deletion strain showed a significantly longer lag phase than the wild-type strain when shifted to a lower temperature. Lastly, compound I has been identified in a significant number of bacteria isolated from cold environments (ref.2). This observation is fully supported in this SS by the fact that the OLE operon often co-occurs and co-localizes with the pfaABCD(E) operon, controlling biosynthesis of eicosapentaenoic (EPA) and/or docosahexaenoic (DHA) omega-3 polyunsaturated fatty acids, important in bacterial cold adaptation References 1.Beller HR, Goh EB, Keasling JD. 2010. Genes involved in long-chain alkene biosynthesis in Micrococcus luteus. Appl Environ Microbiol. 2010 Feb;76(4):1212-23. Epub 2009 Dec 28 2. Sukovich DJ, Seffernick JL, Richman JE, Hunt KA, Gralnick JA, Wackett LP. Structure, function, and insights into the biosynthesis of a head-to-head hydrocarbon in Shewanella oneidensis strain MR-1. Appl Environ Microbiol. 2010 Jun;76(12):3842-9. Epub 2010 Apr 23 3. Sukovich DJ, Seffernick JL, Richman JE, Gralnick JA, Wackett LP. Widespread head-to-head hydrocarbon biosynthesis in bacteria and role of OleA. Appl Environ Microbiol. 2010 Jun;76(12):3850-62. Epub 2010 Apr 23
