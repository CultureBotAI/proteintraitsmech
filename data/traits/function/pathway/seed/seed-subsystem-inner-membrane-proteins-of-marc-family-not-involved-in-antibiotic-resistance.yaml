identifier: proteintraitsmech:SEED_SUBSYSTEM_Inner_membrane_proteins_of_MarC_family__not_involved_in_antibiotic_resistance
label: "Inner membrane proteins of MarC family, not involved in antibiotic resistance"
definition: >-
  MarC is an inner membrane protein with six predicted transmembrane domains. MarC is not involved in multiple antibiotic resistance (PMID:17954692), as it was previously believed MarC, YchE and YhgN are paralogs in E. coli. Neither a marC single deletion mutant nor a triple marC ychE yhgN deletion mutant shows a difference in susceptibility to various antibiotics compared to wild type. Overexpression of MarC also has no effect on antibiotic susceptibility (PMID:17954692). References McDermott PF, McMurry LM, Podglajen I, Dzink-Fox JL, Schneiders T, Draper MP, Levy SB. 2008. The marC gene of Escherichia coli is not involved in multiple antibiotic resistance. Antimicrob Agents Chemother. 2008 Jan;52(1):382-3. PMID:17954692
