# subsystem_id: Mevalonate_metabolic_pathway
identifier: proteintraitsmech:SEED_SUBSYSTEM_Mevalonate_metabolic_pathway
label: "Mevalonate metabolic pathway"
definition: >-
  Isoprenoids make up for more than 25000 biomolecules that include compounds like cholesterol, chlorophyll, vitamin A, ubiquinone, and natural rubber. The two essential building blocks of all isoprenoids, isopentenyl pyrophosphate (IPP) and dimethylallyl pyrophosphate (DMAPP), are ubiquitous in the three domains of life. In most eukaryotes and archaea, IPP and DMAPP are generated through the mevalonate pathway. two novel variants have been found: 1. deploying mevalonate-3-kinase and mevalonate-3-phosphate-5-kinase from Thermoplasma acidophilum 2. deploying mevalonate phosphate decarboxylase (MPD) and isopentenyl phosphate kinase (IPK) from Roseiflexus castenholzii and Haloferax volcanii
definition_source: BV-BRC
