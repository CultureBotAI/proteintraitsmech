identifier: proteintraitsmech:SEED_SUBSYSTEM_Fe_III__respiration_-_Shewanella_type
label: "Fe(III) respiration - Shewanella type"
definition: >-
  This Subsystem has been encode by Margaret Romine, whose contributions to SEED we gratefully acknowledge. This subsystem describes the Fe(III) respiratory system found in Shewanella species. This system is believed to enable their hosts to utilize both insoluble (Fe, Mn) and soluble metals (V, U) as terminal electron acceptors. Other bacteria such as Geobacter and Anaeromyxobacteria also possess all or some of these capabilities, but appear to utilize non-homolous proteins to mediate the electron transfer steps. Components of this electron transfer pathway are distributed across both the inner and outer membrane of this gram negative group of organisms. Electrons are first withdrawn from menaquinone via a specialized membrane-anchored tetraheme cytochrome c, named CymA, that belongs to the NapC family. This menaquinone oxidase is also required for numerous other anaerobic respiratory pathways in Shewanella. In S. oneidensis MR-1, CymA is also required for the use of various other electron acceptors including fumarate, nitrate, nitrite, and DSMO (PMID: 9023196, PMID: 12899636). In Shewanella ANA-3 it also required for respiration of arsenate (PMID: 19760266). A recent study demonstrated that CymA is sufficient to confer soluble Fe-NTA respiratory capability to E. coli (PMID:18394146). The current hypothesis is that electrons are transferred from CymA to a periplasmic decaheme cytochrome c, named MtrA and then to surface localized multi-heme cytochromes. There is still some speculation as to whether additional electron carriers mediate the transfer of electrons from CymA to MtrA. In S. oneidensis MR-1, two surface localized decaheme cytochrome c's, MtrC and OmcA, contribute to Fe(III) reduction. Both are lipoproteins and require the type II secretion system to mediate their translocation across the outer membrane. A beta barrel protein, MtrB, is believed to provide passage for MtrA across the outer membrane whereby it can make contact with and transfer electrons to surface bound c-type cytochromes, MtrC and OmcA (PMID: 20002197). Comparative analysis of 21 sequenced Shewanella reveals that CymA, MtrA, MtrB, and MtrC are conserved in all of the strains that reduce Fe(III) (all but S. denitrificans)(PMID: 18604222). A second complex (MtrDEF) analogous to MtrCAB is found in some of the strains. Varying numbers of additional c-type cytochromes, all lipoproteins predicted to localize to the cell surface and some predicted to bind 11 hemes (UndA, UndB), are encoded next to MtrCAB. The substrate selectivity of these putative surface localized proteins is currently unknown. Expression of MtrDEF has only been observed in aggregated cells (PMID: 18412550).
