identifier: proteintraitsmech:SEED_SUBSYSTEM_Inositol_catabolism
label: "Inositol catabolism"
definition: >-
  Inositol (MI = myo-Inositol) is a sugar alcohol that can be catabolised by many organisms. It and it's isomers play also an important role as structural elements for a number of secondary messengers in eukaryotic cells, including inositol phosphates, phosphatidylinositol (PI) and phosphatidylinositol phosphate (PIP) lipids.
