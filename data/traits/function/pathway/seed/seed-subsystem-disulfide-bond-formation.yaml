identifier: proteintraitsmech:SEED_SUBSYSTEM_Disulfide_bond_formation
label: "Disulfide bond formation"
definition: >-
  Disulfide bond formation is critical for the proper folding and functionality of bacterial proteins. It is catalysed by proteins, that introduce disulfide bonds into unfolded polypeptides. Two systems have been described in E. coli, the DsbAB system with broad substrate specificity, where DsbA donates it's redox-active disulfide to the polpypeptide and gets reoxidized by DsbB and the DsbLI system, which catalyses the specific oxidative folding of arylsulfate sulfotransferase (ASST).
