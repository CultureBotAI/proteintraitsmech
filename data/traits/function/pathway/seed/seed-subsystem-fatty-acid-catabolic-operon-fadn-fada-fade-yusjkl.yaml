identifier: proteintraitsmech:SEED_SUBSYSTEM_Fatty_acid_catabolic_operon_fadN-fadA-fadE__yusJKL
label: "Fatty acid catabolic operon fadN-fadA-fadE (yusJKL)"
definition: >-
  The Bacillus subtilis fadR regulon involved in fatty acid degradation comprises five operons, lcfA-fadR-fadB-etfB-etfA, lcfB, fadN-fadA-fadE, fadH-fadG, and fadF-acdA-rpoE. Three of these: lcfA-fadRB-etfBA, lcfB, and fadNAE operons are directly participate in the &#946;-oxidation cycle ((PMID:21398533; PMID:17189250) This Subsystem encodes one of them, namely the fadN-fadA-fadE (formely yusJ-yusK-yusL) The fadNAE (and lcfA-fadRB-etfBA, lcfB operons) have been reported to be induced upon glucose starvation (PMID:15809868) and they are catabolite repressed (PMID:21398533). The catabolite repression is dependent on CcpA and mediated by the respective cre located in the lcfA, lcfB, or fadN gene (PMID:21398533). Furthermore, the fadNAE operon is induced at the onset of sporulation (PMID:12817086). This induction requires the YvbA protein involved in cannibalism by sporulating cells.
