identifier: proteintraitsmech:SEED_SUBSYSTEM_Sex_pheromones_in_Enterococcus_faecalis_and_other_Firmicutes
label: "Sex pheromones in Enterococcus faecalis and other Firmicutes"
definition: >-
  The observation that Enterococcus faecalis strains containing certain plasmids give rise to bacterial aggregates when mixed with plasmid-free cells led to the discovery of bacterial sex pheromones (Dunny et al., 1978). These small linear peptide molecules act as signals that facilitate the conjugative transfer of a specific category of plasmids referred to as pheromone- responsive plasmids. Pheromones secreted by plasmid-free cells can induce a process in which plasmid-containing cells become activated for both adherence to potential recipients (those that produced and secreted the pheromone) and plasmid transfer. Once a recipient cell acquires a given plasmid, the corresponding pheromone is no longer detected in the culture supernatant of the transconjugant because of �shutdown� or �masking� of the endogenous peptide (although pheromones specific for unrelated plasmids continue to be secreted). The newly resident plasmid encodes and directs the production of a small peptide that is somewhat similar to its cognate pheromone but acts as a competitive inhibitor. Uptake of pheromones is mediated by Pheromone binding protein TraC/PrgZ, which recruits chromosomal oligopeptide Opp transport system (Leonard, et al., 1996). The known enterococcal sex pheromones (cAD1, cPD1, cCF10, cAM373, and cOB1) and related inhibitors are all relatively hydrophobic, linear octa- or heptapeptides that are active at nanomolar concentrations (reviewed in Clewell, 1993; 1999; Wirth, 1994; Dunny and Leonard, 1997). For example, pheromone cAD1 is an octapeptide with the sequence LFSLVLAG. With the recent availability of enterococcal genome sequence data, it was noted that a pheromone peptide is encoded as a part of the signal sequences of precursors of certain lipoproteins (An & Clewell. 2002.). In most cases, the signal sequences correspond to 21- or 22-amino-acid segments, with the last 7 or 8 residues representing the specific pheromone. Typical lipoprotein signal peptidase target sites are appropriately located such that cleavage results in separation of the signal sequence, which in turn needs only to be processed at a second location seven or eight residues from the other processing site to generate a mature pheromone peptide. The former process is believed to be catalyzed by Signal peptidase II, the later � by metalloprotease Eep (An & Clewell, 2002). It is not known if there is a functional relationship between the activity of the putative lipoproteins and the pheromone component of their precursor structures or whether the lipoprotein connection is simply fortuitous. Pheromone-responding plasmids are highly transmissible between strains of E. faecalis and are believed to contribute to the horizontal dissemination of antibiotic resistance genes (Clewell, 1990) and virulence factors such as cytolysin (Gilmore etal., 1994) and adhesins (Hirt et al., 2000; Rozdzinski et al., 2001). Biosynthesis of plasmid-encoded hemolysin and aggregation substance, induced by pheromones have been shown to contribute to virulence (e.g., Sussmuth et al., 2000). Aggregation substance Asa1/PrgB has two RGD motifs that may be responsible for the ability of plasmid-carrying cells to attach to porcine renal kidney epithelial cells (Kreft et al., 1992). Surprisingly, the E. faecalis pheromone-responsive plasmid pAM373 (De Boever et al., 2000), has the unusual ability to respond not only to a specific E. faecalis peptide, cAM373, but also to similar peptides secreted by the non-enterococcal species: Streptococcus gordonii and Staphylococcus aureus (Clewell et al., 1985). The staphylococcal peptide has been identified � AIFILAA (Nakayama et al., 1996) and differs from the enterococcal cAM373 peptide by only one amino acid � an alanine rather than a serine at the carboxyl-terminus. Furthermore, orthologs of the Putative pheromone cAM373 precursor lipoprotein CamS are evident in the genomes of many Bacilli, Listeria, Thermoanaerobacter, Lactobacilli, etc. (Flannagan & Clewell, 2002). Although it is not known whether the peptides produced by different genera actually represent sex pheromones significant to these organisms, it is conceivable that they could play a role in the acquisition of pAM373 and related plasmids from enterococci, contributing to cross-species spread of antibiotic-resistance factors.
