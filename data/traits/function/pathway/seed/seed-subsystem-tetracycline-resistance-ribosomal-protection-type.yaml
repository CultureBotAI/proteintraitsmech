# subsystem_id: Tetracycline_resistance,_ribosomal_protection_type
identifier: proteintraitsmech:SEED_SUBSYSTEM_Tetracycline_resistance__ribosomal_protection_type
label: "Tetracycline resistance, ribosomal protection type"
definition: >-
  Tetracyclines (TET) were discovered in the 1940s and exhibited activity against a wide range of microorganisms including gram-positive and gram-negative bacteria, chlamydiae, mycoplasmas, rickettsiae, and protozoan parasites. The first tetracycline-resistant bacterium, Shigella dysenteriae, was isolated in 1953. It was in fact the inquiry into molecular mechanisms of TET resistance that opened up the entire field of antimicrobial resitance (ISBN 1-55581-329-1) Tetracycline resistance is most often due to the acquisition of new genes, which encode either (i) energy-dependent efflux of tetracyclines or (ii) a protein that protects bacterial ribosomes from the action of tetracyclines (Chopra and Roberts, 2001). The latter have high sequence similarity with translation elongation factor EF-G and EG-Tu and have G+C% ranging from 32 and 40%, which is consistent with a gram-positive origin (Roberts, 2005). Ribosomal protection proteins and TET efflux pumps are the two main mechanisms of TET resistance. In addition, a limited number of bacteria acquire resistance by mutations, which alter the permeability of the outer membrane porins and/or lipopolysaccharides in the outer membrane, change the regulation of innate efflux systems, or alter the 16S rRNA. Reviewed in (Chopra and Roberts, 2001) Nearly 50 types of TET resistant determinants have been described so far, and new ones are being reported. Dr. Stuart Levy from Tufts is the clearinghouse for naming new TET genes. A new gene must have <79% amino acid identity with all previous characterized TET genes to be recorded. A detailed up-to-date database is maintained by prof. Marilyn Roberts: http://faculty.washington.edu/marilynr/ http://faculty.washington.edu/marilynr/tetnomenclature.pdf This Subsystem encodes only TET resistant determinants of the Ribosomal protection type. For tetracycline resistant determinants of other types (efflux pumps, drug modifying enzymes, others) see Subsystem "Tetracycline resistance, efflux and enzymatic types" References: Frontiers in Antibacterial Resistance: A Tribute to Stuart B. Levy Edited by David G. White, Michael N. Alekshun, and Patrick F. McDermot Washington, DC: ASM Press, 2005. ISBN 1-55581-329-1 Roberts MC. 2005. Update on acquired tetracycline resistance genes. FEMS Microbiol Lett, 245(2):195-203. PMID:15837373 Chopra I, Roberts M. 2001. Tetracycline antibiotics: mode of action, applications, molecular biology, and epidemiology of bacterial resistance. Microbiol Mol Biol Rev, 65(2):232-60. PMID:11381101
