identifier: proteintraitsmech:SEED_SUBSYSTEM_Resistance_to_Ethionamide_and_Isoniazid
label: "Resistance to Ethionamide and Isoniazid"
definition: >-
  The antituberculosis drugs Ethionamide (ETH) and Isoniazid = isonicotinylhydrazide (INH) (structural analogs) target InhA, an enzyme involved in mycolic acid biosynthesis. A notable distinction between the two drugs is the lack of cross-resistance in clinical isolates. This is due in part to the fact that INH requires catalase-peroxidase (KatG) activation, while and ETH has been shown to be activated by the gene products of ethA (which is regulated by ethR) Isoniazid is a first-line medication in prevention and treatment of tuberculosis since 1950 (INH) and Ethionamide (1956) is a second-line antimycobacterial drug when resistance to or toxicity from first-line drugs has developed. 1. Target organisms: Mycobacteria 2. Mechanism of action: disruption of mycolic acid synthesis (cell wall synthesis) 3. Molecular target: InhA 4. Mechanism leading to resistance: inhibition of prodrug activation 5. Required for resistance: suppression or inhibition of expression of katG (INH), or suppression or inhibition of expression of ethA (ETH), or overexpession of ethR, or suppression or inhibition of expression of ndh (INH), or pathogen not growing, persistence
