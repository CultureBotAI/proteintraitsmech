label: "AaeAB efflux system for hydroxylated, aromatic carboxylic acids"
definition: >-
  The AaeAB efflux system has been implicated in aromatic carboxylic acid efflux and it is speculated that it's physiological role may be as a "metabolic relief valve" to alleviate toxic effects of imbalanced metabolism.
