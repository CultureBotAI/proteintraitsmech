label: "Nonribosomal peptide synthetases (NRPS) in Frankia sp. Ccl3"
definition: >-
  NRPS synthesize important bacterial secondary metabolites like antibiotics and cytostatics. These compounds are usually synthesized in a stepwise process. In the &#64257;rst step, primary metabolites like amino acids or acyl-CoA derivatives are assembled into speci&#64257;c building blocks. In the second step, these blocks are used by modular megaenzymes like type I polyketide synthases (PKS) or nonribosomal peptide synthetases (NRPS). In the last step, the resulting molecules are modi&#64257;ed by reactions like glycosylations, hydroxylations, or ring formations.
