identifier: proteintraitsmech:SEED_SUBSYSTEM_Cyanophycin_Metabolism
label: "Cyanophycin Metabolism"
definition: >-
  Cyanophycin is a water-insoluble reserve polymer of multi-L-arginyl-poly-L-aspartic acid originally discovered in cyanobacteria. The protein-like polymer serves as a temporary nitrogen reserve, which accumulates during the transition from the exponential- to the stationary-growth phase and disappears when balanced growth resumes. The polymer contains aspartic acid and arginine in an equimolar ratio. The amino acids are arranged in a unique structure: the aspartic acid residues form a poly-(alpha-aspartate) backbone, with their beta-carboxyl groups linked to the alpha-amino groups of arginine residues by isopeptide bonds. At neutral pH and physiological ionic strength, the cyanobacterial cyanophycin is insoluble and accumulates in granules, but it is soluble in diluted acids and bases. Cyanophycin from non-cyanobacterial eubacteria has been found to be highly water-soluble. Cyanophycin synthase catalyzes the ATP-dependent polymerization of arginine and aspartate non-ribosomally in an ATP-dependent elongation reaction. Cyanophycinase, an exopeptidase, depolymerizes cyanophycin by hydrolysis of the alpha-peptide bonds between the aspartate residues of the backbone to yield beta-aspartyl-arginine
