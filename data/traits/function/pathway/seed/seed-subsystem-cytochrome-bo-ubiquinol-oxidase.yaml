label: "Cytochrome bo ubiquinol oxidase "
definition: >-
  Cell respiration is catalyzed by the heme-copper oxidase superfamily of enzymes, which comprises cytochrome c and ubiquinol oxidases. The cytochrome bo3-ubiquinol oxidase, one of two ubiquinol oxidases in Escherichia coli, consists of four protein subunits (I-IV) with apparent molecular masses of 58, 33, 22, and 17 kDa, respectively. Cytochrome bo3 catalyzes the 2-electron oxidation of ubiquinol and the reduction of molecular oxygen to water (Welter et al., 1994)
