identifier: proteintraitsmech:SEED_SUBSYSTEM_NAD_and_NADP_cofactor_biosynthesis_bacterial
label: "NAD and NADP cofactor biosynthesis bacterial"
definition: >-
  Simplified variant codes (only the first position is well defined): A De novo synthesis from Aspartate, combined with salvage of Nicotinate or Nictoniamide and salvage of Nicotinamide Ribose B De novo synthesis from Trp followed by any combination C De novo synthesis from Aspartate, combined with salvage of Nicotinate or Nicotinamide only (Route I or Route II) D De novo synthesis from Aspartate, only E No de novo synthesis, salvage of Nicotinate or Nicotinamide (NmR - optional) F No de novo synthesis, no salvage of Nicotinate or Nicotinamide , only Nicotinamide Ribose G No de novo synthesis, salvage of Nicotinamide only (NmR - optional) H Extreme truncation of every branch. Salvage of NAD -1 Salvage of both NAD and NADP - the details of respective gene/role patterns are provided separately; - some nuances of classification are reflected after the "." Additional positions in teh codes: 1. "x" in any position except first one means "missing gene". In some cases the respective role will be printed after the dot Examples: A.x.NMNDSE - like in pseudomonas. Missing NMN deamidase B.x.F.y - missing KFA in De novo Trp pathway and Salvage of RNm with missing NMNDSE 2.Clearly gapped genom _.gap = gapped genome 3.Special cases ".m" - universal pathway proceeds via NaMNAT activity of NadM (as in Archaea) ".a" - a version of de novo pathway containing ASPDH instead of ASPOX (as in Archaea or Thermotoga) ".F" or ".G" contains respectiev additional aspects (NmR salvage or NMPRT salvage)
definition_source: BV-BRC
trait_axis: FUNCTION
trait_category: FUNC_PATHWAY
term_kind: CLASS
mapping_status: SEEDED
