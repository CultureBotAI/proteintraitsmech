# subsystem_id: Type_VI_secretion_system
identifier: proteintraitsmech:SEED_SUBSYSTEM_Type_VI_secretion_system
label: "Type VI secretion system"
definition: >-
  The T6SS is an important virulence mechanism in several Gram-negative pathogens. In Vibrio cholerae, a minimum of three gene clusters - one main cluster and two auxiliary clusters - are required to form a functional T6SS apparatus capable of conferring virulence toward eukaryotic and prokaryotic hosts. The T6SS shares similarity with the puncturing device of bacteriophages, which is used by these viruses to inject their DNA into bacterial target cells. Bacteria use rapid contraction of a long sheath of the type VI secretion system (T6SS) to deliver effectors into a target cell. The native contracted Vibrio cholerae sheath has been determined by cryo-electron microscopy. The sheath subunits, composed of tightly interacting proteins VipA and VipB, assemble into a six-start helix. The helix is stabilized by a core domain assembled from four &#946; strands donated by one VipA and two VipB molecules. The fold of inner and middle layers is conserved between T6SS and phage sheaths. However, the structure of the outer layer is distinct and suggests a mechanism of interaction of the bacterial sheath with an accessory ATPase, ClpV (tssH), that facilitates multiple rounds of effector delivery.
