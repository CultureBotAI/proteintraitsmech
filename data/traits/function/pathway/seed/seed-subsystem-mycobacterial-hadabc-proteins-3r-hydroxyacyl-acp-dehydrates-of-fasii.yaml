identifier: proteintraitsmech:SEED_SUBSYSTEM_Mycobacterial_HadABC_proteins__3R_-hydroxyacyl-ACP_dehydrates_of_FASII
label: "Mycobacterial HadABC proteins ((3R)-hydroxyacyl-ACP dehydrates of FASII)"
definition: >-
  The missing piece of the type II fatty acid synthase system from Mycobacterium tuberculosis. Only Mycobacteria contain hadC ortholog, but the hadA and hadB genes are conserved among other mycolate-producing genera, Rhodococcus and Nocardia (PMID:17804795). Consistently, both genes either overlap or fuse in a long unique gene, suggesting that their cotranscription and the association of their products are crucial for the physiology of the Corynebacterineae" (PMID:17804795) HadAB gene cluster happens to be located next to LSU ribosomal protein L33p. Albeit functionally unrelated, this Role was included in this SS (as an auxiliary member), because it helps with recognition and annotation of hadA and hadB orthologs
