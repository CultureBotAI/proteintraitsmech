identifier: proteintraitsmech:SEED_SUBSYSTEM_Riboflavin__FMN_and_FAD_biosynthesis_in_Archaea
label: "Riboflavin, FMN and FAD biosynthesis in Archaea"
definition: >-
  From (Osterman A1, Overbeek R. 2003) - Riboflavin (vitamin B2) is an ultimate precursor in the biosynthesis of the universal and indispensable flavonoid red-ox cofactors: flavin mononucleotide (FMN) and flavin adenine dinucleotide (FAD). Biosynthesis of riboflavin in the archaea follows an alternate pathway from that found in bacteria and eukarya (see DIAGRAM under Illustrations Tab above). First, an alternative two-step transformation (via a GTP cyclohydrolase III and formamide hydrolase) occurs instead of the established one-step reaction of GTP-cyclohydrolase II characteristic of bacteria, fungi and plants. Another remarkable variation is the flipped order of the pyrimidine deaminase and reductase steps in eukaryotes and archaea, compared to the standard bacterial biosynthetic route. Both, fungi and archaea contain a monofunctional reductase, homologous to a corresponding domain of the bi-functional protein (encoded by ribD gene) characteristic of most bacteria. A monofunctional and non-orthologous eukaryotic deaminase (Pyr_Da) was identified and characterized, while its archaeal counterpart remains a missing gene. Analysis of chromosomal gene clustering in archaea reveals a strong candidate gene for this functional role. Orthologs of this gene (e.g., MJ0699 in M. jannaschii) are both distantly related to guanosine deaminase and largely conserved in archaea. Initial experiments did not provide verification of the expected enzymatic activity of this and several other candidates [81]. In view of the overwhelming genomic evidence available today, the effort to confirm this conjecture is likely to be continued. From (Grochowski et al., 2009) - Biosynthesis of riboflavin in the archaea follows an alternate pathway from that found in bacteria and eukarya (1). See scheme under Illustrations Tab (within thin green banner above). The proposed archaeal pathway begins with the opening of the imidazole ring of GTP by the action of an archaeal GTP cyclohydrolase III (MJ0145, ArfA). The product of this reaction is 2-amino-5-formylamino-6-ribosylamino-4 (3H)-pyrimidinone 5-monophosphate (FAPy). FAPy is be converted to 2,5-diamino-6-ribosylamino-4(3H)-pyrimidinone 50-phosphate (APy) by formamide hydrolase (MJ0116, ArfB) (4). APy is then reduced to 5-amino-6-ribitylamino- 2,4(1H,3H)-pyrimidinedione phosphate by the MJ0671/ArfC gene product (1). A deamination followed by dephosphorylation (both steps catalyzed by yet unidentified enzymes) then produce the 5-amino-6-ribitylamino-2,4(1H,3H)-pyrimidinedione (ARP), the precursor of riboflavin (and also of coenzyme F420 in methanogenic Archaea) REFERENCES: 1. Graupner M, Xu H, White RH: The pyrimidine nucleotide reductase step in riboflavin and F(420) biosynthesis in archaea proceeds by the eukaryotic route to riboflavin. J Bacteriol 2002, 184:1952-1957. 2. Fischer M, Romisch W, Schiffmann S, Kelly M, Oschkinat H, Steinbacher S, Huber R, Eisenreich W, Richter G, Bacher A: Biosynthesis of riboflavin in archaea studies on the mechanism of 3,4-dihydroxy-2-butanone-4-phosphate synthase of Methanococcus jannaschii. J Biol Chem 2002, 277:41410-41416. 3. Haase I1, M�rtl S, K�hler P, Bacher A, Fischer M. 2003. Biosynthesis of riboflavin in archaea. 6,7-dimethyl-8-ribityllumazine synthase of Methanococcus jannaschii. Eur J Biochem. 2003 Mar;270(5):1025-32. 4. Grochowski LL1, Xu H, White RH. 2009. An iron(II) dependent formamide hydrolase catalyzes the second step in the archaeal biosynthetic pathway to riboflavin and 7,8-didemethyl-8-hydroxy-5-deazariboflavin. Biochemistry. 2009 May 19;48(19):4181-8. 5. Mashhadi Z1, Xu H, Grochowski LL, White RH. 2010. Archaeal RibL: a new FAD synthetase that is air sensitive. Biochemistry. 2010 Oct 12;49(40):8748-55. 6. Osterman A1, Overbeek R. 2003. Missing genes in metabolic pathways: a comparative genomics approach. Curr Opin Chem Biol. 2003 Apr;7(2):238-51.
