identifier: proteintraitsmech:SEED_SUBSYSTEM_Sulfoquinovose_biosynthesis_cluster
label: "Sulfoquinovose biosynthesis cluster"
definition: >-
  The proposed biosynthesis pathway for UDP-sulfoquinovose in S. acidocaldarius: phosphorylated glucose may be generated by agl4, which presumably acts as a precursor for UDP-glucose synthesis by agl2. In the second step, UDP-glucose will be further modified with sulphite by the action of agl3 to create UDP-sulfoquinovose. Eventually, the activated sulfoquinovose is transferred onto the nascent glycan structure.
