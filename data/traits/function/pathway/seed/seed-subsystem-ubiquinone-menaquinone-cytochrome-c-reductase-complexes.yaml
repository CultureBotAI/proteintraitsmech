label: "Ubiquinone Menaquinone-cytochrome c reductase complexes"
definition: >-
  Subsystem under constructions Archaea need to be redone The ubiquinol: cytochrome c oxidoreductase, or the bc1 complex, is a key component of both respiratory and photosynthetic electron transfer and contributes to the formation of an electrochemical gradient necessary for ATP synthesis. Numerous bacteria harbor a bc1 complex comprised of three redox-active subunits, which bear two b-type hemes, one c-type heme, and one [2Fe-2S] cluster as prosthetic groups. Photosynthetic bacteria like Rhodobacter species provide powerful models for studying the function and structure of this enzyme and are being widely used (PMID: 10591533) References Darrouzet E1, Valkova-Valchanova M, Ohnishi T, Daldal F. 1999. Structure and function of the bacterial bc1 complex: domain movement, subunit interactions, and emerging rationale engineering attempts. J Bioenerg Biomembr. 1999 Jun;31(3):275-88. Dibrova DV1, Cherepanov DA, Galperin MY, Skulachev VP, Mulkidjanian AY. 2013. Evolution of cytochrome bc complexes: from membrane-anchored dehydrogenases of ancient bacteria to triggers of apoptosis in vertebrates. Biochim Biophys Acta. 2013 Nov-Dec;1827(11-12):1407-27. PMID: 23871937
