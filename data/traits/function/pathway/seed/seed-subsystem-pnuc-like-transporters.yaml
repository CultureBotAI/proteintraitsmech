# subsystem_id: PnuC-like_transporters
identifier: proteintraitsmech:SEED_SUBSYSTEM_PnuC-like_transporters
label: "PnuC-like transporters"
definition: >-
  The PnuC family is one more example of a transporter family with high variability of specificities predicted by the comparative genomic analysis (Fig. 4). The only two experimentally characterized representatives of this family are the nicotinamide riboside permeases PnuC that are involved in the utilization of this metabolic precursor of NAD in Haemophilus influenzae (Sauer et al., 2004) and Salmonella enterica (Grose et al., 2005). In the enterobacteria, the pnuC gene is located in one operon with the NAD biosynthesis gene nadA, and this operon is regulated by the NAD repressor NadR [61]. Analysis of other NAD-related regulons revealed several pnuC-like genes preceded by candidate binding sites of transcription factors YrxA in the Streptococcus spp., NrtR in Hahella chejuensis, and PnuR in the Vibrio spp. [189,190]. In addition, positional clustering of various pnuC-like genes with genes involved in NAD salvage was observed, e.g. in the Pseudomonas spp. This allows for projecting the nicotinamide riboside permease function to these genes (shown in orange in Fig. 4). Though it was assumed that homologs of PnuC in general represent nicotinamide riboside-specific transporters [67,219], other studies suggest a different functional role for other members of the PnuC family. A large group of pnuC-like transporters (called pnuT) was found in thiamin regulons under control of the THI riboswitch in the Proteobacteria and the Bacteroidetes species (shown in blue in Fig. 4). These pnuT genes were located in conserved gene clusters also encoding outer membrane TonB-dependent transporters (OMPs) and predicted kinases from various families (e.g. a homolog of the thiamin pyrophosphokinase TNR3 from yeast). Based on these data, it was proposed that these hypothetical THI-regulated operons could be involved in the thiamin uptake across the outer and inner membranes (by OMP and PnuT, respectively) and its subsequent phosphorylation to form thiamin pyrophosphate coenzyme [193]. The predicted thiamin transporters PnuT are distributed among several different branches on the phylogenetic tree of the PnuC family (Fig. 4). Interestingly, one branch contains both candidate transporters PnuT and PnuC suggesting that specificity of transporters in this family is flexible in evolution. One more branch on the PnuC family tree contains the predicted riboflavin transporters PnuX. This tentative annotation was based on the observation of pnuX genes preceded by RFN regulatory elements in the Actinobacteria [247] (shown in magenta in Fig. 4). In three Actinobacteria species, the pnuX genes are located in the riboflavin biosynthesis rib operons (Supplemenatry Figure 1), providing additional evidence for the predicted functional role of PnuX. Recently, the function of PnuX from Corynebacterium glutamicum was studied in experiment: as predicted, the transport by PnuX (re-named RibM) was not energy-dependent and had high affinity for riboflavin [248]. Finally, a group of PnuC-like transporters in the Lactobacillus spp. (called PnuN) is co-regulated by the NrdR repressor with ribonuclotide reductases (Nrd) and a deoxynucleoside kinase (Dgk) that are involved in the dNTP synthesis [198] (shown in green in Fig. 4). The pnuN and dgk genes in Enterococcus faecalis form a candidate NrdR-controlled operon. This yields tentative reconstruction of the deoxyribonucleoside salvage pathway, which involves transport and subsequent phosphorylation of deoxyribonucleosides. Overall the PnuC-like transporters are involved in the uptake of unphosphorylated metabolites (nicotinamide riboside, thiamin, riboflavin, and deoxynucleosides) that are then phosphorylated in the cytoplasm by respective kinases, thus allowing to direct the substrate flow inside and to prevent efflux (Supplementary Figure 2). Indeed, in H.influenzae, the PnuC-mediated substrate flow across the membrane is coupled to the rate of nicotinamide riboside phosphorylation [134]. Even with these examples, some might argue that the genomic analysis provides only a limited extension of existing knowledge: characterization of new specificity in an existing family or, at best, description of a new family. Our last example demonstrates that sometimes it is possible to predict new transport mechanisms using only genomic analysis. Please see the following review paper for the figures, details and references: Gelfand MS, Rodionov DA. (2008) Comparative genomics and functional annotation of bacterial transporters. Physics of Life Reviews, 5: 22-49.
