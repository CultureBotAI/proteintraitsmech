identifier: proteintraitsmech:SEED_SUBSYSTEM_Calvin-Benson_cycle
label: "Calvin-Benson cycle"
definition: >-
  The Calvin cycle (reductive pentose phosphate, photosynthetic carbon reduction, Calvin-Benson-Bassham, Benson-Calvin, or CBB cycle) is the most prominent of the autotrophic CO2 fixation systems and is found in photosynthetic eukaryotes, and most photo- and chemo- autotrophic bacteria, including cyanobacteria. It doesn�t occur in most anaerobic bacteria. Three enzymes, RuBisCo (RbcL), phosphoribulokinase (PRK), and sedoheptulose-1,7-bisphosphatase (SBP) function uniquely in Calvin cycle. Two of them, RuBisCo and PRK, taken together, can be used as indicators of the cycle�s presence in a given organism. But not sedoheptulose-1,7-bisphosphatase (SBP) �- this enzymatic activity in bacteria is often catalyzed by fructose-1,6-bisphosphatase with dual sugar specificity and cannot be used for diagnostics. Enzymes of Calvin cycle are often clustered in "cbb" operons - try using "show clusters". Also, it helps to sort organisms "by variant" for viewing this Subsystem.
