# subsystem_id: Mycosporine_synthesis_cluster
identifier: proteintraitsmech:SEED_SUBSYSTEM_Mycosporine_synthesis_cluster
label: "Mycosporine synthesis cluster"
definition: >-
  Mycosporines (mycosporine-like amino acids [MAAs]) are a diverse family of UV-absorbing secondary metabolites that serve as screens against high doses of UV radiation (UVR). They are found in cyanobacteria, some eukaryotic algae, corals, and fungi. MAAs are water soluble and colorless and share a 5-dihydroxy, 5-hydroxymethyl, cyclohex-1, 2-ene ring, with a methoxy group at C-2. This core structure is substituted in C-3 with an amino compound (usually an amino acid or amino alcohol) to form oxomycosporines. Ketone replacement with a second amino compound defines the iminomycosporine group. MAAs present typical UV absorption spectra with a single, narrow, and strongly absorbing band that has a maximum around 310 nm for oxomycosporines and around 330 nm for simple iminomycosporines. These compounds protect the cell by absorbing UVR and dissipating the energy as heat without generating reactive oxygen species. MAAs have found pharmaceutical and cosmetic applications for their ability to protect skin from UV-mediated damage. MAA biosynthesis starts from sedoheptulose-7-phosphate (SHP) in the Calvin-Benson-Bassham cycle that is processed by demethyl 4-deoxygadusol (DDG) synthase and O-methyltransferase (O-MT), respectively, to form 4-deoxygadusol (4-DG), the core structure of mycosporines, followed by addition of glycine to 4-DG to form mycosporine-glycine and further condensation of serine to yield shinorine.
