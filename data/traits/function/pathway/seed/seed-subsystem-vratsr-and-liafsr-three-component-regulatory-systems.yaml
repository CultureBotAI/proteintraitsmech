label: "VraTSR and LiaFSR three-component regulatory systems"
definition: >-
  The LiaRS system originally identified in Bacillus subtilis (Fabret et al., 1999) as one of the signaling system sensing the cell envelope stress in this organism (Mascher et al., 2003). It is linked by genomic context and function to liaF, encoding a membrane protein that acts as a specific inhibitor of LiaRS. The abbreviation �Lia� stands for �lipid II cycle interfering antibiotic response regulator and sensor� (Mascher et al., 2004). Phylogenomic studies revealed that LiaFRS is a conserved cell envelope stress-sensing regulatory system present in many Firmicutes (Jordan et al., 2006; 2008). The orthologous systems were characterized in Streptococcus mutans UA159 (PMID:19251860), Streptococcus pneumoniae R6 (PMID:20118250) and Staphylococcus aureus (as VraTRS) (PMID: 23070169). In B. subtilis and S. mutans, the LiaFSR system is usually activated by the presence of antibiotics that disrupt cell-membrane and peptidoglycan synthesis through alterations of lipid-II metabolism (i.e., bacitracin, daptomycin, ramoplanin, nisin, and vancomycin) (Mascher et al., 2004; Pietiainen etal., 2005; Hachmann etal., 2009; Wecke et al., 2009). It is also weakly induced by other more unspecific stresses that interfere with envelope integrity, such as alkaline shock and secretion stress (Wiegert et al., 2001; Hyyrylainen et al., 2005). LiaR positively autoregulates the expression of the liaIH-liaGFSR operon from a strictly LiaR- dependent promoter (PMID: 23279150). The three-component system VraTSR (vancomycin resistance associated sensor/regulator) in Staphylococcus aureus has been shown to regulate cell-wall peptidoglycan synthesis, and is involved in the expression of beta-lactam and glycopeptide resistance (PMID:23070169, PMID:12864861) It's homologous to the LiaSR TCS of Bacilli (see SS Bacitracin Stress Response).
