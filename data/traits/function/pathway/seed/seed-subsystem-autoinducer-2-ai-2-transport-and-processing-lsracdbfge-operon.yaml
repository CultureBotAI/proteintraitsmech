identifier: proteintraitsmech:SEED_SUBSYSTEM_Autoinducer_2__AI-2__transport_and_processing__lsrACDBFGE_operon
label: "Autoinducer 2 (AI-2) transport and processing (lsrACDBFGE operon)"
definition: >-
  Quorum sensing is a process of chemical communication that bacteria use to assess cell population density and synchronize behavior on a community-wide scale. Communication is mediated by signal molecules called autoinducers. The LuxS autoinducer synthase produces 4,5-dihydroxy-2,3-pentanedione (DPD), the precursor to a set of interconverting molecules that are generically called autoinducer-2 (AI-2). In enteric bacteria, AI-2 production induces the assembly of a transport apparatus (called the LuxS regulated (Lsr) transporter) that internalizes endogenously produced AI-2 as well as AI-2 produced by other bacterial species. AI-2 internalization is proposed to be a mechanism enteric bacteria employ to interfere with the signaling capabilities of neighboring species of bacteria. Following internalization, the kinase LsrK phosphorylates carbon-5 of the open form of DPD. Phosphorylated DPD (P-DPD) binds specifically to the repressor of the lsr operon, LsrR, consistent with P-DPD being the inducer of the lsr operon. Subsequently, LsrG catalyzes the cleavage of P-DPD producing 2-phosphoglycolic acid. This series of chemical events is proposed to enable enteric bacteria to respond to the presence of competitor bacteria by sequestering and destroying AI-2, thereby eliminating the competitors' intercellular communication capabilities. In S. enterica serovar Typhimurium the rapid disappearance of AI-2 is a consequence of its import by an ABC transporter designated the Lsr transporter (luxS regulated). The lsr operon contains seven genes, lsrACDBFGE, and its transcription is activated by AI-2. The first four genes, lsrACDB, encode components of the AI-2 tr. Adjacent to, but transcribed divergently from the lsr operon is lsrR, which encodes a repressor of lsr transcription, and lsrK, which encodes a kinase that phosphorylates intracellular AI-2 following import. Phosphorylation of internalized AI-2 is required for induction of transcription of the lsr operon, suggesting that phospho-AI-2 is the inducer of this system. It is postulated that phospho-AI-2 binds to the LsrR repressor and inactivates it and that this results in derepression of lsr transcription
