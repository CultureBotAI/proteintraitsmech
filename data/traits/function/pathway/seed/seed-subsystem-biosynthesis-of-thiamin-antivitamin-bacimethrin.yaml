# subsystem_id: Biosynthesis_of_thiamin_antivitamin_Bacimethrin
identifier: proteintraitsmech:SEED_SUBSYSTEM_Biosynthesis_of_thiamin_antivitamin_Bacimethrin
label: "Biosynthesis of thiamin antivitamin Bacimethrin"
definition: >-
  This Subsystem encodes the Bacimethrin biosynthetic gene cluster BcmABCD, discovered in Clostridium botulinum A ATCC 19397 by Tadhg Begley's group and reported in PMID:24654570. Summary below quotes this exquisite study - Bacimethrin [see Figure under Illustrations tab above) is an analogue of the thiamin pyrimidine that exhibits antibiotic activity against a variety of yeast and bacteria (PMID:14066391) It's toxicity involves its conversion, by the endogenous thiamin biosynthetic enzymes, to 2&#8242;-methoxythiamin pyrophosphate, which inhibits a subset of the thiamin-dependent enzymes in Escherichia coli (alpha-ketoglutarate dehydrogenase, transketolase, and deoxy-D-xylulose-5-phosphate synthase) (PMID:11527707). BcmA catalyzes the methylenetetrahydrofolate-dependent hydroxymethylation of cytidine 5'-monophosphate (CMP) to give 5-hydroxymethylcytidine 5&#8242;-monophosphate. BcmB catalyzes the N-glycosyl bond cleavage of the latter compound to give 5-hydroxymethylcytosine. It is in turn methylated by BcmC to give Bacimethrin. Bacimethrin is then pyrophosphorylated by BcmD (ThiD) to produce Bacimethrin pyrophosphate A putative thiaminase-I gene, bcmE, is located in the bacimethrin biosynthetic gene cluster. Thiaminases catalyze degradation of thiamin by replacement of the thiazole moiety with a wide range of nucleophiles (type I) or water (type II). Its presence could suggest that BcmE might function as a resistance protein catalyzing the degradation of methoxythiamin. To test this hypothesis, BcmE was incubated with thiamin or 2&#8242;-methoxythiamin as a possible substrate. Only thiamin was degraded by BcmE, hence BcmE and is not involved in protecting C. botulinum from the toxicity of methoxythiamin. This observation suggests that bacimethrin and thiaminase-I are elements of a coordinated antibiotic strategy in which degradation of environmental thiamin by secreted thiaminase-I makes target bacteria more sensitive to the toxicity of bacimethrin. Such a strategy highlights the complex chemical logic underlying the dynamics of microbial communities (PMID:24654570)
