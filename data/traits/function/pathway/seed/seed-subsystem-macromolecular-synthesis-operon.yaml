label: "Macromolecular synthesis operon"
definition: >-
  The macromolecular synthesis (MMS) operon contains three essential genes (rpsU, dnaG, rpoD) whose products ribosomal protein S21 (rpsU), DNA primase (dnaG), and the 70-kDal sigma subunit of RNA are necessary for the initiation of protein, DNA, and RNA synthesis respectively." (PMID: 8316085 Versalovic et al) Originally observed in Escherichia coli and Salmonella typhimurium (PMID: 3005129 Erickson, et al) it is present in a variety of organisms.
