label: "Metal chelatases"
definition: >-
  Subsystem unfinished! Under construction Quoted from PMID: 16835730: "Class II chelatases are defined as metal-inserting enzymes that are homomeric and do not require ATP for activity. The metal chelation reactions catalyzed by these enzymes all encompass the following basic steps: the puckering of the pyrrole ring(s), metal ion insertion, and deprotonation of the pyrrole nitrogens. The structures of several chelatases of this class have been reported, including the protoporphyrin ferrochelatase (HemH) from Bacillus substilis (bFc), human (hFc) and yeast (yFc), cobaltochelatase (CbiK) from Salmonella enterica. The Class II chelatases include CbiX(long) (long version of CbiX) and CbiX(short) (short version of CbiX), cobaltochelatases of vitamin B12 biosynthesis, sirohydrochlorin ferrochelatase SirB of siroheme synthesis, and protoporphyrin ferrochelatase (HemH) of heme biosynthesis. The sequence identity among these chelatases is low, yet they share extensive structural similarity and spatial arrangement of active site residues. CbiX(long) and SirB share approximately 60% similarity but the CbiX(long) proteins contain a C-terminal extension that includes both a histidine-rich region and an Fe�S center. The length of CbiXS proteins typically is about half the size of the long versions of CbiX. CbiX(long) and CbiK are likely to have arisen from gene duplication and fusion events involving cbiX(short). Some, but not all, CbiX(short) proteins contain a histidine-rich region but none are thought to harbor any Fe�S centers"
