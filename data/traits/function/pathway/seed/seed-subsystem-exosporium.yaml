# subsystem_id: Exosporium
identifier: proteintraitsmech:SEED_SUBSYSTEM_Exosporium
label: Exosporium
definition: >-
  In some Bacilli, the distinct outermost layer of spores are well separated from the spore coat. The exosporium is composed of one or more paracrystalline layers surrounded by an outermost 'hairy nap' layer. The precise function of the exosporium is not known. However, as it makes up the surface of the endospore that is exposed to the environment, it may be important in attachment and colonization. The exosporium is also the site of major spore surface antigens. In B. anthracis it may contribute to protection of the spore from the macrophage, masking epitopes recognized by the macrophage, although it is not essential for virulence. The exosporium is composed of proteins, lipids and carbohydrates, and it is synthesized and assembled concomitantly with the cortex and the coat. The exosporium is a loose-fitting, balloon-like structure composed of a paracrystalline basal layer and an external hair-like nap. The filaments of the hair-like nap are formed by a single collagen-like glycoprotein called BclA, whereas the basal layer is composed of a number of different proteins in tight and loose associations. The basal layer proteins also include three enzymes: alanine racemase, inosine-uridine-preferring nucleoside hydrolase, and superoxide dismutase. These proteins may not be structural elements but merely very strongly adsorbed. The first two enzymes degrade the germinants L-alanine and inosine, respectively, and may function to suppress germination. Superoxide dismutase could protect the spore from reactive oxygen species during infection, participate in oxidative cross-linking of coat or exosporium proteins, or moderate germination efficiency upon exposure to superoxide. A processed CotE spore morphogenetic protein is also located in the exosporium (CotE is a major morphogenetic protein in spore coat assembly and is situated between the inner and outer coat layers of the mature spore). Besides the BclA glycoprotein, at least 10 more proteins are tightly associated with the exosporium of B. cereus ATCC 10876, as identified by N-terminal sequencing of proteins from purified, washed exosporium. Eight genes encode likely structural components (exsB, exsC, exsD, exsE, exsF, exsG, exsJ, and cotE). ExsJ is a glycoprotein. Most of the exosporium genes are scattered on the genome.
