identifier: proteintraitsmech:SEED_SUBSYSTEM_Mycobacterial_gene_cluster_associated_with_resistance_against_FAS-II_antibiotics
label: "Mycobacterial gene cluster associated with resistance against FAS-II antibiotics"
definition: >-
  This subsystem encodes a gene cluster associated with resistance against fatty-acid synthase II (FAS-II) antibiotics in Mycobacterium tuberculosis H37Rv. M. tuberculosis possesses an extremely lipid-rich cell wall. The key components of this outer envelope are mycolic acids. Mycolic acids are the product of two fatty-acid synthase systems present in mycobacteria: mammalian-type fatty-acid synthase I (FAS-I) (Smith et al., 2003) and bacterial-type fatty-acid synthase II (FAS-II) (Takayama et al., 2005; White et al., 2005). Quote from PMID:24100560 (paper on Rv0241c): "Rv0241c or HtdX was first identified in the mycobacterial membrane-associated fraction (Gu et al., 2003) and was eventually identified in the mRNA pool when cultured in the presence of several FAS-II drugs (Boshoff et al., 2004). Recent work on heterologous expression of HtdX has shown that it can participate in the yeast mitochondrial fatty-acid synthetic pathway (Gurvitz et al., 2009) but can only restore the dehydratase activity in Escherichia coli (Sacco et al., 2010). This R-specific beta-hydroxyacyl-CoA dehydratase is hypothesized to be involved in an alternative or intermediate fatty-acid synthetic pathway required for antibiotic resistance (Kikuchi & Kusaka, 1983; Boshoff et al., 2004; Sacco et al., 2010). Based on the genomic arrangement in Mycobacteria and STRING functional protein association networks, a putative fatty-acid metabolizing operon was identified showing two genes Rv0241c (HtdX) and Rv0242c (FabG4) could be involved in the pathway (Gurvitz, 2009; Dutta et al., 2011). FabG4, which has been characterized recently, is an NADH-dependent�beta-ketoacyl CoA reductase (Dutta et al., 2011, 2013)�
