identifier: proteintraitsmech:SEED_SUBSYSTEM_Plastoquinone_Biosynthesis
label: "Plastoquinone Biosynthesis"
definition: >-
  Plastoquinone is an electron carrier of the photosynthetic electron transport chain. It is also a cofactor involved in the desaturation of phytoene in the synthesis of carotenoid, a photosynthetic pigment. In cyanobacteria plastoquinone is synthesized by the pathway propsed by Sandre et al.,2012 (PMID: 22166075), as posted under the Illustration tab. It differs significantly from the plastoquinone biosynthetic pathway in plants, which is encoded in SS: "Plastoquinone biosynthesis in plants". Only the first and the last steps of the cyanobacterial pathway are currently known, the rest are still unresolved From PMID:22166075: "During evolution, cyanobacterial ancestors have apparently lost the ability to synthesize ubiquinone and replaced it with PQ-9. Phylogenetically, Slr0926 (PlqA) probably originated from bacterial 4-hydroxybenzoate prenyltransferases involved in ubiquinone biosynthesis, whereas plant HSTs may have evolved from a cyanobacterial homogentisate phytyltransferase for tocopherol biosynthesis. As shown in Figure 10, the use of 4-hydroxybenzoate as the prenyl acceptor necessitates further modifications at the aromatic ring such as decarboxylation, hydroxylation and two methylations to finally yield PQ-9. The Synechocystis sp. genome encodes homologues of the E. coli proteins UbiX/UbiD (decarboxylation), UbiH (hydroxylation) and UbiE (C-methylation) involved in the downstream reactions of UQ-8 biosynthesis. It is therefore very conceivable that the order of the reactions in cyanobacterial PQ-9 biosynthesis is similar to that in the course of UQ-8 biosynthesis in E. coli, with decarboxylation of 3-solanesyl-4-hydroxybenzoate and then hydroxylation preceding methylations of the aromatic ring at positions 2 and 3"
