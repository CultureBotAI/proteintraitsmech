label: "Teicoplanin resistance in Staphylococci"
definition: >-
  Teicoplanin and vancomycin are the drugs of choice against multidrug-resistant methicillin-resistant Staphylococcus aureus. Their antibacterial activity is based on the ability to bind the terminal d-alanyl-d-alanine present in the lipid-II-linked peptidoglycan precursor and in peptidoglycan intermediates, thereby inhibiting transglycosylation and transpeptidation of the cell wall. Though both drugs interact with the same target, teicoplanin anchors to the membrane while vancomycin forms dimers to increase its activity. Even though teicoplanin is more active than vancomycin against staphylococci, resistance to teicoplanin is more easily acquired than resistance to vancomycin. In contrast to the van gene-mediated glycopeptide resistance in enterococci, resistance in S. aureus is not due to acquisition of foreign elements but formed endogenously. The rsbUVW,and sigB operon had been proposed to contribute to teicoplanin resistance, but later rejected with the insight that a sigma(B)-controlled gene might be the actual source of teicoplanin resistance. We propose the paralog of tcaB present in Staphylococcus aureus genomes to play this role. 1. Target organisms: Staphylococci, enterococci 2. Mechanism of action: 3. Molecular target: 4. Mechanism leading to resistance: 5. Required for resistance:
