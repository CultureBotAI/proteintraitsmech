# subsystem_id: Na-driven_2-hydroxyglutarate_pathway
identifier: proteintraitsmech:SEED_SUBSYSTEM_Na-driven_2-hydroxyglutarate_pathway
label: "Na-driven 2-hydroxyglutarate pathway"
definition: >-
  Anaerobic bacteria like clostridia and fusobacteria ferment alpha-amino acids via (R)-2-hydroxyacyl-CoA, which is dehydrated to enoyl-CoA by syn-elimination.This reaction is of great mechanistic interest, since the beta-hydrogen, to be eliminated as proton, is not activated (pK 40-50). A mechanism has been proposed, in which one high-energy electron acts as cofactor and transiently reduces the electrophilic thiol ester carbonyl to a nucleophilic ketyl radical anion. The 2-hydroxyacyl-CoA dehydratases are two-component systems composed of an extremely oxygen-sensitive component A, an activator, and component D, the actual dehydratase. Component A, a homodimer with one [4Fe-4S]cluster, transfers an electron to component D, a heterodimer with 1-2 [4Fe-4S]clusters and FMN, concomitant with hydrolysis of two ATP. From component D the electron is further transferred to the substrate, where it facilitates elimination of the hydroxyl group. In the resulting enoxyradical the beta-hydrogen is activated (pK14). After elimination the electron is handed-over to the next incoming substrate without further hydrolysis of ATP. The helix-cluster-helix architecture of component A forms an angle of 105 degrees, which probably opens to 180 degrees upon binding of ATP resembling an archer shooting arrows (archerases).
