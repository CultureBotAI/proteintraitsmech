identifier: proteintraitsmech:SEED_SUBSYSTEM_Aminoglycoside_modifying_enzymes__O-phosphotransferases
label: "Aminoglycoside modifying enzymes: O-phosphotransferases"
definition: >-
  Quoted from PMID:20833577: Aminoglycoside antibiotics are a complex family of compounds characterized for having an aminocyclitol nucleus (streptamine, 2-deoxystreptamine, or streptidine) linked to amino sugars through glycosidic bonds. In addition, other compounds such as spectinomycin, which is an aminocyclitol not linked to amino sugars, or compounds that include the aminocyclitol fortamine are also included in this family (Bryskier, 2005; Veyssier and Bryskier, 2005). Aminoglycosides are primarily used in the treatment of infections caused by gram-negative aerobic bacilli, staphylococci, and other gram-positives (Yao and Moellering, 2007). Due to the nature of the mechanism of uptake of aminoglycosides, which requires respiration, anaerobic bacteria are intrinsically resistant (see below) (Bryan et al., 1979). Aminoglycoside resistance mechanisms include: 1. the deactivation of aminoglycosides by various modifications at &#8722;OH or &#8722;NH2 groups of the 2-deoxystreptamine nucleus or the sugar moieties. Aminoglycoside modifying enzymes include acetyltransferases (AACs), nucleotidyltranferases (ANTs), or phosphotransferases (APHs) 2. the reduction of the intracellular concentration of aminoglycosides by changes in outer membrane permeability, decreased inner membrane transport, active efflux, and drug trapping 3. the alteration of the 30S ribosomal subunit target by mutation 4. the methylation of the aminoglycoside binding site (target modification)
