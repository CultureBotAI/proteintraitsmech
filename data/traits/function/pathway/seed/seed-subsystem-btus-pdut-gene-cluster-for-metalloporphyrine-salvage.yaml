label: "BtuS-PduT gene cluster for metalloporphyrine salvage"
definition: >-
  Quoted from http://www.jbc.org/content/278/42/41148.full �The phylogenetic tree of CobN-related proteins has three main branches (data not shown). The first two branches comprise the B12-regulated cobalt chelatases CobN involved in the CBL synthesis and the magnesium chelatases ChlH required for the bacteriochlorophyll biosynthesis. The third branch, named here BtuS, includes hypothetical proteins of unknown function from diverse bacterial and archaeal genomes. In all cases, the btuS genes are clustered with a new gene, named btuT, which encodes a hypothetical transporter with four predicted TMSs. In addition n, the btuST clusters of P. aeruginosa, R. palustris, and N. europaea (<< SG: and B. fragilis too) are co-localized with hypothetical outer membrane receptor genes encoding proteins homologous to the vitamin B12 receptor BtuB. Moreover, in P. gingivalis and B. fragilis, the btuST genes form a candidate operon with the iron-induced hemoglobin transport genes hmuYR (45). The BtuB-like HmuR receptor was recently found to bind hemoglobin, hemin, various porphyrins, and metalloporphyrins (46). In archaea, the btuST genes are linked to the btuW gene encoding a hypothetical transporter with seven predicted TMSs. These observations allow us to propose that the hypothetical transporter BtuT, chelatase BtuS, and homologs of the BtuB/HmuR receptors (or BtuW in archaea) are involved in the transport and salvage of various metalloporphyrines rather than in the CBL biosynthesis�
