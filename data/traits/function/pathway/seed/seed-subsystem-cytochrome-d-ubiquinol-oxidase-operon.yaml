label: "Cytochrome d ubiquinol oxidase operon"
definition: >-
  Cytochrome bd is a respiratory quinol: O2 oxidoreductase found in many prokaryotes, including a number of pathogens. It is the two component terminal oxidase that catalyses quinol-dependent, Na+-independent oxygen uptake, the terminal reaction in the aerobic respiratory chain. Cytochrome bd-I is expressed by E. coli when the O2 tension is low and is controlled by the two global transcriptional regulators, Arc and Fnr.
