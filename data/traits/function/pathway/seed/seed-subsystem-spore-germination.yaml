identifier: proteintraitsmech:SEED_SUBSYSTEM_Spore_germination
label: "Spore germination"
definition: >-
  See also Subsystem: "Spore germinant receptors" Quoted from (Setlow, 2014): "Spores of Bacillus species can remain in their dormant and resistant states for years, but exposure to agents such as specific nutrients can cause spores' return to life within minutes in the process of germination. This process requires a number of spore-specific proteins, most of which are in or associated with the inner spore membrane (IM). These proteins include -- (i) germinant receptors (GRs) that respond to nutrient germinants, (ii) GerD protein, which is essential for GR-dependent germination, (iii) SpoVA proteins that form a channel in spores' IM through which the spore core's huge depot of dipicolinic acid is released during germination, and (iv) cortex-lytic enzymes (CLEs) that degrade the large peptidoglycan cortex layer, allowing the spore core to take up much water and swell, thus completing spore germination. While much has been learned about nutrient germination, a number of major questions remain unanswered..." (PMID: 24488313)
