identifier: proteintraitsmech:SEED_SUBSYSTEM_Beta-lactamases_Ambler_class_B
label: "Beta-lactamases Ambler class B"
definition: >-
  Bacterial resistance to beta-lactam antibiotics can be achieved by any of three strategies: - the production of beta-lactam-hydrolyzing beta-lactamase enzymes, - the utilization of beta-lactam-insensitive cell wall transpeptidases, - active expulsion of beta-lactam molecules from Gram-negative cells by way of efflux pumps - and loss of porins. This Subsystem captures only beta-lactam-hydrolyzing beta-lactamase enzymes of the Ambler class A. Other classes of beta-lactamases are encoded in the following Subsystems: -- Beta-lactamases Ambler class A -- Beta-lactamases Ambler class C -- Beta-lactamases Ambler class D Quoted from van Hoek et al., 2011: The &#946;-lactam antibiotics work by inhibiting the cell wall synthesis by binding to so-called penicillin-binding proteins (PBPs) in bacteria and interfering with the structural cross linking of peptidoglycans and as such preventing terminal transpeptidation in the bacterial cell wall. As a consequence it weakens the cell wall of the bacterium and finally results in cytolysis or death due to osmotic pressure (Kotra and Mobashery, 1998; Andes and Craig, 2005). Quoted from Koch AL, 2000: "It is with very little difficulty that the genes for penicillin-binding proteins can be slightly modified (a few point mutations) to let water into the active site and turn a transpeptidase into a hydrolase. Hydrolysis of the antibiotic is a path chemically similar to its action on a muropeptide and would quickly destroy the four-membered strained ring compound and could occur at high rate. Because this is similar to the transpeptidase action needed for sacculus expansion, with just a few changes, a functional PBP for growth could have been duplicated and one copy turned from a transpeptidase into a D,D- hydrolase (&#946;-lactamase). Considering how easy this is theoretically, one is not surprised that this has happened many times and in many ways and in many lines of descent. ...The available amino acid sequences provide evidence that make it is clear that the lactamases came from a PBP and did not arise independently... The amino acid sequences of the genes for this large family of penicillin-recognizing enzymes: the PBPs per se, penicillin-sensing proteins, and &#946;-lactamases have several highly conserved sequences of amino acid (Figure 5). It is clear that all the proteins together form a super family."
