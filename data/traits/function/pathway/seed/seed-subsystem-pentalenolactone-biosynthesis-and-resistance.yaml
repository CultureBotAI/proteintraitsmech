label: "Pentalenolactone Biosynthesis and Resistance"
definition: >-
  Pentalenolactone is a sesquiterpenoid antibiotic that is produced by many Streptomycete species. Pentalenolactone is effective against bacteria, fungi, protozoa, and DNA viruses. The antibiotic irreversibly deactivates the glyceraldehyde-3-phosphate dehydrogenase glycolytic enzyme. Additionally, it inhibits smooth muscle cell proliferation.
