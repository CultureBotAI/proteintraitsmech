label: "Multiple Antibiotic Resistance MAR locus"
definition: >-
  The Mar operon (for 'Multiple Antibiotic Resistance') is a clinically important regulatory locus in some Enterobacteriaceae controlling expression of over 60 genes, including upregulation of multidrug efflux systems and downregulation of porins. MarA is a transcriptional activator (PMID: 8383113), which participates in controlling several genes involved in resistance to antibiotics, multidrug efflux (PMID:20211899), oxidative stress, organic solvents [White97], and heavy metals (PMID: 10498949). MarA is unstable due to proteolysis, providing rapid shut-off of the transcriptional response once the inducing conditions have subsided. The repressor MarR is auto-regulated through the repression of the marRAB operon. MarB is part of the marRAB operon, it encodes a small putative protein of unknown function. Two other proteins in E.coli, SoxS and Rob, are related to MarA. SoxS and Rob are dual transcriptional regulators (PMID:1400156, PMID:9324261). These 3 proteins activate a common set of about 50 target genes, the marA/soxS/rob regulon, involved in antibiotic resistance, superoxide resistance , and tolerance to organic solvents and heavy metals (PMID:12067348). The activity of each protein is induced by different signals: the activity of Rob is increased with dipyridyl, bile salts, or decanoate (PMID: 12791142), and the activities of MarA and SoxS are increased by the aromatic weak acid salicylate (PMID:11395452) and oxidative stress (PMID:8955629, respectively. Many genes are regulated by all three proteins; but some genes are regulated by only one of them. References: Ruiz C1, Levy SB. 2010. Many chromosomal genes modulate MarA-mediated multidrug resistance in Escherichia coli. Antimicrob Agents Chemother, 54(5):2125-34. PMID:20211899 Alekshun MN1, Levy SB. 1999. The mar regulon: multiple resistance to antibiotics and other toxic chemicals. Trends Microbiol, 7(10):410-3. PMID: 10498949 Ariza RR1, Cohen SP, Bachhawat N, Levy SB, Demple B. 1994 Repressor mutations in the marRAB operon that activate oxidative stress genes and multiple antibiotic resistance in Escherichia coli. J Bacteriol. Jan;176(1):143-8. PMID: 8282690 Cohen SP1, H�chler H, Levy SB. 1993. Genetic and functional analysis of the multiple antibiotic resistance (mar) locus in Escherichia coli. J Bacteriol, 175(5):1484-92. PMID:8383113 Mol Microbiol. 2002 Jun;44(6):1611-24. PMID: 12067348 Genomics of the marA/soxS/rob regulon of Escherichia coli: identification of directly activated promoters by application of molecular genetics and informatics to microarray data. Martin RG1, Rosner JL.
