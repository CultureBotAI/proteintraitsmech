label: "Fructoselysine and glucoselysine"
definition: >-
  The epsilon amino group of lysine can react with a sugar. The resulting products can be repaired and/or utilized by a number of organisms. Salmonella can use fructoselysine and glucoselysine as sole nitrogen source.
