identifier: proteintraitsmech:SEED_SUBSYSTEM_Glycine_cleavage_system
label: "Glycine cleavage system"
definition: >-
  Glycine decarboxylase system (GDC) catalyses oxidative decarboxylation and deamination of glycine with the formation of CO2, NH3 and the concomitant reduction of NAD+ to NADH. The remaining methylene carbon of glycine is then transferred to 5,6,7,8- tetrahydropteroylpolyglutamate (tetrahydrofolate, THF) to form N5,N10-methylene-5,6,7,8-tetrahydropteroylpolyglutamate (CH2�THF). CH2�THF reacts with a second molecule of glycine in a reaction catalysed by serine hydroxymethyltransferase (SHMT) to form serine. The net reaction catalysed is: 2 Glycine + NAD+ + H2O = Serine + CO2 + NH3 + NADH + H+
