identifier: proteintraitsmech:SEED_SUBSYSTEM_rRNA_modification_related_cluster_including_tlyA
label: "rRNA modification related cluster including tlyA"
definition: >-
  tlyA encodes a 2'-O-methyltransferase that modifies nucleotide C1409 in helix 44 of 16S rRNA and nucleotide C1920 in helix 69 of 23S rRNA. Loss of these rRNA methylations confers resistance to capreomycin and viomycin. Many bacterial genera including enterobacteria lack a tlyA gene and the ensuing methylations and are less susceptible than mycobacteria to capreomycin and viomycin.
