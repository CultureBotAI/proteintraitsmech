label: "L-2-amino-4-methoxy-trans-3-butenoic acid synthesis"
definition: >-
  Lee X1, Fox A, Sufrin J, Henry H, Majcherczyk P, Haas D, Reimmann C. 2010. Identification of the biosynthetic gene cluster for the Pseudomonas aeruginosa antimetabolite L-2-amino-4-methoxy-trans-3-butenoic acid. J Bacteriol, 192(16):4251-5, PMID:20543073 Abstract L-2-amino-4-methoxy-trans-3-butenoic acid (AMB) is a potent antibiotic and toxin produced by Pseudomonas aeruginosa. Using a novel biochemical assay combined with site-directed mutagenesis in strain PAO1, we have identified a five-gene cluster specifying AMB biosynthesis, probably involving a thiotemplate mechanism. Overexpression of this cluster in strain PA7, a natural AMB-negative isolate, led to AMB overproduction.
