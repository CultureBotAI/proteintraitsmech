# subsystem_id: TonB-ExbBD_energy_transducing_system
identifier: proteintraitsmech:SEED_SUBSYSTEM_TonB-ExbBD_energy_transducing_system
label: "TonB-ExbBD energy transducing system"
definition: >-
  The TonB system (TonB/ExbB/ExbD) transduces the protonmotive force (pmf) of the cytoplasmic membrane to the outer membrane to provide energy for a number of TonB-dependent transporters and TonB-dependent trans-envelope signalling systems. TonB-dependent transporters are bacterial outer membrane proteins that bind and transport siderophores (ferric chelates), as well as vitamin B(12), nickel complexes, and carbohydrates. The transport process requires energy in the form of proton motive force and a complex of three inner membrane proteins, TonB-ExbB-ExbD to transduce this energy to the outer membrane (PMID: 20420522) TonB-dependent regulatory systems consist of six components: - a specialized outer membrane-localized receptor (TonB-dependent transducer), - a cytoplasmic membrane-localized anti-sigma factor and - an extracytoplasmic function (ECF)-subfamily sigma factor. This sophisticated complex senses signals from outside the bacterial cell and transmits them via two membranes into the cytoplasm, leading to transcriptional activation of target genes. TonB-dependent transducers might be important for pathogenicity (PMID:15993072)
