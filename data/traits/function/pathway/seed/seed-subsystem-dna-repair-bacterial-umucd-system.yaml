label: "DNA repair, bacterial UmuCD system"
definition: >-
  Under SOS induction conditions: RecA cleaves LexA repressor, derepressing expression of UmuC and UmuD. RecA cleaves UmuD, creating the active form, UmuD'. RecA, Ssb, and UmuD' active UmuC as a DNA polymerase that can cross abasic sites in the template.
