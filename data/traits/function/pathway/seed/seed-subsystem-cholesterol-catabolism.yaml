# subsystem_id: Cholesterol_catabolism
identifier: proteintraitsmech:SEED_SUBSYSTEM_Cholesterol_catabolism
label: "Cholesterol catabolism"
definition: >-
  The bacterial catabolism of steroids has importants as a potential means of producing bioactive steroids from natural, low-cost sterols such as &#946;-sitosterol and cholesterol. A pathway responsible for the aerobic degradation of the latter via 4-androstene-3,17-dione (AD) and 3-hydroxy-9,10-seconandrost-1,3,5(10)-triene-9,17-dione (3-HSA) may be pieced together from biochemical and genetic studies in diverse bacteria. In some Mycobacterium and Rhodococcus species, the aliphatic side chain at C17 is removed via a process similar to &#946;-oxidation involving progressively shorter carboxylic acids. In these strains, 3-ketosteroid &#916;1-dehydrogenase (KSTD) and 3-ketosteroid 9&#945;-hydroxylase catalyze the opening of ring B and aromatization of ring A to yield 3-HSA. The subsequent degradation of 3-HSA to 9,17-dioxo-1,2,3,4,10,19-hexanorandrostan-5-oic acid (DOHNAA) via oxygenolytic cleavage of ring A is specified by the tes genes in the testosterone-degrading strain Comamonas testosteroni TA441. In Rhodococcus equi, the propionate moiety of DOHNAA is removed via &#946;-oxidation. Many of the genes involved in steroid catabolism have yet to be identified, and many of the pathway enzymes are poorly characterized, particularly those involved in degrading the bicycloalkanone originating from rings C and D.
