label: "Arginine succinyltransferase pathway"
definition: >-
  The arginine succinyltransferase pathway is an ammonia-generating pathway of aerobic arginine catabolism. Disruption of astB eliminates succinylarginine dihydrolase activity and prevents arginine utilization but does not impair ornithine catabolism.
