label: "Acyl-CoA thioesterase II"
definition: >-
  Acyl-CoA thioesterase II is an Acyl-CoA thioesterase that is very different from Acyl-CoA thioesterase in both sequence and structure. Its precise role is not fully known, but it seems specific for short to medium length 3-hyroxy acyl chains (perhaps 3-hydroxybutyric acid to 3-hydroxydecanoic acid). It has been proposed that it is present to purify the pool of acyl-CoA. Mycobacteria and relatives seem to have a large number quite similar paralogs. It has a few distant paralogs, which might be associated with the synthesis of particular compounds.
