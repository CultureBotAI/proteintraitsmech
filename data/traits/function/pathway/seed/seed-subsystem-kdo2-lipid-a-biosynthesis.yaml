# subsystem_id: KDO2-Lipid_A_biosynthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_KDO2-Lipid_A_biosynthesis
label: "KDO2-Lipid A biosynthesis"
definition: >-
  Lipopolysaccharide (LPS) is the major surface molecule of Gram-negative bacteria and consists of three distinct structural domains: O-antigen, core, and lipid A. The lipid A (endotoxin) domain of LPS is a unique, glucosamine-based phospholipid that serves as the hydrophobic anchor of LPS and is the bioactive component of the molecule that is associated with Gram-negative septic shock. The structural genes encoding the enzymes required for the biosynthesis of Escherchia coli lipid A have been identified and characterized. Lipid A is often viewed as a constitutively synthesized structural molecule. Escherichia coli lipid A is synthesized on the cytoplasmic surface of the inner membrane by a conserved pathway of nine constitutive enzymes. Following attachment of the core oligosaccharide, nascent core-lipid A is flipped to the outer surface of the inner membrane by the ABC transporter MsbA, where the O-antigen polymer is attached. Diverse covalent modifications of the lipid A moiety may occur during its transit from the outer surface of the inner membrane to the outer membrane. For Lipid A modification system see Subsystem: Lipid A modifications; Author: master:OlgaZ. ======FUNCTIONAL VARIANTS:============================ 1.0 - Organisms, producing lipid A (endotoxin) and containing the complete set of lipid A and KDO2 biosynthesis genes; 1.1 - Only gene LpxH (UDP-2,3-diacylglucosamine hydrolase) is missing which possibly reflects the presence of an unrecognised, but functionally equivalent enzyme; 1.12 - still only gene LpxH is missing but protein of unknown function DUF1009 present in very strong cluster with all lipid A biosynthesis genes and possibly it's a candidate for this function; 1.x - Organisms, producing lipid A, but having some missed genes (except gene LpxH); 2.0 � Organisms, not producing lipid A, but containing some of lipid A biosynthesis genes; (-1) � no lipid A biosynthesis.
