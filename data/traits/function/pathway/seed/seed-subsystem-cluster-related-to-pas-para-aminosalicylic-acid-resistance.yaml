label: "Cluster related to PAS - para-aminosalicylic acid resistance"
definition: >-
  para-Aminosalicylic acid (PAS) entered clinical use in 1946 as the second exclusive drug for the treatment of tuberculosis. Studies demonstrated the PAS-mediated disruption of iron acquisition. Recent studies have revealed that PAS is a prodrug that ultimately corrupts one-carbon metabolism through inhibition of the formation of reduced folate species.
