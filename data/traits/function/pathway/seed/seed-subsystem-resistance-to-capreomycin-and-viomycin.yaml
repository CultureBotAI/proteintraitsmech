# subsystem_id: Resistance_to_Capreomycin_and_Viomycin
identifier: proteintraitsmech:SEED_SUBSYSTEM_Resistance_to_Capreomycin_and_Viomycin
label: "Resistance to Capreomycin and Viomycin"
definition: >-
  0. Antibiotic class: Capreomycin and Viomycin are cyclic peptide antibiotics 1. Organisms antibiotic is used against: Mycobacteria 2. Mechanism of action: Inhibition of protein synthesis 3. Molecular target: Interface between two ribosome subunits 4. Mechanism of drug resistance: Target modification 5. Required for resistance: Loss or inactivation of 16S/23S rRNA 2'-O-methyltransferase, encoded by tlyA. Loss of these specific rRNA methylations confers resistance to capreomycin and viomycin. 6. Detailed description of resistance mechanism(s): The tlyA encodes a 2'-O-methyltransferase that modifies nucleotide C1409 in helix 44 of 16S rRNA and nucleotide C1920 in helix 69 of 23S rRNA. Loss of these previously unidentified rRNA methylations confers resistance to capreomycin and viomycin. Many bacterial genera including enterobacteria lack a tlyA gene and the ensuing methylations and are less susceptible than mycobacteria to capreomycin and viomycin. Note, that ribosomes lacking TlyA methylation are capreomycin resistant. This is an unusual mechanism, given that resistance to most drugs that interact with ribosomes has been associated with changes in rRNA sequences, acquisition of methylated bases, alterations in ribosomal proteins, or acquisition of activities that inactivate the drug (PMID:8761724). Although unusual, it is not unprecedented as resistance to kasugamycin, an aminoglycoside antibiotic, is due to the loss of a methylase, RsmA (also known as KsgA), which methylates bases 1518 and 1519 of the E. coli ribosomal 16S rRNA (16).
