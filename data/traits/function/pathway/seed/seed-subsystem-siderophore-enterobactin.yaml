identifier: proteintraitsmech:SEED_SUBSYSTEM_Siderophore_Enterobactin
label: "Siderophore Enterobactin"
definition: >-
  Siderophore enterobactin is a triscatechol derivative of a cyclic triserine lactone that enables bacteria to recover iron from their environment. Believed earlier to be unique to Gram-negative bacteria, enterobactin has been isolated recently from two Gram-positive Streptomyces species. It is a cyclic compound of three 2,3-dihydroxybenzoylserine units joined in a cyclic structure by lactone linkages (see molecular diagram on slide two). Enterobactin is synthesized under low iron concentration conditions and excreted into the environment where it binds Fe(III) with high affinity and specificity. The ferrisiderophore complexes are taken up into the cell by specific ATP-binding cassette transporter complex. From (Chen et al., 2009): Enterobactin biosynthesis proceeds via an upper chemical pathway that forms 2,3-dihydroxybenzoate (2,3-DHB) from chorismate and a lower, iterative pathway that assembles enterobactin from L-serine and 2,3-DHB. The lower pathway (see Tab �Illustrations�) employs the two nonribosomal peptide synthetases (NRPSs) EntB and EntF. The phosphopantetheinyl transferase (PPTase) �EntD� catalyzes the transfer of pantetheinephosphate from CoA to the Ser residue of the 2,3-DHB carrier domain of EntB and of the peptidyl carrier domain of EntF to generate holo-EntB and holo-EntF, respectively. EntE catalyzes the adenylation of 2,3-DHB and the subsequent aroyl transfer to the pantetheine thiol of holo-EntB. The adenylation domain of holo-EntF catalyzes the adenylation of L-Ser and subsequent transfer of an acyl group to the pantetheine thiol carrier domain of holo-EntF. The EntF condensation domain then catalyzes the transfer of the 2,3-DHB unit to the amine group of the EntF-tethered L-Ser. The 2,3-DHB-Ser unit is then transferred to the active site Ser of the EntF cyclizing thioesterase domain, thereby freeing the pantetheine thiol for acquisition of a second 2,3-DHB-Ser-DHB unit. It in turn is transferred to the Ser moiety side chain of 2,3-DHB-Ser tethered to the TE domain. Following the addition of a third 2,3-DHB-Ser unit, the chain is cyclized by the thioesterase domain to form enterobactin. The genes encoding the enterobactin biosynthetic enzymes are clustered within cotranscriptional units, one of which includes EntC and EntA of the upper pathway and EntE, EntB, and EntH (also known as ybdB) of the lower pathway.
