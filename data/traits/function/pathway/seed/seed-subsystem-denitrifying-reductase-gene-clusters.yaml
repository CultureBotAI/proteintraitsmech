identifier: proteintraitsmech:SEED_SUBSYSTEM_Denitrifying_reductase_gene_clusters
label: "Denitrifying reductase gene clusters"
definition: >-
  Denitrification is the process of reducing nitrate to dinitrogen gas. The intermediates of this process are Nitrate -> Nitrite -> Nitric Oxide -> Nitrous Oxide -> Dinitrogen. Four gene clusters control each step of denitrification: the nar gene cluster (nitrate reductase), the nir gene cluster (nitrite reductase), the nor gene cluster (nitric oxide reductase), and the nos gene cluster (nitrous oxide reductase).
