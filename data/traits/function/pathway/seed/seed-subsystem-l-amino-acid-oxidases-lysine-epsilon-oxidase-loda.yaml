# subsystem_id: L-Amino_acid_oxidases:_lysine-epsilon_oxidase_LodA
identifier: proteintraitsmech:SEED_SUBSYSTEM_L-Amino_acid_oxidases__lysine-epsilon_oxidase_LodA
label: "L-Amino acid oxidases: lysine-epsilon oxidase LodA"
definition: >-
  L-Amino acid oxidases (L-AAOs) have been generally described as flavoproteins that oxidize amino acids releasing the corresponding ketoacid, ammonium and hydrogen peroxide. The generation of hydrogen peroxide gives to these enzymes antimicrobial characteristics. They are involved in processes such as biofilm development and microbial competition. L-AAOs are of great biotechnological interest in different applications such as the design of biosensors, biotransformations and biomedicine (PMID: 25886995) Marinomonas mediterranea synthesizes LodA, the first known L-AAO, which contains a quinone cofactor in place of FAD. LodA has lysine-epsilon oxidase activity (EC 1.4.3.20) and catalyzes oxidative deamination of free L-lysine into 6-semialdehyde 2-aminoadipic acid, ammonia and hydrogen peroxide (PMID: 17030025). Homologues to LodA have been detected in several Gram-negative bacteria (lodA and lodB operon), where they are involved in biofilm development. LodA is secreted to the external medium when the culture reaches the stationary phase. LodB, on the other hand, has only been detected inside cells, but it is not secreted. The expression of the lysine-epsilon oxidase activity in M. mediterranea requires functional copies of both genes since mutants lacking either lodA or lodB do not show any LOD activity. The active form of LodA containing the quinonic cofactor is intracellularly generated in a process that takes place only in the presence of LodB, suggesting that the latter is involved in this process. Moreover, in the absence of one of the proteins, the stability of the partner protein is compromised leading to a marked decrease in its cellular levels (PMID: 25886995) Sequence alignment of the LodA-like proteins allowed detection of conserved Cys and Trp residues that are forming part of the cysteine tryptophilquinone (CTQ) cofactor in LodA (PMID: 25886995) Recently GoxA, a quinoprotein with sequence similarity to LodA but with a different enzymatic activity (glycine oxidase instead of lysine-epsilon-oxidase) has been described.
