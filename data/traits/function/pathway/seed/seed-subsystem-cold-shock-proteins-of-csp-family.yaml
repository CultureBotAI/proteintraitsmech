label: "Cold shock proteins of CSP family"
definition: >-
  "Cold shock proteins (Csps) comprise a family of small proteins that are structurally highly conserved and bind to single-stranded nucleic acids via their nucleic acid binding motifs RNP1 and RNP2. Bacterial Csps are mainly induced after a rapid temperature downshift to regulate the adaptation to cold stress, but are also present under normal conditions to regulate other biological functions. The structural unit characteristic for Csps occurs also as a cold shock domain (CSD) in other proteins and can be found in wide variety of organisms from bacteria to vertebrates. Important examples are the Y-box proteins that are known to be involved in regulation of several transcription and translation processes" (quoted from PMID:17437059) References: Horn G1, Hofweber R, Kremer W, Kalbitzer HR. 2007 Structure and function of bacterial cold shock proteins. Cell Mol Life Sci. Jun;64(12):1457-70. PMID: 17437059 MICHAEL H.W. WEBER AND MOHAMED A. MARAHIEL Bacterial cold shock responses Science Progress (2003), 86 (1/2), 9�75 Article in Science Progress � February 2003 DOI: 10.3184/003685003783238707 Feng W1, Tejero R, Zimmerman DE, Inouye M, Montelione GT. 1998 Solution NMR structure and backbone dynamics of the major cold-shock protein (CspA) from Escherichia coli: evidence for conformational dynamics in the single-stranded RNA-binding site. Biochemistry. Aug 4;37(31):10881-96. PMID: 9692981 Mayr B1, Kaplan T, Lechner S, Scherer S. 1996 Identification and purification of a family of dimeric major cold shock protein homologs from the psychrotrophic Bacillus cereus WSBC 10201. J Bacteriol. 1996 May;178(10):2916-25. PMID: 8631682
