identifier: proteintraitsmech:SEED_SUBSYSTEM_Riboflavin__FMN_and_FAD_metabolism_with_fusion_events
label: "Riboflavin, FMN and FAD metabolism with fusion events"
definition: >-
  For Archaeal Riboflavin biosynthesis pathway please see Subsystem "Riboflavin, FMN and FAD biosynthesis in Archaea" ==================== In plants and the majority of bacteria the order of first few steps of the Riboflavin biosynthetic pathway are as follows: --Diaminohydroxyphosphoribosylaminopyrimidine deaminase (EC 3.5.4.26) --5-amino-6-(5-phosphoribosylamino)uracil reductase (EC 1.1.1.193) While in fungi, Archaea and possibly a few bacterial species the order is flipped (and hence, substrates differ slightly): --2,5-diamino-6-ribosylamino-pyrimidinone 5-phosphate reductase, fungal/archaeal (EC 1.1.1.302) --2,5-diamino-6-ribitylamino-pyrimidinone 5-phosphate deaminase, fungal (EC 3.5.4.-) An attempt was made in this SS to project (conservatively!) the 2 latter Roles from the characterized Archaeal or fungal proteins onto bacterial homologs. However, this is merely a prediction at this point. Currently there are no experimental data to support the existence of the latter pathway variation in any Eubacteria. Two auxiliary protein families are also included in this SS: --Possibly 2,5-diamino-6-ribosylamino-pyrimidinone 5-phosphate reductase, fungal --2,5-diamino-6-ribosylamino-pyrimidinone 5-phosphate reductase (EC 1.1.1.302) homolog Both show some homology with archaeal/fungal reductase, but are unlikely to be actual riboflavin biosynthetic enzymes. They could be catalyzing metabolite repair of erroneous or toxic byproducts of this pathway (ref) or are simply unrelated to it. This, too, is merely a prediction and should be taken with a grain of salt VARIANT CODES - not defined yet
