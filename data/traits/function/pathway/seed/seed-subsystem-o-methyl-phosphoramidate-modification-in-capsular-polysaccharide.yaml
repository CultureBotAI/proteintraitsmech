identifier: proteintraitsmech:SEED_SUBSYSTEM_O-methyl_phosphoramidate_modification_in_capsular_polysaccharide
label: "O-methyl phosphoramidate modification in capsular polysaccharide"
definition: >-
  Campylobacter jejuni produces over 47 different capsular structures, including a unique O-methyl phosphoramidate (MeOPN) modification, that improves the pathogenicity of this bacterium and promotes evasion of the host immune response. It is present on most C. jejuni isolates (PMID: 24498018) Recently, the three steps of a rather unusual biosynthetic pathway for the assembly of the MeOPN modification were elucidated (PMID: 29023101; PMID: 28650156). It was shown that the enzyme Cj1418 catalyzes the phosphorylation of the amide nitrogen of l-glutamine to form l-glutamine phosphate (PMID: 28650156). The enzyme Cj1416 catalyzes the displacement of pyrophosphate from MgCTP by l-glutamine phosphate to form CDP-l-glutamine. The enzyme Cj1417 subsequently catalyzes the hydrolysis of CDP-l-glutamine to generate cytidine diphosphoramidate and l-glutamate. It is proposed that the enzyme Cj1416 be named CTP:phosphoglutamine cytidylyltransferase and that the enzyme Cj1417 be named &#947;-glutamyl-CDP-amidate hydrolase (PMID: 29023101). No EC numbers have been assigned yet for these novel enzymes
