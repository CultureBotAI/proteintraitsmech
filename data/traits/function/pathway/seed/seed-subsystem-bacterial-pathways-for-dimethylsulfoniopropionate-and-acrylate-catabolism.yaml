identifier: proteintraitsmech:SEED_SUBSYSTEM_Bacterial_pathways_for_dimethylsulfoniopropionate_and_acrylate_catabolism
label: "Bacterial pathways for dimethylsulfoniopropionate and acrylate catabolism"
definition: >-
  The compatible solute dimethylsulfoniopropionate (DMSP) is made by many marine phytoplankton, including dinoflagellates, diatoms, and coccolithophores, several marine macroalgal seaweeds and a few land plants. This zwitterion probably acts as an osmolyte, although other anti-stress functions have been suggested. Its high concentrations in the producing organisms (~0.5 M in some cases) coupled to their wide distributions in the oceans, means that DMSP is one of the most abundant (109 tons made per annum) organic, sulfur-containing molecules on Earth [reviewed in refs !, 2, 3] Furthermore, in the oceans it is a major source of carbon and sulphur for marine bacteria that break it down to products such as dimethyl sulphide (DMS), which are important in their own right and have wide-ranging effects, from altering animal behaviour to seeding cloud formation (PMID: 21986900). DMS-derived sulfur influences global temperature and Earth�s homeostasis through effects on cloud cover, mediated through aerosols derived from its oxidation (Charlson et al. 1987). The catabolic fate of DMSP in different bacteria is complex and varied [see scheme under the Illustrations tab above]. The two main pathways of bacterial degradation, routing DMSP to distinctly different biogeochemical fates, have recently been identified: (1) demethylation of DMSP to methylmercaptopropionate (MMPA), which is then further catabolized to methane thiol and acetate, mediated by the genes dmdA, dmdB, dmdC, and dmdD. This route accounts for most of the global DMSP catabolic flux. It facilitate retention of carbon and sulfur in the marine microbial food web and does not liberate any dimethylsulfide; (2a) cleavage of DMSP to dimethyl sulphide (DMS) plus acrylate (can be catalyzed by no less than 5 (!) distinct DMSP lyases: dddL, dddP, dddQ, dddW, and dddY) (2b) cleavage of DMSP to DMS plus 3-hydrohypropionate (catalyzed by DddD) These pathways and the combinations thereof are flagged by variant codes 1, 2, 3, 4 in this SS spreadsheet. The legends for the codes are given below under "Variant Description"
