identifier: proteintraitsmech:SEED_SUBSYSTEM_Inclusion_membrane_proteins_supporting_intracellular_life_styles_in_Chlamydiales
label: "Inclusion membrane proteins supporting intracellular life styles in Chlamydiales"
definition: >-
  The Chlamydiales include intracellular pathogens that pass through several developmental stages. Elementary bodies (EB), released from lysed host cells, are extracellular infectious entities that gain entry to new host cells and progress to an intracellular developmental stage of replicative capabilities. These reticulate bodies (RB) initiate a stage of high metabolic activity, and cell populations increase until the host cell resources are depleted. Transformation back to the EB stage then occurs prior to host cell lysis. Members of Chlamydiales can respond to the host defense mechanisms via progression to an alternative developmental state called �persistence�. Inclusion membrane proteins (IMP) have been implicated in the morphogenesis that attends the transition to persistence in some Chlamydiales like Chlamydia trachomatis (Ctra), an obligate intracellular pathogen. IMPs are thought to have important functions such as nutrient transport and prevention of lysosomal fusions as reviewed by �Lo et el. 2012. In this paper the main focus is on the importance of tryptophan (TRP) residue content in proteins. Both zero Trp content and high TRP content are explored and both serve a purpose within the infectious abilities of the Chlamydial organism. Within the 50 IMP examined in the following publication, most are of average TRP content, some have zero Trp and others have high Trp. Inclusion membrane proteins have been identified by �Li. Et al. 2008. Chlamydial infection begins with the entry of elementary bodies (EB) (the infectious form) into the host by endocytosis. Internalized EBs rapidly differentiate within the endosomal vacuole into reticulate bodies (RB), the metabolically active, but noninfectious form of chlamydial organisms. After numerous rounds of replication, RBs can then differentiate back into EBs and spread to other adjacent cells. Chlamydia trachomatis accomplish their biosynthesis, replication and differentiation within the cytoplasmic vacuole (termed inclusion). Inclusion membranes serve as both a barrier for protection of the intravascular organism and as a gate for interactions with the host cells. The Chlamydial organism imports nutrients and metabolic intermediates from the host cell and secrets Chlamydial factors into the host cell. The mechanisms for this exchange across inclusion membranes are largely unknown and Chlamydial IMPs have become an area of intensive investigations. In this paper, the authors have isolated 50 proposed inclusion membrane protein, which they have divided into three groups. 22 of them were localized to the inclusion membrane, seven are isolated as Intrainclusions, and the remaining 21 are as yet undefined. Inclusion membrane proteins have also been examined for Protochlamydia amoeophila, a chlamydial endosymbiont of free-living amoebae. Of the 23 identified putative inclusion membrane proteins, four were localized to the inclusion membrane, as described by Heinz et al. "Lo et el. 2012. The Alternative Translational Profil That Underlies the Immune-Evasive State of Persistence in Chlamydiaceae Exploits Differential Tryptophan Contents of the Protein Repertoire. MMBR Vol. 76, pgs 405-443". "Li et al. 2008. Characterization of Fifty Putative Inclusion Membrane Proteins Encoded in the Chlamydia trachomatis Genome. Infection and Immunity: Vol. 76, pgs 2746-57". "Heinz et al. 2010. Inclusion Membrane Proteins of Protochlamydia amoebophila UWE25 Reveal a Conserved Mechanism for Host Cell Interaction among Chlamydiae. Journal of Bacteriology: Vol. 192, pgs 5093-5102".
