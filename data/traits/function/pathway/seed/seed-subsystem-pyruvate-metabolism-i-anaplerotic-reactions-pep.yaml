identifier: proteintraitsmech:SEED_SUBSYSTEM_Pyruvate_metabolism_I__anaplerotic_reactions__PEP
label: "Pyruvate metabolism I: anaplerotic reactions, PEP"
definition: >-
  This SS is a collection of enzymes contributing to PEP-pyruvate-oxaloacetate node in different microorganisms. This node is of vital importance for the distribution of the carbon flux among catabolism, anabolism, and energy supply of the cell. Its organization in different species is surprisingly diverse. This subsystem was initially encoded by master:GaryH_UCSD, whose contribution we gratefully acknowledge.
