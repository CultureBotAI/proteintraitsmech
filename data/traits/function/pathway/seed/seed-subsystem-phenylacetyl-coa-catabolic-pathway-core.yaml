# subsystem_id: Phenylacetyl-CoA_catabolic_pathway_(core)
identifier: proteintraitsmech:SEED_SUBSYSTEM_Phenylacetyl-CoA_catabolic_pathway__core
label: "Phenylacetyl-CoA catabolic pathway (core)"
definition: >-
  Phenylacetic acid (PhAc) or phenylacetyl-CoA (PhAc-CoA) can be catabolized into general metabolites aerobically by a variety of gram-positive and gram-negative organisms. This central pathway is referred to as the PhAc-CoA catabolon core. The routes involved in the specific degradation of aromatic compounds into the PhAc or PhAc-CoA intermediates are called upper pathways of the PhAc-CoA catabolon (covered by other subsystems). This catabolon may be the first example of a hybrid pathway because, although it is aerobic, its catabolic intermediates (aryl-CoA derivatives) were, until recently, considered to be specific to the anaerobic catabolic pathways. The PhAc-CoA catabolon (core) was shown to contain (i) a transport system (PaaL and PaaM); (ii) a PhAc-activating enzyme, i.e. the PhAc-CoA ligase (PaaF); (iii) a ring-hydroxylating complex (PaaG, PaaH, PaaI, PaaJ and PaaK); (iv) a ring-opening protein (PaaN); (v) a &#946;-oxidation-like system (PaaA, PaaB, PaaC and PaaE); and (vi) two regulatory proteins (PaaX and PaaY). Note, that the gene denomination is according to Luengo JM, Garc�a JL, Olivera ER. Mol Microbiol. 2001 Mar;39(6):1434-42.[PMID: 11260461]!
