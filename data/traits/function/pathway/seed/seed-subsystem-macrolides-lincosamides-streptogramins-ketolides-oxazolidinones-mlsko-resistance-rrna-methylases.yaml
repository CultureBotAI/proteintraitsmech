identifier: proteintraitsmech:SEED_SUBSYSTEM_Macrolides__lincosamides__streptogramins__ketolides__oxazolidinones__MLSKO__resistance__rRNA_methylases
label: "Macrolides, lincosamides, streptogramins, ketolides, oxazolidinones (MLSKO) resistance: rRNA methylases"
definition: >-
  Quoted from PubMed:22046172 (van Hoek et al., 2011) - "The first macrolide, erythromycin A, was discovered in the early 1950s (McGuire et al., 1952). The main structural component of this molecule is a large lactone ring to which amino and/or neutral sugars are attached by glycosidic bonds. Macrolides have a similar mode of antibacterial action and comparable antibacterial spectra as two other antibiotic classes, i.e., lincosamides and streptogramins B. Consequently, these antibiotics, although chemically distinct, have been grouped together as Macrolide�Lincosamide�Streptogramin B (MLS) antibiotics (Roberts, 2002). Recently this class of antibiotics was extended due to the development to include synthetic drugs: the ketolides (Zhanel et al., 2002; Ackermann and Rodloff, 2003) and oxazolidinones (Diekema and Jones, 2000), which resulted in the MLSKO family of antibiotics (Roberts, 2008). Macrolides, lincosamides, and streptogramins B inhibit protein synthesis by binding to the 50S ribosomal subunit of bacteria (Weisblum, 1995; Roberts, 2002)� Bacterial resistance mechanisms to these antibiotics include rRNA methylases, ABC-F type ribosomal protection proteins, efflux pumps, and drug inactivating enzymes (Roberts et al., 1999; Roberts, 2008). The latter group can be further subdivided in esterases, lyases, phosphorylases, and transferases. The most common mechanism of MLS resistance is due to the presence of rRNA methylases, encoded by the erm genes. These enzymes methylate the adenine residue(s) resulting in MLS resistance. The methylated adenine prevents the binding of the drugs from binding to the 50S ribosomal subunit. This Subsystem encodes only the latter type of resistance. Three additional Subsystems encode other (MLSKO) resistance mechanisms
