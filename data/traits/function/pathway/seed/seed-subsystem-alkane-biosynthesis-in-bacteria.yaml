# subsystem_id: Alkane_biosynthesis_in_bacteria
identifier: proteintraitsmech:SEED_SUBSYSTEM_Alkane_biosynthesis_in_bacteria
label: "Alkane biosynthesis in bacteria"
definition: >-
  A novel alkane biosynthesis pathway from cyanobacteria that consists of an acyl-acyl carrier protein reductase and an aldehyde decarbonylase, which together convert intermediates of fatty acid metabolism to alkanes and alkenes. The heterologous expression of the alkane operon in Escherichia coli leads to the production and secretion of C13 to C17 mixtures of alkanes and alkenes. As suggested by Schirmer and Co. "These genes and enzymes can now be leveraged for the simple and direct conversion of renewable raw materials to fungible hydrocarbon fuels." The operon is actually larger and includes adjacent genes coding for Sepiapterin reductase (EC 1.1.1.153) and GTP cyclohydrolase I (EC 3.5.4.16) type 1 (see subsystem "Pterin synthesis related cluster") and connect this alkane biosynthesis pathway to Pterin and Folate biosynthesis.
