label: "The Chv two-component regulatory system"
definition: >-
  The ExoS/ChvI two-component regulatory system (TCS) of Alphaproteobacteria controls the exopolysaccharide succinoglycan production and flagellum biosynthesis. It is important for host (Medicago species) interactions (symbiosis and virulence).
