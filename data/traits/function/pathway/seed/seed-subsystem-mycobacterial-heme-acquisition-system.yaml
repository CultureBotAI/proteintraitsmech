label: "Mycobacterial heme acquisition system"
definition: >-
  Tullius MV1, Harmston CA, Owens CP, et al., Goulding CW. 2011. Discovery and characterization of a unique mycobacterial heme acquisition system. PNAS USA, 108(12):5051-6. PMID:21383189 Abstract Mycobacterium tuberculosis must import iron from its host for survival, and its siderophore-dependent iron acquisition pathways are well established. Here we demonstrate a newly characterized pathway, whereby M. tuberculosis can use free heme and heme from hemoglobin as an iron source. Significantly, we identified the genomic region, Rv0202c-Rv0207c, responsible for the passage of heme iron across the mycobacterial membrane. Key players of this heme uptake system were characterized including a secreted protein and two transmembrane proteins, all three specific to mycobacteria. Furthermore, the crystal structure of the key heme carrier protein Rv0203 was found to have a unique fold. The discovery of a unique mycobacterial heme acquisition pathway opens new avenues of exploration into mycobacterial therapeutics.
