identifier: proteintraitsmech:SEED_SUBSYSTEM_Siderophore_Mycobactin
label: "Siderophore Mycobactin"
definition: >-
  Sideroforms are small, soluble iron chelators. These substances are generally secreted by the organism to compete with environmental iron binding molecules for available iron. Siderophore synthesis is typically controlled by extracellular iron abundance, and these molecules display a high affinity for ferric iron. Four types of structurally distinct molecules are thought to be involved in iron acquisition in mycobacteria, salicylic acid and citric acid being the simplest, followed by two classes of more complex siderophores. The first, the mycobactins (MBs), are distinguished primarily by the presence of a phenyloxazolidine ring, while the second class, the exochelins, are peptidic siderophores whose iron-chelating ability is associated with ornithine-derived hydroxamates. MBs and exochelins are complex molecules with very high affinities for iron and are integral to the bacterial strategy for obtaining iron from the environment.
