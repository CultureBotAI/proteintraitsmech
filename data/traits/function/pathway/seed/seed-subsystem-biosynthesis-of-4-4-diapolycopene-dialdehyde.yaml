# subsystem_id: Biosynthesis_of_4,4'-diapolycopene_dialdehyde
identifier: proteintraitsmech:SEED_SUBSYSTEM_Biosynthesis_of_4_4_-diapolycopene_dialdehyde
label: "Biosynthesis of 4,4'-diapolycopene dialdehyde"
definition: >-
  C(30) carotenoids have been described in Staphylococcus and in methylotrophic bacteria. C30 dialdehyde is a dark-reddish purple pigment. 4,4'-diapolycopene is converted to 4,4'-diapolycopene aldehyde by CntNb. 4,4'-diapolycopene-dialdehyde dehydrogenase (DDALDH) converts 4,4'-diapolycopene-dialdehyde into 4,4'-diapolycopene-diacid. CrtNb is not a desaturase but rather a novel carotenoid oxidase catalyzing oxidation of the terminal methyl group(s) of 4,4'-diaponeurosporene and 4,4'-diapolycopene to the corresponding terminal aldehyde.
