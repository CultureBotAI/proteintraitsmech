label: "Actinobacterial signal transduction system MtrAB-LpqB"
definition: >-
  Mol Microbiol. 2010 Apr;76(2):348-64. PMID:20233304 A lipoprotein modulates activity of the MtrAB two-component system to provide intrinsic multidrug resistance, cytokinetic control and cell wall homeostasis in Mycobacterium. Nguyen HT1, Wolff KA, Cartabuke RH, Ogwang S, Nguyen L. Abstract The MtrAB signal transduction system, which participates in multiple cellular processes related to growth and cell wall homeostasis, is the only two-component system known to be essential in Mycobacterium. In a screen for antibiotic resistance determinants in Mycobacterium smegmatis, we identified a multidrug-sensitive mutant with a transposon insertion in lpqB, the gene located immediately downstream of mtrA-mtrB. The lpqB mutant exhibited increased cell-cell aggregation and severe defects in surface motility and biofilm growth. lpqB cells displayed hyphal growth and polyploidism, reminiscent of the morphology of Streptomyces, a related group of filamentous Actinobacteria. Heterologous expression of M. tuberculosis LpqB restored wild-type characteristics to the lpqB mutant. LpqB interacts with the extracellular domain of MtrB, and influences MtrA phosphorylation and promoter activity of dnaA, an MtrA-regulated gene that affects cell division. Furthermore, in trans expression of the non-phosphorylated, inactive form of MtrA in wild-type M. smegmatis resulted in phenotypes similar to those of lpqB deletion, whereas expression of the constitutively active form of MtrA restored wild-type characteristics to the lpqB mutant. These results support a model in which LpqB, MtrB and MtrA form a three-component system that co-ordinates cytokinetic and cell wall homeostatic processes. PMID:20233304 Trends Microbiol. 2006 Oct;14(10):444-9. PMID:16934981 MtrAB-LpqB: a conserved three-component system in actinobacteria? Hoskisson PA1, Hutchings MI. Abstract Streptomyces coelicolor is the model organism for the actinobacteria, a group of high-GC Gram-positive bacteria with members that are notable both for their industrial importance as antibiotic producers and for their pathogenicity. The S. coelicolor genome encodes a subgroup of sensor kinases that is genetically linked to lipoprotein genes, at least one of which functions as an accessory protein to its co-translated kinase. Another member of this subgroup, MtrB, is widely conserved in the actinobacteria, along with its presumed cognate response regulator MtrA and the lipoprotein LpqB. Here, we postulate a possible role for LpqB in the MtrAB signal transduction pathway. We discuss what is known about this pathway in the actinobacteria and offer insights into why an essential response regulator does not necessarily need its cognate sensor kinase for activation.
