label: "Antibiotic targets in DNA processing"
definition: >-
  DNA gyrase and Topoisomerase IV subunits are targeted by multiple fluoroquinolone and aminocoumarin antibiotics, which leads to disruption of bacterial DNA replication, DNA damage and cell death Point mutations in gyrA or gyrB (encoding DNA gyrase subunits A and B respectively) often result in resistance to these antibiotics
