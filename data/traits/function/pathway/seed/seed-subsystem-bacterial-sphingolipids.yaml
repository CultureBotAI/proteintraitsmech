label: "Bacterial Sphingolipids"
definition: >-
  Sphingolipids are a class of lipids containing a backbone of sphingoid bases, a set of aliphatic amino alcohols that includes sphingosine. A sphingolipid with an R group consisting of a hydrogen atom only is a ceramide. Other common R groups include phosphocholine, yielding a sphingomyelin, and various sugar monomers or dimers. They were first discovered in mammalian brain extracts. Quoted from (Sohlenkamp & Geiger, 2015): "Sphingolipids (SLs) are ubiquitous components of the eukaryotic cytoplasmic membrane where they have important functions in signal transduction processes and in the formation of lipid rafts. In contrast, SLs occur only in a few bacteria, mainly belonging to the CFB group and the Sphingomonadales of the Alphaproteobacteria, but they are also present in a few Deltaproteobacteria such as Bdellovibrio, Cystobacter fuscus, My. stipitatus, S. cellulosum and M. xanthus (Keck et al. 2011; Lorenzen et al. 2014). Sequence analysis based on the presence of genes encoding for putative serine palmitoyltransferases (SPTs) indicates that SLs might be present in a few Alphaproteobacteria outside the Sphingomonadales and even in a few Beta- and Gamma- Proteobacteria. A variety of SL headgroups has been described in bacteria, such as ceramides, ceramide phosphoethanolamines, glucosyl sphingenine and ceramide phosphoinositols (Eckau, Dill and Budzikiewicz 1984; Stein and Budzikiewicz 1988; Keck et al. 2011; Lorenzen et al. 2014). In the Sphingomonadales, SLs are mainly decorated with sugar residues. In Bacteroides species, ceramide phosphorylethanolamine and ceramide phosphorylglycerol have been described. The eukaryotic genes involved in SL biosynthesis have identified but little is known about SL synthesis in bacteria (Dickson 2010; Geiger et al. 2010; Pata et al. 2010). Only the first step, catalyzed by SPT, is characterized in detail (Lowther et al. 2011, 2012). Even the crystal structures of the SPTs from Sphingomonas paucimobilis, S. wittichii and Sphingobacterium multivorum have been determined (Yard et al. 2007; Ikushiro et al. 2009; Raman et al. 2010). In eukaryotes, acyl-CoA and serine are the substrates for this enzyme, whereas for the enzyme from S. wittichii acyl-ACP has been suggested as acyl donor, because the gene-encoding SPT forms an operon with a gene encoding a putative ACP (Geiger et al. 2010; Raman et al. 2010). SLs are often 2-hydroxylated and the alpha-hydroxylase catalyzing this reaction has been identified and characterized from different bacteria (Matsunaga et al. 1997; Ring et al. 2009; Fujishiro et al. 2011). Not much is known about the functions of bacterial SLs. It has been described that some Gram-negative bacteria, such as Sp. capsulata, Sp. adhaerens and S. cellulosum, lack LPS in their outer membrane and instead have glycosphingolipids as functional replacements (Kawahara et al. 2000, 2001; Keck et al. 2011)" References Sohlenkamp C, Geiger O. 2015. Bacterial membrane lipids: diversity in structures and pathways. FEMS Microbiol Rev. 2015 Apr 9. pii: fuv008 [Epub ahead of print] PMID: 25862689 Raman MC1, Johnson KA, Clarke DJ, Naismith JH, Campopiano DJ. 2010. The serine palmitoyltransferase from Sphingomonas wittichii RW1: An interesting link to an unusual acyl carrier protein. Biopolymers, 93(9):811-22. PMID: 20578000 Lowther J1, Naismith JH, Dunn TM, Campopiano DJ. Structural, mechanistic and regulatory studies of serine palmitoyltransferase. Biochem Soc Trans. 2012 Jun 1;40(3):547-54. PMID: 22616865 Ring MW1, Schw�r G, Bode HB. 2009. Biosynthesis of 2-hydroxy and iso-even fatty acids is connected to sphingolipid formation in myxobacteria. Chembiochem. 2009. 10(12):2003-10. PMID: 19575369 Ikushiro H, Islam MM, Tojo H, Hayashi H. 2007. Molecular characterization of membrane-associated soluble serine palmitoyltransferases from Sphingobacterium multivorum and Bdellovibrio stolpii. J Bacteriol, 189(15):5749-61. PMID: 17557831
