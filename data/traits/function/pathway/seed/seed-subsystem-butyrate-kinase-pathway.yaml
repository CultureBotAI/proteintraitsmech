# subsystem_id: Butyrate_kinase_pathway
identifier: proteintraitsmech:SEED_SUBSYSTEM_Butyrate_kinase_pathway
label: "Butyrate kinase pathway"
definition: >-
  Butyrate synthesis by anaerobic bacteria can occur via butyrate kinase and phosphotransbutyrylase or via butyryl-coenzyme A (CoA):acetate CoA-transferase. In the solventogenic bacterium Clostridium acetobutylicum two molecules of acetyl coenzyme A (acetyl-CoA) are condensed and subsequently reduced to butyryl-CoA in a sequence of reactions that resembles the reverse &#946;-oxidation of fatty acids. For the final step of butyrate synthesis from butyryl-CoA, two alternative pathways are known: the enzymes phosphotransbutyrylase and butyrate kinase convert butyryl-CoA to butyrate with the intermediate formation of butyryl-phosphate. This pathway, which is found in C. acetobutylicum, is analogous to the formation of acetate from acetyl-CoA and leads to energy generation in the form of ATP. Alternatively, a butyryl-CoA:acetate CoA-transferase transfers the CoA moiety to external acetate, which leads to the formation of acetyl-CoA and butyrate.
