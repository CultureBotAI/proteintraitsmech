identifier: proteintraitsmech:SEED_SUBSYSTEM_DevBCA_efflux_pump_transporter__of_ABC_type__cyanobacterial
label: "DevBCA efflux pump transporter (of ABC type) cyanobacterial"
definition: >-
  Homologs of this particular ABC-type exporter occur mostly in cyanobacteria, but also in some Planctomycetes. DevB from Anabaena sp. strain PCC 7120 was partially characterized as a membrane fusion component of an ABC pump, probably a glycolipid exporter required for heterocyst differentiation, namely for the formation of the laminated layer (PMID:9570404). However, many cyanobacteria posses multiple transporters of this type (e.g. Nostoc sp. PCC 7120 has seven members). Their substrates are unknown The bona fide heterocyst-specific exporter described in PMID: 9570404 corresponds to - fig|103690.1.peg.4017 fig|103690.1.peg.4018 fig|103690.1.peg.4019 in this database All other homologs are NOT necessarily heterocyst specific, as they occur in cyanobacterial species lacking heterocysts
