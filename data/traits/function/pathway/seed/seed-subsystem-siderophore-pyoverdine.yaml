identifier: proteintraitsmech:SEED_SUBSYSTEM_Siderophore_Pyoverdine
label: "Siderophore Pyoverdine"
definition: >-
  Pyoverdines (PVDs) are complex siderophores produced by members of the fluorescent Pseudomonas. They comprise a dihydroxyquinoline fluorescent chromophore joined to a peptide of remarkably variable length and composition. Close to 40 structurally different pyoverdines have been identified to date, from different species of Pseudomonas, with each strain making a single (and characteristic) form of pyoverdine; although they can utilize many different pyoverdines. As a fluorescent pigment, it represents a useful marker for bacterial differentiation. P. aeruginosa strains, for example, secrete one of three distinct pyoverdines (Types I�III). Pyoverdines are composed of three parts: (i) a fluorescent dihydroxyquinoline chromophore that is common to all pyoverdines; (ii) an acyl side chain (either dicarboxylic acid or amide) bound to the amino group of the chromophore; and (iii) a strain-specific peptide chain linked via an amide bound to the C1 (rarely C3) carboxyl group of the chromophore. Pyoverdines are of considerable scientific interest because of their contribution to pathogenicity of P. aeruginosa (Meyer et al. 1996; Takase et al. 2000) and because of their role in the ecology of soil pseudomonads and their possible involvement in biological control of plant pathogens (Loper and Henkels 1999; Weller et al. 2002) Genes responsible for the biosynthesis, excretion, uptake and regulation of these high-affinity siderophores are located either at a single locus or at up to three different loci in the genomes of the four pseudomonads analyzed. The peptide backbone of PVD is assembled by non-ribosomal peptide synthetases (NRPSs) and modified by accessory enzymes in the cytoplasm, and probably the periplasm. Regulation of PVD production and uptake depends on two extracytoplasmic sigma factors (ECF-sigmas), PvdS and FpvI, together with one anti-sigma, FpvR.
