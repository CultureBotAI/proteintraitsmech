label: "NAD consumption"
definition: >-
  In addition to its role as redox cofactor, NAD is consumed by a number of non-redox reactions. Among NAD-consuming enzymes are bacterial DNA ligase CobB/Sir2. ADP ribosylating bacterial toxins etc. Aome of these reactions may be formally considered as entry points to NAD degradation )catabolism) and recycling pathways.
