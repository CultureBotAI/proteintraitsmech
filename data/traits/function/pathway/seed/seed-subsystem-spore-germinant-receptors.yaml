# subsystem_id: Spore_germinant_receptors
identifier: proteintraitsmech:SEED_SUBSYSTEM_Spore_germinant_receptors
label: "Spore germinant receptors"
definition: >-
  Quoted from (Paredes-Sabja et al., 2008): Bacillus and Clostridium species have the ability to form metabolically dormant spores that are extremely resistant to environmental stresses, such as heat, radiation, and toxic chemicals. However, dormant spores must first go through germination and then outgrowth to be converted to vegetative cells. Spore germination has been studied most extensively for Bacillus subtilis and can be initiated by a variety of chemicals, including nutrients, cationic surfactants, and enzymes, as well as by hydrostatic pressure. Nutrient germinants for spores of Bacillus species include L-alanine, a mixture of L-asparagine, D-glucose, D-fructose, and potassium ions (AGFK), and inosine. These nutrient germinants interact with cognate receptors located in the inner spore membrane, stimulating the release of monovalent cations (H+, Na+, and K+), divalent cations (Ca2+, Mg2+, and Mn2+), and the spore core�s large depot (~20% of core dry weight) of pyridine-2,6-dicarboxylic acid (dipicolinic acid [DPA]), accompanied by an increase in the water content of the spore core. DPA is released as a 1:1 chelate with divalent cations, predominantly Ca2+ (Ca-DPA), and Ca-DPA release triggers further events in spore germination. Most important among the latter is the hydrolysis of the spore�s peptidoglycan cortex by one or more spore cortex lytic enzymes (SCLEs), which allows the core to expand and to take up even more water to the level found in growing cells. This event, in turn, restores protein movement and enzyme action in the spore core and leads to resumption of energy metabolism and macromolecular synthesis.
