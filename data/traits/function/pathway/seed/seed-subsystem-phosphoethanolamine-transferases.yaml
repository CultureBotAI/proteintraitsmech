identifier: proteintraitsmech:SEED_SUBSYSTEM_Phosphoethanolamine_transferases
label: "Phosphoethanolamine transferases"
definition: >-
  The original mcr-1 gene characterized in (PMID:26603172), conferring resistance to polymyxin colistin in Gram-negative bacteria is not represented CoreSEED. However, the folowing 3 PEGs appear very similar and could (potentially) cause such resistance. No experimental data proving or disproving this hypothesis are currently available: fig|553217.3.peg.1639 - 63% identity to mcr-1 fig|749219.3.peg.1291 - 59% identity to mcr-1 fig|246195.3.peg.526 - 54% identity to mcr-1 They are currently annottaed in this database as "Lipid A phosphoethanolamine transferase => potentially related to polymyxin resistance protein MCR-1" Quoted from PMID:26603172: "The mechanism of resistance to polymyxins is modification of lipid A, resulting in reduction of polymyxin affinity. Until now, all reported polymyxin resistance mechanisms are chromosomally mediated, and involve modulation of two component regulatory systems (eg, pmrAB, phoPQ, and its negative regulator mgrB in the case of K pneumoniae) leading to modification of lipid A with moieties such as phosphoethanolamine or 4-amino-4-arabinose� The deduced aminoacid sequence of the mcr-1 gene product, MCR-1, aligned closely with phospho- ethanolamine transferases (EptA)�"
