# subsystem_id: dTDP-rhamnose_synthesis_--_gjo
identifier: proteintraitsmech:SEED_SUBSYSTEM_dTDP-rhamnose_synthesis_--_gjo
label: "dTDP-rhamnose synthesis -- gjo"
definition: >-
  Rhamnose is a 6-deoxyhexose sugar which is widely distributed in O-antigens of gram-negative bacteria as part of the lipopolysaccharide (LPS). Also this compound is often found in capsular polysaccharides, which are covalently bound to the cell wall, and in exopolysaccharides, which are loosely associated with the cell wall. L-dTDP-rhamnose is the sugar-nucleotide precursor of these rhamnose moieties and is formed in a four-step reaction from glucose 1-phosphate. The reaction involves the enzyme activities of glucose-1-phosphate thymidylyl transferase, dTDP-glucose-4,6-dehydratase, dTDP-4-keto-l-rhamnose-3,5-epimerase, and dTDP-l-rhamnose synthase encoded by the genes that are commonly designated rfbABCD, respectively. =========Variant codes:============================= 1.0 - organisms with all four enzymes of dTDP-L-rhamnose biosynthesis pathway; 2.0 - organisms with all four enzymes of dTDP-L-rhamnose biosynthesis pathway and clustered with them rhamnosyl transferase encoded by wbbL (as in Mycobacteria,Tropheryma whipplei,Corynebacterium); after dot x - indicates it is believed that the genome possesses a functioning subsystem, but a gene or genes that performs a role has not yet been identified. X - organisms with 2 first enzymes of dTDP-L-rhamnose biosynthesis - RfbA and RfbB (Escherichia coli O157:H7, all Yersinia); -1 - indicates a genome without a functioning subsystem.
