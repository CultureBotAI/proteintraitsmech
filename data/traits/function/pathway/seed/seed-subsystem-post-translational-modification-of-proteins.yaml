identifier: proteintraitsmech:SEED_SUBSYSTEM_Post-translational_modification_of_proteins
label: "Post-translational modification of proteins"
definition: >-
  Post-translational modification of proteins is used to control the activity of structural proteins, gene expression regulatory proteins, and enzymes. In Salmonella enterica the CobB sirtuin protein deacetylase and the Gcn5-related N(&#949;)-acetyltransferase (GNAT) Pat control carbon utilization and metabolic flux via N(&#949;)-lysine acetylation/deacetylation of metabolic enzymes. Acetylation of proteins can occur at two different positions, either at the amino-terminal end (&#945;N-acetylation) or at the &#949;-amino group (&#949;N-acetylation) of an internal lysine residue. Acetylation of MbtA modulates the two aryl-capped siderophores, mycobactin (MBT) and carboxymycobactin (cMBT) in MTB, regulating the chelation of soluble intracellular iron. In Bacillus subtilis the AcuAC genes exercise posttranslational control of the acetyl-CoA (Ac-CoA) synthetase (AcsA) and the combined activities of AcuC and SrtN are needed (YhdZ = NAD-dependent protein deacetylase of SIR2 family = sirtuin protein deacetylase.Inactivation of acuC or srtN resulted in slower growth and cell yield under low-acetate conditions than those of the wild-type strain.
