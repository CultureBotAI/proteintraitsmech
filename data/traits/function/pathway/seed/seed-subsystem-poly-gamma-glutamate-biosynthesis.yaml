# subsystem_id: Poly-gamma-glutamate_biosynthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Poly-gamma-glutamate_biosynthesis
label: "Poly-gamma-glutamate biosynthesis"
definition: >-
  Poly-gamma-glutamate (PGA), a natural polymer, is synthesized by several bacteria, one archaea and one eukaryote. It is currently viewed as a potential new biodegradable material in the fields of foods, cosmetics, and medicine. For example, Natto, traditional Japanese fermented food made from soybeans by Bacillus subtilis (formerly Bacillus natto), contains abundant DL -PGA, which consists of 50 � 80% D- and 20 � 50% L-glutamate as a main component. Poly-gamma-glutamate is an unusual anionic polypeptide, in which glutamate is polymerized via the gamma-amide linkages, and thus needs be synthesized in a ribosome-independent manner. PGA has diverse functions that vary according to the species synthesizing it and their environment. Soil bacteria (mostly from the genus Bacillus, but excluding B. anthracis) use released PGA for the sequestration of toxic metal ions, increasing their resistance to adverse environments (McLean et al., 1990). PGA may also be a source of glutamate for bacteria in a starvation state during late stationary phase (Kimura et al., 2004a). Planococcus halophilus, Sporosarcina halophila and Natrialba asiatica, the only archaea known to produce PGA, use it to decrease high local salt concentrations, enabling them to survive in a hostile environment (Kandler et al., 1983; Hezayen et al., 2001). Finally, Cnidaria , animals armed with stringing cells called nematocysts, are the only eukaryotic organism known to produce PGA. Cnidaria use these explosive organelles to capture prey, for locomotion and for defence (Weber, 1990), and large amounts of PGA trigger this explosion. Thus, anchored PGA is a bacterial virulence factor, protecting the pathogen from the immune system, whereas released PGA may be a persistence factor � protecting the bacterium from its environment � or a storage element for carbon and nitrogen precursors or for energy (Schreier, 1993). References: Candela T, Fouet A. 2006. Poly-gamma-glutamate in bacteria. Mol Microbiol, 60(5):1091-8 Ashiuchi M, Nawa C, Kamei T, Song JJ, Hong SP, Sung MH, Soda K, Misono H. 2001. Physiological and biochemical characteristics of poly gamma-glutamate synthetase complex of Bacillus subtilis. Eur J Biochem. 2001 Oct;268(20):5321-8 Ashiuchi M, Soda K, Misono H. 1999. A poly-gamma-glutamate synthetic system of Bacillus subtilis IFO 3336: gene cloning and biochemical analysis of poly-gamma-glutamate produced by Escherichia coli clone cells. Biochem Biophys Res Commun, 263(1):6-12 Makino, S., Uchida, I., Terakado, N., Sasakawa, C. & Yoshikawa, M. (1989) Molecular characterization and protein analysis of the cap region which is essential for encapsulation in Bacillus anthracis. J. Bacteriol. 171, 722 � 730.
