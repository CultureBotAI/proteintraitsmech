identifier: proteintraitsmech:SEED_SUBSYSTEM_Ethylmalonyl-CoA_pathway_of_C2_assimilation
label: "Ethylmalonyl-CoA pathway of C2 assimilation"
definition: >-
  Many substrates enter the central carbon metabolism on the level of acetyl-coenzyme A (CoA) - including acetate, fatty acids, waxes, alcohols, alkanes, polyhydroxyalkanoates, etc. In aerobic and facultative anaerobic bacteria OXIDATION of acetyl-CoA proceeds via the citric acid cycle, while glyoxylate cycle (modification of the citric acid cycle bypassing the two decarboxylation steps) serves for the ASSIMILATION of acetyl-CoA (encoded in SS: Glyoxylate Bypass"). Glyoxylate cycle enables the use of such substrates as sole carbon sources. It�s two key enzymes are isocitrate lyase and malate synthase (Dixon and Kornberg, 1959) It is clear, however, that glyoxylate cycle can not be the only solution for acetyl-CoA assimilation, because a number of organisms capable of growth with C2 compounds as sole carbon source, lack isocitrate lyase (ICL) activity, or show labeling pattern after growth on acetate inconsistent with the operation of the glyoxylate cycle (Erb et al., 2007 and refs therein). These organisms include many purple nonsulfur bacteria, e.g. Rhodobacter sphaeroides and Rhodospirillum rubrum (Ivanovsky et al., 1997), and other alpha-proteobacteria, like the methylotroph Methylobacterium extorquens (Korotkova et al., 2002) and several aerobic anoxygenic phototrophs [inferred by genome sequence analysis (Alber etal., 2006)]. Also, streptomycetes use an alternate, isocitrate lyase-independent route for acetyl-CoA assimilation, and there appears to be a direct link to antibiotic biosynthesis in these organisms (Liu and Reynolds, 1999). Several putative schemes for acetate assimilation by isocitrate-lyase-negative organisms have been proposed (Meister et al., 2005 and refs therein; see also Tab �Illustrations� above), but none have been elucidated completely. For example - (1) for purple nonsulfur bacteria, e.g. Rhodobacter sphaeroides and Rhodospirillum rubrum (Ivanovsky et al., 1997), (2) for methylotroph Methylobacterium extorquens (Korotkova et al., 2002), (3) for streptomycetes (Liu and Reynolds, 1999). An exciting and elegant work is under way in the labs of Brigit E. Alber and G. Fuchs: the ethylmalonyl-CoA pathway of C2 assimilation that they proposed, although far from being completely understood, promises to explain metabolic transformations during growth on acetate in many (if not all) ICL-negative organisms (Meister et al., 2005; Alber et al., 2006; Erb etal., 2007; Zarzycki et al., 2008). It apparently functions not only in acetyl-CoA assimilation. For methylotrophic bacteria such as Methylobacterium extorquens, extension of the serine cycle with reactions of the ethylmalonyl-CoA pathway leads to a simplified scheme for ICL-independent C1 assimilation; in Chloro&#64258;exus aurantiacus it is involved in autotrophic CO2 &#64257;xation (Herter et al., 2002. In Streptomyces sp. it may also supply precursors (ethylmalonyl-CoA) for antibiotic biosynthesis (Erb etal., 2007). It is currently being studied in detail in Rhodobacter sphaeroides 2.4.1 (see proposed scheme of this pathway under the "Illustrations" tab). Crotonyl-CoA carboxylase/reductase [catalyzing: crotonyl-CoA + CO2 + NADPH -> ethylmalonyl-CoA + NADP] was identi&#64257;ed as the key enzyme of this pathway. In brief, the pathway consists of two parts. In the first part two molecules of acetyl-CoA and one molecule CO2 are converted via acetoacetyl-CoA and ethylmalonyl-CoA to glyoxylate and propionyl-CoA. In the second part glyoxylate and propionyl-CoA are converted with another molecule of acetyl-CoA and CO2 to L-malyl-CoA and succinyl-CoA. Crotonyl-CoA carboxylase/reductase and Mesaconyl-CoA hydratase are diagnostic of the pathway presence. This SS will be updated as the new details of this novel pathway will be become clear. See also SS:Glyoxylate Bypass"
