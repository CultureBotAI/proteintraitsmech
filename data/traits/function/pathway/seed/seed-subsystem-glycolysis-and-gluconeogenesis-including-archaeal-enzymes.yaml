identifier: proteintraitsmech:SEED_SUBSYSTEM_Glycolysis_and_Gluconeogenesis__including_Archaeal_enzymes
label: "Glycolysis and Gluconeogenesis, including Archaeal enzymes"
definition: >-
  This Subsystem focuses on implementaion of glycolysis and glyconeogenesis in Archaea (the corresponding processes in Eubacteria are encoded in SS �Glycolysis and Gluconeogenesis�. This SS has been initiated by Ross Overbeek and is currently curated by Svetlana Gerdes. Glycolysis (Embden-Meyerhof-Parnas pathway) in Archaea differs significantly from that in bacteria and eukaryotes. Just a few striking examples: -- zero or very low ATP yields -- many unusual glycolytic enzymes, including ADP-dependent gluco- and phosphofructo- kinases, non-orthologous PGMs, FBAs, non-phosphorylating GAP dehydrogenases, etc. -- reduction of ferredoxin rather than NADH, etc Notably, much less variation is observed in glyconeogenic enzymes. This probably reflects the independent evolution of catabolic branches in bacteria and archaea diverging from originally glyconeogenic EMP pathway (refs. 2, 5) . Since studies of archaeal glycolytic pathways have started only in early 1990s, a large number of open questions (including �missing� enzymes) remains. A diagram of archaeal EMP/glyconeogenesis pathway is posted on SEED Forum at: http://brucella.uchicago.edu/SubsystemForum/showthread.php?p=357#post357 Out of 10 enzymatic steps, which constitute classical EMP 7 are reversible and work in glyconeogenesis as well. However, glycolytic reactions catalyzed by the following enzymes are not reversible: (i) 6-phosphofructokinase (EC 2.7.1.11), (ii) Pyruvate kinase (EC 2.7.1.40), (iii) some forms of glyceraldehyde 3-phosphate dehydrogenase (see below) They are bypassed during glyconeogenesis via: (i) Fructose-1,6-bisphosphatase (EC 3.1.3.11), (ii) PEP synthase (EC 2.7.9.2) or/and Pyruvate,phosphate dikinase (EC 2.7.9.1), (iii) NAD(P)-dependent glyceraldehyde 3-phosphate dehydrogenase respectively or by utilizing other central metabolic pathways References: RossO: I highly recommend Verhees doctoral thesis - 1."Molecular characterization of glycolysis in Pyrococcus furiosus", for his discussions of what is going on in the Archaea. Most of it has been published since: 2. Verhees CH, Kengen SW, Tuininga JE, Schut GJ, Adams MW, De Vos WM, Van Der Oost J. 2003. The unique features of glycolytic pathways in Archaea. Biochem J. 375:231-46. 3. Ronimus RS, Morgan HW. 2003. Distribution and phylogenies of enzymes of the Embden-Meyerhof-Parnas pathway from archaea and hyperthermophilic bacteria support a gluconeogenic origin of metabolism. Archaea 1(3):199-221. Review. 4. T. Sato, H. Imanaka, N. Rashid, T. Fukui, H. Atomi, and T. Imanaka. 2004. Genetic Evidence Identifying the True Gluconeogenic Fructose-1,6-Bisphosphatase in Thermococcus kodakaraensis and Other Hyperthermophiles. J. Bact., 186: 5799�5807 5. Stec, B., Yang, H., Johnson, K. A., Chen, L. and Roberts, M. F. 2000. MJ0109 is an enzyme that is both an inositol monophosphatase and the �missing� archaeal fructose-1,6-bisphosphatase. Nat. Struct. Biol. 7, 1046�1050
