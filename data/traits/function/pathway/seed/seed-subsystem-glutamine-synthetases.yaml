label: "Glutamine synthetases"
definition: >-
  This is an auxiliary Subsystem constructed in order to distinguish different forms of known Glutamine synthetases from multiple proteins of �glutamine synthetase family�, the function(s) of which are yet unknown. Please note, that functional role �glutamine synthetase family� currently combines multiple protein families distantly related to Glutamine synthetases (in order to prevent their automatic reannotation as Glutamine synthetases). Suggestions on potential function(s) of these proteins are very welcome! Glutamine synthetase (GS) plays a dual role by providing glutamine for biosynthesis and by assimilating ammonium in collaboration with glutamate synthase (GOGAT; EC 1.4.7.1). Three types of GS have been described based on the molecular size and the number of subunits. GSI is a dodecameric protein with subunit ranging between 44 and 60 kDa, and is usually found among several groups of bacteria (Robertson & Alberte, 1996) and archaea (Brown et al., 1994). GSII is common in eukaryotes and a few soil-dwelling bacteria (Brown et al., 1994) as an octameric enzyme composed of subunits ranging between 35 and 50 kDa (Kumada et al., 1993). Finally, GSIII has been described from cyanobacteria and two anaerobic bacteria as a hexameric enzyme composed of c. 75 kDa subunits (Reyes & Florencio, 1994). Additional subtypes of GS have been suggested in this SS based on sequence alignments and gene clustering
