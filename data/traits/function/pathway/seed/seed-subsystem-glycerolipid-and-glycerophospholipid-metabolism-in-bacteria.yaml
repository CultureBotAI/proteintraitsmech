identifier: proteintraitsmech:SEED_SUBSYSTEM_Glycerolipid_and_Glycerophospholipid_Metabolism_in_Bacteria
label: "Glycerolipid and Glycerophospholipid Metabolism in Bacteria"
definition: >-
  Phospholipids are membrane components. In addition to providing the membrane matrix, phospholipids are also involved in synthesizing several types of surface molecules. The phosphoethanolamine head groups of phosphatidylethanolamine are transferred and attached to the lipopolysaccharide (LPS) core sugars and to periplasmic membrane-derived oligosaccharides (MDO). The head group of phosphatidylglycerol is used for modifying various lipoproteins and MDO. The entire molecule is used in the synthesis of cardiolipin. The major phospholipids of E. coli are phosphatidylethanolamine (PE), phosphatidylglycerol(PG) and cardiolipin. All phospholipids contain sn-glycerol-3-phosphate esterified with fatty acids at the sn-1 and sn-2 positions.
