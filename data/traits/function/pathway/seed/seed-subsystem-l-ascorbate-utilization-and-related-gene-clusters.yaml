# subsystem_id: L-ascorbate_utilization_(and_related_gene_clusters)
identifier: proteintraitsmech:SEED_SUBSYSTEM_L-ascorbate_utilization__and_related_gene_clusters
label: "L-ascorbate utilization (and related gene clusters)"
definition: >-
  This Subsystem is an attempt to discern two conserved sets of paralogous protein families based on distinct genome contexts of the corresponding genes. It has been started by MattC and extended by SvetaG. Two closely related operons have been described in E. coli K12: yjf-sga and yia-sgb (Ibanez et al. 2000; Yew and Gerlt 2002). The yjf-sga operon consists of 6 genes: sgaT, sgaB, ptxA, sgaH, sgaU, and sgaE. The first three genes apparently encode components of a PTS sugar transporter, sgaH encodes 3-keto-L-gulonate 6-phosphate decarboxylase, sgaU - L-xylulose 5-phosphate 3-epimerase (EC 5.1.3.-), and sgaE encodes L-ribulose-5-phosphate 4-epimerase. The second operon (yia-sgb) contains close homologs of sgaH, sgaU, and sgaE with gene order preserved. However, PTS components are missing and a sigar kinase (lyxK) is present in the same cluster. The yjf-sga operon has been implicated in L-ascorbate utilization in E. coli based on the fact that a knockout mutant missing this entire gene cluster failed to ferment L-ascorbate (Yew and Gerlt 2002). On the other hand, disruption of the yia-sgb operon did not affect fermentation of L-ascorbate (Yew and Gerlt 2002). Specific sugar substrate of the yia-sgb catabolic operon remains unknown.
