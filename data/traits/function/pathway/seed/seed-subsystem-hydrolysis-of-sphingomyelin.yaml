label: "Hydrolysis of sphingomyelin"
definition: >-
  Sphingomyelinases secreted by pathogenic bacteria play important roles in host-pathogen interactions ranging from interfering with phagocytosis and oxidative burst to iron acquisition. sphingomyelinase activity cleaving sphingomyelin, a major lipid in eukaryotic cells, into ceramide and phosphocholine, which are then utilized by Mtb as carbon, nitrogen and phosphorus sources, respectively.
