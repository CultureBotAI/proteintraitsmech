# subsystem_id: Antibiotic_targets_in_protein_synthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Antibiotic_targets_in_protein_synthesis
label: "Antibiotic targets in protein synthesis"
definition: >-
  Many classes of antibiotics target various components of protein synthesis machinery, with the ribosome itself being a common target. Some drugs interact with specific ribosomal components, e.g. 30S ribosomal subunit or 50S ribosomal subunit. Others target the ribosomal complex in its entirety by stabilizing it and thus preventing further translation. The bacterial 23S rRNA has peptidyl transferase activity (at the P site of the 50S subunit), which can be blocked by several classes of antibiotics: - Macrolide_lincosamide_streptogramin_ketolide_oxazolidinone (MLSKO) - Chloramphenicols_florfenicols - glycopeptide antibiotics The 16S rRNA of the 30S ribosomal subunit helps to stabilize the aminoacyl-tRNAs for pairing with the mRNA codons. Some antibiotics (aminoglycosides) that target the 16S rRNA lead to mRNA misreading as well as premature termination. Other antibiotics (tetracyclines) that target the 16S rRNA prevent incoming charged-tRNAs from binding to the ribosome's A-site, stopping elongation. Specific methylation or point mutations in the bacterial 16S ribosomal RNA of the small 30S subunit or 23S ribosomal RNA of the large 50S subunit can reduce antibiotic binding affinity at specific sites, conferring resistance to antibiotics.
