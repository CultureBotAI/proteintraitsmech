label: "Bacteriocins in Lactobacilli"
definition: >-
  A large number of new bacteriocins in lactic acid bacteria (LAB) has been characterized in recent years. Most of the new bacteriocins belong to the class II bacteriocins which are small (30-100 amino acids) heat-stable and commonly not post-translationally modified. These bacteriocins render the membrane of target cells permeable to various small molecules. The majority of class II bacteriocins are synthesized in a preform containing an N-terminal double-glycine leader. The double-glycine leader-containing bacteriocins are processed and secreted by a dedicated ABC-transporter which has been shown to possess an N-terminal proteolytic domain. This characteristic GG motif has been used here to predict yet uncharacterized putative bacteriocins (or inducing peptides for bacteriocin synthesis - see below) The genes encoding the two peptides of two-peptide bacteriocins are often colocalized with the genes encoding (i) the immunity protein that protects the bacteriocin-producing bacteria, (ii) a dedicated ABC transporter and (iii) a three-component regulatory system that consists of a membrane-associated histidine protein kinase, response regulator, and inducing peptides or pheromone-like peptides, that functions to induce bacteriocin expression in response to cell density, stress or other external factors (Diep et al. 2000). Pheromone-like peptides usually possess characteristics similar to that of the bacteriocin peptides (including double-glycine leader), but do not possess any antimicrobial activity These 3 groups of functions along with bacteriocin structural genes constitute the minimal set of functional roles required for bacteriocin production. An effort was made in this SS to identify them in the majority of Lactobacilli with sequenced genomes. However, omissions are very likely (by both, ORF calling software and curator) due to very small size of bacteriocin structural genes and extremely low similarity levels between them. Also, additional genes (most of them hypothetical), that are often present in the immediate vicinity of various bacteriocin genes and are likely involved in their biosynthesis, modification or secretion, have NOT been encoded here. The only exception - plantaricin biosynthetic genes - they are included in this SS as an example. For bacteriocins that have been described in the literature, specific names are given on the corresponding PEG pages - as a comment, separated from the main annotation by [#] sign References - (Many! only several recent reviews are quoted here) 1. The two-peptide class II bacteriocins: structure, production, and mode of action. Oppeg�rd C, Rogne P, Emanuelsen L, Kristiansen PE, Fimland G, Nissen-Meyer J. J Mol Microbiol Biotechnol. 2007;13(4):210-9. Review. PMID: 17827971 2. Antimicrobial peptides of lactic acid bacteria: mode of action, genetics and biosynthesis. Sablon E, Contreras B, Vandamme E. Adv Biochem Eng Biotechnol. 2000;68:21-60. Review. PMID: 11036685 3. The continuing story of class IIa bacteriocins. Drider D, Fimland G, H�chard Y, McMullen LM, Pr�vost H. Microbiol Mol Biol Rev. 2006 Jun;70(2):564-82. Review. PMID: 16760314 4. Bacteriocins from lactic acid bacteria: production, purification, and food applications. De Vuyst L, Leroy F. J Mol Microbiol Biotechnol. 2007;13(4):194-9. Review. PMID: 17827969
