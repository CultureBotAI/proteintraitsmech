# subsystem_id: Biofilm_Adhesin_Biosynthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Biofilm_Adhesin_Biosynthesis
label: "Biofilm Adhesin Biosynthesis"
definition: >-
  The linear homopolymer poly-&#946;-1,6-N-acetyl-D-glucosamine (&#946;-1,6-GlcNAc; PGA) serves as an adhesin for the maintenance of biofilm structural stability in diverse eubacteria. Besides mediating cell-to-cell and cell-to-surface adhesion in biofilms, PGA is essential for the formation of the cellular architecture of the biofilm microstructure and for conversion from temporary polar cell surface attachment to permanent lateral attachment during the initial stages of biofilm development. PGA has profound effects on host-microbe interactions, affecting colonization, virulence, and immune evasion. Synthesis of poly-&#946;-1,6-N-acetyl-D-glucosamine requires the pgaABCD operon. Pga gene products are involved in the synthesis, covalent modification, and export of the biofilm adhesin. The cytoplasmic membrane proteins (PgaC and PgaD) are necessary for PGA synthesis and the outer membrane proteins (PgaA and PgaB) are needed for PGA export. The carbon storage regulator CsrA posttranscriptionally represses PGA production by binding to six sites within the untranslated leader and proximal coding region of pgaA mRNA. The LysR family DNA-binding protein NhaR activates pgaABCD transcription in response to high pH and high concentrations of sodium. References: Itoh Y, Rice JD, Goller C, Pannuri A, Taylor J, Meisner J, Beveridge TJ, Preston JF 3rd, Romeo T. 2008. Roles of pgaABCD genes in synthesis, modification, and export of the Escherichia coli biofilm adhesin poly-beta-1,6-N-acetyl-D-glucosamine. J Bacteriol. 2008 May;190(10):3670-80. Wang X1, Preston JF 3rd, Romeo T. 2004. The pgaABCD locus of Escherichia coli promotes the synthesis of a polysaccharide adhesin required for biofilm formation. J Bacteriol. 2004 May;186(9):2724-34. Jackson DW1, Suzuki K, Oakford L, Simecka JW, Hart ME, Romeo T. 2002. Biofilm formation and dispersal under the influence of the global regulator CsrA of Escherichia coli. J Bacteriol. 2002 Jan;184(1):290-301.
