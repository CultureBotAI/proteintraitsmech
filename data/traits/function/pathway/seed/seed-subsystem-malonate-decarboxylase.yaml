# subsystem_id: Malonate_decarboxylase
identifier: proteintraitsmech:SEED_SUBSYSTEM_Malonate_decarboxylase
label: "Malonate decarboxylase"
definition: >-
  Malonate decarboxylase converts malonate directly into acetate and CO2. Malonate is chemically rather inert, especially at neutral pH, where both carboxylic residues are dissociated (pKa1 = 2.85, pKa2 = 5.69). The dicarboxylate is therefore activated for the decarboxylation reaction by transiently forming a thioester with the enzyme. The catalytically active enzyme carries an acetyl thioester residue that is exchanged in the first partial reaction by a malonyl thioester residue. This is subsequently decarboxylated with regeneration of the acetyl-S-enzyme. It is an acetyl-S-enzyme with an acetylated phosphoribosyl dephospho-CoA prosthetic group. The mdcH gene product acts as a malonyl-CoA:ACP transacylase and initiates the activation of (deacetyl)malonate decarboxylase by malonyl-transfer to the prosthetic group. The malonyl residue is subsequently decarboxylated to an acetyl residue by the decarboxylase itself. Purified malonate decarboxylase consists of the four subunits MdcA, D, E and C in an apparent 1 : 1 : 1 : 1 stoichiometry.
