label: "Ribosomal hibernation related cluster"
definition: >-
  The process of 100S ribosome formation has been termed 'ribosomal hibernation'. It has been observed that during stationary phase Escherichia coli's, ribosome modulation factor (RMF) and hibernation promoting factor (HPF) dimerize most 70S ribosomes to form 100S arrested ribosomes.
