label: "Alpha-acetolactate operon"
definition: >-
  B. subtilis forms acetoin under anaerobic fermentative growth conditions and as a product of the aerobic carbon overflow metabolism. Acetoin formation from pyruvate requires &#945;-acetolactate synthase and acetolactate decarboxylase, both encoded by the alsSD operon. AlsR, was found to be essential for the in vivo expression of alsSD in response to anaerobic acetate accumulation, the addition of acetate, low pH, and the aerobic stationary phase.
