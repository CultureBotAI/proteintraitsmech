# subsystem_id: Violacein_biosynthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Violacein_biosynthesis
label: "Violacein biosynthesis"
definition: >-
  Violacein is a violet pigment produced by Gram-negative bacteria living in tropical aqueous environments and soils. It is produced from the condensation of two L-tryptophans and the addition of molecular oxygen. The structure of violacein is made up of three structural units: a 5-hydroxyindole, an oxindole, and a 2-pyyrolidone. The function of violacein may be to protect the bacterium from UV radiation. This pigment has potential medical applications as antibacterial, anti-trypanocidal, anti-ulcerogenic, and anticancer drugs. A 14-electron oxidation pathway yields the final chromophore. The flavoenzyme VioA and the heme protein VioB work in conjunction to oxidize and dimerize l-tryptophan to a nascent product that can default to the off pathway metabolite chromopyrrolic acid. In the presence of VioE, the intermediate instead undergoes on-pathway [1,2] indole rearrangement to prodeoxyviolacein. The last two enzymes in the pathway are flavin-dependent oxygenases, VioC and VioD, that act sequentially. VioD hydroxylates one indole ring at the 5-position to yield proviolacein, and VioC then acts on the other indole ring at the 2-position to create the oxindole and complete violacein formation.
