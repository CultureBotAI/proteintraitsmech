identifier: proteintraitsmech:SEED_SUBSYSTEM_Beta-lactamases_Ambler_class_A
label: "Beta-lactamases Ambler class A"
definition: >-
  Bacterial resistance to beta-lactam antibiotics can be achieved by any of three strategies: - the production of beta-lactam-hydrolyzing beta-lactamase enzymes, - the utilization of beta-lactam-insensitive cell wall transpeptidases, - active expulsion of beta-lactam molecules from Gram-negative cells by way of efflux pumps - and loss of porins. This Subsystem captures only beta-lactam-hydrolyzing beta-lactamase enzymes of the Ambler class A. Other classes of beta-lactamases are encoded in the following Subsystems: -- Beta-lactamases Ambler class B -- Beta-lactamases Ambler class C -- Beta-lactamases Ambler class D
