identifier: proteintraitsmech:SEED_SUBSYSTEM_Soluble_methane_monooxygenase__sMMO
label: "Soluble methane monooxygenase (sMMO)"
definition: >-
  Methane monooxygenase (MMO),takes a chemically inert hydrocarbon, methane, and converts it to a more active species, methanol. This is a classic monooxygenase reaction in which two reducing equivalents from NAD(P)H are utilized to split the O-O bond of O2. One atom is reduced to water by a 2 e- reduction and the second is incorporated into the substrate to yield methanol CH4 + O2 + NAD(P)H + H+ -> CH3OH + NAD(P)+ + H2O MMOs from different organisms can be of broad specificity and also hydroxylate cyclic alkanes and aromatic compounds. There are two well-studied forms of MMO: the soluble form (sMMO) and the particulate form (pMMO). The active site in sMMO contains a di-iron center bridged by an oxygen atom (Fe-O-Fe), whereas the active site in pMMO utilizes copper, although some propose that pMMO also uses iron. The soluble methane monooxygenase (sMMO) from Methylococcus capsulatus (Bath) is a multicomponent enzyme system required for the conversion of methane to methanol. It comprises a hydroxylase, a regulatory protein, and a reductase. The reductase contains two domains: an NADH-binding and FAD-containing flavin domain and a ferredoxin (Fd) domain carrying a [2Fe-2S] cofactor.
