identifier: proteintraitsmech:SEED_SUBSYSTEM_Fusaric_acid_resistance_cluster
label: "Fusaric acid resistance cluster"
definition: >-
  Fusaric acid (5-n-butylpicolinic acid = 5-butylpyridine-2-carboxylic acid) is a phytotoxin produced by fungi (Fusarium heterosporium and Gibberella) by altering the permeability of plant cytoplasmic membranes (wilt toxin). It was found to chelate copper and other ions that could be involved in membrane integrity and membrane potential. Shown to be a potent inhibitor of dopamine beta-hydroxylase (DBH).
