identifier: proteintraitsmech:SEED_SUBSYSTEM_Siderophore_pyochelin
label: "Siderophore pyochelin"
definition: >-
  Under iron-limiting growth conditions Pseudomonas aeruginosa produces two major siderophores: hydroxamate siderophore pyoverdin (Meyer & Abdallah, 1978; Cox & Adams, 1985) and catechol siderophore pyochelin (Cox, 1980; Rinehart et al., 1995). Of the two pyoverdin has a greater affinity for Fe(II1) than has pyochelin (Cox & Graham, 1979). It is encoded in a separate SS: "Pyoverdine biosynthesis new" Pyochelin is derived from one molecule of salicylate and two molecules of cysteine. The enzymes for the synthesis (PchBA) and activation (PchD) of salicylate as well as a putative thioesterase (PchC) are encoded by pchDCBA operon. This operon also includes two coregulated genes, pchEF, encoding peptide synthetases. The pchE is required for the conversion of salicylate to dihydroaeruginoate (Dha), the condensation product of salicylate and one cysteine residue, and pchF is essential for the synthesis of pyochelin from Dha (Reimmann et al., 1998). The deduced PchE (156 kDa) and PchF (197 kDa) proteins have adenylation, thiolation and condensation/cyclization motifs arranged as modules which are typical of non-ribosomal peptide synthetases forming thiazoline rings. When secreted to the extracellular environment, pyochelin chelates iron and transports it to the bacterial cytoplasm via specific outer-membrane receptor FptA and the inner-membrane permease FptX. Exogenously added pyochelin also acts as a signal which induces the expression of the pyochelin biosynthesis and uptake genes by activating PchR, a cytoplasmic regulatory protein of the AraC/XylS family. In addition to P. aeruginosa, pyochelin production was documented in Burkholderia sp. (Darling et al., 1998; Visser et al., 2004), and pyochelin biosynthetic genes are highly conserved in the sequenced genomes of multiple Burkholderia species. Notably, the presence of an operon similar to fptABCX in Rhodospirillum rubrum indicates that it might be able to utilize pyochelin as a heterologous siderophore for iron uptake (Michel et al., 2007) Another interesting insight into such siderophore piracy was provided recently by discovery of enantio-pyochelin, an optical antipode of pyochelin, which is produced by Pseudomonas fluorescens strains Pf-5 and CHA0 produce (Youard et al., 2007). The two different pyochelin enantiomers (produced by P. fluorescens CHA0 and P. aeruginosa PAO1) cannot be utilized as an iron source in the heterologous background. This strategy is believed to prevent potential competitors occupying the same ecological niche from stealing heterologous iron-siderophore complexes (Youard et al., 2007)
