identifier: proteintraitsmech:SEED_SUBSYSTEM_2-ketoacid_oxidoreductases_disambiguation
label: "2-ketoacid oxidoreductases disambiguation"
definition: >-
  Pyrococcus furiosus contains four distinct cytoplasmic 2-ketoacid oxidoreductases (ORs) which differ in their substrate specificities, while Thermotoga maritima contains only one,the pyruvate ferredoxin oxidoreductase (POR). These enzymes catalyze the synthesis of the acyl (or aryl) coenzyme A derivative in a thiamine PPi-dependent oxidative decarboxylation reaction with reduction of ferredoxin or flavodoxin. In Helicobacter pylori the major routes for the generation of acetyl coenzyme A (acetyl-CoA) and succinyl-CoA are via pyruvate:flavodoxin oxidoreductase (POR) and 2-oxoglutarate:acceptor oxidoreductase (OOR), respectively. The POR of Thermococcus guaymasensis has been shown to be a bifunctional PDC/POR complex. It was predicted that all hyperthermophilic &#946; -keto acids ferredoxin oxidoreductases are bifunctional, catalyzing the activities of nonoxidative and oxidative decarboxylation of the corresponding &#946; -keto acids.
