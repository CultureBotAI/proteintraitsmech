identifier: proteintraitsmech:SEED_SUBSYSTEM_HipAB_system_implicated_in_growth_arrest__persistence_and_drug_tolerance
label: "HipAB system implicated in growth arrest, persistence and drug tolerance"
definition: >-
  Overexpression of the HipA protein of the HipBA toxin/antitoxin module leads to multidrug tolerance in Escherichia coli.HipA is a "toxin" that causes reversible dormancy, whereas HipB is an antitoxin that binds HipA and acts as a transcriptional repressor of the hipBA operon.HipA is a fusion of a toxin domain and a phosphatidylinositol 3/4-kinase domain.Overexpression of HipA caused inhibition of cell growth and increase in persister formation.Cells overexpressing wild-type HipA were highly tolerant to cefotaxime, a cell wall synthesis inhibitor, to ofloxacin, a fluoroquinolone inhibitor of DNA gyrase, and to topoisomerase IV and were almost completely resistant to killing by mitomycin C, which forms DNA adducts.
