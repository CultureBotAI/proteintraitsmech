label: Nitrilase
definition: >-
  Plant J. 2008 Sep 11. [Epub ahead of print] A conserved mechanism for nitrile metabolism in bacteria and plants. Howden AJ, Jill Harrison C, Preston GM. Department of Plant Sciences, University of Oxford, South Parks Road, Oxford, OX1 3RB, UK. Pseudomonas fluorescens SBW25 is a plant growth-promoting bacterium that efficiently colonises the leaf surfaces and rhizosphere of a range of plants. Previous studies have identified a putative plant-induced nitrilase gene (pinA) in P. fluorescens SBW25 that is expressed in the rhizosphere of sugar beet plants. Nitrilase enzymes have been characterised in plants, bacteria and fungi and are thought to be important in nitrile detoxification, nitrogen utilisation and plant hormone synthesis. We reveal that pinA is a NIT4-type nitrilase that catalyses the hydrolysis of beta-cyano-L-alanine, a nitrile common in the plant environment and an intermediate in the plant cyanide detoxification pathway. In plants cyanide is converted to beta-cyano-L-alanine, which is subsequently detoxified to aspartic acid and ammonia by NIT4. In P. fluorescens SBW25 pinA is induced in the presence of beta-cyano-L-alanine, and the beta-cyano-L-alanine precursors cyanide and cysteine. pinA allows P. fluorescens SBW25 to use beta-cyano-L-alanine as a nitrogen source and to tolerate toxic concentrations of this nitrile. In addition, pinA is shown to complement a NIT4 mutation in Arabidopsis thaliana, enabling plants to grow in concentrations of beta-cyano-L-alanine that would otherwise prove lethal. Interestingly, over-expression of pinA in wild-type A. thaliana not only resulted in increased growth in high concentrations of beta-cyano-L-alanine, but also resulted in increased root elongation in the absence of exogenous beta-cyano-L-alanine, demonstrating that beta-cyano-L-alanine nitrilase activity can have a significant effect on root physiology and root development.
