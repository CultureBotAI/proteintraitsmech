identifier: proteintraitsmech:SEED_SUBSYSTEM_Diphtheria_toxin
label: "Diphtheria toxin"
definition: >-
  Diphtheria toxin (DT) is an extracellular protein of Corynebacterium diphtheriae that inhibits protein synthesis and kills susceptible cells. The gene that encodes DT (tox) is present in some corynephages, and DT is only produced by Corynebacteria isolates that harbor tox+ phages. DT catalyse a reaction, which inactivates translation elongation factor 2 (EF2). It has been found in three Corynebacterium species, C.diphtheriae, C. ulcerans and C. pseudotuberculosis. C. ulcerans and C. pseudotuberculosis are zoonotic pathogens found in different livestock (cattle, sheep, goats, and camelids), and domestic pets (dogs and cats), but also in free-roaming animals (otters, wild boars, roe deer and fox). The diphtheria toxin repressor (DtxR) is a global regulatory protein that uses Fe2+ as corepressor. Holo-DtxR represses production of DT, corynebacterial siderophore, heme oxygenase, and several other proteins. The transcription of the dtxR gene in C.diphtheriae occurs constitutively at a low level under low- and high-iron growth conditions. The binding of DtxR to the tox promoter/operator requires divalent cations (Cd2+, Co2+, Fe2+, Mn2+, Ni2+, or Zn2+.
