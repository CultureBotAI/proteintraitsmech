label: "Cytochrome b6-f complex in plants (plastidial) and cyanobacteria"
definition: >-
  The cytochrome b-c1 complex of the respirator chain and the b6-f complex of OXYGENIC photosynthesis have long been known (Hauska et al., 1983) to be similar in (a) their redox prosthetic groups, which are present in the same stoichiometry, two b- and one c-type heme, one [2Fe-2S] cluster per unit; (b) use of quinol/semiquinol as electron and proton donor; and (c) their functions: (i) mediation of electron transfer between the major integral electron donor (dehydrogenases and photosystem II, respectively) an acceptor (cytochrome oxidase and photosystem I) complexes (ii) electrogenic charge transfer and H+ translocation (Soriano et al., 1999). But there are several important differences between b-c1 and b6-f (Soriano et al., 1999) as well: 1. The cyt b (bc1) polypeptide with eight TM helices A-H is replaced in the b6 f complex by two smaller integral polypeptides (cyt b6 and subunit IV) consisting of helices A-D and E-G (Widger et al., 1984). 2. Cytochromes f and c1 are completely different in terms of both proteins sequence and structure, except for both being c-type cytochromes with the characteristic Cys-X-Y-Cys-His c-heme binding sequence motif. 3. While the four larger subunits of the b6 f complex have structural and/or functional similarity to that of bc1, the 3(4) small subunits are unique to the b6 f complex. 4. There are one molecule each of chlorophyll a (Huang et al., 1994) and beta-carotene (Zhang et al., 1999a) present in the b6 f complex (absent in bc1). 5. Lipid content can be different, as there are 5 molecules per monomer of the unique lipid monogalactosyl-diacylglycerol present in the b6 f complex (Soriano et al., 1999). The bc1 complex in plants is encoded in Subsystem: Respiratory complex III (cytochrome b-c1) in plants. Bacterial bc1 complexes are encodes in SS: Ubiquinone Menaquinone-cytochrome c reductase complexes ============================== This subsystem covers protein complexes involved in a single AraCyc reaction: plastoquinol�plastocyanin reductase: <a href="http://pmn.plantcyc.org/PLANT/NEW-IMAGE?type=REACTION&object=PLASTOQUINOL--PLASTOCYANIN-REDUCTASE-RXN">PLASTOQUINOL--PLASTOCYANIN-REDUCTASE-RXN</a> ============================== References: 1. G.M. Soriano, M.V. Ponamarev, C.J. Carrell, D. Xia, J.L. Smith, and W.A. Cramer. 1999. Comparison of the Cytochrome bc1 Complex with the Anticipated Structure of the Cytochrome b6 f Complex: De Plus Ca Change de Plus C�est la Meme Chose. Journal of Bioenergetics and Biomembranes, 31(3):201-213
