identifier: proteintraitsmech:SEED_SUBSYSTEM_Anaerobic_toluene_and_ethylbenzene_degradation
label: "Anaerobic toluene and ethylbenzene degradation"
definition: >-
  Anaerobic biodegradation of toluene and ethylbenzene is of environmental concern and biochemical interest due to toxicity and novel reactions, respectively. Biodegradation of alkylbenzenes has to overcome their exceptional chemical stability. Aerobic bacteria achieve this by employing highly reactive oxygen species in monooxygenase- or dioxygenase-catalyzed reactions. Novel denitrifying bacteria which degrade alkylbenzenes completely to CO2 in the absence of molecular oxygen were isolated. The denitrifying strain EbN1 is unique in anaerobically degrading both alkylbenzenes via different pathways which converge at benzoyl coenzyme A.
