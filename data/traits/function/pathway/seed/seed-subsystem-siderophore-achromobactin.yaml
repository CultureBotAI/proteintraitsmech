identifier: proteintraitsmech:SEED_SUBSYSTEM_Siderophore_Achromobactin
label: "Siderophore Achromobactin"
definition: >-
  This Subsystem encodes biosynthesis of siderophore Achromobactin in Pseudomonas syringae (Berti and Thomas, 2009), as well as a hypothetical gene cluster, likely encoding a related siderophore in Acinetobacter sp. It was predicted by (Challis GL. 2005), based on sequence similarity of the AcsD, AcsA, and AcsC genes with iucA, iucB, iucC (controlling aerobactin biosynthesis in virulent E. coli strains), that achromobactin is related to a group of non-peptide siderophores, produced by a nonribosomal peptide synthetases (NRPS)-independent mechanism. Siderophores in this group include aerobactin, rhizobactin 1021, vibrioferrin, alcaligin, and desferrioxamine E (reviewed by Challis, 2005). Such siderophores are assembled from alternating dicarboxylic acid and diamine or amino alcohol building blocks (which are nevertheless derived from amino acids) linked by amide or ester bonds
