identifier: proteintraitsmech:SEED_SUBSYSTEM_D-Galacturonate_and_D-Glucuronate_Utilization
label: "D-Galacturonate and D-Glucuronate Utilization"
definition: >-
  The glucuronides are then mostly excreted out of the body via the bile ducts into the intestine, through apocrine secretions, and through the bladder into the urinary tract. The conjugated compounds are typically much more water soluble than the respective aglycones and are often biochemically and biologically inactive. The glucuronidation and excretion of such compounds have thus often been described as detoxification. In the intestine and on the skin, large populations of commensal and symbiotic microorganisms have access to the diverse glucuronides, and some have evolved the ability to metabolize these compounds. The enterobacterium Escherichia coli colonizes all known vertebrates. Most E. coli strains living in natural environments possess &#946;-d-glucuronidase (EC 3.2.1.31) and are able to acquire glucuronides as nutrients. &#946;-d-Glucuronidase is an intracellular hydrolase that catalyzes the hydrolysis of &#946;-d-glucuronides within the cytoplasm of E. coli. The glycone released can then be used as a carbon source. Almost any aglycone conjugated in a hemiacetal linkage to the C-1 hydroxyl of glucuronate in the &#946;-configuration can be cleaved by &#946;-d-glucuronidase, except for some thio-&#946;-d-glucuronides. Some strains of B. subtilis can use glucuronate and galacturonate as primary carbon sources. Polymethylgalacturonate, or pectin, is a constituent of plant cell walls and thus is found in the soil. Extracellular pectate lyases, produced by Erwinia chrysanthemi and many other bacteria, including B. subtilis, convert pectin into oligogalacturonate. Oligogalacturonate can be metabolized into D-galacturonate by enzymes produced by Erwinia sp. In addition, free galacturonate and glucuronate enter Escherichia coli and Erwinia sp. via the exuT transport system. The uxuA, uxuB, uxaA, uxaB, and uxaC genes of E. coli and E. chrysanthemi encode enzymes that degrade intracellular galacturonate and glucuronate into 2-keto 3-deoxygluconate (KDG), which is further metabolized to pyruvate and 3-phosphoglyceraldehyde. The expression of these genes, including exuT, is negatively regulated by the exuR gene product in these organisms.
