# subsystem_id: Undecaprenyl-diphosphatases
identifier: proteintraitsmech:SEED_SUBSYSTEM_Undecaprenyl-diphosphatases
label: Undecaprenyl-diphosphatases
definition: >-
  Bacterial cell-wall polysaccharides, such as peptidoglycan, are synthesized from cytoplasmic precursors. A dedicated lipid, undecaprenyl-phosphate is used as a glycan lipid carrier across the plasma membrane. The sugar is linked to the lipid carrier at the inner face of the membrane and is translocated toward the periplasm, where the glycan moiety is transferred to the growing polymer. Undecaprenyl-phosphate originates from the dephosphorylation of its precursor undecaprenyl-diphosphate, with itself generated by de novo synthesis or by recycling after the final glycan transfer. Undecaprenyl-diphosphate is de novo synthesized by the cytosolic cis-prenyltransferase undecaprenyl-diphosphate synthase, which has been structurally and mechanistically characterized in great detail highlighting the condensation process. The next step toward the formation of the lipid carrier is the dephosphorylation step. It is carried out by members of unrelated families of integral membrane proteins (BacA, BcrC). They are able to compete with bacitracin for undecaprenyl pyrophosphate (UPP) and etablish resistance of the cells to bacitracin.
