label: "Photosystem II"
definition: >-
  Subunit composition of photosystem II (PSII) complex can be used as "quality control" of sorts for ORF calling algorithms used by different sequencing centers: from 34 - 36 transmembrane a-helices revealed in PSII via electron and X-ray crystallography (in plants and cyanobacteria respectively), at least 12�14 are attributed to low molecular mass proteins -- merely 25 to 60 amino acids in size, each containing a single trans-membrane span. These ORFs are often overlooked, even the ones stably clustered into operons in the majority of cyanobacterial genomes. The situation is especially bad in the genomes of Synechococcus elongatus PCC 7942, Crocosphaera watsonii WH 8501, Trichodesmium erythraeum IMS101, Anabaena variabilis ATCC 29413. Interestingly, two subunits (PsbU and PsbV) are missing �for real� from some cyanobacterial genomes indicating that some degree of plasticity may exist in the composition of PSII. Collectively, there are at least 18 and possibly more than 25 distinct subunits in PSII from cyanobacteria and plants, as compared to only three or four in the non-oxygenic bacterial photosynthetic reaction centers. The evolutionary source of most of these "additional" proteins is enigmatic, as they have no apparent homology to any other proteins in existing databases. However, some of the proteins in PSII have apparent homologies to each other, suggesting ancient gene duplications have played an important role in the development of the complex. This suggests that a period of remarkable evolutionary innovation took place when the ability to make oxygen was invented, leading to explosion in complexity of photosynthetic machinery. Cyanobacterial and eukaryotic PSII complexes are very close, differing in only a few subunits. This implies that nearly entire spectrum of PSII proteins had originated by the time the first plastid endosymbiosis occurred and has hardly changed since. Proteins annotated here as �Chlorophyll a(b) binding protein, photosystem II CP43 protein (PsbC) homolog� are not PSII subunits per ser. In the genera of prochlorophytes (including Prochloron, Prochlorothrix, and Prochlorococcus) lacking phycobilisomes, these proteins form light-harvesting antenna (binding both, chlorophyll a and chlorophyll b), while their homologs in cyanobacteria encode chlorophyll a binding protein IsiA, expressed exclusively under conditions of iron starvation. In addition, Nostoc PCC 7120 and Trichodesmium erythraeum contain multiple PsbC homologs of yet unknown function, while a few other species contain none. This protein family is closely related to the PSII chlorophyll-binding protein PsbC and � more distantly -- PsbB. Use "show clusters" to view this Subsystem - many PSII-related genes are beautifully clustered in various combinations. ============================== This subsystem covers protein complexes involved in a single AraCyc reaction: photosystem II: <a href="http://pmn.plantcyc.org/PLANT/NEW-IMAGE?type=REACTION&object=PSII-RXN">PSII-RXN</a> ============================== References: 1. Jason Raymond, Robert E. Blankenship. 2004 The evolutionary development of the protein complement of Photosystem 2. Biochimica et Biophysica Acta 1655 (2004) 133� 139. 2. Shi LX, Schroder WP. 2004. The low molecular mass subunits of the photosynthetic supracomplex, photosystem II. Biochim Biophys Acta. 1608(2-3):75-96. 3. J. La Roche, G.W.M. Van Der Staay, F.Partensky, A.Ducret, R.Aebersold, R.Li , S.S.Golden , R. G. Hiller, P. M. Wrench, A. W. D. Larkum, And B. R. Green. 1996. Independent evolution of the prochlorophyte and green plant chlorophyll a/b light-harvesting proteins. Proc. Natl. Acad. Sci. USA Vol. 93, pp. 15244�15248.
