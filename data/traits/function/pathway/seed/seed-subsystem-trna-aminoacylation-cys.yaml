identifier: proteintraitsmech:SEED_SUBSYSTEM_tRNA_aminoacylation__Cys
label: "tRNA aminoacylation, Cys"
definition: >-
  Cysteinyl-tRNA(Cys) is most commonly made by directly charging tRNA(Cys) with Cys. Cysteinyl-tRNA(Cys) is made by an indirect pathway in methanogens and some of their relatives. Unlike Selenocysteine-tRNA(Sec), where the tRNA is charged first with serine, in this case the tRNA is charged with phosphoserine. The sulfur is then transfered to the actived hydroxyl group.
