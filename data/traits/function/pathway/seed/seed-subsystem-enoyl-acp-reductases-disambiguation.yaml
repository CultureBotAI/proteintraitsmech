# subsystem_id: Enoyl-[ACP]_reductases_disambiguation
identifier: proteintraitsmech:SEED_SUBSYSTEM_Enoyl-_ACP__reductases_disambiguation
label: "Enoyl-[ACP] reductases disambiguation"
definition: >-
  Enoyl-acyl carrier protein (ACP) reductases (ENRs) catalyze the last step of the elongation cycle in the synthesis of fatty acids, namely, the reduction of a trans-2-acyl-ACP (an enoyl-ACP) to the fully saturated acyl-ACP species. The reductant is either NADH or NADPH, although in one case a reduced flavin (FMNH2) is used as an intermediate in the reduction (PMID: 19151923) ENRs display an unusual diversity among organisms (unlike other enzymes of fatty acid biosynthesis). Selective emergence of different types of ENR could be due to the fact that a variety of both synthetic and natural antibacterial compounds are shown to specifically target their activity, e.g. triclosan and isoniazid (PMID: 27577999). See also Subsystem: "Resistance to Triclosan" So far, four ENR isozymes have been characterized in bacteria in detail, namely FabI, FabL, FabV, and FabK (PMID:19151923). FabI and FabL ENRs are known to share a similar YX6K type catalytic domain, whereas FabV carry a YX8K type catalytic domain. All ENRs are members of the short-chain dehydrogenase/reductase (SDR) superfamily, except for FabK, which is completely TCS-refractory and is a non-SDR ENR (PMID:27577999) In addition to the 4 prototypic ENR types, recent functional screening of the soil metagenome revealed that a variety of target ENR homologues are responsible for the TCS resistance (PMID: 27577999). Diverse ENRs similar to 7-&#945;-hydroxysteroid dehydrogenase (7-&#945;-HSDH), FabG, or the unusual YX7K-type ENR conferred extreme tolerance to TCS. The TCS-refractory 7-&#945; HSDH-like ENR and the TCS-resistant YX7K-type ENR seem to be prevalent in human pathogenic bacteria, suggesting that a selective enrichment occurred in pathogenic bacteria in soil (PMID: 27577999). These additional types of ENR are included in this Subsystem as well, flagged as "via_metagenomics" References: Cell Mol Life Sci. 2009 May;66(9):1507-17. PMID:19151923 Diversity in enoyl-acyl carrier protein reductases. Massengo-Tiass� RP1,