identifier: proteintraitsmech:SEED_SUBSYSTEM_Succinate_dehydrogenase_and_Fumarate_reductase_cpmlexes
label: "Succinate dehydrogenase and Fumarate reductase cpmlexes"
definition: >-
  Succinate-ubiquinone oxidoreductase (SQR) as part of the trichloroacetic acid cycle and menaquinol-fumarate oxidoreductase (QFR) used for anaerobic respiration by Escherichia coli are structurally and functionally related membrane-bound enzyme complexes. Each enzyme complex is composed of four distinct subunits. Both enzyme complexes contain a catalytic domain composed of a subunit with a covalently bound flavin cofactor, the dicarboxylate binding site, and an iron-sulfur subunit which contains three distinct iron-sulfur clusters. The catalytic domain is bound to the cytoplasmic membrane by two hydrophobic membrane anchor subunits that also form the site(s) for interaction with quinones. The membrane domain of E. coli SQR is also the site where the heme b556 is located.
