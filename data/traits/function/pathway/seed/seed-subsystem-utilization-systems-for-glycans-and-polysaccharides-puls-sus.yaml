identifier: proteintraitsmech:SEED_SUBSYSTEM_Utilization_systems_for_glycans_and_polysaccharides__PULs__SUS
label: "Utilization systems for glycans and polysaccharides (PULs, SUS)"
definition: >-
  Subsystem under construction Quoted from PMID: 25846333: "...Many members of the phylum Bacteroidetes use a novel mechanism to digest and utilize polysaccharide substrates. They use cell surface proteins to partially digest the polysaccharides and actively import the resulting oligosaccharides across the outer membrane for further digestion in the periplasm (Martens et al. 2009; Salyers et al. 1996). This strategy was first identified for starch utilization by the intestinal anaerobe Bacteroides thetaiotaomicron and involves a series of starch utilization system (Sus) proteins (Reeves et al. 1996, 1997; Shipman et al. 1999, 2000). Enzymes such as SusG partially digest starch, the cell-surface lipoprotein SusD binds to oligosaccharides, and the porin SusC allows transport across the outer membrane. Transport is thought to be coupled to cellular energy via the TonB/ExbBD system. B. thetaiotaomicron has over 100 susC-like genes and over 100 susD-like genes, and these are almost all arranged in tandem with susC-like genes upstream of susD-like genes (Martens et al. 2009). Many of these susC/susD pairs are adjacent to other genes involved in polysaccharide utilization, and the regions are referred to as polysaccharide utilization loci (PULs). susC-like and susD-like genes appear to be con- fined to members of the phylum Bacteroidetes, but they are very common within that phylum (Bauer et al. 2006; Gonzalez et al. 2008; Manfredi et al. 2011; Martens et al. 2009; McBride et al. 2009; Xie et al. 2007). Like B. thetaiotaomicron, many of these bacteria have dozens of PULs that are thought to allow them to utilize diverse substrates" According to a working model of PULs proposed in PMID: 27137179: �the SusCD proteins are key for initial starch sensing, and together promote the efficient uptake of maltooligosaccharides. SusC and D likely inter- act frequently as the essential unit for glycan uptake, while the interactions of these proteins with SusEFG may be more dynamic. SusEF as well as the starch-binding sites within SusG support starch binding at the cell surface through the polysaccharide capsule. The redundancy of cell surface starch-binding sites likely enhances the capture of dietary starch, and maltooligosaccharides generated by other species in the gut. The structure of PUL operons is not completely conserved as there are several variations of predicted starch-targeting PULs among other well-studied Bacteroides species. In particular, the number of SusE/F homologs, and conservation of the SusG protein varies extensively. In addition, many predicted Sus PULs do not include obvious susA or susB genes within the same operon. Notably, proteins encoded by the susC and susD genes are the most well conserved, underscoring their central function in glycan uptake" (PMID: 27137179)
