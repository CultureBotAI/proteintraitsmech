# subsystem_id: Anthrose_Biosynthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Anthrose_Biosynthesis
label: "Anthrose Biosynthesis"
definition: >-
  The pathway for the synthesis of anthrose (2-O-methyl-4-(3-hydroxy-3-methylbutamido)-4,6-dideoxy-D-glucose), a sugar in the Bacillus anthracis exosporium, the outer layer of the spore. The outermost layer of the B. anthracis (and the closely related species B. cereus and B. thuringiensis) spore, the exosporium, comprises a paracrystalline basal layer and an external hair-like nap. The basal layer contains more than a dozen different proteins, while the nap is composed of filaments formed by a single collagen-like glycoprotein called BclA. Multiple copies of an O-linked pentasaccharide, 2-O-methyl-4-(3-hydroxy-3-methylbutamido)-4,6-dideoxy-&#946;-D-glucopyranosyl-(1->3)-{alpha}-L-rhamnopyranosyl-(1->3)-{alpha}-L-rhamnopyranosyl-(1->2)-L-rhamnopyranosyl-(1->?)-N-acetylgalactosamine , attached to several sites within the central collagen-like region of BclA. The unusual noreducing terminal sugar 2-O-methyl-4-(3-hydroxy-3-methylbutamido)-4,6-dideoxy-D-glucose is called anthrose. Anthrose is important in spore survival and propagation. The genes for the biosynthesis of anthrose constitute a four-gene operon and an adjacent, downstream two-gene operon. The pathway requires four dedicated enzymes and the initial substrates methylcrotonyl-CoA and dTDP-4-keto-6-deoxy-{alpha}-D-glucose, which are provided by leucine catabolism and L-rhamnose biosynthesis, respectively. A scheme is available under the "Diagram and Illustration" tab above (quoted from PMID:20675481). The two glycosyltransferases (one in each operon) may be involved in polymerization of the anthrose-containing pentasaccharide or its attachment to BclA. Deletion of the 4-gene operon abolished anthrose synthesis. Deletion of the two-gene operon did not have a significant effect on the anthrose content of spores, suggesting their activities can be carried out by other genes in the cell.
