# subsystem_id: Polyunsaturated_Fatty_Acids_synthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Polyunsaturated_Fatty_Acids_synthesis
label: "Polyunsaturated Fatty Acids synthesis"
definition: >-
  Polyunsaturated fatty acids (PUFAs) have important structural roles in cell membranes. In higher eukaryotes they are also intermediates in the synthesis of biologically active molecules such as eicosanoids, which mediate fever, inflammation, blood pressure and neurotransmission. Lower eukaryotes are particularly rich in C20-22 polyunsaturated fatty acids. Fungi and marine microalgae are currently used to produce dietary nutrients for neonatal babies, since arachidonic and docosahexaenoic acids are essential components of brain tissues required for the development of neural and retinal functions Until the 1990s it was thought that, with the exception of cyanobacteria, bacteria had no polyunsaturated fatty acids. It has since been found that omega-3 long-chain PUFAs such as eicosapentaenoic acid (EPA) and docosahexaenoic acid (DHA) are preferentially distributed in psychrophilic bacteria that inhabit low-temperature deep-sea environments and the intestines of sea &#64257;sh. After the discovery of the EPA biosynthetic pfa genes (Yazawa et al., 1996; Metz et al., 2001), their homologues were detected in sequenced genomes of various marine bacteria. The pfa genes of Moritella marina MP-1 were the &#64257;rst genes to be cloned from DHA-producing bacteria (Tanaka et al., 1999). Notably, PUFAs detected in bacteria are mostly EPA or DHA and not C18 PUFAs such as linoleic and linolenic acids, which are most common in animals, plants, fungi, and cyanobacteria. Polyunsaturated fatty acids can be synthesized by two different pathways: an anaerobic one, by using polyketide synthase related enzymes, and an aerobic one, which involves the action of elongases and oxygen dependent desaturases. Only the former is encoded in this Subsystem. It is the only PUFA biosynthetic pathway known for prokaryotes (Metz et al., 2001), it is currently under intense investigation
