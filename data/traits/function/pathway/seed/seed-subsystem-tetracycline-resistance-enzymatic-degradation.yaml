identifier: proteintraitsmech:SEED_SUBSYSTEM_Tetracycline_resistance__enzymatic_degradation
label: "Tetracycline resistance, enzymatic degradation"
definition: >-
  Subsystem under construction Tetracyclines (TET) were discovered in the 1940s and exhibited activity against a wide range of microorganisms including gram-positive and gram-negative bacteria, chlamydiae, mycoplasmas, rickettsiae, and protozoan parasites. The first tetracycline-resistant bacterium, Shigella dysenteriae, was isolated in 1953. It was in fact the inquiry into molecular mechanisms of TET resistance that opened up the entire field of antimicrobial resitance (ISBN 1-55581-329-1) Tetracycline resistance is most often due to the acquisition of new genes, which encode either (i) energy-dependent efflux of tetracyclines or (ii) a protein that protects bacterial ribosomes from the action of tetracyclines (Chopra and Roberts, 2001). Ribosomal protection proteins and TET efflux pumps are the two main mechanisms of TET resistance. In addition, a limited number of bacteria acquire resistance by mutations, which alter the permeability of the outer membrane porins and/or lipopolysaccharides in the outer membrane, change the regulation of innate efflux systems, or alter the 16S rRNA. Reviewed in (Chopra and Roberts, 2001) Over 40 types of TET resistant determinants have been described so far, and new ones are being reported. Dr. Stuart Levy from Tufts is the clearinghouse for naming new TET genes. A new gene must have <79% amino acid identity with all previous characterized TET genes to be recorded. A detailed up-to-date database is maintained by prof. Marilyn Roberts: http://faculty.washington.edu/marilynr/ http://faculty.washington.edu/marilynr/tetnomenclature.pdf This Subsystem encodes tetracycline degradation/modification enzymes. For tetracycline resistant determinants of the ribosomal protection type see Subsystem "Tetracycline resistance, ribosome protection type" For tetracycline resistant determinants of the efflux type see Subsystem "Tetracycline resistance, efflux systems type"
