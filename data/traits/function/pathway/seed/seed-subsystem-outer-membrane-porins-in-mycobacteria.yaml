identifier: proteintraitsmech:SEED_SUBSYSTEM_Outer_membrane_porins_in_Mycobacteria
label: "Outer membrane porins in Mycobacteria"
definition: >-
  Mycobacteria have a very thick outer lipid bilayer with an exceptionally low permeability, rendering mycobacteria intrinsically resistant to many antibiotics.Pore proteins spanning the outer membrane mediate the diffusion of hydrophilic nutrients. M.tuberculosis' main porin OmpaTb is essential for adaptation of M. tuberculosis to low pH and survival in macrophages. MspA is the main porin of M.smegmatis. It forms a tetrameric complex with a single central pore of 10 nm length and a cone-like structure. This structure differs clearly from that of the trimeric porins of Gram-negative bacteria, which form one 4 nm long pore per monomer. The 45-fold lower number of porins compared to Gram-negative bacteria and the exceptional length of the pores are two major determinants of the low permeability of the outer membrane of M. smegmatis for hydrophilic solutes.
