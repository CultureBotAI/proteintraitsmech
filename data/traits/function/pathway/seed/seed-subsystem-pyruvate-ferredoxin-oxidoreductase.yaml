identifier: proteintraitsmech:SEED_SUBSYSTEM_Pyruvate_ferredoxin_oxidoreductase
label: "Pyruvate:ferredoxin oxidoreductase"
definition: >-
  In mitochondria and most aerobic bacteria, oxidative pyruvate decarboxylation, a central step in energy metabolism, is catalyzed by the pyruvate dehydrogenase multienzyme complex. In archaea, most anaerobic bacteria, and amitochondriate eukaryotes, this reaction is catalyzed reversibly by a single enzyme, pyruvate:ferredoxin oxidoreductase (PFOR), the electron acceptor being either ferredoxin or flavodoxin. The enzyme contains [4Fe-4S] clusters and thiamine pyrophosphate. In strictly anaerobic microorganisms PFOR is involved in substrate-level phosphorylation. In many nitrogen-fixing microorganisms, it is the source of low-potential electrons for nitrogenase, whereas in acetogenic bacteria like Clostridium thermoaceticum, it links glycolysis to the Wood�Ljungdahl pathway of acetyl-CoA synthesis. In contrast to pyruvate dehydrogenase, PFOR can also catalyze the reverse reaction, i.e., the reductive carboxylation of acetyl-CoA provided that a sufficiently low-potential electron donor (like ferredoxin) is available. It has been reported for many obligatory anaerobes, including some photosynthetic bacteria, and more recently for an extremely thermophilic aerobic microorganism. This reverse reaction is important for some autotrophs because it serves to assimilate CO2 into cell carbon. Hypothetical NADPH-dependent oxidoreductases tend to cluster with both types of PFOR, they are encoded in this SS as auxiliary roles (AUX).
