# subsystem_id: Toluene-o-xylene_monooxygenase_(ToMO)
identifier: proteintraitsmech:SEED_SUBSYSTEM_Toluene-o-xylene_monooxygenase__ToMO
label: "Toluene-o-xylene monooxygenase (ToMO)"
definition: >-
  ToMO hydroxylates toluene in the o, m, and p positions, as well as o-xylene in both the 3 and 4 positions, and it oxidizes many substrates, including o-xylene, m-xylene, p-xylene, toluene, benzene, ethyl benzene, styrene, naphthalene, and trichloroethylene (TCE). ToMO can form catechol from phenol, as well as THB from catechol, hydroquinone, and resorcinol.
