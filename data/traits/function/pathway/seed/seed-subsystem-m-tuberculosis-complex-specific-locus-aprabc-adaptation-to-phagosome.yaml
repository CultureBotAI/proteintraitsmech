identifier: proteintraitsmech:SEED_SUBSYSTEM_M._tuberculosis_complex-specific_locus_aprABC__adaptation_to_phagosome
label: "M. tuberculosis complex-specific locus aprABC, adaptation to phagosome"
definition: >-
  Mol Microbiol. 2011 May;80(3):678-94. PMID: 21401735 aprABC: a Mycobacterium tuberculosis complex-specific locus that modulates pH-driven adaptation to the macrophage phagosome. Abramovitch RB1, Rohde KH, Hsu FF, Russell DG. Abstract Following phagocytosis by macrophages, Mycobacterium tuberculosis (Mtb) senses the intracellular environment and remodels its gene expression for growth in the phagosome. We have identified an acid and phagosome regulated (aprABC) locus that is unique to the Mtb complex and whose gene expression is induced during growth in acidic environments in vitro and in macrophages. Using the aprA promoter, we generated a strain that exhibits high levels of inducible fluorescence in response to growth in acidic medium in vitro and in macrophages. aprABC expression is dependent on the two-component regulator phoPR, linking phoPR signalling to pH sensing. Deletion of the aprABC locus causes defects in gene expression that impact aggregation, intracellular growth, and the relative levels of storage and cell wall lipids. We propose a model where phoPR senses the acidic pH of the phagosome and induces aprABC expression to fine-tune processes unique for intracellular adaptation of Mtb complex bacteria.
