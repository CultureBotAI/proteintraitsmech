label: "Mycobacterial lipid and multidrug efflux system proteins MmpL, MmpS"
definition: >-
  Bailo R1, Bhatt A2, A�nsa JA3. 2015. Lipid transport in Mycobacterium tuberculosis and its implications in virulence and drug development. Biochem Pharmacol, 96(3):159-67. PMID: 25986884 Abstract The exclusive mycobacterial cell wall lipids such as trehalose monomycolate and dimycolate (TMM, TDM), phthiocerol dimycocerosate (PDIM), sulpholipid-1 (SL-1), diacyl trehalose (DAT), and pentacyl trehalose (PAT), among others, are known to play an important role in pathogenesis; thus, proteins responsible for their transport are potential virulence factors. MmpL and MmpS proteins mediate transport of important cell wall lipids across the mycobacterial membrane. In Mtb, MmpL3, MmpL7 and MmpL8 transport TMM, PDIM and SL-1 respectively. The translocation of DAT and biosynthesis of PAT is likely due to MmpL10. MmpL and MmpS proteins are involved in other processes such as drug efflux (MmpL5 and MmpL7), siderophore export (MmpL4/MmpS4 and MmpL5/MmpS5), and heme uptake (MmpL3 and MmpL11). Altogether, these proteins can be regarded as new potential targets for antituberculosis drug development. MmpL5 and MmpS5 proteins contribute to azoles resistance in Mycobacteria (PMID: 18851927). Analysis of several spontaneous azoles resistant mutants from M. tuberculosis and M. bovis BCG demonstrated both, an increased econazole efflux and increased transcription of mmpS5-mmpL5 genes. The up-regulation of mmpS5-mmpL5 genes was furthee linked to mutations either in the Rv0678 gene, hypothesized to be involved in the transcriptional regulation of this efflux system (PMID: 18851927)
