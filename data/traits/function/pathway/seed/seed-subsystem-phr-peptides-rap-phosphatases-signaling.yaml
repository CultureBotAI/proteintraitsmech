identifier: proteintraitsmech:SEED_SUBSYSTEM_Phr_peptides_-_Rap_phosphatases_signaling
label: "Phr peptides - Rap phosphatases signaling"
definition: >-
  Quorum sensing depends on extracellular cell�cell signaling molecules. In Gram-negative bacteria, these signals are derived from acylated homoserine lactones. In contrast, Gram-positive bacteria predominately use peptides. Bacillus subtilis and its closest relatives have multiple rap-phr quorum sensing gene pairs that coordinate a variety of physiological processes with population density. Rap proteins, originally named for their function as regulators of aspartate phosphatases (Perego et al., 1994), influence Spo0A activity by modulating the sporulation phosphorelay system. Specifically, the chromosomally encoded Rap proteins (RapA, B, E, H, I and J) act as phosphatases of Spo0F~P. Rap protein activity is coordinated with population density via extracellular Phr signaling peptides. Phr peptides are synthesized as precursor proteins, pro-Phr, containing an N-terminal signal sequence that is required for export into the extracellular environment by the SecA pathway (Pottathil and Lazazzera, 2003; Stephenson et al., 2003). Once outside the cell, extracellular proteases Subtilisin, Vpr and Epr, process the Phr precursor into the mature signaling peptide (Lanigan-Gerdes et al., 2007). Mature Phr peptides reenter cells through the oligopeptide permease Opp (LeDeaux et al., 1997), and once inside the cell, Phr peptides bind to and inhibit the activity of their cognate Rap proteins Notably, rap-phr genes can also present on mobile genetic elements, e.g. Rap60-Phr60 from plasmid pTA1060 was shown to coordinate a variety of biological processes with population density including sporulation, cannibalism, biofilm formation and genetic competence (PMID:25598361) The two founding members of the Phr family of extracellular signaling peptides are the PhrA peptide (sequence: ARNQT) and CSF (PhrC) of B. subtilis. CSF was identified as a five amino acid peptide (sequence: ERGMT) present in the culture supernatants that stimulated the activity of a transcription factor ComA required for genetic competence development (PMID: 8769645)
