label: "Cyclic Di-GMP Turnover Proteins"
definition: >-
  Bis-(3'-5')-cyclic-di-guanosine monophosphate (c-di-GMP) is a bacterial signalling molecule produced by diguanylate cyclases (DGC, carrying GGDEF domains) and degraded by specific phosphodiesterases (PDE, carrying EAL domains). c-di-GMP has been shown to be involved in the regulation of metabolic processes, cell differentiation, and modulation of the cell surface properties of microorganisms. More specifically, intracellular levels of c-di-GMP have been shown to regulate the formation of rugose colony morphology, intracellular aggregation, exopolysaccharide synthesis, biofilm formation, and motility in several species.
