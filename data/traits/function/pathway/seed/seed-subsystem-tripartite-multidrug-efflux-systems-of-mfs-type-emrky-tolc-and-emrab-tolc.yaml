identifier: proteintraitsmech:SEED_SUBSYSTEM_Tripartite_multidrug_efflux_systems__of_MFS_type__EmrKY-TolC_and_EmrAB-TolC
label: "Tripartite multidrug efflux systems (of MFS type) EmrKY-TolC and EmrAB-TolC"
definition: >-
  The major facilitator superfamily (MFS) is the largest known superfamily of secondary carriers found in the biosphere (PMID:22458847) E. coli K-12 contains 70 MFS transporters, 15 of which may be considered drug exporters, as they belong to families 2 and 3 (http://www.membranetransport.org/), which are composed of 12-TMS (transmembrane segment) and 14-TMS members, respectively, of drug/H+ antiporters (PMID:22458847). Most of them, however, are free-standing transporters located in the IM and transport drugs from the cytosol to only the periplasm. Because most antimicrobial agents reach the cytosol usually by diffusion across the membrane bilayer, the pumped-out drug molecules have a good chance of reentering the cytosol through this free-diffusion process, and the transporters of this class are not expected to create high-level resistance (PMID:25788514). A few MFS pumps, however, occur with their own periplasmic adaptor proteins and with OM channels [such as TolC or other OM factors (OMF)] and presumably produce an efficient tripartite efflux system. In E. coli, these pumps include EmrB (occurring with the cognate adaptor EmrA) and EmrY (with EmrK), which indeed appear to be involved in the efflux of uncouplers and other substrates (PMID:11566977, PMID:1409590). The two operons are similar on the sequence level. EmrY was identified in a screen for genes that reduce the lethal effects of stress. An emrY insertion mutant is more sensitive than wild type to mitomycin C and other stresses and other stresses such as UV irradiation (PMID: 20128927)
