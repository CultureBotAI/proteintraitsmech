identifier: proteintraitsmech:SEED_SUBSYSTEM_Fermentations__Lactate
label: "Fermentations: Lactate"
definition: >-
  This subsystem has been initially encoded by master:NeilJ_UCSD and master:MaryP_UCSD, whose contributions we gratefully acknowledge, as "Homofermentative_lactate_fermentation" and Heterofermentative_lactate_fermentation. It is currently curated by SelkovEE and SvetaG. Three major types of lactate fermentations have been described: homofermentation, heterofermentation, and bifidum pathway (schemes are posted under the 'Diagrams and Illustrations' tab above). Homofermentation is associated with the Embden-Meyerhof glycolytic pathway (see the corresponding SS for details); heterofermentation uses the Pentose Phosphate pathway (see the corresponding SS). Theoretical ATP yield of homofermentation is 2 ATP molecules per glucose, the yield of heterofermentative pathway is 1 ATP per glucose. Bifidobacteria perform specific bifidum pathway with net gain of 2.5 ATP molecules per 1 glucose. Although the presence of Xylulose-5-phosphate phosphoketolase is generally considered diagnostic for lactate heterofermentation pathway, in a few organisms containing XPK, no lactate dehydrogenase could be identified (variant code [9] - see below), hence apparently XPK activity is not necessarily associated with production of lactate. The presence of Fructose-6-phosphate phosphoketolase enzymatic activity is characteristic for the 'bifid shunt' (see two schemes under 'illustrations' tab). There is evidence for the existence of two distinct F6P-phosphoketolase enzymes in bifidobacteria [Meile et al., 2001] - one is specific solely for F6P; the other is less stringent and is able to utilize D-xylulose-5-phosphate (X5P) as an alternative substrate. Both reactions are required for the bifid shunt [Scardovi and Trovatelli, 1965], thus, it makes sense that the same enzyme catalyses both roles in this pathway. However, since these 2 forms can't be distinguished based on protein sequences alone, all clear XPK/FPK homologs have been annotated as potentially capable of catalyzing both reactions - �Xylulose-5-phosphate phosphoketolase (EC 4.1.2.9); Fructose-6-phosphate phosphoketolase (EC 4.1.2.22)� probably leading to severe over-annotation. In an attempt to minimize the damage of it, the XPK/FPK homologs where FPK activity was experimentally demonstrated (in Bifidum species) or could be inferred from genome context (see below) were annotated �Xylulose-5-phosphate phosphoketolase (EC 4.1.2.9) / Fructose-6-phosphate phosphoketolase (EC 4.1.2.22)� with a slash �/�. Also, such organisms were assigned variant codes [_4]. In addition to Bifidobacteria these include Clostridium acetobutylicum and Streptococcus agalactiae where the absence of Glucose-6-phosphate 1-dehydrogenase (EC 1.1.1.49) and 6-phosphogluconate dehydrogenase, decarboxylating (EC 1.1.1.44) may necessitate FPK activity in XPK/FPK homolog. References for the BIFID shunt: Suzuki R1, Katayama T, Kim BJ, Wakagi T, Shoun H, Ashida H, Yamamoto K, Fushinobu S. Crystal structures of phosphoketolase: thiamine diphosphate-dependent dehydration mechanism. J Biol Chem. 2010 Oct 29;285(44):34279-87. PMID:20739284 Scardovi, V. and Trovatelli, L.D. (1965) The fructose-6-phos- phate shunt as peculiar pattern of hexose degradation in the genus Bifidobacterium. Ann. Microbiol. 15, 19�29. Meile, L., Rohr, L.M., Geissmann, T.A., Herensperger, M. and Teuber, M. (2001) Characterization of the D-xylulose 5-phos- phate/D-fructose 6-phosphate phosphoketolase gene (xfp) from Bifidobacterium lactis. J. Bacteriol. 183, 2929�2936.
