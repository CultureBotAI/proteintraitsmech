# subsystem_id: Pseudomonas_quinolone_signal_PQS
identifier: proteintraitsmech:SEED_SUBSYSTEM_Pseudomonas_quinolone_signal_PQS
label: "Pseudomonas quinolone signal PQS"
definition: >-
  Virulence factor production and the development of biofilms in Pseudomonas aeruginosa have been shown to be regulated by two hierarchically organized quorum-sensing systems activated by two types of small acyl-homoserine lactone signal molecules (common in gram-negative bacteria): (i) N-(3-oxo-do-decanoyl)-L-homoserine lactone, which is the signal of the las quorum-sensing system; (ii) N-butanoyl-homoserine lactone, which is the signal of the rhl quorum-sensing system Recently, a third type of bacterial signal molecule, the Pseudomonas quinolone signal (PQS), has been identified, which positively regulates a subset of genes dependent on the quorum-sensing systems (Pesci et al., 1999; Bredenbruch et al., 2006). The Pseudomonas quinolone signal (PQS) is a 3-hydroxy-4-quinolone with a 2-alkyl substitution which is synthesized by the condensation of anthranilic acid with a 10-carbon 3-keto-fatty acid (Coleman et al., 2008). PQS is only one of a large class of these compounds [so called 2-alkyl-4(1H)-quinolones (AHQs)]. In fact, P. aeruginosa produces over 50 different AHQs [Lepine et al., 2004]. Although biological functions of many of these are not known, some were originally identified for their antibacterial properties. This type of small signal molecules thus far appear to be synthesized only by P. aeruginosa and certain Burkholderia species (Diggle et al., 2006). PQS has been shown to control the expression of multiple virulence factors in P. aeruginosa. PQS acts as a ligand for PqsR, the transcriptional activator which controls the pqsABCDE operon (Wade et al., 2005). Diggle et al., 2006 have shown that many species of both Gram-positive and Gram-negative bacteria contain putative pqs gene homologs. However, apart from P. aeruginosa, only strains of the primary human pathogen B. pseudomallei and the serologically and genetically related B. thailandensis were found to contain a complete, putative pqsABCDE operon. Interestingly, neither B. pseudomallei nor B. thailandensis possess a homolog of the P. aeruginosa pqsH gene. This gene facilitates the conversion of HHQ to PQS in P. aeruginosa, and its absence from B. pseudomallei would suggest that production of PQS was unlikely in this organism. Indeed, the authors have shown that while none of the strains examined synthesized PQS, all produced HHQ [2-heptyl-4(1H)-quinolone]; B. thailandensis produced a range of AHQs; and at least one B. pseudomallei strain made 2-nonenyl-4(1H)-quinolone (NEHQ) (Diggle et al., 2006). Mutation of hhqA in B. pseudomallei resulted in the loss of AHQ synthesis, altered colony morphology, and enhanced elastase synthesis. Exogenous HHQ reduced elastase production in the B. pseudomallei hhqA mutant, consistent with a role for HHQ in cell-cell signaling. In addition, the B. pseudomallei hhqA and hhqE genes both complemented the corresponding P. aeruginosa pqsA and pqsE mutants, demonstrating that the genes required for AHQ synthesis and response are functionally conserved across the two genera, and that AHQ signaling is not restricted to P. aeruginosa (Diggle et al., 2006).
