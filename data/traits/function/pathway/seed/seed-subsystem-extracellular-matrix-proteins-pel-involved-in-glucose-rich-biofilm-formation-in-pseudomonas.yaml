identifier: proteintraitsmech:SEED_SUBSYSTEM_Extracellular_matrix_proteins__PEL__involved_in_glucose-rich_biofilm_formation_in_Pseudomonas
label: "Extracellular matrix proteins (PEL) involved in glucose-rich biofilm formation in Pseudomonas"
definition: >-
  Pseudomonas aeroginosa forms biofilms, which are cellular aggregates encased in an extracellular matrix. Two loci, pel and psl, have been identified and are involved in the production of carbohydrate-rich components of the biofilm matrix. The pel gene cluster is involved in the production of a glucose-rich matrix material in P. aeruginosa strain PA14. The psl gene cluster is involved in the production of a mannose-rich matrix material in P. aeruginosa strain ZK2870. Either carbohydrate-rich matrix appears to be sufficient for mature biofilm formation, and at least one of them is required for mature biofilm formation in P. aeruginosa strains PA14 and ZK2870. These 7 adjacent genes, named pel genes, are involved in the formation of the pellicle's extracellular matrix and are required for the formation of the solid surface-associated biofilms that encase the cells. The pel gene cluster is involved in the production of a glucose-rich matrix material in P. aeruginosa strain PA14. These biofilms aid in the survival in a variety of environments. Sequence analyses predicted that 2 pel genes encode transmembrane proteins and that five pel genes are involved in carbohydrate processing. The five genes most likely involved in the carbohydrate processing are PelA, PelC, PelD, PelE and PelF which most likely produces a glucose-rich component required for the structural integrity of the biofilm matrix.
