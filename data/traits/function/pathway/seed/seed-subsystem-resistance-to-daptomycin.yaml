# subsystem_id: Resistance_to_Daptomycin
identifier: proteintraitsmech:SEED_SUBSYSTEM_Resistance_to_Daptomycin
label: "Resistance to Daptomycin"
definition: >-
  Daptomycin (DAP), a fermentation product produced by Streptomyces roseosporus, is a cyclic lipopeptide antibiotic with potent bactericidal activity against most Gram-positive organisms including multiple antibiotic-resistant and -susceptible strains. It exerts its effect through cell membrane disruption (PMID: 17402833). DAP appears to have a multifaceted effect on cell wall homeostasis that includes leakage of small ions, such as intracellular potassium, leading to loss of membrane potential, and by changes to the cell envelope ultrastructure leading to rapid cell death (PMID: 12878516). Recent evidence strongly suggests that DAP inserts into the plasma membrane in a calcium-dependent manner and subsequently disrupts the functional integrity of the cell membrane, altering cell division. Fluorescence studies have shown that DAP forms membrane-associated oligomers on liposomes and bacterial cells, suggesting that it is phosphatidylglycerol (PG)-dependent oligomerization of DAP that contributes to its effectiveness in altering membrane homeostasis (PMID: 23114777) Resistance mechanisms: The change in the bacterial cell envelope and biophysical properties of the cell membrane appear to play an important role in the interaction of daptomycin with the cell membrane, and it has been postulated that a more positively charged cell envelope �repels� the cationic daptomycin from the cell membrane, contributing to the development of resistance (PMID:17954690; PMID:21899450). A major factor in the cell-envelope charge is the phospholipid composition of the inner and outer cell-membrane leaflets, such as the negatively charged phospholipid cardiolipin and the positively charged amino derivatives of phosphatidylglycerol. In S. aureus, all daptomycin-nonsusceptible strains had a mutation in a phospholipid biosynthesis gene. This included mutations in the previously described mprF gene, L-O-lysylphosphatidylglycerol synthase (PMID:16723576, PMID:12878516), but also in other phospholipid biosynthesis genes, including cardiolipin synthase (cls2) and CDP-diacylglycerol-glycerol-3-phosphate 3-phosphatidyltransferase (pgsA). EM and lipid membrane composition analyses on two clinical pairs showed that the daptomycin-nonsusceptible strains had a thicker cell wall and an increase in membrane lysyl-phosphatidylglycerol (PMID:22238576, PMID:17954690; PMID:19289517) In Enterococci the development of resistance to daptomycin, like the development of resistance in S. aureus, is associated with alterations in the cell envelope and biophysical properties of the cell membrane. However, the genes linked to these changes in enterococci appear to be different (PMID: 21899450; PMID:23114777) from those reported in S. aureus, with the exception of cardiolipin synthase, which has been implicated in DAP resistance in both taxa, albeit indirectly (PMID:21502617, PMID:23114777) Specifically in Enterococci DAP resistance has been linked to mutations in genes that alter the cell envelope stress response [liaFSR, where "lia" denotes lipid II cycle-interfering antibiotics protein](PMID:21899450) and changes in enzymes that directly affect phospholipid homeostasis, and these changes may alter membrane composition, such as glycerophosphoryl diester phosphodiesterase [GdpD] (PMID:21899450), as well as cardiolipin synthase (above) 1. Target organisms: most Gram-positive pathogens 2. Mechanism of action: 3. Molecular target: 4. Resistance mechanisms: 5. Required for resistance:
