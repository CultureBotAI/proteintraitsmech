# subsystem_id: Methicillin_resistance_in_Staphylococci
identifier: proteintraitsmech:SEED_SUBSYSTEM_Methicillin_resistance_in_Staphylococci
label: "Methicillin resistance in Staphylococci"
definition: >-
  Methicillin resistance in staphylococci is due to an acquired foreign penicillin-binding protein, PBP2-prime (PBP2a). PBP2a belongs to the group of high-molecular-mass PBPs of class B1, a family of proteins containing a transpeptidase domain and a non-penicillin-binding domain of unknown function (Goffin and Ghuysen 1998). They are characterized by very low affinity to beta-lactams, allowing the strains to grow in the presence of drug concentrations sufficient to inactivate the PBP modules of all other multimodular PBPs. PBP2a confers an intrinsic resistance to all beta-lactams and their derivatives. PBP2a is a rather poor transpeptidase forming mainly muropeptide-dimers when all other PBPs are saturated with beta-lactams (de Jonge and Tomasz 1993) and seems to depend on the transglycosylase module of the resident PBP2 (Pinho et al., 2001) and PBP4 (Leski and Tomasz, 2005) to confer resistance, even though their transpeptidase activity is inhibited by methicillin. The PBP2a is encoded by mecA, located on a SCCmec element (=Staphylococcus Cassette Chromosome MEC) - a novel mobile element that resembles neither transposons nor bacteriophages, and could be described, in analogy to pathogenicity islands, as a �resistance island� (Hiramatsu et al. 2001). It ranges in size between 21 and 67 kb and integrates into orfX, close to the origin of replication. Transcription of mecA can be regulated by two distinct, albeit analogous sets of regulatory genes. One is the regulatory element mecR1-mecI, located upstream and divergently transcribed from mecA; the second is the homologous regulatory element blaR1-blaI of the staphylococcal penicillinase. MecI and BlaI are repressors and can each repress mecA as well as blaZ transcription. In contrast, MecR1 and BlaR1, the corresponding sensor-transducer molecules, are specific for their cognate repressors and cannot substitute for each other (McKinney et al. 2001). Resistance levels in methicillin-resistant Staphylococcus aureus (MRSA) depend on efficient PBP2a production, and are modulated by auxiliary chromosomal factors, largely genes involved in the peptidoglycan precursor formation and turnover, regulation, transport, and signal transduction. Auxiliary factors can modulate methicillin-resistance levels in a mecA-acquired strain from phenotypically susceptible to highly resistant. The auxiliary factors that have been identified so far (largely by screening for the loss/reduction of methicillin resistance in insertion mutants generated by random transposon mutagenesis) are listed in this Subsystem � roughly in the order of their impact on methicillin resistance in Staphylococci (for a detailed review see ref. 1). The majority of them are annotated as bi-funtional as follows: �___factor involved in methicillin resistance / actual catalytic function (if known)� Please, follow the links in the Spreadsheet to the corresponding PEG pages to see complete annotations and links to relevant publications. Known regulatory systems are included in this SS as well. The global regulatory systems agr and sar also affect methicillin resistance (Duran et al. 1996), e.g. sigma-B, alternate sigma factor of S. aureus RNA polymerase, is required for the expression of high-level methicillin resistance in methicillin-resistant Staphylococcus aureus (MRSA) (Wu et al., 1996) and S. epidermidis (Knobloch et al., 2005). In summary, homogenous, high methicillin resistance requires sufficient expression of PBP2a, an optimal rate of peptidoglycan precursor formation, and a very specific peptidoglycan precursor structure. In addition, the control of autolytic activity, either directly or via the charge of cell wall polymers, appears to have an influence on resistance.
