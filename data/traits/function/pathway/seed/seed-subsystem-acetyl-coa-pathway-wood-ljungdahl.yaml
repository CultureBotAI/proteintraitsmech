identifier: proteintraitsmech:SEED_SUBSYSTEM_Acetyl-CoA_Pathway_Wood-Ljungdahl
label: "Acetyl-CoA Pathway Wood-Ljungdahl"
definition: >-
  The Acetyl-CoA Pathway is the major mechanism of CO2 and CO fixation under anaerobic conditions.It is characterized by the use of hydrogen as an electron donor and carbon dioxide as an electron acceptor to produce acetyl-CoA as the final product. This two step process begins with the reduction of a carbon dioxide to carbon monoxide. The carbon dioxide that is reduced to a carbonyl group, via the carbon monoxide dehydrogenase, is combined with the methyl group to form acetyl-CoA. The acetyl-CoA synthase complex is responsible for this reaction. It couples the folate-mediated one-carbon (C1) metabolism to either CO2 reduction or acetate oxidation via acetyl-CoA. is used in both the oxidative and reductive directions. Besides being used for energy production and autotrophic carbon assimilation in acetogens (Ljungdahl, 1994; Ragsdale, 1997; Drake et al., 2002), the Wood-Ljungdahl pathway is used for acetate catabolism by sulfate reducing bacteria (Schauder et al., 1988; Spormann and Thauer, 1988) and aceticlastic methanogens (Ferry, 1999) and for CO2 fixation by hydrogenotrophic methanogens (Stupperich et al., 1983; Ladapo and Whitman, 1990). two molecules of CO2 are reduced to a methyl and a carbonyl group, and are joined with coenzyme A (CoA) to make acetyl-CoA. Acetyl-CoA is then incorporated into cell carbon or converted to acetyl phosphate, whose phosphoryl group is transferred to ADP to generate ATP and acetate, the main growth product of acetogenic bacteria
