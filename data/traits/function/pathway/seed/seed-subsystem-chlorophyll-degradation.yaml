identifier: proteintraitsmech:SEED_SUBSYSTEM_Chlorophyll_Degradation
label: "Chlorophyll Degradation"
definition: >-
  Little is currently known on the mechanisms of chlorophyll degradation, plus the process seems to differ significantly in various groups of phototrophs. This SS is largely experimental. Variant codes: 1: cyanobacteria (oxygenic photosynthesis) 2: eukaryotic phototrophs 3: non-oxygenic photosynthetics References 1.Tohru Tsuchiya, Hiroyuki Ohta, Katsuya Okawadagger, Akihiro Iwamatsudagger, Hiroshi Shimada, Tatsuru Masuda, and Ken-ichiro Takamiya. 1999. Cloning of chlorophyllase, the key enzyme in chlorophyll degradation: Finding of a lipase motif and the induction by methyl jasmonate. Plant Biology, 96(26):15362-15367. 2. Vavilin D, Brune DC, Vermaas W. 2005. 15N-labeling to determine chlorophyll synthesis and degradation in Synechocystis sp. PCC 6803 strains lacking one or both photosystems. Biochim Biophys Acta, 1708(1):91-101. Epub 2005 Jan 12.
