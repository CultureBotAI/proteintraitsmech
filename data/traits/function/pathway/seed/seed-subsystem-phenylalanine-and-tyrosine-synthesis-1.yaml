# subsystem_id: Phenylalanine_and_Tyrosine_synthesis_1
identifier: proteintraitsmech:SEED_SUBSYSTEM_Phenylalanine_and_Tyrosine_synthesis_1
label: "Phenylalanine and Tyrosine synthesis 1"
definition: >-
  Chorismate is a branch point in the synthesis of the aromatic amino acids, phenylalanine, tyrosine and tryptophan. Chorismate is also a major branch point for other important aromatic compounds, including antibiotics, vitamins to name a few. This subsystem covers the genes and proteins that lead from chorismate to the biosynthesis of L-phenylalanine and L-tyrosine. Chorismate mutase (AroH) takes chorismate to prephenate. There are several non-homologous-types of AroH: 1) AroHI, and a periplasmic precursor (*AroHI) which are homologs; 2)AroHII in bacteria and Archaea; and 3) the plant type, AroAIII). Prephenate is another branch point which takes prephenate to either phenylalanine or tyrosine. The enzyme steps to phenylalanine include an aminotransferase and a dehydatase which can occur in either reaction order. Prephenat dehydratase (PheAIp) takes prephenate to phenylpyruvate which is then transaminated in the presence of an amino acid donor such as L-glutamate to form L-phenylalanine. In the opposite order of reaction steps, prephenate is transaminated to form L-arogenate and arogenate dehydratase (PheAIa) then uses the L-arogenate to produce L-phenylalanine. There is also a periplasmic precursor cyclohexadienyl dehydratase (*PheAIIc). For the tyrosine pathway, prephenate dehydrogenase (TyrAp) takes prephenate to 4-hydroxyphenyl-pyruvate which is then transaminated to form L-tyrosine in the presence of the amino acid donor. The reverse order of reaction steps occur when prephenate is first transaminated to form L-arogenate, followed by arogenate dehydrogenase (TyrAa) which forms L-tyrosine from L-arogenate. Cyclohexadienyl dehydrogenase (TyrAc) uses either of the two substrates (prephenate or arogenate) to ultimately synthesize L-tyrosine. These dehydrogenases use either NAD, NADP or both (NAD(P)H) and are sorted as such in the subsystem. The aminotransferases are divided into several classes: Biosynthetic Aromatic amino acid aminotransferase alpha (AroJI&#945;), Biosynthetic Aromatic amino acid aminotransferase beta (AroJI&#946;), periplasmic aromatic amino acid aminotransferase beta precursor (*AroJI&#946;), and Aromatic amino acid aminotransferase gamma (AroJI&#947;). Auxiliary functional roles include homologs that may be confused with the actual pathway functional role such as 4-amino, 4-deoxychorismate mutase (PapB) and Isochorismate mutase (PchB) which are homologs of chorismate mutase; and 4-amino, 4-deoxyprephenate dehydrogenase (PapC), a homolog of prephenate dehydrogenase.
