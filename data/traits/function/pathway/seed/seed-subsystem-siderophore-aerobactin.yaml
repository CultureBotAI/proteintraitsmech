identifier: proteintraitsmech:SEED_SUBSYSTEM_Siderophore_Aerobactin
label: "Siderophore Aerobactin"
definition: >-
  Unlike many polypeptide siderophores, that are synthesized by various nonribosomal peptide synthetases (NRPS), aerobactin is not a polypeptide, and it is produced via an NRPS-independent pathway catalyzed by two siderophore synthetase enzymes IucA and IucC (de Lorenzo et al., 1986). Other siderophores produced by similar NRPS-independent pathways include rhizobactin 1021, achromobactin, vibrioferrin, alcaligin, and desferrioxamine E (reviewed by Challis, 2005). Such siderophores are assembled from alternating dicarboxylic acid and diamine or amino alcohol building blocks (which are nevertheless derived from amino acids) linked by amide or ester bonds. Aerobactin is a dihydroxamate comprising two molecules of N6-acetyl-N6-hydroxylysine and one molecule of citric acid. This compound was first isolated from Enterobacter aerogenes (Gibson et al., 1969), which at the time was known as Aerobacter aerogenes, hence the name. Aerobactin biosynthesis Aerobactin biosynthesis genes (iucABCD) can be either plasmid- or chromosome-borne, but they were first identified and cloned from plasmid pColV-K30 (de Lorenzo et al., 1986). This cluster often includes the fifth gene (iutA) encoding the receptor protein. Pioneering biochemical genetic studies in the 1980s by Neilands and co-workers established in detail the mechanism of aerobactin is biosynthesis in E.coli (de Lorenzo et al., 1986). In addition to E. coli, the aerobactin pathway has been detected in many bacterial species including Aerobacter aerogenes, Salmonella arizona, Vibrio mimcus, Erwinia carotovora subsp. carotovora, Enterobacter cloacae, Escherichia fergusonii, Shigella boydii, Shigella flexneri, Shigella sonnei. In many of these organisms the aerobactin pathway enhances virulence. Ferric aerobactin uptake Aerobactin transport across outer membrane is mediated by IutA � a highly specific TonB-dependent receptor. It is highly conserved and is easily identifiable in the majority of organisms capable of aerobactin biosynthesis, as well as in those that appear to utilize it as a heterologous siderophore (in the absence of aerobactin internal synthesis). In the other hand, transport of ferric aerobactin (and other iron(III) hydroxamates) across the inner membrane into the cytoplasm appears to be far less specific, and is far less understood. In E. coli, for example, the FhuCDB ferric hydroxamate transporter (essential for uptake of Fe(III)-aerobactin) also accepts at least five different siderophores of the hydroxamate type as substrates (Braun et al., 1983; K�ster, 1991). Situation is similar in P. aeruginosa, where in silico genome analysis indicated the presence of relatively few siderophore inner-membrane iron-transport systems with respect to the number of putative siderophore receptors (O Cuiv et al., 2006; K�ster, 2001). Currently, the only inner-membrane siderophore transporter identified in P. aeruginosa is the single-subunit FptX permease, implicated in pyochelin utilization (� Cu�v et al., 2004). It is not clear at the moment how ferric aerobactin crosses inner membrane in P. aeruginosa, as well as in several other species.
