identifier: proteintraitsmech:SEED_SUBSYSTEM_Oxygen-sensing_diguanylate_cyclase_and_phosphodiesterase_couple_for_c-di-GMP_control
label: "Oxygen-sensing diguanylate cyclase and phosphodiesterase couple for c-di-GMP control"
definition: >-
  C-di-GMP, which is produced by diguanylate cyclases (DGC) and degraded by specific phosphodiesterases (PDEs)-is a ubiquitous second messenger in bacterial biofilm formation. The dosCP operon of E. coli encodes two oxygen sensors that cooperate in the controlled production and removal of c-di-GMP. Gene nomenclature changed according to PMID: 26148715.
