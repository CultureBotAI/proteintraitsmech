identifier: proteintraitsmech:SEED_SUBSYSTEM_Biosynthesis_of_Arabinogalactan_in_Mycobacteria
label: "Biosynthesis of Arabinogalactan in Mycobacteria"
definition: >-
  The mycobacterial cell wall, including the essential, covalently linked complex of peptidoglycan, heteropolymeric arabinogalactan, and highly hydrophobic mycolic acids, is responsible for many of the pathophysiological features of members of the Mycobacterium genus (Belanova et al., 2008) The initiation point for arabinogalactan biogenesis is the mycobacterial version of the bacterial carrier lipid, bactoprenol, identified as decaprenyl phosphate (C50-P), and the sequential addition of GlcNAc-P, rhamnose (Rha), and single galactofuranose units, donated by the appropriate nucleotide sugars. At some stage, the arabinofuranose units are added, donated not by a nucleotide sugar but a lipid carrier, C50-P-Ara. Two galactosyl transferases can apparently account for the full biosynthesis of the cell wall galactan of mycobacteria: galactofuranosyl transferase GlfT1 is involved in the initial steps of galactan formation and is responsible for attaching the first and, perhaps, the second Galf unit to the C50-P-P-GlcNAc-Rha acceptor. Another galactosyl transferase, GlfT2 (bifunctional) is responsible for the formation of the bulk of the galactan, containing alternating 5- and 6-linked beta-Galf units (Belanova et al., 2008) DprE1 and DprE2 are involved in the biosynthesis of D-arabinose and, in particular, they are essential to perform the transformation of decaprenylphosphoryl-D-ribose to decaprenylphosphoryl-D-arabinose, which is a substrate for arabinosyltransferases in the synthesis of the cell-envelope arabinogalactan and liporabinomannan polysaccharides of mycobacteria (Belanova et al., 2008)
