# subsystem_id: Mechanisms_of_PAS_resistance
identifier: proteintraitsmech:SEED_SUBSYSTEM_Mechanisms_of_PAS_resistance
label: "Mechanisms of PAS resistance"
definition: >-
  Four mechanisms of PAS resistance have been characterized. (A) Efflux. Intracellular PAS is excluded by the efflux antiporter TAP of M. tuberculosis encoded by Rv1258c. (B) Diminished bioactivation. FolC variants (FolC*) with an altered substrate binding pocket show decreased bioactivation of PAS (gold). (C) DfrA or RibD overexpression. Inhibition of dihydrofolate reduction can be negated by overexpression of the target DfrA or by overexpression of the alternative reductase RibD (blue). (D) Inactivation of the thymidylate synthase ThyA. Loss of ThyA function is tolerated because of the alternate thymidylate synthase ThyX and confers resistance to PAS by decreasing the catalytic demand on DHFR (orange).
