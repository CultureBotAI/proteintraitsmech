identifier: proteintraitsmech:SEED_SUBSYSTEM_Rut_pathway_of_pyrimidine_degradation
label: "Rut pathway of pyrimidine degradation"
definition: >-
  Escherichia coli K-12 can grow on uracil as the sole nitrogen source, facilitated by new pyrimidine catabolic pathway where uracil is converted to 3-hydroxypropionate, ammonia, and carbon dioxide. The flavoenzyme RutA with a flavin reductase (RutF or a substitute) catalyzes the initial uracil ring-opening reaction to give 3-ureidoacrylate. RutB cleaves ureidoacrylate hydrolytically to release 2 mol of ammonium, malonic semialdehyde, and carbon dioxide. Presumably the direct products are aminoacrylate and carbamate, both of which hydrolyze spontaneously.
