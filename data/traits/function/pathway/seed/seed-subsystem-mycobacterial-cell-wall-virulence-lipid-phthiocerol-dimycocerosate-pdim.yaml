identifier: proteintraitsmech:SEED_SUBSYSTEM_Mycobacterial_cell_wall_virulence_lipid_phthiocerol_dimycocerosate__PDIM
label: "Mycobacterial cell wall virulence lipid phthiocerol dimycocerosate (PDIM)"
definition: >-
  Phthiocerol dimycocerosates (DIM) are major virulence factors of Mycobacterium tuberculosis (Mtb), in particular during the early step of infection when bacilli encounter their host macrophages. However, their cellular and molecular mechanisms of action remain unknown. It was suggested (PMID:19197369) that DIM participate both in the receptor-dependent phagocytosis of Mtb and the prevention of phagosomal acidification Cell-free reconstitution studies demonstrate that polyketide synthases, which are usually involved in the biosynthesis of secondary metabolites, are responsible for generating complex lipids in mycobacteria, including phthiocerol dimycocerosate, e.g. PapA5 protein directly transfers the protein bound mycocerosic acid analogs on phthiocerol to catalyze the final esterification step (PMID:15749014)
