identifier: proteintraitsmech:SEED_SUBSYSTEM_Anaerobic_module_of_TCA
label: "Anaerobic module of TCA"
definition: >-
  The synthesis of citrate from acetyl-CoA and oxaloacetate is catalyzed in most organisms by a Si-citrate synthase, which is Si-face stereospecific with respect to C-2 of oxaloacetate. The Re face-specific citrate synthase (EC 2.3.3.3) is inactivated by oxygen and is found in anaerobes. Its stereospecificity is opposite to that of EC 2.3.3.1, citrate (Si)-synthase.
