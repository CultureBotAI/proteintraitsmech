identifier: proteintraitsmech:SEED_SUBSYSTEM_DNA_sulfur_modification_cluster
label: "DNA sulfur modification cluster"
definition: >-
  DNA phosphorothioation(DNA sulfur modification) in the DNA backbone is a multi-enzymatic and highly coordinated process controlled by five dnd genes(dndB-E). This is a modification, where one of the non-bridging oxygen atoms in the phosphodiester bond linking DNA nucleotides is exchanged by sulphur in a sequence selective and stereo-specific manner.
