identifier: proteintraitsmech:SEED_SUBSYSTEM_Programmed_cell_death_toxin-antitoxin_PezAT
label: "Programmed cell death toxin-antitoxin PezAT"
definition: >-
  Cell death in bacteria can be triggered by activation of self-inflicted molecular mechanisms. Pathogenic bacteria often make use of suicide mechanisms in which the death of individual cells benefits survival of the population. Important elements for programmed cell death in bacteria are proteinaceous toxin-antitoxin systems. While the toxin generally resides dormant in the bacterial cytosol in complex with its antitoxin, conditions such as impaired de novo synthesis of the antitoxin or nutritional stress lead to antitoxin degradation and toxin activation. A widespread toxin-antitoxin family consists of the Epsilon/Zeta systems, which are distributed over plasmids and chromosomes of various pathogenic bacteria. In its inactive state, the bacteriotoxic Zeta toxin protein is inhibited by its cognate antitoxin Epsilon. Upon degradation of Epsilon, the Zeta toxin is released allowing this enzyme to poison bacterial cell wall synthesis, which eventually triggers autolysis. Epsilon/Zeta systems ensure stable plasmid inheritance by inducing death in plasmid-deprived offspring cells. In contrast, chromosomally encoded Epsilon/Zeta systems were reported to contribute to virulence of pathogenic bacteria, possibly by inducing autolysis in individual cells under stressful conditions. The capability of toxin-antitoxin systems to kill bacteria has made them potential targets for new therapeutic compounds. Zeta toxins phosphorylate the ubiquitous peptidoglycan precursor uridine diphosphate-N-acetylglucosamine (UNAG) and this activity is counteracted by binding of antitoxin Epsilon.
