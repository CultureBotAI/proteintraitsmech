identifier: proteintraitsmech:SEED_SUBSYSTEM_Tripartite_multidrug_efflux_systems__of_RND_type__CmeABC_and_CmeDEF
label: "Tripartite multidrug efflux systems (of RND type) CmeABC and CmeDEF"
definition: >-
  CmeDEF interacts with CmeABC in conferring antimicrobial resistance and maintaining cell viability in C. jejuni. CmeABC is the predominant efflux pump in C. jejuni, whereas CmeDEF plays a secondary role in conferring intrinsic resistance to antimicrobials (PMID:15201231) Both of the systems are encoded by three-gene operons composed of a transporter protein (CmeB or CmeF) belonging to the resistance-nodulation-cell division (RND) family, a periplasmic membrane fusion protein (CmeA or CmeE) and an outer membrane factor (CmeC or CmeD). CmeABC is constitutively expressed in wild-type Campylobacter strains and extrudes a broad range of antibiotics (including fluoroquinolones), dyes, heavy metals, bile salts and detergents.7�9 This efflux system is a key player for intrinsic antibiotic resistance and is also required for the acquired resistance to fluoroquinolones. In addition, CmeABC is essential for Campylobacter colonization in vivo by mediating resistance to bile, which is normally present in the intestinal tract of animals.11 CmeABC is controlled by CmeR,12 a transcriptional repressor encoded by a gene located immediately upstream of cmeABC (PMID:16303882)
