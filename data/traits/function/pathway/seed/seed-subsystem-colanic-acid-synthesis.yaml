identifier: proteintraitsmech:SEED_SUBSYSTEM_Colanic_acid_synthesis
label: "Colanic acid synthesis"
definition: >-
  Colanic acid is an extracellular polysaccharide produced by many species of Enterobacteriaceae. The gene cluster coding for the biosynthesis has similarities to other cps loci. The first 3 genes are the most conserved part and seem to be coding for a "translocation and surface assembly region" of the capsule.
