label: "LysX and ArgX disambiguation"
definition: >-
  LysW has been identified as a carrier protein in the lysine biosynthetic pathway that is active through the conversion of &#945;-aminoadipate (AAA) to lysine. In this study, we found that the hyperthermophilic archaeon, Sulfolobus acidocaldarius, not only biosynthesizes lysine through LysW-mediated protection of AAA but also uses LysW to protect the amino group of glutamate in arginine biosynthesis. In this archaeon, after LysW modification, AAA and glutamate are converted to lysine and ornithine, respectively, by a single set of enzymes with dual functions. The crystal structure of ArgX, the enzyme responsible for modification and protection of the amino moiety of glutamate with LysW, was determined in complex with LysW. Structural comparison and enzymatic characterization using Sulfolobus LysX, Sulfolobus ArgX and Thermus LysX identify the amino acid motif responsible for substrate discrimination between AAA and glutamate. Phylogenetic analysis reveals that gene duplication events at different stages of evolution led to ArgX and LysX.
