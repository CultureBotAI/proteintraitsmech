identifier: proteintraitsmech:SEED_SUBSYSTEM_Iron_acquisition_in_Vibrio
label: "Iron acquisition in Vibrio"
definition: >-
  Vibrio cholerae contains multiple systems for iron acquisition, essential in the human host as well as in its other environmental niches, including the TonB-dependent transport of heme, a Feo system for the transport of ferrous iron and an ABC transporter, ferric iron transporter Fbp. It also utilizes endogenous siderophore vibriobactin and several siderophores that are produced by other microorganisms (Wyckoff et al., 2007).
