identifier: proteintraitsmech:SEED_SUBSYSTEM_Multidrug_Resistance__Tripartite_Systems_Found_in_Gram_Negative_Bacteria_TEMP
label: "Multidrug Resistance, Tripartite Systems Found in Gram Negative Bacteria TEMP"
definition: >-
  Subsystem under construction The major facilitator superfamily (MFS) is the largest known superfamily of secondary carriers found in the biosphere. It is ubiquitously distributed throughout virtually all currently recognized organismal phyla. This superfamily currently (2012) consists of 74 families, each of which is usually concerned with the transport of a certain type of substrate. Many of these families, defined phylogenetically, do not include even a single member that is functionally characterized. (PMID:22458847) E. coli K-12 contains 70 MFS transporters, 15 of which may be considered drug exporters, as they belong to families 2 and 3 (http://www.membranetransport.org/), which are composed of 12-TMS (transmembrane segment) and 14-TMS members, respectively, of drug/H+ antiporters (37, 130). Most of them, however, are free-standing transporters located in the IM and transport drugs from the cytosol to only the periplasm. Because most antimicrobial agents reach the cytosol usually by diffusion across the membrane bilayer, the pumped- out drug molecules have a good chance of reentering the cytosol through this free-diffusion process, and the transporters of this class are not expected to create high-level resistance (PMID: 25788514). For this reason this Subsystem encodes only those MFS pumps, which (i) occur with their own periplasmic adaptor proteins and with OM channels (such as TolC) and presumably produce an efficient tripartite efflux system ((PMID: 25788514) and (ii) are still uncharacterized. Characterized tripartite efflux systems of the MFS are encoded in separate Subsystems, for example, see: SS: "Tripartite multidrug efflux systems (of MSF type) EmrKY-TolC and EmrAB-TolC" References Li XZ, Plesiat P, Nikaido H. 2015. The challenge of efflux-mediated antibiotic resistance in Gram-negative bacteria. Clin Microbiol Rev. 2015 Apr;28(2):337-418. PMID: 25788514 Reddy VS1, Shlykov MA, Castillo R, Sun EI, Saier MH Jr. 2012. The major facilitator superfamily (MFS) revisited. FEBS J. 2012 Jun;279(11):2022-35. PMID:22458847 (this study used SEED) Nishino K1, Yamaguchi A. 2001. Analysis of a complete library of putative drug transporter genes in Escherichia coli. J Bacteriol. 2001 Oct;183(20):5803-12. PMID:11566977
