identifier: proteintraitsmech:SEED_SUBSYSTEM_Malate__citrate_transporters
label: "Malate, citrate transporters"
definition: >-
  This SS captures various transport systems for malate and citrate (and also protein families that are functionally coupled with them - to improve annotation accuracy) This SS was started originally to capture a gene cluster in B.subtilis (around fig|224308.1.peg.2360), which I thought could be generating precursors for poly-gamma-glutamate biosynthesis in Bacilli (see the corresponding SS for details), because it appeared to be able to generate lots of NH4 and carbon skeleton for glutamate. However, looking deeper, it appears that this cluster is probably induced under low pH to combat acidic conditions and can lead to alkalization of the medium.
