identifier: proteintraitsmech:SEED_SUBSYSTEM_Ectoine__hydroxyectoine_uptake_and_catabolism
label: "Ectoine, hydroxyectoine uptake and catabolism"
definition: >-
  Compatible solutes (Brown, 1976) are highly water-soluble organic compounds, that cells accumulate in order to maintain an osmotic equilibrium with the surrounding medium (Roberts, 2006). They are beneficial not only as osmoregulators, but also as protectants of proteins by mitigating detrimental effects of freezing, drying and high temperatures. The predominant compatible solutes in halophilic Bacteria are the amino acid derivatives glycine-betaine and ectoine (Roberts, 2006; Oren, 2008). Most chemoheterotrophic bacteria can readily use glycine-betaine as a compatible solute if it is available in the environment. However, only a few are capable of de novo synthesis of glycine-betaine (Nyyssoet al., 2000). Far more prokaryotes synthesize aspartate derivatives ectoine (1,4,5,6,tetra-2-methyl-4-pyrimidonecarboxylic acid) or hydroxyectoine as their main compatible solute (Schwibbert et al., 2011 and references therein). Ectoine biosynthesis process is encoded in another Subsystem �Ectoine synthesis� and is not covered here Ectoine and hydroxyectoine can also be utilized as both a carbon and a nitrogen source by halophilic bacteria. This SS covers uptake and utilization of these compounds. Ectoine degradation has been studied in Sinorhizobium meliloti (Jebbar et al., 2005) and more recently in Halomonas elongata DSM 2581 T (Schwibbert et al., 2011). In the latter organism the degradation of ectoine was reported to proceed via � - hydrolysis of ectoine (DoeA) to the novel compound N-alpha-acetyl-l-2,4-diaminobutyric acid, - deacetylation of N-alpha-acetyl-l-2,4-diaminobutyric acid (DoeB) to l-2,4-diaminobutyric acid, - and a transaminase reaction (DoeD) leading to aspartate-semialdehyde. - Finally, aspartate-semialdehyde is oxidized by DoeC to aspartate (Fig. 1). While homologue for each of the S. meliloti genes eutBCDE can be found in H. elongata (Fig. 4), but no eutA homologue could be identified. EutA homolog is often lacking in other organisms with other ectoine degradation genes present and might not be as essential component of this pathway Observations, predictions: 1. Two different transportes, an ABC type one or a TRAP type, are often located in the immediate visinity of ectoine degradation genes. Both are included in this Subsystem 2. The gene encoding N-alpha-acetyl-L-2,4-diaminobutyrate deacetylase (doeB) is missing in about a third of genomes with otherwise complete ectoine degradation pathway. In all these cases an alternative putative deacetylase gene is present in the ectoin catabolic cluster, currently annotated in this database as: �Predicted alternative deacetylase in ectoine utilization (replaces DoeB)� We predict that this enzyme either functionally fully replaces DoeB in such cases (a synonymous enzyme) , or the ectoin degradation pathway slightly differes in these organism (e.g. proceeds via N-GAMMA-acetyl-L-2,4-diaminobutyrate), as suggested in (Schwibbert et al., 2011) 3. The gene encoding Aspartate-semialdehyde dehydrogenase (doeC) is missing in about a third of genomes s well (different genomes from those above). No replacement candidate is suggested at the moment, but possibly another DH (e.g. from succinate-semialdehyde dehydrogenase superfamily) can fulfill this role
