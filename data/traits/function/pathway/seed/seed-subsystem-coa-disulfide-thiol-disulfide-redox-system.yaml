identifier: proteintraitsmech:SEED_SUBSYSTEM_CoA_disulfide_thiol-disulfide_redox_system
label: "CoA disulfide thiol-disulfide redox system"
definition: >-
  Aerobic organisms maintain high levels of low molecular weight thiols that in combination with specific disulfide reductases support the reducing intracellular environment and the thiol/disulfide distribution of other thiol-containing molecules. Glutathione (GSH, &#947;-glutamyl-cysteinyl-glycine) is perhaps the best studied low molecular weight thiol. CoA (CoASH) replaces glutathione as the major low molecular weight thiol in Staph. aureus and many other organisms; it is maintained in the reduced state by CoA-disulfide reductase (CoADR), a homodimeric enzyme similar to NADH peroxidase but containing a novel Cys43-SSCoA redox center.CoADR catalyzes the NADPH-dependent reduction of CoA disulfide.
