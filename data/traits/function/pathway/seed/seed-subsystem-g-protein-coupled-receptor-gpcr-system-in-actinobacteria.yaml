identifier: proteintraitsmech:SEED_SUBSYSTEM_G-protein-coupled_receptor__GPCR__system_in_Actinobacteria
label: "G-protein-coupled receptor (GPCR) system in Actinobacteria"
definition: >-
  This Subsystem encodes a conservon in Actinobacteria that comprises a membrane-associated signaling complex resembling the eukaryotic G protein-coupled regulatory system. Gene. 2011 May 15;477(1-2):12-8 Pleiotropic effect of a null mutation in the cvn1 conservon of Streptomyces coelicolor A3(2). Takano H1, Hashimoto K, Yamamoto Y, Beppu T, Ueda K. Abstract The conservon (cvn) of Streptomyces species encodes a putative membrane-associated signaling complex resembling the eukaryotic G-protein-coupled receptor (GPCR) system. The cvn is widely distributed in the genomes of Actinobacteria, indicating that it plays an important role in this group of bacterial species; however, the exact role of this regulatory system is hitherto poorly understood. In the present study, we generated null mutants for all 13 copies of the cvn operon distributed in the genome of Streptomyces coelicolor A3(2) and observed that the aerial mycelium formation and antibiotic production in a cvn1 mutant were markedly impaired. The cvn1 mutant formed aerial mycelium and produced actinorhodin and undecylprodigiosin at remarkably low levels on solid medium containing 1-2% glucose and at high levels on medium containing 6-10% glucose. The same phenotype as this was observed with a cvnA1 mutant. Transcriptional analyses revealed that the expression of sigU encoding a vegetative sigma factor was upregulated in the cvn1 mutant. Overexpression of rsuA encoding the sigma (SigU) antagonist restored aerial mycelium formation and pigment production in the cvn1 mutant, suggesting that the developmental defect in the cvn1 mutant is based on the high expression level of sigU. PMID: 21237251
