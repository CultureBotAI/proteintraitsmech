# subsystem_id: Chloramphenicol_resistance
identifier: proteintraitsmech:SEED_SUBSYSTEM_Chloramphenicol_resistance
label: "Chloramphenicol resistance"
definition: >-
  Quoted from PubMed:22046172 (van Hoek et al., 2011) - "The first and still most frequently encountered mechanism of bacterial resistance to chloramphenicol is enzymatic inactivation by acetylation of the drug via different types of chloramphenicol acetyltransferases (CATs). CATs are able to inactivate chloramphenicol as well as thiamphenicol and azidamfenicol, but not florfenicol. Consequently, chloramphenicol resistant strains, in which resistance is exclusively based on the activity of CAT, are susceptible to florfenicol. There are two defined types of genes coding CATs which distinctly differ in their structure: the classical catA determinants and the novel, also known as xenobiotic CATs, encoded by catB variants. Besides the inactivating enzymes, other chloramphenicol resistance systems include: inactivation by phosphotransferases, mutations of the target site, permeability barriers, and efflux pumps (Schwarz et al., 2004). Of the latter mechanism, cmlA and floR are the most commonly known (Bissonnette et al., 1991; Briggs and Fratamico, 1999). The presence of a cmlA gene will result in resistance to chloramphenicol, but susceptibility to florfenicol. In contrast, floR will give rise to a chloramphenicol and florfenicol resistance phenotype" In addition, 23S rRNA (adenine(2503)-C(8))-methyltransferase (EC 2.1.1.224) => Cfr confers resistance to florfenicol and chloramphenicol (in addition to several macrolide antibiotics) (PMID:26149991, PMID:16091044)
