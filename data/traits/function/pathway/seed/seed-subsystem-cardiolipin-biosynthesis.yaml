identifier: proteintraitsmech:SEED_SUBSYSTEM_Cardiolipin_biosynthesis
label: "Cardiolipin biosynthesis"
definition: >-
  Cardiolipin is the trivial name (derived from the fact that it was first found in animal hearts, where it is especially abundant) for a lipid that should be correctly termed 'diphosphatidylglycerol' or 1,3-bis(sn-3'-phosphatidyl)-sn-glycerol. It is a unique phospholipid with in essence a dimeric structure, having four acyl groups and potentially carrying two negative charges. It is found almost exclusively in certain membranes of bacteria (plasma membrane and hydrogenosomes) and of mitochondria of eukaryotes, i.e. those membranes whose function is to generate an electrochemical potential for substrate transport and ATP synthesis. Because of this unique structure, cardiolipin is able to form micellar, lamellar, and hexagonal states in aqueous dispersions, depending on pH and ionic strength. It is believed to exist mainly in a bilayer state in natural membranes, with the two phosphatidylglycerols of cardiolipin oriented perpendicular to the bilayer surface and the central glycerol group oriented at the water/membrane interface and parallel to it. However, there may remain a tendency of cardiolipin to form transient non-bilayer domains, which could have a profound influence on its function in vital cellular processes. While the eukaryotic mitochondria require a constant level of cardiolipin for baseline activity, prokaryotes accumulate cardiolipin only in specific situations. Cardiolipin has been shown to increase in the stationary phase (Hiraoka et al., 1993), in response to energy deprivation (PMID: 6697992), and in response to osmotic stress (PMID: 15554714). Accordingly, the expression level of cardiolipin synthase and its catalytic activity increase when Escherichia coli cultures reach the stationary phase (PMID: 17504273; Hiraoka et al., 1993). References: Schlame M1. 2008. Cardiolipin synthesis for the assembly of bacterial and mitochondrial membranes. J Lipid Res. 2008 Aug;49(8):1607-20. PMID: 18077827 Tan BK, Bogdanov M, Zhao J, Dowhan W, Raetz CR, Guan Z. 2012. Discovery of a cardiolipin synthase utilizing phosphatidylethanolamine and phosphatidylglycerol as substrates. Proc Natl Acad Sci U S A. 2012 Oct 9;109(41):16504-9. PMID: 22988102 George M. Carman. An unusual phosphatidylethanolamine-utilizing cardiolipin synthase is discovered in bacteria. Proc Natl Acad Sci U S A. 2012 Oct 9;109(41):16402�16403. PMID: 23012456 Li C1, Tan BK1, Zhao J1, Guan Z2. 2016. In Vivo and in Vitro Synthesis of Phosphatidylglycerol by an Escherichia coli Cardiolipin Synthase. J Biol Chem. 2016 Nov 25;291(48):25144-25153. PMID: 27760827. Sandoval-Calder�n M1, Geiger O, Guan Z, Barona-G�mez F, Sohlenkamp C. 2009. A eukaryote-like cardiolipin synthase is present in Streptomyces coelicolor and in most actinobacteria. J Biol Chem. 2009 Jun 26;284(26):17383-90. PMID: 19439403. Tian HF1, Feng JM, Wen JF. The evolution of cardiolipin biosynthesis and maturation pathways and its implications for the evolution of eukaryotes. BMC Evol Biol. 2012 Mar 13;12:32. PMID: 22409430
