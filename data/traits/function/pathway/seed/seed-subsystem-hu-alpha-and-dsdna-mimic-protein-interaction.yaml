identifier: proteintraitsmech:SEED_SUBSYSTEM_HU-alpha_and_dsDNA_mimic_protein_interaction
label: "HU-alpha and dsDNA mimic protein interaction"
definition: >-
  HU-alpha is a small histone-like protein that binds sequence-independently to dsDNA and is thought to function in gene regulation and DNA compaction due to its ability to bend and stabilize DNA. It is also involved in DNA repair and is one of the most abundant proteins in the cell. It was shown to interact with dsDNA mimic protein, which has a weak structure and sequence homology to uracil DNA glycosylase inhibitor (Ugi), which inhibits the DNA repair enzyme uracil DNA glycosylase (UDG) by mimicking double-stranded DNA (dsDNA).
