label: "Resistance to Ethambutol"
definition: >-
  Ethambutol [dextro-2,29-(ethylenediimino)-di-1-butanol] was introduced in 1961 and is a first-line anti-TB agent used in drug combinations to prevent the emergence of drug resistance (PMID: 26033726). ETB interferes with mycobacterial cell wall synthesis and integrity by inhibiting arabinosyl transferases encoded by the embCAB locus (10 kb), which encompasses three contiguous genes, embC, embA, and embB (PMID: 8876238; PMID: 9142129). These enzymes are essential for the synthesis of arabinogalactan (EmbA and EmbB) and lipoarabinomannan (EmbC) in the cell wall of Mycobacterium tuberculosis complex (MTBC) isolates (PMID: 26033726) The majority of the detected mutations conveying Ethambutol resistance are concentrated in a 576-bp region of embB, called the ETB resistance-determining region (PMID:10639358; PMID:21444710; PMID:26033726). This region includes codons 306, 406, and 497 and is predicted to be the recognition site of the enzyme EmbB (PMID: 14507364). However, a small fraction of mutations map to in the embC-embA intergenic region (PMID: 26033726) or to embR, the transcriptional activator of this locus, reported to be involved in ETB resistance (PMID: 10639358) 1. Organisms antibiotic is used against: Mycobacteria 2. Mechanism of action: Inhibition of arabinogalactan and lipoarabinomannan biosynthesis by inhibiting arabinosyl transferases encoded by the embCAB locus 3. Binding site: arabinosyltransferase EmbB, EmbA, EmbC 4. Mechanism of drug resistance: Target modification 5. Required for resistance: Mutations in embCAB operon, with mutations of codon 306 in embB being the most frequent among them
