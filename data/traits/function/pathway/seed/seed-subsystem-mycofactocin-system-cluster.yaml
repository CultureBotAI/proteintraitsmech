# subsystem_id: Mycofactocin_system_cluster
identifier: proteintraitsmech:SEED_SUBSYSTEM_Mycofactocin_system_cluster
label: "Mycofactocin system cluster"
definition: >-
  The "Mycofactocin precursor" is modified by the "Mycofactocin radical SAM maturase" (Rv0693 family rSAM protein) and other enzymes in its cluster. It becomes an electron carrier molecule that serves in vivo as N,N-dimethyl-4-nitrosoaniline (NDMA)leading to a segregated redox pool in which mycofactocin mediates communication among enzymes with non-exchangeable cofactors. This proposed cofactor biosynthesis system resembles PQQ in its use of a ribosomal peptide as precursor, and a radical SAM protein with a C-terminal SPASM (Subtilosin, PQQ, Anaerobic Sulfatase, Mycofactocin) domain that binds a second 4Fe4S cluster. This system is always accompanied by paralogous sets of nicotinoproteins from branches of their parent families that occur only in mycofactocin-encoding genomes.
