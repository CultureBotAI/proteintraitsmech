identifier: proteintraitsmech:SEED_SUBSYSTEM_Heme_O_and_Heme_A_biosynthesis
label: "Heme O and Heme A biosynthesis"
definition: >-
  Respiration in plants, most animals and many aerobic microbes is dependent on heme A. This is a highly specialized type of heme found as prosthetic group in cytochrome a-containing respiratory oxidases. Heme A differs structurally from heme B (protoheme IX) by the presence of a hydroxyethylfarnesyl group instead of a vinyl side group at the C2 position and a formyl group instead of a methyl side group at position C8 of the porphyrin macrocycle (use Illustrations Tab above to view scheme). Heme O is hydroxyethylprenylated like heme A, but has a C8 methyl group like heme B (Hederstedt, 2012; Mogi et al., 1994). Heme O serves as a prosthetic group in some terminal oxidases such as Escherichia coli cytochrome bo3 ubiquinol oxidase CyoABCD (subunits CyoA and CyoB are included in this Subsystem for context) In Archaea variants of heme A and heme O with an ethenylfarnesyl, ethenylgeranylgeranyl or hydroxygeranylgeranyl C2 side chain were reported (Lubben et al., 1994). These could not be encoded in this Subsystem, for this reason Archaeal genomes have not been assigned variant codes in this SS (vc=0)
