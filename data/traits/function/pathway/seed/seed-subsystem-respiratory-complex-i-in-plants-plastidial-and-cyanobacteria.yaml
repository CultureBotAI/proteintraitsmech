label: "Respiratory complex I in plants (plastidial) and cyanobacteria"
definition: >-
  The chloroplast NADH dehydrogenase-like (NDH) complex mediates cyclic electron transport and chloro-respiration and consists of five sub-omplexes, which in angiosperms further associate with photosystem I (PSI) to form a super-complex (PMID: 22862786) It was first discovered based on its similarity to mitochondrial complex I in respiratory electron transport, but was later shown to be more similar to bacterial NDH-1, especially to cyanobacterial NDH-1 (PMID: 21785130). A recent study suggested that it is a ferredoxin-dependent plastoquinone reductase rather than an NAD(P)H dehydrogenase. Furthermore, recent advances in subunit analysis of NDH have revealed the presence of a novel hydrophilic subcomplex on the stromal side of the thylakoid membrane, as well as an unexpected lumenal subcomplex (PMID: 21785130) References 1.Ifuku K, Endo T, Shikanai T, Aro EM. Structure of the chloroplast NADH dehydrogenase-like complex: nomenclature for nuclear-encoded subunits. Plant Cell Physiol. 2011 Sep;52(9):1560-8. PMID:21785130 2. Ueda M, Kuniyoshi T, Yamamoto H, Sugimoto K, Ishizaki K, Kohchi T, Nishimura Y, Shikanai T. Composition and physiological function of the chloroplast NADH dehydrogenase-like complex in Marchantia polymorpha. Plant J. 2012 Nov;72(4):683-93. PMID:22862786 3. Shikanai, T. (2007) Cyclic electron transport around photosystem I; genetic approaches. Annu. Rev. Plant Biol.58: 199�217.
