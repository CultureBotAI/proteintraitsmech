identifier: proteintraitsmech:SEED_SUBSYSTEM_Hydroxy-fatty_acid_production_as_stress_response
label: "Hydroxy-fatty acid production as stress response"
definition: >-
  Unsaturated fatty acids such as oleic acid are toxic to many bacteria, which is probably due to the disruptive effect of these hydrophobic compounds on the bacterial membrane, combined with their inhibitory action on enoyl-ACP reductase (FabI) and thus fatty acid biosynthesis. The myosin cross reactive antigen (MCRA) protein has been identified in Streptococcus pyogenes as antigen while screening with acute rheumatic fever sera, ergo the name. Later it was found that MCRAs are flavin adenine dinucleotide (FAD) enzymes which act as a fatty acid hydratases, catalyzing the conversion of OA into 10-hydroxystearic acid. It was also observed that these recombinant hydroxy-fatty acid-producing cells were more resistant to heat and solvent stress as compared with their non-recombinant, wild type controls.
