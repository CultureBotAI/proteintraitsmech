identifier: proteintraitsmech:SEED_SUBSYSTEM_Bundle-forming_pilus
label: "Bundle-forming pilus"
definition: >-
  Enteropathogenic Escherichia coli (EPEC) express an inducible, plasmid-encoded bundle-forming pilus (BFP), similar to V. cholerae. Both type IV pili display distinct differences in their monomer subunits consistent with data showing that bundlin and TcpA cannot complement each other, but assemble into filaments with similar helical organization.
