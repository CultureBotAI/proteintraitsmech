identifier: proteintraitsmech:SEED_SUBSYSTEM_PrlS-PrlR_Two-Component_Regulatory_System_of_Brucella
label: "PrlS-PrlR Two-Component Regulatory System of Brucella"
definition: >-
  The TCS locus called prlS/R is a proline sensor-regulator. It encodes a hybrid histidine kinase (PrlS) with an unusual Na(+)/solute symporter N-terminal domain and a transcriptional regulator (belonging to the LuxR family) (PrlR). In vitro, Brucella spp. with a functional PrlR/S system form bacterial aggregates, which seems to be an adaptive response to a hypersaline environment, while a prlS/R mutant does not. We identified ionic strength as a possible signal sensed by this TCS. The absence of a functional PrlR/S system correlates with the lack of hypersaline-induced aggregation in particular marine Brucella spp.
