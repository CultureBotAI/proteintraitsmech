# subsystem_id: Heme_Biosynthesis:_protoporphyrin-,_coproporphyrin-_and_siroheme-dependent_pathways
identifier: proteintraitsmech:SEED_SUBSYSTEM_Heme_Biosynthesis__protoporphyrin-__coproporphyrin-_and_siroheme-dependent_pathways
label: "Heme Biosynthesis: protoporphyrin-, coproporphyrin- and siroheme-dependent pathways"
definition: >-
  Tetrapyrroles and their derivatives play an essential role in all living organisms. They are involved in many metabolic processes, such as energy transfer, catalysis, and signal transduction. In eukaryotes, the synthesis of tetrapyrroles is restricted to heme, siroheme, chlorophyll and bilins. Prokaryotes additionally form most complicated tetrapyrroles, such as corrinoids, heme d1 and coenzyme F430. An abundant and ubiquitous representative of this group of compounds is heme, a cyclic tetrapyrrole that contains a centrally chelated Fe. References: 1. Dailey HA, Gerdes S, Dailey TA, Burch JS, Phillips JD. 2015. Noncanonical coproporphyrin-dependent bacterial heme biosynthesis pathway that does not use protoporphyrin. PNAS, 112(7):2210-5. PMID:25646457 2. Bali S, Palmer DJ, Schroeder S, Ferguson SJ, Warren MJ. 2014. Recent advances in the biosynthesis of modified tetrapyrroles: the discovery of an alternative pathway for the formation of heme and heme d 1. Cell Mol Life Sci, 71(15):2837-63. PMID:24515122 3. N. Frankenberg, J. Moser, and D. Jahn. 2003. Bacterial heme biosynthesis and its biotechnological application. Appl Microbiol Biotechnol 63: 115�127. 4. H. A. Dailey. 2002. Terminal steps of haem biosynthesis. Biochemical Society Transactions 30: 590-595. 5. D.V. Vavilin and W.F.J. Vermaas. 2002. Regulation of the tetrapyrrole biosynthetic pathway leading to heme and chlorophyll in plants and cyanobacteria. Physiologia Plantarum 115: 9�24. 6. M.M. Kolko, L.A. Kapetanovich, and J.G. Lawrence. 2001. Alternative Pathways for Siroheme Synthesis in Klebsiella aerogenes. J. Bact 183: 328�335
