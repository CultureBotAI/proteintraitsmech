identifier: proteintraitsmech:SEED_SUBSYSTEM_Integrons
label: Integrons
definition: >-
  Integrons are a cassette-based system that promotes the collection of antibiotics into genomic regions that are frequently associated with plasmids or transposable elements. New elements are added, or elements are removed by site-specific recombination at coupling sequences by an associated integrase. Generally the cassettes are "upstream" of the integrase gene.
