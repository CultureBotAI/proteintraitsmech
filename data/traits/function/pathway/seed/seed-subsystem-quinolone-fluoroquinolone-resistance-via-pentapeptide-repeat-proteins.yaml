identifier: proteintraitsmech:SEED_SUBSYSTEM_Quinolone__Fluoroquinolone__resistance_via_Pentapeptide_repeat_proteins
label: "Quinolone (Fluoroquinolone) resistance via Pentapeptide repeat proteins"
definition: >-
  Fluoroquinolones are synthetic derivatives of nalidixic acid and exhibit broad-spectrum and powerful antibacterial activity. Quinolones act by converting their targets into toxic enzymes that fragment the bacterial chromosome. Quinolone resistance normally arises by mutations in the molecular targets (DNA gyrase GyrA and topoisomerase IV) or chromosomal genes for type II topoisomerases (GyrA, GyrB). It can also be achieved through, efflux pumps and their regulatory genes or by plasmid/chromosome-mediated DNA gyrase protection through pentapeptide repeat proteins. Two other resistance mechanisms are mediated by aminoglycoside acetyltransferase AAC(6')-Ib-cr and QepA and described in the subsystem "Resistance to the fluoroquinolones norfloxacin and ciprofloxacin". MfpA, a member of the pentapeptide repeat family, causes resistance to ciprofloxacin and sparfloxacin. This protein binds to DNA gyrase and inhibits its activity. Its three-dimensional structure reveals a fold, that exhibits size, shape, and electrostatic similarity to B-form DNA. This represents a form of DNA mimicry and explains both its inhibitory effect on DNA gyrase and fluoroquinolone resistance resulting from the protein's expression in vivo.
