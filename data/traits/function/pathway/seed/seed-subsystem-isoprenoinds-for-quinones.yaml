# subsystem_id: Isoprenoinds_for_Quinones
identifier: proteintraitsmech:SEED_SUBSYSTEM_Isoprenoinds_for_Quinones
label: "Isoprenoinds for Quinones"
definition: >-
  Respiratory quinones (and several other key molecules) include isoprenoid side chains. There are generally one or more isoprenoid polymerases that begin with farnesyldiphosphate and extend it with isopentenyl-diphosphate or dimethylallyl-diphosphate until the correct length is reached. In many cases we know the final length from the lipid profiles of the organism.
