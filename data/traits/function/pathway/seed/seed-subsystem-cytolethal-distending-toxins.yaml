# subsystem_id: Cytolethal_distending_toxins
identifier: proteintraitsmech:SEED_SUBSYSTEM_Cytolethal_distending_toxins
label: "Cytolethal distending toxins"
definition: >-
  Cytolethal distending toxin (CDT) is a bacterial toxin that initiates a eukaryotic cell cycle block at the G2 stage prior to mitosis. CDT is a secreted protein toxin produced by a number of Gram-negative disease-causing bacteria (Campylobacter species, Escherichia coli, Salmonella enterica serovar Typhi, Shigella dystenteriae, enterohepatic Helicobacter species, Actinobacillus actinomycetemcomitans - the cause of aggressive periodontitis, and Haemophilus ducreyi - the cause of chancroid). The functional toxin is composed of three proteins; CdtB potentiates a cascade leading to cell cycle block, and CdtA and CdtC function as dimeric subunits, which bind CdtB. The toxin is internalized via dynamin-dependent endocytosis into early and late endosomes. The CdtB subunit further transits to the Golgi complex, and is then retrogradely transported to the endoplasmic reticulum (ER). Translocation from the ER does not require the ER-associated degradation (ERAD) pathway, and protein unfolding. Here CdtB enters the nucleus and exhibits a DNase I-like activity that results in DNA double-strand breaks leading to cell cycle arrest, cellular distension, and cell death.
