identifier: proteintraitsmech:SEED_SUBSYSTEM_Biogenesis_of_cytochrome_c_oxidases
label: "Biogenesis of cytochrome c oxidases"
definition: >-
  "In the 1980s the Tzagoloff and Poyton groups, and others, found that the assembly of the respiratory complexes in yeast required large numbers of complex-specific gene products. Currently, the specific roles of many of the assembly proteins in mitochondria and in bacteria have been identified or deduced. They cover a wide range of functions, acting as protein chaperones and translocases, as copper chaperones, as heme synthesis and delivery proteins, as Fe/S center chaperones, as translational activators and more" (quoted from J. Hosler , 2012). In particular this Subsystem encodes: - biosynthesis/insertion of heme O and heme A in the caa3/aa3 types of heme-copper respiratory oxidases - the Cu(B) center assembly on subunit I (CoxI) of heme-copper respiratory oxidases of all types (cytochrome or quinol) - the dinuclear Cu(A) center assembly on subunit II of cytochrome oxidases (CoxII) - several uncharacterized protein families likely involved in biogenesis of cytochrome c oxidases (based on gene clustering with known biogenesis factors above) A recent Special Issue of BBA Bioenergetics on Respiratory Oxidases (edited by B.Ludwig) presents an excellent collection of review and research articles on the topic - - Biochimica et Biophysica Acta (BBA) - Bioenergetics. 2012, volume 1817, issue 6
