identifier: proteintraitsmech:SEED_SUBSYSTEM_Trans-envelope_signaling_system_VreARI_in_Pseudomonas
label: "Trans-envelope signaling system VreARI in Pseudomonas"
definition: >-
  This Subsystem encodes the VreARI trans-envelope signaling system (or cell-surface signaling CSS), characterized in Pseudomonas aeruginosa (Llamas et al., 2009), and also present in P. fluorescens, R. palustris, and a number of other species. In P. aeruginosa it was shown to activate virulence factors in zebrafish infection model upon induction by an unknown activator. The vreARI gene cluster seems to be functionally associated with a large Filamentous haemagglutinin family outer membrane protein, components of general secretion system, components of the TonB/ExbB/ExbD system, and various hypothetical proteins. To see this gene cluster in its entirety please go to Subsystem:"Phosphate-binding DING proteins". This Subsystem encodes merely a fragment of this gene cluster
definition_source: BV-BRC
