identifier: proteintraitsmech:SEED_SUBSYSTEM_Extracellular_matrix_proteins__PSL__involved_in_mannose-rich_biofilm_formation_in_Pseudomonas
label: "Extracellular matrix proteins (PSL) involved in mannose-rich biofilm formation in Pseudomonas"
definition: >-
  Pseudomonas aeroginosa forms biofilms, which are cellular aggregates encased in an extracellular matrix. Two loci, pel and psl, have been identified and are involved in the production of carbohydrate-rich components of the biofilm matrix. The pel gene cluster is involved in the production of a glucose-rich matrix material in P. aeruginosa strain PA14. The psl gene cluster is involved in the production of a mannose-rich matrix material in P. aeruginosa strain ZK2870. Either carbohydrate-rich matrix appears to be sufficient for mature biofilm formation, and at least one of them is required for mature biofilm formation in P. aeruginosa strains PA14 and ZK2870. These 12 adjacent genes named psl genes, are involved in the formation of the pellicle's extracellular matrix and are required for the formation of the solid surface-associated biofilms that encase the cells. The psl gene cluster is involved in the production of a mannose-rich matrix material in P. aeruginosa strain ZK2870. These biofilms aid in the survival in a variety of environments. References: Friedman L1, Kolter R. 2004 Two genetic loci produce distinct carbohydrate-rich structural components of the Pseudomonas aeruginosa biofilm matrix. J Bacteriol. 2004 Jul;186(14):4457-65. PMID: 15231777 Franklin MJ1, Nivens DE, Weadge JT, Howell PL. 2011 Biosynthesis of the Pseudomonas aeruginosa Extracellular Polysaccharides, Alginate, Pel, and Psl. Front Microbiol. 2011 Aug 22;2:167. PMID: 21991261
