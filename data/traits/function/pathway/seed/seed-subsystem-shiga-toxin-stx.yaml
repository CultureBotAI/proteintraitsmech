# subsystem_id: Shiga_toxin_(Stx)
identifier: proteintraitsmech:SEED_SUBSYSTEM_Shiga_toxin__Stx
label: "Shiga toxin (Stx)"
definition: >-
  Stxs (also known as Vero toxins, and previously as Shiga-like toxins) are a group of bacterial AB5 protein toxins of about 70 kDa that inhibit protein synthesis in sensitive eukaryotic cells. Protein synthesis is blocked by the Stxs through the removal of an adenine residue from the 28S rRNA of the 60S ribosome. This N-glycosidase activity of the toxin resides in the A subunit. The pentamer of identical B subunits mediates toxin binding to the cellular receptor globotriaosylceramide (Gb3). Additional commonalities between the Stx groups are that the subunit genes are encoded in an operon with the A subunit gene 5� to that of the B subunit, that the stx operon is usually found within the sequence for an inducible, lysogenic, lambda-like bacteriophage, and that the toxins utilize a retrograde pathway to reach the cytoplasm. Differences between the two toxin groups include the fact that the genes for stx/stx1a are repressed by Fur when high levels of iron are present, and that E. coli strains that encode stx2 are epidemiologically linked to more severe disease than those that carry stx1.
