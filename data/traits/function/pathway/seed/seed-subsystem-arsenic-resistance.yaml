# subsystem_id: Arsenic_resistance
identifier: proteintraitsmech:SEED_SUBSYSTEM_Arsenic_resistance
label: "Arsenic resistance"
definition: >-
  Arsenic is one of the most prevalent toxic metal/metalloids in the world, present in soils and environments containing arsenic-based minerals (arsenopyrite, realgar, orpiment, etc.). For more than 20 years, it has ranked first on the priority list of hazardous substances from the Agency for Toxic Substances and Disease Registry (http://www.atsdr.cdc.gov/spl/), based on its environmental ubiquity, toxicity, and potential hazards for humans (PMID: 28438267). Soil and saprophytic microorganisms have developed molecular detoxification mechanisms to survive arsenic-rich environments, mainly by the enzymatic conversion of inorganic arsenate (AsV) to arsenite (AsIII) by arsenate reductases, which is then extruded by arsenite permeases (PMID: 28438267) Arsenate reductases (ArsCs) are unusual among well studied enzyme classes, because there is not a single family of evolutionarily related sequences. The structural folds and mechanisms they are using are fundamentally different and arose independently during evolution (PMID: 12426124). As a group Arsenate reductases are small cytoplasmic redox enzymes that reduce arsenate to arsenite (As(III)) by the sequential involvement of three different thiolate nucleophiles that function as a redox cascade. As such, arsenate reductases in different organisms work together with the specific thiol/disulfide mechanism available in the cell (PMID:19286650). Thus, different classes of ArsCs are coupled to thioredoxin system [composed of thioredoxin and thioredoxin reductase] (PMID: 8003493), OR glutathione system [composed GSH with glutaredoxin and glutathione reductase] (PMID: 12426124), OR to mycothiol and mycoredoxin (PMID: 19286650). Furthermore, different structural folds are found within some of these cases (e.g. PMID:11573087), compounding the complexity of this group of enzymes. AsIII is much more toxic than AsV. However, the reduction of AsV in the detoxification mechanism is evolutionarily explained by the absence of phosphate-releasing pumps and the presence of AsIII efflux pumps that work in concert with ArsCs (Villadangos et al., 2012)
