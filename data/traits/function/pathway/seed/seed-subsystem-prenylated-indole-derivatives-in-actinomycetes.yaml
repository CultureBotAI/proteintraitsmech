identifier: proteintraitsmech:SEED_SUBSYSTEM_Prenylated_indole_derivatives_in_actinomycetes
label: "Prenylated indole derivatives in actinomycetes"
definition: >-
  This Subsystems is based on (Ozaki et al., 2013 (PMID: 23430264). It encodes two types of putative gene clusters, both including an indole prenyltransferase IptA homolog (widely distributed among actinomycetes). The two gene clusters, albeit very similar, differ in that one contains a tryptophanase gene (type A cluster), whereas the other contains a flavin-dependent monooxygenase gene (type B cluster) The type A cluster was shown in Streptomyces sp. SN-593 to catalyze the biosynthesis of 6-dimethylallylindole (DMAI)-3-carbardehyde (Takahashi et al. 2010, PMID:20348259). In this biosynthetic pathway, IptA homolog catalyzes the addition of a dimethylallyl group onto the C-6 position of tryptophan to yield 6-dimethylallyltryptophan (DMAT). The type B cluster [iptA homolog- and FMO-containing] in Streptomyces coelicolor A3(2) synthesizes a novel metabolite 5- dimethylallylindole (DMAI)-3-acetonitrile (5-DMAIAN) according to (Ozaki et al., 2013, PMID: 23430264). In this biosynthetic pathway, the IptA homolog SCO7467 catalyzes the prenylation of L-tryptophan to form 5-dimethylallyl-L-tryptophan (5-DMAT). SCO7468 then catalyzes the conversion of 5-DMAT into 5-dimethylallylindole-3-acetaldoxime (5-DMAIAOx). The study of these gene clusters provides insight into the biosynthesis of novel secondary metabolites in actinomycetes, namely prenylated indole derivatives, which show diverse biological and pharmacological activities including cytotoxicity and antifungal activity (PMID: 23430264). In addition, because the potential for prenylated indole biosynthesis is widely distributed in soil actinomycetes, the prenylated indoles might possess yet unknown and important biological activities. Particularly intriguing is the structural similarity between 2 and indole-3-acetic acid (auxin), a major plant hormone. Recently, transkingdom signaling between Pseudomonas aeruginosa and A. thaliana was reported (PMID: 21482761). Prenylated indoles such as 5-dimethylallylindole-3-acetonitrile might contribute to an uncharacterized signaling pathway between actinomycetes and plants in the opinion of Ozaki et al., 2013 (PMID: 23430264)
