# subsystem_id: Pyrroloquinoline_Quinone_biosynthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Pyrroloquinoline_Quinone_biosynthesis
label: "Pyrroloquinoline Quinone biosynthesis"
definition: >-
  The biosynthesis of pyrroloquinoline quinone (PQQ), a vitamin and redox cofactor of quinoprotein dehydrogenases, is facilitated by an unknown pathway that requires the expression of six genes, pqqA to -F. Pyrroloquinoline quinone [4,5-dihydro-4,5-dioxo-1H-pyrrolo-[2,3-f]quinoline-2,7,9-tricarboxylic acid (PQQ) is an aromatic, tricyclic ortho-quinone that serves as the redox cofactor for several bacterial dehydrogenases. Among the best known examples are methanol dehydrogenase and glucose dehydrogenase. PQQ belongs to the family of quinone cofactors that has been recognized as the third class of redox cofactors following pyridine nucleotide- and flavin-dependent cofactors. PQQ is derived from the two amino acids glutamate and tyrosine encoded in the precursor peptide PqqA. Five reactions are necessary to form this quinone cofactor: The first step of the whole pathway is the expression of PqqA as a precursor for PQQ. PqqA is recognised by PqqE, which links the C atoms from the glutamate and tyrosine to become C9 and C9a of the final product PQQ and, therefore, enables recognition and acceptance of the modified PqqA by PqqF. In step two PqqF afterwards cuts out the linked amino acids. The following Schiff base reaction is spontaneous, the following dioxygenation is catalysed by an unknown enzyme. To finally finish the product PqqC facilitates the last cyclization and oxidation steps. Klebsiella pneumoniae needs six genes, seven genes are required in Methylobacterium extorquens (AM1), whereas Acinetobacter calcoaceticus requires only four genes for PQQ synthesis. Interestingly, the homologous enzymes of PqqF and PqqG of Methylobacterium extorquens strain AM1 are missing. Although, much is known about the enzymes that use PQQ as a cofactor relatively little is known about its biosynthesis. Basic reference: Puehringer S, Metlitzky M, Schwarzenbacher R. The pyrroloquinoline quinone biosynthesis pathway revisited: a structural approach. BMC Biochem. 2008 Mar 27;9:8. PMID: 18371220. =======Variant codes:================ Variant code 1 - has all pathway functional roles, including dipeptidases similar to microsomal dipeptidases. Variant code 2 - has PqqA-F (no MDP) Variant code 3 - may use MDP instead of PqqF. Variant code 4 - may use other peptidases that are not very similar to PqqF or MDP. Variant code 5 - has PqqC/D protein fusion (see notes)
