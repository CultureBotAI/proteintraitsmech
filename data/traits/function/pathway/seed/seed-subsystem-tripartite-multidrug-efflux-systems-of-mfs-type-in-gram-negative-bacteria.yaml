identifier: proteintraitsmech:SEED_SUBSYSTEM_Tripartite_multidrug_efflux_systems__of_MFS_type__in_Gram-negative_bacteria
label: "Tripartite multidrug efflux systems (of MFS type) in Gram-negative bacteria"
definition: >-
  The major facilitator superfamily (MFS) is the largest known superfamily of secondary carriers found in the biosphere. It is ubiquitously distributed throughout virtually all currently recognized organismal phyla. This superfamily currently (2012) consists of 74 families, each of which is usually concerned with the transport of a certain type of substrate. Many of these families, defined phylogenetically, do not include even a single member that is functionally characterized. (PMID:22458847) E. coli K-12 contains 70 MFS transporters, 15 of which may be considered drug exporters, as they belong to families 2 and 3 (http://www.membranetransport.org/), which are composed of 12-TMS (transmembrane segment) and 14-TMS members, respectively, of drug/H+ antiporters (37, 130). Most of them, however, are free-standing transporters located in the IM and transport drugs from the cytosol to only the periplasm. Because most antimicrobial agents reach the cytosol usually by diffusion across the membrane bilayer, the pumped- out drug molecules have a good chance of reentering the cytosol through this free-diffusion process, and the transporters of this class are not expected to create high-level resistance (PMID: 25788514). For this reason this Subsystem encodes only those MFS pumps, which (i) occur with their own periplasmic adaptor proteins and with OM channels (such as TolC) and presumably produce an efficient tripartite efflux system (PMID: 25788514) and (ii) are still uncharacterized. Several characterized tripartite efflux systems of MFS family are encoded in separate Subsystems, for example, see: SS: "Tripartite multidrug efflux systems (of MSF type) EmrKY-TolC and EmrAB-TolC" Tripartite efflux systems in Gram-negative bacteria are composed of: - an outer membrane factor (OMF) - and a periplasmic accessory protein (often called a membrane fusion protein) - an inner membrance pump (which can belong to one of several protein families: MFS, RND, or ABC). Note, that ONLY tripartite efflux systems with inner membrance pumps of the MFS family are encoded in this SS. The tripartite systems with inner membrance pumps of other types are encoded separately, for example, see the following Subsystems: - "Tripartite multidrug efflux systems (of RND type) AcrAB-TolC and related transporters" - "Tripartite multidrug efflux systems (of RND type) MdtABC-TolC" - "Macrolide MacAB-TolC efflux pump transporter (of ABC type)" - etc
