label: "Outer membrane porins in Pseudomonas and Acinetobacter"
definition: >-
  From PMID:25788514 on "slow porins" in Pseudomonas aeruginosa and Acinetobacter species - ...Organisms such as P. aeruginosa or Acinetobacter species do not produce classical E. coli-type trimeric porins that provide a fast influx of small drugs. The major nonspecific porin in these organisms is a homolog of E. coli OmpA, and its major function is structural, that is, to connect the OM to the underlying peptidoglycan (178). The porin function is produced by the alternative folding of only a small fraction of the protein (perhaps 2% of the population) to produce 16 transmembrane beta-strands, and we proposed to call this class of porins �slow porins,� in order to distinguish them from the classical trimeric porins, in which every molecule produces an open channel (179, 180). Because the number of open channels is small, OM permeability is very low, and beta-lactams cross the OM of P. aeruginosa at a rate 100 times lower than that for the E. coli OM (181, 182). Because of this slow permeation through slow porins, the endogenous RND system MexAB-OprM can compete well with the influx of hydrophilic beta-lactams as well as other antibiotics (Fig. 1). P. aeruginosa strains with over-expression of OprD gene showed high sensitivity to carbapenems family antibiotics (PMID:25644798) The outer membrane porin protein D (OprD), a specialized channel-forming protein, responsible for uptake of beta-lactam antibiotics, was identified as sialoglycoprotein. OprD(-Sias) interacts with beta-lactam antibiotics more than OprD(+Sias) as demonstrated by surface plasmon resonance study. Lyposome-swelling assay further exhibited that antibiotics have more capability to penetrate through OprD(-Sias) purified from four clinical isolates of PA (PMID:24643970)
