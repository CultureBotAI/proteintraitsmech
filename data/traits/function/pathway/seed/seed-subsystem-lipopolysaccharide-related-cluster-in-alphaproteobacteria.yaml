identifier: proteintraitsmech:SEED_SUBSYSTEM_Lipopolysaccharide-related_cluster_in_Alphaproteobacteria
label: "Lipopolysaccharide-related cluster in Alphaproteobacteria"
definition: >-
  This is a cluster-based subsystem encoding proteins families (most of them hypothetical), which tend to co-localize with lipopolysaccharide biosynthesis genes lpxK (encoding tetraacyldisaccharide 4'-kinase) and kdtA (encoding 3-deoxy-D-manno-octulosonic-acid transferase) in Alphaproteobacteria. In prokaryotes conserved clustering of genes on the chromosome often points to their functional association. Hence, collection of hypothetical proteins in this Subsystem might help identify yet unknown enzymes involved in lipopolysaccharide biosynthesis in Alphaproteobacteria. The inositol monophosphatase family protein is probably 3.1.3.45 (or some such)
