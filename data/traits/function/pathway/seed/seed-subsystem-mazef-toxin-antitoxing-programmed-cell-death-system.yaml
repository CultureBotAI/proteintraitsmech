identifier: proteintraitsmech:SEED_SUBSYSTEM_MazEF_toxin-antitoxing__programmed_cell_death__system
label: "MazEF toxin-antitoxing (programmed cell death) system"
definition: >-
  MazF, ChpB, PemK and YdcE are endoribonuclease that inactivate cellular mRNAs by cleaving them at specific sites. MazE, ChpS, PemI and YdcD are labile inhibitors of the corresponding endonucleases. Because the inhibitors ("anittoxins") are labile, they must be constantly expressed, or their corresponding endonuclease ("toxin") will kill the cell.
