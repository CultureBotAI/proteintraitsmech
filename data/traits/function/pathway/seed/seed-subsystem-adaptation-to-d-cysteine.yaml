# subsystem_id: Adaptation_to_d-cysteine
identifier: proteintraitsmech:SEED_SUBSYSTEM_Adaptation_to_d-cysteine
label: "Adaptation to d-cysteine"
definition: >-
  Genes involved in the adaptation to d-cysteine, a powerful inhibitor of growth. d-Cysteine, a powerful inhibitor of Escherichia coli growth, is decomposed into pyruvate, H2S, and NH3 by d-cysteine desulfhydrase. Mutants in which the gene is inactivated or overexpressed exhibite hypersensitivity or resistance, respectively, to the presence of d-cysteine in the culture medium. d-Cysteine desulfhydrase from E. coli is a pyridoxal phosphate-containing enzyme. It catalyzes the &#945;,&#946;-elimination reaction of d-cysteine and of several d-cysteine derivatives, providing a detoxification function. Decomposition of d-cysteine by the desulfhydrase produces H2S, which the bacterium can utilize as a sulfur source. In agreement with an involvement in sulfur metabolism, sulfate starvation induces expression of the desulfhydrase. The desulfhydrase appears in a cluster with three genes, encoding subunits of the L-cystine/L-cysteine transporting ABC complex. The periplasmic cystine-binding protein and the desulfhydrase are both induced under sulfate starvation and appear to be cotranscribed. E. coli K-12 contains a second cystine transporter encoded by ydjN. Inhibition assays suggest that the FliYYecSC transporter has a greater substrate range than YdjN. L-cysteine may be the preferred substrate for the FliYYecSC transporter (Deutch et al., 2014) References: Kertesz MA1. 2001. Bacterial transporters for sulfate and organosulfur compounds. Res Microbiol, 152(3-4):279-90. PMID:11421275 Deutch CE1, Spahija I, Wagner CE. 2014. Susceptibility of Escherichia coli to the toxic L-proline analogue L-selenaproline is dependent on two L-cystine transport systems. J Appl Microbiol, 117(5):1487-99. PMID:25139244
