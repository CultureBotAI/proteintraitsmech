identifier: proteintraitsmech:SEED_SUBSYSTEM_Bacillibactin_Siderophore
label: "Bacillibactin Siderophore"
definition: >-
  The siderophore Bacillibactin is a catecholic trilactone that is secreted by various Bacilli species at times of iron limitation for iron scavenging. The bacillibactin (BB)-mediated iron acquisition pathway can be viewed as a 6 step process = 1. BB precursor synthesis (DhbCBA + Gly + Thr), 2. BB assembly (DhbEBF), 3. BB export (secretion), 4. Ferric-BB complex formation, 5. Ferric-BB import (FeuABC) and 6. Ferric-BB hydolysis (BesA = YuiI) with iron release.
