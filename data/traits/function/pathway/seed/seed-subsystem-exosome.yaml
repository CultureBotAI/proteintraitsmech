label: Exosome
definition: >-
  The RNA exosome is a multisubunit 3' to 5' exoribonuclease complex that participates in degradation and processing of cellular RNA. The conserved core of the exosome, the major eukaryotic 3' --> 5' exonuclease, contains nine subunits that form a ring similar to the phosphorolytic bacterial PNPase and archaeal exosome, as well as Dis3. Dis3 is homologous to bacterial RNase II, a hydrolytic enzyme. Studies have suggested that all subunits are active 3' --> 5' exoRNases and Dis3 is responsible for exosome core activity.
