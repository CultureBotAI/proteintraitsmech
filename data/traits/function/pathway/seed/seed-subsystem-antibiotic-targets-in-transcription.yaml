identifier: proteintraitsmech:SEED_SUBSYSTEM_Antibiotic_targets_in_transcription
label: "Antibiotic targets in transcription"
definition: >-
  Bacterial RNA polymerase is a target for rifamycin antibiotics, which inhibit it by binding to a highly conserved region, blocking the extension of nascent mRNAs, as well as for lipoprotein antibiotic daptomycin Resistance to rifampin is caused by mutations in the rpoB gene, encoding the beta-subunit of RNA polymerase. Resistance to daptomycin can be caused by mutations either in rpoB or rpoC genes, encoding the beta and beta-prime subunits of RNA polymerase respectively (PMID:16723576, PMID:20837752) Transcription termination factor rho is the site of bicyclomycin inhibition (PMID:8466900)
