label: "Possible RNA modification and stress response cluster"
definition: >-
  The highly conserved KEOPS/EKC (Kinase, Endopeptidase and Other Proteins of small Size /Endopeptidase-like and Kinase associated to transcribed Chromatin) protein complex has been implicated in transcription, telomere maintenance and chromosome segregation in eukaryotes. The prokaryotic complex consists of five proteins, Kinase-Associated Endopeptidase (Kae1), a kinase (Bud32) and three additional small polypeptides. This highly conserved complex is required for a universal tRNA modification, threonyl carbamoyl adenosine (t6A), found in all tRNAs that pair with ANN codons in mRNA.
