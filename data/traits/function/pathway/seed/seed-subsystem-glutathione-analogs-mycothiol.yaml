# subsystem_id: Glutathione_analogs:_mycothiol
identifier: proteintraitsmech:SEED_SUBSYSTEM_Glutathione_analogs__mycothiol
label: "Glutathione analogs: mycothiol"
definition: >-
  The pseudodisaccharide mycothiol (1D-myo-inosityl 2-(N-acetylcysteinyl)amido-2-deoxy-a-D-glucopyranoside) is the principal thiol found in mycobacteria and most other actinomycetes. It appears to function in many ways like glutathione, which is not produced by actinomycetes. As such, it acts as an electron acceptor/donor and serves as a cofactor in detoxification reactions for alkylating agents, free radicals and xenobiotics. In addition, like glutathione, mycothiol may be involved in catabolic processes with an essential role for growth on recalcitrant chemicals such as aromatic compounds. At least four enzymes (MshA, MshB, MshC, MshD) are currently known to be involved in mycothiol biosynthesis (see Tab "Illustrations"). Identified MSH-dependent enzymes include: - mycothione reductase (disulfide reductase Mtr) - S-nitrosomycothiol reductase / formaldehyde DH MscR - MSH S-conjugate amidase Mca - MSH-dependent maleylpyruvate isomerase. Mycothiol metabolism might provide suitable targets for new drugs directed against Mycobacterium tuberculosis. Support for this possibility came from studies of Mycobacterium smegmatis chemical mutants blocked in MSH biosynthesis. Mycothiol mutants were shown to have enhanced sensitivity to hydrogen peroxide and various toxins, including rifampin and other antibiotics, but were found to be resistant to isoniazid.
