identifier: proteintraitsmech:SEED_SUBSYSTEM_Mycobacterial_signal_transduction_system_MprAB_required_for_persistent_infections
label: "Mycobacterial signal transduction system MprAB required for persistent infections"
definition: >-
  MprB/MprA is a two-component response regulator whose expression is required for entrance into and maintenance of persistent infection. Inactivation of this response regulator, Rv0981 (termed here mprA for mycobacterial persistence regulator), affected M. tuberculosis H37Rv growth in vivo in an organ- and infection stage-specific fashion. These results indicate that two-component systems are important for adaptation of the tubercle bacillus during stages of persistent infection (PMID: 11675502). MprAB is stress responsive and regulates the expression of numerous stress-responsive genes in M. tuberculosis, including sigma factors sigB and sigE in M. tuberculosis (PMID: 16513743) References Zahrt TC, Deretic V. 2006 Mycobacterium tuberculosis signal transduction system required for persistent infections. J Bacteriol. 2006 Mar;188(6):2134-43. PMID: 11675502 He H, Hovey R, Kane J, Singh V, Zahrt TC. 2006 MprAB is a stress-responsive two-component system that directly regulates expression of sigma factors SigB and SigE in Mycobacterium tuberculosis. J Bacteriol. 2006 Mar;188(6):2134-43. PMID: 16513743
