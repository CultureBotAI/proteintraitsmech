# subsystem_id: Pyridoxin(Vitamin_B6)_Degradation_Pathway
identifier: proteintraitsmech:SEED_SUBSYSTEM_Pyridoxin_Vitamin_B6__Degradation_Pathway
label: "Pyridoxin(Vitamin B6) Degradation Pathway"
definition: >-
  Two different but related degradation pathways of free forms of vitamin B6, pyridoxine, pyridoxal, and pyridoxamine, were known to exist in bacteria that can use pyridoxine as a sole source of carbon and nitrogen . In pathway I, which has been found in Pseudomonas sp. MA-1 and Microbacterium luteolum YK-1, pyridoxine is first oxidized to pyridoxal by pyridoxine 4-oxidase (EC 1.1.3.12) and then degraded through the following seven steps to succinic semialdehyde, ammonia, and carbon dioxide. In pathway II, which has been found in Pseudomonas sp. IA and Arthrobacter sp. Cr-7, pyridoxine is first oxidized to isopyridoxal by pyridoxine 5-oxidase and then degraded in 4 subsequent steps to 2-hydroxymethyl succinic semialdehyde, acetic acid, ammonia, and carbon dioxide.
