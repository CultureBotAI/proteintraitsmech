identifier: proteintraitsmech:SEED_SUBSYSTEM_Ubiquitin-like_archaeal_modifier_proteins__SAMPs
label: "Ubiquitin-like archaeal modifier proteins (SAMPs)"
definition: >-
  Humbard M.A. et al. (2010) reported two small archaeal modifier proteins, SAMP1 and SAMP2, with a beta-grasp fold and carboxy-terminal diglycine motif similar to ubiquitin, that form protein conjugates in the archaeon Haloferax volcanii. The levels of SAMP-conjugates were altered by nitrogen-limitation and proteasomal gene knockout and spanned various functions including components of the Urm1 pathway. LC-MS/MS-based collision-induced dissociation demonstrated isopeptide bonds between the C-terminal glycine of SAMP2 and the e-amino group of lysines from a number of protein targets. The widespread distribution and diversity of pathways modified by SAMPylation suggest that this type of protein conjugation is central to the archaeal lineage. References Humbard M.A. et al., 2010. Ubiquitin-like small archaeal modifier proteins (SAMPs) in Haloferax volcanii. Nature, 463, doi:10.1038/nature08659
