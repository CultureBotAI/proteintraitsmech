label: "Dioxygenolytic carbon monoxide-forming enzymes"
definition: >-
  Quercetin 2,3-dioxygenases (Quercetinase = Flavonol 2,4-dioxygenase) are carbon monoxide-forming enzymes that utilise flavonols. They are metal-dependent and can show "promiscuousity" in their cofactor choice. While fungal enzymes usually contain Cu ions, prokaryotic enzymes can contain Ni, Cu, Fe, Mn or Zn ions. They can be monocupins or bicupins. The quercetinase of Streptomyces sp. FLA QueD is monocupin exhibiting only 35.9% sequence identity to the C-terminal domain of B. subtilis quercetinase QdoI. It has been suggested the quercetinases might play a major role as detoxifying rather than catabolic enzymes.
