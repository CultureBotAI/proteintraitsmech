# subsystem_id: Carboxysome
identifier: proteintraitsmech:SEED_SUBSYSTEM_Carboxysome
label: Carboxysome
definition: >-
  Effective CO2 fixation depends on CO2-concentrating mechanisms (CCM). The carboxysome is a prototypical bacterial microcompartment that is found in cyanobacteria and some chemoautotrophs, encapsulates ribulose-1,5-bisphosphate carboxylase/oxygenase (RuBisCO) and carbonic anhydrase, and thereby enhances carbon fixation by elevating the levels of CO2 in the vicinity of RuBisCO. While the gross structures of all known carboxysomes are ostensibly very similar, with shared gross features such as a selectively permeable shell layer, each type of carboxysome encapsulates a phyletically distinct form of RubisCO enzyme. Furthermore, the specific proteins forming structures such as the protein shell or the inner RubisCO matrix are not identical between carboxysome types. Each type has evolutionarily distinct forms of the same proteins, as well as proteins that are entirely unrelated to one another.
