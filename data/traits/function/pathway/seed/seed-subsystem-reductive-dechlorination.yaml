# subsystem_id: Reductive_Dechlorination
identifier: proteintraitsmech:SEED_SUBSYSTEM_Reductive_Dechlorination
label: "Reductive Dechlorination"
definition: >-
  The toxic solvents tetrachloroethene (PCE) and trichloroethene (TCE) have been widely used as degreasers and chemical feedstocks and present now the most common groundwater contaminants. A variety of microbe-mediated processes can catalyze conversion of these chlorinated solvents to harmless products. In aerobic environments, TCE, dichloroethenes (DCEs), and vinyl chloride (VC) are cometabolized by bacteria containing oxygenases, such as methane monooxygenase, toluene monooxygenase, and toluene dioxygenase, but PCE is not transformed. Anaerobic bacterial degradation of PCE proceeds readily via reductive dehalogenation to TCE, cis-1,2-DCE, VC, and ethene. In contaminated anaerobic environments, dechlorination often terminates at DCE or VC, but only rarely a complete dechlorination to ethene happens. Complete reductive dechlorination of PCE and TCE to ethene or ethane has also been observed in anaerobic enrichment cultures. Dehalococcoides ethenogenes, is able to completely dechlorinate PCE to ethene. The dehalogenation reactions unique to dehalorespiring bacteria are catalyzed by reductive dehalogenases (RDases), many of which have been purified and characterized. The identified substrates of these enzymes are either chlorinated ethenes or substituted chloroaromatics. Chloroethene RDases are membrane bound, or anchored to the membrane through an accessory protein. All contain cobalamin and iron-sulfur clusters.
