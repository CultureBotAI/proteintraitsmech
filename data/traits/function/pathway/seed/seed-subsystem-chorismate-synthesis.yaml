# subsystem_id: Chorismate_Synthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Chorismate_Synthesis
label: "Chorismate Synthesis"
definition: >-
  The shikimate pathway, including seven enzymatic steps for production of chorismate via shikimate from phosphoenolpyruvate and erythrose-4-phosphate, is common in various organisms for the biosynthesis of not only aromatic amino acids but also most biogenic benzene derivatives. 3-Amino-4-hydroxybenzoic acid (3,4-AHBA) is a benzene derivative serving as a precursor for several secondary metabolites like grixazone produced by Streptomyces griseus. The biosynthesis pathway of grixazone led to identification of the biosynthesis pathway of 3,4-AHBA from two primary metabolites. GriI and GriH, within the grixazone biosynthesis gene cluster were found to be responsible for the biosynthesis of 3,4-AHBA. GriI catalyzes the aldol condensation between two primary metabolites, l-aspartate-4-semialdehyde and dihydroxyacetone phosphate, to form a 7-carbon product, 2-amino-4,5-dihydroxy-6-one-heptanoic acid-7-phosphate, which is subsequently converted to 3,4-AHBA by GriH. The latter reaction requires Mn(2+), but no other cofactor. This pathway is independent of the shikimate pathway, representing a novel, simple enzyme system responsible for the synthesis of a benzene ring from the C(3) and C(4) primary metabolites. Alternative biochemistry: 6-deoxy-5-ketofructose 1-phosphate and l-aspartate semialdehyde are precursors to DHQ. The sugar, which is derived from glucose 6-P, supplies a "hydroxyacetone" fragment, which, via a transaldolase reaction, undergoes an aldol condensation with the l-aspartate semialdehyde to form 2-amino-3,7-dideoxy-D-threo-hept-6-ulosonic acid. Despite the fact that both hydroxyacetone and hydroxyacetone-P were measured in the cell extracts and confirmed to arise from glucose 6-P, neither compound was found to serve as a precursor to DHQ. This amino sugar then undergoes a NAD dependent oxidative deamination to produce 3,7-dideoxy-d-threo-hept-2,6-diulosonic acid which cyclizes to 3-dehydroquinate. The protein product of the M. jannaschii MJ0400 gene catalyzes the transaldolase reaction and the protein product of the MJ1249 gene catalyzes the oxidative deamination and the cyclization reactions.
