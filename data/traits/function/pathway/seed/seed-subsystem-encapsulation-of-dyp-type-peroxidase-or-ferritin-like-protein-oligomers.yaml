identifier: proteintraitsmech:SEED_SUBSYSTEM_Encapsulation_of_DyP-type_peroxidase_or_ferritin-like_protein_oligomers
label: "Encapsulation of DyP-type peroxidase or ferritin-like protein oligomers"
definition: >-
  The shell-forming protein known as 'encapsulin' forms a thin, icosahedral shell with a diameter of 240 angstroms assembled from 60 copies of the monomer. The interior of this nanocompartment is lined with conserved binding sites for short polypeptide tags present as C-terminal extensions of enzymes involved in oxidative-stress response.
