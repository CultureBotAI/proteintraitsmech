# subsystem_id: Glutathionylspermidine_and_Trypanothione
identifier: proteintraitsmech:SEED_SUBSYSTEM_Glutathionylspermidine_and_Trypanothione
label: "Glutathionylspermidine and Trypanothione"
definition: >-
  The tripeptide glutathione is converted to glutathionylspermidine (Gsp) in Escherichia coli and in trypanosomatid parasites by an ATP-cleaving Gsp synthetase activity. In parasites, an additional glutathionylation forms bis-(glutathionyl)-spermidine, trypanothione, believed to be the major surveillance thiol involved in oxidant defense mechanisms in trypanosomatid parasites. Trypanothione [N(1),N(8)-bis(glutathionyl)spermidine] plays a central role in defence against oxidant damage, ribonucleotide metabolism and in resistance to certain drugs in trypanosomatids. In Crithidia fasciculata, synthesis of trypanothione involves sequential conjugation of two molecules of glutathione (GSH) to spermidine by two enzymes: glutathionylspermidine synthetase (GspS; EC 6.3.1.8) and trypanothione synthetase (TryS; EC 6.3.1.9), whereas in Trypanosoma cruzi and T. brucei both steps are catalysed by an unusual TryS with broad substrate specificity.
