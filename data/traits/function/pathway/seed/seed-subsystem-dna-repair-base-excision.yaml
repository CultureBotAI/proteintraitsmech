identifier: proteintraitsmech:SEED_SUBSYSTEM_DNA_Repair_Base_Excision
label: "DNA Repair Base Excision"
definition: >-
  The prokaryotic non-homologous end-joining (NHEJ) pathway for the repair of DNA double strand breaks (DSBs) has now been identified and characterised. In contrast to the complex eukaryotic system, bacterial NHEJ appears to require only two proteins, Ku and a multifunctional DNA ligase, which form a two-component repair complex at the termini of DSBs. Together, these DNA repair factors possess all of the break-recognition, end-processing and ligation activities required to facilitate the complex task of DSB repair, both in vitro and in vivo.
