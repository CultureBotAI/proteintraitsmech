identifier: proteintraitsmech:SEED_SUBSYSTEM_Alginate_biosynthesis
label: "Alginate biosynthesis"
definition: >-
  Relevance for antimicrobial resistance (AMR) - Alginate reduces antibiotic influx via forming a passive barrier. Biofilms formed by an alginate-overproducing strain are significantly more resistant to the antibiotic tobramycin than a biofilm formed by an isogenic nonmucoid strain (PMID:11514525) References: Hay ID1, Ur Rehman Z, Moradali MF, Wang Y, Rehm BH. 2013 Microbial alginate production, modification and its applications. Microb Biotechnol. 2013 Nov;6(6):637-50. PMID: 24034361 Hay ID1, Wang Y, Moradali MF, Rehman ZU, Rehm BH. 2014 Genetics and regulation of bacterial alginate production. Environ Microbiol. 2014 Oct;16(10):2997-3011. PMID: 24428834 Remminghorst U1, Rehm BH. 2006 In vitro alginate polymerization and the functional role of Alg8 in alginate production by Pseudomonas aeruginosa. Appl Environ Microbiol. 2006 Jan;72(1):298-305. PMID: 16391057 Hentzer M1, Teitzel GM, Balzer GJ, Heydorn A, Molin S, Givskov M, Parsek MR. 2001. Alginate overproduction affects Pseudomonas aeruginosa biofilm structure and function. J Bacteriol, 183(18):5395-401. PMID:11514525
definition_source: BV-BRC
