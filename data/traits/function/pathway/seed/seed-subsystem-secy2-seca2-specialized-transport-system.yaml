identifier: proteintraitsmech:SEED_SUBSYSTEM_SecY2-SecA2_Specialized_Transport_System
label: "SecY2-SecA2 Specialized Transport System"
definition: >-
  The SecY2-SecA2 locus seems to implement a specialized transport system. In An accessory sec locus of Streptococcus gordonii is required for export of the surface protein GspB and for normal levels of binding to human platelets Bensing and Sullam say that it "may constitute a specialized system for the transport of a very large serine-rich repeat protein". I have tried to map the cluster accurately to the Staph, Lactobacilii, and Pediococcus genomes we currently have.
