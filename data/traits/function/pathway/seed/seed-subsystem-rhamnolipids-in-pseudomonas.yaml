identifier: proteintraitsmech:SEED_SUBSYSTEM_Rhamnolipids_in_Pseudomonas
label: "Rhamnolipids in Pseudomonas"
definition: >-
  Subsystem under construction Pseudomonas aeruginosa produces extracellular glycolipids composed of L-rhamnose and 3-hydroxyalkanoic acid called rhamnolipids. These compounds are considered important virulence factors and are found in high concentrations in sputa of P. aeruginosa-colonized cystic fibrosis patients (Kownatzki et al., 1987). They interfere with the normal tracheal ciliary function (Read et al., 1992), inhibit the phagocytic response of macrophages (McClure & Schiller, 1996) and act as heat-stable extracellular haemolysins (Johnson & Boese-Marrazzo, 1980). In liquid cultures, they are produced as a complex mixture of congeners containing one or two 3-hydroxy fatty acids of various length, linked to a mono- or di-rhamnose moiety (Deziel et al., 1999, 2000). In general, the two more abundant rhamnolipids are L-rhamnosyl-3-hydroxydecanoyl-3-hydroxydecanoate and L-rhamnosyl-L-rhamnosyl-3-hydroxydecanoyl-3-hydroxydecanoate (Lang & Wullbrandt, 1999; Maier & Soberon-Chavez, 2000). Rhamnolipids have been usually regarded as biosurfactants or haemolysins, and their real physiological function has been elucidated only recently. Di-rhamnolipid (L-rhamnosyl-L-rhamnosyl-3-hydroxydecanoyl-3-hydroxydecanoate) and novel biosurfactant 3-(3-hydroxyalkanoyloxy)alkanoic acids (HAAs), have been recently shown to serve as self-generated surface-specific stimuli (Tremblay et al., 2007) promoting recently discovered swarming motility in Pseudomonas aeruginosa (Kohler et al., 2000). Mono-rhamnolipid (L-rhamnosyl-3-hydroxydecanoyl-3-hydroxydecanoate) was shown in the same elegant study (Tremblay et al., 2007) to be a wetting agent, produced to reduce the surface tension between the migrating cells and the surface beneath them.
