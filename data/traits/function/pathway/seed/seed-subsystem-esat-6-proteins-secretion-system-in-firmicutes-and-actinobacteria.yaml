label: "ESAT-6 proteins secretion system in Firmicutes and Actinobacteria"
definition: >-
  ESAT-6, the 6 kDa early secreted protein from Mycobacterium tuberculosis, a potent T-cell antigen (9), is the prototype of a novel Esat-6/Esx family of small proteins of unknown function produced by several Gram(+) microorganisms, many of them pathogenic (4, 7, 10). The biochemical function of these proteins is still unclear, but their prominent role in virulence has been documented in Mycobacteria (reviewed in 1) and recently � in Staphylococcus aureus (3). All ESAT-6 family proteins lack known secretion signals, and their export requires novel secretory apparatus, which is encoded by a cluster of genes co-localized with ESAT-6 family proteins. It was originally identified by bioinformatics analysis (4, 10) and later experimentally confirmed (reviewed in 2). The genome of M. tuberculosis H37Rv and other Mycobacterial species has five copies of this cluster known as the ESAT-6 loci, with the region 4 (Rv3444c-3450c) believed to be ancestral (5). Orthologs of region 4 are also found in genomes of Corynebacteria, Streptomyces, Brevibacterium, and other Actinobacteria (5). Conservative gene clusters encoding proteins of the ESAT-6/Esx family and the components of the putative cognate secretion system have been identified in genomes of other Gram-positive pathogens as well as, including Staphylococcus aureus, Bacillus anthracis, and Listeria monocytogenes (7). Although the level of sequence similarity between mycobacterial ESAT-6 homologs and their analogs in Firmicutes (EssxAB/YukE proteins) is very low, their inclusion in a single ESAT-6 superfamily is based on (i) conservation of the WXG motif, (ii) the protein length of ~100 AA, and � most importantly -- (iii) a tendency of the corresponding genes to cluster with other ESAT-6 family members as well as with EssC/YukA proteins � membrane-bound ATPases possessing two or more FtsK/SpoIIIE domains (7). Single copies of this domain, containing ATP_binding motif, are found in the FtsK cell division protein from E. coli and in the SpoIIIE sporulation protein from B. subtilis, where they are thought to be involved in DNA translocation. However, this domain is a specific example of the more general AAA+ domain (6), common to many ATPases involved in macromolecular secretion, including those from Gram-negative type IV protein secretion systems (7). The clustering of the ESAT-6 and the FtsK/SpoIIIE family proteins (the �minimal ESAT-6 cluster�), preserved almost invariably in all species (i) gives credibility to categorizing the distant ESAT-6 homologs as one family and (ii) identifies the FtsK/SpoIIIE family as the most conserved (and likely most important) component of the cognate secretion system (7). Indeed, the essential role of the FtsK/SpoIIIE family proteins in the secretion of ESAT-6-homologs (and in virulence) has been demonstrated experimentally in Mycobacteria (reviewed in 2) and in S. aureus (3). Notably, other genes within the ESAT-6 cluster differ between mycobacteria (see SS: �ESAT-6 proteins secretion system in Actinobacteria�) and Firmicutes (see SS: �ESAT-6 proteins secretion system in Firmicutes�), yet their involvement in ESAT-6 secretion has been documented in each system (2, 3). The differences between the components of this novel Gram(+) secretion system in diverse species may indicate adaptations to different effector molecules. Notably, mutations in ESAT-6 cluster in M. smegmatis not only disrupt secretion of ESAT-6 and CFP-10, but also result in increased conjugal DNA transfer (11). Furthermore, the YueB protein, a B. subtilis homolog of the �putative secretion accessory protein EsaA� has been identified as the bacteriophage SPP1 receptor (8), leading the authors to speculate that membrane products of the ESAT-6 operon (YueB, YukC, and YukA) �could form a complex required for channeling the ejected DNA through the membrane." References: 1. Brodin, P., I.Rosenkrands, P.Andersen, S.T. Cole, Roland Brosch. 2004. ESAT-6 proteins: protective antigens and virulence factors? Trends. Microbiol, 12:500-508 2. Brodin P, Majlessi L, Marsollier L, de Jonge MI, Bottai D, Demangel C, Hinds J, Neyrolles O, Butcher PD, Leclerc C, Cole ST, Brosch R. Dissection of ESAT-6 System 1 of Mycobacterium tuberculosis and Impact on Immunogenicity and Virulence. Infect Immun. 2006 Jan;74(1):88-98. 3. Burts M.L., W.A. Williams, K.DeBord, and D.M. Missiakas. 2005. EsxA and EsxB are secreted by an ESAT-6-like system that is required for the pathogenesis of Staphylococcus aureus infections. PNAS, 102:1169 �1174 4. Cole, S.T. et al. 1998. Deciphering the biology of Mycobacterium tuberculosis from the complete genome sequence. Nature 393, 537�544 5. Gey van Pittius N. et al. 2001. The ESAT-6 gene cluster of Mycobacterium tuberculosis and other high G+C Gram-positive bacteria. Genome Biology, 2(10): research0044.1�0044.18 6. Neuwald, A.F. et al. 1999. AAA+: a class of chaperone-like ATPases associated with the assembly, operation, and disassembly of protein complexes. Genome Res. 9, 27�43 7. Pallen M.J. 2002. The ESAT-6/WXG100 superfamily � and a new Gram-positive secretion system? Trends Microbiol., 10(5):209-212 8. Sao-Jose &#769;C., C. Baptista, and M.A. Santos. 2004. Bacillus subtilis operon encoding a membrane receptor for bacteriophage SPP1. J. Bact, 186(24):8337�8346 9. S�rensen, A.L. et al. 1995. Purification and characterization of a low-molecular-mass T-cell antigen secreted by Mycobacterium tuberculosis. Infect. Immun. 63, 1710�1717 10. Tekaia, F. et al. 1999. Analysis of the proteome of Mycobacterium tuberculosis in silico. Tuber. Lung Dis. 79, 329�342 11. Flint J. L., J.C. Kowalski, P.K. Karnati, and K.M. Derbyshire. The RD1 virulence locus of Mycobacterium tuberculosis regulates DNA transfer in Mycobacterium smegmatis. PNAS, 101(34):12598 �12603.
