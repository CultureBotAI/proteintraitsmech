# subsystem_id: Antibiotic_anticapsin_-_bacilysin
identifier: proteintraitsmech:SEED_SUBSYSTEM_Antibiotic_anticapsin_-_bacilysin
label: "Antibiotic anticapsin - bacilysin"
definition: >-
  The bacABCDEF operon of B. subtilis is responsible for the biosynthesis of the nonribosomally synthesized dipeptide antibiotic bacilysin, composed of L-alanine and L-anticapsin. Bacilysin is an irreversible inactivator of the glutaminase domain of glucosamine synthetase. Catalyzes the reductive amination of the C2 ketone of tetrahydro-hydroxyphenylpyruvate (H4HPP), with L-Phe as an amino donor, to yield tetrahydrotyrosine (H4Tyr) diastereomer. D-Phe is not an effective amino donor. BacF associated to BacG converts 3E,7R- and 3Z,7R-ex-H2HPP to 2S,4R,7R- and 2S,4S,7R-H4Tyr, respectively. Given that bacilysin has the 2S,4S stereochemistry in its anticapsin moiety, it is likely that the 2S,4S-H4Tyr is the diastereomer used for the biosynthesis. BacA is an unusual prephenate decarboxylase that avoids the typical aromatization of the cyclohexadienol ring by protonating C(8) to produce an isomerized structure. BacB then catalyzes an allylic isomerization, generating a conjugated dienone with a 295 nm chromophore. Both the BacA and BacB products are regioisomers of H(2)HPP (dihydro-4-hydroxyphenylpyruvate). The BacB product is then a substrate for the short chain reductase YwfH which catalyzes the conjugate addition of hydride at the C(4) olefinic terminus using NADH to yield the cyclohexenol-containing tetrahydro-4-hydroxyphenylpyruvate H(4)HPP. In turn, this keto acid is a substrate for YwfG, which promotes transamination (with L-Phe as amino donor), to form tetrahydrotyrosine (H(4)Tyr), which has not previously been identified in B. subtilis but is a recognized building block in cyanobacterial nonribosomal peptides such as micropeptins and aeruginopeptins.
