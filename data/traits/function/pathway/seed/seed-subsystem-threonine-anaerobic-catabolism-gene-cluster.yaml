identifier: proteintraitsmech:SEED_SUBSYSTEM_Threonine_anaerobic_catabolism_gene_cluster
label: "Threonine anaerobic catabolism gene cluster"
definition: >-
  This small Subsystem describes an extended tdcABCDEFG operon (gene cluster), which encodes components of an anaerobically inducible, catabolite-repressible pathway, generating one molecule of ATP from the degradation of L-threonine to propionate via 2-ketobutyrate as an intermediate [1]. This gene cluster apparently also plays a role in anaerobic degradation of serine: (i) TdcE (e.g. fig|83333.1.peg.3060) has both pyruvate formate-lyase and 2-ketobutyrate formate-lyase activity; (ii) the TdcD protein is a propionate/acetate kinase [1]; (iii) L-threonine transporter, anaerobically inducible (TdcC, e.g. fig|83333.1.peg.3062) is also active with L-serine [2]; (iv) furthermore, a predicted L-serine dehydratase (EC 4.3.1.17) TdcG is a part of this operon and a putative L-serine transporter is located immediately downstream of it. Other functional roles involved in this catabolic pathway, but encoded outside of the tdc operon have been included here as well: - Pyruvate formate-lyase activating enzyme, which is also an essential activator of Threonine dehydratase, catabolic (EC 4.3.1.19), a glycyl radical enzyme [1]; - Phosphate acetyltransferase (PAT) - a necessary component of the proposed L-threonine to propionate pathway (see diagram) - Acetate kinase (ACK), because it appears to contribute significantly to propionate production [1] This operon is present in many (but not all) Enterobacteriales Variant codes: 1 = a complete tdcABCDEFG operon, as in E. coli K12 2 = a shorter variant of the operon with one or more genes missing (sequencing mistakes and uncalled ORFs excluding) -1 = Tdc operon in not detectable in a genome
