identifier: proteintraitsmech:SEED_SUBSYSTEM_DNA_repair_system_including_RecA__MutS_and_a_hypothetical_protein
label: "DNA repair system including RecA, MutS and a hypothetical protein"
definition: >-
  A DNA repair system that includes RecA, MutS and a hypothetical protein. RecX, which is known to regulate RecA activity is often included in the cluster. ==== A note added in 2015 ===== The function of the hypothetical gene predicted by RossO in this SS has been recently identified to be Nicotinamide-nucleotide amidase (EC 3.5.1.42) (PMID:21953451, see abstract below). This enzyme is potentially involved in detoxification of NMN, resulting from NAD utilization by DNA ligase (PMID:21953451), which is fully consistent with the co-localization of the corresponding gene with DNA repair genes, an observation recorded in this SS sometime before 2009
