identifier: proteintraitsmech:SEED_SUBSYSTEM_Tolerance_to_colicin_E2_and_CreBC_signal_transduction_system
label: "Tolerance to colicin E2 and CreBC signal transduction system"
definition: >-
  Colicins are a group of protein antibiotics that have various modes of action. They are usually encoded on plasmids, often with genes encoding colicin immunity factors, protecting colicin-producing cells from their own colicin. Of the enzymatic (E) colicins, some carry nuclease activity, including colicin E2, colicin E9, and colicin E3. These three proteins bind to susceptible cells via the surface protein BtuB (the vitamin B12 importer) and, through a series of events that are poorly understood, cross the cell envelope to enter the cytoplasm, where they degrade nucleic acids: colicins E2 and E9 target DNA; colicin E3 targets rRNA (PMID:17347522) Tolerance to colicin E2 (Cet2 phenotype) was originally believed to be due to overexpression of CreD protein (an inner membrane protein of unknown function (PMID: 2835585)) upont its induction by CreBC signal transduction system. However, it was later demonstrated (PMID:20418396) that although overproduction of CreD in a Cet2 strain indeed results from hyperactivation of the CreBC two-component regulator, CreD overproduction is NOT responsible for the Cet2 phenotype. Instead, overexpression of another CreBC-regulated gene, yieJ (also known as cbrC), causes the Cet2 phenotype. Both protein families, CreD and CbrC are encoded in this Subsystem (for historic reasons), along with the CreBC signal transduction two-component system, which regulates both of them. CreC was originally designated PhoM, because it can act as a phosphate donor for PhoB, a response regulator that controls expression of the pho regulon (PMID: 7021308). CreB is a target for phospho-relay from phospho-CreC and is the cognate CreC response regulator. CreBC is activated on minimal medium when E.coli is fermenting glycolytic carbon sources and during aerobic growth on gluconeogenic carbon (PMID:11350954; PMID: 18375564). The CreBC genes are cotranscribed with the conserved gene of unknown function creA in some Enterobacteriaceae. Orthologs of CreA are present in a large number of Proteobacteria, including organisms that do not encode CreBC or CreD. The function of this family is still unknown. In E.coli CreB and CreC are essential for the activation of cre regulon genes, but CreA and CreD (encoded as part of the creABCD gene cluster) are not (PMID: 18375564)
