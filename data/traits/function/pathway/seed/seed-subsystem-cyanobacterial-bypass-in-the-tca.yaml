label: "Cyanobacterial bypass in the TCA"
definition: >-
  These two genes together implement a novel bypass in the TCA. Genes encoding a novel 2-oxoglutarate decarboxylase and succinic semialdehyde dehydrogenase were identified in the cyanobacterium Synechococcus sp. PCC 7002. These two enzymes convert 2-oxoglutarate to succinate and thus functionally replace 2-oxoglutarate dehydrogenase and succinyl-CoA synthetase.
