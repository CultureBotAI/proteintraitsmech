# subsystem_id: Alkane_synthesis_in_bacteria_2
identifier: proteintraitsmech:SEED_SUBSYSTEM_Alkane_synthesis_in_bacteria_2
label: "Alkane synthesis in bacteria 2"
definition: >-
  This subsystem encodes a proposed pathway for alkene biosynthesis from fatty acyl-CoAs (or -ACPs) that is based largely on enzyme activities homologous to those essential for fatty acid biosynthesis. The first step of alkene biosynthesis, could be decarboxylation of the &#946;-ketoacyl-CoA and nucleophilic attack by the resulting carbanion on an acyl-CoA to form an aliphatic diketone (decarboxylative Claisen condensation like FabH). Following formation of the aliphatic diketone, alkene biosynthesis could follow as a series of reductase and dehydratase reactions homologous to those catalyzed by &#946;-ketoacyl-ACP reductases (FabG), &#946;-hydroxyacyl-ACP dehydratases (FabZ), and enoyl-ACP reductases (FabI). Genes designated as oleABCD encode this pathway. The heterologous expression of threse genes from M. luteus (Mlut_13230-13250) in a fatty acid-overproducing strain of E. coli resulted in production of long-chain alkenes, predominantly 27:3 and 29:3 (X:Y, where X = carbon number and Y = number of CC bonds). In a different paper it was shown that the oleABCD genes are required for long-chain olefin production by S. oneidensis. The authors propose the potential role of the ole gene product(s) in cold adaption.
