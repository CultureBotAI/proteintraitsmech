# subsystem_id: 5-nitroimidazole_antibiotic_resistance
identifier: proteintraitsmech:SEED_SUBSYSTEM_5-nitroimidazole_antibiotic_resistance
label: "5-nitroimidazole antibiotic resistance"
definition: >-
  5-Nitroimidazole-based antibiotics like Metronidazole (MTZ) are compounds extensively used for treating infections in humans and animals. They are administered as prodrugs, and their activation depends upon an anaerobic 1-electron reduction of the nitro group by a reduction pathway in the cells. Bacterial resistance toward these drugs is thought to be caused by decreased drug uptake and/or an altered reduction efficiency. One class of resistant strains, identified in Bacteroides, has been shown to carry Nim genes (NimA, -B, -C, -D, and -E), which encode for reductases that convert the nitro group on the antibiotic into a non-bactericidal amine. PMID: 24448511 metronidazole resistance does occur in Bacteroides and has been mainly attributed to Nim proteins, a class of proteins with a suggested nitroreductase function.the data herein do not provide evidence for Nim proteins acting as nitroreductases using metronidazole as a substrate, because no correlation between Nim levels and levels of metronidazole resistance could be observed. Furthermore, no evidence was found that Nim proteins protect B. fragilis from metronidazole by sequestering the activated antibiotic
