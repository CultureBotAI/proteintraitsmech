label: "Lactate Racemization"
definition: >-
  A Six-gene operon in Lactobacillus plantarum is implicated in lactate recemization. See J Bacteriol. 2005 Oct;187(19):6750-61. Lactate racemization as a rescue pathway for supplying D-lactate to the cell wall biosynthesis machinery in Lactobacillus plantarum. Goffin, et al The paper reports "the cloning of a six-gene operon, which is involved in lactate racemization activity and is positively regulated by l-lactate. Deletion of this operon in an L. plantarum strain that is devoid of LdhD activity leads to the exclusive production of l-lactate."
