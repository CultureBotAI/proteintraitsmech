identifier: proteintraitsmech:SEED_SUBSYSTEM_Thiamin__thiazole__hydroxymethylpyrimidine_salvage_and_uptake
label: "Thiamin, thiazole, hydroxymethylpyrimidine salvage and uptake"
definition: >-
  Thiamin pyrophosphate (vitamin B1) is an essential cofactor for several important enzymes of the carbohydrate metabolism. Many microorganisms, as well as plants and fungi, synthesize thiamin, but it is not produced by vertebrates. --------Variant codes:----------- 1. as in E. coli. HMP synthesis pathway using ThiC, bacterial variant of HET synthesis from tyrosine (has ThiH), bacterial thiamin synthase (ThiE). 2. as in Mycobacterium tuberculosis. HMP synthesis pathway using ThiC, bacterial variant of HET synthesis from glycine (has ThiO), the thiamin synthase ThiE. 3. as in Thermotoga maritime and some Archaea. HMP synthesis pathway using ThiC, eukaryotic/archaeal pathway of the HET synthesis (THI4), the thiamin synthase ThiN. 4. as in fungi and plants. Eukaryotic HMP synthesis pathway (THI5), eukaryotic/archaeal pathway of the HET synthesis (THI4), the thiamin synthase ThiN. 5. as in some Archaea. HMP synthesis pathway using ThiC, eukaryotic/archaeal pathway of the HET synthesis (THI4), two thiamin synthases ThiE and ThiN. 6. as in Archaeoglobus fulgidus.. HMP synthesis pathway using ThiC, eukaryotic/archaeal pathway of the HET synthesis (THI4), the thiamin synthase ThiE. 7. as in some pathogenic bacteria (Haemophilus, Streptococci). HMP and HET salvage pathways instead of the de novo HMP and HET biosynthesis pathways, the thiamin synthase ThiE. 8. HMP synthesis pathway using ThiC, and the HET salvage 9. as in Brucella melitensis. HMP salvage pathway instead of the de novo HMP biosynthesis pathway, bacterial variant of HET synthesis from glycine (has ThiO), the thiamin synthase ThiE. 10. as in some obligate pathogens (Treponema spp, Strep. pyogenes). no de novo pathway, no HET and HMP salvage. Only thiamin uptake transporters.
