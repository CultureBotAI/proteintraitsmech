# subsystem_id: Lysozyme_Inhibitors
identifier: proteintraitsmech:SEED_SUBSYSTEM_Lysozyme_Inhibitors
label: "Lysozyme Inhibitors"
definition: >-
  This Subsystem was originally encoded by Claudia Reich, whose contribution we gratefully acknowledge Lysozymes (EC 3.2.1.17) hydrolyse the &#946;-(1,4) glycosidic bond between N-acetylmuramic acid and N-acetylglucosamine in peptidoglycan, the major cell wall polymer in the Bacteria. Lysozymes are implicated in defensive and offensive bactericidal systems in a wide range of taxonomically diverse organisms including fungi, protozoa, plants, invertebrate and vertebrate animals and even bacteriophages. Bacteria have in turn evolved mechanisms to evade or subvert this threat, most commonly by peptidoglycan modification. A different bacterial strategy to evade the bactericidal action of lysozyme is the production of lysozyme inhibitors. The location of the bacterial lysozyme inhibitors either in the periplasm (Inhibitor of vertebrate lysozyme precursor Ivy and Periplasmic lysozyme inhibitor of c-type lysozyme PliC) or anchored to the luminal face of the outer membrane (Membrane-bound lysozyme inhibitor of c-type lysozyme MliC) is consistent with a role in protecting peptidoglycan from hydrolysis by exogenous lysozymes.
