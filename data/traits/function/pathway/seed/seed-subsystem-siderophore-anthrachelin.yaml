label: "Siderophore Anthrachelin"
definition: >-
  A putative siderophore biosynthesis operon, named �anthrax siderophore biosynthesis� (asb) has been first described by (Cendrowski et al., 2004). It was shown to be essential for Bacillus anthracis growth in macrophages and mouse virulence. However, the nature of it�s putative product (named anthrachelin), has not been established. It was later suggested by (Challis GL. 2005), based on sequence similarity of the asbAB genes with iucA and iucB (controlling aerobactin biosynthesis in some virulent E. coli strains), that anthrachelin is related to a group of non-peptide siderophores, produced by nonribosomal peptide synthetases (NRPS)-independent mechanism. Other siderophores in this group include rhizobactin 1021, achromobactin, vibrioferrin, alcaligin, and desferrioxamine E (reviewed by Challis, 2005). Such siderophores are assembled from alternating dicarboxylic acid and diamine or amino alcohol building blocks (which are nevertheless derived from amino acids) linked by amide or ester bonds (Challis GL. 2005). See Tab "Illustrations" for examples of their structures. References Challis GL. 2005. A widely distributed bacterial pathway for siderophore biosynthesis independent of nonribosomal peptide synthetases. Chembiochem, 6(4):601-11. Cendrowski S, MacArthur W, Hanna P. 2004. Bacillus anthracis requires siderophore biosynthesis for growth in macrophages and mouse virulence. Mol Microbiol, 51(2):407-17.
