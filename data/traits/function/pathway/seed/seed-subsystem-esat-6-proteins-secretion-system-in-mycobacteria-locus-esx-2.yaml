# subsystem_id: ESAT-6_proteins_secretion_system_in_Mycobacteria_(locus_ESX-2)
identifier: proteintraitsmech:SEED_SUBSYSTEM_ESAT-6_proteins_secretion_system_in_Mycobacteria__locus_ESX-2
label: "ESAT-6 proteins secretion system in Mycobacteria (locus ESX-2)"
definition: >-
  Pathogenic mycobacteria require type VII secretion (T7S) systems to transport virulence factors across their complex cell envelope. These bacteria have up to five of these systems, termed ESX-1 to ESX-5. This Subsystem encodes locus ESX-2 in all Mycobacterial genomes currently available in the SEED database. ESAT-6, the 6 kDa early secreted protein from Mycobacterium tuberculosis, a potent T-cell antigen, is the prototype of a novel family of small proteins (ESX) of unknown function produced by several Gram(+) microorganisms. The genome of Mycobacterium tuberculosis H37Rv has 23 ESX proteins, encoded by genes esxA through esxW, arranged in tandem pairs in 11 genomic loci, known as the ESX or ESAT-6 loci Export of ESAT-6 and related proteins requires a dedicated secretory apparatus, variously named ESAT-6- , SNM-, ESX-, or type VII secretion system (Bitter et al., 2009). Components of these secretion machinery are commonly encoded by clusters of genes co-localized with the ESAT-6 (ESX) family proteins. Out of the 11 ESX loci in the genome of M. tuberculosis, five (ESX-1 through ESX-5) include secretion system components. Among them region 4 (Rv3444c-3450c) is believed to be ancestral. Only the ESX-1 region (corresponding to RD1) is encoded in this SS, please see the following subsystems for loci ESX-2 through ESX-5: ESAT-6 proteins secretion system in Firmicutes ESAT-6 proteins secretion system in Mycobacteria (locus ESX-2) ........... ESAT-6 proteins secretion system in Mycobacteria (locus ESX-5) Conservative gene clusters containing proteins of the ESAT-6/Esx family and the components of the putative secretion system (SNM) have been identified in other Gram-positive pathogens as well, including Bacillus anthracis, Corynebacterium diptheriae and Listeria monocytogenes (Pallen, 2002). In Staphylococcus aureus SNM homologues are required for secretion of ESAT-6-like proteins (Burts et al ., 2005). As with mycobacteria, loss of ESAT-6 secretion in S. aureus correlates with reduced virulence. While the role of these homologues in other Gram(+) species is not yet determined, mounting evidence suggests that this alternative secretion system will be important for virulence in many acid-fast and Gram-positive pathogens. Given its role in pathogenesis, it is curious that the ESAT-6/Esx/SNM secretion system also functions in non-pathogenic mycobacteria. M. smegmatis has a genetic locus homologous to RD1 and is able to secrete ESAT-6 and CFP-10 homologues (Gey Van Pittius et al .,2001; Converse and Cox, 2005). Interestingly, mutations in M. smegmatis SNM homologues not only disrupt secretion of ESAT-6 and CFP-10 (Converse and Cox, 2005), but also result in increased conjugal DNA transfer (Flint et al ., 2004). While the SNM pathway may have different functions in various bacteria, similarity of snm genes suggests that the core mechanism of SNM secretion is conserved.
