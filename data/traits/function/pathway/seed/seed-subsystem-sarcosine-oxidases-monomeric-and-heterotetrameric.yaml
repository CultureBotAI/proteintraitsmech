identifier: proteintraitsmech:SEED_SUBSYSTEM_Sarcosine_oxidases__monomeric_and_heterotetrameric
label: "Sarcosine oxidases, monomeric and heterotetrameric"
definition: >-
  Sarcosine oxidase (EC 1.5.3.1) catalyzes the oxidative demethylation of sarcosine to produce formaldehyde, glycine and hydrogen peroxide. This enzyme, together with the other enzymes such as creatininase and creatinase, have been used in clinics for determination of creatinine, which is an important parameter to estimate the function of kidney (Bacon and Pardue, 1991). Enzymatic activity has been demonstrated in bacteria (Kim et al. 1987; Matsuda et al. 1987; Mori et al. 1980; Nishiya and Imanaka 1993; Ogushi et al. 1988; Suzuki 1981), mammals (Chikayama et al. 2000; Reuber et al. 1997), and plant (Goyert et al. 2004). The enzyme has been isolated from various sources and three types in its organization have been reported, i.e., monomer, heterodimer and heterotetramer. Heterotetrameric SOX consists of four non-identical subunits and contains both covalently and non-covalently bound flavins. The enzyme was first purified from Corynebacterium sp. U-96, then from various sources, such as Corynebacterium sp.P-1, Arthrobacter ureafaciens, and Arthrobacter sp.1-IN. Monomeric form has ben characterized in Bacillus sp. NS-129 (Kayama et al. 1991), and Bacillus sp. B-0618 (Suzuki et al. 1994), and the corresponding genes have been cloned and expressed.
