identifier: proteintraitsmech:SEED_SUBSYSTEM_CMP-pseudaminic_acid_synthesis
label: "CMP-pseudaminic acid synthesis"
definition: >-
  CMP-pseudaminic acid Pathogenic organisms like Campylobacter jejuni, Campylobacter coli and Helicobacter pylori, heavily modify their flagellin with the sialic acid-like sugar 5,7-diacetamido-3,5,7,9-tetradeoxy-l-glycero-alpha-l-manno-nonulosonic acid (pseudaminic acid). The presence of pseudaminic acid is required for the proper development of the flagella and is thereby necessary for motility in, and invasion of, the host.
