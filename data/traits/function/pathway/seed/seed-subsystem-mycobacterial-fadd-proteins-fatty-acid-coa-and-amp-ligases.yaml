# subsystem_id: Mycobacterial_FadD_proteins_(fatty_acid_CoA-_and_AMP-_ligases)
identifier: proteintraitsmech:SEED_SUBSYSTEM_Mycobacterial_FadD_proteins__fatty_acid_CoA-_and_AMP-_ligases
label: "Mycobacterial FadD proteins (fatty acid CoA- and AMP- ligases)"
definition: >-
  This Subsystem encodes a group of 36 FadD paralogous long-chain fatty-acid-CoA ligases that are present in every Mycobacterial genome. In general, it is next to impossible to distinguish these closely related proteins. This family is different, however, as it was addressed in 2 Nature publications and an ID number was assigned to each of the 36 members (FadD1 through FadD36). They are interesting for several reason, but mostly because some of the 36 paralogs are not using CoA to activate fatty acids, but AMP instead! A solid publication in Nature claims this new biochemistry and lists specific paralogs (out of the 36) that are likely doing this (below). Nature. 2004 Mar 25;428(6981):441-5. Enzymic activation and transfer of fatty acids as acyl-adenylates in mycobacteria. Trivedi OA, Arora P, Sridharan V, Tickoo R, Mohanty D, Gokhale RS. Abstract The metabolic repertoire in nature is augmented by generating hybrid metabolites from a limited set of gene products. In mycobacteria, several unique complex lipids are produced by the combined action of fatty acid synthases and polyketide synthases (PKSs), although it is not clear how the covalently sequestered biosynthetic intermediates are transferred from one enzymatic complex to another. Here we show that some of the 36 annotated fadD genes, located adjacent to the PKS genes in the Mycobacterium tuberculosis genome, constitute a new class of long-chain fatty acyl-AMP ligases (FAALs). These proteins activate long-chain fatty acids as acyl-adenylates, which are then transferred to the multifunctional PKSs for further chain extension. This mode of activation and transfer of fatty acids is contrary to the previously described universal mechanism involving the formation of acyl-coenzyme A thioesters. Similar mechanisms may operate in the biosynthesis of other lipid-containing metabolites and could have implications in engineering novel hybrid products. PMID: 15042094
