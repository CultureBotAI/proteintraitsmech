identifier: proteintraitsmech:SEED_SUBSYSTEM_Heme_and_heme_d1_biosynthesis_from_siroheme
label: "Heme and heme d1 biosynthesis from siroheme"
definition: >-
  Heme d1 plays a key role in the function the cytochrome cd1 nitrite reductase (NirS), which catalyzes the conversion of nitrite to nitric oxide and water, the first committed step of the denitrification process (encoded in a separate SS: �Dissimilatory nitrite reductase). NirS is the only enzyme known to utilize heme d1 as a cofactor. The unusual pathway for heme d1 biosynthesis was recently deciphered by M. Warren�s group (Bali, et al., 2011). The fact that heme d1 biosynthetic genes co-localize with NirS and other nir genes in denitrifying bacteria (Palmedo et al., 1995; Kawasaki et al., 1997) facilitated this discovery. Furthermore, a related process leading to HEME biosynthesis was discovered based on the biochemical data in Desulfovibrio vulgaris (Ishida et al., 1998) and the analysis of completely sequenced Archaeal and Desulfovibrio genomes (Lobo et al., 2009; Storbeck S, et al., 2010; Panek & O�Brian, 2002). Altogether, these observations led to the theory of an alternative heme biosynthesis pathway that diverges from the classical pathway at the uroporphyrinogen step via precorrin-2 This novel process of heme or heme d1 biosynthesis process entails the hijacking of siroheme, the prosthetic group of sulfite and nitrite reductase [see scheme under 'Diagrams and Illustrations' green tab above]. The initial step in these transformations involves the decarboxylation of siroheme to give didecarboxysiroheme. For d1 heme synthesis this intermediate has to undergo the replacement of two propionate side chains with oxygen functionalities and the introduction of a double bond into a further peripheral side chain. For heme synthesis didecarboxysiroheme is converted into Fe- coproporphyrin by oxidative loss of two acetic acid side chains. Fe-coproporphyrin is then transformed into heme by the oxidative decarboxylation of two propionate side chains The genes controlling the new heme pathway are referred to as ahb genes (for 'Alternative Heme Biosynthesis') A, B, C, and D, and are homologous to nirD, H, and J, respectively (with nirJ being homologous to both ahbC and D) === Quoted largely from (Bali et al., 2014)=== References Bali S, Palmer DJ, Schroeder S, Ferguson SJ, Warren MJ. 2014. Recent advances in the biosynthesis of modified tetrapyrroles: the discovery of an alternative pathway for the formation of heme and heme d 1. Cell Mol Life Sci. PMID: 24515122 Bali S, Lawrence AD, Lobo SA, Saraiva LM, Golding BT, Palmer DJ, Howard MJ, Ferguson SJ, warren MJ (2011) Molecular hijacking of siroheme for the synthesis of heme and d1 heme. Proc Natl Acad Sci USA 108(45):18260�18265 Panek H, O�Brian MR (2002) A whole genome view of prokaryotic haem biosynthesis. Microbiol Sgm 148:2273�2282 Palmedo G, Seither P, Korner H, Matthews JC, Burkhalter RS, Timkovich R, Zumft wG (1995) Resolution of the nirD locus for heme d1 synthesis of cytochrome cd1 (respiratory nitrite reductase) from Pseudomonas stutzeri. eur J Biochem 232(3):737�746. Kawasaki S, Arai H, Kodama T, Igarashi Y (1997) Gene clus- ter for dissimilatory nitrite reductase (nir) from P. aeruginosa: sequencing and identification of a locus for heme d1 biosynthe- sis. J Bacteriol 179(1):235�242 Ishida T, et al. (1998) A primitive pathway of porphyrin biosynthesis and enzymology in Desulfovibrio vulgaris. Proc Natl Acad Sci USA 95:4853�4858. Lobo SAL, Brindley A, Warren MJ, Saraiva LM (2009) Functional characterization of the early steps of tetrapyrrole biosynthesis and modification in Desulfovibrio vulgaris Hildenborough. Biochem J 420:317�325. Storbeck S, et al. (2010) A novel pathway for the biosynthesis of heme in Archaea: Genome-based bioinformatic predictions and experimental evidence. Archaea 2010:175050.
