identifier: proteintraitsmech:SEED_SUBSYSTEM_Bicyclomycin_resistance_cluster
label: "Bicyclomycin resistance cluster"
definition: >-
  Bicyclomycin (Bc) is a diketopiperazine antibiotic exhibiting activity against a broad spectrum of Gram-negative bacteria and against some Gram-positive bacteria. Bicyclomycin is the only known selective inhibitor of the transcription termination factor Rho. It inhibits Rho by being a reversible, noncompetitive inhibitor of ATP. 1. Target organisms: Gram-negative and some Gram-positive bacteria 2. Mechanism of action: selective inhibition of the transcription termination factor Rho (transcription) 3. Molecular target: transcription termination factor Rho 4. Mechanism leading to resistance: reversible, noncompetitive inhibition of ATP 5. Required for resistance: Multidrug resistance transporter Bcr
