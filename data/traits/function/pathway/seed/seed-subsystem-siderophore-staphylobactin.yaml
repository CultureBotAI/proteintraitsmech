identifier: proteintraitsmech:SEED_SUBSYSTEM_Siderophore_Staphylobactin
label: "Siderophore Staphylobactin"
definition: >-
  This SS encodes a genetic locus (sbn) involved in biosynthesis of the siderophore staphylobactin in S. aureus. Although this compound has not been structurally characterized yet, it�s involvement in virulence of S. aureus in a murine kidney abscess model has been clearly demonstrated (Dale et al., 2004). It was also shown, that the sbnABCDEFGHI genes comprise an operon, and that iron (via Fur) regulates its transcription (Dale et al., 2004). The functions of each gene product have not been determined yet. The involvement of the SirABC proteins in the staphylobactin import in S. aureus was shown experimentally (Dale, Sebulsky, and Heinrichs, 2004) It was later suggested by (Challis GL. 2005), based on sequence similarity of the SbnE, SbnC, and SbnF genes with iucA, iucB, iucC respectively (controlling aerobactin biosynthesis in some virulent E. coli strain), that staphylobactin is related to a group of non-peptide siderophores, produced by nonribosomal peptide synthetases (NRPS)-independent mechanism. Siderophores in this group include aerobactin, rhizobactin 1021, achromobactin, vibrioferrin, alcaligin, and desferrioxamine E (reviewed by Challis, 2005). Such siderophores are assembled from alternating dicarboxylic acid and diamine or amino alcohol building blocks (which are nevertheless derived from amino acids) linked by amide or ester bonds (Challis GL. 2005)
