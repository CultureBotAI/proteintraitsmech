# subsystem_id: Branched-chain_amino_acids_and_alpha-keto_acids_utilization_as_energy_sources
identifier: proteintraitsmech:SEED_SUBSYSTEM_Branched-chain_amino_acids_and_alpha-keto_acids_utilization_as_energy_sources
label: "Branched-chain amino acids and alpha-keto acids utilization as energy sources"
definition: >-
  This Subsystem (SS) encodes the utilization of Branched-chain amino acids and alpha-keto acids as energy sources only -- via a system analogous to a well-known pyruvate dehydrogenase plus phosphotransacetylase and acetate kinase (PDH-pta-ackA) pathway to produce ATP. See another Subsystem: "Degradation of branched-chain amino acids and alpha-keto acids" for degradation and assimilation of branched-chain amino acids and alpha-keto acids as carbon sources. Two auxiliary Roles specific for Butyrate (butanoate) metabolism are also included in this SS for disambiguation: - Phosphate butyryltransferase (EC 2.3.1.19) - Butyrate kinase (EC 2.7.2.7) Note, that in some genomes the branched-chain specific genes bct and/or bck co-localize with the butyrate-specific genes SUMMARY The Branched-chain alpha-keto acid dehydrogenase complex (BCDH) catalyzes the oxidative decarboxylation of the branched-chain alpha-keto acids alpha-ketoisocaproic (KIC), alpha-ketoisovaleric (KIV), and alpha-keto-beta-methylvaleric acid (KMV), that can be are derived either (i) from the transamination of the branched-chain amino acids (valine, leucine, and isoleucine) or (ii) from the degradation of membrane lipids or (iii) from the environment, via the uptake of branched-chain alpha-keto acids An elegant and profound study by Ward at al. (PMID:10464218) pointed out that in genomes of Enterococcus faecalis (a member of the lactic acid bacteria (LAB)) and Bacillus subtilis the BKDH complex is encoded in a gene cluster which also contains hypothetical genes for a branched-chain acyl-phosphotransferase and an acyl kinase. This observation lead the authors to hypothesize and then to convincingly demonstrate that this cluster encodes a previously undescribed pathway in E. faecalis for the utilization of the branched-chain alpha-keto acids KIC, KIV, and KMV as energy sources. These compounds are reductively decarboxylated by the BKDH complex generating the corresponding acyl-CoA�s, which are then converted to the free acids isovalerate, isobutyrate, and methylbutyrate through the combined actions of the acyl-phosphotransferase and acyl kinase (the Bct and Bck gene products). Importantly, the concomitant phosphorylation of ADP generates ATP in a system analogous to the pyruvate dehydrogenase complex plus phosphotransacetylase and acetate kinase (PDH-pta-ackA). Similar study has been published earlier in a spirochete (PMID:6288660) The physiological role of the bkd-bct-bck gene cluster in E. faecalis is to serve as an alternative energy source to enterococci, which are unable to synthesize heme and therefore lack functional electron transport chain and oxidative phosphorylation and rely on substrate-level phosphorylation for ATP generation. An orthologous gene cluster is encoded in the genomes of a number of other Firmicutes, most notably in Bacillus subtilis (PMID: 10094682). There it is involved in carbon and nitrogen assimilation (in addition to energy production), in contrast to the E. faecalis system, whose main function is most likely energy generation (see PMID:10464218 for detailed comparative analysis). Another important difference between the E. faecalis and B.subtilis clusters is the absence in the former of the bcd gene, encoding Branched-chain amino acid dehydrogenase [deaminating] (EC 1.4.1.9)(EC 1.4.1.23). The absence of this enzyme from the E. faecalis bkd gene cluster may explain the organism�s inability to convert the branched-chain amino acids to the corresponding free acids (PMID:10464218). Apparently the alpha-keto acids that are utilized for ATP generation via this cluster are not obtained by protein degradation but, rather, by degradation of membrane lipids or from the environment, as they apparently have a transport system for the branched- chain alpha-keto acids (PMID:10464218). The presence of a deaminase, encoded by the bcd gene, in the bkd-bct-bck in many Firmicutes indicates that BOTH, branched-chain amino acids and alpha-keto acids, potentially can be utilized as energy (and carbon?) sources by these organisms. This difference in captured in variant codes in this Subsystem (below)
