identifier: proteintraitsmech:SEED_SUBSYSTEM_Chlorophyll_Biosynthesis_in_plants_and_prokaryotes
label: "Chlorophyll Biosynthesis in plants and prokaryotes"
definition: >-
  Photosynthetic (PS) organisms synthesize a variety of Mg-tetrapyrrols for light harvesting and energy-generating charge separation in PS reaction centers. Cyanobacteria, algae, and plants, which evolve oxygen as byproduct of photosynthesis, typically synthesize chlorophyll a, b, or c. Anoxygenic photosynthetic bacteria synthesize a variety of related tetrapyrrols: bacteriochlorophylls (Bchls) a and b, the most common types of bacteriochlorophyll, are main antenna and reaction center pigments in most purple bacteria. Green sulfur bacteria synthesize Bchls c, d, or e. In contrast to other Chls these can occur as more than one defined compound within a given organism (so called homologous mixtures). Components of such mixtures differ by the nature of side groups at C8 and C12 and the type of the esterified alcohol at C17 (farnesol, octadec-9-en-1-ol, hexadecanol, octadecanol maybe found in addition to more common phytol and geranylgeraniol). Bchl g, the sole pigment in Heliobacteriaceae is related to Bchl b. Chlorophylls c1, c2, c3 are used as accessory light-harvesting pigments in many algae. Only biosynthesis of Chl a and b, and Bchl a were included in this SS, since very little is known to date about biosynthetic pathways of all other (bacterio)chlorophylls. ============================== This subsystem incorporates the following AraCyc pathways: chlorophyllide a biosynthesis I: <a href="http://pmn.plantcyc.org/ARA/NEW-IMAGE?type=PATHWAY&object=CHLOROPHYLL-SYN">CHLOROPHYLL-SYN</a> chlorophyll a biosynthesis I: <a href="http://pmn.plantcyc.org/ARA/NEW-IMAGE?type=PATHWAY&object=PWY-5086">PWY-5086</a> chlorophyll a biosynthesis II: <a href="http://pmn.plantcyc.org/ARA/NEW-IMAGE?type=PATHWAY&object=PWY-5064">PWY-5064</a> chlorophyll cycle: <a href="http://pmn.plantcyc.org/ARA/NEW-IMAGE?type=PATHWAY&object=PWY-5068">PWY-5068</a>
