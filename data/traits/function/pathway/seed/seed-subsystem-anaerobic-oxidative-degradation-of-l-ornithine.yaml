# subsystem_id: Anaerobic_Oxidative_Degradation_of_L-Ornithine
identifier: proteintraitsmech:SEED_SUBSYSTEM_Anaerobic_Oxidative_Degradation_of_L-Ornithine
label: "Anaerobic Oxidative Degradation of L-Ornithine"
definition: >-
  The oxidative degradation pathway from L-ornithine to acetyl-CoA and alanine (see Illustration) The catabolism of ornithine by anaerobic bacteria (accomplished through the Stickland reaction) is the main chemical reaction by which Clostridium sporogenes obtains its energy. The Stickland reaction involves one amino acid which acts as an electron donor while another acts as an electron acceptor. However, L-ornithine, as a single substrate, is converted into both an electron donor and acceptor and metabolized in a way similar to the Stickland reaction: it is oxidized to acetate, alanine, and ammonia (oxidative pathway) and reduced to 5-aminovalerate through the formation of proline (reductive pathway). The oxidative pathway starts with the conversion of L-ornithine to the D-isomer by ornithine racemase (OR) (EC 5.1.1.12). D-Ornithine is next converted to (2R,4S)-2,4-diaminopentanoate (DAP) through the action of D-ornithine aminomutase (OA) (EC 5.4.3.5). DAP then undergoes a NAD+- or NADP+-dependent oxidative deamination by DAP dehydrogenase (DAPDH) (EC 1.4.1.12) leading to 2-amino-4-ketopentanoate (AKP). This compound is metabolized by AKP thiolase (AKPT), a PLP-dependent enzyme, through a thiolytic cleavage with coenzyme A (CoA) to form acetyl-CoA and alanine.
