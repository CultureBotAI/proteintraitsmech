identifier: proteintraitsmech:SEED_SUBSYSTEM_Staphylococcal_pathogenicity_islands_SaPI
label: "Staphylococcal pathogenicity islands SaPI"
definition: >-
  Remarkably, nearly all bacterial toxins associated with specific clinical conditions (toxinoses) are encoded by mobile genetic elements. Examples are the toxins responsible for diphtheria, anthrax, tetanus, botulism, cholera, toxic shock, scarlet fever, exfoliative dermatitis, food poisoning, travelers diarrhea, shigella dysentery, necrotizing pneumonia, and others. An interesting example of this phenomenon is the family of related staphylococcal pathogenicity islands (SaPI) encoding superantigens (SAgs). These are 15�20 kb elements that occupy constant positions in the chromosomes of toxigenic strains, and are characterized by certain phage-related features, namely genes encoding integrases, helicases, and terminases, and the presence of flanking direct repeats (Novick, 2003). The majority carry endotoxin genes, but some seem to harbor other genes potentially conferring selective advantage, e.g. SaGIm encodes a homolog of a ferrichrome-binding subunit (FhuD) of an ABC transporter (Kuroda et al., 2001). The prototype element for the entire group, SaPI1 of Staphylococcus aureus RN4282, located near tyrB, encodes Toxic shock syndrome toxin (TSST-1) plus two other SAgs, SEK and SEL (Ruzin et al., 2001). Some members of the family are capable of specific interactions with certain phages leading to excision, amplification, and encapsidation. Notably, some copies are located in the proximity of prophages. With these elements being very variable, we relied mostly on their specific integration sites (att) in the S. aureus genome for classification (see Table 1 - access via green "Illustrations" tab on top of this page). For the published elements we tried to keep the names suggested in the original publication, for all others - names were projected in accordance with their att sites. Note, that if you view Subsystem spreadsheet with �show clusters� activated, the clustering of the first gene of each element (Integrase, columns 6,7) with one of the possible integration sites (columns 1-5) will reveal the element type. There can be more than one element present per genome. Also, in several strains only a degenerated integrase gene is be present at the att site (a scar from previous integration events??)
