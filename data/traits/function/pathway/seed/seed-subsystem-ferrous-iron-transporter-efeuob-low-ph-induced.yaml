identifier: proteintraitsmech:SEED_SUBSYSTEM_Ferrous_iron_transporter_EfeUOB__low-pH-induced
label: "Ferrous iron transporter EfeUOB, low-pH-induced"
definition: >-
  A novel transporter responsible for uptake of ferrous iron under conditions of iron limitation and low pH (cryptic in E. coli lab strains, but active in E.coli O157:H7). The predominant environmental form of iron is the poorly soluble ferric form (10-18 M at pH 7.0). Relatively soluble (0.1 M at pH 7.0) ferrous iron is mainly restricted to anaerobic/microaerobic niches or low pH environments. Low solubility of ferric iron leads to problems of poor bioavailability. In addition, iron can cause toxicity in the presence of oxygen due to its tendency to engage in Fenton chemistry generating highly-reactive free-radical species. Consequently, organisms have developed various strategies that allow them to acquire sufficient iron for growth whilst avoiding any deleterious effects caused by iron toxicity (e.g. siderophore-dependent transporters) In contrast to ferric iron (Fe3+), ferrous iron (Fe2+) can be directly imported using FeoAB transporters, which are thought to function under anaerobic-microaerophilic conditions. In addition, metal-type ABC transporters [e.g. SitABCD of Salmonella typhimurium] and NRAMP-like transporters [e.g. MntH of Escherichia coli] also can translocate Fe2+. Recently, a new type of ferrous-iron transporter, designated EfeUOB, has been identi&#64257;ed in E. coli. It consists of three protein components (EfeUOB) and acts mainly at low pH (Cao et al. 2007). Homologous systems are present in many other bacteria. The efeUOB operon is induced at low pH upon phosphorylation of the CpxR component of the CpxAR two-component response regulator (for copper). Expression increases in response to iron-depleted conditions in a Fe2+-Fur (Iron Uptake Regulator)-dependent manner. Also repressed by luxS. Since these regulators play roles elsewhere in the cell, and are part of other subsystems, I will not include them in this one. In some Streptococci, the efe operon is interrupted by remnants of a transposase, indicating an insertion event.
