identifier: proteintraitsmech:SEED_SUBSYSTEM_Tripartite_multidrug_efflux_systems__of_RND_type__AcrAB-TolC_and_related_transporters
label: "Tripartite multidrug efflux systems (of RND type) AcrAB-TolC and related transporters"
definition: >-
  Efflux pumps of the Resistance Nodulation Division (RND) superfamily play a major role in the intrinsic and acquired resistance of Gram-negative pathogens to antibiotics. Moreover, they are largely responsible for multi-drug resistance phenomena in these bacteria, due to the fact that they exists as tripartite complexes with TolC and membrane fusion component, so that the exported drug molecules end up in the external medium, not in the periplasm, and thus cannot easily reenter the cells except by crossing the effective OM permeability barrier AcrB has been studied most intensively as the prototype of RND pumps (PMID: 24200360). This constitutively expressed pump plays the main role in raising the MICs of most antibiotics in Escherichia coli. It has an extremely wide specificity, including practically all types of antibacterial agents (except aminoglycosides), detergents, microbicides, dyes, free fatty acids, and even simple solvents. A common property of these AcrB substrates is the presence of a hydrophobic domain (PMID:25788514) Interestingly, the reconstitution of purified AcrB into proteoliposomes indicated that properties of AcrB were optimized in evolution for the exclusion of bile salts, major toxic components in the mammalian intestine, the normal habitat for E. coli (PMID: 10377390) Closely related RND transporters (characterized in E. coli) are also encoded in this SS -- - AcrF has a wide substrate specificity, similarly to AcrB, works with AcrA and TolC (PMID:11274125); - AcrD is an aminoglycoside efflux pump, also works with AcrA and TolC (PMID:15743938); - MdtF (YhiV) is likely involved in the extrusion of toxic metabolites during nitrosative stress, such as the nitrosyl derivative of indole, produced during anaerobic growth of E. coli (PMID:21642439). Forms tripartite system with TolC and membrane fusion component MdtE (PMID:25788514 and references therein) References Clin Microbiol Rev. 2015. 28(2):337-418. PMID:25788514 The challenge of efflux-mediated antibiotic resistance in Gram-negative bacteria. Li XZ, Plesiat P, Nikaido H3. Curr Top Med Chem. 2013. 13(24):3079-100. PMID:24200360 RND efflux pumps: structural information translated into function and inhibition mechanisms. Ruggerone P, Murakami S, Pos KM, Vargiu AV1. Proc Natl Acad Sci U S A. 1999 96(13):7190-5. PMID:10377390 Bypassing the periplasm: reconstitution of the AcrAB multidrug efflux pump of Escherichia coli. Zgurskaya HI1, Nikaido H.
