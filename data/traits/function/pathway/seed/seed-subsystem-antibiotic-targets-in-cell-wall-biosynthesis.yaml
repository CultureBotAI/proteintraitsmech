# subsystem_id: Antibiotic_targets_in_cell_wall_biosynthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Antibiotic_targets_in_cell_wall_biosynthesis
label: "Antibiotic targets in cell wall biosynthesis"
definition: >-
  Subsystem under construction The bacterial cell wall and the enzymes that synthesize it are targets of glycopeptide antibiotics (vancomycins and teicoplanins) and beta-lactams (penicillins and cephalosporins). Biosynthesis of cell wall peptidoglycan requires a crosslinking of peptidyl moieties on adjacent glycan strands. The D-alanine-D-alanine transpeptidase, which catalyzes this crosslinking, is the target of beta-lactam antibiotics. Glycopeptides, in contrast, do not inhibit an enzyme, but bind directly to D-alanine-D-alanine and prevent subsequent crosslinking by the transpeptidase. Clinical resistance to vancomycin in enterococcal pathogens has been traced to altered ligases producing D-alanine-D-lactate rather than D-alanine-D-alanine (PMID: 10801495)
definition_source: BV-BRC
