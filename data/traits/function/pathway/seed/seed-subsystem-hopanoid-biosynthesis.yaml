# subsystem_id: Hopanoid_biosynthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Hopanoid_biosynthesis
label: "Hopanoid biosynthesis"
definition: >-
  Hopanoids are pentacyclic compounds based on the chemical structure of hopane. They modify plasma membrane properties, like fluidity and formation of liquid ordered domains, influencing membrane permeability (adaptation to extreme environmental conditions), rigidity and other characteristics in bacteria, similarly as sterols (like cholesterol) do in eukaryotes. Hopanoid lipids have been implicated in the construction of nitrogen fixating vesicles of actinomycetales forming nitrogen-fixing root-nodule symbioses, like Frankia. Biological nitrogen fixation in aerobic organisms requires a mechanism for excluding oxygen from the site of nitrogenase activity. The lipidic vesicle envelope is a functional analogue of the cyanobacterial heterocyst envelope, forming an external gas-diffusion barrier around the nitrogen-fixing cells. One envelope hopanoid, bacteriohopanetetrol phenylacetate monoester, is vesicle-specific. The Frankia vesicle envelope thus represents a layer specific to the locus of nitrogen fixation that is biosynthetically uniquely derived.
