identifier: proteintraitsmech:SEED_SUBSYSTEM_Efflux_ABC_transporters_BmrCD_and_LmrCD_involved_in_multidrug_resistance
label: "Efflux ABC transporters BmrCD and LmrCD involved in multidrug resistance"
definition: >-
  Efflux ABC transporter LmrCD is a major multidrug resistance transporter in Lactococcus lactis (PMID: 16879641). Importantly, LmrCD as also the main system responsible for resistance to bile acid in L. lactis (PMID: 18790870) Heterodimeric ABC transporter BmrC/BmrD (former YheI/YheH) in B. subtilis (PMID: 16879641) is homologous to the LmrC/LmrD ABC transporter of Lactococcus lactis, but not orthologous to it, however, based on the position of the two transporters' subunits on phylogenetic trees. Also, note that Streptococcus suis 98HAH33, Enterococcus casseliflavus EC10 and a few other genomes carry both of these transporters Tetracycline resistance ABC-type efflux pump TetA(46)/TetB(46) [PMID:22941900] is in fact identical to the BmrCD transporter and is annotated in this database as such. See Subsystem "Tetracycline resistance, all mechanisms" for details Quoted from PMID:25217586: "In B. subtilis 8 of 78 ABC transport systems encoded in its genome have been classified as potential MDR-like transporters (4). Among these eight is the heterodimeric ABC transporter YheI/YheH, which was renamed BmrC/BmrD (in short BmrCD) due to its homology to the LmrC/LmrD ABC transporter of Lactococcus lactis (PMID: 16879641). Torres et al. (6) used inside-out membrane vesicles to demonstrate that BmrCD can mediate efflux of several fluorescent substrates of MDR-ABC transporters, including Hoechst 33342, doxorubicin and mitoxantrone. Eleven of 46 antibiotics tested in that study were shown to significantly increase the transcription of the bmrCD operon (6). These included ribosome-targeted antibiotics, such as chloramphenicol, erythromycin and gentamycin, which was consistent with an earlier study on antibiotic-induced gene expression in B. subtilis"
