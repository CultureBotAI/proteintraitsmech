identifier: proteintraitsmech:SEED_SUBSYSTEM_Peptidyl-prolyl_cis-trans_isomerase_cluster_in_Halobacteria
label: "Peptidyl-prolyl cis-trans isomerase cluster in Halobacteria"
definition: >-
  Peptidylprolyl isomerases accelerate protein folding by catalysing the cis-trans isomerisation of proline imidic peptide bonds in oligopeptides. Proline is unique among the natural amino acids in having a relatively small difference in free energy between the cis configuration of its peptide bond and the more common trans form. Unlike regular peptide bonds, the X-prolyl peptide bond will not adopt the intended conformation spontaneously, thus, the process of cis-trans isomerization can be the rate-limiting step in the process of protein folding.
