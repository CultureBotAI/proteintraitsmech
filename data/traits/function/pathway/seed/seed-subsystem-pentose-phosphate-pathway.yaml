# subsystem_id: Pentose_phosphate_pathway
identifier: proteintraitsmech:SEED_SUBSYSTEM_Pentose_phosphate_pathway
label: "Pentose phosphate pathway"
definition: >-
  The non-oxidative branch of Pentose Phosphate Pathway (PPP), leading to formation of pentose phosphates (precursors to ribose and deoxyribose) and erythrose-4-phosphate (precursor to aromatic amino acids) is essential and ubiquitously present in bacteria. The oxidative branch, on the other hand, can be bypassed by utilizing other entrances into non-oxidative branch: from phosphoglyceraldehyde and fructose-6-P (via transaldolase) (variant code 2), from D-gluconate (via gluconate kinase EC:2.7.1.12) (variant code 4), etc
