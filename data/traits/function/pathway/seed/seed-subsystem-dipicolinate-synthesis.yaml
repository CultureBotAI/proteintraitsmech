# subsystem_id: Dipicolinate_Synthesis
identifier: proteintraitsmech:SEED_SUBSYSTEM_Dipicolinate_Synthesis
label: "Dipicolinate Synthesis"
definition: >-
  Synthesis of dipicolinic acid (DPA), a DNA protectant in Gram positive spores. Pyridine-2,6-dicarboxylic acid (DPA) can comprise up to 20% of the spore's dry weight. It is present as a 1:1 chelate with Ca. It contributes to spore DNA resistance to wet and dry heat, dessication and hydrogen peroxide. However, it sensitizes spore DNA to UV irradiation. The protection to UV irradiation is accomplished by the SASP's (small acid-soluble spore proteins), which are in a SS of their own. References: Daniel RA1, Errington J. 1993 Cloning, DNA sequence, functional analysis and transcriptional regulation of the genes encoding dipicolinic acid synthetase required for sporulation in Bacillus subtilis. J Mol Biol. 1993 Jul 20;232(2):468-83. PMID: 8345520
