identifier: proteintraitsmech:SEED_SUBSYSTEM_Cholera_toxin
label: "Cholera toxin"
definition: >-
  Cholera toxin is an AB(5) hexameric protein responsible for the symptoms produced by Vibrio cholerae infection. In the first step of cell intoxication, the B-pentamer of the toxin, directs the enzymatic A subunit to its target by binding the GM1 gangliosides exposed on the luminal surface of intestinal epithelial cells.
