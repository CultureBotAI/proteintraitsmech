identifier: proteintraitsmech:SEED_SUBSYSTEM_Lasso_peptide_maturation_cluster
label: "Lasso peptide maturation cluster"
definition: >-
  Lasso peptides are a class of ribosomally synthesized posttranslationally modified natural products found in bacteria. Their defining structural feature is a macrolactam ring that is threaded by the C-terminal tail and held in position by sterically demanding residues above and below the ring, resulting in a unique topology that is reminiscent of a lariat knot (open Illustrations tab above to view Fig.1 from PMID:22949633). The biosynthesis of lasso peptides is directed by a cluster of three genes (McjABC), encoding a precursor peptide A, a cysteine protease B, and an ATP-dependent lactam synthetase C. Gene clusters might contain additional genes, e.g. efflux pump, regulators, etc (PMID: 26079760) Currently known lasso peptides seem to possess a wide variety of biological activities. In some case antimicrobial activity was detected, and specific molecular targets were identified (reviewed in PMID: 26079760), including Gram-negative RNA polymerase (RNAP) for MccJ25 and capistruin (PMID: 21396375), or hsp100 family chaperone ClpC1 from Mycobacterium tuberculosis for lassomycin (PMID: 24684906). However, the majority of recently isolated lasso peptides do not exhibit any observable inhibitory capacities, and their native function are still unknown These remarkable molecules are a focus of intense research, because a number of lasso peptides demonstrated pharmacologically relevant activities, including inhibition of bacterial growth, receptor antagonism, and enzyme inhibition (PMID: 22949633). However, their true native function and the exact enzymatic mechanism of their maturation still remain elusive (PMID: 26079760)
