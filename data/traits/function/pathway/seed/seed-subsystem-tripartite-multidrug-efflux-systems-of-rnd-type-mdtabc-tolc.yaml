identifier: proteintraitsmech:SEED_SUBSYSTEM_Tripartite_multidrug_efflux_systems__of_RND_type__MdtABC-TolC
label: "Tripartite multidrug efflux systems (of RND type) MdtABC-TolC"
definition: >-
  The MdtABC-TolC efflux pump is unusual among the tripartite drug efflux transporters of the RND type because it contains two different inner membrane transporter proteins, MdtB and MdtC (not one), which appear to function only as a B2C heterotrimer (PMID: 20038594), whereas typical RND transporters are homotrimers. When overexpressed, it pumps out norfloxacin, novobiocin, cloxacillin, and deoxycholate (PMID: 25788514). MdtABC also confers resistance against bile salt derivatives and sodium dodecyl sulfate (SDS). Site-directed fluorescein maleimide modification studies suggest that MdtC binds the substrate, but MdtB probably functions in other ways, such as initiating the conformational alteration for drug efflux (PMID: 22559837) The outer membrane (OM) channel of this tripartite pump can vary: in most genomes a specific OM channel is encoded in the same operon with MdtABC (e.g. in Pseudomonas aeruginosa PAO1), while in E. coli, for example, TolC (encoded elsewhere) performs this role. Partial homotrimer assembly MdtAC was shown to confer bile salt, but not novobiocin, resistance (PMID: 12107133) suggesting that the MdtC homomultimeric RND exporter may represent an evolutionally earlier version of the exporter which, with the addition of MdtB gained an increased range of resistance. However, encoding this Subsystem across multiple microbial taxa revealed a well formed branch of MdtB-like proteins that invariably occur in a putative operon: MdtA+MdtB-like in the absence of an MdtC ortholog in its vicinity (e.g. fig|224911.1.peg.277 in Bradyrhizobium japonicum) or anywhere in the genome (e.g. fig|639283.3.peg.3763 in Starkeya novella) (follow the links to alignments and trees from the corresponding PEG pages to view). This variant is especially common in genomes of Alphaproteobacteria and (less) Betaproteobacteria. We hypothesize that putative homotrimer �MdtB-like� RND exporter could, in fact, be the evolutionally earlier version that gave rise to the MdtBC heterotrimer via gene duplication event.
