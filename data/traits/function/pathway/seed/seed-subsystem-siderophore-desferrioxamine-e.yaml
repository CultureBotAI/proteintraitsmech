label: "Siderophore Desferrioxamine E"
definition: >-
  Two main pathways for siderophore biosynthesis exist in microbes. One pathway involves nonribosomal peptide synthetase (NRPS) multienzymes while the other is NRPS-independent.Desferrioxamines are a structurally related family of tris-hydroxamate siderophores that form strong hexadentate complexes with ferric iron and are produced NRPS-independently. Desferrioxamine E as the major desferrioxamine siderophore produced by Streptomyces coelicolor M145.
