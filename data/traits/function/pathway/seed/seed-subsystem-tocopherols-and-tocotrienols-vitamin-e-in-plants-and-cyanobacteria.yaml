identifier: proteintraitsmech:SEED_SUBSYSTEM_Tocopherols_and_tocotrienols__vitamin_E__in_plants_and_cyanobacteria
label: "Tocopherols and tocotrienols (vitamin E) in plants and cyanobacteria"
definition: >-
  Tocochromanols are a group of amphipathic, lipid-soluble organic molecules composed of a polar moiety derived from tyrosine and a hydrophobic polyprenyl side chain originating from the isoprenoid pathway. Tocochromanols with a phytyl-derived side chain are termed tocopherols whereas those with a geranylgeranyl-derived side chain are termed tocotrienols. The four different forms of tocopherols and tocotrienols (alpha, beta, gamma, delta) differ by the degree of methylation of the chromanol ring. Vitamin E is a generic term describing this group of eight lipophilic compounds in the tocopherol and tocotrienol families. They are synthesized exclusively by photosynthetic organisms and are essential dietary components for humans and other mammals. All tocochromanols are potent lipid-soluble antioxidants, which protects polyunsaturated fatty acids in membranes against degradation by reactive oxygen species such as ozone, singlet oxygen, peroxides and hyperoxides (PMID:20036132; 12949564) In plants, biosynthesis of tocopherols and tocotrienols is localized to the plastids of seeds and the chloroplasts of leaves. In seeds of most monocot plants (including cereals such as rice and wheat) the primary form of vitamin E is tocotrienols. Homogentisate geranylgeranyl-transferase (HGGT) specific for tocotrienol synthesis was characterized from barley, rice and wheat (PMID:12897790, 12949564) Genes of all the pathway enzymes have been cloned from Arabidopsis and Synechocystis sp. PCC 6803. Tocopherols are synthesized by a pathway that is conserved between cyanobacteria and plants as follows (shown on the Diagram and Illustration) - The conversion of p-hydroxyphenylpyruvate (I) to homogentisic acid (II) by HPP dioxygenase (HPPD) yields the aromatic head group for both tocopherol and plastoquinone biosynthesis in plants. . The committed step in tocopherol synthesis is the condensation of the homogentisic acid and phytyldiphosphate by homogentisate phytyltransferase (HPT) to produce the first tocopherol intermediate, 2-methyl-6-phytylbenzoquinone (IV). Biochemical analyses have shown that the steps leading from MPBQ to {alpha}-tocopherol are as follows: -ring methylation of MPBQ by 2-methyl-6-phytyl-1,4-benzoquinone/2-methyl-6-solanyl-1,4-benzoquinone methyltransferase (MPBQ/MSBQ MT) to yield 2,3-dimethyl-5-phytylbenzoquinone (DMPBQ); - ring cyclization of DMPBQ by tocopherol cyclase (TC) to yield {gamma}-tocopherol; - a second ring methylation by {gamma}-tocopherol methyltransferase to yield {alpha}-tocopherol ============================== This subsystem incorporates the following AraCyc pathway: vitamin E biosynthesis: <a href="http://pmn.plantcyc.org/PLANT/new-image?type=PATHWAY&object=PWY-1422&detail-level=2&ENZORG=ORG-5993">PWY-1422</a> ==============================
