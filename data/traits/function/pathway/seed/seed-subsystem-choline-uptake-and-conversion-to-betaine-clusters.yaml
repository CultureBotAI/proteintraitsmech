identifier: proteintraitsmech:SEED_SUBSYSTEM_Choline_uptake_and_conversion_to_betaine_clusters
label: "Choline uptake and conversion to betaine clusters"
definition: >-
  Choline and glycine betaine (betaine) can be utilized either as carbon and nitrogen sources or as osmoprotectants. The choline ester choline-O-sulfate can be accumulated by some bacteria as osmoprotectant during osmotic stress (E.coli), others use choline sulfatase to degrade choline-O-sulfate to choline, which is then converted to glycine betaine and catabolized further into ammonia and pyruvate (Synrhizobium meliloti). Choline-O-sulfateas can be the sole carbon, nitrogen and sulfur source for their growth.
