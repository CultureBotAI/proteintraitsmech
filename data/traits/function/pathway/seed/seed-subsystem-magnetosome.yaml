identifier: proteintraitsmech:SEED_SUBSYSTEM_Magnetosome
label: Magnetosome
definition: >-
  Bacterial magnetosomes are membrane-enveloped, nanometer-sized crystals of magnetite (Fe3O4), which serve for magnetotactic navigation. Four major operons could be associated with magnetite biomineralization, The deletion of the mamAB operon results in the complete loss of magnetic particles, deletion of the conserved mms6, mamGFDC, and mamXY operons leads to severe defects in morphology, size and organization of magnetite crystals. The later seem to be responsible for the formation and content of vesicles formed of the magnetosome membrane (MM). The small hydrophobic MamGFDC proteins account for nearly 35% of all proteins associated with the MM.
