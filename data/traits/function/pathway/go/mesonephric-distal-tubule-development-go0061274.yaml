identifier: GO:0061274
label: "mesonephric distal tubule development"
definition: >-
  The process whose specific outcome is the progression of the mesonephric distal tubule over time, from its formation to the mature structure. The mesonephric distal tubule is a mesonephric nephron tubule that begins at the terminal segment of the proximal tubule and ends at the mesonephric connecting tubule.
