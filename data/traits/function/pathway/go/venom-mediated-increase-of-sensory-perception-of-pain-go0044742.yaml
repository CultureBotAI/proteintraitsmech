identifier: GO:0044742
label: "venom-mediated increase of sensory perception of pain"
definition: >-
  A process in which an organism initiates, promotes, or enhances sensory perception of pain in another organism via the action of a venom. Can manifest as allodynia, a condition that causes pain when a stimulus that normally wouldn't cause pain, or hyperalgesia, an increased sensitivity to feeling pain and an extreme response to pain.
