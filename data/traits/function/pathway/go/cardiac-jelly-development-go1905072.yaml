identifier: GO:1905072
label: "cardiac jelly development"
definition: >-
  The process whose specific outcome is the progression of cardiac jelly over time, from its formation to the mature structure. The cardiac jelly is an acellular gelatinous matrix secreted by the myocardium and plays a central role in the septation of the heart.
