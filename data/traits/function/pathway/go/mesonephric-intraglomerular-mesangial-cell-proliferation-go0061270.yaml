identifier: GO:0061270
label: "mesonephric intraglomerular mesangial cell proliferation"
definition: >-
  The multiplication or reproduction of intraglomerular glomerular mesangium cells in the mesonephros by cell division, resulting in the expansion of their population. Intraglomerular mesangial cells are specialized pericytes located among the glomerular capillaries within a renal corpuscle of a kidney. They are required for filtration, structural support and phagocytosis.
