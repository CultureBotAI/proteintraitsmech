identifier: GO:0072313
label: "metanephric glomerular epithelial cell development"
definition: >-
  The process whose specific outcome is the progression of a metanephric glomerular epithelial cell over time, from its formation to the mature structure. Metanephric glomerular epithelial cells are specialized epithelial cells that form part of the metanephric glomerulus; there are two types, metanephric glomerular parietal epithelial cells and metanephric glomerular visceral epithelial cells.
