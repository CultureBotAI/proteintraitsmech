identifier: GO:0010919
label: "regulation of inositol phosphate biosynthetic process"
definition: >-
  Any process that modulates the rate, frequency or extent of inositol phosphate biosynthesis. Inositol phosphate biosynthetic processes are the chemical reactions and pathways resulting in the formation of an inositol phosphate, 1,2,3,4,5,6-cyclohexanehexol, with one or more phosphate groups attached.
