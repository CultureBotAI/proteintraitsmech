identifier: GO:0007189
label: "adenylate cyclase-activating G protein-coupled receptor signaling pathway"
definition: >-
  A G protein-coupled receptor signaling pathway in which the signal is transmitted via the activation of adenylyl cyclase activity which results in an increase in the intracellular concentration of cyclic AMP (cAMP). This pathway is negatively regulated by phosphodiesterase, which cleaves cAMP and terminates the signaling.
