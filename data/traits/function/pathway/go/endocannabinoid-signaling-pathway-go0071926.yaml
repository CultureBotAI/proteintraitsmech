identifier: GO:0071926
label: "endocannabinoid signaling pathway"
definition: >-
  The series of molecular signals generated as a consequence of an endocannabinoid binding to a cell surface receptor. The pathway proceeds with the receptor transmitting the signal to a heterotrimeric G-protein complex and ends with regulation of a downstream cellular process, e.g. transcription. Endocannabinoids are small molecules derived from arachidonic acid, anandamide (arachidonoylethanolamide) and 2-arachidonoylglycerol.
