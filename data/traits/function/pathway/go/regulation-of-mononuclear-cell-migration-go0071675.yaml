identifier: GO:0071675
label: "regulation of mononuclear cell migration"
definition: >-
  Any process that modulates the rate, frequency or extent of mononuclear cell migration. Mononuclear cell migration is the movement of a mononuclear cell within or between different tissues and organs of the body.
