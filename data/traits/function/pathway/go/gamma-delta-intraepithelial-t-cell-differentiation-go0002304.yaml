identifier: GO:0002304
label: "gamma-delta intraepithelial T cell differentiation"
definition: >-
  The process in which a precursor cell type acquires the specialized features of a gamma-delta intraepithelial T cell. Intraepithelial T cells are found among epithelial cells in mucosal areas and have distinct phenotypes and developmental pathways.
