label: "endoplasmic reticulum cisternal network maintenance"
definition: >-
  The organization process that preserves the endoplasmic reticulum (ER) cisternal network in a stable functional or structural state. The ER cisternal network is the ER part that comprises the membranes with low curvature in cross-section.
