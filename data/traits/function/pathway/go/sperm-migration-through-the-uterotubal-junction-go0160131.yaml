identifier: GO:0160131
label: "sperm migration through the uterotubal junction"
definition: >-
  The controlled self-propelled movement of a sperm cell from the uterus through the uterotubal junction (UTJ) into the oviduct, where interaction between the sperm and the UTJ acts as a major selective barrier for sperm, allowing only living, motile, uncapacitated, morphologically normal sperm with intact acrosomes to pass from the uterus into the oviduct.
