identifier: GO:0021925
label: "cerebellar Purkinje cell precursor proliferation"
definition: >-
  The multiplication or reproduction of neuroblasts that will give rise to Purkinje cells. A Purkinje cell is an inhibitory GABAergic neuron found in the cerebellar cortex that projects to the deep cerebellar nuclei and brain stem.
