identifier: GO:0071718
label: "sodium-independent icosanoid transport"
definition: >-
  The directed, sodium-independent, movement of icosanoids into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore. Icosanoids are unsaturated C20 fatty acids and skeletally related compounds.
