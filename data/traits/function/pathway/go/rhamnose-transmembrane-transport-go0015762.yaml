identifier: GO:0015762
label: "rhamnose transmembrane transport"
definition: >-
  The process in which rhamnose is transported across a lipid bilayer, from one side of a membrane to the other. Rhamnose occurs commonly as a compound of plant glycosides, in polysaccharides of gums and mucilages, and in bacterial polysaccharides. It is also a component of some plant cell wall polysaccharides and frequently acts as the sugar components of flavonoids.
