identifier: GO:0075514
label: "endosome lysis involved in viral entry into host cell"
definition: >-
  Viral-induced lysis of the endosome involved in uptake of a virus into a host cell. Occurs after internalization of the virus through the endosomal pathway, and results in release of the viral contents from the endosome into the host cell cytoplasm.
