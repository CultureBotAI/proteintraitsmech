identifier: GO:0052098
label: "formation by host of specialized structure for nutrient acquisition from symbiont"
definition: >-
  The assembly by an organism of a cellular component or anatomical structure for the purpose of obtaining nutrients from a symbiont organism. The symbiont is defined as the smaller of the organisms involved in a symbiotic interaction.
