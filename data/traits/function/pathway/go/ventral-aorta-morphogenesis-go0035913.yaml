identifier: GO:0035913
label: "ventral aorta morphogenesis"
definition: >-
  The process in which the anatomical structures of the ventral aorta are generated and organized. The ventral aorta is a blood vessel in a single-pass circulatory system that carries de-oxygenated blood from the heart to the gills. In a single-pass circulatory system blood passes once through the heart to supply the body once.
