identifier: GO:0075317
label: "ascus development"
definition: >-
  The process that leads to the development of ascus, a sac-like structure produced by fungi of the phylum Ascomycota (sac fungi) in which sexually produced spores (ascospores), usually four or eight in number, are formed.
