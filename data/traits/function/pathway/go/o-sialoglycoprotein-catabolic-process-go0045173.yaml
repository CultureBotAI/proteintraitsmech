identifier: GO:0045173
label: "O-sialoglycoprotein catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of O-sialoglycoproteins, glycoproteins which contain sialic acid as one of their carbohydrates. They are often found on or in the cell or tissue membranes and participate in a variety of biological activities.
