identifier: GO:0075282
label: "negative regulation of uredinium development"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of uredinium development, a process that leads to the formation of a reddish, pustule-like structure formed by a rust fungus and consisting of uredospores.
