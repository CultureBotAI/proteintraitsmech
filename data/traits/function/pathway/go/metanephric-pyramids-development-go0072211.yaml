identifier: GO:0072211
label: "metanephric pyramids development"
definition: >-
  The process whose specific outcome is the progression of the metanephric pyramids over time, from their formation to the mature structures. Metanephric pyramids are the conical masses that constitute the renal medulla in a metanephros; they contain the loops of Henle and the medullary collecting ducts.
