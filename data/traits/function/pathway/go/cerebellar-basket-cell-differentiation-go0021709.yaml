identifier: GO:0021709
label: "cerebellar basket cell differentiation"
definition: >-
  The process in which neuroblasts acquire specialized structural and/or functional features that characterize the mature cerebellar basket cell. Differentiation includes the processes involved in commitment of a neuroblast to a cerebellar basket cell fate. A cerebellar basket cell is an inhibitory GABAergic interneuron found in the cerebellar cortex.
