identifier: GO:0075186
label: "negative regulation of infection cushion formation"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of symbiont infection cushion formation on or near its host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
