identifier: GO:0035132
label: "post-embryonic medial fin morphogenesis"
definition: >-
  The process, occurring after embryonic development, by which the anatomical structures of the medial fin are generated and organized. Medial fins are unpaired fins of fish, usually located dorsomedially or ventromedially and primarily used for stability while swimming.
