identifier: GO:0000482
label: "maturation of 5S rRNA from tetracistronic rRNA transcript (SSU-rRNA, 5.8S rRNA, LSU-rRNA)"
definition: >-
  Any process involved in the maturation of a precursor 5S ribosomal RNA (rRNA) molecule into a mature 5S rRNA molecule from the pre-rRNA molecule originally produced as a tetracistronic rRNA transcript that contains the Small Subunit (SSU) rRNA, Large Subunit (LSU) the 4.5S rRNA, and the 5S rRNA in that order from 5' to 3' along the primary transcript.
definition_source: "GO (2026-06-15)"
trait_axis: FUNCTION
trait_category: FUNC_PATHWAY
term_kind: CLASS
mapping_status: SEEDED
