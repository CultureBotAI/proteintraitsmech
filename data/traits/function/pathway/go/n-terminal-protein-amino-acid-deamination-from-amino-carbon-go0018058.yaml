identifier: GO:0018058
label: "N-terminal protein amino acid deamination, from amino carbon"
definition: >-
  The oxidative deamination of the alpha carbon of an encoded N-terminal amino acid, to form pyruvic acid retaining an amide bond between its 1-carboxyl group and the adjacent residue. The pyruvate 2-oxo group may become an enzyme active site, or it may be reduced to an alcohol.
