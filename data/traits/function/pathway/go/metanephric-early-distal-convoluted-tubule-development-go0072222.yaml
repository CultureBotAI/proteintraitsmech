identifier: GO:0072222
label: "metanephric early distal convoluted tubule development"
definition: >-
  The process whose specific outcome is the progression of the metanephric early distal convoluted tubule over time, from its formation to the mature structure. The metanephric early distal convoluted tubule contains metanephric DCT cells and is vasopressin-insensitive.
