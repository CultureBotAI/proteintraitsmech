identifier: GO:0036118
label: "hyaluranon cable assembly"
definition: >-
  A process that results in the aggregation, arrangement and bonding together of a hyaluranon cable, a cable structure, surrounding some cell types (e.g. proximal or bronchial tubular epithelial cells), and composed of hyaluranon (HA), a ubiquitous connective tissue glycosaminoglycan.
