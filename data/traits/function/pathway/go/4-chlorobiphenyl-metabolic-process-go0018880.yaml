identifier: GO:0018880
label: "4-chlorobiphenyl metabolic process"
definition: >-
  The chemical reactions and pathways involving 4-chlorobiphenyl, a member of the polychlorinated biphenyl (PCB) group of compounds, a very stable group of synthetic organic compounds composed of a biphenyl nucleus with 1-10 chlorine substituents. 4-chlorobiphenyl has been used as a model substrate to investigate PCB degradation.
