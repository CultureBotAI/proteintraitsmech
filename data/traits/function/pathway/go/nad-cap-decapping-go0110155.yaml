identifier: GO:0110155
label: "NAD-cap decapping"
definition: >-
  Cleavage of the 5'-NAD-cap of an RNA. The NAD-cap is present at the 5'-end of some RNAs in both bacetria and eukaryotes. While it promotes RNA stability in bacteria, it promotes RNA decay in eukaryotes.
