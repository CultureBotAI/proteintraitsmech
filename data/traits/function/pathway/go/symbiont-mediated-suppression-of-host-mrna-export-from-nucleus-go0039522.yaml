identifier: GO:0039522
label: "symbiont-mediated suppression of host mRNA export from nucleus"
definition: >-
  A process in which a symbiont inhibits or disrupts the normal movement of mRNA from the nucleus to the cytoplasm of the host cell, leading to shutoff of host protein expression. The host is defined as the larger of the organisms involved in a symbiotic interaction.
