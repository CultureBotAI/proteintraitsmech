identifier: GO:0016056
label: "G protein-coupled opsin signaling pathway"
definition: >-
  A G protein-coupled receptor signaling pathway that starts with an opsin being activated by a photon, and ending with the light signal being trasmitted through the synapses. The signal can be transmitted via different Galpha subunits types: Go, Gs, Gq, and Gt.
