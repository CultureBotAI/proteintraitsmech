identifier: GO:0006124
label: "ferredoxin metabolic process"
definition: >-
  The chemical reactions and pathways involving ferredoxin, any simple, nonenzymatic iron-sulfur protein that is characterized by having equal numbers of atoms of iron and labile sulfur. Iron and sulfur atoms are present in one or two clusters of two or four atoms of each.
