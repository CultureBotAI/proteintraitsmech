identifier: GO:0075246
label: "negative regulation of oospore formation"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of oospore formation, a process in which male and female gametangia develop and fuse to form a thick-walled resting spore of oomycetes.
