identifier: GO:0075520
label: "actin-dependent intracellular transport of virus"
definition: >-
  The directed movement of a virus, or part of a virus, within the host cell cytoplasm via the host's actin filaments. Actin-dependent transport is induced by viral proteins that interact with actin and/or host cell motor proteins like myosins or that promotes actin polymerization/depolymerization reactions.
