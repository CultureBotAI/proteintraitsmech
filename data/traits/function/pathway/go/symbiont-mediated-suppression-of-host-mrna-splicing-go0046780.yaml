identifier: GO:0046780
label: "symbiont-mediated suppression of host mRNA splicing"
definition: >-
  A process in which a symbiont inhibits or disrupts the splicing of host mRNA, thus interfering with normal host protein production. The host is defined as the larger of the organisms involved in a symbiotic interaction.
