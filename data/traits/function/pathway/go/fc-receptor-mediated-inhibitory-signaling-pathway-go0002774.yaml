identifier: GO:0002774
label: "Fc receptor mediated inhibitory signaling pathway"
definition: >-
  The series of molecular signals generated as a consequence of the binding of the Fc portion of an immunoglobulin by an Fc receptor capable of inhibiting an immune effector process contributing to an immune response. The Fc portion of an immunoglobulin is its C-terminal constant region.
