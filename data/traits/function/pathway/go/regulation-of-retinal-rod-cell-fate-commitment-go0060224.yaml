identifier: GO:0060224
label: "regulation of retinal rod cell fate commitment"
definition: >-
  Any process that modulates the process in which the developmental fate of a cell becomes restricted such that it will develop into a retinal rod cell. A retinal rod cell is one of the two photoreceptor subtypes in a camera-type eye.
