identifier: GO:0075203
label: "positive regulation of penetration hypha formation"
definition: >-
  Any process that activates, maintains or increases the frequency, rate or extent of symbiont penetration hypha formation for entry into host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
