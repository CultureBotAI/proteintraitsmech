label: "dense core granule biogenesis"
definition: >-
  A cellular process that results in the biosynthesis of constituent macromolecules, assembly, and arrangement of constituent parts of a dense core granule. Includes biosynthesis of constituent macromolecules, and those macromolecular modifications that are involved in synthesis or assembly of the dense core granule.
