identifier: GO:0060508
label: "lung basal cell differentiation"
definition: >-
  The process in which relatively unspecialized cells, e.g. embryonic or regenerative cells, acquire specialized structural and/or functional features of a mature basal cell found in the lung. Differentiation includes the processes involved in commitment of a cell to a specific fate. A basal cell is an epithelial stem cell.
