identifier: GO:0016266
label: "protein O-linked glycosylation via N-acetylgalactosamine"
definition: >-
  A glycoprotein biosynthetic process starting with the covalent linkage of an N-acetyl-galactosamine via an alpha-glycosidic bond to the oxygen atom of a serine or threonine side chain in a protein, which can be further elongated with the sequential addition of sugar units resulting in the formation of a protein O-linked glycan.
