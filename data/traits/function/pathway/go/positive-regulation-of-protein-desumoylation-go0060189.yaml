identifier: GO:0060189
label: "positive regulation of protein desumoylation"
definition: >-
  Any process that increases the frequency, rate or extent of protein desumoylation. Protein desumoylation is the process in which a SUMO protein (small ubiquitin-related modifier) is cleaved from its target protein.
