identifier: GO:0006893
label: "Golgi to plasma membrane transport"
definition: >-
  The directed movement of substances from the Golgi to the plasma membrane in transport vesicles that move from the trans-Golgi network to the plasma membrane. Golgi to plasma membrane transport precedes exocytosis.
