identifier: GO:0072027
label: "connecting tubule development"
definition: >-
  The process whose specific outcome is the progression of the connecting tubule over time, from its formation to the mature structure. The connecting tubule is a tubular segment of the nephron; it connects the distal convoluted tubule to the collecting duct.
