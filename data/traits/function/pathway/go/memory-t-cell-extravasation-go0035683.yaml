identifier: GO:0035683
label: "memory T cell extravasation"
definition: >-
  The migration of a memory T cell from the blood vessels into the surrounding tissue. A memory T cell is a distinctly differentiated long-lived T cell that has the phenotype CD45RO-positive and CD127-positive.
