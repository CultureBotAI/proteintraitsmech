identifier: GO:0000483
label: "endonucleolytic cleavage of tetracistronic rRNA transcript (SSU-rRNA, 5.8S rRNA, 2S rRNA, LSU-rRNA)"
definition: >-
  Endonucleolytic cleavage of a pre-rRNA molecule originally produced as a tetracistronic rRNA transcript that contains the Small SubUnit (SSU) rRNA, the 5.8S rRNA, 2S rRNA, and the Large SubUnit (LSU) rRNA, in that order, from 5' to 3' along the primary transcript. Primary ribosomal RNA transcripts with four genes, in this order, are produced in the nuclei of D. melanogaster as well as in those of other dipteran species.
