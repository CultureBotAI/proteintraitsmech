identifier: GO:0070398
label: "wall teichoic acid biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of wall teichoic acid, which is a major component of the cell wall of Gram-positive bacteria and typically consists of a polymer of glycerol-phosphate or ribitol-phosphate to which are attached glycosyl and D-alanyl ester residues and which is covalently linked to peptidoglycan.
