identifier: GO:0051598
label: "meiotic recombination checkpoint signaling"
definition: >-
  A signaling process that contributes to a meiotic recombination checkpoint, that acts during late prophase I (pachytene) and prevents segregation of homologous chromosomes until recombination is completed, ensuring proper distribution of the genetic material to the gametes.
