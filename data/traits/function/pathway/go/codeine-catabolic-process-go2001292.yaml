identifier: GO:2001292
label: "codeine catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of codeine, an alkaloid found in the opium poppy, Papaver somniferum var. album. Codeine has analgesic, anti-tussive and anti-diarrhoeal properties.
