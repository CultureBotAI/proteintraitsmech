identifier: GO:0039722
label: "symbiont-mediated suppression of host toll-like receptor signaling pathway"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupts a toll-like receptor signaling pathway in the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
