identifier: GO:0061258
label: "mesonephric podocyte cell fate commitment"
definition: >-
  The process in which the developmental fate of a cell becomes restricted such that it will develop into a mesonephric glomerular visceral epithelial cell. A mesonephric glomerular visceral epithelial cell is a specialized epithelial cell that contains 'feet' that interdigitate with the 'feet' of other glomerular epithelial cells in the mesonephros.
