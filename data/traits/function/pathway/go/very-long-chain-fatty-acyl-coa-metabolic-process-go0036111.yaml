identifier: GO:0036111
label: "very long-chain fatty-acyl-CoA metabolic process"
definition: >-
  The chemical reactions and pathways involving very long-chain fatty-acyl-CoAs, any derivative of coenzyme A in which the sulfhydryl group is in a thioester linkage with a very long-chain fatty-acyl group. A very long-chain fatty acid has an aliphatic tail containing more than 22 carbons.
