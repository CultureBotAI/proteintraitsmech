identifier: GO:0075199
label: "positive regulation of symbiont haustorium neck formation for entry into host"
definition: >-
  Any process that activates, maintains or increases the frequency, rate or extent of symbiont haustorium neck formation for entry into host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
