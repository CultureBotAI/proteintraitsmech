identifier: GO:0031619
label: "homologous chromosome orientation in meiotic metaphase I"
definition: >-
  The cell cycle process in which the sister centromeres and kinetochores of one chromosome are fused and orientated so the chromosomes attach to microtubules that emanate from the same spindle pole. This process ensures that homologous l chromosomes are segregated at anaphase of meiosis I.
