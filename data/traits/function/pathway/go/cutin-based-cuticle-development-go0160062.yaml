identifier: GO:0160062
label: "cutin-based cuticle development"
definition: >-
  The process whose specific outcome is the progression of the cutin-based cuticle over time, from its formation to the mature structure. Cutin-based cuticle is an extracellular structure composed of a covalently linked macromolecular scaffold of cutin and a variety of organic solvent-soluble lipids that are collectively termed waxes. Such structures are found on the external face of polysaccharide cell walls in land plants.
