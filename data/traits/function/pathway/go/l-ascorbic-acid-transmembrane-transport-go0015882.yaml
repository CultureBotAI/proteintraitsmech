identifier: GO:0015882
label: "L-ascorbic acid transmembrane transport"
definition: >-
  The process in which L-ascorbic acid is transported across a lipid bilayer, from one side of a membrane to the other. L-ascorbate, (2R)-2-[(1S)-1,2-dihydroxyethyl]-4-hydroxy-5-oxo-2,5-dihydrofuran-3-olate, is vitamin C and has co-factor and anti-oxidant activities in many species.
