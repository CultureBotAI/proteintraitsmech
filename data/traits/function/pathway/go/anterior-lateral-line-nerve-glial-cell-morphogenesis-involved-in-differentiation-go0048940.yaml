identifier: GO:0048940
label: "anterior lateral line nerve glial cell morphogenesis involved in differentiation"
definition: >-
  The process in which the structures of a glial cell in the anterior lateral line nerve are generated and organized. This process occurs while the initially relatively unspecialized cell is acquiring the specialized features of a glial cell in the anterior lateral line nerve.
