identifier: GO:0140279
label: "regulation of mitotic division septum assembly"
definition: >-
  Any process that modulates the frequency, rate or extent of mitotic division septum formation. Division septum formation is the assembly and arrangement of a septum that spans the plasma membrane interface between progeny cells following cytokinesis.
