identifier: GO:0042949
label: "arbutin transport"
definition: >-
  The directed movement of arbutin, a glycoside found in the bearberry and related plants which has been used to treat urinary-tract diseases, into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore.
