identifier: GO:0021595
label: "rhombomere structural organization"
definition: >-
  The process that contributes to the act of creating the structural organization of the rhombomere structure. Rhombomeres are transverse segments of the developing rhombencephalon. Rhombomeres are lineage restricted, express different genes from one another, and adopt different developmental fates.
