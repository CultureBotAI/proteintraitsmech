identifier: GO:0097646
label: "calcitonin family receptor signaling pathway"
definition: >-
  A G protein-coupled receptor signaling pathway initiated by an extracellular member of the calcitonin family (e.g. adrenomedullin, adrenomedullin 2 (intermedin), amylin, calcitonin and calcitonin gene-related peptides (CGRPs)) binding to its receptor on the surface of a target cell, and ending with the regulation of a downstream cellular process.
