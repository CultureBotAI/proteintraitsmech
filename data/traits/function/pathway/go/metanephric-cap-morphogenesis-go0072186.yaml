identifier: GO:0072186
label: "metanephric cap morphogenesis"
definition: >-
  The process in which the anatomical structures of the metanephric cap are generated and organized. The metanephric cap is formed by the condensation of metanephric mesenchymal cells surrounding the ureteric bud tip.
