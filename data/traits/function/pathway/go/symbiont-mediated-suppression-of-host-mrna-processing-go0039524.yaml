identifier: GO:0039524
label: "symbiont-mediated suppression of host mRNA processing"
definition: >-
  A process in which a symbiont inhibits or disrupts mRNA processing in its host. mRNA processing is the conversion of a primary mRNA transcript into one or more mature mRNA(s) prior to translation into polypeptide. The host is defined as the larger of the organisms involved in a symbiotic interaction.
