identifier: GO:0046221
label: "pyridine catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of pyridine, a nitrogenous base (C5H5N) obtained from the distillation of bone oil or coal tar, and by the decomposition of certain alkaloids, as a colorless liquid with a peculiar pungent odor.
