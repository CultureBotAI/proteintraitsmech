identifier: GO:0090052
label: "regulation of pericentric heterochromatin formation"
definition: >-
  Any process that modulates the frequency, rate or extent of heterochromatin formation at the centromere. Chromatin silencing at the centromere is the repression of transcription of centromeric DNA by altering the structure of chromatin.
