identifier: GO:0141198
label: "protein branched polyubiquitination"
definition: >-
  A protein ubiquitination process in which ubiquitin monomers are attached to a protein, and then ubiquitin polymers are formed by linkages between lysine residues at various positions of the ubiquitin monomers, forming branched linkages, such as K11/K48- or K11/K63-linked chains.
