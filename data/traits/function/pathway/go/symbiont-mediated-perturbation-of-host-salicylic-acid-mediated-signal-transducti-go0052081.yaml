identifier: GO:0052081
label: "symbiont-mediated perturbation of host salicylic acid-mediated signal transduction pathway"
definition: >-
  A process in which a symbiont alters or subverts a salicylic acid-mediated signal transduction pathway in its host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
