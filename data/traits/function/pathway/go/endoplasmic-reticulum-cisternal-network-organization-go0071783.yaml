identifier: GO:0071783
label: "endoplasmic reticulum cisternal network organization"
definition: >-
  A process that is carried out at the cellular level which results in the assembly, arrangement of constituent parts, or disassembly of the endoplasmic reticulum (ER) cisternal network. The ER cisternal network is the ER part that comprises the membranes with low curvature in cross-section.
