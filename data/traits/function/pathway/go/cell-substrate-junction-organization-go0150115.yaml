identifier: GO:0150115
label: "cell-substrate junction organization"
definition: >-
  A process that is carried out at the cellular level which results in the assembly, arrangement of constituent parts, or disassembly of a cell-substrate junction. A cell-substrate junction is a specialized region of connection between a cell and the extracellular matrix.
