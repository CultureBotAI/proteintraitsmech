identifier: GO:1902729
label: "negative regulation of proteoglycan biosynthetic process"
definition: >-
  Any process that stops, prevents or reduces the frequency, rate or extent of the chemical reactions and pathways resulting in the formation of proteoglycans, any glycoprotein in which the carbohydrate units are glycosaminoglycans.
