identifier: GO:0018247
label: "protein-phosphoribosyl dephospho-coenzyme A linkage"
definition: >-
  The linkage of phosphoribosyl dephospho-coenzyme A to protein via peptidyl-serine, to form O-(phosphoribosyl dephospho-coenzyme A)-L-serine; it is uncertain whether the phosphoribosyl glycosidic attachment to the dephospho-coenzyme A is alpha or beta, and through the 2' or the 3' position.
