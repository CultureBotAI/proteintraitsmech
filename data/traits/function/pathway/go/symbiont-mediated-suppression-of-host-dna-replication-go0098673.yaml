identifier: GO:0098673
label: "symbiont-mediated suppression of host DNA replication"
definition: >-
  Any process by which a virus inhibits DNA replication in its host cell. Some bacteriophages are known to do this, possibly as a way of increasing the pool of nucleotides available for virus replication.
