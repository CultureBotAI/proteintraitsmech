identifier: GO:0036280
label: "cellular response to L-canavanine"
definition: >-
  Any process that results in a change in state or activity of a cell (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of a L-canavanine stimulus. L-canavanine is L-homoserine substituted at oxygen with a guanidino (carbamimidamido) group.
