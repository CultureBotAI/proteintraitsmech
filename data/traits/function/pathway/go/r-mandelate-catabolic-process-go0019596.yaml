identifier: GO:0019596
label: "(R)-mandelate catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of (R)-mandelate, the anion of (R)-mandelic acid. Mandelic acid (alpha-hydroxybenzeneacetic acid) is an 8-carbon alpha-hydroxy acid (AHA) that is used in organic chemistry and as a urinary antiseptic.
