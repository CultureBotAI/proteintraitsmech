identifier: GO:0070809
label: "negative regulation of Hulle cell development"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of Hulle cell development, a process that leads to the formation of Hulle cells. Hulle cells are specialized multinucleate cells that originate from a nest-like aggregation of hyphae during sexual development and serve as nurse cells to the developing cleistothecium, or fruiting body.
