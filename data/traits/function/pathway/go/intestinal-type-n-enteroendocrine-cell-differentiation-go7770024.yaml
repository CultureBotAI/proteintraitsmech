identifier: GO:7770024
label: "intestinal type N enteroendocrine cell differentiation"
definition: >-
  The process in which relatively unspecialized cells acquire specialized structural and/or functional features of an intestinal type N enteroendocrine cell. Intestinal type N enteroendocrine cells are found in the ileum and jejunum and secrete neurotensin.
