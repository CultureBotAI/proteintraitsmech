identifier: GO:0075197
label: "haustorium neck formation"
definition: >-
  The assembly by the symbiont of a neck-like structure for the purpose of penetration into its host organism. The neck-like structure connects haustorium mother cell and haustorium. The host is defined as the larger of the organisms involved in a symbiotic interaction.
