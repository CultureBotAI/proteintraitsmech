identifier: GO:0061287
label: "mesonephric capsule formation"
definition: >-
  The developmental process pertaining to the initial formation of a mesonephric capsule from unspecified parts. The mesonephric capsule is the tough fibrous layer surrounding the mesonephros, covered in a thick layer of perinephric adipose tissue. It provides some protection from trauma and damage.
