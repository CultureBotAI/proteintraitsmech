identifier: GO:0001079
label: "nitrogen catabolite regulation of transcription from RNA polymerase II promoter"
definition: >-
  A transcription regulation process in which the presence of one nitrogen source leads to the modulation of the frequency, rate, or extent of transcription, from an RNA polymerase II promoter, of specific genes involved in the metabolism of other nitrogen sources.
