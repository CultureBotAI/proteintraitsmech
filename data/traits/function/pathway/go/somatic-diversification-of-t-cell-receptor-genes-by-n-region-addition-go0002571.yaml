identifier: GO:0002571
label: "somatic diversification of T cell receptor genes by N region addition"
definition: >-
  The addition of variable numbers of random nucleotides by terminal deoxytransferase in the N regions of T cell receptor genes. N regions are found at the V-D, D-D, V-J, and D-J recombinational junctions, depending on the T cell receptor gene.
