identifier: GO:0006679
label: "glucosylceramide biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of glucosylceramides, any compound composed of a ceramide backbone covalently linked to a glucose. The glucose can be further elongated with the sequential addition of various carbohydrate units.
