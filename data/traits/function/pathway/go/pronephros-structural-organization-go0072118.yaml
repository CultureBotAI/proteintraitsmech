identifier: GO:0072118
label: "pronephros structural organization"
definition: >-
  The process that contributes to the act of creating the structural organization of the pronephros. This process pertains to the physical shaping of a rudimentary structure. In mammals, the pronephros is the first of the three embryonic kidneys to be established and exists only transiently. In lower vertebrates such as fish and amphibia, the pronephros is the fully functional embryonic kidney and is indispensable for larval life.
