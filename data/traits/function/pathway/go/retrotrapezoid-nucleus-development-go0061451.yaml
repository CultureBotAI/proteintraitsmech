label: "retrotrapezoid nucleus development"
definition: >-
  The progression of the retrotrapezoid nucleus (RTN) over time from it's initial formation to its mature state. The retrotrapezoid nucleus is a group of neurons in the rostral medulla, which are responsible regulating respiration.
