identifier: GO:7770023
label: "intestinal type L enteroendocrine cell differentiation"
definition: >-
  The process in which relatively unspecialized cells acquire specialized structural and/or functional features of an intestinal type L enteroendocrine cell. Intestinal type L enteroendocrine cells are found in ileum and large intestine and secrete glucagon-like peptides.
