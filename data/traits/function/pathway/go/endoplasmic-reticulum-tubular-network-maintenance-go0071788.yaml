label: "endoplasmic reticulum tubular network maintenance"
definition: >-
  The organization process that preserves the endoplasmic reticulum (ER) tubular network in a stable functional or structural state. The ER tubular network is the ER part that comprises the membranes with high curvature in cross-section.
