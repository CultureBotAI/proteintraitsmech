identifier: GO:0001897
label: "symbiont-mediated cytolysis of host cell"
definition: >-
  A process mediated by a symbiont that results in the death of a host cell by means of the rupture of cell membranes and the loss of cytoplasm. The host is defined as the larger of the organisms involved in a symbiotic interaction.
