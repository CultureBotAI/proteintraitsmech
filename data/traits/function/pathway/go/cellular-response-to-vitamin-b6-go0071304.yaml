identifier: GO:0071304
label: "cellular response to vitamin B6"
definition: >-
  Any process that results in a change in state or activity of a cell (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of a vitamin B6 stimulus. Vitamin B6 encompasses pyridoxal, pyridoxamine and pyridoxine and the active form, pyridoxal phosphate.
