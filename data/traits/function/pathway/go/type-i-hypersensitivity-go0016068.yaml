identifier: GO:0016068
label: "type I hypersensitivity"
definition: >-
  An inflammatory response driven by antigen recognition by antibodies bound to Fc receptors on mast cells or basophils, occurring within minutes after exposure of a sensitized individual to the antigen, and leading to the release of a variety of inflammatory mediators such as histamines.
