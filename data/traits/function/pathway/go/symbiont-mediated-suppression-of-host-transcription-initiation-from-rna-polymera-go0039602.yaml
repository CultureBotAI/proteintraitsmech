identifier: GO:0039602
label: "symbiont-mediated suppression of host transcription initiation from RNA polymerase II promoter"
definition: >-
  Any process in which a virus stops, prevents, or reduces the frequency, rate or extent of the assembly of the RNA polymerase II preinitiation complex (PIC) at an RNA polymerase II promoter region of a host DNA template. The host is defined as the larger of the organisms involved in a symbiotic interaction.
