identifier: GO:0042955
label: "dextrin transport"
definition: >-
  The directed movement of dextrin, any one, or the mixture, of the intermediate polysaccharides formed during the hydrolysis of starch, which are dextrorotatory, soluble in water, and precipitable in alcohol, into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore.
