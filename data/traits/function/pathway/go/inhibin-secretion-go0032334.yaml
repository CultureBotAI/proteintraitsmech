identifier: GO:0032334
label: "inhibin secretion"
definition: >-
  The regulated release of an inhibin, either of two glycoproteins (designated A and B), secreted by the gonads and present in seminal plasma and follicular fluid, that inhibit pituitary production of follicle-stimulating hormone.
