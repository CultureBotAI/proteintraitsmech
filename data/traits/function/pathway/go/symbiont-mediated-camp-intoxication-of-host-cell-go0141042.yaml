identifier: GO:0141042
label: "symbiont-mediated cAMP intoxication of host cell"
definition: >-
  The production by a symbiont of high levels of cyclic AMP in a host cell, impairing host cellular functions in multiple ways, including ATP depletion, interference with host intracellular signaling, cytoskeletal defects and apoptosis-related cell death. The host is defined as the larger of the organisms involved in a symbiotic interaction.
