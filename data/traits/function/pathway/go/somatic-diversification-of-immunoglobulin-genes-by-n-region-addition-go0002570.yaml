identifier: GO:0002570
label: "somatic diversification of immunoglobulin genes by N region addition"
definition: >-
  The addition of variable numbers of random nucleotides by terminal deoxytransferase in the N regions of heavy chain immunoglobulin genes. N regions are found at the V-D and D-J recombinational junctions.
