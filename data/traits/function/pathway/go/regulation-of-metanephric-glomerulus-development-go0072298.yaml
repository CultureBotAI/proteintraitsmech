identifier: GO:0072298
label: "regulation of metanephric glomerulus development"
definition: >-
  Any process that modulates the rate, frequency or extent of metanephric glomerulus development, the progression of the metanephric glomerulus over time from its initial formation until its mature state. The metanephric glomerulus is a capillary tuft surrounded by Bowman's capsule in nephrons of the vertebrate kidney, or metanephros.
