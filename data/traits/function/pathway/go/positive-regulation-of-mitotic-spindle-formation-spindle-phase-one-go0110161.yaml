label: "positive regulation of mitotic spindle formation (spindle phase one)"
definition: >-
  Any process that activates or increases the frequency, rate or extent of the cell cycle process in which the distance is lengthened between poles of the mitotic spindle during mitotic prophase (spindle phase one).
