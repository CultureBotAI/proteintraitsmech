identifier: GO:0044499
label: "venom-mediated vasoconstriction"
definition: >-
  A process in which an organism initiates, promotes, or enhances the narrowing (constriction) of blood vessels by small muscles in their walls in another organism via the action of a venom, concomittantly increasing blood pressure in the bitten/stung organism.
