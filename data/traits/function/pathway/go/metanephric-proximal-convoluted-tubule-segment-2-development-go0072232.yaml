identifier: GO:0072232
label: "metanephric proximal convoluted tubule segment 2 development"
definition: >-
  The process whose specific outcome is the progression of the S2 portion of the metanephric proximal convoluted tubule over time, from its formation to the mature structure. The S2 portion of the metanephric proximal tubule is involved in reabsorption of water and sodium chloride.
