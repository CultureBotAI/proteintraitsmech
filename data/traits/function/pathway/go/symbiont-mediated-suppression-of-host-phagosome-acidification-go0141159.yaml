identifier: GO:0141159
label: "symbiont-mediated suppression of host phagosome acidification"
definition: >-
  A process in which a symbiont inhibits or disrupts the normal acidification of host phagosomes. Mechanisms by which a symbiont prevents host phagosome acidification include the inhibitition of host V-ATPase, the proton pump that acidifies the phagosome, or disruption of the phagosome membrane by pore-forming toxin. The host is defined as the larger of the organisms involved in a symbiotic interaction.
