identifier: GO:0061329
label: "Malpighian tubule principal cell differentiation"
definition: >-
  The process in which a relatively unspecialized cell acquires specialized features of a Malpighian tubule principal cell. A Malpighian tubule principal cell is an epithelial secretory cell that transports cations into the lumen of the tubule.
