identifier: GO:0045497
label: "female analia development"
definition: >-
  The process whose specific outcome is the progression of the analia of the female over time, from formation to the mature structure. The analia is the posterior-most vertral appendage that develops from the genital disc. An example of this process is found in Drosophila melanogaster.
