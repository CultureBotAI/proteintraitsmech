identifier: GO:0070807
label: "positive regulation of phialide development"
definition: >-
  Any process that activates or increases the frequency, rate or extent of phialide development, a process that leads to the formation of phialides. Phialides are specialized cells that bud from the ends of metulae on the conidiophore tip.
