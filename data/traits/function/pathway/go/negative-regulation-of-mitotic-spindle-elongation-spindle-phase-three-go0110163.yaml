identifier: GO:0110163
label: "negative regulation of mitotic spindle elongation (spindle phase three)"
definition: >-
  Any process that stops, prevents or reduces the frequency, rate or extent of the cell cycle process in which the distance is lengthened between poles of the mitotic spindle during mitotic anaphase B (spindle phase three).
