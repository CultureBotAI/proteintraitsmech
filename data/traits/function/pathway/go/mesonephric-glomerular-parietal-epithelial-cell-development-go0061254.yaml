identifier: GO:0061254
label: "mesonephric glomerular parietal epithelial cell development"
definition: >-
  The process whose specific outcome is the progression of a mesonephric glomerular parietal epithelial cell over time, from its formation to the mature structure. Mesonephric glomerular parietal epithelial cells are specialized epithelial cells that form tight junctions as a barrier to protein transport.
