identifier: GO:1990217
label: "symbiont-mediated suppression of host phytoalexin production"
definition: >-
  A process in which a symbiont inhibits or disrupts the production of phytoalexins in the host organism. Phytoalexins are produced by plants to fight against pathogens. The host is defined as the larger of the organisms involved in a symbiotic interaction.
