identifier: GO:0046141
label: "corrin catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of corrin, C19H22N4, the fundamental heterocyclic skeleton of the corrinoids. It consists of four reduced pyrrole rings joined into a macrocyclic ring. Corrin is the core of the vitamin B12 molecule.
