identifier: GO:0002097
label: "tRNA wobble base modification"
definition: >-
  The process in which the nucleotide at position 34 in the anticodon of a tRNA is post-transcriptionally modified. The wobble nucleoside of the tRNA sequence (position 34) corresponds to the first position of the anticodon.
