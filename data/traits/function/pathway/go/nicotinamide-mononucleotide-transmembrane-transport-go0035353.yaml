identifier: GO:0035353
label: "nicotinamide mononucleotide transmembrane transport"
definition: >-
  The process in which nicotinamide mononucleotide is transported across a membrane. Nicotinamide mononucleotide is a ribonucleotide in which the nitrogenous base, nicotinamide, is in beta-n-glycosidic linkage with the c-1 position of d-ribose. It is a constituent of NAD and NADP.
