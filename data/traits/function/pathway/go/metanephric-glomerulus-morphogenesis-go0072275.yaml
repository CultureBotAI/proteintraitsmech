identifier: GO:0072275
label: "metanephric glomerulus morphogenesis"
definition: >-
  The process in which the anatomical structures of the metanephric glomerulus are generated and organized. The metanephric glomerulus is a capillary tuft surrounded by Bowman's capsule in nephrons of the vertebrate kidney, or metanephros.
