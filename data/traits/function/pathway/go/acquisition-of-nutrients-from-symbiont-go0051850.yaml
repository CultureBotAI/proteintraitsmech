identifier: GO:0051850
label: "acquisition of nutrients from symbiont"
definition: >-
  The production of structures and/or molecules in an organism that are required for the acquisition and/or utilization of nutrients obtained from its symbiont organism. The symbiont is defined as the smaller of the organisms involved in a symbiotic interaction.
