identifier: GO:0098775
label: "curli assembly"
definition: >-
  The process of assembly of curli, extracellular fibers produced by enteric bacteria. This process occurs outside the cell, where it is coupled to secretion across the cell outer membrane via nucleation by elements of the transporter complex.
