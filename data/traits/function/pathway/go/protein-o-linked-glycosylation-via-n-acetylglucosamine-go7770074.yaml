identifier: GO:7770074
label: "protein O-linked glycosylation via N-acetylglucosamine"
definition: >-
  A glycoprotein biosynthetic process in which a single N-acetylglucosamine is covalently linked via a beta-glycosidic bond to the oxygen atom of a serine or threonine side chain in a protein, resulting in the formation of a protein O-linked glycan. The sugar is not elongated into a larger oligosaccharide chain.
