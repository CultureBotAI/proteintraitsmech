identifier: GO:0002160
label: "desmosome maintenance"
definition: >-
  The maintenance of a desmosome. A desmosome is a patch-like intercellular junctions found in vertebrate tissues, consisting of parallel zones of two cell membranes, separated by an interspace of 25-35 nm, and having dense fibrillar plaques in the subjacent cytoplasm.
