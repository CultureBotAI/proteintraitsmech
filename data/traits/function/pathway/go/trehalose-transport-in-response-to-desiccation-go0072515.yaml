identifier: GO:0072515
label: "trehalose transport in response to desiccation"
definition: >-
  The directed movement of trehalose into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore, that occurs as a result of a desiccation stimulus. A desiccation stimulus signals extreme dryness resulting from the prolonged deprivation of water.
