identifier: GO:7770017
label: "plasma membrane expansion"
definition: >-
  A cellular process which results in an increase in the size (surface area) of the plasma membrane during cell growth or osmotic stress. This can occur by lipid transfer, membrane trafficking, or eisosome disassembly.
