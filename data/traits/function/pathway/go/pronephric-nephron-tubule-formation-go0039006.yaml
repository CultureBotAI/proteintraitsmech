identifier: GO:0039006
label: "pronephric nephron tubule formation"
definition: >-
  The developmental process pertaining to the initial formation of a pronephric nephron tubule from unspecified parts. A pronephric nephron tubule is an epithelial tube that is part of a nephron in the pronephros.
