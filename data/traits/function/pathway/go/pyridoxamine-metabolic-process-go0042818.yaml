identifier: GO:0042818
label: "pyridoxamine metabolic process"
definition: >-
  The chemical reactions and pathways involving 4-(aminomethyl)-5-(hydroxymethyl)-2-methylpyridin-3-ol, one of the vitamin B6 compounds. Pyridoxal, pyridoxamine and pyridoxine are collectively known as vitamin B6, and are efficiently converted to the biologically active form of vitamin B6, pyridoxal phosphate.
