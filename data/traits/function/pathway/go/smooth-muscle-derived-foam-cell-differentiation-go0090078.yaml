identifier: GO:0090078
label: "smooth muscle derived foam cell differentiation"
definition: >-
  The process in which a smooth muscle cell acquires the specialized features of a foam cell. A foam cell is a type of cell containing lipids in small vacuoles and typically seen in atherosclerotic lesions, as well as other conditions.
