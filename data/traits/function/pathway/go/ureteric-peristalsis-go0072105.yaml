identifier: GO:0072105
label: "ureteric peristalsis"
definition: >-
  A wavelike sequence of involuntary muscular contraction and relaxation that passes along the ureter, impelling the contents onwards. The ureter is one of a pair of thick-walled tubes that transports urine from the kidney pelvis to the urinary bladder.
