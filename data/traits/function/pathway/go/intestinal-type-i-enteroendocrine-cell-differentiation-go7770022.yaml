identifier: GO:7770022
label: "intestinal type I enteroendocrine cell differentiation"
definition: >-
  The process in which relatively unspecialized cells acquire specialized structural and/or functional features of an intestinal type I enteroendocrine cell. Intestinal type I enteroendocrine cells are found in the duodenum and jejunum and secrete cholecystokinin.
