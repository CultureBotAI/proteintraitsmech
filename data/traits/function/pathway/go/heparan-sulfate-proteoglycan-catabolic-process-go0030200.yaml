identifier: GO:0030200
label: "heparan sulfate proteoglycan catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of heparan sulfate proteoglycans, which consist of a core protein linked to a heparan sulfate glycosaminoglycan. The heparan sulfate chain is composed of the repeating disaccharide unit beta-(1,4)-N-acetyl-D-glucosamine-alpha-(1,4)-hexuronic acid, the former being either sulfated or deacetylated on its amino group as well as sulfated on one of its hydroxyl groups, and the latter being a mixture of sulfated and nonsulfated D-glucuronic and L-iduronic acids.
