identifier: GO:0015911
label: "long-chain fatty acid import across plasma membrane"
definition: >-
  The directed movement of a long-chain fatty acid from outside of a cell, across the plasma membrane and into the cytosol. A long-chain fatty acid has an aliphatic tail containing 13 to 22 carbons.
