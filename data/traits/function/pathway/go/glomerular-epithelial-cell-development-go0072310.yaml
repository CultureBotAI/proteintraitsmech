identifier: GO:0072310
label: "glomerular epithelial cell development"
definition: >-
  The process whose specific outcome is the progression of a glomerular epithelial cell over time, from its formation to the mature structure. Glomerular epithelial cells are specialized epithelial cells that form part of the glomerulus; there are two types, glomerular parietal epithelial cells and glomerular visceral epithelial cells.
