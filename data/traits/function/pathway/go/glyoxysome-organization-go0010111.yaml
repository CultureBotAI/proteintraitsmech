identifier: GO:0010111
label: "glyoxysome organization"
definition: >-
  A process that is carried out at the cellular level which results in the assembly, arrangement of constituent parts, or disassembly of the glyoxysome. A glyoxysome is a microbody that contains the enzymes of the glyoxylate pathway.
