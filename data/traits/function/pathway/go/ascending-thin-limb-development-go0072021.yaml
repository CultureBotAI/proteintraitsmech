identifier: GO:0072021
label: "ascending thin limb development"
definition: >-
  The process whose specific outcome is the progression of an ascending thin limb over time, from its formation to the mature structure. The ascending thin limb is a segment of a nephron tubule lying in the inner medulla that is permeable to ions but not to water and has a simple epithelium; active transepithelial solute transport is absent.
