identifier: GO:0160063
label: "multi-pass transmembrane protein insertion into ER membrane"
definition: >-
  A process of protein insertion of multi-pass membrane proteins into the endoplasmic reticulum (ER) membrane. Insertion of multi-pass membrane proteins is mediated by the multi-pass translocon complex and takes place following membrane insertion of the first few transmembrane segments of proteins by the SEC61 complex to promote insertion of subsequent transmembrane regions.
