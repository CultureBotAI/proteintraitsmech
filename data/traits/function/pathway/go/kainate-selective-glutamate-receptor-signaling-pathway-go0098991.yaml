identifier: GO:0098991
label: "kainate selective glutamate receptor signaling pathway"
definition: >-
  The series of molecular signals initiated by glutamate binding to an kainate-selective glutamate receptor on the surface of the target cell, followed by the movement of ions through a channel in the receptor complex, ending with the regulation of a downstream cellular process, e.g. transcription.
