identifier: GO:0062211
label: "root regeneration"
definition: >-
  The the regeneration process by which a damaged or lost root regrows or re-differentiates. This process may occur via de-differentiation and subsequent reprogramming of somatic cells or activation of existing undifferentiated (meristematic) cells to form a new root meristem and subsequently new root.
