identifier: GO:0140991
label: "piRNA-mediated gene silencing by mRNA destabilization"
definition: >-
  A cytoplasmic post-transcriptional gene silencing pathway in which piRNAs direct the cleavage of target mRNAs. The target mRNA, often transcribed from a transposable element, is destabilized by the activity of a PIWI class endonuclease within the piRNA-induced silencing complex. This may also be accompanied by mRNA deadenylation and decapping.
