identifier: GO:0052003
label: "symbiont-mediated suppression of defense-related host salicylic acid-mediated signal transduction pathway"
definition: >-
  A process in which a virus interferes with, inhibits or disrupts a host salicylic acid-mediated signal transduction pathways during the host defense response. The host is defined as the larger of the organisms involved in a symbiotic interaction.
