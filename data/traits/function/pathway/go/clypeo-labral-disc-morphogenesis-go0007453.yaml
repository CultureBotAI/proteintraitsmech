identifier: GO:0007453
label: "clypeo-labral disc morphogenesis"
definition: >-
  The process in which the anatomical structures derived from the clypeo-labral disc are generated and organized. This includes the transformation of a clypeo-labal imaginal disc from a monolayered epithelium in the larvae of holometabolous insects into recognizable adult structures including the labrum, anterior and posterior cibarial plates, fish trap bristles, epistomal sclerite and clypeus.
