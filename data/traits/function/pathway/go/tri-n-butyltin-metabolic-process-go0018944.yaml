identifier: GO:0018944
label: "tri-n-butyltin metabolic process"
definition: >-
  The chemical reactions and pathways involving tri-n-butyltin, an organometallic compound composed of three butyl chains attached to a tin atom. Tri-n-butyltin is used as an antifouling agent in ship bottom paints and can be toxic to many marine organisms.
