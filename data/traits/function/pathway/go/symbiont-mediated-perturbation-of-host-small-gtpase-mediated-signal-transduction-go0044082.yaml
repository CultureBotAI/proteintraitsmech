identifier: GO:0044082
label: "symbiont-mediated perturbation of host small GTPase-mediated signal transduction"
definition: >-
  A process in which a symbiont alters or subverts a small GTPase-mediated signal transduction pathway in its host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
