identifier: GO:0072681
label: "fibronectin-dependent thymocyte migration"
definition: >-
  The movement of a thymocyte through distinct intrathymic niches (e.g. medulla, cortex), where it receives a unique set of developmental cues required for T-cell development, dependent on fibronectin in the extracellular matrix.
