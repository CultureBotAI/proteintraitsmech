identifier: GO:0000487
label: "maturation of 5.8S rRNA from tetracistronic rRNA transcript (SSU-rRNA, 5.8S rRNA, 2S rRNA, LSU-rRNA)"
definition: >-
  Any process involved in the maturation of a precursor 5.8S ribosomal RNA (rRNA) molecule into a mature 5.8S rRNA molecule from the pre-rRNA molecule originally produced as a tetracistronic rRNA transcript that contains the Small Subunit (SSU) rRNA, the 8.8S rRNA, the 2S rRNA, and the Large Subunit (LSU) in that order from 5' to 3' along the primary transcript.
definition_source: "GO (2026-06-15)"
trait_axis: FUNCTION
trait_category: FUNC_PATHWAY
term_kind: CLASS
mapping_status: SEEDED
