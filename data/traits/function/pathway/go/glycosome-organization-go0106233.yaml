identifier: GO:0106233
label: "glycosome organization"
definition: >-
  A process that is carried out at the cellular level which results in the assembly, arrangement of constituent parts, or disassembly of a glycosome, a membrane-bounded organelle found in organisms from the order Kinetoplastida that houses the enzymes of glycolysis.
