identifier: GO:0036360
label: "sorocarp stalk morphogenesis"
definition: >-
  The process in which the sorocarp stalk is generated and organized. The sorocarp stalk is a tubular structure that consists of cellulose-covered cells stacked on top of each other and surrounded by an acellular stalk tube composed of cellulose and glycoprotein. An example of this process is found in Dictyostelium discoideum.
