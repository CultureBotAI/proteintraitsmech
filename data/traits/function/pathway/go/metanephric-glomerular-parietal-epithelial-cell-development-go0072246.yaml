identifier: GO:0072246
label: "metanephric glomerular parietal epithelial cell development"
definition: >-
  The process whose specific outcome is the progression of a metanephric glomerular parietal epithelial cell over time, from its formation to the mature structure. Metanephric glomerular parietal epithelial cells are specialized epithelial cells that form tight junctions as a barrier to protein transport.
