identifier: GO:0015799
label: "propane 1,3-diol transport"
definition: >-
  The directed movement of 1,3-propanediol into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore. Propanediol is a sweet colorless, viscous, hygroscopic liquid used as an antifreeze and in brake fluid; it is also as a humectant in cosmetics and personal care items, although it can be absorbed through the skin with harmful effects.
