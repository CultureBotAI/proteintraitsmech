identifier: GO:0071471
label: "cellular response to non-ionic osmotic stress"
definition: >-
  Any process that results in a change in state or activity of a cell (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of a stimulus indicating an increase or decrease in the concentration of non-ionic solutes (e.g. mannitol, sorbitol) in the environment.
