identifier: GO:0052519
label: "positive regulation of nutrient release by symbiont"
definition: >-
  Any process in which an organism activates, maintains or increases the frequency, rate or extent of the release of nutrients from a symbiont organism. The symbiont is defined as the smaller of the organisms involved in a symbiotic interaction.
