identifier: GO:0010732
label: "regulation of protein glutathionylation"
definition: >-
  Any process that modulates the rate, frequency, or extent of protein glutathionylation. Protein glutathionylation is the protein modification process in which a glutathione molecule is added to a protein amino acid through a disulfide linkage.
