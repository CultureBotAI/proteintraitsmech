identifier: GO:0002099
label: "tRNA wobble guanine modification"
definition: >-
  The process in which a guanine at position 34 of a tRNA is post-transcriptionally modified. The wobble nucleoside of the tRNA sequence (position 34) corresponds to the first position of the anticodon.
