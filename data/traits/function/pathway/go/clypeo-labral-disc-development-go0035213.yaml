identifier: GO:0035213
label: "clypeo-labral disc development"
definition: >-
  The process whose specific outcome is the progression of the clypeo-labral disc over time, from its formation to the metamorphosis to form adult structures. The clypeo-labral disc develops into the labrum, anterior cibarial plate, fish trap bristles, epistomal sclerite.
