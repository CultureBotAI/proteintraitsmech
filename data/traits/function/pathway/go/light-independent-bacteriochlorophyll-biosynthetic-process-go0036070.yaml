identifier: GO:0036070
label: "light-independent bacteriochlorophyll biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of a bacteriochlorophyll, which occur in the absence of light. Bacteriochlorophylls are any of the chlorophylls of photosynthetic bacteria; they differ structurally from the chlorophylls of higher plants.
