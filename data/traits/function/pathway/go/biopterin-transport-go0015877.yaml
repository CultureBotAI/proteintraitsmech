identifier: GO:0015877
label: "biopterin transport"
definition: >-
  The directed movement of biopterin into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore. Biopterin is a growth factor for certain protozoans and some insects; it is widely distributed in tissues and functions in a reduced form, tetrahydrobiopterin, as a hydroxylation coenzyme.
