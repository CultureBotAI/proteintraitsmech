identifier: GO:0044483
label: "venom-mediated perturbation of hemostasis"
definition: >-
  A process in which an organism alters or subverts hemostasis in another organism via the action of a venom. Hemostasis is the mechanism that leads to cessation of bleeding from a blood vessel.
