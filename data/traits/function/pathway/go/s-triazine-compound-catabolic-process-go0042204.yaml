label: "s-triazine compound catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of any s-triazine compound. These compounds include many pesticides of widespread use in agriculture, and are characterized by a symmetrical hexameric ring consisting of alternating carbon and nitrogen atoms.
