identifier: GO:0140647
label: "P450-containing electron transport chain"
definition: >-
  A electron transport chain in which one or more electron carriers operate to transfer electrons from donors to a cytochrome P450 protein or domain. Electron carriers operating in this chain include FAD-containing flavoproteins or domains, FMN domains, ferredoxins and cytochrome b5. The reduced cytochrome P450 functions as the terminal oxidase and participates in a wide range of biochemical pathways.
