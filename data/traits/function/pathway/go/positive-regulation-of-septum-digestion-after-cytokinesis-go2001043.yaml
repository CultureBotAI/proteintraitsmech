identifier: GO:2001043
label: "positive regulation of septum digestion after cytokinesis"
definition: >-
  Any process that activates or increases the frequency, rate or extent of the process of physically separating the septal cell wall material by enzymatic digestion, that occurs after daughter cells are separated by cytokinesis.
