identifier: GO:0071939
label: "vitamin A import into cell"
definition: >-
  The directed movement of vitamin A from outside of a cell, across the plasma membrane and into the cytosol. Vitamin A is any of several retinoid derivatives of beta-carotene, primarily retinol, retinal, or retinoic acid.
