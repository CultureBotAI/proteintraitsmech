identifier: GO:0036339
label: "lymphocyte adhesion to endothelial cell of high endothelial venule"
definition: >-
  The attachment of a lymphocyte to an endothelial cell of a high endothelial venule (HEV) via adhesion molecules. A HEV cell is an endothelial cell that is cuboidal, expresses leukocyte-specific receptors, and allows for passage of lymphocytes into bloodstream.
