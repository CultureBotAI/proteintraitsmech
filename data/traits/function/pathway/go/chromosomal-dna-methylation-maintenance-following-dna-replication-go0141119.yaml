identifier: GO:0141119
label: "chromosomal DNA methylation maintenance following DNA replication"
definition: >-
  The process that maintains methylated cytosine in newly synthesized DNA following DNA replication. After the establishment of novel DNA methylation marks, the newly created patterns must be faithfully transmitted by maintenance DNA methyltransferases during cell division.
