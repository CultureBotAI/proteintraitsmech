identifier: GO:0032898
label: "neurotrophin production"
definition: >-
  The appearance of a neurotrophin due to biosynthesis or secretion by cells in a neuron's target field, resulting in an increase in its intracellular or extracellular levels. A neurotrophin is any of a family of growth factors that prevent apoptosis in neurons and promote nerve growth.
