identifier: GO:0052160
label: "symbiont-mediated perturbation of host systemic acquired resistance"
definition: >-
  A process in which a symbiont alters or subverts systemic acquired resistance in the host organism; systemic acquired resistance is a salicylic acid-mediated response that confers broad spectrum systemic resistance. The host is defined as the larger of the organisms involved in a symbiotic interaction.
