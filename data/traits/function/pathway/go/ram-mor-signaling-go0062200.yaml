identifier: GO:0062200
label: "RAM/MOR signaling"
definition: >-
  An intracellular signaling cascade that starts with the activation of S. cerevisiae Kic1p, which activate Mob2p and Cbk1p. Cbk1p phosphorylates Ace2p, which results in its nuclear translocation, where it regulates transcription of genes involved in polarity and morphogenesis.
