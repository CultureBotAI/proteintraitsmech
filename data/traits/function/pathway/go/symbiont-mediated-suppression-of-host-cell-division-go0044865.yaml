identifier: GO:0044865
label: "symbiont-mediated suppression of host cell division"
definition: >-
  A process in which a symbiont inhibits or disrupts the normal execution of cell division in the host cell. The host is defined as the larger of the organisms involved in a symbiotic interaction.
