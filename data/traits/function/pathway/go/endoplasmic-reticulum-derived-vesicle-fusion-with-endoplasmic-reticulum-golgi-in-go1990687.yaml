identifier: GO:1990687
label: "endoplasmic reticulum-derived vesicle fusion with endoplasmic reticulum-Golgi intermediate compartment (ERGIC) membrane"
definition: >-
  The joining of the lipid bilayer membrane around an endoplasmic reticulum-derived vesicle to the lipid bilayer membrane of the ERGIC. Such vesicles include COPII-coated transport vesicles involved in anterograde transport.
