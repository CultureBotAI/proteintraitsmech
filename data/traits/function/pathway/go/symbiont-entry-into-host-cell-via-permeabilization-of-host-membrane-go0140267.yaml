identifier: GO:0140267
label: "symbiont entry into host cell via permeabilization of host membrane"
definition: >-
  The entry of a symbiont into the cytoplasm of a host cell, triggered by an interaction between the bilayer of a host membrane and a membrane-penetration symbiont protein. This process mediates the entry of some non-enveloped virus into host cells, and results in the release of the virus contents into the host cell cytoplasm.
