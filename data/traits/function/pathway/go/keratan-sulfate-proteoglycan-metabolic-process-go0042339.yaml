identifier: GO:0042339
label: "keratan sulfate proteoglycan metabolic process"
definition: >-
  The chemical reactions and pathways involving keratan sulfate proteoglycans, which consist of a core protein linked to a keratan sulfate glycosaminoglycan. The keratan sulfate chain is composed of the repeating disaccharide unit beta-(1,4)-N-acetyl-D-glucosamine-beta-(1,3)-galactose, both of which can be sulfated.
