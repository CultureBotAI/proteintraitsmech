identifier: GO:0036116
label: "long-chain fatty-acyl-CoA catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of long-chain fatty-acyl-CoAs, any derivative of coenzyme A in which the sulfhydryl group is in a thioester linkage with a long-chain fatty-acyl group. A long-chain fatty acid has an aliphatic tail containing 13 to 22 carbons.
