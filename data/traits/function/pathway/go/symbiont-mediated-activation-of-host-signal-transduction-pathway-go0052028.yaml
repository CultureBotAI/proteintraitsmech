identifier: GO:0052028
label: "symbiont-mediated activation of host signal transduction pathway"
definition: >-
  A process in which a symbiont subverts a signal transduction pathway in the host organism by initiating, promoting, or enhancing its activation. The host is defined as the larger of the organisms involved in a symbiotic interaction.
