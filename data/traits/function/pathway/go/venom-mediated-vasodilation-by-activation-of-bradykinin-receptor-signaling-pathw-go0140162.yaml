identifier: GO:0140162
label: "venom-mediated vasodilation by activation of bradykinin receptor signaling pathway"
definition: >-
  A process in which an organism initiates, promotes, or enhances vasodilation via the action of a venom that activates bradykinin-dependent signaling, concomittantly reducing blood pressure in the bitten/stung organism. This can take place via several mechanisms that affect endogenous bradykinin: either increasing its release by kallikrein-like proteases, increasing bradykinin action by potentiation, or inhibiting bradykinin degradation.
