identifier: GO:0039012
label: "pronephric sinus development"
definition: >-
  The process whose specific outcome is the progression of the pronephric sinus over time, from its formation to the mature structure. The pronephric sinus is an ill-defined capillary network that lies between the pronephric tubules.
