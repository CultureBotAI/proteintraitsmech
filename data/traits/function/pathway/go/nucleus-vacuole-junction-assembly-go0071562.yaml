identifier: GO:0071562
label: "nucleus-vacuole junction assembly"
definition: >-
  The aggregation, arrangement and bonding together of a set of components to form a nucleus-vacuole junction (NVJ), membrane contact sites formed between the vacuole membrane and the outer nuclear membrane. In S. cerevisiae these contacts are mediated through direct physical interaction between Vac8p and Nvj1p. The NVJ plays roles in piecemeal microautophagy of the nucleus and in the cytoplasm-to-vacuole targeting pathway.
