identifier: GO:0002110
label: "cotranscriptional mitochondrial rRNA nucleotide insertion"
definition: >-
  The insertion of one or two non-coded nucleotides during the transcription of a mitochondrial rRNA. Such additions are known to occur in myxomycetes such as Physarum, Didymium, and Stemonitis.
