identifier: GO:0019331
label: "anaerobic respiration, using ammonium as electron donor"
definition: >-
  The oxidation of ammonium (NH4) to nitrogen (N2) in the absence of oxygen, using nitrite (NO2) as the electron acceptor. Hydroxylamine and ammonium are combined to yield hydrazine, which is subsequently oxidized to N2.
