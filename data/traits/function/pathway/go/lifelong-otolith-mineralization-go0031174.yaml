identifier: GO:0031174
label: "lifelong otolith mineralization"
definition: >-
  The formation and growth of otoliths throughout the life of the organism. Otoliths are the large extracellular ear-stones of the fish inner ear, produced by precipitation of specific crystal forms of calcium carbonate on organic matrices. The otolith enlarges throughout the life of the fish, as layers of calcium carbonate are added.
