identifier: GO:0061273
label: "mesonephric distal tubule morphogenesis"
definition: >-
  The process in which the anatomical structures of a mesonephric distal tubule are generated and organized. The mesonephric distal tubule is a mesonephric nephron tubule that begins at the macula densa and extends to the mesonephric connecting tubule.
