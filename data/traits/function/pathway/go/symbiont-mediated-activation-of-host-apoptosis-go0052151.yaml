identifier: GO:0052151
label: "symbiont-mediated activation of host apoptosis"
definition: >-
  A process in which a symbiont initiates, promotes, or enhances the normal execution of host apoptosis, leading to an increase in the frequency, rate or extent of apoptosis in the host cell. The host is defined as the larger of the organisms involved in a symbiotic interaction.
