identifier: GO:0033326
label: "cerebrospinal fluid secretion"
definition: >-
  The regulated release of cerebrospinal fluid (CSF) from the choroid plexus of the lateral, third and fourth ventricles. The cerebrospinal fluid is a clear liquid that located within the ventricles, spinal canal, and subarachnoid spaces.
