identifier: GO:0090381
label: "regulation of heart induction"
definition: >-
  Any process that modulates the rate, frequency, or extent of heart induction. Heart induction is the close range interaction between mesoderm and endoderm or ectoderm that causes cells to change their fates and specify the development of the heart.
