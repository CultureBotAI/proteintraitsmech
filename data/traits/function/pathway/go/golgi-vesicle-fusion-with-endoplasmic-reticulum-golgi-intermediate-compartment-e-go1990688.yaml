identifier: GO:1990688
label: "Golgi vesicle fusion with endoplasmic reticulum-Golgi intermediate compartment (ERGIC) membrane"
definition: >-
  The joining of the lipid bilayer membrane around a Golgi vesicle to the lipid bilayer membrane of the ERGIC. Such vesicles include COPI-coated transport vesicles involved in retrograde transport.
