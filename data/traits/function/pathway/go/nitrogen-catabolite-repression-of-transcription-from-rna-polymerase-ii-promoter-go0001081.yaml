identifier: GO:0001081
label: "nitrogen catabolite repression of transcription from RNA polymerase II promoter"
definition: >-
  A transcription regulation process in which the presence of one nitrogen source leads to a decrease in the frequency, rate, or extent of transcription, from an RNA polymerase II promoter, of specific genes involved in the metabolism of other nitrogen sources.
