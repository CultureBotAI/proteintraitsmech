identifier: GO:7770060
label: "TOM-TIM23-SORT-mediated protein insertion into the mitochondrial inner membrane"
definition: >-
  The import of proteins from the cytosol across the outer mitochondrial membrane and laterally inserted into the inner membrane. Typically acting on single-pass transmembrane proteins with an N-terminal targeting sequence and an internal hydrophobic stop-transfer sequence which targets them for lateral insertion.
