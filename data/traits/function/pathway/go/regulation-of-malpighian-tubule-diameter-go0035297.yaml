identifier: GO:0035297
label: "regulation of Malpighian tubule diameter"
definition: >-
  Ensuring that the Malpighian tubule is the correct width. Malpighian tubules have a uniform circumference along their length; the circumference of the tubes is eight cells during the time the cells are dividing, after which the cells rearrange producing tubes with a cirumference of two cells.
