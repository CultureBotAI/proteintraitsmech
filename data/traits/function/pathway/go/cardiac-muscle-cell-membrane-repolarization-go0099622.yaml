identifier: GO:0099622
label: "cardiac muscle cell membrane repolarization"
definition: >-
  The process in which ions are transported across the plasma membrane of a cardiac muscle cell such that the membrane potential changes in the repolarizing direction, toward the steady state potential. For example, the repolarization during an action potential is from a positive membrane potential towards a negative resting potential.
