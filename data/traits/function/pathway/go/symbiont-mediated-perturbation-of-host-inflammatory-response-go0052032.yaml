identifier: GO:0052032
label: "symbiont-mediated perturbation of host inflammatory response"
definition: >-
  A process in which a symbiont alters or subverts the normal execution of the inflammatory response of the host organism; the inflammatory response is the immediate defensive reaction (by vertebrate tissue) to infection or injury caused by chemical or physical agents. The host is defined as the larger of the organisms involved in a symbiotic interaction.
