identifier: GO:0072234
label: "metanephric nephron tubule development"
definition: >-
  The progression of a metanephric nephron tubule over time, from its initial formation to the mature structure. A metanephric nephron tubule is an epithelial tube that is part of the metanephric nephron, the functional part of the metanephros.
