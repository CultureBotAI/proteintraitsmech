label: "lipoxin biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of a lipoxin. A lipoxin is a non-classic eicosanoid and signaling molecule that has four conjugated double bonds and is derived from arachidonic acid.
