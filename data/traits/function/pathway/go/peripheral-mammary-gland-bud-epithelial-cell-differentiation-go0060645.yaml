identifier: GO:0060645
label: "peripheral mammary gland bud epithelial cell differentiation"
definition: >-
  The process in which a relatively unspecialized epithelial cell of the mammary placode becomes an epithelial cell at the periphery of the mammary gland bud. Cells at the periphery of the bud are larger that those of the surrounding epithelium and are arranged concentrically.
