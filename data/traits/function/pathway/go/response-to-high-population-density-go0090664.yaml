identifier: GO:0090664
label: "response to high population density"
definition: >-
  Any process that results in a change in state or activity of a cell or a multicellular organism (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of a higher than normal number of multicellular organisms living per unit area.
