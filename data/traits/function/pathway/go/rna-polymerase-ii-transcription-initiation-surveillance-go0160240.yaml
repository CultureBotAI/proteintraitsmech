identifier: GO:0160240
label: "RNA polymerase II transcription initiation surveillance"
definition: >-
  A process that promotes premature RNA polymerase II transcription termination of transcripts that are unfavorably configured for transcriptional elongation by releasing RNA polymerase II from bound DNA or promoting RNA polymerase II degradation.
