identifier: GO:0075342
label: "symbiont-mediated disruption of host cell PML body"
definition: >-
  The process in which an organism effects a change that impairs the structure or function of the host PML body. A PML body is a nuclear body that reacts against SP100 auto-antibodies (PML = promyelocytic leukemia). The host is defined as the larger of the organisms involved in a symbiotic interaction.
