identifier: GO:0044077
label: "symbiont-mediated perturbation of host receptor-mediated endocytosis"
definition: >-
  A process in which a symbiont initiates, promotes, or enhances host receptor-mediated endocytosis, the uptake of external materials by cells, utilizing receptors to ensure specificity of transport. The host is defined as the larger of the organisms involved in a symbiotic interaction.
