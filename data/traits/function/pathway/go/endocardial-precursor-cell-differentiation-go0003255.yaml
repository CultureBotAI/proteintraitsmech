identifier: GO:0003255
label: "endocardial precursor cell differentiation"
definition: >-
  The process in which a relatively unspecialized mesodermal cell acquires the specialized structural and/or functional features of an endocardial precursor cell. A endocardial precursor cell is a cell that has been committed to a endocardial cell fate, but will undergo further cell divisions rather than terminally differentiate.
