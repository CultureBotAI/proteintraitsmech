identifier: GO:0035660
label: "MyD88-dependent toll-like receptor 4 signaling pathway"
definition: >-
  The series of molecular signals initiated by a ligand binding to a toll-like 4 receptor, where the MyD88 adaptor molecule mediates transduction of the signal. Toll-like 4 receptors bind bacterial lipopolysaccharide (LPS) to initiate an innate immune response.
