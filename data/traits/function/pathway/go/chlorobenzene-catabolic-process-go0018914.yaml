identifier: GO:0018914
label: "chlorobenzene catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of chlorobenzene, a derivative of benzene with a chlorine atoms attached to the ring. It is a colorless liquid that is manufactured for use as a solvent. It quickly evaporates in the air and is degraded by hydroxyl radicals that are produced photochemically. The gas acts as a source of ClOx, which helps in the breakdown of stratospheric ozone.
