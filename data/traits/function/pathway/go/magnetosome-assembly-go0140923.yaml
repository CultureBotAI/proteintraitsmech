identifier: GO:0140923
label: "magnetosome assembly"
definition: >-
  The aggregation, arrangement and bonding together of a set of components to form a magnetosome. Magnetosomes are specialized organelles for magnetic navigation that comprise membrane-enveloped, nano-sized crystals of a magnetic iron mineral; they are formed by a diverse group of magnetotactic bacteria (MTB).
