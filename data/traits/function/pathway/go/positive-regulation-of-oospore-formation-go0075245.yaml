identifier: GO:0075245
label: "positive regulation of oospore formation"
definition: >-
  Any process that activates, maintains or increases the frequency, rate or extent of oospore formation, a process in which male and female gametangia develop and fuse to form a thick-walled resting spore of oomycetes.
