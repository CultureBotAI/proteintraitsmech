identifier: GO:0036522
label: "symbiont-mediated suppression of host protein localization to phagocytic vesicle"
definition: >-
  A process in which a symbiont inhibits or disrupts the normal localization of a protein to the host phagosome. The host is defined as the larger of the organisms involved in a symbiotic interaction.
