identifier: GO:0062042
label: "regulation of cardiac epithelial to mesenchymal transition"
definition: >-
  Any process that modulates the rate, frequency or extent of cardiac epithelial to mesenchymal transition, a transition where a cardiac epithelial cell loses apical/basolateral polarity, severs intercellular adhesive junctions, degrades basement membrane components and becomes a migratory mesenchymal cell.
