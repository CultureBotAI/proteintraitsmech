identifier: GO:0030209
label: "dermatan sulfate proteoglycan catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of dermatan sulfate proteoglycans, which consist of a core protein linked to a dermatan sulfate glycosaminoglycan. The dermatan sulfate chain is composed of the repeating disaccharide unit beta-(1,4)-D-hexuronic acid-beta-(1,3)-N-acetyl-D-galactosamine. The former can be a mixture of sulfated and nonsulfated D-glucuronic and L-iduronic acids and the latter can be O-sulfated.
