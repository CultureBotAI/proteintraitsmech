identifier: GO:0062236
label: "ionocyte differentiation"
definition: >-
  The process in which a relatively unspecialized cell acquires specialized structural and/or functional features of an ionocyte. Ionocytes are specialized epithelial cells that contribute to osmotic homeostasis.
