identifier: GO:0052460
label: "modulation of nutrient release by symbiont"
definition: >-
  Any process in which an organism modulates the frequency, rate or extent of the release of nutrients from a symbiont organism. The symbiont is defined as the smaller of the organisms involved in a symbiotic interaction.
