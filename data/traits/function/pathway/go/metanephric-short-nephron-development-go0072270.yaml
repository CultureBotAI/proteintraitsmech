identifier: GO:0072270
label: "metanephric short nephron development"
definition: >-
  The process whose specific outcome is the progression of a short nephron in the metanephros over time, from its formation to the mature structure. Short nephrons are associated with mid-cortical and superficial glomeruli, are situated entirely in the outer medulla, and have no thin ascending limb.
