identifier: GO:0141212
label: "phospholipase C/protein kinase C signal transduction"
definition: >-
  An intracellular signaling cassette that starts with activation of phospholipase C (PLC) activity and ends with the activation of protein kinase C (PKC). PLC produces inositol 1,4,5-trisphosphate (IP3) and diacylglycerol (DAG). IP3 regulates the opening of calcium channels in intracellular calcium store, leading to the release of calcium into the cytosol. Calcium and DAG activate protein kinase C (PKC), which in turn activates downstream effectors. This cassette is often part of the phospholipase C-activating G protein-coupled receptor signaling pathway.
