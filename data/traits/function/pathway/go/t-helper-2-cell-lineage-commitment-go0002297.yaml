identifier: GO:0002297
label: "T-helper 2 cell lineage commitment"
definition: >-
  The process in which a CD4-positive, alpha-beta T cell becomes committed to becoming a T-helper 2 cell, a CD4-positive, alpha-beta T cell specialized to promote immunological processes often associated with resistance to extracellular organisms such as helminths, enhanced production of particular antibody isotypes, and pathological conditions such as allergy.
