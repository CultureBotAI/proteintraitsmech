identifier: GO:0046679
label: "response to streptomycin"
definition: >-
  Any process that results in a change in state or activity of a cell or an organism (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of a streptomycin stimulus. Streptomycin is a commonly used antibiotic in cell culture media which acts only on prokaryotes and blocks transition from initiation complex to chain elongating ribosome.
