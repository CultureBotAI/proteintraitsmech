identifier: GO:0052156
label: "symbiont-mediated perturbation of host T-cell mediated immune response"
definition: >-
  A process in which a symbiont alters or subverts the T-cell mediated immune response of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
