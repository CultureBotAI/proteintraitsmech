identifier: GO:0075315
label: "positive regulation of basidium development"
definition: >-
  Any process that activates, maintains or increases the frequency, rate or extent of basidium development, a process that leads to the formation of basidium, a small, specialized club-shaped structure typically bearing four basidiospores at the tips of minute projections. The basidium is unique to basidiomycetes and distinguishes them from other kinds of fungi.
