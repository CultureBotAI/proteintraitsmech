identifier: GO:0141179
label: "symbiont-mediated evasion of recognition by host antimicrobial peptide"
definition: >-
  A process by which a symbiont avoids the effects of recognition by a host antimicrobial peptide by altering molecules on the symbiont surface. The host is defined as the larger of the organisms involved in a symbiotic interaction.
