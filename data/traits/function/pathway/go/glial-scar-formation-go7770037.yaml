identifier: GO:7770037
label: "glial scar formation"
definition: >-
  The process by which central nervous system glial and associated cells assemble and stabilize a dense, organized glial border at the site of injury. This involves proliferation and reorganization of reactive astrocytes and NG2 glia (oligodendrocyte precursor cells), deposition of extracellular matrix components, and formation of a barrier that modulates inflammation and regeneration.
