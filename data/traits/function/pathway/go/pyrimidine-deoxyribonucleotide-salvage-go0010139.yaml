identifier: GO:0010139
label: "pyrimidine deoxyribonucleotide salvage"
definition: >-
  The pathway by which pyrimidine bases or pyrimidine deoxyribonucleotides from pyrimidine nucleotide breakdown are converted back to pyrimidine deoxyribonucleotides. The salvage pathway is important where there is no de novo pyrimidine deoxyribonucleotide biosynthesis.
