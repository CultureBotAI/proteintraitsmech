identifier: GO:0007168
label: "receptor guanylyl cyclase signaling pathway"
definition: >-
  The series of molecular signals initiated by an extracellular ligand binding to a receptor on the surface of the target cell where the receptor possesses guanylyl cyclase activity, and converts GTP to cGMP upon activation, and ending with the regulation of a downstream cellular process, e.g. transcription.
