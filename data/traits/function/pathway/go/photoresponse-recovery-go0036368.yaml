identifier: GO:0036368
label: "photoresponse recovery"
definition: >-
  The processes required for a photoreceptor to recover, following light activation, so that it can respond to a subsequent light stimulus. Photoreceptor recovery requires the shutoff of active participants in the phototransduction cascade, including the visual pigment and downstream signal transducers.
