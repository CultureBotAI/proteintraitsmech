identifier: GO:0061163
label: "endoplasmic reticulum polarization"
definition: >-
  The endoplasmic reticulum organization process that results in the structure of the endoplasmic reticulum being oriented in the cell. Endoplasmic reticulum polarization serves as a mechanism to compartmentalize cellular activities and to establish cell polarity.
