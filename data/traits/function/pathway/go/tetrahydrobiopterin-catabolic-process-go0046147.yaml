identifier: GO:0046147
label: "tetrahydrobiopterin catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of tetrahydrobiopterin, the reduced form of biopterin (2-amino-4-hydroxy-6-(1,2-dihydroxypropyl)-pteridine). It functions as a hydroxylation coenzyme, e.g. in the conversion of phenylalanine to tyrosine.
