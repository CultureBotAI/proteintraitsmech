identifier: GO:0019288
label: "isopentenyl diphosphate biosynthetic process, methylerythritol phosphate pathway"
definition: >-
  The chemical reactions and pathways resulting in the formation of isopentenyl diphosphate by the methylerythritol phosphate pathway, also known as the mevalonate-independent pathway. Isopentenyl diphosphate (IPP) is the fundamental unit in isoprenoid biosynthesis and is produced from pyruvate and glyceraldehyde 3-phosphate via intermediates, including methylerythritol 4-phosphate.
