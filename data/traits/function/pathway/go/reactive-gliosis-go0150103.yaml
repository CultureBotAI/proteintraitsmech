identifier: GO:0150103
label: "reactive gliosis"
definition: >-
  A coordinated response of central nervous system (CNS) glial cells-including astrocytes, microglia, and NG2 glia-to injury, infection, or disease, characterized by changes in gene expression, morphology, proliferation, and extracellular matrix production. Reactive gliosis can range from transient glial activation to the formation of a persistent glial scar border.
