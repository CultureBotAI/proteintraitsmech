identifier: GO:0090300
label: "positive regulation of neural crest formation"
definition: >-
  Any process that increases the rate, frequency, or extent of neural crest formation. Neural crest formation is the formation of the specialized region of ectoderm between the neural ectoderm (neural plate) and non-neural ectoderm. The neural crest gives rise to the neural crest cells that migrate away from this region as neural tube formation proceeds.
