identifier: GO:0043061
label: "meiotic metaphase II chromosome alignment"
definition: >-
  A chromosome localization process whereby chromosomes are positioned in a specific order and orientation at the metaphase plate (spindle equator), during meiosis II chromosome segregation. This alignment ensures that each daughter cell will receive the correct number of chromosomes during cell division.
