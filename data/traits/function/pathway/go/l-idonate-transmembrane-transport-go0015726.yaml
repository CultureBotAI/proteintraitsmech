identifier: GO:0015726
label: "L-idonate transmembrane transport"
definition: >-
  The process in which L-idonate is transported across a lipid bilayer, from one side of a membrane to the other. L-idonate is an aldonic acid derived from L-idose, an aldohexose which is epimeric with D-glucose.
