identifier: GO:0021789
label: "branchiomotor neuron axon guidance in branchial arch mesenchyme"
definition: >-
  The process in which a branchiomotor neuron growth cone in the branchial arch mesenchyme is directed to a specific target site in the branchial arch mesenchyme. Branchiomotor neurons are located in the hindbrain and innervate branchial arch-derived muscles that control jaw movements, facial expression, the larynx, and the pharynx.
