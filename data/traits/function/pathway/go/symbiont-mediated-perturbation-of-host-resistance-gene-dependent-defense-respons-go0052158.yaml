identifier: GO:0052158
label: "symbiont-mediated perturbation of host resistance gene-dependent defense response"
definition: >-
  Any process in which a symbiont modulates the frequency, rate or extent of the resistance gene-dependent defense response of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
