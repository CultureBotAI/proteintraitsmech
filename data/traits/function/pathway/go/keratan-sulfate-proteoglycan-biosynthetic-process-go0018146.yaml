identifier: GO:0018146
label: "keratan sulfate proteoglycan biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of keratan sulfate proteoglycans, which consist of a core protein linked to a keratan sulfate glycosaminoglycan. The keratan sulfate chain is composed of the repeating disaccharide unit beta-(1,4)-N-acetyl-D-glucosamine-beta-(1,3)-galactose, both of which can be sulfated. Keratan sulfate chains can be covalently linked either to an asparagine residue (N-linked) of the core protein via a high mannose oligasacccharide linker or to serine/threonine residues (O-linked) of the core protein via a core 2 type-linker.
