identifier: GO:7770025
label: "intestinal type D enteroendocrine cell differentiation"
definition: >-
  The process in which relatively unspecialized cells acquire specialized structural and/or functional features of an intestinal type D enteroendocrine cell. Intestinal type D enteroendocrine cells are found in the gastrointestinal tract and in the pancreas and secrete somatostatin.
