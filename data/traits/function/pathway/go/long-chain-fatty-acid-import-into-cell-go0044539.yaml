identifier: GO:0044539
label: "long-chain fatty acid import into cell"
definition: >-
  The directed movement of a long-chain fatty acid from outside of a cell into a cell. This may occur via transport across the plasma membrane or via endocytosis. A long-chain fatty acid has an aliphatic tail containing 13 to 22 carbons.
