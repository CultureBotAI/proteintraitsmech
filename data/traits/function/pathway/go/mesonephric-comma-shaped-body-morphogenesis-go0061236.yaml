identifier: GO:0061236
label: "mesonephric comma-shaped body morphogenesis"
definition: >-
  The process in which the mesonephric comma-shaped body is generated and organized. The mesonephric comma-shaped body is the precursor structure to the mesonephric S-shaped body that contributes to the morphogenesis of a nephron in the mesonephros.
