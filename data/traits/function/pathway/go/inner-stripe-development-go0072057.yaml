identifier: GO:0072057
label: "inner stripe development"
definition: >-
  The process whose specific outcome is the progression of the inner stripe over time, from its formation to the mature structure. The inner stripe is a deep, centrally located portion of the renal outer medulla and is traversed by thin descending and thick ascending portions of the loops of Henle.
