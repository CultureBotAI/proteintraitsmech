identifier: GO:0048809
label: "analia morphogenesis"
definition: >-
  The process in which the anatomical structures of analia are generated and organized. The analia is the posterior-most vertral appendage that develops from the genital disc. An example of this process is analia morphogenesis in Drosophila melanogaster.
