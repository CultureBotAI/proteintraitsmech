identifier: GO:0035350
label: "FAD transmembrane transport"
definition: >-
  The process in which flavin-adenine dinucleotide (FAD) is transported across a membrane. FAD forms the coenzyme of the prosthetic group of various flavoprotein oxidoreductase enzymes, in which it functions as an electron acceptor by being reversibly converted to its reduced form.
