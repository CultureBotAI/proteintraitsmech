identifier: GO:0060586
label: "multicellular organismal-level iron ion homeostasis"
definition: >-
  A chemical homeostatic process involved in the maintenance of a steady state level of iron within extracellular body fluids, such as blood, xylem or phloem, of a multicellular organism. This is distinct from maintenance of cellular homeostasis, which occurs within a cell.
