identifier: GO:0072020
label: "proximal straight tubule development"
definition: >-
  The process whose specific outcome is the progression of the proximal straight tubule over time, from its formation to the mature structure. The proximal straight tubule is the part of the descending limb that extends from the proximal convoluted tubule to the descending thin tubule.
