identifier: GO:0075250
label: "negative regulation of aeciospore formation"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of aeciospore formation, a process in which a dikaryotic spore of typically a rust fungus is produced in an aecium.
