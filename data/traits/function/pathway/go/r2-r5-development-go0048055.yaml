identifier: GO:0048055
label: "R2/R5 development"
definition: >-
  The process whose specific outcome is the progression of the R2 and R5 pair of photoreceptors in the eye over time, from their formation to the mature structures. R2 and R5 are paired photoreceptors that contribute to the outer rhabdomeres. An example of this process is found in Drosophila melanogaster.
