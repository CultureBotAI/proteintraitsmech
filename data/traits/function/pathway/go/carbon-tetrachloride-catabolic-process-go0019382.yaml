identifier: GO:0019382
label: "carbon tetrachloride catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of carbon tetrachloride, a toxic, carcinogenic compound which is used as a general solvent in industrial degreasing operations. It is also used as grain fumigant and a chemical intermediate in the production of refrigerants.
