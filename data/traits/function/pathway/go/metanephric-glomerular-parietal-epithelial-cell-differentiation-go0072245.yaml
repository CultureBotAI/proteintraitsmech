identifier: GO:0072245
label: "metanephric glomerular parietal epithelial cell differentiation"
definition: >-
  The process in which a relatively unspecialized cell acquires specialized features of a metanephric glomerular parietal epithelial cell. Metanephric glomerular parietal epithelial cells are specialized epithelial cells that form tight junctions as a barrier to protein transport.
