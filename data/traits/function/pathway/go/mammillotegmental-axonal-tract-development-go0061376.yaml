identifier: GO:0061376
label: "mammillotegmental axonal tract development"
definition: >-
  The process in which the mammillotegmental tract progresses over time, from its formation to the mature structure. The mammillotegmental tract is the collection of axons that connects the ventral diencephalon to the tegmentum and pons.
