identifier: GO:0071948
label: "activation-induced B cell apoptotic process"
definition: >-
  B cell apoptotic process that occurs upon engagement of either the B cell receptor or CD40. Engagement of either receptor, but not both, leads to expression of fas or related receptors that make the B cell susceptible to fas-ligand mediated death.
