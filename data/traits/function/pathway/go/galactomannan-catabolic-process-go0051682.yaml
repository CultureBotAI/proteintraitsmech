identifier: GO:0051682
label: "galactomannan catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of galactomannan, a polysaccharide composed of D-galactosyl and D-mannosyl. The mannosyl units form the backbone structure (a linear main chain) with the D-galactosyl as single side units.
