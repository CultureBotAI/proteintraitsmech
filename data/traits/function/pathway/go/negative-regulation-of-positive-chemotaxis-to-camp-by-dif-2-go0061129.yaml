identifier: GO:0061129
label: "negative regulation of positive chemotaxis to cAMP by DIF-2"
definition: >-
  Any process that decreases the rate, frequency, or extent of directed movement of a motile cell or organism up a concentration gradient of 3',5'-cAMP by the action of DIF-2. DIF-2 is a chlorinated alkylphenone.
