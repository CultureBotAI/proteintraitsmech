identifier: GO:0055034
label: "Bolwig's organ development"
definition: >-
  The process whose specific outcome is the progression of the Bolwig's organ over time, from its formation to the mature structure. The larval eye in Drosophila is a relatively simple sensory system composed of Bolwig's organs: two clusters, each composed of 12 photoreceptor cells from which axons extend in a single fascicle to the brain.
