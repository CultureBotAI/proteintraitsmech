identifier: GO:0042256
label: "cytosolic ribosome assembly"
definition: >-
  The aggregation, arrangement and bonding together of the large and small ribosomal subunits into a functional cytosolic ribosome. Distinct stages of this process take place first in the nucleolus, then in the nucleus and finally in the cytosol.
