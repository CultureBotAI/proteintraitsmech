identifier: GO:0039013
label: "pronephric distal tubule morphogenesis"
definition: >-
  The process in which the anatomical structures of a pronephric nephron distal tubule are generated and organized. A pronephric nephron tubule is an epithelial tube that is part of the pronephros.
