identifier: GO:0080183
label: "response to photooxidative stress"
definition: >-
  Any process that results in a change in state or activity of a cell or organism (in terms of movement, secretion, enzyme production, gene expression, etc.) as the result of a photooxidative stress, the light-dependent generation of active oxygen species. The process begins with detection of the stimulus and ends with a change in state or activity or the cell or organism.
