identifier: GO:0075001
label: "adhesion of symbiont infection structure to host"
definition: >-
  The attachment of an infection structure of the symbiont to its host via adhesion molecules, general stickiness etc., either directly or indirectly. The host is defined as the larger of the organisms involved in a symbiotic interaction.
