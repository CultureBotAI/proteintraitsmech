identifier: GO:0072314
label: "glomerular epithelial cell fate commitment"
definition: >-
  The process in which the developmental fate of a cell becomes restricted such that it will develop into a glomerular epithelial cell. Glomerular epithelial cells are specialized epithelial cells that form part of the glomerulus; there are two types, glomerular parietal epithelial cells and glomerular visceral epithelial cells.
