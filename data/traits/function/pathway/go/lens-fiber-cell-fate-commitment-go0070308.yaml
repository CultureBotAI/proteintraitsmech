identifier: GO:0070308
label: "lens fiber cell fate commitment"
definition: >-
  The process in which the developmental fate of a cell becomes restricted such that it will develop into a lens fiber cell. A lens fiber cell is any of the elongated, tightly packed cells that make up the bulk of the mature lens in a camera-type eye.
