identifier: GO:0052542
label: "defense response by callose deposition"
definition: >-
  Any process in which callose is transported to, and/or maintained in, a specific location during the defense response. Callose is a linear 1,3-beta-d-glucan formed from UDP-glucose and is found in certain plant cell walls.
