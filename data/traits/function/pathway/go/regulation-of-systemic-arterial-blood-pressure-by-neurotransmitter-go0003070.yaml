identifier: GO:0003070
label: "regulation of systemic arterial blood pressure by neurotransmitter"
definition: >-
  The regulation of blood pressure mediated by a neurotransmitter. A neurotransmitter is any of a group of substances that are released on excitation from the axon terminal of a presynaptic neuron of the central or peripheral nervous system and travel across the synaptic cleft to either excite or inhibit the target cell.
