identifier: GO:0045108
label: "regulation of intermediate filament polymerization or depolymerization"
definition: >-
  Any process that modulates the frequency, rate or extent of the assembly or disassembly of intermediate filaments by the addition or removal of monomers from a filament; this usually occurs through the opposing action of kinases and phosphatases.
