identifier: GO:0001572
label: "lactosylceramide biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of lactosylceramides that begins with the synthesis of a disaccharide core 4-Gal-beta-1,4-Glc-ceramide. This core can be further elongated with the sequential addition of various carbohydrate units and is also the precursor for the synthesis of gangliosides, globosides and isoglobosides.
