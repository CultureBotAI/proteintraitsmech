identifier: GO:0060360
label: "negative regulation of leucine import in response to ammonium ion"
definition: >-
  Any process that decreases the rate, frequency or extent of leucine import as a result of an ammonium ion stimulus. Leucine import is the directed movement of leucine into a cell or organelle.
