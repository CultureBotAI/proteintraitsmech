identifier: GO:0042337
label: "cuticle development involved in chitin-based cuticle molting cycle"
definition: >-
  The synthesis and deposition of a chitin-based non-cellular, hardened, or membranous secretion from an epithelial sheet, occurring as part of the molting cycle. An example of this is found in Drosophila melanogaster.
