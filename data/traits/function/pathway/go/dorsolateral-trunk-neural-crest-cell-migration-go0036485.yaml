identifier: GO:0036485
label: "dorsolateral trunk neural crest cell migration"
definition: >-
  The movement of trunk neural crest cells from the neural tube, travelling dorso-laterally into the ectoderm and continuing toward the ventral midline of the belly. These migrating trunk neural crest cells become melanocytes, the melanin-forming pigment cells.
