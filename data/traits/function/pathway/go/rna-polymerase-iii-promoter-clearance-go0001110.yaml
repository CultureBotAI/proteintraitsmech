identifier: GO:0001110
label: "RNA polymerase III promoter clearance"
definition: >-
  A process that mediates the transition from the initiation to the elongation phases of transcription by RNA polymerase III, generally including a conformational change from the initiation conformation to the elongation conformation. Promoter clearance often involves breaking contact with transcription factors involved only in the initiation phase.
