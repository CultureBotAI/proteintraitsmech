identifier: GO:0098670
label: "entry receptor-mediated virion attachment to host cell"
definition: >-
  The process by which a virion attaches to a host cell by binding to a receptor on the host cell surface that mediates/triggers viral entry by endocytosis/pinocytosis or by inducing fusion/penetration.
