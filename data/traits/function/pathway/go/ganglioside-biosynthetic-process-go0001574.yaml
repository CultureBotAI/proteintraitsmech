identifier: GO:0001574
label: "ganglioside biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of gangliosides that begins with the synthesis of a tetrasaccharide core Gal-beta-1,3-GalNAc-beta-1,4-Gal-beta-1,4-Glc-ceramide. This core can be further elongated with the sequential addition of various carbohydrate units including the addition of one or more sialic acid residues.
