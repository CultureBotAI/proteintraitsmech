identifier: GO:0180063
label: "protein O-linked glycosylation via arabinose"
definition: >-
  A glycoprotein biosynthetic process starting with the covalent linkage of an arabinose via a beta-glycosidic bond to the oxygen atom of the hydroxyl group of a hydroxyproline in a protein, which can be further elongated with the sequential addition of sugar units resulting in the formation of a protein O-linked glycan.
