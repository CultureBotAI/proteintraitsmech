identifier: GO:0061285
label: "mesonephric capsule development"
definition: >-
  The progression of the mesonephric capsule over time, from its formation to the mature structure. The mesonephric capsule is the tough fibrous layer surrounding the mesonephros, covered in a thick layer of perinephric adipose tissue.
