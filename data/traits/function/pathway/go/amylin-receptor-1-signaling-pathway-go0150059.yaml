identifier: GO:0150059
label: "amylin receptor 1 signaling pathway"
definition: >-
  The series of molecular signals initiated by an extracellular amylin, or another ligand, combining with an amylin receptor 1 (AMY1), a G protein-coupled receptor complex, on the surface of the target cell. Other ligands that have been shown to initiate the AMY1 signaling pathway include the calcitonin related peptide (CGRP) and adrenomedullin (AM/ADM).
