identifier: GO:0010392
label: "galactoglucomannan metabolic process"
definition: >-
  The chemical reactions and pathways involving galactoglucomannan, a polysaccharide composed of D-glucose, D-galactose and D-mannose. The mannose units form the backbone structure (a linear main chain) decorated with a mixture of D-glucose and D-galactose side-units.
