identifier: GO:0006086
label: "pyruvate decarboxylation to acetyl-CoA"
definition: >-
  The chemical reactions and pathways resulting in the formation of acetyl-CoA from pyruvate. In most organisms, this pathway links glycolysis to the TCA cycle, by a series of three reactions carried out by a multisubunit complex called the 'pyruvate dehydrogenase complex', even though pyruvate dehydrogenase activity describes only one of those reactions. The combination of the three reactions can be summarized as: pyruvate + coenzyme A + NAD+ -> acetyl-CoA + CO2 + NADH.
