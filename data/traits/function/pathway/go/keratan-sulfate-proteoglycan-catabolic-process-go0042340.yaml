identifier: GO:0042340
label: "keratan sulfate proteoglycan catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of keratan sulfate proteoglycans, which consist of a core protein linked to a keratan sulfate glycosaminoglycan. The keratan sulfate chain is composed of the repeating disaccharide unit beta-(1,4)-N-acetyl-D-glucosamine-beta-(1,3)-galactose, both of which can be sulfated.
