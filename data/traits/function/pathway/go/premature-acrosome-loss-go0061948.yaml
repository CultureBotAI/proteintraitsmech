identifier: GO:0061948
label: "premature acrosome loss"
definition: >-
  The discharge, by sperm, of a single, anterior secretory granule before the sperm reaches to the zona pellucida of the oocyte. The process begins with the fusion of the outer acrosomal membrane with the sperm plasma membrane and ends with the exocytosis of the acrosomal contents.
