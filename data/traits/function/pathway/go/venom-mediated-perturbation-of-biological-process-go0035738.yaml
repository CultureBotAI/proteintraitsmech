identifier: GO:0035738
label: "venom-mediated perturbation of biological process"
definition: >-
  A process by which an organism alters or subverts a biological process in another organism via the action of a venom. Venoms are injected into the prey by a bite or a sting. Venoms cause their biological effects via the many toxins that they contain; some venoms are complex mixtures of toxins of differing types. Venoms can serve as predation mechanisms or defense responses.
