identifier: GO:0036162
label: "oxytocin production"
definition: >-
  The appearance of oxytocin, a cyclic nonapeptide hormone with amino acid sequence CYIQNCPLG, due to biosynthesis or secretion following a cellular stimulus, resulting in an increase in its intracellular or extracellular levels. Oxytocin is the principal uterine-contracting and milk-ejecting hormone of the posterior pituitary, and together with the neuropeptide vasopressin, is believed to influence social cognition and behavior. It also acts as a neurotransmitter in the brain.
