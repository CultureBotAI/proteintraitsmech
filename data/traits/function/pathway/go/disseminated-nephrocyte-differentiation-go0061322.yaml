identifier: GO:0061322
label: "disseminated nephrocyte differentiation"
definition: >-
  The process in which a relatively unspecialized cell acquires the specialized structural and/or functional features of a disseminated nephrocyte. A disseminated nephrocyte is an insect renal cell that filters hemolymph and is found at scattered locations in the fat body or other tissues. Differentiation includes the processes involved in commitment of a cell to a specific fate and its subsequent development to the mature state.
