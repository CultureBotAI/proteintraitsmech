identifier: GO:7770021
label: "intestinal type G enteroendocrine cell differentiation"
definition: >-
  The process in which relatively unspecialized cells acquire specialized structural and/or functional features of an intestinal type G enteroendocrine cell. Intestinal type G enteroendocrine cells are found in the stomach and duodenum and are responsible for the secretion of gastrin and enkephalin.
