identifier: GO:0018915
label: "ethylbenzene catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of ethylbenzene (phenylethane), a benzene derivative with an ethyl group attached to the ring. It is a colorless liquid with a pungent odor used as a solvent and as a component of automotive and aviation fuels.
