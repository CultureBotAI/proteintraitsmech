identifier: GO:0120109
label: "mitotic telomere clustering and tethering at nuclear periphery"
definition: >-
  The process in which the telomeres are gathered together to a small number of foci per chromosome (usually one per chromosome or fewer), and moved to and tethered at the nuclear periphery, as part of a mitotic cell cycle.
