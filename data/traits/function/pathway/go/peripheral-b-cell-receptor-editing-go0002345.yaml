identifier: GO:0002345
label: "peripheral B cell receptor editing"
definition: >-
  The process that takes place mainly in germinal center B cells in which a large number of mutations are generated in the heavy chain and light chain V-region genes and their immediately surrounding introns in order to increase antibody diversity and contribute to affinity maturation.
