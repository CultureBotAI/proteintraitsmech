identifier: GO:0015736
label: "hexuronate transmembrane transport"
definition: >-
  The process in which hexuronate is transported across a lipid bilayer, from one side of a membrane to the other. A hexuronate is any monocarboxylic acid derived from a hexose by oxidation of C-6.
