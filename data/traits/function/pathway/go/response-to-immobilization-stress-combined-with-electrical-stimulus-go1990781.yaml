identifier: GO:1990781
label: "response to immobilization stress combined with electrical stimulus"
definition: >-
  Any process that results in a change in state or activity of a cell or an organism (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of an electrical stimulus given while being held immobile.
