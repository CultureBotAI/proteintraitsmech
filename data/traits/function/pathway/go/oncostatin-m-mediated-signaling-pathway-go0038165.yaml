identifier: GO:0038165
label: "oncostatin-M-mediated signaling pathway"
definition: >-
  The series of molecular signals initiated by oncostatin-M (OSM) binding to its receptor on the surface of a target cell, and ending with the regulation of a downstream cellular process, e.g. transcription. OSM can signal via at least two different receptors (a specific receptor and a LIF receptor) to activate different downstream signal transduction pathways.
