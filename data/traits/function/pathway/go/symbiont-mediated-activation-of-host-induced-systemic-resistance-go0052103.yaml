identifier: GO:0052103
label: "symbiont-mediated activation of host induced systemic resistance"
definition: >-
  Any process in which a symbiont activates, maintains or increases the frequency, rate or extent of induced systemic resistance in the host organism; induced systemic resistance is a response that confers broad spectrum systemic resistance to disease and that does not depend upon salicylic acid signaling. The host is defined as the larger of the organisms involved in a symbiotic interaction.
