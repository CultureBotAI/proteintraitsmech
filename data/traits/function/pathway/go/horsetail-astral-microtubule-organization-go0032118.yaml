identifier: GO:0032118
label: "horsetail-astral microtubule organization"
definition: >-
  A process that is carried out at the cellular level which results in the assembly, arrangement of constituent parts, or disassembly of the horsetail-astral array, a structure of astral microtubules that emanates from the spindle pole body during meiosis.
