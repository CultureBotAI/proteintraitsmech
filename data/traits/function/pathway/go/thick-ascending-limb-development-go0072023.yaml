identifier: GO:0072023
label: "thick ascending limb development"
definition: >-
  The process whose specific outcome is the progression of the thick ascending limb over time, from its formation to the mature structure. The thick ascending limb is the last part of the loop of Henle. Its thick, mitochondria-rich epithelium characterizes the outer medulla, and is responsible for very avid active salt transport. At the macula densa, the thick ascending limb connects to the distal convoluted tubule.
