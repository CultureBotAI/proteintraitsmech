identifier: GO:1990974
label: "actin-dependent nuclear migration"
definition: >-
  The process whereby the centrosome is held at the cell center while the nucleus moves to the cell rear by actin retrograde flow resulting in the position of the centrosome between the nucleus and the leading edge of the cell.
