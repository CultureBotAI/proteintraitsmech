identifier: GO:0035777
label: "pronephric distal tubule development"
definition: >-
  The process whose specific outcome is the progression of the pronephric distal tubule over time, from its formation to the mature structure. A pronephric nephron tubule is an epithelial tube that is part of the pronephros.
