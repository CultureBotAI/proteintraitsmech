identifier: GO:0043396
label: "corticotropin-releasing hormone secretion"
definition: >-
  The regulated release of corticotropin-releasing hormone (CRH), a polypeptide hormone involved in the stress response. CRH is produced by the hypothalamus and stimulates corticotropic cells of the anterior lobe of the pituitary to produce corticotropic hormone (CTH) and other biologically active substances e.g. 2-endorphin, release of CRH is affected by serum levels of cortisol, by stress and by the sleep/wake cycle.
