identifier: GO:0052092
label: "positive regulation of nutrient release by host"
definition: >-
  Any process in which an organism activates, maintains or increases the frequency, rate or extent of the release of nutrients from its host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
