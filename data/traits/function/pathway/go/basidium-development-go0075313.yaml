identifier: GO:0075313
label: "basidium development"
definition: >-
  The process that leads to the development of basidium, a small, specialized club-shaped structure typically bearing four basidiospores at the tips of minute projections. The basidium is unique to Basidiomycetes and distinguishes them from other kinds of fungi.
