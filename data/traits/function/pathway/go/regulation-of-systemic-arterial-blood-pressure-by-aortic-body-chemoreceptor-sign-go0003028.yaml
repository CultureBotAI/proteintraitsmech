identifier: GO:0003028
label: "regulation of systemic arterial blood pressure by aortic body chemoreceptor signaling"
definition: >-
  The process that modulates blood pressure by the action of chemoreceptors found in the aortic bodies and their resultant modulation of the vasomotor center. Chemoreceptors respond to oxygen, carbon dioxide and hydrogen ions.
