identifier: GO:0075287
label: "positive regulation of sporangiospore formation"
definition: >-
  Any process that activates, maintains or increases the frequency, rate or extent of sporangiospore formation, a process in which sporangiospores, a type of asexual spore found in fungi, are formed. Sporangiospores are formed within sac-like structure, the sporangium, following the division of the cytoplasm.
