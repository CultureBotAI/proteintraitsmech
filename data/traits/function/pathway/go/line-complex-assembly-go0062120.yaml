identifier: GO:0062120
label: "LinE complex assembly"
definition: >-
  The aggregation, arrangement and bonding together of a set of components during meiotic prophase to form a LinE complex, the protein complex that associates with chromatin to form linear elements in fission yeast. In S. pombe, the LinE complex contains four main structural components (Rec10, Rec25, Rec27, and Mug20) and other associated proteins.
