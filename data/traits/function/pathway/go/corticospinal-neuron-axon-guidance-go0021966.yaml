identifier: GO:0021966
label: "corticospinal neuron axon guidance"
definition: >-
  The process in which the migration of an axon growth cone of a neuron that is part of the corticospinal tract is directed from the cerebral cortex layer V to the spinal cord dorsal funiculus in response to a combination of attractive and repulsive cues.
