identifier: GO:0062248
label: "cleistothecium formation"
definition: >-
  The process of producing a cleistothecium, a closed sexual fruiting body that contains ascospores in linear asci. Cleistothecia are present in some filamentous Ascomycete fungi such as members of the genera Aspergillus and Emericella.
