identifier: GO:0003261
label: "cardiac muscle progenitor cell migration to the midline involved in heart field formation"
definition: >-
  The orderly movement of a myocardial progenitor cell toward the midline to form the heart field. Cardiac muscle progenitor cells are non-terminally differentiated, mesoderm-derived cells that are committed to differentiate into myocardial cells of the heart.
