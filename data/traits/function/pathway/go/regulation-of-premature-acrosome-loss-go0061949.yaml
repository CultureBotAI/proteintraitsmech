identifier: GO:0061949
label: "regulation of premature acrosome loss"
definition: >-
  Any process that modulates the rate, frequency or extent of the discharge, by sperm, of a single, anterior secretory granule before the sperm reaches to the zona pellucida of the oocyte. The process begins with the fusion of the outer acrosomal membrane with the sperm plasma membrane and ends with the exocytosis of the acrosomal contents.
