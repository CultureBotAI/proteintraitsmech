label: "siderophore-dependent iron import pathway"
definition: >-
  A process in which iron siderophores (low-molecular-weight, high-affinity iron-chelating compounds) are exported to scavenge iron and the iron-loaded siderophores imported back into the cell by transmembrane transport or endocytosis.
