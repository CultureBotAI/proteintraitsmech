identifier: GO:0009779
label: "noncyclic photosynthetic phosphorylation"
definition: >-
  A photosynthetic phosphorylation process in which ATP synthesis is linked to the transport of electrons from water to NADP+ with the production of NADPH and dioxygen (O2). Involves photosystem I and photosystem II.
