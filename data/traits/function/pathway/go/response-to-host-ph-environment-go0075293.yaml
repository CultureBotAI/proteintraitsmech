identifier: GO:0075293
label: "response to host pH environment"
definition: >-
  Any process that results in a change in state or activity of the symbiont or its cell (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of the pH conditions in or around its host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
