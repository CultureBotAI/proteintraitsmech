identifier: GO:0090094
label: "metanephric cap mesenchymal cell proliferation involved in metanephros development"
definition: >-
  The multiplication or reproduction of metanephric cap mesenchymal cells, resulting in the expansion of the cell population. A metanephric cap mesenchymal cell is a mesenchymal cell that has condensed with other mesenchymal cells surrounding the ureteric bud tip.
