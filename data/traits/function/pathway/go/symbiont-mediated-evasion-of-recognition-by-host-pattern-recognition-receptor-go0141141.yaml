identifier: GO:0141141
label: "symbiont-mediated evasion of recognition by host pattern recognition receptor"
definition: >-
  A process by which a symbiont avoids recognition by host's innate immune response by altering or concealing a conserved molecule recognized by the host's cell surface and intracellular pattern recognition receptors, including Toll-like and NOD-like receptors. The host is defined as the larger of the organisms involved in a symbiotic interaction.
