identifier: GO:0042784
label: "symbiont-mediated suppression of host complement activation"
definition: >-
  A process by which a symbiont inhibits or disrupts the normal execution of the activation of complement in its host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
