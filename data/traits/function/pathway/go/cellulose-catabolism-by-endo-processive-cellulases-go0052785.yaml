identifier: GO:0052785
label: "cellulose catabolism by endo-processive cellulases"
definition: >-
  The breakdown into simpler components of cellulose. Catabolism is initiated by endohydrolytic attacks on the cellulose chain, and the resulting pieces are further degraded by cellulase enzymes to produce smaller and smaller fragments.
