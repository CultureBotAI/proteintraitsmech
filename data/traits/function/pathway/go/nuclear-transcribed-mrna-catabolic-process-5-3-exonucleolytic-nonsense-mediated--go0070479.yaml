identifier: GO:0070479
label: "nuclear-transcribed mRNA catabolic process, 5'-3' exonucleolytic nonsense-mediated decay"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of the nuclear-transcribed mRNA transcript body of an mRNA in which an amino-acid codon has changed to a nonsense codon; occurs when the 5' end is not protected by a 5'-cap; degradation proceeds in the 5' to 3' direction.
