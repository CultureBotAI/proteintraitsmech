identifier: GO:0061286
label: "mesonephric capsule morphogenesis"
definition: >-
  The process in which the anatomical structures of the mesonephric capsule are generated and organized. The mesonephric capsule is the tough fibrous layer surrounding the mesonephros, covered in a thick layer of perinephric adipose tissue. It provides some protection from trauma and damage.
