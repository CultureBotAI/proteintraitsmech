identifier: GO:0015901
label: "cycloheximide transport"
definition: >-
  The directed movement of cycloheximide into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore. Cycloheximide is an antibiotic produced by Streptomyces which interferes with protein synthesis in eukaryotes.
