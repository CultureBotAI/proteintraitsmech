identifier: GO:0098672
label: "symbiont-mediated suppression of host CRISPR-cas system"
definition: >-
  A process by which a symbiont inhibits or disrupts the CRISPR-cas system of its host. Bacteria and archaea use CRISPR-Cas adaptive immune systems to defend themselves from infection by bacteriophages (phages), and phages have various mechanisms to counter the CRISPR-cas system.
