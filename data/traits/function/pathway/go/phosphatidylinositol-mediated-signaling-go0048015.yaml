identifier: GO:0048015
label: "phosphatidylinositol-mediated signaling"
definition: >-
  The series of molecular signals in which a cell uses a phosphatidylinositol-mediated signaling to convert a signal into a response. Phosphatidylinositols include phosphatidylinositol (PtdIns) and its phosphorylated derivatives.
