identifier: GO:0085032
label: "symbiont-mediated perturbation of host NF-kappaB cascade"
definition: >-
  A process in which a symbiont alters or subverts an NF-kappaB-mediated signaling cascade in its host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
