identifier: GO:0141196
label: "transposable element silencing by piRNA-mediated DNA methylation"
definition: >-
  A transposable element silencing mechanism mediated by Piwi-associated RNA (piRNA)-directed DNA methylation. This results in a heterochromatin assembly, a chromatin conformation that is refractory to transcription.
