identifier: GO:0051844
label: "translocation of peptides or proteins into symbiont"
definition: >-
  The directed movement of peptides or proteins produced by an organism to a location inside the symbiont organism. The symbiont is defined as the smaller of the organisms involved in a symbiotic interaction.
