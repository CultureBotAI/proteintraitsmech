identifier: GO:0036346
label: "cellular response to L-cysteine"
definition: >-
  Any process that results in a change in state or activity of a cell (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of a L-cysteine stimulus. L-cysteine is an optically active form of cysteine having L-configuration.
