identifier: GO:0044382
label: "CLRC complex localization to heterochromatin"
definition: >-
  The process by which a CLRC complex is transported to, or maintained in, heterochromatin. CLRC complex is an active cullin-dependent E3 ubiquitin ligase complex essential for heterochromatin assembly by RNAi and histone H3K9 methylation.
