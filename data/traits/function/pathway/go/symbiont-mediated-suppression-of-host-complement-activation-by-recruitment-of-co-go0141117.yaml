identifier: GO:0141117
label: "symbiont-mediated suppression of host complement activation by recruitment of complement control protein"
definition: >-
  A process by which a symbiont prevents the activation of host complement by binding a soluble complement control protein (CCP) of the host and recruiting it to the microbe surface. The normal role of CCPs is to prevent complement activation on 'self' cellular targets. When soluble CCPs are recuited to the surface of a microbe, the complement fails to activate.
