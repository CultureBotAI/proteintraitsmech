identifier: GO:0001177
label: "regulation of transcription open complex formation at RNA polymerase II promoter"
definition: >-
  Any process that modulates the rate, frequency or extent of a process involved the melting of the DNA hybrid of the core promoter region within the transcriptional closed complex of an RNA polymerase II preinitiation complex (PIC) to produce an open complex where the DNA duplex around the transcription initiation site is unwound to form the transcription bubble.
