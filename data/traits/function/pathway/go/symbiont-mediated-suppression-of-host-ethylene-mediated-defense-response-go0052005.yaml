identifier: GO:0052005
label: "symbiont-mediated suppression of host ethylene-mediated defense response"
definition: >-
  A process in which a symbiont inhibits or disrupts the normal execution of the ethylene-mediated defense response of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
