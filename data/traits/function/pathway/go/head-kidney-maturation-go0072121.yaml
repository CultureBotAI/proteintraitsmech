identifier: GO:0072121
label: "head kidney maturation"
definition: >-
  A developmental process, independent of morphogenetic (shape) change, that is required for the head kidney to attain its fully functional state. The head kidney is a pronephros that consists of fused bilateral lobes located in the anterior part of the kidney.
