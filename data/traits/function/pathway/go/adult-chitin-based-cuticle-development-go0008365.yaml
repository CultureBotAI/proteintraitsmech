identifier: GO:0008365
label: "adult chitin-based cuticle development"
definition: >-
  Synthesis and deposition of the chitin-based cuticle of adults following the apolysis of the pupal cuticle. The adult insect cuticle contains cuticullin, a protein epicuticle and a lamellate procuticle. An example of this process is adult chitin-based cuticle development in Drosophila melanogaster.
