identifier: GO:0010691
label: "negative regulation of ribosomal protein gene transcription from RNA polymerase II promoter in response to nutrient levels"
definition: >-
  Any process that decreases the frequency, rate or extent of the synthesis of RNA from ribosomal protein genes by RNA polymerase II, originating at an RNA polymerase II promoter, as a result of a stimulus reflecting the presence, absence, or concentration of nutrients.
