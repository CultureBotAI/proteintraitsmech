identifier: GO:0033660
label: "symbiont-mediated suppression of host resistance gene-dependent defense response"
definition: >-
  A process in which a symbiont inhibits or disrupts the normal execution of the resistance gene-dependent defense response of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
