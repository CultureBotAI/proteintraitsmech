identifier: GO:0120310
label: amastigogenesis
definition: >-
  The morphological, biochemical and genetic changes that induce the differentiation of metacyclic parasites into amastigotes in some of the Trypanosomatidae species such as Leishmania parasites and Trypanosoma cruzi. This process occurs inside the cells of the mammalian hosts, particularly in macrophages and other phagocytic cells for Leishmania parasites.
