identifier: GO:0021858
label: "GABAergic neuron differentiation in basal ganglia"
definition: >-
  The process in which a neuroblast acquires the specialized structural and functional features of a GABAergic inhibitory neuron in the basal ganglia. Differentiation includes the processes involved in commitment of a neuroblast to a GABAergic neuron.
