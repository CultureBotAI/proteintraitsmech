identifier: GO:0002753
label: "cytoplasmic pattern recognition receptor signaling pathway"
definition: >-
  The series of molecular signals initiated by the binding of a ligand from another organism to a cytoplasmic pattern recognition receptor (PRR). PRRs bind pathogen-associated molecular pattern (PAMPs), structures conserved among microbial species.
