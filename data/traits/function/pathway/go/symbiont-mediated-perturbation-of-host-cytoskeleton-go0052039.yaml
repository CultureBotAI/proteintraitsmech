identifier: GO:0052039
label: "symbiont-mediated perturbation of host cytoskeleton"
definition: >-
  The process in which an organism effects a change that impairs the structure or function of the host cytoskeleton. The host is defined as the larger of the organisms involved in a symbiotic interaction.
