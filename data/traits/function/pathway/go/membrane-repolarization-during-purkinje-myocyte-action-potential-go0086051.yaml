identifier: GO:0086051
label: "membrane repolarization during Purkinje myocyte action potential"
definition: >-
  The process in which ions are transported across a membrane such that the Purkinje myocyte membrane potential changes in the direction from the positive membrane potential at the peak of the action potential towards the negative resting potential.
