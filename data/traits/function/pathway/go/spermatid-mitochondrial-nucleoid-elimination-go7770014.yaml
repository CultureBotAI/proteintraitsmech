identifier: GO:7770014
label: "spermatid mitochondrial nucleoid elimination"
definition: >-
  The process in which spermatids lose their mitochondrial nucleoids during spermatid development. This process involves the controlled elimination of mitochondrial DNA-protein complexes while preserving the mitochondrial membranes and and contributes to maternal mitochondrial inheritance patterns by inhibiting paternal transmission.
