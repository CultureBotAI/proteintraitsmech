identifier: GO:0090318
label: "regulation of chylomicron remodeling"
definition: >-
  Any process that modulates the rate, frequency, or extent of chylomicron remodeling. Chylomicron remodeling is the acquisition, loss or modification of a protein or lipid within a chylomicron, including the hydrolysis of triglyceride by lipoprotein lipase and the subsequent loss of free fatty acid.
