identifier: GO:0141063
label: "epigenetic programming in the central cell"
definition: >-
  The establishment of epigenetic modifications (imprints) in a plant central cell, leading to an asymmetry between the two maternal alleles and the paternal allele, and differential expression of the corresponding alleles in the developing endosperm. This can happen through heterochromatin formation or differential chromatin loop formation.
