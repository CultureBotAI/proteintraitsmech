identifier: GO:0072228
label: "metanephric prebend segment development"
definition: >-
  The process whose specific outcome is the progression of the metanephric prebend segment over time, from its formation to the mature structure. The metanephric prebend segment is a part of the metanephric descending thin limb that lies before the bend and exhibits permeabilities characteristic of the ascending limb, especially negligible water permeability.
