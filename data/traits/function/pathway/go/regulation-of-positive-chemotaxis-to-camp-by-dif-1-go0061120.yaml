identifier: GO:0061120
label: "regulation of positive chemotaxis to cAMP by DIF-1"
definition: >-
  Any process that modulates the rate, frequency, or extent of directed movement of a motile cell or organism up a concentration gradient of 3',5'-cAMP by the action of DIF-1. DIF-1 is a chlorinated alkylphenone.
