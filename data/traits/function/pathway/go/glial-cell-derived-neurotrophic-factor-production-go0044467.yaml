label: "glial cell-derived neurotrophic factor production"
definition: >-
  The regulated release of glial cell line-derived neurotrophic factor from a cell. Glial cell-derived neurotrophic factor (GDNF) is a small protein that potently promotes the survival of many types of neurons, notably dopaminergic and motor neurons.
