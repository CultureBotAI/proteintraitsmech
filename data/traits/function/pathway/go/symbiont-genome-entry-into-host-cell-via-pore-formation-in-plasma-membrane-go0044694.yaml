identifier: GO:0044694
label: "symbiont genome entry into host cell via pore formation in plasma membrane"
definition: >-
  Entry of a symbiont's genome into a host cell by a pore formed by the symbiont in the host cell. Examples of this process include injection by a non-enveloped virus of the viral genome into the host cytoplasm, usually mediated by a viral pore-forming peptide associated with the viral capsid or bacteriophage tail.
