identifier: GO:0061583
label: "colon epithelial cell chemotaxis"
definition: >-
  The directed movement of a colon epithelial cell guided by a specific chemical concentration gradient. Movement may be towards a higher concentration (positive chemotaxis) or towards a lower concentration (negative chemotaxis).
