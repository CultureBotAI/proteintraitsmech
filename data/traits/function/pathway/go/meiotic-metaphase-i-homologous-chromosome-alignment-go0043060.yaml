identifier: GO:0043060
label: "meiotic metaphase I homologous chromosome alignment"
definition: >-
  A cell cycle process whereby homlogous chromosomes are positioned in a specific order and orientation at the metaphase plate (spindle equator) by the spindle machinery and centromere/kinetochore arrangement during meiosis I chromosome segregation. This alignment ensures that each daughter cell will receive the correct number of chromosomes during cell division.
