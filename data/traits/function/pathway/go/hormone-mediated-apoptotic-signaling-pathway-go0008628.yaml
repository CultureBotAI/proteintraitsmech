identifier: GO:0008628
label: "hormone-mediated apoptotic signaling pathway"
definition: >-
  The series of molecular signals mediated by the detection of a hormone, and which triggers the apoptotic signaling pathway in a cell. The pathway starts with reception of a hormone signal, and ends when the execution phase of apoptosis is triggered.
