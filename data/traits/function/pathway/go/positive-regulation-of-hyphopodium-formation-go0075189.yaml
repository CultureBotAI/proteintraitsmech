identifier: GO:0075189
label: "positive regulation of hyphopodium formation"
definition: >-
  Any process that activates or increases the frequency, rate or extent of symbiont hyphopodium formation on or near its host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
