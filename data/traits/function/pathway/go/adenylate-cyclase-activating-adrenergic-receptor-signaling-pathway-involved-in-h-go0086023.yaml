label: "adenylate cyclase-activating adrenergic receptor signaling pathway involved in heart process"
definition: >-
  The series of molecular signals beginning with a G protein-coupled adrenergic cell surface receptor combining with epinephrine or norepinephrine, to activate adenylate cyclase, which contributes to a circulatory system process carried out by the heart.
