identifier: GO:0036061
label: "muscle cell chemotaxis toward tendon cell"
definition: >-
  The directed movement of a muscle cell towards a tendon cell in response to an external stimulus. Tendon cells, for example, produce positive guidance cues that attract muscle cells.
