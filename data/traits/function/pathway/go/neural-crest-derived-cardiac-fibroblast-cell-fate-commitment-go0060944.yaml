identifier: GO:0060944
label: "neural crest-derived cardiac fibroblast cell fate commitment"
definition: >-
  The commitment of neural crest cells to a cardiac fibroblast fate and their capacity to differentiate into cardiac fibroblast cells. A cardiac fibroblast is a connective tissue cell in the heart which secretes an extracellular matrix rich in collagen and other macromolecules.
