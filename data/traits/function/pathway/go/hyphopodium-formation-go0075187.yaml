identifier: GO:0075187
label: "hyphopodium formation"
definition: >-
  The process in which a specialized structure, consisted of stalked, thick-walled, lobed cells of vegetative epiphytic hyphae, is formed, to attach and penetrate the host surface. The host is defined as the larger of the organisms involved in a symbiotic interaction.
