identifier: GO:0051215
label: "RNAi-mediated antiviral immunity against DNA virus"
definition: >-
  An RNAi-mediated post-transcriptional gene silencing pathway induced by DNA viruses leading to a sequence-specific degradation of target mRNAs or inhibition of translation. In plants, DCL3 is the primary Dicer to detect DNA viruses.
