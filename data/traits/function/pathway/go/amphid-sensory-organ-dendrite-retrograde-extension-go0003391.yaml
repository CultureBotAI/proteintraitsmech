identifier: GO:0003391
label: "amphid sensory organ dendrite retrograde extension"
definition: >-
  The progression of an amphid sensory organ's neuronal dendrite over time by the attachment of a part of the cell to an anchor and the subsequent migration of the cell body away from the anchor point.
