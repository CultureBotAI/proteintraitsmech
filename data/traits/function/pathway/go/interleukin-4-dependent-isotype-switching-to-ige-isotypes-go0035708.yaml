identifier: GO:0035708
label: "interleukin-4-dependent isotype switching to IgE isotypes"
definition: >-
  The switching of activated B cells from IgM biosynthesis to IgE biosynthesis, accomplished through a recombination process involving an intrachromosomal deletion between switch regions that reside 5' of the IgM and IgE constant region gene segments in the immunoglobulin heavy chain locus, that is dependent on the activity of interleukin 4 (IL-4).
