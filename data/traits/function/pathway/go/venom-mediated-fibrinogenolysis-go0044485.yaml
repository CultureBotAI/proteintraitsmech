identifier: GO:0044485
label: "venom-mediated fibrinogenolysis"
definition: >-
  A process in which an organism initiates, promotes, or enhances fibrinogenolysis in another organism via the action of a venom. Fibrinogenolysis is the degradation of fibrinogen by proteolytic cleavage.
