identifier: GO:0140974
label: "cellular detoxification of sulfide"
definition: >-
  Any process carried out at the cellular level that reduces or removes the toxicity of a sulfide. These may include chemical modification or transport of sulfide away from sensitive areas and to compartments or complexes whose purpose is sequestration of the toxic substance.
