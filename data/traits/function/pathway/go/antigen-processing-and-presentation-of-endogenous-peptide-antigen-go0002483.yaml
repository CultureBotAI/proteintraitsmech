identifier: GO:0002483
label: "antigen processing and presentation of endogenous peptide antigen"
definition: >-
  The process in which an antigen-presenting cell expresses a peptide antigen of endogenous origin on its cell surface in association with an MHC protein complex. The peptide is typically a fragment of a larger endogenous protein which has been degraded within the cell.
