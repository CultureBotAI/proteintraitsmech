identifier: GO:0120551
label: "2-oxoglutarate decarboxylation to succinyl-CoA"
definition: >-
  The chemical reactions and pathways resulting in the formation of succinyl-CoA from 2-oxoglutarate. In most organisms, this pathway is part of the TCA cycle and comprises a series of three reactions carried out by a multisubunit complex called the '2-oxoglutarate dehydrogenase complex', even though 2-oxoglutarate dehydrogenase activity describes only one of those reactions. The combination of the three reactions can be summarized as: 2-oxoglutarate + coenzyme A + NAD+ -> succinyl-CoA + CO2 + NADH.
