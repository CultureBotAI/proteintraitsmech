identifier: GO:1990942
label: "mitotic metaphase chromosome recapture"
definition: >-
  A mechanism to recapture 'lost' chromosomes (chromosomes which have become detached from the spindle) during metaphase of mitotic chromosome segregation. Chromosomes with unattached kinetochores are migrated along (non polar) spindle microtubules to the mitotic spindle pole body by a combination of microtubule depolymerisation and 'kinetochore sliding' (migration of the chromosome along the microtubule). The chromosome subsequently migrates along the polar spindle microtubule to the metaphase plate.
