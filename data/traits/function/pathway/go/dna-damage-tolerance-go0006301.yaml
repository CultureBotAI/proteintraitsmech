identifier: GO:0006301
label: "DNA damage tolerance"
definition: >-
  A process that promotes the bypass of single-stranded DNA lesions encountered by DNA polymerases during DNA replication, thereby preventing replication fork stalling and allowing completion of DNA replication without removing the damage.
