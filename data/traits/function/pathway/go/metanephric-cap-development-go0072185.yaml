identifier: GO:0072185
label: "metanephric cap development"
definition: >-
  The biological process whose specific outcome is the progression of the metanephric cap from an initial condition to its mature state. The metanephric cap is formed by the condensation of metanephric mesenchymal cells surrounding the ureteric bud tip.
