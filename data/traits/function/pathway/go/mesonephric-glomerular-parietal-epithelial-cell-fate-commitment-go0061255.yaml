identifier: GO:0061255
label: "mesonephric glomerular parietal epithelial cell fate commitment"
definition: >-
  The process in which the developmental fate of a cell becomes restricted such that it will develop into a mesonephric glomerular parietal epithelial cell. Mesonephric glomerular parietal epithelial cells are specialized epithelial cells that form tight junctions as a barrier to protein transport. These cells may also give rise to podocytes.
