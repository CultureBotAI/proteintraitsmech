identifier: GO:0072286
label: "metanephric connecting tubule development"
definition: >-
  The process whose specific outcome is the progression of the metanephric connecting tubule over time, from its formation to the mature structure. The metanephric connecting tubule is a tubular segment of the metanephric nephron; it connects the distal convoluted tubule to the collecting duct in the metanephros.
