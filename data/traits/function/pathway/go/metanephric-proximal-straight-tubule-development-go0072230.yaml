identifier: GO:0072230
label: "metanephric proximal straight tubule development"
definition: >-
  The process whose specific outcome is the progression of the metanephric proximal straight tubule over time, from its formation to the mature structure. The metanephric proximal straight tubule is the part of the metanephric descending limb that extends from the metanephric proximal convoluted tubule to the metanephric descending thin tubule.
