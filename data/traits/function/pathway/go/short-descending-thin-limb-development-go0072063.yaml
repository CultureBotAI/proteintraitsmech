identifier: GO:0072063
label: "short descending thin limb development"
definition: >-
  The process whose specific outcome is the progression of the short descending thin limb over time, from its formation to the mature structure. The short descending thin limb is the descending thin limb of a short nephron that has a squamous epithelial morphology.
