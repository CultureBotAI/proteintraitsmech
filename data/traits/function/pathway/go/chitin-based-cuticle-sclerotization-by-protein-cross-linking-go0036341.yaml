identifier: GO:0036341
label: "chitin-based cuticle sclerotization by protein cross-linking"
definition: >-
  The process of hardening of a chitin-based cuticle by protein cross-linking, and the incorporation of phenolic precursors. This mechanism of cuticle hardening occurs in insects and is usually accompanied by darkening of the cuticle.
