identifier: GO:0085033
label: "symbiont-mediated activation of host NF-kappaB cascade"
definition: >-
  A process that initiates, promotes, or enhances a host NF-kappaB-mediated signaling cascade. The host is defined as the larger of the organisms involved in a symbiotic interaction.
