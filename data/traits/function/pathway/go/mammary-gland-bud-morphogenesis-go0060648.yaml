identifier: GO:0060648
label: "mammary gland bud morphogenesis"
definition: >-
  The process in which anatomical structures of the mammary gland buds are generated and organized. Mammary gland buds form by an outpocketing of the mammary placodes and grow to invade the mammary fat, when they form the mammary cord.
