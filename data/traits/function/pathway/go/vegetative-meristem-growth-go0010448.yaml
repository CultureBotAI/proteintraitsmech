identifier: GO:0010448
label: "vegetative meristem growth"
definition: >-
  The increase in size or mass of a vegetative meristem, a population of undifferentiated cells in a plant shoot which maintains a continuous balance between the production of stem cells and the incorporation of their derivatives into lateral organ primordia.
