identifier: GO:0008627
label: "intrinsic apoptotic signaling pathway in response to osmotic stress"
definition: >-
  The series of molecular signals in which an intracellular signal is conveyed to trigger the apoptotic death of a cell. The pathway is induced in response to changes in intracellular ion homeostasis, and ends when the execution phase of apoptosis is triggered.
