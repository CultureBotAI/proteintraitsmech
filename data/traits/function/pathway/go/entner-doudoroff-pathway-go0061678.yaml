identifier: GO:0061678
label: "Entner-Doudoroff pathway"
definition: >-
  A cellular carbohydrate catabolic process that converts a carbohydrate to pyruvate and either glyceraldehyde or glyceraldehyde-3 phosphate by dehydration and aldol cleavage via a gluconate or 6-phosphogluconate intermediate.
