identifier: GO:0035134
label: "post-embryonic dorsal fin morphogenesis"
definition: >-
  The process, occurring after embryonic development, by which the anatomical structures of the dorsal fin are generated and organized. A dorsal fin is an unpaired medial fin on the dorsal aspect of a fish that provides lateral stability while swimming. Generally fish have one or two dorsal fins.
