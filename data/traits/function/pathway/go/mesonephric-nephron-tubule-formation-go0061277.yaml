identifier: GO:0061277
label: "mesonephric nephron tubule formation"
definition: >-
  The developmental process pertaining to the initial formation of a mesonephric nephron tubule from unspecified parts. A mesonephric nephron tubule is an epithelial tube that is part of a nephron in the mesonephros.
