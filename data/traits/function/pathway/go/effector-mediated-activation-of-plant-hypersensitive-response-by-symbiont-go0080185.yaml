identifier: GO:0080185
label: "effector-mediated activation of plant hypersensitive response by symbiont"
definition: >-
  A symbiont process in which a molecule secreted by the symbiont activates a resistance gene-dependent defense response signaling pathway in the plant host, in order to activate a hypersensitive response to induce necrosis. In the plant, this process involves the direct or indirect recognition of the symbiont effector protein for example through plant resistance receptor or R proteins (or R genes).
