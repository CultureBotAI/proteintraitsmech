identifier: GO:0051468
label: "detection of glucocorticoid hormone stimulus"
definition: >-
  The series of events by which a glucocorticoid hormone stimulus is received by a cell and converted into a molecular signal. Glucocorticoids are hormonal C21 corticosteroids synthesized from cholesterol with the ability to bind with the cortisol receptor and trigger similar effects. Glucocorticoids act primarily on carbohydrate and protein metabolism, and have anti-inflammatory effects.
