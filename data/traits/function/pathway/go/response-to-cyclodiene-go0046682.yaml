identifier: GO:0046682
label: "response to cyclodiene"
definition: >-
  Any process that results in a change in state or activity of a cell or an organism (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of a cyclodiene stimulus. A cyclodiene is any organic insecticide (as dieldrin or chlordane) with a chlorinated methylene group forming a bridge across a 6-membered carbon ring.
