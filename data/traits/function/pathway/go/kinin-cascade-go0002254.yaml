identifier: GO:0002254
label: "kinin cascade"
definition: >-
  A series of reactions that takes place outside the cell that occur as a result of by-products of tissue damage, including collagen, cartilage, and basement membrane. The ultimate product of the kinin cascade include kallidin and bradykinin, agents known to induce smooth muscle contraction, vasoconstriction, and increased vascular permeability.
