identifier: GO:0039562
label: "symbiont-mediated suppression of host JAK-STAT cascade via inhibition of STAT activity"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupt a JAK-STAT signal cascade in the host organism by reducing the activity of host STAT (signal transducer and activator of transcription). STATs are SH2 domain-containing proteins which lie downstream of many signaling receptors. Upon phosphorylation by JAKs, STAT proteins hetero- or homo-dimerize and translocate to the nucleus to activate transcription of target genes.
