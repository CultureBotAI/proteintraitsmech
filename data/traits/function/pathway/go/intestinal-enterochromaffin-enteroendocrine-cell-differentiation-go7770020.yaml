identifier: GO:7770020
label: "intestinal enterochromaffin enteroendocrine cell differentiation"
definition: >-
  The process in which relatively unspecialized cells acquire specialized structural and/or functional features of an intestinal enterochromaffin enteroendocrine cell. Enterochromaffin enteroendocrine cells are found in the gastrointestinal mucosa and secrete serotonin and some neurotransmitters including enkephalins and substance P.
