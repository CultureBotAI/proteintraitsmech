identifier: GO:0038178
label: "complement component C5a signaling pathway"
definition: >-
  A G protein-coupled receptor signaling pathway initiated by a C5a component of the complement pathway binding to a complement receptor, and ending with regulation of a downstream cellular process. C5a is a peptide derived from the C5 complement factor.
