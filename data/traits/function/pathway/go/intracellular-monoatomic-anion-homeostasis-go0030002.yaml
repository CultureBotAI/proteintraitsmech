identifier: GO:0030002
label: "intracellular monoatomic anion homeostasis"
definition: >-
  A homeostatic process involved in the maintenance of a steady state level of monoatomic anions within a cell. Monatomic anions (also called simple anions) are anions consisting of exactly one atom.
