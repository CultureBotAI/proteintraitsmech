identifier: GO:0021792
label: "chemoattraction of branchiomotor axon"
definition: >-
  The process in which a branchiomotor neuron growth cone is directed to a specific target site in response to an attractive chemical signal. Branchiomotor neurons are located in the hindbrain and innervate branchial arch-derived muscles that control jaw movements, facial expression, the larynx, and the pharynx.
