identifier: GO:0010915
label: "regulation of very-low-density lipoprotein particle clearance"
definition: >-
  Any process that modulates the rate, frequency or extent of very-low-density lipoprotein particle clearance. Very-low-density lipoprotein particle clearance is the process in which a very-low-density lipoprotein particle is removed from the blood via receptor-mediated endocytosis and its constituent parts degraded.
