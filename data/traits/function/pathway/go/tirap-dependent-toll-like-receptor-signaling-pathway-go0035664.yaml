identifier: GO:0035664
label: "TIRAP-dependent toll-like receptor signaling pathway"
definition: >-
  The series of molecular signals initiated by a ligand binding to a toll-like receptor where the TIRAP/MAL adaptor mediates transduction of the signal. Toll-like receptors directly bind pattern motifs from a variety of microbial sources to initiate an innate immune response.
