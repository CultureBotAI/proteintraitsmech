identifier: GO:0072226
label: "metanephric long descending thin limb bend development"
definition: >-
  The process whose specific outcome is the progression of the metanephric long descending thin limb bend over time, from its formation to the mature structure. The metanephric long descending thin limb bend is a part of the descending thin limb of a long nephron that lies beyond the prebend segment in the metanephros.
