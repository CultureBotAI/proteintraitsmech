identifier: GO:0036181
label: "protein localization to linear element"
definition: >-
  A cellular protein localization process in which a protein is transported to, or maintained at, a linear element. A linear element is a proteinaceous scaffold associated with S. pombe chromosomes during meiotic prophase.
