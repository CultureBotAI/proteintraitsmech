identifier: GO:0072051
label: "juxtaglomerular apparatus development"
definition: >-
  The process whose specific outcome is the progression of the juxtaglomerular apparatus over time, from its formation to the mature structure. The juxtaglomerular apparatus is an anatomical structure that lies adjacent to the glomerulus and regulates kidney function.
