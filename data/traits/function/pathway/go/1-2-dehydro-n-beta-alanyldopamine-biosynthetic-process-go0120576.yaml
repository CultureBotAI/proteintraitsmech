identifier: GO:0120576
label: "1,2-dehydro-N-beta-alanyldopamine biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of 1,2-dehydro-N-beta-alanyldopamine via N-beta-alanyldopamine (NBAD). In insects, these sclerotizing precursors are involved in the cross-linking of cuticular proteins hardening (sclerotizing) and pigmenting the cuticle.
