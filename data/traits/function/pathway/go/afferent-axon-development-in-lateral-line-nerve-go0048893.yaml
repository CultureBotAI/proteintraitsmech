identifier: GO:0048893
label: "afferent axon development in lateral line nerve"
definition: >-
  The process whose specific outcome is the progression of an afferent axon in a lateral line nerve over time from its formation to the mature structure. This process includes axonogenesis and pathfinding of the afferent axons in any lateral line nerve.
