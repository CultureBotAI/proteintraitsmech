identifier: GO:0098730
label: "male germline stem cell symmetric division"
definition: >-
  The symmetric division of a male germline stem cell to produce two male germline stem cells. An example of this is found in mammalian spermatogonial stem cells, some proportion of which divide symmetrically, so amplifying the population. The choice between asymmetric and symmetric division in this case appears to be internal and stochastic.
