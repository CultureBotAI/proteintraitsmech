identifier: GO:0052036
label: "symbiont-mediated suppression of host inflammatory response"
definition: >-
  A process in which a symbiont inhibits or disrupts the normal execution of inflammatory response in the host organism; the inflammatory response is the immediate defensive reaction (by vertebrate tissue) to infection or injury caused by chemical or physical agents. The host is defined as the larger of the organisms involved in a symbiotic interaction.
