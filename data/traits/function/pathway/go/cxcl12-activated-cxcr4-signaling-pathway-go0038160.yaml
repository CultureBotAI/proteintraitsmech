label: "CXCL12-activated CXCR4 signaling pathway"
definition: >-
  The series of molecular signals initiated by the binding of the C-X-C chemokine CXCL12 to a C-X-C chemokine type 4 receptor (CXCR4) on the surface of a target cell, and ending with the regulation of a downstream cellular process, e.g. transcription.
