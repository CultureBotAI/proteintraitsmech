identifier: GO:0070393
label: "teichoic acid catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of teichoic acid, which is a major component of the cell wall of Gram-positive bacteria and typically consists of a polymer of glycerol-phosphate or ribitol-phosphate to which are attached glycosyl and D-alanyl ester residues.
