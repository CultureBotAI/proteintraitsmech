identifier: GO:0141146
label: "symbiont-mediated disruption of host tissue"
definition: >-
  The process in which an organism effects a change that impairs the structure or function of a host tissue. This can occur via the disruption of the extracellular matrix, or the detachment of cells from the extracellular matrix, or the dissociation of the cells composing that tissue. The host is defined as the larger of the organisms involved in a symbiotic interaction.
