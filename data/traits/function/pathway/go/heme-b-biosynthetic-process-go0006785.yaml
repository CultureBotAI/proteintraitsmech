identifier: GO:0006785
label: "heme B biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of heme B, a Fe(II) porphyrin complex readily isolated from the hemoglobin of beef blood, but also found in other proteins including other hemoglobins, myoglobins, cytochromes P-450, catalases, peroxidases as well as b type cytochromes.
