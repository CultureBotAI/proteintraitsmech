identifier: GO:0140422
label: "symbiont-mediated suppression of host immunothrombosis"
definition: >-
  A process by which a symbiont inhibits or disrupts thrombosis formation induced by host immune cells in response to a pathogenic symbiont. Microbial-associated molecular patterns (MAMPs) are recognized by host signaling receptors, leading to platelet activation. The blood clot formed creates a physical barrier that prevent symbiont dessimination, traps and kills pathogens.
