identifier: GO:0098671
label: "adhesion receptor-mediated virion attachment to host cell"
definition: >-
  The process by which a virion attaches to a host cell by binding to a receptor on the host cell surface that does not mediate or trigger entry into the host cell. This binding is typically reversible and enhances significantly infectivity by concentrating the virus in the vicinity of its entry receptors, or bringing it to an organ in which its target cells are located.
