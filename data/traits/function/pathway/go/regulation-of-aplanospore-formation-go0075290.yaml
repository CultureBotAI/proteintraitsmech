identifier: GO:0075290
label: "regulation of aplanospore formation"
definition: >-
  Any process that modulates the frequency, rate or extent of aplanospore formation, a process in which a nonmotile, asexual spore is formed within a cell in certain algae and fungi (commonly in the Phycomycetes), the wall of aplanospore is distinct from that of the parent cell.
