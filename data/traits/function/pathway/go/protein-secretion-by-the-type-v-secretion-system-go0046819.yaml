identifier: GO:0046819
label: "protein secretion by the type V secretion system"
definition: >-
  The process in which proteins mediate their own secretion across the outer membrane through a beta-barrel pore structure formed by the C-terminal domain of the protein precursor. Following passage across the outer membrane, the mature protein is released from the pore by an autocatalytic activity. Proteins secreted by the Type V system are first translocated across the plasma membrane by the Sec pathway.
