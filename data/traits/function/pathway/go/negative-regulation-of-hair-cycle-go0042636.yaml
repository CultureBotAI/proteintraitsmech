identifier: GO:0042636
label: "negative regulation of hair cycle"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of the cyclical phases of growth (anagen), regression (catagen), quiescence (telogen), and shedding (exogen) in the life of a hair.
