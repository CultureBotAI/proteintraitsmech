identifier: GO:0061233
label: "mesonephric glomerular basement membrane development"
definition: >-
  The process whose specific outcome is the progression of the mesonephric glomerular basement membrane over time, from its formation to the mature structure. The mesonephric glomerular basement membrane is the basal laminal portion of the mesonephric glomerulus which performs the actual filtration.
