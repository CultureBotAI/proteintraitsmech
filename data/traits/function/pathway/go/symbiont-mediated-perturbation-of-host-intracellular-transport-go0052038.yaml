identifier: GO:0052038
label: "symbiont-mediated perturbation of host intracellular transport"
definition: >-
  A process in which a symbiont alters or subverts the directed movement of substances within the cell of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
