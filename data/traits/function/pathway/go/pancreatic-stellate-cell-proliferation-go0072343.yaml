identifier: GO:0072343
label: "pancreatic stellate cell proliferation"
definition: >-
  The multiplication or reproduction of pancreatic stellate cells, resulting in the expansion of a pancreatic stellate cell population. Pancreatic stellate cells are found in the periacinar space of the exocrine pancreas and in perivascular and periductal regions of the pancreas, and have long cytoplasmic processes that encircle the base of the acinus.
