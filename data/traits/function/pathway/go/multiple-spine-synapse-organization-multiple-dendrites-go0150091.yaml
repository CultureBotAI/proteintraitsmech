identifier: GO:0150091
label: "multiple spine synapse organization, multiple dendrites"
definition: >-
  A process that is carried out at the cellular level which results in the assembly, arrangement of constituent parts, or disassembly of a synapse between a multiple synapse bouton and two or more dendritic spines protruding either from a single dendrite or from multiple dendrites.
