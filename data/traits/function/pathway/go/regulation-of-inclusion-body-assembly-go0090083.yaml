identifier: GO:0090083
label: "regulation of inclusion body assembly"
definition: >-
  Any process that modulates the rate, frequency, or extent of inclusion body assembly. Inclusion body assembly is the aggregation, arrangement and bonding together of a set of components to form an inclusion body.
