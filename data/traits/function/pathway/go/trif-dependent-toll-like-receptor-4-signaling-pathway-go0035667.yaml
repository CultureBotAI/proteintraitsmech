identifier: GO:0035667
label: "TRIF-dependent toll-like receptor 4 signaling pathway"
definition: >-
  The series of molecular signals initiated by a ligand binding to a toll-like 4 receptor where the TRIF adaptor mediates transduction of the signal. Toll-like 4 receptors are pattern recognition receptors that bind bacterial lipopolysaccharide (LPS) to initiate an innate immune response.
