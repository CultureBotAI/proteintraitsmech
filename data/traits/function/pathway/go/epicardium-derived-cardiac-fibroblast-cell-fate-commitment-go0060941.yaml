identifier: GO:0060941
label: "epicardium-derived cardiac fibroblast cell fate commitment"
definition: >-
  The commitment of an epicardial cell to a cardiac fibroblast cell fate and its capacity to differentiate into a cardiac fibroblast. A cardiac fibroblast is a connective tissue cell in the heart which secretes an extracellular matrix rich in collagen and other macromolecules.
