identifier: GO:0141074
label: "symbiont-mediated suppression of host cGAS-STING signal transduction"
definition: >-
  A process in which a virus interferes with, inhibits or disrupt a cGAS/STING signal transduction in the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
