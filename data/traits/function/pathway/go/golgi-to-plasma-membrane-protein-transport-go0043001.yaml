identifier: GO:0043001
label: "Golgi to plasma membrane protein transport"
definition: >-
  The directed movement of proteins from the Golgi to the plasma membrane in transport vesicles that move from the trans-Golgi network to the plasma membrane. Golgi to plasma membrane transport precedes exocytosis.
