label: "pyridine biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of pyridine, a nitrogenous base (C5H5N) obtained from the distillation of bone oil or coal tar, and by the decomposition of certain alkaloids, as a colorless liquid with a peculiar pungent odor.
