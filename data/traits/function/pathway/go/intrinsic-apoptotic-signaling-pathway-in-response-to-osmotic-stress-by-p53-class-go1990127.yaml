identifier: GO:1990127
label: "intrinsic apoptotic signaling pathway in response to osmotic stress by p53 class mediator"
definition: >-
  The series of molecular signals in which an intracellular signal is conveyed to trigger the apoptotic death of a cell. The pathway is induced by the cell cycle regulator phosphoprotein p53, or an equivalent protein, in response to the detection of osmotic stress, and ends when the execution phase of apoptosis is triggered.
