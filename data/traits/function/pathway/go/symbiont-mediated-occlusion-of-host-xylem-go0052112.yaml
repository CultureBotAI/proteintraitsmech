identifier: GO:0052112
label: "symbiont-mediated occlusion of host xylem"
definition: >-
  The process in which an organism reduces the flow of fluid within the host xylem, the tissue in plants that carries water and nutrients up from the roots to the shoot and leaves. The host is defined as the larger of the organisms involved in a symbiotic interaction.
