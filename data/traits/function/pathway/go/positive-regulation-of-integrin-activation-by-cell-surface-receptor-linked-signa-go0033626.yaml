identifier: GO:0033626
label: "positive regulation of integrin activation by cell surface receptor linked signal transduction"
definition: >-
  Any process that activates or increases the frequency, rate, or extent of integrin activation by cell surface receptor linked signal transduction. This can occur by increased affinity of an integrin for its extracellular ligands.
