identifier: GO:0098989
label: "NMDA selective glutamate receptor signaling pathway"
definition: >-
  The series of molecular signals initiated by glutamate binding to an NMDA-selective glutamate receptor on the surface of the target cell, followed by the movement of ions through a channel in the receptor complex, and ending with the regulation of a downstream cellular process, e.g. transcription.
