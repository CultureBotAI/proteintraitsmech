identifier: GO:0072043
label: "regulation of pre-tubular aggregate formation by cell-cell signaling"
definition: >-
  Any process that mediates the transfer of information from one cell to another that modulates the rate, frequency, or extent of pre-tubular aggregate formation. Pre-tubular aggregate formation is the cell adhesion process in which mesenchymal cells adhere to one another in the initial stages of the formation of the pre-tubular aggregate, the earliest recognizable structure of the kidney.
