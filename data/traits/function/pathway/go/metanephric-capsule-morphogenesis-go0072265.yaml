identifier: GO:0072265
label: "metanephric capsule morphogenesis"
definition: >-
  The process in which the anatomical structures of the metanephric capsule are generated and organized. The metanephric capsule is the tough fibrous layer surrounding the metanephros, covered in a thick layer of perinephric adipose tissue. It provides some protection from trauma and damage.
