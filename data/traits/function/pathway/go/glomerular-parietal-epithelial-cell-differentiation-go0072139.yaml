identifier: GO:0072139
label: "glomerular parietal epithelial cell differentiation"
definition: >-
  The process in which a relatively unspecialized cell acquires specialized features of a glomerular parietal epithelial cell. Glomerular parietal epithelial cells are specialized epithelial cells that form tight junctions as a barrier to protein transport.
