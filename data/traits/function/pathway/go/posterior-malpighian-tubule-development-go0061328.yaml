identifier: GO:0061328
label: "posterior Malpighian tubule development"
definition: >-
  The process whose specific outcome is the progression of the posterior Malpighian tubule over time, from its formation to the mature structure. The pair of posterior tubules arise from a ventrolateral region of the embryonic hindgut and project backwards through the body cavity. A Malpighian tubule is a fine, thin-walled excretory tubule in insects which connects with the posterior part of the gut.
