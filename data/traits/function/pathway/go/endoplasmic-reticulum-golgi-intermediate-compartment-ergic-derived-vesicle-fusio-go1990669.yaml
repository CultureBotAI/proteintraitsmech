identifier: GO:1990669
label: "endoplasmic reticulum-Golgi intermediate compartment (ERGIC) derived vesicle fusion with endoplasmic reticulum membrane"
definition: >-
  The joining of the lipid bilayer membrane around an ERGIC-derived vesicle to the lipid bilayer membrane of the ER. Such vesicles include COPI-coated transport vesicles involved in retrograde transport.
