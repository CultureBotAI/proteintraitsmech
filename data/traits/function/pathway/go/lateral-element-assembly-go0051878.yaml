identifier: GO:0051878
label: "lateral element assembly"
definition: >-
  The cell cycle process in which lateral elements are formed. Axial elements form a proteinaceous core between the two sister chromatids of each chromosome; the two axial elements then connect along their entire lengths by fine fibers known as transverse filaments, forming the lateral elements.
