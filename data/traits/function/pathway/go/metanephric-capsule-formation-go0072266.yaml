identifier: GO:0072266
label: "metanephric capsule formation"
definition: >-
  The developmental process pertaining to the initial formation of a metanephric capsule from unspecified parts. The metanephric capsule is the tough fibrous layer surrounding the metanephros, covered in a thick layer of perinephric adipose tissue. It provides some protection from trauma and damage.
