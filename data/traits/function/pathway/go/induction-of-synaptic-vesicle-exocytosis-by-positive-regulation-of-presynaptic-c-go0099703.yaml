identifier: GO:0099703
label: "induction of synaptic vesicle exocytosis by positive regulation of presynaptic cytosolic calcium ion concentration"
definition: >-
  The induction of synaptic vesicle release by any process that leads to a rise in intracellular calcium ion concentration at the presynapse. This is the first step in synaptic transmission.
