identifier: GO:0072225
label: "metanephric late distal convoluted tubule development"
definition: >-
  The process whose specific outcome is the progression of the metanephric late distal convoluted tubule over time, from its formation to the mature structure. The metanephric late distal convoluted tubule contains metanephric DCT cells and intercalated (IC) alpha and beta cells and is vasopressin-sensitive.
