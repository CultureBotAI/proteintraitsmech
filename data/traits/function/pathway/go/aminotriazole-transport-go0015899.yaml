identifier: GO:0015899
label: "aminotriazole transport"
definition: >-
  The directed movement of aminotriazole into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore. Aminotriazole is an effective weed killer that also possesses some antithyroid activity.
