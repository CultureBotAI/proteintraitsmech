identifier: GO:0140624
label: "EGAD pathway"
definition: >-
  The protein catabolic pathway which selectively extracts ER-resident membrane proteins exported to the Golgi and endosomes for degradation by cytosolic proteasomes. It begins with phosphorylation of the ER-resident membrane protein, which triggers export of the protein from the ER to the Golgi and endosomes, followed by polyubiquitination by the Dsc E3 ubiquitin ligase complex and extraction of the ubiquitinated target, and ends with proteasomal degradation.
