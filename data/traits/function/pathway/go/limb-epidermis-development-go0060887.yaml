identifier: GO:0060887
label: "limb epidermis development"
definition: >-
  The process whose specific outcome is the progression of the epidermis of the limb over time, from its formation to the mature structure. The limb epidermis is the outer epithelial layer of the limb, it is a complex stratified squamous epithelium.
