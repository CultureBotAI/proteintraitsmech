identifier: GO:0032599
label: "protein transport out of membrane raft"
definition: >-
  The directed movement of a protein out of a membrane raft. Membrane rafts are small (10-200 nm), heterogeneous, highly dynamic, sterol- and sphingolipid-enriched membrane domains that compartmentalize cellular processes.
