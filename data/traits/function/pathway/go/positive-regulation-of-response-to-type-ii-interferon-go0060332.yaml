identifier: GO:0060332
label: "positive regulation of response to type II interferon"
definition: >-
  Any process that increases the rate, frequency or extent of a response to type II interferon (interferon-gamma). Response to interferon gamma is a change in state or activity of a cell or an organism (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of an interferon-gamma stimulus.
