identifier: GO:0009271
label: "phage shock"
definition: >-
  A response by bacterial cells to a variety of stresses including filamentous phage infection, mislocalization of envelope proteins, extremes of temperature, osmolarity or ethanol concentration, and the presence of proton ionophores such as carbonylcyanide m-chlorophenylhydrazone (CCCP), that involves expression of the phage shock protein operon, and acts to protect the bacterial cells from damage.
