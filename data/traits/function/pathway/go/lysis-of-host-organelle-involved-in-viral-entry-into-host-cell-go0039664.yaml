identifier: GO:0039664
label: "lysis of host organelle involved in viral entry into host cell"
definition: >-
  The viral-induced lysis of an organelle (endosome, lysosome, or caveosome) that is involved in the uptake of a virus into a host cell. Occurs once the virus is within the organelle, and results in transfer of the viral contents from the organelle compartment into the cytoplasm.
