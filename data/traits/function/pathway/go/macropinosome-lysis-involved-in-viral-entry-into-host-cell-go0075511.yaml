identifier: GO:0075511
label: "macropinosome lysis involved in viral entry into host cell"
definition: >-
  Viral-induced lysis of the macropinosome involved in the uptake of a virus into a host cell. Occurs after internalization of the virus in a macropinosome, and results in the release of viral contents from the macropinosome into the host cell cytoplasm.
