identifier: GO:1990734
label: "astral microtubule anchoring at mitotic spindle pole body"
definition: >-
  Any process in which an astral microtubule is maintained in a specific location in a cell by attachment to a mitotic spindle pole body. Microtubules attach to spindle pole bodies at the minus end.
