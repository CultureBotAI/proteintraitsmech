identifier: GO:0019339
label: "parathion catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of parathion, a highly toxic organophosphate compound. Degradation of parathion by sunlight or liver enzymes can result in the formation of the active compound paraoxon which interferes with the nervous system through cholinesterase inhibition.
