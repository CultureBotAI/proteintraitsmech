identifier: GO:0062210
label: "shoot regeneration"
definition: >-
  The regeneration process by which a damaged or lost shoot regrows or re-differentiates. This process may occur via de-differentiation and subsequent reprogramming of somatic cells or activation of existing undifferentiated (meristematic) cells to produce a new shoot meristem and subsequently a new shoot.
