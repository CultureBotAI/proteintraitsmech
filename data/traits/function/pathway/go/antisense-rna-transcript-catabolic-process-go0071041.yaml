identifier: GO:0071041
label: "antisense RNA transcript catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of antisense transcripts, i.e. transcripts that were produced from the antisense strand of a gene that produces a gene product and which often have a regulatory effect on the transcription of that gene product.
