identifier: GO:0052094
label: "formation of haustorium for nutrient acquisition"
definition: >-
  The assembly of a haustorium, a projection from a symbiotic cell or tissue that penetrates the host's tissues for the purpose of obtaining nutrients. The host is defined as the larger of the organisms involved in a symbiotic interaction.
