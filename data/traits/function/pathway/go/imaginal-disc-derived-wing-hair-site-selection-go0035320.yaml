identifier: GO:0035320
label: "imaginal disc-derived wing hair site selection"
definition: >-
  Determination of the site in the cell of an imaginal disc-derived wing at which a prehair initiates outgrowth. Restriction of prehair initiation to the distalmost part of a cell is essential to ensure that each wing epithelial cell produces one adult hair that points distally.
