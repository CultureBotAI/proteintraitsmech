identifier: GO:0001576
label: "globoside biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of gobliosides that begins with the synthesis of a tetrasaccharide core GalNAc-beta-1,3-Gal-alpha-1,4-Gal-beta-1,4-Glc-ceramide. This core can be further elongated with the sequential addition of various carbohydrate units.
