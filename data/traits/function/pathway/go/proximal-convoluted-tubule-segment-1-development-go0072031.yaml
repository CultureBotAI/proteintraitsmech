identifier: GO:0072031
label: "proximal convoluted tubule segment 1 development"
definition: >-
  The process whose specific outcome is the progression of the S1 portion of the proximal convoluted tubule over time, from its formation to the mature structure. The S1 portion is the initial portion of the proximal convoluted tubule and is responsible for avid reabsorption of water and solutes.
