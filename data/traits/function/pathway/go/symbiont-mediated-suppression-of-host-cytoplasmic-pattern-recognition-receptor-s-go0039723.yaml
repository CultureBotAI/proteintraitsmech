identifier: GO:0039723
label: "symbiont-mediated suppression of host cytoplasmic pattern recognition receptor signaling pathway via inhibition of TBK1 activity"
definition: >-
  Any process in which a symbiont stops, prevents, or reduces a cytoplasmic pattern recognition receptor signaling pathway in a host organism by reducing the activity of a host serine/threonine kinase TBK1.
