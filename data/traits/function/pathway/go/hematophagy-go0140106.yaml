identifier: GO:0140106
label: hematophagy
definition: >-
  A feeding behavior that involves the ingestion of blood. Hematophagous animals have mouth parts and chemical agents for penetrating vascular structures in the skin of hosts. To overcome natural hemostasis, vasoconstriction, inflammation, and pain sensation in the host, hematophagous animals pre-inject chemical substances with anesthetic and/or anticoagulant properties.
