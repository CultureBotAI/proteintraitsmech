identifier: GO:0014890
label: "smooth muscle atrophy"
definition: >-
  A process, occurring in smooth muscle, that is characterized by a decrease in protein content, fiber diameter, force production and fatigue resistance in response to different conditions such as starvation, aging and disuse.
