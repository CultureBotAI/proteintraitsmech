identifier: GO:0075513
label: "caveolin-mediated endocytosis of virus by host cell"
definition: >-
  Any caveolin-mediated endocytosis that is involved in the uptake of a virus into a host cell. Begins when material is taken up into plasma membrane caveolae - specialized lipid rafts that form 50-70 nm flask-shaped invaginations of the plasma membrane - which then pinch off to form endocytic caveolar carriers containing the virus.
