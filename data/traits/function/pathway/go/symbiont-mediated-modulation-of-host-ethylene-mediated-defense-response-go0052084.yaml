identifier: GO:0052084
label: "symbiont-mediated modulation of host ethylene-mediated defense response"
definition: >-
  Any process in which a symbiont modulates the frequency, rate or extent of the ethylene-mediated defense response of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
