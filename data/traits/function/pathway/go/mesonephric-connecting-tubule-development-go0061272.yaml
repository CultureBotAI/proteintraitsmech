identifier: GO:0061272
label: "mesonephric connecting tubule development"
definition: >-
  The process whose specific outcome is the progression of the mesonephric connecting tubule over time, from its formation to the mature structure. The mesonephric connecting tubule is a tubular segment of the mesonephric nephron; it connects the distal tubule to the collecting duct in the mesonephros.
