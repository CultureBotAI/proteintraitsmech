identifier: GO:0015767
label: "lactose transport"
definition: >-
  The directed movement of lactose into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore. Lactose is a disaccharide 4-O-beta-D-galactopyranosyl-D-glucose, and constitutes roughly 5% of the milk in almost all mammals.
