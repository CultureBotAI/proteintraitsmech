identifier: GO:0075258
label: "negative regulation of teliospore formation"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of teliospore formation, which is the formation of a thick-walled resting or overwintering spore produced by the rust fungi (Uredinales) and smut fungi (Ustilaginales) in which karyogamy occurs.
