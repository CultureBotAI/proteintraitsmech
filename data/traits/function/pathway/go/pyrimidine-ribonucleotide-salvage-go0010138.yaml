identifier: GO:0010138
label: "pyrimidine ribonucleotide salvage"
definition: >-
  The pathway by which pyrimidine bases or pyrimidine ribonucleosides from pyrimidine nucleotide breakdown are converted back to pyrimidine ribonucleotides. The salvage pathway is important where there is no de novo pyrimidine nucleotide biosynthesis.
