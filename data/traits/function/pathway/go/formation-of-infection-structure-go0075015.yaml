identifier: GO:0075015
label: "formation of infection structure"
definition: >-
  The formation of a symbiont structure that serves to infect its host organism. It includes physiological, developmental, and morphological changes of the symbiont. The host is defined as the larger of the organisms involved in a symbiotic interaction.
