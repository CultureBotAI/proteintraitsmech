identifier: GO:0140676
label: "oscillatory cAMP signaling"
definition: >-
  Fluctuation in the extracellular cAMP levels due to the alternate activation of adenylate cyclase, which produces cAMP, and phosphodiesterase, which degrades it. Occurs in Dictyostelium during early sorocarp development. Oscillation in signaling result is directional chemotaxis of cells towards the center of the aggregate.
