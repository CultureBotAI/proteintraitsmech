identifier: GO:0075025
label: "initiation of appressorium formation"
definition: >-
  The process in which a relatively unspecialized cell starts to acquire specialized features of the symbiont appressorium to aid in infection of the host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
