identifier: GO:0110140
label: "flagellum attachment zone organization"
definition: >-
  A process that is carried out at the cellular level which results in the assembly, arrangement of constituent parts, or disassembly of a flagellum attachment zone. FAZ is a network of cytoskeletal and membranous connections responsible for the lateral attachment of the cilium to the cell body in some trypanosomatid species.
