identifier: GO:0090648
label: "response to environmental enrichment"
definition: >-
  Any process that results in a change in state or activity of an organism (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of the provision of a combination of complex inanimate and social stimulations in the organism's housing environment.
