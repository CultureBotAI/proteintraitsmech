identifier: GO:0080193
label: "diffuse secondary thickening"
definition: >-
  Lateral growth of the older parts of a stem that occurs when the central parenchyma cells and the not yet fully differentiated fiber cells of the bundle sheaths continue to undergo cell division and expansion for a long period of time, leading to an increase in girth of the stem.
