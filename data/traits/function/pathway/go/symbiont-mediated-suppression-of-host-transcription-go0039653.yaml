identifier: GO:0039653
label: "symbiont-mediated suppression of host transcription"
definition: >-
  A process in which a symbiont inhibits or disrupts transcription of genes into mRNA in its host. For example, symbiont proteins can interfere with host RNA polymerase or with transcription factors. The host is defined as the larger of the organisms involved in a symbiotic interaction.
