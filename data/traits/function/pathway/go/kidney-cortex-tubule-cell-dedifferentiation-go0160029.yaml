identifier: GO:0160029
label: "kidney cortex tubule cell dedifferentiation"
definition: >-
  The process in which a kidney cortex tubule cell (specialized epithelial cell of the kidney) loses the structural or functional features that characterize it in the mature organism, or some other relatively stable phase of the organism's life history. Under certain conditions, these cells can revert back to the features of the stem cells that were their ancestors.
