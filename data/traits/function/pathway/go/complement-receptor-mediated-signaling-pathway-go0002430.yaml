identifier: GO:0002430
label: "complement receptor mediated signaling pathway"
definition: >-
  The series of molecular signals generated as a consequence of a component of the complement pathway binding to a complement receptor. Such components include both whole complement proteins and fragments of complement proteins generated through the activity of the complement pathway.
