identifier: GO:0150060
label: "amylin receptor 2 signaling pathway"
definition: >-
  The series of molecular signals initiated by an extracellular amylin, or another ligand, combining with an amylin receptor 2 (AMY2), a G protein-coupled receptor complex, on the surface of the target cell. The AMY2 signaling pathway can also be initiated by adrenomedullin (AM/ADM).
