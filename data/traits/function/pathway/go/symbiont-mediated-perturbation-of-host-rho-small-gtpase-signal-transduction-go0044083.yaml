identifier: GO:0044083
label: "symbiont-mediated perturbation of host Rho small GTPase signal transduction"
definition: >-
  A process in which a symbiont alters a Rho protein family-mediated signal transduction pathway in its host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
