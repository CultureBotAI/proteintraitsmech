identifier: GO:0072056
label: "pyramid development"
definition: >-
  The process whose specific outcome is the progression of the kidney pyramids over time, from its formation to the mature structure. Kidney pyramids are the conical masses that constitute the renal medulla in a multi-lobed mammalian kidney; they contain the loops of Henle and the medullary collecting ducts.
