identifier: GO:0072238
label: "metanephric long nephron development"
definition: >-
  The process whose specific outcome is the progression of a metanephric long nephron over time, from its formation to the mature structure. Long nephrons are associated with juxtamedullary glomeruli and extend into the inner medulla in the metanephros.
