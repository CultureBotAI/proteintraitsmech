identifier: GO:0072060
label: "outer medullary collecting duct development"
definition: >-
  The process whose specific outcome is the progression of the outer medullary collecting duct over time, from its formation to the mature structure. The outer medullary collecting duct is the portion of the collecting duct that lies in the renal outer medulla.
