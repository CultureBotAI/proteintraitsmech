identifier: GO:0140307
label: "phospholipase C-activating N-formyl peptide-activated signaling pathway"
definition: >-
  A phospholipase C-activating G protein-coupled receptor signaling pathway initiated by an N-formyl peptide binding to its receptor on the surface of a target cell, and ending with the regulation of a downstream cellular process, e.g. chemotaxis. N-formyl peptides include N-formylmethionyl-leucyl-phenylalanine (fMLF, fMLP or N-formyl-met-leu-phe), an N-formylated tripeptide sometimes simply referred to as chemotactic peptide. fMLF is a potent polymorphonuclear leukocyte (PMN) chemotactic factor and is also a macrophage activator.
