identifier: GO:0140429
label: "positive regulation of mitotic sister chromatid biorientation"
definition: >-
  Any process that activates or increases the frequency, rate or extent of mitotic sister chromatid biorientation, the mitotic cell cycle process in which sister chromatids establish stable, end-on attachments to the plus ends of microtubules emanating from opposite spindle poles, oriented such that separation can proceed.
