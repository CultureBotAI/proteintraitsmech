label: "morphine biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of morphine, 17-methyl-7,8-didehydro-4,5alpha-epoxymorphinan-3,6alpha-diol. Morphine is a highly potent opiate analgesic psychoactive drug obtained form the opium poppy, Papaver somniferum.
