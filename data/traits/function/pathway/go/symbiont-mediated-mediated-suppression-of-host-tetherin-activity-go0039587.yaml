identifier: GO:0039587
label: "symbiont-mediated-mediated suppression of host tetherin activity"
definition: >-
  Any process in which a symbiont stops, prevents, or reduces the activity of host tetherin activity. Tetherin (also known as BST2) is an alpha interferon-inducible cellular factor that impairs the release of many enveloped viruses. By blocking tetherin activity, many viruses circumvent its antiviral effects.
