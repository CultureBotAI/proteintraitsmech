identifier: GO:0048398
label: "intermediate mesodermal cell fate specification"
definition: >-
  The process in which a cell becomes capable of differentiating autonomously into an intermediate mesoderm cell in an environment that is neutral with respect to the developmental pathway; upon specification, the cell fate can be reversed.
