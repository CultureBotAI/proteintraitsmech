identifier: GO:0003259
label: "cardioblast anterior-lateral migration"
definition: >-
  The orderly movement of a cardioblast toward the head and laterally to form the heart field. A cardioblast is a cardiac precursor cell. It is a cell that has been committed to a cardiac fate, but will undergo more cell division rather than terminally differentiating.
