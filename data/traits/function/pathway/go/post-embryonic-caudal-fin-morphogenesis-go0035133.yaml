identifier: GO:0035133
label: "post-embryonic caudal fin morphogenesis"
definition: >-
  The process, occurring after embryonic development, by which the anatomical structures of the caudal fin are generated and organized. The caudal fin is an unpaired medial fin mounted at the caudal end of the fish and is the main fin used for propulsion.
