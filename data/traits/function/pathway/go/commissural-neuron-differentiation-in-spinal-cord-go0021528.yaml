identifier: GO:0021528
label: "commissural neuron differentiation in spinal cord"
definition: >-
  The process in which neuroepithelial cells in the ventral neural tube acquire specialized structural and/or functional features of commissural neurons. Commissural neurons in both vertebrates and invertebrates transfer information from one side of their bodies to the other through the midline. Differentiation includes the processes involved in commitment of a cell to a specific fate.
