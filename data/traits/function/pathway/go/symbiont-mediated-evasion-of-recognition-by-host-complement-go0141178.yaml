identifier: GO:0141178
label: "symbiont-mediated evasion of recognition by host complement"
definition: >-
  A process by which a symbiont avoids the effects of recognition by host complement by altering molecules on the symbiont surface. The host is defined as the larger of the organisms involved in a symbiotic interaction.
