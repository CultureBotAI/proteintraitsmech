identifier: GO:0060888
label: "limb epidermis stratification"
definition: >-
  The pattern specification process that results in the subdivision of the epidermis of the limb in space to define a volume in which specific patterns of basal cell, spinous cell and granular cells will differentiate giving rise to the layers of the limb epidermis.
