identifier: GO:0036114
label: "medium-chain fatty-acyl-CoA catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of medium-chain fatty-acyl-CoAs, any derivative of coenzyme A in which the sulfhydryl group is in a thioester linkage with a medium-chain fatty-acyl group. A medium-chain fatty acid has an aliphatic tail containing 6 to 12 carbons.
