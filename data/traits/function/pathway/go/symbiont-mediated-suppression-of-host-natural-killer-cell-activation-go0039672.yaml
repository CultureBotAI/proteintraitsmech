identifier: GO:0039672
label: "symbiont-mediated suppression of host natural killer cell activation"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupts natural killer cell activation in the host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
