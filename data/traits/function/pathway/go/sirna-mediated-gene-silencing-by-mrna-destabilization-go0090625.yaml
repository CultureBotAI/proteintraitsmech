identifier: GO:0090625
label: "siRNA-mediated gene silencing by mRNA destabilization"
definition: >-
  An siRNA-mediated post-transcriptional gene silencing pathway in which small interfering RNAs (siRNAs) direct the cleavage of target mRNAs. Once incorporated into a RNA-induced silencing complex (RISC), an siRNA will typically direct cleavage by base pairing with perfect or near-perfect complementarity to the target mRNA.
