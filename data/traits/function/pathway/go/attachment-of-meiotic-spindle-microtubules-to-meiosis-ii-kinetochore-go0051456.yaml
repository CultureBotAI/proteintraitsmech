identifier: GO:0051456
label: "attachment of meiotic spindle microtubules to meiosis II kinetochore"
definition: >-
  The cellular process in which spindle microtubules become physically associated with the proteins making up the kinetochore complex in meiosis II. During meiosis II sister kinetochores are situated facing opposite spindle poles and bipolar attachment of the sister chromosomes to the spindle occurs.
