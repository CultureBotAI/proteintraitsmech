identifier: GO:0075262
label: "negative regulation of spore-bearing organ development"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of spore-bearing organ development, a process in which hyphae grow into special aggregates called fruiting bodies that produce new spores.
