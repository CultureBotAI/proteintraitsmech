identifier: GO:0003201
label: "epithelial to mesenchymal transition involved in coronary vasculature morphogenesis"
definition: >-
  A transition where a cardiac epithelial cell loses apical/basolateral polarity, severs intercellular adhesive junctions, degrades basement membrane components and becomes a migratory mesenchymal cell that will contribute to the shaping of the coronary vasculature.
