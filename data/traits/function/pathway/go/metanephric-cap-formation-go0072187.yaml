identifier: GO:0072187
label: "metanephric cap formation"
definition: >-
  The developmental process pertaining to the initial formation of a metanephric cap from unspecified parts. The metanephric cap is formed by the condensation of metanephric mesenchymal cells surrounding the ureteric bud tip.
