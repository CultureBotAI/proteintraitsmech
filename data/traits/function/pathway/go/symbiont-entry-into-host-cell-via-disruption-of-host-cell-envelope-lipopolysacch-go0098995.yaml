identifier: GO:0098995
label: "symbiont entry into host cell via disruption of host cell envelope lipopolysaccharide"
definition: >-
  The disruption by a symbiont of host cell wall lipopolysaccharides to allow entry into the host cell. For example a phage entering a Gram-negative bacterium may actively break down outer membrane lipopolysaccharides.
