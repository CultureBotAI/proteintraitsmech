identifier: GO:0052078
label: "symbiont-mediated suppression of host pathogen-associated molecular pattern receptor signaling pathway"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupts a PAMP signaling pathway in its host organism, initiated by a ligand binding of a pattern recognition receptor (PRR) to activate a plant innate immune response. The host is defined as the larger of the organisms involved in a symbiotic interaction.
