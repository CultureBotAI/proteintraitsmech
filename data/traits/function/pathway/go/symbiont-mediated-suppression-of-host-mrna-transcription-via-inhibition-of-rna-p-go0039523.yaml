identifier: GO:0039523
label: "symbiont-mediated suppression of host mRNA transcription via inhibition of RNA polymerase II activity"
definition: >-
  A process in which a symbiont inhibits or disrupts the transcription of genes into mRNA in its host by directly inhibiting host RNA polymerase II activity. The host is defined as the larger of the organisms involved in a symbiotic interaction.
