identifier: GO:0046101
label: "hypoxanthine biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of hypoxanthine, 6-hydroxy purine, an intermediate in the degradation of adenylate. Its ribonucleoside is known as inosine and its ribonucleotide as inosinate.
