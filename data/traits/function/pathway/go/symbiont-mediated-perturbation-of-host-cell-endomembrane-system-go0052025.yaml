identifier: GO:0052025
label: "symbiont-mediated perturbation of host cell endomembrane system"
definition: >-
  The process in which an organism effects a change that impairs the structure or function of the host endomembrane system. The host is defined as the larger of the organisms involved in a symbiotic interaction.
