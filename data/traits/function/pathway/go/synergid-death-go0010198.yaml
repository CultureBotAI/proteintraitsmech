identifier: GO:0010198
label: "synergid death"
definition: >-
  Synergid cells undergo degeneration and death in response to penetration by the pollen tube. It is an active process that involves a dramatic decrease in cell volume, collapse of the vacuoles, and complete disintegration of the plasma membrane and most organelles.
