identifier: GO:0060172
label: "astral microtubule depolymerization"
definition: >-
  The removal of tubulin heterodimers from one or both ends of an astral microtubule. An astral microtubule is any of the spindle microtubules that radiate in all directions from the spindle poles and are thought to contribute to the forces that separate the poles and position them in relation to the rest of the cell.
