identifier: GO:0003106
label: "negative regulation of glomerular filtration by angiotensin"
definition: >-
  The process in which angiotensin directly decreases the rate of glomerular filtration in the kidney. Glomerular filtration is the process whereby blood is filtered by the glomerulus into the renal tubule.
