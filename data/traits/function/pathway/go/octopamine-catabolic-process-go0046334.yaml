identifier: GO:0046334
label: "octopamine catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of octopamine, 1-(p-hydroxyphenyl)-2-aminoethanol. The D enantiomer is about one-tenth as active as norepinephrine and is found in the salivary glands of Octopus and Eledone species.
