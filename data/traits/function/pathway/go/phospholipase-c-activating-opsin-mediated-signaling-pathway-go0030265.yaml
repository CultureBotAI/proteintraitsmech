identifier: GO:0030265
label: "phospholipase C-activating opsin-mediated signaling pathway"
definition: >-
  A phospholipase C-activating receptor G protein-coupled receptor signaling pathway that starts with an opsin being activated by a photon, and transmitting the signal through the Gq-mediated activation of phospholipase C (PLC). PLC hydrolyses phosphatidylinositol 4,5-bisphosphate (PIP2) into the second messengers inositol-1,4,5,-triphosphate (IP3) and diacylglycerol (DAG). The second messengers, including cGMP, activate channels that result in transmission of the light signal through the synapses. Typical examples are rhabdomeric photoreceptors in the eyes of protostomes.
