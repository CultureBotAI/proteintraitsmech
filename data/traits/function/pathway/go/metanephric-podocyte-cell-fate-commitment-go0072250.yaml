identifier: GO:0072250
label: "metanephric podocyte cell fate commitment"
definition: >-
  The process in which the developmental fate of a cell becomes restricted such that it will develop into a metanephric glomerular visceral epithelial cell. A metanephric glomerular visceral epithelial cell is a specialized epithelial cell that contains 'feet' that interdigitate with the 'feet' of other glomerular epithelial cells in the metanephros.
