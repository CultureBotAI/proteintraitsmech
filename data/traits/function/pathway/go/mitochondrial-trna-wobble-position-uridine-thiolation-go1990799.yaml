identifier: GO:1990799
label: "mitochondrial tRNA wobble position uridine thiolation"
definition: >-
  The process in which a uridine residue at position 34 in the anticodon of a mitochondrial tRNA is post-transcriptionally thiolated at the C2 position. This process involves transfer of a sulfur from L-cysteine to position C2 by several steps.
