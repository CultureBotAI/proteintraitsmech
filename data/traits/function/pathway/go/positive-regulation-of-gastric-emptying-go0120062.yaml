identifier: GO:0120062
label: "positive regulation of gastric emptying"
definition: >-
  Any process that increases the frequency, rate or extent of any gastric emptying process, the process in which the liquid and liquid-suspended solid contents of the stomach exit through the pylorus into the duodenum.
