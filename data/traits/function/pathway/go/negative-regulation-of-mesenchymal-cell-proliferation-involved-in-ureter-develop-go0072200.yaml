identifier: GO:0072200
label: "negative regulation of mesenchymal cell proliferation involved in ureter development"
definition: >-
  Any process that decreases the frequency, rate or extent of mesenchymal cell proliferation that contributes to the progression of the ureter gland over time. A mesenchymal cell is a cell that normally gives rise to other cells that are organized as three-dimensional masses, rather than sheets.
