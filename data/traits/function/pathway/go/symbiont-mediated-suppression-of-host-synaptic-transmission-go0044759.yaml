identifier: GO:0044759
label: "symbiont-mediated suppression of host synaptic transmission"
definition: >-
  A process in which a symbiont inhibits or disrupts the normal execution of synaptic transmission, communication from a neuron to a target (neuron, muscle, or secretory cell) across a synapse, in its host organism.
