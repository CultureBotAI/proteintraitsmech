identifier: GO:0120577
label: "1,2-dehydro-N-acetyldopamine biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of 1,2-dehydro-N-acetyldopamine via N-acetyldopamine (NADA). In insects, these sclerotizing precursors are involved in the cross-linking of cuticular proteins hardening (sclerotizing) and pigmenting the cuticle.
