identifier: GO:0061119
label: "regulation of positive chemotaxis to cAMP by chlorinated alkylphenone"
definition: >-
  Any process that modulates the rate, frequency, or extent of directed movement of a motile cell or organism up a concentration gradient of 3',5'-cAMP by the action of a chlorinated alkylphenone. An alkylphenone is an aromatic polyketide with methyl and chlorine substitutions.
