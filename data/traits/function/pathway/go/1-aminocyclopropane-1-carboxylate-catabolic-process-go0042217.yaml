identifier: GO:0042217
label: "1-aminocyclopropane-1-carboxylate catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of 1-aminocyclopropane-1-carboxylate, a natural product found in plant tissues. It is a key intermediate in the biosynthesis of ethylene (ethene), a fruit-ripening hormone in plants.
