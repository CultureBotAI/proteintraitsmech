identifier: GO:0080005
label: "photosystem stoichiometry adjustment"
definition: >-
  Adjustment of Photosystem I/Photosystem II ratio in response to light conditions. The function of photosystem stoichiometry adjustment is to compensate for any deficiency in energy conversion at either photosystem I or photosystem II by increasing the quantity the photosystem that will otherwise become the rate-limiting to overall photosynthesis.
