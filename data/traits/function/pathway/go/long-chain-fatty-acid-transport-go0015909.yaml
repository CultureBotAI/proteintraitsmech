identifier: GO:0015909
label: "long-chain fatty acid transport"
definition: >-
  The directed movement of a long-chain fatty acid into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore. A long-chain fatty acid has an aliphatic tail containing 13 to 22 carbons.
