label: "light-independent chlorophyll biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of chlorophyll, any compound of magnesium complexed in a porphyrin (tetrapyrrole) ring and which functions as a photosynthetic pigment, from less complex precursors, which occur in the absence of light.
