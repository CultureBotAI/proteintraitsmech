identifier: GO:0035210
label: "prepupal development"
definition: >-
  The process whose specific outcome is the progression of the prepupa over time, from its formation to the mature structure. The prepupal stage is a life stage interposed between the larval and the pupal stages in insects that undergo a complete metamorphosis. The start of the pre-pupal stage is marked by pupariation, and the end is marked by pupation.
