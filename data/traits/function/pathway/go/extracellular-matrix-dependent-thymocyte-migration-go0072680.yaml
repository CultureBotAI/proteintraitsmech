identifier: GO:0072680
label: "extracellular matrix-dependent thymocyte migration"
definition: >-
  The movement of a thymocyte through distinct intrathymic niches (e.g. medulla, cortex), where it receives a unique set of developmental cues required for T-cell development, dependent on extracellular matrix components including fibronectin, collagen and laminin.
