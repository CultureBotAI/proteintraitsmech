identifier: GO:0099627
label: "neurotransmitter receptor cycle"
definition: >-
  The process during which neurotransmitter receptors, anchored in some region of the synaptic membrane, are recycled via the endosome. This cycle includes release from anchoring, diffusion in the synaptic membrane to an endocytic region, endocytosis, transport to the endosome, recycling in the endosome, transport back the synaptic membrane and subsequent anchoring (trapping).
