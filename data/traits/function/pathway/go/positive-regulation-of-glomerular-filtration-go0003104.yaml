identifier: GO:0003104
label: "positive regulation of glomerular filtration"
definition: >-
  Any process that activates or increases the frequency, rate or extent of glomerular filtration. Glomerular filtration is the process whereby blood is filtered by the glomerulus into the renal tubule.
