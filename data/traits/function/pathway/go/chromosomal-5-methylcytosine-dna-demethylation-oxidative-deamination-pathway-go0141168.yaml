identifier: GO:0141168
label: "chromosomal 5-methylcytosine DNA demethylation, oxidative deamination pathway"
definition: >-
  An epigenetic cytosine DNA demethylation pathway that includes a deamination step to produce either a thymine (T), or a 5-hydroxymethyluracil (5hmU), if the 5meC had first been converted to 5hmC. A DNA glycosylase (e. g. TDG) recognizes the T mispaired with a G or the 5hmC and excises the modified base to initiate its replacement with unmethylated cytosine through base excision repair.
