identifier: GO:0038196
label: "type III interferon-mediated signaling pathway"
definition: >-
  The series of molecular signals initiated by type III interferon binding to its receptor on the surface of a target cell, and ending with the regulation of a downstream cellular process, e.g. transcription. Interferon lambda is the only member of the type III interferon found so far.
