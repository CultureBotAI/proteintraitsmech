identifier: GO:0022003
label: "negative regulation of anterior neural cell fate commitment of the neural plate by fibroblast growth factor receptor signaling pathway"
definition: >-
  The series of molecular signals that stops, prevents or reduces the frequency or rate at which cell adopts an anterior neural cell fate, generated as a consequence of a fibroblast growth factor receptor binding to one of its physiological ligands.
