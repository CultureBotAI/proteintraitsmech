identifier: GO:0140709
label: "Frizzled Nuclear Import pathway"
definition: >-
  A type of non-canonical Wnt signaling in which Wnt binding to its receptor on the surface a the target cell results in internalization and cleavage of the frizzled receptor to yield a C-terminal fragment that is imported into the nucleus. The frizzled C-terminal fragment is incorporated into large ribonucleoprotein particles and stimulates their egress via nuclear budding.
