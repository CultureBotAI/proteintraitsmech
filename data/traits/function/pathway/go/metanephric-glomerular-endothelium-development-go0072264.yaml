identifier: GO:0072264
label: "metanephric glomerular endothelium development"
definition: >-
  The process whose specific outcome is the progression of the metanephric glomerular endothelium over time, from its formation to the mature structure. The metanephric glomerular endothelium is an epithelial tissue that covers the internal surfaces of the glomerulus of the metanephros.
