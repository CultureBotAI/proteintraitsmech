identifier: GO:0072058
label: "outer stripe development"
definition: >-
  The process whose specific outcome is the progression of the outer stripe over time, from its formation to the mature structure. The outer stripe is the region of the kidney outer medulla that lies just below the cortex. The proximal straight tubules (S3) characterize this region.
