identifier: GO:0051311
label: "meiotic metaphase chromosome alignment"
definition: >-
  A chromosome localization process whereby chromosomes are positioned in a specific order and orientation at the metaphase plate (spindle equator), during meiotic chromosome segregation. This alignment ensures that each daughter cell will receive the correct number of chromosomes during cell division.
