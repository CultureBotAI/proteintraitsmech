identifier: GO:0070788
label: "conidiophore stalk development"
definition: >-
  The process whose specific outcome is the progression of the conidiophore stalk over time, from its formation to the mature structure. The conidiophore stalk is part of a specialized hypha that extends aerially from the growth substrate and supports structures from which conidia, or asexual spores, develop.
