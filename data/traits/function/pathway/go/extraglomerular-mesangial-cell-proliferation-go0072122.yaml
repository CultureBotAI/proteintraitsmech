identifier: GO:0072122
label: "extraglomerular mesangial cell proliferation"
definition: >-
  The multiplication or reproduction of extraglomerular glomerular mesangium cells by cell division, resulting in the expansion of their population. Extraglomerular mesangial cells (also known as lacis cells, Goormaghtigh cells) are light-staining cells in the kidney found outside the glomerulus, near the vascular pole and macula densa.
