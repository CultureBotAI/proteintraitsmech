identifier: GO:0052086
label: "symbiont-mediated suppression of host B-cell mediated immune response"
definition: >-
  A process by which a symbiont interferes with, inhibits or disrupts the normal execution of the B-cell mediated immune response of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
