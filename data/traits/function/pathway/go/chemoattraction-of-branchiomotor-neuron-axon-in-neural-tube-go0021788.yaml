identifier: GO:0021788
label: "chemoattraction of branchiomotor neuron axon in neural tube"
definition: >-
  The process in which a branchiomotor neuron growth cone in the neural tube is directed to a specific target site in the neural tube in response to an attractive chemical cue. Branchiomotor neurons are located in the hindbrain and innervate branchial arch-derived muscles that control jaw movements, facial expression, the larynx, and the pharynx.
