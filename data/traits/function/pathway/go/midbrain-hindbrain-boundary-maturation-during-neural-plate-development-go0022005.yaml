identifier: GO:0022005
label: "midbrain-hindbrain boundary maturation during neural plate development"
definition: >-
  A developmental process occurring before the brain has been specified along the neural axis that is required for the midbrain-hindbrain boundary to attain its fully functional state. The midbrain-hindbrain domain of the embryonic brain is comprised of the mesencephalic vesicle and the first rhombencephalic vesicle at early somitogenesis stages. An organizing center at the boundary patterns the midbrain and hindbrain primordia of the neural plate.
