identifier: GO:0042352
label: "GDP-L-fucose salvage"
definition: >-
  The formation of GDP-L-fucose from L-fucose, without de novo synthesis. L-fucose is phosphorylated by fucokinase and then converted by fucose-1-phosphate guanylyltransferase (EC:2.7.7.30).
