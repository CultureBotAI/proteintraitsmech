identifier: GO:0030584
label: "sporocarp development"
definition: >-
  The process whose specific outcome is the progression of a sporocarp over time, from its formation to the mature structure. The sporocarp is a spore bearing fruiting body organ. An example of this process is found in the Fungal species Coprinopsis cinerea.
