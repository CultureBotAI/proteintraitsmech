identifier: GO:0141140
label: "symbiont-mediated suppression of host immunoglobulin-mediated immune response"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupts the normal execution of the immunoglobulin-mediated immune response of the host organism. One common mechanism by which this happens is the direct inhibition of immunoglobulin activity, by direct binding or modification. The host is defined as the larger of the organisms involved in a symbiotic interaction.
