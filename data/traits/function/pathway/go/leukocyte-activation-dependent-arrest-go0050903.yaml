identifier: GO:0050903
label: "leukocyte activation-dependent arrest"
definition: >-
  The formation of an integrin-dependent strong adhesive bond between leukocytes and blood vessel endothelial cells which is dependent on prior activation of the leukocyte and leads to the firm attachment of the leukocyte to the endothelial surface, typically the third step in cellular extravasation.
