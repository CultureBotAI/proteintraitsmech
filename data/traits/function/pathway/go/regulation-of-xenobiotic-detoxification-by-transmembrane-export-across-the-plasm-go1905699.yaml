identifier: GO:1905699
label: "regulation of xenobiotic detoxification by transmembrane export across the plasma membrane"
definition: >-
  Any process that modulates the frequency, rate or extent of xenobiotic transmembrane export. A xenobiotic is a compound foreign to the organism exposed to it. It may be synthesized by another organism (like ampicilin) or it can be a synthetic chemical.
