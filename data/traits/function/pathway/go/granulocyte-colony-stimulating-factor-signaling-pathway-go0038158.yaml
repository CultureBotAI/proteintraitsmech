identifier: GO:0038158
label: "granulocyte colony-stimulating factor signaling pathway"
definition: >-
  The series of molecular signals initiated by the binding of the cytokine granulocyte colony-stimulating factor (G-CSF) to its receptor on the surface of a target cell, and ending with the regulation of a downstream cellular process, e.g. transcription. G-CSF binds to the receptor (CSF3R).
