identifier: GO:0003027
label: "regulation of systemic arterial blood pressure by carotid body chemoreceptor signaling"
definition: >-
  The process that modulates blood pressure by the action of chemoreceptors found in the carotid bodies and their resultant modulation of the vasomotor center. Chemoreceptors respond to oxygen, carbon dioxide and hydrogen ions.
