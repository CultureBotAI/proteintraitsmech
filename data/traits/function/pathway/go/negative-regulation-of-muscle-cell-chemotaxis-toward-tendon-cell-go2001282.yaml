identifier: GO:2001282
label: "negative regulation of muscle cell chemotaxis toward tendon cell"
definition: >-
  Any process that stops, prevents or reduces the frequency, rate or extent of the directed movement of a muscle cell towards a tendon cell in response to an external stimulus. For example, when the muscle cell arrives at the target tendon cell, migration is arrested so that attachments can be made between the cells.
