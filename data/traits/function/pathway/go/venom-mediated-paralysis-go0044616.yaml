identifier: GO:0044616
label: "venom-mediated paralysis"
definition: >-
  A process in which an organism induces paralysis in another organism via the action of a venom. Paralysis is the loss of the ability to voluntarily control muscles. This can occur by blocking nerve signals at the neuromuscular junction or by directly interfering with muscle contraction.
