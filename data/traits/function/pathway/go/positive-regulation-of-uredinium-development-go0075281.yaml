identifier: GO:0075281
label: "positive regulation of uredinium development"
definition: >-
  Any process that activates, maintains or increases the frequency, rate or extent of uredinium development, a process that leads to the formation of a reddish, pustule-like structure formed by a rust fungus and consisting of uredospores.
