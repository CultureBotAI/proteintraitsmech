identifier: GO:0009659
label: "leucoplast organization"
definition: >-
  A process that is carried out at the cellular level which results in the assembly, arrangement of constituent parts, or disassembly of a leucoplast. A leucoplast is a colorless plastid involved in the synthesis of monoterpenes.
