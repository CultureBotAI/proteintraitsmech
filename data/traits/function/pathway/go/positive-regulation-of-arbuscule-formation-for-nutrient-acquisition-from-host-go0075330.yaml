identifier: GO:0075330
label: "positive regulation of arbuscule formation for nutrient acquisition from host"
definition: >-
  Any process that activates or increases the frequency, rate or extent of symbiont arbuscule formation for nutrient acquisition from host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
