identifier: GO:0061240
label: "mesonephric nephron tubule morphogenesis"
definition: >-
  The process in which the anatomical structures of a mesonephric nephron tubule are generated and organized. A mesonephric nephron tubule is an epithelial tube that is part of the mesonephric nephron, the functional part of the mesonephros.
