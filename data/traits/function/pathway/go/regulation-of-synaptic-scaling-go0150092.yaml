identifier: GO:0150092
label: "regulation of synaptic scaling"
definition: >-
  A process that modulates synaptic scaling. Synaptic scaling is a form of synaptic plasticity, which entails uniform adjustments in the strength of all synapses on a cell in response to prolonged changes in the electrical activity of the cell.
