identifier: GO:0075285
label: "sexual sporulation resulting in formation of a multicellular or syncytial spore"
definition: >-
  The formation of multicellular or syncytial spore via septations derived from meiosis. A multicellular or syncytial spore is a structure that can be used for dissemination, for survival of adverse conditions because of its heat and desiccation resistance, and/or for reproduction.
