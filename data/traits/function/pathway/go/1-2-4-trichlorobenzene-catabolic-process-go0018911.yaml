identifier: GO:0018911
label: "1,2,4-trichlorobenzene catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of 1,2,4-trichlorobenzene, a derivative of benzene with chlorine atoms attached to positions 1, 2 and 4 of the ring. It is a colorless liquid used as a solvent in chemical manufacturing, in dyes and intermediates, dielectric fluid, synthetic transformer oils, lubricants, heat-transfer medium and insecticides.
