identifier: GO:1990216
label: "symbiont-mediated activation of host transcription"
definition: >-
  A process in which a symbiont initiates, promotes, or enhances transcription of genes into mRNA in its host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
