identifier: GO:0060983
label: "epicardium-derived cardiac vascular smooth muscle cell differentiation"
definition: >-
  The process in which a relatively unspecialized cell derived from the epicardium acquires specialized features of a cardiac vascular smooth muscle cell. A cardiac vascular smooth muscle cell covers the heart vasculature and lacks transverse striations in its constituent fibers.
