identifier: GO:0035292
label: "specification of segmental identity, trunk"
definition: >-
  The specification of the characteristic structures of trunk segments, following establishment of segment boundaries. In Drosophila, the trunk segments include thoracic segments and abdominal segments A1 to A8. Identity is considered to be the aggregate of characteristics by which a structure is recognized.
