identifier: GO:0062056
label: "compound eye pigment cell differentiation"
definition: >-
  The process in which a relatively unspecialized cell acquires the specialized features of a compound eye pigment cell, a cell of the retina containing screening pigments that functions to screen photoreceptors from light leaking from adjacent ommatidia.
