identifier: GO:0052080
label: "symbiont-mediated perturbation of host MAPK cascade"
definition: >-
  A process in which a symbiont alters or subverts a MAP kinase-mediated signal transduction pathway in its host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
