label: "negative regulation of the force of heart contraction involved in baroreceptor response to increased systemic arterial blood pressure"
definition: >-
  Any process that decreases the force with which the cardiac muscles of the heart pump blood through the circulatory system as a result of the baroreceptor response to increased blood pressure.
