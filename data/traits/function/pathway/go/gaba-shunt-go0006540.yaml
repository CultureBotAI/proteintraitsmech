identifier: GO:0006540
label: "GABA shunt"
definition: >-
  The chemical reactions and pathways resulting in the formation of succinate from L-glutamate via gamma-aminobutyrate (GABA), bypassing two steps of the TCA cycle. It operates through the sequential conversion of glutamate to GABA by glutamate decarboxylase, transamination of GABA to succinic semialdehyde by GABA transaminase, and oxidation of succinic semialdehyde to succinate by succinate semialdehyde dehydrogenase.
