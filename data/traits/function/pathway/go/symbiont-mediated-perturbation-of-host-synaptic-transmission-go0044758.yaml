identifier: GO:0044758
label: "symbiont-mediated perturbation of host synaptic transmission"
definition: >-
  A process in which a symbiont alters or subverts synaptic transmission, the communication from a neuron to a target (neuron, muscle, or secretory cell) across a synapse, in its host organism.
