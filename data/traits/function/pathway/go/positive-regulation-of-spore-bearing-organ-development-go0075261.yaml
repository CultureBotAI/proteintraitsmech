identifier: GO:0075261
label: "positive regulation of spore-bearing organ development"
definition: >-
  Any process that activates, maintains or increases the frequency, rate or extent of spore-bearing organ development, a process in which hyphae grow into special aggregates called fruiting bodies that produce new spores.
