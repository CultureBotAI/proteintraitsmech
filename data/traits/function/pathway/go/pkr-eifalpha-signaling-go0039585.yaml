identifier: GO:0039585
label: "PKR/eIFalpha signaling"
definition: >-
  An intracellular signaling cassette that starts with activation and autophosphorylation of PKR (also known as EIF2AK2), which phosphorylates proteins including the translation initiation factor eIF2 to inhibit translation. PKR is activated by stress signals and during the antiviral response, activated by binding to viral double-stranded RNA (dsRNA) leading to inhibition of protein synthesis during viral infection.
