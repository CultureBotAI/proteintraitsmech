identifier: GO:0003086
label: "regulation of systemic arterial blood pressure by local renal renin-angiotensin"
definition: >-
  The process in which angiotensinogen metabolites in the kidney modulate the force with which blood passes through the renal circulatory system. The process begins when renin cleaves angiotensinogen.
