identifier: GO:0036066
label: "protein O-linked glycosylation via fucose"
definition: >-
  A glycoprotein biosynthetic process starting with the covalent linkage of a fucose via an alpha-glycosidic bond to the oxygen atom of a serine or threonine side chain in a protein, which can be further elongated with the sequential addition of sugar units resulting in the formation of a protein O-linked glycan. This modification typically occurs within specific motifs, such as EGF-like or thrombospondin type-1 repeats.
