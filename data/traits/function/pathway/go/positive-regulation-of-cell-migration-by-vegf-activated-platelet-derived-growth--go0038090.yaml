identifier: GO:0038090
label: "positive regulation of cell migration by VEGF-activated platelet derived growth factor receptor signaling pathway"
definition: >-
  The series of molecular signals initiated by vascular endothelial growth factor (VEGF) binding to a platelet-derived growth factor receptor (PDGFR) on the surface of a cell, which activates or increases the frequency, rate or extent of the orderly movement of a cell from one site to another.
