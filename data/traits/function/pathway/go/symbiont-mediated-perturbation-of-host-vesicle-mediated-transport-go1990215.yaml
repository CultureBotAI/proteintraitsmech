identifier: GO:1990215
label: "symbiont-mediated perturbation of host vesicle-mediated transport"
definition: >-
  A process in which a symbiont alters or subverts vesicle-mediated transport in the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
