identifier: GO:0075046
label: "positive regulation of formation by symbiont of haustorium for nutrient acquisition from host"
definition: >-
  Any process that activates or increases the frequency, rate or extent of symbiont haustorium formation for nutrient acquisition from host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
