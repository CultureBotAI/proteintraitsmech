identifier: GO:0039592
label: "symbiont-mediated arrest of host cell cycle during G2/M transition"
definition: >-
  A process in which a symbiont interferes with the progression of the host mitotic cell cycle from G2 phase to M phase, leading to arrest in G2 phase. The arrest in G2/M allows some viruses to replicate their genome before cells enter mitosis. Alternatively, it can inhibit the antiviral immune response by preventing the clonal expansion of infected lymphocytes.
