identifier: GO:0048348
label: "paraxial mesodermal cell fate specification"
definition: >-
  The process in which a cell becomes capable of differentiating autonomously into a paraxial mesoderm cell in an environment that is neutral with respect to the developmental pathway; upon specification, the cell fate can be reversed.
