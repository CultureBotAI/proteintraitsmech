identifier: GO:0039580
label: "symbiont-mediated suppression of host PKR/eIFalpha signaling"
definition: >-
  A process in which a symbiont inhibits or disrupts host PKR (Protein Kinase regulated by RNA) signaling. PKR phosphorylates host targets such as the translation initiation factor eIF2alpha that inhibits protein synthesis as an antimicrobial response. Inhibition of host PKR signaling maintains the host ability to translate mRNA. The host is defined as the larger of the organisms involved in a symbiotic interaction.
