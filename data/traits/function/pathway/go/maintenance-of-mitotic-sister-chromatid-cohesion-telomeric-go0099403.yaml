identifier: GO:0099403
label: "maintenance of mitotic sister chromatid cohesion, telomeric"
definition: >-
  The process in which the association between sister chromatids of a replicated chromosome along the length of the telomeric region is maintained as chromosomes condense, attach to the spindle in a bipolar orientation, and congress to the metaphase plate during a mitotic cell cycle.
