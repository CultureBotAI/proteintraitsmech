identifier: GO:0014811
label: "negative regulation of skeletal muscle contraction by regulation of release of sequestered calcium ion"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of skeletal muscle contraction via the regulation of the release of sequestered calcium ion by sarcoplasmic reticulum into cytosol. The sarcoplasmic reticulum is the endoplasmic reticulum of striated muscle, specialised for the sequestration of calcium ions that are released upon receipt of a signal relayed by the T tubules from the neuromuscular junction.
