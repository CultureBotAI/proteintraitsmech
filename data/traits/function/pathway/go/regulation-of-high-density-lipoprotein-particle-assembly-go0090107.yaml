identifier: GO:0090107
label: "regulation of high-density lipoprotein particle assembly"
definition: >-
  Any process that modulates the frequency, rate, or extent of high-density lipoprotein particle assembly. High-density lipoprotein particle assembly is the aggregation and arrangement of proteins and lipids to form a high-density lipoprotein particle.
