identifier: GO:0160015
label: "platelet rolling"
definition: >-
  Transient adhesive interactions between platelets and endothelial cells lining blood vessels. Carbohydrates on circulating platelets bind selectins or other molecules on the vessel wall causing the platelets to slow down and roll along the inner surface of the vessel wall. During this rolling motion, transitory bonds are formed and broken between surface molecules of platelets and endothelium.
