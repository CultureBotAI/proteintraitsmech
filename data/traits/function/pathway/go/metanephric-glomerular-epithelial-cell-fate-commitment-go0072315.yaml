identifier: GO:0072315
label: "metanephric glomerular epithelial cell fate commitment"
definition: >-
  The process in which the developmental fate of a cell becomes restricted such that it will develop into a metanephric glomerular epithelial cell. Metanephric glomerular epithelial cells are specialized epithelial cells that form part of the metanephric glomerulus; there are two types, metanephric glomerular parietal epithelial cells and metanephric glomerular visceral epithelial cells.
