identifier: GO:0140626
label: "opioid growth factor receptor signaling pathway"
definition: >-
  The series of molecular signals generated as a consequence of an opioid growth factor receptor binding to its physiological ligand, opioid growth factor (OGF, met-enkephalin). The OGF-OGFr complex leads to the increase in the synthesis of the selective cyclin-dependent kinase (CDK) inhibitor proteins, p12 (POLD4) and p16 (CDKN2A).
