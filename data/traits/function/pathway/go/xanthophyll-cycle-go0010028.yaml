identifier: GO:0010028
label: "xanthophyll cycle"
definition: >-
  A cyclic series of interconversions involving three xanthophylls, violoxanthin, antheraxanthin, and zeaxanthin. The xanthophyll cycle is involved in regulating energy dissipation in light harvesting complex II.
