identifier: GO:0009233
label: "menaquinone metabolic process"
definition: >-
  The chemical reactions and pathways involving any of the menaquinones, quinone-derived compounds synthesized by intestinal bacteria. Structurally, menaquinones consist of a methylated naphthoquinone ring structure and side chains composed of a variable number of unsaturated isoprenoid residues. Menaquinones have vitamin K activity and are known as vitamin K2.
