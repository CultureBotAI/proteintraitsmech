identifier: GO:0075242
label: "negative regulation of zoospore formation"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of zoospore formation, a process in which a diploid cell undergoes meiosis, and the meiotic products acquire specialized features of asexual motile mononucleate flagellated spores called zoospores.
