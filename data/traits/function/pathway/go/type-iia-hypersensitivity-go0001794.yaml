identifier: GO:0001794
label: "type IIa hypersensitivity"
definition: >-
  An inflammatory response resulting in cell death mediated by activation of the classical complement pathway or induction of effector cell phagocytosis or cytolysis mechanisms via complement or Fc receptors following the binding of antibodies to cell surface antigens on a target cell.
