identifier: GO:0008616
label: "tRNA queuosine(34) biosynthetic process"
definition: >-
  The chemical reactions and pathways resulting in the formation of queuosines, a series of nucleosides found in position 34 of tRNA and having an additional pentenyl ring added via an NH group to the methyl group of 7-methylguanosine. The pentenyl ring may carry other substituents. The wobble nucleoside of the tRNA sequence (position 34) corresponds to the first position of the anticodon.
