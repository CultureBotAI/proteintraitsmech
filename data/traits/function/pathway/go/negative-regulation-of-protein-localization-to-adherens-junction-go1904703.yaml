identifier: GO:1904703
label: "negative regulation of protein localization to adherens junction"
definition: >-
  Any process that stops, prevents or reduces the frequency, rate or extent of protein localization to adherens junction. An adherens junction is a cell-cell junction composed of the epithelial cadherin-catenin complex at which the cytoplasmic face of the plasma membrane is attached to actin filaments.
