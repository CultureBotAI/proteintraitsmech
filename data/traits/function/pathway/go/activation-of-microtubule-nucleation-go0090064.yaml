identifier: GO:0090064
label: "activation of microtubule nucleation"
definition: >-
  Any process that starts the inactive process of microtubule nucleation. Microtubule nucleation is the 'de novo' formation of a microtubule, in which tubulin heterodimers form metastable oligomeric aggregates, some of which go on to support formation of a complete microtubule. Microtubule nucleation usually occurs from a specific site within a cell.
