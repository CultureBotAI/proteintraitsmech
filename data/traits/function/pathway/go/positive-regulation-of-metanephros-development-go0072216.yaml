identifier: GO:0072216
label: "positive regulation of metanephros development"
definition: >-
  Any process that increases the rate, frequency or extent of metanephros development. Metanephros development is the process whose specific outcome is the progression of the metanephros over time, from its formation to the mature structure. The metanephros is an organ that filters the blood and excretes the end products of body metabolism in the form of urine.
