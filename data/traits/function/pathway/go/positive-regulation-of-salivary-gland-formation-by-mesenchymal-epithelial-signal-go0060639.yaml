identifier: GO:0060639
label: "positive regulation of salivary gland formation by mesenchymal-epithelial signaling"
definition: >-
  Any process that induces the formation of the salivary gland field by means of the secretion of a signal by a mesenchymal cell and its reception and interpretation by an epithelial cell resulting in it adopting the identity of a salivary gland bud cell.
