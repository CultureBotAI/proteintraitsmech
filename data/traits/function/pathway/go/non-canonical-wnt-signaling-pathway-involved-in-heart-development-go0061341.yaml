identifier: GO:0061341
label: "non-canonical Wnt signaling pathway involved in heart development"
definition: >-
  The series of molecular signals initiated by binding of a Wnt protein to a frizzled family receptor on the surface of the target cell, followed by propagation of the signal via effectors other than beta-catenin and contributing to the progression of the heart over time.
