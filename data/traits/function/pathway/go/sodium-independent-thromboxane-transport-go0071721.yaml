identifier: GO:0071721
label: "sodium-independent thromboxane transport"
definition: >-
  The directed, sodium-independent, movement of thromboxanes into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore. A thromboxane is any of a class of oxygenated oxane derivatives, originally derived from prostaglandin precursors in platelets, that stimulate aggregation of platelets and constriction of blood vessels.
