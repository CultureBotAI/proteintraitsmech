identifier: GO:0032122
label: "oral apparatus organization"
definition: >-
  A process that is carried out at the cellular level which results in the assembly, arrangement of constituent parts, or disassembly of the oral apparatus. The oral apparatus is a funnel-like structure used by the cell to collect food and channel it to the cytostome, characteristic of ciliate protozoans.
