identifier: GO:0085034
label: "symbiont-mediated suppression of host NF-kappaB cascade"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupts an NF-kappaB-mediated signaling cascade in its host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
