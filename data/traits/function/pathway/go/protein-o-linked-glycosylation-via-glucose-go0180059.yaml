identifier: GO:0180059
label: "protein O-linked glycosylation via glucose"
definition: >-
  A glycoprotein biosynthetic process starting with the covalent linkage of a glucose via a beta-glycosidic bond to the oxygen atom of a serine, threonine or tyrosine side chain in a protein, which can be further elongated with the sequential addition of sugar units resulting in the formation of a protein O-linked glycan.
