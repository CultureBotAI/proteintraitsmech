label: "regulation of poly(3-hydroxyalkanoate) biosynthetic process"
definition: >-
  Any process that modulates the frequency, rate or extent of the chemical reactions and pathways resulting in the formation of poly(3-hydroxyalkanoates), polyesters of 3-hydroxyacids produced as intracellular granules by a large variety of bacteria.
