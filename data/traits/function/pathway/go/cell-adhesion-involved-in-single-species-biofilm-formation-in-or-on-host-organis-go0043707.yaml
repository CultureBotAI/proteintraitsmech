identifier: GO:0043707
label: "cell adhesion involved in single-species biofilm formation in or on host organism"
definition: >-
  The attachment of a cell to either a host cell or a microbial cell of the same species, or to an underlying host substrate, such as the extracellular matrix, via cell adhesion molecules, occurring during the formation of a biofilm in or on a host species.
