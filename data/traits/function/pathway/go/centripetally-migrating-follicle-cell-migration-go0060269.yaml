identifier: GO:0060269
label: "centripetally migrating follicle cell migration"
definition: >-
  The cell migration process in which a follicle cell migrates as part of an epithelial sheet between the nurse cells and the oocyte. At the end of migration, they cover the anterior of the oocyte.
