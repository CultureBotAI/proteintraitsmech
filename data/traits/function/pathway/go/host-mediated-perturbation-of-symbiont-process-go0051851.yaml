identifier: GO:0051851
label: "host-mediated perturbation of symbiont process"
definition: >-
  The process in which an host alters or subverts a process in a symbiont organism. The symbiont is defined as the smaller of the organisms involved in a symbiotic interaction.
definition_source: "GO (2026-06-15)"
