identifier: GO:0002332
label: "transitional stage B cell differentiation"
definition: >-
  The process in which immature B cells from the bone marrow become mature B cells in the spleen. Transitional stage B cells are subdivided into transitional one (T1) and transitional two (T2) stages and are short-lived and functionally incompetent.
