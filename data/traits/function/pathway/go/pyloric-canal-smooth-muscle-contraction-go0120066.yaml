identifier: GO:0120066
label: "pyloric canal smooth muscle contraction"
definition: >-
  A process in which force is generated within gastric smooth muscle tissue, resulting in a change in muscle geometry. This process occurs in the distal part of the pylorus between the pyloric antrum and the pyloric sphincter.
