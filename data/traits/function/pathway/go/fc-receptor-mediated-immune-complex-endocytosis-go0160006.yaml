identifier: GO:0160006
label: "Fc receptor-mediated immune complex endocytosis"
definition: >-
  An endocytosis process mediated by the Fc receptor for the purpose of delivery of antigen-bound immunoglobulin to an intracellular compartment where the antigen can be processed and loaded onto MHC molecules. This process selectively targets antigens for presentation by MHC class II or cross-presentation by MHC class I.
