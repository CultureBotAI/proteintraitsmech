identifier: GO:0046273
label: "lignan catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of lignans, any member of a class of plant metabolites related to lignins. Lignans are usually found as phenylpropanoid dimers in which the phenylpropanoid units are linked tail to tail and thus having a 2,3 dibenzylbutane skeleton, but higher oligomers can also exist.
