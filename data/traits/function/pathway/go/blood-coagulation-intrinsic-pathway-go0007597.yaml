identifier: GO:0007597
label: "blood coagulation, intrinsic pathway"
definition: >-
  A protein activation cascade that initiates blood coagulation, triggered when Factor XII, prekallikrein (PK) and high-molecular-weight kininogen (HK) assemble on a suitable surface or polymer. This results in the reciprocal activation of factor XII to Factor XIIa by kallikrein, and PK to kallikrein by Factor XIIa. The resulting generation of Factor XIIa activates Factor XI to Factor XIa, which then converts Factor IX to Factor IXa. Factor IXa converts Factor X to Xa. Factor Xa then initiates the common pathway.
