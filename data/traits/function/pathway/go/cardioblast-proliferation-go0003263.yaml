identifier: GO:0003263
label: "cardioblast proliferation"
definition: >-
  The multiplication or reproduction of cardioblasts, resulting in the expansion of the population in the heart field. A cardioblast is a cardiac precursor cell. It is a cell that has been committed to a cardiac fate, but will undergo more cell division rather than terminally differentiating.
