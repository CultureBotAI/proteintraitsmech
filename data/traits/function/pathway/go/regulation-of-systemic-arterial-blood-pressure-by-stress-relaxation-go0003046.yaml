identifier: GO:0003046
label: "regulation of systemic arterial blood pressure by stress relaxation"
definition: >-
  The intrinsic circulatory process resulting from stress relaxation that modulates the force with which blood travels through the systemic arterial circulatory system. Stress relaxation is the adaptation of vessels to a new size as a result of changes in pressure in storage areas such as veins, the liver, the spleen, and the lungs.
