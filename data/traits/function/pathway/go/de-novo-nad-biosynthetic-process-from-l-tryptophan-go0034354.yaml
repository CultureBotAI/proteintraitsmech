identifier: GO:0034354
label: "'de novo' NAD+ biosynthetic process from L-tryptophan"
definition: >-
  The chemical reactions and pathways resulting in the formation of nicotinamide adenine dinucleotide (NAD+), beginning with the catabolism of L-tryptophan into the precursor quinolinate. NAD+ is a coenzyme that interconverts with its reduced form, NADH, in many redox and catabolic reactions.
