identifier: GO:1990689
label: "endoplasmic reticulum-Golgi intermediate compartment (ERGIC) derived vesicle fusion with Golgi cis cisterna membrane"
definition: >-
  The joining of the lipid bilayer membrane around an ERGIC-derived vesicle to the lipid bilayer membrane around the Golgi cis cisterna. Such vesicles include COPII-coated transport vesicles involved in anterograde transport.
