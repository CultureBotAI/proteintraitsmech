identifier: GO:0061224
label: "mesonephric glomerulus development"
definition: >-
  The progression of the mesonephric glomerulus over time from its initial formation until its mature state. The mesonephric glomerulus is a capillary tuft which forms a close network with the visceral epithelium (podocytes) and the mesangium to form the filtration barrier and is surrounded by Bowman's capsule in nephrons of the mature vertebrate kidney, or mesonephros.
