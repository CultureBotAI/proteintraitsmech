identifier: GO:0044350
label: micropinocytosis
definition: >-
  An endocytosis process that results in the uptake of liquid material by cells from their external environment by invagination of the plasma membrane to form uncoated micropinosomes, differentiated from macropinosomes by their smaller size, on average 95 nm.
