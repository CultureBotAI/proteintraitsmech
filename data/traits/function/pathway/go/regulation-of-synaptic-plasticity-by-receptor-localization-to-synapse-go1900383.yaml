identifier: GO:1900383
label: "regulation of synaptic plasticity by receptor localization to synapse"
definition: >-
  Any process that modulates synaptic plasticity, the ability of synapses to change as circumstances require, via receptor localization to the synapse, the junction between a nerve fiber of one neuron and another neuron or muscle fiber or glial cell. Processes may include receptor transport to, and/or maintenance at, the synapse.
