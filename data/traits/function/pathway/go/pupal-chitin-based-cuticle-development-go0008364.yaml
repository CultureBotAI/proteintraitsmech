identifier: GO:0008364
label: "pupal chitin-based cuticle development"
definition: >-
  Synthesis and deposition of a chitin-based pupal cuticle. At the end of the prepupal period the insect is covered by the pupal cuticle which continues to be elaborated into the pupal period. An example of this is found in Drosophila melanogaster.
