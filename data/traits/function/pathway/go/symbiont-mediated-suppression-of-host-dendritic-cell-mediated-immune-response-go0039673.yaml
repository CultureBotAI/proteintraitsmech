identifier: GO:0039673
label: "symbiont-mediated suppression of host dendritic cell mediated immune response"
definition: >-
  A process in which a symbiont inhibits or disrupts the dendritic cell mediated immune response of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
