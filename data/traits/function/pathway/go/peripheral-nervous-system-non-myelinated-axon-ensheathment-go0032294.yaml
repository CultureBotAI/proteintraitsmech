identifier: GO:0032294
label: "peripheral nervous system non-myelinated axon ensheathment"
definition: >-
  The process in which a non-myelinating Schwann cell membrane encircles an axon in the peripheral nervous system. A single non-myelinating Schwann cell will typically associate with multiple axons.
