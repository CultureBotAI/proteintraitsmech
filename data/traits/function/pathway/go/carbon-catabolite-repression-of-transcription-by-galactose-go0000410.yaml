identifier: GO:0000410
label: "carbon catabolite repression of transcription by galactose"
definition: >-
  A transcription regulation process in which the presence of galactose that leads to a decrease in the frequency, rate, or extent of transcription of specific genes involved in the metabolism of other carbon sources. Carbon catabolite repression is a mechanism of genetic regulation which the accumulation of catabolites of one substance in the cell represses the formation of enzymes that contribute to the catabolism of other substances.
