identifier: GO:0099607
label: "lateral attachment of mitotic spindle microtubules to kinetochore"
definition: >-
  The cellular process in which sister chromatids become laterally attached to spindle microtubules as part of mitotic metaphase plate congression. Attachment precedes migration along microtubules towards the spindle equator (metaphase plate).
