identifier: GO:0141213
label: "symbiont-mediated generation of symbiont replication vacuole"
definition: >-
  A process in which a symbiont alters or subverts vacuole organization in its host organism to form a protected environment in which it can replicate. The host is defined as the larger of the organisms involved in a symbiotic interaction.
