identifier: GO:0015759
label: "beta-glucoside transport"
definition: >-
  The directed movement of beta-glucosides into, out of or within a cell, or between cells, by means of some agent such as a transporter or pore. Beta-glucosides are glycosides in which the sugar group is a glucose residue, and the anomeric carbon of the bond is in a beta configuration.
