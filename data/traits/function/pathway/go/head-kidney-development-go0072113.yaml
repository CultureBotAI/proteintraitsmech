identifier: GO:0072113
label: "head kidney development"
definition: >-
  The process whose specific outcome is the progression of the head kidney over time, from its formation to the mature structure. The head kidney is a pronephros that consists of fused bilateral lobes located in the anterior part of the kidney. It is analogous to the mammalian bone marrow and the primary site of definitive hematopoiesis.
