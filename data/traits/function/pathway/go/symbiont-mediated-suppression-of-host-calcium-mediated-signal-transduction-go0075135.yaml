identifier: GO:0075135
label: "symbiont-mediated suppression of host calcium-mediated signal transduction"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupts a calcium signal transduction in the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
