identifier: GO:0072249
label: "metanephric podocyte development"
definition: >-
  The process whose specific outcome is the progression of a metanephric glomerular visceral epithelial cell over time, from its formation to the mature structure. A metanephric glomerular visceral epithelial cell is a specialized epithelial cell that contains 'feet' that interdigitate with the 'feet' of other glomerular epithelial cells in the metanephros.
