identifier: GO:0032785
label: "negative regulation of DNA-templated transcription, elongation"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of transcription elongation, the extension of an RNA molecule after transcription initiation and promoter clearance by the addition of ribonucleotides catalyzed by a DNA-dependent RNA polymerase.
