identifier: GO:0031637
label: "regulation of neuronal synaptic plasticity in response to neurotrophin"
definition: >-
  The process in which a neurotrophic factor induces neuronal synaptic plasticity, the ability of neuronal synapses to change as circumstances require. They may alter function, such as increasing or decreasing their sensitivity, or they may increase or decrease in actual numbers.
