identifier: GO:0003105
label: "negative regulation of glomerular filtration"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of glomerular filtration. Glomerular filtration is the process whereby blood is filtered by the glomerulus into the renal tubule.
