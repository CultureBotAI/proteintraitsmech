identifier: GO:0002559
label: "type I hypersensitivity mediated by basophils"
definition: >-
  An inflammatory response driven by antigen recognition by antibodies bound to Fc receptors basophils, occurring within minutes after exposure of a sensitized individual to the antigen, and leading to the release of a variety of inflammatory mediators such as histamines.
