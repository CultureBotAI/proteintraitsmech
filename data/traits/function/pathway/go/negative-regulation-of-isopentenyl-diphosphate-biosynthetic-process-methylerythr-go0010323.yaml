identifier: GO:0010323
label: "negative regulation of isopentenyl diphosphate biosynthetic process, methylerythritol phosphate pathway"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of the chemical reactions and pathways resulting in the formation of isopentenyl diphosphate produced via the methylerythritol (MEP) pathway (mevalonate-independent).
