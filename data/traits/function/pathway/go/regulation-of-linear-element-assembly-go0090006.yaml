identifier: GO:0090006
label: "regulation of linear element assembly"
definition: >-
  Any process that modulates the rate, frequency or extent of linear element assembly. Linear element assembly is the cell cycle process in which a proteinaceous scaffold, related to the synaptonemal complex, is assembled in association with S. pombe chromosomes during meiotic prophase.
