identifier: GO:0051214
label: "RNAi-mediated antiviral immunity against RNA virus"
definition: >-
  An RNAi-mediated post-transcriptional gene silencing pathway induced by RNA viruses leading to a sequence-specific degradation of target mRNAs or inhibition of translation. In plants, DCL4 is the primary Dicer to detect RNA viruses.
