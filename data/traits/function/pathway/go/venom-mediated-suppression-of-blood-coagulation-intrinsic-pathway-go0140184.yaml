identifier: GO:0140184
label: "venom-mediated suppression of blood coagulation, intrinsic pathway"
definition: >-
  A process in which an organism inhibits or disrupts blood coagulation in another organism by suppression of the intrinsic pathway via the action of a venom. A common mechanism is the blocking the activity of host coagulation Factor XIIa (F12).
