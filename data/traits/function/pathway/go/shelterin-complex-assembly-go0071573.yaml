identifier: GO:0071573
label: "shelterin complex assembly"
definition: >-
  The aggregation, arrangement and bonding together of a set of components to form a shelterin complex. A shelterin complex is a nuclear telomere cap complex that is formed by the association of telomeric ssDNA- and dsDNA-binding proteins with telomeric DNA, and is involved in telomere protection and recruitment of telomerase.
