identifier: GO:0061252
label: "mesonephric glomerular epithelial cell fate commitment"
definition: >-
  The process in which the developmental fate of a cell becomes restricted such that it will develop into a mesonephric glomerular epithelial cell. Mesonephric glomerular epithelial cells are specialized epithelial cells that form part of the mesonephric glomerulus; there are two types, mesonephric glomerular parietal epithelial cells and mesonephric glomerular visceral epithelial cells.
