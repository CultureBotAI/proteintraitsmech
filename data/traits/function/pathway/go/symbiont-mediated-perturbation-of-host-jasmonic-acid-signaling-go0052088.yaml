identifier: GO:0052088
label: "symbiont-mediated perturbation of host jasmonic acid signaling"
definition: >-
  A process in which a symbiont alters or subverts a jasmonic acid-mediated signal transduction pathway in its host. The host is defined as the larger of the organisms involved in a symbiotic interaction.
