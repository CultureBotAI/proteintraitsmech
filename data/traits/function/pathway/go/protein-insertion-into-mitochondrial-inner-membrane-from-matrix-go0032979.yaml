identifier: GO:0032979
label: "protein insertion into mitochondrial inner membrane from matrix"
definition: >-
  The process in which a protein is incorporated into the mitochondrial inner membrane from the matrix side. This includes membrane insertion of newly synthesized mitochondrially-encoded proteins, and insertion of nuclear-encoded proteins after their import into the mitochondrial matrix.
