identifier: GO:0039671
label: "symbiont-mediated perturbation of host natural killer cell mediated immune response"
definition: >-
  A process in which a symbiont alters or subverts the natural killer cell mediated immune response of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
