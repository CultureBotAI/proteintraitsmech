identifier: GO:0039557
label: "symbiont-mediated suppression of host cytoplasmic pattern recognition receptor signaling pathway via inhibition of IRF7 activity"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupts a cytoplasmic pattern recognition receptor signaling pathway by reducing the activity of IRF7 (interferon regulatory factor-7). IRF7 a transcription factor in the RIG-I/MDA-5 signaling pathway. Viral infection triggers phosphorylation of cytoplasmic IRF7, which allows IRF7 to form a homodimer, migrate to the nucleus, and activate transcription of IFN-alpha and IFN-beta genes.
