identifier: GO:0001182
label: "RNA polymerase I promoter clearance"
definition: >-
  A process that mediates the transition from the initiation to the elongation phases of transcription by RNA polymerase I, generally including a conformational change from the initiation conformation to the elongation conformation. Promoter clearance often involves breaking contact with transcription factors involved only in the initiation phase and making contacts with elongation specific factors.
