identifier: GO:0075288
label: "negative regulation of sporangiospore formation"
definition: >-
  Any process that stops, prevents, or reduces the frequency, rate or extent of sporangiospore formation, a process in which sporangiospores, a type of asexual spore found in fungi, are formed. Sporangiospores are formed within sac-like structure, the sporangium, following the division of the cytoplasm.
