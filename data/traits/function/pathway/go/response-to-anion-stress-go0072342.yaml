label: "response to anion stress"
definition: >-
  Any process that results in a change in state or activity of a cell or an organism (in terms of movement, secretion, enzyme production, gene expression, etc.) as a result of anion stress, an increase or decrease in the concentration of negatively charged ions in the environment.
