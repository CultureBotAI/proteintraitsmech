identifier: GO:0052111
label: "symbiont-mediated disruption of host anatomical structure"
definition: >-
  The process in which an organism effects a change that impairs the structure or function of an anatomical structure of the host organism. The host is defined as the larger of the organisms involved in a symbiotic interaction.
