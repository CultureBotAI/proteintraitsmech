identifier: GO:0070392
label: "detection of lipoteichoic acid"
definition: >-
  The series of events in which a lipoteichoic acid stimulus is received by a cell and converted into a molecular signal; lipoteichoic acid is a major component of the cell wall of gram-positive bacteria and typically consists of a chain of glycerol-phosphate repeating units linked to a glycolipid anchor.
