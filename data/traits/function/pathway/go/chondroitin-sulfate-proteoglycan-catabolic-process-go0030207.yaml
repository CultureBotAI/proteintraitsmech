identifier: GO:0030207
label: "chondroitin sulfate proteoglycan catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of chondroitin sulfate proteoglycans, which consist of a core protein linked to a chondroitin sulfate glycosaminoglycan. The chondroitin sulfate chain is composed of the repeating disaccharide unit beta-(1,4)-D-glucuronic acid-beta-(1,3)-N-acetyl-D-galactosamine, the latter of which can be O-sulfated.
