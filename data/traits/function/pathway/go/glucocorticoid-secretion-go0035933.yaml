identifier: GO:0035933
label: "glucocorticoid secretion"
definition: >-
  The regulated release of any glucocorticoid hormone into the circulatory system. Glucocorticoids are a class of steroid hormones that regulate a variety of physiological processes, in particular control of the concentration of glucose in blood.
