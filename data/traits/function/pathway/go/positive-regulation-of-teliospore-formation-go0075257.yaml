identifier: GO:0075257
label: "positive regulation of teliospore formation"
definition: >-
  Any process that activates, maintains or increases the frequency, rate or extent of teliospore formation, which is the formation of a thick-walled resting or overwintering spore produced by the rust fungi (Uredinales) and smut fungi (Ustilaginales) in which karyogamy occurs.
