identifier: GO:0039563
label: "symbiont-mediated suppression of host JAK-STAT cascade via inhibition of STAT1 activity"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupt a JAK-STAT signal cascade in the host organism by reducing the activity of host STAT1 (signal transducer and activator of transcription 1).
