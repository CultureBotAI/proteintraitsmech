identifier: GO:0060568
label: "regulation of peptide hormone processing"
definition: >-
  Any process that modulates the rate, frequency or extent of peptide hormone processing. Peptide hormone processing is the generation of a mature peptide hormone by posttranslational processing of a prohormone.
