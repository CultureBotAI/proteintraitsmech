identifier: GO:0120313
label: "regulation of oocyte karyosome formation"
definition: >-
  Any process that modulates the frequency, rate or extent of oocyte karyosome formation, the chromosome organization process in which meiotic chromosomes in the oocyte nucleus cluster together to form a compact spherical structure called the karyosome.
