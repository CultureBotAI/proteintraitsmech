identifier: GO:0019677
label: "NAD+ catabolic process"
definition: >-
  The chemical reactions and pathways resulting in the breakdown of nicotinamide adenine dinucleotide (NAD+), a coenzyme that interconverts with its reduced form, NADH, in many redox and catabolic reactions.
