identifier: GO:0039635
label: "symbiont-mediated suppression of host peptidoglycan biosynthetic process"
definition: >-
  Any process in which a symbiont stops, prevents, or reduces the frequency, rate or extent of peptidoglycan biosynthesis in the host organism. Peptidoglycans are any of a class of glycoconjugates found in bacterial cell walls, and phages have mechanisms to disrupt their host's cell walls.
