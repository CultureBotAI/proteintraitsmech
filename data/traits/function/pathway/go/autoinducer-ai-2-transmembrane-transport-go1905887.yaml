identifier: GO:1905887
label: "autoinducer AI-2 transmembrane transport"
definition: >-
  The process in which (2R,4S)-2-methyltetrahydrofuran-2,3,3,4-tetrol (autoinducer AI-2) is transported across a membrane. AI-2 is produced by prokaryotes and is believed to play a role in quorum sensing.
