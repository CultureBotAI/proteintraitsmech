identifier: GO:0039554
label: "symbiont-mediated suppression of host cytoplasmic pattern recognition receptor signaling pathway via inhibition of MDA-5 activity"
definition: >-
  A process in which a symbiont interferes with, inhibits or disrupts a cytoplasmic pattern recognition receptor signaling pathway by inhibiting the activity of MDA-5 (also known as IFIH1). The cytoplasmic pattern recognition receptor MDA-5 detects dsRNA synthesized during active viral replication and triggers a signaling pathway to protect the host against viral infection, for example by inducing the expression of antiviral cytokines.
