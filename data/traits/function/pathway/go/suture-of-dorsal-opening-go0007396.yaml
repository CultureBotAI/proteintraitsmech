identifier: GO:0007396
label: "suture of dorsal opening"
definition: >-
  Closure of the dorsal hole. Filopodia extending from each leading edge interdigitate at the dorsal midline and appear to prime the formation of adherens junctions between the two rows of leading edge cells. Newly formed septate junctions are also used to seal the dorsal hole.
