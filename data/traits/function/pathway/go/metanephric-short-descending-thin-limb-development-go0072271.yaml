identifier: GO:0072271
label: "metanephric short descending thin limb development"
definition: >-
  The process whose specific outcome is the progression of the metanephric short descending thin limb over time, from its formation to the mature structure. The metanephric short descending thin limb is the descending thin limb of a short nephron in the metanephros that has a squamous epithelial morphology.
