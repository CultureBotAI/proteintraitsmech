identifier: GO:0180057
label: "protein post-translational transfer of dolichol-linked oligosaccharide"
definition: >-
  A N-linked protein glycosylation process in which the preassembled dolichol-linked oligosaccharide precursor is transfered co-translationally to an asparagine residue within the motif Asn-X-Ser/Thr of the target protein. This is mediated by the OSTB complex.
