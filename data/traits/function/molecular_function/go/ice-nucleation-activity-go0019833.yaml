identifier: GO:0019833
label: "ice nucleation activity"
definition: >-
  Catalysis of the formation of ice crystals in extracellular fluid at relatively high temperatures (up to -2 degrees Celsius) to protect the organism from damage by intracellular ice formation. This process is commonly found in certain bacteria, such as Pseudomonas syringae, and plays roles in environmental adaptation and plant pathogenesis.
