identifier: GO:0033995
label: "anhydrosialidase activity"
definition: >-
  Catalysis of the reaction: an N-acetylneuraminate glycoside = 2,7-anhydro-alpha-N-acetylneuraminate + an alpha-sialyl group. This reaction is the elimination of alpha-sialyl groups in N-acetylneuraminic acid glycosides, releasing 2,7-anhydro-alpha-N-acetylneuraminate.
