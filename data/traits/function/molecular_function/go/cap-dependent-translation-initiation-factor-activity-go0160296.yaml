identifier: GO:0160296
label: "cap-dependent translation initiation factor activity"
definition: >-
  A translation initiation factor activity that enables the recognition and binding to the 7-methylguanosine cap structure at the 5' end of eukaryotic mRNAs, promoting ribosome recruitment and assembly and translation initiation in a cap-dependent manner.
