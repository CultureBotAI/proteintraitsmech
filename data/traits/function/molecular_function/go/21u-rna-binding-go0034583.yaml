identifier: GO:0034583
label: "21U-RNA binding"
definition: >-
  Binding to a 21U-RNA, a 21-nucleotide RNA characterized by a uridine 5'-monophosphate and a modified 3' end resistant to periodate degradation. 21U-RNAs are derived from distinct, autonomously expressed loci within the genome.
