identifier: GO:0032041
label: "histone H3K14 deacetylase activity, NAD-dependent"
definition: >-
  Catalysis of the reaction: histone H3 N6-acetyl-L-lysine (position 14) + NAD+ + H2O = histone H3 L-lysine (position 14) + 2''-O-acetyl-ADP-D-ribose + nicotinamide. This reaction transfers an acetyl group attached to a lysine residue in H3K14 to NAD, producing nicotinamide.
