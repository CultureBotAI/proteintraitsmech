identifier: GO:0042970
label: "L-homoserine transmembrane transporter activity"
definition: >-
  Enables the transfer of homoserine from one side of a membrane to the other. Homoserine is alpha-amino-gamma-hydroxybutyric acid, an intermediate in the biosynthesis of cystathionine, threonine and methionine.
