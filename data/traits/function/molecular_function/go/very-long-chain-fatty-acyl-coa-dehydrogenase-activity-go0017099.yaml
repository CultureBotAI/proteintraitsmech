identifier: GO:0017099
label: "very-long-chain fatty acyl-CoA dehydrogenase activity"
definition: >-
  Catalysis of the reaction: a very-long-chain 2,3-saturated fatty acyl-CoA + H+ + oxidized [electron-transfer flavoprotein] = a very-long-chain (2E)-enoyl-CoA + reduced [electron-transfer flavoprotein]. A very long-chain fatty acid has an aliphatic tail containing more than 22 carbons.
