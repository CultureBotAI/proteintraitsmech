identifier: GO:0005362
label: "low-affinity D-glucose:sodium symporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: D-glucose(out) + Na+(out) = D-glucose(in) + Na+(in). In low-affinity transport the transporter is able to bind the solute only if it is present at very high concentrations.
