identifier: GO:0016213
label: "acyl-CoA 6-desaturase activity"
definition: >-
  Catalysis of the introduction of a cis double bond at carbon 6 of acyl-CoAs, introducing a new double bond between a pre-existing double bond and the carboxyl-end of the fatty acid. Specific reactions include: (9Z,12Z)-octadecadienoyl-CoA + 2 Fe(II)-[cytochrome b5] + 2 H+ + O2 = (6Z,9Z,12Z)-octadecatrienoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O; and (9Z,12Z,15Z)-octadecatrienoyl-CoA + 2 Fe(II)-[cytochrome b5] + O2 + 2 H+ = (6Z,9Z,12Z,15Z)-octadecatetraenoyl-CoA + 2 Fe(III)-[cytochrome b5] + 2 H2O.
