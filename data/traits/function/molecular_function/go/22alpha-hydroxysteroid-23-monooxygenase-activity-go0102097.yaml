label: "22alpha-hydroxysteroid 23-monooxygenase activity"
definition: >-
  Catalysis of the reaction: (22S,24R)-22-hydroxy-5alpha-ergostan-3-one + O2 + reduced [NADPH--hemoprotein reductase] = 3-dehydro-6-deoxoteasterone + H+ + H2O + oxidized [NADPH--hemoprotein reductase]. Also converts 3-epi-6-deoxocathasterone to 6-deoxotyphasterol.
