label: "calcium ion binding involved in regulation of presynaptic cytosolic calcium ion concentration"
definition: >-
  The directed change of presynaptic cytosolic free calcium ion concentration in the cytosol via the reversible binding of calcium ions to calcium-binding proteins in the cytosol thereby modulating the spatial and temporal dynamics of changes in presynaptic cytosolic calcium concentrations.
