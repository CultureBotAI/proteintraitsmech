identifier: GO:0061657
label: "UFM1 conjugating enzyme activity"
definition: >-
  Isoenergetic transfer of UFM1 from one protein to another via the reaction X-UFM1 + Y = Y-UFM1 + X, where both the X-UFM1 and Y-UFM1 linkages are thioester bonds between the C-terminal amino acid of UFM1 and a sulfhydryl side group of a cysteine residue.
