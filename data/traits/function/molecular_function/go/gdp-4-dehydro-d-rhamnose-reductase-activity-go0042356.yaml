identifier: GO:0042356
label: "GDP-4-dehydro-D-rhamnose reductase activity"
definition: >-
  Catalysis of the reaction: GDP-6-deoxy-D-mannose + NAD(P)+ = GDP-4-dehydro-6-deoxy-D-mannose + NAD(P)H + H+. In the reverse reaction, a mixture of GDP-D-rhamnose and its C-4 epimer is formed.
