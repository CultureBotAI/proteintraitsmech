identifier: GO:0004895
label: "cell adhesion receptor activity"
definition: >-
  The binding by a cell-adhesion protein on the cell surface to an extracellular matrix component, to mediate adhesion of the cell to the external substrate or to another cell and to initiate intracellular signaling. Cell adhesion receptors include integrins and cadherins.
