identifier: GO:0051743
label: "red chlorophyll catabolite reductase activity"
definition: >-
  Catalysis of the reaction: primary fluorescent chlorophyll catabolite + 2 oxidized [2Fe-2S]-[ferredoxin] = red chlorophyll catabolite + 2 reduced [2Fe-2S]-[ferredoxin] + 3 H+. This reaction is the reduction of the C20/C1 double bond in the pyrrole system of red chlorophyll catabolite (RCC) to a colorless tetrapyrrole (pFCC) with a strong blue fluorescence.
