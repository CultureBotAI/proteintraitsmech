label: "pyrimidine- and adenosine-specific:sodium symporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: (pyrimidine nucleoside or adenosine)(out) + Na+(out) = (pyrimidine nucleoside or adenosine)(in) + Na+(in).
