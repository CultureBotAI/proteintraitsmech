identifier: GO:0030753
label: "8-hydroxyfuranocoumarin 8-O-methyltransferase activity"
definition: >-
  Catalysis of the reaction: S-adenosyl-L-methionine + xanthotoxol = S-adenosyl-L-homocysteine + xanthotoxin. Xanthotoxol is also known as 8-hydroxyfuranocoumarin and xanthotoxin as 8-methoxyfuranocoumarin.
