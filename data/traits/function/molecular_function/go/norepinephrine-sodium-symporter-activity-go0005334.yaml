identifier: GO:0005334
label: "norepinephrine:sodium symporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: norepinephrine(out) + Na+(out) + Cl-(out) = norepinephrine(in) + Na+(in) + Cl-(in).
