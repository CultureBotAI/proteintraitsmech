identifier: GO:0046933
label: "proton-transporting ATP synthase activity, rotational mechanism"
definition: >-
  Enables the synthesis of ATP from ADP and phosphate by the transfer of protons from one side of a membrane to the other by a rotational mechanism driven by a gradient according to the reaction: ADP + phosphate + 5 H+(out) => ATP + H2O + 4 H+(in).
