identifier: GO:0003829
label: "beta-1,3-galactosyl-O-glycosyl-glycoprotein beta-1,6-N-acetylglucosaminyltransferase activity"
definition: >-
  Catalysis of the reaction: UDP-N-acetyl-D-glucosamine + beta-D-galactosyl-(1->3)-N-acetyl-D-galactosaminyl-R = UDP + beta-D-galactosyl-(1->3)-[N-acetyl-beta-D-glucosaminyl-(1->6)]-N-acetyl-D-galactosaminyl-R. This reaction is the addition of N-acetyl-alpha-D-glucosamine to the core 1 structure of O-glycans forming core 2.
