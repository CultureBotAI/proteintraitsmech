label: "B-type glycerophospholipase activity"
definition: >-
  A glycerophospholipase activity that cleaves both fatty acisd attached to the sn-1 and the sn-2 position of the glycerol group of a glycerophospholipid. Substrates include phosphatidylcholine and phosphatidylethanolamine.
