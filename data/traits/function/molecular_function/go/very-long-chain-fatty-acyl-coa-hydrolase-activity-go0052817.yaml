identifier: GO:0052817
label: "very long-chain fatty acyl-CoA hydrolase activity"
definition: >-
  Catalysis of the reaction: a very long-chain fatty acyl-CoA + H2O = a very long-chain fatty acid + CoA + H+. A very long-chain fatty acid has an aliphatic tail containing more than 22 carbons.
