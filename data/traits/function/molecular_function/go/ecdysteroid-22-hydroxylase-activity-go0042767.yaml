label: "ecdysteroid 22-hydroxylase activity"
definition: >-
  Catalysis of the reaction: 3-dehydro-2,22-dideoxyecdysone + 2 reduced [adrenodoxin] + O2 + 2 H+ = 3-dehydro-2-deoxyecdysone + 2 oxidized [adrenodoxin] + H2O. Other substrates include 3-dehydro-2,22,25-deoxyecdysone and 2,22-dideoxyecdysone.
