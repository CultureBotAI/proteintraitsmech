identifier: GO:0015487
label: "melibiose:monoatomic cation symporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: melibiose(out) + monovalent cation(out) = melibiose(in) + monovalent cation(in).
