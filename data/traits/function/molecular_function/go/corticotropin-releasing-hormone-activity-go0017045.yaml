identifier: GO:0017045
label: "corticotropin-releasing hormone activity"
definition: >-
  The action characteristic of corticotropin-releasing hormone (CRH), any of a number of peptides released by the mammalian hypothalamus into the hypophyseal-portal circulation in response to neural and/or chemical stimuli. Upon receptor binding, CRH increases the rate of corticotropin secretion by the anterior pituitary.
