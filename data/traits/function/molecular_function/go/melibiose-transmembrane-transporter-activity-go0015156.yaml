identifier: GO:0015156
label: "melibiose transmembrane transporter activity"
definition: >-
  Enables the transfer of melibiose from one side of a membrane to the other. Melibiose is the disaccharide 6-O-alpha-D-galactopyranosyl-D-glucose and occurs as a constituent of the trisaccharide raffinose or in the exudates and nectaries of a number of plants.
