identifier: GO:0015227
label: "O-acyl-L-carnitine transmembrane transporter activity"
definition: >-
  Enables the transfer of O-acyl-L-carnitine from one side of a membrane to the other. O-acyl-L-carnitine is the condensation product of a carboxylic acid and carnitine and is the transport form for a fatty acid crossing the mitochondrial membrane.
