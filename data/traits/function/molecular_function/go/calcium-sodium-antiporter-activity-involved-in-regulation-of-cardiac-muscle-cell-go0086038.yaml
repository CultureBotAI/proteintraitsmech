identifier: GO:0086038
label: "calcium:sodium antiporter activity involved in regulation of cardiac muscle cell membrane potential"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: Ca2+(in) + Na+(out) = Ca2+(out) + Na+(in), which contributes to regulating the membrane potential of a cardiac muscle cell.
