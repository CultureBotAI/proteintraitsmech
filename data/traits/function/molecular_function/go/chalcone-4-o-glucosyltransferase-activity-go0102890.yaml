identifier: GO:0102890
label: "chalcone 4'-O-glucosyltransferase activity"
definition: >-
  Catalysis of the reaction: UDP-alpha-D-glucose + 2',4,4',6'-tetrahydroxychalcone = UDP + 2',4,4',6'-tetrahydroxychalcone 4'-O-beta-D-glucoside + H+. Also converts 2',3,4,4',6'-pentahydroxychalcone + UDP-alpha-D-glucose into 2',3,4,4',6'-pentahydroxychalcone 4'-O-beta-D-glucoside.
