identifier: GO:0047747
label: "cholate-CoA ligase activity"
definition: >-
  Catalysis of the reactions: (1) ATP + cholate + CoA = AMP + diphosphate + choloyl-CoA and (2) ATP + (25R)-3alpha,7alpha,12alpha-trihydroxy-5beta-cholestan-26-oate + CoA = AMP + diphosphate + (25R)-3alpha,7alpha,12alpha-trihydroxy-5beta-cholestanoyl-CoA. This reaction is the first step in the conjugation of bile acids with amino acids, converting bile acids into their acyl-CoA thioesters. Chenodeoxycholate, deoxycholate, lithocholate and trihydroxycoprostanoate can also act as substrates.
