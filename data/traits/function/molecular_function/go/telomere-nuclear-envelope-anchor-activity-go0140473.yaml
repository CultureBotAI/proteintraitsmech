identifier: GO:0140473
label: "telomere-nuclear envelope anchor activity"
definition: >-
  The binding activity of a molecule that brings together the telomeric region of a chromosome and the inner nuclear membrane by interacting with both the telomere and the nuclear membrane, in order to establish and maintain the telomeric location.
