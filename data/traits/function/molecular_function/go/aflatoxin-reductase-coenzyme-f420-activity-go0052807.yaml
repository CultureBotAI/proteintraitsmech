  Catalysis of the reaction: aflatoxin + 1,5-dihydrocoenzyme F420 = aflatoxin with reduced furanocoumarin moiety + coenzyme F420. 1,5-dihydrocoenzyme F420 is also known as reduced coenzyme F420.
