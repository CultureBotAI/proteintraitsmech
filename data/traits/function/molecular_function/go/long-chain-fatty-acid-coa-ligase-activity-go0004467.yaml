identifier: GO:0004467
label: "long-chain fatty acid-CoA ligase activity"
definition: >-
  Catalysis of the reaction: a long-chain fatty acid + ATP + CoA = a long-chain fatty acyl-CoA + AMP + diphosphate. A long-chain fatty acid has an aliphatic tail containing 13 to 22 carbons.
