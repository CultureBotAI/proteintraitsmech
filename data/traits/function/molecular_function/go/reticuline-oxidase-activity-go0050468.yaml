identifier: GO:0050468
label: "reticuline oxidase activity"
definition: >-
  Catalysis of the reaction: (S)-reticuline + O2 = (S)-scoulerine + H2O2 + H+. Also acts on related compounds, converting the N-methyl group into the methylene bridge ('berberine bridge') of (S)- tetrahydroprotoberberines.
