identifier: GO:0016784
label: "3-mercaptopyruvate sulfurtransferase activity"
definition: >-
  Catalysis of the reaction: 2-oxo-3-sulfanylpropanoate + [thioredoxin]-dithiol = [thioredoxin]-disulfide + hydrogen sulfide + pyruvate + H+. Note that 2-oxo-3-sulfanylpropanoate is also known as 3-mercaptopyruvate.
