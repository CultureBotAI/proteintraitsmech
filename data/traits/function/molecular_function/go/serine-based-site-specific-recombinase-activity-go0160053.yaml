identifier: GO:0160053
label: "serine-based site-specific recombinase activity"
definition: >-
  Catalysis of the formation of new phosphodiester bonds between a pair of short, unique DNA target sequences; occurs through a phosphoseryl intermediate in which the target sequence is first cleaved by the nucleophilic attack by a serine in the active site.
