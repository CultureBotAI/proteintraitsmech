identifier: GO:0052816
label: "long-chain fatty acyl-CoA hydrolase activity"
definition: >-
  Catalysis of the reaction: a long-chain fatty acyl-CoA + H2O = a long-chain fatty acid + CoA + H+. A long-chain fatty acid has an aliphatic tail containing 13 to 22 carbons.
