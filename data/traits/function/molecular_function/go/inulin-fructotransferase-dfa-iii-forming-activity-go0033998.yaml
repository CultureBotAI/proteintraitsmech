identifier: GO:0033998
label: "inulin fructotransferase (DFA-III-forming) activity"
definition: >-
  Catalysis of the reaction: [(2->1)-beta-D-fructosyl](n) = [(2->1)-beta-D-fructosyl](n-1) + alpha-D-fructofuranose beta-D-fructofuranose 1,2':2,3'-dianhydride. This reaction is the production of alpha-D-fructofuranose beta-D-fructofuranose 1,2':2,3'-dianhydride (DFA III) by successively eliminating the diminishing (2->1)-beta-D-fructan (inulin) chain from the terminal D-fructosyl-D-fructosyl disaccharide.
definition_source: "GO (2026-06-15)"
