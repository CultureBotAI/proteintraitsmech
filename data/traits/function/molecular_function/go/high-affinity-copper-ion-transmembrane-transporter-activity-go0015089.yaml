identifier: GO:0015089
label: "high-affinity copper ion transmembrane transporter activity"
definition: >-
  Enables the transfer of a copper ions (Cu2+) from one side of a membrane to the other. In high-affinity transport the transporter is able to bind the solute even if it is only present at very low concentrations.
