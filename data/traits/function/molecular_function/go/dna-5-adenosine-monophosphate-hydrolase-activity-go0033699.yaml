identifier: GO:0033699
label: "DNA 5'-adenosine monophosphate hydrolase activity"
definition: >-
  Catalysis of the reactions: a 5'-end adenosine-5'-diphospho-5'-2'-deoxyribonucleoside-DNA + H2O = a 5'-end 5'-phospho-2'-deoxyribonucleoside-DNA + AMP + 2 H+; and: a 5'-end adenosine-5'-diphospho-5'-ribonucleoside-2'-deoxyribonucleotide-DNA + H2O = a 5'-end 5'-phospho-ribonucleoside-2'-deoxyribonucleotide-DNA + AMP + 2 H+. Nucleophilic release of a covalently linked adenylate residue from a DNA strand, leaving a 5' phosphate terminus.
