identifier: GO:0097627
label: "high-affinity L-ornithine transmembrane transporter activity"
definition: >-
  Enables the transfer of L-ornithine from one side of a membrane to the other. In high-affinity transport the transporter is able to bind the solute even if it is only present at very low concentrations.
