identifier: GO:0015124
label: "allantoate transmembrane transporter activity"
definition: >-
  Enables the transfer of allantoate from one side of a membrane to the other. Allantoate is the end product of purine metabolism in mammals and some fish, formed form allantoin. It is widely distributed in plants as an important source of stored nitrogen.
