identifier: GO:0097625
label: "low-affinity basic amino acid transmembrane transporter activity"
definition: >-
  Enables the transfer of basic amino acids from one side of a membrane to the other. Basic amino acids have a pH above 7. In low-affinity transport the transporter is able to bind the solute only if it is present at very high concentrations.
