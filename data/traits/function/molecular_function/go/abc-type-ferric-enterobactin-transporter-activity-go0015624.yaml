label: "ABC-type ferric-enterobactin transporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: ATP + H2O + ferric-enterobactin(out) = ADP + phosphate + ferric-enterobactin(in).
