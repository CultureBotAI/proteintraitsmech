identifier: GO:0015374
label: "neutral, basic amino acid:sodium:chloride symporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: neutral/basic amino acid(out) + Na+(out) + Cl-(out) = neutral/basic amino acid(in) + Na+(in) + Cl-(in).
