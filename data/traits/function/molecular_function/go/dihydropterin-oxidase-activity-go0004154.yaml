identifier: GO:0004154
label: "dihydropterin oxidase activity"
definition: >-
  Catalysis of the reaction: a 7,8-dihydropteridine compound + O2 = an oxidized 7,8-dihydropteridine compound + H2O2. Specific substrates and their fully oxidized products include: 7,8-dihydropteridin/pterin, 7,8-dihydrobiopterin/biopterin, 7,8-dihydroxanthopterin/xanthopterin and sepiapterin/oxidized sepiapterin.
