identifier: GO:0008970
label: "glycerophospholipid phospholipase A1 activity"
definition: >-
  Catalysis of the reaction: a 1,2-diacyl-sn-glycero-3-phospholipid + H2O = a 2-acyl-sn-glycero-3-phospholipid + a fatty acid + H+. Note that the substrate has a diacyl group attached to the glycerol group.
