identifier: GO:0102033
label: "long-chain fatty acid omega-hydroxylase activity"
definition: >-
  Catalysis of the reaction: an omega-methyl-long-chain fatty acid + O2 + reduced [NADPH--hemoprotein reductase] = an omega-hydroxy-long-chain fatty acid + H+ + H2O + oxidized [NADPH--hemoprotein reductase]. A long-chain fatty acid has an aliphatic tail containing 13 to 22 carbons.
