identifier: GO:1903231
label: "mRNA base-pairing post-transcriptional repressor activity"
definition: >-
  A post-transcriptional repressor activity that acts by base-pairing with an mRNA to prevent gene expression. The binding can result in targeting the mRNA for degradation or interfering with mRNA translation resulting in post-transcriptional gene silencing.
