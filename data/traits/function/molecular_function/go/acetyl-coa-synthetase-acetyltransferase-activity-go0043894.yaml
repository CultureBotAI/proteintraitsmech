identifier: GO:0043894
label: "acetyl-CoA synthetase acetyltransferase activity"
definition: >-
  Catalysis of the acetylation of a lysine of the enzyme acetyl-CoA ligase, using acetyl-CoA as substrate. In Bacillus subtilis, this is Lys609, but it may correspond to another position in orthologs. This acetylation results in inhibition of acetyl-CoA synthetase.
