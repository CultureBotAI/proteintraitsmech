identifier: GO:0031432
label: "titin binding"
definition: >-
  Binding to titin, any of a family of giant proteins found in striated and smooth muscle. In striated muscle, single titin molecules span half the sarcomere, with their N- and C-termini in the Z-disc and M-line, respectively.
