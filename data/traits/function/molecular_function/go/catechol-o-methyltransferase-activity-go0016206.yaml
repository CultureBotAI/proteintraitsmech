identifier: GO:0016206
label: "catechol O-methyltransferase activity"
definition: >-
  Catalysis of the reaction: a catechol + S-adenosyl-L-methionine = a guaiacol + H+ + S-adenosyl-L-homocysteine. Acts on catechols and on catecholamines such as adrenaline or noradrenaline.
