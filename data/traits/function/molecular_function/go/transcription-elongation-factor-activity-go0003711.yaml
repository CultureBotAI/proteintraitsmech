identifier: GO:0003711
label: "transcription elongation factor activity"
definition: >-
  A molecular function that stimulates the elongation properties of the RNA polymerase during the elongation phase of transcription. A subclass of transcription elongation factors enable the transition from transcription initiation to elongation, while another class rescue stalled RNA polymerases.
