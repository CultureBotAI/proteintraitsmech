identifier: GO:0102531
label: "ecdysteroid-phosphate phosphatase activity"
definition: >-
  Catalysis of the reaction: H2O + an ecdysteroid 22-phosphate = phosphate + an ecdysteroid. Also has activity towards other ecdysteriod phosphates including 20-hydroxyecdysone 22-phosphate (20E22P) and 2-deoxyecdysone 22-phosphate (2dE22P).
