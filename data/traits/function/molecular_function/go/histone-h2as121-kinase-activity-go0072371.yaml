identifier: GO:0072371
label: "histone H2AS121 kinase activity"
definition: >-
  Catalysis of the reaction: histone H2A-serine (position 121) + ATP = histone H2A-phosphoserine (position 121) + ADP. This reaction is the addition of a phosphate group to the serine residue at position 121 of histone H2A. This serine residue is present inthe histone H2A of fungi and Tetrahymena. This position corresponds to T120 in metazoa.
