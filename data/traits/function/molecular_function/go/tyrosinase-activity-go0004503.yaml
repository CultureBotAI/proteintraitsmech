identifier: GO:0004503
label: "tyrosinase activity"
definition: >-
  Catalysis of the reaction: L-tyrosine + O2 = L-DOPAquinone + H2O. This reaction can use both monophenols (such as tyrosine) and catechols (o-diphenols) as substrates.
