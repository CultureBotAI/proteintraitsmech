identifier: GO:0140443
label: "mitochondrion-plasma membrane adaptor activity"
definition: >-
  The binding activity of a molecule that brings together a mitochondrial outer membrane and a plasma membrane either via membrane lipid binding or by interacting with a mitochondrial outer membrane protein, to establish or maintain the localization of the mitochondrion.
