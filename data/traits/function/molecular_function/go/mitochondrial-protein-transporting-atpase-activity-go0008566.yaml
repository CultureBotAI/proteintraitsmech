identifier: GO:0008566
label: "mitochondrial protein-transporting ATPase activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: ATP + H2O = ADP + phosphate; drives the transport of proteins into the mitochondrion via the mitochondrial inner membrane translocase complex.
