identifier: GO:0033997
label: "inulin fructotransferase (DFA-I-forming) activity"
definition: >-
  Catalysis of the reaction: [(2->1)-beta-D-fructosyl](n) = [(2->1)-beta-D-fructosyl](n-1) + alpha-D-fructofuranose-beta-D-fructofuranose 1,2':1,2'-dianhydride. This reaction is the production of alpha-D-fructofuranose beta-D-fructofuranose 1,2':2,1'-dianhydride (DFA I) by successively eliminating the diminishing (2->1)-beta-D-fructan (inulin) chain from the terminal D-fructosyl-D-fructosyl disaccharide.
definition_source: "GO (2026-06-15)"
trait_axis: FUNCTION
trait_category: FUNC_MOLECULAR_FUNCTION
term_kind: CLASS
mapping_status: SEEDED
