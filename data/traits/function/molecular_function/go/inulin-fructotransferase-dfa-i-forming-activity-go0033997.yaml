    synonym_type: RELATED_SYNONYM
  - synonym_text: "inulin D-fructosyl-D-fructosyltransferase (1,2':1',2-dianhydride-forming) activity"
    synonym_type: RELATED_SYNONYM
  - synonym_text: "inulin D-fructosyl-D-fructosyltransferase (forming alpha-D-fructofuranose beta-D-fructofuranose 1,2':1',2-dianhydride) activity"
    synonym_type: RELATED_SYNONYM
  - synonym_text: "inulin fructotransferase (depolymerizing, difructofuranose-1,2':2',1-dianhydride-forming) activity"
    synonym_type: RELATED_SYNONYM
  - synonym_text: "inulin fructotransferase (DFA-I-producing) activity"
    synonym_type: RELATED_SYNONYM
