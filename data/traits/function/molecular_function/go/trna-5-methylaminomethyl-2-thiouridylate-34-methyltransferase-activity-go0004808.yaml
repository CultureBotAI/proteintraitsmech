identifier: GO:0004808
label: "tRNA (5-methylaminomethyl-2-thiouridylate)(34)-methyltransferase activity"
definition: >-
  Catalysis of the reaction: 5-aminomethyl-2-thiouridine34 in tRNA + S-adenosyl-L-methionine = 5-methylaminomethyl-2-thiouridine34 in tRNA + H+ + S-adenosyl-L-homocysteine. This enzyme specifically adds the terminal methyl group of 5-[(methylamino)methyl]-2-thiouridylate.
