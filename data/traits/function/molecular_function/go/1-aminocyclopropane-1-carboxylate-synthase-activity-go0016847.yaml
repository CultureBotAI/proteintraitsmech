identifier: GO:0016847
label: "1-aminocyclopropane-1-carboxylate synthase activity"
definition: >-
  Catalysis of the reaction: S-adenosyl-L-methionine = 1-aminocyclopropane-1-carboxylate + S-methyl-5'-thioadenosine + H+. 1-aminocyclopropane-1-carboxylate (ACC) is a direct precursor of ethylene biosynthesis.
