identifier: GO:0102993
label: "sn-2 acyl-lipid omega-3 desaturase (ferredoxin) activity"
definition: >-
  Catalysis of the reaction: a (9Z,12Z)-octadecadienoyl-containing glycerolipid + 2 H+ + O2 + 2 reduced [2Fe-2S]-[ferredoxin] = (9Z,12Z,15Z)-octadecatrienoyl-containing glycerolipid + 2 H2O + 2 oxidized [2Fe-2S]-[ferredoxin]. Also converts a (7Z,10Z)-hexadecadienoyl-containing glycerolipid into a (7Z,10Z,13Z)-hexadecatrienoyl-containing glycerolipid.
