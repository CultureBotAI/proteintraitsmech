identifier: GO:0008121
label: "quinol-cytochrome-c reductase activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: a quinol + 2 Fe(III)-cytochrome c = a quinone + 2 Fe(II)-cytochrome c + 2 H+(out).
