identifier: GO:0015361
label: "low-affinity sodium:dicarboxylate symporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: dicarboxylate(out) + Na+(out) = dicarboxylate(in) + Na+(in). In low-affinity transport the transporter is able to bind the solute only if it is present at very high concentrations.
