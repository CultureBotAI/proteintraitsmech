identifier: GO:0046962
label: "sodium-transporting ATPase activity, rotational mechanism"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other by a rotational mechanism according to the reaction: 4 Na+(in) + ATP + H2O => 4 Na+(out) + ADP + phosphate + H+.
