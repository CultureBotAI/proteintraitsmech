identifier: GO:0004828
label: "serine-tRNA ligase activity"
definition: >-
  Catalysis of the reaction: ATP + L-serine + tRNA(Ser) = AMP + diphosphate + L-seryl-tRNA(Ser). Also catalyzes the formation of L-seryl-tRNA(Sec) from tRNA(Sec), the special tRNA for selenocysteine.
