identifier: GO:0061658
label: "URM1 conjugating enzyme activity"
definition: >-
  Isoenergetic transfer of URM1 from one protein to another via the reaction X-URM1 + Y = Y-URM1 + X, where both the X-URM1 and Y-URM1 linkages are thioester bonds between the C-terminal amino acid of URM1 and a sulfhydryl side group of a cysteine residue.
