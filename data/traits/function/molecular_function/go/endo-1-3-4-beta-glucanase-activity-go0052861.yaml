identifier: GO:0052861
label: "endo-1,3(4)-beta-glucanase activity"
definition: >-
  Catalysis of the endohydrolysis of (1->3)- or (1->4)-linkages in beta-D-glucans when the glucose residue whose reducing group is involved in the linkage to be hydrolyzed is itself substituted at C-3. Substrates include laminarin, lichenin and cereal D-glucans.
