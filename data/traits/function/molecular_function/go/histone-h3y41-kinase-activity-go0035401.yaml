identifier: GO:0035401
label: "histone H3Y41 kinase activity"
definition: >-
  Catalysis of the reaction: histone H3-tyrosine (position 41) + ATP = histone H3-phosphotyrosine (position 41) + ADP. This reaction is the addition of a phosphate group to the tyrosine residue at position 41 of histone H3.
