identifier: GO:0062037
label: "D-loop DNA binding"
definition: >-
  Binding to a DNA D-loop. A D-loop is a three-stranded DNA structure formed by the invasion of a single DNA strand that base pairs with one strand of duplex DNA, while the rest of the double-stranded DNA does not unwind.
