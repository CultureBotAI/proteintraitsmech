identifier: GO:0070016
label: "armadillo repeat domain binding"
definition: >-
  Binding to an armadillo repeat domain, an approximately 40 amino acid long tandemly repeated sequence motif first identified in the Drosophila segment polarity protein armadillo. Arm-repeat proteins are involved in various processes, including intracellular signaling and cytoskeletal regulation.
