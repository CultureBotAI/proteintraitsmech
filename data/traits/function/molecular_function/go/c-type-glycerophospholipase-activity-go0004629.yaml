identifier: GO:0004629
label: "C-type glycerophospholipase activity"
definition: >-
  A glycerophospholipase activity that cleaves the first phosphodiester bond between the phosphate and glycerol, producing a mono- or a diacylglycerol, depending on whether the substrate is a lysoglycerophospholipid or a glycerophospholipid.
