identifier: GO:0033094
label: "putrescine:2-oxoglutarate transaminase activity"
definition: >-
  Catalysis of the reaction: putrescine + 2-oxoglutarate = L-glutamate + 1-pyrroline + H2O. The enzymatic part of the reaction produces 4-aminobutanal that spontaneously cyclizes to form 1-pyrroline.
