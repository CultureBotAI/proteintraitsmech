label: "sesquiterpene synthase activity"
definition: >-
  Catalysis of the reaction: trans,trans-farnesyl diphosphate = a sesquiterpene + diphosphate. Sesquiterpenes are terpenes containing three isoprene units, i.e. 15 carbons.
