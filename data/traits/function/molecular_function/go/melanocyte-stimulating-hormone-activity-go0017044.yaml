identifier: GO:0017044
label: "melanocyte-stimulating hormone activity"
definition: >-
  The action characteristic of melanocyte-stimulating hormone, any of three peptide hormones that are produced by the intermediate lobe of the pituitary gland and, upon receptor binding, cause dispersal of melanosomes in melanophores of poikilothermic vertebrates.
