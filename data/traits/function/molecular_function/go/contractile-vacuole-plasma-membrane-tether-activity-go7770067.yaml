identifier: GO:7770067
label: "contractile vacuole-plasma membrane tether activity"
definition: >-
  The binding activity of a molecule that brings together the contractile vacuolar membrane and the plasma membrane, either via membrane lipid binding or by interacting with a membrane protein, to establish or maintain the localization of the contractile vacuole at a specific plasma membrane discharge site.
