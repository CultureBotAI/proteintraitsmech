identifier: GO:0102866
label: "acyl-lipid (8-3)-desaturase activity"
definition: >-
  Catalysis of the reaction: an (8Z,11Z,14Z)-icosatrienoyl-containing glycerolipid + 2 Fe(II)-[cytochrome b5] + 2 H+ + O2 = (5Z,8Z,11Z,14Z)-eicosatetraenoyl-containing glycerolipid + 2 Fe(III)-[cytochrome b5] + 2 H2O. Also converts an (8Z,11Z,14Z,17Z)-eicosatetraenoyl-containing glycerolipid into a (5Z,8Z,11Z,14Z,17Z)-eicosapentaenoyl-containing glycerolipid.
