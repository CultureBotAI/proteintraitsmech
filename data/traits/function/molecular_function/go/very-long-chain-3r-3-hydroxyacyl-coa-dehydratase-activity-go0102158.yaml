identifier: GO:0102158
label: "very-long-chain (3R)-3-hydroxyacyl-CoA dehydratase activity"
definition: >-
  Catalysis of the reaction: a very-long-chain (3R)-3-hydroxyacyl-CoA = H2O + a very-long-chain (2E)-enoyl-CoA. This reaction is the third (dehydration) step of the four-step fatty acid elongation cycle in the endoplasmic reticulum that extends fatty acids of C-16 or longer with an additional 2-C unit.
