identifier: GO:0015092
label: "high-affinity ferric iron transmembrane transporter activity"
definition: >-
  Enables the transfer of ferric iron (Fe(III) or Fe3+) ions from one side of a membrane to the other. In high-affinity transport the transporter is able to bind the solute even if it is only present at very low concentrations.
