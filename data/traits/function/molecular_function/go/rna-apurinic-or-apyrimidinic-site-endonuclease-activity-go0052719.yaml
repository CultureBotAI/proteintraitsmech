identifier: GO:0052719
label: "RNA-(apurinic or apyrimidinic site) endonuclease activity"
definition: >-
  Catalysis of the hydrolysis of ester linkages immediately 5' to an apurinic/apyrimidinic (AP; also called abasic) site within a ribonucleic acid molecule by creating internal breaks, generating a single-strand break with 5'-ribose phosphate and 3'-hydroxyl ends.
