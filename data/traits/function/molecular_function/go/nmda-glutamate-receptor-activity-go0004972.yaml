identifier: GO:0004972
label: "NMDA glutamate receptor activity"
definition: >-
  A cation channel that opens in response to binding by extracellular glutmate, but only if glycine or D-serine is also bound and the membrane is depolarized. Voltage gating is indirect, due to ejection of bound magnesium from the pore at permissive voltages.
