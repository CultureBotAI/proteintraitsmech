identifier: GO:0140849
label: "ATP-dependent H2AZ histone chaperone activity"
definition: >-
  A histone chaperone that mediates the exchange of histone H2A-H2B dimer and histone H2AZ-H2B dimers in a nucleosome, driven by ATP hydrolysis. Some chaperones insert H2AZ-H2B dimers and remove H2A-H2B, while others do the opposite.
