identifier: GO:0047364
label: "aromatic desulfoglucosinolate sulfotransferase activity"
definition: >-
  Catalysis of the reaction: (Z)-desulfoglucotropeolin + 3'-phosphoadenylyl sulfate = (Z)-glucotropeolin + adenosine 3',5'-bisphosphate + H+. Also converts (Z)-indolylmethyl desulfoglucosinolate to (Z)-glucobrassicin. This is the final step in the biosynthesis of the glucosinolate core structure.
