identifier: GO:0097626
label: "low-affinity L-arginine transmembrane transporter activity"
definition: >-
  Enables the transfer of L-arginine from one side of a membrane to the other. In low-affinity transport the transporter is able to bind the solute only if it is present at very high concentrations.
