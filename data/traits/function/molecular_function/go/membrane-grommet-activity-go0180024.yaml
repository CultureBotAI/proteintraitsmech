identifier: GO:0180024
label: "membrane grommet activity"
definition: >-
  An activity in which a protein, or group of proteins, acts to restrict the size of a fenestration in a membrane or membrane system (i.e. restrict the diameter of a hole in a membrane). An example of this is the molecular function is performed by ESCRT-III proteins at the nuclear envelope of fission yeast during anaphase B.
