identifier: GO:0097016
label: "L27 domain binding"
definition: >-
  Binding to a L27 domain of a protein. L27 is composed of conserved negatively charged amino acids and a conserved aromatic amino acid. L27 domains can assemble proteins involved in signaling and establishment and maintenance of cell polarity into complexes by interacting in a heterodimeric manner.
