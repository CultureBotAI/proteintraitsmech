identifier: GO:0061652
label: "FAT10 conjugating enzyme activity"
definition: >-
  Isoenergetic transfer of FAT10 from one protein to another via the reaction X-FAT10 + Y = Y-FAT10 + X, where both the X-FAT10 and Y-FAT10 linkages are thioester bonds between the C-terminal amino acid of FAT10 and a sulfhydryl side group of a cysteine residue.
