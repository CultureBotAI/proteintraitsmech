identifier: GO:0016172
label: "antifreeze activity"
definition: >-
  Inhibits the growth and recrystallization of ice crystals, thereby lowering the freezing point of water and preventing cellular damage at subzero temperatures. This activity is observed in various cold-adapted organisms, including certain fish, insects, and plants, and contributes to survival in extreme cold environments by stabilizing supercooled liquid states.
