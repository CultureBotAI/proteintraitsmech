identifier: GO:0015341
label: "zinc efflux antiporter activity"
definition: >-
  Enables the transfer of a zinc ion or zinc ions from the inside of the cell to the outside of the cell across a membrane according to the reaction H+(out) + Zn2+(in) = H+(in) + Zn2+(out). The activity is driven by proton motive force.
