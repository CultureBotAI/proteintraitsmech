identifier: GO:0180033
label: "histone H4K8 deacetylase activity, hydrolytic mechanism"
definition: >-
  Catalysis of the reaction: histone H4 N6-acetyl-L-lysine (position 8) + H2O = histone H4 L-lysine (position 8) + acetate. This reaction represents the removal of an acetyl group from lysine at position 8 of the histone H4 protein.
