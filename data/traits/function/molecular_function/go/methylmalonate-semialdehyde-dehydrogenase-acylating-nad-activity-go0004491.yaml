identifier: GO:0004491
label: "methylmalonate-semialdehyde dehydrogenase (acylating, NAD) activity"
definition: >-
  Catalysis of the reaction: 2-methyl-3-oxopropanoate + CoA + NAD+ = propanoyl-CoA + hydrogencarbonate + NADH + H+. Can also use malonate (3-oxopropanoate) as a substrate. The reaction occurs in two steps with the decarboxylation process preceding CoA-binding. Bicarbonate rather than CO2 is released as a final product.
