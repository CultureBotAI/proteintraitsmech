identifier: GO:0035014
label: "phosphatidylinositol 3-kinase regulator activity"
definition: >-
  Modulates the activity of a phosphatidylinositol 3-kinase (PI3K). Regulatory subunits can link a PI3K catalytic subunit to upstream signaling events and help position the catalytic subunits close to their lipid substrates.
