identifier: GO:0001165
label: "RNA polymerase I cis-regulatory region sequence-specific DNA binding"
definition: >-
  Binding to a specific upstream regulatory DNA sequence (transcription factor recognition sequence or binding site) located in cis relative to the transcription start site (i.e., on the same strand of DNA) of a gene transcribed by RNA polymerase I. RNA polymerase I elements are referred to either enhancers or upstream control element (UCE, or alternately referred to as the upstream element).
