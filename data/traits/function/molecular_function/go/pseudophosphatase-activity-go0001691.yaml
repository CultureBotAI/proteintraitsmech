identifier: GO:0001691
label: "pseudophosphatase activity"
definition: >-
  Maintains the phosphorylation state of certain molecules by associating with them and preventing them from associating with active phosphatases, and thus inhibiting the enzyme activity without interacting with the enzyme. Often pertains to proteins belonging to dual-specificity phosphatase family but lacking critical active site residues.
