identifier: GO:0051433
label: "BH2 domain binding"
definition: >-
  Binding to a BH2 protein domain, present in Bcl-2 family members. Proteins that act as inhibitors of apoptosis harbour at least three BH domains: BH1, BH2 and BH3; the BH1 and BH2 domains are found in all death antagonists of the Bcl-2 family but only in one class of death agonists.
