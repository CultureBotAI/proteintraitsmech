identifier: GO:0003961
label: "O-acetylhomoserine aminocarboxypropyltransferase activity"
definition: >-
  Catalysis of the reaction: O-acetyl-L-homoserine + methanethiol = L-methionine + acetate. Also reacts with other thiols and H2S, producing homocysteine or thioethers.
