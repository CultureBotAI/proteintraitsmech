identifier: GO:0062072
label: "histone H3K9me2/3 reader activity"
definition: >-
  A histone reader that recognizes a histone H3 trimethylated at lysine 9. In some organisms, there is only H3K9me2, not H3K9me3, but this modification is recognized by homologous readers.
