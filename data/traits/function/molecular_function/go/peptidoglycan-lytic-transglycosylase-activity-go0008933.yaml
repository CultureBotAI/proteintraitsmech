identifier: GO:0008933
label: "peptidoglycan lytic transglycosylase activity"
definition: >-
  Catalysis of the cleavage of a peptidoglycan chain into a peptidoglycan chain with N-acetyl-1,6-anhydromuramyl-[peptide] at the reducing end + a peptidoglycan chain with N-acetylglucosamine at the non-reducing end. Includes endolytic transglycosylase activity that fragments the glycan chain internally and exolytic transgylcosylase activity that cleaves a terminal disaccharide from the end of the glycan strand.
