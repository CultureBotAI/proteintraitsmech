identifier: GO:0140474
label: "mitochondrion-endoplasmic reticulum membrane tether activity"
definition: >-
  The binding activity of a molecule that brings together a mitochondrial outer membrane and an ER membrane either via membrane lipid binding or by interacting with a mitochondrial outer membrane protein, to establish or maintain the localization of the mitochondrion.
