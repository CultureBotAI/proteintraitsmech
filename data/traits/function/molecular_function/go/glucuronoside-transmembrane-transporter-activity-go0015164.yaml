identifier: GO:0015164
label: "glucuronoside transmembrane transporter activity"
definition: >-
  Enables the transfer of a glucuronosides from one side of a membrane to the other. Glucuronosides are any compound formed by combination of glycosidic linkage of a hydroxy compound (e.g. an alcohol or a saccharide) with the anomeric carbon atom of glucuronate.
