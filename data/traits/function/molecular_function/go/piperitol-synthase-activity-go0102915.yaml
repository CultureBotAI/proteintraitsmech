identifier: GO:0102915
label: "piperitol synthase activity"
definition: >-
  Catalysis of the reaction: (+)-pinoresinol + reduced [NADPH--hemoprotein reductase] + O2 = (+)-piperitol + oxidized [NADPH--hemoprotein reductase] + 2 H2O + H+. Also catalyzes the synthesis of (+)-sesamin from (+)-piperitol.
