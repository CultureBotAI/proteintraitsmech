identifier: GO:0002162
label: "dystroglycan binding"
definition: >-
  Binding to dystroglycan, a glycoprotein found in non-muscle tissues as well as in muscle tissues, often in association with dystrophin. The native dystroglycan cleaved into two non-covalently associated subunits, alpha (N-terminal) and beta (C-terminal).
