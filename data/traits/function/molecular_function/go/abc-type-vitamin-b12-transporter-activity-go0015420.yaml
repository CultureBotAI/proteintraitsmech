identifier: GO:0015420
label: "ABC-type vitamin B12 transporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: vitamin B12(out) + ATP + H2O = ADP + an vitamin B12(in) + H+ + phosphate. Vitamin B12 is alkylcob(III)alamin.
