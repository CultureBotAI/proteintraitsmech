identifier: GO:0022870
label: "protein-N(PI)-phosphohistidine-mannose phosphotransferase system transporter activity"
definition: >-
  Catalysis of the PEP-dependent, phosphoryl transfer-driven transport of substances across a membrane according to the reaction: D-mannose(out) + N(pros)-phospho-L-histidyl-[protein] = D-mannose 6-phosphate(in) + L-histidyl-[protein]. This differs from primary and secondary active transport in that the solute is modified during transport.
