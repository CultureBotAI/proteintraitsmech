identifier: GO:0050303
label: "L-lysine 6-dehydrogenase activity"
definition: >-
  Catalysis of the reaction: L-lysine + NAD+ = L-1-piperideine-6-carboxylate + NH4+ + NADH + 2 H+. (S)-(2-aminoethyl)-L-cysteine can act as a substrate, and NADP+ can act as the acceptor.
