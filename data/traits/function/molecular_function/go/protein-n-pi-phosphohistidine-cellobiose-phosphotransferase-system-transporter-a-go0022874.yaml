identifier: GO:0022874
label: "protein-N(PI)-phosphohistidine-cellobiose phosphotransferase system transporter activity"
definition: >-
  Catalysis of the PEP-dependent, phosphoryl transfer-driven transport of substances across a membrane according to the reaction: D-cellobiose(out) + N(pros)-phospho-L-histidyl-[protein] = 6-phospho-beta-D-glucosyl-(1->4)-D-glucose(in) + L-histidyl-[protein]. This differs from primary and secondary active transport in that the solute is modified during transport.
