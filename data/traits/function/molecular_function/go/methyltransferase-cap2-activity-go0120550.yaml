identifier: GO:0120550
label: "methyltransferase cap2 activity"
definition: >-
  Catalysis of the reaction: a 5'-end (N(7)-methyl 5'-triphosphoguanosine)-(2'-O-methyl-ribonucleoside)-(ribonucleotide) in mRNA or snRNA + S-adenosyl-L-methionine = a 5'-end (N(7)-methyl 5'-triphosphoguanosine)-(2'-O-methyl-ribonucleoside)-(2'-O-methyl-ribonucleotide) in mRNA or snRNA + S-adenosyl-L-homocysteine + H+. This activity catalyzes the methylation of the ribose on the second transcribed nucleotide of mRNAs and snRNAs.
