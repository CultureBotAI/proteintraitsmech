identifier: GO:0050152
label: "omega-amidase activity"
definition: >-
  Catalysis of the reaction: a monoamide of a dicarboxylic acid + H2O = a dicarboxylate + NH4+. Substrates include 2-oxosuccinamate and 2-oxoglutaramate, which get converted to oxaloacetate and 2-oxoglutarate, respectively.
