identifier: GO:0031530
label: "gonadotropin-releasing hormone receptor binding"
definition: >-
  Binding to a receptor for gonadotropin-releasing hormone (GnRH), a peptide hormone that is synthesized and released by the hypothalamus and is responsible for the release of follicle-stimulating hormone (FSH) and luteinizing hormone (LH) from the anterior pituitary.
