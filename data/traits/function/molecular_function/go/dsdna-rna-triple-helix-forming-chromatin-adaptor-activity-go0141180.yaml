identifier: GO:0141180
label: "dsDNA-RNA triple helix-forming chromatin adaptor activity"
definition: >-
  A chromatin-protein adaptor activity that bridges dsDNA and chromatin proteins to bring regions of a chromosome in proximity. The DNA:DNA:RNA triple-helical structure is formed non-Watson-Crick base-pairing.
