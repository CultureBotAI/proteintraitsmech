label: "thyrotropin-releasing hormone binding"
definition: >-
  Binding to thyrotropin-releasing hormone, a tripeptide hormone that stimulates the release of thyroid-stimulating hormone (TSH) and prolactin by the anterior pituitary and it is produced by the hypothalamus and travels across the median eminence to the pituitary via the pituitary portal system.
