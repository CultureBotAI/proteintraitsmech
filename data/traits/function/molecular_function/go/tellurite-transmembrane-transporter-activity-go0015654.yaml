identifier: GO:0015654
label: "tellurite transmembrane transporter activity"
definition: >-
  Enables the transfer of tellurite from one side of a membrane to the other. Tellurite is a salt of tellurous acid or an oxide of tellurium which occurs sparingly in tufts of white or yellowish crystals.
