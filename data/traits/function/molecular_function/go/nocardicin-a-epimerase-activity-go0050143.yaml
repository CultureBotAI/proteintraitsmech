identifier: GO:0050143
label: "nocardicin-A epimerase activity"
definition: >-
  Catalysis of the reaction: isonocardicin A = nocardicin A. May also catalyse the epimerisation of isonocardicin C, but the in vivo substrate appears to be isonocardicin A.
