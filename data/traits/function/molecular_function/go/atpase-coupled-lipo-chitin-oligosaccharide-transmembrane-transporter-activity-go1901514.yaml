label: "ATPase-coupled lipo-chitin oligosaccharide transmembrane transporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: ATP + H2O + lipo-chitin oligosaccharide(in) = ADP + phosphate + lipo-chitin oligosaccharide(out).
