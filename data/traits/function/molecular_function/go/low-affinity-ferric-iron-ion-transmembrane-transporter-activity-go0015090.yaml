identifier: GO:0015090
label: "low-affinity ferric iron ion transmembrane transporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: Fe2+(out) = Fe2+(in). In low-affinity transport the transporter is able to bind the solute only if it is present at very high concentrations.
