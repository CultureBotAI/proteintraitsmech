identifier: GO:0052815
label: "medium-chain fatty acyl-CoA hydrolase activity"
definition: >-
  Catalysis of the reaction: a medium-chain fatty acyl-CoA + H2O = a medium-chain fatty acid + CoA + H+. A medium-chain fatty acid has an aliphatic tail containing 6 to 12 carbons.
