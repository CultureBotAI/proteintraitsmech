identifier: GO:0033164
label: "initiation-specific glycolipid 1,6-alpha-mannosyltransferase activity"
definition: >-
  Catalysis of the transfer of an alpha-D-mannosyl residue from GDP-mannose to Man(8)GlcNAc or Man(9)GlcNAc via an alpha-(1->6)-D-mannosyl-D-mannose linkage to form Man(9)GlcNAc or Man(10)GlcNAc, respectively. This is the first step specific to the biosynthesis of the outer chain of yeast mannoproteins.
