identifier: GO:0015161
label: "lipid III floppase activity"
definition: >-
  Enables the transbilayer of capsular-polysaccharides (Und-PP-GlcNAc-ManNAcA-Fuc4NAc (lipid III)) from the inner to the outer leaflet of the cytoplasmic membrane during the assembly of ECA. Capsular polysaccharides make up the capsule, a protective structure surrounding some species of bacteria and fungi.
