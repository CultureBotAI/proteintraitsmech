identifier: GO:0022880
label: "protein-N(PI)-phosphohistidine-N-acetylglucosamine phosphotransferase system transporter activity"
definition: >-
  Catalysis of the PEP-dependent, phosphoryl transfer-driven transport of substances across a membrane by the reaction: N(pros)-phospho-L-histidyl-[protein] + N-acetyl-D-glucosamine(out) = L-histidyl-[protein] + N-acetyl-D-glucosamine 6-phosphate(in). This differs from primary and secondary active transport in that the solute is modified during transport.
