identifier: GO:0008649
label: "rRNA methyltransferase activity"
definition: >-
  Catalysis of the transfer of a methyl group from S-adenosyl-L-methionine to a nucleoside residue in an rRNA molecule. The methyl group can be transfered to the nucleobase or to the ribose group of the nucleoside.
