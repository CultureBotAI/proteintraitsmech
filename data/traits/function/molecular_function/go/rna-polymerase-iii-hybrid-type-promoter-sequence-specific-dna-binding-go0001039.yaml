identifier: GO:0001039
label: "RNA polymerase III hybrid type promoter sequence-specific DNA binding"
definition: >-
  Binding to a sequence of DNA that is a part of a hybrid type promoter that controls transcription by RNA polymerase III (Pol III). A hybrid Pol III promoter contains both regulatory elements both upstream and downstream of the transcription initiation site. An example gene with such a promoter is the S. cerevisiae U6 gene.
