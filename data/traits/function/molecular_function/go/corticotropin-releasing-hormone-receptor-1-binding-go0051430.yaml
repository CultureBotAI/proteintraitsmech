identifier: GO:0051430
label: "corticotropin-releasing hormone receptor 1 binding"
definition: >-
  Binding to a corticotropin-releasing hormone receptor 1 (CRHR1). CRHR1 is the major subtype in the pituitary corticotroph, and mediates the stimulatory actions of corticotropin-releasing hormone on corticotropin hormone secretion. CRHR1 are also located in cortical areas of the brain, cerebellum and limbic system.
