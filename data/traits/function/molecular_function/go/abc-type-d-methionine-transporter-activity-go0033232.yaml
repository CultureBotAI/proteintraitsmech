identifier: GO:0033232
label: "ABC-type D-methionine transporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: ATP + H2O + D-methionine(out/in) = ADP + phosphate + D-methionine(in/out).
