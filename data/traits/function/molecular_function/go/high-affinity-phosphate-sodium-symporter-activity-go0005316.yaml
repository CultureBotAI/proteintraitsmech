identifier: GO:0005316
label: "high-affinity phosphate:sodium symporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction:phosphate(out) + Na+(out) = phosphate(in) + Na+(in). In high-affinity transport the transporter is able to bind the solute even if it is only present at very low concentrations.
