label: "type IV site-specific deoxyribonuclease activity"
definition: >-
  Catalysis of the endonucleolytic cleavage of DNA in a site specific manner. Cleavage is dependent on the presence of a specific recognition site in the DNA which must be modified (e.g. methylated, hydroxymethylated, glucosyl-hydroxymethylated).
