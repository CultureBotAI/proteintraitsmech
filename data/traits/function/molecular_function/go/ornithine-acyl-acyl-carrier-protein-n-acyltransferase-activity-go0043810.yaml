identifier: GO:0043810
label: "ornithine-acyl [acyl carrier protein] N-acyltransferase activity"
definition: >-
  Catalysis of the reaction: (3R)-3-hydroxyacyl-[acyl-carrier protein] + L-ornithine = lyso-ornithine lipid + [acyl-carrier protein]. The enzyme, found in bacteria, catalyzes the first step in the biosynthesis of ornithine lipids.
