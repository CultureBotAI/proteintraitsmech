identifier: GO:0008086
label: "light-activated voltage-gated calcium channel activity"
definition: >-
  Enables the transmembrane transfer of a calcium ion by a voltage-gated channel that is activated in response to light. A voltage-gated channel is a channel whose open state is dependent on the voltage across the membrane in which it is embedded.
