identifier: GO:0051435
label: "BH4 domain binding"
definition: >-
  Binding to a BH4 protein domain, present in Bcl-2 family members. All anti-apoptotic proteins contain BH1 and BH2 domains; some also contain an additional N-terminal BH4 domain, which is almost never seen in pro-apoptotic proteins. Loss of the BH4 domain can diminish or abrogate anti-apoptotic function or even impart outright death-promoting properties to the protein.
