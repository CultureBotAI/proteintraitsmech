identifier: GO:0036370
label: "D-alanyl carrier activity"
definition: >-
  Binding a D-alanine and presenting it for processing or offloading to a cognate enzyme. Covalently binds the D-alanine via a phosphopantetheine prosthetic group and mediates protein-protein interactions with the enzyme conferring specificity. The carrier protein provides an essential link between the D-alanine-D-alanyl carrier protein ligase and the incorporation of D-alanine into lipoteichoic acid by transferring activated D-alanine to cell membrane phosphatidylglycerol (PG).
