identifier: GO:0102910
label: "dirigent protein activity"
definition: >-
  Catalysis of the reaction: 2 H+ + 2 coniferol + O2 = (+)-pinoresinol + 2 H2O. The The protein encoding this activity has been termed 'dirigent protein' because it does not express any catalytic activity and serves only to bind and orientate the coniferyl alcohol-derived free radicals.
