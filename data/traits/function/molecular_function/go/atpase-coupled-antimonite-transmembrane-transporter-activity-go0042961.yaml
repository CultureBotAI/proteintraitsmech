label: "ATPase-coupled antimonite transmembrane transporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: ATP + H2O + antimonite(in) = ADP + phosphate + antimonite(out).
