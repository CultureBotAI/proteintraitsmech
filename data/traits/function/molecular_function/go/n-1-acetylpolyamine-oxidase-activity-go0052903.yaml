identifier: GO:0052903
label: "N(1)-acetylpolyamine oxidase activity"
definition: >-
  Catalysis of the reaction: N(1)-acetylspermine + O2 + H2O = 3-acetamidopropanal + spermidine + H2O2. Also converts N(1)-acetylspermidine to putrescine, and N(1),N(12)-diacetylspermine to N(1)-acetylspermidine.
