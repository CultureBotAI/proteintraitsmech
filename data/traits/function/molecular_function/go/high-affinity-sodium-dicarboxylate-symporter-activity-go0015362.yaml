identifier: GO:0015362
label: "high-affinity sodium:dicarboxylate symporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: dicarboxylate(out) + Na+(out) = dicarboxylate(in) + Na+(in). In high-affinity transport the transporter is able to bind the solute even if it is only present at very low concentrations.
