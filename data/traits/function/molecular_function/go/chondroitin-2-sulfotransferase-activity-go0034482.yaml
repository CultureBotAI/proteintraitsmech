identifier: GO:0034482
label: "chondroitin 2-sulfotransferase activity"
definition: >-
  Catalysis of the reaction: 3'-phosphoadenosine 5'-phosphosulfate + chondroitin = adenosine 3',5'-bisphosphate + chondroitin 2'-O-sulfate. Results in sulfation of glucuronic acid and iduronic acid residues.
