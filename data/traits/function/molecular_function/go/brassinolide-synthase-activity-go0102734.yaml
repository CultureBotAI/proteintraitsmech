identifier: GO:0102734
label: "brassinolide synthase activity"
definition: >-
  Catalysis of the reaction: castasterone + O2 + reduced [NADPH--hemoprotein reductase] = brassinolide + H+ + H2O + oxidized [NADPH--hemoprotein reductase]. Broad specificity for several brassinosteroids, including castasterone, teasterone, and typhasterol.
