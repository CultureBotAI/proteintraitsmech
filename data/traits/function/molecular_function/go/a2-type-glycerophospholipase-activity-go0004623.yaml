identifier: GO:0004623
label: "A2-type glycerophospholipase activity"
definition: >-
  A glycerophospholipase activity that cleaves the fatty acid attached to the sn-2 position of the glycerol group of a glycerophospholipid. Substrates include phosphatidylcholine, phosphatidylethanolamine, choline plasmalogen and phosphatides.
