identifier: GO:0051373
label: "FATZ binding"
definition: >-
  Binding to a member of the FATZ family of proteins, filamin-, actinin-, and telethonin-binding proteins of the Z-disc of striated muscle. FATZ proteins are located in the Z-disc of the sarcomere and are involved in a complex network of interactions with other Z-band components.
