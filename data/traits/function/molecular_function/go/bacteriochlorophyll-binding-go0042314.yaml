identifier: GO:0042314
label: "bacteriochlorophyll binding"
definition: >-
  Binding to bacteriochlorophyll, a form of chlorophyll found in photosynthetic bacteria, such as the purple and green bacteria. There are several types, designated a to g. Bacteriochlorophyll a and bacteriochlorophyll b are structurally similar to the chlorophyll a and chlorophyll b found in plants.
