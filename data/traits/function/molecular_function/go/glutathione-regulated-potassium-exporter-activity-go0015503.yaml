identifier: GO:0015503
label: "glutathione-regulated potassium exporter activity"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other according to the reaction: K+(in) + H+(out) = K+(out) + H+(in), where glutathione maintains the closed state.
