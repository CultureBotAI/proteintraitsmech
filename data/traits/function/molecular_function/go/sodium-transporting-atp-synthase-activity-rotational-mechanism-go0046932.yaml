identifier: GO:0046932
label: "sodium-transporting ATP synthase activity, rotational mechanism"
definition: >-
  Enables the transfer of a solute or solutes from one side of a membrane to the other by a rotational mechanism according to the reaction: 4 Na+(out) + ADP + phosphate + H+ => 4 Na+(in) + ATP + H2O.
