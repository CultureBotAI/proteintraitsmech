identifier: GO:0044729
label: "hemi-methylated DNA-binding"
definition: >-
  Binding to double-stranded hemi-methylated DNA at replication foci (one strand methylated, while the other strand is unmethylated). Methylation of cytosine or adenine in DNA is an important mechanism for establishing stable heritable epigenetic marks.
