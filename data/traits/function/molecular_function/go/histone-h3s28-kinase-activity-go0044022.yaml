identifier: GO:0044022
label: "histone H3S28 kinase activity"
definition: >-
  Catalysis of the reaction: histone H3-serine (position 28) + ATP = histone H3-phosphoserine (position 28) + ADP. This reaction is the addition of a phosphate group to the serine residue at position 28 of histone H3.
