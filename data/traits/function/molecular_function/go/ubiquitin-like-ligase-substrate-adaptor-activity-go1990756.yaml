identifier: GO:1990756
label: "ubiquitin-like ligase-substrate adaptor activity"
definition: >-
  The binding activity of a molecule that brings together a ubiquitin-like ligase (including ubiquitin ligase and UFM1 ligase) and its substrate. Usually mediated by F-box BTB/POZ domain proteins.
