identifier: GO:0004668
label: "protein-arginine deiminase activity"
definition: >-
  Catalysis of the reaction: H2O + L-arginyl-[protein] = L-citrullyl-[protein] + NH4+, resulting in citrullination of the target protein. This reaction is calcium-dependent.
