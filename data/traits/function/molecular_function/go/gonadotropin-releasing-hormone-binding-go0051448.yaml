identifier: GO:0051448
label: "gonadotropin-releasing hormone binding"
definition: >-
  Binding to gonadotropin-releasing hormone (GnRH), a peptide hormone responsible for the release of follicle-stimulating hormone (FSH) and luteinizing hormone (LH) from the anterior pituitary. GnRH is synthesized and released by the hypothalamus.
