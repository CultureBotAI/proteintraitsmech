identifier: GO:0015330
label: "high-affinity glutamine transmembrane transporter activity"
definition: >-
  Enables the transfer of glutamine from one side of a membrane to the other. In high-affinity transport the transporter is able to bind the solute even if it is only present at very low concentrations.
