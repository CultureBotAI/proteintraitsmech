identifier: GO:0008490
label: "arsenite secondary active transmembrane transporter activity"
definition: >-
  Enables the transfer of arsenite from one side of a membrane to the other, up its concentration gradient. The transporter binds the solute and undergoes a series of conformational changes. Transport works equally well in either direction and is driven by a chemiosmotic source of energy. Secondary active transporters include symporters and antiporters.
