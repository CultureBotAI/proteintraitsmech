identifier: GO:0140625
label: "opioid growth factor receptor activity"
definition: >-
  Combining with the opioid growth factor (OGF, met-enkephalin) and transmitting the signal across the nuclear membrane. Met-enkephalin is an endogenous opioid peptide that binds to opioid and opioid growth factor receptors, regulating tissue growth in a variety of cellular processes.
