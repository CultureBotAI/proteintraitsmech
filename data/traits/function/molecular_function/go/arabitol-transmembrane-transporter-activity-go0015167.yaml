identifier: GO:0015167
label: "arabitol transmembrane transporter activity"
definition: >-
  Enables the transfer of an arabitol from one side of a membrane to the other. Arabitol is the pentitol derived from arabinose or lyxose by reduction of the aldehyde group. The D enantiomer is present in lichens and mushrooms.
