identifier: GO:0043495
label: "protein-membrane adaptor activity"
definition: >-
  The binding activity of a molecule that brings together a protein or a protein complex with a membrane, either via membrane lipid binding or by interacting with a membrane protein, to establish or maintain the localization of the protein, protein complex or organelle.
