identifier: GO:0033225
label: "ATPase-coupled 2-aminoethylphosphonate transporter activity"
definition: >-
  Enables the directed movement of 2-aminoethylphosphonate from one side of a membrane to the other by catalysis of the reaction: ATP + H2O + 2-aminoethylphosphonate(out) = ADP + phosphate + 2-aminoethylphosphonate(in).
