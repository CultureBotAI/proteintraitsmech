identifier: proteintraitsmech:EVO_CONSERVED
label: "conserved protein"
definition: >-
  A protein that is evolutionarily conserved — orthologues are retained across multiple taxa. When scoped to a clade, the record carries an NCBITaxon xref (conserved at that taxon rank).
definition_source: "ProteinTraitsMech curated evolutionary/pangenome taxonomy"
