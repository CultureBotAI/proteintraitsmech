identifier: InterPro:IPR040520
label: "Importin 13 repeat"
definition: >-
  Importin 13 serves as receptor for nuclear localization signals (NLS) in cargo substrates. It mediates docking of the importin/substrate complex to the nuclear pore complex (NPC). It contains several repeats structurally similar to the HEAT repeat. This entry represents a single repeat unit.
