identifier: InterPro:IPR048829
label: "Pre-mRNA cleavage complex 2 protein Pcf11, RFEGP repeat"
definition: >-
  This entry represents a repeat region found in Pre-mRNA cleavage complex 2 protein Pcf11 from human ( ) and similar proteins from vertebrates. This repeat is about thirteen amino acids with a high content of proline and glycine residues, however, it varies in length among the sequences included in this entry. These repeats contain the highly conserved RFE/DG motif, conserved in PCF11 orthologues in vertebrates but not in Drosophila, C. elegans, or yeast. It has been described that human PCF11 has 30 repeats of the RFE/DG motif (referred as FEGP in) which are necessary for pre-mRNA cleavage complex II (CFII) activity. PCF11 is a subunit and an essential component of CFII (the orthologue of cleavage and polyadenylation factor IA (CFIA) from yeast) which is involved in pre-mRNA 3' end processing and in transcription termination. PCF11 is thought to be one of the scaffold proteins of the processing complex. PCF11-mediated termination is essential for vertebrate development.
