identifier: InterPro:IPR026003
label: "HEAT repeat associated with sister chromatid cohesion protein"
definition: >-
  This HEAT repeat is found most frequently in sister chromatid cohesion proteins such as Nipped-B. HEAT repeats are found tandemly repeated in many proteins, and they appear to serve as flexible scaffolding on which other components can assemble.
