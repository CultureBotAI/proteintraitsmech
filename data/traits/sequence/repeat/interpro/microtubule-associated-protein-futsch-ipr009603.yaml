identifier: InterPro:IPR009603
label: Microtubule associated protein Futsch
definition: >-
  The central domain of Drosophila protein Futsch is highly repetitive and it is represented in this entry. The Drosophila protein Futsch has homology to MAP1B and controls synaptic growth at the Drosophila neuromuscular junction through the regulation of the synaptic microtubule cytoskeleton. Futsch protein colocalises with microtubules and identifies cytoskeletal loops that traverse the lateral margin of select synaptic boutons. Futsch mutations disrupt synaptic microtubule organisation, reduce bouton number, and increase bouton size. These deficits can be partially rescued by neuronal overexpression of a Futsch MAP1B homology domain. The translation of Futsch is repressed by fragile X messenger ribonucleoprotein 1 (FMR1/FMRP), an RNA binding protein that acts as a negative translational regulator.
