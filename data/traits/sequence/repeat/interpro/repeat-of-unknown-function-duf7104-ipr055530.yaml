label: "Repeat of unknown function DUF7104"
definition: >-
  This entry includes uncharacterised fungal sequences which consist of repeats that may adopt an α-solenoid structure related to ankyrin repeats. The overall arrangement of these repeats may have a horseshoe conformation similar to that in leucine-rich repeats.
