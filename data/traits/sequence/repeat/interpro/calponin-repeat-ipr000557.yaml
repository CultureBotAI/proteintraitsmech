identifier: InterPro:IPR000557
label: "Calponin repeat"
definition: >-
  Calponin is a thin filament-associated protein that is implicated in the regulation and modulation of smooth muscle contraction. It is capable of binding to actin, calmodulin, troponin C and tropomyosin. The interaction of calponin with actin inhibits the actomyosin MgATPase activity. Calponin is a basic protein of approximately 34 Kd. Multiple isoforms are found in smooth muscles. Calponin contains three repeats of a well conserved 26 amino acid domain. Such a domain is also found in vertebrate smooth muscle protein (SM22 or transgelin), and a number of other proteins whose physiological role is not yet established, including Drosophila synchronous flight muscle protein SM20, Caenorhabditis elegans unc-87 protein, rat neuronal protein NP25, and an Onchocerca volvulus antigen.
