identifier: InterPro:IPR060905
label: "LOFI repeat"
definition: >-
  This weakly conserved (low-fidelity, or LOFI) repeat appears primarily in Campylobacteria, but not exclusively, in proteins such as Cj0967, Cj0736, and Cj0735. This entry represents a core region about 23 residues in length of repeats whose lengths vary typically between 35 and 50 residues in length.
