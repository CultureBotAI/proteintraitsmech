identifier: InterPro:IPR041257
label: "Adenomatous polyposis coli (APC) repeat"
definition: >-
  Adenomatous polyposis coli contains an armadillo repeat and uses its highly conserved surface groove to recognize the APC-binding region (ABR) of Asef. This entry represents a single repeat unit of the Armadillo region.
