identifier: InterPro:IPR022444
label: "Cofactor-binding repeat, putative"
definition: >-
  This entry describes a small repeat found in a family of proteins that crosses the plasma membrane by twin-arginine translation, which usually signifies the presence of a bound cofactor. This repeat shows similarity to the β-helical repeat, in which three β-strands per repeat wind once per repeat around in a right-handed helical stack of parallel β structure.
