identifier: InterPro:IPR030895
label: "T5SS/PEP-CTERM-associated repeat"
definition: >-
  This entry describes a repeat about 50 amino acids in length. Most proteins with this repeat have a C-terminal autotransporter domain ( ) and/or an N-terminal type V secretion system signal peptide ( ), while others instead have a C-terminal PEP-CTERM domain ( ).
