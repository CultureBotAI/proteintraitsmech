identifier: InterPro:IPR022519
label: "Gloeobacter/Verrucomicrobia repeat"
definition: >-
  This entry describes a repeat originally found in proteins from some species of Verrucomicrobia (such as Chthoniobacter flavus) and in four different proteins of Gloeobacter violaceus PCC7421. In the Verrucomicrobial species, the repeat region is followed by a PEP-CTE protein-sorting signal, suggesting an extracellular location. Members of this group of proteins are found in different bacterial taxa.
