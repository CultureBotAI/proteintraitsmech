identifier: InterPro:IPR057942
label: "Transportin-3/Importin-13, third TPR domain"
definition: >-
  This entry represents the third TPR domain found in Transportin-3 (TNPO3) from animals, as well as orthologues MTR10 and uncharacterised protein YNR7 from yeast and MOS14 from plants. This entry also includes Importin-13 (IPO3) from animals. This domain is part of TPR structure that binds proteins for nuclear transport. These proteins are involved in transport of target proteins into the nucleus. TNPO3 mediates the nuclear import of splicing factor serine/arginine (SR) proteins, such as RBM4, SFRS1 and SFRS2, by recognising phosphorylated SR domains.
