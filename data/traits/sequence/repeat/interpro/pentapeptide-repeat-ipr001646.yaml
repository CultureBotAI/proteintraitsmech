identifier: InterPro:IPR001646
label: "Pentapeptide repeat"
definition: >-
  These repeats were first identified in many cyanobacterial proteins, but they are now found ubiquitously in all kingdoms of life. The repeats were first identified in hglK. Pentapeptide repeat proteins (PRPs) are characterised by the repetition of the pentapeptide repeat motif [S,T,A,V][D,N][L,F][S,T,R][G], which allows it to adopt a right-handed β-helical structure conformation. The functions of these repeats are unknown, but it has been shown that members of this family share the ability to interact with DNA-binding proteins, such as DNA gyrase. For example, McbG (from Escherichia coli) protects the DNA gyrase from microcin B17 toxicity, MfpAMt (from Mycobacterium tuberculosis) and Qnr (from Klebsiella pneumoniae and other enterobacteria) are involved in resistance to fluoroquinolones. The structures of several members of the pentapeptide repeat-containing family were determined. The structure of MfpA represents a form of DNA mimicry as it exhibits size, shape, and electrostatic similarity to B-form DNA and thus acting as a DNA gyrase inhibitor.
