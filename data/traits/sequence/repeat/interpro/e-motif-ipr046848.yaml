identifier: InterPro:IPR046848
label: "E motif"
definition: >-
  This entry represents the E motif (also known as E1) found in plant pentatricopeptide repeat (PPR) proteins. These proteins contain a DYW deaminase domain required for RNA editing, a process that deaminates specific cytidines to uridines. This motif, together with the E motif, precedes the DYW domain and, although their role is not clear, they are essential in the RNA editing reaction. The E/E motifs may contain two degenerate PPR motifs that could be involved protein binding.
