identifier: InterPro:IPR009271
label: Coagulation factor V, LSPD
definition: >-
  The name LSPD derives from the conserved residues in the middle of the repeat. These repeats are found in coagulation factor V and occur in the B domain, which is cleaved prior to activation of the protein. It has been suggested that domain B bring domains A and C together for activation. Coagulation factor V is a central regulator of hemostasis and serves as a critical cofactor for the prothrombinase activity of factor Xa that results in the activation of prothrombin to thrombin.
