identifier: InterPro:IPR049531
label: "Antifreeze protein repeat"
definition: >-
  This entry represents a repeat found in a small family of bacterial proteins involved in stopping the formation of ice crystals at low temperatures (Antifreeze proteins, AFPs), including from Marinomonas primoryensis. The structure folds as a Ca(2+)-bound parallel β-helix with an extensive array of ice-like surface waters that are anchored via hydrogen bonds directly to the polypeptide backbone and adjacent side chains.
