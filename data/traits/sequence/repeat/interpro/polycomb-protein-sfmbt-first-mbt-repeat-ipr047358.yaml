identifier: InterPro:IPR047358
label: "Polycomb protein Sfmbt, first MBT repeat"
definition: >-
  This entry represents the first MBT repeat of Sfmbt from Drosophila melanogaster (dSfmbt) and similar sequences from arthropods. It contains a partially conserved semi-aromatic cage. Polycomb protein Sfmbt from Drosophila melanogaster (dSfmbt) is a Polycomb group repressor involved in epigenetic regulation of gene expression. dSfmbt contains four MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognises methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine.
