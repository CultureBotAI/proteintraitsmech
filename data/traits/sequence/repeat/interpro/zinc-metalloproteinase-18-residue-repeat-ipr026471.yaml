identifier: InterPro:IPR026471
label: "Zinc metalloproteinase 18-residue repeat"
definition: >-
  This entry represents a short (18-amino acid) tandem repeat that occurs variable numbers of times in zinc metalloproteinase C (zmpC) homologues in various species of Streptococcus. This repeat occurs, oddly, as an interruption in a region of tandem repeats of another type.
