identifier: InterPro:IPR049362
label: "TELO2-interacting protein 1, middle region repeats"
definition: >-
  This entry includes TELO2-interacting protein 1 from yeast and its homologues from mammals. Human TTI1 is a regulator of the DNA damage response (DDR). It is part of the TTT complex that is required to stabilize protein levels of the phosphatidylinositol 3-kinase-related protein kinase (PIKK) family proteins. The TTT complex is involved in the cellular resistance to DNA damage stresses. Together with the TTT complex and HSP90, participates in the proper folding of newly synthesized PIKKs. Members of this entry are entirely composed of HEAT repeats.
