identifier: InterPro:IPR000479
label: Cation-independent mannose-6-phosphate receptor repeat
definition: >-
  The cation-independent mannose-6-phosphate receptor is a multi-functional transmembrane glycoprotein whose major function is to bind and transport M6P-bearing glycoproteins from the trans-Golgi network or the cell surface to lysosomes. It appears to mediate the uptake and processing of M6P-containing cytokines and peptide hormones, such as transforming growth factor-beta, leukemia inhibitory factor, and proliferin. It also binds and internalizes the insulin-like growth factor II.
