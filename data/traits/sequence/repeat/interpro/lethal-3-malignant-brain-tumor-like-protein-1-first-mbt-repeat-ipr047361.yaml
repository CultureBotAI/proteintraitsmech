identifier: InterPro:IPR047361
label: "Lethal(3)malignant brain tumor-like protein 1, first MBT repeat"
definition: >-
  This entry represents the first MBT repeat of L3MBTL1, which contains the semi-aromatic cage and may bind methylated lysine residues. Lethal(3)malignant brain tumor-like protein 1 (L3MBTL1), is a Polycomb group (PcG) protein that functions as a 'reader' of a network of post-translational modifications by specifically recognizing and binding mono- and dimethyllysine residues on target proteins. It acts as a chromatin compaction factor by binding mono- and dimethylated histone H1b/HIST1H1E at 'Lys-26' (H1bK26me1 and H1bK26me2) and histone H4 at 'Lys-20' (H4K20me1 and H4K20me2), leading to condensed chromatin and repressed transcription. L3MBTL1 represses the ability of stem cells to drive hematopoietic-specific transcriptional programs by regulating the expression of SMAD5 and impairing its recruitment to target regulatory regions. L3MBTL1 contains three MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognises methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine.
