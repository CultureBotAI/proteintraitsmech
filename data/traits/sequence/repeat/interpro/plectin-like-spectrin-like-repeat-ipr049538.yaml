identifier: InterPro:IPR049538
label: "Plectin-like, spectrin-like repeat"
definition: >-
  This entry represents a spectrin repeat found in human Plectin (PCN) and similar animal proteins. PCN interlinks intermediate filaments with microtubules and microfilaments and anchors intermediate filaments to desmosomes or hemidesmosomes.
