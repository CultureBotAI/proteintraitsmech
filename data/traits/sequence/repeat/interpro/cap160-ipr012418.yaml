identifier: InterPro:IPR012418
label: CAP160
definition: >-
  This region featured in this family is repeated in spinach cold acclimation protein CAP160 ( ) CAP160 is induced during periods of drought stress; its precise function is unknown but it has been implicated in the stabilisation of membranes, cytoskeletal elements, and ribosomes. By acting as a compatible solute, it may reduce the toxic effects of cellular solutes that accumulate at high concentration. Other members of this family are also induced by water stress, abscisic acid, and/or low temperature, such as desiccation-responsive protein 29B ( ) and CDet11-24 protein ( ).
