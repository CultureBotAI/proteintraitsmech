identifier: InterPro:IPR013211
label: LVIVD
definition: >-
  This repeat is found in bacterial, eukaryotic and archaeal cell surface proteins, many of which are hypothetical. The secondary structure corresponding to this repeat is predicted to comprise 4 β-strands, which may associate to form a β-propeller. The repeat copy number varies from 2-14. This repeat is sometimes found with the PKD domain .
