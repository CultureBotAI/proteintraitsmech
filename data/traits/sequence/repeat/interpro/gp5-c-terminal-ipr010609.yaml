identifier: InterPro:IPR010609
label: "Gp5, C-terminal"
definition: >-
  This repeat composes the C-terminal part of the Bacteriophage T4 baseplate protein Gp5. This region of the protein forms a needle like projection from the baseplate that is presumed to puncture the bacterial cell membrane. Structurally three copies of the repeated region trimerise to form a β solenoid type structure. This entry also includes repeats from some bacterial Vgr proteins.
