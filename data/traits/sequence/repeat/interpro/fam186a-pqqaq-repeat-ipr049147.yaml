label: "FAM186A, PQQAQ repeat"
definition: >-
  This entry represents a short repeat found in protein FAM186A from human ( ) and related sequences from vertebrates. These repeats form a long α-solenoid structure, in which each repeat forms a single α-helix, characterised by PQQAQ sequence.
