identifier: InterPro:IPR021021
label: "Fibronectin-binding repeat, SSURE"
definition: >-
  Streptococcal surface repeat domain - SSURE - is a protein fragment found to bind to extracellular matrix protein fibronectin but not to collagen or submaxillary mucin in Streptococci. Anti-SSURE antibodies recognised the corresponding protein on the surface of streptococcal cells. The full-length proteins are thus fibronectin-binding surface adhesins. The proteins are further characterised by having an N-terminal motif resembling [YF]SIRKxxxGxxS[VIA] and a C-terminal LPXTG motif-containing region which is a characteristic of many surface proteins of Streptococcus and Streptomyces species. Cleavage between the Thr and Gly by sortase or a related enzyme leads to covalent anchoring at the new C-terminal Thr to the cell wall.
