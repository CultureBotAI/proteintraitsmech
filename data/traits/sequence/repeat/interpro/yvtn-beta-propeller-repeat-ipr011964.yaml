identifier: InterPro:IPR011964
label: "YVTN beta-propeller repeat"
definition: >-
  This entry represents a repeat of about 40 amino acids found in a variety of archaea and bacteria which can be present in up to 14 copies per protein. The archaeal species Methanosarcina mazei (Methanosarcina frisia) contains several predicted surface layer proteins (SLPs) containing tandem copies of this repeat. The crystal structure of one of these proteins ( ), containing seven tandem copies of this repeat, was examined. Individually, these repeats form four-stranded β-blades, while the seven copies together form a seven-bladed β-propeller domain. This repeat shows sequence similarity to the WD-40 repeat ( ) and may play a similar role, serving as a rigid scaffold for protein interactions.
