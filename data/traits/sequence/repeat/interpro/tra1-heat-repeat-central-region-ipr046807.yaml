identifier: InterPro:IPR046807
label: "Tra1, HEAT repeat central region"
definition: >-
  This entry represents part of the Tra1 protein composed of α-solenoid repeats that forms the central region. This is named as central due to its position relative to the ring region. This entry includes transcription-associated protein 1 (Tra1) from yeast and TRRAP from mammals. Budding yeast Tra1 is a subunit of SAGA and NuA4 histone acetyltransferase complexes. Human TRRAP is an adapter protein found in various multiprotein chromatin complexes with histone acetyltransferase activity (HAT). This entry also includes Tra2 which is a component of the NuA4 histone H4/H2A acetyltransferase involved in transcription and DNA repair.
