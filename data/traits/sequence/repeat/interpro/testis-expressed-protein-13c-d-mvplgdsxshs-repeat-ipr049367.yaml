label: "Testis-expressed protein 13C/D, MVPLGDSxSHS repeat"
definition: >-
  This entry represents a repeat found in TEX13C and TEX13D (Testis-expressed proteins) from human and similar proteins from mammals. These repeats have the conserved pattern MVPLGDSxSHS.
