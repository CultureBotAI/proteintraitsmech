identifier: InterPro:IPR001259
label: "Proteinase inhibitor I27, calpastatin"
definition: >-
  This entry represents repeats on calpain inhibitor proteins. Calpain inhibitor (calpastatin) is restricted to the metazoa and specifically inhibits calpain (calcium-dependent cysteine protease). Calpastatin belongs to MEROPS inhibitor family I27, clan II. It plays a key role in post-mortem tenderisation of meat and may be involved in muscle protein degradation in living tissue. The calpain system originally comprised three molecules: two Ca2+-dependent proteases, mu-calpain and m-calpain, and a third polypeptide, calpastatin, whose only known function is to inhibit the two calpains. Both mu-and m-calpain are heterodimers containing an identical 28kDa subunit and an 80kDa subunit that shares 55-65% sequence homology between the two proteases. The single calpastatin gene can produce eight or more calpastatin polypeptides ranging from 17kDa to 85kDa by use of different promoters and alternative splicing events. The physiological significance of these different calpastatins is unclear, although all bind to three different places on the calpain molecule; binding to at least two of the sites is Ca2+ dependent.
