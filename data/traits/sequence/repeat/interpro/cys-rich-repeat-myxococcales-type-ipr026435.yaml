identifier: InterPro:IPR026435
label: "Cys-rich repeat, Myxococcales-type"
definition: >-
  This repeat is restricted to the Myxococcales, a division of the deltaproteobacteria. It occurs in several surface proteins, and may form a stalk region. The repeat averages about 21 amino acids in length with four or five Cys, three of which are nearly invariant.
