identifier: InterPro:IPR008160
label: "Collagen triple helix repeat"
definition: >-
  Collagens are generally extracellular structural proteins involved in formation of connective tissue structure. The sequence is predominantly repeats of the G-X-Y and the polypeptide chains form a triple helix. The first position of the repeat is glycine, the second and third positions can be any residue but are frequently proline and hydroxyproline. Collagens are post-translationally modified by proline hydroxylase to form the hydroxyproline residues. Defective hydroxylation is the cause of scurvy. Members of this family belong to the collagen superfamily. Some of them are not involved in connective tissue structure but share the same triple helical structure.
