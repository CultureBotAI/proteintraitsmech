identifier: InterPro:IPR055063
label: "Small ribosomal subunit protein mS39, PPR"
definition: >-
  This entry represents a pentatricopeptide repeat (PPR) section found at the N-terminal of animal Small ribosomal subunit protein mS39 (also known as PPR domain protein 3 (PTCD3)), a mitochondrial RNA-binding protein that has a role in mitochondrial translation.
