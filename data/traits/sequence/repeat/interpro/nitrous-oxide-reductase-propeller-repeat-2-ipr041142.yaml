identifier: InterPro:IPR041142
label: "Nitrous oxide reductase, propeller repeat 2"
definition: >-
  Nitrous oxide reductases usually contain a seven-bladed β-propeller domain with external short α-helices. This entry represents a single blade of the propeller, without α-helical insertion.
