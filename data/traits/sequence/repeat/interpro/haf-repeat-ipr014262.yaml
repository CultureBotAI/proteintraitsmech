identifier: InterPro:IPR014262
label: "HAF repeat"
definition: >-
  This repeat is approximately 40 amino acids in length and the spacing between repeats is usually is four residues. Proteins generally have a least two tandem copies, and can have as many as seven. This repeat is named after a conserved tripeptide motif, HAF, found in most of the proteins. Some proteins containing the repeat are found in species with no outer membrane (archaea and Gram-positive bacteria) while others have C-terminal autotransporter domains that suggest that the repeat region is transported across the outer membrane. This repeat seems likely to be associated with extracellular proteins.
