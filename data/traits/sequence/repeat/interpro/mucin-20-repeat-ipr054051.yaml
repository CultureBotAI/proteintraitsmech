identifier: InterPro:IPR054051
label: "Mucin-20 repeat"
definition: >-
  This entry represents a short repeat found in human Mucin-20 (MUC-20) and similar sequences from primates. MUC-20 may regulate the MET signalling cascade and seems to decrease the hepatocyte growth factor (HGF)-induced transient MAPK activation. This repeat is predicted to form a β-solenoid structure.
