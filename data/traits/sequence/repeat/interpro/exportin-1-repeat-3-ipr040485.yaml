identifier: InterPro:IPR040485
label: "Exportin-1, repeat 3"
definition: >-
  Chromosome region maintenance 1 / Exportin 1 mediates the nuclear transport of proteins bearing a leucin-rich nuclear export signal (NES). It contains helical repeats that are structurally similar to HEAT repeats, but share little sequence similarity with them. N-, C-terminal and central repeats show slightly different structural arrangements, with N- and C- terminal repeats interacting with each other.
