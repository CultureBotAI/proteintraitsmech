identifier: InterPro:IPR046849
label: "E2 motif"
definition: >-
  This is the E + motif (also known as E2) found in some plant pentatricopeptide repeat (PPR) proteins. PPRs contain a C-terminal DYW deaminase domain required for RNA editing, a process that deaminates specific cytidines to uridines. This motif, together with the E motif , precedes the DYW domain and, although their role is not clear, they are essential in the RNA editing reaction. The E/E motifs may contain two degenerate PPR motifs that could be involved in protein binding.
