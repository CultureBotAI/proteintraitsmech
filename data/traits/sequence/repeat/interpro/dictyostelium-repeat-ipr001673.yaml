identifier: InterPro:IPR001673
label: "Dictyostelium repeat"
definition: >-
  This entry represents a short repeat found in dictyostelium proteins. This repeat is composed of a beta hairpin. Structure predictions suggest that the conserved cysteines form disulphide bridges, with one pair forming between adjacent repeats (2 and 3) and one pair within a repeat 1 and 4. This repeat also appears in some bacterial sequences.
