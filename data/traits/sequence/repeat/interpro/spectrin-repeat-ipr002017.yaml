identifier: InterPro:IPR002017
label: Spectrin repeat
definition: >-
  Spectrin repeats are found in several proteins involved in cytoskeletal structure and in proteins with a more regulatory role mostly in animals. This entry includes spectrin alpha and beta subunits, alpha-actinin and dystrophin.
