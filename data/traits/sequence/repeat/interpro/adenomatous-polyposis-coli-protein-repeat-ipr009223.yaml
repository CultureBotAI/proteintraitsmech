identifier: InterPro:IPR009223
label: Adenomatous polyposis coli protein repeat
definition: >-
  This short region is found repeated in the mid region of the adenomatous polyposis proteins (APCs). In the human protein many cancer-linked SNPs are found near the first three occurrences of the motif. These repeats bind beta-catenin.
