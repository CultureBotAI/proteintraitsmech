identifier: InterPro:IPR011690
label: "Phosphate-starvation-induced PsiF repeat"
definition: >-
  This region is approximately 35 residues long. It is found repeated in a number of putative phosphate starvation-inducible proteins expressed by various bacterial species. PsiF ( ) is known to be an example of such phosphate starvation-inducible proteins.
