identifier: InterPro:IPR012586
label: "28S rRNA (cytosine-C(5))-methyltransferase repeat"
definition: >-
  This entry represents a characteristic repeat of 28S rRNA (cytosine-C(5))-methyltransferase (NOP2, also known as proliferating cell nuclear antigen p120), which is found in three copies. NOP2 is involved in ribosomal large subunit assembly. It is an S-adenosyl-L-methionine-dependent methyltransferase that specifically methylates the C5 position of cytosine 4447 in 28S rRNA.
