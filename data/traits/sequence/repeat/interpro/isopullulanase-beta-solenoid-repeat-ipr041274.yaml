identifier: InterPro:IPR041274
label: "Isopullulanase beta-solenoid repeat"
definition: >-
  This isopullulanase (IPU) and dextranase repeat unit includes three (or one long and one short) parallel β-strands. The repeat region as a whole folds into a β-helix, known as β-solenoid.
