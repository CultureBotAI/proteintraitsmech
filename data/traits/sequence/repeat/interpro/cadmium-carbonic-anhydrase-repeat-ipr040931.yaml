identifier: InterPro:IPR040931
label: "Cadmium carbonic anhydrase repeat"
definition: >-
  This entry represents the cadmium carbonic anhydrase repeat unit of the beta-carbonic anhydrase of a marine diatom, that uses both zinc and cadmium for catalysis of the reversible hydration of carbon dioxide for use in inorganic carbon acquisition for photosynthesis (thus being a cambialistic enzyme). Compared with alpha-and gamma-carbonic anhydrases that use three histidines to coordinate the zinc-atom, this beta-carbonic anhydrase has two cysteines and one histidine, and rapidly binds cadmium.
