identifier: InterPro:IPR006603
label: "PQ-loop repeat"
definition: >-
  Some membrane bound proteins possess a pair of repeats each spanning two transmembrane helices connected by a loop. The PQ motif found on loop 2 is critical for the localisation of cystinosin to lysosomes. However, the PQ motif appears not to be a general lysosome-targeting motif. It is thought to possess a more general function; most probably this involves a glutamine residue.
