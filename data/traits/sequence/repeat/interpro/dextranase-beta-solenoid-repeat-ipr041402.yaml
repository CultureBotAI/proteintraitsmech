identifier: InterPro:IPR041402
label: "Dextranase, beta solenoid repeat"
definition: >-
  The crystal structures of Dex49A from Penicillium minioluteum and of ATCC9642 isopullulanase from Aspergillus niger include β-solenoid repeats, sharing structural similarities. This entry includes a single repeat unit of the repeat regions.
