identifier: InterPro:IPR018391
label: "Pyrrolo-quinoline quinone beta-propeller repeat"
definition: >-
  Pyrrolo-quinoline quinone (PQQ) is a redox coenzyme, which serves as a cofactor for a number of enzymes (quinoproteins) and particularly for some bacterial dehydrogenases. A number of bacterial quinoproteins belong to this family. Enzymes in this group contain repeats composing a β propeller.
