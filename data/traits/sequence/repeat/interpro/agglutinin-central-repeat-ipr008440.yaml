identifier: InterPro:IPR008440
label: Agglutinin, central repeat
definition: >-
  This entry represents the tandem repeat found in the central domain of Adhesins (Als) proteins. Adhesive properties in fungi are conveyed by a group of cell-surface proteins called adhesins (Als) (sometimes also referred to as agglutinins or flocculins). Several fungal adhesins have been described to date, including the Candida albicans Als (agglutinin-like sequence) proteins. Als proteins are cell-surface glycoproteins with a three-domain structure. Each Als protein has a relatively conserved N-terminal domain , a central domain consisting of a tandemly repeated motif with a variable number of repeats, and a serine-threonine-rich C-terminal domain that is relatively variable across the family. The Als family exhibits several types of variability, indicating the importance of considering strain and allelic differences when studying als genes and their encoded proteins.
