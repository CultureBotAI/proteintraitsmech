identifier: InterPro:IPR040709
label: "Importin 13, repeat 1"
definition: >-
  Importin 13 has a spiralic structure containing repeats structurally similar to HEAT repeats. It serves as receptor for nuclear localization signals (NLS) in cargo substrates, mediating docking of the importin/substrate complex to the nuclear pore complex (NPC). It contains several repeats structurally similar to the HEAT repeat. This entry represents a single repeat unit.
