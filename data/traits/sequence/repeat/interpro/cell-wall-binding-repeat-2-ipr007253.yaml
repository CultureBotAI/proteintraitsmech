identifier: InterPro:IPR007253
label: "Cell wall binding repeat 2"
definition: >-
  This repeat, also known as CWB2, is found in multiple tandem copies in proteins including amidase enhancers, N-acetylmuramoyl-L-alanine amidase LytC and adhesins. CWB2 is found in Cwp8 protein from C. difficile whose structure was determined. Cwp8 contains 3 CWB2 arranged in triangular trimer. Each CWB2 is composed of a central four-stranded parallel β-sheet surrounded by two pairs of α-helices positioned on alternate sides of the β-sheet. In the middle, the three domains come together to form the central three-helical bundle. The trimer binding arrangement contains highly conserved residues and is shared between CWB2 and the SLH S-layer/cell wall-anchoring modules, suggesting a common or convergent evolutionary origin. The Cwp8 structure closely resembles the SlpA structure.
