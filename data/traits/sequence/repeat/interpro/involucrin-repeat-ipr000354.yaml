identifier: InterPro:IPR000354
label: "Involucrin repeat"
definition: >-
  Involucrin is a protein present in keratinocytes of epidermis and other stratified squamous epithelia. Involucrin first appears in the cell cytosol, but ultimately becomes cross-linked to membrane proteins by transglutaminase thus helping in the formation of an insoluble envelope beneath the plasma membrane. Structurally involucrin consists of a conserved region of about 75 amino acid residues followed by two extremely variable length segments that contain glutamine-rich tandem repeats. The glutamine residues in the tandem repeats are the substrate for the tranglutaminase in the cross-linking reaction. The total size of the protein varies from 285 residues (in dog) to 835 residues (in orangutan).
