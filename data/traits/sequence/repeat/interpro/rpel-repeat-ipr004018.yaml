identifier: InterPro:IPR004018
label: "RPEL repeat"
definition: >-
  RPEL repeat (RPxxxEL) containing proteins are found in a wide range of metazoan organisms. RPEL repeats have been shown to be required for unpolymerised actin binding and proteins containing RPEL repeats are able to modify cell shape and/or are important in the regulation of gene expression by the actin cytoskeleton. RPEL repeats can be found in association with the SAP motif, which could be involved in DNA binding. Some proteins known to contain RPEL repeats are listed below: Mammalian myocardin, heart-specific serum response factor (SRF) co- activator. Vertebrate myocardin-related transcription factor A (MRTF-A or MAL), a signal-regulated SRF co-activator. Vertebrate myocardin-related transcription factor B (MRTF-B). Mammalian phosphatase and actin regulator 1 to 3.
