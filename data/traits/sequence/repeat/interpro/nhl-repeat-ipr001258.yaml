label: "NHL repeat"
definition: >-
  The NHL repeat, named after NCL-1, HT2A and Lin-41, is a conserved structural motif present in a large number of eukaryotic and prokaryotic proteins. For example, the repeat is found in a variety of enzymes of the copper type II, ascorbate-dependent monooxygenase family, which catalyse the C-terminal alpha-amidation of biological peptides and in a large family of growth regulators. Many NHL-containing proteins have additional domains such as a RING finger, a B-box zinc finger or a coiled-coil motif. In many, it occurs in tandem arrays, for example in the ring finger β-box, coiled-coil (RBCC) eukaryotic growth regulators or the 'Brain Tumor' protein (Brat). The NHL repeats are also found in serine/threonine protein kinase (STPK) in a diverse range of pathogenic bacteria. These STPK are transmembrane receptors with an intracellular N-terminal kinase domain and extracellular C-terminal sensor domain. In the STPK PknD from Mycobacterium tuberculosis, the sensor domain forms a rigid, six-bladed b-propeller composed of NHL repeats with a flexible tether to the transmembrane domain. The NHL domain is a six-bladed β-propeller, with the blades arrayed in a radial fashion around a central axis, and each blade composed of a highly twisted four-stranded antiparallel β-sheet. The innermost strand of each blade is labelled 'a' and the outermost strand, 'd'. Like in other β-propellers, the sequence repeats are offset with respect to the blades of the propeller, such that any given 40-residue NHL repeat spans strands 'b-d' of one propeller blade and strand 'a' of the subsequent blade. This offset ensures circularisation of the propeller because the last strand of the final sequence repeat acts as an innermost strand of the blade that harbours strands 'b-d' from the first sequence repe…
