identifier: InterPro:IPR012587
label: "RNA helicase p68 repeat"
definition: >-
  This short region is found in two copies in RNA helicase p68 (DDX5), which is involved in the alternative regulation of pre-mRNA splicing; its RNA helicase activity is necessary for increasing tau exon 10 inclusion and occurs in a RBM4-dependent manner.
