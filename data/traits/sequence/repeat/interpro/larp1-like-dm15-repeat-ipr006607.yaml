identifier: InterPro:IPR006607
label: LARP1-like, DM15 repeat
definition: >-
  This repeat is found in a highly conserved C-terminal region of La-related protein 1 (LARP1). LARP1 is implicated in the stability, localisation, and translational efficiency of mRNAs required for cell development, migration, division, and general translation. Upregulation of this protein occurs in several cancers and is correlated with tumor progression and adverse clinical outcome. LARP1 is found in eukaryotes and has been shown to play conserved roles in regulating the stability of mRNAs across the animal and plant kingdoms. In all eukaryotes, except for Ascomycota fungi, LARP1 possesses three related, well-conserved, DM15 repeats. The structure of the LARP1 region that spans these repeats has been solved and it folds into a typical α-α superhelix. Each of the DM15 repeats adopts an α-helical hairpin and these pack against each other to form an elongated globular domain. LARP1 DM15 domain directly binds to the cap of TOP mRNA. Residues from each of the conserved DM15 repeats participate in the recognition of the invariant cytidine in the first position of TOP mRNAs.
