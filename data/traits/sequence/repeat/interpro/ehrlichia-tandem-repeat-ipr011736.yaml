identifier: InterPro:IPR011736
label: "Ehrlichia tandem repeat"
definition: >-
  This entry represents 77 residues of an 80 amino acid (240 nucleotide) tandem repeat, found in a variable number of copies in an immunodominant outer membrane protein of Ehrlichia chaffeensis, a tick-borne obligate intracellular pathogen.
