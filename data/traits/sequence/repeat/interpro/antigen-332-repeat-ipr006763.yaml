identifier: InterPro:IPR006763
label: "Antigen 332 repeat"
definition: >-
  To date many different Plasmodium antigens recognised by the hyperimmune system human sera have been cloned, sequenced and characterised. The majority contain tandemly repeated amino acid sequences which make up a considerable portion of the protein sequence. It has been suggested that these repeat-containing antigens may provide an immunological smokescreen to the parasite in order to evade the human immune system. This repeat is found in the Plasmodium falciparum Ag332 protein and occupies most of its length.
