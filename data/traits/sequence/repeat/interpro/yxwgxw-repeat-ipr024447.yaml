identifier: InterPro:IPR024447
label: "YXWGXW repeat"
definition: >-
  This short repeat contains the motif YXWXXGXW where X can be any amino acid. It is generally found in 2-5 copies in short secreted bacterial proteins. Its function is as yet unknown.
