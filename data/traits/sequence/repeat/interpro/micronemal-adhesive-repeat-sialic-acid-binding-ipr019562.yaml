identifier: InterPro:IPR019562
label: "Micronemal adhesive repeat, sialic-acid binding"
definition: >-
  This entry represents a novel carbohydrate-binding domain found on micronemal proteins. Micronemal proteins (MICs) are released onto the parasite surface just before invasion of host cells and play important roles in host cell recognition, attachment and penetration. Toxoplasma gondii can infect and replicate within all nucleated cells. This domain interacts with sialylated oligosaccharides; the protein in T. gondii is a monomer but several MAR domains are carried on the protein. Each MAR domain contains one central sialic acid-binding pocket.
