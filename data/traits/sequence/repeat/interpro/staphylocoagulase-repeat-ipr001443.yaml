identifier: InterPro:IPR001443
label: "Staphylocoagulase repeat"
definition: >-
  Staphylocoagulase is an extracellular protein produced by several strains of Staphylococcus aureus and which specifically forms a complex with prothrombin. This complex named staphylothrombin can clot fibrinogen without any proteolytic cleavage of prothrombin. The C terminus of staphylocoagulase contains the tandem repeat which does not seem to be required for the procoagulant activity.
