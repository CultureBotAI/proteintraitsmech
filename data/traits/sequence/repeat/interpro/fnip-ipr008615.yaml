identifier: InterPro:IPR008615
label: FNIP
definition: >-
  This short repeat is predominantly found in proteins from mimivirus and lower eukaryotes, including Calmodulin-binding protein CmbB from Dictyostelium discoideum (Social amoeba). It appears to be related to . The alignment consists of two tandem repeats. It is termed the FNIP repeat after the pattern of conserved residues.
