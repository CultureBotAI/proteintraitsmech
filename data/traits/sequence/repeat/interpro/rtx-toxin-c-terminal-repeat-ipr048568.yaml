identifier: InterPro:IPR048568
label: "RTX toxin, C-terminal repeat"
definition: >-
  This entry represents a short repeat found near the C-terminal of some RTX toxins such as MARTX ( ). AlphaFold models suggest that this repeat forms a β-solenoid structure. These repeats contain a GXGXD motif in each repeat which is similar to that found in the RTX calcium-binding nonapeptide repeat ( ). This suggests that these repeats may also be required for translocation via the type I secretion system.
