identifier: InterPro:IPR019541
label: "Trappin protein transglutaminase-binding repeat"
definition: >-
  Trappin-2,a protease inhibitor, has a unique N-terminal domain that enables it to become cross-linked to extracellular matrix proteins by transglutaminase. This domain contains several repeated motifs (represented by this entry) with the consensus sequence Gly-Gln-Asp-Pro-Val-Lys, and these together can anchor the whole molecule to extracellular matrix proteins, such as laminin, fibronectin, beta-crystallin, collagen IV, fibrinogen, and elastin, by transglutaminase-catalysed cross-links. The whole domain is rich in glutamine and lysine, thus allowing and transglutaminase(s) to catalyse the formation of an intermolecular epsilon-(gamma-glutamyl)lysine isopeptide bond. Cementoin is associated with the WAP family, , at the C terminus. This short repeated motif is also found in some bacterial proteins.
