identifier: InterPro:IPR031545
label: "Signal recognition particle subunit SRP72, TPR-like repeat"
definition: >-
  This entry represents a TPR-like repeats found in a group of eukaryotic proteins, including signal recognition particle subunit SRP72, a component of the signal recognition particle (SRP) complex that mediates the cotranslational targeting of secretory and membrane proteins to the endoplasmic reticulum (ER). This protein binds the signal recognition particle RNA (7SL RNA) in presence of SRP68.
