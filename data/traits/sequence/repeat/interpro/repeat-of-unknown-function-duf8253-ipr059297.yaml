identifier: InterPro:IPR059297
label: "Repeat of unknown function DUF8253"
definition: >-
  This domain is found in uncharacterised proteins mainly from Microbacteriaceae. It contains repetitive QC sequence motif frequently found in the context of NQCN motif. This domain is predicted to fold into an unique β-sandwich formed of these consecutive motifs.
