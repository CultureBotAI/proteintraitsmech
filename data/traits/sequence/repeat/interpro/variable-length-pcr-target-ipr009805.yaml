identifier: InterPro:IPR009805
label: "Variable length PCR target"
definition: >-
  This entry represents a 29 residue repeated sequence which seem to be specific to the Ehrlichia chaffeensis variable length PCR target (VLPT) protein. E. chaffeensis is a tick-transmitted rickettsial agent and is responsible for human monocytic ehrlichiosis (HME). The function of this family is unknown.
