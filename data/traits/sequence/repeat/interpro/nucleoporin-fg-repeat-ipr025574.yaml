identifier: InterPro:IPR025574
label: "Nucleoporin FG repeat"
definition: >-
  This entry represents a region containing FG repeats that is found in nucleoporin proteins, key elements of the selective gate-barrier that limits the diffusion of cargoes through the NPC. It includes the yeast nucleoporins Nup116, Nup100, Nup49, Nup57 and Nup 145.
