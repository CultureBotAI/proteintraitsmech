identifier: InterPro:IPR024613
label: "Huntingtin, N-terminal, HEAT repeats 2"
definition: >-
  This entry represents the second set of HEAT repeats of the N-terminal domain from Huntingtin (Htt). It is separated from the rest of the domain by an unstructured region. This repeated domain is less than 40 amino acids in length and is present in huntingtin protein (Htt). Htt is expressed in many tissues, with various expression levels and is involved in a number of cellular functions. However, its exact function is not yet clear. An abnormal polyglutamine (polyQ) expansion in this protein causes Huntington's disease (HD), a progressive autosomal-dominant neurodegenerative disease characterised by an uncontrolled motor movement known as chorea, cognitive disorder and depression. Htt consists of multiple HEAT repeats organised in N-terminal, bridge and C-terminal domains, which function as a scaffold that mediates interactions with binding partners.
