identifier: InterPro:IPR007132
label: "Protein of unknown function DUF346"
definition: >-
  This repeat is found as seven tandem copies in carbohydrate-binding proteins, including Fucose-binding Lectin from Photorhabdus laumondii ( )and similar fungal and bacterial proteins. It is composed of β-strands and forms a seven-bladed β-propeller structure. It is found in association with BNR repeats, which also form a β-propeller.
