identifier: InterPro:IPR002885
label: "Pentatricopeptide repeat"
definition: >-
  This entry represents the PPR repeat. Pentatricopeptide repeat (PPR) proteins are characterised by tandem repeats of a degenerate 35 amino acid motif. PPR proteins are sequence-specific RNA-binding proteins that are involved in multiple aspects of RNA metabolism. They can bind a diversity of sequences that confers the variability in its functions. Most have roles in mitochondria or plastids. PPR repeats were discovered while screening Arabidopsis proteins for those predicted to be targeted to mitochondria or chloroplast. Some of these proteins have been shown to play a role in post-transcriptional processes within organelles. Plant genomes have between one hundred to five hundred PPR genes per genome whereas non-plant genomes encode two to six PPR proteins. The plant PPR protein family has been divided in two subfamilies on the basis of their motif content and organisation. The crystal structure of maize chloroplast PPR10 has been reported. The nineteen repeats of PPR10 are assembled into a right-handed superhelical spiral. PPR10 forms a homodimer and exhibits considerable conformational changes upon binding to its ssRNA target, with six nucleotides being specifically recognised by six corresponding PPR10 repeats.
