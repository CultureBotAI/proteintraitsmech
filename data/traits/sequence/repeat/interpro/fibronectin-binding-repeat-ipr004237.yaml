identifier: InterPro:IPR004237
label: "Fibronectin binding repeat"
definition: >-
  The ability of bacteria to bind fibronectin is thought to enable the colonisation of wound tissue and blood clots. The fibronectin binding repeat is found in bacterial fibronectin binding proteins and serum opacity factor. Each fibronectin binding repeat is an array of short motifs that bind to fibronectin type I domains. Fibronectin binding repeats are natively unfolded in the absence of fibronectin and are thought to adopt a well-defined conformation (tandem β-zipper) upon binding.
