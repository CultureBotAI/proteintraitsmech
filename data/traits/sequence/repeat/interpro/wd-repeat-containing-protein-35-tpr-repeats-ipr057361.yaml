identifier: InterPro:IPR057361
label: "WD repeat-containing protein 35, TPR repeats"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found in human WD repeat-containing protein 35 (WDR35), a component of the IFT complex A (IFT-A), which is involved in ciliogenesis and ciliary protein trafficking. Members of this entry are mainly found in animals.
