identifier: InterPro:IPR041025
label: "Homing endonuclease associated repeat"
definition: >-
  Homing endonucleases are found in bacteria and viruses and catalyze the hydrolysis of genomic DNA within the cells that synthesize them. This entry represents a 60 residue repeat of unknown function found associated with homing endonuclease domains.
