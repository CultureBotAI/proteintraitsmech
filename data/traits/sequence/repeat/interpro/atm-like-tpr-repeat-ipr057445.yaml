identifier: InterPro:IPR057445
label: "ATM-like, TPR repeat"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found in Serine/threonine-protein kinase ATM from Arabidopsis thaliana and similar plant proteins. ATM acts as a DNA damage sensor upon double strand breaks (DSBs), apoptosis and genotoxic stresses such as ionizing ultraviolet A light (UVA). It regulate DNA damage response mechanism through recognising the substrate consensus sequence [ST]-Q and phosphorylates 'Ser-139' of histone variant H2AX/H2AFX at double strand breaks (DSBs). On DNA damage, autophosphorylation dissociates ATM into monomers rendering them catalytically active. It can phosphorylate DYRK2, CHEK2, p53/TP53, FANCD2, NFKBIA, BRCA1, CTIP, nibrin (NBN), TERF1, RAD9 and DCLRE1C. ATM is also required for telomere elongation. ATM also plays a role in pre-B cell allelic exclusion, a process leading to expression of a single immunoglobulin heavy chain allele to enforce clonality and monospecific recognition by the B-cell antigen receptor (BCR) expressed on individual B-lymphocytes. It is also involved in signal transduction and cell cycle control and may function as a tumour suppressor. The tetratricopeptide repeat region (TPR) is a structural motif present in a wide range of proteins. It mediates protein-protein interactions and the assembly of multiprotein complexes. The TPR motif consists of 3-16 tandem repeats of 34 amino acid residues, although individual TPR motifs can be dispersed in the protein sequence. Sequence alignment of the TPR domains reveals a consensus sequence defined by a pattern of small and large amino acids. TPR motifs have been identified in various different organisms, ranging from bacteria to humans. Proteins containing TPRs are involved in a variety of biological processes, such as cell cycle regulation, transcriptional control, m…
