identifier: InterPro:IPR047352
label: "Scm-like with four MBT domains protein 1, second MBT repeat"
definition: >-
  This entry represents the third MBT repeat of SFMBT1, which contains a partially conserved semi-aromatic cage. Scm-like with four MBT domains protein 1 (SFMBT1), is a transcriptional repressor protein that selectively binds the N-terminal tail of histone H3 and functions as a chromatin reader in regulating epigenetic silencing and the myogenic gene program. It mediates the recruitment of corepressor complexes to target genes, followed by chromatin compaction and repression of transcription. SFMBT1 contains four MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognises methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine.
