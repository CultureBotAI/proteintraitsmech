identifier: InterPro:IPR043651
label: KNL1 MELT repeat
definition: >-
  The outer kinetochore protein scaffold KNL1 is crucial for a correct chromosome segregation during mitosis and meiosis. The main characteristic of KNL1 is the presence of repeats containing MELT (Met-Glu-Leu-Thr) motifs which are phosphorylated and critical for the BUB1-BUB3 dimer recruitment. BUB1-BUB3 dimer regulates chromosome biorientation and the spindle assembly checkpoint. This entry mainly represents vertebrate proteins although MELT motifs are found much more widely.
