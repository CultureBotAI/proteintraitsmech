identifier: InterPro:IPR009745
label: "Cysteine-rich, acidic integral membrane"
definition: >-
  This entry represents a 24 residue repeated motif from the Trypanosoma brucei cysteine-rich, acidic integral membrane protein precursor (CRAM). CRAM is concentrated in the flagellar pocket, an invagination of the cell surface of the trypanosome where endocytosis has been documented.
