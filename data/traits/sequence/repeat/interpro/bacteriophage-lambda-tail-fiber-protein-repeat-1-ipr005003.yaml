identifier: InterPro:IPR005003
label: Bacteriophage lambda, Tail fiber protein, repeat-1
definition: >-
  This entry represents repeat 1 of Tail fibre protein from Bacteriophage lambda (Stf or Gp27) and similar proteins from the tailed bacteriophages Caudovirales, such as Long-tail fibre protein gp37 from Bacteriophage T4 (Gp37), and prophages mainly found in Gammaproteobacteria such as Prophage side tail fibre protein homologue StfQ from Escherichia coli (strain K12). The strain of the Bacteriophage lambda used in most laboratories in the early 1990's carried some mutations respect to the wild type. Stf is the gene product of one of these mutations, which allow the virus to bind to an additional outer membrane receptor and accelerate the rate of adsorption onto the host cell surface but a higher failed infection frequency.
