identifier: InterPro:IPR049964
label: "Sialidase A repeat"
definition: >-
  This entry represents two tandem copies of a typically 17-amino acid repeat with a characteristic EXPEF or EXPEY motif, found mostly in surface-bound glycoside or peptide hydrolases with LPXTG motifs for covalent anchoring on the cell wall from firmicutes. It occurs in the C-terminal region of the Sialidase A from Streptococcus pneumoniae (NanA), where this region is not described as either catalytic or carbohydrate-binding, but instead as P/G/S/T-rich and repeat-containing. Multiple copies of the repeat occur also in the IgA1 protease ZmpD, another Streptococcus pneumoniae virulence factor.
