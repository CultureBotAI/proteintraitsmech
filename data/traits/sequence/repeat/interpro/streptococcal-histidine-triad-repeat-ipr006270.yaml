identifier: InterPro:IPR006270
label: "Streptococcal histidine triad repeat"
definition: >-
  This entry represents a repeated sequence region that includes a His-X-X-His-X-His (histidine triad) motif, which is found in a family of predominantly streptococcal proteins. Members of the family are suggested to cleave human complement component 3, and family member PhpA has been shown in vaccine studies to be a protective antigen in mice.
