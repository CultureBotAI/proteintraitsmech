identifier: InterPro:IPR047881
label: "LktA-like tandem repeat"
definition: >-
  This entry represents a repeat, about 53 amino acid residues in length, found in tandem copies in a number of bacterial proteins. In some of them, these tandem repeats may comprise most of the entire protein length. The best characterised protein containing this repeat is the leukotoxin LktA of Fusobacterium necrophorum. Leukotoxin (Lkt) is a secreted protein encoded by a tricistronic operon (lktBAC) and it is the major virulence factor of F. necrophorum causing apoptosis and necrosis of bovine leukocytes in a dose-dependent manner. The leukotoxin operon consists of three genes, lktB, lktA, and lktC, of which lktA is the toxin structural gene.
