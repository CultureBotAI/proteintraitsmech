identifier: InterPro:IPR002989
label: "Mycobacterial pentapeptide repeat"
definition: >-
  These repeats are found in many mycobacterial proteins. The repeats are most common in the PPE family of proteins, where they are found in the MPTR (major polymorphic tandem repeat) subfamily. PPE10, one of the members, is important for capsular integrity and virulence, although the function of these repeats is unknown. The repeat can be approximately described as XNXGX, where X can be any amino acid. These repeats are similar to A(D/N)LXX pentapeptide repeats [[(cite: 9655353); however, it is not clear if these two families are structurally related.
