identifier: Pfam:PF01095
label: Pectinesterase
definition: >-
  Pectinesterase (pectin methylesterase) catalyses the de-esterification of pectin into pectate and methanol. Pectin is one of the main components of the plant cell wall. In plants, pectinesterase plays an important role in cell wall metabolism during fruit ripening. In plant bacterial pathogens such as Erwinia carotovora and in fungal pathogens such as Aspergillus niger, pectinesterase is involved in maceration and soft-rotting of plant tissue. Plant pectinesterases are regulated by pectinesterase inhibitors, which are ineffective against microbial enzymes. Prokaryotic and eukaryotic pectinesterases share a few regions of sequence similarity. The crystal structure of pectinesterase from Erwinia chrysanthemi revealed a β-helix structure similar to that found in pectinolytic enzymes, though it is different from most structures of esterases. The putative catalytic residues are in a similar location to those of the active site and substrate-binding cleft of pectate lyase.
