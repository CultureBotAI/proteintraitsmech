identifier: Pfam:PF24492
label: Proteasome adapter and scaffold protein ECM29, HEAT-repeat domain
definition: >-
  This entry represents a HEAT-repeat domain found in ECM29, an adapter/scaffolding protein that binds to the 26S proteasome, motor proteins and other compartment specific proteins. This domain is found in the C-terminal half of ECM29, which binds kinesin and myosin.
