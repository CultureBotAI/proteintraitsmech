identifier: Pfam:PF08558
label: Telomere repeat binding factor (TRF)
definition: >-
  Telomeres function to shield chromosome ends from degradation and end-to-end fusions, as well as preventing the activation of DNA damage checkpoints. Telomeric repeat binding factor (TRF) proteins TRF1 and TRF2 are major components of vertebrate telomeres required for regulation of telomere stability. TRF1 and TRF2 bind to telomeric DNA as homodimers. Dimerisation involves the TRF homology (TRFH) subdomain contained within the dimerisation domain. The TRFH subdomain is important not only for dimerisation, but for DNA binding, telomere localisation, and interactions with other telomeric proteins. The dimerisation domains of TRF1 and TRF2 show the same multi-helical structure, arranged in a solenoid conformation similar to TPR repeats, which can be divided into an α-α superhelix and a long α hairpin. The two related human TRF proteins hTRF1 and hTRF2 form homodimers and bind directly to telomeric TTAGGG repeats via the myb DNA binding domain at the carboxy terminus. TRF1 is implicated in telomere length regulation and TRF2 in telomere protection. Other telomere complex associated proteins are recruited through their interaction with either TRF1 or TRF2. The fission yeast protein Taz1p (telomere-associated in Schizosaccharomyces pombe (Fission yeast) has similarity to both hTRF1 and hTRF2 and may perform the dual functions of TRF1 and TRF2 at fission yeast telomeres. This entry represents the dimerisation domain.
