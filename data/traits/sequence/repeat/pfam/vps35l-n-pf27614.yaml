identifier: Pfam:PF27614
label: VPS35L
definition: >-
  This entry represents VPS35 endosomal protein-sorting factor-like (VPS35L) proteins from animals and plants. In zebrafish, VPS35L is a component of the retriever complex essential for retromer-independent retrieval and recycling of numerous cargos such as integrins. The full-length VPS35L protein drives the retrieval and recycling of cargo proteins by coupling to SNX17 and is involved in endocytic recycling processes.
