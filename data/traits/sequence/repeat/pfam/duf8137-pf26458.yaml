identifier: Pfam:PF26458
label: Domain of unknown function (DUF8137)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins found in archaea. The proteins in this family are predominantly found in the class Halobacteria, which includes genera such as Halorubrum, Natronorubrum, and Halovenus. The proteins containing this domain vary in length, with sequences ranging from approximately 59 to 347 amino acids. The structure of this domain adopts an alpha solenoid.
