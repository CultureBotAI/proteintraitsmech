identifier: Pfam:PF09770
label: Topoisomerase II-associated protein PAT1
definition: >-
  This entry represents a domain found in Pat1 and its homologues. Pat1 is involved in translational repression and enhanced mRNA decay. It is part of the Lsm1-7-Pat1 complex that plays a role in activation of deadenylation-dependent decapping in the 5' to 3' pathway and in the protection of mRNA 3' ends. There are two Pat1 homologues in vertebrates, Pat1a and Pat1b, in contrast to the single protein in yeast and invertebrates. The maternally expressed Pat1a protein acts as a translational repressor, while Pat1b functions in mRNA decay in somatic cells. Pat1b is localised to P-body and is a nucleocytoplasmic shuttling protein that may perform various nuclear functions upstream of their multiple posttranscriptional regulatory roles in the cytoplasm.
