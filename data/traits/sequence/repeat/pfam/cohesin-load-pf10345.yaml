identifier: Pfam:PF10345
label: Cohesin loading factor
definition: >-
  This entry represents the chromatid cohesion factor Mau2 and its homologues, including Scc4 from budding yeasts and Ssl3 from fission yeasts. Scc4 is a subunit of the cohesin loading factor complex (Scc2-Scc4), which is required for the loading of cohesin complexes onto chromosomes. Ssl3 is in complex with Mis4 (Scc2 homologue) and is required in G1 for cohesin binding to chromosomes.
