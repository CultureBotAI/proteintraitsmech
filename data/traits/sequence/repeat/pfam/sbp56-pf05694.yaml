identifier: Pfam:PF05694
label: 56kDa selenium binding protein (SBP56)
definition: >-
  This family consists of selenium binding proteins from eukaryotes, bacteria and archaea. Human selenium-binding protein 1 (SELENBP1) is a methanethiol oxidase (MTO) that converts methanethiol to H2O2, formaldehyde, and H2S. Bovine SBP56 has been shown to participate in late stages of intra-Golgi protein transport. The Lotus japonicus homologue of SBP56, LjSBP is thought to have more than one physiological role, and can be implicated in controlling the oxidation/reduction status of target proteins in vesicular Golgi transport.
