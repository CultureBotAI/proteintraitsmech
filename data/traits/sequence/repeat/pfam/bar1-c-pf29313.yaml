identifier: Pfam:PF29313
label: BAR-1 C-terminal domain
definition: >-
  This entry represents a domain found near the C-terminal of BAR-1 and related beta-catenin proteins found in nematodes. BAR-1 is a beta-catenin homologue that participates in the Wnt signalling pathway in Caenorhabditis elegans. The protein contains armadillo repeats covering its whole structure. BAR-1 has been shown to be involved in transcriptional activation. BAR-1 functions as a transcriptional coactivator in association with the transcription factor POP-1 and is required for vulval development, Q neuroblast migration, and other developmental processes. This domain may contribute to the transcriptional regulatory function of these beta-catenin proteins.
