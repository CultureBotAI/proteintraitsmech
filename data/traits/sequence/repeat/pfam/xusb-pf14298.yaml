identifier: Pfam:PF14298
label: Xenosiderophore-binding lipoprotein XusB
definition: >-
  This entry represents XusB , a surface-exposed lipoprotein found exclusively in Bacteroidetes that functions in xenosiderophore acquisition. XusB adopts a unique seven-bladed β-propeller fold with a deep, positively charged central calyx that binds enterobactin and other catecholate siderophores with high affinity (Kd = 148 nM for enterobactin). The protein is enriched in outer membrane vesicles (OMVs) and can be secreted into the extracellular milieu. XusB forms part of the xenosiderophore utilisation system (xus operon: xusABC) in Bacteroides thetaiotaomicron, where it captures siderophores produced by other bacteria, particularly during iron-limiting conditions such as intestinal inflammation. XusB-bound enterobactin is shielded from sequestration by host lipocalin-2, thereby modifying nutritional immunity and potentially benefiting both commensal and pathogenic bacteria. The N-terminal contains a lipobox-like sequence with a conserved cysteine (typically at position 23) that is essential for membrane association, followed by a lipoprotein export signal (LES). Structural homologues are encoded by diverse Bacteroidetes species with conserved genetic synteny, though primary sequences are poorly conserved. This domain was previously annotated as DUF4374 (domain of unknown function 4374).
