identifier: Pfam:PF29788
label: TP_0598 N-terminal beta-propeller domain
definition: >-
  This entry represents the N-terminal β-propeller domain of uncharacterised protein TP_0598 from Treponema pallidum. The full-length protein is 605 amino acids long. In some strains, this protein is fused with TP_0597 ( ) as a result of frameshift mutations. The function of this domain remains to be determined.
