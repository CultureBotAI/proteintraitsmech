identifier: Pfam:PF25675
label: Bacteriophage nozzle protein
definition: >-
  This entry represents the tail tubular protein gp12 protein family found in phages. Gp12 exists as a monomer in solution, but assembles into a hexameric nozzle structure when incorporated into the tail complex. In phage T7, six copies of gp12 assemble into a hexameric tube attached to the adaptor protein ring (gp11) at the portal vertex. The nozzle forms part of the tail complex that completes phage assembly after DNA packaging. During phage infection, the nozzle serves as a tunnel for DNA delivery into the host cytoplasm. The tail assembly begins after the terminase complex cleaves the mature DNA genome and dissociates from the portal, allowing the tail proteins to assemble on the exposed portal clip domain.
