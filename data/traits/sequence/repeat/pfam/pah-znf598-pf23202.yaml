identifier: Pfam:PF23202
label: ZNF598 PAH domain
definition: >-
  This PAH domain is found in the human E3 ubiquitin-protein ligase ZNF598, yeast E3 ubiquitin-protein ligase HEL2 and related eukaryotic proteins. ZNF598 plays a key role in the ribosome quality control (RQC), a pathway that takes place when the ribosome has stalled during translation, leading to degradation of nascent peptide chains. ZNF598 is activated when ribosomes are stalled following translation of prematurely polyadenylated mRNAs. Independently of its role in RQC, this protein may also act as a negative regulator of interferon-stimulated gene expression. ZNF598 is associates with eukaryotic initiation factor 4E (eIF4E) homologous protein from mammalian (m4EHP) through binding to Grb10-interacting GYF protein 2 (GIGYF2). The m4EHP-GIGYF2 complex functions as a translational repressor and is essential for normal embryonic development of mammalian. HEL2 in addition to its role in the ribosome quality control, also acts as an activator of the No-Go decay (NGD) pathway by mediating polyubiquitination of monoubiquitinated RPS3/uS3 and RPS7/es7. RPS3/uS3 and RPS7/es7 are first monoubiquitinated by MAG2 and MOT2/NOT4, respectively, and HEL2 mediates formation of 'Lys-63'-linked polyubiquitin chains on monoubiquitin, leading to activation of the NGD pathway in a CUE2-mediated endonucleolytic cleavage. Hel2 is involved ubiquitination and degradation of excess histones.
