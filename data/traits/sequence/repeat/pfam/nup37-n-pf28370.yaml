identifier: Pfam:PF28370
label: Nucleoporin NUP37 N-terminal domain
definition: >-
  This entry represents the β-propeller domain of nucleoporin NUP37 from Chaetomium thermophilum and related fungal sequences, which is a component of the nuclear pore complex (NPC). The domain contains multiple WD repeats that form a β-propeller structure. The specific function of this domain remains to be determined. NUP37 is part of the 55-60 MDa NPC, which constitutes the exclusive means of nucleocytoplasmic transport. The NPC allows passive diffusion of small molecules and active transport of macromolecules such as proteins, RNAs and ribosomal subunits across the nuclear envelope. NUP37 interacts with other nucleoporins including NUP120.
