identifier: Pfam:PF16458
label: Beta-prism lectin
definition: >-
  This β-prism lectin domain is found at the C terminus of the Vibrio cholerae cytolytic pore-forming toxin hemolysin. It binds to N-glycans with a heptasaccharide GlcNAc4Man3 core (NGA2), but promotes self-assembly of the beta-pore-forming toxin by a carbohydrate-independent mechanism.
