identifier: Pfam:PF23211
label: Leucine-rich repeat and WD repeat-containing protein 1, LRR
definition: >-
  This entry represents the Leucine-rich repeat domain found at the N terminus of Leucine-rich repeat and WD repeat-containing protein 1 (LRWD1) from animals and related sequences. LRWD1 (also known as CENP-33 and ORCA) is required for for G1/S transition. It recruits and stabilises the origin recognition complex (ORC) onto chromatin during G1 to establish pre-replication complex (preRC) and to heterochromatic sites in pre-replicated cells. This proteins consist of a LRR domain at the N terminus and a WD domain at the C terminus.
