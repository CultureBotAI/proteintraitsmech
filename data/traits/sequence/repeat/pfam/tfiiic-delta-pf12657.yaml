identifier: Pfam:PF12657
label: Transcription factor IIIC subunit delta bet-propeller domain
definition: >-
  This entry represents a domain found towards the N terminus of the 90kDa subunit of transcription factor IIIC (also known as subunit 9 in yeast). The whole subunit is involved in RNA polymerase III-mediated transcription. It is possible that this N-terminal domain interacts with TFIIIC subunit 8.
