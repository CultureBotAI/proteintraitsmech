identifier: Pfam:PF09295
label: ChAPs (Chs5p-Arf1p-binding proteins)
definition: >-
  ChAPs (Chs5p-Arf1p-binding proteins) are required for the export of specialised cargo from the Golgi. They physically interact with Chs3, Chs5 and the small GTPase Arf1, and they also form interactions with each other.
