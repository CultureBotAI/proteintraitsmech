identifier: Pfam:PF24467
label: FBXO47, ARM repeats
definition: >-
  This is the C-terminal region of human F-box only protein 47 (FBXO47) and similar metazoan sequences. This region is predicted to consist of armadillo (ARM)-like repeats. The function of FBXO47 is not clear. It may play a role in carcinogenesis.
