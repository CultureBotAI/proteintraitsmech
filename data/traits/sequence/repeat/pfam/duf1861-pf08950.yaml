identifier: Pfam:PF08950
label: Protein of unknown function (DUF1861)
definition: >-
  This entry represents a group of proteins predominantly found in bacteria and in the eukaryote Leishmania, including a dual-activity mannosyltransferase/phosphorylases MTP-1 from Leishmania mexicana ( ). MTPs catalyse both the sugar nucleotide-dependent biosynthesis and phosphorolytic turnover of mannogen. These proteins are structurally related to bacterial mannan phosphorylases.
