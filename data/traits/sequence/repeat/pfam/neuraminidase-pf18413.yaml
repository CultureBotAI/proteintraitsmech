identifier: Pfam:PF18413
label: Neuraminidase-like domain
definition: >-
  This is a neuraminidase-like domain, which is structurally homologous to neuraminidases. It can be found in TcA subunit in tripartite Tc toxin complexes of bacterial pathogens. Functional analysis suggest that the neuraminidase-like domain acts as an electrostatic lock that opens at high or low pH values.
