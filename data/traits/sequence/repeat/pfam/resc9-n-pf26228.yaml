identifier: Pfam:PF26228
label: RESC9 N-terminal region
definition: >-
  This domain is found in the RNA-editing substrate-binding complex 9 protein (RESC9) from Trypanosoma brucei, a component of RESC which together with RECC forms the editosome that orchestrates guide RNA (gRNA)-programmed editing to recode cryptic mitochondrial transcripts into messenger RNAs. RESC stabilises gRNAs and engages mRNAs. The RNA-editing catalytic complex (RECC) fulfills gRNA-programmed mRNA cleavage, uridine insertion or deletion, and religation reactions. RESC is a heterogenous assembly of ~18 proteins that enclose gRNAs and mRNAs. RESC9 as several other RESC components is composed of HEAT repeats. RESC9 interacts with RESC11 and with mRNA.
