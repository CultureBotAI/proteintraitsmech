identifier: Pfam:PF07397
label: Repeat of unknown function (DUF1502)
definition: >-
  This family consists of a number of repeats of around 34 residues in length. Members of this family seem to be found in Talaromyces stipitatus and in Murid herpesvirus 4 (MuHV-4) proteins. The function of these repeats and the proetins in which they are found is unknown.
