identifier: Pfam:PF24520
label: KNTC1 first ARM-repeats domain
definition: >-
  This entry represents the first segment of ARM repeats present in KNTC1 (Kinetochore-associated protein 1, also known as ROD), following the β-propeller domain. KNTC1 is a crucial component of the mitotic checkpoint, ensuring cells do not exit mitosis prematurely. KNTC1 is required for the assembly of essential complexes onto kinetochores, such as dynein-dynactin and MAD1-MAD2. KNTC1 is the major subunit of the RZZ (ROD-Zwilch-ZW10) complex, which plays a significant role in spindle assembly, kinetochore-microtubule attachment, and spindle pole separation. This domain is also found in MAG2-interacting protein 2 which is required for proper maturation of seed storage proteins. It forms a complex with MAG2, ZW10/MIP1 and MIP3 on the endoplasmic reticulum that may be responsible for efficient transport of seed storage proteins.
