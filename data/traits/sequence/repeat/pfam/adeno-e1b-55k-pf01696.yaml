identifier: Pfam:PF01696
label: Adenovirus EB1 55K protein / large t-antigen
definition: >-
  This family consists of adenovirus E1B 55kDa protein or large t-antigen. E1B 55kDa binds p53 the tumor suppressor protein converting it from a transcriptional activator which responds to damaged DNA in to an unregulated repressor of genes with a p53 binding site. This protects the virus against p53 induced host antiviral responses and prevents apoptosis as induced by the adenovirus E1A protein. The E1B region of adenovirus encodes two proteins E1B 55kDa, the large t-antigen as found in this family and E1B 19kDa , the small t-antigen. Both of these proteins inhibit E1A induced apoptosis.
