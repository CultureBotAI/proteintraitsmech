identifier: Pfam:PF21029
label: Regulator of MON1-CCZ1 complex, N-terminal
definition: >-
  This entry represents the N-terminal β-propeller of Regulator of MON1-CCZ1 complex (RMC1) and similar eukaryotic proteins. RMC1 is a component of the the CCZ1-MON1 complex, which functions as a guanine exchange factor (GEF) for RAB7 during endocytic and autophagic flux to the lysosome. This region may function analogously to the WIPI proteins to bind phosphoinositides at the membrane.
