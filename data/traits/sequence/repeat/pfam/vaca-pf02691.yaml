identifier: Pfam:PF02691
label: Vacuolating cyotoxin beta-helical domain
definition: >-
  This entry represents the N-terminal domain of Vacuolating cyotoxin proteins (VacA), which adopts a right-handed parallel β-helix fold. VacA forms a hexamer that may correspond to the prepore-forming state, and this region may be responsible for the membrane insertion. Helicobacter pylori is a micro-aerophilic bacterium with the extraordinary ability to establish infections in human stomachs that can last for years or decades, despite immune and inflammatory responses and normal turnover of the gastric epithelium and overlying mucin layer in which it resides. Most H. pylori strains secrete a toxin (VacA) that induces multiple structural and functional alterations in eukaryotic cells. The most prominent effect of VacA is its capacity to induce the formation of large cytoplasmic vacuoles in eukaryotic cells. In addition, VacA interferes with the process of antigen presentation, increases permeability of polarised epithelial cell monolayers, and forms anion-selective membrane channels. Formation of channels in endosomal membranes of cells may be an important feature of the mechanism by which VacA induces cell vacuolation. H. pylori vacA encodes a ~139kDa protoxin, which undergoes cleavage of a 33-residue N-terminal signal sequence and C-terminal proteolytic processing to yield a mature secreted toxin. Purified VacA degrades during prolonged storage into two fragments (of ~34 and 58kDa), which are derived from the N-and the C terminus of the toxin respectively. The mass of the experimentally intact toxin (~88.2kDa) corresponds closely to the sum of the masses of the two proteolytic fragments. Secondary structure predictions suggest that a 35kDa portion of the VacA C-terminal domain is rich in amphipathic β-sheets, and this region exhibits low-level similarity to members of…
