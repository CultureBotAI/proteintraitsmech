identifier: Pfam:PF27525
label: LAM55 pectate lyase-like domain
definition: >-
  This entry represents the second domain in LAM55 (Exo-beta-1,3-glucanase). This domain contains a right-handed β helix, similar to that first found in pectate lyase. Members of this entry are mainly found in bacteria. Exo-beta-1,3-glucanase (SACTE_4363, ) specifically hydrolyses laminarin and laminarioligosaccharides, producing glucose and laminaribiose as end products. It hydrolyses beta-1,3-glucan bonds via inversion of stereochemistry at the anomeric carbon. Structural studies reveal an extended substrate-binding cleft with six or more subsites for sugar binding formed at the interface of two right-handed β-helical domains. They also give insight into residues that enforce an exolytic reaction, interactions that potentially support a processive hydrolysis of the bound oligosaccharide, and the ability of the enzyme to accommodate substrates with beta-1,6 branching. Mutation studies support a critical glutamate as a catalytic acid and a proton relay network that activates water to serve as the catalytic base.
