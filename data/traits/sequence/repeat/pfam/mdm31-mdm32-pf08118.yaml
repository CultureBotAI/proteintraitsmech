identifier: Pfam:PF08118
label: Yeast mitochondrial distribution and morphology (MDM) proteins
definition: >-
  Proteins in this family are yeast mitochondrial inner membrane proteins Mdm31 and Mdm32. They are required for the maintenance of mitochondrial morphology, and the stability of mitochondrial DNA. Mdm31 plays important roles in phospholipid biosynthesis in mitochondria.
