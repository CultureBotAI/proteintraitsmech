identifier: Pfam:PF10165
label: Guanine nucleotide exchange factor synembryn
definition: >-
  Ric8 (also known as Synembryn) is a chaperone that specifically binds and folds nascent G alpha proteins prior to G protein heterotrimer formation, promoting their stability and activity. It is involved in the regulation of the microtubule pulling forces during the mitotic movement of chromosomes and in the EGL-30 neurotransmitter signalling pathway. It is also a guanine nucleotide exchange factor that regulates neurotransmitter secretion.
