identifier: Pfam:PF10395
label: Utp8, N-terminal beta propeller
definition: >-
  This entry represents the N-terminal β-propeller of U3 small nucleolar RNA-associated protein 8 from Saccharomyces cerevisiae (Utp8) and similar proteins mainly found in ascomycetes. Utp8 is an essential component of the nuclear tRNA export machinery in S. cerevisiae. It is a tRNA-binding protein that acts at a step between tRNA maturation /aminoacylation, and translocation of the tRNA across the nuclear pore complex. It is also co-purified with the U3 snoRNA containing complex, the small subunit (SSU) processome, which is required for the biogenesis of the 18S rRNA. This entry also include the C1565.05 protein from Schizosaccharomyces pombe. Its function is not clear.
