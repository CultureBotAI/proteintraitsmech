identifier: Pfam:PF11145
label: Transmembrane E3 ligase/DUF2921 transmembrane domain
definition: >-
  This entry describes a domain of unknown function, which could adopt a similar fold to the SWEET-like (TM helices) domain. It was found in transmembrane E3 ubiquitin-proteins and members of the DSC E3 ubiquitin ligase complex. It is predominant in fungi and plants, including the FLY1/2 proteins from Arabidopsis thaliana, the DSC complex protein from Schizosaccharomyces pombe, and TUL1 from Saccharomyces cerevisiae. This domain hasn't been functionally characterised yet but it is formed by seven α-helices. The DSC E3 ubiquitin ligase complex, located in the Golgi and endosomes, identifies and ubiquitinates orphaned proteins with short transmembrane domains for degradation, maintaining membrane protein homeostasis. It includes subunits like Tul1 (E3 ligase) and Dsc2 (substrate recognition). The Transmembrane E3 ubiquitin-protein ligase FLY1, a plant homologue of Tul1, regulates pectin methyl esterification in seed mucilage, affecting cell wall properties and cell adhesion in Arabidopsis thaliana.
