identifier: Pfam:PF23914
label: Cytochrome c-type biogenesis protein H TPR domain
definition: >-
  This entry represents the TPR domain found in cytochrome c-type biogenesis proteins CcmH and CycH from bacteria. These proteins are membrane-anchored thiol-oxidoreductases that are essential in the maturation of c-type cytochromes. In the case of CycH, it has been hypothesised that this TPR domain interacts with other proteins in order to mediate the assembly of c-type cytochromes. This entry also represents a TPR domain found in other proteins such as NrfG, NrfF.
