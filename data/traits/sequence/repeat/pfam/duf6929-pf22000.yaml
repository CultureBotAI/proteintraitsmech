identifier: Pfam:PF22000
label: Family of unknown function (DUF6929)
definition: >-
  This is a family of uncharacterised bacterial proteins. They are predicted to fold into five-bladed β-propeller that has similarity to apyrase but it is circularly permuted. The C-terminal two β-strands of this domain occupy the position of the two N-terminal β-strands in apyrase.
