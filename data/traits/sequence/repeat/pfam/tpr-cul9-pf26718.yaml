identifier: Pfam:PF26718
label: Cullin-9-like, TPR repeats
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in human Cullin-9 (CUL9), Cullin-7 (CUL7) and similar proteins from vertebrates. CUL9 is a core component of a Cul9-RING ubiquitin-protein ligase complex composed of CUL9 and RBX1 mediates ubiquitination and subsequent degradation of BIRC5 and is required to maintain microtubule dynamics and genome integrity. CUL7 is a core component of the 3M and Cul7-RING(FBXW8) complexes, which mediate the ubiquitination and subsequent proteasomal degradation of target proteins. Cullins are a family of hydrophobic proteins that act as scaffolds for ubiquitin ligases (E3). Cullins are found throughout eukaryotes. Humans express several cullins (Cul1, 2, 3, 4A, 4B, 5, 7 and 9), each forming part of a multi-subunit ubiquitin complex. Cullin-RING ubiquitin ligases (CRLs), such as Cul1 (SCF), play an essential role in targeting proteins for ubiquitin-mediated destruction; as such, they are diverse in terms of composition and function, regulating many different processes from glucose sensing and DNA replication to limb patterning and circadian rhythms. The catalytic core of CRLs consists of a RING protein and a cullin family member. For Cul1, the C-terminal cullin-homology domain binds the RING protein. The RING protein appears to function as a docking site for ubiquitin-conjugating enzymes (E2s). Other proteins contain a cullin-homology domain, such as the APC2 subunit of the anaphase-promoting complex/cyclosome and the p53 cytoplasmic anchor PARC; both APC2 and PARC have ubiquitin ligase activity. The N-terminal region of cullins is more variable, and is used to interact with specific adaptor proteins.
