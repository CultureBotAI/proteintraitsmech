identifier: Pfam:PF18055
label: 26S proteasome regulatory subunit RPN6 N-terminal domain
definition: >-
  This is the N-terminal domain found in Rpn6 proteins (26S proteasome regulatory subunit). The 26S proteasome holocomplex consists of a 28-subunit barrel-shaped core particle (CP) in the centre capped at the top and bottom by 19-subunit regulatory particles (RPs). The CP forms the catalytic chamber and the RP is formed from two subcomplexes known as the lid and the base. The lid comprises nine Rpn subunits in yeast (Rpn3/5/6/7/8/9/11/12/15) and the base comprises three Rpn subunits (Rpn1/2/13) and six ATPases (Rpt1-6). Phosphorylation of Rpn6 enhances proteasome ATPase activity and promotes the formation of doubly capped (30S) proteasome, hence accelerating the degradation of short-lived proteins.
