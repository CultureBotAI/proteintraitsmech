identifier: Pfam:PF30196
label: WRM-1 armadillo protein C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Armadillo repeat-containing protein wrm-1 from Caenorhabditis species and related nematodes, involved in Wnt signalling pathways. The protein directly interacts with LIT-1 kinase and activates its kinase activity, leading to phosphorylation of transcription factor POP-1. WRM-1 proteins are components of the beta-catenin-lit-1 complex and play roles in asymmetric cell division and embryogenesis. The function of this domain remains to be determined.
