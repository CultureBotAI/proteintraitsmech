identifier: Pfam:PF30306
label: Mitochondrial 3' processome subunit 1 middle domain
definition: >-
  This entry represents the middle domain of mitochondrial 3' processome subunit 1 (MPSS1), found in kinetoplastid parasites of the family Trypanosomatidae including Trypanosoma and Leishmania species. MPSS1 is a component of the mitochondrial 3' processome (MPsome) complex, which also includes terminal uridylyltransferase KRET1, 3'-5' exonuclease DSS1, MPSS2 and MPSS3. The MPsome is involved in the maturation of guide RNA (gRNA) precursors in the mitochondrion. MPSS1 interacts directly with KRET1 within the complex.
