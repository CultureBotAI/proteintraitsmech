identifier: Pfam:PF11107
label: Fanconi anemia group F protein (FANCF)
definition: >-
  Fanconi anemia (FA) is a human disorder characterised by cancer susceptibility and cellular sensitivity to DNA crosslinks and other damages. The FA complex repairs the interstrand cross-linking (ICL) lesions and coordinates activities of the downstream DNA repair pathway including nucleotide excision repair, translesion synthesis, and homologous recombination. It is required for the monoubiquitylation of FANCD2 and FANCI heterodimer. The FA core complex consists of FANCA, FANCB, FANCC, FANCE, FANCF, FANCG, FANCL, FANCM, FANCT (UBET2), FAAP100 and FAAP24. Fanconi anemia group F protein (FANCF) is a component of the FA core complex. FANCF regulates its own expression by methylation at both mRNA and protein levels. Methylation-induced inactivation of FANCF has an important role on the occurrence of ovarian cancers by disrupting the FA-BRCA pathway. This entry also includes homologues from plants.
