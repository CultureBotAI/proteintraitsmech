identifier: Pfam:PF22422
label: Mannosylglycerate hydrolase MGH1-like glycoside hydrolase domain
definition: >-
  This entry represents the glycoside hydrolase domain found in Mannosylglycerate hydrolase MGH(1/2) from Selaginella moellendorffii, Glucosidase YgjK and similar sequences from bacteria and eukaryotes. MGH1 catalyses the hydrolysis of alpha-D-mannosyl-glycerate (MG) to D-glycerate and D-mannose. Glucosidase YgjK cleaves the alpha-1,3-glucosidic linkage in nigerose and has a very low activity towards maltooligosaccharides, soluble starch, nigerotriose, kojibiose and trehalose. This domain is also found in a complex multi-domain architecture in Beta-L-arabinobiosidase that removes L-arabinofuranose-beta-1,2-L-arabinofuranose disaccharide from various substrates such as carrot extensin and potato lectin. It also exists as a standalone domain in Glucosylglycerate hydrolase that catalyses the hydrolysis of glucosylglycerate to glycerate and glucose.
