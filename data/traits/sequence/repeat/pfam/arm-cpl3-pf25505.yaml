identifier: Pfam:PF25505
label: CPL3 ARM repeat domain
definition: >-
  This entry represents an ARM repeat in RNA polymerase II C-terminal domain phosphatase-like 3 (CPL3). Its precise function is unknown. CPL3 plays an important role in plant development and defence mechanisms of Arabidopsis thaliana. CPL3 acts as a negative regulator of immune gene expression and immunity to pathogen infections. It directly interacts with DELLA proteins, which are core suppressors in the gibberellic acid signalling pathway and promotes DELLA protein stability by inhibiting its degradation by the 26S proteasome.
