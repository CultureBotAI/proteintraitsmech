identifier: Pfam:PF30377
label: VPS35L C-terminal domain
definition: >-
  This entry represents the C-terminal domain of VPS35L (VPS35 endosomal protein-sorting factor-like) proteins found in metazoans. VPS35L is a component of the retriever complex, a heterotrimeric complex formed by VPS26C, VPS29 and VPS35L that is involved in endocytic recycling of cargo proteins. Mutations in human VPS35L cause Ritscher-Schinzel syndrome. The specific function of this C-terminal domain remains to be determined.
