identifier: Pfam:PF25781
label: TEX10-like, TPR repeats
definition: >-
  This is the C-terminal region of human Testis-expressed protein 10 (TEX10), which consists of tetratricopeptide (TPR)-like repeats. TEX10 functions as a component of the Five Friends of Methylated Chtop complex, which can only be recruited when Chtop is arginine-methylated leading to transactivation of ZNF148 target genes.
