identifier: Pfam:PF28655
label: SUV2 C-terminal domain
definition: >-
  This entry represents the C-terminal TPR domain of the SUV2 protein found in plants. The specific function of this C-terminal domain remains to be determined. SUV2 is a DNA damage response protein required for tolerance to various DNA-damaging agents and cell cycle checkpoint control. The full-length protein contains a nuclear localisation signal and coiled-coil region in this N-terminal domain, followed by a C-terminal phosphatase tensin-type domain. SUV2 functions in G2/M cell cycle arrest in response to DNA damage and aluminium-dependent root growth inhibition.
