identifier: Pfam:PF13306
label: BspA type Leucine rich repeat region (6 copies)
definition: >-
  This entry represents a leucine rich repeat. A leucine-rich repeat (LRR) is a protein structural motif that forms an α/β horseshoe fold. Leucine-rich repeats are frequently involved in the formation of protein protein interactions. This repeat is found in Follicle-stimulating hormone receptors (Fshr), Thyrotropin receptors, Lutropin-choriogonadotropic hormone receptor and related proteins. Fshr are G protein-coupled receptors for follitropin, the follicle-stimulating hormone. Through cAMP production it activates the downstream PI3K-AKT and ERK1/ERK2 signaling pathways. This repeat is found in a large number of BSPA-like surface antigens from Trichomonas vaginalis.
