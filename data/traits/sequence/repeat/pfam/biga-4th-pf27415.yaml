identifier: Pfam:PF27415
label: BigA fourth domain
definition: >-
  This entry represents the fourth domain of BigA autotransporter proteins found in Salmonella and related Enterobacteriaceae. BigA is a large surface-exposed virulence protein of approximately 1953 amino acids that contains an autotransporter domain and multiple repeats. This fourth domain adopts a pectate lyase-like fold, a parallel β-helix structure. BigA proteins are predominantly found in gamma and betaproteobacteria. The specific function of this domain remains to be determined. BigA is an autotransporter protein characterised by a C-terminal outer membrane barrel ( ) that facilitates the transport of its passenger domain across the membrane. The N-terminal region contains a variable passenger domain, which is translocated through the barrel. After export, the passenger domain may undergo auto-catalytic cleavage, cleavage by an external protease, or remain uncleaved, depending on the specific protein.
