identifier: Pfam:PF13570
label: Beta-alanine-activating enzyme, beta-propeller
definition: >-
  This entry represents a β-propeller composed of the so-called PQQ repeats and found in a group of functionally diverse proteins. Pyrrolo-quinoline quinone (PQQ) is a redox coenzyme, which serves as a cofactor for a number of enzymes (quinoproteins) and particularly for some bacterial dehydrogenases. A number of bacterial quinoproteins belong to this family. Enzymes in this group contain repeats composing a β propeller.
