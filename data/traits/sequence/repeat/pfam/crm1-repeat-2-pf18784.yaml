identifier: Pfam:PF18784
label: CRM1 / Exportin repeat 2
definition: >-
  Exportin 1 (Exp1) mediates the nuclear transport of proteins bearing a leucin-rich nuclear export signal (NES). It contains helical repeats that are structurally similar to HEAT repeats, but share little sequence similarity with them. N-, C-terminal and central repeats show slightly different structural arrangements, with N- and C- terminal repeats interacting with each other.
