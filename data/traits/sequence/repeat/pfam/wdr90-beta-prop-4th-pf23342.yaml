identifier: Pfam:PF23342
label: WDR90, 4th beta-propeller
definition: >-
  This entry represents the fourth β-propeller domain found in WD repeat-containing protein 90 from mouse and human. WDR90 proteins constitute an evolutionary conserved central core microtubule triplet component that is essential for maintaining the inner centriolar scaffold components in centrioles. This entry also includes Cilia- and flagella-associated protein 52 from Chlamydomonas reinhardtii which may play a role in cell growth and/or survival.
