identifier: Pfam:PF04090
label: RNA polymerase I-specific transcription initiation factor Rrn11
definition: >-
  The RNA polymerase I specific transcription initiation factor Rrn11 is a member of a multiprotein complex essential for the initiation of transcription by RNA polymerase I, together with Rrn6 and Rrn7 subunits. Binding to the DNA template is dependent on the initial binding of other factors. Rrn11 contains a tetratricopeptide repeats (TPRs) and interacts with Rrn6 and Rrn7 to form the core factor (CF), which resembles a right hand holding the DNA molecule between the fingers and the palm. The palm is composed of the N-terminal regions of both Rrn11 and Rrn6, the thumb is composed of the C-terminal of Rrn11, and the fingers and knuckles are composed of Rrn7 and the C-terminal half of Rrn6, respectively. This entry represents a conserved region of Rrn11 from fungi.
