identifier: Pfam:PF02420
label: Insect antifreeze protein repeat
definition: >-
  Antifreeze proteins (AFPs) are a class of proteins that are able to bind to and inhibit the growth of macromolecular ice, thereby permitting an organism to survive subzero temperatures by decreasing the probability of ice nucleation in their bodies. These proteins have been characterised from a variety of organisms, including fish, plants, bacteria, fungi and arthropods. This entry represents insect AFPs of the type found in Tenebrio molitor (Yellow mealworm) and in Dendroides canadensis (Pyrochroid beetle). This entry includes Thermal hysteresis protein YL-1 (ANPY1), a protein that contributes to protect body fluid from freezing at subzero temperatures. It lowers the freezing point of the hemolymph by about 2.5 degrees at a concentration of 1 mg/ml. This protein binds to nascent ice crystals and prevents further growth. The structure of these AFPs consists of a right-handed β-helix with 12 residues per coil. Each 12 residue-repeat contains two cys residues that form a disulphide bridge. The β-helices of insect AFPs present a highly rigid array of threonine residues and bound water molecules that can effectively mimic the ice lattice. As such, β-helical AFPs provide a more effective coverage of the ice surface compared to the α-helical fish AFPs. A second insect antifreeze from Choristoneura fumiferana (Spruce budworm) ( ) also consists of β-helices, however in these proteins the helices form a left-handed twist; these proteins show no sequence homology to the current entry, but may act by a similar mechanism. The β-helix motif may be used as an AFP structural motif in non-homologous proteins from other (non-fish) organisms as well.
