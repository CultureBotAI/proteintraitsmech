identifier: Pfam:PF01473
label: Putative cell wall binding repeat
definition: >-
  This entry describes a region of about 63 amino acids that is composed of three repeats of a more broadly distributed family of shorter repeats represented by . While the shorter repeats are often associated with choline binding (and therefore with cell wall binding), the longer repeat described here represents a subgroup of repeat sequences associated with glucan binding, as found in a number glycosylhydrolases. A repeat consensus, WYYFDANGKAVTGAQTINGQTLYFDQDGKQVKG, has been described that corresponds to half of the repeat as modeled here and one and a half copies of the repeat as modeled by .
