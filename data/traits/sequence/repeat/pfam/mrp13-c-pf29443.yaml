identifier: Pfam:PF29443
label: MRP13-like C-terminal domain
definition: >-
  This entry represents the C-terminal TPR repeats region of MRP13 and related mitochondrial ribosomal yeast proteins. MRP13 is a component of the small ribosomal subunit (mS27) of the mitochondrial ribosome. The specific function of this region remains to be determined.
