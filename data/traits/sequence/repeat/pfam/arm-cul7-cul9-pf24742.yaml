identifier: Pfam:PF24742
label: CUL7/CUL9 ARM repeat domain
definition: >-
  This domain is found in human Cillin-7 (CUL7), Cullin-9 (CUL9) and related proteins. CUL7 is a core component of the 3M and Cul7-RING(FBXW8) complexes, which mediates the ubiquitination of target proteins. CUL9, a core component of the Cul9-RING ubiquitin-protein ligase complex, acts downstream of the 3M complex, which inhibits the CUL9 activity, leading to prevent ubiquitination of BIRC5. This domain is composed of ARM repeats.
