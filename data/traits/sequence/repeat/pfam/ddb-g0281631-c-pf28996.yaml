identifier: Pfam:PF28996
label: DDB_G0281631 C-terminal domain
definition: >-
  This entry represents the C-terminal TPR domain of UPF0746 family proteins found in Dictyostelium and related amoebozoans. UPF0746 proteins are classified as being involved in actin organisation and show similarity to ankyrin repeat-containing proteins. They are found primarily in social amoebae. The proteins may represent pseudogenes in some cases. The specific function of this domain remains to be determined.
