identifier: Pfam:PF27812
label: PEX8 central TPR-like domain
definition: >-
  This entry represents a TPR-like domain found in PEX8 and related eukaryotic peroxisomal membrane proteins. PEX8 proteins are essential components of the machinery required for the import of peroxisomal matrix proteins. PEX8 binding to the N-terminal region of the PEX5 cargo receptor induces conformational changes in the TPR domains, decreasing their binding affinity to cargo and facilitating the release of PTS1 proteins within the peroxisome. The specific function of this TPR-like region remains to be determined.
