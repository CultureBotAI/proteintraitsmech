identifier: Pfam:PF07817
label: GLE1-like protein
definition: >-
  This family includes human protein GLE1 ( ) and its homologues. This protein is localised at the nuclear pore complexes and functions in poly(A)+ RNA export to the cytoplasm. In Arabidopsis, it is required for seed viability.
