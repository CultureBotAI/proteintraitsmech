identifier: Pfam:PF29252
label: NLRC4 LRR domain
definition: >-
  This domain represents the LRR domain found at the C-terminal of human NLR family CARD domain-containing protein 4 (NLRC4) and related proteins. NLRC4 is a key component of inflammasomes that indirectly senses specific proteins from pathogenic bacteria and fungi and responds by assembling an inflammasome complex that promotes caspase-1 activation, cytokine production and macrophage pyroptosis.
