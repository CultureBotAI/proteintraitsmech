identifier: Pfam:PF24575
label: Surface lipoprotein assembly modifier, N-terminal TPR repeats
definition: >-
  This is a region of tetratricopeptide repeats (TPR) found at the N-terminal of Surface lipoprotein assembly modifier from the proteobacteria Pasteurella multocida (Slam) and similar sequences. Slam plays a role in the export to the cell surface of some cell outer membrane lipoproteins. This domain is usually found N-terminal to .
