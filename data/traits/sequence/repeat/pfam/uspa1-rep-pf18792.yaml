identifier: Pfam:PF18792
label: Ubiquitous surface protein adhesin repeat
definition: >-
  The UspA1 head domain is globally similar to other structures of TAA head domains and comprises a trimeric left-handed parallel β-roll, which is formed from 14 repeating 14-16 residue segments that form a ladder of β-strand coils. This entry represents a single repeat unit of the β-ladder.
