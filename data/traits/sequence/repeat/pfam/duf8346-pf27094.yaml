identifier: Pfam:PF27094
label: Domain of unknown function (DUF8346)
definition: >-
  This entry represents a Leucine Rich domain in uncharacterised proteins mainly from animals. Each Leucine Rich Repeat is composed of a beta-alpha unit. These units form elongated non-globular structures. Leucine Rich Repeats are often flanked by cysteine rich domains.
