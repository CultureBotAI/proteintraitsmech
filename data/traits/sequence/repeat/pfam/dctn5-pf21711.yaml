identifier: Pfam:PF21711
label: Dynactin subunit 5
definition: >-
  This family includes dynactin 5 (DCTN5, also known as subunit p25). Dynactin is a major component of the activator complex that stimulates dynein-mediated vesicle transport. Dynactin is a heterocomplex of at least eight subunits, including a 150,000-MW protein called Glued, the actin-capping protein Arp1, and dynamatin. In vitro binding experiments show that dynactin enhances dynein-dependent motility, possibly through interaction with microtubules and vesicles. DCTN5 is part of the pointed-end subcomplex in dynactin that also includes p26, p27 (also known as dynactin 6), and Arp11. This subcomplex interacts with membranous cargoes. DCTN5 plays a dual role in cargo binding and dynactin regulation, being critical for this process. DCTN5 contains imperfect tandem repeats of a hexapeptide repeat motif (X-[STAV]-X-[LIV]-[GAED]-X), indicating a left-handed parallel β-helix (LbH) structural domain. Proteins containing hexapeptide repeats are often enzymes showing acyltransferase activity.
