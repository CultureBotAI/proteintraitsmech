identifier: Pfam:PF30993
label: CABIN1 N-terminal domain
definition: >-
  This entry represents the N-terminal TPR-containing domain of human calcineurin-binding protein 1 (CABIN1) and similar proteins mainly found in animals and plants. CABIN1 is a component of the HIRA complex, which also includes UBN1, UBN2, ASF1A and HIRA. The HIRA complex is involved in replication-independent chromatin assembly and deposition of histone H3.3. CABIN1 proteins contain multiple TPR repeats. Some members of this group, such as plant Calcineurin-binding protein 1, also show an HIR3_bundle domain ( ).
