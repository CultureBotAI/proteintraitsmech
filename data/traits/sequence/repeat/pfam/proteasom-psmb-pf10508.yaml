identifier: Pfam:PF10508
label: Proteasome non-ATPase 26S subunit
definition: >-
  The 26S proteasome is an enzymatic complex that degrades ubiquitinated proteins in eukaryotic cells. 26S proteasome non-ATPase regulatory subunit 5 (PSMD5) is one of a number of chaperones that are involved in the assembly of the proteasome. The chaperones dissociate before 26S proteasome formation is complete. TNF-alpha/NFkB inhibits 26S proteasome assembly via abnormal expression of PSMD5, establishing a link between inflammation and chronic neurodegenerative diseases with altered ubiquitin-proteasome system function.
