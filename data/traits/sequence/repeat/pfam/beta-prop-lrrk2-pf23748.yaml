identifier: Pfam:PF23748
label: LRRK2 beta propeller
definition: >-
  This entry represents the β-propeller found at the C-terminal end of the Leucine-rich repeat serine/threonine-protein kinase 2 (LRRK2) from eukaryotes. The β-propeller domain is suggested to mediate LRRK2 dimerisation and autophosphorylation, and plays an important role in neurotoxicity associated to LRRK2 PD mutations. LRRK2 is a serine/threonine-protein kinase which phosphorylates a broad range of proteins involved in multiple processes such as neuronal plasticity, primary ciliogenesis, autophagy, and vesicle trafficking. Mutations in LRRK2 are the most common genetic cause of Parkinson's disease. LRRK2 phosphorylates a group of Rab GTPase proteins, including Rab29.
