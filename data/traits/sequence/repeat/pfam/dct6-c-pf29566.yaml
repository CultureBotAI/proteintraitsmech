identifier: Pfam:PF29566
label: DCT6 C-terminal domain
definition: >-
  This entry represents the C-terminal β-propeller domain found in DCT6 proteins. DCT6 (Daf-16/foxo controlled, germline tumour-affecting protein 6) may have a role in tumour suppression. The domain is found in nematodes including Caenorhabditis elegans and Caenorhabditis briggsae. DCT6 proteins are controlled by the DAF-16/FOXO transcription factor pathway. The specific function of this domain remains to be determined.
