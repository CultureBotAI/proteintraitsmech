identifier: Pfam:PF00064
label: Neuraminidase
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 34 comprises enzymes with only one known activity; sialidase or neuraminidase . Neuraminidases cleave the terminal sialic acid residues from carbohydrate chains in glycoproteins. Sialic acid is a negatively charged sugar associated with the protein and lipid portions of lipoproteins. In Influenza virus, neuraminidases prevent self-aggregation by removing the carbohydrate from the viral envelope thus facilitating the mobility of the virus to and from the site of infection. Antiviral agents that inhibit influenza viral neuraminidase activity are of major importance in the control of influenza.
