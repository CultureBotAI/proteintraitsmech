identifier: Pfam:PF20655
label: Vps52, C-terminal
definition: >-
  Vps52 complexes with Vps53 and Vps54 to form the Golgi-associated retrograde protein (GARP) complex that is involved in retrograde transport from early and late endosomes to the trans-Golgi network, regulating membrane trafficking events. It is also part of EARP (Endosome-Associated Recycling Protein) complex, involved in endocytic recycling. This entry represents the C-terminal domain of Vps52, which consists of α-helical bundles, conserved among subunits of other multisubunit tethering complexes (MTC) such as conserved oligomeric Golgi (COG), Dsl1 and the exocyst, all belong to a family of evolutionarily conserved complexes associated with tethering containing helical rods (CATCHR). This domain may interact with the small GTPase Ypt6p/Rab6.
