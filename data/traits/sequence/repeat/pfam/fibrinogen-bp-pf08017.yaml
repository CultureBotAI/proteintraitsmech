identifier: Pfam:PF08017
label: 'Fibrinogen binding protein '
definition: >-
  Proteins in this family bind to fibrinogen. Fibrinogen is capable of binding to a wide number of endogenous proteins and cell receptors during haemostasis, including binding to platelets to promote their aggregation. Included in this family is receptor FbsA ( ) from the pathogen Streptococcus agalactiae, which is responsible for causing endocarditis in humans. FbsA is considered an important virulence factor that is capable of binding fibrinogen, through which it elicits platelet aggregation and adherence to the extracellular matrix. This enables the bacteria to invade the pulmonary epithelium, which may be a prerequisite for infection.
