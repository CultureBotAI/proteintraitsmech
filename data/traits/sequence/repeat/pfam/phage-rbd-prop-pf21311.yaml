identifier: Pfam:PF21311
label: Phage 5-bladed beta propeller receptor binding platform domain
definition: >-
  This entry represents the β-propeller receptor binding domain of a variety of bacteriophages, including the Staphylococcus aureus phage P68. The cell wall of S. aureus typically contains poly-ribitol phosphate type wall teichoic acid (WTA), which is modified with D-alanine and N-acetyl-glucosamine (GlcNAc). It has been shown that phage psi11 requires GlcNAc residues on WTA for adsorption. Gp45 of phage psi11 was identified and characterised as the receptor-binding protein (RBP). This domain has been suggested to bind to the GlcNAc substrate. This domain can also be found within a group of bacterial proteins that have been associated with the synthesis of teichoic acid, including TagC from Bacillus subtilis ( ), although its involvement in this process is not clear. Some uncharacterised proteins from lower eukaryotes are also included in this entry.
