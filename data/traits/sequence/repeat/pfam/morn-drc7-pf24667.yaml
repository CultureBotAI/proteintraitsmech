identifier: Pfam:PF24667
label: Dynein regulatory complex subunit 7 MORN domain
definition: >-
  Dynein regulatory complex subunit 7 (DRC7) is a component of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary/flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. In humans, defective ciliary motility can lead to male infertility and a congenital disorder called primary ciliary dyskinesia (PCD), in which impaired clearance of mucus by the cilia causes chronic respiratory infections. This entry represents the MORN-repeats domain.
