identifier: Pfam:PF10091
label: Putative glucoamylase
definition: >-
  This domain adopts an α/α toroid fold, structurally similar to a number of glucoamylases (GH family 15 and 8 enzymes). This domain is also found in some hydrolases, such as ndvB from family and members of the family which includes beta-1,2-glucanases from Parabacteroides distasonis (also known as exo beta-1,2-glucooligosaccharide sophorohydrolase, ) and from Chitinophaga pinensis which hydrolyse linear beta-1,2-glucan (a polysaccharide from Gram-negative bacteria, with important roles in infection and symbiosis).
