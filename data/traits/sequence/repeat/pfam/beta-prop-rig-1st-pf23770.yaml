identifier: Pfam:PF23770
label: RIG first beta-propeller
definition: >-
  This entry represents the first β-propeller found at the N-terminal of Protein rigor mortis (RIG) from Drosophila melanogaster, also known as Gem-associated protein 5 (GEMI5), the orthologue of GEMI5 from vertebrates. RIG, apart from being a component of the survival motor neuron (SMN) complex, it is a nuclear receptor-interacting protein required for the response to steroid hormone ecdysone during larval development. GEMI5 is a component of the survival of motor neurons (SMN) complex, that binds small nuclear RNAs (snRNAs). The SMN complex assembles the heptameric Sm protein core on snRNAs playing a critical role in the biogenesis of small nuclear ribonucleoproteins (snRNPs). GEMI5 is also implicated in translation control, and gene expression reprogramming. GEMI5 from animals share a domain architecture consisting of two N-terminal β-propellers followed by a TPR domain and a C-terminal RNA-binding domain.
