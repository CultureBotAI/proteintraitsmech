identifier: Pfam:PF13885
label: Keratin, high sulfur B2 protein
definition: >-
  Keratin-associated proteins (KAPs) are cysteine-rich proteins synthesized during the differentiation of hair matrix cells, and form hair fibres in association with hair keratin intermediate filaments. This entry also includes the high-sulfur and high-tyrosine keratins from sheep and goats. In the hair cortex, hair keratin intermediate filaments are embedded in an interfilamentous matrix, consisting of hair keratin-associated proteins, which are essential for the formation of a rigid and resistant hair shaft through their extensive disulfide bond cross-linking with abundant cysteine residues of hair keratins. The matrix proteins include the high-sulfur and high-glycine-tyrosine keratins. This family has been divided up into four regions, with the second region containing 8 copies of a short repeat.
