identifier: Pfam:PF06433
label: Methylamine dehydrogenase heavy chain (MADH)
definition: >-
  This entry represents a group of bacterial amine dehydrogenase heavy chains. They include methylamine and arylamine dehydrogenase heavy chains, which form heterotetramers with their respective light chains, and catalyse the oxidative deamination of amines to their corresponding aldehydes.
