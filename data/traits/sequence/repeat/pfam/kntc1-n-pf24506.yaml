identifier: Pfam:PF24506
label: KNTC1, N-terminal
definition: >-
  This entry represents the β-propeller domain found at the N-terminal of KNTC1 (Kinetochore-associated protein 1, also known as ROD) from vertebrates. KNTC1 is the major subunit of the RZZ (ROD-Zwilch-ZW10) complex, which plays a significant role in spindle assembly, kinetochore-microtubule attachment, and spindle pole separation. KNTC1 is required for the assembly of essential complexes onto kinetochores, including dynein-dynactin and MAD1-MAD2. This domain mediates extensive interactions with the other subunits of the complex, forming a RZZ module that binds Spindly, a DD adaptor that can activate dynein motility.
