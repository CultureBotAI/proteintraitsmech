identifier: Pfam:PF27483
label: AlgK tetratricopeptide repeat domain
definition: >-
  This entry represents the middle domain found in AlgK. This domain adopts a TPR-like helical structure and belongs to the SEL superfamily. Members of this entry are found predominantly in Pseudomonas species. The specific function of this TPR domain remains to be determined. AlgK is an alginate biosynthesis protein involved in the polymerisation of mannuronate to alginate. AlgK is a lipoprotein localised to the periplasmic side of the cell outer membrane and interacts with AlgX in a multiprotein complex.
