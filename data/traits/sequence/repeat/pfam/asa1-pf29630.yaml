identifier: Pfam:PF29630
label: ASTRA-associated protein 1
definition: >-
  This entry represents the ASA1 family of proteins found in fungi. ASA1 is a component of the ASTRA complex involved in chromatin remodelling. The protein is localised to the nucleus and contains multiple WD40 repeats that form a β-propeller structure. The WD40 repeats are characteristic structural motifs that facilitate protein-protein interactions. ASA1 functions as part of the ASTRA chromatin remodelling machinery complex.
