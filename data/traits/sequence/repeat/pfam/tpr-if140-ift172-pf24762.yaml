identifier: Pfam:PF24762
label: IF140/IFT172 TPR domain
definition: >-
  This entry represents the TPR region of IFT140/IFT172/WDR19 and similar proteins. IFT172 is a component of the IFT-B complex which interacts with IFT-A complex. This domain of IFT140 forms an interface with IFT144. IFT140 is one of the core components (together with WDR19/IFT144 and IFT122) of the IFT-A complex which is required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors (GPCRs), being involved in cilia function and/or assembly. IFT-A polymerises interacts with IFT-B, and uses an array of β-propeller and TPR domains to create 'carriages' of the IFT train that engage TULP adaptor proteins. The β-propeller domains of IFT140 contact the β-propeller domains of IFT121 from the adjacent complex.
