identifier: Pfam:PF23356
label: PEP5/VPS11 Clathrin repeat
definition: >-
  This entry represents the clathrin heavy-chain repeat (CHCR) repeat found in Pep5-like zinc finger protein from Schizosaccharomyces pombe (also known as Vps11) and its ortologues from human, mouse and A. thaliana Vacuolar protein sorting-associated protein 11 (VPS11). Vacuolar protein sorting protein 11 (vps11) aggregates with other Vps proteins to form the homotypic fusion and protein sorting complex (HOPS), which promotes the fusion of late endosomes and autophagosomes with lysosomes. Pep5 (also known as Vps11) was initially isolated as a protease deficient mutant and shown to be involved in protein trafficking and vacuole biogenesis pathways. Clathrin is a triskelion-shaped cytoplasmic protein that polymerises into a polyhedral lattice on intracellular membranes to form protein-coated membrane vesicles. Lattice formation induces the sorting of membrane proteins during endocytosis and organelle biogenesis by interacting with membrane-associated adaptor molecules. Clathrin functions as a trimer, and these trimers, or triskelions, are comprised of three legs joined by a central vertex. Each leg consists of one heavy chain and one light chain. The clathrin heavy-chain contains a 145-residue repeat that is present in seven copies. The clathrin heavy-chain repeat (CHCR) is also found in nonclathrin proteins such as Pep3, Pep5, Vam6, Vps41, Vps8 from Saccharomyces cerevisiae and their orthologues from other eukaryotes such as Vps11 in zebra fish. These proteins, like clathrins, are involved in vacuolar maintenance and protein sorting. The CHCR repeats in these proteins could mediate protein-protein interactions, or possibly represent clathrin-binding domains, or perform clathrin-like functions. CHCR repeats in the clathrin heavy chain, Saccharomyces cerevisiae Vamp2 and hu…
