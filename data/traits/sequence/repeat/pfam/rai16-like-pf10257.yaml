identifier: Pfam:PF10257
label: Retinoic acid induced 16-like protein
definition: >-
  This entry represents FHF complex subunit HOOK interacting proteins (FHIP, also known as FAM160) found in metazoa and fungi, which are components of the FTS/Hook/FHIP complex (FHF complex). The FHF complex may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting complex (the HOPS complex). FHF complex promotes the distribution of AP-4 complex to the perinuclear area of the cell. FHIP2A (FAM160B1) is required for proper functioning of the nervous system. FHIP2B, previously described as retinoic acid-induced protein 16, is able to activate MAPK/ERK and TGFB signalling pathways and may play a role in cell proliferation.
