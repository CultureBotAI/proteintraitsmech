identifier: Pfam:PF30357
label: RAB11-binding protein RELCH N-terminal domain
definition: >-
  This entry represents a middle domain of the RAB11-binding protein RELCH (also known as KIAA1468). RELCH is found in metazoans and plants and contains a LisH domain, coiled-coil regions, and HEAT repeats. The full-length RELCH protein regulates intracellular cholesterol distribution from recycling endosomes to the trans-Golgi network through interactions with RAB11 and OSBP. The specific function of this domain, which consists of HEAT repeats, remains to be determined.
