identifier: Pfam:PF03083
label: Sugar efflux transporter for intercellular exchange
definition: >-
  This entry includes Sugar Will Eventually be Exported Transporters (SWEETs) which are specific sugar efflux transporters essential for the maintenance of animal blood glucose levels, plant nectar production, and plant seed and pollen development. They can carry mono- and disaccharides across a membrane following the concentration gradient. In many organisms it mediates glucose transport; in Arabidopsis it is necessary for pollen viability; and two of the rice homologues are specifically exploited by bacterial pathogens for virulence by means of direct binding of a bacterial effector to the SWEET promoter. Homologues of SWEETs have been identified in bacteria. The founding member of the SWEET family, formerly known as MtN3 and saliva in Drosophila, was identified as a nodulin-specific EST in the legume Medicago truncatula. Human SWEET1 is also known as RAG1-activating protein 1 as it has been described to be involved in activation and expression of recombination activation genes (RAGs).
