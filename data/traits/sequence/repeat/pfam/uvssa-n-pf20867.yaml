identifier: Pfam:PF20867
label: UVSSA N-terminal domain
definition: >-
  This entry represents the N-terminal set of alpha solenoid repeats found in UV-stimulated scaffold protein A (UVSSA) and related proteins from eukaryotes. UVSSA is involved in transcription-coupled nucleotide excision repair, a mechanism that rapidly removes RNA polymerase II-blocking lesions from the transcribed strand of active genes.
