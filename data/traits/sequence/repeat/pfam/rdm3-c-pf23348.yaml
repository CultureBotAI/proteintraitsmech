identifier: Pfam:PF23348
label: RDM3 beta-solenoid
definition: >-
  This entry represents a β-solenoid domain found at the C-terminal region of Protein RNA-directed DNA methylation 3 (RDM3) from Arabidopsis thaliana and similar proteins from plants. This entry also includes putative helicases from bacteria. RNA-directed DNA methylation (RdDM) initiates and re-establishes silencing of transposable elements through de novo methylation of cytosines.
