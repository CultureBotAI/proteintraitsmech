identifier: Pfam:PF30314
label: TP013X lipoprotein family
definition: >-
  This entry represents the TP013X lipoprotein family, a group of uncharacterised lipoproteins of approximately 376-485 amino acids found in Treponema species. Members include TP_0133, TP_0134, TP_0136, and TP_0462/TP_0463 from Treponema pallidum. The proteins are predicted to be lipid-anchored to the cell membrane. The function of this protein family remains to be determined.
