identifier: Pfam:PF30195
label: WRM-1 armadillo protein N-terminal domain
definition: >-
  This entry represents the N-terminal TPR-like region of WRM-1 armadillo proteins. This domain is found in beta-catenin-like proteins from Caenorhabditis nematodes involved in Wnt signalling pathways. The domain directly interacts with LIT-1 kinase and activates its kinase activity, leading to phosphorylation of transcription factor POP-1. WRM-1 proteins are components of the beta-catenin-lit-1 complex and play roles in asymmetric cell division and embryogenesis. The function of this domain remains to be determined.
