identifier: Pfam:PF22063
label: Pdc1 Ge1 domain
definition: >-
  This entry represents the Ge1 domain of Pdc1 from S.pombe. Pdc1 is known to be related to metazoan Edc4 (also known asGe-1) family, although the sequence similarity is very low. EDC4 (enhancer of mRNA-decapping protein 4) is a regulator of mRNA decapping in cytoplasmic processing bodies (P-bodies).
