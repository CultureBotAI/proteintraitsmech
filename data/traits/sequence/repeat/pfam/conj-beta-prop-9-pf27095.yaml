identifier: Pfam:PF27095
label: Conjugation-associated 9-bladed beta-propeller domain
definition: >-
  This entry represents a domain which is predicted to fold into a nine-bladed distorted β-propeller and found in proteins involved in bacterial DNA conjugation. In this conjugation system, the 9-bladed architecture likely provides multiple binding surfaces for interactions with other conjugation machinery components or with the incoming DNA. The prototype member, D806_5234 from Mycolicibacterium smegmatis strain MKD8, is a 481 amino acid membrane protein essential for DNA conjugation in recipient strains. The protein contains an N-terminal transmembrane helix (residues 18-38) that anchors it to the inner membrane, followed by this large extracytoplasmic β-propeller domain. This protein is part of a recipient strain-specific genomic insert (RSR-II) that distinguishes recipient strains like MKD8 from donor strains like mc(2)155 in the unidirectional M. smegmatis conjugation system. Disruption of this protein abolishes DNA conjugation ability in recipient strains without affecting ESX-1 secretion, suggesting a specific role in DNA uptake or processing during conjugation.
