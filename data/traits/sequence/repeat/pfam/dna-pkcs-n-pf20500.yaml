identifier: Pfam:PF20500
label: DNA-PKcs, N-terminal
definition: >-
  This entry represents the N-terminal domain of DNA-dependent protein kinase catalytic subunit (DNA-PKcs), which is arranged in four supersecondary α-helical structures, N1 to N4, that resemble HEAT repeats. Therefore, this domain is also known as N-HEAT. This domain likely mediates DNA binding and, together with the Circular Cradle (CC), forms a ring through which Ku70/80 may present DNA for repair. DNA-PKcs is involved in DNA nonhomologous end joining (NHEJ), required for double-strand break (DSB) repair. It is recruited by Ku70/80 heterodimer to DNA ends.
