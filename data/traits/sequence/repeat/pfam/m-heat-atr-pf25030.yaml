identifier: Pfam:PF25030
label: Serine/threonine-protein kinase ATR, M-HEAT region
definition: >-
  This region of HEAT repeats is found in human Serine/threonine-protein kinase ATR and similar eukaryotic proteins. This entry represents the M-HEAT region. This region is also found in Serine/threonine-protein kinase MEC1 from Saccharomyces cerevisiae, which activates checkpoint signalling upon genotoxic stresses such as ionizing radiation (IR), ultraviolet light (UV), or DNA replication stalling, thereby acting as a DNA damage sensor. ATR acts as a DNA damage sensor and is associated with severe disorders such as Seckel syndrome 1. This protein is organised into a large N-terminal α-solenoid containing HEAT repeats, a FAT (FRAP, ATM, TRRAP) domain ( ), a kinase domain ( ), and a C-terminal short segment referred to as FATC ( ). N-terminal part has two continuous HEAT repeat regions, the N-HEAT and the M-HEAT. The FAT domain contains TPR (tetratricopeptide) repeats followed by a HEAT repeat domain.
