identifier: Pfam:PF20770
label: PAN2 N-terminal
definition: >-
  This entry represents the N-terminal domain of PAN2 and similar sequences predominantly found in animal and fungi. This domain, the assembly unit, engages in a bipartite interaction with PAN3 dimers. The poly(A)-specific nuclease (PAN) is a deadenylating enzyme involved in cytoplasmic mRNA turnover consisting of two subunits, PAN2 and PAN3 that form a conserved complex which acts in the initial trimming of poly(A) tails during deadenylation, followed by the processive activity of CCR4-NOT complex. PAN2 has two independent structural units, the C-terminal catalytic unit (including and ) and the N-terminal assembly unit. This assembly unit contains a WD40 propeller that contacts the PAN3 C-terminal domain and it is connected to an adaptable linker which reinforces the asymmetry of the PAN3 dimer preventing the recruitment of a second PAN2 molecule.
