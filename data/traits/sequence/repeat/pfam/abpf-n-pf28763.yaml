identifier: Pfam:PF28763
label: Actin-binding protein F N-terminal domain
definition: >-
  This entry represents the N-terminal domain of actin-binding protein F found in Dictyostelium discoideum. The full-length protein interacts with actin and is localised to both the nucleus and cytoskeleton, particularly at the centrosome. Actin-binding protein F is a large protein that plays a role in cytoskeletal organisation and cellular structure. The protein contains multiple coiled coil regions and disordered segments. The specific function of this N-terminal domain remains to be determined, though it may contribute to the protein's actin-binding activity or subcellular localisation properties.
