identifier: Pfam:PF21930
label: Gp138, beta helical trimerization domain
definition: >-
  This domain is found in Gp138 from Escherichia phage phi92 ( ) and similar sequences found in tailed bacteriophages and prophages from proteobacteria. Gp138 forms an spike-shaped trimer with three highly intertwined chains. Each polypeptide has an oligonucleotide/oligosaccharide-binding (OB-fold) domain ( ) and a long β-helical C-terminal domain (this entry), which initiates the contact with the host cell membrane. The trimeric β-helix is composed of three antiparallel β-sheets, which swap three C-terminal β-strands with each other around the threefold axis.
