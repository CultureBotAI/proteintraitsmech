identifier: Pfam:PF24597
label: DOP1 middle TPR domain
definition: >-
  This entry represents a domain found at the middle region of DOP1 (A/B) from vertebrates, DOP1 from S.cerevisiae and E. nidulans, DOP1 homolog from D. melanogaster and other homologous proteins from animals and fungi. This domain consists of TPRs repeats. DOP1 is the founding member of the Dopey family and is required for correct cell morphology and spatiotemporal organisation of multicellular structures in the filamentous fungus Emericella nidulans (Aspergillus nidulans). In S.cerevisiae, it is required for normal cellular morphogenesis. Loss of Dop1 activity affects endosome to Golgi transport and causes a severe perturbation of the organization of the endoplasmic reticulum; Mon2 a relative of large Arf exchange factors, recruits Dop1 to the Golgi apparatus. Dop1 homologues are found in mammals, where they may play a role in regulating membrane trafficking of cargo proteins. Together with ATP9A and MON2, it regulates SNX3 retromer-mediated endosomal sorting of WLS away from lysosomal degradation. These are long proteins consisting of tetratricopeptide (TPRs) repeats.
