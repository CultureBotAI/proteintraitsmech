identifier: Pfam:PF21562
label: G7C, Tail fiber protein, domain 3
definition: >-
  This domain is found in Tail fiber protein from Escherichia virus G7C (Gp63, ) and similar proteins from tailed bacteriophages and prophages from enterobacterales. Gp63 is a receptor-binding protein (RBP) that emanate from the phage particle in the form of fibres for the virus to recognise and bind to their host. It deacetylates surface polysaccharides of E. coli leaving the backbone of the polysaccharide intact. This entry represents domain 3 of Ggp63, which shows structural similarity to a small domain that connects the sialidase domain with the N-terminal particle-binding domain in phage tailspikes with sialidase activity ( ). It shows two β-helical rungs capped by an N-terminal α-helix oriented perpendicular to the rungs' axis.
