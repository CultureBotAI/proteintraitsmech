identifier: Pfam:PF18791
label: Transport inhibitor response 1 protein domain
definition: >-
  The F-box protein transport inhibitor response 1 (TIR1) is a receptor for auxin, triggering an auxin-enhanced and ubiquitin-mediated degradation of substrates. The targets are recruited via interaction with the leucine-rich repeat region of the protein. This entry represents a specific unit of the LRR region, including an insertion of one short α-helix in the loop between the β-strand and the following helix. It shares some sequence homology with a unit with similar structure of coronatine-insensitive protein 1.
