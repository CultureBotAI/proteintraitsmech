identifier: Pfam:PF20654
label: Exocyst complex component Sec3, C-terminal
definition: >-
  Sec3 (also known as ExoC1) is a component of the exocyst complex, which mediates the tethering of post-Golgi secretory vesicles to the plasma membrane and promotes the assembly of the SNARE complex for membrane fusion. The exocyst is also involved in cell polarization, primary ciliogenesis, cytokinesis, pathogen invasion, tumorigenesis and metastasis. This complex has an elongated shape consisting of packed long rods, a a structure that is shared among the Complex Associated with Tethering Containing Helical Rods (CATCHRs) proteins from related complex such as Conserved Oligomeric Golgi complex (COG) and Golgi-Associated Retrograde Protein complex (GARP). Subunits of these complexes, apart of helical bundles, they usually have a coiled-coil (CC) region at the N-terminal. Sec3 is described as a membrane-anchoring component. This entry represents the C-terminal domain of Sec3 which interacts with small GTPases, which consists of the conserved α-helical bundle. Sec3 is recruited to the sites of polarised membrane growth through its interaction with the small GTP-binding protein Rho1p.
