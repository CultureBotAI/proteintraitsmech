identifier: Pfam:PF05426
label: Alginate lyase
definition: >-
  Alginate is a family of 1-4-linked copolymers of beta-D-mannuronic acid (M) and alpha-L-guluronic acid (G). It is produced by brown algae and by some bacteria belonging to the genera Azotobacter and Pseudomonas. Alginate lyases catalyse the depolymerisation of alginates by beta -elimination, generating a molecule containing 4-deoxy-L-erythro-hex-4-enepyranosyluronate at the nonreducing end. Two subfamilies of alginate lyase exist: the poly(beta-D-mannuronate) lyase, , and the poly(alpha-L-guluronate) lyase, . This entry represents a domain found in the poly(beta-D-mannuronate) lyase subfamily of alginate lyase.
