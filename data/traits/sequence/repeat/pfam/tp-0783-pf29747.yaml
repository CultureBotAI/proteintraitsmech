identifier: Pfam:PF29747
label: TP_0783 beta-propeller protein
definition: >-
  This entry represents TP_0783-like single-pass transmembrane proteins from Treponema pallidum and related spirochaete bacteria. The protein is 377 amino acids in length with a transmembrane helix spanning residues 21-43. Structural analysis indicates the presence of a β-propeller fold. The protein exhibits remote structural similarity to quinoprotein amine dehydrogenase, though the specific biological function remains to be determined.
