identifier: Pfam:PF22121
label: Magnetotaxis protein MtxA, C-terminal domain
definition: >-
  This domain is found at the C-terminal end of Magnetotaxis protein MtxA from Magnetospirillum gryphiswaldense ( ) and similar sequences from magnetotactic aquatic proteobacteria. Magnetotaxis is believed to direct the swimming of cells toward growth-favoring microoxic zones in natural waters. This domain contains five anti-parallel α-helices-and-turn motifs folded as tetra-trico-peptide repeat (TPR) motifs.
