identifier: Pfam:PF07004
label: Sperm-tail PG-rich repeat
definition: >-
  This entry represents a short conserved region carrying a PGP motif that is repeated in the eukaryotic sperm tail protein, outer dense fibre protein 3 (also known as Ciliary microtubule associated protein 1A). Orthologues from some species may include up to 40 Pro-Gly-Pro repeats.
