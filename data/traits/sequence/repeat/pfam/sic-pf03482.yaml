identifier: Pfam:PF03482
label: sic protein repeat
definition: >-
  Serotype M1 strains of Group A Streptococcus are responsible for epidemic waves of human infection. This entry represents a 30-amino acid repeat found in the Streptococcal Inhibitor of Complement (SIC) protein, an extracellular virulence factor exemplified by which functions by inhibiting the human complement system.
