identifier: Pfam:PF25320
label: TELO2 ARM repeat domain
definition: >-
  This entry represents an ARM repeat domain found in TELO2 proteins that forms part of the TTT (TELO2-TTI1-TTI2) complex. Recent cryo-EM structures show that this domain adopts an elongated α-helical solenoid structure typical of ARM repeats. The domain mediates key interactions with TTI1 within the TTT complex, which functions as an adaptor complex for the R2TP chaperone system in the stabilisation of phosphatidylinositol 3-kinase-related protein kinases (PIKKs). The TELO2 ARM domain provides a binding platform for TTI1 while remaining flexibly connected to the C-terminal domain via an intrinsically disordered linker. TELO2 acts at an early step of the TEL1/ATM pathway of DNA damage signaling. In vitro the protein binds to telomeric DNA repeats.
