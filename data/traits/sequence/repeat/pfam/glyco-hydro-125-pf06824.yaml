identifier: Pfam:PF06824
label: Metal-independent alpha-mannosidase (GH125)
definition: >-
  This family includes proteins from bacteria and fungi. It was originally identified as a protein of unknown function from Schizosaccharomyces pombe, which was isolated from a screen to identify novel genes required for meiosis. Members of this family have since been characterised from Streptococcus pneumoniae ( ) and Clostridium perfringens ( ), and represent a new glycoside hydrolase family, also known as GH125. This family is the first characterised metal-independent alpha-mannosidase family. Proteins in this family have been reported to be strict exo-alpha-1,6-mannosidases that operate via a metal-independent inverting catalytic mechanism.
