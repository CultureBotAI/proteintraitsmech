identifier: Pfam:PF09922
label: Cell wall-active antibiotics response LiaF, C-terminal
definition: >-
  This domain is found in various prokaryotic proteins, including cell wall-active antibiotic response proteins. This entry includes protein product of the yvqF gene, LiaF, located immediately upstream of vraS. It is associated with glycopeptide resistance in Staphylococcus aureus. This domain has been described as Toast_rack from its structural resemblance.
