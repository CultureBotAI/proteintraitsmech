identifier: Pfam:PF04041
label: beta-1,4-mannooligosaccharide phosphorylase
definition: >-
  This family of glycosyl hydrolases include 4-O-beta-D-mannosyl-D-glucose phosphorylase (RaMP1) and beta-1,4-mannooligosaccharide phosphorylase (RaMP2). The first one converts 4-O-beta-D-mannopyranosyl-D-glucopyranose (Man-Glc) to mannose 1-phosphate (Man1P) and glucose, while the second one catalyses the phosphorolysis of beta-1,4-mannooligosaccharides longer than beta-1,4-mannobiose to mannose 1-phosphate (Man1P) and shorter mannooligosaccharides. Both are involved in a mannan catabolic pathway which feeds into glycolysis.
