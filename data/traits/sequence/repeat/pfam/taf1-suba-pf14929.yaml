identifier: Pfam:PF14929
label: TAF RNA Polymerase I subunit A
definition: >-
  TATA box binding protein associated factor RNA Polymerase I subunit A (TAF1A/TAFI48) is found in eukaryotes and is encoded by the gene TAF1A in humans. Its function is to aid transcription of DNA into RNA by binding to the promoter at the -10 TATA box site. It is a component of the transcription factor SL1/TIF-IB complex, involved in PIC assembly (pre-initiation complex) during RNA polymerase I-dependent transcription. The rate of PIC formation depends on the rate of association of this protein. This protein also stabilises nucleolar transcription factor 1/UBTF on rDNA. This entry also includes TAF1A homologues from plants.
