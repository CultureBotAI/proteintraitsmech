identifier: Pfam:PF27482
label: YycP, beta-propeller domain
definition: >-
  This entry represents the β-propeller domain that covers most of the protein sequence in YycP, an uncharacterised protein from Bacillus subtilis. YycP is a 387 amino acid precursor protein with a signal peptide. The function of this domain remains to be determined. Members of this group are mainly found in bacillati and actinobacteria.
