identifier: Pfam:PF22575
label: Virilizer, yeast
definition: >-
  This entry includes virilizer (VIR1), the yeast homologue of human virilizer (VIRMA). VIR1 is a component of the MIS complex, a complex that mediates N6-methyladenosine (m6A) methylation of meiotic mRNAs and is required for initiation of meiosis, progression through the meiotic divisions and sporulation. In the complex, it plays a scaffolding role, stabilising the other complex members.
