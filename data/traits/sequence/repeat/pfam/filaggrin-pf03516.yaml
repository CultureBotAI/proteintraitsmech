identifier: Pfam:PF03516
label: Filaggrin
definition: >-
  Filaggrins are filament-associated proteins that interact with keratin intermediate filaments of terminally differentiating mammalian epidermis via disulphide bond formation. Filaggrin-2 is essential for normal cell-cell adhesion in the cornified cell layers and important for proper integrity and mechanical strength of the stratum corneum of the epidermis. They show wide species variations and their aberrant expression has been implicated in a number of keratinising disorders. The proteins are synthesised as large, insoluble, highly-phosphorylated precursors, containing multiple tandem repeats of 324 amino acids, which are not separated by a large linker. The precursor is deposited as keratohyalin granules. During terminal differentiation, it is dephosphorylated and proteolytically cleaved.
