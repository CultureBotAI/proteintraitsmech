identifier: Pfam:PF09737
label: De-etiolated protein 1 Det1
definition: >-
  This entry represents Det1 family proteins. Det1 (de-etiolated-1) is an essential negative regulator of plant light responses, and it is a component of the Arabidopsis CDD complex containing DDB1 and COP10 ubiquitin E2 variant. Mammalian Det1 forms stable DDD-E2 complexes, consisting of DDB1, DDA1 (DET1, DDB1 Associated 1), is a member of the UBE2E group of canonical ubiquitin conjugating enzymes and modulates Cul4A function. Det1 proteins form a broken β-propeller maintaining only five of the typical seven blades.
