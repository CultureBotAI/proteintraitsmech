identifier: Pfam:PF30701
label: ARMC6
definition: >-
  This entry represents the human Armadillo repeat-containing protein 6 (ARMC6) and related proteins. This protein is characterised by tandem armadillo repeats. It is a member of the so-called ARMC subfamily of proteins, of which ARMC1-10, ARMC12, and ARMCX1-6, has received increasing attention as they play a critical role in various diseases. ARMC6 is the target gene of MYCN and indicates a poor prognosis for patients with neuroblastoma.
