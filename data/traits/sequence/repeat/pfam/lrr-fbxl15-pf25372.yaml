identifier: Pfam:PF25372
label: F-box/LRR-repeat protein 15, leucine rich repeat domain
definition: >-
  This domain represents a region of tandem leucine rich repeats found in human F-box/LRR-repeat protein 15 (FBXL15) and similar eukaryotic proteins. FBXL15 is the substrate recognition component of a SCF (SKP1-CUL1-F-box protein), an E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of SMURF1, thereby acting as a positive regulator of the BMP signalling pathway. It is required for dorsal/ventral pattern formation and bone mass maintenance. This region is also found in human Lysine-specific demethylase 2B (KDM2B), a histone demethylase that demethylates 'Lys-4' and 'Lys-36' of histone H3, thereby playing a central role in histone code [ , . ].
