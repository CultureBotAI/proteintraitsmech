identifier: Pfam:PF23405
label: APC4, WD40 domain C-terminal half
definition: >-
  Apc4 is a component of the anaphase promoting complex/cyclosome (APC/C), a cell cycle-regulated E3 ubiquitin ligase that controls progression through mitosis and the G1 phase of the cell cycle. This complex acts by ubiquitination and degradation of target proteins. Apc4 consists of a β-propeller that is split by a long α-helical domain which generate an L-shaped molecule. APC4 interacts with APC5; the N-terminal of APC1 serves to stabilise the union between APC4 and APC5, both of which lie towards the bottom-front of the APC. This entry represents the C-terminal half of the β-propeller of ACP4 from animals.
