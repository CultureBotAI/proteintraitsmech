identifier: Pfam:PF10578
label: Seminal vesicle protein repeat
definition: >-
  The rat seminal vesicle contains six major androgen-dependent secretory proteins referred to as SVS I-VI. The SVS I-III proteins appear to be components of the rat copulatory plug, with the SVS II protein being the major component. This entry represents a repeat that is found in seminal vesical proteins.
