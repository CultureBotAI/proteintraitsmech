identifier: Pfam:PF14269
label: Arylsulfotransferase (ASST)
definition: >-
  This entry represents Arylsulfate sulfotransferase Cpz4, Putative sulfotransferase copF and related proteins. Cpz4 is the fourth gene in a locus encoding enzymes involved in caprazamycin antibiotic biosynthesis. This sulfotransferase is responsible for the production of sulfated caprazamycins. It preferentially sulphates the hydroxy group of the sugar moiety in glycosidic substrates rather than phenolic hydroxyl groups. Its substrates include hydroxyacyl caprazols, caprazamycin aglycones, and intact caprazamycins. In vitro activity has been demonstrated using 4-methylumbelliferyl sulphate (MUS) or p-nitrophenyl sulphate (pNPS) as donor substrates, with phenol serving as the acceptor. CopF is part of the gene cluster that mediates the biosynthesis of coprogen, a hydroxamate-type siderophore involved in cellular iron uptake.
