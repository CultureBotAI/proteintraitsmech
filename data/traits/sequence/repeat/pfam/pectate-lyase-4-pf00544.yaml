identifier: Pfam:PF00544
label: Pectate lyase
definition: >-
  Pectate lyase is an enzyme involved in the maceration and soft rotting of plant tissue. Pectate lyase is responsible for the eliminative cleavage of pectate, yielding oligosaccharides with 4-deoxy-alpha-D-mann-4-enuronosyl groups at their non-reducing ends. The protein is maximally expressed late in pollen development. It has been suggested that the pollen expression of pectate lyase genes might relate to a requirement for pectin degradation during pollen tube growth. The structure and the folding kinetics of one member of this family, pectate lyase C (pelC)1 from Erwinia chrysanthemi has been investigated in some detail. PelC contains a parallel β-helix folding motif. The majority of the regular secondary structure is composed of parallel β-sheets (about 30%). The individual strands of the sheets are connected by unordered loops of varying length. The backbone is then formed by a large helix composed of β-sheets. There are two disulphide bonds in pelC and 12 proline residues. One of these prolines, Pro220, is involved in a cis peptide bond. he folding mechanism of pelC involves two slow phases that have been attributed to proline isomerization.
