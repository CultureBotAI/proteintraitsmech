identifier: Pfam:PF23393
label: WDR90/POC16, second beta-propeller
definition: >-
  This entry represents the second β-propeller domain found in WD repeat-containing protein 90 (WDR90) from animals, and the homologue protein POC16 from Chlamydomonas reinhardtii. WDR90 is proposed to be localised in the centriole and required for ciliogenesis. The similarities between WDR90 and the flagellar inner B-microtubule protein FAP52/WDR16 lead to the proposal that the WD40 domains of WDR90 might be located within the B-microtubule of the centriole triplet.
