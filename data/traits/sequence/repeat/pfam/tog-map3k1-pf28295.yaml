identifier: Pfam:PF28295
label: Mitogen-activated protein kinase kinase kinase 1, TOG domain
definition: >-
  This entry represents the TOG domain in Mitogen-activated protein kinase kinase kinase 1 (MAP3K1), a key signalling enzyme in the MAP kinase pathway, functioning at the top tier of the kinase cascade that regulates cellular responses to various external stimuli. It activates the ERK and JNK kinase pathways by phosphorylation of MAP2K1 and MAP2K4. The TOG domain in MAP3K1 binds to tubulin heterodimers.
