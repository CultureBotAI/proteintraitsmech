identifier: Pfam:PF02524
label: KID repeat
definition: >-
  This group of proteins contains the KID repeat as found in Borrelia and spirochete Repeat motif-containing proteins including RepA/Rep+, RepU and various Bdr proteins. RepA and related Borrelia proteins have been suggested to play an important genus-wide role in the biology of the Borrelia. Bdr proteins are polymorphic inner membrane proteins produced by most Borrelia species. The bdr genes of encode proteins that form three distinct subfamilies: BdrD, BdrE, and BdrF. bdr orthologues have been appear to be present in all Borrelia species that have been analysed. It is thought that BdrF2 and the other proteins encoded by the operon form an inner-membrane-associated protein complex that may interact with DNA and which may act during transmission or in the early stages of infection.
