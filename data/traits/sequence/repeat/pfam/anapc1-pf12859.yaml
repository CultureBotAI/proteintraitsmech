identifier: Pfam:PF12859
label: Anaphase-promoting complex subunit 1 WD40 beta-propeller domain
definition: >-
  Apc1 (anaphase-promoting complex subunit 1) is the largest of the subunits of the anaphase-promoting complex or cyclosome. The anaphase-promoting complex is a multiprotein subunit E3 ubiquitin ligase complex that controls segregation of chromosomes and exit from mitosis in eukaryotes. Infection of human fibroblasts with human cytomegalovirus (HCMV) leads to cell cycle dysregulation, which is associated with the inactivation of the anaphase-promoting complex. Apc1 consists of an N-terminal WD40 β-propeller domain, a middle domain (Mid-N), a PC domain and a C-terminal domain (Mid-C) that coalesces with Mid-N to form Apc1Mid which connects Apc1-WD40 with Apc1-PC and comprises an α-solenoid capped by a β-sandwich. This entry represents the N-terminal domain of Apc1, which is essential for APC/C catalytic activity as it mediates the coactivator-induced conformational change of the APC/C which promotes UbcH10 binding.
