identifier: Pfam:PF24436
label: Integrator complex subunit 7, N-terminal
definition: >-
  This entry represents the superhelical α-solenoid found at the N-terminal of INTS7. Integrator complex subunit 7 (INTS7) is a component of the integrator complex which is recruited to the U1 and U2 snRNA genes and mediates the snRNAs' 3' end processing. The integrator complex interacts with the C-terminal tail of the largest subunit of RNA-polymerase II to promote 3'-snRNA processing. INTS7 interacts with INTS1 and INTS2 making extensive contacts with each other, nucleating the assembly of the whole INTAC complex. In zebrafish, C. elegans and Drosophila, INTS7 has been found to be essential for normal development.
