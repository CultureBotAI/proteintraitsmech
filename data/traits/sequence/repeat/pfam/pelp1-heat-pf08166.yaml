identifier: Pfam:PF08166
label: PELP1, middle domain
definition: >-
  This entry represents a middle domain found in PELP1 (Proline-, glutamic acid- and leucine-rich protein 1, also known as modulator of nongenomic activity of estrogen receptor) which consists of HEAT repeats. PELP1 is a coactivator of estrogen receptor-mediated transcription and a corepressor of other nuclear hormone receptors and sequence-specific transcription factors. It forms the Five Friends of Methylated Chtop (5FMC) nuclear complex, together with the Sumo-specific protease Senp3, Wdr18, Tex10, and Las1L, in which it constitutes the core of 5FMC. This complex is recruited by Chromatin target of Prmt1 (Chtop, a vertebrate-specific chromatin-bound protein that plays an important role in transcriptional regulation) when the latter is arginine-methylated by Prmt1.
