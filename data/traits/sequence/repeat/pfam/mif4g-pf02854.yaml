identifier: Pfam:PF02854
label: MIF4G domain
definition: >-
  MIF4G stands for middle domain of eukaryotic initiation factor 4G (eIF4G). eIF4G is a component of the translation initiation factor eIF4F complex and the cytoplasmic cap-binding protein complex (CBC). In the cytoplasm, cap binding complexes, distinct in their composition from nuclear cap-binding complexes, have important roles in the initiation of mRNA translation. The MIF4G domain also occurs in other proteins, including CBP80, a component of the nuclear CBC and NMD2, involved in the cytoplasmic nonsense-mediated mRNA decay. The domain is rich in α-helices and may contain multiple α-helical repeats. In eIF4G, this domain binds to the two other components of the eIF4F complex, eIF4A and eIF3E, and to RNA and DNA.
