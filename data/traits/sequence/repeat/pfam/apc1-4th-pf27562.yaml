identifier: Pfam:PF27562
label: APC1 fourth domain
definition: >-
  This entry represents a TPR-like domain found in anaphase-promoting complex subunit 1 proteins (APC1). This domain is part of the multi-domain architecture of APC1, which is a component of the anaphase-promoting complex/cyclosome (APC/C). This domain is found across eukaryotes including metazoans, fungi and plants. APC1 is the largest of the subunits of the anaphase-promoting complex or cyclosome. The anaphase-promoting complex is a multiprotein subunit E3 ubiquitin ligase complex that controls segregation of chromosomes and exit from mitosis in eukaryotes. The APC/C complex mediates ubiquitination and degradation of target proteins and is essential for the metaphase to anaphase transition during both meiosis and mitosis. Infection of human fibroblasts with human cytomegalovirus (HCMV) leads to cell cycle dysregulation, which is associated with the inactivation of the anaphase-promoting complex.
