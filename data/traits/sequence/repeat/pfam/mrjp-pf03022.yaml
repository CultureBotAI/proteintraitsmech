identifier: Pfam:PF03022
label: Major royal jelly protein
definition: >-
  This family describes major royal jelly protein and other yellow-related proteins mostly found in insects. It includes dopaminechrome tautomerase (DPT) which is enconded by the yellow-h gene in Drosophila. DPT catalyzes the conversion of dopaminechrome to 5,6-dihydroxyindole in the eumelanin biosynthetic pathway originating from dopamine. It also includes putative gluconolactonase proteins and yellow-related proteins proteins from fungi and prokaryotic organisms. The major royal jelly proteins (MRJPs) comprise 12.5% of the mass, and 82-90% of the protein content, of honeybee (Apis mellifera) royal jelly. Royal jelly is a substance secreted by the cephalic glands of nurse bees and it is used to trigger development of a queen bee from a bee larva. The biological function of the MRJPs is unknown, but they are believed to play a major role in nutrition due to their high essential amino acid content. Two royal jelly proteins, MRJP3 and MRJP5, contain a tandem repeat that results from a high genetic variability. This polymorphism may be useful for genotyping individual bees. Yellow-related salivary proteins in sand flies are a conserved family of proteins with significant roles in host interactions and disease pathogenesis. These proteins exhibit neutrophil chemoattractant properties in vitro and in vivo, recruiting immune cells to bite sites via dose-dependent chemotaxis. Structurally, they adopt a six-bladed β-propeller fold with a ligand-binding pocket capable of high-affinity interactions with biogenic amines (e.g., serotonin, histamine) to modulate hemostasis and inflammation. Yellow proteins also include yellow-f and yellow-f2 proteins from Drosophila, which are dopachrome-conversion enzymes responsible for catalysing the conversion of dopachrome into 5,6-dihydroxyindo…
