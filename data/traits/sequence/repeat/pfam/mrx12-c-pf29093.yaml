identifier: Pfam:PF29093
label: MRX12 C-terminal domain
definition: >-
  This entry represents the C-terminal tetratricopeptide (TPR)-like repeats region of MRX12 proteins found in fungi. MRX12 is a component of MIOREX complexes, which are large expressome-like assemblies of ribosomes with factors involved in all steps of post-transcriptional gene expression in mitochondria. It associates with the mitochondrial ribosome and localises to mitochondria via an N-terminal transit peptide.
