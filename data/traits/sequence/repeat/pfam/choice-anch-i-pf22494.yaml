identifier: Pfam:PF22494
label: Choice-of-anchor I domain
definition: >-
  This entry represents the choice-of-anchor I domain, found in the alkaline phosphatase PhoA of Synechocystis sp. PCC 6803 ( ), upstream of the region presumed to have phosphatase activity. It is also found in Mesenchyme-specific cell surface glycoprotein from Strongylocentrotus purpuratus that is likely involved in in mesenchyme cell migration, adhesion, fusion, or spicule formation. Proteins with this domain include a number with the PEP-CTERM protein-sorting domain, but also a number with the LPXTG protein-sorting domain, making this a choice-of-anchor domain, found in proteins targeted for covalent attachment at the cell surface by at least two different protein-sorting systems.
