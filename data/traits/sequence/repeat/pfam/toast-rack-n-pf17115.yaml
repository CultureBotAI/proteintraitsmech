identifier: Pfam:PF17115
label: N-terminal domain of toast_rack, DUF2154
definition: >-
  This short domain lies at the N terminus of a group of uncharacterised proteins containing the formerly DUF2154, annotated as cell wall-active antibiotic response proteins. These domains have been named Toast_rack from its structural resemblance. The function of this domain is not clear.
