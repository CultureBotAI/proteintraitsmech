identifier: Pfam:PF16687
label: beta-propeller of ELYS nucleoporin
definition: >-
  This entry represents the N-terminal seven-bladed β-propeller domain of ELYS nucleoporins in higher eukaryotes. It is required for anchorage of the nucleoporin to the nuclear envelope during cell-division.
