identifier: Pfam:PF10988
label: Putative auto-transporter adhesin, head GIN domain
definition: >-
  Proteins containing this domain show structural similarity to other pectin lyase families. Although these proteins align with acetyl-transferases, there is no conservation of catalytic residues found. It is likely that the function is one of cell-adhesion. In , it is interesting to note that the polypeptide contains several well defined sequence repeats, centred around GSG motifs defining the tight β-turn between the two sheets of the super-helix; there are 8 such repeats in the C-terminal half of the protein, which could be grouped into 4 repeats of two. It seems likely that proteins in this entry belongs to the superfamily of trimeric auto-transporter adhesins (TAAs), which are important virulence factors in Gram-negative pathogens. In the case of Parabacteroides distasonis, which is a component of the normal distal human gut microbiota, TAA-like complexes probably modulate adherence to the host (information derived from TOPSAN).
