identifier: Pfam:PF21032
label: PROPPIN
definition: >-
  This entry includes PROPPIN family members, which are β-propellers that bind polyphosphoinositides, conserved from yeast to human. These are PI(3)P sensors that share a β-propeller fold and the presence of an FRRG motif required for phosphoinositide binding and autophagy, playing a key role in autophagosome biogenesis. Four PROPPINs are known in human (WIPI1-4) and three in yeast (Atg18, Atg21 and Hvs2). EPG6 from C. elegans is an homologue of human WIPI4.
