identifier: Pfam:PF20738
label: Cellophane-induced 1 (cin1) repeat
definition: >-
  Venturia inaequalis is a hemi-biotrophic fungus that causes scab disease of apple. A recently-identified gene from this fungus, cin1 (cellophane-induced 1), is up-regulated over 1000-fold in planta and considerably on cellophane membranes, and encodes a cysteine-rich secreted protein of 523 residues with eight imperfect tandem repeats of ~60 amino acids.
