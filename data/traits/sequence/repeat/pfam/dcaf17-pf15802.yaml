identifier: Pfam:PF15802
label: DDB1- and CUL4-associated factor 17
definition: >-
  DCAF17 (DDB1- and CUL4-associated factor 17) is a family of proteins found in eukaryotes. It may function as a substrate-receptor for CUL4-DDB1 E3 ubiquitin-protein ligase complex. Mutations in the human protein, otherwise known as C2orf37, are responsible for Woodhouse-Sakati Syndrome. Woodhouse-Sakati Syndrome is a rare autosomal recessive multi-systemic disorder characterised by hypogonadism, alopecia, diabetes mellitus, mental retardation, and extrapyramidal syndrome.
