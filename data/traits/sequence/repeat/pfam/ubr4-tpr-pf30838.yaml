identifier: Pfam:PF30838
label: E3 ubiquitin-protein ligase UBR4 TPR-like domain
definition: >-
  This entry represents a small TPR-like α solenoid domain found in a family of UBR4 E3 ubiquitin ligase enzymes and its homologues, such as Protein purity of essence from Drosophila melanogaster. UBR4 is involved in different protein quality control pathways in the cytoplasm. It is a component of the N-end rule pathway which ubiquitinates proteins bearing specific N-terminal residues that are destabilising according to the N-end rule, leading to their degradation. It recognises both type-1 and type-2 N-degrons, containing positively charged amino acids (Arg, Lys and His) and bulky and hydrophobic amino acids, respectively.
