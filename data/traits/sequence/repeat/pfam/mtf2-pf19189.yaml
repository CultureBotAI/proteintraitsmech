identifier: Pfam:PF19189
label: Mtf2 family
definition: >-
  Unlike mammalian mitochondrial DNAs (mtDNA), yeasts mtDNAs have introns. This entry represents the C-terminal region of Mtf2 from S. cerevisiae and its homologue in S. pombe, C5D6.12, although they share weak amino acid sequence similarity. Mtf2 from S. cerevisiae is required for overall mitochondrial protein synthesis, whereas the S. pombe counterpart has a more limited role, as it is required for cox1 gene expression.
