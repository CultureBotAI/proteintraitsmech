identifier: Pfam:PF30337
label: Tbc2 translation factor, C-terminal domain
definition: >-
  This entry represents the a domain found near the C-terminal of the Tbc2 translation factor found in Chlorophyceae green algae including Chlamydomonas, Volvox, Monoraphidium and Haematococcus. The full-length Tbc2 protein is a nucleus-encoded chloroplast translation factor required for expression of the psbC mRNA, which encodes the CP43 subunit of photosystem II. Tbc2 interacts with the 5'-UTR of psbC and is part of a 400 kDa complex in the chloroplast stroma. The specific function of this domain remains to be determined.
