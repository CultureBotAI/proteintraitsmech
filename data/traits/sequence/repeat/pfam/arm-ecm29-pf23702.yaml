identifier: Pfam:PF23702
label: ECM29, ARM-like repeats
definition: >-
  This is a region of armadillo-like repeats found in human Proteasome adapter and scaffold protein ECM29 and similar protein sequences found in animals and some uncharacterised plant and fungal proteins. ECM29 binds to the 26S proteasome, motor proteins and other compartment specific proteins. This entry is often found C-terminal to .
