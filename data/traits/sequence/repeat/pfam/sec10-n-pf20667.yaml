identifier: Pfam:PF20667
label: Exocyst complex component Sec10, N-terminal
definition: >-
  This entry contains the Sec10 component of the eukaryotic exocyst complex, which mediates the tethering of post-Golgi secretory vesicles to the plasma membrane and promotes the assembly of the SNARE complex for membrane fusion. It is also involved in cell polarisation, primary ciliogenesis, cytokinesis, pathogen invasion, tumorigenesis and metastasis. The exocyst is a member of the Complex Associated with Tethering Containing Helical Rods (CATCHRs) which also includes DSL1, COG and GARP complexes, evolutionary related. They share structural features comprising α-helical bundles towards the C-terminal and coiled-coil regions at the N-terminal. This entry represents the N-terminal coiled-coil region (also referred to as CorEx motif) of Sec10 and its homologues from animals ECOC5 (Exocyst complex component 5), which participates in the central pairwise interactions by forming an intact antiparallel 'zipper' which Sec15 subunit. Sec10-Sec15 CorEx motifs interact with Exo70-Exo84 dimers and form a four-helical bundle.
