identifier: Pfam:PF30151
label: PAC11 dynein intermediate chain
definition: >-
  This entry represents PAC11, found in fungi, particularly within the Saccharomycetaceae. PAC11 is a WD repeat-containing protein that functions as a dynein intermediate chain component of the cytoplasmic dynein complex. The protein is required for viability in the absence of the kinesin-related CIN8 mitotic motor and is essential for proper dynein function. PAC11 interacts with NUM1 when DYN1 is present and localises to the cytoplasm and cytoskeleton. The protein plays important roles in nuclear migration along microtubules, establishment of mitotic spindle localisation and orientation, and transport along microtubules. PAC11 contains WD repeats that form a β-propeller structure typical of this protein family. The protein is essential for proper dynein heavy chain and light chain binding and is a critical component of the dynein motor complex in fungal cells.
