identifier: Pfam:PF14517
label: Tachylectin
definition: >-
  This entry represents a five-bladed β propeller domain from Tachylectin 2. It consists of five four-stranded antiparallel β-sheets are arranged around a water channel. Tachylectin 2 binds specifically to N-acetylglucosamine and N-acetylgalactosamine and is part of the organism's immunity host defense systems. Tachylectin 2 has five binding sites (one on each β-sheet)for substrate carbohydrate recognition; by combining specificity for N-acetylcarbohydrates with a high density of ligand binding sites, tachylectin 2 is able to recognise foreign sugars.
