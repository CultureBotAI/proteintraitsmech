identifier: Pfam:PF21045
label: Integrator subunit 10
definition: >-
  Integrator complex subunit 10 is a component of the multiprotein complex Integrator, which is responsible for the endonucleolytic cleavage of small nuclear RNA (snRNA) transcripts within the nucleus. The Integrator is an RNA polymerase II complex which contains at least 12 novel subunits and core RNAPII subunits. Two of the Integrator subunits share similarity with subunits of the cleavage and polyadenylation specificity factor (CPSF) complex. Integrator has been shown to be recruited to the U1 and U2 snRNA genes, and to mediate the snRNAs' 3' end processing. The Integrator complex is evolutionarily conserved in metazoans, and directly interacts with the C-terminal domain of the RNA polymerase II largest subunit.
