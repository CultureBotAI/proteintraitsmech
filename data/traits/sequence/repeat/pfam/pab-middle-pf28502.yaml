identifier: Pfam:PF28502
label: PAB middle domain
definition: >-
  This entry represents the middle domain of the PAB (protein IN CHLOROPLAST ATPASE BIOGENESIS), whose function is not yet clear. It may contribute to the structural organisation of the PAB protein. This entry includes a group of plant proteins, including PAB (Protein IN CHLOROPLAST ATPASE BIOGENESIS) from Arabidopsis. PAB is a chloroplast stromal protein that functions as an assembly chaperone involved in the assembly of the F1 ATP synthase in chloroplast thylakoid membranes. The protein functions downstream of the CPN60 chaperones to promote assembly of the catalytically active core of the chloroplast ATP synthase and assists the assembly of the ATP synthase gamma subunit into the active F1 core. PAB interacts with ATPC1 and is critical for the biogenesis of the chloroplast ATP synthase.
