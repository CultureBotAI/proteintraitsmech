identifier: Pfam:PF26723
label: UNC79, C-terminal HEAT repeats
definition: >-
  This entry represents the C-terminal region of Protein unc-79 homolog from Homo sapiens and related proteins. In the Uncoordinated protein 79 (UNC79) from C.elegans, it spans nearly the entire length. This domain is composed of α-helical HEAT repeats. The Protein unc-79 homolog is an auxiliary subunit of the NALCN sodium channel complex which is a voltage-gated ion channel responsible for the resting Na+ permeability that controls neuronal excitability. This complex is activated by neuropeptides substance P, neurotensin. In addition, the channel is inhibited by extracellular Ca2+ through the Ca2+-sensing receptor. The human NALCN channelosome has been structurally characterised. NALCN, UNC79 and UNC80 are essential, and mutations in human NALCN and UNC80 cause severe developmental and neurological disease. In the human NALCN channelosome structure UNC79 and UNC80 form an intertwined anti-parallel superhelical assembly, which docks intracellularly onto the NALCN-FAM155A pore-forming subcomplex ( ).
