identifier: Pfam:PF18071
label: HMW1C N-terminal
definition: >-
  This is the N-terminal domain found in Actinobacillus pleuropneumoniae HMW1C (ApHMW1C). HMW1 adhesin is an N-linked glycoprotein that mediates adherence to respiratory epithelium through N-glycosylation of protein acceptor sites an O-glycosylation of sugar acceptor sites. The N-terminal domain forms an all alpha domain (AAD) when combined with the domain spanning from residue 154 to residue 245. The AAD interacts extensively with the C-terminal GT-B fold in order to create unique groove with potential to accommodate the acceptor protein.
