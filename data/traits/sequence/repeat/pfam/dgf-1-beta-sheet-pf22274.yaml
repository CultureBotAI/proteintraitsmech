identifier: Pfam:PF22274
label: DGF-1 beta-sheet domain
definition: >-
  This entry represents a β-sheet domain present in DGF-1 from Trypanosoma proteins, one of the most abundant proteins in T. cruzi genome. This domain adopts a pectin lyase-like fold. The function of this protein is not yet clear, however, it is likely to play a role in cell-to-cell interactions or signal transduction.
