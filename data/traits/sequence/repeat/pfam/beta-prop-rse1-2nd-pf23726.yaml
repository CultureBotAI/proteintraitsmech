identifier: Pfam:PF23726
label: RSE1/DDB1/CPSF1 second beta-propeller
definition: >-
  This entry represents the second β-propeller found in RSE1/SF3B3/ DDB1/CPSF1/CFT1 proteins in eukaryotes. RSE1/SF3B3/DDB1/CPSF1/CFT1 proteins share a domain architecture consisting of three β-propellers. They have diverse functions, primarily related to RNA/DNA binding. Pre-mRNA-splicing factor RSE1 plays an important role in the spliceosome, a complex that removes introns from pre-mRNAs. Its orthologue, splicing factor 3B subunit 3 (SF3B3) also forms part of the U2 small nuclear ribonucleoprotein particle (snRNP) and has been identified as part of the SAGA transcriptional coactivator complex in Drosophila melanogaster. Also included in this entry is DNA damage-binding protein 1 (DDB1), which is both involved in the recognition and repair of UV-induced DNA damage, as part of the UV-DDB complex, and in protein ubiquitination, as part of the DCX (DDB1-CUL4-X-box) complex. Additionally, this entry includes cleavage and polyadenylation specificity factor subunit 1 (CPSF1) and its orthologue protein CFT1, both involved in the cleavage and polyadenylation of pre-mRNAs.
