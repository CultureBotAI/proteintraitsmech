identifier: Pfam:PF20585
label: Putative pectate lyase-like adhesive domain
definition: >-
  This putative domain is found at the N-terminal of a large number of bacterial proteins. Its adhesive function was described in Lactobacillus reuteri serine-rich repeat proteins. Structure predictions show it is composed of a β-solenoid repeat related to Pectate lyase.
