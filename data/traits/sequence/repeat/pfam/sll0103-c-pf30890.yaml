identifier: Pfam:PF30890
label: Sll0103-like, C-terminal alpha-helical domain
definition: >-
  This entry represents a C-terminal α-helical domain of approximately 80 residues found in Sll0103-like proteins. This domain is typically found C-terminal to von Willebrand factor type A (VWA) domains ( ). This entry is found in bacteria, predominantly Cyanobacteriota and Chloroflexota. The function of this domain remains to be determined.
