identifier: Pfam:PF05327
label: RNA polymerase I specific transcription initiation factor RRN3
definition: >-
  This family consists of several eukaryotic proteins which are homologous to the Saccharomyces cerevisiae RRN3 protein. RRN3 is one of the RRN genes specifically required for the transcription of rDNA by RNA polymerase I (Pol I). In mammalian cells, the phosphorylation state of Rrn3 regulates rDNA transcription by determining the steady-state concentration of the Rrn3. In Drosophila, it is involved in determining adult lifespan and aging. It is required for cell growth during development and it is also required in muscle to drive systemic growth, possibly by affecting systemic insulin signalling.
