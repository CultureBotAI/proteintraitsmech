identifier: Pfam:PF28568
label: SKIP35 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of SKIP35 (SKP1-interacting partner 35) and related proteins found in plants. The specific function of this N-terminal domain remains to be determined. SKIP35 is an ankyrin repeat protein that interacts with SKP1A/ASK1, a component of SCF ubiquitin E3 ligase complexes. The protein contains multiple ankyrin repeats.
