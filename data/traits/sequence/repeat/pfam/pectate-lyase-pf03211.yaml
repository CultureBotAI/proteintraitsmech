identifier: Pfam:PF03211
label: Pectate lyase
definition: >-
  Pectate lyase is responsible for the maceration and soft-rotting of plant tissue. It catalyses the eliminative cleavage of pectate to produce oligosaccharides with 4-deoxy-alpha-D-gluc-4-enuronosyl groups at their non-reducing ends. Pectate lyase is an extracellular enzyme and is induced by pectin. It is subject to self-catabolite repression, and has been implicated in plant disease. This entry represents a group of pectate lyases, including PlyE and PlyH from Aspergillus nidulans.
