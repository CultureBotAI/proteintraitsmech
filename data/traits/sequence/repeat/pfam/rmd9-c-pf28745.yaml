identifier: Pfam:PF28745
label: RMD9 C-terminal domain
definition: >-
  This entry represents the C-terminal TPR domain of RMD9 proteins from ascomycetes. RMD9 proteins are mitochondrial RNA-binding proteins that bind the 3'-UTR of mitochondrial mRNAs and are involved in the processing or stability of mitochondrial mRNAs. The protein localises to the mitochondrial inner membrane. The function of this domain remains to be determined.
