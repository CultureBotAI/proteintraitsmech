identifier: Pfam:PF30299
label: Mitochondrial 3' processome subunit 2 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of mitochondrial 3' processome subunit 2 (MPSS2), found in kinetoplastid parasites of the family Trypanosomatidae including Trypanosoma and Leishmania species. MPSS2 is a component of the mitochondrial 3' processome (MPsome) complex, which also includes terminal uridylyltransferase KRET1, 3'-5' exonuclease DSS1, MPSS1 and MPSS3. The MPsome is involved in the maturation of guide RNA (gRNA) precursors in the mitochondrion. MPSS2 interacts directly with DSS1 within the complex. The specific function of this N-terminal domain remains to be determined. It contains a TPR-like fold.
