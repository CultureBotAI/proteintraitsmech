identifier: Pfam:PF25034
label: Nesprin-1, spectrin repeats
definition: >-
  This entry represents a region of spectrin repeats found in human Nesprin-1/2 (SYNE1/2) and its animal homologues, including Muscle-specific protein 300 kDa from Drosophila melanogaster (Msp300). SYNE1 is a a multi-isomeric modular protein which forms a linking network between organelles and the actin cytoskeleton to maintain the subcellular spatial organisation. This protein has been associated with several severe disorders. SYNE1 and SYNE2 mediate centrosome migration and are both essential for ciliogenesis. SYNE2 assemble with SUN2 in arrays of transmembrane actin-associated nuclear (TAN) lines which are bound to F-actin cables and couple the nucleus to retrograde actin flow during actin-dependent nuclear movement. Msp300 collaborates with Klar to promote even spacing of the myonuclei at the periphery of striated muscle fibres by mediating a tight association between its nuclear ring structure and the plus ends of a unique astral MT network. It is essential for anchoring nuclei, mitochondria and endoplasmic reticulum structures to the Z-disks. In fat body cells, it anchors at the cytoplasmic surface of the nucleus part of the perinuclear non-centrosomal microtubule-organizing centres which function to accommodate the organisation of microtubule networks to control nuclear positioning and dynein motor-based retrograde endosomal trafficking.
