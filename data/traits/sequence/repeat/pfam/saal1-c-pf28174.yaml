identifier: Pfam:PF28174
label: SAAL1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the Synoviocyte proliferation-associated in collagen-induced arthritis protein 1 (SAAL1) and related proteins. SAAL1 is a nuclear protein found in vertebrates that plays a role in promoting cell proliferation in response to pro-inflammatory stimuli. The full-length protein promotes the proliferation of synovial fibroblasts and is expressed in testis, ovary, and synovial tissue of knee joints. The specific function of this C-terminal domain remains to be determined.
