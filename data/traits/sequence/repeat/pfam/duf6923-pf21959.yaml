identifier: Pfam:PF21959
label: Repeat of unknown function (DUF6923)
definition: >-
  This entry represents a β-propeller domain composed of five blades. It is often found in large extracellular proteins in one or more copies. It is uncertain whether this domain might have an enzymatic function or a ligand binding function. Structurally this domain appears to have a sixfold symmetry, but one of the blades takes up the space of normal repeats. This unusual blade is composed of three β-strands of the first repeat and a final C-terminal β-strand from the last repeat.
