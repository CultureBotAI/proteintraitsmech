identifier: Pfam:PF28359
label: Cullin-associated NEDD8-dissociated protein 1 N-terminal part
definition: >-
  This entry represents the TPR (tetratricopeptide repeat) domain found in CandA-N (Cullin-associated NEDD8-dissociated protein 1 N-terminal part). The specific function of this TPR domain remains to be determined. CandA-N is an assembly factor of SCF E3 ubiquitin ligase complexes that promotes exchange of F-box subunits. In most species, CandA-N is known as CANDA1 and it exists as a single protein, but in Aspergillus nidulans it is split into two separate proteins: candA-N (this entry) and candA-C (Q5BAH2), corresponding to the N-terminal and C-terminal portions respectively. The full-length CAND1 protein interacts with unneddylated cullins.
