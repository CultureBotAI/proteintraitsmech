identifier: Pfam:PF20854
label: LED repeat
definition: >-
  This entry represents a six residue tandem repeat found in Cerebellar degeneration-related antigen 1 (CDR1) from human. It is rich in Glu and Asp and usually flanked at the N terminus by hydrophobic residues (Leu/Phe) and on the C terminus by an aliphatic residue followed by and Asp residue.
