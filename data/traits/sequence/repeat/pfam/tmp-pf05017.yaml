identifier: Pfam:PF05017
label: TMP repeat
definition: >-
  This short repeat consists of the motif WXXh where X can be any residue and h is a hydrophobic residue. The repeat is named TMP after its occurrence in the tape measure protein (TMP). Tape measure protein is a component of phage tail and probably forms a β-helix. Truncated forms of TMP lead to shortened tail fibres. This repeat is also found in non-phage proteins where it may play a structural role.
