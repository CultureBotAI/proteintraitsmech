identifier: Pfam:PF14312
label: FG-GAP repeat
definition: >-
  This region contains the extracellular repeat that is found in up to seven copies in alpha integrins and related proteins. It forms a 7-fold repeat that adopts a β-propeller structure. The repeat is called the FG-GAP repeat after two conserved motifs in the repeat. The FG-GAP repeats are found in the N terminus of integrin alpha chains, a region that has been shown to be important for ligand binding. A putative Ca2+ binding motif is found in some of the repeats. These repeats are found in multiple proteins from eukaryotes and bacteria and mediate diverse biological processes at both molecular and cellular levels, such as cell-cell interactions, host patogen recognition or innate immune responses.
