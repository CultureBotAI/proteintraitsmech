identifier: Pfam:PF04519
label: Polymer-forming cytoskeletal
definition: >-
  This is a family of bactofilins, a functionally diverse class of cytoskeletal, polymer-forming, proteins that is widely conserved among bacteria, such as BacP, BacN and BacO from Myxococcus xanthus, which are non-essential components of the chromosome segregation machinery. These proteins position the ParA-ParB-parS chromosome segregation machinery within the cell; BacP seems to be the most important bactofilin in this process. They form a heteropolymeric, subpolar scaffold in the cell in which BacP probably forms the core, BacO contributes to position and integrity while BacN does not seem to contribute to assembly. In C. crescentus, two bactofilins assemble into a membrane-associated laminar structure that shows cell-cycle-dependent polar localisation and acts as a platform for the recruitment of a cell wall biosynthetic enzyme involved in polar morphogenesis. Bactofilins display distinct subcellular distributions and dynamics in different bacterial species, suggesting that they are versatile structural elements that have adopted a range of different cellular functions.
