identifier: Pfam:PF29070
label: MSC6 N-terminal domain
definition: >-
  This entry represents the N-terminal tetratricopeptide repeat (TPR) domain of MSC6 (Meiotic sister-chromatid recombination protein 6). MSC6 is a mitochondrial protein involved in the control of meiotic sister-chromatid recombination. The protein is found in fungi and localises to the mitochondrial matrix. The full-length protein contains this N-terminal TPR domain followed by additional C-terminal regions. TPR domains typically mediate protein-protein interactions. The specific function of this N-terminal TPR domain remains to be determined.
