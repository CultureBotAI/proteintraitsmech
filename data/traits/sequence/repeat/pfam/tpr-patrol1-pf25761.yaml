identifier: Pfam:PF25761
label: PATROL1-like, TPR repeats
definition: >-
  This region is found towards the C-terminal end of Protein unc-13 homolog from Arabidopsis thaliana (PATROL1), which is essential for stomatal opening in response to low concentration of carbon dioxide and light. PATROL1 controls the tethering of proton ATPase AHA1 to the plasma membrane and is essential for stomatal opening in response to low carbon dioxide concentration and light. The protein translocates reversibly between the cytoplasm and plasma membrane depending on environmental conditions. PATROL1 contains two Munc13 domains (MHD1 and MHD2; and ).
