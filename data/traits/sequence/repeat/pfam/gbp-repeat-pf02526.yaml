identifier: Pfam:PF02526
label: Glycophorin-binding protein
definition: >-
  This entry represents the glycophorin-binding protein of Plasmodium falciparum, which is involved in merozoite invasion of host erythrocytes. P. falciparum undergoes three cycles of development in its vertebrate host: the hepatic cycle; the asexual blood cycle, which includes the extracellular merozoite and the intraerythrocytic schizont; and the sexual gametocyte cycle. Erythrocyte invasion by the malarial merozoite is a receptor-mediated process and an obligatory step in parasite development, in which the protein binds to the erythrocyte receptor glycophorin. The glycophorin-binding protein contains a tandem repeat, the sequence of which determines the binding domain for the erythrocyte receptor.
