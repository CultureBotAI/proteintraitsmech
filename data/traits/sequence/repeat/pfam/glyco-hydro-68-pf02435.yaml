identifier: Pfam:PF02435
label: Levansucrase/Invertase
definition: >-
  This family consists of the glycosyl hydrolase 68 family ( ), including several bacterial levansucrase enzymes, and invertase from Zymomonas. Levansucrase ( ), also known as beta-D-fructofuranosyl transferase, catalyses the conversion of sucrose and (2,6-beta-D-fructosyl)(N) to glucose and (2,6-beta-D-fructosyl)(N+1), where other sugars can also act as fructosyl acceptors. Invertase, or extracellular sucrase ( ), catalyses the hydrolysis of terminal non-reducing beta-D-fructofuranoside residues in beta-D-fructofuranosides. O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
