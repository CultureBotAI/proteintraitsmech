identifier: Pfam:PF04091
label: Exocyst complex subunit Sec15 C-terminal
definition: >-
  This entry represents the C-terminal domain of Sec15 subunit, which has the conserved CATCHR fold consisting of α-helical bundles. Sec15 is a component of the exocyst complex involved in the the tethering of post-Golgi Golgi secretory vesicles to the plasma membrane during exocytosis and plays a role in several cellular functions such as cell polarisation, cytokinesis, ciliogenesis and tumour invasion. The exocyst is one of the members of the complexes associated with tethering containing helical rods (CATCHR), together with COG, GARP, and Dsl1 complexes, which share a fold consisting of α-helical bundles forming a rod structure. Its C-terminal domain mediates Rab GTPases binding which occurs in a GTP-dependent manner.
