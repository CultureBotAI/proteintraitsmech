identifier: Pfam:PF04850
label: Baculovirus E66 occlusion-derived virus envelope protein
definition: >-
  This entry represents the C-terminal domain of Non-sulfated chondroitin lyase E66 from Autographa californica nuclear polyhedrosis virus (ODV-E66) and similar sequences from baculovirus. This domain, predominantly formed by β-strands, is often found associated with . ODV-E66 is a component of the polyhedra envelope that plays an essential role in oral infectivity. It may digest, with its chondroitin lyase activity, the chondroitin sulfate barrier of the peritrophic matrix of the host midgut to facilitate viral infection in the epithelial cells. Baculovirus occlusion-derived virus (ODV) derives its envelope from an intranuclear membrane source. N-terminal amino acid sequences of the Autographa californica MNPV nuclear polyhedrosis virus (AcMNPV) envelope protein ODV-E66 is highly hydrophobic. This defined hydrophobic domain was shown to direct the protein, E66, to induce membrane microvesicles within a baculovirus-infected cell nucleus and the viral envelope. In addition, it was suggested that movement of this protein into the nuclear envelope may initiate through cytoplasmic membranes, such as endoplasmic reticulum, and that transport into the nucleus may be mediated through the outer and inner nuclear membrane.
