identifier: Pfam:PF28893
label: Gem-associated protein 4 TPR domain
definition: >-
  This entry represents the first tetratricopeptide repeat (TPR) domain found in gem-associated protein 4 (Gem4). Gem4 proteins are components of the survival motor neuron (SMN) complex that catalyses the assembly of small nuclear ribonucleoproteins (snRNPs), which are essential building blocks of the spliceosome. The domain is found in the three almost identical Drosophila paralogues Gem4a/Glos, Gem4b and Gem4c that result from genomic triplication and have redundant function. TPR domains typically mediate protein-protein interactions. The specific function of this TPR domain within the Gem4 protein architecture remains to be determined.
