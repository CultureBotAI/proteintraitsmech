identifier: Pfam:PF21232
label: Yme1-like, N-terminal
definition: >-
  This domain is found at the N-terminal of a group of proteins predominantly from fungi. This entry includes the mitochondrial inner membrane i-AAA protease supercomplex subunit YME1 from Saccharomyces cerevisiae ( ) and its homologue from S.pombe. YME1 subunit is required for mitochondrial inner membrane protein turnover. This domain adopts a tetratricopeptide repeat fold ( ).
