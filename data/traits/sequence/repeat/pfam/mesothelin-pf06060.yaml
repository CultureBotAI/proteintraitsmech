identifier: Pfam:PF06060
label: Mesothelin
definition: >-
  This family consists of several mammalian pre-pro-megakaryocyte potentiating factor precursor (MPF) or mesothelin proteins. Mesothelin is a glycosylphosphatidylinositol-linked glycoprotein highly expressed in mesothelial cells, mesotheliomas, and ovarian cancer, which participates in cell adhesion, tumour progression, metastasis, and drug resistance. This protein is predicted have superhelical structures with ARM-type repeats which suggests that it may act as superhelical lectins to bind the carbohydrate moieties of extracellular glycoproteins. Due to its overexpression in various tumours, it constitutes a diagnostic and therapy target.
