identifier: Pfam:PF23335
label: IFT80 second beta-propeller
definition: >-
  This entry represents the second β-propeller domain of the Intraflagellar transport protein 80 homolog (IFT80) from human and related proteins. IFT80 is a component of the intraflagellar transport (IFT) complex B, which is essential for the development and maintenance of motile and sensory cilia. It is required for initiation of the ciliary axoneme. It has an unique architecture consisting of two β-propellers followed by an α-solenoid structure. This β-propeller is involved in dimerisation together with the α-solenoid.
