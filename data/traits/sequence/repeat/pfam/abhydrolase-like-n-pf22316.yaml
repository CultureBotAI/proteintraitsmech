definition: >-
  This is the N-terminal domain found in a group of uncharacterised bacterial proteins which have a Phospholipase/carboxylesterase/thioesterase domain ( ) at the C-terminal, including BCE_2095 from Bacillus cereus whose structure was determined ( , ). This domain consists of armadillo (ARM) repeats.
