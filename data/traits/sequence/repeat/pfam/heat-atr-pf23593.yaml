identifier: Pfam:PF23593
label: Serine/threonine-protein kinase ATR-like, HEAT repeats
definition: >-
  This region of HEAT repeats is found towards the C-terminal of the FAT domain in human Serine/threonine-protein kinase ATR and similar eukaryotic proteins. ATR acts as a DNA damage sensor and is associated with severe disorders such as Seckel syndrome 1. This protein is organised into a large N-terminal α-solenoid containing HEAT repeats, a FAT (FRAP, ATM, TRRAP) domain ( ), a kinase domain ( ), and a C-terminal short segment referred to as FATC ( ). N-terminal part has two continuous HEAT repeat regions, the N-HEAT and the M-HEAT. The FAT domain contains TPR (tetratricopeptide) repeats followed by a HEAT repeat domain.
