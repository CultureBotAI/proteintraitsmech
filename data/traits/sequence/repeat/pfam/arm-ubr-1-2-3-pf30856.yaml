identifier: Pfam:PF30856
label: UBR1/2/3-like ARM repeat domain
definition: >-
  This domain is found in a number of E3 ubiquitin-protein ligases such as UBR1, UBR2, UBR3, UBR11 etc. It is composed of α-helical ARM repeats and defines the helical scaffold of these proteins.
