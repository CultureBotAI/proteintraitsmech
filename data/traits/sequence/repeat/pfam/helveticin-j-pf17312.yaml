identifier: Pfam:PF17312
label: Bacteriocin helveticin-J
definition: >-
  Bacteriocins are biologically active proteins or protein complexes that display a bactericidal mode of action towards closely related species. Bacteriocins produced by lactic acid bacteria are grouped into different classes. Class III of bacteriocins includes large heat liable proteins. Lactobacillus helveticus 481 produces a 37kDa bacteriocin called helveticin J which is a representative for Clas III bacteriocins. These proteins contain a β-propeller-like fold.
