identifier: Pfam:PF12931
label: Sec16 Sec23-binding domain
definition: >-
  COPII coat assembly protein sec16 (Sec16) is a multi-domain vesicle coat protein that binds to COPII-coated vesicles, regulating the transport of secretory proteins from the endoplasmic reticulum. This entry represents the C-terminal domain of Sec16 from eukaryotes and related sequences such as Protein transport protein Sec16A-B and Sec31A-B. This domain adopts a TPR-like fold and has been shown to act as a protein-protein interaction platform that binds Sec23. This interaction is regulated by alternative splicing upon T-cell activation to control protein secretion. Sec16 has also been shown to respond to nutrient signalling, coupling environmental stimuli to secretory capacity. Sec31 is a component of the COPII coat complex that mediates formation of transport vesicles from the ER. The central α-helical unit of Sec31 is structurally similar to four large architectural nucleoporins. This α-helical unit, common to COPII and nuclear pore complex proteins, has been termed the ancestral coatomer element 1 (ACE1).
