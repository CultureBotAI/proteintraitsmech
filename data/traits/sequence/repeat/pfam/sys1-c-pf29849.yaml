identifier: Pfam:PF29849
label: Beta-catenin homolog sys-1 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of beta-catenin homolog sys-1 (sys-1) proteins from nematodes. The specific function of this C-terminal domain remains to be determined. This domain contains TPR-like fold. Sys-1 is a transcription coregulator that is part of the Wnt signalling asymmetry pathway. The protein interacts with TCF transcription factor POP-1 and is involved in asymmetric cell divisions and cell fate specification. Despite low sequence similarity to canonical beta-catenins, the protein displays functional and structural similarities and is considered a highly divergent beta-catenin.
