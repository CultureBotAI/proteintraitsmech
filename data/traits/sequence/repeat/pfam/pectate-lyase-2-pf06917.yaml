label: Periplasmic pectate lyase
definition: >-
  This family consists of several Enterobacterial periplasmic pectate lyase proteins. A major virulence determinant of the plant-pathogenic enterobacterium Erwinia chrysanthemi is the production of pectate lyase enzymes that degrade plant cell walls.
