identifier: Pfam:PF07393
label: Exocyst complex component Sec10-like, alpha-helical bundle
definition: >-
  This entry contains the Sec10 component (approximately 650 residues long) of the eukaryotic exocyst complex, which mediates the tethering of post-Golgi secretory vesicles to the plasma membrane and promotes the assembly of the SNARE complex for membrane fusion. It is also involved in cell polarisation, primary ciliogenesis, cytokinesis, pathogen invasion, tumorigenesis and metastasis. The exocyst is a member of the Complex Associated with Tethering Containing Helical Rods (CATCHRs) which also includes DSL1, COG and GARP complexes, evolutionary related. They share structural features comprising α-helical bundles towards the C-terminal and coiled-coil regions at the N-terminal. This entry represents the α-helical bundles of Sec10 and related proteins, like Recyclin-1 which is involved in recycling plasma membrane proteins internalised by endocytosis and Pof6, that together with skp1, is essential for septum processing and cell separation.
