identifier: Pfam:PF24967
label: TR130 NTS domain
definition: >-
  This domain is found in the yeast Trafficking protein particle complex II-specific subunit 130 (TR130) and related proteins from ascomycetes. TRS130 plays a role in the YPT GEF activity of TRAPP II in concert with the two other TRAPP II-specific subunits TRS65 and TRS120. This protein contains an N-terminal α-solenoid domain, known as NTS domain, followed by four Ig-like domains arranged in tandem. This entry represents the NTS domain. The trafficking protein particle complex TRAPP is a multi-protein complex needed in the early stages of the secretory pathway. To date, two kinds of TRAPP complexes have been studied, TRAPPI and TRAPP II. These complexes differ in subunit composition. TRAPP I binds vesicles derived from the endoplasmic reticulum bringing them closer to the acceptor membrane. TRAPPII activates GTPase Ypt31/Ypt32 as the guanine nucleotide exchange factor in the trans-Golgi network to determine the maturation of Golgi cisternae into post-Golgi carriers in yeast. The TRAPPC10/Trs130 subunit of the TRAPP II complex functions in late Golgi trafficking as a membrane tether. TRAPPII binds the Ypt1 GTPase and probably uses the TRAPPI catalytic core to promote guanine nucleotide exchange. TRS130 plays a role in the YPT GEF activity of TRAPP II.
