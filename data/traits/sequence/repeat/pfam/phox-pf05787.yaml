identifier: Pfam:PF05787
label: Alkaline phosphatase PhoX
definition: >-
  This family consists of proteins predominantly found in bacteria, including Alkaline phosphatase PhoX from Pseudomonas fluorescens ( ), a phosphomonoesterase with no phosphodiesterase activity. This protein adopts a six-bladed β-propeller fold, with the active site located at the bottom of the cavity at the centre of the propeller.
