identifier: Pfam:PF26245
label: Yeast TEL2-interacting protein 1, second TPR domain
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in TEL2-interacting protein 1 (TTI1) and similar proteins from yeast. In S.cerevisiae, this protein is a component of the ASTRA complex involved in chromatin remodeling.
