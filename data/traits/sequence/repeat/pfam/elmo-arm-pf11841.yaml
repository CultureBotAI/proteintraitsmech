identifier: Pfam:PF11841
label: ELMO, armadillo-like helical domain
definition: >-
  This domain is found in eukaryotes and predominantly in ELMO (Engulfment and cell motility) proteins where it may play an important role in defining the functions of the ELMO family members and may be functionally linked to the ELMO domain in these proteins.
