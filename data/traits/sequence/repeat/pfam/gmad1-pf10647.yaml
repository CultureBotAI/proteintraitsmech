identifier: Pfam:PF10647
label: Lipoprotein LpqB beta-propeller domain
definition: >-
  The Gmad1 domain is found associated with in LpqB. It is predicted to have a β-propeller fold and to have a passive binding role rather than a catalytic function owing to the low number of conserved hydrophilic residues. LpqB may modulate activity of the MtrAB system in controlling homeostasis of the cell wall and cell division. It partially restores antibiotic resistance to M.smegmatis in which this gene has been disrupted.
