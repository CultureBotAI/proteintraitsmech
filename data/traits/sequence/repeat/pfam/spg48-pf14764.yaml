identifier: Pfam:PF14764
label: AP-5 complex subunit, vesicle trafficking
definition: >-
  This entry represents a region of ARM-repeats in human AP-5 complex subunit zeta-1. Adaptor protein (AP) complexes facilitate the trafficking of cargo from one membrane compartment of the cell to another by recruiting other proteins to particular types of vesicles. AP-5 is involved in trafficking proteins from endosomes towards other membranous compartments. There are genetic links between AP-5 and hereditary spastic paraplegia, a group of human genetic disorders characterised by progressive spasticity in the lower limbs. AP5Z1 is part of AP-5, a probable fifth adaptor protein complex that may be involved in endosomal transport. This protein has been associated with hereditary spastic paraplegia.
