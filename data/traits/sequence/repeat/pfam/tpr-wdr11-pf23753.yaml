identifier: Pfam:PF23753
label: WDR11 TPR domain
definition: >-
  This entry represents the TPR domain found at the C-terminal of WD repeat-containing protein 11 (WDR11) from animals and similar eukaryotic proteins. Members of the WDR11 family share a domain architecture consisting of two β-propellers followed by a TPR domain. WDR11 has been implicated in human developmental genetic disorders characterised by delayed puberty and infertility. WDR11 modulates the Hedgehog (Hh) signalling pathway and is essential for adequate ciliogenesis. The β-propellers in WDR11 are involved in protein-protein interaction. This are essential for proper interaction with EMX1, a homeodomain transcription factor involved in the development of olfactory neurons. Impaired pubertal development is suggested to result from a deficiency of productive WDR11 protein interaction. WDR11 is also involved in vesicle traffic as it binds TBC1D23, a vesicle-golgin adaptor required for endosome-to-Golgi trafficking. WDR11 is part of the WDR11 complex (consisting of WDR11, C17orf75 and FAM91A) that facilitates the tethering of AP-1-derived vesicles. Mutations of the WDR11 gene have been linked to congenital hypogonadotropic hypogonadism (CHH) and Kallmann syndrome (KS), human developmental genetic disorders defined by delayed puberty and infertility.
