identifier: Pfam:PF29460
label: NXF2 LRR domain
definition: >-
  This entry represents a LRR domain found in NXF2 from flies and similar proteins from diptera. NXF2 may mediate the export of the majority of mRNAs from the nucleus to the cytoplasm. NXF2 forms a complex with Piwi and Nxt1 which acts as an effector of cotranscriptional transposon silencing. On recruitment to a target transcript, it interacts with single-stranded RNA, thereby anchoring the complex via the nascent target transcript to chromatin and allowing Panx to recruit silencing effectors to establish repressive heterochromatin at transposon loci. The human and C.elegans orthologues are shorter; thus, this domain is mostly present in insect orthologues.
