identifier: Pfam:PF23590
label: CCR4-NOT transcription complex subunit 1, NOT1_connector
definition: >-
  This entry represents a region of human CCR4-NOT transcription complex subunit 1 (CNOT1), an scaffolding component of the CCR4-NOT complex, which is one of the major cellular mRNA deadenylases. This region shows several repeats of the HEAT type. Members of this group are predominantly found in animals and fungal and uncharacterised plant sequences.
