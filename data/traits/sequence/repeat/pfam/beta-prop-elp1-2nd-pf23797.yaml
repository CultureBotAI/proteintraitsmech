identifier: Pfam:PF23797
label: ELP1 N-terminal second beta-propeller
definition: >-
  This entry represents second out of two N-terminal β-propeller domains, found in Elongator complex protein 1 (ELP1) from eukaryotes. Elongator is a conserved protein complex implicated in multiple processes including regulation of transcription, alpha-tubulin acetylation, and tRNA modification. Mutations in the ELP1 gene have been shown to cause the neurodegenerative disease familial dysautonomia. ELP1 binds members of the Elongator complex ELP2 and ELP3; and the β-propellers are suggested to act as scaffold for this protein-protein interaction. Also known as IKAP, ELP1 acts as a regulator of IkB kinase complex involved in proinflammatory cytokine signalling. Residues within the central β-propeller have been shown to be required for interaction with upstream regulatory kinase NIK, acting as a scaffold that assembles IKKs with NIK.
