identifier: Pfam:PF24758
label: FBD-associated F-box protein At5g56370, LRR repeats
definition: >-
  This entry represents a domain consisting of leucine-rich repeats (LRRs) mainly found in plant proteins, such as F-box/LRR-repeat protein At3g58940, At1g56610, F-box protein At1g60400 (also known as PEG3) from Arabidopsis thaliana among others. Some of the plant members have been described as components of SCF (ASK-cullin-F-box) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. This entry also includes F-box/LRR-repeat protein 15 from animals, the substrate recognition component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of SMURF1, thereby acting as a positive regulator of the BMP signalling pathway. It is required for dorsal/ventral pattern formation and bone mass maintenance. It also mediates ubiquitination of SMURF2 and WWP2.
