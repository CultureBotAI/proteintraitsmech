identifier: Pfam:PF13329
label: Autophagy-related protein 2
definition: >-
  Pexophagy is an autophagic process consisting of the rapid and selective degradation of peroxisomes. Autophagy-related protein 2 (ATG2) is required for glucose-induced micropexophagy and ethanol-induced macropexophagy in yeast. Homologues of this protein have also been described in mammals and plants. Mammalian ATG2 proteins are thought to function both in autophagosome (a structure that enclose the cytoplasmic materials) formation and regulation of lipid droplet morphology and dispersion. In plants they have a role in programmed cell death, senescence and disease resistance. The Atg2 protein, an integral membrane protein, is required for a range of functions including the regulation of autophagy in conjunction with the Atg1-Atg13 complex. It is a lipid transfer protein required for autophagosome completion and peroxisome degradation. It is a member of the RBG (repeating β-grooves) superfamily, together with VPS13, SHIP164, Csf1, and the Hob proteins, which all share the same structure consisting of long hydrophobic grooves made of multiple repeating modules of five β-sheets followed by a loop.
