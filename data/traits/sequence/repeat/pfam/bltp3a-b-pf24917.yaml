identifier: Pfam:PF24917
label: Bridge-like lipid transfer protein family member 3A/B
definition: >-
  This family consists of bridge-like lipid transfer protein family member 3a/B (also known as UHRF1-binding protein 1 and 1-like proteins. These are tube-forming lipid transport proteins which mediate the transfer of lipids between membranes at organelle contact sites, and they are required for retrograde traffic of vesicle clusters in the early endocytic pathway to the Golgi complex.
