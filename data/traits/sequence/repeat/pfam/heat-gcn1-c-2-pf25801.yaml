identifier: Pfam:PF25801
label: Stalled ribosome sensor GCN1-like, HEAT repeats
definition: >-
  This region of HEAT repeats is found at the C-terminal end of human Stalled ribosome sensor GCN1, which plays a key role in the RNF14-RNF25 translation quality control pathway, a pathway that takes place when a ribosome has stalled during translation, and which promotes ubiquitination and degradation of translation factors on stalled ribosomes.
