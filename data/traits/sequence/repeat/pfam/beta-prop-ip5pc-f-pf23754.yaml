identifier: Pfam:PF23754
label: IP5P C-F beta-propeller
definition: >-
  This entry represents the β-propeller domain found in plant inositol polyphosphate 5-phosphatases (IP5P), including Type I IP5P12/IP5PC and IP5P13/IP5PD, Type II IP5P14/IP5PE and IP5P15/IP5PF from Arabidopsis thaliana. In the case of IP5P13, the β-propeller domain interacts with the sucrose non-fermenting-1-related kinase (SnRK1.1) in order to achieve a regulatory role linking inositol, sugar and stress signalling. IP5Ps have different functions, including the degradation of phosphoinositides in the signalling pathways of various cellular processes such as Ca2+ release, abscisic acid signalling and vesicle trafficking, among others.
