identifier: Pfam:PF30481
label: ETO1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in ETO1 (Ethylene Overproducer 1) and ETO1-like (EOL) proteins from land plants. These proteins function as substrate-specific adaptors that connect type-2 1-aminocyclopropane-1-carboxylate synthase (ACS) enzymes to CUL3- based ubiquitin ligase complexes, leading to proteasomal degradation of ACS and regulation of ethylene biosynthesis. The specific function of this N-terminal domain remains to be determined.
