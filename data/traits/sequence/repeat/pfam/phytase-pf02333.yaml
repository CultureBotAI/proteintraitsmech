identifier: Pfam:PF02333
label: Phytase
definition: >-
  Phytase ( ) (phytate 3-phosphatase) is a secreted enzyme which hydrolyses phytate to release inorganic phosphate. According to their three-dimensional structures and catalytic mechanisms, phytases are classified into different groups, one of them the β-propeller phytases. The β-propeller phytase domain is made of six blades. Each blade is a highly curved sheet composed of four to five antiparallel β-strands that are connected in a topologically identical manner. The fourth strand of each blade is connected across the top of the molecule to the first strand of the next blade. The six blades are aligned along the shaft of the propeller, which is a distinct central channel filled with many well-bound water molecules. Between the blades, extensive hydrophobic interactions are observed.
