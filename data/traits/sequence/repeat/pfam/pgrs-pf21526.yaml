identifier: Pfam:PF21526
label: PGRS repeats
definition: >-
  This entry represents a region of repeats present in a group of proteins from Mycobacteriales named PE_PGRSs, with members implicated in tuberculosis (TB) pathogenesis. Proteins of this family show a modular structure: the N-terminal PE domain ( ), highly homologous to the domain found in tens of other PE proteins and whose structure has been already solved by crystallography; a C-terminal domain that is unique for each protein; and a central polymorphic glycine-rich repeat (PGRS) that varies in length from few tens to more than 1,000 amino acids.
