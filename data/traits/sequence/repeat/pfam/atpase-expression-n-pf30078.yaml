identifier: Pfam:PF30078
label: ATPase expression protein 2, mitochondrial N-terminal
definition: >-
  This entry represents the N-terminal domain in ATPase expression protein 2 (AEP2) found in fungi. These proteins are required for translation of the mitochondrial OLI1 transcript coding for the mitochondrial ATP synthase subunit 9. This protein contains a TPR-like fold.
