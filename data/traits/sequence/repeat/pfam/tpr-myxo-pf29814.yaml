identifier: Pfam:PF29814
label: Myxococcota tetratricopeptide repeat protein family
definition: >-
  This entry represents a tetratricopeptide repeat (TPR) domain, found in Uncharacterized 18.1 kDa protein in carS 3'region from Myxococcota including Pyxidicoccus, Hyalangium and Melittangium species, among others. TPR domains are structural motifs involved in protein-protein interactions. The function of this protein remains to be determined.
