identifier: Pfam:PF13525
label: Outer membrane lipoprotein
definition: >-
  BamD, also called YfiO, is part of the β-barrel assembly machinery (BAM), which is essential for the folding and insertion of outer membrane proteins (OMPs) in the OM of Gram-negative bacteria. Transmembrane OMPs carry out important functions including nutrient and waste management, cell adhesion, and structural roles. The BAM complex is composed of the β-barrel OMP BamA (also called Omp85/YaeT) and four lipoproteins BamBCDE. BamD is the only BAM lipoprotein required for viability. Both BamA and BamD are broadly distributed in Gram-negative bacteria, and may constitute the core of the BAM complex. BamD contains five tetratricopeptide repeats (TPRs). The three TPRs at the N terminus may participate in interaction with substrates, while the two TPRs in the C terminus may be involved in binding with other BAM components.
