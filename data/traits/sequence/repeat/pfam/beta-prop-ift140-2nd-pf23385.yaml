identifier: Pfam:PF23385
label: IFT140 second beta-propeller
definition: >-
  This entry represents the second β-propeller of IFT140. IFT140 is one of the core components (together with WDR19/IFT144 and IFT122) of the IFT-A complex which is required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors (GPCRs), being involved in cilia function and/or assembly. IFT-A polymerises interacts with IFT-B, and uses an array of β-propeller and TPR domains to create 'carriages' of the IFT train that engage TULP adaptor proteins. The β-propeller domains of IFT140 contact the β-propeller domains of IFT121 from the adjacent complex.
