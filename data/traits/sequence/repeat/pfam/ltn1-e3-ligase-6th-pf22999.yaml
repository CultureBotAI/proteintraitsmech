identifier: Pfam:PF22999
label: LTN1 family HEAT repeat region
definition: >-
  This entry represents a series of HEAT repeats from the LTN1 family of proteins. The LTN1 family consists of E3 ubiquitin-protein ligases that are integral components of the ribosome quality control complex (RQC). The RQC is a ribosome-associated complex responsible for the ubiquitination and subsequent extraction of incompletely synthesized nascent polypeptides for proteasomal degradation. Members of the LTN1 family are recruited to stalled 60S ribosomal subunits, often by NEMF, to mediate the ubiquitination of stalled nascent chains. This ubiquitination event is crucial for the recruitment of VCP/p97 or CDC48, which facilitates the extraction and degradation of the incomplete translation products. In some species, LTN1 proteins also ubiquitinate proteins derived from mRNAs lacking stop codons or translation arrest products induced by specific sequences. Additionally, they may play a role in chromatin function and transcription regulation indirectly.
