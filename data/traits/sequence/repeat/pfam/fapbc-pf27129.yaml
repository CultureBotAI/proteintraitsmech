identifier: Pfam:PF27129
label: Functional amyloid protein FapB/FapC family
definition: >-
  This entry represents the FapB/FapC family of functional amyloid proteins found in Pseudomonas species. These proteins are components of the Fap (functional amyloid in Pseudomonas) system that forms extracellular amyloid fibrils. FapC is the major structural component of the amyloid fibrils, while FapB is a minor component that likely nucleates fibril formation. Both proteins contain an N-terminal signal peptide for secretion and multiple imperfect repeats: FapB contains three repeats of approximately 35 residues each, while FapC contains three repeats of approximately 34 residues connected by linker regions. FapC also contains a C-terminal Cys-X-X-Cys motif. The Fap amyloid fibrils are highly stable, resistant to boiling in 2% SDS and requiring greater than 90% formic acid to dissolve. Overexpression of the fap operon (fapA-fapF) causes cell aggregation and increased biofilm formation, though deletion of the entire locus shows no visible growth phenotype under laboratory conditions. The functional amyloids contribute to biofilm stability and may play a role in cell adhesion during surface colonisation.
