identifier: Pfam:PF01839
label: FG-GAP repeat
definition: >-
  This entry represents a conserved unique core sequence shared by large numbers of proteins. It is occasionally found in the Archaea, including Methanosarcina barkeri) but commonly found in the bacteria and eukaryotes. Most fall into two large classes. One class consists of long proteins in which two classes of repeats are abundant: an FG-GAP repeat ( ) class, and an RHS repeat ( ) or YD repeat ( ). This class includes secreted bacterial insecticidal toxins and intercellular signalling proteins such as the teneurins in animals. The other class consists of uncharacterised proteins shorter than 400 amino acids, where this core domain of about 75 amino acids tends to occur in the N-terminal half. Over twenty such proteins are found in Pseudomonas putida alone; little sequence similarity or repeat structure is found among these proteins outside of this domain.
