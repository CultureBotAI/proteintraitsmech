identifier: Pfam:PF30552
label: CFAP251 N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in cilia- and flagella-associated protein 251 (CFAP251, also known as WDR66). This domain is found in metazoans and ciliates. The full-length protein CFAP251 is a component of the radial spoke complex and is involved in ciliary and flagellar motility. In Tetrahymena thermophila, CFAP251 is required for the assembly of radial spoke 3. In humans, mutations in CFAP251 cause spermatogenic failure due to defective sperm flagella. This domain contains a β-propeller fold.
