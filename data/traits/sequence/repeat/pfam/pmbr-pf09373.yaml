identifier: Pfam:PF09373
label: Pseudomurein-binding repeat
definition: >-
  Methanothermobacter thermautotrophicus (Methanobacterium thermoformicicum) is a methanogenic Gram-positive microorganism with a cell wall consisting of pseudomurein. This repeat specifically binds to pseudomurein. This repeat is found at the N-terminal of PeiW and PeiP which are pseudomurein binding phage proteins.
