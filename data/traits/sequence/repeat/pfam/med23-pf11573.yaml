identifier: Pfam:PF11573
label: Mediator complex subunit 23
definition: >-
  Med23 is one of the subunits of the Tail portion of the Mediator complex that regulates RNA polymerase II activity. Med23 is required for heat-shock-specific gene expression, and has been shown to mediate transcriptional activation of E1A in mice.
