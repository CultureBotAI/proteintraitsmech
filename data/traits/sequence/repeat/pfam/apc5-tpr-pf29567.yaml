identifier: Pfam:PF29567
label: Anaphase-promoting complex subunit 5 central TPR domain
definition: >-
  This entry represents the central tetratricopeptide repeat (TPR) domain found in Suppressor of spindle checkpoint defect 1 (Such-1), Protein gfi-3 from Caenorhabditis elegans and related sequences from nemaotdes, which are related to APC5. Such-1 is probably a component of the anaphase promoting complex/cyclosome (APC/C), a cell cycle-regulated E3 ubiquitin ligase that controls progression through mitosis and the G1 phase of the cell cycle. It is required for the metaphase to anaphase transition in meiosis and plays a role in the segregation of DNA and centrioles during meiosis in male germ cells. This central TPR domain contains multiple tetratricopeptide repeats that are six to seven residues longer than canonical TPR motifs. The specific function of this domain remains to be determined.
