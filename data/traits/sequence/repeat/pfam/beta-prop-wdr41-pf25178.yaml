identifier: Pfam:PF25178
label: WDR41
definition: >-
  WDR41 is the non-catalytic component of the C9orf72-SMCR8 complex, a complex that has guanine nucleotide exchange factor (GEF) activity and regulates autophagy. This complex also acts as a negative regulator of autophagy initiation by interacting with the ULK1/ATG1 kinase complex and inhibiting its protein kinase activity. WDR41 plays an essential role in C9orf72 lysosome recruitment, which is important for lysosomal responses to changes in acid availability. WDR41 also interacts with PQLC2, a lysosomal cationic amino acid transporter that serves as a sensor that responds to scarcity of its substrates by recruiting C9orf72-SMCR8-WDR41 complex to the surface of lysosomes.
