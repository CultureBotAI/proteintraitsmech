identifier: Pfam:PF25210
label: FKB95, Kelch-repeats domain
definition: >-
  This entry represents the N-terminal Kelch domain found in plant proteins that are also associated with a F-box domain ( ), such as FKB95 from Arabidopsis thaliana, also known as At1g61540. FKB95 is a component of SCF (ASK-cullin-F-box) E3 ubiquitin ligase complexes, which mediate the ubiquitination and subsequent proteasomal degradation of target proteins. The F-box/kelch-repeat proteins are involved in various cellular processes through the formation of SCF (SKP1-cullin-F-box) E3 ubiquitin ligase complexes. These complexes play a crucial role in the ubiquitination and subsequent proteasomal degradation of target proteins, thereby regulating protein turnover. Some proteins are also known to be involved in seed germination. The F-box domain is essential for the interaction with SKP1 (ASK in Arabidopsis), while the kelch repeats may be involved in substrate recognition.
