identifier: Pfam:PF29558
label: CBP1/cbp8
definition: >-
  This entry includes cbp8 from fission yeast and its orthologue from Baker's yesst CBP1. cbp8 is a translation factor for cob1/cytochrome b and it plays a role in cob1 mRNA stabilization and required for correct folding of the protein. CBP1 is responsible for conferring a stable 5'-end on cytochrome b mRNA.
