identifier: Pfam:PF30718
label: Tel1 spiral domain
definition: >-
  This domain is found in the Serine/threonine-protein kinase tel1 and related proteins. Tel1 is a large kinase that resides in the cell in an autoinhibited dimeric state and upon activation orchestrates the cellular response to DNA damage. The domain represented by this entry is composed of HEAT repeats and together with the pincer domain was shown to bind DNA.
