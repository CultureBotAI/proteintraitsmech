identifier: Pfam:PF12331
label: Rad26-like, helical repeats
definition: >-
  This domain is found in fungal proteins, including Rad26 ( ) from Myceliophthora thermophila, a functional subunit of the Rad3-Rad26 complex that is responsible for bringing the kinase to sites of DNA damage. The central region of Rad26 is formed by five helical repeats forming an α-solenoid arrangement.
