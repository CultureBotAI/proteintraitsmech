identifier: Pfam:PF25567
label: SYO1-like, TPR repeats
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in Synchronised import protein 1 from Saccharomyces cerevisiae (SYO1), human HEAT repeat-containing protein 3 (HEATR3) and similar eukaryotic proteins. SYO1 and HEATR3 are involved in ribosome biogenesis and nuclear import, functioning as adaptor proteins that facilitate the transport of ribosomal components into the nucleus. Specifically, SYO1 acts as a nuclear import adaptor that recruits the functionally and topologically linked ribosomal proteins RPL5 and RPL11. HEATR3 also contributes to ribosome biogenesis by mediating the nuclear import of the 60S ribosomal protein RPL5, also known as large ribosomal subunit protein uL18. These proteins are essential for the proper assembly of the ribosome, ensuring the coordinated delivery of RPL5 and RPL11 to the nascent 5S rRNA within the nucleus. In addition to their roles in ribosome assembly, they are critical for erythrocyte maturation, highlighting their broader importance in cellular development and function.
