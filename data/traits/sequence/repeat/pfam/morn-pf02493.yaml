identifier: Pfam:PF02493
label: MORN repeat
definition: >-
  This entry represents MORN (Membrane Occupation and Recognition Nexus) repeat. This repeat was identified in multiple copies in several proteins including junctophilins. More recently it was found that MORN repeat proteins are quite ubiquitous and are present in both eukaryotes and prokaryotes. The number of MORN repeats in any given protein can vary greatly, from 2 to over 20, and they are found in combination with a wide range of other domains. MORN repeats are generally assumed to be lipid-binding modules. Structurally, MORN repeat is composed of a β-hairpin followed by a short loop that connects to the next MORN repeat.
