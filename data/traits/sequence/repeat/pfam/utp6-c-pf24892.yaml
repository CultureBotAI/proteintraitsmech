identifier: Pfam:PF24892
label: U3 small nucleolar RNA-associated protein 6 C-terminal
definition: >-
  U3 small nucleolar RNA-associated protein 6 homolog (UTP6) is a component of the small subunit (SSU) processome containing the U3 snoRNA that is involved in processing of pre-18S rRNA. These proteins consist of TPRs; this entry represents the C-terminal region of UTP6 and similar sequences predominantly found in animals and some plant species.
