identifier: Pfam:PF20808
label: Msx2-interacting protein, RAM7 domain
definition: >-
  This is the RBP-J binding domain (RAM7) found in the central region of Msx2-interacting protein (MINT), a widely expressed transcription repressor that regulates key transcription effectors in several signalling pathways, including MSX2, RBP-J, and nuclear receptors. Structure predictions from AlphaFold suggest that this domain adopts a β-solenoid structure which includes VNVLTGP/VNVLTTP repeats. RAM7 domain from MINT competes with the RAM domain of Notch for physical interaction with RBP-J. Through this domain, MINT sequesters and prevents RBP-J DNA binding thus, precluding trans-activation directed by the RBP-J coadapter, Notch1 intracellular domain.
