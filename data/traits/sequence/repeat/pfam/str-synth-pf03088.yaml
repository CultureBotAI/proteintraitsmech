identifier: Pfam:PF03088
label: Strictosidine synthase
definition: >-
  This entry represents a conserved region found in plant strictosidine synthase ( ), a key enzyme in alkaloid biosynthesis. It catalyses the Pictet-Spengler stereospecific condensation of tryptamine with secologanin to form strictosidine. The structure of the native enzyme from the Indian medicinal plant Rauvolfia serpentina (Serpentwood) (Devilpepper) represents the first example of a six-bladed four-stranded β-propeller fold from the plant kingdom. This region is also found in animal Adipocyte plasma membrane-associated proteins (APMAP). In human, APMAP exhibits strong arylesterase activity with beta-naphthyl acetate and phenyl acetate and may play a role in adipocyte differentiation. A group of uncharacterised bacterial proteins also belongs to this group of proteins.
