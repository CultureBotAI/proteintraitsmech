identifier: Pfam:PF24105
label: CAF1B/HIR1 beta-propeller domain
definition: >-
  This entry represents the β-propeller domain found in chromatin assembly factor 1 subunit CAF1B (also known as p60 subunit) from animals, and its homologues Cac2 from yeasts and FAS from plants. These proteins are involved in DNA synthesis-coupled chromatic assembly in S-phase and chromatin assembly following DNA repair alongside other CHAF proteins in what is known as CAF1 complex. In plants, the loss of activity of the CAF1 pathway causes delay and arrest of the cell cycle during pollen development. The CAF1 complex is also required for stable maintenance of telomeres and 45S rDNA in Arabidopsis. This domain is involved in CAF1B interactions with other CAF1 complex subunits. This entry also includes histone cell cycle regulator HIRA from animals and their yeast orthologues HIR1, which are required in replication-independent chromatic assembly. The β-propeller of HIRA proteins is involved in the protein interactions with Ubinuclein-1 (UBN1) to achieve chromatic-remodelling pathway in senescent cells.
