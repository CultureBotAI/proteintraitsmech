identifier: Pfam:PF21164
label: Dumpy, DPY module
definition: >-
  This entry represents the DPY repeat module described in dumpy from Drosophila melanogaster ( ), a gigantic extracellular matrix protein that contains epidermal growth factor (EGF) modules interspersed with DPY modules. The DPY module forms a compact fold consisting of a small N-terminal 3-10 helix packed against a double-stranded antiparallel disulphide-stabilised β-sheet motif capable of linking end-to-end with EGF modules to form a fibre.
