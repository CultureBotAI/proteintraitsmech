identifier: Pfam:PF25827
label: Tepsin VHS/ENTH-like domain
definition: >-
  This entry describes the VHS/ENTH-like domain found in human AP-4 complex accessory subunit Tepsin and similar animal proteins. The Epsin N-Terminal Homology (ENTH) domain is an evolutionarily conserved protein module found primarily in proteins that participate in clathrin-mediated endocytosis. ENTH is structurally similar to the VHS domain and is composed of a superhelix of eight α-helices. ENTH domains bind both, inositol phospholipids and proteins. They contribute to the nucleation and formation of clathrin coats on membranes. Tepsin associates with the Adapter-like complex 4 (AP-4) and may therefore play a role in vesicular trafficking of proteins at the trans-Golgi network.
