identifier: Pfam:PF06743
label: FAST kinase-like protein, subdomain 1
definition: >-
  This entry represents a conserved region of eukaryotic Fas-activated serine/threonine (FAST) kinases that contains several conserved leucine residues. This domain can be found in the FASTK family members, including FASTK, FASTKD1, FASTKD2 and FASTKD5. FAST kinase has been shown to be rapidly activated during Fas-mediated apoptosis, when it phosphorylates TIA-1, a nuclear RNA-binding protein that has been implicated as an effector of apoptosis. However, a critical active site residues are not conserved within the family and their kinase activity has been questioned.
