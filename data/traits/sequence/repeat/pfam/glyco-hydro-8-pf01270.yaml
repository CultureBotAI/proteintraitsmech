identifier: Pfam:PF01270
label: Glycosyl hydrolases family 8
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 8 comprises enzymes with several known activities; endoglucanase ( ); lichenase ( ); chitosanase ( ). These enzymes were formerly known as cellulase family D.
