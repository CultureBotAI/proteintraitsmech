identifier: Pfam:PF20919
label: 'DWD hypersensitive to UV-B 1, N-terminal '
definition: >-
  This entry represents the N-terminal domain of DWD hypersensitive to UV-B 1 from Arabidopsis thaliana and related plant sequences, which may act as a substrate receptor of a CUL4-RING E3 ubiquitin-protein ligase (CRL4) complex involved in the negative regulation of cellular responses to ultraviolet-B (UV-B) illumination, likely in coordination with RUP1. It interacts with COP1 and probably prevents the formation of active UVR8-COP1 complex thus avoiding UVR8-COP1-mediated positive regulation of UV-B responses. DHU1 consists of two domains, LRR included in this entry and WD40 ( ), which mediate protein-protein interactions.
