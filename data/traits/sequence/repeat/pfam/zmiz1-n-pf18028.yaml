identifier: Pfam:PF18028
label: Zmiz1 N-terminal tetratricopeptide repeat domain
definition: >-
  This is the N-terminal domain found in ZMIZ1 proteins. Functional analysis indicates that the N-terminal Domain of ZMIZ1 is important for driving Myc transcription and proliferation. ZMIZ1 is a transcriptional regulator that functions as a direct cofactor of Notch1, modulating Notch target gene expression through interaction with the RAM1 domain via its N-terminal tetratricopeptide repeat (TPR) domain ( ). It has been shown that ZMIZ1 and Notch1 cooperatively recruit one another to chromatin through direct TPR-mediated interaction, leading to a modest increase in activating histone marks and a corresponding reduction in repressive marks. In addition to its role in Notch signalling, ZMIZ1 enhances ligand-dependent transcriptional activity of the androgen receptor (AR) and promotes AR sumoylation,. It also acts as a coactivator in the TGF-beta signalling pathway by potentiating the transcriptional activity of the SMAD3/SMAD4 complex.
