identifier: Pfam:PF25852
label: DUF6242 beta propeller domain
definition: >-
  This entry represents the C-terminal β-propeller domain of Outer membrane protein assembly factor BamI from Bacteroides thetaiotaomicron and similar proteins from bacteria. BamI is part of the outer membrane assembly machinery complex, which is involved in the assembly and insertion of β-barrel proteins into the outer membrane.
