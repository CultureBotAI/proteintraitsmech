identifier: Pfam:PF12031
label: 'SWI/SNF-like complex subunit BAF250/Osa '
definition: >-
  This domain can be found in the mammalian BAF250a/b and its homologue osa from fruit flies. They are part of the SWI/SNF-like ATP-dependent chromatin remodelling complex that regulates gene expression through regulating nucleosome remodelling. In humans there are two BAF250 isoforms, BAF250a/ARID1a and BAF250b/ARID1b. BAF250a/b may be E3 ubiquitin ligases that target histone H2B.
