identifier: Pfam:PF23419
label: E3 ubiquitin-protein ligase RFWD3 WD40 domain
definition: >-
  This entry represents the WD40-repeat (WDR) domain of the E3 ubiquitin-protein ligase RFWD3, a protein required for the repair of DNA interstrand cross-links (ICL) in response to DNA damage. This domain is responsible for the functional interactions that allow RFWD3 to maintain genomic stability.
