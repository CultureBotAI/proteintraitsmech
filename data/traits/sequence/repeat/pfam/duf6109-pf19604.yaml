definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000069) is described by MIBiG as an example of the following biosynthetic class, polyketide. It includes a member from the gephyronic acid biosynthetic gene cluster from Archangium violaceum Cb vi76 and appears to be predominantly found in bacteria.
