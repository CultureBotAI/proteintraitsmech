identifier: Pfam:PF30700
label: GAC ARM domain
definition: >-
  This ARM domain is found in the Toxoplasma gondii glideosome-associated connector (GAC) which is a giant armadillo-repeat protein, essential for parasite motility and conserved across Apicomplexa. It connects actin filaments to the plasma membrane via interactions with phosphatidic acid and membrane-spanning adhesins.
