identifier: Pfam:PF23185
label: CFAP43 N-terminal domain
definition: >-
  This entry represents the first β-propeller domain found at the N-terminal of Cfap43 from Trypanosoma sp, and similar sequences from lower eukaryotes, according to structural prediction. These proteins are essential for flagellar function and, consequently, cell proliferation in T. brucei. Cfap43 is an evolutionarily conserved protein which contains two β-propellers at its N-terminal and 6 low/high probability coiled-coils at its C-terminal. Cfap43 is involved in sperm flagellum axoneme organisation and function and in the regulation of the beating frequency of motile cilia on the epithelial cells of the respiratory tract.
