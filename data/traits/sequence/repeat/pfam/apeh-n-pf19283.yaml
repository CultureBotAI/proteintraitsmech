identifier: Pfam:PF19283
label: Acylamino-acid-releasing enzyme, N-terminal domain
definition: >-
  This entry represents the N-terminal domain from the Acylamino-acid-releasing enzyme (AARE) ( ) from eukaryotes. This protein catalyses the hydrolysis of the N-terminal peptide bond of an N-acetylated peptide to generate an N-acetylated amino acid and a peptide with a free N-terminal. In Arabidopsis, AARE plays a homeostatic role in sustaining the cytoplasmic antioxidative system and may contribute to the elimination of the oxidized proteins in the cytoplasm. This domain does not represent the catalytic domain which is found at the C-terminal of these proteins.
