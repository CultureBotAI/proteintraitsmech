label: Family of unknown function (DUF7453)
definition: >-
  This entry represents a group of uncharacterised sequences from bacteria. According to structure predictions, these proteins may comprise novel repeats consisting of an arrangement of four β-strands in which the second one is longer and curved. This arrangement is repeated eight times in , which forms a closed repeat. Some proteins contain NxxGxxAF repeat with a similar fold.
