identifier: Pfam:PF23241
label: PRP39 C-terminal HAT repeat
definition: >-
  This entry represents the C-terminal segment of the HAT (Half A TPR) repeat proteins including Pre-mRNA-processing factor 39, SART3, PRP42 and similar proteins. PRP39 is a component of the spliceosome that functions prior to stable branch point recognition by the U1 snRNP particle to facilitate or stabilize the U1 snRNP/5'-splice site interaction and has a direct role in spliceosome assembly. PRP42 from yeast is an essential component of the U1 snRNP particle, which recognises and binds the 5'-splice site of pre-mRNA.
