identifier: Pfam:PF03177
label: Non-repetitive/WGA-negative nucleoporin C-terminal
definition: >-
  This is the C-terminal half of a family of nucleoporin proteins. Nucleoporins are the main components of the nuclear pore complex in eukaryotic cells, and mediate bidirectional nucleocytoplasmic transport, especially of mRNA and proteins. Two nucleoporin classes are known: one is characterised by the FG repeat and the other is represented by this family, which lacks any repeats. RNA undergoing nuclear export first encounters the basket of the nuclear pore and many nucleoporins are accessible on the basket side of the pore.
