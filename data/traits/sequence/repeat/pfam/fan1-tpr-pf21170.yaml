identifier: Pfam:PF21170
label: Fanconi-associated nuclease 1, TPR domain
definition: >-
  This entry represents the TPR domain from Fanconi-associated nuclease 1 (FAN1) and similar sequences from eukaryotes. FAN1 mediates inter-domain interactions and is part of the dimerisation interface. This protein is a DNA structure-specific nuclease involved in processing DNA interstrand crosslinks. FAN1 maintains genomic stability and prevents tissue decline in multiple organs. It mediates cancer drug resistance in several cancer subtypes.
