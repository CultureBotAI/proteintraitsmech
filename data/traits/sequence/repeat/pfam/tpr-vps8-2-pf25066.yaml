identifier: Pfam:PF25066
label: VPS8-like, TPR-like repeats
definition: >-
  This region of TPR-like repeats is found towards the C-terminal of Vacuolar protein sorting-associated protein 8 from S. cerevisiae (VPS8) and similar eukaryotic proteins. VPS8 is involved in the retention of proteins to the late-Golgi and plays an integral role in the complex vacuolar protein sorting process. This domain is not present in S.pombe which could be a result of a deletion event.
