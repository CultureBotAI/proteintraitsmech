identifier: Pfam:PF22871
label: AimR transcriptional regulator-like
definition: >-
  This entry represents a group of proteins found in tailed bacteriophages and prophages mainly found in firmicutes, including AimR transcriptional regulator from Bacillus phage. AimR (arbitrium receptor), which is a part of the so-called phage arbitrium system, is a DNA-binding phage regulatory protein that acts as a receptor for a 6-amino acid signalling peptide cleaved from the C terminus of AimP. AimR controls expression of AimX, the third member of the quorum sensing-like arbitrium system and an inhibitor of phage lysogeny. The arbitrium system enables a descendant phage to 'communicate' with its predecessors, that is, to estimate the amount of recent previous infections and hence decide whether to employ the lytic or lysogenic cycle. AimR assembles an α-α superhelix fold and accommodates the signalling peptide encircled by its tetratricopeptide repeats, which is reminiscent of RRNPP family members from the quorum-sensing system. With or without the peptide, AimR dimerises through the C-terminal capping helix. It contains HTH motif at the N terminus that is crucial for DNA targeting. This group of proteins also includes YopK from Bacillus subtilis.
