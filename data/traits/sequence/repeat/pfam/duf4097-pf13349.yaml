identifier: Pfam:PF13349
label: Toastrack DUF4097
definition: >-
  This region has a putative all-β structure with a twenty-residue repeat with a highly conserved repeating GD, gly-asp, motif that has been described as Toastrack DUF4097, whose function is unknown. In bacteria, it may form part of an adhesin, such as LiaX from Enterococcus faecalis. This entry also includes eukaryotic proteins, such as FAM185A from human and its orthologues in animals and other eukaryotes, as Toastrack has been transferred from bacteria to certain eukaryotes. LiaX is involved in cell membrane remodelling, regulating content and localisation of anionic phospholipids. It binds to the antibiotic daptomycin (DAP) and to cationic antimicrobial peptides, such as human LL-37, perhaps functioning as a sensor that activates the cell envelope stress response.
