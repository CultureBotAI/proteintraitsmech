identifier: Pfam:PF20927
label: Huntingtin, C-terminal HEAT
definition: >-
  This entry represents the C-terminal domain of Huntingtin (Htt), which consists of HEAT repeats. Htt is expressed in many tissues with various expression levels and is involved in a number of cellular functions. However, its exact function is not yet clear. An an abnormal polyglutamine (polyQ) expansion in this protein causes Huntington's disease (HD) a progressive autosomal-dominant neurodegenerative disease characterised by an uncontrolled motor movement known as chorea, cognitive disorder and depression. HTT consists of multiple HEAT repeats organised in N-terminal ( and ), bridge ( ) and C-terminal domains, which function as a scaffold that mediated interactions with binding partners. It has been suggested that the polyQ expansion in Htt alters phosphorylation status along the protein which affects its structure and function. In particular, modifications of phosphorylation in this domain induce conformational changes that impair its movement and interaction with the N-HEAT domain.
