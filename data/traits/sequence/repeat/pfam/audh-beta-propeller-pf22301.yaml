identifier: Pfam:PF22301
label: Aldos-2-ulose dehydratase, beta-propeller domain
definition: >-
  This domain is found in Aldos-2-ulose dehydratase from Phanerodontia chrysosporium (AUDH) and similar sequences from invertebrates, fungi and bacteria. AUDH is a bifunctional enzyme which catalyses the dehydration of anhydrofructose into ascopyrone M, and the isomerisation of ascopyrone M into microthecin. It is organised into three domains: an N-terminal domain with a β-propeller fold (this entry), a middle domain containing two cupin folds ( ) and a C-terminal lectin domain. This domain folds into a seven-bladed β-propeller, where each blade is made up of a four-stranded, antiparallel β-sheet.
