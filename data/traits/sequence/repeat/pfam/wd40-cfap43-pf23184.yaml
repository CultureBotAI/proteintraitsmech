identifier: Pfam:PF23184
label: CFAP43, WD40 domain
definition: >-
  This entry represents the second β-propeller domain found in Cfap43 protein from Trypanosoma brucei brucei and related sequences mainly from Kinetoplastids. This protein is located between the doublet microtubules 5 and 6 and associated with the axoneme along the paraflagellar rod. Cfap43 is an evolutionarily conserved protein which contains two β-propellers at its N-terminal and 6 low/high probability coiled-coils at its C-terminal. Cfap43 is involved in sperm flagellum axoneme organisation and function and in the regulation of the beating frequency of motile cilia on the epithelial cells of the respiratory tract.
