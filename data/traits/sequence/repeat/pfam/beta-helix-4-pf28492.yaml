identifier: Pfam:PF28492
label: Pectate-lyase like beta helix domain
definition: >-
  This entry represents β-helix domains primarily found in Pseudomonadati species of bacteria. Proteins usually contain at least two copies of this domain, but some have as many as five copies and some others only one. These proteins often contain an N-terminal lipoprotein attachment motif suggesting they are anchored to the bacterial cell membrane and may have a role in adherence or processing of carbohydrate substrates.
