identifier: Pfam:PF11846
label: Virulence factor membrane-bound polymerase, C-terminal
definition: >-
  Wzy is a membrane-bound polymerase of 12 TMs, found in Gram-positive bacteria such as Streptococcus pnuemoniae. It forms part of the EPS or exopolysaccharide system. This entry represents the 6xTMs at the C-terminal end of the molecule. Wzy functions in polymerising the oligosaccharide repeat subunits to form high-molecular-weight capsular polysaccharides. A contiguous emebrane-bound flippase, Wzx ( ), transports the repeat units to the external surface of the membrane. These polysaccharides form the capsule and their differing compositions contribute to the multidudinous pneumococcal capsular serotypes, all being structurally and antigenically different.
