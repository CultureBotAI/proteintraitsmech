identifier: Pfam:PF05131
label: Pep3/Vps18/deep orange beta-propeller domain
definition: >-
  This domain is found N-terminal in a number of proteins involved in Golgi function and vacuolar sorting Vps18 and Pep3. The molecular function of this region is unknown. Some proteins containing this domain also contain a C-terminal ring finger domain. Vacuolar sorting protein 18 (Vps18) and Vacuolar membrane protein pep3 (Pep3) are involved in vesicle-mediated protein trafficking to lysosomal compartments, playing a crucial role in endocytic membrane transport and autophagic pathways. They act as a core component of the HOPS and CORVET endosomal tethering complexes, facilitating the conversion of Rab5 to Rab7 endosomes and mediating tethering and docking events during SNARE-mediated membrane fusion. The HOPS complex is recruited to Rab7 on the late endosomal membrane, regulating late endocytic, phagocytic, and autophagic traffic towards lysosomes. The CORVET complex functions as a Rab5 effector, mediating early endosome fusion. These proteins are essential for processes such as vacuolar biogenesis, lysosome biogenesis, and the degradation of apoptotic cells. They also play roles in embryogenesis, root development, and dendrite development in various organisms.
