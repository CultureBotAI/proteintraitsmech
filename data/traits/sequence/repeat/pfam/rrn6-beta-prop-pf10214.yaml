identifier: Pfam:PF10214
label: Rrn6, beta-propeller
definition: >-
  This entry represents the β-propeller domain of Rrn6 which is part of the palm (or module I in) of the CF which interacts with Rrn11. Rrn6 is the fungal homologue of TAF1C. Members of this entry are specific to fungi. RNA polymerase I-specific transcription-initiation factor Rrn6 is a component of a multisubunit core transcription factor, essential for the initiation of rDNA transcription by Pol I. The DNA-bound core factor (CF) resembles a right hand holding the DNA molecule between the fingers and the palm, with the thumb pointing toward Pol I. The palm is composed of the N-terminal regions of Rrn11 and Rrn6, the thumb is composed of the C-terminal of Rrn11 while the fingers and knuckles are composed of Rrn7 and the C-terminal half of Rrn6, respectively.
