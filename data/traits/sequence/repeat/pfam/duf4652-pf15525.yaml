identifier: Pfam:PF15525
label: Domain of unknown function (DUF4652)
definition: >-
  This family of uncharacterised proteins from Clostridia and Bacilli classes has an unusual structure of three β propeller repeats that do not form a barrel, as in well known 6-, 7- etc β propeller barrels, but instead are stacked in a three-layer β-sheet sandwich. The function of all the proteins from this family is unknown.
