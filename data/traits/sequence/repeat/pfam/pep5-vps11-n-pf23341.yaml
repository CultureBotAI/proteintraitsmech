identifier: Pfam:PF23341
label: PEP5/VPS11 N-terminal
definition: >-
  This entry represents the β-propeller domain found at the N-terminal of the Pep5-like zinc finger protein from Schizosaccharomyces pombe and its orthologues from human and mice known as vacuolar protein sorting protein 11. Vacuolar protein sorting protein 11 (vps11) aggregates with other Vps proteins to form the homotypic fusion and protein sorting complex (HOPS), which promotes the fusion of late endosomes and autophagosomes with lysosomes. Pep5 (also known as Vps11) was initially isolated as a protease deficient mutant and shown to be involved in protein trafficking and vacuole biogenesis pathways. WD-40 repeats (also known as WD or β-transducin repeats) are short ~40 amino acid motifs, often terminating in a Trp-Asp (W-D) dipeptide. WD40 repeats usually assume a 7-8 bladed β-propeller fold, but proteins have been found with 4 to 16 repeated units, which also form a circularised β-propeller structure. WD-repeat proteins are a large family found in all eukaryotes and are implicated in a variety of functions ranging from signal transduction and transcription regulation to cell cycle control and apoptosis. Repeated WD40 motifs act as a site for protein-protein or protein-DNA interaction, and proteins containing WD40 repeats are known to serve as platforms for the assembly of protein complexes or mediators of transient interplay among other proteins. The specificity of the proteins is determined by the sequences outside the repeats themselves. Examples of such complexes are G proteins (beta subunit is a β-propeller), TAFII transcription factor, and E3 ubiquitin ligase. In Arabidopsis spp., several WD40-containing proteins act as key regulators of plant-specific developmental events.
