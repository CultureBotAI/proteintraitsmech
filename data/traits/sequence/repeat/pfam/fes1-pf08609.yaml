identifier: Pfam:PF08609
label: Nucleotide exchange factor Fes1
definition: >-
  This entry represents a domain found in the Fes1 protein. Fes1 is a cytosolic homologue of Sls1, an ER protein which has nucleotide exchange factor activity. Fes1 in yeast has been shown to bind to the molecular chaperone Hsp70 and has adenyl-nucleotide exchange factor activity.
