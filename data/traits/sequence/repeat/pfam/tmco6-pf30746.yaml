identifier: Pfam:PF30746
label: TMCO6
definition: >-
  This entry represents ARM-like repeats domain of TMCO6 (transmembrane and coiled-coil domain-containing protein 6) proteins mostly found in vertebrates. The full-length TMCO6 protein contains an N-terminal coiled-coil region and Armadillo-like repeats. In humans, TMCO6 is predicted to interact with UBQLN1 (ubiquilin-1) and ZNF511, according to IntAct database. The function of TMCO6 remains to be determined.
