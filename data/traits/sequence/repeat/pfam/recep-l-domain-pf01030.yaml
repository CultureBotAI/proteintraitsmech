identifier: Pfam:PF01030
label: Receptor L domain
definition: >-
  The structure for the first three domains of the extracellular portion of IGF-1R (type-1 insulin-like growth-factor receptor) has been solved and consists of two L-domains and a cysteine rich region (L1-Cys-rich-L2). The L-domains each consist of a single-stranded right-handed β-helix. The Cys-rich region is composed of eight disulphide-bonded modules, seven of which form a rod-shaped domain with modules associated in an unusual manner. The three domains surround a central space of sufficient size to accommodate a ligand molecule. This entry represents the L-domain. This domain can also be found in insulin receptor(IR) and epidermal growth-factor receptor (EGFR) family members, and in yeast cell surface GPI proteins PST1 and ECM33.
