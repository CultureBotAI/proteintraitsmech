identifier: Pfam:PF30137
label: GID12 WD40 beta-propeller domain
definition: >-
  This entry represents GID12, a regulator of the GID E3 ubiquitin ligase complex. GID12 is found in fungi, particularly within the Saccharomycetaceae family. This protein, which shows a WD40 β-propeller fold, is responsible for protein-protein interactions within the GID complex, binding both the substrate receptor GID4 and the tip of GID5 in the scaffolding module. The domain enables GID12 to seal GID4 onto the scaffold and remodel the N-degron binding pocket in the GID complex. GID12 modulates the assembly and activity of the GID E3 ligase complex, potentially limiting substrate accessibility to ubiquitination sites and thereby stabilising gluconeogenic enzyme substrates. The protein is also involved in actin patch formation.
