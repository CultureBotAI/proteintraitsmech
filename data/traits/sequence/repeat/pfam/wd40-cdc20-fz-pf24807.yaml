identifier: Pfam:PF24807
label: CDC20/Fizzy WD40 domain
definition: >-
  This entry represents the β-propeller found in the homologues of WD40 protein Cdc20/Fizzy, a protein that associates and phosphorylates anaphase promoting complex/cyclosome (APC/C) at the end of mitosis. It is required for full ubiquitin ligase activity of the APC/C and confers substrate specificity upon the complex.
