identifier: Pfam:PF23557
label: Leprecan family TPR-like repeat region
definition: >-
  This entry represents the N-terminal α-helical domain of members of the leprecan family. Members of this family include Prolyl 3-hydroxylase 1/2/3 which often have an associated C-terminal enzymatic domain. This domain is also found in the Cartilage-associated protein CRTAP and in the Endoplasmic reticulum protein SC65. Leprecan proteins are involved in the hydroxylation of proline residues in collagen, an essential post-translational modification for the stability and assembly of collagen fibrils. Leprecan proteins form complexes with other enzymes to hydroxylate lysine residues in collagen alpha chains, which is crucial for the proper assembly and cross-linking of collagen fibrils in various tissues, including skin, bone, tendon, aorta, and cornea. Some Leprecan proteins also exhibit growth suppressive activity and may play a role in the secretory pathway of cells. Leprecan's enzymatic activity is particularly important for the structural integrity of type I, IV, and V collagens, contributing to normal bone density and skin stability.
