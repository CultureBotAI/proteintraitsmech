identifier: Pfam:PF23654
label: E3 ubiquitin-protein ligase LIN-like, ARM repeat
definition: >-
  This region of armadillo-like repeats is found in a group of plant proteins, including the putative E3 ubiquitin-protein ligase LIN from Medicago truncatula. This entry is often found C-terminal to and N-terminal to . E3 ubiquitin-protein ligase LIN is involved in the rhizobial infection process. This protein plays an important role in the early steps of bacterial symbiont thread formation in roots, and in growth, differentiation and maintenance of nodules.
