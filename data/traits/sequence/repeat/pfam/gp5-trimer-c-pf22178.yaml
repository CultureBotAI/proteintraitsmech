identifier: Pfam:PF22178
label: Bacteriophage T4 gp5 C-terminal trimerisation domain
definition: >-
  This entry represents the C-terminal trimerisation domain found in Type VI secretion system spike protein VgrG(1-5, A,B) and Gp5. This domain associates to form a triple-stranded β-helix that forms an equilateral triangular prism, which acts as a membrane-puncturing needle. The interior of the β-helix has an increased hydrophobicity towards the C-terminal. The middle part of the helix has a pore, enriched with polar and charged side chains.
