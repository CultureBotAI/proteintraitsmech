identifier: Pfam:PF25808
label: LAA1-like, C-terminal TPR repeats
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found at the C-terminal end of AP-1 accessory protein LAA1 from Saccharomyces cerevisiae and similar sequences mainly found in fungi. LAA1 is involved in localisation of clathrin adapter protein complex-1 (AP-1) and subsequent AP-1-mediated clathrin-coated vesicle cargo loading. Pof6 interactor protein 1 from Schizosaccharomyces pombe (Sip1), which is required for endocytosis and also involved in cytokinesis and cell division.
