identifier: Pfam:PF09976
label: Tetratricopeptide repeat-like domain
definition: >-
  This is the TPR domain found in ancillary SecYEG translocon subunit and cell division coordinator CpoB. CpoB coordinates the complexes involved in septal peptidoglycan synthesis (PBP1B-LpoB complex) and outer membrane constriction (Tol system), which contributes to maintain the integrity of the cell envelope during division. YfgM is a subunit of the ancillary SecYEG translocon that may mediate protein transfer from the SecYEG translocon to the periplasmic chaperone network via its periplasmic C-terminal region.
