identifier: Pfam:PF26034
label: SMAUG-like PHAT domain
definition: >-
  This PHAT (a pseudo-HEAT-repeat analogous topology) domain is found in SMAUG from fruit flies (Smg) and related animal proteins, including human Zinc finger CCHC domain-containing protein 2 (ZCCHC2). SMAUG is a key regulator of posterior patterning and crucial for the maternal-to-zygotic transition of gene expression of the early Drosophila embryo. In animals, members of the SMAUG protein family exhibit various functions during development. Mammals express two SMAUG-related paralogs named SMAUG1 and SMAUG2. In Drosophila, the PHAT domain and the N-terminal dimerisation domain interact and jointly form a groove that binds Smoothened and Oskar proteins.
