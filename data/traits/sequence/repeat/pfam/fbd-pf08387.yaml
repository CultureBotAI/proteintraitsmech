identifier: Pfam:PF08387
label: FBD
definition: >-
  This domain is found at the C-terminal of F-box domain containing proteins from plants. Its precise function is unknown, but it is thought to be associated with nuclear processes. Proteins in this entry are involved in the ubiquitin-proteasome pathway. They function as components of SCF (SKP1-CUL1-F-box protein) E3 ubiquitin ligase complexes [2]. They have a F-box domain at the N-terminal ( ). AtMIF1 (also known as F-box protein AT3G62230) from Arabidopsis, physically interacts with MYB domain protein 5 (MYB5), which results in MYB5 degradation representing a new regulatory pathway, 26S proteasome-AtMIF1-MYB5 that regulates oil content of seeds, increasing their oil content without affecting plant growth. This domain has a LRR-like fold.
