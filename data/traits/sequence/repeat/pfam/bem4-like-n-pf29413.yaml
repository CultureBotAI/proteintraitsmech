identifier: Pfam:PF29413
label: BEM4 N-terminal domain
definition: >-
  This entry represents the N-terminal TPR-like domain found in GTPase-GDP dissociation stimulator BEM4 from Saccharomyces cerevisiae, its homologue Arz1 from Schizosaccharomyces pombe and similar fungal proteins. The specific function of this TPR-like domain remains to be determined. BEM4 from Saccharomyces cerevisiae is a 633-residue protein that acts as a GTPase-GDP dissociation stimulator for Rho family GTPases including CDC42, RHO1, RHO2 and RHO4. The protein is involved in cell polarity control and cell wall organisation. BEM4 localises to both nucleus and cytoplasm and interacts directly with multiple small GTPases.
