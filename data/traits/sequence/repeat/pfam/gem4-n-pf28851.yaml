identifier: Pfam:PF28851
label: Gem-associated protein 4 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of Gemin4 proteins found in insects. Gemin4 is a component of the survival motor neuron (SMN) complex that catalyses the assembly of small nuclear ribonucleoproteins (snRNPs), which are essential building blocks of the spliceosome. In Drosophila melanogaster, there are three almost identical paralogs (Gem4a, Gem4b and Gem4c) resulting from genomic triplication with some redundant function. These proteins are required for neuromuscular function and organismal viability. The specific function of this N-terminal domain remains to be determined.
