identifier: Pfam:PF14727
label: PTHB1 N-terminal
definition: >-
  This entry represents the N-terminal domain of PTHB1 (also known as BBS9) protein found also in PTHB1 homolog from C. elegans. PTHB1 (also known as Bardet-Biedl syndrome 9 protein, BBS9) forms a part of the BBSome complex, which is required for ciliogenesis. PTHB1 is the major binding subunit of the IFT38 C-terminal tail, which assists the BBSome in some of its roles.
