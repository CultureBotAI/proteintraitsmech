identifier: Pfam:PF29601
label: Chemotaxis protein MotC
definition: >-
  This entry represents chemotaxis protein MotC (motility protein C) from Alphaproteobacteria including Sinorhizobium, Rhizobium and related species from the Hyphomicrobiales order. MotC is approximately 430-436 amino acids in length. The protein is required for the rotation of the flagellar motor and might control the energy flux or coupling that drives flagellar rotation. MotC is localised to the periplasm and contains an N-terminal signal peptide. The function of this protein family remains to be fully determined.
