identifier: Pfam:PF28208
label: DOCK6-11, TPR domain
definition: >-
  This is a domain consisting of tetratricopeptide (TPR)-like repeats found in human Dedicator of cytokinesis protein 6-11 (DOCK6-11) and related proteins. They are guanine nucleotide-exchange factors (GEF) that activate proteins by exchanging bound GDP for free GTP. DOCK7 activates Rac1 and Rac3 Rho small GTPases by exchanging bound GDP for free GTP and unlike other counterparts, it does not have a GEF activity for CDC42. It is required for STMN1 Ser-15 phosphorylation during axon formation and consequently for neuronal polarisation. As part of the DISP complex, DOCK7 may regulate the association of septins with actin and thereby regulate the actin cytoskeleton. DOCK10 is essential for dendritic spine morphogenesis in Purkinje cells and in hippocampal neurons, via a CDC42-mediated pathway. It sustains B-cell lymphopoiesis in secondary lymphoid tissues and regulates FCER2/CD23 expression..
