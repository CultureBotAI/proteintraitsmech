identifier: Pfam:PF16416
label: ARM-like repeat domain, GUN4-N terminal
definition: >-
  This entry represents the ARM-repeat like N-terminal domain of Gun4 proteins from cyanobacteria. It contains five helices arranged in an alternating antiparallel pattern that resembles ARM or HEAT repeats, though the functional importance of this poorly conserved domain in Gun4 is not currently known.
