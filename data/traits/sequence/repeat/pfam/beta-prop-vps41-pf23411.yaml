identifier: Pfam:PF23411
label: Vps42 beta-propeller
definition: >-
  This entry represents the N-terminal in Vsp41 proteins which contains a β-propeller. Vsp41 is a subunit of the homotypic vacuole fusion and vacuole protein sorting (HOPS) complex, which is essential for membrane docking and fusion at the Golgi-to-endosome and endosome-to-vacuole stages of protein transport. This protein interacts with Caspase-8, which plays a key role in apoptosis and development. Vsp41 consists of a β-propeller at the N-terminal ( ), represented in this entry, followed by an α-solenoid (TPR-like) domain, a CHCR domain and a RING zinc finger ( ). The VPS41 family is involved in vesicle-mediated protein trafficking to lysosomal compartments, including endocytic membrane transport and autophagic pathways. Members of the VPS41 family are believed to act as core components of the putative HOPS and CORVET endosomal tethering complexes, which are essential for the conversion of early endosomes to late endosomes, implicating specific Rab GTPases in the process. They are involved in tethering and docking events during SNARE-mediated membrane fusion, and regulate endocytic, phagocytic, and autophagic traffic towards lysosomes. The family plays a role in the fusion of autophagosomes with lysosomes and may be involved in sorting to the regulated secretory pathway. Additionally, VPS41 proteins contribute to the normal development of certain cellular structures in some organisms and may have a role in the negative regulation of apoptosis. They are also required for the uptake of exogenous dsRNA in experimental RNA silencing.
