identifier: Pfam:PF23286
label: Disease resistance protein RPS4B-like, leucine-rich repeats
definition: >-
  This entry represents a region of leucine-rich repeats found in Disease resistance protein RPS4B from Arabidopsis thaliana, Disease resistance protein Roq1 from Nicotiana benthamiana and similar proteins found in plants. RPS4B specifically recognises the AvrRps4 type III effector avirulence protein from P.syringae. Roq1 specifically recognises the Xanthomonas and Pseudomonas effector proteins XopQ and HopQ1, and triggers cell death.
