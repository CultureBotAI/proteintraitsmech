identifier: Pfam:PF22890
label: EMC2 TPR-like repeat domain
definition: >-
  This entry represents a TPR-like domain from the central region of EMC2 and its homolgoues. ER membrane protein complex subunit 2 (EMC2, also known as tetratricopeptide repeat protein 35) is a tetratricopeptide repeat-containing protein, and a component of the ER membrane protein complex (EMC), which is required for efficient folding of proteins in the endoplasmic reticulum (ER). EMC2 is a cytosolic component of the complex. Purified recombinant EMC2 formed a stable complex with either EMC8 or EMC9.
