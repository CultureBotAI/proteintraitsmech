identifier: Pfam:PF28344
label: Integrator complex assembly factor BRAT1
definition: >-
  BRAT1 binds to ATM and BRCA1 and is involved in DNA damage-induced ATM activation. It is a component of a multiprotein complex required for the assembly of the RNA endonuclease module of the integrator complex. It associates with INTS9 and INTS11 in the cytoplasm and blocks the active site of INTS11 to inhibit the endonuclease activity of INTS11 before formation of the full integrator complex. It is also involved in cell proliferation and mitochondrial functions. Mutations of the BRAT1 gene have been linked to epileptic encephalopathy.
