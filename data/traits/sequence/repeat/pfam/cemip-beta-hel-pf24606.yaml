identifier: Pfam:PF24606
label: CEMIP beta-helix
definition: >-
  This entry represents the β-helix domain of CEMIP, CEMIP2 and related sequences. Proteins in this entry are involved in the metabolism of hyaluronic acid (HA) and mediate the depolymerization of high-molecular-weight HA into intermediate-sized fragments, a process crucial for various physiological functions, including the regulation of angiogenesis, heart development, and cell migration. This domain has the common structural motif of enzymes involved in polysaccharide degradation, encompassing both hydrolases and lyases, however, biochemical experiments failed to detect any hyaluronidase activity in CEMIP2 and the putative active site remains to be elucidated. This entry also includes Fibrocystin (PKHD), a protein that promotes ciliogenesis within renal epithelial cells, contributing to the formation of kidney tubules and maintaining the lumen architecture. It may participate in the regulation of the cholangiocytes proliferation and the CCN2 production in an CXCL8-dependent manner.
