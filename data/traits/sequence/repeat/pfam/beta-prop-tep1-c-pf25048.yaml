identifier: Pfam:PF25048
label: TEP-1 C-terminal beta-propeller
definition: >-
  This entry represents the β-propeller found at the C-terminal of Telomerase protein component 1 (TEP1), a component of the telomerase ribonucleoprotein complex that is essential for the replication of chromosome termini. It is also a component of the ribonucleoprotein vaults particle, a multi-subunit structure involved in nucleo-cytoplasmic transport.
