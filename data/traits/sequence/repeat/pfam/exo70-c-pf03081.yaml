identifier: Pfam:PF03081
label: Exo70 exocyst complex subunit C-terminal
definition: >-
  This is the C-terminal domain of Exo70, which consists of α-helical bundles involved in binding the small GTPase Rho3 and is important for localization to the membrane as it directly interacts with phosphatidylinositol 4,5-bisphosphate. The interaction with phospholipids is essential for the membrane association of the exocyst complex. The Exo70 protein forms one subunit of the exocyst complex (consist of Sec3, Sec5, Sec6, Sec8, Sec10, Sec15, Exo70, and Exo84 in budding yeast). First discovered in Saccharomyces cerevisiae, it is evolutionarily conserved in eukaryotes. It mediates the tethering of post-Golgi secretory vesicles to the plasma membrane and promotes the assembly of the SNARE complex for membrane fusion. It also plays a role in cell polarisation, primary ciliogenesis, cytokinesis, pathogen invasion, tumourigenesis and metastasis. It is a member of the the Complex Associated with Tethering Containing Helical Rods (CATCHRs) family which also includes Conserved Oligomeric Golgi complex (COG) and Golgi-Associated Retrograde Protein complex (GARP) and DSL1 complexes, all evolutionarily related and share structural features consisting of α-helical bundles at the C terminus and coiled-coil region at the N terminus. Exo70 interacts with phospholipids the Rho3 GTPase. This interaction with Rho3 mediates one of the three known functions of Rho3 in cell polarity: vesicle docking and fusion with the plasma membrane (the other two functions are regulation of actin polarity and transport of exocytic vesicles from the mother cell to the bud).
