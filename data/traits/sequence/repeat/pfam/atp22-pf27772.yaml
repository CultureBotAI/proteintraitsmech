identifier: Pfam:PF27772
label: Mitochondrial translation factor Atp22
definition: >-
  This entry represents the mitochondrial translation factor Atp22, which is specific for subunit 6 of the mitochondrial ATPase. Atp22 is a component of the mitochondrial inner membrane required for the expression of the CF(0) component of the ATPase. Members of this entry are found in ascomycetes.
