identifier: Pfam:PF24915
label: SESTD1-like, spectrin repeat
definition: >-
  This region of spectrin repeats is found in human SEC14 domain and spectrin repeat-containing protein 1 (SESTD1) and similar animal proteins. SESTD1 is a regulator of the transient receptor potential channels TRPC4 and TRPC5.
