identifier: Pfam:PF24289
label: Domain of unknown function (DUF7477)
definition: >-
  This entry represents a domain consisting of a novel repeat fold which contains five repeats, each of them comprising three antiparallel β-strands and a short α-helix, according to structure predictions (e.g ). This domain is mainly found in plant sequences, including casein kinase 1-like protein HD16 from rice, a protein involved in the regulation of flowering time through gibberellin (GA) signalling and independently of photoperiod.
