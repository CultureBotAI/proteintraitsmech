identifier: Pfam:PF20885
label: Nuclear pore complex-interacting protein B13-like, MII repeat
definition: >-
  This entry represents the MII repeat found in a group of proteins specific to Homo sapiens, including Nuclear pore complex-interacting protein family member B13 (NPB13), NPB12, NPB11, NPB3, NPB4 and NPB5. These repeats may arrange in a β-solenoid structure. Members of this entry have the repeated sequence MIISRHLPSV.
