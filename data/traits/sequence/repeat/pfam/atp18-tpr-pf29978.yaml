identifier: Pfam:PF29978
label: ATP synthase subunit p18 TPR-like domain
definition: >-
  This entry represents ATP synthase subunit p18 of trypanosomatids. The p18 subunit is an additional component of the F1-ATPase complex that is not present in metazoan ATP synthases. This subunit interacts directly with the alpha subunit in a 1:1 stoichiometry and is essential for proper assembly of the F1 component. This protein shows a region of a tetratricopeptide repeats (TPR).
