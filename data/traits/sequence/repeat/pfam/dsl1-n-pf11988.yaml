identifier: Pfam:PF11988
label: Retrograde transport protein Dsl1 N terminal
definition: >-
  Dsl1 is a peripheral membrane protein, part of the DSL1 complex, required for transport between the Golgi and the endoplasmic reticulum. It is localised to the ER membrane, and bridges the other two subunits of the complex, Tip20 and Sec39. DSL1 complex, together with conserved oligomeric Golgi (COG), Golgi-associated retrograde protein (GARP), and the exocyst, is a member of the complexes associated with tethering containing helical rods (CATCHR) family, which are evolutionary related and share structural features. This complex interacts at its base with ER SNAREs and at its tip with COPI vesicles, thus, it captures Golgi-derived COP-I vesicles and facilitates their fusion with the ER the Dsl1 complex, upstream of SNARE complex formation. The C-terminal domain is involved in binding to the Sec39 subunit of the Dsl1p complex. The N-terminal complexes with another subunit of the Dsl1p complex called Tip20 which forms heterodimers by pairing the N termini of each protein.
