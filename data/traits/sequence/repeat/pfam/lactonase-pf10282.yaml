identifier: Pfam:PF10282
label: Lactonase, 7-bladed beta-propeller
definition: >-
  This entry contains bacterial 6-phosphogluconolactonases (6PGL) YbhE-type . This entry also contains the fungal muconate lactonizing enzyme carboxy-cis,cis-muconate cyclase and muconate cycloisomerase , which convert cis,cis-muconates to muconolactones and vice versa as part of the microbial beta-ketoadipate pathway. Structures have been reported for the E. coli 6-phosphogluconolactonase and Neurospora crassa muconate cycloisomerase. Structures of proteins in this family have revealed a 7-bladed β-propeller fold. The surface antigen Lp49 from Leptospira interrogans, the causative agent of leptospirosis, contains a C-terminal β propeller domain that is also included in this entry. The structure of the Lp49 protein has been solved, and because it is an antigen is a potential drug target. 6-phosphogluconolactonases (6PGL) are cytosolic enzymes found in all organisms that catalyse the hydrolysis of 6-phosphogluconolactone to 6-phosphogluconic acid in the oxidative phase of the pentose phosphate pathway. Trypanosoma brucei and other characterised 6PGL proteins share an α/β hydrolase fold, with both parallel and anti-parallel β-sheets surrounded by eight α-helices. In Escherichia coli (strain K12), 6PGL (YbhE) is characterised by a 7-bladed β-propeller fold ( ).
