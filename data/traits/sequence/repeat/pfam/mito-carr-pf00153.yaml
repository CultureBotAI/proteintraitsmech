identifier: Pfam:PF00153
label: Mitochondrial carrier protein
definition: >-
  This entry represents the transmembrane region in mitochondrial carrier proteins. A variety of substrate carrier proteins involved in energy transfer are found in the inner mitochondrial membrane or are integral to the membranes of other eukaryotic organelles such as the peroxisome. Such proteins include: ADP/ATP carrier protein (ADP/ATP translocase) 2-oxoglutarate/malate carrier protein Phosphate carrier protein Tricarboxylate transport protein (or citrate transport protein) Graves disease carrier protein Yeast mitochondrial proteins MRS3 and MRS4 Yeast mitochondrial FAD carrier protein And many others These mitochondrial carrier proteins share a tripartite structure, consisting of up to three tandem repeats of a domain approximately 100 residues in length. Each domain contains two transmembrane (TM) regions, resulting in a total of six TM domains. Sequence analysis has shown that the TM regions and their adjacent hydrophilic loops are more highly conserved than other parts of the protein, with five of the six TM domains followed by the conserved motif (D/E)-Hy(K/R), where Hy denotes a hydrophobic residue. Structurally, these domains contain six α-helices that form a compact transmembrane unit. This structure exhibits a deep depression on the side facing the space between the inner and outer mitochondrial membranes, resembling a channel-like conformation. It is suggested that substrates bind at the bottom of this cavity, and translocation occurs through a conformational change from a 'pit' to a 'channel' structure.
