identifier: Pfam:PF30047
label: SaeB, TPR-like domain
definition: >-
  This entry represents a TPR-like domain found at the C-terminal of the Putative ESX-1 scaffolding and assembly protein SaeB. SaeB may be involved in assembly of the ESX-1/type VII specialized secretion system (TSS7), which exports several proteins including EsxA and EsxB. It is involved in DNA conjugation in recipient (MKD8) but not donor (mc2155) strain.
