identifier: Pfam:PF04050
label: 'Up-frameshift suppressor 2 '
definition: >-
  This entry represents the C-terminal domain found in Up-frameshift suppressor 2 (also known as Nonsense-mediated mRNA decay protein 2). Transcripts harbouring premature signals for translation termination are recognised and rapidly degraded by eukaryotic cells through a pathway known as nonsense-mediated mRNA decay. In Saccharomyces cerevisiae, three trans-acting factors (Upf1 to Upf3) are required for nonsense-mediated mRNA decay.
