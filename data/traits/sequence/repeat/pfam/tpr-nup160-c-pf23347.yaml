identifier: Pfam:PF23347
label: Nup160 C-terminal TPR
definition: >-
  This entry represents the TPR-like repeats domain found in the C-terminal region of nucleoporin Nup160. The Arabidopsis Nup160, a scaffold Nup, is important for regulating the floral transition, a key developmental phase change in flowering plants, through modulating the subcellular localisation of HOS1 at NPCs. NUP160 is one of up to 60 proteins that constitute the Nuclear Pore Complex (NPC) as a component of the NUP107-160 subcomplex. NUP160, in conjunction with NUP133, interacts with NUP98 and NUP153, mediating mRNA export. NUP160 depletion could restore autophagy and inhibit fibrosis and inflammatory response in high glucose-treated. NUP160 mutations have been associated with Steroid-Resistant Nephrotic Syndrome (SRNS). Silencing Drosophila NUP160 specifically in nephrocytes results in functional abnormalities, reduced cell size and nuclear volume, as well as a disorganised nuclear membrane structure.
