identifier: Pfam:PF24817
label: WDHD1 first WD40 domain
definition: >-
  This entry represents the WD40 domain found at the N-terminal of WDHD1 (also known as AND-1), Protein ENHANCER OF LHP1 1 and Minichromosome loss protein 1. WDHD1 is an adaptor molecule crucial for DNA replication. It is a core replisome component that acts as a replication initiation factor. It binds directly to the CMG complex and functions as a hub to recruit additional proteins to the replication fork.
