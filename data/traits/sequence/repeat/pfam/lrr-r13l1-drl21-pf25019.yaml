identifier: Pfam:PF25019
label: R13L1/DRL21 LRRs
definition: >-
  This entry represents a region of leucine-rich repeats (LRRs) found in R13L1, DRL21 from Arabidopsis thaliana and related plant proteins. R13L1 and DRL21 are likely disease resistance proteins. DRL21 has adenylate cyclase activity.
