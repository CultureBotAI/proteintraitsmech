identifier: Pfam:PF30693
label: KICSTOR complex protein kaptin
definition: >-
  This entry represents kaptin (KPTN), an actin-associated protein and component of the KICSTOR complex found in vertebrates. Kaptin may be involved in actin organisation in platelets and neurons, and localises to lamellipodia and stereocilia. KPTN functions as part of the four-protein KICSTOR complex (KPTN, ITFG2, KICS2, SZT2), which is found at the lysosome and recruits the GATOR1 complex to the lysosomal membrane surface. KICSTOR acts as a negative regulator of mTORC1 signalling during amino acid or glucose starvation, and in the absence of amino acids negatively regulates mTORC1 activity, while loss of KICSTOR function results in constitutive mTORC1 activation. Mutations in the human KPTN gene cause intellectual developmental disorder with macrocephaly, also known as mental retardation autosomal recessive 41 (MRT41).
