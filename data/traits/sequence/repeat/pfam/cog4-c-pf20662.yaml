identifier: Pfam:PF20662
label: Conserved oligomeric Golgi complex subunit 4, C-terminal
definition: >-
  This is the C-terminal domain of COG4, which contains the key Arginine residue that stabilises this domain and it is required for the proper glycosylation of cell surface proteins. COG4 is a component of the conserved oligomeric Golgi (COG) complex which mediates the proper glycosylation of proteins trafficking through the Golgi apparatus. It is a member of the CATCHR (complexes associated with tethering containing helical rods) family, which includes components of the exocyst, COG, GARP, and Dsl1 complexes, sharing structural and functional features: the α-helical bundles at the middle/C-terminal and a N-terminal coiled-coil region.
