identifier: Pfam:PF21055
label: ZSWIM4-8, C-terminal
definition: >-
  This entry represents an α-solenoid structure found at the C-terminal of Zinc finger ZSWIM domain-containing proteins 4/5/6/8 (ZSWIM4/5/6/8). ZSWIM8 is a substrate recognition component of a SCF-like E3 ubiquitin-protein ligase complex that promotes target-directed microRNA degradation (TDMD), a process that mediates degradation of microRNAs (miRNAs). ZSWIM4 has been associated with JAK2 inhibition resistance in breast cancer. ZSWIM5 was reported to suppress the invasion and migration of lung cancer cells by regulating the expression of cyclins and MMPs and may constitute a target for the diagnosis and therapy of non-small cell lung cancer (NSCLC). ZSWIM6 plays a key role in neuronal development and mutations in this protein causes acromelic frontonasal dysostosis (AFND), an autosomal-dominant severe frontonasal and limb malformation syndrome. In ZSWIM6, this is termed the Sin3-like domain, in which a recurrent de novo missense variant causes AFND.
