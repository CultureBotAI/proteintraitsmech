identifier: Pfam:PF00295
label: Glycosyl hydrolases family 28
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 28 comprises enzymes with several known activities; polygalacturonase ( ); exo-polygalacturonase ( ); exo-polygalacturonase ( ); rhamnogalacturonase (EC not defined). Polygalacturonase (PG) (pectinase) catalyses the random hydrolysis of 1,4-alpha-D-galactosiduronic linkages in pectate and other galacturonans. In fruit, polygalacturonase plays an important role in cell wall metabolism during ripening. In plant bacterial pathogens such as Erwinia carotovora or Ralstonia solanacearum (Pseudomonas solanacearum) and fungal pathogens such as Aspergillus niger, polygalacturonase is involved in maceration and soft-rotting of plant tissue. Exo-poly-alpha-D-galacturonosidase ( ) (exoPG) hydrolyses peptic acid from the non-reducing end, releasing digalacturonate. PG and exoPG share a few regions of sequence similarity, and belong to family 28 of the glycosyl hydrolases.
