identifier: Pfam:PF05359
label: Domain of Unknown Function (DUF748)
definition: >-
  This entry includes the Putative phospholipid transport protein EpaF from Pseudomonas aeruginosa which is involved in outer membrane lipid homeostasis. It may transport phospholipids between the inner membrane and the outer membrane. EpaF is important for proper cell morphology and integrity of the outer membrane. EpaF, TamB, YdbH and YhdP are redundant, but not equivalent, in performing an essential function for growth and maintaining lipid homeostasis in the outer membrane. Any of these four proteins is sufficient for growth.
