identifier: Pfam:PF08161
label: Ribosomal RNA-processing protein 12, HEAT repeats
definition: >-
  This entry represents a conserved domain found in RRP12 proteins, which consists of HEAT repeats. Ribosomal RNA-processing protein 12 (RRP12) proteins are members of pre-ribosome-associated HEAT repeats-containing proteins. They are involved in the maturation and nuclear export of both pre-40S and pre-60S ribosomal subunits. They are required for the processing of RNA components within pre-ribosomes, which is a critical step in the assembly of functional ribosomes. They are associated with the late maturation of the 18S and 5.8S rRNA of the pre-40S ribosomes and for maturation of the 25S and 5.8S rRNA of the pre-60S ribosomes.
