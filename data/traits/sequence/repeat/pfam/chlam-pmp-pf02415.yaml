identifier: Pfam:PF02415
label: Chlamydia polymorphic membrane protein (Chlamydia_PMP) repeat
definition: >-
  This repeat is found in several Chlamydia polymorphic membrane proteins. Chlamydia pneumoniae (Chlamydophila pneumoniae) is an obligate intracellular bacterium and a common human pathogen causing infection of the upper and lower respiratory tract. Proteins in this entry consist of there repeats at the N-terminal which may adopt a β-helical structure, a middle domain ( ) and a C-terminal domain .
