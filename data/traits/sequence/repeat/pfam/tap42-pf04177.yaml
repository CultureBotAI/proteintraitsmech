identifier: Pfam:PF04177
label: TAP42-like family
definition: >-
  This entry represents a family of proteins involved in the regulation of phosphatases. It includes TAP46 and TAP42, as well as others. TAP46 is involved in the positive regulation of the TOR signaling pathway in plants, acting as a negative regulator of PP2A catalytic activity. The TOR signalling pathway activates a cell-growth program in response to nutrients. TIP41 interacts with TAP42 and negatively regulates the TOR signalling pathway.
