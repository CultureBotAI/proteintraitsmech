identifier: Pfam:PF16811
label: TRAP transporter T-component
definition: >-
  This entry includes predicted TatT (TRAP transporter T-component). This protein consists of a 13-α-helical fold containing cryptic tetratricopeptide repeat motifs (cTPRs) and encompassing a pore, ie is a water-soluble trimer whose protomers are each perforated by a pore. It forms a complex with a P component, and a putative ligand-binding cleft of TatPT aligns with the pore of TatT. This entry also includes Uncharacterized protein TP_0956. Tripartite ATP-independent periplasmic (TRAP) transporters are bacterial transport systems implicated in the import of small molecules into the cytoplasm. Tetratricopeptide repeat-protein associated TRAP transporters (TPATs) constitute a subfamily of the TRAP transporters (TRAP-Ts). TPATs have four components. Three are common to both TRAP-Ts and TPATs: the P component, a ligand-binding protein, and a transmembrane symporter apparatus comprising the M and Q components (M and Q are sometimes fused to form a single polypeptide). TPATs are distinguished from TRAP-Ts by the presence of a unique protein called the T-component.
