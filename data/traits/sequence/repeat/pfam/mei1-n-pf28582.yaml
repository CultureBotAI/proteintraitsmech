identifier: Pfam:PF28582
label: Meiosis inhibitor protein 1 N-terminal domain
definition: >-
  This entry represents the N-terminal domain of meiosis inhibitor protein 1 (MEI1), a vertebrate-specific protein required for normal meiotic chromosome synapsis. This domain is absent in some alternative splice isoforms. While the full-length MEI1 protein functions in meiotic chromosome synapsis and double-strand break formation, the specific function of this N-terminal domain remains to be determined. This domain may adopt an Armadillo-like fold. MEI1 is expressed predominantly in the testis and is involved in the formation of meiotic double-strand breaks in spermatocytes. Variants in MEI1 are associated with azoospermia and hydatidiform moles, causing defects in meiotic progression.
