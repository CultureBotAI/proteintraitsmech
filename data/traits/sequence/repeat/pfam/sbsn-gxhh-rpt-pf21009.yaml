identifier: Pfam:PF21009
label: Suprabasin, GxHH repeat
definition: >-
  Suprabasin (SBSN) is involved in epidermal differentiation and may play a role in skin barrier formation. It has been proposed to be a component of the cornified envelope, an essential structure for skin protection. Its exact function is not yet clear; it has been associated with multiple diseases such as cancer and autoimmune disorders. It is a secreted molecule that may induce cellular signalling (AKT, WNT/beta-catenin, and/or p38MAPK signalling) and processes (migration, proliferation, neovascularization apoptosis- and immune-resistance). It contains a repeated sequence GxHH, with no other similar sequence in the human proteome, which suggests an evolutionarily unique and conserved role. It has also been described a FG (Phe-Gly) motif, which is common in scaffold proteins (keratin 1/2/10 and fillagrin-2 in addition to SBSN). This entry represents the repeated sequence GxHH which may adopt a β-solenoid fold according to structure predictions.
