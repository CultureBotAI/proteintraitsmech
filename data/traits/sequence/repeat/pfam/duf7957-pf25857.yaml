identifier: Pfam:PF25857
label: Domain of unknown function (DUF7957)
definition: >-
  This domain is found in uncharacterised protein from Halogeometricum borinquense (Hbor_03000) and related prokaryotic proteins. This protein is found next to a toxic gene Hbor_02990 and is likely a immunity protein which is able to prevent self-intoxication. This domain is predicted to fold into three four-stranded beta-sheets that pack in a similar way as blades in beta-propellers.
