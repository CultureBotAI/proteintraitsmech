identifier: Pfam:PF15907
label: Integrin-alpha FG-GAP repeat-containing protein 2
definition: >-
  Integrin-alpha FG-GAP repeat-containing protein 2 (ITFG2) may play a critical role in B cell differentiation and development of autoimmunity. It is a component of protein complex KICSTOR, also composed of KPTN, C12orf66 and SZT2, which is required for inhibition of mTORC1 as a result of amino acid or glucose deprivation.
