identifier: Pfam:PF26230
label: RESC11
definition: >-
  This entry represents the RNA-editing substrate-binding complex 11 protein (RESC11) from Trypanosoma brucei, a component of RESC which together with RECC forms the editosome that orchestrates guide RNA (gRNA)-programmed editing to recode cryptic mitochondrial transcripts into messenger RNAs. RESC stabilises gRNAs and engages mRNAs. The RNA-editing catalytic complex (RECC) fulfils gRNA-programmed mRNA cleavage, uridine insertion or deletion, and religation reactions. RESC is a heterogenous assembly of ~18 proteins that enclose gRNAs and mRNAs. Like several other RESC components, RESC11 is composed of HEAT repeats. RESC11 interacts with RESC9 and likely interacts with mRNA.
