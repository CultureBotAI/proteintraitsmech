identifier: Pfam:PF05170
label: AsmA family
definition: >-
  The AsmA protein is involved in the assembly of outer membrane proteins in Escherichia coli. AsmA mutations were isolated as extragenic suppressors of an OmpF assembly mutant. AsmA may have a role in LPS biogenesis.
