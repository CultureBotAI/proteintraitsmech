identifier: Pfam:PF26172
label: RNA-editing substrate-binding complex 8 protein
definition: >-
  This domain is found in the RNA-editing substrate-binding complex 8 protein (RESC8, ) from Trypanosoma brucei, a component of RESC which together with RECC forms the editosome that orchestrates guide RNA (gRNA)-programmed editing to recode cryptic mitochondrial transcripts into messenger RNAs. RESC stabilises gRNAs and engages mRNAs. The RNA-editing catalytic complex (RECC) fulfills gRNA-programmed mRNA cleavage, uridine insertion or deletion, and religation reactions. RESC is a heterogenous assembly of ~18 proteins that enclose gRNAs and mRNAs. RESC8 is a component of RESC-C and it is composed of HEAT repeats. In the RESC complex, the mRNA is sequentially shielded by the superhelical inner surface of the HEAT repeats of RESC9, RESC8, and RESC6.
