identifier: Pfam:PF22203
label: Surface cell antigen Sca2 helical repeat
definition: >-
  Sca2 (surface cell antigen 2) is the only bacterial protein known to promote both actin filament nucleation and profilin-dependent elongation, mimicking eukaryotic formins to assemble actin comet tails for Rickettsia motility. Sca2's functional mimicry of formins is achieved through a unique mechanism. Unlike formins, Sca2 is monomeric, but has N- and C-terminal repeat domains (NRD and CRD) that interact with each other for processive barbed-end elongation. The crystal structure of NRD reveals a previously undescribed fold, consisting of helix-loop-helix repeats arranged into an overall crescent shape.
