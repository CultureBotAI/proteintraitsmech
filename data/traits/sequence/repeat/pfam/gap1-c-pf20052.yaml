identifier: Pfam:PF20052
label: GTPase-associated protein 1, C-terminal domain
definition: >-
  This entry represents the C-terminal domain found in the multidomain GTPase-associated protein 1 (GAP1) of the GTPase-centric systems, a class of NTP-dependent biological conflict systems. This domain is predicted to mediate effector deployment in the GTPase-centric systems.
