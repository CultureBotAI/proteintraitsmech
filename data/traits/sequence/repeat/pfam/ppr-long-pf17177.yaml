identifier: Pfam:PF17177
label: Pentacotripeptide-repeat region of PRORP
definition: >-
  This entry represents the PPR domain of Proteinaceous RNase P 1, chloroplastic/mitochondrial from Arabidopsis thaliana (PRORP1) and similar eukaryotic sequences. PRORPs are a class of RNA processing enzymes that catalyse maturation of the 5' end of precursor tRNAs in eukaryotes. This domain consists of up to eleven α-helices. The region serves to enhance the activity of the metallonuclease domain.
