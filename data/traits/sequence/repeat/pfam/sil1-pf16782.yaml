identifier: Pfam:PF16782
label: Nucleotide exchange factor SIL1
definition: >-
  This entry represent Sil1 from fungi. Sil1 is a nucleotide-exchange factor protein that interacts with Hsp70 chaperone Kar2. It is required for protein translocation and folding in the endoplasmic reticulum (ER). The structure of Sil1 has been solved.
