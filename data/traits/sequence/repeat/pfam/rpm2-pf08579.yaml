identifier: Pfam:PF08579
label: Mitochondrial ribonuclease P subunit (RPM2)
definition: >-
  Ribonuclease P (RNase P) generates mature tRNA molecules by cleaving their 5' ends. Rpm2 is a protein subunit of the yeast mitochondrial RNase P. It has the ability to act as a transcriptional activator in the nucleus, where it plays a role in defining the steady-state levels of mRNAs for some nucleus-encoded mitochondrial components. Rpm2p is also involved in maturation of Rpm1 and in translation of mitochondrial mRNAs.
