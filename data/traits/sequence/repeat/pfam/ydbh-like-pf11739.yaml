identifier: Pfam:PF11739
label: Intermembrane phospholipid transport protein YdbH
definition: >-
  This protein family includes the probable phospholipid transport protein YdbH protein from E.coli and similar proteins mainly found in proteobacteria. YdbH is one of the six AsmA-like paralogues in E.coli (YhdP, TamB, YdbH, AsmA, YicH, and YhjG) that have a variable size but share a similar predicted structure. In-depth functional characterisation of AsmA-like proteins revealed that YdbH together with the other largest paralogs (YhdP and TamB) are redundant in performing a function that is essential for growth and OM lipid homeostasis in E.coli. The current model based on these analyses suggests that TamA-TamB, YhdP, and YdbH form bridge-like structures that mediate the diffusional flow of phospholipids between the IM and OM.
