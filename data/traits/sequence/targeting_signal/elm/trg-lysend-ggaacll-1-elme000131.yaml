identifier: ELM:ELME000131
label: TRG_LysEnd_GGAAcLL_1
definition: >-
  Trans-Golgi Network-Endosome-Lysosome-sorting signals — Sorting signal directing type I transmembrane proteins from the Trans Golgi Network (TGN) to the lysosomal-endosomal compartment. It is found near the C-terminus and interacts with the VHS domain of GGAs adaptor proteins.
