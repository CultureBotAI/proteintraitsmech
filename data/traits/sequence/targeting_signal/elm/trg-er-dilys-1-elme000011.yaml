identifier: ELM:ELME000011
label: TRG_ER_diLys_1
definition: >-
  di Lysine ER retrieving signal — ER retention and retrieving signal found at the C-terminus of type I ER membrane proteins (cytoplasmic in this topology). Di-Lysine signal is responsible for COPI-mediated retrieval from post-ER compartments.
