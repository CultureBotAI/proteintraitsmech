identifier: ELM:ELME000010
label: TRG_ER_KDEL_1
definition: >-
  KDEL retrieving signals — Golgi-to-ER retrieving signal found at the C-terminus of many ER soluble proteins. It interacts with the KDEL receptor which in turns interacts with components of the coatomer (COP I).
