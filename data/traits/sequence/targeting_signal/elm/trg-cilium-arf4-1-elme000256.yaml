identifier: ELM:ELME000256
label: TRG_Cilium_Arf4_1
definition: >-
  Ciliary targeting motifs — The QVxPx motif is located in the cytoplasmatic tails of vesicular cargoes. It allows the interaction with proteins that permit the vesicle budding from the trans-Golgi-network and its posterior transport to the plasma membrane of the cilia.
