identifier: ELM:ELME000012
label: TRG_ER_diArg_1
definition: >-
  di Arginine retention/retrieving signal — The di-Arg ER retention motif is defined by two consecutive arginine residues (RR) or with a single residue insertion (RXR). The motif is completed by an adjacent hydrophobic/arginine residue which may be on either side of the Arg pair.
definition_source: ELM (Eukaryotic Linear Motif resource)
