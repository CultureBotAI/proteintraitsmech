trait_category: SEQ_TARGETING_SIGNAL
term_kind: CLASS
mapping_status: SEEDED
sequence_pattern: ([LIVMFYWPR]R[^YFWDE]{0,1}R)|(R[^YFWDE]{0,1}R[LIVMFYWPR])
