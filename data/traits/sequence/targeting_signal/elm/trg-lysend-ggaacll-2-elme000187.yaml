identifier: ELM:ELME000187
label: TRG_LysEnd_GGAAcLL_2
definition: >-
  Trans-Golgi Network-Endosome-Lysosome-sorting signals — Internal acidic di Leucine motif found in GGA 1 and 3. It binds to their VHS domains in an autoinhibitory manner. Cycles of phosphorylation-dephosphorylation of upstream Ser regulate the autoinhibitory binding and therefore the function of GGA 1/3.
