identifier: UniProtKB-KW:KW-0809
label: "Transit peptide"
definition: >-
  Proteins which have an N-terminal presequence which directs them to an organelle (chloroplast, mitochondria, microbody, cyanelle). The transit peptide is required for their transport across the relevant membranes from their site of synthesis in the cytoplasm.
