identifier: Pfam:PF07710
label: P53 tetramerisation motif
definition: >-
  This entry represents the tetramerisation domain of p53. The tetramerisation domain of human p53 extends from residues 325 to 356, and has a 4-helical bundle fold. The tetramerisation domain is essential for DNA binding, protein-protein interactions, post-translational modifications, and p53 degradation. The p53 tumour suppressor is a protein found in increased amounts in a wide variety of transformed cells. It is also detectable in many proliferating non-transformed cells, but it is undetectable or present at low levels in resting cells. It is frequently mutated or inactivated in many types of cancer. p53 seems to act as a tumour suppressor in some, but probably not all, tumour types. p53 has been implicated in cell cycle regulation, particularly in the monitoring of genomic DNA integrity prior to replication; for this reason it has been dubbed 'guardian of the genome'. p53 can be divided into different functional domains: an N-terminal transactivation domain ( ), a proline-rich domain, a DNA-binding domain ( ) which contains a conserved site ( ), a tetramerisation domain ( ) and a C-terminal regulatory region.
