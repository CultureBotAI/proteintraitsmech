identifier: Pfam:PF10518
label: TAT (twin-arginine translocation) pathway signal sequence
definition: >-
  The twin-arginine translocation (Tat) pathway serves the role of transporting folded proteins across energy-transducing membranes. Homologues of the genes that encode the transport apparatus occur in archaea, bacteria, chloroplasts, and plant mitochondria. In bacteria, the Tat pathway catalyses the export of proteins from the cytoplasm across the inner/cytoplasmic membrane. In chloroplasts, the Tat components are found in the thylakoid membrane and direct the import of proteins from the stroma. The Tat pathway acts separately from the general secretory (Sec) pathway, which transports proteins in an unfolded state. It is generally accepted that the primary role of the Tat system is to translocate fully folded proteins across membranes. An example of proteins that need to be exported in their 3D conformation are redox proteins that have acquired complex multi-atom cofactors in the bacterial cytoplasm (or the chloroplast stroma or mitochondrial matrix). They include hydrogenases, formate dehydrogenases, nitrate reductases, trimethylamine N-oxide (TMAO) reductases and dimethyl sulphoxide (DMSO) reductases. The Tat system can also export whole heteroligomeric complexes in which some proteins have no Tat signal. This is the case of the DMSO reductase or formate dehydrogenase complexes. But there are also other cases where the physiological rationale for targeting a protein to the Tat signal is less obvious. Indeed, there are examples of homologous proteins that are in some cases targeted to the Tat pathway and in other cases to the Sec apparatus. Some examples are: copper nitrite reductases, flavin domains of flavocytochrome c and N-acetylmuramoyl-L-alanine amidases. In halophilic archaea such as Halobacterium almost all secreted proteins appear to be Tat targeted. It has be…
