identifier: Pfam:PF05391
label: Lsm interaction motif
definition: >-
  This short motif is found at the C terminus of Prp24 protein, Spliceosome associated factor 3, U4/U6 recycling protein (SART3) and their Drosophila orthologue, the RNA-binding protein 4F. It probably interacts with the Lsm proteins to promote U4/U6 formation. Prp24 is an RNA-binding protein with four well conserved RNA recognition motifs (RRMs). It facilitates U6 RNA base-pairing with U4 RNA during spliceosome assembly. Prp24 specifically binds free U6 RNA primarily with RRM 1 and 2 and facilitates pairing of U6 RNA bases with U4 RNA bases. SART3 (also known as Tip110) is an RNA-binding protein expressed in the nucleus of the majority of proliferating cells, including normal cells and malignant cells, but not in normal tissues except for the testes and fetal liver. It is involved in the regulation of mRNA splicing probably via its complex formation with RNPS1 (an RNA-binding protein with a serine-rich domain), a pre-mRNA-splicing factor. SART3 has also been identified as a nuclear Tat-interacting protein that regulates Tat transactivation activity through direct interaction and functions as an important cellular factor for HIV-1 gene expression and viral replication. In addition, SART3 is required for U6 snRNP targeting to Cajal bodies. It binds specifically and directly to the U6 snRNA, interacts transiently with the U6 and U4/U6 snRNPs, and promotes the reassembly of U4/U6 snRNPs after splicing in vitro. SART3 contains an N-terminal HAT (half-a-tetratricopeptide repeat)-rich domain, a nuclearlocalization signal (NLS) domain, and two C-terminal RNA recognition motifs (RRMs).
