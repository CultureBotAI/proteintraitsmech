identifier: Pfam:PF16852
label: Herpes viral adaptor-to-host cellular mRNA binding domain
definition: >-
  This entry represents a conserved region of the Herpes simplex virus 1 ICP27 protein, an immediate early multifunctional regulator of viral gene expression. This region mediates binding to cellular mRNA export factors such as mouse REF and host NXF1/TAP, facilitating nuclear export of viral intronless mRNAs. Early in infection, ICP27 inhibits cellular splicing, causing accumulation of unprocessed pre-mRNAs that cannot be exported from the nucleus, thereby shutting off host protein synthesis. Later in infection, it recruits cellular RNA polymerase II to viral replication sites and promotes viral mRNA nuclear export. ICP27 also binds NUP62, which may facilitate viral mRNA export and indirectly inhibit host nucleocytoplasmic transport pathways. Additional functions include stimulation of viral transcript translation, blocking of the host cell cycle at G1 phase, prevention of apoptosis, and switching of PML isoforms from PML-II to PML-V by silencing the 3' splice site of PML intron 7a.
