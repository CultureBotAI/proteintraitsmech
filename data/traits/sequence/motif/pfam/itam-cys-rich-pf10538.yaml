identifier: Pfam:PF10538
label: Hantavirus ITAM motif
definition: >-
  Signal transduction by T and B cell antigen receptors and certain receptors for Ig Fc regions involves a conserved sequence motif, termed an immunoreceptor tyrosine-based activation motif (ITAM). It is also found in the cytoplasmic domain of the apoptosis receptor. Phosphorylation of the two ITAM tyrosines is a critical event in signal transduction. All (p)2ITAMs, but not their nonphosphorylated counterparts, induced extensive protein tyrosine phosphorylation in permeabilised cells. After binding of the ligand via an SH2 domain, phosphorylation of the two conserved tyrosines of ITAM creates binding sites for downstream signalling molecules and thus enables the initiation of signalling events. This phosphorylation was found to reflect activation of the src family kinases Lyn and Syk. Different ITAMs may preferentially activate distinct signalling pathways as a consequence of distinct SH2 effector binding preference. Furthermore, in viruses, ITAMs may play key roles in viral pathogenesis by regulating viral clearance, immune cell activation, immune cell recruitment through binding of cellular kinases and thereby down regulate their function. This motif can be found in one to three copies and in association with the Ig-like domain. Proteins currently known to contain an ITAM motif are: Mammalian alpha and beta immunoglobulin proteins, TCR gamma receptors, FCR gamma receptors subunits, CD3 chains receptors and NFAT activation molecule. Hantavirus cytoplasmic elements.
