identifier: Pfam:PF24794
label: Duc1 FFAT-like motif
definition: >-
  This entry represents the FFAT-like motif found in proteins such as Duc1 from Schizosaccharomyces pombe, that interact with VAP (VAMP-associated protein) family members like Scs2 and Scs22. The motif is characterised by two adjacent aromatic residues (typically FF, but YF in Duc1) downstream of an acidic tract. It also contains conserved alanine and glutamate residues at the second and fourth positions after the aromatic pair, respectively. This motif mediates interactions with the Major Sperm Protein (MSP) domains of VAP proteins, playing a crucial role in tethering proteins to ER-PM contact sites. In Duc1, the core of this motif is Y374 and F375, which are essential for the protein's interaction with Scs2 and Scs22, and consequently for its proper localization and function in maintaining plasma membrane lipid composition and cytokinetic ring anchoring.
