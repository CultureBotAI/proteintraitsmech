identifier: Pfam:PF03507
label: CagA exotoxin phosphopeptide substrate mimic region
definition: >-
  Helicobacter pylori is the most common world-wide infection and plays an important role in pathogenesis of peptic ulcers. The CagA (cytotoxin-associated gene A) protein is a cell-surface antigen which may play a role in determining the relative virulence of the viral strains. This entry represents the phosphopeptide substrate mimic region of CagA. This region mimics substrates of human kinase PAR1b/MARK2, resembling eukaryotic protein kinase inhibitors.
