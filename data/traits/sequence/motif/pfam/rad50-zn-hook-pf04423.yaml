identifier: Pfam:PF04423
label: Rad50 zinc hook motif
definition: >-
  This entry represents the zinc hook of human DNA repair protein RAD50 and similar sequences found in all cellular organisms. Dimerisation at this domain is critical for the function of the Mre11 complex. The MRN complex (Mre11-Rad50-Nbs1) plays an important role in many DNA metabolic events that involve DNA double-stranded breaks. MRN is one of the first factors to be localised to DNA lesions where it might have a structural role by tethering and stabilising broken chromosomes. Rad50 is a split ABC-type ATPase; its centre contains a long heptad repeat that folds into an antiparallel coiled coil, bringing the N-terminal (Walker A) and the C-terminal (Walker B) domains in close proximity. The apex of the coiled coil contains a dimerisation interface, a conserved Cys-X-X-Cys motif in a hook-shaped domain that dimerises with a second hook domain via cysteine-mediated zinc ion coordination. This zinc dependent dimerisation event allows the formation of a complex that has appropriate lengths and conformational properties to link sister chromatids in homologous recombination and DNA ends in non-homologous end-joining.
