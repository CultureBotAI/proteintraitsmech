label: Trans-sialidase of Trypanosoma hydrophobic C-terminal
definition: >-
  This is a highly conserved region, of about 50aa, that is the very C terminus of a number of more diverse proteins from Trypanosoma cruzi. All members of the family are annotated putatively as being trans-sialidase but this appears to be a diverse group.
