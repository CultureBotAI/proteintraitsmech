identifier: Pfam:PF24428
label: PYCO1 Rubisco-binding repeat
definition: >-
  This entry represents a Rubisco-binding repeat domain found in uncharacterised proteins from diatoms. It has similarity with the Rubisco-binding repeat domain in the pyrenoid component 1 (PYCO1). PYCO1 is an intrinsically disordered repeat protein that plays a crucial role in the formation of the pyrenoid, a microcompartment within chloroplasts that concentrates CO2 for more efficient carbon fixation. This entry represents a repeat that binds to the Rubisco small subunit. Four KWSPR/Q motifs can form a tetrad that binds to the small subunits lining Rubisco's central solvent channel. The repeats enable PYCO1 to undergo liquid-liquid phase separation, forming condensates that specifically partition diatom Rubisco. This phase separation is crucial for the formation and function of the pyrenoid in diatoms, which are responsible for a significant portion of marine carbon fixation.
