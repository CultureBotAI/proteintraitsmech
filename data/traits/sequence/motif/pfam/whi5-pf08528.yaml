identifier: Pfam:PF08528
label: Whi5 like
definition: >-
  This is a short conserved sequence found in the Nrm1/Whi5 transcription factors. Nrm1 is a negative regulatory component of the MBF complex involved in cell-cycle-dependent transcription. Whi5 is a transcriptional repressor that negatively regulates G1-specific, SBF- and MBF-dependent transcription.
