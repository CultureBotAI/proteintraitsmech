identifier: Pfam:PF21078
label: Glutamate dehydrogenase, helical motif 3
definition: >-
  This entry represents the third helical motif (HM3) found in a group of NAD-specific glutamate dehydrogenases. Glutamate dehydrogenases (GDHs) are a broadly distributed group of enzymes that catalyse the reversible oxidative deamination of glutamate to ketoglutarate and ammonia. The structure of GDH from Mycobacterium smegmatis revealed that it has a long N- and C-terminal segments flanking the catalytic core, comprising several domains. The flexible N-terminal domain comprises ACT-like and PAS-type domains which could act as metabolic sensors for allosteric regulation. It also contains three α-helical motifs (HM1-3).
