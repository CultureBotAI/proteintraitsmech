identifier: Pfam:PF10555
label: 'Phospho-N-acetylmuramoyl-pentapeptide-transferase signature 1 '
definition: >-
  Phospho-N-acetylmuramoyl-pentapeptide-transferase ( ) (MraY) is a bacterial enzyme responsible for the formation of the first lipid intermediate of the cell wall peptidoglycan synthesis. It catalyses the formation of undecaprenyl-pyrophosphoryl-N-acetylmuramoyl-pentapeptide from UDP-MurNAc-pentapeptide and undecaprenyl-phosphate. This entry represents two conserved sites found in these proteins. The first site is located at the end of the first cytoplasmic loop and the beginning of the second transmembrane domain. The second site is located in the third cytoplasmic loop.
