identifier: Pfam:PF15403
label: HiaBD2_N domain of Trimeric autotransporter adhesin (GIN)
definition: >-
  This represent the GIN (Gly-Ile-Asn) domain of the Head region of TAAs - trimeric autotransporter adhesins. Not all TAAs carry this domain; however, in those that do, the GIN in combination with the Trp-ring domain is necessary for adhesion to fibronectin in the host cell.
