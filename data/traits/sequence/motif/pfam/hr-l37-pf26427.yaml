identifier: Pfam:PF26427
label: 50S ribosomal protein L37 helical region
definition: >-
  This entry represents the homologues of bL37 ribosomal protein. bL37 is a small, highly basic protein found in the ribosomes of certain bacteria, notably mycobacteria such as Mycolicibacterium smegmatis and Mycobacterium tuberculosis. It consists of 24 amino acids and has a theoretical molecular weight of about 2.84 kDa. bL37 is located near the peptidyltransferase center (PTC) of the large (50S) ribosomal subunit, which is a crucial site for protein synthesis and it may play a role in stabilising this region or modulating its function. PTC ia a common target for antibiotics and knockout studies in Mycolicibacterium smegmatis have shown that the absence of bL37 increases sensitivity to the antibiotic linezolid.
