identifier: Pfam:PF24779
label: UTP23 sensor motif
definition: >-
  This entry represents the sensor motif region found in the UTP23 protein. The sensor motif is located in the C-terminal region of UTP23 and recognises the snR30-ES6 three-way junction in the 18S rRNA. This interaction is crucial for the early stages of 90S pre-ribosome assembly and 18S rRNA processing. The sensor motif is highly conserved across eukaryotes and is essential for UTP23 function. Deletion of this motif results in a substantial growth defect, highlighting its importance in ribosome biogenesis. Utp23 share homology with PINc domain protein Fcf1. They are components of the small subunit processome (SSU) that are involved in rRNA-processing and ribosome biogenesis.
