identifier: Pfam:PF03778
label: 'Protein of unknown function (DUF321) '
definition: >-
  This entry represents a group of tandem repeats, found in Arabidopsis species, whose sequence is distantly related to the FARP (FMRFamide) group of neuropeptides ( ). The function of these repeats is not known, being mostly found in uncharacterised proetins, but they are also present in the nuclear migration protein NUM1.
