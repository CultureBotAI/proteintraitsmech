identifier: Pfam:PF18521
label: Transactivation domain 2
definition: >-
  This is a N-terminal transactivation domain (TAD) domain 2 found in p53 proteins. In p53 two TAD domains are found termed TAD1 (residues 1-39) and TAD2 (residues 40-61), both of which have been shown to be able to independently activate gene transcription and are intrinsically disordered protein domains that adopt a helical conformation for at least part of their length when bound. This inherent flexibility allows the TADs to adapt to and bind a broad range of proteins. This entry describes TAD2 which can independently interact with Taz2 domain of the histone acetyltransferase p300. It has also been shown to bind to OB-fold domain of replication protein 70 A (RPA) as well as the pleckstrin homology (PH) domain of the p62 and Tfb1 subunits of human and yeast TFIIH.
