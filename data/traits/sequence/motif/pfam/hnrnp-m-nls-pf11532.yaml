identifier: Pfam:PF11532
label: HnRNP M nuclear localisation signal
definition: >-
  Heterogeneous nuclear ribonucleoproteins (hnRNPs) bind directly to nascent RNA polymerase II transcripts and play an important role in both transcript-specific packaging and alternative splicing of pre-mRNAs. hnRNP M proteins are an abundant group of hnRNPs that have been shown to bind avidly to poly(G) and poly(U) RNA homopolymers. hnRNP M family members are able to induce exon skipping and promote exon inclusion, suggesting that the proteins may broadly contribute to the fidelity of splice site recognition and alternative splicing regulation. This entry represents the N-terminal PY nuclear localisation signal of heterogeneous nuclear ribonucleoprotein M.
