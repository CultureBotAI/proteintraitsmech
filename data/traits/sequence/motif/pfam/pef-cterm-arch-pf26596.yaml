identifier: Pfam:PF26596
label: PEF-CTERM archaeal protein sorting domain
definition: >-
  This entry represents a 24-residue motif, located at the C-terminal of archaeal proteins and acting as a protein-sorting signal. This motif contains an invariant triad Pro-Glu-Phe and it is a target of archaeosortase C. Several proteins with this motif have their genes only a short distance from archaeosortase C, a proposed integral membrane transpeptidase. This domain, distantly related to the PEP-Cterm domain described in entry , is found in Methanosarcina mazei (Methanosarcina frisia) in four different proteins, as well as in other archaea such as Methanococcoides burtonii. Several proteins with this domain have their genes only a short distance from archaeosortase C, a proposed integral membrane transpeptidase.
