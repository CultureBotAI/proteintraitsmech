identifier: Pfam:PF10399
label: Ubiquitinol-cytochrome C reductase Fe-S subunit TAT signal
definition: >-
  This entry represents the TAT-signal region found in the iron-sulphur subunit of Ubiquinol-cytochrome C reductase (also known as the cytochrome bc1 complex). This enzymex is an oligomeric membrane protein complex that is a component of respiratory and photosynthetic electron transfer chains. It couples the transfer of electrons from ubiquinol to cytochrome c with the generation of a protein gradient across the membrane. This entry is associated with , and .
