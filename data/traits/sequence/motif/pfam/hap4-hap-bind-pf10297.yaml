identifier: Pfam:PF10297
label: 'Minimal binding motif of Hap4 for binding to Hap2/3/5   '
definition: >-
  This entry represents an essential domain of the transcription activator Hap4 that allows it to associate with Hap2, Hap3 and Hap5 to form the Hap complex. In Saccharomyces cerevisiae (Baker's yeast), the haem-activated protein complex Hap2/3/4/5 plays a major role in the transcription of genes involved in respiration.
