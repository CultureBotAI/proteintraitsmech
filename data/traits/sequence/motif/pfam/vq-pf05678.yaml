identifier: Pfam:PF05678
label: VQ motif
definition: >-
  This short motif is found in a variety of plant proteins. These proteins vary greatly in length and are mostly composed of low complexity regions. They all conserve a short motif FXhVQChTG, where X is any amino acid and h is a hydrophobic amino acid. The function of this motif is uncertain, however one protein in this family has been found to bind the SigA sigma factor . It would seem plausible that this motif is needed for this activity and that this whole family might be involved in modulating plastid sigma factors.
