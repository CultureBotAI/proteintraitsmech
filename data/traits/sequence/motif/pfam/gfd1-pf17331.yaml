identifier: Pfam:PF17331
label: GFD1 mRNA transport factor
definition: >-
  This entry represents the mRNA transport factor GFD1. GFD1 is a coiled-coiled protein of unknown function, which was identified as a high-copy suppressor of mutant alleles of ATP-dependent RNA helicase DBP5, which is involved in mRNA export from the nucleus. It may also play an important role in a late stage of NAB2-mRNA export.
