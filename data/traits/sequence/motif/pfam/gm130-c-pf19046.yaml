identifier: Pfam:PF19046
label: GM130 C-terminal binding motif
definition: >-
  This entry represents the C-terminal motif of the golgin subfamily A member 2 protein (or GM130) that is bound by the GRASP65 PDZ1 and PDZ2 domains. These interactions are required for their association and localisation of GRASP65 to the cis-cisternae. Members of the Golgin subfamily A were identified as Golgi auto-antigens. They might be involved in maintaining cis-Golgi structure. One of the members of this family, member 2 or GM130, is a specific interacting partner of the small GTPase Rab1b and plays a key role in the disassembly and reassembly of the Golgi apparatus during mitosis. GM130 is also involved in vesicle tethering and fusion at the cis-cisternae to facilitate transit between transport vesicles and the stacked cisternae. It interacts with GRASPs proteins, which mediate the stacking of Golgi cisternae. Additionally, GM130 was localised to the spindle poles and regulates microtubule organisation. Structurally, GM130 is comprised of six coiled-coil regions in the middle, a Golgi-targeting domain at the C-terminal, and a p115-interacting motif at the N-terminal.
