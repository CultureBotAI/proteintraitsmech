identifier: Pfam:PF18946
label: GpV Apex motif
definition: >-
  This entry represents a short motif found at the C terminus of Phage gpV proteins. These proteins act as a spike for piercing the host membrane. The apex motif contains a conserved HXH motif that coordinates an iron ion.
