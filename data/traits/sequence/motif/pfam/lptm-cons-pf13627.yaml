identifier: Pfam:PF13627
label: LPS-assembly lipoprotein LptM, conserved region
definition: >-
  This entry includes LPS-assembly lipoprotein LptM, a component of the lipopolysaccharide (LPS) transport (Lpt) pathway that promotes efficient assembly of the outer membrane LPS translocon (LptDE) by the BAM complex. It binds to LptD translocon subunit and facilitates oxidative maturation of LptD by stabilising a conformation of the LPS translocon in which LptD can efficiently acquire native disulfide bonds, thereby activating the LPS translocon. This entry represents the short conserved core of this protein.
