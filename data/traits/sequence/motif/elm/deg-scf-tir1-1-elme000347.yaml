identifier: ELM:ELME000347
label: DEG_SCF_TIR1_1
definition: >-
  Phytohormone-dependent SCF-LRR-binding degrons — This degron motif is present in Aux/IAA transcriptional repressor proteins and binds to TIR1/AFB F-box proteins of the SCF E3 ubiquitin ligase in an auxin-dependent manner.
