identifier: ELM:ELME000094
label: LIG_Integrin_RGD_1
definition: >-
  Integrin RGD-type binding sites — The RGD motif can be found in many extracellular proteins and is recognized by different members of the integrin family. The structure of the tenth type III module of fibronectin shows that the RGD motif lies on an exposed flexible loop.
