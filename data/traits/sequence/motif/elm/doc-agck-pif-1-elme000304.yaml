identifier: ELM:ELME000304
label: DOC_AGCK_PIF_1
definition: >-
  AGC Kinase docking motif — The DOC_AGCK_PIF_1 motif contains a phosphorylatable serine/threonine residue that allows fine-tuning of the affinity of the motif for the PIF pocket, with the phosphorylated motif showing a higher affinity.
