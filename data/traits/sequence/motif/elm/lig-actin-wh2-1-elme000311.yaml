identifier: ELM:ELME000311
label: LIG_Actin_WH2_1
definition: >-
  Actin-binding motifs — WH2 is a motif of variable length (16-19 amino acids) binding to the hydrophobic cleft formed by actin's subdomains 1 and 3. At the N-terminus it forms an alpha-helix followed by a flexible loop stabilised upon actin binding.
