label: LIG_WRC_WIRS_1
definition: >-
  WAVE regulatory complex (WRC) binding site motif — WRC interacting receptor sequence (WIRS) is a highly conserved and widespread interaction motif that is employed by diverse membrane proteins to recruit the WRC to initiate the dynamic rearrangements of the actin cytoskeleton.
