identifier: ELM:ELME000350
label: DEG_SCF_COI1_1
definition: >-
  Phytohormone-dependent SCF-LRR-binding degrons — This degron motif is present in JAZ transcriptional repressor proteins and binds to the COI1 F-box protein of the SCF E3 ubiquitin ligase in a jasmonate-dependent manner.
