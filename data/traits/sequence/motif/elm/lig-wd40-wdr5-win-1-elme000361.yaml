identifier: ELM:ELME000361
label: LIG_WD40_WDR5_WIN_1
definition: >-
  WDR5 WD40 repeat (central)-binding ligand — Known as the Win (WDR5 interaction) motif, this peptide binds to the central tunnel of the WD40 repeat domain of WDR5 to mediate assembly of histone modification complexes.
