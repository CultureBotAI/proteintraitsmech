identifier: ELM:ELME000408
label: LIG_KLC1_WD_1
definition: >-
  Motifs binding the TPR domain of kinesin light chain 1 — This short WD or WE motif is found in cargo proteins and mediates kinesin-1-dependent microtubule transport by binding to the KLC TPR region.
