label: LIG_WD40_WDR5_VDV_1
definition: >-
  WDR5 WD40 repeat (blade 5,6)-binding ligand — This WDR5-binding motif binds to a cleft between blades 5 and 6 of the WD40 repeat domain of WDR5, opposite of the Win motif-binding site, to mediate assembly of histone modification complexes.
