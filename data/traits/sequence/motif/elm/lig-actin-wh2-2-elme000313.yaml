identifier: ELM:ELME000313
label: LIG_Actin_WH2_2
definition: >-
  Actin-binding motifs — The WH2 motif is of variable length (16-19 amino acids) binding to the hydrophobic cleft formed by actin's subdomains 1 and 3. At the N-terminus it forms an alpha-helix followed by a flexible loop stabilised upon actin binding.
