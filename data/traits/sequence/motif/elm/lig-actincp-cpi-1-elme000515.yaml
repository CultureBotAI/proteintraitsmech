label: LIG_ActinCP_CPI_1
definition: >-
  Actin capping protein regulatory motif — The conserved capping protein interaction (CPI) motif is employed by a diverse set of proteins to allosterically down-regulate actin filament capping by CP and thereby fine-tune actin assembly dynamics.
