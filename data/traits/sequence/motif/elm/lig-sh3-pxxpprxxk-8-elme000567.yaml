identifier: ELM:ELME000567
label: LIG_SH3_PxxPPRxxK_8
definition: >-
  SH3 domain ligands — This HPK1 subtype of the RxxK motifs, where the RxxK is preceded by an upstream PxxP, is used by HPK1 and some other proteins mainly in T-cell receptor signalling to interact with the C-terminal SH3 domain of GADS or GRB2.
