identifier: ELM:ELME000354
label: DEG_Nend_UBRbox_4
definition: >-
  N-degron — N-terminal motif that initiates protein degradation by binding to the UBR-box of N-recognins. This N-degron variant comprises N-terminal Cys as destabilizing residue.
