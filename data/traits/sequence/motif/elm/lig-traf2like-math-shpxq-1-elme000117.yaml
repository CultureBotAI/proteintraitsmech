label: LIG_TRAF2like_MATH_shPxQ_1
definition: >-
  TRAF2 group (TRAF1,2,3,5) MATH domain binding motifs — Short (or major) TRAF2 binding motif. Members of the tumour necrosis factor receptor (TNFR) superfamily initiate intracellular signaling by recruiting the C-domain of the TNFR-associated factors (TRAFs) to their cytosolic tails.
