identifier: ELM:ELME000133
label: LIG_TRAF6_MATH_1
definition: >-
  Motif which binds to the MATH domain of the TRAF6 K63 E3 ligase — TRAF6 binding site. Members of the tumour necrosis factor receptor (TNFR) superfamily initiate intracellular signalling by recruiting the C-domains of the TNFR-associated factors (TRAFs) using motifs in their cytoplasmic tails.
