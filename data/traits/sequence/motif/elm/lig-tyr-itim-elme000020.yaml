identifier: ELM:ELME000020
label: LIG_TYR_ITIM
definition: >-
  Immunoreceptor tyrosine-based motif — ITIM (immunoreceptor tyrosine-based inhibitory motif). Phosphorylation of the ITIM motif, found in the cytoplasmic tail of some inhibitory receptors (KIRs) that bind MHC Class I, leads to the recruitment and activation of a protein tyrosine phosphatase.
