identifier: ELM:ELME000310
label: DOC_AGCK_PIF_3
definition: >-
  AGC Kinase docking motif — The DOC_AGCK_PIF_3 variant consists only of the first two core aromatic residues preceding the phosphorylatable or acidic site in the other variants, and the latter of these two aromatic residues is the C-terminal residue of the kinase sequence.
