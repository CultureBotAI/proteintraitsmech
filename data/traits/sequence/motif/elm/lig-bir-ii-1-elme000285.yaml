identifier: ELM:ELME000285
label: LIG_BIR_II_1
definition: >-
  IAP-binding motif (IBM) — These IBMs are found in pro-apoptotic proteins and function in the abrogation of caspase inhibition by Inhibitor of Apoptosis Proteins (IAPs) in apoptotic cells. The motif binds specifically to type II BIR domains.
