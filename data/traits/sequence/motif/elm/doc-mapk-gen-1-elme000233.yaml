identifier: ELM:ELME000233
label: DOC_MAPK_gen_1
definition: >-
  MAPK docking motifs — MAPK interacting molecules (e.g. MAPKKs, substrates, phosphatases) carry docking motif that help to regulate specific interaction in the MAPK cascade. The classic motif approximates (R/K)xxxx#x# where # is a hydrophobic residue.
