label: LIG_Rrp6Rrp47_Mtr4_1
definition: >-
  Rrp6-Rrp47 heterodimer-binding motif in Mtr4 — The motif enables the interaction of Mtr4 like helicases with the Rrp6-Rrp47 heterodimer and thus the formation of the exosome binding complex.
