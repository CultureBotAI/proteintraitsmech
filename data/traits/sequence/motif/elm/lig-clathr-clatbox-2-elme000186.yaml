identifier: ELM:ELME000186
label: LIG_Clathr_ClatBox_2
definition: >-
  Clathrin box — Clathrin box motif found on cargo adaptor proteins, it mediates binding to the N-terminal beta propeller of clathrin heavy chain. Also called W box, it is found in the central region of Amphiphysins where it coexists with a "classical" clathrin box.
