identifier: ELM:ELME000410
label: LIG_CSL_BTD_1
definition: >-
  Ligand motif binding the CSL BTD — The motif mediates the interaction between a Notch-like protein and the transcription factor CSL by placing two amino acids (W and P) into a hydrophobic pocket of the BTD domain of CSL.
