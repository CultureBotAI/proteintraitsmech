identifier: ELM:ELME000565
label: LIG_SH3_PxRPPK_7
definition: >-
  SH3 domain ligands — This PxRPxK subtype of the RxxK motifs is typically employed by GRB2-associated-binding proteins (GABs) 1, 2 and 3, and by other proteins, such as THEMIS, for binding of the C-terminal SH3 domains of GRB2 or GADS.
