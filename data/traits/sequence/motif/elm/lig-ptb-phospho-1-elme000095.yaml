identifier: ELM:ELME000095
label: LIG_PTB_Phospho_1
definition: >-
  PTB ligand — This phosphorylation-dependent motif binds to Shc-like and IRS-like PTB domains. The pTyr is positioned within a highly basic-charged anchoring pocket. A hydrophobic residue -5 (compared to pY) increases the affinity of the interaction.
