identifier: ELM:ELME000338
label: LIG_EABR_CEP55_1
definition: >-
  Cep55 EABR-binding motif — This proline-rich motif binds to the EABR domain of Cep55 and is involved in both cytokinesis of somatic cells and intercellular bridge formation in differentiating germ cells.
