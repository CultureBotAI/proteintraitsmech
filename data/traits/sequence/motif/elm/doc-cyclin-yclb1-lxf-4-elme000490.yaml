identifier: ELM:ELME000490
label: DOC_CYCLIN_yClb1_LxF_4
definition: >-
  Cyclin N-terminal Domain Docking Motifs — The LxF motif found in budding yeasts serves as a docking site for mitotic cyclin-CDK complexes (M-CDK). It is found in both regulators and mitotic phosphorylation target proteins.
