identifier: ELM:ELME000104
label: LIG_WRPW_1
definition: >-
  WRPW motif — The WRPW motif mediates recruitment of transcriptional co-repressors of the Groucho/transducin-like enhancer-of-split (TLE) family. LIG_WRPW_1 is based on the C-terminus located motifs found in the Hairy and Runt family proteins.
