identifier: ELM:ELME000435
label: LIG_APCC_ABBA_1
definition: >-
  APCC activator-binding ABBA motif — Amphipathic motif that is involved in APC/C inhibition by binding of CDH1/CDC20. In metazoan cyclin A, the motif also acts as a degron, enabling the cyclin's degradation in prometaphase.
