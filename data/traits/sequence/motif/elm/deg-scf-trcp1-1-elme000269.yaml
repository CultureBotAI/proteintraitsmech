identifier: ELM:ELME000269
label: DEG_SCF_TRCP1_1
definition: >-
  SCF ubiquitin ligase binding Phosphodegrons — The DSGxxS phospho-dependent degron binds the F box protein of the SCF-betaTrCP1 complex. The degron is found in various proteins that function in regulation of cell state.
