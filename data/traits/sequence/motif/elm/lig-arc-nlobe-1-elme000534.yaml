label: LIG_Arc_Nlobe_1
definition: >-
  Arc N-lobe binding ligand — Binding motif for the N-lobe part of the C-terminal domain in Arc. The N-lobe domain has structural homology with HIV virus capsid, but the binding appears to be unique to higher vertebrates.
