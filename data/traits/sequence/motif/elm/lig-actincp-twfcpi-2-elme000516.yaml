label: LIG_ActinCP_TwfCPI_2
definition: >-
  Actin capping protein regulatory motif — The highly conserved twinfilin-type actin capping protein interaction (CPI) motif is employed by twinfilins to maintain the dynamic actin capping/decapping cycles of CP and to counterbalance the effects of negative regulators.
