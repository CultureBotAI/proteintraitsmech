identifier: ELM:ELME000235
label: LIG_RRM_PRI_1
definition: >-
  RRM domain ligands — The PTB RRM2 Interacting (PRI) motif is found in some splicing regulators, possibly only in the chordate lineage. As part of splicing complex regulation, it interacts with the 2nd RNA binding domain (RRM) of PTB, the polypyrimidine tract binding protein.
