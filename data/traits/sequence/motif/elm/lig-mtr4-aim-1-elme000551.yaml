identifier: ELM:ELME000551
label: LIG_MTR4_AIM_1
definition: >-
  MTR4 arch domain ligand — Diverse nuclear exosome adaptors employ the so-called arch-interacting motif (AIM) to recruit the MTR4-exosome complex to different RNA species for facilitating their efficient degradation.
