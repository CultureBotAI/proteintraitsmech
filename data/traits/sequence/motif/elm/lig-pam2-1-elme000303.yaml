identifier: ELM:ELME000303
label: LIG_PAM2_1
definition: >-
  PAM2 motif — Peptide ligand motif that directly binds to the MLLE/PABC domain found in poly(A)-binding proteins and HYD E3 ubiquitin ligases, mainly via a common central core region and a complementary N-terminal region.
