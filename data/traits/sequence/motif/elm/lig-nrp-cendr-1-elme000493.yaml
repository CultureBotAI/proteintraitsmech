identifier: ELM:ELME000493
label: LIG_NRP_CendR_1
definition: >-
  CendR Motif Binding to Neuropilin Receptors — The CendR motif has a carboxy-terminal arginine, which binds to the Neuropilin b1 domain binding site. CendR motifs are either located at the protein C-terminus or are generated by internal cleavage by a polybasic protease, such as Furin
