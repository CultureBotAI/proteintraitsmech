identifier: ELM:ELME000383
label: LIG_Mtr4_Trf4_1
definition: >-
  Mtr4-Trf4-interaction site — This motif on Trf4 interacts with the DExH core of Mtr4, forming a part of the nucleus-located TRAMP complex. The motif is conserved in Fungi.
