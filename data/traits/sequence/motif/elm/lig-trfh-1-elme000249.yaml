identifier: ELM:ELME000249
label: LIG_TRFH_1
definition: >-
  TRFH domain docking motifs — TRF1 and TRF2 both bind to another shelterin protein: TIN2. The TRF1-TIN2 interaction was mediated by a short motif in the N-Ter of TIN2. TIN2 connects TRF1 to TRF2; this link contributes to the stabilization of TRF2 on telomeres.
