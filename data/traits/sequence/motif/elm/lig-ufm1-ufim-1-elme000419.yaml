label: LIG_UFM1_UFIM_1
definition: >-
  UFM1 interacting motif — UFIM is a motif present in the E1 enzyme UBA5 required to bind ubiquitin-like protein UFM1. UFIM overlaps with a LIR motif binding LC3/GABARAP family proteins.
