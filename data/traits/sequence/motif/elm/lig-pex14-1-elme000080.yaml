identifier: ELM:ELME000080
label: LIG_Pex14_1
definition: >-
  Pex14 ligand motif — Wxxx[FY] motifs present in N-terminal half of Pex5 bind to Pex13 and Pex14 at peroxisomal and glycosomal membranes to facilitate entrance of PTS1 cargo proteins into the organellar lumen.
