identifier: ELM:ELME000288
label: LIG_BIR_III_3
definition: >-
  IAP-binding motif (IBM) — These IBMs are found in arthropodal pro-apoptotic proteins and function in the abrogation of caspase inhibition by Inhibitor of Apoptosis Proteins (IAPs) in apoptotic cells. The motif binds specifically to type III BIR domains of arthropodal IAPs.
