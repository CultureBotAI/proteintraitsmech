identifier: ELM:ELME000122
label: LIG_PTB_Apo_2
definition: >-
  PTB ligand — These phosphorylation-independent motifs bind to Dab-like PTB domains. Binding is not driven by contacts at the 0 or FY position, but instead is dependent upon the large number of hydrophobic and hydrogen bond contacts between motif and domain.
