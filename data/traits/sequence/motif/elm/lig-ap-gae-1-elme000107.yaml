identifier: ELM:ELME000107
label: LIG_AP_GAE_1
definition: >-
  Gamma-adaptin ear interaction motif — The acidic Phe motif mediates the interaction between a set of accessory proteins and the gamma-ear domain (GAE) of GGAs and AP-1. Proposed roles: in clathrin localization and assembly on TGN/endosome membranes and in traffic between the TGN and endosome.
