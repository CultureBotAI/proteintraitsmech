label: DEG_Kelch_Keap1_1
definition: >-
  KEAP1 binding degron — Motif that binds to the Kelch domain of KEAP1 with high affinity. This high affinity motif is required for the efficient recruitment of target proteins to the Cul3-based E3 ligase.
