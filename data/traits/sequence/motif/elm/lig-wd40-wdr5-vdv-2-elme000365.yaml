identifier: ELM:ELME000365
label: LIG_WD40_WDR5_VDV_2
definition: >-
  WDR5 WD40 repeat (blade 5,6)-binding ligand — Fungi-specific variant of the WDR5-binding motif that binds to a cleft between blades 5 and 6 of the WD40 repeat domain of WDR5, opposite of the Win motif-binding site, to mediate assembly of histone modification complexes.
