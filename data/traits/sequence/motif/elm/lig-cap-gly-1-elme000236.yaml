identifier: ELM:ELME000236
label: LIG_CAP-Gly_1
definition: >-
  CAP-Gly Domain Ligands — Short, acidic and aromatic carboxy terminal sequence found in a small group of microtubule-associated-proteins. The EEY/F$ motif is highly conserved and so far limited to a few known proteins, alpha-tubulin, EB proteins and CLIP170.
