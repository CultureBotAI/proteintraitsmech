identifier: ELM:ELME000412
label: LIG_ANK_PxLPxL_1
definition: >-
  PxLPxI/L motif binding to some ANK repeat proteins — The consensus PxLPxI/L motif, which can be found in diverse proteins, binds to the ankyrin repeat domains of ANKRA2 and its close paralog RFXANK.
