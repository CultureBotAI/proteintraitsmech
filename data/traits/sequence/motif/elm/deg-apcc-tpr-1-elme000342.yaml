identifier: ELM:ELME000342
label: DEG_APCC_TPR_1
definition: >-
  APCC_TPR-docking motifs — This short C-terminal motif is present in co-activators, the Doc1/APC10 subunit and some substrates of the APC/C and mediates direct binding to TPR-containing APC/C core subunits.
