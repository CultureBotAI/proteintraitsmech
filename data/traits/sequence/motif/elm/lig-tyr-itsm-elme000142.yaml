identifier: ELM:ELME000142
label: LIG_TYR_ITSM
definition: >-
  Immunoreceptor tyrosine-based motif — ITSM (immunoreceptor tyrosine-based switch motif). This motif is present in the cytoplasmic region of the CD150 subfamily within the CD2 family and it enables these receptors to bind to and to be regulated by SH2 adaptor molecules, as SH2DIA.
