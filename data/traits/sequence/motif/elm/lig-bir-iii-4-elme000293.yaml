definition: >-
  IAP-binding motif (IBM) — These IBMs are found in the N-terminal regions of arthropodal caspase subunits where they mediate the inhibition of activated caspases by binding to conserved surface grooves on type III BIR domains of Inhibitor of Apoptosis Proteins (IAPs).
