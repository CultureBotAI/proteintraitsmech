identifier: ELM:ELME000105
label: LIG_WRPW_2
definition: >-
  WRPW motif — The WRPW motif mediates recruitment of transcriptional co-repressors of the Groucho/transducin-like enhancer-of-split (TLE) family. LIG_WRPW_2 is not restricted to the C-terminus (in contrast to LIG_WRPW_1).
