identifier: ELM:ELME000326
label: LIG_OCRL_FandH_1
definition: >-
  F and H motif — The F and H motif describes a 10-13-mer peptide sequence determined by a highly conserved phenylalanine and histidine residue surrounded by hydrophobic amino acids. A complex of ASH and RhoGAP-like domain binds this motif within a hydrophobic pocket.
