identifier: ELM:ELME000246
label: DOC_WD40_RPTOR_TOS_1
definition: >-
  Raptor interacting motif — The TOR pathway adaptor protein Raptor links the mTOR kinase to the TOS motif containing substrates 4E-BP1 and S6-beta kinases. Proteins with TOR motif (e.g. 4E-BP1, S6KB1) participate in the transcription mechanism.
