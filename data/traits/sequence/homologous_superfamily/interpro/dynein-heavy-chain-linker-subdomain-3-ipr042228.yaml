identifier: InterPro:IPR042228
label: "Dynein heavy chain, linker, subdomain 3"
definition: >-
  This superfamily represents the subdomain 3 found in the linker domain of dynein heavy chain. The linker exists as a rod-like structure that comprises nineteen α-helices and eight β-strands and can be divided into five subdomains from 0 to 4. This subdomain interacts with subdomain 2 and 4 and has been suggested to play a role in the interactions between the linker base and the ring. Dyneins are motor proteins of eukaryotic cells that convert energy from ATP hydrolysis into force and movement along microtubules. They generally contain one to three heavy chains (each >500kDa), which belong to the AAA+ superfamily of mechanochemical enzymes, along with several accessory subunits ranging from light to intermediate chains. Each heavy chain consists of a flexible N-terminal tail known as the cargo-binding domain and a motor domain. The motor domain comprises an ATP-hydrolysing AAA+ ring (formed by six AAA domains), a linker, a stem, a C-sequence, and a stalk with a long coiled-coil structure. The stalk contains an ATP-sensitive microtubule-binding site at its tip, while the linker functions as a mechanical element for generating dynein's power stroke. Studies using a 380kDa recombinant fragment of the Dictyostelium dynein heavy chain demonstrated that the C-terminal two-thirds maintains microtubule-activated ATPase activity and drives robust microtubule sliding, confirming this region as the functional motor domain. Two categories of dyneins exist: axonemal dyneins, which produce bending motions that propagate along cilia and flagella, and cytoplasmic dyneins, which drive fundamental cellular processes including nuclear migration, mitotic spindle organisation, chromosome separation, and the positioning and function of intracellular organelles.
