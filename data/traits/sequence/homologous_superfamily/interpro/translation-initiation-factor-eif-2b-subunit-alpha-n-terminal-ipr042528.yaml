identifier: InterPro:IPR042528
label: "Translation initiation factor eIF-2B subunit alpha, N-terminal"
definition: >-
  Translation initiation factor 2 binds to Met-tRNA, GTP and the small ribosomal subunit. The eukaryotic translation initiation factor eIF-2B is a complex which comprises five different subunits, alpha, beta, gamma, delta and epsilon, and catalyses the exchange of eIF-2-bound GDP for GTP. This superfamily represents the N-terminal α helical domain of the translation initiation factor (eIF-2B) alpha subunit from eukaryotes.
