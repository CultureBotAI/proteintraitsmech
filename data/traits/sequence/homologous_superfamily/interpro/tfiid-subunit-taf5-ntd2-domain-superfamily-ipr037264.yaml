identifier: InterPro:IPR037264
label: "TFIID subunit TAF5, NTD2 domain superfamily"
definition: >-
  This region is an all-alpha domain associated with the WD40 helical bundle of the TAF5 subunit of transcription factor TFIID. The domain has distant structural similarity to RNA polymerase II CTD interacting factors. It contains several conserved clefts that are likely to be critical for TFIID complex assembly. The TAF5 subunit is present twice in the TFIID complex and is critical for the function and assembly of the complex, and the NTD2 (second N-terminal domain) and N-terminal domain are crucial for homodimerisation. TAF5 has a paralogue gene (TAF5L) which has a redundant function. The TATA Binding Protein (TBP) Associated Factor 5 (TAF5) is one of several TAFs that bind TBP and are involved in forming Transcription Factor IID (TFIID) complex. TFIID plays an important role in the recognition of promoter DNA and assembly of the preinitiation complex. TFIID complex is composed of the TBP and at least 13 TAFs. In yeast and human cells, TAFs have been found as components of other complexes besides TFIID. The N-terminal domain of TAF5 has a multihelical structure with a C-terminal β-α(2)-β motif, one central buried helix and parallel β-ribbon. This domain is also found in the so-called 'Protein will decrease acetylation' from Drosophila melanogaster which is a component of the transcription regulatory complex SAGA, a multiprotein complex that activates transcription by remodeling chromatin and mediating histone acetylation and deubiquitination [ , , .
