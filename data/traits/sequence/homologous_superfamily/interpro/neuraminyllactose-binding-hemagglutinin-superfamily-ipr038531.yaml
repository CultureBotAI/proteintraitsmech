identifier: InterPro:IPR038531
label: "Neuraminyllactose-binding hemagglutinin superfamily"
definition: >-
  This superfamily is comprised of several flagellar sheath adhesin proteins also called neuraminyllactose-binding haemagglutinin precursor (NLBH or HpaA) or N-acetylneuraminyllactose-binding fibrillar haemagglutinin receptor-binding subunits. NLBH is found exclusively in Helicobacter which are gut colonising bacteria and bind to sialic acid rich macromolecules present on the gastric epithelium. The sialic acid-sensitive agglutination of erythrocytes by certain strains of Helicobacter pylori has been attributed to the NLBH protein.
