identifier: InterPro:IPR043150
label: "Phytochrome, PHY domain superfamily"
definition: >-
  Phytochromes form a major family of photoreceptors responsible for red light perception in plants, fungi and bacteria. They undergo reversible photoconversion between red-absorbing (Pr) and far-red-absorbing (Pfr) states, thereby ultimately converting a light signal into a distinct biological signal that mediates subsequent cellular responses. This entry represents the PHY domain of phytochrome which connects the chromophore binding domains PAS-GAF with the output kinase.
