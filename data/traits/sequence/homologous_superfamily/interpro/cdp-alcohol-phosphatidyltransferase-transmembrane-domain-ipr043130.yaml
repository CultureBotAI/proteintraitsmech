identifier: InterPro:IPR043130
label: "CDP-alcohol phosphatidyltransferase, transmembrane domain"
definition: >-
  The CDP-alcohol phosphotransferase (CDP-AP) family of integral membrane enzymes catalyses the transfer of a substituted phosphate group from a CDP-linked donor to an alcohol acceptor. This is an essential reaction for phospholipid biosynthesis across all kingdoms of life, and it is catalysed solely by CDP-APs. This entry represents the transmembrane (TM) domain of CDP-alcohol phosphotransferase which is made up of 7 α helices.
