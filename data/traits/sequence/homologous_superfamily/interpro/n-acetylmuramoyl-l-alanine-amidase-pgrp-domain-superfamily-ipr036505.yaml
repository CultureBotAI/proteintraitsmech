identifier: InterPro:IPR036505
label: N-acetylmuramoyl-L-alanine amidase/PGRP domain superfamily
definition: >-
  This entry represents a domain found in N-acetylmuramoyl-L-alanine amidases from bacteria and peptidoglycan recognition proteins (PGRP). PGRPs are ubiquitous proteins involved in innate immunity, conserved from insects to mammals. They have antibactericidal activity. PGRPs have at least one of these domains homologous to bacteriophage and bacterial type 2 amidases. Some PGRPs have been shown to be N-acetylmuramoyl-L-alanine amidases.
