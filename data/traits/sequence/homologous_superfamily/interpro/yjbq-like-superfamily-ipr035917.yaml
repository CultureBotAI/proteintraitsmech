identifier: InterPro:IPR035917
label: "YjbQ-like superfamily"
definition: >-
  This family contains small uncharacterised proteins of 14 to 16kDa mainly from bacteria although the signatures also occur in a hypothetical protein from archaea and eukaryotes. Members of this protein family, designated YjbQ in E. coli, have been studied extensively by crystallography. Members from several different species have been shown to have sufficient thiamine phosphate synthase activity to complement thiE mutants. However, it is presumed that this is a secondary activity, and the primary function of the YjbQ family enzyme remains unknown.
