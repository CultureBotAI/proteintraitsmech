identifier: InterPro:IPR036243
label: "Photosystem I PsaX superfamily"
definition: >-
  This superfamily consists of photosystem I (PSI) protein subunit PsaX. PSI is a large multi-subunit pigment protein complex embedded in the thylakoid membranes of green plants and cyanobacteria. PsaX is one of the 12 protein subunits found in PSI and these subunits are arranged as monomers or trimers within the membrane as shown by the structure of the trimeric complex from Synechococcus elongatus.
