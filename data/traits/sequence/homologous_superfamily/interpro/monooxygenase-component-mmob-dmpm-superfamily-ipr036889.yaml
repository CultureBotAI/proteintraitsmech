identifier: InterPro:IPR036889
label: Monooxygenase component MmoB/DmpM superfamily
definition: >-
  This entry includes monooxygenase component MmoB methane monooxygenase regulatory protein B and Phenol hydroxylase protein component P2 (DmpM). When MmoB is present at low concentration it converts methane monooxygenase from an oxidase to a hydroxylase and stabilises intermediates required for the activation of dioxygen. DmpM lacks redox co-factors and is required for optimal turnover of Phenol hydroxylase. Phenol hydroxylase catabolises phenol and some of its methylated derivatives in the first step of phenol biodegradation, and is required for growth on phenol. The multicomponent enzyme is made up of P0, P1, P2, P3, P4 and P5 polypeptides. The common structure for these proteins consists of a corner-like structure formed by two sheets and filled in with 2-3 helices.
