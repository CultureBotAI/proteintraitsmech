identifier: InterPro:IPR027396
label: DsrEFH-like
definition: >-
  DsrE, DsrF, DsrH are part of a gene cluster involved in intracellular sulfur reduction in purple sulfur bacteria. In E. coli, the DsrEFH homologue TusBCD interacts with the DsrC homologue TusE in a sulfur relay system during 2-thiouridine biosynthesis. DsrE, DsrF and DsrH form a soluble multimeric protein DsrEFH, which is an alpha2beta2gamma2-structured holoprotein.
