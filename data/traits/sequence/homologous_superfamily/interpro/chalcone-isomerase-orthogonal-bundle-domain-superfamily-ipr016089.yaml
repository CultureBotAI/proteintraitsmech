identifier: InterPro:IPR016089
label: "Chalcone isomerase, orthogonal bundle domain superfamily"
definition: >-
  Chalcone isomerase ( ; also known as chalcone-flavanone isomerase or fatty-acid-binding protein) is a plant enzyme responsible for the isomerisation of chalcone to naringenin, a key step in the biosynthesis of flavonoids. The Petunia hybrida (Petunia) genome contains two genes coding for very similar enzymes, ChiA and ChiB, but only the first seems to encode a functional chalcone isomerase. This superfamily represents an α-helical orthogonal bundle subdomain found in chalcone isomerases.
