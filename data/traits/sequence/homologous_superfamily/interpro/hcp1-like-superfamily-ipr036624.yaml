identifier: InterPro:IPR036624
label: "Hcp1-like superfamily"
definition: >-
  This entry consists of Hcp-like proteins. Hcp is part of the type VI secretion system of Gram-negative bacteria. Hcp is not only a secreted effector protein, but also might act as machine component. Several bacterial pathogens mediate interactions with their hosts through protein secretion, often involving Hcp-like virulence loci, which are widely distributed among pathogenic bacteria. Homologues of Hcp are found in various bacteria of which most, but not all, are known pathogens. Many bacteria have two copies of hcp genes. In Pseudomonas syringae, Hcp1 is a virulence protein, while Hcp2 seems to be required for survival in competition with enterobacteria and yeasts, and its function is associated with the suppression of the growth of these competitors. Hcp1 monomers form a hexameric ring with a large internal diameter. Assembly of this particle is likely to occur following secretion, and could have a role in building a channel for the transport of other macromolecules. This entry also includes Major exported protein.
