label: "HIT-like superfamily"
definition: >-
  The histidine triad motif (HIT) consists of the conserved sequence HXHXHXX (where X is a hydrophobic amino acid) at the enzymatic catalytic centre, in which the second histidine is strictly conserved and participates in catalysis with the third histidine. Proteins containing HIT domains form a superfamily of nucleotide hydrolases and transferases that act on the alpha-phosphate of ribonucleotides. They are highly conserved from archaea to humans and are involved in galactose metabolism, DNA repair, and tumor suppression. HIT-containing proteins can be divided in five families based on catalytic specificities, sequence compositions, and structural similarities of its members: Hint family of protein kinase-interacting proteins, the most ancient class in this superfamily. These include adenosine 5'-monophosphoramide hydrolases (e.g. HIT-nucleotide-binding protein, or HINT). They also have a conserved zinc-binding motif C-X-X-C (where C is a cysteine residue and X is a hydrophobic residue), and a zinc ion is coordinated by these cysteine residues, together with the first histidine residue. Fragile HIT protein, or FINT, whose name is due to its high rate of mutation at its locus on chromosome 3 in many cancers has been characterised as a tumor suppressor and plays a role in the hydrolysis of dinucleotide polyphosphates. HINT and FINT HIT domains have a topology similar to that found in the N-terminal of protein kinases. GalT family. These include specific nucleoside monophosphate transferases (e.g. galactose-1-phosphate uridylyltransferase, diadenosine tetraphosphate phosphorylase, and adenylyl sulphate:phosphate adenylytransferase). These HIT domains are a duplication consisting of 2 HIT-like motifs. This family binds zinc and iron. Aprataxin, which hydrolyses both dinucle…
