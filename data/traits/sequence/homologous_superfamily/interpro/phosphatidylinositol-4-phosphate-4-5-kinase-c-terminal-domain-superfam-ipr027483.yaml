identifier: InterPro:IPR027483
label: "Phosphatidylinositol-4-phosphate 4/5-kinase, C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal domain of the phosphatidylinositol-4-phosphate 4/5-kinases (PIP4K/PIP5K). It has a 2-layer sandwich structure. PIP4/5K catalyses the formation of phosphoinositol-4,5-bisphosphate via the phosphorylation of phosphatidylinositol-4-phosphate a precursor in the phosphoinositide signalling pathway.
