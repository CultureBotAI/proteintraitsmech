identifier: InterPro:IPR036639
label: Cytochrome c oxidase subunit IV superfamily
definition: >-
  This superfamily is composed of cytochrome c oxidase subunit 4, subunits 5A and 5B, subunit 6 and subunit 7. Proteins in this entry also include the yeast COX IV subunit, Mtc3 (maintenance of telomere cappining 3) protein. Cytochrome c oxidase (CcO) ( ), the terminal oxidase in the respiratory chains of eukaryotes and most bacteria, is a multi-chain transmembrane protein located in the inner membrane of mitochondria and the cell membrane of prokaryotes. It catalyses the reduction of O2 and simultaneously pumps protons across the membrane. The number of subunits varies from three to five in bacteria and up to 13 in mammalian mitochondria. Subunits I, II, and III of mammalian CcO are encoded within the mitochondrial genome and the remaining 10 subunits are encoded within the nuclear genome. Found only in eukaryotes, subunit IV is the largest of the nuclear-encoded subunits. It binds ATP at the matrix side, leading to an allosteric inhibition of enzyme activity at high intramitochondrial ATP/ADP ratios. In mammals, subunit IV has a lung-specific isoform and a ubiquitously expressed isoform.
