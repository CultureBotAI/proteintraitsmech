identifier: InterPro:IPR038030
label: "NSP1 globular domain superfamily, betacoronavirus"
definition: >-
  Nonstructural protein 1 (NSP1) is a critical virulence factor of coronaviruses (CoV) and plays key roles in suppressing host gene expression, which facilitates viral replication and immune evasion. NSP1 is a characteristic feature of alpha and betacoronavirus, which exhibits both functional conservation and mechanistic diversity in inhibiting host gene expression and antiviral responses. NSP1 binds to the 40S ribosomal subunit and inhibits host translation, and it also induces a template-dependent endonucleolytic cleavage of host mRNAs, while viral mRNAs are less susceptible to NSP1-mediated inhibition of translation, because of their 5'-end leader sequence. NSP1 also suppresses the host innate immune functions by inhibiting type I interferon expression and host antiviral signalling pathways. The C-terminal domain binds to the mRNA entry tunnel interfering with mRNA binding. NSP1 consists of a globular domain arranged in a mixed parallel/antiparallel 6-stranded β-barrel with an α-helix covering one end of the barrel and another helix alongside the barrel. In addition to the globular domain, bCoV NSP1s have a C-terminal domain.
