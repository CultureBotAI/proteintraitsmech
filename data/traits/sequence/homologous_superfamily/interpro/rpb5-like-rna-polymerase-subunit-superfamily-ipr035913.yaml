identifier: InterPro:IPR035913
label: "RPB5-like RNA polymerase subunit superfamily"
definition: >-
  This entry represents a two-layer α/β fold, with a core structure of β/α/β/α/β(2) found in prokaryotic subunit H and the C terminus of eukaryotic RPB5. Prokaryotes contain a single DNA-dependent RNA polymerase (RNAP; ) that is responsible for the transcription of all genes, while eukaryotes have three classes of RNAPs (I-III) that transcribe different sets of genes. Each class of RNA polymerase is an assemblage of ten to twelve different polypeptides. Certain subunits of RNAPs, including RPB5 (POLR2E in mammals), are common to all three eukaryotic polymerases. RPB5 plays a role in the transcription activation process. Eukaryotic RPB5 has a bipartite structure consisting of a unique N-terminal region, plus a C-terminal region that is structurally homologous to the prokaryotic RPB5 homologue, subunit H (gene rpoH).
