identifier: InterPro:IPR044912
label: "Epidermal growth factor receptor, juxtamembrane domain"
definition: >-
  Receptor tyrosine kinases (RTKs) are transmembrane receptors that have intrinsic, cytoplasmic tyrosine kinase activity. Juxtamembrane regions in RTKs have been shown to play important regulatory functions. Their kinase activity is generally autoinhibited by its JX domain in the absence of ligand-stimulated tyrosine phosphorylation, due to the inhibitory Tyr phosphorylation sites found in the JX domain. This superfamily represents the JX domain of the EGF receptor.
