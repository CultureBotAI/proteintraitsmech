identifier: InterPro:IPR036955
label: AP2/ERF domain superfamily
definition: >-
  Ethylene is an endogenous plant hormone that influences many aspects of plant growth and development. Some defense related genes that are induced by ethylene contain a cis-regulatory element known as the Ethylene-Responsive Element (ERE). Sequence analysis on various ERE regions has identified a short motif rich in G/C nucleotides, the GCC-box, essential for the response to ethylene. This short motif is recognised by a family of transcrition factors, the ERE binding factors (ERF). ERF proteins contain a domain of around 60 amino acids which is also found in the APETALA2 (AP2) protein. This AP2/ERF domain has been shown in various proteins to be necessary and sufficient to bind the GCC-box. The structure of the AP2/ERF domain in complex with the target DNA has been solved. The structure resembles that of bacteriophage integrases and the methyl-CpG-binding domain (MBD): a three-stranded β-sheet and an α helix almost parallel to the β-sheet. It contacts DNA via Arg and Trp residues located in the β-sheet. Some proteins known to contain an AP2/ERF domain include: Arabidopsis thaliana ERF1 to 6. Tobacco ethylene-responsive element-binding proteins (EREBPs), homologues of ERF proteins. Arabidopsis thaliana AP2 protein. It regulates meristeme identity, floral organ specification and seed coat development. Arabidopsis thaliana C-repeat/dehydration-responsive element (DRE) binding factor 1 (CBF1 or DREB1) and DREB2. They bind a GCC-box-like element found in dehydratation responsive element. Binding to this element mediates cold-inducible transcription. Arabidopsis thaliana and maize abscisic acid (ABA)-insensitive 4 (ABI4) proteins. They bind to a GCC-box-like element found in ABA-responsive genes. Octadecanoid-derivative responsive catharenthus AP2-domain (ORCA2) protein. It b…
