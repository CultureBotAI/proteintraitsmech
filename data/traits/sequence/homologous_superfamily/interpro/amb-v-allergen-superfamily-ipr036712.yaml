identifier: InterPro:IPR036712
label: "Amb V Allergen superfamily"
definition: >-
  Amb V is an Ambrosia sp (ragweed) pollen allergen. Amb t V has been shown to contain a C-terminal helix as the major T cell epitope. Free sulphydryl groups also play a major role in the T cell recognition of cross-reactivity T cell epitopes within these related allergens. Structurally, Amb V has an α+β fold composed of three antiparallel strands followed by a short α helix.
