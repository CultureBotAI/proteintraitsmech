identifier: InterPro:IPR042523
label: "Ubiquitin-like modifier-activating enzyme Atg7, N-terminal, subdomain 2"
definition: >-
  This superfamily represents the second subdomain found in the N-terminal domain of ubiquitin-like modifier-activating enzyme Atg7. In Arabidopsis, the N-terminal domain binds the E2 enzymes Atg10 and Atg3. Ubiquitin-like modifier-activating enzyme ATG7 is an E1-like activating enzyme involved in two ubiquitin-like systems required for cytoplasm to vacuole transport (Cvt) and autophagy. Structurally, ATG7 is a symmetric homodimer with two catalytic cysteine residues and has a combined adenylation/catalytic cysteine-containing/homodimerization C-terminal domain (CTD) and a unique N-terminal domain (NTD) important for recruiting E2 enzymes. ATG7 activates ATG12 for its conjugation with ATG5 via the E2 enzyme ATG10, and ATG8 family proteins for their conjugation with phosphatidylethanolamine via the E2 enzyme ATG3. Both conjugation systems are necessary for ATG8 association with Cvt vesicles and autophagosome membranes. Autophagy is essential for maintaining amino acid levels and protein synthesis under nitrogen starvation conditions. ATG7 is required for selective autophagic degradation of the nucleus (nucleophagy) and for mitophagy, which contributes to regulating mitochondrial quantity and quality by eliminating mitochondria to basal levels to fulfil cellular energy requirements and prevent excess reactive oxygen species (ROS) production. ATG7 also plays a role in the regulation of filamentous growth and chronological longevity. In animals, ATG7 facilitates LC3-I lipidation with phosphatidylethanolamine to form LC3-II, which is found on autophagosomal membranes, and is required for autophagic death induced by caspase-8 inhibition. ATG7 modulates p53/TP53 activity to regulate cell cycle and survival during metabolic stress; independent of its E1-like enzymatic activity,…
