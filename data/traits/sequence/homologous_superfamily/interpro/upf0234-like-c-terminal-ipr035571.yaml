identifier: InterPro:IPR035571
label: "UPF0234-like, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain of UPF0234 uncharacterised proteins, which includes YajQ. It also found also in UPF0381 uncharacterised proteins. In Pseudomonas syringae, YajQ functions as a host protein involved in the temporal control of bacteriophage Phi6 gene transcription. It has been shown to bind to the phage's major structural core protein P1, most likely activating transcription by acting indirectly on the RNA polymerase. YajQ may remain bound to the phage particles throughout the infection period. Earlier, YajQ was characterised as a putative nucleic acid-binding protein based on the similarity of its (ferredoxin-like) three-dimensional topology with that of RNP-like RNA-binding domains. The polypeptide chain of YajQ is folded into two domains with identical folding topology. Each domain has a four-stranded antiparallel β-sheet flanked on one side by two α-helices. This structural motif is a characteristic feature of many RNA-binding proteins.
