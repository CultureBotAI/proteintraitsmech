identifier: InterPro:IPR038107
label: "3-deoxy-D-manno-octulosonic-acid transferase, N-terminal domain superfamily"
definition: >-
  3-deoxy-D-manno-octulosonic-acid transferase (WaaA, KdtA) is involved in lipopolysaccharide biosynthesis. It catalyses the transfer of two 3-deoxy-D-manno-octulosonate (Kdo) residues from CMP-Kdo to lipid IV(A), the precursor of lipid A. WaaA consists of two Rossmann-like domains. This superfamily represents the N-terminal domain, which is the acceptor-substrate binding domain. Structurally, it consists of 7 α-helices and 5 β-strands.
