identifier: InterPro:IPR024074
label: Argininosuccinate synthetase, catalytic/multimerisation domain body
definition: >-
  The argininosuccinate synthetase (AS) monomer is composed of a nucleotide binding domain and a catalytic/multimerisation domain. The catalytic/multimerisation domain can be subdivided in the body of the domain and a C-terminal tail involved in multimerisation, though this tail is not present in all sequences. This entry represents the body of the catalytic/multimerisation domain. It is a mixed α/β fold consisting of two four-stranded antiparallel β sheets arranged end-to-end to form a cradle for a cluster of five α helices. In general, the α helices of the domain are responsible for multimerisation interactions, whereas the β sheets form the solvent-exposed surface.
