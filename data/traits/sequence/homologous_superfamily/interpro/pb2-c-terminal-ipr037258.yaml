identifier: InterPro:IPR037258
label: PB2, C-terminal
definition: >-
  Two separate sequences, one N-(242-282) and the other C-terminal (538-577) proximal segments of PB2 subunit, constitute the RNA cap-binding site of the Influenza virus RNA polymerase. This entry represents the C-terminal domain superfamily, its structure consists of an α-β-α-X-α-β(2) fold arranged in three layers (α/β/α) with antiparallel β-sheet, where the connection between helices 2 and 3 runs over the edge of the β-sheet. The C-terminal domain of PB2 forms a stable complex with human importin alpha5 in vitro which, suggests that this domain directs nuclear import. This is further backed by the presence of a previously missed bipartite nuclear localization sequence (NLS) within this domain.
