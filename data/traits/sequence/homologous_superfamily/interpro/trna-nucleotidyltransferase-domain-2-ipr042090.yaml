label: "tRNA nucleotidyltransferase, domain 2"
definition: >-
  This superfamily comprises a domain consisting of a five helical bundle core. It is predominantly found in Archaeal tRNA nucleotidyltransferases, following the catalytic nucleotidyltransferase domain.
