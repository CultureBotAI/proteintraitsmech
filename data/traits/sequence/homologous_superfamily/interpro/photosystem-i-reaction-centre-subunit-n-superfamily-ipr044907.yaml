identifier: InterPro:IPR044907
label: "Photosystem I reaction centre subunit N superfamily"
definition: >-
  Photosystem I reaction centre subunit N (PSAN, also known as PSI-N) may function in mediating the binding of the antenna complexes to the PSI reaction centre and core antenna. PSI-N subunit does not bind pigments.
