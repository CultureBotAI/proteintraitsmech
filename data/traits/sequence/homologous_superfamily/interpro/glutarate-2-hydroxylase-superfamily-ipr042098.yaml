identifier: InterPro:IPR042098
label: "Glutarate 2-hydroxylase superfamily"
definition: >-
  This domain is found in Glutarate 2-hydroxylase ( ). This enzyme acts as an alpha-ketoglutarate-dependent dioxygenase catalysing hydroxylation of glutarate (GA) to L-2-hydroxyglutarate (L2HG). This domain is also found in Taurine dioxygenase (TauD) and related proteins. The Escherichia coli tauD gene is required for the utilisation of taurine (2-aminoethanesulphonic acid) as a sulphur source and is expressed only under conditions of sulphate starvation. TauD is an alpha-ketoglutarate-dependent dioxygenase catalysing the oxygenolytic release of sulphite from taurine. This domain is also found in gamma-butyrobetaine hydroxylase (GBBH), the enzyme responsible for the biosynthesis of L-carnitine, a key molecule of fatty acid metabolism. The GBBH monomer consists of this catalytic double-stranded β-helix (DBSH) domain, which is found in all 2-ketoglutarate (2KG) oxygenases, and a smaller N-terminal domain.
