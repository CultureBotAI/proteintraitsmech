identifier: InterPro:IPR014737
label: "Transposase, Tn5-like, C-terminal"
definition: >-
  This superfamily represents a domain found at the C-terminal of Tn5-type transposase proteins. Prokaryotic Tn5 transposase makes two types of DNA contacts (cis-contacts for DNA recognition and trans-contacts for catalysis) as well as protein-protein contacts. Tn5 transposase employs two cations at its active site during catalysis, which cause conformational changes in the bound DNA and which are required for transposition. Tn5 transposase has a RnaseH-type α/β/α fold. The C-terminal domain forms an orthogonal α-bundle structure.
