identifier: InterPro:IPR036646
label: BPG-independent phosphoglycerate mutase, domain B superfamily
definition: >-
  Two distinct classes of phosphoglycerate mutases (PGMs) are known; those dependent on cofactor 2,3-bisphosphoglycerate (2,3-BPG) and those whose activity is independent of cofactor but dependent on the presence of divalent metal cations. The structure of 2,3-BPG-independent phosphoglycerate mutase (or phosphoglyceromutase or BPG-independent PGAM) consists of an α/β type topology and is composed of two domains (A and B) with similar folds. The binding residues for both substrate and Mn2+, and the catalytic residues are located in the inter-domain cleft. This entry represents the B domain.
