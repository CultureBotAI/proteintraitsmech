identifier: InterPro:IPR036912
label: "Haem-binding HasA superfamily"
definition: >-
  Free iron is limited in vertebrate hosts, thus an alternative to siderophores has been developed by pathogenic bacteria to access host iron bound in protein complexes. HasA is a secreted haemophore that has the ability to obtain iron from haemoglobin. Once bound to HasA, the haem is shuttled to the receptor HasR, which releases the haem into the bacterium. The HasA domain structure has a β-α-β(6)-α(2) fold with antiparallel sheet.
