identifier: InterPro:IPR027273
label: "Neocarzinostatin-like superfamily"
definition: >-
  Neocarzinostatin (NCS) is a member of the macromolecular antitumour antibiotic family. NCS consists of two components, a polypeptide (apo-NCS) and a nonprotein chromophore. The crystal structure of NCS is similar to that of the related chromoproteins actinoxanthin and macromomycin.
