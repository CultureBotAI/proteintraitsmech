identifier: InterPro:IPR042178
label: "Serpin superfamily, domain 1"
definition: >-
  This superfamily represents the first domain found in Serpin proteins. Serpins (SERine Proteinase INhibitors) belong to MEROPS inhibitor family I4, clan ID. Most serpin family members are indeed serine protease inhibitors, but several have additional cross-class inhibition functions and inhibit cysteine protease family members such as the caspases and cathepsins. Others, such as ovalbumin, are incapable of protease inhibition and serve other functions.
