identifier: InterPro:IPR015791
label: "Antimicrobial/protein inhibitor, gamma-crystallin-like"
definition: >-
  This structural domain is found in a family of proteins with a Greek key motif that are related in structure to the beta/gamma crystallins. This group of proteins includes: Streptomyces killer toxin-like protein SKLP Antifungal protein, AFP1 Plant antimicrobial protein, MIAMP1 Streptomyces metalloproteinase inhibitor, SMPI. Note: SMPI belongs to MEROPS inhibitor I36, clan IU. It inhibits members of the thermolysin family, MEROPS peptidase family M4,.
