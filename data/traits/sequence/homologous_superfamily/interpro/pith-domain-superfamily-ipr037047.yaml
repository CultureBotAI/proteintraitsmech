identifier: InterPro:IPR037047
label: "PITH domain superfamily"
definition: >-
  This entry represents the PITH domain superfamily (derived from Proteasome-Interacting THioredoxin). The protein Txnl1, which is a probable component of the 32kDa 26S proteasome, uses its C-terminal PITH domain to associate specifically with the 26S proteasome. The PITH domain is dominated by a jelly roll β-sandwich structure. The β-sandwich is formed by face-to-face packing of two anti-parallel β-sheets. Another two-stranded β-sheet seals off one end of the β-barrel.
