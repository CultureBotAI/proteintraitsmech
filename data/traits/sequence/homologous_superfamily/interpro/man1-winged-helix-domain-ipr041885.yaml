identifier: InterPro:IPR041885
label: "MAN1, winged-helix domain"
definition: >-
  This superfamily entry represents the winged-helix domain located at the C-terminal end of MAN1, an integral protein of the inner nuclear membrane which binds to chromatin associated proteins and plays a role in nuclear organisation. The C-terminal nucleoplasmic region forms a DNA binding winged helix and binds to Smad. This C-terminal tail is also found in S. cerevisiae and is thought to consist of three conserved helices followed by two downstream strands. The carboxyl-terminal nucleoplasmic region of MAN1, comprising residues 655-910, exhibits two potential globular domains, an α/β structure which corresponds to a winged-helix domain. The first region of the domain is conserved in all MAN1 analogs. The N-terminal half of the domain is mainly α-helical, whereas the C-terminal half is composed of two large β-strands arranged in a twisted anti-parallel β-sheet.
