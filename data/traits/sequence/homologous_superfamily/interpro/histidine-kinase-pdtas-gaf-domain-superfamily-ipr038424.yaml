identifier: InterPro:IPR038424
label: "Histidine kinase PdtaS, GAF domain superfamily"
definition: >-
  This entry represents the GAF domain of the sensor region in the cytosolic histidine kinase (HK), PdtaS, from Mycobacterium tuberculosis. The N-terminal region of this protein is comprised of closely linked GAF and PAS domains, both are ubiquitous and form dimeric interfaces. GAF domains are known to bind heme (as can PAS domains), to be involved in redox responses and even to function as catalytic domains. PdtaS is a member of the two-component regulatory system PdtaR/PdtaS, which plays an essential role in mycobacterial adaptation to poor nutrient conditions. Under nutrient deprivation, there is an increase of intracellular concentrations of c-di-GMP which binds to the PdtaS sensor and promotes its autophosphorylation, leading to the activation of the signaling cascade.
