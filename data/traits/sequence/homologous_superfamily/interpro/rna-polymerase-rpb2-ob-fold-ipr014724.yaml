identifier: InterPro:IPR014724
label: RNA polymerase Rpb2, OB-fold
definition: >-
  RNA polymerases catalyse the DNA dependent polymerisation of RNA. Prokaryotes contain a single RNA polymerase compared to three in eukaryotes (not including mitochondrial and chloroplast polymerases). This entry describes a structural region consisting of an OB-fold β barrel that is found in RNA polymerase II Rpb2.
