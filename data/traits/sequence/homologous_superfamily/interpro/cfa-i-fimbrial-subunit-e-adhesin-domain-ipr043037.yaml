identifier: InterPro:IPR043037
label: "CFA/I fimbrial subunit E, adhesin domain"
definition: >-
  This superfamily represents the adhesin domain of CfaE, homologous to the pilus biogenesis initiator protein CbID and the major pilin subunits of CS pili. CfaE, the tip adhesin of enterotoxigenic Escherichia coli colonisation factor antigen I fimbriae (CFA/I), initiates binding of this enteropathogen to the small intestine. It comprises a stacked N-terminal β-sandwich adhesin domain (AD) and a C-terminal pilin domain (PD), with the putative receptor-binding pocket at one pole and an equatorial interdomain interface.
