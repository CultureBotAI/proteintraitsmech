identifier: InterPro:IPR027371
label: "Mg296-like, C-terminal"
definition: >-
  MPN423 is an homologue of MG296. Its function is unknown, but each molecule consists of five α-helical segments. This superfamily represents the C-terminal domain of MG296 and homologues.
