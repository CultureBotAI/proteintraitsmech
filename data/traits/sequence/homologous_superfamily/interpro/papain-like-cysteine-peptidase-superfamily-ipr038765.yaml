identifier: InterPro:IPR038765
label: "Papain-like cysteine peptidase superfamily"
definition: >-
  This entry represents the papain-like cysteine peptidase superfamily. Its members typically consist of one α-helix and 4 strands of antiparallel β-sheet and contain the catalytic triad Cys-His-Asn.
