identifier: InterPro:IPR038333
label: "Type I restriction enzyme EcoKI-like, methylase subunit, N-terminal domain superfamily"
definition: >-
  This superfamily represents a domain found at the N terminus of the methylase subunit of Type I DNA methyltransferases. This domain is found in bacteria and archaea, and is typically between 123 and 138 amino acids in length. Mutations in this region of EcoKI methyltransferase abolish the normally strong preference of this system for methylating hemimethylated substrate. The structure of this domain has been shown to be all α-helical.
