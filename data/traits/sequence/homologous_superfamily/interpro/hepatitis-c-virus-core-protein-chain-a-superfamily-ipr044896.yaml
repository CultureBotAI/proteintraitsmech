identifier: InterPro:IPR044896
label: "Hepatitis C virus core protein, chain A superfamily"
definition: >-
  This superfamily represents the N-terminal chain A region of the Hepatitis C virus core protein. The HCV core protein is located at the N terminus of the polyprotein and is followed by the signal sequence located between the core protein and the E1 envelope glycoprotein. This signal sequence targets the nascent HCV polyprotein to the endoplasmic reticulum (ER), allowing the translocation of E1 to the ER lumen. Cleavage by a signal peptidase in the ER lumen releases the N-terminal end of E1, leaving the 191-amino acids (aa) core protein anchored by its C-terminal signal peptide. This 191aa polypeptide, also known as p23, is the immature form of the core protein; p23 is further processed by an intramembrane protease, the signal peptide peptidase (SPP), that removes the ER anchor , releasing p21, the N-terminal 179aa mature form of the core protein. Core protein (p21) is responsible for packaging viral RNA to form a viral nucleocapsid, and it also promotes virion budding.
