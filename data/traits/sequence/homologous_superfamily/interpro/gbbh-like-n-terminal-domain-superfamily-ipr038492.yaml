identifier: InterPro:IPR038492
label: "GBBH-like, N-terminal domain superfamily"
definition: >-
  Gamma-butyrobetaine hydroxylase (GBBH), also known as gamma-butyrobetaine dioxygenase, is an alpha-ketoglutarate-dependent dioxygenase that catalyses the biosynthesis of L-carnitine by hydroxylation of gamma-butyrobetaine (GBB). GBBH is a dimeric enzyme. The monomer consists of a catalytic double-stranded β-helix domain and a smaller N-terminal domain. The N-terminal domain has a bound Zn ion, which is coordinated by three cysteines and one histidine. The N-terminal domain facilitates the assembly of a symmetric head-to-tail dimer formation through the interface with the C-terminal domain of the other monomer. This domain superfamily is also found in another hydroxylase of the biosynthetic pathway of L-carnitine, the first enzyme of the pathway, known as trimethyllysine dioxygenase (TMLD). Like GBBH, TMLD is a non-heme ferrous-iron dioxygenase that requires alpha-ketoglutarate, Fe2+, and molecular oxygen as cofactors.
