identifier: InterPro:IPR036222
label: "Adenylate cyclase-associated CAP, N-terminal domain superfamily"
definition: >-
  This entry represents the N-terminal domain of CAP proteins. This domain has an all-α structure consisting of six helices in a bundle with a left-handed twist and an up-and-down topology. Cyclase-associated proteins (CAPs) are highly conserved actin-binding proteins present in a wide range of organisms including yeast, fly, plants, and mammals. CAPs are multifunctional proteins that contain several structural domains. CAP is involved in species-specific signalling pathways. In Drosophila, CAP functions in Hedgehog-mediated eye development and in establishing oocyte polarity. In Dictyostelium (slim mold), CAP is involved in microfilament reorganisation near the plasma membrane in a PIP2-regulated manner and is required to perpetuate the cAMP relay signal to organise fruitbody formation. In plants, CAP is involved in plant signalling pathways required for co-ordinated organ expansion. In yeast, CAP is involved in adenylate cyclase activation, as well as in vesicle trafficking and endocytosis. In both yeast and mammals, CAPs appear to be involved in recycling G-actin monomers from ADF/cofilins for subsequent rounds of filament assembly. In mammals, there are two different CAPs (CAP1 and CAP2) that share 64% amino acid identity.
