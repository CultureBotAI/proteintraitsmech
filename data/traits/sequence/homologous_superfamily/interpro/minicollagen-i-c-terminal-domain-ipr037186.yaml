identifier: InterPro:IPR037186
label: "Minicollagen I, C-terminal domain"
definition: >-
  Minicollagen-1 from the nematocysts of Hydra is a trimeric protein that contains cysteine-rich domains at the N and C termini, which are involved in the assembly of an intermolecular disulfide network. The C-terminal minicollagen cysteine rich domain of Hydra consists of only 24 amino acids, six of which are prolines and six are cysteines bonded in disulfide bridges that constrain the structure into a new fold. The minicollagen cysteine-rich domains are believed to function in a switch of the disulfide connectivity from intra to intermolecular bonds during maturation of the capsule wall.
