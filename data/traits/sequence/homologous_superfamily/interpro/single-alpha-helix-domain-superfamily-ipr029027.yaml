identifier: InterPro:IPR029027
label: "Single alpha-helix domain superfamily"
definition: >-
  This superfamily represents a single α-helix domain involved in coiled-coils or other helix-helix interfaces. It shares protein structural similarities with the cytochrome b-c1 complex subunit 10-like domain, which consists of single transmembrane helices.
