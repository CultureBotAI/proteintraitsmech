identifier: InterPro:IPR042278
label: "Fimbrillin-like 1, N-terminal"
definition: >-
  This superfamily represents the N-terminal domain of fimbrillin proteins found by clustering human gut metagenomic sequences. Analysis of structural comparisons shows this proteins to be part of the FimbA (CL0450) superfamily of adhesin components or fimbrillins.
