identifier: InterPro:IPR018197
label: "Glycerate kinase, restriction-enzyme-like fold"
definition: >-
  Glycerate kinase 2 catalyses the phosphorylation of (R)-glycerate to 3-phospho-(R)-glycerate in the presence of ATP. These proteins consist of two different α/β domains: domain 1 has a flavodoxin-like fold, while domain 2 has a restriction enzyme-like fold (domain 2 is inserted into domain 1).
