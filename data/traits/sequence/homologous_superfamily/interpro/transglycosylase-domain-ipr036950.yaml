identifier: InterPro:IPR036950
label: "Transglycosylase domain"
definition: >-
  This entry represents the transglycosylase domain in various glycosyl transferases mainly from Glycosyltransferase family 51 and related proteins. Biosynthetic peptidoglycan transglycosylases are peptidoglycan polymerases that catalyse glycan chain elongation from lipid-linked precursors. Penicillin-binding proteins, such as Escherichia coli PBP1b, are bifunctional transglycosylases that consist of a transmembrane helix, a transglycosylase domain and a transpeptidase domain. The transglycosylase domain catalyses the polymerisation of murein glycan chains. This domain is also found on its own in monofunctional peptidoglycan transglycosylases. The biosynthesis of disaccharides, oligosaccharides and polysaccharides involves the action of hundreds of different glycosyltransferases. These enzymes catalyse the transfer of sugar moieties from activated donor molecules to specific acceptor molecules, forming glycosidic bonds. A classification of glycosyltransferases using nucleotide diphospho-sugar, nucleotide monophospho-sugar and sugar phosphates ([ec:2.4.1.-]) and related proteins into distinct sequence-based families has been described. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. The same three-dimensional fold is expected to occur within each of the families. Because 3-D structures are better conserved than sequences, several of the families defined on the basis of sequence similarities may have similar 3-D structures and therefore form 'clans'.
