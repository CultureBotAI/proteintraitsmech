identifier: InterPro:IPR012338
label: Beta-lactamase/transpeptidase-like
definition: >-
  This superfamily represents a beta-lactamase structural motif, which contains a cluster of α-helices and an α/β sandwich. In addition to beta-lactamases, this domain is also found in D-ala carboxypeptidase/transpeptidase, esterase (EstB), the penicillin receptor BlaR (C-terminal domain), D-aminopeptidase (N-terminal domain), penicillin-biding proteins (e.g. PBP2x, PBP5), and in glutaminase (GlnA). Beta-lactamases are the most common bacterial resistance mechanism against beta-lactam antibiotics. Beta-lactamases appear to have evolved from DD-transpeptidases, which are penicillin-binding proteins involved in cell wall biosynthesis, and as such are one of the main targets of beta-lactam antibiotics.
