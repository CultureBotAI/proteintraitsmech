identifier: InterPro:IPR012349
label: "FMN-binding split barrel"
definition: >-
  The FMN-binding domain has a split β-barrel structure with a Greek-key topology that is related in structure to the ferredoxin reductase-like FAD-binding domain. The FMN-binding split barrel domain is found in pyridoxine 5'-phosphate oxidase (PNP oxidase), FMN-binding protein, ferric reductase, and phenol 2-hydroxylase component B (PheA2). PNP oxidase ( ) is an FMN flavoprotein that catalyses the oxidation of pyridoxamine-5-P (PMP) and pyridoxine-5-P (PNP) to pyridoxal-5-P (PLP). This reaction serves as the terminal step in the de novo biosynthesis of PLP in Escherichia coli and as a part of the salvage pathway of this coenzyme in both E. coli and mammalian cells. The binding sites for FMN and for substrate have been highly conserved throughout evolution. The FMN-binding protein (FMN-bp) is one of the smallest proteins known to bind FMN. FMN-bp appears to participate in the electron-transfer pathway and may have a structural relationship to the C-terminal domain of chymotrypsin. Microbial ferric reductases are essential for generating more soluble ferrous iron to use in cellular proteins (assimilatory ferric reductases) and as terminal reductases of the iron respiratory pathway of certain bacteria (dissimilatory iron reductases). Most assimilatory iron reductases are flavin enzymes.
