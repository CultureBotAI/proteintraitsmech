identifier: InterPro:IPR029058
label: "Alpha/Beta hydrolase fold"
definition: >-
  This entry represent the α/β hydrolase superfamily that brings together enzymes with a common structural fold but diverse catalytic functions. This superfamily is characterised by a core structure composed of a central β-sheet consisting of 5-8 strands, connected by α-helices to form an α/β/α sandwich. The α/β hydrolase fold is common to a number of hydrolytic enzymes of widely differing phylogenetic origin and catalytic function. The core of each enzyme is an α/β-sheet (rather than a barrel), containing 8 strands connected by helices. The enzymes are believed to have diverged from a common ancestor, preserving the arrangement of the catalytic residues. All have a catalytic triad, the elements of which are borne on loops, which are the best conserved structural features of the fold. Esterase (EST) from Pseudomonas putida is a member of the α/β hydrolase fold superfamily of enzymes. In most of the family members the β-strands are parallel, but some have an inversion of the first strands, which gives it an antiparallel orientation. The catalytic triad residues are presented on loops. One of these is the nucleophile elbow and is the most conserved feature of the fold. Some other members lack one or all of the catalytic residues. Some members are therefore inactive but others are involved in surface recognition. The ESTHER database gathers and annotates all the published information related to gene and protein sequences of this superfamily.
