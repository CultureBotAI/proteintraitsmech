identifier: InterPro:IPR042211
label: "CRISPR-associated endonuclease Cas1, N-terminal domain"
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This superfamily represents the CRISPR-associated endonuclease Cas1, N-terminal β-sandwich-like domain. Cas1 may play a role in the recognition, cleavage, and/or integration of foreign nucleic acids into CRISPRs.
