identifier: InterPro:IPR036299
label: "Polyketide synthase, docking domain superfmaily"
definition: >-
  The N-terminal docking domain found in modular polyketide synthase assumes an α-helical structure, wherein two α-helices are connected by a short loop. Two such N-terminal domains dimerise to form amphipathic parallel α-helical coiled coils: dimerisation is essential for protein function.
