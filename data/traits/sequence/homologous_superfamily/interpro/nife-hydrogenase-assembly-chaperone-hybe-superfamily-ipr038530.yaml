identifier: InterPro:IPR038530
label: "[NiFe]-hydrogenase assembly chaperone, HybE superfamily"
definition: >-
  Members of this superfamily are chaperones for the assembly of [NiFe] hydrogenases, in the family of HybE, which is specific for hydrogenase-2 of Escherichia coli. Members often have an additional N-terminal rubredoxin domain.
