identifier: InterPro:IPR038338
label: "PriC superfamily"
definition: >-
  This superfamily contains the bacterial primosomal replication restart protein priC. PriC forms a compact bundle of α-helices that brings together residues involved in single-stranded DNA (ssDNA) and the ssDNA-binding protein (SSB) binding at adjacent sites on the protein surface. Replication restart protein PriC is involved in the reactivation of stalled replication forks by facilitating the reloading of the DnaB replicative helicase at sites other than the origin of replication. It recognises abandoned replication forks and remodels DNA single-stranded binding protein (SSB) bound to single-stranded DNA (ssDNA), thereby exposing a loading site for DnaB. PriC functions in multiple restart pathways: it is part of the minor PriC-Rep pathway, which exhibits distinct substrate specificity from the PriA-dependent pathway, and also contributes to the major replication restart pathway alongside PriA, PriB, DnaB, DnaT, and the DnaG primase. Notably, priB and priC have redundant roles in the cell. PriC has been shown to bind 7-9 nucleotides of ssDNA.
