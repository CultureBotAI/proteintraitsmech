identifier: InterPro:IPR037211
label: Bacteriophage DNA replication protein Gp16.7 superfamily
definition: >-
  The early-expressed gene 16.7 is conserved in bacteriophage phi-29 and related phages. It encodes a membrane protein, GP16.7, consisting of an N-terminal transmembrane domain and a C-terminal DNA-binding and dimerisation domain. GP16.7 plays an important role in organising membrane-associated bacteriophage DNA replication. The C-terminal domain has a similar secondary structure similar to homeodomains, but forms a fundamentally different tertiary structure consisting of a six-helical dimeric fold. Multimerisation of this dimer leads to efficient DNA binding.
