identifier: InterPro:IPR036748
label: "MTH938-like superfamily"
definition: >-
  MTH938 is a hypothetical protein encoded by Methanobacterium thermoautotrophicum. The crystal structure of MTH938 consists of three β-sheets and three α-helices. This superfamily also includes NDUFAF3, an essential factor for the assembly of mitochondrial NADH:ubiquinone oxidoreductase complex (complex I), and Mth938 domain-containing protein.
