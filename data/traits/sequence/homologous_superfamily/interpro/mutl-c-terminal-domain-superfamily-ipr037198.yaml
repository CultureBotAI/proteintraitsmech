identifier: InterPro:IPR037198
label: "MutL, C-terminal domain superfamily"
definition: >-
  MutL and MutS are key components of the DNA repair machinery that corrects replication errors. MutS recognises mispaired or unpaired bases in a DNA duplex and in the presence of ATP, recruits MutL to form a DNA signalling complex for repair. The N-terminal region of MutL contains the ATPase domain and the C-terminal is involved in dimerisation. The structure of the C-terminal domain of MutL consists of two different α+β (sub)domains, both composed of two layers (α/β) with antiparallel sheet, where the second domain is inserted in the first one.
