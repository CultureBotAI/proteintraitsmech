identifier: InterPro:IPR044878
label: "UbiA prenyltransferase superfamily"
definition: >-
  The UbiA superfamily of prenyltransferases includes bacterial 4-hydroxybenzoate octaprenyltransferase (gene ubiA); yeast mitochondrial para-hydroxybenzoate--polyprenyltransferase (gene COQ2); protoheme IX farnesyltransferase (heme O synthase) from yeast and mammals (gene COX10), and from bacteria (genes cyoE or ctaB); and 2-acylphloroglucinol 4-prenyltransferase and 2-acyl-4-prenylphloroglucinol 6-prenyltransferase from plant chloroplasts which catalyse prenylation steps in the beta-bitter acid pathway. These are integral membrane proteins, which probably contain seven transmembrane segments. Archaeal family members include lycopene elongase/hydratase - this type of enzyme has been shown to be involved in bacterioruberin synthesis in Halobacterium salinarum and Haloferax volcanii.
