identifier: InterPro:IPR023393
label: "START-like domain superfamily"
definition: >-
  This superfamily represents an α/β sandwich structural domain found in a wide variety of protein families, including STAR-related lipid transfer proteins and homeobox-leucine zipper proteins. START (StAR-related lipid-transfer) is a lipid-binding domain in StAR, HD-ZIP and signalling proteins. StAR (Steroidogenic Acute Regulatory protein) is a mitochondrial protein that is synthesised in response to luteinising hormone stimulation. Expression of the protein in the absence of hormone stimulation is sufficient to induce steroid production, suggesting that this protein is required in the acute regulation of steroidogenesis. Representatives of the START domain family have been shown to bind different ligands such as sterols (StAR protein) and phosphatidylcholine (PC-TP). Ligand binding by the START domain can also regulate the activities of other domains that co-occur with the START domain in multidomain proteins such as Rho-gap, the homeodomain, and the thioesterase domain.
