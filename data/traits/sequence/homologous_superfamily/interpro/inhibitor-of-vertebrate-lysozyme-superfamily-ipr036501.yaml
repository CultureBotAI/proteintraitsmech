identifier: InterPro:IPR036501
label: "Inhibitor of vertebrate lysozyme superfamily"
definition: >-
  C-type lysozyme enzymes, such as hen egg white lysozyme (HEWL), provide anti-bacterial activity by cleaving peptidoglycan in Gram-positive bacterial cell walls. In humans, C-type lysozyme is found in all secretions, including tears and saliva. Certain Gram-positive bacteria can produce proteins with anti-lysozyme activity known as Inhibitor of Vertebrate Lysozyme (IVY), which act as virulence factors. IVY proteins have a 3-layer α(2)/β(5)/α(2) topology, and contain a protruding 5-residue loop that is essential for their inhibitory effect.
