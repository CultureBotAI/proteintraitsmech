identifier: InterPro:IPR032710
label: "NTF2-like domain superfamily"
definition: >-
  This superfamily represents a domain covering the whole length of the nuclear transport factor 2 (NTF2). It has a β-α(2)-β insertion after the main helix. NTF2 protein is a nuclear envelope protein facilitating protein transport into the nucleus. Besides NTF2, proteins containing this domain include: UPF0225 protein YchJ 3-phenylpropionate/cinnamic acid dioxygenase subunit beta Large ribosomal subunit protein mL45 NTF1 Type IV secretion system protein virB8 Other related proteins
