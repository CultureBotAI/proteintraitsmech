identifier: InterPro:IPR038469
label: "tRNAHis guanylyltransferase Thg1 superfamily"
definition: >-
  tRNA His molecules are unusual in having an extra 5' GMP residue (G(-1)) that, in eukaryotes, is added after transcription and RNase P cleavage. Incorporation of this G(-1) residue is a rare example of nucleotide addition occurring at an RNA 5' end in a normal phosphodiester linkage. In Saccharomyces cerevisiae, YGR024c (Thg1p) protein is responsible for this guanylyltransferase reaction. It catalyses the guanylyltransferase step of G(-1) addition using a ppp-tRNA His substrate, and appears to catalyse the activation step using p-tRNA His and ATP. Thus, it catalyses phosphodiester bond formation at the 5' end of RNAs, formally in a 3'-5' direction.
