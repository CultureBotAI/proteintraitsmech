identifier: InterPro:IPR029031
label: "Gingipain, N-terminal superfamily"
definition: >-
  This superfamily represents a domain found at the N terminus of cysteine peptidases belonging to MEROPS peptidase family C25 (gingipain). Gingipains are cysteine proteinases acting as key virulence factors of the bacterium Porphyromonas gingivalis (Bacteroides gingivalis), a Gram-negative anaerobic bacterial species strongly associated with adult periodontitis. The gingipain subgroup contains extracellular Arg- and Lys-specific proteinases called Arg-gingipain (RgpA and RgpB) and Lys-gingipain (Kgp), which are the major virulence factors of P. gingivalis.
