identifier: InterPro:IPR036738
label: FKBP12-rapamycin binding domain superfamily
definition: >-
  The macrolide antibiotic rapamycin and the cytosol protein FKBP12 can form a complex which specifically inhibits the TORC1 complex, leading to growth arrest. The FKBP12-rapamycin complex interferes with TORC1 function by binding to the FKBP12-rapamycin binding domain (FRB) of the Tor proteins. This superfamily represents the FRB domain. Proteins containing this domain include Tor proteins which are serine/threonine kinases conserved from fungi to humans. While higher eukaryotes such as humans possess a single Tor protein, yeasts contain two (Tor1 and Tor2).
