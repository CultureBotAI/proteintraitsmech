identifier: InterPro:IPR036904
label: "Phycobilisome degradation protein NblA superfamily"
definition: >-
  In the cyanobacterium Synechococcus species PCC 7942, nblA triggers degradation of light-harvesting phycobiliproteins in response to deprivation nutrients including nitrogen, phosphorus and sulphur. The mechanism of nblA function is not known, but it has been hypothesised that nblA may act by disrupting phycobilisome structure, activating a protease or tagging phycobiliproteins for proteolysis. Members of this domain superfamily have also been identified in the chloroplasts of some red algae. The structure of the nblA domain is composed of four helices arranged as dimer of identical α-hairpin subunits with open bundle.
