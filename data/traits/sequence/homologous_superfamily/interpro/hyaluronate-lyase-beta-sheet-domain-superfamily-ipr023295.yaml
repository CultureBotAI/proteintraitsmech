identifier: InterPro:IPR023295
label: "Hyaluronate lyase, beta-sheet domain superfamily"
definition: >-
  This entry represents the N-terminal β-sheet domain which adopts a Ig-like fold and may serve as a connection of the α-domain with another structural domain. Hyaluronate lyase degrades hyaluronan and certain chondroitin sulfates at beta-1,4 glycosidic linkages and constitutes a virulence factor of Streptococcus agalactiae. It consists of three structural domains, an N-terminal β-sheet domain (also referred as to beta1), a middle catalytic α-helical domain ( ) and a C-terminal β-sheet domain (beta2, ).
