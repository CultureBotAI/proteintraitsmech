identifier: InterPro:IPR043128
label: "Reverse transcriptase/Diguanylate cyclase domain"
definition: >-
  This superfamily comprises domains found in several proteins such as reverse transcriptase, DNA polymerase IV and several nucleotide cyclases, such as the nucleotide-binding GGDEF domain. The representative domains have DNA-directed DNA polymerase, RNA-directed RNA polymerase and diguanylate cyclase activities, and are involved in viral replication, signal transduction, nucleotide binding, and hydrolysis of cyclic diguanylate.
