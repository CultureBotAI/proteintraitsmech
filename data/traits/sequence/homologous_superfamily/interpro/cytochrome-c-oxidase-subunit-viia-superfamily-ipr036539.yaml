identifier: InterPro:IPR036539
label: Cytochrome c oxidase, subunit VIIa superfamily
definition: >-
  Cytochrome c oxidase ( ) is an oligomeric enzymatic complex which is a component of the respiratory chain complex and is involved in the transfer of electrons from cytochrome c to oxygen. In eukaryotes this enzyme complex is located in the mitochondrial inner membrane; in aerobic prokaryotes it is found in the plasma membrane. In eukaryotes, in addition to the three large subunits, I, II and III, that form the catalytic centre of the enzyme complex, there are a variable number of small polypeptidic subunits. This superfamily is composed of the heart and liver isoforms of cytochrome c oxidase subunit VIIa. Subunit VIIa has two tissue-specific isoforms that are expressed in a developmental manner. VIIa-H is expressed in heart and skeletal muscle but not smooth muscle. VIIa-L is expressed in liver and non-muscle tissues.
