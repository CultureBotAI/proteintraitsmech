identifier: InterPro:IPR017449
label: Prolyl-tRNA synthetase, class II
definition: >-
  Aminoacyl-tRNA synthetases (also known as aminoacyl-tRNA ligases) catalyse the attachment of amino acids to their cognate transfer RNA molecules through a highly specific two-step reaction. These enzymes vary widely in size and oligomeric state, and share limited sequence homology. The 20 aminoacyl-tRNA synthetases are divided into two classes. Class I synthetases contain a characteristic Rossmann fold catalytic domain and are predominantly monomeric. Class II synthetases feature an antiparallel β-sheet fold flanked by α-helices and are mostly dimeric or multimeric, with at least three conserved regions. Despite these structural differences, both classes share a conserved α-helical structure involved in tRNA binding. The two classes also differ in their catalytic mechanisms: class I synthetases couple the aminoacyl group to the 2'-hydroxyl of the tRNA, whereas class II synthetases preferentially use the 3'-hydroxyl site. Class I includes synthetases specific for arginine, cysteine, glutamic acid, glutamine, isoleucine, leucine, methionine, tyrosine, tryptophan, valine, and some lysine synthetases (non-eukaryotic). Class II includes those specific for alanine, asparagine, aspartic acid, glycine, histidine, phenylalanine, proline, serine, threonine, and some lysine synthetases (non-archaeal). Based on their mode of binding to the tRNA acceptor stem, each class has been further subdivided into three subclasses: 1a, 1b, 1c and 2a, 2b, 2c. Proline tRNA ligase (also known as Prolyl tRNA synthetase) exists in two forms, which are loosely related. The first form is present in the majority of eubacteria species. The second one, present in some eubacteria, is essentially present in archaea and eukaryota. Proline-tRNA ligase belongs to class IIa.
