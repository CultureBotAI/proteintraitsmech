identifier: InterPro:IPR042572
label: "Carnitine o-acyltransferase, N-terminal"
definition: >-
  This superfamily represents the N-terminal domain of carnitine o-acetyltransferase. Carnitine o-acyltransferase catalyzes the reversible acylation of L-carnitine and thus plays a vital role in fatty acid beta-oxidation and maintenance of acyl coenzyme A (acyl-CoA) pools. It is a monomeric protein containing two domains (1 and 2) that interconnect to form an active site tunnel.
