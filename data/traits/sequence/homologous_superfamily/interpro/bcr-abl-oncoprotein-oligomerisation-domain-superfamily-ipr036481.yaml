identifier: InterPro:IPR036481
label: "Bcr-Abl oncoprotein oligomerisation domain superfamily"
definition: >-
  This entry represents the oligomerisation domain of the breakpoint cluster region oncoprotein Bcr, and the Bcr/Abl (Abelson-leukemia-virus) fusion protein created by a reciprocal (9;22) fusion. Brc displays serine/threonine protein kinase activity, acting as a GTPase-activating protein for RAC1 and CDC42. Brc promotes the exchange of RAC or CDC42-bound GDP by GTP, thereby activating them. The Bcr/Abl fusion protein loses some of the regulatory function of Bcr with regards to small Rho-like GTPases with negative consequences on cell motility, in particular on the capacity to adhere to endothelial cells. The Bcr, Bcr/Abl oncoprotein oligomerisation domain consists of a short N-terminal helix (α1), a flexible loop and a long C-terminal helix (α2). Together these form an N-shaped structure, with the loop allowing the two helices to assume a parallel orientation. The monomeric domains associate into a dimer through the formation of an antiparallel coiled coil between the α2 helices and domain swapping of two α1 helices, where one α1 helix swings back and packs against the α2 helix from the second monomer. Two dimers then associate into a tetramer. The oligomerization domain is essential for the oncogenicity of the Bcr-Abl protein.
