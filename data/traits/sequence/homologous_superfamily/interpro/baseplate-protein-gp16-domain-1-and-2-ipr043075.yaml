identifier: InterPro:IPR043075
label: "Baseplate protein Gp16, domain 1 and 2"
definition: >-
  ORF16 (or gp16) is a tail-phage P2-like protein that forms part of the base-plate at the tip of the phage tail. The whole base-plate complex is involved in host recognition and attachment, and consists of several proteins derived from consecutive open-reading-frames. This central domain is expressed from ORF16 in the lactococcal P2-phage and forms a trimer. ORF16 is a four domain protein that adopts a fold comparable to that of gp27 of myophage T4. This superfamily represents the domains 1 and 2 of the ORF16 protein.
