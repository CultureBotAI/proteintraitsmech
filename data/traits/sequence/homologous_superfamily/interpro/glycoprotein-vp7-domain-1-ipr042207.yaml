identifier: InterPro:IPR042207
label: "Glycoprotein VP7, domain 1"
definition: >-
  Glycoprotein VP7, also known as outer shell glycoprotein, is a serotype-specific antigen, and is the major neutralisation antigen. It is found in the dsRNA rotaviruses. This superfamily represents the domain 1 found in glycoprotein VP7, it consists of 6 α helices and 5 β strands arranged into a Rossmann fold. Within VP7, this superfamily makes up the first of 2 domains, the other being a jelly-roll β sandwich domain. A single disulfide bond is present within the domain.
