identifier: InterPro:IPR036380
label: "Isochorismatase-like superfamily"
definition: >-
  This entry represents a superfamily of hydrolase enzymes. Isochorismatase, also known as 2,3 dihydro-2,3 dihydroxybenzoate synthase catalyses the conversion of isochorismate, in the presence of water, to 2,3-dihydroxybenzoate and pyruvate ( ). The structure of isochorismatase has three layers (α/β/α) with parallel β-sheet of 6 strands.
