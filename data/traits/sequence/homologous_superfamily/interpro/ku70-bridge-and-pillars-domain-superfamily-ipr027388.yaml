identifier: InterPro:IPR027388
label: "Ku70, bridge and pillars domain superfamily"
definition: >-
  This superfamily represent the bridge and pillars domain of Ku70. Proteins containing this domain are Ku70 from eukaryotes. Ku70 is involved in the repair of DNA double-strand breaks by non-homologous end-joining.
