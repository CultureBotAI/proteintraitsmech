identifier: InterPro:IPR038248
label: "Dicer dimerisation domain superfamily"
definition: >-
  This entry represents the dimerisation domain in Dicer. It is essential for the activity of Dicer. It is a divergent double-stranded RNA-binding domain. The N-terminal α helix of this domain is in a different orientation to that found in canonical dsRNA-binding domains. This results in a change of charge distribution at the potential dsRNA-binding surface and in the N- and C-terminal of the domain being nearby. This domain has weak dsRNA-binding activity. It mediates heterodimerisation of Dicer proteins with their respective protein partners.
