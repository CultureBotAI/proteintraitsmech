identifier: InterPro:IPR037293
label: "Galactose oxidase, central domain superfamily"
definition: >-
  This entry represents a β-propeller domain found in galactose oxidase. Galactose oxidase ( ) is a monomeric enzyme that contains a single copper ion and catalyses the stereospecific oxidation of primary alcohols to their corresponding aldehyde. The protein contains an unusual covalent thioether bond between a tyrosine and a cysteine that forms during its maturation. Galactose oxidase is a three-domain protein: the N-terminal domain forms a jelly-roll sandwich, the central domain forms a seven 4-bladed β-propeller, and the C-terminal domain has an immunoglobulin-like fold.
