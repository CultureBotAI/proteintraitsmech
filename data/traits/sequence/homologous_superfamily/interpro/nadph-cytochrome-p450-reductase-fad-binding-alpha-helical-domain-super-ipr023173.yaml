label: NADPH-cytochrome p450 reductase, FAD-binding, alpha-helical domain superfamily
definition: >-
  This superfamily represents the α-helical subdomain (domain 3) of the FAD-binding domain which can be found in NADPH-cytochrome P450 reductases, nitric oxide synthases, NADPH-dependent diflavin oxidoreductases, and pyruvate dehydrogenases.
