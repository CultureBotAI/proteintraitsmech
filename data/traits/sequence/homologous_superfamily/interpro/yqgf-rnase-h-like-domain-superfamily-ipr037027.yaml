identifier: InterPro:IPR037027
label: YqgF/RNase H-like domain superfamily
definition: >-
  The YqgF domain superfamily is described as RNase H-like and typified by the Escherichia coli protein YqgF.YqgF domain-containing proteins are predicted to be ribonucleases or resolvases based on homology to RuvC Holliday junction resolvases. The group of proteins containing this domain are found primarily in the low-GC Gram-positive bacteria Holliday junction resolvases (HJRs) and in eukaryote orthologs. The RuvC HJRs are conspicuously absent in the low-GC Gram-positive bacterial lineage, with the exception of Ureaplasma urealyticum. Furthermore, loss of function ruvC mutants of Escherichia coli show a residual HJR activity that cannot be ascribed to the prophage-encoded RusA resolvase. This suggests that the YqgF family proteins could be alternative HJRs whose function partially overlaps with that of RuvC. The functions of eukaryotic proteins having this domain are less well described. In Saccharomyces cerevisiae (Baker's yeast) Spt6p and its orthologues, the catalytic residues are substituted indicating that they lack the enzymatic function of resolvases. Spt6p has been implicated in transcription initiation and in maintaining normal chromatin structure during transcription elongation. Horizontal gene transfer, lineage-specific gene loss and gene family expansion, and non-orthologous gene displacement seem to have been major forces in the evolution of HJRs and related nucleases. The diversity of HJRs and related nucleases in bacteria and archaea contrasts with their near absence in eukaryotes. The few detected eukaryotic representatives of the endonuclease fold and the RNase H fold have probably been acquired from bacteria via horizontal gene transfer. The identity of the principal HJR(s) involved in recombination in eukaryotes remains uncertain; this function c…
