identifier: InterPro:IPR008929
label: "Chondroitin AC/alginate lyase"
definition: >-
  Glycosaminoglycans (GAGs) are highly negatively charged polysaccharides, formed from disaccharide repeating units. For a number of bacterial species, including Flavobacterium heparinum synthesize GAG lyases, these enzymes are used to degrade and utilise glycosaminoglycans as a source of carbon in the bacterium's natural environment. In topological terms, the known structures of polysaccharide lyases fall within two protein fold families. Pectin and pectate lyases, as well as chondroitin lyase B belong to the right-handed parallel β-helix family and have the substrate-binding site in roughly the same topological location. The second topological family, all of which contain a domain consisting of an incomplete (α/α)5 toroid, includes chondroitin AC lyase family, and alginate lyase A1-III family from Sphingomonas species A1.
