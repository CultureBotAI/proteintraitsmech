identifier: InterPro:IPR036907
label: 5'-Nucleotidase, C-terminal domain superfamily
definition: >-
  This entry is the C-terminal domain superfamily of 5'-nucleotidases. The core structure of this domain consists of an α-β(2)-α-β(2)-α-β fold arranged into three layers with mixed sheet. 5'-nucleotidases are enzymes that catalyse the hydrolysis of phosphate esterified at carbon 5' of the ribose and deoxyribose portions of nucleotide molecules. 5'-nucleotidase is a ubiquitous enzyme found in a wide variety of species and which occurs in different cellular locations. The extracellular 5'-nucleotidase from mammals and Discopyge ommata (Electric ray) isozyme is a homodimeric disulphide-bonded glycoprotein attached to the membrane by a GPI-anchor, and requires zinc for its activity. Vibrio parahaemolyticus 5'-nucleotidase (gene nutA) is bound to the membrane by a lipid chain, and requires chloride and magnesium ions for its activity. It is involved in degrading extracellular 5'-nucleotides for nutritional needs. Periplasmic bacterial 5'-nucleotidase (gene ushA), also known as UDP-sugar hydrolase , can degrade UDP-glucose and other nucleotide diphosphate sugars. It produces sugar-1-phosphate which can then be used by the cell. UshA seems to require cobalt for its activity. 5'-Nucleotidases are evolutionary related to the periplasmic bacterial 2',3'-cyclic-nucleotide 2'-phosphodiesterase (gene cpdB), which catalyzes two consecutive reactions: it first converts 2',3'-cyclic-nucleotide to 3'-nucleotide and then acts as a 3'-nucleotidase; and mosquito apyrase (ATP-diphosphohydrolase), which catalyzes the hydrolysis of ATP into AMP and facilitates hematophagy by preventing ADP-dependent platelet aggregation in the host. CD73 (also called ecto-5'-nucleotidase) possesses the enzymatic activity of a 5'-nucleotidase and catalyses the dephosphorylation of purine and pyrimidine ribo-and…
