identifier: InterPro:IPR038234
label: "Colicin E5 ribonuclease domain superfamily"
definition: >-
  Colicin is a protein produced by bacteria with Col plasmids. Its function is to attack Escherichia coli through actions on its inner membrane ion channels or through ribonuclease or deoxyribonuclease actions. The C-terminal domain is the ribonuclease domain. Colicin E5 specifically cleaves tRNA anticodons which recognise codons in the form NAY (N:any nucleotide, A:adenosine, Y:pyrimidine) which corresponds to tyrosine, histidine, asparagine and aspartic acid.
