identifier: InterPro:IPR041965
label: "Putative transposon-transfer assisting superfamily"
definition: >-
  This entry represents the transposon-transfer assisting protein (TTRAP). TTRAP are small bacterial proteins largely from Clostrium difficile. From comparative and other structural studies of the PDB: ( ), it has been suggested that this family is required for interacting with other proteins in order to facilitate the transfer of the transposon CTn4 between different bacterial species. The structure comprises an α-helical fold of four α-helices leading to the production of two clefts, the larger of which displays two highly conserved residues in close proximity, Glu-8 and Lys-48. The gene concerned is part of an operon within transposon CTn4, and is expressed alongside a putative DNA primase, a DNA topoisomerase and conjugal transfer proteins.
