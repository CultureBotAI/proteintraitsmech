identifier: InterPro:IPR036937
label: Fimbrial-type adhesion domain superfamily
definition: >-
  This domain superfamily is found in bacterial proteins that are involved in regulation of length and mediation of adhesion of fimbriae. Fimbriae (also called pili), are polar filaments radiating from the surface of the bacterium to a length of 0.5-1.5 micrometers, that enable bacteria to colonize the epithelium of specific host organs. Fimbriae are also responsible to promote virulence.
