label: "Z ring-associated protein D, C-terminal"
definition: >-
  This superfamily represents a β sandwich domain found at the C terminus of Z ring-associated protein D (ZapD) and in other proteins currently uncharacterised. ZapD enhances FtsZ-ring assembly.
