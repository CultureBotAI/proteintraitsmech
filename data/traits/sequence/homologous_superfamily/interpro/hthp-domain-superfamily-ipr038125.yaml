identifier: InterPro:IPR038125
label: "HTHP domain superfamily"
definition: >-
  Hexameric tyrosine-coordinated heme protein (HTHP) is from the marine bacterium Silicibacter pomeroyi and has peroxidase and catalase activity. HTHP consists of six monomers which each binds a solvent accessible heme group and is stabilised by the interaction of three neighbouring monomers. The heme iron is penta-coordinated with a tyrosine residue as proximal ligand.
