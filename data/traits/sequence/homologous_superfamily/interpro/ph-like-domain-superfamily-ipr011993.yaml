identifier: InterPro:IPR011993
label: "PH-like domain superfamily"
definition: >-
  This superfamily represents the PH domain and structurally related domains. Pleckstrin homology (PH) domains are small modular domains that occur in a large variety of signalling proteins, where they serve as simple targeting domains that bind lipids. PH domains have a partly opened β-barrel topology that is capped by an α-helix. The structure of PH domains is similar to the phosphotyrosine-binding domain (PTB) found in IRS-1 (insulin receptor substrate 1), Shc adaptor and Numb; to the Ran-binding domain, found in Nup nuclear pore complex and Ranbp1; to the Enabled/VASP homology domain 1 (EVH1 domain), found in Enabled, VASP (vasodilator-stimulated phosphoprotein), Homer and WASP actin regulatory protein; and to the third domain of FERM, found in moesin, radixin, ezrin, merlin and talin.
