identifier: InterPro:IPR038390
label: "Metal-sensitive repressor, helix protomer superfamily"
definition: >-
  The overall protomer fold consists of three α-helices of varying lengths, organised in a closed tetrameric assembly. This superfamily includes metal-sensitive repressors involved in resistance to metal ions. Members of this superfamily bind copper, nickel or cobalt ions via conserved cysteine and histidine residues. In the absence of metal ions, these proteins bind to promoter regions and repress transcription. When bound to metal ions they are unable to bind DNA, leading to transcriptional derepression.
