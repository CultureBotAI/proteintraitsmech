identifier: InterPro:IPR023353
label: "LemA-like domain superfamily"
definition: >-
  The exact molecular function of the LemA protein is uncertain. Structurally LemA consists of a four-helical bundle where helices 2 and 3 are shorter than helices 1 and 4. It is predicted to be a transmembrane protein with an extracellular N terminus.
