identifier: InterPro:IPR036084
label: "Serine protease inhibitor-like superfamily"
definition: >-
  This superfamily is part of proteinase inhibitors, as well as in many extracellular proteins. The domain typically contains ten cysteine residues that form five disulphide bonds. The cysteine residues that form the disulphide bonds are 1-7, 2-6, 3-5, 4-10 and 8-9.
