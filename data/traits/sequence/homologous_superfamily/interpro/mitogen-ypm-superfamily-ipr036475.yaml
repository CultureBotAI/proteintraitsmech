identifier: InterPro:IPR036475
label: "Mitogen Ypm superfamily"
definition: >-
  Members of this family of Yersinia pseudotuberculosis mitogens adopt a sandwich structure consisting of nine strands in two β sheets, in a jelly-roll topology. As with other superantigens, they are able to excessively activate T cells by binding to the T cell receptor.
