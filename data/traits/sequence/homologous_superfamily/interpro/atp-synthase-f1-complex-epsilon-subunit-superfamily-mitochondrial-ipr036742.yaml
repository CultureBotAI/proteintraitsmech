identifier: InterPro:IPR036742
label: ATP synthase, F1 complex, epsilon subunit superfamily, mitochondrial
definition: >-
  This superfamily constitutes the mitochondrial ATP synthase epsilon subunit, which is distinct from the bacterial epsilon subunit (the latter being homologous to the mitochondrial delta subunit, ). The mitochondrial epsilon subunit is located in the stalk region of the F1 complex, and acts as an inhibitor of the ATPase catalytic core. The epsilon subunit can assume two conformations, contracted and extended, where the latter inhibits ATP hydrolysis. The conformation of the epsilon subunit is determined by the direction of rotation of the gamma subunit, and possibly by the presence of ADP. The extended epsilon subunit is thought to become extended in the presence of ADP, thereby acting as a safety lock to prevent wasteful ATP hydrolysis. In Drosophila, the protein Stunted which activates the G-protein coupled receptor Methuselah in vitro, leading to increased intracellular calcium ion levels, is embryonically lethal. F-ATPases (also known as ATP synthases, F1F0-ATPase, or H(+)-transporting two-sector ATPase) are composed of two linked complexes: the F1 ATPase complex is the catalytic core and is composed of 5 subunits (alpha, beta, gamma, delta, epsilon), while the F0 ATPase complex is the membrane-embedded proton channel that is composed of at least 3 subunits (A-C), with additional subunits in mitochondria. Both the F1 and F0 complexes are rotary motors that are coupled back-to-back. In the F1 complex, the central gamma subunit forms the rotor inside the cylinder made of the α(3)β(3) subunits, while in the F0 complex, the ring-shaped C subunits forms the rotor. The two rotors rotate in opposite directions, but the F0 rotor is usually stronger, using the force from the proton gradient to push the F1 rotor in reverse in order to drive ATP synthesis. These ATPases ca…
