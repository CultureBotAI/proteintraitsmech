identifier: InterPro:IPR053751
label: "Viral Major Capsid Assembly"
definition: >-
  This superfamily of proteins includes structural components of viral capsids. The major capsid protein is essential for the assembly and stability of the capsid, which is the protein shell of a virus that encloses its genetic material. These proteins are typically characterized by their ability to form the protective outer layer of the virus, which is critical for viral integrity, infectivity, and interaction with host cells. The superfamily may exhibit variations in structure among different viruses, reflecting the diversity of viral shapes and sizes, but all share the common function of forming the capsid structure.
