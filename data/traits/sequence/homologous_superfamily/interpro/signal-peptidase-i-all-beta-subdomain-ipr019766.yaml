identifier: InterPro:IPR019766
label: "Signal peptidase I, all-beta subdomain"
definition: >-
  The S26 family includes Escherichia coli signal peptidase, SPase, which is a membrane-bound endopeptidase with two N-terminal transmembrane segments and a C-terminal catalytic region. SPase functions to release proteins that have been translocated into the inner membrane from the cell interior, by cleaving off their signal peptides. In SPase proteins, this domain is inserted into a domain with a complex fold made of several coiled β-sheets that form a β-ribbon structure and contains an SH3-like β-barrel. This superfamily represents an all-β-sheet subdomain (but not the β-ribbon domain it is inserted into) found in members of the peptidase S26A family of type 1 signal peptidase.
