identifier: InterPro:IPR053765
label: "Antimicrobial peptide LCI-like"
definition: >-
  This superfamily of proteins includes members with antimicrobial activity, specifically targeting certain bacterial plant pathogens, including Antimicrobial peptide LCI from Bacillus subtilis, which act against Xanthomonas oryzae pv oryzae and Ralstonia solanacearum. These proteins may also interact with nucleic acids, potentially binding to DNA or mRNA, which could suggest a role in regulating gene expression or interfering with bacterial replication mechanisms. The precise mode of action for the antimicrobial effect and nucleic acid binding, however, may vary among different family members.
