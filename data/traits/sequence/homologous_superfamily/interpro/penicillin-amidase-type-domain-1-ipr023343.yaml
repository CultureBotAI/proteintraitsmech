identifier: InterPro:IPR023343
label: Penicillin amidase type, domain 1
definition: >-
  Penicillin amidase or penicillin acylase catalyses the hydrolysis of benzylpenicillin to phenylacetic acid and 6-aminopenicillanic acid (6-APA) a key intermediate in the the synthesis of penicillins. This superfamily represents the N-terminal structural domain of the penicillin amidase peptidases. It forms an α-helical orthogonal bundle. This domain is also found in other S45 peptidases like Glutaryl-7-aminocephalosporanic-acid acylase.
