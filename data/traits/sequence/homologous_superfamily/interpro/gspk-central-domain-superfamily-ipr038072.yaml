identifier: InterPro:IPR038072
label: "GspK, central domain superfamily"
definition: >-
  This entry represents the central domain of the General secretion pathway protein K (GspK). Its structure is composed of a tandem repeat of two SAM-like domains inserted into pilin fold, with the first domain containing one classic HhH motif.
