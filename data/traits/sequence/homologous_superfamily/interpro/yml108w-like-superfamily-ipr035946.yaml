identifier: InterPro:IPR035946
label: "YML108W-like superfamily"
definition: >-
  Proteins in this entry, which are synthesised by Saccharomycetes, adopt a structure consisting of a four-stranded β-sheet, with strand order beta2-beta1-beta4-beta3, and two α-helices, with an overall topology of β-β-α-β-β-α. They have no known function.
