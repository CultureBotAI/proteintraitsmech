identifier: InterPro:IPR043133
label: "GTP cyclohydrolase I, C-terminal/NADPH-dependent 7-cyano-7-deazaguanine reductase"
definition: >-
  GTP cyclohydrolase I catalyses the biosynthesis of formic acid and dihydroneopterin triphosphate from GTP. This reaction is the first step in the biosynthesis of tetrahydrofolate in prokaryotes, of tetrahydrobiopterin in vertebrates, and of pteridine-containing pigments in insects. The comparison of the sequence of the enzyme from bacterial and eukaryotic sources shows that the structure of this enzyme has been extremely well conserved throughout evolution. The QueF (NADPH-dependent 7-cyano-7-deazaguanine reductase) monomer is made up of two ferredoxin-like domains aligned together with their β-sheets that have additional embellishments. QueF catalyses the reduction of the nitrile group of 7-cyano-7-deazaguanine to 7-aminomethyl-7-deazaguanine. QueF reduces a nitrile bond to a primary amine. The two monomer units together create suitable substrate-binding pockets. This superfamily entry consists of the C-terminal domain found in GTP cyclohydrolases I (GTP-CH-I), which has been well conserved throughout evolution across bacterial and eukaryotic species. The C-terminal domain contains the regions relevant for oligomerisation and enzyme catalysis. The structure of the C-terminal domain of GTP-CH-I is topologically identical to PTPS (6-pyruvoyl tetrahydropterin synthase), despite the lack of sequence homology with PTPS. The superfamily also includes a domain from NADPH-dependent 7-cyano-7-deazaguanine reductase (QueF). This domain is composed of a three-stranded β-sheet and two α-helices.
