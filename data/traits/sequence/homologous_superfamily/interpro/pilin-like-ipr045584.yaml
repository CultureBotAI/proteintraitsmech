identifier: InterPro:IPR045584
label: Pilin-like
definition: >-
  This superfamily includes Pilin and related proteins, such as general secretion pathway protein G (GSPG) and autotransporter adhesin YadA-like proteins. Pilin is a component of type IV pilus (T4P), a polar flexible filament, which consists of a single polypeptide chain arranged in a helical configuration of five subunits per turn, which is involved cell adhesion, microcolony formation, twitching motility and transformation. Gram-negative bacteria produce pilin which is characterised by the presence of a very short leader peptide of 6 to 7 residues, followed by a methylated N-terminal phenylalanine residue and by a highly conserved sequence of about 24 hydrophobic residues, of the NMePhe type pilin. GSPG shares several sequence similarities with bacterial fimbrial protein, or pilin, the major structural protein of pili. Pili are polar flexible filamentous adhesions ~2500 nm in length, and diameter ~5.4 nm. Fimbrial and GSPG proteins share the following characteristics: a methylated, hydrophobic N-terminal residue; a hydrophobic leader peptide of 5-10 residues, terminating with glycine; glutamate as the fifth residue of the mature sequence; and a highly hydrophobic N-terminal. This system is homologous to the type IV pilus biogenesis and includes different proteins, termed psudopilins, which are structurally homologous to the type IV pilins. Autotransporter adhesin YadA-like proteins are part of a class of pathogenicity factors that act as cell surface adhesion molecules, in which N-terminal head and neck domains extend from the bacterial outer membrane.
