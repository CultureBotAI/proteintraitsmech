identifier: InterPro:IPR012295
label: "TBP domain superfamily"
definition: >-
  The TATA-box binding protein (TBP) is required for the initiation of transcription by RNA polymerases I, II and III, from promoters with or without a TATA box. The core of TBP (~180 residues) is highly conserved and contains two 77-amino acid repeats that produce a saddle-shaped structure that straddles the DNA; this region binds to the TATA box, and interacts with transcription factors and regulatory proteins.
