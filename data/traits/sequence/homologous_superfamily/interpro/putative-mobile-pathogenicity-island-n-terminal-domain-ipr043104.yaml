identifier: InterPro:IPR043104
label: "Putative mobile pathogenicity island, N-terminal domain"
definition: >-
  This superfamily represents the N-terminal domain found in a group of putative Staphylococcus pathogenicity island proteins. SAPIs (S. aureus pathogenicity islands) are responsible for many superantigen-related diseases in humans as they carry two or more superantigens. This domain consists of 5 β strands and 1 α helix.
