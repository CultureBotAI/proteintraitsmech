identifier: InterPro:IPR043045
label: "PvsD/AcsD-like, palm domain, helix bundle"
definition: >-
  This superfamily represents the helix bundle of the vibrioferrin amide bond forming protein PvsD and achromobactin synthetase protein D (AcsD) palm domain. The secondary structure elements of the palm domain are interspersed with long loops, two of which, L9 and L10, point upwards from the palm and contain three absolutely conserved residues H444, N447 and D464 as well as N509 which is found only in type A and B enzymes. The achromobactin synthetase protein D (AcsD) monomer can be decomposed into three domains that resemble a cupped hand (thumb domain 1, palm domain 2 and fingers domain 3). The Domain 1 (thumb) is a three helix bundle flanked by a four stranded anti-parallel β-sheet that forms the dimer interface. Domain 2 bridges domain 1 to domain 3 and comprises a four-helix bundle sandwiched between a three-stranded antiparallel β-sheet and a two-stranded antiparallel β-sheet. Domain 3 is connected to domain 1 by a 31-residue extended loop (L4), it comprises 182 residues folded in a twisted eight-stranded antiparallel β-sheet interspersed with five α-helices and extended loops.
