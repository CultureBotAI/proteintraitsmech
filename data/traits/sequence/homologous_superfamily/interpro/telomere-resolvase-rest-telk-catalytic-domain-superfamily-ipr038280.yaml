label: "Telomere resolvase ResT/TelK, catalytic domain superfamily"
definition: >-
  Telomere resolvase ResT (protelomerase) catalyses the conversion of linear double-stranded DNA into hairpin telomeres. This entry represents the catalytic domain of ResT and TelK.
