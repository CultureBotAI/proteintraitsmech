identifier: InterPro:IPR038712
label: "PixA-like superfamily"
definition: >-
  This entry represents bacterial proteins that are typically between 173 and 191 amino acids in length. PixA is thought to be specifically produced in Xenorhabdus nematophila. It is an inclusion body protein. This entry also matches AidA.
