identifier: InterPro:IPR035923
label: "TT1751-like domain superfamily"
definition: >-
  This domain superfamily is found in an undescribed set of proteins. It normally occurs uniquely within a sequence, but is found as a tandem repeat. It has an interesting phylogenetic distribution with the majority of examples in bacteria and archaea, but it is also found in Drosophila melanogaster (e.g. ). The hypothetical protein TT1751 from Thermus thermophilus has a β-α-β(4)-α structural fold.
