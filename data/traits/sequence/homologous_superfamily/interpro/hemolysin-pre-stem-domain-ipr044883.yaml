identifier: InterPro:IPR044883
label: "Hemolysin, pre-stem domain"
definition: >-
  This superfamily represents the pre-stem domain found in bacterial virulence factor - hemolysin - which forms pores in erythrocytes and causes them to lyse. The structure of the pre-stem domain of Vibrio cholerae Cytolysin (VCC, ) consists of extended two-strand β-sheet that makes contacts with a unique loop (VCC bracket) from the β-sandwich.
