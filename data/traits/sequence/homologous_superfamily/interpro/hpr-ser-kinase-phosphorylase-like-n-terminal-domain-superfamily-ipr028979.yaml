identifier: InterPro:IPR028979
label: "HPr(Ser) kinase/phosphorylase-like, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal domain of HprK (HPr kinase/phosphorylase) and domains similar to it, such as the DRTGG domain. HprK is the sensor in a multicomponent phosphorelay system in control of carbon catabolic repression in bacteria. It is unusual in that it recognises the tertiary structure of its target and is a member of a novel family unrelated to any previously described protein phosphorylating enzymes. X-ray analysis of the full-length crystalline enzyme from Staphylococcus xylosus at a resolution of 1.95 A shows the enzyme to consist of two clearly separated domains that are assembled in a hexameric structure resembling a three-bladed propeller. The blades are formed by two N-terminal domains each, and the compact central hub assembles the C-terminal kinase domains.
