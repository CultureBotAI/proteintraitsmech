identifier: InterPro:IPR029039
label: "Flavoprotein-like superfamily"
definition: >-
  Proteins in this entry contain a flavodoxin-like fold, which is characterised by an open twisted/α β structure consisting of five parallel β-sheets connected by α-helices which surround the sheet. Flavodoxins are electron-transfer proteins that function in various electron transport systems. They bind one FMN molecule, which serves as a redox-active prosthetic group and are functionally interchangeable with ferredoxins.
