identifier: InterPro:IPR041921
label: "NADH-quinone oxidoreductase subunit E, N-terminal"
definition: >-
  Respiratory-chain NADH dehydrogenase (also known as complex I or NADH-ubiquinone oxidoreductase) is an oligomeric enzymatic complex located in the inner mitochondrial membrane which also seems to exist in the chloroplast and in cyanobacteria (as a NADH-plastoquinone oxidoreductase). This superfamily represents the NADH-quinone oxidoreductase subunit E N-terminal domain.
