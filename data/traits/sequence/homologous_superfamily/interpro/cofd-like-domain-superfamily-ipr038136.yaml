identifier: InterPro:IPR038136
label: "CofD-like domain superfamily"
definition: >-
  This entry contains 2-phospho-L-lactate transferase (CofD), phosphoenolpyruvate transferase and related sequences. CofD catalyses the fourth step in the biosynthesis of coenzyme F420, which is the transfer of the 2-phospholactate moiety from lactyl (2) diphospho-(5') guanosine (LPPG) to 7,8-didemethyl-8-hydroxy-5-deazariboflavin (FO) with the formation of the L-lactyl phosphodiester of 7,8-didemethyl-8-hydroxy-5-deazariboflavin (F420-0) and GMP. F420 is a flavin derivative found in methanogens, Mycobacteria, and several other lineages. This enzyme is characterised so far in Methanocaldococcus jannaschii (Methanococcus jannaschii) but appears restricted to F420-containing species and is predicted to carry out the same function in these other species. CofD monomer contains twelve β-strands, seven of them forming a Rossmann fold, and thirteen α-helices.
