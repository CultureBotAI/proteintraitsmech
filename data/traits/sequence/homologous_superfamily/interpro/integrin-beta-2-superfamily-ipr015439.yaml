identifier: InterPro:IPR015439
label: "Integrin beta-2 superfamily"
definition: >-
  Integrins are the major metazoan receptors for cell adhesion to extracellular matrix proteins and, in vertebrates, also play important roles in certain cell-cell adhesions, make transmembrane connections to the cytoskeleton, and activate many intracellular signalling pathways. An integrin receptor is a heterodimer composed of alpha and beta subunits. Each subunit crosses the membrane once, with most of the polypeptide residing in the extracellular space, and has two short cytoplasmic domains. Some members of this family have EGF repeats at the C terminus and also have a VWA domain inserted within the integrin domain at the N-terminal. Most integrins recognise relatively short peptide motifs and, in general, require an acidic amino acid to be present. Ligand specificity depends upon both the alpha and beta subunits. There are at least 18 types of alpha and 8 types of beta subunits recognised in humans. Each alpha subunit tends to associate only with one type of beta subunit, but there are exceptions to this rule. Each association of alpha and beta subunits has its binding specificity and signalling properties. Many integrins require activation on the cell surface before they can bind ligands. Integrins frequently intercommunicate, and binding at one integrin receptor activates or inhibits another. Integrin Beta-2 is also referred to as ITGB2 and is known to interact with three different alpha integrin chains: ITGAL, ITGAM and ITGAX. These three integrin heterodimers are associated with leukocyte adhesion deficiency (LAD), which is characterised by recurrent bacterial infections. LFA-1 (ITGB2/ITGAL) is one of the most well studied of these integrins. Engagement of LFA-1 results in increased AP-1 dependent gene expression, which is mediated by the nuclear translocation of…
