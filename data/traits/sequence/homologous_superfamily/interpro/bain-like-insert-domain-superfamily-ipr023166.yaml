identifier: InterPro:IPR023166
label: "BaiN-like, insert domain superfamily"
definition: >-
  This entry represents two structural (β-barrel and H2TH α-helical) domains that are found inserted within a Rossmann fold-like domain. This domain is found in 3-dehydro-bile acid delta(4,6)-reductase from Clostridium scindens (BaiN), Ribosomal RNA dihydrouridine synthase (rdsA) from Escherichia coli and Aminoacetone oxidase (aao(So)) from Streptococcus cristatus. BaiN is involved in the secondary bile acid metabolism. It catalyses two subsequent reductions of the double bonds within the bile acid A/B rings of 3-oxochol-4,6-dien-24-oyl-CoA and 12alpha-hydroxy-3-oxochol-4,6-dien-24-oyl-CoA to yield 3-oxocholan-24-oyl-CoA and 12alpha-hydroxy-3-oxocholan-24-oyl-CoA, respectively. RdsA catalyses the synthesis of 5,6-dihydrouridine (D) at position 2449 in 23S rRNA. It can use NADH as a source of reducing equivalents but not NADPH. Aao(So) is a flavoprotein thought to catalyse the condensation of two aminoacetone molecules to form 3,6-dimethyl-2,5-dihydropyrazine, which is then oxidised to 2,5-dimethylpyrazine, suggesting a role in a microbial defence pathway that avoids toxic methylglyoxal production. It has low aminoacetone oxidase activity and can generate hydrogen peroxide from aminoacetone, peptone, and several L-amino acids, indicating a potential function in oxidative metabolism and antimicrobial defence. However, it shows little to no activity toward substrates like L-malate, oxaloacetate, or alpha-aminobutyrate. Overall, it contributes to antioxidant defence mechanisms.
