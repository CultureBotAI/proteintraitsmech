identifier: InterPro:IPR036979
label: Chorismate mutase domain superfamily
definition: >-
  Chorismate mutase ( ) catalyses the conversion of chorismate to prephenate in the pathway of tyrosine and phenylalanine biosynthesis. This enzyme is negatively regulated by tyrosine, tryptophan and phenylalanine. Prephenate dehydratase ( , , PDT) catalyses the decarboxylation of prephenate into phenylpyruvate. In microorganisms PDT is involved in the terminal pathway of the biosynthesis of phenylalanine. In some bacteria, such as Escherichia coli, PDT is part of a bifunctional enzyme (P-protein) that also catalyzes the transformation of chorismate into prephenate (chorismate mutase) while in other bacteria it is a monofunctional enzyme. The sequence of monofunctional chorismate mutase aligns well with the N-terminal part of P-proteins.
