identifier: InterPro:IPR036230
label: "2-isopropylmalate synthase LeuA, allosteric (dimerisation) domain superfamily"
definition: >-
  This is the C-terminal regulatory (R) domain of alpha-isopropylmalate synthase, which catalyses the first committed step in the leucine biosynthetic pathway. This domain, is an internally duplicated structure with a novel fold. It comprises two similar units that are arranged such that the two helices pack together in the centre, crossing at an angle of 34 degrees, sandwiched between the two three-stranded, antiparallel β-sheets. The overall domain is thus constructed as a β-α-β three-layer sandwich.
