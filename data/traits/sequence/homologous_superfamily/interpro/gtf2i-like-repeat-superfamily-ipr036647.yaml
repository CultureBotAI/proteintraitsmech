identifier: InterPro:IPR036647
label: "GTF2I-like repeat superfamily"
definition: >-
  This region of sequence similarity is found up to six times in a variety of proteins including general transcription factor II-I (GTF2I). It has been suggested that this may be a DNA binding domain. The structure of each GTF2I repeat is composed of an α(2)-β-α-β-α fold arranged in two layers (α/β) with antiparallel β-ribbon.
