identifier: InterPro:IPR042046
label: "Lepidopteran low molecular weight lipoprotein, N-terminal domain"
definition: >-
  This superfamily represents the Lepidopteran low molecular weight lipoprotein N-terminal domain. It consists of 5 α-helices. The all-α N-terminal domain contains a putative lipid-binding cavity. Lepidopteran low molecular weight (30 kD) lipoproteins are involved in the innate immune response and transportation of lipid and/or sugar. Structurally, those proteins have two distinct domains: an all-α N-terminal domain (NTD) and an all-β C-terminal domain (CTD).
