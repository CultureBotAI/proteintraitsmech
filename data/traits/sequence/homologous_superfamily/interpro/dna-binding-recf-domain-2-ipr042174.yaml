identifier: InterPro:IPR042174
label: "DNA-binding RecF, domain 2"
definition: >-
  This superfamily represents the second domain found in structural maintenance of chromosomes (SMC) proteins, which function together with other proteins in a range of chromosomal transactions, including chromosome condensation, sister-chromatid cohesion, recombination, DNA repair and epigenetic silencing of gene expression. The eukaryotic SMC proteins form two kind of heterodimers: the SMC1/SMC3 and the SMC2/SMC4 types. These heterodimers constitute an essential part of higher order complexes, which are involved in chromatin and DNA dynamics. This domain is also found in the RecF protein (recombination mediator), which is involved in DNA metabolism and recombination.
