identifier: InterPro:IPR038330
label: "TspO/MBR-related superfamily"
definition: >-
  Members of this group are involved in transmembrane signalling. In both prokaryotes and mitochondria they are localized to the outer membrane, and have been shown to bind and transport dicarboxylic tetrapyrrole intermediates of the haem biosynthetic pathway. They are associated with the major outer membrane porins (in prokaryotes) and with the voltage-dependent anion channel (in mitochondria). Rhodobacter sphaeroides TspO (previously CrtK) is involved in signal transduction, functioning as a negative regulator of the expression of some photosynthesis genes (PpsR/AppA repressor/antirepressor regulon). This down-regulation is believed to be in response to oxygen levels. TspO works through (or modulates) the PpsR/AppA system and acts upstream of the site of action of these regulatory proteins. It has been suggested that the TspO regulatory pathway works by regulating the efflux of certain tetrapyrrole intermediates of the haem/bacteriochlorophyll biosynthetic pathways in response to the availability of molecular oxygen, thereby causing the accumulation of a biosynthetic intermediate that serves as a corepressor for the regulated genes. A homologue of the TspO protein in Rhizobium meliloti (Sinorhizobium meliloti) is involved in regulating expression of the ndi locus in response to stress conditions. There is evidence that the S. meliloti TspO acts through, or in addition to, the FixL regulatory system. In animals, translocator protein (TSPO), previously known as peripheral-type benzodiazepine receptor (PBR, MBR) is a mitochondrial protein (located in the outer mitochondrial membrane) where it forms a complex with several proteins of the mitochondrial permeability transition pore (MPTP). TSPO is involved in multiple processes, including regulation of cell death, cholestero…
