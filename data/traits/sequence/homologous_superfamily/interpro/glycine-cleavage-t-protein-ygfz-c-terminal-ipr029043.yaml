identifier: InterPro:IPR029043
label: "Glycine cleavage T-protein/YgfZ, C-terminal"
definition: >-
  This superfamily represents a β-barrel domain found at the C-terminal of the glycine cleavage T-protein (aminomethyltransferase) and in tRNA-modifying protein YgfZ. YgfZ binds folate and is likely to be a folate-dependent regulatory protein.
