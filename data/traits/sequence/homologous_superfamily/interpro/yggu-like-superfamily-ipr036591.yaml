identifier: InterPro:IPR036591
label: "YggU-like superfamily"
definition: >-
  This entry, previously known as DUF167, describes a group of proteins found in all cellular organisms. A member of this family, PF1765 protein from Pyrococcus furiosus was structurally and functionally characterised. PF1765 binds variably to dsDNA, ssDNA, and RNA, with a modest preference for single-stranded substrates. Structures for two of other proteins, YggU from Escherichia coli and MTH637 from the archaea Methanobacterium thermoautotrophicum, have been also determined; they have a core 2-layer α/β structure consisting of β(2)-loop-α-β(2)-α structural elements.
