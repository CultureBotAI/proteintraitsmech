identifier: InterPro:IPR023301
label: "Ammonia/methane monooxygenase, subunitB, N-terminal"
definition: >-
  This entry represents the N-terminal β-barrel-like domain of subunit B. Ammonia monooxygenase and the particulate methane monooxygenase are both integral membrane proteins, occurring in ammonia oxidisers and methanotrophs respectively, which are thought to be evolutionarily related. These enzymes have a relatively wide substrate specificity and can catalyse the oxidation of a range of substrates including ammonia, methane, halogenated hydrocarbons and aromatic molecules. These enzymes are composed of 3 subunits - A ( ), B ( , ) and C ( ) - and contain various metal centres, including copper. Particulate methane monooxygenase from Methylococcus capsulatus str. Bath is an ABC homotrimer, which contains mononuclear and dinuclear copper metal centres, and a third metal centre containing a metal ion whose identity in vivo is not certain. The soluble regions of these enzymes derive primarily from the B subunit. This subunit forms two antiparallel β-barrel-like structures and contains the mono- and di- nuclear copper metal centres.
