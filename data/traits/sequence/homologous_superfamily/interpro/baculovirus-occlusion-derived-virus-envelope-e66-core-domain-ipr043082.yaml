identifier: InterPro:IPR043082
label: "Baculovirus occlusion-derived virus envelope, E66, core domain"
definition: >-
  Baculovirus occlusion-derived virus (ODV) derives its envelope from an intranuclear membrane source. N-terminal amino acid sequences of the Autographa californica MNPV nuclear polyhedrosis virus (AcMNPV) envelope protein ODV-E66 is highly hydrophobic. This defined hydrophobic domain was shown to direct the protein, E66, to induce membrane microvesicles within a baculovirus-infected cell nucleus and the viral envelope. In addition, it was suggested that movement of this protein into the nuclear envelope may initiate through cytoplasmic membranes, such as endoplasmic reticulum, and that transport into the nucleus may be mediated through the outer and inner nuclear membrane. This superfamily represents the core domain found in ODV-E66. Structurally, this domain consists of 12 β strands and 3 α helices.
