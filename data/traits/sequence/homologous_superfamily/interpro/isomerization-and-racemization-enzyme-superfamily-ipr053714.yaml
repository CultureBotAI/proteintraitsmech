identifier: InterPro:IPR053714
label: "Isomerization and Racemization Enzyme Superfamily"
definition: >-
  This superfamily of proteins includes enzymes that catalyze isomerization and racemization reactions. Members of this superfamily are involved in the conversion of maleate to fumarate, a reaction that involves the cis-trans isomerization of a double bond. Other members are responsible for the racemization of hydantoins, which is a reversible isomerization process that converts one enantiomer of a compound into the other, facilitating the production of L-amino acids from racemic mixtures. These enzymes exhibit specificity for substrates such as maleate and various substituted hydantoins, and their activity can be modulated by metal ions and other chemical agents.
