identifier: InterPro:IPR036463
label: Urease, gamma subunit superfamily
definition: >-
  Urease (urea amidohydrolase, ) is a nickel-dependent metalloenzyme that catalyses the hydrolysis of urea to form ammonia and carbon dioxide. Nickel-dependent ureases are found in bacteria, archaea, fungi and plants. Their primary role is to allow the use of external and internally-generated urea as a nitrogen source. The enzyme consists of three subunits, alpha, beta and gamma, which can exist as separate proteins or can be fused on a single protein chain. The α-β-γ heterotrimer forms multimers, mainly trimers. The subunit composition of urease from different sources varies, but each holoenzyme consists of four domains: three structural domains and a nickel-binding catalytic domain common to amidohydrolases. In Klebsiella aerogenes, urease exists as an alpha, beta and gamma subunit, with the alpha subunit possessing the catalytic domain. In Helicobacter pylori, the gamma and beta subunits are fused and called the alpha subunit, while the catalytic subunit is called the beta subunit. In Canavalia ensiformis, urease has a fused gamma-beta-alpha organisation. This entry represents the urease gamma subunit superfamily. It also identifies gamma subunits fused with other urease subunits, as found in Helicobacter and other species. The urease gamma subunit has an α(3)-β(2) fold with an antiparallel hairpin topology.
