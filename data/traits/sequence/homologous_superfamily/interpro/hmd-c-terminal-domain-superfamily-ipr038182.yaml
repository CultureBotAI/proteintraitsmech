identifier: InterPro:IPR038182
label: "HMD, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal domain of H2-forming N5,N10-methylene-tetrahydromethanopterin dehydrogenases (Hmd). Hmd is an iron-sulphur-cluster-free enzyme that contains an intrinsic CO ligand bound to iron. This domain is found at the C terminus of two distinct subgroups: one has been experimentally characterised as H2-forming N(5),N(10)-methenyltetrahydromethanopterin dehydrogenase (Hmd or HmdI), and the other one contains isozymes that have not been experimentally characterised (HmdII and HmdIII). Because all three isozyme forms are present in each of the corresponding sequenced genomes, it has been suggested that HmdII and HmdIII may not exhibit Hmd activity and may have a different biological function. Based on HmdII binding to aminoacyl-tRNA synthetases and tRNA, a role for HmdII has been proposed as a regulator of protein synthesis that senses intracellular methylene-H4 MPT concentration.
