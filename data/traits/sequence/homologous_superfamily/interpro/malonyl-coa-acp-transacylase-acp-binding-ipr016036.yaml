identifier: InterPro:IPR016036
label: "Malonyl-CoA ACP transacylase, ACP-binding"
definition: >-
  This entry represents a structural domain with an α/β sandwich topology with anti-parallel β-sheets: (β/α/β)2. This domain is believed to be the ACP (acyl carrier protein) binding region of the malonyl-CoA ACP transacylase enzyme (FabD) found in bacteria, or in the homologous domain from eukaryotic fatty acid synthase.
