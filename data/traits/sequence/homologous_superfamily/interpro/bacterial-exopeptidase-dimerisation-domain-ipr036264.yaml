identifier: InterPro:IPR036264
label: "Bacterial exopeptidase dimerisation domain"
definition: >-
  This superfamily consists of a protein domain with four β strands and two α helices which make up the dimerisation surface of members of the MEROPS peptidase family M20. This entry includes a range of zinc exopeptidases: carboxypeptidases, dipeptidases and specialised aminopeptidases.
