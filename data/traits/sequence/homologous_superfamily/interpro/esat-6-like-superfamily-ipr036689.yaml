identifier: InterPro:IPR036689
label: "ESAT-6-like superfamily"
definition: >-
  The ESAT-6/WXG100 superfamily includes proteins that are secreted in a full-length form and adopt a four-helix bundle structure. They represent the prototypical substrates of bacterial type VII secretion systems. The best-characterised member of the superfamily is ESAT-6, a small protein that appears to be of fundamental importance in virulence and protective immunity in Mycobacterium tuberculosis. Homologues have been detected in other Gram-positive bacterial species.
