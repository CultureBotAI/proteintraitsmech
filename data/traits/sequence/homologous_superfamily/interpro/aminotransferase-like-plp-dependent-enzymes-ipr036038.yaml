identifier: InterPro:IPR036038
label: Aminotransferase-like, PLP-dependent enzymes
definition: >-
  The D-amino acid transferases (D-AAT) are required by bacteria to catalyse the synthesis of D-glutamic acid and D-alanine, which are essential constituents of bacterial cell wall and are the building block for other D-amino acids. D-aminoacid aminotransferase is a homo hexamer with D3 symmetry, folded into two domains. The first one has a beta3-alpha2-beta2 fold, while the second one has an α/β fold. Aminotransferases share certain mechanistic features with other pyridoxal-phosphate dependent enzymes, such as the covalent binding of the pyridoxal-phosphate group to a lysine residue. On the basis of sequence similarity, these various enzymes can be grouped into subfamilies.
