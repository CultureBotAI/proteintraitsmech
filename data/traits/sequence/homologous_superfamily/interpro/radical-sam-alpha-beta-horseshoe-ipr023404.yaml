identifier: InterPro:IPR023404
label: "Radical SAM, alpha/beta horseshoe"
definition: >-
  Radical SAM domains catalyze diverse reactions, including unusual methylations, isomerization, sulphur insertion, ring formation, anaerobic oxidation and protein radical formation. Evidence exists that these proteins generate a radical species by reductive cleavage of S:-adenosylmethionine (SAM) through an unusual Fe-S centre. This entry represents radical SAM domains that form an α/β horseshoe structure.
