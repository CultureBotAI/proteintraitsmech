identifier: InterPro:IPR036233
label: "Efb, C-terminal domain superfamily"
definition: >-
  This superfamily describes the C-terminal region of bacterial extracellular fibrinogen binding proteins, which is approximately 70 amino acids in length and contains a conserved VLK sequence motif. It also contains a helical motif involved in complement regulation. This motif binds to complement proteins and changes its conformation to a form which cannot activate downstream components of the complement cascade.
