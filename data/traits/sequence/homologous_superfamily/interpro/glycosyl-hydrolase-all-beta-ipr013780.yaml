identifier: InterPro:IPR013780
label: "Glycosyl hydrolase, all-beta"
definition: >-
  This entry represents the all-β domain superfamily that is found in several members of the glycosyl hydrolase family 13 and other glycosyl hydrolases. It is usually located C-terminal to the catalytic β/α barrel domain. The structure of this domain has been found to be a Greek key β-sheet fold. O-Glycosyl hydrolases are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
