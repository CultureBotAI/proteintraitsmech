label: Outer membrane adhesin/peptidase omptin
definition: >-
  This entry represents a transmembrane domain with a (10,12) β-barrel structure. This domain is found in: Outer membrane peptidase omptin Outer membrane adhesin OpcA The outer membrane omptin belongs to the MEROPS family A26 (clan AF). The omptin family, comprises a number of novel outer membrane-associated serine peptidases that are distinct from trypsin-like peptidases in that they cleave polypeptides between two basically-charged amino acids. The enzyme is sensitive to the serine protease inhibitor diisopropylfluoro-phosphate, to divalent cations such as copper, zinc and iron, and is temperature regulated, activity decreasing at lower temperatures. Temperature regulation is most prominently shown in the Yersinia pestis coagulase/fibrinolysin protein, where coagulase activity is prevalent below 30 degrees Celsius, and fibrinolysin (protease) activity is prevalent above this point, the optimum temperature being 37 degrees. It is possible that this assists in 'flea blockage' and transmission of the bacteria to animals. The outer membrane adhesin OpcA is Neisseria species-specific. OpcA (formerly called 5C) was isolated from Neisseria meningitidis, causative agent of meningococcal meningitis and septicemia. An outer membrane protein embedded in the lipid bilayer, OpcA was shown to play an important role in meningococcal adhesion and invasion of both epithelial and endothelial cells, mediating attachment to host cells by binding proteoglycan cell-surface receptors. OpcA forms a 10-stranded β-barrel with five highly mobile extracellular loops that protrude above the surface of the membrane. These extracellular loops combine to form a crevice in the external surface that is lined by positively charged residues, which is predicted to be a binding site for proteoglycan polysa…
