identifier: InterPro:IPR043118
label: "Restriction endonuclease, type II SfiI, domain 1"
definition: >-
  SfiI is a restriction enzyme that can cleave two DNA sites simultaneously to leave 3-base 3' overhangs. It acts as a homo-tetramer and recognises a specific eight base-paid palindromic DNA sequence. After binding two copies of its recognition sequence, SfiI becomes activated leading to cleavage of all four DNA strands. The structure of SfiI consists of a central twisted β-sheet surrounded by α-helices. This superfamily represents the domain 1 of the Sfil.
