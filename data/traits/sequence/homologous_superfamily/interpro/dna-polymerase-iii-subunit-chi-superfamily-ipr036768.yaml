identifier: InterPro:IPR036768
label: "DNA polymerase III subunit chi superfamily"
definition: >-
  The DNA polymerase III holoenzyme is the polymerase responsible for the replication of the Escherichia coli chromosome. The holoenzyme is composed of the DNA polymerase III core, the sliding clamp, and the DnaX clamp loading complex. The DnaX complex contains either the tau or gamma product of gene dnax, complexed to delta.delta and to chi psi. Chi forms a 1:1 heterodimer with psi. The chi psi complex functions by increasing the affinity of tau and gamma for delta.delta allowing a functional clamp-loading complex to form at physiological subunit concentrations. Psi is responsible for the interaction with DnaX (gamma/tau), but psi is insoluble unless it is in a complex with chi. Members of this protein family are mainly found in proteobacteria.
