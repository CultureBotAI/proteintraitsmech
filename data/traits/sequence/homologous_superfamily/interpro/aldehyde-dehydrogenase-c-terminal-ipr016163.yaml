identifier: InterPro:IPR016163
label: "Aldehyde dehydrogenase, C-terminal"
definition: >-
  This superfamily represents a structural domain found at the C-terminal of aldehyde dehydrogenases. These proteins contain two similar domains, each with a 3-layer α/β/α structure, which probably arose from a duplication; this entry covers the C-terminal a/b/a domain. These enzymes bind NAD differently from other NAD(P)-dependent oxidoreductases.
