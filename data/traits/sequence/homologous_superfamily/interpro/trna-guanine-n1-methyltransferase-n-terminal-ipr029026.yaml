identifier: InterPro:IPR029026
label: "tRNA (guanine-N1-)-methyltransferase, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the tRNA (guanine-N1-)-methyltransferase. This domain forms a α/β knot structure that is extremely rare in protein structures as it poses a folding problem. This domain can also be found in the SPOUT superfamily members, including tRNA:Gm18 MTase TrmH.
