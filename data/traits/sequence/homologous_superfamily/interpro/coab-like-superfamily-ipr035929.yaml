identifier: InterPro:IPR035929
label: "CoaB-like superfamily"
definition: >-
  CoaB adopts a 3-layer α/β/α fold with mixed β-sheets, which topologically resembles a combination of Rossmann-like and ribokinase-like folds. This structural domain can be found in human phosphopantothenoylcysteine (PPC) synthetase and CoaB from the Escherichia coli coenzyme A bifunctional protein CoaBC. The structure of these proteins predicts a ping pong mechanism with initial formation of an acyladenylate intermediate, followed by release of pyrophosphate and attack by cysteine to form the final products PPC and AMP.
