identifier: InterPro:IPR038062
label: "ScdA-like, N-terminal domain superfamily"
definition: >-
  The Iron-sulfur cluster repair protein ScdA is involved in the repair of iron-sulfur clusters damaged by oxidative and nitrosative stress conditions. Structurally, ScdA is composed of five helices. This superfamily represents the N-terminal domain of ScdA and related proteins.
