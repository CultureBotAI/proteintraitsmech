identifier: InterPro:IPR036614
label: Holliday junction resolvase RusA-like superfamily
definition: >-
  This superfamily consists of several bacterial and phage Holliday junction resolvase (RusA) like proteins. The RusA protein of Escherichia coli is an endonuclease that can resolve Holliday intermediates and correct the defects in genetic recombination and DNA repair associated with inactivation of RuvAB or RuvC.
