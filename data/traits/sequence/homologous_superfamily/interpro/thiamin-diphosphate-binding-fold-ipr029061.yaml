identifier: InterPro:IPR029061
label: "Thiamin diphosphate-binding fold"
definition: >-
  This entry represents the thiamin diphosphate-binding fold found in pyruvate dehydrogenases, branched chain alpha-keto acid decarboxylases, phosphoketolases and the pyrimidine binding region of transketolases. There are two different functional modules of this fold: pyridine-binding (Pyr) and pyrophosphate-binding (PP) modules. Two Pyr and two PP modules can assemble together in a conserved heterotetrameric core that binds two THDP coenzyme molecules.
