identifier: InterPro:IPR024068
label: Rotavirus NSP2, N-terminal
definition: >-
  Rotavirus non-structural protein 2 (NSP2) is a basic protein which possesses RNA-binding activity and is essential for genome replication. It may also be important for viral RNA packaging. This superfamily represents the N-terminal domain of Rotavirus NSP2.
