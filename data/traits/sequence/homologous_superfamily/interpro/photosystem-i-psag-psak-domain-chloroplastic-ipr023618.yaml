identifier: InterPro:IPR023618
label: Photosystem I PsaG/PsaK domain, chloroplastic
definition: >-
  Photosystem I (PSI) is an integral membrane protein complex that uses light energy to mediate electron transfer from plastocyanin to ferredoxin. It is found in the chloroplasts of plants and cyanobacteria. PSI is composed of at least 14 different subunits, two of which are small hydrophobic proteins of about 7 to 9 Kd and evolutionary related, PsaG (also known as PSI-G) and PsaK (also known as PSI-K), both integral membrane proteins. Cyanobacteria contain only PsaK. While cyanobacterial PSI have phycobilisomes to harvest light, eukaryotic PSI have a membrane-imbedded peripheral antenna. The domain represented by this entry consists of an α orthogonal bundle and it is found in photosystem I subunits PsaG and PsaK from chloroplasts.
