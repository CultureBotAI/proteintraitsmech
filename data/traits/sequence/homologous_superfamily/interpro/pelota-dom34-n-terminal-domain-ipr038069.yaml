identifier: InterPro:IPR038069
label: "Pelota/DOM34, N-terminal domain"
definition: >-
  Pelota (known as DOM34 in yeast) is a conserved protein in eukaryotes and archaea that binds Hbs1, a GTPase related to the EF1-alpha subfamily, and plays a central role in mRNA surveillance during protein synthesis. It is involved in the No-Go Decay (NGD) and Non-Stop Decay (NSD) pathways, which target mRNAs where elongation complexes have stalled. The Pelota-Hbs1 complex promotes the dissociation of stalled ribosomes and the release of intact peptidyl-tRNA in the presence of the ATP-binding cassette protein ABCE1. These proteins are also capable of destabilising mRNA within the ribosome channel, facilitating ribosome disassembly and degradation of aberrant mRNAs. The Pelota-HBS1L complex is critical for these functions in eukaryotes. Beyond cytoplasmic roles, Pelota proteins contribute to mitochondrial quality control through mitophagy, where they are recruited to damaged mitochondria to aid autophagy receptor engagement. Structurally, they are defined by an RNA-binding Sm fold domain with endoribonuclease activity, which is essential for mRNA cleavage and ribosome rescue. Dom34 and Pelota are organised in three domains. The N-terminal domain, annotated as domain A in Pelota, represented by this entry, adopts a Sm-fold that is often involved in the recognition of mRNA stem loops or in the recruitment of mRNA degradation machinery.
