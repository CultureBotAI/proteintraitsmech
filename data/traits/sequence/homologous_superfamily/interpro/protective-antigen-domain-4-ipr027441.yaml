identifier: InterPro:IPR027441
label: "Protective antigen, domain 4"
definition: >-
  This entry represents domain 4 of PA and similar sequences from Bacillus. Protective antigen (PA) is the central component of the three-part protein toxin secreted by Bacillus anthracis, the organism responsible for anthrax. Homologues of PA have been found in several spore-forming Gram-positive bacteria, and share the ability to translocate toxic enzymes into the host cytosol. The PA monomer is organised mainly into antiparallel β-sheets and has four domains: an N-terminal domain (domain 1, ) containing two calcium ions and the cleavage site for activating proteases; a heptamerisation domain (domain 2, and ) containing a large flexible loop implicated in membrane insertion; a small domain with several key residues for oligomerisation (domain 3, ); and a C-terminal receptor-binding domain (domain 4, ).
