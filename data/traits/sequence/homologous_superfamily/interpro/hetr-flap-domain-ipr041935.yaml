identifier: InterPro:IPR041935
label: "HetR, flap domain"
definition: >-
  This entry represents the flap domain, or the middle domain, which interacts with the phosphate backbone of the DNA. It is composed of four α-helices, one helix, and a β-hairpin. The β-hairpin in the flap domain runs along the minor groove of DNA. In the dimer, the two flap domains protrude away from the central N-terminal-C-terminal core structure. These domains are also in position to contact DNA, perhaps at the exterior phosphates, which could enhance the interaction with DNA throughout the length of HetR. HetR is a DNA-binding serine-type protease required for heterocyst differentiation in the nitrogen-fixing cyanobacteria under conditions of nitrogen deprivation. The protein binds to a DNA palindrome upstream of hetP and other genes. The HetR monomer is composed of three distinct domains: the N-terminal domain which is involved in DNA binding, the middle domain designated the "flap", and a slightly smaller C-terminal domain designated the "hood". HetR forms a dimer upon DNA binding. That structure contains four distinct domains: an extended DNA-binding unit containing helix-turn-helix (HTH) motifs comprised of two canonical α-helices in the DNA-binding domain and an auxiliary α-helix from the flap domain of the neighboring subunit; two histidine-rich flaps protruding on either side of the extended structure; and finally a hood comprised of the two C-terminal sequences. The whole HetR dimer becomes more symmetric in the presence of DNA. Overall, the flap orientations are adjusted to provide a more extended interaction with the twofold symmetric DNA duplex.
