identifier: InterPro:IPR038160
label: "6-Cysteine (6-Cys) domain superfamily"
definition: >-
  The 6-Cysteine (6-Cys) domain is found in Plasmodium proteins that are expressed in all stages of the parasite life cycle in both the vertebrate and mosquito hosts. The domain is of roughly 120 amino acids and contains six positionally conserved cysteines. It might occur in 1-14 copies per protein, either as the sole globular domain or in combination wih β-helix-forming hexapeptide repeats as is the case of sequestrin. It is generally found in tandem pairs of A-type and B-type domains. Previously believed to be exclusive to Plasmodium, the 6-Cys domain also exists in proteins found in all members of the aconoidasidan (hematozoan) clade of Apicomplexa, which unites the haemosporidians (Plasmodium) and piroplasms). The 6-cys domain is a β-sandwich formed by two sheets with a mixture of parallel and antiparallel strands. Three disulfide bonds are present in the 6_Cys domain with C1-C2, C3-C6, and C4-C5 connectivity. C1-C2 and C3-C6 pin together the two sheets of the β-sandwich, whereas C4-C5 links an ancyllary loop to the core domain.
