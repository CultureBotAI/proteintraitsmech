identifier: InterPro:IPR036207
label: "B-form DNA mimic Ocr"
definition: >-
  Protein Ocr protects Bacteriophage T7 DNA from degradation and modification by the host restriction-modification complex. The structure of Ocr from T7 has shown that this protein mimics the size and shape of a bent DNA molecule, that binds to and completely occupies the DNA-binding sites of all known families of the complex type I DNA restriction enzymes which inhibits the restriction endonuclease activity. Ocr binds to bacterial RNA polymerase (RNAP) and competes with sigma factors resulting in host transcription inhibition and it also inhibits the host exclusion defense system BREX.
