identifier: InterPro:IPR035566
label: "Ribosomal protein bL20, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain of the ribosomal protein bL20. The C-terminal domain of this protein is an α-helical domain. It specifically recognizes RNA. This entry represents the large ribosomal subunit protein family bL20 that contains members from eubacteria, as well as their mitochondrial and plastid homologs. bL20 is an assembly protein, required for the first in vitro reconstitution step of the 50S ribosomal subunit, but does not seem to be essential for ribosome activity. bL20 has been shown to partially unfold in the absence of RNA, in regions corresponding to the RNA-binding sites. bL20 represses the translation of its own mRNA via specific binding to two distinct mRNA sites, in a manner similar to the bL20 interaction with 23S ribosomal RNA.
