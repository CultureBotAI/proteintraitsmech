identifier: InterPro:IPR038142
label: "Cytochrome P460 superfamily"
definition: >-
  This superfamily includes monoheme c-type cytochrome, cytochrome P460, from Nitrosomonas europea. It is a monoheme c-type cytochrome, a homodimeric structure with a predominantly β-sheet fold. The chromophore possesses unusual spectral properties analogous to those of the catalytic heme P460 of hydroxylamine oxidoreductase (HAO), the only known heme in biology to withdraw electrons from substrate coordinated to the iron.
