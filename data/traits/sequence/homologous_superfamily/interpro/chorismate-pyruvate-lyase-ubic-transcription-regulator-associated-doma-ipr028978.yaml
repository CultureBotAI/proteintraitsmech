identifier: InterPro:IPR028978
label: "Chorismate pyruvate-lyase/UbiC transcription regulator-associated domain superfamily"
definition: >-
  This superfamily represents a domain found in chorismate pyruvate-lyases, which catalyses the first step in ubiquinone synthesis, the removal of pyruvate from chorismate, to yield 4-hydroxybenzoate in Escherichia coli and other Gram-negative bacteria. The yeast Saccharomyces cerevisiae can synthesize ubiquinone from either chorismate or tyrosine, however this enzyme is found only in bacteria. Its activity does not require metal cofactors. GntR/HutC-type transcriptional regulators also contain this domain, such as FrlR, TreR (trehalose operon transcriptional repressor) and PhnF.
