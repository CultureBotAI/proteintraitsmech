identifier: InterPro:IPR036356
label: "Endoplasmic reticulum resident protein 29, C-terminal domain superfamily"
definition: >-
  ERp29 (also known as ERp28 and ERp31) is a ubiquitously expressed endoplasmic reticulum protein found in mammals. This protein has an N-terminal thioredoxin-like domain, which is homologous to the domain of human protein disulphide isomerase (PDI). ERp29 may help mediate the chaperone function of PDI. The C-terminal Erp29 domain has a 5-helical bundle fold. ERp29 is thought to form part of the thyroglobulin folding complex.
