identifier: InterPro:IPR029068
label: "Glyoxalase/Bleomycin resistance protein/Dihydroxybiphenyl dioxygenase"
definition: >-
  The entry represents a domain containing a β-α-β(3) motif found in a group of metalloenzymes. The β-α-β(3) motif provides a metal coordination environment for these enzymes, which catalyse different reactions, including isomerisations (glyoxalase I), epimerisations (methylmalonyl-CoA epimerase), oxidative cleavage of C-C bonds (extradiol dioxygenase), and nucleophilic substitutions (fosfomycin resistance proteins).
