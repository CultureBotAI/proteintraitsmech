identifier: InterPro:IPR041896
label: "Antirestriction protein ArdA, domain 2"
definition: >-
  ArdA functions in bacterial conjugation to allow an unmodified plasmid to evade restriction in the recipient bacterium and yet acquire cognate modification. ArdA forms a dimer and each monomer is comprised of three small α-β domains, each with a different fold, arranged in a row in each monomer. This superfamily represents the antirestriction protein (ArdA) domain 2. Domains 2 and 3 ( ) have folds similar to those of nucleotide binding proteins, but which present a negative potential, opposite to the positive potential characteristic of nucleotide binding proteins. This reversal in surface potential suggests that ArdA is not a DNA- (or RNA)-binding protein.
