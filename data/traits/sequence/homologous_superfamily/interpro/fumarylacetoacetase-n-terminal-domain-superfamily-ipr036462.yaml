identifier: InterPro:IPR036462
label: Fumarylacetoacetase, N-terminal domain superfamily
definition: >-
  Fumarylacetoacetase ( ; also known as fumarylacetoacetate hydrolase or FAH) catalyses the hydrolytic cleavage of a carbon-carbon bond in fumarylacetoacetate to yield fumarate and acetoacetate as the final step in phenylalanine and tyrosine degradation. This is an essential metabolic function in humans, the lack of FAH causing type I tyrosinaemia, which is associated with liver and kidney abnormalities and neurological disorders. The enzyme mechanism involves a catalytic metal ion, a Glu/His catalytic dyad, and a charged oxyanion hole. FAH folds into two domains: an N-terminal domain SH3-like β-barrel, and a C-terminal with an unusual fold consisting of three layers of β-sheet structures. This entry represents the N-terminal domain superfamily of fumarylacetoacetase. This domain adopts a structure consisting of an SH3-like barrel.
