identifier: InterPro:IPR013041
label: "Clathrin adaptor, appendage, Ig-like subdomain superfamily"
definition: >-
  Proteins synthesized on the ribosome and processed in the endoplasmic reticulum are transported from the Golgi apparatus to the trans-Golgi network (TGN), and from there via small carrier vesicles to their final destination compartment. This traffic is bidirectional, to ensure that proteins required to form vesicles are recycled. Vesicles have specific coat proteins (such as clathrin or coatomer) that are important for cargo selection and direction of transfer. This superfamily represents a β-sandwich structural motif found in the appendage (ear) domain of alpha-, beta-and gamma-adaptin from AP clathrin adaptor complexes, the GAE (gamma-adaptin ear) domain of GGA adaptor proteins, and the appendage domain of the gamma subunit of coatomer complexes. These domains have an immunoglobulin-like β-sandwich fold containing 7 or 8 strands in 2 β-sheets in a Greek key topology. Although the appendage domains from AP / GGA adaptins and coatomers share a similar fold, there is little sequence identity between them. However, they also share similar motif-based cargo recognition and accessory factor recruitment mechanisms.
