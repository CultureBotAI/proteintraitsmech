identifier: InterPro:IPR026591
label: "Sirtuin, catalytic core small domain superfamily"
definition: >-
  The catalytic core of sirtuin proteins consists of a large and a small domains. The large domain has a Rossmann fold and binds NAD+. The small domain is composed of residues from two insertions in the Rossmann fold that form a helical and a zinc binding modules. This superfamily represents the catalytic core small domain.
