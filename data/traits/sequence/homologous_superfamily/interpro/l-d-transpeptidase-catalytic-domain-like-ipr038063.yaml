identifier: InterPro:IPR038063
label: "L,D-transpeptidase catalytic domain-like"
definition: >-
  The structure of L,D-transpeptidase from E. faecium is similar to that of Bacillus subtilis YkuD and consists of two domains. The C-terminal domain folds into a globular structure of the mainly β class of protein structures. The residues of the proposed catalytic triad of YkuD (Cys139, His123, Asp124) are found in the C-terminal domain and correspond to residues Cys442, His421 and Asp422 of E. faecium L,D-transpeptidase. These proteins could catalyse similar reactions, but differences in the solvent accessibility of the catalytic Cys residues suggest that they may have different functions in peptidoglycan metabolism.
