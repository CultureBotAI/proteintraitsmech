identifier: InterPro:IPR038256
label: "DNA polymerase alpha, zinc finger domain superfamily"
definition: >-
  The DNA Polymerase alpha zinc finger domain adopts an α-helix-like structure, followed by three turns, all of which involve proline. The resulting motif is a helix-turn-helix motif, in contrast to other zinc finger domains, which show anti-parallel sheet and helix conformation. Zinc binding occurs due to the presence of four cysteine residues positioned to bind the metal centre in a tetrahedral coordination geometry. The function of this domain is uncertain: it has been proposed that the zinc finger motif may be an essential part of the DNA binding domain. It is involved in providing a structural platform for interactions with both oligonucleotide/oligosaccharide (OB) and phosphoesterase domains of the B subunit.
