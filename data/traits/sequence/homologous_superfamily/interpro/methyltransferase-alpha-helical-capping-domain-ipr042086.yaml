identifier: InterPro:IPR042086
label: "Methyltransferase, alpha-helical capping domain"
definition: >-
  This superfamily represents the α-helical capping domain found in various methyltransferases, such as fatty acid O-methyltransferase (FAMT), salicylic acid carboxyl methyltransferase (SAMT), xanthosine (XR) methyltransferase (XMT), and 1,7-dimethylxanthine methyltransferase (DXMT). The capping domain is formed of α-helices and contains a binding cavity that accommodates fatty acid substrates with acyl chain lengths up to C12. This domain establishes specificity for the hydrophobic part of the substrate and is responsible for the substrate binding.
