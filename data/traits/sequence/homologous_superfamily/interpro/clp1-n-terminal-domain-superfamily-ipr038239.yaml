identifier: InterPro:IPR038239
label: "Clp1, N-terminal domain superfamily"
definition: >-
  Clp1 function involves some degree of adenine or guanine nucleotide binding and participates in the 3' end processing of mRNAs in eukaryotes. Both human Clp1 (hsClp1) and Saccharomyces cerevisiae Clp1 (scClp1) were identified as components of the pre-mRNA 3end-processing machinery. Whereas hsClp1 was shown to also be part of the tRNA endonuclease complex, scClp1 exclusively contributes to mRNA maturation and appears to be enzymatically inactive. Clp1 contains three domains, a small N-terminal β-sandwich domain, a C-terminal domain containing a novel α/β-fold and a central domain that binds ATP. This entry represents the N-terminal domain involved in DNA binding.
