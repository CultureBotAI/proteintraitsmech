identifier: InterPro:IPR023347
label: Lysozyme domain superfamily
definition: >-
  This entry represents a domain superfamily found in phage lysozyme and related proteins, including Bacteriophage lambda lysozyme and Escherichia coli endolysin. Lysozyme helps to release mature phage particles from the cell wall by breaking down the peptidoglycan. The enzyme hydrolyses the 1,4-beta linkages between N-acetyl-D-glucosamine and N-acetylmuramic acid in peptidoglycan heteropolymers of prokaryotic cell walls. E. coli endolysin also functions in bacterial cell lysis and acts as a transglycosylase. The Bacteriophage T4 lysozyme structure contains two domains, the interface between which forms the active-site cleft. The N terminus of the two domains undergoes a 'hinge-bending' motion about an axis passing through the molecular waist. This mobility is thought to be important in allowing access of substrates to the enzyme active site.
