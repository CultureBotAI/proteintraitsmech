identifier: InterPro:IPR011029
label: "Death-like domain superfamily"
definition: >-
  This superfamily represents the death domain and other structurally similar domains, including DED, CARD and the DAPIN domain. The death domain (DD) is a conserved region of about 80 residues found on death receptors, and which is required for death signalling, as well as a variety of non-apoptotic functions. Proteins containing this domain include the low affinity neurotrophin receptor p73, Fas, FADD (Fas-associated death domain protein), TNF-1 (tumour necrosis factor receptor-1), Pelle protein kinase, and the Tube adaptor protein. The induction of apoptosis also relies on the presence of a second domain, called the death effector domain. The death effector domain (DED) occurs in proteins that regulate programmed cell death, including both pro- and anti-apoptotic proteins; many of these proteins are also involved in controlling cellular activation and proliferation pathways. Proteins containing this domain include FADD (DED N-terminal, DD C-terminal), PEA-15 (phosphoproteins enriched in astrocytes 15kDa), caspases and FLIP. The induction of apoptosis results in the activation of caspases, a family of aspartyl-specific cysteine proteases that are the main executioners of apoptosis. For example, the DED of FADD recruits two DED-containing caspases, caspase-8 and caspase-10, to form the death-inducing signal complex, which initiates apoptosis. Proteins containing the caspase recruitment domain (CARD) are involved in the recruitment and activation of caspases during apoptosis. Other CARD proteins participate in NF-kappaB signalling pathways associated with innate or adaptive immune responses. Proteins containing CARD include Raidd, APAF-1 (apoptotic protease activating factor 1), procaspase 9 and iceberg (inhibitor of interleukin-1-beta generation). The DD shows strong st…
