identifier: InterPro:IPR043102
label: "Antiactivator protein ExsD, domain 2"
definition: >-
  The antiactivator protein ExsD represses the transcriptional activator ExsA. ExsA activates expression of type III secretion system genes. ExsD inhibits the DNA-binding and self-association properties of ExsA. Repression of ExsA by ExsD is relieved by the secretion chaperone ExsC. This superfamily represents the domain 2 of ExsD, which is consists of five helices and two β sheets.
