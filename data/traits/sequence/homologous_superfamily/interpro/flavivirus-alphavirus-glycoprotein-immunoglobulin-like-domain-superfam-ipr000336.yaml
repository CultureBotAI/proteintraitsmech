identifier: InterPro:IPR000336
label: "Flavivirus/Alphavirus glycoprotein, immunoglobulin-like domain superfamily"
definition: >-
  This immuniglobulin-like domain superfamily is found in polyproteins from Flavivirus and Alphavirus. Flaviruses are small, enveloped RNA viruses that use arthropods such as mosquitoes for transmission to their vertebrate hosts, and include Yellow fever virus, West Nile virus, Tick-borne encephalitis virus, Japanese encephalitis virus, and Dengue virus 2. Flaviviruses consist of three structural proteins: the core nucleocapsid protein C, and the envelope glycoproteins M and E. Glycoprotein E is a class II viral fusion protein that mediates both receptor binding and fusion. Class II viral fusion proteins are found in flaviviruses and alphaviruses, and are structurally distinct from class I fusion proteins from influenza-type viruses and retroviruses. Glycoprotein E is comprised of three domains: domain I (dimerisation domain) is an 8-stranded β barrel, domain II (central domain) is an elongated domain composed of twelve β strands and two α helices, and domain III (immunoglobulin-like domain) is an IgC-like module with ten β strands. This entry represents the Ig-like domain III, which contains a putative receptor-binding loop.
