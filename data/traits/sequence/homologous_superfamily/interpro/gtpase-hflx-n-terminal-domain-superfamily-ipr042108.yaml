identifier: InterPro:IPR042108
label: "GTPase HflX, N-terminal domain superfamily"
definition: >-
  This domain represents the N-terminal region of GTP-binding HflX-like proteins. These proteins interact with the 50S ribosome and are GTPases, hydrolysing GTP/GDP/ATP/ADP. The N-terminal region is necessary for stability of the whole protein, its structure is composed of four parallel β-strand and four α-helices.
