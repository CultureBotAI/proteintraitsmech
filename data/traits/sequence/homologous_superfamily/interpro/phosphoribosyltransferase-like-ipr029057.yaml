identifier: InterPro:IPR029057
label: Phosphoribosyltransferase-like
definition: >-
  This superfamily represents a phosphoribosyltransferase-like domain. Proteins containing this domain include phosphoribosyltransferases (PRTases), phosphoribosylpyrophosphate synthetase-like proteins and some uncharacterised proteins.
