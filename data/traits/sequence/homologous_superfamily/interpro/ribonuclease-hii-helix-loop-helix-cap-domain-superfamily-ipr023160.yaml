identifier: InterPro:IPR023160
label: Ribonuclease HII, helix-loop-helix cap domain superfamily
definition: >-
  This superfamily represents the helix-loop-helix cap domain of ribonuclease HII. This C-terminal domain forms a compact structure consisting of two α-helices: α8 and α9. Unlike the N-terminal domain, bacterial RNases HI do not possess this domain. In the full-length enzyme, the α9 helix is followed by 15 amino acid residues, of which conformation is likely to be flexible, as revealed from the susceptibility to trypsin digestion. It has been suggested that this domain confers substrate-specific binding capacity to the core nuclease architecture, thus accounting for the endonucleolytic specificity of the type 2 RNase H family members. It also has been suggested that this domain to be involved in the interaction with the DNA/RNA hybrid.
