identifier: InterPro:IPR044898
label: "Cyclin-dependent kinase inhibitor domain superfamily"
definition: >-
  Cell cycle progression is negatively controlled by cyclin-dependent kinases inhibitors (CDIs). CDIs are involved in cell cycle arrest at the G1 phase. This superfamily represents a domain found in CDIs.
