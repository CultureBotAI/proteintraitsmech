identifier: InterPro:IPR042262
label: "Nitrile hydratase beta subunit, N-terminal"
definition: >-
  Nitrile hydratases ( ) are unusual metalloenzymes that catalyse the hydration of nitriles to their corresponding amides. They are used as biocatalysts in acrylamide production, one of the few commercial scale bioprocesses, as well as in environmental remediation for the removal of nitriles from waste streams. Nitrile hydratases are composed of two subunits, alpha and beta, and they contain one iron atom per alpha beta unit. This entry represents the N-terminal domain of nitrile hydratase beta subunit which contains an irregular array of helices.
