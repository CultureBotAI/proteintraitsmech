identifier: InterPro:IPR038064
label: "Influenza A virus NS1, effector domain-like superfamily"
definition: >-
  The influenza A virus NS1 protein contains an N-terminal RNA-binding domain and a C-terminal effector domain. This entry represents the C-terminal effector domain of the influenza A virus NS1 protein. The effector domain is able to interact with a variety of cellular and viral targets.
