identifier: InterPro:IPR036227
label: "Large ribosomal subunit protein uL15/eL18 superfamily"
definition: >-
  Large ribosomal subunit proteins uL15/eL18 share a common structure consisting mainly of parallel β sheets (β-α-β units) with a core of three turns of irregular (β-β-α)n superhelix. This superfamily includes his entry includes uL15 proteins that were known as L15 from bacteria, L28 from yeast, and L27A from higher eukaryotes, fungal mitochondrial uL15m (previously L10), mitochondrial uL15m (MRLP15), and eL18 proteins from archaea and eukaryotes.
