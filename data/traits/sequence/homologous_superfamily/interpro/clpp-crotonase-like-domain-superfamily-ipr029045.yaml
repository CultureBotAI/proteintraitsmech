identifier: InterPro:IPR029045
label: "ClpP/crotonase-like domain superfamily"
definition: >-
  This superfamily represents a ClpP/crotonase-like domain formed from repeated β/β/α units, which comprises two perpendicular β-sheet surrounded by α-helices. Proteins containing this domain can be classified into four structural families: The Clp protease, Clp subunit family. The tail-specific protease, catalytic domain family. Members include tricorn proteases. The crotonase-like family. The biotin-dependent carboxylase carboxyltransferase domain family. Members include the acetyl-coenzyme A carboxylase carboxyl transferase subunits.
