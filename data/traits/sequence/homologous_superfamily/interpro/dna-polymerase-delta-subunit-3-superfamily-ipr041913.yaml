identifier: InterPro:IPR041913
label: "DNA polymerase delta subunit 3 superfamily"
definition: >-
  DNA polymerase delta (Pol delta), one of the major eukaryote replicases, consists of 4 subunits in humans: p125, p55, p66 and p12. The interaction between the non-catalytic subunits p55 and p66 is crucial for Pol delta regulation. This superfamily entry represents the p66 subunit (also known as POLD3) which contains a winged helix-turn-helix domain (wHTH).
