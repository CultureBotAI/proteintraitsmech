identifier: InterPro:IPR038573
label: "Ribonuclease toxin BrnT superfamily"
definition: >-
  BrnT is a ribonuclease toxin of a type II toxin-antitoxin system that exhibits a RelE-like fold. The antitoxin that neutralises this toxin is BrnA. BrnT is found in bacteria, archaea, bacteriophage, and plasmids. BrnT-BrnA forms a 2:2 tetrameric complex and autoregulates its own expression, which is induced by a number of different environmental stresses. Expression of BrnT alone results in cessation of bacterial growth, which can be rescued after subsequent expression of BrnA.
