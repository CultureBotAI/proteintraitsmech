identifier: InterPro:IPR024071
label: "S-Me-THD, C-terminal domain superfamily"
definition: >-
  This β-barrel domain is found at the C-terminal of S-methyl thiohydantoin desulfurase from Variovorax sp. (S-Me-THD) and similar sequences mainly found in bacteria and fungi. S-Me-THD catalyses the hydrolysis of S-methyl-thiohydantoin-5-propanoate into hydantoin-5-propanoate and methanethiol, the third step in S-methyl ergothioneine degradation.
