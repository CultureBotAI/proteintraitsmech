identifier: InterPro:IPR036908
label: "RlpA-like domain superfamily"
definition: >-
  Rare lipoprotein A (RlpA) contains a conserved region that has the double-psi β-barrel (DPBB) fold. RlpA is a bacterial septal ring protein and a lytic transglycosylase that contributes to rod shape and daughter cell separation in Pseudomonas aeruginosa. It has been shown to act as a prc mutant suppressor in Escherichia coli. The DPBB fold is often an enzymatic domain. Proteins containing this domain are quite diverse and may have several different functions. Another example of this domain is found in the N-terminal of pollen allergen. Some studies show that the full-length RlpA protein from Pseudomonas Aeruginosa is an outer membrane protein that is a lytic transglycolase with specificity for peptidoglycan lacking stem peptides. Residue D157 in Pseudomonas aeruginosa RlpA is critical for lytic activity. β-barrels are commonly observed in protein structures. They are classified in terms of two integral parameters: the number of strands in the sheet, n, and the shear number, S, a measure of the stagger of the strands in the β-sheet. These two parameters have been shown to determine the major geometrical features of β-barrels. Six-stranded β-barrels with a pseudo-two-fold axis are found in several proteins. One involving parallel strands forming two psi structures is known as the double-psi barrel. The first psi structure consists of the loop connecting strands β1 and β2 (a 'ψ loop') and the strand β5, whereas the second psi structure consists of the loop connecting strands β4 and β5 and the strand β2. All the psi structures in double-psi barrels have a unique handedness, in that β1 (β4), β2 (β5) and the loop following β5 (β2) form a right-handed helix. The unique handedness may be related to the fact that the twisting angle between the parallel pair of strands is always…
