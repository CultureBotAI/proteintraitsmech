identifier: InterPro:IPR036464
label: "Rubisco LSMT, substrate-binding domain superfamily"
definition: >-
  The domain in this superfamily adopts a multihelical structure, with an irregular array of long and short α-helices. It allows binding of the protein to substrate, such as the N-terminal tails of histones H3 and H4 and the large subunit of the Rubisco holoenzyme complex.
