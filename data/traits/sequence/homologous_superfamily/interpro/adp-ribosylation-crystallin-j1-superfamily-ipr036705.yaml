identifier: InterPro:IPR036705
label: "ADP-ribosylation/Crystallin J1 superfamily"
definition: >-
  This superfamily includes enzymes that perform ADP-ribosylations, such as ADP-ribosylarginine hydrolase which cleaves ADP-ribose-L-arginine. The superfamily also includes dinitrogenase reductase activating glycohydrolase, and most surprisingly jellyfish crystallins, although these proteins appear to have lost the presumed active site residues. ADP-ribosylglycohydrolase has a multihelical structure arranged in a bundle fold.
