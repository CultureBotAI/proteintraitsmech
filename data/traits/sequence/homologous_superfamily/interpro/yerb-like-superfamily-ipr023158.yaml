identifier: InterPro:IPR023158
label: "YerB-like superfamily"
definition: >-
  This domain superfamily is found in a family of proteins with unknown function. YerB interacts with PcrA helicase. The interaction is not essential for cell viability or repair of UV-induced lesions. The domain structure was determined from the crystal structure of the YerB protein from Bacillus subtilis.
