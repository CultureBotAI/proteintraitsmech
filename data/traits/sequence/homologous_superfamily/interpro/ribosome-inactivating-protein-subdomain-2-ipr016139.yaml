identifier: InterPro:IPR016139
label: "Ribosome-inactivating protein, subdomain 2"
definition: >-
  A number of bacterial and plant toxins act by inhibiting protein synthesis in eukaryotic cells. The toxins of the shiga and ricin family inactivate 60S ribosomal subunits by an N-glycosidic cleavage which releases a specific adenine base from the sugar-phosphate backbone of 28S rRNA. Members of the family include shiga and shiga-like toxins, and type I (e.g. trichosanthin and luffin) and type II (e.g. ricin, agglutinin and abrin) ribosome inactivating proteins (RIPs). All these toxins are structurally related. RIPs have been of considerable interest because of their potential use, conjugated with monoclonal antibodies, as immunotoxins to treat cancers. Further, trichosanthin has been shown to have potent activity against HIV-1-infected T cells and macrophages. Elucidation of the structure-function relationships of RIPs has therefore become a major research effort. It is now known that RIPs are structurally related. A conserved glutamic residue has been implicated in the catalytic mechanism; this lies near a conserved arginine, which also plays a role in catalysis. This entry contains proteins with a subdomain with an irregular topology.
