identifier: InterPro:IPR042257
label: "2-keto-3-deoxy-galactonokinase, C-terminal domain"
definition: >-
  2-keto-3-deoxy-galactonokinase is a bacterial transferase which catalyses the penultimate reaction in the Ley-Doudoroff pathway, where d-galactose is metabolized into pyruvate and d-glyceraldehyde 3-phosphate. This reaction involves the phosphorylation of 2-oxo-3-deoxygalactonate to 2-oxo-3-deoxygalactonate 6-phosphate using ATP as a phosphoryl-group donor. This superfamily represents the C-terminal domain of 2-keto-3-deoxy-galactonokinase. This domain contains a nucleotide biding site.
