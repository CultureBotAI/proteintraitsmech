identifier: InterPro:IPR023175
label: "Vta1/Callose synthase, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal domain of vacuolar protein sorting-associated proteins and callose synthases. This domain contains seven α helices arranged into two antiparallel three-helix bundle modules. It has been proposed that vacuolar protein sorting-associated protein Vta1 interacts with Vps60 and Vps46/Did2 via this N-terminal domain.
