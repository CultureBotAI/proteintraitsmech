identifier: InterPro:IPR042560
label: "Exocyst component Exo84, C-terminal, subdomain 2"
definition: >-
  The exocyst is a large complex that is required for tethering vesicles at the final stages of the exocytic pathway in all eukaryotes. Exocyst subunits are composed of mostly helical modules strung together into long rods. This superfamily represents the subdomain 2 found in the C-terminal helical region of the exocyst component Exo84. The C-terminal region resembles a cullin-repeat, a multi-helical bundle.
