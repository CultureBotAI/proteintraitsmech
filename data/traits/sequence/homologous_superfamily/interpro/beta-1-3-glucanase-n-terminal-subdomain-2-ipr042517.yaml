identifier: InterPro:IPR042517
label: "Beta-1,3-glucanase, N-terminal, subdomain 2"
definition: >-
  This superfamily represents the subdomain 2 found in the N-terminal domain of glucan endo-1,3-beta-glucosidase, which constitutes the glycoside hydrolase family 64 and has beta-1,3-glucanase activity. Structurally, this subdomain consists of 3 α helices and 5 β sheets.
