identifier: InterPro:IPR038054
label: "L,D-transpeptidase central domain-like superfamily"
definition: >-
  This entry represents the putative catalytic central domain found in ykuD protein, a L,D-transpeptidase belonging to the ErfK/YbiS/YcfS/YnhG family. This domain contains a putative catalytic site with a tetrad of invariant His123, Gly124, Cys139, and Arg141. The stereochemistry of this active site shows similarities to peptidotransferases and sortases, and suggests that the enzymes of this family may play an important role in cell wall biology.
