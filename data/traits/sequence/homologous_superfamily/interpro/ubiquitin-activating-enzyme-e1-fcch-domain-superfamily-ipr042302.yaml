identifier: InterPro:IPR042302
label: "Ubiquitin-activating enzyme E1, FCCH domain superfamily"
definition: >-
  This domain is found in the ubiquitin-activating E1 (Ub-E1) family enzymes. It is one of the catalytic cysteine half-domains of Ub-E1. The catalytic cysteine half-domains contain the E1 active site cysteine, and are known as FCCH and SCCH, for 'first' and 'second' catalytic cysteine half-domain, respectively. Structurally, the FCCH domain is composed of 7 anti-parallel β sheets and 2 α helices.
