identifier: InterPro:IPR038183
label: "RICH domain superfamily"
definition: >-
  This superfamily represents a domain about 85 residues in length and very rich in charged residues, hence its name RICH (Rich In CHarged residues). It is found in secreted proteins such as PspC ( ), SpsA ( ) and IgA FC receptor ( ) from Streptococcus agalactiae. This domain could be involved in bacterial adherence or cell wall binding.
