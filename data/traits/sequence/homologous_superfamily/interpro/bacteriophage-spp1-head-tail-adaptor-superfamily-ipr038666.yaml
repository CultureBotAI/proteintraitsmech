identifier: InterPro:IPR038666
label: "Bacteriophage SPP1, head-tail adaptor superfamily"
definition: >-
  This entry describes the head-tail adaptor protein of bacteriophage SPP1 and related proteins in other bacteriophage and prophage regions of bacterial genomes. Homologues are also found in Gene Transfer Agents (GTA), including ORFg7 (RCAP_rcc01689) of the GTA of Rhodobacter capsulatus (Rhodopseudomonas capsulata). This entry also includes gp7. In bacteriophage SPP1, the gp16 protein functions as a stopper, locking the viral DNA into the capsid. When the tail attachment binds to the entry receptor, gp16 opens by a diaphragm-like motion, allowing the genome to exit the capsid through the tail tube to the host cell. During virion assembly, gp16 functions as a docking platform to which the preassembled tail binds. The gp7 protein functions as a stopper within the head-tail connector, locking the viral DNA inside the capsid. Upon attachment of the tail to the host cell entry receptor, gp7 appears to open via a diaphragm-like motion, allowing the genome to exit the capsid through the tail tube and enter the host cell. During viral assembly, gp7 also acts as a docking platform for the preassembled tail, which is tapered by the head-tail joining protein gp17. The SPP1 head-to-tail connector is composed of cyclical dodecamers of the portal protein gp6 and of the 2 head completion proteins gp15 and gp16.
