identifier: InterPro:IPR024087
label: "Creatininase-like superfamily"
definition: >-
  Creatinase catalyses the hydrolysis of creatinine to creatine, which can then be metabolised to urea and sarcosine by creatinase. Formamide hydrolase catalyzes the hydrolysis of the formamide of 2-amino-5-formylamino-6-ribosylamino-4(3H)-pyrimidinone 5'-monophosphate (FAPy) to form 2,5-diamino-6-ribosylamino-4(3H)-pyrimidinone 5'-phosphate (APy). Creatininase from Pseudomonas putida has a structure consisting of 3-layers, α/β/α, where the core consists of a parallel β-sheet of 4 strands. The enzyme is a typical Zn2+ enzyme with a binuclear metal centre. This superfamily represents the structural domain found in creatininases and in formamide hydrolases.
