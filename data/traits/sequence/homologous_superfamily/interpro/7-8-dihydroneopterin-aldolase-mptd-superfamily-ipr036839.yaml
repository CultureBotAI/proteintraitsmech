identifier: InterPro:IPR036839
label: 7,8-dihydroneopterin aldolase (MptD) superfamily
definition: >-
  This superfamily of archaeal 7,8-dihydroneopterin aldolase (also known as dihydroneopterin aldolase) catalyses the conversion of 7,8-dihydroneopterin (H2Neo) to 6-hydroxymethyl-7,8-dihydropterin diphosphate (6-HMDP). 6-HMDP is the precursor of the pterin containing moiety of the essential C1-carriers tetrahydrofolate and tetrahydromethanopterin.
