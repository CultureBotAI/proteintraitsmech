identifier: InterPro:IPR036216
label: "Putative type 4B encapsulin shell protein superfamily"
definition: >-
  Proteins in this entry may be the encapsulin shell protein in a type 4 A-domain encapsulin nanocompartment system. Its cargo may be upstream glyceraldehyde-3-phosphate dehydrogenase. It has been shown that bacterial/archaeal encapsulin-like systems and HK97-type viruses share a common ancestor and it is likely that encapsulins have evolved from HK97-type phages.
