identifier: InterPro:IPR038396
label: "SpoIIAA-like superfamily"
definition: >-
  These proteins adopt an α/β SpoIIAA-like fold, similar to the one found in STAT . They adopt opened and closed conformations arising from different arrangements of their α2 and α3 helices. They may be membrane associated and may function as carriers of non-polar compounds.
