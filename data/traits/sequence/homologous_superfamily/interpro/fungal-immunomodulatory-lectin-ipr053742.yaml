identifier: InterPro:IPR053742
label: "Fungal Immunomodulatory Lectin"
definition: >-
  This superfamily of proteins includes lectins that have a specificity for complex cell-surface carbohydrates and exhibit immunomodulatory activities. Members of this superfamily can stimulate lymphocyte mitogenesis, suppress systemic anaphylaxis reactions and edema, and enhance the transcription of cytokines such as IL-2, IFN-gamma, and TNF-alpha. They are also capable of hemagglutinating red blood cells, indicating a role in cell-cell or cell-matrix interactions. These proteins are found in fungi and are known for their roles in immune system modulation.
