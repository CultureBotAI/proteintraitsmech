identifier: InterPro:IPR023149
label: Trans-aconitate 2-methyltransferase, C-terminal
definition: >-
  This entry represents the C-terminal α-orthogonal bundle domain. Trans-aconitate methyltransferases in bacteria catalyse the monomethyl esterification of trans-aconitate. Trans-aconitate is an effective inhibitor of aconitase, with potentially toxic results, as aconitase plays an essential role in the conversion of citrate to isocitrate in the tricarboxylic acid cycle.
