identifier: InterPro:IPR038610
label: "FliK-like, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal domain of the flagellar hook-length control protein FliK. This entry also includes the chemotaxis protein MotD which is required for the rotation of the flagellar motor. FliK controls the length of the flagellar hook. It detects when the flagellar hook substructure has reached its optimal length. Then, it terminates hook export and assembly and transmits a signal to begin filament export, the final stage in flagellar biosynthesis. The exact mechanism of how FliK achieves this is not known. FliK is a two-domain protein with the central portion of the sequence acting as a hinge or connector between the two.
