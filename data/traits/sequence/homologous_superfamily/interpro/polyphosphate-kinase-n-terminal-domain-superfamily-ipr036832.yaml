identifier: InterPro:IPR036832
label: "Polyphosphate kinase N-terminal domain superfamily"
definition: >-
  Polyphosphate kinase (PPK) catalyses the formation of polyphosphate from ATP, with polyphosphate chain lengths of up to a thousand or more orthophosphate molecules. The N-terminal domain of PPK consists of three α helices arranged in a close bundle fold with left-handed twist going up-and-down.
