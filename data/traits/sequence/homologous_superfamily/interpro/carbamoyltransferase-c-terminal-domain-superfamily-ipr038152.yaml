identifier: InterPro:IPR038152
label: "Carbamoyltransferase, C-terminal domain superfamily"
definition: >-
  This domain superfamily is found in NodU from Rhizobium, CmcH from Nocardia lactamdurans and the bifunctional carbamoyltransferase TobZ from Streptoalloteichus tenebrarius. NodU, a Rhizobium protein involved in the synthesis of nodulation factors, has 6-O-carbamoyltransferase-like activity. CmcH is involved in cephamycin (antibiotic) biosynthesis and has 3-hydroxymethylcephem carbamoyltransferase activity. TobZ functions as an ATP carbamoyltransferase and tobramycin carbamoyltransferase. This entry represents the C-terminal domain superfamily.
