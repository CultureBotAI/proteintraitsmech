identifier: InterPro:IPR035647
label: "EF-G domain III/V-like"
definition: >-
  EF2 (or EFG) participates in the elongation phase of protein synthesis by promoting the GTP-dependent translocation of the peptidyl tRNA of the nascent protein chain from the A-site (acceptor site) to the P-site (peptidyl tRNA site) of the ribosome. EF2 also has a role after the termination phase of translation, where, together with the ribosomal recycling factor, it facilitates the release of tRNA and mRNA from the ribosome, and the splitting of the ribosome into two subunits. EF2 is folded into five domains, with domains I and II forming the N-terminal block, domains IV and V forming the C-terminal block, and domain III providing the covalently-linked flexible connection between the two. Domains III and V have the same fold (although they are not completely superimposable and domain III lacks some of the superfamily characteristics), consisting of an α/β sandwich with an antiparallel β-sheet in a (β/α/β)x2 topology. Elongation factor 4 (EF4/LepA) is a highly conserved guanosine triphosphatase translation factor. EF4 has six domains, of which four (I, II, III, and V) are homologous to corresponding domains in EF-G. It differs from EF-G by having a short domain IV, and possessing a conserved C-terminal domain. This superfamily represents a domain found in EF2, EF4, as well as in some tetracycline resistance proteins, peptide chain release factors and in the C-terminal region of the bacterial hypothetical protein, YigZ.
