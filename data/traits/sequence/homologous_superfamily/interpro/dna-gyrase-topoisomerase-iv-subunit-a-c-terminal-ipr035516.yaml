identifier: InterPro:IPR035516
label: "DNA gyrase/topoisomerase IV, subunit A, C-terminal"
definition: >-
  DNA topoisomerases regulate the number of topological links between two DNA strands (i.e. change the number of superhelical turns) by catalysing transient single-or double-strand breaks, crossing the strands through one another, then resealing the breaks. These enzymes have several functions: to remove DNA supercoils during transcription and DNA replication; for strand breakage during recombination; for chromosome condensation; and to disentangle intertwined DNA during mitosis. DNA topoisomerases are divided into two classes: type I enzymes ( ; topoisomerases I, III and V) break single-strand DNA, and type II enzymes ( ; topoisomerases II, IV and VI) break double-strand DNA. Type II topoisomerases are ATP-dependent enzymes, and can be subdivided according to their structure and reaction mechanisms: type IIA (topoisomerase II or gyrase, and topoisomerase IV) and type IIB (topoisomerase VI). These enzymes are responsible for relaxing supercoiled DNA as well as for introducing both negative and positive supercoils. This entry represents the β-pinwheel continuous domain found at the C-terminal end of subunit A of topoisomerase IV (ParC) and subunit A of DNA gyrase (GyrA). DNA gyrase is the topoisomerase II found primarily in bacteria and archaea that consists of two polypeptide subunits, gyrA and gyrB, which form a heterotetramer: (BA)2. This is distinct from the topoisomerase II found in most eukaryotes, which consists of a single polypeptide, with the N- and C-terminal regions corresponding to gyrB and gyrA, respectively, and which is not represented in this entry. The ability of DNA gyrase to introduce negative supercoils into DNA is mediated in part by the C-terminal domain of subunit A, which forms a β-pinwheel fold that is similar to a β-propeller but with a differen…
