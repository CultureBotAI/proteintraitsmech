identifier: InterPro:IPR042189
label: Sigma-70 factor, region 1.1 superfamily
definition: >-
  Most bacteria express a multiplicity of sigma factors. Two of these factors, sigma-70 (gene rpoD), generally known as the major or primary sigma factor, and sigma-54 (gene rpoN or ntrA) direct the transcription of a wide variety of genes. The other sigma factors, known as alternative sigma factors, are required for the transcription of specific subsets of genes. Sequence alignments of the sigma70 family members reveal four conserved regions that can be further divided into subregions. This superfamily represents Region 1.1 which modulates DNA binding by region 2 and 4 when sigma is unbound by the core RNA polymerase. Region 1.1 is also involved in promoter binding, it contains a basic patch on its surface which suggests to play an important role in DNA interaction to facilitate open promoter complex formation.
