identifier: InterPro:IPR014718
label: Glycoside hydrolase-type carbohydrate-binding
definition: >-
  This superfamily represents a domain with a distorted supersandwich structure consisting of 18 strands in two sheets, which probably functions to bind carbohydrates in enzymes that act on sugars. Domains with this structure occur in several protein families, including galactose mutarotase ( ); domain 5 of beta-galactosidase ( ); the central domain of hyaluronate lyase-like enzymes, such as chondroitinase AC ( ), chrondroitin ABC lyase I, and hyaluronate lyase ( ) itself; and the N-terminal domain of bacterial glucoamylase ( ) and rhamnogalacturonate lyase ( ).
