identifier: InterPro:IPR038332
label: "PPE superfamily"
definition: >-
  This entry represents the PPE superfamily. This entry also includes ESX-1 secreted protein B (EspB), which is the only member of the PE/PPE family described to date to form higher-order oligomers. It contains PE and PPE domains and a C-terminal domain, which is processed by MycP1 protease during secretion. Once secreted across the inner mycobacterial membrane, EspB oligomerizes into a cylinder-like heptamer through its N-terminal domain that forms channel-like structures, enabling other ESX-1 secreted substrates to pass through and beyond the inner mycobacterial envelope. The human pathogen Mycobacterium tuberculosis harbours a large number of genes that encode proteins whose N-terminals contain the characteristic motifs Pro-Glu (PE) or Pro-Pro-Glu (PPE). These proteins are exported to the bacterial surface via type VII secretion systems known as ESX. A subgroup of the PE proteins contains polymorphic GC-rich sequences (PGRS), while a subgroup of the PPE proteins contains major polymorphic tandem repeats (MPTR). The function of most of these proteins remains unknown. However, the PE_PGRS proteins from Mycobacterium marinum are secreted by components of the ESX-5 system that belongs to the recently defined type VII secretion systems. It has also been reported that the PE_PGRS family of proteins contains multiple calcium-binding and glycine-rich sequence motifs GGXGXD/NXUX. This sequence repeat constitutes a calcium-binding parallel β-roll or parallel β-helix structure and is found in RTX toxins secreted by many Gram-negative bacteria. PPE51 member has been described as a small molecule-selective channel required for the uptake of nutrients across the outer mycomembrane. This protein transports glycerol and glucose as well as maltose and lactose disaccharides. It is invo…
