label: "DHBP synthase RibB-like alpha/beta domain superfamily"
definition: >-
  This superfamily represents a structural domain consisting of segregated alpha and beta regions in 3-layers. Homologous domains with this structure are found in: 3,4-dihydroxy-2-butanone 4-phosphate synthase (DHBP synthase) (RibB) A family of eukaryotic and prokaryotic hypothetical proteins that includes YrdC and YciO from Escherichia coli and MTH1692 from the archaea Methanothermobacter thermautotrophicus (Methanobacterium thermoformicicum) DHBP synthase RibB catalyses the conversion of D-ribulose 5-phosphate to formate and 3,4-dihydroxy-2-butanone 4-phosphate, the latter serving as the biosynthetic precursor for the xylene ring of riboflavin. In Photobacterium leiognathi, the riboflavin synthesis genes ribB (DHBP synthase), ribE (riboflavin synthase), ribH (lumazone synthase) and ribA (GTP cyclohydrolase II) all reside in the lux operon. RibB is sometimes found as a bifunctional enzyme with GTP cyclohydrolase II that catalyses the first committed step in the biosynthesis of riboflavin. No sequences with significant homology to DHBP synthase are found in the metazoa. The YrdC family of hypothetical proteins are widely distributed in eukaryotes and prokaryotes and occur as: (i) independent proteins, (ii) with C-terminal extensions, and (iii) as domains in larger proteins, some of which are implicated in regulation. YrdC from Escherichia coli preferentially binds to double-stranded RNA and DNA. YrdC is predicted to be an rRNA maturation factor, as deletions in its gene lead to immature ribosomal 30S subunits and, consequently, fewer translating ribosomes. Therefore, YrdC may function by keeping an rRNA structure needed for proper processing of 16S rRNA, especially at lower temperatures. Threonylcarbamoyl-AMP synthase (Sua5) is an example of a multi-domain protei…
