identifier: InterPro:IPR042072
label: "DsrC-like protein, C-terminal domain"
definition: >-
  This superfamily includes TusE, a partner to TusBCD in a sulphur relay system for 2-thiouridine biosynthesis, a tRNA base modification process. Other members are DsrC, a functionally similar protein in species where the sulphur relay system exists primarily for sulphur metabolism, rather than tRNA base modification. Some members of this superfamily are known explicitly as the gamma subunit of sulphite reductases. This superfamily represents the C-terminal domain found in DsrC and TusE proteins. It consists of 4 α helices.
