identifier: InterPro:IPR037157
label: "UDP-N-acetylglucosamine O-acyltransferase, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal domain superfamily of UDP-N-acetylglucosamine acyltransferase. This enzyme is a zinc-dependent enzyme that catalyses the deacetylation of UDP-3-O-((R)-3-hydroxymyristoyl)-N-acetylglucosamine to form UDP-3-O-(R-hydroxymyristoyl)glucosamine and acetate.
