identifier: InterPro:IPR042296
label: "tRNA methyltransferase, Trm1, C-terminal"
definition: >-
  Trm1 ( ) dimethylates a single guanine residue at position 26 of a number of tRNAs using S-adenosyl-L-methionine as donor of the methyl groups. In Saccharomyces cerevisiae, Trm1 is required for the modification of both mitochondrial and cytoplasmic tRNAs. This family also includes the related TRMT1-like protein from Mus musculus, which may play a role in motor coordination and exploratory behaviour, and similar mammal sequences. This superfamily represents the C terminus of Trm1. This domain is characterised by the presence zinc-cysteine cluster where a zinc atom is bound to four cysteine residues and functions as a structural element that holds the tRNA-binding site between the N- and C-terminal domains.
