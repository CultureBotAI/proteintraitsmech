identifier: InterPro:IPR023407
label: "Small ribosomal subunit protein eS27, zinc-binding domain superfamily"
definition: >-
  This superfamily represents a domain found in the zinc-binding ribosomal protein eS27 (previously known as S27). It consists of a β-sandwich of two three-stranded sheets. This a novel fold due to the uniqueness of the strands arrangement.
