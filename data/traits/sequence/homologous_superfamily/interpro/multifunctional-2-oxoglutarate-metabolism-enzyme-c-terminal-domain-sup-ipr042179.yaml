identifier: InterPro:IPR042179
label: "Multifunctional 2-oxoglutarate metabolism enzyme, C-terminal domain superfamily"
definition: >-
  The 2-oxoglutarate dehydrogenase (OGDH) multienzyme complex is rate-limiting in the TCA cycle in many species, and is an essential nexus in the utilization of sugar and amino acids, funnelled via 2-oxoglutarate and oxidized to succinyl-CoA, process which releases CO2 and results in the reduction of NAD to NADH. An alternative name for this complex is alpha-ketoglutarate dehydrogenase (KGD). This superfamily represents the C-terminal domain of the multifunctional 2-oxoglutarate metabolism enzyme KGD and related proteins including human DHTKD1.
