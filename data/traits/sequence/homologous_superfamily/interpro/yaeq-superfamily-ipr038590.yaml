identifier: InterPro:IPR038590
label: "YaeQ superfamily"
definition: >-
  Structural studies indicate that YaeQ contains a variation of the PD-(D/E)XK nuclease motif found in various endonucleases and enzymes involved in DNA replication, repair, and recombination. This structure, and the high degree of sequence conservation amongst YaeQ and its homologues, suggest that it may be involved in the remodeling or modification of nucleic acid DNA or RNA structures. YaeQ has an α-β roll fold.
