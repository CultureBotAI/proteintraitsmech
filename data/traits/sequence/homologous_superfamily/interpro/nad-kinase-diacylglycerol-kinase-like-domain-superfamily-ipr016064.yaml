identifier: InterPro:IPR016064
label: "NAD kinase/diacylglycerol kinase-like domain superfamily"
definition: >-
  ATP-NAD kinases ( ) catalyse the phosphorylation of NAD to NADP utilizing ATP and other nucleoside triphosphates as well as inorganic polyphosphate as a source of phosphorus. ATP-NAD kinase contains two domains, where domain 1 has an α/β topology that is related in structure to the N-terminal of phosphofructokinase, and domain 2 has an atypical β-sandwich topology made of four structural repeats of beta(3) units.
