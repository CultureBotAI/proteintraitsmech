identifier: InterPro:IPR038346
label: "DrrA, PI4P binding domain superfamily"
definition: >-
  This superfamily represents a domain which binds phosphatidylinositol 4-phosphate (PtdIns4P or PI4P) lipids on the cytosolic surface of the phagosomal membrane. It is found in Legionella pneumophila DrrA (also known as sidM), a protein involved in the redirection of endoplasmic reticulum-derived vesicles to the Legionella-containing vacuoles (an intracellular replicative organelle) through the recruitment and activation of the host small guanosine triphosphatase (GTPase) Rab1.
