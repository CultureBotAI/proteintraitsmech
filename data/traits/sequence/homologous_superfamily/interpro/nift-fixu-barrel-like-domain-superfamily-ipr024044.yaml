identifier: InterPro:IPR024044
label: "NifT/FixU barrel-like domain superfamily"
definition: >-
  This superfamily represents a barrel-like domain found in bacterial proteins NifT/FixU/MosB. The function of NifT is unknown although it is thought that the protein may be involved in biosynthesis of the FeMo cofactor of nitrogenase, although perturbation of nifT expression in Klebsiella pneumoniae has only a limited effect on nitrogen fixation.
