identifier: InterPro:IPR036511
label: Queuine tRNA-ribosyltransferase-like
definition: >-
  Queuine tRNA-ribosyltransferases, also known as tRNA-guanine transglycosylases (TGT) , modify tRNAs for asparagine, aspartic acid, histidine and tyrosine with queuine at position 34 and with archaeosine at position 15 in archaeal tRNAs. In bacteria it catalyses the exchange of guanine-34 at the wobble position with 7-aminomethyl-7-deazaguanine (preQ1), and subsequently the addition of a cyclopentenediol moiety to 7-aminomethyl-7-deazaguanine-34 tRNA giving a hypermodified base queuine (Q) in the wobble position. In eukaryotes, TGT catalyses the irreversible exchange of guanine in the unmodified tRNA with free queuine. Eukaryotes cannot synthesize queuine de novo and must obtain it from the diet or gut flora. The structure of TGT consists of an irregular (β/α) 8 barrel, represented by this entry, and a C-terminal zinc-containing subdomain. This region is also found in DNA-guanine transglycosylase from Salmonella montevideo, which is involved in the insertion of 7-deazaguanine derivatives in DNA.
