identifier: InterPro:IPR038431
label: "Killer toxin SMK, beta subunit superfamily"
definition: >-
  The killer toxin SMK (salt-mediated killer) from the halotolerant yeast Pichia farinosa acts to kill sensitive strains of yeast. SMK exhibits maximum activity under conditions of acidic pH and high salt concentration. It is composed of two distinct subunits, alpha and beta, which tightly interact with each other under acidic conditions, jointly folding into an ellipsoidal single domain structure belonging to the α/β-sandwich family. SMK assumes a similar folding topology to the fungal killer toxin KP4, forming two left-handed split β/α/β motifs, which is rarely found in other toxins; hence, these toxins may be evolutionarily or functionally related. SMK appears to function by associating with the membranes of sensitive cells.
