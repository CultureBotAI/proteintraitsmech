identifier: InterPro:IPR038676
label: "Photosystem II Psb28, class 1 superfamily"
definition: >-
  This superfamily represents the low molecular weight transmembrane protein Psb28 (PsbW) found in PSII, where it is a subunit of the oxygen-evolving complex. Psb28 appears to have several roles, including guiding PSII biogenesis and assembly, stabilising dimeric PSII, and facilitating PSII repair after photo-inhibition. There appears to be two classes of Psb28, class 1 being found predominantly in algae and cyanobacteria, and class 2 being found predominantly in plants. This entry represents class 1 Psb28.
