identifier: InterPro:IPR043083
label: "Gp27, baseplate hub, domain 3"
definition: >-
  This superfamily represents the domain 3 of the baseplate hub of Gp27. Structurally, this domain consists of 7 anti-parallel β sheets and 1 α helix. Within the baseplate hub of Gp27, this domain forms a torus with domain 1, which has a similar β barrel, comprised of 8 strands. The surface of the barrel is almost entirely hydrophobic, so provides a surface for assembly of the larger baseplate complex.
