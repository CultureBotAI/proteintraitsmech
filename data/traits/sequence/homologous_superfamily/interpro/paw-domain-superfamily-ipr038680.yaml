identifier: InterPro:IPR038680
label: "PAW domain superfamily"
definition: >-
  The PAW domain (present in PNGases and other worm proteins) is found as a single copy at the C terminus of metazoan peptide:N-glycanase (PNGase) and in multiple copies in hypothetical Caenorhabditis elegans proteins peptide:N-glycanases (PNGases). The C-terminal PAW domain of PNGase binds to the mannose moieties of N-linked oligosaccharide chains. The PAW domain is a slightly elongated molecule and displays a β-sandwich architecture, which is composed of two layers, containing nine and eight antiparallel β-strands, respectively, and three additional short helices.
