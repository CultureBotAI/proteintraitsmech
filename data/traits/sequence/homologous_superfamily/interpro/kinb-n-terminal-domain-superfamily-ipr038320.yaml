identifier: InterPro:IPR038320
label: "KinB, N-terminal domain superfamily"
definition: >-
  This entry represents the N-terminal sensor domain of histidine kinase from Pseudomonas species. The domain is the extracellular sensing domain with four helical bundle. It recognises inorganic phosphate.
