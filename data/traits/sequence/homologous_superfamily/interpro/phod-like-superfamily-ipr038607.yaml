identifier: InterPro:IPR038607
label: "PhoD-like superfamily"
definition: >-
  Alkaline phosphatase D (PhoD) catalyses the reaction: phosphate monoester + H(2)O = an alcohol + phosphate. PhoD is similar to Ca(2+)-dependent phospholipase D, which catalyses the hydrolysis of the ester bond between the phosphatidic acid and alcohol moieties of phospholipids.
