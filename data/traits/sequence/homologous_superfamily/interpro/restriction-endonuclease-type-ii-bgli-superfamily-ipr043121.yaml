identifier: InterPro:IPR043121
label: "Restriction endonuclease, type II, BglI superfamily"
definition: >-
  This superfamily represents the homodimeric type II restriction endonuclease BglI. It recognises the interrupted DNA sequence GCCNNNNNGGC and cleaves between the fourth and fifth unspecified base pair to produce 3' overhanging ends.
