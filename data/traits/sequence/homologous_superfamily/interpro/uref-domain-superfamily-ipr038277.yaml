identifier: InterPro:IPR038277
label: "UreF domain superfamily"
definition: >-
  This superfamily represents the urease accessory protein, UreF. The urease enzyme (urea amidohydrolase) hydrolyses urea into ammonia and carbamic acid. UreF is proposed to modulate the activation process of urease by eliminating the binding of nickel irons to noncarbamylated protein.
