identifier: InterPro:IPR038631
label: "Herpesvirus Glycoprotein B, PH-like domain 2 superfamily"
definition: >-
  This entry represents the second PH-like fold domain found in Herpesvirus glycoprotein B. Glycoprotein B is an envelope glycoprotein that plays a role in host cell entry, cell to-cell virus transmission, and fusion of infected cells.
