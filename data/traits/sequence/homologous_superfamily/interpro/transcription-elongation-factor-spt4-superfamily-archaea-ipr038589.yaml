identifier: InterPro:IPR038589
label: "Transcription elongation factor Spt4 superfamily, archaea"
definition: >-
  This entry represents Spt4 from Sulfolobus acidocaldarius (also known as RpoE2) and similar sequences mainly found in archaea. Spt4, of about 64 amino acids, forms a heterodimer with Spt5. The Spt4/5 heterodimer is considered a transcription elongation factor, responsible for making the archaeal DNA-directed RNA polymerase (RNAP) processive. DNA-directed RNA polymerases, also known as DNA-dependent RNA polymerases, are responsible for the polymerisation of ribonucleotides into a sequence complementary to the template DNA. Eukaryotes have three different DNA-directed RNA polymerases (RNAPs), Pol I, II, and III, whereas Archaea and Bacteria have single enzymes. RNAPs are multisubunit enzymes. Archaeal RNAP is closely related to eukaryotic RNAP II, which consists of 12 subunits. Archaeal RNAP has an additional subunit, Rpo13, with no orthologue in the eukaryotic enzyme.
