identifier: InterPro:IPR030190
label: Macrolide export protein MacA, alpha-hairpin domain superfamily
definition: >-
  MacA is part of the MacAB-TolC complex (composed of an inner membrane transporter, MacB, a periplasmic membrane fusion protein, MacA, and an outer membrane component, TolC), which is a tripartite macrolide efflux transporter driven by hydrolysis of ATP. MacA interacts with MacB and TolC. MacA can bind rough-core lipopolysaccharide (R-LPS) specifically and with high affinity, suggesting that the complex could also transport R-LPS or a similar glycolipid. Its protein structure has been solved. This entry represents the α-hairpin of MacA, which is implicated to bind to TolC.
