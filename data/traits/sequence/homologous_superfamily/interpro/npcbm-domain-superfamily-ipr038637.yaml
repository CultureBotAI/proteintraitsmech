identifier: InterPro:IPR038637
label: "NPCBM domain superfamily"
definition: >-
  The novel putative carbohydrate binding module (NPCBM) domain, also known as NEW2, is found at the N terminus of glycosyl hydrolase family 98 (GH98) and at the C terminus of several proteins. NPCBM plays a role in the recognition of host glycans by pathogenic bacteria, in the context of either pathogenesis or colonisation, and in the recognition of environmental glycans, perhaps in the classical CBM role of plant cell wall degradation. GH98 from C. perfringens specifically hydrolyses fucose-containing trisaccharides from the glycotopes of blood groups A and B and is implicated in the infectivity and virulence of this pathogen.
