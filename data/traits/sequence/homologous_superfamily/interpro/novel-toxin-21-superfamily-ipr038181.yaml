identifier: InterPro:IPR038181
label: "Novel toxin 21 superfamily"
definition: >-
  This entry represents an RNase toxin found in bacterial polymorphic toxin systems that is proposed to adopt the BECR (Barnase-EndoU-ColicinE5/D-RelE) fold, with two conserved lysine residues and [DS]xDxxxH, RxG[ST] and RxxD motifs. In bacterial polymorphic toxin systems, the toxin is usually exported by the type 2, type 4, type 5 or type 7 secretion system. This is also referred to as the E. cloacae CdiAC and has been shown to target tRNAs. The CdiAC proteins carry a variety of sequence-diverse C-terminal domains, which represent a collection of distinct toxins. Many CdiA-CT toxins have nuclease activities. In accord with the structural homology, CdiA-CT cleaves 16S rRNA at the same site as colicin E3 and this nuclease activity is responsible for growth inhibition. These toxins are composed of three domains, each responsible for a distinct step in the cell-killing pathway. The central domain binds specific receptors on the surface of susceptible bacteria, the N-terminal domain mediates translocation across the cell envelope, and the C-terminal domain carries the bacteriocidal activity. This modular structure allows for delivery of diverse C-terminal toxins using conserved translocation and receptor-binding domains.
