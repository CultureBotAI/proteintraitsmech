identifier: InterPro:IPR037278
label: "ARFGAP/RecO-like, zinc finger superfamily"
definition: >-
  The ARFGAP domain was first identified in the cell cycle control GTPase activating protein (GAP) GCS1. GCS1 is important for the inactivation of the ADP ribosylation factor ARF a member of the Ras superfamily of GTP-binding proteins. GTP-bound form of ARF is essential for the maintenance of normal Golgi morphology, it participates in recruitment of coat proteins which are required for budding and fission of membranes. Before the fusion with an acceptor compartment the membrane must be uncoated. This step required the hydrolysis of GTP associated to ARF, a process dependent on the ARFGAP domain of GCS1. The ARFGAP domain contains a characteristic zinc finger motif (Cys-x2-Cys-x(16,17)-Cys-x2-Cys) which displays some similarity to the C4-type GATA zinc finger. The ARFGAP domain display no obvious similarity to other GAP proteins. However a C4-type zinc finger is also found in the ARD1 GAP domain. RecO is a DNA repair protein involved in damage avoidance-tolerance pathway(s).
