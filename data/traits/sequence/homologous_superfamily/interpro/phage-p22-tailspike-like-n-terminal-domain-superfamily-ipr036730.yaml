identifier: InterPro:IPR036730
label: "Phage P22 tailspike-like, N-terminal domain superfamily"
definition: >-
  The tailspike protein of Salmonella bacteriophage P22 is a viral adhesion protein that mediates attachment of the viral protein to host cell-surface lipopolysaccharide. The tailspike protein displays both receptor binding and destroying properties, inactivating the receptor by endoglycosidase activity. The N-terminal, head-binding domain mediates the non-covalent attachment of the six homotrimeric tailspike molecules to the DNA injection apparatus. The N-terminal domain of the P22 tailspike protein shows significant sequence similarity to the N-terminal domain of the Shigella phage Sf6 tailspike protein.
