identifier: InterPro:IPR037210
label: "YoaC-like superfamily"
definition: >-
  This superfamily consist of the hypothetical bacterial protein YoaC. Its structure is composed of five helices arranged in bundle, it has one crossover connection and the arrangement of the first four helices is similar to the KaiA/RbsU domain fold ( ).
