identifier: InterPro:IPR036566
label: Pyrimidine nucleoside phosphorylase-like, C-terminal domain superfamily
definition: >-
  This domain superfamily is found at the C-terminal end of the large α/β domain making up various pyrimidine nucleoside phosphorylases. It has slightly different conformations in different members of this family. For example, in pyrimidine nucleoside phosphorylase (PYNP, ) there is an added three-stranded antiparallel β sheet as compared to other members of the family, such as Escherichia coli thymidine phosphorylase (TP, ). The domain contains an α/β hammerhead fold and residues in this domain seem to be important in formation of the homodimer.
