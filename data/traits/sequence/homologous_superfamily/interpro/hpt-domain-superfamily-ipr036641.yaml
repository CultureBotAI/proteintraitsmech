identifier: InterPro:IPR036641
label: HPT domain superfamily
definition: >-
  This superfamily represents a domain present at the N terminus in proteins which undergo autophosphorylation. The group includes histidine kinases such as CheA from Escherichia coli, the gliding motility regulatory protein from Myxococcus xanthus, and a number of bacterial chemotaxis proteins. Signal transducing histidine kinases are the key elements in two-component signal transduction systems, which control complex processes such as the initiation of development in microorganisms. Examples of histidine kinases are EnvZ, which plays a central role in osmoregulation, and CheA, which plays a central role in the chemotaxis system. Histidine kinases usually have an N-terminal ligand-binding domain and a C-terminal kinase domain, but other domains may also be present. The kinase domain is responsible for the autophosphorylation of the histidine with ATP, the phosphotransfer from the kinase to an aspartate of the response regulator, and (with bifunctional enzymes) the phosphotransfer from aspartyl phosphate back to ADP or to water. The kinase core has a unique fold, distinct from that of the Ser/Thr/Tyr kinase superfamily. Two-component signal transduction systems enable bacteria to sense, respond, and adapt to a wide range of environments, stressors, and growth conditions. Some bacteria can contain up to as many as 200 two-component systems that need tight regulation to prevent unwanted cross-talk. These pathways have been adapted to response to a wide variety of stimuli, including nutrients, cellular redox state, changes in osmolarity, quorum signals, antibiotics, and more. Two-component systems are comprised of a sensor histidine kinase (HK) and its cognate response regulator (RR). The HK catalyses its own auto-phosphorylation followed by the transfer of the phosphoryl g…
