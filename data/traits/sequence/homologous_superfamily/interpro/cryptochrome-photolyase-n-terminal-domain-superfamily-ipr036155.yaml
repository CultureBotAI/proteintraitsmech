identifier: InterPro:IPR036155
label: "Cryptochrome/photolyase, N-terminal domain superfamily"
definition: >-
  This entry represents the photolyase/cryptochrome α/β domain superfamily. It adopts a dinucleotide binding fold with a five-stranded parallel β sheet flanked on both sides by α helices. The photolyase/cryptochrome family consists of flavoproteins that perform various functions using blue-light photons as an energie source. It is present in all three domains of life, that is, archaea, eubacteria, and eukaryotes, and hence has arisen very early during evolution to protect genomes against the genotoxic effects of ultraviolet light originating from the sun. The photolyase/cryptochrome family is divided into two major groups: photolyases and cryptochromes. Photolyases repair cytotoxic and mutagenic UV-induced photolesions in DNA in many species from bacteria to plants and animals by using a light-dependent repair mechanism. It involves light absorption, electron transfer from an excited reduced and deprotanated FADH(-) to the flipped-out photolesion, followed by the fragmentation of the photolesions. Cryptochromes are highly related proteins that generally no longer repair damaged DNA, but function as photoreceptors. Cryptochromes regulate growth and development in plants and the circadian clock in animals. Both photolyases and cryptochromes have a bilobal architecture consisting of two domains: an N-terminal α/β domain that may contain a light- harvesting chromophore to additionally broaden their activity spectra and a C- terminal α-helical catalytic domain comprising the light-sensitive FAD cofactor. Diverse classes of antenna chromophores likes 5,10- methenyltetrahydrofolate (MTHF), 8-hydroxydeazaflavin, FMN or FAD have been identified in some photolyase/cryptochrome to broaden their activity spectra, whereas many others apparently lack any bound antenna chromophores.
