identifier: InterPro:IPR042504
label: "E2 regulatory, transactivation domain, subdomain 2"
definition: >-
  This superfamily represents the second of two subdomains within the N-terminal or transactivation domain of E2. E2 is an early regulatory protein found in the dsDNA papillomaviruses. E2 regulates viral transcription and DNA replication. It binds to the E2RE response element (5'-ACCNNNNNNGGT-3') present in multiple copies in the regulatory region. It can either activate or repress transcription, depending on E2RE's position with regard to proximal promoter elements. Repression occurs by sterically hindering the assembly of the transcription initiation complex. The E1-E2 dimer complex binds to the origin of DNA replication.
