identifier: InterPro:IPR036496
label: "Cathepsin C, exclusion domain superfamily"
definition: >-
  Cathepsin C (dipeptidyl peptidase I) is the physiological activator of a group of serine proteases. This protein corresponds to the exclusion domain whose structure excludes the approach of a polypeptide apart from its termini and confers its exopeptidase specificity. It forms an enclosed β barrel structure composed from 8 anti-parallel β strands. Based on a structural comparison and interaction data, it is suggested that the exclusion domain originates from a metallo-protease inhibitor.
