identifier: InterPro:IPR038417
label: "Alpha-galactosidase, N-terminal domain superfamily"
definition: >-
  This domain is found at the N terminus of many alpha-galactosidases (Aga), members of the glycoside hydrolase family 36. The Aga protomer is compact and folds into three domains: N-terminal, catalytic, and C-terminal domains. The N-terminal domain presents a β-supersandwich fold with 20 β-strands and four antiparallel β-sheets.
