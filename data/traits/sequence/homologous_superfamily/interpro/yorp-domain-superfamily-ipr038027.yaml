identifier: InterPro:IPR038027
label: "YorP domain superfamily"
definition: >-
  YorP is a 71 residue protein found in bacteria. As it is also found in a bacteriophage it might be of viral origin. The structure is of an α helix between two of five β strands. The function is unknown.
