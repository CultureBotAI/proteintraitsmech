identifier: InterPro:IPR011060
label: "Ribulose-phosphate binding barrel"
definition: >-
  The ribulose-phosphate binding barrel consists of a parallel β-sheet barrel fold containing a phosphate-binding site. Several proteins display this fold, including 1-(5-phosphoribosyl)-5-[(5-phosphoribosylamino)methylideneamino] imidazole-4-carboxamide isomerase, histidine biosynthesis enzymes, tryptophan biosynthesis enzymes, D-ribulose-5-phosphate 3-epimerase, and decarboxylases.
