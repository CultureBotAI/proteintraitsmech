identifier: InterPro:IPR038274
label: "Atg6/Beclin C-terminal domain superfamily"
definition: >-
  In yeasts, vacuolar protein sorting-associated protein 30 (Vps30), also known as autophagy-related protein 6 (Atg6), is a common component of two distinct phosphatidylinositol 3-kinase complexes. In complex I, Atg14 links Vps30 to Vps34 lipid kinase and plays a specific role in autophagy, while in complex II, Vps38 links Vps30 to Vps34 and plays an important role in vacuolar protein sorting. The C-terminal of Vps30 contains a globular fold comprised of three β-sheet-α-helix repeats (also known as β-α repeated, autophagy-specific (BARA) domain) and is required for autophagy through the targeting of complex I to the pre-autophagosomal structure. The N-terminal of Vps30 is required for vacuolar protein sorting.
