identifier: InterPro:IPR011338
label: Restriction endonuclease, type II, BamHI/BglIII/BstY
definition: >-
  Restriction endonucleases BamHI, BglII, BstYI and OkrAI share a strong structural consensus mapping to the α/β core domain, represented by this superfamily. BamHI recognises the DNA sequence GGATCC and cleaves after G-1, BglII recognises AGATCT and cleaves after A-1, BstYI recognises RGATCY and cleaves after the purine R and OkrAI recognises the double-stranded sequence 5'-GGATCC-3' and cleaves after G-1.
