identifier: InterPro:IPR053713
label: "Bacterial Outer Membrane Channel Superfamily"
definition: >-
  This superfamily of proteins includes outer membrane channel proteins that facilitate the transport of specific solutes across the bacterial outer membrane. Members of this superfamily are involved in the uptake of compounds such as N-acetylneuraminic acid, small sugars, and oligogalacturonides, which are essential for bacterial nutrition and virulence. These proteins can form high-conductance channels with varying selectivity, including weak anion selectivity, and are known to operate at low membrane potentials. Some members may also play a role in bacterial signal transduction pathways.
