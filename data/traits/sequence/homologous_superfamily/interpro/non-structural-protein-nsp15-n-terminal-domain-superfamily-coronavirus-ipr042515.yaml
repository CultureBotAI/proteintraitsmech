identifier: InterPro:IPR042515
label: "Non-structural protein NSP15, N-terminal domain superfamily, coronavirus"
definition: >-
  This superfamily represents the N-terminal oligomerization domain of NSP15, which is an uridine-specific endonuclease. This domain stabilises the hexamer and is critical for its formation. Structurally, this domain consists of 2 small α-helices and 3 β-strands. The unique coronavirus transcription/replication machinery comprised of multiple virus-encoded non structural proteins (NSP) plays a vital role during initial and intermediate phases of the viral life cycle. NSP15 forms a hexamer made of dimers of trimers which is suggested to be a functional unit, responsible for the endoribonuclease activity. The NSP15 monomer consists of three domains: N-terminal, middle and C-terminal. The catalytic function of NSP15 resides in the C-terminal NendoU domain. The active site carries six key residues conserved among SARS-CoV-2, SARS-CoV and MERS-CoV, suggesting that its activity is important for sustained replication in the host.
