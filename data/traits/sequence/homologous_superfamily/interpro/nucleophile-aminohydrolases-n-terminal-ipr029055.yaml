identifier: InterPro:IPR029055
label: "Nucleophile aminohydrolases, N-terminal"
definition: >-
  The N-terminal of the nucleophile aminohydrolase (Ntn hydrolases) provides two catalytic groups, nucleophile and proton donor. Ntn hydrolases use the side chain of the amino-terminal residue, incorporated in a β-sheet, as the nucleophile in the catalytic attack at the carbonyl carbon. The nucleophile is cysteine in GAT, serine in penicillin acylase, and threonine in the proteasome. All the enzymes share an unusual fold in which the nucleophile and other catalytic groups occupy equivalent sites. This fold provides both the capacity for nucleophilic attack and the possibility of autocatalytic processing. Some nucleophile aminohydrolases include: ATP-dependent protease subunit HslV Glutamine--fructose-6-phosphate aminotransferase [isomerizing] Proteasome subunits Amidophosphoribosyltransferase Related proteins
