identifier: InterPro:IPR038418
label: "6-pyruvoyl tetrahydropterin synthase/QueD superfamily"
definition: >-
  6-Pyruvoyl tetrahydrobiopterin synthase (PTPS) catalyses the conversion of dihydroneopterin triphosphate to 6-pyruvoyl tetrahydropterin, the second of three enzymatic steps in the synthesis of tetrahydrobiopterin from GTP. The functional enzyme is a hexamer of identical subunits. A transition metal binding site formed by the three histidine residues 23, 48 and 50 is present in each subunit, and bound Zn(II) is responsible for the enzymatic activity. Site-directed mutagenesis of each of these three histidine residues results in a complete loss of metal binding and enzymatic activity. Member this entry is also 6-carboxy-5,6,7,8-tetrahydropterin synthase (QueD) that catalyses the conversion of 7,8-dihydroneopterin triphosphate (H2NTP) to 6-carboxy-5,6,7,8-tetrahydropterin (CPH4) and acetaldehyde.
