identifier: InterPro:IPR038615
label: "Pichia pastoris 6-phosphofructokinase, gamma subunit superfamily"
definition: >-
  Pichia pastoris 6-phosphofructokinase (PpPfk or PFK3) is the most complex and probably largest (1 MDa) eukaryotic Pfk. It forms a dodecamer of four α-β-γ trimers. The gamma subunit is unique, in contrast to other eukaryotic ATP-dependent 6-phosphofructokinases, and participates in oligomerization of the alpha and beta chains. It is not essential for enzymatic activity, but it modulates the allosteric behavior of the enzyme.
