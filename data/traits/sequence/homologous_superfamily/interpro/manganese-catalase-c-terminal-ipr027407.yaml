identifier: InterPro:IPR027407
label: "Manganese catalase, C-terminal"
definition: >-
  This superfamily represents a C-terminal domain found in a number of non-haem Manganese-catalases, which are found in several bacterial species. The domain lies the C-terminal to the four-helix bundle catalytically active domain.
