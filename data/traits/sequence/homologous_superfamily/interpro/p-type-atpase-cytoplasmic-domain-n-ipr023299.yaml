identifier: InterPro:IPR023299
label: P-type ATPase, cytoplasmic domain N
definition: >-
  This superfamily represents the cytoplasmic domain N found in P-type ATPases. The cytoplasmic loops of the P-type ATPases form three separate modules, commonly named the A, P and N-domains. The N-domain comprises the nucleotide binding site. This domain forms a seven-stranded antiparallel β-sheet with two additional β-strands forming a hairpin and five α-helices. P-ATPases (also known as E1-E2 ATPases) are found in bacteria and in a number of eukaryotic plasma membranes and organelles. P-ATPases function to transport a variety of different compounds, including ions and phospholipids, across a membrane using ATP hydrolysis for energy. There are many different classes of P-ATPases, which transport specific types of ion: H + , Na + , K + , Mg 2+ , Ca 2+ , Ag + and Ag 2+ , Zn 2+ , Co 2+ , Pb 2+ , Ni 2+ , Cd 2+ , Cu + and Cu 2+. P-ATPases can be composed of one or two polypeptides, and can usually assume two main conformations called E1 and E2.
