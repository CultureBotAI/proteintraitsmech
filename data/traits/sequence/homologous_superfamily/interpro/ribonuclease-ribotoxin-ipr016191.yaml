identifier: InterPro:IPR016191
label: Ribonuclease/ribotoxin
definition: >-
  This entry represents a structural domain consisting of a single helix packed against anti-parallel β-sheet, which is found in both bacterial and fungal ribonucleases, as well as in ribotoxins such as restrictocin and alpha-sarcin.
