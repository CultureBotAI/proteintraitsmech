identifier: InterPro:IPR038287
label: "Cse2 superfamily"
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This superfamily represents Cse2 of Cas proteins, a novel family of endoribonucleases that cleaves single-stranded RNAs preferentially within U-rich regions, including Cse2 from Thermus thermophilus. These proteins are found in the CRISPR/Cas subtype Ecoli regions of many bacteria (most of which are mesophiles), and not in Archaea. This is also known as Cse2 Type I-E.
