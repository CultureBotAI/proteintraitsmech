identifier: InterPro:IPR014717
label: "Translation elongation factor EF1B/small ribosomal subunit protein bS6"
definition: >-
  An α+β sandwich domain with a Ferredoxin-like fold can be found in the beta chain of the translation elongation factor EF1B, and in the small ribosomal subunit protein bS6 (ribosomal protein S6). Elongation factor EF1B (also known as EF-Ts or EF-1beta/gamma/delta) is a nucleotide exchange factor that is required to regenerate EF1A from its inactive form (EF1A-GDP) to its active form (EF1A-GTP). EF1A is then ready to interact with a new aminoacyl-tRNA to begin the cycle again. EF1B is more complex in eukaryotes than in bacteria, and can consist of three subunits: EF1B-alpha (or EF-1beta), EF1B-gamma (or EF-1gamma) and EF1B-beta (or EF-1delta).
