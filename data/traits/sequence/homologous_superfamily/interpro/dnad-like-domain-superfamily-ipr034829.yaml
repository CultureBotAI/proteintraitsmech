identifier: InterPro:IPR034829
label: "DnaD-like domain superfamily"
definition: >-
  This superfamily represents a domain found in several bacterial replication initiation and membrane attachment proteins, DnaD. The DnaD protein is a component of the PriA primosome. The PriA primosome functions to recruit the replication fork helicase onto the DNA. Members, both chromosomal or phage-associated, are found in the Bacillus/Clostridium group of Gram-positive bacteria. DnaD consists of two domains with distinct activities: an N-terminal domain with oligomerisation activity and a C-terminal domain with DNA-binding activity and a second DNA-induced oligomerisation activity.
