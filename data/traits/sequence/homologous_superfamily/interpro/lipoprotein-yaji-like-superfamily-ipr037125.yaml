identifier: InterPro:IPR037125
label: "Lipoprotein YajI-like superfamily"
definition: >-
  This entry represents a domain superfamily found in a group of bacterial lipoproteins, such as YajI from Escherichia coli or SadB from Salmonella typhimurium. SadB is required for proper surface expression of the autotransporter adhesin SadA.
