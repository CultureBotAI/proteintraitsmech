identifier: InterPro:IPR035924
label: "FlaG-like superfamily"
definition: >-
  This entry includes protein FlaG (encoded from the flagellin locus) and an uncharacterised protein, YvyC, whose structure has been solved. In Aeromonas caviae, mutation of FlaG does not affect motility but does significantly reduce the level of its adherence to HEp-2 cells.
