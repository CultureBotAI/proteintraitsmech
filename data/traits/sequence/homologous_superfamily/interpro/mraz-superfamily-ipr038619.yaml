identifier: InterPro:IPR038619
label: "MraZ superfamily"
definition: >-
  The gene encoding MraZ is often found with other genes of the dcw (division cell wall) gene cluster, including mraW, ftsI, murE, murF, ftsW, murG, etc. In E. coli, MraZ is a DNA-binding transcription factor. It acts as a repressor of Pmra, which is a promoter for mraZ and mraW. It also regulates the expression of genes outside the dcw cluster. Overproduction of Escherichia coli MraZ inhibits cell division.
