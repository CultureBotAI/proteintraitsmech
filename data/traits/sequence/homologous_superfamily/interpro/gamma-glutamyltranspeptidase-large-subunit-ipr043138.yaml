identifier: InterPro:IPR043138
label: "Gamma-glutamyltranspeptidase, large subunit"
definition: >-
  This entry represents the large subunit found in GGT. Gamma-glutamyltranspeptidase (GGT) is a heterodimeric enzyme that is generated from the precursor protein through post-translational processing, and catalyses the hydrolysis of gamma-glutamyl bonds in gamma-glutamyl compounds. GGT has a stacked α-β-β-α fold comprising the large and small subunits, similar to the folds seen in members of the N-terminal nucleophile hydrolase superfamily.
