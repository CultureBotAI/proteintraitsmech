identifier: InterPro:IPR011335
label: "Restriction endonuclease type II-like"
definition: >-
  This superfamily represents the core structure found in most type II restriction endonucleases, consisting of a 3-layer α/β/α topology with mixed β-sheets. This core structure can be found in the restriction endonucleases EcoRI, EcoRV, BamHI, BglI, BglII, BstyI, PvuII, MunI, NseI, NgoIV, BsobI, HincII, MspI, FokI (C-terminal), EcoO109IR, as well as in lamba exonuclease, DNA mismatch repair protein MutH, VSR (very short repair) endonucleases, TnsA endonucleases (N-terminal), endonucleases I (Holliday junction resolvase), Hjc-like enzymes, XPF/Rad1/Mus81 nucleases, RecB and RecC exodeoxyribonuclease V (C-terminal), and RecU-like enzymes. Type II restriction endonucleases ( ) are components of prokaryotic DNA restriction-modification mechanisms that protect the organism against invading foreign DNA. These site-specific deoxyribonucleases catalyse the endonucleolytic cleavage of DNA to give specific double-stranded fragments with terminal 5'-phosphates. Of the 3000 restriction endonucleases that have been characterised, most are homodimeric or tetrameric enzymes that cleave target DNA at sequence-specific sites close to the recognition site. For homodimeric enzymes, the recognition site is usually a palindromic sequence 4-8 bp in length. Most enzymes require magnesium ions as a cofactor for catalysis. Although they can vary in their mode of recognition, many restriction endonucleases share a similar structural core comprising four β-strands and one α-helix, as well as a similar mechanism of cleavage, suggesting a common ancestral origin. However, there is still considerable diversity amongst restriction endonucleases. The target site recognition process triggers large conformational changes of the enzyme and the target DNA, leading to the activation of the catalytic centre…
