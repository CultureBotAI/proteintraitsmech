identifier: InterPro:IPR043096
label: "Poxvirus mRNA capping enzyme, small subunit superfamily"
definition: >-
  This superfamily represents the small subunit of the poxvirus mRNA capping enzyme. Its structure suggests that it started as an RNA cap 2-prime O-methyltransferase, subsequently evolving to a catalytically inactive form that has been retained in order to help stabilise the large subunit, D1, and to enhance its methyltransferase activity through an allosteric mechanism.
