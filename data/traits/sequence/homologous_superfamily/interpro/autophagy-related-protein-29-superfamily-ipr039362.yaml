identifier: InterPro:IPR039362
label: "Autophagy-related protein 29 superfamily"
definition: >-
  Autophagy-related (Atg) proteins play a role in autophagy. Atg29 forms a complex with Atg17 and Atg31. When autophagy is initiated, the Atg17-Atg31-Atg29 complex is first targeted to the phagophore assembly site (PAS) and then recruits other Atg proteins. The complex is recruited to the PAS by Atg11. Atg29 contains an N-terminal functional domain, whereas the C terminus plays a regulatory role. Phosphorylation of the C-terminal domain of Atg29 is required for its interaction with Atg11 and proper PAS localization. The tertiary structure of Atg29 (within the Atg17-Atg29-Atg31 subcomplex) has been determined in part, showing a central three-helix bundle.
