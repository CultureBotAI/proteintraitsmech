identifier: InterPro:IPR035961
label: "Rhabdovirus nucleoprotein-like"
definition: >-
  The Nucleocapsid (N) Protein is said to have a 'tight' structure. The carboxyl end of the N-terminal domain possesses an RNA binding domain. Sequence alignments show 2 regions of reasonable conservation, approx. 64-103 and 201-329. A whole functional protein is required for encapsidation to take place.
