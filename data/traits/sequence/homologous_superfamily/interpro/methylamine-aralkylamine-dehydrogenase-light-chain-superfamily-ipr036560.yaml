identifier: InterPro:IPR036560
label: Methylamine/Aralkylamine dehydrogenase light chain superfamily
definition: >-
  Aralkylamine dehydrogenase light chain and methylamine dehydrogenase light chain are aromatic amine dehydrogenases that form heterotetramers with their respective heavy chains, and catalyse the oxidative deamination of amines to their corresponding aldehydes. The light subunit possesses an apparent Tat signal peptide. This subunit is dominated by β structure.
