identifier: InterPro:IPR036416
label: Peptidyl-tRNA hydrolase superfamily
definition: >-
  Peptidyl-tRNA hydrolase (PTH) is a bacterial enzyme that cleaves peptidyl-tRNA or N-acyl-aminoacyl-tRNA to yield free peptides or N-acyl-amino acids and tRNA. The natural substrate for this enzyme may be peptidyl-tRNA which drop off the ribosome during protein synthesis. Bacterial PTH has been found to be evolutionary related to a yeast protein. This enzyme is interesting as a potential target for the discovery of new antimicrobial agents as it is critical for the viability of bacteria [ }. It folds into a single α/β globular domain with seven β-strands forming a twisted mixed central β-sheet, surrounded by a total of six helices. This group also contains chloroplast RNA splicing 2 (CRS2), which is closely related nuclear-encoded protein required for the splicing of nine group II introns in chloroplasts. The structure of hydrolases consists of three layers (α/β/α) with mixed sheets of five strands where the strand 4 is antiparallel to the rest, and contains crossover loops.
