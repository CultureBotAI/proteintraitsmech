identifier: InterPro:IPR036990
label: "Metallocarboxypeptidase-like, propeptide"
definition: >-
  The peptidases are synthesised as inactive molecules, zymogens, with propeptides that must be removed by proteolytic cleavage to activate the enzyme. Structural studies of carboxypeptidases A and B reveal the propeptide to exist as a globular domain, followed by an extended α-helix; this shields the catalytic site, without specifically binding to it, while the substrate-binding site is blocked by making specific contacts. This entry represents a propeptide associated with peptidases belonging to MEROPS peptidase family M14A. It is found in the carboxypeptidases A and B, and in fungal putative metallocarboxypeptidase Ecm14.
