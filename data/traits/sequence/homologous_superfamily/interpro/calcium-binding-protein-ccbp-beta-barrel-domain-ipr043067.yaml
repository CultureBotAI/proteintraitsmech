identifier: InterPro:IPR043067
label: "Calcium binding protein CcbP, beta-barrel domain"
definition: >-
  This superfamily represents a domain of 5 anti-parallel β strands arranged into a β-barrel from the calcium-binding protein CcbP. The 2nd and 3rd strands are linked by a short 3(10)-helix. The 4th and 5th strands are also linked by a short 3(10)-helix. CcbP is a Ca(2+) binding protein found in bacteria which is thought to bind Ca(2+) by protein surface charge. When bound to Ca(2+), the protein becomes more compact and the level of free calcium decreases. Within the bacteria, Ca(2+) has a role in the early stages of heterocyst differentiation. The free Ca(2+) concentration which is regulated by CcbP is critical for the differentiation process. Calcium signalling is widespread in bacterial species, and prokaryotic cells like eukaryotes are equipped with all the elements to maintain Ca2+ homeostasis.
