identifier: InterPro:IPR038384
label: "Formate dehydrogenase, C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal transmembrane domain of formate dehydrogenase. The transmembrane domain of the beta subunit of formate dehydrogenase consists of a single transmembrane helix. This domain acts as a transmembrane anchor, allowing the conduction of electrons within the protein.
