identifier: InterPro:IPR035977
label: Large ribosomal subunit protein bL36 superfamily
definition: >-
  Ribosomal protein bL36 (also known as L36) is the smallest protein from the large subunit of the prokaryotic ribosome. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities can be grouped into: bacterial L36; algal and plant chloroplast L36; Cyanelle L36; fungal and animal L36. L36 is a small basic and cysteine-rich protein of around 40 amino-acid residues probably involved in late assembly of the 50S particle, in vitro translation and cell growth. This protein shows a zinc-binding CxxC motif. Its paralogue encoded by ykgO (as named in Escherichia coli), lacks the zinc-binding site and replaces RpmJ when zinc availability is low. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of…
