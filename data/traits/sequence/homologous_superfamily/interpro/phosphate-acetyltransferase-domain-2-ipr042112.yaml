identifier: InterPro:IPR042112
label: "Phosphate acetyltransferase, domain 2"
definition: >-
  This superfamily represents the domain 2 found in phosphate acetyltransferase. Phosphotransacetylase catalyses reversible transfer of the acetyl group from acetyl phosphate to coenzyme A (CoA), forming acetyl-CoA and inorganic phosphate. The Phosphotransacetylase enzyme is composed of six monomers per asymmetric unit. Each monomer has an α/β structure and consists of two domains (I and II). Domain I forms an α-β-α structure, with a strictly parallel five-stranded β-sheet in the middle 'sandwiched' by α-helices on each side. It contains the N- and C-terminal segments, a lactate dehydrogenase (LDH)-like nucleotide-binding fold (Rossmann fold), and a helical subdomain consisting of four α-helices. Domain II also adopts a typical α-β-α sandwich structure with a mixed six-stranded β-sheet that is embraced by three helices on one side and two helices on the other side. The two domains are separated by a distinct cleft.
