identifier: InterPro:IPR011249
label: Metalloenzyme, LuxS/M16 peptidase-like
definition: >-
  This entry represents domains with a two-layer α/β structure found in metalloenzymes such as LuxS (S-ribosylhomocysteinase; ) and metallopeptidases belonging to MEROPS peptidase family M16. These domains share the same active site motif of HxxEH located in the first core helix but differ in one of the metal-binding residues. LuxS, the AI-2 (autoinducer-2)-producing enzyme for quorum sensing in bacteria, is a homodimeric iron-dependent metalloenzyme containing two identical tetrahedral metal-binding sites similar to those found in peptidases and amidases, although it contains an extra N-terminal strand. Some M16 family metallopeptidases, such as mitochondrial processing peptidase (MPP), share the same common fold elaborated with many extra additional structures. These peptidases usually contain a duplication of this domain, although only the N-terminal domain binds the catalytic metal. Domains found in metallopeptidases and non-peptidase homologues belonging to MEROPS peptidase family M16 (clan ME), subfamilies M16A, M16B and M16C; include: Insulinase, insulin-degrading enzyme Mitochondrial processing peptidase alpha subunit, (Alpha-MPP, ) Pitrlysin, Protease III precursor Nardilysin, Ubiquinol-cytochrome C reductase complex core protein I,mitochondrial precursor Coenzyme PQQ synthesis protein F
