identifier: InterPro:IPR042287
label: "FhaA, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal domain found in the FHA domain-containing protein FhaA (previously known as Rv0020c) from Mycobacterium tuberculosis. The FHA (Fork Head Associated) domain is a phosphopeptide-specific binding domain that enables the protein to specifically bind to sequences containing phosphothreonine. FhaA is one of the major substrates of Ser/Thr protein kinases (STPK) and plays a role in the regulation of cell growth and peptidoglycan synthesis by binding to MviN. It may inhibit the late stages of peptidoglycan synthesis.
