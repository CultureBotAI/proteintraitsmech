label: Allene oxide cyclase superfamily
definition: >-
  This superfamily consists of several plant specific allene oxide cyclase proteins ( ). The allene oxide cyclase (AOC)-catalysed step in jasmonate (JA) biosynthesis is important in the wound response of tomato.
