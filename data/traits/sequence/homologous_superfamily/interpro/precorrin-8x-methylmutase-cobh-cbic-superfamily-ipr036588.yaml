identifier: InterPro:IPR036588
label: Precorrin-8X methylmutase CobH/CbiC superfamily
definition: >-
  This entry represents CbiC and CobH precorrin-8X methylmutase ( ), both as stand-alone enzymes and when CobJ forms part of a bifunctional enzyme. CobH and CbiC from the aerobic and anaerobic pathways, respectively, catalyse a methyl rearrangement in precorrin-8 that moves the methyl group from C-11 to C-12 to produce hydrogenobyrinic acid. Hydrogenobyrinic acid now contains all the major framework alterations associated with corrin synthesis. CobH and CbiC can sometimes be fused to other enzymes in the cobalamin pathway to make bifunctional enzymes: e.g., with CobJ/CibH and with CbiX. Cobalamin (vitamin B12) is a structurally complex cofactor, consisting of a modified tetrapyrrole with a centrally chelated cobalt. Cobalamin is usually found in one of two biologically active forms: methylcobalamin and adocobalamin. Most prokaryotes, as well as animals, have cobalamin-dependent enzymes, whereas plants and fungi do not appear to use it. In bacteria and archaea, these include methionine synthase, ribonucleotide reductase, glutamate and methylmalonyl-CoA mutases, ethanolamine ammonia lyase, and diol dehydratase. In mammals, cobalamin is obtained through the diet, and is required for methionine synthase and methylmalonyl-CoA mutase.
