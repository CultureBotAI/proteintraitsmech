identifier: InterPro:IPR036587
label: "Nuclease A inhibitor-like superfamily"
definition: >-
  This superfamily consists of protein sequences that are similar to the nuclease A inhibitor expressed by bacteria of the genus Anabaena (NuiA, ). This sequence is organised to form an α-β-α sandwich fold, which is similar to the PR-1-like fold. NuiA interacts with nuclease A by means of residues located at one end of the molecule, including residues making up the loop between helices III and IV and the loop between strands C and D. The mechanism of inhibition of nuclease A by NuiA is as yet incompletely understood.
