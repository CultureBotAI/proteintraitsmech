identifier: InterPro:IPR042303
label: "Malonyl-CoA decarboxylase, C-terminal catalytic domain superfamily"
definition: >-
  This superfamily represents the C-terminal catalytic domain of Malonyl-CoA decarboxylase (MCD), enzyme which catalyzes the conversion of malonyl-CoA to acetyl-CoA and CO2 and is localized in peroxisomes, and more abundantly in the cytoplasm. MCD is found from bacteria to humans and it has important roles in regulating fatty acid metabolism and food intake. This catalytic domain shares unexpected structural homology to the GCN5-related N-acetyltransferase (GNAT) superfamily.
