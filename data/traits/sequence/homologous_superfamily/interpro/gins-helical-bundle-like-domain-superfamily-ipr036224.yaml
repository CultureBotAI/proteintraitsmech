identifier: InterPro:IPR036224
label: "GINS, helical bundle-like domain superfamily"
definition: >-
  DNA replication in eukaryotes results from a highly coordinated interaction between proteins, often as part of protein complexes, and the DNA template. One of the key early steps leading to DNA replication is formation of the pre-replication complex, or pre-RC. The pre-RC is formed by the sequential binding of the origin recognition complex (ORC), Cdc6 and Cdt1 proteins, and the MCM complex. Activation of the pre-RC into the initiation complex (IC) is achieved via the action of S-phase kinases, eventually leading to the loading of the replication machinery. A novel replication complex, GINS (for Go, Ichi, Nii, and San; meaning 5-1-2-3 in Japanese, after the four related subunits of the complex Sld5, Psf1, Psf2 and Psf3), has been identified. The GINS complex is conserved in eukaryotic cells and is essential for DNA replication. When the DNA replication fork is opened, GINS is required to maintain the association between the MCM and Cdc45 in the large replicator complex. The GINS complex acts as a replicative helicase that unlocks the double-stranded DNA prior to the moving replication fork. Psf2's expression is up regulated in many diseases, especially tumors, and adversely affects prognosis. The GINS complex is essential for initiation of DNA replication in Xenopus egg extracts. In eukaryotes, GINS consists of four different subunits (Sld5, Psf1, Psf2, and Psf3), while in archaea it forms as a tetramer of two subunits (Gins15 and Gins23). Only Gins23 is included in this entry. GINS associates with MCM (Minichromosome Maintenance) and Cdc45 to form the CMG (Cdc45-MCM-GINS) complex, which functions as the replicative helicase essential for DNA unwinding during replication. The archaeal GINS complex has a more symmetrical structure compared to its eukaryotic counterpart,…
