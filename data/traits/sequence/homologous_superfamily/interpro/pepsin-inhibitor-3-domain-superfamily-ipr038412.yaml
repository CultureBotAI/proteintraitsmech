identifier: InterPro:IPR038412
label: "Pepsin inhibitor-3 domain superfamily"
definition: >-
  Pepsin inhibitor-3 consists of two tandem repeat domains, each comprising an antiparallel β-sheet flanked by an α-helix. In the enzyme-inhibitor complex, the N-terminal β-strand of PI-3 pairs with one strand of the active site flap region of pepsin.
