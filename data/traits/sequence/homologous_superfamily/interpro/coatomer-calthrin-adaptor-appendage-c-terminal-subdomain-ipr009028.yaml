identifier: InterPro:IPR009028
label: Coatomer/calthrin adaptor appendage, C-terminal subdomain
definition: >-
  Proteins synthesized on the ribosome and processed in the endoplasmic reticulum are transported from the Golgi apparatus to the trans-Golgi network (TGN), and from there via small carrier vesicles to their final destination compartment. This traffic is bidirectional, to ensure that proteins required to form vesicles are recycled. Vesicles have specific coat proteins (such as clathrin or coatomer) that are important for cargo selection and direction of transfer. The alpha and beta2 adaptor subunits can each be divided into a trunk domain and the appendage domain (or ear domain), separated by a linker region. Clathrin polymerisation is promoted by its binding to the beta2 appendage and hinge domains. The alpha appendage domain interacts with a number of accessory proteins, including eps15, epsin, amphiphysin, AP180, auxilin, numb, and Dab2, thereby regulating the translocation of these proteins to the bud site.
