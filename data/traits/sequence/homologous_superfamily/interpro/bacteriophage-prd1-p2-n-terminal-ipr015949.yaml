identifier: InterPro:IPR015949
label: "Bacteriophage PRD1, P2, N-terminal"
definition: >-
  The absorption protein P2 (synonym: receptor-binding protein P2) from the bacteriophage PRD1 is a multi-β-sheet protein whose complicated topology forms an elongated seahorse-shaped molecule with a distinct head, containing a pseudo-β propeller structure with approximate 6-fold symmetry, and a tail (β-sandwich). It is required for the attachment of the phage to the host conjugative DNA transfer complex. This is a poorly understood large transmembrane complex of unknown architecture, with at least 11 different proteins.
