identifier: InterPro:IPR036656
label: Cytochrome b-c1 complex subunit 9 superfamily
definition: >-
  Cytochrome b-c1 complex subunit 9 (QCR9) is a component of the ubiquinol-cytochrome c reductase complex (complex III or cytochrome b-c1 complex), which is part of the mitochondrial respiratory chain. It may interact with cytochrome c1. QCR9 contains the single transmembrane helix structure.
