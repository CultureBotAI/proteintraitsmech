identifier: InterPro:IPR038172
label: "Herpesvirus glycoprotein H, C-terminal domain superfamily"
definition: >-
  Herpesvirus glycoprotein H (gH) is a virion associated envelope glycoprotein. Complex formation between gH and gL has been demonstrated in both virions and infected cells. This superfamily represents the C-terminal domain. Structurally, the C-terminal domain consists of 8 β-sheets and 1 small α-helix. The β-sheets are arranged into a β-sandwich, made up of two opposed β-sheets, each made up of four strands. Within Herpesvirus glycoprotein H, the two sheets are termed the N sheet and C sheet, since they are sequential. The α-helix sits in the loop between two of the β-strands, and packs against the C sheet.
