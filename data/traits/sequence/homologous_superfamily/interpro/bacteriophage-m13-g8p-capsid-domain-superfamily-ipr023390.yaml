identifier: InterPro:IPR023390
label: "Bacteriophage M13, G8P, capsid domain superfamily"
definition: >-
  This superfamily represents the capsid domain of the Inoviridae. The type example is bacteriophage M13 Gp8 (capsid or major coat protein); which forms the baseplate structural protein. It consists largely of an α-helix with a slight curve.
