identifier: InterPro:IPR016119
label: Bromoperoxidase/chloroperoxidase C-terminal
definition: >-
  This superfamily represents an α helical domain is found in bromoperoxidases and at the C-terminal of chloroperoxidases, both being haloperoxidases. The structure of chloroperoxidase from the fungus Curvularia inaequalis consists of a duplication containing two core α-helical bundles arranged as in other family dimers. Chloroperoxidases ( ) use a haem cofactor to bring about the chlorination of a range of organic molecules, forming stable C-Cl bonds. The vanadium-dependent haloperoxidases exclusively catalyse the oxidation of halides. Vanadium-dependent haloperoxidase has an almost all-helical structure, with two four-helix bundles and only three small β-sheets. The holoenzyme contains trigonal-bipyramidal coordinated vanadium atoms at its two active centres.
