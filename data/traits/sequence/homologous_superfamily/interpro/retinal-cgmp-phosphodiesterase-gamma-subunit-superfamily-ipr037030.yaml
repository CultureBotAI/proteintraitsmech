identifier: InterPro:IPR037030
label: Retinal cGMP phosphodiesterase, gamma subunit superfamily
definition: >-
  Retinal rod and cone cGMP phosphodiesterases function as the effector enzymes in the vertebrate visual transduction cascade. This entry represents the inhibitory gamma subunit, which is also expressed outside retinal tissues and has been shown to interact with the G-protein-coupled receptor kinase 2 signalling system to regulate the epidermal growth factor- and thrombin-dependent stimulation of p42/p44 mitogen-activated protein kinase in human embryonic kidney 293 cells. The gamma subunit is intrinsically disordered and its interaction with the alpha subunit involves the selection of preconfigured transient conformations.
