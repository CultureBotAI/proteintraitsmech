identifier: InterPro:IPR037163
label: "Spermidine synthase, tetramerisation domain superfamily"
definition: >-
  This entry represents the N-terminal tetramerization domain superfamily of spermidine synthase. Spermidine synthase is involved in the first step of the spermidine biosynthesis subpathway that synthesizes spermidine from putrescine.
