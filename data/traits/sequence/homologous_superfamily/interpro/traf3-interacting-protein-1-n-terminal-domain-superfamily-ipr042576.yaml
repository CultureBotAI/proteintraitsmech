identifier: InterPro:IPR042576
label: "TRAF3-interacting protein 1, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal domain of TRAF3-interacting protein 1. TRAF3-interacting protein 1 (TRAF3IP1, also known as IFT54) recruits TRAF3 (tumour necrosis factor receptor-associated factor 3) and DISC1 (Disrupted-In-Schizophrenia 1) to the microtubules and is conserved from worms to humans. The N-terminal region is the microtubule binding domain and is well-conserved; the C-terminal 100 residues, also well-conserved, constitute the coiled-coil region which binds to TRAF3. The central region of the protein is rich in lysine and glutamic acid and carries KKE motifs which may also be necessary for tubulin-binding, but this region is the least well-conserved. In humans, it plays an inhibitory role on IL13 signaling by binding to IL13RA1. It is involved in suppression of IL13-induced STAT6 phosphorylation, transcriptional activity and DNA-binding.
