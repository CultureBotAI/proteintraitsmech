identifier: InterPro:IPR038353
label: "Decorin-binding superfamily"
definition: >-
  Decorin is a proteoglycan that decorates collagen fibres. Borrelia burgdorferi causes lyme disease, a tick-borne infection that can develop into a chronic, multisystemic disorder. Decorin may mediate the adherence of B. burgdorferi to collagen fibres in skin and other tissues. B. burgdorferi decorin binding proteins A and B (DbpA/B) are responsible for decorin binding. DbpA of Borrelia burgdorferi mediates bacterial adhesion to heparin and dermatan sulfate associated with decorin.
