identifier: InterPro:IPR036425
label: "MoaB/Mog-like domain superfamily"
definition: >-
  MoaB/Mog domain, also known as Cnx1G domain, is found in the bacterial molybdenum cofactor (Moco) biosynthesis protein MoaB/Mog and N-terminal of the eukaryotic MoCF biosynthesis proteins, such as the Drosophila protein cinnamon, the Arabidopsis protein cnx1 and the mammal protein gephyrin. These proteins are involved in the final steps of Moco synthesis. In E. coli two proteins, MogA and MoeA are essential for Mo insertion into molybdopterin, while in plants and animals one fusion protein with two domains (G and E domains) fulfils this function. The G domain of Cnx1 and gephyrin shares similarity with MoaB/Mog, while their E domain displays similarities to the sulfurtransferase rhodanese (homologous to E. coli MoeA/chlE). Structurally, MogA is folded into a compact molecule with α/β/α architecture and forms a trimer. The Cnx1G domain has been shown to bind molybdopterin. This domain is also found in N-terminal of the FAD synthases belonging to a family that catalyses the adenylation of flavin mononucleotide (FMN) to form flavin adenine dinucleotide (FAD) coenzyme. CinA from Thermus thermophilus is shown to have both nicotinamide mononucleotide deamidase and ADP-ribose pyrophosphatase activities, with ADP-ribose pyrophosphatase activity attributed to the N-terminal domain. The structure of the MoaB/Mog domain has three layers (α/β/α) with mixed β-sheet of five strands where the strand 5 is antiparallel to the rest.
