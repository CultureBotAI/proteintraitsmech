identifier: InterPro:IPR041934
label: "NAD glycohydrolase, helical linker domain"
definition: >-
  This superfamily represents a helical linker domain found in several bacterial nicotine adenine dinucleotide glycohydrolase (NGA) proteins which appear to be specific to Streptococcus pyogenes. NAD glycohydrolase (NADase) is a potential virulence factor. Streptococcal NADase may contribute to virulence by its ability to cleave beta-NAD at the ribose-nicotinamide bond, depleting intracellular NAD pools and producing the potent vasoactive compound nicotinamide. The helical linker domain is composed of 4 helices.
