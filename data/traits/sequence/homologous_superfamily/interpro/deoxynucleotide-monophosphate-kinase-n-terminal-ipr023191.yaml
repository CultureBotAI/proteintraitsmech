identifier: InterPro:IPR023191
label: "Deoxynucleotide monophosphate kinase, N-terminal"
definition: >-
  Nucleotide monophosphate (NMP) kinases catalyse the phosphorylation of canonical nucleotides to the corresponding diphosphate using ATP as a phosphate donor. The bacteriophage T4 deoxynucleotide monophosphate (DNMP) kinases are unique in their ability to recognise three structurally dissimilar mononucleotides: dGMP, dTMP and 5'-hydroxymethyl-dCMP. The broad specificity is thought to result from the selective pressure for efficient DNA precursor synthesis in phage infected cells. This superfamily represents a predominantly α-helical domain found in phage DNMP kinases.
