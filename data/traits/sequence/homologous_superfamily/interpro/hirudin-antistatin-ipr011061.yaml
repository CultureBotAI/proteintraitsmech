identifier: InterPro:IPR011061
label: Hirudin/antistatin
definition: >-
  Leeches, such as Hirudo medicinalis (Medicinal leech), produce a variety of antihaemostatic proteins that act as proteinase inhibitors. These inhibitors are used to aid the leech in feeding upon its host by blocking blood coagulation. Examples of these proteins include hirustasin (inhibitor of tissue kallikrein, trypsin, alpha-chymotrypsin, and granulocyte cathepsin G), bdellastasin (inhibitor of trypsin, plasmin, and acrosin), factor Xa inhibitor antistasin (inhibitor of blood coagulation factor Xa), hirudin (thrombin inhibitor), decorsin (inhibitor of platelet aggregation) and haemadin (thrombin inhibitor).
