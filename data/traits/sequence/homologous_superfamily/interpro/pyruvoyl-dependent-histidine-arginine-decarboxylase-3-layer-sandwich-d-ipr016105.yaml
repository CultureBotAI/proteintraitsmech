identifier: InterPro:IPR016105
label: Pyruvoyl-dependent histidine/arginine decarboxylase, 3-layer sandwich domain
definition: >-
  This entry represents a structural subdomain found in pyruvoyl-dependent histidine decarboxylase and arginine decarboxylase. This subdomain consists of a 3-layer β-β-α sandwich. These proteins form heterohexamers. Histidine decarboxylase catalyses the formation of histamine from histidine. It requires a pyruvoyl group for its activity. Cleavage of the proenzyme PI chain yields two subunits, alpha and beta, which arrange as a hexamer (alpha beta) 6 by nonhydrolytic self-catalysis. Arginine decarboxylase catalyses the interconversion of arginine and agmatine plus carbon dioxide. It requires a pyruvoyl group for its activity.
