identifier: InterPro:IPR024072
label: "Dihydrofolate reductase-like domain superfamily"
definition: >-
  Dihydrofolate reductase (DHFR) catalyses the NADPH-dependent reduction of dihydrofolate to tetrahydrofolate, an essential step in de novo synthesis both of glycine and of purines and deoxythymidine phosphate (the precursors of DNA synthesis), and important also in the conversion of deoxyuridine monophosphate to deoxythymidine monophosphate. This superfamily represents a structural domain found in dihydrofolate reductases, as well as in riboflavin biosynthesis proteins (usually as a C-terminal domain) and related enzymes.
