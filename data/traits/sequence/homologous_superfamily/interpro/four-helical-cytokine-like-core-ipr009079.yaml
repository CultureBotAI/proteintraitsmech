identifier: InterPro:IPR009079
label: "Four-helical cytokine-like, core"
definition: >-
  This superfamily contains a domain with a core structure consisting of a closed bundle of four helices in a left-handed twist, with two crossover connections. Proteins containing this domain include long-chain cytokines, such as leukaemia inhibitory factor (LIF), the growth hormone somatotropin, interleukin-6 and leptin; short-chain cytokines, such as erythropoietin, stem cell factor (SCF), macrophage colony-stimulating factor (M-CSF) and interleukin-2, -3, -4, -5, -13, -15 and -21; and interferons/interleukin-10.
