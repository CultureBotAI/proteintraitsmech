identifier: InterPro:IPR036517
label: "FF domain superfamily"
definition: >-
  This entry represents the FF domain superfamily. The FF domain may be involved in protein-protein interaction. It often occurs as multiple copies and often accompanies WW domains . PRP40 from yeast encodes a novel, essential splicing component that associates with the yeast U1 small nuclear ribonucleoprotein particle. The structure of the FF domain is composed of three α helices arranged in an orthogonal bundle with a 3(10) helix in the loop between the second and third α helices.
