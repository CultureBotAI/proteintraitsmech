identifier: InterPro:IPR036694
label: "Dodecin-like superfamily"
definition: >-
  This entry represents proteins with a Dodecin topology. Dodecin flavoprotein is a small dodecameric flavin-binding protein from Halobacterium salinarium (Halobacterium halobium) that contains two flavins stacked in a single binding pocket between two tryptophan residues to form an aromatic tetrade. Dodecin binds riboflavin, although it appears to have a broad specificity for flavins. Lumichrome, a molecule associated with flavin metabolism, appears to be a ligand of dodecin, which could act as a waste-trapping device. The subunit assembly and the probable biological unit is a dodecamer.
