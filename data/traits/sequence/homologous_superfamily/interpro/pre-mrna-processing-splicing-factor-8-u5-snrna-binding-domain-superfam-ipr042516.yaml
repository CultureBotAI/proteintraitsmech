identifier: InterPro:IPR042516
label: "Pre-mRNA-processing-splicing factor 8, U5-snRNA-binding domain superfamily"
definition: >-
  The essential spliceosomal protein Prp8 interacts with U5 and U6 snRNAs and with specific pre-mRNA sequences that participate in catalysis. This close association with crucial RNA sequences, together with extensive genetic evidence, suggests that Prp8 could directly affect the function of the catalytic core, perhaps acting as a splicing cofactor. This superfamily represents the U5-snRNA-binding domain of the pre-mRNA-processing-splicing factor 8 (Prp8). Structurally, this domain consists of 4 anti-parallel β sheets and 3 α helices.
