identifier: InterPro:IPR037221
label: "H-type lectin domain superfamily"
definition: >-
  The H-type lectin domain is a unit of six beta chains, combined into a homo-hexamer. It is involved in self/non-self recognition of cells, through binding with carbohydrates. The name (H-type) is derived from Helix pomatia agglutinin (HPA), a N-acetylgalactosamine (GalNAc) binding lectin.
