identifier: InterPro:IPR036630
label: "Head decoration protein D superfamily"
definition: >-
  Bacteriophage lambda head decoration protein D stabilises the head shell after the rearrangement of GP7 subunits of the head shell lattice that accompanies expansion of the head. There are approximately 420 copies of protein D per mature phage. Head decoration protein D structure has a β-clip fold, which consists of a double-stranded ribbon sharply bent in two places where the ribbon ends form incomplete barrel.
