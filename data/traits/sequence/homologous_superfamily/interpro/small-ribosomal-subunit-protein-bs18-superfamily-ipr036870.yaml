identifier: InterPro:IPR036870
label: "Small ribosomal subunit protein bS18 superfamily"
definition: >-
  Evidence suggests that, in prokaryotes, the peptidyl transferase reaction is performed by the large subunit 23S rRNA, whereas proteins probably have a greater role in eukaryotic ribosomes. Most of the proteins lie close to, or on the surface of, the 30S subunit, arranged peripherally around the rRNA. The small subunit ribosomal proteins can be categorised as primary binding proteins, which bind directly and independently to 16S rRNA; secondary binding proteins, which display no specific affinity for 16S rRNA, but its assembly is contingent upon the presence of one or more primary binding proteins; and tertiary binding proteins, which require the presence of one or more secondary binding proteins and sometimes other tertiary binding proteins. The small ribosomal subunit protein bS18 (previously known as S18) is known to be involved in binding the aminoacyl-tRNA complex in Escherichia coli, and appears to be situated at the tRNA A-site. Experimental evidence has revealed that bS18 is well exposed on the surface of the E. coli ribosome, and is a secondary rRNA binding protein. bS18 belongs to a family of ribosomal proteins that includes: eubacterial bS18; metazoan mitochondrial bS18m, algal and plant chloroplast bS18c; and cyanelle S18. There are 3 mitochondrial isoforms of bS18 in mammals, localizing to 3 distinct sites in the mitoribosome. bS18m (b1S8c) binds to the same site as bacterial bS18, mS40 (also known as bS18b) binds to a novel location of the 28S small subunit, and mL66 (bS18a) binds to the 39S large subunit. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in acc…
