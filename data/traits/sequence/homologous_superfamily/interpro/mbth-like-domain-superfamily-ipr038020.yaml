identifier: InterPro:IPR038020
label: "MbtH-like domain superfamily"
definition: >-
  This superfamily contains a domain found in the MbtH protein ( ) as well as at the N terminus of the antibiotic synthesis protein NIKP1. This domain is about 70 amino acids long and contains 3 fully conserved tryptophan residues. Many of the members of this family are found in known antibiotic synthesis gene clusters. The structure of a 72-amino acid domain from the MbtH-like family has been solved (PA2412). It contains a central three-stranded antiparallel β-sheet, organized in a beta2-beta1-beta3 topology, followed by two α-helices.
