identifier: InterPro:IPR036418
label: "Cytochrome c oxidase, subunit VIa superfamily"
definition: >-
  Cytochrome c oxidase is an oligomeric enzymatic complex which is a component of the respiratory chain complex and is involved in the transfer of electrons from cytochrome c to oxygen. In eukaryotes this enzyme complex is located in the mitochondrial inner membrane; in aerobic prokaryotes it is found in the plasma membrane. In eukaryotes, in addition to the three large subunits, I, II and III, that form the catalytic centre of the enzyme complex, there are a variable number of small polypeptidic subunits. One of these subunits is known as VIa in vertebrates and fungi. Mammals have two tissue-specific isoforms of VIa, a liver (VIa-L) and a heart and skeletal muscle isoform (VIa-H). Mammalian VIa-H induces a slip in CcO (decrease in proton/electron stoichiometry) at high intramitochondrial ATP/ADP ratios, while VIa-L induces a permanent slip in CcO, depending on the presence of cardiolipin and palmitate. Only one form is found in fish.
