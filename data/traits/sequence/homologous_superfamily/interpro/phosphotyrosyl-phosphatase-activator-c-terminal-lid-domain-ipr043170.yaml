identifier: InterPro:IPR043170
label: "Phosphotyrosyl phosphatase activator, C-terminal lid domain"
definition: >-
  Phosphotyrosyl phosphatase activator (PTPA, also known as protein phosphatase 2A activator) proteins stimulate the phosphotyrosyl phosphatase (PTPase) activity of the dimeric form of protein phosphatase 2A (PP2A). PTPase activity in PP2A (in vitro) is relatively low when compared to the better recognised phosphoserine/ threonine protein phosphorylase activity. It also reactivates the serine/threonine phosphatase activity of an inactive form of PP2A. The specific biological role of PTPA is unknown. PTPA has been suggested to play a role in the insertion of metals to the PP2A catalytic subunit (PP2Ac) active site, to act as a chaperone, and more recently, to have peptidyl prolyl cis/trans isomerase activity that specifically targets human PP2Ac. Together, PTPA and PP2A constitute an ATPase and it has been suggested that PTPA alters the relative specificity of PP2A from phosphoserine/phosphothreonine substrates to phosphotyrosine substrates in an ATP-hydrolysis-dependent manner. Basal expression of PTPA depends on the activity of a ubiquitous transcription factor, Yin Yang 1 (YY1). The tumour suppressor protein p53 can inhibit PTPA expression through an unknown mechanism that negatively controls YY1. PTPA is an α-helical protein which consists of three distinct domains: the core, the linker and the lid. This superfamily consists of the lid domain of PTPA, located usually at the C-terminal.
