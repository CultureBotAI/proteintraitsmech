identifier: InterPro:IPR027384
label: "Runx, central domain superfamily"
definition: >-
  This superfamily represents the central domain of Runx (also known as AML1, CBF- alpha, PEBP2) protein. This domain lies between the N-terminal Runt domain and the C-terminal domains. Proteins containing this domain include RUNX1/2/3 (Runt-related transcription factor 1/2/3) from Chordata (chordates).
