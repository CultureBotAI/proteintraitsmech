identifier: InterPro:IPR036298
label: Chalcone isomerase superfamily
definition: >-
  Chalcone isomerase (CHI, ; also known as chalcone-flavanone isomerase) is a plant enzyme responsible for the isomerisation of chalcone to naringenin, a key step in the biosynthesis of flavonoids. The Petunia hybrida (Petunia) genome contains two genes coding for very similar enzymes, ChiA and ChiB, but only the first seems to encode a functional chalcone isomerase. Chalcone isomerase has a core 2-layer α/β structure consisting of β(3)-α(2)-β-α(2)-β(3). Altered inheritance of mitochondria protein 18/46, mitochondrial (AIM18/16) are CHI-like proteins from Saccharomyces cerevisiae, which lacks other enzymes of the flavonoid pathway. They show a similar fold to CHI with an extra fungal-specific loop. Instead of the chalcone isomerase activity these proteins bind heme, and structural prediction suggest this domain might be related to bacterial cytochrome P460. This entry represents the chalcone isomerases domain found in proteins from plants, fungi and bacteria.
