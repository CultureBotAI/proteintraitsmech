identifier: InterPro:IPR027451
label: "Arabinofuranosyltransferase, domain 1"
definition: >-
  Arabinosyltransferases EmbA, EmbB and EmbC are known to be involved in arabinogalactan (AG) and lipoarabinomannan (LAM) biosynthesis in mycobacteria. Synthesis of LAM, but not AG, ceases after inactivation of EmbC, while the arabinan of AG is affected by EmbA or EmbB disruption. The arabinans of the mycobacterial cell wall are key structural and immunological polymers.
