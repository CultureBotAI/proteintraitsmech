identifier: InterPro:IPR038652
label: "Circovirus capsid superfamily"
definition: >-
  Circoviruses are small circular single stranded viruses. This superfamily represents the capsid protein from viruses such as Porcine circovirus and Beak and feather disease virus ( ). These proteins are about 220 amino acids long and of unknown function.
