identifier: InterPro:IPR038158
label: H-NOX domain superfamily
definition: >-
  Heme-nitric oxide/oxygen binding (H-NOX) domains function as sensors for the gaseous signaling agent nitric oxide (NO) in eukaryotes and bacteria. They can also function as oxigen sensors, as is the case for soluble guanylate cyclases from Caenorhabditis elegans. The H-NOX fold consists of seven α-helices and one four-stranded antiparallel β sheet.
