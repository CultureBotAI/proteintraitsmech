identifier: InterPro:IPR036942
label: "TonB-dependent receptor-like, beta-barrel domain superfamily"
definition: >-
  This entry represents the β-barrel domain which contains the plug domain. This β-barrel domain is also found in vitamin B12 transporter BtuB and ferric citrate outer membrane transporter FecA, among others.
