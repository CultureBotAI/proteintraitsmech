identifier: InterPro:IPR038670
label: "HslJ-like superfamily"
definition: >-
  This entry represents a domain found in proteins of unknown function, some of which are described as heat shock protein (HslJ). In Helicobacter pylori (Campylobacter pylori) the protein is secreted e.g. ( ) and implicated in motility. In Leishmania spp. it is described as an essential protein, over-expression of which, in Leishmania amazonensis increases virulence (). In E. coli, hslJ is not induced by heat shock. It encodes a putative outer-membrane protein that is CysB-regulated and is involved in displaying novobiocin resistance. A pair of cysteine residues show correlated conservation, suggesting that they form a disulphide bond.
