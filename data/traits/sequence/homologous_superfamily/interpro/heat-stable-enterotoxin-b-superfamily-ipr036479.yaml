identifier: InterPro:IPR036479
label: "Heat-stable enterotoxin B superfamily"
definition: >-
  Members of this superfamily assume a helical secondary structure, with two α helices forming a disulphide cross-linked α-helical hairpin. The disulphide bonds are crucial for the toxic activity of the protein, and are required for maintenance of the tertiary structure, and subsequent interaction with the particulate form of guanylate cyclase, increasing cyclic GMP levels within the host intestinal epithelial cells.
