identifier: InterPro:IPR023634
label: "Reovirus, outer capsid sigma-3 domain superfamily"
definition: >-
  Reoviruses are double-stranded RNA viruses that lack a membrane envelope. Their capsid is organised in two concentric icosahedral layers: an inner core and an outer capsid layer. The outer capsid is made up of the major proteins mu1 and sigma3, and the minor protein sigma1. The inner core structure is composed of the major core proteins lambda1 and sigma2, core spike protein lambda2, and minor core proteins lambda3 and mu2. The inner core encases the 10 segments of double-stranded RNA (dsRNA) which comprise the genome. The structure of the Reovirus outer capsid protein sigma3 reveals a two-lobed structure organised around a long central helix. The smaller of the two lobes includes a CCHC zinc-binding site.
