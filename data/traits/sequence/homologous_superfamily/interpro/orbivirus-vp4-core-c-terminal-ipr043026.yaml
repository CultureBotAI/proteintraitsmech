identifier: InterPro:IPR043026
label: "Orbivirus VP4 core, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain (also called GT domain) of the Orbivirus VP4 core protein. Structurally, this domain consists of 6 α helices. Orbivirus are double stranded RNA retroviruses of which the Bluetongue virus (BTV) is a member. The core of BTV is a multienzyme complex composed of two major proteins (VP7 and VP3) and three minor proteins (VP1, VP4 and VP6) in addition to the viral genome. VP4 has been shown to perform all RNA capping activities and has both methyltransferase type 1 and type 2 activities associated with it.
