identifier: InterPro:IPR043006
label: "Cyanuric acid hydrolase/Barbiturase, repeating unit B"
definition: >-
  Cyanuric acid hydrolases (AtzD) and barbiturases are homologous and found almost exclusively in bacteria. AtzD hydrolyses cyanuric acid to release carboxybiuret, which spontaneously decarboxylates to biuret. Barbiturase catalyses the ring-opening of barbituric acid to ureidomalonic acid. Although the AtzD/barbiturase family have previously been suggested to belong to the amidohydrolase superfamily, bioinformatics analysis and the lack of bound metals imply that this might not be the case. Their structure is comprised of three repeating units (RUs) that share the same structure as one another; they have been designated RU A, B and C. Each RU is comprised of a four strand antiparallel β-sheet and two helices. This superfamily represents the RU B found in Cyanuric acid hydrolase/Barbiturase.
