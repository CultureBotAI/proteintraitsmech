identifier: InterPro:IPR038638
label: "RbpA superfamily"
definition: >-
  RbpA binds to RNA polymerase (RNAP), stimulating transcription from principal, but not alternative sigma factor promoters. RbpA stimulates transcription from several principal sigma factor HrdB (SigA)-dependent promoters but not from a SigR-dependent promoter. Stimulation occurs in the presence of the transcription inititation inhibitor rifampicin.
