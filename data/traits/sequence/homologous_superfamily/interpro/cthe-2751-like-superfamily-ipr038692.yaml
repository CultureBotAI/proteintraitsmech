label: "Cthe_2751-like superfamily"
definition: >-
  This entry includes a group of uncharacterised proteins, including Cthe_2751. The structure of the Cthe_2751 protein ( ) from Clostridium thermocellum has been solved and shows an all α-helical protein with a central hydrophobic core which provides thermal stability.
