identifier: InterPro:IPR053738
label: "Lambda phage major capsid assembly"
definition: >-
  This superfamily of proteins is involved in the assembly of icosahedral capsids, which are geometric structures composed of proteins that encapsulate the genetic material of certain viruses. Members of this superfamily are characterized by their structural role in forming the protective shell that is critical for the stability and infectivity of the virus particles.
