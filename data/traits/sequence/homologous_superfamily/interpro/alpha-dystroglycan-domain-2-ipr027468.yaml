identifier: InterPro:IPR027468
label: "Alpha-dystroglycan domain 2"
definition: >-
  Alpha-dystroglycan is a subunit of the dystroglycan complex. It is an extracellular peripheral glycoprotein that acts as a receptor for both extracellular matrix proteins containing laminin-G domains, and for certain adenoviruses. The N terminus of alpha-dystroglycan comprises of domain 1 with an immunoglobulin-like β-sandwich fold and domain 2 that resembles ribosomal RNA-binding proteins. It has been suggested that alpha-dystroglycan has a central mucin-like domain followed by another immunoglobulin-like β-sandwich domain. This entry represents domain 2.
