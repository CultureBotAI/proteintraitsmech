identifier: InterPro:IPR038404
label: "TRAP transporter solute receptor DctP superfamily"
definition: >-
  The tripartite ATP-independent periplasmic (TRAP) transporters are substrate-binding protein (SBP)-dependent secondary transporters found in prokaryotes. They consist of a substrate-binding protein (SBP) of the DctP or TAXI families and two integral membrane proteins that form the DctQ and DctM protein families. DctP is part of the DctP-TRAP (tripartite ATP-independent periplasmic) transporter involved in binding extracellular solutes for transport across the bacterial cytoplasmic membrane. Proteins in this family include DctP from R. capsulatus, SiaP from Haemophilus influenzae, DctB from Bacillus subtilis, and TeaA from Halomonas elongata. The structure of the SiaP receptor has revealed an overall topology similar to ATP binding cassette ESR (extracytoplasmic solute receptors) proteins. Upon binding of sialic acid, SiaP undergoes domain closure about a hinge region and kinking of an α-helix hinge component.
