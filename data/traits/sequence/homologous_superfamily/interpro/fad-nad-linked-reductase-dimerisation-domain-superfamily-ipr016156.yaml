identifier: InterPro:IPR016156
label: "FAD/NAD-linked reductase, dimerisation domain superfamily"
definition: >-
  This superfamily represents a dimerisation domain that is usually found at the C-terminal of FAD and NAD-linked reductases. This domain has a core α+β sandwich structure consisting of beta(3,4)-alpha(3). The first two domains are of the same β/β/α fold. This domain can be found in the following proteins: Glutathione reductase. Trypanothione reductase. Mammalian thioredoxin reductase. Apoptosis-inducing factor (AIF), which contains a large loop insertion in this domain. NADH peroxidase. Biphenyl 2,3-dioxygenase, ferredoxin reductase (also known as NADH-dependent ferredoxin reductase, BphA4). Putidaredoxin reductase. Dihydrolipoyl dehydrogenase (also known as dihydrolipoamide dehydrogenase). 2-oxopropyl-CoM reductase, carboxylating (also known as NADH-dependent 2-ketopropyl coenzyme M oxidoreductase/carboxylase). The flavin-binding subunit of flavocytochrome c sulphide dehydrogenase (FCSD). NADH oxidase /nitrite reductase.
