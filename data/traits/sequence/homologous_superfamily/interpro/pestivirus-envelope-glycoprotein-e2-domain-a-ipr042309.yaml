identifier: InterPro:IPR042309
label: "Pestivirus envelope glycoprotein E2, domain A"
definition: >-
  Pestiviruses have an outer lipid envelope bearing two glycoproteins, E1 and E2, required for cell entry. E2 is an elongated molecule which consists of four domains (DA, DB, DC, DD), arranged linearly from N to C terminus. Domains DA and DB are the most distal from the viral membrane and are likely to be the most exposed on the virus surface. Both domains possess Ig-like folds, consistent with a cell-receptor binding function. This superfamily represents the domain A (DA) of the Pestivirus envelope glycoprotein E2.
