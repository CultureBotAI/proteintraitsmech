identifier: InterPro:IPR042175
label: "Cell/Rod shape-determining protein MreC, domain 2"
definition: >-
  This superfamily corresponds to the structure of the second of the two 6-stranded β barrels which comprise MreC, a rod shape-determining protein in E.coli. More generally, it is involved in cell shape determination of bacteria even when they are not rod shaped.
