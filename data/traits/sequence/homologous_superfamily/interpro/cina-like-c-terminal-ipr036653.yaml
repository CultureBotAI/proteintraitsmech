identifier: InterPro:IPR036653
label: "CinA-like, C-terminal"
definition: >-
  This superfamily represents a C-terminal domain found in CinA (the first gene in the competence-inducible operon) and nicotinamide-nucleotide (NMN) amidohydrolase PncC. CinA is thought to be specifically required at some stage in the process of natural transformation, a genetic recombination process. NMN amidohydrolase (also known as NMN deamidase) is one of the key enzymes of the bacterial pyridine nucleotide cycle. This enzyme has been shown in S. oneidensis to be encoded by the gene PncC. It is further shown in S. oneidensis PncC, that the NMN deamidase activity resides in the C-terminal "CinA" domain, also known as the PncC domain. While multiple E. coli homologs to S. oneidensis PncC have been identified, only YgaD has been shown to posses NMN deaminase activity.
