identifier: InterPro:IPR042270
label: "tRNA-dihydrouridine(16) synthase, C-terminal"
definition: >-
  Dihydrouridine (D) is a highly conserved modified base found in tRNAs from all domains of life. D is formed by reduction of the carbon-carbon double bond at positions 5 and 6 of the uridine base by dihydrouridine synthases (Dus), and is mostly found in the D-loop of tRNAs for which it is named. DusC is composed of two domains: an N-terminal catalytic domain and a C-terminal tRNA-binding domain. The C-terminal tRNA-binding domain is formed by four parallel helices. This domain is commonly found in Dus-family proteins and is responsible for binding to the substrate tRNA. The role of dihydrouridine in tRNA is predicted to increase conformational flexibility of the tRNA.
