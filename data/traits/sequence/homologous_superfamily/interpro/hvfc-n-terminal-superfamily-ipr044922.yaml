identifier: InterPro:IPR044922
label: "HvfC, N-terminal superfamily"
definition: >-
  This superfamily represents the N-terminal part of Multinuclear nonheme iron-dependent oxidase partner protein HvfC Haemophilus influenzae and similar bacterial proteins, including a Neisseria protein ( , ) which comprises an α-helical bundle with 4 main helices. From genomic context and the fold of the C-terminal part, it has been suggested that this protein is involved in transcriptional regulation. HvfC is involved in the biosynthesis of the virulence factor peptide HvfA (oxazolin), acts as a partner protein of the multinuclear nonheme iron-dependent oxidase (MNIO) HvfB and participates in post-translational modification of HvfA. It may play a role in substrate recognition.
