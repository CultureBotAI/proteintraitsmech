identifier: InterPro:IPR036751
label: Stage V sporulation protein G superfamily
definition: >-
  This entry represents the stage V sporulation protein G (SpoVG) superfamily. It is essential for sporulation and specific to stage V sporulation in Bacillus megaterium and Bacillus subtilis. In B. subtilis, expression decreases after 30-60 minutes of cold shock. Structurally, SpoVG comprises a coiled antiparallel β-sheet packed against the C-terminal helix. In addition, the extensions of strands 4 and 5 form an isolated β-hairpin.
