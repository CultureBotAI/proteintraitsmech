identifier: InterPro:IPR012674
label: "Calycin superfamily"
definition: >-
  Calycins form a large protein superfamily that shares similar β-barrel structures. Calycins can be divided into families that include lipocalins, fatty acid-binding proteins, triabin, and thrombin inhibitors. Of these families, the lipocalin family ( ) is the largest and functionally the most diverse. Lipocalins are extracellular proteins that share several common recognition properties such as ligand binding, receptor binding and the formation of complexes with other macromolecules. Lipocalins include the retinol-binding protein, lipocalin allergen, aphrodisin (a sex hormone), alpha-2U-globulin, prostaglandin D synthase, beta-lactoglobulin, bilin-binding protein, and the nitrophorins. Bacterial hypothetical proteins YodA from Escherichia coli and YwiB from Bacillus subtilis share a similar calycin β-barrel structure. Part of the YodA hypothetical protein has a calycin-like structure.
