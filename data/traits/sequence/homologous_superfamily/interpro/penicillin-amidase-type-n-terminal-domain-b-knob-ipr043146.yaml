identifier: InterPro:IPR043146
label: "Penicillin amidase type, N-terminal domain, B-knob"
definition: >-
  Penicillin amidase or penicillin acylase catalyses the hydrolysis of benzylpenicillin to phenylacetic acid and 6-aminopenicillanic acid (6-APA) a key intermediate in the the synthesis of penicillins. This superfamily represents enzymes that share an unusual fold in which the nucleophile and other catalytic groups occupy equivalent sites. This fold provides both the capacity for nucleophilic attack and the possibility of autocatalytic processing. They are part of the Ntn (N-terminal nucleophile) hydrolases family. Cephalosporin acylase from Pseudomonas diminuta (known as CAD) consists of an alpha-subunit with 169 residues and a beta-subunit with 520 residues. The enzyme is described as a bowl-shaped molecule with two knobs attached to the bowl, facing each other. The A-knob contains mostly α-helices, whereas the B-knob contains mostly β-sheets. The B-knob region is made up of seven β-strands which form a distorted β-barrel-like domain. This superfamily entry comprises structural domains similar to the β-sheet B-knob region described in CAD.
