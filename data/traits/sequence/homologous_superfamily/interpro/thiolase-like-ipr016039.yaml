identifier: InterPro:IPR016039
label: Thiolase-like
definition: >-
  This superfamily represents a structural domain with a thiolase-like 3-layer α/β/α topology. This domain usually occurs in two similar copies that are related by a pseudo-dyad, and which arose through duplication. The proteins in this entry can be split into two groups: those related to thiolase, and those related to chalcone synthase. The thiolase-like enzymes include: Thiolase, where the topology of each domain is similar to the first domain of phosphoglucomutase Beta-ketoacyl-ACP synthases types I ( ), II ( ) and III ( ) Actinorhodin polyketide beta-ketoacyl synthases 1 and 2 Fatty oxidation complex beta subunit (3-ketoacyl-CoA thiolase; ) The chalcone synthase-like enzymes include: Chalcone synthase ( ) Ketoacyl-ACP synthase III (FabH; ) Polyketide synthases 3-hydroxy-3-methylglutaryl CoA synthase ( ) Dihydropinosylvin synthase
