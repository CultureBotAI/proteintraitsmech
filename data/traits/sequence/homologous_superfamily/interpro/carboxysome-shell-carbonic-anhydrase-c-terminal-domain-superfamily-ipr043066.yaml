identifier: InterPro:IPR043066
label: "Carboxysome shell carbonic anhydrase, C-terminal domain superfamily"
definition: >-
  Carboxysome Shell Carbonic Anhydrase (Csos3) is a bacterial carbonic anhydrase localised in the carboxysome, where it converts bicarbonate ions to carbon dioxide for use in carbon fixation. This superfamily represents one of the three domains of Csos3, the C-terminal domain, which has a weak structural similarity to the central catalytic domain.
