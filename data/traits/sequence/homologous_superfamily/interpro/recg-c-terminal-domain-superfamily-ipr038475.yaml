identifier: InterPro:IPR038475
label: "RecG, C-terminal domain superfamily"
definition: >-
  This domain is found in the C-terminal section of the ATP-dependent DNA helicase RecG. It may interact selectively and non-covalently with ATP, adenosine 5'-triphosphate, a universally important coenzyme and enzyme regulator. The domain is also found in a number of other proteins, many of which are putative transcriptional regulators.
