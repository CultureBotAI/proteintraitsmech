identifier: InterPro:IPR024073
label: Argininosuccinate synthetase mutimerisation domain, C-terminal tail
definition: >-
  The argininosuccinate synthetase (AS) monomer is composed of a nucleotide binding domain and a catalytic/multimerisation domain. The catalytic/multimerisation domain possesses a C-terminal tail, which is involved in protein dimerisation and tetramerisation. The tail contains two α helices. In a subset of bacterial species, it also contains a short terminal β structure. This superfamily represents the C-terminal tail containing the α helices and the β structure.
