identifier: InterPro:IPR038138
label: "Phosphopantoate/pantothenate synthetase superfamily"
definition: >-
  Proteins in this superfamily include pantothenate synthetase ( ) from Methanosarcina mazei and 4-phosphopantoate--beta-alanine ligase, also known as phosphopantothenate synthetase, ( ) from Pyrococcus kodakaraensis. Pantothenate synthetase catalyses the condensation of pantoate with beta-alanine in an ATP-dependent and ADP-producing reaction. 4-phosphopantoate--beta-alanine ligase catalyses the conversion of (R)-4-phosphopantoate and beta-alanine to 4'-phosphopantothenate in the CoA biosynthesis pathway. It cannot use (R)-pantoate as substrate and thus does not display pantothenate synthetase (PS) activity.
