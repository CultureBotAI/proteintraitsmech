identifier: InterPro:IPR038236
label: "GlpG peptidase, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal cytoplasmic domain of the rhomboid intra-membraneous serine protease GlpG, otherwise known as peptidase S54. It is not clear exactly what the function of this domain is in the protease, but its presence is critical for maintaining a catalytically competent state for the protein. The tertiary structure of the GlpG protein from Escherichia coli has been determined. The GlpG protein has six transmembrane domains (other members of the family are predicted to have seven), with the N- and C-terminal ends anchored in the cytoplasm. One transmembrane domain is shorter than the rest, creating an internal, aqueous cavity just below the membrane surface and it is here were proteolysis occurs. There is also a membrane-embedded loop between the first and second transmembrane domains which is postulated to act as a gate controlling substrate access to the active site.
