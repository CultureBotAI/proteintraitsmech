identifier: InterPro:IPR043010
label: "Phenol hydroxylase domain superfamily"
definition: >-
  Phenol hydroxylase (PH) belongs to a family of bacterial multicomponent monooxygenases (BMMs) with carboxylate-bridged diiron active sites. These enzymes effect dioxygen activation and subsequent hydrocarbon substrate oxidation at diiron active sites located within hydrophobic pockets in the alpha-subunits of the 200-250kDa heterodimeric, (α-β-gamma)2, hydroxylase protein.
