identifier: InterPro:IPR049300
label: "Gp22-like superfamily"
definition: >-
  This entry includes Gp22 from Bacillus phage SPP1 ( ), a protein that shows a significant structural similarity with the N-terminal shoulder domain ( ) of Receptor binding protein from Lactococcus phage p2 (RBP). It folds into two small three-stranded antiparallel β-sheets and one large five-stranded mixed β-sheet forming a pseudo-β-sandwich. Members of this protein family are found in tailed bacteriophages and prophages from firmicutes.
