identifier: InterPro:IPR038472
label: "DNA sulphur modification protein DndE superfamily"
definition: >-
  This entry describes the DndE protein encoded by an operon associated with a sulphur-containing modification to DNA (phosphorothioation). The operon is sporadically distributed in bacteria, much like some restriction enzyme operons. DndE is part of a protein complex that also includes IscS, DndC, and DndE, involved in phosphorothioation (PT). DndE binds to DNA in vitro, with a preference for nicked dsDNA, but its nicked dsDNA-binding capacity does not seem essential for PT modification.
