identifier: InterPro:IPR038577
label: "GT10-like, C-terminal domain superfamily"
definition: >-
  Structural domains comprising this superfamily share the structure of the C-terminal domain of Glycosyltransferase family 10 (GT10). The C-terminal domain plays an important role in acceptor binding and specificity. Glycosyltransferase family 10 ( ) comprises enzymes with two known activities; galactoside 3(4)-L-fucosyltransferase ( ) and galactoside 3-fucosyltransferase ( ). The galactoside 3-fucosyltransferases display similarities with the alpha-2 and alpha-6-fucosyltranferases. The biosynthesis of the carbohydrate antigen sialyl Lewis X (sLe(x)) is dependent on the activity of an galactoside 3-fucosyltransferase. This enzyme catalyses the transfer of fucose from GDP-beta-fucose to the 3-OH of N-acetylglucosamine present in lactosamine acceptors.
