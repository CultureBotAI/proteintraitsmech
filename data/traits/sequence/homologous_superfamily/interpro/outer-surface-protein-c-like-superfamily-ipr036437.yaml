identifier: InterPro:IPR036437
label: Outer surface protein C-like superfamily
definition: >-
  Members of this superfamily are lipoproteins that are probably involved in evasion of the host immune system by pathogens. Borrelia burgdorferi, the causative agent of Lyme disease, has the potential of producing more than 100 different lipoproteins that could become anchored to the outer membrane. One of these is outer surface protein C (OspC). OspC is a largely α-helical protein that forms a dimer with a characteristic central four-helical bundle formed by association of the two longest helices from each subunit.
