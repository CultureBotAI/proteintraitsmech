identifier: InterPro:IPR029064
label: "Ribosomal protein eL30-like superfamily"
definition: >-
  This superfamily represents a domain found in eL30/eL8 (also known as L30e and L7ae, respectively) ribosomal proteins, the N-terminal domain in a variety of bacterial and mitochondrial RNA 2'-O ribose methyltransferases and the C-terminal domain of the release factor eRF1.
