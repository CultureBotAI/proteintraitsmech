identifier: InterPro:IPR008965
label: CBM2/CBM3, carbohydrate-binding domain superfamily
definition: >-
  This carbohydrate-binding domain superfamily is found in a number of proteins, such as the chitobiase/beta-hexosaminidase family of glycoside hydrolases, bacterial cellulases and xylanases, and the bacterial scafoldin, cellobiose and cohesin proteins. The carbohydrate-binding domain consists of a β-sandwich formed of 9 strands in 2 sheets with a Greek-key topology and is a sub-class of the immunoglobin-like fold.
