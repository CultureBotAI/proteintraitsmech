identifier: InterPro:IPR038355
label: "Tumor necrosis factor alpha-induced protein 8-like superfamily"
definition: >-
  Four tumor necrosis factor alpha-induced protein 8-like proteins have been identified: TNFAIP8 (also known as TIPE), TIPE1, TIPE2 and TIPE3. Overexpressed TIPE in cells can reduce cell death in vitro and increase tumor growth in vivo. By contrast, TIPE2 has been demonstrated to be an inhibitor of Ras and to have a pro-apoptotic ability. TIPE1 could upregulate the pro-apoptotic members of the B-cell leukemia/lymphoma (Bcl)-2 family of proteins.
