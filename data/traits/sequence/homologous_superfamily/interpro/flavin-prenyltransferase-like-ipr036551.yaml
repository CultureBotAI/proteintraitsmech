identifier: InterPro:IPR036551
label: Flavin prenyltransferase-like
definition: >-
  This entry contains a diverse range of flavoprotein enzymes, including epidermin decarboxylase, EpiD, which has been shown to be a flavoprotein that binds FMN. This enzyme catalyses the removal of two reducing equivalents from the cysteine residue of the C-terminal meso-lanthionine of epidermin to form a --C==C-- double bond. This superfamily also includes the B-chain of dipicolinate synthase. Dipicolinate synthase catalyses the formation of dipicolinic acid from dihydroxydipicolinic acid. Dipicolinic acid is a small polar molecule that accumulates to high concentrations in bacterial endospores and is thought to play a role in spore heat resistance, or the maintenance of heat resistance. This superfamily also includes phenolic acid decarboxylase (also known as phenylacrylic acid decarboxylase [ec:4.1.1.-]).
