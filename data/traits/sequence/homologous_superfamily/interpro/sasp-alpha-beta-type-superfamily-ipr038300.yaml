identifier: InterPro:IPR038300
label: "SASP, alpha/beta-type superfamily"
definition: >-
  Small, acid-soluble spore proteins (SASP or ASSP) are proteins bound to the spore DNA of bacteria of the genera Bacillus, Thermoactynomycetes, and Clostridium. They are double-stranded DNA-binding proteins that cause DNA to change to an A-like conformation. They protect the DNA backbone from chemical and enzymatic cleavage and are thus involved in dormant spore's high resistance to UV light. SASP are degraded in the first minutes of spore germination and provide amino acids for both new protein synthesis and metabolism. There are two distinct families of SASP: the α/β type and the gamma-type. Alpha/beta SASP are small proteins of about sixty to seventy amino acid residues that are generally coded by a multigene family. The N terminus of alpha/beta SASP contains the site which is cleaved by a SASP-specific protease that acts during germination while the C terminus and is probably involved in DNA-binding.
