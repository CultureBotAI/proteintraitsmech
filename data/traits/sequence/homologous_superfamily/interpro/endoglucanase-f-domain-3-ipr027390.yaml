identifier: InterPro:IPR027390
label: "Endoglucanase F, domain 3"
definition: >-
  This entry represents a structurally irregular domain found in endoglucanase F. Proteins containing this domain include endoglucanases and exoglucanases. They are involved in the cellulose catabolic process.
