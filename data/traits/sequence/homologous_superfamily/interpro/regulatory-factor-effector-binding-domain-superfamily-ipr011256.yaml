identifier: InterPro:IPR011256
label: "Regulatory factor, effector binding domain superfamily"
definition: >-
  The effector domain is found in bacterial transcription factors and other regulatory proteins. The effector domain consists of a duplicated β/α/β motif, where the antiparallel β sheets form a barrel structure. Several proteins contain this domain. For example, the multidrug-binding domain of the transcription factor BmrR, which transcriptionally regulates multidrug transporters. This domain is also present at the C-terminal domain of the Rob transcription factor, which regulates genes involved in resistance to antibiotics, organic solvents, and heavy metals. Additionally, the effector domain can be found in the gyrase inhibitory protein GyrI (SbmC, TeeB) that suppresses cell proliferation by inhibiting bacterial gyrase activity. This domain is also found in heme-binding proteins 1-2 (HEBP1-2) and testis-expressed 264 proteins found in eukaryotes. HEBP1-2 are part of the heme-binding protein HBP/SOUL family, which represents a group of evolutionary conserved putative heme-binding proteins. In humans, HEBP1 binds metalloporphyrins, free porphyrins and N-methylprotoporphyrins with similar affinities. HEBP2, in humans, can promote mitochondrial permeability transition and facilitate necrotic cell death under different types of stress conditions.
