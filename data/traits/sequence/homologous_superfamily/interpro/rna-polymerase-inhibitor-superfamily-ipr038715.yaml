identifier: InterPro:IPR038715
label: "RNA polymerase inhibitor superfamily"
definition: >-
  This entry represents RNA polymerase inhibitor, including Gp2 from T7-like viruses. Bacterial RNA polymerase inhibitor, which is expressed in the late stage of lytic development, is also essential for continuous synthesis of phage DNA and functions in the packaging of the viral genome into the mature phage particle. It inhibits the bacterial host RNA polymerase by interacting with the RpoC subunit and inhibiting the formation of a promoter complex. Gp2 folds into a compact globular domain consisting of a three-stranded β sheet that packs against an α-helix with a beta1beta2alpha1beta3 topology. The central beta2 strand is flanked by antiparallel beta1 and beta3 strands. Positive and negative charges are at opposite sides on the surface of the molecule. Two conserved arginine residues located on one side are important for binding to and inhibition of host RNA polymerase.
