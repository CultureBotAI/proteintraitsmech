identifier: InterPro:IPR036554
label: "GHMP kinase, C-terminal domain superfamily"
definition: >-
  This domain superfamily is found in homoserine kinases ( ), galactokinases ( ) and mevalonate kinases ( ). These kinases make up the GHMP kinase superfamily of ATP-dependent enzymes. These enzymes are involved in the biosynthesis of isoprenes and amino acids as well as in carbohydrate metabolism. The C-terminal domain of homoserine kinase has a central α-β plait fold and an insertion of four helices, which, together with the N-terminal fold, create a novel nucleotide binding fold. This domain superfamily is also found in some diphosphomevalonate decarboxylases, which are structurally related members of the GHMP superfamily, but do not possess kinase activity.
