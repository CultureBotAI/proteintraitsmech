identifier: InterPro:IPR011076
label: Malate synthase superfamily
definition: >-
  Malate synthase (MS) ( ) catalyses the aldol condensation of glyoxylate with acetyl-CoA to form malate as part of the second step of the glyoxylate bypass and an alternative to the tricarboxylic acid cycle in bacteria, fungi and plants. There have been identified two isoforms, A and G (MSA and MSG, respectively) that differ in size and is attributed to an inserted α/β domain in MSG that may have regulatory function. MSA and MSG consist of an N-terminal α-helical clasp domain, a central TIM-barrel domain and a C-terminal helical plug domain. In malate synthases, the TIM β/α-barrel fold and the C-terminal helical domain are well conserved and the cleft between them forms the active site. This entry includes encoded by ugl gene from zebrafish, which has been recently described as being originated from a duplication of the malate synthase gene, but sequence changes have resulted in loss of malate synthase activity and instead it has ureidoglycolate lyase activity.
