identifier: InterPro:IPR015950
label: Chemokine-binding M3, subdomain 1, viral
definition: >-
  This entry represents a β-sandwich domain found in a group of viral chemokine binding proteins. These proteins bind with CC-chemokine MCP-1, acting as cytokine decoy receptors. For example, the murine herpesvirus decoy receptor M3 acts as an immune system saboteur by altering host anti-viral inflammatory repsonses. M3 adopts a structure consisting of two different β-sandwich domains of partial topological similarity to immunoglobulin-like folds. This entry represents the N-terminal β-sandwich domain.
