identifier: InterPro:IPR036189
label: mRNA decapping protein 2, Box A domain superfamily
definition: >-
  This superfamily represents the box A specific to mRNA decapping protein 2 , Dcp2, the catalytic subunit of the mRNA-decapping enzyme, which is found at the N-terminal of the NUDIX hydrolase domain . Removal of the cap structure is mediated by the Dcp1-Dcp2 complex. The Box A domain contains a four helices fold and an orthogonal array of two α-hairpins topology.
