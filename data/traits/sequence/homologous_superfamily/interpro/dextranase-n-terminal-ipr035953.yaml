identifier: InterPro:IPR035953
label: "Dextranase, N-terminal"
definition: >-
  Dextranase and isopullulanase are members of glycoside hydrolase family 49. Dextranase hydrolyses alpha-1,6-glycosidic bonds in dextran polymers. The N-terminal domain of these enzymes forms a β-sandwich structure that is similar to the immunoglobulin fold but contains two extra strands..
