identifier: InterPro:IPR036471
label: "Colicin D superfamily"
definition: >-
  Colicin D is a bacteriocin that kills target cells by cleaving tRNA(Arg). Colicin D immunity protein (ImmD) inhibits the bactericidal activity of colicin D by binding to its tRNase catalytic domain. This entry represents the domain containing four-helical up-and-down bundle found in ImmD and related klebicin and microcin immunity proteins.
