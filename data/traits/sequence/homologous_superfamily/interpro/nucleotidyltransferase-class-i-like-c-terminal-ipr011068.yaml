identifier: InterPro:IPR011068
label: Nucleotidyltransferase, class I-like, C-terminal
definition: >-
  Nucleotidytransferases can be divided into two classes based on highly conserved features of the nucleotidyltransferase motif. Class I enzymes include eukaryotic poly(A) polymerase (PAP), archaeal tRNA CCA-adding enzyme and possibly DNA polymerase beta, while class II enzymes include eukaryotic and eubacterial tRNA CCA-adding enzymes. This superfamily represents the C-terminal domain of class I nucleotidyltransferases. The C-terminal domain has an α/β sandwich fold, although the archaeal tRNA CCA-adding enzyme has a large insertion; this fold is reminiscent of the RNA-recognition motif fold.
