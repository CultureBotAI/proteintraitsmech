identifier: InterPro:IPR036535
label: "STAT transcription factor, N-terminal domain superfamily"
definition: >-
  The STAT protein (Signal Transducers and Activators of Transcription) family contains transcription factors that are specifically activated to regulate gene transcription when cells encounter cytokines and growth factors, hence they act as signal transducers in the cytoplasm and transcription activators in the nucleus. The N-terminal domain of STAT is responsible for protein interactions. This domain has a multi-helical structure assembled into a hook-like structure.
