identifier: InterPro:IPR036025
label: tRNA-splicing ligase RtcB-like superfamily
definition: >-
  RctB is a RNA ligase that mediates the joining of broken tRNA-like stem-loop structures in case of tRNA damage. It probably participates to tRNA restriction-repair by ligating broken tRNA-like stem-loop structures with 2',3'-cyclic phosphate and 5'-OH ends to form a splice junction with a 2'-OH, 3',5'-phosphodiester. In worms, this protein has as a neuroprotective role in the age-dependent degeneration of dopamine neurons. This family also includes the homologue Antirepressor ArmZ from Pseudomonas aeruginosa.
