identifier: InterPro:IPR013319
label: Glycoside hydrolase family 11/12
definition: >-
  Glycoside hydrolase family 11 comprises enzymes with only one known activity, xylanase, while family 12 comprises enzymes with two known activities, endoglucanase and xyloglucan hydrolase. O-Glycosyl hydrolases are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
