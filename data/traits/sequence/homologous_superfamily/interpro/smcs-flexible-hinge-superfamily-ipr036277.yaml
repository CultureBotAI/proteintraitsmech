identifier: InterPro:IPR036277
label: SMCs flexible hinge superfamily
definition: >-
  This entry represents the hinge region superfamily of the SMC (Structural Maintenance of Chromosomes) family of proteins. The hinge region is responsible for formation of the DNA interacting dimer. It is also possible that its precise structure is an essential determinant of the specificity of the DNA-protein interaction. The structure of this hinge region consists of two different α+β subdomains and forms subdomain-swapped dimers.
