identifier: InterPro:IPR036147
label: Anti sigma-E protein RseA, N-terminal domain superfamily
definition: >-
  Sigma-E is important for the induction of proteins involved in heat shock response. RseA binds sigma-E via its N-terminal domain, sequestering sigma-E and preventing transcription from heat-shock promoters. The C-terminal domain is located in the periplasm, and may interact with other protein that signal periplasmic stress. The structure of the RseA N-terminal domain presents a four helices fold.
