identifier: InterPro:IPR037253
label: "TrmB/BL1, C-terminal domain superfamily"
definition: >-
  TrmB is an alpha-glucoside sensing transcriptional regulator. The protein is the transcriptional repressor for a gene cluster encoding trehalose/maltose ABC transporter in Thermococcus litoralis and Pyrococcus furiosus. A nonreducing glucosyl residue is shared by all substrates bound to TrmB which suggests that its a common recognition motif. The sugar-binding domain (EBD) consists of two subdomains, N- and C-terminal. This entry represents the C-terminal subdomain of EBD of TrmB and TrmBL1. TrmBL2 lacks the C-terminal subdomain.
