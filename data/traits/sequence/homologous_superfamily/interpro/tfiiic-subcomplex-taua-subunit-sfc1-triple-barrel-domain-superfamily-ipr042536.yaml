identifier: InterPro:IPR042536
label: "TFIIIC, subcomplex tauA subunit Sfc1, triple barrel domain superfamily"
definition: >-
  TFIIIC (transcription factor III C) is a multisubunit complex, divided in 2 subcomplexes, tauA and tauB, that recognise and bind to A-box and B-box gene promoters. This superfamily represents the N-terminal domain of Sfc1 (also known as Tfc1 in budding yeasts and GTF3C5 in humans), a subunit of the subcomplex tauA. The N-terminal Sfc1/Sfc7 dimerization module consists of a triple β-barrel, whereas the C-terminal Sfc1 DNA-binding domain contains a winged-helix domain.
