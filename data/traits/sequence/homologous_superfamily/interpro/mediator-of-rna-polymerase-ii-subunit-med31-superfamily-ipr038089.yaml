identifier: InterPro:IPR038089
label: "Mediator of RNA polymerase II, subunit Med31 superfamily"
definition: >-
  The Mediator complex is a coactivator involved in the regulated transcription of nearly all RNA polymerase II-dependent genes. Mediator functions as a bridge to convey information from gene-specific regulatory proteins to the basal RNA polymerase II transcription machinery. The Mediator complex, having a compact conformation in its free form, is recruited to promoters by direct interactions with regulatory proteins and serves for the assembly of a functional preinitiation complex with RNA polymerase II and the general transcription factors. On recruitment the Mediator complex unfolds to an extended conformation and partially surrounds RNA polymerase II, specifically interacting with the unphosphorylated form of the C-terminal domain (CTD) of RNA polymerase II. The Mediator complex dissociates from the RNA polymerase II holoenzyme and stays at the promoter when transcriptional elongation begins. This entry includes subunit Med31 of the Mediator complex and the Saccharomyces cerevisiae homologue, Soh1. Soh1 is responsible for the repression of temperature sensitive growth of the Hpr1 mutant and has been found to be a component of the RNA polymerase II transcription complex. Soh1 not only interacts with factors involved in DNA repair, but transcription as well. Thus, the Soh1 protein may serve to couple these two processes. Med31 is organised as a four helix bundle and with the N-terminal part of subunit Med7 forms a submodule of the middle module of the mediator core which is unique in structure and function. In vivo, Med7N/31 has a predominantly positive function on the expression of a specific subset of genes, including genes involved in methionine metabolism and iron transport.
