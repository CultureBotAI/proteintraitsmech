identifier: InterPro:IPR037225
label: "NADH-ubiquinone oxidoreductase 51kDa subunit, FMN-binding domain superfamily"
definition: >-
  This superfamily represents the FMN-binding domain for NADH-ubiquinone oxidoreductase 51kDa subunit from NADH:ubiquinone oxidoreductase. Its structure is composed of three layers (α/β/α) with a parallel β-sheet of four strands. Among the many polypeptide subunits that make up complex I, there is one with a molecular weight of 51kDa (in mammals), which is the second largest subunit of complex I. The 51kDa subunit, as the corresponding bacterial subunit (Nqo1 in Thermus and NuoF in E. coli), contains the NADH-binding site, the primary electron acceptor FMN-binding site, and a 4Fe-4S cluster.
