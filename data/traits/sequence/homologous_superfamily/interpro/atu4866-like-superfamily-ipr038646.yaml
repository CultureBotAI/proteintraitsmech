identifier: InterPro:IPR038646
label: "Atu4866-like superfamily"
definition: >-
  The function of the proteins in this entry is not known, though Atu4866 from Agrobacterium tumefaciens has been structurally characterised. Atu4866 adopts a streptavidin-like fold and has a β-barrel/sandwich which is formed by eight antiparallel β-strands. Atu4866 has a potential ligand-binding site where it has a stretch of conserved residues on the surface.
