identifier: InterPro:IPR011045
label: "Nitrous oxide reductase, N-terminal"
definition: >-
  This entry represents the 7-bladed β-propeller domain found in YbhE 6-phosphogluconolactonase, nitrous oxide reductase, and WD repeat-containing proteins. Nitrous oxide (N2O) reductase ( ) is a copper-containing enzyme that catalyses the two-electron reduction of the greenhouse gas N2O to N2. N2O reductase has two domains: an N-terminal 7-bladed β-propeller domain that contains the CuZ catalytic centre and a C-terminal domain with a cupredoxin fold that is homologous to the CuA domain of bovine cytochrome c oxidase (COXII). 6-phosphogluconolactonases (6PGL) are cytosolic enzymes found in all organisms that catalyse the hydrolysis of 6-phosphogluconolactone to 6-phosphogluconic acid in the oxidative phase of the pentose phosphate pathway. Trypanosoma brucei and other characterised 6PGL proteins share an α/β hydrolase fold, with both parallel and anti-parallel β-sheets surrounded by eight α-helices. In Escherichia coli (strain K12), 6PGL (YbhE) is characterised by a 7-bladed β-propeller fold ( ).
