identifier: InterPro:IPR023674
label: "Ribosomal protein uL1-like"
definition: >-
  This entry represents a structural domain common to several uL1 ribosomal proteins, and related proteins. It consists of one α/β subdomain interrupted by another α/β subdomain. Ribosomal protein uL1 is the largest protein from the large ribosomal subunit. In Escherichia coli, uL1 is known to bind to the 23S rRNA:
