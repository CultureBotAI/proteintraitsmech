identifier: InterPro:IPR043114
label: "T26-6p, C-terminal domain superfamily"
definition: >-
  The T26-6p protein, a large protein encoded by a plasmid from the hyperthermophilic archaea Thermococcus, consists of three domains - two β-sandwich domains and a bundle of five α-helices. The C-terminal domain is a five-helical bundle that contains five antiparallel helices. The function of these domains is unknown.
