identifier: InterPro:IPR042042
label: "Protein transport protein Tip20, domain B"
definition: >-
  The Dsl1p vesicle tethering complex is composed of three subunits, essential for trafficking from the Golgi apparatus to the ER. Two of the three subunits, Tip20p and Dsl1p, resemble known subunits of the exocyst complex, establishing a structural connection among several multi-subunit tethering complexes and implying that many of their subunits are derived from a common progenitor. The structure of Tip20p consists entirely of α-helices and intervening loops of variable length, organised into a series of helix bundle domains. This superfamily represents the Tip20p subunit domain B.
