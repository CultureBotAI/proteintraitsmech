identifier: InterPro:IPR038651
label: "Yeast killer toxin superfamily"
definition: >-
  Proteins in this superfamily, which are produced by Williopsis fungi, adopt a secondary structure consisting of eight strands in two β sheets, in a Greek-key topology. They are toxic, killing sensitive strains of yeast.
