identifier: InterPro:IPR009030
label: "Growth factor receptor cysteine-rich domain superfamily"
definition: >-
  This entry represents a growth factor receptor domain superfamily, which is a cysteine-rich region that is found in a variety of eukaryotic proteins that are involved in the mechanism of signal transduction by receptor tyrosine kinases. Proteins containing the growth factor receptor domain include the insulin-like growth factor-binding proteins (IGFBP), the type-1 insulin-like growth factor receptor (IGF-1R), and members of the epidermal growth factor (EGF) receptor family, such as the receptor protein-tyrosine kinase Erbb-3 (ErbB3). The general structure of the growth factor receptor domain is a disulphide-bound fold containing a β-hairpin with two adjacent disulphides. IGFBPs control the distribution, function and activity of insulin-like growth factors (IGFs), IGF-I and IGF-II, which are key regulators of cell proliferation, differentiation and transformation. All IGFBPs share a common domain organisation, where the highest conservation is found in the N-terminal Cys-rich IGF-binding domain. The N-terminal domain contains 10-12 conserved cysteine residues. IGF-1R is a member of the tyrosine-kinase receptor superfamily that is involved in both normal growth and development and malignant transformation. The Cys-rich domain is flanked by two L-domains, and together they contribute to hormone binding and ligand specificity, even though they do not bind the ligand directly. The Cys-rich region is composed of eight disulphide-bonded modules, seven of which form a rod-shaped domain.
