identifier: InterPro:IPR027362
label: "DNA topoisomerase I, C-terminal"
definition: >-
  Type I topoisomerases (type IB isomerases) relax positive and negative supercoils and are very important in DNA replication. The C-terminal segment of this enzyme constitutes the catalytic domain. The catalytic domain contains five amino acids, conserved in all eukaryotic type IB topoisomerases. Its structure consists of ten α helices and a three-strand β sheet, and resembles the catalytic domains of site-specific recombinases that act via a topoisomerase IB-like mechanism. This entry represents the carboxyl lobe of the catalytic domain (domain 2), and consists of four α-helices (helices 6-10).
