identifier: InterPro:IPR038517
label: "MxiM superfamily"
definition: >-
  MxiM, a Shigella pilot protein (also known as type 3 secretion system pilotin), is essential for the assembly and membrane association of the Shigella secretin MxiD. MxiM contains an orthologous secretin component and has a specific binding domain for the acyl chains of bacterial lipids. The C-terminal domain of MxiD hinders lipid binding to MxiM. Structurally, MxiM consists of 10 β strands, 1 α helix and 1 3(10)-helix. These 10 β strands are arranged into a β barrel, which is discontinuous since the α helix interrupts the strands.
