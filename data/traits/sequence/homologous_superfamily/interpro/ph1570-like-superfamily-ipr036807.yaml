identifier: InterPro:IPR036807
label: "PH1570-like superfamily"
definition: >-
  This domain is found in a family of proteins that include a hypothetical protein from Pyrococcus horikoshii, which has no known function. It contains six α helices and eight β strands and is thought to be monomeric.
