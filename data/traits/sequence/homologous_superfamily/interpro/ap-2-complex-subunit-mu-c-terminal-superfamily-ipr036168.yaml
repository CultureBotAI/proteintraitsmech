identifier: InterPro:IPR036168
label: "AP-2 complex subunit mu, C-terminal superfamily"
definition: >-
  This superfamily describes the C-terminal domain of the Mu subunit (Mu2-adaptin, AP50) of adaptor protein (AP) complexes AP-1, AP-2, AP-3, and AP-4. It has an elongated, banana-shaped, all β-sheet structure. It can be considered as two β-sandwich subdomains (A and B), with subdomain B inserted between strands 6 and 15 of subdomain A, and joined edge to edge such that the convex surface is a continuous nine-stranded mixed β-sheet that runs the whole length of the molecule. The tyrosine based signal binds to a site on the surface of two parallel β-sheet strands (β1 and β16) in subdomain A.
