identifier: InterPro:IPR020568
label: "Ribosomal protein uS5 domain 2-type superfamily"
definition: >-
  The founding member of this superfamily is the second domain of the small ribosomal subunit protein uS5. This domain adopts α/β fold consisting of four-stranded mixed β-sheet and two helices packed on one side of it. Typical features for this superfamily are the psi-loop between strands 2 and 3; and the left-handed crossover between strands 3 and 4. Domain 2 of the ribosomal protein uS5 has a left-handed, 2-layer α/β fold with a core structure consisting of β(3)-α-β-α. Domains with this fold are found in numerous RNA/DNA-binding proteins, as well as in kinases from the GHMP kinase family. Proteins containing this α/β fold domain include: Translational machinery components (ribosomal proteins S5 and S9, and domain IV of elongation factors EF-G and eEF-2). Ribonuclease P protein (RNase P). Ribonuclease PH (domain 1), as well as various exosome complex exonucleases (RRP41, RRP42, RRP43, RRP45, RRP46, MTR3, ECX1, ECX2). DNA modification proteins (DNA mismatch repair proteins MutL and PMS2, DNA gyrase B, DNA topoisomerase II, IV-B and VI-B). GHMP kinases that transfer a phosphoryl group from ATP to an acceptor (galactokinase, homoserine kinase, and mevalonate kinase). Caenorhabditis elegans early switch protein Xol-1 (a divergent member of the GHMP kinase family that has lost the ATP-binding site). Hsp90 chaperone (middle domain), which is related to the DNA gyrase/MutL family; this domain contains an extra C-terminal α/β subdomain. Imidazole glycerol phosphate dehydratase, which contains a duplication consisting of two structural repeats of this fold. The catalytic domain of ATP-dependent protease Lon (La), which contains an extra C-terminal α/β subdomain. Formaldehyde-activating enzyme FAE, which contains a modification of this fold consisting of an extra α/β…
