identifier: InterPro:IPR036984
label: "NrpR domain superfamily"
definition: >-
  This superfamily describes the NRD domain, which consists of two halves. The helices from each half are located near the centre of the NRD domain forming an α-helical layer onto which the β-sheets are sandwiched from either side. A large cleft is formed between the two halves of the NRD regulatory domain. NrpR is an transcriptional repressor of nitrogen assimilation genes found primarily in Euryarchaeota. In the thermophilic archaeon Methanocaldococcus jannaschii it consists of a putative N-terminal winged helix-turn-helix (wHTH) domain used for DNA binding followed by two NrpR regulatory domains (NRD1 and NRD2) that sense and bind 2-oxoglutarate. In different organisms, NrpR proteins can vary on how many NrpR regulatory domains they contain and in their configuration. They can contain two NrpR domains, or one NrpR domain with or without the N-terminal HTH motif.
