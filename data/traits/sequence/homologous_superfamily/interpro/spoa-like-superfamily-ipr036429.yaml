identifier: InterPro:IPR036429
label: "SpoA-like superfamily"
definition: >-
  Proteins of the surface presentation of antigen (SpoA) group are involved in a secretory pathway responsible for the surface presentation of invasion plasmid antigen needed for the entry of Salmonella and other species into mammalian cells.They could play a role in preserving the translocation competence of the IPA antigens and are required for secretion of the three IPA proteins. The SpoA structure is composed of a segment-swapped dimer forming two identical conjoint barrels fold and is topologically similar to the FMN-binding split barrel. This entry represents the C-terminal region of Flagellar motor switch proteins FliN and FliM and similar proteins mainly found in bacteria. This domain seems to play a key role in flagellation.
