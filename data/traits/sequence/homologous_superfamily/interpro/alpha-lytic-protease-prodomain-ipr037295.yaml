identifier: InterPro:IPR037295
label: "Alpha-lytic protease prodomain"
definition: >-
  This entry represents the prodomain of alpha-lytic endopeptidase. Alpha-lytic endopeptidase is synthesised as a pro-enzyme where its pro region (Pro) acts as a foldase to stabilise the transition state for the folding reaction. Pro also functions as a potent folding catalyst when supplied as a separate polypeptide chain. In the absence of Pro, alpha-lytic endopeptidase folds only partially to a stable molten globule-like intermediate state. Addition of Pro to this intermediate leads to rapid formation of native alpha-lytic endopeptidase.
