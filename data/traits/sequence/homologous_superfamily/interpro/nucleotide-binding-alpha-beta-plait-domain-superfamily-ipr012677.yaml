identifier: InterPro:IPR012677
label: "Nucleotide-binding alpha-beta plait domain superfamily"
definition: >-
  This superfamily represents nucleotide-binding domains with an α-β plait structure, which consists of either a ferredoxin-like (β-α-β)2 fold, such as that found in RNA-binding domains of various ribonucleoproteins or in viral DNA-binding domains; or a β-(α)-β-α-β(2) fold, such as that found in the ribosomal protein L23.
