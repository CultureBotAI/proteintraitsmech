identifier: InterPro:IPR014716
label: "Fibrinogen, alpha/beta/gamma chain, C-terminal globular, subdomain 1"
definition: >-
  Fibrinogen plays key roles in both blood clotting and platelet aggregation. During blood clot formation, the conversion of soluble fibrinogen to insoluble fibrin is triggered by thrombin, resulting in the polymerisation of fibrin, which forms a soft clot; this is then converted to a hard clot by factor XIIIA, which cross-links fibrin molecules. Platelet aggregation involves the binding of the platelet protein receptor integrin α(IIb)-β(3) to the C-terminal D domain of fibrinogen. In addition to platelet aggregation, platelet-fibrinogen interaction mediates both adhesion and fibrin clot retraction. This superfamily represents a subdomain of the C-terminal globular D domain found in fibrinogen alpha, beta and gamma chains, and related domains found in protein involved in protein or cell binding.
