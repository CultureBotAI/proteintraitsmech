identifier: InterPro:IPR038705
label: "YabP superfamily"
definition: >-
  This superfamily represents the YabP protein of the bacterial sporulation program, as found in Bacillus subtilis, Clostridium tetani, and other spore-forming members of the Firmicutes. In B. subtilis, a yabP single mutant appears to sporulate and germinate normally, but is in an operon with yabQ (essential for formation of the spore cortex), it near-universal among endospore-forming bacteria, and is found nowhere else. YabP is involved in spore coat assembly during the process of sporulation.
