identifier: InterPro:IPR036100
label: S-adenosylmethionine:tRNA ribosyltransferase-isomerase, QueA superfamily
definition: >-
  This entry represents the S-adenosylmethionine:tRNA ribosyltransferase-isomerase, QueA. Queuosine is a hypermodified nucleoside that usually occurs in the first position of the anticodon of tRNAs specifying the amino acids asparagine, aspartate, histidine, and tyrosine. The hypermodified nucleoside is found in bacteria and eukaryotes. Queuosine is synthesized de novo exclusively in bacteria; for eukaryotes the compound is a nutrient factor. Queuosine biosynthesis protein, or S-adenosylmethionine:tRNA-ribosyltransferase-isomerase (QueA) catalyses the formation of the 2,3-epoxy-4,5-dihydroxycyclopentane ring of the Q precursor epoxyqueuosine (oQ). S-adenosyl-L-methionine (AdoMet) reacts with 7-aminomethyl-7-deazaguanine of tRNA at position 34 to yield adenine, methionine, and a modified tRNA with oQ at position 34. QueA consists of two domains: domain 1 has three layers (α/β/α)), while domain 2 is a closed β-barrel with Greek-key topology.
