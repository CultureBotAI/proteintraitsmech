identifier: InterPro:IPR036622
label: "Dioxygenase LigAB, LigA subunit superfamily"
definition: >-
  LigAB is a protocatechuate 4,5-dioxygenase that belongs to the extradiol class III enzyme family. The LigA subunit of this enzyme is multi-helical, containing a compact array of six short helices.
