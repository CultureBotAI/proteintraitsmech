identifier: InterPro:IPR038171
label: "Peptidase M64, N-terminal domain superfamily"
definition: >-
  This domain is found at the N-terminal of IgA Peptidase M64, a family of highly selective metallo-endopeptidases, in this case for IgA, the major class of immunoglobulin in human mucosal secretions. This protein is produced by Clostridium ramosum, a member of the normal flora in the human intestine which is very rarely associated with disease. It has been suggested that these peptidases enable these bacteria to escape specific immune defence on mucosal surfaces. Its function is unknown.
