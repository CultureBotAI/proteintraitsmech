identifier: InterPro:IPR036184
label: "IBP39, C-terminal domain superfamily"
definition: >-
  Initiator binding protein 39kDa (IBP39) recognises the initiator (Inr), which in Trichomonas vaginalis is solely responsible for transcription start site selection. IBP39 consists of an N-terminal Inr binding domain, a flexible linker, and a C-terminal domain. The C-terminal domain interacts with the RNAP II large subunit C-terminal domain. Binding of IBP39 to Inr recruits RNAP II and initiates transcription.
