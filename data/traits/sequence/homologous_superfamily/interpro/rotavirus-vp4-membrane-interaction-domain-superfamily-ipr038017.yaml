identifier: InterPro:IPR038017
label: "Rotavirus VP4, membrane interaction domain superfamily"
definition: >-
  The spike protein VP4 is a key component of the membrane penetration apparatus of rotavirus. This entry represents the VP4 membrane interaction domain superfamily. The VP4 membrane interaction domain is divided into two subdomains. The first one has a complexed all-β fold and the second one has a coiled-coil (trimeric) helical region.
