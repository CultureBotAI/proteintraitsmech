identifier: InterPro:IPR043135
label: "Ferric-uptake regulator, C-terminal domain"
definition: >-
  The ferric uptake regulator (Fur) family includes metal ion uptake regulator proteins, which are responsible for controlling the intracellular concentration of iron in many bacteria. Some members sense metal ions other than Fe2. For example, the zinc uptake regulator (Zur) responds to Zn2, the manganese uptake regulator (Mur) responds to Mn2 , and the nickel uptake regulator (Nur) responds to Ni2. Fur family proteins contain an N-terminal winged-helix DNA-binding domain followed by a C-terminal dimerisation domain. This entry represents the dimerisation domain in which three antiparallel β-strands are covering a long α-helix.
