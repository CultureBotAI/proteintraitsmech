identifier: InterPro:IPR042076
label: "Crisp-like domain"
definition: >-
  This superfamily represents a domain found in Cysteine-rich venom proteins or Cysteine-rich secretory proteins (Crisp). It is found in the mammalian reproductive tract and the venom of reptiles, and has been shown to regulate ryanodine receptor Ca2+ signalling. It contains 10 conserved cysteines which are all involved in disulphide bonds and is structurally related to the ion channel inhibitor toxins BgK and ShK.
