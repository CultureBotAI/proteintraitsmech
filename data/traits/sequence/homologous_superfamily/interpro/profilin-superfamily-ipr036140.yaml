identifier: InterPro:IPR036140
label: "Profilin superfamily"
definition: >-
  This entry represents the Profilin superfamily, which are small eukaryotic proteins that have different functions. In plants, they are major allergens present in pollens. The majority of the Profilin family members binds to monomeric actin (G-actin) in a 1:1 ratio thus preventing the polymerisation of actin into filaments (F-actin). They can also in certain circumstance promote actin polymerisation. However, some Profilin family members, such as Profilin4 from mammals, does not binds to actin and may have functions distinct from regulating actin dynamics. It plays a role in the assembly of branched actin filament networks, by activating WASP via binding to WASP's proline rich domain. Profilin may link the cytoskeleton with major signalling pathways by interacting with components of the phosphatidylinositol cycle and Ras pathway. Some Profilins can also bind to polyphosphoinositides such as PIP2. Overall sequence similarity among profilin from organisms which belong to different phyla (ranging from fungi to mammals) is low, but the N-terminal region is relatively well conserved. The N-terminal region is thought to be involved in actin binding. The Profilin structure has two α-helices and five-stranded antiparallel sheet, it has three α/β/α layers.
