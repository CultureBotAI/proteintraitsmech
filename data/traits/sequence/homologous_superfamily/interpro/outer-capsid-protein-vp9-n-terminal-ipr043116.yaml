identifier: InterPro:IPR043116
label: "Outer capsid protein VP9, N-terminal"
definition: >-
  VP9 is a spike-forming protein that mediates virion attachment to the host cell receptors and plays a major role in cell penetration. This superfamily represents the N-terminal domain of the VP9 protein. Structurally, this domain has a left-handed superhelix made up of three α helices. These helices interact with sister helices on other VP9 monomers to form a VP9 trimer. This VP9 trimer is then expressed on the surface of the virus particle, and implicated in receptor binding interactions.
