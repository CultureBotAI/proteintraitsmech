identifier: InterPro:IPR038262
label: "Nitrate reductase beta, C-terminal domain superfamily"
definition: >-
  This superfamily represents a domain found near the C terminus of the respiratory nitrate reductase beta chain. The nitrate reductase complex is a dimer of heterotrimers each consisting of an alpha, beta and gamma chain. This domain plays a role in the interactions between subunits and shielding of the Fe-S clusters.
