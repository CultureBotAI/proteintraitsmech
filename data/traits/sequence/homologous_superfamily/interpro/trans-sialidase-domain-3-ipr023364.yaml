identifier: InterPro:IPR023364
label: "Trans-sialidase, domain 3"
definition: >-
  This entry represents a β-barrel domain found in bacterial trans-sialidase NanA, NanB and in the leech sialidase. Both act as intramolecular trans-sialidases. Trans-sialidases are responsible for the transfer of previously cleaved sialic acid to other glyconjugates.
