identifier: InterPro:IPR035093
label: "Toxin-antitoxin system, RelE/ParE toxin domain superfamily"
definition: >-
  The RelE/ParE family encompasses several toxin components of toxin-antitoxin modules. RelE is a sequence-specific, ribosome-dependent mRNA endoribonuclease which inhibits translation during amino acid starvation. ParE is involved in plasmid partition. ParE acts by inhibiting DNA gyrase, converting supercoiled plasmid DNA into a singly cleaved linear form in an ATP-dependent fashion. Toxin-antitoxin (TA) systems form a prokaryotic proteins ubiquitous class with functional roles in plasmid inheritance/environmental stress response/cell development. ParDE family TA systems are broadly conserved on plasmids/bacterial chromosomes. They have been well characterised as genetic elements that promote stable plasmid inheritance.
