identifier: InterPro:IPR042186
label: "Outer membrane usher protein FimD, plug domain"
definition: >-
  This superfamily represents the plug domain, which consists of 6 β strands, found in FimD. In apo-FimD this domain sits within the translocation channel of FimD. When FimC-FimH interacts with FimD, this domain is displaced and exposes a circular channel within the translocation channel.
