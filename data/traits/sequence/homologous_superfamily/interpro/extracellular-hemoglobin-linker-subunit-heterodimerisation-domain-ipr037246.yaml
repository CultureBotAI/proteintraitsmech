identifier: InterPro:IPR037246
label: "Extracellular hemoglobin linker subunit, heterodimerisation domain"
definition: >-
  This entry represents the heterodimerisation domain found in extracellular hemoglobin linker subunits. In the earthworm Lumbricus terrestris the linker subunits assemble into a core complex with D(6) symmetry onto which 12 hemoglobin dodecamers bind to form the entire complex.
