identifier: InterPro:IPR042196
label: "FHIPEP, domain 4"
definition: >-
  The Flagellar/Hr/Invasion Proteins Export Pore (FHIPEP) family consists of a number of proteins that constitute the type III secretion (or signal peptide-independent) pathway apparatus. This mechanism translocates proteins lacking an N-terminal signal peptide across the cell membrane in one step, as it does not require an intermediate periplasmic process to cleave the signal peptide. It is a common pathway amongst Gram-negative bacteria for secreting toxic and flagellar proteins. This superfamily represents the domain 4 found in FHIPEP protein.
