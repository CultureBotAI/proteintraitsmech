identifier: InterPro:IPR049376
label: "Fibroin heavy chain, N-terminal domain superfamily"
definition: >-
  This domain is found at the N-terminal end of Fibroin heavy chain (Fib-H) from Bombyx mori and similar proteins mainly from insects. This hydrophilic region plays an important role in the assembly of silk by changing its conformation in response to pH decreases: it transitions from random coil to β-sheets and form micelle-like oligomers at around pH 6.0.
