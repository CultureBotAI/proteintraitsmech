identifier: InterPro:IPR028995
label: "Glycoside hydrolase families 57/38, central domain superfamily"
definition: >-
  This superfamily represents a domain found in members of the glycosyl hydrolases families 57 and 38. This central domain adopts a structure consisting of three α helices and forms an immunoglobulin/albumin-binding domain-like fold. This domain can also be found in the C-terminal of the Alpha-amylase AmyC protein.
