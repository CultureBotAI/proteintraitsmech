identifier: InterPro:IPR023100
label: D-aminoacylase, insert domain superfamily
definition: >-
  This superfamily represents the insert found in the catalytic domain. This insert, composed of two α-helices and four β-strands, goes across the active site and is involved in substrate-mediated conformational change. D-aminoacylase hydrolyses a wide variety of N-acyl derivatives of neutral D-amino acids, in a zinc-dependent manner. The enzyme is composed of a small β-barrel domain and a larger catalytic α/β-barrel that contains a short α/β insert. The overall structure shares significant similarity to the α/β-barrel amidohydrolase superfamily, in which the β-strands in both barrels superimpose well.
