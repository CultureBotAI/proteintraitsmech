identifier: InterPro:IPR042037
label: "MukE, C-terminal domain"
definition: >-
  MukE is involved in the segregation and condensation of prokaryotic chromosomes. MukE along with MukF interact with MukB in vivo forming a complex, which is required for chromosome condensation and segregation in Escherichia coli. The Muk complex appears to be similar to the SMC-ScpA-ScpB complex in other prokaryotes where MukB is the homologue of SMC. ScpA and ScpB have little sequence similarity to MukE or MukF, though they are predicted to be structurally similar, being predominantly α-helical with coiled coil regions. This superfamily represents the MukE C-terminal domain. Structurally, it consists of 4 helices and 3 small β strands.
