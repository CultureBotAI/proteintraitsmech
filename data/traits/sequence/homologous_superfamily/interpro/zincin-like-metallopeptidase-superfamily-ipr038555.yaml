identifier: InterPro:IPR038555
label: "Zincin-like metallopeptidase superfamily"
definition: >-
  This superfamily of proteins has a conserved HEXXH motif, suggesting they are putative peptidases of zincin fold. The structure of this family is a minimal version of the metalloprotease fold.
