identifier: InterPro:IPR014729
label: "Rossmann-like alpha/beta/alpha sandwich fold"
definition: >-
  This superfamily represents domains related by a common ancestor that have a Rossmann-like, 3-layer, α/β/α sandwich fold. Protein families in which the domain is found include: Nucleotidylyl transferases ( ) such as cytidylyltransferases, adenylyltransferases. Class I aminoacyl-tRNA synthetases (catalytic domain), such as tyrosyl-tRNA synthetase ( ) and glutaminyl-tRNA synthetase ( ). Pantothenate synthetases ( ). ATP sulphurylase (central domain) N-type ATP pyrophosphatases, such as beta-lactam synthetase ( ) and GMP synthase ( ). PP-loop ATPases such as the cell cycle protein MesJ (N-terminal domain). Phosphoadenylyl sulphate (PAPS) reductase Electron transfer flavoprotein (ETFP) subunits, such as the N-terminal domains of the alpha and beta subunits. Universal stress protein A (UspA). Cryptochrome and DNA photolyase.
