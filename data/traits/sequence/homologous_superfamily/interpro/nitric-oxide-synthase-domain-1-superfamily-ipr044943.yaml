identifier: InterPro:IPR044943
label: "Nitric oxide synthase, domain 1 superfamily"
definition: >-
  In eukaryotes, nitric oxide synthase (NOS) is a homodimeric enzyme with each monomer containing one C-terminal reductase domain and one N-terminal oxygenase domain. This entry represents a subdomain found in the oxygenase domain of NOS. This domain can also be found in bacterial NOS that only has the oxygenase domain. Nitric oxide synthase (NOS) enzymes produce nitric oxide (NO) by catalysing a five-electron oxidation of a guanidino nitrogen of L-arginine (L-Arg). Oxidation of L-Arg to L-citrulline occurs via two successive monooxygenation reactions producing N(omega)-hydroxy-L-arginine as an intermediate. 2 mol of O(2) and 1.5 mol of NADPH are consumed per mole of NO formed. Arginine-derived NO synthesis has been identified in mammals, fish, birds, invertebrates, plants, and bacteria. Best studied are mammals, where three distinct genes encode NOS isozymes: neuronal (nNOS or NOS-1), cytokine-inducible (iNOS or NOS-2) and endothelial (eNOS or NOS-3). iNOS and nNOS are soluble and found predominantly in the cytosol, while eNOS is membrane associated. The enzymes exist as homodimers, each monomer consisting of two major domains: an N-terminal oxygenase domain, which belongs to the class of haem-thiolate proteins, and a C-terminal reductase domain, which is homologous to NADPH:P450 reductase. The interdomain linker between the oxygenase and reductase domains contains a calmodulin (CaM)-binding sequence. NOSs are the only enzymes known to simultaneously require five bound cofactors animal NOS isozymes are catalytically self-sufficient. The electron flow in the NO synthase reaction is: NADPH -->FAD -->FMN -->haem -->O(2). eNOS localisation to endothelial membranes is mediated by cotranslational N-terminal myristoylation and post-translational palmitoylation. The sub…
