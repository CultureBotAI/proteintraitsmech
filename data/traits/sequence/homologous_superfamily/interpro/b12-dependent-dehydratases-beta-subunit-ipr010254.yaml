identifier: InterPro:IPR010254
label: "B12-dependent dehydratases, beta subunit"
definition: >-
  This superfamily includes the beta (or middle) subunit of the oligomeric (alpha2beta2gamma2) diol dehydratases (DDH) and glycerol dehydratases (GDH), which are enzymes produced by some enterobacteria, as well as the beta subunit of the tetrameric (alpha2beta2) glycerol dehydratase reactivase, which removes damaged coenzyme B12 from GDH that has suffered mechanism-based inactivation. The beta subunit of GDH reactivase resembles that of GDH and DDH, displaying a three-layer α/β/α fold, except that the reactivase subunit lacks some B12-binding elements. This entry also includes Pyridinol guanylyltransferase HcgB, a guanylyltransferase involved in the biosynthesis of the iron-guanylylpyridinol (FeGP) cofactor used by [Fe]-hydrogenase.
