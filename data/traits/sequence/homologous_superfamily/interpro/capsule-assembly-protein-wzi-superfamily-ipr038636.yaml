identifier: InterPro:IPR038636
label: "Capsule assembly protein Wzi superfamily"
definition: >-
  Many bacteria are covered in a layer of surface-associated polysaccharide called the capsule. These capsules can be divided into four groups depending upon the organisation of genes responsible for capsule assembly, the assembly pathway and regulation. This superfamily plays a role in group 1 capsule biosynthesis. It is likely to be involved in the later stages of capsule assembly.
