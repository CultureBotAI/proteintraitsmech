identifier: InterPro:IPR038140
label: "DotD superfamily"
definition: >-
  The DotD protein is a component of the Dot/Icm type IVB secretion system (T4BSS). The T4BSS core complex spans the inner and outer membranes. It is thought to be comprised of at least five proteins: DotC, DotD, DotF, DotG and DotH, with the latter being the outer membrane protein. DotD, together with DotC, is thought to be involved in the targeting of DotH.
