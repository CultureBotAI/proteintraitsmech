identifier: InterPro:IPR042231
label: "Choline/Carnitine o-acyltransferase, domain 2"
definition: >-
  This superfamily represents the domain 2 of choline/carnitine o-acyltransferase. The choline/carnitine acyltransferase domain is found in a number of eukaryotic acetyltransferases. These enzymes include: Choline o-acetyltransferase , an enzyme that catalyses the biosynthesis of the neurotransmitter acetylcholine. Carnitine o-acetyltransferase. Peroxisomal carnitine octanoyltransferase , a fatty acid beta-oxidation pathway enzyme which is involved in the transport of medium-chain acyl-coenzyme A's from peroxisome to mitochondria. Mitochondrial carnitine palmitoyltransferases I and II (CPT), enzymes involved in fatty acid metabolism and transport. Mycoplasma pneumoniae putative acetyltransferase C09_orf600. Choline and carnitine o-acyltransferase are two evolutionary and structurally related enzymes. These are two different types of acyltransferases, a type of transferase enzymes that transfer an acetyl group. The former, choline O-acyltransferase, is involved choline biosynthesis and it is essential for the development and neuronal activities of cholinergic systems involved in many fundamental brain functions. The latter, carnitine o-acyltransferase, catalyzes the reversible acylation of L-carnitine and thus plays a vital role in fatty acid beta-oxidation and maintenance of acyl coenzyme A (acyl-CoA) pools. Both show a remarkably similar structure, they are monomeric proteins containing two domains (1 and 2) that interconnect to form an active site tunnel. This domain is also found at the C-terminal of highly reducing polyketide synthase SdnO and related highly reducing polyketide synthases. SdnO is part of the gene cluster that mediates the biosynthesis of glycoside antibiotics sordarin and hypoxysordarin.
