identifier: InterPro:IPR036825
label: "MTH865-like superfamily"
definition: >-
  This entry represents a domain superfamily of uncharacterised hypothetical proteins from archaea and bacteria, including the 8.4kDa protein MTH865 from Methanobacterium thermoautotrophicum. The NMR structure of MTH865 reveals an EF-Hand-like fold consisting of four helices in two hairpins.
