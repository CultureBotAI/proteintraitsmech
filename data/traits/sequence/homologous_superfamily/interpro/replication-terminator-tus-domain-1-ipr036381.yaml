identifier: InterPro:IPR036381
label: Replication terminator Tus, domain 1
definition: >-
  Bacterial DNA replication terminus site-binding proteins (also known as Tus or Ter-binding proteins) are required for the termination of DNA replication and function by binding to DNA replication terminator sequences, thus preventing the passage of replication forks. The termination efficiency is affected by the affinity of a particular protein for the terminator sequence. Tus protein folds into two domains divided by a central basic cleft. This superfamily describes the N-terminal 3-layer sandwich domain.
