identifier: InterPro:IPR048505
label: "Dicers-like, N-terminal domain superfamily"
definition: >-
  This superfamily includes the N-terminal domain of hypothetical proteins from yeast, that are thought to be the noncanonical Dicers found in these organisms. These proteins adopt a homodimer assembly similar to bacterial ribonuclease III but extended by a unique N-terminal domain that consists of five α-helices.
