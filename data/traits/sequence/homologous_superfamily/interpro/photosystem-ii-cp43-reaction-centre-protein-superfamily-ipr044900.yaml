identifier: InterPro:IPR044900
label: "Photosystem II CP43 reaction centre protein superfamily"
definition: >-
  PSII is a multisubunit protein-pigment complex containing polypeptides both intrinsic and extrinsic to the photosynthetic membrane. Within the core of the complex, the chlorophyll and β-carotene pigments are mainly bound to the antenna proteins CP43 (PsbC) and CP47 (PsbB), which pass the excitation energy on to the reaction centre proteins D1 (Qb, PsbA) and D2 (Qa, PsbD) that bind all the redox-active cofactors involved in the energy conversion process. The PSII oxygen-evolving complex (OEC) oxidises water to provide protons for use by PSI, and consists of OEE1 (PsbO), OEE2 (PsbP) and OEE3 (PsbQ). The remaining subunits in PSII are of low molecular weight (less than 10kDa), and are involved in PSII assembly, stabilisation, dimerisation, and photo-protection. This superfamily represents a domain found in the intrinsic antenna protein CP43 (PsbC), which is one of two such proteins found in the reaction centre of PSII, both of which can bind to chlorophyll 'a' and β-carotene, passing the excitation energy on to the reaction centre. It has a mainly α-helical structure.
