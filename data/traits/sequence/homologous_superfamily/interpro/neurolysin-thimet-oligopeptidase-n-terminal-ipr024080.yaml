identifier: InterPro:IPR024080
label: "Neurolysin/Thimet oligopeptidase, N-terminal"
definition: >-
  Thimet oligopeptidase and neurolysin are closely related zinc-dependent metallopeptidases that metabolize small bioactive peptides. They cleave many substrates at the same sites, but they recognise different positions on others. This entry represents the up-down α bundle domain found at the N terminus of these and related M3 peptidases.
