identifier: InterPro:IPR038109
label: "DNA-binding recombinase domain superfamily"
definition: >-
  The large serine recombinases (LSRs) are DNA-rearranging enzymes that are members of the serine recombinase or resolvase/invertase superfamily. Most resolvases/invertases have a catalytic domain of ~150 residues at their amino terminus, followed by a small, helix-turn-helix (HTH) DNA-binding domain. The LSRs share a similar amino-terminal catalytic domain, but have much larger carboxyl-terminal regions that range in size from ~300 residues to ~550 residues. The C-terminal region of the LSRs is comprised of multiple structural domains and is responsible for coordination of unique LSRs activities. The LSR C-terminal region is composed of two structural domains: a mixed α/β DNA-binding 'recombinase domain' linked to an unusual DNA-binding zinc ribbon domain. The DNA-binding recombinase domain is moderately well conserved among the LSRs and consists of a four stranded β-sheet embedded in a core 4-helix bundle.
