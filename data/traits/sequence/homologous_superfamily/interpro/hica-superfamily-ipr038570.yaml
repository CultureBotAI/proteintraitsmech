identifier: InterPro:IPR038570
label: "HicA superfamily"
definition: >-
  This entry represents the HicA mRNA interferase superfamily, which form the toxic component of a toxin-antitoxin (TA) module. Members contain a double-stranded RNA-binding domain and probably act as translation-independent mRNA interferases. They may form a complex with the antitoxin HicB which inhibits their mRNA interferase activity.
