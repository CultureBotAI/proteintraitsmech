identifier: InterPro:IPR023627
label: "Recombination protein RecR"
definition: >-
  The bacterial protein RecR is an important regulator in the RecFOR homologous recombination pathway during DNA repair. It acts with RecF and RecO forming a complex that facilitates the loading of RecA onto ssDNA. RecR is a zinc metalloprotein consisting of a N-terminal helix-hairpin-helix (HhH) motif, a middle region containing a zinc finger motif and a Toprim domain, and a C-terminal domain comprising a divergent Walker B motif and a C-terminal helix. This entry represents RecR's main structural domain, which consists of a N-terminal helix-hairpin-helix (HhH) motif, followed by a Cys4 zinc-finger motif, a Toprim domain and a Walker B motif.
