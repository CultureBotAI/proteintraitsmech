identifier: InterPro:IPR016184
label: "Capsid/spike protein, ssDNA virus"
definition: >-
  This entry represents a coat protein found in ssDNA viruses, such as the capsid protein F and the spike protein G in Microviridae, the Parvovirus capsid protein, the Dependovirus capsid protein and the Densovirus capsid protein. These proteins share a β-sandwich structure consisting of 8 β-strands in two sheets with a jelly-roll fold, although some members can have an additional 1-2 strands; characteristic interaction between the domains of this fold allows the formation of five-fold and pseudo six-fold assemblies.
