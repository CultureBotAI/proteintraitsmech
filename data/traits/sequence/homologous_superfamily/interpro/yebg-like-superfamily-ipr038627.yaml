identifier: InterPro:IPR038627
label: "YebG-like superfamily"
definition: >-
  This superfamily consists of several bacterial YebG proteins. YebG is a DNA damage-inducible protein belonging to the SOS regulon in Escherichia coli. Its expression is regulated by LexA and RecA and is induced following DNA damage, such as that caused by mitomycin C treatment. Additionally, induction of the yebG gene occurs as cells enter stationary growth phase and is dependent on cyclic AMP and H-NS. Although YebG is implicated in the SOS response, its precise biochemical function remains to be determined.
