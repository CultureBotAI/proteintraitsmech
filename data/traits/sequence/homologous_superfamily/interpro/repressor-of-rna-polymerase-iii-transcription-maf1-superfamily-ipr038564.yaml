identifier: InterPro:IPR038564
label: "Repressor of RNA polymerase III transcription Maf1 superfamily"
definition: >-
  Maf1 is a negative regulator of RNA polymerase III. It inhibits the de novo assembly of TFIIIB onto DNA. Maf1 represses Pol III in response to DNA damage, oxidative stress, growth to stationary phase, treatment with rapamycin or chlorpromazine, and blocking of the secretory pathway. It targets the initiation factor TFIIIB. Its structure is composed of a central five-stranded antiparallel β-sheet that is flanked by one helix on one side and three helices on the other.
