identifier: InterPro:IPR036531
label: "Rabenosyn, Rab binding domain superfamily"
definition: >-
  Rabenosyn-5 (Rbsn) is a multivalent effector with interacts with the Rab family. Rsbn contains distinct Rab4 and Rab5 binding sites within residues 264-500 and 627-784 respectively. Rab proteins are GTPases involved in the regulation of all stages of membrane trafficking. The structure of the Rab-binding sites reveals an antiparallel helical hairpin.
