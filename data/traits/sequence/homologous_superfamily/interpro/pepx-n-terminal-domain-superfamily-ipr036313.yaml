identifier: InterPro:IPR036313
label: "PepX, N-terminal domain superfamily"
definition: >-
  This N-terminal domain adopts a secondary structure consisting of a helical bundle of eight α helices and three β strands, with the last α helix connecting to the first strand of the catalytic domain. The first strand of the N terminus also forms a small parallel β sheet with strand five of the catalytic domain. This domain mediates dimerisation of the protein, with two proline residues present in the domain being critical for interaction.
