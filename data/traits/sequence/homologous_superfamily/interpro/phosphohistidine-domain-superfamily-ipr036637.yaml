identifier: InterPro:IPR036637
label: Phosphohistidine domain superfamily
definition: >-
  A number of enzymes that catalyze the transfer of a phosphoryl group from phosphoenolpyruvate (PEP) via a phospho-histidine intermediate have been shown to be structurally related. All these enzymes share the same catalytic mechanism: they bind PEP and transfer the phosphoryl group from it to a histidine residue. This domain is a "swivelling" β/β/α domain which is thought to be mobile in all proteins known to contain it.
