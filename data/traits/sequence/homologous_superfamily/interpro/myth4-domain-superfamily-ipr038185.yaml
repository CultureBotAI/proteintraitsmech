identifier: InterPro:IPR038185
label: "MyTH4 domain superfamily"
definition: >-
  The microtubule-based kinesin motors and actin-based myosin motors generate movements required for intracellular trafficking, cell division, and muscle contraction. In general, these proteins consist of a motor domain that generates movement and a tail region that varies widely from class to class and is thought to mediate many of the regulatory or cargo binding functions specific to each class of motor. The Myosin Tail Homology 4 (MyTH4) domain has been identified as a conserved domain in the tail domains of several different unconventional myosins and a plant kinesin-like protein, but has more recently been found in several non-motor proteins. Although the function is not yet fully understood, there is an evidence that the MyTH4 domain of Myosin-X (Myo10) binds to microtubules and thus could provide a link between an actin-based motor protein and the microtubule cytoskeleton. The MyTH4 domain is found in one or two copies associated with other domains, such as myosin head, kinesin motor, FERM, PH, SH3 and IQ. The domain is predicted to be largely α-helical, interrupted by three or four turns. The MyTH4 domain contains four highly conserved regions designated MGD (consensus sequence L(K/R)(F/Y)MGDhP, LRDE (consensus LRDEhYCQhhKQHxxxN), RGW (consensus RGWxLh), and ELEA (RxxPPSxhELEA), where h indicates a hydrophobic residue and x is any residue.
