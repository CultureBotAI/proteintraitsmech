identifier: InterPro:IPR036754
label: YbaK/aminoacyl-tRNA synthetase-associated domain superfamily
definition: >-
  Bacterial prolyl-tRNA synthetases and some smaller paralogues, YbaK and ProX, can hydrolyse misacylated Cys-tRNA(Pro) or Ala-tRNA(Pro). The small bacterial protein Ybak preferentially hydrolyses Cys-tRNA(Pro) and Cys-tRNA(Cys). ProX functions in trans to edit the amino acid moiety from incorrectly charged Ala-tRNA(Pro). Prolyl-tRNA synthetases main function is to catalyse the attachment of proline to tRNA(Pro) in a two-step reaction: proline is first activated by ATP to form Pro-AMP and then transferred to the acceptor end of tRNA(Pro). This entry represents a domain superfamily characteristic of Ybak and ProX, that can also be found with other domains in prolyl-tRNA synthetases. The core structure of this domain has an α-β-α-β(2)-(α-β)2-α-β(2)-α-β fold arranged into three layers with bifurcated mixed sheet.
