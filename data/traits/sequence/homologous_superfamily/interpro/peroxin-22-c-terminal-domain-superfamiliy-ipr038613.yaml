identifier: InterPro:IPR038613
label: "Peroxin 22, C-terminal domain superfamiliy"
definition: >-
  Peroxin-22 is an integral peroxisomal membrane protein. The N terminus of peroxin-22 is located in the matrix, while the C terminus is located in the cytosol. Peroxin-22 interacts with the ubiquitin-conjugating enzyme Pex4p, anchoring it at the peroxisomal membrane. This association is required for ubiquitination of peroxisomal import receptor Pex5p mediated by Pex4p. This superfamily represents the C-terminal soluble domain, which corresponds to the region required for Pex4p binding.
