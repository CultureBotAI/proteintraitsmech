identifier: InterPro:IPR009086
label: "Bacteriocin AS-48"
definition: >-
  Bacteriocin AS-48 is a cyclic peptide antibiotic produced by the eubacteria Enterococcus faecalis (Streptococcus faecalis) that shows a broad antimicrobial spectrum against both Gram-positive and Gram-negative bacteria. Bacteriocin AS-48 is encoded by the pheromone-responsive plasmid pMB2, and acts on the plasma membrane in which it opens pores leading to ion leakage and cell death. The globular structure of bacteriocin AS-48 is comprised of five α helices enclosing a hydrophobic core. The mammalian NK-lysin effector protein of T and natural killer cells has a similar structure, though it lacks sequence homology with bacteriocins AS-48. This entry represents the characteristic domain of bacteriocin AS-48.
