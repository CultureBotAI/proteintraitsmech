identifier: InterPro:IPR035909
label: "Methylesterase CheB, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain of the methylesterase CheB involved in chemotaxis. CheB methylesterase is responsible for removing the methyl group from the gamma-glutamyl methyl ester residues in the methyl-accepting chemotaxis proteins (MCP). The enzyme catalyses the reaction: protein L-glutamate O-methyl ester and water is converted to protein L-glutamate and methanol. The CheB structure consists of three layers (α-β-α) arranged in seven strands with parallel β-sheets.
