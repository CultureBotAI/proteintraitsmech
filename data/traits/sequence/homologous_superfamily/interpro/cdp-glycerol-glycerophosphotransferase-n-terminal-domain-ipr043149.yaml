identifier: InterPro:IPR043149
label: "CDP-glycerol glycerophosphotransferase, N-terminal domain"
definition: >-
  Wall-associated teichoic acids are a heterogeneous class of phosphate-rich polymers that are covalently linked to the cell wall peptidoglycan of Gram-positive bacteria. They consist of a main chain of phosphodiester-linked polyols and/or sugar moieties attached to peptidoglycan via a linkage unit. CDP-glycerol:poly(glycerophosphate) glycerophosphotransferase TagF is responsible for the polymerisation of the main chain of the teichoic acid by sequential transfer of glycerol-phosphate units from CDP-glycerol to the linkage unit lipid. The TagF-like family of enzymes has been shown to be responsible for wall teichoic acid priming and polymerization events. This entry represents the N-terminal domain of TagF which exhibits a Rossmann-fold and includes a small two α-helix region.
