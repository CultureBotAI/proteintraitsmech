identifier: InterPro:IPR017856
label: "Integrase-like, N-terminal"
definition: >-
  This entry represents a structural domain with an α-helical, orthogonal bundle fold. Domains with this structure are found at the N-terminal (zinc-binding domain) of HIV integrase, and in the following hypothetical proteins: YebC from Escherichia coli, HP0162 from Helicobacter pylori (Campylobacter pylori) and aq1575 from Aquifex aeolicus. Retroviral integrase mediates integration of a DNA copy of the viral genome into the host chromosome. Integrase is composed of three domains: an N-terminal zinc binding domain, a central catalytic core and a C-terminal DNA-binding domain. It is often found as part of the POL polyprotein.
