identifier: InterPro:IPR038108
label: "RPN13, DEUBAD domain superfamily"
definition: >-
  This entry represents the DEUBiquitinase ADaptor (DEUBAD) domain from RPN13 (ADRM1), located at its C-terminal, that binds to the UCH37-like domain (ULD) of the deubiquitinase UCH37. This interaction is required for DUB activity activation. Its structure consists of eight α-helices that form a helical bundle surrounding a compact hydrophobic core. It has a modular architecture with the core formed by helices 1-4, primarily responsible for binding to ULD, and accessory elements that lead to full activation, or inhibition, of the UCH activity.
