identifier: InterPro:IPR036514
label: "SGNH hydrolase superfamily"
definition: >-
  SGNH hydrolase has a similar fold to flavoproteins, namely a three-layer α/β/α structure, where the β-sheets are composed of five parallel strands. Enzymes containing this domain act as esterases and lipases, but have little sequence homology to true lipases. Proteins containing this type of esterase domain have been found in a variety of hydrolases; those with structural information include an esterase from Streptomyces scabies; the esterase domain of viral haemagglutinin-esterase surface glycoproteins (influenza C virus, coronaviruses and toroviruses); mammalian acetylhydrolases; fungal rhamnogalacturonan acetylesterase; and the multifunctional enzyme thioesterase I (TAP) from Escherichia coli. SGNH hydrolase-type esterase domains contain unique hydrogen bond network that stabilises their catalytic centres; they usually contain the catalytic triad Ser/Acid/His.
