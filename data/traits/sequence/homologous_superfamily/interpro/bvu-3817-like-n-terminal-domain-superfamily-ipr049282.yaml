identifier: InterPro:IPR049282
label: "BVU_3817-like, N-terminal domain superfamily"
definition: >-
  This domain is found at the N-terminal of BVU_3817 from Phocaeicola vulgatus and similar proteins mostly from bacteroidetes. This domain adopts a β-barrel with SH3 topology and is usually found associated with . Its function is unknown.
