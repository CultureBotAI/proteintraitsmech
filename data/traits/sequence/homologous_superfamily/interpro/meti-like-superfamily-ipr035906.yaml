identifier: InterPro:IPR035906
label: "MetI-like superfamily"
definition: >-
  The Escherichia coli MetI subunit of the L-methionine transmembrane transporter is organised around a core of five transmembrane helices that correspond to a subset of the helices observed in the larger membrane-spanning subunits of the molybdate (ModBC) and maltose (MalFGK) ABC transporters, which contain six helices. This superfamily represents proteins that have MetI-like structure.
