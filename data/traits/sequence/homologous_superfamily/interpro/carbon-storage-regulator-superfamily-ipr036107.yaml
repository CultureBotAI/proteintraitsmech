identifier: InterPro:IPR036107
label: Carbon storage regulator superfamily
definition: >-
  The RNA-binding protein CsrA (carbon storage regulator) is a new kind of global regulator, which facilitates specific mRNA decay. CsrA is entirely contained within a globular complex of approximately 18 CsrA-H6 subunits and a single RNA, CsrB. CsrA binds to the CsrB RNA molecule to form the Csr regulatory system which has a strong negative regulatory effect on glycogen biosynthesis, glyconeogenesis and glycogen catabolism and a positive regulatory effect on glycolysis. The CsrA structure has a sandwich fold composed of ten strands in two sheets with intertwined dimer topology.
