identifier: InterPro:IPR038702
label: "Sodium/potassium-transporting ATPase subunit beta superfamily"
definition: >-
  This entry represents the sodium/potassium-transporting ATPase subunit beta. This is the non-catalytic component of the active enzyme, which catalyses the hydrolysis of ATP coupled with the exchange of Na + and K + ions across the plasma membrane. The beta subunit regulates, through assembly of alpha/beta heterodimers, the number of sodium pumps transported to the plasma membrane.
