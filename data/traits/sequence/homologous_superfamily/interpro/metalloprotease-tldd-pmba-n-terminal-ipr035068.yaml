identifier: InterPro:IPR035068
label: "Metalloprotease TldD/PmbA, N-terminal"
definition: >-
  This superfamily represents the N-terminal domain found in a group metalloproteases, including TldD and PmbA. TldD and PmbA (TldE) were originally identified as regulators of DNA gyrase. Later, they are shown to be metalloproteases involved in CcdA degradation.
