identifier: InterPro:IPR036808
label: "PA1123-like superfamily"
definition: >-
  This domain superfamily contains three α helices and six β strands. It is found in a protein that is produced from gene PA1123 of Pseudomonas. The protein PA1123 appears to be present in the biofilm layer and may be a lipoprotein.
