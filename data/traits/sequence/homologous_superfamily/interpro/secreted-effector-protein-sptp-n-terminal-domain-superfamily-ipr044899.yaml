identifier: InterPro:IPR044899
label: "Secreted effector protein SptP, N-terminal domain superfamily"
definition: >-
  This superfamily represents a domain found in the Salmonella effector protein SptP, which interacts with SicP chaperone dimers mainly through four regions of its chaperone-binding domain. The structure of the SptP-SicP complex contains four molecules of SicP, aligned in a linear fashion and arranged in two sets of tightly bound homodimers that bind two SptP molecules. The SicP homodimers do not interact with each other, but are held together by a molecular interface formed between two SptP molecules. Each SptP molecule is wrapped around by three SicP chaperones (two chaperones from one homodimer and a third one from the opposite homodimer pair). This entry also includes the N-terminal in Effector protein BopA. BopA plays a role in mediating bacterial evasion from the host autophagic pathway.
