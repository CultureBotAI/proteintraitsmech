identifier: InterPro:IPR038394
label: "TA0956 superfamily"
definition: >-
  TA0956 is a protein from Thermoplasma acidophilum which currently has no known function however the structure has been determined. The protein has a two-layered α/β-sandwich topology and is a putative Elongation factor 1-alpha binding motif.
