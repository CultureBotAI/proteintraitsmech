identifier: InterPro:IPR036655
label: Monomethylamine methyltransferase MtmB superfamily
definition: >-
  Monomethylamine methyltransferase of the archaebacterium Methanosarcina barkeri contains a novel amino acid, pyrrolysine, encoded by the termination codon UAG. The structure of the enzyme reveals a homohexamer comprised of individual subunits with a TIM barrel fold. MtmB initiates the metabolism of monomethylamine by catalysing the transfer of the methyl group from monomethylamine to the corrinoid cofactor of MtmC.
