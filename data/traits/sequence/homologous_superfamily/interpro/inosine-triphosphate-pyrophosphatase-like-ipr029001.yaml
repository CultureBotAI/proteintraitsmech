identifier: InterPro:IPR029001
label: "Inosine triphosphate pyrophosphatase-like"
definition: >-
  This entry represents the inosine triphosphate pyrophosphatase (ITPase)-like proteins. Members in this family include NTPases, such as Ham1-like protein (non-canonical purine NTP pyrophosphatase) and non-canonical purine NTP phosphatase (YjjX-like), Maf-like proteins and PRRC1. Non-canonical purine NTP phosphatases are prokaryotic phosphatases that hydrolyse non-canonical purine nucleotides such as XTP and ITP to their respective diphosphate derivatives. Ham1 is a pyrophosphatase that hydrolyses the non-canonical purine nucleotides inosine triphosphate (ITP), deoxyinosine triphosphate (dITP) as well as 2'-deoxy-N-6-hydroxylaminopurine triphosphate (dHAPTP) and 5-bromodeoxyuridine 5'-triphosphate (BrdUTP) to their respective monophosphate derivatives. Maf proteins exhibit nucleotide pyrophosphatase activity against canonical and modified nucleotides. Proline-rich and coiled-coil-containing protein 1 (PRRC1) is a Golgi-associated protein of unknown function.
