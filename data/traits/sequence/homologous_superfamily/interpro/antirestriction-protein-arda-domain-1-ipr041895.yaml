identifier: InterPro:IPR041895
label: "Antirestriction protein ArdA, domain 1"
definition: >-
  ArdA functions in bacterial conjugation to allow an unmodified plasmid to evade restriction in the recipient bacterium and yet acquire cognate modification. ArdA forms a dimer and each monomer is comprised of three small α-β domains, each with a different fold, arranged in a row in each monomer. This superfamily represents the bacterial antirestriction (ArdA) protein N-terminal domain 1. Structurally, it consists of a three-stranded anti-parallel β-sheet and one short α-helix interspersed with three large loops of 10 or more residues. Domain 1 is not essential for anti-restriction as it can be deleted, indicating that the key aspect of anti-restriction by ArdA is the binding to the MTase core using domains 2 and 3.
