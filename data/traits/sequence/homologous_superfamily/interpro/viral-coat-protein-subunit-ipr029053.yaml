identifier: InterPro:IPR029053
label: "Viral coat protein subunit"
definition: >-
  The domain that participates in the formation of icosahedral virus shell exhibits a fold with two flanking twisted β-sheets, each consisting of 4 antiparallel β-strands, that is called the 8-stranded jelly roll β-barrel motif. In the Norwalk virus, a human calicivirus, the capsid protein has a protruding (P) domain connected by a flexible hinge to a shell (S) domain that has this classical eight-stranded β-sandwich motif.
