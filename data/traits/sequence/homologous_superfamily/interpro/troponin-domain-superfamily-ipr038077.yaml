identifier: InterPro:IPR038077
label: "Troponin domain superfamily"
definition: >-
  The troponin (Tn) complex regulates Ca 2+ induced muscle contraction. Tn contains three subunits, Ca 2+ binding (TnC), inhibitory (TnI), and tropomyosin binding (TnT). This entry includes domains from troponin T and troponin I. Troponin I binds to actin and troponin T binds to tropomyosin. Structurally this domain forms a heterodimeric coiled coil.
