identifier: InterPro:IPR043039
label: "TBC1 domain family member 7, domain 2"
definition: >-
  TBC1D7 is part of the TSC1-TSC2-TBC1D7 complex that serves as a negative regulator of the mechanistic target of rapamycin complex 1 that controls cell growth in response to environmental cues. TBC1D7 helps to stabilize the TSC1-TSC2 complex through its direct interaction with TSC1. Homozygous inactivation of TBC1D7 causes intellectual disability and megaencephaly. This superfamily represents the second out of three domains found in TBC1D7. Structurally, this domain consists of 4 α helices.
