identifier: InterPro:IPR046357
label: Peptidyl-prolyl cis-trans isomerase domain superfamily
definition: >-
  This superfamily represents the peptidyl-prolyl cis-trans isomerase domain found in a wide range of proteins, including trigger factor, FK506-binding proteins, proteins from the parvulin family such as Par10 from E.coli, Pin1 and Par14 from human or Pin from plants, chaperone SurA and foldase protein PrsA. This domain catalyses cis/trans isomerization of peptidyl-prolyl bonds, which is often rate-limiting for protein folding. This domain consists of a flattened β-barrel of four/six-stranded, antiparallel sheets, surrounded by four/six α-helices.
