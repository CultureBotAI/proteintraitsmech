identifier: InterPro:IPR038173
label: Transcription factor COE, DNA-binding domain superfamily
definition: >-
  This entry represents the DNA-binding domain of COE1, COE2, COE3 and COE4 (also known as Ebf1, Ebf2, Ebf3 and Ebf4), they belong to the early B cell factor family. COE1 is a key transcriptional determinant of B-lymphocyte differentiation. COE3 is a transcription factor involved in neuronal differentiation and maturation. Many disease-related variants are associated with this domain, specially with the region within 5 amino acids of the zinc finger motif, which is required for stabilising the interaction between the protein and the DNA target. Structurally, this domain consists of 4 α-helices and 9 β-strands, where the β-strands are arranged into a 9-membered antiparallel barrel.
