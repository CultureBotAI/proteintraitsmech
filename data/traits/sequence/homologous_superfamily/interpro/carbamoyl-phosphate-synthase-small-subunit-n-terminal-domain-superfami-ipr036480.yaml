identifier: InterPro:IPR036480
label: "Carbamoyl-phosphate synthase small subunit, N-terminal domain superfamily"
definition: >-
  This entry represents the N-terminal domain superfamily of the small subunit of carbamoyl phosphate synthase. Structurally, it forms a 3-layer β/β/α fold of a type that is thought to be mobile in most proteins that carry it.
