identifier: InterPro:IPR038693
label: "Phenylacetyl-CoA epoxidase, subunit B"
definition: >-
  This entry represents the 1,2-phenylacetyl-CoA epoxidase, subunit B (also known as PaaB) and related bacterial proteins. Phenylacetyl-CoA monooxygenase (epoxidase) is a multicomponent enzyme, PaaABC(D)E, responsible for the hydroxylation of phenylacetate-CoA (PA-CoA) as the second catabolic step in phenylacetic acid (PA) degradation. Not only transforms phenylacetyl-CoA into its ring-1,2-epoxide, but also mediates the NADPH-dependent removal of the epoxide oxygen, regenerating phenylacetyl-CoA with formation of water. The PaaB subunit probably acts as an effector protein.
