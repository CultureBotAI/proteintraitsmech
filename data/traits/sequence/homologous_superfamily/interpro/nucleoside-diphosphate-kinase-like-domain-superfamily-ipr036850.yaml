identifier: InterPro:IPR036850
label: "Nucleoside diphosphate kinase-like domain superfamily"
definition: >-
  This entry represents the Nucleoside diphosphate kinase-like domain that contains an α/β fold. It is also found at the C-terminal of retinitis pigmentosa 2 protein (XRP2/RP2). XRP2, a GTPase-activating protein, is required for the maintenance of rod and cone photoreceptor cells in the retina. NDK is a hexamer composed of identical subunits with a novel mononucleotide binding fold. Each subunit contains an α/β domain with a four stranded, anti-parallel β-sheet. Nucleoside diphosphate kinases (NDK) are enzymes required for the synthesis of nucleoside triphosphates (NTP) other than ATP. They provide NTPs for nucleic acid synthesis, CTP for lipid synthesis, UTP for polysaccharide synthesis and GTP for protein elongation, signal transduction and microtubule polymerisation. NDK are proteins of 17 Kd that act via a ping-pong mechanism in which a histidine residue is phosphorylated, by transfer of the terminal phosphate group from ATP. In the presence of magnesium, the phosphoenzyme can transfer its phosphate group to any NDP, to produce an NTP. NDK isozymes have been sequenced from prokaryotic and eukaryotic sources. It has also been shown that the Drosophila awd (abnormal wing discs) protein, is a microtubule-associated NDK. Mammalian NDK is also known as metastasis inhibition factor nm23. The sequence of NDK has been highly conserved through evolution. There is a single histidine residue conserved in all known NDK isozymes, which is involved in the catalytic mechanism.
