identifier: InterPro:IPR023136
label: "Api92-like domain superfamily"
definition: >-
  This domain superfamily is found in a family of hypothetical enterobacterial proteins of around 170 residues in length. Members of this family are found in Escherichia coli, Salmonella typhimurium and Shigella species. The function of this family is unknown.
