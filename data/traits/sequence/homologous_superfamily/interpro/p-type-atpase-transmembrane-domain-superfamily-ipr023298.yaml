identifier: InterPro:IPR023298
label: "P-type ATPase, transmembrane domain superfamily"
definition: >-
  This superfamily represents the ten transmembrane helices domain found in P-type ATPases. P-ATPases (also known as E1-E2 ATPases) ( ) are found in bacteria and in a number of eukaryotic plasma membranes and organelles. P-ATPases function to transport a variety of different compounds, including ions and phospholipids, across a membrane using ATP hydrolysis for energy. There are many different classes of P-ATPases, which transport specific types of ion: H + , Na + , K + , Mg 2+ , Ca 2+ , Ag + and Ag 2+ , Zn 2+ , Co 2+ , Pb 2+ , Ni 2+ , Cd 2+ , Cu + and Cu 2+. P-ATPases can be composed of one or two polypeptides, and can usually assume two main conformations called E1 and E2. Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP.
