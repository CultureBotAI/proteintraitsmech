identifier: InterPro:IPR010980
label: Cytochrome c/b562
definition: >-
  Cytochromes are haem-containing proteins that function as electron carriers during electron transfer reactions. Cytochromes can be divided into types depending upon how the haem atom is bound: in c-type cytochromes the haem is covalently attached to the polypeptide, while in b-type cytochromes the haem is not covalently attached. A four-helical bundle motif is found in several cytochromes, including the cytochrome c family ( ), cytochrome b562 ( ), and cytochrome b559, despite having very low sequence similarities. Cytochromes c and b562 are found in many bacteria and are probably involved in nitric oxide transfer. These proteins exhibit a reduction potential in the range of around 8mV to 400mV, which sets the energy yield possible in metabolism and is also a key determinant of the rate at which redox reactions proceed.
