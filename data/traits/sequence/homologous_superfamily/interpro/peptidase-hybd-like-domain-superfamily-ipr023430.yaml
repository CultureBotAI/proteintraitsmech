identifier: InterPro:IPR023430
label: "Peptidase HybD-like domain superfamily"
definition: >-
  This superfamily represents a structural domain described for HybD and related proteins such as the germination protease from Gram-positive bacteria. It consists of a twisted five-stranded β-sheet surrounded by four and three helices, respectively, on each side.
