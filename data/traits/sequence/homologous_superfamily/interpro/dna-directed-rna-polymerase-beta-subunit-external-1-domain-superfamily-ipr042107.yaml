identifier: InterPro:IPR042107
label: "DNA-directed RNA polymerase, beta subunit, external 1 domain superfamily"
definition: >-
  RNA polymerases catalyse the DNA-dependent polymerisation of RNA. Prokaryotes contain a single RNA polymerase compared with three in eukaryotes (not including mitochondrial or chloroplast polymerases). This superfamily represents a domain found in prokaryotic polymerases that spans the gap between domains 4 and 5 of the protein. It is also known as the external 1 region of the polymerase and is bound in association with the external 2 region.
