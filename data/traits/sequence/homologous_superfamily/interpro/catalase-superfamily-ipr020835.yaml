identifier: InterPro:IPR020835
label: Catalase superfamily
definition: >-
  This entry represents a fold found in the mono-functional, haem-containing catalases and also in haem peroxidases such as allene oxide synthase. In catalases, this entry covers the core forming domain and, if present, the immune-responsive C-terminal domain.
