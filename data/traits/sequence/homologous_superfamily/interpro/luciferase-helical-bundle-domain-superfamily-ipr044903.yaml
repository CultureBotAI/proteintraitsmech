identifier: InterPro:IPR044903
label: "Luciferase, helical bundle domain superfamily"
definition: >-
  This domain superfamily is found associated with the catalytic domain of dinoflagellate luciferase. Luciferase is involved in catalysing the light emitting reaction in bioluminescence. This domain has a three helix bundle structure that holds four important histidines that are thought to play a role in the pH regulation of the enzyme.
