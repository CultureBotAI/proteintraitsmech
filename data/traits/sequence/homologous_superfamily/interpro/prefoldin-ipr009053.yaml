identifier: InterPro:IPR009053
label: Prefoldin
definition: >-
  The Prefoldin/GimC family of proteins are found in eukaryotes and archaea. Prefoldin is part of a molecular chaperone system that promotes the correct folding of nascent polypeptide chains. Prefoldin/GimC interacts with the nascent chain to stabilise it prior to its folding within the central cavity of a chaperonin. Prefoldin/GimC is a hexamer consisting of two types of subunits, alpha and beta. Archaeal prefoldin contains one type of alpha and one type of beta subunit, while eukaryotic prefoldin/GimC contains two different but related alpha subunits and four related beta subunits. The unconventional prefoldin RPB5 interactor-like protein from Drosophila (also known as URI) is a serine/threonine phosphatase inhibitor and required for germ line cell viability and differentiation. It binds to protein phosphatase 1 alpha subunits with higher affinity than the beta subunits.
