identifier: InterPro:IPR038212
label: "Transcription factor EnY2 superfamily"
definition: >-
  Enhancer of yellow 2 (EnY2) is a small transcription factor which is conserved from protozoa to humans. In insects it is known as enhancer of yellow 2 transcription factor, but in other organisms is known as transcription and mRNA export factor SUS1 or ENY2. It is involved in mRNA export coupled transcription activation by association with both the TREX-2 complex and the transcription regulatory histone acetylation complex SAGA. Within the SAGA complex, participates in a subcomplex that specifically deubiquitinates histone H2B. The TREX-2 complex participates in mRNA export and accurate chromatin positioning in the nucleus by tethering genes to the nuclear periphery.
