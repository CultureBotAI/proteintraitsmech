identifier: InterPro:IPR042271
label: "Zinicin-like metallopeptidase type 2, N-terminal"
definition: >-
  This superfamily represents the N-terminal domain found in proteins with a conserved HEXXH motif, suggesting they are putative peptidases of zincin fold. Structurally, this domain consists of 4 α helices and 2 β strands.
