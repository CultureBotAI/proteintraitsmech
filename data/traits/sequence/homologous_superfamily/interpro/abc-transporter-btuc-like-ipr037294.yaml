identifier: InterPro:IPR037294
label: "ABC transporter, BtuC-like"
definition: >-
  This entry represents a domain found in some ABC transporter permease proteins, such as BtuC (involved in vitamin B12 uptake) and metal-chelatin transporters. It consists of a multihelical, complex architecture with several transmembrane helices. ABC transporter BtuCD consists of two ATP-binding cassettes (BtuD) and two membrane-spanning subunits (BtuC). The BtuC subunits provide 20 transmembrane helices grouped around a translocation pathway that is closed to the cytoplasm by a gate region. A prominent cytoplasmic loop of BtuC forms the contact region with the ATP-binding cassette. This entry also includes FecC and FecD, which are components of the fec operon, a Periplasmic-Binding-Protein (PBP)-dependent transport system for ferric dicitrate in Escherichia coli. FecC and FecD exhibit homology to each other and are localized in the cytoplasmic membrane.
