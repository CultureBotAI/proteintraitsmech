identifier: InterPro:IPR043179
label: "Major vault protein repeat domain 2 superfamily"
definition: >-
  The vault complex is the largest ribonucleoprotein particle found in eukaryotes. Although several functions have been proposed for vaults since their discovery in 1986, including roles in multidrug resistance, cell signaling, and innate immunity, their cellular function remains unclear. In mammals, vaults contain three proteins: the 100kDa major vault protein (MVP), the 193kDa vault poly(ADP-ribosyl)ating polymerase VPARP and the 240kDa telomerase-associated protein TEP1. Approximately 75% of the vault particle mass is due to MVP. The MVP monomer folds to form structural repeat domains at the N terminus, a shoulder domain, a cap-helix and cap-ring domains. This superfamily represents the major vault protein repeat domain 2, found at the N terminus.
