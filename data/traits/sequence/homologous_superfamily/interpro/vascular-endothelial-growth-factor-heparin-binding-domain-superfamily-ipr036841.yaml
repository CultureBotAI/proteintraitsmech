identifier: InterPro:IPR036841
label: Vascular endothelial growth factor, heparin-binding domain superfamily
definition: >-
  This short domain is found at the C terminus of vascular endothelial growth factor (VEGF). It has been shown to have heparin binding activity. Proteins containing this domain include VEGF-A, which is a growth factor active in angiogenesis, vasculogenesis and endothelial cell growth. VEGF-A also promotes a wide range of neuronal functions, including neurogenesis, neuronal migration, neuronal survival and axon guidance.
