identifier: InterPro:IPR029756
label: MTH1187/YkoF-like
definition: >-
  This domain superfamily is found in the Thiamine-binding protein TM0486, uncharacterised protein MTH1187 and its yeast orthologue YBL001C (also known of Ecm15) and putative hydroxymethyl pyrimidine (HMP)/thiamine binding proteinin YkoF. TM0486 is a thiamine-binding protein which is involved in the cellular response to oxidative conditions. These proteins adopt a ferredoxin-like fold.
