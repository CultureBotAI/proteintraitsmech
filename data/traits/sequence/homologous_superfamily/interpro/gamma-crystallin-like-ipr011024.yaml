identifier: InterPro:IPR011024
label: Gamma-crystallin-like
definition: >-
  This entry contains proteins which have a Greek key motif. They are all structurally related to the beta/gamma crystallin superfamily. This superfamily of proteins includes: Beta and gamma crystallins Yeast killer toxin Killer toxin-like protein SKLP Antifungal protein, AFP1 Plant antimicrobial protein, MIAMP1 Streptomyces metalloproteinase inhibitor, SMPI.
