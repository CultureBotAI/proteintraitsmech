identifier: InterPro:IPR038521
label: "ThiC/Bza, core domain"
definition: >-
  ThiC is found within the thiamin biosynthesis operon and is involved in thiamin biosynthesis. It catalyses the synthesis of the hydroxymethylpyrimidine phosphate (HMP-P) moiety of thiamine from aminoimidazole ribotide (AIR) in a radical S-adenosyl-L-methionine (SAM)-dependent reaction. BzaF, a radical SAM enzyme that catalyzes the conversion of aminoimidazole ribotide (AIR) to 5-hydroxybenzimidazole (5-HBI), is a paralogue of thiC. This entry also includes 5-hydroxybenzimidazole synthase BzaA and BzaB. They are part of the bzaABCDE genes that are necessary and sufficient for the anaerobic biosynthesis of DMB (5,6-dimethylbenzimidazole), the "lower ligand" of vitamin B12. This superfamily represents the core domain of these enzymes. Within ThiC, this superfamily makes up the central domain and the cavity of this barrel contains the putative active site. Structurally, this domain consists of 8 β strands and 8 α helices arranged into a TIM barrel.
