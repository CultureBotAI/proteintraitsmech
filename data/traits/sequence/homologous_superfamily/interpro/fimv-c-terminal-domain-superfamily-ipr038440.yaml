identifier: InterPro:IPR038440
label: "FimV, C-terminal domain superfamily"
definition: >-
  This superfamily represents a domain found at the extreme C terminus of the Mobility protein FimV from Pseudomonas aeruginosa, and of TspA of Neisseria meningitidis. Disruption of the former blocks twitching motility from type IV pili, which suggests a role in peptidoglycan layer remodeling required by type IV fimbrial systems.
