identifier: InterPro:IPR038242
label: "CRISPR-Cas system, Cmr2 subunit, D1 domain, cysteine cluster"
definition: >-
  Cmr2 is a subunit of a CRISPR RNA-Cas protein complex (the Cmr complex, consisting of subunits Cmr1-6), that cleaves foreign RNA in prokaryotes. Its N-terminal region is a putative HD (histidine-aspartate) nuclease domain; however, it does not participate in target RNA cleavage. In fact, Cmr4 has been identified as the conserved endoribonuclease of the Cmr complex. In Pyrococcus furiosus, the HD domain of Cmr2 is formed by eight α-helices and a β-hairpin, and lies diametrically opposite to Cmr3. The N-terminal domain D1 contains a ferredoxin-like fold (which contains a P-loop) and a cysteine cluster that is formed by two CXXC motifs. It is the largest of the four domains of Cmr2 and is composed of nine helices and three β-strands. ADP binds near the P-loop region of the D1 domain. The D1 domain that constitutes one face of the active site pocket might fulfil the role of fingers domain (similarly to DNA polymerases) in binding the nucleotide.
