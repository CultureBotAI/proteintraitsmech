identifier: InterPro:IPR024185
label: "5-formyltetrahydrofolate cyclo-ligase-like domain superfamily"
definition: >-
  This superfamily represents a domain found in 5-formyltetrahydrofolate cyclo-ligase, also known as 5,10-methenyltetrahydrofolate synthetase. This enzyme is involved in folate metabolism. It is a single-domain alpha/beta protein. The central core of the protein is a four-stranded parallel β-strand flanked by three helices on one side and a single helix on the other side. This domain is also found in LutC/YkgG. The Escherichia coli ykgEFG operon is a clear homologue of the Bacillus subtilis lutABC operon. This operon is involved in lactate catabolism in B. subtilis, though its role in E. coli is not clear. LutB and LutC probably act as electron transporters during oxidation of L-lactate.
