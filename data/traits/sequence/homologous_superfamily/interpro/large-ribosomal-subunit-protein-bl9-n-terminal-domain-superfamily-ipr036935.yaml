identifier: InterPro:IPR036935
label: "Large ribosomal subunit protein bL9, N-terminal domain superfamily"
definition: >-
  This entry represents the large ribosomal subunit protein bL9. In Escherichia coli, bL9 is known to bind directly to the 23S rRNA. It belongs to a family of ribosomal proteins grouped on the basis of sequence similarities. The crystal structure of Bacillus stearothermophilus bL9 shows the 149-residue protein comprises two globular domains connected by a rigid linker. Each domain contains an rRNA binding site, and the protein functions as a structural protein in the large subunit of the ribosome. The C-terminal domain consists of two loops, an α-helix and a three-stranded mixed parallel, anti-parallel β-sheet packed against the central α-helix. The long central α-helix is exposed to solvent in the middle and participates in the hydrophobic cores of the two domains at both ends.
