identifier: InterPro:IPR027435
label: Stannin superfamily
definition: >-
  Stannin (SNN) is a mitochondrial membrane protein that plays a role in the toxic effects of organotins. TMT (trimethyltin), an organotin compound extensive used in industry and agriculture, can cause injury to specific regions of the brain. Stannin is expressed in the TMT-damaged neuronal cells and may be involved in mitochondria-mediated apoptosis in these cells. The structure of stannin is composed of three domains: a single transmembrane helix, a linker and a distorted cytoplasmic helix.
