identifier: InterPro:IPR042206
label: "CRISPR-associated endonuclease Cas1, C-terminal domain"
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This superfamily corresponds to the C-terminal domain found in Cas1, a CRISPR-associated protein. Cas1 is common to all CRISPR-containing prokaryotes and it may be involved in linking DNA segments to CRISPR.
