identifier: InterPro:IPR011856
label: tRNA endonuclease-like domain superfamily
definition: >-
  This superfamily represents a structural domain found in three types of endonucleases: TsnA endonuclease (N-terminal), Hjc-type resolvase, and tRNA-intron endonuclease (C-terminal) ( ). These domains have a 3-layer α/β/α topology, which is similar in structure to a motif found in several restriction endonucleases. TsnA endonuclease is a catalytic component of the Tn7 transposition system. Tn7 transposase is composed of four proteins: TnsA, TnsB, TnsC and TsnD. DNA breakage at the 5' end of the transposon is carried out by TnsA, and breakage and joining at the 3' end is carried out by TnsB. TnsC is the molecular switch that regulates transposition. The N-terminal domain of TnsA is catalytic. Hjc is a type of Holliday junction resolvase. The Holliday junction is an essential intermediate of homologous recombination, comprising four-stranded DNA complexes that are formed during recombination and related DNA repair events. During homologous recombination, genetic information is physically exchanged between parental DNAs via crossing single strands of the same polarity within the four-way Holliday structure. Hjc is an archaeal endonuclease, which specifically resolves the junction DNA to produce two separate recombinant DNA duplexes. This process is terminated by the endonucleolytic activity of resolvases, which convert the four-way DNA back to two double strands.
