identifier: InterPro:IPR027268
label: "Peptidase M4/M1, CTD superfamily"
definition: >-
  This superfamily represents an α-helix-bundled C-terminal domain (CTD) found in peptidases M4 and M1 family members. Both M1 and M4 metallopeptidases belong to the MEROPS peptidase family clan MA(E).
