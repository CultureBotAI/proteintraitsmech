label: "NFRKB winged helix-like domain superfamily"
definition: >-
  This winged helix-like domain is found in nuclear factor related to kappa-B-binding (NFRKB) protein. This winged helix-like domain is however not involved in DNA binding but is instead thought to be involved in protein-protein interactions.
