identifier: InterPro:IPR043134
label: "GTP cyclohydrolase I, N-terminal domain"
definition: >-
  GTP cyclohydrolase I ( ) catalyses the biosynthesis of formic acid and dihydroneopterin triphosphate from GTP. This reaction is the first step in the biosynthesis of tetrahydrofolate in prokaryotes, of tetrahydrobiopterin in vertebrates, and of pteridine-containing pigments in insects. The comparison of the sequence of the enzyme from bacterial and eukaryotic sources shows that the structure of this enzyme has been extremely well conserved throughout evolution. This superfamily entry consists of the N-terminal domain found in GTP cyclohydrolases I (GTP-CH-I), which has been well conserved throughout evolution across bacterial and eukaryotic species. The GTP-CH-I monomer folds into an α β structure with a predominantly helical N-terminal part.
