identifier: InterPro:IPR038704
label: "YEATS superfamily"
definition: >-
  This superfamily represents YEATS (Yaf9, ENL, AF9, Taf14, and Sas5) domain, an evolutionarily conserved module present in 4 proteins (ENL, AF9, GAS41, and YEATS2) in humans and 3 proteins (Sas5, Taf14, and Yaf9) in yeast. These proteins are found in major chromatin-remodeling and histone acetyl-transferase (HAT) complexes and implicated in regulation of chromatin structure, histone acetylation and deposition, gene transcription and DNA damage response. The YEATS domain, which as previously shown is found in a number of chromatin-associated proteins, has recently been shown to have the capacity to bind histone lysine acetylation. The ability of the YEATS domains of human AF9 and yeast Taf14 to recognise the histone mark H3K9ac, have shown that these proteins are members of the family of acetyllysine readers.
