identifier: InterPro:IPR035931
label: "YlxR-like superfamily"
definition: >-
  This entry represents the YlxR protein of unknown function from Streptococcus pneumonia. YlxR is expressed from the nusA/infB operon in bacteria and belongs to a small protein family (COG2740) that shares a conserved sequence motif GRGA(Y/W). The YlxR structure resembles a two-layer α/β sandwich with the overall shape of a cylinder. Structural analysis revealed that the YlxR structure represents a new protein fold that belongs to the α-β plait superfamily. YlxR is supposed to be an RNA-binding protein.
