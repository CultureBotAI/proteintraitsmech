identifier: InterPro:IPR038446
label: "CEBP, ZZ domain superfamily"
definition: >-
  This entry represents the ZZ-type zinc finger domain found in the cytoplasmic polyadenylation element-binding protein. It binds zinc via two conserved histidines in the C-terminal part of the domain.
