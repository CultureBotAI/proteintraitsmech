identifier: InterPro:IPR036316
label: "Pili assembly chaperone, C-terminal domain superfamily"
definition: >-
  Most Gram-negative bacteria possess a supramolecular structure - the pili - on their surface, which mediates attachment to specific receptors. Many interactive subunits are required to assemble pili, but their assembly only takes place after translocation across the cytoplasmic membrane. Periplasmic chaperones assist pili assembly by binding to the subunits, thereby preventing premature aggregation. Pili chaperones are structurally, and possibly evolutionarily, related to the immunoglobulin superfamily: they contain two globular domains, with a topology identical to an immunoglobulin fold. This entry represents the C-terminal domain superfamily of pili assembly chaperone PapD, and has a β-sandwich fold consisting of eight strands in two sheets with a Greek key topology.
