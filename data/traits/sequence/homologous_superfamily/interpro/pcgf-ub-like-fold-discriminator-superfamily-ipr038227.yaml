identifier: InterPro:IPR038227
label: "PCGF Ub-like fold discriminator superfamily"
definition: >-
  The PUFD (PCGF Ub-like fold discriminator) domain is found at the C terminus of BCOR (BCL6 corepressor), and binds to the RAWUL (RING finger- and WD40-associated ubiquitin-like) domain of the polycomb-group protein PCGF1. This domain is also found in BCORL1 (BCL6 corepressor-like), which also binds PCGF1 through its PUFD domain. Like BCOR, BCORL1 functions as a corepressor.
