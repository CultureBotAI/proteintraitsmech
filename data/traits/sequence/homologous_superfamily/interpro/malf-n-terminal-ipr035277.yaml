identifier: InterPro:IPR035277
label: "MalF, N-terminal"
definition: >-
  The malF gene product (MalF) is an inner membrane component of the maltose transport system in Escherichia coli. Some gene fusions between malF and lacZ produce hybrid proteins which are membrane-bound while other fusions produce hybrid proteins which are cytoplasmic. The MalF protein belongs to the ABC transporter superfamily, the binding-protein-dependent transport system permease family and the MalFG subfamily. Hydrophobic proteins from the ABC transporter superfamily display a conserved, at least 20 amino acid region (EAA-X3-G-X9-I-X-LP), exposed in the cytosol, called the EAA region. This region is presume to be a recognition site for the ABC ATPase helical domain.
