identifier: InterPro:IPR028988
label: "Hemolytic lectin CEL-III, C-terminal domain superfamily"
definition: >-
  Hemolytic lectin CEL-III is a Ca(2+)-dependent and galactose-specific lectin from the sea cucumber (Cucumaria echinata). CEL-III exhibits hemolytic and hemagglutinating activities. CEL-III contains two N-terminal carbohydrate-binding domains (domains 1 and 2) and a C-terminal domain (domain 3). This superfamily represents the C-terminal domain, which contains hydrophobic segments and may be involved in the oligomerisation in the target cell membrane.
