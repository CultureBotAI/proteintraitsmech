identifier: InterPro:IPR043106
label: "Rubella capsid domain superfamily"
definition: >-
  Rubella virus is an enveloped positive-strand RNA virus of the family Togaviridae. Virions are composed of three structural proteins: a capsid and two membrane-spanning glycoproteins, E2 and E1. During virus assembly, the capsid interacts with genomic RNA to form nucleocapsids. It has been discovered that capsid phosphorylation serves to negatively regulate binding of viral genomic RNA. This may delay the initiation of nucleocapsid assembly until sufficient amounts of virus glycoproteins accumulate at the budding site and/or prevent non-specific binding to cellular RNA when levels of genomic RNA are low. It follows that at a late stage in replication, the capsid may undergo dephosphorylation before nucleocapsid assembly occurs. This superfamily represents a domain found in the rubella capsid protein. Structurally, it consists of 5 β strands and a two-turn α helix. The 5 β strands are arranged anti-parallel and within the capsid protein are labelled ABCDE. The two-turn α helix is positioned between strands B and C. Within rubella virus, capsid protein forms a two-fold symmetric dimer.
