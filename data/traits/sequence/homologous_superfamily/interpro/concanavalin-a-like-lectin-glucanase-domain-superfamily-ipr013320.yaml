identifier: InterPro:IPR013320
label: "Concanavalin A-like lectin/glucanase domain superfamily"
definition: >-
  This superfamily represents the concanavalin A-like domain, which has a sandwich structure of 12-14 β-strands in two sheets with a complex topology. Proteins containing this domain include: Legume lectins Glycosyl hydrolases family 16 Galectin (animal S-lectin) Laminin G-like module Pentraxin Clostridium neurotoxins Exotoxin A Vibrio cholera sialidase Leech intramolecular trans-sialidase Glycosyl hydrolase family 7 Xylanase/endoglucanase Calnexin/calreticulin Lectin leg-like vp4 sialic acid binding protein Trypanosoma sialidase Thrombospondin Hypothetical protein YesU Alginate lyase Glycosyl hydrolases family 32 Peptidase A4 Alpha-L-arabinofuranosidase B SPRY domain containing proteins Beta-D-xylosidase SO2946-like MAM domain containing proteins
definition_source: InterPro
trait_axis: SEQUENCE
trait_category: SEQ_HOMOLOGOUS_SUPERFAMILY
term_kind: CLASS
