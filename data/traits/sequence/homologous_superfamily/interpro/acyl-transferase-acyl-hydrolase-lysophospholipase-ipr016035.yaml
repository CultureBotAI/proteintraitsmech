identifier: InterPro:IPR016035
label: "Acyl transferase/acyl hydrolase/lysophospholipase"
definition: >-
  This superfamily represents a structural domain with a 3-layer α/β/α topology. This domain can be found in acyl transferases such as bacterial malonyl-CoA ACP transacylase (FabD) and the homologous domain from eukaryotic fatty acid synthase. This domain is also found in lysophospholipases such as cytosolic phospholipase A2 (which has additional structural features), and in patatin proteins, which are plant glycoproteins that act as non-specific lipid acyl hydrolases.
