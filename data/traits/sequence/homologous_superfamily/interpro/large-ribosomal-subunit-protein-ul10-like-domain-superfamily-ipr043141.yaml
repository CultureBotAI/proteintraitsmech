identifier: InterPro:IPR043141
label: "Large ribosomal subunit protein uL10-like domain superfamily"
definition: >-
  This superfamily represents the N-terminal RNA-binding domain of the large ribosomal subunit protein uL10 (also known as L10) from bacteria. The entry contains homologues such as archaebacterial acidic ribosomal protein P0 homologue (L10E) and the eukaryotic 60S ribosomal protein P0 (L10E). The RNA-binding domain and the adjacent domain are thought to exist in archaeal L10 and eukaryotic P0 proteins only. Structurally, this domain contains three α-helices on each side of the five-stranded antiparallel β-sheet. The large ribosomal subunit contains a highly flexible and functionally important lateral protuberance called the 'stalk' (L7/L12 stalk in Bacteria, L12 stalk in Archaea, and P1/P2 stalk in Eukarya). The stalk is involved in the formation of the so-called 'GTPase-associated site' and plays a key role in the interaction of ribosome with translation factors and in the control of translation accuracy. The L7/12 stalk is formed by two or three copies of the L7/L12 dimer bound to the C-terminal tail of protein L10. The N-terminal domain of L10 binds to a segment of domain II of 23S rRNA near the binding site for ribosomal protein L11. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the…
