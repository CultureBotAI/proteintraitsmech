identifier: InterPro:IPR038078
label: "PhoU-like domain superfamily"
definition: >-
  This entry represents the PhoU superfamily, it also includes Putative inorganic phosphate export protein YjbB and uncharacterised prokaryotic proteins. PhoU proteins are known to play a role in the regulation of phosphate uptake. The PhoU domain is composed of a three helix bundle. The PhoU protein contains two copies of this domain. The domain binds to an iron cluster via its conserved E/DXXXD motif. Deletion of PhoU activates constitutive expression of the phosphate ABC transporter and allows phosphate transport, but causes a growth defect; suggesting that the protein has some secondary function. The crystal structure of PHOU_AQUAE reveals two similar coiled-coil PhoU domains, each forming a three-helix bundle.
