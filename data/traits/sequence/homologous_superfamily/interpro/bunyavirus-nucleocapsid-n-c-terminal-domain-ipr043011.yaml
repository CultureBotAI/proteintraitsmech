identifier: InterPro:IPR043011
label: "Bunyavirus nucleocapsid (N) , C-terminal domain"
definition: >-
  Orthobunyavirus are enveloped viruses with a genome consisting of 3 ssRNA segments (called L, M and S). The nucleocapsid protein (also known as nucleoprotein) is encoded on the small (S) genomic RNA. The N protein is the major component of the nucleocapsids. This protein is thought to interact with the L protein, virus RNA and/or other N proteins. This superfamily represents the C-terminal domain found in Bunyavirus nucleocapsid (N) protein. It is made up of 6 α helices. Some residues of this domain make up the 'C-arm' which makes intimate contact with core domains of neighbouring molecules to form a tightly-bound network throughout the crystal.
