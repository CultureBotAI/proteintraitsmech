identifier: InterPro:IPR036241
label: "NSFL1 cofactor p47, SEP domain superfamily"
definition: >-
  The SEP (after shp1, eyc and p47) domain is an eukaryotic domain, which occurs frequently and mainly in single units. Almost all proteins containing a SEP domain are succeeded closely by a UBX domain (see ). The function of the SEP domain is as yet unknown but it has been proposed to act as a reversible competitive inhibitor of the lysosomal cysteine protease cathepsin L. The sructure of the SEP domain comprises a β-sheet composed of four strands, and two α-helices. One side of the β-sheet faces alpha1 and alpha2. The longer helix alpha1 packs against the four-stranded β-sheet, where as the shorter helix alpha2 is located at one edge of the globular structure formed by alpha1 and the four stranded β sheet. A number of highly conserved hydrophobic residues are present in the SEP domain, which are predominantly buried and form the hydrophobic core. Some proteins known to contain a SEP domain are listed below: Eukaryotic NSFL1 cofactor p37 (or p97 cofactor p37), an adapter protein required for Golgi and endoplasmic reticulum biogenesis. It is involved in Golgi and endoplasmic reticulum maintenance during interphase and in their reassembly at the end of mitosis. Eukaryotic NSFL1 cofactor p47 (or p97 cofactor p47), a major adaptor molecule of the cytosolic AAA-type ATPase (ATPases associated with various cellular activities) p97. p47 is required for the p97-regulated membrane reassembly of the endoplasmic reticulum (ER), the nuclear envelope and the Golgi apparatus. Vertebrate UBX domain-containing protein 4 (UBXD4). Plant UBA and UBX domain-containing protein. Saccharomyces cerevisiae (Baker's yeast) UBX domain-containing protein 1 or Suppressor of high-copy PP1 protein (shp1), the homologue of p47. Drosophila melanogaster (Fruit fly) eyes closed (eyc).
