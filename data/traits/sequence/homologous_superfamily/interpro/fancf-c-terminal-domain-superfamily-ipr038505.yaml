identifier: InterPro:IPR038505
label: "FANCF, C-terminal domain superfamily"
definition: >-
  Fanconi anemia (FA) is a genomic instability syndrome caused by mutations in at least 13 distinct genes whose products function in a common DNA repair signaling pathway, the FA pathway. The FA pathway cooperates with other DNA repair proteins for resolving DNA interstrand cross-links during replication. Fanconi anemia group F protein (FANCF) is a component of the FA core complex. FANCF regulates its own expression by methylation at both mRNA and protein levels. Methylation-induced inactivation of FANCF has an important role on the occurrence of ovarian cancers by disrupting the FA-BRCA pathway. This entry represents the C-terminal region of the FANCF protein found in metazoa. The C-terminal domain has an helical repeat structure and is necessary for the proper assembly of the FA core complex.
