identifier: InterPro:IPR029052
label: "Metallo-dependent phosphatase-like"
definition: >-
  This entry represents a domain found in metallo-dependent phosphatases. Proteins containing this domain include: Purple acid phosphatases. DNA double-strand break repair nucleases. 5'-nucleotidases (syn. UDP-sugar hydrolase). Protein serine/threonine phosphatase. Phosphoesterase-related proteins. TT1561-like proteins. YfcE-like proteins. Hypothetical protein aq_1666. DR1281-like proteins. TTHA0625-like proteins. GpdQ-like proteins. ADPRibase-Mn-like proteins. Metallophosphatases (MPPs), also known as metallophosphoesterases, phosphodiesterases (PDEs), binuclear metallophosphoesterases, and dimetal-containing phosphoesterases (DMPs), represent a diverse superfamily of enzymes with a conserved domain containing an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues.
