identifier: InterPro:IPR038603
label: "FCS-type zinc finger superfamily"
definition: >-
  The FCS-type zinc finger, named after the signature FCS residues associated with the third cysteine, is present in several polycomb group proteins. The FCS zinc finger is expected to adopt a Zn-ribbon like fold. Molecular data suggest that this domain can bind RNA in a non-sequence-specific manner.
