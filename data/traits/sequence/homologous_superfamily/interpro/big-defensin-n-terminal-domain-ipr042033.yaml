identifier: InterPro:IPR042033
label: "Big defensin, N-terminal domain"
definition: >-
  Big defensins are antimicrobial peptides. They consist of a hydrophobic N-terminal half, which is active against Gram-positive bacteria, and a cationic C-terminal half, which is active against Gram-negative bacteria. The C-terminal half adopts a beta-defensin-like structure. This superfamily represents the N-terminal domain found in big defensins.
