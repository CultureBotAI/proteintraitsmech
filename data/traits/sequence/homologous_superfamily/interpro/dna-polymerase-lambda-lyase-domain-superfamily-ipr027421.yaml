identifier: InterPro:IPR027421
label: "DNA polymerase lambda lyase domain superfamily"
definition: >-
  DNA polymerase lambda is a repair polymerase that has both DNA polymerase and terminal transferase activities. It has 5'-deoxyribose-5-phosphate lyase (dRP lyase) activity. Structural modeling suggests that pol lambda contains the palm, fingers, thumb, and lyase domains present in pol beta, as well as an additional N-terminal BRCT domain and a serine-proline-rich linker that are presumably involved in protein-protein interactions. This superfamily represents the lyase domain of pol lambda which is also known as the 8kDa domain.
