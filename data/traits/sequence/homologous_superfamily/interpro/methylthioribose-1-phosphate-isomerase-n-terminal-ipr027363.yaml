identifier: InterPro:IPR027363
label: "Methylthioribose-1-phosphate isomerase, N-terminal"
definition: >-
  Methylthioribose-1-phosphate isomerase, an enzyme of the methionine salvage pathway, catalyses the interconversion of methylthioribose-1-phosphate (MTR-1-P) into methylthioribulose-1-phosphate (MTRu-1-P). The enzyme can be divided into two domains, the N-terminal domain and the C-terminal domain. The N-terminal domain folds into a three-stranded antiparallel β-sheet followed by five α-helices.
