identifier: InterPro:IPR008978
label: "HSP20-like chaperone"
definition: >-
  This homologous superfamily represents HSP20-like chaperones and related proteins. Hsp20 is a mammalian small heat-shock protein family that occurs most abundantly in skeletal muscle and heart. It has a tendency to form dimers, via a disulphide linkage formed by an N-terminal cysteine, low heat stability and a poor chaperoning ability in comparison with other family members. Structurally, this and related proteins contain a β-sandwich fold consisting of 8 strands in two β-sheets in a greek-key topology.
