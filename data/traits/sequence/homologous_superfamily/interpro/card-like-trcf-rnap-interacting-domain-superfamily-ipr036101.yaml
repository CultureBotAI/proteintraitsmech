identifier: InterPro:IPR036101
label: "CarD-like/TRCF, RNAP-interacting domain superfamily"
definition: >-
  This entry represents the RNA polymerase-interacting domain (RID) superfamily of transcription-repair-coupling factor (TRCF), CarD and CarD homologue in Myxococcus xanthus, called CdnL. CarD is a Myxococcus xanthus protein required for the activation of light- and starvation-inducible genes. Furthermore, CarD is widely distributed among bacteria and represents a distinct class of RNAP binding proteins that regulate transcription and essential processes. TRCF couples transcription and DNA repair in bacteria in which the RID domain is essential for the RNAP release function. The structure of CarD presents a partly open barrel (tudor-like) topology. The last strand is interrupted by a turn of 3-10 helix.
