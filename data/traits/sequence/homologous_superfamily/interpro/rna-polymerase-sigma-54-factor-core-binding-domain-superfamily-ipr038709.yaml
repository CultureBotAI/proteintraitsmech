identifier: InterPro:IPR038709
label: "RNA polymerase sigma-54 factor, core-binding domain superfamily"
definition: >-
  Bacterial core RNA polymerases (with subunit composition alpha2-β-β') must combine with a sigma subunit to transcribe from specific DNA promoter sequences. This domain, the core-binding domain of sigma factor 54, is a four-helical domain with negative charge that binds and makes a direct interaction with the core RNA polymerase to form an enhancer dependent holoenzyme and triggers the initiation of transcription.
