identifier: InterPro:IPR038674
label: "CzcE superfamily"
definition: >-
  CzcE is involved in heavy-metal resistance. It binds copper, which induces a conformational change. It is thought that CzcE acts both as a Cu(I) and Cu(II) sensor and mediator of the multiple cross-responses of C. metallidurans CH34 against heavy metals by linking copper and cobalt-zinc-cadmium resistance.
