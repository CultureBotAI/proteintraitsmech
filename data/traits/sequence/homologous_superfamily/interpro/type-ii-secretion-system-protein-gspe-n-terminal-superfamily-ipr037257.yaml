identifier: InterPro:IPR037257
label: "Type II secretion system protein GspE, N-terminal superfamily"
definition: >-
  This domain superfamily is found at the N terminus of members of the general secretory system II protein E. Proteins in this subfamily are typically involved in Type IV pilus biogenesis (e.g. ), though some are involved in other processes; for instance aggregation in Myxococcus xanthus (e.g. ). Its structure contains an extra C-terminal helix that packs against a shorter N-terminal helix.
