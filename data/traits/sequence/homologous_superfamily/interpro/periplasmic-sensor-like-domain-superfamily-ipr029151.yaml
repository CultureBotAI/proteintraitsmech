identifier: InterPro:IPR029151
label: "Periplasmic sensor-like domain superfamily"
definition: >-
  This superfamily represents an α(2)-β(2)-α(2)-β(3) domain found in the sensory domain of two-component sensor kinases, in the C-terminal of the uncharacterised protein YkuI and in the periplasmic region of LuxQ. It may be related to the PAS (Per/ARNT/Simple-minded) domain.
