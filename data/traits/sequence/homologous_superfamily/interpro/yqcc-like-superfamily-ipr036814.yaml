identifier: InterPro:IPR036814
label: "YqcC-like superfamily"
definition: >-
  This entry represents the structural domain found in the N-terminal of some tRNA pseudouridine synthase C proteins, as well as other uncharacterised proteins. Structurally, YqcC is has a bromodomain-like fold, which is composed of four helices arranged in bundle with minor mirror variant of up-and-down topology.
