identifier: InterPro:IPR029069
label: "HotDog domain superfamily"
definition: >-
  The HotDog superfamily represents a domain found in thioesterases and thiol ester dehydratase-isomerases. This domain is also known as the 'hot dog' fold from the study of the structure of Escherichia coli beta-hydroxydecanoyl thiol ester dehydrase (FabA). It contains the seven-stranded antiparallel β-sheet 'bun', which wraps around a five-turn α-helical 'sausage'. Proteins containing this domain include numerous prokaryotic, archaeal and eukaryotic proteins involved in several related, but distinct, catalytic activities, from metabolic roles such as thioester hydrolysis in fatty acid metabolism, to degradation of phenylacetic acid and the environmental pollutant 4-chlorobenzoate. It also includes FapR, a non-catalytic bacterial homologue that is involved in transcriptional regulation of fatty acid biosynthesis.
