identifier: InterPro:IPR042085
label: "Alkaline phosphatase, crown domain"
definition: >-
  This superfamily represents the alkaline phosphatases (AP) crown domain. AP are metalloenzymes that exist as a dimer, each monomer binding metal ions, generally zinc and magnesium. The crown domain has a variable size across different APs and its role is to connect the two subunits.
