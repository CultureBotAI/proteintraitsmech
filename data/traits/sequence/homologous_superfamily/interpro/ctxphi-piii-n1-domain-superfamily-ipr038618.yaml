identifier: InterPro:IPR038618
label: "CTXphi pIII, N1 domain superfamily"
definition: >-
  This entry represents the N-terminal domain, N1, of the pIII protein of the CTXphi bacteriophage of Vibrio cholerae. CTXphi is a ssDNA Inovirus. pIII is a minor coat protein. This domain interacts directly with the C terminus of TolA, a periplasmic protein of Vibrio cholerae itself as part of the infection mechanism. Structurally, this domain consists of 5 β strands. The third strand has small breaks within the strand, referred to as beta3a-c.
