identifier: InterPro:IPR037175
label: Kynurenine formamidase superfamily
definition: >-
  Kynurenine formamidase catalyses the hydrolysis of N-formyl-L-kynurenine to L-kynurenine, the second step in the kynurenine pathway of tryptophan degradation. The proteins contain a conserved motif HXGTHXDXPXH that is likely to form a part of the active site. Structurally, it contains a mixed β-sheet close barrel fold.
