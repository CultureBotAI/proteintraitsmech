identifier: InterPro:IPR046349
label: "C1-like domain superfamily"
definition: >-
  This superfamily includes variations of the protein kinase C1 domain that is characterised by a rich cysteine and histidine content. The C1 domain is the N-terminal region of conservation found in protein kinase C domains. This domain is involved in binding many ligands, which include diacylglycerol, phorbol esters and zinc. This superfamily also includes the C-terminal domain of General transcription factor IIH subunit 2 whose structure revealed homology with the regulatory domain of protein kinase C.
