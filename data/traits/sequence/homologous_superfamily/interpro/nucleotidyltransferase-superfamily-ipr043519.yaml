identifier: InterPro:IPR043519
label: "Nucleotidyltransferase superfamily"
definition: >-
  This entry represents the Pol beta-like nucleotidyltransferase (NT) superfamily. In the majority of enzymes in this superfamily, two carboxylates, Dx[D/E], together with a third more distal carboxylate, coordinate two divalent metal cations involved in a two-metal ion mechanism of nucleotide addition. The following functional groups of nucleotidyltransferases have been included in this superfamily: PolyA polymerases Protein nucleotidyltransferases, such as GlnD and GlnE CCA-adding enzyme Interferon-induced 2'-5' synthetase DNA polymerase beta and terminal deoxynucleotidyltransferase Antibiotic nucleotidyltransferases
