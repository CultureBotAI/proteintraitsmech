identifier: InterPro:IPR029032
label: AhpD-like
definition: >-
  This superfamily represents the α-helical domain found in alkyl-hydroperoxide reductase AhpD. AhpD is a component of alkyl-hydroperoxide reductase participating in defense against ROS (reactive oxygen species). The C-terminal α-helical domain of the AhpD protein from Mycobacterium tuberculosis shares protein sequence and structural similarity with the N-terminal of Sesns from animals. Sestrins (Sesns) are involved in ROS (reactive oxygen species) regulation.
