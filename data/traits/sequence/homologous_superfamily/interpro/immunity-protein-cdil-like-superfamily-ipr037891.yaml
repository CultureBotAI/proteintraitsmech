identifier: InterPro:IPR037891
label: "Immunity protein Cdil-like superfamily"
definition: >-
  Contact-dependent growth inhibition (CDI) toxins are expressed by Gram-negative bacteria as part of a mechanism to inhibit the growth of neighbouring bacteria. This entry includes the inhibitor (CdiI) of the CdiA effector protein from Escherichia coli EC869 (which is a DNAse). CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered. The inhibitors are intracellular proteins that inactivate the toxin/effector protein. The structure of Cdil is composed of two β(3)-α motifs related by pseudo twofold symmetry, a single antiparrallel β-sheet, shaped into a half-barrel with a helical linker region.
