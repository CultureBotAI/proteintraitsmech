identifier: InterPro:IPR042122
label: "Serine acetyltransferase, N-terminal domain superfamily"
definition: >-
  Serine acetyltransferase (SAT) catalyzes the first step of cysteine synthesis in microorganisms and higher plants. SAT is composed of two domains: an N-terminal α-helical domain, comprising eight α-helices, and left-handed C-terminal β-helical domain, comprising of fourteen β-strands forming five coils of the helix. This superfamily represents the N-terminal domain found in serine acetyltransferase.
