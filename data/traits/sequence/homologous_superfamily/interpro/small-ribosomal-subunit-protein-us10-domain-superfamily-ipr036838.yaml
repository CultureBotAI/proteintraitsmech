identifier: InterPro:IPR036838
label: "Small ribosomal subunit protein uS10 domain superfamily"
definition: >-
  Structurally, the small ribosomal subunit protein uS10 domain has a ferredoxin-like fold, which consists of an α+β sandwich with antiparallel β-sheet. Evidence suggests that, in prokaryotes, the peptidyl transferase reaction is performed by the large subunit 23S rRNA, whereas proteins probably have a greater role in eukaryotic ribosomes. Most of the proteins lie close to, or on the surface of, the 30S subunit, arranged peripherally around the rRNA. The small subunit ribosomal proteins can be categorised as primary binding proteins, which bind directly and independently to 16S rRNA; secondary binding proteins, which display no specific affinity for 16S rRNA, but its assembly is contingent upon the presence of one or more primary binding proteins; and tertiary binding proteins, which require the presence of one or more secondary binding proteins and sometimes other tertiary binding proteins. The small ribosomal subunit protein uS10 consists of about 100 amino acid residues. In Escherichia coli, uS10 is involved in binding tRNA to the ribosome, and also operates as a transcriptional elongation factor. Experimental evidence has revealed that uS10 has virtually no groups exposed on the ribosomal surface, and is one of the "split proteins": these are a discrete group that are selectively removed from 30S subunits under low salt conditions and are required for the formation of activated 30S reconstitution intermediate (RI*) particles. uS10 belongs to a family of proteins that includes: bacteria uS10; algal chloroplast uS10c; cyanelle uS10; archaebacterial uS10; Marchantia polymorpha and Prototheca wickerhamii mitochondrial S10; Arabidopsis thaliana mitochondrial uS10m (nuclear encoded); vertebrate uS10 (also known as S20); plant u S10 (also known as S20); and yeast uS10 (URP2…
