identifier: InterPro:IPR036361
label: "SAP domain superfamily"
definition: >-
  The SAP motif is a 35-residue motif, which has been named after SAF-A/B, Acinus and PIAS, three proteins known to contain it. The SAP motif is found in a variety of nuclear proteins involved in transcription, DNA repair, RNA processing or apoptotic chromatin degradation. As the sap motif of SAF-A has been shown to be essential for specific DNA binding activity, it has been proposed that it could be a DNA-binding motif. A multiple alignment of the SAP motif reveals a bipartite distribution of strongly conserved hydrophobic, polar and bulky amino acids separated by a region that contains a glycine. Secondary structure predictions suggest that the SAP motif could form two α helices separated by a turn. Some proteins known to contain a SAP motif are listed below: Vertebrate scaffold attachment factors A and B (SAF-A/B). These two proteins are heterogeneous nuclear ribonucleoproteins (hnRNPs) that bind to AT-rich chromosomal region. It has been proposed that they couple RNA metabolism to nuclear organisation. The SAF-A protein is cleaved by caspase-3 during apoptosis. Mammalian Acinus, a protein which induces apoptotic chromatin condensation after cleavage by caspase-3. Acinus also contains a RNA-recognition motif. Eukaryotic proteins of the PIAS (protein inhibitor of activated STAT) family. These proteins interact with phosphorylated STAT dimers and inhibit STAT mediated gene activation. Deletion of the first 50 amino acid residues containing the SAP domain allows the interaction of PIAS1 with STAT1 monomer. Plant poly(ADP-ribose) polymerase (PARP). PARP is a nuclear protein that catalyzes the poly(ADP-ribosyl)ation of proteins. It is involved in responses to mild and severe oxidative stresses, by mediating DNA repair and programmed cell death processes, respectively. PARP…
