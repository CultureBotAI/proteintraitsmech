identifier: InterPro:IPR011035
label: Large ribosomal subunit protein bL25/Gln-tRNA synthetase, anti-codon-binding domain superfamily
definition: >-
  The bacterial large ribosomal subunit protein bL25, previously known as ribosomal protein L25, is bound to 5S rRNA along with uL5 and uL18, forming a separate domain of the ribosome. The solution structure of protein bL25 uncomplexed with RNA shows two significantly disordered loops and a closed β-barrel domain with a complex topology that has significant structural similarities to the N-terminal domain of the Thermus thermophilus ribosomal protein TL5, to the general stress protein CTC, and to the C-terminal anticodon-binding domain of Escherichia coli glutaminyl-tRNA synthetase (GlnRS). GlnRS contains a duplication consisting of two L25-like β-barrels domains with the swapping of N-terminal strands.
