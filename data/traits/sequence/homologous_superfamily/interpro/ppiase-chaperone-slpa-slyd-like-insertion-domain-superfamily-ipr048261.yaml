identifier: InterPro:IPR048261
label: "PPIase chaperone SlpA/SlyD-like, insertion domain superfamily"
definition: >-
  This entry represents the insertion (described as insert-in-flap) domain of a group of FKBP-type peptidyl-prolyl cis-trans isomerases, including the metallochaperone SlpA (also known as FKBP-type 16 kDa peptidyl-prolyl cis-trans isomerase), SlyD from E.coli and related sequences. Members of this entry consist of two domains, the FKBP-type peptidyl-prolyl cis-trans isomerase (PPIase) domain ( ) which provides the PPIase activity, and the autonomously folded insert-in-flap (IF) domain, which gives the chaperone activity.
