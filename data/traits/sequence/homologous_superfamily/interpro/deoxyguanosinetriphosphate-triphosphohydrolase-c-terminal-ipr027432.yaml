identifier: InterPro:IPR027432
label: "Deoxyguanosinetriphosphate triphosphohydrolase, C-terminal"
definition: >-
  This superfamily represents a domain found at the C terminus of deoxyguanosine triphosphate triphosphohydrolase (dGTPase), an enzyme that releases inorganic triphosphate from GTP. dGTPase preferentially hydrolyses dGTP over the other canonical NTPs.
