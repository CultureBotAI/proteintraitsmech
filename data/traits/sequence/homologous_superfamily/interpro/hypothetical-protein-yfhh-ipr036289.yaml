identifier: InterPro:IPR036289
label: "Hypothetical protein YfhH"
definition: >-
  This entry consists of a group of proteins predominantly found in Firmicutes, including Uncharacterized protein YfhH from Bacillus subtilis and protein GK0453 from Geobacillus kaustophilus. GK0453 shows two small domains: an helix-turn-helix like motif is found in its N-terminal domain while an SH3-like β-barrel like structure is observed its C-terminal region. Its specific function is unknown. Some of the members of this protein family are annotated as being transcriptional regulators (see , ).
