identifier: InterPro:IPR042063
label: "Ubiquitin-activating enzyme E1, SCCH domain"
definition: >-
  The E1 enzyme that catalyses carboxy-terminal Ub adenylation, thioester bond formation to a catalytic cysteine in the E1 Cys domain, together with thioester transfer to a catalytic cysteine in E2 conjugating enzymes are responsible for the Ubiquitin (Ub) conjugation initiation. There are several homologues of this enzyme with one of them being ThiF. The catalytic cysteine domain contains the E1 active site cysteine, and is divided in two half-domains, FCCH and SCCH, for 'first' and 'second' catalytic cysteine half-domain, respectively. This superfamily represents the domain 5 found in Ub-activating enzyme E1, the SCCH in which resides the catalytic cysteine. This domain has an α-helical structure and likely to exist in equilibrium of open (adenylation active) and closed (thioester bond formation active) conformations. SCCH, FCCH (the first catalytic cysteine half-domain) and UFD (ubiquitin fold domain) are connected to the AAD (active adenylation domain) through flexible loops that allow the conformational changes and rotations of these domains essential for catalysis of Ub activation and transfer of activated UB from E1 to E2.
