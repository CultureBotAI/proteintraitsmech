identifier: InterPro:IPR042214
label: "Pseudouridine synthase, TruD, catalytic domain"
definition: >-
  Pseudouridine synthase TruD modifies uracil-13 in tRNA. TruD belongs to a large family of pseudouridine synthases present in all kingdoms of life. It folds into a V-shaped molecule with an RNA-binding cleft formed between its two domains: a catalytic domain and an insertion domain. The catalytic domain differs in sequence but is structurally very similar to the catalytic domain of other pseudouridine synthases. The insertion (or TRUD) domain displays an α/β structure that forms a compact fold titled away from the catalytic domain to create a deep cleft in TruD which is lined with basic residues from each domain. The insertion domain is characterised by two conserved sequence motifs that form a part of the hydrophobic core, as well as by large insertions at several specific sites that are seen in many archaeal and eukaryotic homologues. The insertion domain is likely to be involved in substrate recognition and may represent a RNA binding module. This superfamily represents the catalytic domain of TruD.
