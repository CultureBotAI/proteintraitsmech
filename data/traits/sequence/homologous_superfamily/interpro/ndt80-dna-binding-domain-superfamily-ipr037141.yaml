identifier: InterPro:IPR037141
label: NDT80, DNA-binding domain superfamily
definition: >-
  The NDT80 DNA-binding domain superfamily is found in the following proteins, which might all be involved in sensing nutritional status: Yeast meiosis-specific transcription factor NDT80, the key transcription factor that ultimately allows the continuation of meiosis after the successful completion of recombination. Emericella nidulans phoG (xprG), a transcriptional activator involved in the response to nutrient limitation. Emericella nidulans putative uncharacterised protein AN6015.2. Neurospora crassa transcription factor vib-1, involved in the control of heterokaryon incompatibility. Neurospora crassa related to acid phosphatase NCU04729. Neurospora crassa related to meiosis-specific protein NDT80 NCU09915. The proteolytically resistant core NDT80 DNA-binding domain reveals a central β-sandwich characteristic of an s-type Ig fold. The β-sandwich contains a three-stranded sheet composed of strands a, b and e, packed against a four-stranded sheet composed of strands c', c, f and g. Each sheet of the β-sandwich contains an additional β-strand, as well as a variety of peripheral secondary structure elements. The NDT80 DNA-binding domain contains an N-terminal extension, which consists of a β-hairpin and a loop.
