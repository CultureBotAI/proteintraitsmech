identifier: InterPro:IPR042266
label: "PPPDE peptidase domain superfamily"
definition: >-
  This superfamily represents the PPPDE domain (Permuted Papain fold Peptidases of DsRNA viruses and Eukaryotes). It consists of predicted thiol peptidases with a circularly permuted papain-like fold.
