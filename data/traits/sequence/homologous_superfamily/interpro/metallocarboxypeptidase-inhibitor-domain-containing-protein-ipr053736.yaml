identifier: InterPro:IPR053736
label: "Metallocarboxypeptidase Inhibitor Domain-containing Protein"
definition: >-
  This superfamily of proteins consists of inhibitors that specifically target metallocarboxypeptidases, a type of metalloprotease. Members of this superfamily are capable of inhibiting a range of metallocarboxypeptidases from different species, including bovine CPA1, human CPA1, CPA2, CPA4, CPB1, CPB2, and porcine CPB1. They do not inhibit carboxypeptidase D from Drosophila melanogaster, nor do they affect proteases from other mechanistic classes such as serine proteases (e.g., trypsin, chymotrypsin, subtilisin), cysteine proteases (e.g., papain), or aspartyl proteases (e.g., pepsin). Some members have been reported to exhibit antiplasmodial activity against Plasmodium falciparum without cytotoxic effects on human cells, suggesting a potential role in defense mechanisms.
