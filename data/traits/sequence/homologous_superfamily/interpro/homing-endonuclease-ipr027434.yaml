identifier: InterPro:IPR027434
label: "Homing endonuclease"
definition: >-
  Homing endonucleases are rare-cutting enzymes encoded by inteins and introns. They are found inserted within host genes in eukaryotes, bacteria, archaebacteria and viruses. By making a site-specific double-strand break in the intronless or inteinless alleles, these nucleases create recombinogenic ends which engage in a gene conversion process that duplicates the intron or intein. There are four families of homing endonucleases classified by the conserved sequence motifs LAGLIDADG, GIY-YIG, H-N-H and His-Cys box. Endonucleases of the DOD family contain one or two copies of the 10-residue sequence known as a dodecapeptide or LAGLIDADG motif. LAGLIDADG endonucleases are either monomers, such as I-SceI, that are composed of two pseudo symmetric subdomains, or homodimers, such as I-CreI. In both cases, the LAGLIDADG endonuclease folds into a β-saddle architecture, a common motif for nucleic acid binding proteins. This superfamily represents the homing endonuclease domain.
