identifier: InterPro:IPR015926
label: Cytolysin/lectin
definition: >-
  This entry represents a β-sandwich domain consisting of 10 strands in two sheets that is found in anemone pore-forming cytolysin, in fungal fruit body lectin and in similar eucaryotic sequences. Sea anemones are a rich source of lethal pore-forming peptides and proteins, known collectively as cytolysins or actinoporins. There are several different groups of cytolysins based on their structure and function. This entry represents the most numerous group, the 20kDa highly basic peptides. These cytolysins form cation-selective pores in sphingomyelin-containing membranes. Examples include equinatoxins (from Actinia equina (European sea anemone)), sticholysins (from Stoichactis helianthus (Carribean sea anemone) (Stichodactyla helianthus)), magnificalysins (from Radianthus magnifica (Magnificent sea anemone) (Heteractis magnifica)), and tenebrosins (from Actinia tenebrosa (Australian red waratah sea anemone)), which exhibit pore-forming, haemolytic, cytotoxic, and heart stimulatory activities. The crystal structures of equinotoxin II and sticholysin II both revealed a compact β-sandwich consisting of ten strands in two sheets flanked on each side by two short α-helices, which is a similar topology to osmotin. It is believed that the β-sandwich structure attaches to the membrane, while a three-turn α-helix lying on the surface of the β-sheet may be involved in membrane pore formation, possibly by the penetration of the membrane by the helix. Fungal fruit body lectins and TF antigen-binding lectins carry a domain with a similar structural fold. Fungal fruit body lectin proteins. Fruit body lectins are thought to have insecticidal activity and may also function in capturing nematodes. One member of this family, the lectin XCL from Xerocomus chrysenteron, induces drastic changes…
