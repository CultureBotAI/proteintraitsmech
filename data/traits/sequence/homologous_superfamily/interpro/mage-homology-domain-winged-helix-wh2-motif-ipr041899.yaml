identifier: InterPro:IPR041899
label: "MAGE homology domain, winged helix WH2 motif"
definition: >-
  This superfamily includes MAGE (melanoma antigen-encoding gene) proteins, which are expressed in a wide variety of tumours but not in normal cells, with the exception of the male germ cells, placenta, and, possibly, cells of the developing embryo. The cellular function is currently unknown. This superfamily also contains the yeast protein, Nse3. The Nse3 protein is part of the Smc5-6 complex and interacts with NSE4/EID family proteins. Nse3 has been demonstrated to be important in meiosis. MAGE proteins share a conserved domain known as the MAGE homology domain (MHD). This superfamily entry represents the domain that contains a winged helix motif WH2.
