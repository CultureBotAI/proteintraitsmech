identifier: InterPro:IPR041856
label: "Glutamine-dependent NAD+ synthetase, C-terminal"
definition: >-
  This superfamily entry represents a domain found at the C terminus of glutamine-dependent NAD+ synthetase. NAD+ biosynthesis is absolutely dependent on the activity of a multifunctional glutamine-dependent NAD+ synthetase, which catalyzes the ATP-dependent formation of NAD+ at the synthetase domain using ammonia derived from L-glutamine in the glutaminase domain.
