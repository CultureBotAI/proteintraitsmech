identifier: InterPro:IPR036968
label: Enolpyruvate transferase domain superfamily
definition: >-
  5-enolpyruvylshikimate 3-phosphate synthase (EPSPS), also known as 3-phosphoshikimate 1-carboxyvinyltransferase, and UDP-N-acetylglucosamine enolpyruvyl transferase (MurA), also known as UDP-N-acetylglucosamine 1-carboxyvinyltransferase, have both a unique three-dimensional topology and overall reaction mechanism in common. This entry represents the core domain superfamily of EPSPS and MurA, which transfers enolpryruvate from phosphoenolpyruvate to 3-phosphoshikimate and UDP-N-acetyl-alpha-D-glucosamine respectively.
