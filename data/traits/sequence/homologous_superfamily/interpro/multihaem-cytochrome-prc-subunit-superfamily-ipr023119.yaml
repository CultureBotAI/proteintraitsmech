identifier: InterPro:IPR023119
label: "Multihaem cytochrome, PRC subunit superfamily"
definition: >-
  This superfamily represents a multihaem-binding domain found in the cytochrome subunit of the photosynthetic reaction centre (PRC) and other cytochrome proteins. This domain is predominantly α-helical and, in the PRC cytochrome subunit, binds two haem groups.
