identifier: InterPro:IPR036543
label: Guanylate-binding protein, C-terminal domain superfamily
definition: >-
  Guanylate-binding protein is a GTPase that is induced by interferon (IFN)-gamma. GTPases induced by IFN-gamma are key to the protective immunity against microbial and viral pathogens. These GTPases are classified into three groups: the small 47-kd GTPases, the Mx proteins, and the large 65- to 67-kd GTPases. Guanylate-binding proteins (GBP) fall into the last class. In humans, there are seven GBPs (hGBP1-7). Structurally, hGBP1 consists of two domains: a compact globular N-terminal domain harbouring the GTPase function, and an α-helical finger-like C-terminal domain. Human GBP1 is secreted from cells without the need of a leader peptide, and has been shown to exhibit antiviral activity against Vesicular stomatitis virus and Encephalomyocarditis virus, as well as being able to regulate the inhibition of proliferation and invasion of endothelial cells in response to IFN-gamma. This entry represents the C-terminal domain superfamily of the guanylate-binding protein.
