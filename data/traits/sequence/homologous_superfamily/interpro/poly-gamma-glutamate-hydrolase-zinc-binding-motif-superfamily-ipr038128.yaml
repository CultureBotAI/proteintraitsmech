identifier: InterPro:IPR038128
label: "Poly-gamma-glutamate hydrolase, zinc-binding motif superfamily"
definition: >-
  This superfamily is named after the most representative protein, Poly-gamma-glutamate hydrolase (PghP), a globular protein with an open α/β mixed core structure and a seven-stranded parallel/anti-parallel β-sheet. The β-sheet contains a core four-stranded parallel β-sheet. The structure includes a zinc-binding motif, His-Glu-His at the C-terminal end of the β-sheet and a catalytic centre containing a zinc ion and an overall topology resembling mammalian carboxypeptidase A and related enzymes.
definition_source: InterPro
