identifier: InterPro:IPR036846
label: "GM2-AP, lipid-recognition domain superfamily"
definition: >-
  Ganglioside GM2 activator (GM2-AP) is a is a lysosomal lipid transfer protein that is essential for the hydrolytic conversion of ganglioside GM2 to GM3 by beta-hexosaminidase A. The crystal structure of apo-GM2-AP consists of a novel β-cup fold with a spacious hydrophobic interior.
