identifier: InterPro:IPR043123
label: "Phage bIL170 RBP, head domain"
definition: >-
  This superfamily represents the RBP (receptor-binding protein) head domain from phage bIL170. The structure of the head monomer is remarkably close to those of other lactococcal phages, p2 and TP901-1, despite any sequence identity with them. The head domain of the bIL170 RBP binds saccharides efficiently.
