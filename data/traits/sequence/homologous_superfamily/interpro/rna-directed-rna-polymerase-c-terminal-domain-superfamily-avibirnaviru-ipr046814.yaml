identifier: InterPro:IPR046814
label: "RNA-directed RNA polymerase, C-terminal domain superfamily, Avibirnavirus"
definition: >-
  RNA-directed RNA polymerase (RdRp) ( ) is an essential protein encoded in the genomes of all RNA containing viruses with no DNA stage. It catalyses synthesis of the RNA strand complementary to a given RNA template, but the precise molecular mechanism remains unclear. The postulated RNA replication process is a two-step mechanism. First, the initiation step of RNA synthesis begins at or near the 3' end of the RNA template by means of a primer-independent (de novo) mechanism. The de novo initiation consists in the addition of a nucleotide tri-phosphate (NTP) to the 3'-OH of the first initiating NTP. During the following so-called elongation phase, this nucleotidyl transfer reaction is repeated with subsequent NTPs to generate the complementary RNA product. This entry represents the C-terminal domain of RdRp from avibirnaviruses, which lack the highly conserved Gly-Asp-Asp (GDD) sequence, a component of the proposed catalytic site of this enzyme family that exists in the conserved motif VI of the palm domain ( ) of other RdRps. These enzymes have the five essential RNA polymerase motifs in a permuted order of C-A-B-D-E to form a conserved catalytic active site. This domain is mostly α-helical and runs across the canyon in the front of the palm, wrapping around the fingers subdomain, which may function to prevent back-primed RNA synthesis during protein priming. This domain adopts an α-helical orthogonal bundle structure.
