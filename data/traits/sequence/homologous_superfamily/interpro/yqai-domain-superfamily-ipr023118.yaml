identifier: InterPro:IPR023118
label: "YqaI domain superfamily"
definition: >-
  This superfamily represents a domain consisting of an α helix and four β strands. It is found in the hypothetical protein YqaI, which is expressed in bacteria, particularly Bacillus subtilis.
