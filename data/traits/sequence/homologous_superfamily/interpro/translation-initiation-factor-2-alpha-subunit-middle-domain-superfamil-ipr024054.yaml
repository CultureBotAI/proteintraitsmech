identifier: InterPro:IPR024054
label: "Translation initiation factor 2, alpha subunit, middle domain superfamily"
definition: >-
  This superfamily represents an α-helical domain is found between the S1 N-terminal domain and the α-β C-terminal domain in the alpha subunit of translation initiation factor 2. It consists of a bundle of two orthogonally packed α-hairpins.
