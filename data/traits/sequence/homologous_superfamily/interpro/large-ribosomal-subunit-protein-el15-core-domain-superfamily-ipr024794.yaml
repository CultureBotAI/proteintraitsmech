identifier: InterPro:IPR024794
label: Large ribosomal subunit protein eL15 core domain superfamily
definition: >-
  A number of eukaryotic and archaebacterial ribosomal proteins can be grouped on the basis of sequence similarities. One of these families consists of: Mammalian eL15. Insect eL15. Plant eL15y/z. Yeast eL15A/B. Archaebacterial eL15. These ribosomal proteins have a structure corresponding to a 3-layer (α-β-α) sandwich.
