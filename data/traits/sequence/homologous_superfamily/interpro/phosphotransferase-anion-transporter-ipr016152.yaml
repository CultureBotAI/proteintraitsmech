identifier: InterPro:IPR016152
label: "Phosphotransferase/anion transporter"
definition: >-
  This superfamily represents a structural domain found as the cytoplasmic domain in certain anion transporter proteins, and as domain IIa in mannitol-specific and ntr (nitrogen regulatory) phosphotransferases. This domain adopts a 3-layer α/β/α structure in the order, β-α(2)-β(3)-α(3). This domain can be elaborated with additional secondary structure in anion transporter proteins.
