identifier: InterPro:IPR036024
label: "Somatomedin B-like domain superfamily"
definition: >-
  Somatomedin B (SMB), a serum factor of unknown function, is a small cysteine-rich peptide, derived proteolytically from the N terminus of the cell-substrate adhesion protein vitronectin. Cys-rich somatomedin B-like domains are found in a number of proteins, including ectonucleotide pyrophosphatase/phosphodiesterase family member proteins (previously known as plasma-cell membrane glycoprotein) and placental protein 11 (also known as Poly(U)-specific endoribonuclease), which appears to possess amidolytic activity. The SMB domain of vitronectin has been demonstrated to interact with both the urokinase receptor and the plasminogen activator inhibitor-1 (PAI-1) and the conserved cysteines of the NPP1 somatomedin B-like domain have been shown to mediate homodimerisation. The SMB domain contains eight Cys residues, arranged into four disulphide bonds. It has been suggested that the active SMB domain may be permitted considerable disulphide bond heterogeneity or variability, provided that the Cys25-Cys31 disulphide bond is preserved. The three dimensional structure of the SMB domain is extremely compact and the disulphide bonds are packed in the centre of the domain forming a covalently bonded core. The structure of the SMB domain presents a new protein fold, with the only ordered secondary structure being a single-turn α-helix and a single-turn 3(10)-helix.
