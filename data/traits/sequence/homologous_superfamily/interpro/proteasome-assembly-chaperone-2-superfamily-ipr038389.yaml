identifier: InterPro:IPR038389
label: "Proteasome assembly chaperone 2 superfamily"
definition: >-
  This superfamily represents PAC2 (Proteasome assembly chaperone) proteins found in bacteria, archaea and eukaryotes. Its C-terminal segment containing the potential proteasome-activating HbYX motif. These proteins function as a chaperone for the 26S proteasome, which is about 2000 kilodaltons (kDa) in molecular mass and contains one 20S core particle structure and two 19S regulatory caps. The 26S proteasome mediates ubiquitin-dependent proteolysis in eukaryotic cells. A number of studies including very recent ones have revealed that assembly of its 20S catalytic core particle is an ordered process that involves several conserved proteasome assembly chaperones (PACs). Two heterodimeric chaperones, PAC1-PAC2 and PAC3-PAC4, promote the assembly of rings composed of seven alpha subunits.
