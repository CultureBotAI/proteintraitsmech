identifier: InterPro:IPR042089
label: "Peptidase M13, domain 2"
definition: >-
  This superfamily represents the cytoplasmic domain (domain 2) found in M13 peptidases. These proteins consist of a short N-terminal cytoplasmic domain, a single transmembrane helix, and a larger C-terminal extracellular domain containing the active site. The cytoplasmic domain contains a conformationally-restrained octapeptide, which is thought to act as a stop transfer sequence that prevents proteolysis and secretion.
