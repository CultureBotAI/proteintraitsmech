identifier: InterPro:IPR037296
label: Staphostatin A/B
definition: >-
  Staphostatin A (SAV1910, SA1726) and B (SspC) are cysteine protease inhibitors belonging to MEROPS inhibitor families I57 and I58 (clan IK). They have a β-barrel topology that act as specific inhibitors of staphopains, the major secreted cysteine proteases of Staphylococcus aureus. These inhibitors compete with substrate for binding at the active site of the staphopain, acting to protect intracellular proteins against proteolytic damage by prematurely folded and activated staphopains. They are also involved in growth capacity, viability and bacterial morphology.
