identifier: InterPro:IPR036295
label: "GlgS superfamily"
definition: >-
  GlgS (surface composition regulator) is a major determinant of cell surface composition. It negatively regulates motility, adhesion and synthesis of biofilm exopolysaccharides in Escherichia coli. The structure of the polypeptide chain comprises a bundle of two parallel amphipathic helices, α1 and α3, and a short hydrophobic helix α2 sandwiched between them.
