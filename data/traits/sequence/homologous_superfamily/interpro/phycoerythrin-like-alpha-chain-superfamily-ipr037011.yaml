identifier: InterPro:IPR037011
label: Phycoerythrin-like alpha chain superfamily
definition: >-
  Cryptophytes are unicellular photosynthetic algae that use a lumenally located light-harvesting system, which is distinct from the phycobilisome structure found in cyanobacteria and red algae. One of the key components of this system is water-soluble phycoerythrin (PE) 545 whose expression is enhanced by low light levels. Phycoerythrin (PE) 545 is a heterodimeric of α(1)α(2)betabeta subunits. Each alpha subunit carries a covalently linked 15,16-dihydrobiliverdin chromophore that probably acts as the final energy acceptor. The architecture of the heterodimer suggests that PE 545 may dock to an acceptor protein via a deep cleft and that energy may be transferred via this intermediary protein to the reaction centre. The structure of this domain found in the alpha chain is a long β-hairpin and a single α-helix.
