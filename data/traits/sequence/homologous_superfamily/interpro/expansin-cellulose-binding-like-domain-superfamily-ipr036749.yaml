identifier: InterPro:IPR036749
label: "Expansin, cellulose-binding-like domain superfamily"
definition: >-
  Expansins are secreted proteins of 25 to 27 Kd that were isolated first from young cucumber seedling and subsequently from other plant tissues. Expression of expansin genes correlates with growth of cells. Increase in expansin content also occurs during fruit ripening. Expansins act on the cell wall to promote its extensibility. The model for its mechanism of action postulates that expansins break non-covalent bonds between cell-wall polysaccharides, thereby permitting pressure dependent expansion of the cell. Group-I pollen allergens of grasses have limited but significant sequence homology to expansin. These proteins are the main causative agent of hay fever and seasonal asthma induced by grass pollen. Extracts containing group-I allergens are also active in loosening cell-walls. Group-I pollen allergens and related proteins in vegetative tissues have been classified as beta-expansins, whereas the earlier discovered expansins are now referred as α-expansins. Expansins consist of two domains closely packed and aligned so as to form a long, shallow groove with potential to bind a glycan backbone of ~10 sugar residues. The N-terminal cysteine-rich domain has distant sequence similarity to family-45 endoglucanases (EG45-like domain). The ~90-residue C-terminal domain may function as a cellulose-binding domain (CBD). It is composed of eight β-strands assembled into two antiparallel β-sheets. The two β-sheets are at slight angles to each other and form a β-sandwich similar to the Ig fold. This entry represents the expansin CBD-like domain superfamily.
