identifier: InterPro:IPR043057
label: "Erythrocyte binding antigen 175, C-terminal domain superfamily"
definition: >-
  EBA-175 is involved in the formation of a tight junction. This necessary step in invasion is required for replication and proliferation of the parasite in the bloodstream of its vertebrate host. This superfamily represents the C-terminal region VI, which is a cysteine rich domain essential for EBA-175 trafficking. The structure is a homodimer that contains a five-α-helical core stabilised by four disulphide bridges.
