identifier: InterPro:IPR011054
label: "Rudiment single hybrid motif"
definition: >-
  The rudiment single hybrid motif has a β-barrel sandwich hybrid motif, consisting of a sandwich of half-barrel shaped β-sheets. This motif is found in the small domain of cytochrome f, as well as in the C-terminal domain of the biotin carboxylase subunit of acetyl-CoA carboxylase, and its family members, such as glycinamide ribonucleotide synthetase C-terminal domain, N5-carboxyaminoimidazole ribonucleotide synthetase PurK C-terminal domain, and glycinamide ribonucleotide transformylase PurT C-terminal domain.
