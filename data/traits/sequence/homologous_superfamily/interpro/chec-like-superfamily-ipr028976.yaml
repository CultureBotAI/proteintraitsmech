identifier: InterPro:IPR028976
label: "CheC-like superfamily"
definition: >-
  This superfamily represents a domain found in the CheC-like proteins. In bacteria, CheC is involved in restoration of prestimulus levels of the chemotactic response regulator, CheY-P. Proteins contain this domain include flagellar motor switch protein FliM/FliY and CheX, both CheY-P phosphatases.
