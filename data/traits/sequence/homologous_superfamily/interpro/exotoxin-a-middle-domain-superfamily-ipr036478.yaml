identifier: InterPro:IPR036478
label: "Exotoxin A, middle domain superfamily"
definition: >-
  This domain, found in Pseudomonas aeruginosa exotoxin A, is responsible for transmembrane targeting of the toxin, as well as transmembrane translocation of the catalytic domain into the cytoplasmic compartment. A furin cleavage site is present within the domain: cleavage generates a 37kDa carboxy-terminal fragment, which includes the enzymatic domain, which is then is translocated into the cytoplasm. It adopts a helical structure, with six α-helices forming a bundle.
