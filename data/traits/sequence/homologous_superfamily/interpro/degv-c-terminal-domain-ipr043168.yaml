identifier: InterPro:IPR043168
label: "DegV, C-terminal domain"
definition: >-
  The DegV family of proteins includes paralogous sets in several species (B. subtilis, Deinococcus radiodurans, Mycoplasma pneumoniae) that are closer in percentage identity to each other than to most homologues from other species. This entry represents the C-terminal domain, it contains six β-strands and five α-helices in a two-layered α/β-arrangement.
