identifier: InterPro:IPR038690
label: "NusG, domain 2 superfamily"
definition: >-
  This domain consists of two-sandwiched four-stranded antiparallel sheets. It is found in transcription factor NusG, where it represents domain 2 and is inserted in domain 1. However, most NusG proteins are missing this domain. In other cases this domain is found in isolation. NusG is a regulator of Rho-dependent transcription termination, but the function of this domain is unknown.
