identifier: InterPro:IPR036173
label: "G39, N-terminal domain superfamily"
definition: >-
  This superfamily is represented by the N-terminal domain of Bacillus subtilis G39, composed of four helices. G39P inhibits the initiation of DNA replication by blocking G40P replicative helicase. G39P has a bipartite structure consisting of a folded N-terminal domain and an unfolded C-terminal domain. The C-terminal domain is essential for helicase interaction.
