identifier: InterPro:IPR035903
label: "HesB-like domain superfamily"
definition: >-
  The HesB family is found in species as divergent as Homo sapiens (Human) and Haemophilus influenzae, suggesting that these proteins are involved in basic cellular functions. A-type assembly protein (ATAP) is a conserved and essential member of the ISC, SUF, and NIF systems and plays an indispensable role in the FeS cluster assembly and the transfer process. The ATAP family consists of several subfamilies: Prokaryotic ISC system: IscA Eukaryotic ISC system: ISCA1, ISCA2 SUF system: SufA NIF system: HesB (IscAnif) Additional proteins: ErpA, cpIscA ATAPs are characterised by a conserved motif, Cys-Xn-Cys-X-Cys, by which ATAPs can bind transiently to Fe-S clusters, presumably using the three Cys residues in this motif, and transfer the FeS cluster to apoproteins. ErpA may interact with ISC and SUF. It binds to Fe-S clusters and transfers them to apo-IspG, which is involved in quinone biosynthesis among many other cell components. It is essential for bacterial growth under aerobic conditions. cpIscA is a SufA-like ATAP that was transferred from cyanobacteria to plants through endosymbiosis events and now is only harboured by plant plastids.
