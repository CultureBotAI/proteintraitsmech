identifier: InterPro:IPR042031
label: "SKA1 microtubule binding domain superfamily"
definition: >-
  This superfamily corresponds to the microtubule binding domain (MBD) in SKA1, spindle and kinetochore associated protein 1. Its structure is a variation of the winged helix domain which, in addition of the three helix-bundle and anti-parallel β-sheets found in canonical winged-helix domains, it contains an extended helix (αB) as part of three helix bundle and an additional helix (αC) inserted between αB and βA. Spindle and kinetochore-associated protein 1 (SKA1, also known as SKA complex subunit 1) is a component of the SKA1 complex (consists of Ska1, Ska2, and Ska3/Rama1), a microtubule-binding subcomplex of the outer kinetochore that is essential for proper chromosome segregation. It is required for timely anaphase onset during mitosis, when chromosomes undergo bipolar attachment on spindle microtubules leading to silencing of the spindle checkpoint. The SKA1 complex is a direct component of the kinetochore-microtubule interface and directly associates with microtubules as oligomeric assemblies. The complex facilitates the processive movement of microspheres along a microtubule in a depolymerisation-coupled manner. SKA1 contains a microtubule-binding domain that interacts with tubulins using multiple contact sites that allow the Ska complex to bind microtubules in multiple modes.
