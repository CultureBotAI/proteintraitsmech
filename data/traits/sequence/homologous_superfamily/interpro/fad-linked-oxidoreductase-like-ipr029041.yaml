identifier: InterPro:IPR029041
label: "FAD-linked oxidoreductase-like"
definition: >-
  This superfamily represents a domain found in bacterial 5,10-methylenetetrahydrofolate reductases and eukaryotic Proline dehydrogenase 1 and Hydroxyproline dehydrogenases. It is also found at the N-terminal domain of the eukaryotic enzyme Methylenetetrahydrofolate reductase (NADPH) and the bacterial bifunctional protein putA. Both eukaryotic and prokaryotic methylenetetrahydrofolate reductases generate 5-methyltetrahydrofolate from 5,10-methylenetetrahydrofolate, a cosubstrate for homocysteine remethylation to methionine. In humans, there are several clinically significant mutations in MTHFR that result in hyperhomocysteinemia, which is a risk factor for the development of cardiovascular disease.
