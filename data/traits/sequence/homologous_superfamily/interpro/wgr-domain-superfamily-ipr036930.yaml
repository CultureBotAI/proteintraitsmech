identifier: InterPro:IPR036930
label: "WGR domain superfamily"
definition: >-
  This domain superfamily is named after the most conserved central motif of the domain. It is found in a variety of polyA polymerases as well as the Escherichia coli molybdate metabolism regulator and other proteins of unknown function.The domain is found in isolation in proteins such as and is between 70 and 80 residues in length. Structurally, it has a β(4)-α-X-β motif arranged into two layers (α/β) with antiparallel β-sheet, there is also β-hairpin insertion in strand 1 which results in the formation of a beta-triangle structure.
