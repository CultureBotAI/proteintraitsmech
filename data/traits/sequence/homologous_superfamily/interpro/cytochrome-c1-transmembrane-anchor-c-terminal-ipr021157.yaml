identifier: InterPro:IPR021157
label: "Cytochrome c1, transmembrane anchor, C-terminal"
definition: >-
  This entry represents the transmembrane anchor of the cytochrome c1 subunit from the cytochrome bc1 complex. This region contains a single transmembrane helix. Cytochrome bc1 complex (ubiquinol:ferricytochrome c oxidoreductase) is found in mitochondria, photosynthetic bacteria and other prokaryotes. It is minimally composed of three subunits: cytochrome b, carrying a low- and a high-potential haem group; cytochrome c1 (cyt c1); and a high-potential Rieske iron-sulphur protein. The general function of the complex is electron transfer between two mobile redox carriers, ubiquinol and cytochrome c; the electron transfer is coupled with proton translocation across the membrane, thus generating proton-motive force in the form of an electrochemical potential that can drive ATP synthesis. In its structure and functions, the cytochrome bc1 complex bears extensive analogy to the cytochrome b6f complex of chloroplasts and cyanobacteria; cyt c1 plays an analogous role to cytochrome f, in spite of their different structures.
