identifier: InterPro:IPR035991
label: Casein kinase II subunit beta-like
definition: >-
  Casein kinase, a ubiquitous well-conserved protein kinase involved in cell metabolism and differentiation, is characterised by its preference for Ser or Thr in acidic stretches of amino acids. The enzyme is a tetramer of 2 alpha-and 2 beta-subunits. However, some species (e.g., mammals) possess 2 related forms of the alpha-subunit (alpha and alpha'), while others (e.g., fungi) possess 2 related beta-subunits (beta and beta').
