identifier: InterPro:IPR042259
label: "RamQ-like, middle domain superfamily"
definition: >-
  This superfamily represents the middle domain in Corrinoid activation enzyme RamQ. This region contains residues in their α-helices (H6 and H7) that mediate dimerisation with subdomain I of the C-terminal domain. This domain is also found at the N-terminal in [Co(II) methylated amine-specific corrinoid protein] reductase.
