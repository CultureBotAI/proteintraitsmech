identifier: InterPro:IPR042279
label: "Peptidase M60, enhancin-like domain 3"
definition: >-
  The peptidase family M60 domain belongs to the Merops zincin superfamily of zinc-requiring metalloproteases (clan MA, subclan MA(E)). The peptidase family M60 domain contains the metal-binding consensus motif HExxH. The two histidine residues are ligands of the catalytic Zn(2) and the glutamic acid residue is involved in nucleophilic attack. An additional conserved glutamic acid is found approximately 20 residues from the first histidine within the metal-binding motif. The second conserved glutamic acid potentially acts as a third proteous Zn(2) ligand. The peptidase family M60 domain targets complex host glycoproteins, such as mucins. This superfamily represents the third domain of peptidases that contain a zinc metallopeptidase motif (HEXXHX(8,28)E) and possess mucinase activity.
