identifier: InterPro:IPR038084
label: "Corrinoid adenosyltransferase PduO/GlcC-like superfamily"
definition: >-
  This entry includes Protein GlcG from Escherichia coli, Corrinoid adenosyltransferase PduO from Salmonella typhimurium and many uncharacterised proteins from bacteria and fungi. GlcG controls the expression of the genes of the glycolate pathway. The structure of GlcG is composed of an α-β(2)-α(3)-β(2)-α fold, similar to the Roadblock/LC7 domain. PduO converts cob(I)alamin to adenosylcobalamin (adenosylcob(III)alamin), the cofactor for propanediol dehydratase. Extracellular haem-binding protein from Streptomyces reticuli (HbpS, ) is also included in this entry. This protein interacts with the SenS/SenR two-component signal transduction system. Iron binds to surface-exposed lysine residues of an octomeric assembly of the protein. This entry also includes the formaldehyde-sensing protein EfgA that directly binds formaldehyde and causes rapid growth arrest and cessation of translation in response to elevated levels of formaldehyde.
