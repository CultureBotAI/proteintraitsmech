identifier: InterPro:IPR038144
label: "Intracellular proteinase inhibitor"
definition: >-
  BsuPI from Bacillus subtilis is a member of this superfamily. It is an intracellular proteinase inhibitor (IPI) that has been suggested to regulate the major intracellular proteinase (ISP-1) activity in vivo. The structure of IPI is a variant of the all-beta, immunoglobulin (Ig) fold and adopts a β barrel topology.
