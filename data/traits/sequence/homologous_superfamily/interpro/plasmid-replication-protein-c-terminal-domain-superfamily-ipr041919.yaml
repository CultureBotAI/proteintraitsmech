identifier: InterPro:IPR041919
label: "Plasmid replication protein, C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal domain of the plasmid replication (Rep) protein. Rep is a rolling-circle replication (RCR) initiation protein and provides endonuclease activity. It is generally found as hexamer, in contrast to other RCR proteins that are purified as monomers or dimers. Its monomer unit can be viewed as the cartoon representation of the domain in chain. The C-terminal all-helical oligomerization domains form a rigid cylindrical scaffold to which the N-terminal DNA-binding/catalytic domains are attached as highly flexible appendages.
