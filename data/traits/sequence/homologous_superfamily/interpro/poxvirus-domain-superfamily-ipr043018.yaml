identifier: InterPro:IPR043018
label: "Poxvirus domain superfamily"
definition: >-
  This superfamily represents a domain found in a group of Poxvirus Bcl-2-like proteins that function as immunomodulators to evade the host innate immune response through the inhibition of apoptosis or blocking the activation of pro-inflammatory transcription factors, such as interferon (IFN) regulatory factor-3 (IRF-3) and nuclear factor-kappaB (NF-kappaB) ]. This entry includes IFN signaling evasion protein OPG029 and Protein OPG200 from Vaccinia virus. OPG029, also known as C6L, prevents establishment of cellular antiviral state by blocking virus-induced phosphorylation and activation of interferon regulatory factors 3/IRF3 and 7/IRF7, transcription factors critical for the induction of interferons alpha and beta. OPG200, also called B14, contributes to virulence by binding to the host IKBKB subunit of the IKK complex and preventing host NF-kappa-B activation in response to pro-inflammatory stimuli such as TNF-alpha or IL1B.
