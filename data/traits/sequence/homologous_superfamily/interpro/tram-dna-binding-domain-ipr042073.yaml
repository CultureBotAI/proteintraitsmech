identifier: InterPro:IPR042073
label: "TraM, DNA-binding domain"
definition: >-
  This superfamily represents the TraM protein. TraM is a DNA-binding protein, encoded by plasmid DNA. TraM forms active tetramers to bridge the origin of transfer of the plasmid (oriT) to a TraD pore (a coupling protein). As such, TraM is essential for conjugative transfer of DNA between bacteria. Structurally, the DNA binding domain of the TraM protein is globular and dominantly helical.
