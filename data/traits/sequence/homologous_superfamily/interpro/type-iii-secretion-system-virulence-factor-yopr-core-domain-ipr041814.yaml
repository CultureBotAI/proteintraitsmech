identifier: InterPro:IPR041814
label: "Type III secretion system virulence factor YopR, core domain"
definition: >-
  This superfamily entry represents a type III secretion system regulator, the secreted virulence factors YopR (Yersinia outer protein R), characterised in Yersinia pestis. Yersinia employs a type III secretion system (T3SS) to secrete and translocate virulence factors into to the cytoplasm of mammalian host cells. YopR, encoded by the YscH (Yersinia secretion H) gene. This Yop protein is unusual in that it is released to the extracellular environment rather than injected directly into the target cell as are most Yop proteins. The YopR core domain, predominantly found in the Gammaproteobacteria virulence factor YopR, is composed of five α-helices, four of which are arranged in an antiparallel bundle. Little is known about this domain, though it may contribute to the virulence of the protein YopR. YopR controls the selective access of early (YscF, YscI and YscP) substrates to the type III secretion machines of yersiniae and other Gammaproteobacteriae. YopR is a mobile regulatory component thought to function as a checkpoints probing the completion of discrete intermediary stages in the assembly of the type III injection pathway. The location of secreted YopR (into the medium) is directly controlling the secretion of YscF, the polymerised needle protein ( ) thereby impacting the assembly of type III machines.
