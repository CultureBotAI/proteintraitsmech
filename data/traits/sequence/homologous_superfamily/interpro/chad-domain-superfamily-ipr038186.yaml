identifier: InterPro:IPR038186
label: "CHAD domain superfamily"
definition: >-
  The CHAD (conserved histidine α-helical domain) is an uncharacterised domain, with a characteristic pattern of conserved histidines and other charged residues. It is predicted to adopt an α-helical fold. The sequence conservation pattern suggests that this domain is likely to contain two repeat units, with at least 4 helices each, at its core. The conserved charged residues could form a strongly polar surface that could participate, either in metal chelation, or act as phosphoacceptors.
