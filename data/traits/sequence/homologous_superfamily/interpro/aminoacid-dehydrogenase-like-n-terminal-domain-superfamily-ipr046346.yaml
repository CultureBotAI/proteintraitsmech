identifier: InterPro:IPR046346
label: "Aminoacid dehydrogenase-like, N-terminal domain superfamily"
definition: >-
  This superfamily represents a domain found at the N-terminal of a wide range of dehydrogenases from bacteria, eukaryotes and archaea, including tetrahydrofolate dehydrogenase/cyclohydrolase, methylene-tetrahydromethanopterin dehydrogenase, shikimate dehydrogenase, amino acid dehydrogenases (Glutamate/phenylalanine/leucine/valine dehydrogenases) and malic enzymes. It has a core fold of three layers in an α/β/α configuration. Its central parallel β-sheet of four strands has the order 2134. In amino acid dehydrogenases, this domain participates in dimerisation.
