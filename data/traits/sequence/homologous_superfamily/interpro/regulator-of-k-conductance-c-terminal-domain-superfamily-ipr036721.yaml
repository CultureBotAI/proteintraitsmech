identifier: InterPro:IPR036721
label: Regulator of K+ conductance, C-terminal domain superfamily
definition: >-
  The regulator of K+ conductance (RCK) domain is found in many ligand-gated K+ channels, most often attached to the intracellular carboxy terminus. The domain is prevalent among prokaryotic K+ channels, and also found in eukaryotic, high-conductance Ca2+-activated K+ channels (BK channels). Largely involved in redox-linked regulation of potassium channels, the N-terminal part of the RCK domain is predicted to be an active dehydrogenase at least in some cases. Some have a conserved sequence motif (G-x-G-x-x-G-x(n)-[DE]) for NAD+ binding, but others do not, reflecting the diversity of ligands for RCK domains. The C-terminal part is less conserved, being absent in some channels, such as the kefC antiporter from Escherichia coli. It is predicted to bind unidentified ligands and to regulate sulphate, sodium and other transporters. The X-ray structure of several RCK domains has been solved. It reveals an α-β fold similar to dehydrogenase enzymes. The domain forms a homodimer, producing a cleft between two lobes. It has a composite structure, with an N-terminal (RCK-N), and a C-terminal (RCK-C) subdomain. The RCK-N subdomain forms a Rossmann fold with two α helices on one side of a six stranded parallel β sheet and three α helices on the other side. The RCK-C subdomain is an all-β-strand fold. It forms an extention of the dimer interface and further stabilises the RCK homodimer. Ca2+ is a ligand that opens the channel in a concentration-dependent manner. Two Ca2+ ions are located at the base of a cleft between two RCK domains, coordinated by the carboxylate groups of two glutamate residues, and by an aspartate residue. RCK domains occur in at least five different contexts: As a single domain on the C terminus of some K+ channels (for example, many prokaryotic K+ channels). As…
