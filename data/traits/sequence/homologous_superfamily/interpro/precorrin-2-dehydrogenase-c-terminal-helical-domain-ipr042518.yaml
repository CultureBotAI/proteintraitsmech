identifier: InterPro:IPR042518
label: "Precorrin-2 dehydrogenase, C-terminal helical domain"
definition: >-
  This superfamily represents the C-terminal helical domain of precorrin-2 dehydrogenase SirC. Its function is unknown. Precorrin-2 dehydrogenase (sirC) catalyzes the dehydrogenation of precorrin-2 to form sirohydrochlorin, a precursor in siroheme biosynthesis and in anaerobic adenosylcobalamin biosynthesis. SirC is composed of three structural domains: an NAD -binding domain, a central dimerization domain and a C-terminal helical domain.
