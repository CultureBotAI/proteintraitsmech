identifier: InterPro:IPR029020
label: "Ammonium/urea transporter"
definition: >-
  The entry represents the a structural domain found in ammonia and urea channels. The Amt/MEP/Rh ammonium transporters domain consists of a duplication of 2 structural repeats of five helices each plus one extra C-terminal helix. Similarly, the urea transporter fold contains two homologous halves with opposite orientations in the membrane, each half with five transmembrane helices.
