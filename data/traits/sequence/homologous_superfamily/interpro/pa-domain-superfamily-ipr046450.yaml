identifier: InterPro:IPR046450
label: "PA domain superfamily"
definition: >-
  The PA (Protease associated) domain is found as an insert domain in diverse proteases, which include the MEROPS peptidase families A22B, M28, and S8A. The PA domain is also found in some plant vacuolar sorting receptors and members of the RZF family, including . It has been suggested that this domain forms a lid-like structure that covers the active site in active proteases, and is involved in protein recognition in vacuolar sorting receptors.
