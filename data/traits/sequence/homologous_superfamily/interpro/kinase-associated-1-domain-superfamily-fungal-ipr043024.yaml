identifier: InterPro:IPR043024
label: "Kinase associated-1 domain superfamily, fungal"
definition: >-
  This superfamily represents a domain found at the C terminus of yeast septin-associated kinases (Kcc4, Gin4 and Hsl1). It is a membrane association domain that binds acidic phospholipids. The structure of this domain includes two interacting α helices that lie on the concave surface of a five-stranded antiparallel β-sheet.
