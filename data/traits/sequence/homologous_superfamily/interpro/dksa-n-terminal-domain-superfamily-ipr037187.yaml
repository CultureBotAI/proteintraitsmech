identifier: InterPro:IPR037187
label: "DksA, N-terminal domain superfamily"
definition: >-
  DksA (DnaK suppressor A) is originally named as a multicopy suppressor of temperature sensitivity of dnaKJ mutants. DksA is a transcription factor that acts by binding directly to the RNA polymerase (RNAP). It is required for negative regulation of rRNA expression and positive regulation of several amino acid biosynthesis promoters. The N-terminal domain of DksA consists of two helices arranged in antiparallel α-hairpin with left-handed twist.
