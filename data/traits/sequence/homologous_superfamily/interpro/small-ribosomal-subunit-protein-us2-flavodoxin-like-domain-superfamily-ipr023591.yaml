label: "Small ribosomal subunit protein uS2, flavodoxin-like domain superfamily"
definition: >-
  This entry represents a flavodoxin-like domain superfamily found in ribosomal protein uS2. This entry represents the family of ribosomal uS2 proteins. They are required for the assembly of different ribosomal subunits and are widely distributed among all living organisms. Ribosomal uS2 family in humans includes three members: Small ribosomal subunits uS2 (also known as RPSA). Small ribosomal subunits uS2B (also known as RPSA2). Small ribosomal subunits uS2m in mitochondria (also known as MRPS2). Ribosomal protein SA (RPSA), previously named 37 kDa laminin receptor precursor/67 kDa laminin receptor (LRP/LR), has been characterised as a multifunctional protein that plays multiple roles in different pathological processes. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, p…
