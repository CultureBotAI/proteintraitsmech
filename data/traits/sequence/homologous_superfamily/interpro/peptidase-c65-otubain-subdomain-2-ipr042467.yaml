identifier: InterPro:IPR042467
label: "Peptidase C65, otubain, subdomain 2"
definition: >-
  This superfamily represents the subdomain 2 found in the otubain (OTU-domain Ub aldehyde-binding protein) family of cysteine proteases (known as peptidase C65), involved in precise cleavage at the specific deubiquitylation at the Ub-protein bond. The OTU-domain is conserved amongst this family of proteases and is characterised by the presence of a cysteine protease motif.
