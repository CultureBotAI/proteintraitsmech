identifier: InterPro:IPR042521
label: Dual specificity tyrosine-phosphorylation-regulated kinase
definition: >-
  Dual-specificity tyrosine-(Y)-phosphorylation-regulated kinases (DYRKs) play key roles in brain development, regulation of splicing, and apoptosis, and are potential drug targets for neurodegenerative diseases and cancer. All DYRKs contain a conserved catalytic kinase domain preceded by the DYRK-characteristic DYRK homology (DH) box.
