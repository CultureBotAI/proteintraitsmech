identifier: InterPro:IPR027368
label: "tRNA modification GTPase MnmE domain 2"
definition: >-
  MnmE, also called TrmE and previously designated ThdF (thiophene and furan oxidation protein), is a GTPase involved in tRNA modification to create 5-methylaminomethyl-2-thiouridine in the wobble position of some tRNAs. This protein and GidA form an alpha2/beta2 heterotetramer.
