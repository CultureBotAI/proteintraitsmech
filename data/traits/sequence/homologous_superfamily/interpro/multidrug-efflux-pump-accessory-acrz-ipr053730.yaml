identifier: InterPro:IPR053730
label: "Multidrug Efflux Pump Accessory AcrZ"
definition: >-
  This superfamily of proteins is involved in the efflux of a broad range of substrates across the cell membrane, contributing to multidrug resistance. Members of this superfamily interact with components of a protein complex that actively transports various compounds out of the cell. The presence of these proteins is essential for the selective export of certain substrates, indicating a role in modulating the specificity of the efflux system. The complex they associate with is typically composed of several proteins that together facilitate the removal of drugs and other substances, thereby providing a mechanism for the cell to resist toxic compounds.
