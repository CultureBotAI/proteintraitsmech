identifier: InterPro:IPR016155
label: "Molybdopterin synthase/thiamin biosynthesis sulphur carrier, beta-grasp"
definition: >-
  This entry represents a structural domain with a β-grasp fold that is found in molybdopterinsynthase subunit MoaD, as well as in the thiamin biosynthesis sulphur carrier protein ThiS. ThiS (thiaminS) is a 66 aa protein involved in sulphur transfer. ThiS is coded in the thiCEFSGH operon in Escherichia coli. ThiS proteins have two conserved Glycines at the COOH terminus. Thiocarboxylate is formed at the last G in the activation process. Sulphur is transferred from ThiI to ThiS in a reaction catalysed by IscS. MoaD, a protein involved in sulphur transfer during molybdopterin synthesis, is about the same length and shows limited sequence similarity to ThiS. Both have the conserved GG at the COOH end.
