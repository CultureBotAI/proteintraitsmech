identifier: InterPro:IPR018163
label: Threonyl/alanyl tRNA synthetase, class II-like, putative editing domain superfamily
definition: >-
  This superfamily represents a structural domain containing a two-layer core α/β structure: α-β(2)-α-β(2). This domain is thought to be a putative editing domain found in the N-terminal part of threonyl-tRNA synthetase (ThrRS), the C-terminal of alanyl-tRNA synthetase (AlaRS), and as the stand-alone hypothetical protein from the archaea Pyrococcus horikoshii; probable circular permutation of LuxS. Aminoacyl-tRNA synthetases (also known as aminoacyl-tRNA ligases) catalyse the attachment of amino acids to their cognate transfer RNA molecules through a highly specific two-step reaction. These enzymes vary widely in size and oligomeric state, and share limited sequence homology. The 20 aminoacyl-tRNA synthetases are divided into two classes. Class I synthetases contain a characteristic Rossmann fold catalytic domain and are predominantly monomeric. Class II synthetases feature an antiparallel β-sheet fold flanked by α-helices and are mostly dimeric or multimeric, with at least three conserved regions. Despite these structural differences, both classes share a conserved α-helical structure involved in tRNA binding. The two classes also differ in their catalytic mechanisms: class I synthetases couple the aminoacyl group to the 2'-hydroxyl of the tRNA, whereas class II synthetases preferentially use the 3'-hydroxyl site. Class I includes synthetases specific for arginine, cysteine, glutamic acid, glutamine, isoleucine, leucine, methionine, tyrosine, tryptophan, valine, and some lysine synthetases (non-eukaryotic). Class II includes those specific for alanine, asparagine, aspartic acid, glycine, histidine, phenylalanine, proline, serine, threonine, and some lysine synthetases (non-archaeal). Based on their mode of binding to the tRNA acceptor stem, each class has been further s…
