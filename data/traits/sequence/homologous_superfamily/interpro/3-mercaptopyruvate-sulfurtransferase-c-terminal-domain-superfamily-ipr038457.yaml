identifier: InterPro:IPR038457
label: "3-mercaptopyruvate sulfurtransferase, C-terminal domain superfamily"
definition: >-
  This entry represents a domain found in putative 3-mercaptopyruvate sulphurtransferases from Trypanosomatida (kinetoplastids). Leishmania major 3-mercaptopyruvate sulfurtransferase consists of a crescent-shaped molecule comprising three domains. The N-terminal and central domains are similar to the thiosulfate sulfurtransferase rhodanese domain. The 80-amino acid C-terminal domain adopts a structure consisting of a four-stranded antiparallel β-sheet and an α-helix, arranged in a β(2)-α-β(2) fashion, and bearing a remarkable structural similarity to the FK506-binding protein class of peptidylprolyl cis/trans-isomerase. The C-terminal domain may be involved in mediating protein folding and sulfurtransferase-protein interactions.
