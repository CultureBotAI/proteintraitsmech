identifier: InterPro:IPR038370
label: "ArcTGT, C1 domain superfamily"
definition: >-
  This superfamily includes the Archaeosine tRNA-guanine transglycosylase (ArcTGT), domain C1. The ArcTGT structure consists of the N-terminal catalytic domain (residues 6-360) and the C-terminal region with unidentified functions (residues 361-582). The C-terminal region is divided into three domains, C1, C2, and C3. This entry represents the C1 domain which is composed of loops and four β-strands and is involved in dimerisation..
