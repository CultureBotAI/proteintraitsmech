identifier: InterPro:IPR036385
label: "Ribulose bisphosphate carboxylase, small subunit superfamily"
definition: >-
  RuBisCO (ribulose-1,5-bisphosphate carboxylase/oxygenase) is a bifunctional enzyme that catalyses both the carboxylation and oxygenation of ribulose-1,5-bisphosphate (RuBP), thus fixing carbon dioxide as the first step of the Calvin cycle. RuBisCO is the major protein in the stroma of chloroplasts, and in higher plants exists as a complex of 8 large and 8 small subunits. The small subunits induce conformational changes in the large subunits enhancing its catalytic rate. Studies in Oryza sativa demonstrate that the availability of the small subunit upregulates the transcript levels of the large subunit. While the large subunit is coded for by a single gene, the small subunit is coded for by several different genes, which are distributed in a tissue specific manner. They are transcriptionally regulated by light receptor phytochrome, which results in RuBisCO being more abundant during the day when it is required. The RuBisCo small subunit consists of a central four-stranded β-sheet, with two helices packed against it.
