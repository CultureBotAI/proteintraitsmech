identifier: InterPro:IPR036165
label: "YefM-like superfamily"
definition: >-
  Members of this superfamily act as antitoxins in type II toxin-antitoxin systems. When bound to their toxin partners, they can bind DNA via the N terminus and repress the expression of operons containing genes encoding the toxin and the antitoxin. The structure of YefM has a β-α(2)-β(2)-α fold with mixed β-sheet where strands 1 and 2 are parallel. It forms a compact dimer with a single β-sheet topology.
