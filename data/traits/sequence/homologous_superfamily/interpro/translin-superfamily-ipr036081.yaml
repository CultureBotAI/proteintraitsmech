identifier: InterPro:IPR036081
label: Translin superfamily
definition: >-
  Translins are DNA-binding proteins that specifically recognise consensus sequences at the breakpoint junctions in chromosomal translocations, mostly involving immunoglobulin (Ig)/T-cell receptor gene segments. They seem to recognise single-stranded DNA ends generated by staggered breaks occuring at recombination hot spots. Translin folds into an α-α superhelix, consisting of two curved layers of α/α topology. This entry also includes translin-associated protein X (TRAX), which was found to interact with translin.
