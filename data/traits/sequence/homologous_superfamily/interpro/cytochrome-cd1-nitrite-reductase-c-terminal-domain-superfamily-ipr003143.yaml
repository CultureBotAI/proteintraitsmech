identifier: InterPro:IPR003143
label: "Cytochrome cd1-nitrite reductase, C-terminal domain superfamily"
definition: >-
  Cytochrome cd1 (cyt cd1) nitrite reductase is a dimeric enzyme of the bacterial periplasm that plays a key role in denitrification, the respiratory reduction of nitrite to nitric oxide in the nitrogen cycle. Each subunit of the cyt cd1 dimer contains one cytochrome c and one d1 haem group. The active site contains a specialised d1 haem, where the nitrite substrate is bound and reduced. This d1 haem is bound in an 8-bladed β-propeller. This superfamily represents the C-terminal region of the d1 domain.
