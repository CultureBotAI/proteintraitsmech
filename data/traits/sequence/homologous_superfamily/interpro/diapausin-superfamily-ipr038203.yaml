identifier: InterPro:IPR038203
label: "Diapausin superfamily"
definition: >-
  This superfamily consists of diapausin-related antimicrobial peptides. Diapause during periods of environmental adversity is an essential part of the life cycle of many organisms, with the molecular basis being different among animals. Diapause-specific peptides (DSP) provide anti-fungal activity and act as N-type voltage-gated calcium channel blocker. The overall structure of DSP is compact due to the three disulfide bridges that indicate a high similarity with insect- and plant-derived antifungal peptides.
