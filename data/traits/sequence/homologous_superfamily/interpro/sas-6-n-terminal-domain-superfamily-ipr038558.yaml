identifier: InterPro:IPR038558
label: "SAS-6, N-terminal domain superfamily"
definition: >-
  Spindle assembly abnormal protein 6 (SAS-6) is the centre of the cartwheel assembly that scaffolds centrioles early in their biogenesis. Structural studies have shown that SAS-6 self-associates in vitro into assemblies that resemble cartwheel centres through the formation of a parallel coiled-coil dimer. This entry represents the N-terminal domain of the SAS-6 , both in C.elegans and in humans. The N-terminal domain is the region through which the 9 rod-shaped homodimers that SAS-6 forms on oligomerisation interact with each other. Proper functioning of the centriole requires this correct oligomerisation.
