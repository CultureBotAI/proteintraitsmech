identifier: InterPro:IPR037180
label: "Hypothetical protein HI_1480"
definition: >-
  This entry contains a protein of unknown function, the hypothetical protein HI1480 from Haemophilus influenzae. Its structure has been determined and consists of a β-α(4)-β-α-β fold with segregated α-helical and β-sheet subdomains and a dimeric β-sheet barrel, the helical region contains a four-helix bundle.
