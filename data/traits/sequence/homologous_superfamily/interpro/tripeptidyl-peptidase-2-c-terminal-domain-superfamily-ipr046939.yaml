identifier: InterPro:IPR046939
label: "Tripeptidyl-peptidase 2, C-terminal domain superfamily"
definition: >-
  Tripeptidyl peptidase II (TPPII, MEROPS peptidase family S8A) is a crucial component of the proteolytic cascade acting downstream of the 26S proteasome in the ubiquitin-proteasome pathway. It is an amino peptidase belonging to the subtilase family removing tripeptides from the free N terminus of oligopeptides. It consists of three main parts: the N-terminal subtilisin-like domain ( ), a central domain ( ) and a C-terminal domain. This entry represents the C-terminal domain of TPPII, which consists of a twelve-helix bundle.
