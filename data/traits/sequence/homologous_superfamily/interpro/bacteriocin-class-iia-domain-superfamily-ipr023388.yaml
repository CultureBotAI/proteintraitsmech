identifier: InterPro:IPR023388
label: "Bacteriocin class IIa domain superfamily"
definition: >-
  This superfamily represents a domain found in class II bacteriocins. It consists of a well-defined central helical structure and a disordered N terminus, as described for carnobacteriocin B2, a type IIa bacteriocin.
