identifier: InterPro:IPR037238
label: "YbiA-like superfamily"
definition: >-
  This superfamily contains E. coli swarming motility protein YbiA. Mutations in YbiA cause defects in Escherichia coli swarming, but not necessarily in motility. This family was predicted to be involved in NAD-utilising pathways, likely to act on ADP-ribose derivatives, and has been named NADAR (NAD and ADP-ribose). More recently, YbiA has been shown to be involved in the disposal of riboflavin intermediates. It catalyses the hydrolysis of the N-glycosidic bond in the first two intermediates of riboflavin biosynthesis, which are highly reactive metabolites, yielding relatively innocuous products. This superfamily also contains Riboflavin biosynthesis protein PYRR, chloroplastic from plants. Riboflavin biosynthesis protein PYRR is a chloroplast-localised enzyme that functions in the regulation of flavin homeostasis. This protein catalyses the hydrolysis of the N-glycosidic bond in the first two intermediates of the riboflavin biosynthesis pathway, which are highly reactive metabolites with the potential to cause cellular damage. By converting these reactive intermediates into relatively innocuous products, PYRR serves a protective role, diverting surplus harmful metabolites away from damaging cellular components and pre-empting potential toxicity. Through this activity, PYRR contributes to the maintenance of appropriate flavin levels within the chloroplast. Notably, PYRR exhibits substrate specificity, showing no activity against GTP, nucleoside monophosphates or ADP-ribose, indicating that its function is restricted to the early intermediates of the riboflavin pathway.
