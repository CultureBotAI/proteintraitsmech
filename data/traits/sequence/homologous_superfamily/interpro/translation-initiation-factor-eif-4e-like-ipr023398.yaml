identifier: InterPro:IPR023398
label: "Translation Initiation factor eIF- 4e-like"
definition: >-
  This entry includes a group of eIF4E-like protein. These proteins consist of a curved eight-stranded antiparallel β-sheet, decorated with three helices on the convex face and three smaller helices inserted in connecting loops. Eukaryotic translation initiation factor 4E (eIF-4E) is a protein that binds to the cap structure of eukaryotic cellular mRNAs. eIF-4E recognises and binds the 7-methylguanosine-containing (m7Gppp) cap during an early step in the initiation of protein synthesis and facilitates ribosome binding to a mRNA by inducing the unwinding of its secondary structures. A tryptophan in the central part of the sequence of human eIF-4E seems to be implicated in cap-binding.
