identifier: InterPro:IPR045857
label: "Oligo-1,6-glucosidase, domain 2"
definition: >-
  This superfamily represents the domain 2 of oligo-1,6-glucosidase MalL. This domain can be found in some glycosyl hydrolase 13 ( ) family members, such as TreS from Mycobacterium smegmatis, YM304_32550 from Ilumatobacter coccineus, BbmA from Bacillus subtilis and YcjM from Escherichia coli. Family GH13 is the major glycoside hydrolase family acting on substrates containing α-glucoside linkages. GH13 contains hydrolases, transglycosidases, and isomerases; noticeably, animal amino acid transporters, which have no glycosidase activity, are also GH13 members. The enzymes are found in a very wide range of organisms from all kingdoms. The GH13 enzymes have a wide range of different preferred substrates and products. For example, the α-amylases prefer polysaccharides of the α-1,4-glucan type, such as amylose and amylopectin, but are also able to attack the supramolecular structures represented by starch granules and glycogen particles. Among thousands of sequences and ~30 different enzyme specificities many are closely related to each other; GH13 therefore has officially been subdivided into almost 40 subfamilies. In general, the GH13 members are multidomain proteins with catalytic (β/α)8-barrel (i.e. TIM-barrel) domain (called domain A) having a small domain B (usually varying in length and of irregular structure). Some of these enzymes include: α-amylase oligo-1,6-glucosidase α-glucosidase pullulanase cyclomaltodextrinase maltotetraose-forming α-amylase isoamylase dextran glucosidase trehalose-6-phosphate hydrolase maltohexaose-forming α-amylase ) maltotriose-forming α-amylase maltogenic amylase neopullulanase malto-oligosyltrehalose trehalohydrolase limit dextrinase amylosucrase sucrose phosphorylase cyclomaltodextrin glucanotransferase (CGTase) 4-α-glucanotransferase isom…
