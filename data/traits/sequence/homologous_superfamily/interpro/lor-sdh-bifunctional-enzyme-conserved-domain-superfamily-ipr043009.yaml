identifier: InterPro:IPR043009
label: "LOR/SDH bifunctional enzyme, conserved domain superfamily"
definition: >-
  Lysine-oxoglutarate reductase/Saccharopine dehydrogenase (LOR/SDH) is a bifunctional enzyme. LOR is also known as LKR (lysine-ketoglutarate reductase), and thus LOR/SDH is sometimes termed LKR/SDH. This superfamily represents the conserved region, commonly found immediately N-terminal to saccharopine dehydrogenase conserved region in eukaryotes.
