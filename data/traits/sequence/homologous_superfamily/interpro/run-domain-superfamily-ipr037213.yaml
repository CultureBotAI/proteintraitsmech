identifier: InterPro:IPR037213
label: "RUN domain superfamily"
definition: >-
  The RUN domain, named after RPIP8, unc-14 and NESCA, is organised into six conserved blocks (A-F), which constitute the 'core' of a globular structure tolerating insertions of considerable length between the conserved blocks. The RUN domain is found in one or two copies in several proteins that are linked particularly to the functions of GTPases in the Rap and Rab families. This domain is thought to be a specific effector of small GTPases, but in the case of many of RUN domains their specific partners and their roles need to be determined. RUN domains can be associated with TBC/rab GAP, FYVE, DENN, SH3, DAG/PE-binding, PLAT/LH2, PH or PX domains. The RUN domain may have a role in the interaction of various proteins with cytoskeletal filaments. Structurally, the RUN domain comprises eight anti-parallel α-helices, which form an extensive hydrophobic core, followed by an extended segment.
