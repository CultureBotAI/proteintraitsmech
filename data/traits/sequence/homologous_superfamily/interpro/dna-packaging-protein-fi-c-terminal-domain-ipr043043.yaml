identifier: InterPro:IPR043043
label: "DNA packaging protein FI, C-terminal domain"
definition: >-
  DNA packaging protein FI is a two-domain protein required for efficient DNA packaging and in lambda bacteriophage head assembly. This entry represents the C-terminal domain responsible for the head binding activity. It adopts a β-strand fold, presents several unstructured regions and a conserved EEE sequence motif.
