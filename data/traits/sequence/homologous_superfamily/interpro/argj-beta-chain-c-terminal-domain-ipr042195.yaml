identifier: InterPro:IPR042195
label: "ArgJ beta chain, C-terminal domain"
definition: >-
  ArgJ (also known as Ornithine acetyltransferase/OAT) is a bifunctional protein that catalyses the first and fifth steps in arginine biosynthesis, coupling acetylation of glutamate with deacetylation of N-acetylornithine, which allows recycling of the acetyl group in the arginine biosynthetic pathway. The structure has been determined for glutamate N-acetyltransferase 2 (ornithine acetyltransferase; ), an ArgJ-like protein from Streptomyces clavuligerus. When active, ArgJ is a heterotetramer of two alpha and two beta chains, where the alpha and beta chains are the result of autocatalytic cleavage. This superfamily represents the C-terminal domain found in ArgJ beta chain.
