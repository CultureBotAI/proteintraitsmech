identifier: InterPro:IPR035951
label: "TM1622-like superfamily"
definition: >-
  This entry includes homologues of the uncharacterised TM1622 protein from Thermotoga maritima, for which the structure has been determined. The protein is composed of seven β strands and three α-helices.
