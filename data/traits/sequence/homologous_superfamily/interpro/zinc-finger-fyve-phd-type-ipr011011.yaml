identifier: InterPro:IPR011011
label: "Zinc finger, FYVE/PHD-type"
definition: >-
  The FYVE zinc finger domain is conserved from yeast to man and is named after four proteins that it has been found in: Fab1, YOTB/ZK632.12, Vac1, and EEA 1. It functions in the membrane recruitment of cytosolic proteins by binding to phosphatidylinositol 3-phosphate (PI3P), which is found mainly on endosomes. The plant homeodomain (PHD) zinc finger domain has a C4HC3-type motif and is widely distributed in eukaryotes, being found in many chromatin regulatory factors. Both the FYVE and the PHD zinc finger motifs display strikingly similar dimetal (zinc)-bound α+β folds. Zinc finger (Znf) domains are relatively small protein motifs which contain multiple finger-like protrusions that make tandem contacts with their target molecule. Some of these domains bind zinc, but many do not; instead, they bind other metals, such as iron, or no metal at all. For example, some family members form salt bridges to stabilise the finger-like folds. They were first identified as a DNA-binding motif in transcription factor TFIIIA from Xenopus laevis (African clawed frog); however, they are now recognised to bind DNA, RNA, protein and/or lipid substrates. Their binding properties depend on the amino acid sequence of the finger domains and of the linker between fingers, as well as on the higher-order structures and the number of fingers. Znf domains are often found in clusters, where fingers can have different binding specificities. There are many superfamilies of Znf motifs, varying in both sequence and structure. They display considerable versatility in binding modes, even between members of the same class (e.g., some bind DNA, others protein), suggesting that Znf motifs are stable scaffolds that have evolved specialised functions. For example, Znf-containing proteins function in gene trans…
