identifier: InterPro:IPR038352
label: "Imelysin-like domain superfamily"
definition: >-
  EfeO is an essential component of the EfeUOB operon which is highly conserved in bacteria. However, its biochemical function is unknown. EfeO contains an N-terminal cupredoxin (CUP)-like domain and C-terminal imelysin-like domain that may bind iron. Algp7, a member of the EfeO family of proteins from Sphingomonas sp. A1, is found to bind alginate at neutral pH, but does not contain the CUP domain, thus having a role that does not seem to be related to iron uptake. The imelysin-like domain of these proteins contains the GxHxxE sequence motif, suggesting a similar role, whereas in other imelysin-like proteins, such as IPPA from Psychrobacter arcticus, the histidine in the GxHxxE motif region is no longer conserved (GxxxxE), indicating a possible loss of enzymatic function or a change in substrate preference.
