identifier: InterPro:IPR038246
label: "Phi-29-like late genes activator superfamily"
definition: >-
  This superfamily consists of phi-29-like late genes activator (or early protein GP4). This protein is thought to be a positive regulator of late transcription and may function as a sigma-like component of the host RNA polymerase.
