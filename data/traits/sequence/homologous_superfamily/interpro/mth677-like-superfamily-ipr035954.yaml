identifier: InterPro:IPR035954
label: "MTH677-like superfamily"
definition: >-
  Proteins in this superfamily contain a novel α+β fold, consisting of two α-helices (one N-terminal and one C-terminal) packed on the same side of a central β-hairpin. They share structural similarity to Escherichia coli MinE, a protein which controls the division that occurs at the midcell site. A hypothetical protein from Methanobacterium thermoautotrophicum (Mth), Mth677, is included in this entry.
