identifier: InterPro:IPR038556
label: "Tail assembly chaperone Gp13-like superfamily"
definition: >-
  Tail assembly chaperones (TACs) are required for the morphogenesis of all long-tailed phages. Gp13, a TAC from bacteriophage HK97, is required for tail tube assembly and is thought to be a TAC. The gp13 monomer comprises a single domain consisting of a small three-stranded twisted β-sheet connected to a helical bundle. Gp13 adopts a spiral quaternary structure, similar to other TACs. This superfamily includes gp13 and putative TACs from other Siphovirus.
