identifier: InterPro:IPR043155
label: "Vacuolar protein sorting-associated protein 33, domain 3b"
definition: >-
  Members of the Sec1 family include Sec1, Sly1, Slp1/Vps33, Vps45/Stt10 (yeast), Unc-18 (nematode), Munc-18b/muSec1, Munc-18c (mouse), Rop (Drosophila), Munc-18/n-Sec1/rbSec1A and rbSec1B (rat). The nSec1 polypeptide chain can be divided into three domains. The first domain, consists of a five-stranded parallel β-sheet flanked by five α-helices. The second domain, like the first one, has an α-β-α fold, however the β-sheet of domain 2 features five parallel strands with an additional antiparallel strand on one edge. The third domain is a large insertion between the third and fourth parallel strands of domain 2, and can be subdivided in two. Vacuolar protein sorting-associated protein 33 (Vps33) is essential for vacuolar biogenesis, maturation and function. It is involved in the sorting of vacuolar proteins from the Golgi apparatus and their targeting to the vacuole. In worm, fly, zebrafish and mammals two homologues of yeast Vps33p have been detected (termed VPS33A and VPS33B in humans). These homologues may reflect the evolution of organelle/tissue-specific functions in multicellular organisms. It is thought that VPS33B may be required for transport to conventional lysosomes, while VPS33A is mainly involved in biogenesis of melanosomes and related lysosomal compartments. This superfamily entry represents the C-terminal region of domain 3 (called domain 3b) found in VPS33.
