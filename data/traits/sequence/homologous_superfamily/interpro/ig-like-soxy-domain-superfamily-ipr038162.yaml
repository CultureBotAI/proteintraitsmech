identifier: InterPro:IPR038162
label: "Ig-like SoxY domain superfamily"
definition: >-
  This domain is found in the sulfur oxidation protein SoxY. Dissimilatory oxidation of thiosulfate is carried out by the ubiquitous sulfur-oxidizing (Sox) multi-enzyme system. In this system, SoxY plays a key role, functioning as the sulfur substrate-binding protein that offers its sulfur substrate, which is covalently bound to a conserved C-terminal cysteine, to another oxidizing Sox enzyme. The structure of this domain shows an Ig-like fold. Many times it has been reported that SoxY strictly interacts with SoxZ to form a SoxYZ heterodimer. However, recent studies have shown this stable complex is not an obligate, and that the individual proteins may exist on their own. SoxY exhibits a dimer/tetramer equilibrium that is dependent on the redox state of the cysteines and on the type of sulfur substrate component bound to them. The SoxY tetramer consists of two dimeric β-sandwiches that interact with each other via two small interface patches at the tips of the dimers.
