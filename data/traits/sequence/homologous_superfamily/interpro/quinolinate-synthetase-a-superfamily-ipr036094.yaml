identifier: InterPro:IPR036094
label: Quinolinate synthetase A superfamily
definition: >-
  Quinolinate synthetase catalyses the second step of the de novo biosynthetic pathway of pyridine nucleotide formation. In particular, quinolinate synthetase is involved in the condensation of dihydroxyacetone phosphate and iminoaspartate to form quinolinic acid. This synthesis requires two enzymes, an FAD-containing "B protein" and an "A protein". B protein converts L-aspartate to iminoaspartate. The A protein, NadA, converts iminoaspartate to quinolate. NadA harbours a [4Fe-4S] cluster. The structure of NadA is composed of three similar domains related by pseudo threefold symmetry. Each domain has three layers (α/β/α) with parallel β sheet.
