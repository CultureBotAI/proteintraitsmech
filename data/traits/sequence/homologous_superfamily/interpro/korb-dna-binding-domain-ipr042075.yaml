identifier: InterPro:IPR042075
label: "KorB DNA-binding domain"
definition: >-
  This superfamily represents the KorB DNA-binding domain. The KorB protein of the broad-host-range plasmid RP4 acts as a multifunctional regulator of plasmid housekeeping genes, including those responsible for replication, maintenance and conjugation. KorB functions as the ParB analog of the plasmid's partitioning system. Structurally, the KorB consists of eight helices, two of which belong to a predicted helix-turn-helix motif.
