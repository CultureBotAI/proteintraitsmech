identifier: InterPro:IPR017853
label: "Glycoside hydrolase superfamily"
definition: >-
  This entry represents the catalytic TIM β/α barrel common to many different families of glycosyl hydrolases found in all groups of organisms including viruses and Gene Transfer Agents (GTA). In the GTA of Rhodobacter capsulatus (Rhodopseudomonas capsulata) a glycosyl hydrolase domain is associated with ORFg15 (RCAP_rcc01698) [ , see Fig.1, in ]. Structures have been determined for several proteins containing this glycosyl hydrolase domain, including family 13 glycosyl hydrolases (such as alpha-amylase), beta-glycanases, family 1 glycosyl hydrolases (such as beta-glucosidase), type II chitinases, 1,4-beta-N-acetylmuraminidases, and beta-N-acetylhexosaminidases. O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
