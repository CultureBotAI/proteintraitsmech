identifier: InterPro:IPR024034
label: "ATPase, F1/V1 complex, beta/alpha subunit, C-terminal"
definition: >-
  This entry represents a domain that is found at the C terminus of the F1 ATP synthase beta subunit and in the C terminus of the V-ATPase alpha and beta subunits. Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP.
