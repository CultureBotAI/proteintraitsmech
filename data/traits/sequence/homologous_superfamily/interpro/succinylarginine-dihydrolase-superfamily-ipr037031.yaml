identifier: InterPro:IPR037031
label: Succinylarginine dihydrolase superfamily
definition: >-
  Succinylarginine dihydrolase (AstB) transforms N(2)-succinylglutamate into succinate and glutamate. This enzyme is the second in the five-step ammonia-producing arginine succinyltransferase pathway, the major pathway in Escherichia coli and in other related bacteria for arginine catabolism as a sole nitrogen source. AstB assumes a five-stranded α/β propeller structure, placing it in the amidinotransferase (AT) superfamily of proteins, which are characterised by their Cys-His-Glu active site triad.
