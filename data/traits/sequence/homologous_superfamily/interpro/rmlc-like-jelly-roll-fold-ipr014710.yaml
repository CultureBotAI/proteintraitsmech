identifier: InterPro:IPR014710
label: "RmlC-like jelly roll fold"
definition: >-
  RmlC (deoxythymidine diphosphates-4-dehydrorhamnose 3,5-epimerase; ) is a mainly beta class protein with a jelly roll-like topology. It is a dTDP-sugar isomerase enzyme involved in the synthesis of L-rhamnose, a saccharide required for the virulence of some pathogenic bacteria. This entry represents the domain with the jelly roll-like fold.
