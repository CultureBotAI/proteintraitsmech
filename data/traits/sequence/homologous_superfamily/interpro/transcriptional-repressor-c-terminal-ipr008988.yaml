identifier: InterPro:IPR008988
label: "Transcriptional repressor, C-terminal"
definition: >-
  The C-terminal domain of several bacterial transcriptional repressors show structural homology to one another. These domains are characterised by an SH3-like structure consisting of a partly opened β-barrel, where the last strand is interrupted by a 3-10 helical turn. The C-terminal domain displays a metal-binding function in DTXR and IDER and may act to stabilising the dimeric form of the Escherichia coli KorB repressor, thereby enhancing specific operator binding by the repressor. The N-terminal region of these proteins is responsible for binding DNA.
