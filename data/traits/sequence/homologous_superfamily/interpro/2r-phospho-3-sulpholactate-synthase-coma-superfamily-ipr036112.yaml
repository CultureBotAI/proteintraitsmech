identifier: InterPro:IPR036112
label: "(2R)-phospho-3-sulpholactate synthase, ComA superfamily"
definition: >-
  Methanogenic archaea produce methane via the anaerobic reduction of acetate or single carbon compounds. Coenzyme M (CoM; 2-mercaptoethanesulphonic acid) serves as the terminal methyl carrier for this process. Previously thought to be unique to methanogenic archaea, CoM has also been found in methylotrophic bacteria. Biosynthesis of CoM begins with the Michael addition of sulphite to phosphoenolpyruvate, forming 2-phospho-3-sulpholactate (PSL). This reaction is catalyzed by members of this family, PSL synthase (ComA). Subsequently, PSL is dephosphorylated by phosphosulpholactate phosphatase (ComB) to form 3-sulpholactate, which is then converted to 3-sulphopyruvate by L-sulpholactate dehydrogenase (ComC; ). Sulphopyruvate decarboxylase (ComDE; ) converts 3-sulphopyruvate to sulphoacetaldehyde. Reductive thiolation of sulphoacetaldehyde is the final step. This entry also includes some proteins from plants and fungi, such as HEAT-STRESS-ASSOCIATED 32 from Arabidopsis. The ComA structure has a TIM β/α-barrel fold with a parallel β-sheet.
