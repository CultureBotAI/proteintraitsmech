identifier: InterPro:IPR009034
label: "Fungal dockerin domain superfamily"
definition: >-
  In anaerobic microorganisms, the degradation of plant cell walls in order to recycle the photosynthetically fixed carbon is carried out by a multifunctional complex termed the cellulosome. This consists of a number of independent enzyme components, each of which contains a conserved dockerin domain, which functions to bind the enzyme to a cohesin domain within the protein scaffoldin protein.
