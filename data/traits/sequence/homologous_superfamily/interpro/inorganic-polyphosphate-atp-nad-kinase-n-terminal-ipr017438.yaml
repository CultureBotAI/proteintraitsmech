identifier: InterPro:IPR017438
label: "Inorganic polyphosphate/ATP-NAD kinase, N-terminal"
definition: >-
  ATP-NAD kinases ( ) catalyse the phosphorylation of NAD to NADP utilizing ATP and other nucleoside triphosphates as well as inorganic polyphosphate as a source of phosphorus. ATP-NAD kinase contains two domains, where the N-terminal domain has an α/β topology that is related in structure to the N-terminal of phosphofructokinase, and the C-terminal domain has an atypical β-sandwich topology made of four structural repeats of beta(3) units. This entry represents the α/β N-terminal domain.
