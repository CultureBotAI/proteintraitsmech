identifier: InterPro:IPR037873
label: BamE-like
definition: >-
  The fold of this superfamily, tandemly repeated in beta-lactamase-inhibitor BLIP, has an α(2)-β(4) structure. It is also found in osmotically-inducible lipoprotein OsmE, which has no known function, and in outer membrane protein assembly factor BamE. BamE is part of the outer membrane protein (OMP) assembly Bam complex (composed of the outer membrane protein BamA, and four lipoproteins BamB, BamC, BamD and BamE), which is involved in assembly and insertion of β-barrel proteins into the outer membrane. E. coli BamE is a nonessential member of the complex that stabilizes the interaction between the essential proteins BamA and BamD. It may modulate the conformation of BamA, likely through interactions with BamD.
