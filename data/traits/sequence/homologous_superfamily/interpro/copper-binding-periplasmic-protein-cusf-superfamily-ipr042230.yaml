identifier: InterPro:IPR042230
label: "Copper binding periplasmic protein CusF superfamily"
definition: >-
  This superfamily represents the periplasmic metallochaperone CusF, a non-essential component of the CusCFBA system that confers copper and silver resistance in E. coli. Although not essential, CusF is required for optimal function. This entry also matches PilY2 protein.
