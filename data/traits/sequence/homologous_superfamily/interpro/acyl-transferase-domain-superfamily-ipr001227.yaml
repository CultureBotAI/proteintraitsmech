identifier: InterPro:IPR001227
label: Acyl transferase domain superfamily
definition: >-
  Enzymes like bacterial malonyl CoA-acly carrier protein transacylase and eukaryotic fatty acid synthase that are involved in fatty acid biosynthesis belong to this group. Also included are the polyketide synthases 6-methylsalicylic acid synthase, a multifunctional enzyme that involved in the biosynthesis of patulin and conidial green pigment synthase and several non-reducing polyketide synthases.
