identifier: InterPro:IPR037237
label: "IlvD/EDD, N-terminal domain"
definition: >-
  Two dehydratases, dihydroxy-acid dehydratase ( ) (gene ilvD or ILV3) and 6-phosphogluconate dehydratase ( ) (gene edd) have been shown to be evolutionary related. Dihydroxy-acid dehydratase catalyses the fourth step in the biosynthesis of isoleucine and valine, the dehydratation of 2,3-dihydroxy-isovaleic acid into alpha-ketoisovaleric acid. 6-Phosphogluconate dehydratase catalyses the first step in the Entner-Doudoroff pathway, the dehydratation of 6-phospho-D-gluconate into 6-phospho-2-dehydro-3-deoxy-D-gluconate. Another protein containing this signature is Escherichia coli YjhG, which has been identified as a D-xylonate dehydratase. The N-terminal part of the proteins contains a cysteine that could be involved in the binding of a 2Fe-2S iron-sulphur cluster. The structure of the N-terminal domain contains a large cluster of helices and a mixed β-sheet of four strands where strands 3 and 4 are parallel.
