label: "UvsW.1-like superfamily"
definition: >-
  This entry represents Protein UvsW.1 from Enterobacteria phage T4. The protein nhibits the single-stranded annealing activity of UvsW, which is thought to have a role in recombination and the rescue of stalled replication forks.
