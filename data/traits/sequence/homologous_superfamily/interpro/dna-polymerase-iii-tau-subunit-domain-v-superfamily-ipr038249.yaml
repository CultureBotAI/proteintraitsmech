identifier: InterPro:IPR038249
label: "DNA polymerase III, tau subunit, domain V superfamily"
definition: >-
  This superfamily represents a domain found at the C terminus of DNA polymerase III subunit tau. The extreme C-terminal region of this domain interacts with the alpha subunit of the DNA polymerase III holoenzyme.
