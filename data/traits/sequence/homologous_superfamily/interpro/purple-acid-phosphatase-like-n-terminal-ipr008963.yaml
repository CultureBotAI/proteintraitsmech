identifier: InterPro:IPR008963
label: Purple acid phosphatase-like, N-terminal
definition: >-
  Purple acid phosphatases (PAPs) are ubiquitous binuclear metal-containing acid hydrolases characterised by their acidic pH optima and their intense purple colour due to a TyrO-to-FeIII charge-transfer transition. The amino acid residues coordinating the metal ions are conserved in all PAPs. Active PAPs contain an FeIII ion coordinated to Tyr O, a His N, and an Asp O 2 , in addition to a divalent metal ion (Fe, Zn, or Mn) coordinated by a His N, a His N, and an Asn O. A hydroxide ion and an Asp O 2 bridge the two metal ions. These enzymes share a high degree of homology within their N-termini. This entry also includes phospholipase D, the structure of which has been solved from Bacillus subtilis and shows a purple acid phosphatase-like fold.
