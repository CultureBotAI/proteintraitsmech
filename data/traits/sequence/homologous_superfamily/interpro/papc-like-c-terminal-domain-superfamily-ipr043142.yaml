identifier: InterPro:IPR043142
label: "PapC-like, C-terminal domain superfamily"
definition: >-
  The PapC C-terminal domain is a structural domain found at the C terminus of the E. coli protein PapC. In E.coli pili are assembled using the chaperone usher system composed of the chaperone PapD and the usher PapC. This superfamily represents the C-terminal domain from PapC and its homologues. This domain has a β-sandwich structure similar to the plug domain of PapC.
