identifier: InterPro:IPR038498
label: "OspF/SpvC superfamily"
definition: >-
  This entry includes the virulence protein SpvC and the phosphothreonine lyase OspF. The spv region of the Salmonella virulence plasmids consists of five genes located on an 8-kb fragment, shown to be essential for virulence in mice. SpvC (also known as mkfA and VirA) is part of this gene cluster and is utilised by the microbe upon entry into macrophages, although the exact mechanism is unclear.
