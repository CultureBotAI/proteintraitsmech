identifier: InterPro:IPR036377
label: Gp120 core superfamily
definition: >-
  The envelope glycoprotein Gp160 of HIV1 and Simian immunodeficiency virus (SIV) is cleaved into the surface protein Gp120 and the transmembrane protein Gp41. This superfamily represents the Gp120 core.
