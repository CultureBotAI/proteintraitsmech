identifier: InterPro:IPR036231
label: "Avirulence B/C superfamily"
definition: >-
  The avirulence structure contains a helical bundle with a buried helix and an α+β bilobal fold. This entry represents the avirulence B and C proteins from Pseudomonas syringae and related proteins from Xanthomonas campestris. avrB and avrC encode these proteins, which are 36 and 39 kilodaltons in size respectively. Pathogenic bacterial effectors suppress pathogen-associated molecular pattern (PAMP)-triggered host immunity, thereby promoting parasitism. AvrB suppresses PAMP-triggered immunity (PTI) through RAR1, which is for effector-triggered immunity (ETI).
