identifier: InterPro:IPR036095
label: PTS system IIB component-like superfamily
definition: >-
  The bacterial phosphoenolpyruvate: sugar phosphotransferase system (PTS) is a multi-protein system involved in the regulation of a variety of metabolic and transcriptional processes. The lactose/cellobiose-specific family are one of four structurally and functionally distinct group IIB PTS system cytoplasmic enzymes. The fold of IIB cellobiose shows similar structure to mammalian tyrosine phosphatases. This signature is often found downstream of . The PTS structure presents three layers (α/β/α) with parallel β-sheet of four strands.
