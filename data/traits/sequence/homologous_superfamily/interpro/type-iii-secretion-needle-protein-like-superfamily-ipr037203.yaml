identifier: InterPro:IPR037203
label: Type III secretion, needle-protein-like superfamily
definition: >-
  This entry represents bacterial type III secretion system needle-like proteins. Type III secretion systems are essential virulence determinants for many Gram-negative bacterial pathogens, acting to translocate proteins, usually virulence factors, out across both inner and outer membranes of bacteria and into the cytoplasm of the host cell.
