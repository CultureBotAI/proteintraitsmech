identifier: InterPro:IPR036302
label: "Pyosin/cloacin translocation domain superfamily"
definition: >-
  This entry represents a structural domain superfamily with a complex fold made of several coiled β-sheets. This domain is found at the N-terminal of both colicin E3 and colicin B, and acts as a translocation domain. It also occurs in S-type pyocin. Both pyocin and cloacin are bacteriocins, protein antibiotics that kill bacteria closely related to the producing species. Colicins are a subgroup of bacteriocins that are produced by and target Escherichia coli. The lethal action of most colicins is exerted either by formation of a pore in the cytoplasmic membrane of the target cell, or by an enzymatic nuclease digestion mechanism.
