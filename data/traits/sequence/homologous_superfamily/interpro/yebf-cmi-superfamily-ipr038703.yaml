identifier: InterPro:IPR038703
label: "YebF/Cmi superfamily"
definition: >-
  This superfamily includes the colicin M immunity protein Cmi, and the protein of unknown function YebF. Cmi protects cells from the colicin M toxin, though the mechanism by which it achieves this is not known. The protein forms an α-β fold and contains a disulphide bond that is essential for function. Although the function of YbeF is not known, it is secreted by E. coli, and contains the two conserved cysteine residues responsible for the disulphide bond in Cmi.
