identifier: InterPro:IPR037058
label: "Flagellar hook protein FlgE superfamily"
definition: >-
  This domain superfamily is found in several bacterial FlgE flagellar hook proteins. The flagellar hook is a short, curved, extracellular structure located between the basal body and the filament.
