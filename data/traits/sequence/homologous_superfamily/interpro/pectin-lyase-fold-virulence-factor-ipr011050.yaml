identifier: InterPro:IPR011050
label: "Pectin lyase fold/virulence factor"
definition: >-
  Microbial pectin and pectate lyases are virulence factors that degrade the pectic components of the plant cell wall. When the backbone of pectin is methylated, it is referred to as pectin and is cleaved by pectin lyase; when it is demethylated, it is referred to as pectate and is cleaved by pectate lyase. Pectin lyase from Aspergillus niger has a single-stranded, right-handed parallel beta-helix topology , where each coil contains three beta strands and three turn regions. Several other virulence factors share this beta-helix topology, although they differ in the number of coils. These include bacterial pectate lyases; fungal and bacterial galacturonases (such as rhamnogalacturonase and polygalacturonase), chondroitinase B from Flavobacterium species; iota-carrageenase from Alteromonas species; pectin methylesterase (PemA); the P22 tailspike protein from Enterobacteria phage P22; and the virulence factor P69 pertactin from Bordetella pertussis, which mediates adhesion to mammalian host cells.
