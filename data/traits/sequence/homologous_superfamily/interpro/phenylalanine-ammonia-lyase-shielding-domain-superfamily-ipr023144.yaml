identifier: InterPro:IPR023144
label: "Phenylalanine ammonia-lyase, shielding domain superfamily"
definition: >-
  This superfamily represents the shielding domain at the C-terminal of PAL which is tightly connected to the core domain through the exceptionally long 55-residue helix α17. The shielding domain restricts the access to the active centre so that the risk of inactivation by nucleophiles in conjunction with dioxygen is minimised. This may help PAL to function, for instance, in stressed plant tissue. It should be noted that PAL forms its electrophilic prosthetic group autocatalytically from its own polypeptide, rendering it independent of any cofactor and thus facilitating its upregulation. The ubiquitous higher plant enzyme phenylalanine ammonia-lyase (PAL; ) is a key biosynthetic catalyst in phenylpropanoid assembly. PAL catalyses the non-oxidative deamination of L-phenylalanine to trans-cinnamic acid. PAL contains a catalytic Ala-Ser-Gly triad that is post-translationally cyclised. PAL is structurally similar to the mechanistically related histidine ammonia lyase (HAL; ), with PAL having an additional approximately 160 residues extending from the common fold. Catalysis in PAL may be governed by the dipole moments of seven α-helices associated with the PAL active site. The cofactor 3,5-dihydro-5-methylidene-4H-imidazol-4-one (MIO) resides atop the positive poles of three helices, increasing its electrophillicity. Plant and fungal PAL enzymes contain a 100-residue-long C-terminal multi-helix domain, which might play a role in the rapid response of PAL in the regulation of phenylpropanoid biosynthesis by destabilising the enzyme. This entry also includes fungal proteins such as phenolylalanine ammonia-lyase CLZ10, which mediates the biosynthesis of squalestatin S1 with potent cholesterol-lowering activity by targeting squalene synthase (SS), and phenolylalanine ammonia-lyas…
