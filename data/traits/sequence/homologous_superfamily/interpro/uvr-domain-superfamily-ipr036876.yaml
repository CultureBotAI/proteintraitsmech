identifier: InterPro:IPR036876
label: "UVR domain superfamily"
definition: >-
  During the process of Escherichia coli nucleotide excision repair, DNA damage recognition and processing are achieved by the action of the uvrA, uvrB, and uvrC gene products. UvrB and UvrC share a common domain of around 35 amino acids, the so called UVR domain. This domain in UvrB can interact with the homologous domain in UvrC throughout a putative coiled coil structure. This interaction is important for the incision of the damaged strand. UVRC incises the DNA on either side of the lesion. A conserved region similar to the UVR domain is also found in the ATP-binding subunit of bacterial and chloroplastic Clp ATPases, which suggest that the UVR domain is not only involved in the interaction between uvrB and uvrC.
