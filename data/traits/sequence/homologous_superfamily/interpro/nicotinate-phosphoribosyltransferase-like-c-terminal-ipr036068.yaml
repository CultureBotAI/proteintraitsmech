identifier: InterPro:IPR036068
label: Nicotinate phosphoribosyltransferase-like, C-terminal
definition: >-
  The nicotinate phosphoribosyltransferase catalyses the synthesis of beta-nicotinate D-ribonucleotide from nicotinate and 5-phospho-D-ribose 1-phosphate at the expense of ATP. Its structure contains a parallel β-sheet barrel.
