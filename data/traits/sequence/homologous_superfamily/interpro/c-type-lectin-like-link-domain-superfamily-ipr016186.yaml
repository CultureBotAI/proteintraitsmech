identifier: InterPro:IPR016186
label: "C-type lectin-like/link domain superfamily"
definition: >-
  Lectins occur in plants, animals, bacteria and viruses. Initially described for their carbohydrate-binding activity, they are now recognised as a more diverse group of proteins, some of which are involved in protein-protein, protein-lipid or protein-nucleic acid interactions. There are at least twelve structural families of lectins, of which C-type (Ca+-dependent) lectins is one. C-type lectins can be further divided into seven subgroups based on additional non-lectin domains and gene structure: (I) hyalectans, (II) asialoglycoprotein receptors, (III) collectins, (IV) selectins, (V) NK group transmembrane receptors, (VI) macrophage mannose receptors, and (VII) simple (single domain) lectins. The term 'C-type lectin domain' was introduced to distinguish a carbohydrate-recognition domain (CRD) which is present in all Ca2+-dependent lectins, but not in other types of animal lectins. However, there are proteins with modules similar in overall structure to CRDs that serve functions other than sugar binding. Therefore, a more general term C-type lectin-like domain was introduced to refer to such domains, although both terms are sometimes used interchangeably. This superfamily represents a structural domain found in C-type lectins, as well as in other proteins, including: The C-terminal domain of invasin and intimin. Link domain, which includes the Link module of tumor necrosis factor-inducible gene 6 protein (TSG-6) (a hyaladherin with important roles in inflammation and ovulation) and the hyaluronan binding domain of CD44 (which contains extra N-terminal β-strand and C-terminal β-hairpin). The Link domain may have emerged as a result of a deletion of the long loop region from an ancestral canonical C-type lectin domain. Endostatin and the endostatin domain of collagen alpha…
