identifier: InterPro:IPR016115
label: "Bacteriophage PRD1, P3, N-terminal"
definition: >-
  The major capsid protein P3 from Bacteriophage PRD1 adopts a double-barrel structure comprising two eight-stranded viral β-barrels or jelly rolls, each of which contains a 12-residue α-helix. This protein then trimerises through a 'trimerisation loop' sequence, and is incorporated within the viral capsid.
