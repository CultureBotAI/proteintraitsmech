identifier: InterPro:IPR038594
label: "SepF-like superfamily"
definition: >-
  This entry represents a cell division protein, designated SepF, which is conserved in Gram-positive bacteria. SepF accumulates at the cell division site in an FtsZ-dependent manner and is required for proper septum formation. This protein uses an amphipathic helix for membrane binding and polymerises into large rings that bundle FtsZ filaments. Mutants are viable but the formation of the septum is much slower and occurs with a very abnormal morphology. This entry also includes archaeal related proteins, such as SepF from Haloferax volcanii.
