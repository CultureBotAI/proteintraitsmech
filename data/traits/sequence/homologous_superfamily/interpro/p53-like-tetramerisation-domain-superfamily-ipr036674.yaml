identifier: InterPro:IPR036674
label: p53-like tetramerisation domain superfamily
definition: >-
  This entry represents the tetramerisation domain of p53. The tetramerisation domain of human p53 extends from residues 325 to 356, and has a 4-helical bundle fold. The tetramerisation domain is essential for DNA binding, protein-protein interactions, post-translational modifications, and p53 degradation. This superfamily also includes the structural-related C-terminal SARAH (Salvador-RassF-Hippo) domain found in tumor suppressors such as Serine/threonine-protein kinase 4 (human Hippo homologue, Mst), Serine/threonine-protein kinase 3, Serine/threonine-protein kinase cst-1 and Serine/threonine-protein kinase hippo, which is involved in dimerisation.
