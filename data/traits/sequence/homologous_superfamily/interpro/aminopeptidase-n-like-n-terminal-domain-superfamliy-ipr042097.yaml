identifier: InterPro:IPR042097
label: "Aminopeptidase N-like , N-terminal domain superfamliy"
definition: >-
  Aminopeptidase N from Escherichia coli is a broad specificity zinc exopeptidase belonging to aminopeptidase clan MA, family M1. The enzyme is composed of four domains: an N-terminal beta-domain, a catalytic domain, a middle beta-domain and a C-terminal alpha-domain. This superfamily represents the N-terminal domain found in aminopeptidases and related proteins.
