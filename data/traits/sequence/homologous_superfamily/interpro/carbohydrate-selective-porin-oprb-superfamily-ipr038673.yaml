identifier: InterPro:IPR038673
label: "Carbohydrate-selective porin OprB superfamily"
definition: >-
  The carbohydrate-selective porin OprB superfamily includes the Pseudomonas aeruginosa porin B, a substrate-selective channel for a variety of different sugars. This protein may facilitate diffusion of a variety of diverse compounds, but is probably restricted to carbohydrates, and does facilitate glucose fusion across the outer membrane. Its structure shows that OprB forms a monomeric 16-stranded β-barrel. This entry also includes the porin AaxA from Chlamydophila pneumoniae. It facilitates L-arginine uptake, as part of the AaxABC system. The arginine uptake by the bacterium in the macrophage may be a virulence factor against the host innate immune response.
