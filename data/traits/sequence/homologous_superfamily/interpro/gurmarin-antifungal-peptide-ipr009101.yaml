identifier: InterPro:IPR009101
label: "Gurmarin/antifungal peptide"
definition: >-
  Gurmarin is a sweet taste-suppressing polypeptide from the Indian-originated tree Gymnema sylvestre (Gurmar). Gurmarin acts to selectively inhibit the neural response to sweet stimuli in rats. The crystal structure of Gumarin reveals a disulphide-bound fold containing an antiparallel β-hairpin. The aromatic residues that form a hydrophobic cluster in gurmarin are thought to be a possible functional site for the interaction of gurmarin with the taste receptors. Gurmarin is structurally related to the antifungal peptide PAFP-S from the seeds of the pokeweed Phytolacca americana, and to the antifungal peptide Alo3 from the insect Acrocinus longimanus. PAFP-S exhibits a broad spectrum of antifungal activity, including inhibition of saprophytic fungi and some plant pathogens. The amphiphilic surfaces of PAFP-S is thought to be the main functional site for interacts with biomembranes. Insect peptides are key elements of innate immunity against bacteria and fungi. Alo-1, Alo-2 and Alo-3 show high sequence identity, and are active against Candida species.
