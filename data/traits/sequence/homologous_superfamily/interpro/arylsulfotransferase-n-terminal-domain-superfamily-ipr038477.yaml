identifier: InterPro:IPR038477
label: "Arylsulfotransferase, N-terminal domain superfamily"
definition: >-
  This entry represents the small N-terminal domain found in arylsulfotransferases. Each ASST monomer consists of a small, N-terminal 7-stranded β-sandwich domain, and a large C-terminal, 6-bladed β-propeller domain.
