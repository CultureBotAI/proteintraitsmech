identifier: InterPro:IPR014755
label: "Copper resistance protein CopC/internalin, immunoglobulin-like"
definition: >-
  This superfamily represents an immunoglobulin E-set-like β-barrel domain found in the following proteins: Copper-resistance proteins CopC and PcoC. CopC is a bacterial copper protein involved in copper homeostasis that binds 1 equivalent of copper (II). Its immunoglobulin-like fold is similar to that of the unrelated blue copper proteins. PcoC is a plasmid-encoded, soluble, periplasmic protein that is essential for copper resistance in Escherichia coli. Internalin proteins InlA, InlB,InlI and InlJ. These proteins are members of a family of listerial cell surface proteins from the opportunistic pathogen Listeria monocytogenes. Their N-terminal regions consist of a central LRR region flanked by an EF-hand-like cap on one end, and an immunoglobulin-like fold on the other. Together these regions form a domain that directs host cell-specific invasion. Pullulanase A, involved in the degradation of glycogen of the mammalian host cells.
