identifier: InterPro:IPR001920
label: Asp/Glu racemase
definition: >-
  Aspartate racemase and glutamate racemase are two evolutionary related bacterial enzymes that do not seem to require a cofactor for their activity. Glutamate racemase catalyses the interconversion of d-and l-glutamic acid and is the source of d-glutamate in most bacterial strains. d-Glutamic acid is an important biosynthetic building block since it is required in the formation of peptidoglycan that protects bacteria from osmotic lysis. Two conserved cysteines are present in the sequence of these enzymes. They are expected to play a role in catalytic activity by acting as bases in proton abstraction from the substrate. Glutamate racemase forms a dimer and each monomer consists of two α/β fold domains.
