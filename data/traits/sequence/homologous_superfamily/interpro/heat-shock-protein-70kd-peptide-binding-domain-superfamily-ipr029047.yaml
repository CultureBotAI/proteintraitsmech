identifier: InterPro:IPR029047
label: "Heat shock protein 70kD, peptide-binding domain superfamily"
definition: >-
  This superfamily represents peptide-binding β-sandwich domain from DnaK and other HSP70 proteins. Members of the 70-kilodalton heat-shock protein (HSP70) family promote protein folding both constitutively and in response to stress. These proteins have two functional units: a substrate-binding unit, and an adenosine triphosphatase unit. The substrate-binding unit of DnaK consists of a β-sandwich domain followed by α-helical segments. The α-helical domain stabilises the complex, but does not contact the peptide directly.
