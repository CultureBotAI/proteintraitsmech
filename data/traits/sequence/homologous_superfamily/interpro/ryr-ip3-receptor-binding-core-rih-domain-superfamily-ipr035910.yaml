identifier: InterPro:IPR035910
label: "RyR/IP3 receptor binding core, RIH domain superfamily"
definition: >-
  Ryanodine (RyR) and Inositol 1,4,5-trisphosphate (IP3) receptors are intracellular Ca 2+ -release channels. The RIH (RyR and IP3R Homology) domain is an extracellular domain from these two types of calcium channels. This domain may form a binding site for IP3. The structure of the IP3 receptor consists of two (curved) layers α/α and a right-handed superhelix.
