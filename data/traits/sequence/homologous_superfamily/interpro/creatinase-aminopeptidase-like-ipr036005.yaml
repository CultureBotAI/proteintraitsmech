identifier: InterPro:IPR036005
label: Creatinase/aminopeptidase-like
definition: >-
  This entry contains proteins that belong to MEROPS peptidase family M24 (clan MG), which share a common structural-fold, the "pita-bread" fold. The fold contains both α helices and an anti-parallel β sheet within two structurally similar domains that are thought to be derived from an ancient gene duplication. The active site, where conserved, is located between the two domains. The fold is common to methionine aminopeptidase ( ), aminopeptidase P ( ), prolidase ( ), agropine synthase and creatinase ( ). Though many of these peptidases require a divalent cation, creatinase is not a metal-dependent enzyme.
