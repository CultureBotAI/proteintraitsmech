identifier: InterPro:IPR047099
label: "Nop5, N-terminal domain superfamily"
definition: >-
  This entry represents the N-terminal domain of Nop56/58 homologue from archaea Nop5, whose structure is very well conserved. This domain mediates a stable interaction with fibrillarin, playing a role in both ribonucleoprotein (RNP) assembly and methyltransferase activity.
