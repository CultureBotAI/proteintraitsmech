identifier: InterPro:IPR038091
label: "Peptidoglycan synthesis regulatory protein ReoY-like, N-terminal domain superfamily"
definition: >-
  This is the N-terminal domain superfamily of Peptidoglycan synthesis regulatory protein ReoY ( ) which is involved in the PASTA kinase-mediated signalling pathway regulating peptidoglycan synthesis to maintain cell wall integrity. It modulates peptidoglycan (PG) synthesis pathway committed-step enzyme MurA. ReoY positively modulates ClpCP-dependent proteolysis of MurA, thereby regulating PG synthesis and inhibiting intrinsic cephalosporin resistance.
