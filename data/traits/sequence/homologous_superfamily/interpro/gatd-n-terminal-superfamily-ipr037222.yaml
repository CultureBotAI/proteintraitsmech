identifier: InterPro:IPR037222
label: "GatD, N-terminal superfamily"
definition: >-
  This entry represents the N-terminal domain of GatD. GatD (Glutamyl-tRNA(Gln) amidotransferase subunit D) is found only in the Archaea. It is part of a heterodimer, with GatE ( ), that acts as an amidotransferase on misacylated Glu-tRNA(Gln) to produce Gln-tRNA(Gln). This function is carried out in bacteria by the GatABC system, which acts both on Asp-tRNA(Asn) and Glu-tRNA(Gln). GatABC orthologues also exist in some archaea, where it coexist with GatDE; while other archaea only posses GatED and use an asparaginyl-tRNA synthetase to produce Asn-tRNA by direct acylation of the tRNA. GatD is related to bacterial L-asparaginases (amidohydrolases), which catalyse the hydrolysis of asparagine to aspartic acid and ammonia.
