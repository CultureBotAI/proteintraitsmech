identifier: InterPro:IPR042297
label: "Antirestriction domain superfamily"
definition: >-
  This superfamily includes various protein that are involved in antirestriction. The ArdB protein efficiently inhibits restriction by members of the three known families of type I systems of Escherichia coli.
