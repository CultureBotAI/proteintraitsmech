identifier: InterPro:IPR036620
label: Chromosomal protein MC1 superfamily
definition: >-
  This superfamily represents the chromosomal protein MC1, which protects DNA against thermal denaturation and shapes DNA by binding to it. Its global fold consists of a pseudo barrel with an extension of the β-sheet (β4-β5) forming an arm (LP5).
