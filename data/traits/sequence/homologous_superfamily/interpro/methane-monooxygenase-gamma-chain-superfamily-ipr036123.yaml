identifier: InterPro:IPR036123
label: Methane monooxygenase, gamma chain superfamily
definition: >-
  Methane monooxygenases ( ) catalyse the oxidation of methane to methanol in the presence of oxygen and NADH in methanotrophs. It has a broad specificity, hydroxylating many alkanes, and converting alkenes into the corresponding epoxides. In additional reactions, CO is oxidized to CO2, ammonia is oxidized to hydroxylamine, and some aromatic compounds and cyclic alkanes can also be hydroxylated, although more slowly. In Methylococcus capsulatus there are two forms of the enzyme, a soluble and a membrane-bound type. The soluble form consists of 3 components, A, B and C. Protein A is made up of 3 chains, alpha, beta and gamma. This entry represents the gamma chain of methane monooxygenases. Structurally, the gamma chain contains two domains, each consisting of a three helices arranged in an open bundle topology.
