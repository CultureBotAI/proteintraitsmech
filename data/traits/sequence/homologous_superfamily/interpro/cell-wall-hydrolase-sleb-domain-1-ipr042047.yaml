identifier: InterPro:IPR042047
label: "Cell wall hydrolase SleB, domain 1"
definition: >-
  This superfamily represents the domain 1 found in the catalytic domain of cell wall hydrolase SleB. The function of the cell wall hydrolase SleB domain involves degradation of peptidoglycan (PG), process required for spore germination, mainly in Bacillus species. Its structure is similar to other transglycosylases but has unique topological features reflecting its unusual specificity for muramic-delta-lactam-containing PG. This domain 1 represents the α helices of the catalytic domain and contains a catalytic glutamate residue.
