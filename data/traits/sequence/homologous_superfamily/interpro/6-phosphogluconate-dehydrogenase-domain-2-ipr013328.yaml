identifier: InterPro:IPR013328
label: "6-phosphogluconate dehydrogenase, domain 2"
definition: >-
  This superfamily represents a multi-helical domain found in several NAD or NADP-utilizing dehydrogenases, including 6-phosphogluconate dehydrogenase, classes I and II ketol-acid reductoisomerases, L-3-hydroxyacyl CoA dehydrogenase, UDP-glucose dehydrogenase, glycerol-3-phosphate dehydrogenase, ketopantoate reductase, N-(1-D-carboxylethyl)-L-norvaline dehydrogenase, and mannitol 2-dehydrogenase. This domain, often found in the C-terminal region of the sequence, is also found in some Cytokine-like nuclear factor N-PAC proteins, which have chromatin gene reader activity involved in chromatin modification and regulation of gene expression in humans.
