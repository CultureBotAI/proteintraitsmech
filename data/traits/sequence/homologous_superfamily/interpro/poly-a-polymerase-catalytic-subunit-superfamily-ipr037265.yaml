identifier: InterPro:IPR037265
label: Poly(A) polymerase catalytic subunit superfamily
definition: >-
  Poly(A) polymerase catalyses template-independent extension of the 3'-end of a DNA or RNA strand by one nucleotide at a time. The Poxvirus enzyme creates the 3'(poly)A tail of mRNAs, and is a heterodimer of a catalytic and a regulatory subunit. This is the catalytic subunit. Structurally, the catalytic subunit consists of three domains. The first domain has an all-α fold and contains a HhH motif. The second domain has an α+β fold, distantly related to the nucleotidyltransferase superfamily. The third domain has a β(3)-α-β(3)-α(2) fold arranged in three layers (α/β/α) with mixed β-sheet of six strands where strands 2 and 5 are antiparallel to the rest.
