identifier: InterPro:IPR041881
label: "Coenzyme PQQ synthesis protein D superfamily"
definition: >-
  This superfamily includes bacterial coenzyme PQQ synthesis protein D (PqqD) domains. This protein is required for coenzyme pyrrolo-quinoline-quinone (PQQ) biosynthesis. The function of PqqD is currently unknown, but has been speculated to play a role in releasing PQQ product from PqqC.
