identifier: InterPro:IPR036452
label: Ribonucleoside hydrolase-like
definition: >-
  This entry represents the structural domain superfamily of ribonucleoside hydrolase. Nucleoside hydrolases are crucial for salvaging nucleic acid components in purine auxotrophic protozoan parasites, but are also present in higher eukaryotes and prokaryotes, where they could have a role in the metabolism of tRNA nucleosides. These enzymes are composed of three layers (α/β/α), consisting of a mixed eight-stranded β-sheet surrounded by six α-helices.
