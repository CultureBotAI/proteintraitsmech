identifier: InterPro:IPR027446
label: "Variant surface glycoprotein C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal domain of variant surface glycoproteins. This domain consists of a short α-helix followed by a single turn of 3(10)-helix and connected by a short loop to a small anti-parallel β-sheet and then a longer α-helix at the C terminus. The function of the domain is not clear.
