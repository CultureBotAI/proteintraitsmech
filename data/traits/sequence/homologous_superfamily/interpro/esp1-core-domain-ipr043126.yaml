identifier: InterPro:IPR043126
label: "Esp1, core domain"
definition: >-
  Exocrine gland-secreting peptide Esp1 is produced by the rodent male extraorbital lacrimal gland to be secreted into the tear fluid. Other mice, including females, detect these peptides through receptors in the vomeronasal organ, and the receptors report information on mouse-strain, sex and species. The peptides are short, all carrying an N-terminal signal peptide to indicate they are for secretion which accounts for much of the common conservation. Structurally, Esp1 consists of three helices with an overall helical fold stabilised by an intramolecular disulfide bridge. This superfamily represents the Esp1 core domain.
