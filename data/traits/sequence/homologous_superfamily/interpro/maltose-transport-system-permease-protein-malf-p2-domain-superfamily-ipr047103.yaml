identifier: InterPro:IPR047103
label: "Maltose transport system permease protein MalF, P2 domain superfamily"
definition: >-
  The maltose transport system is composed of a periplasmic maltose-binding protein (MBP), two integral membrane proteins, MalF and MalG, and two copies of the cytoplasmic ATP-binding cassette MalK. The structures of the two transmembrane (TM) subunits, MalF and MalG, are composed of eight and six TM helices, respectively. The TM helices of MalF and MalG assemble into two crescent shaped structures with their concave surfaces facing each other and enclosing the maltose. MalF consists of four periplasmic domains. This entry represents the second periplasmic loop of MalF (P2), which binds to MalE and is involved in activation of the MalFGK2-E complex by inducing structural changes in maltose-bound MalE. P2 is also responsible for substrate recognition.
