identifier: InterPro:IPR043175
label: "F-actin-capping protein subunit beta, N-terminal domain"
definition: >-
  The F-actin capping protein (CP) is a heterodimer composed of two unrelated alpha and beta subunits. Neither of the subunits shows sequence similarity to other filament-capping proteins. This superfamily represents the N-terminal domain of the beta subunit of F-actin capping protein. It is part of a protein of about 280 amino acid residues whose sequence is well conserved in eukaryotic species. In Drosophila, mutations in the alpha and beta subunits cause actin accumulation and subsequent retinal degeneration.
