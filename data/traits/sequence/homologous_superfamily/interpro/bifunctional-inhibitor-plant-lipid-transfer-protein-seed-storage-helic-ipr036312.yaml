identifier: InterPro:IPR036312
label: "Bifunctional inhibitor/plant lipid transfer protein/seed storage helical domain superfamily"
definition: >-
  This entry represents a superfamily of structural domains consisting of 4-helices with a folded leaf topology, and forming a right-handed superhelix. This domain occurs in several proteins, including: Plant lipid-transfer proteins, such as the non-specific lipid-transfer proteins ns-LTP1 and ns-LTP2. Proteinase/alpha-amylase inhibitors, such as trypsin/alpha-amylase inhibitor RBI from Eleusine coracana (Indian finger millet) and Hageman factor/amylase inhibitor from Zea mays (Maize). Seed storage proteins, such as napin from Brassica napus (Rape) and 2S albumin from Ricinus communis (Castor bean).
