identifier: InterPro:IPR037228
label: "PhtA domain superfamily"
definition: >-
  This entry represents the Pneumococcal histidine triad protein A (PhtA), which contains a repeated sequence region that includes a His-X-X-His-X-His (histidine triad) motif. Members of the superfamily are suggested to cleave human complement component 3, and family member PhpA has been shown in vaccine studies to be a protective antigen in mice.
