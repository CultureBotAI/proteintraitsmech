identifier: InterPro:IPR042172
label: "Adenosylhomocysteinase-like superfamily"
definition: >-
  Structural domains found in this superfamily share the structure of the enzyme adenosylhomocysteinase (S-adenosyl-L-homocysteine hydrolase, AdoHcyase), which is formed in methylation and catalyses the reversible hydration of S-adenosyl-L-homocysteine into adenosine and homocysteine. This enzyme is ubiquitous, highly conserved, and a key regulator of the intracellular concentration of adenosylhomocysteine. In addition, this enzyme is a potent inhibitor of S-adenosyl-L-methionine dependent methyltransferases, and thus plays a critical role in the modulation of their activity.
