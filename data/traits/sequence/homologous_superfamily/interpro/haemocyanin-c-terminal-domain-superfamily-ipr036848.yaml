identifier: InterPro:IPR036848
label: "Haemocyanin C-terminal domain superfamily"
definition: >-
  This antiparallel β sandwich domain occurs in the C-terminal of mollusc haemocyanins, which are copper-containing oxygen carriers occurring freely dissolved in the hemolymph of many mollusks and arthropods. Each mollusc haemocyanin contains several globular oxygen binding functional units. Each unit consists of an α-helical copper binding domain ( ) and an antiparallel β sandwich domain.
