identifier: InterPro:IPR042449
label: "Ubiquitin-activating enzyme E1, inactive adenylation domain, subdomain 1"
definition: >-
  The post-translational attachment of ubiquitin ( ) to proteins (ubiquitinylation) alters the function, location or trafficking of a protein, or targets it to the 26S proteasome for degradation. Ubiquitinylation is an ATP-dependent process that involves the action of at least three enzymes: a ubiquitin-activating enzyme (E1), a ubiquitin-conjugating enzyme (E2, ), and a ubiquitin ligase (E3, , ), which work sequentially in a cascade. The E1 enzyme is responsible for activating ubiquitin, the first step in ubiquitinylation. The E1 enzyme hydrolyses ATP and adenylates the C-terminal glycine residue of ubiquitin, and then links this residue to the active site cysteine of E1, yielding a ubiquitin-thioester and free AMP. To be fully active, E1 must non-covalently bind to and adenylate a second ubiquitin molecule. The E1 enzyme can then transfer the thioester-linked ubiquitin molecule to a cysteine residue on the ubiquitin-conjugating enzyme, E2, in an ATP-dependent reaction. The Ubiquitin-activating enzyme E1 (Ub-E1) consists of four building blocks: First, the adenylation domains composed of two MoeB/ThiF-homology motifs (IAD and AAD, for "inactive" and "active" adenylation domain, respectively), AAD binds ATP and Ub; second, the catalytic cysteine half-domains, which contain the E1 active site cysteine (FCCH and SCCH, for "first" and "second" catalytic cysteine half-domain, respectively) inserted into each of the adenylation domains; third, a four-helix bundle that represents a second insertion in the IAD and immediately follows the FCCH; and fourth, the C-terminal ubiquitin-fold domain (UFD), which recruits specific E2. The adenylation domain, which is composed of two MoeB/ThiF-homology motifs (hereafter, IAD and AAD, for 'inactive' and 'active' adenylation domain, respec…
