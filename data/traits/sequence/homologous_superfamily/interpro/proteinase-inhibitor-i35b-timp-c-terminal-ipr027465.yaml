identifier: InterPro:IPR027465
label: "Proteinase inhibitor I35b (TIMP), C-terminal"
definition: >-
  The tissue inhibitors of metalloproteinases (TIMPs) are endogenous inhibitors of the matrix metalloproteinases (MMPs). TIMPs have two domains, a larger N-terminal domain that carries the MMP-inhibitory activity, and a smaller C-domain that mediates other interactions, notably non-inhibitory interactions of TIMP-1 with pro-MMP-9 and of TIMP-2 with pro-MMP-2. This superfamily represents the C-terminal domain.
