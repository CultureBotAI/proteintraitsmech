identifier: InterPro:IPR029028
label: "Alpha/beta knot methyltransferases"
definition: >-
  This entry represents a α/β knot structural domain that can be found in many RNA methyltransferases, including members from the SPOUT superfamily, EMG1/NEP1 methyltransferases and SAM-dependent RNA methyltransferases. The α/β knot structure is extremely rare in protein structures as it poses a folding problem.
