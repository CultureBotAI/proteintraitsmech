identifier: InterPro:IPR042519
label: "Non-structural protein NSP3, N-terminal, rotavirus"
definition: >-
  The NSP3 protein has been shown to bind viral RNA. It consists of 3 conserved functional domains; a basic region which binds ssRNA, a region containing heptapeptide repeats mediating oligomerisation and a leucine zipper motif. NSP3 may play a central role in replication and assembly of genomic RNA structures. Rotaviruses have a dsRNA genome and are a major cause of acute gastroenteritis in the young of many species. The NPS3 homodimer fold has two domains, one all-alpha and the other alpha beta. It is asymmetric with each domain intertwining with its counterpart. This entry represents the N-terminal domain of NSP3 from rotavirus. It consists of 5 α helices.
