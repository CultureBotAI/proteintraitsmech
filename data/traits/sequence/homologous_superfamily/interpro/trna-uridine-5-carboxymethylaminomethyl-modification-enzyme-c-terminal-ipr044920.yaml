identifier: InterPro:IPR044920
label: "tRNA uridine 5-carboxymethylaminomethyl modification enzyme, C-terminal subdomain superfamily"
definition: >-
  This entry represents the C-terminal subdomain of MnmG (also known as GidA). It consists of the last highly conserved 3 helices of the C-terminal domain, which are rather short and form a small bundle. MnmG is a tRNA modification enzyme found in bacteria and mitochondria that forms a complex with MnmE which is involved in the formation of methyluridine derivatives at the wobble uridine base in some tRNAs. Based on mutational analysis the C-terminal domain has been suggested to be implicated in binding of the D-stem of tRNA and to be responsible for the interaction with protein MnmE.
