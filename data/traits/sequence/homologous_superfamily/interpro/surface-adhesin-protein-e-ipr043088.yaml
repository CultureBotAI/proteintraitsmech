identifier: InterPro:IPR043088
label: "Surface-adhesin protein E"
definition: >-
  This superfamily represents the surface-adhesion protein E. Adhesin E plays a role in pathogenesis. It binds to host proteins including plasminogen, vitronectin and laminin.
