identifier: InterPro:IPR036440
label: "Peptidase C15, pyroglutamyl peptidase I-like superfamily"
definition: >-
  This group of cysteine peptidases belong to MEROPS peptidase family C15 (pyroglutamyl peptidase I, clan CF). The type example being pyroglutamyl peptidase I of Bacillus amyloliquefaciens. There are similarities in structure between members of clan CF and members of three clans of metallopeptidases (MC, MF and MH) and all four are included in the same superfamily (phosphorylase/hydrolase-like fold) by the SCOP database. Members of clan CF have an α/β/α sandwich fold. Pyroglutamyl peptidase I (also known as pyrrolidone carboxyl peptidase, Pcp or PYRase) is an exopeptidase that hydrolytically removes the pGlu from pGlu-peptides or pGlu-proteins. PYRase has been found in prokaryotes and eukaryotes where at least two different classes have been characterised: the first containing bacterial and animal type I PYRases, and the second containing animal type II and serum PYRases. Type I and bacterial PYRases are soluble enzymes, while type II PYRases are membrane-bound. The primary application of PYRase has been its utilisation for protein or peptide sequencing, and bacterial diagnosis. The conserved residues Cys-144 and His-168 have been identified by inhibition and mutagenesis studies. Pyroglutamyl-peptidase 1-like protein belongs to the petidase C15 family, though its exact function is not known.
