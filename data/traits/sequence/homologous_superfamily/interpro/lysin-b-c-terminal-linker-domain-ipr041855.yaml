identifier: InterPro:IPR041855
label: "Lysin B, C-terminal linker domain"
definition: >-
  This superfamily entry represents the linker domain of the mycobacteriophage Lysin B. The linker domain is composed of four α-helices connecting the C-terminal α-helix back to the side of the central β-sheet.
