identifier: InterPro:IPR042253
label: "2,3-bisphosphoglycerate-independent phosphoglycerate mutase superfamily"
definition: >-
  This superfamily represents domain found in 2,3-bisphosphoglycerate-independent phosphoglycerate mutase (iPGAM), it is a metalloenzyme found particularly in archaea and some eubacteria. It is responsible for the interconversion of 2-phosphoglycerate and 3-phosphoglycerate. It is distantly related to the iPGAM ( ) characteristic of plants and many eubacteria. The common active site and metal-binding residues of the phosphatase domain are easily identified, but the putative phosphotransferase domain is highly diverged. These proteins are unrelated to the cofactor-dependent PGAM. Activity has been demonstrated for proteins from Methanocaldococcus jannaschii (Methanococcus jannaschii), Pyrococcus furiosus, and Sulfolobus solfataricus. These proteins were initially misidentified as phosphonopyruvate decarboxylase.
