identifier: InterPro:IPR005801
label: ADC synthase
definition: >-
  This domain superfamily is characteristic of ADC synthases, including: Anthranilate synthase aminodeoxyisochorismate synthase/lyase subunit, TrpE, which catalyses the formation of anthranilate (o-aminobenzoate) and pyruvic acid from chorismate and glutamine. P-aminobenzoate synthase component I (Aminodeoxychorismate synthase), which catalyses the two-step biosynthesis of 4-amino-4-deoxychorismate (ADC), a precursor of p-aminobenzoate and folate in microorganisms. Menaquinone-specific isochorismate synthase MenF, which catalyses the conversion of chorismate to isochorismate. Salicylate synthetase Irp9, which is involved in the biosynthesis of the siderophore yersiniabactin in Yersinia enterocolitica. Salicylate synthase MbtI (Mycobactin synthetase protein I), which is involved in salicylate production.
