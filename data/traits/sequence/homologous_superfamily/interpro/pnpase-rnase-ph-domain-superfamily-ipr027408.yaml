identifier: InterPro:IPR027408
label: "PNPase/RNase PH domain superfamily"
definition: >-
  Polynucleotide phosphorylase (PNPase) is a polyribonucleotide nucleotidyl transferase that degrades mRNA in prokaryotes. Polynucleotide phosphorylase and the Ribonuclease PH (RNase PH) family possess a common domain represented by this entry. This suggests similar structures and mechanisms of action for these 3'-->5' phosphorolytic enzymes. In the case of PNPase, the core domain is found duplicated.
