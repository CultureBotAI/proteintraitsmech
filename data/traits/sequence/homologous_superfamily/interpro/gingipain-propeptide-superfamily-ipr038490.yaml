identifier: InterPro:IPR038490
label: "Gingipain propeptide superfamily"
definition: >-
  Gingipains are proteinases from Porphyromonas gingivalis, a major pathogen associated with chronic periodontitis. They belong to MEROPS peptidase family C25. There are three types: Arg-specific proteinases RgpA, and RgpB, and the Lys-specific proteinase Kgp. All three gingipain precursors contain a propeptide of around 200 amino acids in length that is removed during maturation. It has been shown that gingipain propeptides are capable of inhibiting their mature cognate proteinases. Proteins homologous to the gingipain precursor are known from many other bacteria, some archaea and some eukaryotes.
