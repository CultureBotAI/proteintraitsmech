identifier: InterPro:IPR036494
label: "Ku, C-terminal domain superfamily"
definition: >-
  The non-homologous end joining (NHEJ) pathway is one method by which double stranded breaks in chromosomal DNA are repaired. Ku is a component of a multi-protein complex that is involved in the NHEJ. Ku has affinity for DNA ends and recruits the DNA-dependent protein kinase catalytic subunit (DNA-PKcs). Ku also binds RNA, mediating the assembly of DNA-PKcs which has a role in ribosomal RNA biogenesis. This domain is found at the C-terminal of Ku which binds to DNA-PKcs.
