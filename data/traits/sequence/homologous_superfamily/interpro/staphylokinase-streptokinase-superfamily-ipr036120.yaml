identifier: InterPro:IPR036120
label: Staphylokinase/Streptokinase superfamily
definition: >-
  This entry represents staphylokinases and streptokinases. Staphylokinase (also known as SAK) from Staphylococcus aureus is a virulence factor due to its interaction with plasminogen and alpha-defensins in the hosts. The binding of staphylokinase to plasminogen results in the formation of active plasmin, a proteolytic enzyme facilitating bacterial penetration into the surrounding tissues. However, once the host tissues are infected, the interaction between staphylokinase and plasminogen decreases disease severity. The three-dimensional structure of streptokinase is believed to contain two independently folded domains, each with a ubiquitin-like fold. Streptokinase (SK) can be found in several species of Streptococci. It can bind not only plasminogen, but also host fibrinogen. This close interaction with the human fibrinolytic system allows the microbe to acquire unregulatable cell-surface enzymatic activity, promoting further spread from the site of infection. The complexes formed between streptococcal cells, streptokinase, plasminogen and fibrinogen can lyse fibrin clots in the host. Streptokinase has been used to treat acute myocardial infarction. Staphylokinases and streptokinases have a β(2)-α-β(2) fold with a mixed β-sheet topology.
