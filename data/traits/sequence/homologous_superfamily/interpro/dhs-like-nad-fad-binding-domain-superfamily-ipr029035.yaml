identifier: InterPro:IPR029035
label: "DHS-like NAD/FAD-binding domain superfamily"
definition: >-
  This superfamily represents a domain which adopts a Rossmann fold, similar to the FAD/NAD(P)-binding Rossmann fold domain. However, there are differences between these two domains. Proteins with this DHS-like NAD/FAD-binding domain bind cofactor in the opposite direction and lack the conserved GxGxxG motif found in classical NADP binding Rossmann folds. It also forms an internal hydrogen bond in the FAD molecule. This domain can be found in deoxyhypusine synthase (DHS), the C-terminal domain of the electron transfer flavoprotein alpha subunit, the central domain of the pyruvate oxidase and decarboxylase, transhydrogenase domain III (dIII), Sir2 family of transcriptional regulators and the CO dehydrogenase beta subunit/acetyl-CoA synthase epsilon subunit.
