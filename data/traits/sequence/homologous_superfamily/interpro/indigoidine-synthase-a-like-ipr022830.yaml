label: Indigoidine synthase A-like
definition: >-
  The crystal structure of indigoidine synthase A (IndA)-like protein (TM1464) from Thermotoga maritima represents a new fold. This protein has been shown to act also as a pseudouridine-5'-phosphate glycosidase.
