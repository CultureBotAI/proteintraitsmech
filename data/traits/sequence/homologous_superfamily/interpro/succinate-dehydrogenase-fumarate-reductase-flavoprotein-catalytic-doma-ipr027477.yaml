identifier: InterPro:IPR027477
label: "Succinate dehydrogenase/fumarate reductase flavoprotein, catalytic domain superfamily"
definition: >-
  Succinate:quinone oxidoreductase refers collectively to succinate:quinone reductase (SQR, or Complex II) and quinol:fumarate reductase (QFR). SQR is found in aerobic organisms, and catalyses the oxidation of succinate to fumarate in the citric acid cycle and donates the electrons to quinone in the membrane. QFR can be found in anaerobic cells respiring with fumarate as terminal electron acceptor. SQR and QFR are very similar in composition and structure, despite catalysing opposite reactions in vivo . They are thought to have evolved from a common ancestor, and in Escherichia coli they are capable of functionally replacing each other. Succinate:quinone oxidoreductases consist of a peripheral domain, exposed to the cytoplasm in bacteria and to the matrix in mitochondria, and a membrane-integral anchor domain that spans the membrane. The peripheral part, which contains the dicarboxylate binding site, is composed of a flavoprotein subunit, with one covalently bound FAD, and an iron-sulphur protein subunit containing three iron-sulphur clusters. The membrane-integral domain functions to anchor the peripheral domain to the membrane and is required for quinone reduction and oxidation. The anchor domain shows the largest variability in composition and primary sequence, being composed either of one large subunit, or two smaller subunits, which may, or may not, contain protoheme groups. The flavoprotein subunit found in both the SQR and QFR enzymes contains an N-terminal domain which binds the FAD cofactor, a central catalytic domain with an unsual fold, and a C-terminal domain whose role is unclear. The dicarboxylate binding site is located between the FAD and catalytic domains. This superfamily represents the catalytic domain of the flavoprotein subunit.
