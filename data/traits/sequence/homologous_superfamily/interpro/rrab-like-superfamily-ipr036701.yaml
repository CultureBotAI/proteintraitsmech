identifier: InterPro:IPR036701
label: "RraB-like superfamily"
definition: >-
  This entry represents a domain found in regulator of ribonuclease activity B (RraB) protein. RraB regulates mRNA abundance by binding to RNaseE and inhibiting its endonucleolytic activity. A subset of these proteins are predicted to function as immunity proteins.
