identifier: InterPro:IPR013833
label: Cytochrome c oxidase, subunit III, 4-helical bundle
definition: >-
  Cytochrome c oxidase ( ) is the terminal enzyme of the respiratory chain of mitochondria and many aerobic bacteria. It catalyzes the transfer of electrons from reduced cytochrome c to molecular oxygen: 4 cytochrome c +2 + 4 H + + O 2 -->4 cytochrome c +3 + 2 H 2 O This reaction is coupled to the pumping of four additional protons across the mitochondrial or bacterial membrane.
