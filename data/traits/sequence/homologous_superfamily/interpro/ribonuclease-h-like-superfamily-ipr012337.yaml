identifier: InterPro:IPR012337
label: "Ribonuclease H-like superfamily"
definition: >-
  The catalytic domain of several polynucleotidyl transferases shares a similar structure, consisting of a 3-layer α/β/α fold that contains mixed β-sheets, suggesting that they share a similar mechanism of catalysis. Polynucleotidyl transferases containing this domain include ribonuclease H class I (RNase HI) and class II (RNase HII), HIV RNase (reverse transcriptase domain), retroviral integrase (catalytic domain), Mu transposase (core domain), transposase inhibitor Tn5 (containing additional all-α subdomains), DnaQ-like 3'-5' exonucleases (exonuclease domains), RuvC resolvase, and mitochondrial resolvase ydc2 (catalytic domain). This superfamily also includes the YqgF domain, described as RNase H-like and typified by the Escherichia coli protein YqgF. YqgF domain-containing proteins are predicted to be ribonucleases or resolvases based on homology to RuvC Holliday junction resolvases.
