identifier: InterPro:IPR036127
label: CcmE-like superfamily
definition: >-
  CcmE is the product of a cluster of Ccm genes that are necessary for cytochrome c biosynthesis in many prokaryotes and plant mitochondria. In E. coli, expression of these proteins is induced when the organisms are grown under anaerobic conditions with nitrate or nitrite as the final electron acceptor. The CcmE structure presents a close or partly open barrel fold and a greek-key topology.
