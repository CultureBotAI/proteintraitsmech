identifier: InterPro:IPR036764
label: "Cysteine protease Prp superfamily"
definition: >-
  This is a superfamily of cysteine protease that are found to cleave the N terminus extension of ribosomal subunit L27 in eubacteria. Proteins in this superfamily are distinguished by a pair of invariant histidine and cysteine residues with conserved spacing that form the classic catalytic dyad of a cysteine protease.
