identifier: InterPro:IPR042074
label: "Mycoplasma arthritidis-derived mitogen, C-terminal"
definition: >-
  Mycoplasma arthritidis-derived mitogen (MA-Mit) adopts a completely α-helical structure consisting of ten α helices arranged in two orthogonal bundles. MA-Mit is a superantigen that can activate large fractions of T cells bearing particular TCR V-beta elements. Two MA-Mit molecules form an asymmetric dimer and cross-link two MHC antigens to form a dimerised MA-Mit-MHC complex. This superfamily represents the C-terminal domain found in Mycoplasma arthritidis-derived mitogen.
