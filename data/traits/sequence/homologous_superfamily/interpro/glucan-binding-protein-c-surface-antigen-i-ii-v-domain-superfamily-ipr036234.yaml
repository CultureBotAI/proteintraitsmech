identifier: InterPro:IPR036234
label: "Glucan-binding protein C/Surface antigen I/II, V-domain superfamily"
definition: >-
  This domain superfamily is found in glucan-binding protein C (GbpC) and in the V-region of surface protein antigen; both these proteins belong to the Spa family of Streptococcal proteins. This domain consists of a β-supersandwich of 18 β-strands in two sheets.
