identifier: InterPro:IPR038526
label: "Large ribosomal subunit protein eL22 superfamily"
definition: >-
  Ribosomal protein eL22 forms part of the 60S ribosomal subunit found in eukaryotes. Rattus norvegicus (Rat) eL22 is related to ribosomal proteins from other eukaryotes and is identical in amino acid sequence to human EAP, the EBER 1 (Epstein-Barr virus (strain GD1) (HHV-4) (Human herpesvirus 4) encoded RNA) associated protein.
