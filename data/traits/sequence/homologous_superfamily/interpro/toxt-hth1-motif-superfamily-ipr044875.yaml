identifier: InterPro:IPR044875
label: "ToxT, HTH1 motif superfamily"
definition: >-
  ToxT, a member of the AraC-family of transcriptional regulators, is the master virulence regulator that controls the expression of two virulence factors in Vibrio cholerae - toxin-coregulated pilus (TCP) and cholera toxin (CT), that lead to intestinal infection. This superfamily represents the HTH1 motif, which is located in close proximity to the C terminus and plays a role in the stability and folding of the protein.
