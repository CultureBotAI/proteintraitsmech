identifier: InterPro:IPR038337
label: "Poxvirus poly(A) polymerase, catalytic subunit, N-terminal domain superfamily"
definition: >-
  Poly(A) polymerase ( ) catalyses template-independent extension of the 3'-end of a DNA or RNA strand by one nucleotide at a time. The Poxvirus enzyme creates the 3'(poly)A tail of mRNAs, and is a heterodimer of a catalytic and a regulatory subunit. This superfamily represents a domain found at the N terminus of the pox virus Poly(A) polymerase protein catalytic subunit.
