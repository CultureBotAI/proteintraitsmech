identifier: InterPro:IPR036389
label: Ribonuclease III, endonuclease domain superfamily
definition: >-
  This domain superfamily is found in eukaryotic, bacterial and archeal ribonuclease III (RNAse III) proteins. RNAse III is a double stranded RNA-specific endonuclease. Prokaryotic RNAse III is important in post-transcriptional control of mRNA stability and translational efficiency. It is involved in the processing of ribosomal RNA precursors. Prokaryotic RNAse III also plays a role in the maturation of tRNA precursors and in the processing of phage and plasmid transcripts. Eukaryotic RNase III's participate (through direct cleavage) in rRNA processing, in processing of small nucleolar RNAs (snoRNAs) and snRNA's (components of the spliceosome). In eukaryotes RNase III or RNaseIII like enzymes such as Dicer are involved in RNAi (RNA interference) and miRNA (micro-RNA) gene silencing. Bacterial RNase III proteins are the simplest members of the RNase III family, comprising an N-terminal nuclease domain fused to a C-terminal dsRNA binding domain (dsRBD). The endonuclease domain structure has five helices where one of the helices is surrounded by the others.
