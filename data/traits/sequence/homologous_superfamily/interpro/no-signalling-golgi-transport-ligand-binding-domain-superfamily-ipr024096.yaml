identifier: InterPro:IPR024096
label: "NO signalling/Golgi transport ligand-binding domain superfamily"
definition: >-
  This superfamily represents a domain is found in different trafficking protein particle complex (TRAPP) subunits involved in vesicular transport from the endoplasmic reticulum to Golgi. It is also found in soluble guanylate cyclases, where it binds heme via a covalent linkage to histidine. Soluble guanylate cyclases are nitric oxide-responsive signaling proteins.
