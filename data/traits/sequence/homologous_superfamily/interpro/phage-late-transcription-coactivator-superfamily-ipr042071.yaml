identifier: InterPro:IPR042071
label: "Phage late-transcription coactivator superfamily"
definition: >-
  This superfamily represents a domain from proteins found in Caudovirales. It is a late-transcription coactivator which interacts with the host RNA polymerase forming a part of the initiation complex.
