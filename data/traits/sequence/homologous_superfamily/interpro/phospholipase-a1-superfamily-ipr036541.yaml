identifier: InterPro:IPR036541
label: Phospholipase A1 superfamily
definition: >-
  Outer membrane phospholipase A (OMPLA) is an integral membrane phospholipase, which is present in many Gram-negative bacteria and has a broad substrate specificity . The role of OMPLA has been most thoroughly studied in Escherichia coli, where it participates in the secretion of bacteriocins. Bacteriocin release is triggered by a lysis protein (bacteriocin release protein or BRP), followed by a phospholipase dependent accumulation of lysophospholipids and free fatty acids in the outer membrane. The reaction products enhance the permeability of the outer membrane, which allows the semispecific secretion of bacteriocins. One speculative function of OMPLA is related to organic solvent tolerance in bacteria.
