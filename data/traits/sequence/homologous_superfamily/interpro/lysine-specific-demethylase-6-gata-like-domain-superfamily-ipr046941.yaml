identifier: InterPro:IPR046941
label: "Lysine-specific demethylase 6, GATA-like domain superfamily"
definition: >-
  Histone lysine (K) demethylases (KDMs) catalyse the demethylation of lysine residue from histone tails and are classified in two classes, the flavin-adenine-dinucleotide-dependent amino oxidases (grouped as the KDM1 subfamily) and the Fe2 and 2-(2-OG)-dependent oxygenases that contain a conserved catalytic Jumonji C (JmjC) domain (subfamilies KDM2-KDM7). This entry includes KDM6 subfamily that includes KDM6A (also known as UTX), KDM6B (also known as JMJD3) and the related histone demethylase UTY (also known as KMD6C). This entry represents the Zn2-coordinated GATA-like (GATAL) domain, which seems to be sensitive to redox environment. It is involved in substrate binding.
