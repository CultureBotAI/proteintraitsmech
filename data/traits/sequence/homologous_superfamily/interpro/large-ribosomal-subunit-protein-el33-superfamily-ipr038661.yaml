identifier: InterPro:IPR038661
label: "Large ribosomal subunit protein eL33 superfamily"
definition: >-
  This entry represents the large ribosomal subunit protein eL33 (also known as L35A in vertebrates) which is required for the proliferation and viability of hematopoietic cells and plays a role in the 60S ribosomal subunit formation. Its structure adopts a six-stranded antiparallel β-barrel analogous to the "tRNA binding motif" fold.
