identifier: InterPro:IPR044911
label: "V-type ATP synthase C/D subunit, domain 3 superfamily"
definition: >-
  This superfamily represents the third domain of V-type ATPase which is made up of helices from the N-terminal and C-terminal domains arranged in two central and four peripheral helices. These subunits are divided into three similar domains, each of which has essentially the same topology. Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP. The V-ATPases (or V1V0-ATPase) and A-ATPases (or A1A0-ATPase) are each composed of two linked complexes: the V1 or A1 complex contains the catalytic core that hydrolyses/synthesizes ATP, and the V0 or A0 complex that forms the membrane-spanning pore. The V-ATPase folding, localisation, and stability is made possible through the formation of a luminal glycan coat by the glycolipids and the glycosylated V0 subunits. The V- and A-ATPases both contain rotary motors, one that drives proton translocation across the membrane and one that drives ATP synthesis/hydrolysis. The V- and A-ATPases more closely resemble one another in subunit structure than they do the F-ATPases, although the function of A-ATPases is closer to that of F-ATPases.
