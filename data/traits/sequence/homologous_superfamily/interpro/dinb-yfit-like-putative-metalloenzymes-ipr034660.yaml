identifier: InterPro:IPR034660
label: "DinB/YfiT-like putative metalloenzymes"
definition: >-
  DinB from Bacillus subtilis and related Gram-positive bacteria is a DNA-damage-induced gene and the corresponding protein contains a four helix bundle. This fold is shared by diverse proteins, including MDMPI (mycothiol-dependent maleylpyruvate isomerase) and YfiT, a putative metal-dependent hydrolase.
