identifier: InterPro:IPR038318
label: "KdpD, transmembrane domain superfamily"
definition: >-
  This superfamily represents a domain found in sensor protein KdpD. It is likely to be a transmembrane domain involved in ligand sensing. KdpD is part of the two-component regulatory system KdpD/KdpE involved in the regulation of the kdp operon, a three-component K+ transport system. KdpD may function as a membrane-associated protein kinase that phosphorylates KdpE in response to environmental signals.
