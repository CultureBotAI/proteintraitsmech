identifier: InterPro:IPR036629
label: "YjbJ superfamily"
definition: >-
  This entry represents a group of bacterial stress response proteins, including CsbD. The expression of CsbD is mediated by sigma-B, an alternative sigma factor. These proteins contain a SAM domain-like fold.
