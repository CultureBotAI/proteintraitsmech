identifier: InterPro:IPR011033
label: "PRC-barrel-like superfamily"
definition: >-
  The PRC-barrel is an all β-barrel domain found in photosystem reaction centre subunit H of the purple bacteria and RNA metabolism proteins of the RimM group. PRC-barrels are approximately 80 residues long, and found widely represented in bacteria, archaea and plants. This domain is also present at the carboxyl terminus of the pan-bacterial protein RimM, which is involved in ribosomal maturation and processing of 16S rRNA. A family of small proteins conserved in all known euryarchaea are composed entirely of a single stand-alone copy of the domain, which play an essential role in archaeal FtsZ-based cell division. These proteins have been renamed as CdpB1 and CdpB2. This superfamily identifies the PRC-barrel domain and related domains, including the CKK domain, which is found at the C terminus of calmodulin-regulated spectrin-associated (or CAMSAP) proteins.
