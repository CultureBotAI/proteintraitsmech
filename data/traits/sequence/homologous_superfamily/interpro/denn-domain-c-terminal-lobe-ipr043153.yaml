identifier: InterPro:IPR043153
label: "DENN domain, C-terminal lobe"
definition: >-
  This entry represents the C-terminal lobe of the DENN domain, which consists of a 5-stranded β sheet surrounded by helices. It includes DENN domain found in MAP kinases, myotubularin, and DENN-containing proteins from eukaryotic organisms. It also includes the elicitor of plant defence protein 1 found in fungi. The tripartite DENN (Differentially Expressed in Normal and Neoplastic Cells) domain is an evolutionarily conserved protein module found in several proteins involved in Rab-mediated processes and, in some cases, regulation of MAPK (Mitogen-Activated Protein Kinase) signalling pathways and related proteins in eukaryotic organisms. The DENN domain consists of three subdomains: uDENN (upstream DENN) , the core DENN domain , and dDENN (downstream DENN) , which are structurally distinct but functionally interconnected due to their roles in Rab GTPase activation. Recent studies have confirmed the DENN domain's function as a guanine nucleotide exchange factor (GEF) for Rab GTPases, facilitating the exchange of GDP for GTP to activate Rabs. This activity has been demonstrated for various DENN proteins, such as DENND1A and DENND1B, which specifically activate Rab35, and DENND2B, which serves as a GEF for Rab10 and Rab13, influencing processes like primary ciliogenesis and epithelial cancer development. The tripartite structure of the DENN domain, comprising uDENN, DENN itself, and dDENN, features distinct patterns of sequence conservation and variable interdomain lengths that suggest functional specialisation. Structural studies have revealed conserved residues critical for Rab binding and catalytic activity, emphasising the role of DENN domains in spatially and temporally regulating membrane trafficking events. Additionally, DENN domains are often associated with other…
