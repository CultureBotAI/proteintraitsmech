identifier: InterPro:IPR038347
label: "TyeA superfamily"
definition: >-
  This superfamily represents the Type III secretion system effector delivery regulator TyeA domain. This domain is composed of two pairs of parallel α-helices, and interacts with the bacterial protein YopN via hydrophobic residues located on the helices. Association of TyeA with the C terminus of YopN is accompanied by conformational changes in both polypeptides that create order out of disorder: the resulting structure then serves as an impediment to type III secretion of YopN.
