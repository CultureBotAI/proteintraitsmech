identifier: InterPro:IPR023101
label: "AF1862-like domain superfamily"
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This superfamily represents the structural domain found in a family of Cas proteins as represented by TM1791.1 from Thermotoga maritima and AF1862 from Archaeoglobus fulgidus. This family of Cas proteins are found in both archaeal and bacterial species.
