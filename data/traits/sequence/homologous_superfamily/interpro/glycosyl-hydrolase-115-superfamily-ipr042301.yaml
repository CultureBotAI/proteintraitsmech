identifier: InterPro:IPR042301
label: "Glycosyl hydrolase 115 superfamily"
definition: >-
  Glycosyl hydrolase family 115 (GH115) members are alpha-glucuronidases that catalyses the cleavage of 4-O-methyl D-glucuronic acid side chains from native xylan polysaccharides ( ). Family GH115 appears to be restricted to Archaea, Bacteria, and Fungi. This entry includes Schizophyllum commune Agu1 protein ( ) and SpGlcA115A ( ) from Streptomyces pristinaespiralis. Structurally, this domain superfamily consists of 8 β strands and 8 α helices arranged into a TIM barrel. Within GH115, this particular superfamily functions as a catalytic domain.
