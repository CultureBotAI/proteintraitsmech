identifier: InterPro:IPR053727
label: "HPA decarboxylase small subunit superfamily"
definition: >-
  This superfamily of proteins is involved in the enzymatic decarboxylation of phenylacetates, particularly those with a hydroxyl group in the para position. The proteins function as components of a larger enzymatic complex known as HPA decarboxylase, which plays a crucial role in the catabolism of aromatic amino acids, such as tyrosine. The enzymatic activity results in the formation of metabolites like 4-methylphenol and 4-methylcatechol, which confer metabolic toxicity and can suppress competing microbes. This activity may provide a competitive advantage to the producing organisms in their respective ecological niches. The small subunit of the proteins within this superfamily is essential for the catalytic function of the HPA decarboxylase complex and is also implicated in regulating the complex's oligomeric state and overall catalytic activity.
