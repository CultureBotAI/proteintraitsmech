identifier: InterPro:IPR024077
label: "Neurolysin/Thimet oligopeptidase, domain 2"
definition: >-
  Thimet oligopeptidase and neurolysin are closely related zinc-dependent metallopeptidases that metabolize small bioactive peptides. They cleave many substrates at the same sites, but they recognise different positions on others. This entry represents an α orthogonal bundle domain found in these and related peptidases.
