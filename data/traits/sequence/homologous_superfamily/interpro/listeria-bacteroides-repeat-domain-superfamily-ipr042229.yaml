identifier: InterPro:IPR042229
label: "Listeria-Bacteroides repeat domain superfamily"
definition: >-
  This superfamily represents a conserved core region of about 43 residues, which occurs in at least two families of tandem repeats. These include 78-residue repeats which occur from 2 to 15 times in some proteins of Tannerella forsythensis ATCC 43037, and 70-residue repeats found in families of internalins of Listeria species. Single copies are found in proteins of Fibrobacter succinogenes, Geobacter sulfurreducens, and a few other bacteria.
