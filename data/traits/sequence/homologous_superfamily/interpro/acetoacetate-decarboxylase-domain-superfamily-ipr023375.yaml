identifier: InterPro:IPR023375
label: "Acetoacetate decarboxylase domain superfamily"
definition: >-
  Acetoacetate decarboxylase (ADC) is involved in solventogenesis in certain bacteria, which occurs at the end of the exponential growth phase when there is a metabolic switch from classical sugar fermentation with the production of acetate and butyrate to the re-internalisation and oxidation of these acids to acetate and butanol. In Clostridium, Spo0A controls the switch from acid to solvent production. A Spo0A-binding motif occurs in the gene encoding ADC. This superfamily represents the β-barrel structural domain found in acetoacetate decarboxylases.
