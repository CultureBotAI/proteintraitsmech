identifier: InterPro:IPR011015
label: "LEM/LEM-like domain superfamily"
definition: >-
  The LEM domain is a ~40-residue motif found in nuclear membrane-associated proteins, including lamino-associated polypeptide 2 (LAP2), emerin, MAN1, otefin and Lem-3. Defects in the emerin gene are a cause of Emery-Dreifuss muscular dystrophy, an X-linked disorder characterised by early contractures, muscle wasting, weakness and cardiomyopathy. The N-terminal LEM domain in emerin mediates binding to BAF (barrier-to-autointegration factor). All LAP2 isoforms also share an N-terminal segment composed of a LEM domain that is connected to a highly divergent LEM-like domain by a highly flexible 60-residue linker. The LEM-like globular domain has the same size and structural fold as the LEM domain, but has been shown to bind directly to DNA.
