identifier: InterPro:IPR008999
label: Actin-crosslinking
definition: >-
  This superfamily represents an actin-crosslinking domain with a β-trefoil structure, consisting of a triplet of β-hairpins packed against a six-stranded antiparallel β-barrel. Proteins containing this domain include fascin, which carries a tandem repeat of four copies of this domain, and the histidine-rich actin-binding protein hisactophilin. Actin-crosslinking proteins organise actin filaments into dynamic and complex subcellular scaffolds that orchestrate important mechanical functions, including cell motility and adhesion. The fascins are a structurally unique and evolutionarily conserved group of actin cross-linking proteins. Fascins function in the organisation of two major forms of actin-based structures: dynamic, cortical cell protrusions and cytoplasmic microfilament bundles. A related protein, hisactophilin, is an essential protein for the osmoprotection of dictyostelium cells.
