identifier: InterPro:IPR027438
label: "Ecotin, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain of ecotin, a general inhibitor of pancreatic serine proteases. Proteins containing this domain include members from the protease inhibitor I11 (ecotin) family. Ecotins are dimeric periplasmic proteins from Escherichia coli and related Gram-negative bacteria that have been shown to be potent inhibitors of many trypsin-fold serine proteases of widely varying substrate specificity, which belong to MEROPS peptidase family S1 ( ). Phylogenetic analysis suggested that ecotin has an exogenous target, possibly neutrophil elastase. Ecotin from E. coli, Yersinia pestis, and Pseudomonas aeruginosa, all species that encounter the mammalian immune system inhibit neutrophil elastase strongly while ecotin from the plant pathogen Pantoea citrea inhibits neutrophil elastase 1000-fold less than the others.
