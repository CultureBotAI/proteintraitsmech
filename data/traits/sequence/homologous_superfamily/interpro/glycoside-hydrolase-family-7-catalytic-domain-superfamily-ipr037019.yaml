identifier: InterPro:IPR037019
label: Glycoside hydrolase family 7, catalytic domain superfamily
definition: >-
  This entry represents the catalytic core domain of glycosyl hydrolase family 7 enzymes. Glycoside hydrolase family 7 comprises enzymes with several known activities; endoglucanase ( ) and cellobiohydrolase ( ). These enzymes were formerly known as cellulase family C. Exoglucanases and cellobiohydrolases play a role in the conversion of cellulose to glucose by cutting the dissaccharide cellobiose from the nonreducing end of the cellulose polymer chain. Structurally, cellulases and xylanases generally consist of a catalytic domain joined to a cellulose-binding domain (CBD) via a linker region that is rich in proline and/or hydroxy-amino acids. In type I exoglucanases, the CBD domain is found at the C-terminal extremity of these enzyme (this short domain forms a hairpin loop structure stabilised by 2 disulphide bridges). O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
