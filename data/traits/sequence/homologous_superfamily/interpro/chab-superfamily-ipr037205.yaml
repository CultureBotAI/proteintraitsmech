identifier: InterPro:IPR037205
label: "ChaB superfamily"
definition: >-
  This superfamily of proteins contain a conserved 60 residue region. This protein is known as ChaB in Escherichia coli and is found next to ChaA, which is a cation transporter protein. ChaB may regulate ChaA function in some way. Structurally, ChaB consists of three helices, where the first one is shorter than the other two. It has a bundle fold, capped by a small C-terminal β-hairpin.
