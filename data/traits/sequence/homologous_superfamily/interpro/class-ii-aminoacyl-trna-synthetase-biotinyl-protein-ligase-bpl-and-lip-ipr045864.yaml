identifier: InterPro:IPR045864
label: "Class II Aminoacyl-tRNA synthetase/Biotinyl protein ligase (BPL) and lipoyl protein ligase (LPL)"
definition: >-
  This superfamily represents the fold comprising the seven β-strands found in the catalytic domain of Class II of aminoacyl-tRNA synthetases (aaRS), the lipoyl protein ligase (LPL) and the biotinyl protein ligase (BPL), which structurally homologous. Interestingly, Class II of aaRSs has a two-step reaction mechanism analogous to that of BPL. It first catalyses the ATP-dependent formation of an aminoacyl-AMP intermediate and then transfer the activated aminoacyl moiety to an acceptor tRNA. The aminoacyl-tRNA synthetases (also known as aminoacyl-tRNA ligases) catalyse the attachment of an amino acid to its cognate transfer RNA molecule in a highly specific two-step reaction. These proteins differ widely in size and oligomeric state, and have limited sequence homology. The 20 aminoacyl-tRNA synthetases are divided into two classes, I and II. Class I aminoacyl-tRNA synthetases contain a characteristic Rossman fold catalytic domain and are mostly monomeric. Class II aminoacyl-tRNA synthetases share an antiparallel β-sheet fold flanked by α-helices, and are mostly dimeric or multimeric, containing at least three conserved regions. However, tRNA binding involves an α-helical structure that is conserved between class I and class II synthetases. In reactions catalysed by the class I aminoacyl-tRNA synthetases, the aminoacyl group is coupled to the 2'-hydroxyl of the tRNA, while, in class II reactions, the 3'-hydroxyl site is preferred. The synthetases specific for arginine, cysteine, glutamic acid, glutamine, isoleucine, leucine, methionine, tyrosine, tryptophan, valine, and some lysine synthetases (non-eukaryotic group) belong to class I synthetases. The synthetases specific for alanine, asparagine, aspartic acid, glycine, histidine, phenylalanine, proline, serine, threonine, a…
