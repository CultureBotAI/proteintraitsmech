identifier: InterPro:IPR036914
label: "Methylglyoxal synthase-like domain superfamily"
definition: >-
  This domain superfamily composes the whole protein of methylglyoxal synthetase and the domain is also found in carbamoyl phosphate synthetase (CPS) where it forms a regulatory domain that binds to the allosteric effector ornithine. The known structures in this domain show a common phosphate binding site and are composed of three layers (α/β/α) with parallel β-sheet of five strands.
