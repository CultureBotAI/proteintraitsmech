identifier: InterPro:IPR038080
label: "Kinase associated protein B superfamily"
definition: >-
  Kinase associated protein B (KapB) is one of the major histidine kinases that provide phosphate input in the phosphorelay to produce SpoOA approximately P, the key transcription factor controlling the initiation of sporulation in Bacillus subtilis. It forms an anti-parallel β sheet with an extending α helical region.
