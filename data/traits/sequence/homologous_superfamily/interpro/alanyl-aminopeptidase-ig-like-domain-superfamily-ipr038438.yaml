identifier: InterPro:IPR038438
label: "Alanyl aminopeptidase, Ig-like domain superfamily"
definition: >-
  This entry represents a conserved domain with an Ig-like fold found in a group of zinc metallopeptidases the belong to MEROPS peptidase family M1 (aminopeptidase N, clan MA); the majority are identified as alanyl aminopeptidases (proteobacteria) that are closely related to E. coli PepN and presumed to have a similar (not identical) function. Nearly all are found in proteobacteria, but members are found also in cyanobacteria, plants, and apicomplexan parasites. This group differs greatly in sequence from the family of aminopeptidases typified by Streptomyces lividans PepN ( ) and from the membrane bound aminopeptidase N family in animals.
