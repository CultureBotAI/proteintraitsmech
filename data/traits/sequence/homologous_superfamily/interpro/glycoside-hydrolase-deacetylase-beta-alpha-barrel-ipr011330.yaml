identifier: InterPro:IPR011330
label: Glycoside hydrolase/deacetylase, beta/alpha-barrel
definition: >-
  This superfamily represents a structural domain found in glycoside hydrolase family 38 ( , e.g. alpha-mannosidase) and 57 ( , e.g. 4-alpha-glucanotransferase, N-terminal), as well as in NodB-like polysaccharide deacetylase and in some hypothetical proteins (e.g. TT1467, N-terminal domain). This domain consists of a 7-stranded β/α barrel, although in some families the β-barrels may be distorted and may vary in the number of strands.
