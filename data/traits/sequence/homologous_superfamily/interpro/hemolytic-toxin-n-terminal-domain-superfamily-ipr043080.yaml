identifier: InterPro:IPR043080
label: "Hemolytic toxin, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal domain found in bacterial virulence factor - hemolysin - which forms pores in erythrocytes and causes them to lyse. Structurally, it consists of 3 α helices and 4 β strands, where 4 strands make up a β sheet, and pack up against the 3 short α helices. Within hemolytic toxin, e.g. cytolysin, this N-terminal domain makes up the 'pro-domain' and is cleaved from the pro-toxin to activate the toxins hemolytic function.
