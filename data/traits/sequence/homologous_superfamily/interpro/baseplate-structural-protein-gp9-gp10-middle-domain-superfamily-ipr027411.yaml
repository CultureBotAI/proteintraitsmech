identifier: InterPro:IPR027411
label: "Baseplate structural protein Gp9/Gp10 middle domain superfamily"
definition: >-
  This superfamily represents the middle domain found in baseplate structural protein Gp9 and Gp10 of bacteriophage T4. The Bacteriophage T4 is a double-stranded, structurally complex virus that infects Escherichia coli. Gene product 9 (Gp9) connects the long tail fibres to the baseplate, and triggers baseplate reorganisation and tail contraction after virus attachment to the host cell. The Gp9 protein forms a homotrimer, with each monomer having three domains: the N-terminal α-helical domain forms a triple coiled coil, the middle domain is a mixed, seven-stranded β sandwich with a unique fold, and the C-terminal domain is a eight-stranded β-sandwich with similarity to jellyroll viral capsid protein structures. The flexible loops that occur between domains may enable the conformational changes necessary during infection. Together with gp11, gp10 initiates the assembly of wedges that then go on to associate with a hub to form the viral baseplate.
