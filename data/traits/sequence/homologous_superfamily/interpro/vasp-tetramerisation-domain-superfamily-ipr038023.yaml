label: "VASP tetramerisation domain superfamily"
definition: >-
  Vasodilator-stimulated phosphoprotein (VASP) is an actin cytoskeletal regulatory protein. This superfamily corresponds to the tetramerisation domain which forms a right handed α helical coiled coil structure.
