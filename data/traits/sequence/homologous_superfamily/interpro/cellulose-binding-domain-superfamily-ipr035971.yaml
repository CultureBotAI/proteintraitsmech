identifier: InterPro:IPR035971
label: Cellulose-binding domain superfamily
definition: >-
  The microbial degradation of cellulose and xylans requires several types of enzymes, such as endoglucanases, cellobiohydrolases (exoglucanases), or xylanases. Structurally, cellulases and xylanases generally consist of a catalytic domain joined to a CBD by a short linker sequence rich in proline and/or hydroxy-amino acids. The CBD of several fungal cellulases has been shown to consist of 36 amino acid residues, and it is found either at the N-terminal or at the C-terminal extremity of the enzymes. As it is shown in the following schematic representation, there are four conserved cysteines in this type of CBD domain, all involved in disulphide bonds. +----------------+ | +-----|---------+ | | | | xxxxxxxCxxxxxxxxxxCxxxxxCxxxxxxxxxCx
