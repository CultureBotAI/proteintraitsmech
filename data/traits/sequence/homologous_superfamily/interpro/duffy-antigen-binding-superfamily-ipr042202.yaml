identifier: InterPro:IPR042202
label: "Duffy-antigen binding superfamily"
definition: >-
  This superfamily represents the duffy-antigen binding domain, found on Plasmodium parasite proteins and which mediate the molecular processes that govern pathogenic features of erythrocyte invasion and cytoadherence in malaria. These are cysteine-rich modules that recognize diverse host cell-surface receptors during pathogenesis. Duffy binding-like (DBL) domain containing proteins constitute potential vaccine candidates. However, a main problem is the variable nature of DBL domain as they present low sequence identity but a conserved molecular architecture. This enables them to maintain ligand binding while evading the immune response and will guide future drug and vaccine development. This is achieved through the presence of polymorphic loops that immediately surround regions of functional importance as these surfaces are accessible to both ligand and immune system. Structural studies on chondroitin sulfate-binding DBL3X domain show the way this is achieved. The sulfate-binding loop is polymorphic and is flexible in the absence of ligand and it cover the partial putative CSA-binding surface underneath, protecting its conserved features from the immune detection. In the presence of a sulfate ion, alone or as part of a polysaccharide, the loop folds completing a positively charged patch that can form electrostatic interactions with other parts of the CSA molecule, generating the binding site.
