identifier: InterPro:IPR027484
label: "Phosphatidylinositol-4-phosphate 5-kinase, N-terminal"
definition: >-
  This superfamily represents the N-terminal domain of the phosphatidylinositol-4-phosphate 5-kinase (PIP5K). It has a 2-layer sandwich structure. PIP5K catalyses the formation of phosphoinositol-4,5-bisphosphate via the phosphorylation of phosphatidylinositol-4-phosphate, a precursor in the phosphinositide signalling pathway.
