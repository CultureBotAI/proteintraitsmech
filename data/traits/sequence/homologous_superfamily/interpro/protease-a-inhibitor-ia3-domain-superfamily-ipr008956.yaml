identifier: InterPro:IPR008956
label: "Protease A inhibitor IA3 domain superfamily"
definition: >-
  This superfamily represents a domain found in N-terminal of IA3 protein (also known as Pai3). The IA3 polypeptide of Saccharomyces cerevisiae (also known as Pai3) is an 8kDa inhibitor of the vacuolar aspartic proteinase (proteinase A or saccharopepsin, MEROPS peptidase family A1). It belongs to MEROPS inhibitor family I34, clan JA. No other aspartic proteinase has been found to be inhibited by IA3, and at least 15 aspartic proteinases related to YprA cleave IA3 as a substrate. Ligand- free IA3 has little intrinsic secondary structure, however, upon contact with proteinase A, residues 2-32 of the inhibitor become ordered and adopt a near perfect α-helical conformation occupying the active site cleft of the enzyme. This potent, specific interaction is directed primarily by hydrophobic interactions made by three key features in the inhibitory sequence.
