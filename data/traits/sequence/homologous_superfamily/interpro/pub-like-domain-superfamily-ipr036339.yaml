identifier: InterPro:IPR036339
label: "PUB-like domain superfamily"
definition: >-
  The PUB (also known as PUG) domain is found in peptide N-glycanase where it functions as a AAA ATPase binding domain. This domain is also found on other proteins linked to the ubiquitin-proteasome system. It has α(2)-β-α(2)-α(2)-α fold. It is composed of a cluster of helices with a small antiparallel β-sheet on one side. It presents topological similarity to the fold of an extended R3H domain.
