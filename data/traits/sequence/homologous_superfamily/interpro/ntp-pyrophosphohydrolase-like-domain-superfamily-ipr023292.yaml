identifier: InterPro:IPR023292
label: "NTP pyrophosphohydrolase-like domain superfamily"
definition: >-
  This superfamily represents a putative pyrophosphohydrolase-like domain. It is a variant of the all-α-helical NTP pyrophosphatase fold family and contains an unusual intertwined swapping of helical segments, resulting in an obligatory dimer that cannot dissociate without unfolding of the monomers. This novel "linked dimer" defines a new subfamily of the α-helical NTP pyrophosphatase fold and is distinct from other previously observed domain-swapped dimers.
