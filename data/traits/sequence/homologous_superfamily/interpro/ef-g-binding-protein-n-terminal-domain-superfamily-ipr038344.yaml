identifier: InterPro:IPR038344
label: "EF-G binding protein, N-terminal domain superfamily"
definition: >-
  This superfamily represents a domain found in the N terminus of the FusB ( ), FusC ( ), and FusD ( ) proteins from Staphylococcus aureus. They are elongation factor G (EF-G) binding proteins that are linked to the fusidic acid (FA) resistance in S. aureus.
