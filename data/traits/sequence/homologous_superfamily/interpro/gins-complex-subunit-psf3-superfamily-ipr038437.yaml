identifier: InterPro:IPR038437
label: "GINS complex, subunit Psf3 superfamily"
definition: >-
  The GINS complex is essential for initiation of DNA replication in Xenopus egg extracts. This 100kDa stable complex includes Sld5, Psf1, Psf2, and Psf3. Homologues of these components are found also in other eukaryotes. This superfamily represents the Psf3 component. This entry also includes DNA replication complex GINS protein Gins23. The CG complex (Cdc45, Gins15 and Gins23) stimulates the helicase activity of the MCM replicative DNA helicase; it copurifies throughout the cell cycle with MCM (as presumably does the CG complex) probably associated with moving replication forks. DNA replication in eukaryotes results from a highly coordinated interaction between proteins, often as part of protein complexes, and the DNA template. One of the key early steps leading to DNA replication is formation of the pre-replication complex, or pre-RC. The pre-RC is formed by the sequential binding of the origin recognition complex (ORC), Cdc6 and Cdt1 proteins, and the MCM complex. Activation of the pre-RC into the initiation complex (IC) is achieved via the action of S-phase kinases, eventually leading to the loading of the replication machinery. A novel replication complex, GINS (for Go, Ichi, Nii, and San; meaning 5-1-2-3 in Japanese, after the four related subunits of the complex Sld5, Psf1, Psf2 and Psf3), has been identified. The GINS complex is conserved in eukaryotic cells and is essential for DNA replication. When the DNA replication fork is opened, GINS is required to maintain the association between the MCM and Cdc45 in the large replicator complex. The GINS complex acts as a replicative helicase that unlocks the double-stranded DNA prior to the moving replication fork. Psf2's expression is up regulated in many diseases, especially tumors, and adversely affects prognosis. E…
