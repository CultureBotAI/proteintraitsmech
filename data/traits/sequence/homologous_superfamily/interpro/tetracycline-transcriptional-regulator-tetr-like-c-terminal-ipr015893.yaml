identifier: InterPro:IPR015893
label: "Tetracycline transcriptional regulator, TetR-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain found in a number of different TetR transcription regulator proteins. TetR regulates the expression of the membrane-associated tetracycline resistance protein, TetA, which exports the tetracycline antibiotic out of the cell before it can attach to the ribosomes and inhibit protein synthesis. TetR blocks transcription from the genes encoding both TetA and TetR in the absence of antibiotic. The C-terminal domain is multi-helical and is interlocked in the homodimer with the helix-turn-helix (HTH) DNA-binding domain. Other members of the TetR family of transcriptional regulators carry this C-terminal domain. These include: QacR from Staphylococcus aureus, a multidrug binding protein that represses transcription of the qacA multidrug transporter gene Ethr, a repressor from Mycobacterium tuberculosis implicated in ethionamide drug resistance RutR (formerly YcdC), a master transcriptional regulator that represses the degradation of pyrimidines and purines from Escherichia coli FadR (formerly YsiA), a transcriptional regulator in fatty acid degradation from Bacillus subtilis This entry also includes Ubiquinone biosynthesis protein COQ9, mitochondrial which has structural homology to members of the TetR family of regulators. In contrast to canonical TFR proteins, COQ9 likely does not retain DNA-binding capabilities. COQ9 is a membrane-associated protein that warps the membrane surface to access and bind aromatic isoprenes with high specificity, including ubiquinone (CoQ) isoprene intermediates and presents them directly to COQ7, therefore facilitating the COQ7-mediated hydroxylase step. The antibiotic tetracycline has a broad spectrum of activity, acting to inhibit bacterial protein synthesis by binding to the 30S ribosomal subunit, w…
