identifier: InterPro:IPR038520
label: "Matrix protein superfamily"
definition: >-
  This entry represents the matrix protein M from negative-strand Bornaviridae viruses (BDV-M). Its most stable oligomeric form is a tetramer, and it lies beneath the viral envelope where it associates with the inner layer of the viral membrane. It bridges the gap between the nucleocapsid and the viral envelope thereby imparting structural integrity and individual form to the virus particle. Borna disease virus (BDV) is a neurotropic enveloped RNA virus causing a noncytolytic, persistent infection of the central nervous system in mammals. The order to which this virus belongs, Mononegavirales, also contains the Ebola, mumps, rabies and measles viruses, amongst other highly infectious agents. Structural studies on this protein have shown that heterologously expressed BDV-M co-purifies with and protects ssRNA oligonucleotides taken up from the expression host. This has revealed the ability of BDV-M to bind RNA and lipid membranes simultaneously, thus expanding the repertoire of M-protein functionalities.
