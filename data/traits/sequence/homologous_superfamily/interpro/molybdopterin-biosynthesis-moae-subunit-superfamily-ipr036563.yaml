identifier: InterPro:IPR036563
label: Molybdopterin biosynthesis MoaE subunit superfamily
definition: >-
  Members of the MoaE family are involved in biosynthesis of the molybdenum cofactor (Moco), an essential cofactor for a diverse group of redox enzymes. Moco biosynthesis is an evolutionarily conserved pathway present in eubacteria, archaea and eukaryotes. Moco contains a tricyclic pyranopterin, termed molybdopterin (MPT), which carries the cis-dithiolene group responsible for molybdenum ligation. This dithiolene group is generated by MPT synthase in the second major step in Moco biosynthesis. MPT synthase is a heterotetramer consisting of two large (MoaE) and two small (MoaD) subunits. Structurally, the MoaE subunit has a β-β-α-β-β-β-α fold and contains a β-hammerhead motif similar to that in barrel-sandwich hybrids.
