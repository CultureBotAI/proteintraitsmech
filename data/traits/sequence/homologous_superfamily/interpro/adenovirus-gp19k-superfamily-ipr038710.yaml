identifier: InterPro:IPR038710
label: "Adenovirus Gp19K superfamily"
definition: >-
  The 19kDa glycoprotein (GpK19) binds the major histocompatibility (MHC) class I antigens in the endoplasmic reticulum (ER). The ER retention signal at the C terminus of Gp19K causes retention of the complex in the ER, preventing lysis of the cell by cytotoxic T-lymphocytes.
