identifier: InterPro:IPR035911
label: "MurE/MurF, N-terminal"
definition: >-
  The MurF protein contains three domains. The N-terminal domain consists of a small α/β fold and contacts the larger central domain across a broad hydrophobic interface. The central domain and the C-terminal domain adopt mononucleotide and dinucleotide (Rossmann) folds, respectively, and are connected by a short linker peptide that is poorly ordered in the crystal. This superfamily represents the N-terminal domain of the MurE/F proteins. They are ligases involved in the formation of UDP-N-acetylmuramyl-pentapeptide and have been considered as antibacterial targets.
