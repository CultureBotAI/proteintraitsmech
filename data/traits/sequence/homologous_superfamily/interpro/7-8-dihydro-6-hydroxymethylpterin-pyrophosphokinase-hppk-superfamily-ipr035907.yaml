identifier: InterPro:IPR035907
label: "7,8-Dihydro-6-hydroxymethylpterin-pyrophosphokinase HPPK superfamily"
definition: >-
  7,8-Dihydro-6-hydroxymethylpterin-pyrophosphokinase ( ) (HPPK) catalyses the attachment of pyrophosphate to 6-hydroxymethyl-7,8-dihydropterin to form 6-hydroxymethyl-7,8-dihydropteridine pyrophosphate. This is the first step in a three-step pathway leading to 7,8 dihydrofolate. Bacterial HPPK (gene folK or sulD) is a protein of 160 to 270 amino acids. In the lower eukaryote Pneumocystis carinii, HPPK is the central domain of a multifunctional folate synthesis enzyme (gene fas). The structure of HPPK consists of an α/β sandwich with antiparallel β sheets.
