identifier: InterPro:IPR024067
label: "Methylmalonyl-CoA mutase small subunit, N-terminal"
definition: >-
  Methylmalonyl-CoA mutase catalyses the isomerization of succinyl-CoA to methylmalonyl-CoA during the synthesis of propionate from tricarboxylic acid-cycle intermediates in propionic acid fermentation. This entry represents the N-terminal portion of the catalytic domain found in methylmalonyl-CoA mutase small subunits.
