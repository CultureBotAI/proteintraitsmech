identifier: InterPro:IPR027469
label: "Cation efflux transmembrane domain superfamily"
definition: >-
  The cation diffusion facilitator family (CDF) have members in both prokaryotes and eukaryotes, several of which have been shown to transport cobalt, cadmium and/or zinc. CDF transporters share a common two-modular architecture, consisting of a transmembrane domain (TMD) followed by a C-terminal domain (CTD) protruding into the cytoplasm. This superfamily represents the CDF N-terminal transmembrane domain.
