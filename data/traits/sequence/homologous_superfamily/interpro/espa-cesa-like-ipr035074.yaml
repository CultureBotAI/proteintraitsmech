identifier: InterPro:IPR035074
label: EspA/CesA-like
definition: >-
  EspA, together with EspB, EspD and Tir are exported by a type III secretion system. These proteins are essential for attaching and effacing lesion formation. EspA is a structural protein and a major component of a large, transiently expressed, filamentous surface organelle which forms a direct link between the bacterium and the host cell. CesA acts as a chaperone of secreted protein EspA, trapping EspA in a monomeric state and inhibiting its polymerization. Both adopt similar substructures in the heterodimer. CesA adopts an extended all-helical topology with an overall hairpin shape. EspA contains two long α-helices, which are involved in extensive coiled-coil interactions with CesA.
