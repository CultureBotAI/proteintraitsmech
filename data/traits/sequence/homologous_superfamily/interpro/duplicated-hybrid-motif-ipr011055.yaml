identifier: InterPro:IPR011055
label: "Duplicated hybrid motif"
definition: >-
  The duplicated hybrid motif is a structural motif that is found in certain glucose-permease-like enzymes and consists of a half-barrel β-sheet of eight strands that is sandwiched with two 3-stranded β-sheets. Enzymes displaying this motif include domain IIa of the glucose-specific permease from bacteria ( ) ( ), which is part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS), a bacterial and mycoplasma system responsible for the uptake of some sugars and their concomitant phosphorylation. This structural motif is also found in peptidoglycan hydrolase LytM in Staphylococcus aureus , a member of peptidase family M23, although it contains an extra N-terminal, non-conserved β-sheet subdomain.
