identifier: InterPro:IPR036632
label: Scaffold protein D superfamily
definition: >-
  The assembly of a macromolecular structure proceeds via a specific pathway of ordered events and occurs by changing of protein conformations as they join the assembly. The assembly process is aided by scaffolding proteins, which act as chaperones. In bacteriophages, scaffolding proteins B and D are responsible for procapsid formation. Copies of protein D (240) form the external scaffold, while 60 copies of protein B form the internal scaffold. The structure of the scaffolding protein gpD is composed of six helices where one central helix is surrounded by 5 others.
