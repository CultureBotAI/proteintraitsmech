identifier: InterPro:IPR038529
label: "FPRL1/chemotaxis inhibitory protein superfamily"
definition: >-
  Formyl Peptide Receptor-Like 1 (FPRL1)-inhibitory protein (also termed FLIPr) has been shown to inhibit calcium mobilisation in neutrophils. There is evidence that FLIPr binds to FPRL1 and, at higher concentrations, to FPR, impairing the leukocyte response to FPRL1 agonists. It has revealed unknown inflammatory ligands during S.aureus infection and, as an FPRL1 antagonist, may facilitate development of therapeutic agents in FPRL1-mediated inflammatory diseases. Chemotaxis inhibitory protein (also knows as CHIPS) is a Staphylococcus aureus-secreted virulence factor that impairs the response of neutrophils and monocytes to FPR and C5a. CHIPS has been shown to reduce neutrophil recruitment toward C5a in mouse models (its activity is more potent on human than on mouse cells). As such, its properties may make it a candidate new anti-inflammatory therapeutic compound. CHIPS also plays an key role in bacterial invasion, by inhibiting FMLP- and C5a-induced calcium moblisation. By influencing 2 related receptors with very different ligand specificities (C5aR and FPR), the protein has a unique role; nevertheless, neither the manner in which it binds such structurally different molecules nor how its expression is regulated are currently unknown. The structure of a CHIPS fragment (residues 31-121) has been solved by NMR spectroscopy. This fragment has the same activity in blocking the C5aR relative to full-length CHIPS, but lacks FPR antagonism. The protein has a compact fold comprising 2 short α-helices packed onto a 4-stranded anti-parallel β-sheet: strands-2 and -3 are joined by a loop with a well-defined conformation. The protein shares a high degree of structural similarity with a number of proteins, including the C-terminal domain of staphylococcal superantigen-like proteins…
