identifier: InterPro:IPR008980
label: Viral capsid/haemagglutinin protein
definition: >-
  Representatives of this viral protein domain are found in the vp7 capsid protein of Bluetongue virus, and African horsesickness virus, the vp6 capsid protein of Bovine rotavirus, and in the haemagglutinin protein of various influenza viruses. The vp7 and vp6 capsid proteins each consist of two domains, one a β sandwich, and the other an α helical bundle. The β sandwich domain described here is structurally very similar in vp6 and vp7, and may be involved in the attachment of the virus to the cell. In influenza A and B viruses, the haemagglutinin membrane glycoprotein serves to recognise the cell surface receptor sialic acid, and this domain forms the head region. In influenza C virus, a single multifunctional glycoprotein, the haemagglutinin-esterase-fusion protein, possesses a haemagglutinin domain, which recognises the cell surface receptor 9-O-acetylsialic acid, and bears strong structural resemblance to the haemagglutinin protein of influenza A and B viruses, as well as to the vp6 and vp7 capsid proteins. In each case, the domain consists of a β-sandwich, in which the strands making up the sheets exhibit a jellyroll fold. The resultant proteins form trimers.
