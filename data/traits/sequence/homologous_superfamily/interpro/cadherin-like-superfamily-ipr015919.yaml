identifier: InterPro:IPR015919
label: Cadherin-like superfamily
definition: >-
  This entry represents domains with an immunoglobulin-like β-sandwich fold, consisting of 7 strands in two sheets with a Greek key topology. Such domains are found in cadherin, as well as at the N-terminal of dystroglycan. Dystroglycan is a cell surface receptor consisting of two subunits: alpha-dystroglycan, extracellular and highly glycosylated, and beta-dystroglycan, spanning the cell membrane. It is a pivotal member of the dystrophin-glycoprotein complex and is involved in a wide variety of important cellular processes such as the stabilisation of the muscle fibre sarcolemma or the clustering of acetylcholine receptors. Cadherins are a family of adhesion molecules that mediate Ca2+-dependent cell-cell adhesion in all solid tissues of the organism which modulate a wide variety of processes including cell polarisation and migration. Cadherin-mediated cell-cell junctions are formed as a result of interaction between extracellular domains of identical cadherins, which are located on the membranes of the neighbouring cells. The stability of these adhesive junctions is ensured by binding of the intracellular cadherin domain with the actin cytoskeleton. There are a number of different isoforms distributed in a tissue-specific manner in a wide variety of organisms. Cells containing different cadherins tend to segregate in vitro, while those that contain the same cadherins tend to preferentially aggregate together. This observation is linked to the finding that cadherin expression causes morphological changes involving the positional segregation of cells into layers, suggesting they may play an important role in the sorting of different cell types during morphogenesis, histogenesis and regeneration. They may also be involved in the regulation of tight and gap junctions, and…
