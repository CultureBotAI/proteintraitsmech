identifier: InterPro:IPR043064
label: "Long-chain fatty acyl-CoA thioesterase, Rv0098-like superfamily"
definition: >-
  This superfamily represents a domain with a hot-dog fold. The structure of Rv0098 from M. tuberculosis suggested a thioesterase function. Assays showed that this protein was a thioesterase with a preference for long chain fatty acyl groups. The maximal Kcat was observed for palmitoyl-CoA, although longer and shorter molecules were also cleaved. In solution this protein forms a homo-hexameric complex. The M. tuberculosis FcoT protomer has an alpha/beta "hot dog" fold, in which an antiparallel β sheet (B1-B6), referred to in the literature as the "bun," wraps around a six-turn α helix (H3) typically called the "sausage." Three short α helices (H1, H2, and H4) cover the open side of the "bun". This "hot dog" topology is common for dehydratases and thioesterases.
