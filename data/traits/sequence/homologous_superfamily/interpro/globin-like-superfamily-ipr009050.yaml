identifier: InterPro:IPR009050
label: "Globin-like superfamily"
definition: >-
  This superfamily represents proteins with a globin-like fold consisting of six helices in a partly opened, folded leaf topology, as well as the truncated globins that lack the initial helix. This includes both the globins themselves, and the phycocyanin-like phycobilisome proteins (phycocyanin, allophycocyanin, phycoerythrin and phycoerythrocyanin). Phycobilisome proteins are oligomers of two different types of globin-like subunits that contain two extra helices at the N terminus, and which are use to bind a bilin chromophore. They occur in red algae and cyanobacteria, where they are used for light-harvesting. Globins are haem-containing proteins involved in binding and/or transporting oxygen. They belong to a very large and well studied family that is widely distributed in many organisms. Globins have evolved from a common ancestor and can be divided into three groups: single-domain globins, and two types of chimeric globins, flavohaemoglobins and globin-coupled sensors. Bacteria have all three types of globins, while archaea lack flavohaemoglobins, and eukaryotes lack globin-coupled sensors. Several functionally different haemoglobins can coexist in the same species. The major types of globins include: Haemoglobin (Hb): tetramer of two alpha and two beta chains, although embryonic and foetal forms can substitute the alpha or beta chain for ones with higher oxygen affinity, such as gamma, delta, epsilon or zeta chains. Hb transports oxygen from lungs to other tissues in vertebrates. Hb proteins are also present in unicellular organisms where they act as enzymes or sensors. Myoglobin (Mb): monomeric protein responsible for oxygen storage in vertebrate muscle. Neuroglobin: a myoglobin-like haemprotein expressed in vertebrate brain and retina, where it is involved in neu…
