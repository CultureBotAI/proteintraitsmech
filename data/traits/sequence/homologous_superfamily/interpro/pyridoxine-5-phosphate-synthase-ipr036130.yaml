identifier: InterPro:IPR036130
label: Pyridoxine 5'-phosphate synthase
definition: >-
  Pyridoxal phosphate is the active form of vitamin B6 (pyridoxine or pyridoxal). Pyridoxal 5'-phosphate (PLP) is a versatile catalyst, acting as a coenzyme in a multitude of reactions, including decarboxylation, deamination and transamination. PLP-dependent enzymes are primarily involved in the biosynthesis of amino acids and amino acid-derived metabolites, but they are also found in the biosynthetic pathways of amino sugars and in the synthesis or catabolism of neurotransmitters; pyridoxal phosphate can also inhibit DNA polymerases and several steroid receptors. Inadequate levels of pyridoxal phosphate in the brain can cause neurological dysfunction, particularly epilepsy. PLP enzymes exist in their resting state as a Schiff base, the aldehyde group of PLP forming a linkage with the ε-amino group of an active site lysine residue on the enzyme. The α-amino group of the substrate displaces the lysine ε-amino group, in the process forming a new aldimine with the substrate. This aldimine is the common central intermediate for all PLP-catalysed reactions, enzymatic and non-enzymatic. In Escherichia coli, the pdx genes involved in vitamin B6 have been characterised. This entry represents PdxJ (also called PNP synthase), which catalyses the condensation of 4-hydroxy-L-threonine and 1-deoxy-D-xylulose-5-phosphate to form pyridoxine-5'-phosphate (PNP). The product of the PdxJ reaction is then oxidized by PdxH to form pyridoxal 5'-phosphate (PLP). PNP synthase (PdxJ) adopts a TIM barrel topology. Intersubunit contacts are mediated by three ''extra'' helices, generating a tetramer of symmetric dimers with shared active sites. The open state has been proposed to accept substrates and to release products, while most of the catalytic events are likely to occur in the closed state. A…
