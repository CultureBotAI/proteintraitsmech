identifier: InterPro:IPR011039
label: Transcription Factor IIF, Rap30/Rap74, interaction
definition: >-
  Transcription factor IIF (TFIIF), which is essential for eukaryotic transcription by RNA polymerase II. (PolII), consists of a heterodimer of Rap30 (beta) ( ) and Rap74 (alpha) ( ) subunits. Rap30 and Rap74 have multiple domains that bind to PolII, TFIIB, TAF250 and DNA in interactions that are essential for transcription initiation and elongation. The N-terminal interactions domains of Rap30 and Rap74 are responsible for establishing the dimer interface between the two subunits, this interface being important for TFIIF function.
