identifier: InterPro:IPR036510
label: Small ribosomal subunit protein bS20 superfamily
definition: >-
  This superfamily consists of bacterial (and chloroplast) examples of the ribosomal small subunit protein bS20. Bacterial ribosomal protein bS20 forms part of the 30S ribosomal subunit, and interacts with 16S rRNA. Structurally, the ribosomal protein bS20 has a spectrin repeat-like fold, which consists of three helices, a close bundle fold and left-handed twist going up-and-down.
