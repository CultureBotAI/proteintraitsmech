identifier: InterPro:IPR038214
label: "WPP domain superfamily"
definition: >-
  The WPP domain is thought to be exclusively found in plants. The WPP stands for a tryptophan-proline-proline motif that is highly conserved in the domain. The WPP domain is known to direct RanGAP (Ran GTPase-activating protein) to the nuclear envelope. RanGAP is an accessory protein for the small signaling GTPase Ran, which is involved in nucleocytoplasmic transport. Non-RanGAP nuclear envelope proteins are also known to encode WPP domains, such as MFP1 attachment factor 1 (MAF1), WPP1 and WPP2.
