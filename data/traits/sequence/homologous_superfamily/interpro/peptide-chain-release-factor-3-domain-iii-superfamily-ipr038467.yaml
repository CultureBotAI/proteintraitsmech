identifier: InterPro:IPR038467
label: "Peptide chain release factor 3, domain III superfamily"
definition: >-
  This entry represents the C-terminal domain (domain III) of peptide chain release factor 3 (RF3), a bacterial class 2 release factor. TRF3 is believed to have a role in dissociating the class 1 release factors from the ribosome following termination.
