identifier: InterPro:IPR042035
label: "DEAH helicase, winged-helix domain"
definition: >-
  The DEAH/RNA helicase A (RHA) helicase family comprises proteins involved in splicing, ribosome biogenesis and transcription regulation. Structurally, the domain represented by this superfamily contains a winged-helix with a weakly defined β-sheet.
