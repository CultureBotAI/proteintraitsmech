identifier: InterPro:IPR038552
label: "Tim21 IMS domain superfamily"
definition: >-
  Tim21 is an essential component of the TIM23 complex, which mediates the translocation of transit peptide-containing proteins across the mitochondrial inner membrane. Tim21 is required to keep the TOM and the TIM23 complexes in close contact. At some point, it is released from the TOM23 complex to allow protein translocation into the mitochondrial matrix. Tim21 consists of a single transmembrane segment in the inner membrane, and a large intermembrane space (IMS) domain that has been shown to bind to the IMS domain of the outer membrane of the Tom22 receptor. The binding domain of Tim21 consists of a novel mixed α/β fold.
