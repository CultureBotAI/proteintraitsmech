identifier: InterPro:IPR036366
label: "PGBD superfamily"
definition: >-
  This superfamily represents peptidoglycan binding domain (PGBD). PGBD may have a general peptidoglycan binding function. It has a core structure consisting of a closed, three-helical bundle with a left-handed twist. It is found at the N or C terminus of a variety of enzymes involved in bacterial cell wall degradation. Examples are: Muramoyl-pentapeptide carboxypeptidase ( ) N-acetylmuramoyl-L-alanine amidase cwlA precursor (cell wall hydrolase, autolysin, ) Autolytic lysozyme (1,4-beta-N-acetylmuramidase, autolysin, ) Membrane-bound lytic murein transglycosylase B Zinc-containing D-alanyl-D-alanine-cleaving carboxypeptidase, VanX.
