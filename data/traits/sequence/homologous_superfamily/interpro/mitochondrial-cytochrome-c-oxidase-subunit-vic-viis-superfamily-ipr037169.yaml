identifier: InterPro:IPR037169
label: "Mitochondrial cytochrome c oxidase subunit VIc/VIIs superfamily"
definition: >-
  Cytochrome c oxidase (CcO; ), a 13 subunit complex, is the terminal oxidase in the mitochondrial electron transport chain. This entry contains of cytochrome c oxidase subunit VIc superfamily, which is found only in eukaryotes and its specific function remains unclear. It has been reported that the relative concentrations of some nuclear encoded CcO subunits, including subunit VIc, compared to those of the mitochondrial encoded subunits, are altered significantly during the progression of prostate cancer. This entry also includes Dictyostelium cytochrome c oxidase VIIs superfamily, an alternative subunit VII isoform produced under hypoxia.
