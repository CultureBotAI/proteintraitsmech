identifier: InterPro:IPR009015
label: L-fucose isomerase, N-terminal/central domain superfamily
definition: >-
  L-fucose isomerase ( ) converts the aldose L-fucose into the corresponding ketose L-fuculose during the first step in fucose metabolism using Mn2+ as a cofactor. The enzyme is a hexamer, forming the largest structurally known ketol isomerase, and has no sequence or structural similarity with other ketol isomerases. L-fucose isomerase is composed of three domains, the N-terminal, central and C-terminal domains. The N-terminal and central domains have a similar topology, consisting of three layers (α/β/α) each. The N-terminal domain has a parallel β-sheet of five strands in the order S2, S1, S3, S4, S5, while the central domain has a parallel β-sheet of four strands in the order S2, S1, S3, S4.
