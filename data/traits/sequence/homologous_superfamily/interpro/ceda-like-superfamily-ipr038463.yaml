identifier: InterPro:IPR038463
label: "CedA-like superfamily"
definition: >-
  CedA is involved in the regulation of cell division in Escherichia coli and related organisms. It is structurally similar to dsDNA-binding domains and has been found to interact with dsDNA. The protein comprises four antiparallel β-strands, an α-helix, and a large unstructured N terminus. As dsDNA binding domains, it may also bind dsDNA by inserting the β-sheet into the major groove of the DNA.
