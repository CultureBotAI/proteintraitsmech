identifier: InterPro:IPR023153
label: "Dual-action ribosomal maturation protein DarP superfamily"
definition: >-
  This superfamily includes Dual-action ribosomal maturation protein DarP from Pseudomonas syringae and similar sequences from bacteria and some plant species. DarP is a member of a network of 50S ribosomal subunit biogenesis factors which assembles along the 30S-50S interface, preventing incorrect 23S rRNA structures from forming. It adopts an all-α configuration.
