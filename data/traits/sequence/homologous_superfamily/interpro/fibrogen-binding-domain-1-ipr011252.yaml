identifier: InterPro:IPR011252
label: Fibrogen-binding domain 1
definition: >-
  This superfamily represents fibrinogen-binding domain 1. In proteins such as fibrinogen-binding adhesion SdrG and clumping factor A, there are two fibrinogen-binding domains with similar core β-sandwich topologies, but with different modulations in their structure. This entry represents the first domain, while represents the second domain.
