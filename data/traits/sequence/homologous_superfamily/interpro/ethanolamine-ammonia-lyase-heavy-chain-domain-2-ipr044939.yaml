identifier: InterPro:IPR044939
label: "Ethanolamine ammonia-lyase heavy chain, domain 2"
definition: >-
  This superfamily represents an α-helical N-terminal subdomain found in several bacterial ethanolamine ammonia-lyase heavy chain (EutB) (also known as ethanolamine ammonia lyase large subunit and ethanolamine ammonia-lyase alpha subunit) proteins. Ethanolamine ammonia-lyase is a bacterial enzyme that catalyses the adenosylcobalamin-dependent conversion of certain vicinal amino alcohols to oxo compounds and ammonia. The enzyme consists of EutB and EutC (beta-subunit) subunits which form a trimer composed of the (α-β)2 dimer.
