identifier: InterPro:IPR023107
label: "Atu2299-like domain superfamily"
definition: >-
  This superfamily represents a domain found in a family of protein of approx. 100 residues. The proteins contain up to five α helices and up to seven β strands and are probably monomeric. Their function is unknown.
