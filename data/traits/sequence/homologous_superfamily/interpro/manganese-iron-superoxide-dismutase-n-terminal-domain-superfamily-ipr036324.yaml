identifier: InterPro:IPR036324
label: "Manganese/iron superoxide dismutase, N-terminal domain superfamily"
definition: >-
  Superoxide dismutases (SODs) ( ) catalyse the conversion of superoxide radicals to molecular oxygen. Their function is to destroy the radicals that are normally produced within cells and are toxic to biological systems. Three evolutionarily distinct families of SODs are known, of which the Mn/Fe-binding family is one. This family includes both single metal-binding SODs and cambialistic SOD, which can bind either Mn or Fe. Fe/MnSODs are ubiquitous enzymes that are responsible for the majority of SOD activity in prokaryotes, fungi, blue-green algae and mitochondria. Fe/MnSODs are found as homodimers or homotetramers. The structure of Fe/MnSODs can be divided into two domains, an N-terminal domain with an α-fold and α C-terminal domain with an α/β fold, connected by a loop. The structure of the N-terminal domain consists of a two helices in an antiparallel hairpin, with a left-handed twist. The structure of the C-terminal domain is of the α/β type, and consists of a three-stranded antiparallel β-sheet in the order 213, along with four helices in the arrangement α/β2/α/β/α2. This superfamily describes the N-terminal domain of manganese/iron superoxide dismutase.
