identifier: InterPro:IPR016185
label: "Pre-ATP-grasp domain superfamily"
definition: >-
  The pre-ATP-grasp domain is a structural component found in many ATP-grasp enzymes. It is an N-terminal domain that precedes the core ATP-grasp fold in these proteins. While not directly involved in ATP binding, the pre-ATP-grasp domain likely plays a role in substrate recognition and binding, contributing to the overall catalytic function of the enzymes. The ATP-grasp fold is one of several distinct ATP-binding folds, and is found in enzymes that catalyse the formation of amide bonds, catalysing the ATP-dependent ligation of a carboxylate-containing molecule to an amino or thiol group-containing molecule. This fold is found in many different enzyme families, including various peptide synthetases, biotin carboxylase, synapsin, succinyl-CoA synthetase, pyruvate phosphate dikinase, and glutathione synthetase, glutathionylspermidine synthase, amongst others. These enzymes contribute predominantly to macromolecular synthesis, using ATP-hydrolysis to activate their substrates.
