identifier: InterPro:IPR037054
label: Alpha-glucuronidase, C-terminal domain superfamily
definition: >-
  Alpha-glucuronidases, components of an ensemble of enzymes central to the recycling of photosynthetic biomass, remove the alpha-1,2 linked 4-O-methyl glucuronic acid from xylans. This entry represents the C-terminal domain superfamily of alpha-glucuronidase, which is mainly α-helical. It wraps around the catalytic domain ( ), making additional interactions both with the N-terminal domain ( ) of its parent monomer and also forming the majority of the dimer-surface with the equivalent C-terminal domain of the other monomer of the dimer.
