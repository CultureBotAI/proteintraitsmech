identifier: InterPro:IPR026939
label: "ZNF706-like superfamily"
definition: >-
  This entry includes Transcriptional regulator ZNF706 from animals, Transcriptional regulator Simba1 and 2 from Drosophila and uncharacterised protein At2g23090 from Arabidopsis. These proteins contain a C-terminal zinc-binding domain and a SERF-like N-terminal domain .
