identifier: InterPro:IPR042283
label: "GpdQ, catalytic alpha/beta sandwich domain"
definition: >-
  Glycerophosphodiesterase (GDPD) from Enterobacter aerogenes, GpdQ, is a promiscuous binuclear metallohydrolase that belongs to a diverse family of metallo-phosphoesterases. It plays a role in catalysing the hydrolysis of mono-, di- and triester substrates, including some organophosphate pesticides and products of the degradation of nerve agents. This superfamily describes the catalytic α/β sandwich domain, which consists of two facing β-sheets, surrounded by α-helices. The entry also contains the final helix of the domain swapped extension, which forms a 'cap' at the α/β sandwich sub-domain, which significantly narrows the entrance to the active site cavity.
