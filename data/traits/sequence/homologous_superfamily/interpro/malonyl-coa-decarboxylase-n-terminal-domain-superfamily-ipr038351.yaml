identifier: InterPro:IPR038351
label: "Malonyl-CoA decarboxylase, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal helical domain of Malonyl-CoA decarboxylase, involved in oligomerization. Malonyl-CoA, in addition to being an intermediate in the de novo synthesis of fatty acids, is an inhibitor of carnitine palmitoyltransferase I, the enzyme that regulates the transfer of long-chain fatty acyl-CoA into mitochondria, where they are oxidised. After exercise, malonyl-CoA decarboxylase participates with acetyl-CoA carboxylase in regulating the concentration of malonyl-CoA in liver and adipose tissue, as well as in muscle. Malonyl-CoA decarboxylase is regulated by AMP-activated protein kinase (AMPK).
