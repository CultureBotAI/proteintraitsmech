identifier: InterPro:IPR016056
label: "Pheromone Er-23, protozoan"
definition: >-
  Protozoan pheromones are cell-type specific protein signals. This entry represents the mating ciliate pheromone (or gamone) Er-23 from the protozoan Euplotes raikovi. Er-23 is a diffusible extracellular communication signal that distinguishes different intra-specific classes of cells commonly referred to as 'mating types'. Er-23 prepares these cells for conjugation by changing its cell surface properties. The mitogenic activity induced by the Er pheromone autocrine signalling can be inhibited by cAMP. The NMR structure of Er-23 reveals an all-α topology that is rich in disulphide bonds. In some cases, different pheromones can compete with each other in binding to their cell-surface receptors.
