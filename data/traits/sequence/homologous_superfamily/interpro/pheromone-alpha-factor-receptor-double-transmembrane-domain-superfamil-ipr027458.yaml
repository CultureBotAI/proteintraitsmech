identifier: InterPro:IPR027458
label: "Pheromone alpha factor receptor, double transmembrane domain superfamily"
definition: >-
  Pheromone alpha factor receptor (STE2) is the receptor for the peptide pheromone alpha factor, which is a mating factor of yeast. Saccharomyces cerevisiae haploid cells secrete and respond to peptide mating factors; alpha cells secrete alpha factor, which induces cell-cycle arrest and expression of various genes in a cells, while a cells produce a factor, which has similar actions on alpha cells. This superfamily represents a double transmembrane domain towards the N terminus of the alpha factor receptor. The ligand-binding site is probably in this domain.
