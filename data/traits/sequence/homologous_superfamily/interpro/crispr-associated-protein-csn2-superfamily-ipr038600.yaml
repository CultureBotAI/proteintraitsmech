identifier: InterPro:IPR038600
label: "CRISPR-associated protein Csn2 superfamily"
definition: >-
  This entry represents the Csn2 superfamily of Cas proteins, which are found only in CRISPR-containing species, near other CRISPR-associated proteins (cas), as part of the NMENI subtype of CRISPR/Cas loci. The species range so far for this subtype is animal pathogens and commensals only. This protein is present in some but not all NMENI CRISPR/Cas loci. The structure of Csn2 contains two domains: an α/β domain and an α-helical domain with significant hinge motion between these two domains. Sn2 is a ds-DNA-binding protein functioning at the quaternary structure level and regulated by Ca(2+) ions.
