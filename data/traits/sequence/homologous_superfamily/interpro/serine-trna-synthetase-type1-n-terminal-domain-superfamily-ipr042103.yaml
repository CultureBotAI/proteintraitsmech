identifier: InterPro:IPR042103
label: "Serine-tRNA synthetase, type1, N-terminal domain superfamily"
definition: >-
  The seryl-tRNA synthetase (SerRS) is a homodimeric enzyme that belongs to class II tRNA synthetases. SerRS catalyses the aminoacylation reaction that charges serine onto its cognate tRNA for protein synthesis. Each monomer is comprised of two domains: an N-terminal tRNA-binding domain and a catalytic domain composed of seven-stranded anti-parallel β-sheet. This entry represents the N-terminal domain of Serine-tRNA synthetase, which consists of two helices in a long α-hairpin and corresponds to the tRNA binding domain. Serine-tRNA synthetase ( ) exists as monomer and belongs to class IIa aminoacyl-tRNA synthetase.
