identifier: InterPro:IPR013986
label: "DExx box DNA helicase domain superfamily"
definition: >-
  This domain superfamily is found in DExx type DNA helicases, such as the hexameric essential helicases PcrA from Gram-positive bacteria and Rep and UvrD from Gram-negative bacteria. PcrA is essential for cell growth in Bacillus species, as it is required for rolling circle replication, unwinding DNA using an active inchworm mechanism. UvrD from Escherichia coli is a superfamily 1 (SF1) helicase involved in several DNA metabolic processes, including recombination and repair, while Rep affects the rate of replication fork progression in E. coli and is required for the replication of certain phages. The domain is also found in the exodeoxyribonuclease V gamma chain, which has a wide variety of catalytic activities including ATP-dependent exonuclease, ATP-stimulated endonuclease, ATP-dependent helicase and DNA-dependent ATPase activities.
