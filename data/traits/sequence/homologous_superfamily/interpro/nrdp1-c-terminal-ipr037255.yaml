identifier: InterPro:IPR037255
label: "NRDP1, C-terminal"
definition: >-
  This entry represents the C-terminal domain found in E3 ubiquitin-protein ligase NRDP1. It has an α-β-α(3)-β(3) fold with a pseudo barrel β-sheet of an SH3-like topology, surrounded by helices.
