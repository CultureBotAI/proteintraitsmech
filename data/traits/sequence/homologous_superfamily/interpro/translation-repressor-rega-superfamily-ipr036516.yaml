identifier: InterPro:IPR036516
label: Translation repressor RegA superfamily
definition: >-
  The translational regulator protein RegA, found in Bacteriophage T4 and related phages, binds to a region of messenger RNA (mRNA) that includes the initiator codon. RegA is unusual in that it represses the translation of about 35 early T4 mRNAs but does not affect nearly 200 other mRNAs. The structure of RegA has a ferredoxin-like fold, which consists of an α+β sandwich with antiparallel β-sheet.
