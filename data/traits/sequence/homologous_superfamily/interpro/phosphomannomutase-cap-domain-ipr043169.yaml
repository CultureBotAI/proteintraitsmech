identifier: InterPro:IPR043169
label: "Phosphomannomutase, cap domain"
definition: >-
  Phosphomannomutase (PMM) catalyses the conversion of mannose-6-phosphate to mannose-1-phosphate, an essential step in mannose activation and the biosynthesis of glycoconjugates in all eukaryotes. Bacterial alpha-phosphoglucomutases share an overall fold similar to that of eukaryotic phosphomannomutases. PMM can be divided into two domains: the cap and core. This entry represents the cap domain. The heart of the cap domain is a four-stranded antiparallel β-sheet elaborated on one face with three α-helices.
