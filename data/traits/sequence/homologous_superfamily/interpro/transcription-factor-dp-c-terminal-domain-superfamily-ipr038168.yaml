identifier: InterPro:IPR038168
label: "Transcription factor DP, C-terminal domain superfamily"
definition: >-
  The transcription factor DP (dimerization partner) forms a heterodimer with E2F and regulates genes involved in cell cycle progression. The transcriptional activity of E2F is inhibited by the retinoblastoma protein which binds to the E2F-DP heterodimer and negatively regulates the G1-S transition.
