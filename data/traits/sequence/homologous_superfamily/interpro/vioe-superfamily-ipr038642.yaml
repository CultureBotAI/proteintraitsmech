identifier: InterPro:IPR038642
label: "VioE superfamily"
definition: >-
  Violacein is a purple-coloured pigment produced by bacteria such as Chromobacterium violaceum. Violacein exhibits significant biological activities, such as strong inhibition of several tumor cell lines, as well as antibacterial and trypanocidal activities. Violacein is synthesised from two molecules of tryptophan by the enzymes VioA-E. VioE is important for formation of the intermediate prodeoxyviolacein in this biosynthetic pathway. This entry represents the enzyme VioE.
