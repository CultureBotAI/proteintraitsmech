identifier: InterPro:IPR035933
label: "Hypothetical protein MTH1880"
definition: >-
  MTH1880 is a hypothetical protein from Methanobacterium thermoautotrophicum. The structure has an α/β fold. The molecular surface of the protein reveals a small, highly acidic pocket comprising loop B, the end of beta2, and loop D, indicating that the protein would have a possible cation binding site. It is proposed that the MTH1880 protein may function as a calcium buffering protein.
