identifier: InterPro:IPR043115
label: "D212, catalytic domain superfamily"
definition: >-
  This superfamily includes proteins found in viruses and archaea, represented by Sulfolobus spindle-shaped virus ORF D212. D212 is a type II restriction endonuclease that contains the PD-(D/E)XK catalytic motif and hence it belongs to this diverse PD-(D/E)XK nuclease superfamily. This fold and its associated catalytic residues are also found in nucleases, where they play roles in DNA replication, repair, recombination, and other processes requiring nuclease activity. While the function of D212 in the phage replication cycle remains unknown, it is speculated to be a Holliday junction cleavage.
