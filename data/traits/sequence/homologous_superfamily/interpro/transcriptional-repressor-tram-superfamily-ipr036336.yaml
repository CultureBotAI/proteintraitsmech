identifier: InterPro:IPR036336
label: "Transcriptional repressor TraM superfamily"
definition: >-
  Members of this superfamily of transcriptional repressors adopt a T-shaped structure, with a core composed of two antiparallel α-helices. These proteins can be divided into two parts, a globular head and an elongated tail, and they negatively regulate conjugation and the expression of tra genes by antagonising traR/AAI-dependent activation.
