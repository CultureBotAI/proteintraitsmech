identifier: InterPro:IPR036794
label: "ATP synthase delta/epsilon subunit, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal long α-helix domain superfamily of ATPase subunits delta (in mitochondrial ATPase) or epsilon (in bacteria or chloroplast ATPase). The interaction site of subunit C of the F0 complex with the delta or epsilon subunit of the F1 complex may be important for connecting the rotor of F1 (gamma subunit) to the rotor of F0 (C subunit). In bacterial species, the delta subunit is the equivalent of the Oligomycin sensitive subunit (OSCP, ) in metazoans. The C-terminal domain of the epsilon subunit appears to act as an inhibitor of ATPase activity.
