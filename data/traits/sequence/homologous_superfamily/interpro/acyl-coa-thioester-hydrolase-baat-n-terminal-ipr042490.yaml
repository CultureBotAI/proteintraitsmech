identifier: InterPro:IPR042490
label: "Acyl-CoA thioester hydrolase/BAAT, N-terminal"
definition: >-
  This superfamily represents the N-terminal region of the acyl-CoA thioester hydrolase and bile acid-CoA:amino acid N-acetyltransferase (BAAT). This region is not thought to contain the active site of either enzyme. Thioesterase isoforms have been identified in peroxisomes, cytoplasm and mitochondria, and are likely to have distinct functions in lipid metabolism. The N-terminal domain contains a seven-stranded β-sandwich, which has some distant structural homologs in other proteins.
