identifier: InterPro:IPR042106
label: "NADH-ubiquinone/plastoquinone oxidoreductase chain 6, subunit NuoJ"
definition: >-
  This entry represents chain 6 from NADH:ubiquinone oxidoreductase and NADH-plastoquinone oxidoreductase. Bacterial proton-translocating NADH-quinone oxidoreductase (NDH-1) is composed of 14 different subunits. The chain belonging to this family is a subunit that constitutes the membrane sector of the complex. It reduces ubiquinone to ubiquinol utilising NADH. Plant chloroplastic NADH-plastoquinone oxidoreductase reduces plastoquinone to plastoquinol. Mitochondrial NADH-ubiquinone oxidoreductase from a variety of sources reduces ubiquinone to ubiquinol. Subunit NuoJ has an unusual non-globular fold: three linearly arranged amino-terminal TM helices border NuoK, and TMs 4 and 5 are separated at the opposite sides of the domain. Thus, NuoJ interweaves between NuoK, A and N, stabilising the complex. TM3 of NuoJ contains in its middle a pi-bulge/kink, so this helix is probably flexible and mechanistically important. TM3 is the most conserved helix in NuoJ and is a hotspot for human mitochondrial disease mutations.
