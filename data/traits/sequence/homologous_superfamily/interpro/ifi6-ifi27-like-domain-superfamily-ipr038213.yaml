identifier: InterPro:IPR038213
label: "IFI6/IFI27-like domain superfamily"
definition: >-
  This superfamily represents interferon alpha-inducible proteins IFI6 (also known as IFI-6-16) and IFI27-like (also known as ISG12). ISG12a is a mitochondrial protein that contributes to IFN-induced apoptosis through perturbation of normal mitochondrial function.
