identifier: InterPro:IPR038447
label: "PSRP-3/Ycf65 superfamily"
definition: >-
  In plants it has been named plastid-specific ribosomal protein 3 (PSRP-3), and in cyanobacteria it is named Ycf65, with both also known as small ribosomal subunit protein cS23. Plastid-specific ribosomal proteins may mediate the effects of nuclear factors on plastid translation. The acidic PSRPs are thought to contribute to protein-protein interactions in the 30S subunit, and are not thought to bind RNA.
