identifier: InterPro:IPR009004
label: "Transposase, Mu, C-terminal"
definition: >-
  Transposons are abundant in nature and they play critical roles in pathogenesis, the spread of antibiotic resistance, and genome evolution. Transposition involves cleavage at the 3' ends of the transposon followed by the rejoining of the 3' OH termini to a target DNA. These steps are catalyzed by transposon-encoded transposases, and they occur in the context of higher order protein-DNA complexes called transpososomes. Mu transpososomes are named according to the chemical steps the Mu ends have undergone. The stable synaptic complex (SSC, or type 0 complex) is the first transpososome detected. Single-strand cleavage at the 3' ends of the Mu sequence then generates the cleaved donor complex (CDC, or type 1 complex). The strand transfer complex (STC, or type II complex) is formed by covalent joining of the Mu 3' ends to the strands of target DNA. The C-terminal end of the MuA protein interacts with the MuB protein that is involved in target DNA site selection and transpososome activation.
