identifier: InterPro:IPR035513
label: "Invertase/pectin methylesterase inhibitor domain superfamily"
definition: >-
  This superfamily represents pectin methylesterases (PMEs) and invertases complex, and the uncharacterised protein Os08g from Oryza sativa subsp. japonica (Rice). This domain inhibits pectin methylesterases (PMEs) and invertases through formation of a non-covalent 1:1 complex. It has been implicated in the regulation of fruit development, carbohydrate metabolism and cell wall extension. It may also be involved in inhibiting microbial pathogen PMEs. It has been observed that it is often expressed as a large inactive preprotein. It is also found at the N-termini of PMEs, suggesting that both PMEs and their inhibitor are expressed as a single polyprotein and subsequently processed. It has two disulphide bridges and is mainly α-helical.
