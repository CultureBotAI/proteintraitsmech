identifier: InterPro:IPR036583
label: "23S rRNA-intervening sequence superfamily"
definition: >-
  This superfamily consists of bacterial proteins encoded within an intervening sequence present within some 23S rRNA genes. It folds into an anti-parallel four-helix bundle and forms homopentamers.
