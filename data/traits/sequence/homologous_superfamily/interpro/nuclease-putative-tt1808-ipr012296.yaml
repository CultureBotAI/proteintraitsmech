identifier: InterPro:IPR012296
label: "Nuclease, putative, TT1808"
definition: >-
  This superfamily represents a structural motif found in the putative nuclease, hypothetical protein TT1808 (or TTHA1514), an AT-rich DNA-binding protein from Thermus thermophilus. This domain has a 3-layer α/β/α topology similar to that found in restriction endonucleases. The nuclease domain is ubiquitously found in enzymes involved in metabolism of nucleic acids, mostly in nucleases with diverse biological functions.
