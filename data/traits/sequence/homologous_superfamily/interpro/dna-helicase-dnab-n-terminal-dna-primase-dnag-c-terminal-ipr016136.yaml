identifier: InterPro:IPR016136
label: "DNA helicase DnaB, N-terminal/DNA primase DnaG, C-terminal"
definition: >-
  This superfamily represents a structural domain with a multi-helical structure that forms an orthogonal bundle; a segment-swapped dimer. This domain is found at the N-terminal of the DNA helicase DnaB and replicative DNA helicase DnaC, as well as at the C-terminal of the DNA primase DnaG. The hexameric helicase DnaB unwinds the DNA duplex at the Escherichia coli chromosome replication fork. Although the mechanism by which DnaB both couples ATP hydrolysis to translocation along DNA and denatures the duplex is unknown, a change in the quaternary structure of the protein involving dimerization of the N-terminal domain has been observed and may occur during the enzymatic cycle. This N-terminal domain is required both for interaction with other proteins in the primosome and for DnaB helicase activity.
