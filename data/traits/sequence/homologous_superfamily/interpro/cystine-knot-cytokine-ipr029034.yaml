identifier: InterPro:IPR029034
label: "Cystine-knot cytokine"
definition: >-
  This cystine-knot cytokine domain is a disulfide-rich, all-β core domain that is found in glycoprotein hormones, in members of the TGF-beta family, IL-17 family and VEGF growth factor family among others.
