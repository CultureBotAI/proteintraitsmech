identifier: InterPro:IPR053759
label: "CDI System Immunity Component"
definition: >-
  This superfamily of proteins encompasses immunity components within toxin-immunity modules, which are implicated in contact-dependent growth inhibition (CDI) systems. These systems enable bacteria to interact with and suppress the proliferation of closely related bacteria upon direct contact. Members of this superfamily are responsible for neutralizing the toxic effects of cognate toxins, thereby providing a defense mechanism against CDI-mediated inhibition. The proteins function by specifically counteracting the activity of associated toxins, which are often encoded within the same genetic locus. The protective role of these proteins is crucial in bacterial competition and survival, as they can confer immunity against the toxic effects of homologous toxins produced by other bacteria in their vicinity.
