identifier: InterPro:IPR038681
label: "Sf6-type phage tail needle knob superfamily"
definition: >-
  This entry represents the globular tip protein of some tailed bacteriophages, including Tail needle protein from Shigella phage Sf6. Tailed bacteriophage virions deliver DNA to susceptible cells after adsorbing to specific receptors on the surface of the bacteria. In the Gram-negative bacteria these receptors are surface proteins or polysaccharides. In the phage Sf6-type needle, this distal tip folds into a knob with a TNF-like fold, similar to the fibre knobs of bacteriophage PRD1 and Adenovirus. It contains three bound L-glutamate molecules that are bind tightly in the crevices between the trimers of this trimeric tip.
