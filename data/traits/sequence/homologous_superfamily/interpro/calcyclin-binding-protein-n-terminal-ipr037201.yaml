identifier: InterPro:IPR037201
label: "Calcyclin-binding protein, N-terminal"
definition: >-
  The N-terminal domain of Calcyclin-binding protein (CacyBP) adopts a helical hairpin structure with a hydrophobic core stabilised by a classic knobs-and-holes arrangement of side chains contributed by the two amphipathic helices. Little is known about this domain's function, except that it is crucial for interactions with Siah. It has also been hypothesised that CacyBP can dimerise through this N-terminal domain.
