identifier: InterPro:IPR023171
label: "Na+/H+ antiporter domain superfamily"
definition: >-
  NhaA is a sodium ion/proton antiporter that uses the proton electrochemical gradient to expel sodium ions from the cytoplasm and functions primarily in the adaptation to high salinity at alkaline pH. NhaA is also believed to be responsible for adaptation to alkaline pH when sodium is available. NhaA is one of the three known sodium ion/proton antiporters in Escherichia coli along with NhaB and ChaA, though there are other mechanisms for Na+ extrusion such as NDH-I complicating the determination of the precise roles of each of the transporters. This entry represents the structural domain superfamily found in the Na+/H+ family of antiporters.
