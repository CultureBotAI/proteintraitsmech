identifier: InterPro:IPR023139
label: "PBDC1-like domain superfamily"
definition: >-
  This domain superfamily can be found in the PBDC1 (polysaccharide biosynthesis domain-containing protein 1) proteins from fungi and animals. Protein PBDC1 homolog from S. cerevisiae also known as Ypl225w (Chp1, Chaperone 1 for eEF1A) functions as a co-translational chaperone by forming dual interactions with the eEF1A G domain nascent chain and the UBA domain of ribosome-bound nascent polypeptide-associated complex. This protein primes the eEF1A nascent chains for binding to GTP as part of a folding mechanism which is tightly coupled to chaperone recycling.
