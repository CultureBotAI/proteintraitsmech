identifier: InterPro:IPR037126
label: "PdaC/RsiV-like superfamily"
definition: >-
  This entry represents a highly conserved domain superfamily found in a group of bacterial proteins. The function of this domain is not known. Proteins containing this domain include pdaC and anti-sigma-V factor RsiV from Bacillus subtilis. PdaC catalyzes the deacetylation of N-acetylmuramic acid (MurNAc) residues in peptidoglycan, a modification that confers resistance to lysosyme.
