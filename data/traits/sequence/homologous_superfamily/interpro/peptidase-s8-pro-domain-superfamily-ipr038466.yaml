identifier: InterPro:IPR038466
label: "Peptidase S8, pro-domain superfamily"
definition: >-
  This domain is the pro-domain found at the C terminus of several peptidases belonging to family S8. The overall fold of the PC1 pro-domain consists of two α-helices and four β-strands in a β-α-β-β-α-β arrangement.
