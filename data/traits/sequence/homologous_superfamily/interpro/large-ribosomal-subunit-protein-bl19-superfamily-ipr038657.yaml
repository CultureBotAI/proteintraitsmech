identifier: InterPro:IPR038657
label: "Large ribosomal subunit protein bL19 superfamily"
definition: >-
  This family represents the large ribosomal subunit protein bL19 found in bacteria and eukaryotes (which includes bL19c from plants (chloroplast), mitochondrial bL19m from animals, also referred to as MRLP19). In Escherichia coli, bL19 is known to be located at the 30S-50S ribosomal subunit interface and may play a role in the structure and function of the aminoacyl-tRNA binding site.
