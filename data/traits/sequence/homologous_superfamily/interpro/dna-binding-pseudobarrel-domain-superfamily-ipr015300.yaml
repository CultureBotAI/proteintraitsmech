identifier: InterPro:IPR015300
label: "DNA-binding pseudobarrel domain superfamily"
definition: >-
  This superfamily represents a DNA recognition domain found in the restriction endonuclease EcoRII and numerous transcription factors. The EcoRII structure has been studied and forms an eight-stranded β-sheet with the strands in the order of b2, b5, b4, b3, b7, b6, b1 and b8. The strands are mostly antiparallel to each other except that b3 is parallel to b7. Alternatively, it may also be viewed as consisting of two mini β-sheets of four antiparallel β-strands, sheet I from β-strands b2, b5, b4, b3 and sheet II from strands b7, b6, b1, b8, folded into an open mixed β-barrel with a novel topology. Sheet I has a simple Greek key motif while sheet II does not.
