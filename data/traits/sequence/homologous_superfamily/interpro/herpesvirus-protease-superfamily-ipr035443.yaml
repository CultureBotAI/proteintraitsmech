identifier: InterPro:IPR035443
label: "Herpesvirus protease superfamily"
definition: >-
  Herpesvirus protease is required for the life cycle of the virus and is an attractive target for the design and development of new anti-herpes agents. The protease belongs to a new class of serine proteases, with a novel backbone fold and a unique Ser-His-His catalytic triad.
