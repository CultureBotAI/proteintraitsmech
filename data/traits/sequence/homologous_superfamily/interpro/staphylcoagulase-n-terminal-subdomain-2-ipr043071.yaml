identifier: InterPro:IPR043071
label: "Staphylcoagulase, N-terminal, subdomain 2"
definition: >-
  Staphylococcus aureus secretes a cofactor called staphylocoagulase. Staphylocoagulase is an extracellular protein that forms a complex with human prothrombin, and activates it without the usual proteolytic cleavages. The resulting complex directly initiates blood clotting. This superfamily represents the subdomain 2 found in the N-terminal domain of staphylocoagulase. Structurally it consists of a three-helix bundle.
