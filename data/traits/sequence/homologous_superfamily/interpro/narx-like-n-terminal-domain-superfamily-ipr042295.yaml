identifier: InterPro:IPR042295
label: "NarX-like, N-terminal domain superfamily"
definition: >-
  This domain is found N-terminal in histidine kinase NarX and other sensor proteins. NarX is a histidine kinase receptor that responds to nitrate and nitrite to effect regulation of anaerobic respiration in various bacteria. Structurally, the Narx sensor domain is a dimer of four-helix bundles, related by a quasi two-fold axis of symmetry running roughly parallel to the long axes of the helices.
