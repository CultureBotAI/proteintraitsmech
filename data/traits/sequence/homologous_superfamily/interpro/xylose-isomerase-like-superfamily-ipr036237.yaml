identifier: InterPro:IPR036237
label: "Xylose isomerase-like superfamily"
definition: >-
  Proteins in this superfamily contain a structural motif with a β/α TIM barrel, such as xylose isomerase. These proteins share similar, but not identical, metal-binding sites. In addition, xylose isomerase and L-rhamnose isomerase each have additional α-helical domains involved in tetramer formation.
