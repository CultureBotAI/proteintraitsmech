identifier: InterPro:IPR049346
label: "Immune protein Tsi1-like superfamily"
definition: >-
  This protein family includes Immune protein Tsi1 ( ) from Pseudomonas aeruginosa and similar proteins from bacteria. Tsi1 plays a role in preventing early activation of toxin Tse1. Tsi1 binds to a large surface of Tse1 and thereby occludes the active site to specifically inhibits enzyme activity by forming a hydrogen bond with the catalytic diad. It adopts an all-β fold consisting of 14 β-strands, which constitute three antiparallel blade-shaped β-sheets ( ).
