identifier: InterPro:IPR038263
label: "Lytic exoenzyme, target recognition domain superfamily"
definition: >-
  This entry represents the C-terminal domain in Zoocin A endopeptidase (ZooA). ZooA hydrolyses peptidoglycan cross-bridges at the junction between the D-alanine of the stem peptide and the first L-alanine of the cross-bridge. This domain is composed of strands of antiparallel β sheet with one short α helix at the C-terminal end.
