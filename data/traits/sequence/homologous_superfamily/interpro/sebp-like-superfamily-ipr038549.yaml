identifier: InterPro:IPR038549
label: "SeBP-like superfamily"
definition: >-
  Selenium is an important nutrient which needs to be regulated since lack of the nutrient leads to cell abnormalities and high concentrations are toxic. The selenium binding protein (SeBP) regulates the level of free selenium in the cell by sequestering the nutrient during transport. SeBP acts as a pentamer and delivers the selenium to the selenophosphate synthetase enzyme. Each subunit is composed of an α helix on top of a four stranded twisted ss sheet, stabilised by hydrogen bonds. Proteins in this entry are restricted to the archaeal Methanococcales.
