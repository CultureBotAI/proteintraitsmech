identifier: InterPro:IPR044926
label: "RGS, subdomain 2"
definition: >-
  RGS (Regulator of G Protein Signalling) proteins are multi-functional, GTPase-accelerating proteins that promote GTP hydrolysis by the alpha subunit of heterotrimeric G proteins. Upon activation by GPCRs, heterotrimeric G proteins exchange GDP for GTP, are released from the receptor, and dissociate into free, active GTP-bound alpha subunit and beta-gamma dimer, both of which activate downstream effectors. Usually, the response is terminated upon GTP hydrolysis by the alpha subunit ( ), which can then bind the beta-gamma dimer ( , ) and the receptor. However, in some cases, RGS proteins can have a positive effect on signal potentiation. All RGS proteins contain an 'RGS-box' (or RGS domain), which is required for activity. Some small RGS proteins such as RGS1 and RGS4 are comprised of little more than an RGS domain, while others also contain additional domains that confer further functionality. RGS domains can be found in conjunction with a variety of domains, including: DEP for membrane targeting ( ), PDZ for binding to GPCRs ( ), PTB for phosphotyrosine-binding ( ), RBD for Ras-binding ( ), GoLoco for guanine nucleotide inhibitor activity ( ), PX for phosphatidylinositol-binding ( ), PXA that is associated with PX ( ), PH for stimulating guanine nucleotide exchange ( ), and GGL (G protein gamma subunit-like) for binding G protein beta subunits ( ). Those RGS proteins that contain GGL domains can interact with G protein beta subunits to form novel dimers that prevent G protein gamma subunit binding and G protein alpha subunit association, thereby preventing heterotrimer formation. The RSG box in RSG4 corresponds to an array of α-helices that fold into two domains. Both are required for GAP (GTPase activating protein) activity. This superfamily represents the subdomain 2…
