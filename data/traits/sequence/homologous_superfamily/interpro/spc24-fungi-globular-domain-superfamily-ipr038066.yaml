identifier: InterPro:IPR038066
label: "Spc24, Fungi, globular domain superfamily"
definition: >-
  Spc24 is a component of the evolutionarily conserved kinetochore-associated Ndc80 complex, which is implicated in several essential outer kinetochore functions, including microtubule binding and control the spindle assembly checkpoint. The Ndc80 complex appears to be a long rod with globular 'heads'. Ndc80 and Nuf2 contribute to one head and to the intervening shaft; Spc24 and Spc25 complete the shaft and contribute to the other head. Spc24 and Spc25 fold tightly together. The C-terminal globular domains of Spc24 and Spc25 form the 'inner' head, which faces the centromere.
