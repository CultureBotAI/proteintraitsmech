identifier: InterPro:IPR043036
label: "Phosphoprotein, C-terminal domain, viral"
definition: >-
  This superfamily represents the C-terminal domain of the phosphoprotein from vesiculoviruses, which are ssRNA negative-strand rhabdoviruses. It is known as the phosphoprotein or P protein. This protein may be part of the RNA dependent RNA polymerase complex. The phosphorylation states of this protein may regulate the transcription and replication complexes. Structurally, the C-terminal domain consists of 2 strands and 5 helices.
