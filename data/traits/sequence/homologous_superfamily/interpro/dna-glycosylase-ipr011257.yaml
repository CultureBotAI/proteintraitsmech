identifier: InterPro:IPR011257
label: DNA glycosylase
definition: >-
  DNA glycosylases act to repair oxidative damage in DNA. These proteins are redundant as there are several different types of DNA glycosylases that are able to compensate for one another. Examples include the endonuclease III subfamily, the mismatch glycosylases subfamily, the 3-methyladenine DNA glycosylases I subfamily, and the DNA repair glycosylases subfamily.
