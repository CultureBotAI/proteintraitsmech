identifier: InterPro:IPR036092
label: "Small/middle T-antigen superfamily"
definition: >-
  This domain superfamily represents a conserved region in papovavirus small and middle T-antigens. It is found as the N-terminal domain in the small T-antigen, and is centrally located in the middle T-antigen. The structure has an all-α zinc-binding fold with two zinc ion-binding sites with a common CxCxxC motif but different fourth ligands.
