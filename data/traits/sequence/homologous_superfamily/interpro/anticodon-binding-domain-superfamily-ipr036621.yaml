identifier: InterPro:IPR036621
label: "Anticodon-binding domain superfamily"
definition: >-
  tRNA synthetases, or tRNA ligases are involved in protein synthesis. This domain is found in histidyl, glycyl, threonyl and prolyl tRNA synthetases. It is probably the anticodon binding domain. Structurally, the anticodon-binding domain has three layers (α/β/α) containing a mixed β-sheet of five strands, where strand 4 is antiparallel to the rest.
