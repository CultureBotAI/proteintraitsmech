identifier: InterPro:IPR042284
label: "S-adenosylmethionine decarboxylase, N-terminal"
definition: >-
  S-adenosylmethionine decarboxylase (AdoMetDC) catalyses the removal of the carboxylate group of S-adenosylmethionine to form S-adenosyl-5'-3-methylpropylamine which then acts as the n-propylamine group donor in the synthesis of the polyamines spermidine and spermine from putrescine. The catalytic mechanism of AdoMetDC involves a covalently-bound pyruvoyl group. This group is post-translationally generated by a self-catalyzed intramolecular proteolytic cleavage reaction between a glutamate and a serine. This cleavage generates two chains, beta (N-terminal) and alpha (C-terminal). The N-terminal serine residue of the alpha chain is then converted by non hydrolytic serinolysis into a pyruvoyl group. This superfamily represents the N-terminal domain of S-adenosylmethionine decarboxylase.
