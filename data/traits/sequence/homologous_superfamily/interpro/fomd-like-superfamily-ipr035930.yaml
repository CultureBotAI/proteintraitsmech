identifier: InterPro:IPR035930
label: "FomD-like superfamily"
definition: >-
  This group of prokaryotic proteins includes Nucleoside triphosphate/diphosphate phosphatase from Staphylococcus aureus (SA1684 or Ntdp), Cytidylyl-2-hydroxypropylphosphonate hydrolase from Streptomyces wedmorensis (FomD), and Probable ribonuclease FAU-1 from Pyrococcus abyssi. SA1684 shows nucleoside phosphatase activity towards nucleoside triphosphates and nucleoside diphosphates. It a significant effect on the proliferation of S. aureus colonies and the killing ability of the host. FomD is a protein encoded in the fosfomycin biosynthesis gene cluster, which hydrolyses (S)-HPP-CMP to give (S)-HPP and CMP in the presence of Mn2 or Co2. It also hydrolyses cytidylyl 2-hydroxyethylphosphonate (HEP-CMP), which is a biosynthetic intermediate before C-methylation. FomD structure revealed that it has a β-barrel fold consisting of a large twisted antiparallel β-sheet. It has a conserved Tyr residue which activates a water molecule to promote nucleophilic attack on the phosphorus atom of the phosphonate moiety.
