identifier: InterPro:IPR036691
label: "Endonuclease/exonuclease/phosphatase superfamily"
definition: >-
  This domain superfamily is found in a large number of proteins including magnesium dependent endonucleases and phosphatases involved in intracellular signalling. This domain is found in many proteins including AP endonuclease proteins (DNA-(apurinic or apyrimidinic site) lyase ), deoxyribonuclease-1 (DNase I; ), synaptojanin an inositol-1,4,5-trisphosphate phosphatase ( ) and sphingomyelinase ( ). The DNase I domain structure contains a β-sandwich fold and a duplication of the α+β motif.
