identifier: InterPro:IPR012334
label: "Pectin lyase fold"
definition: >-
  This entry covers proteins that are closely related to the pectolytic enzyme, pectin lyase, which act as virulence factors. These proteins include pectate lyase, iota-carrageenase, and glycoside hydrolases from family 28 (such as galacturonases). Pectin lyases, pectate lyases and galacturonases all act on forms of pectin, one of the main components of the cell wall. When the backbone of pectin is methylated, it is known as 'pectin' and can be cleaved by pectin lyase, a microbial virulence factor. When the backbone of pectin is demethylated, it is known as 'pectate' and can be cleaved by pectate lyase virulence factors or hydrolysed by polygalacturonases. Iota-carrageenase is an enzyme that degrades carrageenan, a main component of the cell walls of various marine red algae. Unlike other carrageenase enzymes, iota-carrageenase belongs to the glycoside hydrolase structural family. All these enzymes display a β-helical structure.
