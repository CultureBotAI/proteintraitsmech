identifier: InterPro:IPR038509
label: "IFS superfamily"
definition: >-
  Immunity factor for SPN (IFS) binds to and inhibits the SPN toxin. IFS inhibits SPN enzymatic activity by binding over the active site and completely blocking its access to beta-NAD+.
