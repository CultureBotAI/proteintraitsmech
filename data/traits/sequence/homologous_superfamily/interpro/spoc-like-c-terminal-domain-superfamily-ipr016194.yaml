identifier: InterPro:IPR016194
label: "SPOC-like, C-terminal domain superfamily"
definition: >-
  This superfamily represents the Spen Paralogue and Orthologue C-terminal (SPOC) domain and its structural homologues. This domain has a closed β-barrel fold of complex topology. Proteins that carry a SPOC-like domain include: Spen proteins, such as SHARP (SMRT/HDAC1-associated repressor protein), which carry a SPOC domain at the C-terminal and an RNA-binding motif in the N-terminal; Spen proteins regulate the expression of key transcriptional effectors in diverse signalling pathways, the SHARP protein being a component of transcriptional repression complexes in both nuclear receptor and Notch/RBP-Jkappa signalling pathways. The middle domains of Ku70 and Ku80 (which includes the C-terminal α-helical arm and the DNA encircling insertion); the Ku heterodimer, which is composed of Ku70 and Ku80 subunits, contributes to genomic integrity through its ability to bind DNA double-strand breaks and facilitate repair by the non-homologous end-joining pathway.
