identifier: InterPro:IPR038362
label: "VP9, N-terminal domain superfamily"
definition: >-
  White spot syndrome virus (WSSV) is a major pathogen in shrimp aquaculture. VP9, a non-structural protein of WSSV containing a ferredoxin fold, is encoded by open reading frame wsv230. Two dimers come together to form one asymmetric unit which possesses a DNA recognition fold and specific metal binding sites possibly for zinc.
