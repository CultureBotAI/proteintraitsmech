identifier: InterPro:IPR023323
label: "Tex-like domain superfamily"
definition: >-
  This superfamily represents a domain comprising amino acids 115-327 and 456-502, flanking the YqgF domain ( ). Tex (toxin expression) is a highly conserved bacterial protein involved in expression of critical toxin genes. The overall structure is notably flat and elongated. The most striking structural feature is a long, central helix comprising from amino acid residue 274 to 322. The rest of the protein wraps around the central helix at both the N-terminal and C-terminal ends. Although the Tex structure is fairly compact, it can be largely described as a series of distinct domains.
