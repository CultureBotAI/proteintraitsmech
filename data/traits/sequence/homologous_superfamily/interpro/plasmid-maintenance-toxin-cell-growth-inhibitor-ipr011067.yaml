identifier: InterPro:IPR011067
label: "Plasmid maintenance toxin/Cell growth inhibitor"
definition: >-
  Bacterial cells remove plasmid-free segregants by the use of toxin/antitoxin systems, where cells that lack plasmids cannot produce the antitoxin required for survival. Several of the toxin components have similar structures, which consists of an SH3-like barrel fold, and contains an inserted β-sheet subdomain and a C-terminal helix, despite often low sequence identities. Toxins that have this structural fold include CcdB from Escherichia coli, a topoisomerase poison that interferes with DNA gyrase activity, PemK-like YdcE from Bacillus subtilis, Kid toxin (Kis antitoxin) from the E. coli R1 plasmid and the MazF toxin (MazE antitoxin) from E. coli.
