identifier: InterPro:IPR064116
label: "HvfC, C-terminal superfamily"
definition: >-
  This superfamily represents the C-terminal domain in Multinuclear nonheme iron-dependent oxidase partner protein HvfC ( ), NGO_1945 ( , ) and various other proteins partnered with MNIO family peptide modification enzymes. HvfC, as described in Haemophilus influenzae, is a partner protein to the multinuclear nonheme iron-dependent oxidase (MNIO) enzyme HvfB, and participates in post-translational modification that converts the precursor protein HvfA (Haemophilus virulence factor A) into a copper-binding metallophore and a contributor to the cell's ability to invade host cells and survive as an intracellular pathogen. The related protein NGO_1945 occurs in a similar genomic context and was previously suggested to be a DNA-binding protein. This domain shows a β-sheet containing three antiparallel β-strands and three α-helices ( ).
