identifier: InterPro:IPR038120
label: "RNA polymerase Rpb1, funnel domain superfamily"
definition: >-
  RNA polymerases catalyse the DNA dependent polymerisation of RNA. Prokaryotes contain a single RNA polymerase compared to three in eukaryotes (not including mitochondrial and chloroplast polymerases). This entry represents the funnel domain. The funnel domain contains the binding site for some elongation factors.
