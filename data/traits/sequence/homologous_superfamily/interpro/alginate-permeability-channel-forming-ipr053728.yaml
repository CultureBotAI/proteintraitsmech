identifier: InterPro:IPR053728
label: "Alginate Permeability Channel-forming"
definition: >-
  This superfamily of proteins is involved in the transport of alginate, a biopolymer produced by certain bacteria. Members of this superfamily are characterized by their ability to form channels in the bacterial membrane that facilitate the permeation of alginate. These channels are distinct from classical porins as they do not adopt a porin-like structure, indicating a unique mechanism of action for alginate translocation across the membrane.
