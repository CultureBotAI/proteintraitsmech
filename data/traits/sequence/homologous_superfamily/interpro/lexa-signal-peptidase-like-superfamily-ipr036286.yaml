identifier: InterPro:IPR036286
label: "LexA/Signal peptidase-like superfamily"
definition: >-
  This entry represents a structural domain superfamily found in serine peptidases belonging to MEROPS peptidase families: S24 (LexA family, clan SF); S26A (signal peptidase I), S26B (signalase) and S26C TraF peptidase. This domain has a complex fold made of several coiled β-sheets, which contains an SH3-like barrel structure. The S26 family includes Escherichia coli signal peptidase, SPase, which is a membrane-bound endopeptidase with two N-terminal transmembrane segments and a C-terminal catalytic region. SPase functions to release proteins that have been translocated into the inner membrane from the cell interior, by cleaving off their signal peptides. In SPase proteins, this domain is disrupted by the insertion of an additional all-beta subdomain. Note: This signature covers both the SH3-like barrel β-ribbon domain and the all-β subdomain inserted into it. The S24 family includes: the lambda repressor CI/C2 family and related bacterial prophage repressor proteins. LexA, the diverse family of bacterial transcription factors that repress genes in the cellular SOS response to DNA damage. MucA and the related UmuD proteins, which are lesion-bypass DNA polymerases, induced in response to mitogenic DNA damage. UmuD is self-processed by its own serine protease activity during the SOS response. RulA, a component of the rulAB locus that confers resistance to UV. All of these proteins, with the possible exception of RulA, interact with RecA, which activates self cleavage either derepressing transcription in the case of CI and LexA or activating the lesion-bypass polymerase in the case of UmuD and MucA. UmuD'2, is the homodimeric component of DNA pol V, which is produced from UmuD by RecA-facilitated self-cleavage. The first 24 N-terminal residues of UmuD are removed; UmuD'2 is…
