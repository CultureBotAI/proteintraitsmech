identifier: InterPro:IPR042219
label: "Dynein heavy chain, AAA lid domain superfamily"
definition: >-
  This superfamily represents the AAA lid domain found near the C-terminal region of dynein heavy chain. Dyneins are motor proteins of eukaryotic cells that convert energy from ATP hydrolysis into force and movement along microtubules. They generally contain one to three heavy chains (each >500kDa), which belong to the AAA+ superfamily of mechanochemical enzymes, along with several accessory subunits ranging from light to intermediate chains. Each heavy chain consists of a flexible N-terminal tail known as the cargo-binding domain and a motor domain. The motor domain comprises an ATP-hydrolysing AAA+ ring (formed by six AAA domains), a linker, a stem, a C-sequence, and a stalk with a long coiled-coil structure. The stalk contains an ATP-sensitive microtubule-binding site at its tip, while the linker functions as a mechanical element for generating dynein's power stroke. Studies using a 380kDa recombinant fragment of the Dictyostelium dynein heavy chain demonstrated that the C-terminal two-thirds maintains microtubule-activated ATPase activity and drives robust microtubule sliding, confirming this region as the functional motor domain. Two categories of dyneins exist: axonemal dyneins, which produce bending motions that propagate along cilia and flagella, and cytoplasmic dyneins, which drive fundamental cellular processes including nuclear migration, mitotic spindle organisation, chromosome separation, and the positioning and function of intracellular organelles.
