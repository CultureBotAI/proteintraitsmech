identifier: InterPro:IPR016106
label: Histidine decarboxylase proenzyme, N-terminal
definition: >-
  This entry represents a structural subdomain found at the N terminus in Histidine decarboxylase proenzyme. This subdomain has an irregular structure containing both β-strand and α-helical regions. These proteins form heterohexamers. Histidine decarboxylase catalyses the formation of histamine from histidine. It requires a pyruvoyl group for its activity. Cleavage of the proenzyme PI chain yields two subunits, alpha and beta, which arrange as a hexamer (alpha beta) 6 by nonhydrolytic self-catalysis.
