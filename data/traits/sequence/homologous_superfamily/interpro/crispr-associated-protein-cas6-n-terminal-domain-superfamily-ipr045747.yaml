identifier: InterPro:IPR045747
label: "CRISPR-associated protein Cas6, N-terminal domain superfamily"
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. Cas6 is a member of the RAMP (repeat-associated mysterious protein) superfamily. It is among the most widely distributed Cas proteins and is found in both bacteria and archaea. Cas6 functions in the generation of CRISPR-derived guide RNAs for invader defense in prokaryotes. The structure of this protein showed it adopts a tandem ferredoxin/RRM fold. This superfamily represents the N-terminal domain of Cas6 proteins, which has a ferredoxin-like fold.
