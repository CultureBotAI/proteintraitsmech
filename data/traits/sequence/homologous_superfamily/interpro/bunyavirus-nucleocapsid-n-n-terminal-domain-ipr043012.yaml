identifier: InterPro:IPR043012
label: "Bunyavirus nucleocapsid (N) , N-terminal domain"
definition: >-
  Orthobunyavirus are enveloped viruses with a genome consisting of 3 ssRNA segments (called L, M and S). The nucleocapsid protein (also known as nucleoprotein) is encoded on the small (S) genomic RNA. The N protein is the major component of the nucleocapsids. This protein is thought to interact with the L protein, virus RNA and/or other N proteins. This superfamily represents the N-terminal domain found in Bunyavirus nucleocapsid (N) protein.
