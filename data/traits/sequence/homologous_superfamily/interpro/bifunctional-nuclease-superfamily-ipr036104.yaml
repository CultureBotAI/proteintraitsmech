identifier: InterPro:IPR036104
label: Bifunctional nuclease superfamily
definition: >-
  The bifunctional nuclease (BFN) domain is specific to bacteria and plant organisms. It has both RNase and DNase activities. The dimer of the BFN domain forms a wedge, each monomer being a basic triangular shape. The BFN domain is composed of an eight-stranded, distorted β-sheet consisting of a four-stranded, antiparallel β-sheet (B1, B2, B3, B8), and a four-stranded mixed β-sheet (B4, B5, B6, B7). The sheets are intercalated by three short α-helices (H1, H3, H4), while a longer α-helix (H2) forms the central core of the dimer interface. Some proteins known to contain a BFN domain are listed below: Thermotoga maritima TM0160, a conserved hypothetical protein. Plant bifunctional nuclease in basal defense response (BBD) proteins, regulators in abscisic acid (ABA)-mediated defense responses. This entry represents the BFN superfamily.
