identifier: InterPro:IPR043131
label: "Branched-chain-amino-acid aminotransferase-like, N-terminal"
definition: >-
  This entry represents the N-terminal small domain of BCATs. Branched-chain aminotransferase (BCAT) catalyses the transamination of the branched-chain amino acids leucine, isoleucine and valine to their respective alpha-keto acids, alpha-ketoisocaproate, alpha-keto-beta-methylvalerate and alpha-ketoisovalerate. The enzyme requires pyridoxal 5'-phosphate (PLP) as a cofactor to catalyse the reaction. It has been found that mammals have two forms of the enzyme - mitochondrial and cytosolic forms, while bacteria contain only one form of the enzyme. BCATs belong to the class 4 type aminotransferases and are widely distributed in many species. Structurally, BCAT comprises two domains, the small domain consists of 7 β-strands and 3 α-helices, the large domain contains 6 β-strands and 3 α-helices. Aminotransferases share certain mechanistic features with other pyridoxal-phosphate dependent enzymes, such as the covalent binding of the pyridoxal-phosphate group to a lysine residue. On the basis of sequence similarity, these various enzymes can be grouped into subfamilies.
