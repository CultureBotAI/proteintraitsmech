identifier: InterPro:IPR044914
label: "Endosialidase, C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal domain of endosialidase, which is approximately 160 amino acids in length. There are two conserved sequence motifs: VSR and YGA. The endosialidase protein forms homotrimeric molecules and this domain complexes into a tail-spike stalk. The stalk region folds in a triple β-helix that is interrupted by a small triple β-prism domain. The tail-spike is a multifunctional protein device used by the phage to fulfil the following functions: (i) to adsorb to the bacterial polySia capsule (ii) to de-polymerise the capsule to gain access to the outer bacterial membrane, and finally (iii) to mediate tight adhesion to the membrane, a prerequisite for the initiation of the infection cycle.
