identifier: InterPro:IPR035952
label: "Rhomboid-like superfamily"
definition: >-
  This entry represents a six transmembrane helix rhomboid domain. This entry also includes derlins, inactive members of the rhomboid family of intramembrane proteases which lack an active site Ser-His dyad but retain the overall rhomboid architecture. This domain is found in serine peptidases belonging to the MEROPS peptidase family S54 (Rhomboid, clan ST). They are integral membrane proteins related to the Drosophila melanogaster (Fruit fly) rhomboid protein . Members of this family are found in archaea, bacteria and eukaryotes. The rhomboid protease cleaves type-1 transmembrane domains using a catalytic dyad composed of serine and histidine. The active site is embedded within the membrane and the active site residues are on different transmembrane regions. From the tertiary structure of the Escherichia coli homologue GlpG it was shown that hydrolysis occurs in a fluid filled cavity within the membrane. Initially, a catalytic triad including a highly conserved asparagine had been proposed, but this residue has been shown not to be essential. Drosophila rhomboid cleaves the transmembrane proteins Spitz, Gurken and Keren within their transmembrane domains to release a soluble TGFalpha-like growth factor. Cleavage occurs in the Golgi, following translocation of the substrates from the endoplasmic reticulum membrane by Star, another transmembrane protein. The growth factors are then able to activate the epidermal growth factor receptor. Few substrates of mammalian rhomboid homologues have been determined, but rhomboid-like protein 2 has been shown to cleave ephrin B3. Parasite-encoded rhomboid enzymes are also important for invasion of host cells by Toxoplasma and the malaria parasite. Invasion of host cells first requires their recognition and this is achieved by parasite…
