identifier: InterPro:IPR009016
label: "Iron hydrogenase"
definition: >-
  The iron-only hydrogenases ( ) catalyse the two-electron reduction of two protons to yield dihydrogen, as part of an energy cycle. Fe-only hydrogenases are restricted to strictly anaerobic microbes, and are often very sensitive to molecular oxygen. The cytoplasmic monomeric Fe hydrogenases are involved in hydrogen production, while the periplasmic, heterodimeric Fe hydrogenases are involved in hydrogen uptake. Fe hydrogenases consist of two, intertwined domains, the catalytic domain and the larger subunit C domain. The larger subunit C domain can be divided into three subdomains. There are five distinct metal clusters, one in the catalytic domain. This superfamily represents the two intertwined domains, the catalytic domain and the large subunit C domain.
