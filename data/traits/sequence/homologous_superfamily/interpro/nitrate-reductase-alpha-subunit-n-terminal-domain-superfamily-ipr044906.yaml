identifier: InterPro:IPR044906
label: "Nitrate reductase, alpha subunit, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal tail of the respiratory nitrate reductase alpha chain. The nitrate reductase complex is a dimer of heterotrimers each consisting of an alpha, beta and gamma chain. The N-terminal tail of the alpha chain interacts with the beta chain and contributes to the stability of the heterotrimer.
