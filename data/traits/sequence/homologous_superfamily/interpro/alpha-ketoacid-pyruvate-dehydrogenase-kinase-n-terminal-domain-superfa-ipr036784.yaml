identifier: InterPro:IPR036784
label: "Alpha-ketoacid/pyruvate dehydrogenase kinase, N-terminal domain superfamily"
definition: >-
  Catabolism and synthesis of leucine, isoleucine and valine are finely balanced, allowing the body to make the most of dietary input but removing excesses to prevent toxic build-up of their corresponding keto-acids. Regulating the activity of the branched-chain alpha-ketoacid dehydrogenase (BCDH) complex is the primary means by which these processes are coordinated. BCDH kinase regulates BCDH by phosphorylation, thereby inactivating it when synthesis is required. The N-terminal domain of the alpha-ketoacid dehydrogenase kinase has a bromodomain-like fold, which consists of four helices arranged in bundle with minor mirror variant of up-and-down topology.
