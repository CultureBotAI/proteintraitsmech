identifier: InterPro:IPR036562
label: Baculovirus p35 superfamily
definition: >-
  The anti-apoptotic protein p35 from baculovirus is thought to prevent the suicidal response of infected insect cells by inhibiting caspases. Ectopic expression of p35 in a number of transgenic animals or cell lines is also anti-apoptotic, giving rise to the hypothesis that the protein is a general inhibitor of caspases. The baculovirus p35 structure forms a sandwich composed of 14 strands in 2 sheets with a greek-key topology.
