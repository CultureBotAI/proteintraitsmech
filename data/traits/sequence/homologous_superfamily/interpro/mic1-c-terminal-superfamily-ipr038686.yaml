identifier: InterPro:IPR038686
label: "MIC1, C-terminal superfamily"
definition: >-
  MIC1 is released as part of a complex by Toxoplasma gondii prior to invasion. The complex, which consists of MIC4-MIC1-MIC6, participates in host cell attachment and penetration, and is critical in invasion. MIC1 is a lactose-binding lectin required for the complex to leave the early compartments of the secretory pathway. This entry represents the C-terminal domain of MIC1, which has a galectin-like fold that interacts with and stabilises MIC6, providing a mechanism for an exit from the early secretory compartments and trafficking of the complex to micronemes. Members of this group belong to apicomplexa.
