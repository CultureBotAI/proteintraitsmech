identifier: InterPro:IPR011336
label: Restriction endonuclease, type II, EcoRI/MunI
definition: >-
  This entry represents restriction endonucleases EcoRI, MunI and RsrI which are closely related in sequence. EcoRI requires magnesium as a cofactor, while MunI does not. EcoRI recognises the DNA sequence GAATTC and cleaves after G-1, while MunI recognises the palindromic hexanucleotide sequence CAATTG and cleaves after C-1. Rsrl is a subtype restriction enzyme that recognises the double-stranded sequence 5'-GAATTC-3' and cleaves after G-1.1. There are four classes of restriction endonucleases: types I, II, III and IV. All types of enzymes recognise specific short DNA sequences and carry out the endonucleolytic cleavage of DNA to give specific double-stranded fragments with terminal 5'-phosphates. They differ in their recognition sequence, subunit composition, cleavage position, and cofactor requirements, as summarised below: Type I enzymes ( ) cleave at sites remote from recognition site; require both ATP and S-adenosyl-L-methionine to function; multifunctional protein with both restriction and methylase ( ) activities. Type II enzymes ( ) cleave within or at short specific distances from recognition site; most require magnesium; single function (restriction) enzymes independent of methylase. Type III enzymes ( ) cleave at sites a short distance from recognition site; require ATP (but doesn't hydrolyse it); S-adenosyl-L-methionine stimulates reaction but is not required; exists as part of a complex with a modification methylase methylase ( ). Type IV enzymes target methylated DNA. Type II restriction endonucleases ( ) are components of prokaryotic DNA restriction-modification mechanisms that protect the organism against invading foreign DNA. These site-specific deoxyribonucleases catalyse the endonucleolytic cleavage of DNA to give specific double-stranded fragments wit…
