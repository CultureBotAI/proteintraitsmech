identifier: InterPro:IPR027433
label: "Lipoxygenase, domain 3"
definition: >-
  This superfamily represents a domain found in lipoxygenases. Lipoxygenases ([ec:1.13.11.-]) are a class of iron-containing dioxygenases which catalyses the hydroperoxidation of lipids, containing a cis,cis-1,4-pentadiene structure. They are common in plants where they may be involved in a number of diverse aspects of plant physiology including growth and development, pest resistance, and senescence or responses to wounding. Plants express a variety of cytosolic isozymes as well as what seems to be a chloroplast isozyme. The iron atom in lipoxygenases is bound by four ligands, three of which are histidine residues. Six histidines are conserved in all lipoxygenase sequences, five of them are found clustered in a stretch of 40 amino acids. This region contains two of the three iron-ligands; the other histidines have been shown to be important for the activity of lipoxygenases.
