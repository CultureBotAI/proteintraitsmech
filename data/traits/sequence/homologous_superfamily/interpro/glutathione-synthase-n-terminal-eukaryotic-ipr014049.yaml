identifier: InterPro:IPR014049
label: Glutathione synthase, N-terminal, eukaryotic
definition: >-
  This superfamily represents the N-terminal domain found in eukaryotic glutathione synthetase ( ) (GSS), a homodimeric enzyme that catalyses the conversion of gamma-L-glutamyl-L-cysteine and glycine to phosphate and glutathione in the presence of ATP. This is the second step in glutathione biosynthesis, the first step being catalysed by gamma-glutamylcysteine synthetase. In humans, defects in GSS are inherited in an autosomal recessive way and are the cause of severe metabolic acidosis, 5-oxoprolinuria, and increased rate of haemolysis and defective function of the central nervous system. The N-terminal domain has a 2-layer α/β structure.
