identifier: InterPro:IPR038155
label: Arterivirus papain-like cysteine protease alpha (PCPalpha) domain superfamily
definition: >-
  Arteriviruses are enveloped, positive-stranded RNA viruses and include pathogens of major economic concern to the swine- and horse-breeding industries: Equine arteritis virus (EAV). Porcine reproductive and respiratory syndrome virus (PRRSV). Mice actate dehydrogenase-elevating virus. Simian hemorrhagic fever virus. The arterivirus replicase gene is composed of two open reading frames (ORFs). ORF1a is translated directly from the genomic RNA, whereas ORF1b can be expressed only by ribosomal frameshifting, yielding a 1ab fusion protein. Both replicase gene products are multidomain precursor proteins which are proteolytically processed into functional nonstructural proteins (nsps) by a complex proteolytic cascade that is directed by four (PRRSV/LDV) or three (EAV) proteinase domains encoded in ORF1a. The arterivirus replicase processing scheme involves the rapid autoproteolytic release of two or three N-terminal nsps (nsp1 (or nsp1alpha/1beta) and nsp2) and the subsequent processing of the remaining polyproteins by the "main protease" residing in nsp4, together resulting in a set of 13 or 14 individual nsps. The arterivirus nsp1 region contains a tandem of papain-like cysteine autoprotease domains (PCPalpha and PCPbeta), but in EAV PCPalpha has lost its enzymatic activity, resulting in the 'merge' of nsp1alpha and nsp1beta into a single nsp1 subunit. Thus, instead of three self-cleaving N-terminal subunits, EAV has two: nsp1 and nsp2. The PCPalpha and PCPbeta domains mediate the nsp1alpha|1beta and nsp1beta|2 cleavages, respectively. The catalytic dyad of PCPalpha and PCPbeta domains is composed of Cys and His residues. In EAV, a Lys residue is found in place of the catalytic Cys residue, which explains the proteolytic deficiency of the EAV PCPalpha domain. The PCPalpha…
