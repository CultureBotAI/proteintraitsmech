identifier: InterPro:IPR038192
label: "Transcription termination and cleavage factor, C-terminal domain superfamily"
definition: >-
  The C-terminal section of cleavage stimulation and termination factor CstF-64 (CSTF2) and its yeast orthologue Rna15 form a discrete structure that is crucial for mRNA 3'-end processing. This domain interacts with Pcf11 and possibly PC4, thus linking CSTF2 to transcription, transcriptional termination, and cell growth.
