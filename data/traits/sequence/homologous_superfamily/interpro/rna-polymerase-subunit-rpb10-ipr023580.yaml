identifier: InterPro:IPR023580
label: "RNA polymerase subunit RPB10"
definition: >-
  The RNA polymerase subunit RPB10 displays a high level of conservation across archaea and eukaryota. Structure determination of this subunit reveals a zinc-bundle topology, consisting of three α-helices stabilised by a zinc ion.
