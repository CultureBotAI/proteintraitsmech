identifier: InterPro:IPR029787
label: "Nucleotide cyclase"
definition: >-
  A common fold is found in the adenylyl and guanylyl cyclase catalytic domain and the diguanylate cyclase (DGC or GGDEF) domain. It consists of a ferredoxin-like fold with additional secondary structures. Though the fold of the GGDEF domain is similar to adenylate cyclase, the nucleotide-binding mode is substantially different.
