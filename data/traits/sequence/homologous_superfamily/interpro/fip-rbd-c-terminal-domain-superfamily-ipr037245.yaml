identifier: InterPro:IPR037245
label: "FIP-RBD, C-terminal domain superfamily"
definition: >-
  The Rab11 GTPase regulates recycling of internalized plasma membrane receptors and is essential for completion of cytokinesis. A family of Rab11 interacting proteins (FIPs) that conserve a C-terminal Rab-binding domain (RBD) selectively recognise the active form of Rab11. FIPs are diverse in sequence length and composition toward their N-termini, presumably a feature that underpins their specific roles in Rab11-mediated vesicle trafficking. They have been divided into three subfamilies (classe I, II, and III)on the basis of domain architecture. Class I FIPs comprises a subfamily of three proteins (Rip11/pp75/FIP5, Rab-coupling protein (RCP), and FIP2) that possess an N-terminal C2 domain, localize to recycling endosomes, and regulate plasma membrane recycling. The class II subfamily consists of two proteins (FIP3/eferin/arfophilin and FIP4) with tandem EF hands and a proline-rich region. Class II FIPs localize to recycling endosomes, the trans-Golgi network, and have been implicated in the regulation of membrane trafficking during cytokinesis. The class III subfamily consists of a single protein, FIP1, which does not contain obvious homology domains or motifs other than the FIP-RBD. The FIP-RBD domain is also found in Rab6-interacting protein Erc1/Elks. Erc1 is the regulatory subunit of the IKK complex and probably recruits IkappaBalpha/NFKBIA to the complex. It may be involved in the organisation of the cytomatrix at the nerve terminals active zone (CAZ) which regulates neurotransmitter release. It may also be involved in vesicle trafficking at the CAZ, as well as in Rab-6 regulated endosomes to Golgi transport. The FIB-RBD domain consists of an N-terminal long α-helix, followed by a 90 degrees bend at a conserved proline residue, a 3(10) helix and a C-terminal short…
