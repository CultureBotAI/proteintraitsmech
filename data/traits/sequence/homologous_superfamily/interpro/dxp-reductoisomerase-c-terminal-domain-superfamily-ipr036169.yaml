identifier: InterPro:IPR036169
label: "DXP reductoisomerase, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal domain of the 1-deoxy-D-xylulose-5-phosphate reductoisomerase enzymes. This domain forms a left handed super-helix. DXP reductoisomerase catalyses the NADP-dependent rearrangement and reduction of 1-deoxy-D-xylulose-5-phosphate (DXP) to 2-C-methyl-D-erythritol 4-phosphate (MEP).
