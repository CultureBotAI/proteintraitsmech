identifier: InterPro:IPR042307
label: "Reeler domain superfamily"
definition: >-
  The reeler or reelin domain is a ~170 amino acid module, which has been identified in the amino terminus of the extracellular matrix proteins reelin and F-spondin (renamed Spon1). The reelin domain is found in association with other modules, such as the thrombospondin type I repeat (TSP1), the spondin domain, the fibronectin type III domain or the Kunitz trypsin protease inhibitor domain. Its function is not yet known. Extracellular matrix (ECM) proteins play an important role in early cortical development, specifically in the formation of neural connections and in controlling the cyto-architecture of the central nervous system. The product of the reeler gene in mouse is reelin,a large extracellular protein secreted by pioneer neurons that coordinates cell positioning during neurodevelopment. F-spondin and mindin are a family of matrix-attached adhesion molecules that share structural similarities and overlapping domains of expression. Both F-spondin and mindin promote adhesion and outgrowth of hippocampal embryonic neurons and bind to a putative receptor(s) expressed on both hippocampal and sensory neurons. Structurally, the reeler domain of F-spondin is composed of four-stranded and five-stranded antiparallel β-sheets that are arranged in a β-sandwich fold.
