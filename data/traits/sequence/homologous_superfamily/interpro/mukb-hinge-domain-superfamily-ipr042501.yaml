identifier: InterPro:IPR042501
label: "MukB, hinge domain superfamily"
definition: >-
  This superfamily represents the hinge domain of E. coli's chromosome partition protein MukB, homologous to the SMC (structural maintenance of chromosomes) protein found in eubacteria. MukB and topo IV interact physically. MukB can stimulate the ability of topo IV to relax negatively supercoiled DNA. This hinge domain, also known as dimerisation domain, is not only involved in dimerisation, but it has also been implicated in both conformational flexibility and dynamic protein-DNA interactions.
