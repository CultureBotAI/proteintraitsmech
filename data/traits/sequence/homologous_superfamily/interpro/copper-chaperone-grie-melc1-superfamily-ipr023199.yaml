identifier: InterPro:IPR023199
label: "Copper chaperone GriE/MELC1 superfamily"
definition: >-
  This superfamily represents the 2-layer α/β sandwich domain of tyrosinase co-factor MELC1 and copper chaperone GriE. The melanin operon (melC) of Streptomyces antibioticus contains two genes, melC1 and melC2 (apotyrosinase). It is thought that MelC1 forms a transient binary complex with the downstream apotyrosinase MelC2 to facilitate the incorporation of copper ion and the secretion of tyrosinase indicating that MelC1 is a chaperone for the apotyrosinase MelC2.
