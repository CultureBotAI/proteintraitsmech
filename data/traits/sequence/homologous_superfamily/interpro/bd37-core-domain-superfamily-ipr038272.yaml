identifier: InterPro:IPR038272
label: "Bd37, core domain superfamily"
definition: >-
  This entry represents the core domain of Bd37, a surface antigen of B. divergens which is GPI-anchored at the surface of the merozoite. The structure of the domain consists of mainly α folds and has three sub domains.
