identifier: InterPro:IPR043038
label: "Antitoxin VbhA domain superfamily"
definition: >-
  VbhT is a bacterial Fic protein of the mammalian pathogen B. schoenbuchensis. It is composed of an N-terminal FIC domain and a C-terminal BID domain. FIC domains are known to catalyse adenylylation (also called AMPylation). This entry represents VbhA, an antitoxin that binds FIC domain (filamentation induced by cyclic AMP) of VbhT and inhibits its activity. It inhibits the adenylylation activity of VbhT by positioning close to the putative ATP-binding site, hence competing with ATP binding. Structurally, VbhA consists of 3 α helices.
