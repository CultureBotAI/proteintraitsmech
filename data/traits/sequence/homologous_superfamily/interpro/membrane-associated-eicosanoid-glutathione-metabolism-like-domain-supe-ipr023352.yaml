identifier: InterPro:IPR023352
label: "Membrane associated eicosanoid/glutathione metabolism-like domain superfamily"
definition: >-
  This domain is found in a widespread superfamily known as MAPEG (Membrane Associated Proteins in Eicosanoid and Glutathione metabolism). Included in this superfamily are: 5-lipoxygenase activating protein (gene FLAP), which seems to be required for the activation of 5-lipoxygenase. Leukotriene C4 synthase ( ), which catalyses the production of LTC4 from LTA4. Microsomal glutathione S-transferase II ( ) (GST-II), which also produces LTC4 from LTA4. Prostaglandin E synthase, which catalyses the synthesis of PGE2 from PGH2 (produced by cyclooxygenase from arachidonic acid). The structure of this domain consists of four transmembrane helices.
