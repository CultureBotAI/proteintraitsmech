identifier: InterPro:IPR035956
label: "RimP, N-terminal domain superfamily"
definition: >-
  This entry represents the N-terminal domain of the ribosome maturation factor RimP (also known as yhbC), which facilitates maturation of the 30S ribosomal subunit. The N-terminal domain contains two α-helices and a three-stranded β-sheet.
