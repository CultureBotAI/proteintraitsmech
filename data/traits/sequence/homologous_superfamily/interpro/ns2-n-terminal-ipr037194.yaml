identifier: InterPro:IPR037194
label: NS2, N-terminal
definition: >-
  The non-structural protein 2 (NS2) is a non-specific single-stranded RNA-binding protein that forms large homomultimers and accumulates in viral inclusion bodies of infected cells. Three RNA-binding regions have been identified in Bluetongue virus 17 ( ) at residues 2-11, 153-166 and 274-286. NS2 multimers also possess nucleotidyl phosphatase activity. The precise function of NS2 is not known, but it may be involved in the transport and condensation of viral mRNAs. This entry represents the N-terminal domain of NS2. It contains a β sandwich structure composed of nine strands arranged in two sheets with unusual topology with two crossover loops.
