identifier: InterPro:IPR004216
label: "L-fucose/L-arabinose isomerase, C-terminal"
definition: >-
  L-fucose isomerase ( ) converts the aldose L-fucose into the corresponding ketose L-fuculose during the first step in fucose metabolism using Mn2+ as a cofactor. The enzyme is a hexamer, forming the largest structurally known ketol isomerase, and has no sequence or structural similarity with other ketol isomerases. The structure was determined by X-ray crystallography at 2.5 A resolution.
