identifier: InterPro:IPR037224
label: PapC, N-terminal domain superfamily
definition: >-
  Bacteiral pili are assembled using the chaperone usher system. In E. coli this is composed of the chaperone PapD and the usher PapC. This domain represents the N-terminal domain from PapC and its homologues. This domain is involved in substrate binding.
