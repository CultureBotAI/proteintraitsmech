identifier: InterPro:IPR036206
label: "Thiamin phosphate synthase superfamily"
definition: >-
  Thiamine phosphate synthase (TPS) catalyses the substitution of the pyrophosphate of 2-methyl-4-amino-5- hydroxymethylpyrimidine pyrophosphate by 4-methyl-5- (beta-hydroxyethyl)thiazole phosphate to yield thiamine phosphate in the thiamine biosynthesis pathway. TenI, a protein from Bacillus subtilis that regulates the production of several extracellular enzymes by reducing alkaline protease production belongs to this group. While TenI shows high sequence similarity with thiamin phosphate synthase, the purified protein has no thiamin phosphate synthase activity. Instead, it is a thiazole tautomerase.
