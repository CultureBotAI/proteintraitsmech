identifier: InterPro:IPR037146
label: Colicin/pyocin, DNase domain superfamily
definition: >-
  This entry represents the DNase domain found in some colicin/pyocin bacteriocins, including colicin E2, E7, E9 and pyocin S1 and S2. In colicin E7, this domain has been described as a novel α/β fold containing a Zn2+ ion binding site. Bacteriocins are protein antibiotics that kill bacteria closely related to the producing species. Colicins are a subgroup of bacteriocins that are produced by and target Escherichia coli. The lethal action of most colicins is exerted either by formation of a pore in the cytoplasmic membrane of the target cell, or by an enzymatic nuclease digestion mechanism. S-type pyocins cause cell death by DNA breakdown due to its endonuclease activity.
