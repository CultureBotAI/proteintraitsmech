identifier: InterPro:IPR045860
label: "Snake toxin-like superfamily"
definition: >-
  This domain superfamily is predominantly found in venomous neurotoxins and cytotoxins from snakes, but also structurally similar (non-snake) toxin-like proteins (TOLIPs) such as Lymphocyte antigen 6D, Ly6/PLAUR domain-containing protein, CD59 glycoprotein, Urokinase plasminogen activator surface receptor, Activin receptors and related proteins. Snake toxins are short proteins with a compact, disulphide-rich structure. TOLIPs have similar structural features (abundance of spaced cysteine residues, a high frequency of charge residues, a signal peptide for secretion and a compact structure). This structure can be found in the extracellular domain of TGF-beta-family receptors. This domain can also be found in BMP and activin membrane-bound inhibitor (BAMBI), which is a regulator related to TGF-beta-family type I receptors but lacks an intracellular kinase domain.
