identifier: InterPro:IPR037263
label: Phosphoprotein, central domain
definition: >-
  This entry contains the central domain of the phosphoprotein from vesiculoviruses, which are ssRNA negative-strand rhabdoviruses. It is known as the phosphoprotein or P protein. This protein may be part of the RNA dependent RNA polymerase complex. The phosphorylation states of this protein may regulate the transcription and replication complexes. The structure of this domain consists of an intertwinned homodimer of β(2)-α-β(2) motifs arranged in three layers (β/α/β); each antiparallel β-sheet is formed by the N-terminal β-hairpin of one subunit and the C-terminal β-hairpin of the other subunit.
