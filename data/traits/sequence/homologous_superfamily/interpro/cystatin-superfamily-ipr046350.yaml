identifier: InterPro:IPR046350
label: "Cystatin superfamily"
definition: >-
  The cystatin superfamily comprises cysteine protease inhibitors that play key regulatory roles in protein degradation processes. This superfamily includes cystatins, cathelicidins, staphopains, kininogens, latexins and secreted phosphoprotein 24 (Spp-24). The progenitor of this superfamily was most probably intracellular and lacked a signal peptide and disulphide bridges, much like the extant Giardia cystatin. A primordial gene duplication produced two ancestral eukaryotic lineages, cystatins and stefins. Stefins remain encoded by a single or a small number of genes throughout the eukaryotes, whereas the cystatins have undergone a more complex and dynamic evolution through numerous gene and domain duplications. Members of this superfamily differ in amino acid sequence, but they share a conserved fold, consisting of a five-stranded anti-parallel β-sheet wrapped around a five-turn α-helix. Cystatins are cysteine proteinase inhibitors belonging to MEROPS inhibitor family I25, clan IH. They mainly inhibit peptidases belonging to peptidase families C1 (papain family) and C13 (legumain family). The cystatin family includes: The Type 1 cystatins, which are intracellular cystatins that are present in the cytosol of many cell types, but can also appear in body fluids at significant concentrations. They are single-chain polypeptides of about 100 residues, which have neither disulphide bonds nor carbohydrate side chains. The Type 2 cystatins, which are mainly extracellular secreted polypeptides synthesised with a 19-28 residue signal peptide. They are broadly distributed and found in most body fluids. The Type 3 cystatins, which are multidomain proteins. The mammalian representatives of this group are the kininogens. There are three different kininogens in mammals: H- (high molec…
