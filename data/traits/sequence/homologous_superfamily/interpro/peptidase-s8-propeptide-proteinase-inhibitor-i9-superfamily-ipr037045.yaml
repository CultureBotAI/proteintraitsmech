identifier: InterPro:IPR037045
label: "Peptidase S8 propeptide/proteinase inhibitor I9 superfamily"
definition: >-
  This entry represents the propeptide domains superfamily found at the N terminus of peptidases belonging to MEROPS family S8A, subtilisins. The subtilisin propeptides are known to function as molecular chaperones, assisting in the folding of the mature peptidase. The propeptide is removed by proteolytic cleavage; removal activating the enzyme. This domain is also found in members of MEROPS proteinase inhibitor family I9. Proteinase propeptide inhibitors (sometimes refered to as activation peptides) are responsible for the modulation of folding and activity of the pro-enzyme or zymogen. The pro-segment docks into the enzyme moiety shielding the substrate binding site, thereby promoting inhibition of the enzyme. Several such propeptides share a similar topology, despite often low sequence identities. The propeptide region has an open-sandwich antiparallel-α/antiparallel-β fold, with two α-helices and four β-strands with a (β/α/β)x2 topology.
