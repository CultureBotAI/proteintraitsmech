identifier: InterPro:IPR036026
label: Seven-hairpin glycosidases
definition: >-
  Glycoside hydrolase family 47 comprises enzymes with only one known activity; alpha-mannosidase ( ). Alpha-mannosidase is involved in the maturation of Asn-linked oligo-saccharides. The enzyme hydrolyses terminal 1,2-linked alpha-D-mannose residues in the oligo-mannose oligosaccharide man(9)(glcnac)(2) in a calcium-dependent manner. The mannose residues are trimmed away to produce, first, man(8)glcnac(2), then a man(5)(glcnac)(2) structure. O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
