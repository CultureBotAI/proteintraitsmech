identifier: InterPro:IPR036141
label: "MukF, middle domain superfamily"
definition: >-
  This entry represents the middle coiled-coil domain superfamily of MukF. MukF is involved in chromosome condensation, segregation and cell cycle progression. MukE along with MukF interact with MukB in vivo forming a complex, which is required for chromosome condensation and segregation in Escherichia coli. The Muk complex appears to be similar to the SMC-ScpA-ScpB complex in other prokaryotes where MukB is the homologue of SMC. This domain is responsible for binding the ATPase domain of MukB and bind MukE.
