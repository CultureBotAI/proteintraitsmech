identifier: InterPro:IPR036645
label: "Elafin-like superfamily"
definition: >-
  Elafin is an elastase inhibitor. It contains a flat core and a flexible N-terminal extremity, the three-dimensional structure is formed by a central twisted β-hairpin accompanied by two external segments linked by the proteinase binding loop. This superfamily describes the C-terminal four-disulphide core or Whey Acidic Protein (WAP) domain, which harbours a functional motif involved in binding of proteinases and possibly other proteins.
