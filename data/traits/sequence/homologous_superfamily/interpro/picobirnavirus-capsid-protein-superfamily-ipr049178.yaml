identifier: InterPro:IPR049178
label: "Picobirnavirus capsid protein superfamily"
definition: >-
  This entry represents a group of proteins from picobirnavirus, including Capsid protein precursor from Human picobirnavirus. Picobirnaviruses have a unique layer with icosahedral architecture consisting of 60 quasi-symmetric dimers of a its Capsid protein (CP). This protein is organised into two domains, a shell (S) domain that contains all of the α-helices and two β-sheets, and a projecting (P) domain that includes the remaining β-sheets. The dimer is stabilised by domain swapping.
