identifier: InterPro:IPR011004
label: "Trimeric LpxA-like superfamily"
definition: >-
  This domain superfamily is characterised by trimeric LpxA-like enzymes that display a single-stranded left-handed β-helix fold, composed of tandem repeats of a hexapeptide, as represented by the Bacterial transferase hexapeptide repeat, where the hexapeptide repeats correspond to individual strands. Many bacterial transferases contain this domain. The structures of several proteins with this domain have been determined, including UDP N-acetylglucosamine acyltransferase (LpxA, ) from Escherichia coli, the first enzyme in the lipid A biosynthetic pathway; galactoside acetyltransferase (GAT, LacA, ) from E. coli, a gene product of the lac operon that may assist cellular detoxification; gamma-class Archaeon carbonic anhydrase, a zinc-containing enzyme that catalyses the reversible hydration of carbon dioxide; tetrahydrodipicolinate-N-succinlytransferase (DapD) from Mycobacterium bovis, an enzyme from the lysine biosynthetic pathway that contains an extra N-terminal 3-helical domain; and the C-terminal domain of N-acetylglucosamine 1-phosphate uridyltransferase (GlmU, ) from E. coli, a trimeric bifunctional enzyme that catalyses the last two sequential reactions in the de novo biosynthetic pathway for UDP-N-acetylglucosamine, an essential precursor for many biomolecules.
