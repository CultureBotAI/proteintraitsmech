identifier: InterPro:IPR037216
label: "DNA terminal protein Gp3 superfamily"
definition: >-
  The DNA terminal protein Gp3, found in a number of Bacillus phages, is linked to the 5' ends of both strands of the genome through a phosphodiester bond between the β-hydroxyl group of a serine residue and the 5'-phosphate of the terminal deoxyadenylate. This protein is essential for DNA replication and is involved in the priming of DNA elongation. Gp3 has a multihelical structure arranged as an open array. It contains a C-terminal four-helical bundle with a left-handed superhelix.
