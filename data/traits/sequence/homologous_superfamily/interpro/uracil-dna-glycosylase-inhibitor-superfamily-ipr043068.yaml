identifier: InterPro:IPR043068
label: "Uracil DNA glycosylase inhibitor superfamily"
definition: >-
  Uracil-DNA glycosylase inhibitors are DNA mimic proteins that prevent the DNA binding sites of UDGs (Uracil DNA glycosylase) from interacting with their DNA substrate. This superfamily represents the Staphylococcus aureus' uracil-DNA glycosylase inhibitor (SAUGI) which acts as a uracil-DNA glycosylase inhibitor that breaks the uracil-removing activity of S. aureus uracil-DNA glycosylase (SAUDG). This way, SAUGI prevents SAUDG from binding to its DNA substrate and performing DNA repair.
