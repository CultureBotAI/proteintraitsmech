identifier: InterPro:IPR012675
label: "Beta-grasp domain superfamily"
definition: >-
  This superfamily represents a domain with a β-grasp fold and a core structure consisting of β(2)-α-β(2), which is similar to that found in ubiquitin. Domains with this type of structure are found in the 2Fe-2S ferredoxin family (including putidaredoxin and adrenodoxin), the 2Fe-2S ferredoxin-related family (including aldehyde reductase and xanthine dehydrogenase), the TGS family (including threonyl-tRNA synthetase) and the MoaD/ThiS family (including molybdopterin and thiamine biosynthesis sulphur carrier protein).
