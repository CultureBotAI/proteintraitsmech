identifier: InterPro:IPR035902
label: "Nucleoside phosphorylase/phosphoribosyltransferase catalytic domain superfamily"
definition: >-
  The nucleoside phosphorylase and the phosphoribosyltransferase catalytic domain belongs to the glycosyl transferase family. The glycosyl transferase family includes anthranilate phosphoribosyltransferase (TrpD, ) and thymidine phosphorylase ( ). All these proteins can transfer a phosphorylated ribose substrate. Thymidine phosphorylase ( ) catalyses the reversible phosphorolysis of thymidine, deoxyuridine and their analogues to their respective bases and 2-deoxyribose 1-phosphate. This enzyme regulates the availability of thymidine and is therefore essential to nucleic acid metabolism. The structure is composed of three layers (α/β/α) arranged in parallel β-sheets of five strands.
