identifier: InterPro:IPR036246
label: "Cytochrome c oxidase polypeptide 2A, ba3 type"
definition: >-
  The ba3-type cytochrome c oxidase from Thermus thermophilus is known as a two subunit enzyme. From its crystal structure, it was discovered that an additional transmembrane helix, subunit IIa, spans the membrane. This subunit consists of 34 residues forming one helix across the membrane. The presence of this subunit seems to be important for the function of cytochrome c oxidases.
