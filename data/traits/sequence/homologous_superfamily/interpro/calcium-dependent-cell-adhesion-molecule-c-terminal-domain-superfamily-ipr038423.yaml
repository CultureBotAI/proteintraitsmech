identifier: InterPro:IPR038423
label: "Calcium-dependent cell adhesion molecule, C-terminal domain superfamily"
definition: >-
  This domain is found at the C terminus of Dictyostelium discoideum Calcium-dependent cell adhesion molecule, which has an immunoglobulin-like fold. It tethers the protein to the cell membrane. Calcium-dependent cell adhesion molecule 1 mediates calcium-dependent cell-cell adhesion during the early stage of development.
