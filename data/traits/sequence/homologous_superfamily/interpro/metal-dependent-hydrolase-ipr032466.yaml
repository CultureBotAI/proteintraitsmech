identifier: InterPro:IPR032466
label: "Metal-dependent hydrolase"
definition: >-
  The structural landmark of the metallo-dependent hydrolases (the amidohydrolase superfamily) is a (β/α)8-barrel fold (TIM barrel fold) with transition metal ions bound inside the barrel. This enzyme group comprises hundreds of hydrolytic enzymes with a diverse spectrum of substrates and reactions. Members have mono- or binuclear active-site metal centres, and play key roles in many fundamental processes.
