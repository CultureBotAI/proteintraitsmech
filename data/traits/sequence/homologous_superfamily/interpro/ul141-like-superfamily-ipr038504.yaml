identifier: InterPro:IPR038504
label: "UL141-like superfamily"
definition: >-
  UL141 is a a glycoprotein from herpesvirus species. Its N-terminal Ig-like β-sandwich domain binds to the cysteine-rich region of TRAIL-R2, a family of tumour necrosis factor receptor proteins. UL141 is both necessary and sufficient to retain TRAIL receptors in the ER, thereby preventing their cell surface expression and it is also necessary and sufficient to inhibit cell surface expression of CD155.
