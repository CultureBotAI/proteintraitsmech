identifier: InterPro:IPR036700
label: "Bacterial OB-fold superfamily"
definition: >-
  Proteins in this entry have an OB-fold fold (oligonucleotide/oligosaccharide binding motif). Analysis of the predicted nucleotide-binding site of the OB-fold suggests that they lack nucleic acid-binding properties. They contain a predicted N-terminal signal peptide which indicates that they localise to the periplasm where they may function to bind proteins, small molecules, or other typical OB-fold ligands. As hypothesised for the distantly related OB-fold containing bacterial enterotoxins, the loss of nucleotide-binding function and the rapid evolution of the OB-fold ligand-binding site may be associated with the presence of members in mobile genetic elements and their potential role in bacterial pathogenicity. Structurally, an OB-fold domain has a close or partly open barrel fold and a greek-key topology.
