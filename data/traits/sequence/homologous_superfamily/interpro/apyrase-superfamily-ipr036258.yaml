identifier: InterPro:IPR036258
label: Apyrase superfamily
definition: >-
  This superfamily contains several eukaryotic apyrase (or adenosine diphosphatase) proteins ( ), and related nucleoside diphosphatases ( ). The salivary apyrases of blood-feeding arthropods are nucleotide hydrolysing enzymes implicated in the inhibition of host platelet aggregation through the hydrolysis of extracellular adenosine diphosphate. Soluble calcium-activated nucleotidase 1 (CANT1) is the human homologue.
