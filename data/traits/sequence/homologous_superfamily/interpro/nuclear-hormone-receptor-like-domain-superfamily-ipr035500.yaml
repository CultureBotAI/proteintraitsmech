identifier: InterPro:IPR035500
label: "Nuclear hormone receptor-like domain superfamily"
definition: >-
  Steroid or nuclear hormone receptors constitute an important superfamily of transcription regulators that are involved in widely diverse physiological functions, including control of embryonic development, cell differentiation and homeostasis. The receptors function as dimeric molecules in nuclei to regulate the transcription of target genes in a ligand-responsive manner. Nuclear hormone receptors consist of a highly conserved DNA-binding domain that recognises specific sequences ( ), connected via a linker region to a C-terminal ligand-binding domain. In addition, certain nuclear hormone receptors have an N-terminal modulatory domain ( ). The ligand-binding domain acts in response to ligand binding, which caused a conformational change in the receptor to induce a response, thereby acting as a molecular switch to turn on transcriptional activity. For example, after binding of the glucocorticoid receptor to the corticosteroid ligand, the receptor is induced to perform functions ranging from nuclear translocation, oligomerization, cofactor/kinase/transcription factor association, and DNA binding. The ligand-binding domain is a flexible unit, where the binding of a ligand stabilises its conformation, which in turn favours coactivator binding to modify receptor activity; the coactivator can bind to the activator function 2 (AF2) site at the C-terminal end of the ligand-binding domain. The binding of different ligands can alter the conformation of the ligand-binding domain, which ultimately affects the DNA-binding specificity of the DNA-binding domain. In the absence of ligand, steroid hormone receptors are thought to be weakly associated with nuclear components. This entry represents the all helical domain involved in ligand-binding.
