identifier: InterPro:IPR036913
label: "YegP-like superfamily"
definition: >-
  This is a uncharacterised domain superfamily. This domain is often found as tandem repeats and in some cases represent the whole protein. It can also be found in the C-terminal region of a putative tryptophan--tRNA ligase ( ). The structure of this domain comprises two subunits or tandem repeats of β(3)-α-β motifs, these assemble with the formation of a single β-sheet and swapping of the C-terminal strands.
