identifier: InterPro:IPR028975
label: "Diol dehydratase-reactivating factor, alpha subunit, swiveling domain superfamily"
definition: >-
  This superfamily represents the swivelling β/β/α domain found in diol dehydratase-reactivating factor alpha subunit (DDRA). DDRA is the alpha subunit of the diol dehydratase-reactivating factor (DDR) or DD reactivase. DDR reactivates the inactivated diol dehydratase holoenzyme in the presence of ATP and magnesium by mediating the exchange of the tightly bound damaged cofactor for free intact coenzyme. The reactivation is mediated by a complex of two proteins: a large subunit (DdrA/PduG) and a small subunit (DdrB/PduH, ).
