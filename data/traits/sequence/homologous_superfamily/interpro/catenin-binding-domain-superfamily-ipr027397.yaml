identifier: InterPro:IPR027397
label: "Catenin binding domain superfamily"
definition: >-
  This superfamily represents the catenin binding domain. Proteins containing this domain include cadherins, desmocollins, desmoglein and transcription factor 7-like proteins. Cadherins and catenins play important roles in the adherents junctions in animal cells. The cadherin-catenin complex is responsible for coupling Ca(2+)-dependent intercellular junctions with actin dynamics and signalling pathways. Desmosomal cadherins are TM protein components of desmosomes (for review, see), whose extracellular cadherin repeats are responsible for adhesion and whose intracellular regions interact with intermediate filaments via desmosomal plaque proteins plakoglobin, plakobilin and desmoplakin. They are believed to play a wider role in regulation of epithelial differentiation. Two sub-families of desmosomal cadherin have been identified, desmocollin (DSC) and desmoglein (DSG).
