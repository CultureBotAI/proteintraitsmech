identifier: InterPro:IPR036919
label: "Large ribosomal subunit protein uL30, ferredoxin-like fold domain superfamily"
definition: >-
  Ribosomal protein uL30 is one of the proteins from the large ribosomal subunit. uL30 belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups bacteria and archaea uL30, yeast mitochondrial L33, and Drosophila melanogaster, Dictyostelium discoideum (Slime mold), fungal and mammalian L7 ribosomal proteins which are now referred to as ul30m. uL30 from bacteria are small proteins of about 60 residues, those from archaea are proteins of about 150 residues, and eukaryotic L7 are proteins of about 250 to 270 residues. This entry represents a domain superfamily with a ferredoxin-like fold, with a core structure consisting of core: β-α-β-α-β. This domain is found in prokaryotic ribosomal protein uL30 (short-chain member of the family), as well as in archaeal uL30 (L30a) (long-chain member of the family), the later containing an additional C-terminal (sub)domain).It is also found in nucleolar proteins with similarity to large ribosomal subunit L7 proteins. These are constituents of 66S pre-ribosomal particles and play an essential role in processing of precursors to the large ribosomal subunit RNAs.
