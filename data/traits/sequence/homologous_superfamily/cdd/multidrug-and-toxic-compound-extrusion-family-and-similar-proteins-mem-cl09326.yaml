identifier: CDD:cl09326
label: "Multidrug and toxic compound extrusion family and similar proteins. Members of this family are integral membrane proteins. Many members of the family are implicated in production of polysaccharide. The family includes RfbX part of the O antigen biosynthesis operon. The family includes SpoVB from Bacillus subtilis, which is involved in spore cortex biosynthesis."
definition: >-
  Multidrug and toxic compound extrusion family and similar proteins. Members of this family are integral membrane proteins. Many members of the family are implicated in production of polysaccharide. The family includes RfbX part of the O antigen biosynthesis operon. The family includes SpoVB from Bacillus subtilis, which is involved in spore cortex biosynthesis. — an NCBI CDD domain superfamily (cl09326); members share this curated model.
