identifier: CDD:cl03563
label: MraZ
definition: >-
  protein domain of unknown function (UPF0040) includes MraZ. This small 70 amino acid domain is found duplicated in a family of bacterial proteins. These proteins may be DNA-binding transcription factors (Pers. comm. A Andreeva & A Murzin). It is likely, due to the similarity of fold, that this family acts as a bacterial antitoxin like the MazE antitoxin family
