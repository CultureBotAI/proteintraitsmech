identifier: CDD:cl39943
label: "inhibitor (or immunity protein) of the contact-dependent growth inhibition (CDI) system of Escherichia coli STEC_O31, Neisseria meningitidis MC58, and similar proteins. Contact-dependent growth inhibition (CDI) is a mechanism of inter-cellular competition in which Gram-negative bacteria exchange polymorphic toxins using type V secretion systems. Structure analysis of the CDI toxin from Escherichia coli NC101 reveals that it has moderate structural homology to Whirly-like proteins found in plastids, but appears to lack the characteriztic Whirly RNA-binding site."
definition: >-
  inhibitor (or immunity protein) of the contact-dependent growth inhibition (CDI) system of Escherichia coli STEC_O31, Neisseria meningitidis MC58, and similar proteins. Contact-dependent growth inhibition (CDI) is a mechanism of inter-cellular competition in which Gram-negative bacteria exchange polymorphic toxins using type V secretion systems. Structure analysis of the CDI toxin from Escherichia coli NC101 reveals that it has moderate structural homology to Whirly-like proteins found in plastids, but appears to lack the characteriztic Whirly RNA-binding site. — an NCBI CDD domain superfamily (cl39943); members share this curated model.
