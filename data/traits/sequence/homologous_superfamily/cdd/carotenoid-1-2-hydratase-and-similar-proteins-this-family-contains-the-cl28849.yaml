  carotenoid 1,2-hydratase and similar proteins. This family contains the members of the old Pfam family DUF2006. Structural characterization of family member Swiss:Q82US3 (from DUF2006 now merged into this family) has revealed a lipocalin-like fold with domain duplication. This entry represents the C-terminal domain of the pair
