identifier: CDD:cl17157
label: Alt_A1
definition: >-
  Alternaria alternata allergen Alt a 1. AltA1 is a family of fungal allergens. It shows a unique beta-barrel comprising 11 beta-strands. There is structural evidence for the location of IgE antibody-binding epitopes. The crystal structure will allow efforts to promote immunotherapy for patients allergic to Alternaria species
