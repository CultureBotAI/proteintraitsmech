identifier: CDD:cl02554
label: "PWWP (Pro-Trp-Trp-Pro) domain. NSD3, also called histone-lysine N-methyltransferase NSD3, protein whistle, WHSC1-like 1 isoform 9 with methyltransferase activity to lysine, or Wolf-Hirschhorn syndrome candidate 1-like protein 1 (WHSC1-like protein 1, or WHSC1L1), is a lysine methyltransferase encoded by gene NSD3, which is amplified in human breast cancer cell lines. Moreover, translocation resulting in NUP98 fusion to NSD3 leads to the development of acute myeloid leukemia. NSD3 contains a catalytic suppressor of variegation, enhancer of zeste and trithorax (SET) domain, two proline-tryptophan-tryptophan-prolin motif (PWWP) domains, five plant-homeodomain (PHD) zinc finger motifs, and an NSD-specific Cys-His rich domain (C5HCH). The SET domain is responsible for histone methyltransferase activity. The PWWP and PHD domains are involved in protein-protein interactions. This model corresponds to the second PWWP domain. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
