identifier: CDD:cl00749
label: "Escherichia coli YaeB and related proteins. This family includes members such as TrmO (tRNA-methyltransferase O) also known as YaeB, which contains a single-sheeted beta-barrel structure. TrmO is an AdoMet-dependent methyltransferase responsible for m6t6A formation. Its human homolog, is responsible for formation of m6t6A37 in cytoplasmic tRNASer. Lack of TrmO decreases attenuation activity of the thr operon, indicating that N6 methylation of m6t6A37 ensures efficient decoding of ACY codons. In bacteria and eukaryotes, TrmO has a C-terminal domain containing the conserved DPRxxY motif. Where the Asp194 and Arg196 in this motif of E. coli TrmO are necessary for N6-methylation. However, no archaeal YaeB has a C-terminal domain containing the DPRxxY motif that is conserved in bacterial and mammalian TrmO homologs."
definition: >-
  Escherichia coli YaeB and related proteins. This family includes members such as TrmO (tRNA-methyltransferase O) also known as YaeB, which contains a single-sheeted beta-barrel structure. TrmO is an AdoMet-dependent methyltransferase responsible for m6t6A formation. Its human homolog, is responsible for formation of m6t6A37 in cytoplasmic tRNASer. Lack of TrmO decreases attenuation activity of the thr operon, indicating that N6 methylation of m6t6A37 ensures efficient decoding of ACY codons. In bacteria and eukaryotes, TrmO has a C-terminal domain containing the conserved DPRxxY motif. Where the Asp194 and Arg196 in this motif of E. coli TrmO are necessary for N6-methylation. However, no archaeal YaeB has a C-terminal domain containing the DPRxxY motif that is conserved in bacterial and mammalian TrmO homologs. — an NCBI CDD domain superfamily (cl00749); members share this curated model.
