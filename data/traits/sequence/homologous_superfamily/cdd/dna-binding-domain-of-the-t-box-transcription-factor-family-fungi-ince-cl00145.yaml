identifier: CDD:cl00145
label: T-box
definition: >-
  DNA-binding domain of the T-box transcription factor family. Fungi incertae sedis refers to a fungal taxonomic group where its broader relationships are unknown or undefined. The T-box family is an ancient group that appears to play a critical role in development in all animal species. These genes were uncovered on the basis of similarity to the DNA binding domain of murine Brachyury (T) gene product, the defining feature of the family. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development and conserved expression patterns, most of the known genes in all species being expressed in mesoderm or mesoderm precursors
