label: Menin
definition: >-
  Scaffolding protein menin encoded by the MEN1 gene. MEN1, the gene responsible for multiple endocrine neoplasia type 1, is a tumour suppressor gene that encodes a protein called Menin which may be an atypical GTPase stimulated by nm23
