identifier: CDD:cl03715
label: Mago_nashi
definition: >-
  Mago nashi proteins, integral members of the exon junction complex. This family was originally identified in Drosophila and called mago nashi, it is a strict maternal effect, grandchildless-like, gene. The human homolog has been shown to interact with an RNA binding protein. An RNAi knockout of the C. elegans homolog causes masculinization of the germ line (Mog phenotype) hermaphrodites, suggesting it is involved in hermaphrodite germ-line sex determination. Mago nashi has been found to be part of the exon-exon junction complex that binds 20 nucleotides upstream of exon-exon junctions
