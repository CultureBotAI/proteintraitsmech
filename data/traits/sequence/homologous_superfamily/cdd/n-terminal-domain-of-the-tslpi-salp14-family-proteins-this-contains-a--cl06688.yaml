identifier: CDD:cl06688
label: TSLPI_Salp14_NTD
definition: >-
  N-terminal domain of the TSLPI/Salp14 family proteins. This contains a group of peptides derived from a salivary gland cDNA library of the tick Ixodes scapularis. Also present are peptides from a related tick species, Ixodes ricinus. They are characterized by a putative signal peptide indicative of secretion and conserved cysteine residues
