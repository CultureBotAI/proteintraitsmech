identifier: CDD:cl39912
label: CdiI_Ykris-like
definition: >-
  inhibitor (or immunity protein) of the contact-dependent growth inhibition (CDI) system of Yersinia kristensenii, and similar proteins. Contact-dependent growth inhibition (CDI) is an important mechanism of inter-bacterial competition found in many Gram-negative pathogens. CDI+ cells express cell-surface CdiA proteins that bind neighboring bacteria and deliver C-terminal toxin domains (CdiA-CT) to inhibit target-cell growth. CDI+ bacteria also produce CdiI immunity proteins, which specifically neutralize cognate CdiA-CT toxins to prevent self-inhibition. Structure analysis of CdiI immunity protein from Yersinia kristensenii shows that it is composed of eight alpha-helices packed together to form a nearly spherical structure with weak structural homology to a putative TetR family transcriptional repressor. The CdiI protein fits into the curved cavity of the CdiA-CTYkris toxin domain where it most likely neutralizes toxin activity by blocking access to RNA substrates. This domain is mostly found in gammaproteobacteria
