definition: >-
  LA motif RNA-binding domain. This domain is found in vertebrate La-related protein 2 (LARP2). A variety of La-related proteins (LARPs or La ribonucleoproteins), with differing domain architecture, appear to function as RNA-binding proteins in eukaryotic cellular processes
