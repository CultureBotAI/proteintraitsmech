identifier: CDD:cl16936
label: "N-terminal domain of SATB1 and similar proteins. ULD is an N-terminal oligomerization domain of SATB or special AT-rich sequence-binding proteins. SATBs are global chromatin organizers and regulators of gene expression that are essential for T-cell development, breast cancer tumour growth and metastasis. SATBs assemble into a tetramer via the ULD domain, and the tetramerization of SATBs are essential for recognising specific DNA sequences (such as multiple AT-rich DNA fragments). Thus, SATBs may regulate gene expression directly by binding to various promoters and upstream regions and thereby influencing promoter activity."
definition: >-
  N-terminal domain of SATB1 and similar proteins. ULD is an N-terminal oligomerization domain of SATB or special AT-rich sequence-binding proteins. SATBs are global chromatin organizers and regulators of gene expression that are essential for T-cell development, breast cancer tumour growth and metastasis. SATBs assemble into a tetramer via the ULD domain, and the tetramerization of SATBs are essential for recognising specific DNA sequences (such as multiple AT-rich DNA fragments). Thus, SATBs may regulate gene expression directly by binding to various promoters and upstream regions and thereby influencing promoter activity. — an NCBI CDD domain superfamily (cl16936); members share this curated model.
