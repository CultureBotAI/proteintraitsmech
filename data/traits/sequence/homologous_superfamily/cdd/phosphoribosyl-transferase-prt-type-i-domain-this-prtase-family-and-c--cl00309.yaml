identifier: CDD:cl00309
label: PRTases_typeI
definition: >-
  Phosphoribosyl transferase (PRT)-type I domain. This PRTase family, and C-terminal TRSP domain, are related to OPRTases, and are predicted to use Orotate as substrate. These genes are found in the biosynthetic operon associated with the Ter stress-response operon and are predicted to be involved in the biosynthesis of a ribo-nucleoside involved in stress response
