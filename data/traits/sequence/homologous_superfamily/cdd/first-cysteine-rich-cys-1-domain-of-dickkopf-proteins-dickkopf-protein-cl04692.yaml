identifier: CDD:cl04692
label: Dkk_Cys1
definition: >-
  first cysteine-rich (Cys-1) domain of Dickkopf proteins. Dickkopf proteins are a class of Wnt antagonists. They possess two conserved cysteine-rich regions. This family represents the N-terminal one. The C-terminal region has been found to share significant sequence similarity to the colipase fold, pfam01114, pfam02740
