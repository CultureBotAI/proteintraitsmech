identifier: CDD:cl00288
label: EPT_RTPC-like
definition: >-
  N/A. EPSP synthase domain. 3-phosphoshikimate 1-carboxyvinyltransferase (5-enolpyruvylshikimate-3-phosphate synthase) (EC 2.5.1.19) catalyses the reaction between shikimate-3-phosphate (S3P) and phosphoenolpyruvate (PEP) to form 5-enolpyruvylshkimate-3-phosphate (EPSP), an intermediate in the shikimate pathway leading to aromatic amino acid biosynthesis. The reaction is phosphoenolpyruvate + 3-phosphoshikimate = phosphate + 5-O-(1-carboxyvinyl)-3-phosphoshikimate. It is found in bacteria and plants but not animals. The enzyme is the target of the widely used herbicide glyphosate, which has been shown to occupy the active site. In bacteria and plants, it is a single domain protein, while in fungi, the domain is found as part of a multidomain protein with functions that are all part of the shikimate pathway
