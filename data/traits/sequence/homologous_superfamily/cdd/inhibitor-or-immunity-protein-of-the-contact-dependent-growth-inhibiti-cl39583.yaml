identifier: CDD:cl39583
label: "inhibitor (or immunity protein) of the contact-dependent growth inhibition (CDI) system of  Enterobacter cloacae, and similar proteins. This is the N-terminal domain of Contact-dependent growth inhibition immunity (CdiI) proteins present in Enterobacter cloacae. CdiI proteins neutralize CdiA-CT toxins to protect toxin-producing cells from auto-inhibition. Structural homology searches reveal that Enterobacter cloacae's CdiI is most similar to the Whirly family of single-stranded DNA-binding protein."
definition: >-
  inhibitor (or immunity protein) of the contact-dependent growth inhibition (CDI) system of Enterobacter cloacae, and similar proteins. This is the N-terminal domain of Contact-dependent growth inhibition immunity (CdiI) proteins present in Enterobacter cloacae. CdiI proteins neutralize CdiA-CT toxins to protect toxin-producing cells from auto-inhibition. Structural homology searches reveal that Enterobacter cloacae's CdiI is most similar to the Whirly family of single-stranded DNA-binding protein. — an NCBI CDD domain superfamily (cl39583); members share this curated model.
