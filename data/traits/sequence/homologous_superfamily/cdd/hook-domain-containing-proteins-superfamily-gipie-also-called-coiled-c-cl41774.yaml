identifier: CDD:cl41774
label: "Hook domain-containing proteins superfamily. Gipie, also called coiled-coil domain-containing protein 88B (CCDC88B), or brain leucine zipper domain-containing protein, or Hook-related protein 3 (HkRP3), is a novel actin cytoskeleton-binding protein and Akt substrate that regulates cell migratory responses in various biological contexts. It acts as a positive regulator of T-cell maturation and inflammatory function. As a microtubule-binding protein, Gipie regulates lytic granule clustering and NK cell killing."
definition: >-
  Hook domain-containing proteins superfamily. Gipie, also called coiled-coil domain-containing protein 88B (CCDC88B), or brain leucine zipper domain-containing protein, or Hook-related protein 3 (HkRP3), is a novel actin cytoskeleton-binding protein and Akt substrate that regulates cell migratory responses in various biological contexts. It acts as a positive regulator of T-cell maturation and inflammatory function. As a microtubule-binding protein, Gipie regulates lytic granule clustering and NK cell killing. — an NCBI CDD domain superfamily (cl41774); members share this curated model.
