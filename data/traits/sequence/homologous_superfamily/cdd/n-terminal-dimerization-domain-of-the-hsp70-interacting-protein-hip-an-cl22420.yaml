identifier: CDD:cl22420
label: "N-terminal dimerization domain of the Hsp70-interacting protein (Hip) and similar proteins. This is the N-terminal domain, known as HipN, found in Hsp70-interacting protein (Hip) present in Rattus norvegicus. Hip cooperates with the chaperone Hsp70 in protein folding and prevention of aggregation and may delay substrate release by slowing ADP dissociation from Hsp70. HipN is responsible for N-terminal homo-dimerization which is necessary so that the Hip dimer can interact with Hsp70 molecules."
definition: >-
  N-terminal dimerization domain of the Hsp70-interacting protein (Hip) and similar proteins. This is the N-terminal domain, known as HipN, found in Hsp70-interacting protein (Hip) present in Rattus norvegicus. Hip cooperates with the chaperone Hsp70 in protein folding and prevention of aggregation and may delay substrate release by slowing ADP dissociation from Hsp70. HipN is responsible for N-terminal homo-dimerization which is necessary so that the Hip dimer can interact with Hsp70 molecules. — an NCBI CDD domain superfamily (cl22420); members share this curated model.
