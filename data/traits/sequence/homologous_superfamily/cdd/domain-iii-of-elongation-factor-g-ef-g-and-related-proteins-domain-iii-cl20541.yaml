identifier: CDD:cl20541
label: EFG_III-like
definition: >-
  Domain III of Elongation factor G (EF-G) and related proteins. Domain III of the spliceosomal human 116kD U5 small nuclear ribonucleoprotein (snRNP) protein (U5-116 kD) and its yeast counterpart Snu114p is homologous to domain III of the eukaryotic translational elongation factor EF-2. U5-116 kD is a GTPase component of the spliceosome complex which functions in the processing of precursor mRNAs to produce mature mRNAs
