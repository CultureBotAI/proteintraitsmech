identifier: CDD:cl41736
label: MIU2_RNF168-like
definition: >-
  second motif interacting with ubiquitin domain found in RING finger protein 168 and similar domains. RNF168 is an E3 ubiquitin-protein ligase that promotes noncanonical K27 ubiquitination to signal DNA damage. It, together with RNF8, functions as a DNA damage response (DDR) factor that promotes monoubiquitination of H2A/H2AX at K13/15, facilitates recruitment of repair factors p53-binding protein 1 (53BP1) or the RAP80-BRCA1 complex to sites of double-strand breaks (DSBs), and inhibits homologous recombination (HR) in cells deficient in the tumor suppressor BRCA1. RNF168 also promotes H2A neddylation, which antagonizes ubiquitylation of H2A and regulates DNA damage repair. Moreover, RNF168 forms a functional complex with RAD6A or RAD6B during the DNA damage response. RNF168 contains an N-terminal C3HC4-type RING-HC finger that catalyzes H2A-K15ub modification and interacts with H2A, and two MIU (motif interacting with ubiquitin) domains responsible for the interaction with K63 linked poly-ubiquitin. This model corresponds to the second MIU (MIU2) domain of RNF168. The first MIU belongs to a different domain family and is not included here
