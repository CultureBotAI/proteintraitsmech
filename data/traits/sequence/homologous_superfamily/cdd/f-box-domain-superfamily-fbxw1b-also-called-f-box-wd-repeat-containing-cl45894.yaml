identifier: CDD:cl45894
label: F-box_SF
definition: >-
  F-box domain superfamily. FBXW1B, also called F-box/WD repeat-containing protein 11 (FBXW11), F-box and WD repeats protein beta-TrCP2, or homologous to Slimb protein (HOS), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as IFNAR1, CEP68 and CDC25A, as well as phosphorylated CTNNB1, NFKBIA, PER1 and PER2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression
