identifier: CDD:cl17095
label: Bacova_04320_like
definition: >-
  Uncharacterized proteins similar to Bacteroides ovatus 4320. A large family of (predicted) secreted proteins with unknown functions from human gut and oral cavity. Typically forms a N-terminal domain with FMN binding domain at the C-terminus. Experimentaly determined 3D structure of this domain shows a variant of a TATA box binding - like fold, but no detectable sequence similarity to other proteins with this fold
