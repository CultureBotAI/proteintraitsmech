identifier: CDD:cl41787
label: UBR-box
definition: >-
  UBR-box found in UBR family of E3 ubiquitin ligases (UBR1-7) and similar proteins. BIG (also called protein attenuated shade avoidance 1, protein corymbosa1, protein dark over-expression of cab 1, protein low phosphate-resistant root 1, protein transport inhibitor response 3, or protein umbrella 1) is a calossin-like protein required for auxin efflux and polar auxin transport (PAT) influencing auxin-mediated developmental responses in Arabidopsis
