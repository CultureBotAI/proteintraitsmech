identifier: CDD:cl03296
label: Gnk2-like
definition: >-
  antifungal protein ginkbilobin-2-like domains found in plants. This domain is often found in association with the kinase domains pfam00069 or pfam07714. In many proteins it is duplicated. It contains six conserved cysteines which are involved in disulphide bridges. It has a role in salt stress response and has antifungal activity
