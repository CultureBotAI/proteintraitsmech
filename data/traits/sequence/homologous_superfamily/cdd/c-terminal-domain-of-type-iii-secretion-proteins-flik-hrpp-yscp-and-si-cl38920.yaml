identifier: CDD:cl38920
label: "C-terminal domain of type III secretion proteins FliK, HrpP, YscP, and similar domains. The flagellar hook-length control protein FliK is a soluble cytoplasmic protein that is secreted during flagellar formation. It controls hook elongation by two successive events: by determining hook length and by stopping the supply of hook protein. It contains an N-terminal domain that determines hook length and a C-terminal domain that is responsible for switching secretion from the hook protein to that of the filament protein, by interacting with FlhB, the switchable secretion gate."
definition: >-
  C-terminal domain of type III secretion proteins FliK, HrpP, YscP, and similar domains. The flagellar hook-length control protein FliK is a soluble cytoplasmic protein that is secreted during flagellar formation. It controls hook elongation by two successive events: by determining hook length and by stopping the supply of hook protein. It contains an N-terminal domain that determines hook length and a C-terminal domain that is responsible for switching secretion from the hook protein to that of the filament protein, by interacting with FlhB, the switchable secretion gate. — an NCBI CDD domain superfamily (cl38920); members share this curated model.
