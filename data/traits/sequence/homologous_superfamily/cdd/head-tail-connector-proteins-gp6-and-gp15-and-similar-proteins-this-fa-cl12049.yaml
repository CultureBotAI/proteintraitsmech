label: "Head-Tail Connector Proteins gp6 and gp15, and similar proteins. This family of proteins contain head-tail connector proteins related to gp6 from bacteriophage HK97. A structure of this protein shows similarity to gp15 a well characterized connector component of bacteriophage SPP1."
