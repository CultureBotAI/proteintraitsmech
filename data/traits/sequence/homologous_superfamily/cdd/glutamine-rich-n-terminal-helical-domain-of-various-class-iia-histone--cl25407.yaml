identifier: CDD:cl25407
label: ClassIIa_HDAC_Gln-rich-N
definition: >-
  Glutamine-rich N-terminal helical domain of various Class IIa histone deacetylases (HDAC4, HDAC5 and HDCA9). This domain is found in eukaryotes, and is approximately 90 amino acids in length. The family is found in association with pfam00850. The domain forms an alpha helix which complexes to form a tetramer. The glutamine rich domains have many intra- and inter-helical interactions which are thought to be involved in reversible assembly and disassembly of proteins. The domain is part of histone deacetylase 4 (HDAC4) which removes acetyl groups from histones. This restores their positive charge to allow stronger DNA binding thus restricting transcriptional activity
