identifier: CDD:cl00081
label: bHLH_SF
definition: >-
  basic Helix Loop Helix (bHLH) domain superfamily. DEC2, also termed Class E basic helix-loop-helix protein 41 (bHLHe41), or Class B basic helix-loop-helix protein 3 (bHLHb3), or enhancer-of-split and hairy-related protein 1 (SHARP-1), is a bHLH-O transcriptional repressor involved in the regulation of the circadian rhythm by negatively regulating the activity of the clock genes and clock-controlled genes
