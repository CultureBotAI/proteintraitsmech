identifier: CDD:cl19107
label: SPFH_like
definition: >-
  core domain of the SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. This family has been called SPFH, Band 7 or PHB domain. Recent phylogenetic analysis has shown this domain to be a slipin or Stomatin-like integral membrane domain conserved from protozoa to mammals
