identifier: CDD:cl28933
label: Riboflavin_synthase_like
definition: >-
  Riboflavin synthase and similar proteins. Lumazine protein (LumP) is involved in the bioluminescence of certain marine bacteria. It serves as an optical transponder in bioluminescence emission. The intense fluorescence of LumP is caused by non-covalently bound 6,7- dimethyl-8-ribityllumazine. Though its amino acid sequence is very similar to riboflavin synthase it functions as a monomer, unlike the riboflavin synthases from eubacteria, yeasts and plants which act as trimers
