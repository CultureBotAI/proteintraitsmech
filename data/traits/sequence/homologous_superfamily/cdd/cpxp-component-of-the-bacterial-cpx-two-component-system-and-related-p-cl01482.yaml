identifier: CDD:cl01482
label: CpxP_like
definition: >-
  CpxP component of the bacterial Cpx-two-component system and related proteins. This is a metal-binding protein which is involved in resistance to heavy-metal ions. The protein forms a four-helix hooked hairpin, consisting of two long alpha helices each flanked by a shorter alpha helix. It binds a metal ion in a type-2 like centre. It contains two copies of an LTXXQ motif
