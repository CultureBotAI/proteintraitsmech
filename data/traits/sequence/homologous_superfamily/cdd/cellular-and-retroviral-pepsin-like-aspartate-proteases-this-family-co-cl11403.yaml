identifier: CDD:cl11403
label: "Cellular and retroviral pepsin-like aspartate proteases. This family consists of predicted aspartic proteases, typically from 180 to 230 amino acids in length, in MEROPS clan AA. This model describes the well-conserved 121-residue C-terminal region. The poorly conserved, variable length N-terminal region usually contains a predicted transmembrane helix."
definition: >-
  Cellular and retroviral pepsin-like aspartate proteases. This family consists of predicted aspartic proteases, typically from 180 to 230 amino acids in length, in MEROPS clan AA. This model describes the well-conserved 121-residue C-terminal region. The poorly conserved, variable length N-terminal region usually contains a predicted transmembrane helix. — an NCBI CDD domain superfamily (cl11403); members share this curated model.
