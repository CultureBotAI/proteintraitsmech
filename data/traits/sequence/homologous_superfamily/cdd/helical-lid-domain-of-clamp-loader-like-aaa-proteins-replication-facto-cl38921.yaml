label: HLD_clamp
definition: >-
  helical lid domain of clamp loader-like AAA+ proteins. Replication factor C (RFC) is five-protein clamp loader complex that forms a stable ATP-dependent complex with the sliding clamp, PCNA, which binds specifically to primed DNA. RFC subunits belong to the clamp loader clade of the AAA+ superfamily
