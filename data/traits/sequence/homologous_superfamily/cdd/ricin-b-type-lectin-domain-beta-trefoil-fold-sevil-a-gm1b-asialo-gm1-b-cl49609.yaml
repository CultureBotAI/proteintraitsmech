identifier: CDD:cl49609
label: "ricin B-type lectin domain, beta-trefoil fold. SeviL, a GM1b/asialo-GM1 binding ricin B-type lectin from the mussel Mytilisepta virgata (purplish bifurcate mussel), binds strongly to the linear saccharides of the ganglioside GM1b (Neu5Ac alpha(2-3)Gal beta(1-3)GalNAc beta(1-4)Gal beta(1-4)Glc) and its precursor, asialo-GM1 (Gal beta(1-3)GalNAc beta(1-4)Gal beta(1-4)Glc). SeviL is a dimeric member of the beta-trefoil superfamily and shows no interaction with GM1 due to steric hindrance with the sialic acid branch that is absent from GM1b. Thus, SeviL has a strong selectivity for asialo-GM1 over the closely related GM1. Moreover, SeviL displayed significant apoptotic effects against various cultured cell lines (human breast, ovarian, and colonic cancer) that possess asialo-GM1 oligosaccharide at the cell surface. This unusual specificity makes SeviL of great interest for the detection and control of certain cancer cells, and cells of the immune system, that display asialo-GM1. Furthermore, SeviL showed dose- and time-dependent activation of kinase MKK3/6, p38 MAPK, and caspase-3/9. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold. SeviL, a GM1b/asialo-GM1 binding ricin B-type lectin from the mussel Mytilisepta virgata (purplish bifurcate mussel), binds strongly to the linear saccharides of the ganglioside GM1b (Neu5Ac alpha(2-3)Gal beta(1-3)GalNAc beta(1-4)Gal beta(1-4)Glc) and its precursor, asialo-GM1 (Gal beta(1-3)GalNAc beta(1-4)Gal beta(1-4)Glc). SeviL is a dimeric member of the beta-trefoil superfamily and shows no interaction with GM1 due to steric hindrance with the sialic acid branch that is absent from GM1b. Thus, SeviL has a strong selectivity for asialo-GM1 over the closely related GM1. Moreover, SeviL displayed significant apoptotic effects against various cultured cell lines (human breast, ovarian, and colonic cancer) that possess asialo-GM1 oligosaccharide at the cell surface. This unusual specificity makes SeviL of great interest for the detection and control of certain cancer cells, and cells of the immune system, that display asialo-GM1. Furthermore, SeviL showed dose- and time-dependent activation of kinase MKK3/6, p38 MAPK, and caspase-3/9. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD domain superfamily (cl49609); members share this curated model.
