identifier: CDD:cl49619
label: beta-trefoil_MIR
definition: >-
  MIR domain, beta-trefoil fold, found in the MIR (protein mannosyltransferase, IP3R and RyR) superfamily. AtSDF2, also called SDF2-like protein, acts as a crucial component of the unfolded protein response (UPR) in Arabidopsis thaliana. It is involved in the endoplasmic reticulum (ER) protein quality control and unfolded protein response. It may be involved in the quality control of glycoproteins. AtSDF2 forms a complex in the ER with ERDJ3B and MED37A/BIP1 which is required for the proper accumulation and function of the surface-exposed leucine-rich repeat receptor kinases EFR involved in pathogen-associated molecular pattern (PAMP) triggered immunity. AtSDF2 contains a MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry
