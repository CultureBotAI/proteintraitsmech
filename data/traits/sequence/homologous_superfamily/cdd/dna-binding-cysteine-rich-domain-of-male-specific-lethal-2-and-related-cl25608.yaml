identifier: CDD:cl25608
label: "DNA-binding cysteine-rich domain of male-specific lethal 2 and related proteins. MSL2-CXC is an autonomously folded domain containing that binds three zinc ions. It lies on the E3 ubiquitin-protein ligase MSL2 in eukaryotes. The CXC domain critically contributes to the DNA-binding activity of MSL2. It carries 9 invariant cysteines within about a 50 residue region."
definition: >-
  DNA-binding cysteine-rich domain of male-specific lethal 2 and related proteins. MSL2-CXC is an autonomously folded domain containing that binds three zinc ions. It lies on the E3 ubiquitin-protein ligase MSL2 in eukaryotes. The CXC domain critically contributes to the DNA-binding activity of MSL2. It carries 9 invariant cysteines within about a 50 residue region. — an NCBI CDD domain superfamily (cl25608); members share this curated model.
