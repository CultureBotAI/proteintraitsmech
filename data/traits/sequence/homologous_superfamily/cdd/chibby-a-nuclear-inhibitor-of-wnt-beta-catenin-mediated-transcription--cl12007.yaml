identifier: CDD:cl12007
label: Cby_like
definition: >-
  Chibby, a nuclear inhibitor of Wnt/beta-catenin mediated transcription, and similar proteins. This family includes the eukaryotic chibby proteins. These proteins inhibit the wingless/Wnt pathway by binding to beta-catenin and inhibiting beta-catenin-mediated transcriptional activation. Chibby is Japanese for small, and is named after the RNAi phenotype seen in Drosophila
