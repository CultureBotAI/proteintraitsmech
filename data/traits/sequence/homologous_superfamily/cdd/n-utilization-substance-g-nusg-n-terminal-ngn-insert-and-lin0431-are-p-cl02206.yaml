identifier: CDD:cl02206
label: "N-Utilization Substance G (NusG) N terminal (NGN) insert and Lin0431 are part of DUF1312. This family contains domains homologous to Listeria innocua Lin0431, a protein that is similar to the N-Utilization Substance G (NusG) N terminal (NGN) insert (domain II, DII). Lin0431 and Aquifex aeolicus NusG DII (AaeNusG DII ) have similar structure and similar basic charged surface distributions that may bind negatively charged nucleic acids and/or another anionic binding partner, suggesting a possible role in transcription/translation regulating functions. Despite these two domains having low sequence similarity, the NusG DII and DUF1312 domain families may have diverged from common evolutionary ancestral proteins, and may have similar biochemical functions."
definition: >-
