label: CASIMO1
definition: >-
  Cancer Associated Small Integral Membrane Open reading frame 1 (CASIMO1). This family of proteins is found in eukaryotes. Proteins in this family are typically between 68 and 91 amino acids in length. Members are single-pass membrane proteins
