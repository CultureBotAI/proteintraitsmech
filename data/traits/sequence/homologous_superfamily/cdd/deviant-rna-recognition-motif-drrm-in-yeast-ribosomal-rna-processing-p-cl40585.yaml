label: "deviant RNA recognition motif (dRRM) in yeast ribosomal RNA-processing protein 7 (Rrp7p) and similar proteins. This domain corresponds to the N-terminal RNA-binding domain found in the Rrp7 protein. It has an RRM-like fold with a circular permutation."
