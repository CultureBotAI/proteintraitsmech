identifier: CDD:cl03379
label: Myo5-like_CBD
definition: >-
  Cargo binding domain of myosin 5 and similar proteins. Yeast myosin V travels along actin cables, actin filaments that are bundled by fimbrin, in the presence of tropomyosin. This is in contrast to the other vertebrate class V myosins. Like other class V myosins, fungal myosin 2 and 4 contain a C-terminal cargo binding domain. Myo 2 binds to Vac17, vacuole-specific cargo adaptor, and Mmr1, mitochondria-specific cargo adaptor. Both adaptors bind competitivly at the same site
