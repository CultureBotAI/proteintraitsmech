identifier: CDD:cl16774
label: AlgX_N_like
definition: >-
  N-terminal catalytic domain of putative alginate O-acetyltranferase and similar proteins. ALGX is a family found in bacteria. The domain demonstrates catalytic activity similar to that of the SGNH hydrolase-like domain, with the typical Ser-His-Asp triad found in this enzyme. Alginate is an exopolysaccharide that contributes to biofilm formation. ALGX is secreted into the biofilm and is responsible for the acetylation of biofilm polymers that help protect them from host destruction
