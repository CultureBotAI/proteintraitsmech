identifier: CDD:cl15166
label: RRP7_like
definition: >-
  RRP7 domain ribosomal RNA-processing protein 7 (Rrp7p), ribosomal RNA-processing protein 7 homolog A (Rrp7A), and similar proteins. RRP7 is an essential protein in yeast that is involved in pre-rRNA processing and ribosome assembly. It is speculated to be required for correct assembly of rpS27 into the pre-ribosomal particle
