identifier: CDD:cl28921
label: "Coiled-coil domain of Signal Transducer and Activator of Transcription (STAT), also called alpha domain. This family consists of the coiled-coil (alpha) domain of the STAT6 proteins (Signal Transducer and Activator of Transcription 6, or Signal Transduction And Transcription 6). SImilar to STAT3 and STAT5. the coiled-coil domain (CCD) of STAT6 is required for constitutive nuclear localization signals (NLS) function; small deletions within the CCD can abrogate nuclear import. Studies show that the CCD binds to the importin-alpha3 NLS adapter in most cells.STAT6 is essential for the functional responses of T helper 2 (Th2) lymphocyte mediated by interleukins IL-4 and IL-13. STAT6 almost exclusively mediates the expression of genes activated by these cytokines; IL-4 signaling regulates the expression of genes involved in immune and anti-inflammatory responses. Abnormal production of IL-4 and IL-13 play important roles in the pathogenesis of asthma where upregulation of the Th2 response mediated by IL-4/IL-13 is a main characteristic. STAT6 has a unique extended transactivation domain, not found in other STATs, through which it recruits p300/CBP and NCoA-1, two coactivators needed for transcriptional activation by IL-4. STAT6 activation is linked to Kaposi's sarcoma-associated herpesvirus (KSHV)-associated cancers such as primary effusion lymphoma, a cancerous proliferation of B cells. Studies show that Meningeal solitary fibrous tumor (SFT) and hemangiopericytoma (HPC) represent a histopathologic spectrum linked by STAT6 nuclear expression and recurrent somatic fusions of the two genes, NGFI-A-binding protein 2 (NAB2) and STAT6 (NAB2-STAT6), similar to their soft tissue counterparts. It is associated with local recurrence and late distance metastasis of brain tumors to extracranial sites."
definition: >-
  Coiled-coil domain of Signal Transducer and Activator of Transcription (STAT), also called alpha domain. This family consists of the coiled-coil (alpha) domain of the STAT6 proteins (Signal Transducer and Activator of Transcription 6, or Signal Transduction And Transcription 6). SImilar to STAT3 and STAT5. the coiled-coil domain (CCD) of STAT6 is required for constitutive nuclear localization signals (NLS) function; small deletions within the CCD can abrogate nuclear import. Studies show that the CCD binds to the importin-alpha3 NLS adapter in most cells.STAT6 is essential for the functional responses of T helper 2 (Th2) lymphocyte mediated by interleukins IL-4 and IL-13. STAT6 almost exclusively mediates the expression of genes activated by these cytokines; IL-4 signaling regulates the expression of genes involved in immune and anti-inflammatory responses. Abnormal production of IL-4 and IL-13 play important roles in the pathogenesis of asthma where upregulation of the Th2 response mediated by IL-4/IL-13 is a main characteristic. STAT6 has a unique extended transactivation domain, not found in other STATs, through which it recruits p300/CBP and NCoA-1, two coactivators needed for transcriptional activation by IL-4. STAT6 activation is linked to Kaposi's sarcoma-associated herpesvirus (KSHV)-associated cancers such as primary effusion lymphoma, a cancerous proliferation of B cells. Studies show that Meningeal solitary fibrous tumor (SFT) and hemangiopericytoma (HPC) represent a histopathologic spectrum linked by STAT6 nuclear expression and recurrent somatic fusions of the two genes, NGFI-A-binding protein 2 (NAB2) and STAT6 (NAB2-STAT6), similar to their soft tissue counterparts. It is associated with local recurrence and late distance metastasis of brain tumors to extracranial sites. — an NCBI CDD domain superfamily (cl28921); members share this curated model.
