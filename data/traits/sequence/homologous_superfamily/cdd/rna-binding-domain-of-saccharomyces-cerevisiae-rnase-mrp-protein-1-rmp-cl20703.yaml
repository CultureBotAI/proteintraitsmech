identifier: CDD:cl20703
label: "RNA binding domain of Saccharomyces cerevisiae RNase MRP protein 1 (RMP1) and similar proteins. RMP1, also called RNA-processing protein RMP1, or RNase MRP 23.6 kDa subunit, functions as part of ribonuclease MRP (RNase MRP), which is involved in rRNA processing in mitochondria. RNase MRP complex consists of an RNA moiety and at least 10 protein subunits including POP1, POP3, POP4, POP5, POP6, POP7, POP8, RMP1, RPP1 and SNM1, many of which are shared with the RNase P complex. RMP1 is required for proper rRNA processing. The model corresponds to a conserved region of RMP1, which is responsible for the RNA binding."
definition: >-
  RNA binding domain of Saccharomyces cerevisiae RNase MRP protein 1 (RMP1) and similar proteins. RMP1, also called RNA-processing protein RMP1, or RNase MRP 23.6 kDa subunit, functions as part of ribonuclease MRP (RNase MRP), which is involved in rRNA processing in mitochondria. RNase MRP complex consists of an RNA moiety and at least 10 protein subunits including POP1, POP3, POP4, POP5, POP6, POP7, POP8, RMP1, RPP1 and SNM1, many of which are shared with the RNase P complex. RMP1 is required for proper rRNA processing. The model corresponds to a conserved region of RMP1, which is responsible for the RNA binding. — an NCBI CDD domain superfamily (cl20703); members share this curated model.
