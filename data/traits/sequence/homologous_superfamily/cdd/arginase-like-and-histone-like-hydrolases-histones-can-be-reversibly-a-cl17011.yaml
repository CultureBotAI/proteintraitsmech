identifier: CDD:cl17011
label: Arginase_HDAC
definition: >-
  Arginase-like and histone-like hydrolases. Histones can be reversibly acetylated on several lysine residues. Regulation of transcription is caused in part by this mechanism. Histone deacetylases catalyze the removal of the acetyl group. Histone deacetylases are related to other proteins
