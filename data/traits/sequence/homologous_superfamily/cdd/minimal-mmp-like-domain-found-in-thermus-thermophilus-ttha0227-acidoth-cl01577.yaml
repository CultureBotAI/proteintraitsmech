identifier: CDD:cl01577
label: MMP_TTHA0227_like
definition: >-
  Minimal MMP-like domain found in Thermus thermophilus TTHA0227, Acidothermus cellulolyticus ACEL2062 and similar proteins. This family of proteins has a conserved HEXXH motif, suggesting they are putative peptidases of zincin fold. The structure of this family is a minimal version of the metalloprotease fold (PDB:3E11)
