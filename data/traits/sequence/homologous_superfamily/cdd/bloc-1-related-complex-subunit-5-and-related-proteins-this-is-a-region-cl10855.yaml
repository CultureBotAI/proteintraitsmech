identifier: CDD:cl10855
label: BORCS5-like
definition: >-
  BLOC-1-related complex subunit 5, and related proteins. This is a region of 130 amino acids that is the most conserved region of hypothetical proteins involved in loss of heterozygosity and thus tumour suppression. The exact function of family members is not known. This region is also found in subunit 5 of the BLOC-1-related complex, which is also found in the BORC complex. BLOC-1 is important for the biogenesis of lysosome-related organelles, and BORC is important for the positioning of the lysosome in the cytoplasm. The BORC complex associates with the lysosomal membrane where it recruits the small GTPase Arl8, which leads in turn to the kinesin-dependent movement of lysosomes toward the plus ends of microtubules in the peripheral cytoplasm
