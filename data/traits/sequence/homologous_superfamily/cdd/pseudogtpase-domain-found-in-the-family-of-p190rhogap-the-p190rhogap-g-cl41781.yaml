identifier: CDD:cl41781
label: pseudoGTPaseD_p190RhoGAP
definition: >-
  pseudoGTPase domain found in the family of p190RhoGAP. The p190RhoGAP (GTPase-activating protein) proteins, p190RhoGAP-A (ARHGAP35) and p190RhoGAP-B (ARHGAP5)4-6, regulates Rho GTP hydrolysis and are important for proper Rho signalling. They share a domain organization containing a GTP-binding GTPase domain, four FF domains, two GTPase-like folds (pG1 and pG2) in the middle domain and a C-terminal GAP domain. This entry represents pG1 and pG2 which are important for GAP activity toward RhoA and were classified as pseudoGTPases as they lack nucleotide-binding activity. Crystal structures revealed a small GTPase fold in both cases with a central 6-stranded beta-sheet surrounded by four alpha-helices
