identifier: CDD:cl06694
label: CTF3_NTD_HEAT
definition: >-
  N-terminal HEAT repeat domain of inner kinetochore subunit CTF3 and similar proteins. Mis6 is an essential centromere connector protein acting during G1-S phase of the cell cycle. Mis6 is thought to be required for recruiting CENP-A, the centromere- specific histone H3 variant, an important event for centromere function and chromosome segregation during mitosis
