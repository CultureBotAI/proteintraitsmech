identifier: CDD:cl14876
label: "Zinc peptidases M18, M20, M28, and M42. These peptidases are found in Archaea and Bacteria. The example in Lactococcus lactis, PepA, aids growth on milk. Pyrococcus horikoshii contain a thermostable de-blocking aminopeptidase member of this family used commercially for N-terminal protein sequencing."
definition: >-
  Zinc peptidases M18, M20, M28, and M42. These peptidases are found in Archaea and Bacteria. The example in Lactococcus lactis, PepA, aids growth on milk. Pyrococcus horikoshii contain a thermostable de-blocking aminopeptidase member of this family used commercially for N-terminal protein sequencing. — an NCBI CDD domain superfamily (cl14876); members share this curated model.
