identifier: CDD:cl22419
label: LepB
definition: >-
  Legionella Rab1-specific GAP LepB. This is a subdomain of a Rab GTPase-activating protein (GAP) effector from Legionella pneumophilia. This GAP modulates Rab enzymes that act as molecular switches in regulating vesicular transport in eukaryotic cells. This N-terminal subdomain belongs to the the GAP domain of the protein. The catalytic arginine finger (Arg444) is located within this sub-domain and it is the only arginine residue required for GAP activity
