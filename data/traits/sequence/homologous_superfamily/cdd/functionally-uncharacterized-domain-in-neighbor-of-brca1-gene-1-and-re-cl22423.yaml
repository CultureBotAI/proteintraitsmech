label: "Functionally uncharacterized domain in neighbor of Brca1 Gene 1 and related proteins. Domain present between positions 365-485 in the human next to BRCA1 gene 1 protein Q14596 (NBR1_HUMAN) Distant homology and fold prediction analysis suggests this domain has an immunoglobulin like fold and is distantly homologous to domains involved in cell adhesion such as CARDB (PF07705). JCSG construct was crystalized confirming the domain boundaries"
definition: >-
  Functionally uncharacterized domain in neighbor of Brca1 Gene 1 and related proteins. Domain present between positions 365-485 in the human next to BRCA1 gene 1 protein Q14596 (NBR1_HUMAN) Distant homology and fold prediction analysis suggests this domain has an immunoglobulin like fold and is distantly homologous to domains involved in cell adhesion such as CARDB (PF07705). JCSG construct was crystalized confirming the domain boundaries — an NCBI CDD domain superfamily (cl22423); members share this curated model.
