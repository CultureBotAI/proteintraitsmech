identifier: CDD:cl45892
label: "OTU (ovarian tumor) domain family. Otulin, also called FAM105B, deubiquitinating enzyme otulin, OTU domain-containing deubiquitinase with linear linkage specificity, or ubiquitin thioesterase Gumby, is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that specifically removes linear ('Met-1'-linked) polyubiquitin chains to substrates and acts as a regulator of angiogenesis and innate immune response. It acts as a key negative regulator of inflammation by restricting spontaneous inflammation and maintaining immune homeostasis. Otulin belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in some cases an aspartate, as the catalytic dyad (or triad)."
definition: >-
  OTU (ovarian tumor) domain family. Otulin, also called FAM105B, deubiquitinating enzyme otulin, OTU domain-containing deubiquitinase with linear linkage specificity, or ubiquitin thioesterase Gumby, is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that specifically removes linear ('Met-1'-linked) polyubiquitin chains to substrates and acts as a regulator of angiogenesis and innate immune response. It acts as a key negative regulator of inflammation by restricting spontaneous inflammation and maintaining immune homeostasis. Otulin belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in some cases an aspartate, as the catalytic dyad (or triad). — an NCBI CDD domain superfamily (cl45892); members share this curated model.
