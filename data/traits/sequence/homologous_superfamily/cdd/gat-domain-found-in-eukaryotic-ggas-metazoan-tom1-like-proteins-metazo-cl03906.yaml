label: GAT_SF
definition: >-
  GAT domain found in eukaryotic GGAs, metazoan Tom1-like proteins, metazoan STAMs, fungal Vps27, and similar proteins. STAM-2 is a Hrs-binding protein involved in intracellular signal transduction mediated by cytokines and growth factors. STAM-2 is a component of the ESCRT-0 complex that binds ubiquitin and acts as sorting machinery that recognizes ubiquitinated receptors and transfers them for further sequential lysosomal sorting/trafficking processes. Members of this family contain a non-canonical GAT (GGA and Tom1) domain consisting of two helices. A canonical GAT domain is a monomeric three-helix bundle that bind to ubiquitin. STAM-2, together with another GAT domain-containing protein Hrs, forms a Hrs/STAM2 core complex that consists of two intertwined GAT domains, each consisting of two helices from one subunit, and one from the other subunit. The two GAT domains are connected by a two-stranded coiled-coil. The Hrs/STAM2 complex, an intertwined GAT heterodimer, is a scaffold for binding of ubiquitinated cargo proteins and coordinating ubiquitination and deubiquitination reactions that regulate sorting
