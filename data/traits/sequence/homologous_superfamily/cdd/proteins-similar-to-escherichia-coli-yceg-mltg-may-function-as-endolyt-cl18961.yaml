identifier: CDD:cl18961
label: MltG_like
definition: >-
  proteins similar to Escherichia coli YceG/mltG may function as endolytic murein transglycosylases. This family of proteins is found in bacteria. Proteins in this family are typically between 332 and 389 amino acids in length. This family was previously incorrectly annotated and names as aminodeoxychorismate lyase. The structure of Swiss:P28306 was solved by X-ray crystallography
