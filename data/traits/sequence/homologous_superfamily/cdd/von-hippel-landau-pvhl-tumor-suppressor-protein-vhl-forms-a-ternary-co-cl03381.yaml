label: pVHL
definition: >-
  von Hippel-Landau (pVHL) tumor suppressor protein. VHL forms a ternary complex with the elongin B and elongin C proteins. This complex binds Cul2, which then is involved in regulation of vascular endothelial growth factor mRNA
