identifier: CDD:cl15237
label: Deltex_C
definition: >-
  Domain found at the C-terminus of deltex-like. This is the C-terminal domains found in members of the Deltex family of proteins which comprises five members (DTX1, 2, 3, 4, and 3L). This conserved C-terminal region of about 150 residues of the Deltex family, is preceded by a RING E3 ligase domain in four of the members. Crystal structure of the Deltex C-terminal (DTC) domain reveals a fold composed of a central beta-sheet lined with two long parallel alpha-helices
