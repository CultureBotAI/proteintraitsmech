identifier: CDD:cl14561
label: An_peroxidase_like
definition: >-
  Animal heme peroxidases and related proteins. Peroxidasin is a secreted heme peroxidase which is involved in hydrogen peroxide metabolism and peroxidative reactions in the cardiovascular system. The domain co-occurs with extracellular matrix domains and may play a role in the formation of the extracellular matrix
