identifier: CDD:cl27779
label: "Putative DNA mimic protein DMP12. This is a family of DNA-mimic proteins expressed by Neisseria species. In its monomeric form DMP12 interacts with the Neisseria dimeric form of the bacterial histone-like protein HU. HU proteins promote the assembly of higher-order DNA-protein structures, The interaction between DMP12 and HU protein may be instrumental in controlling the stability of the nucleoid in Neisseria as DMP12 prevents Neisseria HU protein from being digested by trypsin."
definition: >-
  Putative DNA mimic protein DMP12. This is a family of DNA-mimic proteins expressed by Neisseria species. In its monomeric form DMP12 interacts with the Neisseria dimeric form of the bacterial histone-like protein HU. HU proteins promote the assembly of higher-order DNA-protein structures, The interaction between DMP12 and HU protein may be instrumental in controlling the stability of the nucleoid in Neisseria as DMP12 prevents Neisseria HU protein from being digested by trypsin. — an NCBI CDD domain superfamily (cl27779); members share this curated model.
