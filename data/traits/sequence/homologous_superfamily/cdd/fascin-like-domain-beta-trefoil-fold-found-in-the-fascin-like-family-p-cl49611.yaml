identifier: CDD:cl49611
label: "fascin-like domain, beta-trefoil fold, found in the fascin-like family. Protein singed acts as an actin-bundling protein that may have a role in the asymmetric organization and/or movement of cytoplasmic components. It has a role in somatic cells during the formation of adult bristles and hairs, and in the female germline during oogenesis. It interacts with Rab35, with stronger binding to the Rab35-GTP form compared to the Rab35-GDP form. Protein singed is composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the fourth fascin-like beta-trefoil domain."
definition: >-
  fascin-like domain, beta-trefoil fold, found in the fascin-like family. Protein singed acts as an actin-bundling protein that may have a role in the asymmetric organization and/or movement of cytoplasmic components. It has a role in somatic cells during the formation of adult bristles and hairs, and in the female germline during oogenesis. It interacts with Rab35, with stronger binding to the Rab35-GTP form compared to the Rab35-GDP form. Protein singed is composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the fourth fascin-like beta-trefoil domain. — an NCBI CDD domain superfamily (cl49611); members share this curated model.
