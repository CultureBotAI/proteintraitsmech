identifier: CDD:cl21638
label: "L-lysine epsilon-oxidase from Marinomonas mediterranea and similar proteins. This is the N-terminal domain found in antimicrobial protein (LodA) with lysine-epsilon oxidase activity (EC 1.4.3.20) which is produced by gram-negative marine bacteria such as Marinomonas mediterranea. The enzyme, previously named marinocine, catalyzes the oxidative deamination of l-lysine into 6-semialdehyde 2-aminoadipic acid, ammonia, and hydrogen peroxide (H2O2). Orthologous proteins have been detected in other bacterial genera, where they participate in biofilm development and dispersal. It has been shown that M. mediterranea LodA and its homologs induce cell death in the microcolonies formed in the process of biofilm development due to the hydrogen peroxide generated by their enzymatic activity. Moreover, cells dispersed from the biofilm by means of this mechanism show a phenotypic variation in growth and biofilm formation. The active form of LodA containing the quinonic cofactor is generated intracellularly only in the presence of LodB, suggesting that the latter protein is involved in this process."
definition: >-
  L-lysine epsilon-oxidase from Marinomonas mediterranea and similar proteins. This is the N-terminal domain found in antimicrobial protein (LodA) with lysine-epsilon oxidase activity (EC 1.4.3.20) which is produced by gram-negative marine bacteria such as Marinomonas mediterranea. The enzyme, previously named marinocine, catalyzes the oxidative deamination of l-lysine into 6-semialdehyde 2-aminoadipic acid, ammonia, and hydrogen peroxide (H2O2). Orthologous proteins have been detected in other bacterial genera, where they participate in biofilm development and dispersal. It has been shown that M. mediterranea LodA and its homologs induce cell death in the microcolonies formed in the process of biofilm development due to the hydrogen peroxide generated by their enzymatic activity. Moreover, cells dispersed from the biofilm by means of this mechanism show a phenotypic variation in growth and biofilm formation. The active form of LodA containing the quinonic cofactor is generated intracellularly only in the presence of LodB, suggesting that the latter protein is involved in this process. — an NCBI CDD domain superfamily (cl21638); members share this curated model.
