identifier: CDD:cl19121
label: ABBA-PTs
definition: >-
  ABBA-type aromatic prenyltransferases (PTases). In vivo Orf2 attaches a geranyl group to a 1,3,6,8-tetrahydroxynaphthalene-derived polyketide during naphterpin biosynthesis. In vitro, Orf2 catalyzes carbon-carbon based and carbon-oxygen based prenylation of hydroxyl-containing aromatic acceptors of synthetic, microbial and plant origin
