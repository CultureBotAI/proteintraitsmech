identifier: CDD:cl42216
label: "FAD-dependent thymidylate synthase (ThyX), mechanistically and structurally unrelated to thymidylate synthase (ThyA). Thymidylate synthase complementing protein (Thy1) complements the thymidine growth requirement of the organizms in which it is found, but shows no homology to thymidylate synthase. The bacterial members of this family at least are flavin-dependent thymidylate synthases."
definition: >-
  FAD-dependent thymidylate synthase (ThyX), mechanistically and structurally unrelated to thymidylate synthase (ThyA). Thymidylate synthase complementing protein (Thy1) complements the thymidine growth requirement of the organizms in which it is found, but shows no homology to thymidylate synthase. The bacterial members of this family at least are flavin-dependent thymidylate synthases. — an NCBI CDD domain superfamily (cl42216); members share this curated model.
