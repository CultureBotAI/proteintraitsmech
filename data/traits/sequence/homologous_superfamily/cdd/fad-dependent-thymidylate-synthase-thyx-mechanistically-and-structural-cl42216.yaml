identifier: CDD:cl42216
label: ThyX
definition: >-
  FAD-dependent thymidylate synthase (ThyX), mechanistically and structurally unrelated to thymidylate synthase (ThyA). Thymidylate synthase complementing protein (Thy1) complements the thymidine growth requirement of the organizms in which it is found, but shows no homology to thymidylate synthase. The bacterial members of this family at least are flavin-dependent thymidylate synthases
