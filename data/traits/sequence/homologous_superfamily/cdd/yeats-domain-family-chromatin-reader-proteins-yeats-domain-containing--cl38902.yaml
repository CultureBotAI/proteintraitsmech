identifier: CDD:cl38902
label: YEATS
definition: >-
  YEATS domain family, chromatin reader proteins. YEATS domain containing proteins, which include Transcription initiation factor TFIID subunits 14 and 14b of Arabidopsis, shown to be part of the TFIID general transcriptional regulator complex in a two-hybrid screen. DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein
