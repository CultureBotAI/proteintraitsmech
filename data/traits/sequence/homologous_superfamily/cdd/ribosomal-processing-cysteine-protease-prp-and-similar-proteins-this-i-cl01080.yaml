identifier: CDD:cl01080
label: Prp-like
definition: >-
  ribosomal-processing cysteine protease Prp and similar proteins. This is a family of cysteine protease that are found to cleave the N-terminus extension of ribosomal subunit L27 in eubacteria. Proteins in this family are distinguished by a pair of invariant histidine and cysteine residues with conserved spacing that form the classic catalytic dyad of a cysteine protease
