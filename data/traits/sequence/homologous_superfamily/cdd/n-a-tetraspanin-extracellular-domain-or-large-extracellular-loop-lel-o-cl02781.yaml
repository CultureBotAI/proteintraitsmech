identifier: CDD:cl02781
label: tetraspanin_LEL
definition: >-
  N/A. Tetraspanin, extracellular domain or large extracellular loop (LEL), oculospanin_like family. Tetraspanins are trans-membrane proteins with 4 trans-membrane segments. Both the N- and C-termini lie on the intracellular side of the membrane. This alignment model spans the extracellular domain between the 3rd and 4th trans-membrane segment. Tetraspanins are involved in diverse processes and their various functions may relate to their ability to act as molecular facilitators. Tetraspanins associate laterally with one another and cluster dynamically with numerous parnter domains in membrane microdomains, forming a network of multimolecular complexes, the "tetraspanin web". This subfamily contains sequences similar to oculospanin, which is found to be expressed in retinal pigment epithelium, iris, ciliary body, and retinal ganglion cells
