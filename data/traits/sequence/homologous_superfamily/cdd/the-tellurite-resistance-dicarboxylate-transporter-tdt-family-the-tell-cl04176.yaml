identifier: CDD:cl04176
label: "The Tellurite-resistance/Dicarboxylate Transporter (TDT) family. The Tellurite-Resistance/Dicarboxylate Transporter (TDT) Family (TC 2.A.16)Two members of the TDT family have been functionally characterized. One is the TehA protein of E. coli which has been implicated in resistance to tellurite; the other is the Mae1 protein of S. pombe which functions in the uptake of malate and other dicarboxylates by a proton symportmechanism. These proteins exhibit 10 putative transmembrane a-helicalspanners (TMSs). [Transport and binding proteins, Carbohydrates, organic alcohols, and acids]"
definition: >-
  The Tellurite-resistance/Dicarboxylate Transporter (TDT) family. The Tellurite-Resistance/Dicarboxylate Transporter (TDT) Family (TC 2.A.16)Two members of the TDT family have been functionally characterized. One is the TehA protein of E. coli which has been implicated in resistance to tellurite; the other is the Mae1 protein of S. pombe which functions in the uptake of malate and other dicarboxylates by a proton symportmechanism. These proteins exhibit 10 putative transmembrane a-helicalspanners (TMSs). [Transport and binding proteins, Carbohydrates, organic alcohols, and acids] — an NCBI CDD domain superfamily (cl04176); members share this curated model.
