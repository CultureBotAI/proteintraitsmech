definition: >-
  CRISPR/Cas system-associated protein Cas2. This entry represents a minor branch of the Cas2 family of CRISPR-associated protein which are found in IPR003799. Cas proteins are found adjacent to a characteriztic short, palindromic repeat cluster termed CRISPR, a probable mobile DNA element
