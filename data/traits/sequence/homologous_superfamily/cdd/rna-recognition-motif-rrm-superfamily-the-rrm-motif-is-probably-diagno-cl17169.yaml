identifier: CDD:cl17169
label: RRM_SF
definition: >-
  RNA recognition motif (RRM) superfamily. The RRM motif is probably diagnostic of an RNA binding protein. RRMs are found in a variety of RNA binding proteins, including various hnRNP proteins, proteins implicated in regulation of alternative splicing, and protein components of snRNPs. The motif also appears in a few single stranded DNA binding proteins
