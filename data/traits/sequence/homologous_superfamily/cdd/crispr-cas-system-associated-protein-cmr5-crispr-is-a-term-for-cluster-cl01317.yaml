identifier: CDD:cl01317
label: Cmr5_III-B
definition: >-
  CRISPR/Cas system-associated protein Cmr5. CRISPR is a term for Clustered, Regularly Interspaced Short Palindromic Repeats. A number of protein families appear only in association with these repeats and are designated Cas (CRISPR-Associated) proteins. This family, represented by TM1791.1 of Thermotoga maritima, is found in both archaeal and bacterial species
