identifier: CDD:cl41770
label: NucC-like
definition: >-
  cyclic oligonucleotide-based anti-phage signaling system-associated NucC nuclease and similar proteins. This entry represents a bacterial domain of unknown function. This domain is sometimes associated with a pfam14464 domain. This could suggest this domain has a role in a bacterial cognate of a Ubiquitin-like pathway
