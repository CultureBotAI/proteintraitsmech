identifier: CDD:cl08424
label: OBF_DNA_ligase_family
definition: >-
  The Oligonucleotide/oligosaccharide binding (OB)-fold domain is a DNA-binding module that is part of the catalytic core unit of ATP dependent DNA ligases. This domain has an OB-like fold, but does not appear to be related to pfam03120. It is found at the C-terminus of the ATP dependent DNA ligase domain pfam01068
