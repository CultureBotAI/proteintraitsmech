identifier: CDD:cl17006
label: "VbhA antitoxin and related proteins. VbhT is a bacterial Fic protein of the mammalian pathogen B. schoenbuchensis7,8. It is composed of an N-terminal FIC domain and a C-terminal BID domain. FIC domains are known to catalyze adenylylation (also called AMPylation). This entry represents VbhA, an antitoxin that binds FIC domain (filamentation induced by cyclic AMP) of VbhT and inhibits its activity. It inhibits the adenylylation activity of VbhT by positioning close to the putative ATP-binding site, hence competing with ATP binding."
definition: >-
  VbhA antitoxin and related proteins. VbhT is a bacterial Fic protein of the mammalian pathogen B. schoenbuchensis7,8. It is composed of an N-terminal FIC domain and a C-terminal BID domain. FIC domains are known to catalyze adenylylation (also called AMPylation). This entry represents VbhA, an antitoxin that binds FIC domain (filamentation induced by cyclic AMP) of VbhT and inhibits its activity. It inhibits the adenylylation activity of VbhT by positioning close to the putative ATP-binding site, hence competing with ATP binding. — an NCBI CDD domain superfamily (cl17006); members share this curated model.
