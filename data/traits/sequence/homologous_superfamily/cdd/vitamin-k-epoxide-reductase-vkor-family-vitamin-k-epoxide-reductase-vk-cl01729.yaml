identifier: CDD:cl01729
label: VKOR
definition: >-
  Vitamin K epoxide reductase (VKOR) family. Vitamin K epoxide reductase (VKOR) recycles reduced vitamin K, which is used subsequently as a co-factor in the gamma-carboxylation of glutamic acid residues in blood coagulation enzymes. VKORC1 is a member of a large family of predicted enzymes that are present in vertebrates, Drosophila, plants, bacteria and archaea. Four cysteine residues and one residue, which is either serine or threonine, are identified as likely active-site residues. In some plant and bacterial homologs the VKORC1 homologous domain is fused with domains of the thioredoxin family of oxidoreductases
