identifier: CDD:cl45905
label: ZnB-Zn_SUZ12-like
definition: >-
  zinc finger-binding (ZnB) and C2H2-type zinc finger (Zn) domain found in suppressor of zeste 12 protein (SUZ12), and similar proteins. Suppressor of zeste 12 protein (SUZ12), also called chromatin precipitated E2F target 9 protein (ChET 9 protein), or joined to JAZF1 protein, is a Polycomb group (PcG) protein that acts as a component of the Polycomb Repressive Complex 2 (PRC2)/EED-EZH2 complex, which methylates 'Lys-9' (H3K9me) and 'Lys-27' (H3K27me) of histone H3, leading to transcriptional repression of the affected target gene. The PRC2/EED-EZH2 complex may also serve as a recruiting platform for DNA methyltransferases, thereby linking two epigenetic repression systems. This model corresponds to a unique structural ZnB-Zn platform consisting of zinc finger-binding (ZnB) and C2H2-type zinc finger (Zn), which forms an intramolecular complex that governs the mutual exclusive binding of Jarid2 and EPOP in PRC2 holo complexes
