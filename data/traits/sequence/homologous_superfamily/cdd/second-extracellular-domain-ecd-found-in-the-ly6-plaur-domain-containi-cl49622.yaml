identifier: CDD:cl49622
label: "second extracellular domain (ECD) found in the Ly6/PLAUR domain-containing protein 4 (LYPD4)-like family. CD177, also called human neutrophil alloantigen 2a (HNA-2a), or NB1 glycoprotein (NB1 GP), or polycythemia rubra vera protein 1 (PRV-1), is a cell surface protein normally expressed on neutrophil. It modulates the function and homeostasis of tumor-infiltrating regulatory T cells. The expression of CD177 is an important biomarker of myeloproliferative diseases. HNA-2a is expressed on subpopulations of neutrophils. Gene CD177 has two alleles: NB1 and PRV-1, which encode a glycosylphoshatidylinositol (GPI)-anchored protein with three N-glycosylation sites that belongs to the uPAR/CD59/Ly6 snake toxin superfamily. NB1 glycoprotein binds to the endothelial cell adhesion molecule, platelet endothelial cell adhesion molecule-1 (PECAM-1) and participates in neutrophil transmigration. PRV-1 is a novel hematopoietic cell surface receptor which is overexpressed in polycythemia rubra vera. Members in this family contain four extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and show snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). The model corresponds to the fourth ECD domain of CD177."
definition: >-
  second extracellular domain (ECD) found in the Ly6/PLAUR domain-containing protein 4 (LYPD4)-like family. CD177, also called human neutrophil alloantigen 2a (HNA-2a), or NB1 glycoprotein (NB1 GP), or polycythemia rubra vera protein 1 (PRV-1), is a cell surface protein normally expressed on neutrophil. It modulates the function and homeostasis of tumor-infiltrating regulatory T cells. The expression of CD177 is an important biomarker of myeloproliferative diseases. HNA-2a is expressed on subpopulations of neutrophils. Gene CD177 has two alleles: NB1 and PRV-1, which encode a glycosylphoshatidylinositol (GPI)-anchored protein with three N-glycosylation sites that belongs to the uPAR/CD59/Ly6 snake toxin superfamily. NB1 glycoprotein binds to the endothelial cell adhesion molecule, platelet endothelial cell adhesion molecule-1 (PECAM-1) and participates in neutrophil transmigration. PRV-1 is a novel hematopoietic cell surface receptor which is overexpressed in polycythemia rubra vera. Members in this family contain four extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and show snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). The model corresponds to the fourth ECD domain of CD177. — an NCBI CDD domain superfamily (cl49622); members share this curated model.
