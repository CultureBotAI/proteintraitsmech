identifier: CDD:cl22855
label: TNFRSF
definition: >-
  Tumor necrosis factor receptor superfamily (TNFRSF). This family of proteins is found in eukaryotes. Proteins in this family are typically between 129 and 184 amino acids in length. This is the stn_TNFRSF12A_TNFR domain from the tumour necrosis factor receptor. The function of this domain is unknown
