identifier: CDD:cl22418
label: "X module of the carbohydrate-binding protein CttA and similar proteins. This is the N-terminal domain of cellulose-binding protein CttA present in Ruminococcus flavefaciens. CttA mediates attachment of the bacterial substrate via two carbohydrate-binding modules. The domain is known as the X-module and lacks a true hydrophobic core. Unlike the X-modules in other types of CohE-XDoc complexes it does not contribute to the binding surface. This X-module appears to serve as an extended spacer, which separates the cellulose-binding modules at the N terminus of CttA and the bacterial cell wall. The domain does not share structural similarity with other known X-modules from cellulolytic bacteria but does show similarity to G5-1 module of StrH from S. pneumoniae."
definition: >-
  X module of the carbohydrate-binding protein CttA and similar proteins. This is the N-terminal domain of cellulose-binding protein CttA present in Ruminococcus flavefaciens. CttA mediates attachment of the bacterial substrate via two carbohydrate-binding modules. The domain is known as the X-module and lacks a true hydrophobic core. Unlike the X-modules in other types of CohE-XDoc complexes it does not contribute to the binding surface. This X-module appears to serve as an extended spacer, which separates the cellulose-binding modules at the N terminus of CttA and the bacterial cell wall. The domain does not share structural similarity with other known X-modules from cellulolytic bacteria but does show similarity to G5-1 module of StrH from S. pneumoniae. — an NCBI CDD domain superfamily (cl22418); members share this curated model.
