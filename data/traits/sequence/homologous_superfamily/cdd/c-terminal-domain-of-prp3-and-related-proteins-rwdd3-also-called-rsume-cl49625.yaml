identifier: CDD:cl49625
label: Prp3_C-like
definition: >-
  C-terminal domain of Prp3 and related proteins. RWDD3, also called RSUME, is a small protein containing an N-terminal RWD domain and a C-terminal domain of unknown function. RWDD3 acts by modulating post-translational modification (PTM) of proteins, and it also plays a role in tumorigenesis. The C-terminal domain is predicted (by AlphaFold) to adopt a fold similar to the C-terminal domain of Prp3, an essential U4/U6 di-snRNP-associated protein which plays a role in pre-mRNA splicing. The Prp3 C-terminal domain is a single-stranded RNA-binding domain
