identifier: CDD:cl40422
label: M34_peptidase
definition: >-
  Peptidase family M34 includes the C-terminal catalytic domain of anthrax lethal factor (ATLF), the protective antigen-binding domains of ATLF and edema factor, and Pro-Pro endopeptidase. This subfamily includes the C-terminal catalytic domain of anthrax toxin lethal factor (ATLF; EC 3.4.24.83). ATLF and edema factor are enzyme components of anthrax toxin and are carried into the cell by a third component, the protective antigen (PA). ATLF is secreted by Bacillus anthracis to promote disease virulence through disruption of host signaling pathways. ATLF belongs to peptidase family M34 and has the hallmark metalloprotease motif HEXXH motif where the two His residues bind a single zinc atom, and the Glu has a catalytic role. ATLF is a highly selective protease whose major substrates are mitogen-activated protein kinase kinases (MKKs). MKKs are cleaved by ATLF near their N-termini, removing the docking sequence for the downstream cognate mitogen-activated protein kinase. Preferred amino acids around the cleavage site can be denoted BBBBxHxH, in which B denotes Arg or Lys, H denotes a hydrophobic amino acid, and x is any amino acid. At its N-terminus, ATLF has a related PABD domain which lacks the hallmark metalloprotease motif HEXXH. This subfamily also includes Bacillus thuringiensis Vip2Ac-like_2 which belongs to the Vip family of proteins that are secreted during the vegetative growth phase
