identifier: CDD:cl11466
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold. API-A, also called double-headed proteinase inhibitor A, inhibits an equimolar amount of trypsin and chymotrypsin simultaneously, and inhibits kallikrein weakly. It possesses two distinct reactive sites, unlike other members of their family. API-A contains an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold. API-A, also called double-headed proteinase inhibitor A, inhibits an equimolar amount of trypsin and chymotrypsin simultaneously, and inhibits kallikrein weakly. It possesses two distinct reactive sites, unlike other members of their family. API-A contains an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD domain superfamily (cl11466); members share this curated model.
