identifier: CDD:cl00134
label: Chemokine
definition: >-
  N/A. Chemokine_CC_DCCL: subgroup of the Chemokine_CC subgroup based on the presence of a DCCL motif involving the two N-terminal cysteine residues; includes a number of small inducible cytokines capable of reversibly inhibiting normal hematopoietic progenitor proliferation by blocking progression through the cell cycle; DCCL subgroup contains Exodus-1 (also known as CCL20, MIP-3alpha, LARC, ST38 (mouse)), Exodus-2 (also known as CCL21, SLC, 6-Ckine, TCA4, CKbeta9), and Exodus-3 (also known as CCL-19, ELC, MIP-3beta, CKbeta11). Exodus-3 was shown to inhibit the growth of human breast cancer cells in vivo in a mouse model; Exodus-1, -2, and -3 were all shown to significantly inhibit chronic myelogenous leukemia progenitor cell proliferation; Exodus-2 and -3 show potent immunotherapeutic activity toward solid tumors; chemotatic for T cells, B cells, dendritic cells, macrophage progenitor cells, and NK cells; exist as monomers and dimers, but are believed to be functional as monomers; found only in vertebrates. See CDs: Chemokine_CC (cd00272) for the entire CC subgroup, Chemokine (cd00169) for the general alignment of chemokines, or Chemokine_CXC (cd00273), Chemokine_C (cd00271), and Chemokine_CX3C (cd00274) for the additional chemokine subgroups
