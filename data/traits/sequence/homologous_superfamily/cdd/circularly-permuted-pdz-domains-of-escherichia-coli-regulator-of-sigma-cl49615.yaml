identifier: CDD:cl49615
label: cpPDZ_RseP_YlbL-like
definition: >-
  circularly permuted PDZ domains of Escherichia coli Regulator of sigma-E protease (RseP), Bacillus subtilis YlbL protease, and related domains. Permuted PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of ResP (also known as Site-2 protease RseP, and YaeL) and related domains. RseP is involved in the regulation of an extracytoplasmic stress response through the cleavage of membrane-spanning anti-stress-response transcription factor (anti-sigmaE) protein RseA; it cleaves the peptide bond between the critical alanine and cysteine in the transmembrane region of RseA, releasing the cytoplasmic domain of RseA with it associated sigmaE. RseP contains two tandem-arranged periplasmic PDZ domains (PDZ-N/PDZ1 and PDZ-C/PDZ2) which act to negatively regulate protease action on intact RseA; they serve as a size-exclusion filter which prevents the access of an intact RseA into the active site of RseP. PDZ domains usually bind in sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This RseP family PDZ domain is a circularly permuted PDZ domain which places both beta-strands A and B at the C-terminus. Another permutation exists in the PDZ superfamily which places beta-strand A at the C-terminus
