label: SKA1_N
definition: >-
  Spindle and kinetochore-associated protein 1, N-terminal domain. Spindle and kinetochore-associated protein 1 (SKA1) is a component of the SKA1 complex (consists of Ska1, Ska2, and Ska3/Rama1), a microtubule-binding subcomplex of the outer kinetochore that is essential for proper chromosome segregation
