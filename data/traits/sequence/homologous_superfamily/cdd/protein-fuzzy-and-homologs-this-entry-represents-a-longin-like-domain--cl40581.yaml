identifier: CDD:cl40581
label: Fuzzy
definition: >-
  protein fuzzy and homologs. This entry represents a longin-like domain found in Fuz and related proteins. This entry is specific to the second Longin domain of the HerMon (Hermansky-Pudlak syndrome and MON1-CCZ1) family, including protein sequences of FUZ, MON1 and HPS1 families. The Mon1/Ccz1 complex (MC1) is the GDP/GTP exchange factor (GEF) for the Rab GTPase Ypt7/Rab7 during vesicular trafficking. The Hps1/Hps4 complex (BLOC-3) is a Rab32 and Rab38 GEF and is required for biogenesis of melanosomes and platelet dense granules. Inturned (INTU) and Fuzzy (FUZ) proteins interact as members of the ciliogenesis and planar polarity effector (CPLANE) complex that controls recruitment of intraflagellar transport machinery to the basal body of primary cilia
