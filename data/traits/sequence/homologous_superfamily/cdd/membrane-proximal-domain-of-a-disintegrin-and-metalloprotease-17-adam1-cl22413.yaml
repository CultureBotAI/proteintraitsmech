identifier: CDD:cl22413
label: "Membrane-proximal domain of a disintegrin and metalloprotease 17 (ADAM17). ADAM17_MPD is the membrane-proximal domain of a family of disintegrin and metalloproteinase domain-containing protein 17 found in metazoan species. ADAM17 is a major sheddase that is responsible for the regulation of a wide range of biological processes, such as cellular differentiation, regeneration, and cancer progression. This MPD region acts as the sheddase switch. PDI or protein-disulfide isomerase interacts with ADAM17 and to down-regulate its enzymatic activity. The interaction is directly with the MPD, the region of dimerization and substrate recognition, where it catalyzes an isomerization of disulfide bridges within the thioredoxin motif CXXC. this isomerization results in a major structural change between an active, open state and an inactive, closed state of the MPD. This change is thought to act as a molecular switch, allowing a global reorientation of the extracellular domains in ADAM17 and regulating its shedding activity."
definition: >-
  Membrane-proximal domain of a disintegrin and metalloprotease 17 (ADAM17). ADAM17_MPD is the membrane-proximal domain of a family of disintegrin and metalloproteinase domain-containing protein 17 found in metazoan species. ADAM17 is a major sheddase that is responsible for the regulation of a wide range of biological processes, such as cellular differentiation, regeneration, and cancer progression. This MPD region acts as the sheddase switch. PDI or protein-disulfide isomerase interacts with ADAM17 and to down-regulate its enzymatic activity. The interaction is directly with the MPD, the region of dimerization and substrate recognition, where it catalyzes an isomerization of disulfide bridges within the thioredoxin motif CXXC. this isomerization results in a major structural change between an active, open state and an inactive, closed state of the MPD. This change is thought to act as a molecular switch, allowing a global reorientation of the extracellular domains in ADAM17 and regulating its shedding activity. — an NCBI CDD domain superfamily (cl22413); members share this curated model.
