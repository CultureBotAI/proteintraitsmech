identifier: CDD:cl00062
label: "forkhead associated (FHA) domain superfamily. PNKP (EC 3.1.3.32/EC 2.7.1.78), also called DNA 5'-kinase/3'-phosphatase, or polynucleotide kinase-3'-phosphatase, plays a key role in the repair of DNA damage, functioning as part of both the non-homologous end-joining (NHEJ) and base excision repair (BER) pathways. Through its two catalytic activities, PNKP ensures that DNA termini are compatible with extension and ligation by either removing 3'-phosphates from, or by phosphorylating 5'-hydroxyl groups on, the ribose sugar of the DNA backbone. PNKP contains an FHA domain at its N-terminus. The FHA domain is a small phosphopeptide recognition module."
definition: >-
