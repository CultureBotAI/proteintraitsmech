identifier: CDD:cl40451
label: cwf21
definition: >-
  cwf21 domain. Serine/arginine repetitive matrix protein 3 (SRRM3) may play a role in regulating breast cancer cell invasiveness. It may also be involved in RYBP-mediated breast cancer progression. SRRM3 contains a cwf21 domain at the N-terminus. The cwf21 domain is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8
