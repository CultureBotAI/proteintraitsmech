identifier: CDD:cl41733
label: Syt1_2_N
definition: >-
  N-terminal domain of synaptotagmin-1 and -2. Syt2, also called synaptotagmin II (SytII), exhibits calcium-dependent phospholipid and inositol polyphosphate binding properties. It may have a regulatory role in the membrane interactions during trafficking of synaptic vesicles at the active zone of the synapse. It plays a role in dendrite formation by melanocytes. The model corresponds to N-terminal domain of Syt2, which is a recognition domain responsible for the binding of botulinum neurotoxin B (BoNT B)
