definition: >-
  CRISPR/Cas system-associated protein Csx15. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Small protein loosely associated with CRISPR/Cas systems; some are fused to AAA ATPase domain, also known as TTE2665 family
