identifier: CDD:cl15819
label: MqsA
definition: >-
  antitoxin MqsA for MqsR toxin. The YokU-like protein family includes the B. subtilis YokU protein, which is functionally uncharacterized. This family of proteins is found in bacteria. Proteins in this family are approximately 90 amino acids in length. There are two conserved CXXC sequence motifs. This is likely to be a family of bacterial antitoxins, as the sequence bears remote homology to the RelE fold family
