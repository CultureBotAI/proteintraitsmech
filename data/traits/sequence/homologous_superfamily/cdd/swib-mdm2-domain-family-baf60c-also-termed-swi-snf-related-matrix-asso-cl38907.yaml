identifier: CDD:cl38907
label: "SWIB/MDM2 domain family. BAF60C, also termed SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily D member 3 (SMARCD3), or 60 kDa BRG-1/Brm-associated factor subunit C, is a core subunit of the SWI/SNF chromatin-remodeling complex that activates the transcription of fatty acid oxidation genes during fasting. It is involved in chromatin remodeling and hepatic lipid metabolism. It is also essential for cardiomyocyte differentiation at the early heart development. Moreover, BAF60C drives glycolytic metabolism in the muscle and improves systemic glucose homeostasis through Deptor-mediated Akt activation. Furthermore, BAF60C epigenetically regulates epithelial-mesenchymal transition (EMT) by activating WNT signaling pathways."
definition: >-
