label: FimH_man-bind
definition: >-
  Mannose binding domain of FimH and related proteins. Members of this family adopt a secondary structure consisting of a beta sandwich, with nine strands arranged in two sheets in a Greek key topology. They are predominantly found in bacterial mannose-specific adhesins, since they are capable of binding to D-mannose
