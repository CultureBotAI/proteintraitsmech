identifier: CDD:cl41758
label: peptidase_C58-like
definition: >-
  C58 peptidase domain and and similar domains. This family includes the C58 peptidase domain of Pseudomonas syringae HopN1 peptidase, a type III secretion system effector that can suppress plant cell death events in both compatible and incompatible interactions. HopN1's proteolytic activity is dependent upon the invariant C/H/D residues conserved in the C58/YopT family peptidase domain
