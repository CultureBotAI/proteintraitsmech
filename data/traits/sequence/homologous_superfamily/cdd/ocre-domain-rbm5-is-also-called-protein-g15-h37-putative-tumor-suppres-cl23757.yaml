identifier: CDD:cl23757
label: OCRE
definition: >-
  OCRE domain. RBM5 is also called protein G15, H37, putative tumor suppressor LUCA15, or renal carcinoma antigen NY-REN-9. It is a known modulator of apoptosis. It acts as a tumor suppressor or an RNA splicing factor. RBM5 shows high sequence similarity to RNA-binding protein 6 (RBM6 or NY-LU-12 or g16 or DEF-3). Both of them specifically binds poly(G) RNA. RBM5 contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), an OCtamer REpeat (OCRE) domain, two C2H2-type zinc fingers, a nuclear localization signal, and a G-patch/D111 domain
