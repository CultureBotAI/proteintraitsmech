label: Pro-peptidase_S53
definition: >-
  Activation domain of S53 peptidases. Members of this family are found in various subtilase propeptides, and adopt a ferredoxin-like fold, with an alpha+beta sandwich. Cleavage of the domain results in activation of the peptide
