identifier: CDD:cl41671
label: "C-terminal domain of TBC1 domain family member 23, and similar proteins. TBC1 domain family member 23 (TBC1D23) belongs to a family of TBC domain-containing Rab-specific GTPase-activating proteins, which plays a role in endosome-to-Golgi trafficking. It acts as a bridging factor in which the TBC domain binds to Golgi adaptor proteins golgin-97 and golgin-245 and its C-terminal to FAM21 subunit of the WASH complex, which regulates multiple endosomal trafficking routes. TBC1D23 is important for normal brain development, especially in axonal and dendritic growth. This entry represents the C-terminal domain that contains residues for specific FAM21 binding and for the cargo of endosome-derived carriers. It adopts a fold similar to the Pleckstrin homology (PH) domain. Mutations in this protein, and particularly in this domain, are linked with Pontocerebellar hypoplasia (PCH), suggesting that the TBC1D23 C-terminal domain is required for neuronal growth and brain development."
