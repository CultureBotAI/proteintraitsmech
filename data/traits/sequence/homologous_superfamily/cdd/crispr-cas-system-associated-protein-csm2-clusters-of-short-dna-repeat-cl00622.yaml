identifier: CDD:cl00622
label: "CRISPR/Cas system-associated protein Csm2. Clusters of short DNA repeats with non-homologous spacers, which are found at regular intervals in the genomes of phylogenetically distinct prokaryotic species, comprise a family with recognisable features. This family is known as CRISPR (short for Clustered Regularly Interspaced Short Palindromic Repeats). A number of protein families appear only in association with these repeats and are designated Cas (CRISPR-associated) proteins. This entry represents Csm2 Type III-A, a family of Cas proteins also known as TM1810/Csm2."
definition: >-
  CRISPR/Cas system-associated protein Csm2. Clusters of short DNA repeats with non-homologous spacers, which are found at regular intervals in the genomes of phylogenetically distinct prokaryotic species, comprise a family with recognisable features. This family is known as CRISPR (short for Clustered Regularly Interspaced Short Palindromic Repeats). A number of protein families appear only in association with these repeats and are designated Cas (CRISPR-associated) proteins. This entry represents Csm2 Type III-A, a family of Cas proteins also known as TM1810/Csm2. — an NCBI CDD domain superfamily (cl00622); members share this curated model.
