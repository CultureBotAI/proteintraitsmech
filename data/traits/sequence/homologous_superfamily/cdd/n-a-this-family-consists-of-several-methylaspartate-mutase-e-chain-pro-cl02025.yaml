label: Glm_e
definition: >-
  N/A. This family consists of several methylaspartate mutase E chain proteins (EC:5.4.99.1). Glutamate mutase catalyzes the first step in the fermentation of glutamate by Clostridium tetanomorphum. This is an unusual isomerization in which L-glutamate is converted to threo-beta-methyl L-aspartate
