identifier: CDD:cl06188
label: Orc3
definition: >-
  Origin recognition complex subunit 3. This family represents the N-terminus (approximately 300 residues) of subunit 3 of the eukaryotic origin recognition complex (ORC). Origin recognition complex (ORC) is composed of six subunits that are essential for cell viability. They collectively bind to the autonomously replicating sequence (ARS) in a sequence-specific manner and lead to the chromatin loading of other replication factors that are essential for initiation of DNA replication. This domain is predicted to contain an AAA+ fold but lack the residues important for ATP hydrolysis, thus, it is called AAA+ like
