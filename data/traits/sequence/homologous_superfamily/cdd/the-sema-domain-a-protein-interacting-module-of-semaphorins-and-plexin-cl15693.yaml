identifier: CDD:cl15693
label: "The Sema domain, a protein interacting module, of semaphorins and plexins. RON receptor tyrosine kinase is a Macrophage-stimulating protein (MSP) receptor. Upon binding of MSP, RON is activated via autophosphorylation within its kinase catalytic domain, resulting in a wide range of effects, including proliferation, tubular morphogenesis, angiogenesis, cellular motility and invasiveness. By interacting with downstream signaling molecules, it regulates macrophage migration, phagocytosis, and nitric oxide production. RON has been implicated in cancers of the breast, colon, pancreas and ovaries because both splice variants and receptor overexpression have been identified in these tumors. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as ligand recognition and binding model. RON is composed of an alpha-beta heterodimer. The extracellular alpha chain is disulfide linked to the beta chain, which contains an extracellular ligand-binding region with a Sema domain, a PSI domain and four IPT repeats, a transmembrane segment, and an intracellular catalytic tyrosine kinase domain. The Sema domain of RON may be necessary for receptor dimerization and activation."
definition: >-
  The Sema domain, a protein interacting module, of semaphorins and plexins. RON receptor tyrosine kinase is a Macrophage-stimulating protein (MSP) receptor. Upon binding of MSP, RON is activated via autophosphorylation within its kinase catalytic domain, resulting in a wide range of effects, including proliferation, tubular morphogenesis, angiogenesis, cellular motility and invasiveness. By interacting with downstream signaling molecules, it regulates macrophage migration, phagocytosis, and nitric oxide production. RON has been implicated in cancers of the breast, colon, pancreas and ovaries because both splice variants and receptor overexpression have been identified in these tumors. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as ligand recognition and binding model. RON is composed of an alpha-beta heterodimer. The extracellular alpha chain is disulfide linked to the beta chain, which contains an extracellular ligand-binding region with a Sema domain, a PSI domain and four IPT repeats, a transmembrane segment, and an intracellular catalytic tyrosine kinase domain. The Sema domain of RON may be necessary for receptor dimerization and activation. — an NCBI CDD domain superfamily (cl15693); members share this curated model.
