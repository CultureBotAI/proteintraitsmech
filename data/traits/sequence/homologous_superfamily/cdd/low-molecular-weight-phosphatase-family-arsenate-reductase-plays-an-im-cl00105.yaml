identifier: CDD:cl00105
label: LMWP
definition: >-
  Low molecular weight phosphatase family. Arsenate reductase plays an important role in the reduction of intracellular arsenate to arsenite, an important step in arsenic detoxification. The reduction involves three different thiolate nucleophiles. In arsenate reductases of the LMWP family, reduction can be coupled with thioredoxin (Trx)/thioredoxin reductase (TrxR) or glutathione (GSH)/glutaredoxin (Grx)
