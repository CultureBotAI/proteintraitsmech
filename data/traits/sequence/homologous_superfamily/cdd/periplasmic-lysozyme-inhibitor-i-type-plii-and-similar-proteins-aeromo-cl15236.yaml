identifier: CDD:cl15236
label: PliI_like
definition: >-
  Periplasmic lysozyme inhibitor, I-type (PliI) and similar proteins. Aeromonas hydrophila PliI is a dimeric periplasmic protein that enables bacteria to resist permeabilization of the outer membrane by the bactericidal action of lysozyme. PliI may be a direct inhibitor of lysozyme that inserts a conserved loop into the active site of type I (invertebrate) lysozymes
