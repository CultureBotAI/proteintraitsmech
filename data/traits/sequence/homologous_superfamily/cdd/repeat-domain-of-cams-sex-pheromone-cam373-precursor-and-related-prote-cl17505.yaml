identifier: CDD:cl17505
label: "Repeat domain of CamS sex pheromone cAM373 precursor and related proteins. This  family includes CamS, from which Staphylococcus aureus sex pheromone staph-cAM373 is processed. The protein contains two structurally similar repeats in a tandem arrangement. The heptapeptide cAM373 is a Streptococcus faecalis pheromone, secreted by recipient cells, which induces a mating response in donor cells that contain particular conjugative plasmids. cAM373 is also excreted by Staphylococcus aureus. The family also contains sex hormone precursors from other bacteria."
definition: >-
  Repeat domain of CamS sex pheromone cAM373 precursor and related proteins. This family includes CamS, from which Staphylococcus aureus sex pheromone staph-cAM373 is processed. The protein contains two structurally similar repeats in a tandem arrangement. The heptapeptide cAM373 is a Streptococcus faecalis pheromone, secreted by recipient cells, which induces a mating response in donor cells that contain particular conjugative plasmids. cAM373 is also excreted by Staphylococcus aureus. The family also contains sex hormone precursors from other bacteria. — an NCBI CDD domain superfamily (cl17505); members share this curated model.
