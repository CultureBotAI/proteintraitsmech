label: LPLAT
definition: >-
  Lysophospholipid acyltransferases (LPLATs) of glycerophospholipid biosynthesis. This family contains acyltransferases involved in phospholipid biosynthesis and other proteins of unknown function. This family also includes tafazzin, the Barth syndrome gene
