label: TOP4c
definition: >-
  N/A. This model describes the common type II DNA topoisomerase (DNA gyrase). Two apparently independently arising families, one in the Proteobacteria and one in Gram-positive lineages, are both designated toposisomerase IV. [DNA metabolism, DNA replication, recombination, and repair]
