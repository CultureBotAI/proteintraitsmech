label: "Isoprenoid Biosynthesis enzymes, Class 1. This family consists of several fungal trichodiene synthase proteins (EC:4.2.3.6). TRI5 encodes the enzyme trichodiene synthase, which has been shown to catalyze the first step in the trichothecene pathways of Fusarium and Trichothecium species."
definition: >-
