label: EFh_HEF
definition: >-
  EF-hand, calcium binding motif, found in the hexa-EF hand proteins family. CBN, the product of the cbn gene, is a Drosophila homolog to vertebrate neuronal six EF-hand calcium binding proteins. It is expressed through most of ontogenesis with a selective distribution in the nervous system and in a few small adult thoracic muscles. Its precise biological role remains unclear. CBN contains six EF-hand motifs, but some of them may not bind calcium ions due to the lack of key residues
