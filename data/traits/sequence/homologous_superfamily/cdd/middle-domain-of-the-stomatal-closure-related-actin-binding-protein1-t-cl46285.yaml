identifier: CDD:cl46285
label: SCAB1_middle
definition: >-
  middle domain of the stomatal closure-related actin binding protein1. This family is an Ig-like domain found on plant-specific actin-binding proteins or SCABs. SCAB proteins bind, bundle and stabilize actin filaments and regulate stomatal movement. The Ig-PH fusion domain is at the C-terminus. This domain is an Ig beta-sandwich fold consisting of two antiparallel beta-sheets built from strands beta1 and beta2 and strands beta3-beta6, respectively
