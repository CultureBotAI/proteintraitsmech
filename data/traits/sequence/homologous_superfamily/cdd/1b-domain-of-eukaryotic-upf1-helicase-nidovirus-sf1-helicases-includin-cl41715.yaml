identifier: CDD:cl41715
label: "1B domain of eukaryotic UPF1 helicase, nidovirus SF1 helicases including coronavirus Nsp13 and arterivirus Nsp10, and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. Members of this subfamily belong to helicase superfamily 1 (SF1) and include arterivirus helicases such Equine arteritis virus (EAV) Nsp10 helicase encoded on ORF1b. EAV Nsp10 is a multidomain protein; its other domains include an N-terminal Cys/His rich zinc-binding domain (CH/ZBD) and a SF1 helicase core. The 1B domain is involved in nucleic acid substrate binding; the 1B domain of EAV Nsp10 undergoes large conformational change upon substrate binding, and together with the 1A and 2A domains of the helicase core form a channel that accommodates the single stranded nucleic acids."
definition: >-
