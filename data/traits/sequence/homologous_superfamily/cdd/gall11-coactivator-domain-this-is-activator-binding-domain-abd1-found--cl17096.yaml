identifier: CDD:cl17096
label: gal11_coact
definition: >-
  gall11 coactivator domain. This is activator-binding domain (ABD1) found in Gal11/med15 proteins. Structural analysis indicate that it binds to the central activator domain (cAD) of Gcn4. Mutations in Gal11-ABD1 W196 residue abolishes the binding to Gcn4 cAD
