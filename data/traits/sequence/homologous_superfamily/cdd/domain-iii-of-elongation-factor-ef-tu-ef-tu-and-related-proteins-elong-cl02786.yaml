definition: >-
  Domain III of Elongation factor (EF) Tu (EF-TU) and related proteins. Elongation factor Tu consists of three structural domains, this is the third domain. This domain adopts a beta barrel structure. This the third domain is involved in binding to both charged tRNA and binding to EF-Ts pfam00889
