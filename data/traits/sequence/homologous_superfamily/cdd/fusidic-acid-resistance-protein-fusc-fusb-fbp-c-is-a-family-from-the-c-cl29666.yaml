identifier: CDD:cl29666
label: "Fusidic acid resistance protein (FusC/FusB). FBP_C is a family from the C terminal end of fibronectin-binding proteins. It forms an extended four-cysteine zinc-finger with a unique structural fold. Fibronectin-binding proteins bind to elongation factor G - EF-G, which is mediated by the zinc-finger binding to the C-terminus of EF-G. FBPs release ribosomes by competing with them for EF-G."
definition: >-
  Fusidic acid resistance protein (FusC/FusB). FBP_C is a family from the C terminal end of fibronectin-binding proteins. It forms an extended four-cysteine zinc-finger with a unique structural fold. Fibronectin-binding proteins bind to elongation factor G - EF-G, which is mediated by the zinc-finger binding to the C-terminus of EF-G. FBPs release ribosomes by competing with them for EF-G. — an NCBI CDD domain superfamily (cl29666); members share this curated model.
