identifier: CDD:cl22411
label: E2F_DD
definition: >-
  Dimerization domain of E2F transcription factors. This is the coiled coil (CC) - marked box (MB) domain of E2F transcription factors. This domain forms a heterodimer with the corresponding domain of the DP transcription factor, the heterodimer binds the C-terminus of retinoblastoma protein
