identifier: CDD:cl41769
label: "membrane localization domain (MLD) of Vibrio MARTX, Pasteurella PMT, clostridial glycosylating cytotoxins, toxin effectors BteA (Bordetella T3SS effector A) and related proteins. This family includes the MLD located in the N-terminal minimal membrane-binding segment of BteA (residues 1-131, BteA131), which has also been referred to as the lipid raft targeting (LRT) domain/motif. BteA is a type III secretion system (T3SS) effector protein from Bordetella pertussis, a bacterial respiratory pathogen and the causative agent of whooping cough. The BteA131 segment is multifunctional: in addition to targeting phosphatidylinositol (PI)-rich microdomains in the host membrane, it binds its cognate chaperone BtcA. The MLD adopts a four-helix bundle structure, with a positively charged surface that targets phosphatidylinositol 4,5-bisphosphate (PIP2) in the host membrane via critical arginine and lysine residues. A flexible region preceding the BteA helical bundle contains the characteristic beta-motif required for binding BtcA. This domain has significant sequence similarity to the N-terminal domain of effectors and the endo-domain of RTX-type toxins from Photorhabdus luminescens. This family includes the N-terminal domain of Photorhabdus laumondii Photox toxin; little is known about the N-terminus of Photox, but its C-terminus is an actin-targeting ADP-ribosyltransferase."
definition: >-
  membrane localization domain (MLD) of Vibrio MARTX, Pasteurella PMT, clostridial glycosylating cytotoxins, toxin effectors BteA (Bordetella T3SS effector A) and related proteins. This family includes the MLD located in the N-terminal minimal membrane-binding segment of BteA (residues 1-131, BteA131), which has also been referred to as the lipid raft targeting (LRT) domain/motif. BteA is a type III secretion system (T3SS) effector protein from Bordetella pertussis, a bacterial respiratory pathogen and the causative agent of whooping cough. The BteA131 segment is multifunctional: in addition to targeting phosphatidylinositol (PI)-rich microdomains in the host membrane, it binds its cognate chaperone BtcA. The MLD adopts a four-helix bundle structure, with a positively charged surface that targets phosphatidylinositol 4,5-bisphosphate (PIP2) in the host membrane via critical arginine and lysine residues. A flexible region preceding the BteA helical bundle contains the characteristic beta-motif required for binding BtcA. This domain has significant sequence similarity to the N-terminal domain of effectors and the endo-domain of RTX-type toxins from Photorhabdus luminescens. This family includes the N-terminal domain of Photorhabdus laumondii Photox toxin; little is known about the N-terminus of Photox, but its C-terminus is an actin-targeting ADP-ribosyltransferase. — an NCBI CDD domain superfamily (cl41769); members share this curated model.
