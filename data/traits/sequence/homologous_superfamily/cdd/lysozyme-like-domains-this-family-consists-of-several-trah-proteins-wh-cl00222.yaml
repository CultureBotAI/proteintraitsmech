label: Lyz-like
definition: >-
  lysozyme-like domains. This family consists of several TraH proteins which seem to be specific to Agrobacterium and Rhizobium species. This protein is thought to be involved in conjugal transfer but its function is unknown. This family does not appear to be related to pfam06122
