identifier: CDD:cl00599
label: Extradiol_Dioxygenase_3B_like
definition: >-
  Subunit B of Class III Extradiol ring-cleavage dioxygenases. This family contains members from all branches of life. The molecular function of this protein is unknown, but Memo (mediator of ErbB2-driven cell motility) a human protein is included in this family. It has been suggested that Memo controls cell migration by relaying extracellular chemotactic signals to the microtubule cytoskeleton
