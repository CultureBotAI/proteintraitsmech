identifier: CDD:cl23986
label: "Helical bundle domain of the death-domain associated protein (DAXX). The Daxx protein (also known as the Fas-binding protein) is thought to play a role in apoptosis. Daxx forms a complex with Axin. Remodelling of the family to a short domain based on the PDB:2kzs structure gives a more representative family. DAXX is a scaffold protein shown to play diverse roles in transcription and cell cycle regulation. This N-terminal domain folds into a left-handed four-helix bundle (H1, H2, H4, H5) that binds to the N-terminal residues of the tumour-suppressor Rassf1C."
definition: >-
  Helical bundle domain of the death-domain associated protein (DAXX). The Daxx protein (also known as the Fas-binding protein) is thought to play a role in apoptosis. Daxx forms a complex with Axin. Remodelling of the family to a short domain based on the PDB:2kzs structure gives a more representative family. DAXX is a scaffold protein shown to play diverse roles in transcription and cell cycle regulation. This N-terminal domain folds into a left-handed four-helix bundle (H1, H2, H4, H5) that binds to the N-terminal residues of the tumour-suppressor Rassf1C. — an NCBI CDD domain superfamily (cl23986); members share this curated model.
