identifier: CDD:cl39768
label: CdiA-CT_Yk_RNaseA-like
definition: >-
  C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system protein CdiA (CdiA-CT) of Yersinia kristensenii, and similar proteins. Contact-dependent growth inhibition (CDI) is an important mechanism of inter-bacterial competition found in many Gram-negative pathogens. CDI+ cells express cell-surface CdiA proteins that bind neighboring bacteria and deliver C-terminal toxin domains (CdiA-CT) to inhibit target-cell growth. Structure analysis of CdiA-CT shows that it adopts the same fold (with two beta-sheets forming an overall kidney shape) as angiogenin and other RNase A paralogs, but the toxin does not share sequence similarity with these nucleases and lacks the characteriztic disulfide bonds of the superfamily. Furthermore, structural comparison analysis identified human angiogenin, Rana pipiens protein P-30 (onconase) and mouse pancreatic ribonuclease (RNase 1) as the closest structural homologs of CdiA-CT
