identifier: CDD:cl41738
label: "LGN tetratricopeptide repeat-binding domain found in FERM and PDZ domain-containing proteins FRMPD1, FRMPD4, and similar proteins. FRMPD4, also called PDZ domain-containing protein 10 (PDZD10), PDZK10, or PSD-95-interacting regulator of spine morphogenesis (Preso), is a novel PSD-95-interacting FERM and PDZ domain protein that regulates dendritic spine morphogenesis. It acts as a positive regulator of dendritic spine morphogenesis and density. It is required for the maintenance of excitatory synaptic transmission. It binds phosphatidylinositol 4,5-bisphosphate. FRMPD4 contains WW, PDZ and FERM domains in the N-terminal region. This model corresponds to a conserved region in the C-terminal region of FRMPD4 that binds to tetratricopeptide (TPR) repeats present in the N-terminal domain of adaptor protein LGN. LGN plays a crucial role in mitotic spindle orientation and cell polarization via interaction with multiple targets including FRMPD4."
definition: >-
  LGN tetratricopeptide repeat-binding domain found in FERM and PDZ domain-containing proteins FRMPD1, FRMPD4, and similar proteins. FRMPD4, also called PDZ domain-containing protein 10 (PDZD10), PDZK10, or PSD-95-interacting regulator of spine morphogenesis (Preso), is a novel PSD-95-interacting FERM and PDZ domain protein that regulates dendritic spine morphogenesis. It acts as a positive regulator of dendritic spine morphogenesis and density. It is required for the maintenance of excitatory synaptic transmission. It binds phosphatidylinositol 4,5-bisphosphate. FRMPD4 contains WW, PDZ and FERM domains in the N-terminal region. This model corresponds to a conserved region in the C-terminal region of FRMPD4 that binds to tetratricopeptide (TPR) repeats present in the N-terminal domain of adaptor protein LGN. LGN plays a crucial role in mitotic spindle orientation and cell polarization via interaction with multiple targets including FRMPD4. — an NCBI CDD domain superfamily (cl41738); members share this curated model.
