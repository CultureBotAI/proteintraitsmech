identifier: CDD:cl41737
label: "trimerization domain of the echinoderm microtubule-associated protein-like family. Echinoderm microtubule-associated protein-like 4 (EMAP-4), also called EML4, EMAPL4, restrictedly overexpressed proliferation-associated protein, or Ropp 120, may modify the assembly dynamics of microtubules, such that microtubules are slightly longer, but more dynamic. This model corresponds to the N-terminal trimerization domain of EMAP-4."
definition: >-
  trimerization domain of the echinoderm microtubule-associated protein-like family. Echinoderm microtubule-associated protein-like 4 (EMAP-4), also called EML4, EMAPL4, restrictedly overexpressed proliferation-associated protein, or Ropp 120, may modify the assembly dynamics of microtubules, such that microtubules are slightly longer, but more dynamic. This model corresponds to the N-terminal trimerization domain of EMAP-4. — an NCBI CDD domain superfamily (cl41737); members share this curated model.
