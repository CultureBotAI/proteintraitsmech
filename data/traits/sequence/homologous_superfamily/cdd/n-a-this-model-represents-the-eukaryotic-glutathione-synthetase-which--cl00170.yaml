label: "N/A. This model represents the eukaryotic glutathione synthetase, which shows little resemblance to the analogous enzyme of Gram-negative bacteria (TIGR01380). In the Kinetoplastida, trypanothione replaces glutathione, but can be made from glutathione; a sequence from Leishmania is not included in the seed, is highly divergent, and therefore scores between the trusted and noise cutoffs."
definition: >-
  N/A. This model represents the eukaryotic glutathione synthetase, which shows little resemblance to the analogous enzyme of Gram-negative bacteria (TIGR01380). In the Kinetoplastida, trypanothione replaces glutathione, but can be made from glutathione; a sequence from Leishmania is not included in the seed, is highly divergent, and therefore scores between the trusted and noise cutoffs. — an NCBI CDD domain superfamily (cl00170); members share this curated model.
