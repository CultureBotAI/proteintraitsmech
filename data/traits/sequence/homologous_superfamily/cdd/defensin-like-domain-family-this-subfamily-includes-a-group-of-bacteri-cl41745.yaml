identifier: CDD:cl41745
label: "defensin-like domain family. This subfamily includes a group of bactericidal proteins, such as defensins, sapecins, tenecins, phormicins, and lucifensins from bilateria. They are host defense peptides produced in response to injury and mostly active against Gram-positive bacteria. This model corresponds to the defensin-like (DEFL) domain, which adopts a typical structure characterized by cysteine-stabilized alpha/beta scaffold."
definition: >-
  defensin-like domain family. This subfamily includes a group of bactericidal proteins, such as defensins, sapecins, tenecins, phormicins, and lucifensins from bilateria. They are host defense peptides produced in response to injury and mostly active against Gram-positive bacteria. This model corresponds to the defensin-like (DEFL) domain, which adopts a typical structure characterized by cysteine-stabilized alpha/beta scaffold. — an NCBI CDD domain superfamily (cl41745); members share this curated model.
