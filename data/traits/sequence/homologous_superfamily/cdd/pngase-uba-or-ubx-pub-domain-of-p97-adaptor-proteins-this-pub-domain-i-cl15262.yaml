identifier: CDD:cl15262
label: PUB
definition: >-
  PNGase/UBA or UBX (PUB) domain of p97 adaptor proteins. This PUB domain is found in the p97 adaptor protein RNF31 (RING finger protein 31). The PUB domain functions as a p97 (also known as valosin-containing protein or VCP) adaptor by interacting with the D1 and/or D2 ATPase domains. The type II AAA+ ATPase p97 is involved in a variety of cellular processes such as the deglycosylation of ERAD substrates, membrane fusion, transcription factor activation and cell cycle regulation through differential binding to specific adaptor proteins. The RNF31 protein, also known as HOIP or Zibra, contains an N-terminal PUB domain similar to those in PNGase and UBXD1, suggesting its association with p97. RNF31 functions in a complex with another RING-finger protein (HOIL-IL), displaying E3 ubiquitin-protein ligase activity, and forming linear ubiquitin chain assembly complex (LUBAC) through linkages between the N- and C-termini of ubiquitin. LUBAC has been shown to activate the NF-kappaB pathway
