identifier: CDD:cl17166
label: "Methylmalonic aciduria and homocystinuria type C protein and similar proteins. MMACHC, also called CblC, is involved in the intracellular processing of vitamin B12 by catalyzing two reactions: the reductive decyanation of cyanocobalamin in the presence of a flavoprotein oxidoreductase and the dealkylation of alkylcobalamins through the nucleophilic displacement of the alkyl group by glutathione. Mutations in MMACHC cause combined methylmalonic acidemia/aciduria and homocystinuria (CblC type), the most common inherited disorder of cobalamin metabolism. The structure of MMACHC reveals it to be the most divergent member of the NADPH-dependent flavin reductase family that can use FMN or FAD to catalyze reductive decyanation; it is also the first enzyme with glutathione transferase (GST) activity that is unrelated to the GST superfamily in structure and sequence."
