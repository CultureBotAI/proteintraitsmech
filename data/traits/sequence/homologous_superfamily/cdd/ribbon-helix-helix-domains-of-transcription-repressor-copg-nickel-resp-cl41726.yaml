identifier: CDD:cl41726
label: RHH_CopG_NikR-like
definition: >-
  ribbon-helix-helix domains of transcription repressor CopG, nickel responsive transcription factor NikR, and similar proteins. This subfamily includes the N-terminal ribbon-helix-helix (RHH) domain of putative transcriptional repressor CopG from archaea, and similar proteins. These uncharacterized proteins have a typical RHH, similar to plasmid-encoded transcriptional repressor CopG, the protein that is encoded by the promiscuous streptococcal plasmid pMV158 and is involved in the control of plasmid copy number
