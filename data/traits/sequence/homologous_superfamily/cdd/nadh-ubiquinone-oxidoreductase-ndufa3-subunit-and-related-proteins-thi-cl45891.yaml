identifier: CDD:cl45891
label: NDUFA3-like
definition: >-
  NADH:Ubiquinone Oxidoreductase, NDUFA3 subunit and related proteins. This subfamily contains the NDUFA3-like subunit of plant NADH:Ubiquinone Oxidoreductase (Respiratory complex I), which is a redox-driven proton pump that plays an important role in creating the electrochemical gradient that powers mitochondrial adenosine triphosphate synthesis. NADH dehydrogenase 1 alpha subcomplex subunit 3 (NDUFA3) is a single-pass membrane protein and is considered an accessory subunit
