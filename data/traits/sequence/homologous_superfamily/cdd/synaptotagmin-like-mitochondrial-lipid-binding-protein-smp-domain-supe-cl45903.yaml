identifier: CDD:cl45903
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain superfamily. C2CD2L, also called phospholipid transfer protein C2CD2L, or C2CD2-like, or transmembrane protein 24 (TMEM24), is a lipid-binding protein that transports phosphatidylinositol, the precursor of phosphatidylinositol 4,5-bisphosphate (PI(4,5)P2), from its site of synthesis in the endoplasmic reticulum to the cell membrane. It is a Ca2+-regulated component of endoplasmic reticulum (ER)-plasma membrane contacts in mammalian neurons. This model corresponds to the SMP domain of C2CD2L, which may be implicated in lipid transport."
definition: >-
  synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain superfamily. C2CD2L, also called phospholipid transfer protein C2CD2L, or C2CD2-like, or transmembrane protein 24 (TMEM24), is a lipid-binding protein that transports phosphatidylinositol, the precursor of phosphatidylinositol 4,5-bisphosphate (PI(4,5)P2), from its site of synthesis in the endoplasmic reticulum to the cell membrane. It is a Ca2+-regulated component of endoplasmic reticulum (ER)-plasma membrane contacts in mammalian neurons. This model corresponds to the SMP domain of C2CD2L, which may be implicated in lipid transport. — an NCBI CDD domain superfamily (cl45903); members share this curated model.
