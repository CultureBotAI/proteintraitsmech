identifier: CDD:cl00216
label: "Bacterial L-asparaginases and related enzymes. This peptide is found only in the Archaea. It is part of a heterodimer, with GatE (TIGR00134), that acts as an amidotransferase on misacylated Glu-tRNA(Gln) to produce Gln-tRNA(Gln). The analogous amidotransferase found in bacteria is the GatABC system, although GatABC homologs in the Archaea appear to act instead on Asp-tRNA(Asn). [Protein synthesis, tRNA aminoacylation]"
definition: >-
  Bacterial L-asparaginases and related enzymes. This peptide is found only in the Archaea. It is part of a heterodimer, with GatE (TIGR00134), that acts as an amidotransferase on misacylated Glu-tRNA(Gln) to produce Gln-tRNA(Gln). The analogous amidotransferase found in bacteria is the GatABC system, although GatABC homologs in the Archaea appear to act instead on Asp-tRNA(Asn). [Protein synthesis, tRNA aminoacylation] — an NCBI CDD domain superfamily (cl00216); members share this curated model.
