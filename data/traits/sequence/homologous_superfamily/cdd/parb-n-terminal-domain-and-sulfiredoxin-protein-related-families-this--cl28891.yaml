identifier: CDD:cl28891
label: ParB_N_Srx
definition: >-
  ParB N-terminal domain and sulfiredoxin protein-related families. This is family of bacterial proteins likely to be necessary for binding to DNA and recognising the modification sites. Members are found in bacteria, archaea and on viral plasmids, and are typically between 354 and 474 amino acids in length. There is a conserved DGQHR sequence motif
