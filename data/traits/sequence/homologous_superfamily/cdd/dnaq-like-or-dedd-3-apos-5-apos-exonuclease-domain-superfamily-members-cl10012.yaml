identifier: CDD:cl10012
label: "DnaQ-like (or DEDD) 3&apos;-5&apos; exonuclease domain superfamily. Members of this family are found in prokaryotic Taq DNA polymerase, where they assume a ribonuclease H-like motif. The domain confers 5'-3' exonuclease activity to the polymerase."
definition: >-
  DnaQ-like (or DEDD) 3&apos;-5&apos; exonuclease domain superfamily. Members of this family are found in prokaryotic Taq DNA polymerase, where they assume a ribonuclease H-like motif. The domain confers 5'-3' exonuclease activity to the polymerase. — an NCBI CDD domain superfamily (cl10012); members share this curated model.
