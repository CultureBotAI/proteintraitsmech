label: DnaQ_like_exo
definition: >-
  DnaQ-like (or DEDD) 3&apos;-5&apos; exonuclease domain superfamily. Members of this family are found in prokaryotic Taq DNA polymerase, where they assume a ribonuclease H-like motif. The domain confers 5'-3' exonuclease activity to the polymerase
