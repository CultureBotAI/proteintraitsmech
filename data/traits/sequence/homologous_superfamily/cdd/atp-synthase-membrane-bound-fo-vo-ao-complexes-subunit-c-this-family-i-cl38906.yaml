label: ATP-synt_Fo_Vo_Ao_c
definition: >-
  ATP synthase, membrane-bound Fo/Vo/Ao complexes, subunit c. This family includes subunit c of F-ATP synthase (also called ATP synthase F(o) sector subunit c, F-type ATPase subunit c, or F-ATPase subunit c) and similar proteins. It is a proton-translocating subunit of the ATP synthase encoded by gene atpE
