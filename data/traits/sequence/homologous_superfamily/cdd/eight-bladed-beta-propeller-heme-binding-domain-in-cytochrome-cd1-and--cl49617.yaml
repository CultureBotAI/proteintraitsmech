identifier: CDD:cl49617
label: "eight-bladed beta-propeller heme-binding domain in cytochrome cd1 and similar proteins. Cytochrome cd1 (cyt cd1) nitrite reductase catalyzes in vitro the reduction of molecular oxygen to water and the reduction of nitrite to nitric oxide).  It  is a dimer of two identical subunits of 60 kDa, each containing one c and one d1 heme group. The c heme is the electron accepting pole of the molecule and is reduced in vitro by either azurin or cytochrome c551. The d1 heme is the site where nitrite, and oxygen reduction occur. NiR is a key denitrification enzyme, which controls the rate of the production of toxic nitric oxide (NO) and ultimately regulates the release of NO into the atmosphere. The two types of heme are located in separate domains whose arrangement suggests a mechanism requiring domain movement during catalysis."
definition: >-
  eight-bladed beta-propeller heme-binding domain in cytochrome cd1 and similar proteins. Cytochrome cd1 (cyt cd1) nitrite reductase catalyzes in vitro the reduction of molecular oxygen to water and the reduction of nitrite to nitric oxide). It is a dimer of two identical subunits of 60 kDa, each containing one c and one d1 heme group. The c heme is the electron accepting pole of the molecule and is reduced in vitro by either azurin or cytochrome c551. The d1 heme is the site where nitrite, and oxygen reduction occur. NiR is a key denitrification enzyme, which controls the rate of the production of toxic nitric oxide (NO) and ultimately regulates the release of NO into the atmosphere. The two types of heme are located in separate domains whose arrangement suggests a mechanism requiring domain movement during catalysis. — an NCBI CDD domain superfamily (cl49617); members share this curated model.
