identifier: CDD:cl07462
label: "XisI is FdxN element excision controlling factor protein. The fdxN element, along with two other DNA elements, is excised from the chromosome during heterocyst differentiation in cyanobacteria. The xisH as well as the xisF and xisI genes are required."
definition: >-
  XisI is FdxN element excision controlling factor protein. The fdxN element, along with two other DNA elements, is excised from the chromosome during heterocyst differentiation in cyanobacteria. The xisH as well as the xisF and xisI genes are required. — an NCBI CDD domain superfamily (cl07462); members share this curated model.
