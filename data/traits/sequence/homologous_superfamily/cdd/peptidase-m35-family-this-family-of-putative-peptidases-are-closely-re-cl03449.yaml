identifier: CDD:cl03449
label: "Peptidase M35 family. This family of putative peptidases are closely related to the M35 family pfam02102. In this family the metal binding HEXXH motif is replaced with HRXXH. The exact function of these proteins is unknown. Members of this family are found to be fungal allergens."
definition: >-
  Peptidase M35 family. This family of putative peptidases are closely related to the M35 family pfam02102. In this family the metal binding HEXXH motif is replaced with HRXXH. The exact function of these proteins is unknown. Members of this family are found to be fungal allergens. — an NCBI CDD domain superfamily (cl03449); members share this curated model.
