identifier: CDD:cl13749
label: eIF3G
definition: >-
  eIF3G domain found in eukaryotic translation initiation factor 3 subunit G (eIF-3G) and similar proteins. This domain family is found in eukaryotes, and is approximately 130 amino acids in length. The family is found in association with pfam00076. This family is subunit G of the eukaryotic translation initiation factor 3. Subunit G is required for eIF3 integrity
