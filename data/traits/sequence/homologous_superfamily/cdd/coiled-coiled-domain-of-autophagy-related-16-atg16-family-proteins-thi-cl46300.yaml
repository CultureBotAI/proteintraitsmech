label: Atg16_CCD
definition: >-
  Coiled-coiled domain of autophagy-related 16 (Atg16) family proteins. This protein family, Coiled-coil domain-containing protein 14 (CCDC14) is a domain of unknown function. This family of proteins is found in eukaryotes. Proteins in this family are typically between 301 and 912 amino acids in length
