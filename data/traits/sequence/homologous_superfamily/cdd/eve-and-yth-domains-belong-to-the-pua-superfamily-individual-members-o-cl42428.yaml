identifier: CDD:cl42428
label: "EVE and YTH domains belong to the PUA superfamily. Individual members of the YTH family have been shown to selectively remove transcripts of meiosis-specific genes expressed in mitotic cells. In general, eukaryotic YTH-family members may be involved in similar mechanisms to suppress gene regulation during gametogenesis or in other forms of silencing. The YTH domain is a novel RNA-binding domain that has been shown to bind to short, degenerate, single-stranded RNA motifs that loosely follow a consensus sequence. It belongs to the larger PUA superfamily."
definition: >-
  EVE and YTH domains belong to the PUA superfamily. Individual members of the YTH family have been shown to selectively remove transcripts of meiosis-specific genes expressed in mitotic cells. In general, eukaryotic YTH-family members may be involved in similar mechanisms to suppress gene regulation during gametogenesis or in other forms of silencing. The YTH domain is a novel RNA-binding domain that has been shown to bind to short, degenerate, single-stranded RNA motifs that loosely follow a consensus sequence. It belongs to the larger PUA superfamily. — an NCBI CDD domain superfamily (cl42428); members share this curated model.
