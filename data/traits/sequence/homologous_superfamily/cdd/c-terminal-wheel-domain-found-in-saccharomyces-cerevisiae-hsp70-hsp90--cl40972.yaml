identifier: CDD:cl40972
label: CTWD_Cns1-like
definition: >-
  C-terminal wheel domain found in Saccharomyces cerevisiae Hsp70/Hsp90 co-chaperone Cns1, Homo sapiens tetratricopeptide repeat protein 4 (TTC4), and similar proteins. TTC4, also called TPR repeat protein 4, is a putative Hsp90 co-chaperone which interacts with CDC6 and shows alterations in transformed cells. It interacts with TBK1 and promotes Sendai virus (SeV)-induced host cell innate immune responses. The model corresponds to TTC4 C-terminal wheel domain consisting of a twisted five-stranded beta sheet surrounded by several alpha helices
