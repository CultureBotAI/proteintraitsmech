identifier: CDD:cl49629
label: "RNA-editing substrate-binding complex subunit 11A (RESC11A), RESC12, RESC12A, and similar proteins. RESC12 (REMC5, MRB4160) and RESC12A (REMC5A, MRB8170) are RNA-binding components of the RNA-editing substrate-binding complex (RESC), composed of about 20 components, that is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC), to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC12 and RESC12A are predicted (by AlphaFold) to be helical repeat proteins, with predominantly alpha-helical structures that show similarity to each other but no similarity to experimentally determined structures. Shorter regions within the proteins show some structural similarity to various alpha-helical proteins including those containing containing Armadillo (ARM)/beta-catenin-like repeats and tetratricopeptide (TPR) repeats. Both ARM and TPR repeats are implicated in mediating protein-protein interactions."
definition: >-
  RNA-editing substrate-binding complex subunit 11A (RESC11A), RESC12, RESC12A, and similar proteins. RESC12 (REMC5, MRB4160) and RESC12A (REMC5A, MRB8170) are RNA-binding components of the RNA-editing substrate-binding complex (RESC), composed of about 20 components, that is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC), to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC12 and RESC12A are predicted (by AlphaFold) to be helical repeat proteins, with predominantly alpha-helical structures that show similarity to each other but no similarity to experimentally determined structures. Shorter regions within the proteins show some structural similarity to various alpha-helical proteins including those containing containing Armadillo (ARM)/beta-catenin-like repeats and tetratricopeptide (TPR) repeats. Both ARM and TPR repeats are implicated in mediating protein-protein interactions. — an NCBI CDD domain superfamily (cl49629); members share this curated model.
