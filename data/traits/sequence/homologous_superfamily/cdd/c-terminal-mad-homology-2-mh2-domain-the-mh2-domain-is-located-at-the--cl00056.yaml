identifier: CDD:cl00056
label: MH2
definition: >-
  C-terminal Mad Homology 2 (MH2) domain. The MH2 domain is located at the C-terminus of the SMAD (small mothers against decapentaplegic) family of proteins, which are signal transducers and transcriptional modulators that mediate multiple signaling pathways. The MH2 domain is responsible for type I receptor interaction, phosphorylation-triggered homo- and hetero-oligomerization, and transactivation. It is negatively regulated by the N-terminal MH1 domain. SMAD2 and SMAD3 are receptor regulated SMADs (R-SMADs). SMAD2 regulates multiple cellular processes, such as cell proliferation, apoptosis and differentiation, while SMAD3 modulates signals of activin and TGF-beta
