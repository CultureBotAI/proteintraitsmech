identifier: CDD:cl15687
label: RGL4_C
definition: >-
  C-terminal domain of rhamnogalacturonan lyase, a family 4 polysaccharide lyase. CBM-like is domain III of rhamnogalacturonan lyase (RG-lyase). The full-length protein specifically recognizes and cleaves alpha-1,4 glycosidic bonds between l-rhamnose and d-galacturonic acids in the backbone of rhamnogalacturonan-I, a major component of the plant cell wall polysaccharide, pectin. This domain possesses a jelly roll beta-sandwich fold structurally homologous to carbohydrate binding modules (CBMs), and it carries two sulfate ions and a hexa-coordinated calcium ion
