identifier: CDD:cl40452
label: "N-terminal domain of syntaxin-6 and similar proteins. Syntaxin-6 (STX6) is a component of a soluble NSF attachment protein receptor (SNARE) complex involved in intracellular vesicle trafficking and in the fusion of retrograde transport carriers with the trans-Golgi network (TGN). This model corresponds to N-terminal domain of STX6, which is a regulatory domain named Habc."
definition: >-
  N-terminal domain of syntaxin-6 and similar proteins. Syntaxin-6 (STX6) is a component of a soluble NSF attachment protein receptor (SNARE) complex involved in intracellular vesicle trafficking and in the fusion of retrograde transport carriers with the trans-Golgi network (TGN). This model corresponds to N-terminal domain of STX6, which is a regulatory domain named Habc. — an NCBI CDD domain superfamily (cl40452); members share this curated model.
