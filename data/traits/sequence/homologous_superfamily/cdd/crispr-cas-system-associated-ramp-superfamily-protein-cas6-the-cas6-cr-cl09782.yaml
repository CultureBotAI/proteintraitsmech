identifier: CDD:cl09782
label: Cas6-I-III
definition: >-
  CRISPR/Cas system-associated RAMP superfamily protein Cas6. The Cas6 Crispr family of proteins averaging 140 residues are characterized by having a GhGxxxxxGhG motif, where h indicates a hydrophobic residue, at the C-terminus. The CRISPR-Cas system is possibly a mechanism of defence against invading pathogens and plasmids that functions analogously to the RNA interference (RNAi) systems in eukaryotes
