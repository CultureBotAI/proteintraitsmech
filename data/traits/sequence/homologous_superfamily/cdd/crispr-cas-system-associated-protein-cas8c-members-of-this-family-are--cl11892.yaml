identifier: CDD:cl11892
label: Cas8c_I-C
definition: >-
  CRISPR/Cas system-associated protein Cas8c. Members of this family are found among cas (CRISPR-Associated) genes close to CRISPR repeats in Leptospira interrogans (a spirochete), Myxococcus xanthus (a delta-proteobacterium), and Lyngbya sp. PCC 8106 (a cyanobacterium). It is found with other cas genes in Anabaena variabilis ATCC 29413. In Lyngbya sp., the protein is split into two tandem genes. This model corresponds to the N-terminal region or upstream gene; the C-terminal region is described by TIGR03486. CRISPR/cas systems are associated with prokaryotic acquired resistance to phage and other exogenous DNA
