identifier: CDD:cl03816
label: "N-terminal DNA recognition domain of restriction endonuclease FokI and similar proteins. Type IIS restriction endonuclease FokI is a member of an unusual class of bipartite restriction enzymes that recognizes the double-stranded DNA sequence 5'-GGATG-3' and cleave DNA phosphodiester groups 9 base pairs away on this strand and 13 base pairs away on the complementary strand. FokI contains amino- and carboxy-terminal domains corresponding to the DNA- recognition and cleavage functions, respectively. The recognition domain is made of three smaller subdomains (D1, D2 and D3) which are evolutionarily related to the helix-turn-helix-containing DNA-binding domain of the catabolite gene activator protein CAP. This entry represents the subdomain D2 of FokI. D1 and D2 make almost all of the base-specific contacts with the DNA."
definition: >-
  N-terminal DNA recognition domain of restriction endonuclease FokI and similar proteins. Type IIS restriction endonuclease FokI is a member of an unusual class of bipartite restriction enzymes that recognizes the double-stranded DNA sequence 5'-GGATG-3' and cleave DNA phosphodiester groups 9 base pairs away on this strand and 13 base pairs away on the complementary strand. FokI contains amino- and carboxy-terminal domains corresponding to the DNA- recognition and cleavage functions, respectively. The recognition domain is made of three smaller subdomains (D1, D2 and D3) which are evolutionarily related to the helix-turn-helix-containing DNA-binding domain of the catabolite gene activator protein CAP. This entry represents the subdomain D2 of FokI. D1 and D2 make almost all of the base-specific contacts with the DNA. — an NCBI CDD domain superfamily (cl03816); members share this curated model.
