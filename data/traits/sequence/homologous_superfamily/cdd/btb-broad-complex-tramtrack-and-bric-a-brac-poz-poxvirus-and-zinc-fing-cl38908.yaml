identifier: CDD:cl38908
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain superfamily. In voltage-gated K+ channels this domain is responsible for subfamily-specific assembly of alpha-subunits into functional tetrameric channels. In KCTD1 this domain functions as a transcriptional repressor. It also mediates homomultimerization of KCTD1 and interaction of KCTD1 with the transcription factor AP-2-alpha."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain superfamily. In voltage-gated K+ channels this domain is responsible for subfamily-specific assembly of alpha-subunits into functional tetrameric channels. In KCTD1 this domain functions as a transcriptional repressor. It also mediates homomultimerization of KCTD1 and interaction of KCTD1 with the transcription factor AP-2-alpha. — an NCBI CDD domain superfamily (cl38908); members share this curated model.
