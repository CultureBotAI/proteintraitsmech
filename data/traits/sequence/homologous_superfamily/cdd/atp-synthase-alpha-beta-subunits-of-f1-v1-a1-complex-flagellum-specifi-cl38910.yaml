identifier: CDD:cl38910
label: "ATP synthase, alpha/beta subunits of F1/V1/A1 complex, flagellum-specific ATPase FliI, C-terminal domain. The C-terminal domain of the flagellum-specific ATPase/type III secretory pathway virulence-related protein. This group of ATPases are responsible for the export of flagellum and virulence-related proteins. The flagellum-specific ATPase FliI is the soluble export component that drives flagellar protein export, and it shows extensive similarity to the alpha and beta subunits of FoF1-ATP synthase. Although they both are proton driven rotary molecular devices, the main function of the bacterial flagellar motor is to rotate the flagellar filament for cell motility. Intracellular pathogens such as Salmonella and Chlamydia also have proteins which are similar to the flagellar-specific ATPase, but function in the secretion of virulence-related proteins via the type III secretory pathway."
