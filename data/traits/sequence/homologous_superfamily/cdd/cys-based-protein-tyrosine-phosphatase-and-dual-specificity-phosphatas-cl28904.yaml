identifier: CDD:cl28904
label: PTP_DSP_cys
definition: >-
  cys-based protein tyrosine phosphatase and dual-specificity phosphatase superfamily. This enzyme (EC:2.4.2.-) modifies exclusively the initiator tRNA in position 64 using 5'-phosphoribosyl-1'-pyrophosphate as the modification donor. As the initiator tRNA participates both in the initiation and elongation of translation, the 2'-O-ribosyl phosphate modification discriminates the initiator tRNAs from the elongator tRNAs. This C-terminal domain shows similarity to dual specificity phosphatases
