identifier: CDD:cl00559
label: PgpA
definition: >-
  Phosphatidylglycerophosphatase A; a bacterial membrane-associated enzyme involved in lipid metabolism. Sequences in the seed alignment were the experimentally characterized CobZ of the methanogenic archaeon Methanosarcina mazei, and other archaeal proteins found similarly next to or very near to other cobalamin biosynthesis genes. CobZ replaces the alpha-ribazole-phosphate phosphatase (EC 3.1.3.73) called CobC in analogous bacterial pathways for cobalamin biosynthesis under anaerobic conditions. [Biosynthesis of cofactors, prosthetic groups, and carriers, Heme, porphyrin, and cobalamin]
