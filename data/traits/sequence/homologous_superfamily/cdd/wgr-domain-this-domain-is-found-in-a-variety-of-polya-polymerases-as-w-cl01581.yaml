identifier: CDD:cl01581
label: "WGR domain. This domain is found in a variety of polyA polymerases as well as the E. coli molybdate metabolism regulator Swiss:P33345 and other proteins of unknown function. I have called this domain WGR after the most conserved central motif of the domain. The domain is found in isolation in proteins such as Swiss:Q9JN21 and is between 70 and 80 residues in length. I propose that this may be a nucleic acid binding domain."
definition: >-
  WGR domain. This domain is found in a variety of polyA polymerases as well as the E. coli molybdate metabolism regulator Swiss:P33345 and other proteins of unknown function. I have called this domain WGR after the most conserved central motif of the domain. The domain is found in isolation in proteins such as Swiss:Q9JN21 and is between 70 and 80 residues in length. I propose that this may be a nucleic acid binding domain. — an NCBI CDD domain superfamily (cl01581); members share this curated model.
