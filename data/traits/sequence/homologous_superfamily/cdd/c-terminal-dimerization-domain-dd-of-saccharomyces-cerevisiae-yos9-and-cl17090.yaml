identifier: CDD:cl17090
label: Yos9_DD
definition: >-
  C-terminal dimerization domain (DD) of Saccharomyces cerevisiae Yos9 and related proteins. This is the dimerization domain (DD) found in Yos9 proteins in yeast. Structural analysis revealed that this domain contributes to self association of Yos9. The overall fold of the domain can be classified as an alpha-beta-roll architecture, comprising two alpha-helices and seven beta-strands
