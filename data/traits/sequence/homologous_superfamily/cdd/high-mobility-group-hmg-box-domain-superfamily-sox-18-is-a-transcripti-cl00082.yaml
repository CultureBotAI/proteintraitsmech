identifier: CDD:cl00082
label: HMG-box_SF
definition: >-
  high mobility group (HMG)-box domain superfamily. SOX-18 is a transcription factor involved in the development of cardiovascular and lymphatic vessels during embryonic development. It binds to the consensus sequence 5'-AACAAAG-3' and is able to trans-activate transcription via this site. SOX-18 belongs to the group F of SRY-related high-mobility group (HMG) box (Sox) transcription factors
