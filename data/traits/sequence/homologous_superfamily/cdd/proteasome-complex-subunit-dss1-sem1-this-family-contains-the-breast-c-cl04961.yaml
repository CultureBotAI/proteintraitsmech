identifier: CDD:cl04961
label: DSS1_Sem1
definition: >-
  proteasome complex subunit DSS1/Sem1. This family contains the breast cancer tumour suppressor BRCA2-interacting protein DSS1 and its homolog SEM1, both of which are short acidic proteins. DSS1 has been shown to be a conserved component of the Rae1 mediated mRNA export pathway in Schizosaccharomyces pombe
