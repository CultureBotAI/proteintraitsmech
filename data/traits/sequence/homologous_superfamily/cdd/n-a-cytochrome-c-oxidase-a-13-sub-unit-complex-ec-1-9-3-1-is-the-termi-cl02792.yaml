identifier: CDD:cl02792
label: Cyt_c_Oxidase_IV
definition: >-
  N/A. Cytochrome c oxidase, a 13 sub-unit complex, EC:1.9.3.1 is the terminal oxidase in the mitochondrial electron transport chain. This family is composed of cytochrome c oxidase subunit IV. The Dictyostelium member of this family is called COX VI. The yeast protein Swiss:P53077 appears to be the yeast COX IV subunit
