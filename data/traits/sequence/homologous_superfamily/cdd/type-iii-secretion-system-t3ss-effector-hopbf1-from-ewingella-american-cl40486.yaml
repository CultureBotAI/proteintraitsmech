identifier: CDD:cl40486
label: HopBF1
definition: >-
  type III secretion system (T3SS) effector HopBF1 from Ewingella americana, and similar proteins. HopBF1, found in plant pathogens such as Pseudomonas syringae and in the human pathogen Ewingella americana, it a type III secretion system effector that acts as a protein kinase. It phosphorylates the eukaryotic chaperone HSP90 on a serine residue, inhibiting its ATPase activity. The inhibition interferes with the proper folding of client proteins of HSP90 that are important to resistance to bacterial infection
