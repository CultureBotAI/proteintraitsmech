identifier: CDD:cl41740
label: CC1_SLMAP-like
definition: >-
  first coiled-coil (CC1) domain found in Sarcolemmal membrane-associated protein and similar proteins. TRAF3-interacting JNK-activating modulator (T3JAM), also called TRAF3-interacting protein 3 (TRAF3IP3), is a novel protein that specifically interacts with TRAF3 and promotes the activation of JNK. It may function as an adapter molecule that regulates TRAF3-mediated JNK activation. The model corresponds to a conserved region that shows high sequence similarity with the first CC (CC1) domain of Sarcolemmal membrane-associated protein (SLMAP), which is responsible for the binding of suppressor of IKBKE 1 (SIKE1)
