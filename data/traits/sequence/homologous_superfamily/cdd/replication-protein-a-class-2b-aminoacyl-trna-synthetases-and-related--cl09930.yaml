label: RPA_2b-aaRSs_OBF_like
definition: >-
  Replication protein A, class 2b aminoacyl-tRNA synthetases, and related proteins with oligonucleotide/oligosaccharide (OB) fold. POT1PC is the ssDNA-binding domain on a family of fungal telomere protection protein 1 proteins. POT1PC is able to accommodate heterogeneous ssDNA ligands. Pot1 proteins are the proteins responsible for binding to and protecting the 3' single-stranded DNA (ssDNA) overhang at most eukaryotic telomeres
