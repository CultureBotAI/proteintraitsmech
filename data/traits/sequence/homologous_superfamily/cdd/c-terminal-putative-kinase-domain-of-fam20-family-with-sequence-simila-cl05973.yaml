identifier: CDD:cl05973
label: FAM20_C_like
definition: >-
  C-terminal putative kinase domain of FAM20 (family with sequence similarity 20), Drosophila Four-jointed (Fj), and related proteins. Mouse DMP4 is abundant in the dentin matrix, and is expressed in high levels in odontoblasts. These latter cells synthesize various nucleators or inhibitors of mineralization. The in vivo role of DMP4 in dentinogenesis is unclear. However, gain- and loss-of-function experiments suggest that it participates in the differentiation of mesenchymal precursor cells into functional odontoblast-like cells. In addition to this domain, DMP4 contains a Greek key calcium-binding domain. Human FAM20C participates in bone development; mutations in FAM20C are associated with lethal Osteosclerotic Bone Dysplasia (Raine Syndrome), an autosomal recessive disorder in which affected individuals die within days or weeks of birth, usually due to thoratic malformation resulting in respiratory failure. The C-terminal domain of FAM20C is a putative kinase domain, based on mutagenesis of the C-terminal domain of Drosophila Four-Jointed, a related Golgi kinase. This subfamily belongs to the FAM20_C (also known as DUF1193) domain family
