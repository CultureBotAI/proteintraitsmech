identifier: CDD:cl17065
label: "Uncharacterized protein domain similar to Clostridium thermocellum 2751. Cthe_2751 has been found to form homodimers. Based on structural similarity to other families, a role in processing nucleic acids was suggested, though interactions with DNA could not be demonstrated."
definition: >-
  Uncharacterized protein domain similar to Clostridium thermocellum 2751. Cthe_2751 has been found to form homodimers. Based on structural similarity to other families, a role in processing nucleic acids was suggested, though interactions with DNA could not be demonstrated. — an NCBI CDD domain superfamily (cl17065); members share this curated model.
