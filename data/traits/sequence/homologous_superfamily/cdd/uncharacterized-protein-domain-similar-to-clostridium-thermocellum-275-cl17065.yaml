identifier: CDD:cl17065
label: Cthe_2751_like
definition: >-
  Uncharacterized protein domain similar to Clostridium thermocellum 2751. Cthe_2751 has been found to form homodimers. Based on structural similarity to other families, a role in processing nucleic acids was suggested, though interactions with DNA could not be demonstrated
