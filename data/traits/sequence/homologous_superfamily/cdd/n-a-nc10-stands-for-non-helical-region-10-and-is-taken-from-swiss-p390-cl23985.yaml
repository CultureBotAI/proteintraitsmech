label: Endostatin-like
definition: >-
  N/A. NC10 stands for Non-helical region 10 and is taken from Swiss:P39059. A mutation in this region in Swiss:P39060 is associated with an increased risk of prostrate cancer. This domain is cleaved from the precursor and forms endostatin. Endostatin is a key tumour suppressor and has been used highly successfully to treat cancer. It is a potent angiogenesis inhibitor. Endostatin also binds a zinc ion near the N-terminus; this is likely to be of structural rather than functional importance according to
