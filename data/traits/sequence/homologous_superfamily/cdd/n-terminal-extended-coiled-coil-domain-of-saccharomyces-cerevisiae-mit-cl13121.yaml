identifier: CDD:cl13121
label: "N-terminal extended coiled-coil domain of Saccharomyces cerevisiae mitochondrial division protein 1 (Mdv1) and similar proteins. Caf4 is a WD40 repeats containing protein involved in mitochondrial fission. It displays physical interactions with CCR4-NOT complex. It has a paralogue, Mdv1. Both Caf4 and Mdv1 act as adapter proteins, binding to Fis1 on the mitochondrial outer membrane and recruiting the dynamin-like GTPase Dnm1 to form mitochondrial fission complexes. However, Fis1 and Caf4, but not Mdv1, determine the polar localization of Dnm1 clusters on the mitochondrial surface."
definition: >-
  N-terminal extended coiled-coil domain of Saccharomyces cerevisiae mitochondrial division protein 1 (Mdv1) and similar proteins. Caf4 is a WD40 repeats containing protein involved in mitochondrial fission. It displays physical interactions with CCR4-NOT complex. It has a paralogue, Mdv1. Both Caf4 and Mdv1 act as adapter proteins, binding to Fis1 on the mitochondrial outer membrane and recruiting the dynamin-like GTPase Dnm1 to form mitochondrial fission complexes. However, Fis1 and Caf4, but not Mdv1, determine the polar localization of Dnm1 clusters on the mitochondrial surface. — an NCBI CDD domain superfamily (cl13121); members share this curated model.
