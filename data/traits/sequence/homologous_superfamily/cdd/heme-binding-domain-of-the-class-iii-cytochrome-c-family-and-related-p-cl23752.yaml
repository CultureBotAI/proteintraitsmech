identifier: CDD:cl23752
label: Cytochrom_C3
definition: >-
  Heme-binding domain of the class III cytochrome C family and related proteins. This family includes cytochromes c7 and c7-type. In cytochromes c7 all three haems are bis-His co-ordinated, while in c7-type the last haem is His-Met co-ordinated. Desulfuromonas acetoxidans and Geobacter metallireducens cytochrome c7 participate in the anaerobic iron respiration, but Geobacter metallireducens cytochrome c7 hasn't a Fe(III) reductase activity. This entry also includes cytochrome c nitrite reductase subunit NrfH from Desulfovibrio vulgaris which forms a complex with cytochrome c nitrite reductase NrfA
