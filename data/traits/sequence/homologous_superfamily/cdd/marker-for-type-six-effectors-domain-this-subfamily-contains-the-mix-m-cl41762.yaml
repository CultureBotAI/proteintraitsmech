identifier: CDD:cl41762
label: "Marker for type sIX effectors domain. This subfamily contains the MIX (Marker for type sIX effectors) V clan (MIX V) domain. MIX is a marker of type VI secretion system (T6SS) effectors carrying polymorphic C-terminal toxins. Predicted antibacterial activities of the C-terminal toxin domains of Vibrionaceae MIX V effectors include peptidase, peptidoglycan hydrolase, nuclease and pore-forming. Also included in this clan is VPR01S_11_01570, encoded by V. proteolyticus, that carries a CNF1 (cytotoxic necrotizing factor 1) toxin domain and modulates the actin cytoskeleton of eukaryotic phagocytic cells. Some members contain DUF2235, which is predicted as a phospholipase domain. Members of the MIX V clan are shared between marine bacteria via horizontal gene transfer, thereby enhancing their bacterial competitive fitness. Notably, many toxins identified as T6SS effectors do not contain a recognizable delivery domain or signal, suggesting that additional delivery domains may exist."
definition: >-
  Marker for type sIX effectors domain. This subfamily contains the MIX (Marker for type sIX effectors) V clan (MIX V) domain. MIX is a marker of type VI secretion system (T6SS) effectors carrying polymorphic C-terminal toxins. Predicted antibacterial activities of the C-terminal toxin domains of Vibrionaceae MIX V effectors include peptidase, peptidoglycan hydrolase, nuclease and pore-forming. Also included in this clan is VPR01S_11_01570, encoded by V. proteolyticus, that carries a CNF1 (cytotoxic necrotizing factor 1) toxin domain and modulates the actin cytoskeleton of eukaryotic phagocytic cells. Some members contain DUF2235, which is predicted as a phospholipase domain. Members of the MIX V clan are shared between marine bacteria via horizontal gene transfer, thereby enhancing their bacterial competitive fitness. Notably, many toxins identified as T6SS effectors do not contain a recognizable delivery domain or signal, suggesting that additional delivery domains may exist. — an NCBI CDD domain superfamily (cl41762); members share this curated model.
