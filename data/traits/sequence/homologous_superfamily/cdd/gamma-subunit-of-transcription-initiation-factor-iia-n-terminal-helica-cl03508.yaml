identifier: CDD:cl03508
label: "Gamma subunit of transcription initiation factor IIA, N-terminal helical domain. Accurate transcription in vivo requires at least six general transcription initiation factors, in addition to RNA polymerase II. Transcription initiation factor IIA (TFIIA) is a multimeric protein which facilitates the binding of TFIID to the TATA box. The N-terminal domain of the gamma subunit is a 4 helix bundle."
definition: >-
  Gamma subunit of transcription initiation factor IIA, N-terminal helical domain. Accurate transcription in vivo requires at least six general transcription initiation factors, in addition to RNA polymerase II. Transcription initiation factor IIA (TFIIA) is a multimeric protein which facilitates the binding of TFIID to the TATA box. The N-terminal domain of the gamma subunit is a 4 helix bundle. — an NCBI CDD domain superfamily (cl03508); members share this curated model.
