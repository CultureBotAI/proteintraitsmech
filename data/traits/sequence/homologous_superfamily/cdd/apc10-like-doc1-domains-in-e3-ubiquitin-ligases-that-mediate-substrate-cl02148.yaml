identifier: CDD:cl02148
label: APC10-like
definition: >-
  APC10-like DOC1 domains in E3 ubiquitin ligases that mediate substrate ubiquitination. This model represents the APC10/DOC1-like domain present in the uncharacterized Zinc finger ZZ-type and EF-hand domain-containing protein 1 (ZZEF1) of Mus musculus. Members of this family contain EF-hand, APC10, CUB, and zinc finger ZZ-type domains. ZZEF1-like APC10 domains are homologous to the APC10 subunit/DOC1 domains present in E3 ubiquitin ligases, which mediate substrate ubiquitination (or ubiquitylation), and are components of the ubiquitin-26S proteasome pathway for selective proteolytic degradation
