identifier: CDD:cl38891
label: "accessory protein ORF9c (also referred to as ORF14) from Severe acute respiratory syndrome-associated coronavirus and related coronaviruses. This family contains proteins found in SARS and SARS-like coronaviruses. It includes uncharacterized protein 14 from SARS coronavirus 2 (SARS-CoV-2), human SARS coronavirus (SARS-CoV) and bat coronavirus Rp3/2004 (SARS-like coronavirus Rp3). In SARS-CoV, orf14 is completely contained within the ORF encoding the nucleocapsid protein (N). In SARS-CoV-2 uncharacterized protein 14 is predicted to contain one transmembrane helix."
definition: >-
  accessory protein ORF9c (also referred to as ORF14) from Severe acute respiratory syndrome-associated coronavirus and related coronaviruses. This family contains proteins found in SARS and SARS-like coronaviruses. It includes uncharacterized protein 14 from SARS coronavirus 2 (SARS-CoV-2), human SARS coronavirus (SARS-CoV) and bat coronavirus Rp3/2004 (SARS-like coronavirus Rp3). In SARS-CoV, orf14 is completely contained within the ORF encoding the nucleocapsid protein (N). In SARS-CoV-2 uncharacterized protein 14 is predicted to contain one transmembrane helix. — an NCBI CDD domain superfamily (cl38891); members share this curated model.
