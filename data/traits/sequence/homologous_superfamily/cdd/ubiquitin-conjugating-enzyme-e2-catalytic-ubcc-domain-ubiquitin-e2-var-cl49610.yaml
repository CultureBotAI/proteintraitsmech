identifier: CDD:cl49610
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain/ubiquitin E2 variant (UEV) domain. This subfamily includes ubiquitin-conjugating enzyme E2, catalytic (UBCc) domains mostly found in non-vertebrate eukaryotes. They belong to the ubiquitin-conjugating (UBC) superfamily that represents a structural domain with an alpha-beta(4)-alpha(3) core fold. E2 is part of the ubiquitin-mediated protein degradation pathway in which a thioester linkage forms between a conserved cysteine and the C-terminus of ubiquitin and complexes with ubiquitin protein ligase enzymes, E3. This pathway regulates many fundamental cellular processes. There are also other E2s which form thioester linkages without the use of E3s."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain/ubiquitin E2 variant (UEV) domain. This subfamily includes ubiquitin-conjugating enzyme E2, catalytic (UBCc) domains mostly found in non-vertebrate eukaryotes. They belong to the ubiquitin-conjugating (UBC) superfamily that represents a structural domain with an alpha-beta(4)-alpha(3) core fold. E2 is part of the ubiquitin-mediated protein degradation pathway in which a thioester linkage forms between a conserved cysteine and the C-terminus of ubiquitin and complexes with ubiquitin protein ligase enzymes, E3. This pathway regulates many fundamental cellular processes. There are also other E2s which form thioester linkages without the use of E3s. — an NCBI CDD domain superfamily (cl49610); members share this curated model.
