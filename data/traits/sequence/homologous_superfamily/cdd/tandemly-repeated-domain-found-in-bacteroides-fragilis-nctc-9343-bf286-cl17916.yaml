identifier: CDD:cl17916
label: BF2867_like
definition: >-
  Tandemly repeated domain found in Bacteroides fragilis Nctc 9343 BF2867 and related proteins. This family of proteins is found in bacteria. Proteins in this family are typically between 348 and 360 amino acids in length. Analysis of structural comparisons shows this family to be part of the FimbA (CL0450) superfamily of adhesin components or fimbrillins
