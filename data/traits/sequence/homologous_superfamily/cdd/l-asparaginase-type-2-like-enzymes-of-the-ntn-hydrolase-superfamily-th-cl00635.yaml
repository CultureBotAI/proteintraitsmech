identifier: CDD:cl00635
label: "L-Asparaginase type 2-like enzymes of the NTN-hydrolase superfamily. The wider family of Asparaginase 2-like enzymes includes Glycosylasparaginase, Taspase 1, and  L-Asparaginase type 2. Glycosylasparaginase catalyzes the hydrolysis of the glycosylamide bond of asparagine-linked glycoprotein. Taspase1 catalyzes the cleavage of the Mix Lineage Leukemia (MLL) nuclear protein and transcription factor TFIIA. L-Asparaginase type 2 hydrolyzes L-asparagine to L-aspartate and ammonia. The proenzymes of this family undergo autoproteolytic cleavage before a threonine to generate alpha and beta subunits. The threonine becomes the N-terminal residue of the beta subunit and is the catalytic residue."
definition: >-
  L-Asparaginase type 2-like enzymes of the NTN-hydrolase superfamily. The wider family of Asparaginase 2-like enzymes includes Glycosylasparaginase, Taspase 1, and L-Asparaginase type 2. Glycosylasparaginase catalyzes the hydrolysis of the glycosylamide bond of asparagine-linked glycoprotein. Taspase1 catalyzes the cleavage of the Mix Lineage Leukemia (MLL) nuclear protein and transcription factor TFIIA. L-Asparaginase type 2 hydrolyzes L-asparagine to L-aspartate and ammonia. The proenzymes of this family undergo autoproteolytic cleavage before a threonine to generate alpha and beta subunits. The threonine becomes the N-terminal residue of the beta subunit and is the catalytic residue. — an NCBI CDD domain superfamily (cl00635); members share this curated model.
