identifier: CDD:cl00252
label: NifX_NifB
definition: >-
  N/A. NifX belongs to a family of iron-molybdenum cluster-binding proteins that includes NifB, and NifY, all of which are involved in the synthesis of an iron-molybdenum cofactor (FeMo-co) that binds the active site of the dinitrogenase enzyme. The protein is part of the nitrogen fixation gene cluster in nitrogen-fixing bacteria and has sequence similarity to other members of the cluster
