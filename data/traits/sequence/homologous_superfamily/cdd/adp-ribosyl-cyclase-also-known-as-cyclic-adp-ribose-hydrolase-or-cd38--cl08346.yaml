label: Rib_hydrolase
definition: >-
  ADP-ribosyl cyclase, also known as cyclic ADP-ribose hydrolase or CD38. ADP-ribosyl cyclase EC:3.2.2.5 (also know as cyclic ADP-ribose hydrolase or CD38) synthesizes cyclic-ADP ribose, a second messenger for glucose-induced insulin secretion
