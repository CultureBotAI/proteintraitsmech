identifier: CDD:cl09159
label: Imelysin-like
definition: >-
  imelysin also called Peptidase M75. The imelysin peptidase was first identified in Pseudomonas aeruginosa. The active site residues have not been identified. However, His201 and Glu204 are completely conserved in the family and occur in an HXXE motif that is also found in family M14
