identifier: CDD:cl40430
label: "Stannin family includes vertebrate Stannin and insect Hemotin. Stannin (SNN) is a monotopic membrane protein containing an N-terminal single transmembrane helix that transverses the lipid bilayer, an unstructured linker which includes a conserved CXC metal-binding motif and a putative 14-3-3zeta binding site, and a C-terminal distorted cytoplasmic helix. It binds and antagonizes 14-3-3zeta and is required for endosomal maturation. It has also been identified as the specific marker for neuronal cell apoptosis induced by trimethyltin (TMT) intoxication. TMT is one of the most toxic organotin compound (or alkyltin), and is known to selectively inflict injury to specific regions of the brain."
definition: >-
  Stannin family includes vertebrate Stannin and insect Hemotin. Stannin (SNN) is a monotopic membrane protein containing an N-terminal single transmembrane helix that transverses the lipid bilayer, an unstructured linker which includes a conserved CXC metal-binding motif and a putative 14-3-3zeta binding site, and a C-terminal distorted cytoplasmic helix. It binds and antagonizes 14-3-3zeta and is required for endosomal maturation. It has also been identified as the specific marker for neuronal cell apoptosis induced by trimethyltin (TMT) intoxication. TMT is one of the most toxic organotin compound (or alkyltin), and is known to selectively inflict injury to specific regions of the brain. — an NCBI CDD domain superfamily (cl40430); members share this curated model.
