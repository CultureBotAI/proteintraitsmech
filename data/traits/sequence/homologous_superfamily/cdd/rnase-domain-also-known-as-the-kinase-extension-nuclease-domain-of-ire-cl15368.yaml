label: RNase_Ire1_like
definition: >-
  RNase domain (also known as the kinase extension nuclease domain) of Ire1 and RNase L. This domain is a endoribonuclease. Specifically it cleaves an intron from Hac1 mRNA in humans, which causes it to be much more efficiently translated
