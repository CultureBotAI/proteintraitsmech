identifier: CDD:cl41735
label: TBK1_IKKE-like_C
definition: >-
  C-terminal domain of non-canonical Inhibitor of kappa B kinases, IKK-E and TBK1, and similar proteins. TANK-binding kinase 1 (TBK1), also called T2K and NF-kB-activating kinase, is a serine/threonine-protein kinase that is widely expressed in most cell types and acts as an IkappaB kinase (IKK)-activating kinase responsible for NF-kB activation in response to growth factors. It plays a role in modulating inflammatory responses through the NF-kB pathway. TKB1 is also a major player in innate immune responses since it functions as a virus-activated kinase necessary for establishing an antiviral state. It phosphorylates IRF-3 and IRF-7, which are important transcription factors for inducing type I interferon during viral infection. TBK1 may also play roles in cell transformation and oncogenesis. In addition, it regulates optineurin (OPTN), an important autophagy receptor involved in several selective autophagy processes. TBK1 contains N-terminal serine/threonine protein kinase, ubiquitin-like (Ubl), coiled-coil domain 1 (CCD1), and C-terminal alpha-helical domains. This model corresponds to a small conserved elongated alpha-helical domain at the C-terminus of TBK1, which is responsible for the binding of its adaptor proteins such as OPTN and NAP1
