identifier: CDD:cl00215
label: "N/A. This is a putative aconitase X swivel domain, which has been predicted by comparative genomic analysis. The domain is mainly found in archaeal and proteobacterial proteins. As such, the prediction should be treated with caution. One member of this entry from Aeropyrum pernix which has been annotated as a putative aconitase, has been characterized in vitro and catalyzes the dehydration of mevalonate 5-phosphate to form trans-anhydromevalonate 5-phosphate, a previously unknown intermediate, being involved in a \"modified\" mevalonate pathway."
definition: >-
  N/A. This is a putative aconitase X swivel domain, which has been predicted by comparative genomic analysis. The domain is mainly found in archaeal and proteobacterial proteins. As such, the prediction should be treated with caution. One member of this entry from Aeropyrum pernix which has been annotated as a putative aconitase, has been characterized in vitro and catalyzes the dehydration of mevalonate 5-phosphate to form trans-anhydromevalonate 5-phosphate, a previously unknown intermediate, being involved in a "modified" mevalonate pathway. — an NCBI CDD domain superfamily (cl00215); members share this curated model.
