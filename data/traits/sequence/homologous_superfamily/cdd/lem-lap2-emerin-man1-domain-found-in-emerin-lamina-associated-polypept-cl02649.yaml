identifier: CDD:cl02649
label: "LEM (Lap2/Emerin/Man1) domain found in emerin, lamina-associated polypeptide 2 (LAP2), inner nuclear membrane protein Man1 and similar proteins. The family includes ANKL2 and similar proteins. Although their biological roles remain unclear, the family members share an N-terminal LEM domain and an ankyrin repeat region. The LEM domain, mainly found in inner nuclear membrane proteins, may be involved in protein- or DNA-binding. The ankyrin repeats are unique motifs mediating protein-protein interactions."
definition: >-
  LEM (Lap2/Emerin/Man1) domain found in emerin, lamina-associated polypeptide 2 (LAP2), inner nuclear membrane protein Man1 and similar proteins. The family includes ANKL2 and similar proteins. Although their biological roles remain unclear, the family members share an N-terminal LEM domain and an ankyrin repeat region. The LEM domain, mainly found in inner nuclear membrane proteins, may be involved in protein- or DNA-binding. The ankyrin repeats are unique motifs mediating protein-protein interactions. — an NCBI CDD domain superfamily (cl02649); members share this curated model.
