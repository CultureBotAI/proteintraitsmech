identifier: CDD:cl38903
label: RMtype1_S_TRD-CR_like
definition: >-
  Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR) and similar domains. The recognition sequences of Campylobacter jejuni RM 2232 S subunit (S.Cje2232P) and Shewanella baltica OS223 S subunit (S.Sba223ORF389P) are undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. Also included in this subfamily is the C-terminal TRD-CR-like sequence-recognition domain of Microcystis aeruginosa putative type I N6-adenine DNA methyltransferase M subunit (M.Mae7806ORF3969P). The recognition sequence of M.Mae7806ORF3969P is undetermined
