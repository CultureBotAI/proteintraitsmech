identifier: CDD:cl15685
label: "C-Terminal domain of O-antigenic polysaccharide transporter protein Wzt and related proteins. This domain is found at the C-terminus of the Wzt protein. The crystal structure of C-Wzt(O9a) reveals a beta sandwich with an immunoglobulin-like topology that contains the O-antigenic polysaccharide binding pocket. This domain is often associated with the ABC-transporter domain."
definition: >-
  C-Terminal domain of O-antigenic polysaccharide transporter protein Wzt and related proteins. This domain is found at the C-terminus of the Wzt protein. The crystal structure of C-Wzt(O9a) reveals a beta sandwich with an immunoglobulin-like topology that contains the O-antigenic polysaccharide binding pocket. This domain is often associated with the ABC-transporter domain. — an NCBI CDD domain superfamily (cl15685); members share this curated model.
