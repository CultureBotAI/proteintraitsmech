identifier: CDD:cl17012
label: GINS_A
definition: >-
  Alpha-helical domain of GINS complex proteins; Sld5, Psf1, Psf2 and Psf3. The eukaryotic GINS complex is essential for the initiation and elongation phases of DNA replication. It consists of four paralogous protein subunits (Sld5, Psf1, Psf2 and Psf3), all of which are included in this family. The GINS complex is conserved from yeast to humans, and has been shown in human to bind directly to DNA primase
