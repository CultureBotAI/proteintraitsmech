identifier: CDD:cl41685
label: PBD_PPP1R3
definition: >-
  PP1C binding domain found in protein phosphatase 1 regulatory subunit 3 (PPP1R3) family. PPP1R3C, also called protein phosphatase 1 regulatory subunit 5 (PPP1R5), PP1 subunit R5, or protein targeting to glycogen (PTG), acts as a glycogen-targeting subunit for protein phosphatase 1 (PP1) and regulates its activity. It activates glycogen synthase, reduces glycogen phosphorylase activity, and limits glycogen breakdown. It can dramatically increase basal and insulin-stimulated glycogen synthesis upon overexpression in a variety of cell types. PPP1R3C interacts with the PPP1CC catalytic subunit of PP1 and associates with glycogen. This model corresponds to protein phosphatase 1 catalytic subunit (PP1C) binding domain of PPP1R3C, which contains a RVxF PP1C-binding motif that mediates interactions with PP1C
