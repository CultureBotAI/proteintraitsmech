identifier: CDD:cl21552
label: TPK
definition: >-
  Thiamine pyrophosphokinase. This domain can be found in a group of proteins, including archaeal 6-hydroxymethylpterin diphosphokinase (6-HMDPK), known as MptE, which catalyzes the formation of 6-hydroxymethyl-7,8-dihydropterin diphosphate (6-HMDP) from 6-HMD and ATP. 6-HMDP is the precursor of the pterin containing moiety of the essential C1-carriers tetrahydrofolate and tetrahydromethanopterin. This entry also includes a number of uncharacterized proteins from bacteria
