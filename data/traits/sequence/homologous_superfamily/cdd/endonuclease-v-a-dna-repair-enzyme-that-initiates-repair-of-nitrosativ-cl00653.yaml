identifier: CDD:cl00653
label: Endonuclease_V
definition: >-
  Endonuclease_V, a DNA repair enzyme that initiates repair of nitrosative deaminated purine bases. Endonuclease V is specific for single-stranded DNA or for duplex DNA that contains uracil or that is damaged by a variety of agents
