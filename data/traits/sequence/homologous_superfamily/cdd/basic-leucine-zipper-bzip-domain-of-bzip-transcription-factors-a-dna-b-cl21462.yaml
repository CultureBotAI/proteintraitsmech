identifier: CDD:cl21462
label: "Basic leucine zipper (bZIP) domain of bZIP transcription factors: a DNA-binding and dimerization domain. Maf transcription factors contain a conserved basic region leucine zipper (bZIP) domain, which mediates their dimerization and DNA binding property. Thus, this family is probably related to pfam00170. This family also includes the DNA_binding domain of Skn-1, this domain lacks the leucine zipper found in other bZip domains, and binds DNA is a monomer."
definition: >-
  Basic leucine zipper (bZIP) domain of bZIP transcription factors: a DNA-binding and dimerization domain. Maf transcription factors contain a conserved basic region leucine zipper (bZIP) domain, which mediates their dimerization and DNA binding property. Thus, this family is probably related to pfam00170. This family also includes the DNA_binding domain of Skn-1, this domain lacks the leucine zipper found in other bZip domains, and binds DNA is a monomer. — an NCBI CDD domain superfamily (cl21462); members share this curated model.
