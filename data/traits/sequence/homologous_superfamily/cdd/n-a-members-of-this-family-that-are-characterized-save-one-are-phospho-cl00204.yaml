label: PFK
definition: >-
  N/A. Members of this family that are characterized, save one, are phosphofructokinases dependent on pyrophosphate (EC 2.7.1.90) rather than ATP (EC 2.7.1.11). The exception is one of three phosphofructokinases from Streptomyces coelicolor. Family members are both bacterial and archaeal. [Energy metabolism, Glycolysis/gluconeogenesis]
