identifier: CDD:cl19029
label: Csx16_III-U
definition: >-
  CRISPR/Cas system-associated protein Csx16. This entry represents a conserved region of about 95 amino acids found exclusively in species with CRISPRs (Clustered Regularly Interspaced Short Palindromic Repeats). In all bacterial species that contain this entry, the genes encoding the proteins are in the midst of a cluster of cas (CRISPR-associated) genes
