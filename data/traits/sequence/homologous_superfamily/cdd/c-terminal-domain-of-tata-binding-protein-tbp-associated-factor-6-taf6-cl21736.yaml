identifier: CDD:cl21736
label: TAF6C
definition: >-
  C-terminal domain of TATA Binding Protein (TBP) Associated Factor 6 (TAF6). TAF6_C is the C-terminal domain of the TAF6 subunit of the general transcription factor TFIID. The crystal structure reveals the presence of five conserved HEAT repeats. This region is necessary for the complexing together of the subunits TAF5, TAF6 and TAF9
