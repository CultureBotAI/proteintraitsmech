identifier: CDD:cl09647
label: "accessory protein 9b of severe acute respiratory syndrome-associated coronavirus and similar proteins. This is a family of proteins found in SARS and SARS-like coronaviruses. It includes Protein 9b from SARS coronavirus 2 (SARS-CoV-2), human SARS coronavirus (SARS-CoV) and bat coronaviruses. Protein 9B is one of 8 accessory proteins in SARS-CoV. The gene (ORF 9b, also known as ORF 13) that encodes this protein is included within the nucleocapsid (N) gene (alternative ORF). Data suggest that protein 9b is a structural component of SARS-CoV virions and functions as an unusual lipid binding protein. SARS-CoV ORF-9b has been shown to localize to the outer mitochondrial membrane and to target mitochondrial antiviral signalling proteins (MAVS), suppressing innate immunity. Protein 9b from SARS CoV comprises 98 amino acids. It's structure has a novel fold which forms a dimeric tent-like beta structure with an amphipathic surface, and a central hydrophobic cavity that binds lipid molecules. This cavity is likely to be involved in membrane attachment."
definition: >-
  accessory protein 9b of severe acute respiratory syndrome-associated coronavirus and similar proteins. This is a family of proteins found in SARS and SARS-like coronaviruses. It includes Protein 9b from SARS coronavirus 2 (SARS-CoV-2), human SARS coronavirus (SARS-CoV) and bat coronaviruses. Protein 9B is one of 8 accessory proteins in SARS-CoV. The gene (ORF 9b, also known as ORF 13) that encodes this protein is included within the nucleocapsid (N) gene (alternative ORF). Data suggest that protein 9b is a structural component of SARS-CoV virions and functions as an unusual lipid binding protein. SARS-CoV ORF-9b has been shown to localize to the outer mitochondrial membrane and to target mitochondrial antiviral signalling proteins (MAVS), suppressing innate immunity. Protein 9b from SARS CoV comprises 98 amino acids. It's structure has a novel fold which forms a dimeric tent-like beta structure with an amphipathic surface, and a central hydrophobic cavity that binds lipid molecules. This cavity is likely to be involved in membrane attachment. — an NCBI CDD domain superfamily (cl09647); members share this curated model.
