label: "Ndc10 component of the yeast centromere-binding factor 3. NDC10_II is a the second of five domains on the Kluyveromyces lactis Ndc10 protein. Each subunit of the Ndc10 dimer binds a separate fragment of DNA, suggesting that Ndc10 stabilizes a DNA loop at the centromere."
definition: >-
  Ndc10 component of the yeast centromere-binding factor 3. NDC10_II is a the second of five domains on the Kluyveromyces lactis Ndc10 protein. Each subunit of the Ndc10 dimer binds a separate fragment of DNA, suggesting that Ndc10 stabilizes a DNA loop at the centromere. — an NCBI CDD domain superfamily (cl16937); members share this curated model.
