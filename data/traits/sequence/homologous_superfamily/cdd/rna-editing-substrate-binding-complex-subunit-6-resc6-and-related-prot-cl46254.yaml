identifier: CDD:cl46254
label: "RNA-editing substrate-binding complex subunit 6 (RESC6) and related proteins. TBRG4 also called cell cycle progression restoration protein 2 or Fas-activated serine-threonine (FAST) kinase domain-containing protein 4, is a regulator of TGFbeta and is implicated in numerous types of cancer. It serves a role in the tumorigenesis of lung cancer via deregulation of DNA damage-inducible transcript 3 (DDIT3), caveolin 1 (CAV1), and ribonucleotide reductase regulatory subunit M2 (RRM2). This domain lies N-terminal to the FAST_1 domain, and is predicted (by AlphaFold) to be alpha-helical, with similarity to structures of members of the 6-hairpin (6 helical hairpin) clan."
definition: >-
  RNA-editing substrate-binding complex subunit 6 (RESC6) and related proteins. TBRG4 also called cell cycle progression restoration protein 2 or Fas-activated serine-threonine (FAST) kinase domain-containing protein 4, is a regulator of TGFbeta and is implicated in numerous types of cancer. It serves a role in the tumorigenesis of lung cancer via deregulation of DNA damage-inducible transcript 3 (DDIT3), caveolin 1 (CAV1), and ribonucleotide reductase regulatory subunit M2 (RRM2). This domain lies N-terminal to the FAST_1 domain, and is predicted (by AlphaFold) to be alpha-helical, with similarity to structures of members of the 6-hairpin (6 helical hairpin) clan. — an NCBI CDD domain superfamily (cl46254); members share this curated model.
