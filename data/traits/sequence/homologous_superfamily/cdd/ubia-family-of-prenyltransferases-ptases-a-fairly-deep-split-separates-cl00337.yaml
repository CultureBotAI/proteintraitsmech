identifier: CDD:cl00337
label: "UbiA family of prenyltransferases (PTases). A fairly deep split separates this polyprenyltransferase subfamily from the set of mitochondrial and proteobacterial 4-hydroxybenzoate polyprenyltransferases, described in TIGR01474. Protoheme IX farnesyltransferase (heme O synthase) (TIGR01473) is more distantly related. Because no species appears to have both this protein and a member of TIGR01474, it is likely that this model represents 4-hydroxybenzoate polyprenyltransferase, a critical enzyme of ubiquinone biosynthesis, in the Archaea, Gram-positive bacteria, Aquifex aeolicus, the Chlamydias, etc. [Biosynthesis of cofactors, prosthetic groups, and carriers, Menaquinone and ubiquinone]"
definition: >-
  UbiA family of prenyltransferases (PTases). A fairly deep split separates this polyprenyltransferase subfamily from the set of mitochondrial and proteobacterial 4-hydroxybenzoate polyprenyltransferases, described in TIGR01474. Protoheme IX farnesyltransferase (heme O synthase) (TIGR01473) is more distantly related. Because no species appears to have both this protein and a member of TIGR01474, it is likely that this model represents 4-hydroxybenzoate polyprenyltransferase, a critical enzyme of ubiquinone biosynthesis, in the Archaea, Gram-positive bacteria, Aquifex aeolicus, the Chlamydias, etc. [Biosynthesis of cofactors, prosthetic groups, and carriers, Menaquinone and ubiquinone] — an NCBI CDD domain superfamily (cl00337); members share this curated model.
