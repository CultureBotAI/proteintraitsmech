identifier: CDD:cl38925
label: TenA_PqqC-like
definition: >-
  TenA-like proteins including TenA_C and TenA_E proteins, as well as pyrroloquinoline quinone (PQQ) synthesis protein C. This family contains proteins with similarity to TenA, and includes bacterial coenzyme pyrroloquinoline quinone (PQQ) synthesis protein C or PQQC proteins. PQQ is the prosthetic group of several bacterial enzymes, including methanol dehydrogenase of methylotrophs and the glucose dehydrogenase of a number of bacteria. PQQC catalyzes the last step of PQQ biogenesis which involves a ring closure and an eight-electron oxidation of the substrate [3a-(2-amino-2-carboxyethyl)-4,5-dioxo-4,5,6,7,8,9-hexahydroquinoline-7,9-dicarboxylic acid (AHQQ)]. The exact molecular function of members of this family is unclear. Also belonging to this family is Chlamydia protein CADD (Chlamydia protein Associating with Death Domains), a redox protein toxin unique to Chlamydia species, which modulates host cell apoptosis; its redox activity and death domain binding ability may be required for this biological activity. CADD may have a role in folate metabolism
