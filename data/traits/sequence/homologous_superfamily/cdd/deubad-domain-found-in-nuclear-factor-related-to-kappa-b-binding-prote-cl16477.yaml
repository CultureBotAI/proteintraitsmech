identifier: CDD:cl16477
label: "DEUBAD domain found in nuclear factor related to kappa-B-binding protein (NFRKB) and similar proteins. A conserved alpha helical domain with a characteriztic LXXLL motif. The LXXLL motif is detected in diverse transcription factors, coactivators and corepressors and is implicated in mediating interactions between them. The ASXH domain is found in animals, fungi and plants and is predicted to play a role in mediating contact between transcription factors and chromatin-associated complexes. In Drosophila Asx and Human ASXL1, the ASXH domain is predicted to mediate interactions with the Calypso and BAP1 deubiquitinases (DUBs) which further belong to the UCHL5/UCH37 clade of DUBs."
definition: >-
  DEUBAD domain found in nuclear factor related to kappa-B-binding protein (NFRKB) and similar proteins. A conserved alpha helical domain with a characteriztic LXXLL motif. The LXXLL motif is detected in diverse transcription factors, coactivators and corepressors and is implicated in mediating interactions between them. The ASXH domain is found in animals, fungi and plants and is predicted to play a role in mediating contact between transcription factors and chromatin-associated complexes. In Drosophila Asx and Human ASXL1, the ASXH domain is predicted to mediate interactions with the Calypso and BAP1 deubiquitinases (DUBs) which further belong to the UCHL5/UCH37 clade of DUBs. — an NCBI CDD domain superfamily (cl16477); members share this curated model.
