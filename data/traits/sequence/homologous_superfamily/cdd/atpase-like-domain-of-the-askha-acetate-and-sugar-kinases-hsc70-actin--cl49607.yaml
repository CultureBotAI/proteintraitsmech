identifier: CDD:cl49607
label: "ATPase-like domain of the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily. This subfamily is composed of uncharacterized proteins belonging to the the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. Members of this subfamily lack the cysteine-rich zinc-binding motif, which presents in other ROK families."
definition: >-
  ATPase-like domain of the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily. This subfamily is composed of uncharacterized proteins belonging to the the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. Members of this subfamily lack the cysteine-rich zinc-binding motif, which presents in other ROK families. — an NCBI CDD domain superfamily (cl49607); members share this curated model.
