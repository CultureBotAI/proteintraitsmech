identifier: CDD:cl06998
label: LEM_like
definition: >-
  LEM-like domain of lamina-associated polypeptide 2 (LAP2) and similar proteins. Short protein of 49 amino acid isolated from bovine spleen cells. Thymopoietins (TMPOs) are a group of ubiquitously expressed nuclear proteins. They are suggested to play an important role in nuclear envelope organization and cell cycle control
