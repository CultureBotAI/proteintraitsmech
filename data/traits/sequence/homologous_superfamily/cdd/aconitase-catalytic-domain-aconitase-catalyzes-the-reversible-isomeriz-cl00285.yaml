identifier: CDD:cl00285
label: "Aconitase catalytic domain; Aconitase catalyzes the reversible isomerization of citrate and isocitrate as part of the TCA cycle. This subfamily is a subset of the larger HacA family (Homoaconitate hydratase family, TIGR01343) and is most closely related to the 3-isopropylmalate dehydratase, large subunits which form TIGR00170. This subfamily includes the members of TIGR01343 which are gene clustered with other genes of leucine biosynthesis. The rest of the subfamily includes mainly archaeal species which exhibit two hits to this model. In these cases it is possible that one or the other of the hits does not have a 3-isopropylmalate dehydratase activity but rather one of the other related aconitase-like activities."
definition: >-
  Aconitase catalytic domain; Aconitase catalyzes the reversible isomerization of citrate and isocitrate as part of the TCA cycle. This subfamily is a subset of the larger HacA family (Homoaconitate hydratase family, TIGR01343) and is most closely related to the 3-isopropylmalate dehydratase, large subunits which form TIGR00170. This subfamily includes the members of TIGR01343 which are gene clustered with other genes of leucine biosynthesis. The rest of the subfamily includes mainly archaeal species which exhibit two hits to this model. In these cases it is possible that one or the other of the hits does not have a 3-isopropylmalate dehydratase activity but rather one of the other related aconitase-like activities. — an NCBI CDD domain superfamily (cl00285); members share this curated model.
