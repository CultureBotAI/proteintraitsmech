identifier: CDD:cl41756
label: "Polymorphic Nuclease effector (PoNe) domain is a deoxyribonuclease. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with N-terminal domains such as a TANFOR domain which contains uncharacterized single or repeat domains that co-occur with fibronectin type III domains, or a pre-toxin HINT domain, a member of the HINT superfamily of proteases usually found N-terminal to the toxin module in polymorphic toxin systems; the HINT domain is predicted to function in releasing the toxin domain by autoproteolysis."
definition: >-
  Polymorphic Nuclease effector (PoNe) domain is a deoxyribonuclease. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with N-terminal domains such as a TANFOR domain which contains uncharacterized single or repeat domains that co-occur with fibronectin type III domains, or a pre-toxin HINT domain, a member of the HINT superfamily of proteases usually found N-terminal to the toxin module in polymorphic toxin systems; the HINT domain is predicted to function in releasing the toxin domain by autoproteolysis. — an NCBI CDD domain superfamily (cl41756); members share this curated model.
