identifier: CDD:cl28892
label: "cytotoxic necrotizing factor 1 (CNF1), chemotaxis protein CheD and YfiH (DUF152) are distant homologs. This subfamily contains Rho-activating toxins cytotoxic necrotizing factor 1 (CNF1) and dermonecrotic toxin (DNT) from Bordetella species, as well as Burkholderia Lethal Factor 1 (BLF1, also known as BPSL1549), and similar proteins. CNF1 causes alteration of the host cell actin cytoskeleton and promotes bacterial invasion of blood-brain barrier endothelial cells. E. coli CNF1 constitutively activates host small G proteins such as RhoA and Cdc42 by deamidating a glutamine residue essential for GTP hydrolysis. DNT stimulates the assembly of actin stress fibers and focal adhesions by deamidation/polyamination of a specific glutamine of the small GTPase Rho. CNF1 and DNT are A-B toxins composed of an N-terminal receptor-binding (B) domain and a C-terminal enzymatically active (A) domain; their homology is restricted to the catalytic domains at the C termini of the toxins, suggesting that they share a similar molecular mechanism. BLF1, a toxin that inhibits helicase activity of translation factor eIF4A, is similar to the catalytic domain of Escherichia coli CNF1 (CNF1-C); although CNF1-C and BLF1 show little sequence identity, the active sites have the conserved LSGC (Leu, Ser, Gly, Cys) motif."
definition: >-
  cytotoxic necrotizing factor 1 (CNF1), chemotaxis protein CheD and YfiH (DUF152) are distant homologs. This subfamily contains Rho-activating toxins cytotoxic necrotizing factor 1 (CNF1) and dermonecrotic toxin (DNT) from Bordetella species, as well as Burkholderia Lethal Factor 1 (BLF1, also known as BPSL1549), and similar proteins. CNF1 causes alteration of the host cell actin cytoskeleton and promotes bacterial invasion of blood-brain barrier endothelial cells. E. coli CNF1 constitutively activates host small G proteins such as RhoA and Cdc42 by deamidating a glutamine residue essential for GTP hydrolysis. DNT stimulates the assembly of actin stress fibers and focal adhesions by deamidation/polyamination of a specific glutamine of the small GTPase Rho. CNF1 and DNT are A-B toxins composed of an N-terminal receptor-binding (B) domain and a C-terminal enzymatically active (A) domain; their homology is restricted to the catalytic domains at the C termini of the toxins, suggesting that they share a similar molecular mechanism. BLF1, a toxin that inhibits helicase activity of translation factor eIF4A, is similar to the catalytic domain of Escherichia coli CNF1 (CNF1-C); although CNF1-C and BLF1 show little sequence identity, the active sites have the conserved LSGC (Leu, Ser, Gly, Cys) motif. — an NCBI CDD domain superfamily (cl28892); members share this curated model.
