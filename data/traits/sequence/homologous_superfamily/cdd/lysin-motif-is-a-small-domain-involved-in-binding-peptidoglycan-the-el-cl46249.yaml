identifier: CDD:cl46249
label: LysM
definition: >-
  Lysin Motif is a small domain involved in binding peptidoglycan. The elastin-binding protein EbpS is an adhesin described in Staphylococcus aureus, with orthologs found in many additional staphylococcal species. EbpS is a membrane protein that lacks an N-terminal signal peptide region, has extensive regions low-complexity sequence rich in Asn and Gln, and has a C-terminal LysM domain
