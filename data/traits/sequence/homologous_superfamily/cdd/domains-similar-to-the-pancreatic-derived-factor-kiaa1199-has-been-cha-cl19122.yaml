identifier: CDD:cl19122
label: PANDER_like
definition: >-
  Domains similar to the Pancreatic-derived factor. KIAA1199 has been characterized as a protein associated with poor survival when upregulated in human cancer, as well as with nonsyndromic loss of hearing when mutated. It contains a C-terminal domain similar to the Pancreatic-derived factor PANDER; the function of this PANDER-like domain has not been characterized
