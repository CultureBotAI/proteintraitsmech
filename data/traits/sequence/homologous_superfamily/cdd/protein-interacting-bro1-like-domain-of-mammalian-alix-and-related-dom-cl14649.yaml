identifier: CDD:cl14649
label: BRO1_Alix_like
definition: >-
  Protein-interacting Bro1-like domain of mammalian Alix and related domains. This domain is found in a number proteins including Rhophilin and BRO1. It is known to have a role in endosomal targeting. ESCRT-III subunit Snf7 binds to a conserved hydrophobic patch in the BRO1 domain that is required for protein complex formation and for the protein-sorting function of BRO1
