label: Aldolase_II
definition: >-
  N/A. Members of this family are the methylthioribulose-1-phosphate dehydratase of the methionine salvage pathway. This pathway allows methylthioadenosine, left over from polyamine biosynthesis, to be recycled to methionine. [Amino acid biosynthesis, Aspartate family]
