identifier: CDD:cl17010
label: "Hypothetical protein TTHB210, a sigma(E)-regulated gene product found in Thermus thermophilus, and similar proteins. This domain is found in TTHB210 protein present in Thermus thermophilus. TTHB210 is a Sigma-E factor regulated gene product that forms a homodecamer. This domain is chain G and can be classified with chains A, C, E and I based on its folds."
definition: >-
