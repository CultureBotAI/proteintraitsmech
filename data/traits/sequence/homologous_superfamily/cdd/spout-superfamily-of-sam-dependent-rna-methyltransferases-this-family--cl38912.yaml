identifier: CDD:cl38912
label: SPOUT_MTase
definition: >-
  SPOUT superfamily of SAM-dependent RNA methyltransferases. This family has a Rossmanoid fold, with a deep trefoil knot in its C-terminal region. It has structural similarity to RNA methyltransferases, and is likely to function as an S-adenosyl-L-methionine (SAM)-dependent RNA 2'-O methyltransferase
