identifier: CDD:cl17013
label: "C-terminal domain of eIF4-gamma/eIF5/eIF2b-epsilon. eIF5 functions as a GTPase acceleration protein (GAP), as well as a GDP dissociation inhibitor (GDI) during translational initiation in eukaryotes. The structure of this C-terminal domain resembles that of a set of concatenated HEAT repeats."
definition: >-
  C-terminal domain of eIF4-gamma/eIF5/eIF2b-epsilon. eIF5 functions as a GTPase acceleration protein (GAP), as well as a GDP dissociation inhibitor (GDI) during translational initiation in eukaryotes. The structure of this C-terminal domain resembles that of a set of concatenated HEAT repeats. — an NCBI CDD domain superfamily (cl17013); members share this curated model.
