definition: >-
  N/A. This is sensor domain found in bacterial periplasmic binding proteins, several of which are involved in iron and cobalamin transport. Among its ligands are siderophores bacillibactin, enterobactin and iron(III)-hydroxamates (Matilla et. al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1 https://doi.org/10.1093/femsre/fuab043). — an NCBI CDD domain superfamily (cl00262); members share this curated model.
