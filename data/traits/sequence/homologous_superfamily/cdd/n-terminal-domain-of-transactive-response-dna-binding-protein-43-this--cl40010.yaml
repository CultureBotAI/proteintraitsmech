identifier: CDD:cl40010
label: NTD_TDP-43
definition: >-
  N-terminal domain of transactive response DNA-binding protein 43. This domain can be found at the N-terminal region of transactive response DNA-binding protein 43 kDa (TDP-43), an RNA transporting and processing protein whose aberrant aggregates are implicated in neurodegenerative diseases. TDP-43 N-terminal domain has been shown to play an important role in the aggregation of TDP-43 monomers and its loss of function affects the RNA metabolic levels. Secondary structure of the N-terminal domain consists of six beta-strands and it resembles axin 1
