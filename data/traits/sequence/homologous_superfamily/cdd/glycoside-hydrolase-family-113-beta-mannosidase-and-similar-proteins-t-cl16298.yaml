identifier: CDD:cl16298
label: GH113-like
definition: >-
  Glycoside hydrolase family 113 beta-mannosidase and similar proteins. This domain is found in the gene transfer agent protein. An unusual system of genetic exchange exists in the purple nonsulfur bacterium Rhodobacter capsulatus. DNA transmission is mediated by a small bacteriophage-like particle called the gene transfer agent (GTA) that transfers random 4.5-kb segments of the producing cell's genome to recipient cells, where allelic replacement occurs. The genes involved in this process appear to be found widely in bacteria. According to the SUPERFAMILY database this domain has a TIM barrel fold
