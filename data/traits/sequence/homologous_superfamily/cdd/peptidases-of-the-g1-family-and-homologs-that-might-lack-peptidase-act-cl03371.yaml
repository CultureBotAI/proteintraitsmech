identifier: CDD:cl03371
label: Peptidase_G1_like
definition: >-
  Peptidases of the G1 family and homologs that might lack peptidase activity. This family of proteins is found in bacteria. Proteins in this family are typically between 236 and 351 amino acids in length. The member from Bacillus subtilis, UniProtKB:O05411, is named YrpD
