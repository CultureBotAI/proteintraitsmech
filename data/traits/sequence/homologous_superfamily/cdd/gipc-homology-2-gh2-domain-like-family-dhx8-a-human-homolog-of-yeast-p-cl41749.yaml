identifier: CDD:cl41749
label: "GIPC homology 2 (GH2) domain-like family. DHX8 (a human homolog of yeast Prp22), also called RNA helicase HRH1, is an ATP-dependent RNA helicase involved in pre-mRNA splicing as a component of the spliceosome. It facilitates nuclear export of spliced mRNA by releasing the RNA from the spliceosome. This model corresponds to the GH2-like domain that shows high sequence similarity with the GH2 domain found in GIPC (GAIP C-terminus-interacting protein) family of proteins, which mediate endocytosis by tethering cargo proteins to the motor myosin VI."
definition: >-
  GIPC homology 2 (GH2) domain-like family. DHX8 (a human homolog of yeast Prp22), also called RNA helicase HRH1, is an ATP-dependent RNA helicase involved in pre-mRNA splicing as a component of the spliceosome. It facilitates nuclear export of spliced mRNA by releasing the RNA from the spliceosome. This model corresponds to the GH2-like domain that shows high sequence similarity with the GH2 domain found in GIPC (GAIP C-terminus-interacting protein) family of proteins, which mediate endocytosis by tethering cargo proteins to the motor myosin VI. — an NCBI CDD domain superfamily (cl41749); members share this curated model.
