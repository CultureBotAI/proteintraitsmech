identifier: CDD:cl45896
label: RUN
definition: >-
  RUN domain. SGSM2, also called RUN and TBC1 domain-containing protein 1 (RUTBC1), is a GTPase-activating protein for Rab32/38, and regulates melanogenic enzyme trafficking in melanocytes. It also acts as a Rab9A effector that activates GTP hydrolysis by Rab32 and Rab33B proteins. This model contains the RUN domain of SGSM2
