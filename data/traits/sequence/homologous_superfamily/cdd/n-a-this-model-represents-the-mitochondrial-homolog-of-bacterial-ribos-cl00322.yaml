label: Ribosomal_L1
definition: >-
  N/A. This model represents the mitochondrial homolog of bacterial ribosomal protein L1. Unlike chloroplast L1, this form was not sufficiently similar to bacterial forms to include in a single bacterial/organellar L1 model. [Protein synthesis, Ribosomal proteins: synthesis and modification]
