identifier: CDD:cl04955
label: LanC_like
definition: >-
  Cyclases involved in the biosynthesis of lantibiotics, and similar proteins. This presumed domain is functionally uncharacterized. This domain family is found in bacteria and archaea, and is approximately 380 amino acids in length. The family is found in association with pfam05147. This domain may be involved in synthesis of a lantibiotic compound
