identifier: CDD:cl39045
label: MukF_N
definition: >-
  bacterial condensin complex subunit MukF, N-terminal domain. The kicA and kicB genes are found upstream of mukB. It has been suggested that the kicB gene encodes a killing factor and the kicA gene codes for a protein that suppresses the killing function of the kicB gene product. It was also demonstrated that KicA and KicB can function as a post-segregational killing system, when the genes are transferred from the E. coli chromosome onto a plasmid
