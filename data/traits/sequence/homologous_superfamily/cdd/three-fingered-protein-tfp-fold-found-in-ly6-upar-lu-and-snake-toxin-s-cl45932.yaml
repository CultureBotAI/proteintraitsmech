identifier: CDD:cl45932
label: TFP
definition: >-
  three-fingered protein (TFP) fold found in Ly6/uPAR (LU) and snake toxin superfamily. ACTR-IIB (EC 2.7.11.30, also called activin receptor type IIB) on ligand binding forms a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. ACTR-IIB interacts with vacuolar protein sorting 39 (Vps39), dynein light chain Tctex-type 1 (DYNLT1), bone morphogenetic protein 2 (BMP2) and bone morphogenetic protein 3 (BMP3). This model corresponds to the extracellular domain (ECD) of ACTR-IIB, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)
