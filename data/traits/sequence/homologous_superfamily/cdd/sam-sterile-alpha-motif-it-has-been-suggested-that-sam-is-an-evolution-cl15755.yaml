identifier: CDD:cl15755
label: SAM_superfamily
definition: >-
  SAM (Sterile alpha motif ). It has been suggested that SAM is an evolutionarily conserved protein binding domain that is involved in the regulation of numerous developmental processes in diverse eukaryotes. The SAM domain can potentially function as a protein interaction module through its ability to homo- and heterooligomerise with other SAM domains
