identifier: CDD:cl12263
label: CytoC_RC
definition: >-
  Cytochrome C subunit of the bacterial photosynthetic reaction center. Photosynthesis in purple bacteria is dependent on light-induced electron transfer in the reaction centre (RC), coupled to the uptake of protons from the cytoplasm. The RC contains a cytochrome molecule which re-reduces the oxidized electron donor
