identifier: InterPro:IPR018303
label: "P-type ATPase, phosphorylation site"
definition: >-
  This entry represents the several classes of P-type ATPases, including those that transport K + ( ), Mg 2+ ( ), Cd 2+ ( ), Cu 2+ ( ), Zn 2+ ( ), Na + ( ), Ca 2+ ( ), Na + /K + ( ), and H + /K + ( ). These P-ATPases are found in both prokaryotes and eukaryotes. They are cation transport ATPases which form an aspartyl phosphate intermediate in the course of ATP hydrolysis. The region around the phosphorylated aspartate residue is perfectly conserved in all these ATPases and it is represented by this entry.
