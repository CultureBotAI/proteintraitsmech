identifier: InterPro:IPR018051
label: Surfactant-associated polypeptide, palmitoylation site
definition: >-
  This entry represents the palmitoylation site of surfactant associated polypeptide SP-C (also known as Surfactant protein C) and similar mammal proteins. Pulmonary surfactant associated proteins promote alveolar stability by lowering the surface tension at the air-liquid interface in the peripheral air spaces. SP-C, a component of surfactant, is a highly hydrophobic peptide of 35 amino acid residues which is processed from a larger precursor protein. SP-C is post-translationally modified by the covalent attachment of two palmitoyl groups on two adjacent cysteines. The exception is canine SP-C, in which the second Cys is replaced by Phe.
