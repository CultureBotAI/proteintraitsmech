identifier: InterPro:IPR004091
label: "Chemotaxis methyl-accepting receptor, methyl-accepting site"
definition: >-
  Methyl-accepting chemotaxis proteins (MCPs) are a family of bacterial receptors that mediate chemotaxis to diverse signals, responding to changes in the concentration of attractants and repellents in the environment by altering swimming behaviour. Environmental diversity gives rise to diversity in bacterial signalling receptors, and consequently there are many genes encoding MCPs. For example, there are four well-characterised MCPs found in Escherichia coli: Tar (taxis towards aspartate and maltose, away from nickel and cobalt), Tsr (taxis towards serine, away from leucine, indole and weak acids), Trg (taxis towards galactose and ribose) and Tap (taxis towards dipeptides). The methyl-accepting sites are specific glutamate residues (some of these sites are translated as glutamine but are irreversibly deamidated by cheB). They are clustered in two regions of the cytoplasmic domain that interacts with downstream signalling components. This entry represents the first of these two methyl-accepting regions.
