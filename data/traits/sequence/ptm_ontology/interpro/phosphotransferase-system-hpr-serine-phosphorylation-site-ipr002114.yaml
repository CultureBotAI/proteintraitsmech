identifier: InterPro:IPR002114
label: "Phosphotransferase system, HPr serine phosphorylation site"
definition: >-
  The phosphoenolpyruvate-dependent sugar phosphotransferase system (PTS) is a major carbohydrate transport system in bacteria. The PTS catalyzes the phosphorylation of incoming sugar substrates concomitant with their translocation across the cell membrane. The general mechanism of the PTS is as follows: a phosphoryl group from phosphoenolpyruvate (PEP) is transferred to Enzyme I (EI) of the PTS which in turn transfers it to a phosphoryl carrier protein (HPr). Phospho-HPr then transfers the phosphoryl group to a sugar- specific permease complex (enzymes EII/EIII). HPr is a small cytoplasmic protein, which in some bacteria is found as a domain in a larger protein that includes a EIII(Fru) (IIA) domain and in some cases also a EI domain . HPr is a component of the phosphoenolpyruvate-dependent sugar phosphotransferase system (PTS) major carbohydrate transport system in bacteria. There is a conserved histidine in the N terminus of HPr , which serves as an acceptor for the phosphoryl group of EI. In the central part of HPr there is a conserved serine, which in Gram-positive bacteria only, is phosphorylated by an ATP-dependent protein kinase; a process which probably plays a regulatory role in sugar transport. The sequence around both phosphorylation sites are well conserved and can be used as signature patterns for HPr proteins or domains. This signature identifies the serine phosporylation site.
