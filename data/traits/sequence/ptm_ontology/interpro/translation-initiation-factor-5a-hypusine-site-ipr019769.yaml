identifier: InterPro:IPR019769
label: "Translation initiation factor 5A, hypusine site"
definition: >-
  This entry represents a site centred around the hypusine residue of IF5A proteins. Translation initiation factor 5A (IF-5A) was previously reported to be involved in the first step of peptide bond formation in translation; however more recent work implicates it as a universally conserved translation elongation factor. eIF5A is a cofactor for the Rev and Rex transactivator proteins of human immunodeficiency virus-1 and T-cell leukaemia virus I, respectively. IF-5A is the sole protein in eukaryotes and archaea to contain the unusual amino acid hypusine (Ne-(4- amino-2-hydroxybutyl)lysine) that is an absolute functional requirement. The first step in the post-translational modification of lysine to hypusine is catalyzed by the enzyme deoxyhypusine synthase, the structure of which has been reported.
