label: "Neuromedin U, amidation site"
definition: >-
  Neuromedin U (NmU) is a vertebrate peptide which stimulates uterine smooth muscle contraction and causes selective vasoconstriction. Like most other active peptides, it is proteolytically processed from a larger precursor protein. The mature peptides are 8 (NmU-8) to 25 (NmU-25) residues long and C-terminally amidated. The mature peptides are 8 (NmU-8) to 25 (NmU-25) residues long and is extremely well conserved with the and C-terminally Asn being amidated
