identifier: PROSITE:PS51191
label: FemABX peptidyl transferase family profile
definition: >-
  FemABX peptidyl transferase family profile. FemABX peptidyl transferases (EC 2.3.2.-) catalyze the incorporation of amino acid(s) into the interchain peptide bridge of peptidoglycan using aminoacyl-tRNA as the amino acid donor, a reaction involved in the synthesis of the bacterial cell wall. The femABX transferases are named after Staphylococcus aureus femA and femB (from factors essential for methicillin resistance) and Weissella viridescens femX. The femABX enzymes catalyze the addition of amino acids to a peptidoglycan precursor, which in most cases is a lipid-linked sugar pentapeptide or, alternatively, a soluble nucleotide precursor for W. viridescens femX.
