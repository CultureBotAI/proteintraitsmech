identifier: PROSITE:PS50998
label: Gla domain profile
definition: >-
  Gamma-carboxyglutamic acid-rich (Gla) domain signature and profile. The vitamin K-dependent blood coagulation factor IX as well as several extracellular regulatory proteins require vitamin K for the posttranslational synthesis of gamma-carboxyglutamic acid, an amino acid clustered in the N-terminal Gla domain of these proteins. The Gla domain is a membrane binding motif which, in the presence of calcium ions, interacts with phospholipid membranes that include phosphatidylserine.
