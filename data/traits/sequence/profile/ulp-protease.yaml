identifier: PROSITE:PS50600
label: Ubiquitin-like protease family profile
definition: >-
  Ubiquitin-like protease family profile. Deubiquitinating enzymes (DUB) form a large family of cysteine protease that can deconjugate ubiquitin or ubiquitin-like proteins from ubiquitin-conjugated proteins. They can be classified in 3 families according to sequence homology: ubiquitin carboxyl-terminal hydrolases (UCH) (see <PDOC00127>), ubiquitin-specific processing proteases (UBP) (see <PDOC00750>), and ubiquitin-like proteases (ULP) (EC 3.4.22.68) specific for deconjugating ubiquitin-like proteins. In contrast to the UBP pathway, which is very redundant (16 UBP enzymes in yeast), there is few ubiquitin-like protease (only one in yeast, ULP1).
