identifier: PROSITE:PS51670
label: ShKT domain profile
definition: >-
  ShKT domain profile. BgK, a 37-residue peptide toxin from the sea anemone Bunodosoma granulifera, and ShK, a 35-residue peptide toxin from the sea anemone Stichodactyla helianthus, are potent inhibitors of K(+) channels. There is a large superfamily of proteins that contains domains (referred to as ShKT domains) ressembling these two toxins. Many of these proteins are metallopeptidases, whereas others are prolyl-4-hydroxylases, tyrosinases (see <PDOC00398>), peroxidases (see <PDOC00394>), oxidoreductases, or proteins containing epidermal growth factor-like domains (see <PDOC00021>), thrombospondin-type repeats (see <PDOC50092>), or trypsin-like serine protease domains (see <PDOC00124>).
definition_source: Prosite Release 2026_02 of 10-Jun-2026
