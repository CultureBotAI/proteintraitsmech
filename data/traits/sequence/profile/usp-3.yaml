identifier: PROSITE:PS50235
label: Ubiquitin specific protease (USP) domain profile
definition: >-
  Ubiquitin specific protease (USP) domain signatures and profile. Protein ubiquitination is a reversible posttranslational modification, which affects a large number of cellular processes including protein degradation, trafficking, cell signaling and the DNA damage response. Ubiquitination is reversible, and dedicated deubiquitinases exist which hydrolyze isopeptide bonds. Ubiquitin specific proteases (USPs) (EC 3.4.19.12) are the largest family of deubiquitinating enzymes. USP domains consist of a common conserved catalytic core which is interspersed at five points with insertions, some of which as large as the catalytic domain itself.
