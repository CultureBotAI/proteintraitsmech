label: Cysteine proteinase, calpain-type, catalytic domain profile
definition: >-
  Cysteine proteinase, calpain-type, catalytic domain profile. Calpains are a family of cytosolic cysteine proteinases (see <PDOC00126>). Members of the calpain family are believed to function in various biological processes, including integrin-mediated cell migration, cytoskeletal remodeling, cell differentiation and apoptosis.
