identifier: PROSITE:PS51210
label: PLA2c domain profile
definition: >-
  PLA2c domain profile. The PLA2c domain is the catalytic lipase domain in cytosolic phospholipase A2 (cPLA2) (EC 3.1.1.4) and lysophospholipase or phospholipase B (PLB) (EC 3.1.1.5) of vertebrates and fungi. It catalyzes the carboxylic ester hydrolysis of glycerophospholipids or lysophospholipids. The mammalian cPLA2 group IVA enzymes cleave intracellular phospholipid membranes to produce lipid mediators, which also play a role in inflammatory diseases such as asthma and arthritis. This enzyme contains a N-terminal calcium-binding C2 domain (see <PDOC00380>) that presents the catalytic domain to the membrane.
