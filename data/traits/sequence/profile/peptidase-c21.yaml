identifier: PROSITE:PS51738
label: Peptidase family C21 domain profile
definition: >-
  Peptidase family C21 domain profile. The family Tymoviridae comprises the genus Tymovirus, from which it derives its name, the genus Marafivirus and the genus Maculavirus. Members of the family are plant viruses that have the following traits in common: icosahedral virion structure, a monopartite single-stranded RNA genome with a very high cytidine content and a similar genome organization. The replication strategy encompasses post-translational proteolytic cleavage of the polypeptide encoded by ORF1 by a peptidase family C21 domain. The peptidase family C21 domain is a papain-like proteinase with catalytic cysteine and histidine residues.
