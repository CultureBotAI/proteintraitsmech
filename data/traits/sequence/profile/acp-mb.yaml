identifier: PROSITE:PS51901
label: Archaeal CBS proteins (ACP)-type metal binding (MB) domain profile
definition: >-
  Archaeal CBS proteins (ACP)-type metal binding (MB) domain profile. An archaeal family of CBS domain (see <PDOC51371>) proteins that are able to function as electron transfer proteins contains a small (~35 amino acids) C- terminal metal-binding (MB) domain containing four cysteine residues arranged in a Cys-X(2)-Cys-X(14-19)-Cys-X(1-4)-Cys motif. The archaeal CBS proteins (ACP)-type MB domain can bind several metals, with iron and zinc being the most abundant metals.
