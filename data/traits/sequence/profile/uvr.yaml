identifier: PROSITE:PS50151
label: UVR domain profile
definition: >-
  UVR domain profile. In prokaryote, nucleotide excision repair, DNA damage recognition and processing are achieved by the action of the uvrA, uvrB, and uvrC gene products. UvrB and uvrC share a common domain of around 35 amino acids, the so called UVR domain. This domain in uvrB can interact with the homologous domain in uvrC. The crystal structure of Escherichia coli uvrB and uvrC dimer revealed that the interaction is made throughout a coiled coil structure (see <PDB:1QOJ>). This interaction is important for the incision of the damaged strand.
