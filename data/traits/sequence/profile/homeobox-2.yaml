identifier: PROSITE:PS50071
label: '''Homeobox'' domain profile'
definition: >-
  'Homeobox' domain signature and profile. The 'homeobox' is a protein domain of 60 amino acids first identified in a number of Drosophila homeotic and segmentation proteins. It has since been found to be extremely well conserved in many other animals, including vertebrates. This domain binds DNA through a helix-turn-helix type of structure. Some of the proteins which contain a homeobox domain play an important role in development. Most of these proteins are known to be sequence specific DNA-binding transcription factors. The homeobox domain has also been found to be very similar to a region of the yeast mating type proteins.
