identifier: PROSITE:PS50805
label: Krueppel-associated box (KRAB) profile
definition: >-
  Krueppel-associated box (KRAB) profile. The Krueppel-associated box (KRAB) is a domain of around 75 amino acids that is found in the N-terminal part of about one third of eukaryotic Krueppel-type C2H2 zinc finger proteins (ZFPs) (see <PDOC00028>). It is enriched in charged amino acids and can be divided into subregions A and B, which are predicted to fold into two amphipathic alpha-helices. The KRAB A and B boxes can be separated by variable spacer segments and many KRAB proteins contain only the A box.
