identifier: PROSITE:PS50007
label: Phosphatidylinositol-specific phospholipase X-box domain profile
definition: >-
  Phosphatidylinositol-specific phospholipase C profiles. Phosphatidylinositol-specific phospholipase C (EC 3.1.4.11), an eukaryotic intracellular enzyme, plays an important role in signal transduction processes. It catalyzes the hydrolysis of 1-phosphatidyl-D-myo-inositol-4,5- diphosphate into the second messenger molecules diacylglycerol and inositol- 1,4,5-triphosphate. This catalytic process is tightly regulated by reversible phosphorylation and binding of regulatory proteins.
