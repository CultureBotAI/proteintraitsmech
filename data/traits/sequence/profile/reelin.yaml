identifier: PROSITE:PS51019
label: Reelin domain profile
definition: >-
  Reelin domain profile. The reelin domain is a ~170 amino acid module, which has been identified in the amino terminus of the extracellular matrix proteins reelin and F-spondin (renamed Spon1). The spondin domain is found in association with other modules, such as the thrombospondin type I repeat (TSP1) (see <PDOC50092>), the spondin domain (see <PDOC51020>), the fibronectin type III domain (see <PDOC50853>) or the Kunitz trypsin protease inhibitor domain (see <PDOC00252>). The function of the reelin domain is not yet known.
