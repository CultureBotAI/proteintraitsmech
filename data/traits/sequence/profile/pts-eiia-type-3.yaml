identifier: PROSITE:PS51095
label: PTS_EIIA type-3 domain profile
definition: >-
  PTS EIIA domain profiles and phosphorylation site signatures. The phosphoenolpyruvate-dependent sugar phosphotransferase system (PTS) is a major carbohydrate transport system in bacteria. The PTS catalyzes the phosphorylation of incoming sugar substrates concomitant with their translocation across the cell membrane. The general mechanism of the PTS is the following: a phosphoryl group from phosphoenolpyruvate (PEP) is transferred to enzyme I (EI) of PTS which in turn transfers it to a phosphoryl carrier protein (HPr) (see <PDOC00318>).
