identifier: PROSITE:PS51984
label: Cryptic Polo-Box 1 (CPB1) domain profile
definition: >-
  Cryptic Polo-Box 1 and 2 (CPB1 and CPB2) domains profiles. The Polo-like kinase (Plk) family of proteins functions as master regulators of cell-cycle progression, cell division, centrosome maturation, and centriole duplication. All four members (Plk1-4) of this serine/threonine protein kinase family share sequence similarity and domain structure with the founding member, Drosophila Polo kinase (the homolog of human Plk1). Plks are highly expressed in proliferating cells and are overexpressed in a variety of cancers where they have the potential to promote chromosomal instability and tumorigenesis.
