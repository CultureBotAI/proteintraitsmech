identifier: PROSITE:PS51232
label: Rho GTPase-binding/formin homology 3 (GBD/FH3) domain profile
definition: >-
  Rho GTPase-binding/formin homology 3 (GBD/FH3) domain profile. Formins are multidomain proteins conserved from plants to fungi and vertebrates. Due to their pivotal role in the organization of the actin cytoskeleton formins are involved in processes as diverse as formation of filopodia, microspikes and lamellipodia, establishment and maintenance of cell polarity, vesicular trafficking, formation of adherens junctions, cytokinesis, embryonic development and signaling to the nucleus. Formins are defined by a conserved formin homology 2 (FH2) domain with actin nucleation activity preceded by a proline-rich formin homology 1 (FH1) domain.
