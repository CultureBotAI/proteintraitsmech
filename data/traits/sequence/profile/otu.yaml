identifier: PROSITE:PS50802
label: OTU domain profile
definition: >-
  OTU domain profile. An homology region containing four conserved motifs has been identified in proteins from eukaryotes, several groups of viruses and the pathogenic bacteria Chlamydia pneumoniae. None of these proteins has a known biochemical function but low sequence similarity with the polyprotein regions of arteriviruses has lead to suggest that it could possess cysteine protease activity. In this case, the conserved cysteine and aspartate in motif I and the histidine in motif IV could be the catalytic residues. Motifs II and III have a more limited sequence conservation and could be involved in substrate recognition.
