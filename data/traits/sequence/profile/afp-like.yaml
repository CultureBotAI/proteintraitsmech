identifier: PROSITE:PS50844
label: Antifreeze protein-like domain profile
definition: >-
  Antifreeze protein-like domain profile. Antifreeze proteins (AFPs) are defined by their ability to bind ice and prevent it from growing. In this way they function in both freeze-resistance and freeze-tolerance strategies of organisms that live at sub-zero temperatures and require protection from ice growth. In fish, five AFP types have been described that are remarkably diverse in their 3D structures. They have completely dissimilar folds and no sequence homology. Type III AFPs found in eel pounts are 65-residue proteins with a compact globular fold formed from short beta strands, which presents a flat ice binding surface.
