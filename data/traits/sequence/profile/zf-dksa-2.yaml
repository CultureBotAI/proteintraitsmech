identifier: PROSITE:PS51128
label: Prokaryotic dksA C4-type zinc finger profiles
definition: >-
  Prokaryotic dksA C4-type zinc finger signature and profile. Guanosine tetraphosphate (ppGpp) or alarmone is a key nucleotide that triggers various regulatory events in bacterial cells starved for amino acids. ppGpp specifically inhibits the initiation of transcription from stable RNA promoters. It directly binds near the catalytic site of RNA polymerase and modulates its activity. Dksa augments ppGpp regulatory signal through binding to RNA polymerase. ppGpp and dksa also have an activation effect on promoters of enzymes involved in amino acid biosynthesis.
