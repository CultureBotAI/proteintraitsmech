identifier: PROSITE:PS52035
label: Peptidase family M14 domain profile
definition: >-
  Peptidase family M14 domain profile. Carboxypeptidases (CPs) hydrolyse peptide bonds in target proteins to release C-terminal amino acids. These enzymes have been classified into different families according to sequence similarity, mechanism and function. One of the largest groups, carrying a single catalytic Zn(2+) in the active site, is the M14 family. This is divided into four subfamilies known as M14A, M14B, M14C and M14D. In general, M14A and M14B carboxypeptidases either function within the secretory pathway or are themselves secreted. The members of the M14A subfamily are produced as pro-enzymes that are activated following the cleavage of N-terminal segments.
