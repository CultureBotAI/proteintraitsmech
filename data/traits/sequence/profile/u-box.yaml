identifier: PROSITE:PS51698
label: U-box domain profile
definition: >-
  U-box domain profile. The molecular mechanism underlying the transfer of ubiquitin (Ub) to a substrate consists of three key enzymatic steps. First, ubiquitin itself is adenylated at its C-terminal glycine residue by an activating enzyme (E1). Second, the adenylated Ub forms a covalent linkage to a conjugating enzyme (E2). Finally, a ligating enzyme (E3) recruits both the Ub-charged E2 species and the target protein. There are three classes of E3 enzymes: HECT (see <PDOC50237>), RING (see <PDOC00449>), and U-box, which are distinguished on the basis of their E2-recruiting domains.
