identifier: PROSITE:PS50173
label: UmuC domain profile
definition: >-
  UmuC domain profile. In Escherichia coli, UV and many chemicals appear to cause mutagenesis by a process of translesion synthesis that requires DNA polymerase III and the SOS-regulated proteins umuC, umuD and recA. This machinery allow the replication to continue through DNA lesion, and therefore avoid lethal interruption of DNA replication after DNA damage.
