identifier: PROSITE:PS50303
label: Pumilio homology domain (PUM-HD) profile
definition: >-
  Pumilio RNA-binding repeat and homology domain profiles. Members of the Pumilio family of proteins (Puf) regulate translation and mRNA stability in a wide variety of eukaryotic organisms including mammals, flies, worms, slime mold, and yeast. Pumilio family members are characterized by the presence of eight tandem copies of an imperfectly repeated 36 amino acids sequence motif, the Pumilio repeat, surrounded by a short N- and C-terminal conserved region. The eight repeats and the N- and C-terminal regions form the Pumilio homology domain (PUM-HD). The PUM-HD domain is a sequence-specific RNA binding domain.
