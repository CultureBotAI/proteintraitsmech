identifier: PROSITE:PS51364
label: TGF-beta binding (TB) domain profile
definition: >-
  TGF-beta binding (TB) domain profile. Transforming growth factor beta family of cytokines, are potent and multifunctional signaling molecules (see <PDOC00223>). Prior to ligand receptor binding there exist extracellular regulators that target these cytokines and facilitate the formation of morphogen gradiants that control developmental processes. Some of these proteins that are known to sequester latent TGF-beta contains a conserved domain, the TGF-beta binding (TB) domain. It is characterised by 8 conserved cysteine residues, which include an unusual cysteine triplet.
