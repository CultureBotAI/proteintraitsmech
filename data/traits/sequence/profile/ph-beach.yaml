identifier: PROSITE:PS51783
label: BEACH-type PH domain profile
definition: >-
  BEACH-type PH domain profile. The BEACH domain (see <PDOC50197>) defines a large family of eukaryotic proteins that have diverse cellular functions in vesicle trafficking, membrane dynamics, and receptor signaling. The sequence homology among these proteins is limited to their C-terminal region, where they contain the PH-BEACH-WD40 domains. The WD40 domain (see <PDOC00574>) is generally located at the extreme C terminus of these proteins and may be important for protein-protein interactions. The BEACH domain is located just prior to the WD40 domain in these proteins and is the only domain that is highly conserved among them.
