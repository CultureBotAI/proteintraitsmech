identifier: PROSITE:PS50831
label: SoHo domain profile
definition: >-
  SoHo domain profile. The c-Cbl-associated protein (CAB), ArgBP2 and vinexin-alpha each contain three C-terminal SH3 domains (see <PDOC50002>) and an N-terminal region with similarity to the gut peptide sorbin, termed the sorbin homology (SoHo) domain. Whereas the SH3 domains of these proteins can bind to different signaling or cytoskeletal molecules, the SoHo domains of CAP and vinexin has been shown to interact specifically with the lipid raft-associated protein flotilin.
