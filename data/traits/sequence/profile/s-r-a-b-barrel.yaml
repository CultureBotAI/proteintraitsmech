identifier: PROSITE:PS51502
label: Stress-response A/B barrel domain profile
definition: >-
  Stress-response A/B barrel domain profile. The stress-response A/B barrel domain is found in a class of stress-response proteins in plants and in some bacterial fructose-bisphosphate aldolase. The stress-response A/B barrel domain forms a very stable dimer. This dimer belongs to the superfamily of dimeric alpha+beta barrels in which the two beta-sheets form a beta-barrel. The two molecules in the dimer are related by a 2-fold axis parallel to helix H1 and beta-strands B3 and B4. The outer surface of the beta-sheets of the two molecules forms a beta-barrel-like structure defining a central pore. The function of the stress-response A/B barrel domain is unknown.
