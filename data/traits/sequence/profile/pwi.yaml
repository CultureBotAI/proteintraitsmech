identifier: PROSITE:PS51025
label: PWI domain profile
definition: >-
  PWI domain profile. The PWI domain, named after a highly conserved PWI tri-peptide located within its N-terminal region, is a ~80 amino acid module, which is found either at the N-terminus or at the C-terminus of eukaryotic proteins involved in pre- mRNA processing. It is found in association with other domains such as RRM (see <PDOC00030>) and RS. The PWI domain is a RNA/DNA-binding domain that has an equal preference for single- and double-stranded nucleic acids and is likely to have multiple important functions in pre-mRNA processing.
