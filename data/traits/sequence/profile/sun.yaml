identifier: PROSITE:PS51469
label: SUN domain profile
definition: >-
  SUN domain profile. Sad1/UNC-84 (SUN)-domain proteins are inner nuclear membrane (INM) proteins that are part of bridging complexes linking cytoskeletal elements with the nucleoskeleton. Originaly identified based on an ~150-amino acid region of homology between the C terminus of the Schizosaccharomyces pombe Sad1 protein and the Caenorhabditis elegans UNC-84 protein, SUN proteins are present in the proteomes of most eucaryotes. In addition to the SUN domain, these proteins contain a transmembrane sequence and at least one coiled-coil domain and localize to the inner nuclear envelope.
