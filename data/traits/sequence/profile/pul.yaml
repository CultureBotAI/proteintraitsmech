identifier: PROSITE:PS51396
label: PUL domain profile
definition: >-
  PUL domain profile. The PUL (after PLAP, UFD3 and lub1) domain is a predicted predominantly alpha helical globular domain found in eukaryotes. It is found in association with either WD repeats (see <PDOC00574>) and the PFU domain (see <PDOC51394>) or PPPDE and thioredoxin (see <PDOC00172>) domains. The PUL domain is a protein- protein interaction domain.
