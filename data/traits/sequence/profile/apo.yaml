identifier: PROSITE:PS51499
label: APO domain profile
definition: >-
  APO domain profile. ACCUMULATION OF PHOTOSYSTEM ONE1 (APO1) is required for accumulation of photosystem I (PSI) and other plastid-encoded [4FE-4S] cluster proteins of the chloroplast. APO1 belongs to a gene family with four defined groups (APO1 to APO4) only found in nuclear genomes of vascular plants. Members of the APO gene family are present in both monocotyledonae and dicotydiledonae and are predicted to be localized in chloroplasts and mitochondria. APO1 to APO4 show much fewer similarities in the N terminus than in the remaining part of the proteins, indicating different localizations and/or functions.
