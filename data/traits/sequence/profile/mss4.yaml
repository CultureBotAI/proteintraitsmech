identifier: PROSITE:PS51796
label: MSS4 domain profile
definition: >-
  MSS4 domain profile. MSS4 (mammalian suppressor of Sec4) is an evolutionarily highly conserved protein, which is expressed in all mammalian tissues. Although it was first proposed to function as a guanine exchange factor (GEF) for Rab GTPases, it was soon described as a quite inefficient GEF and was thus suggested to function rather as a chaperone, protecting nucleotide free Rabs from degradation, than as a GEF.
