identifier: PROSITE:PS50847
label: Gram-positive cocci surface proteins LPxTG motif profile
definition: >-
  Gram-positive cocci surface proteins LPxTG motif profile. Surface proteins from Gram-positive cocci are covalently linked to the bacterial cell wall by sortase, a membrane-anchored transpeptidase that cleaves proteins between the threonine and the glycine of a conserved LPxTG motif, with the formation of a thioester between the conserved cysteine of sortase and the threonine carboxyl group. The newly liberated C-terminus of the threonine is transferred via an amide bond exchange to the amino group of the pentaglycine wall crossbridge, thereby tethering the C-terminus end of the surface protein to the bacterial peptidoglycan.
