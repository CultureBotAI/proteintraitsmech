identifier: PROSITE:PS52064
label: Ubiquitin-binding motif (UBM) domain profile
definition: >-
  Ubiquitin-binding motif (UBM) domain profile. Ubiquitin (Ub) plays a major role in regulating diverse biological pathways by changing the function, localization, or turnover of target proteins. Signaling through Ub is generally thought to occur by low-affinity noncovalent interactions between Ub and a variety of specialized Ub-binding domains (UBDs). UBDs can be classified into a number of different families, whose members share sequence and structural similarity only within the families, but not between them.
