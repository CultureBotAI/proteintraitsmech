identifier: PROSITE:PS51663
label: Stathmin-like (SLD) domain profile
definition: >-
  Stathmin family signatures and stathmin-like (SLD) domain profile. Stathmin (from the Greek 'stathmos' which means relay), is an ubiquitous intracellular protein, present in a variety of phosphorylated forms and which is involved in the regulation of the microtubule (MT) filament system by destabilizing microtubules. It prevents assembly and promotes disassembly of microtubules.
