identifier: PROSITE:PS51147
label: Protein prenyltransferases alpha subunit repeat profile
definition: >-
  Protein prenyltransferases alpha subunit repeat profile. Protein prenyltransferases catalyze the transfer of an isoprenyl moiety to a cysteine at or near the C-terminus of several eukaryotic proteins. They are heterodimeric enzymes consisting of alpha and beta subunits. The alpha subunit is thought to participate in a stable complex with the isoprenyl substrate; the beta subunit binds the peptide substrate. There are three types of protein prenyltransferases. The alpha subunits of two types, i.e. farnesyltransferase and geranylgeranyltransferase I are encoded by the same gene, FNTA. These proteins bind the same motif (the CaaX box) around the cysteine in their substrates.
