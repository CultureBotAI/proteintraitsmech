identifier: PROSITE:PS51052
label: Cyclotides profile
definition: >-
  Cyclotides profile and signatures. Cyclotides (cyclo peptides) are plant peptides of ~30 amino acids with a head- to-tail cyclic backbone and six cysteine residues involved in three disulfide bonds as shown in the schematic representation below. The cyclotides are extremely resistant to proteolysis and are remarkably stable. Cyclotides display a diverse range of biological activities, including uterotonic activity, inhibition of neurotensin binding, hemolytic, anti-HIV and anti- microbial activity. This range of biological activities makes cyclotides amenable to potential pharmaceutical and agricultural applications.
