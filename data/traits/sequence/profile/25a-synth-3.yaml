identifier: PROSITE:PS50152
label: 2'-5'-oligoadenylate synthase N-terminal region profile
definition: >-
  2'-5'-oligoadenylate synthases signatures and profile. 2'-5'-oligoadenylate synthases constitute a family of interferon-induced enzymes that bind double-stranded RNA (dsRNA) and polymerizes ATP into 2'-5' linked oligomers of adenosine (pppA(2'p5'A)n) (2-5A) of various lengths. The 2-5A molecules activate a latent ribonuclease (Rnase L) that then cleaves single-stranded RNAs; as a result protein synthesis and virus growth are inhibited. Thus 2-5A synthases play an important role in the antiviral action of interferons.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
