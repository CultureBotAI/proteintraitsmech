identifier: PROSITE:PS51545
label: PIK helical domain profile
definition: >-
  Phosphatidylinositol kinase (PIK) helical domain profile. Phosphatidylinositol kinases are found in all eukaryotes and serve important functions in phosphatidylinositol (PI) signaling pathways. All PI3Ks and PI4Ks contain a conserved PI-kinase domain (see <PDOC00710>), and most have various additional domains that are involved in protein-protein or phospholipid- protein interactions. The phosphoinositide kinase (PIK) domain is a region conserved among all PI3 and PI4-kinases and although its role is presently unclear, it is likely to be involved in substrate presentation.
