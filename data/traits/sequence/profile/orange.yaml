identifier: PROSITE:PS51054
label: Orange domain profile
definition: >-
  Orange domain profile. The Orange domain is a motif of ~35 amino acids present in eukaryotic DNA-binding transcription repressors, which regulate cell differentiation, embryonic patterning and other biological processes in both vertebrates and invertebrates. The Orange domain is located just C-terminal to a basic helix-loop-helix (bHLH) domain in the bHLH-Orange (bHLH-O) proteins. This family of bHLH repressors is related to the Drosophila hairy and Enhancer-of-split proteins, wherein the Orange domain was first described and also named helix III/IV region.
