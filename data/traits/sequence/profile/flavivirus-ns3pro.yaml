identifier: PROSITE:PS51528
label: Flavivirus NS3 protease (NS3pro) domain profile
definition: >-
  Flavivirus NS2B and NS3 protease (NS3pro) domain profiles. Pathogenic members of the flavivirus family, including West Nile Virus (WNV) and Dengue Virus (DV), are growing global threats for which there are no specific treatments. The genome encodes three structural proteins found in the mature virion (C, prM, and E) and seven "nonstructural" (i.e., not part of the virion architecture) proteins (NS1, NS2A, NS2B, NS3, NS4A, NS4B, and NS5). Full-length NS3 is a bifunctional protein. The N-terminal 175 residues comprise a chymotrypsin-like protease, "NS3pro", while the C-terminal portion is a helicase ("NS3hel").
definition_source: Prosite Release 2026_02 of 10-Jun-2026
