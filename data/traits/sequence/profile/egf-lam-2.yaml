identifier: PROSITE:PS50027
label: Laminin-type EGF-like (LE) domain profile
definition: >-
  Laminin-type EGF-like (LE) domain signature and profile. Laminins are the major noncollagenous components of basement membranes that mediate cell adhesion, growth migration, and differentiation. They are composed of distinct but related alpha, beta and gamma chains. The three chains form a cross-shaped molecule that consist of a long arm and three short globular arms. The long arm consist of a coiled coil structure contributed by all three chains and cross-linked by interchain disulfide bonds.
