identifier: PROSITE:PS51051
label: DSL domain profile
definition: >-
  DSL domain profile. The about 50 amino acids DSL (Delta / Serrate / Lag-2) domain is an extracellular domain essential to activate members of the Lin-12/Notch receptors family. The DSL domain may mediates oligomerization of DSL proteins to form an active ligand and mediates interaction with the extracellular domain of Lin-12/Notch proteins involved in cell-cell signaling interactions. The DSL domain is found followed by a variable number of tandemly repeated copies of EGF motifs (see <PDOC00021>). Like EGF motifs this domain contains six conserved cysteines spanning different sequence lengths. Furthermore, the DSL domain contains a conserved YYG motif not present in the EGF motifs.
