identifier: PROSITE:PS50168
label: Death effector domain (DED) profile
definition: >-
  Death effector domain (DED) profile. The apoptotic signal coming from ligand-induced oligomerization of death receptors is mediated by a number of adaptor proteins containing specialized interaction domains. Besides the death effector domain (DED), this group is formed by the death domain (DD) (see <PDOC50017>) and the caspase recruitment domain (CARD) (see <PDOC50209>).
