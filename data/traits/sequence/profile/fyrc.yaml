identifier: PROSITE:PS51543
label: FYR domain FYRC motif profile
definition: >-
  FYR domain FYRN and FYRC motif profiles. The FYRN and FYRC sequence motifs are two poorly characterized phenylalanine/ tyrosine-rich regions of around 50 and 100 amino acids, respectively, that are found in a variety of chromatin-associated proteins. They are particularly common in histone H3K4 methyltransferases most notably in a family of proteins that includes human mixed lineage leukemia (MLL) and the Drosophila melanogaster protein trithorax. Both of these enzymes play a key role in the epigenetic regulation of gene expression during development, and the gene coding for MLL is frequently rearranged in infant and secondary therapy-related acute leukemias.
