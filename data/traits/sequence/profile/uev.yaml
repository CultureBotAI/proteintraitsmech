identifier: PROSITE:PS51322
label: UEV domain profile
definition: >-
  UEV domain profile. The N-terminal ubiquitin E2 variant (UEV) domain is ~145 amino acid residues in length and shows significant sequence similarity to E2 ubiquitin ligases (see <PDOC00163>) but is unable to catalyze ubiquitin transfer as it lacks the active site cysteine that forms the transient thioester bond with the C- terminus of ubiquitin (Ub). Nevertheless, at least some UEVs have retained the ability to bind Ub, and appear to act either as cofactors in ubiquitylation reactions, or as ubiquitin sensors.
