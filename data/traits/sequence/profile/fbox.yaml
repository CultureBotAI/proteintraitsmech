identifier: PROSITE:PS50181
label: F-box domain profile
definition: >-
  F-box domain profile. First identified in cyclin-F as a protein-protein interaction motif, the F-box is a conserved domain that is present in numerous protein with a bipartite structure. Through the F-box, these proteins are linked to the Skp1 protein and the core of SCFs (Skp1-cullin-F-box protein ligase) complexes. SCFs complexes constitute a new class of E3 ligases. They function in combination with the E2 enzyme Cdc34 to ubiquitinate G1 cyclins, Cdk inhibitors and many other proteins, to mark them for degradation.
