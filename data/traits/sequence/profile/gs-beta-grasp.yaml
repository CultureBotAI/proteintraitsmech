identifier: PROSITE:PS51986
label: Glutamine synthetase (GS) beta-grasp domain profile
definition: >-
  Glutamine synthetase (GS) beta-grasp and catalytic domains profiles. The glutamine synthetases (GSs; EC 6.3.1.2, also known as gamma-glutamyl: ammonia ligases) are a family of large oligomeric enzymes catalyzing the condensation of ammonium and glutamate, along with ATP, to form glutamine, the principal source of nitrogen for protein and nucleic acid synthesis. Because of their critical role in nitrogen metabolism, these enzymes are found in all forms of life from primitive to higher organisms, and they may be among the most ancient functioning enzymes in existence.
