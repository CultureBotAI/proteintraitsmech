identifier: PROSITE:PS51491
label: Tau and MAP proteins tubulin-binding repeat profile
definition: >-
  Tau and MAP proteins tubulin-binding repeat signature and profile. Microtubules consist of tubulins as well as a group of additional proteins collectively known as the Microtubule Associated Proteins (MAP). MAP's have been classified into two classes: high molecular weight MAP's and Tau protein. These proteins promote microtubule assembly and stabilize microtubules. The C-terminal region of a subset of these proteins contains three or four tandem repeats of a conserved domain of about thirty amino acid residues which is implicated in tubulin-binding and which seems to have a stiffening effect on microtubules. The proteins currently known to contain such repeats are:
