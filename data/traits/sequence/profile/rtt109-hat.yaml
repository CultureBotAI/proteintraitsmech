identifier: PROSITE:PS51728
label: Rtt109-type histone acetyltransferase (HAT) domain profile
definition: >-
  Rtt109-type histone acetyltransferase (HAT) domain profile. Histone acetyltransferase (HAT) enzymes play important roles in the regulation of chromatin assembly, RNA transcription, DNA repair and other DNA-templated reactions through the lysine side-chain acetylation of histones and other transcription factors. HATs fall into at least four different families based on sequence conservation within the HAT domain. This includes Gcn5/PCAF (see <PDOC51186>), CBP/p300, Rtt109 and MYST families.
