identifier: PROSITE:PS51142
label: Nicotianamine synthase (NAS)-like family profile
definition: >-
  Nicotianamine synthase (NAS)-like family profile. Iron is essential for fundamental cellular processes such as electron transfer in photosynthesis, respiration, nitrogen fixation as well as DNA synthesis. Ferric iron has an extremely low solubility and is not readily available to plants in the soils. To mobilize iron, plants have evolved at least two sophisticated and tightly regulated mechanisms for the acquisition of iron from soil.
