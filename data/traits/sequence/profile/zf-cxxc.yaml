identifier: PROSITE:PS51058
label: Zinc finger CXXC-type profile
definition: >-
  Zinc finger CXXC-type profile. Methylation of cytosine within the dinucleotide CpG is essential for vertebrate development and is correlated to gene silencing. Sequence analyses on various mammalian proteins linked to DNA methylation led to the identification of a conserved cysteine rich region with the consensus sequence C-x(2)-C-x(2)-C-x(5)-C-x(2)-C-x(2)-C, the CXXC-type zinc finger. This zinc finger can bind specifically to non-methylated CpG DNA but failed to bind to methylated CpG motifs.
