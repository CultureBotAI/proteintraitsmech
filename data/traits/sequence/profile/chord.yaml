identifier: PROSITE:PS51401
label: CHORD domain profile
definition: >-
  CHORD domain profile. Cysteine- and histidine-rich domains (CHORDs) are 60-amino acid modules that bind two zinc ions. They are usually arranged in tandem and are found in all tested eukaryotes, with the exception of yeast, where they are involved in processes ranging from pressure sensing in the heart to maintenance of diploidy in fungi, and exhibit distinct protein-protein interaction specificity. Six cysteine and two histidine residues are invariant within the CHORD domain. Three other residues are also invariant and some positions are confined to positive, negative, or aromatic amino acids.
