identifier: PROSITE:PS52075
label: Interferon (IFN) type-I family profile
definition: >-
  Interferon (IFN) type-I, -II, -III and -IV families profiles. The interferons (IFNs) are a subset of class II alpha-helical cytokines that have a variety of functions, most notably conferring a viral-resistant state to receptive cells. They play a major role in orchestrating the innate immune response toward viruses in vertebrates, and their defining characteristic is their ability to induce an antiviral state in responsive cells. IFNs are characterized by activities that vary over time and can lead to opposing outcomes. IFNs have protective roles during bacterial, viral, and fungal infections but can also drive numerous inflammatory and autoimmune diseases.
