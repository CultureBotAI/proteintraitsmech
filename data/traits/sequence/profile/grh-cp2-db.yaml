identifier: PROSITE:PS51968
label: Grh/CP2 DNA-binding (DB) domain profile
definition: >-
  Grh/CP2 DNA-binding (DB) domain profile. Grh/CP2 transcription factors (TFs) are highly conserved in multicellular organisms as key regulators of epithelial differentiation, organ development and skin barrier formation. Members of this TF family are widely found in diverse taxa, ranging from fungi to animals. The Grh/CP2 family of TFs comprises two distinct divisions, CP2 (CCAAT box-binding protein 2) and Grh (grainyhead). Phylogenetic analysis indicates that the Grh/CP2 family originated prior to the metazoan-fungal divergence and the diversification of the two subfamilies probably occurred in an ancient animal lineage.
