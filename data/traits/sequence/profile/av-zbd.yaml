identifier: PROSITE:PS51652
label: Arteriviridae zinc-binding (AV ZBD) domain profile
definition: >-
  Nidoviruses zinc-binding (ZBD) domain profiles. Nidoviruses (Coronaviridae, Arteriviridae, and Roniviridae) feature the most complex genetic organization among plus-strand RNA viruses. Their replicase genes encode an exceptionally large number of nonstructural protein domains which mediate the key functions required for genomic RNA synthesis (replication) and subgenomic RNA (sgRNA) synthesis (transcription). They encode a nonstructural protein, called nsp10 in arteriviruses (AV) and nsp13 in coronaviruses (CV), that is comprised of a C-terminal nucleoside triphosphate-binding/helicase (Hel) motif and an N-terminal cysteine-rich zinc-binding domain (ZBD).
