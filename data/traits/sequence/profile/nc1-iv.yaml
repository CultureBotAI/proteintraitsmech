identifier: PROSITE:PS51403
label: Collagen IV carboxyl-terminal non-collagenous (NC1) domain profile
definition: >-
  Collagen IV carboxyl-terminal non-collagenous (NC1) domain profile. Collagens are major components of the extracellular matrices of all metazoan life and play crucial roles in developmental processes and tissue homeostasis. Collagens are composed of three polypeptide chains (alpha chains) that fold together to form the characteristic triple helical collagenous domain. Some types of triple helical protomers contain genetically identical alpha chains forming homotrimers, whereas others contain two or three different alpha chains forming heterotrimers.
