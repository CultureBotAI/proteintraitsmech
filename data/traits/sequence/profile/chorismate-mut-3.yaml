identifier: PROSITE:PS51169
label: Chorismate mutase domain profile
definition: >-
  Chorismate mutase domains profiles. Chorismate mutase (CM) is a regulatory enzyme (EC 5.4.99.5) required for biosynthesis of the aromatic amino acids phenylalanine and tyrosine. CM catalyzes the Claisen rearrangement of chorismate to prephenate, which can subsequently be converted to precursors of either L-Phe or L-Tyr. In bifunctional enzymes the CM domain can be fused to a prephenate dehydratase (P-protein for Phe biosynthesis), (see <PDOC00671>), to a prephenate dehydrogenase (T-protein, for Tyr biosynthesis), or to 3-deoxy-D-arabino-heptulosonate 7-phosphate (DAHP) synthase (EC 2.5.1.54).
