identifier: PROSITE:PS50827
label: DDT domain profile
definition: >-
  DDT domain profile. The DDT has been named after the better characterized DNA-binding homeobox- containing proteins and the Different Transcription and chromatin remodeling factors in which it is found. It is a domain of about 60 amino acids which is exclusively associated with nuclear domains like AT-Hook (see <PDOC00306>), PHD finger (see <PDOC50016>), methyl-CpG-binding domain, bromodomain (see <PDOC00550>) and DNA-binding homeodomain (see <PDOC00027>).
