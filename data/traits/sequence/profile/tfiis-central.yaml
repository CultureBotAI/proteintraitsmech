identifier: PROSITE:PS51321
label: TFIIS central domain profile
definition: >-
  TFIIS central domain profile. Transcription factor IIS (TFIIS) is a transcription elongation factor that increases the overall transcription rate of RNA polymerase II by reactivating transcription elongation complexes that have arrested transcription. TFIIS is a modular factor that comprises an N-terminal domain (see <PDOC51319>), a central domain, and a C-terminal TFIIS-type zinc finger (see <PDOC00383>). The central domain is conserved in TFIIS homologues and interacts with RNA polymerase II.
