identifier: PROSITE:PS50078
label: POLO box domain profile
definition: >-
  POLO box domain profile. A subgroup of serine/threonine protein kinases (see <PDOC00100>) playing multiple role during cell cycle, especially in M phase progression and cytokinesis, contain a duplicated domain in their C-terminal part, the POLO box. It is named after its founding member encoded by the polo gene of Drosophila. This domain of around 70 amino acids has been found in species ranging from yeast to mammals.
