identifier: PROSITE:PS50821
label: PAZ domain profile
definition: >-
  PAZ domain profile. The PAZ domain is a domain of about 110 amino-acids which has been named after three of the proteins containing it: Piwi, Argonaute and Zwille/Pinhead. It is found in the Argonaute and the Dicer protein families, whose members are implicated in stem-cell fate determination and post-transcriptional gene silencing (PTGS) through RNA interference (RNAi). PTGS RNAi is the mechanism through which double-stranded RNAs (dsRNAs) silence cognate genes. It is characterized by the presence of RNAs of about 22 nucleotides in length that are homologous to the gene to be suppressed.
