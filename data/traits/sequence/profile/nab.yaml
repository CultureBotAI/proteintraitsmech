identifier: PROSITE:PS51774
label: Networked (NET) actin-binding (NAB) domain profile
definition: >-
  Networked (NET) actin-binding (NAB) domain profile. The Networked (NET) proteins are a superfamily of plant-specific actin-binding proteins which localize simultaneously to the actin cytoskeleton and specific membrane compartments and are suggested to couple these membranes to the actin cytoskeleton in plant cells. The minimal actin binding region, referred to as the NET actin-binding (NAB) domain, represents a new actin binding motif unique to plants with no apparent primary sequence homolgy to previously identified actin binding domains.
