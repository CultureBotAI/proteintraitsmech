identifier: PROSITE:PS51153
label: RPW8 domain profile
definition: >-
  RPW8 domain profile. Plant diseases resistance (R) proteins control the recognition of specific pathogens and activate subsequent defense responses. The R protein-mediated defenses typically involve a rapid, localized necrosis, or hypersensitive response (HR), at the site of infection, and the localized formation of antimicrobial chemicals and proteins that restrict growth of the pathogen. The Arabidopsis proteins RPW8.1 and RPW8.2 confer broad-spectrum resistance to powdery mildew pathogens. They share similarity with an ~150 amino acid module forming the N-terminus of a group of disease resistance proteins, which have a nucleotide-binding site (NBS) and leucine-rich repeats (LRRs).
