identifier: PROSITE:PS51265
label: Zinc finger DBF4-type profile
definition: >-
  Zinc finger Dbf4-type profile. In eukaryotes, initiation of DNA replication requires the assembly of pre-replication complexes (pre-RCs) on chromatin during the G1 phase. In the S phase, pre-RCs are activated by two protein kinases, Cdk2 and Cdc7, which results in the loading of replication factors and the unwinding of replication origins by the MCM helicase complex. Cdc7 is a serine/threonine kinase (see <PDOC00100>)that is conserved from yeast to human. It is regulated by its association with a regulatory subunit, the Dbf4 protein. This complex is often referred to as DDK (Dbf4-dependent kinase).
