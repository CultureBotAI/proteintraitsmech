identifier: PROSITE:PS51979
label: YebF/Cmi domain profile
definition: >-
  YebF/Cmi domain profile. Bacteriocins are proteins secreted by many bacterial cells to kill related bacteria of the same niche. To avoid their own suicide through reuptake of secreted bacteriocins, these bacteria protect themselves by co-expression of immunity proteins in the compartment of colicin destination. Colicin M (ColM) is an enzyme (phosphodiesterase) catalyzing the hydrolysis of the peptidoglycan lipid II precursor undecaprenyl-pyrophospho-MurNAc (-pentapeptide)-GlcNAc (where MurNAc and GlcNAc represent N-acetylmuramic acid and N-acetylglucosamine, respectively), thereby inhibiting peptidoglycan polymerization steps and provoking cell lysis.
