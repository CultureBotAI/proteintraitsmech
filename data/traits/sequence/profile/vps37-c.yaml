identifier: PROSITE:PS51314
label: VPS37 C-terminal domain profile
definition: >-
  Steadiness box, VPS28 N-terminal and VPS37 C-terminal domains profiles. The endosomal sorting complex required for transport (ESCRT) complexes form the machinery driving protein sorting from endosomes to lysosomes. ESCRT complexes are central to receptor downregulation, lysosome biogenesis, and budding of HIV. Yeast ESCRT-I consists of three protein subunits, VPS23, VPS28, and VPS37. In humans, ESCRT-I comprises TSG101, VPS28, and one of four potential human VPS37 homologs. The main role of ESCRT-I is to recognize ubiquitinated cargo via the UEV domain of the VPS23/TSG101 subunit.
