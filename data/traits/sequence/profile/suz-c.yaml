identifier: PROSITE:PS51938
label: SUZ-C domain profile
definition: >-
  SUZ-C domain profile. Microtubules are organized by the centrosome, a dynamic organelle that exhibits changes in both size and number during the cell cycle. The centrosome consists of a pair of centrioles surrounded by a mass of pericentriolar material (PCM). In Caenorhabditis elegans, SZY-20 is a centrosome-associated RNA-binding protein that negatively regulates centrosome assembly. SZY-20 and its animal orthologs share three prominent blocks of conservation. The N- terminal block is a short element, which is found exclusively in orthologs of SZY-20.
