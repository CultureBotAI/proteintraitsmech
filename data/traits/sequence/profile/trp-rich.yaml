identifier: PROSITE:PS50327
label: Tryptophan-rich region profile
definition: >-
  Sequence regions enriched in a particular amino acid profiles. Many proteins contain compositionally biased sequence regions which are also called low-complexity regions. Typically, such regions are highly enriched in one or a few amino acids. We have included profiles specific for each of the 20 amino acids so as to search for regions that are significantly enriched in a particular amino acid (alanine, cysteine, aspartic acid, glutamic acid, phenylalanine, glycine, histidine, isoleucine, lysine, leucine, methionine, asparagine, proline, glutamine, arginine, serine, threonine, valine, tryptophan and tyrosine-rich region profiles).
