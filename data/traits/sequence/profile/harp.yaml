identifier: PROSITE:PS51467
label: HARP domain profile
definition: >-
  HARP domain profile. SMARCAL1 (SWI/SNF-related, matrix-associated, actin-dependent regulator of chromatin, subfamily A-like1), also known as DNA-dependent ATPase A and HARP (Hep-A-related proteins), maintains genome integrity during DNA replication. SMARCAL1 has ATP-dependent annealing helicase activity, which helps to stabilize stalled replication forks and facilitate DNA repair during replication. Biochemically, SMARCAL1 can bind to DNA that contains single- and double-stranded regions such as forks and DNA hairpins. DNA binding activates its ATPase activity, and this activity promotes DNA single-stranded annealing.
