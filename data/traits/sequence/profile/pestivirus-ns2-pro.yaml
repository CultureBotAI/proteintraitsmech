identifier: PROSITE:PS51692
label: Pestivirus nonstructural protein 2 (NS2) protease domain profile
definition: >-
  Pestivirus nonstructural protein 2 (NS2) protease domain profile. Pestiviruses are animal pathogens that are recognized as a separate genus of the family Flaviviridae. The pestiviral genome is a single-stranded RNA of positive polarity. It is translated into a large polyprotein, which is cotranslationally and posttranslationally processed by viral and cellular proteases. Pestivirus nonstructural protein 2 (NS2) is predicted to have a multidomain organization. The C-terminal-most domain of NS2 is a cysteine autoprotease responsible for NS2-3 cleavage. The catalytic triad is formed by His, Glu, and Cys.
