identifier: PROSITE:PS50207
label: Caspase family p10 domain profile
definition: >-
  Caspase family signatures and profiles. Interleukin-1 beta converting enzyme (EC 3.4.22.36) (ICE) is responsible for the cleavage of the IL-1 beta precursor at an Asp-Ala bond to generate the mature biologically active cytokine. ICE a thiol protease composed of two subunits of 10 (p10) and 20 Kd (p20), both derived by the autocleavage of a 45 Kd precursor (p45). Two residues are implicated in the catalytic mechanism: a cysteine and an histidine. They are located in the P20 subunit after cleavage of the precursor. ICE belongs to a family of peptidases which is implicated in programmed cell death (apoptosis) and which has been termed 'caspase' for cysteine aspase.
