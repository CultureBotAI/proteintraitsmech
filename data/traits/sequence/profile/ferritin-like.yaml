identifier: PROSITE:PS50905
label: Ferritin-like diiron domain profile
definition: >-
  Ferritin-like diiron domain profile. The ferritin-like domain is an about 145-residue domain made of a four-helix bundle surrounding a non-heme, non-sulfur, oxo-bridged diiron site (see <PDB:1RYT>). The diiron site is contained within a twisted, left-handed four- helix-bundle constituted of two anti-parallel helix pairs connected through a left-handed crossover connection. Known ligand residues at non-heme, non- sulfur diiron sites in proteins include His, Asp, Glu, and Tyr. Proteins containing a ferritin-like diiron domain possess the ability to catalyze oxidation of Fe(2+) to Fe(3+) by O2, i.e. ferroxidase activity.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
