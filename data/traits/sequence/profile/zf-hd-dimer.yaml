identifier: PROSITE:PS51523
label: Zinc-finger ZF-HD dimerization-type profile
definition: >-
  Zinc-finger ZF-HD dimerization-type profile. The homeodomain (HD) is a 60-amino acid DNA-binding domain found in many transcription factors (see <PDOC00027>). HD-containing proteins are found in diverse organisms such as humans, Drosophila, nematode worms, and plants, where they play important roles in development. Zinc-finger-homeodomain (ZF- HD) subfamily proteins have only been identified in plants, and likely play plant specific roles. ZF-HD proteins are expressed predominantly or exclusively in floral tissue, indicating a likely regulatory role during floral development.
