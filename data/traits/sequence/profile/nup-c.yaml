label: NUP C-terminal domain profile
definition: >-
  NUP C-terminal domain profile. Communication between the nucleus and cytoplams of an eukaryotic cell is mediated by the nuclear pore complexes (NPCs), which act as selective molecular gateways. Through these gateways, RNAs and proteins are exported into the nucleus. Each NPC consists of ~30 distinct proteins termed nucleoporins, each present in at least eight copies, reflecting the octagonal symmetry of the complex. The following nucleoporins share an ~150-residue C- terminal domain responsible for NPC targeting:
