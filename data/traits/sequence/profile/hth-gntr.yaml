identifier: PROSITE:PS50949
label: GntR-type HTH domain profile
definition: >-
  GntR-type HTH domain profile. The gntR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 60-70 residues present in transcriptional regulators of the gntR family. This family of bacterial regulators is named after Bacillus subtilis gntR, a repressor of the gluconate operon. Six subfamilies have been described for the gntR family: fadR, hutC, plmA, mocR, ytrA, and araR, which regulate various biological processes and important bacterial metabolic pathways. The DNA-binding gntR-type HTH domain occurs usually in the N-terminal part. The C-terminal part can contain a subfamily-specific effector-binding domain and/or an oligomerization domain.
