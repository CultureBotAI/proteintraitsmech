identifier: PROSITE:PS51370
label: R domain profile
definition: >-
  R domain profile. Members of the TCP family of transcription factors have so far only been found in plants, where they are implicated in processes related to cell proliferation. It appears that TCP domain (see <PDOC51369>) protein have been recruited during evolution to control cell division and growth in various developmental processes. The TCP proteins fall into two subfamilies, one including CYC and TB1 and the other including the PCFs. Most members of the CYC/TB1 subfamily have an R domain, predicted to form a coiled coil that may mediate protein-protein interactions.
