identifier: PROSITE:PS52063
label: D10C domain profile
definition: >-
  D10C domain profile. The D10C domain, which contains ten well-conserved cysteine residues, is about 130 amino acid residues in length, and is present in mainly in two classes of proteins: class 1 includes liver-specific zona pellucida (ZP) domain- containing protein (LZP), uromodulin (UMOD) and pancreatic secretory granule membrane major glycoprotein GP2; class 2 includes von Willebrand factor D and EGF domain-containing proteins. Most of these proteins are membrane proteins, extracellular proteins or nuclear membrane proteins.
