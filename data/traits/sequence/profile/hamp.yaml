identifier: PROSITE:PS50885
label: HAMP domain profile
definition: >-
  HAMP domain profile. The HAMP linker domain (domain present in Histidine kinases, Adenyl cyclases, Methyl-accepting proteins and Phosphatases) is an approximately 50-amino acid alpha-helical region common to chemoreceptors and histidine kinases that is present in several multidomain sensor proteins that participate in a variety of signal transduction processes.
