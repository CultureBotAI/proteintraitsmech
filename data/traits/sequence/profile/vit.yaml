identifier: PROSITE:PS51468
label: VIT domain profile
definition: >-
  VIT domain profile. The inter-alpha-trypsin inhibitor (ITI) family is composed of protease inhibitors that are assembled from two precursor proteins: a light chain and different homologous heavy chains (ITIHs). Originally identified as plasma inhibitors, recent data indicate that ITI plays a role in extracellular matrix stabilization and in prevention of tumor metastasis.
