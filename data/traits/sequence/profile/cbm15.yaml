identifier: PROSITE:PS51759
label: Carbohydrate-binding module 15 (CBM15) domain profile
definition: >-
  Carbohydrate-binding module 15 (CBM15) domain profile. Microbial plant cell wall hydrolases are often modular proteins comprising a catalytic module linked via a highly flexible sequence to one or more carbohydrate-binding modules (CBMs). CBMs bind to a range of plant structural polysaccharides that include both crystalline cellulose and noncrystalline beta-1,4-glucan, xylan, mannan, beta-1,3-glucan, and glucomannan. Their primary function is to increase the catalytic efficiency of these enzymes against their soluble substrates by bringing the catalytic module into prolonged and intimate contact with its substrate.
