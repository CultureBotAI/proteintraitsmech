identifier: PROSITE:PS52031
label: GG-type lectin domain profile
definition: >-
  GG-type lectin domain profile. The GG domain, with two well-conserved glycine residues, is present in eukaryotic FAM3 superfamily (FAM3A, FAM3B, FAM3C and FAM3D), POMGnT1 (protein O-linked mannose beta-1,2-N-acetylglucosaminyltransferase), TEM2 proteins as well as phage gp35 proteins. The presence of a GG domain in Bacteriophage gp35 hinge connector of long tail fiber might reflect the horizontal gene transfer from organisms. The GG domain is a lectin with carbohydrate-binding activity.
