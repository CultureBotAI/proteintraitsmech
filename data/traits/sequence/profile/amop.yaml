identifier: PROSITE:PS50856
label: AMOP domain profile
definition: >-
  AMOP domain profile. The AMOP domain (for adhesion-associated domain in MUC4 and other proteins) is an ~100-residue long extracellular domain that occurs in putative cell adhesion molecules and in some splice variants of MUC4. It contains eight invariant cysteines residues that are predicted to be involved in disulfide bonds. The AMOP domain is found associated with extracellular domains involved in cell adhesion, such as NIDO, sushi (see <PDOC50923>), somatomedin B (see <PDOC00453>), VWFD, EGF (see <PDOC00021>), IPT, or TSP1 (see <PDOC50092>). The presence of the AMOP domain in cell adhesion molecules could be indicative of a role for this domain in adhesion.
