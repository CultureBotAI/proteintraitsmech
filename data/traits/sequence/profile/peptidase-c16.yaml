identifier: PROSITE:PS51124
label: Peptidase family C16 domain profile
definition: >-
  Peptidase family C16 domain profile. Peptidase family C16 (EC 3.4.22.-) contains the coronaviruses cysteine endopeptidases involved in viral polyprotein processing. All coronaviruses encodes between one and two accessory cysteine proteinases that recognize and process one or two sites in the amino-terminal half of the replicase polyprotein during assembly of the viral replication complex. MHV, HCoV and TGEV encode two accesssory proteinases, called coronavirus papain-like proteinase 1 and 2 (PL1-PRO and PL2-PRO). IBV and SARS encodes only one called PL-PRO.
