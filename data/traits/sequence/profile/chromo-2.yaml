identifier: PROSITE:PS50013
label: Chromo and chromo shadow domain profile
definition: >-
  Chromo domain signature and profile. The 'chromo' (CHRromatin Organization MOdifier) domain is a conserved region of about 60 amino acids which was first identified in the drosophila chromatin proteins HP1 and Polycomb. Chromo domain have now been found in single or multiple copies in a variety of eukaryotic proteins with diverse structures and activities, most or all of which are connected with chromosome structure/function. Functional dissections of chromo domain proteins suggests a mechanistic role for chromo domains in targeting chromo domain proteins to specific regions of the nucleus. The mechanism of targeting may involve protein-protein and/or protein/nucleic acid interactions.
