identifier: PROSITE:PS50010
label: Dbl homology (DH) domain profile
definition: >-
  Dbl homology (DH) domain signature and profile. The Rho family GTPases Rho, Rac and CDC42 regulate a diverse array of cellular processes. Like all members of the Ras superfamily, the Rho proteins cycle between active GTP-bound and inactive GDP-bound conformational states. Activation of Rho proteins, through release of bound GDP and subsequent binding of GTP, is catalyzed by guanine nucleotide exchange factors (GEFs) in the Dbl family. The proteins encoded by members of the Dbl family share a common domain of about 200 residues (designated the Dbl homology or DH domain) that has been shown to encode a GEF activity specific for a number of Rho family members.
