identifier: PROSITE:PS51351
label: TFIIE beta central core DNA-binding domain profile
definition: >-
  TFIIE beta central core DNA-binding domain profile. Initiation of eukaryotic mRNA transcription requires melting of promoter DNA with the help of the general transcription factors TFIIE and TFIIH. TFIIE consists of a large and a small subunit, referred to as alpha (see <PDOC51344>) and beta, respectively, in higher eukaryotes. TFIIE beta has been found to bind to the region where the promoter starts to open to be single- stranded upon transcription initiation by RNA polymerase II. The ~120-residue central core domain of TFIIE beta plays a role in double-stranded DNA binding of TFIIE.
