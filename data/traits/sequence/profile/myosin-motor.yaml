identifier: PROSITE:PS51456
label: Myosin motor domain profile
definition: >-
  Myosin motor domain profile. The two major families of eukaryotic cellular motor ATPases, kinesin and myosin, constitute the myosin-kinesin superfamily within the TRAFAC class of GTPases. The ATPase domain of myosins along with that of the kinesin family of microtubule based motors is believed to have evolved from the core GTPase domain through deletion of strands 6 and 7 and addition of two N-terminal strands. Myosins are actin-based motors known or hypothesized to play fundamental roles in many forms of eukaryotic motility such as cell crawling, cytokinesis, phagocytosis, growth cone extension, maintenance of cell shape, and organelle/particle trafficking.
