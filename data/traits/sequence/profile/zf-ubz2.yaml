identifier: PROSITE:PS51906
label: Zinc finger UBZ2-type profile
definition: >-
  Zinc finger UBZ1-, UBZ2-, UBZ3-, and UBZ4-type profiles. The ubiquitin-binding zinc finger (UBZ) is a type of zinc-coordinating beta- beta-alpha fold domain found mainly in proteins involved in DNA repair and transcriptional regulation. UBZ domains coordinate a zinc ion with cysteine or histidine residues; depending on their amino acid sequence, UBZ domains are classified into several families.
