identifier: PROSITE:PS51180
label: BRO1 domain profile
definition: >-
  BRO1 domain profile. Vesicular trafficking pathways sort transmembrane proteins and lipids into small vesicles that invaginate into the endosome. Endosomes coordinate the transport of endocytic, biosynthetic and recycling cargoes. Multivesicular bodies (MVBs) are late endosomes which contain lumenal vesicles that are sorted for delivery either in the lysosome in metazoans, or into the vacuole in yeast or may be targeted for extracellular release. MVBs fuse with the vacuole/lysosome where the vesicles and their contents are degraded by hydrolases.
