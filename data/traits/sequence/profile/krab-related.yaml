identifier: PROSITE:PS50806
label: KRAB-related domain profile
definition: >-
  KRAB-related domain profile. This domain of about 63 amino acid residues is related to the KRAB domain (see <PDOC50805> and has been identified in the N-terminal ends of proteins belonging to the SSX family. Proteins of the SSX family lack the C2H2- type zinc finger (see <PDOC00028>) which is invariably found in proteins containing the KRAB domain. The KRAB-related domains show greatest homology to the KRAB A subdomain and contain a high proportion of the amino acids which are usually conserved between the KRAB A subdomains of zinc finger proteins.
