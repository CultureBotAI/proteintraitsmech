identifier: PROSITE:PS50160
label: ATP-dependent DNA ligase family profile
definition: >-
  ATP-dependent DNA ligase signatures and profile. DNA ligase (polydeoxyribonucleotide synthase) is the enzyme that joins two DNA fragments by catalyzing the formation of an internucleotide ester bond between phosphate and deoxyribose. It is active during DNA replication, DNA repair and DNA recombination. There are two forms of DNA ligase: one requires ATP (EC 6.5.1.1), the other NAD (EC 6.5.1.2).
