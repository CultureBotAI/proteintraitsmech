identifier: PROSITE:PS51859
label: Rho-binding (RhoBD) domain profile
definition: >-
  Rho-binding (RhoBD) domain profile. The Rho-ROCK pathway modulates the phosphorylation level of a variety of important signalling proteins and is thereby involved in miscellaneous cellular processes including cell migration, neurite outgrowth, and smooth muscle contraction. The enzyme activity of the two ROCK isoforms, ROCKI/ ROKbeta/p160(ROCK) and ROCKII/ROKalpha/Rho kinase, is auto-inhibited in the free state but is activated through direct binding to the small GTPase Rho in the GTP-bound form (see <PDOC51417>).
