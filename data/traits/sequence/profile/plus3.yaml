identifier: PROSITE:PS51360
label: Plus3 domain profile
definition: >-
  Plus3 domain profile. The yeast Paf1 complex consists of Pfa1, Rtf1, Cdc73, Ctr9, and Leo1 and regulates histone H2B ubiquitination, histone H3 methylation, RNA polymerase II carboxy-terminal domain (CTD) Ser2 phosphorylation, and RNA 3' end processing. The conservation of Paf1 complex function in higher eukaryotes has been confirmed in human cells, Drosophila and Arabidopsis. The Plus3 domain spans the most conserved regions of the Rtf1 protein and is surrounded by regions of low complexity and coiled-coil propensity. It contains only a limited number of highly conserved amino acids, among which are three positively charged residues that gave the Plus3 domain its name.
