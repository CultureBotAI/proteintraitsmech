identifier: PROSITE:PS50128
label: SURP motif repeat profile
definition: >-
  SURP motif repeat profile. The SURP motif is an about 40-residue module, which has been named after the first proteins containing it (suppressor-of-white-apricot and PRP21/SPP91). It is found tandemly repeated in proteins involved in either constitutive or regulated pre-mRNA splicing. Overall, the N-terminal half of the SURP motif exhibits a higher conservation than the C-terminal half, where length differences are apparent in addition to sequence heterogeneity. Nevertheless, within this region, the motif F-x-F-L and the dipeptide Y-Y at the C-terminal border are conserved in nearly all proteins. The function of the SURP motif is still unknown.
