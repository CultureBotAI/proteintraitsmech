identifier: PROSITE:PS51931
label: Bacterial microcompartment (BMC) circularly permuted domain profile
definition: >-
  Bacterial microcompartment (BMC) domain signature and profile and BMC circularly permuted domain profile. Bacterial microcompartments (BMCs) are large proteinaceous structures comprised of a roughly icosahedral shell and a series of encapsulated enzymes. They are found across the Kingdom Bacteria where they play functionally diverse roles including CO(2) fixation and the catabolism of a range of organic compounds. They function as organelles by sequestering particular metabolic processes within the cell.
