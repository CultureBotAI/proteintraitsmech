identifier: PROSITE:PS51443
label: Phytochelatin synthase (PCS) domain profile
definition: >-
  Phytochelatin synthase (PCS) domain profile. Phytochelatins (PCs) are well known as the heavy metal-detoxifying peptides in higher plants, eukaryotic algae, fungi, nematode and cyanobacteria. These peptides, of the general structure (gamma-Glu-Cys)n-Gly (with n=2-11), are enzymatically synthesized from the substrate glutathione (GSH). PCs are synthesized posttranslationally by the PC synthase (PCS) (EC 2.3.2.15), a gamma-glutamylcysteine (gamma-EC) transpeptidase.
