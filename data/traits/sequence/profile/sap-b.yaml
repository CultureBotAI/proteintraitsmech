identifier: PROSITE:PS50015
label: Saposin B type domain profile
definition: >-
  Saposin B-type domain profile. The saposin B-type domain is a ~80 amino acid domain present in saposins and related proteins that interact with lipids. The domain is named after the small lysosomal proteins, saposins, which serve as sphingolipid hydrolase activator proteins in vertebrates. The mammalian saposins are synthesized as a single precursor molecule (prosaposin) which contains two saposin A-type domains in the extremities that are removed in the activation reaction (see <PDOC51110>), and four saposin B-type domains yielding the active saposins A, B, C and D after proteolytic cleavage.
