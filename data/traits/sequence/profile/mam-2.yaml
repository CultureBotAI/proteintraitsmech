identifier: PROSITE:PS50060
label: MAM domain profile
definition: >-
  MAM domain signature and profile. A domain of about 170 amino acids has been recognized in the extracellular region of functionally diverse proteins. All these proteins have a modular, receptor-like architecture consisting of a signal peptide, followed by a large N-terminal extracellular domain, a single transmembrane region and a intracellular domain. These proteins are listed below.
