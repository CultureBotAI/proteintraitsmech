identifier: PROSITE:PS51140
label: CUE domain profile
definition: >-
  CUE domain profile. The Coupling of Ubiquitin conjugation to ER degradation or CUE domain is a ~44 residue ubiquitin binding domain, present in eukaryotic proteins of trafficking and ubiquitination pathways. Ubiquitin is a 76 amino acid polypeptide that can be attached to proteins to alter their activity or location (see <PDOC00271>). Monoubiquitination and the addition of polyubiquitin chains are important cellular regulatory signals. The CUE domain was named after baker's yeast Cue1 protein. Some domains which can occur in combination with the CUE domain are the RING-type zinc finger (see <PDOC00449>), the Smr domain (see <PDOC50828>) or the C2 domain (see <PDOC00380>).
