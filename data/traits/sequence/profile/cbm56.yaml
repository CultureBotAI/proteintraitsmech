identifier: PROSITE:PS52005
label: CBM56 (carbohydrate binding type-56) domain profile
definition: >-
  CBM56 (carbohydrate binding type-56) domain profile. Carbohydrate binding modules (CBMs) are independent domains existing in carbohydrate active enzymes. The majority of such domains exhibit carbohydrate binding activity, which enhances the catalytic efficiency of carbohydrate active enzymes. The non-catalytic CBMs are classified into families, which currently number >70 and are based on amino acid sequence identity. The CBM family 56 (CBM56) domain is an ~95-amino acid module, which selectively binds insoluble beta-1,3-glucans, probably by binding domains in the polysaccharide with triple-helical quaternary structure.
