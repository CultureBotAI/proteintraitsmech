identifier: PROSITE:PS51837
label: LITAF domain profile
definition: >-
  LITAF domain profile. LITAF (LPS-induced TNF-activating factor) (also known as SIMPLE; small integral membrane protein of the late endosome) is an endosome-associated integral membrane protein important for multivesicular body (MVB) sorting. It is a monotypic membrane protein with both termini exposed to the cytoplasm and is anchored to membranes via an in-plane helical membrane anchor, present within the highly conserved C-terminal region known as the 'LITAF domain' or 'SIMPLE-like domain'. The LITAF domain consists of conserved cysteines separated by a 22 residue hydrophobic region.
