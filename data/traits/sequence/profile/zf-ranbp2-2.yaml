identifier: PROSITE:PS50199
label: Zinc finger RanBP2 type profile
definition: >-
  Zinc finger RanBP2-type signature and profile. Nucleocytoplasmic transport is mediated by large supramolecular structures that span the nuclear envelope called nuclear pore complexes (NPC). The export as well as the import pathway require three major component, the substrate, an adaptor complex and a receptor. The adaptor complex and the receptor pass through the NPC with the substrate. The nuclear transport is also dependent on the GTPase cycle of the small GTPase protein Ran and a number of Ran-binding proteins (RanBP).
