identifier: PROSITE:PS50817
label: Intein N-terminal splicing motif profile
definition: >-
  Intein N- and C-terminal splicing motif profiles. Inteins (for INternal proTEINs) are protein insertion sequences that are embedded in host protein sequences. They are post-translationally excised from the host protein by a self-catalytic protein splicing process, in which the intein sequence is precisely excised, and the flanking host protein sequences (N- and C-exteins) are religated to create a functional protein. Intein and protein splicing may be viewed as the protein equivalent of intron and RNA splicing, respectively. Inteins were initially discovered as translated intervening sequences that were present in the host gene but absent in homologous genes.
