identifier: PROSITE:PS51857
label: Cold-shock (CSD) domain profile
definition: >-
  Cold-shock (CSD) domain profile. The cold-shock domain (CSD) is an ancient beta-barrel fold of about 70 amino acids that binds single-stranded nucleic acids (both RNA and DNA). CSD- containing proteins have been found in all three domains of life and function in a variety of processes that are related, for the most part, to post- translational gene regulation. CSDs were first found in bacterial cold-shock proteins (CSPs). CSPs are small, abundant proteins that are essentially composed of one CSD. Some members of this family are strongly induced after cold shock and are involved in adaptation to low temperatures, while others function during normal growth conditions.
