identifier: PROSITE:PS51336
label: DM10 domain profile
definition: >-
  DM10 domain profile. DM10 domains contain ~105 residues and are of unknown function. In both Chlamydomonas and mammals, this module has to date been identified in only two types of proteins. The first is the nm23-H7 class of nucleoside diphosphate kinase (NDK7) that consists of an N-terminal DM10 domain and two functional catalytic NDK modules (see <PDOC00409>). In Chlamydomonas, this protein (termed p40 is tightly associated with the flagellar axoneme.
