identifier: PROSITE:PS51742
label: PPC domain profile profile
definition: >-
  PPC domain profile. The Plants and Prokaryotes Conserved (PPC) domain contains a hydrophobic region in the C terminal, and in the case of plants, is often found in several proteins with the AT-hook motif. Proteins with PPC domains are found in Bacteria, Archaea and the plant kingdom.
