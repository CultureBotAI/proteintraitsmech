identifier: PROSITE:PS50983
label: Iron siderophore/cobalamin periplasmic-binding domain profile
definition: >-
  Iron siderophore/cobalamin periplasmic-binding domain profile. ATP binding cassette (ABC) transporters are a ubiquitous family of importer and exporter proteins that consist of two alpha-helical transmembrane (TM) domains, which form a translocation pathway, and two cytoplasmic ABC domains, which power the transport reaction through binding and hydrolysis of ATP (see <PDOC00364>). In addition most bacterial importers employs a periplasmic substrate-binding protein (PBP) that delivers the ligand to the extracellular gate of the TM domains. These proteins bind their substrates selectively and with high affinity, which is thought to ensure the specificity of the transport reaction.
