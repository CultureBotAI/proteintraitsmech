identifier: PROSITE:PS50304
label: Tudor domain profile
definition: >-
  Tudor domain profile. The Tudor domain is a domain of around 50-70 amino acids which was first identified as a repeat present in 10 copies in Drosophila Tudor protein. The Tudor domain is found in one or several copies in many eukaryotic proteins that colocalize with ribonucleoprotein or single-stranded DNA-associated complexes in the nucleus, in the mitochondrial membrane, or at kinetochores. The Tudor domain can be found in association with other domains, such as a staphylococcal nuclease (SN)-fold (see <PDOC00865>), a OTU domain (see <PDOC50802>), a KH domain (see <PDOC50084>), a DEAD/DEAH box helicase domain (see <PDOC00039>) or a coiled-coil domain.
