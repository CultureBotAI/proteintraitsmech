label: Globin domain profile
definition: >-
  Globin family and Androglobin (Adgb) circularly permuted globin domain profiles. Globins are small metalloproteins that typically comprise around 150 amino acids, but may also have N- and/or C-terminal extensions. Most globins cover eight alpha-helical segments (named A through H) with a characteristic 3-over- 3 alpha-helical sandwich structure (referred to as globin fold) and include a haem prosthetic group (Fe(2+)-protoporphyrin IX), by which they reversibly bind oxygen, and in some cases, also other ligands. While their overall structures are conserved, globin primary sequences often are not. In fact, only the proximal histidine (position F8; i.e.
