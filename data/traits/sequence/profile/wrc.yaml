identifier: PROSITE:PS51667
label: WRC domain profile
definition: >-
  WRC domain profile. The plant GROWTH-REGULATING FACTOR (GRF) proteins are putative transcription factors. They contain one or two WRC (Trp, Arg, Cys) domain(s). The WRC domain has two distinctive structural features, namely many basic amino acids (Arg and Lys) and the conserved spacing of three Cys and one His residues, the C3H motif. The basic amino acids are highly conserved, indicating that they are essential for the function of the WRC domain, probably as nuclear localization signal. The C3H motif is also absolutely conserved and may mediate binding to DNA.
