label: REM-1 domain profile
definition: >-
  REM-1 domain profile. Rho GTPases are molecular switches that regulate many essential cellular processes, including actin dynamics, gene transcription, cell-cycle progression and cell adhesion. In the GTP-bound form they are able to interact with effector or target molecules to initiate a downstream response, while an intrinsic GTPase activity returns the proteins to the GDP-bound state, to complete the cycle and terminate signal transduction. The Rho effector motif class 1 (REM-1) domain specifically binds GTP-Rho and is widely conserved in the following Rho effector proteins:
