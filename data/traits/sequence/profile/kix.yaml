identifier: PROSITE:PS50952
label: KIX domain profile
definition: >-
  KIX domain profile. Transcriptional activators are believed to stimulate gene expression via protein-protein interactions with the basal machinery. The cAMP-regulated transcription factor CREB has been shown to stimulate target gene expression, in part by associating with the coactivator paralogs p300 and CREB binding protein (CBP). CBP and P300 bind to the Ser-133-phosphorylated kinase- inducible domain (KID) (see <PDOC50953>) of CREB via a region of approximately 90 residues referred to as the KIX domain, which is highly conserved in CBP homologs from Caenorhabditis elegans and Drosophila melanogaster.
