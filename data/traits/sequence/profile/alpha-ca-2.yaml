identifier: PROSITE:PS51144
label: Alpha-carbonic anhydrases profile
definition: >-
  Alpha-carbonic anhydrases signature and profile. Carbonic anhydrases (EC 4.2.1.1) (CA) are zinc metalloenzymes which catalyze the reversible hydration of carbon dioxide, a reaction underlying many diverse physiological processes in animals, plants, archaebacteria, and eubacteria. Currently there are five evolutionarily distinct CA families (alpha, beta, gamma, delta and epsilon) that have no significant sequence identity and were invented independently. The alpha-CAs are found predominantly in animals but also in bacteria and green algae.
