identifier: PROSITE:PS51175
label: CBM6 (carbohydrate binding type-6) domain profile
definition: >-
  CBM6 (carbohydrate binding type-6) domain profile. Carbohydrate-binding modules (CBM) have been classified into more than 40 families according to sequence homology. Several cellulolytic enzymes share a conserved region of about 120 amino acid residues, the CBM6 domain. The CBM6 domain is distinct from others CBMs in that this protein module contains multiple distinct ligand binding sites. CBM6 domains bind to amorphous cellulose, xylan, mixed beta-(1,3)(1,4)glucan and beta-1,3-glucan.
