identifier: PROSITE:PS50020
label: WW/rsp5/WWP domain profile
definition: >-
  WW/rsp5/WWP domain signature and profile. The WW domain [1-4] (also known as rsp5 or WWP) has been originally discovered as a short conserved region in a number of unrelated proteins, among them dystrophin, the gene responsible for Duchenne muscular dystrophy. The domain, which spans about 35 residues, is repeated up to 4 times in some proteins. It has been shown to bind proteins with particular proline- motifs, [AP]-P-P-[AP]-Y, and thus resembles somewhat SH3 domains. It appears to contain beta-strands grouped around four conserved aromatic positions; generally Trp. The name WW or WWP derives from the presence of these Trp as well as that of a conserved Pro.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
