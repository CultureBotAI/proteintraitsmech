identifier: PROSITE:PS51234
label: Thrombospondin type-3 (TSP3) repeat profile
definition: >-
  Thrombospondin type-3 (TSP3) repeat profile. Thrombospondins are multimeric multidomain glycoproteins that function at cell surfaces and in the extracellular matrix milieu. They act as regulators of cell interactions in vertebrates. They are divided into two subfamilies, A and B, according to their overall molecular organization. The subgroup A proteins TSP-1 and -2 contain an N-terminal domain, a VWFC domain (see <PDOC00928>), three TSP1 repeats (see <PDOC50092>), three EGF-like domains (see <PDOC00021>), TSP3 repeats and a C-terminal domain (see <PDOC51236>). They are assembled as trimer.
