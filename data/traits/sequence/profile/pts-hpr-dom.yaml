identifier: PROSITE:PS51350
label: PTS HPR domain profile
definition: >-
  PTS HPr domain profile and phosphorylation sites signatures. The histidine-containing phosphocarrier protein (HPr) is a central component of the phosphoenolpyruvate-dependent sugar phosphotransferase system (PTS), which transfers metabolic carbohydrates across the cell membrane in many bacterial species. The PTS catalyzes the phosphorylation of incoming sugar substrates concomitant with their translocation across the cell membrane. The general mechanism of the PTS is as follows: a phosphoryl group from phosphoenolpyruvate (PEP) is transferred to Enzyme I (EI) of the PTS which in turn transfers it to a phosphoryl carrier protein (HPr).
