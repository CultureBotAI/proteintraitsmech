identifier: PROSITE:PS51334
label: PRONE domain profile
definition: >-
  PRONE domain profile. In plants, the small GTP-binding proteins called Rops work as signalling switches that control growth, development and plant responses to various environmental stimuli. Rop proteins (Rho of plants, Rac-like and atRac in Arabidopsis thaliana) belong to the Rho family of Ras-related GTP-binding proteins that turn on signalling pathways by switching from a GDP-bound inactive to a GTP-bound active conformation. Activation depends on guanine nucleotide exchange factors (GEFs) that catalyze the otherwise slow GDP dissociation for subsequent GTP binding.
