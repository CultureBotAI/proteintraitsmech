identifier: PROSITE:PS51647
label: Kininogen-type cystatin domain profile
definition: >-
  Kininogen-type cystatin domain profile. The cystatin superfamily consists of a large group of cystatin domain- containing proteins, most of which are reversible and tight-binding inhibitors of the papain (C1) and legumain (C13) families of cysteine proteases. Kininogens are multifunctional and multidomain glycoproteins related to cystatins. Kininogens ubiquitously exist in vertebrates, including mammals, birds, amphibians, and fishes. They vary extremely in both structure and function among different taxa of animals, in particular between mammals and amphibians.
