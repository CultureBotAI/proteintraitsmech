identifier: PROSITE:PS50965
label: NERD domain profile
definition: >-
  NERD domain profile. The nuclease-related domain (NERD) is an about 117-amino acid module found in a broad range of bacterial, as well as single archaeal and plant proteins. The majority of NERD-containing proteins are single-domain, in several cases with additional (predicted) transmembrane helices. In only a few instances, proteins containing NERD domains have additional domains (mostly involved in DNA processing), such as the HRDC, the UvrD/REP helicase, the DNA-binding C4 zinc finger or the serine/threonine and tyrosine protein kinase (see <PDOC00100>). In all cases in which a NERD domain is present in multidomain proteins, it is found at the N terminus.
