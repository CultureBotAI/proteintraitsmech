identifier: PROSITE:PS50113
label: PAC domain profile
definition: >-
  PAS repeat and PAC domain profiles. The PAS region is an approximately 300 amino-acid conserved region who was first isolated in the Drosophila protein period clock (PER), the Ah receptor nuclear translocator (ARNT) and the Drosophila single-minded (SIM). It is composed of two or more imperfect repeats. Within the bHLH/PAS proteins the PAS region is involved in protein dimerization with another protein of the same family. It has also been associated with light reception, light regulation and circadian rhythm regulators (clock). In bacteria, the PAS repeat is usually associated with the input domain of a histidine kinase, or a sensor protein that regulates a histidine kinase.
