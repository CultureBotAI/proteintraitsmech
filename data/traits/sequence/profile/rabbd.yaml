identifier: PROSITE:PS50916
label: Rab-binding domain profile
definition: >-
  Rab-binding domain profile. Rab are small GTPases implicated in vesicle trafficking. Like the other small GTPases, Rab proteins act as molecular switches, with an active GTP-bound form that interacts with its target or effector protein and an inactive GDP-bound form. A subgroup of Rab effectors contain in their N-terminal part a conserved region of around 70 amino acid residues, the Rab-binding domain (RabBD) . In some Rab effector domains an atypical FYVE-type zinc finger is inserted in the central part.
