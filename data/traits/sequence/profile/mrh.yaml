identifier: PROSITE:PS51914
label: MRH domain profile
definition: >-
  MRH domain profile. The mannose 6-phosphate (Man-6-P) receptor homology (MRH) domain-containing family of proteins, which include recycling receptors (mannose 6-phosphate receptors, MRPs), resident endoplasmic reticulum (ER) proteins (glucosidase II beta-subunit, XTP3-B, OS-9), and a Golgi glycosyltransferase (GlcNAc- phosphotransferase gamma-subunit), are characterized by the presence of one or more MRH domains. Many MRH domains act as lectins and bind specific phosphorylated (MPRs) or non phosphorylated (glycosidase II beta-subunit (GIIbeta, XTP3-B and OS-9) high mannose-type N-glycans. The MPRs are the only proteins known to bind Man-6-P residues via their MRH domains.
