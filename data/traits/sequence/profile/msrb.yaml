identifier: PROSITE:PS51790
label: Methionine-R-sulfoxide reductase (MsrB) domain profile
definition: >-
  Methionine-R-sulfoxide reductase (MsrB) domain profile. Methionine (Met) residues in either free or protein-based forms are a major target of reactive oxygen species (ROS)-induced oxidation and are converted to S and R epimers of methionine sulfoxide (MetSO). The oxidative modification of Met leads to changes in structure and function of many proteins. Living organisms evolved methionine sulfoxide reductase (MSR), which reverses MetSO back to Met to counteract Met oxidation by ROS. The two major types of MSR are MsrA and MsrB, which are specific for methionine S-sulfoxide (Met-S-SO) and methionine R-sulfoxide (Met-R-SO), respectively.
