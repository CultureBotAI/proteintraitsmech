identifier: PROSITE:PS51284
label: DOC domain profile
definition: >-
  DOC domain profile. The anaphase-promoting complex (APC) is a multi-subunit E3 protein ubiquitin ligase that is reponsible for the metaphase to anaphase transition and the exit from mitosis. The subunit APC10 is a one-domain protein homologous to a sequence element, termed the DOC domain, found in several hypothetical proteins that may also mediate ubiquitination reactions, because they contain combinations of either RING finger (see <PDOC00449>), cullin (see <PDOC00967>) or HECT (see <PDOC50237>) domains [1-3].
