identifier: PROSITE:PS51969
label: CBM39 (carbohydrate binding type-39) domain profile
definition: >-
  CBM39 (carbohydrate binding type-39) domain profile. The enzymic degradation of insoluble polysaccharides is one of the most important reactions on earth. Despite this, glycoside hydrolases attack such polysaccharides relatively inefficiently as their target glycosidic bonds are often inaccessible to the active site of the appropriate enzymes. In order to overcome these problems, many of the glycoside hydrolases that utilize insoluble substrates are modular, comprising catalytic modules appended to one or more non-catalytic CBMs (carbohydrate-binding modules). CBMs promote the association of the enzyme with the substrate.
