identifier: PROSITE:PS50864
label: SAND domain profile
definition: >-
  SAND domain profile. The SAND domain (named after Sp100, AIRE-1, NucP41/75, DEAF-1) is a conserved ~80-residue region found in a number of nuclear proteins, many of which function in chromatin-dependent transcriptional control. These include proteins linked to various human diseases, such as the Sp100 (Speckled protein 100 kDa), NUDR (Nuclear DEAF-1 related), GMEB (Glucocorticoid Modulatory Element Binding) proteins and AIRE-1 (Autoimmune regulator 1) proteins.
