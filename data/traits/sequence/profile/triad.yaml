identifier: PROSITE:PS51873
label: TRIAD supradomain profile
definition: >-
  TRIAD supradomain profile. In eukaryotes, protein ubiquitination is a key biochemical mechanism and plays a fundamental role in multiple cellular processes, such as protein homeostasis, signal transduction, development, differentiations and programmed cell death (PCD). Ubiquitination involves the sequential transfer of an ubiquitin (Ub) (see <PDOC00271>) molecule through an enzyme cascade consisting of an Ub-activating enzyme (E1) (see <PDOC00463>), an Ub-conjugating enzyme (E2) (see <PDOC00163>) and an ubiquitin ligase (E3), until an isopeptide bond is formed between the C-terminus of ubiquitin and the epsilon-amino group of a lysine residue on a substrate protein.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
