identifier: PROSITE:PS51533
label: ADD domain profile
definition: >-
  ADD domain profile. One of the largest protein families in the human genome is the zinc finger family that contains members involved in the regulation of transcription processes. The zinc finger domains have been classified based on the order of cysteine (C) and histidine (H) residues. Zinc fingers are thought to mediate protein-DNA and protein-protein interactions. The ADD (ATRX, DNMT3, DNMT3L) domain is a cysteine-rich region that consists of a C2C2-type zinc finger and a closely located domain of an imperfect PHD-type zinc finger with C4C4 (see <PDOC50016>). The region between the two subdomains has a constant length, and it contains identical and conserved amino acids.
