identifier: PROSITE:PS51253
label: CENPB-type HTH domain profile
definition: >-
  CENPB-type HTH domain profile. The CENPB-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 70-75 amino acids, present in eukaryotic centromere proteins and transposases. The domain is named after the mammalian major centromere autoantigen B or centromere protein B (CENP-B), which is a fundamental centromere component of chromosomes. The N-terminus of CENP-B contains two DNA-binding HTH domains, which bind to adjacent major grooves of DNA. The N-terminus of CENP-B is formed by a psq-type HTH domain (see <PDOC50960>) and C-terminal to this domain lies the CENPB-type HTH domain.
