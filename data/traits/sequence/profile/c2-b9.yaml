identifier: PROSITE:PS51381
label: C2 B9-type domain profile
definition: >-
  C2 B9-type domain profile. The C2 domain, usually containing ~130 residues, is one of the most prevalent eukaryotic lipid-binding domains deployed in diverse functional contexts. Distinct versions of the C2 domain have been recognized, the classical C2 (see <PDOC00380>), the PI3K-type (see <PDOC51547>), the tensin-type (see <PDOC51181>), the B9-type, the DOCK-type (see <PDOC51650>), the NT-type (see <PDOC51840>) and the Aida-type (see <PDOC51911>). Despite their limited sequence similarity, all C2 domains contain at their core a compact beta- sandwich composed of two four-stranded beta sheets with highly variable inter- strand regions that might contain one or more alpha-helices.
