identifier: PROSITE:PS51091
label: Fibronectin type-I domain profile
definition: >-
  Fibronectin type-I domain signature and profile. Fibronectin is a plasma protein that binds cell surfaces and various compounds including collagen, fibrin, heparin, DNA, and actin. The major part of the sequence of fibronectin consists of the repetition of three types of domains, which are called type I, II, and III. Type I domain (FN1) is approximately 40 residues in length. Four conserved cysteines are involved in disulfide bonds. Fibronectin contains 12 repeats of this domain.
