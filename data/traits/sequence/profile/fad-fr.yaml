identifier: PROSITE:PS51384
label: Ferredoxin reductase-type FAD binding domain profile
definition: >-
  Ferredoxin reductase-type FAD-binding domain profile. Flavoenzymes have the ability to catalyse a wide range of biochemical reactions. They are involved in the dehydrogenation of a variety of metabolites, in electron transfer from and to redox centres, in light emission, in the activation of oxygen for oxidation and hydroxylation reactions. About 1% of all eukaryotic and prokaryotic proteins are predicted to encode a flavin adenine dinucleotide (FAD)-binding domain.
