identifier: PROSITE:PS51405
label: Heme haloperoxidase family profile
definition: >-
  Heme haloperoxidase family profile. Heme haloperoxidase or chloroperoxidase (CPO) is an ~250 residue heme- containing glycoprotein that is secreted by various fungi. CPO was first identified in Caldariomyces fumago where it catalyzes the hydrogen peroxide-dependent chlorination of cyclopentanedione during the biosynthesis of the antibiotic caldarioymcin. Additionally, heme haloperoxidase catalyzes the iodination and bromination of a wide range of substrates. Besides performing H2O2-dependent halogenation reactions, the enzyme catalyzes dehydrogenation reactions. CPO also functions as a catalase, facilitating the decomposition of hydrogen peroxide to oxygen and water.
