identifier: PROSITE:PS52057
label: GTP-binding protein-like domain (GLD) profile
definition: >-
  GTP-binding protein-like domain (GLD) profile. The ADP-ribosylation factor (Arf) family of small GTPases, which belong to the larger Ras superfamily (see <PDOC51417>), are involved in many cellular events such as membrane trafficking, actin cytoskeleton dynamics and neurite outgrowth, as well as cell adhesion and cell migration. The function of Arfs depends on the cycle of GTP binding and hydrolysis, which are driven by guanine nucleotide-exchange factors (Arf GEFs) and Arf GTPase-activating proteins (Arf GAPs) (see<PDOC50115>), respectively.
