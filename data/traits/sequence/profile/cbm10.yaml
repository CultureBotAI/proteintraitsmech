identifier: PROSITE:PS51763
label: CBM10 (carbohydrate-binding type-10) domain profile
definition: >-
  CBM10 (carbohydrate binding type-10) domain profile. Plant cell wall hydrolases generally have a modular structure consisting of a catalytic domain linked to one or more noncatalytic carbohydrate-binding modules (CBMs). The majority of these CBMs interact with cellulose and are thus referred to as cellulose-binding domains or CBDs. CBM10s are small molecules, comprising only ca. 45 residues, that bind to insoluble forms of cellulose. CBM10s contain three tryptophan and two tyrosine residues which are completely conserved. The CBM10 domain is found in xylanases, mannanases and cellulases from aerobic bacteria and anaerobic fungi.
