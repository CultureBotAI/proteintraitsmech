identifier: PROSITE:PS50075
label: Carrier protein (CP) domain profile
definition: >-
  Carrier protein (CP) domain profile and phosphopantetheine attachment site signature. Carrier protein (CP) domains are crucial components involved in the transfer of thiol ester-bound intermediates during the biosynthesis of primary and secondary metabolites such as fatty acids, polyketides, and nonribosomal peptides. CP domains, also referred to as thiolation domains, are responsible for transporting the substrate and chain intermediates to the catalytic centers of the polyketide synthase (PKS), nonribosomal peptide synthetase (NRPS), and fatty acid synthase (FAS) assembly lines.
