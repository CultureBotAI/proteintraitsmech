identifier: PROSITE:PS50022
label: Coagulation factors 5/8 type C domain (FA58C) profile
definition: >-
  Coagulation factors 5/8 type C domain (FA58C) signatures and profile. Blood coagulation factors V and VIII contain a C-terminal, twice repeated, domain of about 150 amino acids, which is called F5/8 type C, FA58C, or C1/C2- like domain. A distant sequence similarity has been noted between the C1 /C2 domains of Factors V and VIII and the discoidin proteins, which comprise a family of phospholipid-binding lectins and other proteins involved in adhesive interactions.
