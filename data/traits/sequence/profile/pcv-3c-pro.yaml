identifier: PROSITE:PS51874
label: Picornavirales 3C/3C-like protease domain profile
definition: >-
  Picornavirales 3C/3C-like protease domain profile. Viruses in the order Picornavirales infect different vertebrate, invertebrate, and plant hosts and are responsible for a variety of human, animal, and plant diseases. Viruses in this order have a single-stranded, positive sense RNA (+ssRNA) genome that generally translates a large precusrsor polyprotein. After translation, the viral precursor polyprotein is proteolytically cleaved to generate mature functional viral proteins.
