identifier: PROSITE:PS51071
label: RpiR-type HTH domain profile
definition: >-
  RpiR-type HTH domain profile. The rpiR-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 75-80 amino acids present in prokaryotic regulators of transcription. The domain is named after Escherichia coli rpiR, also known as alsR, a repressor of the rpiB gene and the als operon, which encode proteins involved in sugar metabolism. The DNA-binding rpiR-type HTH domain occurs usually in the N-terminal part; the C-terminal part can contain a phosphosugar-binding SIS domain. Most rpiR-type HTH regulators are involved in sugar metabolism as transcription repressors, but some are activators.
