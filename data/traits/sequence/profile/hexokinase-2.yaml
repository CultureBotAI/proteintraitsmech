label: Hexokinase domain profile
definition: >-
  Hexokinase domain signature and profile. Hexokinase (EC 2.7.1.1) is an important glycolytic enzyme that catalyzes the phosphorylation of keto- and aldohexoses (e.g. glucose, mannose and fructose) using MgATP as the phosphoryl donor.
