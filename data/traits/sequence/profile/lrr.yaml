identifier: PROSITE:PS51450
label: Leucine-rich repeat profile
definition: >-
  Leucine rich repeat profile. The leucine-rich repeat (LRR) domain is formed from tandem arrays (2 to 52 repeats) containing a leucine-rich consensus sequence. LRR proteins have been identified in viruses, bacteria, archae and eukaryotes. LRR domains mediate macromolecular interactions in processes as diverse as bacterial invasion of host cells, the plant immune response, and inhibition of RNA binding. All LRR repeats can be divided into a highly conserved segment and a variable segment. The highly conserved segment consists either of an 11-residue stretch, LxxLxLxxNxL, or a 12-residue stretch, LxxLxLxxCxxL. Variable sequences connecting the consensus provide functional diversity for binding.
