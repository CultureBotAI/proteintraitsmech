identifier: PROSITE:PS50850
label: Major facilitator superfamily (MFS) profile
definition: >-
  Major facilitator superfamily (MFS) profile. Transporters can be grouped in two classes, primary and secondary carriers. The primary active transporters drive solute accumulation or extrusion by using ATP hydrolysis, photon absorption, electron flow, substrate decarboxylation or methyl transfer. If charged molecules are unidirectionally pumped as a consequence of the consumption of a primary cellular energy source, electron chemical potential results. This potential can than be used to drive the active transport of additional solutes via secondary carriers.
