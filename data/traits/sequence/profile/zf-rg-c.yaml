identifier: PROSITE:PS52037
label: Zinc finger reverse gyrase C-terminal-type profile
definition: >-
  Zinc finger reverse gyrase (RG) N-terminal- and C-terminal-type profiles. Regulation of DNA topology is central to a multitude of cellular events, including gene expression, DNA replication, recombination and repair. DNA topoisomerases inter-convert topoisomers by introducing or removing positive or negative supercoils. Reverse gyrase (RG) is an ATP-dependent topoisomerase that is only found in archaeal and bacterial hyperthermophiles (above 80 degrees C) and thermophiles (65-80 degrees C). It can protect DNA from damage at high temperatures as a heat-protective DNA chaperone or DNA renaturase and it is also involved in protecting DNA against physical or chemical damage.
