identifier: PROSITE:PS50138
label: BRCA2 repeat profile
definition: >-
  BRCA2 repeat profile. The BRCA2 repeat is a small domain (34 residues) currently found only in the breast cancer susceptibility gene protein 2 (BRCA2). These repeats were shown to be required for direct interaction with DNA repair protein RAD51. BRCA2 was also shown to functionally interact with p53 and RAD51 two key components of the cell cycle control and DNA repair pathways. As BRCA1 and BRCA2 display a stable interaction both together and with RAD51, they may participate in a pathway associated with the activation of double-strand break repair and/or homologous recombination.
