identifier: PROSITE:PS51849
label: RsgI N-terminal anti-sigma domain profile
definition: >-
  RsgI N-terminal anti-sigma domain profile. Bacterial response to transient stresses is mediated largely through transcription of relevant genes directed by sigma factors. Some of the stress- responding sigma genes are associated with anti-sigma factor genes, whose products inhibit the activity of sigma factors through direct binding, which is disrupted upon stress through phosphorylation by anti-anti-sigma factors or digestion by endogenous proteases. The Bacillus subtilis bicistronic operon sigI-rsgI encodes for an alternative sigma(I) factor and its cognate anti- sigma(I) regulator RsgI that is functionally regulated by an extracytoplasmic signal.
