identifier: PROSITE:PS52011
label: Peptidase family M2 domain profile
definition: >-
  Peptidase family M2 domain profile. Members of the M2 family of peptidases, related to mammalian angiotensin converting enzyme (EC 3.4.15.1, ACE, peptidyl-dipeptidase A), play important roles in regulating a number of physiological processes. ACE is a membrane- bound, zinc dependent dipeptidase that catalyzes the conversion of the decapeptide angiotensin I to the potent vasopressor octapeptide angiotensin II by removing the two C-terminal amino acids. Bradykinin, a vasodilator, and the hemoregulatory peptide N-acetyl-Ser-Asp-Lys-Pro (AcSDKP) are also substrates for mammalian ACE.
