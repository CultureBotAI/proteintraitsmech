identifier: PROSITE:PS52058
label: Zinc finger UVSSA-type profile
definition: >-
  Zinc finger UVSSA-type profile. Transcription is an essential cellular process in which RNA polymerase II (RNAPII) synthesizes complementary copies of protein-coding and non-coding genes. Lesions on the template DNA strand cause stalling of elongating RNAPII and trigger a genome-wide transcriptional arrest. Transcription-coupled repair (TCR) is a dedicated pathway for the preferential repair of bulky transcription-blocking DNA lesions. These lesions stall the elongating RNAPII triggering the recruitment of TCR proteins at the damaged site.
