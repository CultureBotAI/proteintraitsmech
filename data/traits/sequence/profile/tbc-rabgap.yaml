identifier: PROSITE:PS50086
label: TBC/rab GAP domain profile
definition: >-
  TBC/rab GAP domain profile. The ~200 amino acid TBC/rab GTPase-activating protein (GAP) domain is well conserved across species and has been found in a wide range of different proteins from plant adhesion molecules to mammalian oncogenes. The name TBC derives from the name of the murine protein Tbc1 in which this domain was first identified based on its similarity to sequences in the tre-2 oncogene, and the yeast regulators of mitosis, BUB2 and cdc16. The connection of this domain with rab GTPase activation stems from subsequent in-depth sequence analyses and alignments and recent work demonstrating that it appears to contain the catalytic activities of the yeast rab GAPs, GYP1, and GYP7.
