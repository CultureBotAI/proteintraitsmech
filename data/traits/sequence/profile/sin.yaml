identifier: PROSITE:PS51500
label: Sin domain profile
definition: >-
  Sin domain profile. Spore formation is an extreme response of some bacteria to adversity. In Bacillus subtilis the proteins of the sin, sporulation inhibition, region form a component of an elaborate molecular circuitry that regulates the commitment to sporulation. SinR (formerly known as Sin) is a tetrameric repressor protein that binds to the promoters of genes essential for entry into sporulation and prevents their transcription. This repression is overcome through the activity of SinI, which disrupts the SinRtetramer through the formation of a SinI-SinR heterodimer. In this complex, SinR is unable to bind to DNA and its repressive effects on transcription are relieved.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
