identifier: PROSITE:PS51391
label: CID domain profile
definition: >-
  CID domain profile. The C-terminal domain (CTD) of the large subunit of RNA polymerase II is a platform for mRNA processing factors and links gene transcription to mRNA capping, splicing and polyadenylation. CTD recognition is dependent on the phosphorylation state of the CTD itself, which varies during the course of transcription but has also been linked to the isomerization state of the CTD's proline residues. Several RNA-processing factors recognize the CTD by means of a conserved CTD-interacting domain (CID). Factors with CID domains include the serine/arginine-rich-like factors SCAF4 and SCAF8, Nrd1 (which is implicated in polyadenylation-independent RNA 3'-end formation) and Pcf11.
