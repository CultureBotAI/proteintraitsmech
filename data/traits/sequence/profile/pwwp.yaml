identifier: PROSITE:PS50812
label: PWWP domain profile
definition: >-
  PWWP domain profile. The PWWP domain is an around 70 amino acids domain that was named after its central core 'Pro-Trp-Trp-Pro'. The PWWP domain is found in one or, less frequently, in two copies in nuclear, often DNA-binding proteins that function as transcription factors regulating developmental processes. Due to its position, the composition of amino acids close to the PWWP motif and the pattern of other domains present, it has been proposed that the PWWP domain is involved in protein-protein interactions.
