identifier: PROSITE:PS51022
label: L27 domain profile
definition: >-
  L27 domain profile. The L27 domain is a ~50-amino acid module, initially identified in the Lin-2 and Lin-7 proteins, that exists in a large family of animal scaffold proteins. The L27 domain is a specific protein-protein interaction module capable of forming heteromeric complexes that can integrate multiple scaffold proteins into supramolecular assemblies required for establishment and maintenance of cell polarity. The L27 domain can be found as a single occurrence or as a duplication in association with other domains such as PDZ (see <PDOC50106>), SH3 (see <PDOC50002>), the guanylate kinase domain (see <PDOC00670>) or the serine/threonine protein kinase domain (see <PDOC00100>).
