identifier: PROSITE:PS50807
label: GCM domain profile
definition: >-
  GCM domain profile. The GCM domain is an around 150 amino acid residue region that has been identified in the N-terminal part of glial cell missing (GCM) transcription factors, which form a small family of metazoan transcriptional regulators involved in fundamental developmental processes. The GCM motif has been shown to be a DNA-binding domain that recognizes preferentially the nonpalindromic octamer 5'-ATGCGGGT-3'.
