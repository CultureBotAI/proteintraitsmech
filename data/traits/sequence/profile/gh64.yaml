identifier: PROSITE:PS52006
label: Glycosyl hydrolases family 64 (GH64) domain profile
definition: >-
  Glycosyl hydrolases family 64 (GH64) domain profile. The glycoside hydrolases (GHs, EC 3.2.1.-) are a diverse set of enzymes with a vast range of substrate specificity. GHs hydrolyze the glycosidic bond between two or more carbohydrates or between a carbohydrate and non-carbohydrate moiety. These enzymes play diverse roles in nature; they breakdown cellulose into smaller carbohydrates (i.e. during biomass degradation by cellulases), they function during pathogenesis such as the activity of influenza virus neuraminidase, and they are engaged in normal cellular metabolic processes that involve the formation and breakage of glycosidic bonds along with glycosyl transferase.
