identifier: PROSITE:PS51762
label: Glycosyl hydrolases family 16 (GH16) domain profile
definition: >-
  Glycosyl hydrolases family 16 (GH16) signature and domain profile. The glycosyl hydrolases family 16 (GH16) contains functionally heterogeneous members, including beta-agarases, endo-1,3-beta-glucanases (laminarinases), endo-beta-1,3-1,4-glucanases (lichenases), kappa- carrageenases, endo-beta-galactosidases and xyloglucan endotransferases. These enzymes share a common ancestor and have diverged significantly in their primary sequence.
