identifier: PROSITE:PS52049
label: UCH37-like (ULD) domain profile
definition: >-
  UCH37-like (ULD) domain profile. Ubiquitin (see <PDOC00271>) is a small (8.6 kDa) highly conserved protein that is best known for its role in targeting proteins for degradation by the 26S proteasome. Ubiquitin has been implicated in numerous cellular processes, including cell cycle control, oncoprotein degradation, receptor function, apoptosis, regulation of transcription, stress responses, maintenance of chromatin structure, DNA repair, signaling pathways, antigen presentation and the degradation of abnormal proteins. Ubiquitination works as a reversible post-translational modification, like phosphorylation.
