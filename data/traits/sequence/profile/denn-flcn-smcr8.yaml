identifier: PROSITE:PS51834
label: Tripartite DENN FLCN/SMCR8-type domain profile
definition: >-
  Tripartite DENN domain profiles. The tripartite DENN (after differentially expressed in neoplastic versus normal cells) domain is found in several proteins that share common structural features and have been shown to be guanine nucleotide exchange factors (GEFs) for Rab GTPases, which are regulators of practically all membrane trafficking events in eukaryotes. The tripartite DENN domain is composed of three distinct modules which are always associated due to functional and/or structural constraints: upstream DENN or uDENN, the better conserved central or core or cDENN, and downstream or dDENN regions.
