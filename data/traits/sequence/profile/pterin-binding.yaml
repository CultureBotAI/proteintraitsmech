identifier: PROSITE:PS50972
label: Pterin-binding domain profile
definition: >-
  Pterin-binding domain profile. The ~250-residue pterin-binding domain has been shown to adopt a (beta/alpha)8 barrel fold (see <PDB:1F6Y>), which has the overall shape of a distorted cylinder. It has eight alpha-helices stacked around the outside of an inner cylinder of parallel beta-strands. The pterin ring binds at the bottom of the (beta/alpha)8 barrel in a polar cup-like region that is relatively solvent exposed and fairly negatively charged. The pterin ring is partially buried within the (beta/alpha)8 barrel.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
