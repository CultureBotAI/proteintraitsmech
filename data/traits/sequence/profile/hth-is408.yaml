identifier: PROSITE:PS50532
label: IS408 transposase-type HTH domain profile
definition: >-
  IS21/IS408 transposase-types HTH domains profiles. Autonomous mobile genetic elements such as transposons or insertion sequences (IS) encode an enzyme, called transposase, required for excising and inserting the mobile element. The IS21 is among the largest of bacterial IS elements and encodes a transposase designated as istA (ORF1) as well as a second protein istB (ORF2) and represents the IS21/IS408/IS1162 family. The transposases of IS21-like IS contain a helix-turn-helix (HTH) motif in the N-terminal part that probably binds to DNA. An integrase catalytic domain (see <PDOC50994>) forms the central part of these IS21/IS408/IS1162 family transposases.
