identifier: PROSITE:PS52016
label: TonB-dependent receptor (TBDR) proteins profile
definition: >-
  ". In addition to a cytoplasmic membrane (CM), which is common to all organisms, Gram-negative bacteria possess an outer membrane (OM) that acts as a selective permeation barrier. TonB-dependent receptors (TBDRs) are transport proteins found at the OM to allow Gram-negative bacteria to uptake scarce resources from competitive environments with very high affinity. Early reports on TBDRs focused on the uptake of siderophore-iron complexes but recent studies have showed that the spectrum of ligands includes sugars, vitamins, heme, and other non-ferrous cations.
