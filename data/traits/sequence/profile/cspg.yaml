identifier: PROSITE:PS51854
label: CSPG repeat profile
definition: >-
  CSPG repeat profile. The CSPG (chondroitin sulfate proteoglycan) repeat is a cadherin-like and tumor-relevant protein module which is thought to mediate interactions between cells and the extracellular matrix (ECM) in species as divergent as cyanobacteria, fly, worm, sea urchin and human. The phyletic distribution of the CSPG repeats suggests that horizontal gene transfer contributed in their evolutionary history. The CSPG domain occurs in 1-15 tandem copies per protein. In some proteins the CSPG repeat is combined with Laminin G domains (see <PDOC50025>) and EGF-like domains.
