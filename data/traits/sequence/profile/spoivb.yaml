identifier: PROSITE:PS51494
label: SpoIVB peptidase domain profile
definition: >-
  SpoIVB peptidase domain profile. The protein SpoIVB is a serine peptidase that plays a central role in a regulatory checkpoint (the sigma-K checkpoint) which coordinates gene expression during the later stages of spore formation in Bacillus subtilis. SpoIVB signal by transiting a membrane, undergoing self cleavage, and then by an unknown mechanism activating a zinc metalloprotease, SpoIVFB, which cleaves pro-sigma-K to its active form, sigma-K, in the outer mother cell chamber of the developing cell. Homologues of SpoIVB proteins have been identified in a number of spore-forming organisms.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
