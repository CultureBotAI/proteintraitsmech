identifier: PROSITE:PS51935
label: NlpC/P60 domain profile
definition: >-
  NlpC/P60 domain profile. NlpC/P60 superfamily papain-like enzymes play important roles in all kingdoms of life. Characterized members of this superfamily have diverse enzymatic functions, such as peptidases, amidases, transglutaminases and acetyltransferases. This divergent superfamily consists of four main families: P60-like, AcmB/LytN-like, YaeF/YiiX-like, and LRAT-like. The P60-like family typified by P60 and its obvious relatives includes the most commonly occuring versions of the superfmily, which are seen in most bacterial lineages.
