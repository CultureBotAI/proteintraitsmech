identifier: PROSITE:PS51562
label: mRNA (guanine-N(7)-)-methyltransferase (EC 2.1.1.56) domain profile
definition: >-
  mRNA cap 0 methyltransferase domain profile. Most mRNAs undergo a chemical modification called capping resulting in a cap at the 5' end of the newly transcribed mRNA. The 5' cap 0 structure consists of a guanine nucleotide methylated at position 7 connected to the mRNA's initiating nucleoside via an inverted 5'-5' triphosphate linkage. After formation of the 5' cap 0, the mRNA's first base usually goes through a methylation on the 2'-O position of its ribose resulting in the 5' cap 1 structure. Further methylations can occur on the first and second nucleotides leading to the 5' cap 2 structure.
