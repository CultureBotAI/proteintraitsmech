identifier: PROSITE:PS01225
label: C-terminal cystine knot domain profile
definition: >-
  C-terminal cystine knot domain signature and profile. The structures of transforming growth factor-beta (TGF-beta), nerve growth factor (NGF), platelet-derived growth factor (PDGF) and gonadotropin have been shown to be similar [1,2 and references therein]: these proteins are folded into two highly twisted antiparallel pairs of beta-strands and contain three disulfide bonds, of which two form a cystine ring through which the third bond passes (see the schematic representation below). This structure is called cystine knot.
