identifier: PROSITE:PS51373
label: High potential iron-sulfur proteins family profile
definition: >-
  High potential iron-sulfur proteins family profile. High potential iron-sulfur proteins (HiPIP) are a specific class of high-redox potential 4Fe-4S ferredoxins that functions in anaerobic electron transport and which occurs commonly in purple photosynthetic bacteria and in other bacteria, such as Paracoccus denitrificans and Thiobacillus ferrooxidans. HiPIPs seem to react by oxidation of [4Fe-4S]2+ to [4Fe-4S]3+.
