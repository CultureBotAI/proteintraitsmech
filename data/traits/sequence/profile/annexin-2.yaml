identifier: PROSITE:PS51897
label: Annexin repeat profile
definition: >-
  Annexin repeat signature and profile. Annexins are a group of calcium-binding proteins that associate reversibly with membranes. They bind to phospholipid bilayers in the presence of micromolar free calcium concentration. The binding is specific for calcium and for acidic phospholipids. Annexins have been claimed to be involved in cytoskeletal interactions, phospholipase inhibition, intracellular signaling, anticoagulation, and membrane fusion. Annexins are widely distributed among eukaryotes but largely absent in prokaryotes and yeast.
