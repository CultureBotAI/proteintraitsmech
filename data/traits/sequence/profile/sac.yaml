identifier: PROSITE:PS50275
label: Sac phosphatase domain profile
definition: >-
  Sac phosphatase domain profile. The Sac domain is a region of homology between the N-terminus of synaptojanin and the otherwise unrelated yeast protein Sac1p. The Sac domain is approximately 400 residues in length, and proteins containing this domain show approximately 35% identity with other Sac domains throughout this region. The Sac domain exhibits phosphatidylinositol polyphosphate phosphatase activity and can hydrolyse phosphate from any of the three positions of inositol that may be phosphorylated (3-, 4- and 5). However, adjacent phosphates are resistant to hydrolysis.
