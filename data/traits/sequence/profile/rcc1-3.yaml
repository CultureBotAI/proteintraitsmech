identifier: PROSITE:PS50012
label: Regulator of chromosome condensation (RCC1) repeat profile
definition: >-
  Regulator of chromosome condensation (RCC1) signatures and profile. The regulator of chromosome condensation (RCC1) is a eukaryotic protein which binds to chromatin and interacts with ran, a nuclear GTP-binding protein (see <PDOC00859>), to promote the loss of bound GDP and the uptake of fresh GTP, thus acting as a guanine-nucleotide dissociation stimulator (GDS). The interaction of RCC1 with ran probably plays an important role in the regulation of gene expression.
