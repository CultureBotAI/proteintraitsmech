label: PTP type protein phosphatase domain profile
definition: >-
  Tyrosine specific protein phosphatases active site signature and domains profiles. Tyrosine specific protein phosphatases (EC 3.1.3.48) (PTPase) are enzymes that catalyze the removal of a phosphate group attached to a tyrosine residue. These enzymes are very important in the control of cell growth, proliferation, differentiation and transformation. Multiple forms of PTPase have been characterized and can be classified into two categories: soluble PTPases and transmembrane receptor proteins that contain PTPase domain(s). The currently known PTPases are listed below:
