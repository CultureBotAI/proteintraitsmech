identifier: PROSITE:PS51189
label: FAT domain profile
definition: >-
  FAT and FATC domains profiles. Phosphatidylinositol kinase (PIK)-related kinases participate in meiotic and V(D)J recombination, chromosome maintenance and repair, cell cycle progression, and cell cycle checkpoints, and their dysfunction can result in a range of diseases, including immunodeficiency, neurological disorder and cancer. The catalytic kinase domain is highly homologuous to that of phosphatidylinositol 3- and 4-kinases (see <PDOC00710>). Nevertheless, members of the PIK-related family appear functionally distinct, as none of them has been shown to phosphorylate lipids, such as phosphatidylinositol; instead, many have Ser/Thr protein kinase activity.
