identifier: PROSITE:PS51369
label: TCP domain profile
definition: >-
  TCP domain profile. The TCP domain has been named after its first characterized members (TB1, CYC and PCFs). So far, members of the TCP family have only been found in plants and function in processes related to cell proliferation. The TCP domain is probably involved in DNA-binding and protein-protein interactions.
