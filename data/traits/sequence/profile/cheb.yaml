identifier: PROSITE:PS50122
label: CheB-type methylesterase domain profile
definition: >-
  CheB-type methylesterase domain profile. The response regulator CheB functions within the bacterial chemotaxis system together with the methyltransferase CheR (see <PDOC50123>) to control the level of chemoreceptor methylation, influencing the signaling activities of the receptors. Like many members of the response regulator family, CheB has a multidomain architecture. It consists of an N-terminal phosphoaccepting regulatory domain with a conserved fold containing the site of phosphorylation, a single conserved aspartate residue (see <PDOC50110>), and a C-terminal effector domain joined by a linker region.
