identifier: PROSITE:PS51161
label: ATP-cone domain profile
definition: >-
  ATP-cone domain profile. The ATP-cone domain is an ATP-binding module of ~85-90 residues, which is found in association with other domains such as class I+II and class III ribonucleotide reductases (see <PDOC00084>), the P-loop kinase or a zinc ribbon. It can be found as a single copy or in two-three tandem copies.
