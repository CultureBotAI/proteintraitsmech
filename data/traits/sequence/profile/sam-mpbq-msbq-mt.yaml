identifier: PROSITE:PS51734
label: MPBQ/MBSQ family SAM-binding methyltransferase profile
definition: >-
  Class I SAM-dependent methyltransferases family profiles. Methyltransferases (MTs) (EC 2.1.1.-) constitute an important class of enzymes present in every life form. They transfer a methyl group most frequently from S-adenosyl L-methionine (SAM or AdoMet) to a nucleophilic acceptor such as nitrogen, oxygen, sulfur or carbon leading to S-adenosyl-L-homocysteine (AdoHcy) and a methylated molecule. The substrates that are methylated by these enzymes cover virtually every kind of biomolecules ranging from small molecules, to lipids, proteins and nucleic acids.
