identifier: PROSITE:PS51744
label: Helper-component proteinase (HC-Pro) cysteine protease (CPD) domain profile
definition: >-
  Helper-component proteinase (HC-Pro) cysteine protease (CPD) domain profile. Potyviruses form one of the most numerous groups of plant viruses and are a major cause of crop loss worldwide. The helper-component proteinase (HC-Pro) is an indispensable, multifunctional protein of members of the genus Potyvirus and other viruses of the family Potyviridae. It is directly involved in diverse steps of viral infection, such as aphid plant-to-plant transmission, polyprotein processing, and suppression of host antiviral RNA silencing. HC- Pro is generally divided into three functional domains: a N-terminal domain, a central region, and a cysteine protease domain (CPD) in the C-terminal region.
