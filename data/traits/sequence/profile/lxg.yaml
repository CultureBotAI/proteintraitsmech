identifier: PROSITE:PS51756
label: LXG domain profile
definition: >-
  LXG domain profile. The bacterial LXG domain contains a conserved [LF]-X-G sequence motif and is predicted to assume an alpha-helical bundle fold. The LXG is predicted to be a secretion signal for the type VII secretion system of Mycobacterium and Bacillus species. It is likely to utilize the ATP-dependent YueA pumps and the potential peptide-binding EsaC domain as partners for extrusion from the producing cell.
