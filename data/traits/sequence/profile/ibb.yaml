identifier: PROSITE:PS51214
label: IBB domain profile
definition: >-
  IBB domain profile. Cytosolic proteins bearing a classical nuclear localization signal (NLS) (see <PDOC00015>) enter the nucleus bound to a heterodimer of importin-alpha and importin-beta (also called karyopherin-alpha and -beta). Importin-alpha contains the NLS-binding site and importin-beta is responsible for the docking of the importin-substrate complex to the filaments of the nuclear pore complex (NPC) and its translocation through the pore.
