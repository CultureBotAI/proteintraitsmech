identifier: PROSITE:PS51921
label: Betacoronavirus spike (S) glycoprotein S1 subunit C-terminal (CTD) domain profile
definition: >-
  Betacoronavirus spike (S) glycoprotein S1 subunit C-terminal (CTD) domain profile. Coronaviruses (CoVs) primarily cause respiratory and enteric diseases in humans, animals, and birds, and some CoVs also cause systemic diseases, including hepatitis or neurological diseases. Phylogenetically, CoVs are divided into four genera, called the alpha-, beta-, gamma-, and delta-CoVs. Of these, betacoronaviruses (betaCoVs) have attracted attention worldwide because of their pathogenic capacity and potential to cause a global pandemic of human infections and the widespread existence of an enormous number of species in bats.
