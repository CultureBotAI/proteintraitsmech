identifier: PROSITE:PS51695
label: Sedolisin domain profile
definition: >-
  Sedolisin domain profile. Sedolisins (serine-carboxyl peptidases) are proteolytic enzymes whose fold ressembles that of subtilisin; however they are considerably larger, with the mature catalytic domains containing approximately 375 amino acids. The defining features of these enzymes are a unique catalytic triad, Ser-Glu-Asp (SED in single-letter notation), as well as the presence of an aspartic acid residue in the oxyanion hole. Sedolisins are acid-acting endopeptidases or tripeptidyl peptidases. They are widely distributed among archea, bacteria, fungi, slime mold, amoeba and animal kingdom including amphibians, fish and mammals.
