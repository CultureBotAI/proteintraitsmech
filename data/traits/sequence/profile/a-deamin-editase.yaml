identifier: PROSITE:PS50141
label: Adenosine to inosine editase domain profile
definition: >-
  Adenosine to inosine editase domain profile. Editase (EC 3.5.4.-) are enzymes that catalyze the site-selective deamination of adenosine residue into inosine within double stranded regions of mRNA. In mRNA inosine is read as guanosine by the translation apparatus, resulting in codon changes within the synthesized protein. The editase domain contains the active site and binds three zinc atoms.
