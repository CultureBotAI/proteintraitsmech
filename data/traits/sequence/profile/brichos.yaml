identifier: PROSITE:PS50869
label: BRICHOS domain profile
definition: >-
  BRICHOS domain profile. BRICHOS is a domain of ~100 amino acids, which is found in proteins associated with dementia, respiratory distress and cancer. In several of these proteins, the BRICHOS domain is located in the propeptide region that is removed after proteolytic processing. The common presence of the BRICHOS domain in Caenorhabditis elegans and Drosophila melanogaster suggests an ancient origin close to the appearance of animals.
