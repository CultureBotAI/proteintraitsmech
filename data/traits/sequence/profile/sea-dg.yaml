identifier: PROSITE:PS51699
label: DG-type SEA domain profile
definition: >-
  DG-type SEA domain profile. Dystroglycan (DG) is an integral membrane receptor linking the extracellular matrix (ECM) and cytoskeleton. Through widespread expression in a variety of cell types, including muscle, neural and epithelial cells, DG plays diverse and important roles in cell functions from basement membrane assembly to tissue morphogenesis and structural integrity. DG is encoded by a single gene and posttranslationally cleaved into two noncovalently associated subunits by autoproteolysis within a distinctive protein motif called an sea urchin- enterokinase-agrin (SEA) domain (see <PDOC50024>).
