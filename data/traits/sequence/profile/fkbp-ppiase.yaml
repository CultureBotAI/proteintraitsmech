identifier: PROSITE:PS50059
label: FKBP-type peptidyl-prolyl cis-trans isomerase domain profile
definition: >-
  FKBP-type peptidyl-prolyl cis-trans isomerase profile. FKBP is the major high-affinity binding protein, in vertebrates, for the immunosuppressive drug FK506. It exhibits peptidyl-prolyl cis-trans isomerase activity (EC 5.2.1.8) (PPIase or rotamase). PPIase is an enzyme that accelerates protein folding by catalyzing the cis-trans isomerization of proline imidic peptide bonds in oligopeptides.
