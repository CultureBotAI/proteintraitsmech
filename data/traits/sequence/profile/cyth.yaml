identifier: PROSITE:PS51707
label: CYTH domain profile
definition: >-
  CYTH domain profile. The CyaB like adenylyl cyclase and the mammalian thiamine triphosphatases (ThTPases) define a superfamily of catalytic domains called the CYTH (CyaB, thiamine triphosphatase) domain that is present in all three superkingdoms of life. CYTH domains are likely to be domains specialized to bind nucleotides and other organic phosphates.
