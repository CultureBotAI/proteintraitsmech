identifier: PROSITE:PS50179
label: VHS domain profile
definition: >-
  VHS domain profile. The VHS domain is an about 150 residues long domain, whose name is derived from its occurrence in VPS-27, Hrs and STAM. The VHS domain is found at the N- termini of proteins associated with endocytocis and/or vesicular trafficking, often in association with other domains like FYVE (see <PDOC50178>), SH3 (see <PDOC50002>) or TAM. The VHS domain of Hrs makes both intra- and intermolecular interactions with FYVE domains and it has been proposed that it might as well interact with other domains. The VHS domain might function as a multipurpose docking adapter that localizes proteins to the membrane through interactions with the membrane and/or the endocytic machinery.
