identifier: PROSITE:PS51665
label: Enkurin domain profile
definition: >-
  Enkurin domain profile. The transient receptor potential-canonical (TRPC) family of cation channel has been implicated in receptor- or phospholipase C (PLC)-mediated Ca(2+) entry into animal cells. Enkurin (derived from the Greek verb enkuros: to trip or to stumble upon) interacts with several TRPC proteins and colocalizes with these channels in sperm.
