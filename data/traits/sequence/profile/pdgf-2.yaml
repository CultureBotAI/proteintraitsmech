identifier: PROSITE:PS50278
label: Platelet-derived growth factor (PDGF) family profile
definition: >-
  Platelet-derived growth factor (PDGF) family signature and profile. Platelet-derived growth factor (PDGF) is a potent mitogen for cells of mesenchymal origin, including smooth muscle cells and glial cells. PDGF consists of two different but closely related chains (A and B chains) which assemble to form disulfide linked homo- or heterodimers (A-A, B-B, an A-B). Alternate splicing of the A chain transcript can give rise to two different forms that differ only in their C-terminal extremity. The transforming protein of simian sarcoma virus (SSV), encoded by the v-sis oncogene, is derived from the B chain of PDGF.
