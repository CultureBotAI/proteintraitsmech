identifier: PROSITE:PS51487
label: NBD domain profile
definition: >-
  NBD domain profile. The variable portions of immunoglobulin and T cell receptor genes are assembled in developing lymphocytes from variable (V), joining (J), and in some cases diversity (D) gene segments, which are widely separated in the genome. These segments are brought together in a highly regulated manner by a somatic site-specific recombination reaction known as V(D)J recombination. Each gene segment is flanked by a signal sequence consisting of a conserved heptamer (consensus sequence 5'-CACAGTG-3') and nonamer (consensus sequence 5'-ACAAAAACC-3') separated by a relatively nonconserved 12 or 23 base pair (bp) spacer (12 signal or 23 signal, respectively).
definition_source: Prosite Release 2026_02 of 10-Jun-2026
