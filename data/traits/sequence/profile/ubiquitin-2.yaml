identifier: PROSITE:PS50053
label: Ubiquitin domain profile
definition: >-
  Ubiquitin domain signature and profile. Ubiquitin is a protein of seventy six amino acid residues, found in all eukaryotic cells and whose sequence is extremely well conserved from protozoan to vertebrates. It plays a key role in a variety of cellular processes, such as ATP-dependent selective degradation of cellular proteins, maintenance of chromatin structure, regulation of gene expression, stress response and ribosome biogenesis.
