identifier: PROSITE:PS50271
label: Zinc finger UBP-type profile
definition: >-
  Zinc finger UBP-type profile. The UBP-type zinc finger was first isolated in some members of a subfamily of deubiquitinating enzyme, the ubiquitin-specific processing protease (UBP) (see <PDOC00750>). HDAC6 UBP-type zinc finger has been shown to interact with ubiquitin. Like with other ubiquitin binding domain (UBD) the interaction with ubiquitin is moderate or even weak. In addition, several UBD families have members that do not interact with ubiquitin at all, which emphasis that binding domains that are identified by similarity searches should be experimentally verified.
