identifier: PROSITE:PS50040
label: Elongation factor 1 (EF-1) gamma C-terminal domain profile
definition: >-
  Elongation factor 1 (EF-1) gamma C-terminal domain profile. Eukaryotic elongation factor 1 (EF-1) is responsible for the GTP-dependent binding of aminoacyl-tRNAs to the ribosomes. EF-1 is composed of four subunits: the alpha chain which binds GTP and aminoacyl-tRNAs, the gamma chain that probably plays a role in anchoring the complex to other cellular components and the beta and delta (or beta') chains.
