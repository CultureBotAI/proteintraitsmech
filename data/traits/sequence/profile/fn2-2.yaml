identifier: PROSITE:PS51092
label: Fibronectin type-II collagen-binding domain profile
definition: >-
  Fibronectin type-II collagen-binding domain signature and profile. Fibronectin is a plasma protein that binds cell surfaces and various compounds including collagen, fibrin, heparin, DNA, and actin. The major part of the sequence of fibronectin consists of the repetition of three types of domains, which are called type I, II, and III. Type II domain (FN2) is approximately 40 residues long, contains four conserved cysteines involved in disulfide bonds and is part of the collagen-binding region of fibronectin. In fibronectin the minimal collagen binding region is formed by one FN1 and two FN2 domains. This suggests that the collagen-binding sites spans multiple modules.
