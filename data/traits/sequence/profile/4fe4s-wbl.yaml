identifier: PROSITE:PS51674
label: 4Fe-4S WhiB-like (Wbl)-type iron-sulfur binding domain profile
definition: >-
  4Fe-4S WhiB-like (Wbl)-type iron-sulfur binding domain profile. Members of the WhiB-like (Wbl) family are found exclusively in actinobacteria and are implicated in the regulation of developmental processes. All WhiB- like proteins have four conserved cysteine residues where two of them are in a C-X-X-C motif. The four cysteine residues are proposed to act as the ligands for a [4Fe-4S] cluster. Wbl-mediated transcription regulation is dependent upon the presence or absence and state (nitrosylated or non-nitrosylated) of the [4Fe-4S] cluster.
