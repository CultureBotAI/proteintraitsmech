identifier: PROSITE:PS51926
label: Coronavirus envelope (CoV E) protein profile
definition: >-
  Coronavirus envelope (CoV E) protein profile. Coronaviruses (CoVs) are a diverse group of enveloped, plus-stranded RNA viruses that infect humans and many animal species, in which they can cause respiratory, enteric, hepatic, central nervous system and neurological diseases of varying severity. The main CoV structural proteins are S (spike), E (envelope), M (membrane), and N (nucleocapsid), where S, E, and M are integral membrane proteins. CoV E proteins are involved in several aspects of the virus' life cycle, such as assembly, budding, envelope formation, and pathogenesis.
