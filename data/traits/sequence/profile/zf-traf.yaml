identifier: PROSITE:PS50145
label: Zinc finger TRAF-type profile
definition: >-
  Zinc finger TRAF-type profile. TRAF proteins were isolated first by their ability to interact with TNF receptor. They are involved in different cytoplasmic signal transduction pathways. TRAF proteins are composed of 3 structural domains: a RING finger (see <PDOC00449>) in the N terminal part of the protein, TRAF zinc fingers in the middle part and the TRAF domain in the C terminal part. TRAF zinc fingers contain 8 possible ligands for one or two zinc atoms. This domain is found only in TRAF and TRAF-related proteins and its function is not yet known.
