identifier: PROSITE:PS51521
label: Herpesvirus tegument ubiquitin-specific protease (htUSP) domain profile
definition: >-
  Herpesvirus tegument ubiquitin-specific protease (htUSP) domain profile. All herpesviruses contain a Ubiquitin (Ub)-specific cysteine protease (USP) domain embedded within their large tegument protein. The herpesvirus tegument ubiquitin (Ub)-specific protease (htUSP) domain of ~200 amino acids adopts an alpha-beta-alpha sandwich fold that features a central catalytic cleft, ideally suited to accommodate the C-terminal stretch of Ub (see <PDB:2J7Q>). The catalytic triad Cys-His-Asp is strictly conserved, along with a putative oxyanion hole-forming Gln residue. The htUSP domain is a member of peptidase family C76 of clan CA.
