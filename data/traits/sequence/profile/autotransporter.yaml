identifier: PROSITE:PS51208
label: Autotransporter beta-domain profile
definition: >-
  Autotransporter beta-domain profile. Among the pathways that Gram-negative bacteria have evolved to secrete proteins to the surface or the extracellular milieu, autotransporter protein secretion pathway (type Va, AT-1 or TC 1.B.12), is one of the simplest secretion mechanisms, and is widely distributed, especially in pathogenic bacteria. As implied by their name, autotransporter (AT) proteins contain all the necessary determinants for translocation across the outer membrane within their own polypeptide.
