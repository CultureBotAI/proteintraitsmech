identifier: PROSITE:PS50961
label: La-type HTH domain profile
definition: >-
  La-type HTH domain profile. The La-type HTH domain is an RNA-binding, winged helix-turn-helix (wHTH) domain of about 90 residues present in La proteins and other eukaryotic RNA-binding proteins. The domain is named after human La protein, originally characterized as an autoantigen of the rheumatic diseases systemic lupus erythematosus and Sjogren's syndrome (La derives from the patient's name). La homologs have been found in all eukaryots including plants, trypanosomes and yeast. The La protein is a nuclear phosphoprotein that recognizes the 3' uridylates (3' UUU[OH]) present in all newly synthesized RNA polymerase III transcripts.
