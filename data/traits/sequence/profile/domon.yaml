identifier: PROSITE:PS50836
label: DOMON domain profile
definition: >-
  DOMON domain profile. The DOMON domain is an 110-125 residue long domain which has been identified in the physiologically important enzyme dopamine beta-monooxygenase and in several other secreted and transmembrane proteins from both plants and animals. It has been named after DOpamine beta-MOnooxygenase N-terminal domain. The DOMON domain can be found in one to four copies and in association with other domains, such as the Cu-ascorbate dependent monooxygenase domain, the epidermal growth factor domain (see <PDOC00021>), the trypsin inhibitor- like domain (TIL), the SEA domain (see <PDOC50024>), and the Reelin domain.
