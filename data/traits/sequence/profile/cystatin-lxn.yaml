identifier: PROSITE:PS52033
label: Latexin (LXN)-type cystatin domain profile
definition: >-
  Latexin (LXN)-type cystatin domain profile. Latexin (LXN), or tissue carboxypeptidase inhibitor (TCI), is the only known mammalian carboxypeptidase inhibitor (CPI). LTX has no detectable sequence similarity with plant and parasite inhibitors, but it is related to a human putative tumor suppressor protein, TIG1. TIG1 is larger than latexin, and the additional residues are thought to encode a membrane anchor at the N terminus. Other proteins with sequence identity to latexin are found in chicken (ovocalyxin-32) and Xenopus, but no related proteins were found in nonvertebrates. Chicken ovocalyxin-32 is a protein involved in egg shell production.
