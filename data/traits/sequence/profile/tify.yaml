identifier: PROSITE:PS51320
label: Tify domain profile
definition: >-
  Tify domain profile. The tify domain is a 36-amino acid domain only found among Embryophyta (land plants). It has been named after the most conserved amino acid pattern (TIF[F/Y]XG] it contains. Because the use of uppercase characters in 'TIFY' might imply that the domain is fully conserved across proteins, a lowercase lettering has been chosen in an attempt to highlight the reality of its natural variability. Based on their domain architecture, tify domain containing proteins can be classified into two groups. Group I is formed by proteins possessing a CCT (CONSTANS, CO-like, and TOC1) domain (see <PDOC51017>) and a GATA-type zinc finger (see <PDOC00300>) in addition to the tify domain.
