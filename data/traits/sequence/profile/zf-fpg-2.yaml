identifier: PROSITE:PS51066
label: Zinc finger FPG-type profile
definition: >-
  Formamidopyrimidine-DNA glycosylase signature and profiles. Most damage to bases in DNA is repaired by the base excision repair pathway. The repair is initiated by DNA glycosylases, enzymes that recognize specific lesion bases in DNA and remove them. Formamidopyrimidine-DNA glycosylase (EC 3.2.2.23) (gene fpg) is a bacterial DNA glycosylase that recognizes and removes damaged bases with a preference for oxidized purines, such as 7,8-dihydro-8-oxoguanine (8-oxoG). Excision of the oxidized guanine occurs via nucleophilic substitution at C1' by the N-terminal proline .
