identifier: PROSITE:PS51947
label: Nidovirus RdRp-associated nucleotidyl transferase (NiRAN) domain profile
definition: >-
  Nidovirus RdRp-associated nucleotidyl transferase (NiRAN) domain profile. Positive-stranded RNA (+RNA) viruses that belong to the order Nidovirales infect a wide range of vertebrates (families Arteriviridae and Coronaviridae) or invertebrates (Mesoniviridae and Roniviridae). Examples of nidoviruses with high economic and societal impact are the arterivirus porcine reproductive and respiratory syndrome virus (PRRSV) and the zoonotic coronaviruses (CoVs) causing severe acute respiratory syndrome (SARS), Middle East respiratory syndrome (MERS) and Covid-19 (SARS-CoV-2) in humans.
