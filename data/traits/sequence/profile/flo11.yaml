identifier: PROSITE:PS51824
label: Flocculin 11 (Flo11) domain profile
definition: >-
  Flocculin 11 (Flo11) domain profile. Fungal cells need to be able to adhere to their surroundings, be it either abiotic surfaces or living tissues, in order to remain firmly attached to their source of nutrients. Adhesive properties in fungi are conveyed by a group of cell-surface proteins called adhesins (sometimes also referred to as agglutinins or flocculins). Adhesins are generally rich in serine and threonine residues that allow extensive O-linked glycosylation. Some fungal adhesins also carry discernable ligand-binding domains that determine their substrate specificity and allows some degree of sequence classification of the different groups of adhesins.
