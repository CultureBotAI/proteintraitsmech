identifier: PROSITE:PS50238
label: Rho GTPase-activating proteins domain profile
definition: >-
  Rho GTPase-activating proteins domain profile. Small G proteins of the Rho family, which includes Rho, Rac and Cdc42, regulate phosphorylation pathways that control a range of biological functions including cytoskeleton formation and cell proliferation. Rho proteins act as molecular switches, with an active GTP-bound form and an inactive GDP-bound form. The inactive GDP bound form is promoted by GTPase-activating proteins (GAPs). GAP proteins specific for Rho contain a conserved region of around 200 amino-acid residues, the Rho-GAP domain. This domain can accelerate the GTP hydrolysis activity of Rho by five orders of magnitude.
