identifier: PROSITE:PS50924
label: MHYT domain profile
definition: >-
  MHYT domain profile. The MHYT domain is an about 190-residue domain, which was named after its conserved amino acid pattern. The MHYT domain consists of six predicted transmembrane (TM) segments, connected by short arginine-rich cytoplasmic loops and periplasmic loops that are also rich in charged amino acid residues. Three of its TM segments have a very similar amino acid sequence motif with highly conserved methionine, histidine and tyrosine residues located near the outer face of the cytoplasmic membrane.
