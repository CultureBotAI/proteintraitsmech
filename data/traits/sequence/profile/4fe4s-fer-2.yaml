identifier: PROSITE:PS51379
label: 4Fe-4S ferredoxin-type iron-sulfur binding domain profile
definition: >-
  4Fe-4S ferredoxin-type iron-sulfur binding domain signature and profile. Ferredoxins are a group of iron-sulfur proteins which mediate electron transfer in a wide variety of metabolic reactions. Ferredoxins can be divided into several subgroups depending upon the physiological nature of the iron-sulfur cluster(s). One of these subgroups are the 4Fe-4S ferredoxins, which are found in bacteria and which are thus often referred as 'bacterial-type' ferredoxins. The structure of these proteins consists of the duplication of a domain of twenty six amino acid residues; each of these domains contains four cysteine residues that bind to a 4Fe-4S center.
