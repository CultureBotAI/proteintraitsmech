identifier: PROSITE:PS51771
label: CGT/MARTX cysteine protease (CPD) domain profile
definition: >-
  CGT/MARTX cysteine protease (CPD) domain profile. Large bacterial protein toxins autotranslocate functional effector domains to the eukaryotic cell cytosol, resulting in alterations to cellular functions that ultimately benefit the infecting pathogen. Among these toxins, the clostridial glucosylating toxins (CGTs) produced by Gram-positive bacteria and the multifunctional-autoprocessing RTX (MARTX) toxins of Gram-negative bacteria have distinct mechanisms of post-translocation, but a shared mechanism of post-translocation autoprocessing that releases these functional domains from the large holotoxins.
