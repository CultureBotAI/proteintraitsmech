identifier: PROSITE:PS51999
label: Zinc finger GRF-type profile
definition: >-
  Zinc finger GRF-type profile. Glycine-arginine-phenylalanine (GRF)-type zinc fingers (GRF-ZFs) are 45- to 50-residue domains with a conserved GRxF motif. GRF-ZFs are widely distributed throughout Eukarya in proteins that are involved in DNA damage response (DDR), transcriptional regulation, and RNA metabolism. GRF-ZFs are nucleic acid interaction modules and in several cases these motifs have been shown to enhance enzymatic activity.
