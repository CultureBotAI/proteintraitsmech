identifier: PROSITE:PS51826
label: Peripheral subunit-binding (PSBD) domain profile
definition: >-
  Peripheral subunit-binding (PSBD) domain profile. The ubiquitous 2-oxoacid dehydrogenases are a family of very large multienzyme complexes consisting of multiple copies of at least three enzymes which catalyze the oxidative decarboxylation of several different 2-oxoacids, resulting in acyl-CoA products. Members of this family include pyruvate dehydrogenase (PDH), 2-oxoglutarate dehydrogenase (OGDH) and branched-chain 2- oxoacid dehydrogenase (BCDH).
