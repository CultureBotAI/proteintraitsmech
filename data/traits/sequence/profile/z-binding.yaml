identifier: PROSITE:PS50139
label: Z-binding domain profile
definition: >-
  Z-binding domain profile. Nucleic acids form double-stranded helices. Double-stranded (ds) DNA typically adopts the so-called B-conformation, while dsRNA is usually in the A- conformation. Both DNA and RNA can also adopt a Z-form double helix that is characterized by a left-handed helical arrangement, a zigzag pattern of the phosphodiester backbone and the absence of major grooves. Z-DNA is believed to play a role in transcription by relieving torsional strain induced within the DNA template by the movement of RNA polymerases, and Z-DNA may also promote genetic instability. Physiological functions of Z-RNA remain unknown.
