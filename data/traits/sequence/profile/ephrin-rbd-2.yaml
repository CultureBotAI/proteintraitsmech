identifier: PROSITE:PS51551
label: Ephrin receptor-binding (ephrin RBD) domain profile
definition: >-
  Ephrin receptor-binding (ephrin RBD) domain signature and profile. Ephrins are a family of proteins that are ligands of class V (EPH-related) receptor protein-tyrosine kinases (see <PDOC00629>). Initially identified as regulators of axon pathfinding and neuronal cell migration, the Eph receptors and their ephrin ligands are now known to have roles in many other cell-cell interactions, including those of vascular endothelial cells and specialized epithelia.
