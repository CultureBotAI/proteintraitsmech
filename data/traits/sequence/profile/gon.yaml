identifier: PROSITE:PS51046
label: GON domain profile
definition: >-
  GON domain profile. The ADAMTSs (a disintegrin and metalloproteinase domain with thrombospondin type-1 modules) are a family of zinc dependent metalloproteinases that play important roles in a variety of normal and pathological conditions. These enzymes show a complex domain organization including signal sequence, propeptide, metalloproteinase domain (see <PDOC50215>), disintegrin-like domain (see <PDOC00351>), central TS-1 motif (see <PDOC50092>), cysteine-rich region, and a variable number of TS-like repeats at the C-terminal region. The GON domain is a ~200-residue module, whose presence is a hallmark of a subfamily of structurally and evolutionarily related ADAMTSs, called GON- ADAMTSs.
