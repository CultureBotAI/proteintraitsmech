identifier: PROSITE:PS50216
label: DHHC domain profile
definition: >-
  DHHC domain profile. Palmitoylation or, more specificaly S-acylation, plays important roles in the regulation of protein localization, stability, and activity. It is a posttranslational protein modification that involves the attachment of palmitic acid to Cys residues through a thioester linkage. Protein acyltransferases (PATs), also known as palmitoyltransferases, catalyze this reaction by transferring the palmitoyl group from palmitoyl-CoA to the thiol group of Cys residues.
