identifier: PROSITE:PS51841
label: Lamin-tail (LTD) domain profile
definition: >-
  Lamin-tail (LTD) domain profile. Intermediate filaments (IFs) constitute a major structural element of metazoan cells. They build two distinct systems: one inside the nucleus attached to the inner membrane, and one that is cytoplasmic, which connects intercellular junctional complexes situated at the plasma membrane with the outer nuclear membrane. In both cases, their major function is assumed to be that of a mechanical stress absorber and an integrating device for the entire cytoskeleton. In the nucleus, the IF system is assembled from lamins, which together with an ever increasing number of associated transmembrane and chromatin-binding proteins constitute the nuclear lamina.
