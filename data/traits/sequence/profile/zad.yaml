identifier: PROSITE:PS51915
label: ZAD domain profile
definition: >-
  ZAD domain profile. C2H2 zinc-finger (ZF) motifs (see <PDOC00028>), which represent the most abundant nucleic acid binding motif in higher eukaryotes, are found in RNA- binding proteins, transcription factors and chromatin components. C2H2 zinc finger proteins frequently contain additional protein modules in their N- termini. The zinc finger-associated domain (ZAD) is found at the N-terminus of the C2H2 proteins of many arthropods. In vertebrates, only one protein containing an N-terminal structure similar to the ZAD has been found, ZFO276. The ZAD-coding genes are subject to an ongoing lineage-specific expansion (LSE), which is most pronounced in the higher holometabolous insects.
