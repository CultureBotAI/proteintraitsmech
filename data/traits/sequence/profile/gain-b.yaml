identifier: PROSITE:PS50221
label: GAIN-B domain profile
definition: >-
  GAIN-B domain profile. The GPS motif is a cysteine-rich domain of ~40 amino acid, which was identified in adhesion-G-protein-coupled receptors (aGPCRs) (including CIRLs/ latrophilins), polycystic kidney disease 1 (PKD1)-like proteins and in other membrane-associated proteins like the sea urchin receptor for egg jelly protein (REJ). The GPS motif is located immediately N-terminal to transmembrane region (1, 7, or 11 TM helices). For the CIRL-1, CIRL-2, CIRL-3 and CD-97 proteins, it has been shown that they are each made of two non- covalently bound subunits resulting from the endogenous proteolytic cleavage of a precursor protein.
