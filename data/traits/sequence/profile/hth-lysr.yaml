identifier: PROSITE:PS50931
label: LysR-type HTH domain profile
definition: >-
  LysR-type HTH domain profile. The lysR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 60 residues present in lysR-type transcriptional regulators (LTTR), one of the most common regulator families in prokaryotes. The family is named after the Escherichia coli regulator lysR. LysR proteins are present in diverse bacterial genera, archaea and algal chloroplasts. All LTTRs contain the DNA-binding lysR-type HTH domain, usually in the N-terminal part. Most LTTRs require a small compound that acts as co-inducer.
