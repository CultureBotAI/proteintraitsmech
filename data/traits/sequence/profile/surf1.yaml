identifier: PROSITE:PS50895
label: SURF1 family profile
definition: >-
  SURF1 family profile. The surfeit locus 1 gene (SURF1 or surf-1) encodes for a conserved protein of about 300 amino-acid residues that seems to be involved in the biogenesis of cytochrome c oxidase. Vertebrate SURF1 is evolutionary related to yeast protein SHY1 and homologous proteins have been found in several relatively recent prokaryotes. All known eukaryotic SURF1 sequences are extended on the N-terminal end as compared to the bacterial species. This extension contains a typical mitochondrial targeting pre-sequence.
