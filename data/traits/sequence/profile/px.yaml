identifier: PROSITE:PS50195
label: PX domain profile
definition: >-
  PX domain profile. The phox homology (PX) domain is a 100-140 amino acid module that was first identified in p40-phox, p47-phox, the Cpk class of phosphatidylinositol 3- kinase, homologues of a sorting nexin (SNX1), phospholipase D, and several yeast proteins, including BEM1 and SCD2. The PX domain is found in a single copy in several eukaryotic proteins generally involved in the regulation of vesicular trafficking machinery, growth factor receptor degradation in lysosomes, signal transduction mechanisms, and NADPH oxidase activity.
