identifier: PROSITE:PS51032
label: AP2/ERF domain profile
definition: >-
  AP2/ERF domain profile. Ethylene is an endogenous plant hormone that influences many aspects of plant growth and development. Some defense related genes that are induced by ethylene were found to contain a cis-regulatory element known as the Ethylene- Responsive Element (ERE). Sequence analysis on various ERE regions identified a short motif rich in G/C nucleotides, the GCC-box, essential for the response to ethylene. This short motif is recognized by a family of transcrition factors, the ERE binding factors (ERF).
