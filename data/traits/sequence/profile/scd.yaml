identifier: PROSITE:PS51425
label: Stromalin conservative (SCD) domain profile
definition: >-
  Stromalin conservative (SCD) domain profile. The stromal antigens or stromalins are a group of highly conserved nuclear proteins, originally identified from a murine bone marrows stromal cell line. Stromalins are represented in several organisms from yeast to humans and are characterized by the stromalin conservative domain (SCD), an 86 amino acid motif found in all proteins of the family described to date.
