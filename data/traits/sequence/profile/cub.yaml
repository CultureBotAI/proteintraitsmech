identifier: PROSITE:PS01180
label: CUB domain profile
definition: >-
  CUB domain profile. The CUB domain is an extracellular domain of approximately 110 residues which is found in functionally diverse, mostly developmentally regulated proteins. Almost all CUB domains contain four conserved cysteines which probably form two disulfide bridges (C1-C2, C3-C4). The structure of the CUB domain has been predicted to be a beta-barrel similar to that of immunoglobulins.
