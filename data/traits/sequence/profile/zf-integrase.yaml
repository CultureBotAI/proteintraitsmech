identifier: PROSITE:PS50876
label: Zinc finger integrase-type profile
definition: >-
  Zinc finger integrase-type profile. The retroviral integrase is the enzyme responsible for the insertion of a DNA copy of the viral genome into host DNA, an essential step in the replication cycle of viruses. Integrases comprise three functional and structural domains: the central core domain, which contains the catalytic site, an N-terminal zinc finger and a C-terminal DNA binding domain. The zinc finger has the signature of zinc-binding residues H-x(3)-H-x(23)-C-x(2)-C. The function of this domain is unclear; however, it is required for integration activity and enhances tetramerization in the context of the full-length integrase.
