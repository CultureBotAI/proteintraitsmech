identifier: PROSITE:PS50830
label: Thermonuclease domain profile
definition: >-
  Thermonuclease domain signatures and profile. Staphylococcus aureus secretes a thermostable nuclease (EC 3.1.31.1), known as thermonuclease (TNase) or staphylococcal nuclease (SNase), which is a calcium- dependent enzyme that catalyzes the hydrolysis of both DNA and RNA at the 5' position of the phosphodiester bond yielding 3'-mononucleotides and dinucleotides. Three residues, two arginines and a glutamate, have been implicated in the catalytic mechanism.
