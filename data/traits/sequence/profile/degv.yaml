identifier: PROSITE:PS51482
label: DegV domain profile
definition: >-
  DegV domain profile. The DegV protein family received its name based on sequence similarity to the DegV protein from Bacillus subtilis. All members of the DegV family are from bacteria, mostly Firmicutes. The function of DegV proteins is not yet completely understood, but structural evidence indicates that they can bind different fatty acids.
