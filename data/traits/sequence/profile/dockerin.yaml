identifier: PROSITE:PS51766
label: Dockerin domain profile
definition: >-
  Dockerin domain profile. Plant cell wall polysaccharides comprise the most abundant reservoir of organic carbon in the biosphere. The cellulosomne is a large multienzyme complex used by many anaerobic bacteria for the efficient degradation of plant-cell wall polysaccharides. The principal component of the cellulosome is a scaffoldin subunit, a large enzyme-integrating protein, that contains cohesin modules (usually in multiple copies) for incorporation of the different enzymes and other cellulosomal components. The enzymes contain a complementary type of module, the dockerin domain, that binds tenaciously to the cohesin modules of the scaffoldin subunit.
