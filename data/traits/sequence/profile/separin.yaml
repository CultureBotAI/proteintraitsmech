identifier: PROSITE:PS51700
label: SEPARIN core domain profile
definition: >-
  SEPARIN core domain profile. In eukaryotic cells, replicated DNA strands remain physically connected until their segregation to opposite poles of the cell during anaphase. This "sister chromatid cohesion" is essential for the alignment of chromosomes on the mitotic spindle during metaphase. Cohesion depends on the multisubunit cohesin complex, which possibly forms the physical bridges connecting sisters. The separins (separases) cleave the Scc1p subunit of the cohesin complex, allowing the separation of sister chromatids in anaphase. Separins are highly conserved in all eukaryotes but have not been detected in prokaryotes.
