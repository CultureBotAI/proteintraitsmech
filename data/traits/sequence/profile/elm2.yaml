identifier: PROSITE:PS51156
label: ELM2 domain profile
definition: >-
  ELM2 domain profile. The ELM2 (EGL-27 and MTA1 homology) domain was first described in Egl-27, a Caenorhabditis elegans protein that plays a fundamental role in patterning during embryonic development. Most ELM2 domain-containing proteins also possess a SANT domain, implying a structural and/or functional relationship between these two motifs. Many proteins containing an ELM2 domain are known components of characterized transcription- and chromatin-regulatory complexes containing one or more histone deacetylases (HDACs). The evolutionarily conserved ELM2 domain has been shown to function as a transcriptional repression domain through recruitment of HDAC activity.
