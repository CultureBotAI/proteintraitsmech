identifier: PROSITE:PS51863
label: LCN-type cysteine-stabilized alpha/beta (CS-alpha/beta) domain profile
definition: >-
  LCN-type cysteine-stabilized alpha/beta (CS-alpha/beta) domain profile. Scorpion venoms are complex mixtures of neurotoxins (low molecular weight proteins), cardiotoxins, hemolytic toxins, antimicrobial peptides, enzymes (such as hyaluronidase, acetylcholinesterase, phospholipase and metalloproteinases), lipides, nucleotides, mucopolysaccharides and biogenic amines. Neurotoxins can be classified as either short- or long-chain toxins, which share a common structural motif, named CS-alpha/beta for cysteine- stabilized alpha-helix/beta-sheet. Short-chain neurotoxins (SCNs) usually contain 30-40 residues and three or four disulphide bridges.
