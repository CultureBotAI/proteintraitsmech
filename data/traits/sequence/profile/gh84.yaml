identifier: PROSITE:PS52009
label: Glycosyl hydrolases family 84 (GH84) domain profile
definition: >-
  Glycosyl hydrolases family 84 (GH84) domain profile. Glycoside hydrolases (GHs, EC 3.2.1.-) form a widespread group of enzymes that hydrolyze the glycoside bond between monosaccharide units or between a carbohydrate and an aglycone moiety. GHs can act specifically as exo-cleaving enzymes to remove the sugar units from the ends of chains and release small sugar products, or endo-cleaving enzymes to act within the polysaccharide chain and produce oligosaccharides.
