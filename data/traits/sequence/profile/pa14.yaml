identifier: PROSITE:PS51820
label: PA14 domain profile
definition: >-
  PA14 domain profile. The ~150-amino acid PA14 domain, named after its location in the protective antigen of anthrax toxin, is found in a variety of bacterial and eukaryotic proteins such as glycosidases, glycosyltransferases, proteases, amidases, toxins, adhesins and signaling molecules. The PA14 domain is combined in a mosaic manner with various catalytic or non-catalytic domains directly or indirectly implicated in binding carbohydrate or peptidoglycan. It could be a carbohydrate-binding module.
