identifier: PROSITE:PS51138
label: EMSY N-terminal (ENT) domain profile
definition: >-
  EMSY N-terminal (ENT) domain profile. The EMSY N-terminal (ENT) domain is a ~90-residue module, which is unique in the human proteome, although multiple copies are found in Arabidopsis proteins. In the plant proteins, the ENT domains are accompanied by Agenet domains, plant specific homologues of Tudor domains (see <PDOC50304>).
