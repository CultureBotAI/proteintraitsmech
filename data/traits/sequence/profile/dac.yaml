identifier: PROSITE:PS51794
label: Diadenylate cyclase (DAC) domain profile
definition: >-
  Diadenylate cyclase (DAC) domain profile. Cyclic di-AMP (c-di-AMP) is a bacterial secondary messenger molecule, which is associated with various physiological functions. It is involved in several important cellular processes, such as cell wall metabolism, maintenance of DNA integrity, ion transport, transcription regulation, and allosteric regulation of enzyme function. The 120-amino acid-long diadenylate cyclase (DAC) domain converts two ATP or ADP molecules into one c-di-AMP molecule. The majority of DAC domain-containing proteins are found in bacterial species, but a small number are also present in archaea of the phylum Euryarchaeota.
