identifier: PROSITE:PS50014
label: Bromodomain (BrD) profile
definition: >-
  Bromodomain (BrD) signature and profile. The bromodomain (BrD) is a conserved protein motif found in all eukaryotes and is the only known protein module that binds acetylated lysine residues both in histone tails and in non-histone proteins. This motif was first discovered in the Drosophila protein brahma (brm) from which it derives its name, and it has subsequently been identified in proteins from yeast to humans. In light of the prevalence of the acetyl posttranslational modification, proteins that can "read" this mark have a wide variety of functions.
