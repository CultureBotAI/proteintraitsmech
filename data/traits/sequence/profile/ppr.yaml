identifier: PROSITE:PS51375
label: Pentatricopeptide (PPR) repeat profile
definition: >-
  Pentatricopeptide (PPR) repeat profile. Pentatricopeptide repeat (PPR) proteins are characterized by tandem repeats of a degenerate 35 amino acid motif. Most of PPR proteins have roles in mitochondria or plastid. PPR repeats were discovered while screening Arabidopsis proteins for those predicted to be targeted to mitochondria or chloroplast. Some of these proteins have been shown to play a role in post-transcriptional processes within organelles and they are thought to be sequence-specific RNA-binding proteins. Plant genomes have between one hundred to five hundred PPR genes per genome whereas non-plant genomes encode two to six PPR proteins.
