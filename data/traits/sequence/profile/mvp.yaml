identifier: PROSITE:PS51224
label: MVP (vault) repeat profile
definition: >-
  MVP (vault) repeat profile. Vaults are large ribonucleoprotein particles, composed of three different proteins and one or more small vault RNA (vRNA) molecules packed into barrel-shaped assemblies that are found in all higher eukaryotes. Their main component is major vault protein (MVP) or lung resistance-related protein (LRP), which is implicated in resistance to cancer therapy and correlates with poor prognosis.
