identifier: PROSITE:PS50191
label: CRAL-TRIO lipid binding domain profile
definition: >-
  CRAL-TRIO lipid binding domain profile. The CRAL-TRIO domain is a structurally conserved element of about 170 amino acids, which constitute a hydrophobic lipid binding pocket. The CRAL-TRIO domain is found in GTPase-activating proteins (GAPs), guanine nucleotide exchange factors (GEFs) and a family of hydrophobic ligand binding proteins, including the yeast SEC14 protein and mammalian retinaldehyde- and alpha- tocopherol-binding proteins. The CRAL-TRIO domain may either constitute all of the protein or only part of it.
