identifier: PROSITE:PS50254
label: NF-kappa-B/Rel/dorsal domain profile
definition: >-
  NF-kappa-B/Rel/dorsal domain signature and profile. Various studies (reviewed in [1-5]) have allowed the characterization of a family of eukaryotic transcription factors with basic impact on oncogenesis, embryonic development and differentiation including immune response and acute phase reaction. Most of these transcription factors bind as dimers to the consensus DNA sequence motif 5'-GGGRNNYYCC-3' termed kappa-B according the first described factor-binding sequence motif located in the immunoglobulin kappa light chain enhancer region.
