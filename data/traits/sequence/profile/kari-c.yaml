identifier: PROSITE:PS51851
label: KARI C-terminal domain profile
definition: >-
  KARI N- and C-terminal domains profiles. Ketol-acid reductoisomerase (KARI; EC 1.1.1.86), also known as acetohydroxy acid isomeroreductase (AHIR or AHAIR), catalyzes the conversion of acetohydroxy acids into dihydroxy valerates in the second step of the biosynthetic pathway for the essential branched-chain amino acids valine, leucine, and isoleucine.
