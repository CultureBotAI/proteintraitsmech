identifier: PROSITE:PS50021
label: Calponin homology (CH) domain profile
definition: >-
  Calponin homology (CH) domain profile. A number of actin-binding proteins, including spectrin, alpha-actinin and fimbrin, contain a 250 amino acid stretch called the actin binding domain (ABD). The ABD has probably arisen from duplication of a domain which is also found in a single copy in a number of other proteins like calponin or the vav proto-oncogene and has been called calponin homology (CH) domain.
