identifier: PROSITE:PS51347
label: Phosphotriesterase family profile
definition: >-
  Phosphotriesterase family signature and profile. Bacteria such as Pseudomonas diminuta harbor a plasmid that carries the gene for the enzyme phosphotriesterase (EC 3.1.8.1) (PTE) (also known as parathion hydrolase). This enzyme has attracted interest because of its potential use in the detoxification of chemical waste and warfare agents and its ability to degrade agricultural pesticides such as parathion. It act specifically on synthetic organophosphate triesters and phosphorofluoridates. It does not seem to have a natural occuring substrate and may thus have optimally evolved for utilizing paraoxon.
