identifier: PROSITE:PS51077
label: IclR-type HTH domain profile
definition: >-
  IclR-type HTH and iclR effector binding domains profiles. The iclR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 60 amino acids present in transcription regulators of the iclR family, involved in carbon metabolism in eubacteria and archaea. The domains are named after Escherichia coli iclR (isocitrate lyase regulator), a repressor of the glyoxylate bypass operon for acetate utilization. Transcription regulators of the iclR family contain the DNA-binding wHTH domain in the N-terminal part. The C-terminal part contains a ~170 residues regulatory domain, termed Effector binding Domain (ED) as it may bind a small effector or signal molecule.
