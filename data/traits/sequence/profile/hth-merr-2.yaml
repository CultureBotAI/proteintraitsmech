identifier: PROSITE:PS50937
label: MerR-type HTH domain profile
definition: >-
  MerR-type HTH domain signature and profile. The merR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 70 residues present in the merR family of transcriptional regulators. The family is named after the merR regulator of mercury resistance operons of Gram-negative bacteria found on transposons Tn21 and Tn501. MerR-type regulators are present in diverse bacterial genera, in the cytoplasm. The helix-turn-helix DNA-binding motif is located in the N-terminal part of these transcriptional regulators and is followed by a coiled-coil region. The C-terminal part of merR-type regulators contains effector binding regions that are specific to the effector recognized.
