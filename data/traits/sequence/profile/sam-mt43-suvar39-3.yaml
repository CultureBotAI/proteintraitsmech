identifier: PROSITE:PS51579
label: Histone-lysine N-methyltransferase (EC 2.1.1.43) family profile
definition: >-
  Class V SAM-dependent methyltransferases family profiles. Methyltransferases (EC 2.1.1.-) constitute an important class of enzymes present in every life form. They transfer a methyl group most frequently from S-adenosyl L-methionine (SAM or AdoMet) to a nucleophilic acceptor such as nitrogen, oxygen, sulfur or carbon leading to S-adenosyl-L-homocysteine (AdoHcy) and a methylated molecule. The substrates that are methylated by these enzymes cover virtually every kind of biomolecules ranging from small molecules, to lipids, proteins and nucleic acids.
