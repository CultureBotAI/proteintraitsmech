identifier: PROSITE:PS51319
label: TFIIS N-terminal domain profile
definition: >-
  TFIIS N-terminal domain profile. Transcription factor IIS (TFIIS) is a transcription elongation factor that increases the overall transcription rate of RNA polymerase II by reactivating transcription elongation complexes that have arrested transcription. The three structural domains of TFIIS are conserved from yeast to human. The 80 or so N- terminal residues form a protein interaction domain containing a conserved motif, which has been called the LW motif because of the invariant leucine and tryptophane residues it contains.
