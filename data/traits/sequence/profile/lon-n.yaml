identifier: PROSITE:PS51787
label: Lon N-terminal domain profile
definition: >-
  Lon N-terminal domain profile. Lon (also known as endopeptidase La, EC 3.4.21.53) is a multi-domain ATP- dependent protease found throughout all kingdoms of life. It is involved in protein quality control and several regulatory processes. All Lon proteases contain an ATPase domain belonging to the AAA+ superfamily of molecular machines, and a proteolytic domain (see <PDOC51786>) with a serine-lysine catalytic dyad in which a lysine assists the catalytic serine in proteolytic cleavage.
