identifier: PROSITE:PS51287
label: Large T-antigen (T-ag) origin-binding domain (OBD) profile
definition: >-
  Large T-antigen (T-ag) origin-binding domain (OBD) profile. The group of polyomaviruses is formed by the homonymous murine virus (Py) as well as other representative members such as the simian virus 40 (SV40) and the human BK and JC viruses. Their large T antigen (T-ag) protein binds to and activates DNA replication from the origine of DNA replication (ori). Insofar as is known, the T-ag binds to the origin first as a monomer to its pentanucleotide recognition element. The monomers are then thought to assemble into hexamers and double hexamers, which constitute the form that is active in initiation of DNA replication. When bound to the ori, T-ag double hexamers encircle DNA.
