identifier: PROSITE:PS50909
label: GAT domain profile
definition: >-
  GAT domain profile. The GAT domain is a region of homology of ~130 residues, which is found in eukaryotic GGAs (for Golgi-localized, gamma ear-containing ADP ribosylation factor (ARF)-binding proteins) and vertebrate TOMs (for target of myb). The GAT domain is found in its entirety only in GGAs, although, at the C-terminus it shares partial sequence similarity with a short region of TOMs. The GAT domain is found in association with other domains, such as VHS (see <PDOC50179>) and GAE (see <PDOC50180>).
