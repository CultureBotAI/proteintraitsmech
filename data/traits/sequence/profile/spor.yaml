identifier: PROSITE:PS51724
label: SPOR domain profile
definition: >-
  SPOR domain profile. The SPOR domain is named after the founding member of the protein family, a Bacillus subtilis cell wall amidase named CwlC that is produced relatively late in the process of sporulation. SPOR domain proteins are widespread in bacteria, many of these proteins are involved in sporulation and cell division, and SPOR domains are sufficient for septal localization, probaly because SPOR domains bind to septal peptidoglycan (PG).
