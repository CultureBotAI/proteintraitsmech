identifier: PROSITE:PS51115
label: Laminin IV type A domain profile
definition: >-
  Laminin IV domain profiles. Laminin is a large molecular weight glycoprotein present only in basement membranes in almost every animal tissue. Each laminin is a heterotrimer assembled from alpha, beta and gamma chain subunits, secreted and incorporated into cell-associated extracellular matrices. The laminins can self-assemble, bind to other matrix macromolecules, and have unique and shared cell interactions mediated by integrins, dystroglycan, and other receptors. Through these interactions, laminins critically contribute to cell differentiation, shape and movement, maintenance of tissue phenotypes, and promotion of tissue survival.
