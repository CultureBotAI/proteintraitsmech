identifier: PROSITE:PS51296
label: Rieske [2Fe-2S] iron-sulfur domain profile
definition: >-
  Rieske [2Fe-2S] iron-sulfur domain profile. There are multiple types of iron-sulfur clusters which are grouped into three main categories based on their atomic content: [2Fe-2S], [3Fe-4S], [4Fe-4S] (see <PDOC00176>), and other hybrid or mixed metal types. Two general types of [2Fe-2S] clusters are known and they differ in their coordinating residues. The ferredoxin-type [2Fe-2S] clusters are coordinated to the protein by four cysteine residues (see <PDOC00175>). The Rieske-type [2Fe-2S] cluster is coordinated to its protein by two cysteine residues and two histidine residues.
