identifier: PROSITE:PS50934
label: SWIRM domain profile
definition: >-
  SWIRM domain profile. The SWIRM domain is a globular module of about 85 residues that was named after the proteins SWI3, RSC8 and MOIRA in which it was first recognized. It is found in eukaryotic chromatin proteins and several other uncharacterized proteins. The SWIRM domain occurs in various distinct domain-architecture contexts, suggesting that it is an evolutionarily mobile domain. It is found associated with other domains, such as the ZZ-type zinc finger (see <PDOC50135>), the Myb DNA-binding domain (see <PDOC00037>), the HORMA domain (see <PDOC50815>), the amino-oxidase domain, the chromo domain (see <PDOC00517>) and the JAB1/PAD1domain.
