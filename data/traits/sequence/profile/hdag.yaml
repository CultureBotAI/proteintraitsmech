identifier: PROSITE:PS51838
label: Hepatitis delta antigen (HDAg) domain profile
definition: >-
  Hepatitis delta antigen (HDAg) domain profile. Transcription elongation by RNA polymerase II (RNAPII) is negatively regulated by the human factors DRB-sensitivity inducing factor (DSIF) and negative elongation factor (NELF). NELF is a transcription factor composed of four subunits, NELF-A, -B, -C (or its variant -D), and -E, that are conserved from Drosophila to humans. Certain subunits have been implicated in numerous diseases ranging from neurological disorders to cancer. The N-terminal segment of NELF-A shows sequence similarity to the hepatitis delta antigen (HDAg), the viral protein required for replication of hepatitis delta virus (HDV).
