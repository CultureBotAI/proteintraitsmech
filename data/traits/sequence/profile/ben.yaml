identifier: PROSITE:PS51457
label: BEN domain profile
definition: >-
  BEN domain profile. The BEN domain is an alpha-helical module found in diverse animal proteins such as BANP/SMAR1, NAC1 and the Drosophila mod(mdg4) isoform C, in the chordopoxvirus virosomal protein E5R and in several proteins of polydnaviruses. The BEN domain is present in one or more copies in these proteins and has been named after experimentally characterized proteins BANP, E5R and NAC1 in which it is present. The BEN domain is predicted to functions as an adaptor for the higher-order structuring of chromatin, and recruitment of chromatin modifying factors in transcriptional regulation.
