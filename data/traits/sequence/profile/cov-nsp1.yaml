identifier: PROSITE:PS51962
label: Coronavirus (CoV) Nsp1 globular domain profile
definition: >-
  Coronavirus (CoV) Nsp1 globular and Betacoronavirus (BetaCoV) Nsp1 C-terminal domains profiles. Coronaviruses (CoVs) are enveloped positive-strand RNA viruses that infect many species, including humans, other mammals, and birds. After infection, the host may develop respiratory, bowel, liver, and neurological diseases. Coronaviruses are divided into four genera: Alphacoronavirus, Betacoronavirus, Gammacoronavirus, and Deltacoronavirus. The ideal hosts of AlphaCoV and BetaCoV are mammals, and GammaCoV primarily infects birds, while DeltaCoV has been identified in both mammals and birds.
