identifier: PROSITE:PS51895
label: Alt a 1 (AA1)-like domain profile
definition: >-
  Alt a 1 (AA1)-like domain profile. Alt a 1 family proteins (AA1s) have only been observed in the Dothideomycetes and Sordariomycetes classes of fungi. AA1-like proteins are fungal toxins that can induce plant defense responses and cell death. They may contribute to virulence by protecting the cell wall, thus allowing fungal growth to be maintained and preventing the recognition of degraded beta-1,3-glucan by the plant.
