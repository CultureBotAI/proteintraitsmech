identifier: PROSITE:PS52050
label: WYL domain profile
definition: >-
  WYL domain profile. Survival of all organisms critically relies on the ability to regulate the expression of genes in the correct spatio-temporal context. This regulation is orchestrated by transcription factors (TFs) and other proteins that are able to integrate environmental cues, leading to activation or repression of genes. In addition to controlling cell division and growth, in bacteria, TFs enable adaptation to changing food sources and environmental stresses.
