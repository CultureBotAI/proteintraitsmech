identifier: PROSITE:PS50957
label: Josephin domain profile
definition: >-
  Josephin domain profile. The Josephin domain is an eukaryotic protein module of about 180 residues, which occurs in stand-alone form in Josephin-like proteins, and as an amino- terminal domain associated with two or three copies of the ubiquitin- interacting motif (UIM) (see <PDOC50330>) in ataxin 3-like proteins.
