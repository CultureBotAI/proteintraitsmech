identifier: PROSITE:PS50093
label: Polycystic kidney disease (PKD) domain profile
definition: >-
  Polycystic kidney disease (PKD) domain profile. The polycystic kidney disease (PKD) domain is an 80-90 amino acid module originally found in 16 copies in the extracellular segment of polycystin-1, a large cell surface glycoprotein. Polycystin-1 is encoded by the PKD1 gene, which is mutated in autosomal dominant polycystic kidney disease (ADPKD). Although its function is unknown, it may be involved in protein-protein and protein-carbohydrate interactions based on its predicted domain structure. One or more copies of the PKD domain are also found in several other extracellular proteins from higher organisms, eubacteria, and archaebacteria.
