identifier: PROSITE:PS51043
label: DDHD domain profile
definition: >-
  DDHD domain profile. The Nir/rdgB (N-terminal domain-interacting receptor/Drosophila retinal degeneration B proteins) family has been identified in a variety of eukaryotic organisms, ranging from worms to mammals. Members of this family are implicated in regulation of lipid trafficking, metabolism, and signaling. The Nir/rdgB proteins contain a 180 amino-acids-long conserved region in the central part of the protein. This domain contains four conserved residues, DDHD, which may form a metal-binding site. This domain is named DDHD after these four residues. This pattern of conservation of metal-binding residues is often seen in phosphoesterase domains.
