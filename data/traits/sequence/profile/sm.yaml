identifier: PROSITE:PS52002
label: Sm domain profile
definition: >-
  Sm domain profile. Sm, like-Sm (Lsm), and Hfq proteins belong to a large family of proteins involved in numerous processes associated with RNA processing and gene expression regulation. The members of this protein family have been identified in all three domains of life: bacteria, archaea, and eukarya. The Sm and Lsm proteins are found in Archaea and Eukarya domains, whereas Hfq proteins exist in the Bacteria domain and one archaeon species, Methanocaldococcus jannaschii. Heteroheptameric eukaryotic Sm and Lsm proteins participate in the formation of spliceosomes and mRNA decapping.
