identifier: PROSITE:PS51044
label: Zinc finger SP-RING-type profile
definition: >-
  Zinc finger SP-RING-type profile. SIZ1, SIZ2, and PIAS (protein inhibitor of activated STAT) proteins form a conserved family defined by an unusual RING-related domain, the Siz/PIAS RING finger (SP-RING). While RING fingers coordinate two Zn2+ ions, with a cross-brace architecture, the SP-RING finger contains only one Zn2+ ion in site B, which is coordinated in a tetrahedral configuration (see <PDB:3I2D>). Three of the four amino acid side chains that coordinate the Zn2+ ion at site A in RING proteins are lacking in Siz/PIAS proteins. Like classical RING fingers SP-RINGs function as an E3 enzyme but specific for sumoylation (see <PDOC00449> for more details on the ubiquitination pathway).
