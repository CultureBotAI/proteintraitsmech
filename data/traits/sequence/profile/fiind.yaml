identifier: PROSITE:PS51830
label: FIIND domain profile
definition: >-
  FIIND domain profile. The "Function to Find Domain" (FIIND)-containing proteins CARD8 (Cardinal; Tucan) and NLRP1 (NALP1; NAC) are well known components of inflammasomes, multiprotein complexes responsible for activation of caspase-1, a regulator of inflammation and innate immunity. CARD8 and NLRP1 undergo autoproteolytic cleavage at a conserved SF/S motif within the FIIND. The FIIND domain is only present in chordates and consists of a ZU5-like domain (see <PDOC51145>) and a UPA-like domain.
