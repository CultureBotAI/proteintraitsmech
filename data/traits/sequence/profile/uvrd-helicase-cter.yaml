identifier: PROSITE:PS51217
label: UvrD-like DNA helicase C-terminal domain profile
definition: >-
  UvrD-like DNA helicase domain profiles. Helicases have been classified in 5 superfamilies (SF1-SF5). All of the proteins bind ATP and, consequently, all of them carry the classical Walker A (phosphate-binding loop or P-loop) (see <PDOC00017>) and Walker B (Mg2+-binding aspartic acid) motifs. For the two largest groups, commonly referred to as SF1 and SF2, a total of seven characteristic motifs have been identified which are distributed over two structural domains, an N-terminal ATP-binding domain and a C-terminal domain. UvrD-like DNA helicases belong to SF1, but they differ from classical SF1/SF2 (see <PDOC51192>) by a large insertion in each domain.
