identifier: PROSITE:PS51805
label: Extended PHD (ePHD) domain profile
definition: >-
  Extended PHD (ePHD) domain profile. The extended plant homeodomain (ePHD) domain contains an N-terminal pre-PHD (C2HC zinc finger), a long linker, and a noncanonical PHD finger (C4HC3 zinc finger) (see <PDOC50016>). The ePHD domain can bind dsDNA but not histones.
