identifier: PROSITE:PS51136
label: WAC domain profile
definition: >-
  WAC domain profile. ACF (for ATP-utilizing chromatin assembly and remodeling factor) is a chromatin-remodeling complex that catalyzes the ATP-dependent assembly of periodic nucleosome arrays. This reaction utilizes the energy of ATP hydrolysis by ISWI, the smaller of the two subunits of ACF. Acf1, the large subunit of ACF, is essential for the full activity of the complex. The WAC (WSTF/Acf1/cbp146) domain is an ~110-residue module present at the N-termini of Acf1-related proteins in a variety of organisms. It is found in association with other domains such as the bromodomain (see <PDOC00550>), the PHD-type zinc finger (see <PDOC50016>), DDT (see <PDOC50827>) or WAKS.
