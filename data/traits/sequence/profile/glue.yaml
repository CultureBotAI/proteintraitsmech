identifier: PROSITE:PS51495
label: GLUE domain profile
definition: >-
  GLUE domain profile. The multivesicular body (MVB) protein-sorting pathway targets transmembrane proteins either for degradation or for function in the vacuole/lysosomes. The signal for entry into this pathway is monoubiquitination of protein cargo, which results in incorporation of cargo into luminal vesicles at late endosomes. Another crucial player is phosphatidylinositol 3-phosphate (PtdINS(3)P), which is enriched on early endosomes and on the luminal vesicles of MVBs. The ESCRT complexes are critical for MVB budding and sorting of monoubiquitinated cargo into the luminal vesicles.
