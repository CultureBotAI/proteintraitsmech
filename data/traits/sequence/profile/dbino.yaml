identifier: PROSITE:PS51413
label: DBINO domain profile
definition: >-
  DBINO domain profile. Proteins belonging to the SNF2 family of DNA dependent ATPases are important members of the chromatin remodelling complexes that are implicated in epigenetic control of gene expression. Members of the SNF2 family of proteins have been identified in organisms ranging from Escherichia coli to Homo sapiens. All of them contain the conserved SNF2 domain, which is defined by the existence of seven motifs (I, Ia, and II-VI) with sequences similarity to those motifs found in DNA and RNA helicases (see <PDOC51192>). SNF2-like family members can be further subdivided into several subfamilies according to the presence of protein motifs outside of the ATPase region.
