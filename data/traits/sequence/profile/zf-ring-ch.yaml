identifier: PROSITE:PS51292
label: Zinc finger RING-CH-type profile
definition: >-
  Zinc finger RING-CH-type profile. The RING finger is a well characterized zinc finger which coordinates two zinc atoms in a cross-braced manner (see <PDOC00449>). According to the pattern of cysteines and histidines three different subfamilies of RING finger can be defined. The classical RING finger (RING-HC) has a histidine at the fourth coordinating position and a cysteine at the fifth. In the RING-H2 variant, both the fourth and fifth positions are occupied by histidines. The RING-CH, which is very similar to the classical RING finger, differs from both of these variants in that it has a cys residue in the fourth position and a His in the fifth.
