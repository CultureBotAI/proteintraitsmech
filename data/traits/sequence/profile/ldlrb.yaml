identifier: PROSITE:PS51120
label: LDL-receptor class B (LDLRB) repeat profile
definition: >-
  LDL-receptor class B (LDLRB) repeat profile. The low-density lipoprotein receptor (LDLR) regulates cholesterol homeostasis in mammalian cells. LDLR binds cholesterol-carrying LDL, associates with clathrin-coated pits, and is internalized into acidic endosomes where it separates from its ligand. The ligand is degraded in lysosomes, while the receptor returns to the cell surface. The LDLR has several domains. The ligand-binding domain contains seven LDL receptor class A repeats (see <PDOC00929>), each with three disulfide bonds and a coordinated Ca2+ ion.
