identifier: PROSITE:PS50105
label: SAM domain profile
definition: >-
  SAM domain profile. The sterile alpha motif (SAM) domain is a putative protein interaction module present in a wide variety of proteins involved in many biological processes. The SAM domain that spreads over around 70 residues is found in diverse eukaryotic organisms. SAM domains have been shown to homo- and hetero-oligomerize, nevertheless with a low-affinity constant, and to mediate specific protein-protein interactions.
