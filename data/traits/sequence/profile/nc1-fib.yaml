identifier: PROSITE:PS51461
label: Fibrillar collagen C-terminal non-collagenous (NC1) domain profile
definition: >-
  Fibrillar collagen C-terminal non-collagenous (NC1) domain profile. Collagens represent a large family of extracellular matrix glycoproteins. Members of this family include the fibrillar collagens, which are involved in the formation of striated fibrils. Fibril-forming or fibrillar collagens are one of the most ancient families of extracellular matrix molecules being found throughout the metazoan kingdom from the simplest (porifera (sponges)) to the most complex animals (vertebrates).
