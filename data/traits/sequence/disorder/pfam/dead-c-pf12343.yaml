identifier: Pfam:PF12343
label: DeaD helicase C-terminal disordered region
definition: >-
  This domain is found at the C terminus of the DeaD helicase, which are involved in various cellular processes such as transcription, translation and DNA recombination. This region contains several repeats which contain an ERRE sequence motif.
