identifier: Pfam:PF16031
label: TonB polyproline region
definition: >-
  This entry represents proline-rich segment of Protein TonB from Escherichia coli and similar sequences from enterobacterales. TonB is critical for the uptake of siderophores through the outer membrane using chemiosmotic energy. This region adopts in a PPII-like conformation. This implies that the proline-rich segment of TonB possesses a length of more than 15 nm, sufficient to span the periplasm of Gram-negative bacteria.
