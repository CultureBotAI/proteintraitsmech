identifier: Pfam:PF30576
label: Disordered region of unknown function (DUF8643)
definition: >-
  This entry represents a family of small uncharacterised proteins approximately 85 residues in length that are predicted to be disordered. Members are found in Cyanobacteriota and in cyanophages (Kyanoviridae). The function of this family remains to be determined.
