identifier: Pfam:PF15548
label: Domain of unknown function (DUF4655)
definition: >-
  This entry represents Septin-4 and related proteins. Septin-4 is a filament-forming cytoskeletal GTPase with diverse functions in cell fate regulation, apoptosis, and male fertility. It acts as a pro-apoptotic protein involved in LGR5-positive intestinal stem cell and Paneth cell expansion in the intestines through its interaction with XIAP and may also play a role in the regulation of cell fate in the intestine. Septin-4 functions as a positive regulator of apoptosis involved in haematopoietic stem cell homeostasis via its interaction with XIAP. Additionally, it acts as a negative regulator of repair and hair follicle regeneration in response to injury, due to inhibition of hair follicle stem cell proliferation, potentially through its interaction with XIAP. Septin-4 plays an important role in male fertility and sperm motility. During spermiogenesis, it is essential for the establishment of the annulus, a fibrous ring structure connecting the midpiece and the principal piece of the sperm flagellum, which is a requisite for the structural and mechanical integrity of the sperm. Septin-4 is also involved in the migration of cortical neurons and the formation of neuron leading processes during embryonic development. It is required for dopaminergic metabolism in presynaptic autoreceptors, potentially via activity as a presynaptic scaffold protein.
