identifier: Pfam:PF15437
label: Plasminogen-binding protein pgbA C-terminal
definition: >-
  This entry represents the C-terminal domain of bacterial proteins that bind plasminogen (PgbA and PgbB). This activity was identified in Helicobacter pylori where it is thought to contribute to the virulence of this bacterium. Both PgbA and PgbB are surface-exposed proteins that mediate binding to plasminogen such that it can be converted into plasmin in the presence of a plasminogen activator.
