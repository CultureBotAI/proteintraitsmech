identifier: Pfam:PF21925
label: XRCC4 C-terminal region
definition: >-
  This entry represents the C-terminal disordered region from the XRCC4 protein. This domain acts as an activator of the phospholipid scramblase activity of XKR4. Upon apoptotic stimuli, XRCC4 is cleaved by caspases, and its C-terminal fragment with an intrinsically disordered region is released into the cytoplasm. This fragment interacts directly with the Xkr4 dimer to activate it. DNA repair protein XRCC4 is a DNA non-homologous end joining (NHEJ) core factor, required for double-strand break repair and V(D)J recombination. It acts as a scaffold protein that regulates recruitment of other proteins to DNA double-strand breaks. XRCC4 plays a key role in the NHEJ ligation step of the broken DNA during DSB repair via direct interaction with DNA ligase IV (LIG4): the LIG4-XRCC4 subcomplex reseals the DNA breaks after the gap filling is completed.
