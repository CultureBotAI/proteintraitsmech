identifier: Pfam:PF15512
label: Chromatin assembly factor complex 1 subunit p60, C-terminal
definition: >-
  This entry represents the C-terminal domain of the chromatin assembly factor 1 subunit B (also known as CAF-1 subunit p60), which is one of the three subunits of the CAF-1 complex. This domain binds to the C-terminal region of the CAF-1 subunit A ( ). The N-terminal part of the CAF-1 p60 proteins has a WD-repeat ( ).
