identifier: Pfam:PF25811
label: MAT1 C-terminal CAK anchor
definition: >-
  This entry represents a region, known as CAK anchor, located toward the C-terminal of the human CDK-activating kinase assembly factor MAT1 and related proteins. The CAK anchor region of MAT1 binds between the C-terminal lobes of CDK7 and cyclin H, enhancing CDK7 kinase activity by positioning its activation loop in a catalytically competent conformation. Through these interactions, MAT1 acts as a stabilising factor, tightening the CDK7-cyclin H binary complex. MAT1 (menage a trois 1) is a RING finger protein with a characteristic C3HC4 motif in its N-terminal domain that plays a crucial role in stabilizing the cyclin H-CDK7 complex, forming the functional CDK-activating kinase (CAK) enzymatic complex responsible for activating many CDK enzymes involved in cell cycle regulation. In vivo, CDK7 forms a stable complex with cyclin H and MAT1 only when phosphorylated at either Ser164 or Thr170 in its T-loop; this phosphorylation can bypass the requirement for MAT1 in CAK activation. While MAT1 addition and T-loop phosphorylation can independently stabilize and activate the CDK7 complex in vitro, under physiological conditions these mechanisms cooperate to maintain complex integrity. Notably, if CDK7 becomes dephosphorylated, even the presence of MAT1 cannot prevent dissociation of the complex into monomeric subunits, especially under prolonged elevated temperatures.
