identifier: Pfam:PF02029
label: Caldesmon
definition: >-
  This group of proteins includes two protein families: caldesmon and lymphocyte specific protein. Caldesmon (CDM) is an actin-and myosin-binding protein implicated in the regulation of actomyosin interactions in smooth muscle and non-muscle cells, possibly acting as a bridge between myosin and actin filaments. CDM is believed to be an elongated molecule, with an N-terminal myosin/calmodulin-binding domain and a C-terminal tropomyosin/actin/calmodulin-binding domain, separated by a 40nm-long central helix. A high-molecular-weight form of CDM is predominantly expressed in smooth muscles, while a low-molecular-weight form is widely distributed in non-muscle tissues and cells (the protein is not expressed in skeletal muscle or heart).
