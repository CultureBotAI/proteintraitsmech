identifier: Pfam:PF15350
label: Ewing's tumour-associated antigen 1 homologue
definition: >-
  This entry represents Ewing's tumor-associated antigen 1 (ETAA1) and related proteins from metazoa. This protein contains disordered regions. ETAA1 plays a key role in the cellular response to replication stress by accumulating at DNA damage sites to ensure replication fork progression and stability. It promotes the integrity of stalled forks through its direct interaction with the RPA complex, acting as a platform for the recruitment of checkpoint and repair factors during replication stress. Unlike canonical ATR activators such as TOPBP1, this factor directly stimulates ATR kinase activity via binding to RPA-coated single-stranded DNA, thereby promoting phosphorylation of a specific subset of ATR targets involved in stabilising replication forks and preventing their collapse. It is expressed at high levels in the brain, liver kidney and Ewing tumour cell lines.
