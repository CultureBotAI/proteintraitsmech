identifier: Pfam:PF11636
label: Troponin I residues 1-32
definition: >-
  This family of proteins represents the cardiac N-extension of troponin I. This region of the protein (1-32) interacts with the N-lobe of cTnC and modulates myofilament calcium(2) sensitivity.
