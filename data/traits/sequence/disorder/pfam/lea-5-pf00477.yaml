identifier: Pfam:PF00477
label: Small hydrophilic plant seed protein
definition: >-
  LEA (late embryogenesis abundant) proteins were first identified in land plants. Plant LEA proteins have been found to accumulate to high levels during the last stage of seed formation (when a natural desiccation of the seed tissues takes place) and during periods of water deficit in vegetative organs. Later, LEA homologues have also been found in various species. They have been classified into several subgroups in Pfam and according to Bray and Dure. This entry represents Pfam LEA_5, or D-19 from Dure, or group 1 from Bray. Proteins in this entry includes EM1 (At3g51810) and EM6 (At2g40170) from Arabidopsis. This entry also includes some bacterial hydrophilins. Some proteins in this entry also contain the KGG motif ( ).
