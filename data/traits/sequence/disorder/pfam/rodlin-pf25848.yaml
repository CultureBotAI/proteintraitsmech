identifier: Pfam:PF25848
label: Rodlin protein
definition: >-
  This entry represents a group of proteins from actinomycetes, including Rodlin protein RdlA/B from Streptomyces coelicolor. Both proteins are required for rodlet formation and form part of the rodlet layer on the spore surface. Unlike RdlB, RdlA does not form amyloid fibrils in vitro.
