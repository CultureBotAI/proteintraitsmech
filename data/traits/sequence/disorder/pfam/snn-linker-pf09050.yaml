identifier: Pfam:PF09050
label: Stannin unstructured linker
definition: >-
  This entry represents an unstructured protein region which connects two adjacent stannin helical domains. It contains a conserved CXC metal-binding motif and a putative 14-3-3-zeta binding domain. Upon coordinating dimethytin, considerable structural or dynamic changes in the flexible loop region of SNN may take place, recruiting other binding partners such as 14-3-3-zeta, and thereby initiating the apoptotic cascade.
