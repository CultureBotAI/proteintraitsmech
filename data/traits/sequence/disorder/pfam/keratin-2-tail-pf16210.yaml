identifier: Pfam:PF16210
label: Keratin type II cytoskeletal 1 tail
definition: >-
  All intermediate filament proteins feature a central α-helical rod domain and variable nonhelical domains located at the N-terminal (head) and C-terminal (tail). The central rod domain is the main driver of self-assembly into filaments, whereas the N- and C-terminal domains are involved in post-translational modifications and interactions with other proteins. Keratin 1 (KRT1) belongs to a large family of intermediate filament protein genes and is normally expressed in keratinocytes in the spinous layer of the epidermis. This entry represents the C-terminal domain (tail) of type II keratin KRT1.
