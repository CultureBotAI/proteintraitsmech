identifier: Pfam:PF15483
label: Domain of unknown function (DUF4641)
definition: >-
  This entry represents uncharacterised protein CXorf49 and related proteins. CXorf49 is a human protein encoded by the CXorf49 and CXorf49B genes located on the X chromosome. The protein (exDUF4641) is characterised by multiple disordered regions spanning much of its sequence. Expression data indicate that CXorf49 is enriched in testis tissue. The precise biological function of this protein remains to be determined.
