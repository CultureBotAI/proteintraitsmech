identifier: Pfam:PF02389
label: Cornifin (SPRR) family
definition: >-
  This entry represents Cornifin (SPRR1) and SPRR3. SPRR genes (formerly SPR) encode a novel class of polypeptides (small proline rich proteins) that are strongly induced during differentiation of human epidermal keratinocytes in vitro and in vivo. The most characteristic feature of the SPRR gene family resides in the structure of the central segments of the encoded polypeptides that are built up from tandemly repeated units of either eight (SPRR1 and SPRR3) or nine (SPRR2) amino acids with the general consensus XKXPEPXX where X is any amino acid. The small proline-rich motif in SPRRs plays a critical role in their protein function. This motif, characterised by tandemly repeated units with the consensus sequence KPEP (lysine-proline-glutamic acid-proline), is found in all SPRR family proteins, including SPRR1, SPRR2, and SPRR3. While the central domain is rich in proline, the head and tail domains are enriched with lysine (Lys), serine (Ser), and threonine (Thr) residues, which are known mediators of DNA binding in repressor proteins, suggesting a potential role in DNA interaction. SPRRs are expressed at higher levels during keratinocyte differentiation, contributing to the formation of the cornified cell envelope, although the precise reason for this upregulation remains unclear. Additionally, SPRRs can disrupt bacterial membranes, providing a defence mechanism against pathogens such as Staphylococcus aureus and Pseudomonas aeruginosa.
