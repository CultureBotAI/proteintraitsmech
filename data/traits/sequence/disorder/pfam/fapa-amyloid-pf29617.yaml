identifier: Pfam:PF29617
label: Functional amyloid chaperone FapA
definition: >-
  This entry represents functional amyloid chaperone FapA, a 162-residue intrinsically disordered periplasmic chaperone from Pseudomonas aeruginosa. FapA guards fibril amyloid FapC against fibrillation within the periplasm. Upon overexpression of the fapA-fapF locus, cells form large clumps during liquid growth and produce amyloid fibrils involved in biofilm formation.
