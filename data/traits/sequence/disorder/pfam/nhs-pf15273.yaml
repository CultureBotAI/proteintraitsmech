identifier: Pfam:PF15273
label: NHS-like protein
definition: >-
  Nance-Horan syndrome is an X-linked disorder characterised by congenital cataracts, dental anomalies, dysmorphic features, and, in some cases, mental disabilities. The syndrome is caused by defects in the NHS gene, which appears to play a key role in the regulation of eye, tooth, brain, and craniofacial development. It may function in cell morphology by maintaining the integrity of the circumferential actin ring and controlling lamellipodia formation. However, the protein's exact function is unknown. This entry represents the NHS protein family, which includes Actin remodeling regulator NHS, as well as NHS-like proteins 1, 2 and 3. NHSL3, also known as KIAA1522, has been proposed as a novel prognostic biomarker in patients with non-small cell lung cancer.
