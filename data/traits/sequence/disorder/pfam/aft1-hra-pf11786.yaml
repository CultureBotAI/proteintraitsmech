identifier: Pfam:PF11786
label: Aft1 HRA domain
definition: >-
  This domain is found in the transcription factor Aft1 which is required for a wide range of stress responses. The HRA domain is involved in meiotic recombination. It has been shown to be necessary and sufficient to activate recombination. Atf1 is a bZIP family transcription factor found in the postharvest pathogen Penicillium expansum (blue mould rot fungus). It positively regulates vegetative growth, reproduction, and osmotic stress response. Interestingly, disruption of Atf1 enhances tolerance to oxidative, cell wall, and membrane stresses, suggesting a complex regulatory role in stress responses. The protein contains a characteristic bZIP domain comprising a basic DNA-binding motif and a leucine-zipper region required for dimerisation.
