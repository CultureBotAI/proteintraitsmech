identifier: Pfam:PF06392
label: Acid shock protein
definition: >-
  Acid shock protein is required for growth and/or survival in acidic conditions. It is needed for the adaptation process at pH 4.5 that enables cells to survive at extremely low pH (pH 2.0). The proteins generally consist of a conserved N terminus followed by three disordered repeats.
