identifier: Pfam:PF09041
label: 'Aurora-A binding '
definition: >-
  The Aurora-A binding domain in TPX2 (targeting protein for Xklp2) binds to two distinct sites on the Aurora kinase: the upstream residues bind at the N-terminal lobe, whilst the downstream residues bind in an α-helical conformation between the N- and C-terminal lobes. The two Aurora-A binding motifs are connected by a flexible linker that is variable in length and sequence across species. Binding of the domain results strong activation of Aurora-A and protection from deactivating dephosphorylation by phosphatase PP1.
