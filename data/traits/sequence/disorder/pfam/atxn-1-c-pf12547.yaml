identifier: Pfam:PF12547
label: Ataxin-1 like family
definition: >-
  This entry represents the N-terminal domain of Ataxin-1, which directly binds Capicua and modulates Capicua repressor activity in Drosophila and mammalian cells. It is also thought to be involved in RNA metabolism and the expansion of the polyglutamine tract may alter this function. Ataxin-1 is typically between 49 and 781 amino acids in length and have a conserved IQT sequence motif. The polyglutamine expanded mutant type of Ataxin-1 does not bind Capicua with as high affinity as wild-type Ataxin-1. It is associated with spinocerebellar ataxia type 1 (SCA1).
