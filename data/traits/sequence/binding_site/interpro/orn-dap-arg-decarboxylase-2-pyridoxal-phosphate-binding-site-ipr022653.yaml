identifier: InterPro:IPR022653
label: "Orn/DAP/Arg decarboxylase 2, pyridoxal-phosphate binding site"
definition: >-
  These enzymes are collectively known as group IV decarboxylases. Pyridoxal-dependent decarboxylases acting on ornithine, lysine, arginine and related substrates can be classified into two different families on the basis of sequence similarities. Members of this family while most probably evolutionary related, do not share extensive regions of sequence similarities. This site contains a conserved lysine residue which is known, in mouse ODC, to be the site of attachment of the pyridoxal-phosphate group.
