identifier: InterPro:IPR018527
label: Rubredoxin, iron-binding site
definition: >-
  Rubredoxin is a low molecular weight iron-containing protein involved in electron transfer, sometimes replacing ferredoxin as an electron carrier. It is found in bacteria, archaea and plants. The 3-D structures of a number of rubredoxins have been solved. The fold belongs to the α+β class, with 2 α-helices and 2-3 β-strands. Its active site contains an iron ion which is co-ordinated by the sulphurs of four conserved cysteine residues forming an almost regular tetrahedron. The conserved cysteines reside on two loops, which are the most conserved regions of the protein. In addition, a ring of acidic residues in the proximity of the [Fe(Cys)4] centre is also well-conserved. This entry represents a conserved region which includes two of the cysteine residues that bind the iron atom.
