identifier: InterPro:IPR003016
label: "2-oxo acid dehydrogenase, lipoyl-binding site"
definition: >-
  The 2-oxo acid dehydrogenase multienzyme complexes from bacterial and eukaryotic sources catalyse the oxidative decarboxylation of 2-oxo acids to the corresponding acyl-CoA. These include: Pyruvate dehydrogenase complex (PDC). 2-oxoglutarate dehydrogenase complex (OGDC). Branched-chain 2-oxo acid dehydrogenase complex (BCOADC). These three complexes share a common architecture: they are composed of multiple copies of three component enzymes - E1, E2 and E3. E1 is a thiamine pyrophosphate-dependent 2-oxo acid dehydrogenase, E2 a dihydrolipamide acyltransferase, and E3 an FAD-containing dihydrolipamide dehydrogenase.
