identifier: InterPro:IPR000634
label: Serine/threonine dehydratase, pyridoxal-phosphate-binding site
definition: >-
  Pyridoxal phosphate is the active form of vitamin B6 (pyridoxine or pyridoxal). Pyridoxal 5'-phosphate (PLP) is a versatile catalyst, acting as a coenzyme in a multitude of reactions, including decarboxylation, deamination and transamination. PLP-dependent enzymes are primarily involved in the biosynthesis of amino acids and amino acid-derived metabolites, but they are also found in the biosynthetic pathways of amino sugars and in the synthesis or catabolism of neurotransmitters; pyridoxal phosphate can also inhibit DNA polymerases and several steroid receptors. Inadequate levels of pyridoxal phosphate in the brain can cause neurological dysfunction, particularly epilepsy. PLP enzymes exist in their resting state as a Schiff base, the aldehyde group of PLP forming a linkage with the ε-amino group of an active site lysine residue on the enzyme. The α-amino group of the substrate displaces the lysine ε-amino group, in the process forming a new aldimine with the substrate. This aldimine is the common central intermediate for all PLP-catalysed reactions, enzymatic and non-enzymatic. Serine and threonine dehydratases are functionally and structurally related pyridoxal-phosphate dependent enzymes. L-serine dehydratase and D-serine dehydratase catalyse the dehydratation of L-serine (respectively D-serine) into ammonia and pyruvate. Threonine dehydratase (TDH) catalyses the dehydratation of threonine into alpha-ketobutarate and ammonia. In Escherichia coli and other microorganisms, two classes of TDH are known to exist. One is involved in the biosynthesis of isoleucine, the other in hydroxamino acid catabolism. Threonine synthase is also a pyridoxal-phosphate enzyme, it catalyses the transformation of homoserine-phosphate into threonine. It has been shown that…
