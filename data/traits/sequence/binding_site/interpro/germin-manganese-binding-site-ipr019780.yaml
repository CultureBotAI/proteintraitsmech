identifier: InterPro:IPR019780
label: Germin, manganese binding site
definition: >-
  Germins and germin-like proteins are a family of hexameric ubiquitous plant glycoproteins. They are not restricted to germinating grains as initially thought and therefore called 'germins', but they exist in all organs and developmental stages. They are all partly associated with the extracellular matrix. A wide range of functions have been uncovered for germins and germin-like proteins: some act as oxalate oxidases or as superoxide dismutases, while others seem to be structural proteins or receptors for auxins or other proteins. Germins and germin-like proteins are highly similar to slime mold spherulins 1a and 1b which are proteins that accumulate specifically during spherulation, a process induced by various forms of environmental stress which leads to encystment and dormancy.
