identifier: InterPro:IPR057663
label: "TACC3, Aurora-A binding region"
definition: >-
  This region is found in the human Transforming acidic coiled-coil-containing protein 3 (TACC3) and homologues. Phosphorylation of human TACC3 on S558 (located within this region) drives an interaction with the ankle region of the clathrin heavy chain (CHC) to form a complex that binds the microtubule lattice through the coiled-coil region of TACC3 and the β-propeller domain of CHC. TACC3 is also an Aurora-A activator and binds Aurora-A through a region N-terminal to the Ser558 phosphorylation site. Phosphorylation of Ser558 switches the local conformation of TACC3 from disordered to helical.
