identifier: InterPro:IPR001917
label: Aminotransferase, class-II, pyridoxal-phosphate binding site
definition: >-
  Aminotransferases share certain mechanistic features with other pyridoxal-phosphate dependent enzymes, such as the covalent binding of the pyridoxal-phosphate group to a lysine residue. On the basis of sequence similarity, these various enzymes can be grouped into subfamilies. One of these, is called class-II. It consists of Serine palmitoyltransferase, Histidinol-phosphate aminotransferase, Glycine acetyltransferase ), 5-aminolevulinic acid synthase and 8-amino-7-oxononanoate synthase. The crystal structures of a number of the aminotransferases have been determined including the structure of l-histidinol phosphate aminotransferase from Escherichia coli (HisC). HisC is a dimeric enzyme with a mass of approximately 80kDa. Like most pyridoxal-5'-phosphate (PLP)-dependent enzymes, each HisC monomer consists of two domains, a larger PLP-binding domain having an α/β/α topology, and a smaller domain. The N-terminal arm contributes to the dimerization of the two monomers. The PLP-binding domain of HisC shows weak sequence similarity, but significant structural similarity with the PLP-binding domains of a number of PLP-dependent enzymes.
