identifier: InterPro:IPR057662
label: "CEP192, Aurora A binding region"
definition: >-
  This region is found in human Centrosomal protein 192 kDa (CEP192) and homologues. CEP192 modulate both the Aurora A kinase activity and localisation. This region of CEP192 wraps around Aurora A and occupies the binding sites for the mitotic spindle-associated partners, TACC3 and TPX2, thus competing with them. This region binds the F-pocket/C-helix region of the N-lobe in a way that inhibits Aurora A, whereas TPX2 binding to the same region activates the kinase. The centrosomal CEP192-Aurora-A complex is the primary driver of Aurora-A auto-phosphorylation during mitosis.
