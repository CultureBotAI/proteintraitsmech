identifier: ELM:ELME000070
label: MOD_N-GLC_1
definition: >-
  N-glycosylation site — Generic motif for N-glycosylation. It was shown that Trp, Asp, and Glu are uncommon before the Ser/Thr position. Efficient glycosylation usually occurs when ~60 residues or more separate the glycosylation acceptor site from the C-terminus.
