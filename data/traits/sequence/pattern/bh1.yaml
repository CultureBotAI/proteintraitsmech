identifier: PROSITE:PS01080
label: Apoptosis regulator, Bcl-2 family BH1 motif signature
definition: >-
  Apoptosis regulator proteins, Bcl-2 family BH motifs signatures/profiles. Active cell suicide (apoptosis) is induced by events such as growth factor withdrawal and toxins. It is controlled by regulators, which have either an inhibitory effect on programmed cell death (anti-apoptotic) or block the protective effect of inhibitors (pro-apoptotic). Many viruses have found a way of countering defensive apoptosis by encoding their own anti-apoptosis genes preventing their target-cells from dying too soon.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
