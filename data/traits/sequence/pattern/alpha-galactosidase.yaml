identifier: PROSITE:PS00512
label: Alpha-galactosidase signature
definition: >-
  Alpha-galactosidase signature. Alpha-galactosidase (EC 3.2.1.22) (melibiase) catalyzes the hydrolysis of melibiose into galactose and glucose. In man, the deficiency of this enzyme is the cause of Fabry's disease (X-linked sphingolipidosis). Alpha-galactosidase is present in a variety of organisms. There is a considerable degree of similarity in the sequence of alpha-galactosidase from various eukaryotic species.
