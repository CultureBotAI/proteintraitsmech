identifier: PROSITE:PS00272
label: Snake toxins signature
definition: >-
  Snake toxins signature. Snake toxins belong to a family of proteins which groups short and long neurotoxins, cytotoxins and short toxins, as well as a other miscellanous venom peptides. Most of these toxins act by binding to the nicotinic acetylcholine receptors in the postsynaptic membrane of skeletal muscles and prevent the binding of acetylcholine, thereby blocking the excitation of muscles.
