identifier: PROSITE:PS01321
label: Crossover junction endodeoxyribonuclease ruvC signature
definition: >-
  Crossover junction endodeoxyribonuclease ruvC signature. RuvC (EC 3.1.22.4) is a bacterial nuclease that resolves Holliday junction intermediates in genetic recombination. It cleaves the cruciform structure in supercoiled DNA by nicking to strands with the same polarity at sites symmetrically opposed at the junction in the homologous arms and leaves a 5'terminal phosphate and a 3'terminal hydroxyl group.
