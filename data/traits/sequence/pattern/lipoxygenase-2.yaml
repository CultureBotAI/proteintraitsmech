identifier: PROSITE:PS00081
label: Lipoxygenases iron-binding region signature 2
definition: >-
  Lipoxygenase iron-binding catalytic domain signatures and profile. Lipoxygenases (EC 1.13.11.-) are a class of iron-containing dioxygenases which catalyzes the hydroperoxidation of lipids, containing a cis,cis-1,4- pentadiene structure. The primary products are hydroperoxy fatty acids, which usually are rapidly reduced to hydroxy derivatives. Lipoxygenases are common in plants where they may be involved in a number of diverse aspects of plant physiology including growth and development, pest resistance, and senescence or responses to wounding. In mammals a number of lipoxygenases isozymes are involved in the metabolism of prostaglandins and leukotrienes.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
