identifier: PROSITE:PS00680
label: Methionine aminopeptidase subfamily 1 signature
definition: >-
  Methionine aminopeptidase signatures. Methionine aminopeptidase (EC 3.4.11.18) (MAP) is responsible for the removal of the amino-terminal (initiator) methionine from nascent eukaryotic cytosolic and cytoplasmic prokaryotic proteins if the penultimate amino acid is small and uncharged. All MAP studied to date are monomeric proteins that require cobalt ions for activity.
