identifier: PROSITE:PS00373
label: Phosphoribosylglycinamide formyltransferase active site
definition: >-
  Phosphoribosylglycinamide formyltransferase active site. Phosphoribosylglycinamide formyltransferase (EC 2.1.2.2) (GART) catalyzes the third step in de novo purine biosynthesis, the transfer of a formyl group to 5'-phosphoribosylglycinamide. In higher eukaryotes, GART is part of a multifunctional enzyme polypeptide that catalyzes three of the steps of purine biosynthesis. In bacteria, plants and yeast, GART is a monofunctional protein of about 200 amino-acid residues.
