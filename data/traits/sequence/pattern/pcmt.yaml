identifier: PROSITE:PS01279
label: Protein-L-isoaspartate(D-aspartate) O-methyltransferase signature
definition: >-
  Protein-L-isoaspartate(D-aspartate) O-methyltransferase signature. Protein-L-isoaspartate(D-aspartate) O-methyltransferase (EC 2.1.1.77) (PCMT) (which is also known as L-isoaspartyl protein carboxyl methyltransferase) is an enzyme that catalyzes the transfer of a methyl group from S- adenosylmethionine to the free carboxyl groups of D-aspartyl or L-isoaspartyl residues in a variety of peptides and proteins. The enzyme does not act on normal L-aspartyl residues L-isoaspartyl and D-aspartyl are the products of the spontaneous deamidation and/or isomerization of normal L-aspartyl and L- asparaginyl residues in proteins.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
