identifier: PROSITE:PS00169
label: Delta-aminolevulinic acid dehydratase active site
definition: >-
  Delta-aminolevulinic acid dehydratase active site. Delta-aminolevulinic acid dehydratase (EC 4.2.1.24) (ALAD) catalyzes the second step in the biosynthesis of heme, the condensation of two molecules of 5-aminolevulinate to form porphobilinogen. The enzyme is an oligomer composed of eight identical subunits. Each of the subunits binds an atom of zinc or of magnesium (in plants). A lysine has been implicated in the catalytic mechanism. The sequence of the region in the vicinity of the active site residue is conserved in ALAD from various prokaryotic and eukaryotic species.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
