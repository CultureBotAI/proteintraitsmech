identifier: PROSITE:PS00764
label: Endonuclease III iron-sulfur binding region signature
definition: >-
  Endonuclease III signatures. Escherichia coli endonuclease III (EC 4.2.99.18) (gene nth) is a DNA repair enzyme that acts both as a DNA N-glycosylase, removing oxidized pyrimidines from DNA, and as an apurinic/apyrimidinic (AP) endonuclease, introducing a single-strand nick at the site from which the damaged base was removed. Endonuclease III is an iron-sulfur protein that binds a single 4Fe-4S cluster. The 4Fe-4S cluster does not seem to be important for catalytic activity, but is probably involved in the proper positioning of the enzyme along the DNA strand.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
trait_axis: SEQUENCE
trait_category: SEQ_MOTIF
term_kind: CLASS
mapping_status: SEEDED
