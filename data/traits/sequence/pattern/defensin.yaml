identifier: PROSITE:PS00269
label: Mammalian defensins signature
definition: >-
  Mammalian defensins signature. Defensins, also known as alpha-defensins, are a family of structurally related cysteine-rich peptides active against many Gram-negative and Gram-positive bacteria, fungi, and enveloped viruses. Some defensins are also called corticostatins (CS) because they inhibit corticotropin-stimulated corticosteroid production. Defensins kills cells by forming voltage-regulated multimeric channels in the susceptible cell's membrane. They play a significant role in innate immunity to infection and neoplasia. The peptides known to belong to this family are listed below.
