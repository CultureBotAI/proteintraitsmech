identifier: PROSITE:PS01311
label: Prolipoprotein diacylglyceryl transferase signature
definition: >-
  Prolipoprotein diacylglyceryl transferase signature. Prolipoprotein diacylglyceryl transferase is the bacterial enzyme that catalyzes the first step in lipoprotein biogenesis, it transfers the n-acyl diglyceride group on what will become the N-terminal cysteine of membrane lipoproteins. Prolipoprotein diacylglyceryl transferase (gene lgt) is an integral membrane protein.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
