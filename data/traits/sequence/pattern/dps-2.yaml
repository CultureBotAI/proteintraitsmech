identifier: PROSITE:PS00819
label: Dps protein family signature 2
definition: >-
  Dps protein family signatures. Escherichia coli protein dps is a DNA-binding protein, synthesized during prolonged starvation, that seems to protect DNA from oxidative damage. Dps binds DNA without any apparent sequence specificity. It is a protein of about 19 Kd that associates into a complex of 12 subunits forming two stacked hexameric rings.
