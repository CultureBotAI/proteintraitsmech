identifier: PROSITE:PS00452
label: Guanylate cyclase signature
definition: >-
  Guanylate cyclase domain signature and profile. Guanylate cyclases (EC 4.6.1.2) catalyze the formation of cyclic GMP (cGMP) from GTP. cGMP acts as an intracellular messenger, activating cGMP- dependent kinases and regulating CGMP-sensitive ion channels. The role of cGMP as a second messenger in vascular smooth muscle relaxation and retinal photo- transduction is well established. Guanylate cyclase is found both in the soluble and particular fraction of eukaryotic cells. The soluble and plasma membrane-bound forms differ in structure, regulation and other properties.
