identifier: PROSITE:PS60015
label: Mu-agatoxin family signature
definition: >-
  Mu-agatoxin family signature. Spider mu-agatoxins are cysteine-rich insecticidal polypeptides, which cause gradual but irreversible paralysis. These toxins cause repetitive firing and massive transmitter release (which is mediated by glutamate receptors) from presynaptic stores at neuromuscular junctions.
