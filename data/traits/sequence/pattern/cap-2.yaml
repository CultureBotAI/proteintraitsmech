identifier: PROSITE:PS01089
label: CAP protein signature 2
definition: >-
  CAP protein signatures. In budding and fission yeasts the CAP protein is a bifunctional protein whose N-terminal domain binds to adenylyl cyclase, thereby enabling that enzyme to be activated by upstream regulatory signals, such as Ras. The function of the C-terminal domain is less clear, but it is required for normal cellular morphology and growth control. CAP is conserved in higher eukaryotic organisms where its function is not yet clear.
