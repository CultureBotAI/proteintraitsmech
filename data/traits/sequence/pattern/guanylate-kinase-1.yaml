identifier: PROSITE:PS00856
label: Guanylate kinase-like signature
definition: >-
  Guanylate kinase-like signature and profile. Guanylate kinase (EC 2.7.4.8) (GK) catalyzes the ATP-dependent phosphorylation of GMP into GDP. It is essential for recycling GMP and indirectly, cGMP. In prokaryotes (such as Escherichia coli), lower eukaryotes (such as yeast) and in vertebrates, GK is a highly conserved monomeric protein of about 200 amino acids. GK has been shown to be structurally similar to the following proteins:
