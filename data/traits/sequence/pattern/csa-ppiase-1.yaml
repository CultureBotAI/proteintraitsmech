identifier: PROSITE:PS00170
label: Cyclophilin-type peptidyl-prolyl cis-trans isomerase signature
definition: >-
  Cyclophilin-type peptidyl-prolyl cis-trans isomerase signature & profile. Cyclophilin is the major high-affinity binding protein in vertebrates for the immunosuppressive drug cyclosporin A (CSA). It exhibits a peptidyl- prolyl cis-trans isomerase activity (EC 5.2.1.8) (PPIase or rotamase). PPIase is an enzyme that accelerates protein folding by catalyzing the cis-trans isomerization of proline imidic peptide bonds in oligopeptides. It is probable that CSA mediates some of its effects via an inhibitory action on PPIase. Cyclophilin is a cytosolic protein which belongs to a family that also includes the following isozymes:
