identifier: PROSITE:PS00505
label: Phosphoenolpyruvate carboxykinase (GTP) signature
definition: >-
  Phosphoenolpyruvate carboxykinase (GTP) signature. Phosphoenolpyruvate carboxykinase (GTP) (EC 4.1.1.32) (PEPCK) catalyzes the formation of phosphoenolpyruvate by decarboxylation of oxaloacetate while hydrolyzing GTP, a rate limiting step in gluconeogenesis (the biosynthesis of glucose). In vertebrates there are two isozymes: a cytosolic form whose activity is affected by hormones regulating this metabolic process (such as glucagon, or insulin) and a mitochondrial form.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
