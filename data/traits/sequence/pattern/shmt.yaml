identifier: PROSITE:PS00096
label: Serine hydroxymethyltransferase pyridoxal-phosphate attachment site
definition: >-
  Serine hydroxymethyltransferase pyridoxal-phosphate attachment site. Serine hydroxymethyltransferase (EC 2.1.2.1) (SHMT) catalyzes the transfer of the hydroxymethyl group of serine to tetrahydrofolate to form 5,10- methylenetetrahydrofolate and glycine. In vertebrates, it exists in a cytoplasmic and a mitochondrial form whereas only one form is found in prokaryotes. Serine hydroxymethyltransferase is a pyridoxal-phosphate containing enzyme. The pyridoxal-P group is attached to a lysine residue around which the sequence is highly conserved in all forms of the enzyme.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
