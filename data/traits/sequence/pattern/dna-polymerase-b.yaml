label: DNA polymerase family B signature
definition: >-
  DNA polymerase family B signature. Replicative DNA polymerases (EC 2.7.7.7) are the key enzymes catalyzing the accurate replication of DNA. They require either a small RNA molecule or a protein as a primer for the de novo synthesis of a DNA chain. On the basis of sequence similarity, a number of DNA polymerases have been grouped under the designation of DNA polymerase family B. These are:
