identifier: PROSITE:PS00411
label: Kinesin motor domain signature
definition: >-
  Kinesin motor domain signature and profile. The two major families of eukaryotic cellular motor ATPases, kinesin and myosin, constitute the myosin-kinesin superfamily within the TRAFAC class of GTPases. The ATPase domain of myosins along with that of the kinesin family of microtubule based motors is believed to have evolved from the core GTPase domain through deletion of strands 6 and 7 and addition of two N-terminal strands. Kinesin is a microtubule-associated force-producing protein that may play a role in organelle transport. Kinesin is an oligomeric complex composed of two heavy chains and two light chains. The kinesin motor activity is directed toward the microtubule's plus end.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
