label: Sugar transport proteins signature 2
definition: >-
  Sugar transport proteins signatures. In mammalian cells the uptake of glucose is mediated by a family of closely related transport proteins which are called the glucose transporters. At least seven of these transporters are currently known to exist (in Human they are encoded by the GLUT1 to GLUT7 genes).
