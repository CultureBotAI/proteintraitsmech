identifier: PROSITE:PS00120
label: Lipases, serine active site
definition: >-
  Lipases, serine active site. Triglyceride lipases (EC 3.1.1.3) are lipolytic enzymes that hydrolyzes the ester bond of triglycerides. Lipases are widely distributed in animals, plants and prokaryotes. In higher vertebrates there are at least three tissue- specific isozymes: pancreatic, hepatic, and gastric/lingual. These three types of lipases are closely related to each other as well as to lipoprotein lipase (EC 3.1.1.34), which hydrolyzes triglycerides of chylomicrons and very low density lipoproteins (VLDL).
definition_source: Prosite Release 2026_02 of 10-Jun-2026
