identifier: PROSITE:PS00029
label: Leucine zipper pattern
definition: >-
  Leucine zipper pattern. A structure, referred to as the 'leucine zipper', has been proposed to explain how some eukaryotic gene regulatory proteins work. The leucine zipper consist of a periodic repetition of leucine residues at every seventh position over a distance covering eight helical turns. The segments containing these periodic arrays of leucine residues seem to exist in an alpha-helical conformation. The leucine side chains extending from one alpha-helix interact with those from a similar alpha helix of a second polypeptide, facilitating dimerization; the structure formed by cooperation of these two regions forms a coiled coil.
