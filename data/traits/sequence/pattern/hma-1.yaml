identifier: PROSITE:PS01047
label: Heavy-metal-associated domain
definition: >-
  Heavy-metal-associated domain signature and profile. To avoid nonspecific and/or undesirable binding and reactivity of metal ions with cellular components, organisms have evolved metal-specific systems for trafficking proteins. Although systems differ, those handling soft metal ions such as Hg(2+), Cu(+), Zn(2+), etc., all utilize heavy metal-associated (HMA) proteins and domains of ~70 amino acids with a conserved GMXCXXC motif in a BetaAlphaBetaBetaAlphaBeta structural fold. While the conserved cysteines define a common metal binding site in these proteins, other structural features must be utilized to create metal ion, protein partner, and contextual specificities.
