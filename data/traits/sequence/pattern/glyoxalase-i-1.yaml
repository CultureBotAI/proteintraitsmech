identifier: PROSITE:PS00934
label: Glyoxalase I signature 1
definition: >-
  Glyoxalase I signatures. Glyoxalase I (EC 4.4.1.5) (lactoylglutathione lyase) catalyzes the first step of the glyoxal pathway, the transformation of methylglyoxal and glutathione into S-lactoylglutathione which is then converted by glyoxalase II to lactic acid. Glyoxalase I is an ubiquitous enzyme which binds one mole of zinc per subunit. The bacterial and yeast enzymes are monomeric while the mammalian one is homodimeric.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
