identifier: PROSITE:PS00367
label: Biopterin-dependent aromatic amino acid hydroxylases signature
definition: >-
  Tetrahydrobiopterin-dependent aromatic amino acid hydroxylase family signature and profile. Hydroxylation of the aromatic amino acids phenylalanine, tyrosine and tryptophan is carried out by a family of non-heme iron and tetrahydrobiopterin (BH4) dependent enzymes: the aromatic amino acid hydroxylase. These enzymes are structurally and functionally similar. The eukaryotic forms include a regulatory N-terminal domain, a catalytic domain and a C-terminal oligomerization motif. The eukaryotic enzymes are all homotetramers.
