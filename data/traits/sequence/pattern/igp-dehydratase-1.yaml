identifier: PROSITE:PS00954
label: Imidazoleglycerol-phosphate dehydratase signature 1
definition: >-
  Imidazoleglycerol-phosphate dehydratase signatures. Imidazoleglycerol-phosphate dehydratase (EC 4.2.1.19) is the enzyme that catalyzes the seventh step in the biosynthesis of histidine in bacteria, fungi and plants. In most organisms it is a monofunctional protein of about 22 to 29 Kd. In some bacteria such as Escherichia coli it is the C-terminal domain of a bifunctional protein that include a histidinol-phosphatase domain.
