identifier: PROSITE:PS01160
label: Kinesin light chain repeat
definition: >-
  Kinesin light chain repeat. Kinesin is a microtubule-associated force-producing protein that may play a role in organelle transport. Kinesin is an oligomeric complex composed of two heavy chains and two light chains. The light chain has been proposed to function in the coupling of cargo to the heavy chain or in the modulation of its ATPase activity. It is a well conserved protein which is composed of a core that consist of a coiled-coil domain followed by four imperfect tandem repeats of a 42 residue domain. The N- and C-termini are more variable and alternative splicing is responsible for the production of isoforms that differ in those two regions.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
