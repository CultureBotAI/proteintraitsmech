identifier: PROSITE:PS00540
label: Ferritin iron-binding regions signature 1
definition: >-
  Ferritin iron-binding regions signatures. Ferritin is one of the major non-heme iron storage proteins. It consists of a mineral core of hydrated ferric oxide, and a multi-subunit protein shell which englobes the former and assures its solubility in an aqueous environment.
