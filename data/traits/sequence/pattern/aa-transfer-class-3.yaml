identifier: PROSITE:PS00600
label: Aminotransferases class-III pyridoxal-phosphate attachment site
definition: >-
  Aminotransferases class-III pyridoxal-phosphate attachment site. Aminotransferases share certain mechanistic features with other pyridoxal- phosphate dependent enzymes, such as the covalent binding of the pyridoxal- phosphate group to a lysine residue. On the basis of sequence similarity, these various enzymes can be grouped into subfamilies. One of these, called class-III, currently consists of the following enzymes:
