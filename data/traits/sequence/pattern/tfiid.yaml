identifier: PROSITE:PS00351
label: Transcription factor TFIID repeat signature
definition: >-
  Transcription factor TFIID repeat signature. Transcription factor TFIID (or TATA-binding protein, TBP) is a general factor that plays a major role in the activation of eukaryotic genes transcribed by RNA polymerase II. TFIID binds specifically to the TATA box promoter element which lies close to the position of transcription initiation.
