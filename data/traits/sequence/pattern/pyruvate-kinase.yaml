identifier: PROSITE:PS00110
label: Pyruvate kinase active site signature
definition: >-
  Pyruvate kinase active site signature. Pyruvate kinase (EC 2.7.1.40) (PK) catalyzes the final step in glycolysis, the conversion of phosphoenolpyruvate to pyruvate with the concomitant phosphorylation of ADP to ATP. PK requires both magnesium and potassium ions for its activity. PK is found in all living organisms. In vertebrates there are four, tissues specific, isozymes: L (liver), R (red cells), M1 (muscle, heart, and brain), and M2 (early fetal tissues). In Escherichia coli there are two isozymes: PK-I (gene pykF) and PK-II (gene pykA). All PK isozymes seem to be tetramers of identical subunits of about 500 amino acid residues.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
