identifier: PROSITE:PS00176
label: Topoisomerase (Topo) IB-type active site signature
definition: >-
  Topoisomerase (Topo) IB-type active site signature and catalytic domain profile. DNA topoisomerases (Topos) are enzymes that solve topological problems associated with important processes such as DNA replication, transcription, recombination and chromatin remodeling by introducing transient single or double stranded breaks in the DNA and releasing accumulated strain. They may have appeared early during the formation of the modern DNA world. Several families and subfamilies of the two types of DNA topoisomerases (I and II) have been described in the three cellular domains of life (Archaea, Bacteria and Eukarya), as well as in viruses infecting eukaryotes or bacteria.
