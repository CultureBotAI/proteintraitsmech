identifier: PROSITE:PS00555
label: Plant viruses icosahedral capsid proteins 'S' region signature
definition: >-
  Plant viruses icosahedral capsid proteins 'S' region signature. The capsid protein of plant icosahedral positive strand RNA viruses generally consists of four distinct domains: an N-terminal positively charged 'R' domain involved in the interaction with RNA, a connecting arm 'a', a central domain 'S' forming the virion shell, and a C-terminal projecting 'P' domain. Some of the viruses lack either the R or P domains.
