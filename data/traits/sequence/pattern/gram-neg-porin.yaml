identifier: PROSITE:PS00576
label: General diffusion Gram-negative porins signature
definition: >-
  General diffusion Gram-negative porins signature. The outer membrane of Gram-negative bacteria acts as a molecular filter for hydrophilic compounds. Proteins, known as porins, are responsible for the 'molecular sieve' properties of the outer membrane. Porins form large water- filled channels which allows the diffusion of hydrophilic molecules into the periplasmic space. Some porins form general diffusion channels that allows any solutes up to a certain size (that size is known as the exclusion limit) to cross the membrane, while other porins are specific for a solute and contain a binding site for that solute inside the pores (these are known as selective porins).
definition_source: Prosite Release 2026_02 of 10-Jun-2026
trait_axis: SEQUENCE
trait_category: SEQ_MOTIF
term_kind: CLASS
