identifier: PROSITE:PS01099
label: Respiratory-chain NADH dehydrogenase 24 Kd subunit signature
definition: >-
  Respiratory-chain NADH dehydrogenase 24 Kd subunit signature. Respiratory-chain NADH dehydrogenase (EC 1.6.5.3) (also known as complex I or NADH-ubiquinone oxidoreductase) is an oligomeric enzymatic complex located in the inner mitochondrial membrane which also seems to exist in the chloroplast and in cyanobacteria (as a NADH-plastoquinone oxidoreductase). Among the 25 to 30 polypeptide subunits of this bioenergetic enzyme complex there is one with a molecular weight of 24 Kd (in mammals), which is a component of the iron-sulfur (IP) fragment of the enzyme. It seems to bind a 2Fe-2S iron-sulfur cluster.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
