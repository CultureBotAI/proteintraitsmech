identifier: PROSITE:PS00345
label: Ets-domain signature 1
definition: >-
  Ets-domain signatures and profile. Avian leukemia virus E26 is a replication defective retrovirus that induces a mixed erythroid/myeloid leukemia in chickens. E26 virus carries two distinct oncogenes, v-myb and v-ets. The ets portion of this oncogene is required for the induction of erythroblastosis. V-ets and c-ets-1, its cellular progenitor, have been shown to be nuclear DNA-binding proteins. Ets-1 differs slightly from v-ets at its carboxy-terminal region. In most species where it has been sequenced, c-ets-1 exists in various isoforms generated by alternative splicing and differential phosphorylation.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
