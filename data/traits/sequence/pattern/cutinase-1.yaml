identifier: PROSITE:PS00155
label: Cutinase, serine active site
definition: >-
  Cutinase active sites signatures. Cutinase is an extracellular fungal enzyme that catalyzes the hydrolysis of cutin, an insoluble lipid-polyester that forms the structure of plant cuticle. Cutinase allows pathogenic fungi to penetrate through the host plant cuticular barrier during the initial stage of fungal infection. Cutinase is a serine esterase which contains the classical catalytic triad (Asp, Ser, and His) found in the serine hydrolases.
