identifier: PROSITE:PS00855
label: Signal peptidases II signature
definition: >-
  Signal peptidases II signature. Signal peptidases (SPases) (also known as leader peptidases) remove the signal peptides from secretory proteins. In prokaryotes three types of SPases are known: type I (gene lepB) which is responsible for the processing of the majority of exported pre-proteins; type II (gene lsp) which only process lipoproteins, and a third type involved in the processing of pili subunits.
