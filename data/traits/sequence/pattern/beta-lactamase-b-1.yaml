identifier: PROSITE:PS00743
label: Beta-lactamases class B signature 1
definition: >-
  Beta-lactamases class B signatures. Beta-lactamases (EC 3.5.2.6) are enzymes which catalyze the hydrolysis of an amide bond in the beta-lactam ring of antibiotics belonging to the penicillin/cephalosporin family. Four kinds of beta-lactamase have been identified. Class-B enzymes are zinc containing proteins whilst class -A, C and D enzymes are serine hydrolases. Class-B beta-lactamases have been described in several Gram-negative bacterial species; they seem to share the characteristic of being able to hydrolyze carbapenem compounds which are new beta-lactam antibiotics of great therapeutic potential.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
