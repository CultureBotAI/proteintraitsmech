identifier: PROSITE:PS00666
label: Dihydrodipicolinate synthase signature 2
definition: >-
  Dihydrodipicolinate synthase signatures. Dihydrodipicolinate synthase (EC 4.2.1.52) (DHDPS) catalyzes, in higher plants chloroplast and in many bacteria (gene dapA), the first reaction specific to the biosynthesis of lysine and of diaminopimelate. DHDPS is responsible for the condensation of aspartate semialdehyde and pyruvate by a ping-pong mechanism in which pyruvate first binds to the enzyme by forming a Schiff-base with a lysine residue.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
