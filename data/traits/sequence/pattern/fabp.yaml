identifier: PROSITE:PS00214
label: Cytosolic fatty-acid binding proteins signature
definition: >-
  Cytosolic fatty-acid binding proteins signature. A number of low molecular weight proteins which bind fatty acids and other organic anions are present in the cytosol. Most of them are structurally related and have probably diverged from a common ancestor. This structure is a ten stranded antiparallel beta-barrel, albeit with a wide discontinuity between the fourth and fifth strands, with a repeated + 1 topology enclosing a internal ligand binding site. Proteins known to belong to this family include:
