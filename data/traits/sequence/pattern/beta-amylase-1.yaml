identifier: PROSITE:PS00506
label: Beta-amylase active site 1
definition: >-
  Beta-amylase active sites. Beta-amylase (EC 3.2.1.2) is an enzyme that hydrolyzes 1,4-alpha- glucosidic linkages in starch-type polysaccharide substrates so as to remove successive maltose units from the non-reducing ends of the chains. Beta- amylase is present in certain bacteria as well as in plants.
