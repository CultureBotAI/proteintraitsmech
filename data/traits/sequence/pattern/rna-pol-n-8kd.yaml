identifier: PROSITE:PS01112
label: RNA polymerases N / 8 Kd subunits signature
definition: >-
  RNA polymerases N / 8 Kd subunits signature. In eukaryotes, there are three different forms of DNA-dependent RNA polymerases (EC 2.7.7.6) transcribing different sets of genes. Each class of RNA polymerase is an assemblage of ten to twelve different polypeptides. In archaebacteria, there is generally a single form of RNA polymerase which also consist of an oligomeric assemblage of 10 to 13 polypeptides.
