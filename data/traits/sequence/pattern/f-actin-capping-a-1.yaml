identifier: PROSITE:PS00748
label: F-actin capping protein alpha subunit signature 1
definition: >-
  F-actin capping protein alpha subunit signatures. The F-actin capping protein binds in a calcium-independent manner to the fast growing ends of actin filaments (barbed end) thereby blocking the exchange of subunits at these ends. Unlike gelsolin and severin this protein does not sever actin filaments. The F-actin capping protein is a heterodimer composed of two unrelated subunits: alpha and beta.
