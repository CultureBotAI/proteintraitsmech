identifier: PROSITE:PS01195
label: Peptidyl-tRNA hydrolase signature 1
definition: >-
  Peptidyl-tRNA hydrolase signatures. Peptidyl-tRNA hydrolase (EC 3.1.1.29) (PTH) is a bacterial enzyme that cleaves peptidyl-tRNA or N-acyl-aminoacyl-tRNA to yield free peptides or N-acyl-amino acids and tRNA. The natural substrate for this enzyme may be peptidyl-tRNA which drop off the ribosome during protein synthesis. Bacterial PTH has been found to be evolutionary related to yeast hypothetical protein YHR189w.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
