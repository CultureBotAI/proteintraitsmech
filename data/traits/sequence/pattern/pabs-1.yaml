label: Polyamine biosynthesis (PABS) domain signature
definition: >-
  Polyamine biosynthesis (PABS) domain signature and profile. The nearly ubiquitous polyamines (putrescine, spermidine and spermine) are polycationic mediators of cell proliferation and differentiation whose functions likely provide both stability and neutralization for nucleic acids. The following polyamine biosynthetic enzymes are evolutionary related and contain a polyamine biosynthesis (PABS) domain:
