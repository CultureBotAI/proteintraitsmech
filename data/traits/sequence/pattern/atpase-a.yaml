identifier: PROSITE:PS00449
label: ATP synthase a subunit signature
definition: >-
  ATP synthase a subunit signature. ATP synthase (proton-translocating ATPase) (EC 3.6.3.14) is a component of the cytoplasmic membrane of eubacteria, the inner membrane of mitochondria, and the thylakoid membrane of chloroplasts. The ATPase complex is composed of an oligomeric transmembrane sector, called CF(0), which acts as a proton channel, and a catalytic core, termed coupling factor CF(1).
