identifier: PROSITE:PS01064
label: Pyridoxamine 5'-phosphate oxidase signature
definition: >-
  Pyridoxamine 5'-phosphate oxidase signature. Pyridoxamine 5'-phosphate oxidase (EC 1.4.3.5) is a FMN flavoprotein involved in the de novo synthesis of pyridoxine (vitamin B6) and pyridoxal phosphate. It oxidizes pyridoxamine-5-P (PMP) and pyridoxine-5-P (PNP) to pyridoxal-5-P. The sequences of the enzyme from bacterial (genes pdxH or fprA) and fungal (gene PDX3) sources show that this protein has been highly conserved throughout evolution.
