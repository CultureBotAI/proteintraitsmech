identifier: PROSITE:PS60011
label: Plant C6 type antimicrobial peptide (AMP) signature
definition: >-
  Plant C6 type antimicrobial peptide (AMP) signature. Plants normally grow on substrates that are extremely rich in microorganisms, but infection remains a rare event. During evolution, plants have developed a variety of defense systems to protect themselves from potential pathogens. Proteins including thionins, plant defensins and chitinases have been shown to play active roles against pathogen infections. Plants produce a wide array of antimicrobial compounds for escaping from microorganisms by producing some proteins, which are having antibacterial, antifungal activity, etc.
