identifier: PROSITE:PS00549
label: Bacterioferritin signature
definition: >-
  Bacterioferritin signature. Bacterioferritin (BFR) is a prokaryotic iron-storing protein that may perform analogous functions in iron detoxification and storage as that of eukaryotic ferritins. BFR is also known as cytochrome b-1, b-557, b-557.5, or b-559 in various bacterial species.
