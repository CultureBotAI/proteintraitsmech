identifier: PROSITE:PS01215
label: Mrp family signature
definition: >-
  Mrp family signature. The Escherichia coli protein mrp is a 41 Kd ATP-binding protein of unknown function. Homologs are present in other bacteria (for example: Bacillus subtilis ybaL, Hemophilus influenzae HI1277, Synechocystis PCC 6803 slr0067) as well as in eukaryotes (human NBP, yeast NBP35 and YIL003w, Caenorhabditis elegans F10G8.6) and in archaebacteria (Methanococcus jannaschii MJ0283).
