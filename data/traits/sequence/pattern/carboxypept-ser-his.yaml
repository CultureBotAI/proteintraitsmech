identifier: PROSITE:PS00560
label: Serine carboxypeptidases, histidine active site
definition: >-
  Serine carboxypeptidases, active sites. All known carboxypeptidases are either metallo carboxypeptidases or serine carboxypeptidases (EC 3.4.16.5 and EC 3.4.16.6). The catalytic activity of the serine carboxypeptidases, like that of the trypsin family serine proteases, is provided by a charge relay system involving an aspartic acid residue hydrogen-bonded to a histidine, which is itself hydrogen-bonded to a serine. Proteins known to be serine carboxypeptidases are:
