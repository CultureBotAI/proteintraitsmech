identifier: PROSITE:PS00660
label: FERM domain signature 1
definition: >-
  FERM domain signatures and profile. FERM domains (F for 4.1 protein, E for ezrin, R for radixin and M for moesin) are widespread protein modules of ~300 amino-acids in length that are involved in localizing proteins to the plasma membrane. They are found in a number of cytoskeletal-associated proteins that associate with various proteins at the interface between the plasma membrane and the cytoskeleton. The FERM domain is located at the N-terminus of the majority of FERM-containing proteins. The FERM domain defines members of the band 4.1 superfamily, which includes:
