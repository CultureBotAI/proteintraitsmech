identifier: PROSITE:PS00509
label: Ras GTPase-activating proteins (rasGAP) domain signature
definition: >-
  Ras GTPase-activating proteins (rasGAP) domain signature and profile. Ras proteins are membrane-associated molecular switches that bind GTP and GDP and slowly hydrolyze GTP to GDP. This intrinsic GTPase activity of ras is stimulated by a family of proteins collectively known as 'GAP' or GTPase- activating proteins. As it is the GTP bound form of ras which is active, these proteins are said to be down-regulators of ras. Proteins known to possess such activity are listed below:
