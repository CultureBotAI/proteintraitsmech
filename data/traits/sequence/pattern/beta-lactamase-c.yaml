identifier: PROSITE:PS00336
label: Beta-lactamase class-C active site
definition: >-
  Beta-lactamases classes -A, -C, and -D active site. Beta-lactamases (EC 3.5.2.6) are enzymes which catalyze the hydrolysis of an amide bond in the beta-lactam ring of antibiotics belonging to the penicillin/cephalosporin family. Four kinds of beta-lactamase have been identified. Class-B enzymes are zinc containing proteins whilst class -A, C and D enzymes are serine hydrolases. The three classes of serine beta- lactamases are evolutionary related and belong to a superfamily that also includes DD-peptidases and a variety of other penicillin-binding proteins (PBP's). All these proteins contain a Ser-x-x-Lys motif, where the serine is the active site residue.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
trait_axis: SEQUENCE
trait_category: SEQ_MOTIF
term_kind: CLASS
