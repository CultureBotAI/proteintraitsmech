identifier: PROSITE:PS01032
label: PPM-type phosphatase domain signature
definition: >-
  PPM-type phosphatase domain signature and profile. Protein phosphatases remove phosphate groups from various proteins that are the key components of a number of signalling pathways in eukaryotes and prokaryotes. Protein phosphatases that dephosphorylate Ser and Thr residues are classified into the phosphoprotein (PPP) and the protein phosphatase Mg(2+)- or Mn(2+)-dependent (PPM) families. The core structure of PPMs is the 300-residue PPM-type phosphatase domain that catalyzes the dephosphorylation of phosphoserine- and phosphothreonine-containing protein. The PPM-type phosphatase domain is found as a module in diverse structural contexts and is modulated by targeting and regulatory subunits.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
