identifier: PROSITE:PS60027
label: Contryphan family signature
definition: >-
  Contryphan family signature. Contryphans are a family of short disulfide constrained peptides isolated from various species of cone shell. They constitute a group of conopeptides that are known to contain an unusual density of post-translational modifications including tryptophan bromination, amidation of the C-terminal residue, leucine, and tryptophan isomerization, proline hydroxylation and glutamic acid gamma-carboxylation [1-5].
