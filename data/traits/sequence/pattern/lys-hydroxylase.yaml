identifier: PROSITE:PS01325
label: Lysyl hydroxylase signature
definition: >-
  Lysyl hydroxylase signature. Lysyl hydroxylase (EC 1.14.11.4) catalyzes the hydroxylation of lysine residues in X-Lys-Gly sequences in collagens. The resulting hydroxylysines serve as sites of attachment for carbohydrate units and are essential for the stability of the intermolecular collagen crosslinks.
