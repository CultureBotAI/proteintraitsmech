identifier: PROSITE:PS00848
label: Cytochrome c oxidase subunit Vb, zinc binding region signature
definition: >-
  Cytochrome c oxidase subunit Vb family signature and profile. Cytochrome c oxidase (EC 1.9.3.1) is an oligomeric enzymatic complex which is a component of the respiratory chain complex and is involved in the transfer of electrons from cytochrome c to oxygen. In eukaryotes this enzyme complex is located in the mitochondrial inner membrane; in aerobic prokaryotes it is found in the plasma membrane. In addition to the three large subunits that form the catalytic center of the enzyme complex there are, in eukaryotes, a variable number of small polypeptidic subunits. One of these subunits which is known as Vb in mammals, V in slime mold and IV in yeast, binds a zinc atom.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
