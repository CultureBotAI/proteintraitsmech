identifier: PROSITE:PS01037
label: Bacterial extracellular solute-binding proteins, family 1 signature
definition: >-
  Bacterial extracellular solute-binding proteins, family 1 signature. Bacterial high affinity transport systems are involved in active transport of solutes across the cytoplasmic membrane. The protein components of these traffic systems include one or two transmembrane protein components, one or two membrane-associated ATP-binding proteins (ABC transporters; see <PDOC00185>) and a high affinity periplasmic solute-binding protein. The later are thought to bind the substrate in the vicinity of the inner membrane, and to transfer it to a complex of inner membrane proteins for concentration into the cytoplasm.
