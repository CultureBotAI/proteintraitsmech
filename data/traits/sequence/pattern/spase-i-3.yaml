identifier: PROSITE:PS00761
label: Signal peptidases I signature 3
definition: >-
  Signal peptidases I signatures. Signal peptidases (SPases) (also known as leader peptidases) remove the signal peptides from secretory proteins. In prokaryotes three types of SPases are known: type I (gene lepB) which is responsible for the processing of the majority of exported pre-proteins; type II (gene lsp) which only process lipoproteins, and a third type involved in the processing of pili subunits.
