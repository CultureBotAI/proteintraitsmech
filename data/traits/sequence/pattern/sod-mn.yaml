identifier: PROSITE:PS00088
label: Manganese and iron superoxide dismutases signature
definition: >-
  Manganese and iron superoxide dismutases signature. Manganese superoxide dismutase (EC 1.15.1.1) (SODM) is one of the three forms of an enzyme that catalyzes the dismutation of superoxide radicals. The four ligands of the manganese atom are conserved in all the known SODM sequences. These metal ligands are also conserved in the related iron form of superoxide dismutases. We selected, as a signature, a short conserved region which includes two of the four ligands: an aspartate and a histidine.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
trait_axis: SEQUENCE
trait_category: SEQ_MOTIF
term_kind: CLASS
