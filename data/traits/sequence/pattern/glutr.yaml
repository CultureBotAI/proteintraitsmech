identifier: PROSITE:PS00747
label: Glutamyl-tRNA reductase signature
definition: >-
  Glutamyl-tRNA reductase signature. Delta-aminolevulinic acid (ALA) is the obligatory precursor for the synthesis of all tetrapyrroles including porphyrin derivatives such as chlorophyll and heme. ALA can be synthesized via two different pathways: the Shemin (or C4) pathway which involves the single step condensation of succinyl-CoA and glycine and which is catalyzed by ALA synthase (EC 2.3.1.37) and via the C5 pathway from the five-carbon skeleton of glutamate. The C5 pathway operates in the chloroplast of plants and algae, in cyanobacteria, in some eubacteria and in archaebacteria.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
trait_axis: SEQUENCE
trait_category: SEQ_MOTIF
term_kind: CLASS
mapping_status: SEEDED
