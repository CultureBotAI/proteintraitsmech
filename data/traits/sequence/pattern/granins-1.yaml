identifier: PROSITE:PS00422
label: Granins signature 1
definition: >-
  Granins signatures. Granins (chromogranins or secretogranins) are a family of acidic proteins present in the secretory granules of a wide variety of endocrine and neuro- endocrine cells. The exact function(s) of these proteins is not yet known but they seem to be the precursors of biologically active peptides and/or they may act as helper proteins in the packaging of peptide hormones and neuropeptides. Three members of this family of proteins show some sequence similarities:
