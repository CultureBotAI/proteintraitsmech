identifier: PROSITE:PS00780
label: Glycoprotein hormones alpha chain signature 2
definition: >-
  Glycoprotein hormones alpha chain signatures and profile. Glycoprotein hormones (or gonadotropins) are a family of proteins which include the mammalian hormones follitropin (FSH), lutropin (LSH), thyrotropin (TSH) and chorionic gonadotropin (CG), as well as at least two forms of fish gonadotropins. All these hormones consist of two glycosylated chains (alpha and beta). In mammalian gonadotropins, the alpha chain is identical in the four types of hormones but the beta chains, while homologous, are different.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
