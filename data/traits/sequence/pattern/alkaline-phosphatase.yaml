identifier: PROSITE:PS00123
label: Alkaline phosphatase active site
definition: >-
  Alkaline phosphatase active site. Alkaline phosphatase (EC 3.1.3.1) (ALP) is a zinc and magnesium-containing metalloenzyme which hydrolyzes phosphate esters, optimally at high pH. It is found in nearly all living organisms, with the exception of some plants. In Escherichia coli, ALP (gene phoA) is found in the periplasmic space. In yeast it (gene PHO8) is found in lysosome-like vacuoles and in mammals, it is a glycoprotein attached to the membrane by a GPI-anchor.
