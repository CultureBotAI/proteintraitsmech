identifier: PROSITE:PS00537
label: Cytochrome b559 subunits heme-binding site signature
definition: >-
  Cytochrome b559 subunits heme-binding site signature. Cytochrome b559 is an essential component of photosystem II complex from oxygenic photosynthetic organisms. It is an integral thylakoid membrane protein composed of two subunits, alpha (gene psbE) and beta (gene psbF), each of which contains a histidine residue located in a transmembrane region. The two histidines coordinate the heme iron of cytochrome b559.
