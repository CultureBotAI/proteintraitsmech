identifier: PROSITE:PS00809
label: ADP-glucose pyrophosphorylase signature 2
definition: >-
  ADP-glucose pyrophosphorylase signatures. ADP-glucose pyrophosphorylase (glucose-1-phosphate adenylyltransferase) (EC 2.7.7.27) catalyzes a very important step in the biosynthesis of alpha 1,4-glucans (glycogen or starch) in bacteria and plants: synthesis of the activated glucosyl donor, ADP-glucose, from glucose-1-phosphate and ATP.
