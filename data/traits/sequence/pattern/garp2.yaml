identifier: PROSITE:PS60031
label: Glutamic acid-rich protein 2 (GARP2) signature
definition: >-
  Glutamic acid-rich protein 2 (GARP2) signature. The glutamic acid-rich protein 2 (GARP2 is a soluble retinal protein that exists in rod outer segments but is absent in cones. GARP2 is a product of alternative splicing of the beta-subunit of the cGMP-gated ion channel (CNGB1) of rod photoreceptors and contains a unique 8-amino-acid C-terminal extension. It has a high content of proline and glutamate residues. GARP2 has been shown to bind to several retinal proteins including perpherin, and the photoreceptor phosphodiesterase (PDE6).
