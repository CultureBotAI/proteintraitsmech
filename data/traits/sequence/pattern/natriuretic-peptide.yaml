identifier: PROSITE:PS00263
label: Natriuretic peptides signature
definition: >-
  Natriuretic peptides signature. Atrial natriuretic peptides (ANP) are vertebrate hormones important in the overall control of cardiovascular homeostasis and sodium and water balance in general. There are various ANP peptides which vary in length but which have a common central core; they are all processed from a single precursor. There is a disulfide bond which is important for the expression of the biological activity.
