identifier: PROSITE:PS00820
label: Glucoamylase active site region signature
definition: >-
  Glucoamylase active site region signature. Glucoamylase (GA) (EC 3.2.1.3) is an enzyme that catalyzes the release of D- glucose from the non-reducing ends of starch and other oligo- or polysaccharides. Extensive studies of fungal GA have shown that three closely clustered acidic residues play a role in the catalytic mechanism of GA. The region that includes these residues is also conserved in a recently sequenced bacterial GA. We used this region as a signature pattern.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
