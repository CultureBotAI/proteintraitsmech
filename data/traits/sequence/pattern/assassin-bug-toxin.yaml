identifier: PROSITE:PS60010
label: Assassin bug toxin signature
definition: >-
  Assassin bug toxin signature. Assassin bugs (Arthropoda:Insecta:Hemiptera:Reduviidae), sometimes known as conenoses or 'kissing bugs', are one of the largest and morphologically diverse families of true bugs feeding on crickets, caterpillars and other insects. Some assassin bug species are bloodsucking parasites of mammals, even of human. They can be commonly found throughout most of the world and their size varies from a few millimeters to as much as 3 or 4 centimeters. The toxic saliva of the predatory assassin bugs contains a complex mixture of small and large peptides for diverse uses such as immobilizing and pre- digesting their prey, and defense against competitors and predators.
