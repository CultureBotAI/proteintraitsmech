identifier: PROSITE:PS01287
label: RNA 3'-terminal phosphate cyclase signature
definition: >-
  RNA 3'-terminal phosphate cyclase signature. RNA 3'-terminal phosphate cyclase (EC 6.5.1.4) catalyzes the conversion of 3'-phosphate to a 2',3'-cyclic phosphodiester at the end of RNA. The biological role of this enzyme is unknown but it is likely to function in some aspects of cellular RNA processing.
