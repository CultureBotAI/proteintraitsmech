identifier: PROSITE:PS00186
label: Isopenicillin N synthase signature 2
definition: >-
  Isopenicillin N synthase signatures. Isopenicillin N synthase (EC 1.21.3.1) (IPNS) is a key enzyme in the biosynthesis of penicillin and cephalosporin. In the presence of oxygen, it removes iron and ascorbate, four hydrogen atoms from L-(alpha-aminoadipyl)-L- cysteinyl-d-valine to form the azetidinone and thiazolidine rings of isopenicillin. IPNS is an enzyme of about 330 amino-acid residues. Two cysteines are conserved in fungal and bacterial IPNS sequences; these may be involved in iron-binding and/or substrate-binding.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
