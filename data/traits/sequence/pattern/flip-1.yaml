identifier: PROSITE:PS01060
label: Flagella transport protein fliP family signature 1
definition: >-
  Flagella transport protein fliP family signatures. In Escherichia coli and related proteins the fliP protein probably plays a role in the transport of flagellar proteins. FliP is a protein of about 30 Kd which contains three or four transmembrane regions. Proteins evolutionary related to fliP have been found in a wide range of bacteria (mopC, hrcR, hrpW, spaP, yscR, etc.) and are involved in a variety of signal-peptide independent secretion systems.
