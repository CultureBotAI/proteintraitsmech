identifier: PROSITE:PS00266
label: Somatotropin, prolactin and related hormones signature 1
definition: >-
  Somatotropin, prolactin and related hormones signatures. The hormone somatotropin (growth hormone, GH) which plays an important role in growth control, choriomammotropin (lactogen), a placental analog of GH; and prolactin which acts primarily on the mammary gland by promoting lactation, have been shown to be homologous. This family of proteins also includes other hormones listed below (references are only provided for recently determined sequences).
