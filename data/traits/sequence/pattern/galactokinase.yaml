identifier: PROSITE:PS00106
label: Galactokinase signature
definition: >-
  Galactokinase signature. Galactokinase (EC 2.7.1.6) catalyzes the first reaction of galactose metabolism, the conversion of galactose to galactose 1-phosphate. There are three well conserved regions in the sequence of eukaryotic and prokaryotic galactokinase. As a signature pattern we have selected the best conserved of these regions, which is located in the N-terminal section of galactokinase.
