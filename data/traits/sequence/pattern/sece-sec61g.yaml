identifier: PROSITE:PS01067
label: Protein secE/sec61-gamma signature
definition: >-
  Protein secE/sec61-gamma signature. In bacteria, the secE protein plays a role in protein export; it is one of the components - with secY (see <PDOC00612>) and secA - of the preprotein translocase. In eukaryotes, the evolutionary related protein sec61-gamma plays a role in protein translocation through the endoplasmic reticulum; it is part of a trimeric complex that also consist of sec61-alpha and beta.
