identifier: PROSITE:PS00394
label: DNA photolyases class 1 signature 1
definition: >-
  DNA photolyases class 1 signatures. Deoxyribodipyrimidine photolyase (EC 4.1.99.3) (DNA photolyase) is a DNA repair enzyme. It binds to UV-damaged DNA containing pyrimidine dimers and, upon absorbing a near-UV photon (300 to 500 nm), breaks the cyclobutane ring joining the two pyrimidines of the dimer. DNA photolyase is an enzyme that requires two choromophore-cofactors for its activity: a reduced FADH2 and either 5,10-methenyltetrahydrofolate (5,10-MTFH) or an oxidized 8-hydroxy-5- deazaflavin (8-HDF) derivative (F420). The folate or deazaflavin chromophore appears to function as an antenna, while the FADH2 chromophore is thought to be responsible for electron transfer.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
