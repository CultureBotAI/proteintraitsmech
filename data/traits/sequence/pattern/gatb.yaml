identifier: PROSITE:PS01234
label: Glutamyl-tRNA(Gln) amidotransferase subunit B signature
definition: >-
  Glutamyl-tRNA(Gln) amidotransferase subunit B signature. Glutamyl-tRNA(Gln) amidotransferase subunit (EC 6.3.5.-) is a microbial enzyme that furnishes a means for formation of correctly charged Gln-tRNA(Gln) through the transamidation of misacylated Glu-tRNA(Gln) in organisms which lack glutaminyl-tRNA synthetase. The reaction takes place in the presence of glutamine and ATP through an activated gamma-phospho-Glu-tRNA(Gln). The enzyme is composed of three subunits: A (an amidase), B and C. It also exists in eukaryotes as a protein targeted to the mitochondria.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
