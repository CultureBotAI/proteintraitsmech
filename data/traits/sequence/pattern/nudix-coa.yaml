identifier: PROSITE:PS01293
label: Nudix CoA signature
definition: >-
  Nudix hydrolase domain signatures and profile. The Nudix superfamily is widespread among eucaryotes, bacteria, archaea and viruses and consists mainly of pyrophosphohydrolases that act upon substrates of general structure NUcleoside DIphosphate linked to another moiety, X (NDP-X) to yield NMP plus P-X. Such substrates include (d)NTPs (both canonical and oxidised derivatives), nucleotide sugars and alcohols, dinucleoside polyphosphates (NpnN), dinucleotide coenzymes and capped RNAs.
