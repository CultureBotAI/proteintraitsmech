identifier: PROSITE:PS00853
label: Beta-eliminating lyases pyridoxal-phosphate attachment site
definition: >-
  Beta-eliminating lyases pyridoxal-phosphate attachment site. Tryptophan indole-lyase (EC 4.1.99.1) (tryptophanase) and tyrosine phenol- lyase (EC 4.1.99.2) (beta-tyrosinase) are related pyridoxal-phosphate dependent homotetrameric enzymes. Tryptophan indole-lyase catalyzes the transformation of tryptophan into indole, pyruvate and ammonia and tyrosine phenol-lyase transforms tyrosine into phenol, pyruvate and ammonia.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
