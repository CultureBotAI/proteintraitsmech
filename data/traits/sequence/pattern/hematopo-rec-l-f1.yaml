identifier: PROSITE:PS01352
label: Long hematopoietin receptor, single chain family signature
definition: >-
  Long hematopoietin receptor, single chain family signature. A number of receptors for lymphokines, hematopoietic growth factors and growth hormone-related molecules have been found to share a common binding domain. These receptors are designated as hematopoietin receptors and the corresponding ligands as hematopoietins. Further, hematopoietins have been subdivided into two major structural groups: Large/long and small/short hematopoietins.
