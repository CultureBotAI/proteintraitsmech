identifier: PROSITE:PS00672
label: Serine proteases, V8 family, histidine active site
definition: >-
  Serine proteases, V8 family, active sites. A number of prokaryotic proteases have been shown to be evolutionary related; their catalytic activity is provided by a charge relay system similar to that of the trypsin family of serine proteases but which probably evolved by independent convergent evolution. The sequence around the residues involved in the catalytic triad (aspartic acid, serine and histidine) are completely different from that of the analogous residues in the trypsin serine proteases and can be used as signatures specific to that category of proteases. The proteases which are known to belong to this family are listed below.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
