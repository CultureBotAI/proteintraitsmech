identifier: PROSITE:PS01151
label: Fimbrial biogenesis outer membrane usher protein signature
definition: >-
  Fimbrial biogenesis outer membrane usher protein signature. In Gram-negative bacteria the biogenesis of fimbriae (or pili) requires a two- component assembly and transport system which is composed of a periplasmic chaperone (see <PDOC00552>) and an outer membrane protein which has been termed a molecular 'usher'. The protein is rather large (from 86 to 100 Kd) and seems to be mainly composed of membrane-spanning beta-sheets, a structure reminiscent of porins. Known members of this family are listed below:
