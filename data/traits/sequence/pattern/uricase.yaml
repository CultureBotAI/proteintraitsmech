label: Uricase signature
definition: >-
  Uricase signature. Uricase (EC 1.7.3.3) (urate oxidase) is the peroxisomal enzyme responsible for the degradation of urate into allantoin. Some species, like primates and birds, have lost the gene for uricase and are therefore unable to degrade urate.
