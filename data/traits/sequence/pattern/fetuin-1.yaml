identifier: PROSITE:PS01254
label: Fetuin family signature 1
definition: >-
  Fetuin family signatures and fetuin-A- and fetuin-B-type cystatin domain profiles. The cystatin superfamily consists of a large group of cystatin domain- containing proteins, most of which are reversible and tight-binding inhibitors of the papain (C1) and legumain (C13) families of cysteine proteases. Fetuins have been identified as main members of the cystatin superfamily and are composed of fetuin-A and fetuin-B. Fetuins are characterized by the presence of 2 N-terminally located cystatin-like repeats (see <PDOC00259>) and a unique C-terminal domain which is not present in other proteins of the cystatin family.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
