identifier: PROSITE:PS00091
label: Thymidylate synthase active site
definition: >-
  Thymidylate synthase active site. Thymidylate synthase (EC 2.1.1.45) catalyzes the reductive methylation of dUMP to dTMP with concomitant conversion of 5,10-methylenetetrahydrofolate to dihydrofolate. Thymidylate synthase plays an essential role in DNA synthesis and is an important target for certain chemotherapeutic drugs.
