identifier: PROSITE:PS00553
label: Lambdoid phages regulatory protein CIII signature
definition: >-
  Lambdoid phages regulatory protein CIII signature. The lambdoid phage regulatory protein CIII is a very small protein whose presence in the cell results in the stabilization of the CII transcriptional activator, a usually very unstable protein. The stabilized CII protein is then able to activate CI, the gene for the repressor protein which prevents the transcription of proteins necessary for lytic development and thus promotes the establishment of lysogeny.
