identifier: PROSITE:PS60020
label: Janus-faced atracotoxin (J-ACTX) family signature
definition: >-
  Janus-faced atracotoxin (J-ACTX) family signature. Janus-faced atracotoxins (J-ACTXs) form a family of insecticidal neurotoxins isolated from the venom of one of the world's most lethal arachnids, the Blue mountains funnel-web spider Hadronyche versuta. J-ACTXs are 36 or 37 residues in length with eight conserved cysteine residues involved in four disulfide bonds, including an extemely rare vicinal disulfide (a disulfide bond between adjacent cysteine residues) that has been shown to be essential for insecticidal activity. J-ACTXs possess two strikingly dissimilar faces.
