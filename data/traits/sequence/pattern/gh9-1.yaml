identifier: PROSITE:PS60032
label: Glycosyl hydrolases family 9 (GH9) active site signature 1
definition: >-
  Glycosyl hydrolases family 9 (GH9) active sites signatures. The microbial degradation of cellulose and xylans requires several types of enzymes such as endoglucanases (EC 3.2.1.4), cellobiohydrolases (EC 3.2.1.91) (exoglucanases), or xylanases (EC 3.2.1.8). Fungi and bacteria produces a spectrum of cellulolytic enzymes (cellulases) and xylanases which, on the basis of sequence similarities, can be classified into families. One of these families is known as the cellulase family E or as the glycosyl hydrolases family 9.
definition_source: Prosite Release 2026_02 of 10-Jun-2026
