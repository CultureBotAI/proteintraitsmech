identifier: Pfam:PF15000
label: Tumour suppressor candidate 2
definition: >-
  Tumour suppressor candidate 2 (also known as Fus1) gene is identified in the human chromosome 3p21.3 region where allele losses and genetic alterations occur early and frequently for many human cancers. FUS1 protein induces apoptosis through the activation of the intrinsic mitochondrial-dependent and Apaf-1-associated pathways and inhibits the function of protein tyrosine kinases including EGFR, PDGFR, AKT, c-Abl, and c-Kit. In lung cancer cells, Fus1 can modulate their chemosensitivity and enhance the antitumour activity of a conventional chemotherapeutic drug, cisplatin.
