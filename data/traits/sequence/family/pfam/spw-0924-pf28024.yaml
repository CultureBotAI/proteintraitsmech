identifier: Pfam:PF28024
label: SPW_0924-like protein
definition: >-
  This entry represent a family of small (less than 44 amino acid residues) uncharacterised proteins, that are found exclusively in the Actinobacteria (mostly Streptomyces). The N-terminal half is organised like a signal peptide, beginning Met-Arg and then continuing with a hydrophobic stretch that is unusually rich in alanine. The C-terminal region has a nearly invariant motif TSPxPLLTTVP. The function of these proteins is unknown.
