identifier: Pfam:PF15211
label: VEGF co-regulated chemokine 1
definition: >-
  C-X-C chemokine 17 (CXCL17) or dendritic cell and monocyte chemokine-like protein (DMC), is a cytokine-like protein that regulates recruitment of nonactivated blood monocytes and immature dendritic cells into tissues. It may play a role in the innate defense against infections. It also plays a role in angiogenesis and possibly in the development of tumours.
