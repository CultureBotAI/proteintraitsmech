identifier: Pfam:PF25654
label: Major capsid protein 1, Sulfolobus islandicus filamentous virus
definition: >-
  This entry represents the major capsid protein 1 (MCP1) found in filamentous viruses that infect hyperthermophilic archaea living in extreme environments (temperatures of 80-90 degrees C with pH values of 2-3). The MCP1 proteins form either homodimers or heterodimers with MCP2 and wrap around the viral DNA, maintaining it in an A-form, which helps protect the genome in extreme conditions. These proteins typically contain N-terminal α-helices that interact with the viral DNA and C-terminal four-helix bundles. In enveloped viruses, MCP1 can have a C-terminal extension that reaches out to make contacts with subunits in adjacent helical turns. Despite low sequence similarity between MCP1 proteins from different archaeal filamentous viruses, they share a relatively conserved fold, demonstrating common ancestry.
