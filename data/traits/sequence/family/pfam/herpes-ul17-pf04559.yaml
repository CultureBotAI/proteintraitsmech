identifier: Pfam:PF04559
label: Herpesvirus UL17 protein
definition: >-
  This entry represents a group of capsid vertex components from Herpesvirus, including UL17 from Human herpesvirus 1. UL17 is a capsid vertex-specific component that plays a role during viral DNA encapsidation, assuring correct genome cleavage and presumably stabilizing capsids that contain full-length viral genomes.
