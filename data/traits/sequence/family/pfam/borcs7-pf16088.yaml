identifier: Pfam:PF16088
label: BLOC-1-related complex sub-unit 7
definition: >-
  BORC is a multisubunit complex that regulates the positioning of lysosomes at the cell periphery, and consequently affects cell migration. BORC associates with the lysosomal membrane, where it functions to recruit the small GTPase Arl8. This initiates a series of interactions that promote the microtubule-guided transport of lysosomes toward the cell periphery. The BORC complex consists of 8 subunits. This family represents subunit 7.
