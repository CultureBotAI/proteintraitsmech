identifier: Pfam:PF04917
label: Bacterial shufflon protein, N-terminal constant region
definition: >-
  This domain represents the high-similarity N-terminal constant region shared by shufflon proteins. Shufflon proteins are created as a result of a clustered inversion region. The proteins retain a constant N-terminal domain, with different C-terminal domains.
