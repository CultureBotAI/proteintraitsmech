identifier: Pfam:PF08260
label: Insect kinin peptide
definition: >-
  This entry represents neuropeptides that are the first members of the insect kinin-family isolated from the American cockroach. Their occurrence in the retrocerebral complex suggests a physiological role as a neurohormone. The C-terminal sequence Phe-X-Ser-Trp-Gly-NH2 characterised the peptides as members of the insect kinin family. Data suggest a possible involvement of insect kinins in water-balance by regulating the osmoregulation. Insect kinins also mediate visceral muscle contractile activity (myotropic activity). These peptides have lengths ranging from 6 to 14 amino acids.
