identifier: Pfam:PF12420
label: Fam-L, Fam-M like protein
definition: >-
  This entry represents a large set of plasmodium proteins found in high copy number in subtelomeric repeats, including Fam-L and Fam-M proteins. It has been suggested that these proteins may pair to form heterodimers. Structure prediction suggests these proteins are related to RH5 and therefore may also have an adhesion role, possibly binding host receptors. This protein family was previously known as DUF3671.
