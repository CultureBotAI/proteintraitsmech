identifier: Pfam:PF01770
label: Reduced folate carrier
definition: >-
  This entry represents the reduced folate carrier family, including folate transporter 1 (SLC19A1), thiamine transporter 1 (SLC19A2) and thiamine transporter 2 (SLC19A3). Despite their protein sequence/structure similarity, they have different functions. The transporter 1 (SLC19A1, also known as the reduced folate carrier protein, RFC) transports reduced folate into mammalian cells via the carrier mediated mechanism (as opposed to the receptor mediated mechanism) it also transports cytotoxic folate analogues used in chemotherapy, such as methotrexate (MTX). It also transports cyclic dinucleotides (CDNs) into cells which is involved in the modulation of the immune response. Mammalian cells have an absolute requirement for exogenous folates which are needed for growth, and biosynthesis of macromolecules. Thiamine transporter 1 (SLC19A2) and thiamine transporter 2 (SLC19A3) are high-affinity transporters for the intake of thiamine. They do not transport reduced or oxidized folates. Also included in this entry is Putative solute carrier family 19 member 4 which has been defined as pseudogene in HGNC. It lacks the transmembrane region, suggesting that it has probably no transporter function.
