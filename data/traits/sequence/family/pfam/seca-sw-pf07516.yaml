identifier: Pfam:PF07516
label: SecA Wing and Scaffold domain
definition: >-
  SecA protein binds to the plasma membrane where it interacts with proOmpA to support translocation of proOmpA through the membrane. SecA protein achieves this translocation, in association with SecY protein, in an ATP-dependent manner. This domain is composed of two C-terminal α helical subdomains: the wing and scaffold subdomains.
