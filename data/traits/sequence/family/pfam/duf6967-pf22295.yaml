label: Family of unknown function (DUF6967)
definition: >-
  This family of proteins is found in proteobacteria. Proteins in this family are approximately 70 amino acids in length. They are predicted to fold into a four-stranded β-sheet meander and an α-helix. One face of this β-sheet is enriched with conserved positively charged arginine and lysine residues.
