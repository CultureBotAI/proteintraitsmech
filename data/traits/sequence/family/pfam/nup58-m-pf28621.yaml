identifier: Pfam:PF28621
label: NUP58 FG repeats
definition: >-
  This entry represents the FG repeats domain found in the central region of nuclear pore complex protein NUP58. NUP58 is a component of the nuclear pore complex (NPC) central channel involved in nucleocytoplasmic trafficking. The full-length NUP58 protein is part of the NUP62 subcomplex and interacts with GAI, NUP62, SKP1A and SKP1B. NUP58 contains FG repeats that serve as interaction sites for karyopherins and form an affinity gradient guiding transport proteins through the NPC. The protein may have regulatory roles in the gibberellin pathway, auxin signalling and light perception. NUP58 is found in plants and is expressed ubiquitously with highest levels in cauline leaves.
