identifier: Pfam:PF09462
label: Mus7/MMS22 family
definition: >-
  This entry includes methyl methanesulphonate-sensitivity protein 22 (Mms22) from fungi. Mms22 functions to resolve replication intermediates or to prevent damage caused by blocked replication forks. Saccharomyces cerevisiae Mms22 is a substrate targeting component of a cullin-RING-based E3 ubiquitin-protein ligase complex Rtt101(Mms1-Mms22), a complex that promotes replication through damaged DNA. Mms22 may play an important role for the stabilisation of protein components at the replication fork during replication stress and thereby function to prevent fork collapse and promote the resumption of DNA synthesis.
