identifier: Pfam:PF02535
label: ZIP Zinc transporter
definition: >-
  The ZIP family consists of zinc transport proteins and many putative metal transporters found in al cellular organisms, including the Arabidopsis thaliana ZIP protein family which is responsible for zinc uptake in the plant. ZIP proteins play essential roles in metal metabolism/homeostasis and are widely involved in numerous physiological and pathological processes. The crystal structure of a ZIP from Bordetella bronchiseptica showed eight transmembrane helices (TMs) forming a tightly associated helix bundle, where four TMs create an inner bundle surrounded by the other four TMs and a a binuclear metal centre (BMC) is harboured in the transport pathway. The two associated metal binding sites in the BMC play different roles: one of them is the key transport site, whereas the other, the auxiliary site, is required not only to achieve maximal zinc transport activity but also to maintain a uniform activity in a broad pH range. ZIP4, a human member of this family, is related to a rare autosomal recessive disease caused by the inability to absorb sufficient zinc. ZIPCO, a Plasmodium member, has a crucial role in the parasite liver-stage development.
