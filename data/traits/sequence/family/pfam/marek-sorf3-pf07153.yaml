identifier: Pfam:PF07153
label: Marek's disease-like virus SORF3 protein
definition: >-
  This family consists of several SORF3 proteins from the Marek's disease-like viruses (Meleagrid herpesvirus 1, also known as Gallid herpesvirus 2) and other Herpesvirus. Members of this family are around 350 residues in length. The function of this family is unknown.
