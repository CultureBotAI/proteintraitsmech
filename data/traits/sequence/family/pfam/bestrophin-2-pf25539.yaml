identifier: Pfam:PF25539
label: Bacterial/Fungal Bestrophin protein
definition: >-
  This entry represents a family of voltage-dependent anion channels from bacteria and eukaryotes, formerly known as UPF0187, including Voltage-dependent anion channel-forming protein YneE from E.coli and Voltage-dependent chloride channel 1/2 from Arabidopsis, which are related to the Bestrophin family. In bacteria, these anion transporters are poorly characterised. VCCN1/2 are chloride channels critical for proton motive force (PMF) partitioning across the thylakoid membrane by anion influx into the lumen during illumination, thus being required for photoprotection under fluctuating light conditions.
