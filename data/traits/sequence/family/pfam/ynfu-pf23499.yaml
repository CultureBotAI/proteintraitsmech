identifier: Pfam:PF23499
label: YnfU
definition: >-
  This protein family includes the putative zinc-binding protein YnfU, encoded in the Qin prophage from Escherichia coli, and similar sequences mainly from proteobacteria. YnfU is a 56-residue micropeptide encoded by a small open reading frame (smORF). Proteins 50 or fewer residues long have been shown to regulate the functions of larger proteins in a variety of organisms. This peptide is predicted to show an α-β configuration.
