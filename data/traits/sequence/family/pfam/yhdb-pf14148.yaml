identifier: Pfam:PF14148
label: YhdB-like protein
definition: >-
  The YhdB-like protein family includes the Bacillus subtilis YhdB protein , which is functionally uncharacterised. Proteins in this family are typically between 57 and 82 amino acids in length and contain two conserved sequence motifs: LMVRT and FLHAY.
