identifier: Pfam:PF16675
label: KIX-binding domain of forkhead box O, CR2
definition: >-
  This entry represents a domain found in the transcription factor forkhead box O (FOXO) that binds to the KIX domain of CREB-binding proteins. Coactivator CBP/p300 is recruited by FOXO3 via the binding of this domain as well as the simultaneous binding of the C-terminal TAD domain.
