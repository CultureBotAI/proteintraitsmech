identifier: Pfam:PF12061
label: 'Late blight resistance protein R1 '
definition: >-
  R1 is a gene for resistance to late blight, the most destructive disease in potato cultivation worldwide. The R1 gene belongs to the class of plant genes for pathogen resistance that have a leucine zipper motif, a putative nucleotide binding domain and a leucine-rich repeat domain. This entry represents the LRR domain, found at the N-terminal and associated with the NB-ARC domain ( ).
