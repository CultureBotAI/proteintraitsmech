identifier: Pfam:PF06929
label: Rotavirus VP3 protein
definition: >-
  Viral protein 3 (VP3) specifically binds to GTP and contains mRNA guanylyltransferase and mRNA (guanine-N(7)-)-methyltransferase activities. It is a multifunctional enzyme involved in mRNA capping. It catalyses the formation of the 5' cap structure on the viral plus-strand transcripts. Structure analyses revealed that it contains a variable N-terminal domain, a central guanine-N7-methyltransferase domain with an additional inserted domain, and a C-terminal guanylyltransferase and RNA 5'-triphosphatase domain. The insertion in the guanine-N7-methyltransferase domain is a ribose-2'-O-methyltransferase domain for most rotavirus species.
