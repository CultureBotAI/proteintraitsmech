identifier: Pfam:PF03049
label: UL79 family
definition: >-
  Members of the herpesvirus UL79 family also contain proteins such as U52 and gene 18 protein. UL79 plays a role in the expression of late transcripts bridging viral DNA replication and late gene expression during infection.
