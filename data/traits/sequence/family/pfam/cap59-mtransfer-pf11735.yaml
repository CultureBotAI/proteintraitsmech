identifier: Pfam:PF11735
label: Cryptococcal mannosyltransferase 1
definition: >-
  The capsule of pathogenic fungi is a complex polysaccharide whose formation is determined by a number of enzymes including, most importantly, alpha-1,3-mannosyltransferase 1. It is responsible for addition of mannose residues in an alpha-1,3 linkage to a polymannosly precursor.
