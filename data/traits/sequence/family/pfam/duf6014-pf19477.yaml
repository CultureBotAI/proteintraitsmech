label: Family of unknown function (DUF6014)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000332) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). This family includes a protein from the cyanopeptolin biosynthetic gene cluster from Microcystis sp. NIVA-CYA 172/5 and appears to be predominantly found in Cyanobacteria.
