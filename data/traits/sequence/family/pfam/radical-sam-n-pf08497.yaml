identifier: Pfam:PF08497
label: Radical SAM N-terminal
definition: >-
  This domain tends to occur to the N terminus of radical SAM domain in hypothetical bacterial proteins. Proteins in this entry are radical SAM proteins, they catalyse diverse reactions, including unusual methylations, isomerization, sulphur insertion, ring formation, anaerobic oxidation and protein radical formation. Evidence exists that these proteins generate a radical species by reductive cleavage of S:-adenosylmethionine (SAM) through an unusual Fe-S centre.
