identifier: Pfam:PF26624
label: Family of unknown function (DUF8200)
definition: >-
  This entry represents a family of uncharacterised proteins found mainly in Alphaproteobacteria. These are predicted to fold into a α/β structure, composed of a five-stranded antiparallel β-sheet that curves around a single helix, which partly resemble TATA-box binding protein individual repeats. These proteins contain two pairs of conserved cysteine residues that are predicted to form disulfide bonds suggesting that they may be secreted.
