identifier: Pfam:PF04137
label: Endoplasmic Reticulum Oxidoreductin 1 (ERO1)
definition: >-
  Ero1 and PDI form the disulfide relay system of the ER that supports correct disulfide bond formation of secretory proteins. This entry represents Ero1 (endoplasmic oxidoreductin-1) from yeasts and its homologues from mammals, Ero1-alpha and Ero1-beta. Ero1 is an flavoprotein that directly transfers disulfide bonds to disulfide isomerase PDI. Ero1 acts as an thiol oxidoreductase responsible for catalyzing disulfide bond formation in nascent polypeptide substrates via electron transfer through protein disulfide isomerase (PDI) with oxygen acting as the final electron acceptor. Newly generated disulfides are transferred from a FAD (flavin adenine dinucleotide)-associated active site via a "shuttle disulfide" cysteine pair in Ero1 to PDI and from there on to substrate proteins. The activity of Ero1 is regulated by PDI (also known as Pdi1). This regulation of Ero1 through reduction and oxidation of regulatory bonds within Ero1 is essential for maintaining the proper redox balance in the ER.
