label: Nematode cuticle collagen N-terminal domain
definition: >-
  The function of this domain is unknown. It is found in the N-terminal region of nematode cuticle collagens (see ). Cuticle is a tough elastic structure secreted by hypodermal cells and is primarily composed of collagen proteins.
