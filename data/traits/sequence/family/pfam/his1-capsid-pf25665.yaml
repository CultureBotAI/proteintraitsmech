identifier: Pfam:PF25665
label: His1 virus capsid protein
definition: >-
  This entry represents the major capsid protein (VP21) of His1 virus, a spindle-shaped virus that infects the extremely halophilic euryarchaeon Haloarcula hispanica. The His1 virion is composed of one major structural protein, VP21 and a few minor structural proteins. VP21 exists in two forms, with the higher molecular mass form being lipid-modified. Interestingly, there is no lipid bilayer in the His1 virion, but the lipid modification of VP21 likely enables hydrophobic interactions, leading to the flexible nature of the virion. His1 belongs to the genus Salterprovirus that differs from fuselloviruses by having a linear genome rather than a circular one, although both share a similar spindle-shaped morphology.
