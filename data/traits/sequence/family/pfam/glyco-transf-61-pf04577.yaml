identifier: Pfam:PF04577
label: Glycosyltransferase 61
definition: >-
  This entry represents the catalytic domain of glycosyltransferase 61 members. Glycosyltransferase 61 family members are further processed into a mature form. Proteins in this family includes O-linked-mannose beta-1,4-N-acetylglucosaminyltransferase 2 (POMGnT2, also known as EOGTL) and EGF domain-specific O-linked N-acetylglucosamine transferase (EOGT). This entry also includes plant beta-(1,2)-xylosyltransferase.
