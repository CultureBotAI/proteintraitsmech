identifier: Pfam:PF04887
label: Poxvirus M2 protein
definition: >-
  This family includes M2 protein from Vaccinia virus, also known as Early protein OPG038, and similar proteins from poxvirus. M2 plays a role in immune evasion. When secreted, inhibits T-cell activation by preventing the binding of host CD80 and CD86 to soluble CTLA4 and CD28. In the infected cell, it may inhibit host NF kappa B activation.
