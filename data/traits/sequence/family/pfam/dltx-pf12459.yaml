identifier: Pfam:PF12459
label: D-Ala-teichoic acid biosynthesis protein
definition: >-
  This entry represents a family of DltX proteins of approximately 50 amino acids in length predominantly found in bacillota, including from Bacillus thuringiensis. Members of this group are small, single-pass transmembrane proteins required for the D-alanylation of teichoic acids. DltX binds to the MBOAT protein DltB ( ) and the SGNH hydrolase-like protein DltD ( ). This family was previously known as DUF3687.
