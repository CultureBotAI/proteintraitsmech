identifier: Pfam:PF20895
label: PsV, capsid protein
definition: >-
  This entry represents a family of proteins from partitivirus, including Capsid protein (CP) from Penicillium stoloniferum virus ( ), which associates only with itself in forming capsids, adopting a quasi- symmetrical dimeric fold. 60 dimers associate to form the capsid shell. CP is organized into two domains: the shell domain, which form the continuous capsid, and the arch domain, responsible for the dimeric surface protrusions.
