identifier: Pfam:PF09548
label: Stage III sporulation protein AB (spore_III_AB)
definition: >-
  This entry represents the stage III sporulation protein AB, which is encoded in a spore formation operon: spoIIIAABCDEFGH that is under sigma G regulation. A comparative genome analysis of all sequenced genomes of Firmicutes shows that the proteins are strictly conserved among the sub-set of endospore-forming species.
