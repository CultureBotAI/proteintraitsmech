identifier: Pfam:PF02620
label: Large ribosomal RNA subunit accumulation protein YceD
definition: >-
  This family includes the large ribosomal RNA subunit accumulation protein YceD. Gene knockout in Escherichia coli leads to significant reduction of 23S rRNA. These proteins are nearly universally conserved in bacteria and plants. In Nicotiana benthamiana leaves the protein is localized in chloroplasts.
