label: Rubivirus non-structural protein
definition: >-
  This domain is found in viruses, and is approximately 70 amino acids in length. The family is found in association with . The Rubella virus (RUB) nonstructural (NS) protein (NSP) ORF encodes a protease that cleaves the NSP precursor (240kDa) at a single site to produce two products.
