identifier: Pfam:PF15794
label: Coiled-coil domain-containing protein 106
definition: >-
  CCDC106, coiled-coil domain-containing protein 106, is a family of eukaryote proteins. Yeast two-hybrid screening has identified CCDC106 as a p53-interacting partner. CCDC106 is a negative regulator of p53 and may be involved in tumourigenesis in some cancers by promoting the degradation of p53 protein and inhibiting its transactivity.
