identifier: Pfam:PF30298
label: Telomere-capping protein Verrocchio
definition: >-
  This entry represents Verrocchio (ver), a telomere-capping protein found in Drosophilidae. Verrocchio is a component of the MTV complex together with Modigliani (moi) and Tea, which associates with the HipHop-HOAP complex to form the terminin telomere-capping complex. The MTV complex binds single-stranded DNA in a sequence- independent manner, protecting it from degradation. Verrocchio contains an OB-fold domain covering most of the protein length. Loss of function causes telomeric fusions and lethality.
