identifier: Pfam:PF07471
label: Phage DNA packaging protein Nu1
definition: >-
  Terminase, the DNA packaging enzyme of bacteriophage lambda, is a heteromultimer composed of subunits Nu1 and A. The smaller Nu1 terminase subunit has a low-affinity ATPase stimulated by non-specific DNA. This entry is representes Bacteriophage lambda Nu1 and related proteins. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches.
