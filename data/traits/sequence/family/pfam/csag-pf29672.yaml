identifier: Pfam:PF29672
label: Chondrosarcoma-associated gene protein
definition: >-
  This entry represents the chondrosarcoma-associated gene (CSAG) family of proteins. These are cancer/testis antigens found in primates. CSAG1 localises to centrosomes and spindle poles and plays a role in maintaining centrosome integrity during mitosis. CSAG2/3 proteins are associated with drug resistance in cancer cells. The proteins contain a signal peptide and are expressed in testis and various tumour types including chondrosarcoma, melanoma and carcinomas.
