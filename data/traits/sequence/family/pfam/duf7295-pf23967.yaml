identifier: Pfam:PF23967
label: Family of unknown function (DUF7295)
definition: >-
  This entry represents an uncharacterised protein found in various bacteriophages that infect Salmonella, Escherichia, Shigella, Pantoea and Serratia species. This family includes a member in bacteriophage T5. The function of this protein is currently unknown. Structure prediction does not predict a globular compact fold for this protein.
