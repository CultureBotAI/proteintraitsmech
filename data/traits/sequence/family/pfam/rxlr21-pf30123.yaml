identifier: Pfam:PF30123
label: Secreted RxLR effector protein 21
definition: >-
  This entry represents the RXLR21 family of secreted effector proteins found in oomycetes. These proteins contain the canonical RxLR translocation motif but lack the EER motif that characterises most oomycete effectors. RXLR21 completely suppresses host cell death induced by cell death-inducing proteins. The proteins are secreted and localise to the host nucleus and cytoplasm. These effectors belong to the RxLR effector family involved in virulence.
