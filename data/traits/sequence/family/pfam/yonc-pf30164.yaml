identifier: Pfam:PF30164
label: YonC prophage protein
definition: >-
  This entry represents YonC, a 178 amino acid uncharacterised protein from the SPbeta prophage of Bacillus subtilis. The protein is found in SPbeta phage and related prophages across Bacillales. The function of this protein remains to be determined.
