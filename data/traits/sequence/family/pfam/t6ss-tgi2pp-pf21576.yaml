identifier: Pfam:PF21576
label: T6SS, Immunity protein Tgi2PP
definition: >-
  This protein family includes immunity protein Tgi2PP from Pseudomonas fluorescens (PFL_3036) ( ), the immunity component of an effector immunity pair secreted by the type VI secretion system (T6SS) of this bacteria. Its structure consists of a short N-terminal 3-10 helix and a central five-stranded β-sheet flanked by three α-helices ( ).
