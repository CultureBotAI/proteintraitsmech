identifier: Pfam:PF29507
label: Eisosome protein SEG2
definition: >-
  This entry represents SEG1/2, an eisosome protein from Saccharomyces cerevisiae. SEG2 is a component of eisosomes, large cytoplasmic protein assemblies that localise to specialised domains termed MCCs on the plasma membrane. The protein is a peripheral membrane protein on the cytoplasmic side and localises to eisosomes. SEG2 likely plays only a minor role in eisosome assembly and belongs to the SEG1 family. The protein undergoes phosphorylation and ubiquitination and is present with approximately 538 molecules per cell in log phase medium.
