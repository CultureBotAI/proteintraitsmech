identifier: Pfam:PF06443
label: 'SEF14-like adhesin '
definition: >-
  The sefABC genes make up part of a complex sef operon responsible for the expression and assembly of SEF14 fimbriae. sefA encodes a fimbrin, the structural subunit of SEF14 fimbriae. Possession of SEF14 fimbriae alone do not appear to play a significant role in the pathogenesis of Salmonella enteritidis. This family also includes adhesin CS22 and CS15 (antigen 8786) which share homology with fimbria SEF14 of Salmonella enteritidis.
