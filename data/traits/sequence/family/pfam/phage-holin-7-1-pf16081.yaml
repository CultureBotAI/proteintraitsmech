identifier: Pfam:PF16081
label: Mycobacterial 2 TMS Phage Holin (M2 Hol) Family
definition: >-
  This is a family of two transmembrane mycobacteriophage holins, small hydrophobic proteins that participate, together with a mycobacteria-specific lysin lysB, in the sequential events which lead to the programmed host cell lysis releasing the mature viral particles from the host cell. Holins accumulate harmlessly in the cytoplasmic membrane until it reaches a critical concentration that triggers the formation of micron-scale pores (holes) causing host cell membrane disruption and endolysin escape into the periplasmic space. Holin determines the precise timing of host cell lysis.
