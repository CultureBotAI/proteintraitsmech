identifier: Pfam:PF27028
label: Bacteriophage T1 holin
definition: >-
  This entry represents the holin family found in T1-like bacteriophages. Holins are membrane proteins that control the precise timing of host cell lysis. The protein accumulates in the host cytoplasmic membrane until reaching a critical concentration that triggers formation of nanometer-scale pores, causing membrane depolarisation and allowing endolysin release into the periplasm. The protein is 71 amino acids (7.6 kDa) and functions as a single-pass type II membrane protein with a transmembrane helix that serves as a signal-anchor.
