identifier: Pfam:PF04207
label: 'Tetrahydromethanopterin S-methyltransferase, subunit D '
definition: >-
  This model describes N5-methyltetrahydromethanopterin: coenzyme M methyltransferase subunit D in methanogenic archaea. This methyltranferase is a membrane-associated enzyme complex that uses methyl-transfer reaction to drive sodium-ion pump. 5-methyl-5,6,7,8-tetrahydromethanopterin + 2-mercaptoethanesulphonate = 5,6,7,8-tetrahydromethanopterin + 2-(methylthio)ethanesulphonate. Archaea have evolved energy-yielding pathways marked by one-carbon biochemistry featuring novel cofactors and enzymes. This transferase (encoded by subunit A) is involved in the transfer of 'methyl' group from N5-methyltetrahydromethanopterin to coenzyme M. In an accompanying reaction, methane is produced by two-electron reduction of methyl-coenzyme M by another enzyme, methyl-coenzyme M reductase.
