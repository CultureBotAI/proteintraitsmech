identifier: Pfam:PF27780
label: Small acid-soluble spore protein, SspL
definition: >-
  This protein family is restricted to a subset of endospore-forming bacteria such as Bacillus subtilis, all of which are in the Firmicutes (low-GC Gram-positive) lineage. It is a minor SASP (small, acid-soluble spore protein) designated SspL.
