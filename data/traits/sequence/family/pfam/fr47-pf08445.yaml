identifier: Pfam:PF08445
label: FR47-like protein
definition: >-
  This entry represents a domain found towards the C-terminal end of GCN5-like protein acetyltransferase Rv2170 from Mycobacterium tuberculosis, which is involved in the post-translational regulation of the central metabolic enzyme isocitrate dehydrogenase 1 (ICDH-1) through lysine acetylation. Proteins in this entry have a conserved region similar to the C-terminal region of the Drosophila melanogaster (Fruit fly) hypothetical protein FR47 ( , ). This protein has been found to consist of two N-acyltransferase-like domains swapped with the C-terminal strands.
