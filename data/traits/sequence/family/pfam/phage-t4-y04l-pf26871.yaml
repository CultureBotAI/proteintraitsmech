identifier: Pfam:PF26871
label: Phage T4 Y04L protein
definition: >-
  This entry represents protein Y04L found in bacteriophages. The prototype is from bacteriophage T4, a 102 amino acid protein with a molecular weight of 11.9 kDa located in the pin-nrdC intergenic region. The protein is also known as 49.3 and is found in the T4 genome region between map positions 48.266 kb and 39.166 kb. The function of this protein is unknown.
