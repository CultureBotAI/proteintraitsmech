identifier: Pfam:PF13044
label: 'Fusion glycoprotein F0, Isavirus '
definition: >-
  Fusion between viral and cellular membranes is mediated by viral membrane fusion glycoproteins. This entry represents fusion glycoprotein F0 from the infectious salmon anemia virus (ISAV). The precursor protein F0 is proteolytically cleaved to F1 and F2, which are held together by disulphide bridges.
