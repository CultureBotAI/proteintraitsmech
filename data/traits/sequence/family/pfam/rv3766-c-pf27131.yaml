identifier: Pfam:PF27131
label: Rv3766 C-terminal domain
definition: >-
  This entry represents the C-terminal domain of uncharacterised protein Rv3766 from Mycobacterium tuberculosis and related mycobacteria. Rv3766 is approximately 274 amino acids and has been detected by mass spectrometry. The function of this domain remains to be determined.
