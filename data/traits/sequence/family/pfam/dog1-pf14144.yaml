identifier: Pfam:PF14144
label: Seed dormancy control
definition: >-
  This entry represents a domain found in plant transcription factors, including TGA proteins and protein PERIANTHIA. In Arabidopsis thaliana, there are seven TGA paralogues (TGA 1-7), which are transcriptional activators that binds specifically to the DNA sequence 5'-TGACG-3'. Another Arabidopsis thaliana protein in this entry, PERIANTHIA, binds to the 5'-AAGAAT-3' cis-acting element found in AG promoter and is involved in the determination of floral organ number.
