identifier: Pfam:PF03385
label: STELLO glycosyltransferases
definition: >-
  Members of this family have been characterised in plants and named STELLO. STELLO1 and 2 from Arabidopsis are Golgi-localized proteins that can interact with cellulose synthase CesA and control cellulose quantity. Cellulose is produced at the plasma membrane by cellulose synthase (CesA) complexes (CSCs), which are assembled in the endomembrane system and trafficked to the plasma membrane. STELLO1 and 2 are though to regulate CSC assembly in the plant Golgi apparatus. Point mutations in the predicted catalytic domains of the STELLO proteins indicate that they are glycosyltransferases facing the Golgi lumen. The role of the metazoan members of this family is not known.
