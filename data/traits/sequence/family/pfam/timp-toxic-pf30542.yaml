identifier: Pfam:PF30542
label: Toxic protein TimP
definition: >-
  This entry represents the Toxic protein TimP from Salmonella typhimurium and related proteins. The gene timP (toxic inner membrane protein) occurs within the small structural RNA ryfA. TimP is the toxic component of a probable type I toxin-antitoxin (TA) system. It is neutralised by sRNA antitoxin TimR which binds to the 5' UTR of timP mRNA and inhibits translation. When TimP is expressed from its promoter in the absence of antitoxin leads to mild cell stress; overexpression in situ is toxic to the cell and causes membrane leakage. The antitoxin gene is encoded immediately upstream and transcribed divergently from the toxin gene; antitoxin RNA is less stable than timP mRNA.
