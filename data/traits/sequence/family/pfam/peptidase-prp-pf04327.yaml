identifier: Pfam:PF04327
label: Cysteine protease Prp
definition: >-
  This is a family of cysteine proteases that are found to cleave the N terminus extension of ribosomal subunit L27 in eubacteria. Proteins in this family are distinguished by a pair of invariant histidine and cysteine residues with conserved spacing that form the classic catalytic dyad of a cysteine protease. Staphylococcus aureus depends on L27 cleavage by Prp for ribosome function, being a target for antibiotic development.
