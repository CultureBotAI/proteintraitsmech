identifier: Pfam:PF07091
label: Ribosomal RNA methyltransferase (FmrO)
definition: >-
  This family consists of several bacterial ribosomal RNA methyltransferase (aminoglycoside-resistance methyltransferase) proteins. They specifically methylate the N7 position of guanine 1405 in 16S rRNA and confer resistance to various aminoglycosides, including gentamicin, kanamycin and sisomicin.
