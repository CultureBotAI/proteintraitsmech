identifier: Pfam:PF21709
label: Emaravirus ABC_C protein
definition: >-
  This family corresponds to the ABC proteins of clade C of emaraviruses (plant-infecting bunyaviruses). They are involved in pathogenicity, and may act as silencing suppressors in some species [ , https://doi.org/10.3390/f13111868]. These proteins may adopt an all-α topology.
