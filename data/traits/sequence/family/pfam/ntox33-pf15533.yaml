identifier: Pfam:PF15533
label: Bacterial toxin 33
definition: >-
  Prokaryotic polymorphic toxin systems are implicated in intra-specific conflicts. They are characterised by a remarkable diversity of C-terminal toxin domains generated by recombination with standalone toxin-coding cassettes. This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses an α+β fold and [DN]xHxxK and DxxxD motifs. It is usually exported by the Type 2 secretory system.
