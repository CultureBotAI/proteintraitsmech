identifier: Pfam:PF24350
label: Family of unknown function (DUF7510)
definition: >-
  This entry represents a family of uncharacterised archaeal proteins. They are predicted to have a structure composed of seven nearly orthogonally packed strands, four of which are located at the N-terminal and three at the C-terminal. The N- and C-terminal strands clamp to form a β-sandwich. They are separated by a ~50 aa long disordered region which contains a repetitive SPY sequence motif.
