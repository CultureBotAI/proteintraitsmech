identifier: Pfam:PF08250
label: Sperm-activating peptides
definition: >-
  The sperm-activating peptides (SAPs) are isolated in egg-conditioned media (egg jelly) of sea urchins. SAPs have several effects on sea urchin spermatozoa: stimulate sperm respiration and motility through intracellular alkalinization, transient elevation of cAMP, cGMP and Ca 2+ levels in sperm cells.
