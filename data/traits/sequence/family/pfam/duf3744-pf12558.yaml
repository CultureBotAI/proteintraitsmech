identifier: Pfam:PF12558
label: ATP-binding cassette cobalt transporter
definition: >-
  This domain family is found in bacteria, and is approximately 70 amino acids in length. The family is found in association with . There is a conserved REP sequence motif. There is a single completely conserved residue P that may be functionally important. The proteins in this family are frequently annotated as ABC Cobalt transporters however there is little accompanying literature to confirm this.
