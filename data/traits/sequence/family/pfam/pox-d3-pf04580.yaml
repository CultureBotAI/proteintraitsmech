identifier: Pfam:PF04580
label: 'Chordopoxvirinae D3 protein '
definition: >-
  This entry represents Protein D3 from Vaccinia virus, also known as Core protein OPG115, and similar sequences from poxvirus. D3 is a late protein which is part of a large complex required for early virion morphogenesis. This complex participates in the formation of virosomes and the incorporation of virosomal contents into nascent immature virions. The conserved region occupies the entire length of D3 protein.
