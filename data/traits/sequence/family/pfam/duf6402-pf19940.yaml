label: Family of unknown function (DUF6402)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000464) is described by MIBiG as an example of the NRP (non-ribosomal peptide) biosynthetic class, in particular the xenoamicin A biosynthetic gene cluster from Xenorhabdus doucetiae. This family appears to be predominantly found in proteobacteria.
