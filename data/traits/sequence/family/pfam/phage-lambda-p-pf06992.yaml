identifier: Pfam:PF06992
label: Replication protein P
definition: >-
  This entry represents a family of proteins from tailed bacteriophages and proteobacterial prophages, including Bacteriophage lambda replication protein P, also known as Helicase loader. This protein promotes replication of the phage chromosome by recruiting a key component of the cellular replication machinery to the viral origin. Specifically, it delivers one or more molecules of Escherichia coli DnaB helicase to a nucleoprotein structure formed by the lambda O initiator at the lambda replication origin.
