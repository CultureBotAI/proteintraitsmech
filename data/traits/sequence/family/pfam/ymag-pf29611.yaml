identifier: Pfam:PF29611
label: Membrane protein YmaG
definition: >-
  This entry represents the Uncharacterized protein YmaG of 91 amino acids and related proteins found in Bacillales. The protein contains a predicted transmembrane helix (residues 50-70) and is localised to the cell membrane. The function of this family remains to be determined.
