identifier: Pfam:PF05311
label: Baculovirus 33KDa late protein (PP31)
definition: >-
  Autographa californica nuclear polyhedrosis virus (AcMNPV) pp31 is a nuclear phosphoprotein that accumulates in the virogenic stroma, which is the viral replication centre in the infected-cell nucleus. Deletion of the pp31 gene does not seem to affect viral DNA replication, but results in a modest down-regulation of both early and late genes.
