identifier: Pfam:PF03864
label: Phage major capsid protein E
definition: >-
  This entry represents the major capsid protein found in bacteriophages. Major capsid protein assembles to form an icosahedral capsid with a T=7 symmetry. It plays a role in the stabilisation of the condensed form of the DNA molecule in phage heads. This protein is also found in bacteria, suggesting prophage matches also occur.
