identifier: Pfam:PF22004
label: Small regulatory polypeptide of amino acid response
definition: >-
  This family represents human small regulatory polypeptide of amino acid response (SPAR) and similar sequences from vertebrates. SPAR interacts with the lysosomal v-ATPase to negatively regulate the activation of the signalling complex mTORC1 upon stimulation with amino acids. It also acts as a regulator of muscle regeneration following injury.
