identifier: Pfam:PF21201
label: Tertiapin
definition: >-
  This is tertiapin ( ), a honeybee peptide identified as a presynaptic neurotoxin that blocks the inwardly rectifying Kir1.1/KCNJ1 and Kir3.1/3.4 (KCNJ3/KCNJ5) potassium channels with high affinity. It can prevent dose-dependently acetylcholine(ACh)-induced atrioventricular blocks in mammalian hearts, as KCNJ3/KCNJ5 channels (also named I(KACh), because these channels are activated by ACh) are found in mammalian myocytes. Interacts specifically with calmodulin in the presence of calcium ( )
