identifier: Pfam:PF13938
label: Putative heavy-metal chelation
definition: >-
  This domain of unknown function has an enolase N-terminal domain-like fold. Its genomic context suggests that it may have a role in anaerobic vitamin B12 biosynthesis. This domain is often found at the N terminus of proteins containing . The structure of , , suggests that the whole protein has this enolase N-terminal-like fold and an Rossmann-like C-terminal domain. Structural and bioinformatic analyses reveal partial similarities to Rossmann-like methyltransferases, with residues from the enolase-like fold combining to form a unique active site that is likely to be involved in the condensation or hydrolysis of molecules implicated in the synthesis of flavins, pterins or other siderophores. The protein may be playing a role in heavy-metal chelation.
