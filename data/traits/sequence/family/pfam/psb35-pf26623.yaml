identifier: Pfam:PF26623
label: Photosystem II assembly protein Psb35
definition: >-
  This entry represents Psb35 from cyanobacterium Synechocystis sp. PCC 6803 (Ssl2148, ) and related proteins from cyanobacteria. Psb35 is a component of the CP47 antenna module of Photosystem II. This protein stabilises the CP47 assembly module and associated high-light inducible proteins during the biogenesis of Photosystem II. It is likely involved in the life cycle of cyanobacterial Chl-binding proteins, especially CP47.
