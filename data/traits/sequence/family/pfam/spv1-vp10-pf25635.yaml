identifier: Pfam:PF25635
label: Sulfolobus polyhedral virus 1 capsid protein VP10
definition: >-
  This entry represents the VP10 capsid protein found in Sulfolobus polyhedral virus 1 (SPV1), a virus that infects hyperthermophilic acidophilic archaea. VP10 forms pentamers located at the 5-fold axes of the icosahedral virion. Despite having low sequence identity (~15%) with the major capsid protein VP4, VP10 shares a similar structural fold - a variation of the jelly-roll fold with additional beta-strands inserted next to the G-strand. VP10 pentamers act as adaptors for vertex complexes, anchoring them to the virion. The VP10 pentamers, along with VP4 hexamers, assemble into a T=43 icosahedral shell, which represents a capsid arrangement not previously described in viruses.
