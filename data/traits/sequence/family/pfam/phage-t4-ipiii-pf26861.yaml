identifier: Pfam:PF26861
label: Phage internal protein III
definition: >-
  This entry represents internal protein III (IpIII) found in bacteriophages. The prototype is from bacteriophage T4, a 193-amino-acid protein with a molecular weight of 21.7 kDa. The protein is synthesised as a precursor with an N-terminal propeptide that is cleaved by prohead core protease GP21 during phage head maturation. IpIII functions as one of four proteins in a complex essential for bacteriophage head maturation and assembly. The protein has been characterised by direct protein sequencing.
