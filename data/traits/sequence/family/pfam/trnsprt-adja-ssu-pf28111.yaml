identifier: Pfam:PF28111
label: Transporter small subunit-like
definition: >-
  Members of this family are very small, highly hydrophobic proteins regularly encoded adjacent to transporters. They are likely to be previously overlooked small subunits of transporters. Members of this family are found in actino- and proteobacteria. Their function is unknown.
