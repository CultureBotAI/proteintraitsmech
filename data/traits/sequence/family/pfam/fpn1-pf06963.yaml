identifier: Pfam:PF06963
label: Ferroportin1 (FPN1)
definition: >-
  This entry represents the Solute carrier family 40 member 1 (SLC40A) family of proteins, also known as Ferroportin 1 (or simply ferroportin (FPN), the major iron transporter key in cellular and systemic iron levels balance. In mammals, it mediates the absorption of dietary iron by transporting ferrous iron across the basolateral surface of duodenal enterocytes and can also recycle iron from hepatocytes and macrophages. FPN is also involved in iron transfer between maternal and fetal circulation. FPN synthesis is transcriptionally regulated by cellular hypoxia, iron and heme concentrations, and inflammatory signalling, while cell surface FPN is negatively regulated by hepcidin, which, under elevated serum iron levels, it blocks iron transport and induces FPN ubiquitination, internalization, and degradation. Structural studies in Bdellovibrio bacteriovorous suggest that the putative substrate-binding site is localized deep in the N-terminal domain and demonstrated that Ca facilitates a conformational change critical to the transport cycle. In humans, mutations in this transporter leads to nonclassical ferroportin disease (FD), a form of hereditary hemochromatosis.
