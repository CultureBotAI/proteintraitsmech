identifier: Pfam:PF04924
label: 'Poxvirus A6 protein '
definition: >-
  This entry represents Protein A6 from Vaccinia virus, also known as Virion morphogenesis protein OPG132, and similar proteins from poxvirus. A6 is a lipid-bound viral membrane assembly protein that plays an essential role in immature virion (IV) to mature virion (MV) transition. It functions in both crescent-shaped viral membranes formation and its enclosure to form immature virions. It also participates in targeting mature virion proteins to sites of virion assembly to ensure their correct localisation.
