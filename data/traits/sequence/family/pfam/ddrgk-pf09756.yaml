identifier: Pfam:PF09756
label: DDRGK domain
definition: >-
  This is a family of proteins that contain a highly conserved DDRGK motif. In humans, DDRGK domain-containing protein 1 is a substrate adapter for ufmylation, the covalent attachment of the ubiquitin-like modifier UFM1 to substrate proteins, which plays a key role in reticulophagy (also called ER-phagy). It is also involved in cartilage development through SOX9, inhibiting the ubiquitin-mediated proteasomal degradation of this transcriptional regulator.
