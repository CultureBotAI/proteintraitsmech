identifier: Pfam:PF06753
label: Bradykinin
definition: >-
  This family consists of several Bradykinin sequences. The skins of anuran amphibians, in addition to mucus glands, contain highly specialised poison glands, which, in reaction to stress or attack, exude a complex noxious cocktail of biologically active molecules. These secretions often contain a plethora of peptides among which Bradykinin or structural variants have been identified. Bradykinin, widespread among frogs, is able to pass through epithelial barriers independently and interfere in multiple physiological processes without the need of other substances to enhance the uptake. The diversity of bioactive peptides found in the skin secretions of amphibian species great potential for drug discovery and biotechnological applications.
