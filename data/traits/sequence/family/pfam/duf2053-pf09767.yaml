identifier: Pfam:PF09767
label: Predicted membrane protein (DUF2053)
definition: >-
  TMEM147 is a component of the Nicalin-NOMO protein complex, which catalyzes the proteolytic cleavage of the transmembrane domain of various proteins including the beta-amyloid precursor protein and Notch. It is a component of the multi-pass translocon (MPT) complex that mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes.
