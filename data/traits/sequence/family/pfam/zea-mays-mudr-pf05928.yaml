identifier: Pfam:PF05928
label: Zea mays MURB-like protein (MuDR)
definition: >-
  This family consists of several Zea mays (Maize) specific MURB-like proteins. The transposition of Mu elements underlying Mutator activity in maize requires a transcriptionally active MuDR element. Despite variation in MuDR copy number and RNA levels in Mutator lines, transposition events are consistently late in plant development, and Mu excision frequencies are similar.
