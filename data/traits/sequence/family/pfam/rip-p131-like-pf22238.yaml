identifier: Pfam:PF22238
label: RIP/P131 family
definition: >-
  This entry represents a family of viral proteins, including RNAP Inhibitory Protein (RIP) and its paralogue, the major capsid protein (MCP) P131, both from Acidianus two-tailed virus. These proteins adopt very similar bundle structures consisting of six α-helices. RIP factor binds inside the DNA-binding channel of RNAP, inhibiting transcription by occlusion of binding sites for nucleic acid and the transcription initiation factor TFB. MCP P131 is a building block of the viral capsid.
