identifier: Pfam:PF02530
label: Porin subfamily
definition: >-
  This family consists of porins from the alpha subdivision of Proteobacteria. Members of this family are related to Gram-negative porins, including Porin Omp2a/b from Brucella. The porins form large aqueous channels in the cell membrane allowing the selective entry of hydrophilic compounds this so called 'molecular sieve' is found in the cell walls of Gram-negative bacteria.
