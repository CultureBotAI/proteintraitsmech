identifier: Pfam:PF28051
label: Spore coat protein CotA-like
definition: >-
  This entry represents the CotA family of proteins. CotA, found in Clostridium difficile, is a spore coat protein that has been detected in the exosporium. Similar proteins with homology to CotA can be identified in several closely related endospore-forming bacteria.
