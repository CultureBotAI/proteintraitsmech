identifier: Pfam:PF07857
label: Transmembrane family, TMEM144 of transporters
definition: >-
  Members of this family fall in to the drug/metabolite transporter (dmt) superfamily. They carry 10xTM domains arranged as 5+5. Although these two sets may originally have arisen by gene-duplication the divergence now is such that the similarity between the two halves is no longer detectable by sequence.
