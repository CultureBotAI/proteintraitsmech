identifier: Pfam:PF26816
label: Bacteriophage T4 Mod ADP-ribosyltransferase
definition: >-
  This entry represents the bacteriophage T4 Mod family of ADP-ribosyltransferases, which includes ModA and ModB. These enzymes participate in the regulation of the T4 replication cycle by ADP-ribosylating defined sets of host proteins to redirect cellular metabolism from host to phage control. ModA and ModB share 25% sequence identity and 47% similarity, reflecting their evolutionary relationship. Both proteins contain the conserved R-S-EXE active site motif characteristic of arginine-specific ADP-ribosyltransferases. ModA specifically ADP-ribosylates both alpha subunits of RNA polymerase at Arg265, which inhibits transcription from T4 early promoters and conditions the polymerase for interaction with T4-encoded transcription factors for middle and late transcription. ModB targets the ribosomal S1 protein and other cellular proteins involved in translation and regulation. Site-directed mutagenesis has confirmed the importance of conserved residues in the catalytic mechanism, which follows an SN1-type reaction scheme involving oxocarbenium intermediate formation.
