identifier: Pfam:PF17056
label: Killer toxin-resistance protein 1
definition: >-
  Killer toxin-resistance protein 1 (kre1) is a GPI-anchored plasma membrane protein. It is involved in the late stage of cell wall 1,6-beta-glucan synthesis and assembly. Its function in yeast cell wall assembly is structural, rather than enzymatic. It can also act as a plasma membrane receptor for the yeast K1 viral toxin, and is involved in subsequent lethal channel formation. This entry also includes Pga1 protein, which has a role in oxidative stress response and is required for normal adhesion to host cells and for adherence during biofilm formation.
