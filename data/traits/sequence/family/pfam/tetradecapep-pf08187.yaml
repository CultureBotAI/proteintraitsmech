identifier: Pfam:PF08187
label: Myoactive tetradecapeptides family
definition: >-
  This entry consists of myoactive tetradecapeptides that are isolated from the gut of Earthworms, Eisenia foetida (Common brandling worm) and Pheretima vittata (Earthworm). These peptides were termed ETP and PTP respectively. Both peptides showed a potent excitatory action on spontaneous contractions of the anterior gut. These peptides show similarity to Molluscan tetradecapeptides and Arthropodan tridecapeptides.
