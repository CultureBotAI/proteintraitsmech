identifier: Pfam:PF05766
label: Bacteriophage Lambda NinG protein
definition: >-
  The ninR region of phage lambda contains two recombination genes, ninB (also known as orf) and ninG (also known as rap). These genes are involved in the RecF and RecBCD recombination pathways of Escherichia coli that operate on phage lambda. NinB and NinG participate in Red recombination, the primary pathway operating when wild-type lambda grows lytically in rec+ cells.
