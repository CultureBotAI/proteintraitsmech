identifier: Pfam:PF17568
label: Family of unknown function (DUF5474)
definition: >-
  The proteins in this entry represent Orf8 from killer plasmid K2 (pGKL2) of Kluyveromyces lactis (Yeast) (Candida sphaerica). K2 contains ten open reading frames. Some of the ORFs overlap on different strands and some on the same strand and at least 8 of the 10 ORFs are transcribed. Comparison of the sequence of pGKL2 to the sequence of the K2 plasmid from Saccharomyces cerevisiae strain F102-2 revealed only one nucleotide difference showing a very high degree of conservation of the plasmid sequences from the two yeasts.
