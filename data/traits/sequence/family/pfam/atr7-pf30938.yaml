identifier: Pfam:PF30938
label: AAL-toxin resistant protein 7
definition: >-
  This entry represents the ATR7 (AAL-toxin resistant 7) protein family found in seed plants. Members localise to the nucleus. In Arabidopsis thaliana, ATR7 is required to regulate responses to abiotic stress including drought and oxidative stress leading to cell death. The protein confers sensitivity to paraquat, the catalase inhibitor aminotriazole, and the fungal Alternaria alternata f.sp. lycopersici toxin (AAL toxin). Expression is induced by oxidative and abiotic stresses such as hydrogen peroxide, cadmium chloride, and osmotic stress.
