identifier: Pfam:PF14395
label: Phage phiEco32-like COOH.NH2 ligase-type 2
definition: >-
  This entry represents a family of COOH-NH2 ligases/GCS superfamily found in the neighbourhood of YheC/D-like ATP-grasp and the CotE family of proteins in the firmicutes. Contextual analysis suggests that it might be involved in cell wall modification and spore coat biosynthesis.
