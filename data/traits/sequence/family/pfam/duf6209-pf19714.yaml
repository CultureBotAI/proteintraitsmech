definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC00001940) is described by MIBiG as an example of the following biosynthetic class, polyketide. It includes a member from the pyxidicycline A biosynthetic gene cluster from Pyxidicoccus fallax. This family appears to be predominantly found in bacteria.
