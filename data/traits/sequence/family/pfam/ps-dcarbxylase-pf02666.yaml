identifier: Pfam:PF02666
label: Phosphatidylserine decarboxylase
definition: >-
  PSD plays a pivotal role in the synthesis of phospholipid by the mitochondria. The substrate phosphatidylserine is synthesised extramitochondrially and must be translocated to the mitochondria prior to decarboxylation. Phosphatidylserine decarboxylases is responsible for conversion of phosphatidylserine to phosphatidylethanolamine and plays a central role in the biosynthesis of aminophospholipids. This family also includes L-tryptophan decarboxylase from the mushroom Psilocybe cubensis, which is required for the biosynthesis of the psychotropic agent psilocybin. This enzyme catalyses the first step in the biosynthetic pathway, converting L-tryptophan to tryptamine.
