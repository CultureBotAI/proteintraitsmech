identifier: Pfam:PF08586
label: RSC complex, Rsc14/Ldb7 subunit
definition: >-
  RSC is an ATP-dependent chromatin remodelling complex found in yeast. The RSC components Rsc7/Npl6 and Rsc14/Ldb7 interact physically and/or functionally with Rsc3, Rsc30, and Htl1 to form a module important for a broad range of RSC functions.
