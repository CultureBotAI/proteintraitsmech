label: AF_0414 family
definition: >-
  This entry represents the AF_0414 family of uncharacterised proteins found predominantly in bacteria with some archaeal members. The family is found in diverse bacterial lineages including Flavobacteriaceae, Ectothiorhodospiraceae, and Chromatiales, with some members in Archaeoglobaceae. The proteins are approximately 144 amino acids in length. The function of this protein family remains to be determined.
