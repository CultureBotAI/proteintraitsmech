identifier: Pfam:PF08486
label: Stage II sporulation protein
definition: >-
  This entry represents the C-terminal domain of SpoIID-like amidase enhancer proteins. It follows the SpoIID/LytB domain ( ) which is involved in peptidoglycan degradation. In Synechocystis sp. PCC 6803, the protein Slr0191 is annotated as a cell wall hydrolase and has been localised to the thylakoid membrane and periplasm. In Fibrobacter succinogenes, the homologue Fisuc_2398 shows increased expression in the presence of cellulose. The family is found in Cyanobacteriota, Bacillota and Bacteroidota. The specific function of this C-terminal domain remains to be determined.
