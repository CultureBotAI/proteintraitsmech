identifier: Pfam:PF10237
label: Probable N6-adenine methyltransferase
definition: >-
  This is a protein of approximately 200 residues which is conserved from plants to humans. It contains a highly conserved QFW motif close to the N terminus and a DPPF motif in the centre. The DPPF motif is characteristic of N-6 adenine-specific DNA methylases, and this family is found in eukaryotes. Proteins in this entry include EEF1A lysine methyltransferase 1 (EEF1AKMT1) and ZCCHC4. EEF1AKMT1 is a protein-lysine methyltransferase that selectively catalyzes the trimethylation of EEF1A at 'Lys-79'. ZCCHC4 is an rRNA N6-methyltransferase that specifically methylates the adenine in position 4220 of 28S rRNA.
