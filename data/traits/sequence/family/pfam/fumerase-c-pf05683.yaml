identifier: Pfam:PF05683
label: Fumarase C-terminus
definition: >-
  This entry represents various Fe-S type hydro-lyases, including the beta subunit from both L-tartrate dehydratase (TtdB; ) and class 2 fumarate hydratase (FumC; ). A number of Fe-S cluster-containing hydro-lyases share a conserved motif, including argininosuccinate lyase, adenylosuccinate lyase, aspartase, class I fumarate hydratase (fumarase), and tartrate dehydratase (see ). Proteins in this group represent a subset of closely related proteins or modules, including the Escherichia coli tartrate dehydratase beta chain and the C-terminal region of the class I fumarase (where the N-terminal region is homologous to the tartrate dehydratase alpha chain). The activity of the archaeal proteins in this group is unknown.
