identifier: Pfam:PF14139
label: YpzG-like protein
definition: >-
  The YpzG-like protein family includes the Bacillus subtilis YpzG protein , which is functionally uncharacterised. This family of proteins is found in bacteria. Proteins in this family are approximately 50 amino acids in length and contain a conserved QVNG sequence motif.
