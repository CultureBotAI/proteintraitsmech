identifier: Pfam:PF11727
label: Invariant surface glycoprotein
definition: >-
  This family is found in Trypanosome species, and appears to be one of two invariant surface glycoproteins, ISG65 and ISG75, that are found in the mammalian stage of the parasitic protozoan. The sequence suggests the two families are polypeptides with N-terminal signal sequences, hydrophilic extracellular domains, single trans-membrane α-helices and short cytoplasmic domains. They are both expressed in the bloodstream form but not in the midgut stage. Both polypeptides are distributed over the entire surface of the parasite.
