identifier: Pfam:PF13000
label: Acetyl-coenzyme A transporter 1
definition: >-
  This entry represents acetyl-coenzyme A transporter 1 and related proteins. Acetyl-coenzyme A transporter 1 is an acetyl-CoA transporter that mediates active acetyl-CoA import through the endoplasmic reticulum (ER) membrane into the ER lumen. Within the ER lumen, specific ER-based acetyl-CoA:lysine acetyltransferases are responsible for the acetylation of ER-based protein substrates, such as BACE1. The transporter is also necessary for O-acetylation of gangliosides.
