identifier: Pfam:PF26874
label: Phage T4 internal protein II
definition: >-
  This entry represents internal protein II (IpII) found in bacteriophages. The prototype is from bacteriophage T4, a 100 amino acid protein with a molecular weight of 11.1 kDa. The protein is synthesised as a precursor with an N-terminal propeptide that is cleaved by prohead core protease GP21 during phage maturation. IpII has histone-like character and binds weakly to other components of the assembly core during early stages of bacteriophage head morphogenesis. The protein has been extensively characterised by direct protein sequencing.
