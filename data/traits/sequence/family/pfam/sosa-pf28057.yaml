identifier: Pfam:PF28057
label: DNA damage-induced cell division inhibitor SosA-like
definition: >-
  This entry represents a group of proteins, found in Bacillales, that are homologous to SosA. SosA is a cell division inhibitor that blocks cell division in response to DNA damage. SosA is a small, predicted membrane protein with an extracellular C-terminal domain in which the conserved residues are essential for the inhibitory activity. SosA halts cell division and synchronises the cell population at a stage where division proteins such as FtsZ and EzrA are localised at midcell, and the septum formation is initiated but unable to progress to closure.
