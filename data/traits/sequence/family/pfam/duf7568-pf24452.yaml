identifier: Pfam:PF24452
label: Family of unknown function (DUF7568)
definition: >-
  This entry represents a small family of uncharacterised proteins found in Halobacteria. They contain two pairs of conserved cysteines that are likely involved in metal coordination. These proteins are predicted to contain two subdomains one of which is consisting of a five-stranded antiparallel β-sheet and a helix packed on it followed by a zinc β-ribbon domain.
