identifier: Pfam:PF03133
label: Tubulin-tyrosine ligase family
definition: >-
  Tubulins and microtubules are subjected to several post-translational modifications of the carboxy-terminal end of most major forms of tubulins has been extensively analysed. This modification cycle involves a specific carboxypeptidase and the activity of the tubulin-tyrosine ligase (TTL) and the tubulin polyglutamylase (TTLL). Tubulin-tyrosine ligase (TTL) catalyses the ATP-dependent post-translational addition of a tyrosine to the carboxy terminal end of detyrosinated alpha-tubulin. Tubulin polyglutamylase (such as TTLL10) can modify both tubulin and non-tubulin proteins, generating side chains of glycine on the γ-carboxyl groups of specific glutamate residues of target proteins. Tubulin polyglutamylation may be involved in the organisation of the neuronal microtubule network, in centriole stability, axoneme motility and mitosis.
