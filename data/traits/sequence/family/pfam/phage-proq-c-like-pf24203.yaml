identifier: Pfam:PF24203
label: Phage ProQ C-terminal-like domain
definition: >-
  This entry represents a family of uncharacterised phage and bacterial proteins. Structurally the proteins include an N-terminal β-barrel domain that shows some structural similarity to the C-terminal domain of the ProQ RNA-binding domain. That domain has been described as being similar to the Tudor domains.
