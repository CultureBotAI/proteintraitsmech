identifier: Pfam:PF27962
label: Transmembrane protein 158
definition: >-
  Transmembrane protein 158 (TMEM158) is upregulated during Ras-induced senescence and has been associated with various cancers. It has been suggested to be a potential oncogene and serve as a diagnostic indicator for anaplastic thyroid carcinoma.
