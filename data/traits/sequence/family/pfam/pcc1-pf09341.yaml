identifier: Pfam:PF09341
label: Transcription factor Pcc1
definition: >-
  This entry represents the CTAG/Pcc1 family. Its members include yeast EKC/KEOPS complex subunit Pcc1, mammalian EKC/KEOPS complex subunit Lage3 and human cancer/testis antigen (CTAG) 1/2. In Saccharomyces cerevisiae, Pcc1 is a component of the EKC/KEOPS protein complex that is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t6A37) in tRNAs that read codons beginning with adenine. Similar to its S. cerevisiae homologue, human LAGE3 is part of the EKC complex that is essential for a universal tRNA modification. The human EKC complex interacts with tumour antigen PRAME (preferentially expressed antigen in melanoma), and hence involved in oncogenesis.
