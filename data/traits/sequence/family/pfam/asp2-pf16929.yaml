identifier: Pfam:PF16929
label: Accessory Sec system GspB-transporter
definition: >-
  Proteins in this entry form part of an accessory Sec system which is involved in the export of serine-rich glycoproteins important for virulence in a number of Gram-positive species, including Streptococcus gordonii and Staphylococcus aureus. Asp2 directly interacts with Aps1 and Asp3 to form a complex and stabilizes it; this complex is essential for substrate export. Asp2 and Asp3 interact directly with GspB and may function in part as chaperones in the early phase of GspB transport. Moreover, Asp2 acetylates the GlcNAc residues on GspB. Asp1/2/3 complex stimulates the ATPase activity of SecA2 and also affects the export and glycosylation of pneumococcal serine-rich repeat proteins (PrsPs).
