identifier: Pfam:PF25728
label: Cytomegalovirus US29 protein
definition: >-
  This entry represents the uncharacterised US29 protein from Human cytomegalovirus (HCMV) and similar sequences from betaherpesviruses (Cytomegalovirus). US29 is a membrane protein with two predicted transmembrane helices. The specific function of this protein remains unknown.
