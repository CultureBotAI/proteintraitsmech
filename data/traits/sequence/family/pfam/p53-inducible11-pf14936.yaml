identifier: Pfam:PF14936
label: Tumour protein p53-inducible protein 11
definition: >-
  p53 is a tumour suppressor that suppresses tumour development by inducing stable growth arrest or cell apoptosis. The expression of p53 induces the transcription of several genes, including the TP53I11 (also known as PIG11) gene, which expresses the tumor protein p53-inducible protein 11. The function of this protein is not clear.
