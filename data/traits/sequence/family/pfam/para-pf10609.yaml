identifier: Pfam:PF10609
label: NUBPL iron-transfer P-loop NTPase
definition: >-
  This entry represents members of the MRP/Nbp35 class of iron-sulfur (FeS) cluster scaffolds, such as Nbp35 and Cfd1, that function to assemble nascent FeS clusters for transfer to FeS-requiring enzymes. They have been identified as ATPases. This family also contains FleN/FlhG, which regulates aspects of flagellar assembly, placement and number. FleN/FlhG activates the SRP-GTPase FlhF.
