identifier: Pfam:PF09399
label: Betacoronavirus lipid binding protein
definition: >-
  This is a family of proteins found in SARS and SARS-like coronaviruses. It includes Protein 9b from SARS coronavirus 2 (SARS-CoV-2), Human SARS coronavirus (SARS-CoV) and Bat coronaviruses. Protein 9b is one of 8 accessory proteins in SARS-CoV. The gene (ORF 9b, also known as ORF13) that encodes this protein is included within the nucleocapsid (N) gene (alternative ORF). Data suggest that protein 9b is a structural component of SARS-CoV virions and functions as an unusual lipid binding protein. SARS-CoV ORF-9b has been shown to localise to the outer mitochondrial membrane and to target mitochondrial antiviral signalling proteins (MAVS), suppressing innate immunity. Antibodies against SARS-CoV ORF-9b have been found in patients, demonstrating that it is produced during infection. Protein 9b from SARS CoV comprises 98 amino acids. Its structure has a novel fold which forms a dimeric tent-like β structure with an amphipathic surface, and a central hydrophobic cavity that binds lipid molecules. This cavity is likely to be involved in membrane attachment. Protein 9b is a group-specific protein of SARS coronavirus (CoV). The sequence of ORF-9b is well conserved in different SARS isolates, however, there is little homology between Protein 9b from SARS-CoV and the I protein (Protein 9b homologue) present in other coronaviruses.
