identifier: Pfam:PF03824
label: High-affinity nickel-transport protein
definition: >-
  High affinity nickel transporters are involved in the incorporation of nickel into H2-uptake hydrogenase and urease enzymes and are essential for the expression of catalytically active hydrogenase and urease. Ion uptake is dependent on proton motive force. HoxN in Ralstonia eutropha (Alcaligenes eutrophus) is thought to be an integral membrane protein with seven transmembrane helices. The transporter RcnA has been implicated in Ni(II) and Co(II) detoxification in E. coli, probably through efflux.
