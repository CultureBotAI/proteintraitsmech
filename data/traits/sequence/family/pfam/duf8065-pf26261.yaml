identifier: Pfam:PF26261
label: Family of unknown function (DUF8065)
definition: >-
  This entry represents Propionyl-CoA carboxylase, the protein PccX subunit from Haloferax mediterranei and similar uncharacterised proteins found in halobacteria. PccX is part of the propionyl coenzyme A carboxylase (PCC) complex involved in propionate utilisation and in the production of the poly(3-hydroxybutyrate-co-3-hydroxyvalerate)(PHBV), which is a water-insoluble biopolymer used as intracellular energy reserve material when cells grow under conditions of nutrient limitation.
