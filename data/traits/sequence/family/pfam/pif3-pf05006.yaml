identifier: Pfam:PF05006
label: Per os infectivity factor 3
definition: >-
  This family contains viral proteins, and includes Baculovirus Per os infectivity factor 3 (PIF3). PIF3 forms a complex on the occlusion-derived virus surface with PIF1, PIF2, and P74 which has an essential function in the initial stages of baculovirus oral infection.
