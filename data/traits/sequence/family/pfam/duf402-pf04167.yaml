identifier: Pfam:PF04167
label: Protein of unknown function (DUF402)
definition: >-
  This β-barrel domain is found in Cytidylyl-2-hydroxypropylphosphonate hydrolase from Streptomyces wedmorensis (FomD), a protein encoded in the fosfomycin biosynthesis gene cluster. This domain is also found in Ntdp (nucleoside tri- and diphosphatase, also known as Sa1684) from Staphylococcus aureus and related prokaryotic proteins. FomD is a protein encoded in the fosfomycin biosynthesis gene cluster, which hydrolyses (S)-HPP-CMP to give (S)-HPP and CMP in the presence of Mn2 or Co2. It also hydrolyses cytidylyl 2-hydroxyethylphosphonate (HEP-CMP), which is a biosynthetic intermediate before C-methylation. FomD structure revealed that it has a β-barrel fold consisting of a large twisted antiparallel β-sheet. It has a conserved Tyr residue which activates a water molecule to promote nucleophilic attack on the phosphorus atom of the phosphonate moiety.
