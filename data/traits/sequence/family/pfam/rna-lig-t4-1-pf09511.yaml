identifier: Pfam:PF09511
label: RNA ligase
definition: >-
  This entry represents the N-terminal domain of the T4 RNA ligase 1 (also known as Rnl1). Host defence to phage may include cleavage and inactivation of specific tRNA molecules; Rnl1 acts to reverse this RNA damage. The enzyme is adenylated, transiently, on a Lys residue in a motif KXDGSL. Proteins containing this domain also include fungal tRNA ligases that have adenylyltransferase activity. tRNA ligases are enzymes required for the splicing of precursor tRNA molecules containing introns. Please see the following relevant references:.
