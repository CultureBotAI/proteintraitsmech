identifier: Pfam:PF05539
label: Pneumovirinae attachment membrane glycoprotein G
definition: >-
  This family of proteins contain the major surface glycoprotein of turkey rhinotracheitis virus (TRTV), avian pneumovirus (APV), the aetiological agent of turkey rhinotracheitis (TRT), and other Metapneumoviruses. The major surface glycoprotein is the attachment (G) protein, which, by analogy with other respiratory syncytial viruses (RSV), has been proposed to be responsible for virus binding to its cell receptor. The APV G gene and its predicted protein have several features in common with their RSV counterparts. Both G proteins are type II glycoproteins and both the RSV G and APV G proteins are heavily O-glycosylated. In both RSV and APV, the G protein is the most variable protein and is a major target for neutralizing antibodies.
