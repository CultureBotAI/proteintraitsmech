identifier: Pfam:PF29034
label: Succinate dehydrogenase subunit 6
definition: >-
  This entry represents SDH6. The succinate dehydrogenase complex (complex II) is a highly conserved protein complex composed of the SDH1-SDH4 subunits in bacteria and in the mitochondria of animals and fungi, with up to four additional subunits in complex II of plants, termed SDH5-SDH8. SDH6 and SDH7 contribute to anchoring succinate dehydrogenase to the inner mitochondrial membrane.
