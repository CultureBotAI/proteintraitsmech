identifier: Pfam:PF11503
label: YNR034W-A-like
definition: >-
  This family of proteins is predominantly found in Saccharomycetales, including YNR034W-A (also known as EGO4) and YCR075W-A (EGO2) from Saccharomyces cerevisiae. EGO2 is a component of the yeast EGO complex (EGOC), which is responsible for the amino acid-dependent activation of the target of rapamycin complex 1 (TORC1), a central controller of cell growth, metabolism, proliferation, and differentiation in response to environmental cues. EGO2 adopts a Roadblock domain fold that consists of a central core β-sheet of five anti-parallel β-strands flanked by a long α-helix on the bottom side. EGO4 shows a similar αββαββ configuration. It interacts with the GTPase Gtr2, but its specific function remains unknown.
