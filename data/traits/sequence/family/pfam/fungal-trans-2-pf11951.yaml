identifier: Pfam:PF11951
label: Fungal specific transcription factor domain
definition: >-
  Proteins in family are transcription factors typically found in fungi, including acriflavine sensitivity control protein, arginine metabolism regulation protein II, lysine biosynthesis regulatory protein LYS14, and others. DibT is part of the gene cluster that mediates the biosynthesis of pestalotiollide B which is part of dibenzodioxocinones, a novel class of inhibitors against cholesterol ester transfer protein (CEPT).
