identifier: Pfam:PF03845
label: Spore germination protein
definition: >-
  Amino acid permeases are integral membrane proteins involved in the transport of amino acids into the cell. A number of such proteins have been found to be evolutionary related. These proteins seem to contain up to 12 transmembrane segments. The best conserved region in this family is located in the second transmembrane segment. Spore germination protein (amino acid permease) is involved in the response to the germinative mixture of L-asparagine, glucose, fructose and potassium ions (AFFK). These proteins could be amino acid transporters.
