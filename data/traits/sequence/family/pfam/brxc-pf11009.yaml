identifier: Pfam:PF11009
label: Monothiol bacilliredoxin BrxC
definition: >-
  Bacillithiol (BSH) functions as a general thiol reductant, analogous to glutathione, in a wide range of bacterial species. Bacilliredoxins reduce those proteins that are modified by disulfide bond formation with BSH (S-bacillithiolation). This entry represents BrxC from Bacillus subtilis (formerly known as YtxJ) and similar bacterial proteins related to BSH. BrxC is a monothiol bacilliredoxin responsible for the removal of BSH from oxidized cytosolic proteins. It can also debacillithiolate the mixed disulfide form of the bacilliredoxin BrxB. It has a similar fold to thioredoxin. The homologue in Deinococcus radiodurans, named AbxC, plays a role in the response to oxidative stress.
