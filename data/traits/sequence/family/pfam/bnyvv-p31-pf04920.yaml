label: Beet necrotic yellow vein virus, p31
definition: >-
  This is a family of hypothetical proteins known as p31, mostly from Beet necrotic yellow vein virus. P31, encoded by RNA4, is involved in efficient vector transmission, symptom severity and silencing suppression in roots.
