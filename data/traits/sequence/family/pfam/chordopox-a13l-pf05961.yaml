identifier: Pfam:PF05961
label: Chordopoxvirus A13L protein
definition: >-
  The major components of the vaccinia virus membrane consists of the A17L, A14L, A13L, L1L, D8R, and H3L proteins. This entry represents the A13L protein, also known as Virion membrane protein OPG139, which is 70 amino acids long and has an N-terminal hydrophobic region that is implicated in cotranslational insertion of the protein into the membranes of the ER. It is dispensable for the early biogenesis of the virion membrane but is essential for virion maturation.
