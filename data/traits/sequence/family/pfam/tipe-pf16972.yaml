identifier: Pfam:PF16972
label: Na+ channel auxiliary subunit TipE
definition: >-
  TipE appears to be a family of insect Na+ channel auxiliary subunit proteins. It is required during pupal development to rescue adult paralysis and also protects adult flies against heat-induced lethality.
