identifier: Pfam:PF20126
label: Toxin TumE
definition: >-
  This entry represents a family of proteins found in archaea and bacteria. These proteins have been recently described as the toxin component TumE from the novel toxin-antitoxin system TumE-TumA, which constitutes a translation-targeting toxic effector. These proteins are predicted to adopt a conserved α+β fold, where two α-helices pack against an antiparallel β-sheet with seven strands.
