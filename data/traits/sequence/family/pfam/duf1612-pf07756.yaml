definition: >-
  This entry represents a domain of unknown function found in a group of proteins mainly from alphaproteobacteria. Many members of this group are known to associate symbiotically with plants. Moreover, the majority are coded for by plasmids, which in many cases are known to confer on the organism the ability to interact symbiotically with leguminous plants. An example of such a plasmid is NGR234, which encodes Y4CF, a protein of unknown function that is a member of this family. Other members of this family are expressed by organisms with a documented genomic similarity to plant symbionts. This domain is usually found associated to
