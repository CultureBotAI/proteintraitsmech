identifier: Pfam:PF26834
label: Phage T4 Y06J protein
definition: >-
  This entry represents uncharacterised proteins found in bacteriophages, including Y06J from bacteriophage T4, a 109 amino acid protein with a molecular weight of 12.8 kDa located in the regB-denV intergenic region. The protein is found in the early region of the T4 genome (58.3 to 65.5-kb region) and remains uncharacterised. The function of this protein is unknown.
