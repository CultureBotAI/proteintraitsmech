identifier: Pfam:PF11829
label: Protein of unknown function (DUF3349)
definition: >-
  This family of proteins are functionally uncharacterised. This protein is found in bacteria. Proteins in this family are typically between 99 to 124 amino acids in length. According to literature, the DUF3349 proteins are predicted to be good drug targets because they are predominantly in the Mycobacterium and Rhodococcus bacterial species.
