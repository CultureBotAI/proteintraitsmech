identifier: Pfam:PF15610
label: PRTase ComF-like
definition: >-
  This phosphoribosyltransferase (PRTase) family is related to the ComF PRTases. These genes are found in the smaller biosynthetic operon associated with the Ter stress response operon and are predicted to be involved in the biosynthesis of a ribo-nucleoside involved in stress response.
