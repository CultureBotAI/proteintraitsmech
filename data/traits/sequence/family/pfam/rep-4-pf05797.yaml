identifier: Pfam:PF05797
label: Yeast trans-acting factor (REP1/REP2)
definition: >-
  The majority of laboratory strains of S. cerevisiae contain 2-micron circle plasmids. 2-micron circle plasmids encode four open reading frames (FLP1, RAF1, REP1, and REP2) and three well known cis-acting sequences, ORI, FRT, and STB. Rep proteins, including Rep1 and Rep12, are part of the plasmid partitioning system that ensures the equal distribution of replicated plasmid molecules to daughter cells.
