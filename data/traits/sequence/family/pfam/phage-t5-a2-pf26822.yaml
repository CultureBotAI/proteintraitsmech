identifier: Pfam:PF26822
label: Phage T5 A2 protein family
definition: >-
  The phage T5 A2 protein family is involved in the second step transfer (SST) process, which facilitates the completion of viral DNA integration into the host cell. This family includes proteins that interact with A1 proteins to form heterooligomers, playing a crucial role in the viral infection cycle.
