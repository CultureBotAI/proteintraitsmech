identifier: Pfam:PF06356
label: Protein of unknown function (DUF1064)
definition: >-
  This entry includes Bacteriophage 92, Orf34. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. This family consists of several phage and bacterial proteins whose functions have not been experimentally determined. Computational analysis involving sequence, predicted structure and genomic context suggests that these proteins may be endonucleases which function in phage genome segregation, or the repair of double-stranded breaks introduced during either this process or DNA replication.
