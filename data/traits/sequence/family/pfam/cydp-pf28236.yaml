identifier: Pfam:PF28236
label: Cytochrome oxidase putative small subunit CydP
definition: >-
  This entry represents a group of small proteins with a highly hydrophobic core region from proteobacteria, including the cytochrome oxidase putative small subunit CydP. Members are found in the context of larger subunits of cytochrome bd oxidases, therefore, they are presumed to be a small subunit or assembly factor.
