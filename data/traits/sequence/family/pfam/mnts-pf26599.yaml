identifier: Pfam:PF26599
label: Small protein MntS
definition: >-
  This entry represents the small protein MntR from E. coli and related proteins. Overexpression of MntS causes manganese sensitivity, while a lack of MntS perturbs proper manganese-dependent repression of mntH. This protein probably functions as a chaperone that makes manganese more available by delivering it to the necessary cellular locations when manganese is limiting.
