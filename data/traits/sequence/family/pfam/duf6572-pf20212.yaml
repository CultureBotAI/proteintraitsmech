label: Family of unknown function (DUF6572)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is found in bacteria. Proteins in this family are typically between 107 and 214 amino acids in length. These proteins may have a threefold symmetricβ-trefoil fold, a symmetric protein structure thought to be conserved in protein evolution.
