identifier: Pfam:PF02133
label: Permease for cytosine/purines, uracil, thiamine, allantoin
definition: >-
  This entry represents the purine-cytosine permease family, whose members include allantoin permease Dal4, nicotinamide riboside transporter 1 (Nrt1), purine-cytosine permease Fcy2/21/22, thiamine transporter Thi7/Thi72, uracil permease Fur4, uridine permease Fui1 and vitamin B6 transporter Tpn1 from budding yeasts. This entry also includes cytosine permeases codB from E. coli and purine-uracil permease AtNCS1 from Arabidopsis.
