identifier: Pfam:PF02993
label: Minor capsid protein VI
definition: >-
  Protein VI is a structural protein of the adenoviral capsid. It shuttles between the nucleus and the cytoplasm and links hexon to the nuclear import machinery via an importin alpha/beta-dependent mechanism. It also mediates adenovirus endosome penetration during cell entry.
