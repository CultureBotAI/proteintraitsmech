identifier: Pfam:PF03255
label: Acetyl co-enzyme A carboxylase carboxyltransferase-like
definition: >-
  This entry contains the alpha subunit (Acetyl-coenzyme A carboxylase carboxyl transferase ACCA ) of the acetyl coenzyme A carboxylase complex ( ). ACCA catalyses the transfer of a carboxyl group carried on a biotinylated biotin carboxyl carrier protein (BCCP) to acetyl-CoA, forming malonyl-CoA, the first step in the synthesis of long-chain fatty acids. The acetyl-CoA carboxylase complex is a heterohexamer of biotin carboxyl carrier protein, biotin carboxylase and two non-identical carboxyl transferase subunits (alpha and beta) in a 2:2 association. The reaction involves two steps: Biotin carrier protein + ATP + HCO 3 - ->Carboxybiotin carrier protein + ADP + P i Carboxybiotin carrier protein + Acetyl-CoA ->Malonyl-CoA + Biotin carrier protein
