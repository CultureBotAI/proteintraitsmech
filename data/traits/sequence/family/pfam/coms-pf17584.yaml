identifier: Pfam:PF17584
label: Bacillus competence protein S
definition: >-
  ComS, a protein 46 amino acids in length, is described as the product of a gene fully embedded in the much longer gene srfAB, which encodes a non-ribosomal peptide synthetase subunit involved in surfactin biosynthesis. The gene is encoded on the same strand, allowing ComS to be produced from the same mRNA as SrfAB. ComS is seen as crucial for competence development as it prevents proteolytic degradation of ComK, the key transcriptional activator of all genes required for the uptake and integration of DNA.
