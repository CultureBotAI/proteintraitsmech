identifier: Pfam:PF24128
label: Phage zinc binding protein
definition: >-
  This entry represents a small family of uncharacterised phage proteins with a small zinc binding motif at the C-terminal end composed of a CXXC and CXXH motif. The N-terminal is composed of an α-helical hairpin. Structure prediction suggests that these two helices might mediate a homodimerisation interaction to form a four helical bundle structure.
