identifier: Pfam:PF15217
label: TSC21 family
definition: >-
  This entry represents homologs of Sperm microtubule inner protein 9 (SPMIP9 also known as TEX37, TSC21). SPMIP9 is a microtubule-associated protein (MIP) that is found only in mammalian sperm. The EM structure of sperm DMTs shows that SPMIP9 is part of the tektin bundle making contacts with TECT3-1 and DUSP21.
