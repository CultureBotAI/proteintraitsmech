identifier: Pfam:PF05116
label: Sucrose-6F-phosphate phosphohydrolase
definition: >-
  This entry represents a conserved region of the sucrose phosphate phosphohydrolase (SPP) from plants. SPP is a member of the Class IIB subfamily of the haloacid dehalogenase (HAD) superfamily of aspartate-nucleophile hydrolases. SPP catalyses the final step in the biosynthesis of sucrose, a critically important molecule for plants. Sucrose phosphate synthase (SPS), the prior step in the biosynthesis of sucrose contains a domain which exhibits considerable similarity to SPP albeit without conservation of the catalytic residues. The catalytic machinery of the synthase resides in another domain. It seems likely that the phosphatase-like domain is involved in substrate binding, possibly binding both substrates in a "product-like" orientation prior to ligation by the synthase catalytic domain. This domain is also found in bacterial proteins.
