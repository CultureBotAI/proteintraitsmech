identifier: Pfam:PF20036
label: Major capsid protein 13-like
definition: >-
  This entry represents a group of phage capsid/coat-related proteins, including Gp13 from Bacillus phage SPP1. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. Gp13 is part of the icosahedral capsid together with the auxiliary protein gp12, which are organized in a T=7 lattice. This family contains some conserved motifs: GD, GxxxxV/IxxD and NW.
