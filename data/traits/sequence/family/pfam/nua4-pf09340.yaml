identifier: Pfam:PF09340
label: Histone acetyltransferase subunit NuA4
definition: >-
  Eaf6 is a component of the NuA4 histone acetyltransferase complex which is involved in transcriptional activation of selected genes principally by acetylation of nucleosomal histone H4 and H2A. The NuA4 histone acetyltransferase complex is conserved from yeast to humans. Budding yeast Eaf6 is also a component of the NuA3 histone acetyltransferase complex that acetylates Lys-14 of histone H3, while human Eaf6 is a component of the MOZ/MORF complex which has a histone H3 acetyltransferase activity.
