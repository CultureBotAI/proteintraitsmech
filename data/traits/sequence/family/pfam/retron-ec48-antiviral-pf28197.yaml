identifier: Pfam:PF28197
label: Retron Ec48 antiviral membrane protein
definition: >-
  This family of proteins includes membrane components of the proteobacterial Retron Ec48 antiviral defence system. These proteins are associated with a non-coding RNA and a reverse transcriptase to form a complex that protects bacteria against various bacteriophages. The N-terminal transmembrane region of these proteins is essential for this protective function. When the bacterial RecBCD enzyme is compromised by viral proteins, the effector protein of this family is likely activated, leading to an abortive infection and halting bacterial growth. This defence mechanism is effective against several phages and can result in different outcomes depending on the multiplicity of infection, ranging from normal growth to growth stasis and membrane permeabilisation without lysis.
