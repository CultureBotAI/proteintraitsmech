identifier: Pfam:PF28052
label: PA2816-like
definition: >-
  This entry represents a group of proteins specific to Pseudomonas, including PA2816 from Pseudomonas aeruginosa ( ). Members of this family average about 140 amino acids in length, with an N-terminal signal peptide. The last 100 amino acids are rich in glutamine. The function of these proteins is unknown.
