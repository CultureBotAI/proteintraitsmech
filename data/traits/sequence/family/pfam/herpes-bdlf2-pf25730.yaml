identifier: Pfam:PF25730
label: Gammaherpesvirus intercellular spread glycoprotein
definition: >-
  This entry represents a family of gamma-herpesvirus glycoproteins involved in intercellular viral spread. Members of this family include the BDLF2 protein from Epstein-Barr virus, ORF27 from Human herpesvirus 8 and VG27 from other herpesviruses. This glycoprotein forms a complex with another viral protein (ORF58/BMRF2) that manipulates the actin cytoskeleton to induce the outgrowth of branched plasma membrane fronds. These membrane structures create an intercellular network for virion traffic, enhancing viral spread between neighbouring cells. The cytoplasmic tail of this glycoprotein is critical for its function and appears to activate RhoA-dependent signalling to induce actin polymerisation and membrane remodelling.
