identifier: Pfam:PF21899
label: Tarsal-less (Tal)/polished rice (Pri) peptide
definition: >-
  This entry represents Peptide tarsal-less AA from Drosophila melanogaster and simal sequences from Drosophilidae. This protein is required in early stages of leg development for the intercalation of the tarsal segments during the mid-third instar stage and later for tarsal joint formation. It is one of four peptides (tal-1A, tal-2A, tal-3A and tal-AA) produced from a polycistronic gene that function redundantly in several developmental processes.
