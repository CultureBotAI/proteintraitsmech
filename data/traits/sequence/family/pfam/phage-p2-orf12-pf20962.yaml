identifier: Pfam:PF20962
label: Lactococcus lactis phage p2, ORF12
definition: >-
  This entry represents a group of proteins from tailed bacteriophages and prophages from firmicutes, including Chaperone protein gp12 from Lactococcus phage p2 (also known as ORF12), which is thought to be a chaperone for the tape measure protein that might help to maintain the tape measure protein in solution during tail assembly. This late-expressed protein shows an all-α structure with five α-helices oriented to form a hydrophobic cleft on the inner surface of the protein. It adopts a trimeric assembly, forming long spirals.
