identifier: Pfam:PF03875
label: Statherin
definition: >-
  Statherin is a 43-residue peptide, secreted by parotid and submandibular glands. Statherin functions biologically to inhibit the nucleation and growth of calcium phosphate minerals. The N terminus of statherin is highly charged, the glutamic acids of which have been shown to be important in the recognition hydroxyapatite. Moreover, statherin and its C-terminal fragments inhibit the growth of anaerobic bacteria from the oral cavity.
