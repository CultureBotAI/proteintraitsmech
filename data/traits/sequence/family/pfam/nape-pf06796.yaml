identifier: Pfam:PF06796
label: Periplasmic nitrate reductase protein NapE
definition: >-
  This family consists of several bacterial periplasmic nitrate reductase NapE proteins. Seven genes, napKEFDABC, encoding the periplasmic nitrate reductase system were cloned from the denitrifying phototrophic bacterium Rhodobacter sphaeroides. NapE is thought to be a transmembrane protein.
