identifier: Pfam:PF28086
label: Zinc finger protein HVO_2142-like
definition: >-
  This entry represents the zinc finger protein HVO_2142 from Haloferax volcanii ( ) and related sequences from Haloferacales species. Members of this family are short proteins, about 50-70 residues long, and are important for stress adaptation, biofilm formation, and swarming. These proteins are predicted to adopt a rubredoxin-like fold.
