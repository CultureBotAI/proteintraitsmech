identifier: Pfam:PF29451
label: Family of unknown function (DUF8556)
definition: >-
  This entry represents a family of uncharacterised proteins found in halophilic archaea, including members of the Haloarculaceae and Haloferacaceae families. These proteins are small, approximately 30-35 residues in length, and appear to be single-domain proteins. The function of this family remains to be determined.
