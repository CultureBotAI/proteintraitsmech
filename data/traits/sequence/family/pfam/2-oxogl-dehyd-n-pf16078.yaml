identifier: Pfam:PF16078
label: 2-oxoglutarate dehydrogenase N-terminus
definition: >-
  This domain is found at the N terminus of 2-oxoglutarate dehydrogenase component E1. 2-oxoglutarate dehydrogenase is a key enzyme in the TCA cycle, converting 2-oxoglutarate, coenzyme A and NAD(+) to succinyl-CoA, NADH and carbon dioxide. This activity of this enzyme is tightly regulated and it is a major determinant of the metabolic flux through the TCA cycle. This enzyme is composed of multiple copies of three different subunits: 2-oxoglutarate dehydrogenase (E1), dihydrolipoamide succinyltransferase (E2) and lipoamide dehydrogenase (E3) which is often shared with similar enzymes such as pyruvate dehydrogenase. The E2 component forms a large multimeric core which binds the peripheral E1 and E3 subunits. The substrate is transferred between the active sites of the different subunits by a lipoyl moiety, bound to a lysine residue from the E2 polypeptide.
