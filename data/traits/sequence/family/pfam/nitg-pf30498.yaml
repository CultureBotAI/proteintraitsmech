identifier: Pfam:PF30498
label: Nitrogen starvation-induced protein NitG
definition: >-
  This entry represents small proteins of about 90 residues long that have no detectable homologues outside this family. These proteins serve as markers for an eight-gene region whose overall function is unknown. One member of the cluster is a radical SAM protein with some similarity to enzymes of cofactor biosynthesis, another a glycosyltransferase, several represent hydrolases or oxidoreductases, and several unknown proteins.
