identifier: Pfam:PF07019
label: EMC6
definition: >-
  This family consists of several Rab5-interacting proteins/factors (RABIF5 or Rab5ip) including ER membrane protein complex subunit 6 (EMC6, also known as RAB5IFL) and its homologue, GEL complex subunit OPTI (also known as RCAF1/RAB5IF). The ras-related GTPase rab5 is rate-limiting for homotypic early endosome fusion. Rab5ip represents a novel rab5 interacting protein that may function on endocytic vesicles as a receptor for rab5-GDP and participate in the activation of rab5. EMC6 interacts with Rab5A and BECN1/Beclin 1 and regulates autophagosome formation. EMC6 is part of the EMC complex, required for efficient folding of proteins in the ER and enables the energy-independent insertion into endoplasmic reticulum membranes of newly synthesized membrane proteins. RCAF1 is a component of the multi-pass translocon (MPT) complex that mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes and it also acts as an assembly factor for mitochondrial respiratory complexes.
