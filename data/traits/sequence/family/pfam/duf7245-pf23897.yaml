identifier: Pfam:PF23897
label: Family of unknown function (DUF7245)
definition: >-
  This entry represents an uncharacterised protein domain found in viral proteins, primarily from Mycobacterium and Gordonia phages. The domain is approximately 120 amino acids in length. These proteins are composed of a small N-terminal zinc binding domain connected by an α-helix to a small β-barrel domain at the C-terminal. This entry also includes some uncharacterised bacterial proteins.
