label: Fimbrillin-like
definition: >-
  This family of proteins is found in bacteria. Proteins in this family are typically between 348 and 360 amino acids in length. Analysis of structural comparisons shows this family to be part of the FimbA superfamily of adhesin components or fimbrillins.
