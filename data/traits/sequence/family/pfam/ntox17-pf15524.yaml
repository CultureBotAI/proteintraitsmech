identifier: Pfam:PF15524
label: Novel toxin 17
definition: >-
  This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses a mostly all-β fold and a conserved ExD motif and a histidine residue. In bacterial polymorphic toxin systems, the toxin is exported by the type 2, type 7 or TcdB/TcaC-type secretion system.
