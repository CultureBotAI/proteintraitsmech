identifier: Pfam:PF29446
label: Family of unknown function (DUF8555)
definition: >-
  This entry represents a family of uncharacterised proteins found in halophilic archaea, including members of the Haloarculaceae, Natrialbaceae, and Haloferacaceae families. These proteins are approximately 40-45 residues in length. Structure prediction shows these proteins adopt a helical hairpin structure. The function of this family remains to be determined.
