identifier: Pfam:PF02048
label: Heat-stable enterotoxin ST
definition: >-
  This entry represents a group of heat-stable enterotoxins, such as STa from Escherichia coli, which is the cause of acute diarrhoea in infants and travellers in developing countries. The mature STa protein is a 19-residue peptide containing three disulphide bridges that are functionally important. STa contains an N-terminal signal peptide composed of two domains, Pre and Pro, involved in extracellular toxin release, and a core enterotoxigenic domain. STa binds to and activates the guanylate cyclise C intestinal receptor, causing an increase in the intracellular levels of cyclic guanosine monophosphate (cGMP).
