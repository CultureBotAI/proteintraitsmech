identifier: Pfam:PF15724
label: TMEM119 family
definition: >-
  Tmem119 is an osteoblast induction factor, also known as Obif, which encodes a single transmembrane protein. It promotes the differentiation of myoblasts into osteoblasts, and plays an essential role in bone formation by regulating osteoblastogenesis.
