identifier: Pfam:PF29792
label: Uncharacterised lipoprotein HI_1099
definition: >-
  This entry represents the uncharacterised lipoprotein HI_1099 from Haemophilus influenzae and related proteins from Pasteurellaceae. The protein contains a single predicted transmembrane helix and a prokaryotic lipoprotein lipid attachment site. The function of this protein remains to be determined.
