identifier: Pfam:PF06527
label: TniQ
definition: >-
  This entry consists of several bacterial TniQ proteins. TniQ along with TniA and B is involved in the transposition of the mercury-resistance transposon Tn5053 that carries the mer operon. It has been suggested that the tni genes are involved in the dissemination of integrons. This entry also includes TnsD from E. coli. TnsD is required for Tn7 transposition.
