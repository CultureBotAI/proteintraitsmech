identifier: Pfam:PF05626
label: Protein of unknown function (DUF790)
definition: >-
  This entry consists of several bacterial and archaeal endonuclease proteins that may be involved in either restriction-modification and/or DNA excision repair. Among its members is endonuclease Bax1 from archaea, a dual DNA endonuclease probably involved in nucleotide excision repair (NER). The N-terminal nuclease domain (NTD) of the XPB-Bax1 complex cleaves on one side of a DNA bubble (which presumably mimics DNA damage), while the NUS nuclease domain cleaves the other side, respectively called 5' and 3' nuclease activities. In the absence of its XPB partner, Bax1 has weak 5' nuclease activity. Bax1 binds to and represses the ATPase activity (and probably also helicase activity) of XPB2. The two helicase and the ThM domains of XPB2 with the NTD and CRD domains of Bax1 encircle the DNA, forming a tunnel where the 12 bp dsDNA and the ds-ssDNA junction are located.
