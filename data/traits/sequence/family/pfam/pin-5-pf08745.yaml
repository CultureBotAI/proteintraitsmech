identifier: Pfam:PF08745
label: PINc domain ribonuclease
definition: >-
  RNase P catalyzes the removal of the 5'-leader sequence from pre-tRNA to produce the mature 5'-terminus. The ancient form of RNase P is a ribonucleoprotein consisting of a catalytic RNA and one or more protein subunits. This entry represents a type of protein-only RNase P found in the hyperthermophilic bacterium Aquifex aeolicus and close relatives. It comprises a metallonuclease domain and has RNase P activity.
