identifier: Pfam:PF15373
label: Stabilizer of axonemal microtubules 5
definition: >-
  This family (previously DUF4601) represents the homologs of Stabilizer of axonemal microtubules 5 (SAXO5, also known as C19orf45, TEX45). SAXO5 is a member of the SAXO superfamily of stabilizers that is ubiquitous in axonemal DMTs as well as stable microtubules of neurons and parasites. SAXO5 is a filamentous SAXO protein that binds along protofilament A04 with 96-nm periodicity. A typical feature of SAXO proteins is the presence of Mn motif which forms a 5- to 6-residue helix flanked by a Tyr/Phe residue on one end and by a Ser/Thr on the other that binds the shoulder of the α-tubulin S9/S10 loop. SAXO5 contains 11 Mn motifs and therefore has 96-nm periodicity, matching the external periodicity of the axoneme.
