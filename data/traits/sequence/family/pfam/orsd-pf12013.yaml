identifier: Pfam:PF12013
label: Orsellinic acid/F9775 biosynthesis cluster protein D
definition: >-
  This family of proteins includes orsellinic acid/F9775 biosynthesis cluster protein D (orsD) from Emericella nidulans. The orsD gene is part of the cluster that encodes components for the biosynthesis of orsellinic acid, as well as biosynthesis of the cathepsin K inhibitors F9775 A and F9775 B, but the function of orsD is unknown. OrsD contains two segments that are likely to be C2H2 zinc binding domains.
