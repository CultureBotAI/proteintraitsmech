identifier: Pfam:PF28482
label: Outer envelope pore protein 24
definition: >-
  The chloroplastic outer envelope protein OEP24 is a voltage-dependent channel that can function as a general solute channel in plants. OEP24 is present in chloroplasts, etioplasts, and non-green root plastids.
