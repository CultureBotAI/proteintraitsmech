identifier: Pfam:PF06188
label: HrpE/YscL/FliH and V-type ATPase subunit E
definition: >-
  This family consists of several bacterial HrpE proteins, which are believed to function on the type III secretion system, specifically the secretion of HrpZ (harpinPss). This family also includes V-type proton ATPase subunit E proteins. This subunit appears to form a tight interaction with subunit G in the F0 complex. Subunits E and G may act together as stators to prevent certain subunits from rotating with the central rotary element. also contains V-type ATPase subunit E proteins.
