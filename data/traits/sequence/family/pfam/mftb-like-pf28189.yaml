label: Mycofactocin biosynthesis chaperone MftB-like
definition: >-
  This entry represents a group of proteins from halobacteria that are an alternate form of mycofactocin biosynthesis chaperone. Size and several motifs are similar to MftB (see ), but it is unclear if the two families are truly homologous.
