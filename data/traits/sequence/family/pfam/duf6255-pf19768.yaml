label: Family of unknown function (DUF6255)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC) and other uncharacterised bacterial proteins. This BGC (BGC0001662) is described by MIBiG as an example of the following biosynthetic class, polyketide. It includes a member from the mediomycin A biosynthetic gene cluster from Kitasatospora mediocidica.
