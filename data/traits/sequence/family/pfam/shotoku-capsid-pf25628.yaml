identifier: Pfam:PF25628
label: Shotokuvirus capsid protein
definition: >-
  This entry represents the capsid proteins from Shotokuviruses that are responsible for forming the icosahedral capsid of virions. Members of this family have the ability to self-assemble, which is a critical function in the construction of the protective shell that encases the viral genome. This structural role is essential for the stability and infectivity of the virus, as the capsid not only protects the viral genetic material from degradation but also plays a role in the recognition and attachment to host cells. The self-assembly property of these proteins is a key feature that facilitates the efficient packaging of viral components during the viral replication cycle.
