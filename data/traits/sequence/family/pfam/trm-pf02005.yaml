identifier: Pfam:PF02005
label: N2,N2-dimethylguanosine tRNA methyltransferase
definition: >-
  Trm1 ( ) dimethylates a single guanine residue at position 26 of a number of tRNAs using S-adenosyl-L-methionine as donor of the methyl groups. In Saccharomyces cerevisiae, Trm1 is required for the modification of both mitochondrial and cytoplasmic tRNAs. This family also includes the related TRMT1-like protein from Mus musculus, which may play a role in motor coordination and exploratory behaviour, and similar mammal sequences.
