identifier: Pfam:PF29236
label: Family of unknown function (DUF8521)
definition: >-
  This entry represents an integral membrane domain of unknown function found in spirochaetes, predominantly Treponema species. The domain is approximately 90-100 residues in length. Interaction evidence from the IntAct database indicates that members of this family interact with FliR, a component of the flagellar export apparatus. The function of this domain remains to be determined.
