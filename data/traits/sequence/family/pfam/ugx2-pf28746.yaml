identifier: Pfam:PF28746
label: UGX2
definition: >-
  This entry represents the UGX2 family of proteins. UGX2 is a 223-amino acid protein found in fungi, particularly in Saccharomyces cerevisiae. The protein is induced under carbon, ammonium, phosphate and sulphate starvation conditions. The protein contains a disordered region from residues 78-117 which is enriched in basic residues. The function of this protein remains to be determined.
