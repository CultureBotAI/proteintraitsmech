identifier: Pfam:PF22285
label: Family of unknown function (DUF6962)
definition: >-
  This is a family of uncharacterised proteins. They are related to HlyIII family and are predicted to adopt the same structure consisting of seven transmembrane helices. Their predicted structure, suggests that, similarly to HlyIII, they may contain a Zn-binding site, albeit slightly rearranged as only two of the Zn-coordinating residues are in conserved positions.
