identifier: Pfam:PF00981
label: Rotavirus RNA-binding Protein 53 (NS53)
definition: >-
  The proteins in this family are non-structural protein 1 (NSP1), also known as non-structural RNA-binding protein 53(NS53). They are RNA binding proteins that contain a characteristic cysteine rich region. They are made at low levels in infected cells and are a component of early replication and are known to accumulate on the cytoskeleton of the infected cell.
