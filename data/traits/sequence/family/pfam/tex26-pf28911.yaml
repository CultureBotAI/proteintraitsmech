identifier: Pfam:PF28911
label: Testis-expressed protein 26
definition: >-
  This entry represents testis-expressed protein 26 (TEX26), a protein found mainly in vertebrates. TEX26 is approximately 290 amino acids in length and contains five Mn (microtubule) regions that are conserved between human and mouse orthologues. Recent structural studies have identified these Mn regions as important motifs across cilia microtubule inner proteins with implications for human cilia function. The protein is expressed in testis and choroid plexus, with cytoplasmic localisation predicted. TEX26 is found predominantly in eutherian mammals, including primates, rodents, carnivores and artiodactyls. The protein contains an N-terminal disordered region and shows evidence of proteomics identification. The specific molecular function of this family remains to be determined.
