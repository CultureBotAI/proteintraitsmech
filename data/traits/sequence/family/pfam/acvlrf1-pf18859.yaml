identifier: Pfam:PF18859
label: Actinobacteria/chloroflexi VLRF1 release factor
definition: >-
  Archaeo-eukaryotic release factor domain belonging to the VLRF1 clade, observed primarily in the actinbacteria and chloroflexi bacterial lineages. Contains a conserved glutamine residue in the release factor catalytic loop, suggesting it functions as an active peptidyl-tRNA hydrolase at the ribosome.
