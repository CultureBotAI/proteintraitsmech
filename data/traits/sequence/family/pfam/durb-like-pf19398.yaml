identifier: Pfam:PF19398
label: Lantibiotic duramycin B-like
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001577) is described by MIBiG as an example of the following biosynthetic class, RiPP (ribosomally synthesised and post-translationally modified peptide). It includes lantibiotic duramycin, duramycin B and cinnamycin. Duramycin B is a potent inhibitor of human phospholipase A2. It exhibits only a weak antibacterial activity against B.subtilis, and does not display antimicrobial activity against S.aureus, S.mitis, E.coli, K.pneumoniae, P.vulgaris and C.albicans
