identifier: Pfam:PF23707
label: P116-like protein
definition: >-
  The structure of P116 (MPN213 or MG075), solved by cryo-electron microscopy, reveals a novel protein fold consisting of a homodimeric core region with a large hydrophobic cavity that binds and extracts lipids. Each monomer also contains an N-terminal domain. Conformational changes between the lipid-bound and lipid-free states suggest a mechanism for lipid uptake and delivery into the mycoplasma membrane. P116 orthologs are found in several other Mycoplasma species. The P116 protein from Mycoplasma pneumoniae is an essential cell surface protein that extracts lipids, including cholesterol, phosphatidylcholine and sphingomyelin, from the host environment for incorporation into the bacterial membrane.
