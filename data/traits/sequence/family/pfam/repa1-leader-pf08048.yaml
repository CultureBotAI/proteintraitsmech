identifier: Pfam:PF08048
label: Tap RepA1 leader peptide
definition: >-
  This entry represents of the RepA1 leader peptide known as Tap found in IncFII plasmids. The frequency of replication of IncFII plasmid NR1 during the cell division cycle is regulated by the control of the synthesis of the plasmid-specific replication initiation protein (RepA1). When RepA1 is synthesised, it binds to the plasmid replication origin (ori) and effects the assembly of a replication complex composed of host proteins that mediate the replication of the plasmid. The tap gene encodes a 24-amino acid peptide whose translation is required for the translation of repA.
