identifier: Pfam:PF09796
label: Ubiquinol-cytochrome-c reductase complex subunit (QCR10)
definition: >-
  This entry represents subunit 10 of the cytochrome b-c1 complex (also known as the ubiquinol-cytochrome c reductase complex or complex III). This complex is located on the inner mitochondrial membrane and it couples electron transfer from ubiquinol to cytochrome. Subunit 10 is required for stable association of the iron-sulphur protein with the complex.
