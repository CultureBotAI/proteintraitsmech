identifier: Pfam:PF22507
label: Family of unknown function (DUF6994)
definition: >-
  This is a family of uncharacterised bacterial proteins. They are probably remotely related to His-Me finger endonucleases. The conservation of the putative active site residues in this family is not strict, in particular the position of the catalytic histidine. The residues involved in metal coordination are conserved. The presence in the vicinity of two invariant aspartate residues that point toward the putative active site suggests that these proteins may still function as enzymes but probably via a somewhat different catalytic mechanism. They may still retain their catalytic activity by employing these conserved aspartates that in the predicted AF2 models are well positioned to undertake a role in a potential nucleophilic attack.
