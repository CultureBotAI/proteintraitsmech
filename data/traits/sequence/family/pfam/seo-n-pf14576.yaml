identifier: Pfam:PF14576
label: Sieve element occlusion N-terminus
definition: >-
  This entry represents the N terminus of the sieve element occlusion (SEO) proteins (also known as forisomes), which are phloem proteins accumulated during sieve element differentiation. This domain mediates homologous dimerisation of the forisome protein MtSEO-F, probably via hydrophobic interplay.
