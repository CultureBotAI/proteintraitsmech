identifier: Pfam:PF26074
label: Bacteriophage PhiTE minor capsid decoration protein
definition: >-
  This entry represents the minor capsid decoration protein (DEC) of bacteriophage phiTE that infects the plant pathogen Pectobacterium atrosepticum. The DEC protein belongs to the β-tulip family and forms trimers at three-fold and quasi-three-fold axes of the capsid. Unlike other β-tulip proteins, the DEC features a C-terminal extension that wraps over a conserved intercapsomeric β-sheet. Each DEC protein forms interfaces with eight MCP proteins with a combined surface area of 3056 angstrom squared, predominantly through hydrophobic interactions.
