identifier: Pfam:PF25919
label: CusB, barrel-sandwich hybrid domain
definition: >-
  This domain is found in the Cation efflux system protein CusB and related proteins. CusB is an essential component of the CusCBA tripartite efflux system from Escherichia coli. This protein plays an essential role in bridging the inner membrane efflux pump CusA and the outer membrane channel CusC to mediate resistance to Cu+ and Ag+ ions. CusB is a multidomain protein and assembles into homohexamer that forms a narrow channel defined by the domain represented by this entry and the three-helical bundle domain which is inserted in it. This domain is found also in Putative membrane fusion protein SilB which is a component of the sil cation efflux system that confers resistance to silver.
