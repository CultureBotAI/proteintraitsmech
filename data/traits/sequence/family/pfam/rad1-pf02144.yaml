identifier: Pfam:PF02144
label: Repair protein Rad1/Rec1/Rad17
definition: >-
  This family consists of the repair proteins Rad1, Rec1 and Rad17. Rad1 is a component of the 9-1-1 cell-cycle checkpoint response complex (Rad9-Rad1-Hus1) that plays a major role in DNA repair. Rad1 isoform 1 possesses 3'->5' double stranded DNA exonuclease activity. Rec1 of Ustilago maydis plays a key role in regulating the genetic system of this fungus. Rec1 mutants are very sensitive to UV light. Mutation leads to a complex phenotype with alterations in DNA repair, recombination, mutagenesis, meiosis and cell division. Rec1 shows 3'--5' exonuclease activity, but only in cells over-expressing Rec1.
