identifier: Pfam:PF19929
label: Immunity protein CdiI
definition: >-
  This family includes immunity protein CdiI from Erwinia chrysanthemi and related sequences, predominantly found in Gammaproteobacteria. It is an immunity protein component of a toxin-immunity protein module, which functions as a cellular contact-dependent growth inhibition (CDI) system. CDI modules allow bacteria to communicate with and inhibit the growth of closely related neighbouring bacteria in a contact-dependent fashion. It protects cells against the DNase activity of CdiA, its cognate toxin protein, but not against non-cognate CdiA from E.coli strain 536/UPEC. Immunity protein CdiI is species-specific and therefore, it will only protect that organism from its own CdiA-CT toxin, and the CdiI from E. coli will only protect E. coli from its own CdiA-CT toxin.
