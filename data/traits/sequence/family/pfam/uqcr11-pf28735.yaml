identifier: Pfam:PF28735
label: Ubiquinol-cytochrome c reductase subunit 11
definition: >-
  This entry represents the UQCR11/QCR10 family of small subunits of the ubiquinol-cytochrome c oxidoreductase complex (Complex III). This complex is part of the mitochondrial electron transport chain and catalyses electron transfer from ubiquinol to cytochrome c, linking this redox reaction to proton translocation across the mitochondrial inner membrane. The family consists of small transmembrane proteins of approximately 57-62 amino acids with a single transmembrane helix. UQCR11 has a role in Complex III assembly and stability of the Rieske iron-sulphur protein. The protein is localised to the mitochondrial inner membrane with domains in both the matrix and intermembrane space. The family is found in land plants.
