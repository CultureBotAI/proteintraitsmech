identifier: Pfam:PF19156
label: Family of unknown function (DUF5838)
definition: >-
  Members of this family are prenyltransferases that modify mostly, perhaps exclusively, ribosomally derived cyclic peptides. Note that in some cases, the natural product becomes C-prenylated through a non-enzymatic rearrangement after initial O-prenylation. Prenylated products carry names such as prenylagaramide, anacyclamide, and piricyclamide.
