identifier: Pfam:PF23384
label: Family of unknown function (DUF7098)
definition: >-
  This uncharacterised protein family is found in halophilic archaea, such as HAH_0734 ( ) from Haloarcula hispanica. It has several conserved motifs WHGP, QLWC and RxYxP. Members of this entry average about 87 amino acids in length and are predicted to adopt a predominantly β-structure with a short α-helix.
