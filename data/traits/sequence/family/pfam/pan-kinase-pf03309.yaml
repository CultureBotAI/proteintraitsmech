identifier: Pfam:PF03309
label: Type III pantothenate kinase
definition: >-
  This entry represents the type III pantothenate kinase family, such as that found in Helicobacter pylori. PanK III enzymes have a much wider phylogenic distribution than PanK I, and differs significantly in biochemical activity. PanK III enzymes are are not feedback inhibited by CoA concentration (which is also the case for PanK II enzymes), and PanK III enzymes have an unusually high Km for ATP. Pantothenate kinase (PanK or CoaA) catalyses the first step of the universal five step coenzyme A (CoA) biosynthesis pathway. CoA is a ubiquitous and essential cofactor in all living organsims. Pantothenate kinase catalyses the first and rate limiting step in the CoA biosynthetic pathway, which involves transferring a phosphoryl group from ATP to pantothenate, also known as vitamin B5. Three distinct types of pantothenate kinase enzymes have been identified: type I PanK enzymes are typified by the E. coli CoaA protein, type II enzymes are primarily found in eukaryotic organisms whilst type III enzymes have a wider phylogenic distribution and are not feedback inhibited by CoA.
