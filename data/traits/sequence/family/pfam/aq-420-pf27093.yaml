identifier: Pfam:PF27093
label: Aq_420-like protein
definition: >-
  This entry represents a family of small uncharacterised bacterial proteins. The prototype member aq_420 from Aquifex aeolicus strain VF5 is a 115 amino acid protein of unknown function. A. aeolicus is a hyperthermophilic bacterium that grows optimally at 85-95 degrees C, suggesting this protein family may be adapted to function at extreme temperatures. The function of this protein family remains to be determined.
