identifier: Pfam:PF19281
label: Phytanoyl-CoA hydroxylase-interacting protein C-terminus
definition: >-
  This entry represents the C-terminal domain found in Phytanoyl-CoA hydroxylase-interacting protein (PHYIP/PAHX-AP1) and Phytanoyl-CoA hydroxylase-interacting protein-like (PHIPL) from animals. PHYIP interacts with the C-terminal domain of dual-specificity tyrosine-phosphorylated and regulated kinase 1A (DYRK1A) and may contribute to new cellular functions of DYRK1A, playing a role in the development of the central system.
