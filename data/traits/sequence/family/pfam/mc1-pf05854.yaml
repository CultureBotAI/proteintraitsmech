identifier: Pfam:PF05854
label: Non-histone chromosomal protein MC1
definition: >-
  This entry represents the chromosomal protein MC1, which protects DNA against thermal denaturation and shapes DNA by binding to it. Its global fold consists of a pseudo barrel with an extension of the β-sheet (beta4-beta5) forming an arm (LP5). Some uncharacterised virus proteins are also included in this entry.
