identifier: Pfam:PF07542
label: ATP12 chaperone protein
definition: >-
  This entry represents a group proteins from eukaryotes and bacteria that may have chaperone activity and be involved in F1 ATPase complex assembly. The eukaryotic proteins include yeast ATP12 and mammalian homologue ATPAF2 (ATP synthase mitochondrial F1 complex assembly factor 2), which are required for assembly of the mitochondrial F1-ATPase. Mitochondrial F1-ATPase is an oligomeric enzyme composed of five distinct subunit polypeptides. The alpha and beta subunits make up the bulk of protein mass of F1. In Saccharomyces cerevisiae both subunits are synthesised as precursors with N-terminal targeting signals that are removed upon translocation of the proteins to the matrix compartment.
