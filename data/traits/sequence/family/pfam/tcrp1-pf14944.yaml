identifier: Pfam:PF14944
label: Tongue Cancer Chemotherapy Resistant Protein 1
definition: >-
  The FAM168 family consists of FAM168A and FAM168B. The function of FAM168A is unknown, but FAM168B has been renamed as myelin-associated neurite-outgrowth inhibitor (MANI), as it is an inhibitor of neuronal axonal outgrowth. MANI interacts with cell division cycle protein 27 (Cdc27).
