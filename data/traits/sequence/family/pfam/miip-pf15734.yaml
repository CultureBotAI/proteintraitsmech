identifier: Pfam:PF15734
label: Migration and invasion-inhibitory
definition: >-
  Migration and invasion-inhibitory protein (MIIP or IIp45) binds to insulin-like growth factor binding protein 2 (IGFBP-2) and inhibits the invasion of glioma cells. MIIP attenuates mitotic transition, thereby inhibiting glioma progression. It not only modulates IGFBP-2, but also inhibits cell migration by binding to and inhibiting HDAC6, a class 2 histone deacetylase that deacetylates alpha-tubulin.
