identifier: Pfam:PF15310
label: Vitamin A-deficiency (VAD) rat model signalling
definition: >-
  Spermatogenesis-associated protein 32 (SPATA32, also known as VAD1-2) is expressed in testis and may be involved in acrosome formation during spermiogenesis. VAD1-2 can be detected in the acrosome region of the round and elongated spermatids of mouse, human, monkey and pig. Putative interacting partners syntaxin 1, beta-actin, and myosin heavy chain (MHC) protein were identified from the co-immunoprecipitation experiments.
