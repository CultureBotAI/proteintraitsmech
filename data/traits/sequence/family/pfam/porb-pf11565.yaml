identifier: Pfam:PF11565
label: Alpha helical Porin B
definition: >-
  This entry represents the putative cell wall channel-forming proteins porin B and porin C from Corynebacterium sp. Porin B from Corynebacterium glutamicum (Brevibacterium flavum) allows the exchange of material across the mycolic acid layer, which is the protective nonpolar barrier. Porin B has an α helical core structure consisting of four α-helices surrounding a nonpolar interior. There is a disulphide bridge between helices 1 and 4 to form a stable covalently bound ring. The channel of PorB is oligomeric.
