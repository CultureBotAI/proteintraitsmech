identifier: Pfam:PF26828
label: Phage gene 75 protein
definition: >-
  This entry represents gene 75 protein (Gp75) found in mycobacteriophages. The prototype is from Mycobacterium phage L5, a small protein of 43 amino acids with a molecular weight of 4.9 kDa. Members of this family are found in bacteriophages that infect Mycobacterium species. The function of this protein remains unknown.
