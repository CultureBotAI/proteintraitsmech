identifier: Pfam:PF15812
label: Melanoregulin
definition: >-
  Melanoregulin (MREG) is a putative membrane fusion regulator that forms a complex with peripherin-2. It is required for lysosome maturation and plays a role in intracellular trafficking. Melanoregulin is involved in the retrograde melanosome transport in melanocytes, which is dependent on the dynein-dynactin motor complex, and is a negative regulator of melanosome intercellular transfer. Palmitoylation serves to stably anchor melanoregulin in the melanosome membrane.
