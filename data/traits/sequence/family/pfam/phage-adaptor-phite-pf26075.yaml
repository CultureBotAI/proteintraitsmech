identifier: Pfam:PF26075
label: Bacteriophage PhiTE adapter protein
definition: >-
  This entry represents the adapter protein of bacteriophage PhiTE that infects the plant pathogen Pectobacterium atrosepticum. The adapter protein contains an N-terminal domain closely resembling the core adapter domains observed in other phages. This globular N-terminal domain is rich in helices and features a β-hairpin motif that extends in the head-distal direction, forming a 24-stranded β-barrel that inserts into the head completion protein, facilitating the transition from 12-fold to 6-fold symmetry. The N-terminal portion of the adapter protein intercalates between the clip domains of two adjacent portal proteins, forming a strong interaction in a highly hydrophobic pocket. Unlike other described myophages, the PhiTE adapter extends through this pocket, forming a short α-helix that coils in a z-plane around the portal, followed by a series of looping structures referred to as the bouquet motif that forms a cinch around portal stem helices. Each adapter protein contacts five portal subunits.
