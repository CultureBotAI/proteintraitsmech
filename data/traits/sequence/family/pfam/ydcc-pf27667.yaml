identifier: Pfam:PF27667
label: Sporulation protein YdcC-like
definition: >-
  This entry represents the Sporulation protein YdcC and related proteins from firmicutes. YdcC is required for efficient sporulation. The GerS lipoprotein, which binds to the CwlD amidase, is also a member of this family. Both CwlD amidase and its binding partner, the GerS lipoprotein, are essential for the spore-specific peptidoglycan modification, MAL, in C. difficile.
