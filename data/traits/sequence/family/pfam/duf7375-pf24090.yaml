identifier: Pfam:PF24090
label: Family of unknown function (DUF7375)
definition: >-
  This family represents a small family of uncharacterised proteins from Pseudomonas phage. These proteins range in length from 114 and 130 amino acids. Structure prediction suggests the proteins adopt an open set of α-helical segments as a monomer. However, homodimer prediction shows a confident interaction (iPTM 0.79). The dimer shows distinct charge distribution with a linear positively charged surface.
