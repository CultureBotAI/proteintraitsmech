identifier: Pfam:PF12247
label: Temperature dependent protein affecting M2 dsRNA replication
definition: >-
  Mkt1 interacts with the Poly(A)-binding protein associated factor, Pbp1, and is present at the 3' end of RNA transcripts during translation. The Mkt1-Pbp1 complex is involved in the post-transcriptional regulation of HO endonuclease expression. In trypanosome, zinc finger protein ZC3H11 interacts with MKT1 and PBP1 through it's C-terminal region, those interactions are essential for survival of the mammalian-infective bloodstream form. This entry represents a domain is found in the N-terminal region of MKT1.
