identifier: Pfam:PF11078
label: Optomotor-blind protein N-terminal region
definition: >-
  Optomotor-blind is one of the essential toolkit proteins for coordinating development in diverse animal taxa. In Drosophila, where it has been characterised in the most detail, it plays a key role in establishing the abdominal pigmentation pattern, in development of the central nervous system and leg and wing imaginal disc-formation. This entry represents the N-terminal domain of the optomotor-blind protein in Drosophila and other flies. It does not include the T-box-containing transcription factor that plays a part in DNA-binding.
