identifier: Pfam:PF12628
label: Falstatin, cysteine peptidase inhibitor
definition: >-
  This family of peptidase inhibitors is expressed in plasmodial protozoal species. Falstatin is found to be a potent reversible inhibitor of the P. falciparum cysteine proteases falcipain-2 and falcipain-3, as well as other parasite- and non-parasite-derived cysteine proteases, but is only a relatively weak inhibitor of the P. falciparum cysteine proteases falcipain-1 and dipeptidyl aminopeptidase 1. Thus, P. falciparum requires expression of falstatin to limit proteolysis by certain host or parasite cysteine proteases during erythrocyte invasion. In addition, in the mosquito vector, it is essential for the gliding motility of hemocoel sporozoites and, therefore, for salivary gland invasion and the subsequent transmission from the mosquito to the mammalian host.
