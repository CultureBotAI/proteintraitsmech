identifier: Pfam:PF09837
label: Uncharacterized protein conserved in bacteria (DUF2064)
definition: >-
  Many members of this protein family show strongly correlated phylogenetic distribution, and in most cases co-clustering, with an unusual radical SAM enzyme ( ) involved in arsenosugar biosynthesis whose C-terminal domain often contains a selenocysteine residue. Other members of the conserved gene neighbourhood include another putative glycosyltransferase, an alkylhydroperoxidase family protein ( ), and a phosphoesterase family protein ( ).
