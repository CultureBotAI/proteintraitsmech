identifier: Pfam:PF12118
label: SprA-related family
definition: >-
  This family of bacterial proteins has a conserved HEXXH motif, suggesting they are putative peptidases of zincin fold. Proteins in this family are typically between 234 to 465 amino acids in length. Most members are annotated as being SprA-related.
