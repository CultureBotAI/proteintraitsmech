identifier: Pfam:PF25637
label: Family of unknown function (DUF7942)
definition: >-
  This family of uncharacterised bacterial proteins is found mainly in Actinomycetes. Members of this family are predicted to contain three transmembrane helices. A member of this family, SCO4225, is a putative integral membrane protein found in Streptomyces coelicolor, . The gene encoding SCO4225 is part of a cluster of genes (phoU to sco4225) that are involved in phosphate regulation and metabolism. This gene cluster is regulated by the two-component system PhoR-PhoP, which responds to phosphate availability in the environment. The expression of SCO4225 is directly regulated by MacR, a response regulator that binds to a specific sequence in the promoter region of SCO4225. This regulation links SCO4225 to other genes in the MacR regulon, many of which are also membrane proteins.
