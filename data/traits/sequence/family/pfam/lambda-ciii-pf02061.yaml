identifier: Pfam:PF02061
label: Lambda Phage CIII
definition: >-
  Bacteriophage lambda regulatory protein CIII is a small protein that plays a role in stabilising the CII transcriptional activator, via a mechanism that is not yet fully understood. Stabilised CII activates CI, the gene for the repressor protein that prevents transcription of proteins required for lytic development. The central portion of the protein is well conserved and is both necessary and sufficient for the activity of the protein. Comparative analysis of the CIII sequence in lambda, Bacteriophage HK022 and the lambdoid Enterobacteria phage P22 has led to the suggestion that this central region assumes an amphipathic α-helical structure. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches.
