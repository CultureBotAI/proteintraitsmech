identifier: Pfam:PF30900
label: Nociceptin neuropeptide
definition: >-
  This entry represents nociceptin, also known as orphanin FQ, a 17 amino acid neuropeptide cleaved from the prepronociceptin precursor protein. The peptide is found mainly in mammals and fish. Nociceptin is secreted and acts as a ligand for the opioid receptor-like receptor OPRL1. It functions as a neurotransmitter in the brain, modulating nociceptive and locomotor behaviour. Administration of nociceptin induces hyperalgesia and decreases locomotor activity. The prepronociceptin precursor also contains an N-terminal opioid neuropeptide domain ( ).
