label: 'MT-A70 '
definition: >-
  N6-methyladenosine (m6A) is present at internal sites in some mRNAs. m6A affects different aspects of mRNA metabolism, such as half-life, splicing, and translation. MT-A70 (also known as METTL3) is the S-adenosylmethionine-binding subunit of human mRNA N6-adenosine-methyltransferase (MTase), an enzyme that sequence-specifically methylates adenines in pre-mRNAs. Proteins with sequence similarity to MT-A70 have been identified in eukaryotes and prokaryotes. The resulting family is defined by sequence similarity in the carboxyl-proximal regions of the respective proteins. The amino-proximal regions of the eukaryotic proteins are highly diverse, often Pro-rich, and are conserved only within individual subfamilies. Corresponding regions are not present in prokaryotic members of the family. MT-A70-like proteins contain examples of some of the consensus methyltransferase motifs that have been derived from mutational and structural studies of bacterial DNA methyltransferases, including the universally conserved motif IV catalytic residues and a proposed motif I (AdoMet binding) element. The MT-A70-like family comprises four subfamilies with varying degrees of interrelatedness. One subfamily is a small group of bacterial DNA: m6A MTases. The other three are paralogous eukaryotic lineages, two of which have not been associated with MTase activity but include proteins that regulate mRNA levels via unknown mechanisms apparently not involving methylation. Some proteins known to belong to the MT-A70-like family are listed below: Human N6-adenosine-methyltransferase 70kDa subunit (MT-A70 or METTL3) ( ), the catalytic component of the METTL3-METTL14 heterodimer that forms the N6-methyltransferase complex that methylates adenosine residues at the N6 position of some RNAs. Human N6-aden…
