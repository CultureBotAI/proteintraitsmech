label: Family of unknown function (DUF5998)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001522) is described by MIBiG as an example of the following biosynthetic class, polyketide. This family includes a protein from the auroramycin biosynthetic gene cluster from Streptomyces filamentosus. Some members of this family have been identified as putative phosphodiesterases.
