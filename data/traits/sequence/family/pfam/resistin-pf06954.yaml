identifier: Pfam:PF06954
label: Resistin
definition: >-
  RELMs, secreted proteins with roles including insulin resistance and the activation of inflammatory processes, are also known as found in inflammatory zone (FIZZ), and include four members in mouse (RELM-alpha/FIZZ1/HIMF, RELM-beta/FIZZ2, Resistin/FIZZ3, and RELM-gamma/FIZZ4) and two members in human (resistin and RELM-beta). RELMs are potentially implicated in a wide range of physiological and pathological processes including obesity-associated diabetes, cardiovascular system function, cancer development and metastasis. There are significant differences between human and rodent RELMs with respect to gene and protein structure, differential gene regulation, different tissue distribution profiles, and insulin resistance induction. Resistin appears to convey insulin resistance in rodents, and to instigate inflammatory processes in humans. In the pathophysiology of obesity-associated diabetes, mouse resistin is secreted by adipocytes and increases hepatic gluconeogenesis, thereby promoting insulin resistance, human resistin is secreted by macrophages and may play a role through inflammatory contributions.
