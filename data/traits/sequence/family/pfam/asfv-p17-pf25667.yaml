identifier: Pfam:PF25667
label: African swine fever virus minor capsid protein p17
definition: >-
  This entry represents the African swine fever virus minor capsid protein p17. This protein is a component of the viral inner capsid shell, where three copies of p17 encircle each p72 capsomer, anchoring them on the inner membrane and forming a rigid zipper structure that stabilises the capsomers. It is essential for the assembly of the capsid and icosahedral morphogenesis. Additionally, p17 inhibits the host cGAS-STING pathway through interaction with STING1 and subsequent interference with the recruitment of downstream components TBK1 and IKBKE. It contains a transmembrane region and is found in the inner envelope of the virus and host endoplasmic reticulum and Golgi membranes.
