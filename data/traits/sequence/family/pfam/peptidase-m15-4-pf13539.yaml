identifier: Pfam:PF13539
label: D-alanyl-D-alanine carboxypeptidase
definition: >-
  This entry represents a domain of unknown function found in spirochaetes, predominantly Treponema and Spirochaeta species. The domain is approximately 70 residues in length and is found N-terminal to a peptidase M15 domain ( ). The function of this domain remains to be determined.
