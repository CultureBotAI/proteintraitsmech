identifier: Pfam:PF09650
label: Putative polyhydroxyalkanoic acid system protein (PHA_gran_rgn)
definition: >-
  Proteins in this entry are encoded by genes involved in either polyhydroxyalkanoic acid (PHA) biosynthesis or utilisation, including proteins at found at the surface of PHA granules. These proteins have so far been predominantly found in the Pseudomonadales, Xanthomonadales, and Vibrionales, all of which belong to the Gammaproteobacteria.
