identifier: Pfam:PF02527
label: rRNA small subunit methyltransferase G
definition: >-
  This entry represents a rRNA small subunit methyltransferase G. Previously identified as a glucose-inhibited division protein B that appears to be present and in a single copy in all complete eubacterial genomes so far sequenced. Specifically methylates the N7 position of a guanosine in 16S rRNA.
