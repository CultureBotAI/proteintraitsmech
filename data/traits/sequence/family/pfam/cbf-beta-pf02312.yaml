identifier: Pfam:PF02312
label: Core binding factor beta subunit
definition: >-
  Core binding factor (CBF) is a heterodimeric transcription factor essential for genetic regulation of hematopoiesis and osteogenesis. The beta subunit binds to the core site, 5'-PYGPYGGT-3', of a number of enhancers and promoters, including Murine leukemia virus, Polyomavirus enhancer, T-cell receptor enhancers etc. The beta subunit enhances DNA-binding ability of the alpha subunit in vitro , and has been show to have a structure related to the OB fold. Also included in this family are the Drosophila melanogaster brother and big brother proteins, which regulate the DNA-binding properties of Runt.
