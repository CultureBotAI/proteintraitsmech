identifier: Pfam:PF00761
label: Polyomavirus coat protein
definition: >-
  This family includes the VP2 and VP3 internal coat proteins from Polyomaviruses, which are small dsDNA tumour viruses. Their capsids contain 360 copies of the VP1 proteins arranged in 72 pentamers. This capsid encloses the internal proteins VP2 and VP3, as well as the viral DNA. A single copy of VP2 or VP3 associates with each VP1 pentamer. A crystal structure shows that the C-terminal region of the VP2/VP3 protein interacts with the VP1 pentamer.
