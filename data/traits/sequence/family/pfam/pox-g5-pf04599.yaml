identifier: Pfam:PF04599
label: Poxvirus G5 protein
definition: >-
  This entry represents Protein G5 from Vaccinia virus, also known as Putative nuclease OPG089, and similar sequences from poxvirus. G5 seems to be required for double-strand break repair, homologous recombination, and production of full-length viral genomic DNA.
