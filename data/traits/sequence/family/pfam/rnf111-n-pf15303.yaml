identifier: Pfam:PF15303
label: E3 ubiquitin-protein ligase Arkadia N-terminus
definition: >-
  This domain is found at the N terminus of E3 ubiquitin-protein ligase Arkadia. Arkadia plays a role in embryonic development. Proteins containing this domain also include ARK2N (C18orf25) from humans, the closest homologue of Arkadia, a novel exercise-regulated AMPK substrate that lacks the entire RING domain, suggesting that it lacks ubiquitination activity.
