identifier: Pfam:PF15457
label: Type III T3SS secreted effector HopW1-1/HopPmaA
definition: >-
  This is a family of type III effectors derived from the plant pathogen Pseudomonas. The virulence proteins (effectors) are injected into plant cells and induce a resistance response. HopW1-1 (HopPmaA) from Pseudomonas syringae induces the accumulation of the signal molecule salicylic acid (SA) and transcripts of HWI1 (HopW1-1-Induced Gene1) in Arabidopsis.
