identifier: Pfam:PF16868
label: NMT1-like family
definition: >-
  Substrate-binding proteins (SBPs) are extracytoplasmic proteins involved in substrate recognition for several different bacterial transporters. This entry represents the TAXI family of the substrate-binding proteins. They are part of the TAXI-TRAP (tripartite ATP-independent periplasmic) transporter. Proteins in this family have been proposed to function as glutamine/glutamate specific uptake systems and a role in glutamate transport. The tripartite ATP-independent periplasmic (TRAP) transporters are substrate-binding protein (SBP)-dependent secondary transporters found in prokaryotes. They consist of a substrate-binding protein (SBP) of the DctP or TAXI families and two integral membrane proteins that form the DctQ and DctM protein families.
