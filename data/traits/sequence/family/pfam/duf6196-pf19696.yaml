label: Family of unknown function (DUF6196)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001381) is described by MIBiG as an example of the polyketide biosynthetic class. It includes a member from the brasilinolide A biosynthetic gene cluster from Nocardia terpenica. This family is found in bacteria.
