identifier: Pfam:PF26606
label: SCO4848-like family
definition: >-
  This entry represents SCO4848 from Streptomyces coelicolor A3(2) , a 79 amino acid putative membrane protein. It is best known for having the integration site for Streptomyces phage phiBT1 lie within its gene. Homologs of SCO4848 are found broadly within Streptomyces, Saccharomonospora, Arthrobacter, and Nocardioides, and related genera.
