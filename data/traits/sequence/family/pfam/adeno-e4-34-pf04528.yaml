identifier: Pfam:PF04528
label: Adenovirus early E4 34 kDa protein conserved region
definition: >-
  This entry describes early region 4 open reading frame 3 (E4 ORF3) proteins, including E4 30k, 31k, 33k and 34k proteins. Adenoviruses E4 is essential for DNA replication and late protein synthesis. The adenovirus E4 ORF3 protein is required for viral DNA replication during the interferon (IFN)-induced antiviral state. The E4 ORF3 protein reorganises the promyelocytic leukemia (PML) protein nuclear bodies. These normally punctate structures are reorganised by E4 ORF3 into tracks that eventually surround viral replication centres. PML rearrangement is an evolutionarily conserved function of E4 ORF3. The product of adenovirus early region 4 (E4), open reading frame 6, is E4 34k. It modulates viral late gene expression, DNA replication, apoptosis, double strand break repair, and transformation through multiple interactions with components in infected and transformed cells. Conservation of several cysteine and histidine residues among E4 34k sequences suggests the presence of a zinc binding domain, which is important for its function.
