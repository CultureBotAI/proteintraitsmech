identifier: Pfam:PF07771
label: Tick salivary peptide group 1
definition: >-
  This entry represents a group of proteins from arachnides, including Ixonnexin from the deer tick Ixodes scapularis and other peptides derived from a salivary gland cDNA library of this organism. Also present are peptides from a related tick species, Ixodes ricinus (Sheep tick). Members of this family are characterised by a putative signal peptide, indicative of secretion, and conserved cysteine residues.
