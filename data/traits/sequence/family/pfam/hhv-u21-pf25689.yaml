identifier: Pfam:PF25689
label: Human herpesvirus U21 glycoprotein
definition: >-
  This entry represents the U21 glycoprotein found in human herpesviruses. U21 is a viral membrane protein from betaherpesviruses, including human herpesvirus 6 (HHV-6) and human herpesvirus 7 (HHV-7). U21 functions as an immunoevasin that plays a role in viral immune evasion by targeting multiple host proteins. It has been shown to redirect HLA class I molecules to the lysosomal compartment for degradation. Additionally, U21 targets ULBP3, a ligand for the activating NK cell receptor NKG2D, which helps the virus escape immune recognition by NK cells. U21 primarily localises to the endoplasmic reticulum and late endosomes, where it facilitates the lysosomal degradation of its target proteins.
