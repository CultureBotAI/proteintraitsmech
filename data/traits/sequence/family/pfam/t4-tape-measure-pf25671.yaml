identifier: Pfam:PF25671
label: Phage T4-tail tape measure protein
definition: >-
  This entry represents bacteriophage tape measure proteins (TMP) that serve as molecular rulers determining the length of phage tails. During tail assembly, the TMP acts as a template for tail tube polymerisation, with the protein being incorporated in an initially unfolded form. As the tail tube forms, the TMP extends, determining the final length of the tail structure. The tape measure protein is also involved in DNA transfer, possibly forming a channel through which phage DNA passes into the host cell during infection. In phage T4, the tape measure protein (gp29) is located in the central hub of the baseplate and extends through the tail tube.
