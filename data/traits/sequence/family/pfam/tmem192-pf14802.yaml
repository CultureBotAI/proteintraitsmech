identifier: Pfam:PF14802
label: TMEM192 family
definition: >-
  The function of this family of transmembrane proteins is unknown. In vertebrates, proteins in this family are located in the lysosomal membrane and late endosome. In Arabidopsis, a member of this family (protein FIP1) has been found to weakly interact with FRIGIDA, a determinant of flowering time.
