identifier: Pfam:PF15841
label: Transmembrane protein 239 family
definition: >-
  This family of proteins is found in mammals and includes TMEM239. It has been identified as an important host factor that facilitates African swine fever virus entry into early endosomes through the interaction with the early endosomal marker Rab5A.
