identifier: Pfam:PF27863
label: Hercynine metabolism protein
definition: >-
  Hercynine is the betaine (trimethylated amino group) form of histidine. It is the precursor of ergothioneine, a thiourea derivative containing a sulfur atom in the imidazole ring. This protein occurs in a conserved four-gene cyanobacterial cassette along with an EgtD, the methyltransferase that converts histidine to hercynine as in ergothioneine biosynthesis, an EgtB homologue that is likely to attach some thiol (e.g. gamma-glutamyl-cysteine) through its sulfur to the hercynine imidazole ring, and a small protein of unknown function ( ). Members are distantly related to phage shock protein A (PspA).
