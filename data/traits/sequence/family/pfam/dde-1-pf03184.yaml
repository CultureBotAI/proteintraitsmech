identifier: Pfam:PF03184
label: DDE superfamily endonuclease
definition: >-
  Proteins containing this domain are probably endonucleases of the DDE superfamily. This domain contains three carboxylate residues that are believed to be responsible for coordinating metal ions needed for catalysis. The catalytic activity of this enzyme involves DNA cleavage at a specific site followed by a strand transfer reaction. Proteins containing this domain include tigger transposable element derived proteins from mammals and protein Pdc2 from budding yeasts. Interestingly, proteins conatining this domain also includes the Centromere Protein B (CENP-B) protein, which appears to have lost the metal binding residues in this domain and is unlikely to have endonuclease activity. CENP-B is a an inner kinetochore protein that binds to a specific centromere sequence.
