identifier: Pfam:PF11535
label: Calcium binding
definition: >-
  CcbP is a Ca(2+) binding protein found in bacteria which is thought to bind Ca(2+) by protein surface charge. When bound to Ca(2+), the protein becomes more compact and the level of free calcium decreases. Within the bacteria, Ca(2+) has a role in the early stages of heterocyst differentiation. The free Ca(2+) concentration which is regulated by CcbP is critical for the differentiation process. Calcium signalling is widespread in bacterial species, and prokaryotic cells like eukaryotes are equipped with all the elements to maintain Ca2+ homeostasis.
