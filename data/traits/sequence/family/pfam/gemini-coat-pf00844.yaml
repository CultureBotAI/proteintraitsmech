identifier: Pfam:PF00844
label: Geminivirus coat protein/nuclear export factor BR1 family
definition: >-
  Geminiviruses are characterised by a genome of circular single-stranded DNA encapsidated in twinned (geminate) quasi-isometric particles, from which the group derives its name. Most geminiviruses can be divided into 2 subgroups on the basis of host range and/or insect vector: i.e. those that infect dicotyledenous plants and are transmitted by the same whitefly species, and those that infect monocotyledenous plants and are transmitted by different leafhopper vectors. It has been shown that the 104 N-terminal amino acids of the Maize streak virus coat protein bind DNA non-specifically.
