identifier: Pfam:PF26837
label: Phage T4 Y00H/Y00G protein family
definition: >-
  This entry represents a family of related proteins found in bacteriophages, including Y00H and Y00G from bacteriophage T4. Y00H is an 81 amino acid protein (9.5 kDa) located in the dexA-dda intergenic region, while Y00G is an 80 amino acid protein (9.4 kDa) also known as dexA.1. Both proteins are found in the dexA gene region. Y00H undergoes cross-linking via an isopeptide bond to the E.coli host protein DncV during infection. The specific functions of these proteins remain to be determined.
