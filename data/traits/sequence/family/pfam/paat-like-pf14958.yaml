identifier: Pfam:PF14958
label: ATPase PAAT-like
definition: >-
  This family is found in eukaryotes. It represents the ATPase protein associated with ABC transporters (PAAT) and related proteins. PAAT is formed of a nucleotide-binding domain (NBD)-like domain and a signal for intramitochondrial sorting. PAAT interacts with the mitochondrial inner membrane ABC proteins: ABCB7, ABCB8, and ABCB10. It is involved in maintenance of mitochondrial homeostasis and cell survival.
