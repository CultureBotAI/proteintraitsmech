identifier: Pfam:PF09873
label: SepCysE-like
definition: >-
  This family contains proteins conserved in archaea, including MJ1481 from Methanocaldococcus jannaschii, which has been reported to be SepCysE, a translation factor, essential for the methanococcal Cys biosynthesis. SepCysE forms a bridge between Sep-tRNA:Cys-tRNA synthase (SepCysS) and O-phosphoseryl-tRNA synthetase (SepRS), forming the transsulfursome complex, enabling substrate channelling of Sep-tRNACys.
