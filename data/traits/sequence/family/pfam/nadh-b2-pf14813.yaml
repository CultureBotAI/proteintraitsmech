identifier: Pfam:PF14813
label: NADH dehydrogenase 1 beta subcomplex subunit 2
definition: >-
  This entry represent NADH dehydrogenase [ubiquinone] 1 beta subcomplex subunit 2 mostly from animals. NADH dehydrogenase [ubiquinone] 1 beta subcomplex subunit 2 is an accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I), that is believed not to be involved in catalysis. Complex I functions in the transfer of electrons from NADH to the respiratory chain. The immediate electron acceptor for the enzyme is believed to be ubiquinone.
