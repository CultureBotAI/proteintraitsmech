identifier: Pfam:PF16085
label: Bacteriophage holin Hol, superfamily III
definition: >-
  This is a family of holins classified as 1.E.20 in the TC database.Holin functions in conjunction with the lytic enzyme, Lys, a glycosyl hydrolase that breaks-up the murein in the bacterial cell-wall, causing lysis of the cell and hence entry of phage particles. Several members of this family are annotated as pyocin R2 when encoded on the chromosome of Pseudomonas aeruginosa.
