identifier: Pfam:PF27839
label: FxSxx-COOH family
definition: >-
  Members of this family are very short (~60 residue) polypeptides, among which the fifth and third to last residues are an invariant Phe and invariant Ser, respectively (FXS motif). This motif is a substrate for the modifications introduced by a radical SAM enzyme. The radical SAM enzyme-catalyses the cyclisation by cross-linking the side chains of the first and third residues of tripeptides such as WXN, WXR, FXN or FXS.
