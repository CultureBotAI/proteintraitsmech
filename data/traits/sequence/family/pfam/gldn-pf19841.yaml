identifier: Pfam:PF19841
label: Gliding motility associated protein GldN
definition: >-
  Members of this protein family are exclusive to the Bacteroidetes phylum (previously Cytophaga-Flavobacteria-Bacteroides). GldN/PorN is a protein linked to a type of rapid surface gliding motility found in certain Bacteroidetes, such as Cytophaga johnsonae (Flavobacterium johnsoniae) and Cytophaga hutchinsonii. Knockouts of GldN abolish the gliding phenotype. Gliding motility appears closely linked to chitin utilisation in the model species C. johnsonae. Bacteroidetes with members of this protein also include those which are not believed to express the gliding phenotype, such as Prevotella intermedia and Porphyromonas gingivalis (Bacteroides gingivalis). PorN/GldN forms periplasmic rings with PorK/GldK comprising 32-33 subunits each of PorK and PorN. Each ring resembles a cogwheel with PorN forming cog-like projections that are proposed to engage with the PorLM motor to drive the rotation of the PorKN cogwheel together with PorG and associated Attachment Complexes, thus providing the energy to complete protein secretion and the coordinated cell surface attachment of the secreted cargo. N- and C-terminal helices in PorN are crucial for PorK binding and complex stability.
