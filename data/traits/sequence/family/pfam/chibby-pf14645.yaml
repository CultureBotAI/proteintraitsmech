identifier: Pfam:PF14645
label: Chibby family
definition: >-
  This family from eukaryotes includes the chibby proteins and spermatid-associated protein (Spert). Chibby proteins inhibit the wingless/Wnt pathway by binding to beta-catenin and inhibiting beta-catenin-mediated transcriptional activation. Chibby is Japanese for small, and is named after the RNAi phenotype seen in Drosophila. Spermatid-associated protein is expressed in the flower-like structure in spermatids and its function is unclear.
