identifier: Pfam:PF05679
label: Chondroitin N-acetylgalactosaminyltransferase
definition: >-
  This family represents Chondroitin N-acetylgalactosaminyltransferases. Proteins have a type II transmembrane topology. The enzyme is involved in the biosynthetic initiation and elongation of chondroitin sulphate and is the key enzyme responsible for the selective chain assembly of chondroitin/dermatan sulphate on the linkage region tetrasaccharide common to various proteoglycans containing chondroitin/dermatan sulphate or heparin/heparan sulphate chains. This entry also includes non-catalytic components of CHSY1-CHPF2 and CHSY3-CHPF2 chondroitin sulfate synthase complexes such as Chondroitin polymerizing factor, non-catalytic subunit from human. CHPF associates with catalytically active chondroitin synthases (CHSY1/3) within heterodimeric complexes. It plays an essential role for the formation of a stable and functional chondroitin sulfate polymerase complexes.
