identifier: Pfam:PF02423
label: Ornithine cyclodeaminase/mu-crystallin family
definition: >-
  This entry represents the ornithine cyclodeaminase-Mu (OCD-MU) family of proteins which are widely distributed and contain proteins with diverse functions. It includes the bacterial ornithine cyclodeaminase enzyme family, which catalyse the deamination of ornithine to proline. The family also includes archaeal alanine dehydrogenase and mu-crystallin, a mammalian homologue of bacterial ornithine cyclodeaminase, which is the major component of the eye lens in several Australian marsupials. mRNA for mu-crystallin has also been found in human retina. This entry also includes protein SAR DEFICIENT 4 (SARD4) from Arabidopsis. SARD4 is involved in the biosynthesis of pipecolate (Pip), a metabolite that orchestrates defense amplification, positive regulation of salicylic acid (SA) biosynthesis, and priming to guarantee effective local resistance induction and the establishment of systemic acquired resistance (SAR). It does not possess ornithine cyclodeaminase activity in vitro.
