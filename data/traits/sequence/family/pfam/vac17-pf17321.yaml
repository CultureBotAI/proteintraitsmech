identifier: Pfam:PF17321
label: Vacuole-related protein 17
definition: >-
  Vac17 serves as an adaptor protein recruiting vacuole vesicles to the actin cable tracks by its dual interaction with Vac8 and the Myo2 motor protein. It is directly phosphorylated by Cdk1. Vac17 plays an important role in vacuole inheritance and segregation in cell division.
