identifier: Pfam:PF03051
label: Peptidase C1-like family
definition: >-
  This group of proteins belong to MEROPS peptidase family C1, subfamily C1B. This family contains prokaryotic and eukaryotic aminopeptidases and includes bleomycin hydrolases. Bleomycins are antitumour glycopeptide antibiotics originally isolated from the actinomycete Streptomyces verticillus, and are inactivated by bleomycin hydrolase, which hydrolyses the carboxyamide bond of the beta-aminoalanine moiety. Other cysteine peptidases from the papain family have no effect on bleomycins. Bleomycin hydrolase acts mainly as an aminopeptidase on short peptides, but the rat orthologue has been shown to cleave amyloid β-peptides, acting as an endopeptidase or a carboxypeptidase, as well as an aminopeptidase. The C terminus is autolytically processed to remove the C-terminal residue. Bleomycin hydrolase is intracellular and exists naturally as a homohexamer, with all the active site in the central cavity of the barrel. This molecular organisation prevents native proteins from entering the cavity. The negative C terminus interacts with the positive N terminus of the substrate and anchors it to the active site. The structure of the C terminus resembles that of an inhibitor, such as leupeptin, bound to an active peptidase, such as papain, and the distance of the C terminus from the active site acts as a molecular ruler to confer positional specificity. A cysteine peptidase is a proteolytic enzyme that hydrolyses a peptide bond using the thiol group of a cysteine residue as a nucleophile. Hydrolysis involves usually a catalytic triad consisting of the thiol group of the cysteine, the imidazolium ring of a histidine, and a third residue, usually asparagine or aspartic acid, to orientate and activate the imidazolium ring. In only one family of cysteine peptidases, is the role of the g…
