identifier: Pfam:PF30088
label: Mitochondrial outer membrane protein OM45
definition: >-
  This entry represents mitochondrial outer membrane protein OM45 found in fungi. This protein is localised to the mitochondrial outer membrane and contains a single transmembrane helix. The protein interacts with AIM5, FCJ1 and MOS1. Despite being a major outer membrane protein, OM45 is not essential for cell growth or mitochondrial function. The protein contains disordered regions and is oriented with its C-terminal domain in the cytoplasm and a small N-terminal portion in the mitochondrial intermembrane space.
