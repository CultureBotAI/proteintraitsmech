identifier: Pfam:PF28278
label: PatX protein
definition: >-
  PatX is a small protein found in heterocyst-forming cyanobacteria. It contributes to the maintenance of a vegetative state by opposing the differentiation of cells into heterocysts. PatX contains a motif near its C-terminal, RG(S/T)GR, similar to the RGSGR found in both PatS and HetN.
