identifier: Pfam:PF05498
label: 'Rapid ALkalinization Factor (RALF) '
definition: >-
  The plant RAPID ALKALINIZATION FACTOR (RALF) family consists of extracellular peptides that serve as extracellular signals. RALF1, a 5kDa ubiquitous polypeptide in plants, arrests root growth and development. RALF4/19 peptides interact with LRX proteins to control pollen tube growth.
