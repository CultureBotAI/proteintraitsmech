identifier: Pfam:PF15597
label: Immunity protein 59
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved [DE]R motif. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, which usually contains toxin domains of the Ntox13 or Ntox40 families. In some proteins this domain is fused to the Imm38 ( ) immunity domain.
