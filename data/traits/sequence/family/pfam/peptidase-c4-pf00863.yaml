label: Peptidase family C4
definition: >-
  Tobacco etch virus (TEV), tomato vein mottling virus (TVMV), and plum pox virus (PPV) are members of the Potyviridae family. The potyvirus genome is a (+) stranded RNA and is translated into a single polyprotein upon infection, which is processed by the virally encoded proteases P1, HC-Pro, and NIa. Most of the cleavage events are performed by NIa (nuclear inclusion protein a) protease (NIa-pro). NIa-pro processes seven sites present in the potyvirus polyprotein, named as A, B, C, D, V, E, and F. NIa-pros obtained from potyviruses have similar structures and functions. The potyvirus NIa-pro has a His-Asp-Cys catalytic triad, which is homologous to the trypsin-like proteases except for Cys replacing Ser. NIa-pros obtained from potyviruses share certain sequence identities; however they recognise distinct amino acid sequences at each recognition sites. Consequently, they cannot recognise the cleavage sites of each other efficiently. Nia-pro belongs to peptidase family C4. In addition to the catalytic activity NIa-pro possesses also sequence non-specific RNA-binding activity and RNA polymerase (NIb) binding activity. The potyvirus NIa protein contains the following two domains; the VPg domain at the N terminus and the NIa-pro domain at the C terminus. The ~250-amino acid NIaPro domain adopts the characteristic two-domain antiparallel β-barrel fold that is the hallmark of trypsin-like serine proteases, with the catalytic triad residues His, Asp, and Cys located at the interface between domains. This entry represents the NIa-pro domain. A cysteine peptidase is a proteolytic enzyme that hydrolyses a peptide bond using the thiol group of a cysteine residue as a nucleophile. Hydrolysis involves usually a catalytic triad consisting of the thiol group of the cysteine, the imidaz…
