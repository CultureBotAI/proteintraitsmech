identifier: Pfam:PF04366
label: Las17-binding protein actin regulator
definition: >-
  This entry corresponds to proteins having the Ysc84 actin binding domain (YAB). This 184 amino acid domain lies at the N terminus of the Saccharomyces cerevisiae (Baker's yeast) protein Ysc84 ( ). It is essential for the organisation of the actin cytoskeleton, and interacts with the Arp2/3 complex. Homologous domains are found across a range of species. In fungi and vertebrates the domain is at the N terminus, while there is an SH3 domain at the C terminus. In plants the domain seems to be at the C terminus and in association with a FYVE domain. Interestingly, the domain is absent in invertebrates. The domain is also found in prokaryotes, where presumable it is also involved in protein binding, perhaps to the prokaryotic homologue of actin.
