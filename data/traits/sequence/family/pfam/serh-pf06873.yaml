identifier: Pfam:PF06873
label: Cell surface immobilisation antigen SerH
definition: >-
  This entry consists of several cell surface immobilisation antigen SerH proteins which seem to be specific to Tetrahymena thermophila and related species. The SerH locus of T. thermophila is one of several paralogous loci with genes encoding variants of the major cell surface protein known as the immobilisation antigen (i-ag).
