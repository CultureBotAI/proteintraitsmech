identifier: Pfam:PF07181
label: VirC2 protein
definition: >-
  This family consists of several VirC2 proteins which seem to be found exclusively in Agrobacterium species and Rhizobium etli. VirC2 is known to be involved in virulence in Agrobacterium species but its exact function is unclear.
