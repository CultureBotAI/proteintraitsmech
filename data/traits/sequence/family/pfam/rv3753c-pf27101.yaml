identifier: Pfam:PF27101
label: Rv3753c-like tRNA adenosine deaminase-associated protein
definition: >-
  This entry describes a family of proteins about 200 amino acids in length with only five invariant residues, including an Arg, a Ser-Asp pair, and two Gly residues. Members always are found exclusively in Actinobacteria, and always adjacent to homologues of TadA, a tRNA-specific adenosine deaminase from Escherichia coli. This suggests a housekeeping function in tRNA metabolism. A member of this family, M. tuberculosis Rv3753c protein has been detected by mass spectrometry, confirming its expression. The N-terminal methionine is removed post-translationally, as demonstrated by direct protein sequencing.
