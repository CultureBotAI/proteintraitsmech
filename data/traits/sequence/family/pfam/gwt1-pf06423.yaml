identifier: Pfam:PF06423
label: GWT1
definition: >-
  Glycosylphosphatidylinositol (GPI) is a conserved post-translational modification to anchor cell surface proteins to plasma membrane in eukaryotes. PIGW and the yeast homologue GWT1 are involved in the addition of the acyl-chain to inositol in an early step of GPI biosynthesis. Mutations in PIGW are associated with West syndrome and hyperphosphatasia with mental retardation syndrome. It contains a membrane-embedded domain named BindGPILA, also found in the GPI lipid anchor pathway proteins PIG-B, PIG-M, PIG-U, PIG-W, PIG-V, and PIG-Y, which it is thought to be responsible for recognising, binding and stabilising the GPI lipid anchor.
