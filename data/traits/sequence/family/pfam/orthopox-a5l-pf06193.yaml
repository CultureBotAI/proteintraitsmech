identifier: Pfam:PF06193
label: Orthopoxvirus A5L protein-like
definition: >-
  This entry represents A4L from Vaccinia virus, also called 39kDa core protein OPG130 (p39), and similar proteins predominantly found in orthopoxvirus. A4L is a component of the virion core that participates in virion assembly.
