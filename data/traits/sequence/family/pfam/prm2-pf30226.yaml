identifier: Pfam:PF30226
label: Pheromone-regulated membrane protein 2
definition: >-
  This entry represents the pheromone-regulated membrane protein 2 family found in Saccharomycetales. These are multi-pass membrane proteins containing four transmembrane helices that are induced by pheromone during yeast mating. The proteins are involved in karyogamy during conjugation with cellular fusion, playing a role in the mating process. They localise to membranes and are related to other plasma membrane fusion proteins such as PRM1.
