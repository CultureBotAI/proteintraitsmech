identifier: Pfam:PF11256
label: SAV0927-like
definition: >-
  This family of proteins includes SAV0927 from Staphylococcus aureus ( ) and similar proteins predominantly found in Firmicutes. This protein forms a structure that contains five dimers. Each protomer shows an anti-parallel five-stranded β-sheet, with one strand from the other subunit in the dimer, and three α-helices at the C-terminal end. Its function is unknown.
