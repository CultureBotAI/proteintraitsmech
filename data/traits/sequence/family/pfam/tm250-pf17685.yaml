identifier: Pfam:PF17685
label: Transmembrane protein 250
definition: >-
  Transmembrane protein 250 is implicated in cellular processes related to cell proliferation, specifically by aiding the transition into the S phase of the cell cycle. Additionally, it has a role in viral pathogenesis, as it is known to enhance the proliferation of human herpes simplex virus 1 (HHV-1).
