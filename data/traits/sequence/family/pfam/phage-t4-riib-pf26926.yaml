identifier: Pfam:PF26926
label: Bacteriophage T4 protein rIIB
definition: >-
  This entry represents protein rIIB found in T4-like bacteriophages. Protein rIIB is transcribed prior to replication and forms part of the replication complex. The protein has DNA-binding properties and localises to the host cell inner membrane. The protein is 312 amino acids (35.5 kDa) and is expressed as an early protein during infection.
