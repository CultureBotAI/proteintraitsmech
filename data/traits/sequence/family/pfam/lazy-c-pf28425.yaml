identifier: Pfam:PF28425
label: LAZY/DRO1
definition: >-
  This entry represents the LAZY proteins (also known as NEGATIVE GRAVITROPIC RESPONSE OF ROOTS (NGR) or DEEPER ROOTING (DRO)), a family of plant proteins involved in the proper distribution of auxin and in the regulation of both roots and shoots response to gravitropism (Jiao et al, Front. Plant Sci, 2021, doi:10.3389/fpls.2020.606241). Statocytes are gravity-sensing cells that perceive directional signals of gravity, which leads to asymmetric distribution of auxin in the responding organs. These proteins are involved in the development of the root system architecture by influencing lateral root angles and primary root length.
