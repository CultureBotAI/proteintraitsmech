identifier: Pfam:PF05821
label: NADH-ubiquinone oxidoreductase ASHI subunit (CI-ASHI or NDUFB8)
definition: >-
  This family consists of several eukaryotic NADH dehydrogenase [ubiquinone] 1 beta subcomplex subunit 8 proteins. NADH:ubiquinone oxidoreductase (complex I) is an extremely complicated multiprotein complex located in the inner mitochondrial membrane. Its main function is the transport of electrons from NADH to ubiquinone, which is accompanied by translocation of protons from the mitochondrial matrix to the intermembrane space. Human complex I appears to consist of 41 subunits. This is an accessory subunit, not involved in catalysis.
