label: Phosphoprotein
definition: >-
  This family includes the M1 phosphoprotein non-structural RNA polymerase alpha subunit ( ) from various strains of Rabies virus. The M1 phosphoprotein is thought to be a component of the active polymerase, and may be involved in template binding.
