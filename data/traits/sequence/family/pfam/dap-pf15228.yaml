identifier: Pfam:PF15228
label: Death-associated protein
definition: >-
  This family includes death-associated protein 1 (DAP1) and death-associated protein-like 1 (DAPL1). DAP1 is involved in mediating interferon-gamma-induced cell death. DAPL1 may play a role in the early stages of epithelial differentiation or in apoptosis.
