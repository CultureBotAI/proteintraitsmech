identifier: Pfam:PF25743
label: Ictalurid herpesvirus 1 ORF27 protein family
definition: >-
  This entry represents a conserved protein family that includes the uncharacterised protein encoded by ORF27 from Ictalurid herpesvirus 1 (IcHV-1, Channel catfish herpesvirus), similar proteins in Herpesvirales and related sequences in fish. The specific function of this protein family remains to be determined. IcHV-1 is a member of the Alloherpesviridae family that infects channel catfish.
