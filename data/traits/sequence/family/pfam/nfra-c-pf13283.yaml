identifier: Pfam:PF13283
label: Bacteriophage N adsorption protein A C-term
definition: >-
  The function of this domain is unknown, but it is found at the C terminus of bacteriophage N4 adsorption protein A (NfrA) in association with an N-terminal region of Tetratricopeptide (TPR) repeats . NfrA serves as the phage receptor. NfrA allows N4 phage attachment by binding to the viral non-contractile sheath protein.
