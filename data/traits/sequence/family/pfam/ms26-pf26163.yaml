identifier: Pfam:PF26163
label: Small ribosomal subunit protein mS26
definition: >-
  This entry represents the yeast Small ribosomal subunit protein mS26 and related fungal proteins. mS26 is a component of the small subunit of mitochondrial ribosomes, specifically the 37S small subunit. It contributes to the assembly and function of the ribosome. mS26 plays a critical role in mitochondrial protein synthesis, which is essential for cellular energy production. mS26, along with bS6m and mS43, has been shown to functionally interact with Pet122, a translational activator for cytochrome c oxidase subunit III.
