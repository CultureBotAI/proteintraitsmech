identifier: Pfam:PF12011
label: 'RNA helicase NPH-II '
definition: >-
  RNA helicase NPH-II or I8 is found in Poxviridae. It is essential for viral replication. Plays an important role during transcription of early mRNAs, presumably by preventing R-loop formation behind the elongating RNA polymerase. Acts as NTP-dependent helicase that catalyzes unidirectional unwinding of 3'tailed duplex RNAs. It might also play a role in the export of newly synthesized mRNA chains out of the core into the cytoplasm and is required for propagation of viral particles.
