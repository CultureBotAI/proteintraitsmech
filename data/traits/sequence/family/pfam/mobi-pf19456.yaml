identifier: Pfam:PF19456
label: MobI protein
definition: >-
  MobI is conserved across conjugative plasmids of incompatibility group C (IncC), integrative conjugative elements of the SXT/R391 family and numerous genomic islands mobilized by IncC plasmids. Alongside a relaxase of the MOBH1 family, this protein is essential to conjugative transfer of these elements and is likely a relaxosome component involved in recognition of the origin of transfer.
