identifier: Pfam:PF23786
label: Phage baseplate wedge subunit
definition: >-
  This family represents a conserved phage baseplate wedge subunit found in phages infecting Enterobacteria. The baseplate is a complex phage structure that facilitates host cell attachment and injection of the phage DNA into the host cell. The wedge subunits form part of the baseplate structure. The family is part of the ViI-like phage group.
