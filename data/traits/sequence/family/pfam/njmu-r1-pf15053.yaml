identifier: Pfam:PF15053
label: Njmu-R1-like protein family
definition: >-
  This entry represents the eukaryotic protein Njmu-R1, which may play a role in spermatogenesis. In humans, it is found in chromosome 17 open reading frame 75 (C17orf75). It forms a complex with WDR11, which acts together with TBC1D23 to facilitate the golgin-mediated capture of vesicles generated using AP-1.
