identifier: Pfam:PF22595
label: Cilia and flagella associated protein 107
definition: >-
  This family includes cilia and flagella associated protein 107 (CFAP107, also known as C1orf158 in human) and its homologues. CFAP107 is a microtubule inner protein (MIP) part of the doublet microtubules (DMTs) in cilia and sperm axoneme. CFAP107 belongs to the core MIPs and binds to protofilaments A10-A11 of the sperm DMTs.
