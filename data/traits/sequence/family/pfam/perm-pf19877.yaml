identifier: Pfam:PF19877
label: Cell division protein PerM
definition: >-
  PerM (known as Rv0955 in M. tuberculosis) is an integral membrane protein containing 8-10 transmembrane helices that is highly conserved amongst mycobacteria and actinobacteria but absent from other bacterial lineages. It functions as an essential component of the mycobacterial divisome complex, directly interacting with FtsB through conserved hydrophobic residues. PerM localises to division septa where it modulates cell wall synthesis, with activity critically dependent on magnesium availability. Disruption results in magnesium-dependent growth defects, cell elongation, hypersensitivity to beta-lactam antibiotics, and severe attenuation during chronic infections. PerM appears to integrate environmental stress signals, enabling mycobacteria to regulate cell division in response to host-induced stress during persistent infection.
