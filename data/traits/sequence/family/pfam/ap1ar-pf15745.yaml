identifier: Pfam:PF15745
label: AP-1 complex-associated regulatory protein
definition: >-
  AP-1 complex-associated regulatory protein (AP1AR), also known as gadkin or gamma-BAR, is a negative regulator of the actin-related protein (ARP)2/3 complex, a major regulator of actin dynamics. Through inhibition of ARP2/3, gadkin negatively regulates cell spreading and motility. Gadkin is also a modulator of adaptor protein (AP)-1-mediated endosomal membrane trafficking.
