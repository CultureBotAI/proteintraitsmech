identifier: Pfam:PF08681
label: Antitoxin TacA 1-like
definition: >-
  This protein family includes Antitoxin TacA 1 from Salmonella typhimurium and similar short sequences mainly found in bacteria. TacA1, the antitoxin component of a type II toxin-antitoxin (TA) system, counteracts the toxic effect of cognate toxin TacT1. TacT1 is active in complex with its antitoxin, acetylation of this antitoxin upregulates the acetylation of tRNAs by TacT1.
