identifier: Pfam:PF28010
label: Putative Mks condensin complex protein MksB
definition: >-
  This entry represents a small family of proteins found in gammaproteobacteria that are part of MksBEF complex, including MksB. This complex is involved in structural chromosome maintenance. MksB, together with SMC, is essential during ocular infections. Inactivation of MksB, whether in the presence or absence of SMC, impairs biofilm formation and facilitates planktonic growth. In addition, inactivation of MksB and SMC reduces the production of virulence factors.
