identifier: Pfam:PF20898
label: P-type Type IV secretion system, TraN
definition: >-
  This entry represents a family of proteins from proteobacteria, including TraN ( ), a subunit of the P-type Type IV secretion system (T4SS) encoded by the conjugative plasmid pKM101 from Escherichia coli that is the homologue of the F-type T4SS protein VirB7 ( ). This protein forms spokes radially crossing the entire assembly of the T4SS in the periphery of the outer membrane complex. It forms a complex with TraO (the homologue of VirB9) that surrounds the inner ring formed by TraF (VirB10 homologue).
