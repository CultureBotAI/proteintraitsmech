identifier: Pfam:PF01102
label: Glycophorin A
definition: >-
  This entry represents a family of mammal proteins, including human Glycophorin A and B (GYPA/B). GYPA and B are components of the ankyrin-1 complex, a multiprotein complex involved in the stability and shape of the erythrocyte membrane.
