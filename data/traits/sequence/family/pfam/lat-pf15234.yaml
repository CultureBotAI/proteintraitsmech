identifier: Pfam:PF15234
label: Linker for activation of T-cells
definition: >-
  A key event in the regulation of the adaptive immune response is the binding of major histocompatibility complex (MHC)-peptide complexes to T cell antigen receptors (TCRs). The formation of such ternary complexes induces significant biochemical changes within T cells of the host animal. The first detectable response of the T cell is the rapid accumulation of numerous tyrosine-phosphorylated proteins within the cell. Increased phosphotyrosine occurs as a consequence of the activation of several different TCR-associated, hematopoietic-specific protein kinases (PTKs), thereby perturbing the balance between those enzymes that add, and those that remove, phosphates from key tyrosine residues. These initial phosphorylation events are required for the subsequent activation of the small guanosine triphosphatase (GTPase) proteins Ras and Rac, the lipid kinase P13K and PLC-gamma1. Activation of these cytoplasmic signalling proteins ultimately leads to activation of various transcription factors (NF-AT, NF-kB, and AP-1) and increased transcription from genes that have an important role in initiating T cell proliferation, such as interleukin-2 (IL-2). An unresolved question in the field has been which molecules and what sequence of events tie together the early tyrosine phosphorylation events with the activation of these downstream signalling molecules. A likely candidate for linking the proximal and distal portions of the TCR signalling pathway is a 36kDa transmembrane protein termed LAT. LAT becomes phosphorylated after TCR engagement, thereby creating binding sites for the Src homology 2 (SH2) domains of other proteins, including PLC-gamma1, Grb2, Gads, Grap, 3BP2 and Shb. It also indirectly binds SOS, c-Cbl, Vav, SLP-76 and Itk. LAT is expressed in peripheral blood lymphocytes…
