identifier: Pfam:PF01060
label: Transthyretin-like family
definition: >-
  Transthyretin-related proteins form a nematode-specific expanded protein family that comprises 59 members, 54 of which are predicted to be secreted. The proteins show weak similarity to transthyretin (formerly called prealbumin) which transports thyroid hormones.. Some transthyretin-related genes are induced in response to environmental challenges such as oxidative stress or pathogen exposure. These proteins possess 4 cysteine residues that are conserved within the C. elegans transthyretin-related protein family, which could serve as reactive oxygen sensors or scavengers. Transthyretin-related protein 52 (TTR-52), a member of this family, is required for efficient cell corpse engulfment by the recognition the surface exposed phosphatidylserine (PS). TTR-52 mediates recognition of apoptotic cells by cross-linking the PS signal with the phagocyte receptor CED-1.
