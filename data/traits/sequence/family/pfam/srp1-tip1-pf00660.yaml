identifier: Pfam:PF00660
label: Seripauperin and TIP1 family
definition: >-
  It has recently been shown that three yeast proteins, two of which are known to be induced by various stress conditions, are structurally related and are probably part of a larger family. These proteins include cold-shock inducible protein TIR1 (also known as serine-rich protein 1, SRP1), which is induced by glucose and cold shock; temperature-shock inducible protein 1 (SRP2); seripauperins, which are closely related protein of about 13kDa (120 to 124 residues) and are generally encoded at the extremity of yeast chromosomes (eg. PAU1, PAU2, PAU3, PAU4, PAU5, PAU6, YBR301w, YGL261c, YGR294w, YHL046c, YIL176c, YIR041w and YKL224c); and hypothetical proteins YIL011w, YJR150c and YJR151c. These proteins all seem to start with a putative signal sequence followed by a conserved domain of about 90 residues. In TIR1, TIR2, TIP1, YIL011w, YJR150c and YJR151c, this domain is followed by a repetitive serine and alanine rich region absent in the other members of this family.
