identifier: Pfam:PF07152
label: YaeQ protein
definition: >-
  This family consists of several hypothetical bacterial proteins of around 180 residues in length, which are often known as YaeQ. YaeQ is homologous to RfaH, a specialised transcription elongation protein and YaeQ is known to compensate for loss of RfaH function. However, YaeQ does not appear to affect transcription directly and this suppression is most likely due to an indirect effect, so the function of this protein remains unknown. Structural studies indicate that YaeQ contains a variation of the PD-(D/E)XK nuclease motif found in various endonucleases and enzymes involved in DNA replication, repair, and recombination. This structure, and the high degree of sequence conservation amongst YaeQ and its homologues, suggest that it may be involved in the remodeling or modification of nucleic acid DNA or RNA structures.
