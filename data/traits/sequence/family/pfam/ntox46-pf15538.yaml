identifier: Pfam:PF15538
label: Bacterial toxin 46
definition: >-
  Proteins in this family are mostly uncharacterised. However, this family includes a predicted toxin found in bacterial polymorphic toxin systems. The toxin possesses an α+β fold with a conserved glutamine residue and a [KR]STxxPxxDxx[ST] motif. In bacterial polymorphic toxin systems, the toxin is exported by the type 2 or type 6 secretion system.
