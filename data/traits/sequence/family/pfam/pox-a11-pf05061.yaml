identifier: Pfam:PF05061
label: Poxvirus A11 Protein
definition: >-
  This entry represents Protein A11 from Vaccinia virus, also known as Protein OPG137, and similar sequences from poxvirus. A11 is required for viral crescent formation early during virus morphogenesis. A conserved region spans the entire protein in the majority of family members.
