identifier: Pfam:PF01578
label: Cytochrome C assembly protein
definition: >-
  This domain is found in various proteins involved in cytochrome c assembly from mitochondria, chloroplast and bacteria; including among others CycK from Rhizobium leguminosarum, CcmC and CcmF from Escherichia coli, CcsA from Chlamydomonas, and orf240 from Triticum aestivum (wheat) mitochondria. CcmC interacts directly with heme, and it is the only protein of the ccm operon that is strictly required for heme transfer. CcmF contains a b-type heme and is thought to be a cytochrome c synthetase. CcsA is required during biogenesis of c-type cytochromes at the step of heme attachment. R. leguminosarum CycK and wheat orf240 also contain a putative heme-binding motif.
