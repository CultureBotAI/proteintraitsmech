identifier: Pfam:PF15325
label: Modulator of retrovirus infection
definition: >-
  CYREN is a cell-cycle-specific inhibitor of classical non-homologous end joining (cNHEJ) that promotes error-free repair by homologous recombination during the S and G2 phases (when sister chromatids are present). It was originally known as MRI (modulator of retrovirus infection), as it was isolated as a gene that could reverse the resistance to retroviral infection in a mutant cell line.
