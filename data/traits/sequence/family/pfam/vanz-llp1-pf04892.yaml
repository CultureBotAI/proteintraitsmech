identifier: Pfam:PF04892
label: VanZ/LLP1
definition: >-
  This entry includes bacterial VanZ and the orthologue from S. cerevisiae LLP1. VanZ confers low-level resistance to the glycopeptide antibiotic teicoplanin (Te). Analysis of cytoplasmic peptidoglycan precursors, accumulated in the presence of ramoplanin, showed that VanZ-mediated Te resistance does not involve incorporation of a substituent of D-alanine into the peptidoglycan precursors. VanZ belongs to a van gene cluster, which is known to confer resistance to vancomycin LLP1 is A Dolichol-linked oligosaccharide (DLO) pyrophosphatase, involved in homeostasis/quality control of DLO by converting it into phosphorylated oligosaccharides.
