identifier: Pfam:PF29918
label: YJR011C
definition: >-
  This entry represents a family of uncharacterised proteins found in Saccharomyces cerevisiae and related yeast species, including YJR011C, which shows protein- protein interactions with CAF130 and NOT5 proteins. YJR011C is expressed at approximately 2560 molecules per cell in log phase growth medium. The function of this protein family remains to be determined.
