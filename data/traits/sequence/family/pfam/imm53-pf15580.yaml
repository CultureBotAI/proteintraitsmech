identifier: Pfam:PF15580
label: Immunity protein 53
definition: >-
  This family consists of predicted immunity proteins with an α+β fold and a conserved tryptophan, and WE and PGW motifs. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Ntox24 or Ntox10 families.
