identifier: Pfam:PF11895
label: Fungal peroxidase extension region
definition: >-
  Peroxidases are haem-containing enzymes that use hydrogen peroxide as the electron acceptor to catalyse a number of oxidative reactions. Peroxidases are found in bacteria, fungi, plants and animals. Fungal ligninases are extracellular haem enzymes involved in the degradation of lignin. They include lignin peroxidases (LiPs), manganese-dependent peroxidases (MnPs) and versatile peroxidases, which combine the substrate-specificity characteristics of the other two. In MnP, Mn 2+ serves as the reducing substrate. It is commonly thought that the plant polymer lignin is the second most abundant organic compound on Earth, exceeded only by cellulose. Higher plants synthesise vast quantities of insoluble macromolecules, including lignins. Lignin is an amorphous three-dimensional aromatic biopolymer composed of oxyphenylpropane units. Biodegradation of lignins is slow - it is probable that their decomposition is the rate-limiting step in the biospheric carbon-oxygen cycle, which is mediated almost entirely by the catabolic activities of microorganisms. The white-rot fungi are able extensively to decompose all the important structural components of wood, including both cellulose and lignin. Under the proper environmental conditions, white-rot fungi completely degrade all structural components of lignin, with ultimate formation of CO 2 and H 2 O. The first step in lignin degradation is depolymerisation, catalysed by the LiPs (ligninases). LiPs are secreted, along with hydrogen peroxide (H 2 O 2 ), by white-rot fungi under conditions of nutrient limitation. The enzymes are not only important in lignin biodegradation, but are also potentially valuable in chemical waste disposal because of their ability to degrade environmental pollutants. To date, 3D structures have been determined…
