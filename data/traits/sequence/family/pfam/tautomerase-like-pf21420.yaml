identifier: Pfam:PF21420
label: Tautomerase-like
definition: >-
  This protein family includes from Chloroflexus aurantiacus (Caur_1358), a 4-Oxalocrotonate tautomerase (4-OT). This protein adopts a β/α/β scaffold and forms part of a functional heterohexamer 4-OT (hh4-OT) that contains three heterodimer units, each composed of one α-subunit ( ) and one β-subunit, which is represented in this entry ( ).
