identifier: Pfam:PF28183
label: Dot/Icm T4SS effector Ceg9
definition: >-
  This entry represents a small group of proteins from Legionella spp., including the Dot/Icm T4SS effector Ceg9 (lpg0246, ) from Legionella pneumophila. Ceg9 interacts with isoforms of host reticulon 4 (Rtn4), a protein that regulates ER tubule formation.
