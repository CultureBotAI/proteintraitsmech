identifier: Pfam:PF10467
label: Peptidase inhibitor clitocypin
definition: >-
  Clitocypin binds and inhibits cysteine proteinases. It has no similarity to any other known cysteine proteinase inhibitors but bears some similarity to a lectin-like family of proteins from mushrooms. Insecticidal potential of clytocypins has been studied on colorado potato beetle, and thus, these are promising candidates for biopesticides.
