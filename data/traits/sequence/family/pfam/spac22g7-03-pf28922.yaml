identifier: Pfam:PF28922
label: SPAC22G7.03-like
definition: >-
  This entry represents a family of uncharacterised proteins found in fungi, including C22G7.03 (also known as SPAC22G7.03) from Schizosaccharomyces pombe. The protein is localised to both the cytosol and nucleus based on high-throughput data. Members of this family are approximately 200- 250 amino acids in length. The function of this protein family remains to be determined.
