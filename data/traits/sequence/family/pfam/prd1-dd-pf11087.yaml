identifier: Pfam:PF11087
label: PRD1 phage membrane DNA delivery
definition: >-
  This entry represents the DNA delivery proteins P32 and P34 that are found in the virion membrane. It is responsible for DNA delivery and viral infectivity. It is also required for DNA injection in the membrane transformation event. In Enterobacteria phage PRD1 virions, which are composed of a tail-less icosahedral capsid, an inner protein-lipid membrane, and a dsDNA genome which is located inside the lipid vesicle; the DNA is packaged into a preformed procapsid. The internal membrane plays an active role in DNA delivery to the host cell by forming a tubular structure used for injecting the DNA into the host cytoplasm.
