identifier: Pfam:PF11957
label: THO complex subunit 1 transcription elongation factor
definition: >-
  THO complex subunit 1 (THOC1; its homologues from plants and yeast HPR1) is a component of the THO subcomplex of the TREX complex, which is involved in coupling mRNA transcription, processing and nuclear export, and specifically associates with spliced mRNA and not with unspliced pre-mRNA. TREX plays central roles during mRNP (messenger ribonucleoprotein) maturation and export from the nucleus to the cytoplasm. The THO complex is recruited to transcribed genes and moves along the gene with the elongating polymerase during transcription. THO is important for stabilizing nascent RNA in the RNA polymerase II elongation complex by preventing formation of DNA:RNA hybrids behind the elongating polymerase. In plants, HPR1 plays a role in disease resistance.
