identifier: Pfam:PF08414
label: Respiratory burst NADPH oxidase
definition: >-
  This domain is found in plant proteins such as respiratory burst NADPH oxidase proteins which produce reactive oxygen species as a defence mechanism. It tends to occur to the N terminus of an EF-hand ( ), which suggests a direct regulatory effect of Ca2+ on the activity of the NADPH oxidase in plants.
