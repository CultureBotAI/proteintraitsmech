identifier: Pfam:PF13998
label: MgrB protein
definition: >-
  This entry represents MgrB, a short lipoprotein that is induced by low extracellular levels of magnesium via the PhoQ/PhoP two-component regulatory system. Deletion of MgrB results in a potent increase in PhoP-regulated transcription.
