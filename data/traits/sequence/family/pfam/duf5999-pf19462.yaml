definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000703) is described by MIBiG as an example of the following biosynthetic class, saccharide. This family includes a protein from the kanamycin biosynthetic gene cluster from Streptomyces kanamyceticus. This family appears to be predominantly found in Actinobacteria.
