identifier: Pfam:PF04772
label: Influenza B matrix protein 2 (BM2)
definition: >-
  BM2 is integral membrane protein that displays H(+) ion channel activity that plays critical roles in production of infectious virus. It is synthesised in the late phase of infection and incorporated into the virion. The cytoplasmic domain of the BM2 protein is required for firm association of the M1 protein with lipid membranes, vRNP complex incorporation into virions, and virion morphology.
