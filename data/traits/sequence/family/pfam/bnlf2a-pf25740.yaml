identifier: Pfam:PF25740
label: EBV TAP inhibitor BNLF2a
definition: >-
  This entry represents the BNLF2a protein family found in Epstein-Barr virus. BNLF2a is a membrane-associated protein that inhibits TAP-mediated peptide transport into the endoplasmic reticulum for binding to HLA class I molecules. By preventing peptide loading, BNLF2a helps the virus evade detection by cytotoxic T cells during the lytic phase of EBV infection. BNLF2a blocks the binding of both peptides and ATP to TAP, thereby inhibiting antigen presentation. The protein has a hydrophobic C-terminal domain that likely functions as a membrane anchor.
