identifier: Pfam:PF02101
label: Ocular albinism type 1 protein
definition: >-
  G-protein coupled receptor 143 (also known as ocular albinism type 1, OA1) is a receptor for tyrosine, L-DOPA and dopamine. After binding to L-DOPA, it stimulates Ca2+ influx into the cytoplasm, increases secretion of the neurotrophic factor SERPINF1 and relocalises beta arrestin at the plasma membrane; this ligand-dependent signaling occurs through a G(q)-mediated pathway in melanocytic cells.
