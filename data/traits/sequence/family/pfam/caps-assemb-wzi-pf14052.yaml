identifier: Pfam:PF14052
label: Capsule assembly protein Wzi
definition: >-
  Many bacteria are covered in a layer of surface-associated polysaccharide called the capsule. These capsules can be divided into four groups depending upon the organisation of genes responsible for capsule assembly, the assembly pathway and regulation. This family plays a role in group 1 capsule biosynthesis. It is likely to be involved in the later stages of capsule assembly. Structurally, Wzi consists of an 18-stranded β-barrel with a periplasmic helical bundle that has a role in the recognition of the capsular polysaccharide. It is predicted that the Wzi-polysaccharide interaction is critical in the initialisation step of the functional capsule biosynthesis and the later steps of the capsule assembly.
