identifier: Pfam:PF25632
label: Fusellovirus capsid protein VP2 family
definition: >-
  The Fusellovirus capsid protein VP2 family is characterised by its role in binding to DNA, which is crucial for the function of the SSV1 virus. This protein is highly basic, suggesting a strong affinity for the negatively charged DNA. The interaction between the Capsid protein VP2 and the viral DNA is essential for the virus' lifecycle, potentially influencing the assembly or stability of the viral capsid. The precise mechanism by which this protein contributes to viral function is not fully detailed, but its essential nature indicates a critical role in the virus' ability to replicate or infect host cells.
