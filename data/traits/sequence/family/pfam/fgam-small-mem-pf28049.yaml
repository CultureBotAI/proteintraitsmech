identifier: Pfam:PF28049
label: Phosphoribosylformylglycinamidine synthase-associated protein
definition: >-
  This entry represents a small protein that averages less than 40 amino acids, nearly all of which are hydrophobic and suggest integration into membrane. Members are regularly found encoded between or next to PurS and PurQ subunits of phosphoribosylformylglycinamidine synthase. The family appears to occur only in the Hyphomicrobiales, a branch of the alphaproteobacteria.
