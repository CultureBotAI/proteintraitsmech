identifier: Pfam:PF14828
label: Amnionless
definition: >-
  Human amnionless (AMN) is necessary for efficient absorption of vitamin B12. Defects in AMN is a cause of recessive hereditary megaloblastic anemia 1 (RH-MGA1), also known as MGA1 Norwegian type or Imerslund-Grasbeck syndrome (I-GS).
