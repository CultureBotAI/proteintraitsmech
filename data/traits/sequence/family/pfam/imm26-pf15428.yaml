identifier: Pfam:PF15428
label: Immunity protein 26
definition: >-
  This entry represents a predicted immunity protein with mostly all-β fold and several conserved hydrophobic residues. They are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Tox-URI1 or Tox-HNH family. The protein is also found heterogeneous polyimmunity loci.
