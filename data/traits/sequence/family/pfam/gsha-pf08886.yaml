identifier: Pfam:PF08886
label: Glutamate-cysteine ligase
definition: >-
  This entry represents a rare family of glutamate--cysteine ligases, demonstrated first in Thiobacillus ferrooxidans and present in a few other Proteobacteria. It is the first of two enzymes for glutathione biosynthesis. It is also called gamma-glutamylcysteine synthetase.
