identifier: Pfam:PF08679
label: Dissimilatory sulfite reductase D (DsrD)
definition: >-
  The structure of the dissimilatory sulphite reductase D (DsrD) protein has shown it to contain a winged-helix motif similar to those found in DNA binding proteins. The structure suggests a possible role for DsrD in transcription or translation of genes, which catalyse dissimilatory sulphite reduction.
