identifier: Pfam:PF11230
label: Glycyl radical enzyme YjjI-like
definition: >-
  Members of this family are homologues to enzymes known to undergo activation by a radical SAM protein to create an active site glycyl radical. This family appears to be activated by the YjjW radical SAM protein, usually encoded by an adjacent gene.
