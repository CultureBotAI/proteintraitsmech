identifier: Pfam:PF11458
label: Membrane-integrating protein Mistic
definition: >-
  Mistic is an integral membrane protein that folds autonomously into the membrane. It is conserved in the Bacilli bacteria. The protein forms a helical bundle with a polar lipid-facing surface. Mistic can be used for high-level production of other membrane proteins in their native conformations.
