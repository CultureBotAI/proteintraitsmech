identifier: Pfam:PF04832
label: SOUL heme-binding protein
definition: >-
  This family represents a group of heme-binding proteins. It includes archaeal and bacterial homologues. HEBP1-2 are part of the heme-binding protein HBP/SOUL family, which represents a group of evolutionary conserved putative heme-binding proteins. In humans, HEBP1 binds metalloporphyrins, free porphyrins and N-methylprotoporphyrins with similar affinities. HEBP2, in humans, can promote mitochondrial permeability transition and facilitate necrotic cell death under different types of stress conditions.
