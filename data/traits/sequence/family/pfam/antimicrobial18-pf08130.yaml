identifier: Pfam:PF08130
label: Type A lantibiotic family
definition: >-
  This family consists of the type A lantibiotic peptides. Both Pep5 and epicidin-280 are ribosomally-synthesised antimicrobial peptides produced by Gram-positive bacteria that are characterised by the presence of lanthionine and/or methyllanthionine residues. The lantibiotics family has a highly specific activity against multi-drug resistant bacteria and has potential to be utilised in a wide range of medical applications.
