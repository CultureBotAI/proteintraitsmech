identifier: Pfam:PF28184
label: Dot/Icm T4SS effector Ceg32/SidI
definition: >-
  This entry represents a group of proteins from Legionella sp., including the Dot/Icm T4SS effector Ceg32 (also known as SidI, ) from Legionella pneumophila. The N-terminal region of this protein, which contains a glucosyl transferase (GT) domain, is sufficient for direct binding of the putative target eEF1A.
