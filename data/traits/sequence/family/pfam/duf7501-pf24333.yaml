identifier: Pfam:PF24333
label: Family of unknown function (DUF7501)
definition: >-
  This entry represents a group of uncharacterised proteins found in Halobacteria. They contain three invariant cysteine residues and a histidine that probably constitute a metal binding site. These proteins are probably C2HC zinc fingers that are variant of the classical C2H2 zinc finger domains.
