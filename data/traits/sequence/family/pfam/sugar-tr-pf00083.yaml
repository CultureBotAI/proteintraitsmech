identifier: Pfam:PF00083
label: Sugar (and other) transporter
definition: >-
  This entry represents a subfamily of the major facilitator superfamily. Members in this family include sugar transporters, which are responsible for the binding and transport of various carbohydrates, organic alcohols, and acids in a wide range of prokaryotic and eukaryotic organisms. Most but not all members of this family catalyse sugar transport.
