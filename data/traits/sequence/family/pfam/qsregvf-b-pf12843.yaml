identifier: Pfam:PF12843
label: Putative quorum-sensing-regulated virulence factor
definition: >-
  This is a family of short Pseudomonas proteins that are potential virulence factors. The structure of , a secreted protein that belongs to , has been solved and deposited as . It is predicted that these two adjacent proteins form a single transcriptional unit based on the prediction that together they interact with their adjacent protein PotD, which is the putrescine-binding periplasmic protein in the polyamine uptake system comprising PotABCD. These two adjacent proteins are predicted to be quroum-sensing-regulated virulence factors.
