identifier: Pfam:PF15334
label: Aurora kinase A and ninein interacting protein
definition: >-
  Aurora kinase A- and ninein-interacting protein (also known as AIBp or AUNIP) is a family of eukaryotic proteins necessary for the adequate functioning of Aurora-A, a protein involved in chromosome alignment, centrosome maturation, mitotic spindle assembly and aspects of tumourigenesis. AIBp is likely to act as a regulator of Aurora-A activity. It interacts with with AURKA via its C terminus and interacts with NIN via its N terminus.
