identifier: Pfam:PF28699
label: CLE peptide
definition: >-
  This entry represents the CLE peptide domain, found in the CLAVATA3/ESR (CLE)-related protein family. CLE peptides are small extracellular signalling molecules in plants, typically 12-13 amino acids in length, that are proteolytically processed from larger precursor proteins. These peptides regulate cell fate determination and developmental processes in plants. The protein contains conserved hydroxylated proline residues that are O-glycosylated with arabinose, which enhances binding affinity to their cognate receptors. CLE33 from Medicago truncatula has been shown to regulate arbuscular mycorrhizal fungal colonisation by modulating strigolactone biosynthesis through long-distance signalling from root to shoot.
