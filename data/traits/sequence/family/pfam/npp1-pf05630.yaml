identifier: Pfam:PF05630
label: Necrosis inducing protein (NPP1)
definition: >-
  This family consists of several NPP1-like necrosis inducing proteins from oomycetes, fungi and bacteria. Infiltration of NPP1 into leaves of Arabidopsis thaliana plants result in transcript accumulation of pathogenesis-related (PR) genes, production of ROS and ethylene, callose apposition, and HR-like cell death. Members of this entry are secreted effectors that acts as a pathogen-associated molecular pattern (PAMP) recognised by the plant immune system.
