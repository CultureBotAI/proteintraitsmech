identifier: Pfam:PF18898
label: Family of unknown function (DUF5654)
definition: >-
  This family of proteins is found in bacteria, archaea, eukaryotes and viruses. Proteins in this family are typically between 79 and 98 amino acids in length. The region contains two predicted transmembrane helices. The eukaryotic example is found in the Foraminiferan Reticulomyxa filosa.
