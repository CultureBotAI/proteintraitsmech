identifier: Pfam:PF19227
label: Salyut domain
definition: >-
  This entry represents the Salyut domain found in the replicase from the viral family Tymoviridae, composed of viruses that infect plants and insects. It is located within a long, hypervariable, proline-rich hinge region located between the alphavirus-like methyltransferase (Vmethyltransf) and the peptidase C21 . It is located 150-200 aa downstream the Iceberg region that forms the C terminus of Vmethyltransf. The function of this domain is unknown.
