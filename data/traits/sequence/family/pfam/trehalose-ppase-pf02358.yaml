identifier: Pfam:PF02358
label: Trehalose-phosphatase
definition: >-
  Trehalose-phosphatases catalyse the de-phosphorylation of trehalose-6-phosphate to trehalose and orthophosphate. Trehalose is a common disaccharide of bacteria, fungi and invertebrates that appears to play a major role in desiccation tolerance. A pathway for trehalose biosynthesis may also exist in plants. The trehalose-phosphatase signature is found in the C terminus of trehalose-6-phosphate synthase adjacent to the trehalose-6-phosphate synthase domain (see ). It would appear that the two equivalent genes in the Escherichia coli otsBA operon: otsA, the trehalose-6-phosphate synthase and otsB, trehalose-phosphatase (this family) have undergone gene fusion in most eukaryotes. This entry includes sequences from plants and fly that does not possess catalytic activity.
