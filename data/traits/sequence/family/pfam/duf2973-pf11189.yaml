identifier: Pfam:PF11189
label: Protein of unknown function (DUF2973)
definition: >-
  This entry represents a group of proteins from tailed bacteriophages and prophages mainly found in cyanobacteria, including from Bacteriophage Syn9, Gp224. Some members in this family of proteins are annotated as membrane proteins however this cannot be confirmed. Currently they have no known function.
