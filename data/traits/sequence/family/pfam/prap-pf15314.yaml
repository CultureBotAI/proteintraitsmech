identifier: Pfam:PF15314
label: Proline-rich acidic protein 1, pregnancy-specific uterine
definition: >-
  PRAP, or proline-rich acidic protein 1, is a family of eukaryotic proteins. PRAP is abundantly expressed in the epithelial cells of the human liver, kidney, gastrointestinal tract, and cervix. It is significantly down-regulated in hepatocellular carcinoma and right colon adenocarcinoma compared with the respective adjacent normal tissues. It is expressed in the epithelial cells of the mouse and rat gastrointestinal tracts, and pregnant mouse uterus. PRAP plays an important role in maintaining normal growth suppression.
