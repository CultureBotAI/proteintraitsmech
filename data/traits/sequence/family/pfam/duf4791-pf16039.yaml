identifier: Pfam:PF16039
label: Domain of unknown function (DUF4791)
definition: >-
  This family of insect proteins is functionally uncharacterised. Proteins in this family are typically between 189 and 203 amino acids in length. There are two conserved sequence motifs: PLPL and LGN. There is a single completely conserved residue N that may be functionally important.
