identifier: Pfam:PF09617
label: CRISPR-associated protein GSU0053 (Cas_GSU0053)
definition: >-
  Members of this family, previously called Csx4 and now called Csb1 or Cas7u, are found in association with CRISPR repeats and other CRISPR-associated (cas) genes. Its CRISPR/Cas type, now called type I-U, originally was designated Dpsych. It was first seen in the genomes of Geobacter sulfurreducens PCA and Desulfotalea psychrophila LSv54 (both Desulfobacterales from the Deltaproteobacteria), Gemmata obscuriglobus (a Planctomycete), and Actinomyces naeslundii MG1 (Actinobacteria). The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
