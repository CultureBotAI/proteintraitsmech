identifier: Pfam:PF23873
label: Family of unknown function (DUF7228)
definition: >-
  This family of uncharacterised proteins is found in several Lactococcus phages. All members are short proteins, between 33-59 amino acids in length. The family shows some conserved polar residues at the N-terminal. These proteins appear to be disordered.
