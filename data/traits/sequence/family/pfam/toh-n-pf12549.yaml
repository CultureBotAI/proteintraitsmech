identifier: Pfam:PF12549
label: 'Tyrosine hydroxylase N terminal '
definition: >-
  This domain family is found in eukaryotes, and is approximately 30 amino acids in length. There is a single completely conserved residue G that may be functionally important. Tyrosine hydroxylase converts L-tyrosine to L-DOPA in the catecholamine synthesis pathway.
