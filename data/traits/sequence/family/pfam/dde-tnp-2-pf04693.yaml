identifier: Pfam:PF04693
label: Archaeal putative transposase ISC1217
definition: >-
  Autonomous mobile genetic elements such as transposon or insertion sequences (IS) encode an enzyme, transposase, that is required for excising and inserting the mobile element. Transposases have been grouped into various families. This family includes the putative transposase ISC1217 from archaebacteria.
