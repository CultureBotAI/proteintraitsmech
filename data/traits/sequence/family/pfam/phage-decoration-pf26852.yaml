identifier: Pfam:PF26852
label: Phage decoration protein family
definition: >-
  The Decoration protein family from Thermus phage p23-45 plays a crucial role in stabilizing the mature viral capsid shell. It achieves this by cooperatively binding to the expanded capsid, which allows for the packaging of large viral DNA. The proteins in this family form homotrimers and interact with the major capsid protein. These trimers are strategically located at local and icosahedral threefold axes, contributing to the stabilisation of the expanded capsid by increasing the spacing between capsomers.
