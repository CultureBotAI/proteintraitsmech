identifier: Pfam:PF14402
label: 7 transmembrane helices usually fused to an inactive transglutaminase
definition: >-
  This domain of seven transmembrane helices is usually fused to an inactive transglutaminase domain. The transglutaminase domain is predicted to be extracellularly located. Proteins with this domain are associated in gene neighbourhoods with a pepsin-like peptidase and an ATP-grasp of the RimK-family. The ATP-grasp is predicted to modify the 7TM protein or a cofactor that interacts with it.
