identifier: Pfam:PF01267
label: F-actin capping protein alpha subunit
definition: >-
  The F-actin capping protein binds in a calcium-independent manner to the fast growing ends of actin filaments (barbed end) thereby blocking the exchange of subunits at these ends. Unlike gelsolin and severin this protein does not sever actin filaments. The F-actin capping protein is a heterodimer composed of two unrelated subunits: alpha and beta (see ). Neither of the subunits shows sequence similarity to other filament-capping proteins. This entry represent the alpha subunit (CAPZA), which is a protein of about 268 to 286 amino acid residues whose sequence is well conserved in eukaryotic species. In Drosophila mutations in the alpha and beta subunits cause actin accumulation and subsequent retinal degeneration. In humans CAPZA is part of the WASH complex that controls the fission of endosomes.
