label: Family of unknown function (DUF7004)
definition: >-
  This family of proteins is found in mainly bacteria. Proteins in this family are approximately 160 amino acids in length. They are predicted to adopt globular α/β structure. These proteins contain two highly conserved sequence motifs GxFDxWC and KRxKRLG that may be of functional importance.
