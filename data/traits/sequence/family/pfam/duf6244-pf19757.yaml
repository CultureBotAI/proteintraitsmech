label: Family of unknown function (DUF6244)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000267) is described by MIBiG as an example of the following biosynthetic classes, polyketide and saccharide. This entry includes a member from the saquayamycin Z biosynthetic gene cluster from Micromonospora sp. Tu 6368. This family appears to be predominantly found in Actinobacteria.
