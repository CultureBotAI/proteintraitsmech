identifier: Pfam:PF17642
label: Hemolysin coregulated protein Hcp (TssD)
definition: >-
  This entry represents a family of proteins including Hemolysin coregulated protein, Hcp (also known as TssD). Type VI secretion systems (T6SSs) are multiprotein complexes requiring numerous core proteins (Tss proteins) that function as a toxin delivery systems. The core Tss proteins include cytoplasmic, transmembrane, and outer membrane components. The toxin delivery apparatus includes a needle or tube structure which functions as a puncturing device. This is comprised of a phage-like complex, similar to the T4 contractile bacteriophage tail, which is thought to be anchored to the membrane by a trans-envelope complex. The inner tube is formed of Hcp (TssD), assembled as stacked hexamers. Hcp proteins have also been reported to function as chaperones, by binding to and stabilizing effectors.
