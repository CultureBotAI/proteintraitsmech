identifier: Pfam:PF30881
label: Uncharacterized protein At4g14450, chloroplastic
definition: >-
  This entry represents At4g14450 which is part of the proline/serine-rich protein (PRP) family, also known as PH1 (Proline/serine-rich protein Homolog 1). This family is found in land plants (Embryophyta), particularly in dicotyledonous species. These proteins are phospho-targets of stress-related mitogen-activated protein kinases (MAPKs) and differentially regulate growth and pathogen defence. The proteins contain a chloroplast transit peptide and have been detected in the chloroplast, cytoplasm and nucleus. It contains disordered regions.
