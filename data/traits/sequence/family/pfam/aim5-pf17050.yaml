identifier: Pfam:PF17050
label: Altered inheritance of mitochondria 5
definition: >-
  Mic12, also known as Aim5, is a subunit of the MICOS complex, a mitochondrial inner membrane complex that functions as a primary determinant of mitochondrial inner membrane structure. Yeast MICOS complex is comprised of six core subunits: Mic60, Mic10, Mic19, Mic27, Mic26, and Mic12. The MICOS complex can be divided into two independent subcomplexes: Mic27/Mic10/Mic12 and Mic60/Mic19 according to their dependence of respiratory complexes and the mitochondrial lipid cardiolipin. The dependence of the Mic27/Mic12/Mic10 subcomplex on respiratory complexes suggests that in addition to the roles in cristae biogenesis, this subcomplex coordinates with respiratory complexes and lipids to establish mitochondrial inner membrane architecture.
