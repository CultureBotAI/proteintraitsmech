identifier: Pfam:PF03827
label: Orexin receptor type 2
definition: >-
  The neuropeptide hormone orexin stimulates appetite and food consumption, and is found in the hypothalamus, which has been shown to be the 'feeding centre' and plays a central role in the integrated control of feeding and energy homeostasis. It also has a prominent role in promoting wakefulness. The orexin receptor (also referred to as the hypocretin receptor) is a rhodopsin-like G protein-coupled receptor that binds orexin. There are two subtypes; orexin receptor 1 (OX1) and orexin receptor 2 (OX2). This entry represents Orexin receptor 2, which is found throughout vertebrates and, like OX1, is expressed in brainstem and striatal nuclei, with additional expression in arousal promoting histaminergic nuclei. Both Orexin-A and B have nearly equal affinity for OX2, and stimulate intracellular calcium levels through OX2-mediated induction of Gq and phospholipase C activity, but is also capable of activating Gs, Gi, and potentially ion channels. The OX2 receptor predominantly mediate the control of arousal induced by orexin neuropeptides.
