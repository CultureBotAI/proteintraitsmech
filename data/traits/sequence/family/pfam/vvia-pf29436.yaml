identifier: Pfam:PF29436
label: VviA prenyltransferase
definition: >-
  This entry represents a family of UbiA-type prenyltransferases found in fungi. The prototype member VviA from Viridothelium virens is a multi-pass membrane protein that catalyses the prenylation of D-mannitol using cyclo-farnesyl diphosphate (drim-8- ene diphosphate) as the prenyl donor to produce sporulositol A. The enzyme shows broad substrate tolerance towards C6 saccharide polyols but does not recognise C5-C3 polyols. VviA requires Mg2+ as a cofactor and contains multiple transmembrane helices. The family belongs to the UbiA prenyltransferase superfamily and is involved in secondary metabolite biosynthesis.
