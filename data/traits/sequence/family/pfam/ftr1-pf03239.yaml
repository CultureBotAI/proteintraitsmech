identifier: Pfam:PF03239
label: Iron permease FTR1 family
definition: >-
  Fungi uptake extracellular ferrous iron (Fe2+) using a bipartite high-affinity transporter consisting of a multicopper ferroxidase associated with a membrane permease which translocates generated ferric iron (Fe3+) into the cytosol. The Saccharomyces cerevisiae (Baker's yeast) iron permease FTR1 is a plasma membrane permease for high-affinity iron uptake. FTR1, together with multicopper oxidase FET3, mediate high-affinity iron uptake. Schizosaccharomyces pombe Fio1 (ferrous iron oxidase) and Fip1 (ferriferous permease), share significant similarity to FET3 and FTR1 from S. cerevisiae. In Neosartorya fumigata, the high affinity iron permease is known as FtrA. Many bacteria possess Fe2+ transporters with functional similarities to the FET3-FTR1 system. Escherichia coli encodes an EfeUOB transporter where EfeU is homologous to the high-affinity iron permease FTR1 of Saccharomyces cerevisiae. Bacillus subtilis encodes similar proteins, but not identical to the E. coli EfeUOB transporter components. B. subtilis EfeUOB uses a transport system that permits the high-affinity acquisition of both Fe2+ and Fe3+. This entry also includes the vacuolar iron transporter FTH1.
