identifier: Pfam:PF08962
label: Rv2632c-like
definition: >-
  This entry includes a set of Actinobacterial proteins, including Rv2632c from Mycobacterium tuberculosis that is strongly implicated in the onset of non-replicating persistence, and thereby latent tuberculosis. Rv2632c contains a dsRBD-like (2 layers α/β) fold (PDBe:2fgg). It shares remarkable similarity with bacterial hibernation factors, despite very low sequence similarity. Based on this structure it was predicted that Rv1738, highly up-regulated in conditions that mimic the onset of persistence, helps trigger dormancy by association with the bacterial ribosome.
