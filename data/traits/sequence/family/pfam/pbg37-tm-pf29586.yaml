identifier: Pfam:PF29586
label: PBG37-like sexual stage-specific protein transmembrane domain
definition: >-
  This entry represents PBG37 and related sexual stage-specific proteins from Plasmodium species. The protein encompasses multiple transmembrane helices forming a multi- pass membrane protein structure. PBG37 is a sexual stage-specific protein involved in the development of male gametocytes in malaria parasites. The protein localises to the cell membrane and in exflagellating male gametes is found mostly in the residual body. The protein is expressed in gametocytes with higher expression in males compared to females, and also in zygotes and ookinetes. PBG37 plays important roles in male gametocytogenesis and gametocyte exflagellation. The protein has potential as a transmission- blocking vaccine target as antibodies against PBG37 can reduce parasite transmission.
