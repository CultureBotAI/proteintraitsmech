definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000119) is described by MIBiG as an example of the following biosynthetic classes, polyketide and saccharide, in particular the 7-deoxypactamycin biosynthetic gene cluster from Streptomyces pactum. This family appears to be predominantly found in Actinobacteria.
