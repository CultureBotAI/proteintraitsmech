identifier: Pfam:PF01899
label: Na+/H+ ion antiporter subunit
definition: >-
  This family contains both characterised and uncharacterised bacterial and archaeal proteins; some of which are possibly transmembrane proteins involved in Na + /H + or K + /H + transport. The characterised proteins are mnhE (Staphylococcus aureus) and PhaE (Rhizobium meliloti), which are subunits of the Na + /H + or K + /H + antiporters, that are required for sodium and potassium excretion, respectively.
