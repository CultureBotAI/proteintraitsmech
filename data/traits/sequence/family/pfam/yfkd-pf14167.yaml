identifier: Pfam:PF14167
label: YfkD-like protein
definition: >-
  The YfkD-like protein family includes the B. subtilis YfkD protein , which is functionally uncharacterised. Its expression is regulated by the sigma factor sigma-B, which regulates the expression of stress-response proteins, and by the forespore-specific sigma factor sigma-G. According to structure predictions and comparisons, these proteins may adopt a structure related to the aerolisin pore-forming toxins.
