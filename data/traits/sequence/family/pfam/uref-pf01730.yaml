identifier: Pfam:PF01730
label: UreF
definition: >-
  This family consists of the urease accessory protein, UreF. The urease enzyme (urea amidohydrolase) hydrolyses urea into ammonia and carbamic acid. UreF is proposed to modulate the activation process of urease by eliminating the binding of nickel irons to noncarbamylated protein. This entry also includes the URE6 from Cryptococcus neoformans which is a fungal homologue of UreF and pays a role in host brain invasion causing meningoencephalitis.
