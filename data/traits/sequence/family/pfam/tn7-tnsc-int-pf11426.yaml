identifier: Pfam:PF11426
label: Tn7 transposition regulator TnsC
definition: >-
  TnsC is a molecular switch that regulates transposition and interacts with TnsA which is a component of the transposase. The two proteins interact via the residues 504-555 on TnsC. The TnsA/TnsC interaction is very important in Tn7 transposition.
