identifier: Pfam:PF26687
label: Family of unknown function (DUF8231)
definition: >-
  This entry represents a family of uncharacterised proteins from archaebacteria. These proteins contain and N and C-terminal transmembrane α-helix. These α-helices interact with each other. The central portion of the protein is likely to form a series of extracellular domains.
