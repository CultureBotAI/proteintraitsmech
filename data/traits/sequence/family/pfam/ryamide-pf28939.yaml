identifier: Pfam:PF28939
label: RYamide neuropeptide precursor
definition: >-
  This entry represents the precursor protein for RYamide neuropeptides found mainly in insects. The precursors are processed to produce RYamide-1 and RYamide-2 bioactive peptides that serve as ligands for G-protein coupled receptors. RYamide-2 is the most potent activator of the RYa-R receptor. These neuropeptides may suppress feeding behaviour and are involved in G-protein coupled receptor signalling pathways. The precursors contain a signal peptide and are secreted proteins that undergo post-translational processing including amidation at tyrosine residues.
