identifier: Pfam:PF01129
label: NAD:arginine ADP-ribosyltransferase
definition: >-
  Mono-ADP-ribosylation is a post-translational modification of proteins in which the ADP-ribose moiety of NAD is transferred to proteins. This process is responsible for the toxicity of some bacterial toxins (e.g., cholera and pertussis toxins). Mono (ADP-ribosyl) transferases exist in vertebrates that transfer ADP-ribose to arginine. NAD + + L-arginine = nicotinamide + N2-(ADP-D-ribosyl)-L-arginine At least five forms of the enzyme have been characterised to date, some of which are attached to the membrane via glycosylphosphatidylinositol (GPI) anchors, while others appear to be secreted. The enzymes contain ~250-300 residues, which encode putative signal sequences and carbohydrate attachment sites. In addition, the N- and C-termini are predominantly hydrophobic, a characteristic of GPI-anchored proteins.
