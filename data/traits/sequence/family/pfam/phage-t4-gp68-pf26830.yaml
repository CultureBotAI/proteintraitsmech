identifier: Pfam:PF26830
label: Prohead assembly protein gp68 family
definition: >-
  This entry represents Prohead assembly protein gp68 from Enterobacteria phage T4 (Bacteriophage T4) and similar proteins found in the viral family Myoviridae. Gp68 plays a role in the phage head size determination. About ten copies of this protein are found in the mature phage head. It is predicted to have a secondary structure that consists of α-helical hairpins similar to supersecondary-structure-forming domains such as tetratricopeptide and HEAT repeats.
