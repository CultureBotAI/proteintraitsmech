identifier: Pfam:PF17063
label: Phenol-soluble modulin alpha peptide family
definition: >-
  S. aureus secretes four shorter (~20 amino acids, the alpha-type) and two longer (~40 amino acids, the beta-type) phenol-soluble modulin (PSM)-like peptide. This entry represents the alpha type PSM peptides. PSMs may recruit, activate and induce the lysis of human neutrophils. They stimulate the secretion of IL-8 and also have haemolytic activity during MRSA infection.
