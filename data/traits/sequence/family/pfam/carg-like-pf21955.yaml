identifier: Pfam:PF21955
label: Carbapenem resistance protein CarG-like
definition: >-
  This entry represents the carbapenem resistance protein CarG from Serratia sp. and similar sequences mainly found in proteobacteria. CarG shows a unique β-sandwich fold with short terminal α-helices, displaying close structural homology with bacterial inhibitors of invertebrate lysozyme ( ).
