identifier: Pfam:PF09658
label: CRISPR-associated protein (Cas_Csx9)
definition: >-
  This entry represents the Cxs9/Cas8a2 family of Cas proteins found in archaea. These proteins are encoded in the midst of a cas gene operon is found immediately upstream of cas3 in loci that resemble the Apern type but lack Csa1 and Csa4 genes. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
