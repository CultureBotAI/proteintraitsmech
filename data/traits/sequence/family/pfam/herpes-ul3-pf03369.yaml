identifier: Pfam:PF03369
label: Herpesvirus UL3 protein
definition: >-
  Herpes simplex viruses are large DNA viruses, the genome of which encode approximately 80 genes. The UL3 gene of Human herpesvirus 2 (HHV-2) is predicted to encode a 233 amino acid protein with a molecular mass of 26kDa. Homologues of the UL3 protein are encoded only among alphaherpesviruses. The function of the UL3 protein of Herpes simplex viruses remains unknown but it is known to localize to the nucleus and is a phosphoprotein.
