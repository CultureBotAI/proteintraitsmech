identifier: Pfam:PF30599
label: Family of unknown function (DUF8661)
definition: >-
  This entry represents a family of small uncharacterised proteins of approximately 80 to 110 residues. The family is restricted to marine picocyanobacteria, including Prochlorococcus, Synechococcus, and Cyanobium species (Synechococcales). The function of this family remains to be determined.
