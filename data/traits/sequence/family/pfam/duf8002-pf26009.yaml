identifier: Pfam:PF26009
label: Family of unknown function (DUF8002)
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. Proteins in this family form a compact structure with two long β strands and an α helix. These proteins are predicted to form homooligomeric complexes. These proteins likely form large oligomeric ring complexes (E4NL25 14mer ipTM=0.84 pTM=0.85). The function of this complex are not known.
