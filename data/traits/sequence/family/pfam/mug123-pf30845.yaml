identifier: Pfam:PF30845
label: Meiotically up-regulated protein Mug123
definition: >-
  This entry represents the Mug123 family of proteins found in fungi, primarily Ascomycota. The founding member was identified in fission yeast (Schizosaccharomyces pombe) where it is meiotically up-regulated and required for sporulation and meiosis. The protein localises to the cytoplasm and nucleus. Members are approximately 235-385 residues in length and contain extensive disordered regions. The precise molecular function of this protein family remains to be determined.
