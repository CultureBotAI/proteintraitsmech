identifier: Pfam:PF20841
label: NtrZ
definition: >-
  This entry represents a family of proteins predominantly found in alphaproteobacteria, including the periplasmic protein NtrZ from Caulobacter crescentus, which functions to regulate the activity of the NtrY-NtrX two-component system. NtrZ inhibits NtrY phosphatase activity.
