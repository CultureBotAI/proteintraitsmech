identifier: Pfam:PF15013
label: CCSMST1 family
definition: >-
  This family includes ubiquinol-cytochrome-c reductase complex assembly factor 4 (UQCC4), a family of proteins that was discovered in a screen of Bos taurus placental ESTs. The B. taurus member of this family was named cattle cerebrum and skeletal muscle-specific transcript 1 (CCSMST1), hence the alternative name of the family. This family of proteins is found in metazoa, both in vertebrates and invertebrates. Proteins are typically between 97 and 157 amino acids in length with a single completely conserved residue D that may be functionally important. UQCC4 is required for the assembly and stability of the mitochondrial ubiquinol-cytochrome c reductase complex (complex III (CIII) or cytochrome b-c1 complex), a multisubunit transmembrane complex that is part of the mitochondrial electron transport chain (ETC) which drives oxidative phosphorylation.
