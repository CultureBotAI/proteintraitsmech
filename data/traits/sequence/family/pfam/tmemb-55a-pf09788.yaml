label: Transmembrane protein 55A
definition: >-
  Phosphatidylinositol-4,5-bisphosphate 4-phosphatases type I and type II, also known as transmembrane proteins 55B and 55A, are two metazoan enzymes that catalyse the hydrolysis of PtdIns-4,5-P(2) to phosphatidylinositol-5-phosphate (PtdIns-5-P).
