identifier: Pfam:PF11111
label: Centromere protein M (CENP-M)
definition: >-
  The prime candidate for specifying centromere identity is the array of nucleosomes assembles associated with CENP-A. CENP-A recruits a nucleosome associated complex (CENP-A-NAC complex) comprised of CENP-M which this entry represents, along with two other proteins. Assembly of the CENP-A NAC at centromeres is partly dependent on CENP-M. The CENP-A NAC is essential, as disruption of the complex causes errors of chromosome alignment and segregation that preclude cell survival.
