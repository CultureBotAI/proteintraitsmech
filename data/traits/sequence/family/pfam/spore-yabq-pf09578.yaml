identifier: Pfam:PF09578
label: Spore cortex protein YabQ
definition: >-
  This protein is predicted to span the membrane several times. It is only found in genomes of species that perform sporulation, such as Bacillus subtilis, Clostridium tetani, and other members of the Firmicutes (low-GC Gram-positive bacteria). Mutation of this sigmaE-dependent gene blocks development of the spore cortex. The length of the C-terminal region, which includes some hydrophobic regions, is variable. This entry includes the Bacillus subtilis YabQ, which is essential for formation of the spore cortex.
