label: CBU_0585/lpg0581-like
definition: >-
  The founding members of this family are Cbu_0585 from Coxiella burnetii ( ) and lpg0581 from Legionella pneumophila ( ). They were described as potential type IV secretion system (T4SS) virulence effectors because of their homology to each other but absence from a number of related bacteria that lack T4SS. However, this statement hasn't yet been confirmed.
