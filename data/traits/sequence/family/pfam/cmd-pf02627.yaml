identifier: Pfam:PF02627
label: Carboxymuconolactone decarboxylase family
definition: >-
  This entry includes a group of alkyl hydroperoxide reductases, carboxymuconolactone decarboxylase and other decarboxylases, such as Nitrosuccinic acid decarboxylase npaB. Alkyl hydroperoxide reductases are involved in protection against oxidative stresses. The catechol and protocatechuate branches of the 3-oxoadipate pathway, which are important for the bacterial degradation of aromatic compounds, converge at the common intermediate 3-oxoadipate enol-lactone. Carboxymuconolactone decarboxylase (CMD) is involved in protocatechuate catabolism. In some bacteria a gene fusion event leads to expression of CMD with a hydrolase involved in the same pathway.
