identifier: Pfam:PF28019
label: Pilus motility taxis protein HmpF
definition: >-
  This family represents the cyanobacterial pilus motility taxis protein HmpF and its homologues, a protein that is part of the Hmp system. The chemotaxis-like Hmp system is essential for motility and the coordinated polar accumulation of PilA on cells in motile filaments, while the Ptx system controls positive phototaxis. A direct interaction between HmpF and the T4P system was found to activate pilus extension, thus the Hmp system facilitates coordinated polarity of HmpF to establish motility, and the Ptx system modulates HmpF localization to initiate reversals in response to changes in light intensity. The Hmp chemotaxis-like system of the filamentous cyanobacterium Nostoc punctiforme is capable of sensing light indirectly, possibly via alterations in proton motive force, and modulates direct interaction between HmpF, and Hfq, PilT1, and PilT2 to regulate the T4P motors.
