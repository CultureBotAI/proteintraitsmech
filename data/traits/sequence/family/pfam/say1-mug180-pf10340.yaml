identifier: Pfam:PF10340
label: Steryl acetyl hydrolase
definition: >-
  This entry includes budding yeast steryl acetyl hydrolase 1 (Say1) and fission yeast Mug180. Say1 is a membrane-anchored deacetylase required for the deacetylation of acetylated sterols. It is involved in the resistance to eugenol and pregnenolone toxicity. Mug180 has a role in meiosis.
