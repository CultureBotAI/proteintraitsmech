identifier: Pfam:PF13783
label: Domain of unknown function (DUF4177)
definition: >-
  This entry represents a group of prokaryotic proteins, including the uncharacterised protein YjzH from Bacillus subtilis. YjzH is a member of the sigma W regulon, which is induced in response to cell envelope stress caused by antibiotics, alkaline shock and salt shock. This family was previously known as DUF4177.
