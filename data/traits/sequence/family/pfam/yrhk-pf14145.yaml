label: YrhK-like protein
definition: >-
  Bacillus subtilis YrhK protein is functionally uncharacterised. Its expression is under the control of the motility sigma factor sigma-D. This entry represents domain found in YrhK, where it comprises the whole length of the protein, and other sequences.
