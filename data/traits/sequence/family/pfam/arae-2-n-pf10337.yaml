identifier: Pfam:PF10337
label: Putative ER transporter, 6TM, N-terminal
definition: >-
  This domain is found in proteins conserved in fungi. Their function is not known. This entry represents the N-terminal half of some member proteins which contain the DUF2421 domain ( ) at their C terminus. These proteins are putative endoplasmic reticulum tranpsorters, with a total of 12 TMs.
