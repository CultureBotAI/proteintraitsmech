identifier: Pfam:PF02598
label: Putative RNA methyltransferase
definition: >-
  This entry includes the putative methyltransferase C9orf114 from human, also known as SPOUT1, and its homologues. It is required for association of the centrosomes with the poles of the bipolar mitotic spindle during metaphase. It is also involved in chromosome alignment. SPOUT1 binds specifically to miRNA MIR145 hairpin and regulates MIR145 expression at a postranscriptional level. Members of this family have a TIM barrel-like fold with a deep C-terminal trefoil knot. The arrangement of its hydrophilic and hydrophobic surfaces are opposite to that of the classic TIM barrel proteins.
