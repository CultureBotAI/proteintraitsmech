identifier: Pfam:PF18861
label: TM proximal of protein tyrosine phosphatase, receptor type J
definition: >-
  Receptor-type protein tyrosine phosphatase that plays roles in cell adhesion, migration, proliferation and differentiation. PTP receptor type J (PTPRJ) possesses an extracellular region containing five fibronectin type III repeats, the transmembrane region included in this entry, and an intracytoplasmic catalytic domain. This entry probably contains part of a Fn3 domain at the N terminus.
