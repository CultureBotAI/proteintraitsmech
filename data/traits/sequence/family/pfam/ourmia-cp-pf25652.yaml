identifier: Pfam:PF25652
label: Ourmia virus capsid protein
definition: >-
  This entry represents the capsid protein (CP) of Ourmia viruses. The protein self-assembles to form a baciliform capsid with a T=1 symmetry, approximately 18 nm in diameter. The capsid encapsulates three genomic RNAs.
