identifier: Pfam:PF07093
label: SGT1 protein
definition: >-
  This entry represents Ecd (ecdysoneless) family. Drosophila ecd mutants display reduced steroid titers during larval development. Mammalian Ecd (also known as SGT1 and hEcd in humans) has been shown to stimulate cell proliferation by interacting with the Retinoblastoma (Rb) proteins. Ecd proteins may be involved in pre-mRNA splicing.
