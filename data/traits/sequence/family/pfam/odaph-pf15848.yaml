label: Odontogenesis associated phosphoprotein
definition: >-
  This family is found in mammals. It includes odontogenesis associated phosphoprotein (ODAPH or in human C4orf26) which is expressed in the enamel organ of the tooth and may promote nucleation of hydroxyapatite.
