identifier: Pfam:PF31180
label: Leukemia-associated protein 1
definition: >-
  This entry represents the leukemia-associated protein 1 (DLEU1), also known as deleted in lymphocytic leukemia 1, found in primates. The protein is approximately 78 amino acids in length and may act as a tumour suppressor. DLEU1 may interact with histone acetyltransferase KAT5 according to IntAct database.
