identifier: Pfam:PF01949
label: Endonuclease dU
definition: >-
  This entry includes Endonuclease dU (Endo_dU) from Archaeoglobus fulgidus (AF_1433, ) and similar prokaryotic. Sequence and structure analysis to identify RNase H-like superfamily members, has clustered this family in endonuclease Clade V, thus suggesting endonuclease activity of these proteins. Endo_dU, which cleave the 3'-side of deoxyuridine (dU) on DNA substrates, shows a typical RNase H-like fold, with a core structure of five β-strands and three α-helices. It may participate in DNA repair. This family was formerly known as DUF99.
