identifier: Pfam:PF09583
label: Phage shock protein G (Phageshock_PspG)
definition: >-
  This protein previously was designated yjbO in Escherichia coli, and it is also known as envelope stress response protein PspG. It is found only in genomes that have the phage shock operon (psp), but it is only rarely encoded near other psp genes. The psp regulon is upregulated in response to a number of stress conditions, including ethanol, expression of the filamentous phage secretin protein IV and other secretins and heat shock.
