identifier: Pfam:PF15237
label: PTRF/SDPR family
definition: >-
  This entry represents the cavin family (caveolae-associated proteins; previously known as the PTRF/SDPR family), which includes proteins cavin-1 to 4. They are critical regulators for caveolae dynamics. Caveolae are invaginations of the plasma membrane involved in many cellular processes, including clathrin-independent endocytosis, cholesterol transport, and signal transduction. Caveolins are the principal components of caveolae membranes. Polymerase I and transcript release factor (PTRF; also known as cavin-1) is essential for formation of caveolae and proper localisation of caveolins.
