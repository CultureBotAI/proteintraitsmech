identifier: Pfam:PF06146
label: Phosphate-starvation-inducible E family
definition: >-
  This entry represents the phosphate-starvation-inducible protein (PsiE) and similar proteins. This entry is sometimes found in proteins that contain other domains such as the protoglobin domain. Phosphate-starvation-inducible E (PsiE) expression is under direct positive and negative control by PhoB and cAMP-CRP, respectively. PsiE is an integral membrane protein with four transmembrane helices. The second α helix contains a conserved glutamic acid residue and the third helix contains a conserved arginine residue. The function of PsiE remains to be determined.
