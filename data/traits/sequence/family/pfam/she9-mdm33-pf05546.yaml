identifier: Pfam:PF05546
label: She9 / Mdm33 family
definition: >-
  Members of this family are mitochondrial inner membrane proteins with a role in inner mitochondrial membrane organisation and biogenesis. The yeast Mdm33 protein assembles into an oligomeric complex in the inner membrane where it performs homotypic protein-protein interactions. It has been suggested that Mdm33 plays a distinct role, possibly involved in fission of the mitochondrial inner membrane.
