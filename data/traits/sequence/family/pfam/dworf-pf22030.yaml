identifier: Pfam:PF22030
label: Sarcoplasmic/endoplasmic reticulum calcium ATPase regulator DWORF
definition: >-
  DWarf Open Reading Frame (DWORF) is a small protein that plays a key role in heart muscle contraction. DWORF, Sarcolipin (SLN), and myoregulin (MRLN) are transmembrane regulators of the sarcoplasmic reticulum calcium transporting ATPase (SERCA). DWORF enhances SERCA activity by displacing phospholamban (PLN), a potent SERCA inhibitor. This makes DWORF an attractive candidate for a heart failure therapeutic. DWORF is also present in slow-twitch skeletal muscle fibres.
