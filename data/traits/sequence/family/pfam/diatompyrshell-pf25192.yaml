identifier: Pfam:PF25192
label: Diatom pyrenoid shell protein
definition: >-
  Shell proteins form the shell encapsulating the pyrenoid matrix in diatoms, essential for the CO2-concentrating mechanism (CCM) function. Each member contains two predicted β-sheet domains. Shell1/2 (93% identical) form the main structural component. Shell1 can self-assemble into tubes and sheets in vitro. Shell4 is critical for organising the pyrenoid-penetrating thylakoid and shell-matrix interaction but lacks the C-terminal extension found in Shell1/2. Shells 3, 5, and 6 also localise to the pyrenoid periphery, but their specific functions remain unknown. The family is found in stramenopiles, pelagophytes, and haptophytes, all algae with red plastids from secondary endosymbiosis.
