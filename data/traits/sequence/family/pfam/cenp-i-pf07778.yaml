identifier: Pfam:PF07778
label: 'Mis6 '
definition: >-
  Centromere protein I (CENP-I) is a component of the CENPA-CAD (nucleosome distal) complex, a complex recruited to centromeres which is involved in assembly of kinetochore proteins, mitotic progression and chromosome segregation. It may be involved in incorporation of newly synthesized CENP-A into centromeres via its interaction with the CENPA-NAC complex. In humans, CENP-I is required for the localisation of CENPF, MAD1L1 and MAD2 (MAD2L1 or MAD2L2) to kinetochores and is involved in the response of gonadal tissues to follicle-stimulating hormone.
