identifier: Pfam:PF06056
label: Putative ATPase subunit of terminase (gpP-like)
definition: >-
  This entry represents the N-terminal domain of Terminase, ATPase subunit from Escherichia phage P2 and similar proteins from tailed bacteriophages and bacterial prophages. Terminases are viral proteins that are involved in packaging viral DNA into the capsid.
