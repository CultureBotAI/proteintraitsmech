identifier: Pfam:PF28178
label: Amuc_1102-like
definition: >-
  This entry represents the pilus-like protein Amuc_1102 from Akkermansia muciniphila ( ) and similar bacterial sequences. Members of this family are thought to be structural and assembly proteins for a pilus-like structure similar to some archaeal type IV pili. The crystal structure of Amuc_1102 revealed an immunoglobulin-like fold.
