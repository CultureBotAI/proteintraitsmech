label: Family of unknown function (DUF6229)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000385) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the lysobactin biosynthetic gene cluster from Lysobacter sp. ATCC 53042. This family appears to be predominantly found in bacteria.
