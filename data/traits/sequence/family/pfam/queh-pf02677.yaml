identifier: Pfam:PF02677
label: Epoxyqueuosine reductase QueH
definition: >-
  QueH has been predicted to be an epoxyqueuosine reductase that catalyzes the conversion of epoxyqueuosine (oQ) to queuosine (Q), which is a hypermodified base found in the wobble positions of tRNA(Asp), tRNA(Asn), tRNA(His) and tRNA(Tyr).
