identifier: Pfam:PF10164
label: Brain protein I3
definition: >-
  This is a highly conserved set of proteins which contains three pairs of cysteine residues within a length of 42 amino acids and is rich in proline residues towards the N terminus. It includes a membrane protein that has been found to be highly expressed in the mouse brain and consequently, several members have been assigned as BRI3 or brain protein i3. Their function is unknown but they appear to play a role in TNF-induced cell death. They may be a target of Wnt/beta-catenin signalling in the liver.
