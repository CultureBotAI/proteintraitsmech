identifier: Pfam:PF09388
label: Spo0E like sporulation regulatory protein
definition: >-
  Spo0E is an aspartyl-phosphate phosphatase which specifically dephosphorylates the sporulation transcription factor Spo0A-P and negatively regulates the sporulation initiation pathway in order to control the proper timing of sporulation. The structure of Spo0E has revealed an anti-parallel α-helical structure. Spore formation is an extreme response to starvation and can also be a component of disease transmission. Sporulation is controlled by an expanded two-component system where starvation signals result in sensor kinase activation and phosphorylation of the master sporulation response regulator Spo0A. Phosphatases such as Spo0E dephosphorylate Spo0A thereby inhibiting sporulation.
