identifier: Pfam:PF23932
label: Phage termination protein
definition: >-
  This entry represents a likely phage terminator protein which terminates the elongation of the phage tail tube. This protein shows structural similarity to the PAM3 terminator protein which forms a hexameric ring. This protein has a β-sandwich domain nested within the terminator-like domain.
