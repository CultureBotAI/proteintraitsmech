identifier: Pfam:PF26888
label: Bacteriophage T4 protein Y13I
definition: >-
  This entry represents the Y13I protein family found in T4-like bacteriophages. Y13I is an uncharacterised protein of 75 amino acids (8.8 kDa) found in the pseT-alc intergenic region of bacteriophage T4. These proteins are mainly found in Heunggongvirae.
