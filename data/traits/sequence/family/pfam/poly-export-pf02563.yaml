identifier: Pfam:PF02563
label: Polysaccharide biosynthesis/export protein
definition: >-
  This entry represents a domain found N-terminal in a group of bacterial polysaccharide export proteins, including Wza from Escherichia coli, which is likely to be involved in the export of the extracellular polysaccharide colanic acid (CA) from the cell to medium and Capsule polysaccharide export outer membrane protein CtrA from Neisseria meningitidis, which may function as a membrane anchor for capsular polysaccharides.
