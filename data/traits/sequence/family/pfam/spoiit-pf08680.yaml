identifier: Pfam:PF08680
label: Sporulation protein SpoIIT
definition: >-
  This entry represents sporulation protein SpoIIT and related proteins. SpoIIT participates in cell-cell signalling pathways during sporulation, functioning specifically in the SpoIIGA-dependent proteolytic activation of sigma E in the mother cell. SpoIIT may act as a coactivator alongside SpoIIR to trigger SpoIIGA-dependent processing of pro-sigma E, and is thought to help maintain SpoIIGA in its active state. This protein contains a circularly permuted TATA-box binding protein-like fold ( ). It participates in cell-cell signalling pathways during sporulation
