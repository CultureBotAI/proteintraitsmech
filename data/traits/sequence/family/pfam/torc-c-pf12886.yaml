identifier: Pfam:PF12886
label: Transducer of regulated CREB activity, C terminus
definition: >-
  This entry represents the C-terminal domain of TORC proteins. TORC (transducer of regulated CREB activity) is a protein family of coactivators that enhances the activity of CRE-dependent transcription via a phosphorylation-independent interaction with the bZIP DNA binding/dimerisation domain of CREB (cAMP Response Element-Binding). The C-terminal domain is negatively charged, resembling transcription activation domains, and experimental studies indicate that it may play a role in activation of transcription.
