identifier: Pfam:PF15513
label: Domain of unknown function (DUF4651)
definition: >-
  This is a family of short, secreted proteins specific to the Streptococcus genus, with distant homologues, not recognised by this entry, found in other cocci. In all sequenced genomes, proteins from this family appear in a conserved genomic context with an thioredoxin, tRNA synthase and tRNA binding protein, but the functional implication of this is unclear.
