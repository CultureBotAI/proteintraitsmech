identifier: Pfam:PF05653
label: Magnesium transporter NIPA
definition: >-
  NIPA (nonimprinted in Prader-Willi/Angelman syndrome) is a family of integral membrane proteins which function as magnesium transporters. This entry also includes a group of uncharacterised bacterial proteins, such as Cgl0250 (UniProt:P42459) from Corynebacterium glutamicum.
