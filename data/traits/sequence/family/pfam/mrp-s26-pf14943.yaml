label: Mitochondrial ribosome subunit S26
definition: >-
  This entry includes members of the 28S ribosomal protein S26 (also known as mS26 or MRPS26) family. Members of this family are a component of the mitochondrial ribosome small subunit (28S), which comprises a 12S rRNA and about 30 distinct proteins.
