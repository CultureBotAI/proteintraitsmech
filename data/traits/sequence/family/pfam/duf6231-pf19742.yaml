identifier: Pfam:PF19742
label: Family of unknown function (DUF6231)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000387) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the mangotoxin biosynthetic gene cluster from Pseudomonas syringae pv. syringae. This family appears to be predominantly found in Proteobacteria.
