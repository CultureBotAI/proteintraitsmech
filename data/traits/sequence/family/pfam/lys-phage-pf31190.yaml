identifier: Pfam:PF31190
label: Phage L-alanyl-D-glutamate peptidase
definition: >-
  This protein family includes L-alanyl-D-glutamate peptidase from Escherichia phage T5 (Lys), an endolysin that degrades host peptidoglycans and participates with the holin in the sequential events which lead to the programmed host cell lysis releasing the mature viral particles.
