identifier: Pfam:PF27993
label: MERS-CoV-like Non-structural protein ORF5
definition: >-
  This entry represents the non-structural protein ORF5 from Middle East respiratory syndrome-related coronavirus (MERS-CoV) and similar proteins from betacoronaviruses in the merbecovirus subgenera (C lineage). ORF5 is also called non-structural protein 3d (NS3d) or accessory protein 3d in some bat merbecoviruses. MERS-CoV is a highly pathogenic respiratory virus with pathogenic mechanisms that may be driven by innate immune pathways. MERS-CoV ORF5 acts as an interferon antagonist and may play a role in circumventing the innate immunity of host cells. ORF5/NS3d from merbecovirus (betacoronavirus, lineage C) may not be related to ORF5 proteins from other lineages.
