identifier: Pfam:PF09731
label: Mitochondrial inner membrane protein
definition: >-
  MICOS complex subunit MIC60 (also known as Mitofilin) is a component of the MICOS complex which controls mitochondrial cristae morphology, maintenance of junctions, inner membrane architecture, and formation of contact sites to the outer membrane. Mitofilin is enriched in the narrow space between the inner boundary and the outer membranes, where it forms a homotypic interaction and assembles into a large multimeric protein complex. The first 78 amino acids contain a typical amino-terminal-cleavable mitochondrial presequence (residues 1-43) rich in positive-charged and hydroxylated residues and a membrane anchor domain (residues 47-66). In addition, it has three centrally located coiled coil domains (residues 200-240, 280-310 and 400-420).
