identifier: Pfam:PF26552
label: Family of unknown function (DUF8181)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in the archaeal phylum Thermoproteota. The proteins are predominantly found in Sulfolobales. The domain is approximately 110 amino acids in length. The reviewed protein SSO0428 from Saccharolobus solfataricus is a representative member of this family. Proteins in this family are predicted to form a single long α helix. Structure prediction suggests that this protein does not form a homomeric coiled-coil complex. Based on genomic context this protein may be an accessory subunit of the V-type ATP synthase complex.
