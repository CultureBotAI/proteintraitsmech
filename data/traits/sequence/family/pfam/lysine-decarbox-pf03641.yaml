identifier: Pfam:PF03641
label: Possible lysine decarboxylase
definition: >-
  The members of this family share a highly conserved motif PGGXGTXXE that is probably functionally important. This family includes cytokinin riboside 5'-monophosphate phosphoribohydrolase LOG and pyrimidine/purine nucleotide 5'-monophosphate nucleosidase ygdH. LOG converts inactive cytokinin nucleotides to the biologically active free-base forms. YgdH may catalyse the hydrolysis of the N-glycosidic bond of diverse pyrimidine and purine nucleotide 5'-monophosphates, to form ribose 5-phosphate and the corresponding free base.
