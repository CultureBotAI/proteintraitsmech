identifier: Pfam:PF10183
label: 'ESSS subunit of NADH:ubiquinone oxidoreductase (complex I) '
definition: >-
  Mitochondrial complex I, which is located in the inner mitochondrial membrane, is the largest multimeric respiratory enzyme in the mitochondria, consisting of more than 45 subunits, one FMN co-factor and eight FeS clusters. The assembly of mitochondrial complex I is an intricate process that requires the cooperation of the nuclear and mitochondrial genomes. This entry represents the ESSS subunit from mitochondrial NADH:ubiquinone oxidoreductase (complex I). It carries mitochondrial import sequences.
