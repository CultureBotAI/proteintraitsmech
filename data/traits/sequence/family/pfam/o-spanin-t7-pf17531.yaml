identifier: Pfam:PF17531
label: Spanin, outer lipoprotein subunit T7-like virus
definition: >-
  The lysis of Gram-negative hosts by double-strand DNA bacteriophages requires, in addition to the actions of a holin and endolysin, a third step involving the spanin complex. This complex consists of a small outer membrane lipoprotein and an integral cytoplasmic membrane protein, designated as o-spanins and i-spanins, respectively. The spanin complex is involved in the disruption of the outer membrane. Without the spanin function, lysis is blocked and progeny virions are trapped in dead spherical cells. This entry represents the o-spanin subunit from T7likevirus.
