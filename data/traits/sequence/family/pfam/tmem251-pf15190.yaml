identifier: Pfam:PF15190
label: Transmembrane protein 251
definition: >-
  This family of proteins includes lysosomal enzyme trafficking factor (formerly known as UPF0694 transmembrane protein C14orf109, or transmembrane protein 251) are required for mannose-6-phosphate-dependent trafficking of lysosomal enzymes. LYSET bridges GlcNAc-1-phosphate transferase (GNPTAB), to the membrane-bound transcription factor site-1 protease (MBTPS1), thus allowing proteolytic activation of the GNPTAB. GNPTAB is involved in the regulation of M6P-dependent Golgi-to-lysosome trafficking of lysosomal enzymes. Members of this entry are essential factors for maturation and delivery of lysosomal hydrolases.
