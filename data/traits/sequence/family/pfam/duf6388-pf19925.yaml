definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001859) is described by MIBiG as an example of the following biosynthetic class, other (unspecified), in particular fosfomycin biosynthetic gene cluster from Pseudomonas syringae. This family is predominantly found in Proteobacteria. Some members are putative DNA repair proteins.
