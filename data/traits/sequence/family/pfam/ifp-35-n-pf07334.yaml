identifier: Pfam:PF07334
label: Interferon-induced 35 kDa protein (IFP 35) N-terminus
definition: >-
  This entry represents the N terminus of interferon-induced 35kDa protein (IFP 35) (approximately 80 residues long), which contains a leucine zipper motif in an α helical configuration. This group of proteins also includes N-myc-interactor (Nmi), a homologous interferon-induced protein.
