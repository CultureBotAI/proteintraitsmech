label: Family of unknown function (DUF6412)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001514) is described by MIBiG as an example of the other (unspecified) biosynthetic class, in particular the aristeromycin biosynthetic gene cluster from Streptomyces citricolor. This family appears to be predominantly found in Actinobacteria.
