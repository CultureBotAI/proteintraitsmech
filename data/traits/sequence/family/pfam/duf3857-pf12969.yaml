identifier: Pfam:PF12969
label: Domain of Unknown Function with PDB structure (DUF3857)
definition: >-
  This domain is based on the first domain of the PDB structure 3KD4 (residues 1-228). It is structurally similar to domains in other hydrolases, eg. M1 family aminopeptidase, despite lack of any significant sequence similarity. The domain is N-terminal to a transglutaminase domain, which is found in many proteins known to have transglutaminase activity. The function of this domain is unknown.
