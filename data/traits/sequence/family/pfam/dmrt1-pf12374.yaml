identifier: Pfam:PF12374
label: Double-sex mab3 related transcription factor 1
definition: >-
  This family is found in eukaryotes, and is typically between 61 and 73 amino acids in length. They are suggested to be transcription factor proteins. In Xenopus laevis, doublesex- and mab-3-related transcription factor 1a (dmrt1-a) is a transcription factor that plays a key role in male sex determination and differentiation by controlling testis development and germ cell proliferation. It acts both as a transcription repressor and activator. However, the other family member in Xenopus laevis, doublesex- and mab-3-related transcription factor DM-W (dm-w), is a transcription factor that plays a key role in female sex determination and primary ovary development. It acts as a sex-determining protein by antagonizing the transcriptional activity of male-determination protein dmrt1-a, acting as a dominant-negative type protein.
