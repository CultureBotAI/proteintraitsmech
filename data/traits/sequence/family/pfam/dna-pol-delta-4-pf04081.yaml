identifier: Pfam:PF04081
label: 'DNA polymerase delta, subunit 4 '
definition: >-
  DNA polymerase delta (Pol delta) is responsible for effective DNA replication, playing a key role in the elongation of both the leading and the lagging strands of DNA and the maturation of Okazaki fragments. It consists of four subunits: the catalytic and largest subunit p125, p50 that interacts with p125 to form the core enzyme, p68 which interacts with p50, and a fourth subunit, p12, that bridges p125 and p50, stabilising its interaction. This entry represents the p12 subunit (also called subunit 4), which increases the rate of DNA synthesis and decreases fidelity by regulating POLD1 polymerase and proofreading 3' to 5' exonuclease activity in the Pol delta4 tetramer complex. p12 is PCNA-binding protein, as it contains a N-terminal PCNA-binding motif. Under conditions of DNA replication stress, it is required for the repair of broken replication forks through break-induced replication (BIR), a mechanism that may induce segmental genomic duplications of up to 200 kb. This subunit is involved in Pol-delta4 translesion synthesis (TLS) of templates carrying O6-methylguanine or abasic sites. p12 plays a major role in Pol delta4 catalytic functions while its degradation is required for the conversion of Pol delta4 to Pol delta3 in the cellular response to DNA damage, as Pol delta3 has an enhanced proofreading activity.
