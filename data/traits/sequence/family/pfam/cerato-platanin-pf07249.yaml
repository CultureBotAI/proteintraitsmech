identifier: Pfam:PF07249
label: Cerato-platanin
definition: >-
  This entry represents a group of fungal proteins involved in plant pathogenesis and elicitation of plant defense responses including Cerato-platanin (CP) and Eliciting plant response-like (ELP) proteins. This entry also includes Heat-stable 19 kDa antigen and related fungal proteins. CP from the Ascomycete Ceratocystis fimbriata f. sp. platani causes the severe plant disease canker stain. This protein occurs in the cell wall of the fungus and is involved in the host-pathogen interaction and induces both cell necrosis and phytoalexin synthesis, which is one of the first plant defence-related events. CP, like other fungal surface proteins, is able to self-assemble in vitro. CP is a 120 amino acid protein, containing 40% hydrophobic residues and two S-S bridges. It contains four cysteine residues that form two disulphide bonds. The N-terminal region of CP is very similar to cerato-ulmin, a phytotoxic protein produced by the Ophiostoma species belonging to the hydrophobin family, which also self-assembles. ELP is a secreted elicitor that activates plant defence mechanisms in the frame of the mutualistic endophytic relationships with several plant species. It induces systemic protection against the foliar pathogen Colletotrichum graminicola in the monocot maize (Zea mays). It also induces both systemic acquired resistance (SAR)- and induced systemic resistance (ISR)-related genes in tomato (Solanum lycopersicum), including alpha-dioxygenase DOX1.
