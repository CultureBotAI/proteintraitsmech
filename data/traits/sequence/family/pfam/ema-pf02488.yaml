identifier: Pfam:PF02488
label: Merozoite Antigen
definition: >-
  This family represents the immunodominant surface antigen of Theileria parasites including equi merozoite antigen-1 (EMA-1) and equi merozoite antigen-2 (EMA-2). The protein shows variation at a putative glycosylation site, a potential mechanism for host immune response evasion.
