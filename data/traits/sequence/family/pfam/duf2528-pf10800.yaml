identifier: Pfam:PF10800
label: 'Protein of unknown function (DUF2528) '
definition: >-
  This family includes Ea10 from Bacteriophage lambda, which is believed to be involved in the production of the Tro phenotype. This phenotype is expressed when phages that possess a mutant cro gene and a thermolabile cI repressor gene are unable to propagate at restrictive temperatures. This inability is correlated with the shutoff of host macromolecular synthesis.
