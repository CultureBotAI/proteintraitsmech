identifier: Pfam:PF01536
label: Adenosylmethionine decarboxylase
definition: >-
  This entry includes S-adenosylmethionine decarboxylase (AdoMetDC) and its homologues. It also includes the inactive AdoMetDC prozyme that is essential to activate AdoMetDC but probably has no catalytic activity due to the loss of several residues required for processing and catalysis. S-adenosylmethionine decarboxylase (AdoMetDC) catalyses the removal of the carboxylate group of S-adenosylmethionine to form S-adenosyl-5'-3-methylpropylamine which then acts as the n-propylamine group donor in the synthesis of the polyamines spermidine and spermine from putrescine. The catalytic mechanism of AdoMetDC involves a covalently-bound pyruvoyl group. This group is post-translationally generated by a self-catalyzed intramolecular proteolytic cleavage reaction between a glutamate and a serine. This cleavage generates two chains, beta (N-terminal) and alpha (C-terminal). The N-terminal serine residue of the alpha chain is then converted by non hydrolytic serinolysis into a pyruvoyl group.
