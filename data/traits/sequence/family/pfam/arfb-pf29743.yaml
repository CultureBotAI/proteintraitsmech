identifier: Pfam:PF29743
label: ArfB membrane protein family
definition: >-
  This entry represents the ArfB membrane protein family, mainly found in Mycobacterium species. The representative member ArfB from Mycobacterium tuberculosis strain CDC 1551 is a 50 amino acid single- pass membrane protein. ArfB is required for wild-type expression of ArfA and ammonia secretion, but is not part of an ammonia transporter. This protein is localised to the cell membrane.
