identifier: Pfam:PF15624
label: Kinetochore CENP-C fungal homologue, Mif2, N-terminal
definition: >-
  Budding yeast Mif2 and fission yeast Cnp3 are homologous to human centromere constitutive-associated network (CCAN) subunit CENP-C. This entry represents the N-terminal of Mif2. Mif2 is required for mitotic spindle integrity during anaphase spindle elongation.
