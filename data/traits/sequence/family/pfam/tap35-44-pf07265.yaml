identifier: Pfam:PF07265
label: Tapetum specific protein TAP35/TAP44
definition: >-
  This family consists of several plant tapetum specific proteins. Members of this family are found in Arabidopsis thaliana, Brassica napus and Sinapis alba. Members of this family may be involved in sporopollenin formation and/or deposition.
