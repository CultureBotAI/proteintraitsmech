identifier: Pfam:PF29383
label: Putative phage 3' DNA-binding domain
definition: >-
  This entry represents a family of small proteins of approximately 96 amino acids found exclusively in tailed bacteriophages. The family is restricted to the class Caudoviricetes, particularly members of the family Demerecviridae. Within this family, the proteins are predominantly found in the genera Tequintavirus and Epseptimavirus. This family is related to the 3' DNA-binding domain ( ). The function of these proteins remains to be determined.
