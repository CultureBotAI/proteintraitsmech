identifier: Pfam:PF28695
label: Fungal protein FGSG_10745
definition: >-
  This entry represents a family of uncharacterised proteins found in filamentous fungi. The family is present in Ascomycota, including species from Hypocreales (such as Fusarium and Nectriaceae) and Eurotiales (such as Aspergillus). Members range from approximately 350-370 residues in length. The proteins contain predicted coiled-coil regions in their C-terminal portions. The function of this family remains to be determined.
