identifier: Pfam:PF15854
label: G-protein coupled receptor ligand 15
definition: >-
  Protein GPR15L is a chemotactic factor and an agonistic ligand for GPR15, a G protein-coupled receptor (GPCR) that is found in lymphocytes. GPR15L is found on colon and skin, especially cervix, epithelia and squamous mucosa of the oral cavity and esophagus. GPR15L attracts GPR15-expressing T cells including lymphocytes. GPR15L is also a SUSD2 binding factor, and the interaction inhibits colon cancer cell growth and induce G1 cell cycle arrest by down-regulating cyclin D and cyclin-dependent kinase 6. Additionally, through activation of Mas-related G protein-coupled receptors (MRGPRs) contributes to pruritogenesis by activating itch-selective sensory neurons and mast cells degranulation.
