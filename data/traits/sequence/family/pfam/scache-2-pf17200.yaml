identifier: Pfam:PF17200
label: Single Cache domain 2
definition: >-
  Cache is an extracellular domain that is predicted to have a role in small-molecule recognition in a wide range of proteins, including the animal dihydropyridine-sensitive voltage-gated Ca2 channel alpha-2delta subunit, and various bacterial chemotaxis receptors. The name Cache comes from CAlcium channels and CHEmotaxis receptors. This entry represents the single Cache domain 2 (sCache_2), which contains the long N-terminal helix domain.
