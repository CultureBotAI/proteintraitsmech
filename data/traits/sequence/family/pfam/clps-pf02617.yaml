identifier: Pfam:PF02617
label: ATP-dependent Clp protease adaptor protein ClpS
definition: >-
  In the bacterial cytosol, ATP-dependent protein degradation is performed by several different chaperone-protease pairs, including ClpAP. ClpS directly influences the ClpAP machine by binding to the N-terminal domain of the chaperone ClpA. The degradation of ClpAP substrates, both SsrA-tagged proteins and ClpA itself, is specifically inhibited by ClpS. ClpS modifies ClpA substrate specificity, potentially redirecting degradation by ClpAP toward aggregated proteins. ClpS is a small α/β protein with a globular shape, showing a curved layer of three antiparallel α-helices connected to a twisted β-sheet that consists of three antiparallel β-strands. Dimerisation of ClpS may occur through its N-terminal domain. This short extended N-terminal region in ClpS is followed by the central seven-residue β-strand, which is flanked by two other β-strands in a small β-sheet.
