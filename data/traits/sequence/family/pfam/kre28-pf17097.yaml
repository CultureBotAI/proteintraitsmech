identifier: Pfam:PF17097
label: Spindle pole body component Kre28
definition: >-
  S.cerevisiae Kre28 is a subunit of a kinetochore-microtubule binding complex that bridges centromeric heterochromatin and kinetochore MAPs and motors. It may be regulated by sumoylation. Kre28 forms a heterotrimeric complex with Spc105 and this complex is the third linker complex that, along with the Ndc80 and MIND linker complexes, is responsible for bridging between centromeric heterochromatin and kinetochore MAPs and motors. Kre28-Spc105 interaction is important for Spc105 protein turn-over and essential for their mutual recruitment at the kinetochores.
