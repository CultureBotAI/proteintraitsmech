identifier: Pfam:PF16978
label: SAPK-interacting protein 1 (Sin1), middle CRIM domain
definition: >-
  CRIM is a domain in the middle of Sin1 protein that is important in the substrate recognition of TORC2. It is conserved from yeast to humans. TOR is a serine/threonine-specific protein kinase and forms functionally distinct protein complexes referred to as TORC1 and TORC2.
