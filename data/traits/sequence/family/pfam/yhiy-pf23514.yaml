label: YhiY
definition: >-
  This protein family includes Protein YhiY from Escherichia coli, a 37-residues micropeptide encoded by a small open reading frame (smORF). Proteins 50 or fewer residues-long have been shown to regulate the functions of larger proteins in a variety of organisms.
