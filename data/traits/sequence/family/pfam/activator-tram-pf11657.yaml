identifier: Pfam:PF11657
label: Transcriptional activator TraM
definition: >-
  Bacteria can regulate their gene expression in response to their population density in a process called quorum sensing. In some Proteobacteria, quorum sensing can be regulated by the TraR transcription factor that activates genes controlling Ti plasmid replication and conjugal transfer. TraM inhibits TraR activity through binding to TraR and forming a large, stable antiactivation TraM-TraR complex. TraM has been shown to form a homodimer in which the monomer primarily consists of two long coiled a -helices, and one of the helices from each monomer also bundles to form the dimeric interface.
