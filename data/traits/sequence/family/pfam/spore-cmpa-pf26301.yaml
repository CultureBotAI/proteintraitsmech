identifier: Pfam:PF26301
label: Cortex morphogenetic protein A family
definition: >-
  This entry represents CmpA (cortex morphogenetic protein A) found firmicutes, a small protein (37 amino acids) involved in endospore formation. CmpA participates in a quality-control pathway that selectively removes defective sporulating cells through regulated cell death. It acts as an adaptor that delivers SpoIVA to the ClpXP proteolytic machinery for degradation, specifically in cells that improperly assemble the spore envelope. This protein ensures proper spore envelope assembly.
