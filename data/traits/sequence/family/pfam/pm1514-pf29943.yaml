identifier: Pfam:PF29943
label: Outer membrane lipoprotein PM1514
definition: >-
  This entry represents a domain of outer membrane lipoprotein PM1514 from Pasteurella multocida and related bacteria in the Pasteurellaceae family. The protein is localised to the cell outer membrane and cell surface. When expressed in E.coli, the protein requires Slam for correct expression on the cell surface. The specific function of this domain remains to be determined.
