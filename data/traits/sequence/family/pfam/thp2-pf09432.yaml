identifier: Pfam:PF09432
label: Tho complex subunit THP2
definition: >-
  Thp2 is part of the THO complex (Thp2, Hpr1, Tho2 and Mft1). The THO complex is the central component of the TREX complex, which is a key player in the transport of mRNA from the nucleus to the cytoplasm. The THO complex plays a role in transcription elongation.
