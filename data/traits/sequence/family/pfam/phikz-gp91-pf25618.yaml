identifier: Pfam:PF25618
label: Bacteriophage PhiKZ vertex-binding protein gp91
definition: >-
  This entry represents the vertex-binding protein Gp91 from jumbo bacteriophage PhiKZ that infects Pseudomonas aeruginosa. This α-helical protein is a component of the vertex-binding complex attached to the inner surface of the viral capsid. Gp91 extends towards the capsid vertex and, unlike other members of the vertex-binding complex that primarily interact with hexameric capsomer 1, this protein mainly interacts with the pentameric capsomer via hydrophobic interactions and several salt bridges. It forms an important bridge between the vertex-binding complex and the pentameric capsomer. Gp91 also interacts with Gp119, which in turn interacts with hexameric capsomer 1, thereby connecting the pentameric capsomer and hexameric capsomer 1. Neighbouring vertex-binding complexes are connected via interactions between gp28 from one complex and gp91 from an adjacent complex. This protein plays a critical role in stabilising the capsid vertex by directly binding to the pentameric capsomer. Similar proteins are found in other jumbo phages, suggesting a conserved mechanism for capsid assembly and stabilisation in large viruses.
