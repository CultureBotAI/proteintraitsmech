identifier: Pfam:PF03977
label: Na+-transporting oxaloacetate decarboxylase beta subunit
definition: >-
  Members of this family are integral membrane proteins and includes oxaloacetate decarboxylase beta chain and methylmalonyl-CoA decarboxylase subunit beta. The decarboxylation reactions they catalyse are coupled to the vectorial transport of Na across the cytoplasmic membrane, thereby creating a sodium ion motive force that is used for ATP synthesis. The oxaloacetate decarboxylase sodium pump (OAD) is composed of an alpha subunit which catalyses the carboxyl-transfer from oxaloacetate to biotin, a beta subunit (represented in this entry) which catalyses the subsequent carboxyl-biotin decarboxylation and the coupled sodium transport and a gamma subunit subunit which stabilizes the OAD complex by interacting with alpha and beta subunits.
