identifier: Pfam:PF04662
label: Luteovirus P0 protein
definition: >-
  P0 is a suppressor of RNA-mediated gene silencing, also known as post-transcriptional gene silencing (PTGS), a mechanism of plant viral defense that limits the accumulation of viral RNAs. It targets ARGONAUTE proteins for degradation. It may prevent RNA-induced silencing complex (RISC) assembly by interacting with one of its protein components, thus inhibiting formation of siRNA/miRNA-RISC, and ultimately leading to ARGONAUTE 1 (AGO1) degradation.
