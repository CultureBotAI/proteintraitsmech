identifier: Pfam:PF16957
label: Malonate decarboxylase, alpha subunit, transporter
definition: >-
  MadA is an alpha subunit of the biotin-dependent and biotin-independent malonate decarboxylase multienzyme complex (( ) and ( )). It acts as an acyl-carrier protein (ACP) transferase component. This first step in malonate decarboxylation involves the exchange of an acetyl thioester residue bound to the activated ACP subunit for a malonyl thioester residue. It has a weak activity with acetyl-CoA as substrate.
