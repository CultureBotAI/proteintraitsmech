identifier: Pfam:PF14886
label: FAM183A and FAM183B related
definition: >-
  This family includes Cilia- and flagella-associated protein 144 (CFAP144, also known as FAM183A) from human and its homologues. This is a microtubule inner protein (MIP) part of the dynein-decorated doublet microtubules (DMTs) in cilia axoneme, which is required for motile cilia beating. this entry also includes CFAP144P1 (known as FAM183B) that could be a product of a pseudogene.
