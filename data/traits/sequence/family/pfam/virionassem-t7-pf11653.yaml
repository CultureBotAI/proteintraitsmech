identifier: Pfam:PF11653
label: Bacteriophage T7 virion assembly protein
definition: >-
  This family of proteins represents the gene product 7.3 from T7 bacteriophage and T7-like phages. The protein is localised to the tail and is thought to be important in virion assembly. Particles assembled in the absence of the protein fail to adsorb to cells.
