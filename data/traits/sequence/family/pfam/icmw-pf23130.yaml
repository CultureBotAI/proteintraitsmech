identifier: Pfam:PF23130
label: 'IcmW   '
definition: >-
  This entry represent the type 4 adapter protein IcmW from Legionella pneumophila and related proteins found mainly in Gammaproteobacteria. IcmW is a component of Type 4B secretion (T4BS) system that translocates over 300 effectors into the host cell during infection. This protein is part of a subcomplex which recruits effector proteins and delivers them to the core transmembrane subcomplex. In the membrane-embedded T4 coupling complex (T4CC), the DotLMNYZ components form a hetero-pentameric core of the T4CC complex from which the flexible IcmSW module protrudes. These hetero-pentameric complexes assemble and form an inner membrane channel for effectors to pass through. The IcmS/IcmW complex plays an important role in protein translocation by interacting with multiple Dot/Icm effector proteins to facilitate their translocation into host cells. The binding of the IcmSW complex to effectors enhances the effector protein delivery by mediating a conformational change that facilitates T4SS recognition of a translocation domain located in the carboxyl region of the effector protein.
