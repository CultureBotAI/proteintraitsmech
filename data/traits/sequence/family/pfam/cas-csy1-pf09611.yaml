identifier: Pfam:PF09611
label: CRISPR-associated protein (Cas_Csy1)
definition: >-
  This entry represents type I-F CRISPR-associated protein Csy1 (CRISPR/Cas Subtype Ypest protein 1, also known as Cas8f), typified by YPO2465 of Yersinia pestis, is a CRISPR-associated (Cas) entry strictly associated with the Ypest subtype of CRISPR/Cas locus. Csy1 is part of the type I-F CRISPR system yersinia (Csy) surveillance complex in which the binding of target dsDNA leads to large quaternary and tertiary structural changes in the complex that are likely necessary in the pathway leading to target dsDNA degradation by a trans-acting helicase-nuclease. The Csy complex folds into an asymmetric spiral; in the tail region, one Csy1/Cas8f and one Csy2/Cas5f form a stable heterodimer in which the 5' handle of the crRNA is anchored. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
