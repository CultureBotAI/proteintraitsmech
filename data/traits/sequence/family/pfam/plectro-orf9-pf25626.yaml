identifier: Pfam:PF25626
label: Plectrovirus ORF9 capsid protein family
definition: >-
  This protein family includes ORF9 capsid protein from Plectrovirus, and similar prophages from Spiroplasma. These proteins, which are involved in the formation of viral capsids, may self-assemble to form a helical capsid structure, which encapsulates the viral genomic DNA. The process of virion assembly and budding occurs at the host's inner membrane, indicating a role in the viral life cycle and propagation within the host.
