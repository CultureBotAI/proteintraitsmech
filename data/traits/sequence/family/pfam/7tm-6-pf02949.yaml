identifier: Pfam:PF02949
label: 7tm Odorant receptor
definition: >-
  This entry represents Odorant receptors and Odorant receptor coreceptors that are found mainly insects. The odorant receptor repertoire encodes a large collection of odour stimuli that vary widely in identity, intensity, and duration. The atypical heteromeric and topological design of the odorant receptors appears to be an insect-specific solution for odour recognition. Odor-evoked odorant receptor currents are independent of known G-protein-coupled second messenger pathways. Odorant coreceptors form complexes with conventional odorant receptors resulting in odorant-sensing units and providing sensitive and prolonged odorant signalling and calcium permeability. Odorant coreceptors are a universal and integral part of the functional odorant receptor, involved in the dendritic localisation of other olfactory receptors. All known members of this group are seven-transmembrane proteins that are candidate odorant receptors in Drosophila.
