identifier: Pfam:PF15718
label: Protein moonraker
definition: >-
  This entry represents protein moonraker (MNR) from animals. MNR is a centriolar satellite component involved in centriole duplication. It promotes centriole duplication by localizing WDR62 to the centrosome.
