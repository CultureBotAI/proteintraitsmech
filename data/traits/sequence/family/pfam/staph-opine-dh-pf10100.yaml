identifier: Pfam:PF10100
label: Staphylopine dehydrogenase
definition: >-
  A member of this family has been identified in Staphylococcus aureus as a dehydrogenase involved in the synthesis of a new opine metallophore, named staphylopine. It is encoded as part of an operon that also includes an histidine racemase and an enzyme distantly related to nicotianamine synthase. Staphylopine is involved in metal acquisition, chelating nickel, cobalt, zinc, copper or iron, depending on the growing conditions. Metal acquisition is vital for bacteria growing in metal-scarce environments, such as inside a host in the case of pathogens. This family also includes similar synthases from Pseudomonas aeruginosa, and Yersinia pestis, which catalyse the final step in the biosynthesis of pseudopaline and yersinopine, respectively.
