identifier: Pfam:PF00741
label: Gas vesicle protein
definition: >-
  Gas vesicles (GVs) are small, hollow, gas filled protein structures found in several cyanobacterial and archaebacterial microorganisms. They allow the positioning of the bacteria at the favourable depth for growth. Gas vesicles are hollow cylindrical tubes, closed by a hollow, conical cap at each end. Both the conical end caps and central cylinder are made up of 4-5 nm wide ribs that run at right angles to the long axis of the structure. Gas vesicles seem to be constituted of two different protein components, GvpA and GvpC. GvpA, a small protein of about 70 amino acid residues, is the main constituent of gas vesicles and form the essential core of the structure, while GvpC binds the exterior of the GV and provides additional structural reinforcement. The sequence of GVPa is extremely well conserved. GvpJ and GvpM, two proteins encoded in the cluster of genes required for gas vesicle synthesis in the archaebacteria Halobacterium salinarum and Halobacterium mediterranei (Haloferax mediterranei), have been found to be evolutionary related to GVPa. The exact function of these two proteins is not known, although they could be important for determining the shape determination gas vesicles. The N-terminal domain of Aphanizomenon flos-aquae protein GvpA/J is also related to GvpA.
