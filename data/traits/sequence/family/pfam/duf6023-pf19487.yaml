label: Family of unknown function (DUF6023)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001077) is described by MIBiG as an example of the following biosynthetic classes, polyketide and terpene. This family includes a protein from the alkyl-O-dihydrogeranyl- methoxyhydroquinones biosynthetic gene cluster from Actinoplanes missouriensis 431 ( ) and appears to be predominantly found in Actinobacteria.
