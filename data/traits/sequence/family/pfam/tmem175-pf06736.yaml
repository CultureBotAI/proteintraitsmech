identifier: Pfam:PF06736
label: Endosomal/lysosomal potassium channel TMEM175
definition: >-
  In animals, TMEM175 is an organelle-specific proton channel that catalyses proton efflux from endosomes and lysosomes to maintain a steady-state pH. It may also act as a potassium channel at higher pH, regulating potassium conductance in endosomes and lysosomes, however, this activity in unclear in vivo. This entry also includes TMEM175 homologues from bacteria and archaea.
