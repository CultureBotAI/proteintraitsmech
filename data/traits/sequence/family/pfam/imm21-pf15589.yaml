identifier: Pfam:PF15589
label: Immunity protein 21
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and conserved WxG and YxxxC motif. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the NGO1392-family of HNH/Endonuclease VII fold nucleases.
