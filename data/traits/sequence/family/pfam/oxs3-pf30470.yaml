identifier: Pfam:PF30470
label: Oxidative stress 3
definition: >-
  This entry represents the oxidative stress 3 (OXS3) family of nuclear proteins found in plants. OXS3 localises to nuclear speckles in discrete parts of the chromatin and acts as a chromatin-associated factor that promotes tolerance to heavy metals including cadmium, arsenic and copper, as well as to oxidising chemicals such as diamide. OXS3 also functions as a negative regulator of flowering during drought stress by repressing the AP1 promoter in a SOC1-dependent manner. Related family members (O3L1-O3L6) share similar roles in stress tolerance. Some members contain a kinase-inducible domain (KID) that mediates interaction with histone deacetylase HDA19.
