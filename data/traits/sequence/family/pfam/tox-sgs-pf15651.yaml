identifier: Pfam:PF15651
label: Salivary glad secreted protein domain toxin
definition: >-
  This entry represents an α+β fold domain with four conserved cysteine residues and a conserved [DE}xx[ND] motif. This domain is mainly present at the C terminus of RHS repeats containing proteins in insects and crustaceans. Although no bacterial homologues have been identified, the domain architecture suggests an origin from bacterial polymorphic toxin systems.
