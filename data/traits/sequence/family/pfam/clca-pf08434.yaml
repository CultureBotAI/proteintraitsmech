identifier: Pfam:PF08434
label: Calcium-activated chloride channel N terminal
definition: >-
  The CLCA family of calcium-activated chloride channels has been identified in many epithelial and endothelial cell types as well as in smooth muscle cells and has four or five putative transmembrane regions. Additionally to their role as chloride channels some CLCA proteins function as adhesion molecules and may also have roles as tumour suppressors. This protein cleaves itself into an N-terminal portion and a C-terminal portion. The N terminus contains an HEXXHXXXGXXDE motif which is essential for proteolytic cleavage.
