identifier: Pfam:PF23946
label: Family of unknown function (DUF7280)
definition: >-
  This entry represents a group of uncharacterised bacteriophage proteins, predominantly from mycobacteriophages and Gordonia phages. Members are typically between 80-130 amino acids in length. It folds into a compact domain composed of a sheet of five β strands with an α helix packed on one side.
