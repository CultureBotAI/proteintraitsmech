identifier: Pfam:PF17066
label: RBPJ-interacting and tubulin associated protein
definition: >-
  RITA (RBPJ-interacting and tubulin-associated protein) is a highly conserved protein that binds to tubulin and shuttles between the cytoplasm and nucleus. It is responsible for export of RBP-J/CBF-1 from the nucleus, which modulates Notch-mediated transcription.
