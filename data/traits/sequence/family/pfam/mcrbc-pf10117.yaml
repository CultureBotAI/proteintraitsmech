identifier: Pfam:PF10117
label: McrBC 5-methylcytosine restriction system component
definition: >-
  Members of this family of prokaryotic endonucleases modify the specificity of McrB restriction by expanding the range of modified sequences that are restricted. It does not bind DNA. Type IV methyl-directed restriction enzyme EcoKMcrBC (McrC) adopts a dimeric configuration while free and form tetradecamers of 12 McrB and 2 McrC protomers when bound to this protein.
