identifier: Pfam:PF09482
label: Bacterial type III secretion apparatus protein (OrgA_MxiK)
definition: >-
  This protein is encoded by genes which are found in type III secretion operons, and has been shown to be essential for the invasion phenotype in Salmonella and a component of the secretion apparatus. The protein is known as OrgA in Salmonella due to its oxygen-dependent expression pattern in which low-oxygen levels up-regulate the gene. In Shigella it is called MxiK and has been shown to be essential for the proper assembly of the needle complex, which is the core component of type III secretion systems. The putative uncharacterised protein YgeO from E. coli is also included in this entry. YgeO' is reported in ecogene as being homologous to OrgA and MxiK.
