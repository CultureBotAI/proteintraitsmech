identifier: Pfam:PF07139
label: Spermatogenesis-associated serine-rich protein 2-like
definition: >-
  This family includes spermatogenesis-associated serine-rich protein 2 (SPATS2) and its paralogue, SPATS2-like protein (SPAT2L) from mammals. SPATS2 is involved in spermatogenesis and likely to be a cytoplasmic RNA-binding protein. SPATS2 is highly expressed in hepatocellular carcinoma (HCC) and may function as an oncogene. It constitutes a novel diagnostic prognostic marker in liver cancer and a potential therapeutic target for the treatment of HCC.
