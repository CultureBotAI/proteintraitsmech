identifier: Pfam:PF26807
label: Phage T7 gene product 0.4
definition: >-
  This entry represents gene product 0.4 (Gp0.4) from bacteriophage T7 and related phages. Gp0.4 is a 51-amino acid peptide that functions as a direct inhibitor of the bacterial cell division protein FtsZ. By binding to FtsZ and inhibiting its assembly both in vitro and in vivo, Gp0.4 prevents bacterial cell division, resulting in elongated host cells. This inhibition provides a competitive advantage to the phage by preventing escape of daughter cells from infection, thereby maximising utilisation of host cell resources for phage progeny production. The protein is expressed early in infection (approximately 2 minutes post-infection) as part of the phage's host takeover strategy. Mutations in FtsZ that confer resistance to Gp0.4 have been identified, including a glycine-valine duplication at position 18 of FtsZ. Structure prediction suggests the protein adopts an α-helical hairpin structure. Structure prediction with AlphaFold3 of this protein with E.coli FtsZ ( ) supports the direct interaction of these proteins (iPTM=0.84 pTM-0.78).
