identifier: Pfam:PF01691
label: Adenovirus E1B 19K protein / small t-antigen
definition: >-
  This family consists of adenovirus E1B 19kDa protein or small t-antigen. The E1B 19kDa protein inhibits E1A induced apoptosis and hence prolongs the viability of the host cell. It can also inhibit apoptosis mediated by tumour necrosis factor alpha and Fas antigen. E1B 19kDa blocks apoptosis by interacting with and inhibiting the p53-inducible and death-promoting Bax protein. The E1B region of adenovirus encodes two proteins E1B 19kDa the small t-antigen as found in this family and E1B 55kDa the large t-antigen which is not found in this family; both of these proteins inhibit E1A induced apoptosis.
