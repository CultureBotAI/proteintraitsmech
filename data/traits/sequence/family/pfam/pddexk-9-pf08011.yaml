identifier: Pfam:PF08011
label: PD-(D/E)XK nuclease superfamily
definition: >-
  This family contains many hypothetical bacterial proteins. It has been identified as a member of the PD-(D/E)XK nuclease superfamily through transitive meta profile searches. Proteins in this family have the predicted secondary structure pattern of the restriction endonuclease-like fold core and contains an additional β-strand at the C terminus.
