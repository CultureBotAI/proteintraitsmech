identifier: Pfam:PF29161
label: Uncharacterised mitochondrial protein YMF1
definition: >-
  This entry represents the YMF1 protein family found in plant mitochondria. YMF1 is an uncharacterised mitochondrial protein of 168 amino acids first identified in the liverwort Marchantia polymorpha. The protein is encoded by the mitochondrial genome and is conserved across various plant lineages including eudicotyledons, particularly within the asterids and rosids groups. The protein shows conservation in flowering plants from families such as Solanaceae and Asteraceae. The function of this mitochondrial protein remains to be determined.
