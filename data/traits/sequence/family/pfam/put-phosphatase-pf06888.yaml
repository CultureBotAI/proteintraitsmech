identifier: Pfam:PF06888
label: Putative Phosphatase
definition: >-
  This group represents phosphatases related to PHOSPHO1 and PHOSPHO2. It includes plant phosphatases with homology to the haloacid dehalogenase (HAD) superfamily. PHOSPHO1 is a phosphoethanolamine/phosphocholine phosphatase, while PHOSPHO2 has high activity toward pyridoxal 5'-phosphate (PLP), and it is active at much lower level toward pyrophosphate, phosphoethanolamine (PEA)and phosphocholine (PCho).
