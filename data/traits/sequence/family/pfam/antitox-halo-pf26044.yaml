identifier: Pfam:PF26044
label: Putative halobacterial antitoxin to Fic
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. Proteins in this family adopt a helical hairpin structure according to structure predictions. This family is found in operonic contexts adjacent to Fic/doc domains suggesting that this family represents a set of novel antitoxins that bind to Fic domain proteins. For example, in Halohasta litchfieldiae the proteins (this entry) and (Fic) interact according to AlphaFold3 ipTM=0.87 pTM=0.84. In this entry is found C-terminal to .
