identifier: Pfam:PF08395
label: 7tm Chemosensory receptor
definition: >-
  This family includes a number of insect chemosensory receptors encoded by gustatory receptor (GR) and odorant receptor (OR) genes across the insect tree of life. They are seven-transmembrane ligand-gated ion channels, showing high sequence divergence, consistent with an ancient origin for the family. This entry also includes some proteins from nematodes such as Egg laying defective protein egl-47 (Probable G-protein coupled receptor egl-47) from Caenorhabditis elegans.
