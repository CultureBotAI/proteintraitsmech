identifier: Pfam:PF16983
label: Molybdate transporter of MFS superfamily
definition: >-
  This is a family of molybdenate transporters, including MOT1 and MOT2 from Arabidopsis. Molybdenum is an essential element that is taken up into the cell in the oxyanion molybdate. Molybdenum is used in the form of molybdopterin-cofactor, which participates in the active site of enzymes involved in key reactions of carbon, nitrogen, and sulfur metabolism.
