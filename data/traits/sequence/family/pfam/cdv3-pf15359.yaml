identifier: Pfam:PF15359
label: Carnitine deficiency-associated protein 3
definition: >-
  Protein CDV3 (carnitine deficiency-associated protein 3) is up-regulated in ventricles of juvenile visceral steatosis mice. Another study showed that CDV3 is phosphorylated by Abl, a tyrosine kinase involved in normal B cell development.
