identifier: Pfam:PF17614
label: Viral CC-type chemokine
definition: >-
  Members of this family found in Fowlpox virus are CC chemokine-like proteins. Fpv060 contains the conserved pattern of four cysteine residues similar to the CC chemokine family. Fpv060 also contains more cysteines in the mature protein than cellular chemokines, and one predicted trans-membrane region. In vitro studies show N-terminal glycosylation and show that Fpv060 from Fowl pox virus is much larger and has many more cysteine residues than host chemokines and viral homologues.
