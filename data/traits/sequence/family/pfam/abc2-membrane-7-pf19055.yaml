identifier: Pfam:PF19055
label: ABC-2 type transporter
definition: >-
  This domain is found in several ATP binding cassette transporters family G (ABCG). ABC transporters belong to the ATP-Binding Cassette (ABC) superfamily which uses the hydrolysis of ATP to energise diverse biological import and export systems. ABC transporters are minimally constituted of two conserved regions: a highly conserved ATP binding cassette (ABC) and a less conserved transmembrane domain (TMD). These regions can be found on the same protein (mostly in eukaryotes and bacterial exporters) or on two different ones (mostly bacterial importers). The function of the integral inner-membrane protein is to translocate the substrate across the membrane and seems to play an important role in substrate recognition. ABC family G is a multidrug ATP-binding cassette transporter expressed in the plasma membranes of several tissues that is involved in endogenous substrates translocation, modifies drug pharmacokinetics and acts as a protector against xenobiotics.
