identifier: Pfam:PF00272
label: Cecropin family
definition: >-
  This entry represents antimicrobial peptides such as Cecropins, Sarcotoxins, Aedesins, Andropin and related protins from insects. The andropin gene is closely linked to the cecropin gene cluster of Drosophila melanogaster. Cecropins are potent antibacterial proteins that constitute a main part of the cell-free immunity of insects. Cecropins are small proteins of about 35 amino acid residues active against both Gram-positive and Gram-negative bacteria. They seem to exert a lytic action on bacterial membranes. Cecropins have been given various names, including bactericidin, lepidopteran and sarcotoxin. All of these peptides are structurally related.
