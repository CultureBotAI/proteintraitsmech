identifier: Pfam:PF17325
label: Stationary phase protein 4
definition: >-
  Saccharomyces cerevisiae respond and cope to starvation by ceasing growth and entering a non-proliferating state referred to as stationary phase. Expression of SPG4 has been shown to be higher in stressed cells, and stationary phase cells compared to active cells. It is not required for growth on non-fermentable carbon sources.
