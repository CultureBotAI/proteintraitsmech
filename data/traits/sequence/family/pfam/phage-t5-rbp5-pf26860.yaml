identifier: Pfam:PF26860
label: Phage T5 Receptor-binding protein pb5 family
definition: >-
  The Receptor-binding protein pb5 family is involved in the structural composition of the distal part of the bacteriophage T5 tail. It plays a crucial role in mediating the irreversible binding of the phage to its host's entry receptor, specifically the E. coli outer membrane ferrichrome transporter FhuA protein. Upon binding, the protein undergoes conformational changes that are essential for transmitting signals through the tail to the capsid, ultimately triggering the release of DNA into the host cell. Additionally, the protein functions as a monomer and interacts with the straight fibre protein pb4, as well as the host FhuA receptor, facilitating the entry of the viral genome into the host cell.
