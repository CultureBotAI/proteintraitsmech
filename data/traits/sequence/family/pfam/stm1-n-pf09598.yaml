identifier: Pfam:PF09598
label: Stm1
definition: >-
  This domain is found at the N-terminal region of the Stm1 and similar proteins. Stm1 is a G4 quadraplex and purine motif triplex nucleic acid-binding protein. It has been implicated in many biological processes including apoptosis and telomere biosynthesis. Stm1 is known to interact with Cdc13, and is known to associate with ribosomes and nuclear telomere cap complexes. This domain is also found at the N-terminal of some 'RGG repeats nuclear RNA binding proteins'.
