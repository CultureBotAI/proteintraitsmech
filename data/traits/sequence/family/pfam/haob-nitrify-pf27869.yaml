identifier: Pfam:PF27869
label: HaoA-associated protein HaoB
definition: >-
  Members of this family occur as the HaoB protein, encoded next to the homotrimeric HaoA, a hydroxylamine oxidoreductase protein with eight heme groups. The haoB gene is cotranscribed with haoA, but its function is unknown. It appears all species with this enzyme are nitrifying bacteria.
