identifier: Pfam:PF01255
label: Putative undecaprenyl diphosphate synthase
definition: >-
  In prokaryotes, undecaprenyl diphosphate synthase (UPP synthase, di-trans-poly-cis-decaprenylcistransferase or ditrans,polycis-undecaprenyl-diphosphate synthase ( )), catalyzes the formation of the carrier lipid undecaprenyl pyrophosphate (UPP) in bacterial cell wall peptidoglycan biosynthesis from isopentenyl pyrophosphate (IPP). Cis (Z)-Isoprenyl diphosphate synthase (cis-IPPS) catalyzes the successive 1'-4 condensation of the IPP molecule to trans,trans-farnesyl diphosphate (FPP) or to cis,trans-FPP to form long-chain polyprenyl diphosphates. A few can also catalyze the condensation of IPP to trans-geranyl diphosphate to form the short-chain cis,trans- FPP. cis-IPPS form homodimers and are mechanistically and structurally distinct from trans-IPPS, which lack the DDXXD motifs, yet require Mg 2+ for activity. Homologues are also found in archaebacteria and include a number of uncharacterised proteins including some from yeasts. This entry also matches related enzymes that transfer alkyl groups, such as dehydrodolichyl diphosphate synthase from eukaryotes, which catalyzes the formation of the polyisoprenoid glycosyl carrier lipid dolichyl monophosphate.
