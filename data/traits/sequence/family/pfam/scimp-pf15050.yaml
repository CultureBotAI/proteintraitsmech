identifier: Pfam:PF15050
label: SCIMP protein
definition: >-
  SLP adapter and CSK-interacting membrane protein (SCIMP) is a lipid tetraspanin-associated transmembrane adapter/mediator involved in major histocompatibility complex class II (MHC-II) signaling transduction. SCIMP is expressed in B cells and other professional antigen-presenting cells (APCs) and is localised in the immunological synapse. Upon MHC-II stimulation, phosphorylated SCIMP binds to the SLP65 and to the inhibitory kinase Csk. SLP65 binding initiates the downstream signaling cascades, while Csk binding functions as a negative regulatory loop.
