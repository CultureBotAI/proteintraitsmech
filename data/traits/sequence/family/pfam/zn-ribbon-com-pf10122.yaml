identifier: Pfam:PF10122
label: Mu-like prophage protein Com
definition: >-
  Com is a bacteriophage protein that acts as a translational regulator of the DNA modification protein Mom. Binding of Com to the translation intitation region of the mom gene causes a conformational change that is thought to enhancing ribosome binding.
