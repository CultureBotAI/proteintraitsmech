identifier: Pfam:PF03649
label: Uncharacterised protein family (UPF0014)
definition: >-
  Characterised proteins in this family include probable iron export permease protein FetB, which is part of the ABC transporter complex FetAB, probably involved in iron export, and aluminum sensitive 3 protein, also part of an ABC transporter required for aluminum (Al) resistance. This family also includes integral membrane proteins currently uncharacterised.
