identifier: Pfam:PF15358
label: Testis-specific serine kinase substrate
definition: >-
  Testis-specific serine kinase substrate (TSKS) is expressed in the testis and is downregulated in cancerous testicular tissue, in comparison with adjacent normal tissue. TSKS expression is very low to undetectable in seminoma, teratocarcinoma, embryonal, and Leydig cell tumours, while high in testicular tissue adjacent to tumours which contain pre-malignant carcinoma in situ. Recently it has been shown in human testis to be localised to the equatorial segment of ejaculated human sperm. The finding of a TSKS family member in mature sperm suggests that this family of kinases might play a role in sperm function. TSKS is localised during spermiogenesis to the centrioles of post-meiotic spermatids, where it reaches its greatest concentration during the period of flagellogenesis.
