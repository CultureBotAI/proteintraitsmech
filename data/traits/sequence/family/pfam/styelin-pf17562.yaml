identifier: Pfam:PF17562
label: Styelin
definition: >-
  This is a family of antimicrobial peptides found in Stela clava (Sea squirt). Family members are α-helical phenylalanine-rich antimicrobial peptides effective against a panel of Gram-negative and Gram-positive bacteria. Styelin contains unusual amino acids such as dihydroxyarginine, dihydroxylysine, 6-bromotryptophan, and 3,4-dihydroxyphenylalanine, which are important for the CC antimicrobial activity at high salt concentrations.
