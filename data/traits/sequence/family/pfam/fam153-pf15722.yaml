identifier: Pfam:PF15722
label: FAM153 family
definition: >-
  Several distinct antigens (designated NY-REN-1 to NY-REN-65) that are reactive with autologous IgG have been identified in renal cancer patients. Of these, renal carcinoma antigen NY-REN-7 (also termed protein FAM153) belongs to a small conserved family of proteins whose function is, as yet, unknown.
