identifier: Pfam:PF11529
label: Melampsora lini avirulence protein AvrL567-A
definition: >-
  AvrL567 is a protein from the fungal pathogen Melampsora lini which induces plant disease resistance in flax plants. Avirulence proteins trigger the resistance response in plants by interacting with plant disease-resistance proteins. The protein has a novel β-barrel-like fold.
