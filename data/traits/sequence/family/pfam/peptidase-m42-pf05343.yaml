identifier: Pfam:PF05343
label: M42 glutamyl aminopeptidase
definition: >-
  These peptidases are found in Archaea and Bacteria. The example in Lactococcus lactis, PepA, aids growth on milk. Pyrococcus horikoshii contain a thermostable de-blocking aminopeptidase member of this family, which is used commercially for N-terminal protein sequencing.
