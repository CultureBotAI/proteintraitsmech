identifier: Pfam:PF01856
label: Helicobacter outer membrane protein
definition: >-
  Gram-negative bacterial outer membranes constitute a semi-permeable, size-dependent permeability barrier, for example to hydrolytic enzymes, detergents, dyes and hydrophobic anti-microbials. The outer membrane protein (OMP) profile of Helicobacter pylori differs from that of other Gram-negative bacteria, where the highly non-selective porins are absent and a number of less abundant protein species are observed. OMPs from H. pylori have been identified as porins, gastric epithelial cell adhesins and Lewis B binding adhesins. Extensive C-terminal sequence similarity between these OMPs has been used to define a much larger paralogous family. H. pylori is the causative agent of gastritis and peptic ulceration in humans. Numerous subtypes of OMPs have also been identified. Attempts have been made to construct recombinant vectors that are able to express these OMPs in order to develop a vaccine protecting against Hp infection and a diagnostic reagent kit to quickly detect infection. OMPs were chosen as possible targets of vaccine development as they are H. pylori specific, surface exposed and highly antigenic.
