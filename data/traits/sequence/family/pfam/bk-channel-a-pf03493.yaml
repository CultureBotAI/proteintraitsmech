identifier: Pfam:PF03493
label: Calcium-activated BK potassium channel alpha subunit
definition: >-
  This entry represents a conserved region found in calcium-activated potassium channels, known as BK channels (also referred to as high-conductance, maxi-K channels) or Slowpoke homologues (Slo1-3), including calcium-activated potassium channel slowpoke (Slo) from Drosophila and its homologues from vertebrates, namely calcium-activated potassium channel subunit alpha-1 (KCNMA1, also known as BK channel, MaxiK, mSlo1, KCa1.1 or K(VCA)alpha), KCNT1/2 (Slo2.2/Slo2.1) and KCNU1 (Slo3) from human. BK channels are widely expressed in the body, being found in glandular tissue, smooth and skeletal muscle, as well as in neural tissues. They have been demonstrated to regulate arteriolar and airway diameter, and also neurotransmitter release. Each channel complex is thought to be composed of 2 types of subunits; the pore-forming (alpha) subunits and smaller accessory (beta) subunits. The alpha subunit of the BK channel was initially thought to share the characteristic 6TM organisation of the voltage-gated K+ channels. However, the molecule is now thought to possess an additional TM domain, with an extracellular N terminus and intracellular C terminus. The C-terminal region contains 4 predominantly hydrophobic domains, which are also thought to lie intracellularly. The extracellular N terminus and the first TM region are required for modulation by the beta subunit. The precise location of the Ca2-binding site that modulates channel activation remains unknown, but it is thought to lie within the C-terminal hydrophobic domains. The sodium-activated potassium channels Slick (Slo2.1, KCNT2) and Slack (Slo2.2, KCNT1) belong to the structurally related high-conductance potassium channels of the Slo family. Slo3, also a member of the Slo family, is exclusively expressed in mammalian sperm…
