identifier: Pfam:PF05552
label: Mechanosensitive ion channel, conserved TM helix
definition: >-
  This entry represents a conserved transmembrane helix, often found in small conductance mechanosensitive channels (MscS) in association with, such as and MscS assembles to a homoheptameric complex; each monomer consists of a N-terminal transmembrane region and a large cytoplasmic segment composed of a five-stranded antiparallel β-sheet (middle/second) domain ( ) and a C-terminal α/β-domain ( ). The N-terminal region consists of three membrane spanning helices (TM1, TM2 and TM3), TM1 is represented in this entry. In the heptamer, the permeation pathway is formed by the packing of TM3s, flanked by TM1-TM2 helical hairpins.
