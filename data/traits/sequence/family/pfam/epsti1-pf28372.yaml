identifier: Pfam:PF28372
label: Epithelial-stromal interaction protein 1
definition: >-
  EPSTI1 is highly expressed in breast cancer upon interaction between tumor cells and stromal cells in vitro. It is expressed in blood mononuclear cells from patients with systemic lupus erythematosus (SLE). The full-length EPSTI1 protein plays a role in M1 macrophage polarisation and is required for proper regulation of gene expression during M1 versus M2 macrophage differentiation. EPSTI1 may be involved in RELA/p65 and STAT1 phosphorylation and nuclear localisation upon macrophage activation. The protein is highly expressed in immune tissues and is induced by lipopolysaccharides and interferon-gamma.
