identifier: Pfam:PF04597
label: Ribophorin I
definition: >-
  Ribophorin I is an essential subunit of oligosaccharyltransferase (OST), which is also known as dolichyl-diphosphooligosaccharide--protein glycosyltransferase, ( ). OST catalyses the transfer of an oligosaccharide from dolichol pyrophosphate to selected asparagine residues of nascent polypeptides as they are translocated into the lumen of the rough endoplasmic reticulum. In the past Ribophorin I and OST48 were thought to be responsible for OST catalytic activity, it is in reality the OST STTs subunits that are responsible for this activity. Both yeast and mammalian proteins are glycosylated but the sites are not conserved. Glycosylation may contribute towards general solubility but is unlikely to be involved in a specific biochemical function. Most family members are predicted to have a transmembrane helix at the C terminus of this region.
