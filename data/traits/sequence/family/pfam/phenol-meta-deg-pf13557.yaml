identifier: Pfam:PF13557
label: Putative MetA-pathway of phenol degradation
definition: >-
  This family includes the functional amyloid transporter FapF from Pseudomonas aeruginosa and similar bacterial proteins. FapF transports fibril components across the outer membrane. Many sequences in this family are classified by TCDB as belonging to the putative β-barrel porin/alpha amylase or MetA-pathway of phenol degradation superfamily, including from Pseudomonas putida ( ).
