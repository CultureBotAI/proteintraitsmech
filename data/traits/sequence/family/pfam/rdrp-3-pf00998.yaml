identifier: Pfam:PF00998
label: Viral RNA dependent RNA polymerase
definition: >-
  The RNA dependent RNA polymerase is also known as non-structural protein NS5B. NS5B is a 65kDa protein that resembles other viral RNA polymerases. Hepatitis C virus (HCV) replication is thought to occur in membrane bound replication complexes. These complexes transcribe the positive strand and the resulting minus strand is used as a template for the synthesis of genomic RNA. There are two viral proteins involved in the reaction, NS3 and NS5B.
