identifier: Pfam:PF00657
label: GDSL-like Lipase/Acylhydrolase
definition: >-
  GDSL esterases and lipases are hydrolytic enzymes with multifunctional properties. This new subclass of lipolytic enzymes possesses a distinct GDSL sequence motif different from the GxSxG motif found in many lipases. Members include; Aeromonas hydrophila lipase, Vibrio mimicus lecithinase, Vibrio parahaemolyticus thermolabile haemolysin, rabbit phospholipase (AdRab-B), and Arabidopsis thaliana anter-specific proline-rich protein. 3D structures of several enzymes of this family revealed several β-strands and α-helices arranged in alternating order and the substrate-binding pocket between the central β-strand and long α-helix appears to be highly flexible.
