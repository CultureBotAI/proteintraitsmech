identifier: Pfam:PF17412
label: Family of unknown function
definition: >-
  This entry represents the VraX proteins from Staphylococcus aureus. The vraX gene belongs to the vra operon together with the vraA gene encoding for a long chain fatty acid-CoA ligase, which is up-regulated in the VISA (vancomycin-intermediate S. aureus). The gene product, a 55-amino acids protein,is upregulated in the stress response to cell wall-active antibiotics and other surface-interactive molecules. VraX harbours a putative phosphorylation site, and could therefore be involved in regulatory processes within the cell. However, no exact function has been demonstrated.
