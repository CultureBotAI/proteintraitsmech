identifier: Pfam:PF28562
label: C14orf132
definition: >-
  This entry represents the C14orf132 family of uncharacterised proteins. These are small single-pass transmembrane proteins found in vertebrates. The proteins contain a predicted transmembrane helix in the C-terminal region. The human protein C14orf132 is localised to the membrane and shows tissue-enhanced expression in the brain. The function of this protein family remains to be determined.
