identifier: Pfam:PF12694
label: Circularly permutated YpsA SLOG family
definition: >-
  The structure of proteins in this family contain central β strands with flanking α helices. The structure is similar to that of a molybdenum cofactor carrier protein. This family belongs in the SLOG superfamily, circularly-permuted version of YspA famiy showing fusions to NAD utilization and ADP-ribosylation domains including NUDIX, NADAR and MACRO. Members of this family are predicted to function as sensors of nucleotide, nucleotide-derived ligands, or nucleic acids, which are potentially processed/modified by associating effectors.
