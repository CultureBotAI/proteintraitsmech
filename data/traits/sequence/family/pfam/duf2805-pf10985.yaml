identifier: Pfam:PF10985
label: Protein of unknown function (DUF2805)
definition: >-
  This entry represents an uncharacterised bacterial protein family. Members average about 90 amino acids in length with several well-conserved uncommon amino acids (Trp, Met). The majority of species are marine bacteria. Few species have more than one copy, but Vibrio cholerae O1 biovar eltor str. N16961 has three identical copies.
