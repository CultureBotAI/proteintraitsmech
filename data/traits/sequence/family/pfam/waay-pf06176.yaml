identifier: Pfam:PF06176
label: Lipopolysaccharide core biosynthesis protein (WaaY)
definition: >-
  This family consists of several bacterial lipopolysaccharide core biosynthesis proteins (WaaY or RfaY). The waaY, waaQ, and waaP genes are located in the central operon of the waa (formerly rfa) locus on the chromosome of Escherichia coli. This locus contains genes whose products are involved in the assembly of the core region of the lipopolysaccharide molecule. WaaY is the enzyme that phosphorylates HepII in this system. function. WaaY is also involved in the biosynthesis of the core oligosaccharide region of lipopolysaccharide (LPS).
