identifier: Pfam:PF11584
label: Proteinaceous host-selective toxin ToxA
definition: >-
  ToxA is produced by particular Pyrenophora tritici-repentis races and is a proteinaceous host-selective toxin. It is necessary and sufficient to cause cell death in sensitive wheat cultivars. ToxA adopts a single-domain, β-sandwich fold which has novel topology. The protein is directly involved in recognition events required for ToxA action, which involves several recognition events, is mediated by an important solvent-exposed Arg-Gly-Asp (RGD) containing loop. This structure is remarkably similar to the classic mammalian RGD-containing domain, the fibronectin type III (FnIII) domain. It is thought to be distantly related to mammalian FnIII proteins, gaining entry to the host via an integrin-like receptor in the plant host.
