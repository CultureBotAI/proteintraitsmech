identifier: Pfam:PF07311
label: Dodecin
definition: >-
  Dodecin flavoprotein is a small dodecameric flavin-binding protein from Halobacterium salinarium (Halobacterium halobium) that contains two flavins stacked in a single binding pocket between two tryptophan residues to form an aromatic tetrade. Dodecin binds riboflavin, although it appears to have a broad specificity for flavins. Dodecin protects the bound flavins against light-damage through a quick quenching the flavin excited state and the degradation of riboflavin to lumichrome. The subunit assembly and the probable biological unit is a dodecamer.
