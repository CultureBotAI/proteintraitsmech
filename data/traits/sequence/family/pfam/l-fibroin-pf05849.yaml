identifier: Pfam:PF05849
label: Fibroin light chain (L-fibroin)
definition: >-
  This family consists of several moth fibroin light chain (L-fibroin) proteins. Fibroin of Bombyx mori is secreted into the lumen of posterior silk gland (PSG) from the surrounding PSG cells as a molecular complex consisting of a heavy (H)-chain of approximately 350kDa, a light (L)-chain of 25kDa and a P25 of about 27kDa. The H- and L-chains are disulphide-linked but P25 is associated with the H-L complex by non-covalent force.
