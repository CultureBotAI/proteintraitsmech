identifier: Pfam:PF28963
label: Biogenesis of lysosome-related organelles complex 1 subunit 4
definition: >-
  This entry includes the biogenesis of lysosome-related organelles complex 1 subunit 4 (BLOC1S4) from Caenorhabditis elegans and similar animal proteins. BLOC-1 is a multiprotein complex involved in the trafficking and biogenesis of lysosome- related organelles. The complex is composed of at least seven subunits including BLOS-1, BLOS-2, BLOS-4, DSBN-1, GLO-2, MUTD-1 and SNPN-1. BLOC1S4 interacts with GLO-2 within the complex. In C.elegans, the BLOC-1 complex functions in trafficking to lysosome-related gut granules. Members of this entry typically contain a predicted coiled-coil region in the C-terminal portion of the protein. In BLOC1S4, this entry covers its full length, while in other members, it represents a domain.
