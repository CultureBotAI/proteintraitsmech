identifier: Pfam:PF26827
label: Phage Y16B protein
definition: >-
  This entry represents a small protein of unknown function found in bacteriophages. The prototype is protein Y16B from bacteriophage T4, a 43 amino acid protein located in the arn-motA intergenic region. The protein has a molecular weight of 5.2 kDa and remains uncharacterised. The function of this protein family is unknown.
