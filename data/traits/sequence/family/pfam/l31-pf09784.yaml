identifier: Pfam:PF09784
label: Mitochondrial ribosomal protein L31
definition: >-
  This group represents the large ribosomal subunit protein mL60 from fungi, previously known as Mrpl31. mL60 is a component of the mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. The mitoribosomes are attached to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane.
