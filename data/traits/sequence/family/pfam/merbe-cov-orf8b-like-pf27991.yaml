identifier: Pfam:PF27991
label: MERS-CoV ORF8b protein-like
definition: >-
  This entry includes the ORF8b accessory protein from Middle East respiratory syndrome-related coronavirus (MERS-CoV) and related merbecoviruses (C lineage). The gene encoding ORF8b is an internal ORF that is overlapped by the N (nucleocapsid) protein gene (ORF8a). ORF8b appear to have no homologous proteins in Sarbecovirus (lineage B), which includes Severe acute respiratory syndrome (SARS) coronavirus (SARS-CoV) and SARS-CoV-2 (2019 novel coronavirus, 2019-nCoV). MERS-CoV ORF8b is not essential for viral replication. It is related to protein I (also known as accessory protein N2) of bovine enteritic coronavirus-F15 strain (BECV-F15) and other related Embecoviruses; the gene encoding protein I is included in the N gene as an alternative ORF.
