identifier: Pfam:PF16062
label: ADP-ribosylhydrolase MavL-like
definition: >-
  This entry represents a class of MavL-like macrodomain enzymes whose representative members show unique selectivity for mono-ADP-ribosylated arginine residue in synthetic substrates, including ADP-ribosylarginine hydrolase CG2909 and ADP-ribosylarginine hydrolase CG3568 from Drosophila melanogaster, which are distantly related to MavL from Legionella pneumophila. They are (ADP-ribosyl)hydrolases that share a mode of ADP-ribose interaction distinct from previously characterised macrodomains.
