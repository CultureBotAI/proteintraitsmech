label: Membrane protein YtzI-like
definition: >-
  This entry represents YtzI from Bacillus subtilis and its homologues widely distributed in firmicutes. The pattern of sequence conservation suggests the presence of conserved hydrophobic stretch near N terminus. This region is predicted as a single transmembrane helix.
