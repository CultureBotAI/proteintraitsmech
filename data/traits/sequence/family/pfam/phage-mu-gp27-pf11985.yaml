identifier: Pfam:PF11985
label: Bacteriophage Mu, Gp27
definition: >-
  This entry is represented by Bacteriophage Mu, Gp27. It is probably the small subunit of terminase, which recognises viral DNA, binds to the packaging initiation site (pac) and regulates the ATPase activity of the terminase large subunit. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches.
