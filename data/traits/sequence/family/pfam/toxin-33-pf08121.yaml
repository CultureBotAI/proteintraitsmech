identifier: Pfam:PF08121
label: Waglerin family
definition: >-
  This family consists of the lethal peptides (waglerins) that are found in the venom of Trimeresurus wagleri (Wagler's pit viper) (Tropidolaemus wagleri). Waglerins are 22-24 residue lethal peptides and are competitive antagonist of the muscle nicotinic receptor (nAChR). Waglerin-1 possesses a distinctive selectivity for the α-ε interface binding site of the mouse nAChR.
