identifier: Pfam:PF19937
label: Gliding motility-associated protein GldC-like
definition: >-
  Members of this protein family are exclusive to the Bacteroidetes phylum (previously Cytophaga-Flavobacteria-Bacteroides). GldC is a protein linked to a type of rapid surface gliding motility found in certain Bacteroidetes, such as Cytophaga johnsonae (Flavobacterium johnsoniae) and Cytophaga hutchinsonii. Knockouts of GldC do not abolish the gliding phenotype but do impair it. Gliding motility appears closely linked to chitin utilization in the model species C. johnsonae. Bacteroidetes with members of this protein family appear to have all of the genes associated with gliding motility.
