identifier: Pfam:PF09327
label: Bacteriophage tail tip fiber protein
definition: >-
  This entry represents the central straight fiber (CSF) domain of Tip attachment protein J from Escherichia phage lambda (GpJ) and similar bacterial and viral proteins. This longitudinally oriented domain, folds into a mixed β-sheet prism and undergoes a range of structural rearrangements. It is often found in association with . This domain is also found at the C-terminal end of the putative tail tip fiber protein from Escherichia phage Phieco32. The Tip attachment protein J (GpJ) from Escherichia phage lambda is a crucial tail fibre protein responsible for recognising and binding the host cell's LamB receptor, thereby initiating infection. Structurally, GpJ forms the central tail fibre at the phage tip and undergoes conformational changes upon receptor engagement, which are essential for triggering DNA injection into the host. It interacts with other tail proteins during assembly, serving as a scaffold for tail tube formation and coordinating with the tape measure protein to regulate genome delivery. Mutations in GpJ can alter host specificity and affect phage stability, while its exposed position makes it a target for neutralising antibodies.
