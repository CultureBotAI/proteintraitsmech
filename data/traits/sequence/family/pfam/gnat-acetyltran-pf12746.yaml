label: GNAT acetyltransferase
definition: >-
  Several members of this family are annotated as being Zwittermicin A resistance proteins, whereas others are listed as being GNAT acetyltransferases, including the uncharacterised N-acetyltransferase YdfB from Bacillus subtilis. The family has similarities to the GNAT acetyltransferase family.
