identifier: Pfam:PF23504
label: YodE
definition: >-
  This protein family includes Protein YodE from Escherichia coli, a 48-residue micropeptide encoded by a small open reading frame (smORF) that overlaps on the same strand with small regulatory RNA RyeG. Proteins of 50 or fewer residues long have been shown to regulate the functions of larger proteins in a variety of organisms. It is predicted to contain a β configuration.
