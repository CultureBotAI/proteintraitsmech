identifier: Pfam:PF23802
label: Family of unknown function (DUF7178)
definition: >-
  This entry describes a family of identified in phage metagenomic datasets. The family contains proteins from a variety of phages that infect actinobacteria, particularly Mycobacterium, Gordonia, and Streptomyces. The exact specificity and function of this metagenomic family is currently unknown. Some members are described as N-glycosylases.
