identifier: Pfam:PF08112
label: ATP synthase epsilon subunit
definition: >-
  Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP. A-ATPases (or A1A0-ATPase) ( ) are found exclusively in Archaea and display a close resemblance in structure and subunit composition with V-ATPases, although their function in both ATP synthesis and ATP hydrolysis is closer to that of F-ATPases. A-ATPases are composed of two linked complexes: the A1 complex consisting of seven subunits contains the catalytic core that synthesizes/hydrolyses ATP, while the A0 complex consisting of at least two subunits forms the membrane-spanning pore. The rotary motor in A-ATPases is composed of only two subunits, the stator subunit I and the rotor subunit C. A-ATPases may have arisen as an adaptation to the different cellular needs and the more extreme environmental conditions faced by Archaeal species. The epsilon subunit is the smallest (7kDa) of those found in the A1 complex. Unlike the A, B and C subunits, the epsilon subunit does not have a homologous counterpart in F- or V-ATPases.
