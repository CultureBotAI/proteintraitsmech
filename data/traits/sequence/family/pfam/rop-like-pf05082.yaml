identifier: Pfam:PF05082
label: Rop-like
definition: >-
  This family contains several uncharacterised bacterial proteins. These proteins are found in nitrogen fixation operons, so are likely to play some role in this process. They consist of two α helices which are joined by a four residue linker. The helices form an antiparallel bundle and cross towards their termini. They are likely to form a rod-like dimer. They have structural similarity to the regulatory protein Rop ( ).
