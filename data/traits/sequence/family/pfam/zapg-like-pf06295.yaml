identifier: Pfam:PF06295
label: Z-ring associated protein G-like
definition: >-
  This entry represents Z-ring associated protein G from Escherichia coli (ZapG) and similar proteins predominantly found in gammaproteobacteria. ZapG is involved in cell division, cell envelope biogenesis and cell shape maintenance. It is a key regulator of cell envelope growth, playing a crucial role in coordinating cell width, elongation and division to maintain cell envelope integrity. It plays an important role in the lipopolysaccharide (LPS) assembly/transport. This family was previously known as DUF1043.
