identifier: Pfam:PF13984
label: MsyB protein
definition: >-
  The MsyB protein has been found to be able to restore protein export defects caused by a temperature-sensitive secY or secA mutation. Its exact molecular function is still unknown, but it may play a role in protein export. Proteins in this family are approximately 120 amino acids in length and are found in bacteria.
