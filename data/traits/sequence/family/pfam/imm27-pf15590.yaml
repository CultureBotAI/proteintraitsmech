identifier: Pfam:PF15590
label: Immunity protein 27
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved aspartate and GGxP motif. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Ntox10 or Tox-ParB families.
