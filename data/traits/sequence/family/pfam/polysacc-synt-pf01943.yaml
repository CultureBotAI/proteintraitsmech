identifier: Pfam:PF01943
label: Polysaccharide biosynthesis protein
definition: >-
  Members of this family are integral membrane proteins, and many are implicated in the production of polysaccharide. The family includes RfbX part of the O antigen biosynthesis operon, and SpoVB from Bacillus subtilis ( ), which is involved in spore cortex biosynthesis.
