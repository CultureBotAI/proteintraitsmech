identifier: Pfam:PF07188
label: Kaposi's sarcoma-associated herpesvirus (KSHV) K8 protein
definition: >-
  This family consists of Human herpesvirus 8 (HHV-8, Kaposi's sarcoma-associated herpesvirus) K8 proteins. HHV-8 is a human Gammaherpesvirus related to Epstein-Barr virus (strain GD1) (HHV-4) (Human herpesvirus 4) and Saimiriine herpesvirus 2 (Herpesvirus saimiri). HHV-8 open reading frame K8 encodes a basic region-leucine zipper protein of 237 aa that homodimerises. K8 interacts and co-localises with human SNF5 ( ), a cellular chromatin-remodelling factor, both in vivo and in vitro . K8 is thought to function as a transcriptional activator under specific conditions and its transactivation activity requires its interaction with the cellular chromatin remodelling factor hSNF5.
