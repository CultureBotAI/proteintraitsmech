identifier: Pfam:PF07803
label: GSG1-like protein
definition: >-
  This entry represents GSG1 (germ cell-specific gene 1 protein), a protein specifically expressed in testicular germ cells. It has been shown to target testis-specific poly(A) polymerase to the endoplasmic reticulum through protein-protein interactions. Overexpression of the human homologue may be involved in tumourigenesis of human testicular germ cell tumours.
