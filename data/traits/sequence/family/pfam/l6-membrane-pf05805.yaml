identifier: Pfam:PF05805
label: L6 membrane protein
definition: >-
  This family consists of several eukaryotic L6 membrane proteins. L6, IL-TMP, and TM4SF5 are cell surface proteins predicted to have four transmembrane domains. Previous sequence analysis led to their assignment as members of the tetraspanin superfamily it has now been found that that they are not significantly related to genuine tetraspanins, but instead constitute their own L6 family. Several members of this family have been implicated in Homo sapiens cancer.
