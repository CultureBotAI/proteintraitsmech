identifier: Pfam:PF04188
label: Mannosyltransferase (PIG-V)
definition: >-
  This entry represents GPI mannosyltransferase 2, also known as PIG-V in humans or Gpi18 in fungi. PIG-V is a mannosyltransferase that transfers the second mannose in glycosylphosphatidylinositol (GPI) biosynthesis. GPI is a glycolipid that anchors many proteins to the eukaryotic cell surface. It contains a membrane-embedded domain named BindGPILA, also found in the GPI lipid anchor pathway proteins PIG-B, PIG-M, PIG-U, PIG-W, PIG-V, and PIG-Y, which it is thought to be responsible for recognising, binding and stabilising the GPI lipid anchor.
