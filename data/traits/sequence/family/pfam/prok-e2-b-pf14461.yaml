identifier: Pfam:PF14461
label: Prokaryotic E2 family B
definition: >-
  This entry represents a domain found in the E2/UBC superfamily of proteins found in several bacteria. The active site residues are similar to the eukaryotic E2 proteins but lack the conserved asparagine. Members of this family are usually fused to an E1 domain at the C terminus. The protein is usually in the gene neighbourhood of a gene encoding a member of the pol-beta nucleotidyltransferase superfamily. Many of the operons in this family are in ICE-like mobile elements and plasmids. Proteins containing this domain include CD-NTase-associated protein 2 (Cap2) from Escherichia coli. Cap2 is associated with CD-NTase protein, which synthesizes cyclic nucleotides in response to infection; these serve as specific second messenger signals.
