identifier: Pfam:PF26866
label: Phage P22 Eai protein
definition: >-
  This entry represents the Eai protein found in bacteriophages and Pseudomonadota. The prototype is from Salmonella phage P22, a 64 amino acid protein with a molecular weight of 7.0 kDa. The protein was identified in studies of phage P22 int gene regulation and remains uncharacterised. The function of this protein is unknown. This entry also includes putative Eai proteins found in bacteria.
