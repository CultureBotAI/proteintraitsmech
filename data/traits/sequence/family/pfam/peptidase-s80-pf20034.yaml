identifier: Pfam:PF20034
label: Peptidase S80 family
definition: >-
  This family represents Capsid maturation protease from Pseudomonas phage phiKZ. This protease is responsible for the proteolysis of head proteins, a critical step in the morphogenesis of many tailed phages. Cleavage facilitates the conversion of the prohead to the mature capsid. All these cleavages are carried out by action at consensus S/A/G-X-E recognition sequences at 39 cleavage sites. Evidence of multiple processing sites in nine phiKZ proteins appears to represent a built-in mechanism by which the phage ensures that the majority of the propeptide regions are removed, and emphasizes the essential nature of processing in phiKZ-head morphogenesis. The family is classified by MEROPS as a serine peptidase.
