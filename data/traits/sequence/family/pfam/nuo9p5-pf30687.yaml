identifier: Pfam:PF30687
label: Complex I 9.5 kDa ubiquinone-binding subunit
definition: >-
  This 9.5kDa ubiquinone-binding protein (Nuo9.5) from yeast is an accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I). It plays an important role in creating the electrochemical gradient that powers mitochondrial adenosine triphosphate synthesis. Nuo9.5 is a single-pass membrane protein and a fungal subunit homologous to NADH dehydrogenase 1 alpha subcomplex subunit 3 (NDUFA3) that is considered an accessory subunit.
