identifier: Pfam:PF26316
label: Salmonella anti-inflammatory response activator family
definition: >-
  This protein family comprises effector molecules secreted via specialised type III secretion systems that modulate host immune responses in a sophisticated manner. They harbour conserved sequence motifs, notably a YxxQ element whose activity is enhanced by an invariant isoleucine at the pY+1 position, making them efficient substrates for host kinase phosphorylation. By promoting robust and prolonged activation of host signalling pathways, these effectors induce marked anti-inflammatory responses, which facilitate pathogen survival and dissemination.
