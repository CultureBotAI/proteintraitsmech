identifier: Pfam:PF08692
label: Mitochondrial protein Pet20
definition: >-
  This entry includes a group of fungi mitochondrial proteins, including Pet20, Sue1 and Mrx6 (YNL295W) from budding yeasts. This entry also includes Cox24 from fission yeasts. Pet20 is a mitochondrial protein which is thought to play a role in the correct assembly/maintenance of mitochondrial components. Sue1 is required for degradation of unstable forms of cytochrome c. Cox24, which is also named Small ribosomal subunit protein mS38, is a mitochondrial protein required for processing of the Cox1 transcript.
