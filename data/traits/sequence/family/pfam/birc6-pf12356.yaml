identifier: Pfam:PF12356
label: 'Baculoviral IAP repeat-containing protein 6  '
definition: >-
  Baculoviral IAP repeat-containing protein 6 (BIRC6, also known as BRUCE) is an anti-apoptotic protein which can regulate cell death by controlling caspases and by acting as an E3 ubiquitin-protein ligase. It has an unusual ubiquitin conjugation system in that it could combine in a single polypeptide, ubiquitin conjugating (E2) with ubiquitin ligase (E3) activity, forming a chimeric E2/E3 ubiquitin ligase. It is crucial for normal vesicle targeting to the site of abscission, but also for the integrity of the midbody and the midbody ring, and its striking ubiquitin modification.
