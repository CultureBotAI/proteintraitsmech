identifier: Pfam:PF01667
label: Ribosomal protein S27
definition: >-
  S27 is involved in rRNa processing, direct binding to mRNA and degradation of damaged mRNAs. S27 is a C4 zinc finger protein of the CX2CX14-16CX2C class. Zinc finger motifs in ribosomal proteins mediate protein-RNA interactions, however it has been suggested the zinc finger in S27 possibly has no functional importance for modern S27 proteins, and is rather a fossil from ancient evolution. This view is supported by the sequence alignment, showing that the zinc finger motif is not strictly conserved. A number of eukaryotic and archaeal ribosomal proteins can be grouped on the basis of sequence similarities. One of these families include mammalian, yeast, Chlamydomonas reinhardtii and Entamoeba histolytica S27, and Methanocaldococcus jannaschii (Methanococcus jannaschii) MJ0250. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate t…
