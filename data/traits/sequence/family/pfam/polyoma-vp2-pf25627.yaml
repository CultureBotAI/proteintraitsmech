identifier: Pfam:PF25627
label: Polyomaviruses capsid protein VP2 family
definition: >-
  The polyomaviruses capsid protein VP2 function as a structural component within the viral capsid, residing in the core surrounded by VP1 pentamers. It plays a crucial role in host cell receptor binding in conjunction with VP1. After the virus undergoes endocytosis and reaches the endoplasmic reticulum, VP2 and VP3 oligomerise and integrate into the membrane. This integration may form a viroporin, facilitating the transport of the viral genome across the membrane into the cytoplasm. The nuclear entry of viral DNA involves the exposure and recognition of a nuclear localisation signal shared by VP2 and VP3. Additionally, VP2 contributes to virion assembly within the nucleus, aided by a DNA-binding domain in its C-terminal region. The N-terminal myristoylation of VP2 suggests it may serve as a scaffold during virion assembly.
