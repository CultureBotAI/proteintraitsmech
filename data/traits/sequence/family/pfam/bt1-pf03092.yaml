identifier: Pfam:PF03092
label: BT1 family
definition: >-
  Members of this family are transmembrane proteins. Several are Leishmania putative proteins that are thought to be pteridine transporters. One such protein , previously termed (and is still annotated as) ORFG, was shown to encode a biopterin transport protein using null mutants, thus being subsequently renamed BT1. The significant similarity of ORFG/BT1 to Trypanosoma brucei ESAG10 (a putative transmembrane protein and another member of this family) was previously noted. This family also contains folate-biopterin transporters (FBTs) from blue-green algae and plants, including Slr0642 protein from Synechocystis and its plastidial orthologue At2g32040 from Arabidopsis. Both Slr0642 protein and At2g32040 mediate folate monoglutamate transport involved in tetrahydrofolate biosynthesis. However, this entry also includes seven other Arabidopsis FBT proteins that lack conserved critical residues and may not have folate or pterin transport activity. In addition, it also contains two predicted prokaryotic proteins (from the cyanobacteria Synechocystis and Synechococcus).
