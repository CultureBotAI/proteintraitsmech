identifier: Pfam:PF00795
label: Carbon-nitrogen hydrolase
definition: >-
  The carbon-nitrogen hydrolase domain is an around 265-residue domain found in numerous enzymes involved in the reduction of organic nitrogen compounds and ammonia production. Based on their sequence similarity and on the reactions they catalyse, these enzymes can be classified into functionally distinct groups including: Nitrilases ( ), which cleave various nitriles into the corresponding acids and ammonia. Cyanide hydratase ( ) of pathogenic fungi, which detoxifies HCN that is released by their hosts, cyanogenic plants, after injury. Aliphatic amidases ( ), which enable prokaryotes to use acetamides as both carbon and nitrogen source. Beta-ureidopropionase (also known as beta-alanine synthase or N-carbamoyl-beta-alanine amino hydrolase; ), which catalyses the last step of pyrimidine catabolism. Glutamine-dependent NAD(+) synthetase (also known as AdgA, for ammonia-dependent growth) from Rhodobacter species ( ). It appears to be essential for using various amino acids as nitrogen sources. Biotinidase ( ), which catalyses the hydrolysis of biocytin to biotin and lysine. Pantetheinase ( ) (Pantetheine hydrolase) (Vanin), which hydrolyzes specifically one of the carboamide linkages in D-pantetheine, thus recycling pantothenic acid (vitamin B5) and releasing cysteamine. Apolipoprotein N-acyltransferase ([ec:2.3.1.-]) (gene lnt), a bacterial enzyme that transfers the fatty acyl group on membrane lipoproteins. Glutamine-dependent NAD(+) synthetase ( ), which catalyses the final step in NAD+ synthesis. The carbon-nitrogen hydrolase domain is characterised by several conserved motifs, one of which contains a cysteine that is part of the catalytic site in nitrilases. Another highly conserved motif includes a glutamic acid that might also be involved in catalysis.
