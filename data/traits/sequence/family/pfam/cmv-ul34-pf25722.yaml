identifier: Pfam:PF25722
label: Cytomegalovirus transcriptional regulator UL34
definition: >-
  This entry represents the UL34 protein family found in herpesvirales. UL34 acts as a transcriptional repressor of the US3 gene expression through a specific DNA sequence named the transcriptional repressive element (tre). The protein is localised to the host nucleus during viral infection. Structure prediction suggests that this entry forms a compact α-helical domain.
