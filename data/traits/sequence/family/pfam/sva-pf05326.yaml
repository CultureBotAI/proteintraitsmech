identifier: Pfam:PF05326
label: Seminal vesicle autoantigen (SVA)
definition: >-
  Prolactin-inducible (PIP) is a 17kDa glycoprotein that binds to many proteins including fibrinogen, actin, keratin, myosin, immunoglobulin G, CD4, and human zinc-alpha-2 glycoprotein. It forms a complex with human serum albumin (HSA) in seminal plasma and may affect male fertility/infertility. It also acts as a factor capable of suppressing T-cell apoptosis through its interaction with CD4.
