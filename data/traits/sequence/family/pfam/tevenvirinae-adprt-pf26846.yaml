identifier: Pfam:PF26846
label: Tevenvirinae NAD(+)--arginine ADP-ribosyltransferase family
definition: >-
  This entry represents the N-terminal region of the NAD(+)--arginine ADP-ribosyltransferase proteins mainly from Caudoviricetes. The Caudoviricetes NAD(+)--arginine ADP-ribosyltransferase family includes proteins that function as ADP-ribosyltransferases. These enzymes efficiently ADP-ribosylate the alpha subunits of host RNA polymerase, specifically targeting an arginine in the C-terminal region. This modification enhances the transcription of viral early genes. The family also targets other RNA polymerase subunits, including beta, beta', and sigma 70, and can perform autoribosylation. Additionally, it modifies proteins involved in translation and cellular metabolism, such as elongation factor-Tu and GroeL. The family can mono-ADP-ribosylate host MAZF, potentially inactivating it.
