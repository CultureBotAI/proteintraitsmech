identifier: Pfam:PF19268
label: Contractile injection system tape measure protein
definition: >-
  Contractile injection systems (CISs) are cell-puncturing nanodevices that share ancestry with contractile tail bacteriophages. This entry represents a group of proteins found mostly in bacteria as part of the Photorhabdus virulence cassette (PVC), one group of extracellular CISs. This protein is the tape measure which dictates the length of the syringe tail. It is found in low copy number and is most likely not present in the mature syringes. Deletion of the tape measure protein Pvc14 from P. asymbiotica resulted in large variations in the length of the syringes. The N and C-terminal domains of these proteins are well conserved, but they have a wide length variation in the central region.
