identifier: Pfam:PF28056
label: DNA damage-induced SOS-independent cell division inhibitor A-like
definition: >-
  This entry represents a group of proteins found in Caulobacter that are homologous to the cell division inhibitor A (DidA). DidA is a cell division inhibitor that is induced by DNA damage, but in an SOS-independent manner. DidA does not disrupt assembly of the division machinery and instead binds the essential division protein FtsN to block cytokinesis.
