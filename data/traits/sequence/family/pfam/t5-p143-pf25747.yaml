identifier: Pfam:PF25747
label: Bacteriophage T5 tail completion protein p143
definition: >-
  This entry represents the tail completion protein p143 found in bacteriophage T5. Unlike typical tail completion proteins that are located at the head-tail joining region, p143 is found at the base of only one BHP pb3 monomer in the T5 tail tip. This protein appears to have a role in tail stability and may detach during the infection process. Cryo-EM structural studies have shown that this protein is absent from reconstructions of the tip after interaction with the bacterial receptor FhuA, suggesting a potential role in the infection mechanism.
