identifier: Pfam:PF30240
label: Mitochondrial HMG-box protein CIM1
definition: >-
  This entry represents the CIM1 (Copy number influence on Mtdna protein 1) family of mitochondrial HMG-box proteins found in fungi. CIM1 limits the copy number of mitochondrial DNA by antagonising ABF2, a mtDNA packaging factor. The protein contains two HMG-box regions (A and B) and localises to the mitochondrial matrix. CIM1 is synthesised as a precursor with a mitochondrial transit peptide and is involved in mitochondrial genome maintenance. Disruption of CIM1 leads to increased mitochondrial DNA copy number.
