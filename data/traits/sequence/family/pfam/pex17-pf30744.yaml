identifier: Pfam:PF30744
label: Peroxisomal membrane protein PEX17
definition: >-
  This entry represents the peroxin PEX17 family found in fungi. In Saccharomyces cerevisiae, PEX17 is a component of the peroxisomal protein translocation machinery together with PEX13 and PEX14, forming the peroxisomal docking complex. PEX17 interacts indirectly with the PTS1 receptor (PEX5) and directly binds to PEX14. It is required for import of both PTS1 and PTS2 signal- containing proteins into the peroxisome matrix. PEX17 is a peripheral membrane protein located on the cytoplasmic side of the peroxisomal membrane.
