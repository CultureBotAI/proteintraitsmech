identifier: Pfam:PF02402
label: Lysis protein
definition: >-
  The DNA sequence of the entire colicin E2 operon has been determined. The operon comprises the colicin activity gene (ceaB), the colicin immunity gene (ceiB) and the lysis gene (celB), which is essential for colicin release from producing cells. A putative LexA binding site is located upstream from ceaB, and a rho-independent terminator structure is located downstream from celB. Comparison of the amino acid sequences of colicin E2 and cloacin DF13 reveal extensive similarity. These colicins have different modes of action and recognise different cell surface receptors; the two major regions of heterology at the C terminus, and in the C-terminal end of the central region are thought to correspond to the catalytic and receptor-recognition domains, respectively.
