label: HinT-interacting membrane complex lipoprotein P60-like
definition: >-
  This entry represents a group of proteins from Mycoplasmatota, including lipoprotein P60 from Metamycoplasma hominis. This protein is part of a complex that interacts with HinT, a lineage-specific subgroup of the cytosolic histidine triad (HIT) family of proteins.
