identifier: Pfam:PF22865
label: Small protein MgtS-like
definition: >-
  This entry includes Small protein MgtS from Escherichia coli (previously known as YneM), and similar short sequences from enterobacterales. MgtS, the product of a small open reading frame (smORF), is a small inner membrane protein that modulates Mg2 concentrations through its effects on the P-type transporter MgtA. MgtS is induced by very low concentrations of Mg2 in a PhoPQ-dependent manner and acts by binding and stabilising MgtA to increase the intracellular Mg2 levels and maintain cell integrity upon Mg2 depletion. It forms a single transmembrane helix.
