identifier: Pfam:PF13689
label: YfiR/HmsC-like
definition: >-
  YfiR has been shown to regulate YfiN, a diguanylate cyclase and a bifunctional protein that produces c-di-GMP in response to reductive stress and then dynamically relocates to the division site to arrest cell division in response to envelope stress in Escherichia coli. YfiR may serve as a periplasmic redox sensor that regulates YfiN activity in response to reducing conditions.
