identifier: Pfam:PF11289
label: Betacoronavirus viroporin
definition: >-
  Coronavirus encodes two viroporins, E protein and protein 3a, which act as ion-conductive pores in planar lipid bilayers and are required for maximal SARS-CoV replication and virulence. In betacoronavirus, this protein plays a role in viral egress via lysosomal trafficking. Protein 3a from SARS-CoV-2 also blocks autolysosomes formation by binding and sequestering the host component VPS39 for homotypic fusion and protein sorting (HOPS) on late endosomes. This prevents fusion of autophagosomes with lysosomes, disrupting autophagy and facilitating virus egress. This entry represents protein 3a encoded by Orf3/3a, also known as X1, which forms homotetrameric potassium, sodium or calcium sensitive ion channels (viroporin) and may modulate virus release. It has also been shown to up-regulate expression of fibrinogen subunits FGA, FGB and FGG in host lung epithelial cells. 3a protein is a pro-apoptosis-inducing protein. It localises to the endoplasmic reticulum (ER)-Golgi compartment. SARS-CoV causes apoptosis of infected cells through NLRP3 inflammasome activation, as ORF3a is a potent activator of the signals required for this activation, pro-IL-1beta gene transcription and protein maturation. This protein also promotes the ubiquitination of apoptosis-associated speck-like protein containing a caspase recruitment domain (ASC) mediated by its interaction with TNF receptor-associated factor 3 (TRAF3). The expression of ORF3a induces NF-kappa B activation and up-regulates fibrinogen secretion with the consequent high cytokine production. Another apoptosis mechanism described for this protein is the activation of the PERK pathway of unfolded protein response (UPR), which causes phosphorylation of eIF2alpha and leads to reduced translation of cellular proteins as well as the act…
