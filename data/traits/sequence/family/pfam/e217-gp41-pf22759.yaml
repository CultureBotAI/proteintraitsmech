identifier: Pfam:PF22759
label: Baseplate hub gp41
definition: >-
  E217 is a Pseudomonas phage used in an experimental cocktail to eradicate cystic fibrosis-associated Pseudomonas aeruginosa. Gp41 ia a baseplate cap protein that forms a complex with gp36, gp37 and gp38 proteins. These four proteins are evolutionarily related to the tail tube and adopt a similar fold, consisting of two orthogonally packed β-sheets that form the inner lumen of the tail.
