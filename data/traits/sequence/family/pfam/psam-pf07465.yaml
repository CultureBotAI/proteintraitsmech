identifier: Pfam:PF07465
label: Photosystem I protein M (PsaM)
definition: >-
  Members of this protein family are PsaM, which is subunit XII of the photosystem I reaction centre. PsaM forms part of the photosystem I complex and its binding is stabilised by PsaI. This protein is found in both the Cyanobacteria and the chloroplasts of plants, but is absent from non-oxygenic photosynthetic bacteria such as Rhodobacter sphaeroides. Species that contain photosystem I also contain photosystem II, which splits water and releases molecular oxygen.
