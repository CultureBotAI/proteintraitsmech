identifier: Pfam:PF08812
label: YtxC-like family
definition: >-
  This uncharacterised protein is one of a number of proteins conserved in all known endospore-forming Firmicutes (low-GC Gram-positive bacteria), including Carboxydothermus hydrogenoformans, and it is not found in non-endospore forming species. It is uniformly distributed in the mother cell cytoplasm in Bacillus subtilis.
