identifier: Pfam:PF06946
label: Bacteriophage A118-like holin, Hol118
definition: >-
  This entry represents the Bacteriophage A118-like, holin/antiholin protein. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. An alternative isoform exists that is thought to function as an antiholin by counteracting the aggregation of the holin molecules. The isoforms differ by only 2 residues at the N terminus. Holins form large oligomeric flexible pores in the cytoplasmic membranes of bacteria to allow the endolysins to gain access to the cell wall, where they exert their actions by cleaving various bonds in the peptidoglycan polymer and inducing cell death. These proteins and its corresponding genes have been identified in a wide variety of Gram-negative and Gram-positive bacteria and their phages.
