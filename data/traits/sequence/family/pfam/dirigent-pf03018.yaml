identifier: Pfam:PF03018
label: Dirigent-like protein
definition: >-
  Dirigent proteins impart stereoselectivity on the phenoxy radical-coupling reaction, yielding optically active lignans from two molecules of coniferyl alcohol in the biosynthesis of lignans, flavonolignans, and alkaloids and thus plays a central role in plant secondary metabolism. This family also includes homologue DRR206 (disease resistance response protein 206). DRR206 is induced by the metabolite pinoresinol monoglucoside and is involved in phytoalexin (lignan) biosynthesis as a defense response.
