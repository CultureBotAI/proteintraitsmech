identifier: Pfam:PF04701
label: Pox virus D2 protein
definition: >-
  This entry represents the Pox virus D2 proteins, also known as OPG114. D2 is a late protein which is part of a large complex required for early virion morphogenesis. This complex participates in the formation of virosomes and the incorporation of virosomal contents into nascent immature virions.
