definition: >-
  Members of this family average about 120 amino acids in length, including an apparent redox-active disulfide motif CxxC and two other invariant Cys residues. The family is named after VVA0879 from Vibrio vulnificus ( ) but it includes proteins also from Gram-positive species such as Streptococcus suis ( ).
