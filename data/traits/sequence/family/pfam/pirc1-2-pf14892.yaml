identifier: Pfam:PF14892
label: Piercer of microtubule wall 1/2
definition: >-
  This family represents piercer of microtubule wall 1/2 (PIRC1/2), which are microtubule inner proteins involved in the attachment of outer dynein arms (ODAs) to dynein-decorated doublet microtubules (DMTs) in cilia axoneme. In mice, PIRC1 has been shown to function at the initial step of left-right asymmetry specification of the visceral organs.
