identifier: Pfam:PF15807
label: 'Membrane-associated protein 117 kDa, PDZK1-interacting protein 1 '
definition: >-
  PDZK1-interacting protein 1 (PDZK1IP1, MAP17) is a small non-glycosylated two-pass membrane protein that is overexpressed in many tumours of different origins, including carcinomas. This entry also includes small integral membrane protein 24 (SMIM24) from mammals and proximal tubules-expressed gene protein (pteg) from Xenopus. The function of SMIM24 is not clear. Pteg is essential for pronephric mesoderm specification and tubulogenesis.
