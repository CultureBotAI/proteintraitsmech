identifier: Pfam:PF05452
label: Clavanin
definition: >-
  This family consists of clavanin proteins from the haemocytes of the invertebrate Styela clava (Sea squirt), a solitary tunicate. The family is made up of five α-helical antimicrobial peptides, clavanins A, B, C, D and E and Clavaspirin. The tunicate peptides resemble magainins in size, primary sequence and antibacterial activity. Synthetic clavanin A displays comparable antimicrobial activity to magainins and cecropins. The presence of α-helical antimicrobial peptides in the haemocytes of a urochordate suggests that such peptides are primeval effectors of innate immunity in the vertebrate lineage. Clavaspirin exhibits broad-spectrum antimicrobial activity against both Gram-positive and Gram-negative bacteria and has a potent hemolytic activity.
