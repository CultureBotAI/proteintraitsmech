identifier: Pfam:PF20646
label: Hpf1 C-terminal YTTT repeat
definition: >-
  This entry represents a short sequence repeat found at the C terminus of Adhesin AWP2 from the yeast Candida glabrata. AlphaFold predicts this repeat to adopt a beta hairpin structure. This repeat is found in multiple copies in a range of fungal species.
