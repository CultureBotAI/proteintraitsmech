identifier: Pfam:PF06276
label: Ferric iron reductase FhuF-like transporter
definition: >-
  This entry represents the C-terminal domain of this group of proteins which is related to the FhuF iron transporter proteins. FhuF is involved in the reduction of ferric iron in cytoplasmic ferrioxamine B. Bacteria solve the iron supply problem caused by the insolubility of Fe(3) by synthesizing iron-complexing compounds, called siderophores, and by using iron sources of their hosts, such as haem and iron bound to transferrin and lactoferrin. Escherichia coli, as an example of a Gram-negative bacterium, forms sophisticated Fe(3)-siderophore and haem transport systems across the outer membrane. IucA and IucC catalyse discrete steps in biosynthesis of the siderophore aerobactin from N epsilon-acetyl-N epsilon-hydroxylysine and citrate. This entry also includes SbnC, SbnE and SbnF from Staphylococcus aureus. They are involved in staphyloferrin B biosynthesis. SbnC is a staphyloferrin B synthase. SbnE is a L-2,3-diaminopropanoate--citrate ligase. SbnF is a 2-[(L-alanin-3-ylcarbamoyl)methyl]-3-(2-aminoethylcarbamoyl)-2-hydroxypropanoate synthase. It also includes Bisucaberin biosynthesis protein C that is involved in the biosynthesis of the siderophore bisucaberin, as well as AnkE which is responsible of the production of NK13650 B via ligation of citrate to the ankD product.
