identifier: Pfam:PF12698
label: ABC-2 family transporter protein
definition: >-
  ABC transporters are minimally constituted of two conserved regions: a highly conserved ATP binding cassette (ABC) and a less conserved transmembrane domain (TMD). These regions can be found on the same protein (mostly in eukaryotes and bacterial exporters) or on two different ones (mostly bacterial importers). But in a subgroup of exporters, the transmembrane region is encoded by a separated polypeptide, described as the ABC-2 type transport system integral membrane protein. A number of bacterial transport systems have been found to contain integral membrane components that have similar sequences: these systems fit the characteristics of ATP-binding cassette transporters. The proteins form homo- or hetero-oligomeric channels, allowing ATP-mediated transport. Hydropathy analysis of the proteins has revealed the presence of 6 possible transmembrane regions. This entry represents the transmembrane region ABC-2 type transporters. ABC transporters belong to the ATP-Binding Cassette (ABC) superfamily, which uses the hydrolysis of ATP to energise diverse biological systems. ABC transporters minimally consist of two conserved regions: a highly conserved ATP binding cassette (ABC) and a less conserved transmembrane domain (TMD). These can be found on the same protein or on two different ones. Most ABC transporters function as a dimer and therefore are constituted of four domains, two ABC modules and two TMDs. ABC transporters are involved in the export or import of a wide variety of substrates ranging from small ions to macromolecules. The major function of ABC import systems is to provide essential nutrients to bacteria. They are found only in prokaryotes and their four constitutive domains are usually encoded by independent polypeptides (two ABC proteins and two TMD proteins…
