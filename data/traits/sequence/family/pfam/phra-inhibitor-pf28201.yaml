identifier: Pfam:PF28201
label: Phosphatase RapA inhibitor
definition: >-
  This family of proteins includes signaling molecules that play a role in the regulation of sporulation. They are secreted and subsequently need to be imported into the cell to exert their function intracellularly. Members of this family act as inhibitors of specific phosphatase activities, such as that of RapA, but do not affect others like RapB. The inhibitory function relies on the presence of a free carboxylate group at the C-terminal end of the peptide. These proteins are significantly more active in their free acid form compared to their amide form.
