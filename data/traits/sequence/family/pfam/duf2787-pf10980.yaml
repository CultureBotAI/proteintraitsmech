identifier: Pfam:PF10980
label: Protein of unknown function (DUF2787)
definition: >-
  This family of proteins, predominantly found in Gammaproteobacteria, has no known function. The conserved hypothetical protein VC1805 from Vibrio cholerae is included in this entry. VC1805 adopts a monomeric assembly, showing an unusual topology with a flat seven-stranded anti-parallel β-sheet and two helices located on the same side of the sheet. It has some structural homology with the human protein p32 and binds to the complement protein C1q, which suggests a possible role in the adherence of the bacteria to the intestinal wall.
