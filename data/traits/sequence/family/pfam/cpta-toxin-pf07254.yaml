identifier: Pfam:PF07254
label: Membrane-bound toxin component of toxin-antitoxin system
definition: >-
  This family includes bacterial proteins including the probable inner membrane protein YgfX from Escherichia coli (formerly known as CptA). This had been thought to be a toxin, but it has no effect on cell growth. It has been shown to interact with the cytoskeletal proteins FtsZ and MreB and to inhibit FtsZ GTP-dependent and MreB ATP-dependent polymerization. In Serratia strains deficient in sdhE-ygfX, YgfX restores production of the antibiotic prodigiosin.
