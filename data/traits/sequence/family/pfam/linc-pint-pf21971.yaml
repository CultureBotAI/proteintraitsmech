identifier: Pfam:PF21971
label: Transcriptional regulator PINT87aa
definition: >-
  This protein family represents human Transcriptional regulator PINT87aa (LINC-PINT), an 87-residues peptide encoded by a circular RNA (circRNA) that suppresses glioblastoma cell proliferation in vitro and in vivo. It has been established as a biomarker and a key regulator of cellular senescence in hepatocellular carcinoma (HCC).
