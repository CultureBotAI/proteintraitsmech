identifier: Pfam:PF06922
label: Citrus tristeza virus P13 protein
definition: >-
  This entry represents the 13kDa P13 protein from Citrus tristeza virus (CTV) strains. CTV, a member of the closterovirus group, is one of the more complex single-stranded RNA viruses. The function of the P13 protein is unknown.
