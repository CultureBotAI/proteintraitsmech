identifier: Pfam:PF04766
label: Nucleopolyhedrovirus p26 protein
definition: >-
  This entry represents Poxin (poxvirus immune nucleases) from Baculovirus and Vaccinia virus. Poxin is a nuclease that cleaves host 2',3'-cGAMP. In human hosts, enzyme cGAS recognizes cytosolic DNA and synthesizes 2'3' cGAMP to activate STING-dependent interferon and NF-kappaB immune responses. Poxin is the viral factor responsible for 2'3' cGAMP degradation. Interestingly, in some poxviruses the poxin is expressed as a poxin-schlafen fusion protein.
