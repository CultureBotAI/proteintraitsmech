identifier: Pfam:PF11057
label: Cortexin of kidney
definition: >-
  Cortexin is a neuron-specific, 82-residue membrane protein which is found especially in vertebrate brain cortex tissue. It may mediate extracellular or intracellular signalling of cortical neurons during forebrain development. Cortexin is present at significant levels in the foetal brain, suggesting that it may be important to neurons of both the developing and adult cerebral cortex. Cortexin has a conserved single membrane-spanning region in the middle of each sequence. In humans, there is selective expression of Cortexin 3 (CTXN3) in the kidney as well as the brain. This entry contains Cortexins 1, 2 and 3, and Cortexin domain-containing proteins.
