identifier: Pfam:PF09338
label: Glycine/sarcosine/betaine reductase component B subunits
definition: >-
  This is a family of glycine reductase, sarcosine reductase and betaine reductases. These enzymes catalyse the following reactions: sarcosine reductase: Acetyl phosphate + methylamine + thioredoxin disulphide = N-methylglycine + phosphate + thioredoxin. glycine reductase: Acetyl phosphate + NH3 + thioredoxin disulphide = glycine + phosphate + thioredoxin. betaine reductase: Acetyl phosphate + trimethylamine + thioredoxin disulphide = N,N,N-trimethylglycine + phosphate + thioredoxin.
