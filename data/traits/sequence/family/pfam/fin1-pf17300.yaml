identifier: Pfam:PF17300
label: Filaments in between nuclei protein-1
definition: >-
  Fin1 forms filaments between the spindle pole bodies of dividing cells and localizes to spindle microtubules during anaphase. It contributes to spindle stability. The C-terminal half of Fin1 contains coiled-coil motifs that are required for its self-association. The N-terminal half of Fin1 can be phosphorylated at multiple sites by the cyclin-dependent kinase Clb5-Cdk1, and dephosphorylation in anaphase triggers its localization to the spindle.
