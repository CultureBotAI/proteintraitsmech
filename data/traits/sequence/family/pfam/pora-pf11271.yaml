identifier: Pfam:PF11271
label: Porin PorA
definition: >-
  PorA is a channel-forming protein found mostly in Gram-positive bacteria. It forms water-filled channels that favor the permeation of cations. This entry also includes Polar growth factor A (pgfA). PgfA is involved in mycolic acid trafficking. These proteins bind specifically to trehalose monomycolate (TMM) and are required for polar cell growth. These proteins are probably members of both the mycobacterial division and elongation complexes.
