identifier: Pfam:PF07350
label: Gig2-like
definition: >-
  This entry represents a family of proteins predominantly found in fungi and bacteria, including Gig2 from Candida albicans ( ) and Uncharacterized protein YbiU from Escherichia coli. Gig2 is a putative oxidoreductase thought to play a role in the undefined GlcNAc metabolic network. It folds into a single large domain with a cupin like double stranded β-helix core made of eight β-sheets grouped into four major and four minor sheets, which form the distorted β-barrel open at one end, surrounded by 20 α-helices. This protein shows similarity with 2- oxoglutarate dependent Fe containing oxygenases.
