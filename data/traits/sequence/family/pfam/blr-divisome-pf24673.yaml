identifier: Pfam:PF24673
label: Divisome-associated membrane protein Blr family
definition: >-
  This entry includes divisome-associated membrane protein Blr ( ), a short membrane protein. It was shown that Blr mutations increased the sensitivity of bacteria to beta-lactam antibiotics or their resistance to cell envelope stress. Blr is an interacting partner of the essential cell division protein FtsL and it is a component of the cell division apparatus involved in the stabilization of the divisome under certain stress conditions.
