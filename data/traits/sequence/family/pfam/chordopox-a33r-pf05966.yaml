identifier: Pfam:PF05966
label: Chordopoxvirus A33R protein
definition: >-
  This family consists of several Chordopoxvirus A33R proteins. A33R, also known as Protein OPG161, plays a role in promoting Ab-resistant cell-to-cell spread of virus and interacts with A36R to incorporate the protein into the outer membrane of intracellular enveloped virions (IEV) and, subsequently, the production of actin tails.
