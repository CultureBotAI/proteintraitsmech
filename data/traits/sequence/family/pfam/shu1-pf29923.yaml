identifier: Pfam:PF29923
label: Suppressor of HU sensitivity involved in recombination protein 1
definition: >-
  This entry represents suppressor of HU sensitivity involved in recombination protein 1 (SHU1) found in yeasts. SHU1 is a component of the SHU complex, which also includes CSM2, PSY3 and SHU2. The SHU complex plays a role in RAD51/RAD54-dependent homologous recombination repair to repair DNA lesions during S-phase. SHU1 is localised to the nucleus and functions in error-free post-replication DNA repair coupled to homologous recombination.
