identifier: Pfam:PF04281
label: 'Mitochondrial import receptor subunit Tom22 '
definition: >-
  The mitochondrial protein translocase family, which is responsible for movement of nuclear encoded pre-proteins into mitochondria, is very complex with at least 19 components. These proteins include several chaperone proteins, four proteins of the outer membrane translocase (Tom) import receptor, five proteins of the Tom channel complex, five proteins of the inner membrane translocase (Tim) and three "motor" proteins. This family represents the Tom22 proteins. The N-terminal region of Tom22 has been shown to have chaperone-like activity, and the C-terminal region faces the intermembrane face.
