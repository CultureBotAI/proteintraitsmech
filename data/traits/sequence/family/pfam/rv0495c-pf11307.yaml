identifier: Pfam:PF11307
label: Rv0495c-like
definition: >-
  This entry, previously known as DUF3109, represents a bacterial family of probable redox regulatory proteins. A member of this family, Rv0495c, from Mycobacterium tuberculosis is essential for maintaining intracellular redox homeostasis. Deletion of the Rv0495c gene (ΔRv0495c) results in increased levels of reactive oxygen species and a higher NAD+/NADH ratio, leading to a highly oxidised intracellular state. Despite showing a growth defect in macrophages, the absence of Rv0495c increases M. tuberculosis pathogenicity in vivo, enhancing the bacterium's ability to proliferate inside the host.
