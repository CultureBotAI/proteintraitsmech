identifier: Pfam:PF01201
label: Ribosomal protein S8e
definition: >-
  This entry represents the small ribosomal subunit protein eS8 from archaea and eukaryotes, which consists of a number of proteins with either about 220 amino acids (in eukaryotes) or about 125 amino acids (in archaea). This entry also contains proteins annotated as NSA2, which are though to be involved in ribosomal biogenesis of the 60S ribosomal subunit, having a role in the quality control of pre-60S particles. They are a component of the pre-66S ribosomal particle.
