identifier: Pfam:PF05512
label: AWPM-19-like family
definition: >-
  Members of this family are 19kDa membrane proteins. The levels of the plant protein AWPM-19 increase dramatically when there is an increase level of abscisic acid. The increase presence of this protein leads to greater tolerance of freezing. The rice homologue, OsPM19L1, is induced by osmotic stress and may be associated with stress tolerance through ABA-dependent pathway.
