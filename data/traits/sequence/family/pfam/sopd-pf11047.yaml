identifier: Pfam:PF11047
label: Salmonella outer protein D
definition: >-
  The proteins in this entry are also known as secreted effector proteins. Effector proteins function to alter host cell physiology and promote bacterial survival in host tissues. They contribute to the formation of Salmonella-induced filaments (Sifs) in infected epithelial cells and to replication in macrophages. SopD is a type III virulence effector protein whose structure consists of 38% α-helix and 26% β-strand.
