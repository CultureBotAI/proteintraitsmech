identifier: Pfam:PF28452
label: Basic immunoglobulin-like variable motif-containing protein
definition: >-
  This entry represents the BIVM (basic immunoglobulin-like variable motif-containing protein) family of proteins found in vertebrates. These proteins are approximately 500 amino acids in length and localise to both cytoplasm and nucleus. BIVM proteins are widely expressed across tissues, with higher levels in spleen, ovary, small intestine, colon, and liver. The proteins contain multiple disordered regions and may have DNA endonuclease activity. The specific function of this protein family remains to be determined.
