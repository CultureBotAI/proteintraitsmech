identifier: Pfam:PF28030
label: Type III secretion system co-regulatory protein PtrC-like
definition: >-
  PtrC (Pseudomonas type III repressor gene C), represented by locus PA2486 ( ) in Pseudomonas aeruginosa PAO1, is a small protein, typically around 64 amino acids, rich in charged residues. Overexpression represses T3SS expression, although the mechanism is not described and may depend on protein-protein interaction rather than direct interaction with DNA.
