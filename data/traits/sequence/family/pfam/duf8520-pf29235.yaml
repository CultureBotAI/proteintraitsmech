identifier: Pfam:PF29235
label: Family of unknown function (DUF8520)
definition: >-
  This entry represents a domain of unknown function found in spirochaetes. The domain is approximately 50-60 residues in length and consists of three α helices arranged in a non-compact triangular configuration. It is found N-terminal to the DbpA RNA binding domain ( ) and also occurs as the third domain in some helicase-like proteins. The function of this domain remains to be determined.
