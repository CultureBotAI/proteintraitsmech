identifier: Pfam:PF14712
label: Snapin/Pallidin
definition: >-
  This family of proteins includes snapin, which is associated with the SNARE complex that mediates synaptic vesicle docking and fusion. This family also includes the yeast snapin-like protein, Snn1, which is a part of a complex involved in endosomal cargo sorting, and pallidin - a component of a complex involved in biogenesis of lysosome-related organelles.
