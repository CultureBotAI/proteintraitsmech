identifier: Pfam:PF01742
label: Clostridial neurotoxin zinc protease
definition: >-
  The Clostridium neurotoxin family is composed of tetanus neurotoxin (TeNT) and seven serotypes of botulinum neurotoxin (BoNT). It also includes the Botulinum non-toxic non-hemagglutinin (NTNHA) component, which forms a binary complex with BoNT to protect it from gastrointestinal degradation. These toxins act as inhibitors of neurotransmitter release. They are zinc proteases that block neurotransmitter release by proteolytic cleavage of synaptic proteins such as synaptobrevins, syntaxin and SNAP-25. BoNT and TeNT are di-chain proteins linked by an interchain disulfide bond. They are comprised of an N-terminal catalytic light chain (LC), and a C-terminal heavy chain (HC) that consists of a translocation domain (HCT) and a receptor-binding domain (HCR). Through the translocation domain LC is translocated and delivered into the host cytosol. This entry represents LC, the catalytic light chain.
