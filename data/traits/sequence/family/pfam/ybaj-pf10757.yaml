identifier: Pfam:PF10757
label: Biofilm formation regulator YbaJ
definition: >-
  YbaJ regulates biofilm formation. It also has an important role in the regulation of motility in the biofilm. YbaJ functions in increasing conjugation, aggregation and decreasing the motility, resulting in an increase of biofilm.
