identifier: Pfam:PF11357
label: Cell cycle regulatory protein
definition: >-
  This entry represents Speedy proteins found in animals. Speedy (Spy1, also known as RINGO A) is a cell cycle regulatory protein which binds and activates CDK1 and CDK2, protein kinases that allows progression through G1/S phase and further replication events. Spy1 activates CDK2 inducing a conformational change of the CDK2 T-loop that avoids its phosphorylation. Spy1 expression overcomes a p27-induced cell cycle arrest to allow for DNA synthesis, so cell cycle progression occurs due to an interaction between Spy1 and p27.
