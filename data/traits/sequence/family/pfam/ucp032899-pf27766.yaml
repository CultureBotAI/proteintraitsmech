identifier: Pfam:PF27766
label: Uncharacterised conserved protein UCP032899, lipoprotein
definition: >-
  Members of this family are surface lipoproteins from Mycoplasmatota bacteria with a plasma membrane but no outer membrane and no cell wall. Members are probably associated with ABC transporter permease and ATPase subunit, and assigned a role in oligopeptide import, but might have additional functions such as cytoadhesion.
