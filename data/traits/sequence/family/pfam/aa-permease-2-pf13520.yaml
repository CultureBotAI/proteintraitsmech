identifier: Pfam:PF13520
label: Amino acid permease
definition: >-
  Amino acid permeases are integral membrane proteins involved in the transport of amino acids into the cell. A number of such proteins have been found to be evolutionary related. These proteins include several yeast specific and general amino acid permeases; Emericella nidulans (Aspergillus nidulans) proline transport protein (gene prnB); Trichoderma harzianum amino acid permease INDA1; Salmonella typhimurium L-asparagine permease (gene ansP); and several Escherichia coli and other bacterial permeases and transport proteins. These proteins seem to contain up to 12 transmembrane segments. This entry consists of members of the amino acid-polyamine-organocation (APC) superfamily. Also included in this entry is the methylthioribose transporter mtrA from Bacillus subtilis, which transports methylthioribose into the cell.
