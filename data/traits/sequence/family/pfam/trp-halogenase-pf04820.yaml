identifier: Pfam:PF04820
label: Tryptophan halogenase
definition: >-
  This family consists of tryptophan halogenases from bacteria and related halogenases from eukaryotes such as fungi and Dictyostelium. The bacterial flavin-dependent tryptophan halogenase PrnA catalyses the chlorination of tryptophan to form 7-chlorotryptophan. The halogenase PltM from the soil bacteria Pseudomonas protegens, catalyses the chlorination of the intermediate compound phloroglucinol to form PG-Cl and PG-Cl2 during antibiotics synthesis, toxic to other bacteria or fungi. These chlorinated compounds regulate the synthesis of a second antibiotic, pyoluteorin. The halogenase gsfI of Penicillium aethiopicum is required for the biosynthesis of the antifungal griseofulvin, a drug used to treat dermatophyte infections. Halogenase gsfI chlorinates the intermediate compound griseophenone C to former another intermediate, griseophenone B. Sulochrin halogenase from Aspergillus terreus converts sulochrin to dihydrogeodin, a step in the biosynthesis of geodin. The halogenase OtaD, also known as Ochratoxin biosynthesis cluster protein 5, is part of the gene cluster that mediates the biosynthesis of ochratoxin A (OTA), a mycotoxin demonstrated to have nephrotoxic, immunotoxic, genotoxic, neurotoxic, and teratogenic properties.
