identifier: Pfam:PF27805
label: Methanobactin biosynthesis cassette protein MbnC-like
definition: >-
  This entry represents a family of proteins from proteobacteria, including Methanobactin biosynthesis cassette protein MbnC from Methylosinus trichosporium, part of the he iron-containing heterodimeric MbnBC enzyme complex, which is central to the biosynthesis of methanobactins (Mbns), copper-binding metallophores isolated from methane-oxidizing bacteria. MbnC consists of an N-terminal α-helical domain and two additional α helices packed against a four-stranded antiparallel β sheet.
