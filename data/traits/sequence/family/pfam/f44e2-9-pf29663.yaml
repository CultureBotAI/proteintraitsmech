label: F44E2.9
definition: >-
  This entry represents the F44E2.9 family, a group of small uncharacterised proteins found primarily in nematodes. F44E2.9 is predicted to be expressed in pharyngeal muscle cells and other tissues. The function of proteins in this family remains to be determined.
