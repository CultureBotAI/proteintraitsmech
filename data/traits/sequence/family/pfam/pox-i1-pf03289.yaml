identifier: Pfam:PF03289
label: Poxvirus protein I1
definition: >-
  This entry represents a family of proteins from poxvirus, including the vaccinia virus I1L (Late) encoded protein, which is also called Telomere-binding protein OPG077. It is a DNA-binding protein which binds to the hairpin form of the viral telomeric sequence. Required for the production of mature virions (MV).
