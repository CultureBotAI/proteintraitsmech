identifier: Pfam:PF12230
label: Pre-mRNA splicing factor PRP21 like protein
definition: >-
  This domain is found in eukaryotes, and is typically between 212 and 238 amino acids in length. It is found in association with . There are two completely conserved residues (W and H) that may be functionally important. It is found in the subunit 1 of mammalian splicing factor SF3A, which is involved in converting the U2 snRNP into its active form during pre-mRNA splicing.
