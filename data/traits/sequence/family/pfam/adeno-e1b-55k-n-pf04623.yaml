identifier: Pfam:PF04623
label: Adenovirus E1B protein N-terminus
definition: >-
  This domain constitutes the N-terminal of E1B 55kDa ( ). E1B 55K binds p53 the tumour suppressor protein converting it from a transcriptional activator which responds to damaged DNA into an unregulated repressor of genes with a p53 binding site. This protects the virus against p53 induced host anitviral responses and prevents apoptosis as induced by the adenovirus E1A protein. The role of the N-terminal in the function of E1B is not known.
