identifier: Pfam:PF09599
label: Salmonella-Shigella invasin protein C (IpaC_SipC)
definition: >-
  Some Gram-negative animal enteropathogens express a specialised secretion system to directly inject exotoxins into the cytoplasm of host cells. The system is composed of structural proteins and exotoxin effectors, often encoded on large virulence plasmids or on the bacterial chromosome itself. Members may be referred to as invasins, pathogenicity island effectors, and cell invasion proteins. The Shigella flexneri invasion plasmid antigen (ipa) genes are found on such a plasmid and are highly regulated. Homologues of the ipa genes (SipC/SspC) have been identified in Salmonella typhimurium, and both pathogens utilise their type III secretion system to translocate invasive effectors into host cells. SipB/SctE1 and SipC/SctB1 are inserted into the host membrane, where they form a pore that permits translocation of effector proteins into the cytosol of target cells. IpaC can activate cellular kinase activity once in the host cytoplasm, thereby promoting uptake of S. flexneri. Furthermore, SipC interacts with the Salmonella protein SipA to enhance actin cytoskeleton reorganisation, facilitating uptake of Salmonella by the eukaryotic cell.
