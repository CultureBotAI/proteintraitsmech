identifier: Pfam:PF11598
label: Cartilage oligomeric matrix protein
definition: >-
  Thrombospondins (TSP) are adhesive glycoproteins that mediate cell-to-cell and cell-to-matrix interactions. Cartilage oligomeric matrix protein (TSP5/COMP) may play a role in the structural integrity of cartilage via its interaction with other extracellular matrix proteins such as collagen and fibronectin. TSP3/4 and TSP5/COMP contain a five-stranded coiled-coil domain represented by this entry. This domain has a binding site between two internal rings formed by Leu37 and Thr40.
