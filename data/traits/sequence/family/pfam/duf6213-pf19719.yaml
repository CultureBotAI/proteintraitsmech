definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001916) is described by MIBiG as an example of the following biosynthetic class, polyketide. It includes a member from the lavendiol biosynthetic gene cluster from Streptomyces lavendulae. This family appears to be predominantly found in Actinobacteria.
