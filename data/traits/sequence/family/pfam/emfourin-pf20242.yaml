identifier: Pfam:PF20242
label: Emfourin
definition: >-
  This family represents a protealysin inhibitor called Emfourin, after M4 family inhibitor (M4in), as protealysin is a metallo-endopeptidase from MEROPS peptidase family M4. Emfourin is a potent inhibitor that forms a 1:1 stoichiometry complex with protealysin.
