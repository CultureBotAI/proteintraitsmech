identifier: Pfam:PF30899
label: Uncharacterised fungal protein SPBC17D1.05
definition: >-
  This entry represents an uncharacterised protein found in Schizosaccharomyces pombe (fission yeast). The protein is approximately 370 residues in length and contains a serine-rich region with predicted disordered segments. The protein is predicted to localise to the cytosol and is involved in the cellular response to heat. The function of this protein remains to be determined.
