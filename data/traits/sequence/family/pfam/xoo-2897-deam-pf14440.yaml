identifier: Pfam:PF14440
label: Xanthomonas XOO_2897-like deaminase
definition: >-
  This entry represents a member of the nucleic acid/nucleotide deaminase superfamily prototyped by Xanthomonas XOO_2897. Members of this family are present in a wide phyletic range of bacteria and are predicted to function as toxins in bacterial polymorphic toxin systems. The Xanthomonas XOO_2897 lack an immunity protein and is predicted to be deployed against its eukaryotic host.
