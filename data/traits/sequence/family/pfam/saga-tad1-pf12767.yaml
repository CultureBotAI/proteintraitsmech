identifier: Pfam:PF12767
label: Transcriptional regulator of RNA polII, SAGA, subunit
definition: >-
  The yeast Spt-Ada-Gcn5-Acetyl (SAGA) transferase complex is a multifunctional coactivator involved in multiple cellular processes, including regulation of transcription by RNA polymerase II. It is formed of five major modular subunits and shows a high degree of structural conservation to human TFTC and STAGA. This entry represents Hfi1 (known as Transcriptional adapter 1, Tada1 in higher eukaryotes), one of the subunits that constitute the SAGA core. It also functions as a component of the SALSA and SLIK complexes.
