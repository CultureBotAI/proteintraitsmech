identifier: Pfam:PF16537
label: 'Type II secretion system protein B '
definition: >-
  GspB is an accessory component of the type II secretion system (T2SS). Together with GspA, it contribute to GspD assembly and transport to the outer membrane possibly by increasing the pore size of the peptidoglycan or anchoring it to this structural meshwork. This entry represents the C-terminal domain of these proteins ( ). The type II secretion system (T2SS) is one of several extracellular secretion systems in gram-negative bacteria. It delivers toxins and a range of hydrolytic enzymes including proteases, lipases and carbohydrate-active enzymes to the cell surface or extracellular space. T2SS systems are composed of 11 to 15 different proteins, which are generally called GspA to GspO and GspS. The T2SS spans the two bacterial membranes and ensures secretion of folded proteins across the outer membrane pore formed by GspD. The inner membrane complex contains GspC, GspL, GspM, and GspF. The cytoplasmic domains of GspL and GspF interact with an ATPase, GspE. GspE is thought to energize the formation of a short pseudopilus by several pilin-like proteins, GspG to GspK. GspD has been shown to interact with the inner membrane component GspC.
