identifier: Pfam:PF10244
label: Mitochondrial ribosomal subunit
definition: >-
  This entry represents the large ribosomal subunit protein mL51 from animals, previously known as MRP-L51. This family of small proteins from the intact 55 S mitochondrial ribosome has otherwise been referred to as bMRP-64. The exact function of this family is not known.
