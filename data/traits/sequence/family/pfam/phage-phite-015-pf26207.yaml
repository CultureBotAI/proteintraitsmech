identifier: Pfam:PF26207
label: Phage PhiTE phiTE_015 protein family
definition: >-
  This entry represents a family of uncharacterised phage proteins that includes Phage PhiTE PhiTE_015 ( ). Structure prediction suggests that this family does not adopt a globular structure. Many proteins contain a RXXFE motif at their N-terminal. This family also includes proteobacterial prophages.
