identifier: Pfam:PF25674
label: Mycobacteriophage Gene 42 protein
definition: >-
  This entry represents the Gene 42 protein (Gp42) found in mycobacteriophages such as D29 and L5. These are small proteins of approximately 70 amino acids in length. The specific function of this protein family is currently unknown. The predicted structure contains a three-stranded β-sheet with an α-helix between strands 1 and 2. Proteins in this family are often annotated as minor tail proteins.
