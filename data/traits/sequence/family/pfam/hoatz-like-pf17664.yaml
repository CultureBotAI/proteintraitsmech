identifier: Pfam:PF17664
label: Cilia- and flagella-associated protein HOATZ-like
definition: >-
  This entry represents cilia- and flagella-associated protein, HOATZ, and related proteins, found in metazoa. In mice HOATZ is encoded by the gene designated 4833427G06Rik (C11orf88). Mouse Hoatz mRNA Is specifically expressed in tissues with motile cilia and flagella. Hoatz knockout mice developed hydrocephalus and male infertility, and the ependymal cilia frequently showed disorganized axonemes.
