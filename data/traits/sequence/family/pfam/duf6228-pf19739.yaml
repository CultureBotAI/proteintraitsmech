identifier: Pfam:PF19739
label: Family of unknown function (DUF6228)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001042) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide. It includes a member from the sanglifehrin A biosynthetic gene cluster from Streptomyces flaveolus. This family appears to be predominantly found in Actinobacteria.
