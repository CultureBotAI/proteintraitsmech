identifier: Pfam:PF00602
label: Influenza RNA-dependent RNA polymerase subunit PB1
definition: >-
  Influenza RNA-dependent RNA polymerase is composed of three subunits; P1 (or PB1), P2 (or PA), and P3 (or PB2). There are two separate domains in the influenza virus PB1 protein involved in the interaction with the PB2 and PA subunits. PB1 is the core of the complex and accounts for the polymerase activity.
