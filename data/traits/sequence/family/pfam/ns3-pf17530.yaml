identifier: Pfam:PF17530
label: Non-structural protein NS3
definition: >-
  This is a family of proteins found in viruses. Members of this family such as NS3 found in Junonia coenia have been shown to be involved in viral DNA replication. Generation of deletion mutants and replicative cycle analysis show that NS3 is required for viral DNA replication. Bioinformatics analysis of Bombyx mori densovirus protein NS3, show that it has two putative zinc-finger motifs, 6 putative N glycosylation sites, and 4 putative phosphorylation sites.
