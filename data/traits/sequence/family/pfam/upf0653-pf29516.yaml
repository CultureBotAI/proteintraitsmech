identifier: Pfam:PF29516
label: UPF0653
definition: >-
  This entry represents a group of uncharacterised proteins found in ascomycetes that belong to the UPF0653 family. This family includes C607.02c from Schizosaccharomyces pombe. The protein is localised to the nucleus and nucleolus. The protein contains multiple disordered regions and regions of compositional bias. The function of this protein family remains to be determined.
