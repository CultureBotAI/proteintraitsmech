identifier: Pfam:PF16913
label: Purine nucleobase transmembrane transport
definition: >-
  This entry represent a group of purine permeases (PUPs) from plants, including AtPUP1-22 from Arabidopsis. AtPUP1 and 2 mediate energy-dependent high-affinity adenine uptake and cytokinin transport. However, the transporter function of other family members is not clear - they may act as transporters for nucleosides, nucleotides, and their derivatives.
