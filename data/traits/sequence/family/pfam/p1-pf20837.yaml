identifier: Pfam:PF20837
label: Major inner capsid protein P1
definition: >-
  This entry represents a group of proteins from Cystovirus, including Major inner capsid protein P1, which forms the inner T=1 shell of Bacteriophage phi-6, a dodecahedral polymerase complex (PC) that contains the three viral dsRNA segments. The protein folds into a flattened trapezoid shape with a mostly α-helical fold. It was initially though to adopt a funnel-shaped pentameric assembly, but later research has shown dimers of different P1 chains are also present in the virus capsid.
