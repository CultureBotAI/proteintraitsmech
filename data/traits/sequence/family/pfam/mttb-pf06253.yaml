identifier: Pfam:PF06253
label: Trimethylamine methyltransferase (MTTB)
definition: >-
  This family consists of several trimethylamine methyltransferase (MTTB) proteins. This enzyme, which catalyses the transfer of a methyl group from trimethylamine to a trimethylamine-specific corrinoid protein (MttC), is involved in methanogenesis from trimethylamine. This family also includes MtgB, a glycine betaine methyltransferase; MtcB, which is involved in the degradation of the quaternary amine L-carnitine; and MtpB, which is involved in the degradation of the quaternary amine L-proline betaine.
