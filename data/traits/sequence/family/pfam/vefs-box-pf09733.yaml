identifier: Pfam:PF09733
label: VEFS-Box of polycomb protein
definition: >-
  The VEFS-Box is found in the the C-terminal region of the VRN2, EMF2, FIS2, and Su(z)12 polycomb proteins. This domain is characterised by an acidic cluster and a tryptophan/methionine-rich sequence, the acidic-W/M domain. In some proteins the VEFS-Box is associated with a zinc-finger domain located roughly 100 residues towards the N terminus. These proteins are part of the polycomb cluster of proteins which control HOX gene transcription as it functions in heterochromatin-mediated repression.
