identifier: Pfam:PF30118
label: Augmin complex subunit msd1
definition: >-
  This entry represents the MSD1 family of proteins found in arthropods. MSD1 is a component of the augmin complex which plays a role in centrosome-independent generation of spindle microtubules. The protein is required for microtubule nucleation from within the mitotic spindle and for localisation of Grip71 to centrosomes and mitotic spindle. MSD1 is part of the eight-subunit augmin complex composed of dgt2, dgt3, dgt4, dgt5, dgt6, msd1, msd5 and wac. Mutants show increased mitotic spindle length and reduced mitotic spindle density. The protein localises to the cytoplasm and spindle.
