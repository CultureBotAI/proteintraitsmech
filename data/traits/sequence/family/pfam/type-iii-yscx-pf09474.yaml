identifier: Pfam:PF09474
label: Type III secretion system YscX (type_III_YscX)
definition: >-
  Members of this family are encoded within bacterial type III secretion gene clusters and includes Type III secretion protein SctX ( ) and Yop proteins translocation protein X. Among all species with type III secretion, those with this protein are found among those that target animal rather than plant cells. The member of this family in Yersinia was shown by mutation to be required for type III secretion of Yops effector proteins and therefore is believed to be part of the secretion machinery.
