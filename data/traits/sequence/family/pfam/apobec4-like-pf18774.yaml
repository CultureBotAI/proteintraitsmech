identifier: Pfam:PF18774
label: APOBEC4-like -AID/APOBEC-deaminase
definition: >-
  This entry includes APOBEC1 from animals. APOBEC1 is a catalytic component of the apolipoprotein B mRNA editing enzyme complex which is responsible for the postranscriptional editing of a CAA codon for Gln to a UAA codon for stop in the APOB mRNA. The AID/APOBEC are deaminases that function in RNA/DNA editing. The AID/APOBEC family contains several subfamilies: AID, APOBEC1, APOBEC2, APOBEC3, APOBEC4 and APOBEC5. AID/APOBEC deaminases (AADs) convert cytidine to uridine in single-stranded nucleic acids. They are involved in numerous mutagenic processes, including those underpinning vertebrate innate and adaptive immunity. APOBEC were suggested to originate from ancestral AID genes expressed in the lymphocytes of jawless fish over 500 million years ago. Gene duplication and diversification of AID structure and function, probably contributed to the evolutionary process leading to genes that encode the APOBEC proteins of amphibians, birds, and tetrapods including primates.
