identifier: Pfam:PF15609
label: Phosphoribosyl transferase
definition: >-
  This phosphoribosyl transferase (PRTase) domain is related to OPRTases, and are predicted to use orotate as substrate. These genes are found in the biosynthetic operon associated with the Ter stress-response operon and are predicted to be involved in the biosynthesis of a ribo-nucleoside involved in stress response.
