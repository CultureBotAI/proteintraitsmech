identifier: Pfam:PF10642
label: Mitochondrial import receptor subunit or translocase
definition: >-
  This entry represents a short family of yeast proteins. Tom5 is one of three very small translocases of the mitochondrial outer membrane. Tom5 links mitochondrial preprotein receptors to the general import pore. Although Tom5 has allegedly been identified in vertebrates this could not be confirmed.
