identifier: Pfam:PF30102
label: YonD C-terminal coiled coil region
definition: >-
  This entry represents the C-terminal domain of YonD, a 478 amino acid virion structural protein from the SPbeta prophage of Bacillus subtilis. YonD contains three domains: an N-terminal domain ( ), a middle domain ( ) and this C-terminal domain. The protein is mainly found in proteins across Bacillales. The specific function of this domain remains to be determined.
