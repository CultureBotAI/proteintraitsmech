identifier: Pfam:PF04245
label: Nucleoid-associated protein YejK
definition: >-
  The Escherichia coli nucleoid contains DNA in a condensed but functional form. Analysis of proteins released from isolated spermidine nucleoids after treatment with DNase I revealed significant amounts of two proteins not previously detected in wild-type E. coli. Partial amino-terminal sequencing has identified them as the products of rdgC and yejK. These proteins are strongly conserved in Gram-negative bacteria, suggesting that they have important cellular roles. This entry represents the product of gene yejK, nucleoid associated protein NdpA.
