identifier: Pfam:PF06258
label: Mitochondrial fission ELM1
definition: >-
  In plants, this family is involved in mitochondrial fission. It binds to dynamin-related proteins and plays a role in their relocation from the cytosol to mitochondrial fission sites. Its function in bacteria is unknown.
