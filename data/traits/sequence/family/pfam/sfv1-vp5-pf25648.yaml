identifier: Pfam:PF25648
label: Sulfolobus filamentous virus 1 major coat protein VP5
definition: >-
  This entry represents one of the two major coat proteins (VP5) of Sulfolobus filamentous virus 1 (SFV1), a membrane-enveloped filamentous virus that infects the hyperthermophilic acidophile Sulfolobus shibatae. VP5 forms a heterodimer with VP4 and wraps around A-form DNA. Compared to VP4, VP5 has an insertion containing two beta-strands and a C-terminal extension containing two short helices that contacts subunits in adjacent helical turns. The N-terminal portion of VP5 contains 6-7 residues that project deeply into the hollow core of the viral DNA. Despite having no detectable sequence similarity with VP4 or with coat proteins from other archaeal filamentous viruses, VP5 exhibits remarkable structural similarity to these proteins.
