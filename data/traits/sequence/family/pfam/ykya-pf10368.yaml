identifier: Pfam:PF10368
label: Putative cell-wall binding lipoprotein
definition: >-
  The YkyA family of proteins contain a lipoprotein signal and a hydrolase domain. They are similar to cell wall binding proteins and might also be recognisable by a host immune defence system. It is thus likely that they function in pathways important for pathogenicity.
