identifier: Pfam:PF05160
label: DSS1/SEM1 family
definition: >-
  This family includes yeast Sem1 and its mammalian homologue, DSS1. Sem1/DSS1 (also known as rpn15) is a component of lid subcomplex of 26S proteasome regulatory subunit. Besides being a subunit of the 26S proteasome, Sem1/DSS1 associates with other protein complexes. It is a component of the nuclear pore complex (NPC)-associated TREX-2 complex that is required for transcription-coupled mRNA export, and the COP9 signalosome, which is involved in deneddylation.
