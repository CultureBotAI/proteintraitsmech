identifier: Pfam:PF10113
label: FeGP cofactor biosynthesis protein, fibrillarin family
definition: >-
  This family includes Iron-guanylylpyridinol cofactor synthase HcgG, a probable radical S-adenosyl methionine (SAM) enzyme involved in the biosynthesis of the iron-guanylylpyridinol (FeGP) cofactor used by [Fe]-hydrogenase. HcgG contributes to CO ligand formation and completes biosynthesis of the FeGP cofactor. This entry also includes HcgA from Methanococcus maripaludis (MMP0125, ) and similar archaeal proteins. Proteins annotated as HmdC, whose gene regularly occurs in the context of genes for HmdA (5,10-methenyltetrahydromethanopterin hydrogenase) and the radical SAM protein HmdB involved in biosynthesis of the HmdA cofactor, also belong to this family. Bioinformatics suggests this protein, a homologue of eukaryotic fibrillarin, may be involved in biosynthesis of the guanylyl pyridinol cofactor in HmdA.
