identifier: Pfam:PF26841
label: Hendrixvirinae small terminase family
definition: >-
  The Hendrixvirinae small terminase family is involved in the packaging of viral DNA into procapsids. The small subunit of the terminase complex binds to the packaging initiation site and regulates the ATPase activity of the large subunit. It recognizes the packaging sequence in the viral DNA, facilitating the translocation of DNA into the capsid. The small subunit forms a homononamer ring structure through which the DNA is translocated. The active complex consists of a pentamer ring of large subunits and a nonamer ring of small subunits, which interact with the portal protein to form the packaging machine. The process continues until the DNA is cut to release a nucleocapsid filled with a unit-length genome. Members of this protein family are found in tailed bacteriophages and bacterial prophages.
