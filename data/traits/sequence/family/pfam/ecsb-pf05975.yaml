identifier: Pfam:PF05975
label: Bacterial ABC transporter protein EcsB
definition: >-
  The ATP-Binding Cassette (ABC) superfamily forms one of the largest of all protein families with a diversity of physiological functions. Several studies have shown that there is a correlation between the functional characterisation and the phylogenetic classification of the ABC cassette. More than 50 subfamilies have been described based on a phylogenetic and functional classification. This family consists of several bacterial ABC transporter proteins which are homologous to the EcsB protein of Bacillus subtilis. EcsB is thought to encode a hydrophobic protein with six membrane-spanning helices in a pattern found in other hydrophobic components of ABC transporters.
