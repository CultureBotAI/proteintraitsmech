identifier: Pfam:PF06703
label: Microsomal signal peptidase 25 kDa subunit (SPC25)
definition: >-
  This family represents the Signal peptidase complex subunit 2 (SPCS2) and its homologues, such as Spc2 from budding yeasts. The signal peptidase complex cleaves the signal sequence from proteins targeted to the endoplasmic reticulum (ER). Mammalian signal peptidase is as a complex of five different polypeptide chains, while the budding yeast SPC comprises four proteins. Budding yeast Spc2 has been shown to be a nonessential component of the signal peptidase complex. Spc2 has been shown to enhance the enzymatic activity of the SPC and facilitate the interactions between different components of the translocation site. Translocation of polypeptide chains across the endoplasmic reticulum (ER) membrane is triggered by signal sequences. Subsequently, signal recognition particle interacts with its membrane receptor and the ribosome-bound nascent chain is targeted to the ER where it is transferred into a protein-conducting channel. At some point, a second signal sequence recognition event takes place in the membrane and translocation of the nascent chain through the membrane occurs. The signal sequence of most secretory and membrane proteins is cleaved off at this stage. Cleavage occurs by the signal peptidase complex (SPC) as soon as the lumenal domain of the translocating polypeptide is large enough to expose its cleavage site to the enzyme. The signal peptidase complex is possibly also involved in proteolytic events in the ER membrane other than the processing of the signal sequence, for example the further digestion of the cleaved signal peptide or the degradation of membrane proteins.
