identifier: Pfam:PF08095
label: Hefutoxin family
definition: >-
  This family consists of the hefutoxins that are found in the venom of the scorpion Heterometrus fulvipes (Indian black scorpion). These toxins, kappa-hefutoxin1 and kappa-hefutoxin2, exhibit no homology to any known toxins. The hefutoxins are potassium channel toxins.
