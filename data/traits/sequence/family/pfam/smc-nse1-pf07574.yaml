identifier: Pfam:PF07574
label: Nse1 non-SMC component of SMC5-6 complex
definition: >-
  Saccharomyces cerevisiae Nse1 ( ) forms part of a complex with SMC5-SMC6. This non-structural maintenance of chromosomes (SMC) complex plays an essential role in genomic stability, being involved in DNA repair and DNA metabolism. It is conserved in eukaryotes from yeast to human. Nse1 acts in a DNA repair pathway for removal of UV-induced DNA damage that is distinct from classical nucleotide excision repair and in repair of ionizing radiation damage. It also functions in homologous recombination repair of DNA double strand breaks and in recovery of stalled replication forks.
