identifier: Pfam:PF03452
label: Anp1
definition: >-
  The members of this family (Anp1, Van1 and Mnn9) are membrane proteins required for proper Golgi function. These proteins colocalize within the cis Golgi, where they are physically associated in two distinct complexes.
