identifier: Pfam:PF23805
label: Family of unknown function (DUF7180)
definition: >-
  This entry represents an uncharacterised protein that is found in a variety of phage, predominantly infecting bacteria from the Enterobacteriaceae family such as Escherichia and Salmonella. The protein is typically between 75-120 amino acids in length. These proteins have a highly conserved N terminus.
