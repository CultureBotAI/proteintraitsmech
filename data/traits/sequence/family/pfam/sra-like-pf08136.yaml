identifier: Pfam:PF08136
label: Ribosome hibernation factor SRA
definition: >-
  This family represents the stationary-phase-induced ribosome-associated protein SRA also known as protein D. This protein was originally thought to be a ribosomal protein. More recently it was shown that this is a bona fide ribosome hibernation factor that together with the factors Rmf, Hpf and RaiA is bound to the ribosomes during the onset and a few first days of the stationary phase when translation is strongly suppressed. In the prolonged stationary phase, these factors dissociate from the ribosomes.
