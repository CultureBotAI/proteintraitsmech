identifier: Pfam:PF28027
label: TipC immunity protein-like
definition: >-
  Gram-positive bacteria transport macromolecules across the membrane through a multi-subunit membrane protein complex known as the type VII secretion system (T7SS). This family is represents homologues of TipC (also known as TipC1), an immunity protein for the toxin TelC, which is a type VII secretion system (T7SS) effector lipid II phosphatase. It was shown that TipC localises to the plasma membrane via an N-terminal transmembrane domain and that the upstream soluble region of TipC is sufficient to inhibit the toxic lipid II phosphatase activity of TelC.
