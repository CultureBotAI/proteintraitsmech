identifier: Pfam:PF23823
label: Family of unknown function (DUF7193)
definition: >-
  This entry represents a family of viral proteins that are found in various bacteriophages infecting Gram-negative bacteria, such as Pseudomonas, Vibrio, Erwinia, Ralstonia, and Klebsiella. The family members are typically 800-1200 residues in length. Many are annotated as putative virion structural proteins, suggesting they may play a role in phage particle structure or assembly. However, the precise function of this family remains unknown.
