identifier: Pfam:PF15592
label: Immunity protein 41
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved SF motif and tryptophan residue. Proteins in this entry are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Ntox21, Ntox29 or Tox-ART-RSE-like ADP-ribosyltransferase families.
