identifier: Pfam:PF00159
label: Pancreatic hormone peptide
definition: >-
  This entry represents a group of animal proteins, including Pancreatic hormone, also known as Pancreatic polypeptide is a peptide (PP), which is synthesized in pancreatic islets of Langherhans and acts as a regulator of pancreatic and gastrointestinal functions. The hormone is produced as a larger propeptide, which is enzymatically cleaved to yield the mature active peptide: this is 36 amino acids in length and has an amidated C terminus. The hormone has a globular structure, residues 2-8 forming a left-handed poly-proline-II-like helix, residues 9-13 a β-turn, and 14-32 an α-helix, held close to the first helix by hydrophobic interactions. Unlike glucagon, another peptide hormone, the structure of pancreatic peptide is preserved in aqueous solution. Both N- and C- terminal ends are required for activity: receptor binding and activation functions may reside in the N and C termini respectively. Pancreatic hormone is part of a wider family of active peptides that includes: Neuropeptide Y (NPY or melanostatin), one of the most abundant peptides in the mammalian nervous system. NPY is implicated in the control of feeding and the secretion of the gonadotropin-releasing hormone. Peptide YY (PYY). PPY is a gut peptide that inhibits exocrine pancreatic secretion, has a vasoconstrictor action and inhibits jejunal and colonic mobility. Known as goannatyrotoxin-Vere1 in the venom of the pygmy desert monitor lizard (Varanus eremius) where it has a triphasic action: rapid biphasic hypertension followed by prolonged hypotension in prey animals. Various NPY and PYY-like polypeptides from fish and amphibians. Neuropeptide F (NPF) from invertebrates such as worms and snail. Skin peptide Tyr-Tyr (SPYY) from the frog Phyllomedusa bicolor. SPYY shows a large spectra of antibacterial and a…
