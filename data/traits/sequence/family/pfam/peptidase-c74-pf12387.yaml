identifier: Pfam:PF12387
label: Pestivirus NS2 peptidase
definition: >-
  The pestivirus NS2 peptidase is responsible for single cleavage between NS2 and NS3 of the Bovine viral diarrhea virus 1 polyprotein, a cleavage that is correlated with cytopathogenicity. The peptidase is activated by its interaction with 'J-domain protein interacting with viral protein' Jiv.
