identifier: Pfam:PF30751
label: Coiled-coil domain-containing protein 77
definition: >-
  This entry represents coiled-coil domain-containing protein 77 (CCDC77), a protein found in vertebrates including mammals, birds and fish. The protein is approximately 490 residues in length and contains extensive coiled-coil regions. Human CCDC77 has been identified at the centrosome by mass spectrometry. The protein undergoes post-translational modifications including SUMOylation and phosphorylation. The function of CCDC77 remains to be determined.
