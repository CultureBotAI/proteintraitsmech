identifier: Pfam:PF16560
label: Putative mobile pathogenicity island
definition: >-
  This entry represents a group of putative Staphylococcus pathogenicity island proteins. SAPIs (S. aureus pathogenicity islands) are responsible for many superantigen-related diseases in humans as they carry two or more superantigens.
