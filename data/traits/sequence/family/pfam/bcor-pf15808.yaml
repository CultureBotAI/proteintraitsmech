identifier: Pfam:PF15808
label: BCL-6 co-repressor, non-ankyrin-repeat region
definition: >-
  This domain is found in eukaryotes, and is approximately 220 amino acids in length. It lies just upstream of the ankyrin-repeat region at the C terminus of BCL-6 corepressor proteins. The function of this domain is not known.
