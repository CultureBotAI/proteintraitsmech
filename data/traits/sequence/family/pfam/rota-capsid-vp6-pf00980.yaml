identifier: Pfam:PF00980
label: Rotavirus major capsid protein VP6
definition: >-
  Rotaviruses consist of three concentric protein shells. The intermediate (middle) protein layer contains VP6, the major internal structural protein. VP6 is the most abundant protein in the virion and is involved in virion assembly, VP6 possesses the ability to interact with VP2, VP4 and VP7.
