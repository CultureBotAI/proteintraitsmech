identifier: Pfam:PF15699
label: NPR1 interacting
definition: >-
  NIMIN1/3 are linked to the salicylic acid-dependent systemic acquired resistance response (SAR), a plant immune response. They interact via a motif at the C terminus with the regulatory protein NPR1 (also known as NIM1), a key regulator of SAR in Arabidopsis. NH1 is the rice orthologue of NPR1, and NRR has been identified as an NH1 and NPR1 interactor. NH1 is a transcriptional co-activator that represses NH1-mediated activation. NRR homologues 1, 2 and 3 (RH1, RH2, and RH3) have also been reported to bind to, and repress to varying degrees, NH1-mediated transcriptional activation. RH1 and RH3, but not RH2, also effectively repress NH1-mediated transcriptional activation.
