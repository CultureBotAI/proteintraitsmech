identifier: Pfam:PF10799
label: Biofilm formation protein (YliH/bssR)
definition: >-
  This entry represents Biofilm regulator, BssR (from the gene also known as yliH). It represses Escherichia coli biofilm formation in M9C glu and LB glu media but not in M9C and LB media. It may act as a global regulator of several genes involved in catabolite repression and stress response and regulation of the uptake and export of signalling pathways. It could also be involved the regulation of indole as well as uptake and export of AI-2 through a cAMP-dependent pathway.
