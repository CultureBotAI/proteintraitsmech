identifier: Pfam:PF15164
label: Williams-Beuren syndrome chromosomal region 28 protein homologue
definition: >-
  Transmembrane protein 270, also known as WBS28, is an integral membrane protein. These proteins have been identified as being linked to Williams-Beuren syndrome, which is a neurodevelopmental and multisystemic disease that is characterised by mental retardation with unique cognitive and personality profile and multiple dysmorphic and metabolic features. This family is found in eukaryotes and proteins are typically 266 amino acids in length.
