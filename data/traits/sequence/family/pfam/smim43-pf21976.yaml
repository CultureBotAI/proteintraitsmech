identifier: Pfam:PF21976
label: Small integral membrane protein 43
definition: >-
  This protein family includes human Small integral membrane protein 43 (SMIM43, also known as NEMEP) and similar sequences from vertebrates. This protein has been associated with HIV and hepatitis C infection as well as with brain tumours and probably with essential tremor, cerebellar atrophy and other disorders. It is required for mesendoderm differentiation. It interacts with glucose transporters and promotes glucose uptake.
