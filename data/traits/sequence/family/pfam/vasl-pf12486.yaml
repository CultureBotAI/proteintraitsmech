identifier: Pfam:PF12486
label: Type VI secretion system, EvfB, or VasL
definition: >-
  This entry represents a conserved region located towards the C-terminal end of ImpA and related proteins. ImpA is an inner membrane protein, which has been suggested to be involved with proteins that are exported and associated with colony variations in Actinobacillus actinomycetemcomitans. Note that many members are hypothetical proteins.
