identifier: Pfam:PF15299
label: Amyotrophic lateral sclerosis 2 chromosomal region candidate gene 8
definition: >-
  This entry represents calcium-responsive transcription factor (CaRF, also known as amyotrophic lateral sclerosis 2 chromosomal region candidate gene 8 protein). CaRF acts as a transcriptional activator that mediates the calcium- and neuron-selective induction of BDNF exon III transcription. It binds to the consensus calcium-response element CaRE1 5'-CTATTTCGAG-3' sequence.
