label: Uncharacterised protein YkzP
definition: >-
  This entry represents the YkzP family of uncharacterised proteins of approximately 51 amino acids found in Bacillus and related Bacillales. The protein contains a disordered region (residues 1-51). The function of this family remains to be determined.
