identifier: Pfam:PF12363
label: Phage tail assembly chaperone protein, TAC
definition: >-
  This is a family of phage tail assembly chaperone proteins from Siphoviridae phages. TACs are required for the morphogenesis of all long-tailed phages. The proposed function for the TAC is to coat the tape-measure protein to prevent it from forming unproductive complexes or precipitating before the tail tube protein has been incorporated. Members are also found in bacterial prophages.
