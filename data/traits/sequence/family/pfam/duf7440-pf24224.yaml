identifier: Pfam:PF24224
label: Family of unknown function (DUF7440)
definition: >-
  This entry represents a protein family of unknown function found in various bacterial phage proteins. The family typically consists of proteins around 140-160 amino acids in length. It is found in phages that infect bacteria such as Salmonella, Escherichia, Shigella, and Dickeya. The function of this family remains unclear. Some members of this family are annotated as uncharacterised or hypothetical proteins. AlphaFold predictions suggest the proteins in this family contain two distinct domains, with a central domain composed of a three stranded β-sheet and a C-terminal small 3-helix bundle domain.
