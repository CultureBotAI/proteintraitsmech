identifier: Pfam:PF30190
label: FLP-26 neuropeptide precursor
definition: >-
  This entry represents FLP-26 neuropeptide precursors. This protein is found in FMRFamide-like neuropeptide precursors from nematodes. The proteins belong to the FARP (FMRFamide related peptide) family and are involved in neuropeptide signalling pathways. The precursors are secreted and expressed in distinct sets of neurons.
