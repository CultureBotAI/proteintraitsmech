identifier: Pfam:PF29599
label: Uncharacterised protein Rv0250c
definition: >-
  This entry represents Rv0250c, a 97 amino acid uncharacterised protein from Mycobacterium tuberculosis. Rv0250c is a target of thioredoxin proteins (TrxB and TrxC) involved in redox regulation. The protein is encoded in the succinate dehydrogenase (Sdh1) operon and is upregulated during stress conditions. Rv0250c is found in proteins across Actinomycetes, including Mycobacterium, Nocardia, and Streptomyces species. The function of this protein remains to be determined.
