identifier: Pfam:PF31135
label: Domesticated amidase effector 2
definition: >-
  This entry represents cell wall amidases, including domesticated amidase effector 2 (Dae2) from ticks and type VI amidase effector 2 (Tae2, also known as BTH_I0068 ) from bacteria. Dae2 has been horizontally acquired from bacteria and has structurally and biochemically diverged from its ancestral bacterial counterparts, leading to broadened antimicrobial specificity. Dae2 is a gut and saliva antibacterial peptide that directly antagonizes host skin commensals which enter the ticks during feeding. It acts as a cell wall hydrolase that cleaves the bond between gamma-D-glutamate-meso-diaminopimelate of a peptide stem and D-alanine of another peptide stem in peptidoglycans. These proteins are predicted to fold into an open β-barrel with SH3-like topology.
