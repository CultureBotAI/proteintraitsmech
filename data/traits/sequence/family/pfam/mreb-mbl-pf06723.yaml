identifier: Pfam:PF06723
label: MreB/Mbl protein
definition: >-
  This entry consists of bacterial MreB and MreB-like (Mbl) proteins and the related MamK proteins. MreB forms membrane-associated dynamic filaments that are essential for cell shape determination. Genes coding for MreB/Mbl are only found in elongated bacteria, not in coccoid forms. It has been speculated that constituents of the eukaryotic cytoskeleton (tubulin, actin) may have evolved from prokaryotic precursor proteins closely related to today's bacterial proteins FtsZ and MreB/Mbl. MamK ia an actin-like protein with ATPase activity which forms dynamic cytoplasmic filaments. It is found in magnetotactic bacteria, being important to organise magnetosome organelles into chains that are used for navigation along geomagnetic fields.
