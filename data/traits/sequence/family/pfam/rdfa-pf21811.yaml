identifier: Pfam:PF21811
label: Rod-determining factor A
definition: >-
  This entry represents a family of proteins from halobacteria, including Rod-determining factor A (RdfA) from Haloferax volcanii ( ). RdfA is required for the formation of rods under specific growth conditions, and is therefore involved in motility. Protein members of this family possess four highly conserved cysteine residues at the C-terminal that could potentially be involved in zinc binding.
