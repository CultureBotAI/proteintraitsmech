identifier: Pfam:PF30424
label: HTH-type transcriptional regulator DicA C-terminal region
definition: >-
  This entry represents the C-terminal region of DicA, an HTH-type transcriptional regulator found in bacteria. The N-terminal domain represents the HTH domain. DicA acts as a repressor protein involved in cell division inhibition.
