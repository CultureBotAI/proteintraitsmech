identifier: Pfam:PF30346
label: Coiled-coil serine-rich protein family
definition: >-
  This entry represents the coiled-coil serine-rich (CCSER) protein family, which includes CCSER1 and CCSER2. Mouse CCSER2, also known as GCAP14 (granule cell antiserum positive protein 14), is a microtubule-binding protein that promotes microtubule bundling. CCSER2 associates with microtubules during interphase and shows diffuse cytoplasmic localisation during mitosis. The family is found in vertebrates.
