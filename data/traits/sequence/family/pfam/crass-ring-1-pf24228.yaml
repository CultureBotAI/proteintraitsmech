identifier: Pfam:PF24228
label: Phage tail ring protein 1
definition: >-
  This entry includes the Ring protein 1 (R1) from Bacteroides phage crAss001, also known as gp43, which is part of the tail assembly in CrAss-like phages (crassviruses). R1 forms one of five stacked dodecameric rings that make up the tail barrel. These proteins share a conserved fold consisting of two domains: an α-helical domain and a β-sandwich domain. The extended tail barrel formed by these ring proteins is a distinctive feature of crassviruses and may assist the tail muzzle in reaching the outer cell membrane through the compact capsular polysaccharide layer of the host bacteria.
