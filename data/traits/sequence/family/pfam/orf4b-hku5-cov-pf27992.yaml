identifier: Pfam:PF27992
label: Bat coronavirus HKU5 Non-structural protein 3c
definition: >-
  This entry represents the accessory protein 4b (ORF4b) and Non-structural protein 3c from bat coronavirus and related proteins from betacoronavirus. ORF4b/NS3c plays a role in the inhibition of host innate immunity by inhibiting the interaction between host IkappaB kinase epsilon (IKBKE or IKKE) and mitochondrial antiviral-signalling protein (MAVS). In turn, this inhibition prevents the production of host interferon beta. Additionally, it may also interfere with host antiviral response within the nucleus. ORF4b/NS3c proteins in this subgroup are similar to the MERS-CoV ORF4b (also known as MERS-CoV 4b) which has been shown to interfere with the NF-kappaB-dependent innate immune response during infection, as well as antagonising the early antiviral α/β interferon (IFN-α/β) response, which may significantly contribute to MERS-CoV pathogenesis.
