identifier: Pfam:PF10040
label: CRISPR-associated endoribonuclease Cas6
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. Cas6 is a member of the RAMP (repeat-associated mysterious protein) superfamily. It is among the most widely distributed Cas proteins and is found in both bacteria and archaea. Cas6 functions in the generation of CRISPR-derived guide RNAs for invader defense in prokaryotes. The structure of this protein showed it adopts a tandem ferredoxin/RRM fold. This entry represents a domain found in some CRISPR-associated proteins Cas6 and in uncharacterised proteins.
