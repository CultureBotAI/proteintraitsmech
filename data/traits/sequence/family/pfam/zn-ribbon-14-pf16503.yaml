identifier: Pfam:PF16503
label: Zinc-ribbon
definition: >-
  This entry represents the C-terminal zinc-ribbon domain of cytoplasmic tRNA adenylyltransferase 1 (CTU1, NCS6), a protein required for uridine thiolation of Gln, Lys, and Glu tRNAs. CTU1 also carries an ATP-binding domain towards the N terminus.
