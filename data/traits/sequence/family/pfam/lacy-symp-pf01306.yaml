identifier: Pfam:PF01306
label: LacY proton/sugar symporter
definition: >-
  In bacteria there are a number of families of transport proteins, including symporters and antiporters, that mediate the intake of a variety of sugars with the concomitant uptake of hydrogen ions (proton symporters). The LacY family of Escherichia coli and Klebsiella pneumoniae are proton/beta-galactoside symporters, which, like most sugar transporters, are integral membrane proteins with 12 predicted transmembrane (TM) regions. Also similar to the LacY family are the rafinose (RafB) and sucrose (CscB) permeases from E. coli and melibiose permease (MelY) from Enterobacter cloacae.
