identifier: Pfam:PF15588
label: Immunity protein 10
definition: >-
  This entry represents a predicted immunity protein with a mostly all-β fold and a conserved arginine residue. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a Pput_2613 deaminase domain. The protein is also found in heterogeneous polyimmunity loci.
