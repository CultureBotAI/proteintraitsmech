identifier: Pfam:PF02593
label: Domain of unknown function
definition: >-
  This entry represents Thymidylate synthase (MJ0757) from Methanocaldococcus jannaschii. This protein is able to catalyse the biosynthesis of dTMP using dUMP, tetrahydrofolate and formaldehyde in vitro, i.e. a reaction equivalent to that catalysed by bacterial thymidylate synthases . However, M.jannaschii like most methanogenic Archaea lacks folates, thus the physiological cosubstrate is unknown but is likely one of the non-methylated methanopterin biosynthetic intermediates. This entry also includes Uncharacterized protein MJ0575 and Uncharacterized protein MJ0838. A member of this family from Methanococcus maripaludis was found to be important for fitness during autotrophic growth and may have an accessory role in carbon dioxide assimilation.
