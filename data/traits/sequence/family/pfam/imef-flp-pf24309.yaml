identifier: Pfam:PF24309
label: IMEF cargo Flp protein
definition: >-
  Proteins in this entry are part of the iron-mineralizing encapsulin-associated Firmicute (IMEF) system found in encapsulin nanocompartments. Encapsulins are involved in microbial iron storage and redox metabolism. The IMEF cargo protein ( ) from Quasibacillus thermotolerans (also known as ferritin-like protein) has been characterised as a ferritin-like iron-binding protein that may play a role in iron mineralization in the encapsulin nanocompartment. It has ferroxidase activity even when encapsulated, the rate is probably controlled by the rate of Fe flux across the nanocompartment pores.
