identifier: Pfam:PF30522
label: Microtubule-associated protein 6
definition: >-
  Microtubule-associated protein 6 (MAP6) is a calmodulin binding protein that is involved in microtubule stabilisation. Neurons contain abundant subsets of highly stable microtubules that resist de-polymerising conditions such as exposure to the cold. Stable microtubules are thought to be essential for neuronal development, maintenance, and function. MAP6 is a major factor responsible for the intriguing stability properties of neuronal microtubules and is important for synaptic plasticity. It regulates axonal growth during neuron polarisation, which is controlled by a palmitoylation cycle. MAP6 interacts with TMEM106B, and this interaction is crucial for controlling dendritic trafficking of lysosomes, presumably by acting as a molecular brake for retrograde transport. TMEM106B is a major risk factor for frontotemporal lobar degeneration with TDP-43 pathology.
