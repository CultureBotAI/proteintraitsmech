label: AUX/IAA family
definition: >-
  Transcription of the AUX/IAA family of genes is rapidly induced by the plant hormone auxin. Some members of this family are longer and contain an N-terminal DNA binding domain, such as . This entry represents the C-terminal region of the AUX/IAA proteins. The function of this region is uncertain.
