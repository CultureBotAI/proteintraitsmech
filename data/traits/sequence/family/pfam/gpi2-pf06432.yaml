identifier: Pfam:PF06432
label: Phosphatidylinositol N-acetylglucosaminyltransferase
definition: >-
  This entry represents the subunit C of the phosphatidylinositol N-acetylglucosaminyltransferase (PIG-C) and its yeast homologue, Gpi2. It catalyses the transfer of N-acetylglucosamine from UDP-N-acetylglucosamine to phosphatidylinositol, the first step of GPI biosynthesis. This step involves products of three or four genes in both yeast (GPI1, GPI2 and GPI3) and mammals (GPI1, PIG A, PIG H and PIG C), respectively.
