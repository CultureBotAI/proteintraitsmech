identifier: Pfam:PF14512
label: Putative TM nitroreductase
definition: >-
  Compared with the more traditional NADH oxidase/flavin reductases, this domain is a duplication, consisting of two similar domains arranged as the subunits of the dimeric NADH oxidase/flavin reductase with one conserved active site. It gets its name from uncharacterised protein TM1586 from Thermotoga maritima ( ).
