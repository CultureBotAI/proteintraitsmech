identifier: Pfam:PF10171
label: Translocase of the Inner Mitochondrial membrane 29
definition: >-
  This entry includes mitochondrial import inner membrane translocase subunit Tim29 (TIMM29), which is a component of the TIM22 complex. The TIM22 complex imports and inserts multi-pass transmembrane proteins into the mitochondrial inner membrane by formation of a twin-pore translocase with components in the outer and inner membranes. TIM29 is integrated into the inner member with the C terminus exposed to the intermembrane space and able to contact the translocase of the outer membrane. It is required for complex stability and for the addition of the TIMM22 protein to the complex.
