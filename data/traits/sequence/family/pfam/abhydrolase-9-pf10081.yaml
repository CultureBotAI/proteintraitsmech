identifier: Pfam:PF10081
label: Alpha/beta-hydrolase family
definition: >-
  This entry represents the C-terminal domain of a novel family of proteins with and alpha/beta hydrolase fold which may function as lipases. This domain includes the catalytic triad critical for hydrolysis (S, D, H) and the GXSXG sequence motif which is a characteristic of these enzymes.
