identifier: Pfam:PF03577
label: Peptidase family C69
definition: >-
  This group of peptidases, belong to MEROPS peptidase family C69 (dipeptidase, clan PB). They are mainly dipeptidases such as dipeptidase A from Lactobacillus helveticus (MEROPS identifier C69.001). This entry also include Secernin 1-3 from animals (MEROPS identifier C69.003) which may regulate exocytosis in mast cells. Secernin-1 is uniquely associated with tau pathology as it interacts with hyperphosphorylated Tau and abundantly accumulates in neurofibrillary tangles and plaque associated dystrophic neurites in Alzheimer's disease (AD), Down Syndrome and Primary age-related tauopathy (PART), which may be a useful AD biomarker and has potential as a novel therapeutic target. Comparative sequence and structural analysis, particularly to penicillin V acylase (MEROPS peptidase family C59) revealed a cysteine as the catalytic nucleophile as well as other conserved residues important for catalysis. In general, C69 family is variable in sequence and exhibits great diversity in substrate specificity, to include enzymes such as choloyglycine hydrolases, acid ceramidases, isopenicillin N acyltransferases, and a subgroup of eukaryotic proteins with unclear function. A cysteine peptidase is a proteolytic enzyme that hydrolyses a peptide bond using the thiol group of a cysteine residue as a nucleophile. Hydrolysis involves usually a catalytic triad consisting of the thiol group of the cysteine, the imidazolium ring of a histidine, and a third residue, usually asparagine or aspartic acid, to orientate and activate the imidazolium ring. In only one family of cysteine peptidases, is the role of the general base assigned to a residue other than a histidine: in peptidases from family C89 (acid ceramidase) an arginine is the general base. Cysteine peptidases can be grouped into fourteen…
