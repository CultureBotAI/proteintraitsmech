identifier: Pfam:PF07424
label: TrbM
definition: >-
  This family contains the bacterial protein TrbM (approximately 180 residues long). In Comamonas testosteroni T-2, TrbM is derived from the IncP1beta plasmid pTSA, which encodes the widespread genes for p-toluenesulphonate (TSA) degradation. This family also includes MPFK and its functional homologue kikA, which are required for efficient conjugative transfer in IncP-9 plasmids.
