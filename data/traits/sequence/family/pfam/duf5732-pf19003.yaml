identifier: Pfam:PF19003
label: Family of unknown function (DUF5732)
definition: >-
  Proteins containing this domain can be found in various Platyhelminthes, with many of the sequences annotated as being the STARP-like antigen. This highly conserved domain is located next to the basic helix-loop-helix motif found in this antigen. The function of this domain is currently unknown.
