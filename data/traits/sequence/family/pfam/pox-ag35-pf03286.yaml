identifier: Pfam:PF03286
label: Pox virus Ag35 surface protein
definition: >-
  The Pox virus Ag35 surface protein is an evelope protein known as protein H5 or Late transcription elongation factor OPG110. It is involved in the co-transcriptional or post-transcriptional endoribonucleolytic cleavage that generates sequence-homogeneous 3' ends during late transcription and in postreplicative transcription elongation on intermediate and late genes. It plays a role in DNA replication and in multiple steps of virion morphogenesis and is required both for inclusion of virosoplasm into crescents as well as for maturation of immature virions (IV) into mature virions (MV).
