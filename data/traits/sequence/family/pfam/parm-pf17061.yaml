identifier: Pfam:PF17061
label: PARM
definition: >-
  Human PARM-1 is a mucin-like, androgen-regulated transmembrane protein present in most tissues, with high levels in the heart, kidney and placenta. It is induced and expressed in prostate after castration and may have a role in cell proliferation and immortalisation in prostate cancer. PARM-1 also contributes to ovulation and/or luteal function by acting as a novel regulator of progesterone metabolism.
