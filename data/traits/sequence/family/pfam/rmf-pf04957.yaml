identifier: Pfam:PF04957
label: Ribosome modulation factor
definition: >-
  This entry contains ribosome modulation factors (RMF). They associate with 70s ribosomes and converts them to a dimeric form (100S ribosomes) which appear during the transition from the exponential growth phase to the stationary phase of Escherichia coli cells. It has been proposed that RMF mediates the formation of a 'storage ribosome', the 100S particle, in stationary phase by inactivating excess ribosomes to protect them from degradation and to maintain the required balance between the concentrations of ribosomes and protein synthesis factors in order to maintain translational elongation efficiency. This entry also contains some phage proteins.
