identifier: Pfam:PF22263
label: Family of unknown function (DUF6951)
definition: >-
  This is a family of uncharacterised proteins found in archaea and bacteria. These proteins are predicted to adopt similar structure to the members of SufE/NifU superfamily. They contain three invariant cysteine residues and a fourth semi-conserved residue either cysteine or histidine. These residues are likely to define a potential Zn-binding site similar to the binding site observed in SufU.
