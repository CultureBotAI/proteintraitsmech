identifier: Pfam:PF02043
label: Bacteriochlorophyll C binding protein
definition: >-
  Chlorosomes, which are attached to the inner surface of the cytoplasmic membrane, consist of four polypeptides and associated pigments and lipids. The principal light-harvesting pigment of the green filamentous bacterium Chloroflexus aurantiacus is bacteriochlorophyll (Bchl) c. This pigment is either bound to, or constrained by, a small approximately 80-residue polypeptide designated Bchlc-binding protein. In C. aurantiacus, a C-terminal extension is believed to play a role in proper incorporation of the protein during chlorosome assembly. The protein has a high degree of similarity to Bchlc-binding proteins of other photosynthetic bacteria.
