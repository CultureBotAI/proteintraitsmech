identifier: Pfam:PF31213
label: High light-inducible protein HliA
definition: >-
  This protein family includes High light-inducible protein HliA-D from Synechocystis sp., which is involved in photosystem II (PSII) assembly and/or repair under high light stress. It is likely to be important during long-term acclimation to stress. This entry also includes Uncharacterized protein Ycf17 and some uncharacterised sequences from plants.
