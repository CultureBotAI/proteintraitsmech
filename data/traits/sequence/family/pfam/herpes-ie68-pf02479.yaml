identifier: Pfam:PF02479
label: Herpesvirus immediate early protein
definition: >-
  This regulatory protein is expressed from an immediate early gene in the cell cycle of Herpesviridae. The protein is known by various names including IE-68, US1, ICP22 and IR4. It acts as a general transcriptional regulator of cellular and viral mRNAs, through modifications on the host RNA polymerase II which inhibit host genome transcription, leading to cell cycle deregulation and loss of efficient antiviral response. IE68 also recruits cellular transcription elongation factors to viral genomes for efficient transcription elongation of viral genes. In Herpesvirus type-2, this protein functions as a E3 ubiquitin ligase which interacts with STAT1, STAT2, IFN regulatory factor 9 (IRF9), and other ubiquitinated proteins, promoting its degradation and resulting in the blockade of ISG factor 3 (ISGF3) nuclear translocation. Through this mechanism, the production of ISG54 is inhibited and, thus, it inhibits innate immunity response during viral infection.
