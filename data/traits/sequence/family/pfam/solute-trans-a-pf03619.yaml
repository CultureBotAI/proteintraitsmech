identifier: Pfam:PF03619
label: Organic solute transporter Ostalpha
definition: >-
  This entry includes Organic solute transporter subunit alpha (OSTalpha, also known as SLC51A), an essential component of the Ost-alpha/Ost-beta complex, a heterodimer that acts as the intestinal basolateral transporter responsible for bile acid export from enterocytes into portal blood, the transmembrane protein 184 (TMEM184) and the homologue from yeast, HFL1, a vacuole membrane protein that recruits ATG8 to facilitate the degradation of vacuolar integral membrane proteins during early-stationary vacuole turnover (EVT) when cells enter stationary phase.
