identifier: Pfam:PF15680
label: Orofacial cleft 1 candidate gene 1 protein
definition: >-
  This family of proteins is found in eukaryotes. Proteins in this family are typically between 125 and 276 amino acids in length. The family includes OFCC1 (orofacial cleft 1 candidate gene 1 protein), a potentially causal gene for orofacial cleft in humans. However, ablation of the gene had no effects in head development in mice. Mutations in the homologous Opo gene result in eye malformation in medaka fish.
