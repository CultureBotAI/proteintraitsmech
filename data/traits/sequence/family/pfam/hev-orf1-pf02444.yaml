identifier: Pfam:PF02444
label: Hepatitis E virus ORF-2 (Putative capsid protein)
definition: >-
  The Hepatitis E virus(HEV) genome is a single-stranded, positive-sense RNA molecule of approximately 7.5 kb. Three open reading frames (ORF) were identified within the HEV genome: ORF1 encodes nonstructural proteins, ORF2 encodes the putative structural protein(s), and ORF3 encodes a protein of unknown function. ORF2 contains a consensus signal peptide sequence at its amino terminus and a capsid-like region with a high content of basic amino acids similar to that seen with other virus capsid proteins.
