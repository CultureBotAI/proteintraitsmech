identifier: Pfam:PF27185
label: YizD membrane protein
definition: >-
  This entry represents the small uncharacterised membrane protein YizD, a 55 amino acids sequence found in Bacillus subtilis, and similar proteins from bacillales. The protein is predicted to be a multi-pass membrane protein with two transmembrane helices spanning residues 5-25 and 26-46. YizD is encoded by the gene yizD (locus tag BSU11549) on the B. subtilis chromosome. Its function remains to be determined.
