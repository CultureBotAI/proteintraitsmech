identifier: Pfam:PF05346
label: Eukaryotic membrane protein family
definition: >-
  This family of membrane proteins is conserved in eukaryotes. It includes Tapt1 (transmembrane anterior posterior transformation 1) and homologues. Analysis of mouse Tapt1 has shown it to be involved in patterning of the vertebrate axial skeleton. Its cellular function is not known, but defective Tapt1 disrupts Golgi morphology and trafficking, and normal primary cilium formation. The homologues in yeast, endoplasmic reticulum membrane protein 65, and Arabidopsis, POD1, seem to be involved in protein folding in the endoplasmic reticulum.
