identifier: Pfam:PF14179
label: YppG-like protein
definition: >-
  The YppG-like protein family includes the B. subtilis YppG protein , which is functionally uncharacterised. Proteins in this family are typically between 115 and 181 amino acids in length and contain two completely conserved residues (F and G) that may be functionally important.
