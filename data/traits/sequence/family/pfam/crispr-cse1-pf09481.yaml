identifier: Pfam:PF09481
label: CRISPR-associated protein Cse1 (CRISPR_cse1)
definition: >-
  This entry represents the Cse1 family of Cas proteins, which includes CT1972 from Chlorobium tepidum. These proteins are found in the CRISPR/Cas subtype Escherichia coli regions of many bacteria (most of which are mesophiles), and not in Archaea. This is also known as CasA, or Cse1 Type I-E. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
