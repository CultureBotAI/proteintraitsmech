identifier: Pfam:PF11183
label: IraM/PmrD family
definition: >-
  The IraM/RssC family comprises anti-adaptor proteins that regulate the stability of the sigma stress factor RpoS, particularly during magnesium limitation. These proteins inhibit RpoS degradation by modulating RssB activity, enhancing RpoS levels and supporting the bacterial stress response. Some members may also contribute to early steps of isoprenoid biosynthesis, potentially via RssB regulation. PmrB forms a two-component system (TCS) with PmrA that enables Gram-negative bacteria to resist the antimicrobial peptide polymyxin G. This TCS is connected to another via PmrD, the first protein shown to mediate crosstalk between TCSs. PmrD binds the N-terminal domain of PmrA, preventing its dephosphorylation and promoting transcription of polymyxin resistance genes.
