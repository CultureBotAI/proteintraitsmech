identifier: Pfam:PF05217
label: Stabilizer of axonemal microtubules 1/2
definition: >-
  Stabilizer of axonemal microtubules 1/2 (SAXO1/2) may play a role in the regulation of cilium length. Human SAXO1 binds specifically to centriole and cilium microtubules. It stabilizes microtubules at low temperature.
