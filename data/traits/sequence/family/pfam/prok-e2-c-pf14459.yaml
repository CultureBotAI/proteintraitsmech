identifier: Pfam:PF14459
label: Prokaryotic E2 family C
definition: >-
  This entry represents the N-terminal in Uncharacterized y4jF protein in Sinorhizobium fredii and related bacterial proteins. This domain contains a conserved cysteine in place of the histidine of the classical E2/UBC proteins. This domain is usually fused to an E1 domain at their C-terminal. The protein is usually in the gene neighbourhood of a gene encoding a JAB peptidase and another encoding a predicted metal binding domain.
