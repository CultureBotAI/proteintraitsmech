identifier: Pfam:PF23148
label: Podophage GP4 fiber-tail adaptor protein gp77
definition: >-
  This entry represents the Podophage GP4 fiber-tail adaptor protein gp77 and related phage proteins. This circular fibre-tail adaptor consists of 15 copies of protein gp77. Gp77 folds into a β-sandwich with an Ig-like topology ( ). Bacteriophage tail fibres play a critical role in the early stage of infection by binding to the bacterial surface. In Podophage GP4, five fibre I, each composed of five dimers of gp80 and linked by rope protein, are attached to the five edges of the tail vertex of the icosahedral head of the phage. The fibre-tail adaptor acts as a fulcrum, encircling the dodecameric adaptor I and providing the anchoring sites for the 5-fold symmetric fibres I and II.
