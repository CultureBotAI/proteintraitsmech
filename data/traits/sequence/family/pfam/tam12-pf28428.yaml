identifier: Pfam:PF28428
label: TAM12
definition: >-
  This entry represents the TAM12 family of small proteins found in fungi. TAM12 (Transcripts altered in meiosis protein 12) is a 66-amino acid protein from Schizosaccharomyces pombe that is differentially expressed during meiosis. The protein contains a disordered N-terminal region and low-complexity sequences. Members of this family are characterised by their small size and appear to be specific to fungal species. The function of this protein family remains to be determined. This entry also includes some short uncharacterised sequences from plants.
