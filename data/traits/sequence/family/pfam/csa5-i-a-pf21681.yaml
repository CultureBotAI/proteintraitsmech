identifier: Pfam:PF21681
label: Type-I-A Cascade subunit Csa5
definition: >-
  This group of archaeal proteins includes CRISPR type I-A cluster 1/Apern-associated protein Csa5-1 from Saccharolobus solfataricus (Csa5), the small subunit of the archaeal-specific Type-I-A Cascade complex for CRISPR-mediated antiviral immunity. This protein consists of two domains: an all α-helical arrangement and an insertion that shows a single helix and six β-strands arranged as three antiparallel two-stranded β-sheets.
