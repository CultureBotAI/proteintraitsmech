identifier: Pfam:PF26396
label: Halobacterial acidic protein
definition: >-
  This entry represents a family of small, uncharacterised proteins found exclusively in extremely halophilic archaea (Halobacteria). These proteins are approximately 50-65 amino acids in length and contain a highly conserved N-terminal region with the motif MPDTK. The C-terminal region is enriched in acidic residues (aspartate and glutamate), which is a common feature of halophilic proteins that aids in solubility and stability in high-salt environments. The function of these proteins remains unknown, but their conservation across diverse halophilic archaea suggests they may play an important role in adaptation to hypersaline environments.
