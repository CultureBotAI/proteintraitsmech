identifier: Pfam:PF03302
label: Giardia variant-specific surface protein
definition: >-
  During infection, the intestinal protozoan parasite Giardia lamblia virus undergoes continuous antigenic variation which is determined by diversification of the parasite's major surface antigen, named VSP (variant surface protein).
