identifier: Pfam:PF05054
label: Autographa californica nuclear polyhedrosis virus (AcMNPV) protein
definition: >-
  This entry includes protein AC109 from Autographa californica nuclear polyhedrosis virus (AcMNPV). The gene (Orf1090) is essential and transcribed late in virus assembly, and protein AC109 has been shown to be important for the transport of the budded virion to the host nucleus. In mutants lacking the AC109 gene, virions are unable to enter the nucleus and remain in the cytoplasm. Although addition of AC109 allowed virions to enter the nucleus, the occlusion bodies were empty, indicating that AC109 is also important for the production of infectious budded virus.
