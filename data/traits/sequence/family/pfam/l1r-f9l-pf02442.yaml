identifier: Pfam:PF02442
label: Lipid membrane protein of large eukaryotic DNA viruses
definition: >-
  The four families of large eukaryotic DNA viruses, Poxviridae, Asfarviridae, Iridoviridae, and Phycodnaviridae, referred to collectively as nucleocytoplasmic large DNA viruses or NCLDV, have all been shown to have a lipid membrane, in spite of the major differences in virion structure. The paralogous genes L1R and F9L encode membrane proteins that have a conserved domain architecture, with a single, C-terminal transmembrane helix, and an N-terminal, multiple-disulphide-bonded domain. The conservation of the myristoylated, disulphide-bonded protein Entry-fusion complex associated protein OPG095 (L1R)/EFC-associated protein OPG053 (F9L) in most of the NCLDV correlates with the conservation of the thiol-disulphide oxidoreductase E10R which, in vaccinia virus, is required for the formation of disulphide bonds in L1R and F9L. This entry also includes Inner membrane protein pE248R from African swine fever virus. This protein is essential for viral fusion with host endosomal membrane and core release.
