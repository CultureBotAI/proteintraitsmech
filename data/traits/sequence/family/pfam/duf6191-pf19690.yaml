label: Family of unknown function (DUF6191)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0002014) is described by MIBiG as an example of the polyketide and NRP (non-ribosomal peptide) biosynthetic classes. It includes a member of the pepticinnamin E biosynthetic gene cluster from Actinobacteria bacterium OK006. This family is found in Actinobacteria.
