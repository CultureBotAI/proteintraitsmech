identifier: Pfam:PF04767
label: DNA-binding 11 kDa phosphoprotein
definition: >-
  This is a family of poxvirus proteins required for virus morphogenesis and infectivity. Phosphoprotein F17 is necessary for proteolytic processing of the major viral structural proteins, P4a and P4b. F17 binds and sequesters Raptor and Rictor, regulators of mammalian target of rapamycin complexes mTORC1 and mTORC2, respectively, which constitutes a poxvirus strategy to evade cytosolic sensing.
