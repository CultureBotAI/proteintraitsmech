identifier: Pfam:PF28017
label: Protein phosphatase CheZ
definition: >-
  This entry represents protein phosphatase CheZ. CheZ family members are broadly distributed and play significant roles in chemotaxis systems in Gram-negative bacteria. This phosphatase efficiently dephosphorylates proteins from the chemotaxis system CheY(HP) and CheAY, and has additional weak activity on CheV2. It was shown that in Helicobacter pylori, the CheZ phosphatase localises to the bacterial pole and its localisation depends on the interactions with ChePep chemotaxis protein.
