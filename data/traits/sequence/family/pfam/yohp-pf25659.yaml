identifier: Pfam:PF25659
label: Membrane protein YohP
definition: >-
  This family represents the membrane protein YohP from E. coli and related sequences from proteobacteria. YohP is a 27-amino-acid-long protein located in the inner membrane of E. coli. YohP is recognised by the signal recognition particle (SRP). In contrast to the canonical cotranslational recognition by SRP, SRP was found to bind to YohP post-translationally. The exact function of YohP is unknown but it was found that compresses the nucleoid upon overexpression.
