identifier: Pfam:PF25719
label: Cytomegalovirus UL145 protein
definition: >-
  This entry represents the human cytomegalovirus UL145 protein which exists in two isoforms: pUL145-Long and pUL145-Short. Both isoforms act as viral DDB1-cullin- associated factors (vDCAFs) that mimic cellular DCAFs to exploit the ubiquitin- proteasome system to impede antiviral immunity. pUL145 recruits DDB1-containing ubiquitin ligases via a conserved H-box motif to induce proteasomal degradation of STAT2, thereby disrupting the host interferon response. The pUL145-Short isoform is expressed earlier and more abundantly than pUL145-Long during infection.
