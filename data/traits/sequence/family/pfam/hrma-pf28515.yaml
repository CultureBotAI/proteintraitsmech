identifier: Pfam:PF28515
label: Subtelomeric hrmA-associated cluster protein
definition: >-
  This entry represents a family of proteins found in the subtelomeric hrmA-associated cluster (HAC) in Aspergillus fumigatus and similar sequences from ascomycetes. These proteins are part of a gene cluster that alters hyphal surface properties, including reduced total chitin and increased beta-glucan exposure. The proteins contribute to perturbation of inter-hyphal interactions within developing biofilms, resulting in loss of vertically aligned polarised growing filaments. This leads to formation of a hypoxia-typic morphotype (H-MORPH) with altered biofilm architecture that increases hypoxia fitness and enhances pathogenicity in invasive aspergillosis. Expression of genes in this cluster is regulated by the hypoxia responsive morphology factor A (hrmA).
