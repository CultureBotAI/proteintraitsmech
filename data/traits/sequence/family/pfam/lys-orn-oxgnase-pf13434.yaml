identifier: Pfam:PF13434
label: L-lysine 6-monooxygenase/L-ornithine 5-monooxygenase
definition: >-
  This is a family of Rossmann fold oxidoreductases that catalyse NADPH-dependent hydroxylation and are involved in siderophore biosynthesis. This family includes L-ornithine 5-monooxygenase, which catalyses the hydroxylation of L-ornithine at the N5 position, and L-lysine 6-monooxygenase, which catalyses the hydroxylation of lysine at the N6 position. This entry also includes Putrescine N-hydroxylase, an homologous of L-ornithine 5-monooxygenase and L-lysine 6-monooxygenase, involved in the biosynthesis of the siderophore putrebactin.
