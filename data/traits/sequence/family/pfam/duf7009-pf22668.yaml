identifier: Pfam:PF22668
label: Family of unknown function (DUF7009)
definition: >-
  This is a family of uncharacterised proteins found in bacteria. It is predicted to adopt a globular structure consisting of two nearly orthogonal β-sheets and two α-helices that connect them. Toward the C terminus, these proteins contain a highly conserved region enriched with negatively charged residues, having nearly invariant EKDFxC sequence motif.
