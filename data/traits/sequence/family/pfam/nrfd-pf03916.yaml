identifier: Pfam:PF03916
label: Polysulphide reductase, NrfD
definition: >-
  This entry includes a group of integral membrane proteins that transfer of electrons from the quinone pool to the type-c cytochromes, found in bacteria and archaea. NrfD is an integral transmembrane protein with loops in both the periplasm and the cytoplasm. NrfD is thought to participate in the transfer of electrons, from the quinone pool into the terminal components of the Nrf pathway. This entry represents NrfD and related proteins, including an NrfD-related subunit of polysulphide reductase and a selenate reductase complex subunit.
