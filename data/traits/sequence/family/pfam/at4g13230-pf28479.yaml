identifier: Pfam:PF28479
label: Uncharacterized protein At4g13230
definition: >-
  This entry represents a family of uncharacterised proteins found in plants, exemplified by At4g13230 from Arabidopsis thaliana. The protein is 120 amino acids in length and contains an N-terminal signal peptide, indicating targeting to the secretory pathway. The protein contains disordered regions at residues, with the C-terminal region enriched in basic and acidic residues. The function of this protein family remains to be determined.
