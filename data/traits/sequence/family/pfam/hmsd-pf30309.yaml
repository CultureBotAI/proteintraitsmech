identifier: Pfam:PF30309
label: Minor histocompatibility protein HMSD
definition: >-
  This entry represents the minor histocompatibility protein HMSD, found in mammals including primates and artiodactyls. In humans, an alternatively spliced variant of HMSD serves as the precursor of the minor histocompatibility antigen ACC-6. ACC-6 is presented at the cell surface by MHC HLA-B*4403 and can elicit cytotoxic T-lymphocyte reactivity. The protein is highly expressed in dendritic cells and primary leukaemia cells, particularly those of myeloid lineage. Minor histocompatibility antigens can trigger graft-versus-host disease after haematopoietic stem cell transplantation from HLA-identical donors.
