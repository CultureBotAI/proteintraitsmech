identifier: Pfam:PF05025
label: RbsD / FucU transport protein family
definition: >-
  RbsD is a component of the ribose operon. It was originally thought to be a high affinity ribose transport protein, but further analysis shows that it is a D-ribose pyranase . It catalyses the interconversion of beta-pyran and beta-furan forms of D-ribose. It also catalyzes the conversion between beta-allofuranose and beta-allopyranose. FucU is a component of the fucose operon and is a L-fucose mutarotase , involved in the anomeric conversion of L-fucose. It also exhibits a pyranase activity for D-ribose. Both have been classified in the RbsD/FucU family of proteins. Members of this family are ubiquitous having been found in organisms from eubacteria to mammals.
