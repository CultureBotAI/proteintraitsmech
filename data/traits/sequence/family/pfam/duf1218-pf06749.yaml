identifier: Pfam:PF06749
label: Protein of unknown function (DUF1218)
definition: >-
  This entry represents a group of proteins from Streptophytes, including Protein VASCULATURE COMPLEXITY AND CONNECTIVITY (also known as DEAL1), Protein DESIGUAL 2-4 (DEAL2-4) and Protein MODIFYING WALL LIGNIN-1/2 (MWL-1/2). DEAL1 is required for embryo provasculature development and cotyledon vascular complexity and connectivity. DEAL2 and 3 ensure bilateral symmetry development and early leaf margin patterning, probably via the regulation of auxin and CUC2 distribution. MWL1 and 2 are involved in secondary cell wall biology, specifically lignin biosynthesis. Proteins included in this family contain a number of conserved cysteine residues.
