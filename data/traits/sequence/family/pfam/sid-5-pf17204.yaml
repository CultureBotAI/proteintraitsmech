identifier: Pfam:PF17204
label: Sid-5 family
definition: >-
  In the nematode Caenorhabditis elegans, RNA interference (RNAi) silencing signals are efficiently taken up from the environment and transported between cells and tissues. SID-5 is a C. elegans endosome-associated protein that promotes the transport of RNAi silencing signals between cells.
