identifier: Pfam:PF14460
label: Prokaryotic E2 family D
definition: >-
  This family is part of the E2/UBC superfamily of proteins found in several bacteria. Members of this family lack the conserved histidine of the classical E2-fold. However, they have an absolutely conserved histidine carboxyl-terminal to the conserved cysteine. Members of this family are usually present in a conserved gene neighbourhood with genes encoding members of the Ub modification pathway such as the E1, Ub and JAB proteins. These neighbourhoods also contain a gene encoding a rapidly diverging α-helical protein.
