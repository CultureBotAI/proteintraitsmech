identifier: Pfam:PF29392
label: Family of unknown function (DUF8541)
definition: >-
  This entry represents a family of small proteins of approximately 90 amino acids found exclusively in tailed bacteriophages. The family is restricted to the class Caudoviricetes, particularly members of the family Demerecviridae. Within this family, the proteins are found in the genera Tequintavirus and Epseptimavirus. The function of these proteins remains to be determined.
