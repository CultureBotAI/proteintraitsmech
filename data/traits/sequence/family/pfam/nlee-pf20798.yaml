identifier: Pfam:PF20798
label: Cysteine methyltransferase effector NleE
definition: >-
  Type III secretion system (T3SS) effector NleE from Escherichia coli is a S-adenosyl-L-methionine (SAM)-dependent methyltransferase that inhibits NF-kappa-B-mediated proinflammatory response in the host. Its structure shows an α-β doubly wound topology with a central three-stranded anti-paralleled β-sheet sandwiched by α-helices. OspZ from Shigella flexneri inhibits host cell NF-kappa-B activation by preventing nuclear translocation of host protein RELA/p65. This protein family is predominantly found in Enterobacterales.
