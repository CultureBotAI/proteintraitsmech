identifier: Pfam:PF25751
label: Methanobactin copper-binding peptide
definition: >-
  Methanobactins are siderophore-like copper-chelating natural products with considerable variety from species to species. The 11-residue methanobactin of Methylosinus trichosporium OB3b is derived from a 30-residue precursor. A very similar 31-residue precursor is found in the rice endophyte Azospirillum sp. B510, which has not yet been shown to produce a methanobactin.
