identifier: Pfam:PF14064
label: HmuY protein
definition: >-
  HmuY is a novel heme-binding protein that recruits heme from host carriers and delivers it to its cognate outer-membrane transporter, the TonB-dependent receptor HmuR. This family of proteins is found in bacteria. Proteins in this family are typically between 214 and 278 amino acids in length.
