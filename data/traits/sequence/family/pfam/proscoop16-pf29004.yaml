identifier: Pfam:PF29004
label: Serine rich endogenous peptide 16
definition: >-
  This entry represents the SCOOP (Serine rich endogenous peptide) phytocytokine family. SCOOP peptides are Brassicaceae-specific plant endogenous peptides released into the apoplast that are perceived by the MIK2 receptor in a BAK1/SERK3 and SERK4 coreceptor-dependent manner. These phytocytokines modulate various physiological and antimicrobial processes including growth prevention and reactive oxygen species response regulation. SCOOP precursors accumulate at the plasma membrane and are proteolytically cleaved to release the active peptide in the apoplasm. The family contains a conserved SCOOP motif and an essential SxS motif required for MIK2 binding.
