identifier: Pfam:PF06126
label: Herpesvirus Latent membrane protein 2
definition: >-
  This entry represents K15, a viral protein that plays a crucial role in reactivation of the virus from latency, early viral gene expression, and virus production. K15 modulates host signaling pathways including activation of MAP kinases c-JUN-N-terminal kinase (JNK), ERK2, and NF-kappa-B, resulting in the activation of AP-1 and NFAT-dependent gene expression in B-lymphocytes. When expressed in epithelial cells, K15 induces the expression of several inflammatory and angiogenic genes. K15 also interferes with B-lymphocyte signaling through interaction with host LYN kinase.
