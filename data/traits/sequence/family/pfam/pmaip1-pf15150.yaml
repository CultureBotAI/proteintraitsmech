identifier: Pfam:PF15150
label: Phorbol-12-myristate-13-acetate-induced
definition: >-
  Phorbol-12-myristate-13-acetate-induced protein 1, also known as Noxa, is a p53 transcriptional target involved in the response to DNA-damaging agents. Noxa can also be activated by other transcriptional factors, suggesting a broad role in the response to cellular stresses. It has been shown to promote activation of caspases and apoptosis.
