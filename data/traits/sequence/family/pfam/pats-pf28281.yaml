identifier: Pfam:PF28281
label: Transcriptional regulator peptide PatS
definition: >-
  This entry represents Transcriptional regulator peptide PatS. PatS occurs in a subset of HetR-containing, heterocyst-forming species. PatS inhibits heterocyst differentiation; a peptide corresponding to the last 5-6 amino acids blocks heterocyst formation when added exogenously in culture. It controls heterocyst pattern formation through intercellular signaling mechanisms. In Nostoc filaments, approximately every 10th vegetative cell terminally differentiates into a heterocyst specialised for nitrogen fixation. It seems to inhibit the formation of adjacent heterocysts. The C-terminal peptide binds HetR, inhibits hetR transcription and blocks the DNA-binding of HetR. Peptide binding to HetR alters its conformation, probably leading to dissociation of the HetR-DNA complex and cessation of transcription. Two PatS peptides bind to the lateral clefts of HetR Hood domain, and trigger significant conformational changes of the flap domain, resulting in dissociation of the auxiliary α-helix and eventually release of HetR from the DNA major grove.
