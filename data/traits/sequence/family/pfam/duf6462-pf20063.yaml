identifier: Pfam:PF20063
label: Family of unknown function (DUF6462)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is found in bacteria, mainly in Firmicutes. Proteins in this family are typically between 62 and 78 amino acids in length. Some of the members are probably transcriptional regulators. This family has overlaps with families in clan CL0123, which suggests that they share the helix-turn-helix motif.
