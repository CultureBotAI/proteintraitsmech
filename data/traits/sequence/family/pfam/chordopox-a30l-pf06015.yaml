identifier: Pfam:PF06015
label: Chordopoxvirus A30L protein
definition: >-
  This family consists of several short Chordopoxvirus proteins which are homologous to the A30L protein of Vaccinia virus, also known as Protein OPG157. The vaccinia virus A30L protein is required for the association of electron-dense, granular, proteinaceous material with the concave surfaces of crescent membranes, an early step in viral morphogenesis. A30L is known to interact with the G7L protein and it has been shown that the stability of each is dependent on its association with the other.
