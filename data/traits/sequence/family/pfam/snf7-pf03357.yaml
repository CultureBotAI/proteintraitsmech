identifier: Pfam:PF03357
label: Snf7
definition: >-
  Snf7 family members are small coil-coiled proteins that share protein sequence similarity with budding yeast Snf7, which is part of the ESCRT-III complex that is required for endosome-mediated trafficking via multivesicular body (MVB) formation and sorting. Proteins in this entry also includes human CHMPs (charged multivesicular body proteins), budding yeast Did4/Did2, Arabidopsis vacuolar protein sorting-associated proteins and the archaean Sulfolobus acidocaldarius cell division protein B which is a component required for cell division, forming polymers with segregating nucleoids.
