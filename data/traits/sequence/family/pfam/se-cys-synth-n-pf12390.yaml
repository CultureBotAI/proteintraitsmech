identifier: Pfam:PF12390
label: Selenocysteine synthase N terminal
definition: >-
  This entry represents the N-terminal domain of L-seryl-tRNA selenium transferase, which catalyses the conversion of seryl-tRNA(Sec) into selenocysteyl-tRNA(Sec). There is a single completely conserved residue P that may be functionally important.
