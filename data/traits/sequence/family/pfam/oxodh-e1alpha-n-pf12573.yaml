identifier: Pfam:PF12573
label: 2-oxoisovalerate dehydrogenase E1 alpha subunit N terminal
definition: >-
  This domain is part of the N-terminal tail and β-sheet region of the bacterial 2-oxoisovalerate dehydrogenase E1 alpha subunit. It is found N-terminal to the dehydrogenase component . There are two conserved sequence motifs: VPEP and RPG.
