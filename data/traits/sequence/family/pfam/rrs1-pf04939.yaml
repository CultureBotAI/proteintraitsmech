identifier: Pfam:PF04939
label: Ribosome biogenesis regulatory protein (RRS1)
definition: >-
  This is a family of eukaryotic ribosomal biogenesis regulatory (Rrs1) proteins. Rrs1 was isolated as a factor related to a secretory defect that caused the transcriptional repression of both rRNA and ribosomal protein genes. This protein is known to localize in the nucleolus where it acts as a ribosome assembly factor. It also localizes at the nuclear periphery where it directly interacts with the membrane-spanning SUN domain protein Mps3 and silent information factor Sir4, both involved in telomere clustering and silencing. The N-terminal region of Rrs1 plays a role in ribosome biogenesis via interaction with the N-terminal Brix domain of Rpf2. The topology of the Brix domain presents an incomplete duplication of the anticodon-binding domain (ABD) of class IIa aminoacyl-tRNA synthetases. The structure of the Rpf2-Rrs1 complex shows that the N-terminal region of Rrs1 completes the Brix domain of Rpf2 and creates a double anticodon-binding domain.
