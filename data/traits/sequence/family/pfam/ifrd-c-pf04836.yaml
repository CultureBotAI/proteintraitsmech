identifier: Pfam:PF04836
label: Interferon-related protein conserved region
definition: >-
  This entry represents the C-terminal domain of IFRD1 and similar sequences predominantly found in animals. Interferon-related developmental regulator (IFRD1) is the human homologue of the Rattus norvegicus early response protein PC4 and its murine homologue TIS7. IFRD1 is a transcriptional coactivator/repressor controlling patterns of gene expression by interacting with transcription factors or histone deacetylase (HDAC) complexes. This entry also contains IFRD2 and its murine equivalent SKMc15, which are highly expressed soon after gastrulation and in the hepatic primordium, suggesting an involvement in early hematopoiesis. Members of this group are generally described as transcriptional regulators implicated in cellular differentiation and various human diseases.
