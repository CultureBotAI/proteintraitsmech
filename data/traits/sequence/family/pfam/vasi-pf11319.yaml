identifier: Pfam:PF11319
label: Type VI secretion system VasI, EvfG, VC_A0118
definition: >-
  Proteins in this entry, including VC_A0118 from Vibrio cholerae O1 biovar eltor str. N16961, are restricted to a subset of bacteria with the type VI secretion system, and are encoded among the type VI-associated pathogenicity islands. However, many species with type VI secretion lack a member of this family, suggesting that members of this family may be targets rather than components of the type VI secretion system.
