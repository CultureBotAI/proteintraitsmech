identifier: Pfam:PF15541
label: Bacterial toxin 4
definition: >-
  Prokaryotic polymorphic toxin systems are implicated in intra-specific conflicts. They are characterised by a remarkable diversity of C-terminal toxin domains generated by recombination with standalone toxin-coding cassettes. This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses an α+β fold that is usually exported by the Photorhabdus virulence cassette (PVC)-type export system.
