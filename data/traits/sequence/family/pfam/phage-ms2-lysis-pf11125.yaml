identifier: Pfam:PF11125
label: Bacteriophage MS2, lysis protein
definition: >-
  This entry represents putative lysis proteins from Bacteriophage MS2 and Bacteriophage BZ13. The bacteriophage MS2 lysin protein was identified as an overlapping cistron in the bacteriophage MS2 RNA. This proteins induces the formation of specific membrane adhesion sites between the inner and outer membranes, apparently leading to host cell lysis. Lysis may be performed via activation of host murein hydrolases.
