label: Family of unknown function (DUF6013)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001120) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide. This family includes a protein from the burkholderic acid biosynthetic gene cluster from Burkholderia thailandensis E264 and appears to be predominantly found in Burkholderiaceae.
