identifier: Pfam:PF27792
label: Conserved hypothetical integral membrane protein
definition: >-
  This entry includes a small clade that correlates (by both gene clustering and phyletic pattern) to the three gene system. found in several Gram-positive bacteria, where (XrtG) is distantly related to exosortases. Both this narrow clade, and the larger set of full-length homologous integral membrane proteins, have an especially well-conserved region near the C-terminal with an invariant tyrosine. This homology suggests glycosyltransferase activity. Members of this protein family are mainly found in firmicutes.
