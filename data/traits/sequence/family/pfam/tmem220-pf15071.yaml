identifier: Pfam:PF15071
label: Transmembrane family 220, helix
definition: >-
  This entry represents the transmembrane 220 (TMEM220), which contains a transmembrane helix. The length of this protein is typically between 150 and 160 amino acids. In humans, it is found in the chromosomal position 17p13.1.
