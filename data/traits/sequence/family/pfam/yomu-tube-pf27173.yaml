identifier: Pfam:PF27173
label: YomU/Tube protein family
definition: >-
  This entry represents the YomU/Tube protein family found in Bacillus subtilis and related bacteriophages. YomU is a prophage-derived protein from the SPbeta prophage, while the tail tube protein is found in Bacillus phage SPR. The phage tail tube protein interacts with the bacterial defense protein DSR2, inducing conformational changes that activate DSR2's NADase activity and lead to abortive infection as part of a phage resistance mechanism. This represents a molecular arms race between phage proteins and bacterial defense systems.
