label: Family of unknown function (DUF8138)
definition: >-
  This entry represents a family of uncharacterised proteins from archaea. The proteins in this family are predominantly found in the order Halobacteriales, which includes genera such as Natrinema and Halostagnicola. The proteins are relatively short, typically ranging from 74 to 114 amino acids in length.
