identifier: Pfam:PF26925
label: Pseudoalteromonas phage PM2 protein Gp-l
definition: >-
  This entry represents protein Gp-l found in PM2-like bacteriophages. Gp-l is an uncharacterised protein of 51 amino acids (5.7 kDa) found in Pseudoalteromonas phage PM2, the first lipid-containing bacterial virus to be isolated.
