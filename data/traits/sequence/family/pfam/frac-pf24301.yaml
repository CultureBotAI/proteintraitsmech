identifier: Pfam:PF24301
label: Filament integrity protein FraC
definition: >-
  This entry represents the Filament integrity protein FraC and related proteins found in cyanobacteria. FraC, along with FraD and SepJ (FraG), is found at intercellular septa in heterocyst-forming filamentous cyanobacteria such as Nostoc punctiforme. This protein is involved in filament integrity and is required for the integrity of cell junctions in general.
