identifier: Pfam:PF28194
label: Outer membrane lipoprotein MapA
definition: >-
  This family of proteins includes outer membrane lipoproteins, commonly referred to as MapA. These proteins are typically found in the outer membrane of Gram-negative bacteria and are involved in various functions related to the integrity and maintenance of the cell envelope. They may play roles in cell adhesion, invasion, or interaction with the host immune system. The characteristic feature of these lipoproteins is the presence of a lipid moiety that anchors them to the outer membrane, which is essential for their function and localization.
