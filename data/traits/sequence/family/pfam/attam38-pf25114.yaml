identifier: Pfam:PF25114
label: AtTam38 family
definition: >-
  This entry represents the AtTam38 protein from Arabidopsis thaliana ( ) and related plant proteins. AtTam38 is a component of the AtYcf2-FtsHi complex. AtTam38 serves as an anchor of the stromal motor module to the IEM (inner envelope membrane of the chloroplast). It plays a key role in AtYcf2-FtsHi assembly and maintenance of the tilted posture of the motor module.
