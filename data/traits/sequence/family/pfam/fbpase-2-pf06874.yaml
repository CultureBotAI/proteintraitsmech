identifier: Pfam:PF06874
label: Firmicute fructose-1,6-bisphosphatase
definition: >-
  Fructose 1,6-bisphosphatase catalyses the hydrolysis of fructose 1,6-bisphosphate to fructose 6-phosphate. This is an essential reaction in the process of gluconeogenesis, the process by which non-carbohydrate precursors are converted to glucose, and hence this enzyme is found almost universally. Enzyme activity can be regulated by a number of different mechanisms including AMP inhibition, cylic AMP-dependent phosphorylation and light-dependent-activation. This entry represents the class 3 fructose 1,6-bisphosphatases. The Bacillus subtilis enzyme is inhibited by AMP, though this can be overcome by phosphoenolpyruvate, and is dependent on Mn(2+). Mutants lacking this enzyme are apparently still able to grow on gluconeogenic growth substrates such as malate and glycerol.
