identifier: Pfam:PF15586
label: Immunity protein 8
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved Wea (a: aromatic) motif. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Ntox7 family.
