identifier: Pfam:PF10383
label: 'Transcription-silencing protein Clr2   '
definition: >-
  Clr2 (cryptic loci regulator) is a chromatin silencing protein, one of a quartet of proteins forming the core of SHREC, a multienzyme effector complex that mediates hetero-chromatic transcriptional gene silencing in fission yeast. Clr2 does not have any obvious well-conserved domains, but along with the other core proteins binds to the histone deacetylase Clr3. On its own it may also have a role in chromatin organisation at the cnt domain, the site of kinetochore assembly. This entry represents the C-terminal domain of Clr2.
