identifier: Pfam:PF13630
label: SdpI/YfhL protein family
definition: >-
  This entry includes the SdpI and YhfL proteins from Bacillus subtilis. The SdpI protein is a multipass integral membrane protein that protects toxin-producing cells from being killed. Killing is mediated by the exported toxic protein SdpC an extracellular protein that induces the synthesis of an immunity protein.
