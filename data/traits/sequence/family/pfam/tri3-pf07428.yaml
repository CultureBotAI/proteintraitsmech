identifier: Pfam:PF07428
label: 15-O-acetyltransferase Tri3
definition: >-
  This entry includes Tri3 from Fusarium sporotrichioides, Mac1 from Ustilago maydis, and Sat16/Sat12 from Stachybotrys chartarum. Tri3/Sat12/Sat16 are trichothecene 15-O-acetyltransferases involved in mycotoxins biosynthesis. Mac1 is an acetyltransferase involved in the mannosylerythritol lipids (MELs) biosynthesis.
