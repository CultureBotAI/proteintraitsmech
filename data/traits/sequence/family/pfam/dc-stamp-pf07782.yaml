identifier: Pfam:PF07782
label: DC-STAMP-like protein
definition: >-
  This group of sequences is similar to a region of the dendritic cell-specific transmembrane protein (DC-STAMP, ). This is thought to be a novel receptor protein that shares no identity with other multimembrane-spanning proteins. It is thought to have seven putative transmembrane regions, two of which are found in the region featured in this family. DC-STAMP is also described as having potential N-linked glycosylation sites and a potential phosphorylation site for PKC, but these are not conserved.
