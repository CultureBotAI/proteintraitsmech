identifier: Pfam:PF18798
label: Large polyvalent protein-associated domain 3
definition: >-
  This domain is predicted to adopt an α and β fold. The secondary structure arrangement suggests it to be a member of the BECR fold. The domain is found in polyvalent proteins of both conjugative elements and phages/prophages.
