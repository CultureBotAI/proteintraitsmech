identifier: Pfam:PF00807
label: Apidaecin
definition: >-
  These antibacterial peptides are found in bees. These heat-stable, non-helical peptides are active against a wide range of plant-associated bacteria and some human pathogens. This entry represents a conserved region including the propeptide and apidaecin sequence.
