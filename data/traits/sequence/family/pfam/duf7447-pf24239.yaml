identifier: Pfam:PF24239
label: Family of unknown function (DUF7447)
definition: >-
  This entry represents an uncharacterised family found in various bacteriophage proteins. It is predominantly found in phages infecting diverse bacterial species including Burkholderia, Bacillus, Streptomyces, Listeria, and Caulobacter. The proteins are typically around 100-150 amino acids in length. Many of the proteins containing this domain are annotated as uncharacterised or hypothetical proteins. The proteins form a compact domain composed of a four stranded antiparallel β-sheet.
