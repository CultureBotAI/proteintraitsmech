identifier: Pfam:PF17448
label: Uncharacterized YqaH-like
definition: >-
  This entry represents Small protein YqaH from Bacillus subtilis and similar sequences from Bacillales. YqaH binds to and counteracts DnaA replication initiation activity. Its overexpression decreases the number of replication initiation events. It also antagonizes DnaA's transcriptional regulation activity. This protein is encoded within a cryptic phage-like region of the chromosome known as the skin element. It is part of the YqaF-YqaN operon, whose expression is negatively regulated by the skin repressor protein SknR..
