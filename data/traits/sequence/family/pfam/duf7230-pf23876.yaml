identifier: Pfam:PF23876
label: Family of unknown function (DUF7230)
definition: >-
  This entry represents a family of uncharacterised proteins found in phage and bacterial species, particularly in the Gammaproteobacteria class. Members of this family are typically short proteins, ranging from 32 to 85 amino acids in length. Many members are predicted to contain disordered regions and AlphaFold predictions show a non-globular structure.
