label: WXG100 protein secretion system (Wss), protein YukC
definition: >-
  Members of this family are associated with type VII secretion of WXG100 family targets in the Firmicutes, but not in the Actinobacteria. This protein is designated YukC in Bacillus subtilis and EssB is Staphylococcus aureus.
