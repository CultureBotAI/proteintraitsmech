identifier: Pfam:PF05324
label: Sperm antigen HE2
definition: >-
  This family consists of several variants of the human and chimpanzee (Pan troglodytes) sperm antigen proteins (HE2 and EP2 respectively). The EP2 gene codes for a family of androgen-dependent, epididymis-specific secretory proteins, known as sperm-associated antigen 11. The EP2 gene uses alternative promoters and differential splicing to produce a family of variant messages. The translated putative protein variants differ significantly from each other. Some of these putative proteins have similarity to beta-defensins, a family of antimicrobial peptides.
