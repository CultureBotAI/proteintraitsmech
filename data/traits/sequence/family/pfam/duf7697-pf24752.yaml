identifier: Pfam:PF24752
label: Family of unknown function (DUF7697)
definition: >-
  This entry represents a small family of uncharacterised proteins. Although apparently having a bacterial origin these proteins appear in genomic contexts suggesting they are part of an integrated phage genome. Structurally these proteins are composed of a β-hairpin followed by a pair of α-helices.
