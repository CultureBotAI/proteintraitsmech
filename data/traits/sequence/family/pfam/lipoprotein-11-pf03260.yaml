identifier: Pfam:PF03260
label: Lepidopteran low molecular weight (30 kD) lipoprotein
definition: >-
  This family includes Lepidopteran low molecular weight (30kDa) lipoproteins (30KPs), which belong to the Lipoprotein 11 family. They are abundant proteins found in the hemolymph, mainly synthesized in the fat body and then secreted into the hemolymph during the last instar larval stage. They have very similar amino acid and nucleotide sequences which are also similar to those of microvitellogenin in Manduca sexta. Structure resolution of some of its members revealed that they belong to the β-sheet superfamily and share a characteristic fold, with differences in loop conformations thought to confer ligand specificity. Studies from Bombyx mori, showed that these proteins function as storage proteins during growth and development but they are used only during embryonic development, thought to act as storage units of amino acids for use in de novo synthesis of other proteins. They are also involved in energy transport and metabolic processes such as release of diacylglycerol and the transport of steroids and hormones. 30KPs may be involved in defense response mechanisms as they can be conjugated to glucose, dextran, maltose and glycoproteins. These proteins may also inhibit apoptosis, thereby having a role in cell survival.
