identifier: Pfam:PF01499
label: Herpesvirus UL25 family
definition: >-
  This entry represents Capsid vertex component 2 (CVC2) which is a minor capsid component that is required for encapsidation but not cleavage of replicated viral DNA. It may function to stabilise capsids that contain full-length viral genomes. These proteins are found in Herpesviruses.
