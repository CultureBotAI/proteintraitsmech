identifier: Pfam:PF01359
label: Transposase (partial DDE domain)
definition: >-
  Autonomous mobile genetic elements such as transposon or insertion sequences (IS) encode an enzyme, transposase, that is required for excising and inserting the mobile element. Transposases have been grouped into various families. This family includes the mariner transposase.
