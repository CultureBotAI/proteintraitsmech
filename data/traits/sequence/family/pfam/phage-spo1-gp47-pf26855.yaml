identifier: Pfam:PF26855
label: Phage SPO1 gene 47 protein
definition: >-
  This entry represents gene 47 protein found in bacteriophages. The prototype is from Bacillus phage SPO1, a 94 amino acid protein with a molecular weight of 10.5 kDa. The protein is located in the host-takeover module within the terminal redundancy region of the phage genome, suggesting a role in the early stages of infection when the phage takes control of host cellular processes. The specific function of this protein remains to be determined.
