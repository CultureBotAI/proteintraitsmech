identifier: Pfam:PF28422
label: Coiled-coil domain-containing protein 89
definition: >-
  Coiled-coil domain-containing protein 89 (CCDC89), also known as Bc8 orange-interacting protein (BOIP), interacts with the orange domain of HRT1. BOIP binds to the orange domain of HRT1/Hey1 and is predominantly expressed at a specific stage in spermatogenesis. BOIP may play a role in the maturation process from haploid round spermatids to spermatozoa, possibly as a tissue-specific regulator of HRT1/Hey1 activity. CCDC89 is distributed uniformly within the cytoplasm but translocates to the nucleus when bound to HEY1. The protein undergoes phosphorylation at threonine residues.
