identifier: Pfam:PF07100
label: Anabaena sensory rhodopsin transducer
definition: >-
  This entry represents a family of proteins found in bacteria and some archaeal species, including the Anabaena sensory rhodopsin transducer (ASRT) and the hypothetical protein TM1070 from Thermotoga maritima. ASRT, likely to bind sugars or related metabolites, is comprised of a single globular domain with an eight-stranded β-sandwich fold with a well conserved tryptophan at the start of the first strand and a nearly absolutely conserved asparagine located at the end of the second β-strand that is involved in stabilising the characteristic tight turn between strands 2 and 3 of the structure. TM1070 has a β-sandwich structure with a jelly-roll fold.
