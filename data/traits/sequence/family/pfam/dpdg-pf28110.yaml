identifier: Pfam:PF28110
label: DpdG-like
definition: >-
  This entry represents DpdG protein ( ) from Salmonella montevideo and related bacterial proteins. The 7-deazapurine derivatives, 2'-deoxy-7-cyano-7-deazaguanosine (dPreQ0) and 2'-deoxy-7-amido-7-deazaguanosine (dADG) are recently-discovered DNA modifications encoded by the dpd cluster found in a diverse set of bacteria. Amongst the genes in this gene cluster, dpdG appear to be involved in a restriction-like phenotype.
