identifier: Pfam:PF24304
label: Anti-CRISPR Suppressor AcrIIA4
definition: >-
  This entry represents Anti-CRISPR Suppressor AcrIIA4 proteins encoded by Listeria monocytogenes prophages, including . AcrIIA4 preferentially targets critical residues essential for PAM duplex recognition, as well as it blocks target DNA access to the key catalytic residues lining the RuvC pocket of Cas9. AcrIIA4 adopts a fold composed of a three-stranded β-sheet with three α-helices positioned along one face of the β-sheet.
