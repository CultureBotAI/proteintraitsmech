identifier: Pfam:PF12589
label: Methyltransferase involved in Williams-Beuren syndrome
definition: >-
  This entry represents the C-terminal domain of 18S rRNA (guanine(1575)-N(7))-methyltransferase Bud23. Bud23 homologues can be found from yeast to human. They are S-adenosyl-L-methionine-dependent methyltransferases that specifically methylates the N7 position of a guanine in 18S rRNA. Bud23 homologue in Arabidopsis, known as Rid2 (ROOT INITIATION DEFECTIVE 2), is also involved in pre-rRNA processing.
