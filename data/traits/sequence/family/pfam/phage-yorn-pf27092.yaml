identifier: Pfam:PF27092
label: SPbeta prophage protein YorN
definition: >-
  This entry represents a family of very small uncharacterised proteins derived from the SPbeta prophage. The prototype member YorN from Bacillus subtilis strain 168 is only 49 amino acids in length. SPbeta is a temperate bacteriophage that integrates into the B. subtilis chromosome, and this protein is encoded within the prophage region. The function of this protein family remains unknown.
