identifier: Pfam:PF15014
label: Ceroid-lipofuscinosis neuronal protein 5
definition: >-
  This protein family consists of Bis(monoacylglycero)phosphate synthase CLN5 and CLN5-like proteins. CLN5, in the secreted form, catalyses the synthesis of bis(monoacylglycero)phosphate (BMP) via transacylation of 2 molecules of lysophosphatidylglycerol (LPG). BMP (also known as lysobisphosphatidic acid) plays a key role in the formation of intraluminal vesicles and in maintaining intracellular cholesterol homeostasis. CLN5 can use only LPG as the exclusive lysophospholipid acyl donor for base exchange and displays BMP synthase activity towards various LPGs (LPG 14:0, LPG 16:0, LPG 18:0, LPG 18:1) with a higher preference for longer chain lengths. Defects in CLN5 are the cause of neuronal ceroid lipofuscinosis type 5 (CLN5), also known as Finnish variant late-infantile neuronal ceroid lipofuscinosis (vLINCL). Neuronal ceroid lipofuscinoses are progressive neurodegenerative, lysosomal storage diseases characterised by intracellular accumulation of autofluorescent liposomal material. CLN5 also plays a role in influencing the retrograde trafficking of lysosomal sorting receptors SORT1 and IGF2R from the endosomes to the trans-Golgi network by controlling the recruitment of retromer complex to the endosomal membrane. CLN5 also exhibits palmitoyl protein thioesterase (S-depalmitoylation) activity in vitro and most likely plays a role in protein S-depalmitoylation.
