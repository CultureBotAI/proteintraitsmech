identifier: Pfam:PF11854
label: Putative outer membrane beta-barrel porin, MtrB/PioB
definition: >-
  Members of this protein family are integral proteins of the bacterial outer membrane, associated with multi-haem c-type cytochromes involved in electron transfer. The MtrB protein of Shewanella oneidensis MR-1 (SO1776) has been shown to form a complex with 1:1:1 stochiometry with the small, periplasmic decahaem cytochrome MtrA and large, surface-exposed decahaem cytochrome MtrC.
