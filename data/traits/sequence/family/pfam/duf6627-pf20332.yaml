identifier: Pfam:PF20332
label: Family of unknown function (DUF6627)
definition: >-
  This entry represents a group of proteins mainly found in proteobacteria, including PA2779 from Pseudomonas aeruginosa ( ). The most distinctive feature is an extremely hydrophobic region at or near the C terminus, consisting almost entirely of the bulkier hydrophobic residues Val, Ile, Leu, and Phe. The function is unknown. Proteins in this family are approximately 130 amino acids in length.
