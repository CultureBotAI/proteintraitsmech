identifier: Pfam:PF28093
label: STM3845 retron effector protein
definition: >-
  Members of this bacterial family, such as STM3845 from a retron in Salmonella enterica called St-85 ( ), are found in the vicinity of reverse transcriptases (RNA-directed DNA polymerase) and retron structural RNA genes. This protein is not required for msDNA (Multicopy Single-Stranded DNA) biosynthesis, but instead is assigned an effector function.
