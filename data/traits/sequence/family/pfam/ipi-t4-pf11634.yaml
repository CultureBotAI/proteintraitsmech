identifier: Pfam:PF11634
label: Nuclease inhibitor from bacteriophage T4
definition: >-
  This family of proteins represents IPI from bacteriophage T4. This protein is a nuclease inhibitor which is injected by T4 to protect its DNA from gmrS/gmrD CT of pathogenic Escherichia coli into the infected host. The structure of this protein consists of two small β-sheets flanked by N and C termini by α-helices. The protein has a gmrS/gmrD hydrophobic binding site.
