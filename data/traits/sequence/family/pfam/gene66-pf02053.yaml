identifier: Pfam:PF02053
label: Gene 66 (IR5) protein
definition: >-
  The IR5 open reading frame (ORF) of the Equid herpesvirus 1 (EHV-1) genome maps within the inverted repeat segments. Sequence analyses of the gene region revealed an ORF of 236 amino acids that showed a high degree of similarity to ORF64 of Human herpesvirus 3 (HHV-3) and ORF3 of Equid herpesvirus 4 (EHV-4), both of which map within the inverted repeats, and to the US10 ORF of Human herpesvirus 1 (HHV-1), which maps within the unique short segment. The IR5 ORF houses a sequence of 13 residues (CAYWCCLGHAFAC) that matches perfectly the consensus zinc finger motif (C-X2-4-C-X2-15-C/H-X2-4-C/H). Putative cis-acting elements flanking the IR5 ORF include a TATA box, a CAAT box, and a polyadenylation signal. Coupled with various experimental data, the IR5 gene of EHV-1 thus exhibits characteristics representative of a late gene of the gamma-1 class. The DNA sequence covering ~70% of the short unique region (Us) and part of the short inverted repeat of the Meleagrid herpesvirus 1 (MeHV-1) GA strain has been determined. Sequence analysis showed the presence of nine potential ORFs in the Us region, four of which were found to be similar to US10 (minor virion protein).
