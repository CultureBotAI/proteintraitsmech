identifier: Pfam:PF06413
label: Neugrin
definition: >-
  This entry include neugrin from mammals and Rrg9 from fungi. Neugrin is mainly expressed in neurons and may play an important role in the process of neuronal differentiation. Rrg9 is required for respiratory activity and maintenance and expression of the mitochondrial genome.
