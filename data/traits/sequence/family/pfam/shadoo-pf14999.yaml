identifier: Pfam:PF14999
label: Shadow of prion protein, neuroprotective
definition: >-
  This family of prion-like proteins has a neuroprotective function, similar to PrP(C)-like. Shadoo is mainly expressed in the brain, and highly expressed in the hippocampus, the area of the brain which co-ordinates memory as well as spatial memory and navigation. This protein may also alter the biological actions of normal and abnormal prion protein (PrP) which lead to lethal neurodegenerative diseases. This family of proteins is found in eukaryotes. Proteins in this family are approximately 150 amino acids in length, of which the first 90 are alanine rich.
