identifier: Pfam:PF12411
label: 'Choline sulfatase enzyme C terminal '
definition: >-
  This entry represents the C-terminal domain of choline sulphatase, the enzyme responsible for catalysing the conversion of choline-O-sulphate and, at a lower rate, phosphorylcholine, into choline. There are two completely conserved residues (R and W) that may be functionally important.
