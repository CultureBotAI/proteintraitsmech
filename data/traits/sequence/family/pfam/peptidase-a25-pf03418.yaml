identifier: Pfam:PF03418
label: Germination protease
definition: >-
  This group of peptidases belong to MEROPS peptidase family A25 (GPR peptidase family, clan AE). During the germination of bacterial spores, the GPR peptidase initiates the degradation of the small acid-soluble proteins that make up 10-20% of the spore content. The peptidase prefers an acidic residue in P1' and P4' and a hydrophobic residue in P1' and P2'. There has been controversy concerning the catalytic type of this peptidase, but the consensus is now that it is aspartic-type: two aspartic acid residues have been shown to be essential because mutation of either of these residues prevents autocatalytic activation. The peptidase is active as a homotetramer. The structure of a truncated form of the peptidase precursor has been solved, and shows each monomer consists on a core domain and a cap domain. The core domain contains an eight-stranded β sheet and two α helices, and the cap domain contains three helices. The structure of the hydrogenase-processing peptidase from peptidase family A31 is similar, and both families are included in clan AE. Aspartic peptidases, also known as aspartyl proteases ([ec:3.4.23.-]), are widely distributed proteolytic enzymes known to exist in vertebrates, fungi, plants, protozoa, bacteria, archaea, retroviruses and some plant viruses. All known aspartic peptidases are endopeptidases. A water molecule, activated by two aspartic acid residues, acts as the nucleophile in catalysis. Aspartic peptidases can be grouped into five clans, each of which shows a unique structural fold. Peptidases in clan AA are either bilobed (family A1 or the pepsin family) or are a homodimer (all other families in the clan, including retropepsin from HIV-1/AIDS). Each lobe consists of a single domain with a closed β-barrel and each lobe contributes one Asp to form…
