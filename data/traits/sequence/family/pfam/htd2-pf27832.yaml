identifier: Pfam:PF27832
label: Hydroxyacyl-thioester dehydratase type 2
definition: >-
  The HTD2 family comprises mitochondrial enzymes involved in fatty acid biosynthesis and the glyoxylate assimilation cycle. Members of the HTD2 family, such as Hydroxyacyl-thioester dehydratase type 2, play a crucial role in respiratory growth and maintaining normal mitochondrial morphology by catalysing the dehydration of 3-hydroxyacyl-thioesters. Another member, Mesaconyl-C(4)-CoA hydratase, is essential for converting mesaconyl-C4-CoA to (3S)-citramalyl-CoA, a step in the glyoxylate assimilation cycle that helps regenerate acetyl-CoA and produce pyruvate for biosynthesis. The activity of these enzymes can be regulated by substrate concentration, as seen with mesaconyl-C(4)-CoA hydratase, which is inhibited by high levels of its substrate.
