identifier: Pfam:PF01492
label: Geminivirus C4 protein
definition: >-
  This family represents AC4 proteins mostly found in geminiviruses. In Tomato yellow leaf curl virus the C4 protein is necessary for efficient spreading of the virus in Solanum lycopersicum (Tomato) (Lycopersicon esculentum). It may act as a suppressor of RNA-mediated gene silencing, also known as post-transcriptional gene silencing (PTGS), a mechanism of plant viral defence that limits the accumulation of viral RNAs. May repress the AL61 promoter
