label: Bacteriophage T4 protein Y07E
definition: >-
  This entry represents the Y07E protein family found in T4-like bacteriophages. Y07E is an uncharacterised protein found in the repEA-segC intergenic region of bacteriophage T4. The protein contains a predicted disordered region.
