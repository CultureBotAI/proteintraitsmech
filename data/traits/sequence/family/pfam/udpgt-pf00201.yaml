identifier: Pfam:PF00201
label: UDP-glucoronosyl and UDP-glucosyl transferase
definition: >-
  UDP glycosyltransferases (UGT) are a superfamily of enzymes that catalyse the addition of the glycosyl group from a UDP-sugar to a small hydrophobic molecule. This family currently consist of: Mammalian UDP-glucuronosyl transferases ( ) (UDPGT). A large family of membrane-bound microsomal enzymes which catalyse the transfer of glucuronic acid to a wide variety of exogenous and endogenous lipophilic substrates. These enzymes are of major importance in the detoxification and subsequent elimination of xenobiotics such as drugs and carcinogens. These enzymes are also involved in cancer progression and drug resistance. A large number of putative UDPGT from Caenorhabditis elegans. Mammalian 2-hydroxyacylsphingosine 1-beta-galactosyltransferase ( ) (also known as UDP-galactose-ceramide galactosyltransferase). This enzyme catalyses the transfer of galactose to ceramide, a key enzymatic step in the biosynthesis of galactocerebrosides, which are abundant sphingolipids of the myelin membrane of the central nervous system and peripheral nervous system. Fungal Sterol 3-beta-glucosyltransferase, which is involved in the degradation of peroxisomes, mitochondria and nuclei. Fungal Enfumafungin synthase efuA. This protein plays a role in the biosynthesis of enfumafungin, a glycosylated fernene-type triterpenoid with potent antifungal activity. Fungal UDP-glycosyltransferase FPY2 that is part of the gene cluster mediating the biosynthesis of the gamma-pyrones fusapyrone (FPY) and deoxyfusapyrone (dFPY) and is probably involved in transfer of 4'-deoxyglucose moiety to C-3. Plants Anthocyanidin 3-O-glucosyltransferase, also known as Flavonol O(3)-glucosyltransferase, an enzyme that catalyses the transfer of glucose from UDP-glucose to a flavanol. This reaction is essential and one of the…
