identifier: Pfam:PF29423
label: Family of unknown function (DUF8546)
definition: >-
  This entry represents a protein domain found in tailed bacteriophages (Caudoviricetes). The domain is approximately 67-87 amino acids in length and can occur as a single copy or be repeated within proteins. The family is also found in the Deinococcus bacterial genome, likely derived from an integrated prophage. The function of this domain remains to be determined.
