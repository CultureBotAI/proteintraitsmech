identifier: Pfam:PF02097
label: Filoviridae VP35
definition: >-
  The filoviridae are a group of viruses that cause haemorrhagic fevers with a high mortality rate. The family currently contains three viruses: Ebola virus sp., Lake Victoria marburgvirus and Reston ebolavirus, named after their corresponding outbreak regions. They possess negative-stranded RNA genomes, which encode at least 7 proteins. The VP35 protein is found in the genomes of all filoviruses. Its function is presently unknown, but it is thought to share the function of the phosphorylated proteins (polymerase subunits) of rhabdoviruses and paramyxoviruses due to its position in the genome. There is no evidence however, to suggest that VP35 is phosphorylated.
