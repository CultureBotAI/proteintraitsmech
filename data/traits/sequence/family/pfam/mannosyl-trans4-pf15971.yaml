label: DolP-mannose mannosyltransferase
definition: >-
  AglS is a is a dolichol phosphate-mannose mannosyltransferase that catalyses the transfer of mannose from dolichol phosphate (DolP)-mannose to the N-linked tetrasaccharide bound to the S-layer glycoprotein to form a pentasaccharide.
