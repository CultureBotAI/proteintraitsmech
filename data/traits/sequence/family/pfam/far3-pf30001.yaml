identifier: Pfam:PF30001
label: FAR3
definition: >-
  This entry represents the FAR3 family of proteins found in yeasts. FAR3 participates in the control of re-entry into the cell cycle following pheromone treatment. The protein is a component of the FAR complex, which includes FAR7, FAR8, FAR10, FAR11 and VPS64. FAR3 is localised to the endoplasmic reticulum and prevents premature recovery from pheromone arrest in budding yeast.
