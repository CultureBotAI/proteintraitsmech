label: Poxvirus B22R protein C-terminal
definition: >-
  This domain represents a highly conserved region towards the C terminus of poxvirus proteins from Fowlpox virus, Myxoma virus, Lumpy skin disease, Variola virus and other members of the Poxviridae family of double-stranded, no-RNA stage poxviruses.
