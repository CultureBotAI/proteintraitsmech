identifier: Pfam:PF11418
label: Phi29 scaffolding protein
definition: >-
  This protein is also referred to as Gp7. The protein contains a DNA-binding function and may have a role in mediating the structural transition from prohead to mature virus and also scaffold release.Gp7 is arranged within the capsid as a series of concentric shells.
