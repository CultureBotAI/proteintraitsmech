label: Plasma-membrane choline transporter
definition: >-
  This entry includes a group of choline transporter-like protein, including SLC44A1/2/3/4/5 from humans, Pns1 from budding yeasts, and Ctl1 from fission yeasts. In humans, mutations of this family of proteins have been linked to several human diseases.
