identifier: Pfam:PF05543
label: Staphopain peptidase C47
definition: >-
  Staphopains are one of four major families of proteinases secreted by the Gram-positive Staphylococcus aureus. These staphylococcal cysteine proteases are secreted as preproenzymes that are proteolytically cleaved to generate the mature enzyme.
