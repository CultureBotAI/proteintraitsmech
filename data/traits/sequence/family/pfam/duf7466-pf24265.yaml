identifier: Pfam:PF24265
label: Family of unknown function (DUF7466)
definition: >-
  This entry represents a family of uncharacterised phage proteins. Structurally these are composed of a pair of α-helices. Structure prediction suggests these proteins may homodimerise (iPTM=0.89). These proteins are annotated as RDF proteins but the source of this annotation is uncertain.
