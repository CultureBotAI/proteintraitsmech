identifier: Pfam:PF11431
label: Membrane transport protein MerF
definition: >-
  This entry represents Mercury ion transport protein MerF. This protein, the smallest encoded by the mer operon in bacteria, plays a role in the resistance to environmental mercury toxicity by importing Hg2+ and reducing it to volatile Hg(0). It has also been related to the trasport of cadmium. MerF has a core helix-loop-helix domain. It also has two vicinal pairs of cysteine residues which are involved in the transport of Hg(II) across the membrane and are exposed to the cytoplasm.
