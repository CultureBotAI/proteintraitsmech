identifier: Pfam:PF20288
label: ABC-three component (ABC-3C) system Middle Component 2
definition: >-
  Middle Components (MCs) of the ABC-3C biological conflict systems occupy the central position between the catalytic effector and ABC ATPases of the systems. MCs are defined by distinctive patterns of conserved charged residues. As some MCs are HTH domains, they are predicted to function akin to kleisins as DNA-binding partners for the ABC ATPases, assisting in recognition and responding to invasive elements such as DNA viruses.
