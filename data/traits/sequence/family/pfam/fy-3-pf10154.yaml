identifier: Pfam:PF10154
label: Ferry endosomal RAB5 effector complex subunit 3
definition: >-
  This entry represents a human Ferry endosomal RAB5 effector complex subunit 3 (Fy-3) and similar sequences from animals and some fungal species. Fy-3 is a component of the FERRY complex (Five-subunit Endosomal Rab5 and RNA/ribosome intermediary), which directly interacts with mRNAs and RAB5A, and functions as a RAB5A effector involved in the localisation and the distribution of specific mRNAs most likely by mediating their endosomal transport. The complex recruits mRNAs and ribosomes to early endosomes through direct mRNA-interaction. This family was previously known as DUF2362.
