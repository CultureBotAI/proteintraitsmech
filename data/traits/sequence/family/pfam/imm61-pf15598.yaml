identifier: Pfam:PF15598
label: Immunity protein 61
definition: >-
  This entry represents immunity proteins with an α+β fold and a conserved arginine. The family includes immunity factor for TNT (IFT) from Mycobacterium tuberculosis. This bacteria uses tuberculosis necrotizing toxin (TNT) to kill human macrophages; the immunity factor IFT binds TNT and inhibits its activity to prevent self-poisoning.
