identifier: Pfam:PF26851
label: Phage T7 protein 0.6
definition: >-
  This entry represents protein 0.6 found in bacteriophages. The prototype is from bacteriophage T7, which exists as two forms due to frameshifting: protein 0.6A (53 amino acids) and protein 0.6B (111 amino acids, 13.2 kDa). Protein 0.6B results from a frameshift that occurs prior to the TGA stop codon of 0.6A. The protein contains a disordered C-terminal region with a basic residue bias. The function of this protein is unknown.
