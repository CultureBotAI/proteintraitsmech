identifier: Pfam:PF02349
label: Major surface glycoprotein
definition: >-
  Pneumocystis can cause potentially fatal pneumonia infections in immunosuppressed people. The most abundant protein on the surface of Pneumocystis is the major surface glycoprotein (Msg), which is encoded by a multi-copy gene family. Variation in the expressed Msg is thought to help this organism evade the host immune response. The Msg sequences segregate into two distinct branches, with recombination further increasing the diversity of the Msg sequences. This entry represents a conserved domain found towards the C terminus of Msg2, and is usually found in association with .
