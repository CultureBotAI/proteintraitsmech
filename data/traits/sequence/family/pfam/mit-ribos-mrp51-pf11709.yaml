identifier: Pfam:PF11709
label: 'Mitochondrial ribosomal protein subunit '
definition: >-
  This entry represents the small ribosomal subunit protein bS1m from yeast and similar fungal sequences. bS1m, previously known as MRP51, is a component of the mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. The mitoribosomes are attached to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. bS1m functionally interacts with the 5'-UTR of mitochondrial mRNAs. This family also includes Small ribosomal subunit protein L51-b from Schizosaccharomyces pombe (also known as Mug178), which has a role in meiosis.
