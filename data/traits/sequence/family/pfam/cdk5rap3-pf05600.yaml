identifier: Pfam:PF05600
label: CDK5 regulatory subunit-associated protein 3
definition: >-
  CDK5RAP3 (also known as C53 or LZAP) serves as a probable tumour suppressor initially identified as a CDK5R1 interactor controlling cell proliferation. It negatively regulates NF-kappa-B-mediated gene transcription through the control of RELA phosphorylation. It also regulates mitotic G2/M transition checkpoint and mitotic G2 DNA damage checkpoint. It has been shown to bind Wip1 and stimulates its phosphatase activity.
