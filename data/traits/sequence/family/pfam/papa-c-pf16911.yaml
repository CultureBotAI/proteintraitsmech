identifier: Pfam:PF16911
label: Phthiocerol/phthiodiolone dimycocerosyl transferase C-terminus
definition: >-
  This entry represents the C-terminal domain of phthiocerol/phthiodiolone dimycocerosyl transferase (PapA5) from Mycobacterium tuberculosis. PapA5 catalyses diesterification of phthiocerol and phthiodiolone with mycocerosic acids, the final step in the phthiocerol and phthiodiolone dimycocerosate esters (PDIM) synthesis.
