identifier: Pfam:PF30656
label: Bacteriophage baseplate protein, N-terminal domain
definition: >-
  This entry represents an N-terminal domain of approximately 80 residues found in bacteriophage baseplate assembly proteins. The baseplate is a complex multiprotein structure at the distal end of the phage tail that mediates host recognition and triggers tail contraction during infection. This family is found in tailed bacteriophages and prophages integrated into bacterial genomes, predominantly in Actinomycetota and Pseudomonadota. The specific function of this domain remains to be determined.
