identifier: Pfam:PF05313
label: Poxvirus P21 membrane protein
definition: >-
  This entry represents the Virion membrane protein OPG144 precursor from poxvirus, encoded by the A17L (or A18L) gene is cleaved into the Mature 21 kDa protein OPG144, which has been reported to localise on the inner of the two membranes of the intracellular mature virus (IMV). It has also been shown that it acts as a membrane anchor for the externally located fusion protein P14 (A27L gene). This envelope protein participates in virus morphogenesis. Its interaction with OPG125 scaffold protein leads to the formation of rigid, crescent-shaped membranes that assemble around the cytoplasmic virus factory.
