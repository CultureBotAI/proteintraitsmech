identifier: Pfam:PF21941
label: SMEK domain
definition: >-
  This entry represents the SMEK domain, which is found at the N-terminal end of a group of bacterial proteins. It is named for four genera in which multiple, diverse members of this group of bacterial proteins are found: Staphylococcus, Mycoplasma, Escherichia, and Klebsiella. The SMEK domain is predicted to adopt an α/β fold that resembles the core of restriction endonuclease enzymes. It contains four scattered invariant residues (Glu, Asp, Gln, and Lys) that may be functionally relevant.
