identifier: Pfam:PF15002
label: ERK and JNK pathways, inhibitor
definition: >-
  This coiled-coil domain-containing protein 134 (CCDC134) is a secretory protein that regulates the mitogen activated protein kinase (MAPK) pathway. Overexpression of CCDC134 inhibits transcriptional activity of Elk1 and phosphorylation of Erk and JNK/SAPK but not p38 MAPK. In humans, CCDC134 interacts with a transcription adaptor hADA2a.
