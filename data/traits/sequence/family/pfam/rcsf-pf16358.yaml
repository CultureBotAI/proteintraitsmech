identifier: Pfam:PF16358
label: RcsF lipoprotein
definition: >-
  The Rcs signalling system consists of the RcsCDB phosphorelay signalling pathway and two proteins that modulate the activity of the system, RcsA and RcsF. The Rcs system regulates pathways involved in maintenance of cell wall integrity, cell division, motility, and virulence. RcsF is a outer membrane (OM) lipoprotein that mediates the signalling to the sensor RcsC. RcsF functions to sense defects such as changes in lipopolysaccharide.
