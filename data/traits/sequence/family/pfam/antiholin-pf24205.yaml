identifier: Pfam:PF24205
label: T4-like virus antiholin family
definition: >-
  Antiholins (also known as RI) are bacteriophage proteins that inhibit lysis of host cells by interacting and inhibiting holin, the protein that forms micropores in the host bacterial cell membrane. Antiholin prevents holin forming homo-oligomers. Antiholin has an N-terminal signal anchor release (SAR) domain which not only directs itself to the periplasm, but also targets itself for degradation by the host serine peptidase DegP.
