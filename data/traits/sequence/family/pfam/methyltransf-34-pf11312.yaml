identifier: Pfam:PF11312
label: Putative SAM-dependent methyltransferase
definition: >-
  This family of largely fungal proteins are likely to be a methyltransferase. This was determined through multiple motif screening in yeast. Proteins in this family include Mbt6, which is a methyltransferase responsible for the m3U methylations of 25S rRNA in Saccharomyces cerevisiae.
