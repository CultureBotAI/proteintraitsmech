identifier: Pfam:PF20829
label: Anti-CRISPR protein Acr30-35/AcrF1
definition: >-
  Pseudomonas phages have diverse anti-CRISPR (Acr) proteins that subvert the immune systems in their hosts. These systems depend on a CRISPR RNA (crRNA)-guided surveillance complex (Csy) for the degradation of foreign DNA. This family represents AcrF1, which inhibits DNA recognition of the Csy complex by interfering with base pairing between the DNA target strand and crRNA spacer. AcrF1 can use different mechanisms to block target DNA recognition.
