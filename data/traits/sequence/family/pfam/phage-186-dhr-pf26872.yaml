identifier: Pfam:PF26872
label: Phage 186 Dhr protein
definition: >-
  This entry represents the Dhr protein found in bacteriophages. The prototype is from Escherichia phage 186, a 66 amino acid protein with a molecular weight of 7.5 kDa. The protein is also known as CP78 and is classified as an early protein expressed during the lytic cycle. Dhr is involved in the depression of host DNA replication, representing a mechanism by which the phage interferes with host cellular processes to favour viral replication. The protein has been characterised at the functional level with evidence at the protein level. This entry also covers uncharacterised enterobacterales proteins.
