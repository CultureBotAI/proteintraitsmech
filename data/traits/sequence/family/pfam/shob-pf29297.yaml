identifier: Pfam:PF29297
label: Type I toxin-antitoxin system toxin ShoB
definition: >-
  This entry represents ShoB, a small toxic membrane protein of approximately 26 amino acids found in Escherichia coli. ShoB is the toxic component of a type I toxin-antitoxin system. The protein contains a single transmembrane helix. Overexpression causes cessation of growth and rapid membrane depolarisation. Expression is regulated by the antisense small RNA OhsC, which represses translation of the toxin.
