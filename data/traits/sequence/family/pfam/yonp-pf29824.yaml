identifier: Pfam:PF29824
label: YonP prophage protein
definition: >-
  This entry represents YonP, a 64 amino acid uncharacterised protein from the SPbeta prophage of Bacillus subtilis. The protein is found in SPbeta phage and related prophages across Bacillales. The function of this protein remains to be determined.
