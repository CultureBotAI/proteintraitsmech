identifier: Pfam:PF30757
label: CCDC125
definition: >-
  This entry represents coiled-coil domain-containing protein 125 (CCDC125), also known as Kenae. CCDC125 is a cytoplasmic protein found in vertebrates that is involved in the negative regulation of cell motility through deregulation of Rho GTPase signalling. In mouse, the protein is expressed in many tissues with highest levels in spleen, thymus and bone marrow. CCDC125 contains multiple coiled-coil regions and an N-terminal disordered region.
