identifier: Pfam:PF22147
label: Anti-CRISPR protein AcrIC5
definition: >-
  This entry represents a domain that covers the whole length of AcrIC5 and is found at the C-terminal end of other proteins from tailed bacteriophages and bacterial prophages. AcrIC5 is one of the earliest discovered AcrIC proteins that inhibit type I-C CRISPR-Cas systems. AcrIC5 adopts an α/β structure consisting of a β-hairpin and three α-helices ( , ). The presence of a highly acidic surface patch suggests that AcrIC5 might inhibit the type I-C CRISPR-Cas system by directly binding to the DNA target binding site in the system by mimicking DNA.
