identifier: Pfam:PF25310
label: VG15 protein
definition: >-
  This entry represents the Gene 15 protein (VG15) from Mycobacterium phages D29 and L5 and related proteins from tailed bacteriophages. This family is probably distantly related to and likely represents phage capsid proteins. Members of this family contain two pairs of highly conserved cysteine residues that may constitute a metal-binding site.
