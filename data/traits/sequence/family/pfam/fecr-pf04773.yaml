identifier: Pfam:PF04773
label: FecR protein
definition: >-
  This entry represents the homologs of Ferric citrate uptake sigma factor regulator FecR . This protein is required for transcriptional activation of the fecABCDE operon by sigma factor FecI. It undergoes sequential cleavage to produce an N-terminal cytoplasmic fragment which is released from the membrane and binds to FecI, allowing it to activate transcription of the fecABCDE operon which mediates ferric citrate transport. In the absence of citrate, FecR inactivates FecI. FecR is involved in regulation of iron dicitrate transport. In the absence of citrate FecR inactivates FecI. FecR is probably a sensor that recognises iron dicitrate in the periplasm.
