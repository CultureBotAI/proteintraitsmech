identifier: Pfam:PF11939
label: '[NiFe]-hydrogenase assembly, chaperone, HybE'
definition: >-
  Members of this family are chaperones for the assembly of [NiFe] hydrogenases, in the family of HybE, which is specific for hydrogenase-2 of Escherichia coli. Members often have an additional N-terminal rubredoxin domain.
