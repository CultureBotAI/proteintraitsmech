identifier: Pfam:PF20800
label: Xanthomonas phage Xp10 Transcription regulator P7
definition: >-
  Transcription regulator P7 from Xanthomonas phage Xp10 ( ) interacts with the RNA polymerase (RNAP) from bacteria: it prevents transcription termination and inhibits transcription initiation. This protein adopts a compact globular form comprising an α-helix packed against a β-sheet.
