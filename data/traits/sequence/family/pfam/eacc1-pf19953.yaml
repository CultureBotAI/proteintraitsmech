identifier: Pfam:PF19953
label: Effector Associated Constant Component 1
definition: >-
  Effector Associated Constant Component 1 (EACC1) is a component of a membrane-associated two-gene conflict system, a class of NTP-dependent biological conflict systems. It is found either a standalone domain or fused to Effector-associated domains EAD1 or EAD2. It is comprised of a single conserved TM helix with short, N- and C-terminal extensions. It is predicted to insert into the membrane and protrude beyond both the outer and inner layers of the bilayer.
