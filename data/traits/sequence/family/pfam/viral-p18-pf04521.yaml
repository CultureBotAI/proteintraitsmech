identifier: Pfam:PF04521
label: ssRNA positive strand viral 18kD cysteine rich protein
definition: >-
  This family represents the 18kDa cysteine-rich protein from ssRNA positive strand viruses. This entry includes Suppressor of RNA silencing . This protein is a suppressor of RNA-mediated gene silencing, also known as post-transcriptional gene silencing (PTGS), a mechanism of plant viral defense that performs sequence-specific inhibition of viral mRNAs expression.
