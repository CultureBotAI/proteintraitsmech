identifier: Pfam:PF26844
label: Phage phiKMV holin family
definition: >-
  The Phage phiKMV holin protein family is involved in the lysis of host cells by forming nanometer-scale pores in the cytoplasmic membrane. This process leads to membrane depolarization and the release of endolysin into the periplasmic space. The endolysin then degrades the peptidoglycan layer, facilitating the release of mature viral particles. Holins accumulate harmlessly until a critical concentration is reached, triggering pore formation. They work in conjunction with SAR-endolysin and U-spanin proteins to ensure the precise timing of host cell lysis. Holins typically form homomultimers to execute their function effectively.
