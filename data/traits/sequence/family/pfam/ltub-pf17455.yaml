identifier: Pfam:PF17455
label: Late transcription unit B
definition: >-
  Chlamydiae possess an intracellular developmental cycle defined by the interconversion of infectious, metabolically inactive elementary bodies and noninfectious, dividing reticulate bodies. The predicted peptides encoded by late genes ltuA and ltuB do not resemble known proteins, and their function is not known. The transcription of at least some chlamydial late-stage genes is dependent on sigma 66, which is homologous to the major sigma factors of other eubacteria.
