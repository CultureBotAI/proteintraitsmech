identifier: Pfam:PF14375
label: Cysteine-rich CWC
definition: >-
  This is a group of uncharacterised proteins mostly from bacteria. Proteins in this family are typically between 74 and 102 amino acids in length. They contain eight conserved cysteines, including a conserved CWC sequence motif.
