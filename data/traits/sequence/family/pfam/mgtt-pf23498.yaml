identifier: Pfam:PF23498
label: MgtT
definition: >-
  This protein family includes the uncharacterised protein MgtT from Escherichia coli, a 34-residues micropeptide encoded by a small open reading frame (smORF) that lies just downstream of mgtS and is encoded antisense of the mgrR small regulatory RNA gene. Proteins 50 or fewer residues-long have been shown to regulate the functions of larger proteins in a variety of organisms.
