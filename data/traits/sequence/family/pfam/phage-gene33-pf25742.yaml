identifier: Pfam:PF25742
label: Phage Gene 33 protein
definition: >-
  This entry represents the Gene 33 protein (Gp33) found in Bacillus phage SP01 and related bacteriophages. Gp33 from Bacillus phage SP01 is thought to act as a regulatory subunit of the Bacillus subtilis RNA polymerase during viral infection. Some homologs in other bacteriophages are annotated as sigma factor accessory proteins, suggesting a role in modulating host transcription.
