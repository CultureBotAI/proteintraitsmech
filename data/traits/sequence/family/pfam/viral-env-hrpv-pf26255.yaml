identifier: Pfam:PF26255
label: Archaeal pleolipovirus envelope fusion protein
definition: >-
  This entry represents the N-terminal domain in envelope protein (Env/VP5) found in archaeal pleolipoviruses such as Halorubrum pleomorphic virus 1 (HRPV-1). This membrane fusion protein mediates viral entry by fusing the viral envelope with the host cell membrane. The protein has a unique V-shaped fold representing a potentially new class of viral fusion proteins, distinct from the known classes I-III. The structure consists of two elongated domains of roughly equal size, linked by a single residue. The protein is monomeric on the viral surface and contains a hydrophobic region that may function as a fusion peptide. This domain is also found in archaeal sequences. Many members of this group contain a signal peptide at the N-terminal and a transmembrane helix near the C-terminal.
