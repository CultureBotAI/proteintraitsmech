identifier: Pfam:PF03690
label: Uncharacterised protein family (UPF0160)
definition: >-
  This family includes MYG1 exonuclease from human and its orthologues, a 3'-5' RNA exonuclease which cleaves in situ on specific transcripts in both nucleus and mitochondrion. It is involved in regulating spatially segregated organellar RNA processing, acting as a coordinator of nucleo-mitochondrial crosstalk. In nucleolus, processes pre-ribosomal RNA involved in ribosome assembly and alters cytoplasmic translation. In mitochondrial matrix, processes 3'-termini of the mito-ribosomal and messenger RNAs and controls translation of mitochondrial proteins. Overexpression of MYG1 has been associated with the autoimmune disorder vitiligo, suggesting that MYG1 may play some role in human innate immunity. Studies in yeast suggested a potential antiviral function of MYG1.
