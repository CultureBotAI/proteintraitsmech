identifier: Pfam:PF31149
label: Tail-anchor membrane protein
definition: >-
  This entry represents a small tail-anchor membrane protein of approximately 56 residues found in Actinomycetota, particularly Streptomycetaceae and Streptosporangiaceae. Tail-anchor proteins lack N-terminal signal sequences and instead contain a C-terminal transmembrane domain that targets them to membranes post- translationally. The prototype SCO1166 from Streptomyces coelicolor was identified as a tail-anchor protein with the N terminus facing outward. The function of these proteins remains to be determined.
