identifier: Pfam:PF09533
label: Predicted lipoprotein of unknown function (DUF2380)
definition: >-
  This family represents a group of uncharacterised proteins from Myxococcales, including CHP02269, MYXXA from Stigmatella aurantiaca and at least 9 paralogues in Myxococcus xanthus. One appears truncated toward the N-terminal; the others are predicted lipoproteins. The function is unknown.
