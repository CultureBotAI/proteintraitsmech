identifier: Pfam:PF16968
label: Pilus assembly protein TadZ N-terminal
definition: >-
  This entry represents the N-terminal region of the Flp pilus assembly protein TadZ, which carries an AAA, ATPase domain immediately downstream ( ). Proteins containing this domain are signal-transduction-response receivers. They are localised to the cytoplasmic side of the inner bacterial cell-membrane, contacting also with both TadA and RcpC.
