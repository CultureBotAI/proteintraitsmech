identifier: Pfam:PF03911
label: Sec61beta family
definition: >-
  This family includes preprotein translocase subunit SecG, protein transport protein Sec61 subunit beta and Sbh1. A conserved heterotrimeric integral membrane protein complex--the Sec61 complex (eukaryotes) or SecY complex (prokaryotes)--forms a protein-conducting channel that allows polypeptides to be transferred across (or integrated into) the endoplasmic reticulum (eukaryotes) or across the cytoplasmic membrane (prokaryotes). This complex is itself a part of a larger translocase complex. The alpha subunits ( ), called Sec61alpha in mammals, Sec61p in Saccharomyces cerevisiae (Baker's yeast), and SecY in prokaryotes, and the gamma subunits, called Sec61gamma in mammals, Sss1p in S. cerevisiae, and SecE in prokaryotes, show significant sequence conservation. Both subunits are required for cell viability in S. cerevisiae and Escherichia coli. The beta subunits, called Sec61beta in mammals, Sbh in S. cerevisiae, and SecG in archaea, are not essential for cell viability. They are similar in eukaryotes and archaea, but show no obvious homology to the corresponding SecG subunits in bacteria.
