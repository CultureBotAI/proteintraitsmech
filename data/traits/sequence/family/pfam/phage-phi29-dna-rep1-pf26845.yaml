identifier: Pfam:PF26845
label: Phage phi29 DNA replication protein 1 family
definition: >-
  This entry represents RNA-binding early protein Gp1 found in Bacillus phages phi-29 and PZA. Gp1 self-associates to form long filamentous structures, which appear to be necessary for efficient binding to RNA and for translational repression. Gp1 is required for viral DNA replication; it suppresses the synthesis of phi29 DNA polymerase and primer protein in the post-transcriptional process. It appears to be a component of a viral-encoded structure that associates with the bacterial membrane in order to provide an anchoring site for the viral DNA replication machinery.
