identifier: Pfam:PF05480
label: Phenol-soluble modulin beta protein
definition: >-
  This family consists of several different short Staphylococcal proteins known as the phenol-soluble modulin beta proteins, including SLUSH A, B and C proteins as well as haemolysin and gonococcal growth inhibitor. Some strains of the coagulase-negative Staphylococcus lugdunensis produce a synergistic hemolytic activity (SLUSH), phenotypically similar to the delta-hemolysin of S. aureus. Gonococcal growth inhibitor from Staphylococcus acts on the cytoplasmic membrane of the gonococcal cell causing cytoplasmic leakage and, eventually, death.
