identifier: Pfam:PF04172
label: 'LrgB-like family '
definition: >-
  The two products of the lrgAB operon are potential membrane proteins. LrgA and LrgB are antiholin-like proteins thought to control murein hydrolase activity and penicillin tolerance and to inhibit the holin-like proteins from the cidAB operon, CidA and CidB. The regulatory processes by these proteins is still largely unknown. This family represents LrgB and CidB.
