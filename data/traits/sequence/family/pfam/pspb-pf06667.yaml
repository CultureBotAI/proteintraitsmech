identifier: Pfam:PF06667
label: Phage shock protein B
definition: >-
  This family consists of several bacterial phage shock protein B (PspB) sequences, also known as envelope stress response membrane protein PspB. The phage shock protein (psp) operon is induced in response to heat, ethanol, osmotic shock and infection by filamentous bacteriophages. Expression of the operon requires the alternative sigma factor sigma54 and the transcriptional activator PspF. In addition, PspA plays a negative regulatory role, and the integral-membrane proteins PspB and PspC play a positive one. PspB is both a regulator and an effector protein of the phage shock response.
