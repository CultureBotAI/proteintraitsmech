identifier: Pfam:PF12237
label: Phosphorylated CTD interacting factor 1 WW domain
definition: >-
  This domain is found in bacteria and eukaryotes, and is approximately 180 amino acids in length. It is the WW domain of PCIF1. PCIF1 interacts with phosphorylated RNA polymerase II carboxy-terminal domain (CTD). The WW domain of PCIF1 can directly and preferentially bind to the phosphorylated CTD compared to the unphosphorylated CTD. PCIF1 binds to the hyperphosphorylated RNAP II (RNAP IIO) in vitro and in vivo. Double immunofluorescence labeling in HeLa cells demonstrated that PCIF1 and endogenous RNAP IIO are co-localized in the cell nucleus. PCIF1 is a cap-specific adenosine methyltransferase that catalyzes formation of N6,2'-O-dimethyladenosine cap (m6A(m)) by methylating the adenosine at the second transcribed position of capped mRNAs.
