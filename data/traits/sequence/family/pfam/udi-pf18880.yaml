identifier: Pfam:PF18880
label: Uracil-DNA glycosylase inhibitor
definition: >-
  This family includes the Uracil-DNA glycosylase inhibitor (Ugi) found in Bacillus subtilis phage. Ugi is an inhibitor that inactivates the host uracil-DNA glycosylase (UDG), also known as (UNG) uracil-DNA N-glycosylase. UDG is a highly conserved enzyme responsible for the initiation of uracil-base excision repair. Ugi forms a tight non-covalent bond to UDG, completely inhibiting it from binding to DNA by inserting its β1 strand into the conserved DNA-binding groove of the enzyme. In complex with UDG, Ugi folds into an α-β-α sandwich structure formed by five-stranded antiparallel β-strands and two helices.
