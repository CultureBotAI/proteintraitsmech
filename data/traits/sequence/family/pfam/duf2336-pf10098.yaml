identifier: Pfam:PF10098
label: Uncharacterised protein conserved in bacteria (DUF2336)
definition: >-
  This entry represents a group of sequences from alphaproteobacteria, including SpbR from Caulobacter vibrioides ( ). It is a conserved pole-localised protein, that is normally cleared by ClpXP-mediated proteolysis before the time of chromosome segregation, indicating that SpbR turnover is part of the cell cycle-dependent program of polar development.
