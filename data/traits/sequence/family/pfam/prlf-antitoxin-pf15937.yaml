identifier: Pfam:PF15937
label: prlF antitoxin for toxin YhaV_toxin
definition: >-
  PrlF is a bacterial antitoxin that neutralises the toxin YhaV. PrlF is labile and forms a homodimer that then binds to the YhaV toxin thereby neutralising its ribonuclease activity. Alone, it can also act as a transcription factor. The YhaV/PrlF complex binds the prlF-yhaV operon, probably regulating its expression negatively. Over-expression of PrlF leads to increased doubling time.
