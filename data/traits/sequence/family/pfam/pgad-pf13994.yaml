identifier: Pfam:PF13994
label: PgaD-like protein
definition: >-
  This entry represents the poly-beta-1,6-N-acetyl-D-glucosamine (PGA) biosynthesis protein PgaD. This cytoplasmic membrane protein appears to be an auxiliary subunit to the PGA synthase PgaC ( ). PgaD is esential for the process of PGA synthesis and export. PGA serves as an adhesin for the maintenance of biofilm structural stability in bacteria.
