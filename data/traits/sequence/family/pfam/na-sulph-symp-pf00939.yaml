identifier: Pfam:PF00939
label: Sodium:sulfate symporter transmembrane region
definition: >-
  Integral membrane proteins that mediate the intake of a wide variety of molecules with the concomitant uptake of sodium ions (sodium symporters) can be grouped, on the basis of sequence and functional similarities into a number of distinct families. The SLC13 family consists mainly of dicarboxylate and sulfate transporters, and includes of the following proteins: Mammalian sodium/sulphate cotransporter. Mammalian renal sodium/dicarboxylate cotransporter, which transports succinate and citrate. Mammalian sodium/citrate cotransporter, which mediates the entry of citrate into cells, which is a critical participant of biochemical pathways. Mammalian intestinal sodium/dicarboxylate cotransporter. Chlamydomonas reinhardtii putative sulphur deprivation response regulator SAC1. These transporters are proteins of from 430 to 620 amino acids which are highly hydrophobic and which probably contain about 12 transmembrane regions.
