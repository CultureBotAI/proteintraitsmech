identifier: Pfam:PF23515
label: YibY
definition: >-
  This protein family includes Protein YibY from Escherichia coli, a 36-residues micropeptide encoded by a small open reading frame (smORF) that is found antisense to waaL. Proteins 50 or fewer residues-long have been shown to regulate the functions of larger proteins in a variety of organisms.
