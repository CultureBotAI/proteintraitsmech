identifier: Pfam:PF24232
label: Family of unknown function (DUF7445)
definition: >-
  This entry represents an uncharacterised protein family found in mycobacteriophages. The function of this protein is currently unknown. The family is approximately 147 amino acids long. These proteins contain two small domains. The most N-terminal one contains a CXXC and HXXC motif that likely bind to zinc.
