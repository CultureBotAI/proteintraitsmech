identifier: Pfam:PF16167
label: Domain of unknown function (DUF4871)
definition: >-
  This family consists of uncharacterised proteins around 170 residues in length and is mainly found in various Bacillus species (B. cereus, B. thuringiensis and B. anthracis). The solved structure of B. anthracis homologues (PDB entry 4JG9) has a variant of the Greek-key β barrel fold. The function of this family is not clear.
