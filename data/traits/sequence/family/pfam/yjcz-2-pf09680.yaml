identifier: Pfam:PF09680
label: Family of unknown function
definition: >-
  Endospores of B. subtilis are encased in a thick protein shell known as the spore coat. The coat's complex structure comprises an inner coat (IC) and an outer coat (OC), and includes more than 70 spore-specific proteins. This entry includes several sporulation-specific proteins including YjcZ and SscA, which is involved in spore germination and spore coat assembly.
