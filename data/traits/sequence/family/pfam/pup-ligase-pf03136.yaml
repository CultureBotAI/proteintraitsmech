identifier: Pfam:PF03136
label: Pup-ligase protein
definition: >-
  Pupylation is a novel protein modification system found in some bacteria. This entry represents two related groups of proteins involved in this system. Pup ligases, such as PafA, conjugate the prokaryotic ubiquitin-like protein Pup to lysine residues in target proteins, marking them for degradation. Pup deamidases, such as PafD, catalyse the deamidation of the Pup C-terminal glutamine to glutamate, thereby rendering the protein competent for conjugation. It has been suggested that proteins in this entry are related to gamma-glutamyl-cysteine synthetases.
