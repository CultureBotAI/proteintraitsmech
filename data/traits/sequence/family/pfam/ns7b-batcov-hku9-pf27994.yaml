identifier: Pfam:PF27994
label: Bat coronavirus HKU9-like NS7b protein
definition: >-
  This entry represents the NS7b protein of Rousettus bat coronavirus (CoV) HKU9 and related proteins from betacoronaviruses in the nobecovirus subgenera (D lineage). The NS7b protein of lineage D betacoronavirus is an accessory protein whose function is unknown. It is not related to NS7b proteins from other betacoronavirus lineages.
