identifier: Pfam:PF28340
label: TIN1
definition: >-
  This entry represents TIN1 proteins. TIN1 is an endoplasmic reticulum protein that regulates pollen surface morphology by modulating the secretion of proteins and lipids during pollen development. The protein is highly induced during the unfolded protein response in a bZIP60-dependent manner and is specifically expressed in pollen grains. TIN1 proteins are found in plants.
