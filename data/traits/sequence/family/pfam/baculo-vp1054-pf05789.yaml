identifier: Pfam:PF05789
label: Baculovirus VP1054 protein
definition: >-
  This family consists of several VP1054 proteins from the Baculoviruses. VP1054 (also known as AC54) is a virus structural protein required for nucleocapsid assembly. It is necessary for localization of the major capsid protein VP39 at the site of nucleocapsid assembly.
