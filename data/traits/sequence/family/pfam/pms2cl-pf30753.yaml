identifier: Pfam:PF30753
label: PMS2-C terminal-like disordered protein
definition: >-
  This entry represents PMS2CL, a disordered protein found in humans. In PMS2CL, this entry covers its full length, while in its homologues, it represents the disordered region found near the C-terminal, with which it shows sequence similarity to the C-terminal region of PMS2, a component of the DNA mismatch repair system, and belongs to the MutL/HexB family. PMS2CL was initially considered a pseudogene product, however peptides specific to this protein have been identified by mass spectrometry, suggesting it is expressed. The protein is characterised by multiple regions of compositional bias containing basic and acidic residues. The function of this protein remains to be determined.
