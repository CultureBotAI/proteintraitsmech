identifier: Pfam:PF03903
label: Phage T4 tail fibre
definition: >-
  Irreversible binding of T-even bacteriophages to Escherichia coli is mediated by the short and long tail fibres, which serve as inextensible stays during DNA injection. Short tail fibres are exceptionally stable elongated trimers of gene product 12 (gp12), a 56kDa protein. The N-terminal region of gp12 is important for phage attachment, the central region forms a long shaft, while a C-terminal globular region is implicated in binding to the bacterial lipopolysaccharide core. Long tail fibers consist of a phage-proximal (gp34) and a phage-distal rod, the latter containing two protein trimers (gp36 and gp37). Gp36 is present in the upper part of the distal rod, it forms a complex with gp35 and gp37, binding them through the N-terminal and C-terminal regions, respectively. The upper part of the distal rod has a β-structure.
