identifier: Pfam:PF14942
label: Organelle biogenesis, Muted-like protein
definition: >-
  Lysosomes are membrane-bound organelles found in animals that are involved in degradation of endogenous and exogenous macromolecules. Lysosome-related organelles occur in specific cell types and fulfil specialised functions e.g. melanosomes which synthesise and store pigments in higher eukaryotes. Lysosome biogenesis is linked to the to the secretory and endocytic pathways for protein and lipid trafficking. One of the protein complexes involved in this process is biogenesis of lysosome-related organelles complex 1 (BLOC-1). This complex consists of seven distinct subunits: dysbindin, pallidin, muted, snapin, cappuccino, and BLOS1-3 subunits. Apart from BLOCS3 all of these subunits are predicted to form coiled-coil structures. BLOC-1 can be found in the cytosol and also associated with membranes. Protein interaction studies suggest that this complex interacts with a number of proteins including syntaxin, filametous actin, dystrobrevin and mysopryn, though the molecluar function of this complex is not yet known. Mutations in BLOC-1 subunits are associated with Hermansky-Pudlak syndrome -a disorder characterised by deficiencies in melanosomes, platelet-dense granules and other lysosome-related organelles. Cells that lack lysosome-related organelles express BLOC-1 but do not appear to need it for lysosome biosynthesis. In concert with the AP-3 complex, the BLOC-1 complex is required to target membrane protein cargos into vesicles assembled at cell bodies for delivery into neurites and nerve terminals. This group represents the subunit 5 (also known as the muted subunit) of BLOC-1. In mice, defects in this protein are the cause of the Muted (mu) mutant, which is characterised by light eyes at birth, hypopigmentation of the coat, platelet storage pool deficiency and lysosoma…
