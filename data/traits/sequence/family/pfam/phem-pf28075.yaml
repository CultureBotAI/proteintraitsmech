identifier: Pfam:PF28075
label: Phenylalanyl--tRNA ligase operon leader peptide PheM
definition: >-
  This entry represents the phenylalanyl--tRNA ligase operon leader peptide from E.coli ( ) and related species. The pheST operon codes for the two subunits of phenylalanyl-tRNA synthetase. The nucleotide sequence of the control regions of the operon indicates the presence of several open reading frames one of which, the leader peptide, is translated efficiently. The leader peptide is essential for attenuation control.
