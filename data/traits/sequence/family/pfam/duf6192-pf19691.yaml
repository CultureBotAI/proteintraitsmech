label: Family of unknown function (DUF6192)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000713) is described by MIBiG as an example of the saccharide biosynthetic class. It includes a member from from the ribostamycin biosynthetic gene cluster from Streptomyces ribosidificus. This family is mainly found in Streptomycetales.
