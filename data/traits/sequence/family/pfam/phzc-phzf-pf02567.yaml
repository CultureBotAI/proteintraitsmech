identifier: Pfam:PF02567
label: Phenazine biosynthesis-like protein
definition: >-
  This entry represents the PhzF family, which includes PhzF and uncharacterised isomerases. PhzF is part of the seven-gene operon phzABCDEFG, responsible for the synthesis of phenazine-1-carboxylic acid (PCA) in Pseudomonas species. PhzF is a trans-2,3-dihydro-3-hydroxyanthranilate isomerase that catalyses the condensation of two molecules of trans-2,3-dihydro-3-hydroxyanthranilic acid (DHHA) into the phenazine ring system. The final product is not yet known.
