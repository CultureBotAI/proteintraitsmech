identifier: Pfam:PF07109
label: Magnesium-protoporphyrin IX methyltransferase C-terminus
definition: >-
  This entry represents the C terminus (approximately 100 residues) of bacterial and eukaryotic magnesium-protoporphyrin IX methyltransferase ( ). This converts magnesium-protoporphyrin IX to magnesium-protoporphyrin IX metylester using S-adenosyl-L-methionine as a cofactor.
