identifier: Pfam:PF23506
label: YqgH
definition: >-
  This protein family includes Protein YqgH from Escherichia coli, a 27-residue micropeptide encoded by a small open reading frame (smORF). Proteins 50 or fewer residues long have been shown to regulate the functions of larger proteins in a variety of organisms. This protein is expressed both exponential and stationary phase in rich medium; expression is higher in stationary phase (at protein level).
