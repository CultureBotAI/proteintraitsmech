label: Family of unknown function (DUF6332)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001598) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide, in particular the foxicins A-D biosynthetic gene cluster from Streptomyces diastatochromogenes. This family appears to be predominantly found in Actinobacteria.
