identifier: Pfam:PF06287
label: Protein of unknown function (DUF1039)
definition: >-
  This family describes a small protein, always smaller than 100 amino acids, encoded in pathogenicity islands for bacterial type III secretion systems in various strains of Yersinia, Salmonella, and enteropathogenic Escherichia coli, as well as Chromobacterium violaceum and Citrobacter rodentium, which are part of the EscG/YscG/SsaH family of type III secretion system needle protein co-chaperones. In Edwardsiella piscicida, this protein is called EsaH and homologous to Salmonella SPI2 protein SsaH, which has been reported to be one of the chaperones of the Salmonella SPI2 needle protein SsaG. EsaH forms a complex with EscE, which is analogous to T3SS needle chaperones, and controls the T3SS protein secretion by stabilizing EsaG whose secretion in turn leads to the secretion of the middle and late T3SS substrates.
