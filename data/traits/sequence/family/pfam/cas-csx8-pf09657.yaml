identifier: Pfam:PF09657
label: CRISPR-associated protein Csx8 (Cas_Csx8)
definition: >-
  This entry represents the Cxs8 family of Cas proteins, whose function is unknown. These proteins are encoded in the midst of a cas gene operon, immediately upstream of CRISPR-associated autoregulator, DevR family ( ). The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
