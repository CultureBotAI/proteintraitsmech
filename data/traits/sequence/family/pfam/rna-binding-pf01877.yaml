identifier: Pfam:PF01877
label: RNA binding
definition: >-
  This entry represents a family of archaeal proteins, including RNA-binding protein PAB1135 from Pyrococcus abyssi, UPF0201 protein PH1010 from Pyrococcus horikoshii and UPF0201 protein SSO1042 from Saccharolobus solfataricus. While PAB1135 has been reported to bind efficiently double-stranded RNAs in vitro in a non-sequence specific manner, other members of this family such as PH1010 are unlike to have rRNA-binding ability despite its structural similarity to the RRM-type RNA-binding domain of the ribosomal L5 protein as the residues involved in RNA-binding in the L5 protein are not conserved in members of this family. PH1010 is composed of six β-strands that form a slightly twisted antiparallel β-sheet and face five α-helices on one side and two additional β-strands forming an antiparallel β-sheet in the C terminus. PH1010 forms a characteristic homodimer structure in the crystal. Dimerisation of the molecule is crucial for function.
