identifier: Pfam:PF05238
label: Centromere protein Chl4/mis15/CENP-N
definition: >-
  This family includes Chl4 from budding yeasts, mis15 from fission yeasts and centromere protein N (CENP-N) from animals. In Saccharomyces cerevisiae, Chl4 is an outer kinetochore structural component required for chromosome stability. Chl4 is a component of the Ctf19 kinetochore complex that interacts with Ctf19p, Ctf3p, Iml3p and Mif2p. It is required for establishing bipolar spindle-microtubule attachments and proper chromosome segregation.
