identifier: Pfam:PF04061
label: 'ORMDL family '
definition: >-
  ORMDL family members include ORMDL1/2/3 from humans and their homologues, such as protein Orm1 and Orm2 from budding yeasts. ORMDLs may be involved in protein folding in the endoplasmic reticulum. In budding yeast, Orm1 and Orm2 proteins mediate sphingolipid homeostasis.
