identifier: Pfam:PF05424
label: Duffy binding domain
definition: >-
  This domain is located at the C-terminal of the Duffy-antigen binding protein of Plasmodium spp. Duffy-antigen binding protein is an antigen on these parasites which enable them to invade erythrocytes. Proteins containing this domain are typically between 449 and 1061 amino acids in length. These proteins are found in association with . There are two conserved sequence motifs: NKNGG and QKHDF.
