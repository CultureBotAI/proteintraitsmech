definition: >-
  Members of this family are PLP-dependent enzymes, probable aminotransferases of the DegT/DnrJ/EryC1/StrS family including . Members occur in some Leptospira in their O-antigen biosynthesis regions, in a related cassette in gammaproteobacterium IMCC1989, and similar bacterial sequences.
