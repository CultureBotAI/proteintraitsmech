identifier: Pfam:PF10753
label: Toxin GhoT_OrtT
definition: >-
  GhoT is part of the GhoT-GhoS type V toxin-antitoxin (TA) system. GhoT is inhibited by antitoxin GhoS, which specifically cleaves its mRNA. OrtT is homologous to GhoT, but it is not part of a TA pair. In this case, it acts as an independent toxin to reduce growth during stress related to amino acid and DNA synthesis.
