label: Family of unknown function (DUF7432)
definition: >-
  This entry represents a family of uncharacterised phage proteins that are composed of two small domains connected by an α-helix. Structure prediction suggests that these proteins may homodimerise or tetramerise. These proteins are primarily found in Gordonia phage.
