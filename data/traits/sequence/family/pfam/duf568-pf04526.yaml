identifier: Pfam:PF04526
label: Protein of unknown function (DUF568)
definition: >-
  This entry represents the DOMON domain found in AIR12 and related proteins. Proteins containing this domain are plant proteins that may have a cytochrome b561 domain C-terminal to the DOMON domain. In Arabidopsis, AIR12 is a plasma membrane b-type cytochrome specific to flowering plants. AIR12 functions as either antioxidant in its oxidized state or a pro-oxidant in its reduced state depending on the redox status of the plasma membrane and the apoplast. DOMON domains were initially thought to confer protein-protein interactions. They were subsequently found as a heme-binding motif in cellobiose dehydrogenase, an extracellular fungal oxidoreductase that degrades both lignin and cellulose, and in ethylbenzene dehydrogenase, an enzyme that aids in the anaerobic degradation of hydrocarbons. The domain interacts with sugars in the type 9 carbohydrate binding modules (CBM9), which are present in a variety of glycosyl hydrolases, and it can also be found at the N terminus of sensor histidine kinases.
