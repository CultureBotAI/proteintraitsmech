identifier: Pfam:PF02942
label: Influenza B non-structural protein (NS1)
definition: >-
  A specific region of the Influenza B virus NS1 protein, which includes part of its effector domain, blocks the covalent linkage of mouse ISG15 to its target proteins both in vitro and in infected cells. Of the several hundred proteins induced by interferon (IFN) alpha/beta, the ubiquitin-like ISG15 protein is one of the most predominant. Influenza A virus employs a different strategy: its NS1 protein does not bind the ISG15 protein, but little or no ISG15 protein is produced during infection.
