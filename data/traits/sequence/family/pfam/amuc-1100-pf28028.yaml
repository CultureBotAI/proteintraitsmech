identifier: Pfam:PF28028
label: Amuc_1100 pilus-like
definition: >-
  This entry includes the functionally uncharacterised protein Amuc_1100 ( ) from Akkermansia muciniphila, a probiotic bacterium known to influence glucose homeostasis and to contribute to gut health. The crystal structure of Amuc_1100 was determined ( ) and revealed a structural similarity to three proteins related to pilus formation, PilO, PilN and EpsL, indicating potential similarity in function. Amuc_1100 folds into an α/β structure consisting of a four-stranded antiparallel curved β-sheet with α-helices packed on the concave side of the sheet. Amuc_1100 was shown to interact with Toll-like receptor 2 and to improve the gut barrier via activation of this receptor.
