identifier: Pfam:PF29727
label: Druantia-type antiviral defence protein DruD
definition: >-
  This entry represents DruD, a component of the Druantia type I antiviral defence system found in bacteria. The system comprises five proteins: DruA, DruB, DruC, DruD and DruE. Expression of the complete Druantia system confers resistance to bacteriophage, including lambda, T4, SECphi18 and SECphi27. DruD is localised to the cytoplasm and is essential for full phage resistance. Disruption of the druD gene abolishes resistance to SECphi27 in E.coli. The family is distributed across bacteria.
