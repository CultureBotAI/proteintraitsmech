identifier: Pfam:PF16118
label: Domain of unknown function (DUF4834)
definition: >-
  This family consists of uncharacterised proteins around 90 residues in length and is mainly found in various Bacteroides and Prevotella species. Protein in this family are characterised by a strongly conserved KDEGEYVD motif on the C terminus and a very divergent N terminus. The function of this family is unknown.
