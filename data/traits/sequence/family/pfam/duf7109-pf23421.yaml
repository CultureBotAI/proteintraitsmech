label: Family of unknown function (DUF7109)
definition: >-
  This family represents a group of proteins from halobacteria. It has several conserved motifs LAGV/IVDLFG, DxPHI and LxDVxYD/ExExW and five highly conserved R residues. Members are predicted to show a mainly α-helical structure with a small β-sheet.
