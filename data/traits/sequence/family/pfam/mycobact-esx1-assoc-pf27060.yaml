identifier: Pfam:PF27060
label: Mycobacterial ESX-1 associated protein
definition: >-
  This entry represents a protein family associated with the ESX-1 type VII secretion system found in mycobacteria. This protein may be involved in the ESX-1 specialised secretion system and is required for DNA conjugation in recipient strains of Mycobacterium smegmatis. The protein is 377 amino acids (40.4 kDa) and localises to the cell inner membrane with a single transmembrane helix. The protein contains multiple disordered regions and proline-rich motifs. Disruption of this gene results in loss of DNA conjugation ability while maintaining EsxB secretion.
