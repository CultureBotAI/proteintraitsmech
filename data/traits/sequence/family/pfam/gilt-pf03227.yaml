identifier: Pfam:PF03227
label: Gamma interferon inducible lysosomal thiol reductase (GILT)
definition: >-
  In humans, GILT (gamma-interferon-inducible lysosomal thiol reductase) functions in MHC class II-restricted antigen processing and MHC class I-restricted cross-presentation by reducing disulfide bonds of endocytosed proteins and facilitating their unfolding and optimal degradation. Several other functions of GILT have also been found, for instance, GILT can act as a host factor for Listeria monocytogenes infection and is involved in the maintenance of cellular glutathione (GSH) levels. GILT is characterised by a CXXC motif in the active site and an enzymatic mechanism in which the pair of active site cysteine residues cooperate to reduce substrate disulfide bonds. The GIL homologues from Drosophila melanogaster may play a role in the innate immune response upon bacterial challenge.
