identifier: Pfam:PF17485
label: Satellite RNA 48 kDa protein
definition: >-
  Satellite RNAs (satRNAs) are short RNA molecules, usually larger than 1,500 nt, that depend on cognate helper viruses for replication, encapsidation, movement, and transmission, but most share little or no sequence homology to the helper viruses. In contrast, satellite viruses are satRNAs that encode and are encapsidated in their own capsid proteins (CPs). Members of this family are nonstructural proteins of 48kDa in size which have been shown to be involved in the replication of the sat-RNA. They are found in tomato black ring virus (TBRV).
