definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000452) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the tyrocidine biosynthetic gene cluster from Brevibacillus brevis NBRC 100599 and appears to be predominantly found in bacteria.
