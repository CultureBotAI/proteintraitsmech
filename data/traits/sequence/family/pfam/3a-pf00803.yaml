identifier: Pfam:PF00803
label: 3A/RNA2 movement protein family
definition: >-
  This entry includes movement proteins from various viruses, including Movement protein (also known as Protein 3A) from Bromoviruses and Cucumoviruses, whose genomes contain 3 RNA segments. The third segment (RNA 3) contains two proteins, the coat protein and the 3A protein. Protein 3A has been shown to be involved in cell-to-cell movement of the virus. The protein family also includes NSm protein from Tomato spotted wilt virus which is involved in tubule formation, movement and symptomatology.
