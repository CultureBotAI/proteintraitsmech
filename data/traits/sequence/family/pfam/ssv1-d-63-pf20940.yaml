identifier: Pfam:PF20940
label: Sulfolobus spindle-shape virus 1, protein D-63
definition: >-
  This entry includes protein D-63 ( ) from Sulfolobus spindle-shape virus 1, which folds into an α-hairpin with the two helices running antiparallel to each other. It adopts a dimeric assembly and forms an antiparallel four-helical bundle. It might be involved in macromolecular assembly as an adaptor protein.
