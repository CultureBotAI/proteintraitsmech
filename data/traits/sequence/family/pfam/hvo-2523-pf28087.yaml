identifier: Pfam:PF28087
label: Zinc finger protein HVO_2523-like
definition: >-
  This entry represents the zinc finger protein HVO_2523 from Haloferax volcanii ( ) and related proteins from Halobacteria. Members of this family are short proteins about 40-70 residues long and are important for stress adaptation, biofilm formation, and swarming. These proteins are predicted to adopt rubredoxin-like fold.
