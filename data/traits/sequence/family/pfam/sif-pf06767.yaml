identifier: Pfam:PF06767
label: Sif protein
definition: >-
  This family consists of several SifA and SifB and SseJ proteins. They are effector proteins function to alter host cell physiology and promote bacterial survival in host tissues. SifA, SifB and SseJ have been demonstrated to localise to the Salmonella-containing vacuole (SCV) and to Salmonella-induced filaments (Sifs). Trafficking of SseJ and SifB away from the SCV requires the SPI-2 effector SifA. SseJ trafficking away from the SCV along Sifs is unnecessary for its virulence function.
