identifier: Pfam:PF15085
label: Neuropeptide FF
definition: >-
  Neuropeptide FF (together with neuropeptides AF and SF, which are derived from the same precursor) belongs to a family of neuropeptides containing an RF-amide motif at their C-termini. Neuropeptide FF is found at high concentrations in the posterior pituitary, spinal cord, hypothalamus and medulla, and is believed to be involved in pain modulation, opioid tolerance, cardiovascular regulation, memory and neuroendocrine regulation.
