identifier: Pfam:PF28926
label: Secreted virulence factor MC69
definition: >-
  This entry represents the MC69 virulence factor family found in plant pathogenic fungi. These small secreted proteins are approximately 35-40 amino acids in length and are essential for appressorial penetration of intact host epidermal cells and pathogenicity. The proteins contain conserved cysteine residues that form intramolecular or intermolecular disulfide bonds. Members include MC69 from Pyricularia oryzae and CLU5a from Colletotrichum graminicola.
