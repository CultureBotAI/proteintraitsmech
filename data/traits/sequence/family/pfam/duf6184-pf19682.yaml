identifier: Pfam:PF19682
label: Family of unknown function (DUF6184)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000990) is described by MIBiG as an example of the polyketide biosynthetic class. It includes a member from the epothilone biosynthetic gene cluster from Sorangium cellulosum. This family appears to be predominantly found in Proteobacteria.
