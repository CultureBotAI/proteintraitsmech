identifier: Pfam:PF28012
label: Membrane protein YnhF-like
definition: >-
  This entry represents a group of proteins from gammaproteobacteria, including YnhF from Escherichia coli, which was shown to have an intact fMet residue at the N terminus and to be chloroform-soluble. Members of this protein family, are small membrane proteins, about 29 amino acids in length. These proteins are predicted to fold into a single transmembrane helix.
