identifier: Pfam:PF27276
label: M.jannaschii MJ0349 family
definition: >-
  This entry represents the C-terminal domain in MJ0349 and related archaeal proteins, including MJ1072, MJ1074 and MJECL16. This domain is found in the hyperthermophilic archaeon Methanocaldococcus jannaschii. The proteins range from 70-116 amino acids in length. Several members contain predicted transmembrane helices and are predicted to be membrane proteins. The function of this protein remains to be determined. This domain is also found in uncharacterised bacterial proteins.
