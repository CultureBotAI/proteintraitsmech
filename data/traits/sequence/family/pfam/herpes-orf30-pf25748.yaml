identifier: Pfam:PF25748
label: Ictalurid herpesvirus ORF30 protein
definition: >-
  This entry represents the Ictalurid herpesvirus (IcHV-1) uncharacterised protein ORF30. This protein contains a conserved CXXC motif (CPI) at positions 74-77, which may indicate a potential zinc-binding function. ORF30 is encoded by channel catfish virus, which is the type species of the Alloherpesviridae family, distinctly different from mammalian and avian herpesviruses.
