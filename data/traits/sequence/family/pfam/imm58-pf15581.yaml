identifier: Pfam:PF15581
label: Immunity protein 58
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and YxxxD, WxG, KxxxE motifs. They are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene. Polymorphic toxins systems consist of secreted toxins, primarily involved in intra-specific conflict between related strains of prokaryotes. These toxins are as a rule multi-domain and tend to vary their toxin domains through a process of recombination that might replace an existing toxin domain by a distinct one encoded by standalone cassettes, therefore their name as polymorphic toxins. A key feature that distinguishes the polymorphic toxins from conventional toxins (whose primary targets are in distantly related organisms) is the presence of immunity proteins.
