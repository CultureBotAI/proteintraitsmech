identifier: Pfam:PF19711
label: Family of unknown function (DUF6207)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001709) is described by MIBiG as an example of the polyketide biosynthetic class. It includes a member from the nystatin biosynthetic gene cluster from Streptomyces albulus. This family appears to be predominantly found in Actinobacteria.
