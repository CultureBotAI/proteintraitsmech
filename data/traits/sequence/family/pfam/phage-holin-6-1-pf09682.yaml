identifier: Pfam:PF09682
label: Bacteriophage holin of superfamily 6 (Holin_LLH)
definition: >-
  This entry represents a family of putative phage holins from a number of phage and prophage regions of Gram-positive bacteria. Like other holins, it is small (about 100 amino acids) with stretches of hydrophobic sequence and is encoded adjacent to lytic enzymes.
