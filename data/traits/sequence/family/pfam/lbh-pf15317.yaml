identifier: Pfam:PF15317
label: Cardiac transcription factor regulator, Developmental protein
definition: >-
  LBH (limb-bud and heart) protein may act as a transcriptional activator in mitogen-activated protein kinase signalling pathway to mediate cellular functions. It has been shown to regulate cardiac gene expression by modulating the combinatorial activities of key cardiac transcription factors, as well as their individual functions in cardiogenesis in mice. Proteins containing this domain include Protein LBH, and LBH domain-containing protein 1 (LBHD1) from humans.
