identifier: Pfam:PF27867
label: Integral membrane protein
definition: >-
  Members of this protein are short (about 85-residue), low-complexity sequences of unknown function, with a highly hydrophobic N-terminal region of about 40 amino acids followed by a charged (Asp, Glu, Lys, and Arg-rich), sometimes repetitive C-terminal region. Members occur mainly among the Mollicutes. The gene neighbourhood of this protein is not conserved.
