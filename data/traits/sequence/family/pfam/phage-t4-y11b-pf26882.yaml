identifier: Pfam:PF26882
label: Bacteriophage T4 protein Y11B
definition: >-
  This entry represents the Y11B protein family found in T4-like bacteriophages. Y11B is an uncharacterised protein of 74 amino acids (9.0 kDa) found in the uvsW-uvsY intergenic region of bacteriophage T4. The protein is encoded within the phage genome that infects Escherichia coli.
