identifier: Pfam:PF08133
label: Anticodon nuclease activator family
definition: >-
  This family represents the anticodon nuclease activator protein Stp. Pre-existing host tRNAs are reprocessed during Bacteriophage T4 infection of certain Escherichia coli strains. In this pathway, tRNA(Lys) is cleaved 5, by the anticodon nuclease to the wobble base and is later restored in polynucleotide kinase and RNA ligase reactions. The second function of Stp is the inhibition of EcoprrI restriction.
