identifier: Pfam:PF29092
label: Pigment dispersing factor homolog pdf-1
definition: >-
  This entry represents the pigment dispersing factor pdf-1 (PDF-1) neuropeptide family found in nematodes. PDF-1 is a secreted neuropeptide that functions as a ligand for G-protein coupled receptors (PDFR-1). The protein is involved in multiple behavioural and physiological processes including locomotion, circadian rhythms, mate-searching behaviour, and regulation of arousal from sleep-like states. PDF-1 is expressed in various neurons throughout postembryonic life and plays important roles in exploratory roaming behaviour and touch sensitivity. Members of this group are typically around 84-88 amino acids in length with an N-terminal signal peptide for secretion.
