identifier: Pfam:PF27099
label: Rv1733c-like dormancy-induced membrane protein
definition: >-
  This entry represents the central region of the Rv1733c family of membrane proteins from Mycobacterium tuberculosis and related species. These proteins are approximately 210 amino acids in length and contain two predicted transmembrane helices, one near the N terminus and one near the C terminus. Rv1733c is a member of the dormancy regulon and is strongly induced in response to reduced oxygen tension (hypoxia), low levels of nitric oxide (NO), and carbon monoxide (CO). These conditions mimic those encountered by M. tuberculosis during the latent or dormant phase of infection. The protein is thought to play a role in the bacterial adaptation to dormancy conditions within the host. The central region is predicted to fold into an open β-barrel structure.
