identifier: Pfam:PF05219
label: DREV methyltransferase
definition: >-
  This family contains protein-histidine N-methyltransferases (also known as DORA reverse strand protein DREV) that specifically catalyse 1-methylhistidine (pros-methylhistidine) methylation of target proteins, such as S100A9, NDUFB3, SLC39A5, SLC39A7, ARMC6 and DNAJB12. They mediate methylation of proteins with a His-x-His (HxH) motif (where 'x' is preferably a small amino acid), in which the 1-methylhistidine modification may affect the binding of zinc and other metals. These proteins constitute the main methyltransferase for the 1-methylhistidine modification in cell.
