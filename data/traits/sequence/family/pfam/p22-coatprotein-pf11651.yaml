identifier: Pfam:PF11651
label: P22 coat protein - gene protein 5
definition: >-
  This family of proteins includes Gp5 from bacteriophage P22 and related proteins. Gp5 is involved in the formation of the pro-capsid shells in the bacteriophage. In total, there are 415 molecules of the coat protein which are arranged in an icosahedral shell. It self-assembles to form an icosahedral capsid with a T=7 symmetry.
