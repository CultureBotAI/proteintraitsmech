identifier: Pfam:PF14744
label: WASH complex subunit 7
definition: >-
  This entry represents the central, conserved region of WASH complex subunit 7 (WASH7), also known as subunit 4 or KIAA1033. The WASH complex is present at the surface of endosomes and recruits and activates the Arp2/3 complex to induce mediated actin nucleation. The WASH complex plays a key role in the fission of tubules that serve as transport intermediates during endosome sorting.
