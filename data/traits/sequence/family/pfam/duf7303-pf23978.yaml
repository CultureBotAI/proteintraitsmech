identifier: Pfam:PF23978
label: Family of unknown function (DUF7303)
definition: >-
  This family consists of various uncharacterised phage proteins and a few bacterial proteins. The family members range in length from 82 to 229 amino acids, with most in the 180 to 200 amino acid range. They are found in phages that infect Pseudomonas, Xanthomonas, Acinetobacter, Escherichia, Rhodobacter, Sphingomonas, Achromobacter, and Burkholderia bacteria. Bacterial proteins in the family are from Candidatus Macondimonas diazotrophica, Verrucomicrobium sp. GAS474 and Pelodictyon phaeoclathratiforme. The function of these proteins is currently unknown.
