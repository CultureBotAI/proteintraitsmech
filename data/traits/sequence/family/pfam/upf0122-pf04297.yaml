identifier: Pfam:PF04297
label: Putative helix-turn-helix protein, YlxM / p13 like
definition: >-
  This entry represents a family of bacterial proteins that are predicted to contain a helix-turn-helix motif, for example residues 37-55 in Mycoplasma mycoides p13 ( ). Genes encoding family members are often part of operons that encode components of the SRP pathway, and this protein may regulate the expression of an operon related to the SRP pathway.
