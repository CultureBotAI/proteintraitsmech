identifier: Pfam:PF02595
label: Glycerate kinase family
definition: >-
  This family includes glycerate kinase 2 ( ), which catalyses the phosphorylation of (R)-glycerate to 3-phospho-(R)-glycerate in the presence of ATP. There are two glycerate kinases in E. coli, known as GKI and GKII and GKII is encoded by glxK.
