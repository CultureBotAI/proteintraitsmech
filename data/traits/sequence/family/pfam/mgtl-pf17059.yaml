identifier: Pfam:PF17059
label: MgtA leader peptide
definition: >-
  Bacterial mRNAs often contain leader sequences that respond to specific metabolites or ions by altering expression of the associated downstream protein-coding sequences. This entry represents mgtA leader peptide (mgtL), which controls transcription elongation into the mgtA coding region in response to changes in cytosolic proline levels. When the levels of proline are low, this protein is not able to be translated and stem loop'C' forms in the mgtA 5' UTR which enables the transcription of the downstream mgtA gene.
