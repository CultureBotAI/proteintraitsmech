identifier: Pfam:PF22130
label: Lactococcus phage gp38-like protein
definition: >-
  This entry represents a family of proteins from tailed bacteriophages, including the gene product 38 (Gp38) from Lactococcus phage, a short protein consisting of 71 amino acids. It is also known as the AbiQ resistance protein due to its involvement in escaping bacterial killing mediated by the AbiQ protein. Gp38 is expressed early in the viral replication cycle and is essential for virus function.
