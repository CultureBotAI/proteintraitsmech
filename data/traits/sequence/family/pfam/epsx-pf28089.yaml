identifier: Pfam:PF28089
label: EpsX exopolysaccharide export family
definition: >-
  This entry represents the EpsX family. EpsX is an outer membrane 18-stranded β-barrel protein important for exopolysaccharide synthesis and export in Myxococcota bacterias. In vivo, EpsX interact with EpsY and mutually stabilize each other. These wide variety of polysaccharides (exopolysaccharides) have critical functions in, e.g., fitness, surface colonisation, and biofilm formation and in beneficial and pathogenic human-, animal-, and plant-microbe interactions.
