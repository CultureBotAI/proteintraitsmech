identifier: Pfam:PF04676
label: Protein similar to CwfJ C-terminus 2
definition: >-
  This group of sequences contain a conserved C-terminal domain which is found in the Schizosaccharomyces pombe (Fission yeast) protein Cwf19 ( ) and its homologues. Cwf19 is part of the Cdc5p complex involved in mRNA splicing. CWF19-like protein DRN1 from Saccharomyces cerevisiae ( ) is involved branched RNA metabolism, modulating the turnover of lariat-intron pre-mRNAs by the lariat-debranching enzyme DBR1 ( ). This domain is found in association with , which is generally N-terminal and adjacent to this domain, and contain evolutionarily conserved cysteine and histidine residues in an arrangement similar to the CCCH-class of zinc fingers.
