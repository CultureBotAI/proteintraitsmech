identifier: Pfam:PF20883
label: KNL (Kinetochore null) Binding Protein 5
definition: >-
  This entry represents a group of proteins from Caenorhabditis species, including KNL (Kinetochore null) Binding Protein 5 (Kbp-5) from C. elegans ( ), which interacts with KNL-1 and is thought to be homologous to human Zwint and yeast Kre28. Proteins in this family are part of the kinetochore network involved in chromosome segregation. Unlike its homologue Kre28, Kbp-5 has not essential mitotic function.
