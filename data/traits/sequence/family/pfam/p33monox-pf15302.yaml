identifier: Pfam:PF15302
label: P33 mono-oxygenase
definition: >-
  Proteins in this family are potential NADPH-dependent oxidoreductases. In human, it interacts with COBRA1, NOL12 and PRNP and may be involved in the regulation of neuronal survival, differentiation and axonal outgrowth. It has been found down-regulated in the occipital lobe of an early stage Alzheimer's disease patients.
