identifier: Pfam:PF24154
label: Tis1 immunity protein
definition: >-
  Tas1 is a type VI secretion effector in the pathogen Pseudomonas aeruginosa that synthesises (p)ppApp. Its cognate immunity protein Tis1 is represented by this entry. Binding of the immunity protein probably neutralises Tas1-mediated toxicity by inducing structural rearrangement in the acceptor nucleotide binding site of the enzyme.
