identifier: Pfam:PF05497
label: Destabilase
definition: >-
  This is a family of invertebrate-type lysozymes. It includes Destabilase ( ), an endo-epsilon(gamma-Glu)-Lys isopeptidase, which cleaves isopeptide bonds formed by transglutaminase (Factor XIIIa) between glutamine gamma-carboxamide and the ε-amino group of lysine.
