identifier: Pfam:PF04749
label: PLAC8 family
definition: >-
  This entry represents a group of cys-rich proteins, including cornifelin and PLAC8 from animals, MCA (MID1-COMPLEMENTING ACTIVITY) and PCR (PLANT CADMIUM RESISTANCE) from Arabidopsis and cell number regulators from maize. Cornifelin is part of the insoluble cornified cell envelope (CE) of stratified squamous epithelia. PLAC8 is required for white adipocyte differentiation in vitro and cell number control in vivo. Plant transports in this entry include MCA1, MCA2 and PCR1-12. MCA1 and MCA2 mediate Ca2+ uptake, while PCR2 is a zinc exporter involved in both zinc extrusion and long-distance zinc transport.
