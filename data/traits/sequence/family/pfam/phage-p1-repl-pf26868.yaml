identifier: Pfam:PF26868
label: Phage P1 replication protein RepL
definition: >-
  This entry represents replication protein RepL found in bacteriophages. The prototype is from Escherichia phage P1, a 281 amino acid protein with a molecular weight of 30.9 kDa. RepL is essential for L-replicon function and is necessary for initiation of DNA replication from the L-replicon at the oriL origin of replication. The protein plays a critical role in phage P1 lytic DNA replication.
