identifier: Pfam:PF14000
label: DNA packaging protein FI
definition: >-
  This family includes the lambda phage DNA-packaging protein FI. FI stimulates the interaction of procapsid with the terminase-DNA complex, thereby increasing the overall rate of DNA packaging. Before packaging, it likely coats the surface of the procapsid through binding mediated by the C-terminal domain. FI presumably dissociates from the capsid once it inflates upon DNA packaging and is not present in the mature virion.
