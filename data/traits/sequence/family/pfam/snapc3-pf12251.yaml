identifier: Pfam:PF12251
label: snRNA-activating protein complex (SNAPc), subunit 3
definition: >-
  snRNA-activating protein complex 50kDa subunit (SNAP50), also known as subunit 3, is part of the snRNA-activating protein complex which activates RNA polymerases II and III. It contains a cysteine-histidine cluster with two possible zinc finger motifs.
