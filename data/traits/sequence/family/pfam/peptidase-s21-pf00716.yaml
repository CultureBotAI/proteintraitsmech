identifier: Pfam:PF00716
label: Assemblin (Peptidase family S21)
definition: >-
  This group of serine peptidases belong to MEROPS peptidase family S21 (assemblin family, clan 21). Assemblin is a serine protease with a unique fold and an active site that comprises the unusual triad Ser-His-His. It is found in herpesviruses, one of the groups of DNA viruses. Assemblin is involved in the late stages of assembly of the viral prohead, breaking down the scaffold protein upon which the prohead is assembled. In Epstein-Barr virus (EBV), a member of the Gammaherpesvirus family, it is also known as the maturational protease (BVRF2). The structure of assemblin has been revealed. The dimerization of assemblin may induce allosteric changes that activate this protease. Proteolytic enzymes that exploit serine in their catalytic activity are ubiquitous, being found in viruses, bacteria and eukaryotes. They include a wide range of peptidase activity, including exopeptidase, endopeptidase, oligopeptidase and omega-peptidase activity. Many families of serine protease have been identified, these being grouped into clans on the basis of structural similarity and other functional evidence. Structures are known for members of the clans and the structures indicate that some appear to be totally unrelated, suggesting different evolutionary origins for the serine peptidases. Not withstanding their different evolutionary origins, there are similarities in the reaction mechanisms of several peptidases. Chymotrypsin, subtilisin and carboxypeptidase C have a catalytic triad of serine, aspartate and histidine in common: serine acts as a nucleophile, aspartate as an electrophile, and histidine as a base. The geometric orientations of the catalytic residues are similar between families, despite different protein folds. The linear arrangements of the catalytic residues commonly ref…
