identifier: Pfam:PF14424
label: The  BURPS668_1122 family of deaminases
definition: >-
  This entry represents a member of the nucleic acid/nucleotide deaminase superfamily prototyped by Burkholderia BURPS668_1122. Members of this family are found as toxins in polymorphic toxin systems in a wide range of bacteria and in the eukaryote Perkinsus. Members of this family typically possess a DxE catalytic motif in Helix-2 of the core fold instead of the more common C[H]xE motif. The Perkinsus versions are predicted to be inactive.
