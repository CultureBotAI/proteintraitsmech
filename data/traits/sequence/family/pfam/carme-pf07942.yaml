identifier: Pfam:PF07942
label: Carnosine N-methyltransferase
definition: >-
  This family includes Carnosine N-methyltransferase ( ), conserved from yeast to human, that catalyses the formation of anserine (beta-alanyl-N(Pi)-methyl-L-histidine) from carnosine. Anserine, a methylated derivative of carnosine (beta-alanyl-L-histidine), is an abundant constituent of vertebrate skeletal muscles. It also methylates other L-histidine-containing di- and tripeptides such as Gly-Gly-His, Gly-His and homocarnosine (GABA-His). Carnosine N-methyltransferase unmet from Drosophila melanogaster, acts as a sensor to signal methionine availability to the mTORC1 signaling pathway. It associates with the GATOR2 complex in the absence of methionine to inhibit mTORC1 signalling, but dissociates in the presence of the methionine derivative S-adenosyl-L-methionine; S-adenosyl-L-homocysteine binding does not induce dissociation. It is required for mTORC1 pathway response to methionine starvation.
