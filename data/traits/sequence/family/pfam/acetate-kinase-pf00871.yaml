identifier: Pfam:PF00871
label: Acetokinase family
definition: >-
  Acetate kinase, which is predominantly found in microorganisms, facilitates the production of acetyl-CoA by phosphorylating acetate in the presence of ATP and a divalent cation. The enzyme is important in the process of glycolysis, enzyme levels being increased in the presence of excess glucose. The growth of a bacterial mutant lacking acetate kinase has been shown to be inhibited by glucose, suggesting that the enzyme is involved in excretion of excess carbohydrate. A related enzyme, butyrate kinase, facilitates the formation of butyryl-CoA by phosphorylating butyrate in the presence of ATP to form butyryl phosphate.
