identifier: Pfam:PF02119
label: Flagellar P-ring protein
definition: >-
  The flgH, flgI and fliF genes of Salmonella typhimurium encode the major proteins for the L, P and M rings of the flagellar basal body. In fact, the basal body consists of four rings (L,P,S and M) surrounding the flagellar rod, which is believed to transmit motor rotation to the filament. The M ring is integral to the inner membrane of the cell, and may be connected to the rod via the S (supramembrane) ring, which lies just distal to it. The L and P rings reside in the outer membrane and periplasmic space, respectively. The sequences of the FlgH, FlgI and FliF gene products have been determined. FlgH and FlgI, which are exported across the cell membrane to their destinations in the outer membrane and periplasmic space, have typical N-terminal cleaved signal-peptide sequences. FlgH is predicted to have an extensive β-sheet structure, in keeping with other outer membrane proteins, and FlgI is thought to have even more β-structure content. Several aspects of the DNA sequence of these genes and their surrounds suggest complex regulation of the flagellar gene system.
