identifier: Pfam:PF03863
label: Phage maturation protein
definition: >-
  This entry represents assembly/maturation protein (A-protein, MP) from Enterobacteria phages, including bacteriophage MS2. The single-stranded RNA genome of bacteriophage MS2 is 3,569 nt long and encodes four gene products: maturation protein, coat protein, and lysis and replicase proteins. The maturation protein is a necessary constituent in the assembly process of the virus. It is located on the surface of the phage particle and influences the global arrangement of the virus coat. It binds to sequences located toward each end of the genome, hence circularizing it. The single-copy viral maturation protein breaks the symmetry of the capsid, suggesting an exit route for the genome during infection, and it is involved in receptor and genome binding.
