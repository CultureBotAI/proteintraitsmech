identifier: Pfam:PF25713
label: Bacteriophage N4 DNA replication inhibitor
definition: >-
  This entry represents Gene product 8 (Gp8), a phage-encoded inhibitor of bacterial DNA replication. The protein is encoded by coliphage N4 and targets the host DNA sliding clamp by interacting with the delta subunit of the E. coli DNA polymerase III clamp loader. The protein inhibits replication elongation and is bacteriostatic. It specifically interferes with DNAP III processivity by interacting with the E. coli DNAP III delta subunit and inhibiting clamp loading. This represents a novel target in the bacterial replisome for inhibition of bacterial growth.
