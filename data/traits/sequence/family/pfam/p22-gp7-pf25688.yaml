identifier: Pfam:PF25688
label: Bacteriophage P22 DNA ejection protein gp7
definition: >-
  This entry represents the bacteriophage P22 DNA ejection protein Gp7. This protein is one of three ejection proteins (along with Gp16 and Gp20) that are required to facilitate the transport of bacteriophage P22 double-stranded DNA safely through the membranes of Salmonella. These ejection proteins are lost from the virion and are presumed to be released with the DNA during ejection. Cryo-EM studies of empty P22 particles show a tube-like structure extending from the centre of the tail assembly that is likely composed of these ejection proteins. The specific functions of Gp7 in this process are not fully understood, but they appear to be involved in forming a conduit for the transport of DNA into the host cytoplasm, possibly through the outer membrane, peptidoglycan layer, periplasmic space, and inner membrane.
