identifier: Pfam:PF26815
label: Phage replication gene B protein family
definition: >-
  The Replication gene B protein family is essential for the synthesis of the lagging strand during DNA replication. It is suggested that proteins in this family may interact with the host dnaB protein, which is a helicase involved in unwinding DNA strands, facilitating the replication process. Members are found in tailed bacteriophages and bacterial prophages.
