identifier: Pfam:PF11751
label: Type IX secretion system membrane protein PorP/SprF
definition: >-
  This entry describes a protein family unique to, and greatly expanded in, the Bacteriodetes. Species in this lineage include several, such as Cytophaga hutchinsonii and Cytophaga johnsonae (Flavobacterium johnsoniae), that exhibit a poorly understood rapid gliding phenotype. Several members of this protein family are found in operons with other genes whose loss leads to a loss of the rapid gliding phenotype.
