identifier: Pfam:PF10253
label: Mitotic checkpoint regulator, MAD2B-interacting
definition: >-
  This family constitutes the major, conserved, portion of PRCC proteins. In humans, this family interacts with MAD2B, the mitotic checkpoint protein. In Schizosaccharomyces pombe this protein is part of the Cwf-complex that is known to be involved in pre-mRNA splicing.
