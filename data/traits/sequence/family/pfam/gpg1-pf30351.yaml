identifier: Pfam:PF30351
label: Heterotrimeric G protein gamma subunit GPG1
definition: >-
  This entry represents the heterotrimeric G protein gamma subunit GPG1, found in budding yeasts (Saccharomycetaceae). GPG1 is a component of heterotrimeric G proteins, which function as modulators in transmembrane signalling systems. GPG1 interacts with the beta subunits GPB1 and GPB2. The protein is involved in cAMP level regulation and controls pseudohyphal and haploid invasive growth. GPG1 localises to the cytoplasm.
