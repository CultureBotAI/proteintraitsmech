identifier: Pfam:PF24362
label: Family of unknown function (DUF7518)
definition: >-
  This family includes a group of short proteins from archaea. Members are predicted to adopt an α-helical structure at the N terminus and show a disordered C-terminal region. In some lineages of archaea, the gene encoding these proteins is found upstream of SMC (chromosome segregation protein).
