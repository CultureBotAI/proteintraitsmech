identifier: Pfam:PF08580
label: Yeast cortical protein KAR9
definition: >-
  The KAR9 protein in Saccharomyces cerevisiae (Baker's yeast) is a cytoskeletal protein required for karyogamy, correct positioning of the mitotic spindle and for orientation of cytoplasmic microtubules. KAR9 localises at the shmoo tip in mating cells and at the tip of the growing bud in anaphase.
