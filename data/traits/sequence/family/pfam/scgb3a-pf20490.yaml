identifier: Pfam:PF20490
label: Secretoglobin 3A
definition: >-
  This family consists of secretoglobin family 3A member 1 (SCGB3A1) and member 2 (SCGB3A2). They are a small secreted proteins expressed in airway epithelial cells. SCGB3A2, also known as UGRP1, has an important anti-inflammatory activity and is involved in asthma. SCGB3A2 mediates its anti-inflammatory action through inhibition of ERK and JNK activation. It is also involved in lung development.
