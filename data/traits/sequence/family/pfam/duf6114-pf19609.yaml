definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000696) is described by MIBiG as an example of the following biosynthetic class, saccharide. It includes a member from the gentamicin biosynthetic gene cluster from Micromonospora echinospora and appears to be predominantly found in Actinobacteria and Firmicutes.
