identifier: Pfam:PF17144
label: Ribosomal large subunit proteins 60S L5, and 50S L18
definition: >-
  This entry represents ribosomal protein uL18 from eukaryotes. The large ribosomal subunit protein uL18 is an essential component of the large subunit LSU, which is required in its formation and stabilisation. The LSU contains the ribosomal catalytic site termed the peptidyl transferase centre (PTC), which catalyses the formation of peptide bonds, thereby polymerising the amino acids delivered by tRNAs into a polypeptide chain. Additionally, uL18 is essential for binding and coordinating 5S rRNA into the ribosome, a key step in ribosome biogenesis and assembly. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like projections that extend into the rRNA core to sta…
