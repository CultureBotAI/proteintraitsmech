identifier: Pfam:PF03896
label: Translocon-associated protein (TRAP), alpha subunit
definition: >-
  The alpha-subunit of the TRAP (translocon-associated protein, also known as signal sequence receptor 1/alpha subunit, SSRA) complex is a single-spanning membrane protein of the endoplasmic reticulum (ER). The four-subunit (alpha, beta, gamma and delta) TRAP complex localises in the ER membrane and associates with the Sec61 translocon as a heterotetramer. It also interacts with palmitoylated calnexin (CALX), the interaction is required for efficient folding of glycosylated proteins. TRAP complex may also be involved in endoplasmic reticulum-associated degradation. TRAP-alpha plays a critical role in the biosynthesis of insulin, being involved in preproinsulin translocation and proinsulin trafficking which may contribute to the pathogenesis of type 2 diabetes.
