identifier: Pfam:PF01646
label: Herpes virus proteins UL24 and UL76
definition: >-
  This entry consists of the human herpes virus protein UL24 and its orthologues, which are universally present in avian, mammalian and reptilian herpes viruses. Though the functions of these proteins are not known, computational analysis suggests that they may belong to the restriction endonuclease-like fold superfamily, which contains a variety of endonucleases, DNA repair enzymes and exonucleases. Proteins in this entry contain an absolutely conserved PD-(D/E)XK motif thought to be critical for nucleotide-cleaving activity.
