identifier: Pfam:PF09776
label: Mitochondrial ribosomal protein L55
definition: >-
  This entry represents the large ribosomal subunit protein mL55 from animals. Members of this family are involved in mitochondrial biogenesis and G2/M phase cell cycle progression. They form a component of the mitochondrial ribosome large subunit (39S) which comprises a 16S rRNA and about 50 distinct proteins.
