identifier: Pfam:PF19538
label: Family of unknown function (DUF6062)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is found in bacteria and archaea. This family contains two repeated domains that each contain a conserved CXXC and GXCXXH sequence motif. This suggests that these proteins are likely to be metal binding. This entry includes Uncharacterized 23.9 kDa protein in xynA 3'region from Caldicellulosiruptor.
