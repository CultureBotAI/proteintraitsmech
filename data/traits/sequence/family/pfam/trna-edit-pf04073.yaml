identifier: Pfam:PF04073
label: Aminoacyl-tRNA editing domain
definition: >-
  Bacterial prolyl-tRNA synthetases and some smaller paralogues, YbaK and ProX, can hydrolyse misacylated Cys-tRNA(Pro) or Ala-tRNA(Pro). The small bacterial protein Ybak preferentially hydrolyses Cys-tRNA(Pro) and Cys-tRNA(Cys). ProX functions in trans to edit the amino acid moiety from incorrectly charged Ala-tRNA(Pro). Prolyl-tRNA synthetases main function is to catalyse the attachment of proline to tRNA(Pro) in a two-step reaction: proline is first activated by ATP to form Pro-AMP and then transferred to the acceptor end of tRNA(Pro). This entry represents a domain characteristic of Ybak and ProX, that can also be found with other domains in prolyl-tRNA synthetases.
