identifier: Pfam:PF22048
label: LSO1/2-like
definition: >-
  This entry includes Protein LSO1 and LSO2 from Saccharomyces cerevisiae and similar sequences mainly found in fungi. LSO1 is likely to play a role in iron homeostasis. Its paralogue LSO2, which is constitutively expressed, is a ribosome-associated protein required for translational recovery after starvation from stationary phase. LSO2 is an orthologue of Coiled-coil domain containing 124 (Ccdc124, see ).
