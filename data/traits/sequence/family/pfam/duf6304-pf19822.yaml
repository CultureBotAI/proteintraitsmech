label: Family of unknown function (DUF6304)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000262) is described by MIBiG as an example of the following biosynthetic classes, polyketide and saccharide, in particular the prejadomycin biosynthetic gene cluster from Streptomyces sp. PGA64. This family appears to be predominantly found in bacteria.
