identifier: Pfam:PF20220
label: ABC toxin N-terminal region
definition: >-
  This entry represents the region found N-terminal to the neuraminidase domain ( ) in the pore forming ABC toxins from fungi and bacteria, including Toxin subunit YenA2 from Yersinia entomophaga. YenA2 is part of an orally active toxin complex (TC) with strong insecticidal effects on larvae of the Coleoptera Costelytra zealandica, Acrossidius tasmania and Adoryphorus couloni and some Lepidoptera larvae.
