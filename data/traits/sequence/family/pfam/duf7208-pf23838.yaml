identifier: Pfam:PF23838
label: Family of unknown function (DUF7208)
definition: >-
  This entry represents a domain of unknown function found in large phage virion structural proteins. The domain is approximately 290 to 330 amino acids in length. It is found in a variety of phage proteins infecting bacterial hosts such as Pseudomonas, Vibrio, Ralstonia, and Erwinia, among others. This entry also includes predicted Virion structural proteins from bacteria.
