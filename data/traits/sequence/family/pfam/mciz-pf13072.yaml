identifier: Pfam:PF13072
label: Mother cell inhibitor of FtsZ
definition: >-
  This family of bacterial proteins includes cell division inhibitor MciZ from Bacillus subtilis . MciZ is required during sporulation, blocking Z-ring formation in the mother cell by inhibiting the polymerization of FtsZ. FtsZ (filamentation temperature-sensitive Z) is the bacterial homologue of tubulin. Crystal structure reveals that MciZ binds to the C-terminal polymerization interface of FtsZ, the equivalent of the minus end of tubulin, causing shortening of protofilaments and blocking the assembly of higher-order FtsZ structures. Hence, MciZ provides a capping-based regulatory mechanism for FtsZ.
