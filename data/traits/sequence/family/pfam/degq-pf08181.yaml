identifier: Pfam:PF08181
label: DegQ (SacQ) family
definition: >-
  This family consists of the DegQ (formerly sacQ) regulatory peptides. The DegQ family of peptides control the rates of synthesis of a class of both secreted and intracellular degradative enzymes in Bacillus subtilis and related bacteria. DegQ is 46 amino acids long and activates the synthesis of degradative enzymes. The expression of this peptide was shown to be subjected both to catabolite repression and DegS-DegU-mediated control. Thus allowing an increase in the rate of synthesis of DegQ under conditions of nitrogen starvation. DegQ also affects lipopeptide production and formation of secretory proteases.
