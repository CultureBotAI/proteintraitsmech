identifier: Pfam:PF05927
label: Penaeidin
definition: >-
  This family consists of several isoforms of the penaeidin protein, which is specific to shrimps. Penaeidins, a unique family of antimicrobial peptides (AMPs) with both proline and cysteine-rich domains, were initially identified in the hemolymph of the Pacific white shrimp, Penaeus vannamei.
