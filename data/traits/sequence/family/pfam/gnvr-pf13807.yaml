identifier: Pfam:PF13807
label: G-rich domain on putative tyrosine kinase
definition: >-
  This domain is found in a group of tyrosine-protein kinases and some exopolysaccharide transport proteins. There is a highly conserved GNVR sequence motif which characterises this domain. The function is not known.
