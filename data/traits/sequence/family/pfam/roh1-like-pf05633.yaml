identifier: Pfam:PF05633
label: Protein ROH1-like
definition: >-
  This entry includes a family of proteins such as protein BYPASS1-LIKE, protein ROH1 and related proteins that are involved in the regulation of plant growth and development. ROH1 is an interactor of the exocyst subunit Exo70A1, and has been shown to be required for seed coat mucilage deposition. BYPASS1-LIKE prevents plant growth and development and regulates positively cold tolerance. It also regulates lateral root initiation via exocytic vesicular trafficking-mediated PIN recycling.
