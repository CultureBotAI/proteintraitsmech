identifier: Pfam:PF10133
label: CO dehydrogenase accessory protein CooT
definition: >-
  CooT is an accessory protein required for maturation of Carbon Monoxide Dehydrogenase (CODH). It is a member of a Ni(ii)-binding protein family, linked to anaerobic metabolism in bacteria and archaea, and in most cases to the presence of CODH. Structure analysis indicates that it is a homodimer featuring a fold that resembles an Sm-like domain.
