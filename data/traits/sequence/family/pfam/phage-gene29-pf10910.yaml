identifier: Pfam:PF10910
label: Phage gene 29 protein family
definition: >-
  This entry represents a family of phage proteins related to gene 29 protein from Mycobacterium phage D29 and L5. The function of the proteins in this family is unknown. AlphaFold multimer shows that the proteins in the family adopt a confident dimeric structure. The individual proteins are not compact in isolated structure predictions. This entry also includes some bacterial proteins.
