identifier: Pfam:PF03739
label: Lipopolysaccharide export system permease LptF/LptG
definition: >-
  Members of this family are predicted integral membrane proteins of about 350 amino acids long and containing about 6 transmembrane regions. Characterised members include LptF and LptG, two homologous tandem-encoded permeases of an export ATP transporter for lipopolysaccharide (LPS) assembly in most Gram-negative bacteria.
