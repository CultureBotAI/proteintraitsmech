identifier: Pfam:PF10706
label: Aminoglycoside-2''-adenylyltransferase
definition: >-
  Aminoglycoside-2''-adenylyltransferase is conserved in Bacteria. It confers resistance to kanamycin, gentamicin, and tobramycin. The protein is also produced by plasmids in various bacterial species and confers resistance to essentially all clinically available aminoglycosides except streptomycin, and it eliminates the synergism between aminoglycosides and cell-wall active agents.
