identifier: Pfam:PF12942
label: Archaeal ammonia monooxygenase subunit A (AmoA)
definition: >-
  This entry represents a group of archaeal proteins that contains ammonia monooxygenase subunit A. Ammonia monooxygenase is an enzyme that oxidises ammonia to nitrite and nitrate, thus playing a significant role in the nitrogen cycle. Ammonia-oxidising archaea (AOA) are widespread in marine environments.
