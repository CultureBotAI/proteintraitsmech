identifier: Pfam:PF10890
label: Cytochrome b-c1 complex subunit 8
definition: >-
  This entry represents subunit 8 of the Cytochrome b-c1 complex. The ubiquinol-cytochrome c reductase complex (complex III or cytochrome b-c1 complex) is part of the mitochondrial respiratory chain. This subunit, together with cytochrome b, binds to ubiquinone. In plants, the b-c1 complex contains 10 subunits: 3 respiratory subunits, 2 core proteins and 5 low-molecular weight proteins.
