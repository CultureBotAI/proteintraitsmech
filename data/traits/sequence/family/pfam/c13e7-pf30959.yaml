identifier: Pfam:PF30959
label: C13E7-like
definition: >-
  This entry represents a family of uncharacterised proteins found in fungi, named after the Schizosaccharomyces pombe protein C13E7.07. The family is predominantly found in Basidiomycota but also occurs in Ascomycota and Mucoromycota. The function of this family remains to be determined.
