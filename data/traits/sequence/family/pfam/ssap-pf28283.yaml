identifier: Pfam:PF28283
label: Secretion system apparatus protein SsaP
definition: >-
  This entry represents the Secretion system apparatus protein SsaP and related proteins. SsaP is a component of the type III secretion system from Salmonella pathogenicity island 2 (SPI2), involved in the survival and replication of Salmonella in a host cell. SsaP along with ssaL and ssaM do not have significant similarity to products of other type III secretion systems, and might be important for the specific function of the SPI2 type III secretion system.
