identifier: Pfam:PF02633
label: Creatinine amidohydrolase
definition: >-
  This family includes the enzymes creatininase and 2-amino-5-formylamino-6-ribosylaminopyrimidin-4(3H)-one 5'-monophosphate deformylase, also known as formamide hydrolase. Creatinase or creatinine amidohydrolase ( ) catalyses the hydrolysis of creatinine to creatine, which can then be metabolised to urea and sarcosine by creatinase ( ). Creatininase is a member of the urease-related amidohydrolase superfamily. Formamide hydrolase catalyses the hydrolysis of the formamide of 2-amino-5-formylamino-6-ribosylamino-4(3H)-pyrimidinone 5'-monophosphate (FAPy) to form 2,5-diamino-6-ribosylamino-4(3H)-pyrimidinone 5'-phosphate (APy) ( ). This family also includes 3-dehydro-scyllo-inosose hydrolase from the marine, hyperthermophilic bacterium Thermotoga maritima . The enzyme converts 3-dehydro-scyllo-inosose (diketo-inositol) to 5-dehydro-L-gluconate by catalysing ring-opening hydrolysis, and is a component of the myo-inositol degradation pathway. T. maritima is unable to grow on myo-inositol as a single carbon source.
