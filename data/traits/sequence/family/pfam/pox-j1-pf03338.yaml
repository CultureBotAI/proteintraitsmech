identifier: Pfam:PF03338
label: Poxvirus J1 protein
definition: >-
  This family includes proteins from Poxvirus, such as Protein J1 (also known as Virion assembly protein OPG100), a late protein which is a part of a large complex required for early virion morphogenesis. This complex participates in the formation of virosomes and the incorporation of virosomal contents into nascent immature virions. J1 protein is important for DNA packaging during immature virions (IV) formation.
