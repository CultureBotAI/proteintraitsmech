identifier: Pfam:PF10940
label: Leader peptide SpeFL
definition: >-
  SpeFL is a small protein (arrest peptide) encoded upstream of inducible ornithine carboxylase gene (speF) that controls expression of downstream genes (speF and patE) by nascent chain-translational arrest and transcriptional attenuation. Ornithine capture by a translating ribosome controls bacterial polyamine synthesis, inducing the expression of ornithine decarboxylase SpeF4, in a mechanism involving ribosome stalling and transcription antitermination.
