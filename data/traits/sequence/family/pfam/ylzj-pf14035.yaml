identifier: Pfam:PF14035
label: YlzJ-like protein
definition: >-
  The YlzJ-like protein family includes the B. subtilis YlzJ protein , which is functionally uncharacterised. Proteins in this family are typically between 61 and 72 amino acids in length and contain two completely conserved residues (L and G) that may be functionally important.
