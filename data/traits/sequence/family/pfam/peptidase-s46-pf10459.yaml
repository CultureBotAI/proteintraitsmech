identifier: Pfam:PF10459
label: Peptidase S46
definition: >-
  Dipeptidyl aminopeptidase BII from Pseudoxanthomonas mexicana is a serine protease classified into clan PA, family S46. It is able to cleave a variety of dipeptides from the amino-terminus of substrate peptides. Another characterised member of the S46 family of dipeptidyl-peptidases from bacteria is dipeptidyl-peptidase 7 (DPP-7) from Porphyromonas gingivalis. It may serve nutritional functions by providing dipeptides to this asaccharolytic bacterium.
