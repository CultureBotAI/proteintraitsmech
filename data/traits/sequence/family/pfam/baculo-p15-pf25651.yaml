identifier: Pfam:PF25651
label: Baculovirus putative 15 kDa capsid protein
definition: >-
  This entry represents a putative 15 kDa capsid protein (P15) found in baculoviruses. The protein is encoded by the p15 gene (also annotated as ORF88) in the Orgyia pseudotsugata multicapsid polyhedrosis virus (OpMNPV) genome. This protein is predicted to be a structural component of the viral capsid. The specific function of this protein in the baculovirus life cycle remains to be fully characterised.
