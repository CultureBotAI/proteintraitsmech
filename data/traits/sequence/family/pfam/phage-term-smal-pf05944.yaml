identifier: Pfam:PF05944
label: Phage small terminase subunit
definition: >-
  This entry is represented by Bacteriophage P2, GpM. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. This family consists of several phage small terminase subunit proteins as well as some related bacterial sequences. M protein is probably an endonuclease which directs cos cleavage. The Q, P and M proteins are needed to package DNA into proheads and for the conversion of proheads to capsids.
