identifier: Pfam:PF01810
label: LysE type translocator
definition: >-
  A number of amino acid exporter proteins belong to this family. LeuE encodes an exporter of leucine and some other structurally unrelated amino acids. This family also includes threonine efflux protein RhtC, arginine exporter protein ArgO/YggA, as well as a number of uncharacterised proteins from a variety of sources.
