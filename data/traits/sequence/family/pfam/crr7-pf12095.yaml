identifier: Pfam:PF12095
label: Protein CHLORORESPIRATORY REDUCTION 7
definition: >-
  This entry includes protein from cyanobacteria, blue-green algae and plants, including CRR7 (Chlororespiratory reduction 7) protein from Arabidopsis. CRR7 is part of the chloroplastic NAD(P)H dehydrogenase complex (NDH Complex) involved in respiration, photosystem I (PSI) cyclic electron transport and CO2 uptake. It is likely to be involved in the final step of the formation of the NDH Complex, in which its intermediate is inserted into thylakoids. The structure of a member of this family, Asl3597 from Nostoc sp. PCC7120, was determined. This protein folds into an α/β structure consisting of a small antiparallel β-sheet and α-helices packed on one side of it. A member of this family, Ssl3829 from Synechocystis sp. PCC 6803, was shown to play an important role in the assembly of the NDH-1 hydrophilic arm by accumulating the NAI300 complex and Slr1097 protein in the cytoplasm.
