identifier: Pfam:PF26831
label: Phage spanin outer lipoprotein subunit
definition: >-
  The Spanin outer lipoprotein subunit family is involved in the disruption of the host outer membrane during viral exit. This family is a component of the spanin complex, which plays a crucial role in the final step of host cell lysis. After the inner membrane is permeabilised and host peptidoglycans are degraded by holin and endolysin, the spanin complex facilitates the fusion between the inner and outer membranes, leading to the disruption of the outer membrane. This process is essential for the release of viral particles from the host cell.
