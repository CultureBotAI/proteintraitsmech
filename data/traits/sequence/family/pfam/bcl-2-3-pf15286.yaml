identifier: Pfam:PF15286
label: Apoptosis regulator M11, B cell 2 leukaemia/lymphoma like
definition: >-
  Some herpesviruses encode homologues of the antiapoptotic, cellular Bcl-2 to promote viral replication and pathogenesis. Members of this small group of viral proteins are homologues of Bcl-2 and seem to inhibit autophagy through binding to autophagy effector Beclin1.
