identifier: Pfam:PF08368
label: FAST kinase-like protein, subdomain 2
definition: >-
  This domain represents a conserved region of eukaryotic Fas-activated serine/threonine (FAST) kinases ( ) that contains several conserved leucine residues. FAST kinase is rapidly activated during Fas-mediated apoptosis, when it phosphorylates TIA-1, a nuclear RNA-binding protein that has been implicated as an effector of apoptosis. Note that many family members are hypothetical proteins. This subdomain is often found associated with the FAST kinase-like protein, subdomain 2.
