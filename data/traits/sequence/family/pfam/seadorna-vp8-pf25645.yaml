identifier: Pfam:PF25645
label: Seadornavirus outer capsid protein VP8
definition: >-
  This protein family occurs in the seadornavirus virus group, with designations VP8 in Banna virus, and VP9 in Kadipiro virus and Liao ning virus. VP8 from Banna virus is part of the inner core, within the outer coat of the virus. The inner core contains VP1, VP2, VP3, VP8 and VP10, with VP8 forming the core-surface layer, an icosahedral capsid with a T=13 symmetry, consisting of 230 trimers.
