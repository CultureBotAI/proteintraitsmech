identifier: Pfam:PF30265
label: Hugin neuropeptide precursor
definition: >-
  This entry represents Hugin neuropeptide precursors from Drosophila and related Diptera. The hugin protein is a secreted neuropeptide precursor that is proteolytically processed to generate multiple bioactive peptides, including Hug-gamma, Hug-peptide, and pyrokinin-2 (PK-2). Hugin is expressed in neurosecretory cells in the subesophageal ganglion, and the mature peptides have myostimulatory activity and are involved in ecdysis (moulting) and larval feeding behaviour. The hugin protein belongs to the pyrokinin neuropeptide family.
