identifier: Pfam:PF14072
label: DNA-sulfur modification-associated
definition: >-
  This is family of bacterial proteins likely to be necessary for binding to DNA and recognising the modification sites. Members are found in bacteria, archaea and on viral plasmids, and are typically between 354 and 474 amino acids in length. There is a conserved DGQHR sequence motif. Included in this family is the DndB protein encoded by an operon associated with a sulphur-containing modification to DNA. DndB is described as a putative ATPase.
