identifier: Pfam:PF14983
label: Sperm-associated microtubule inner protein 10
definition: >-
  This family (previously DUF4513) represents homologs of Sperm-associated microtubule inner protein 10 (SPMIP10). SPMIP10 is a microtubule inner protein (MIP) part of the axonemal dynein-decorated doublet microtubules (DMTs). It plays a role in the stabilisation of the interacting protomers of TEKTL1 - a tektin-like molecule that forms a filament in the cleft between protofilaments A11 and A12. In the EM structure of sperm DMTs, SPMIP10 cradles the inter-TEKTL1 interface while interacting with protofilaments A11 and A12.
