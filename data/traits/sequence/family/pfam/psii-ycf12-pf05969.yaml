identifier: Pfam:PF05969
label: Photosystem II complex subunit Ycf12
definition: >-
  This family represents Ycf12, also known as Photosystem II reaction center protein Psb30, a core subunit of photosystem II. Its function is unknown. Members of this entry are predominantly found in cyanobacteria and plants.
