identifier: Pfam:PF14181
label: YqfQ-like protein
definition: >-
  The YqfQ-like protein family includes the B. subtilis YqfQ protein , also known as VrrA, which is functionally uncharacterised. Proteins in this family are typically between 146 and 237 amino acids in length and contain two conserved sequence motifs: QYGP and PKLY.
