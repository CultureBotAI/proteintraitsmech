identifier: Pfam:PF05332
label: Vesivirus VP2 protein
definition: >-
  This family consists of several Calicivirus VP2 proteins. VP2 is a minor capsid protein encoded by all caliciviruses. It forms a large portal-like assembly at a unique three-fold axis of symmetry, following receptor engagement. This assembly-which was not detected in undecorated virions-is formed of twelve copies of VP2, arranged with their hydrophobic N terminus pointing away from the virion surface.
