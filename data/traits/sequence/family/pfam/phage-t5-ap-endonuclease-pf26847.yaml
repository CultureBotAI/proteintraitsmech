identifier: Pfam:PF26847
label: Phage T5 Apurinic/Apyrimidinic endonuclease family
definition: >-
  This family represents the DNA-(apurinic or apyrimidinic site) endonuclease from T5-like phages. It performs endonucleolytic cleavage at abasic sites, which are generated by the base-excision activity of host Ung. The cleavage generates a 5'-deoxyribose phosphate and 3'-hydroxyl end. The sites are specifically recognized through the formation of a complex with host Ung. The viral endonucleolytic activity damages the host DNA, blocks host DNA replication and induces cell division arrest. This may provide an advantage for the phage and save nucleotides for the viral replication since specifically targets the host DNA, which possesses more misincorporated uracils than the viral genome.
