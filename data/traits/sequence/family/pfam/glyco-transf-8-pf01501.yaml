identifier: Pfam:PF01501
label: Glycosyl transferase family 8
definition: >-
  This entry represents Glycosyltransferase family 8. Glycosyltransferase family 8 comprises enzymes with a number of known activities; lipopolysaccharide galactosyltransferase ( ), lipopolysaccharide glucosyltransferase 1 ( ), glycogenin glucosyltransferase ( ), inositol 1-α-galactosyltransferase ( ), α-1,3-xylosyltransferase and β-1,3-glucuronyltransferase. These enzymes have a distant similarity to family GT_24. The biosynthesis of disaccharides, oligosaccharides and polysaccharides involves the action of hundreds of different glycosyltransferases. These enzymes catalyse the transfer of sugar moieties from activated donor molecules to specific acceptor molecules, forming glycosidic bonds. A classification of glycosyltransferases using nucleotide diphospho-sugar, nucleotide monophospho-sugar and sugar phosphates ([ec:2.4.1.-]) and related proteins into distinct sequence-based families has been described. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. The same three-dimensional fold is expected to occur within each of the families. Because 3-D structures are better conserved than sequences, several of the families defined on the basis of sequence similarities may have similar 3-D structures and therefore form 'clans'.
