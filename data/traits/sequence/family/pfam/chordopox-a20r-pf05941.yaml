identifier: Pfam:PF05941
label: Chordopoxvirus A20R protein
definition: >-
  This family consists of several Chordopoxvirus A20R proteins. The A20R protein, also known as DNA polymerase processivity factor component OPG148, plays an essential role in viral DNA replication by acting as the polymerase processivity factor together with protein OPG116. It serves as a bridge which links the DNA polymerase OPG071 and the uracil DNA glycosylase. A20R may contribute to the assembly or stability of the multiprotein DNA replication complex.
