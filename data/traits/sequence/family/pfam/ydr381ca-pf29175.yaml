identifier: Pfam:PF29175
label: YDR381C-A mitochondrial membrane protein
definition: >-
  This entry represents the YDR381C-A protein family found in ascomycetes. These are small proteins of approximately 100-114 amino acids that localise to the mitochondrial outer membrane. The proteins contain a single predicted transmembrane helix and are identified as single-pass membrane proteins. YDR381C-A has been implicated in mitochondrial cytochrome c oxidase assembly, mitochondrial respirasome assembly, and mitochondrial respiratory chain complex III assembly processes.
