identifier: Pfam:PF18555
label: MobL relaxases
definition: >-
  This family includes members of relaxase enzymes. These enzymes initiate bacterial conjugation contributing to the spread of antibiotic resistance. These MobL relaxases are found mainly in Firmicutes. It is suggested that MobL type relaxases play a prominent role in horizontal gene transfer in Firmicutes bacteria. Family members carry a stretch of relaxase motif III 'HUH' sequence that is characteristic of the HUH endonuclease superfamily essential for enzymatic activity.
