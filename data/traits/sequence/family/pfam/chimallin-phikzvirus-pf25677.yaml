identifier: Pfam:PF25677
label: Phikzvirus chimallin family
definition: >-
  The Phikzvirus chimallin family consists of proteins that self-assemble to form a protective proteinaceous shell around viral DNA. This shell compartmentalises proteins and DNA during viral infection, creating a micrometre-scale compartment with narrow pores. It serves as the site of viral replication, where proteins involved in DNA replication are localised. Additionally, the shell provides a docking surface for capsids during the packaging process. The structure likely plays a crucial role in protecting the viral genome against host defences, ensuring successful viral replication and packaging. This group also contain some uncharacterised sequences from other tailed bacteriophages.
