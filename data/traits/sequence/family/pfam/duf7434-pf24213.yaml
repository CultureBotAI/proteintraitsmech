identifier: Pfam:PF24213
label: Family of unknown function (DUF7434)
definition: >-
  This entry represents a small family of uncharacterised mycobacterial phage proteins. Structure prediction suggests that this protein forms a single α-helix. It is quite hydrophobic with a negatively charged C-terminal. Some proteins are annotated as RDF proteins but there does not appear to be any evidence to support their function as recombination directionality factors.
