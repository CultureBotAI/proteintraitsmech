identifier: Pfam:PF03273
label: Baculovirus gp64 envelope glycoprotein
definition: >-
  Gp64 is the major envelope fusion glycoprotein in some, though not all, baculoviruses. It is found on the surface of both infected cells and budded virions as a homotrimer, and by determining the viral receptor preferences it defines the host range and infection efficiency. Baculovirus enters its host cells by endocytosis followed by a low-pH-induced fusion of the viral envelope with the endosomal membrane, allowing viral entrance into the cell cytoplasm. This membrane fusion, and also the efficient budding of virions from the infected cell, is dependent on Gp64. Gp75 is a homologous envelope glycoprotein from Thogotoviruses that, like Gp64, forms homotrimers and is involved in both binding and entering the host cell.
