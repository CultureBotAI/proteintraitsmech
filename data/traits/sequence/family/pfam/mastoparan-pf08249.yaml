identifier: Pfam:PF08249
label: Mastoparan protein
definition: >-
  Mastoparans are a family of tetradecapeptides from wasp venom that have been shown to directly activate GTP-binding regulatory proteins. These peptides show selectivity among G proteins: they strongly activate Go and Gi but not Gs or Gt. The peptides of this family are composed by 14 amino acids but they can assume different structures.
