identifier: Pfam:PF28200
label: Phr signaling regulator
definition: >-
  This family of proteins includes signaling molecules that play a crucial role in the regulation of genetic competence development in bacteria. They are secreted and subsequently need to be imported back into the cell to exert their function. Once inside, they act by inhibiting specific regulatory proteins, which in turn modulate the activity of transcription factors involved in genetic competence. Through this inhibition, they stimulate the expression of genes that are under the control of these transcription factors.
