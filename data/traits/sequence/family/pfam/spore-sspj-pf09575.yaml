identifier: Pfam:PF09575
label: Small spore protein J (Spore_SspJ)
definition: >-
  This entry represents a group of small acid-soluble proteins (SASP) from Bacillus species, which are present in spores but not in growing cells. The sspJ gene is transcribed in the forespore compartment by RNA polymerase with the forespore-specific sigmaG. Loss of SspJ causes a slight decrease in the rate of spore outgrowth in an otherwise wild-type background.
