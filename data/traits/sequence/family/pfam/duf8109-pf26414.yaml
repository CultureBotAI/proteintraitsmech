identifier: Pfam:PF26414
label: Family of unknown function (DUF8109)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins predominantly found in halophilic archaea. The proteins in this family are primarily distributed among the Halobacteria class, including genera such as Natronomonas and Haloarcula. Additionally, some members are found in viruses infecting these archaea. The proteins are relatively short, with lengths ranging from approximately 113 to 131 amino acids.
