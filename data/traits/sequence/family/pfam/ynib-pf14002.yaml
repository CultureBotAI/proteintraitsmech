identifier: Pfam:PF14002
label: YniB-like protein
definition: >-
  The YniB-like protein family includes the Escherichia coli YniB protein , which is functionally uncharacterised. It also includes protein YfeE from Yersinia, a putative regulator of the ABC transporter locus yfeABCD, involved in inorganic iron transport. The proteins in this family are integral membrane proteins and are found in bacteria.
