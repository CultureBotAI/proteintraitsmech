identifier: Pfam:PF08120
label: Tamulustoxin family
definition: >-
  This family consists of the tamulustoxins, which are found in the venom of Mesobuthus tamulus (Eastern Indian scorpion) (Buthus tamulus). Tamulustoxin shares no similarity with other scorpion venom toxins, although the positions of its six cysteine residues suggest that it shares the same structural scaffold. Tamulustoxin acts as a potassium channel blocker.
