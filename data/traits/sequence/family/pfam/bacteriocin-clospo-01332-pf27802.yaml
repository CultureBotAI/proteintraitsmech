identifier: Pfam:PF27802
label: Bacteriocin precursor, CLOSPO-01332
definition: >-
  Members of this protein family are Cys-rich putative bacteriocin precursor peptides found in firmicutes. This family is related to the family of CLI_3235 ( ). Members of both families are found next to a CLI_3234 family radical SAM protein that appears to perform post-translational modification.
