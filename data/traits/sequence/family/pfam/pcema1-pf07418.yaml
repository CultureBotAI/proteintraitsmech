identifier: Pfam:PF07418
label: Acidic phosphoprotein precursor PCEMA1
definition: >-
  This family consists of several acidic phosphoprotein precursor PCEMA1 sequences which appear to be found exclusively in Plasmodium. PCEMA1 is an antigen that is associated with the membrane of the infected erythrocyte throughout the entire intraerythrocytic cycle. The exact function of this family is unclear.
