identifier: Pfam:PF05648
label: Peroxisomal biogenesis factor 11 (PEX11)
definition: >-
  This family consists of several peroxisomal biogenesis factor 11 (PEX11) proteins from several eukaryotic species. The PEX11 peroxisomal membrane proteins promote peroxisome division in multiple eukaryotes. PEX11 genes in rice have diversification not only in sequences but also in expression patterns under normal and various stress conditions.
