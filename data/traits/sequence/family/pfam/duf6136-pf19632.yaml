identifier: Pfam:PF19632
label: Family of unknown function (DUF6136)
definition: >-
  This entry represents a presumed member of a biosynthetic gene cluster (BGC). This BGC (BGC0000299) is described by MIBiG as an example of the NRP (non-ribosomal peptide) biosynthetic class. It includes a member from the alterochromide A biosynthetic gene cluster from Pseudoalteromonas piscicida JCM 20779 and appears to be predominantly found in gammaproteobacteria.
