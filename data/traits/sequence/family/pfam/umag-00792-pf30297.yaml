identifier: Pfam:PF30297
label: Secreted cysteine-rich protein UMAG_00792
definition: >-
  This entry represents a secreted cysteine-rich protein (SCRP) found in Ustilaginaceae (smut fungi). These proteins are predicted to form amyloid structures and may be involved in attachment to hydrophobic surfaces and formation of hydrophobic aerial hyphae. Expression is highly induced in filaments growing at the water-air interface when the repellent gene rep1 is absent. The protein contains a signal peptide and is secreted.
