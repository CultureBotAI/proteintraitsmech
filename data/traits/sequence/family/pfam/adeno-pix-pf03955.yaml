identifier: Pfam:PF03955
label: Adenovirus hexon-associated protein (IX)
definition: >-
  Hexon is the major coat protein in type 2 adenoviruses. Hexon forms a homo-trimer, 240 copies of which are present in the capsid, organised so that 12 lie on each of the 20 facets of this structure. The central 9 hexons in a facet are cemented together by 12 copies of protein IX. Protein IX is not necessarily required for viral replication, but has been shown to affect several processes including DNA-packaging capacity, thermostability, and the transcriptional activity of several promoters. For more information see.
