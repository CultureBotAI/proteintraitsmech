identifier: Pfam:PF03395
label: Poxvirus P4A protein
definition: >-
  This entry represents Major core protein 4a precursor from Vaccinia virus (P4A), also known as Major core protein OPG136 precursor, and similar proteins from poxvirus. P4a is one of the most abundant structural proteins in the Vaccinia virion. It undergoes proteolytic processing during the immature virion (IV) to mature virion (MV) transition.
