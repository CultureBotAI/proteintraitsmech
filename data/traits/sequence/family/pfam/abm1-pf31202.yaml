identifier: Pfam:PF31202
label: ABM1-like1
definition: >-
  This entry represents ABM1 and ABM1-like (aberrant microtubules protein 1) proteins, found in fungi. ABM1 is required for normal microtubule organisation in Saccharomyces cerevisiae. Deletion of ABM1 results in microtubules that are shorter than normal.
