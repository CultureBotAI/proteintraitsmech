identifier: Pfam:PF11438
label: 36-mer N-terminal peptide of the N protein (N36)
definition: >-
  This entry represents the bacteriophage N protein (or Probable regulatory protein N), which plays an essential role in transcriptional antitermination. Upon interaction with the N-utilisation (nut) site on the nascent phage transcript, and together with host factors, the N protein converts the RNA polymerase to a termination-resistant form. The arginine-rich region (~18 amino acids) at the N-terminal of the N protein is specifically recognised by its boxB RNA hairpin target. Besides binding to boxB RNA, N protein also interacts with a host factor called NusA. The N peptide adopts a bent α-helical conformation that packs tightly through hydrophobic and electrostatic interactions against the major groove face of the boxB RNA hairpin. Multiple arginines in the peptide form hydrogen bonds with the RNA at specific positions. This family is likely related to .
