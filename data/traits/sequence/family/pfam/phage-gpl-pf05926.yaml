identifier: Pfam:PF05926
label: Phage head completion protein (GPL)
definition: >-
  This entry represents the head completion protein GpL found in bacteriophages and prophages. GpL allows the completion of filled heads by rendering newly packaged DNA in the heads resistant to DNase. The protein is thought to bind to DNA filled capsids.
