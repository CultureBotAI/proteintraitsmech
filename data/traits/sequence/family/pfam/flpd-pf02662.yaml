identifier: Pfam:PF02662
label: Methyl-viologen-reducing hydrogenase, delta subunit
definition: >-
  This entry represents the F420-non-reducing hydrogenase iron-sulfur subunit D from Archaeoglobus profundus, MvhD , which is part of a complex that provides reducing equivalents for heterodisulfide reductase, and from Methanobacterium thermoautotrophicum, known as FlpD. No specific functions have been assigned to the delta subunit. This domain is also found at the C terminus of AhdrA1, a subunit of the ferredoxin:CoB-CoM heterodisulfide reductase, an enzyme complex that catalyzes the reversible reduction of CoM-S-S-CoB to the thiol-coenzymes H-S-CoM (coenzyme M) and H-S-CoB (coenzyme B).
