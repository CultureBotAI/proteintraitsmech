identifier: Pfam:PF14820
label: Small proline-rich 2
definition: >-
  Small proline-rich (SPRR) proteins are structural components of the cornified cell envelope of stratified squamous epithelia. They are subdivided into three families: SPRR1, SPRR2, and SPRR3. This entry represents SPRR2, a family of small proteins rich in proline, cysteine and glutamate. They contain a tandemly repeated nonamer, PKCPEPCPP. They are components of the cornified envelope of keratinocytes.
