identifier: Pfam:PF10530
label: Toxin with inhibitor cystine knot ICK or Knottin scaffold
definition: >-
  Spider toxins of the CSTX family are ion channel toxins containing an inhibitor cystine knot (ICK) structural motif or Knottin scaffold. The four disulphide bonds present in the CSTX spider toxin family are arranged in the following pattern: 1-4, 2-5, 3-8 and 6-7. CSTX-1 is the most important component of Cupiennius salei (Wandering spider) venom in terms of relative abundance and toxicity and therefore is likely to contribute significantly to the overall toxicity of the whole venom. CSTX-1 blocked rat neuronal L-type, but no other types of HVA Cav channels. Interestingly, the omega-toxins from Phoneutria nigriventer (Brazilian armed spider) venom (another South American species also belonging to the Ctenidae family) are included as they carry the same disulphide bond arrangement. CSTX-1 has calcium channel blocking activity and exhibits cytolytic activity by affecting the outer leaflet curvature and/or pore formation across the membrane.
