identifier: Pfam:PF03244
label: Photosystem I reaction centre subunit VI
definition: >-
  Photosystem I, a membrane complex found in the chloroplasts of plants and cyanobacteria uses light energy to transfer electrons from plastocyanin to ferredoxin. The electron transfer components of the photosystem include the primary electron donor chlorophyll P-700 and 5 electron acceptors: chlorophyll (A0), phylloquinone (A1) and three 4Fe-4S iron-sulphur centres, designated Fx, Fa and Fb. The role of this protein, subunit VI or PsaH, may be in docking of the light harvesting complex I antenna to the core complex.
