identifier: Pfam:PF14454
label: Prokaryotic Ubiquitin
definition: >-
  This entry represents a Ubiquitin-superfamily protein that is present across several bacterial lineages, and found in gene neighbourhoods with components of the ubiquitin modification system such as the E1, E2 and JAB proteins, and a novel α-helical protein, which is predicted to be enzymatic.
