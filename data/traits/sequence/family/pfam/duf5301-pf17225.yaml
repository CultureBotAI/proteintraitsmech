identifier: Pfam:PF17225
label: Domain of unknown function (DUF5300)
definition: >-
  This entry represents a domain found in a small family of proteins from firmicutes that is functionally uncharacterised. Based on NMR structure , it forms an α/β structure with a six-stranded antiparallel β-sheet planked by a single α-helix. The only protein with similar structures is a putative lipoprotein ( ).
