identifier: Pfam:PF22584
label: Cilia- and flagella-associated protein 143
definition: >-
  Sperm associated antigen 8 (SPAG8) is a testis-specific protein produced during male germ cell differentiation. It has been shown to interact with microtubules and to modulate microtubule assembly and/or activity. SPAG8 has also been implicated in regulation of the cell cycle by changing the phosphorylation level of Tyr15 on cdc2, suggesting it might play a role in cell division during spermatogenesis.
