identifier: Pfam:PF04315
label: Elongation factor P hydroxylase
definition: >-
  This family catalyses the final step in the elongation factor P modification pathway. It hydroxylates Lys-34 of elongation factor P. Members of this family have a conserved HEXXH motif, suggesting they are putative peptidases of zincin fold.
