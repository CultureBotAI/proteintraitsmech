identifier: Pfam:PF10661
label: WXG100 protein secretion system (Wss), protein EssA
definition: >-
  Mycobacterium tuberculosis secretes ESAT-6, a virulence factor belonging to the WXG100 family. Other Gram-positive human pathogens belonging to the phylum Firmicutes, e.g. Staphylococcus aureus, also secrete immune potent WXG100 proteins. S. aureus secretes ESAT-6-like proteins EsxA and EsxB. In S.aureus the WXG100 protein secretion system seems to be encoded by a locus of eight ORFs, called ess (eSAT-6 secretion system). This locus encodes, amongst several other proteins, EssA, a protein predicted to possess one transmembrane domain. Due to its predicted membrane location and its absolute requirement for WXG100 protein secretion, it has been speculated that EssA could form a secretion apparatus. Proteins homologous to EssA are absent from mycobacteria.
