identifier: Pfam:PF10767
label: Inner membrane protein YbjO, dehydrogenase-like
definition: >-
  This entry includes the Inner membrane protein YbjO which appears to be restricted to Enterobacterales. From AlphaFold structure predictions, it has been suggested that these proteins may function as dehydrogenases, accounting in its structural similarity with the C-terminal region of Acyl-CoA dehydrogenases.
