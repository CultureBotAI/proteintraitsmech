identifier: Pfam:PF15062
label: Haemopoietic lineage transmembrane helix
definition: >-
  ADP-ribosylation factor-like protein 6-interacting protein 6 (ARL6IP6) is a transmembrane helix present in the J2E erythro-leukaemic cell line, but not its myeloid variants. In tissues, ARL-6 mRNA was most abundant in brain and kidney. While ARL-6 protein was predominantly cytosolic, it is known to bind to SEC61-beta subunit of a protein conducting channel SEC61p.
