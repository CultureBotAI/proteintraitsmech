identifier: Pfam:PF16935
label: Putative Holin-like Toxin (Hol-Tox)
definition: >-
  This is a family of small proteins (34-48 aa) with a single TM region. Members can exhibit antibacterial activity against Gram-positive bacteria but not against Gram-negative bacteria. Proteins in this entry include BsrG, BsrH and BsrE from Bacillus subtilis. They are the toxic components of the type I toxin-antitoxin (TA) system.
