identifier: Pfam:PF05402
label: Coenzyme PQQ synthesis protein D (PqqD)
definition: >-
  This family contains several bacterial coenzyme PQQ synthesis protein D (PqqD) sequences. This protein is required for coenzyme pyrrolo-quinoline-quinone (PQQ) biosynthesis. PqqD functions as a PqqA binding protein that would serve as a chaperone to deliver PqqA to PqqE.
