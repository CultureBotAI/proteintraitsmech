identifier: Pfam:PF09496
label: Cenp-O kinetochore centromere component
definition: >-
  This entry represents centromere protein O (CENP-O) and its homologues in yeasts, Mcm21 and Mal2. Human CENP-O is a component of the CENPA-CAD (nucleosome distal) complex, which is involved in assembly of kinetochore proteins, mitotic progression and chromosome segregation. Mcm21 is a component of the inner kinetochore COMA complex, which connects centromere-associated proteins and the outer kinetochore. COMA interacts with other inner kinetochore proteins to form the inner kinetochore constitutive centromere-associated network (CCAN), which serves as a structural platform for outer kinetochore assembly.
