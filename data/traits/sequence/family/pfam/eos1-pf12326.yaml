identifier: Pfam:PF12326
label: N-glycosylation protein
definition: >-
  The Saccharomyces cerevisiae EOS1 (Endoplasmic Reticulum-localised and Oxidants Sensitive) gene is not essential for cell growth, but the EOS1 deletion strain YNL080c confers, to some degree, a slow growth phenotype. The gene product, localised to the ER membrane, is involved in oxidative stress tolerance, and may also be involved in N-glycosylation of cellular proteins. Its deduced amino acid sequence contains four potential transmembrane (TM) domains. Although its precise molecular function has not yet been established, it may be involved in cellular homeostasis.
