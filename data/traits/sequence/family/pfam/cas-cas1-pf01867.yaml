identifier: Pfam:PF01867
label: CRISPR associated protein Cas1
definition: >-
  This entry represents Cas1, which is a metal-dependent DNA-specific endonuclease. Cas1 may play a role in the recognition, cleavage, and/or integration of foreign nucleic acids into CRISPRs. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
