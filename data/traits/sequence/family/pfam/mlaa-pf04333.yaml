identifier: Pfam:PF04333
label: MlaA lipoprotein
definition: >-
  Intermembrane phospholipid transport system lipoprotein MlaA is a component of the Mla pathway, an ABC transport system that functions to maintain the asymmetry of the outer membrane. MlaA, also known as VacJ, is required for the intercellular spreading of Shigella flexneri. It is attached to the outer membrane by a lipid anchor.
