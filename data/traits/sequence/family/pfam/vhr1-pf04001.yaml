identifier: Pfam:PF04001
label: Transcription factor Vhr1
definition: >-
  The Vhr1 family of budding yeast transcription factors consists of Vhr1 and Vhr2. Vhr1 regulates the biotin-dependent expression of transporters VHT1 and BIO5. Vhr2 regulates ERG9, but seems to have a more global function in transcription.
