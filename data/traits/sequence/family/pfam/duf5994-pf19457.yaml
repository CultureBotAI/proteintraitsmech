identifier: Pfam:PF19457
label: Family of unknown function (DUF5994)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC) mainly found in actinobacteria. This BGC (BGC0000202) is described by MIBiG as an example of the following biosynthetic class, polyketide. This family contains a protein found in the azicemicin B biosynthetic gene cluster from Kibdelosporangium sp. MJ126-NF4. The function of this protein is unknown.
