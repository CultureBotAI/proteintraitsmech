identifier: Pfam:PF22010
label: AKP thiolase subunit OrtA
definition: >-
  This entry represents 2-amino-4-ketopentanoate thiolase (also known as AKP thiolase) subunit OrtA. OrtA is a subunit of a PLP-dependent enzyme that catalyses the thiolytic cleavage with coenzyme A (CoA) to form acetyl-CoA and alanine. OrtA is predicted to adopt a β-barrel structurally similar to Tudor/PWWP/MBT superfamily.
