identifier: Pfam:PF25712
label: Crassvirus Cargo protein 2
definition: >-
  This entry represents cargo protein 2, a protein stored in high quantity within bacteriophage capsids. This protein likely plays an important role during the phage infection process, particularly during genome ejection. Cargo proteins are packaged inside the viral capsid and are delivered to the host cell during infection, where they may assist in forming transmembrane channels for DNA ejection or perform other functions necessary for successful infection. Cargo protein 2 is present in 12 copies in the virion and has been detected in the capsid of Bacteroides phage crAss001, one of the most abundant bacteriophages in the human gut microbiome. The precise molecular function of this protein remains to be fully elucidated, but its conservation and abundance suggest it plays a critical role in the phage life cycle.
