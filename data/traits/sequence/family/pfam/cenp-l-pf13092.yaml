identifier: Pfam:PF13092
label: Centromere protein L
definition: >-
  CENP-L is one of the components that assembles onto the CENP-A-nucleosome distal (CAD) centromere. It interacts with CENP-N and forms a deep channel through which a DNA duplex threads. Fta1 is the equivalent component of the fission yeast Sim4 complex. The centromere, which is the basic element of chromosome inheritance, is epigenetically determined in mammals. All active centromeres are characterised by the presence of long arrays of nucleosomes in which CENP-A replaces histone H3. CENP-A assembles an array of nucleosomes and it is this that seems to be the prime candidate for specifying centromere identity. CENP-A nucleosomes directly recruit a proximal CENP-A nucleosome associated complex (NAC) comprised of CENP-M, CENP-N and CENP-T, CENP-U(50), CENP-C and CENP-H. Assembly of the CENP-A NAC at centromeres is dependent on CENP-M, CENP-N and CENP-T. Additionally, there are seven other subunits which make up the CENP-A-nucleosome distal (CAD) centromere, CENP-K, CENP-L, CENP-O, CENP-P, CENP-Q, CENP-R and CENP-S, also assembling on the CENP-A NAC.
