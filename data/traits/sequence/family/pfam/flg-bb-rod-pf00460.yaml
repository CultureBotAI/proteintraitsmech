identifier: Pfam:PF00460
label: Flagella basal body rod protein
definition: >-
  Many bacterial species swim actively by means of flagella. The flagella organelle is made of three parts: the basal body, the hook and the filament. The basal body consists of four rings (L,P,S, and M) mounted on a central rod. In Salmonella typhimurium and related organisms the rod has been shown to consist of four different, yet evolutionary related proteins: in the distal portion of the rod there are about 26 subunits of protein flgG and in the proximal portion there are about six subunits each of proteins flgB, flgC, and flgF. These four proteins contain a highly conserved asparagine-rich domain at their N terminus.
