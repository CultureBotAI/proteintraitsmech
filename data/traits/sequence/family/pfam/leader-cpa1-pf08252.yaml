identifier: Pfam:PF08252
label: 'arg-2/CPA1 leader peptide '
definition: >-
  In this family there are leader peptides involved in the regulation of the glutaminase subunit (small subunit) of arginine-specific carbamoyl phosphate synthetase. In Neurospora crassa it is a small upstream ORF of 24 codons above the arg-2 locus. In yeast it is the leader peptide of the CPA1 gene. The 5' region of CPA1 mRNA contains a 25 codon upstream open reading frame. The leader peptide, the product of the upstream open reading frame, plays an essential, negative role in the specific repression of CPA1 by arginine.
