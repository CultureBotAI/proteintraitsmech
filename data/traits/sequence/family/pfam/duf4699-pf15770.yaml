identifier: Pfam:PF15770
label: Domain of unknown function (DUF4699)
definition: >-
  This entry describes PDCD10 and GCKIII kinases-associated protein 1 C4orf19 (PGCKA1) proteins found in animals. C4orf19 is a member of the programmed cell death 10 (PDCD10)-germinal center kinase III (GCKIII) module, which is predicted to be located at the cell periphery. The function of C4orf19 (ex DUF4699) has been recently characterised. It was shown that it acts as a tumor suppressor for CRC cell proliferation by targeting the Keap1/USP17/Elk-1/CDK6 axis.
