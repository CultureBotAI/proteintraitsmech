identifier: Pfam:PF06050
label: '2-hydroxyglutaryl-CoA dehydratase, D-component '
definition: >-
  This entry includes HgdA/B from Acidaminococcus fermentans, FldB/C from Clostridium sporogenes and BcrB/C from Thauera aromatica. Acidaminococcus fermentans 2-hydroxyglutaryl-CoA dehydratase consists of two components: A (for activator or initiator) and D (for dehydratase). HgdA and B form a heterodimeric enzyme designated as component D, which contains an oxidized [4Fe-4S]2+ cluster and reduced riboflavin-5'-phosphate. This entry also includes (R)-2-hydroxyisocaproyl-CoA dehydratase (hadB/C) which catalyses the dehydration of (R)-2-hydroxyisocaproyl-CoA in the fermentation of l-leucine by the human pathogenic bacterium Clostridioides difficile ( ).
