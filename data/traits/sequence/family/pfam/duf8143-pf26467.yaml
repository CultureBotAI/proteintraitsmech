identifier: Pfam:PF26467
label: Family of unknown function (DUF8143)
definition: >-
  This entry represents a family of uncharacterised proteins in archaea. The proteins are predominantly found in the class Halobacteria, which includes families such as Natrialbaceae, Haloferacaceae, and Haloarculaceae. This family contains proteins ranging from 50 to 115 amino acids in length. These proteins contain and N-terminal transmembrane helix followed by a likely disordered C terminus.
