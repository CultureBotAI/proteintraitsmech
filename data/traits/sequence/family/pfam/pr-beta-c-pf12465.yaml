identifier: Pfam:PF12465
label: 'Proteasome beta subunits C terminal '
definition: >-
  This domain is found in the C terminus of beta-type subunits of the proteasome, a multimeric complex that degrades proteins into peptides as part of the MHC class I-mediated Ag-presenting pathway. This domain is approximately 40 amino acids in length. It is found in association with . It contains a conserved GTT sequence motif and a single completely conserved residue Y that may be functionally important.
