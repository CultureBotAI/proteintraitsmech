identifier: Pfam:PF26873
label: Phage T4 Y06O protein
definition: >-
  This entry represents protein Y06O found in bacteriophages. This protein is located in the e-segB intergenic region. The protein is also known as e.4 or msp5 and is found in the region between lysozyme and the tRNA genes. The function of this protein is unknown.
