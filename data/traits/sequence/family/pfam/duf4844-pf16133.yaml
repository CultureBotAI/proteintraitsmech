identifier: Pfam:PF16133
label: Domain of unknown function (DUF4844)
definition: >-
  This family consists of short uncharacterised proteins found mostly in different strains of Acinetobacter bumanii, but also in several Shewanella species and in some bacteria from the CFB group. Solved structure of ABAYE3784 protein from Acinetobacter baumannii AYE ( ) shows a five helical bundle with a very strong structural similarity to a bromodomain domain. However, the specific function of proteins from this family is unknown.
