identifier: Pfam:PF17734
label: Spermatogenesis-associated protein 46
definition: >-
  This family is found in chordata. The deletion of Spata46 in mice resulted in subfertility with abnormal sperm head shape and a failure of sperm-egg fusion. Spata46 has also been shown to localize to the nuclear membrane by a transmembrane region in the N-terminal.
