identifier: Pfam:PF24686
label: Fluoroquinolones export permease protein family
definition: >-
  This entry represents the Fluoroquinolones export permease protein family, which is involved in the export of fluoroquinolones as part of an ABC transporter complex. This family is likely responsible for the translocation of substrates across the membrane and confers resistance to various fluoroquinolones, including ciprofloxacin, norfloxacin, moxifloxacin, and sparfloxacin. A member of this family, Fluoroquinolones export permease protein Rv2687c ( ), is part of the ABC transporter complex Rv2686c/Rv2687c/Rv2688c involved in fluoroquinolones export and confers resistance to ciprofloxacin.
