identifier: Pfam:PF05801
label: Lagovirus minor capsid protein VP2
definition: >-
  This family includes minor capsid protein VP2 from Rabbit hemorrhagic disease virus and related lagoviruses. VP2 is a minor structural protein that forms a portal-like structure at a unique three-fold axis of symmetry, following binding to the host receptor. The channel formed by VP2 may allow the delivery of the viral genome through the host endosomal membrane.
