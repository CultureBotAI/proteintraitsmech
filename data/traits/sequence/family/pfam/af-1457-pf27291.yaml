identifier: Pfam:PF27291
label: Archaeal AF_1457 family
definition: >-
  This entry represents the AF_1457 family of small uncharacterised proteins found in archaea. The family is predominantly found in methanogenic and hyperthermophilic archaea, including members of the Methanomicrobiaceae, Methanosarcinaceae, and Archaeoglobus. The proteins are approximately 105 amino acids in length and contain multiple predicted transmembrane helices. The function of this protein family remains to be determined.
