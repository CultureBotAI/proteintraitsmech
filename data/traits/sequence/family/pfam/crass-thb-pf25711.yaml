identifier: Pfam:PF25711
label: Crassvirus tail hub protein B
definition: >-
  This entry represents the tail hub protein B (THB) found in bacteriophages. The protein forms a heterotrimer with tail hub protein A (THA), and these heterotrimers further assemble as 12 docking hubs that form a continuous collar around the tail barrel. The C-terminal segment of THB (residues 67-107) extends into the neighbouring hub, resulting in interlocking connections between adjacent hub assemblies. Each docking hub anchors the trimeric tail fibres. The tail hub proteins play an important structural role in phage assembly, serving as the attachment point for the tail fibre appendages. THB has been structurally characterised in the Bacteroides phage crAss001, revealing its role in the architecture of the phage tail.
