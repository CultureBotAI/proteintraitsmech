identifier: Pfam:PF03874
label: RNA polymerase Rpb4
definition: >-
  This entry includes RNA polymerase II subunit Rpb4 and its paralogue, RPC9 (also known as Rpc17 in budding yeasts), a subunit of RNA polymerase III. The Rpb4 and Rpb7 subunits of yeast RNA polymerase II form a heterodimeric complex essential for promoter-directed transcription initiation. The Rpb4-Rpb7 complex is not required for stable recruitment of polymerase to active preinitiation complexes, suggesting that Rpb4-Rpb7 mediates an essential step subsequent to promoter binding. RPC9 may be involved in the recruitment of pol III by the preinitiation complex.
