identifier: Pfam:PF13252
label: Phage capsid protein
definition: >-
  This entry, previously known as DUF4043, represents a group of proteins from tailed bacteriophages and prophages mainly found in proteobacteria and firmicutes, including Major capsid protein from Pseudomonas phage KPP25 (ORF017, ), Major capsid protein from Ralstonia phage GP4 and Major structural protein ORF14 from Helicobacter pylori. There is a single completely conserved residue G that may be functionally important.
