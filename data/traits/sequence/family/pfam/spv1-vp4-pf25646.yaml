identifier: Pfam:PF25646
label: Sulfolobus polyhedral virus 1 major capsid protein VP4
definition: >-
  This entry represents the major capsid protein VP4 from Sulfolobus polyhedral virus 1 (SPV1), which infects hyperthermophilic acidophilic archaea. VP4 is the primary component of the icosahedral capsid of SPV1, forming hexamers that assemble into a T=43 surface lattice. The protein adopts a variation of the jelly-roll fold, with additional β-strands inserted next to the C-strand (C'). Unlike the classical jelly-roll fold, the axis of the β-barrel in SPV1 VP4 is tilted 30 degrees with respect to the normal to the capsid surface. VP4 shares limited sequence identity (~15%) but high structural similarity with VP10, which forms pentamers at the five-fold axes of the icosahedral capsid.
