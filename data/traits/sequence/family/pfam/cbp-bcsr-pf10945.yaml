identifier: Pfam:PF10945
label: Cellulose biosynthesis protein BcsR-like
definition: >-
  Cellulose is necessary for biofilm formation in bacteria and is synthesized by the bacterial cellulose biosynthesis complex (Bcs) which is widespread among beta and gamma proteobacteria. CBP_BcsR is a small subunit of this complex, essential for cellulose secretion. It may play a regulatory role together with BcsQ subunit as they form a subcomplex with chaperone-like function toward each other. BcsR stabilizes BcsQ to form monodisperse BcsR2Q2 heterotetramers in solution and BcsQ may play a role in the folding and subsequent stability of BcsR.
