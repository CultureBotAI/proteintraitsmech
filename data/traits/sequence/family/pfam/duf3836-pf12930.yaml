identifier: Pfam:PF12930
label: Family of unknown function (DUF3836)
definition: >-
  This entry represents a family of bacterial proteins of unknown function. These proteins fold into a single-layer anti-parallel β-sheet, comprised of three or four twisted β-hairpin repeats. Small clusters of hydrophobic residues adjacent to the turns are likely to play a significant role in the structural stability of these domains and compensate for the lack of a compact hydrophobic core.
