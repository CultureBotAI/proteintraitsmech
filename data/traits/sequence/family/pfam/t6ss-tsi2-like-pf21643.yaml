identifier: Pfam:PF21643
label: T6SS, Immune protein Tsi2-like
definition: >-
  This protein family includes immune protein Tsi2 (also known as Anti-toxin protein Tsi2) from Pseudomonas aeruginosa and similar sequences predominantly found in proteobacteria. Tsi2 is a immunity protein that plays a role in preventing early activation of toxin Tse2, which is transported via the type VI secretion system (T6SS). It binds to a large surface of Tse2 and thereby occludes the active site to specifically inhibit Tse2. Tsi2 forms a dimeric structure. Each monomer consists of two large α-helices arranged as an anti-parallel coiled-coil connected by a short turn ( ).
