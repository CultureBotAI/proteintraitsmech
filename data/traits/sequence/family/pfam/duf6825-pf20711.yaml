identifier: Pfam:PF20711
label: Family of unknown function (DUF6825)
definition: >-
  This family of proteins can be found in plants and Cyanobacteria, including PG18 (At4g13200) from Arabidopsis and thylakoid protein sll1769 from Synechocystis sp.. PG18 is a plastoglobular protein involved in chloroplast function and thylakoid formation. Proteins in this family are typically between 108 and 202 amino acids in length.
