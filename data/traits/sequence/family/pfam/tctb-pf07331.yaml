identifier: Pfam:PF07331
label: Tripartite tricarboxylate transporter TctB family
definition: >-
  This entry represents a domain found in a group of uncharacterised bacterial sequences, including 16.3 kDa protein in TAR-I ttuC' 3'region from the common pathogen of grapevine Agrobacterium vitis. In most members of this group, this domain covers the whole length of the protein, and many of them are annotated as the TctB subunit of the tripartite tricarboxylate transport (TTT) family. However there is no direct evidence to support this annotation as characterised members of this family are not associated with the entry.
