identifier: Pfam:PF03918
label: Cytochrome C biogenesis protein
definition: >-
  Cytochrome c-type biogenesis protein CcmH is a membrane-anchored thiol-oxidoreductase that is essential in the maturation of c-type cytochromes. CcmH consists of an N-terminal catalytic domain with the active site CXXC motif, exposed to the periplasm, and a C-terminal domain of unknown function which is predicted to contain TPR-like repeats. The CXXC motif is believed to be active in the reduction of the cysteines of the CXXCH motif on apocytochromes c. In Arabidopsis, AtCCMH (At1g15220) is a mitochondrial protein that plays a central role in mitochondrial cytochrome c maturation. It forms a complex with CcmF and performs the assembly of heme with c-type apocytochromes in plant mitochondria. NrfF is not required for the biogenesis of c-type cytochromes. This domain is found in NrfF, CcmH, CycL, Ccl2; in some members it corresponds to the N-terminal domain while in others this is the only domain found.
