identifier: Pfam:PF00820
label: Borrelia lipoprotein
definition: >-
  The ospA and ospB genes encode the major outer membrane proteins of the Lyme disease spirochaete Borrelia burgdorferi. The deduced gene products OspA and OspB, contain 273 and 296 residues respectively. The two Osp proteins show a high degree of sequence similarity, indicating a recent evolutionary event. Molecular analysis and sequence comparison of OspA and OspB with other proteins has revealed similarity to the signal peptides of prokaryotic lipoproteins.
