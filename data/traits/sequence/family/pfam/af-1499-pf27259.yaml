identifier: Pfam:PF27259
label: Uncharacterized membrane protein AF_1499 family
definition: >-
  This entry represents the AF_1499 protein family, an uncharacterised membrane protein found in Archaea. The protein is 234 amino acids in length with a molecular weight of approximately 25.6 kDa. The protein contains six predicted transmembrane helices and is predicted to be a multi-pass membrane protein localised to the cell membrane. AF_1499 is found in Archaeoglobus fulgidus and related archaeal species. The function of this membrane protein family remains to be determined. This family also includes uncharacterised bacterial proteins which also contain transmembrane helices and eukaryotic proteins with a similar structure.
