identifier: Pfam:PF04489
label: 'Protein of unknown function (DUF570)    '
definition: >-
  This proteins in this entry belong to the herpesvirus U10 family. Family member Protein UL31 is involved in the inhibition of the host innate immune system. It targets host CGAS, promoting dissociation of DNA from CGAS, thus inhibiting the enzymatic activity of CGAS.
