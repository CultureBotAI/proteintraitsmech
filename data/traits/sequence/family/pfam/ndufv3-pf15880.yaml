identifier: Pfam:PF15880
label: NADH dehydrogenase [ubiquinone] flavoprotein 3, mitochondrial
definition: >-
  NADH dehydrogenase [ubiquinone] flavoprotein 3 (NDUFV3) is a accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I), that is believed not to be involved in catalysis. Complex I functions in the transfer of electrons from NADH to the respiratory chain. The immediate electron acceptor for the enzyme is believed to be ubiquinone.
