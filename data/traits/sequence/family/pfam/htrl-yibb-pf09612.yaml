identifier: Pfam:PF09612
label: Bacterial protein of unknown function (HtrL_YibB)
definition: >-
  This family includes HtrL (also known as YibB) in Escherichia coli, where its gene is found in a region of LPS core biosynthesis genes. Homologues are found in Shigella flexneri, Campylobacter jejuni, and some eukaryotic species, such as Caenorhabditis elegans. WlaTC from Campylobacter jejuni, is involved in lipooligosaccharide synthesis (LOS) together with WlaRG, and WlaTB. WlaTC showed great similarity to HtrL and it has been described as the glycosyltransferase.
