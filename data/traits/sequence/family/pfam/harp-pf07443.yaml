identifier: Pfam:PF07443
label: HepA-related protein (HARP)
definition: >-
  SMARCAL1 (SWI/SNF-related, matrix-associated, actin-dependent regulator of chromatin, subfamily A-like1), also known as DNA-dependent ATPase A and HARP (Hep-A-related proteins), maintains genome integrity during DNA replication. SMARCAL1 has ATP-dependent annealing helicase activity, which helps to stabilise stalled replication forks and facilitate DNA repair during replication. Biochemically, SMARCAL1 can bind to DNA that contains single- and double-stranded regions such as forks and DNA hairpins. DNA binding activates its ATPase activity, and this activity promotes DNA single-stranded annealing. SMARCAL1 is a multifunctional protein. The ATPase domain, which lies in the C- terminal half of the protein, is split into two regions of primary amino acid sequence by a 115-amino-acid linker sequence. The N-terminal half of the protein contains a highly sequence conserved ssDNA-binding protein replication protein A (RPA)-binding domain, and one or two HARP domain(s). The evolutionarily conserved HARP domain determines the annealing helicase activity required for the in vivo and in vitro functions of SMARCAL1.
