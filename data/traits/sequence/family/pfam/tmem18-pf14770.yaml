identifier: Pfam:PF14770
label: Transmembrane protein 18
definition: >-
  This entry represent the transmembrane protein 18 (TMEM18). In humans, TMEM18 is a transcription repressor and a sequence-specific ssDNA and dsDNA binding protein, with preference for GCT end CTG repeats. It enhances the tropism of neural stem cells for glioma cells.
