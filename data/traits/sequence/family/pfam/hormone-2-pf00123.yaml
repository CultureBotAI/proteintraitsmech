identifier: Pfam:PF00123
label: Peptide hormone
definition: >-
  A number of polypeptidic hormones, mainly expressed in the intestine or the pancreas, belong to a group of structurally related peptides. Once such hormone, glucagon is widely distributed and produced in the alpha-cells of pancreatic islets. It affects glucose metabolism in the liver by inhibiting glycogen synthesis, stimulating glycogenolysis and enchancing gluconeogenesis. It also increases mobilisation of glucose, free fatty acids and ketone bodies, which are metabolites produced in excess in diabetes mellitus. Glucagon is produced, like other peptide hormones, as part of a larger precursor (preproglucagon), which is cleaved to produce glucagon, glucagon-like protein I and glucagon-like protein II. The structure of glucagon itself is fully conserved in all known mammalian species. Other members of the structurally similar group include glicentin precursor, secretin, gastric inhibitory protein, vasoactive intestinal peptide (VIP), prealbumin, peptide HI-27 and growth hormone releasing factor.
