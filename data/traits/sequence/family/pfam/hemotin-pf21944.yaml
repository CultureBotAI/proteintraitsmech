identifier: Pfam:PF21944
label: Hemotin
definition: >-
  This entry represents a group of proteins specific to Drosophila species, including Hemotin from Drosophila melanogaster. Hemotin is a transmembrane α-helical microprotein localised to early endosomes in hemocytes (Drosophila macrophages), where it regulates endosomal maturation during phagocytosis by repressing the cooperation of 14-3-3zeta with specific phosphatidylinositol enzymes. Hemocytes are professional phagocytes tasked with removing dying cells and microorganisms invading the body. Drosophila hemotin mutants accumulate undigested phagocytic material inside enlarged endolysosomes, resulting in reduced ability to fight bacteria and severely reduced life span.
