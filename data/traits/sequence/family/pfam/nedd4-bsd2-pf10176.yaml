identifier: Pfam:PF10176
label: NEDD4/Bsd2
definition: >-
  Proteins in this entry include the human NEDD4 family-interacting protein 1/2 (Ndfip1 and Ndfip2) and the yeast Bsd2 metal homeostasis proteins. Ndfip1 and Ndfip2 are endosomal membrane proteins that bind to and activate members of the Nedd4 family of E3 ubiquitin ligases. Ndfip1 plays a role in regulating metal transport in human neurons.
