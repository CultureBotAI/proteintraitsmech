identifier: Pfam:PF07466
label: Protein of unknown function (DUF1517)
definition: >-
  This family consists of several hypothetical glycine rich plant and bacterial proteins of around 300 residues in length. This entry includes the Fluctuating-Light-Acclimation Protein 1 (FLAP1). FLAP1 is conserved in oxygenic phototrophs. FLAP1 is associated with chloroplast thylakoid and envelope membranes and is involved in plastidial pH control, but the molecular function of this family is unknown.
