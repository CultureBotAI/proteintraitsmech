identifier: Pfam:PF12496
label: Bcl2-/adenovirus E1B nineteen kDa-interacting protein 2
definition: >-
  This domain family is found in eukaryotes, and is typically between 119 and 133 amino acids in length. There is a conserved HGGY sequence motif. This family is Bcl2-/adenovirus E1B nineteen kDa-interacting protein 2. It interacts with pro- and anti- apoptotic molecules in the cell.
