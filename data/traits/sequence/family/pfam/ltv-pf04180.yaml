identifier: Pfam:PF04180
label: 'Low temperature viability protein '
definition: >-
  The low-temperature viability protein Ltv1 is required for 40S subunit biogenesis in yeast. It may facilitate the incorporation of Rps3, Rps10, and Asc1/RACK1 into the small ribosomal subunit head.
