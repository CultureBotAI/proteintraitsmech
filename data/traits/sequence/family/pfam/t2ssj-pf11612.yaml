identifier: Pfam:PF11612
label: Type II secretion system (T2SS), protein J
definition: >-
  This family of proteins represents GspJ which is targeted to the membrane of Escherichia coli. GspJ forms a complex with GspI and GspK, which is part of the type 2 secretion system, involved in the translocation of proteins across the outer membrane of E.coli. The GSPK-I-J complex has quasi-helical characteristics. The type II secretion system (T2SS) is one of several extracellular secretion systems in gram-negative bacteria. It delivers toxins and a range of hydrolytic enzymes including proteases, lipases and carbohydrate-active enzymes to the cell surface or extracellular space. T2SS systems are composed of 11 to 15 different proteins, which are generally called GspA to GspO and GspS. The T2SS spans the two bacterial membranes and ensures secretion of folded proteins across the outer membrane pore formed by GspD. The inner membrane complex contains GspC, GspL, GspM, and GspF. The cytoplasmic domains of GspL and GspF interact with an ATPase, GspE. GspE is thought to energize the formation of a short pseudopilus by several pilin-like proteins, GspG to GspK. GspD has been shown to interact with the inner membrane component GspC.
