identifier: Pfam:PF04328
label: 'Selenoprotein, putative '
definition: >-
  This entry includes a group of putative selenoproteins from Proteobacteria, Actinobacteria and Firmicutes. The invariant cysteine at the C terminus is encoded by a TGA Sec codon in some Epsilonproteobacteria, suggesting a redox activity for the protein.
