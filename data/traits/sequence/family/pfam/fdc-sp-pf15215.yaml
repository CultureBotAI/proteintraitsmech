identifier: Pfam:PF15215
label: Follicular dendritic cell secreted peptide
definition: >-
  Follicular dendritic cells (FDCs) are cells of the immune system found in lymph follicles. They play a central role in the organisation of the follicular structure that supports B cell survival, affinity maturation of Ab responses, and the generation of long-lived B cell memory. Follicular dendritic cell secreted peptide (FDC-SP) is a novel secreted protein expressed by follicular dendritic cells. Its role is unknown, but it has been suggested that it may regulate immune responses.
