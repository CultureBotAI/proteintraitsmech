identifier: Pfam:PF15312
label: Junctional sarcoplasmic reticulum protein
definition: >-
  Junctional sarcoplasmic reticulum protein 1 (JSRP1, also known as JP-45) may regulate voltage-sensitive calcium channel CACNA1S membrane targeting and activity. The protein may also have a role in the development or maintenance of skeletal muscle strength.
