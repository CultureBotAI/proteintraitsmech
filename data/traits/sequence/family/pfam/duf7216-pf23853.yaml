identifier: Pfam:PF23853
label: Family of unknown function (DUF7216)
definition: >-
  This entry represents a family of cyanophage proteins, including Gp130, that are found in a variety of Synechococcus and Prochlorococcus phages. The family members are typically around 100 amino acids in length. Structure predictions do not show a globular fold for this protein. The exact function of this family is unknown.
