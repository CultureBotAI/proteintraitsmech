identifier: Pfam:PF27924
label: EP300-interacting inhibitor of differentiation
definition: >-
  The EID family members have been identified as a family of negative regulators of cellular differentiation. The family consists of EID-1 (E1A-like inhibitor of differentiation 1, also known as EP300-interacting inhibitor of differentiation 1), EID2, and EID-3/EID-2B. EID-1 seems to inhibit differentiation by blocking p300 histone acetyltransferase activity, while EID-2 inhibits differentiation through binding to class I histone deacetylases (HDACs). EID-3 acts both as inhibitor of CBP/p300-dependent transcription and can also blocks muscle differentiation by binding to class I HDACs.
