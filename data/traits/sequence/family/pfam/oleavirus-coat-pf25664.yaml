identifier: Pfam:PF25664
label: Oleavirus coat protein
definition: >-
  This entry represents the coat (capsid) protein ORF3b family found in Oleavirus genus members of the Bromoviridae family, including Olive latent virus 2. The capsid protein self-assembles to form a quasi-spherical capsid of approximately 26 nm, or in a bacilliform shape. The protein is part of the virion and functions in viral RNA binding to form the viral nucleocapsid.
