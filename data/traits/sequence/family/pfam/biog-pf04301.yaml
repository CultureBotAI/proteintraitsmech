identifier: Pfam:PF04301
label: Pimeloyl-ACP methyl esterase BioG
definition: >-
  This protein family includes Pimeloyl-ACP methyl esterase BioG from Haemophilus influenzae and similar bacterial proteins. This enzyme is involved in the biosynthesis of pymeloyl-ACP and, hence, in biotin biosynthesis. It is organised into a a core domain formed by a seven-stranded β-sheet and a lid domain consisting of four α-helices.
