identifier: Pfam:PF09581
label: Stage III sporulation protein AF (Spore_III_AF)
definition: >-
  This family represents the stage III sporulation protein AF (SpoIIIAF) of the bacterial endospore formation program, which exists in some but not all members of the Firmicutes (formerly called low-GC Gram-positives). These proteins have the typical RBM fold conserved in T3SS/flagellar systems [1]. The RBM fold of SpoIIIAF contains two unique features, extended N-terminal helix, associated with multimerization and an insertion at a loop region that can adopt two distinct conformations.
