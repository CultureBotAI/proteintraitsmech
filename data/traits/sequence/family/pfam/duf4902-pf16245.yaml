identifier: Pfam:PF16245
label: Domain of unknown function (DUF4902)
definition: >-
  This entry represents a family of proteins mainly found in Proteobacteria, including RsaM from Burkholderia cenocepacia (encoded by bcam1869, ) and similar proteins mainly found in Proteobacteria. RsaM is a transcriptional regulator involved in quorum sensing (QS). This protein folds into a unique domain with a five-stranded antiparallel β-sheet that wraps around two α-helices.
