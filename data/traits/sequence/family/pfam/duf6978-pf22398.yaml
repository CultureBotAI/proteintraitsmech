identifier: Pfam:PF22398
label: Family of unknown function (DUF6978)
definition: >-
  This is a family of uncharacterised proteins. They are predicted to adopt a globular α/β structure consisting of a meander β-sheet and two α-helices packed on one side on the sheet. These proteins contain three highly conserved histidines that in the predicted structure cluster close in space and could potentially form a metal binding site.
