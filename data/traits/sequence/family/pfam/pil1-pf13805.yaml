identifier: Pfam:PF13805
label: Eisosome component PIL1
definition: >-
  In the budding yeast, S. cerevisiae, Pil1 and another cytoplasmic protein, Lsp1, together form large immobile assemblies at the plasma membrane that mark sites for endocytosis, called eisosomes. Endocytosis functions to recycle plasma membrane components, to regulate cell-surface expression of signalling receptors and to internalise nutrients in all eukaryotic cells.
