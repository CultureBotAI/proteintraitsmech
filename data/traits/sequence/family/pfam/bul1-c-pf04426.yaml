identifier: Pfam:PF04426
label: Bul1 C terminus
definition: >-
  This domain contains the C terminus of Saccharomyces cerevisiae Bul1 and Bul2. Bul1 binds the ubiquitin ligase Rsp5, via an N-terminal PPSY motif (157-160 in ). The complex containing Bul1 and Rsp5 is involved in intracellular trafficking of the general amino acid permease Gap1, degradation of Rog1 in cooperation with Bul2 and GSK-3, and mitochondrial inheritance. Bul2, which is homologous to Bul1, also interacts with Rsp5. This domain is found C-terminal to .
