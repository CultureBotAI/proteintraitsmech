identifier: Pfam:PF28594
label: YojO family protein
definition: >-
  This entry represents the YojO family of small proteins from enterobacterales. Members of this family are approximately 54 amino acids in length. The YojO protein from CFT073 is encoded on the chromosome of this highly virulent uropathogenic E. coli strain that causes pyelonephritis and other urinary tract infections. YojO proteins are predicted to be cytoplasmic with no signal peptides or transmembrane helices. Its function remains to be determined.
