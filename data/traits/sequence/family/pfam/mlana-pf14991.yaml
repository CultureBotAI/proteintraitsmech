identifier: Pfam:PF14991
label: Protein melan-A
definition: >-
  Melan-A, also known as melanoma antigen recognised by T-cells 1, or MART-1, is a protein that in humans is encoded by the MLANA gene. It is required for the function of the melanosomal matrix protein PMEL17/GP100 and thus plays an important role in regulating mammalian pigmentation. Melan-A is a member of the MAGE gene family and is a tumour associated antigen. Clinically, the protein may serve as an anti-cancer vaccine.
