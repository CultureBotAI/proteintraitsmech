identifier: Pfam:PF10220
label: 'Smg8_Smg9 '
definition: >-
  This entry represents human SMG8 and similar eukaryotic proteins. SMG8 is a subunit of the Smg-1 complex that suppress Smg-1 kinase activity in the isolated Smg-1 complex, and is involved in nonsense-mediated mRNA decay (NMD) in both mammals and nematodes. NMD is a surveillance mechanism that detects and degrades mRNAs containing premature translation termination codons.
