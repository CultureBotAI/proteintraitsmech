identifier: Pfam:PF16510
label: Phage P22-like portal protein
definition: >-
  This entry represents the portal protein found in P22 and similar Podoviridae tail phages. Portal proteins are large proteinaceous assemblies through which DNA viruses, including bacteriophages and herpesviruses, deliver their genome into and out of the capsid. The portal protein forms the portal vertex of the capsid, playing critical roles in head assembly, genome packaging, neck/tail attachment, and genome ejection. It multimerizes as a single ring-shaped homododecamer arranged around a central channel. The dodecameric structure consists of three domains: a leg (domain 1), a hip (domain 2), and a barrel (domain 3). Domains 1 and 3 are predominantly helical and form the majority of the DNA-translocating channel. Domain 2 adopts an α-β fold characterised by two sheets of eight β-strands that cross each other to form a β-barrel-like structure.
