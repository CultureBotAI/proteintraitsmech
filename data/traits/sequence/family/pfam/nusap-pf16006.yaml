identifier: Pfam:PF16006
label: Nucleolar and spindle-associated protein
definition: >-
  Nucleolar and spindle-associated protein 1 (NuSAP) is a microtubule-associated protein with the capacity to bundle and stabilise microtubules. When overexpressed, it causes profound cytoplasmic microtubule bundling in interphase cells. It localises to the spindle during mitosis. NuSAP depletion by RNA interference results in defect in spindle midzone formation and aberrant anaphase and cytokinesis. NuSAP may be regulated by phosphorylation during mitosis. NuSAP is indispensable for mitosis and may play an important role in cancer progression and aggressiveness.
