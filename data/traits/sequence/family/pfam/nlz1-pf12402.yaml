identifier: Pfam:PF12402
label: NocA-like zinc-finger protein 1
definition: >-
  This domain family is found in eukaryotes, and is typically between 42 and 57 amino acids in length. There is a conserved GAY sequence motif. There is a single completely conserved residue G that may be functionally important. Nlz1 self-associated via its C terminus, interacted with Nlz2, and bound to histone deacetylases. These proteins may function as a transcriptional repressors.
