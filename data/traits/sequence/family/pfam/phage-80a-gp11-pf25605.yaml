identifier: Pfam:PF25605
label: Phage 80a gp11 protein
definition: >-
  This entry represents a small family of phage proteins that include gp11 from Staphylococcus phage 80alpha. This protein is composed of three α-helices and appears to adopt a confident homotrimeric arrangement in structure prediction. The function of this protein is unknown.
