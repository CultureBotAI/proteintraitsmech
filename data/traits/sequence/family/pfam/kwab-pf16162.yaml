identifier: Pfam:PF16162
label: Kiwa protein KwaB-like
definition: >-
  This family includes Kiwa protein KwaB from E.coli, a component of antiviral defense system Kiwa, composed of KwaA and KwaB. The expression of Kiwa in E.coli (strain MG1655) confers resistance to phages lambda and SECphi18. This family includes a phylogenetically broad range of bacteria associated with the human gut microbiome. A member of this family from Lactobacillus casei CRL 705 is part of the gene cluster involved in synthesis of bacteriocin toxin.
