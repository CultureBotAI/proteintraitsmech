identifier: Pfam:PF17228
label: Sulphur globule protein
definition: >-
  Sulphur globules are membrane-bounded intracellular globules, used by purple sulphur bacteria to transiently store sulphur during the oxidisation of reduced sulphur compounds. This proteobacterial family contains structural proteins of these sulphur globules, and includes sulphur globule protein CV1 (SgpA).
