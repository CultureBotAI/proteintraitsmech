identifier: Pfam:PF06323
label: Phage antitermination protein Q
definition: >-
  This entry is represented by Bacteriophage 82, GpQ. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. This family consists of several phage antitermination protein Q and related bacterial sequences. Phage 82 gene Q encodes a phage-specific positive regulator of late gene expression, thought, by analogy to the corresponding gene of phage lambda, to be a transcription antiterminator. GpQ positively regulates expression of the phage late gene operons. Bacterial host RNA polymerase modified by antitermination proteins transcribes through termination sites that otherwise prevent expression of the regulated genes.
