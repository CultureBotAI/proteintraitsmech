identifier: Pfam:PF05262
label: Borrelia P83/100 protein
definition: >-
  This entry consists of Adhesin Lsa63 from Leptospira interrogans and Borrelia P83/P100 antigen proteins ( ). Adhesin Lsa63 binds to mammalian extracellular matrix (ECM) proteins collagen type IV and laminin-1 in a dose-dependent and saturable manner, but not to mammalian cellular or plasma fibronectin nor collagen type I in vitro. May mediate host colonization by adhering to the certain ECM proteins, and may consequently contribute to pathogenesis. .
