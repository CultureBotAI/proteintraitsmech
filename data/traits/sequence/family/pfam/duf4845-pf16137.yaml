label: Domain of unknown function (DUF4845)
definition: >-
  This family consists of uncharacterised proteins around 120 residues in length and mainly found in Proteobacteria. Distant homology analysis suggests that proteins from this family are related to pilin type IV proteins from the Bundlin ( ) family; this prediction is however not confirmed by any experimental evidence.
