identifier: Pfam:PF11402
label: Antifungal protein
definition: >-
  Antifungal proteinσ consists of five antiparallel β-strands which are highly twisted creating a β-barrel stabilised by four internal disulphide bridges. A cationic site adjacent to a hydrophobic stretch on the protein surface may constitute a phospholipid binding site. Members of this entry act as inhibitors of growth of human pathogenic molds and yeasts such as PafB and opdH.
