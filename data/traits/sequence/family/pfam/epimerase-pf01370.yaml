identifier: Pfam:PF01370
label: NAD dependent epimerase/dehydratase family
definition: >-
  This domain is found in proteins that utilise NAD as a cofactor and use nucleotide-sugar substrates for a variety of chemical reactions. One of the best studied of these proteins is UDP-galactose 4-epimerase which catalyses the conversion of UDP-galactose to UDP-glucose during galactose metabolism.
