identifier: Pfam:PF22054
label: BVU_2266-like
definition: >-
  This family represents BVU_2266 from Phocaeicola vulgatus ( ) and similar sequences from bacteroidetes. Members of this family show 16-stranded β-barrels resembling outer membrane porins. The interior of the barrels is mostly occupied by an insert with a partially helical structure.
