identifier: Pfam:PF08598
label: Sds3-like
definition: >-
  Repression of gene transcription is mediated by histone deacetylases containing repressor-co-repressor complexes, which are recruited to promoters of target genes via interactions with sequence-specific transcription factors. The co-repressor complex contains a core of at least seven proteins. This entry represents the conserved region found in Sds3, Dep1 and BRMS1-homologue p40 proteins.
