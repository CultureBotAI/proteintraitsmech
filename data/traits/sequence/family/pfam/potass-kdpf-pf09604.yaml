identifier: Pfam:PF09604
label: F subunit of K+-transporting ATPase (Potass_KdpF)
definition: >-
  This entry represents the F subunit (KdpF) of a P-type K+ translocating ATPase (Kdp) in archaea and bacteria. KdpF is a very small integral membrane peptide. The kdpABC operon of Escherichia coli codes for the high affinity K+ translocating Kdp complex. KdpF is found upstream of the KdpA subunit ( ). Because of its very small size and highly hydrophobic character, it is sometimes missed in genome annotation.Though KdpF is not essential in vivo it is part of the complex and functions as a stabilising element in vitro. Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP.
