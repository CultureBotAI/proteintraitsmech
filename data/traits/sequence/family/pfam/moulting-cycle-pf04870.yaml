identifier: Pfam:PF04870
label: Moulting cycle
definition: >-
  This entry represents a family of proteins from nematodes, including Molting protein mlt-10 from Caenorhabditis elegans. Mlt-10 plays a role in the moulting cycle, which involves the synthesis of a new collagen-rich cuticle underneath the existing cuticle and the subsequent removal of the old cuticle.
