identifier: Pfam:PF19341
label: Beta-1,3-galactosyltransferase 2 N-terminus
definition: >-
  This entry represents the N-terminal domain of beta-1,3- galactosyltransferase 2 (B3GT2) from vertebrates. This enzyme ( ) contains a short cytosolic region and a transmembrane domain, which indicates that this protein has a type II transmembrane topology, typical for all mammalian glycosyltransferases and a stem region with two putative N-glycosylation sites. It catalyses the synthesis of type 1 carbohydrate chains, which contain the beta-N-acetylglucosamine (beta-GlcNAc) linkage. As a glycosyltransferase, B3GT2 plays an essential role in the nervous system. Glycosyltransferase family 31 ( ) comprises enzymes with a number of known activities; N-acetyllactosaminide beta-1,3-N-acetylglucosaminyltransferase ( ); beta-1,3-galactosyltransferase ( ); fucose-specific beta-1,3-N-acetylglucosaminyltransferase ( ); globotriosylceramide beta-1,3-GalNAc transferase ( ).
