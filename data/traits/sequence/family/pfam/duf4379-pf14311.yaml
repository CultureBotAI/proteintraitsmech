identifier: Pfam:PF14311
label: Probable Treble clef zinc finger domain
definition: >-
  This domain is found in bacteria, eukaryotes and viruses, and is approximately 60 amino acids in length. It contains a CXXCXH motif and a CPXC motif. It is predicted to adopt a treble clef fold. Some members have the second probable zinc binding residue replaced by histidine. The specific function of this domain is yet unknown.
