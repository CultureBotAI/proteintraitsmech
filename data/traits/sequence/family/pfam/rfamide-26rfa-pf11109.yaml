identifier: Pfam:PF11109
label: 'Orexigenic neuropeptide Qrfp/P518 '
definition: >-
  QRFP/P518 has a direct role in maintaining bone mineral density. QRFP has also found to be important in energy homeostasis by regulating appetite and energy expenditure in mice. The C-terminal 28 residues are the functional neuropeptide 26RFa.
