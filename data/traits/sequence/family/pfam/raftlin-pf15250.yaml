identifier: Pfam:PF15250
label: Raftlin
definition: >-
  Raftlin plays an important role in the formation and/or maintenance of lipid rafts. In B-cells, Raftlin is localised exclusively in lipid rafts by fatty acylation of N-terminal Gly2 and Cys3, and is co-localised with B-cell antigen receptor (BCR).
