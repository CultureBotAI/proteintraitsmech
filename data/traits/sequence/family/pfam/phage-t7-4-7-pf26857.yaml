identifier: Pfam:PF26857
label: Phage T7 protein 4.7
definition: >-
  This entry represents a group of uncharacterised proteins found in bacteriophages, including protein 4.7 from bacteriophage T7, a 135 amino acid protein with a molecular weight of 15.2 kDa. The protein is also known as gene product 4.7 (Gp4.7) and remains uncharacterised. The function of this protein is unknown.
