identifier: Pfam:PF07180
label: CaiF/GrlA transcriptional regulator
definition: >-
  This is a family of transcriptional regulators that includes CaiF and GrlA. CaiF is a specific carnitine-sensitive transcription regulator. CaiF and CRP, a cyclic AMP receptor protein, are required to activate the cai and fix operons, which are involved in anaerobic carnitine metabolism. GrlA is encoded within the LEE type III secretion system in the enteropathogenic E. coli O157:H. GrlR interacts with GrlA at its Helix-Turn-Helix (HTH) motif, preventing GrlA from binding to its target promoter DNA.
