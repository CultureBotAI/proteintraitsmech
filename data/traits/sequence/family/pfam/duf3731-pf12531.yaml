identifier: Pfam:PF12531
label: 'DNA-K related protein '
definition: >-
  Proteins in this family are bacterial proteins of approximately 250 amino acids in length. There are two conserved sequence motifs: RPG and WRR. The proteins in this family are frequently annotated as DNA-K related proteins however there is little accompanying literature to confirm this.
