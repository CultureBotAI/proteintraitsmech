identifier: Pfam:PF03922
label: OmpW family
definition: >-
  This family includes outer membrane protein W (OmpW) proteins from a variety of bacterial species. This protein may form the receptor for S4 colicins in Escherichia coli. OmpW may confer salt tolerance in different bacteria such as Vibrio parahaemolyticus, Vibrio alginolyticus and Photobacterium damselae. In Vibrio cholerae contributes to its elevated salt tolerance and osmoadaptation as it is up-regulated under high NaCl concentrations which is mediated through the transport of carnitine.
