identifier: Pfam:PF10142
label: PhoPQ-activated pathogenicity-related protein
definition: >-
  Proteins in this entry are believed to play a role in virulence/pathogenicity in Salmonella. Salmonella typhi PqaA has been shown to be activated by PhoP/Q two-component regulatory system, which regulates many virulence genes. It has been also shown to confer resistance to antimicrobial peptides (melittin). Members of this family are predicted to belong to the alpha/beta hydrolase domain superfamily.
