identifier: Pfam:PF01956
label: Integral membrane protein EMC3/TMCO1-like
definition: >-
  This entry represents a group of eukaryotic and archaeal proteins from the Oxa1 superfamily which includes a group of proteins that function in different contexts as transmembrane domains (TMD) insertases and/or as intramembrane chaperones to facilitate membrane protein folding and assembly. Eukaryotic members include EMC3, a subunit of the ER membrane protein complex (EMC) required for protein folding, and TMCO1, a component of the multi-pass translocon (MPT) complex that mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes. Previously, it has been reported that TMCO1 is a ER calcium load-activated calcium channel. TMCO1 is required for the normal development of corpus callosum as it plays a role in Ca2 homeostasis. Archaeal members may function as insertases of the archaeal plasma membrane.
