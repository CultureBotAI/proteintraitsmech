identifier: Pfam:PF05430
label: S-adenosyl-L-methionine-dependent methyltransferase
definition: >-
  This domain represents a S-adenosyl-L-methionine (SAM)-dependent methyltransferase. It is often found in association with in the bifunctional enzyme MnmC, where it is responsible for catalysing the transfer of a methyl group from S-adenosyl-L-methionine to 5-aminomethyl-2-thiouridine to form 5-methylaminomethyl-2-thiouridine.
