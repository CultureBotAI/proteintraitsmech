identifier: Pfam:PF30295
label: Antimicrobial sleep-regulating protein Nemuri
definition: >-
  This entry represents Nemuri (nur), an antimicrobial protein found in Drosophilidae that is essential for the homeostatic regulation of sleep. Nemuri is a secreted protein that promotes sleep following sleep deprivation or bacterial infection. The protein increases survival following bacterial infection, likely by contributing to the innate immune response and by promoting sleep during sickness to aid recovery. The name nemuri means sleep in Japanese.
