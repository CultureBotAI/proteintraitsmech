identifier: Pfam:PF09451
label: Autophagy-related protein 27
definition: >-
  Autophagy is a degradative transport pathway that delivers cytosolic proteins to the lysosome (vacuole) and is induced by starvation. Cytosolic proteins appear inside the vacuole enclosed in autophagic vesicles. Autophagy significantly differs from other transport pathways by using double membrane layered transport intermediates, called autophagosomes. The breakdown of vesicular transport intermediates is a unique feature of autophagy. Autophagy can also function in the elimination of invading bacteria and antigens. There are more than 25 AuTophaGy-related (ATG) genes that are essential for autophagy, although it is still not known how the autophagosome is made. Atg9 is a potential membrane carrier to deliver lipids that are used to form the vesicle. Atg27 is another transmembrane protein, and is a cycling protein. It acts as an effector of VPS34 phosphatidylinositol 3-phosphate kinase signalling and regulates the cytoplasm to vacuole transport (Cvt) vesicle formation. It is also required for autophagy-dependent cycling of ATG9.
