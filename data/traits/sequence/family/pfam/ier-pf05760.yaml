identifier: Pfam:PF05760
label: Immediate early response protein (IER)
definition: >-
  This family consists of eukaryotic immediate early response (IER) proteins 2 and 5. The role of IER5 is unclear, although it plays an important role in mediating the cellular response to mitogenic signals. Again, little is known about the function of IER2, although it is thought to play a role in mediating cellular responses to a variety of extracellular signals.
