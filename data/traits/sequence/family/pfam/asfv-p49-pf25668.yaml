identifier: Pfam:PF25668
label: African swine fever virus minor capsid protein p49
definition: >-
  This entry represents the minor capsid protein p49 of African swine fever virus (ASFV). The p49 protein plays an essential role in the formation of infectious virus particles. It is particularly required for the formation of the capsid vertices, where it localises in close proximity. Together with the penton and other minor capsid proteins, p49 forms a network below the outer capsid shell that stabilises the whole capsid. During virion assembly, it associates with the viral membrane and likely mediates the docking of the penton complex to the inner membrane, where it recruits capsomers to form the penton core. This protein is expressed during the late phase of the viral replicative cycle.
