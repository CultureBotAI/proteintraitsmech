identifier: Pfam:PF22002
label: Mitoregulin
definition: >-
  Mitoregulin (Mtln), also known as LINC00116 in humans, is a lncRNA-encoded microprotein that binds cardiolipin and influences protein complex assembly in mitochondria. Mtln interacts directly with the beta subunit of the mitochondrial trifunctional protein, an enzyme critical in the beta-oxidation of long-chain fatty acids. It also increases mitochondrial membrane potential while decreasing mitochondrial reactive oxygen species. Members of this family are mainly found in vertebrates.
