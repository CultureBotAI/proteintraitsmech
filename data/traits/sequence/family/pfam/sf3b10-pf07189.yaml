identifier: Pfam:PF07189
label: Splicing factor 3B subunit 10 (SF3b10)
definition: >-
  This family consists of several eukaryotic splicing factor 3B subunit 5 (SF3b5) proteins. SF3b5 is a 10kDa subunit of the splicing factor SF3b. SF3b associates with the splicing factor SF3a and a 12S RNA unit to form the U2 small nuclear ribonucleoproteins complex. SF3b5 and SF3b14b are also thought to facilitate the interaction of U2 with the branch site. Also included in this entry is RDS3 complex subunit 10, another protein involved in mRNA splicing.
