identifier: Pfam:PF28100
label: Anti-CRISPR type I subtype E3-like
definition: >-
  This entry represents a group of short sequences mainly found in Pseudomonas tailed bacteriophages and prophages, including Type I-E anti-CRISPR protein from Pseudomonas phage PaMx73 (also known as AcrIE3, ). Members of this family are anti-CRISPR (Acr) proteins. These are small proteins which are the natural inhibitors for CRISPR-Cas systems encoded on bacterial and archaeal viruses to evade host CRISPR-Cas systems. They associate with the Cascade complex to hinder DNA binding, via an unknown mechanism
