identifier: Pfam:PF00291
label: Pyridoxal-phosphate dependent enzyme
definition: >-
  This entry represents a domain found in a group of proteins of the PLP-dependent enzymes superfamily represented by the beta subunit of tryptophan synthase (TrpB). This group of diverse proteins also include threonine dehydratase, cysteine synthase, threonine synthase and pyridoxal phosphate-dependent deaminase.
