identifier: Pfam:PF00520
label: Ion transport protein
definition: >-
  This domain is found in sodium, potassium, and calcium ion channels proteins. The proteins have 6 transmembrane helices in which the last two helices flank a loop which determines ion selectivity. In some Na channel proteins the domain is repeated four times, whereas in others (e.g. K channels) the protein forms a tetramer in the membrane. A bacterial structure of the protein is known for the last two helices but is not included in the Pfam family due to it lacking the first four helices. This domain is also found in Inositol 1,4,5-trisphosphate-gated calcium channel ITPR1/2/3 that upon inositol 1,4,5-trisphosphate binding, mediates calcium release from the endoplasmic reticulum (ER).
