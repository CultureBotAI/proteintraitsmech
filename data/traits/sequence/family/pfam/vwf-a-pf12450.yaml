identifier: Pfam:PF12450
label: 'von Willebrand factor '
definition: >-
  This domain is found in bacteria, and is approximately 100 amino acids in length. It is found in association with a von Willebrand factor type A domain ( ). It contains two conserved sequence motifs: STF and DVD and two completely conserved residues (E and N) that may be functionally important. It is found in uncharacterised protein YfbK.
