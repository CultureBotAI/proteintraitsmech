identifier: Pfam:PF02609
label: Exonuclease VII small subunit
definition: >-
  Exonuclease VII is composed of two non-identical subunits; one large subunit and 4 small ones. This enzyme catalyses exonucleolytic cleavage in either 5'-3' or 3'-5' direction to yield nucleoside 5'-phosphates.
