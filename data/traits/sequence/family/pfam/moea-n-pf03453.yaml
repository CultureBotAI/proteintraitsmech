identifier: Pfam:PF03453
label: MoeA N-terminal region (domain I and II)
definition: >-
  This entry represents the N-terminal and linker domains of the MoeA protein. One of these two structural domains contains the conserved DGXA motif. These two domains are found in proteins involved in biosynthesis of molybdopterin cofactor. MoeA facilitates molybdenum incorporation at low levels of molybdate. However, the exact molecular function of this region is uncertain. The majority of molybdenum-containing enzymes utilise a molybdenum cofactor (MoCF or Moco) consisting of a Mo atom coordinated via a cis-dithiolene moiety to molybdopterin (MPT). MoCF is ubiquitous in nature, and the pathway for MoCF biosynthesis is conserved in all three domains of life. MoCF-containing enzymes function as oxidoreductases in carbon, nitrogen, and sulphur metabolism.
