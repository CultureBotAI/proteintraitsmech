identifier: Pfam:PF16101
label: Proline-rich membrane anchor 1
definition: >-
  Proline-rich membrane anchor 1 (PRiMA) is required to organise acetylcholinesterase (ACHE) into tetramers and to anchor them to the basal lamina of the neuromuscular junction and to the membrane of neuronal synapses in brain. ACHE hydrolyses acetylcholine, thereby regulating cholinergic stimulation. The MAP kinase signalling pathway is one of the transcriptional regulators controlling PRiMA gene expression during neuronal differentiation.
