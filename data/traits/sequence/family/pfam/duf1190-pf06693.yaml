identifier: Pfam:PF06693
label: Protein of unknown function (DUF1190)
definition: >-
  The proteins in this entry, which include YgiB, are functionally uncharacterised, however, transcription of ygiB is induced upon biofilm formation compared to planktonic growth in both exponential and stationary phase. Induction of expression was found to be dependent on the presence of the F plasmid. Biofilm formation is impaired in mutants of ygiB.
