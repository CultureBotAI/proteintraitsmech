identifier: Pfam:PF28029
label: Small membrane protein PA2485-like
definition: >-
  Members of this family are small, uncharacterised, N-terminally hydrophobic proteins, 37 to 39 amino acids in length, regularly found encoded next the small regulatory protein PtrC ( ) in species of Pseudomonas. The family is named for Pseudomonas aeruginosa PAO1 protein PA2485 ( ), which originally was predicted to be longer.
