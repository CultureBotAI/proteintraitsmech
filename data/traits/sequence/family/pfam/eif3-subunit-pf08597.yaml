identifier: Pfam:PF08597
label: Translation initiation factor eIF3 subunit
definition: >-
  This shows protein subunits of the eukaryotic translation initiation factor 3 J (eIF3j). It is a component of the eukaryotic translation initiation factor 3 (eIF-3) complex, which is involved in protein synthesis and, together with other initiation factors, stimulates binding of mRNA and methionyl-tRNAi to the 40S ribosome. In Saccharomyces cerevisiae, eIF3j has been shown to be required for processing of 20S pre-rRNA and binds to 18S rRNA and eIF3 subunits Rpg1p and Prt1p.
