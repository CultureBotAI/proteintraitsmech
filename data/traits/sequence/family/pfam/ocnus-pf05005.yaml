identifier: Pfam:PF05005
label: Janus/Ocnus family (Ocnus)
definition: >-
  This family is comprised of the 14kDa phosphohistidine phosphatase from mammals and Janus-A/Janus-B proteins from Drosophila melanogaster. Janus-A and Janus-B regulate somatic sex differentiation and have been found to be testes specific. 14kDa phosphohistidine phosphatase is a histidine phosphatase that may play a role of reversible histidine phosphorylation in neuronal functions.
