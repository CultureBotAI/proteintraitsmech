identifier: Pfam:PF14463
label: E1 N-terminal domain
definition: >-
  This entry represents an uncharacterised α/β domain fused to E1 proteins. This protein is usually present in gene neighbourhoods with genes encoding a JAB protein and a predicted metal-binding protein. In related E1 proteins, the E1-N domain is replaced by an E2/UBC superfamily domain.
