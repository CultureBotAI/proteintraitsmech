identifier: Pfam:PF08227
label: DASH complex subunit Hsk3 like
definition: >-
  Hsk3 is a subunit of the DASH complex, a microtubule-binding complex that is transferred to the kinetochore prior to mitosis. In Saccharomyces cerevisiae DASH forms both rings and spiral structures on microtubules in vitro.
