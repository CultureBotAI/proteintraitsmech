identifier: Pfam:PF27905
label: Lantipeptide, SCO0268 family
definition: >-
  Members of this family are putative lantipeptide (most likely lantibiotic) precursors, about 53 amino acids long, found in a lantibiotic-type biosynthetic cluster in several species of Streptomyces (S. coelicolor, S. griseoflavus, S. ambofaciens, etc.). This family is described in AntiSMASH as Streptomyces PEQAXS motif lantipeptide precursor.
