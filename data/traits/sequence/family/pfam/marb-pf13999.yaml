identifier: Pfam:PF13999
label: MarB protein
definition: >-
  The MarB protein is found in the multiple antibiotic resistance (mar) locus in Escherichia coli. The MarB protein is functionally uncharacterised. Proteins in this family are approximately 70 amino acids in length and contain a conserved GSDKSD sequence motif.
