identifier: Pfam:PF23140
label: Podophage GP4 fiber I protein gp80
definition: >-
  This entry represents the Podophage GP4 fiber I protein gp80 and related phage and prophage proteins. The structure of gp80 has an unusual barrel-like topology with one strand contributed by the rope protein ( ). The N terminus of gp80 folds into an α-helix which is involved in the dimerisation. Bacteriophage tail fibres play a critical role in the early stage of infection by binding to the bacterial surface. In Podophage GP4, five fibre I, each composed of five dimers of gp80 and linked by rope protein, are attached to the five edges of the tail vertex of the icosahedral head of the phage. The fibre-tail adaptor acts as a fulcrum, encircling the dodecameric adaptor I and providing the anchoring sites for the 5-fold symmetric fibres I and II.
