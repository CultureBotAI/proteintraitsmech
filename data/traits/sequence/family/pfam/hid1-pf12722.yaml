identifier: Pfam:PF12722
label: High-temperature-induced dauer-formation protein
definition: >-
  Hid-1 (high-temperature-induced dauer-formation protein 1) was originally identified as a Caenorhabditis elegans gene encoding a protein that regulates larval development. HID-1 is conserved from fungi to humans. It contains up to seven potential transmembrane domains separated by regions of low complexity. It may control the correct sorting of DCV (dense core vesicle, also known as the secretory granule) cargoes in the Golgi apparatus and play a role in Golgi stack morphology.
