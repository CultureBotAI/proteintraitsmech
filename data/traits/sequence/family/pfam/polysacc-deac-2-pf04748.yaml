identifier: Pfam:PF04748
label: Divergent polysaccharide deacetylase
definition: >-
  This family contains an uncharacterised protein from Bacillus halodurans, an uncharacterised protein from Agrobacterium tumefaciens C58, and other bacterial hypothetical proteins. Although their functions are still unknown, structural superposition and sequence comparison suggest that BH1492 and ATU2773 might be divergently related to the 7-stranded barrel catalytic domain of polysaccharide deacetylases (DACs) from the carbohydrate esterase 4 (CE4) superfamily, which remove N-linked acetyl groups from cell wall polysaccharides.
