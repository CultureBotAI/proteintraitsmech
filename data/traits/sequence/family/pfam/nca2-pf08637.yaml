identifier: Pfam:PF08637
label: ATP synthase regulation protein NCA2
definition: >-
  NCA2 (Nuclear Control of ATPase), is one of the two nuclear genes involved in the control of mitochondrial expression of subunits 6 and 8 of the Fo-F1 ATP synthase in Saccharomyces cerevisiae. Mutations in either NCA2 or NCA3 ( ) dramatically lower the level of the co-transcript encoding subunits 6 and 8. This entry also includes DGS1 from Arabidopsis. DGS1 is a mitochondrial outer membrane protein involved in galactoglycerolipid biosynthesis.
