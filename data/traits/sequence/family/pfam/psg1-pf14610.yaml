identifier: Pfam:PF14610
label: Ykl077w/Psg1 (Pma1 Stabilization in Golgi)
definition: >-
  This is a family of predicted membrane glycoproteins from fungi. Proteins in this family include the yeast plasma membrane H+-ATPase Pma1. It is the major regulator of cytoplasmic pH and plasma membrane potential and the most abundant protein in the plasma membrane. Exp1 (ER eXport of Pma1) and Psg1 (Pma1 Stabilization in the Golgi) are involved in Pma1 maturation process.
