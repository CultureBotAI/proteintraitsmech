definition: >-
  This entry represents ECU03_1200 an uncharacterised protein found in Microsporidia, obligate intracellular parasites. Family members are found in Nosematidae, Pleistophoridae and Dubosqiidae including genera such as Encephalitozoon, Vairimorpha, Nosema and Hamiltosporidium. The function of this protein remains to be determined
