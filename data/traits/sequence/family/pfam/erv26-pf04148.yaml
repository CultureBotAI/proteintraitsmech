identifier: Pfam:PF04148
label: Transmembrane adaptor Erv26
definition: >-
  This entry includes Svp26 from yeasts and Tex261 from animals. Budding yeast Svp26 is a integral membrane protein found in the ER and early Golgi compartment. It functions as an ER exit adaptor protein of mannosyltransferases Mnt2 and Mnt3. The function of Tex261 is not clear.
