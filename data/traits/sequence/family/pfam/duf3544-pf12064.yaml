identifier: Pfam:PF12064
label: Protein kinase C-binding protein 1
definition: >-
  This family represents protein kinase C-binding protein 1 (PRKCBP1, also known as ZMYND8) from vertebrates, a chromatin reader that recognises dual histone modifications such as histone H3.1 dimethylated at 'Lys-36' and histone H4 acetylated at 'Lys-16' (H3.1K36me2-H4K16ac) and histone H3 methylated at 'Lys-4' and histone H4 acetylated at 'Lys-14' (H3K4me1-H3K14ac). It acts as a transcriptional corepressor for KDM5D and EZH2. ZMYND8 recognizes acetylated histone H4 and recruits the NuRD chromatin remodeling complex to damaged chromatin for transcriptional repression and double-strand break repair by homologous recombination. ZMYND8 also plays a role in neuronal development. This protein suppresses breast cancer, and prostate cancer cell invasion and metastasis. It has been proposed as a suitable epigenetic tool that can re-sensitize the chemo-refractory breast carcinoma.
