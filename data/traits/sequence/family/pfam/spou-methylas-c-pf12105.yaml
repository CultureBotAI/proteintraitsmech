identifier: Pfam:PF12105
label: SpoU, rRNA methylase, C-terminal
definition: >-
  This domain is found in bacteria and is about 60 amino acids in length. It is found in association with . This domain has a conserved LFE sequence motif. Some members of the Pfam family SpoU_methylase, , carry this very distinctive sequence at their extreme C terminus. The exact function of this domain is not known.
