identifier: Pfam:PF12945
label: Flagellar protein YcgR
definition: >-
  This entry represents the N-terminal domain of YcgR proteins, located N-terminal to PilZ domains, thus named PilZN domain (also known as YcgR domain). The function of this domain is not known, but it is known to interact with the C-terminal which has cyclic-di-GMP bound. YcgR is involved in the flagellar motor function and is a member of the flagellar regulon. This domain exhibits a similar structure as PilZ domains comprising a β-barrel fold but lack the C-terminal α-helix.
