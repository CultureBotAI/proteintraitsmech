identifier: Pfam:PF12632
label: Mysoin-binding motif of peroxisomes
definition: >-
  This entry represents a myosin-binding domain found in vezatin and inheritance of peroxisomes protein 2 (Inp2). Vezatin is a peroxisome transmembrane receptor that is involved in membrane-membrane and cell-cell adhesions. In the movement of peroxisomes, it binds to class V and class VIIa myosins to guide the organelle through the microtubules and allow pathogens to internalise themselves into host cells. In mouse cells, vezatin is crucial for spermatozoan production. It interacts with the cadherin-catenin complex bridging it to the C-terminal FERM domain of myosin VIIA. Inp2 has been identified as the peroxisome-specific receptor for class V myosin, Myo2p.
