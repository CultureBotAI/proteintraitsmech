identifier: Pfam:PF12353
label: 'Eukaryotic translation initiation factor 3 subunit G '
definition: >-
  eIF-3G (also termed eIF-3 subunit 4, eIF-3-delta, eIF3-p42, or eIF3-p44) is the RNA-binding subunit of eIF3. Subunit eIF-3G binds 18 S rRNA and beta-globin mRNA, and therefore appears to be a nonspecific RNA-binding protein. It is one of the cytosolic targets and interacts with mature apoptosis-inducing factor (AIF). The yeast orthologue is known as eIF3-p33; it plays an important role in the initiation phase of protein synthesis in yeast. It binds both mRNA and rRNA fragments due to an RNA recognition motif near its C terminus. This entry represents a domain of approximately 130 amino acids in length found at the N terminus of eukaryotic translation initiation factor 3 subunit G. This domain is commonly found in association with the RNA recognition domain . At least eleven different protein factors are involved in initiation of protein synthesis in eukaryotes. Binding of initiator tRNA and mRNA to the 40S subunit requires the presence of the translation initiation factors eIF-2 and eIF-3, with eIF-3 being particularly important for 80S ribosome dissociation and mRNA binding. eIF-3 is the most complex translation inititation factor, consisting of about 13 putative subunits and having a molecular weight of between 550 - 700kDa in mammalian cells. Subunits are designated eIF-3a - eIF-3m; the large number of subunits means that the interactions between the individual subunits that make up the eIF-3 complex are complex and varied.
