identifier: Pfam:PF21172
label: Periplasmic copper-binding protein CueP
definition: >-
  This entry represents CueP and its homologues, a copper-binding periplasmic metallochaperone identified in Salmonella enterica serovar Typhimurium ( ). CueP has been implicated in the transfer of copper ions to SodCII in the periplasm. Its crystal structure has been determined, revealing a V-shaped dimeric structure. Each monomer is composed of two domains, N-terminal α/β domain and a C-terminal Ig-like domain. Many members of this family, although not CueP itself, are lipoproteins.
