identifier: Pfam:PF01313
label: Bacterial export proteins, family 3
definition: >-
  The fliL operon of Escherichia coli contains seven genes (including fliO, fliP, fliQ and fliR) involved in the biosynthesis and functioning of the flagellar organelle. The fliO, fliP, fliQ and fliR genes encode highly hydrophobic polypeptides. The fliQ gene product, a small integral membrane protein that contains two putative transmembrane (TM) regions, is required for the assembly of the rivet at the earliest stage of flagellar biosynthesis. Proteins sharing an evolutionary relationship with FliQ have been found in a range of bacteria: these include Yop translocation protein S from Yersinia pestis; surface antigen-presentation protein SpaQ from Salmonella typhimurium and Shigella flexneri; and probable translocation protein Y4YM from Rhizobium sp. (strain NGR234). All of these members export proteins, that do not possess signal peptides, through the membrane. Although the proteins that these exporters move may be different, the exporters are thought to function in similar ways.
