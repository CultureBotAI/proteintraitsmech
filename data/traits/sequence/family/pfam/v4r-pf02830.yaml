identifier: Pfam:PF02830
label: V4R domain
definition: >-
  Central cellular functions such as metabolism, solute transport and signal transduction are regulated, in part, via binding of small molecules by specialised domains. The 4-vinyl reductase (4VR) domain is a predicted small molecular binding domain, that may bind to hydrocarbons. Proteins that contain this domain include a regulator of the phenol catabolic pathway and a protein involved in chlorophyll biosynthesis.
