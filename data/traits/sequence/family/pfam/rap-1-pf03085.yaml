identifier: Pfam:PF03085
label: Rhoptry-associated protein 1 (RAP-1)
definition: >-
  Members of this family are found in the parasite Babesia bigemina. Other rhoptry-associated proteins are found in Plasmodium falciparum but these do not belong to this family. Animal infection with B. bigemina may produce a pattern similar to human malaria. Rhoptry organelles form part of the apical complex in apicomplexan parasites.
