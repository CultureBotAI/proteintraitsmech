identifier: Pfam:PF03349
label: Outer membrane protein transport protein (OMPP1/FadL/TodX)
definition: >-
  This family includes TodX from Pseudomonas putida (strain F1/ATCC 700007) and TbuX from Burkholderia pickettii (Ralstonia pickettii) (Pseudomonas pickettii) PKO1. These are membrane proteins of uncertain function that are involved in toluene catabolism. Related proteins involved in the degradation of similar aromatic hydrocarbons are also in this family, such as CymD . This family also includes FadL involved in translocation of long-chain fatty acids across the outer membrane. It is also a receptor for the bacteriophage T2.
