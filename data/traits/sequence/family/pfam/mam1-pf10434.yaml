identifier: Pfam:PF10434
label: Monopolin complex protein MAM1
definition: >-
  Monopolin is a protein complex, originally identified in Saccharomyces cerevisiae (Baker's yeast), that is required for the segregation of homologous centromeres to opposite poles of a dividing cell during meiosis I. MAM1 is required in S. cerevisiae for monopolar attachment.
