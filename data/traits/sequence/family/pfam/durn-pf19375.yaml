identifier: Pfam:PF19375
label: DurN substrate-assisted peptide maturase
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC) involved in duramycin biosynthesis, a ribosomally synthesized and post-translationally modified peptide (RiPP) produced by various actinomycetes and marine symbionts. Duramycin binds phosphatidylethanolamine (PE), a major structural phospholipid in mammalian and microbial cell membranes which contains 19 amino acids and 5 post-translational modifications (PTMs). This entry represents DurN, an enzyme that forms (2S,9S)-Lal one of the two last PTMs. DurN catalyses stereospecific and diastereoselective Lal formation in an unusual substrate-assisted mechanism in which the active site residues that make the reaction proceed come from the substrate itself, maneuvered into position by DurN.
