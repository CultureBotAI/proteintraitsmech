identifier: Pfam:PF09817
label: RZZ complex, subunit zwilch
definition: >-
  The protein Zwilch is an essential component of the mitotic checkpoint, which prevents cells from prematurely exiting mitosis. It is required for the assembly of the dynein-dynactin, Mad2 complexes and spindly/CG15415 onto kinetochores.
