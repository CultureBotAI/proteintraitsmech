identifier: Pfam:PF13208
label: TerB N-terminal domain
definition: >-
  This entry represents the N-terminal domain of TerB, and TerB-C containing proteins. It has a predominantly α-helical structure and contains an absolutely conserved glutamate. The presence of a conserved acidic residue suggests that it might chelate metal like TerB. These proteins occur in an two-gene operon containing an AAA+ ATPase and SF-II DNA helicase suggesting a role in stress stress response or phage defense.
