identifier: Pfam:PF11386
label: Vitelline envelope receptor for lysin
definition: >-
  VERL (Vitelline envelope sperm lysin receptor) is a giant unbranched glycoprotein comprising 30% of the vitelline envelope. It functions as a species-specific receptor for the sperm protein lysin; prevents fertilisation by sperm from other species.
