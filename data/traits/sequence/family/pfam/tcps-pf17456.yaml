identifier: Pfam:PF17456
label: Toxin-coregulated pilus protein S
definition: >-
  Toxin coregulated pilus biosynthesis protein S (TcpS) is part of an operon associated with biosynthesis of the toxin coregulated pilus (TCP) of Vibrio cholerae. TCP is essential for successful colonisation of the bacteria in the small intestine. The genes tcpR, tcpD, tcpS, tcpT, tcpE and tcpF are organised to permit translational coupling and are followed by an inverted repeat structure which is likely to act as a strong Rho-independent terminator. TcpS possesses an N-terminal signal sequence, suggesting that it is localised to the periplasm.
