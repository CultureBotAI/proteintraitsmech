identifier: Pfam:PF29184
label: TP0422 family protein
definition: >-
  This entry represents TP0422 and related uncharacterised proteins found in Treponema species (Spirochaetota). Some proteins represented by this entry are annotated as lipoproteins. TP0422 is predicted to contain two β barrel domains.
