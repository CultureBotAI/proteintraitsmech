identifier: Pfam:PF12519
label: Mitochondrial distribution and morphology protein 10
definition: >-
  Mitochondrial distribution and morphology protein 10 (Mdm10) is a component of the ERMES/MDM complex (composed of MMM1, MDM10, MDM12 and MDM34), which serves as a molecular tether to connect the endoplasmic reticulum and mitochondria. MDM10 is involved in the late assembly steps of the general translocase of the mitochondrial outer membrane (TOM complex). It functions in the TOM40-specific route of the assembly of outer membrane β-barrel proteins, including the association of TOM40 with the receptor TOM22 and small TOM proteins.
