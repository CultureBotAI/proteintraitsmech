identifier: Pfam:PF06244
label: Coiled-coil domain-containing protein 124 /Oxs1
definition: >-
  This entry represents the C-terminal domain found in Coiled-coil domain-containing protein 124 (Ccdc124) from animals and Oxs1 from fission yeasts. Oxs1 (oxidative stress transcription corepressor Oxs1) and Pap1 form a complex to regulate transcription when cells are exposed to diamide or Cd which causes disulfide stress. In fission yeast, such as S. pombe, heterologous Oxs1-like proteins can enhance diamide stress tolerance. Furthermore, human and arabidopsis Oxs1 can interchangeably bind Pap1 or Pap1 homologues from human (cJun) and arabidopsis (bZIP10), suggesting that Oxs1 may be a component of an evolutionarily conserved stress response pathway. Ccdc124 was identified as a novel component of the centrosome during interphase and G2/M transition and is involved in cytokinesis.
