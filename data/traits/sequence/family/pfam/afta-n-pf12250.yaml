identifier: Pfam:PF12250
label: Arabinofuranosyltransferase N terminal
definition: >-
  The arabinofuranosyltransferase enzyme AftA is involved in cell wall arabinan biosynthesis in bacteria. It catalyses the addition of the first key arabinofuranosyl residue from the sugar donor beta-D-arabinofuranosyl-1-monophosphoryldecaprenol to the galactan domain of the cell wall, thus priming the galactan for further elaboration by the arabinofuranosyltransferases. As this enzyme is important for cell growth and is found in some important pathogens, such as Mycobacterium tuberculosis, it represents a potential target for the devlopment of new antibacterial drugs. This entry represents the N-terminal domain of AftA, which is predicted to contain 11 transmembrane helices.
