identifier: Pfam:PF05289
label: Borrelia hemolysin accessory protein
definition: >-
  This entry represents the borrelial prophage-encoded protein BlyB. Originally BlyB and its partner, the membrane-bound protein BlyA, were thought to comprise a haemolysis system. It is now thought, however, that BlyA and BlyB function instead as a holin or holin-like system.
