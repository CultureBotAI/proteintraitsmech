identifier: Pfam:PF05703
label: Auxin canalisation
definition: >-
  This domain can be found at the N-terminal end of several plant proteins, including VAN3-binding protein from Arabidopsis thaliana (also known as FORKED1), a component of the auto-regulatory loop which enables auxin canalisation by recruitment of the PIN1 auxin efflux protein to the cell membrane. This domain is frequently found on proteins containing at the C terminus.
