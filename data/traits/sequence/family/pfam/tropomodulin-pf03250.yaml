identifier: Pfam:PF03250
label: Tropomodulin
definition: >-
  Actin filaments have an intrinsic polarity, each with a fast-growing (barbed) end and a slow-growing (pointed) end. The slow-growing end is regulated by tropomodulins, a family of capping proteins that require tropomyosins for optimal function. Tropomyosins contains two domains: an N-terminal unstructured tropomyosin-binding region which has an actin pointed-end-capping activity, an C-terminal region that contains one compact domain represented by alternating α-helices and β-structures. The tropomyosin-independent actin-capping site is located at the C terminus. The structure of tropomyosin-1 has been solved. Proteins in this entry include Tropomodulin (TMOD)-1/2/3/4 and Leiomodin (LMOD)-1/2/3.
