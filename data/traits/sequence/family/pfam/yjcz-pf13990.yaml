identifier: Pfam:PF13990
label: YjcZ-like protein
definition: >-
  This entry represents regulator of diguanylate cyclase RdcB and related proteins. RdcB is a regulatory protein that, together with its partner protein RdcA, activates diguanylate cyclase E (DgcE) to control CsgD and biofilm matrix production. RdcB acts as an accessory component, forming a complex with RdcA and contributing to the activation of DgcE; however, it does not directly interact with DgcE.
