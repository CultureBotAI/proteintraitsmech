identifier: Pfam:PF09074
label: Mer2
definition: >-
  Rec107 forms part of a complex (Rec107-Mei4-Rec114) that is required for meiotic double strand DNA break formation. Rec107 increases in abundance and is phosphorylated during the prophase phase of cell division. Rec107 is not required for mitosis and mitotic DNA repair mechanisms.
