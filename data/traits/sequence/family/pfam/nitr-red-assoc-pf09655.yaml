identifier: Pfam:PF09655
label: Conserved nitrate reductase-associated protein (Nitr_red_assoc)
definition: >-
  Most members of this protein family are found in the Cyanobacteria, and these mostly near nitrate reductase genes and molybdopterin biosynthesis genes. Molybdopterin guanine dinucleotide is a cofactor for nitrate reductase. Partially characterised members have been designated NarM and shown to be required for nitrate reductase activity.
