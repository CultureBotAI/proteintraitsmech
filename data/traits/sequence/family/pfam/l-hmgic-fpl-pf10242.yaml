identifier: Pfam:PF10242
label: Lipoma HMGIC fusion partner-like protein
definition: >-
  This is a group of proteins expressed from a series of genes referred to as Lipoma HMGIC fusion partner-like. The proteins carry four highly conserved transmembrane domains. In certain instances, as in LHFPL5, mutations cause deafness in humans or hypospadias. LHFPL1 is transcribed in six liver tumour cell lines.
