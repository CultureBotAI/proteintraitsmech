identifier: Pfam:PF01525
label: Rotavirus NS26
definition: >-
  Rotaviruses are dsRNA viruses that appear to infect a wide range of mammals. Gene 11 product is a non-structural phosphoprotein designated as NS26, now more commonly annotated as non-structural protein 5 (NSP5). Non-structural protein 5 (NSP5) plays a central role in rotavirus replication by driving the formation of viroplasms, large cytoplasmic inclusions where viral RNA replication and assembly of replication intermediates take place. Working together with NSP2, NSP5 orchestrates the recruitment of viroplasmic components, including capsid proteins to these factories. Beyond its role in replication, NSP5 also participates in the remodelling of host cell RNA granules, selectively excluding host proteins from stress granules and P bodies and sequestering these structures within viral factories, effectively hijacking host cell machinery to support viral replication.
