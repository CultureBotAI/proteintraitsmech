identifier: Pfam:PF20763
label: Phage phi29, UDG inhibitor P56
definition: >-
  This entry represents a small family of proteins from tailed bacteriophages, including Protein p56 from Bacillus subtilis phage phi29. P56 inhibits the host uracil-DNA glycosylase (UDG) activity, preventing its binding to DNA and therefore viral replication from being compromised. p56 adopts a dimeric fold, with three anti-parallel β-sheets and a helical region linked by three short loops in each polypeptide chain ( ). The highly anionic region of the protein plays a key role in the inhibition, which occurs by mimicking the DNA substrate ( ).
