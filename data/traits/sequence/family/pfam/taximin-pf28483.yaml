identifier: Pfam:PF28483
label: TAXIMIN
definition: >-
  This family of proteins includes signaling peptides TAXIMIN 1/2 that play a crucial role in the regulation of lateral organ separation in plants, including fruits and leaves. Members of this family are involved in the response to environmental cues, such as light stress, by controlling the accumulation of protective compounds. They are also subject to modulation by external factors, including certain antibiotics which can influence their activity during stress responses.
