identifier: Pfam:PF14169
label: Cold-inducible protein YdjO
definition: >-
  This family includes the B. subtilis YdjO protein ( ), which is functionally uncharacterised. Note - this is not a homologue of E. coli YdjO ( ). B. subtilis YdjO is cold-inducible. Its expression is induced by the extracytoplasmic function sigma factor sigma-W.
