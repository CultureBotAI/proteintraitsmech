identifier: Pfam:PF14408
label: Ribosomally synthesised peptide in actinomycetes
definition: >-
  Ribosomally synthesized peptide that is usually in the gene neighbourhood of a RimK-like ATP-grasp and an aspartyl-O-methylase. Gene contexts suggest that it is further modified by the ATP-grasp and the methylase. It might function in defense or development, or as a peptide antibiotic.
