identifier: Pfam:PF03010
label: GP4
definition: >-
  This entry represents the minor envelope protein GP4 of Equine arteritis virus (EAV). GP4 forms part of the glycoprotein heterotrimer GP2b-GP3-GP4, which is responsible for attachment to the target host cell. This attachment induces virion internalisation predominantly through clathrin-dependent endocytosis.
