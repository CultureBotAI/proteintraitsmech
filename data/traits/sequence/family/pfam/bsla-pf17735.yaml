identifier: Pfam:PF17735
label: Biofilm surface layer A
definition: >-
  BslA (YuaB) is a protein from Bacillus subtilis acting as a hydrophobin, which forms surface layers around biofilms and participates in biofilm assembly. BslA contains an unusually hydrophobic "cap structure", which is essential for its activity and for the ability of bacteria to form hydrophobic, non-wetting biofilms. This family also includes BslA paralogue YweA (also known as bslB). YweA appears to have only a minor role in biofilm formation.
