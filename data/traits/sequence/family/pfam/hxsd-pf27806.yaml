identifier: Pfam:PF27806
label: His-Xaa-Ser system protein HxsD
definition: >-
  This rare conserved hypothetical protein of small size occurs exclusively, and perhaps universally, in the context of a pair of (uncharacterised) radical SAM proteins, HxsC ( ) and HxsB ( ). Many members of this family have invariant motifs LYW and LLNDYxLRE, but PSI-BLAST starting from family members well below 20% pairwise sequence identity to this group eventually brings in the entire family as modeled here. The CHP03979 family ( ) represents the fourth regularly conserved member of this system.
