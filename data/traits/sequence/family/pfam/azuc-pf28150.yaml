identifier: Pfam:PF28150
label: Stress response protein AzuC
definition: >-
  This entry represents AzuC protein ( ) from Escherichia coli and related proteins mainly from Enterobacteria. AzuC is a basic, extremely small protein (28 amino acids in Escherichia coli K-12) whose expression is repressed by cyclic AMP response protein (CRP) and stimulated by acidic pH. ArcA was shown to activate the operons encoding yccB and ybgT.
