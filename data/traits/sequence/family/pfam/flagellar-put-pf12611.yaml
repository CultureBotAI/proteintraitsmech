identifier: Pfam:PF12611
label: 'Putative flagellar '
definition: >-
  Proteins in this entry are encoded in a subset of bacterial flagellar operons, generally between genes designated flgD and flgE, in species as diverse as Bacillus halodurans and various other Firmicutes, Geobacter sulfurreducens, and Bdellovibrio bacteriovorus. The specific molecular function of this protein is unknown.
