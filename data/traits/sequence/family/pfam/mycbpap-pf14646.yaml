identifier: Pfam:PF14646
label: MYCBP-associated protein family
definition: >-
  This family includes the human MYCBP-associated protein (MYCBPAP) and its homologues from other eukaryotes. Mammalian MYCBPAP proteins may be involved in synaptic processes and may have a role in spermatogenesis.
