identifier: Pfam:PF17335
label: Ino80 complex subunit 5
definition: >-
  This entry represents the INO80 subunit 5 or Ies5, which has been shown to associate with the INO80 chromatin-remodelling complex under low-salt conditions, though its function is unknown. The INO80 complex is involved in chromatin-remodelling by promoting the repositioning (sliding) or eviction of nucleosomes from the DNA in an ATP-dependent process. The INO80 chromatin-remodelling complex of Saccharomyces cerevisiae (Baker's yeast) is composed of at least 15 subunits and has a molecular mass of about 1.2 to 1.5 MDa. In S. cerevisiae the core conserved subunits are: ATPase; Ino80. RuvB-like; Rvb1 and Rvb2. Actin; Act1. Actin-related: Arp4, Arp5 and Arp8. YEATS protein; Taf14. The non-conserved subunits are: Ies1, Ies2, Ies3, Ies4, Ies5, Ies6 and Nhp10.
