identifier: Pfam:PF24397
label: VNG_1110C-like
definition: >-
  This entry represents a family of archaeal uncharacterised proteins, including VNG_1110C protein from Halobacterium salinarum. These proteins are predicted to adopt a globular structure consisting of three-stranded antiparallel β-sheet and two α-helices packed on one side of the sheet. They contain two semi-conserved RDSTQ and RIIGSP sequence motifs.
