identifier: Pfam:PF03063
label: Prismane/CO dehydrogenase family
definition: >-
  This entry represent the hydroxylamine reductases (Hcp, also known as Prismane) and the Ni-containing CO dehydrogenases (CODH) ( ). Hydroxylamine reductases have been identified in bacteria, archaea and eukaryotic protozoa. They contain two Fe/S centres - a [4Fe-4S] cubane cluster, and a hybrid [4Fe-2S-2O] cluster. The physiological role of this protein is as yet unknown, although a role in nitrate/nitrite respiration has been suggested. The Hcp protein from Escherichia coli was shown to contain hydroxylamine reductase activity (NH2OH + 2e + 2 H+ ->NH3 + H2O). This activity is rather low.
