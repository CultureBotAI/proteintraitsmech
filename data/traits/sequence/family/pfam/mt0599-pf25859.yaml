identifier: Pfam:PF25859
label: Mycobacterial dormancy-induced protein MT0599
definition: >-
  This entry represents Uncharacterized protein MT0599 which was first identified in Mycobacterium tuberculosis. MT0599 is a member of the dormancy regulon and is induced in response to reduced oxygen tension (hypoxia) and low levels of nitric oxide (NO), suggesting a possible role in mycobacterial dormancy or persistence. This entry also includes Uncharacterized protein Rv0572c from Mycobacterium tuberculosis.
