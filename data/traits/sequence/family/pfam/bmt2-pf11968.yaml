identifier: Pfam:PF11968
label: '25S rRNA (adenine(2142)-N(1))-methyltransferase, Bmt2 '
definition: >-
  This entry includes Bmt2 from yeasts and SAMTOR from animals. They contain a class I Rossmann fold methyltransferase domain. In Saccharomyces cerevisiae, Bmt2 is a nucleolar S-adenosylmethionine-dependent rRNA methyltransferase that is responsible for the N-1-methyl-adenosine base modification of 25S rRNA. It specifically methylates the N1 position of adenine 2142 in 25S rRNA.
