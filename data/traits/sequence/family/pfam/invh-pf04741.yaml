identifier: Pfam:PF04741
label: InvH outer membrane lipoprotein
definition: >-
  This family of proteins includes SPI-1 type 3 secretion system pilotin (also known as outer membrane lipoprotein InvH) from Salmonella, which is required for the localisation to outer membrane of InvG, which is involved in a type III secretion apparatus mediating host cell invasion.
