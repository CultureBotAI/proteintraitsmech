identifier: Pfam:PF26912
label: Staphylococcus phage L54a excisionase
definition: >-
  This entry represents the excisionase family found in L54a-like bacteriophages. Excisionase is necessary, together with integrase, for the excision of prophage from the host genome by site-specific recombination at the att site. The protein is 59 amino acids (7.2 kDa) and functions as a DNA-binding protein involved in viral genome excision.
