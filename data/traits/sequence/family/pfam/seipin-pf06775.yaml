identifier: Pfam:PF06775
label: Putative adipose-regulatory protein (Seipin)
definition: >-
  This entry represents Seipin found in mammals. This entry also includes Seipin homologues from fission yeasts and plants. There are three SEIPIN homologues in Arabidopsis thaliana, designated SEIPIN1, SEIPIN2, and SEIPIN3. Similar to their animal homologues, plant and yeast Seipins also play roles in lipid droplet (LD) biogenesis. Seipin is a cell-autonomous regulator of lipolysis essential for adipocyte differentiation. Seipin is predicted to contain two transmembrane domains at residues 28-49 and 237-258, in humans, and a third transmembrane domain might be present at residues 155-173. Mutations in the Seipin gene underlie human congenital generalised lipodystrophy. Seipin may also be implicated in Silver spastic paraplegia syndrome and distal hereditary motor neuropathy type V.
