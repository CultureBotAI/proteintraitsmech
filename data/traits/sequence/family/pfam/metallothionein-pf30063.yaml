identifier: Pfam:PF30063
label: Metallothionein
definition: >-
  This entry represents metallothionein, a metal-binding protein involved in the cellular sequestration of toxic metal ions. This protein is found in molluscs. Metallothionein belongs to the metallothionein superfamily, Type 2 family. The protein is induced by cadmium exposure and binds cadmium ions through multiple cysteine residues. Metallothionein undergoes N-terminal acetylation and the initiating methionine is removed during processing.
