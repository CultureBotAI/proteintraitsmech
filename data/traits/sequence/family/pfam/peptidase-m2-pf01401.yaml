identifier: Pfam:PF01401
label: Angiotensin-converting enzyme
definition: >-
  This group of metallopeptidases belong to the MEROPS peptidase family M2 (clan MA(E)). The protein fold of the peptidase domain for members of this family resembles that of thermolysin, the type example for clan MA. The catalytic residues and zinc ligands have been identified, the zinc ion being ligated to two His residues within the motif HEXXH, showing that the enzyme belongs to the glu-zincin sub-group of metalloproteases. Peptidyl-dipeptidase A (angiotensin-converting enzyme or ACE, ) is a mammalian enzyme responsible for cleavage of dipeptides from the C-termini of proteins, notably converting decapeptide angiotensin I to the octapeptide angiotensin II. The enzyme exists in two differentially transcribed forms, the most common of which is from lung endothelium; this contains two homologous domains that have arisen by gene duplication. The testis-specific form contains only the C-terminal domain, arising from a duplicated promoter region present in intron 12 of the gene. Both enzymatic forms are membrane proteins that are anchored by means of a C-terminal transmembrane domain. Both domains of the endothelial enzyme are active, but have differing kinetic constants. ACE is well-known as a key part of the renin-angiotensin system that regulates blood pressure and ACE inhibitors are important for the treatment of hypertension. An ACE homologue, ACE2 (MEROPS identifier M02.006), has been identified in humans that differs from ACE; it preferentially removes carboxy-terminal hydrophobic or basic amino acids and appears to be important in cardiac function.
