identifier: Pfam:PF06637
label: PV-1 protein (PLVAP)
definition: >-
  This family consists of several PV-1 (PLVAP) proteins, which seem to be specific to vertebrates. PV-1 is a component of the endothelial fenestral and stomatal diaphragms. PV-1 is retained on the cell surface of enddotelial cells by structures capable of forming diaphragms, but undergoes rapid internalization and degradation in the absence of these structures.
