identifier: Pfam:PF26336
label: Penicillin-binding protein 2a activator MacP
definition: >-
  This entry represents the penicillin-binding protein 2a activator MacP protein. MacP is a membrane-anchored cofactor of penicillin-binding protein (PBP2a) that belongs to a major family of peptidoglycan synthases involved in building the cell wall matrix. MacP was characterised in Streptococcus pneumoniae where it forms a complex with PBP2a and required for its synthase activity.
