identifier: Pfam:PF06687
label: SUR7/PalI family
definition: >-
  This entry consists of several fungal-specific membrane proteins, including Sur7 and Rim9. This entry also includes PalI which is part of a pH signal transduction cascade. Based on the similarity of PalI to the yeast Rim9 meiotic signal transduction component it has been suggested that PalI might be a membrane sensor for ambient pH.
