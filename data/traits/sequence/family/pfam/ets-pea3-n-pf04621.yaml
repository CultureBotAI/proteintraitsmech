identifier: Pfam:PF04621
label: PEA3 subfamily ETS-domain transcription factor N terminal domain
definition: >-
  The N-terminal of the PEA3 transcription factors is implicated in transactivation and in inhibition of DNA binding. Transactivation is potentiated by activation of the Ras/MAP kinase and protein kinase A signalling cascades. The N-terminal region contains conserved MAP kinase phosphorylation sites.
