identifier: Pfam:PF10961
label: 'Selenoprotein SelK_SelG '
definition: >-
  This entry represents an eukaryotic family of selenoproteins. It includes SelK, which seems to play an important role in protecting cells from endoplasmic reticulum stress-induced apoptosis. It is required for Ca2+ flux in immune cells and plays a role in T-cell proliferation and in T-cell and neutrophil migration. SelK is also required for palmitoylation of some proteins which regulates its stability and function. SelG, which may be involved in regulating the redox state of the cell.
