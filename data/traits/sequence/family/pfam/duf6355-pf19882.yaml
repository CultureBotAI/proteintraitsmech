label: Family of unknown function (DUF6355)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001807) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide, in particular the totopotensamide A biosynthetic gene cluster from Streptomyces pactum. This family appears to be predominantly present in Actinobacteria.
