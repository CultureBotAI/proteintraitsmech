identifier: Pfam:PF03706
label: Lysylphosphatidylglycerol synthase TM region
definition: >-
  This family contains proteins involved in the addition of lysine to phosphatidylglycerol (lysylphosphatidylglycerol synthetase, L-PG synthase). L-PG synthase produces lysyl-phosphatidylglycerol (L-PG), the major component of the bacterial membrane and responsible for its positive charge. L-PG synthesis contributes to bacterial virulence as it is involved in the cationic antimicrobial peptides (CAMP) resistance mechanism of the host's immune system (defensins, cathelicidins) and of the competing microorganisms (bacteriocins). This family also includes archaeal glycosyltransferase AglD, involved in S-layer biosynthesis, and a number of uncharacterised proteins.
