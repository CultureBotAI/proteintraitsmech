identifier: Pfam:PF05035
label: 2-keto-3-deoxy-galactonokinase
definition: >-
  2-keto-3-deoxy-galactonokinase is a bacterial transferase that catalyses the second step in D-galactonate degradation. ATP + 2-dehydro-3-deoxy-D-galactonate = ADP + 2-dehydro-3-deoxy-D-galactonate 6-phosphate D-Galactonate is catabolized in saprophytic mycobacteria to give pyruvate and glyceraldehyde-3-phosphate by a pathway that involves galactonate dehydratase, 2-keto-3-deoxy-galactonate kinase, and 6-phospho-2-keto-3-deoxy-galactonate aldolase.
