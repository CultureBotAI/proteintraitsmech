identifier: Pfam:PF28823
label: Small acidic protein 1/2
definition: >-
  This entry represents the small acidic protein (SMAP) family found in plants. SMAP proteins mediate responses to the synthetic auxin 2,4- dichlorophenoxyacetic acid (2,4-D) but are not involved in the response to indole-3-acetic acid (IAA). These proteins interact with RUB modification-related components and may regulate the cullin-ring ubiquitin E3 ligase complex (CRL) activity. SMAP1 interacts with the COP9 signalosome and contains a functionally important F/D-rich region. The family includes SMAP1 and SMAP2 from Arabidopsis thaliana, which are expressed in various tissues including roots, flowers, siliques, stems, leaves and seeds.
