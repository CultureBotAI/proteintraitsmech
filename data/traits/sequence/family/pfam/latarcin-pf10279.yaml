identifier: Pfam:PF10279
label: Latarcin precursor
definition: >-
  This entry represents the precursor proteins for a number of short antimicrobial peptides called Latarcins. Latarcins were discovered in the venom of the spider Lachesana tarabaevi. Latarcins are likely to adopt amphipathic α-helical structure in the plasma membrane.
