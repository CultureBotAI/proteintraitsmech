identifier: Pfam:PF01676
label: Metalloenzyme superfamily
definition: >-
  This domain unites alkaline phosphatase, N-acetylgalactosamine-4-sulphatase, and cerebroside sulphatase, enzymes with known three-dimensional structures, with phosphopentomutase, 2,3-bisphosphoglycerate-independent phosphoglycerate mutase, phosphoglycerol transferase, phosphonate monoesterase, streptomycin-6-phosphate phosphatase, alkaline phosphodiesterase/nucleotide pyrophosphatase PC-1, and several closely related sulphatases. This domain is also related to alkaline phosphatase. The most conserved residues are probably involved in metal binding and catalysis.
