identifier: Pfam:PF03573
label: outer membrane porin, OprD family
definition: >-
  This family contains bacterial outer membrane porins with serine protease activity, including Chitoporin from Escherichia coli (ChiP) and Porin D from Pseudomonas aeruginosa (OprD). ChiP is involved in the uptake of chitosugars. OprD shows specificity for basic amino acids and is involved in facilitating the diffusion of carbapenem beta-lactam antibiotics, such as imipenem and meropenem. Proteins in this entry belong to MEROPS peptidase family S43 (clan PA(S)).
