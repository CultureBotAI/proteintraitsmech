identifier: Pfam:PF05052
label: MerE protein
definition: >-
  The prokaryotic MerE (or URF-1) protein is part of the mercury resistance operon often located on plasmids or transposons. It has been suggested that MerE is a broad mercury transporter mediating transport across the bacterial membrane.
