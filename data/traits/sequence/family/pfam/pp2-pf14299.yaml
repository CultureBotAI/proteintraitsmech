identifier: Pfam:PF14299
label: Phloem protein 2
definition: >-
  Phloem protein 2 (PP2) is one of the most abundant and enigmatic proteins in the phloem sap. PP2 is translocated in the assimilate stream where its lectin activity or RNA-binding properties can exert effects over long distances. PP2-like genes have been identified in many plant species, indicating a wide distribution of PP2 genes in the plant kingdom. This entry represents PP2 and PP2-like proteins.
