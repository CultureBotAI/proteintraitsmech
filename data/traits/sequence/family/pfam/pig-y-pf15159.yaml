identifier: Pfam:PF15159
label: Phosphatidylinositol N-acetylglucosaminyltransferase subunit Y
definition: >-
  This entry represents the subunit Y of the GPI-N-acetylglucosaminyltransferase (GPI-GnT) complex found in the endoplasmic reticulum. The GPI-GnT complex catalyses the first step in the production of GPI (glycosylphosphatidylinositol)-anchors for cell surface proteins. PIG-Y may regulate activity of the complex by binding the catalytic subunit, PIG-A. In the absence of PIG-Y activity, the cell surface levels of GPI-anchored proteins are severely decreased. This protein contains a membrane-embedded domain named BindGPILA, also found in the GPI lipid anchor pathway proteins PIG-B, PIG-M, PIG-U, PIG-W, PIG-V, and PIG-Y, which it is thought to be responsible for recognising, binding and stabilising the GPI lipid anchor.
