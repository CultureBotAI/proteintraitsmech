identifier: Pfam:PF16018
label: Anillin N-terminus
definition: >-
  This domain is found towards the N terminus of anillin (ANLN), a F-actin-binding protein with important roles in cell cytokinesis. In mammalian anillin, this domain is repeated. This domain overlaps with the region responsible for nuclear localisation of anillin.
