identifier: Pfam:PF01562
label: Reprolysin family propeptide
definition: >-
  This entry represents the region of the propeptide for members of the MEROPS peptidase family M12B (clan MA(M), adamalysin family). The propeptide contains a sequence motif similar to the "cysteine switch" of the matrixins, which mediate cell-cell or cell-matrix interactions.
