identifier: Pfam:PF14978
label: Mitochondrial ribosome protein 63
definition: >-
  This entry represents the large ribosomal subunit protein mL63 from animals, which was previously known as Mitochondrial ribosomal protein 63 or Mrpl57. This protein is present in the intact 55S subunit of the mitochondrial ribosome. It is not known if it belongs to the 28S or to the 39S subunit.
