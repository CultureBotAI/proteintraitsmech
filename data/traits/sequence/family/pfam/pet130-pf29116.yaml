identifier: Pfam:PF29116
label: Mitochondrial protein PET130
definition: >-
  This entry represents the PET130 protein family, found in fungi. PET130 is a mitochondrial matrix protein of approximately 347 amino acids. In Saccharomyces cerevisiae, disruption of PET130 results in defects in mitochondrial protein synthesis. The protein has been implicated in mitochondrial tRNA 5'-end processing. PET130 localises to the matrix side of the mitochondrial inner membrane and is present at approximately 721 molecules per cell during log phase growth. The precise molecular function of this protein remains to be determined.
