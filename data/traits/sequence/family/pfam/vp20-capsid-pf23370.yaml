identifier: Pfam:PF23370
label: Capsid protein Vp20
definition: >-
  This entry represents the capsid protein Vp20 from apple-latent spherical virus (ALSV) and related picorna-like plant viruses. This protein is encoded in a polyprotein that is cleaved into three capsid proteins, Vp25, Vp20 and Vp24, which all have jellyroll folds and form one protomer; 60 copies of this unit compose one virion. Vp25, Vp20 and Vp24 contribute to capsid stabilisation. Vp25 and Vp20 form more extensive interactions with their neighbours and likely form a rigid capsid frame that supports the looser Vp24 protrusions.
