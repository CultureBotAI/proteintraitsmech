identifier: Pfam:PF01441
label: Lipoprotein
definition: >-
  Members of this family are lipoproteins that are probably involved in evasion of the host immune system by Spirochaeta pathogens. Borrelia burgdorferi, the causative agent of Lyme disease, has the potential of producing more than 100 different lipoproteins that could become anchored to the outer membrane. One of these is outer surface protein C (OspC), which acts as an antiphagocytic factor.
