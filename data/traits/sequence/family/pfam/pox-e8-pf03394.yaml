identifier: Pfam:PF03394
label: Poxvirus E8 protein
definition: >-
  This entry represents a family of poxvirus proteins that includes Protein E8 from Vaccinia virus, which is also known as Protein OPG070. This protein may play a role in the biogenesis of the viral factories by recruiting and wrapping DNA replication sites in endoplasmic reticulum derived membranes. It binds DNA in vitro with this binding likely to be modulated by phosphorylation by the viral kinase F10L.
