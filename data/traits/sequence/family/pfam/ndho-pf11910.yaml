identifier: Pfam:PF11910
label: Cyanobacterial and plant NDH-1 subunit O
definition: >-
  NAD(P)H-quinone oxidoreductase (NDH-1) shuttles electrons from an unknown electron donor, via FMN and iron-sulphur (Fe-S) centres, to quinones in the respiratory and/or the photosynthetic chain. The immediate electron acceptor for the enzyme in this species is believed to be plastoquinone. It couples the redox reaction to proton translocation, and thus conserves the redox energy in a proton gradient. Cyanobacterial NDH-1 also plays a role in inorganic carbon-concentration. NDH-1 can be composed of about 15 different subunits, although different subcomplexes with different compositions have been identified which probably have different functions. This entry represents subunit O.
