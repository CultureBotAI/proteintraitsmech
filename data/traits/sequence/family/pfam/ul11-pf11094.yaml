identifier: Pfam:PF11094
label: Membrane-associated tegument protein
definition: >-
  The UL11 gene product (also known as cytoplasmic envelopment protein 3) of herpes simplex virus is a membrane-associated tegument protein that is incorporated into the HSV virion and functions in viral envelopment. UL11 is acylated, which is crucial for lipid raft association.
