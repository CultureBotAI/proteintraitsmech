identifier: Pfam:PF06177
label: QueT transporter
definition: >-
  This family includes the queT gene encoding a hypothetical integral membrane protein with 5 predicted transmembrane regions. The queT genes in Firmicutes are often preceded by the PreQ1 (7-aminomethyl-7-deazaguanine) riboswitches of two distinct classes, suggesting involvement of the QueT transporters in uptake of a queuosine biosynthetic intermediate.
