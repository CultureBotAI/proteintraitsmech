identifier: Pfam:PF30278
label: Protein Z600
definition: >-
  This entry represents Z600 (Fruhstart), a cell cycle regulator found in Drosophila. Z600 inhibits mitotic entry at the G2/M transition by binding to the hydrophobic patch of cyclins. The protein forms a complex with cyclin A and Cdk1 and also interacts with cyclin E. Z600 is required for cell cycle arrest during the mid-blastula transition and delays mitosis in the ventral mesoderm during gastrulation, allowing morphogenesis to proceed before cell division. The protein localises to the nucleus and associates with chromatin.
