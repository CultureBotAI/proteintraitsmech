identifier: Pfam:PF26876
label: Phage T4 Y06P protein
definition: >-
  This entry represents protein Y06P found in bacteriophages. The prototype is from bacteriophage T4, a 202 amino acid protein with a molecular weight of 23.8 kDa located in the e-segB intergenic region. The protein is also known as e.5 or msp4 and is found in the region between lysozyme and the tRNA genes. The function of this protein is unknown.
