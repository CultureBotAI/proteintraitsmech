identifier: Pfam:PF26212
label: Phage T7 Internal virion protein gp15
definition: >-
  This entry includes Gp15 and related proteins. Gp15 is a component of the cylindrical core that assembles on the inner surface of the capsid during capsid formation and plays a role in viral DNA ejection into the host cell. Bacteriophage T7 proteins Gp15 and Gp16 form a spiral ring complex that binds to both the viral DNA and the host inner membrane. T7 is a member of the Podoviridae, having short, noncontractile tails that are too short to span a bacterial cell envelope. Its internal core, consists of Gp14/ Gp15/Gp16, is essential for both virion morphogenesis and ejection of its genome.
