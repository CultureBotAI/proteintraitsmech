identifier: Pfam:PF12409
label: P5-type ATPase cation transporter
definition: >-
  This entry represents the N-terminal extension domain from P5B-type ATPases, including ATP13A2 to ATP13A5 from human and its homologue from yeast, YPK9. It contains three short hydrophobic α-helices that are conserved in P5B-ATPases. Human ATP13A2 (also known as PARK9) is a neuroprotective ATPase enriched in the brain that selectively imports spermine ions from lysosomes into the cytosol. Mutations in ATP13A2 cause a rare monogenic form of juvenile-onset Parkinson's disease named Kufor-Rakeb syndrome and other neurodegenerative diseases.
