identifier: Pfam:PF17052
label: 'Cap associated factor '
definition: >-
  In eukaryotes, the translation of mRNA is initiated by the binding of eIF4F complex, which is composed of eIF4E, eIF4A and eIF4G proteins. elF4E-binding proteins (4E-BPs) are involved in translational regulation through their interaction with eIF4E. There are two elF4E-binding proteins (4E-BPs) found in S. cerevisiae, Caf20 and Eap1. This entry represents Caf20 (also known as p20), which competes with elF4G for binding to elF4E and interferes with the formation of the elF4F complex, hence inhibiting translation. Caf20 is needed for the induction of pseudohyphal growth in response to nitrogen limitation.
