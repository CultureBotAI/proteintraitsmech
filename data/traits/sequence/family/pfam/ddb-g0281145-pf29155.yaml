identifier: Pfam:PF29155
label: Small transmembrane protein DDB_G0281145
definition: >-
  This entry represents a family of small uncharacterised transmembrane proteins found in Amoebozoa, particularly Dictyostelium species. The family includes proteins such as DDB_G0281145 and DDB_G0281147 from Dictyostelium discoideum. These proteins are typically 71-119 amino acids in length and contain one or more predicted transmembrane helices. The proteins are predicted to be membrane-localised but their specific function remains unknown.
