identifier: Pfam:PF14998
label: Transcription Regulator
definition: >-
  The precise function of this family is not clear, but it is thought to play a role in somitogenesis, development and transcriptional repression. This family contains two conserved sequence motifs: WRPW and FPVQATI. The WRPW motif is thought to be required for binding to tle/groucho proteins. Ripply2.2 is also known as Bowline and is an associate protein of the transcriptional co-repressor XGrg-4. Ripply3 is also known as Down Syndrome Critical Region Protein 6 homologue.
