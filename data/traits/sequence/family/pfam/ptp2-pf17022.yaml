identifier: Pfam:PF17022
label: Polar tube protein 2 from Microsporidia
definition: >-
  This entry represents polar-tube protein 2 from Microsporidia. Humans can be infected with the unicellular eukaryote Microsporidia which are obligate intracellular parasites that produce resistant spores. To initiate entry into a new host cell a unique motile process is formed by a sudden extrusion of the polar tube protein from the spore. There are a series of conserved cysteine residues.
