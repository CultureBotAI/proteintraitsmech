identifier: Pfam:PF28769
label: CCDC183 C-terminal domain
definition: >-
  This entry represents Domain-containing protein 183 (CCDC183). CCDC183 is a protein of unknown function that contains multiple coiled-coil domains. The protein shows alternative splicing, producing isoforms with different C-terminal sequences. CCDC183 is expressed in various tissues including testis and shows broad expression across different cell types.
