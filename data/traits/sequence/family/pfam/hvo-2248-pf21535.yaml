label: Uncharacterized motility-related protein HVO_2248
definition: >-
  This family represents a group of uncharacterised proteins from archaea, including the Uncharacterized motility-related protein HVO_2248 from Haloferax ( ), which is related to hypermotility and predicted as a cytoplasmic protein. Homologues of HVO_2248 are only found in Halobacteria.
