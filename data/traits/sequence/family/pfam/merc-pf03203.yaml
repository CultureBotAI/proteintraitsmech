identifier: Pfam:PF03203
label: MerC mercury resistance protein
definition: >-
  The mercury resistance protein, MerC, is an inner membrane protein that mediates Hg 2+ transport into the cytoplasm. MerA then converts the inorganic form of mercury Hg2+ to the less toxic form Hg0, thereby conferring mercury resistance.
