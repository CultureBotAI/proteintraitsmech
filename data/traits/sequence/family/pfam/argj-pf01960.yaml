identifier: Pfam:PF01960
label: ArgJ family
definition: >-
  ArgJ (also known as Ornithine acetyltransferase/OAT) is a bifunctional protein that catalyses the first and fifth steps in arginine biosynthesis, coupling acetylation of glutamate with deacetylation of N-acetylornithine, which allows recycling of the acetyl group in the arginine biosynthetic pathway. The structure has been determined for glutamate N-acetyltransferase 2 (ornithine acetyltransferase; ), an ArgJ-like protein from Streptomyces clavuligerus. Members of this family may experience feedback inhibition by L-arginine. The active enzyme is a heterotetramer of two alpha and two beta chains, where the alpha and beta chains are the result of autocatalytic cleavage. OATs found in the clavulanic acid biosynthesis gene cluster catalyze the fifth step only, and may utilize acetyl acceptors other than glutamate.
