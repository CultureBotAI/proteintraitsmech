identifier: Pfam:PF29014
label: Putative cell wall protein
definition: >-
  This entry represents a family of putative cell wall proteins found in plants, including the member from Arabidopsis thaliana (At2g208700) which is approximately 140 amino acids long and contains a signal peptide for secretion to the cell wall. Expression is induced by gibberellins and occurs in inflorescence tissues. The protein contains a disordered C-terminal region rich in glycine residues. The specific function of this protein family remains to be determined.
