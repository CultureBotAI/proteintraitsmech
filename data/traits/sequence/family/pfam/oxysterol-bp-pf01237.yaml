identifier: Pfam:PF01237
label: 'Oxysterol-binding protein '
definition: >-
  A number of eukaryotic proteins that seem to be involved with sterol synthesis and/or its regulation have been found to be evolutionary related. These include mammalian oxysterol-binding protein (OSBP), a protein of about 800 amino-acid residues that binds a variety of oxysterols (oxygenated derivatives of cholesterol); yeast Osh1, a protein of 859 residues that also plays a role in ergosterol synthesis; yeast proteins Hes1 and Kes1, highly related proteins of 434 residues that seem to play a role in ergosterol synthesis; Probable transporter efuK from the fungi Hormonema carpetanum, which is involved in the biosynthesis of enfumafungin; and OSBP-related proteins (ORP) from plants such as Arabidopsis thaliana.
