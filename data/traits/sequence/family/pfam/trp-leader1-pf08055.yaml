identifier: Pfam:PF08055
label: Tryptophan leader peptide
definition: >-
  This family consists of tryptophan (trp) leader peptides from Streptomyces spp. Tryptophan accumulation is the principal event resulting in down regulation of transcription of the structural genes of the trp operon. The leader peptide of the trp operon forms mutually exclusive secondary structures that would either result in the termination of transcription of the trp operon when tryptophan is in plentiful supply or vice versa.
