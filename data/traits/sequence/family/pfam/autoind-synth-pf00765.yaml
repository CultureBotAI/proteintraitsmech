identifier: Pfam:PF00765
label: Autoinducer synthase
definition: >-
  Bacterial species have many methods of controlling gene expression and cell growth. Regulation of gene expression in response to changes in cell density is termed quorum sensing. Quorum-sensing bacteria produce, release and respond to hormone-like molecules (autoinducers) that accumulate in the external environment as the cell population grows. Once a threshold of these molecules is reached, a signal transduction cascade is triggered that ultimately leads to behavioural changes in the bacterium. Autoinducers are thus clearly important mediators of molecular communication. Conjugal transfer of Agrobacterium octopine-type Ti plasmids is activated by octopine, a metabolite released from plant tumours. Octopine causes conjugal donors to secrete a pheromone, Agrobacterium autoinducer (AAI), and exogenous AAI further stimulates conjugation. The putative AAI synthase and an AAI-responsive transcriptional regulator have been found to be encoded by the Ti plasmid traI and traR genes, respectively. TraR and TraI are similar to the LuxR and LuxI regulatory proteins of Vibrio fischeri, and AAI is similar in structure to the diffusable V. fischeri autoinducer, the inducing ligand of LuxR. TraR activates target genes in the presence of AAI and also activates traR and traI themselves, creating two positive-feedback loops. TraR-AAI-mediated activation in wild-type Agrobacterium strains is enhanced by culturing on solid media, suggesting a possible role in cell density sensing. Production of light by the marine bacterium V. fischeri and by recombinant hosts containing cloned lux genes is controlled by the density of the culture. Density-dependent regulation of lux gene expression has been shown to require a locus consisting of the luxR and luxI genes. In these and other Gram-negative b…
