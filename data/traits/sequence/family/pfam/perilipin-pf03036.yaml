identifier: Pfam:PF03036
label: Perilipin family
definition: >-
  The perilipin family includes lipid droplet-associated protein (perilipin) and adipose differentiation-related protein (adipophilin). Perilipin is a modulator of adipocyte lipid metabolism and adipophilinis are involved in the development and maintenance of adipose tissue. The relative expression of these proteins and protective nature of lipid droplets from lipase activity depends on the balance of lipid storage and utilisation in specific cells. TIP47, also known as perilipin-3, is a cargo selection device for mannose 6-phosphate receptor trafficking that is also included in this group.
