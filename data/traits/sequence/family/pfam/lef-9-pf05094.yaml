identifier: Pfam:PF05094
label: Late expression factor 9 (LEF-9)
definition: >-
  The baculovirus Autographa californica nuclear polyhedrosis virus (AcMNPV) encodes a DNA-dependent RNA polymerase that is required for transcription of viral late genes. This polymerase is composed of four equimolar subunits, LEF-8, LEF-4, LEF-9, and p47. LEF-9 is homologous to the largest beta-subunit of prokaryotic DNA-directed RNA polymerase.
