identifier: Pfam:PF14143
label: YrhC-like protein
definition: >-
  The YrhC-like protein family includes the Bacillus subtilis YrhC protein , which is functionally uncharacterised. YrhC is on the same operon as the MccA and MccB genes, which are involved in the conversion of methionine to cysteine. Expression of this operon is repressed in the presence of sulphate or cysteine.
