identifier: Pfam:PF15547
label: Steroid receptor-associated and regulated protein
definition: >-
  Steroid receptor-associated and regulated protein is also known as ER-related factor, ERRF, or C1orf64. It is thought to regulate the transcriptional function of androgen and estrogen receptors. Proteins in this family are typically between 145 and 169 amino acids in length, and have a conserved IDC sequence motif.
