identifier: Pfam:PF05418
label: Apovitellenin I (Apo-VLDL-II)
definition: >-
  This family consists of several avian apovitellenin I sequences. As part of the avian reproductive effort, large quantities of triglyceride-rich very-low-density lipoprotein (VLDL) particles are transported by receptor-mediated endocytosis into the female germ cells. Although the oocytes are surrounded by a layer of granulosa cells harbouring high levels of active lipoprotein lipase, non-lipolysed VLDL is transported into the yolk. This is because VLDL particles from laying chickens (Gallus gallus) are protected from lipolysis by apolipoprotein (apo)-VLDL-II, a potent dimeric lipoprotein lipase inhibitor. Apo-VLDL-II is produced in the liver and secreted into the blood stream when induced by estrogen production in female birds.
