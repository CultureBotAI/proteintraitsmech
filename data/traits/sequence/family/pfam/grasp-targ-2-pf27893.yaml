identifier: Pfam:PF27893
label: Putative ATP-grasp target RiPP, Rhodococcus
definition: >-
  Members of this small family are putative RiPP (Ribosomally translated, Post-translationally modified Peptides) precursors such as , modified by RimK-like ATP-grasp proteins. Members are encoded near both an ATP-grasp protein and C39 peptidase domain-containing transporter. Members are short polypeptides that contain the GG motif expected for cleavage on export.
