identifier: Pfam:PF06281
label: Structural protein VP1/VP3
definition: >-
  Sulfolobus virus-like particle SSV1 and its fusellovirus homologues can be found in many acidic (pH less than 4.0) hot springs (greater than 70 degrees C) around the world. SSV1 contains a 15.5-kb double-stranded DNA genome that encodes 34 proteins with greater than 50 amino acids. A site-specific integrase and a DnaA-like protein have been previously identified by sequence homology, and three structural proteins have been isolated from purified virus and identified by N-terminal sequencing (VP1, VP2, and VP3).
