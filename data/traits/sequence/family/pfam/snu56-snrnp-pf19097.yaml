identifier: Pfam:PF19097
label: Snu56-like U1 small nuclear ribonucleoprotein component
definition: >-
  This family is a component of the U1 snRNP particle, which recognises and binds the 5'-splice site of pre-mRNA. Together with other non-snRNP factors, U1 snRNP forms the spliceosomal commitment complex, which targets pre-mRNA to the splicing pathway.
