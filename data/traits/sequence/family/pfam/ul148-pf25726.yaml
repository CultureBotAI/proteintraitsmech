identifier: Pfam:PF25726
label: Cytomegalovirus endoplasmic reticulum-resident glycoprotein UL148
definition: >-
  This protein family includes the Membrane protein UL148, an endoplasmic reticulum-resident glycoprotein found in human cytomegalovirus (HCMV). UL148 is predicted to play an important role in HCMV tropism by regulating the abundance of gH-gL complexes in virions. It is thought to function as a chaperone that interacts with the host ERAD machinery and slows gO decay which would otherwise be constitutively degraded. UL148 is also likely to reorganise the host endoplasmic reticulum, activate the unfolded protein response and play a role in the evasion of antiviral immune response by down-regulating cell surface expression of host CD58.
