identifier: Pfam:PF00146
label: NADH dehydrogenase
definition: >-
  This entry represents subunit 1 NADH:ubiquinone oxidoreductase. Among the many polypeptide subunits that make up complex I, there are fifteen which are located in the membrane part, seven of which are encoded by the mitochondrial and chloroplast genomes of most species. The most conserved of these organelle-encoded subunits is known as subunit 1 (gene ND1 in mitochondrion, and NDH1 in chloroplast) and seems to contain the ubiquinone binding site. The ND1 subunit is highly similar to subunit 4 of Escherichia coli formate hydrogenlyase (gene hycD), subunit C of hydrogenase-4 (gene hyfC). Paracoccus denitrificans NQO8 and Escherichia coli nuoH NADH-ubiquinone oxidoreductase subunits also belong to this family. This entry also includes the archaeal F420H2 oxidoreductase subunit H (FPO). FPO shuttles electrons from F420H2, via FAD and iron-sulphur (Fe-S) centres, to quinones in the F420H2:heterodisulphide oxidoreduction chain. The immediate electron acceptor for the enzyme in this species is believed to be methanophenazine. Couples the redox reaction to proton translocation (for every two electrons transferred, 0.9 hydrogen ions are translocated across the cytoplasmic membrane), and thus conserves the redox energy in a proton gradient.
