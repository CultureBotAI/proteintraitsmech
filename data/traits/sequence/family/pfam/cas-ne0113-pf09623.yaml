identifier: Pfam:PF09623
label: CRISPR-associated protein NE0113 (Cas_NE0113)
definition: >-
  This entry represents a domain found in a Cas protein family from bacteria and archaea, including the ring nuclease SSO2081 from Saccharolobus solfataricus. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
