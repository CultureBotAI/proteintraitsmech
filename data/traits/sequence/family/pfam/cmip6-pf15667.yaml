identifier: Pfam:PF15667
label: Ciliary microtubule inner protein 6
definition: >-
  This family of proteins includes human protein C2orf73 (also known as Ciliary microtubule inner protein 6, CMIP6) and homologues. CMIP6 is a close homologue of C. reinhardtii FAP363. FAP363 contains Mn repeats that make close contacts with the luminal microtubule lattice. Proteins in this family are found in eukaryotes. They are typically between 135 and 289 amino acids in length, with three conserved sequence motifs: GDWWSH, RSDF and KRHG.
