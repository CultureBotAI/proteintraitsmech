identifier: Pfam:PF05815
label: Autographa californica nuclear polyhedrosis virus (AcMNPV), Orf101
definition: >-
  This entry is represented by Autographa californica nuclear polyhedrosis virus (AcMNPV), Orf101 (also known as Protein C42). It plays a role in host nuclear actin polymerization by recruiting p78/73 protein that is capable of activating an actin-related protein 2/3 complex to initiate nuclear actin polymerization.
