identifier: Pfam:PF27779
label: Conserved hypothetical protein CHP03076, glycine cleavage
definition: >-
  The H protein (GcvH) of the glycine cleavage system shuttles the methylamine group of glycine from the P protein to the T protein. Most Chlamydia lack the P and T proteins, and have a single homologue of GcvH that appears deeply split from canonical GcvH in molecular phylogenetic trees. The proteins in this entry are only found in the Chlamydiia, and always are part of a two-gene operon, upstream of the homologue of GcvH. Its function is unknown.
