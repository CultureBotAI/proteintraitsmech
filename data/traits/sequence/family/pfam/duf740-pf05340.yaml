identifier: Pfam:PF05340
label: Protein of unknown function (DUF740)
definition: >-
  This family consists of several plant proteins, including protein OCTOPUS (OPS, At3g09070) and OPSL1 (At5g01170) from Arabidopsis. OPS is a membrane-associated protein that regulates phloem differentiation entry. It is a positive regulator of the brassinosteroid (BR) signaling pathway and sequesters BIN2 to the plasma membrane to promote phloem differentiation.
