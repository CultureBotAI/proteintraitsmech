identifier: Pfam:PF06242
label: Transcriptional cell cycle regulator TrcR
definition: >-
  This family represents a transcriptional cell cycle regulator (TrcR) found in Proteobacteria, mainly Alphaproteobacteria. TrcR associates with promoters and coding sequences in vivo in a rifampicin-dependent manner and interacts physically and genetically with RNA polymerase, resulting in the integration of cell cycle and antibiotic stress control with the general transcriptional machinery.
