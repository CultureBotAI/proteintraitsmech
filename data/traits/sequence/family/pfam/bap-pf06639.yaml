identifier: Pfam:PF06639
label: Basal layer antifungal peptide (BAP)
definition: >-
  This family consists of several basal layer antifungal peptide (BAP) sequences mainly from maize, wheat and sorghum. The BAP2 peptide exhibits potent broad-range activity against a range of filamentous fungi, including several plant pathogens.
