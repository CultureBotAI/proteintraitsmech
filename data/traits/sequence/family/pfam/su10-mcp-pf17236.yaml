identifier: Pfam:PF17236
label: SU10 major capsid protein
definition: >-
  This family (previously known as DUF5309) represents the bacteriophage SU10 major capsid protein and related proteins found in phages and bacteriophages. The capsid of SU10 is organised in fivefold symmetry and build from 715 copies of major capsid protein. The major capsid protein of SU10 adopts an HK97 fold, which is common among tailed bacteriophages and herpesviruses. This protein forms capsomers of two types: pentamers and hexamers.
