identifier: Pfam:PF10254
label: PACS-1 cytosolic sorting protein
definition: >-
  This entry represents the C-terminal region of animal PACS1/2. PACS1 is a cytosolic sorting protein that directs the localisation of membrane proteins in the trans-Golgi network (TGN)/endosomal system. PACS1 connects the clathrin adaptor AP-1 to acidic cluster sorting motifs contained in the cytoplasmic domain of cargo proteins such as furin, the cation-independent mannose-6-phosphate receptor and in viral proteins such as human immunodeficiency virus type 1 Nef. PACS2 controls the endoplasmic reticulum (ER)-mitochondria communication, including the apposition of mitochondria with the ER and ER homeostasis. In response to apoptotic inducer, it translocates the proapoptotic member Bid to mitochondria.
