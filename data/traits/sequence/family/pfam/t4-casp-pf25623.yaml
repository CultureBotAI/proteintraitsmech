identifier: Pfam:PF25623
label: T4-phage like capsid assembly scaffolding protein family
definition: >-
  This entry represents Capsid assembly scaffolding protein from Enterobacteria phage T4 (SCAF) and similar sequences mainly found in tailed bacteriophages. Members of this protein family are crucial for the assembly of icosahedral procapsids in bacteriophages. These proteins coassemble with capsid proteins to form the procapsid structure, positioning themselves within the external shell of the icosahedrally arranged capsid protein subunits. During the maturation process, the scaffolding proteins are cleaved by the viral protease and subsequently released, except for an internal peptide known as peptide VII, which remains incorporated into the mature phage head. This process is essential for the proper formation and function of the viral capsid.
