identifier: Pfam:PF15596
label: Immunity protein 57
definition: >-
  This entry represents a predicted immunity protein with a mostly α-helical fold and conserved aspartate and cysteine residues and an SE motif. Proteins in this entry are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the LD-peptidase or Tox-Caspase families.
