identifier: Pfam:PF01900
label: Rpp14/Pop5 family
definition: >-
  This entry contains ribonuclease P (Rnp) proteins from eukaryotes and archaea. Rnp is a ubiquitous ribozyme that catalyzes a Mg2 -dependent hydrolysis to remove the 5'-leader sequence of precursor tRNA (pre-tRNA). Archaeal and eukaryotic RNase P consist of a single RNA and archaeal RNase P has four or five proteins, while eukaryotic RNase P consists of 9 or 10 proteins. Eukaryotic and archaeal RNase P RNAs cooperatively function with protein subunits in catalysis. Human RNase P is composed of a singular protein Pop1 and three subcomplexes, the Rpp20-Rpp25 heterodimer, Pop5-Rpp14-(Rpp30)2-Rpp40 heteropentamer, and Rpp21-Rpp29-Rpp38 heterotrimer. Although both Pop5 and Rpp14 have similar protein structure, they share a very limited sequence similarity. Moreover, the C-terminal fragments after the conserved β sheets in Pop5 and Rpp14 exhibit distinct structural features that mediate interactions with Pop1 and Rpp40, respectively. In the hyperthermophilic archaeon Pyrococcus horikoshii OT3, RNase P is composed of the RNase P RNA (pRNA) and five proteins (PhoPop5, PhoRpp38, PhoRpp21, PhoRpp29, and PhoRpp30). Proteins in this entry include Rnp2 (also known as Pop5) from archaea and Pop5/Rpp14 from humans.
