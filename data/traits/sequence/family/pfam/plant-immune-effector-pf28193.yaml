identifier: Pfam:PF28193
label: Plant immune system effector
definition: >-
  This family of proteins includes effectors involved in the recognition of non-host organisms by the immune system. Members of this family are capable of eliciting a hypersensitive response, which is a rapid and localized cell death at the site of infection. This response is a defense mechanism used by plants to prevent the spread of infection by pathogens. The proteins within this family play a crucial role in the interaction between host plants and pathogenic bacteria, contributing to the plant's ability to recognize and respond to microbial invaders.
