identifier: Pfam:PF11326
label: Synaptic plasticity regulator PANTS-like
definition: >-
  This entry represents a group of short eukaryotic sequences, including the mouse micropeptide known as the Plasticity-Associated Neural Transcript Short (Pants, also known as UPF0545 protein C22orf39 homolog), which plays a role in synaptic plasticity. The absence of Pants in humans is associated with high risk for schizophrenia. This entry also includes Early meiotic induction protein 1 from Saccharomyces cerevisiae (Emi1), which is required for transcriptional induction of the early meiotic-specific transcription factor Ime1, and other plant, fungal and animal uncharacterised proteins. Deletion of Emi1 affects mitochondrial morphology. This family was previously known as DUF3128.
