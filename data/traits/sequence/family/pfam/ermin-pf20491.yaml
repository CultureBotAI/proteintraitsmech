identifier: Pfam:PF20491
label: Ermin
definition: >-
  Ermin is an oligodendrocyte-specific protein that plays a role in cytoskeletal rearrangements during the late wrapping and/or compaction phases of myelinogenesis as well as in maintenance and stability of myelin sheath in the adult. It is expressed exclusively in oligodendrocytes in human brain and has been shown to bind and induce the reorganization of F-actin. It may also be essential in late-stage oligodendroglia maturation, myelin/Ranvier node formation during CNS development, and in the maintenance and plasticity of related structures in the mature CNS. In humans, it has been linked to epilepsy and multiple sclerosis.
