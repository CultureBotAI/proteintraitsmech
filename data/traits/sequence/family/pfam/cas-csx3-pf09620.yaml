identifier: Pfam:PF09620
label: CRISPR-associated protein (Cas_csx3)
definition: >-
  This entry represents the Crn3/Csx3 family of Cas proteins, which is encoded in CRISPR-associated gene cluster near CRISPR repeats in the genomes of several different thermophiles: Archaeoglobus fulgidus (archaeal), Aquifex aeolicus (Aquificae), Dictyoglomus thermophilum (Dictyoglomi), and a thermophilic Synechococcus (Cyanobacteria). These are ring nucleases that cleave and degrade cyclic tetra-adenylate (cA4), a second messenger generated by Cas10 in type III CRISPR systems The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
