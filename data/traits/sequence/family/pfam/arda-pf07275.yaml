identifier: Pfam:PF07275
label: Antirestriction protein (ArdA)
definition: >-
  This family consists of several bacterial antirestriction (ArdA) proteins. ArdA functions in bacterial conjugation to allow an unmodified plasmid to evade restriction in the recipient bacterium and yet acquire cognate modification.
