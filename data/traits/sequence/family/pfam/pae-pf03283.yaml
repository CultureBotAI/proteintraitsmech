identifier: Pfam:PF03283
label: Pectinacetylesterase
definition: >-
  This family includes protein Notum from animals and pectinacetylesterase (PAE) from plants. Notum is a carboxylesterase that removes an essential palmitoleate moiety from Wnt proteins. Notum constitutes the first known extracellular protein deacylase. PAEs catalyse the deacetylation of pectin, a major compound of primary cell walls.
