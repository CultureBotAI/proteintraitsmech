identifier: Pfam:PF07458
label: Sperm protein associated with nucleus, mapped to X chromosome
definition: >-
  This entry represents SPAN-X (Sperm Protein Associated with the Nucleus on the X chromosome) family proteins, including N1, N2, N3 and N5. These human sperm proteins are associated with the nucleus and mapped to the X chromosome (SPAN-X) (approximately 100 residues long). SPAN-X proteins are cancer-testis antigens (CTAs), and thus represent potential targets for cancer immunotherapy because they are widely distributed in tumours but not in normal tissues, except testes. They are highly insoluble, acidic, and polymorphic.
