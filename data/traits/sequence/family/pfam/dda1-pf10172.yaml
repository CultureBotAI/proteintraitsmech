identifier: Pfam:PF10172
label: Det1 complexing ubiquitin ligase
definition: >-
  This entry represents the DDA1 domain described in DET1- and DDB1-associated protein 1 ubiquitin ligases. DDA1 is a core subunit of multiple Cul4-based E3 ligases (CRL4s), involved in ubiquitination and subsequent proteasomal degradation of target proteins, which regulate key developmental and stress responses in eukaryotes. In mammals, DDA1 binds to DET1 and DDB1 to form DDD complexes, which recruit specific ubiquitin-conjugating UBE2E enzymes to form DDD-E2 complexes. The DDD-E2 complex provides a platform for interaction with Cul4A and beta-transducing (also called WD40) repeat proteins. DDA1 is conserved in higher eukaryotes, including Arabidopsis. This entry also includes protein LOWER TEMPERATURE 1 (LOT1) from Arabidopsis which contains the conserved DDA1 domain. LOT1 supports abscisic acid (ABA) responses and drought tolerance by regulating the dynamic localization and stability (preventing degradation by the proteasome) of CAR proteins (C2-domain ABA-related, e.g. CAR9).
