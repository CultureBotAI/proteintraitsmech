label: Family of unknown function (DUF5931)
definition: >-
  This domain is functionally uncharacterised found in actinobacteria, and is approximately 170 amino acids in length. This domain is found at the N terminus of 2 component signalling proteins which also contain PF07730 and PF02518. This domain presumably binds an as yet unknown ligand.
