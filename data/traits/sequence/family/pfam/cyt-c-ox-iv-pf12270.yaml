identifier: Pfam:PF12270
label: Cytochrome c oxidase subunit IV
definition: >-
  This family of proteins is found in Gram-negative bacteria, mainly Actinobacteria, and represent the fourth subunit of the cytochrome c oxidase complex. This subunit does not have a catalytic capacity but instead, is required for assembly and/or stability of the complex.
