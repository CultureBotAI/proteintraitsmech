identifier: Pfam:PF02649
label: Type I GTP cyclohydrolase folE2
definition: >-
  This is a family of prokaryotic/archaeal proteins with type I GTP cyclohydrolase activity. GTP cyclohydrolase I is the first enzyme of the de novo tetrahydrofolate biosynthetic pathway present in bacteria, fungi, and plants, and encoded in Escherichia coli by the folE gene. FolE is Zinc 2+ dependent. In bacteria GTP cyclohydrolase FolE2 converts GTP to 7,8-dihydroneopterin triphosphate; while in the archaea GTP cyclohydrolase MptA converts GTP to 7,8-dihydro-D-neopterin 2',3'-cyclic phosphate, the first intermediate in the biosynthesis of coenzyme methanopterin.
