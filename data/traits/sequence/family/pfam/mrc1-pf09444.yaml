identifier: Pfam:PF09444
label: MRC1-like domain
definition: >-
  This putative domain is found in the most conserved region in mediator of replication checkpoint protein 1. This protein is a component of the replisome and is required for Rad3-dependent activation of the checkpoint kinase Cds1 in response to replication fork arrest.
