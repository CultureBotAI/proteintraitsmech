identifier: Pfam:PF08201
label: BssC/TutF protein
definition: >-
  BssC short protein (57 amino acids) has been described as the gamma-subunit of benzylsuccinate synthase from Thauera aromatica strain K172. It catalyses the addition of fumarate to the methyl group of toluene, leading to the formation of benzylsuccinate. TutF has been identified and described as highly similar to BssC in T. aromatica strain T1.
