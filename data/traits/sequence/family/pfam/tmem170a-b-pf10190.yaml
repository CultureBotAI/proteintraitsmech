identifier: Pfam:PF10190
label: Transmembrane protein 170A/B-like
definition: >-
  This entry represents a group of transmembrane proteins from animals and fungi, including human Transmembrane protein 170A/B (TMEM170A/B) and YPR153W from Saccharomyces cerevisiae. TMEM170A functions as a regulator of endoplasmic reticulum (ER) and nuclear envelope (NE) morphogenesis. It affects the ratio between tubular ER and ER sheets by promoting sheet formation at the expense of tubules and influences NE expansion, nuclear pore complex formation and proper localisation of inner nuclear membrane proteins. TMEM170B negatively regulates the canonical Wnt signalling in breast cancer cells. It exerts an inhibitory effect on breast cancer growth by inhibiting CTNNB1 stabilisation and nucleus translocation, which reduces the activity of Wnt targets. YPR153W, also known as May24/Ehg1, plays a critical role in maintaining nutrient permeases when cells are exposed to high pressure and stabilises yeast amino acid permease by facilitating its localisation to lipid rafts under high hydrostatic pressure (doi: 10.1091/mbc.E25-02-0067).
