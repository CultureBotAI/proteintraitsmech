identifier: Pfam:PF15114
label: Uncharacterised protein family UPF0640
definition: >-
  This entry represents a family of proteins from animals, including Ubiquinol-cytochrome-c reductase complex assembly factor 5 (UQCC5), also known as small integral membrane protein 4 (SMIM4) from humans. These proteins mediates early mitochondrial ubiquinol-cytochrome c reductase complex (complex III) biogenesis and are required for its assembly and stability. They participate in regulating the levels of electron transport chain proteins, and therefore energy supply, in response to changes in energy demand. SMIM4/UQCC5 is also involved in the first steps of cytochrome c oxidase complex (complex IV) assembly.
