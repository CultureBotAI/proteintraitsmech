identifier: Pfam:PF04604
label: Type-A lantibiotic
definition: >-
  Lantibiotics are heavily-modified bacteriocin-like peptides from Gram-positive bacteria. They contain alpha,beta-unsaturated amino acids (dehydroalanine and dehydrobutyrine) and lanthionine or 3-methyllanthionine rings (collectively known as thioether rings). There are 2 types of lantibiotic: Type A (which include nisin, subtilin, epidermin, gallidermin and Pep5) are strongly cationic and bactericidal - nisin, subtilin and Pep5 inhibit the growth of Gram-positive bacteria, probably by voltage-dependent pore formation in the cytoplasmic membrane, resulting in cellular efflux of electrolytes, amino acids and ATP; Type B lantibiotics possess at most one positive charge and are not bactericidal. This entry represents type A Lantibiotics that are mostly from Lactobacillales.
