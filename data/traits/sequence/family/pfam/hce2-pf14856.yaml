identifier: Pfam:PF14856
label: Pathogen effector; putative necrosis-inducing factor
definition: >-
  This domain corresponds to the mature part of the Secreted effector CE11 and Ecp2 effector protein from the tomato pathogen Passalora fulva. Effectors are low molecular weight proteins that are secreted by bacteria, oomycetes and fungi to manipulate their hosts and adapt to their environment. Ecp2 is a 165-amino-acid secreted protein that was originally identified as a virulence factor in P. fulva since disruption reduces the virulence of the fungus on tomato plants. It has been recently determined that Ecp2 is a member of a novel, widely distributed and highly diversified multigene superfamily within the fungal kingdom which has been designated Hce2. CE11 induces cell death and defense responses in Nicotiana benthamiana to counter leaf pathogens such as Sclerotinia sclerotiorum and Botrytis cinerea In contrast, it acts as a virulence factor in cotton and Arabidopsis by promoting the accumulation and activity of the host aspartic protease AP1, a negative regulator of plant immunity in these two plant species. This domain is also found in secreted chitinases LysM15 and LysM18 which may be involved in the degradation of chitin, a component of the cell walls of fungi and exoskeletal elements of some animals, and they might be involved in the manipulation of host defences for successful infection.
