identifier: Pfam:PF04656
label: Pox virus E6 protein
definition: >-
  This family contains fowlpox virus protein E6 and its homologues, including Protein OPG068 from Vaccinia virus. OPG068 plays an essential role for maintaining proper localization of the seven-protein complex and the viroplasm during assembly.
