identifier: Pfam:PF29913
label: Microneme protein 21
definition: >-
  This entry represents microneme protein 21 (MIC21) found in apicomplexan parasites, particularly Toxoplasma gondii. MIC21 is localised to micronemes and is secreted during invasion. The protein is expressed in tachyzoites, bradyzoites and merozoites but not detected in sporozoites or sporulating oocysts. Microneme proteins play important roles in host cell invasion by apicomplexan parasites. The specific function of MIC21 remains to be determined.
