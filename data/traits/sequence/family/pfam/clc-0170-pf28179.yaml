identifier: Pfam:PF28179
label: CLC_0170-like
definition: >-
  Members of this family are related to Clostridium botulinum protein CLC_0170 and are found in endospore-forming Gram-positive species. They average about 65 amino acids in length and contain extensively hydrophobic regions. These proteins are predicted to form an α-helical hairpin.
