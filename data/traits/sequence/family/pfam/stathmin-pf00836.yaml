identifier: Pfam:PF00836
label: Stathmin family
definition: >-
  Stathmin (from the Greek 'stathmos' which means relay), is a ubiquitous intracellular protein, present in a variety of phosphorylated forms. It is involved in the regulation of the microtubule (MT) filament system by destabilising microtubules. It prevents assembly and promotes disassembly of microtubules. However, when phosphorylated, its destabilisation ability is significantly reduced.
