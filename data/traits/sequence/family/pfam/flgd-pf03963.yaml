identifier: Pfam:PF03963
label: Flagellar hook capping protein - N-terminal region
definition: >-
  FlgD is known to be absolutely required for hook assembly, yet it has not been detected in the mature flagellum. It appears to act as a hook-capping protein to enable assembly of hook protein subunits.
