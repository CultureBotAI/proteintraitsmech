definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001133) is described by MIBiG as an example of the NRP (non-ribosomal peptide) biosynthetic class. It includes a member from the taxlllaid A biosynthetic gene cluster from Xenorhabdus bovienii SS-2004. This family is found in Proteobacteria.
