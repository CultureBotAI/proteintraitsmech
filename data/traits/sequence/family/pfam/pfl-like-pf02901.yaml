identifier: Pfam:PF02901
label: Pyruvate formate lyase-like
definition: >-
  Pyruvate formate lyase (PFL) catalyses the non-oxidative conversion of pyruvate and CoA to formate and acetyl-CoA. Several other enzymes have been identified in the pyruvate formate lyase family: ketoacid formate lyase, glycerol dehydratase (GD), benzyl succinate synthetase and p-hydroxyphenylacetate decarboxylase. The PFL domain has a unique α/β barrel arrangement, with five 'up' strands and three 'down' strands; the up and down strands are linked by a unique β-finger that carries a key thiyl radical.
