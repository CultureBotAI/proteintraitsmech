identifier: Pfam:PF30535
label: Neuropeptide-like protein 28-30
definition: >-
  This protein family includes Neuropeptide-like protein 28-30 (Nlp-28-30) from Caenorhabditis elegans, which are antimicrobial peptides. Nlp-29 may play a role in response to physical injury and osmotic stress and is involved in the sleep upon activation of the innate immune response to molting and injury to the adult epidermis.
