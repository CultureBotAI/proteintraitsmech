identifier: Pfam:PF23793
label: Rz1-like lysis system protein LysC
definition: >-
  This entry represents a group of proteins from tailed bacteriophages and bacterial prophages mainly found in proteobacteria, including Probable spanin, outer lipoprotein subunit from Escherichia phage P2 (LysC), LysC from Burkholderia phage ST79 (Bacteriophage ST79) ( ) and Spanin, outer lipoprotein subunit from Escherichia phage Mu (o-spanin). LysC is an Rz1-like component of a phage lytic system, substantially overlapping although not fully embedded in the gene for the Rz-like LysB component. The phage lysis defect in the absence of a functional LysB/LysC system appears in the presence of high concentrations of divalent cations. O-spanin is a component of the spanin complex that disrupts the host outer membrane and participates in cell lysis during virus exit. The spanin complex conducts the final step in host lysis by disrupting the outer membrane after holin and endolysin action have permeabilised the inner membrane and degraded the host peptidoglycans. Host outer membrane disruption is possibly due to local fusion between the inner and outer membrane performed by the spanin complex.
