identifier: Pfam:PF26870
label: Phage T4 Y07D protein
definition: >-
  This entry represents protein Y07D found in bacteriophages. The prototype is from bacteriophage T4, a 61 amino acid protein with a molecular weight of 6.6 kDa located in the segB-ipI intergenic region. The protein is also known as ORF2, ipi.-1, or trnA.4 and is found in the T4 tRNA region. The function of this protein is unknown.
