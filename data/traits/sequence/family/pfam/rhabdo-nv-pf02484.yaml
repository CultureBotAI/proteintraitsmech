identifier: Pfam:PF02484
label: Rhabdovirus Non-virion protein
definition: >-
  Infectious hematopoietic necrosis virus (IHNV) is a member of the family Rhabdoviridae. The non-virion protein (NV) is coded for by one of the six genes of the IHNV genome, but is absent in vesiculovirus-like rhabdovirus.
