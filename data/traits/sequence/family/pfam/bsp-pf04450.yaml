identifier: Pfam:PF04450
label: Peptidase of plants and bacteria
definition: >-
  Proteins in this entry include basic secretory proteins (BSPs) believed to be part of the plants defence mechanism against pathogens. In plants, this group of proteins are known as PR-17 family, including At2g15120 from Arabidopsis, NtPRp27 from Nicotiana tabacum and StPRp27 from potatoes. This entry also includes uncharacterised proteins from bacteria and fungi.
