identifier: Pfam:PF07520
label: Virulence factor SrfB
definition: >-
  This entry represents proteins of unknown function. It has been shown in Salmonella enterica that srfB is one of the genes activated by the global signal transduction/regulatory system SsrA/B. This activation takes place within eukaryotic cells. The activated genes include pathogenicity island 2 (SPI-2) genes and at least 10 other genes ( srfB is one of them) which are believed to be horizontally acquired, and to be involved in virulence/pathogenicity.
