identifier: Pfam:PF21825
label: Sequestin
definition: >-
  This entry represents a family of proteins that are present in crAss phage such as , including Uncharacterized 7.5 kDa protein in denB-rIIB intergenic region from Enterobacteria phage T4. AlphaFold predicts these short proteins to adopt an α helical hairpin structure. These proteins bind the immune signalling molecule 3'cADPR (1'-3'' gcADPR) to inhibit Thoeris defence. Members of this family form a confident homodimer according to structure prediction. The highly conserved residues are found in this interaction interface.
