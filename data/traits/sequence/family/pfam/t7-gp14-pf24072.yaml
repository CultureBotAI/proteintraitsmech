identifier: Pfam:PF24072
label: T7 virus internal virion protein gp14 family
definition: >-
  This entry includes Gp14 and related proteins from tailed bacteriophages and bacterial prophages. Gp14 is a component of the cylindrical core that assembles on the inner surface of the capsid during capsid formation and plays a role in viral DNA ejection into the host cell. T7 is a member of the Podoviridae, having short, noncontractile tails that are too short to span a bacterial cell envelope. Its internal core, consists of Gp14/ Gp15/Gp16, is essential for both virion morphogenesis and ejection of its genome.
