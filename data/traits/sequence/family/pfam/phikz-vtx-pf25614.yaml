identifier: Pfam:PF25614
label: Bacteriophage PhiKZ vertex-binding protein gp28
definition: >-
  This entry represents the vertex-binding protein gp28 from jumbo bacteriophage PhiKZ that infects Pseudomonas aeruginosa. This α-helical protein functions as a component of the vertex-binding complex attached to the inner surface of the viral capsid. Gp28 forms a sandwich structure along with gp85 dimer and gp119 at the centre of the vertex-binding complex. Neighbouring vertex-binding complexes connect via interactions between gp28 from one complex and gp91/gp119 from an adjacent complex. This protein plays an important role in capsid assembly and stabilisation by reinforcing the associations between the pentameric capsomer and the five hexameric capsomers encircling the vertex. Similar proteins are found in other jumbo phages, suggesting a conserved mechanism for capsid assembly and stabilisation in large viruses.
