identifier: Pfam:PF15239
label: Cilia-and flagella-associated protein 96
definition: >-
  This family (previously DUF4586) represents Cilia-and flagella-associated protein 96 (CFAP96, also known as C4orf47). CFAP96 is an axonemal microtubule-associated protein (MAP). The EM structure of sperm DMTs shows that CFAP96 binds to tubulin and, similarly to other axonemal wedge-MAPs, binds deeper into the inter-protofilament cleft making extensive contacts with flanking protofilaments.
