identifier: Pfam:PF02605
label: Photosystem I reaction centre subunit XI
definition: >-
  The trimeric photosystem I of the cyanobacterium Synechococcus elongatus recomprises 11 protein subunits. Subunit XI, PsaL, from plants and bacteria is one of the smaller subunits with only two transmembrane α helices. PsaL interacts closely with PsaI.
