identifier: Pfam:PF28081
label: MXAN_6627.5-like
definition: >-
  This protein family represents MXAN_6627.5 and similar sequences from Myxococcales. MXAN_6627.5 is a MYXO-CTERM protein, depending on myxosortase and type II secretion for expression presumably on the cell surface. This protein is encoded between loci MXAN_6627 and MXAN_6628, but missed in previous annotation of that genome. The central region of the protein has four invariant Cys residues.
