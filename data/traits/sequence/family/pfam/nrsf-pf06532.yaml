identifier: Pfam:PF06532
label: Negative regulator of sigma F
definition: >-
  This entry includes anti-sigma-F factor NrsF from Caulobacter crescentus , which is thought to be an anti-sigma factor for sigma F. Caulobacter crescentus survives where nutrients are low and where the concentration of heavy metals are high, and it is able to do so by altering the expression of a large number of genes. Sigma factor F is involved in the control of the transcriptional response to chromium and cadmium, controlling at least eight genes, all of which are in the sigma F regulon. NrsF is also in this regulon, and is released into the cytoplasm during chromium stress. Substitution of two conserved cysteines abrogate the ability of NrsF to maintain the expression of sigma F-dependent genes at basal levels.
