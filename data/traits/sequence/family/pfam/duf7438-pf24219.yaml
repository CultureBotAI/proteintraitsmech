identifier: Pfam:PF24219
label: Family of unknown function (DUF7438)
definition: >-
  This entry represents a family of uncharacterised proteins found in bacteriophages, including members from Phage T2, T4 and T6. Members of this family are typically short proteins of around 60-67 amino acids in length. The structure of these proteins is predicted to be composed of two α-helices that pack together. Structure prediction suggests these proteins may homodimerise (iPTM=0.83). Its function is currently unknown.
