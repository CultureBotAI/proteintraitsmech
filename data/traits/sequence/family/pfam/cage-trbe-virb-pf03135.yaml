identifier: Pfam:PF03135
label: CagE, TrbE, VirB family, component of type IV transporter system
definition: >-
  This domain is found in the Helicobacter pylori protein CagE, Protein virB4 and related proteins. VirB4 is one of three conserved ATPases (along with VirB11 and VirD4) that power type IV secretion systems (T4SSs). It provides energy, via hydrolysis of ATP, for the translocation of virulence proteins or the transfer of T-DNA-protein complexes across the bacterial membrane. VirB4 is essential for both T4SS assembly and substrate transfer, and is the most evolutionarily conserved subunit across all characterised T4SSs. The importance of VirB4 homologues has been demonstrated in several pathogenic bacteria. In Brucella abortus, the virB operon is essential for intracellular survival and constitutes a major determinant of virulence. In Bordetella pertussis, PtlC (a VirB4 homologue) is required for secretion of assembled pertussis toxin through the outer membrane. In Agrobacterium tumefaciens, VirB4 energises translocation of the T-DNA-protein complex into plant cells. Structurally, VirB4 proteins contain a C-terminal domain harbouring the catalytically essential Walker A and Walker B motifs characteristic of RecA-like ATPases, whilst the less conserved N-terminal domain mediates interactions with the inner membrane. CagE ( ) is the ATPase component of the Cag type IV secretion system (Cag-T4SS), encoded by the cag pathogenicity island (PAI). It functions as a molecular motor, providing the energy required for protein export. CagE is essential for pathogenesis in Helicobacter pylori-induced gastritis and peptic ulceration. It is required for CagA translocation and induction of IL-8 in host gastric epithelial cells. Expression of the cag PAI has been shown to be essential for stimulating human gastric epithelial cell apoptosis in vitro. CagE plays a key role in Cag-T4SS pilus…
