identifier: Pfam:PF28170
label: Nickel storage protein Hpn
definition: >-
  This entry represents Hpn protein found in different strains of Helicobacter pylori. Hpn is a histidine-rich polypeptide, 60 amino acids in length, capable of binding nickel and several other metals. It can store a reserve of nickel for biosynthesis of active urease, critical to the ability of the bacterium to survive acid exposure during colonisation, and hydrogenase. Hpn is closely related in its N-terminal region to a somewhat longer His and Gln-rich protein, called the Hpn-like protein. Both are expressed, under control of NikR, in response to nickel.
