identifier: Pfam:PF17096
label: Altered inheritance of mitochondria protein 3
definition: >-
  Altered inheritance of mitochondria protein 3 (Aim3) was first identified as an actin patch protein. Later, it was found to inhibit barbed-end actin filament elongation. It may be involved in mitochondrion organisation and biogenesis.
