identifier: Pfam:PF17617
label: Viral unique short region 10
definition: >-
  This family contains US10 proteins found in Human cytomegalovirus (HCMV). US10 is a unique short region trans-membrane glycoprotein found in the endoplasmic reticulum (ER). It down-regulates cell surface expression of HLA-G, but not that of classical class I MHC molecules. Despite of binding to classical class I MHC molecules and delaying their trafficking, it does not affect their steady-state cell surface levels. US10 contains a tri-leucine motif in the cytoplasmic tail which is responsible for down-regulation of HLA-G.
