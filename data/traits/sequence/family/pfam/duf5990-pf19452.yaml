identifier: Pfam:PF19452
label: Family of unknown function (DUF5990)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001048) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide), polyketide, and saccharide. This family includes a protein in the tallysomycin A biosynthetic gene cluster from Streptoalloteichus hindustanus. Some members of this family have been annotated as monooxygenase, but this could not be confirmed.
