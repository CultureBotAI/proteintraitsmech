identifier: Pfam:PF14987
label: NADH dehydrogenase 1 alpha subcomplex subunit 3
definition: >-
  NADH dehydrogenase [ubiquinone] 1 alpha subcomplex subunit 3 is a accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (complex I), that is believed not to be involved in catalysis. Complex I functions in the transfer of electrons from NADH to the respiratory chain. The immediate electron acceptor for the enzyme is believed to be ubiquinone.
