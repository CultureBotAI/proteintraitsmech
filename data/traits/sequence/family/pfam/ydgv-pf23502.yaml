identifier: Pfam:PF23502
label: YdgV
definition: >-
  This protein family includes YdgV from Escherichia coli and similar sequences from gammaproteobacteria. YdgV is a 33-residues micropeptide encoded by a small open reading frame (smORF). Proteins 50 or fewer residues-long have been shown to regulate the functions of larger proteins in a variety of organisms.
