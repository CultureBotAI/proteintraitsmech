identifier: Pfam:PF29394
label: Family of unknown function (DUF8543)
definition: >-
  This entry represents a family of small proteins of approximately 50-70 amino acids found exclusively in tailed bacteriophages. The family is found in the class Caudoviricetes, with members in the family Demerecviridae and the subfamilies Markadamsvirinae and Mccorquodalevirinae. Members are found in diverse genera including Epseptimavirus, Myunavirus and Sugarlandvirus. The function of these proteins remains to be determined.
