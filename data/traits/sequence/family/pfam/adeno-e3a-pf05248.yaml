identifier: Pfam:PF05248
label: Adenovirus E3A
definition: >-
  Adenoviruses have evolved multiple mechanisms to evade the host immune response. Several of the immunomodulatory adenoviral proteins are encoded in early transcription unit 3 (E3). The E3A/19K protein interferes with antigen presentation and T cell recognition.
