identifier: Pfam:PF06473
label: FGF binding protein 1 (FGF-BP1)
definition: >-
  This family consists of several mammalian FGF binding protein 1. Fibroblast growth factors (FGFs) play important roles during foetal and embryonic development. Fibroblast growth factor-binding protein (FGF-BP) 1 is a secreted protein that can bind fibroblast growth factors (FGFs) 1 and 2.
