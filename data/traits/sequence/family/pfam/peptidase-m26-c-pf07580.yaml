identifier: Pfam:PF07580
label: M26 IgA1-specific Metallo-endopeptidase C-terminal region
definition: >-
  This entry represents the C-terminal domain of metallopeptidases belonging to MEROPS peptidase family M26. They are extracellular enzymes, which cleave mammalian IgA. They are only found in Gram-positive bacteria and are often found associated with an LPXTG-motif cell wall anchor, indicating that they may be attached to the cell wall. The family also includes the metallopeptidases ZmpB and ZmpC from Streptococcus pneumoniae. These metallopeptidases are thought to contribute to the inflammatory response to Streptococcal infection. Over 70 metallopeptidase families have been identified to date. In these enzymes a divalent cation, which is usually zinc but may be cobalt, manganese or copper, activates the water molecule. The metal ion is held in place by amino acid ligands, usually three in number. In some families of co-catalytic metallopeptidases, two metal ions are observed in crystal structures ligated by five amino acids, with one amino acid ligating both metal ions. The known metal ligands are His, Glu, Asp or Lys. At least one other residue is required for catalysis, which may play an electrophilic role. Many metalloproteases contain an HEXXH motif, which has been shown in crystallographic studies to form part of the metal-binding site. The HEXXH motif is relatively common but can be more stringently defined for metalloproteases as 'abXHEbbHbc', where 'a' is most often valine or threonine and forms part of the S1' subsite in thermolysin and neprilysin, 'b' is an uncharged residue, and 'c' a hydrophobic residue. Proline is never found in this site, possibly because it would break the helical structure adopted by this motif in metalloproteases.
