identifier: Pfam:PF04979
label: Protein phosphatase inhibitor 2 (IPP-2)
definition: >-
  Protein phosphatase inhibitor 2 (IPP-2) is a phosphoprotein conserved among all eukaryotes, and it appears in both the nucleus and cytoplasm of tissue culture cells. Protein phosphatase inhibitor 2 family member C (PPP1R2C) has been shown to inhibit the catalytic subunit of PP1.
