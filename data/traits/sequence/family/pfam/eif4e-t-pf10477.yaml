identifier: Pfam:PF10477
label: Nucleocytoplasmic shuttling protein for mRNA cap-binding EIF4E
definition: >-
  This entry represents a group of eIF4E binding proteins, including eIF4E transporter (eIF4E-T) from mammals, cup protein from D. melanogaster and ifet-1 from C. elegans. Protein cup functions in Smaug-mediated translational repression. Ifet-1 is a broad-scale translational repressor in C. elegans.
