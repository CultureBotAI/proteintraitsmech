identifier: Pfam:PF04496
label: 'Herpesvirus UL35 family '
definition: >-
  The small capsomere-interacting protein (SCP, also known as UL35 or VP26) represents a true late gene which encodes a 12kDa capsid protein. SCP forms a complex with the major capsid protein in the cytoplasm which is translocated to the nucleus. SCP decorates the outer surface of the capsid shell during capsid assembly, forming a layer between the capsid and the tegument. The interaction between SCP with host dynein light chains is a possible mechanism for the transportation of incoming viral capsids.
