identifier: Pfam:PF11050
label: Virus envelope protein E26
definition: >-
  DA26 (E26) is a multifunctional protein. One form of E26 associates with viral DNA or DNA binding proteins, while a second form associates with intracellular membranes. It functions to sort occlusion-derived virus envelope proteins to the inner nuclear membrane.
