identifier: Pfam:PF15979
label: Glycosyl hydrolase family 115
definition: >-
  Glycosyl hydrolase family 115 (GH115) members are alpha-glucuronidases that catalyses the cleavage of 4-O-methyl D-glucuronic acid side chains from native xylan polysaccharides ( ). Family GH115 appears to be restricted to Archaea, Bacteria, and Fungi. This entry includes Schizophyllum commune Agu1 protein ( ) and SpGlcA115A ( ) from Streptomyces pristinaespiralis.
