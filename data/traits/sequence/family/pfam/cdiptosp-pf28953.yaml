identifier: Pfam:PF28953
label: Putative protein T-ENOL
definition: >-
  This entry represents the T-ENOL protein family, found in mammals. The name derives from "testicular enolase domain-containing protein", though the relationship to enolase remains unclear. The family consists of small proteins of approximately 80-90 amino acids in length. In rat, T-ENOL is specifically expressed in testis at the protein level. The proteins contain significant disordered regions at both the N-terminal and C-terminal ends. The function of this protein family remains to be determined.
