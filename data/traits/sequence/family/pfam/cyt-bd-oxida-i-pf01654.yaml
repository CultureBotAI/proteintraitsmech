identifier: Pfam:PF01654
label: Cytochrome bd terminal oxidase subunit I
definition: >-
  This family are the alternative oxidases found in many bacteria which oxidise ubiquinol and reduce oxygen as part of the electron transport chain. This family is the subunit I of the oxidase. E. coli has two copies of the oxidase, bo and bd. Only bd is represented here In some nitrogen fixing bacteria. Cytochrome bd may play an important role in microaerobic nitrogen fixation in the enteric bacterium Klebsiella pneumoniae, where it is expressed under all conditions that permit diazotrophy. Subunit I binds a single b-haem, through ligands at His186 and Met393 (using numbering). In addition His19 is a ligand for the haem b found in subunit II ( ).
