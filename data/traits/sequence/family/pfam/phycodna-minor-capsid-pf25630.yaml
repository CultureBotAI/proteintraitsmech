identifier: Pfam:PF25630
label: Phycodnaviridae minor capsid protein
definition: >-
  This entry represents the minor capsid proteins P12 and P13 of the Paramecium bursaria chlorella virus 1 (PBCV-1). P13 is one of the thirteen minor capsid proteins found in the viral capsid. The structure of P13 consists of a helical domain with a region at the N terminus (residues 4-23) predicted to be a transmembrane helix, suggesting a role in associating the viral capsid with the inner viral membrane. Unlike most other minor capsid proteins in PBCV-1, P13 does not serve a cross-linking function between neighbouring capsomers but likely plays a role in membrane association during viral capsid assembly. The protein is conserved among chloroviruses, indicating its importance in the viral life cycle.
