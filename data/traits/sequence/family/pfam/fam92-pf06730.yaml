identifier: Pfam:PF06730
label: FAM92 protein
definition: >-
  This entry represents a group of CBY1-interacting BAR domain-containing proteins formerly known as FAM92. Proteins in this family have a role in embryogenesis, being essential for ectoderm and axial mesoderm development. They may regulate cell proliferation and apoptosis. During spermatogenesis, these proteins regulate distal elongation of the basal-body and their anchoring to the plasma membrane and as a consequence, regulates the initiation and proper elongation of axonemal microtubules. They have been shown to interact with Cby1 to promote ciliogenesis via regulation of membrane-remodeling processes.
