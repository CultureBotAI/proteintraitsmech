label: Copper chaperone
definition: >-
  This family includes Copper chaperone PpoB2 from Marinomonas mediterranea and similar prokaryotic sequences. PpoB2 is a membrane copper transporter involved in the delivery of this ion to the PpoB1 tyrosinase ( ).
