identifier: Pfam:PF15968
label: Membrane-anchored ion channel, Abi component
definition: >-
  RexB is a family of anti-lambda phage inner-membrane ion-channels with four transmembrane domains. On infection by phage, a phage protein-DNA complex is produced as a replication or recombination intermediate which activates RexA. RexA is an intracellular sensor that activates the membrane-anchored RexB. At least two RexA proteins are needed to activate one RexB protein. Activation opens the ion-channel leading to a drop in membrane potential, the outcome of which is the death of the host cell but also the cessation or abortion of the phage infection. RexA-RexB is one of the most well characterised bacterial abortive infection systems, or Abis.
