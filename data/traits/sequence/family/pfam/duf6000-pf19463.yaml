label: Family of unknown function (DUF6000)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000026) is described by MIBiG as an example of the following biosynthetic class, saccharide. This family includes a protein from the avilamycin A biosynthetic gene cluster from Streptomyces viridochromogenes Tue57 and appears to be predominantly found in bacteria.
