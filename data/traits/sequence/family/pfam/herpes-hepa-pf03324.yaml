identifier: Pfam:PF03324
label: Herpesvirus DNA helicase/primase complex associated protein
definition: >-
  Proteins in this family are a component of the helicase/primase complex. The helicase generates single stranded DNA by unwinding the double helix at the replication forks, and the primase synthesizes short RNA primers that the polymerase then elongates. The function of the proteins, which have no known catalytic activity, is unknown, but they have been shown to be distantly related to B-family polymerases with a substantial reduction in nucleotide binding sites and loss of the active site.
