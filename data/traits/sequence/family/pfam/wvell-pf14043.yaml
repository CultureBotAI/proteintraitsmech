definition: >-
  This family includes the Bacillus subtilis YfhJ protein , which is functionally uncharacterised. This is not a homologue of Escherichia coli YfhJ, a synonym for IscX, which belongs to . This family of proteins is found in bacteria. Proteins in this family are approximately 90 amino acids in length and contain a highly conserved WVELL motif.
