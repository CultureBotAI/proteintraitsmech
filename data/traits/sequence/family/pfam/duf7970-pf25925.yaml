label: Family of unknown function (DUF7970)
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. Proteins in this family are predicted to adopt a series of four α helices that do not form a compact domain. There is weak evidence for a homodimer from structure prediction.
