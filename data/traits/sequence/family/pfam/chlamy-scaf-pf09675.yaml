identifier: Pfam:PF09675
label: Chlamydia-phage Chp2 scaffold (Chlamy_scaf)
definition: >-
  This entry represents homologues of the internal scaffolding protein VP3 found mainly in Microviridae. Some members of this entry are encoded by genes in chlamydiaphage such as Vp3, which have around eight genes and infect obligately intracellular bacterial pathogens of the genus Chlamydia. VP3 participates in the assembly of the viral procapsid in the cytoplasm and is released from the procapsid upon genome packaging, possibly through affinity displacement by the protein ORF8 or by proteolysis. Although this protein is often annotated as VP3 or as a structural protein of mature viral particles, it is more correctly described as a scaffolding protein, as it is displaced from procapsids during DNA packaging and is therefore absent from the mature virion.
