identifier: Pfam:PF23899
label: Phage SU10 portal protein
definition: >-
  This entry represents the portal protein of Escherichia coli phage SU10 and related protein from phages and prophages. The portal protein, encoded by gp6, forms a dodecameric complex that replaces a pentamer of capsid proteins at one vertex of the prolate SU10 capsid ( ). The portal complex enables packaging of the viral genome into the capsid as well as attachment of the phage tail. The portal protein contains wing, stem, clip, crown and barrel domains. The wing domain interacts with the viral DNA and the capsid proteins. The clip domain enables attachment of the adaptor protein complex.
