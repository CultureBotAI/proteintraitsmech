identifier: Pfam:PF07267
label: Nucleopolyhedrovirus capsid protein P87
definition: >-
  This family consists of several nuclear polyhedrosis viruses capsid P80 and P87 protein sequences. P87 is expressed late in infection and concentrated in infected cell nuclei. P80 (VP80) is involved in the packaging of nucleocapsids and in the egress of progeny nucleocapsids from the virogenic stroma toward the nuclear periphery.
