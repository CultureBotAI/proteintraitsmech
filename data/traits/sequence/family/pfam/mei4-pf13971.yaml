identifier: Pfam:PF13971
label: Meiosis-specific protein Mei4
definition: >-
  Meiosis-specific protein MEI4 is required for meiotic induction of recombination, viable spore production and chromosome synapsis. It is a component of the MER2-MEI4-REC114 complex which seems to be required for meiotic double-strand break (DSB) formation. In Schizosaccharomyces pombe it is known as Rec24.
