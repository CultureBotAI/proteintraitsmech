identifier: Pfam:PF06962
label: Putative rRNA methylase
definition: >-
  This entry represents the family of tRNA (mnm(5)s(2)U34)-methyltransferase MnmM (also known as YtqB in Bacillus subtilis) and related proteins. This enzyme is involved in the biosynthesis of 5-methylaminomethyl-2-thiouridine (mnm5s2U) at the wobble position (U34) in tRNA by catalysing the transfer of a methyl group from S-adenosyl-L-methionine to nm5s2U34 to form mnm5s2U34. It adopts a typical SAM-dependent class I methyltransferase fold.
