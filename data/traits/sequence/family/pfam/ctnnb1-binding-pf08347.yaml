identifier: Pfam:PF08347
label: N-terminal CTNNB1 binding
definition: >-
  This region tends to appear at the N terminus of proteins also containing DNA-binding HMG (high mobility group) boxes ( ) and appears to bind the armadillo repeat of CTNNB1 (beta-catenin), forming a stable complex. Signalling by Wnt through TCF/LCF is involved in developmental patterning, induction of neural tissues, cell fate decisions and stem cell differentiation. Isoforms of HMG T-cell factors lacking the N-terminal CTNNB1-binding domain cannot fulfil their role as transcriptional activators in T-cell differentiation.
