identifier: Pfam:PF04752
label: ChaC-like protein
definition: >-
  The ChaC family of proteins function as gamma-glutamyl cyclotransferases acting specifically to degrade glutathione but not other gamma-glutamyl peptides. It is is conversed across all phyla and represents a new pathway for glutathione degradation in living cells.
