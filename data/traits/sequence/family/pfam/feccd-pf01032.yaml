identifier: Pfam:PF01032
label: FecCD transport family
definition: >-
  This entry represents a family of ABC transporter permease proteins. It includes the vitamin B12 import system permease protein BtuC, and the Fe(3+) dicitrate transport system permease proteins FecC and FecD, among many others. BtuC is a component of the ABC transporter complex BtuCD, which facilitates uptake of vitamin B12 into the cytoplasm of Escherichia coli. FecC and FecD are components of of the fec operon, a Periplasmic-Binding-Protein (PBP)-dependent transport system for ferric dicitrate in Escherichia coli. FecC and FecD exhibit homology to each other and are localized in the cytoplasmic membrane.
