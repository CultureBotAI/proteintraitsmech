identifier: Pfam:PF12788
label: Spore germination protein GerY/YamF
definition: >-
  This entry represents spore germination protein GerY and related proteins. GerY is a spore protein that enables efficient transit of nutrients across the spore coat to trigger germination. It is required for efficient spore germination in response to both L-alanine and a mixture of L-asparagine, D-glucose, D-fructose, and potassium ions (AGFK). GerY functions independently of two other coat-associated factors, GerT and GerP, which are also required for efficient germination.
