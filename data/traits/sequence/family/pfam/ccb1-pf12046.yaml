identifier: Pfam:PF12046
label: Cofactor assembly of complex C subunit B
definition: >-
  Cofactor maturation pathways such as the CCB system (system IV) for cytochrome c-heme attachment are conserved in all organisms performing oxygenic photosynthesis. The CCB system consists of four proteins: CCB1-4. The four CCBs are well conserved between green algae and plants. This entry represents CBB1.
