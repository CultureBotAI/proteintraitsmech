identifier: Pfam:PF11419
label: Protein of unknown function (DUF3194)
definition: >-
  Proteins in this family contain a novel α+β fold, consisting of two α-helices (one N-terminal and one C-terminal) packed on the same side of a central β-hairpin. They share the structural similarity to Escherichia coli MinE , a protein which controls that division occurs at the midcell site. Uncharacterised proteins from archaea are represented by this entry, including PH0533, MTH_677 , UNCMA_09870, NP_0614A, TK0644, PF0383 and PYRAB15120.
