identifier: Pfam:PF16094
label: Proteasome assembly chaperone 4
definition: >-
  This entry represents proteasome assembly chaperone 1 (PAC1). The 26S proteasome plays a critical role in a number of cellular processes including cell-cycle control, transcription, signal transduction and DNA repair. This complex is composed of a catalytic 20S proteasome and two axially positioned 19S regulatory complexes. The overall structure is highly conserved among eukaryotes and is essential for cell viability. Assembly of the catalytic 20S proteasome CP (core particle) initiates with the formation of rings composed of seven alpha subunits and involves proteasome-assembly chaperones PAC1-PAC2, PAC3-PAC4 and UMP1. Two heterodimeric proteasome-assembly chaperones, PAC1-PAC2 and PAC3-PAC4, interact with alpha subunits and promote the correct assembly of alpha rings. PAC3-PAC4 leaves the complex during subsequent assembly of beta subunits, while PAC1-PAC2 remains bound until the assembly of the CP is completed.
