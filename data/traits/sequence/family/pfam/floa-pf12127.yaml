identifier: Pfam:PF12127
label: Flotillin-like protein FloA
definition: >-
  This entry represents flotillin-like protein FloA from bacteria. Bacterial flotillin-like proteins are found in membrane microdomains that may be equivalent to eukaryotic membrane rafts. Similarly to eukaryotic flotillin proteins, flotillins in bacteria play an essential role in organizing and maintaining the correct architecture of the functional membrane microdomains. Bacillus subtilis has two flotillin paralogs, FloT and FloA. The absence of one of the flotillins has only minor effects, but the absence of both proteins has very severe effects: loss of proper cell shape, a defect in cell division.
