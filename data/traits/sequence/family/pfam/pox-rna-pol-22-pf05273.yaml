identifier: Pfam:PF05273
label: Poxvirus RNA polymerase 22 kDa subunit
definition: >-
  Vaccinia viral RNA synthesis is carried out by a virus coded, multi-subunit, eukaryotic-like RNA polymerase. RNA polymerase subunits are synthesized throughout infection and the assembled RNA polymerase is packaged into nascent virions late in infection. The RNA polymerase exists in two different forms, one specific for early genes and one specific for late genes. Both forms of the RNA polymerase have in common eight subunits, ranging in size from 147 to 7kDa This family consists of several poxvirus DNA-dependent RNA polymerase 22kDa subunits.
