identifier: Pfam:PF20988
label: Phosphoinositide phosphatase
definition: >-
  Legionella pneumophila modulates the host metabolism of phosphoinositides (PIs) to impair membrane trafficking and establish the Legionella-containing vacuole (LCV) for its own replication. The virulence factor SidF ( ) is a unique PI phosphatase that specifically hydrolyses PI(3,4)P2 and PI(3,4,5)P3. This protein shows a large single domain that resembles a cowboy hat, which consists of 19 α-helices located around a 10-stranded twisted β-sheet core ( ).
