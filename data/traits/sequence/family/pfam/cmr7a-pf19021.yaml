identifier: Pfam:PF19021
label: CRISPR system CMR subunit Cmr7 1
definition: >-
  In the CRISPR-Cas system, RNA is targeted by the CMR complex. In Sulfolobus solfataricus, this complex is composed of seven CAS protein subunits (Cmr1-7) and carries a diverse "payload" of targeting crRNA. This entry represents the Cmr7 subunit of the CMR complex. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
