identifier: Pfam:PF07294
label: Fibroin P25
definition: >-
  This family consists of several insect fibroin P25 proteins. Silk fibroin produced by the silkworm Bombyx mori consists of a heavy chain, a light chain, and a glycoprotein, P25. The heavy and light chains are linked by a disulphide bond, and P25 associates with disulphide-linked heavy and light chains by noncovalent interactions. P25 is plays an important role in maintaining integrity of the complex.
