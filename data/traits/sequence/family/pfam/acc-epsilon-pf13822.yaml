identifier: Pfam:PF13822
label: Acyl-CoA carboxylase epsilon subunit
definition: >-
  This family includes the epsilon subunits of propionyl-CoA carboxylase and acetyl-CoA carboxylase. These enzymes are involved in the biosynthesis of long-chain fatty acids. The epsilon subunit is necessary for an efficient interaction between the alpha and beta subunits of these enzymes. In Mycobacterium tuberculosis, the long-chain acyl-CoA carboxylase complex (LCC) contain the alpha-subunit AccA3, the epsilon-subunit AccE5 and the two beta-subunits AccD4 and AccD5. This entry represents AccE5 that interacts with AccD5 and modulates its carboxylase activity for acetyl-CoA and propionyl-CoA.
