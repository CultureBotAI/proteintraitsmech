identifier: Pfam:PF04227
label: Indigoidine synthase A like protein
definition: >-
  Members of this entry catalyse the hydrolysis of pseudouridine 5'-phosphate (PsiMP) to ribose 5-phosphate and uracil. It is also reported to be involved in the synthesis of indigoidine, which is a blue pigment synthesised by Erwinia chrysanthemi implicated in pathogenicity and protection from oxidative stress. IdgA is involved in indigoidine biosynthesis, but its specific function is unknown.
