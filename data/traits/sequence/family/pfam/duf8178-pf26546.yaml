identifier: Pfam:PF26546
label: Family of unknown function (DUF8178)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in the class Halobacteria. These proteins are predominantly found in members of the Haloferacaceae family, which are part of the Methanobacteriota phylum. The proteins in this family are typically around 60 amino acids in length. They are predicted to contain two transmembrane helices.
