identifier: Pfam:PF11993
label: VC2046 family
definition: >-
  This entry represents a group of family of uncharacterised proteins mainly found in gammaproteobacteria, including VC2046 from Vibrio cholerae (also known as QueD-like protein, ). They were annotated as ribosomal SSU S4 p proteins but there is not evidence supporting this, and it is, apparently, a missannotation. Proteins in this family are typically between 162 to 178 amino acids in length.
