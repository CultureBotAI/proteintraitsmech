identifier: Pfam:PF05777
label: Drosophila accessory gland-specific peptide 26Ab (Acp26Ab)
definition: >-
  This family consists of accessory gland-specific 26Ab peptides or male accessory gland secretory protein 355B from different Drosophila species. Drosophila males, like males of most other insects, transfer a group of specific proteins (Acp26Ab and Acp26Aa in Drosophila) to the females during mating. These proteins are produced primarily in the accessory gland and are likely to influence the female's reproduction.
