identifier: Pfam:PF05544
label: Proline racemase
definition: >-
  This family consists of proline racemase ( ), 4-hydroxyproline epimerase ( ), and trans-L-3-hydroxyproline dehydratase ( ). Proline racemase catalyses the interconversion of L- and D-proline in bacteria. Although the mechanisms of aminoacid racemisation and epimerisation are conserved between proline racemase and hydroxyproline epimerase, substrate specificity partly rely on constraints imposed by certain residues distinctively belonging to the catalytic pocket. A human proline racemase-like gene, lacking a specific cysteine residue critical for racemase activity, has been identified as a trans-3-hydroxy-L-proline dehydratase. This family also contains several proteins that remain uncharacterised.
