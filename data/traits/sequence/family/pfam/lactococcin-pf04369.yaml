identifier: Pfam:PF04369
label: Lactococcin-like family
definition: >-
  Bacteriocins are produced by bacteria to inhibit the growth of similar or closely related bacterial strains. The class II bacteriocins are small heat-stable proteins for which disulphide bonds are the only modification to the peptide. Lactococcin A and B are class-IId bacteriocins (one-peptide non-pediocin-like bacteriocin).
