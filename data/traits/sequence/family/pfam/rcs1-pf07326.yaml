identifier: Pfam:PF07326
label: Regulator of chromosome segregation 1
definition: >-
  RCS1 (also known as FAM64A, CATS or PIMREG) is a substrate of APC/C. It may control the metaphase to anaphase transition. It is also a substrate of the Kinase Interacting Stathmin (KIS). RCS1 is highly expressed in cancer cell lines in a cell cycle dependent manner and is induced by mitogens.
