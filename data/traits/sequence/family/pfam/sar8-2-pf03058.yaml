identifier: Pfam:PF03058
label: Sar8.2 family
definition: >-
  Members of this family are found in Solanaceae spp. plants, a taxonomic group (family) that includes pepper and tobacco plant species. Synthesis of these proteins is induced by Tobacco mosaic virus and salicylic acid; indeed they are thought to be involved in the development of systemic acquired resistance (SAR) after an initial hypersensitive response to microbial infection. SAR is characterised by long-lasting resistance to infection by a wide range of pathogens, extending to plant tissues distant from the initial infection site.
