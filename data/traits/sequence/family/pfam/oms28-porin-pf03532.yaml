identifier: Pfam:PF03532
label: OMS28 porin
definition: >-
  The outer membrane-spanning (Oms) proteins of Borrelia burgdorferi have been isolated and their porin activities characterised; 0.6-nS porin activity was found to reside in a 28kDa protein, designated Oms28. The gene sequence of oms28 was found to encode a 257-amino-acid precursor protein with a putative 24-amino-acid leader peptidase I signal sequence. The Oms28 protein partly fractionated to the outer membrane, and was characterised by an average single-channel conductance of 1.1 nS in a planar lipid bilayer assay, confirming Oms28 to be a porin.
