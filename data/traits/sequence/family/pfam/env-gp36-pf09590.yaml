label: Lentivirus surface glycoprotein
definition: >-
  The proteins in this family are envelope glycoproteins from feline immunodeficiency retrovirus. The process of lentiviral envelope glycoprotein-mediated fusion of membranes is essential for viral entry and syncytia formation.
