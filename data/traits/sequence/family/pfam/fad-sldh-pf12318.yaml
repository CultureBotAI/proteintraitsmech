identifier: Pfam:PF12318
label: 'Membrane bound FAD containing D-sorbitol dehydrogenase '
definition: >-
  There are two types of membrane-bound D-sorbitol dehydrogenase: PQQ-SLDH (pyrroloquinoline quinone sorbitol dehydrogenase) and FAD-SLDH (FAD-containing sorbitol dehydrogenase). FAD-SLDH is involved in oxidation of D-sorbitol to L-sorbose and consists of a large, small and cytochrome c subunits. This entry represents the small subunit of the FAD-containing D-sorbitol dehydrogenase. This family of proteins is found in bacteria and contains a conserved ALM sequence motif. The role of the small subunit is unknown.
