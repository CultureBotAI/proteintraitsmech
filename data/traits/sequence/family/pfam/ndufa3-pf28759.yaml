identifier: Pfam:PF28759
label: NADH dehydrogenase [ubiquinone] 1 alpha subcomplex subunit 3
definition: >-
  This entry represents NADH dehydrogenase [ubiquinone] 1 alpha subcomplex subunit 3 (NDUFA3), an accessory subunit of mitochondrial respiratory chain Complex I. NDUFA3 is believed not to be directly involved in catalysis but is required for complex assembly and stability. Complex I functions in the transfer of electrons from NADH to ubiquinone in the respiratory chain. The protein contains a single transmembrane helix and is localised to the mitochondrial inner membrane. In Drosophila, this protein is also known as purriato and is required for maintenance of muscle integrity and cell proliferation in wing imaginal discs, possibly through interaction with the chaperone-assisted selective autophagy (CASA) pathway. The protein shows weak sequence similarity to mammalian NDUFA3 but occupies the corresponding structural position in cryo-EM structures of Drosophila Complex I. This entry includes C.elegans uncharacterised protein K12H4.
