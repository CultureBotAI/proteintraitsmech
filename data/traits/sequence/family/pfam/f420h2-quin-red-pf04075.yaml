identifier: Pfam:PF04075
label: F420H(2)-dependent quinone reductase
definition: >-
  This entry represents a family of proteins found in paralogous families in the genera Mycobacterium and Streptomyces. Seven members are in Mycobacterium tuberculosis. Member protein Rv3547 has been characterised as a deazaflavin-dependent nitroreductase. Rv1558 is an F420H(2)-dependent quinone reductase involved in oxidative stress protection.
