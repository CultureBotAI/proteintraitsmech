identifier: Pfam:PF09809
label: Mitochondrial ribosomal protein L27
definition: >-
  This entry represents the large ribosomal subunit protein mL41, previously known as L27 in yeast and L41 in animals. mL41 is a component of the mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. The mitoribosomes are attached to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. Animal members of this family are also involved in apoptosis and cell cycle regulation. This group also includes some uncharacterised plant proteins.
