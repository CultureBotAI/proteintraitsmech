identifier: Pfam:PF02088
label: Ornatin
definition: >-
  Ornatin is a potent glycoprotein IIb-IIIa (GP IIb-IIIa) antagonist and platelet aggregation inhibitor. The protein is 41-52 residues in length and contains the RGD recognition motif common in adhesion proteins, and 6 conserved cysteine residues. The sequences of ornatin isoforms B, C, D and E are highly similar, while isoforms A2 and A3 are less similar, lacking the N-terminal 9 residues. Ornatins share ~40% identity with decorsin, a GP IIb-IIIa antagonist isolated from the leech (Macrobdella decora).
