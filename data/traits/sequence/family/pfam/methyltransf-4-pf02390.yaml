identifier: Pfam:PF02390
label: 'Putative methyltransferase '
definition: >-
  This entry represents tRNA (guanine-N-7) methyltransferase ( ), which catalyses the formation of N(7)-methylguanine at position 46 (m7G46) in tRNA. Capping of the pre-mRNA 5' end by addition a monomethylated guanosine cap (m(7)G) is an essential and the earliest modification in the biogenesis of mRNA. The reaction is catalysed by three enzymes: triphosphatase, guanylyltransferase, and tRNA (guanine-N-7) methyltransferase. This entry includes Bacillus subtilis TrmB, which contains a unique variant of the Rossmann-fold methyltransferase (RFM) structure, with the N-terminal helix folded on the opposite site of the catalytic domain. Methyltransferases (EC [ec:2.1.1.-]) constitute an important class of enzymes present in every life form. They transfer a methyl group most frequently from S-adenosyl L-methionine (SAM or AdoMet) to a nucleophilic acceptor such as oxygen leading to S-adenosyl-L-homocysteine (AdoHcy) and a methylated molecule. All these enzymes have in common a conserved region of about 130 amino acid residues that allow them to bind SAM. The substrates that are methylated by these enzymes cover virtually every kind of biomolecules ranging from small molecules, to lipids, proteins and nucleic acids. Methyltransferase are therefore involved in many essential cellular processes including biosynthesis, signal transduction, protein repair, chromatin regulation and gene silencing. More than 230 families of methyltransferases have been described so far, of which more than 220 use SAM as the methyl donor.
