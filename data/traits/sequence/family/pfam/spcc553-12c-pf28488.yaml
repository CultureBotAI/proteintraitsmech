identifier: Pfam:PF28488
label: SPCC553.12c
definition: >-
  This entry represents the SPCC553.12c family of uncharacterised membrane proteins. Members of this family are predicted to be multi-pass membrane proteins containing ten transmembrane helices. These proteins are found in fungi and are predicted to have transmembrane transporter activity. The function of this protein family remains to be determined.
