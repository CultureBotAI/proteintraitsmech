identifier: Pfam:PF01917
label: Archaeal-type flagellin
definition: >-
  This protein family represents archaeal Flagellin B1-B5, Flagellin A-A2 and similar proteins mainly found in archaea. A group of uncharacterised bacterial sequences is also included in this group. Archaeal motility occurs by the rotation of flagella that are different to bacterial flagella, but show similarity to bacterial type IV pili. These similarities include the multiflagellin nature of the flagellar filament, N-terminal sequence similarities, as well as the presence of homologous proteins in the two systems. Also unlike bacterial flagellins but similar to type IV pilins, archaeal flagellins are initially synthesised with a short leader peptide that is cleaved by a membrane-located peptidase. The enzyme responsible for the removal of the this leader peptide is FlaK. Archaeal flagella are composed of a number of distinct flagellin proteins, specified by genes in two separate operons (A and B).
