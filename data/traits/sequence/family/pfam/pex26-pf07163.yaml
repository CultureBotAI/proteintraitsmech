identifier: Pfam:PF07163
label: Pex26 protein
definition: >-
  Pex26 is a type II peroxisomal membrane protein that recruits Pex6-Pex1 complexes to peroxisomes. Mutations in the Pex26 gene cause peroxisome biogenesis disorder complementation group 8 (PBD-CG8) and peroxisome biogenesis disorder 7A/B (PBD7A/B).
