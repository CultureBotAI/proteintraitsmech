identifier: Pfam:PF00675
label: Insulinase (Peptidase family M16)
definition: >-
  This entry represents an N-terminal domain found in metallopeptidases and non-peptidase homologues belonging to MEROPS peptidase family M16 (clan ME), subfamilies M16A, M16B and M16C. Members of this group of proteins include: Insulinase, insulin-degrading enzyme ( ) Mitochondrial processing peptidase alpha subunit, (Alpha-MPP, ) Pitrilysin, Protease III precursor ( ) Nardilysin ( ) Ubiquinol-cytochrome C reductase complex core protein I,mitochondrial precursor ( ) Coenzyme PQQ synthesis protein F ( ) These proteins do not share many regions of sequence similarity; the most noticeable is in the N-terminal section. This region includes a conserved histidine followed, two residues later by a glutamate and another histidine. In pitrilysin, it has been shown that this H-x-x-E-H motif is involved in enzymatic activity; the two histidines bind zinc and the glutamate is necessary for catalytic activity. The proteins classified as non-peptidase homologues either have been found experimentally to be without peptidase activity, or lack amino acid residues that are believed to be essential for the catalytic activity.
