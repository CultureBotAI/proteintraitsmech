identifier: Pfam:PF04923
label: 'Ninjurin '
definition: >-
  Ninjurin (nerve injury-induced protein) proteins are transmembrane adhesion molecules involved in nerve regeneration and in various processes such as inflammation, programmed and necrotic cell death, axonal growth, cell chemotaxis and angiogenesis.
