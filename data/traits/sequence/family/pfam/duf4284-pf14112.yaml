identifier: Pfam:PF14112
label: Immunity protein 22
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and conserved tryptophan,tyrosine and an acidic residues. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, which usually contains toxin domains of the ColD/E5, Tox-REase-4, Ntox49 or Ntox14 families. The domain is also found in heterogeneous polyimmunity loci.
