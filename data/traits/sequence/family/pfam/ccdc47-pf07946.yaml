identifier: Pfam:PF07946
label: PAT complex subunit CCDC47
definition: >-
  This family represents CCDC47 proteins which are a component of the PAT complex, an endoplasmic reticulum (ER)-resident membrane multiprotein complex that facilitates multi-pass membrane proteins insertion into membranes. The PAT complex, formed by CCDC47 and Asterix proteins, acts as an intramembrane chaperone by directly interacting with nascent transmembrane domains (TMDs), releasing its substrates upon correct folding, and is needed for optimal biogenesis of multi-pass membrane proteins. WDR83OS/Asterix is the substrate-interacting subunit of the PAT complex, whereas CCDC47 ( ) is required to maintain the stability of WDR83OS/Asterix. The PAT complex favors the binding to TMDs with exposed hydrophilic amino acids within the lipid bilayer and provides a membrane-embedded partially hydrophilic environment in which TMD1 binds. CCDC47 is associated with various membrane-associated processes and is a component of a ribosome-associated ER translocon complex involved in multi-pass membrane protein transport into the ER membrane and biogenesis. It is also involved in the regulation of calcium ion homeostasis in the ER, being also required for proper protein degradation via the ERAD (ER-associated degradation) pathway. This entry also includes the uncharacterised proteins YNR021W from S. cerevisiae, C2G5.01 from S. pombe and At5g49945 from Arabidopsis.
