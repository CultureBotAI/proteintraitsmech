identifier: Pfam:PF05032
label: Spo12 family
definition: >-
  This entry includes budding yeast Spo12 and its paralogue, Bns1, that arose from the whole genome duplication. Spo12 plays a regulatory role in two of the most fundamental processes of biology, mitosis and meiosis, and yet its biochemical function remains elusive. Spo12 is a nuclear protein. Spo12 is a component of the FEAR (Cdc fourteen early anaphase release) regulatory network, which promotes Cdc14 release from the nucleolus during early anaphase. The FEAR network is comprised of the polo kinase Cdc5, the separase Esp1, the kinetochore-associated protein Slk19, and Spo12.
