identifier: Pfam:PF24132
label: Family of unknown function (DUF7399)
definition: >-
  This entry represents a family of phage proteins. The proteins appear to contain two domains. The N-terminal domain contains a small β-sheet wrapped around an α-helix. The second domain is composed of a pair of α-helices. The proteins are found in several viruses within the proposed new Crassvirales order of bacteriophages.
