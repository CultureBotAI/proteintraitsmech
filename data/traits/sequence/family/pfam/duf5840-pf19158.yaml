identifier: Pfam:PF19158
label: Family of unknown function (DUF5840)
definition: >-
  Members of this protein family occur primarily in Cyanobacteria. They average about 50 residues in length and are the ribosomally translated precursors of peptide natural products whose modifications include cleavage, cyclization, and prenylation. Sequences are well-conserved in the N-terminal region. They are nearly invariant over the last eight residues, but hypervariable just before that stretch. Cyanobactins are small, cyclic peptides found in cyanobacteria. They are ribosomally synthesised and post-translationally modified. Anaclyclamides are a type of cyanobactin produced in strains of the cyanobacteria Anabaena. Anacyclamide synthesis protein AcyE is a 49-amino-acid protein with N-terminal homology to the peptide precursor proteins in the other cyanobactin pathways. The core peptide of AcyE is cleaved during post-translational processing of the precursor peptide.
