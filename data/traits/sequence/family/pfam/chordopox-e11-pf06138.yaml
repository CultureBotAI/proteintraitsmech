identifier: Pfam:PF06138
label: Chordopoxvirus E11 protein
definition: >-
  This family consists of several Chordopoxvirus E11 proteins. The E11 gene of vaccinia virus encodes a 15kDa polypeptide also known as Core protein OPG073. Mutations in the E11 gene makes the virus temperature-sensitive due to either the fact that virus infectivity requires a threshold level of active E11 protein or that E11 function is conditionally essential.
