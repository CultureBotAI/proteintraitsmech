identifier: Pfam:PF05978
label: Ion channel regulatory protein UNC-93
definition: >-
  This family represents UNC-93 from Caenorhabditis elegans, protein unc-93 homologue A (UNC93A) and UNC93-like protein MFSD11 (also called major facilitator superfamily domain-containing protein 11 or protein ET) from mammals, and similar eukaryotic proteins. UNC-93 colocalises with SUP-10 and SUP-9 within muscle cells. UNC-93 acts as a regulatory subunit of a multi-subunit potassium channel complex that may function in coordinating muscle contraction in C. elegans. MFSD11 is ubiquitously expressed in the periphery and the central nervous system of mice, where it is expressed in excitatory and inhibitory mouse brain neurons.
