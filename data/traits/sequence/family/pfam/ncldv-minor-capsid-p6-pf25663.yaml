identifier: Pfam:PF25663
label: Nucleocytoplasmic large DNA virus minor capsid protein P6
definition: >-
  This entry represents the minor capsid protein P6 found in nucleocytoplasmic large DNA viruses (NCLDVs). In Paramecium bursaria chlorella virus 1 (PBCV-1), P6 plays a role in stabilising the pentasymmetron structures of the viral capsid. The protein has a distinctive structural organisation with an N-terminal arm (residues 26-60), a central globular domain consisting of a five-stranded antiparallel β-sheet wrapped around a central α-helix and flanked by another α-helix, and a C-terminal arm (residues 177-214). The central globular domain is located at the conjunction of capsomers c, d, and f, with its C-terminal arm making contact with the central 3-fold cavity of capsomer d. P6 is likely membrane-associated, with transmembrane helix predictions suggesting the N-terminal may contain transmembrane regions. The short linker between the predicted transmembrane helix and the ordered portion of the protein suggests that the visible portion of P6 is close to the viral inner membrane.
