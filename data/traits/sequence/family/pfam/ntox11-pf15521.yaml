identifier: Pfam:PF15521
label: Novel toxin 11
definition: >-
  This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin contains two structural domains, an N-terminal α/β domain and a C-terminal all-β domain. This domain contains conserved GxR, RxxxoH GxE and GxxH motifs and a conserved histidine residue. In bacterial polymorphic toxin systems, the toxin is usually exported by the Photorhabdus virulence cassette (PVC)-type export system.
