identifier: Pfam:PF23828
label: Family of unknown function (DUF7198)
definition: >-
  This entry represents a family of putative phage membrane proteins. It is characterised by a single transmembrane helix at the N-terminal that likely serves to anchor these proteins to the membrane. The exact functions of the proteins containing this domain remain unknown This entry also includes some uncharacterised bacterial proteins.
