identifier: Pfam:PF06934
label: Fatty acid cis/trans isomerase (CTI)
definition: >-
  This family consists of several fatty acid cis/trans isomerase proteins, which appear to be found exclusively in bacteria of the orders Vibrionales and Pseudomonadales. Cis/trans isomerase (CTI) catalyses the cis-trans isomerisation of esterified unsaturated fatty acids in phospholipids, mainly palmitoleic acid (C16:1) and cis-vaccenic acid (C18:1), in response to toxic organic solvents, heat and osmotic stress, and heavy metals. The CTI protein is located in the periplasm and has been shown to be involved in solvent tolerance in Pseudomonas strains.
