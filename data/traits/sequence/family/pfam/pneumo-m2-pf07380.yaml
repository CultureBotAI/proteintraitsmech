identifier: Pfam:PF07380
label: Pneumovirus M2 protein
definition: >-
  This family consists of several Pneumovirus M2-2 proteins. The M2-2 protein acts as a regulatory factor that mediates the switch from transcription to RNA replication. It acts late in infection in which it inhibits viral transcription and up-regulates RNA replication, mediated by phosphorylation of the P protein.
