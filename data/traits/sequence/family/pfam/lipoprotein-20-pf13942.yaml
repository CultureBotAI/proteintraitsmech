identifier: Pfam:PF13942
label: YfhG lipoprotein
definition: >-
  Quorum-sensing regulator protein G (QseG, also known as YfhG) is involved in the regulation of virulence and metabolism in enterohemorrhagic Escherichia coli (EHEC). It is required for pedestal formation in host epithelial cells during infection and for translocation of effector molecules into host epithelial cells.
