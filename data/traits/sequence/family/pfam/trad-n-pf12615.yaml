identifier: Pfam:PF12615
label: F sex factor protein N terminal
definition: >-
  This entry represents the N-terminal domain in TraD proteins. The plasmid conjugative coupling protein TraD (also known as TrwB) is an integral inner membrane protein that binds nucleoside triphosphates. It serves as the structural prototype for type IV secretion system coupling proteins, a family essential for macromolecular transport between cells. TrwB assembles as a hexamer composed of six structurally similar protomers. The hexameric complex adopts a mushroom-like architecture, featuring a central channel that extends from the cytosolic pole to the membrane pole. The cytosolic region is formed by all-α domains, which constitute the DNA-binding domain of the structure, whilst the membrane-embedded region comprises 12 transmembrane helices that form a pore.
