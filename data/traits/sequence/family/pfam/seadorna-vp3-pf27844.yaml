identifier: Pfam:PF27844
label: Seadornavirus VP3 protein
definition: >-
  Members of this protein family are VP3 proteins in the seadornavirus group. They display sequence similarity to methyltransferases. Viral guanylyltransferase VP3 from Banna virus is an outer capsid protein involved in mRNA capping, catalysing the final three activities (RNA guanylyltransferase, RNA-7N-methyltransferase and RNA-2'O-methyltransferase) required for the formation of 5' cap structure.
