identifier: Pfam:PF02958
label: Ecdysteroid kinase-like family
definition: >-
  This family includes ecdysteroid 22-kinase, an enzyme responsible for the phosphorylation of ecdysteroids (insect growth and moulting hormones) at C-22, to form physiologically inactive ecdysteroid 22-phosphates. Most insects contain 12 to 105 genes encoding this family and yet so far only one enzyme (ecdysteroid 22-kinase from Bombyx mori) has characterised substrates (2-deoxyecdysone, ecdysone, 20-hydroxyecdysone). There are good reasons to believe that this family includes kinases that act on other small molecule substrates and that they may function in detoxification processes.
