identifier: Pfam:PF08093
label: Magi 5 toxic peptide family
definition: >-
  This family consists of toxic peptides (Magi 5) found in the venom of the Hexathelidae spider. Magi 5 is the first spider toxin with binding affinity to site 4 of a mammalian sodium channel and the toxin has an insecticidal effect on larvae, causing paralysis when injected into the larvae. This entry also includes some proteins from the omega-atracotoxin type 2 family.
