identifier: Pfam:PF30515
label: Cyanobacterial RNA-binding protein Asl3888-like
definition: >-
  This entry represents a small protein of approximately 60 to 70 residues found in cyanobacteria and photosynthetic eukaryotes. In Nostoc PCC 7120, Asl3888 has been validated as an RNA-binding protein through quantitative mass spectrometry analysis of RNA-protein complexes. The family is present in Cyanobacteria (Oscillatoriales, Nostocales, Chroococcales) and in Stramenopiles (Ochrophyta). The specific RNA targets and biological function of this protein remain to be determined.
