identifier: Pfam:PF03547
label: Membrane transport protein
definition: >-
  This entry represents a family of membrane transport proteins found in eukaryotes, bacteria and archaea. Most characterised members of this family are the PIN components of auxin efflux systems from plants. These carriers are saturable, auxin-specific, and localized to the basal ends of auxin transport-competent cells. Plants typically possess several of these proteins, each displaying a unique tissue-specific expression pattern. They are expressed in almost all plant tissues including vascular tissues and roots, and influence many processes including the establishment of embryonic polarity, plant growth, apical hook formation in seedlings and the photo- and gravitropic responses. These plant proteins are typically 600-700 amino acyl residues long and exhibit 8-12 transmembrane segments. This entry also covers the transmembrane region of GPR1155 from human, a cholesterol-binding protein that acts as a regulator of mTORC1 signaling pathway.
