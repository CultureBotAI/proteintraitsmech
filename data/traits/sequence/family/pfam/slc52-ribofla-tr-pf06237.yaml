identifier: Pfam:PF06237
label: Solute carrier family 52, riboflavin transporter
definition: >-
  This entry includes a group of animal riboflavin transporters, including SLC52A1, SLC52A2 and SLC52A3 from humans which belong to the MFS superfamily. They are plasma membrane proteins that transport vitamin B2 (riboflavin, RF) into cells. In case of infection by retroviruses, they act as cell receptors to retroviral envelopes similar to the porcine endogenous retrovirus (PERV-A). Mutations in these transporters are associated with Brown-Vialetto-Van Laere Syndrome (BVVLS), a rare neurological disorder characterised by progressive pontobulbar palsy, sensorineural hearing loss and respiratory insufficiency.
