identifier: Pfam:PF05440
label: Tetrahydromethanopterin S-methyltransferase subunit B
definition: >-
  Members of this protein family are the MtrB protein of the tetrahydromethanopterin S-methyltransferase complex. This system is universal in archaeal methanogens. The N5-methyltetrahydromethanopterin: coenzyme M ( ) of Methanosarcina mazei Go1 is a membrane-associated, corrinoid-containing protein that uses a transmethylation reaction to drive an energy-conserving sodium ion pump.
