identifier: Pfam:PF06999
label: Sucrase/ferredoxin-like
definition: >-
  This entry includes proteins from fungi, plants and bacteria. Proteins in this entry contain a ferredoxin-like fold. They are predicted ferredoxins, which are iron-sulfur (Fe-S) proteins that may play a role in redox sensing and electron transfer. Some members appear to have sucrolytic activity. The putative active site of the ferredoxin-like domain of the enzyme contains two cysteines and two histidines for possible binding to iron-sulfur clusters, compared to four cysteines present in the active site of ferredoxin. Two budding yeast proteins, Aim32 and Apd1, are included in this entry. Apd1 is an Fe-S protein and is involved in cellular defense against hydroxyurea. It is required for normal localisation of actin patches in budding yeasts. The function of Aim32 is not clear.
