identifier: Pfam:PF14766
label: Replication protein A interacting N-terminal
definition: >-
  This entry represents the N-terminal domain of replication protein A (RPA) interacting protein. RPA is a single stranded DNA-binding protein involved in DNA replication, repair, and recombination. RPA interacting protein is involved in the import of RPA into the nucleus. The N-terminal domain is is rich in basic residues and responsible for interaction with importin beta.
