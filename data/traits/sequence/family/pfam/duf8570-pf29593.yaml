identifier: Pfam:PF29593
label: Family of unknown function (DUF8570)
definition: >-
  This entry represents a small protein family found in both bacteria and viruses. Bacterial members are present in Bacillus and related genera (Bacillaceae), whilst viral members are found in bacteriophages (Takahashivirus). One bacterial member is annotated as a putative secreted or membrane protein. AlphaFold structural predictions are available for some members. The function of this protein family remains to be determined.
