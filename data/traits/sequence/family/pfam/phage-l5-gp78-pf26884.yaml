identifier: Pfam:PF26884
label: Mycobacterium phage L5 gene 78 protein
definition: >-
  This entry represents the gene 78 protein family found in L5-like mycobacteriophages. Gene 78 protein is an uncharacterised protein of 45 amino acids (5.5 kDa) found in Mycobacterium phage L5. The protein is predicted to be entirely disordered with regions enriched in basic and acidic residues.
