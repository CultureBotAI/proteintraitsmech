identifier: Pfam:PF29131
label: Arginine-containing cyclodipeptide synthase
definition: >-
  This entry represents the arginine-containing cyclodipeptide synthase (RCDPS) family of enzymes found in fungi and bacteria. ANKA is the scaffold-generating enzyme in the ank biosynthetic cluster responsible for formation of cyclo-arginine-tyrosine diketopiperazine from L-arginyl-tRNA and L-tyrosyl-tRNA. This cyclodipeptide serves as the core structure for highly modified natural products such as NK13650 C. The enzyme contains a conserved DDXXE motif (residues 396-400) essential for catalytic activity. Members of this family are found across fungal species including Aspergillus and Penicillium, as well as in bacterial species. These enzymes play important roles in secondary metabolite biosynthesis pathways.
