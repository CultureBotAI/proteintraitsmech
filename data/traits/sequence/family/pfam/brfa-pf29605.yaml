identifier: Pfam:PF29605
label: Bacillus ribosome rescue factor A
definition: >-
  This entry represents BrfA, an RF2-dependent ribosome rescue factor in Gram-positive bacteria. BrfA rescues ribosomes stalled on truncated non-stop mRNAs by recruiting release factor RF2 and inducing its transition into an open active conformation, enabling stop-codon-independent peptidyl-tRNA hydrolysis. BrfA exhibits synthetic lethality with trans-translation deficiency, indicating both systems are essential for cellular growth. The protein is naturally expressed from a non-stop mRNA containing an internal transcription terminator, resulting in negative regulation by the trans-translation system. This regulatory mechanism ensures BrfA functions as a backup ribosome rescue system activated upon trans- translation dysfunction. The family is found in Bacillales, particularly in Paenibacillus and Cohnella.
