identifier: Pfam:PF05396
label: Phage T7 capsid assembly protein
definition: >-
  This family includes the capsid assembly protein Gp9 (scaffolding protein) of bacteriophage T7, similar viral proteins and prophages from Proteobacteria. Gp9 facilitates assembly by binding to Gp10 hexamers but not the pentamers and locking them into a morphogenically correct conformation.
