identifier: Pfam:PF27119
label: YdaY prophage protein
definition: >-
  This entry represents the YdaY protein family found in Escherichia coli and related bacteria. YdaY is a small protein of approximately 119 amino acids encoded within the Rac prophage. The protein has been shown to interact with MurE (UDP-N-acetylmuramoyl-L-alanyl-D-glutamate:meso-2,6- diaminopimelate ligase), which is involved in peptidoglycan biosynthesis, and with YeeN, an uncharacterised protein. The ydaY gene may be subject to ribosomal frameshifting. The specific function of YdaY remains to be determined, but its prophage origin and interaction with cell wall biosynthesis machinery suggests it may play a role in modulating host cell processes during prophage maintenance or induction.
