identifier: Pfam:PF25666
label: Partitivirus capsid protein
definition: >-
  This entry represents the capsid protein of partitiviruses. The capsid protein self-assembles to form an icosahedral capsid with a T=2 symmetry made of 120 subunits. In partitiviruses, one dsRNA segment typically encodes the viral RNA-dependent RNA polymerase, while the second segment encodes the capsid protein. The Partitiviridae family includes viruses that infect fungi, plants, and protozoa. This family was first characterised in the filamentous ascomycete Atkinsonella hypoxylon. This entry also includes uncharacterised proteins from small bugs that usually infect plants.
