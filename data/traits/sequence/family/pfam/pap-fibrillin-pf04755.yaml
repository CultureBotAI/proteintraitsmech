identifier: Pfam:PF04755
label: PAP_fibrillin
definition: >-
  This entry represents a conserved domain found in a number of plastid lipid-associated proteins (PAPs), including Fibrillin-5 (FBN5) from Arabidopsis and CHRC from Oncidium hybrid cultivar. Fibrillins accumulate in chromoplasts and sequester carotenoids during the development of flowers and fruits. FBN5 has been shown to be involved in PQ-9 (Plastoquinone-9) biosynthesis in Arabidopsis and rice. CHRC is a corolla-specific carotenoid-associated protein and a major component of carotenoid-lipoprotein complexes in Cucumis sativus chromoplasts.
