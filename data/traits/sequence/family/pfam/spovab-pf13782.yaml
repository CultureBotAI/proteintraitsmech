identifier: Pfam:PF13782
label: Stage V sporulation protein AB
definition: >-
  This entry represents stage V sporulation protein AB (SpoVAB), which is involved in spore germination and is located in the spores' inner membrane. In Bacillus subtilis, SpoVA proteins are a component of a dipicolinic acid (DPA) channel in the spore's inner membrane and are involved in DPA release.
