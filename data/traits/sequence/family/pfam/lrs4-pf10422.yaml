identifier: Pfam:PF10422
label: Monopolin complex subunit LRS4
definition: >-
  Monopolin is a protein complex, originally identified in Saccharomyces cerevisiae (Baker's yeast), that is required for the segregation of homologous centromeres to opposite poles of a dividing cell during meiosis I. The orthologous complex in Schizosaccharomyces pombe (Fission yeast) is not required for meiosis I chromosome segregation, but is proposed to play a similar physiological role in clamping microtubule binding sites. In S. cerevisiae this subunit is called Lrs4, and in S. pombe it is known as Mde4.
