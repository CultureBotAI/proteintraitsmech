identifier: Pfam:PF26843
label: Kil protein family
definition: >-
  The Kil protein family is involved in inducing significant morphological changes in host cells, leading to cell enlargement and a predominantly spherical shape. These alterations may result in cell death. The mechanism of action might involve interaction, either directly or indirectly, with the host's actin-like protein MreB, suggesting a potential role in cytoskeletal rearrangement. Structure prediction suggests that this protein may form a homodimer.
