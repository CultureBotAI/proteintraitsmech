identifier: Pfam:PF19224
label: pATOM36 family
definition: >-
  This entry represents the trypanosome peripherally associated ATOM36 protein (pATOM36) which is an essential component of the outer mitochondrial membrane protein import system that interacts with ATOM (archaic translocase of the outer mitochondrial membrane), being involved in the assembly and/or membrane insertion of proteins included in the ATOM complex. This protein also promotes protein translocation into the mitochondrial matrix.
