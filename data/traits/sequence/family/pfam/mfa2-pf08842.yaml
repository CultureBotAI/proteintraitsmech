identifier: Pfam:PF08842
label: Fimbrillin-A associated anchor proteins Mfa1 and Mfa2
definition: >-
  Many Bacteroides-like bacterial species, including Porphyromonas gingivalis, the causal agent of periodontal infection, carry at least two types of fimbriae, namely FimA and Mfa1 fimbriae, following the names of their major subunit proteins. Normally, FimA fimbriae are long filaments that are easily detached from cells, whereas Mfa1 fimbriae are short filaments that are tightly bound to cells. In many bacteria, the gene encoding the major fimbrilin typically forms a cluster with several additional genes encoding fimbrial minor components. FimB, the product of the gene immediately downstream of the fimA gene, regulates the length and expression of FimA fimbriae. Additionally, FimB functions as an anchor of the fimbriae. Similarly, Mfa2 seems to regulate the length and attachment of Mfa1 fimbriae. Mfa2 and Mfa1 are associated with each other in whole P. gingivalis cells to the extent that Mfa2 is located on the cell surface and probably associated with Mfa1 fimbriae in such a way that it anchors the Mfa1 fimbriae to the cell surface and regulates Mfa1 filament length. Mfa3 is a tip protein of the Mfa1 fimbriae that may function in the integration of accessory proteins and in the colonization of P. gingivalis. .
