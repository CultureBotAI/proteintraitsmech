identifier: Pfam:PF13825
label: Paramyxovirus structural protein V/P N-terminus
definition: >-
  The replicative complex of Paramyxoviridae consists of proteins N, P and L. Transcription and replication are carried out on the N/RNA template by a RNA-dependent RNA polymerase complex, made of the phosphoprotein (P) and the large protein (L). P is organised into two moieties that are functionally and structurally distinct: a C-terminal moiety (PCT) and an N-terminal moiety (PNT). PCT is the most conserved in sequence and contains all regions required for virus transcription, whereas PNT, which is poorly conserved, provides several additional functions required for replication. P protein plays a crucial role in the enzyme by positioning L onto the N/RNA template through an interaction with the C-terminal domain of N. Without P, L is not functional. The N-terminal part of P (PNT) is a chaperone for N and prevents it from binding to non-viral RNA in the infected cell. This entry represents the PNT domain, found in several Paramyxoviridae (mainly Morbillivirus) structural protein P and V sequences. V is a non-structural protein translated from an edited mRNA that contains an extra G residue.
