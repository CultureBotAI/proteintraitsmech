identifier: Pfam:PF02056
label: Family 4 glycosyl hydrolase
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 4 ( ) is a protein family that comprises enzymes with several known activities; 6-phospho-beta-glucosidase ( ); 6-phospho-alpha-glucosidase ( ); alpha-galactosidase ( ). These enzymes require both NAD(H) and divalent metal (such asMn2+, Fe2+, Co2+, or Ni2+) for its activity.
