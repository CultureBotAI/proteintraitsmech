identifier: Pfam:PF14027
label: Questin oxidase-like
definition: >-
  This family consists of oxidoreductases involved in the synthesis of different polyketides and derivatives. Questin oxidase GedK from Aspergillus terreus catalyses the ring cleavage of the anthraquinone questin to form benzophenone desmethylsulochrin. It is part of the gene cluster that mediates the biosynthesis of geodin, an intermediate in the biosynthesis of other natural products. MdpL from Emericella nidulans is part of the gene cluster that mediates the biosynthesis of monodictyphenone. TpcI from Neosartorya fumigata is part of the gene cluster that mediates the biosynthesis of trypacidin, a mycotoxin with antiprotozoal activity and that plays a role in the infection process. This entry also includes ptaJ from Pestalotiopsis fici, AflY from Aspergillus parasiticus, CPUR_05427 from the phytopathogenic Claviceps purpurea, AgnL3 from Paecilomyces divaricatus and NotM from Aspergillus sp.. PtaJ is part of the gene cluster that mediates the biosynthesis of pestheic acid, a diphenyl ether which is a biosynthetic precursor of the unique chloropupukeananes. AflY is part of the gene cluster that mediates the biosynthesis of aflatoxins, the most toxic and carcinogenic compounds among the known mycotoxins. CPUR_05427 is part of the ergochrome gene cluster that is responsible for the typical purple-black color of the sclerotia containing the toxic ergot alkaloids. AgnL3 is part of the gene cluster that mediates the biosynthesis of agnestins, dihydroxy-xanthone metabolites. NotM is part of the gene cluster that mediates the biosynthesis of notoamide that is a fungal indole alkaloid.
