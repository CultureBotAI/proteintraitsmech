identifier: Pfam:PF05947
label: Type VI secretion system, TssF
definition: >-
  This entry represents a group of Gram-negative bacterial proteins that form part of the type VI pathogenicity secretion system (T6SS), including TssF. TssF is an essential baseplate component of the type VI secretion system. TssF is a homologue of phage tail proteins and is required for proper assembly of the Hcp tube (the T6SS inner tube) in bacteria. The cryoEM structure of a TssK-TssF-TssG complex revealed that TssF comprises 3 domains; an α-helical N-terminal domain, a central domain made up of three β-barrels and a C-terminal four-stranded mixed β-sheet packed against α-helices via a hydrophobic core. TssF and TssG assembled into a heterotrimer with 2:1 stoichiometry. The type VI secretion system (T6SS), also known as CIS contractile injection system, is a supra-molecular bacterial complex that resembles phage tails. It is a toxin delivery systems which fires toxins into target cells upon contraction of its TssBC sheath. Thirteen essential core proteins are conserved in all T6SSs: the membrane associated complex TssJ-TssL-TssM, the baseplate proteins TssE, TssF, TssG, and TssK, the bacteriophage-related puncturing complex composed of the tube (Hcp), the tip/puncturing device VgrG, and the contractile sheath structure (TssB and TssC). Finally, the starfish-shaped dodecameric protein, TssA, limits contractile sheath polymerization at its distal part when TagA captures TssA.
