identifier: Pfam:PF01679
label: Proteolipid membrane potential modulator
definition: >-
  Proteolipid membrane potential modulator is an evolutionarily conserved proteolipid in the plasma membrane which, in S. pombe, is transcriptionally regulated by the Spc1 stress MAPK (mitogen-activated protein kinases) pathway. It functions to modulate the membrane potential, particularly to resist high cellular cation concentration. In eukaryotic organisms, stress-activated mitogen-activated protein kinases play crucial roles in transmitting environmental signals that will regulate gene expression for allowing the cell to adapt to cellular stress. Pmp3-like proteins are highly conserved in bacteria, yeast, nematode and plants. Proteins in this entry include the PMP3 as well as several other proteins that have been shown to be evolutionary related. These are small proteins of from 52 to 140 amino-acid resiudes that contain two transmembrane domains and belong to the UPF0057 (PMP3) protein family.
