identifier: Pfam:PF06609
label: Fungal trichothecene efflux pump (TRI12)
definition: >-
  This entry represents a group of major facilitator transporters mostly from fungi, including Str1 from Schizosaccharomyces pombe and Tri12 from Fusarium sporotrichioides. Str1 is involved in the transport of siderophore iron and has a role in iron homeostasis. Tri12 is a trichothecene efflux pump that may play a role in F. sporotrichioides self-protection against trichothecenes.
