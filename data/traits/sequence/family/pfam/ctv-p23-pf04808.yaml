identifier: Pfam:PF04808
label: 'Citrus tristeza virus (CTV) P23 protein '
definition: >-
  This family of proteins contains p23 from the Citrus tristezae virus, which is a member of the Closteroviridae. CTV produces more positive than negative RNA strands, and p23 controls this asymmetrical RNA accumulation. Amino acids 42-180 are essential for function and are thought to contain RNA-binding and zinc finger domains.
