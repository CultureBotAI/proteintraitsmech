label: Family of unknown function (DUF6560)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is found in bacteria, mainly firmicutes. Proteins in this family are typically between 157 and 193 amino acids in length. There are three highly conserved residues, tryptophan, phenylalanine/ tyrosine and lysine.
