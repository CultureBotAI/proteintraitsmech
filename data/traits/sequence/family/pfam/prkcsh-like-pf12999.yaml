identifier: Pfam:PF12999
label: Glucosidase II beta subunit-like
definition: >-
  This entry represents the N-terminal domain of the glucosidase 2 subunit beta, which is also known as protein kinase C substrate 80K-H (PRKCSH). The enzyme catalyses the sequential removal of two alpha-1,3-linked glucose residues in the second step of N-linked oligosaccharide processing. The beta subunit is required for the solubility and stability of the heterodimeric enzyme, and is involved in retaining the enzyme within the endoplasmic reticulum.
