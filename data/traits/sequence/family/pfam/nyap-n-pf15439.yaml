identifier: Pfam:PF15439
label: Neuronal tyrosine-phosphorylated phosphoinositide-3-kinase adapter
definition: >-
  This entry represents the N-terminal domain of a group of eukaryotic proteins that are substrates of tyrosine kinase in the brain. When first identified, the family members were referred to as unconventional myosin XVI, or Myr 8. However, proteins have now been identified as being integrally involved in neuronal function and morphogenesis. The family is involved in both the activation of phosphoinositide 3-kinase (PI3K) and the recruitment of the downstream effector WAVE complex to the close vicinity of PI3K; it also appears to regulate the brain size and neurite outgrowth in mice.
