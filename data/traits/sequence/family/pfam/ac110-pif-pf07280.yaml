identifier: Pfam:PF07280
label: Per os infectivity factor AC110
definition: >-
  This family of Baculovirus proteins includes Autographa californica nuclear polyhedrosis virus (AcMNPV) Per os infectivity factor AC110, which is required for oral infectivity. It may play a role after occlusion-derived virions pass through the host's peritrophic membrane.
