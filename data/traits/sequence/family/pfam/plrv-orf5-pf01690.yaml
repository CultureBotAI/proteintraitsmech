identifier: Pfam:PF01690
label: Potato leaf roll virus readthrough protein
definition: >-
  This family consists mainly of the Potato leafroll virus (PLrV) read through protein also known as the minor capsid protein. This is generated via a readthrough of open reading frame 3, the coat protein, allowing transcription of open reading frame 5 to give an extended coat protein with a large C-terminal addition or read through domain. The read through protein is essential for the circulative aphid transmission of PLrV and Beet western yellows virus. The N-terminal region of the luteovirus readthrough domain determines virus binding to Buchnera GroEL and is essential for virus persistence in the aphid.
