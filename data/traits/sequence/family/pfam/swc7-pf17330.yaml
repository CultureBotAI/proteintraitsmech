identifier: Pfam:PF17330
label: SWR1 chromatin-remodelling complex, sub-unit Swc7
definition: >-
  This entry represents the subunit Swc7; the smallest subunit of the SWR1 complex. Swc7 is not required for H2AZ binding. Swc7 associates with the N terminus of Swr1, and the association of Bdf1 requires Swc7, Yaf9, and Arp4. The SWR1 complex is involved in chromatin-remodelling by promoting the the ATP-dependent exchange of histone H2A for the H2A variant HZT1 in Saccharomyces cerevisiae (Baker's yeast) or H2AZ in mammals. The SWR1 chromatin-remodelling complex is composed of at least 14 subunits and has a molecular mass of about 1.2 to 1.5 MDa. In S. cerevisiae the core conserved subunits are: ATPase; Swr1. RuvB-like; Rvb1 and Rvb2. Actin; Act1. Actin-related: Arp4 and Arp6. YEATS protein; Yaf9. The non-conserved subunits are: Vps71 (Swc6), Vps72 (Swc2), Swc3, Swc4, Swc5, Swc7, Bdf1. Seven of the SWR1 subunits are involved in maintaining complex integrity and H2AZ histone replacement activity: Swr1, Swc2, Swc3, Arp6, Swc5, Yaf9 and Swc6. Arp4 is required for the association of Bdf1, Yaf9, and Swc4 and Arp4 is also required for SWR1 H2AZ histone replacement activity in vitro. Furthermore the N-terminal region of the ATPase Swr1 provides the platform upon which Bdf1, Swc7, Arp4, Act1, Yaf9 and Swc4 associate; it also contains an additional H2AZ-H2B specific binding site, distinct from the binding site of the Swc2 subunit.
