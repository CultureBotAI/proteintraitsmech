identifier: Pfam:PF15251
label: Telomere attrition and p53 response 1 protein-like
definition: >-
  This entry represents the HUWE1-associated protein modifying stress responses (HAPSTR1), also known as telomere attrition and p53 response 1 protein (TAPR1) from eukaryotes, including TAPR1 from human, which is a key multi stress-responsive protein that functions as a negative regulator of TP53/P53 in the cellular response to telomere erosion and probably also DNA damage. It functions in cooperation with the E3 ubiquitin ligase HUWE1 which also promotes TAPR1's degradation. HAPSTR2 plays a central regulatory role in the cellular response to molecular stressors, such as DNA damage, nutrient scarcity, and protein misfolding together with HAPSTR1 by stabilizing HAPSTR1, but also independently of HAPSTR1. This family also includes the uncharacterised proteins from fungi, such as YJR056C from yeast.
