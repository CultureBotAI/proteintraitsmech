identifier: Pfam:PF06290
label: Plasmid SOS inhibition protein (PsiB)
definition: >-
  During F plasmid conjugation, the SOS response is suppressed by PsiB, an F-plasmid-encoded protein that binds and sequesters free RecA to prevent filament formation. PsiB contains a central five-stranded anti-parallel β sheet that is buttressed by α helices from the N and C termini. Its structure is similar to CapZ, a eukaryotic actin filament capping protein.
