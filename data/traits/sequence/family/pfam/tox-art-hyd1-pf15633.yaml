identifier: Pfam:PF15633
label: HYD1 signature containing ADP-ribosyltransferase
definition: >-
  This entry represents a domain that has characteristic histidine, tyrosine and aspartate residues that comprise the active site. It is found in a predicted toxin of the ADP-ribosyltransferase superfamily present in bacterial polymorphic toxin systems. In bacterial polymorphic toxin systems, the toxin is exported by the type 2, type 6, or type 7 secretion system.
