identifier: Pfam:PF11119
label: Protein of unknown function (DUF2633)
definition: >-
  This entry represents Protein YfgG from Escherichia coli (strain K12) and similar proteins from Gammaproteobacteria. YfgG may be related to the resistance to the iron analogue gallium nitrate (Ga(NO3)3), and to the tolerance to nickel and cobalt stress. However, the exact function is still unknown.
