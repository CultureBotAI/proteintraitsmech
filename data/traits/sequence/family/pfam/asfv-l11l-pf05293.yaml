identifier: Pfam:PF05293
label: African swine fever virus (ASFV) L11L protein
definition: >-
  L11L is an integral membrane protein of the African swine fever virus, which is expressed late in the virus replication cycle. The protein is thought to be non-essential for growth in vitro and for virus virulence in domestic pigs ].
