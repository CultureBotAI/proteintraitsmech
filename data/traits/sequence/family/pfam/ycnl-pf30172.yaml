identifier: Pfam:PF30172
label: YcnL membrane protein family
definition: >-
  This entry represents the YcnL protein family found in Bacillus subtilis, including YcnL from Bacillus subtilis, 117 amino acid uncharacterised multi-pass membrane protein. YcnL is significantly induced under copper-limiting conditions. Cells lacking this gene show no difference in growth under copper deprivation or copper excess conditions. The protein contains a likely zinc-binding N-terminal region with four conserved cysteines. This region is likely to be intracellular.
