identifier: Pfam:PF25746
label: Streptomyces phage repressor protein c
definition: >-
  This entry represents the repressor protein (c) of the Streptomyces temperate phage phi-c31. This protein is involved in the establishment and maintenance of lysogeny. This protein contains a DNA-binding helix-turn-helix motif near the C-terminal. Lysogens of phi-c31 are not inducible by UV irradiation or by mitomycin C, but can be induced by high multiplicity of infection with c-defective or virulent phages or, in the case of those possessing temperature-sensitive repressors, by heat.
