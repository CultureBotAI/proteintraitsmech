identifier: Pfam:PF11327
label: Egh16-like virulence factor
definition: >-
  This entry represents a group of fungal proteins, including Egh16 from Blumeria graminis and its homologues. They are found in pathogenic fungi and may play important roles during the early infection stage in fungal pathogens. This entry also includes GAS1/2 from Magnaporthe oryzae, which are appressoria-specific virulence factors required for appressorial penetration in host and lesion development. This entry also includes Lytic polysaccharide monooxygenase trsA, a virulence factor that facilitates fungal penetration of Caenorhabditis elegans. The protein exhibits copper-dependent oxidase activity and defines a new lytic polysaccharide monooxygenase (LPMO) family that likely targets oligosaccharides in the cuticle and extracellular matrix of C. elegans, thereby facilitating fungal entry and spreading within the nematode body. When expressed in C. elegans, TsrA reduces the host's lifespan. Secreted virulence factor ELV1 from Verticillium dahliae is also included in this entry; it contributes to virulence on tomato plants but is dispensable for vegetative growth and conidiation.
