identifier: Pfam:PF26880
label: Bacteriophage T5 5'-deoxynucleotidase
definition: >-
  This entry represents the 5'-deoxynucleotidase (dmp) family found in T5-like bacteriophages. This enzyme is responsible for the degradation of deoxynucleoside 5'-monophosphates to deoxynucleosides following host DNA degradation. The enzyme is active on deoxynucleoside 5'-monophosphates but not on ribonucleotides, deoxynucleoside 5'-triphosphates, deoxynucleoside 3'-monophosphates, or deoxyoligonucleotides. The protein is expressed pre-early in the viral replicative cycle as part of the first step transfer DNA that enters the host cell at the beginning of infection. The gene is duplicated as part of the long terminal repeats at both ends of the viral genome.
