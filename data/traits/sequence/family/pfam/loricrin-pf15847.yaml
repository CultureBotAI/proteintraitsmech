identifier: Pfam:PF15847
label: Major keratinocyte cell envelope protein
definition: >-
  Loricrin is a major keratinocyte cell envelope protein. The cornified cell envelope is a structure that replaces the plasma membrane during keratinocyte terminal differentiation. Loricrin acts as an important epidermal barrier, comprising 70% of the total protein mass of the cornified layer. Expression of Loricrin is regulated by TNF-alpha via a c-Jun N-terminal kinase-dependent pathway. Loricrin mutations cause the Vohwinkel syndrome and other congenital skin abnormalities collectively termed as loricrin keratoderma.
