identifier: Pfam:PF21952
label: PRKCH upstream open reading frame 2
definition: >-
  This entry represents human PRKCH upstream open reading frame 2 (PRKCH_uORF2), also known as Protein uPEP2, the product of an upstream open reading frame (uORF). PRKCH_uORF2 exhibits kinase inhibitory functions. It possesses the typical PKC pseudosubstrate motif present in all PKCs that autoinhibits their kinase activity.
