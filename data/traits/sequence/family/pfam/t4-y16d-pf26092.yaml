identifier: Pfam:PF26092
label: Phage T4 y16D protein
definition: >-
  This entry represents a family of phage proteins an prophages mainly found in proteobacteria that includes Uncharacterized 17.8 kDa protein in arn-motA intergenic region (Y16D) from phage T4. This protein is predicted to form a homodimer, with a monomer composed of a pair of N-terminal α-helices followed by a domain composed of four β-strands and two α-helices. Many proteins in this family are annotated as nucleases, but the origins of these annotations are not clear.
