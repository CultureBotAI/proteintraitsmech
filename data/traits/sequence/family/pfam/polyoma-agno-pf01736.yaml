identifier: Pfam:PF01736
label: Polyomavirus agnoprotein
definition: >-
  This family consists of the DNA-binding protein or agnoprotein from various polyomaviruses. This protein is highly basic and can bind single stranded and double stranded DNA. Mutations in the agnoprotein produce smaller viral plaques, hence its function is not essential for growth in tissue culture cells but something has slowed in the normal replication cycle. There is also evidence suggesting that the agnogene and agnoprotein act as regulators of structural protein synthesis.
