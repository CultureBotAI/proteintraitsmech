identifier: Pfam:PF06385
label: Baculovirus LEF-11 protein
definition: >-
  This family consists of several Baculovirus LEF-11 proteins. The exact function of this family is unknown although it has been shown that LEF-11 is required for viral DNA replication during the infection cycle and plays a role in late/very late gene activation.
