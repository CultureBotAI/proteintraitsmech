identifier: Pfam:PF27875
label: Sporulation killing factor SkfA
definition: >-
  Spore formation by the bacterium Bacillus subtilis is a stress response triggered by nutrient limitation. Two operons are strongly induced at the start of sporulation; one of them is skf (for sporulation killing factor). skf produces a killing factor which, together with a signaling protein, act cooperatively to block sister cells from sporulating and cause them to lyse, providing a source of nutrients to support the sporulation process. The first gene of the skf operon, skfA, encodes a small peptide that is post-translationally modified by a sulfur-to-α-carbon cross-link introduced by a radical SAM enzyme, SkfB ( ). SkfA induces the lysis of sibling cells that have not entered the sporulation pathway.
