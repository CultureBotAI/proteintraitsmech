identifier: Pfam:PF01905
label: CRISPR-associated negative auto-regulator DevR/Csa2
definition: >-
  This entry represents a family of Cas proteins, including the Cas7 (also known as DevR) protein from Myxococcus xanthus. Cas7 is a key regulator of development, and mutants of DevR are incapable of fruiting body development. The expression of Cas7 appears to be regulated through a number of means, including both location and autorepression. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
