identifier: Pfam:PF12273
label: Rcr1/2
definition: >-
  RCR proteins are ER membrane proteins that regulate chitin deposition in fungal cell walls. Although chitin, a linear polymer of beta-1,4-linked N-acetylglucosamine, constitutes only 2% of the cell wall it plays a vital role in the overall protection of the cell wall against stress, noxious chemicals and osmotic pressure changes. Congo red is a cell wall-disrupting benzidine-type dye extensively used in many cell wall mutant studies that specifically targets chitin in yeast cells and inhibits growth. RCR proteins render the yeasts resistant to Congo red by diminishing the content of chitin in the cell wall. This entry includes Rcr1 and Rcr2 which are two paralogues transmembrane Rsp5 adaptors that are sorted to distinct cellular locations. Rcr1 is a plasma membrane (PM) protein, whereas Rcr2 is sorted to the vacuole. Rcr2 is delivered to the vacuole using ubiquitin as a sorting signal and Rcr1 is delivered to the PM by the exomer complex using a newly uncovered PM sorting motif. Rcr1 but not Rcr2 is up-regulated via the calcineurin/Crz1 signalling pathway. Rcr1 ubiquitinates and down-regulates the chitin synthase Chs3 upon calcium treatment. Rcr1 interacts with ubiquitin ligase Rsp5, and the VPEY motif is necessary for this, via interaction with the WW domains of Rsp5. Rsp5/Rcr1 ubiquitin ligase-adaptor complex can provide an acute response to degrade unwanted proteins under stress conditions, maintaining cell integrity.
