identifier: Pfam:PF07848
label: PaaX-like protein
definition: >-
  This entry describes the N-terminal region of Transcriptional repressor PaaX from Escherichia coli and similar bacterial proteins. PaaX is involved in metabolism of phenylacetic acid. The gene product has been shown to bind to the promoter sites and repress their transcription.
