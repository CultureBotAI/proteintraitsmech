identifier: Pfam:PF27876
label: Sporulation killing factor system integral membrane protein SkfF
definition: >-
  Spore formation by the bacterium Bacillus subtilis is a stress response triggered by nutrient limitation. Two operons are strongly induced at the start of sporulation; one of them is skf (for sporulation killing factor). skf produces a killing factor which, together with a signaling protein, act cooperatively to block sister cells from sporulating and cause them to lyse, providing a source of nutrients to support the sporulation process. The skf operon consists of skfA-H. SkfA induces the lysis of sibling cells that have not entered the sporulation pathway. SkfF has multiple membrane-spanning domains and is encoded next to SkfE, a protein with ATP-binding cassette (ABC) homology, suggesting ABC transporter permease activity for this protein.
