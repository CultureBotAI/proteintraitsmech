identifier: Pfam:PF28315
label: Surface protein adhesin OmpL37
definition: >-
  Members of this family of major outer membrane proteins are found in Leptospira species, where from one to three paralogs are seen per proteome. In Leptospira interrogans, the family includes two paralogs, LIC_12263, which is the adhesin OmpL37 ( ), and LIC_10262 ( ), which is uncharacterised. OmpL37 interacts with host elastin, laminin, plasma fibronectin, and fibrinogen.
