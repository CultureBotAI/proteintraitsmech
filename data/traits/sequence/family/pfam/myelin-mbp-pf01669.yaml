identifier: Pfam:PF01669
label: Myelin basic protein
definition: >-
  The myelin sheath is a multi-layered membrane, unique to the nervous system, that functions as an insulator to greatly increase the velocity of axonal impulse conduction. Myelin basic protein (MBP) is a hydrophilic protein that may function to maintain the correct structure of myelin, interacting with the lipids in the myelin membrane by electrostatic and hydrophobic interactions. In mammals various forms of MBP exist which are produced by the alternative splicing of a single gene; these forms differ by the presence or the absence of short (10 to 20 residues) peptides in various internal locations in the sequence. The major form of MBP is generally a protein of about 18.5 Kd (170 residues). MBP is the target of many post-translational modifications: it is N-terminally acetylated, methylated on an arginine residue, phosphorylated by various serine/threonine protein-kinases, and deamidated on some glutamine residues.
