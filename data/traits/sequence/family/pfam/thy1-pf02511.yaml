identifier: Pfam:PF02511
label: Thymidylate synthase complementing protein
definition: >-
  All cellular organisms need thymidylate (dTMP) for the replication of their chromosomes, as dTMP is required for the biosynthesis of dTTP, a building block of DNA. Cells can produce thymidylate either de novo from dUMP or incorporate thymidine using thymidine kinase. The de novo pathway of dTMP synthesis requires a specific enzyme, thymidylate synthase, which methylates dUMP at position 5 of the pyrimidine ring. There are two pathways for thymidylate synthesis, each utilising a different thymidylate synthase enzyme: ThyA ( ) and ThyX ( ). Both enzymes convert dUMP to dTMP, but there is no sequence identity between the two enzymes, and their mechanisms of action differ. Only ThyX uses FAD as cofactor. The well studied thyA proteins catalyse the reductive methylation reaction of dUMP, with methylenetetrahydrofolate (CH(2)H(4)folate) serving as one-carbon donor and as source of reductive power. On the other hand the thyX family of thymidylate synthases contains FAD that is tightly bound by a novel fold. FAD mediates hydride transfer from NADPH during catalysis. Consequently, in the reaction catalysed by thyX, CH(2)H(4)folate serves only as a carbon donor and tetrahydrofolate (and not dihydrofolate as in the case of thyA) is produced.
