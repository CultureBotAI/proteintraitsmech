identifier: Pfam:PF05271
label: Tobravirus 2B protein
definition: >-
  This family consists of several tobravirus 2B proteins. It is known that the 2B protein is required for transmission by both Paratrichodorus pachydermus and Paratrichodorus anemones nematodes. Transmission of the tobraviruses Tobacco rattle virus by trichodorid vector nematodes requires the viral coat protein (CP) and the 2B protein, a nonstructural protein encoded by RNA2, the smaller of the two viral genomic RNAs. It is hypothesized that the 2B protein functions by interacting with a small, flexible domain located at the C terminus of the CP, forming a bridge between the virus particle and the internal surface of the vector nematode feeding apparatus.
