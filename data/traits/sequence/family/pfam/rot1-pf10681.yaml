identifier: Pfam:PF10681
label: Chaperone for protein-folding within the ER, fungal
definition: >-
  Rot1 is a molecular chaperone involved in protein folding in ER. It is required for normal levels of the cell wall 1,6-beta-glucan and for protein N- and O-glycosylation. It also controls actin cytoskeleton polarization to the mother-bud neck and CLB2 protein stability.
