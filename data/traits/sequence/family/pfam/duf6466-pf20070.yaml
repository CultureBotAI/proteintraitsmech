identifier: Pfam:PF20070
label: Family of unknown function (DUF6466)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is mainly found in Bacteria. Proteins in this family are approximately 190 amino acids in length. They contain the conserved motifs QQQQ, SxxLT and KPW. Members in this family are probably cell surface proteins, some of them are likely elastin binding proteins.
