identifier: Pfam:PF11449
label: Putative, 10TM heavy-metal exporter
definition: >-
  This is a family of putative heavy metal transporters with 8-11 TMs mostly found in prokaryotes. Members carry two well-conserved characteristic sequence- motifs of 'PGCG'. It has been reported that some proteins are involved in arsenate/arsenite resistance. Other members are annotated as manganese transporters.
