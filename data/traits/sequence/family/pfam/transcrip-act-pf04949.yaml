identifier: Pfam:PF04949
label: Transcriptional activator
definition: >-
  This entry represents RAB6-interacting golgin, including SCYL1BP1 (also known as GORAB) from humans. SCYL1BP1 localises to the Golgi apparatus and interacts with Rab6. Therefore, SCYL1BP1 is identified as a golgin, a protein that tether vesicles to the Golgi apparatus.
