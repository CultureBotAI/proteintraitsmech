identifier: Pfam:PF03420
label: Prohead core protein serine protease
definition: >-
  This group of peptidases belongs to MEROPS peptidase family U9 (phage prohead processing peptidase family, clan U-), which play a role in the head assembly of Bacteriophage T4, this includes Prohead core protein protease from Enterobacteria phage T4. This entry also includes eukaryotic and bacterial proteins. The peptidases families associated with clan U-have an unknown catalytic mechanism as the protein fold of the active site domain and the active site residues have not been reported.
