identifier: Pfam:PF12716
label: Nuclear pore assembly and biogenesis
definition: >-
  This is a family of conserved fungal proteins involved in nuclear pore assembly. APQ12 is an integral membrane protein of the nuclear envelope (NE) and endoplasmic reticulum. Its absence leads to a partial block in mRNA export and cold-sensitive defects in the growth and localisation of a subset of nucleoporins, particularly those asymmetrically localised to the cytoplasmic fibrils. The defects in nuclear pore assembly appear to be due to defects in regulating membrane fluidity.
