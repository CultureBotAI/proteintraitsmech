identifier: Pfam:PF21951
label: T-cell receptor gamma alternate reading frame protein
definition: >-
  This protein family includes human T-cell receptor gamma alternate reading frame protein (TARP) and similar sequences from vertebrates. TARP is a 7kDa protein with five leucine residues in heptad repeats followed by a basic region. It is expressed at higher levels in several types of cancerous cells.
