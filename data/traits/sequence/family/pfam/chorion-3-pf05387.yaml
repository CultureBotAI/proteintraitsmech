identifier: Pfam:PF05387
label: Chorion family 3
definition: >-
  This family consists Drosophila chorion proteins S36 and S38, which are involved in chorion membrane formation. The proteins consist of a central domain and two flanking 'arms'. The central domain contains tandemly repetitive peptides, which apparently generate a secondary structure of β-sheet strands alternating with β-turns, most probably, forming a twisted β-pleated sheet or β-barrel.
