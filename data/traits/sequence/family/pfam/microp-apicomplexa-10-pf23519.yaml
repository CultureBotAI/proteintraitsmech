identifier: Pfam:PF23519
label: Apicomplexa microprotein
definition: >-
  This protein family includes uncharacterised microproteins encoded by small open reading frames (smORFs) from apicomplexa, including from the parasite Babesia bovis. Members of this family are predicted to fold into a four-stranded antiparallel curved β-sheet followed by a single long α-helix.
