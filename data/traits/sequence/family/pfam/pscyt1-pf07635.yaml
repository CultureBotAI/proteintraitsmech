identifier: Pfam:PF07635
label: Planctomycete cytochrome C
definition: >-
  These proteins share a region of homology at their N terminus that contains the C-{CPWHF}-{CPWR}-C-H-{CFYW} motif typical of cytochrome c. They are found mainly in Planctomycetes, Verrucomicrobia and Bacteroidetes.
