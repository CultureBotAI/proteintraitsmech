identifier: Pfam:PF10476
label: 'Protein of unknown function C-terminus (DUF2448) '
definition: >-
  TMEM201, also known as SAMP1, is a RanGTP binding transmembrane protein found in the inner nuclear membrane. It is functionally associated with the LINC complex protein Sun1 and proteins of the A-type lamina network. This entry represents the C-terminal domain of TMEM201.
