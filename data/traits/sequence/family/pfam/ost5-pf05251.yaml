identifier: Pfam:PF05251
label: Oligosaccharyltransferase subunit 5
definition: >-
  This entry includes Ost5 from budding yeasts and TMEM258 from animals. Ost5 is an essential subunit of the N-oligosaccharyl transferase (OST) complex which catalyses the transfer of a high mannose oligosaccharide from a lipid-linked oligosaccharide donor to an asparagine residue within an Asn-X-Ser/Thr consensus motif in nascent polypeptide chains.
