identifier: Pfam:PF06699
label: GPI biosynthesis protein family Pig-F
definition: >-
  Glycosylphosphatidylinositol anchor biosynthesis protein Pig-F is involved in glycosylphosphatidylinositol (GPI) anchor biosynthesis. This family also includes the Pif-F homologue GPI11 (glycosylphosphatidylinositol anchor biosynthesis protein 11). It is involved in the ethanolamine-phosphate transfer-step of GPI biosynthesis.
