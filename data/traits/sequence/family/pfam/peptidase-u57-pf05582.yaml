identifier: Pfam:PF05582
label: YabG peptidase U57
definition: >-
  The peptidases families associated with clan U-have an unknown catalytic mechanism as the protein fold of the active site domain and the active site residues have not been reported. This is a group of peptidases belong to MEROPS peptidase family U57 (clan U-). The type example is the YabG protein of Bacillus subtilis. This is a protease involved in the synthesis and maturation of the spore coat proteins SpoIVA and YrbA of B. subtilis.
