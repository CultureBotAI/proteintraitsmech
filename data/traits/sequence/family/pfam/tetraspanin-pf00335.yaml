identifier: Pfam:PF00335
label: Tetraspanin family
definition: >-
  Tetraspanins are a distinct family of proteins, containing four transmembrane domains: a small outer loop (EC1), a larger outer loop (EC2), a small inner loop (IL) and short cytoplasmic tails. They contain characteristic structural features, including 4-6 conserved extracellular cysteine residues, and polar residues within transmembrane domains. A fundamental role of tetraspanins appears to be organizing other proteins into a network of multimolecular membrane microdomains, sometimes called the 'tetraspanin web'. This entry represents tetraspanin proteins. It also recognises a number of peripherins. These are related retinal-specific members of the tetraspanin family which are located at the rims of the photoreceptor disks, where they may act jointly in disk morphogenesis.
