identifier: Pfam:PF06732
label: Pescadillo N-terminus
definition: >-
  Pescadillo (PES) protein was first identified as an essential protein for zebrafish embryonic development. It is conserved from yeasts to humans. Pescadillo homologues are involved in embryonic development and ribosome biogenesis. It has been linked to chromosomal instability and cancer.
