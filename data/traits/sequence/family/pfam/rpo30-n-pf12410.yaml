identifier: Pfam:PF12410
label: Poxvirus DNA dependent RNA polymerase 30kDa subunit
definition: >-
  All three classes of poxvirus genes -early, intermediate and late -are transcribed by the viral RNA polymerase compex. This complex is composed of nine distinct subunits which total more than 500kDa in mass. The two largest subunits (147 and 136kDa) are homologous to the largest subunits of eukaryotic and prokaryotic RNA polymerases and, like them, are thought to form a claw-shaped structure whose cleft is the site of template interaction and phosphodiester bond formation. While the smaller subunits of poxvirus RNA polymerase show much less similarity, if any, to the smaller subunits of the eukaryotic and prokaryotic enzymes, it is thought that they may play a similar role in interacting with transcription factors. This entry represents the N-terminal domain of the 30kDa subunit of RNA polymerase from the chordopox branch of poxviruses. This subunit may have a role in RNA chain elongation. The function of this domain is not known, but it contains two conserved sequence motifs, GIEYSKD and LRY, and shows structural similarity to the eukaryotic transcriptional elongation factor SII.
