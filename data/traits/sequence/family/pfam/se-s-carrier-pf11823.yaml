identifier: Pfam:PF11823
label: Putative Se/S carrier protein-like
definition: >-
  This entry represents a domain from a family of uncharacterised proteins predominantly found in the bacterial phylum Thermodesulfobacteriota. The proteins containing this domain are mainly distributed among the orders Desulfovibrionales and Desulfobacterales. The domain is approximately 85 amino acids in length. Proteins containing this domain are predicted to be involved in various cellular processes, but their exact function remains unknown. The domain is sometimes associated with the domain, which is a putative Se/S carrier protein-like domain. This domain shows structure similarity to the N-terminal domain of Enolase.
