identifier: Pfam:PF07994
label: Myo-inositol-1-phosphate synthase
definition: >-
  Myo-inositol 1-phosphate synthase ( ), also known as Inositol-3-phosphate synthase 1 (INO1), is a key enzyme in myo-inositol biosynthesis pathway that catalyses the conversion of glucose 6-phosphate to 1D-myo-inositol 3-phosphate in a NAD-dependent manner. The enzyme exists in a cytoplasmic form in a wide range of plants, animals, and fungi. It has also been detected in several bacteria and a chloroplast form is observed in alga and higher plants. Inositol phosphates play an important role in signal transduction. In Saccharomyces cerevisiae (Baker's yeast), the transcriptional regulation of the INO1 gene has been studied in detail and its expression is sensitive to the availability of phospholipid precursors as well as growth phase. The regulation of the structural gene encoding 1L-myo-inositol-1-phosphate synthase has also been analysed at the transcriptional level in the aquatic angiosperm, Spirodela polyrrhiza (Giant duckweed) and the halophyte, Mesembryanthemum crystallinum (Common ice plant).
