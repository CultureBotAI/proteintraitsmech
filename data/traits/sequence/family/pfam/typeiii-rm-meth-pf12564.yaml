identifier: Pfam:PF12564
label: Type III restriction/modification enzyme methylation subunit
definition: >-
  This entry represents the N-terminal domain in Probable type III restriction-modification enzyme HindVI Mod subunit (T3MH). T3MH is a beta subtype methylase that binds the system-specific DNA recognition site 5'-CGAAT-3' and methylates A-4 (of only 1 strand). DNA restriction requires both the Res and Mod subunits. It is found in association with . There are two completely conserved residues (F and S) that may be functionally important. It is also found in related bacterial phage resistance proteins, in particular in the methylation subunit of the type III restriction/modification enzyme complex.
