identifier: Pfam:PF08432
label: AAA-ATPase Vps4-associated protein 1
definition: >-
  Vps Four-Associated 1, Vfa1, in yeast, is an endosomal protein that interacts with the AAA-ATPase Vps4. It would seem to be involved in regulating the trafficking of other proteins to the endocytic vacuole. There is a CCCH zinc finger at the N terminus.
