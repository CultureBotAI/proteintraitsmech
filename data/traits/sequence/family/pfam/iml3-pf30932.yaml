identifier: Pfam:PF30932
label: IML3
definition: >-
  This entry represnets the increased Minichromosome Loss 3 (IML3) protein, also called CENP-L homolog, constitutive centromere-associated network protein IML3, or minichromosome maintenance protein 19. IML3 is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. IML3 forms a heterodimer with CHL4. CHL4-IML3 is part of a larger constitutive centromere-associated network (CCAN), also known as central kinetochore CTF19 complex in yeast, which serves as a structural platform for outer kinetochore assembly.
