label: Family of unknown function (DUF6292)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001203) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide, in particular the clarexpoxcin biosynthetic gene cluster from uncultured bacterium AR_456. This domain family appears to be predominantly found in Actinobacteria.
