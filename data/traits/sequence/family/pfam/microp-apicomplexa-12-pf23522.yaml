identifier: Pfam:PF23522
label: Apicomplexa microprotein
definition: >-
  This domain covers the whole length of uncharacterised microproteins encoded by small open reading frames (smORFs) from apicomplexa, including from the parasite Babesia bovis, and is found at the N-terminal end of longer uncharacterised proteins from related species.
