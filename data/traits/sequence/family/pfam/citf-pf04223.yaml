identifier: Pfam:PF04223
label: Citrate lyase, alpha subunit (CitF)
definition: >-
  These sequences, from both Gram-positive and Gram-negative bacteria, represent the alpha subunit of the holoenzyme citrate lyase composed of alpha ( ), beta, and acyl carrier protein subunits in a stoichiometric relationship of 6:6:6. Citrate lyase is an enzyme which converts citrate to oxaloacetate. In bacteria, this reaction is involved in citrate fermentation. The alpha subunit catalyzes the reaction Acetyl-CoA + citrate = acetate + (3S)-citryl-CoA. The proteins from Lactococcus lactis subsp. lactis (Streptococcus lactis) and Klebsiella pneumoniae has been experimentally characterised.
