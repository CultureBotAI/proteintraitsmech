identifier: Pfam:PF23778
label: Putative phage holin family 2
definition: >-
  This entry represents a family of putative holin proteins found in various phages infecting actinobacterial hosts, particularly Gordonia, Mycobacterium, Arthrobacter, and Microbacterium. Holins are small membrane proteins involved in the timing of host cell lysis during bacteriophage infection. Members of this family typically range from 94 to 151 amino acids in length and contain 3 to 4 predicted transmembrane helices. While some members have an N-terminal signal peptide or lipoprotein signal, most do not. It is unclear where the annotation for these proteins as holins arose. However it appears plausible based on their sequence features. This entry shows similarity to , a bacterial family of unknown function.
