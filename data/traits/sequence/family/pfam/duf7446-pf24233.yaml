identifier: Pfam:PF24233
label: Family of unknown function (DUF7446)
definition: >-
  This entry represents a highly conserved domain found in various bacteriophages, particularly those infecting Salmonella and related bacteria. The domain is also present in some bacterial species, suggesting possible horizontal gene transfer. The function is unknown, but the high degree of conservation implies an important role in phage biology. A conserved motif DVT is present centrally in many family members. The aspartate and threonine form side chain hydrogen bonds that help stabilise the dimeric interaction. Structure prediction suggests these proteins form a confident homodimer (iPTM=0.83).
