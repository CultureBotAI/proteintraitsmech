identifier: Pfam:PF18846
label: Bacterial archaeo-eukaryotic release factor family 5
definition: >-
  This entry represents the bacterial family of the archaeo-eukaryotic release factor superfamily. It is likely to play roles in biological conflicts or regulation under stress conditions at the ribosome. This family unusually lacks the fusion to the C-terminal Pelota domain.
