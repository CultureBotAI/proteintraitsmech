identifier: Pfam:PF03788
label: LrgA family
definition: >-
  This family consists of CidA and LrgA, which are bacterial holin-/antiholin-like proteins that function to control cell death and lysis during biofilm development. The cidAB operon encodes the holin-like counterpart of the lrgAB operon and acts in a manner opposite from that of lrgAB by increasing extracellular murein hydrolase activity and increasing sensitivity to penicillin-induced killing. This family also includes uncharacterised UPF0299 membrane proteins.
