identifier: Pfam:PF20911
label: Major capsid protein GP7
definition: >-
  This family represents Major capsid protein GP7 from Salmonella phage epsilon15 ( ) and similar proteins found in tailed bacteriophages and bacterial prophages. GP7 adopts a canonical phage structure, showing different structural features (an N-arm, an F-loop, an E-loop, a P-domain, a long α-helix, an A-domain and the C-terminal end).
