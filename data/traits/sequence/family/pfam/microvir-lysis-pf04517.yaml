identifier: Pfam:PF04517
label: Microvirus lysis protein (E), C terminus
definition: >-
  E protein causes host cell lysis by inhibiting MraY, a peptidoglycan biosynthesis enzyme. This leads to cell wall failure at septation. The N-terminal transmembrane region matches the signal peptide model and must be omitted from the family.
