label: Family of unknown function (DUF6404)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001055) is described by MIBiG as an example of the NRP (non-ribosomal peptide) and polyketide biosynthetic classes, in particular the yersiniabactin biosynthetic gene cluster from Escherichia coli [[cite17049458]]. This family appears to be predominantly found in Proteobacteria.
