identifier: Pfam:PF26890
label: Haemophilus phage HP1 protein YO09
definition: >-
  This entry represents the YO09 protein family found in HP1-like bacteriophages. YO09 is an uncharacterised protein of 86 amino acids (9.7 kDa) found in the cox-rep intergenic region of Haemophilus phage HP1. Members are also found in bacterial prophages.
