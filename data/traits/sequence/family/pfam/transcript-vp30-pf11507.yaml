identifier: Pfam:PF11507
label: Ebola virus-specific transcription factor VP30
definition: >-
  VP30 is a nucleocapsid-associated Ebola virus-specific transcription factor. It acts by stabilising nascent mRNA in Ebola virus replication. The C-terminal domain of VP30 folds into a dimeric helical assembly. VP30 assembles into hexamers in solution by an N-terminal oligomerization domain which activates the transcription function of the protein. The oligomerization is mediated by hydrophobic amino acids at 94-112. VP30 binds RNA in the presence of zinc and clamps the RNA template and the complex VP35-polymerase L together, increasing the polymerase affinity for the RNA template to increase transcription initiation despite the presence of RNA secondary structures. It also assists the reinitiation of transcription at gene junctions. This entry represents the transcriptional activator VP30, Filoviridae type.
