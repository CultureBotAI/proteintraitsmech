identifier: Pfam:PF06694
label: Plant nuclear matrix protein 1 (NMP1)
definition: >-
  Augmin is a protein complex required for centrosome-independent microtubule generation within the spindle. In plants, which lack a centrosome structure, an augmin complex also exists. The plant augmin complex contains eight subunits. This family consist of AUGMIN subunit 7.
