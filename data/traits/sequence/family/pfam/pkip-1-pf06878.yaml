identifier: Pfam:PF06878
label: Pkip-1 protein
definition: >-
  Pkip-1 is a baculoviral gene encoding a protein kinase-interacting protein. It interacts with and stimulates the activity of virus-encoded protein kinase PK-1. Pkip-1 is not essential for virus replication.
