identifier: Pfam:PF15171
label: Neuropeptide secretory protein family, NPQ, spexin
definition: >-
  Spexin, alternatively named NPQ, is a peptide hormone and is derived from a pro-hormone. This family of proteins has a role in inducing stomach wall contraction and is expressed in the submucosal layer of the mouse oesophagus and stomach. Spexin, like most peptide hormones, is a ligand for G-protein coupled receptors. Spexin is also thought to have a role in controlling arterial blood pressure as well as salt and water balance.
