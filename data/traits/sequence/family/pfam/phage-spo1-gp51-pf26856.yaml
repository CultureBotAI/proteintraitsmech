identifier: Pfam:PF26856
label: Phage SPO1 gene 51 protein
definition: >-
  This entry represents gene 51 protein from Bacillus phage SPO1 and similar sequences found in bacteriophages. This 131 amino acid protein has a molecular weight of 15.1 kDa. The protein is also known as SPO1_19 and remains uncharacterised. The function of this protein is unknown.
