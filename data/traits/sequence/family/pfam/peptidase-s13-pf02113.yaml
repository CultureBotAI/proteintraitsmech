identifier: Pfam:PF02113
label: D-Ala-D-Ala carboxypeptidase 3 (S13) family
definition: >-
  This family of serine peptidases belong to MEROPS peptidase family S13 (D-Ala-D-Ala carboxypeptidase C, clan SE). The active site residues occur in the motif SXXK. D-Ala-D-Ala carboxypeptidase C is involved in the metabolism of cell components; it is synthesised with a leader peptide to target it to the cell membrane. After cleavage of the leader peptide, the enzyme is retained in the membrane by a C-terminal anchor. There are three families of serine-type D-Ala-D-Ala peptidase (designated S11, S12 and S13), which are also known as low molecular weight penicillin-binding proteins. Family S13 comprises D-Ala-D-Ala peptidases that have sufficient sequence similarity around their active sites to assume a distant evolutionary relationship to other clan members; members of the S13 family also bind penicillin and have D-amino-peptidase activity. Proteases of family S11 have exclusive D-Ala-D-Ala peptidase activity, while some members of S12 are C beta-lactamases. Proteolytic enzymes that exploit serine in their catalytic activity are ubiquitous, being found in viruses, bacteria and eukaryotes. They include a wide range of peptidase activity, including exopeptidase, endopeptidase, oligopeptidase and omega-peptidase activity. Many families of serine protease have been identified, these being grouped into clans on the basis of structural similarity and other functional evidence. Structures are known for members of the clans and the structures indicate that some appear to be totally unrelated, suggesting different evolutionary origins for the serine peptidases. Not withstanding their different evolutionary origins, there are similarities in the reaction mechanisms of several peptidases. Chymotrypsin, subtilisin and carboxypeptidase C have a catalytic triad of serine, aspartate a…
