identifier: Pfam:PF04908
label: SH3-binding, glutamic acid-rich protein
definition: >-
  This family of proteins, which contains SH3BGRL3, is functionally uncharacterised. SH3BGRL3 is a highly conserved small protein, which is widely expressed and shows a significant similarity to glutaredoxin 1 (GRX1) of Escherichia coli which is predicted to belong to the thioredoxin superfamily. However, SH3BGRL3 lacks both conserved cysteine residues, which characterise the enzymatic active site of GRX. This structural feature raises the possibility that SH3BGRL3 and its homologues could function as endogenous modulators of GRX activity. Adapter SH3BGRL from mammals is also included in this entry. This protein may function as a ubiquitin ligase-substrate adapter that bridges proteins together or proteins with mRNAs.
