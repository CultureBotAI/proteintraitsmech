identifier: Pfam:PF17523
label: MinK-related peptide, potassium channel accessory sub-unit protein 4
definition: >-
  This entry represents MinK-related peptide, potassium channel accessory subunit protein 4 from Caenorhabditis elegans (MPS4) and similar proteins found in nematodes. MinK-related peptides (MiRPs or KCNEs) are single-transmembrane proteins that associate with pore-forming ion-channel sub-units to form stable complexes with channel properties markedly distinct from those of the isolated pore-forming sub-units. MPS4 is expressed exclusively in the C. elegans nervous system and is essential for neuronal excitability.
