identifier: Pfam:PF05528
label: Accessory protein 5b, avian coronavirus
definition: >-
  Avian infectious bronchitis virus, a member of Coronaviridae family, has a single-stranded positive-sense RNA genome, which is 27 kb in length. Gene 5 contains two (5a and 5b) open reading frames. This entry represents the host translation inhibitor 5b (ORF 5b, also known as accessory protein 5b) which is involved in host translation shut off without degrading host RNA. It suppresses host gene expression which facilitates evasion from host type I interferon immune response.
