identifier: Pfam:PF15061
label: MITRAC7/Phoenixin family
definition: >-
  This entry represents the Small Integral Membrane Protein 20/Phoenixin family, which contains proteins with dual functions. The full-length protein (SMIM20/MITRAC7) is a mitochondrial inner membrane protein that acts as a component of the MITRAC (mitochondrial translation regulation assembly intermediate of cytochrome c oxidase) complex, regulating cytochrome c oxidase assembly. It functions as a chaperone-like assembly factor required to stabilise newly synthesised MT-CO1/COX1 and prevent its premature turnover. The C-terminal region of this protein is also processed to produce bioactive peptides known as phoenixin-14 and phoenixin-20, which were first identified through a bioinformatic approach. These secreted peptides are involved in multiple physiological functions. They act as ligands for the G protein-coupled receptor GPR173. Phoenixin peptides regulate gonadotropin-releasing hormone (GnRH) signalling in the hypothalamus and pituitary, augmenting luteinizing hormone release. They delay the appearance of estrus when reduced in vivo and modulate GnRH receptor expression. Additionally, phoenixin peptides regulate vasopressin secretion by hypothalamic neurones and have roles in memory retention, anxiety reduction, food intake regulation, granulosa cell proliferation, heart function, and islet cell proliferation.
