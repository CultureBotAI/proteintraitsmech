identifier: Pfam:PF26823
label: Putative phage T5 terminase, small subunit
definition: >-
  This entry represents a putative terminase, small subunit protein from Phage T5. Terminases are involved in viral DNA packaging. It binds to the packaging initiation site and regulates the ATPase activity of the terminase large subunit. This family is part of a complex that includes both small and large terminase subunits, which together form the viral DNA packaging machine. The small subunit is responsible for recognizing the viral DNA packaging sequence, while the large subunit possesses endonucleolytic and ATPase activities. The complex is docked on the portal protein of the procapsid, facilitating the cleavage and packaging of the viral genome. Once DNA packaging is complete, the terminase complex is replaced by neck proteins.
