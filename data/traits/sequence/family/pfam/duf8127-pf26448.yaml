identifier: Pfam:PF26448
label: Family of unknown function (DUF8127)
definition: >-
  This entry represents a family of uncharacterised proteins found in various archaea, particularly within the Halobacteria class. The proteins in this family are typically around 340 amino acids in length. According to the TED database these proteins are composed of three domains that are nested within each other. The outer domain is composed of six transmembrane helices.
