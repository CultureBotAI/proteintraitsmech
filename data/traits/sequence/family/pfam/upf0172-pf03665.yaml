identifier: Pfam:PF03665
label: Uncharacterised protein family (UPF0172)
definition: >-
  Saccharomyces cerevisiae ER membrane protein complex (EMC) comprises six subunits. Four and three additional subunits have been identified in mammals and Drosophila, respectively. EMC is required for protein folding in the endoplasmic reticulum (ER). It also facilitates lipid transfer from ER to mitochondria. This family includes mammalian subunits EMC8 and EMC9, and Drosophila EMC8/9 homologue. EMC8 is also known as neighbour of COX4 (NOC4).
