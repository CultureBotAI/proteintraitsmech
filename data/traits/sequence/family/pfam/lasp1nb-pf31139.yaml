identifier: Pfam:PF31139
label: LASP1 neighbour protein
definition: >-
  This entry represents human LASP1 neighbor protein and similar short sequences from vertebrates. LASP1 may play a key role in the skin fibroblasts (FBs)-keratinocyte-like cells (KLCs). The family contains a predicted transmembrane helix. The proteins are encoded at a genomic locus neighbouring the LASP1 gene. The function of this protein family remains to be determined.
