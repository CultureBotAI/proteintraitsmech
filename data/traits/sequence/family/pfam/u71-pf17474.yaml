identifier: Pfam:PF17474
label: Tegument protein UL11 homolog
definition: >-
  UL11 (also known as cytoplasmic envelopment protein 3) is conserved throughout the herpesvirus family. It is a membrane-associated tegument protein that is incorporated into the HSV virion. UL11 and UL51, either singly or in combination, are involved in virion envelopment and/or egress. Both proteins are fatty acylated. UL11 is acylated by both myristoic and palmitoic acids while UL51 is mono-acylated by palmitoic acid. UL11 homologue (U71) from HHV-6A/B is a myristylated virion protein which is expressed at the early stage of the lytic cycle. Proteins in this entry are from the muromegalovirus and roseolovirus groups.
