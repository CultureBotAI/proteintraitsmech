identifier: Pfam:PF02534
label: Type IV secretory system Conjugative DNA transfer
definition: >-
  This entry represents type IV secretion system proteins TraG and VirD4. TraG-like proteins are potential NTP hydrolases (NTPases) that are essential for DNA transfer in bacterial conjugation. They are thought to mediate interactions between the DNA-processing (Dtr) and the mating pair formation (Mpf) systems. TraG-like proteins also function as essential components of type IV secretion systems of several bacterial pathogens. TraG is essential for DNA transfer in bacterial conjugation. Agrobacterium tumefaciens VirD4 is essential for DNA transfer to plants. VirD has been shown to have topoisomerase activity in vitro.
