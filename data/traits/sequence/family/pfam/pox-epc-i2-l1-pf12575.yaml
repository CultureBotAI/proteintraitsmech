identifier: Pfam:PF12575
label: Poxvirus entry protein complex L1 and I2
definition: >-
  This entry represents Protein I2 from Vaccinia virus, also known as Protein OPG078, and similar sequences from poxvirus. I2 is a late protein which probably plays a role in virus entry into the host cell.
