identifier: Pfam:PF17719
label: Family of unknown function (DUF5564)
definition: >-
  This entry represents human 28S rRNA/ribosome and Sororin micro-cofactor (RSMC) and similar microproteins mainly found in vertebrates. RSMC, previously known as C11orf98, is involved in sister chromatid cohesion in human cells. It is PARylated at its interface with Sororin, which in turn enhances RSMC-Sororin association, improving both chromatin recruitment and anti-Wapl activity of Sororin in concert with SMC3 acetylation. This protein, primarily distributed in the nucleus, has also been shown to interact with nucleolar proteins nucleolin (NCL) and nucleophosmin (NPM1).
