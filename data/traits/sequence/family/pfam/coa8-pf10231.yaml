identifier: Pfam:PF10231
label: Cytochrome c oxidase assembly factor 8
definition: >-
  Apoptogenic protein 1 (Apop1, also known as cytochrome c oxidase assembly factor 8), previously thought to induce apoptosis through the Cyclophilin-D-dependent pathway, is required for cytochrome c oxidase (COX) assembly and function. Apop1 is controlled by the ubiquitination-proteasome system (UPS). In Drosophila melanogaster, Apop1 is also involved in neurological impairment, COX enzymatic activity, and resistance to oxidative stress conditions.
