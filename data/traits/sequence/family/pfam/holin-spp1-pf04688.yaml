identifier: Pfam:PF04688
label: SPP1 phage holin
definition: >-
  This entry represents holin proteins from tailed bacteriophages, actinobacteria and firmicutes, including Holin from Bacillus subtilis (XhlB), involved in cell lysis upon induction of PbsX, and from Bacillus phage SPP1, which accumulates harmlessly in the cytoplasmic membrane until it reaches a critical concentration that triggers the formation of micron-scale pores (holes) causing host cell membrane disruption and endolysin escape into the periplasmic space. Holins form large oligomeric flexible pores in the cytoplasmic membranes of bacteria to allow the endolysins to gain access to the cell wall, where they exert their actions by cleaving various bonds in the peptidoglycan polymer and inducing cell death. These proteins and its corresponding genes have been identified in a wide variety of Gram-negative and Gram-positive bacteria and their phages.
