identifier: Pfam:PF12478
label: UBAP2/protein lingerer
definition: >-
  This entry includes ubiquitin-associated protein 2 (UBAP2) from humans and protein lingerer (lig) from Drosophila melanogaster. Lig is a cytoplasmic protein involved in initiation and termination of copulation. Lig can act as a growth suppressor that associates with the RNA-binding proteins Fragile X messenger ribonucleoprotein 1 (FMR1) and Caprin (Capr) and directly interacts with and regulates the RNA-binding protein Rasputin (Rin).
