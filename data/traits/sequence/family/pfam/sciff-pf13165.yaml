identifier: Pfam:PF13165
label: 'Six-cysteine peptide SCIFF '
definition: >-
  Members of this protein family are essentially universal in the class Clostridia and therefore highly abundant in the human gut microbiome. This short peptide is designated SCIFF, for Six Cysteines in Forty-Five residues. It is a presumed ribosomal natural product precursor, always found associated with a yet-uncharacterised radical SAM protein, family , that resembles other peptide modification radical SAM enzymes and is designated SCIFF radical SAM maturase. The literature originally described the thioether cross-link introduced by ScfB from a Cys side chain as going to the alpha carbon (making SCIFF a "sactipeptide") of a Met residue, but more recently is was found to go elsewhere (making it a "ranthipeptide"), to the gamma carbon of a Thr residue.
