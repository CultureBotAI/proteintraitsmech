identifier: Pfam:PF05269
label: Bacteriophage CII protein
definition: >-
  The CII protein is a transcription activator, conserved in bacteriophage lambda and related phages, that plays a key role in the decision between lytic or lysogenic phage development. CII is regulated at multiple levels including transcription, translation initiation, mRNA stability, and proteolysis. Conditions that stabilise cII favour lysogenic development. The lambda CII protein activates three specific promoters, binding to direct repeat sequences rather than the more usual inverted repeats. Structurally, CII is a homotetramer where each monomer is composed of four α helices and a disordered C terminus. The α helical region is responsible for DNA binding and multimerisation. The homotetramer has an unusual spatial arrangement that allows recognition of the direct repeat sequences.
