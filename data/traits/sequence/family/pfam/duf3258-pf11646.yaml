identifier: Pfam:PF11646
label: Protein of unknown function DUF3258
definition: >-
  This protein family is found in virus and prophages from proteobacteria, including Uncharacterized protein ORF157 from Acidianus filamentous virus 1. This protein shows two antiparallel β-sheets formed by three and five strands in its N-terminal part and three helices towards the C-terminal, one of them roughly perpendicular to the other two, displaying similarity to the nucleotidyltransferase topology. It has nuclease activity in vitro, but its exact role remains unknown.
