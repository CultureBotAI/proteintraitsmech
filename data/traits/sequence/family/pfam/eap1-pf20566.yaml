identifier: Pfam:PF20566
label: eIF4E-associated protein
definition: >-
  This entry represents eIF4E-associated protein (Eap1) from yeast, which plays a role in cell growth and is implicated in the TOR signaling cascade. Eap1 binds to eIF4E and regulates translation. It competes with eIF4G (the large subunit of the cap-binding complex, eukaryotic initiation factor 4F (eIF4F)) for binding to eIF4E and accelerates mRNA degradation by promoting decapping. It associates with Puf5p and Dhh1p, being essential for Puf5p mediated repression.
