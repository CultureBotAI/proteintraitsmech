identifier: Pfam:PF09602
label: Polyhydroxyalkanoic acid inclusion protein (PhaP_Bmeg)
definition: >-
  This entry describes a protein found in polyhydroxyalkanoic acid (PHA) gene regions and incorporated into PHA inclusions in Bacillus cereus and Bacillus megaterium. The role of the protein may include amino acid storage.
