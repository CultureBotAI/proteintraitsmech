identifier: Pfam:PF06658
label: Protein of unknown function (DUF1168)
definition: >-
  Prkrip1, also known as protein C114, is a double-stranded RNA-binding protein. It consists of a fully extended N-terminal loop (residues 51-75) and an 18-turn α helix (residues 76-142). It directly links the catalytic centre with the U2 snRNP at the periphery of the spliceosome.
