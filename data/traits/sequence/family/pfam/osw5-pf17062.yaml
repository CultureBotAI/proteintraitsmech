identifier: Pfam:PF17062
label: Outer spore wall 5
definition: >-
  The outermost cape of the fungal spore wall is made up of a polymer that contains cross-linked amino acid dityrosine, which is important for the stress resistance of the spore. The OSW family of proteins have been implicated in assembly of this protective dityrosine coat. This entry includes OSW5 and related proteins, such as lipid droplet organization protein LDO16 (which is also known as OSW5).
