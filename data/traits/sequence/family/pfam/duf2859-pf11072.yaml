label: Protein of unknown function (DUF2859)
definition: >-
  This model describes a protein family exemplified by PFL_4695 ( ) of Pseudomonas fluorescens. Full-length proteins in this family show some architectural variety, but this model represents a conserved domain. Most or all member proteins belong to laterally transferred chromosomal islands called integrative conjugative elements, or ICE.
