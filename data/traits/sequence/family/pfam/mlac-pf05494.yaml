identifier: Pfam:PF05494
label: MlaC protein
definition: >-
  This family includes toluene tolerance protein Ttg2 and intermembrane phospholipid transport system binding protein MlaC. Proteins in this family show similarity to ABC transporters. Toluene tolerance is mediated by increased cell membrane rigidity resulting from changes in fatty acid and phospholipid compositions, exclusion of toluene from the cell membrane, and removal of intracellular toluene by degradation. Ttg2 is one of the many proteins involved in these processes. MlaC actively prevents phospholipid accumulation at the cell surface. It probably maintains lipid asymmetry in the outer membrane by retrograde trafficking of phospholipids from the outer membrane to the inner membrane. It may transfer phospholipid across the periplasmic space and deliver it to the mlaFEDB complex at the inner membrane.
