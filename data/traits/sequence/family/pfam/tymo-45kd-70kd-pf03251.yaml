identifier: Pfam:PF03251
label: Tymovirus 45/70Kd protein
definition: >-
  Tymoviruses are single stranded RNA viruses. This family includes a protein of unknown function that has been named based on its molecular weight. Tymoviruses such as the ononis yellow mosaic tymovirus encode only three proteins. Of these two are overlapping this protein overalps a larger ORF that is thought to be the polymerase.
