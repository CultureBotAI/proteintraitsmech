identifier: Pfam:PF08367
label: Peptidase M16C associated
definition: >-
  This domain appears in eukaryotes as well as bacteria and tends to be found near the C terminus of metalloproteases and related sequences belonging to MEROPS peptidase family M16 (subfamily M16C, clan ME), PreP subfamily. PREP is an ATP-independent protease that degrades both mitochondrial and chloroplastic transit peptides after their cleavage. It also degrades other unstructured peptides.
