identifier: Pfam:PF23821
label: Family of unknown function (DUF7191)
definition: >-
  This family of uncharacterised proteins is found in viruses, primarily cyanophages that infect cyanobacteria such as Synechococcus and Prochlorococcus species. The family contains short sequences, generally between 45-50 amino acid residues in length. No functional information is available for members of this family.
