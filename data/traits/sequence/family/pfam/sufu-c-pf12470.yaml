identifier: Pfam:PF12470
label: Suppressor of Fused Gli/Ci N terminal binding domain
definition: >-
  This entry represents the C-terminal domain of eukaryotic suppressor of fused (Sufu) proteins. It folds into a domain that comprises a four-stranded and a six-stranded β-sheet, both with mixed topologies, which are connected by two antiparallel α-helices. Sufu is a repressor of the Gli and Ci transcription factors of the Hedgehog signalling cascade. It functions by binding to these proteins and preventing their translocation to the nucleus. The Sufu C-terminal domain binds to the N-terminal of Gli/Ci, while the N-terminal of Sufu binds to the C-terminal of Gli/Ci. This dual binding mechanism is likely to be an evolutionary advancement in this signalling cascade, which is not present in bacterial homologues.
