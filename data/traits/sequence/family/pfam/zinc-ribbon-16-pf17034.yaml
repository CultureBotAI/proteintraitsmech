identifier: Pfam:PF17034
label: Zinc-ribbon like family
definition: >-
  This entry represents the zinc-ribbon-like domain found in the C-terminal end of the GATOR complex protein MIOS (also known as WD40 repeat containing protein mio). MIOS is a component of the GATOR subcomplex GATOR2, a complex which positively regulates mTORC1 signalling by acting upstream of or in parallel to GATOR1. GATOR1 complex is a major negative regulator of the amino acid sensing pathway and its loss causes mTORC1 signalling to be completely insensitive to amino acid starvation.
