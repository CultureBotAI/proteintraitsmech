identifier: Pfam:PF18760
label: ADP-Ribosyltransferase in polyvalent proteins
definition: >-
  This domain is found in a group of ADP-Ribosyltransferases found in polyvalent proteins of phages and conjugative elements. These are in turn related to the Tox-ART-HYD2 group of ADP-Ribosyltransferases that are seen in polymorphic toxin systems and in toxin-antitoxin systems. These are predicted to modify host proteins.
