identifier: Pfam:PF28671
label: Mitochondrial uncharacterised protein UMP2
definition: >-
  This entry represents the mitochondrial uncharacterised protein UMP2 family, found in plants. These proteins are approximately 113 amino acids in length and contain N-terminal mitochondrial transit peptides that are cleaved after residue 14. The mature proteins localise to mitochondria and have been identified in mitochondrial proteome studies. UMP2 proteins contain a disordered region and a C-terminal helical region. The proteins have been detected in respiratory chain complex I, suggesting a potential role in mitochondrial respiration. Three-dimensional structures have been determined by cryo-electron microscopy, revealing the helical C-terminal domain structure. The family is distributed across plant species within the Viridiplantae. The specific function of these proteins remains to be determined.
