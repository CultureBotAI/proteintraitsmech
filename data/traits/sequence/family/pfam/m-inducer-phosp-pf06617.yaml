identifier: Pfam:PF06617
label: M-phase inducer phosphatase
definition: >-
  M-phase inducer phosphatases function as dosage-dependent inducers in mitotic control. They are tyrosine protein phosphatases required for progression of the cell cycle. They may directly dephosphorylate p34(cdc2) and activate p34(cdc2) kinase activity. They catalyse the reaction: protein tyrosine phosphate + H 2 O = protein tyrosine + P i
