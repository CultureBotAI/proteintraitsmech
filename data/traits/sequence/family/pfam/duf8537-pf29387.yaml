identifier: Pfam:PF29387
label: Family of unknown function (DUF8537)
definition: >-
  This entry represents a family of small proteins of approximately 35-65 amino acids found exclusively in tailed bacteriophages. The family is restricted to the class Caudoviricetes, with members found predominantly in the family Demerecviridae, particularly the genera Tequintavirus and Epseptimavirus. Additional members are found in the subfamily Ounavirinae. The function of these proteins remains to be determined.
