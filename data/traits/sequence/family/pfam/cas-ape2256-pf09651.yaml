identifier: Pfam:PF09651
label: CRISPR-associated protein (Cas_APE2256)
definition: >-
  This entry represents a conserved region of about 150 amino acids found in a family of Cas proteins, such as ring nuclease SSO1393 from Saccharolobus solfataricus. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
