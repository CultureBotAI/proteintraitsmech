identifier: Pfam:PF07947
label: YhhN family
definition: >-
  This entry represents a family of proteins that include lysoplasmalogenase from humans (also known as Transmembrane protein 86B, TMEM86B) and similar proteins found in eukaryotes and bacteria. TMEM86B catalyses the degradation of lysoplasmalogen, which is formed by the hydrolysis of membrane glycerophospholipids, plasmalogens. It may modulate cell membrane properties. Uncharacterised membrane protein YhhN from E. coli also belongs to this group ( ). Putative conserved active site residues have been proposed for this family.
