identifier: Pfam:PF08023
label: 'Frog antimicrobial peptide '
definition: >-
  This family consists of the major classes of antimicrobial peptides secreted from the skin of frogs that protect the frogs against invading microbes. They are typically between 10-50 amino acids long and are derived from proteolytic cleavage of larger precursors. Major classes of peptides such esculentin, gaegurin, brevinin-2, rugosin and ranatuerin are included in this family.
