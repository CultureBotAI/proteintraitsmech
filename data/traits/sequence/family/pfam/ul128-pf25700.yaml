identifier: Pfam:PF25700
label: Cytomegalovirus UL128 protein
definition: >-
  This entry represents the UL128 protein from human cytomegalovirus (HCMV), which is thought to a role in viral entry into host cells and be part of the viral pentameric complex (Pentamer). The Pentamer, comprising gH/gL/UL128/UL130/UL131A, is essential for HCMV entry into dendritic, endothelial, and epithelial cells. UL128 contains an N-terminal region with a chemokine fold of CC-type that packs against a small domain. UL128 is connected to gH/gL by a 50 angstrom-long flexible linker that projects from the small domain to end in a three-turn α-helix docking on a hydrophobic groove formed by the gL three-helix bundle. UL128-Cys162 forms a disulfide bond with gL-Cys144, securing UL128 to the gL helical bundle. The Pentamer is the main target of neutralising antibody responses against HCMV, and multiple neutralising epitopes have been identified on UL128. Antibodies targeting UL128 can prevent Pentamer from binding to cells, suggesting it plays a role in cell receptor interaction.
