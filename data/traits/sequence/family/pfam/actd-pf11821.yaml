identifier: Pfam:PF11821
label: Alternative complex III, ActD subunit
definition: >-
  Alternative complex III (ACIII) is a multisubunit quinol:electron acceptor oxidoreductase that couples quinol oxidation with transmembrane proton translocation similar to bc1 complex (or complex III). It is a key component of the respiratory and photosynthetic electron transport chains in many bacteria. It has six subunits (ActA-F), ActD subunit represented in this entry. The transmembrane regions of this subunit is part of the TM arm of the complex. Although the function of this subunit is not clear, it may play a role in stabilising the TM region of ACIII which contributes to a stable menaquinol binding pocket and proton translocation passage.
