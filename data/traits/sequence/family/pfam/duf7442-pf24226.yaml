identifier: Pfam:PF24226
label: Phage membrane protein Family of unknown function (DUF7442)
definition: >-
  This entry represents a family of putative membrane proteins found in various bacteriophages. The proteins in this family typically contain two transmembrane helices. The function of these proteins is currently unknown. They are predominantly found in phages infecting Salmonella, Escherichia, and other enterobacteria. The proteins in this family are generally short, with most members being around 80-81 amino acids in length
