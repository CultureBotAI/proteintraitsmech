identifier: Pfam:PF28185
label: Dot/Icm T4SS effector Ceg14/SidL
definition: >-
  This entry represents a group of proteins from Legionella sp., including the Dot/Icm T4SS effector Ceg14 (also known as SidL, ) from Legionella pneumophila. Profilin, a protein involved in cytoskeletal structure in eukaryotes, suppresses the toxicity of Ceg14, which co-sediments with filamentous actin and inhibits actin polymerization in its presence.
