identifier: Pfam:PF15943
label: Bacterial toxin YdaS
definition: >-
  YdaS is a transcription factor found in the cryptic prophage Rac of E. coli K12 and represents a novel family within the HigA superfamily as it is distantly related to HigA antitoxins. YdaS can act as a toxin whose expression is regulated by RacR and behaves as a monomer in solution. Previously, it was thought to be an antitoxin that neutralises the toxin YdaT. This entry also includes some bacteriophage proteins, such as cro from Pseudomonas phage D3 and gene 30 protein from Enterobacteria phage phi80.
