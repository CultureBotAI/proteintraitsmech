identifier: Pfam:PF10266
label: Hereditary spastic paraplegia protein strumpellin
definition: >-
  The WASH (WASP and Scar homologue) complex is present at the surface of endosomes and recruits and activates the Arp2/3 complex to induce mediated actin nucleation. The WASH complex plays a key role in the fission of tubules that serve as transport intermediates during endosome sorting. The WASH complex consists of several subunits: F-actin-capping protein subunit alpha (CAPZA1, CAPZA2 or CAPZA3), F-actin-capping protein subunit beta (CAPZB), WASH (WASH1, WASH2P, WASH3P, WASH4P, WASH5P or WASH6P), FAM21 (FAM21A, FAM21B or FAM21C), KIAA1033, KIAA0196 (strumpellin) and CCDC53. Strumpellin contains one known domain called a spectrin repeat that consists of three α-helices of a characteristic length wrapped in a left-handed coiled coil. The spectrin proteins have multiple copies of this repeat, which can then form multimers in the cell. Spectrin associates with the cell membrane via spectrin repeats in the ankyrin protein. The spectrin repeat is a structural platform for cytoskeletal protein assemblies. Two closely situated point mutations in human strumpellin lead to the condition of hereditary spastic paraplegia.
