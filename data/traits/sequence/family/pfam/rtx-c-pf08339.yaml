identifier: Pfam:PF08339
label: RTX C-terminal domain
definition: >-
  This domain describes the C-terminal region of RTX toxins, which contains a secretion signal. RTX toxins may interact with lipopolysaccharide (LPS) to functionally impair and eventually kill leukocytes. This region is found in association with the RTX N-terminal domain ( ) and multiple hemolysin-type calcium-binding repeats ( ). Secretion of virulence factors in Gram-negative bacteria involves transportation of the protein across two membranes to reach the cell exterior. Four principal exotoxin secretion systems have been described. In the type II and IV secretion systems, toxins are first exported to the periplasm by way of a cleaved N-terminal signal sequence; a second set of proteins is used for extracellular transport (type II), or the C terminus of the exotoxin itself is used (type IV). Type III secretion involves at least 20 molecules that assemble into a needle; effector proteins are then translocated through this without need of a signal sequence. In the Type I system, a complete channel is formed through both membranes, and the secretion signal is carried on the C terminus of the exotoxin. The RTX (repeats in toxin) family of cytolytic toxins belong to the Type I secretion system, and are important virulence factors in Gram-negative bacteria, such as Escherichia coli ( ), Actinobacillus pleuropneumoniae ( ) and Kingella kingae ( ). They consist of a hydrophobic pore-forming domain at the N-terminal that harbors four putative transmembrane α-helices, a typical glycine-rich repeats segment and a C-terminal signal sequence. The glycine-rich repeats are essential for binding calcium, and are critical for the biological activity of the secreted toxins. They can be divided into two different groups, (i) hemolysins, which cause cause the lysis of erythrocytes and exh…
