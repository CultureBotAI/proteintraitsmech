definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000406) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide), in particular the phosphinothricintripeptide biosynthetic gene cluster from Streptomyces viridochromogenes. This family appears to be predominantly found in Actinobacteria.
