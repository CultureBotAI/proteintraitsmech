identifier: Pfam:PF16707
label: Cag pathogenicity island protein S of Helicobacter pylori
definition: >-
  This entry represents CAG pathogenicity island protein 13 (CagS), which is a family of proteins from the pathogenicity island of Helicobacter pylori. The gene lies just downstream of the cluster whose protein-products resemble those of the Vibrio proteins that form the structural core of T4SS. The exact function of CagS is not known.
