identifier: Pfam:PF26821
label: Bacteriophage T4 Y16F protein
definition: >-
  This entry represents the bacteriophage T4 Y16F protein family. Y16F is an uncharacterised 110-amino-acid protein with a predicted molecular weight of 12.8 kDa. The protein is encoded in the intergenic region between the arn and motA genes in the T4 genome, in the same genomic region as the related protein Y16C.
