identifier: Pfam:PF18506
label: RelB Antitoxin
definition: >-
  This entry represents a family of prokaryotic proteins, including antitoxin RelB from Methanocaldococcus jannaschii. RelE-RelB (RelBE) is a toxin-antitoxin (TA) protein complex. It is suggested that the toxic action of RelE is counteracted by antitoxin RelB, which wraps around RelE, blocks its active site and prevents sterically the binding to the ribosomal A-site. The long α-helix of the tightly bound antitoxin RelB covers the presumed active site of the toxin RelE that is formed by a central β-sheet.
