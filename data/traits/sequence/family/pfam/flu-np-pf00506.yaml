identifier: Pfam:PF00506
label: Influenza virus nucleoprotein
definition: >-
  Nucleoprotein (NP) from influenza virus is a structural protein which encapsidates the negative-strand viral RNA. NP is one of the main determinants of species specificity. The question of how far the NP gene can cross the species barrier by reassortment and become adapted by mutation to the new host has been discussed.
