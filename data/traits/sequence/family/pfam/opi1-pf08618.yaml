identifier: Pfam:PF08618
label: Transcription factor Opi1
definition: >-
  This entry represents a family of fungal transcription factors, including Transcriptional repressor OPI1 from Saccharomyces cerevisiae and Transcription factor ccg-8 from Neurospora crassa. Opi1 is a leucine zipper containing yeast transcription factor that negatively regulates phospholipid biosynthesis. It represses the expression of several UAS(INO) cis acting element containing genes and its activity is mediated by phosphorylations catalysed by protein kinase A, protein kinase C and casein kinase II. Ccg-8, also known as Clock-controlled protein 8, plays a pivotal role in azole adaptive responses by regulating the drug accumulation in the cells and regulates also phospholipid synthesis that is not involved in azole resistance.
