identifier: Pfam:PF27767
label: Archaeal Cdc45
definition: >-
  This entry represents cell division control protein 45 homolog (Cdc45) and related proteins. In archaea, this protein was previously known as RecJ but has been renamed Cdc45 based on its relationship to eukaryotic Cdc45. Cdc45 forms a constitutive complex with GINS (comprising Gins15 and Gins23), known as the CG complex. This CG complex associates with the MCM replicative DNA helicase at replication origins and during replication fork progression, stimulating its helicase activity. Cdc45 copurifies with MCM throughout the cell cycle, and chromatin immunoprecipitation indicates that these proteins move along the genome as if associated with moving replication forks.
