identifier: Pfam:PF24707
label: Swc3
definition: >-
  This domain sis found in SWR1-complex protein 3 from Saccharomyces cerevisiae (Swc3) and similar proteins from ascomycetes. Swc3 is a component of the SWR1 complex which mediates the ATP-dependent exchange of histone H2A for the H2A variant HZT1 leading to transcriptional regulation of selected genes by chromatin remodeling. SWC3 has been used to refer to both SWC3/YAL011W, whose gene product is involved in chromatin remodeling and ER biogenesis, and ALR1/YOL130W, a plasma membrane transporter.
