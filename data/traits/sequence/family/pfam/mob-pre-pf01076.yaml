identifier: Pfam:PF01076
label: Plasmid recombination enzyme
definition: >-
  With some plasmids, recombination can occur in a site specific manner that is independent of RecA. In such cases, the recombination event requires another protein called Pre. Pre is a plasmid recombination enzyme. This protein is also known as Mob (conjugative mobilisation).
