identifier: Pfam:PF06872
label: EspG protein
definition: >-
  This entry represents a family of bacterial virulence proteins, including EspG from Citrobacter rodentium and Escherichia coli and VirA from Shigella flexneri. Both EspG and VirA are delivered into infected host epithelial cells by a type III secretory system. These proteins function through the disruption of the host cell microtubule network. VirA acts as a cysteine protease ( ) on alpha-tubulin, a major component of microtubules, in order to destabilise surrounding microtubules and invade the cytoplasm of their target host cells. VirA also promotes the formation of membrane ruffles through the activation of host rac1, which is associated with the destruction of microtubule networks. In this way, VirA creates a tunnel inside the host cell cytoplasm by breaking down the microtubule infrastructure, which facilitates the bacterium's movement through the cytoplasm and also helps other bacteria move faster during the invasion of the eukaryotic cell.
