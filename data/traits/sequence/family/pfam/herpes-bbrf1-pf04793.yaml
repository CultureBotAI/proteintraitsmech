identifier: Pfam:PF04793
label: BRRF1-like protein
definition: >-
  Most proteins in this entry are uncharacterised viral proteins translated from gene 49. The UL6 locus of pseudorabies virus (PRV) has a gene cluster with homology to herpes simplex virus UL5, UL6, UL7 and UL8, Epstein-Barr virus BBRF1 and BBRF2, and Kaposi sarcoma-associated herpes virus ORF43 and ORF42.
