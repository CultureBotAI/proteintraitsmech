identifier: Pfam:PF07234
label: Movement and RNA silencing protein
definition: >-
  This family consists of several Babuvirus proteins of around 120 residues in length. Proteins in this family include movement and RNA silencing protein (also known as MP) from Banana bunchy top virus. MP acts as a suppressor of RNA-mediated gene silencing, also known as post-transcriptional gene silencing (PTGS), a mechanism of plant viral defense that limits the accumulation of viral RNAs. It transports viral genome to neighbouring plant cells directly through plasmosdesmata, without any budding. The movement protein allows efficient cell to cell propagation, by bypassing the host cell wall barrier.
