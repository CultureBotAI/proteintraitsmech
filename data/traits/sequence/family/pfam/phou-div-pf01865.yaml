identifier: Pfam:PF01865
label: Protein of unknown function DUF47
definition: >-
  This family includes prokaryotic proteins of unknown function, as well as a protein annotated as the pit accessory protein from Rhizobium meliloti (Sinorhizobium meliloti) ( ). However, while it has been hypothesised that this protein may play a role in orthophosphate transport (Pit stands for phosphate transport), its exact function is unknown.
