identifier: Pfam:PF01722
label: BolA-like protein
definition: >-
  This family consist of the morpho-protein BolA from Escherichia coli and its various homologues. In E. coli, over-expression of this protein causes round morphology and may be involved in switching the cell between elongation and septation systems during cell division. The expression of BolA is growth rate regulated and is induced during the transition into the the stationary phase. BolA is also induced by stress during early stages of growth and may have a general role in stress response. It has also been suggested that BolA can induce the transcription of penicillin binding proteins 6 and 5. IbaG is a BolA homologue involved in acid resistance.
