identifier: Pfam:PF08132
label: S-adenosyl-l-methionine decarboxylase leader peptide
definition: >-
  This family consists of the S-adenosyl-l-methionine decarboxylase (AdoMetDC) leader peptides. AdoMetDC is a key regulatory enzyme in the biosynthesis of polyamines. All expressed plant AdoMetDC mRNA 5, leader sequences contain a highly conserved pair of overlapping upstream ORFs (uORFs) that overlap by one base. Sequences of the small uORFs are highly conserved between monocot, dicot and gymnosperm AdoMetDC mRNA species, suggesting a translational regulatory mechanism.
