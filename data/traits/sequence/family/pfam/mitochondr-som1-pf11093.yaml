identifier: Pfam:PF11093
label: Mitochondrial export protein Som1
definition: >-
  Som1 is a component of the mitochondrial protein export system. Som1 proteins exhibit a highly conserved region and a pattern of cysteine residues. Stabilisation of Som1 occurs through an interaction between Som1 and Imp1, a peptidase required for proteolytic processing of certain proteins during their transport across the mitochondrial membrane. This suggests that Som1 represents a third subunit of the Imp1 peptidase complex.
