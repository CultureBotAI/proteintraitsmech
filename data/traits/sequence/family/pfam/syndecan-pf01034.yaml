identifier: Pfam:PF01034
label: Syndecan domain
definition: >-
  Syndecans are multifunctional transmembrane heparan sulphate bearing cell surface receptors. Structurally, these proteins consist of four separate domains: A signal sequence; An extracellular domain (ectodomain) of variable length whose sequence is not evolutionary conserved in the various forms of syndecans. The ectodomain contains the sites of attachment of the heparan sulphate glycosaminoglycan side chains; A transmembrane region; A highly conserved cytoplasmic domain of about 30 to 35 residues, which could interact with cytoskeletal proteins. This entry represents the syndecans cytoplasmic domain. The domain is also found in neurexins, which are neuronal cell surface proteins that may be involved in cell recognition and cell adhesion.
