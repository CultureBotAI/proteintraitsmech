identifier: Pfam:PF02422
label: Keratin
definition: >-
  Keratins are a well known group of intermediate filament proteins. Like actin filaments, keratins are flexible but provide a firm cell skeleton. Unlike actin, however, no known keratins are associated with motor functions. This family represents avian keratin proteins, found in feathers, scale and claw. The avian keratins (F-ker, S-ker, C-ker and B-ker) are a complex mixture of very similar polypeptides.
