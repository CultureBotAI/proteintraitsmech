identifier: Pfam:PF03902
label: Gal4-like dimerisation domain
definition: >-
  The DNA binding domain (residues 1 to 147) of the yeast transcriptional activator GAL4 exists in solution in dimeric form, with the region responsible for dimerisation somewhere between residues 74 and 147. Experimental studies confirmed that the 'hydrophobic region' of the protein (residues 54-97, which contains a larger proportion of α-helix), is essential for dimerisation.
