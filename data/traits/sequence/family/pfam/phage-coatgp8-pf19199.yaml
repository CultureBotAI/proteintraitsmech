identifier: Pfam:PF19199
label: Phage major coat protein, Gp8
definition: >-
  This entry represents the class I phage major coat protein Gp8 or B. The coat protein is largely α-helix with a slight curve. It is inserted in the host inner membrane, where filamentous phages are assembled and then extruded across the cellular envelope, without killing the bacterial host. The major coat protein in the capsid of filamentous bacteriophage forms a helical assembly of about 7000 identical protomers, with each protomer comprised of 46 amino acids, after the cleavage of the signal peptide. Each protomer forms a slightly curved helix that combines to form a tubular structure that encapsulates the viral DNA.
