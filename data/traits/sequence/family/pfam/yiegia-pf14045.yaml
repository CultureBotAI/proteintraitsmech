identifier: Pfam:PF14045
label: YIEGIA protein
definition: >-
  This family includes the B. subtilis YphB protein ( ), which is functionally uncharacterised (note - this is not a homologue of E. coli YphB). Its expression is regulated by the sporulation transcription factor sigma-F, however it is not essential for sporulation or germination. Proteins in this family are typically between 276 and 300 amino acids in length and contain a conserved YIEGIA motif.
