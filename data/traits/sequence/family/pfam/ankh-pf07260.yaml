identifier: Pfam:PF07260
label: Progressive ankylosis protein (ANKH)
definition: >-
  This family consists of several progressive ankylosis protein (ANK or ANKH) sequences, also known as Mineralization regulator ANKH in mammals. The ANK protein spans the outer cell membrane and shuttles inorganic pyrophosphate (PP i ), a major inhibitor of physiologic and pathologic calcification, bone mineralisation and bone resorption. Mutations in ANK are thought to give rise to Craniometaphyseal dysplasia (CMD) which is a rare skeletal disorder characterised by progressive thickening and increased mineral density of craniofacial bones and abnormally developed metaphyses in long bones.
