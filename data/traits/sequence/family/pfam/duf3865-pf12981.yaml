identifier: Pfam:PF12981
label: Domain of Unknown Function with PDB structure (DUF3865)
definition: >-
  This entry represents a family of proteins of unknown function. The Nostoc punctiforme protein ( ) has been structurally characterised and adopts a heme oxygenase-like fold similar to that of the Chlamydia trachomatis death domain-binding CADD protein. The proposed active sites of the Nostoc and Chlamydia sequences are identical, suggesting similar functions.
