identifier: Pfam:PF22814
label: Carrier-protein-independent halogenase WelO5
definition: >-
  This entry includes carrier-protein-independent halogenase WelO5 , an enzyme that chlorinates C13 of 12-epi-fischerindole U to yield 12-epi-fischerindole G. This enzymatic transformation constitutes the first step in the oxidative maturation to welwitindolinones. WelO5 adopts a cupin-like fold that is also characteristic of Fe/2OG enzymes. This entry also includes structurally related Fe-dependent dioxygenases, such as L-isoleucine 3(1)-dioxygenase which hydroxylates L-isoleucine at the C-4' position to form L-4'-hydroxyisoleucine (4'-HIL), L-gamma-glutamyl-L-propargylglycine hydroxylase which catalyses the hydroxylation of the dipeptide L-gamma-glutamyl-L-propargylglycine, leading to L-gamma-glutamyl-L-beta-ethynylserine. This entry also includes Leucinostatins biosynthesis cluster protein S which is part of the gene cluster that mediates the biosynthesis of the lipopeptide antibiotics leucinostatins that show extensive biological activities, including antimalarial, antiviral, antibacterial, antifungal, and antitumor activities, as well as phytotoxi.
