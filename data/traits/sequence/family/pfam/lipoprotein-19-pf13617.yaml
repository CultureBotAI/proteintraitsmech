identifier: Pfam:PF13617
label: YnbE-like lipoprotein
definition: >-
  This family includes E. coli YnbE and similar lipoproteins. The N-terminal contains a lipid attachment site. YnbE is involved in maintaining outer membrane lipid homeostasis. It interacts with the inner membrane protein YdbH to form a functional protein bridge that connects the inner and outer membranes of the cell. Its presence is essential for YdbH's function and may facilitate the transport of phospholipids across the periplasm.
