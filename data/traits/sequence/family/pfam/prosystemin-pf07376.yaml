identifier: Pfam:PF07376
label: Prosystemin
definition: >-
  This family consists of several plant specific Systemin and Prosystemin proteins. Systemin is processed from a larger prohormone protein, called prosystemin, by proteolytic cleavages. Systemin activates a lipid-based signal transduction pathway in which linolenic acid is converted to jasmonic acid, a potent activator of defense gene transcription, including proteinase inhibitor.
