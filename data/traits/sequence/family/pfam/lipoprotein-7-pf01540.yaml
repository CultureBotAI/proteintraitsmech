identifier: Pfam:PF01540
label: Adhesin lipoprotein
definition: >-
  This family includes the p50 and variable adherence-associated antigen (Vaa) adhesins from Metamycoplasma hominis and some uncharacterised proteins from bacteria and archaea. M. hominis is a mycoplasma associated with human urogenital diseases, pneumonia, and septic arthritis. An adhesin is a cell surface molecule that mediates adhesion to other cells or to the surrounding surface or substrate. The Vaa antigen is a 50kDa surface lipoprotein that has four tandem repetitive DNA sequences encoding a periodic peptide structure, and is highly immunogenic in the human host. p50 is also a 50kDa lipoprotein, having three repeats A,B and C, that may be a tetramer of 191kDa in its native environment.
