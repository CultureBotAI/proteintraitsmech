identifier: Pfam:PF08933
label: Monodechloroaminopyrrolnitrin synthase PrnB
definition: >-
  This protein family includes Monodechloroaminopyrrolnitrin synthase PrnB from Pseudomonas fluorescens and similar bacterial proteins. PrnB is involved in the biosynthesis of the antifungal compound pyrrolnitrin. It is organised into two domains: a small N-terminal capping domain that consists of 7 α-helices and the core helical domain, which is related to myoglobin. PrnB shows structural homology to the heme b-dependent two-domain indoleamine 2,3-dioxygenase enzyme (IDO) and to the tryptophan 2,3-dioxygenase (TDO) family.
