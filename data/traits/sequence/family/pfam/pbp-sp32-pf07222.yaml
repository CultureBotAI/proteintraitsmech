identifier: Pfam:PF07222
label: Proacrosin binding protein sp32
definition: >-
  This family consists of several mammalian specific proacrosin binding protein sp32 sequences. sp32 is a sperm specific protein, which is known to bind with 55- and 53kDa proacrosins and the 49kDa acrosin intermediate. The exact function of sp32 is unclear, it is thought however that the binding of sp32 to proacrosin may be involved in packaging the acrosin zymogene into the acrosomal matrix. During the activation of the boar proacrosin/acrosin system, the expression of sp32 is upregulated and its tyrosine phosphorylation levels is increased.
