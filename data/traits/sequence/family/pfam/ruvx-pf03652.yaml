identifier: Pfam:PF03652
label: Holliday junction resolvase
definition: >-
  This entry represents a group of predicted nucleases involved in processing of the 5'-end of pre-16S rRNA. This entry typified by the Escherichia coli protein YqgF, which exhibits an RNAse H fold in crystal structure and is involved in the processing of pre-16S rRNA during ribosome maturation.
