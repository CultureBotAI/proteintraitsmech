identifier: Pfam:PF24647
label: Phage blade protein
definition: >-
  This entry represents a small family of short uncharacterised phage proteins including Uncharacterized 7.2 kDa protein in alt-Gp30 intergenic region from Bacteriophage T4 ( ). Structure prediction of suggests the protein adopts a four stranded β-sheet that can form homo-oligomers, with a homohexamer forming a β-propeller structure (iPTM=0.93). The function of these proteins is unknown.
