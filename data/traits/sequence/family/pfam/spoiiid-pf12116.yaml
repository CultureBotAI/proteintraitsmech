identifier: Pfam:PF12116
label: Stage III sporulation protein D
definition: >-
  Members of this entry represent the transcriptional regulator SpoIIID, or stage III sporulation protein D. It is present in genomes if, and only if, the species is capable of endospore formation. In Bacillus subtilis SpoIIID is a DNA binding protein that is involved in gene repression as well as activation.
