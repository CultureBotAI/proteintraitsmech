identifier: Pfam:PF26508
label: Family of unknown function (DUF8170)
definition: >-
  This entry represents a pair of domains from a family of uncharacterised proteins in halophilic archaea. The proteins are predominantly found in the class Halobacteria, which includes genera such as Halorubrum, Natrialbaceae, and Haloferacaceae. The proteins in this family typically range from 180 to 270 amino acids in length. The family contains one domain nested withing another. The outer domain shows structural similarity to a family of Nucleoside 2-deoxyribosyltransferases.
