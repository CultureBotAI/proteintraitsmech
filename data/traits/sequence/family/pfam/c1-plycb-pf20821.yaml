identifier: Pfam:PF20821
label: Streptococcus virus C1, PlyCB
definition: >-
  PlyCB is one of the two components of the potent endolysin PlyC, an enzyme specific for streptococcal species. PlyC consists of a single PlyCA catalytic subunit in complex with eight PlyCB molecules arranged in a planar octameric ring. One surface of the PlyCB octamer is quite planar, whereas the other is more convex in shape. The bacterial cell wall binding is achieved through a cleft on PlyCB, which interacts strongly with phosphatidylserine so that PlyC can cross the epithelial cell membrane
