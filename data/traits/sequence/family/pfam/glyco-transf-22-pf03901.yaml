identifier: Pfam:PF03901
label: Alg9-like mannosyltransferase family
definition: >-
  Members of this family are glycosylphosphatidylinositol mannosyltransferase enzymes [ec:2.4.1.-]. At least some members are localised in endoplasmic reticulum and involved in glycosyl phosphatidyl inositol (GPI) anchor biosynthesis. In Arabidopsis, mannosyltransferase APTG1 (Abnormal Pollen Tube Guidance1) is required for pollen tube micropylar guidance and embryo development. In budding yeast, Smp3 (YOR149C) has been implemented in plasmid stability. This entry includes PIG-B, an alpha-1,2-mannosyltransferase that catalyses the transfer of the third mannose. It contains a membrane-embedded domain named BindGPILA, also found in the GPI lipid anchor pathway proteins PIG-B, PIG-M, PIG-U, PIG-W, PIG-V, and PIG-Y, which it is thought to be responsible for recognising, binding and stabilising the GPI lipid anchor.
