identifier: Pfam:PF25733
label: Cytomegalovirus UL135 protein
definition: >-
  This entry represents the Human cytomegalovirus UL135 protein, which remodels the actin cytoskeleton to impair immune recognition of infected cells. UL135 interacts directly with abl interactor 1 (ABI1) and ABI2 to recruit the WAVE2 regulatory complex to the plasma membrane, resulting in dramatic actin cytoskeleton remodelling. This modification disrupts immune synapse formation between the infected cell and immune effector cells, thereby inhibiting both natural killer (NK) cell and T cell functions. UL135 also interacts with talin to disrupt cell contacts with the extracellular matrix. The protein is expressed during early phase of viral infection and localises to the Golgi apparatus and plasma membrane.
