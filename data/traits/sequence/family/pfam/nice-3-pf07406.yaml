identifier: Pfam:PF07406
label: NICE-3 protein
definition: >-
  This entry represents Lipid transport auxiliary protein 1 (LTAP1) found in eukaryotes. LTAP1 is required for the formation of endoplasmic reticulum-plasma membrane junctions and functions as an accessory protein for bridge-like lipid transfer protein BLTP1, participating in lipid delivery between endoplasmic reticulum and cell membranes. It also regulates the phagocytosis of Gram-negative bacteria like L. pneumophila and E. coli, as well as Gram-positive bacteria such as S. aureus.
