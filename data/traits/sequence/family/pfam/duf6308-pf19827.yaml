definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000699) is described by MIBiG as an example of the following biosynthetic class, saccharide, in particular the hygromycin A biosynthetic gene cluster from Streptomyces hygroscopicus subsp. hygroscopicus. This family appears to be predominantly found in Actinobacteria.
