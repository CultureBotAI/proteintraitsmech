identifier: Pfam:PF29389
label: Family of unknown function (DUF8538)
definition: >-
  This entry represents a family of small proteins of approximately 73 amino acids found exclusively in tailed bacteriophages. The family is restricted to the class Caudoviricetes, particularly members of the family Demerecviridae. Within this family, the proteins are found in the genera Tequintavirus and Epseptimavirus. The function of these proteins remains to be determined.
