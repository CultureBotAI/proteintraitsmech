identifier: Pfam:PF05524
label: PEP-utilising enzyme, N-terminal
definition: >-
  This sequence identifies proteins which are a component of the phosphoenolpyruvate:sugar phosphotransferase system (PTS), a major carbohydrate active transport system. The PTS system is found throughout the bacterial kingdom, and is responsible for the coupled phosphorylation and translocation of numerous sugars across the cytoplasmic membrane. This entry represents the N-terminal domain of enzyme I (EIN) which transfers the phosphoryl group from phosphoenolpyruvate (PEP) to the phosphoryl carrier protein (HPr) which in turn phosphorylates a group of membrane-associated proteins, known as enzyme II. The N-terminal domain of EI (EIN) extends from residues 1 to 259 and can be phosphorylated in a fully reversible manner by phosphorylated HPr. EIN, however, cannot be autophosphorylated by PEP.
