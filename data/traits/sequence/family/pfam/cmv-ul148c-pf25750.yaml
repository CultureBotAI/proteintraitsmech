identifier: Pfam:PF25750
label: Human cytomegalovirus UL148C
definition: >-
  This entry represents a family of viral membrane proteins UL148C found in Human cytomegalovirus (HCMV). UL148C is predicted to contain two transmembrane helices and is located in the host cell membrane. The specific function of this protein remains to be determined.
