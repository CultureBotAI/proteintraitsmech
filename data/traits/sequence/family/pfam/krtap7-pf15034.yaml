identifier: Pfam:PF15034
label: KRTAP type 7 family
definition: >-
  This family includes keratin-associated protein 7-1, a member of the type 7 family. In the hair cortex, hair keratin intermediate filaments are embedded in an interfilamentous matrix, consisting of hair keratin-associated proteins (KRTAP), which are essential for the formation of a rigid and resistant hair shaft through their extensive disulphide bond cross-linking with abundant cysteine residues of hair keratins. The matrix proteins include the high-sulphur and high-glycine-tyrosine keratins. Other groups of keratin-associated proteins include and .
