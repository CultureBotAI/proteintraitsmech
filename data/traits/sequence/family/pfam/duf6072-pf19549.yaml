label: Family of unknown function (DUF6072)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000967) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide. This family includes a protein from the calyculin A biosynthetic gene cluster from uncultured Candidatus Entotheonella sp. and appears to be predominantly found in bacteria.
