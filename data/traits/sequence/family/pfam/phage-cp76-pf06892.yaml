identifier: Pfam:PF06892
label: Phage regulatory protein CII (CP76)
definition: >-
  This entry represents Regulatory protein CII from Escherichia phage 186 (Bacteriophage 186) and similar proteins from tailed bacteriophages (Caudovirales) and prophages from Proteobacteria. CII (also known as CP76) is a transcriptional activator essential for the establishment of lysogeny. The expression of this protein increases gradually with lysogenisation, which frequency increases with multiple infections.
