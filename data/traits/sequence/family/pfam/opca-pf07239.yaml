identifier: Pfam:PF07239
label: Outer membrane protein OpcA
definition: >-
  This entry represents OpcA-type outer membrane adhesion proteins. OpcA (formerly called 5C) was isolated from Neisseria meningitidis, causative agent of meningococcal meningitis and septicemia. An outer membrane protein embedded in the lipid bilayer, OpcA was shown to play an important role in meningococcal adhesion and invasion of both epithelial and endothelial cells, mediating attachment to host cells by binding proteoglycan cell-surface receptors. OpcA forms a 10-stranded β-barrel with five highly mobile extracellular loops that protrude above the surface of the membrane. These extracellular loops combine to form a crevice in the external surface that is lined by positively charged residues, which is predicted to be a binding site for proteoglycan polysaccharides involved in pathogenesis. Conformational changes in the extracellular loops modulate the surface of OpcA, which could affect the proteoglycan binding site. These conformational changes could also lead to pore opening.
