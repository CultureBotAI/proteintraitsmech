identifier: Pfam:PF05382
label: 'Bacteriophage peptidoglycan hydrolase '
definition: >-
  This entry is represents bacteriophage lysins (Cell wall hydrolase; ). The Pal protein from the pneumococcal bacteriophage Dp-1 ( ) has been shown to be an N-acetylmuramoyl-L-alanine amidase. According to the known modular structure of this and other peptidoglycan hydrolases from the pneumococcal system, the active site should reside within this domain while a C-terminal domain binds to the choline residues of the cell wall teichoic acids.
