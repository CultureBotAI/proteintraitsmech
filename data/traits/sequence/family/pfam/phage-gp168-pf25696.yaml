identifier: Pfam:PF25696
label: Bacteriophage beta-clamp binding protein
definition: >-
  This entry represents a bacteriophage protein family that includes Gp168 from phage Twort, which inhibits bacterial DNA replication. The protein exists as a hexamer in solution but binds as a dimer to the bacterial β-clamp, a protein essential for DNA replication. Unlike other β-clamp binding proteins that interact with the hydrophobic binding pocket, Gp168 occupies the central DNA sliding channel of the β-clamp, preventing DNA loading. This represents a novel mechanism for bacteriophage-mediated inhibition of host DNA synthesis. Key residues include Y14, which forms hydrogen bonds with the β-clamp and is essential for the interaction. Gp168 can bind β-clamps from both Staphylococcus aureus and Bacillus subtilis, suggesting cross-species activity. A related protein, Gp240 from phage G1, shares 46% sequence identity with Gp168 and likely functions through a similar mechanism. According to structural and sequence analysis, Gp168 represents a new class of proteins with no significant similarity to other known protein structures.
