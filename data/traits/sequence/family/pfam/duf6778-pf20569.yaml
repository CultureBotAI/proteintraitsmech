label: Family of unknown function (DUF6778)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is found in bacteria, predominantly in rhodobacteria. Proteins in this family are typically between 203 and 225 amino acids in length. This family contains the conserved sequence motifs DIVW, RFH and GGxH.
