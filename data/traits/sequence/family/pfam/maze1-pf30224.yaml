identifier: Pfam:PF30224
label: MazE1 antitoxin family
definition: >-
  This entry represents the MazE1 antitoxin family, found in Mycobacterium bovis. The representative member MazE1 from Mycobacterium bovis strain AF2122/97 is a 100 amino acid probable antitoxin. The function of this protein remains to be determined.
