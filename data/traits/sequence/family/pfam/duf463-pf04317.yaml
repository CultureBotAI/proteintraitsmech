identifier: Pfam:PF04317
label: YcjX-like family, DUF463
definition: >-
  This family represents a group of proteins related to Ras-like GTPase YcjX. The crystal structure of YcjX from Shewanella oneidensis has now been solved, and shows it to be a Ras-like GTP-binding protein that binds GTP and GDP, and has an intrinsic GTPase activity. YcjX utilises a non-canonical switch 2' motif not found in any other G protein.
