identifier: Pfam:PF11423
label: Regulatory protein Mnt
definition: >-
  This entry is represented by Bacteriophage P22, Mnt. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. Mnt is a repressor which is involved in the genetic switch between lysogenic and lytic growth in bacteriophage P22. The C-terminal domain of the protein consists of a dimer of two antiparallel coiled coils with a right handed twist, which is both stronger and has closer inter-helical separation compared with those found in left-handed coiled coils.
