identifier: Pfam:PF11522
label: Yeast phosphatidylinositol-4-OH kinase Pik1
definition: >-
  Pik1 is a regulator of membrane traffic and participates in the mating-pheromone signal-transduction cascade. The protein is localised to the nucleus and cytoplasm in the Golgi. Pik1 is thought to have an actin-independent role in membrane transport. This entry represents a helix hairpin found after.
