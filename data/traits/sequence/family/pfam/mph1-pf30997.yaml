identifier: Pfam:PF30997
label: Maintenance of PSII under high light protein 1
definition: >-
  This entry represents the MPH1 (maintenance of PSII under high light 1) protein found in land plants. MPH1 is a single-pass thylakoid membrane protein that localises to chloroplasts. In Arabidopsis thaliana, MPH1 interacts with photosystem II (PSII) core complex proteins including psbA, psbB, psbC and psbD, and participates in the maintenance of normal PSII activity under photoinhibitory stress. MPH1 protects PSII from photooxidative damage under high-light conditions. Loss of MPH1 results in elevated photodamage to PSII reaction centre proteins after high-light treatment.
