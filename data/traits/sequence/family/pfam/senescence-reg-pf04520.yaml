identifier: Pfam:PF04520
label: Senescence regulator
definition: >-
  Proteins in this family include AtS40-3 from Arabidopsis thaliana and similar sequences from plants. AtS40-3 is induced during senescence and is also regulated in response to dark treatment, ABA, salicylic acid and pathogen attack. It also affects the natural variation of cyst nematodes sex ratio and susceptibility to parasitic nematodes, depending on single nucleotide polymorphism (SNPs) between cultivars.
