identifier: Pfam:PF23891
label: Family of unknown function (DUF7243)
definition: >-
  This family of phage proteins adopt a structure composed of a pair of jelly roll fold domains with one nested within the other. This fold is suggestive of a phage head structural protein. Structure predictions suggest that these proteins can form pentameric or hexameric arrangements mediated by the outer of the two domains.
