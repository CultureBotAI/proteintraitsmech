identifier: Pfam:PF02276
label: Photosynthetic reaction centre cytochrome C subunit
definition: >-
  The photosynthetic apparatus in non-oxygenic bacteria consists of light-harvesting (LH) protein-pigment complexes LH1 and LH2, which use carotenoid and bacteriochlorophyll as primary donors. LH1 acts as the energy collection hub, temporarily storing it before its transfer to the photosynthetic reaction centre (RC). Electrons are transferred from the primary donor via an intermediate acceptor (bacteriopheophytin) to the primary acceptor (quinine Qa), and finally to the secondary acceptor (quinone Qb), resulting in the formation of ubiquinol QbH2. RC uses the excitation energy to shuffle electrons across the membrane, transferring them via ubiquinol to the cytochrome bc1 complex in order to establish a proton gradient across the membrane, which is used by ATP synthetase to form ATP. The core complex is anchored in the cell membrane, consisting of one unit of RC surrounded by LH1; in some species there may be additional subunits. RC consists of three subunits: L (light), M (medium), and H (heavy). Subunits L and M provide the scaffolding for the chromophore, while subunit H contains a cytoplasmic domain. In Rhodopseudomonas viridis, there is also a non-membranous tetrahaem cytochrome (4Hcyt) subunit on the periplasmic surface. In the purple bacterium Rhodocyclus gelatinosus (Rhodopseudomonas gelatinosa), a high potential Fe-S protein (HiPIP) acts as an electron donor to reaction centre-bound cyt bc1 under anaerobic conditions in the light, while cyt c acts as a soluble electron carrier under aerobic conditions in the dark in order to re-reduce the oxidized electron donor.
