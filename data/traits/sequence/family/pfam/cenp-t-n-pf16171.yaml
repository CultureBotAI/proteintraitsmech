identifier: Pfam:PF16171
label: Centromere kinetochore component CENP-T N-terminus
definition: >-
  Multiple proteins are assembled on centromeric DNA to form the kinetochore structure. CENP-T is a component of the constitutive centromere associated network (CCAN) of proteins that creates a platform for kinetochore formation. CENP-T associates directly with CENP-W. The N terminus of CENP-T proteins interacts directly with the Ndc80 complex in the outer kinetochore. Importantly, the CENP-T-W complex does not directly associate with CENP-A, but with histone H3 in the centromere region. CENP-T and -W form a hetero-tetramer with CENP-S and -X and bind to a ~100 bp region of nucleosome-free DNA forming a nucleosome-like structure. The DNA-CENP-T-W-S-X complex is likely to be associated with histone H3-containing nucleosomes rather than with CENP-nucleosomes. This entry represents the N terminus of CENP-T.
