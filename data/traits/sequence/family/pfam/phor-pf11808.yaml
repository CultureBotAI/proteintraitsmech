identifier: Pfam:PF11808
label: Phosphate regulon sensor protein PhoR
definition: >-
  This entry represents the N-terminal domain of Phosphate regulon sensor protein PhoR from Escherichia coli and similar proteins mainly found in proteobacteria. PhoR is a member of the two-component regulatory system PhoR/PhoB involved in the phosphate regulon genes expression. PhoR is the bifunctional histidine autokinase/phospho-PhoB phosphatase that donates a phosphoryl group to PhoB when environmental Pi is limiting and removes the phosphoryl group from phosphorylated PhoB (PhoB~P) when environmental Pi is abundant.
