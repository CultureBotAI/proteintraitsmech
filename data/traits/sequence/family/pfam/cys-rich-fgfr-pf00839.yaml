identifier: Pfam:PF00839
label: Cysteine rich repeat
definition: >-
  This cysteine rich repeat contains four cysteines. It is found in multiple copies in metazoan proteins, single copies occur in some bacterial species and is absent from the fungi. The Golgi apparatus protein 1 (GLG1), which is located in Golgi cisterns of various cell types, can bind fibroblast growth factor and E-selectin. Sixteen cysteine-rich GLG1 repeats form the core of the protein and are located in the lumen. The C-terminal part of GLG1 is composed of a transmembrane region and a short cytoplasmic tail. The Cys-rich GLG1 repeat is a ~60 amino acid module that contains 4 Cys residues, which can form intrachain disulphide bridges. Homologues of the vertebrate GLG1/Golgi sialoglycoprotein MG-160 (Mg160)/E-selectin ligand 1 (ESL1)/cysteine-rich fibroblast growth factor receptor 1 (CFR1)/latent transforming growth factor-beta complex protein 1 (LTCP-1) have been found in insects and the nematode Caenorhabditis elegans.
