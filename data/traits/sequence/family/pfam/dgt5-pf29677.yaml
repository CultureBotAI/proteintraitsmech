identifier: Pfam:PF29677
label: Augmin complex subunit dgt5
definition: >-
  This entry represents augmin complex subunit dgt5 (dim gamma-tubulin 5). The protein is a component of the augmin complex, which plays a role in centrosome-independent generation of spindle microtubules. The complex is required for mitotic spindle assembly through its involvement in localising gamma-tubulin to spindle microtubules. Dgt5 localises to kinetochores, centrosomes and spindle microtubules during mitosis. The protein contains coiled coil regions and forms part of an eight-subunit complex with dgt2, dgt3, dgt4, dgt6, msd1, msd5 and wac.
