identifier: Pfam:PF15186
label: Testis-expressed sequence 13 protein family
definition: >-
  This entry represents a likely coiled-coil region found at the N-terminal of testis-expressed proteins 13 A-D from vertebrates such as in homo sapiens, whose function has not, as yet, been determined. However, members are thought to be encoded for by spermatogonially-expressed, germ-cell-specific genes. There are two conserved sequence motifs: FIN and LAL.
