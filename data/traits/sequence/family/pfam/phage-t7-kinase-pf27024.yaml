identifier: Pfam:PF27024
label: Bacteriophage T7 protein kinase 0.7
definition: >-
  This entry represents protein kinase 0.7 found in T7-like bacteriophages. This serine/threonine kinase modulates host metabolism to favour virus replication by phosphorylating multiple host proteins. Key targets include RNA polymerase subunits RpoC and RpoB, RNA degradosome components RNase E and RhlB, and translational machinery components including initiation factors InfA/B/C, ribosomal proteins RpsA/F, and elongation factor FusA. The protein is 359 amino acids (41.1 kDa) and contains a coiled-coil region (residues 231-283) and undergoes inhibitory autophosphorylation at serine 216. Protein phosphorylation, which plays a key role in most cellular activities, is a reversible process mediated by protein kinases and phosphoprotein phosphatases. Protein kinases catalyse the transfer of the gamma phosphate from nucleotide triphosphates (often ATP) to one or more amino acid residues in a protein substrate side chain, resulting in a conformational change affecting protein function. Phosphoprotein phosphatases catalyse the reverse process. Protein kinases fall into three broad classes, characterised with respect to substrate specificity: Serine/threonine-protein kinases Tyrosine-protein kinases Dual specificity protein kinases (e.g. MEK -phosphorylates both Thr and Tyr on target proteins) Protein kinase function is evolutionarily conserved from Escherichia coli to human. Protein kinases play a role in a multitude of cellular processes, including division, proliferation, apoptosis, and differentiation. Phosphorylation usually results in a functional change of the target protein by changing enzyme activity, cellular location, or association with other proteins. The catalytic subunits of protein kinases are highly conserved, and several structures have been solved, leading to l…
