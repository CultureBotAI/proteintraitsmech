identifier: Pfam:PF20007
label: FtsH ternary system-associated peptide
definition: >-
  This entry represents a predicted peptide-effector encoded as standalone domain in some FtsH ternary system neighborhoods. It is likely modified by the Radical SAM domain also found in these neighbourhoods. The FtsH ternary systems are a class of NTP-dependent biological conflict systems.
