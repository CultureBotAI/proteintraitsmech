identifier: Pfam:PF28212
label: Conjugal transfer protein TraW-like
definition: >-
  Members of this family represent conjugal plasmid transfer proteins, including TraW, predominantly found in proteobacteria. The term conjugal plasmid transfer is used for certain transfer systems, including that of IncI1 family plasmids. Note that an unrelated protein, also designated TraW, participates in the assembly of F-pilin subunits, involved in transfer of F-plasmids.
