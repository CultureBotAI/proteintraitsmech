identifier: Pfam:PF25708
label: Phage T7 gp5.9 RecBCD inhibitor
definition: >-
  This entry represents a group of phage proteins that act as a DNA mimic to inhibit the bacterial RecBCD complex, encoded by gene 5.9 (Gp5.9). The T7 gp5.9 protein adopts a parallel coiled-coil architecture with an N-terminal β-sheet. The protein's highly acidic surface mimics DNA structure, allowing it to compete with DNA for the binding site on RecBCD. By binding predominantly to the RecB arm domain, gp5.9 prevents RecBCD from binding to DNA, thereby protecting the phage genome from degradation. This inhibitory mechanism is functionally similar to lambda phage Gam protein, though structurally distinct. Low nanomolar concentrations of gp5.9 are sufficient to inhibit RecBCD helicase activity in vitro. In long proteins, this entry is only found at the C-terminal, while in shorter proteins it covers the full length.
