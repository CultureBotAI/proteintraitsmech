identifier: Pfam:PF22099
label: Magnesium transporter MRS2-like
definition: >-
  This functionally diverse eukaryotic family includes the inner mitochondrial membrane Mg2+ transporters Mfm1p/Lpe10p and Mrs2p from Saccharomyces cerevisiae; and human MRS2/MRS2L. It also includes a family of Arabidopsis thaliana proteins (AtMGTs) some of which are localized to distinct tissues, and not all of which can transport Mg2+.
