identifier: Pfam:PF24445
label: Family of unknown function (DUF7564)
definition: >-
  This entry represents a small family of uncharacterised proteins found in Haloferacales. They contain two pairs of conserved cysteines that are likely involved in metal coordination. These proteins are predicted to structurally resemble treble-clef zinc fingers.
