identifier: Pfam:PF26887
label: Bacteriophage T4 endonuclease IV
definition: >-
  This entry represents endonuclease IV found in T4-like bacteriophages. This enzyme cleaves single-stranded DNA in a deoxycytidine-specific manner, with cleavage occurring exclusively at the 5'-proximal position within a deoxycytidine tract having a minimal size of 6 bases. These specific cleavages may have a detrimental effect on the replication of host deoxycytidine-containing DNA.
