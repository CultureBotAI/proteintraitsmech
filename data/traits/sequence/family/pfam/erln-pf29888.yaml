identifier: Pfam:PF29888
label: Endoregulin
definition: >-
  This protein family includes the short human protein Endoregulin, which inhibits the activity of the calcium ATPases ATP2A2/SERCA2 and ATP2A3/SERCA3 by decreasing their apparent affinity for Ca2+. This protein is predicted to adopt an α-helical configuration.
