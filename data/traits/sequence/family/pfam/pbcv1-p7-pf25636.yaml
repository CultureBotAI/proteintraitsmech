identifier: Pfam:PF25636
label: PBCV-1 P7 disulphide-bonded subdomain
definition: >-
  This entry represents a small disulphide-bonded subdomain in multiple copies of the P7 protein of Paramecium bursaria chlorella virus 1 (PBCV-1). In the viral capsid, P7 is situated at the conjunction of capsomers b, c, and e, glueing these three capsomers together within the pentasymmetron. This subdomain plays a crucial role in stabilising the viral capsid structure of PBCV-1, a large dsDNA-containing virus that infects certain chlorella-like green algae.
