identifier: Pfam:PF20299
label: Nucleotidyltransferase-Associated Rossmannoid Fold
definition: >-
  This entry represents an inactive bacterial domain, which is a member of the Receiver superfamily of the Rossmonnoid fold. It is predicted to function as a sensor domain in certain nucleotide-activated effector conflict systems. This domain is thought to bind nucleotides synthesized by both the SMODS domain and the CRISPR polymerase (Cpol) domain of the Cas10-like proteins, depending on genome context. N-terminal transmembrane segments are observed, suggesting that nucleotide binding initiates a membrane-perforating and cell-suicide response in conflict.
