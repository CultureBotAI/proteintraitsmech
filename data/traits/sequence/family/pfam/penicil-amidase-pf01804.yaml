identifier: Pfam:PF01804
label: Penicillin amidase
definition: >-
  This entry represents a number of acylases which all belong to MEROPS peptidase family S45 (clan PB). Penicillin G acylase precursor and cephalosporin acylase precursor, more precisely termed glutaryl-7-aminocephalosporanic acid (GL-7-ACA) acylase, are self-cleaving proteins that spontaneously form the heterodimeric subunits of the mature acylases. They are not known to hydrolyse peptide bonds in other substrates, although they may have the capacity to do so. This family also includes acyl-homoserine lactone (AHL) acylase PvdQ and QuiP, and aculeacin-A acylase, which has been shown to have penicillin acylase activity.
