identifier: Pfam:PF15613
label: Williams-Beuren syndrome DDT (WSD), D-TOX E motif
definition: >-
  This entry represents a domain of approximately 70 residues found in BPTF (Bromodomain PHD finger transcription factor) proteins and related DDT domain-containing proteins in eukaryotes. This domain is located downstream of the WSD domain ( ). BPTF is a subunit of the NURF chromatin remodelling complex that catalyses ATP-dependent nucleosome sliding. In plant RLT (RINGLET) proteins, this domain is also present downstream of the WSD domain. The function of this domain remains to be determined.
