label: Family of unknown function (DUF6234)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000709) is described by MIBiG as an example of the following biosynthetic class, saccharide. It includes a member from the neomycin biosynthetic gene cluster from Streptomyces fradiae ATCC 10745 = DSM 40063. This presumed domain appears to be predominantly found in Actinobacteria.
