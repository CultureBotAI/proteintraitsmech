identifier: Pfam:PF05141
label: Pyoverdine/dityrosine biosynthesis protein
definition: >-
  Isocyanide synthases are required for the biosynthesis of isocyanides (or isonitriles), a class of microbial secondary metabolites that can be cytotoxic, antibacterial, and antiprotozoal. L-tyrosine isonitrile synthase from the Gammaproteobacteria Xenorhabdus nematophila participates in the biosynthesis of rhabduscin, a tyrosine derivative which is a potent inhibitor of phenoloxidase, a key component of the insect's innate immune system. L-tryptophan isonitrile synthase AmbI1/2 from the Cyanobacteria Fischerella ambigua is involved in the biosynthesis of ambiguines, a family of hapalindole-type alkaloids. This entry also includes Spore wall maturation protein DIT1 from Saccharomyces cerevisiae is involved in the synthesis of dityrosine. Dityrosine is a sporulation-specific component of the Saccharomyces cerevisiae ascospore wall that is essential for the resistance of the spores to adverse environmental conditions. is involved in the biosynthesis of pyoverdine.
