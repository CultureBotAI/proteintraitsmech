identifier: Pfam:PF11036
label: Virulence promoting factor
definition: >-
  The yqgB and yqfZ genes are associated with the genomes of bacteria with distinct pathogenic properties and consequently fall into the category of being virulence genes. However, yqgB and yqfZ genes are not true virulence factors but instead are probably lifestyle determinant genes where the gene products act in concert, enabling the bacteria to cope with its suboptimal physical environment and thus facilitating host colonization.
