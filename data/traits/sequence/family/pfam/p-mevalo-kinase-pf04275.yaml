identifier: Pfam:PF04275
label: 'Phosphomevalonate kinase '
definition: >-
  Phosphomevalonate kinase ( ) catalyses the phosphorylation of 5-phosphomevalonate into 5-diphosphomevalonate, an essential step in isoprenoid biosynthesis via the mevalonate pathway. In an example of non orthologous gene displacement, two different types of phosphomevalonate kinase are found -the higher eukaryotic form and the ERG8 type. This model represents the form of the enzyme found in animals.
