identifier: Pfam:PF11209
label: 'LmeA-like phospholipid-binding '
definition: >-
  This entry represents a bacterial protein family that includes several uncharacterised proteins. Some members of this group are predicted to be phospholipid-binding proteins from the LmeA family. LmeA is critical for controlling the mannan chain length of lipomannan/lipoarabinomannan.
