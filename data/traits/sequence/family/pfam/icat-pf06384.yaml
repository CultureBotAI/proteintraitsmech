identifier: Pfam:PF06384
label: Beta-catenin-interacting protein ICAT
definition: >-
  This domain is characteristic of eukaryotic beta-catenin-interacting (ICAT) proteins. Beta-catenin is a multifunctional protein involved in both cell adhesion and transcriptional activation. Transcription mediated by the beta-catenin/Tcf complex is involved in embryological development and is upregulated in various cancers. ICAT selectively inhibits beta-catenin/Tcf binding in vivo , without disrupting beta-catenin/cadherin interactions. Protein LZIC contains a leucine zipper domain and an ICAT homologous domain, with particular conservation of residues that are used by ICAT for beta-catenin-binding.
