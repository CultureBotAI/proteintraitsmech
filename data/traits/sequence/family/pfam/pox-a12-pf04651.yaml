identifier: Pfam:PF04651
label: Poxvirus A12 protein
definition: >-
  This family represents Protein A12 from Vaccinia virus, also known as 25 kDa core protein OPG138, and similar proteins from poxvirus. A12 is a component of the virion core that undergoes proteolytic processing during the immature virion (IV) to mature virion (MV) transition. It is essential for the formation of a structurally normal core.
