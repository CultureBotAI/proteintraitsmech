identifier: Pfam:PF01763
label: Herpesvirus UL6 like
definition: >-
  This family consists of various proteins from the Herpesviridae that are similar to Human herpesvirus 1 (HHV-1) UL6 virion protein. UL6 is essential for cleavage and packaging of the viral genome. UL6 forms the DNA entry portal; it exists at a unique site in the capsid and forms a channel for entry of DNA into the capsid.
