identifier: Pfam:PF15041
label: Tektin bundle interacting protein 1
definition: >-
  This family includes Tektin bundle-interacting protein 1 (TKTI1) which has been recently characterised as a microtubule inner protein (MIP) part of the dynein-decorated doublet microtubules (DMTs) in cilia axoneme, which is required for motile cilia beating. It is located at the centre of the tektin bundle where may function to recruit tektins or stabilize the bundle.
