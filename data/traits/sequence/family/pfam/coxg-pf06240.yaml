identifier: Pfam:PF06240
label: Carbon monoxide dehydrogenase subunit G (CoxG)
definition: >-
  The CO dehydrogenase structural genes coxMSL are flanked by nine accessory genes arranged as the cox gene cluster. The cox genes are specifically and coordinately transcribed under chemolithoautotrophic conditions in the presence of CO as carbon and energy source.
