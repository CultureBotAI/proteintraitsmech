identifier: Pfam:PF25182
label: Non-GDSL lipase-like family
definition: >-
  This entry represents a family of α/β hydrolase enzymes. These presumed enzymes are most similar to the GDSL lipases. However the GDSL motif has been lost suggesting they may have lost their lipase activity. Members are mainly found in proteobacteria.
