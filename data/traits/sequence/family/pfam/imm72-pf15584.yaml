identifier: Pfam:PF15584
label: Immunity protein 72
definition: >-
  This entry represents a predicted immunity protein with a mostly all-β fold and GxxE, WxDxRY motifs and a glutamate residue. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, which usually contains toxin domains of the Ntox48 family. This domain is often fused to the Imm71 immunity domain.
