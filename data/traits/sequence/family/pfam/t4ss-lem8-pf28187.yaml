identifier: Pfam:PF28187
label: Dot/Icm T4SS effector Lem8
definition: >-
  This entry represents a group of proteins from Legionella sp., including the Dot/Icm T4SS effector Lem8 (lpg1290, ) from Legionella pneumophila. The Pleckstrin homology-like domain-containing protein Phldb2 involved in cytoskeleton organization is a target of Lem8, which plays a role in the inhibition of host cell migration.
