identifier: Pfam:PF01813
label: 'ATP synthase subunit D '
definition: >-
  This is a family of D subunits from various ATP synthases, including V-type H+ transporting and Na+ transporting. This family is found in eukaryota, bacteria and archaea. The V-type ATPase can use a proton gradient to synthesize ATP, but the primary biological role is to acidify some compartment, such as yeast vacuole (a lysosomal homologous) or the interior of a prokaryote. Subunit D is suggested to be an integral part of the catalytic sector of the V-ATPase. Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP. The V-ATPases (or V1V0-ATPase) and A-ATPases (or A1A0-ATPase) are each composed of two linked complexes: the V1 or A1 complex contains the catalytic core that hydrolyses/synthesizes ATP, and the V0 or A0 complex that forms the membrane-spanning pore. The V-ATPase folding, localisation, and stability is made possible through the formation of a luminal glycan coat by the glycolipids and the glycosylated V0 subunits. The V- and A-ATPases both contain rotary motors, one that drives proton translocation across the membrane and one that drives ATP synthesis/hydrolysis. The V- and A-ATPases more closely resemble one another in subunit structure than they do the F-ATPases, although the function of A-ATPases is closer to that of F-ATPases.
