identifier: Pfam:PF28058
label: Cell division-associated protein YmgF
definition: >-
  This entry represents a group of proteins, found in enterobacteria. This entry includes YmgF, a small protein of about 72 amino acid residues long. It is an integral membrane protein that participate in the stabilisation of the cell divisome under specific conditions.
