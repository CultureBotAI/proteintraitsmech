identifier: Pfam:PF00992
label: Troponin
definition: >-
  The troponin (Tn) complex regulates Ca 2+ induced muscle contraction. Tn contains three subunits, Ca 2+ binding (TnC), inhibitory (TnI), and tropomyosin binding (TnT). This family includes troponin T and troponin I. Troponin I binds to actin and troponin T binds to tropomyosin.
