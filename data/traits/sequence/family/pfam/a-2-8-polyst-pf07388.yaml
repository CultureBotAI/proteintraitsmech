label: Alpha-2,8-polysialyltransferase (POLYST)
definition: >-
  This family contains the bacterial enzyme alpha-2,8-polysialyltransferase (approximately 500 residues long). This catalyses the polycondensation of alpha-2,8-linked sialic acid required for the synthesis of polysialic acid (PSA).
