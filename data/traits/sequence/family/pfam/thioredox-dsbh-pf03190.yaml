identifier: Pfam:PF03190
label: Protein of unknown function, DUF255
definition: >-
  This entry represents the TRX domain found in highly conserved proteins present in eukaryotes, bacteria and archaea, about 600-800 amino acids in length. This domain contains a redox active CXXC motif. The human/rat protein, called Spermatogenesis-associated protein 20 (SSP411), is specifically expressed in the testis in an age-dependent manner. The SSP411 mRNA is increased during spermiogenesis and is localized in round and elongated spermatids, suggesting a function in fertility regulation.
