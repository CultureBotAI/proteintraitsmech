identifier: Pfam:PF05884
label: Interactor of ZYG-11
definition: >-
  This entry represents the protein product of the gene W03D8.9 ( ) and similar sequences from nematodes. This protein has been identified as an interactor of ZYG-11. ZYG-11 is the substrate-recognition subunit for a CUL-2 based complex that regulates cell division and embryonic development.
