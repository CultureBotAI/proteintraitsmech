identifier: Pfam:PF28072
label: Low-complexity tail membrane protein-like
definition: >-
  This entry represents Low-complexity tail membrane proteins (LCTMP) found mainly in cyanobacteria. Members of this family appear typically as an unusual gene pair with members of . The members tend to have tail-to-tail overlapping regions, where the tail region from this protein is long, low-complexity, and typically rich in Asp, Glu, Asn, Gln, Ser, and Thr. The function of this pair of convergently-transcribed overlapping proteins is unknown.
