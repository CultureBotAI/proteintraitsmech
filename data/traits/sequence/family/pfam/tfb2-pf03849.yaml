identifier: Pfam:PF03849
label: Transcription factor Tfb2
definition: >-
  This entry represents the p52/Tfb2 subunit in the TFIIH complex, which is not only required for transcription but also plays a central role in DNA repair. The TFIIH multiprotein complex consists of a 7-subunit core (XPB, p62, p52, p44, p34, and TTDA) that is associated with a 3-subunit CDK-activating kinase module (MAT1, cyclin H and Cdk7). The p52 subunit interacts with subunit XPB, which is an ATP-dependent 3'-5' DNA helicase, and stimulates its ATPase activity.
