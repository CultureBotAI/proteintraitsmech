identifier: Pfam:PF04499
label: SIT4 phosphatase-associated protein
definition: >-
  This entry includes budding yeast Sit4-associated proteins, such as Sap155, Sap185, and Sap190. Sit4 is a phosphatase involved in a variety of processes including transcription, translation, bud formation, glycogen metabolism, monovalent ion homeostasis, H+ transport, and telomere function. This entry also includes mammalian PP6 (Sit4 homologue)-associated proteins, such as PP6R1, PP6R2, and PP6R3. They are regulatory subunits of PP6 involved in the PP6-mediated dephosphorylation of NFKBIE opposing its degradation in response to TNF-alpha.
