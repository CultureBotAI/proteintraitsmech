identifier: Pfam:PF17636
label: Viral Unique Long protein 21a
definition: >-
  Members of this family include UL21a, found in Human cytomegalovirus (HCMV). UL21a is required for HCMV to establish efficient productive infection. It is a short-lived cytoplasmic protein that facilitates HCMV replication. It has also been shown to be responsible for APC1, APC4 and APC5 degradation.
