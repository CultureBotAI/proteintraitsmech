identifier: Pfam:PF01840
label: TCL1/MTCP1 family
definition: >-
  This entry represents MTCP1 and TCL1A/B from animals. They are encoded from a family of protooncogenes and function as Akt kinase coactivators. TCL1 also acts as an NFkappaB activator, through the interaction with p300, and as an inhibitor of AP1-dependent transcription. It affects both hair growth and epidermis integrity and is essential for mouse epidermal keratinocytes proliferation.
