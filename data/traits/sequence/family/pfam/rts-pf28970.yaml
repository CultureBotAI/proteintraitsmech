identifier: Pfam:PF28970
label: Anther-specific protein RTS
definition: >-
  This entry represents the rice tapetum-specific (RTS) protein family. RTS is an anther-specific protein required for tapetum and pollen development in rice. The protein is expressed in tapetum during meiosis in developing anthers. Plants expressing RTS antisense constructs display interruption of tapetal development, resulting in deformed non-viable pollen, demonstrating its essential role in male fertility. The protein contains a predicted signal peptide and is secreted. Members of this family are small proteins of approximately 90-95 amino acids in length. The family is found in grasses (Poaceae) and is conserved across rice species and other cereals.
