identifier: Pfam:PF20901
label: Bacteriophage Sf6, terminase small subunit-like
definition: >-
  In many tailed double-stranded DNA (dsDNA) virus such as Bacteriophage Sf6 ( ), the DNA newly synthesized is packaged into a preformed procapsid. The small subunit of the terminase is the component responsible for concatemeric viral DNA-recognition in the molecular machine that carries out this process. The small subunit of the terminase from phage Sf6, also known as gp1, consists of an N-terminal domain, a central α-helical domain and a C- terminal domain forming a β-barrel, and adopts a ring-like octameric structure composed of monomers.
