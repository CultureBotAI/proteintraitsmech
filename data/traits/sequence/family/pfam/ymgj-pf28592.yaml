identifier: Pfam:PF28592
label: YmgJ-like domain
definition: >-
  This entry represents the uncharacterised protein YmgJ and similar sequences from bacteria. It is approximately 61 amino acids in length and is found in Escherichia coli (gene ymgJ, locus b4594) and related bacterial proteins. The E. coli YmgJ protein is encoded by a gene located immediately downstream of ymgI (b4593).
