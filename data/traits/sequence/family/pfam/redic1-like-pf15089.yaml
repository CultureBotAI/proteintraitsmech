identifier: Pfam:PF15089
label: Regulator of DNA class I crossover intermediates 1-like
definition: >-
  This family of proteins mainly found in vertebrates includes mouse Regulator of DNA class I crossover intermediates 1 (Redic1). Redic1 is involved in recombination, probably acting by stabilising recombination intermediates during meiotic crossover formation. It is required for normal germline development and fertility as well as for meiotic progression, complete chromosomal synapsis and crossover formation. This protein binds double-stranded DNA.
