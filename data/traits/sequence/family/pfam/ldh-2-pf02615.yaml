identifier: Pfam:PF02615
label: Malate/L-lactate dehydrogenase
definition: >-
  The malate dehydrogenase (MDH) of some extremophilies is more similar to the L-lactate dehydrogenases (L-LDH) from various sources than to other MDHs. This family consists of bacterial and archaeal malate/L-lactate dehydrogenases and related proteins. The archaebacterial malate dehydrogenase , deviates from the eubacterial and eukaryotic enzymes having a low selectivity for the coenzyme (NAD(H) or NADP(H)) and catalyzing the reduction of oxalacetate to malate more efficiently than the reverse reaction.
