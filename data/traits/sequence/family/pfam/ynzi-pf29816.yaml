identifier: Pfam:PF29816
label: Membrane protein YnzI
definition: >-
  This entry represents the YnzI family of small membrane proteins of approximately 54 amino acids found in Bacillus and related Bacillales. The protein contains a predicted transmembrane helix with a disordered N-terminal region, and is localised to the cell membrane. The function of this family remains to be determined.
