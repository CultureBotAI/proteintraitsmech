identifier: Pfam:PF01801
label: 'Cytomegalovirus glycoprotein L '
definition: >-
  Glycoprotein L from Cytomegalovirus serves a chaperone for the correct folding and surface expression of glycoprotein H (gH). Glycoprotein L is a member of the heterotrimeric gCIII complex of glycoproteins which also includes gH and gO and has an essential role in viral fusion. Herpesviruses are enveloped, double-stranded DNA viruses that infect a variety of hosts across the animal kingdom [E1]. More than 100 species of herpesviruses are classified into three subfamilies, namely alpha-, beta-, and gammaherpesviruses/herpesvirinae. Like other enveloped viruses, herpesviruses enter cells by fusing their lipid envelopes with a host cell membrane, either the plasma membrane or the membrane of an endocytic vesicle/endosome after internalisation, which releases the viral capsid and associated proteins into the host cytoplasm. Entry of enveloped viruses into a target cell proceeds through a sequence of events that begins with the binding of a viral receptor-binding glycoprotein to a cognate host cell receptor and culminates with membrane fusion by a viral fusogen, a glycoprotein that undergoes large conformational changes to bring apposing membranes into proximity until they fuse. Uniquely, herpesviruses distribute the functions of receptor engagement and membrane fusion across a diverse cast of glycoproteins. Two glycoprotein complexes are conserved throughout the three herpesvirus subfamilies: the trimeric glycoprotein B (gB) that functions as a membrane fusogen and the heterodimeric glycoprotein H/glycoprotein L (gH/gL), the role of which is less clearly defined. The intrinsic structural plasticity of gH/gL enables it to function as a signal integration machine that can accept diverse regulatory inputs and convert them into a "trigger" signal that activates the fusogenic a…
