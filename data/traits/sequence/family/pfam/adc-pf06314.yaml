identifier: Pfam:PF06314
label: Acetoacetate decarboxylase (ADC)
definition: >-
  Acetoacetate decarboxylase (ADC) is involved in solventogenesis in certain bacteria, which occurs at the end of the exponential growth phase when there is a metabolic switch from classical sugar fermentation with the production of acetate and butyrate to the re-internalisation and oxidation of these acids to acetate and butanol. In Clostridium, SpoOA controls the switch from acid to solvent production. A SpoAO-binding motif occurs in the gene encoding ADC. This family also contains the fungal decarboxylase DEC1 encoded by the Tox1B locus, which along with the Tox1A gene product is required for the production of the polyketide T-toxin. The pathogenic fungus Cochliobolus heterostrophus (Drechslera maydis) requires the T-toxin for high virulence to maize with T-cytoplasm.
