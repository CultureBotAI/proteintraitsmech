label: Family of unknown function (DUF6018)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000320) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). This family includes a protein from the cereulide biosynthetic gene cluster from Bacillus cereus and appears to be predominantly found in Bacilli.
