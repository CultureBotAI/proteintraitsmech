identifier: Pfam:PF04313
label: Type I restriction enzyme R protein N terminus (HSDR_N)
definition: >-
  This entry represents the N-terminal domain found in the R subunit (HsdR) of type I enzymes. The type I enzyme represented is EcoKI, which recognises the DNA sequence 5'-AACN6GTGC-3'; the R protein (HsdR) is required for both nuclease and ATPase activity. This domain is often found adjacent to a methylase domain ( ) in restriction endonucleases or methylases. In one of the proteins, , it is adjacent to a helicase domain ( ) in a putative restriction endonuclease. Type I restriction endonucleases are components of prokaryotic DNA restriction-modification mechanisms that protects the organism against invading foreign DNA. Type I enzymes have three different subunits subunits -M (modification), S (specificity) and R (restriction) -that form multifunctional enzymes with restriction ( ), methylase ( ) and ATPase activities. The S subunit is required for both restriction and modification and is responsible for recognition of the DNA sequence specific for the system. The M subunit is necessary for modification, and the R subunit is required for restriction. These enzymes use S-Adenosyl-L-methionine (AdoMet) as the methyl group donor in the methylation reaction, and have a requirement for ATP. They recognise asymmetric DNA sequences split into two domains of specific sequence, one 3-4 bp long and another 4-5 bp long, separated by a nonspecific spacer 6-8 bp in length. Cleavage occurs a considerable distance from the recognition sites, rarely less than 400 bp away and up to 7000 bp away. Adenosyl residues are methylated, one on each strand of the recognition sequence. These enzymes are widespread in eubacteria and archaea. In enteric bacteria they have been subdivide into four families: types IA, IB, IC and ID. There are four classes of restriction endonucleases: types I, II, I…
