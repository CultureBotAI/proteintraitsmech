identifier: Pfam:PF10225
label: 'NEMP family '
definition: >-
  This entry includes a group of nuclear envelope integral membrane proteins from animals and plants. NEMPs contribute to nuclear envelope stiffness in germ cells and it is required for male and female fertility. NEMP1 from Xenopus laevis is a RanGTP-binding protein and is involved in eye development.
