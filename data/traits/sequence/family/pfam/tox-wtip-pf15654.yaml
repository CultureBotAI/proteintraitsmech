identifier: Pfam:PF15654
label: Toxin with a conserved tryptophan and TIP tripeptide motif
definition: >-
  This entry represents a predicted toxin domain with two membrane spanning α helices and RxxR, Wx[ST]IP motifs. The domain is present in bacterial polymorphic toxin systems. The toxin is usually exported by the type 2 or Photorhabdus virulence cassette (PVC)-type secretion system.
