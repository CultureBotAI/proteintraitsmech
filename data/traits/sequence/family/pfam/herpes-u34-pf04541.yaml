identifier: Pfam:PF04541
label: Herpesvirus virion protein U34
definition: >-
  During primary envelopment Human herpesvirus 1 (HHV-1, HSV-1) nucleocapsids translocate from the nucleus to the cytoplasm. Lining the inside of the INM is the nuclear lamina, which is composed of a meshwork of proteins with spaces too small for the capsid to move through without some disruption of the lamina. The lamina is mainly made up of lamin A/C and lamin B proteins, with smaller amounts of other proteins also present; this lamina must be disrupted before the nucleocapsids can egress. This entry represents several proteins (U34, UL50, nuclear egress protein 2 or UL34, 24, 26) that play a major role in virion nuclear egress, the first step of virion release from infected cell. Viral capsids are initially assembled within the nucleus and induce capsids budding and envelopment into the perinuclear space. Then the virion egress complex promotes fusion of perinuclear virion envelope with the outer nuclear membrane, releasing viral capsid into the cytoplasm where it will engages budding sites in the Golgi or trans-Golgi network.
