identifier: Pfam:PF25594
label: Gliding motility protein GldB
definition: >-
  This entry represents the GldB protein family, which is found in various members of the Bacteroidetes lineage, including species such as Cytophaga johnsonae , known for exhibiting a poorly understood form of rapid gliding motility, as well as other species that lack this phenotype. GldB is an essential component of the bacterial gliding motility machinery in *F. johnsoniae* and related organisms. It is believed to be anchored to the cell membrane and to function as part of a larger motility complex, though its precise molecular role remains unresolved. GldB operates in coordination with other Gld proteins to facilitate the distinct form of bacterial surface locomotion termed gliding motility. While distantly related to zincin-type proteins, GldB lacks the conserved zinc-binding motif characteristic of that family.
