identifier: Pfam:PF12355
label: 'Down syndrome cell adhesion molecule C terminal '
definition: >-
  This entry is specific to the insecta, predominantly Drosophila spp. This entry is found in association with , and . The Cell adhesion molecule Dscam1 (also known as Down syndrome cell adhesion molecule) belongs to a family of cell membrane molecules involved in the differentiation of the nervous system. This is the C-terminal cytoplasmic tail region of Dscam1. In Drosophila melanogaster (Fruit fly) the gene has at least 59 different transcripts. Dscam1 may play a role in the nervous and immune systems.
