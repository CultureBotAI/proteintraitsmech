identifier: Pfam:PF07765
label: KIP1-like protein
definition: >-
  This entry represents the NAB domain found in the Networked proteins. The Networked (NET) proteins are a superfamily of plant-specific actin-binding proteins which localise simultaneously to the actin cytoskeleton and specific membrane compartments and are suggested to couple these membranes to the actin cytoskeleton in plant cells. The minimal actin binding region, referred to as the NET actin-binding (NAB) domain, represents a new actin binding motif unique to plants with no apparent primary sequence homolgy to previously identified actin binding domains. In Arabidopsis, the NAB domain always starts with three conserved tryptophan residues, WWW, a motif whose worldwide web connection gives added significance to the NET family name. The C-terminal half of the domain is very highly conserved, more so than the N-terminal. The predicted secondary structure of the domain includes three major α-helices connected by a β-turn with the WWW motif predicted to form a β-sheet.
