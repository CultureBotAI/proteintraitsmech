identifier: Pfam:PF29710
label: Neuropeptide-like peptide 11
definition: >-
  This entry represents the neuropeptide-like peptide 11 (nlp-11) family found in nematodes. These are small secreted peptides that function as neuropeptides in the nervous system. The precursor protein contains a signal peptide followed by a propeptide region and the mature neuropeptide sequence. The mature peptide undergoes post-translational modification including C-terminal amidation at alanine-131. The nlp-11 gene is involved in neuropeptide signalling pathways in Caenorhabditis elegans.
