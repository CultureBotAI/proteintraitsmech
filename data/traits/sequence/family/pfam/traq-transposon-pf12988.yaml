identifier: Pfam:PF12988
label: TraQ conjugal transfer protein
definition: >-
  This entry represents the conjugative transposon protein TraQ from Bacteroides thetaiotaomicron and similar sequences from Bacteroides species. TraQ shares structural similarity to other proteins involved in pili production for bacterial cell attachment. The gene coding for this protein, located in a conjugate transposon, appears to be upregulated in the presence of host or other bacterial species compared to growth in pure culture.
