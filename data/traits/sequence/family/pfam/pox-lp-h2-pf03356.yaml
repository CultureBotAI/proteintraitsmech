identifier: Pfam:PF03356
label: Viral late protein H2
definition: >-
  This entry represents the late protein H2 found in Vaccinia and other poxviruses. This protein is a highly conserved viral membrane protein found in all sequenced poxviruses, containing an N-terminal transmembrane domain and four conserved cysteines thought to be involved in the formation of intramolecular disulphide bonds. H2 has been shown to be necessary for entry into the host cell and virus-induced cell-cell fusion, but is not required for virus morphogenesis or the attachment of virus particles to cells. It is part of an entry-fusion complex composed of eight viral membrane proteins.
