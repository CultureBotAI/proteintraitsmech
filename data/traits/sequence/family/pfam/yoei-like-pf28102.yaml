identifier: Pfam:PF28102
label: Membrane protein YoeI-like
definition: >-
  This entry represents the YoeI protein ( ) from E.coli and related proteins found mainly in Enterobacteria. YoeI is a hydrophobic protein of only 20 amino acids and it is known to be expressed in E. coli in high levels especially in exponential phase. Changes in the YoeI expression levels were observed in response to stress or different growth conditions.
