identifier: Pfam:PF03519
label: Invasion protein B family
definition: >-
  The surface presentation of antigens protein SpaK (also known as InvB) from Salmonella typhimurium is involved in a secretory pathway responsible for the surface presentation of determinants needed for the entry of Salmonella species into mammalian cells. Other Spa genes in the cluster are related to invasion (Inv) genes in similar Salmonella and Shigella species, and to flagella biosynthesis genes in Helicobacter pylori. A further analogous gene in Yersinia (Spa15 homologue) has also been found.
