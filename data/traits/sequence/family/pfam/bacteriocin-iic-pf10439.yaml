identifier: Pfam:PF10439
label: Bacteriocin class II with double-glycine leader peptide
definition: >-
  Bacteriocins are proteinaceous toxins produced by bacteria to inhibit the growth of similar or closely related strains. The producer bacteria are protected from the effects of their own bacteriocins by production of a specific immunity protein which is co-transcribed with the genes encoding the bacteriocins, e.g. . The bacteriocins are structurally more specific than their immunity-protein counterparts. Typically, production of the bacteriocin gene is from within an operon carrying up to 6 genes including a typical two-component regulatory system (R and H), a small peptide pheromone (C), and a dedicated ABC transporter (A and -B) as well as an immunity protein. The ABC transporter is thought to recognise the N termini of both the pheromone and the bacteriocins and to transport these peptides across the cytoplasmic membrane, concurrent with cleavage at the conserved double-glycine motif. Cleaved extracellular C can then bind to the sensor kinase, H, resulting in activation of R and up-regulation of the entire gene cluster via binding to consensus sequences within each promoter. It seems likely that the whole regulon is carried on a transmissible plasmid which is passed between closely related Firmicute species since many clinical isolates from different Firmicutes can produce at least two bacteriocins, and the same bacteriocins can be produced by different species. The proteins in this entry include amylovorin-L, lactacin-F subunit LafA and subunit LafX all of them class IIb two-peptide bacteriocins.
