identifier: Pfam:PF25631
label: Inovirus capsid protein family
definition: >-
  This entry represents the Inovirus capsid protein family, which is involved in the formation of helical capsids that encapsulate viral genomic DNA. This family includes Capsid protein G8P (VIII) and Phi-Lf prophage-derived major coat protein (gVIII-1). These proteins self-assemble to create a filamentous structure with dimensions ranging from 760 to 1950 nm in length and 6 to 8 nm in width. The assembly and budding of the virion occur at the host's inner membrane, facilitating the viral life cycle. This structural role is crucial for the protection and delivery of viral genetic material during infection.
