identifier: Pfam:PF12141
label: Beta-mannosyltransferases
definition: >-
  This entry represents a group of fungal beta-mannosyltransferase that is involved in cell wall biosynthesis. For example, in Candida albicans, BMT1-4 enzymes act stepwise to add beta-mannoses onto cell-wall phosphopeptidomannan (PPM). While Bmt5 and Bmt6 are involved in the addition of the first and third beta-mannoses to phospholipomannan (PLM), respectively. Furthermore, in Saccharomyces cerevisiae, BMT5 and BMT6 are responsible for methylation of uridine residues in the 25S rRNA.
