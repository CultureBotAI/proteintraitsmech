identifier: Pfam:PF09703
label: CRISPR-associated protein (Cas_Csa4)
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This entry represents a family of Cas proteins that tends to be found near CRISPR repeats. The species range for famliy members, so far, is exclusively archaeal. It is found so far in only four different species, and includes two tandem genes in Pyrococcus furiosus DSM 3638. This family is also known as Csa4 and Cas8a2 Type I-A.
