identifier: Pfam:PF05915
label: Transmembrane proteins 230/134
definition: >-
  This entry represents the eukaryotic transmembrane proteins 230 and 134 (TMEM230 and 134). TMEM134 function is unknown, but it has been shown to interact with E virus ORF2. TMEM 230 is involved in trafficking and recycling of synaptic vesicles.
