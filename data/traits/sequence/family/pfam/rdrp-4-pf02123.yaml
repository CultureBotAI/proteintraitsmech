identifier: Pfam:PF02123
label: Viral RNA-directed RNA-polymerase
definition: >-
  RNA-directed RNA polymerase (RdRp) ( ) is an essential protein encoded in the genomes of all RNA containing viruses with no DNA stage. It catalyses synthesis of the RNA strand complementary to a given RNA template, but the precise molecular mechanism remains unclear. The postulated RNA replication process is a two-step mechanism. First, the initiation step of RNA synthesis begins at or near the 3' end of the RNA template by means of a primer-independent (de novo) mechanism. The de novo initiation consists in the addition of a nucleotide tri-phosphate (NTP) to the 3'-OH of the first initiating NTP. During the following so-called elongation phase, this nucleotidyl transfer reaction is repeated with subsequent NTPs to generate the complementary RNA product. The nucleotide sequence for the RNA of Potato leafroll virus (PLrV) has been determined. The sequence contains six large open reading frames (ORFs). The 5' coding region encodes two polypeptides of 28K and 70K, which overlap in different reading frames; it is suggested that the third ORF in the 5' block is translated by frameshift read through near the end of the 70K protein, yielding a 118K polypeptide. The C-terminal part of the 118K protein contains a consensus sequence for RNA-dependent RNA-polymerases. The genomic RNA sequence of Southern bean mosaic virus (SBMV) has been determined. The genome contains four ORFs. The largest ORF encodes the two largest proteins translated in cell-free extracts from full-length virion RNA. Segments of the predicted amino acid sequence of this ORF resemble those of known viral RNA-polymerases, ATP-binding proteins and viral genome-linked proteins. The genome sequence of Pea enation mosaic virus (PEMV) RNA 1 shows strong organisational relationships and sequence similarities to the…
