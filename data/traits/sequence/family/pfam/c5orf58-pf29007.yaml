identifier: Pfam:PF29007
label: Chromosome 5 open reading frame 58
definition: >-
  This entry represents the C5orf58 protein family (chromosome 5 open reading frame 58). C5orf58 is a small uncharacterised protein of 81 amino acids found in mammals. The protein shows tissue-enriched expression in testis in humans. The protein has been identified by proteomics but lacks functional annotation. The function of this protein remains to be determined.
