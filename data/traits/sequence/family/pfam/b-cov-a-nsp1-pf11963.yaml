identifier: Pfam:PF11963
label: Betacoronavirus, lineage A, NSP1
definition: >-
  This entry represents the N-terminal region of the betacoronavirus polyprotein, which contains non-structural protein 1 (Nsp1) from betacoronavirus lineage A. This protein is important for viral replication and pathogenesis. It suppresses the host innate immune functions by inhibiting type I interferon expression and host antiviral signalling.
