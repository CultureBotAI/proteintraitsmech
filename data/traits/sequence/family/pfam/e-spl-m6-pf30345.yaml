identifier: Pfam:PF30345
label: Enhancer of split m6 protein
definition: >-
  This entry represents the Enhancer of split m6 (E(spl)m6) protein, a small protein of approximately 70 residues found in Drosophilidae (fruit flies). E(spl)m6 is part of the Enhancer of split complex, which contains Notch responsive genes. E(spl)m6 is involved in cell fate specification and negative regulation of the Notch signalling pathway. The protein is expressed during separation of neural and epidermal precursor cells and accumulates within the developing central nervous system.
