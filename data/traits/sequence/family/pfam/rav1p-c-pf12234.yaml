identifier: Pfam:PF12234
label: RAVE protein 1 C terminal
definition: >-
  This domain family is found in the C-terminal region of the protein Rav1, a component of the RAVE (regulator of the ATPase of vacuolar and endosomal membranes) complex. Rav1p is involved in regulating the glucose dependent assembly and disassembly of vacuolar ATPase V1 and V0 subunits.
