identifier: Pfam:PF02569
label: Pantoate-beta-alanine ligase
definition: >-
  D-Pantothenate is synthesized via four enzymes from ketoisovalerate, which is an intermediate of branched-chain amino acid synthesis. Pantoate-beta-alanine ligase, also know as pantothenate synthase, (PanC; ) catalyzes the formation of pantothenate from pantoate and alanine in the pantothenate biosynthesis pathway. PanC belongs to a large superfamily of nucleotidyltransferases that includes ATP sulfurylase (ATPS), phosphopantetheine adenylyltransferase (PPAT), and the amino-acyl tRNA synthetases. The enzymes of this family are structurally similar and share a dinucleotide-binding domain.
