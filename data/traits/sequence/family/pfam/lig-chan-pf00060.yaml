identifier: Pfam:PF00060
label: Ligand-gated ion channel
definition: >-
  There are three classes of ionotropic glutamate receptors (iGluRs), namely NMDA (N-methyl-D-aspartate), AMPA (alpha-amino-3-hydroxy-5-methyl-4-isoxazole-4-propionic acid) and kainate receptors. They are believed to play critical roles in synaptic plasticity. At many synapses in the brain, transient activation of NMDA receptors leads to a persistent modification in the strength of synaptic transmission mediated by AMPA receptors and kainate receptors can act as the induction trigger for long-term changes in synaptic transmission. Ionotropic glutamate receptors (iGluRs) are a highly conserved family of ligand-gated ion channels present in animals, plants, and bacteria, which are best characterised for their roles in synaptic communication in vertebrate nervous systems. A variant subfamily of iGluRs, the Ionotropic Receptors (IRs), consist of non-glutamate-binding chemosensory receptors first identified in Drosophila melanogaster. They function in detecting odors and tastants.
