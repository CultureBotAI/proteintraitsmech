identifier: Pfam:PF08602
label: Mgr1-like, i-AAA protease complex subunit
definition: >-
  This entry represents Mitochondrial inner membrane i-AAA protease complex subunit MGR1 and similar proteins from Saccharomycetes. Mgr1 has been shown to be required for mitochondrial viability in yeast lacking mitochondrial DNA. It is a mitochondrial inner membrane protein, which interacts with Yme1 and is a subunit of the i-AAA protease complex.
