identifier: Pfam:PF06416
label: Effector protein NleG
definition: >-
  Many bacterial pathogens deliver effector proteins into host cells via a type III secretion system, enabling them to manipulate host cell biology in ways that benefit the pathogen. In enterohaemorrhagic Escherichia coli O157:H7, the NleG protein and its homologues represent the largest family of effector proteins, with 14 members identified in the Sakai strain alone. Members of the NleG family share a conserved C-terminal domain that adopts a structure similar to the RING finger/U-box domain found in eukaryotic ubiquitin ligases. These domains allow NleG proteins to selectively interact with human E2 ubiquitin-conjugating enzymes and exhibit in vitro activity characteristic of eukaryotic E3 ligases, although the precise role of this activity in pathogenesis remains unclear. Effector proteins such as NleG are believed to alter host cell physiology and promote bacterial survival within host tissues. This particular protein is likely an E3 ubiquitin-protein ligase that interferes with the host ubiquitination pathway, directing host proteins towards proteasomal degradation. Supporting its role in virulence, mice infected with a bacterial strain lacking this gene display less severe diarrhoea.
