identifier: Pfam:PF13326
label: Photosystem II Pbs27
definition: >-
  This entry represents Psb27, a small thylakoid lumen-localised protein known to serve as an assembly factor for the biogenesis and repair of the PSII complex. Psb27 is comprised of four helices arranged in a right handed up-down-up-down fold, with a less ordered region located at the N-terminal.
