identifier: Pfam:PF19151
label: Sublancin
definition: >-
  Members of this family, including sublancin, are post-ribosomal natural products (PRNP) with an S-linked glycosylation. Sublancin itself also has two disulfide bonds. Sublancin is a 37-amino acid antimicrobial peptide belonging to the glycocin family. A related gene cluster in Bacillus cereus E33L includes the four Cys involved in the disulfide cluster but lacks the region with the glycosylated Cys. Sublancin is a small bacteriocin active against Gram-positive bacteria. Sublancin was thought to be a lantibiotic but was later shown to be an S-linked glycopeptide. Glycosylation is essential for its antimicrobial activity. Sublancin is biosynthesised as a precursor peptide bearing an N-terminal leader peptide, and a C-terminal core peptide that is converted into the mature peptide. Sublancin comprises two α helices and a well-defined inter-helical loop. Sublancin inhibits B.cereus spore outgrowth, after the germination stage, approximately 1000-fold better than it inhibits exponential growth of the same cells and inhibits B.subtilis strain ATCC6633 and B. megaterium strain 14581.
