identifier: Pfam:PF27848
label: Cys-rich radical SAM target, FibroRumin family
definition: >-
  Members of this protein family are cysteine-rich small peptides, about 52 amino acids long, that are proposed targets for modification by a radical SAM enzyme. Known occurrences as tandem gene pairs can be found in Fibrobacter succinogenes subsp. succinogenes S85 and in Ruminococcus albus 8.
