identifier: Pfam:PF09777
label: Osteopetrosis-associated transmembrane protein 1 precursor
definition: >-
  Osteopetrosis-associated transmembrane protein 1 (OSTM1) is required for osteoclast and melanocyte maturation and function. Mutations in OSTM1 give rise to autosomal recessive osteopetrosis, also called autosomal recessive Albers-Schonberg disease.
