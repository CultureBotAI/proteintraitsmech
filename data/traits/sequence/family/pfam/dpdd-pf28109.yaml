identifier: Pfam:PF28109
label: DpdD-like
definition: >-
  This entry represents DpdD protein ( ) from Salmonella montevideo and related bacterial proteins. The 7-deazapurine derivatives, 2'-deoxy-7-cyano-7-deazaguanosine (dPreQ0) and 2'-deoxy-7-amido-7-deazaguanosine (dADG) are recently-discovered DNA modifications encoded by the dpd cluster found in a diverse set of bacteria. Amongst the genes in this gene cluster, dpdD and possibly dpdJ appear to be involved in a restriction-like phenotype. The dpdD gene is present alongside the helicase-like genes and putative DNA-binding genes and therefore DpdD could be involved in the restriction system.
