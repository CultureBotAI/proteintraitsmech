identifier: Pfam:PF24305
label: Probiotic-derived P8 protein
definition: >-
  This entry represents the Probiotic-derived p8 protein from Lactobacillus rhamnosus and related proteins found mainly in Lactobacillales. P8 has anti-cancer properties in colorectal cancer (CRC) cells via inducing apoptosis through regulation of Ring finger protein 152 (RNF152) and thus inhibiting the development of CRC. P8 adopts a globular structure consisting of a three-helical bundle ( ).
