identifier: Pfam:PF07440
label: Caerin 1 protein
definition: >-
  This entry consists of several caerin 1 proteins from Litoria species, Australian tree frogs. The caerin 1 peptides are among the most powerful of the broad-spectrum antibiotic amphibian peptides. These peptides are excreted from amphibian skin, and can interact with and disrupt bacterial membranes, leading to the permeabilisation of the cell membrane. Caerin 1.1 forms a helix-bend-helix structure, where both helices are required for activity, as well as the bend region for flexibility. This domain is found associated with the domain , which contains a signal peptide.
