identifier: Pfam:PF02531
label: PsaD
definition: >-
  PsaD is a small, extrinsic polypeptide located on the stromal side (cytoplasmic side in cyanobacteria) of the photosystem I reaction centre complex. It is required for native assembly of PSI reaction clusters and is implicated in the electrostatic binding of ferredoxin within the reaction centre. PsaD forms a dimer in solution which is bound by PsaE however PsaD is monomeric in its native complexed PSI environment.
