identifier: Pfam:PF17420
label: Superinfection exclusion gene product 17
definition: >-
  This protein, also known as Gp17, protects the P22 phage from the superinfection exclusion system of other prophages, such as fels-2. Gp17 found in other bacteriophages such as SPP1 (siphophage SPP1, a lytic Bacillus subtilis phage) has been identified as a tail completion protein adopting an α/β fold, and found to be located at the interface between the head-to-tail connector and the tail of bacteriophage SPP1.
