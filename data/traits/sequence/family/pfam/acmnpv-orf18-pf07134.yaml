identifier: Pfam:PF07134
label: Autographa californica nuclear polyhedrosis virus (AcMNPV), Orf18
definition: >-
  This entry represents Protein AC18 from Autographa californica nuclear polyhedrosis virus (AcMNPV) and similar proteins from the viral family Baculoviridae. AC18 may play a role in occlusion-derived virions (ODV) formation and/or regulation of late viral gene expression. It interacts with the protein FP25, which is related to polyhedrin formation.
