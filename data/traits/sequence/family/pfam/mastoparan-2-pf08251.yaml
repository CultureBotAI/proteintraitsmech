identifier: Pfam:PF08251
label: Mastoparan peptide
definition: >-
  Mastoparan (MP) peptides I, II and III are extracted from the venom gland of Protopolybia exigua (Neotropical social wasp). They are tetradecapeptides presenting from seven to ten hydrophobic amino acid residues and from two to four lysine residues in their primary sequences. These peptides cause the degranulation of mast cells.
