identifier: Pfam:PF26891
label: Bacteriophage N4 gene product 1
definition: >-
  This entry represents gene product 1 (Gp1) found in N4-like bacteriophages. Gp1 is an uncharacterised protein of 108 amino acids (12.2 kDa) located at the left end of the bacteriophage N4 genome. This entry also includes bacterial proteins.
