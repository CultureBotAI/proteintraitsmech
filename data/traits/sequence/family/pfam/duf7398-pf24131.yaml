identifier: Pfam:PF24131
label: Family of unknown function (DUF7398)
definition: >-
  This entry describes an uncharacterised protein found in several bacteriophages that infect Bacillus species. The protein ranges in length from 158 to 189 amino acids. It is found in the virions of phages from the Bastillevirinae subfamily of the Herelleviridae family. Structure prediction suggests the proteins are composed of a bundle of five α-helices.
