identifier: Pfam:PF23137
label: HVO_0758 mu-protein
definition: >-
  This entry represents the HVO_0758 mu-protein from halophilic mesophile archaeon Haloferax volcanii ( ) and related proteins from Halobacteria. HVO_0758 is a small protein of 56 amino acid residues, containing two highly conserved CXXC and CPXC sequence motifs. The structure of this protein has a typical Zinc ribbon fold consisting of a small N-terminal α-helix and two knuckles at the tip of two β-hairpins that contain the zinc coordinating residues. This protein plays an essential role in swarming behaviour and biofilm formation.
