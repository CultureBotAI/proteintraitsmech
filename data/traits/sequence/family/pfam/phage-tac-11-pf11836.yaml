identifier: Pfam:PF11836
label: Phage tail tube protein, GTA-gp10
definition: >-
  This entry consists of bacterial and phage proteins whose function is not currently known. Many of the bacterial sequences are found within known or suspected prophages or gene transfer agents (GTA). Gene transfer agents are related to bacteriophages, but are distinguished by cellular regulatory mechanisms that strongly suggest they are more than just defective prophages. This entry includes a group of phage tail tube proteins.
