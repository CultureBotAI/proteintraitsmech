identifier: Pfam:PF15339
label: Acrosome formation-associated factor
definition: >-
  Equatorin (also known as Afaf) is an acrosomal membrane-anchored protein involved in membrane trafficking during acrosome formation and participate in fertilisation. In mice, it is localised in the inner and outer membrane of forming acrosomes (Acrs), and declined in the maturing Acrs.
