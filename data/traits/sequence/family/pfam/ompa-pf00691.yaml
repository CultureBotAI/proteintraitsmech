identifier: Pfam:PF00691
label: OmpA family
definition: >-
  A newly defined histidine kinase ( ) and response regulator ( ) gene pair occurs exclusively in Proteobacteria, mostly of marine origin, nearly all of which contain a subfamily 6 sortase ( ) and its single dedicated target protein ( ) adjacent to to the sortase. This protein family shows up in only in those species with the histidine kinase/response regulator gene pair, and often adjacent to that pair. It belongs to the OmpA protein family ( ). Its function is unknown. We assign the gene symbol pdsO, for Proteobacterial Dedicated Sortase system OmpA family protein.
