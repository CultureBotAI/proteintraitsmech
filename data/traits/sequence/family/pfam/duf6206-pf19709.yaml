identifier: Pfam:PF19709
label: Family of unknown function (DUF6206)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC) and other uncharacterised bacterial proteins. This BGC (BGC0001063) is described by MIBiG as an example of the polyketide and NRP (non-ribosomal peptide) biosynthetic classes. It includes a member from the undecylprodigiosin biosynthetic gene cluster from Streptomyces coelicolor A3(2). This family appears to be predominantly present in bacteria.
