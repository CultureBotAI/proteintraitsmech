identifier: Pfam:PF10634
label: Fe2+ transport protein
definition: >-
  This is a family of metal-binding periplasmic proteins. Tp34 has been classified together with other proteins in a group of uncharacterised proteins probably involved in high affinity Fe2+ transport. However, the structural and functional aspects of this group of proteins remain undetermined. Tp34 may bind zinc and the iron-sequestering lactoferrin and may have a role in metal ion homeostasis.
