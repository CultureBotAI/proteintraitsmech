identifier: Pfam:PF28015
label: Antiholin LysA-like
definition: >-
  This entry represents antiholin LysA from Bacteriophage P2 and related proteins. LysA is involved in lysis inhibition, which interacts with and inhibits holin thereby delaying the host cell lysis timing. Members of this protein family are predicted to be membrane proteins, and in bacteria are found encoded within prophage regions.
