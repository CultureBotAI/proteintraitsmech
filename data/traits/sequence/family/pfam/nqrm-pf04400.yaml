identifier: Pfam:PF04400
label: (Na+)-NQR maturation NqrM
definition: >-
  The NqrM gene is often found adjacent to the nqr operons that encode (Na+)-NQR subunits. NqrM is a maturation factor of bacterial Na+-translocating NADH:quinone oxidoreductase, presumably involved in the delivery of Fe to form the (Cys)4[Fe] centre between subunits NqrD and NqrE. The four conserved Cys residues found in NqrM are required for (Na+)-NQR maturation and may serve as ligands for a metal ion or metal cluster used to build up the (Na+)-NQR molecule.
