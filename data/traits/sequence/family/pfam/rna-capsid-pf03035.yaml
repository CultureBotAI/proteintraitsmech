identifier: Pfam:PF03035
label: Calicivirus putative RNA polymerase/capsid protein
definition: >-
  This entry represents Minor capsid protein VP2 from Caliciviruses. VP2 is a minor structural protein that forms a portal-like structure at a unique three-fold axis of symmetry, following binding to the host receptor. This structure contains twelve copies of VP2, arranged with their hydrophobic N termini pointing away from the virion surface. VP2 is known to be essential for productive replication that results in the synthesis and maturation of infectious virions and thus critical for the production of infectious virus. Caliciviruses are a small round-structured virus group defined by RNA-dependent RNA polymerase and capsid diversity.
