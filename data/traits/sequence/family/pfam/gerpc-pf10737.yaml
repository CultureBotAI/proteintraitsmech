identifier: Pfam:PF10737
label: Spore germination protein GerPC
definition: >-
  GerPC is required for the formation of functionally normal spores. The gerP locus encodes a number of proteins which are thought to be involved in the establishment of normal spore coat structure and/or permeability, which allows the access of germinants to their receptor.
