identifier: Pfam:PF28787
label: Chromosome 11 open reading frame 97
definition: >-
  This entry represents the C11orf97 protein family, found in mammals. These are small proteins of approximately 120-125 amino acids that localise to the ciliary basal body. C11orf97 proteins are predominantly expressed in tissues containing motile cilia and are also found in non-motile ciliated tissues such as adult olfactory bulbs. Expression is activated by transcription factors FOXJ1 and NOTO during ciliogenesis. Despite their specific localisation and expression pattern, knockout studies in mice show that C11orf97 is not essential for motile or non-motile cilia function. The molecular function of this protein family remains to be determined.
