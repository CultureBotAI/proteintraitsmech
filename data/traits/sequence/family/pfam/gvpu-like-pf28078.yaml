identifier: Pfam:PF28078
label: Gas vesicle protein GvpU-like
definition: >-
  This entry represents a group of gas vesicle proteins mainly found in proteobacteria and firmicutes, including Gas vesicle protein GvpU from Bacillus megaterium ( ). Gas vesicles are permeable to ambient gases by diffusion and provide buoyancy, enabling cells to move upwards in liquid to access oxygen and/or light.
