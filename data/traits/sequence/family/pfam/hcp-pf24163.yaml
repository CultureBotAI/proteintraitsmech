identifier: Pfam:PF24163
label: Head completion protein
definition: >-
  This entry represents the Head completion protein (HCP) found in T5-like bacteriophages. HCP forms dodecameric ring assembly and is a component of the bacteriophage neck. It holds the portal protein PrtP dodecameric ring and connects with the trimeric layer of the tail tube via contacts with the tail completion (TCP) hexameric ring. HCP makes contacts with DNA. HCP consists of two domains. The first domain folds into an α-helical bundle composed of N- and C-terminal helices whereas the second domain adopts a β-sandwich.
