identifier: Pfam:PF07314
label: Lipoprotein intramolecular transacylase Lit
definition: >-
  This entry represents the lipoprotein intramolecular transacylase, Lit. Lit creates a lipoprotein that is less immunogenic, possibly enabling the bacteria to gain a foothold in the host by stealth. The crystal structure of the Lit enzyme from Bacillus cereus ( ) revealed that it consists of consists of four transmembrane helices with an extracellular cap. The conserved residues map to the cap-membrane interface and they include two catalytic histidines that function to effect unimolecular transacylation. The reaction involves acyl transfer from the sn-2 position of the glyceryl moiety to the amino group on the N-terminal cysteine of the substrate via an 8-membered ring intermediate.
