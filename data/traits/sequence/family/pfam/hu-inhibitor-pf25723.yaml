identifier: Pfam:PF25723
label: Bacteriophage inhibitor of histone-like protein HU
definition: >-
  This entry represents a bacteriophage protein that acts as an inhibitor of bacterial histone-like protein HU. The protein binds to HU, occupying its DNA binding motif and preventing HU-DNA complex formation. This inhibition leads to defects in chromosome segregation and causes filamentous cell morphology in bacteria. The protein forms a 1:2 complex with HU dimers, utilising electrostatic interactions and key hydrophobic contacts. Key residues F22 and D63 are important for the interaction with HU. The protein can bind HU proteins from a wide range of bacteria and Apicomplexan parasites due to the conservation of key interaction residues.
