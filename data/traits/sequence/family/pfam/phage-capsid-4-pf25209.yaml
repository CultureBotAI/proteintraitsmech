identifier: Pfam:PF25209
label: Phage capsid protein
definition: >-
  This entry represents SPbeta prophage-derived uncharacterised protein YonB. The protein is 338 amino acids in length and is found in Gram-positive bacteria, particularly Bacillus and Paenibacillus species, as well as in bacteriophages. The protein originates from the SPbeta prophage integrated into the Bacillus subtilis chromosome. The family shows similarity to suggesting these proteins are likely to be phage capsid proteins.
