identifier: Pfam:PF29128
label: Protein tost-1
definition: >-
  This entry represents the twenty one u antagonist 1 (TOST-1) protein family found in nematodes. TOST-1 is a component of the PETISCO complex, which plays an essential role in embryogenesis. Within the complex, TOST-1 acts as an adapter that binds via ERH-2 and interacts with PID-3 and TOFU-6. TOST-1 is required for chromosome segregation and cell division in early embryos and may inhibit 21U-RNA accumulation. The protein is expressed in the germline and localises to both the nucleus and cytoplasm during early embryogenesis. The protein contains a critical arginine residue (Arg-42) required for interaction with ERH-2.
