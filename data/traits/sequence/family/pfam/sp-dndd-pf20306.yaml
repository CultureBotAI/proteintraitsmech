identifier: Pfam:PF20306
label: Small protein found in certain Dnd DNA modification systems
definition: >-
  This entry represents a small protein found in bacteria, that, analogous to an antitoxin, it potentially acts as a negative regulatory component that might sense the presence of invaders by acting as a binding factor or substrate for invader-encoded enzymes like viral peptidases in certain Dnd systems. In some members included in this entry the model represents a domain associated with .
