identifier: Pfam:PF29623
label: Mercuric transport protein MerT
definition: >-
  This entry represents the mercuric transport protein MerT, found mainly in Actinomycetota. MerT is an integral membrane protein with two transmembrane helices that functions in mercury detoxification by transporting mercuric ions from the periplasmic mercury-binding protein MerP to the cytoplasmic mercuric reductase MerA. The protein contains conserved cysteine residues that bind mercury ions. This entry shows similarity to .
