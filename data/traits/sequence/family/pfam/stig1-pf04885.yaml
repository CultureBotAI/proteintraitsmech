identifier: Pfam:PF04885
label: Stigma-specific STIG1-like protein family
definition: >-
  This family represents the Stig1 cysteine rich protein and related plant proteins. The tobacco stigma-specific gene, STIG1 is developmentally regulated and expressed specifically in the stigmatic secretory zone. Pistils of transgenic STIG1-barnase tobacco plants undergo normal development, but lack the stigmatic secretory zone and are female sterile. Pollen grains are unable to penetrate the surface of the ablated pistils. Application of stigmatic exudate from wild-type pistils to the ablated surface increases the efficiency of pollen tube germination and growth and restores the capacity of pollen tubes to penetrate the style. The exact function of STIG1 is unknown. The STIG1 family is involved in various plant-specific functions, including the regulation of cell death, promotion of pollen tube growth, and modification of the interface between embryo and endosperm during seed development. Members of the family are typically cysteine-rich proteins that may undergo processing to perform their roles. For instance, a processed peptide of GRI induces cell death dependent on superoxide and salicylic acid, while STIG1 promotes pollen tube growth and binds phosphoinositol lipids, triggering an intracellular reactive oxygen species elevation. The family is also essential for the formation of structures like the embryo sheath and for the normal separation of embryo and endosperm tissues. This region contains three cystein-rich subdomains.
