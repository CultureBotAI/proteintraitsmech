identifier: Pfam:PF15181
label: Spermatid-specific manchette-related protein 1
definition: >-
  This entry represents the homologues of Sperm microtubule inner protein 6 (SPMIP6, formerly Spermatid-specific manchette-related protein 1 -SMRP1). SPMIP6 is a sperm-specific microtubule inner protein (MIP) that is found in mammmals. SPMIP6 interacts with alpha-tubulin and associates with protofilament B01. It may be involved in differentiation or function of ciliated cells.
