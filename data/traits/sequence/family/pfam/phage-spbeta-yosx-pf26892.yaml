identifier: Pfam:PF26892
label: SPbeta prophage protein YosX
definition: >-
  This entry represents the YosX protein family found in SPbeta prophages. YosX is an uncharacterised protein of 117 amino acids (14.0 kDa) found in the temperate bacteriophage SPbeta that infects Bacillus species. The protein contains a predicted coiled-coil region from residues 5-50.
