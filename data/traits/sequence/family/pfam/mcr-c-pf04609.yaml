identifier: Pfam:PF04609
label: Methyl-coenzyme M reductase operon protein C
definition: >-
  Members of this protein family include protein C, a non-structural protein of the operon for methyl coenzyme M reductase. The function of this protein is unknown. Other uncharacterised archaeal family members may be linked to methanogenesis or a process closely connected to it.
