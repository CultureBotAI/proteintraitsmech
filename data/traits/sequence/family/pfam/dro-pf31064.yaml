identifier: Pfam:PF31064
label: Drosocin antimicrobial peptides
definition: >-
  This protein family includes fruit fly Drosocin antimicrobial peptides (Dro), antibacterial peptides with strong anti-Gram -negative bacteria activity. They bind within the nascent peptide exit tunnel of the bacterial large ribosomal subunit, potentially interfering with nascent chain translocation that occurs post-peptide bond formation.
