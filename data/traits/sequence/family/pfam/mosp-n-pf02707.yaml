identifier: Pfam:PF02707
label: Major Outer Sheath Protein N-terminal region
definition: >-
  This entry represents the N-terminal region of major outer sheath proteins from spirochaetales. Major outer sheath proteins are present on the bacterial cell surface. In Treponema denticola the major outer sheath protein (Msp) binds immobilized laminin and fibronectin, supporting the hypothesis that Msp mediates the extracellular matrix binding activity of T. denticola.
