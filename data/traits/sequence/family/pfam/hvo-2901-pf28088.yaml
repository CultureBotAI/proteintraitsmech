identifier: Pfam:PF28088
label: Zinc finger protein HVO_2901-like
definition: >-
  This entry represents the zinc finger protein HVO_2901 from Haloferax volcanii ( ) and related proteins from Halobacteria. Members of this family are microproteins that are important for stress adaptation, biofilm formation, and swarming. This group includes proteins that are predicted to adopt two domain architecture composed of an N-terminal C2HC and a C-terminal rubredoxin-like zinc fingers.
