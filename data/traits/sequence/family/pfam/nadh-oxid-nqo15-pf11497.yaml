identifier: Pfam:PF11497
label: NADH-quinone oxidoreductase chain 15
definition: >-
  This entry represents subunit 15 of NADH-quinone oxidoreductase, also known as Complex I. The nqo15 subunit has probably a role in complex stabilisation, and may be also involved in the storage of iron for iron-sulphur cluster regeneration in the complex.
