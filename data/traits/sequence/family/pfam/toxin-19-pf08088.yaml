identifier: Pfam:PF08088
label: Conotoxin I-superfamily
definition: >-
  This family consists of the I-superfamily of conotoxins. This is a new class of peptides in the venom of some Conus species. These toxins are characterised by four disulphide bridges and inhibit of modify ion channels of nerve cells. The I-superfamily conotoxins is found in five or six major clades of cone snails and could possible be found in many more species.
