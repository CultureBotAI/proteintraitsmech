identifier: Pfam:PF29811
label: YosV prophage protein
definition: >-
  This entry represents YosV from the SPbeta prophage of Bacillus subtilis. The protein is found in Spbetavirus SPbeta (Viruses), Bacillus subtilis (Bacteria), and Pieris species (Lepidoptera, Eukaryota). The function of this protein remains to be determined.
