identifier: Pfam:PF06035
label: Bacterial transglutaminase-like cysteine proteinase BTLCP
definition: >-
  Structural analysis predicts that this family of proteins are bacterial transglutaminase-like cysteine peptidases (BTLCPs) with an invariant Cys-His-Asp catalytic triad and an N-terminal signal sequence. They are predicted to possess the papain-like cysteine proteinase fold and catalyse post-translational protein modification through transamidase, acetylase or hydrolase activity. Inspection of neighbouring genes suggests a link between this predicted activity and a type-I secretion system resembling ATP-binding cassette exporters of toxins and proteases involved in bacterial pathogenicity.
