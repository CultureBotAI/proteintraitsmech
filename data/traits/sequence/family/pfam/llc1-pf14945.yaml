identifier: Pfam:PF14945
label: Normal lung function maintenance, Low in Lung Cancer 1 protein
definition: >-
  Uncharacterised protein C20orf85, also known as Ciliary microtubule inner protein 1 (CIMIP1) is part of a family found in eukaryotes. It is 137 amino acids long in protein sequence length and mass is approximately 15.7kDa. The protein is present in the normal lung epithelium, but absent or downregulated in most primary non-small lung cancers. The gene is also known as Low in Lung Cancer 1 (LLC1). This protein is thought to have a role in the maintenance of normal lung function and its absence may lead to lung tumourigenesis.
