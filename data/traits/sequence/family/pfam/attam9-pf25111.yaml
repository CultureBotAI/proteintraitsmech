identifier: Pfam:PF25111
label: AtTam9 family
definition: >-
  This entry represents the AtTam9 protein from Arabidopsis thaliana ( ) and related plant proteins. AtTam9 is a component of the AtYcf2-FtsHi complex. AtTam9 is a small soluble protein which mainly interacts with the NTD of FtsHi5, another component of the AtYcf2-FtsHi complex, and likely contributes to the local assembly and stability of the complex.
