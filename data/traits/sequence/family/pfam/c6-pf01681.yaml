identifier: Pfam:PF01681
label: C6 domain
definition: >-
  This domain of unknown function is found at the C terminus in a number of sequences mainly from Caenorhabditis and related species. It may be an extracellular domain. Most copies of the domain contain six conserved cysteine residues. However some copies of the domain are missing cysteine residues 1 and 3 suggesting that these form a disulphide bridge.
