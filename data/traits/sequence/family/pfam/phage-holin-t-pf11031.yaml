identifier: Pfam:PF11031
label: Bacteriophage T holin
definition: >-
  One mechanism by which bacteriophages effect host lysis begins with the accumulation of a holin in the host membrane and an endolysin in the host cytoplasm during late gene expression. At an allele-specific time, the holin disrupts the membrane, thus allowing the endolysin to enter the periplasm and degrade the cell wall peptidoglycan. This entry represents a specific holin, known as T, which has an unusual C-terminal periplasmic domain thought to be involved in the transduction of environmental information for the real-time control of lysis timing.
