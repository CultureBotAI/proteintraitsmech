identifier: Pfam:PF04403
label: Paraquat-inducible protein A
definition: >-
  This family includes intermembrane transport proteins PqiA and YebS, which are components of transport pathways that contribute to membrane integrity. The promoter for the pqiA gene is inducible by paraquat, a superoxide radical-generating agent, and other known superoxide generators.
