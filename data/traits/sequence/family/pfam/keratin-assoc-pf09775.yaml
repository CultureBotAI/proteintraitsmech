identifier: Pfam:PF09775
label: Keratinocyte-associated protein 2
definition: >-
  Members of this family comprise various keratinocyte-associated proteins, including human Dolichyl-diphosphooligosaccharide--protein glycosyltransferase subunit KCP2 (also known as Keratinocyte-associated protein 2), a subunit of the oligosaccharyl transferase complex that catalyses the initial in protein N-glycosylation.
