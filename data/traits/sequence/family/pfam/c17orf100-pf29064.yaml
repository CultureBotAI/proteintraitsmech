identifier: Pfam:PF29064
label: Chromosome 17 open reading frame 100
definition: >-
  This entry represents the C17orf100 protein family, found in mammals. The protein is approximately 118-129 amino acids in length and is predicted to be largely disordered with some helical regions. C17orf100 has been detected in blood exosomes from both healthy individuals and breast cancer patients. The protein shows low tissue specificity and is expressed in various tissues including liver, cerebellum, head and retina. The function of this protein family remains to be determined.
