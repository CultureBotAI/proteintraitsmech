label: Family of unknown function (DUF6219)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001575) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the dipeptide aldehydes biosynthetic gene cluster from Ruminococcus sp. 5_1_39BFAA. This family appears to be predominantly found in bacteria.
