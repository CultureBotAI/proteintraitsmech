identifier: Pfam:PF06908
label: YspA SLOG family
definition: >-
  Family in the SLOG superfamily showing fusions to NAD utilization and ADP-ribosylation domains including NUDIX, NADAR and MACRO. Members of this family are predicted to function as sensors of nucleotide, nucleotide-derived ligands, or nucleic acids, which are potentially processed/modified by the associating enzymes.
