identifier: Pfam:PF04575
label: Surface lipoprotein assembly modifier
definition: >-
  Slam, also known as NTHI1171 in Haemophilus influenzae, is a surface lipoprotein that may have a role in virulence. In Neisseria, it is required for the surface display of lipidated virulence factors. This entry represents the C-terminal eight-stranded β-barrel domain.
