identifier: Pfam:PF02450
label: Lecithin:cholesterol acyltransferase
definition: >-
  This entry represents a group of lipid metabolising enzymes, including LACT and LPLA2 from humans, and PDAT from plants. Lecithin:cholesterol acyltransferase (LACT), also known as phosphatidylcholine-sterol acyltransferase ( ), is involved in extracellular metabolism of plasma lipoproteins, including cholesterol. It esterifies the free cholesterol transported in plasma lipoproteins, and is activated by apolipoprotein A-I. Its structure has been revealed. Defects in LACT cause Fish eye disease and familial LCAT deficiency. Phospholipid:diacylglycerol acyltransferase (PDAT)( ) is involved in triacylglycerol formation by an acyl-CoA independent pathway. The enzyme specifically transfers acyl groups from the sn-2 position of a phospholipid to diacylglycerol, thus forming an sn-1-lysophospholipid. Lysosomal phospholipase A2 (LPLA2) ( ) plays important roles for lung surfactant metabolism and maturation of invariant natural killer T cells. Its structure has been revealed.
