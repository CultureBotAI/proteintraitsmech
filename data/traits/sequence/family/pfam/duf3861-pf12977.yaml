identifier: Pfam:PF12977
label: Domain of Unknown Function with PDB structure (DUF3861)
definition: >-
  This entry represents a family of proteins of unknown function which are found predominantly in the proteobacteria. The structurally characterised member of this family ( ) adopts a novel fold consisting of a long N-terminal β-hairpin followed by three α helices. This structure shows some resemblance to three-helical bundle folds such as the serum albumin-like fold.
