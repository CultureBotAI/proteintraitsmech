definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0002024) is described by MIBiG as an example of the following biosynthetic class, polyketide, in particular, the nargenicin biosynthetic gene cluster from Nocardia argentinensis. This family appears to be predominantly found in bacteria and unclassified phages.
