identifier: Pfam:PF26881
label: Bacteriophage P1 tail fiber protein R
definition: >-
  This entry represents tail fiber protein R found in P1-like bacteriophages. This protein is a structural or assembly component of the tail fibres, which are essential for phage attachment to host cells. The protein is 144 amino acids in length and is encoded within the tail fibre operon of bacteriophage P1. Tail fibre proteins are critical for determining host specificity and are subject to evolutionary pressure, with tail fibre genes showing evidence of evolution through DNA inversion mechanisms. This entry also includes bacterial proteins.
