identifier: Pfam:PF07284
label: 2-vinyl bacteriochlorophyllide hydratase (BCHF)
definition: >-
  This family contains the bacterial enzyme 2-vinyl bacteriochlorophyllide hydratase (approximately 150 residues long). This is involved in the light-independent bacteriochlorophyll biosynthesis pathway by adding water across the 2-vinyl group.This enzyme is apparently absent from cyanobacteria (which do not use bacteriochlorophyll).
