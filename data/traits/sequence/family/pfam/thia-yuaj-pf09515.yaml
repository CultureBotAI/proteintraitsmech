identifier: Pfam:PF09515
label: Thiamine transporter protein (Thia_YuaJ)
definition: >-
  Members of this protein family have been assigned as thiamine transporters by a phylogenomic analysis of families of genes regulated by the THI element, a broadly conserved RNA secondary structure element through which thiamine pyrophosphate (TPP) levels can regulate transcription of many genes related to thiamine transport, salvage, and de novo biosynthesis. Species with this protein always lack the ThiBPQ ABC transporter. In some species (e.g. Streptococcus mutans and Streptococcus pyogenes), YuaJ is the only THI-regulated gene. The thiamine transporter YuaJ, also known as ThiT, is a member of the energy coupling factor (ECF) transporters, a new class of transport proteins that shares some resemblance with ABC transporters.
