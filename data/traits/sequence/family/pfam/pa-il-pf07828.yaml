identifier: Pfam:PF07828
label: PA-IL-like protein
definition: >-
  The members of this family are similar to the galactophilic lectin-1 expressed by Pseudomonas aeruginosa (PA-IL, ). Lectins recognising specific carbohydrates found on the surface of host cells are known to be involved in the initiation of infections by this organism. The protein is thought to be organised into an extensive network of β-sheets, as is the case with many other lectins.
