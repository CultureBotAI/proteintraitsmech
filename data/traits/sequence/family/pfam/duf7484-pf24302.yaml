identifier: Pfam:PF24302
label: Family of unknown function (DUF7484)
definition: >-
  This entry represents an uncharacterised family of phage proteins. These proteins consist of two domains. The first is composed of four α-helices that are contributed by both the N and C-terminal of the protein. The second domain is a central β domain. Structure prediction suggests that these proteins might form a large homo-oligomeric ring of 8-10 subunits, but the iPTM scores are marginal.
