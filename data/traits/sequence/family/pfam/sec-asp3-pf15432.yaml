identifier: Pfam:PF15432
label: Accessory Sec secretory system ASP3
definition: >-
  Asp3 is part of an accessory SecA2/SecY2 system, which is involved in the export of serine-rich glycoproteins important for virulence in a number of Gram-positive species, including Streptococcus gordonii and Staphylococcus aureus. SecA2/SecY2 system specifically required to export SraP, a serine-rich repeat cell wall protein encoded upstream in the same operon. In Streptococcus gordonii, it may also function in part as chaperones in the early phase of GspB (a serine-rich glycoprotein adhesin) transport.
