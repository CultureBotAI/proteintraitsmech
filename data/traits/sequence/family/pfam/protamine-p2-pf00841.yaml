identifier: Pfam:PF00841
label: Sperm histone P2
definition: >-
  The protamines are a diverse family of small arginine-rich proteins that are synthesized in the late-stage spermatids of many animals and plants. They bind to DNA, condensing the spermatid genome into a genetically inactive state. The two protamines found in mammals, P1 and P2, are the most widely studied. Both P1 and P2 have been shown to be required for normal sperm function in primates and many rodents.
