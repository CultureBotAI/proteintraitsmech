identifier: Pfam:PF16192
label: 'C-terminal four TMM region of protein-O-mannosyltransferase '
definition: >-
  This is the C-terminal four membrane-pass region of protein-O-mannosyltransferases, including yeast Dolichyl-phosphate-mannose--protein mannosyltransferase 1 and similar enzymes from bacteria and eukaryotes. Dolichyl-phosphate-mannose-protein mannosyltransferase proteins belong to the glycosyltransferase family 39 ( ) and are responsible for O-linked glycosylation of proteins. They catalyse the reaction: Dolichyl phosphate D-mannose + protein ->dolichyl phosphate + O-D-mannosyl-protein. The transfer of mannose to seryl and threonyl residues of secretory proteins is catalysed by a family of protein mannosyltransferases in Saccharomyces cerevisiae coded for by seven genes (PMT1-7). Protein O-glycosylation is essential for cell wall rigidity and cell integrity and this protein modification is vital for S. cerevisiae. Undecaprenyl phosphate-alpha-4-amino-4-deoxy-L-arabinose arabinosyl transferase proteins belong to the glycosyltransferase family 83 ( ). They catalyse the reaction: 4-amino-4-deoxy-alpha-L-arabinopyranosyl di-trans,octa-cis-undecaprenyl phosphate + lipid IV(A) = lipid II(A) + di-trans,octa-cis-undecaprenyl phosphate.
