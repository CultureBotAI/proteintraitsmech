identifier: Pfam:PF05802
label: SPI-2 type 3 secretion system translocon protein SctB
definition: >-
  This entry represents a protein family that includes SPI-2 type 3 secretion system translocon protein SctB from Salmonella typhimurium (SctB2) and similar bacterial sequences. SctB2 is required for the translocation of SPI-2 effector proteins and for systemic Salmonella infection of the mouse. It is also essential for SpvB-induced actin depolymerisation in the host cell cytoplasm.
