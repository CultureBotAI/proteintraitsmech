identifier: Pfam:PF22277
label: EncFtn-like
definition: >-
  This protein family includes Encapsulated ferritin-like protein from Rhodospirillum rubrum (EncFtn) and similar prokaryotic sequences. This encapsulated ferritin that acts as a ferroxidase adopts an open decameric structure. Each monomer has an N-terminal 3-10-helix, two long antiparallel α-helices and a shorter helix at the end.
