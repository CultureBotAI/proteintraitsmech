identifier: Pfam:PF21983
label: Mobilization protein NikA
definition: >-
  This family includes homologues of mobilisation protein NikA, such as protein TraJ as well as MobC, MobB and MobA. These proteins are involved in mobilisation and replication functions of plasmids. They are distantly related to accessory factor PcfF and likely adopt similar homo-dimeric structure consisting of N-terminal DNA-binding ribbon-helix-helix (RHH) domain and a C-terminal stalk domain.
