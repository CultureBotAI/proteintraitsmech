identifier: Pfam:PF08744
label: Plant transcription factor NOZZLE
definition: >-
  NOZZLE (also known as SPOROCYTELESS) is a transcription factor that plays a role in patterning the proximal-distal and adaxial-abaxial axes. It is an essential factor for ovule development and functions as an adaptor-like transcriptional repressor, recruiting TPL/TPR co-repressors to inhibit TCP transcription factors.
