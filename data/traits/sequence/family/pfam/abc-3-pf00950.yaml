identifier: Pfam:PF00950
label: ABC 3 transport family
definition: >-
  Members of this protein family are ABC transporter permease subunits as identified by , but additionally contain the Actinobacterial insert domain described by . Some homologues (lacking the insert) have been described as transporters of manganese or of chelated iron. Members of this family typically are found along with an ATP-binding cassette protein, a permease, and an LPXTG-anchored protein with two or three copies of the insert that occurs just once in this protein family.
