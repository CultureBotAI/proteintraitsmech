identifier: Pfam:PF06809
label: Neural proliferation differentiation control-1 protein (NPDC1)
definition: >-
  This family consists of several neural proliferation differentiation control-1 (NPDC1) proteins. NPDC1 plays a role in the control of neural cell proliferation and differentiation. It has been suggested that NPDC1 may be involved in the development of several secretion glands. This family also contains the C-terminal region of the Caenorhabditis elegans protein CAB-1 ( ) which is known to interact with AEX-3.
