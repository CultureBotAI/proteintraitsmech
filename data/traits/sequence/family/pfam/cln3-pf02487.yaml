identifier: Pfam:PF02487
label: CLN3 protein
definition: >-
  Batten's disease, the juvenile variant of neuronal ceroid lipofuscionosis (NCL), is a recessively inherited disorder affecting children of 5-10 years of age. The disease is characterised by progressive loss of vision, seizures and psychomotor disturbances. Biochemically, the disease is characterised by lysosomal accumulation of hydrophobic material, mainly ATP synthase subunit C, largely in the brain but also in other tissues. The disease is fatal within a decade. Mutations in the CLN3 gene are believed to cause Batten's disease. The CLN3 gene, with a predicted 438-residue product, maps to chromosome p16p12.1. The gene contains at least 15 exons spanning 15kb and is highly conserved in mammals. A 1.02kb deletion in the CLN3 gene, occurring in either one or both alleles, is found in 85% of Batten disease chromosomes causing a frameshift generating a predicted translated product of 181 amino acid residues. 22 other mutations, including deletions, insertions and point mutations, have been reported. It has been suggested that such mutations result in severely truncated CLN3 proteins, or affect its structure/conformation. CLN3 proteins, which are believed to associate in complexes, are heavily glycosylated lysosomal membrane proteins, containing complex Asn-linked oligosaccharides. Extensive glycosylation is important for the stability of these lysosomal proteins in the highly hydrolytic lysosomal lumen. Lysosomal sequestration of active lysosomal enzymes, transport of degraded molecules from the lysosomes, and fusion and fission between lysosomes and other organelles. The CLN3 protein is a 43kDa, highly hydrophobic, multi-transmembrane (TM), phosphorylated protein. Hydrophobicity analysis predicts 6-9 TM segments, suggesting that CLN3 is a TM protein that may function as a…
