identifier: Pfam:PF06135
label: IreB regulatory phosphoprotein
definition: >-
  This protein family represents a group of sequences from firmicutes, including IreB from Enterococcus faecalis and ReoM from Listeria monocytogenes. IreB is a cytosolic 10.5kDa protein that is highly conserved among low-GC Gram-positive bacteria. It is involved in the PASTA kinase-mediated signalling pathway regulating peptidoglycan synthesis to maintain cell wall integrity. Studies of E. faecalis mutants lacking ireB revealed that IreB acts downstream of IreK as a negative regulator of cephalosporin resistance in E. faecalis. IreB (UPF0297 protein EF_1202, ) can be modified by phosphorylation in vivo, and mutations that prevent modification at the known sites of phosphorylation (T4 and T7) influence the ability of IreB to modulate cephalosporin resistance. Furthermore, mutations that impair dimerisation abolish the regulation of cephalosporin resistance. Peptidoglycan synthesis regulatory protein ReoM ( ) is involved in the PASTA kinase-mediated signalling pathway regulating peptidoglycan synthesis to maintain cell wall integrity. It modulates ClpCP-dependent proteolysis of MurA, thereby regulating PG synthesis and inhibiting intrinsic cephalosporin resistance.
