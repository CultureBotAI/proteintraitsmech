identifier: Pfam:PF04661
label: Poxvirus I3 ssDNA-binding protein
definition: >-
  The 34kDa protein encoded by the I3 gene of vaccinia virus, named Protein OPG079, is expressed at early and intermediate times post-infection and is phosphorylated on serine residues. I3 protein demonstrates a striking affinity for single-stranded, but not for double-stranded, DNA. Electrophoretic mobility shift assays indicate that numerous I3 molecules can bind to a template, reflecting the stoichiometric interaction of I3 with DNA. Sequence analysis reveals that a pattern of aromatic and charged amino acids common to many replicative single-stranded DNA binding proteins (SSBs) is conserved in I3. This protein plays an essential role in viral DNA replication.
