identifier: Pfam:PF09421
label: Frequency clock protein
definition: >-
  This entry represents Frequency clock protein, Primary circadian oscillator component FRQ1, Circadian oscillator component FRQ10 and related fungal proteins. Frequency (FRQ) is a key circadian clock component that is involved in the generation of biological rhythms in Neurospora crassa. It plays a role in rhythm stability, period length, and temperature compensation. FRQ behaves as a negative element in the circadian transcriptional loop. The protein has been shown to interact with itself via a coiled-coil. FRQ1 is a core component of the circadian oscillator, which comprises the positive elements WC1 and WC2 (forming the WCC complex) and the negative elements FRQ proteins and FRH (forming the FRC complex). Together, these components establish a circadian regulatory network that drives circadian rhythms. FRQ1, in conjunction with FRH, inhibits the activity of the WCC complex, thereby establishing the negative feedback loop essential for oscillator function. The circadian clock governs the rhythmic expression of transcription factors such as ZAFA and CZF1, which are vital for fungal adaptation to zinc starvation stress and the production of the secondary metabolite fusaric acid. In Fusarium oxysporum, the circadian clock controls pathogenesis in tomato plants, with infections causing the most severe disease symptoms at dawn.
