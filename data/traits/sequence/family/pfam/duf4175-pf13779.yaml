identifier: Pfam:PF13779
label: Domain of unknown function (DUF4175)
definition: >-
  Members of this family are found predominantly in the alphaproteobacteria and bacteroidetes. Each has 2-3 predicted transmembrane helices near the N terminus and a long C-terminal region that includes stretches of Gln/Gly-rich low complexity sequence, predicted to be outside the membrane. Bradyrhizobium japonicum contains two tandem copies that are, together, homologous to the single members found in other species.
