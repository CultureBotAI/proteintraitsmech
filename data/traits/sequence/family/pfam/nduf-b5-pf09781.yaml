identifier: Pfam:PF09781
label: NADH:ubiquinone oxidoreductase, NDUFB5/SGDH subunit
definition: >-
  Members of this family mediate the transfer of electrons from NADH to the respiratory chain. The immediate electron acceptor for the enzyme is believed to be ubiquinone, the reaction that occurs being: NADH + ubiquinone = NAD(+) + ubiquinol.
