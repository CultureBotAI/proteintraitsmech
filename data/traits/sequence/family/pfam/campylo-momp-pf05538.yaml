identifier: Pfam:PF05538
label: Campylobacter major outer membrane protein
definition: >-
  Campylobacter are Gram-negative, spiral, microaerophilic bacteria. Campylobacter jejuni is one of the main causative agents of food poisoning in the developed world. This family consists of Campylobacter major outer membrane proteins. The major outer membrane protein (MOMP), a putative porin and a multifunction surface protein of Campylobacter jejuni, may play an important role in the adaptation of the organism to various host environments.
