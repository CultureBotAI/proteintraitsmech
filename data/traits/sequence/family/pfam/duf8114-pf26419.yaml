identifier: Pfam:PF26419
label: Family of unknown function (DUF8114)
definition: >-
  This entry represents a family of uncharacterised proteins found predominantly in halophilic archaea. The proteins in this family are primarily distributed among the Halobacteria class, including families such as Haloferacaceae and Haloarculaceae. The domain is typically found in proteins ranging from 170 to 230 amino acids in length. Many of these proteins exhibit regions of disorder, particularly towards the C-terminal end, which are rich in acidic residues. According to the TED database proteins in this family are composed of three small domains.
