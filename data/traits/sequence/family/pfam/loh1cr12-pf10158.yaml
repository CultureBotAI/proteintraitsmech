identifier: Pfam:PF10158
label: Tumour suppressor protein
definition: >-
  This entry includes the subunit 5 of the BLOC-1-related complex, which is also found in the BORC complex. BLOC-1 is important for the biogenesis of lysosome-related organelles, and BORC is important for the positioning of the lysosome in the cytoplasm. The BORC complex associates with the lysosomal membrane where it recruits the small GTPase Arl8, which leads in turn to the kinesin-dependent movement of lysosomes toward the plus ends of microtubules in the peripheral cytoplasm.
