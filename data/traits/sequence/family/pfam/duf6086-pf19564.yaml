definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000721) is described by MIBiG as an example of the following biosynthetic class, saccharide. This family includes a protein from the tobramycin biosynthetic gene cluster from Streptoalloteichus tenebrarius and appears to be predominantly found in Actinobacteria.
