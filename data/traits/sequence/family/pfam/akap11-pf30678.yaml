identifier: Pfam:PF30678
label: A-kinase anchor protein 11 conserved region
definition: >-
  This entry represents a conserved region found in A-kinase anchor protein 11 (AKAP11, also known as AKAP220), A-kinase anchor protein SPHKAP and related proteins from vertebrates. AKAP11 is a scaffolding protein that binds to type II regulatory subunits of protein kinase A (PKA) and anchors them to specific subcellular locations. The PKA-RII binding domain is located separately at the C-terminal of the protein. AKAP11 localises to the cytoplasm, centrosome, and peroxisomes, with dynamic localisation during spermatogenesis. The protein is expressed in the brain and testis.
