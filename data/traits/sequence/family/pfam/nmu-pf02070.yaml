identifier: Pfam:PF02070
label: Neuromedin U
definition: >-
  Neuromedin U (NmU) is a vertebrate peptide which stimulates uterine smooth muscle contraction and causes selective vasoconstriction. Like most other active peptides, it is proteolytically processed from a larger precursor protein. The mature peptides are 8 (NmU-8) to 25 (NmU-25) residues long and C-terminally amidated. This entry represents the sequence of the C-terminal extremity of NmU, which is extremely well conserved.
