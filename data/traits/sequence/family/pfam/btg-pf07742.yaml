identifier: Pfam:PF07742
label: BTG family
definition: >-
  This entry represents a conserved domain found in the N-terminal of the BTG family members (also known as anti-proliferative proteins). In mammals, BTG family comprises six proteins: BTG1, BTG2/PC3/Tis21, BTG3/ANA, BTG4/PC3B, Tob1/Tob and Tob2. They regulate cell cycle progression in a variety of cell types. These proteins have from 158 to 363 amino acid residues, that are highly similar and include 3 conserved cysteine residues. BTG2 seems to have a signal sequence; while the other proteins may lack such a domain.
