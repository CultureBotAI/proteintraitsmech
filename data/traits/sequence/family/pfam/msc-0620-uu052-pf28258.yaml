identifier: Pfam:PF28258
label: MSC_0620/UU052-like
definition: >-
  This entry represents a group of proteins from Mycoplasmatota, including MSC_0620 from Mycoplasma mycoides ( ) and UU052 from Ureaplasma parvum ( ). Neighbouring proteins include paralogues to the alpha, beta, gamma, and epsilon subunits of the F1 ATPase, and are subunits of a related complex found only in the Mycoplasmatota. This subunit includes transmembrane domains and is designated X0.
