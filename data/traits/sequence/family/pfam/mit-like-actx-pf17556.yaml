identifier: Pfam:PF17556
label: MIT-like atracotoxin family
definition: >-
  This entry represents various Atracotoxin proteins that are secreted from Hexathelidae (funnel-web tarantulas). They are thought not to be toxic to insects or mammals, having no effect on smooth muscle contractility.
