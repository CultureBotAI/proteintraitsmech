identifier: Pfam:PF12293
label: Putative outer membrane core complex of type IVb secretion
definition: >-
  This is a family of bacterial transporter proteins from Proteobacteria. DotH is an integral outer membrane component and it may form an outer membrane complex along with DotD and DotC functionally equivalent to secretins. DotH is the strongest candidate for the VirB9 counterpart of other T4BSS systems.
