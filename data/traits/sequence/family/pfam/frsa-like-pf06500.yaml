identifier: Pfam:PF06500
label: Esterase FrsA-like
definition: >-
  The FrsA-like family includes FrsA, an esterase found to have the α/β-hydrolase fold. It also includes the hydrolytic polyketide shortening protein Ayg1 from fungi, 2,6-dihydropseudooxynicotine hydrolase from Paenarthrobacter nicotinovorans and Fus2 from Gibberella species. The enzyme 2,6-dihydroxy-pseudo-oxynicotine hydrolase is involved in the nicotine-degradation pathway of Arthrobacter nicotinovorans. Fus2 is part of the gene cluster that mediates the biosynthesis of the mycotoxin fusarin C. Fus2 catalyses closure of the 2-pyrrolidone ring of the intermediate 20-hydroxy-prefusarin to form another intermediate, 20-hydroxy-fusarin, which is then oxidized by Fus8. Hydrolyase poxO from Penicillium oxalicum is part of the gene cluster that mediates the biosynthesis of oxaleimides, cytotoxic compounds containing an unusual disubstituted succinimide moiety.
