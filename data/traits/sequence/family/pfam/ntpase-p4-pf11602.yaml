identifier: Pfam:PF11602
label: ATPase P4 of dsRNA bacteriophage phi-12
definition: >-
  This entry represents P4, a packaging motor which is involved in the packaging of Pseudomonas bacteriophage genomes into preformed capsids using ATP. The P4 protein is located at the vertices of the icosahedral capsid. ATP drives RNA translocation through cooperative conformational changes.
