identifier: Pfam:PF28064
label: Stage II sporulation protein SB-like
definition: >-
  This entry represents a group of proteins from Bacillus species, including Stage II sporulation protein SB from Bacillus cereus. SpoIISB is an antitoxin component of a type II toxin-antitoxin (TA) system. SpoIISB antitoxin binds toxin SpoIISA and neutralises its toxic activity.
