identifier: Pfam:PF03333
label: Adhesin biosynthesis transcription regulatory protein
definition: >-
  This entry represents a family of transcriptional regulators of fimbrial and afimbrial adhesin operons in Escherichia coli, including PapB, DaaA, FanA, FanB and AfaA. P pili are approximately 68 Angstrom in diameter and 1 micron in length, comprising a fibre of the main structural protein PapA, terminated at its tip by a fibrillum of repeating PapE units topped by the adhesins PapF and PapG, which are required for receptor binding. Members of this family have the following roles: PapB: may act as both a positive and negative regulator of pap transcription, with its autoregulatory mode of action involving differential binding to separate sites, and may positively regulate levels of PapI. FanA and FanB: trans-acting proteins involved in the regulation of the biogenesis of K99 fimbriae (FanC). AfaA: regulates transcription of genes involved in the biosynthesis of afimbrial adhesin-III. DaaA: regulates transcription of genes involved in the biosynthesis of F1845 fimbrial adhesin.
