identifier: Pfam:PF17352
label: Male Flower Specific protein 18
definition: >-
  In Maize, MFS18 mRNA accumulates in the glumes and in anther walls, paleas and lemmas of mature florets. It is particularly associated with the vascular bundle in the glumes and encodes a polypeptide of 12kDa, rich in glycine, proline and serine that has similarities with other plant structural proteins. There is no known function of this domain family in Maize or other Poaceae.
