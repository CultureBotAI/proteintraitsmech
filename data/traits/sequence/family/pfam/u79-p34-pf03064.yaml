identifier: Pfam:PF03064
label: HSV U79 / HCMV P34
definition: >-
  This entry represents early phosphoprotein p84 and protein U79/U80, both implicated in viral DNA replication. Early phosphoprotein p84 promotes efficient viral DNA replication by recruiting the DNA polymerase processivity factor to pre-replication foci. Protein U79/U80 may also be involved in DNA replication, though its precise role remains to be determined.
