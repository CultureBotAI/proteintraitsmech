identifier: Pfam:PF20935
label: Family of unknown function (DUF6847)
definition: >-
  This entry represents a group of uncharacterised bacterial sequences, including DIP1984 from Corynebacterium diphtheriae ( ), which has a solved crystal structure. Some members of this family previously have been annotated, incorrectly, as septolysin. However, septolysin O, and other members of the family of cholesterol-dependent cytolysins such as listeriolysin O, are unrelated. DIP1984 protein adopt α-helical structure consisting of four α-helices arranged in L-shape that self-associate to form a hollow pumpkin-like particle .
