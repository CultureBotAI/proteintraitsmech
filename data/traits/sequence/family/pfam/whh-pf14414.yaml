identifier: Pfam:PF14414
label: A nuclease of the HNH/ENDO VII superfamily with conserved WHH
definition: >-
  WHH domain containing protein is a predicted nuclease of the HNH/ENDO VII superfamily. The name is derived from the conserved motif WHH. It is found in bacterial polymorphic toxin systems and functions as a toxin module. It is the shortest version of HNH nuclease families. Like AHH and LHH, the WHH nuclease contains 4 conserved histidines of which the first one is predicted to bind a metal-ion and other three ones are involved in activation of water molecule for hydrolysis.
