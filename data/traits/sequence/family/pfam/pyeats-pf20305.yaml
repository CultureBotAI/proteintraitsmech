identifier: Pfam:PF20305
label: prokaryotic YEATS domain
definition: >-
  This entry represents a prokaryotic YEATS domain. pYEATS is fused to diverse effector domains, suggesting that the binding to a ligand activates an effector-based response against an invasive threat. It has been predicted to specifically recognise invader-induced modifications of macromolecules by acyl moieties (e.g. phage-encoded acylations of surface polysaccharides) to unleash the fused effectors through a conformational change.
