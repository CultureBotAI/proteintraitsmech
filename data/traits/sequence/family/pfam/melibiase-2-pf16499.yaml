identifier: Pfam:PF16499
label: Alpha galactosidase A
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 27 comprises enzymes with several known activities; alpha-galactosidase ( ); alpha-N-acetylgalactosaminidase ( ); isomalto-dextranase ( ). Alpha-galactosidase (melibiase) catalyses the hydrolysis of melibiose into galactose and glucose. In man, deficiency in the enzyme results in Fabry's disease (X-linked sphingolipidosis). Alpha-N-acetylgalactosaminidase catalyses the hydrolysis of terminal non-reducing N-acetyl-D-galactosamine residues in N-acetyl-alpha-D-galactosaminides. Two conserved Asp residues may be involved in the catalytic mechanism in these enzymes. Deficiency in this enzyme results in Schindler and Kanzaki diseases.
