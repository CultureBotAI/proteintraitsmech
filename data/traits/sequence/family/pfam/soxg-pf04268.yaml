identifier: Pfam:PF04268
label: 'Sarcosine oxidase, gamma subunit family '
definition: >-
  Sarcosine oxidase is a hetero-tetrameric enzyme that contains both covalently bound FMN and non-covalently bound FAD and NAD + . This enzyme catalyzes the oxidative demethylation of sarcosine to yield glycine, H 2 O 2 , and 5,10-CH2-tetrahydrofolate (H4folate) in a reaction requiring H4folate and O 2.
