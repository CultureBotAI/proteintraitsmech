identifier: Pfam:PF25620
label: Bacteriophage PhiKZ major capsid protein gp120
definition: >-
  This entry represents the major capsid protein (MCP) gp120 from jumbo bacteriophage PhiKZ that infects Pseudomonas aeruginosa. It is the main structural component of the viral capsid with a triangulation number T=27 (h=3, k=3). The protein undergoes proteolytic cleavage between residues Glu163 and Asn164, with only residues 164-747 resolved in the structure. The MCP contains an N-terminal arm, a peripheral domain (P domain), an axial domain (A domain), and notably an insertion domain (I domain) that can be seen as an extension of the E-loop found in other phage MCPs like HK97. The A domain of the PhiKZ MCP has ~50 more residues than that of HK97. The I domain creates significant differences in inter-capsomer interactions compared to smaller phages. MCP subunits within hexameric capsomers form a central six-α-helix bundle creating a 9-angstrom-wide pore. The MCP exhibits remarkable structural adaptability, with subunits adopting different conformations depending on their position in the capsid, allowing adaptation to diverse curvatures. The protein shares 43% sequence similarity with the MCP of phage PhiKp24. This MCP is fundamental to the assembly and stability of the large PhiKZ capsid, working in concert with numerous minor capsid proteins.
