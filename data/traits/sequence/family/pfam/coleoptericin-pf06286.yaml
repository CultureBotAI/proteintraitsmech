identifier: Pfam:PF06286
label: Coleoptericin
definition: >-
  This family consists of several insect coleoptericin, acaloleptin, holotricin and rhinocerosin proteins which are all known to be antibacterial proteins. These all appear to be short, glycine-rich molecules, inducible by infection.
