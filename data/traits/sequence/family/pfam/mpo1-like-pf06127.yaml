identifier: Pfam:PF06127
label: 2-hydroxy-palmitic acid dioxygenase Mpo1-like
definition: >-
  Budding yeast Mpo1 is a dioxygenase that catalyzes the alpha-oxidation of a 2-hydroxy fatty acid in an Fe2+-dependent manner. This entry also includes Mpo1 homologues from bacteria, fungi and plants. Their function is not clear.
