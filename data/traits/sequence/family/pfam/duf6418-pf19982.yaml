label: Family of unknown function (DUF6418)
definition: >-
  This entry represents a domain found in a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001589) is described by MIBiG as an example of the following biosynthetic class, saccharide, in particular the exopolysaccharides biosynthetic gene cluster from Burkholderia cenocepacia J2315. This domain appears to be predominantly found in Proteobacteria proteins.
