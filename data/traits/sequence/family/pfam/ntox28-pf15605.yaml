identifier: Pfam:PF15605
label: Bacterial toxin 28
definition: >-
  This entry represents the C-terminal in CdiA bacterial proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighbouring cells. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist. CdiA possesses an all α-helical fold and conserved aspartate and glutamate residues, and K[DE] and [DN]HxxE motifs. The N-terminal domain facilitates translocation of the tethered nuclease into the cytosol of target bacteria. Although CdiA rapidly cleaves tRNA in vivo, the purified toxin has no detectable nuclease activity in vitro. Experiments show that it is activated when bound to the biosynthetic enzyme O-acetylserine sulfhydrylase-A (CysK), which is one of two isoenzymes (along with CysM) that catalyse the final reaction in cysteine synthesis. CDI(+) bacteria also produce a CDI immunity protein (CdiI) to specifically neutralise the CdiAvtoxins to prevent auto-inhibition. This CdiA binds its cognate CdiI with high affinity.
