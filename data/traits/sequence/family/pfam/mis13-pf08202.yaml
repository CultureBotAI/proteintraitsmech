identifier: Pfam:PF08202
label: Mis12-Mtw1 protein family
definition: >-
  This entry represents the kinetochore-associated protein Dsn1/Mis13. In Saccharomyces cerevisiae, Dsn1 acts as essential component of the kinetochore MIND complex, which is required for the spindle checkpoint and kinetochore integrity. MIND plays a role in establishing a bipolar spindle-kinetochore interaction by joining kinetochore subunits contacting DNA to those contacting microtubules. In Schizosaccharomyces pombe, Mis13 acts as a component of the NMS (Ndc80-MIND-Spc7) super complex which has a role in kinetochore function during late meiotic prophase and throughout the mitotic cell cycle. It is required for correct segregation of chromosomes and for maintaining the inner centromere structure.
