identifier: Pfam:PF31186
label: Endolysin
definition: >-
  This protein family includes Endolysin from Bacteriophage lambda, which has transglycosylase activity that degrades host peptidoglycans and participates with the holin and spanin proteins in the sequential events which lead to the programmed host cell lysis releasing the mature viral particles. Once the holin has permeabilised the host cell membrane, the endolysin can reach the periplasm and break down the peptidoglycan layer. This entry includes proteins from tailed bacteriophages and from prophages from diverse bacteria.
