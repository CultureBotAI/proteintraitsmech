identifier: Pfam:PF04550
label: 'Phage holin family 2 '
definition: >-
  This entry represents Holin from Bacteriophage P2 and similar proteins from tailed bacteriophages (Caudovirales) and prophages found in Proteobacteria. Holin determines the precise timing of host cell lysis. Holins form large oligomeric flexible pores in the cytoplasmic membranes of bacteria to allow the endolysins to gain access to the cell wall, where they exert their actions by cleaving various bonds in the peptidoglycan polymer and inducing cell death. These proteins and its corresponding genes have been identified in a wide variety of Gram-negative and Gram-positive bacteria and their phages.
