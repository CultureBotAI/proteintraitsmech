identifier: Pfam:PF24313
label: Paratox
definition: >-
  This entry represents the conserved mosaic prophage protein Paratox ( ) and related proteins from tailed bacteriophages and profagues from firmicutes. Paratox inhibits the natural competence regulator ComR and serves as a repressor of the competence regulon in vivo. This protein folds into an α/β structure consisting of a three-stranded β-sheet and two α-helices packed on one side of the sheet.
