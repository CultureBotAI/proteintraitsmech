identifier: Pfam:PF26832
label: Phage gene 86 protein
definition: >-
  This entry represents gene 86 protein (Gp86) found in mycobacteriophages. Members of this family are mainly found in bacteriophages that infect Mycobacterium species and in actinobacterial prophages. The function of this protein remains unknown.
