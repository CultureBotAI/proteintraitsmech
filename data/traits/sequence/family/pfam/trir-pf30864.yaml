identifier: Pfam:PF30864
label: Telomerase RNA component interacting RNase
definition: >-
  This entry includes telomerase RNA component interacting RNase (TRIR), an exoribonuclease that is a component of the telomerase RNA 3' end processing complex. It releases all four unpaired RNA nucleotides from either the 5' end or the 3' end but with a higher efficiency for purine bases.
