identifier: Pfam:PF17054
label: Microtubule-Associated protein Jupiter
definition: >-
  This entry includes microtubule-associated protein Jupiter from fruit flies and Jupiter microtubule associated homologues 1 and 2 from mammals, also known as hematological and neurological expressed 1 (HN1) and hematological and neurological expressed 1-like (HN1L) respectively. Jupiter binds to all microtubule populations. HN1/HN1L may be involved in embryo development. HN1 is a regulator of GSK3beta-dependent interactions of beta-catenin and E-cadherin.
