identifier: Pfam:PF08208
label: DNA-directed RNA polymerase I subunit RPA34.5
definition: >-
  This is a family of proteins conserved from yeasts to human. Subunit A34 of RNA polymerase I is a non-essential subunit which is thought to help Pol I overcome topological constraints imposed on ribosomal DNA during the process of transcription. It forms a heterodimer with RPA49 which stimulates transcript elongation by Pol I.
