identifier: Pfam:PF04199
label: Putative cyclase
definition: >-
  Kynurenine formamidase catalyses the hydrolysis of N-formyl-L-kynurenine to L-kynurenine, the second step in the kynurenine pathway of tryptophan degradation. The proteins contain a conserved motif HXGTHXDXPXH that is likely to form a part of the active site. This family also includes cyclase-like proteins from plants. They are involved in responses to abiotic stress, and could function as polyketide cyclases. Isatin hydrolase ( ), characterised from the bacterium Labrenzia aggregata, is also a member of this family. It is a manganese-binding enzyme that hydrolyses the cyclic amide bond (lactam) of isatin (1H-indole-2,3-dione) to yield isatinate (2-(2-aminophenyl)-2-oxoacetate), during the degradation of the plant hormone indole-3-acetic acid (IAA).
