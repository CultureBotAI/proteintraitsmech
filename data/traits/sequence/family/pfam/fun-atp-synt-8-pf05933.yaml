identifier: Pfam:PF05933
label: Fungal ATP synthase protein 8 (A6L)
definition: >-
  Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP. F-ATPases (also known as ATP synthases, F1F0-ATPase, or H(+)-transporting two-sector ATPase) ( ) are composed of two linked complexes: the F1 ATPase complex is the catalytic core and is composed of 5 subunits (alpha, beta, gamma, delta, epsilon), while the F0 ATPase complex is the membrane-embedded proton channel that is composed of at least 3 subunits (A-C), with additional subunits in mitochondria. Both the F1 and F0 complexes are rotary motors that are coupled back-to-back. In the F1 complex, the central gamma subunit forms the rotor inside the cylinder made of the α(3)β(3) subunits, while in the F0 complex, the ring-shaped C subunits forms the rotor. The two rotors rotate in opposite directions, but the F0 rotor is usually stronger, using the force from the proton gradient to push the F1 rotor in reverse in order to drive ATP synthesis. These ATPases can also work in reverse in bacteria, hydrolysing ATP to create a proton gradient. In yeast, the F0 complex is composed of at least nine polypeptides which are nucleus-encoded: b, OSCP, d, e, f, g, h, i/j and k, together with three subunits, 6, 8 and 9, which are mitochondrion-encoded. The bovine enzyme also includes subunit F6 for which no homologue has been found in yeast. This entry represents subunit 8 found in the F0 complex of mitochondrial F-ATPases from fungi. This subunit appears to be an integral component of the stator stalk in yeast mitochondrial F-ATPases. The s…
