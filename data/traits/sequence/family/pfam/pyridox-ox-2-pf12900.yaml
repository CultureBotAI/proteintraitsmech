identifier: Pfam:PF12900
label: Pyridoxamine 5'-phosphate oxidase
definition: >-
  Pyridoxamine 5'-phosphate oxidase is a FMN flavoprotein that catalyses the oxidation of pyridoxamine-5-P (PMP) and pyridoxine-5-P (PNP) to pyridoxal-5-P (PLP). This entry contains several uncharacterised proteins, some annotated as pyridoxamine 5'-phosphate oxidase-related.
