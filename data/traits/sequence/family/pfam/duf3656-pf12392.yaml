identifier: Pfam:PF12392
label: 'Collagenase '
definition: >-
  The peptidases families associated with clan U-have an unknown catalytic mechanism as the protein fold of the active site domain and the active site residues have not been reported. This domain is found in a number of proteins belonging to the MEROPS peptidase family U32. Peptidase family U32 contains endopeptidases, including collagenase, from bacteria.
