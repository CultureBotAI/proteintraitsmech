label: SPP1 phage GP23.1
definition: >-
  Gp23.1 ( ) from Bacillus subtilis SPP1 phage adopts a hexamer assembly and is likely to function as a chaperone. This family of highly conserved sequences is found in phages with long non-contractile tails and in bacterial prophages.
