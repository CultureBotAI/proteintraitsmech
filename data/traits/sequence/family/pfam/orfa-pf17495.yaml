identifier: Pfam:PF17495
label: Vpr-like OrfA
definition: >-
  OrfA protein is a multifunctional accessory protein found in Feline immunodeficiency virus (FIV), a lentivirus that causes AIDS in domestic cats. Multiple potential functions have been ascribed to OrfA, including transactivation of viral protein expression, effects on virion formation and infectivity, host cell cycle arrest and downregulation of cell surface expression of the primary FIV receptor, CD134.
