identifier: Pfam:PF28084
label: Zinc finger protein HVO_A0556-like
definition: >-
  This entry represents the HVO_A0556 zinc finger protein from Haloferax volcanii ( ) and related proteins from Halobacteria. HVO_A0556 is predicted to have a single domain zinc finger with a rubredoxin-like fold. Deletion of HVO_A0556 gene was shown to have a pleiotropic phenotype under four different conditions.
