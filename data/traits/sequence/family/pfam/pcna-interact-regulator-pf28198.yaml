identifier: Pfam:PF28198
label: PCNA-interacting regulator
definition: >-
  This family of proteins includes PCNA-inhibitors from archaea, which interact with the DNA polymerase sliding clamp, known as proliferating cell nuclear antigen (PCNA), and is involved in the regulation of DNA replication and repair processes. Members of this family are capable of binding to PCNA and disrupting its trimeric ring structure. This action results in the inhibition of PCNA-dependent DNA synthesis and repair activities, including those mediated by DNA polymerase PolB and flap endonuclease 1 (FEN-1). The regulatory function of these proteins is crucial for maintaining genomic integrity by controlling the activity of key enzymes during the cell cycle.
