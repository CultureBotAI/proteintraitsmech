identifier: Pfam:PF29473
label: Mycobacterium Rv3202A family
definition: >-
  This entry represents a family of small uncharacterised proteins found in the Mycobacterium tuberculosis complex. The family is named after the Mycobacterium tuberculosis locus tag Rv3202A. These proteins are approximately 70-75 residues in length and have been detected at protein level by mass spectrometry. The function of this family remains to be determined.
