identifier: Pfam:PF10036
label: RNA transcription, translation and transport factor protein
definition: >-
  This entry represents RNA transcription, translation and transport factor protein (RTRAF, also known as hCLE/C14orf166) from eukaryotes. It is part of the DDX1-HSPC117-FAM98B complex that shuttles between the nucleus and the cytoplasm transporting RNAs. It is also a component of the tRNA-splicing ligase complex and is required for tRNA ligation. Human RTRAF works as a positive modulator of the RNA polymerase II activity. It also interacts with influenza virus polymerase subunit PA and plays an important role in influenza virus replication.
