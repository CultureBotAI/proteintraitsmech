identifier: Pfam:PF28085
label: Zinc finger protein HVO_0416-like
definition: >-
  This entry represents the zinc finger protein HVO_0416 from Haloferax volcanii ( ) and related proteins from Halobacteria. Short proteins of this family are important for stress adaptation, biofilm formation, and swarming. These proteins are predicted to adopt a rubredoxin-like fold.
