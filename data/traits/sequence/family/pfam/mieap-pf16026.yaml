identifier: Pfam:PF16026
label: Mitochondria-eating protein
definition: >-
  This domain is found at the C terminus of mitochondria-eating proteins. Proteins containing this domain regulate mitochondrial quality. They have a role in damaged mitochondrial protein degradation and in damaged mitochondria degradation.
