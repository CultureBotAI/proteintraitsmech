identifier: Pfam:PF30916
label: Microtubule binding protein 2C
definition: >-
  MPB2C proteins are involved in regulating cell-to-cell trafficking of homeodomain proteins in plants. MPB2C negatively regulates KNOTTED1 (KN1) association to plasmodesmata and, consequently, KN1 cell-to-cell transport. MPB2C has also been linked to roles in organization of cortical microtubules, stomata patterning, and tobamovirus infectivity.
