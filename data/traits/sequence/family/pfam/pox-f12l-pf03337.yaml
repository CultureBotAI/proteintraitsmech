identifier: Pfam:PF03337
label: Poxvirus F12L protein
definition: >-
  The vaccinia virus F12L gene encodes a 65kDa protein called Protein OPG056 that is expressed late during infection and is important for plaque formation, EEV production and virulence. The F12L protein is located on intracellular enveloped virus (IEV) particles, but is absent from immature virions, intracellular mature virus and cell-associated enveloped virus. F12L shows co-localization with endosomal compartments and microtubules and appears to play a role in the the transport of IEV particles to the cell surface on microtubules. Together with protein OPG064/E2, forms a complex that interacts with host KLC2 (kinesin light chain isoform 2) to engage the kinesin-1 complex and thereby promote IEV trafficking.
