label: EMYY-motif containing lipoprotein
definition: >-
  Members of this family are lipoproteins, about 300 amino acid residues long, found broadly in the genus Staphylococcus and in some related species. Most of these proteins contain an N-terminal lipoprotein lipid attachment site.
