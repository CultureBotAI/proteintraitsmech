identifier: Pfam:PF04776
label: Protein MS5
definition: >-
  These sequences comprise a paralogous family of proteins predominantly found in Brassicaceae. Length heterogeneity within the family is attributable partly to a 21-residue repeat present in from zero to three tandem copies. One member of the family, protein MS5, has been shown to be important for progression of meiosis during early prophase and is essential for pairing of homologues. It is preferentially expressed in reproductive organs. The structure of MS5 revealed that it adopts a cystatin-like fold that consists of a central α-helix and four- or five-stranded antiparallel β-sheets that wrap around it.
