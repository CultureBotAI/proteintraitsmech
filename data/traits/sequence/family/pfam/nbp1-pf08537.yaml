identifier: Pfam:PF08537
label: Fungal Nap binding protein NBP1
definition: >-
  This family includes CDC5 pindle pole body anchor protein 1 (CSA1/YPR174C) and NAP1-binding protein (NBP1) from yeast, which are paralogues. Both proteins bind to the nuclear membrane. NBP1 has been shown in Saccharomyces cerevisiae to function in spindle pole body duplication and CSA1 is a specialised component of the nuclear membrane that may be involved in the connection of the spindle pole body (SPB) to the nuclear envelope. It recruits CDC5 to spindle pole bodies in metaphase.
