identifier: Pfam:PF20381
label: Membrane protein Rv1476
definition: >-
  This entry, previously known as DUF6676, represents Membrane protein Rv1476 and related proteins found in actinobacteria. Rv1476 probably affects the expression of genes linked to host macrophage apoptosis and immune response, thereby promoting the survival of Mycobacterium tuberculosis in host macrophages.
