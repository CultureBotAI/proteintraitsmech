identifier: Pfam:PF04631
label: Per os infectivity factor 2
definition: >-
  This family includes several baculoviral proteins, with predicted molecular weights of approximately 44kDa. The per os infectivity factor 2 (PIF2) is included in this entry. PIF2 forms a stable complex with PIF1, PIF3, PIF4 which is essential for oral infectivity of Autographa californica multinucleocapsid nucleopolyhedrovirus (AcMNPV) in insect larvae, and P74 is also associated with this complex.
