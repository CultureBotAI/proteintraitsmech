label: Family of unknown function (DUF6212)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000801) is described by MIBiG as an example of the following biosynthetic class, saccharide. It includes a member from the galactoglucan biosynthetic gene cluster from Sinorhizobium meliloti. This family appears to be predominantly found in proteobacteria.
