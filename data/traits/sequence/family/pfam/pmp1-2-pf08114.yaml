identifier: Pfam:PF08114
label: ATPase proteolipid family
definition: >-
  Pmp1 and its paralogue, Pmp2, are small single-spanning membrane proteins functioning as a regulatory subunit of the yeast plasma membrane H(+)-ATPase. Pmp1 forms a unique helix and exhibits a positively charged cytoplasmic domain that is able to specifically segregate phosphatidylserines (PSs).
