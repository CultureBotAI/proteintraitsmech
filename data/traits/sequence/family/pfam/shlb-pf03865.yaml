identifier: Pfam:PF03865
label: Haemolysin secretion/activation protein ShlB/FhaC/HecB
definition: >-
  Haemolysin (HlyA) and related toxins are secreted across both the cytoplasmic and outer membranes of Gram-negative bacteria in a process which proceeds without a periplasmic intermediate. HlyA is directed by an uncleaved C-terminal targeting signal and the HlyD and HlyB translocator proteins.
