identifier: Pfam:PF06545
label: Oxamate carbamoyltransferase subunit AllG
definition: >-
  This superfamily represents a domain found in the N-terminal region of a conserved protein (YlbE) of unknown function from Escherichia coli K12. It consists of a mainly α orthogonal bundle . This domain is associated with and immediately N-terminal to another domain of unknown function defined by (DUF1116). Tis domain is found in Oxamate carbamoyltransferase subunit AllG which is a component of a carbamoyltransferase involved in the anaerobic nitrogen utilization via the assimilation of allantoin. It catalyses the conversion of oxalurate (N-carbamoyl-2-oxoglycine) to oxamate and carbamoyl phosphate.
