identifier: Pfam:PF07851
label: TMEM120A/B
definition: >-
  This entry represents a group of transmembrane proteins including TACAN (also known as TMEM120A) and TMEM120B. TMEM120A is involved in mechanosensation and plays an essential role in lipid metabolism and adipocyte differentiation. It was first described as an ion channel that contributes to sensing mechanical pain, however, several studies show that TMEM120A does not exhibit mechanosensitive channel activity and display no typical ion channel structural characteristics. TMEM120A is structurally similar to a lipid-modifying enzyme, ELOVL7, and contains a bound coenzyme A molecule, which suggests it might function as an enzyme in lipid metabolism. Therefore, if TMEM120A is an enzyme rather than an ion channel is still in debate. TMEM120A and TMEM120B may be required for efficient adipogenesis.
