label: YoaP-like
definition: >-
  The YoaP-like domain is found at the C terminus of the Bacillus subtilis YoaP protein ( ) and other bacterial and archaeal proteins, and is approximately 40 amino acids in length. There is a single completely conserved residue A that may be functionally important.
