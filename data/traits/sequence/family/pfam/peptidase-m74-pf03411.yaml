identifier: Pfam:PF03411
label: Penicillin-insensitive murein endopeptidase
definition: >-
  This group of peptidases belong to MEROPS peptidase family M74 (murein endopeptidase family, clan MD). The type example is murein endopeptidase from Escherichia coli (MepA). The entry represents a family of penicillin-insensitive murein endopeptidases involved in the removal of murein from the sacculus by cleaving the peptide bonds between neighbouring strands in mature murein. The crystal structure of MepA has been determined revealing similarities to the D-Ala-D-Ala carboxypeptidases in MEROPS peptidase family M15.
