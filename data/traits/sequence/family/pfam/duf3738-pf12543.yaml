identifier: Pfam:PF12543
label: Protein of unknown function (DUF3738)
definition: >-
  Bacterial reference strains encoding members of this protein family are all isolated from soil. These include members from Solibacter usitatus Ellin6076, 27 from Acidobacterium sp. MP5ACTX8 (both Acidobacteria), and four from Pedosphaera parvula Ellin514 (Verrucomicrobia). The family is well-diversified, with few pairs showing greater than 50% pairwise identity. A few members are fused to Peptidase_M56 domains (see ), to Sigma70_r2 domains (see ), or have a duplication of this domain.
