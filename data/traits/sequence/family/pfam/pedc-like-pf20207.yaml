identifier: Pfam:PF20207
label: Pediocin PA-1 biosynthesis protein PedC-like
definition: >-
  This family of proteins, previously known as DUF6568, represents the Pediocin PA-1 biosynthesis protein PedC and related proteins, including Protein MesC, that are mainly found in firmicutes. PedC is probably involved in pediocin PA-1 biosynthesis , a class II bacteriocin produced by the bacterium Pediococcus acidilactici. Member of this family contain two conserved motifs, CxxF and YxN, and two conserved residues, Tyr at the N-terminal and a Gly at the C-terminal. Many members of this family are thought to belong to the Thioredoxin superfamily.
