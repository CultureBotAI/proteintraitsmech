identifier: Pfam:PF06716
label: Movement protein p6
definition: >-
  Movement proteins (MPs) encoded by many virus genera are specialised proteins essential for plant viral genomes or virions transport within and between cells. There are some models of virus movement, such as Tobacco mosaic virus (TMV) model or the one described in several families of the icosahedral RNA viruses and pararetroviruses. Aditionally, proteins involved in replication or encapsidation are also required in cell-to-cell movement in some viruses. This entry represents the movement protein 6 (p6) from Beet yellows virus and related Closterovirus proteins. P6 is a small protein (6kDa) localised in the endoplasmic reticulum. It has a single-span N-terminal transmembrane domain and a C-terminal hydrophilic domain which faces the cytosol. It is involved, together with Hsp70h, CP, CPm, and P64, in cell to cell movement of the viral genome without any budding, being essential for this process. The mechanism of action of this protein is not clear. It is suggested that it also plays a role in virion formation.
