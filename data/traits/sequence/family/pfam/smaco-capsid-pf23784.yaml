identifier: Pfam:PF23784
label: Smacovirus capsid protein
definition: >-
  This entry represents probable capsid proteins found mainly in smacoviruses, a family of small, circular single-stranded DNA viruses. This capsid protein is typically around 300-400 amino acids in length. Smacoviruses have been identified in the fecal matter of a variety of mammals, including humans, non-human primates, pigs, and other domestic and wild animals. The viruses are currently not known to be associated with any disease.
