identifier: Pfam:PF27927
label: Diuretic hormone class 2-like
definition: >-
  DH31 is a diuretic hormone that increases cAMP production and fluid secretion in Malpighian tubules of several insect species. DH31 is similar to the calcitonin family. In Drosophila, it has also been linked to a neuropeptide relay mechanism for circadian control of sleep, and peristalsis in the junction region of the larval midgut. Drosophila neuropeptide DH31 is a ligand for orphan GPCR named CG17415. This entry also includes venom protein 55.1 and U-limacoditoxin(8)-Dv66 (also known as Vulnericin), which belong to the diuretic hormone class 2 family. U-scoloptoxin(21)-Sm1/2a are uncharacterised proteins related to DH31.
