identifier: Pfam:PF08449
label: UAA transporter family
definition: >-
  This family represents a group of nucleotide sugar transporters (NSTs) that belong to the SLC35 family of solute carriers, and their function is highly conserved from simple eukaryotes, fungi and parasites to plants and mammals, including the nucleotide sugar transporters SLC35B1-4 from humans and HUT1 and YEA4 from yeast. Members of this family localize at the Golgi apparatus and/or the endoplasmic reticulum (ER) and exhibit different substrate specificities; for instance, YEA4 has specificity for UDP-N-acetylglucosamine, which is localised in the ER and required for chitin synthesis. SLC35B1 from humans has been identified as an ATP:ADP antiporter that catalyses the exchange of ATP and ADP across the ER membrane, where it imports ATP from the cytosol to the ER lumen and exports ADP in the opposite direction. SLC35B1 regulates ER energy metabolism, probably as part of a calcium-dependent ER-to-cytosol low-energy response axis, and it also provides ATP to ER chaperones required for proper protein folding and trafficking in the ER. HUT1, SLC35B1 orthologues, play a more general role in ER homeostasis.
