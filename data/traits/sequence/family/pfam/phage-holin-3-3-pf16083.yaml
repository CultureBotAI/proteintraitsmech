identifier: Pfam:PF16083
label: LydA holin phage, holin superfamily III
definition: >-
  This is a family of small hydrophobic holin proteins with one or more transmembrane domains. Holins are encoded within the genomes of Gram-positive and Gram-negative bacteria as well as those of the bacteriophages of these organisms. Their primary function appears to be transport of murein hydrolases across the cytoplasmic membrane to the cell wall where these enzymes hydrolyse the cell wall polymer as a prelude to cell lysis. When chromosomally encoded, these enzymes are therefore autolysins. Holins may also facilitate leakage of electrolytes and nutrients from the cell cytoplasm, thereby promoting cell death. Some may catalyse export of nucleases. LydA and lydB are encoded on the dar operon. The phenotype of a rapid lysis in the absence of active LydB suggests that this protein might be an antagonist of the holin LydA.
