identifier: Pfam:PF10832
label: YhfG
definition: >-
  This protein family includes proteins predominantly found in Gammaproteobacteria, such as YhfG from Escherichia coli. YhfG is a FicA antitoxin homologue (also known as antitoxin EcFicA) that interacts with EcFiT and forms a complex with it. YhfG shows a unique conformation, forming two parallel α-helices linked by a 10-residues loop. The structure of the complex shows a highly conserved extended ligand-binding pocket.
