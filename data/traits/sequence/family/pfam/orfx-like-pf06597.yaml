identifier: Pfam:PF06597
label: Protein OrfX2/OrfX3/P47
definition: >-
  This family consists of several proteins (P47 and OrfX cluster) from various Clostridium species as well as related sequences from other bacteria. P47 and OrfX cluster proteins adopt a complex fold which has an internal structural duplication. They share structural similarity to lipopolysaccharide binding protein (LBP) and have been shown to bind to several types of phosphatidylinositol-phosphate (PIP) lipids.
