identifier: Pfam:PF07178
label: TraL protein
definition: >-
  This entry represents bacterial TraL proteins. TraL is a predicted peripheral membrane protein involved in bacterial sex pilus assembly. TraL is part of the type IV secretion system for conjugative plasmid transfer. The exact function of TraL is unknown.
