identifier: Pfam:PF18699
label: 'Mitoribosomal protein mL52 '
definition: >-
  Mitochondria contain 55S ribosomes, with a 28S subunit and a 39S subunit. These ribosomes resemble bacterial ribosomes and eukaryotic-cytoplasmic ribosomes in their main functional properties, but they differ in structure and physical chemical properties. Many of the mitochondrial ribosomal proteins (MRPs) are distinctive, having no closely related homologues in bacterial or eukaryotic-cytoplasmic ribosomes. This entry includes the large ribosomal subunit protein mL52 (also known as MRPL52).
