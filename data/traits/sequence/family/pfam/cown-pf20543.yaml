identifier: Pfam:PF20543
label: N2-fixation sustaining protein CowN
definition: >-
  Nitrogen fixation is catalysed by the nitrogenase complex and can be inhibited by carbon monoxide. The CowN protein protects against this inhibition, allowing nitrogen fixation-dependent growth to occur in the presence of carbon monoxide. Disruption of CowN specifically impaires Mo-nitrogenase-dependent growth at carbon monoxide concentrations still tolerated by the wild type. The mechanism by which CowN confers this protection is not known.
