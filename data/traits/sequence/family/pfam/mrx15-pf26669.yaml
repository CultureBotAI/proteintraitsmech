identifier: Pfam:PF26669
label: Mitochondrial ribosome receptor Mrx15
definition: >-
  This entry represents Mrx15 (YNR040W) from Saccharomyces cerevisiae, a mitochondrial inner membrane protein that functions as a ribosome receptor in fungi. Mrx15 contains two transmembrane segments and interacts with the large subunit (LSU) of the mitoribosome through its positively charged C-terminal domain, which faces the mitochondrial matrix. Together with the peripheral membrane protein Mba1, Mrx15 tethers the mitoribosome to the inner membrane to facilitate cotranslational insertion of mitochondrially encoded proteins. Mrx15 contacts nascent polypeptide chains as they emerge from the ribosomal exit tunnel and ensures proper alignment with the membrane insertase Oxa1. Unlike Mba1, which dissociates from the ribosome to escort Cox2 for downstream assembly, Mrx15 remains stably bound to the mitoribosome throughout translation. Combined deletion of MRX15 and MBA1 causes respiratory deficiency and cytochrome c oxidase (complex IV) defects due to impaired Cox2 biogenesis. Deletion of MRX15 alone confers increased tolerance to proteotoxic stress, suggesting a role in protein quality control. As Mrx15 homologues are restricted to fungi, it may functionally substitute for the permanently bound mL45 ribosomal protein found in mammalian mitoribosomes.
