identifier: Pfam:PF16104
label: Formyl peptide receptor-like 1 inhibitory protein
definition: >-
  Formyl Peptide Receptor-Like 1 (FPRL1)-inhibitory protein (also termed FLIPr) has been shown to inhibit calcium mobilisation in neutrophils. There is evidence that FLIPr binds to FPRL1 and, at higher concentrations, to FPR, impairing the leukocyte response to FPRL1 agonists. It has revealed unknown inflammatory ligands during S.aureus infection and, as an FPRL1 antagonist, may facilitate development of therapeutic agents in FPRL1-mediated inflammatory diseases.
