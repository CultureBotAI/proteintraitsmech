label: Domain of unknown function (DUF4909)
definition: >-
  Proteins in this family are approximately 160 amino acids in length. Several members are associated with vancomycin virulence in Staphylococcus aureus in some way. These proteins are all lipoproteins, carrying the characteristic prokaryotic membrane-attachment site at their N termini.
