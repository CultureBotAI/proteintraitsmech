identifier: Pfam:PF24195
label: Family of unknown function (DUF7420)
definition: >-
  This entry represents an uncharacterised family of phage integral membrane proteins. The proteins are found in phage of S. aureus and B. subtilis. These proteins contain three potential transmembrane helices. There is a conserved GXXPL motif that is highly conserved between helices 1 and 2.
