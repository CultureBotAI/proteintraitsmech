identifier: Pfam:PF11997
label: Domain of unknown function (DUF3492)
definition: >-
  This domain is functionally uncharacterised and is found in bacteria, archaea and eukaryotes. It is typically between 259 to 282 amino acids in length. This region is found N-terminal . There are two conserved sequence motifs: GGVS and EHGIY.
