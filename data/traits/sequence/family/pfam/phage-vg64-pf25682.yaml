identifier: Pfam:PF25682
label: Mycobacterium phage VG64
definition: >-
  The small Mycobacterium phage protein VG64 is predicted to be a lipoprotein. Members of this family are found in a range of caudoviruses that infect mycobacteria and bacilli and bacterial prophages. Structure prediction shows that this protein forms small 6-stranded β-sandwich domain. Structure prediction suggests that it can form a homo-nonameric complex, which shows a flat disk like structure.
