identifier: Pfam:PF15088
label: NADH dehydrogenase [ubiquinone] 1 subunit C1, mitochondrial
definition: >-
  Subunit C1 is a accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I), that is believed not to be involved in catalysis. NADH dehydrogenase complex I functions in the transfer of electrons from NADH to the respiratory chain. The immediate electron acceptor for the enzyme is believed to be ubiquinone.
