identifier: Pfam:PF03390
label: 2-hydroxycarboxylate transporter family
definition: >-
  The 2-hydroxycarboxylate transporter family is a family of secondary transporters found exclusively in the bacterial kingdom. They function in the metabolism of the di- and tricarboxylates malate and citrate, mostly in fermentative pathways involving decarboxylation of malate or oxaloacetate. The majority of proteins in this family are known or predicted members of the citrate:cation symporter (CCS) family. They contain the predicted twelve-transmembrane helix motif common to many secondary transporters. Most of the characterised proteins in this entry are specific for citrate, with either Na+ of H+ as the contransported cation. However, one member is capable of cotransporting either citrate or malate with H+, while another has been shown to be an Na+-dependent malate cotransporter.
