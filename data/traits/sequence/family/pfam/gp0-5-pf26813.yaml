identifier: Pfam:PF26813
label: Bacteriophage T7 protein 0.5
definition: >-
  This entry represents the bacteriophage T7 protein 0.5 (Gp0.5) family, a small membrane protein found in T7 and related phages. The protein is synthesised as a 47-amino-acid precursor with an N-terminal signal peptide (residues 1-23) that is cleaved to produce the mature 24-amino-acid protein. The mature protein contains a single transmembrane helix (residues 24-43) and is localised to the host cell membrane as a single-pass membrane protein. The function of this small membrane protein in the T7 life cycle remains to be determined, but its early expression and membrane localisation suggest a role in host cell membrane modification or phage morphogenesis.
