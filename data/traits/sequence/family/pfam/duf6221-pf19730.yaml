definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001065) is described by MIBiG as an example of the following biosynthetic class, polyketide. It includes a member from the herboxidiene biosynthetic gene cluster from Streptomyces chromofuscus. This family appears to be predominantly found in Actinobacteria.
