identifier: Pfam:PF10463
label: Peptidase U49
definition: >-
  This entry consists of peptidases belonging to MEROPS peptidase family U49 (Lit peptidase, clan U-). The peptidase families associated with clan U- have an unknown catalytic mechanism as the protein fold of the active site domain and the active site residues have not been reported. The Lit peptidase from Escherichia coli functions in bacterial cell death in response to infection by Enterobacteria phage T4. Following binding of Gol peptide to domains II and III of elongation factor Tu, the Lit peptidase cleaves domain I of the elongation factor. This prevents binding of guanine nucleotides, shuts down translation and leads to cell death.
