identifier: Pfam:PF27804
label: Selenoprotein GSU1558/SbtA-like
definition: >-
  Members of this protein family are small peptides found in the vicinity of a peptide modification-type radical SAM protein family, nearly always selenopeptides. Multiple members of this protein family occur in species with a selenocysteine incorporation systems and have a TGA stop codon at position that aligns with cysteine residues from other homologues. This finding strongly suggests that GSU_1558 and similar members of the family are selenopeptides. The selenocysteine insertion sequence (SECIS) finder bSECISearch finds two homologous SECIS elements for two TGA codons in the extension of GSU_1558, and multiple members of the SbtA family of more than two selenocysteine sites. It was shown that the radical SAM enzyme SbtM removes two hydrogen atoms from sites with either Sec or Cys, creating a thio(seleno)oxazole moiety.
