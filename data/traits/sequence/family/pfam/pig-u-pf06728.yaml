identifier: Pfam:PF06728
label: GPI transamidase subunit PIG-U
definition: >-
  Many eukaryotic proteins are anchored to the cell surface via glycosylphosphatidylinositol (GPI), which is posttranslationally attached to the C terminus by GPI transamidase. The mammalian GPI transamidase is a complex of at least four subunits, GPI8, GAA1, PIG-S, and PIG-T. PIG-U is thought to represent a fifth subunit in this complex and and its molecular function is likely shuttling/presenting the anchor in a productive conformation to the transamidase complex. It contains a BindGPILA domain which is thought to be responsible for recognising, binding and stabilising the GPI lipid anchor.
