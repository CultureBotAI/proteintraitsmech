identifier: Pfam:PF01785
label: Closterovirus coat protein
definition: >-
  This family consist of coat proteins from closterovirus, which belong to the Closteroviridae, which have a positive strand ssRNA genome with no DNA stage during replication. The viral coat protein encapsulates and protects the viral genome. Both the large cp1 and smaller cp2 coat protein originate from the same primary transcript. Members of the Closterovirus include Beet yellows virus (BYV) (Sugar beet yellows virus) and Grapevine leafroll-associated virus 7.
