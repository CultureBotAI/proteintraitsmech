label: Family of unknown function (DUF6230)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001774) is described by MIBiG as an example of the following biosynthetic class, other (unspecified). It includes a member from the MS-271 biosynthetic gene cluster from Streptomyces sp. This family appears to be predominantly found in Actinobacteria. Some members of this family have been identified as putative cholesterol esterases.
