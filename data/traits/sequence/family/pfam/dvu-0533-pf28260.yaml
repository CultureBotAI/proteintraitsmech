identifier: Pfam:PF28260
label: Protein DVU_0533
definition: >-
  This entry represents the Protein DVU_0533 (also known as HMC operon ORF 4) from Nitratidesulfovibrio vulgaris and related proteins. HMWC (high-molecular-weight cytochrome c), ORF2, ORF3, ORF4, ORF5 and ORF6 in the HMC operon form a transmembrane protein complex that allows electron flow from the periplasmic hydrogenase to the cytoplasmic enzymes that catalyse reduction of sulfates.
