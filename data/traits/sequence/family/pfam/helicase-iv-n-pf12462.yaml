identifier: Pfam:PF12462
label: DNA helicase IV / RNA helicase N terminal
definition: >-
  This domain is found in DNA helicase IV in bacteria. It is approximately 170 amino acids in length and is found at the N terminus of . DNA helicase IV catalyses the unwinding of duplex DNA in the 3' to 5' direction with respect to the bound single strand in a reaction that is dependent upon the hydrolysis of ATP.
