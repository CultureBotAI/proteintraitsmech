definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000219) is described by MIBiG as an example of the following biosynthetic classes, polyketide and saccharide, in particular the elloramycin biosynthetic gene cluster from Streptomyces olivaceus. This family appears to be predominantly found in Actinobacteria.
