identifier: Pfam:PF12554
label: Mitotic-spindle organizing gamma-tubulin ring associated
definition: >-
  MOZART1 or Mzt1 is a component of the gamma-tubulin complex and is required for its recruitment to the microtubule organizing centre in humans and yeast. This function is conserved in plant homologues, known as gamma-tubulin complex protein 3 (GCP3)-interacting proteins (GIPs). Studies in plant homologues GIP1 and GIP2 indicate that they play a major role in nuclear envelope shaping in both cycling and differentiated cells and that they are essential for centromere architecture.
