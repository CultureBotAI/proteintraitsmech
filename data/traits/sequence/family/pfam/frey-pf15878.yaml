identifier: Pfam:PF15878
label: Protein Frey
definition: >-
  This family represents Frey proteins, which are key regulators for male fertility expressed transiently in round spermatids where it recruits IZUMO1 at the endoplasmic reticulum (ER) membrane and coordinates the oolemmal binding multimeric complex (IZUMO1 complex) assembly. Upon complete assembly of the IZUMO1 complex, its ER retention is released, facilitating IZUMO1 complex export to the acrosome. Frey interacts with SPPL2C, which inhibits its intramembrane protease activity directly accessing the catalytic centre of an I-CLiP.
