identifier: Pfam:PF31277
label: Antimicrobial peptide damicornin
definition: >-
  This protein family includes the antimicrobial peptide damicornin from Pocillopora damicornis (the cauliflower coral), a cationic peptide with probable antimicrobial activity against coral pathogens. It is predicted to show some α helices around a central disordered region.
