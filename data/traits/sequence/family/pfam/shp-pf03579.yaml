identifier: Pfam:PF03579
label: Small hydrophobic protein
definition: >-
  The small hydrophobic integral membrane protein, SH (previously designated 1A) is found to have a variety of glycosylated forms. This protein is a component of the mature respiratory syncytial virion where it may form complexes and appears to play a structural role.
