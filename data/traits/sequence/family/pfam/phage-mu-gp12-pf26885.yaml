identifier: Pfam:PF26885
label: Bacteriophage Mu gene product 12
definition: >-
  This entry represents gene product 12 (gp12) found in Mu-like bacteriophages. Gp12 is an uncharacterised protein of 176 amino acids (19.9 kDa) that localises to the host cell cytoplasm. The protein is expressed in the early phase of the viral replicative cycle, with expression repressed by viral Repc and favoured by viral Ner protein. This entry also includes Mu prophage protein from bacteria.
