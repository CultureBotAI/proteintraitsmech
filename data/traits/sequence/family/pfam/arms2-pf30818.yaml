identifier: Pfam:PF30818
label: Age-related maculopathy susceptibility protein 2
definition: >-
  This entry represents the ARMS2 (age-related maculopathy susceptibility protein 2) family. ARMS2 is a small cytoplasmic protein of approximately 107 residues that is expressed in the retina and placenta. The protein localises to the cytoplasm rather than mitochondria. Variants in ARMS2, particularly A69S, are strongly associated with susceptibility to age-related macular degeneration, the most common cause of irreversible vision loss in the developed world. ARMS2 interacts with complement factor properdin (CFP) and hemicentin-1 (HMCN1). This family is restricted to vertebrates.
