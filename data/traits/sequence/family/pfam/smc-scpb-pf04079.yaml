identifier: Pfam:PF04079
label: Segregation and condensation complex subunit ScpB
definition: >-
  This family represents ScpB, which along with ScpA ( ) interacts with SMC in vivo forming a complex that is required for chromosome condensation and segregation. The SMC-Scp complex appears to be similar to the MukB-MukE-Muk-F complex in Escherichia coli, where MukB ( ) is the homologue of SMC. ScpA and ScpB have little sequence similarity to MukE ( ) or MukF ( ), they are predicted to be structurally similar, being predominantly α-helical with coiled coil regions.
