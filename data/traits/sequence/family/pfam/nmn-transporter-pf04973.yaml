label: Nicotinamide mononucleotide transporter
definition: >-
  PnuC is a membrane protein responsible for nicotinamide mononucleotide transport, subject to regulation by interaction with the NadR (also called NadI) protein (see ). The extreme N- and C-terminal regions are poorly conserved.
