identifier: Pfam:PF06899
label: WzyE protein, O-antigen assembly polymerase
definition: >-
  This family consists of several WzyE proteins, which may be involved in the polymerisation of enterobacterial common antigen (ECA) trisaccharide repeat units. It is required for the assembly of the phosphoglyceride-linked form of ECA (ECA(PG)) and the water-soluble cyclic form of ECA (ECA(CYC)).
