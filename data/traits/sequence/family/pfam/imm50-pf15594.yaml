identifier: Pfam:PF15594
label: Immunity protein 50
definition: >-
  This entry represents a predicted immunity protein with an all-β fold. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Tox-HHH or Ntox24 families.
