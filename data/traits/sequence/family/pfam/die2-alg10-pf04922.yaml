identifier: Pfam:PF04922
label: DIE2/ALG10 family
definition: >-
  Alg10 (asparagine-linked glycosylation) ( ) is a dolichyl-phosphoglucose-dependent glucosyltransferase which adds the terminal alpha-1,2 glucose to the lipid-linked Glc2Man9GlcNAc2 oligosaccharide. The terminal alpha-1,2-linked glucose residue is important for substrate recognition by the oligosaccharyltransferase. In Saccharomyces cerevisiae, Alg10 has a role in regulation of the expression of a myo-inositol transporter, Itr1 (hence the name Die2, standing for derepression of Itr1 expression). It also regulates the expression of Ino1, which is an inositol-3-phosphate synthase. Alg10 is homologous to human and rat potassium channel regulatory protein KCR1, which diminishes the cardiac repolarising current I(Kr) drug response.
