identifier: Pfam:PF04038
label: Dihydroneopterin aldolase
definition: >-
  This domain contains a strongly conserved YPLM motif and it is found at the C terminus of archaeal specific 7,8-dihydroneopterin aldolase (DHNA) MtpD, an enzyme involved in the synthesis of 6-hydroxymethyl-7,8-dihydropterin diphosphate (6-HMDP). 6-HMDP is the precursor of the pterin containing moiety of the essential C1-carriers tetrahydrofolate and tetrahydromethanopterin.
