identifier: Pfam:PF05392
label: Cytochrome C oxidase chain VIIB
definition: >-
  Cytochrome oxidase subunit VIIB is one of the nuclear-coded polypeptide chains of cytochrome c oxidase, the terminal oxidase in mitochondrial electron transport. The X-ray structure of azide-bound fully oxidized cytochrome c oxidase from bovine heart at 2.9 A resolution has been determined.
