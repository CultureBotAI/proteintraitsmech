identifier: Pfam:PF11561
label: Single strand annealing-weakened 1
definition: >-
  Saw1 is a structure-specific DNA binding protein with high affinity for splayed arm and 3'-flap DNAs. It is required for single-strand annealing (SSA) DNA double-strand break (DSB) repair. It recruits Rad1-Rad10 to SDSA (Synthesis-Dependent Strand Annealing) sites, but departs the repair site in advance of Rad1-Rad10.
