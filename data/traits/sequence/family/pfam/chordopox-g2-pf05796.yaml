identifier: Pfam:PF05796
label: Chordopoxvirus protein G2
definition: >-
  This entry represents Protein G2 from Vaccinia virus, also known as Late transcription elongation factor OPG087, and similar sequences from poxvirus. G2 is involved in postreplicative transcription elongation on intermediate and late genes. Most members of this family are Chordopoxvirus isatin-beta-thiosemicarbazone dependent protein (protein G2) sequences. Inactivation of the gene coding for this protein renders the virus dependent upon isatin-beta-thiosemicarbazone (IBT) for growth.
