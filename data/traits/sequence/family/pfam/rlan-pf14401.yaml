identifier: Pfam:PF14401
label: RimK-like ATPgrasp N-terminal domain
definition: >-
  An uncharacterised α+β fold domain that is mostly fused to a RimK-like ATP-grasp and is found in bacteria and euryarchaea. Proteins with this domain are almost always associated in gene neighbourhoods with a GNAT-like acetyltransferase fused to a papain-like petidase. Additionally M20-like peptidases, GCS2, 4Fe-4S Ferredoxins, a distinct metal-sulphur cluster protein and ribosomal proteins are found in the gene neighbourhoods. Contextual analysis suggests a role for these in peptide biosynthesis.
