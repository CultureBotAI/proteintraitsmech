identifier: Pfam:PF12536
label: 'Patatin phospholipase '
definition: >-
  This entry represents a domain found in bacterial proteins and it is approximately 110 amino acids in length. This domain is found in association with , localised to the C-terminal. There are two completely conserved residues (F and G) that may be functionally important. Proteins containing this domain are frequently annotated as patatin family phospholipases however there is little accompanying literature to confirm this.
