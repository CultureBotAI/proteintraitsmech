identifier: Pfam:PF07399
label: Putative Na+/H+ antiporter
definition: >-
  This family consists of several hypothetical bacterial proteins of around 440 residues in length. The function of this family is unknown. Many members carry 11 or 12 transmembrane regions, suggesting that they might be transporters. One family member, is classified by TCDB as being an NhaE type of Na+/H+ antiporter.
