identifier: Pfam:PF04026
label: SpoVG
definition: >-
  This entry represents the stage V sporulation protein G (SpoVG). It is essential for sporulation and specific to stage V sporulation in Bacillus megaterium and Bacillus subtilis. In B. subtilis, expression decreases after 30-60 minutes of cold shock.
