identifier: Pfam:PF11053
label: Terminase DNA packaging enzyme
definition: >-
  This entry represents the DNA-packaging protein Gp16 found in Enterobacteria phage T4 (Bacteriophage T4). Double-stranded DNA packaging in bacteriophages is driven by a molecular motor. The phage T4 motor is composed of the small terminase protein, Gpl6 (18kDa), the large terminase protein, Gp17 (70kDa), and the dodecameric portal protein Gp20 (61kDa). Gp16 is involved in the recognition of the viral DNA substrate, the very first step in the DNA packaging pathway, and stimulates the ATPase and packaging activities associated with Gp17. Gp16 modulates the activity of Gp17 and is required to translocate phage T4 DNA into the head.
