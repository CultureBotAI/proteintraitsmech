identifier: Pfam:PF03208
label: PRA1 family protein
definition: >-
  Prenylated Rab acceptor protein 1 (PRA1) family includes PRAF1/2/3 from mammals, Yip3 from budding yeasts and several PRA proteins from plants. In budding yeast, Yip3 interacts with members of the Rab GTPase family and may be involved in transport between the ER and Golgi complex. In humans, PRAF1 is a general Rab protein regulator required for vesicle formation from the Golgi complex. It may control vesicle docking and fusion by mediating the action of Rab GTPases to the SNARE complexes. It inhibits the removal of Rab GTPases from the membrane by GDI. PRAF2 plays a pro-apoptotic role in cerulenin-induced neuroblastoma apoptosis. PRAF3 negatively modulates SLC1A1/EAAC1 glutamate transport activity by decreasing its affinity for glutamate.
