identifier: Pfam:PF03898
label: Satellite tobacco necrosis virus coat protein
definition: >-
  This entry represents coat proteins found in several satellite viruses, including satellite panicum mosaic virus, satellite tobacco necrosis virus, and satellite St. Augustine decline virus. The coat proteins of satellite viruses consist of a β-sandwich jelly-roll fold, with usually eight strands making up the two sheets, although some members can have an extra 1-2 strands. The characteristic interaction between the domains of this fold allows the formation of five-fold and pseudo six-fold assemblies. Although the satellite virus coat proteins share the same jelly-roll fold, they differ in the arrangement of their secondary structural elements and in the interactions of adjacent subunits.
