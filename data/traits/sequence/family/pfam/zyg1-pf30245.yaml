identifier: Pfam:PF30245
label: Zygote formation protein zyg1
definition: >-
  This entry represents the zygote formation protein zyg1 family, originally identified in the slime mould Dictyostelium mucoroides. These proteins play an essential role in zygote formation by inducing sexual cell fusion. ZYG1 expression lasts until zygotes are formed and is regulated by ethylene. Overexpression leads to formation of giant multinucleate cells surrounded by normal-sized cells.
