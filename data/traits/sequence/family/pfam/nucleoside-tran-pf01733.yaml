identifier: Pfam:PF01733
label: Nucleoside transporter
definition: >-
  Nucleosides are hydrophilic molecules and require specialised transport proteins for permeation of cell membranes. There are two types of nucleoside transport processes: equilibrative bidirectional processes driven by chemical gradients and inwardly directed concentrative processes driven by an electrochemical gradient. The two types of nucleoside transporters are classified into two families: the solute carrier (SLC) 29 and SLC28 families, corresponding to equilibrative and concentrative nucleoside transporters, respectively. Equilibrative nucleoside transporters (ENTs) are integral membrane proteins which enable the movement of hydrophilic nucleosides and nucleoside analogues down their concentration gradients across cell membranes. ENT family members have been identified in humans, mice, fish, tunicates, slime molds, and bacteria. This entry also includes ENT from Plasmodium falciparum, which shares low sequence identity with the human ENT1 (hENT1) and is unsusceptible to hENT1 inhibitor, therefore, it is a good candidate to design inhibitors to disrupt the transport activity of PfENT1 and prevent the proliferation of parasites.
