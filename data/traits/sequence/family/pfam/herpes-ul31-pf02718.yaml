identifier: Pfam:PF02718
label: Herpesvirus UL31-like protein
definition: >-
  During primary envelopment Human herpesvirus 1 (HHV-1, HSV-1) nucleocapsids translocate from the nucleus to the cytoplasm. Lining the inside of the INM is the nuclear lamina, which is composed of a meshwork of proteins with spaces too small for the capsid to move through without some disruption of the lamina. The lamina is mainly made up of lamin A/C and lamin B proteins, with smaller amounts of other proteins also present; this lamina must be disrupted before the nucleocapsids can egress. This entry includes Herpesvirus UL31 protein, also known as nuclear egress protein 1 (NEC1). Within the host nucleus, NEC1 interacts with the newly formed capsid and directs it to the inner nuclear membrane by associating with nuclear egress protein 2 (UL34 or NEC2). The NEC1/NEC2 complex, known as the nuclear egress complex (NEC), induces the budding of the capsid at the inner nuclear membrane and its envelopment into the perinuclear space, where the complex promotes the fusion of the enveloped capsid with the outer nuclear membrane and the subsequent release of the viral capsid into the cytoplasm.
