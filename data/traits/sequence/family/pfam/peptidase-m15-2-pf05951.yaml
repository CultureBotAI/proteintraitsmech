identifier: Pfam:PF05951
label: Peptidoglycan L,D-endopeptidase MepK
definition: >-
  This entry (previously DUF882) represents MepK and related proteins in bacteria. Some MepK proteins contain the TAT conserved site ( ). These proteins contain a similar fold to the zinc-binding motif in bacterial D-alanyl-D-alanine carboxypeptidases (DD-peptidases). Peptidoglycan L,D-endopeptidase MepK cleaves meso-diaminopimelic acid (mDAP)-mDAP cross-links in peptidoglycan. It acts in conjunction with other elongation-specific D, D-endopeptidases to create space for the efficient incorporation of nascent peptidoglycan strands into the sacculus, thereby enabling cell wall expansion. In vitro, MepK can cleave mDAP cross-links in both soluble muropeptides and intact peptidoglycan sacculi. It also displays weak D, D-endopeptidase activity.
