identifier: Pfam:PF01639
label: Viral family 110
definition: >-
  This entry represents a family of proteins specific to the African swine fever virus (ASFV) known as the 110 family. Proteins in this group are responsible for the redistribution of lumenal ER protein to an enlarged ERGIC compartment. They contain a central cysteine rich region with eight conserved cysteines. Some proteins in this entry contain two copies of the cysteine rich region (e.g. ).
