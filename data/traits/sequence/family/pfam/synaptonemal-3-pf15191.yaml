identifier: Pfam:PF15191
label: Synaptonemal complex central element protein 3
definition: >-
  Synaptonemal complex central element protein 3 (SYCE3), also known as testis-specific expressed gene 2, is a major component of the transverse central element (CE) of meiosis-specific synaptonemal complexes. SYCE3 enables chromosome loading of the other CE-specific proteins, which in turn promotes synapsis between homologous chromosomes. SYCE3 may participate in the apoptosis of spermatogenic cells and the pathogenesis of cryptorchidism.
