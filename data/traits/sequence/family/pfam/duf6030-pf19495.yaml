definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000762) is described by MIBiG as an example of the following biosynthetic class, saccharide. This family includes a protein from the exopolysaccharide biosynthetic gene cluster from Rhizobium leguminosarum bv. viciae and appears to be predominantly found in proteobacteria.
