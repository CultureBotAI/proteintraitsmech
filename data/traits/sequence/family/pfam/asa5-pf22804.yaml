identifier: Pfam:PF22804
label: F1F0 ATP synthase subunit ASA5
definition: >-
  This entry represents the homologues of mitochondrial F1F0 ATP synthase subunit ASA5. F0 has six transmembrane helices and four long, membrane-intrinsic helices, which form the two helical hairpins of the conserved alpha subunit. Of the six transmembrane helices, two belong to ASA6 and one each to ASA5, ASA8, ASA9, and ASA10.
