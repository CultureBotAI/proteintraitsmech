identifier: Pfam:PF11041
label: Bacteriophage baseplate wedge 1 protein
definition: >-
  This entry, previously known as DUF2612, includes the baseplate wedge 1 protein of bacteriophage PhiTE that infects the plant pathogen Pectobacterium atrosepticum. Wedge 1 is a component of the wedge complex that comprises six lobed protomeric units in the baseplate. Each protomer contains a single copy of wedge 1 protein, two copies of wedge 2 protein in alternate conformations, and a singular IG-like protein referred to as the spacer. Wedge 1 forms the bulk of the wedge structure along with wedge 2, constituting the canonical trifurcation unit that acts as a coordination platform, adhering wedge 1 and 2 proteins into a continuous ring. The short tail fibre (STF) attaches to wedge 1 monomers through its N-terminal loops that form a globular joint, making electrostatic and hydrophobic interactions. Wedge 1 also forms a putative disulphide bond with the sheath initiator (SI) protein (Wedge1:C143, SI:C143) that may serve as a pivoting point to transduce signals associated with receptor binding.
