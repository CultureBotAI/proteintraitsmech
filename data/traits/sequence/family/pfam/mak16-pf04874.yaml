identifier: Pfam:PF04874
label: Mak16 protein C-terminal region
definition: >-
  In budding yeasts, Mak16 forms part of the 66S pre-ribosomal particles and functions as a transacting actor involved in rRNA processing. The Schistosoma mansoni (Blood fluke) Mak16 has been shown to target protein transport to the nucleolus.
