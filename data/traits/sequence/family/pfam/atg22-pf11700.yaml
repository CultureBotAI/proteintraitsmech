identifier: Pfam:PF11700
label: Vacuole effluxer Atg22 like
definition: >-
  Autophagy is a major survival mechanism in which eukaryotes recycle cellular nutrients during stress conditions. Atg22, Avt3 and Avt4 are partially redundant vacuolar effluxers, which mediate the efflux of leucine and other amino acids resulting from autophagy. This family also includes other transporter proteins.
