identifier: Pfam:PF05493
label: 'ATP synthase subunit H '
definition: >-
  Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP. V-ATPases (also known as V1V0-ATPase or vacuolar ATPase) are found in the eukaryotic endomembrane system, and in the plasma membrane of prokaryotes and certain specialised eukaryotic cells. V-ATPases hydrolyse ATP to drive a proton pump, and are involved in a variety of vital intra-and inter-cellular processes such as receptor mediated endocytosis, protein trafficking, active transport of metabolites, homeostasis and neurotransmitter release. V-ATPases are composed of two linked complexes: the V1 complex (subunits A-H) contains the catalytic core that hydrolyses ATP, while the V0 complex (subunits a, c, c', c'', d) forms the membrane-spanning pore. V-ATPases may have an additional role in membrane fusion through binding to t-SNARE proteins. This entry represents subunit e (or subunit M9.2) found in the V0 complex of certain V-ATPases. The V0 complex contains subunit c (proton-conducting pore), as well as accessory subunits that function in assembly, targeting or regulation of the V-ATPase complex. Subunit e is an extremely hydrophobic protein of approximately 9kDa, which may be required for assembly of vacuolar ATPases. The amino terminal domain of subunit E interacts with the H subunit and is required fo V-ATPase function. Different isoforms of this subunit exist sometimes annotated as e1 and e2 also a neuron-specific isoform, NM9.2 has been identified.
