identifier: Pfam:PF03194
label: LUC7 N_terminus
definition: >-
  This family consists of several Luc7 protein homologues that are restricted to eukaryotes. In budding yeast, Luc7 is an essential subunit of the yeast U1 snRNP, which forms the spliceosomal commitment complex with other proteins that targets pre-mRNA to the splicing pathway. Its N-terminal zinc finger has been found to bind pre-mRNA. This entry also contains human and mouse Luc7 like (LUC7L) proteins.
