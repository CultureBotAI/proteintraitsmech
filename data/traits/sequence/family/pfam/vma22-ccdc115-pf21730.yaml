identifier: Pfam:PF21730
label: Vma22/CCDC115
definition: >-
  This entry includes Vma22 from yeasts and CCDC115 from animals. Vma22 is an endoplasmic reticulum-associated protein required for V-ATPase activity. CCDC115 is an accessory component of the proton-transporting vacuolar (V)-ATPase protein pump involved in intracellular iron homeostasis. Mutations of CCDC115 have been found in patients affected by congenital disorders of glycosylation.
