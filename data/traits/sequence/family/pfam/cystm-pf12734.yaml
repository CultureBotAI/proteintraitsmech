identifier: Pfam:PF12734
label: Cysteine-rich TM module stress tolerance
definition: >-
  Proteins containing CYSTM domain are short cysteine-rich membrane proteins that most probably dimerise together to form a transmembrane sulfhydryl-lined pore. The CYSTM domain is always present at the extreme -terminus of the protein in which it is present. Furthermore, like the yeast prototypes, the majority of the proteins also possess a proline/glutamine-rich segment upstream of the CYSTM domain that is likely to form a polar, disordered head in the cytoplasm. The presence of an atypical well-conserved acidic residue at the C-terminal end of the TM helix suggests that this might interact with a positively charged moiety in the lipid head group. Consistently across the eukaryotes, the different versions of the CYSTM domain appear to have roles in stress-response or stress-tolerance, and, more specifically, in resistance to deleterious substances, implying that these might be general functions of the whole family. This entry also includes Protein CADMIUM TOLERANCE 1-5 from rice, which confers resistance to heavy metal ions such as cadmium and copper.
