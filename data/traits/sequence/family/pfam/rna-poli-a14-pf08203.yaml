identifier: Pfam:PF08203
label: Yeast RNA polymerase I subunit RPA14
definition: >-
  Saccharomyces cerevisiae RNA polymerase I (Pol I) is a complex consisting of 14 subunits. Subunit Rpa14 forms part of a Pol I subcomplex consisting of Rpa14 and and Rpa43. The Rpa14 and Rpa43 heterodimer is proposed to play a role in the recruitment of Pol I to the promoter. This protein contains a HRDC domain homologous to that found in archaeal RNAP subunit F and RPB4 from eukaryotes.
