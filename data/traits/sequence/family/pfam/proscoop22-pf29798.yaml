identifier: Pfam:PF29798
label: Serine rich endogenous peptide 22
definition: >-
  This entry represents the serine rich endogenous peptide 2 (PROSCOOP22) family found in Brassicaceae. These are plant endogenous peptides released into the apoplast and perceived by the MIK2 receptor in a BAK1/SERK3 and SERK4 coreceptor-dependent manner. The peptides modulate physiological and antimicrobial processes including growth prevention and reactive oxygen species response regulation.
