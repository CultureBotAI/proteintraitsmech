identifier: Pfam:PF11027
label: Protein of unknown function (DUF2615)
definition: >-
  This entry represents Small integral membrane protein 14 (Smim-14) proteins found in animals. The function of this protein has not been characterised. Smim-14 is predicted to act upstream of or within blastocyst hatching and to be located in the endoplasmic reticulum membrane.
