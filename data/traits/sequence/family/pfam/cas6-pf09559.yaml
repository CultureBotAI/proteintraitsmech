identifier: Pfam:PF09559
label: Cas6 Crispr
definition: >-
  Members of this entry are designated type I-MYXAN CRISPR-associated protein Cas6/Cmx6 and resemble the Cas6 proteins described by in having a C-terminal motif GXGXXXXXGXG, where the single X of each GXG is hydrophobic and the spacer XXXXX has at least one Lys or Arg. Examples are found in cas gene operons of CRISPR regions in Anabaena variabilis (strain ATCC 29413/PCC 7937), Leptospira interrogans, Gemmata obscuriglobus UQM 2246, and twice in Myxococcus xanthus (strain DK 1622). Oddly, an orphan member is found in Thiobacillus denitrificans (strain ATCC 25259), whose genome does not seem to contain other evidence of CRISPR repeats or cas genes. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
