identifier: Pfam:PF15168
label: Triple QxxK/R motif-containing protein family
definition: >-
  TRIQK is a small protein family that is conserved across vertebrates. It is named after the characteristic triple repeat of the sequence QXXK/R that is shared by all family members. The proteins are localised to the endoplasmic reticulum membrane. They may play a role in cell growth and the maintenance of cell morphology.
