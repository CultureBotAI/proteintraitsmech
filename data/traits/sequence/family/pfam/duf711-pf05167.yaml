identifier: Pfam:PF05167
label: Uncharacterised ACR (DUF711)
definition: >-
  The proteins in this family are functionally uncharacterised. The proteins are around 450 amino acids long and includes Streptococcus pneumoniae Sp0239 ( ) and similar uncharacterised proteins. Sp0239 is structurally similar to ribonucleotide reductase (RNR) and pyruvate formate lyase (PFL), which are believed to have diverged from a common ancestor. RNR and PFL possess a ten-stranded α/β barrel domain that hosts the active site, and are radical enzymes. RNRs are found in all organisms and provide the only mechanism by which nucleotides are converted to deoxynucleotides. PFL is an essential enzyme in anaerobic bacteria that catalyses the conversion of pyruvate and CoA to acteylCoA and formate.
