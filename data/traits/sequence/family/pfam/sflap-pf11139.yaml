identifier: Pfam:PF11139
label: Sap, sulfolipid-1-addressing protein
definition: >-
  This entry includes glycolipid exporters form bacteria and archaea, including peptidoglycolipid exporter Gap from Mycobacterium smegmatis and Sulfolipid-1 exporter Sap from Mycobacterium tuberculosis. Sap is required for the transport across the inner membrane of sulfolipid-1 (SL-1), which is a major cell wall lipid of pathogenic mycobacteria. Gap is required for the transport of peptidoglycolipids (GPLs) to the cell surface.
