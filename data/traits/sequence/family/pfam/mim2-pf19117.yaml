identifier: Pfam:PF19117
label: Mitochondrial import 2
definition: >-
  Mim2 is part of the Mim1/Mim2 complex, which is specific to fungi. This complex is responsible for the assembly and/or insertion of a subset of mitochondrial outer membrane proteins, including subunits of the main mitochondrial outer membrane translocase.
