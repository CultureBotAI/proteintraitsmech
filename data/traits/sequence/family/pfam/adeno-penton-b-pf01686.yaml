identifier: Pfam:PF01686
label: Adenovirus penton base protein
definition: >-
  This family consists of various adenovirus penton base proteins (also known as Protein III), from both the mastadenoviridae having mammalian hosts and the aviadenoviridae having avian hosts. The penton base is a major structural protein forming part of the penton which consists of a base and a fibre, the pentons hold a morphologically prominent position at the vertex capsomer in the adenovirus particle. In mammalian adenovirus there is only one tail on each base where as in avian adenovirus there are two. The penton base proteins are also Involved in virus secondary attachment to host cell after initial attachment by the fibre protein.
