identifier: Pfam:PF10503
label: Esterase PHB depolymerase
definition: >-
  This entry describes a group of lipases, including bacterial depolymerases for poly(3-hydroxybutyrate) (PHB) and related polyhydroxyalkanoates (PHA), as well as acetyl xylan esterases, and feruloyl esterases from fungi. Putative esterase NocK from Nocardia uniformis also belongs to this protein family. This protein is part of the biosynthetic gene cluster for the beta-lactam antibiotic nocardicin A but its specific role is unknown.
