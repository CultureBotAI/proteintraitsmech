identifier: Pfam:PF03566
label: Peptidase family A21
definition: >-
  The asparagine endopeptidases are all autocatalytic endopeptidases utilizing Asn at position P1. Cleavage occurs as a consequence of cyclization of the Asn residue. This group of peptidases belongs to the MEROPS family N2 (clan NA). In the Nudaurelia capensis omega virus capsid protein the residues that form the catalytic dyad in the active site are Glu103 and Asn570. The cleavage mediated by the enzyme is an autolytic one, and the catalytic Asn is also the P1 residue in the cleavage site, Asn570-|-Phe571 releasing a 74-residue fragment from the C terminus of the coat protein. This cleavage occurs during the late stages of virion assembly. Heterologous expression of the coat protein gene of tetravirus in a baculovirus system results in the spontaneous assembly of virus-like particles (VLPs) that remain uncleaved when purified at neutral pH.
