identifier: Pfam:PF19842
label: YqeC protein
definition: >-
  This uncharacterised protein family includes YqeC from Escherichia coli. A phylogenetic profiling analysis shows correlation with SelD, the selenium donor protein, even in species where SelD contributes to neither selenocysteine nor selenouridine biosynthesis. Instead, this family appears to mark a selenium-dependent molybdenum hydroxylase maturation system.
