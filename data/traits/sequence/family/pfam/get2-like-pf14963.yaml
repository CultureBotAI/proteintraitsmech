identifier: Pfam:PF14963
label: Get2-like
definition: >-
  This entry represents the Guided entry of tail-anchored proteins factor CAMLG (also known as Calcium signal-modulating cyclophilin ligand CAML) which is required for the post-translational delivery of tail-anchored (TA) proteins to the endoplasmic reticulum. Together with GET1/WRB, acts as a membrane receptor for soluble GET3/TRC40, which recognizes and selectively binds the transmembrane domain of TA proteins in the cytosol. It is required for the stability of GET1. CAMLG also stimulates calcium signaling in T cells through its involvement in elevation of intracellular calcium, and it is essential for the survival of peripheral follicular B cells.
