identifier: Pfam:PF24178
label: Lasso peptide subterisin
definition: >-
  This family consists of both the leader (removed) and core (mature) portions of precursor peptides from the benenodin family of lasso peptides, found in proteobacteria. Lasso peptide benenodin-1 exhibits conformational switching between two distinct threaded conformers upon actuation by heat. This thermally induced conformational switching of benenodin-1 may be relevant to its biological function. Lasso peptides are a class of ribosomally synthesised and post-translationally modified peptides (RiPPs). Up to date, they have been only isolated from proteo- and actinobacterial sources. Typically, lasso peptide biosynthetic gene clusters encode enzymes for biosynthesis and export but not for tailoring. A wide range of interesting biological activities are known for these RiPPs, including antimicrobial, enzyme inhibitory, and receptor antagonistic activities. Generally, all known lasso peptides carry a Gly, Ala, Cys, or Ser residue at position 1 and a ring-forming Glu or Asp residue at positions 7-9. Their respective processing enzymes are highly specific for the nature and location of these residues.
