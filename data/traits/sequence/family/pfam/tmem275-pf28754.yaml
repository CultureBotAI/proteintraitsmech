identifier: Pfam:PF28754
label: Transmembrane protein 275
definition: >-
  This entry represents transmembrane protein 275 (TMEM275), a small membrane protein of approximately 177 amino acids found in vertebrates. TMEM275 is a multi-pass membrane protein containing two predicted transmembrane helical domains. The protein has a disordered N-terminal region and contains regions of low complexity. In humans, TMEM275 is expressed in male germ line stem cells in testis and 21 other cell types or tissues, whilst in mice it is expressed in the superior frontal gyrus and other tissues. The protein family is conserved across vertebrates including mammals, birds, reptiles, and fish. The function of this protein remains to be determined.
