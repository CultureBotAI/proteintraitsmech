label: Family of unknown function (DUF6247)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000345) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide. It includes a member from the eponemycin biosynthetic gene cluster from Streptomyces hygroscopicus. This family appears to be predominantly found in Actinobacteria.
