identifier: Pfam:PF28195
label: Plant pathogen avirulence protein
definition: >-
  This family of proteins includes members that are involved in the interaction between plant pathogens and their host plants. The proteins in this family are typically secreted by bacterial pathogens and can function as avirulence factors. These factors are recognized by the plant immune system, leading to the activation of plant defense responses. The recognition of avirulence proteins by specific resistance proteins in the plant triggers a hypersensitive response, which is a form of programmed cell death in plants that restricts the spread of the pathogen. The detailed mechanisms of action and the specific targets of these avirulence proteins within the host plants may vary among family members.
