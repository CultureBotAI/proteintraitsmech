identifier: Pfam:PF15102
label: TMEM154 protein family
definition: >-
  The function of this family of transmembrane proteins has not, as yet, been determined. However, it is thought to be a therapeutic target for ovine lentivirus infection. This family of proteins is found in eukaryotes and members are typically between 138 and 320 amino acids in length.
