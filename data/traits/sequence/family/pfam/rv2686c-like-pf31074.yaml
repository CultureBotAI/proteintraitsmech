identifier: Pfam:PF31074
label: Fluoroquinolones export permease protein Rv2686c-like
definition: >-
  This protein family includes Fluoroquinolones export permease protein Rv2686c from Mycobacterium tuberculosis and similar proteins found in bacteria. Rv2686c is part of the ABC transporter complex Rv2686c/Rv2687c/Rv2688c involved in fluoroquinolones export. It confers resistance to ciprofloxacin and, to a lesser extent, norfloxacin, moxifloxacin and sparfloxacin. It is probably responsible for the translocation of the substrate across the membrane.
