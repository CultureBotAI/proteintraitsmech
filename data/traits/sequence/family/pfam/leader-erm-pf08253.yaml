identifier: Pfam:PF08253
label: 'Erm Leader peptide '
definition: >-
  These short proteins are leader peptides (15-19 amino acids) of erm genes that code for resistance determinants in Staphylococcus aureus and related proteins from bacilli, including 23S rRNA methylase leader peptide (ErmC), which is involved in the control mechanism of the synthesis of the erythromycin resistance protein.
