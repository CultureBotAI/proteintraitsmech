identifier: Pfam:PF28119
label: Transposon-encoded protein TnpC-like
definition: >-
  This entry represents the transposon-encoded protein TnpC from Pseudomonas putida and related proteins found in beta- and gammaproteobacteria. TnpC downregulates the expression of transposase TnpA and interferes with its regulation at the post-transcriptional level.
