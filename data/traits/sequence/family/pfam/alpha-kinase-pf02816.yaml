identifier: Pfam:PF02816
label: Alpha-kinase family
definition: >-
  This entry represents a protein kinase catalytic domain with no detectable similarity to conventional kinases that is found in eukaryotic alpha-kinases. This domain is shared by EF-2 kinase and the myosin heavy chain kinase A (MHCK A). As in classical kinase, this domain consists of two lobes that bind nucleotide at the interface between them. The N-terminal lobe is very similar in structure to that of classical protein kinases, whereas its C-terminal lobe resembles that of ATP-grasp proteins more closely. A conserved C-terminal glycine rich motif which locates in the region that corresponds to the activation loop of classical kinases is essential for the enzymatic activity.
