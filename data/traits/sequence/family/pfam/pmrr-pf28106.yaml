identifier: Pfam:PF28106
label: LpxT activity modulator PmrR
definition: >-
  This entry represents the PrmR protein ( ), from E.coli and related proteins from Enterobacteria. PrmR is an extremely small hydrophobic protein of 29 amino acids in length that controls the modification of the lipid A indirectly. It localises to the inner membrane and interacts with LpxT hindering LpxT-mediated modification of lipid A.
