identifier: Pfam:PF23804
label: Family of unknown function (DUF7179)
definition: >-
  This entry represents an uncharacterised protein domain found in phage, predominantly those infecting bacteria in the Enterobacteriaceae family such as Escherichia, Salmonella, Klebsiella and Vibrio. The protein is typically around 80 to 100 amino acids in length. In some phage the protein contains a predicted central coiled-coil region. The function of this protein family is currently unknown.
