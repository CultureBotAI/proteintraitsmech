identifier: Pfam:PF15601
label: Immunity protein 70
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and conserved tyrosine and tryptophan residues. Proteins in this entry are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, which usually contains toxin domains of the Tox-REase-10 family.
