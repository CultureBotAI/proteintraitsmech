identifier: Pfam:PF09771
label: Transmembrane protein 188
definition: >-
  Nuclear envelope phosphatase 1-regulatory subunit 1 (NEP1-R1), formerly known as TMEM188, functions in the lipin activation pathway. NEP1R1 forms a complex with the phosphatase CTDNEP1. The complex dephosphorylates and may activate phosphatidate phosphatases Lipin-1 and -2, which catalyse the conversion of phosphatidic acid to diacylglycerol.
