identifier: Pfam:PF30161
label: YnfN protein family
definition: >-
  This entry represents a group of uncharacterised proteins from enterobacterales, including YnfN from Escherichia coli, a 51 amino acid uncharacterised protein. The gene encoding this protein is transiently induced by cold shock. The function of this protein remains to be determined.
