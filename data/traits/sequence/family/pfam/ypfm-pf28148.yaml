identifier: Pfam:PF28148
label: YpfM-like
definition: >-
  Members of this family average just 19 amino acids in length, but are widely conserved among species of Enterobacterales, including the uncharacterised protein YpfM from Escherichia coli ( ). The broad conservation of the coding region across multiple species and protein-like pattern of amino acid substitutions in multiple sequence alignments strongly suggests that that members of this family are indeed translated into functional proteins.
