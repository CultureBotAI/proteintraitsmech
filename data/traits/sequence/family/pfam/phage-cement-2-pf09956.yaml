identifier: Pfam:PF09956
label: Phage cement protein
definition: >-
  This entry represents a large family of phage proteins. These proteins form a trimeric arrangement which stabilises the phage capsid. The proteins have what is known as a β-tulip fold. This entry is represented by Bacteriophage VT1-Sakai, H0018. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches.
