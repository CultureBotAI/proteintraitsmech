identifier: Pfam:PF05795
label: Plasmodium vivax Vir protein
definition: >-
  This family consists of several Vir proteins specific to the genus Plasmodium and Plasmodium vivax in particular. The vir genes are present at about 600-1,000 copies per haploid genome and encode proteins that are immunovariant in natural infections, indicating that they may have a functional role in establishing chronic infection through antigenic variation.
