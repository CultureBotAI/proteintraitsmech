identifier: Pfam:PF15035
label: Ciliary rootlet component, centrosome cohesion
definition: >-
  This is a coiled-coil domain found in rootletin (also known as Ciliary rootlet coiled-coil protein, CROCC), CROCC2, the centrosome-associated protein CEP250 and related sequences, involved in centrosome cohesion. Rootletin is the major structural component of the ciliary rootlet, a cytoskeletal-like structure in ciliated cells which originates from the basal body at the proximal end of a cilium and extends proximally toward the cell nucleus. It is required for the correct positioning of the cilium basal body relative to the cell nucleus, to allow for ciliogenesis and contributes to centrosome cohesion before mitosis. CEP250 (also known as C-Nap1) is a Nek2-interacting protein localised at centrosomes during interphase and has been implicated in the cell-cycle regulated cohesion of microtubule-organizing centers. It recruits CCDC102B to the proximal ends of centrioles.
