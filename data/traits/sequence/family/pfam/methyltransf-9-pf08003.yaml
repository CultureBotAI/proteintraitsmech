identifier: Pfam:PF08003
label: Protein of unknown function (DUF1698)
definition: >-
  Proteins in this entry include bacterial tRNA U34 carboxymethyltransferases and some methyltransferases from soil and rhizosphere bacteria. tRNA U34 carboxymethyltransferase ComB catalyses the conversion of 5-hydroxyuridine (ho5U) to uridine-5-oxyacetic acid (cmo5U) at the wobble position (34) of tRNA. cmo5U is a modified nucleoside that is apparently necessary for the efficient decoding of G-ending Pro, Ala, and Val codons in these organisms.
