identifier: Pfam:PF02937
label: Cytochrome c oxidase subunit VIc
definition: >-
  Cytochrome c oxidase (CcO; ), a 13 subunit complex, is the terminal oxidase in the mitochondrial electron transport chain. Cytochrome c oxidase is the component of the respiratory chain that catalyses the reduction of oxygen to water. This entry contains of cytochrome c oxidase subunit VIc (also known as Cytochrome c oxidase subunit 6C), which is found only in eukaryotes and its specific function remains unclear. It has been reported that the relative concentrations of some nuclear encoded CcO subunits, including subunit VIc, compared to those of the mitochondrial encoded subunits, are altered significantly during the progression of prostate cancer. This entry also includes Dictyostelium cytochrome c oxidase VIIs (also known as Cytochrome c oxidase subunit 7s), an alternative subunit VII isoform produced under hypoxia.
