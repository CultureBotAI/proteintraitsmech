identifier: Pfam:PF28504
label: Gramillins biosynthetic cluster protein GRA5
definition: >-
  This entry represents the GRA5 protein family, found in fungal gramillins biosynthetic gene clusters. The gramillins biosynthetic cluster mediates the production of gramillins A and B, which are bicyclic lipopeptides that induce cell death in maize leaves but not in wheat leaves. This biosynthetic pathway involves multiple enzymes including nonribosomal peptide synthetases, cytochrome P450 monooxygenases, oxidoreductases, and aminotransferases that work together to produce these virulence factors. Members of this family are part of secondary metabolite gene clusters involved in mycotoxin biosynthesis. The specific function of this protein within the gramillins biosynthetic pathway remains to be determined.
