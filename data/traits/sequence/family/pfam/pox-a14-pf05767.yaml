identifier: Pfam:PF05767
label: Poxvirus virion envelope protein A14
definition: >-
  This entry represents Protein A14 from Vaccinia virus, also known as Virion membrane protein OPG140, and similar sequences from poxvirus. A14 is a component of the virion membrane and has been found to be an H1 phosphatase substrate in vivo and in vitro . A14 is hyperphosphorylated on serine residues in the absence of H1 expression.
