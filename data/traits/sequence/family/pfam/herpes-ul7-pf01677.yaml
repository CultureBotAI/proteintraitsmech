identifier: Pfam:PF01677
label: Herpesvirus UL7 like
definition: >-
  This family consists of various functionally undefined proteins from the herpesviridae and UL7 from Bovine herpesvirus 1. UL7 is not essential for virus replication in cell culture, and is found localized in the cytoplasm of infected cells accumulated around the nucleus but could not be detected in purified virions. Members of the herpesviridae have a dsDNA genome and do not have a RNA stage during there replication. This entry also includes cytoplasmic envelopment protein 1 (or UL103) which is important for the final step of tegumentation, envelope acquisition and egress of virus particles out of the cytoplasm.
