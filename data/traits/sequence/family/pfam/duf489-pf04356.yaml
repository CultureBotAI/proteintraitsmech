identifier: Pfam:PF04356
label: Protein of unknown function (DUF489)
definition: >-
  When bacteriophage lambda infects to the Escherichia coli cell, it undergoes either lytic growth or lysogenization. The lambda CII protein is a key determinant in the lysis-lysogeny decision. Escherichia coli HflD is a factor that may sequesters CII from the target promoters and recruits it to the membrane where the FtsH protease is localized.
