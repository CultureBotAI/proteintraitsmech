identifier: Pfam:PF01554
label: MatE
definition: >-
  In general, proteins from the MATE family are involved in exporting metabolites across the cell membrane and are often responsible for multidrug resistance (MDR). These proteins mediate resistance to a wide range of cationic dyes, fluroquinolones, aminoglycosides and other structurally diverse antibodies and drugs. MATE proteins are found in bacteria, archaea and eukaryotes. These proteins are predicted to have 12 α-helical transmembrane regions, some of the animal proteins may have an additional C-terminal helix.
