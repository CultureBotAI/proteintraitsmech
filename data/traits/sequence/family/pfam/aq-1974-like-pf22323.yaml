identifier: Pfam:PF22323
label: Uncharacterised protein aq_1974-like
definition: >-
  This protein family includes the uncharacterised protein Aq_1974 from Aquifex aeolicus and similar sequences from Aquificales. This protein has a tryptophan content five times the average. Its structure is mainly α-helical with a small two-stranded β-sheet forming a fold named 'Aromatic Claw'.
