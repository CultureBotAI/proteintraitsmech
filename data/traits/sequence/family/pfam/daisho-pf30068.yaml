identifier: Pfam:PF30068
label: Daisho antimicrobial peptide
definition: >-
  This entry represents the Daisho antimicrobial peptide family found in Drosophila species. These small secreted peptides play a role in the humoral immune response against a subset of filamentous fungi, including Fusarium oxysporum and Fusarium verticillioides. The peptides are expressed as precursors with signal sequences and are processed to mature forms. They are induced by bacterial and fungal infection and are found in the hemolymph. The name 'Daisho' refers to the Japanese term for a matched pair of samurai swords and reflects the paired role of Dso1 and Dso2 peptides in antifungal defence. The family is found in Diptera, particularly within the Drosophilidae.
