identifier: Pfam:PF05844
label: YopD protein
definition: >-
  This family consists of several bacterial YopD like proteins. Virulent Yersinia species harbour a common plasmid that encodes essential virulence determinants (Yersinia outer proteins [Yops]), which are regulated by the extracellular stimuli Ca 2+ and temperature. YopD, also known as Type 3 secretion system translocon protein SctB, is inserted into the host membrane where it contributes to the formation of a pore and allows the translocation of effector proteins into the cytosol of target cells. It contains an amphipathic α-helix in its C terminus.
