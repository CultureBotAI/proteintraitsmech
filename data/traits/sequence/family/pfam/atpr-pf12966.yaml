identifier: Pfam:PF12966
label: 'N-ATPase, AtpR subunit '
definition: >-
  Membrane protein with three predicted transmembrane segments, two of which contain conserved Arg residues. AtpR genes are found in the N-ATPase (archaeal-type F1-Fo-ATPase) operons and are predicted to interact with the conserved Glu/Asp residues in the c subunits, regulating the assembly and/or function of the membrane-embedded ring of 'c' (proteolipid) subunits. This entry also includes AtpR like proteins found in bacteria. Some of them have been annotated as ATP synthase protein I (atpI). However, their function still need to be verified.
