identifier: Pfam:PF28245
label: PT dipeptide repeat lipoprotein
definition: >-
  This entry represents a group of uncharacterised proteins found in proteobacteria. Members of this group show an N-terminal lipoprotein signal peptide, followed by a variable length stretch of Pro-Thr dipeptide repeats or a related Pro-rich region and the non-repetitive domain.
