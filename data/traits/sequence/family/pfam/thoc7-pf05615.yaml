identifier: Pfam:PF05615
label: Tho complex subunit 7
definition: >-
  The THO complex (THOC) is involved in transcription elongation and mRNA export from the nucleus. This entry represents the subunit THOC7, which is found in higher eukaryotes, and the non-homologous subunit Mft1 found in yeast. Mft1 is a component the THO subcomplex of the TREX complex, which operates in coupling transcription elongation to mRNA export. The THO complex is recruited to transcribed genes and moves along the gene with the elongating polymerase during transcription. THO is important for stabilising nascent RNA in the RNA polymerase II elongation complex by preventing formation of DNA:RNA hybrids behind the elongating polymerase. It functions in cotranscriptional formation of an export-competent messenger ribonucleoprotein particle (mRNP) by facilitating the loading of ATP-dependent RNA helicase Sub2 and the mRNA export factor Yra1 along the nascent mRNA.
