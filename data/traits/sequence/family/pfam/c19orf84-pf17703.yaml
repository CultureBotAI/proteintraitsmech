identifier: Pfam:PF17703
label: piRNA-mediated silencing protein C19orf84
definition: >-
  This entry, previously known as DUF5549, represents the piRNA-mediated silencing protein C19orf84 and related proteins found in mammals. C19orf84 is essential for orchestrating piRNA-directed DNA methylation. C19orf84 interacts with SPOCD1 and mediates the in vivo association of SPOCD1 with the de novo methylation machinery. DNMT3C, the DNA methyltransferase responsible for transposon methylation, associates with SPOCD1 and C19ORF84.
