identifier: Pfam:PF10709
label: Protein YebY
definition: >-
  This protein family, formerly known as DUF2511, includes Protein YebY from Escherichia coli and similar proteins predominantly found in Gammaproteobacteria. YebY is a component of the AZY copper uptake system, where it functions as a negative regulator of the copper importer YebZ. At high copper concentrations, YebY may act as a safety valve, preventing toxic copper overload by inhibiting the import activity of YebZ and YobA. The reduced form of YebY binds Cu(+) and Cu(2+) with low affinity and shows low specificity, also binding Co(2+), Ni(2+), and Ag(+). However, the low affinity of copper binding, together with the stabilisation imparted by a disulphide bond, suggests that this metal binding is likely not physiologically relevant. The AZY proteins link copper import to multiple antibiotic resistances, being necessary for the copper-dependent activation of the mar operon, which leads to multidrug antibiotic resistance via the mar pathway. The AZY proteins may also be involved in copper delivery to membrane proteins; however, they are not involved in copper tolerance or antioxidant defence. Together with YebA, which is encoded by the same operon, YebY is required for the activity of the copper-related NADH dehydrogenase II (NDH-2). The crystal structure of YebY shows great similarity to that of the lantibiotic self-resistance protein MlbQ, which possesses a hydrophobic surface patch.
