identifier: Pfam:PF01618
label: MotA/TolQ/ExbB proton channel family
definition: >-
  This entry represents transmembrane helices of integral membrane proteins that appear to be involved in translocation of proteins or ions across a membrane. These proteins are probably proton channels. MotA is an essential component of the flagellar motor that uses a proton gradient to generate rotational motion in the flagellar. ExbB is part of the TonB-dependent transduction complex. The TonB complex uses the proton gradient across the inner bacterial membrane to transport large molecules across the outer bacterial membrane.
