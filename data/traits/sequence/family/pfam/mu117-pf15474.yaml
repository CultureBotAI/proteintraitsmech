identifier: Pfam:PF15474
label: Meiotically up-regulated gene family
definition: >-
  This protein was identified as being up-regulated during meiosis in Schizosaccharomyces pombe, where it is required for correct meiotic chromosome segregation. This family of proteins is found in largely in plants and fungi. Proteins in this family are typically between 128 and 920 amino acids in length.
