identifier: Pfam:PF11250
label: Fantastic Four meristem regulator
definition: >-
  This entry represents a plant specific domain called "fantastic four" (FAF). Members in this family include FAF1/2/3/4 from Arabidopsis thaliana. They may be modulators of the genetic circuit that regulates the meristem. This family also includes Protein SUGARY ENHANCER 1 from maize, which has a FAF domain and is involved in starch metabolism in endosperm.
