identifier: Pfam:PF01611
label: Filovirus glycoprotein
definition: >-
  This entry represents an extracellular domain from the envelope glycoprotein of Ebola virus sp. and Lake Victoria marburgvirus. The extracellular domain is also produced as a separate transcript that gives rise to a non-structural, secreted glycoprotein, which is produced in large amounts and has an unknown function. Processing of the protein may be involved in viral pathogenicity.
