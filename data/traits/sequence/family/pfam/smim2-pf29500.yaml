identifier: Pfam:PF29500
label: Small integral membrane protein 2
definition: >-
  This entry represents SMIM2, a small integral membrane protein found in mammals. SMIM2 is a single-pass membrane protein with a transmembrane helix and a disordered C-terminal region. The protein interacts with UBQLN1 and UBQLN2. SMIM2 is tissue enriched in testis and belongs to the small mitochondrial integral membrane protein family. The function of this protein remains to be determined.
