identifier: Pfam:PF30623
label: Family of unknown function (DUF8677)
definition: >-
  This entry represents a family of small uncharacterised proteins of approximately 50 residues found in marine cyanobacteria, including Prochlorococcus, Synechococcus and Cyanobium species. It is also found in Paulinella, a eukaryote with a cyanobacterial chromatophore. Some members are predicted to be membrane-associated. The function of this family remains to be determined.
