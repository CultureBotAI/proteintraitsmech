identifier: Pfam:PF25676
label: Bacteriophage T4 Spackle protein
definition: >-
  This family represents protein spackle from Bacteriophage T4, which inhibits viral DNA ejection into the host cytoplasm, thereby conferring the infected host bacteria with immunity against secondary phage infection. It localises to the periplasm and inhibits the activity of tail-associated lysozyme, thereby preventing penetration by the tail tube of incoming phages. It interacts with the baseplate central spike protein gp5, therefore, spackle selectively inhibits the lysozyme activity of gp5, but not that of T4 lysozyme.
