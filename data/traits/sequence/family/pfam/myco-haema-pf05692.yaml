identifier: Pfam:PF05692
label: Mycoplasma haemagglutinin
definition: >-
  This family consists of several haemagglutinin sequences from Mycoplasma gallisepticum. The major plasma membrane proteins, pMGAs, of Mycoplasma gallisepticum are cell adhesin (hemagglutinin) molecules. It has been shown that the genetic determinants that code for the haemagglutinins are organised into a large family of genes and that only one of these genes is predominately expressed in any given strain.
