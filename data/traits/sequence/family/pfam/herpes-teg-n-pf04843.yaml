identifier: Pfam:PF04843
label: Herpesvirus tegument protein, N-terminal conserved region
definition: >-
  All herpesviruses contain a Ubiquitin (Ub)-specific cysteine protease (USP) domain embedded within their large tegument protein. The herpesvirus tegument ubiquitin (Ub)-specific protease (htUSP) domain of ~200 amino acids adopts an α-β-α sandwich fold that features a central catalytic cleft, ideally suited to accommodate the C-terminal stretch of Ub. The catalytic triad Cys-His-Asp is strictly conserved, along with a putative oxyanion hole-forming Gln residue. The htUSP domain is a member of peptidase family C76 of clan CA.
