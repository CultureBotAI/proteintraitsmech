identifier: Pfam:PF01502
label: Phosphoribosyl-AMP cyclohydrolase
definition: >-
  The phosphoribosyl-AMP cyclohydrolase catalyses the third step in the histidine (his) biosynthetic pathway: 5-phosphoribosyl-AMP H 2 O = 5-(5-phospho-D-ribosylaminoformimino)-1-(5-phospho-ribosyl) imidazole-4-carboxamide It requires Zn 2 ions for activity.
