identifier: Pfam:PF12236
label: Bacteriophage head to tail connecting protein
definition: >-
  The tail of bacteriophage T7, a member of the Podoviridae family, is composed of at least four proteins; one of them is gene product 8 (gp8), known as the connector. DNA enters the viral head during DNA packaging through a channel formed by the connector. The connector sits at a unique 5-fold vertex of the icosahedral capsid, which is also involved in the delivery of the genome during DNA ejection. Purified gp8 protein has been shown to assemble as a dodecamer. This family includes connector proteins from Podoviridae and bacterial proteins.
