label: vWA-MoxR associated protein middle region 20
definition: >-
  This entry represents a highly variable central region of the vWA-MoxR associated protein (VMAP) of the classical ternary system (vWA-MoxR-VMAP) in NTP-dependent conflict systems. VMAP-Ms may be involved in sensing of invasive entities. This region is usually found N-terminal to .
