identifier: Pfam:PF29101
label: YNL162W-A
definition: >-
  This entry represents the YNL162W-A family of small uncharacterised proteins. The prototype protein YNL162W-A is a 72 amino acid protein from Saccharomyces cerevisiae that is localised to both the cytoplasm and nucleus. The protein is present at 3140 molecules per cell in log phase growth medium. This family is conserved across fungi, including species in the Saccharomycetaceae, Mortierellaceae, and other fungal lineages. The function of this protein family remains to be determined
