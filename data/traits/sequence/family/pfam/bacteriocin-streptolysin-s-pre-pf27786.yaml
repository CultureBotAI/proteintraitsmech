identifier: Pfam:PF27786
label: Bacteriocin, streptolysin S, precursor
definition: >-
  This entry represents a family of heterocycle-containing bacteriocin precursors. It includes the hemolytic polypeptide streptolysin S from Streptococcus pyogenes. These small, ribosomally produced polypeptide precursors are extensively processed post-translationally. Bacteriocin genes in general are small, highly diverse, and have unusual sequence composition, so they are easily missed by many gene-finding programs.
