identifier: Pfam:PF12452
label: 'Protein of unknown function (DUF3685) '
definition: >-
  This entry includes proteins annotated as Ycf55. It is found encoded in the chloroplast genomes of algae, it is also found in plants and in the cyanobacteria. The function is unknown, though there are two completely conserved residues (L and D) that may be functionally important. Members of this entry are exclusively found in phototrophic organisms which suggests that they may play a role in photosynthesis.
