label: Family of unknown function (DUF6914)
definition: >-
  This is a family of uncharacterised eukaryotic proteins. They are predicted to adopt a globular structure that resembles the conserved core of the PPPDE superfamily (after Permuted Papain fold Peptidases of DsRNA viruses and Eukaryotes) consisting of thiol peptidases with a circularly permuted papain-like fold.
