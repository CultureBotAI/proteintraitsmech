identifier: Pfam:PF27722
label: Membrane protein YqfB
definition: >-
  This entry represents Membrane protein YqfB found in Bacillus subtilis. This protein is predicted to be localised in the membrane and to act as a single-pass membrane protein. This protein has no effects on FloA or FloT membrane rafts.
