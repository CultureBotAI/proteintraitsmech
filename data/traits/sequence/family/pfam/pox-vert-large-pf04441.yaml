identifier: Pfam:PF04441
label: Poxvirus early transcription factor (VETF), large subunit
definition: >-
  The poxvirus early transcription factor (VETF), in addition to the viral RNA polymerase, is required for efficient transcription of early genes in vitro . VETF is a heterodimeric protein that binds specifically to early gene promoters. The heterodimer is comprised of an 82kDa (this family) subunit and a 70kDa subunit.
