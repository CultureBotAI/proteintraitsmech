identifier: Pfam:PF11927
label: Haem-dependent oxidative N-demethylase, alpha subunit-like
definition: >-
  This entry represents a family of proteins predominantly found in fungi and bacteria, including the alpha subunit of an haem-dependent oxidative N-demethylase (HODM) from Pseudomonas mendocina (Pmen_3455, ). This protein, catalytically active, is responsible for haem, oxygen and NADPH-dependent dimethylamine (DMA) binding. It shows an N- and C-terminally extended PAS haem binding domain structurally similar to the to the Aer2 PAS domain, but lacks the core PAS-domain α-helix that forms the Aer2 haem pocket, and displays extended β-strands and a longer loop.
