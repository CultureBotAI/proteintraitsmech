identifier: Pfam:PF09846
label: Origin-associated protein OapB
definition: >-
  This entry includes archaeal proteins whose function is unclear. Some members of this entry have been described as OapB/Arvb, encoded by oapB gene which is part of the three-gene cluster oapABC (origin-associated proteins), involved in generation of extracellular vesicles (arv, archaeal vesiculating GTAse). It has been suggested that OapB/ArvB could be a guanine nucleotide exchange factor (GEF), however, further experimental research is required to confirm this.
