identifier: Pfam:PF25695
label: Epstein-Barr virus BKRF4 histone binding protein
definition: >-
  This entry represents Tegument protein BKRF4 of the Epstein-Barr virus, which interacts with histone H2A-H2B dimers. BKRF4-HBD binds to H2A-H2B via a triple-anchor binding mode involving the N-terminal region (NTR), the DWP motif (containing D81, W84, P86), and the C-terminal region (CTR). This binding enables BKRF4 to associate with partially disassembled nucleosomes at DNA damage sites, thereby promoting nucleosome disassembly and suppressing host DNA damage response (DDR) signalling. BKRF4 thereby inhibits the recruitment of RNF168 and prevents 53BP1 foci formation, blocking the host antiviral response. This histone chaperone mimicry represents a viral strategy to manipulate host chromatin and attenuate antiviral signalling.
