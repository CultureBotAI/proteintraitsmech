identifier: Pfam:PF19978
label: Tail virion protein G7P
definition: >-
  Tail virion protein 7P (G7P) is a viral transmembrane protein that interacts with the packaging signal of the viral genome leading to the initiation the virion concomitant assembly-budding process in the host inner membrane. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches.
