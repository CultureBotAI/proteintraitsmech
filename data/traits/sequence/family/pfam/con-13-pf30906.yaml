identifier: Pfam:PF30906
label: Conidiation-specific protein Con-13
definition: >-
  This entry represents a domain found in the conidiation-specific protein 13 (Con-13) found in fungi, including both Ascomycota and Basidiomycota. In Neurospora crassa, Con-13 is expressed early during conidial differentiation. Conidia are asexual, non-motile spores produced by fungi. The domain can occur as tandem copies in some proteins. Its function remains to be determined.
