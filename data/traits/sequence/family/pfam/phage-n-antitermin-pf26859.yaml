identifier: Pfam:PF26859
label: Phage N antitermination protein
definition: >-
  This entry represents the N antitermination protein found in bacteriophages. The prototype is from bacteriophage phi-80, a 98 amino acid protein with a molecular weight of 11.7 kDa. The N protein functions as a transcriptional antitermination factor, allowing RNA polymerase to read through transcription termination signals. This regulatory mechanism is essential for controlling the temporal expression of phage genes during the lytic cycle. The protein is classified as an early protein and is similar to the well-characterised lambda N protein. This entry includes related bacterial proteins.
