identifier: Pfam:PF05247
label: Flagellar transcriptional activator (FlhD)
definition: >-
  This family consists of several bacterial flagellar transcriptional activator (FlhD) proteins. FlhD combines with FlhC to form a regulatory complex in Escherichia coli. This complex has been shown to be a global transcriptional regulator involved in many cellular processes as well as a flagellar transcriptional activator. The FlhD protein is dimeric. The dimer is tightly coupled, with an intimate contact surface, implying that the dimer does not easily dissociate. The FlhD monomer is predominantly α-helical.
