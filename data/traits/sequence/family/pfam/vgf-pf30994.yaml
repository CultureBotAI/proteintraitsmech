identifier: Pfam:PF30994
label: Neurosecretory protein VGF
definition: >-
  VGF protein is a neurosecretory protein originally identified as a product of the nerve growth factor responsive gene Vgf in rat pheochromocytoma PC12 cells. VGF may be involved in the regulation of cell-cell interactions or in synatogenesis during the maturation of the nervous system.
