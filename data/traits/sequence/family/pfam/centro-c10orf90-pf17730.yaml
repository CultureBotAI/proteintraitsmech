identifier: Pfam:PF17730
label: 'Centrosomal C10orf90 '
definition: >-
  This is the N-terminal region found on proteins encoded by C10orf90, also known as FATS. Most of the family members carry ALMS motif on their C-terminal ( ). SiRNA mediated functional analysis suggest that the C10orf90 encoded proteins have a role in centrosomal functions.
