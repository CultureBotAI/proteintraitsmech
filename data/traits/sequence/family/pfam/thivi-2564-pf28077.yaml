label: Thivi_2564 membrane protein
definition: >-
  This entry represents Thivi_2564 from Thiocystis violascens DSM 198 ( ) and related bacterial proteins. A related ORF located between lpg1798 and lpg1799 can be found in Legionella pneumophila. Members of this family are, in average, about 60 amino acids long and are highly hydrophobic.
