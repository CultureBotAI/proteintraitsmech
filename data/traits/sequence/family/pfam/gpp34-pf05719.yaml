identifier: Pfam:PF05719
label: Golgi phosphoprotein 3 (GPP34)
definition: >-
  This family consists of several eukaryotic GPP34 like proteins. GPP34 (also known as golgi phosphoprotein 3) localises to the Golgi complex and is conserved from Saccharomyces cerevisiae to humans. The cytosolic-ally exposed location of GPP34 predicts a role for a novel coat protein in Golgi trafficking. The budding yeast GPP34 homologue, also known as Vps74, is a phosphatidylinositol-4-phosphate-binding protein that links Golgi membranes to the cytoskeleton and may participate in the tensile force required for vesicle budding from the Golgi. This family also includes uncharacterised proteins from bacteria.
