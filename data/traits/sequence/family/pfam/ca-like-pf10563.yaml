identifier: Pfam:PF10563
label: Delta carbonic anhydrase
definition: >-
  Delta carbonic anhydrases are one of the at least five independently evolved families of carbonic anhydrases. Their activities, low CO2-induction, and localizations have been well studied in diatoms. The catalytic mechanism of delta CAs is currently unknown. Proteins of this family are also common in bacteria, but due to more distant relationship (identities less than 30% to the diatom delta CAs) and to the lack of experimental data the carbonic anhydrase activity is only putative in prokaryotic delta CAs.
