identifier: Pfam:PF07271
label: Cytadhesin P30/P32
definition: >-
  This family consists of several Mycoplasma species specific Cytadhesin P32 and P30 proteins. P30 has been found to be membrane associated and localised on the tip organelle. It is thought that it is important in cytadherence and virulence.
