identifier: Pfam:PF04553
label: Tis11B like protein, N terminus
definition: >-
  All proteins of containing this domain also contain a tandem repeat of CCCH zinc fingers ( ). Tis11B, Tis11D and their homologues are thought to be regulatory proteins involved in the response to growth factors. Tis11B ( ) is thought to be involved in calcium signalling-induced apoptosis in B cells. The function of this N-terminal domain is unknown.
