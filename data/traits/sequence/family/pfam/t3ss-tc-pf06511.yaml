identifier: Pfam:PF06511
label: Type III secretion systems tip complex components
definition: >-
  This family consists of several invasion plasmid antigen IpaD proteins found in Shigella as well as homologues such as SipD from Salmonella and BipD from Burkholderia. Gram-negative bacteria use type III secretion systems (T3SSs) as protein transport devices for injecting virulence effector proteins into eukaryotic cells during infection. T3SSs consist of a needle complex (NC) and a tip complex (TC). In Shigella the TC is composed of two proteins, each essential to host cell sensing: IpaD and IpaB. IpaD is hydrophilic and required for tip recruitment of the hydrophobic proteins IpaB and IpaC, which later form the pore in host cell membranes.
