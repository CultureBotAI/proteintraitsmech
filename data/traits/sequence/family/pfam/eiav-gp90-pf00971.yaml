identifier: Pfam:PF00971
label: EIAV coat protein, gp90
definition: >-
  Equine infectious anemia virus(EIAV) belongs to the family retroviridae. EIAV gp90 is hypervariable in the carboxyl-end region and more stable in the amino-end region. This variability is a pathogenicity factor that allows the evasion of the host's immune response.
