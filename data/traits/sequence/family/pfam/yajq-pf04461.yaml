identifier: Pfam:PF04461
label: Nucleotide-binding protein YajQ-like
definition: >-
  This entry represents Nucleotide-binding protein YajQ from Escherichia coli, Cyclic di-GMP-binding protein Smlt4090 from Stenotrophomonas maltophilia and similar sequences mainly found in bacteria. In Pseudomonas syringae, YajQ functions as a host protein involved in the temporal control of bacteriophage Phi6 gene transcription. It has been shown to bind to the phage's major structural core protein P1, most likely activating transcription by acting indirectly on the RNA polymerase. YajQ may remain bound to the phage particles throughout the infection period. Earlier, YajQ was characterised as a putative nucleic acid-binding protein based on the similarity of its (ferredoxin-like) three-dimensional topology with that of RNP-like RNA-binding domains. Smlt4090 binds bis-(3',5')-cyclic diguanylate (cyclic di-GMP or c-di-GMP), an important bacterial second messenger that controls a wide range of cellular processes. It significantly contributes to virulence.
