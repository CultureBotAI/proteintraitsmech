identifier: Pfam:PF22284
label: Family of unknown function (DUF6961)
definition: >-
  This is a family of small, about 60 residues in length, proteins found mainly in alphaproteobacteria. They are predicted to adopt a globular structure consisting of three helices. The N- and C-terminal helices contain highly conserved aromatic residues in addition to the nearly invariant glycines located at the interhelical connecting loops.
