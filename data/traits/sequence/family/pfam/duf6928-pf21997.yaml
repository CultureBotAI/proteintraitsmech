identifier: Pfam:PF21997
label: Family of unknown function (DUF6928)
definition: >-
  This is a family of uncharacterised bacterial proteins. They are predicted to adopt an α/β structure with a central nine-stranded antiparallel β-sheet with α-helices packed on both sides. The predicted structure has some partial structural similarity to bacterial S-adenosylmethionine decarboxylases.
