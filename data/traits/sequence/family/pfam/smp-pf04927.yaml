identifier: Pfam:PF04927
label: Seed maturation protein
definition: >-
  This entry represents Pfam SMP, or D-34 from Dure, or group 6 from Bray. LEA (late embryogenesis abundant) proteins were first identified in land plants. Plant LEA proteins have been found to accumulate to high levels during the last stage of seed formation (when a natural desiccation of the seed tissues takes place) and during periods of water deficit in vegetative organs. Later, LEA homologues have also been found in various species. They have been classified into several subgroups in Pfam and according to Bray and Dure.
