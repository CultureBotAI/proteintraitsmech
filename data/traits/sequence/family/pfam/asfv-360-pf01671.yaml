identifier: Pfam:PF01671
label: African swine fever virus multigene family 360 protein
definition: >-
  The multigene family 360 protein are found within the African swine fever virus (ASFV) genome which consist of dsDNA and has similar structural features to the poxviruses. The biological function of this family is not known, although is a major structural protein.
