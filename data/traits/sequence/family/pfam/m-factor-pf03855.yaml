identifier: Pfam:PF03855
label: M-factor
definition: >-
  The M-factor is a pheromone produced upon nitrogen starvation in fission yeasts. The production of M-factor is increased by the pheromone signal. The protein undergoes post-translational modification to remove the C-terminal signal peptide, the carboxy-terminal cysteine residue is carboxy-methylated and S-alkylated with a farnesyl residue.
