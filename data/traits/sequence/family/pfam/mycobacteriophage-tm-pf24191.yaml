identifier: Pfam:PF24191
label: Mycobacteriophage protein with transmembrane helix
definition: >-
  This entry represents a family of proteins of unknown function found in mycobacteriophage. The family includes short proteins between 44-60 amino acids in length that contain a single predicted transmembrane helix. The presence of these proteins in numerous mycobacteriophage suggests they may play a role in phage biology, but their specific function has yet to be determined experimentally.
