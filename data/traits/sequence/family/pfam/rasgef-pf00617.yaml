identifier: Pfam:PF00617
label: RasGEF domain
definition: >-
  This entry represents the catalytic domain of the Ras guanine-nucleotide exchange factors. Ras proteins are membrane-associated molecular switches that bind GTP and GDP and slowly hydrolyze GTP to GDP in fundamental events such as signal transduction, cytoskeleton dynamics and intracellular trafficking. The balance between the GTP bound (active) and GDP bound (inactive) states is regulated by the opposite action of proteins activating the GTPase activity and that of proteins which promote the loss of bound GDP and the uptake of fresh GTP. The latter proteins are known as guanine-nucleotide exchange (or releasing) factors (GEFs or GRFs) (or also as guanine-nucleotide dissociation stimulators (GDSs)). GEFs catalyze the dissociation of GDP from the inactive GTP-binding proteins. GTP can then bind and induce structural changes that allow interaction with effectors. The crystal structure of the GEF region of human Sos1 complexes with Ras has been solved. The structure consists of two distinct α helical structural domains: the N-terminal domain which seems to have a purely structural role and the C-terminal domain which is sufficient for catalytic activity and contains all residues that interact with Ras. A main feature of the catalytic domain is the protrusion of a helical hairpin important for the nucleotide-exchange mechanism. The N-terminal domain is likely to be important for the stability and correct placement of the hairpin structure. Some proteins known to contain a Ras-GEF domain are listed below: Cdc25 from yeast. Scd25 from yeast. Ste6 from fission yeast. Son of sevenless (gene sos) from Drosophila and mammals. p140-RAS GRF (cdc25Mm) from mammals. This protein possesses both a domain belonging to the CDC25 family and one belonging to the CDC24 family. Bud5 from ye…
