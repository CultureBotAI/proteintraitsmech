identifier: Pfam:PF15591
label: Immunity protein 31
definition: >-
  This family consists of predicted immunity proteins with a mostly all-β fold and a conserved GxS motif. These proteins are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Ntox17 or Ntox7 families.
