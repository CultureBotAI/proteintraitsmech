identifier: Pfam:PF30100
label: FMRFamide-like neuropeptide 21
definition: >-
  This entry represents the FMRFamide-like neuropeptide 21 (FLP-21) family found in nematodes. FLP-21 is a secreted neuropeptide precursor that is processed to generate the active peptide GLGPRPLRF-amide. The mature peptide functions as a ligand for the G-protein coupled receptor NPR-1 and modulates locomotion quiescence during the sleep- like state lethargus that occurs during moulting. FLP-21 plays important roles in social and feeding behaviour. The protein is expressed in sensory neurons (ADL, ASE, ASH), motor neurons (URA) and pharyngeal neurons (MC, M2, M4). FLP-21 belongs to the FARP (FMRFamide related peptide) family and may be processed by convertase EGL-3. The neuropeptide is essential for proper behavioural regulation in Caenorhabditis elegans
