identifier: Pfam:PF05296
label: Taste receptor protein (TAS2R)
definition: >-
  This family consists of several forms of taste receptor proteins (TAS2Rs) predominantly found in mammals. TAS2Rs are G protein-coupled receptors expressed in subsets of taste receptor cells of the tongue and palate epithelia and are organised in the genome in clusters. The proteins are genetically linked to loci that influence bitter perception in mice and humans. These receptors may play a role in sensing the chemical composition of the gastrointestinal content.
