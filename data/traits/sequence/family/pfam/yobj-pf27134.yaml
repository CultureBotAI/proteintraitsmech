identifier: Pfam:PF27134
label: YobJ family
definition: >-
  This entry represents the YobJ protein family from Bacillus subtilis and related bacteria. YobJ is an uncharacterised protein of approximately 280 amino acids predicted to be a multi-pass membrane protein localised to the cell membrane with three transmembrane helices. The function of this protein family is unknown.
