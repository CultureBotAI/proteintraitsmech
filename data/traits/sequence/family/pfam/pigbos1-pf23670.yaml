identifier: Pfam:PF23670
label: PIGBOS1-like
definition: >-
  This protein family includes human Protein PIGBOS1 and similar sequences from eukaryotes. PIGBOS1 plays a role in the regulation of the unfolded protein response triggered by the endoplasmic reticulum (ER) stress resulting from the presence of unfolded proteins in the ER lumen. It is primarily found in the mitochondrial outer membrane and interacts with CLCC1, an endoplasmic reticulum (ER) protein, at ER-mitochondria contact sites.
