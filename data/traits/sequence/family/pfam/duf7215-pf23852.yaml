identifier: Pfam:PF23852
label: Family of unknown function (DUF7215)
definition: >-
  This entry represents a domain of unknown function found in phage proteins, typically 45-60 amino acids in length. It is found in Streptomyces phages of the Caudoviricetes order, primarily in the Arquatrovirinae subfamily. The domain does not contain any conserved motifs or residues that provide hints about its function. A structure prediction shows that it is composed of two non-interacting α helices.
