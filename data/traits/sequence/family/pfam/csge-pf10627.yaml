identifier: Pfam:PF10627
label: Curli assembly protein CsgE
definition: >-
  Curli are a class highly aggregated surface fibres that are part of a complex extracellular matrix. They promote biofilm formation in addition to other activities. CsgE is a non-structural protein involved in curli biogenesis. CsgE forms an outer membrane complex with the curli assembly proteins CsgG and CsgF.
