identifier: Pfam:PF25622
label: Phi29-like phage major capsid protein
definition: >-
  This entry represents the major capsid protein found in phi29-like bacteriophages. These proteins assemble to form the icosahedral capsid structure of the virion. Based on the characterised member from Staphylococcus phage 44AHJD ( ), these phages belong to the Podoviridae family with short, non-contractile tails. The phages are known to infect Staphylococcus aureus.
