identifier: Pfam:PF24687
label: Type III Secretion system protein OrgC
definition: >-
  This entry represents the type III Secretion system protein OrgC from Salmonella Typhimurium and related proteins from proteobacteria. OrgC is a protein encoded within the T3SS gene cluster that is secreted by the T3SS. It interacts with the needle filament subunit PrgI and accelerates its polymerization into filaments in vitro. OrgC structure consists of an array of four α-helices.
