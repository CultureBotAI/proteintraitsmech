identifier: Pfam:PF07281
label: Insulin-induced protein (INSIG)
definition: >-
  This family contains a number of eukaryotic Insulin-induced proteins (INSIG-1 and INSIG-2) approximately 200 residues long. INSIG-1 and INSIG-2 are found in the endoplasmic reticulum and bind the sterol-sensing domain of SREBP cleavage-activating protein (SCAP), preventing it from escorting SREBPs to the Golgi. Their combined action permits feedback regulation of cholesterol synthesis over a wide range of sterol concentrations. The INSIG family also includes NSG1 and NSG2 (INSIG homologues 1 and 2).
