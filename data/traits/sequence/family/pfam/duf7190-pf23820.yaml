identifier: Pfam:PF23820
label: Family of unknown function (DUF7190)
definition: >-
  This entry represents a putative membrane protein found in several mycobacteriophages, especially those belonging to the genus Cheoctovirus. The function is unknown. Most members contain a predicted transmembrane helix near the N-terminal. The family shows some length variation, especially at the C-terminal.
