identifier: Pfam:PF08641
label: Kinetochore protein Mis14 like
definition: >-
  This entry includes Mis14 from S. pombe, Nsl1 from S. cerevisiae and Nsl1 homologues from animals. MIs14 is a component of the NMS (Ndc80-MIND-Spc7) super complex which has a role in kinetochore function during late meiotic prophase and throughout the mitotic cell cycle. Nsl1 is an essential component of the kinetochore MIND complex, which is required for the spindle checkpoint and kinetochore integrity.
