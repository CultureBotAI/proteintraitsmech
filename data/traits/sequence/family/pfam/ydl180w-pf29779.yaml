identifier: Pfam:PF29779
label: Uncharacterised membrane protein YDL180W
definition: >-
  This entry represents the YDL180W membrane protein family found in fungi. YDL180W is an uncharacterised multi-pass membrane protein localised to the vacuole membrane. The protein contains seven predicted transmembrane helices with cytoplasmic and vacuolar domains. YDL180W undergoes phosphorylation and has been implicated in negative regulation of TORC1 signalling. The function of this membrane protein family remains to be determined.
