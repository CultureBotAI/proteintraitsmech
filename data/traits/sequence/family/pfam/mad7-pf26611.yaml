identifier: Pfam:PF26611
label: Methylation-associated defense system protein MAD7
definition: >-
  This entry represents the methylation-associated defense system protein MAD7 and related proteins. The methylation-associated defense system (MADS) is distributed across gram-positive and gram-negative bacteria. MADS interacts with a CRISPR-Cas system in its native host to provide robust and durable resistance against phages. MADS comprises eight genes. MAD7 and MAD8 components of MADS are related to the subunits of the ATP-dependent nuclease effector of phosphorothioate (PT)-dependent restriction systems which target unmodified DNA. MAD7 probably plays a role in distinguishing unmethylated non-self DNA for loading into the MAD8 motor nuclease.
