identifier: Pfam:PF00443
label: Ubiquitin carboxyl-terminal hydrolase
definition: >-
  This domain is found at the C-terminal end of ubiquitin C-terminal hydrolases and similar sequences from eukaryotes. It is functionally uncharacterised, but it is found associated with . Deubiquitinating enzymes (DUBs) are capable of removing ubiquitin (Ub) from protein substrates and are involved in numerous biological processes. DUBs can be divided into 7 subfamilies: ubiquitin C-terminal hydrolase (UCH), ubiquitin-specific processing protease (UBP or USP), otubain protease (OUT), Machado-Joseph disease protease (MJD), JAB1/MPN/Mov34 metalloenzyme (JAMM), monocyte chemotactic protein-induced protein (MCPIP) and the motif interacting with Ub-containing novel DUB family (MINDY).
