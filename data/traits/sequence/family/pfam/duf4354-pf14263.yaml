identifier: Pfam:PF14263
label: Domain of unknown function (DUF4354)
definition: >-
  Several members of this family are annotated as being ATP/GTP-binding site motif A (P-loop) proteins, but this has not been confirmed. The one structure solved for this family ( ) exhibits an immunoglobin-like β-sandwich fold. Crystal packing suggests that a tetramer is a significant oligomerisation state, and a disulphide bridge is formed between Cys 125 at the C-terminal end of the monomer, and Cys 69.
