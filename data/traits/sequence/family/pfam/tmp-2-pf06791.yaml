identifier: Pfam:PF06791
label: Prophage tail length tape measure protein
definition: >-
  This entry represents a conserved region located towards the N-terminal end of prophage tail length tape measure protein (TMP). TMP is important for assembly of phage tails and involved in tail length determination. Mutated forms TMP cause tail fibres to be shortened. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. This entry includes a domain near the N terminus of the bacteriophage lambda tail tape measure protein, GpH.
