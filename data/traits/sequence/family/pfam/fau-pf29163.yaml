identifier: Pfam:PF29163
label: Anoxia up-regulated protein
definition: >-
  This entry represents the anoxia up-regulated protein family, also known as FAU. This protein plays an important role in the regulation of tissue responsiveness to oxygen deprivation in Drosophila melanogaster. The protein is induced by anoxia and is concentrated in lamina neurons, first optic lobe neurons and cortical neurons of the central brain. The protein is 131 amino acids in length and is largely disordered, containing regions of polar residues and low complexity sequences. The family is conserved particularly within insects. The name 'fau' is an acronym for 'fly, anoxia, up-regulated'.
