identifier: Pfam:PF27710
label: tRNA (guanine(9)-N(1))-methyltransferase TRM10/TRM10A
definition: >-
  Transfer RNA molecules contain numerous modified nucleosides, particularly within the anticodon region, which are introduced by various tRNA-modifying enzymes prior to the formation of mature tRNA. Among these modifications, N1-methylguanine (m1G) at position 37 is catalysed by tRNA (guanine-N1)-methyltransferase , which transfers a methyl group from S-adenosyl-L-methionine (SAM) to guanosine, yielding S-adenosyl-L-homocysteine and m1G37-containing tRNA. This modification occurs in tRNAs that decode CUN (leucine), CCN (proline) and CGG (arginine) codons. The presence of m1G37 enhances cellular growth rate and polypeptide synthesis efficiency while preventing ribosomal frameshifting. Studies have demonstrated that the conformation of the anticodon loop may be a major determinant for m1G37 formation in vivo.
