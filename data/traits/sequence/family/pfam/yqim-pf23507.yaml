label: YqiM
definition: >-
  This protein family includes YqiM from Escherichia coli, a 27-residue micropeptide encoded by a small open reading frame (smORF). Proteins of 50 or fewer residues long have been shown to regulate the functions of larger proteins in a variety of organisms.
