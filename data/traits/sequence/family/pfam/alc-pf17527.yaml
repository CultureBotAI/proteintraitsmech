identifier: Pfam:PF17527
label: Phage ALC protein
definition: >-
  Bacteriophage T4 infection rapidly shuts down transcription in the host cell and any other phages that may be present. This is accomplished by specifically blocking transcription of cytosine-containing DNA. T4 is protected from this as its DNA contains a substituted base, hydroxymethylcytosine, in place of the usual cytosine. The Alc protein plays a key role in this process by unfolding the host genome and blocking transcription of cytosine-containing DNA.
