identifier: Pfam:PF03032
label: Frog skin active peptide family signal and propeptide
definition: >-
  In addition to the highly specific cell-mediated immune system, vertebrates possess an efficient host-defence mechanism against invading microorganisms which involves the synthesis of highly potent antimicrobial peptides with a large spectrum of activity. This entry represents the signal peptide and propeptide regions found in a number of these defence peptides secreted from the skin of amphibians, including caerins, dermaseptins, brevinin, dermorphin, tryptophillin, pleurain and phylloseptin. This domain does not include the active peptides.
