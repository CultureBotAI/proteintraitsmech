identifier: Pfam:PF03307
label: Adenovirus 15.3kD protein in E3 region
definition: >-
  Adenoviruses have evolved multiple mechanisms to evade the host immune response. Several of the immunomodulatory proteins are encoded in early transcription unit 3 (E3) of human adenoviruses (Ads). These proteins appear to control viral interactions with the host. This entry represents the E3_15 family, including proteins from the E3 region which may protect virus-infected cells from TNF-induced cytolysis.
