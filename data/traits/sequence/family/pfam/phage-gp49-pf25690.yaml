identifier: Pfam:PF25690
label: Mycobacteriophage L5/D29 gene 49 protein
definition: >-
  This entry represents the Gene 49 protein (Gp49) found in Mycobacteriophage D29 and L5. The protein contains disordered regions at both the N-terminal (residues 1-49) and internally (residues 114-157). The C-terminal region contains several conserved cysteine residues that may be functionally important. The specific function of this protein within the phage life cycle has not yet been determined.
