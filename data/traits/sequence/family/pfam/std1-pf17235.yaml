identifier: Pfam:PF17235
label: STD1/MTH1
definition: >-
  This family of proteins includes the known homologues Std1 (also known as MSN3) and Mth1. Both Std1 and Mth1 are involved in modulating the expression of glucose-regulated genes in yeast, but have been shown to function by slightly different methods. It has been suggested that both Std1 and Mth1 are required to repress the hexose transporter genes in low glucose conditions. Std1 has also been shown to stimulate Snf1 kinase through interaction with the catalytic domain of Snf1, antagonising auto-inhibition and promoting an active conformation of the kinase.
