identifier: Pfam:PF27193
label: Chloroethene reductive dehalogenase membrane anchor protein
definition: >-
  This entry represents VcrB, a probable chloroethene reductive dehalogenase membrane anchor protein from Dehalococcoides mccartyi. VcrB is a 93 amino acid multi-pass transmembrane protein with three predicted transmembrane helices that may act as a membrane anchor for the chloroethene reductive dehalogenase VcrA. The protein is cotranscribed with vcrA and vcrC and belongs to the PceB family. VcrB is found in organisms involved in vinyl chloride respiration.
