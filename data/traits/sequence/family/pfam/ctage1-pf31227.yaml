identifier: Pfam:PF31227
label: Cutaneous T-cell lymphoma-associated antigen 1
definition: >-
  This entry represents CTAGE1 (cutaneous T-cell lymphoma-associated antigen 1, also known as cTAGE-1 or cancer/testis antigen 21.1), found in primates. CTAGE1 is a small membrane protein containing two transmembrane helices. The protein is a tumour-associated antigen expressed in testis and detected in several cutaneous T-cell lymphoma cell lines, particularly in mycosis fungoides and Sezary syndrome patients, as well as in head-neck and ovarian carcinomas. Multiple isoforms exist through alternative splicing. The function of this protein remains to be determined.
