identifier: Pfam:PF00854
label: POT family
definition: >-
  The proton-dependent oligopeptide transporter (POT) family (also known as the peptide transport (PTR) family) is made up of a group of energy-dependent transporters found in organisms as diverse as bacteria and humans. The POT family of proteins is distinct from the ABC-type peptide transporters and was uncovered by sequence analyses of peptide transport proteins. They seem to be mainly involved in the intake of small peptides. However, some family members are nitrate permeases and others are involved in histidine transport.
