identifier: Pfam:PF29352
label: Putative defensin-like protein 134
definition: >-
  This entry represents defensin-like proteins (DEFL) found in plants. These small secreted proteins belong to a large gene family with over 300 members in Arabidopsis thaliana. The proteins contain four conserved disulphide bonds that stabilise their structure. DEFL proteins are characterised by antimicrobial and antifungal activities and play roles in plant defence responses.
