identifier: Pfam:PF03113
label: Respiratory synctial virus non-structural protein NS2
definition: >-
  This entry represents the non-structural protein NS2 of which mutants lacking NS2 grow at slower rates compared to wild-type, although NS2 is not essential for viral replication. NS2 plays a major role in antagonising the type I interferon-mediated antiviral response. It acts cooperatively with NS1 to repress activation and nuclear translocation of the host interferon-regulatory factor IRF3, and interacts with the host cytoplasmic sensor of viral nucleic acids RIG-I, preventing its interaction with the downstream partner MAVS. Together with NS1, NS2 participates in the proteasomal degradation of host STAT2, IRF3, IRF7, TBK1 and RIG-I through a NS-degradasome involving CUL2 and Elongin-C, which requires an intact mitochondrial MAVS. NS2 also induces host SOCS1 expression and activates NF-kappa-B, suppressing premature apoptosis through an NF-kappa-B-dependent, interferon-independent mechanism that promotes continued viral replication.
