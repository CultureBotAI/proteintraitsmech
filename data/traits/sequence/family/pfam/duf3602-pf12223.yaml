label: Protein of unknown function (DUF3602)
definition: >-
  This domain family is found in eukaryotes, and is typically between 78 and 89 amino acids in length. This entry include protein Par32 from Saccharomyces cerevisiae. Par32 is hyperphosphorylated after treatment with rapamycin in a TAP42-dependent manner. It is also involved in resistance to cisplatin.
