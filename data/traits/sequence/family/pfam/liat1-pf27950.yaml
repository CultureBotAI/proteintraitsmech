identifier: Pfam:PF27950
label: Protein LIAT1
definition: >-
  This entry represents a conserved helix found in the middle of LIAT1 proteins. Its function is unknown. This entry includes LIAT1 (ligand of Ate1) from animals. LIAT1 interacts with Ate1 and may be involved in Ate1-mediated N-terminal arginylation. Ate1 is a component of the N-end rule pathway, which recognises and polyubiquitylates proteins containing N-terminal degradation signals, targeting them for degradation by the proteasome. In primates, LIAT1 genes are subtelomeric and LIAT1 protein contains tandem repeats of a 10-residue sequence, whereas Liat1 proteins of other mammals contain a single copy of this motif.
