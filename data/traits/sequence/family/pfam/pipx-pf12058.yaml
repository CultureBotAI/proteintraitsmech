identifier: Pfam:PF12058
label: PII-interacting protein X
definition: >-
  This protein family is predominantly found in cyanobacteria and includes PII-interacting protein X (PipX) from Synechococcus elongatus . PipX modulates the expression of genes involved in nitrogen assimilation by interacting with the global nitrogen transcription factor NtcA and the signal transduction protein PII. It is involved in several regulatory pathways. The crystal structure of this protein shows a tudor-like domain (TLD), formed by a highly bent β-sheet that mediates the interactions with both PII and NtcA, and two C-terminal helices.
