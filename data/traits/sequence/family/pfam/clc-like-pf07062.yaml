identifier: Pfam:PF07062
label: Clc-like
definition: >-
  Clc proteins are a nine-member gene family of chloride channels that have diverse roles in the plasma membrane and in intracellular organelles, especially membrane excitability and the maintenance of osmotic balance. These proteins have been widely related with a variety of human diseases ranging from degeneration of the retina to lung cancer and epilepsy. This protein family includes Clc-like protein 2/5 from Caenorhabditis elegans and similar proteins from animals.
