identifier: Pfam:PF07750
label: GcrA cell cycle regulator
definition: >-
  GcrA, together with CtrA (see and ), form a master cell cycle regulator. These bacterial regulators are involved in controlling the progression and asymmetric polar morphogenesis. During this process, there are temporal and spatial variations in the concentrations of GcrA and CtrA. The variation in concentration produces time and space dependent transcriptional regulation of modular functions that implement cell-cycle processes. More specifically, GcrA acts as an activator of components of the replisome and the segregation machinery.
