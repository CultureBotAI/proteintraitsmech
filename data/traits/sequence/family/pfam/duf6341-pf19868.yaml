label: Family of unknown function (DUF6341)
definition: >-
  This family of uncharacterised proteins is found mainly in bacteria. Proteins in this family are approximately 70 amino acids in length. There are two conserved sequence motifs, WIF and YW. Most members are though to be Uracil phosphoribosyltransferases.
