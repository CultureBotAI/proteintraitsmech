identifier: Pfam:PF29250
label: Gas vesicle protein I
definition: >-
  This entry represents the gas vesicle protein I (GvpI) found in haloarchaea. GvpI is a minor component of gas vesicles, hollow gas-filled proteinaceous structures that provide buoyancy. Proteins GvpF to GvpM are thought to be involved in nucleating gas vesicle formation. This protein contains intrinsically disordered and enriched in basic residues. GvpI interacts with other gas vesicle proteins including GvpC and GvpO.
