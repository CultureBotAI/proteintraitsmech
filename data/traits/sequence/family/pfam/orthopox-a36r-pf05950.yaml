identifier: Pfam:PF05950
label: Orthopoxvirus A36R protein
definition: >-
  This entry represents A36R from Vaccinia virus, also called Protein OPG164, and similar proteins predominantly found in orthopoxvirus. A36R is involved in the intracellular transport and egress of virions to the host cell surface with help of protein OPG056. It also participates in the formation of actin tails at the plasma membrane to allow efficient actin-based motility and thus cell to cell transmission of viral particles.
