identifier: Pfam:PF05108
label: Type VII secretion system ESX-1, transport TM domain B
definition: >-
  The proteins in this family are found in Actinobacteria and are part of type VII secretion system (T7SS). This entry represents the transmembrane protein EccB of actinobacterial type VII secretion systems. EccB (ESX conserved component B) is a core component of the T7SS architecture. Species such as Mycobacterium tuberculosis have several instances of this system per genome, designated EccB1, EccB2, etc. Mycobacterium tuberculosis EccB1 has been shown to be an ATPase. This entry does not identify functionally related proteins in the Firmicutes such as Staphylococcus aureus and Bacillus anthracis.
