identifier: Pfam:PF21898
label: Sarcolamban protein
definition: >-
  This entry represents Sarcolamban A and B from Drosophila melanogaster (SclA/B) and similar sequences from Drosophila species. SclA and SclB play an essential role in the regulation of calcium transport at the sarcoplasmic reticulum (SR), which is secondarily required for regular muscle contraction.
