identifier: Pfam:PF01619
label: Proline dehydrogenase
definition: >-
  The proline oxidase/dehydrogenase is responsible for the first step in the conversion of proline to glutamate for use as a carbon and nitrogen source. The enzyme requires FAD as a cofactor, and is induced by proline.
