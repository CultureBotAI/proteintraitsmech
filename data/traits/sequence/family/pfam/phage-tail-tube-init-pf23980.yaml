identifier: Pfam:PF23980
label: Putative phage tail tube initiator protein
definition: >-
  This entry represents a family of uncharacterised proteins mainly found in phages and some bacterial species. Based on structure prediction these proteins show similarity to the Pam3 gp17 the tail tube initiator protein. Six gp17 subunits form a hexameric ring that initiates tail tube polymerisation from the baseplate.
