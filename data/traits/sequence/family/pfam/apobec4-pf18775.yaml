identifier: Pfam:PF18775
label: APOBEC4
definition: >-
  This entry represents the cytosine deaminase domain in APOBEC4. APOBEC4 belongs to the AID/APOBEC family. In mammals, APOBEC4 is expressed primarily in testis. The AID/APOBEC are deaminases that function in RNA/DNA editing. The AID/APOBEC family contains several subfamilies: AID, APOBEC1, APOBEC2, APOBEC3, APOBEC4 and APOBEC5. AID/APOBEC deaminases (AADs) convert cytidine to uridine in single-stranded nucleic acids. They are involved in numerous mutagenic processes, including those underpinning vertebrate innate and adaptive immunity. APOBEC were suggested to originate from ancestral AID genes expressed in the lymphocytes of jawless fish over 500 million years ago. Gene duplication and diversification of AID structure and function, probably contributed to the evolutionary process leading to genes that encode the APOBEC proteins of amphibians, birds, and tetrapods including primates.
