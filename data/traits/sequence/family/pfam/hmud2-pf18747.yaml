identifier: Pfam:PF18747
label: 5-hmdU DNA kinase 2
definition: >-
  5-hmdU DNA kinase 2 from phages which phosphorylates 5-hydroxymethyluracil (5hmdU) into 5-phosphomethyl-2'-deoxyuridine (5-PmdU) on DNA as a step in the pathway leading to thymidine hypermodifications in the viral genome which probably prevent degradation of viral genome by the host restriction-modification antiviral defense system.
