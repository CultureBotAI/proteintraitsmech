identifier: Pfam:PF10376
label: 'Double-strand recombination repair protein  '
definition: >-
  This entry includes Mei5 from budding yeasts and SFR1 from animals and fission yeasts. Although the fission yeast Swi5-Sfr1 complex is critical for homologous recombination repair, the budding yeast counterpart Sae3-Mei5 complex is meiosis-specific, interacts with Dmc1, and promotes assembly of Dmc1 on meiotic chromosomes. SFR is a component of the SWI5-SFR1 complex, a complex required for double-strand break repair via homologous recombination.
