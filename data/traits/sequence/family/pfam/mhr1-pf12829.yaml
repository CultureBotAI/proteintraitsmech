identifier: Pfam:PF12829
label: Transcriptional regulation of mitochondrial recombination
definition: >-
  Saccharomyces cerevisiae Mhr1 (also known as Large ribosomal subunit protein mL67) promotes homologous DNA pairing and functions as a mitochondrial recombinase that mediates the predominant form of mtDNA replication and acts in mtDNA segregation and the repair of mtDNA double-stranded breaks (DSBs). This entry also includes the Mhr1 homologue, ML67, from Neurospora crassa. Both Mhr1 and ML67 have been shown to be localised on the mitoribosomal large subunit.
