identifier: Pfam:PF08038
label: TOM7 family
definition: >-
  This family consists of mitochondrial import receptor subunit TOM7. TOM7 forms part of the translocase of the outer mitochondrial membrane (TOM) complex and it appears to function as a modulator of the dynamics of the mitochondrial protein transport machinery by promoting the dissociation of subunits of the outer membrane translocase.
