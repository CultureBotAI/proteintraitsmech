identifier: Pfam:PF21947
label: Snake toxin cobra-type
definition: >-
  This family represents snake toxins, including short and long neurotoxins, cytotoxins and short toxins mainly from Naja genus of snakes (cobras). Cytotoxins (CTs, also known as cardiotoxins) are small (~60 amino acids) proteins that mediate their toxic effect through interaction with the cell membrane. Neurotoxins interfere with cholinergic transmission at postsynaptic sites in the peripheral and central nervous systems. Cobrotoxin binds to muscle nicotinic acetylcholine receptor (nAChR) and inhibit acetylcholine from binding to the receptor, thereby impairing neuromuscular transmission. In vivo rat model of arthritis, it showed anti-inflammation and immunosuppression effects. These toxins have three β-stranded loops resembling three fingers.
