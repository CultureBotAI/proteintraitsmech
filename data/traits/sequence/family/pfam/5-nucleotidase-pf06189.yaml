identifier: Pfam:PF06189
label: 5'-nucleotidase
definition: >-
  This family consists of both eukaryotic and prokaryotic 5'-nucleotidase sequences ( ), including cytosolic 5'-nucleotidase 1A and 1B (NT5C1A/NT5C1B) from mammals. NT5C1A/NT5C1B dephosphorylate the 5' and 2'(3')-phosphates of deoxyribonucleotides and help to regulate adenosine levels.
