identifier: Pfam:PF04943
label: Poxvirus F11 protein
definition: >-
  This entry represents the poxvirus Protein F11 from Vaccinia virus, also known as Protein OPG055, and similar sequences from poxvirus. They are early virus proteins. F11 stimulates increases in peripheral microtubule dynamics and may increase the motility of the infected cells, contributing to cell-to-cell spread of the virus. It seems to inhibit the signalling via the GTPase RHOA and DIAPH1/mDia.
