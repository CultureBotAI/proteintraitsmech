identifier: Pfam:PF05925
label: Enterobacterial virulence protein IpgD
definition: >-
  Some Gram-negative animal enteropathogens express a specialised secretion system to directly "inject" exotoxins into the cytoplasm of host cells. Dubbed the type III secretion system, it is of specific interest to researchers, as the components of such a system are only expressed in pathogenic strains. The system is composed of structural proteins and exotoxin effectors; these are often encoded on large virulence plasmids or on the bacterial chromosome itself. The IpgD and SopB virulence factor proteins, represented by this entry, are two such type III secretion system exotoxin effectors. In Shigella flexneri, IpgD is translocated directly into eukaryotic cells and acts as a potent inositol 4-phosphatase that specifically dephosphorylates phosphatidylinositol 4,5-bisphosphate [PtdIns(4,5)P(2)] into phosphatidylinositol 5-monophosphate [PtdIns(5)P], which then accumulates. Transformation of PtdIns(4,5)P(2) into PtdIns(5)P by IpgD is responsible for dramatic morphological changes of the host cell, leading to a decrease in membrane tether force associated with membrane blebbing and actin filament remodelling.
