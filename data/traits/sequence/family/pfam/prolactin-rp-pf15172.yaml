identifier: Pfam:PF15172
label: Prolactin-releasing peptide
definition: >-
  Prolactin-releasing peptide (PrRP) stimulates prolactin (PRL) release and regulates the expression of prolactin through its receptor GPR10. It may stimulate lactotrophs directly to secrete PRL.
