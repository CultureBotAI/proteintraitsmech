identifier: Pfam:PF05323
label: Poxvirus A21 Protein
definition: >-
  This entry represents A21 from Vaccinia virus, also known as Virion membrane protein OPG147, and similar proteins from poxvirus. A21 is an envelope protein part of the entry-fusion complex responsible for the virus membrane fusion with host cell membrane during virus entry. It also plays a role in cell-cell fusion (syncytium formation).
