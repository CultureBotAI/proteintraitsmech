identifier: Pfam:PF29773
label: YfkS membrane protein
definition: >-
  This entry represents YfkS , a 66 amino acid membrane protein from Bacillus subtilis. The protein contains a transmembrane helix. YfkS is found in proteins across Bacillales. The function of this protein remains to be determined.
