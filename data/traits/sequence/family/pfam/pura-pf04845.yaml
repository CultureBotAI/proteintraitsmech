identifier: Pfam:PF04845
label: PurA ssDNA and RNA-binding protein
definition: >-
  The purine-rich element binding (Pur) protein family protein consists of DNA-binding proteins from animals, plants and bacteria, including PURalpha/beta/gamma from humans, Pur-alpha 1 from Arabidopsis thaliana and Transcriptional/translational repressor BpuR from Borreliella burgdorferi. Human Pur-alpha is a highly conserved, sequence-specific DNA-and RNA-binding protein involved in diverse cellular and viral functions including transcription, replication, and cell growth. It has a modular structure with alternating three basic aromatic class I and two acidic leucine-rich class II repeats in the central region of the protein. BpuR binds DNA adjacent to the erp transcriptional promoter. It inhibits transcription from the promoter in combination with BpbA.
