identifier: Pfam:PF15183
label: Melanocortin-2 receptor accessory protein family
definition: >-
  This family of proteins is found in eukaryotes. Melanocortin-2 receptor accessory protein (MRAP) is required for MC2R expression in certain cell types, suggesting that it is involved in the processing, trafficking or function of MC2R. MRAP may be involved in the intracellular trafficking pathways in adipocyte cells.
