identifier: Pfam:PF25686
label: Betaherpesvirus U91 protein
definition: >-
  This entry represents the herpesvirus U91 protein, a membrane protein with two predicted transmembrane helices. U91 is found in HHV-6B, a betaherpesvirus that causes roseola in young children. The protein is localised to the host cell membrane as a multi-pass membrane protein, with transmembrane regions at positions 18-38 and 98-118. The specific function of U91 in viral infection and pathogenesis remains to be determined.
