identifier: Pfam:PF08092
label: 'Magi peptide toxin family '
definition: >-
  This family consists of Magi peptide toxins from spiders, including Magi 1, 2 and 5 from Macrothele gigas (Japanese funnel web spider). These insecticidal peptide toxins bind to sodium channels and induce flaccid paralysis when injected into lepidopteran larvae. However, these peptides are not toxic to mice when injected intracranially at 20 pmol/g.
