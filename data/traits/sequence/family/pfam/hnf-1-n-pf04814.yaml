identifier: Pfam:PF04814
label: Hepatocyte nuclear factor 1 (HNF-1), N terminus
definition: >-
  This domain consists of the N terminus of homeobox-containing transcription factor HNF-1. This region contains a dimerisation sequence and an acidic region that may be involved in transcription activation. Mutations and the common Ala/Val 98 polymorphism in HNF-1 cause the type 3 form of maturity-onset diabetes of the young (MODY3).
