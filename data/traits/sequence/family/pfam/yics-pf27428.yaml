identifier: Pfam:PF27428
label: YicS
definition: >-
  This entry represents the YicS protein family, found in Escherichia coli and related species, which is in average 100 amino acids in size. It has a signal peptide and two widely spaced invariant Cys residues. It has been suggested that this protein may have a significant role in biofilm formation, motility, invasion of CEC-32 and Hep-2 cells and pathogenicity.
