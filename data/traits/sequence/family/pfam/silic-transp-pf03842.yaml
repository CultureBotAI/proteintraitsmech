identifier: Pfam:PF03842
label: Silicon transporter
definition: >-
  Marine diatoms such as Cylindrotheca fusiformis encode at least six silicon transport protein homologues which exhibit similar size and topology. One characterised member of the family (Sit1) functions in the energy-dependent uptake of either silicic acid [Si(OH)4] or silicate [Si(OH)3O-] by a Na + symport mechanism. The system is found in marine diatoms, which make their "glass houses" out of silicon.
