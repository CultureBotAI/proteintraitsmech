identifier: Pfam:PF02495
label: Triple gene block 3
definition: >-
  Members of this family include TGBp3 proteins found in many plant viruses. Triple gene block 3 proteins (TGBp3) are involved in virus momvement. TGBp3 is an integral ER membrane protein with a single transmembrane domain, and a C-terminal region exposed to the cytosol. TGBp3 is able to target TGBp2 to the cortical ER tubules of the cell periphery through the sorting signal in the C-terminal region of TGBp3. Moreover, it plays a key role in virus cell-to-cell movement by enhancing the TGBp2- and TGBp3-dependent plasmodesmata (PD) localization of TGBp1; however, the enhancement is abolished when one of the two conserved Cys residues in the C-terminal region of TGBp3 is replaced with Ala.
