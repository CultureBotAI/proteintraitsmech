identifier: Pfam:PF30839
label: CDK inhibitor Rum1
definition: >-
  This entry represents the Rum1 family of cyclin-dependent kinase (CDK) inhibitors found in fungi. Rum1 was first characterised in fission yeast (Schizosaccharomyces pombe) where it functions as an inhibitor of the p34cdc2 mitotic kinase. Rum1 regulates progression through the G1 phase of the cell cycle by inhibiting CDK activity, thereby preventing premature entry into S phase and mitosis. Rum1 is a functional homologue of Sic1 in budding yeast. The protein is subject to periodic stabilisation and degradation during the cell cycle and is regulated by MAPK-mediated phosphorylation.
