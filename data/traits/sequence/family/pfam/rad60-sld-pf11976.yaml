identifier: Pfam:PF11976
label: Ubiquitin-2 like Rad60 SUMO-like
definition: >-
  This entry includes small ubiquitin-related modifier (SUMO) proteins. SUMOs are small proteins that are covalently attached to lysines as post-translational modifications and are used to control multiple cellular process including signal transduction, nuclear transport and DNA replication and repair. Unlike ubiquitin, they are not involved in protein degradation.
