identifier: Pfam:PF08129
label: Alpha/beta enterocin family
definition: >-
  This entry consists of the alpha enterocins and lactococcin G peptides. These peptides have some antimicrobial properties; they inhibit the growth of Enterococcus spp. and a few other Gram-positive bacteria. These peptides act as pore-forming toxins that create cell membrane channels through a barrel-stave mechanism and thus produce an ionic imbalance in the cell. This family of antimicrobial peptides belongs to the class II group of bacteriocin.
