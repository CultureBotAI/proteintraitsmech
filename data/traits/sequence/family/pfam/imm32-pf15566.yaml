identifier: Pfam:PF15566
label: Immunity protein 32
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved histidine residue. These proteins are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Ntox12 or Ntox37 or Notx 7 families.
