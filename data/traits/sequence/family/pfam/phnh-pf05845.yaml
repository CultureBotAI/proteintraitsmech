identifier: Pfam:PF05845
label: Bacterial phosphonate metabolism protein (PhnH)
definition: >-
  PhnH is an essential component of the C-P lyase core complex formed through the interaction with other Phn proteins (G, I and J). This core complex is involved in the C-P lyase pathway that converts phosphonate into 5-phosphoribosyl-alpha-1-diphosphate (PRPP) and is activated upon phosphate starvation in many bacterial species including Escherichia coli. In E. coli, the 14-cistron phn operon is required for phosphonate uptake and utilisation and encodes an ATP-binding cassette transporter (PhnC, PhnD, and PhnE), a regulatory protein (PhnF) and components required for enzymatic conversion of phosphonate into PRPP (PhnGHIJKLMNOP).
