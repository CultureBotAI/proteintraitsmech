identifier: Pfam:PF15972
label: Unpaired protein
definition: >-
  Unpaired (Upd) protein activates the JAK/STAT (Janus kinase/signal transducer and activator of transcription) pathway, an evolutionarily conserved signalling system that plays essential roles in numerous biological processes in vertebrates and invertebrates, including immunity, hematopoiesis and proliferation. In Drosophila, the unpaired family (Upd1-3) is the only class of ligands associated with JAK stimulation.
