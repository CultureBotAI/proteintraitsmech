identifier: Pfam:PF28101
label: Immunity protein CdiI-like
definition: >-
  This entry represents Immunity protein CdiI ( )from Escherichia coli and similar sequences from proteobacteria. Together with the elongation factor Tu (EF-Tu), CdiI exerts a unique ribonuclease activity that cleaves the single-stranded 3'-end from tRNAs that contain guanine discriminator nucleotides. EF-Tu is an essential and highly conserved translation factor that delivers aminoacyl-tRNAs (aa-tRNA) to the ribosome during protein synthesis. Structure studies suggest the toxin remodels the GTP:EF-Tu:aa-tRNA complexes to free the 3'-end of aa-tRNA for entry into the nuclease active site. CDI toxins, part of a a cellular contact-dependent growth inhibition (CDI) system, are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighbouring cells. CdiI immunity proteins are intracellular proteins that inactivate the toxin/effector protein. They are specific for their cognate CdiA-CT and do not protect cells from the toxins of other CDI bacteria. The CdiI immunity protein binds the CdiA toxin via its C-terminal domain to prevent auto-inhibition. Thus, CDI systems encode a complex network of toxin-immunity protein pairs that are deployed for intercellular competition.
