identifier: Pfam:PF23829
label: Family of unknown function (DUF7199)
definition: >-
  This family consists of several mycobacteriophage putative membrane proteins of around 99 amino acids in length, including Gene 76 protein from Mycobacterium phage L5. These proteins are characterised by an N-terminal transmembrane helix, a small central putative zinc-binding domain containing 2 conserved cysteine and 2 histidine residues and a disordered C-terminal region rich in basic and acidic residues. This entry also includes some uncharacterised bacterial proteins.
