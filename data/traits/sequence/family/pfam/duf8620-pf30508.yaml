identifier: Pfam:PF30508
label: Family of unknown function (DUF8620)
definition: >-
  This entry represents a small protein of approximately 80 to 130 residues found in cyanobacteria and photosynthetic eukaryotes. The family is present in Cyanobacteria (Oscillatoriales, Nostocales) and in photosynthetic eukaryotes including Chlorophyta (green algae) and Stramenopiles (Ochrophyta). The distribution across cyanobacteria and algae with secondary plastids suggests these proteins may be plastid-associated. The function of this family remains to be determined.
