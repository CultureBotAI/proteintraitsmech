identifier: Pfam:PF09673
label: Type-F conjugative transfer system pilin assembly protein
definition: >-
  This entry represents TrbC, a protein that is an essential component of the F-type conjugative pilus assembly system (aka type 4 secretion system) for the transfer of plasmid DNA. The N-terminal portion of these proteins is heterogeneous.
