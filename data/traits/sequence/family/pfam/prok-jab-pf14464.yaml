identifier: Pfam:PF14464
label: Prokaryotic homologs of the JAB domain
definition: >-
  This entry represents the JAB domain in prokaryotes. The domain is widely found in bacteria, archaea and phages. Its function is still not clear. However, in eukaryotes, JAB domain has been found in metalloenzymes that function as the ubiquitin isopeptidase/deubiquitinase in the ubiquitin-based signaling and protein turnover pathways. Prokaryotic proteins containing JAB domains are predicted to have a similar role in their cognates of the ubiquitin modification pathway. A distinct family, the RadC-like JAB domains are widespread in bacteria and are predicted to function as nucleases. In halophilic archaea, the JAB domain shows strong gene-neighbourhood associations with a nucleotidyltransferase suggesting a role in nucleotide metabolism. The archaeal (H. volcanii) JAB (also known as JAMM) domain containing protein, HvJAMM1, has been characterised. It cleaves ubiquitin-like small archaeal modifier proteins (SAMP1/2) from protein conjugates.
