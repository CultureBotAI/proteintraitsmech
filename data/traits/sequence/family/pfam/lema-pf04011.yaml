identifier: Pfam:PF04011
label: LemA family
definition: >-
  This family includes the magnetosome protein MamQ as well as a functionally uncharacterised protein called LemA which is predicted to be a transmembrane protein with an extracellular N terminus. MamQ has been shown to be essential for magnetosome formation.
