identifier: Pfam:PF10682
label: Glycoprotein of human cytomegalovirus HHV-5
definition: >-
  This entry represents glycoprotein UL40 from Human cytomegalovirus (HHV-5) (Human herpesvirus 5). HHV-5 has evolved mechanisms to interfere with a host's immune recognition, including targeting antigen presentation by MHC class I molecules. The signal sequence of the HHV-5 encoded UL40 polypeptide contains an HLA-E ligand identical with HLA-Cw*0304. The first 37 residues of UL40, including this ligand, are predicted to encode a signal peptide. The virus thus prevents the lysis by NK (natural killer) cells of the cell it has invaded.
