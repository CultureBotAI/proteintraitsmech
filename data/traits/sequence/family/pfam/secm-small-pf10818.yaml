identifier: Pfam:PF10818
label: secA translation cis-regulator SecM, small type
definition: >-
  In E. coli, SecM encodes a presecretory protein that regulates secA expression at the translational level. SecM contains a C-terminal sequence motif that induces a transient translation arrest. SecM signal peptide plays an essential role in this regulatory process by acting as a molecular timer that coordinates secM membrane targeting with the synthesis of the arrest motif.
