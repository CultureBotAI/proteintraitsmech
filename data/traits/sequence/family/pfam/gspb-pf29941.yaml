identifier: Pfam:PF29941
label: General secretion pathway protein B
definition: >-
  This entry represents GspB, a small transmembrane protein that is part of a cryptic type II secretion system operon found mainly in Enterobacteriaceae. The protein contains a single transmembrane helix and is approximately 139 amino acids in length. Under standard laboratory conditions, the gsp operon is silenced and not expressed in Escherichia coli K12, but can be derepressed to allow type II secretion pathway function. The specific role of GspB in the secretion pathway remains to be determined.
