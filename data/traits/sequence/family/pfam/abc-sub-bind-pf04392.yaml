identifier: Pfam:PF04392
label: ABC transporter substrate binding protein
definition: >-
  ABC transporters belong to the ATP-Binding Cassette (ABC) superfamily, which uses the hydrolysis of ATP to energize diverse biological systems. ABC transporters are minimally constituted of two conserved regions: a highly conserved ATP binding cassette (ABC) and a less conserved transmembrane domain (TMD). These regions can be found on the same protein or on two different ones. Most ABC transporters function as a dimer and therefore are constituted of four domains, two ABC modules and two TMDs. This family includes the tyrosine-binding protein from Clostridium difficile, which is probably part of an ABC transporter complex involved in tyrosine uptake and it may also import phenylalanine.
