identifier: Pfam:PF04491
label: Poxvirus T4 protein, N terminus
definition: >-
  This entry represents the N-terminal domain of T4 protein from Sheeppox virus, Protein OPG195 from Monkeypox virus, and similar sequences from poxvirus. T4 protein is thought to be secreted or retained in the endoplasmic reticulum if the protein also contains an additional C-terminal region ( ). M-T4 of myxoma virus ( ) is thought to protect infected lymphocytes from apoptosis and modulate the inflammatory response to virus infection. CPXV203 protein from Cowpox virus ( ) binds a wide array of proteins from the major histocompatibility complex class I (MHCI) in a pH dependent manner.
