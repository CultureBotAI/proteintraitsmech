identifier: Pfam:PF03392
label: Insect pheromone-binding family, A10/OS-D
definition: >-
  This entry represents the a group of insect proteins initially described as chemosensory proteins (CSPs) such as odorant-binding protein A10, also known as OS-D or pherokine-1, and ejaculatory bulb-specific protein 3 (PebIII), also known as pherokine-2. More recently, these have been renamed to 4-Cysteine Soluble Protein (4CSP) based on molecular characteristics, genomic mining, tissue distribution, and functional roles beyond those related to olfaction.
