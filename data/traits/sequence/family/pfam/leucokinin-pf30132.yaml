identifier: Pfam:PF30132
label: Leucokinin neuropeptide precursor
definition: >-
  This entry represents Leucokinin found in arthropods, particularly dipteran insects. The precursor protein contains a signal peptide and is processed to release the active leucokinin neuropeptide. Leucokinin acts as a diuretic hormone and functions through intracellular calcium signalling in Malpighian tubule stellate cells to raise chloride conductance. The mature peptide exhibits neuropeptide hormone activity and is involved in G protein-coupled receptor signalling pathways. The processed peptide undergoes C-terminal amidation, which is essential for biological activity. Leucokinin is expressed in neurosecretory cells and plays a role in body fluid secretion and regulation of feeding behaviour.
