identifier: Pfam:PF01659
label: Luteovirus putative VPg genome linked protein
definition: >-
  This entry represents movement protein (MVP) and related proteins in poleroviruses. MVP together with movement protein P3a, facilitates long-distance movement of virions in host. It transports the viral genome to neighbouring plant cells directly through plasmodesmata, without any budding. It allows efficient cell-to-cell propagation by bypassing the host cell wall barrier. Binds ssRNA. The nucleotide sequence of the RNA of Potato leafroll virus (PLrV) has been determined. The sequence contains six large ORFs. The 3' coding region encodes three polypeptides: a 23K coat protein, a 17K polypeptide encoded in a different frame, and a 53K polypeptide, immediately following the coat protein sequence in the same frame. It has been suggested that the 53K polypeptide is translated by readthrough of the amber termination codon of the coat protein gene. The amino acid sequences encoded within the 3' region show many similarities to analogous polypeptides of Barley yellow dwarf virus (BYDV), and Beet western yellows virus (BWYV). It is possible that the ORF5 protein is a VPG-precursor from which, at the onset of RNA synthesis, the VPG molecule is released, in a similar fashion to that proposed for Cowpea mosaic virus (CPMV).
