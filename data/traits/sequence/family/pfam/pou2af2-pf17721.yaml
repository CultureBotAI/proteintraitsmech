identifier: Pfam:PF17721
label: POU domain class 2-associating factor 2
definition: >-
  POU domain class 2-associating factor 2 (also known as Protein OCA-T1) is a transcriptional coactivator that specifically associates with POU2F3, forming a complex that drives the development of tuft cells, a rare chemosensory cells that coordinate immune and neural functions within mucosal epithelial tissues.
