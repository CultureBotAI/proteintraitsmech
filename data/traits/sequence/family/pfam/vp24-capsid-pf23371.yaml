identifier: Pfam:PF23371
label: Capsid protein Vp24
definition: >-
  This entry represents the capsid Vp24 protein from apple-latent spherical virus (ALSV) and related picorna-like plant viruses. This protein is encoded in a polyprotein that is cleaved into three proteins, Vp25, Vp20 and Vp24 which all have jellyroll fold and form one protomer; 60 copies of this unit compose one virion. Vp25, Vp20 and Vp24 contribute to capsid stabilisation. Vp24 form a pentameric protrusion around a fivefold axis, and the protrusion sits on a base of Vp25 and Vp20. Vp24 is more loosely held and is supported by Vp25 and Vp20.
