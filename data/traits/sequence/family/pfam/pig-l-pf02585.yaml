identifier: Pfam:PF02585
label: GlcNAc-PI de-N-acetylase
definition: >-
  Members of this family include N-acetylglucosaminyl-phosphatidylinositol de-N-acetylase ( ) that catalyses the second step in glycosylphosphatidylinositol (GPI) biosynthesis and 1D-myo-inositol 2-acetamido-2-deoxy-alpha-D-glucopyranoside deacetylase ( ), involved in the biosynthesis of mycothiol (an unusual thiol compound found in Actinobacteria).
