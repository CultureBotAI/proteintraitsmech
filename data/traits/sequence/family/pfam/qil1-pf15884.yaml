identifier: Pfam:PF15884
label: MICOS complex subunit MIC13, QIL1
definition: >-
  Mic13 (also known as Qil1) is a component of the MICOS complex, a large protein complex of the mitochondrial inner membrane that plays crucial roles in the maintenance of crista junctions, inner membrane architecture, and formation of contact sites to the outer membrane. Mic13 is required for MICOS complex stability and cristae morphology.
