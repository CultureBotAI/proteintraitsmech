identifier: Pfam:PF23776
label: Protein of unknown function (DUF7170)
definition: >-
  This family consists of several uncharacterised phage proteins of around 50 amino acids in length. The family is found in a variety of phages that infect bacterial hosts such as Escherichia, Salmonella, Klebsiella, Vibrio, Citrobacter, Shigella, Pseudomonas and Aeromonas. A few longer proteins of around 60-90 amino acids are also included.
