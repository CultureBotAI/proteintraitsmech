identifier: Pfam:PF25707
label: Herpesvirus UL78 G protein-coupled receptor
definition: >-
  This entry represents the UL78 G protein-coupled receptor (GPCR) found in human cytomegalovirus (HCMV) and related betaherpesviruses. UL78 is one of four viral GPCRs encoded by HCMV, along with US27, US28, and UL33. Unlike the other three viral GPCRs that show approximately 30% similarity to chemokine receptors, UL78 displays negligible similarity to any endogenous receptors. UL78 has been shown to form a unique homotrimeric architecture through an extensive interface covering transmembrane helices 3-6 and intracellular loops 1 and 2. This receptor can form heterodimers with human CXCR4 and CCR5, potentially interrupting normal signalling pathways. UL78 may also modulate the functions of other viral GPCRs and host GPCRs through oligomerisation. Despite being classified as an orphan receptor with no known chemokine ligands, UL78 is believed to regulate viral replication or reactivation.
