identifier: Pfam:PF06556
label: IAP-like protein p27 C-terminus
definition: >-
  This entry represents the C-terminal region of the African swine fever virus (ASFV) IAP-like protein p27. This domain is found in conjunction with . It has been suggested that the domain may be incoded by the gene involved in aspects of infection in the arthropod host, ticks of the genus Ornithodoros.
