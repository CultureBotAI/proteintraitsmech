identifier: Pfam:PF05374
label: Mu-Conotoxin
definition: >-
  This entry represents Mu-type conotoxins. Cone snail toxins, conotoxins, are small peptides with disulphide connectivity, that target ion-channels or G-protein coupled receptors. Based on the number and pattern of disulphide bonds and biological activities, conotoxins can be classified into several families. Omega, delta and kappa families of conotoxins have a knottin or inhibitor cystine knot scaffold. The knottin scaffold is a very special disulphide through disulphide knot, in which the III-VI disulphide bond crosses the macrocycle formed by two other disulphide bonds (I-IV and II-V) and the interconnecting backbone segments, where I-VI indicates the six cysteine residues starting from the N terminus. The disulphide bonding network as well as specific amino acids in inter-cysteine loops provide specificity of conotoxin. The cysteine arrangement is the same for omega, delta and kappa families, but omega conotoxins are calcium channel blockers, whereas delta conotoxins delay the inactivation of sodium channels and kappa conotoxins are potassium channel blockers. Mu conotoxins have two types of cysteine arrangement, but the knottin scaffold is not observed. Conotoxin gm9a, a putative 27-residue polypeptide encoded by Conus gloriamaris, has been shown to adopt an inhibitory cystine knot motif constrained by three disulphide bonds. Mu conotoxins target the voltage-gated sodium channels, preferential skeletal muscle, and are useful probes for investigating voltage-dependent sodium channels of excitable tissues. They differ on the primary structure level which also affect their three-dimensional structures, explaining their sodium channel subtype specificities.
