identifier: Pfam:PF15631
label: NTF2 fold immunity protein
definition: >-
  This entry represents the NTF2 fold domain. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, which usually contains toxin domains of the Tox-NucA family. This domain is also fused to ankyrin repeats and an uncharacterised domain ( ).
