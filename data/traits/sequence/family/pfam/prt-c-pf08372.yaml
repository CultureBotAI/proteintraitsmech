identifier: Pfam:PF08372
label: Plant phosphoribosyltransferase C-terminal
definition: >-
  This domain is found at the C terminus of a group of animal and plant proteins that belong to the family Multiple C2 domain and Transmembrane region Proteins (MCTPs), including Protein QUIRKY and FT-interacting protein 1/3/4 from Arabidopsis thaliana [ , , , and Multiple C2 and transmembrane domain-containing protein 1/2 from humans. Members of this group are generally involved in Ca2 signalling at the membrane and show calcium-ion dependent C2 domains ( ).
