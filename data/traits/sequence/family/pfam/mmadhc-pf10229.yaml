identifier: Pfam:PF10229
label: Methylmalonic aciduria and homocystinuria type D protein
definition: >-
  This entry represents methylmalonic aciduria and homocystinuria type D protein (also known as cobalamin trafficking protein CblD) and homologues. These proteins are involved in cobalamin (vitamin B12) metabolism and trafficking CblD plays a role in regulating the biosynthesis and the proportion of two coenzymes, methylcob(III)alamin (MeCbl) and 5'-deoxyadenosylcobalamin (AdoCbl). It also promotes the oxidation of cob(II)alamin bound to MMACHC.
