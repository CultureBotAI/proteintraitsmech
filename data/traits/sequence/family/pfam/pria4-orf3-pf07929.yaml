identifier: Pfam:PF07929
label: Plasmid pRiA4b ORF-3-like protein
definition: >-
  Members of this entry are similar to the protein product of ORF-3 ( ) found on plasmid pRiA4 in the bacterium Agrobacterium rhizogenes. This plasmid is responsible for tumorigenesis at wound sites of plants infected by this bacterium, but the ORF-3 product does not seem to be involved in the pathogenetic process. Other proteins found in this entry are annotated as being putative TnpR resolvases ( , ), but no further evidence was found to back this. Moreover, another member of this entry is described as a probable lexA repressor ( ) and in fact carries a LexA DNA binding domain ( ), but no references were found to expand on this.
