identifier: Pfam:PF30865
label: Uncharacterized protein C16C6.04
definition: >-
  This entry represents a family of uncharacterised proteins found primarily in Ascomycota fungi. The Schizosaccharomyces pombe member, SPBC16C6.04, localises to the nucleus and has been detected at sites of double-strand breaks. Some family members contain multiple copies of this domain. The function of this protein family remains to be determined.
