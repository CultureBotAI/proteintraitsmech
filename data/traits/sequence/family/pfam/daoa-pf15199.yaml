identifier: Pfam:PF15199
label: D-amino acid oxidase activator
definition: >-
  Members of this family were first described as activators of D-amino acid oxidase (DAO), however, it was later found that it acts as a repressor of DAO and SOD1 activity and promote their degradation. It may stimulate the degradation of DDO (D-aspartate oxidase). DAO catalyzes the oxidative deamination of D-3,4-dihydroxyphenylalanine (D-DOPA) and D-serine, a precursor of dopamine and a participant in glutamatergic transmission, respectively. Variation in the DAO activator gene have been associated with bipolar disorder and major depression, although other studies have cast doubt on such a link.
