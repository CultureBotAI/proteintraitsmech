identifier: Pfam:PF26211
label: Phage phiTE_072 family
definition: >-
  This entry represents an uncharacterised family of phage and bacterial proteins that includes Phage PhiTE protein PhiTE_072 ( ). The family includes proteins with either one (e.g. ) or two domains (e.g. ). Both classes of proteins share an N-terminal domain that contains a 4 or 5 stranded β-sheet. The fifth strand if present strand swaps with a homodimeric partner protein. A long α-helix from the C terminus of all proteins packs against this domain. In the two domain examples a second α-helical domain is inserted after the first domain but before the final α-helix.
