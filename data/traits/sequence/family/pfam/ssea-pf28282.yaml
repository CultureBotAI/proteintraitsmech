identifier: Pfam:PF28282
label: Type III secretion system chaperone SseA
definition: >-
  This entry represents the type III secretion system chaperone SseA and related proteins. SseA functions as a type III secretion system (T3SS) chaperone, which is required for SseB and SseD accumulation and secretion. It may have a direct role in secretion of SseB and SseD, or may facilitate their correct folding, for efficient secretion and function. It is required for survival and replication within epithelial cells and macrophages. SseA is required for translocation of Salmonella pathogenicity island-2 effectors into host cells.
