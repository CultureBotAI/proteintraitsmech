identifier: Pfam:PF26835
label: Phage T4 Y04K protein
definition: >-
  This entry represents protein y04K found in bacteriophages. The prototype is from bacteriophage T4, a 106 amino acid protein with a molecular weight of 12.6 kDa located in the pin-nrdC intergenic region. The protein is found in the T4 genome region between map positions 48.266 kb and 39.166 kb and remains uncharacterised. The function of this protein is unknown.
