identifier: Pfam:PF12580
label: 'Tripeptidyl peptidase II '
definition: >-
  This entry represents the second Ig-like domain found in the central region of tripeptidyl peptidase II (TPPII, MEROPS peptidase family S8A). TPPII is a crucial component of the proteolytic cascade acting downstream of the 26S proteasome in the ubiquitin-proteasome pathway. It is an amino peptidase belonging to the subtilase family removing tripeptides from the free N terminus of oligopeptides. It consists of three main parts: the N-terminal subtilisin-like domain ( ), a central domain and a C-terminal domain. According to the structures, the central domain can be subdivided into Ig-like and galactose-binding domain-like (GBD).
