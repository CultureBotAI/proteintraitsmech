identifier: Pfam:PF15870
label: ElonginA binding-protein 1
definition: >-
  This domain of unknown function is found in RNA exonuclease 1 homolog (also known as elongin A binding-protein 1) and similar proteins such as exonuclease GOR from mammals and pqe-1 from C.elegans. Pqe-1 is a putative RNA exonuclease which protects neurons from the toxic effects of expanded poly-Q disease proteins. It is unclear if this is through participation in the pathogenic mechanism underlying poly-Q-induced neurodegeneration or if it is by acting as a genetic modifier of the age of onset or progression of neurodegeneration. Pqe-1 regulates gene expression in neurons.
