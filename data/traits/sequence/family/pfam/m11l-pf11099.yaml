identifier: Pfam:PF11099
label: Apoptosis regulator M11L like
definition: >-
  This entry includes the poxvirus families F1 (also known as OPG045) and C10. C10 proteins are apoptosis regulators, which function to modulate the apoptotic cascades and thereby favour productive viral replication. One of these, M11L inhibits mitochondrial-dependent apoptosis by mimicking and competing with host proteins for the binding and blocking of Bak and Bax, two executioner proteins.
