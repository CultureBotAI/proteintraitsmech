identifier: Pfam:PF03556
label: Cullin binding
definition: >-
  This domain is found in the eukaryotic family defective in cullin neddylation, which includes DCN1 and DCN1-like proteins. Proteins of the DCN family may contribute to neddylation of cullin components of SCF-type E3 ubiquitin ligase complexes, which are multi-protein complexes required for polyubiquitination and subsequent degradation of target proteins by the 26S proteasome. The structure of this domain is composed entirely of α helices. It has been referred to as potentiating neddylation domain (PONY) and can be found in association with an N-terminal UBA domain. The PONY domain contains a cullin-binding surface within its C-terminal region and is sufficient to promote neddylation.
