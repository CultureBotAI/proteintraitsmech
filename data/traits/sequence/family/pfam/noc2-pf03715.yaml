identifier: Pfam:PF03715
label: Noc2p family
definition: >-
  In Saccharomyces cerevisiae, Nucleolar complex protein 2 (Noc2) forms a nucleolar complex with Mak21 that binds to 90S and 66S pre-ribosomes. It also forms a nuclear complex with Noc3 that binds to 66S pre-ribosomes. Both complexes mediate intranuclear transport of ribosomal precursors. In humans, Noc2 (also known as NIR) acts as an inhibitor of histone acetyltransferase activity; prevents acetylation of all core histones by the EP300/p300 histone acetyltransferase at p53/TP53-regulated target promoters in a histone deacetylases (HDAC)-independent manner. It also acts as a transcription corepressor of p53/TP53- and TP63-mediated transactivation of the p21/CDKN1A promoter. It is involved in the regulation of p53/TP53-dependent apoptosis. Nucleolar complex-associated protein 2 (Noc2) from Arabidopsis thaliana appears to be involved in pre-ribosome export from the nucleus to the cytoplasm. Also from A.thaliana, Protein REBELOTE influences floral meristem (FM) determinacy in an AGAMOUS and SUPERMAN-dependent manner, thus contributing to the floral developmental homeostasis.
