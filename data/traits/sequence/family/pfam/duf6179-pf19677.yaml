label: Family of unknown function (DUF6179)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001520) is described by MIBiG as an example of the polyketide biosynthetic class. It includes a member from the aurantinin B biosynthetic gene cluster from Bacillus subtilis. This family appears to be predominantly found in Firmicutes.
