identifier: Pfam:PF25187
label: CBASS inhibitor Acb3
definition: >-
  This entry represents the Acb3 family of phage proteins that inhibit bacterial CBASS defence systems. Acb3 wraps around the CD-NTase enzyme and makes extensive contact with both the nucleotidyltransferase active site and ligand binding domain. Despite low sequence similarity between different CD-NTases, Acb3 can inhibit diverse CBASS systems and even human cGAS.
