identifier: Pfam:PF01455
label: HupF/HypC family
definition: >-
  The large subunit of [NiFe]-hydrogenase, as well as other nickel metalloenzymes, is synthesised as a precursor devoid of the metalloenzyme active site. This precursor then undergoes a complex post-translational maturation process that requires a number of accessory proteins. The hydrogenase expression/formation and maturation proteins (HupF/HypC) form a family of small proteins that are hydrogenase precursor-specific chaperones required for this maturation process. They are believed to keep the hydrogenase precursor in a conformation accessible for metal incorporation.
