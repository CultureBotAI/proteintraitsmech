label: pORF2a truncated protein
definition: >-
  Most isolated ORF2 of TT virus (TTV) encode a 49 amino acid protein (pORF2a) because of an in-frame stop codon. ORF2s isolated from G1 TTV encode a 202 amino acid protein (pORF2ab).
