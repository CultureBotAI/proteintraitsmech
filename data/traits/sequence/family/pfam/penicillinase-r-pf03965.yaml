identifier: Pfam:PF03965
label: Penicillinase repressor
definition: >-
  Proteins in this entry are transcriptional regulators found in a variety of bacteria and a small number of archaea. Many are BlaI/MecI proteins which regulate resistance to penicillins (beta-lactams), though at least one protein ( ) appears to be involved in the regulation of copper homeostasis. BlaI regulators repress the expression of penicillin-degrading enzymes (penicillinases) until the cell encounters the antiobiotic, at which point repression ceases and penicillinase expression occurs, allowing cell growth. MecI regulators repress the expression of MecA, a cell-wall biosynthetic enzyme not inhibited by penicillins at clinically achievable concentrations, until the presence of the antibiotic is detected. At this point repression ends and MecA expression occurs which, together with the switching off of the penicillin-sensitive enzymes, allows the cell to grow despite the presence of antibiotic.
