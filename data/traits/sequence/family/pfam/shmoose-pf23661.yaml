identifier: Pfam:PF23661
label: SHMOOSE
definition: >-
  This protein family includes human Protein SHMOOSE, a 58-residues long micropeptide that increases neural cell metabolic activity and mitochondrial oxygen consumption rate rate. It shows increased expression in Alzheimer disease patient brains.
