identifier: Pfam:PF15127
label: Small membrane A-kinase anchor protein
definition: >-
  Small membrane A-kinase anchor protein (sm) AKAP binds to type I regulatory subunits of protein kinase A (PKA-RI) and anchors them to the plasma membrane. This way provides spatio-temporal specificity for cAMP-dependent protein kinase (PKA) signalling. Small membrane AKAP is localised at the plasma membrane via potential myristoylation/palmitoylation anchors.
