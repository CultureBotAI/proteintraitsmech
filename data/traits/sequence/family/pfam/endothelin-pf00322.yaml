identifier: Pfam:PF00322
label: Endothelin family
definition: >-
  Endothelins (ET's) are the most potent vasoconstrictors known. They stimulate cardiac contraction, regulate release of vasoactive substances, and stimulate mitogenesis in blood vessels in primary culture. They also stimulate contraction in almost all other smooth muscles (e.g., uterus, bronchus, vas deferensa and stomach) and stimulate secretion in several tissues (e.g., kidney, liver and adrenals). Endothelin receptors have also been found in the brain, e.g. cerebral cortex, cerebellum and glial cells. Endothelins have been implicated in a variety of pathophysiological conditions associated with stress, including hypertension, myocardial infarction, subarachnoid haemorrhage and renal failure. Endothelins are synthesised by proteolysis of large preproendothelins, which are cleaved to 'big endothelins' before being processed to the mature peptide. Sarafotoxins (SRTX) and bibrotoxin (BTX) are cardiotoxins from the venom of snakes of the Atractaspis family, structurally and functionally similar to endothelin. As shown in the following schematic representation, these peptides which are 21 residues long contain two intramolecular disulphide bonds. +-------------+ | | CxCxxxxxxxCxxxCxxxxxx | | +-------+ 'C': conserved cysteine involved in a disulphide bond.
