identifier: Pfam:PF27083
label: MazE/EndoAI antitoxin, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of MazE family antitoxins, which are components of type II toxin-antitoxin systems. This domain is distinct from the N-terminal ribbon-helix-helix (RHH) DNA-binding domain ( ) found in these proteins. In shorter MazE proteins from Staphylococcus species, this domain typically spans residues 17-56, while in longer also known as EndoAI proteins from Bacillus it spans approximately residues 55-92. MazE antitoxins function by binding to and inhibiting their cognate MazF toxins, which are endoribonucleases. The antitoxins form heterohexameric complexes with the toxins, composed of alternating toxin and antitoxin homodimers. This C-terminal domain is essential for the antitoxin function, as it directly interacts with the toxin to inhibit its endoribonuclease activity. Structural studies show that the antitoxin prevents RNA binding to the endoribonuclease, thereby neutralising the toxin. The domain contains critical residues for toxin interaction, with mutations in this region abolishing the antitoxin's ability to counteract toxin-mediated growth inhibition.
