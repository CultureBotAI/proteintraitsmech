identifier: Pfam:PF25188
label: Type I Thoeris inhibitor Tad6
definition: >-
  This entry represents the Tad6 family of phage proteins that inhibit the bacterial Type I Thoeris defence system. Like Tad3 and Tad4, Tad6 directly blocks the active site pocket of ThsB via a conserved loop region that interacts with the catalytic residues. Mutation of this loop impairs the anti-Thoeris function. This family also includes bacterial prophages.
