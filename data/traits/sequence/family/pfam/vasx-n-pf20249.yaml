identifier: Pfam:PF20249
label: VasX toxin N-terminal region
definition: >-
  This entry represents the N-terminal region of the Toxin VasX from Vibrio cholerae. VasX is a toxin secreted by the type VI (T6SS) secretion system that acts on prokaryotic target cells. Acts in conjunction with VasW, an accessory protein to VasX, to compromise the inner membrane of prokaryotic target cells.
