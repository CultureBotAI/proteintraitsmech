identifier: Pfam:PF08035
label: Opioids neuropeptide
definition: >-
  Pro-opiomelanocortin is present in high levels in the pituitary and is processed into 3 major peptide families: adrenocorticotrophin (ACTH); alpha-, beta- and gamma-melanocyte- stimulating hormones (MSH); and beta-endorphin. ACTH regulates the synthesis and release of glucocorticoids and, to some extent, aldosterone in the adrenal cortex. It is synthesised and released in response to corticotrophin-releasing factor at times of stress (i.e. heat, cold, infection, etc.), its release leading to increased metabolism. The action of MSH in man is poorly understood, but it may be involved in temperature regulation. Full activity of ACTH resides in the first 20 N-terminal amino acids, the first 13 of which are identical to alpha-MSH. This region corresponds to the conserved YGG motif that is found in a wide variety of opioid neuropeptides such as enkephalin
