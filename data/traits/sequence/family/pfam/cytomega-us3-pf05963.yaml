identifier: Pfam:PF05963
label: Cytomegalovirus US3 protein
definition: >-
  Unique short glycoprotein 2 (US2) and US3 are Herpesviral proteins that interfere with the expression of major histocompatibility complex (MHC) class I molecules on the surface of infected cells. US2 is an endoplasmic reticulum resident transmembrane protein that binds to newly synthesized MHC class I heavy chains in the endoplasmic reticulum, redirecting them to the cytosol for proteasome-dependent destruction, thereby preventing their expression at the cell surface. US3 is similarly an endoplasmic reticulum resident transmembrane glycoprotein that binds MHC class I molecules and prevents their departure. The endoplasmic reticulum retention signal of the US3 protein is contained in the luminal domain of the protein.
