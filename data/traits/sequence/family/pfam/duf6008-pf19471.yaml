definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000112) is described by MIBiG as an example of the following biosynthetic class, polyketide. This family includes a protein from the neocarzinostatin biosynthetic gene cluster from Streptomyces carzinostaticus subsp. neocarzinostaticus and appears to be restricted to Actinobacteria.
