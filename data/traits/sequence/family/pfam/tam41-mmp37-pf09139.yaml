identifier: Pfam:PF09139
label: Phosphatidate cytidylyltransferase, mitochondrial
definition: >-
  Tam41 is a mitochondrial phosphatidate cytidylyltransferase (CDP-DAG synthase) that catalyzes the formation of CDP-diacylglycerol (CDP-DAG) from phosphatidic acid (PA) in the mitochondrial inner membrane. It is required for the biosynthesis of the dimeric phospholipid cardiolipin, which stabilizes supercomplexes of the mitochondrial respiratory chain in the mitochondrial inner membrane.
