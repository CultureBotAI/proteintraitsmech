identifier: Pfam:PF08652
label: RAI1 like PD-(D/E)XK nuclease
definition: >-
  Yeast RAI1 is homologous to Caenorhabditis elegans DOM-3 and human DOM3Z (DXO). They have both decapping and 5'-3' exoribonuclease activity and are a component of the mRNA 5'-end capping quality control mechanism. RAI1 is a single-copy gene in most organisms; however S. cerevisiae contains a second homologue, DXO1, which also possesses decapping and 5'-3' exoribonuclease activity, whereas RAI1 has decapping and pyrophosphohydrolase activities. This domain is also found in DXO1 homologue from Arabidopsis.
