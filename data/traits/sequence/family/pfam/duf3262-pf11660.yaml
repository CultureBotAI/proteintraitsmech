identifier: Pfam:PF11660
label: Protein of unknown function (DUF3262)
definition: >-
  This entry represents small, hydrophobic proteins that are found occasionally on plasmids such as the Pseudomonas putida TOL (toluene catabolic) plasmid pWWO_p085. Usually, however, they are found on the bacterial main chromosome in regions flanked by markers of conjugative transfer and/or transposition.
