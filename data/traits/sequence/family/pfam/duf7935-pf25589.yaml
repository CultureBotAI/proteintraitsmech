identifier: Pfam:PF25589
label: Family of unknown function (DUF7935)
definition: >-
  This entry represents an uncharacterised protein family. Structure prediction suggests that these proteins form a membrane bound octameric complex. The N terminus of the protein contains an transmembrane α helix and the rest of the protein adopts a four helical bundle domain. This family is often found associated with gliding motility proteins in STRING networks.
