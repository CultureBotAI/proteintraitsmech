identifier: Pfam:PF30276
label: Arminin antimicrobial peptide precursor
definition: >-
  This entry represents the Arminin family of antimicrobial peptide precursors found in freshwater cnidarians mainly found in the genus Hydra. The precursor proteins contain a signal peptide, a propeptide region, and a C-terminal mature antimicrobial peptide that undergoes amidation. The mature Arminin peptides display broad-spectrum bactericidal activity against both Gram-positive and Gram-negative bacteria, including multiresistant pathogens such as methicillin-resistant Staphylococcus aureus (MRSA) and vancomycin-resistant enterococci. The peptides maintain antibacterial activity under physiological salt conditions. Arminins are expressed in the entodermal epithelium and are secreted as part of the innate immune response.
