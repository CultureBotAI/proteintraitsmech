identifier: Pfam:PF13853
label: Olfactory receptor
definition: >-
  The olfactory system is a highly specialised chemical recognition system that, like the immune system, is capable of discriminating with tremendous sensitivity between numerous foreign molecules in the environment. Olfactory transduction is believed to be initiated by the binding of odorants to specific receptor proteins in the cilia of olfactory receptor cells. Although little is known about the precise mechanism by which odorant binding might initiate membrane depolarisation, it is believed that cyclic AMP may serve as an intracellular messenger for olfactory transduction. Olfactory receptors are integral membrane proteins that belong to the seven transmembrane (TM) rhodopsin-like G-protein coupled receptor family. Although the sequences of these proteins are very diverse, reflecting to some extent their broad range of activating ligands, nevertheless, motifs have been identified in the TM regions that are characteristic of virtually the entire superfamily. Amongst the exceptions are the olfactory receptors, which cluster together in a subfamily that lacks significant matches with TM domains 2, 4, and 6. Olfactory receptor genes form the largest known multigene family in the human genome. Each olfactory receptor can only interact with a subset of all potential odorants and a single odorant can activate multiple olfactory receptors, which enables a central neural logic of olfaction where the perception of smell arises from the combinatorial activity of multiple unique olfactory receptors that respond to an individual odorant. The structure of the human odorant receptor OR51E2 has been determined to be bound to the fatty acid propionate, which is bound within an occluded pocket in OR51E2 and makes specific contacts critical to receptor activation. Therefore, it is sugg…
