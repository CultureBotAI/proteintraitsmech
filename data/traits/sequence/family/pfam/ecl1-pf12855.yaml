identifier: Pfam:PF12855
label: TORC1 inhibitor Ecl family
definition: >-
  This family is involved in the chronological life-span (CLS) of yeast. Over-expression leads to an extended viability of wild-type strains, indicating a role in regulation. There are four cysteine residues conserved in the N-terminal region involved in zinc binding and have been shown to be essential for protein functions. Ecl family proteins are essential for sexual development caused by zinc depletion in S. pombe. They are also important for cellular response to zinc limitation. Ecl family genes are involved in not only CLS extension but also cellular responses, such as stress tolerance, autophagy, cell cycle arrest, and sexual differentiation, under conditions of starvation of various nutrients, including metals. Ecl family proteins from fission yeast were reported as novel factors that suppressed the target of rapamycin (TOR) complex 1 (TORC1), an evolutionarily conserved nutrient-sensing kinase. Ecl1 physically interacts with TORC1 subunit RAPTOR (Mip1), suggesting that TORC1 suppression by Ecl1 occurs through this physical interaction.
