identifier: Pfam:PF04166
label: Pyridoxal phosphate biosynthetic protein PdxA
definition: >-
  This entry represents the PdxA family. PdxA is an NAD+-dependent 4-hydroxythreonine 4-phosphate dehydrogenase ( ) active in pyridoxal phosphate biosynthesis. PdxA2, a functional paralogue of PdxA, catalyzes the NAD-dependent oxidation and subsequent decarboxylation of D-erythronate 4-phosphate to produce dihydroxyacetone phosphate (DHAP). It can also use D-threonate 4-phosphate as substrate. This family also includes TphB, involved in terephthalate degradation.
