identifier: Pfam:PF06903
label: VirK protein
definition: >-
  This domain is found in uncharacterised proteins mainly from Trypanosomatidae species. It is predicted to fold into a β-barrel structure that is reminiscent to the β-barrel observed in VirK family proteins . These two barrels, however, relate not only by circular permutation but also by strand flip with a change of directionality.
