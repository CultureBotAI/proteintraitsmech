identifier: Pfam:PF00453
label: Ribosomal protein L20
definition: >-
  This entry represents the large ribosomal subunit protein family bL20 that contains members from eubacteria, as well as their mitochondrial and plastid homologs. bL20 is an assembly protein, required for the first in vitro reconstitution step of the 50S ribosomal subunit, but does not seem to be essential for ribosome activity. bL20 has been shown to partially unfold in the absence of RNA, in regions corresponding to the RNA-binding sites. bL20 represses the translation of its own mRNA via specific binding to two distinct mRNA sites, in a manner similar to the bL20 interaction with 23S ribosomal RNA. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like projecti…
