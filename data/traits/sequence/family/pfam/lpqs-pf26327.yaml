identifier: Pfam:PF26327
label: Lipoprotein LpqS family
definition: >-
  This family includes Lipoprotein LpqS from Mycobacterium tuberculosis and similar proteins from actinomycetes. LpqS is implicated in the replication and survival of Mycobacterium tuberculosis within host cells. This suggests a potential role in the pathogen's ability to persist and proliferate during infection, which could be critical for its pathogenicity and the progression of tuberculosis.
