identifier: Pfam:PF05727
label: Uncharacterised protein family (UPF0228)
definition: >-
  This small family of proteins is currently restricted to Methanosarcina species. Members of this family are about 200 residues in length, except for that has two copies of this region. Although the function of this region is unknown the pattern of conservation suggests that this may be an enzyme, including multiple conserved aspartate and glutamate residues. The most conserved motif in these proteins is NEL/MEXNE/D, where X can be any amino acid, and is found at the C terminus of these proteins.
