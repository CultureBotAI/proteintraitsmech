identifier: Pfam:PF04208
label: 'Tetrahydromethanopterin S-methyltransferase, subunit A '
definition: >-
  Tetrahydromethanopterin S-methyltransferase is a complex that catalyses the formation of methyl-coenzyme M and tetrahydromethanopterin from coenzyme M and methyl-tetrahydromethanopterin in methanogenic archaea. It is a membrane-associated enzyme complex that uses the methyl-transfer reaction to drive a sodium-ion pump. The complex is composed of eight different subunits, MtrA-H. Subunit A (MtrA) harbours a corrinoid as prosthetic group. MtxA from Methanosarcina is a putative methyltransferase with sequence homology to MtrA. Both show a conserved histidine (His84) at the putative active site.
