identifier: Pfam:PF05591
label: Type VI secretion system, VipA, VC_A0107 or Hcp2
definition: >-
  This entry includes TssB1, which is a sheath protein of the bacterial type VI secretion system (T6SS). The type VI secretion system (T6SS), also known as CIS contractile injection system, is a supra-molecular bacterial complex that resembles phage tails. It is a toxin delivery systems which fires toxins into target cells upon contraction of its TssBC sheath. Thirteen essential core proteins are conserved in all T6SSs: the membrane associated complex TssJ-TssL-TssM, the baseplate proteins TssE, TssF, TssG, and TssK, the bacteriophage-related puncturing complex composed of the tube (Hcp), the tip/puncturing device VgrG, and the contractile sheath structure (TssB and TssC). Finally, the starfish-shaped dodecameric protein, TssA, limits contractile sheath polymerization at its distal part when TagA captures TssA.
