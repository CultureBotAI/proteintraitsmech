identifier: Pfam:PF05811
label: Eukaryotic protein of unknown function (DUF842)
definition: >-
  This family represents human TIM double twin CX3C motif chaperone (TIMCC) and similar FAM136A proteins from animals and plants. TIMCC is a disulphide relay substrate that contributes to proteostasis maintenance of the mitochondrial intermembrane space (IMS). Its structural prediction shows a bundle of three α-helical segments, the interaction of which is stabilised by two twin-CxxxC motifs that mediate disulphide bridges and are oxidised at steady state via MIA40 during its import. These CxxxC motifs are hallmarks of the family of small chaperones TIM. Its depletion upregulates ROS production, reduces mitochondrial membrane potential and ATP production and results in increased expression of cytochrome c proteins and enzymes involved in gluconeogenesis and ketogenesis, decreased expression of holocytochrome c synthase (HCCS), and lower ratio of haem/cytochrome c proteins. In humans, FAM136A has been related to Meniere's disease, a complex disorder of the inner ear.
