identifier: Pfam:PF24091
label: Family of unknown function (DUF7376)
definition: >-
  This entry represents a family of uncharacterised phage proteins. Structure prediction suggests these protein may form a homodimer. The dimer contains a large circular channel that is positively charged suggesting a possible DNA-binding function. This entry also includes some prophages from bacterial species.
