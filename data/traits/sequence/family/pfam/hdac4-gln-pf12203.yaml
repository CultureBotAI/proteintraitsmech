identifier: Pfam:PF12203
label: Glutamine rich N terminal domain of histone deacetylase 4
definition: >-
  This domain is found in eukaryotic histone deacetylases, and is approximately 90 amino acids in length. The domain forms an α helix, which complexes to form a tetramer. The glutamine rich domains have many intra- and inter-helical interactions that are thought to be involved in reversible assembly and disassembly of proteins.
