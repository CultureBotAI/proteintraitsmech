identifier: Pfam:PF09795
label: Autophagy-related protein 31
definition: >-
  Autophagy is an intracellular degradation system that responds to nutrient starvation. Atg31 has been shown to be required for autophagosome formation in Saccharomyces cerevisiae. It functions with Atg17 and Atg29 at the preautophagosomal structure (PAS) in order to form normal autophagosomes under starvation conditions.
