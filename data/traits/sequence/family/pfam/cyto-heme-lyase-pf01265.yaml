identifier: Pfam:PF01265
label: Cytochrome c/c1 heme lyase
definition: >-
  Holocytochrome c-type synthase (HCCS, also known as cytochrome c-type heme lyase) ( ) and holocytochrome-c1 synthase (CC1HL, also known as cytochrome c1 heme lyase) are mitochondrial enzymes that catalyse the covalent attachment of a haem group on two cysteine residues of cytochrome c and c1. These two enzymes are functionally and evolutionary related. There are two conserved regions, the first is located in the central section and the second in the C-terminal section. These enzymes contain a conserved histidine, which is key to interact with the heme iron and to form the HCCS:heme complex, the platform for interaction with apocytochrome c.
