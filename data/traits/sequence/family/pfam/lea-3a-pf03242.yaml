identifier: Pfam:PF03242
label: Late embryogenesis abundant protein (LEA_3a subfamily)
definition: >-
  This entry represents Lea5(D73) by LEA-3. Proteins in this entry includes LEA5 from Citrus sinensis, whose expression is induced by salt, drought and heat stress. This entry also includes At4g02380 (SAG21), At1g02820 (LEA2), At3g53770 (LEA37) and At4g15910 (LEA41) from Arabidopsis. LEA (late embryogenesis abundant) proteins were first identified in land plants. Plant LEA proteins have been found to accumulate to high levels during the last stage of seed formation (when a natural desiccation of the seed tissues takes place) and during periods of water deficit in vegetative organs. Later, LEA homologues have also been found in various species. They have been classified into several subgroups in Pfam and according to Bray and Dure.
