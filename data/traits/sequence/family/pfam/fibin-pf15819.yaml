identifier: Pfam:PF15819
label: Fin bud initiation factor homologue
definition: >-
  Fin bud initiation factor (Fibin) forms disulfide-linked homodimers. It seems to also exist as monomers. It localises in endoplasmic reticulum and golgi apparatus. In zebrafish, Fibin is essential for the initiation of pectoral fin bud formation. It potentially acts downstream of retinoic acid and Wnt signaling and is required for tbx5 expression in the lateral plate mesoderm of presumptive pectoral fin bud regions. In mammals is expressed in cerebellum, skeletal muscle and other embryonic and adult tissues, suggesting a relevant role during embryogenesis and adult life.
