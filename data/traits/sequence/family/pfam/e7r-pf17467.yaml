identifier: Pfam:PF17467
label: Viral Protein E7
definition: >-
  This domain is found in protein E7 (also known as OPG069) from Vaccinia, Variola and Monkeypox viruses. Vaccinia virus (VV) is a large double-stranded DNA virus that replicates in the cytoplasm of infected cells. Many viruses express proteins that are modified by myristic acid. Myristic acid is a 14-carbon fatty acid that is cotranslationally transferred to the penultimate glycine residue found within the consensus sequence MGXXX(S/T/A/C/N) (where X is any amino acid) at the amino terminus of target proteins. E7R proteins in Vaccina virus have been shown to be myristylated. The expressed E7R protein has also been found to reside within mature infectious virions.
