identifier: Pfam:PF19315
label: Mesaconyl-CoA hydratase
definition: >-
  This entry includes Mesaconyl-CoA hydratase from bacteria and archaea, which is involved in the methylaspartate cycle. It catalyses the reversible hydration of mesaconyl-CoA to yield beta-methylmalyl-CoA. This enzyme belongs to the HotDog superfamily and contains two HotDog domains and it is is closely related to MaoC dehydratase.
