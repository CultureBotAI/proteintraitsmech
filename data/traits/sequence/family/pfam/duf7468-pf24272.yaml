identifier: Pfam:PF24272
label: Family of unknown function (DUF7468)
definition: >-
  This entry represents a conserved protein family found in cyanophages that infect marine Synechococcus and Prochlorococcus. The function of this protein is unknown. It is typically 70-100 amino acids in length. The protein appears to be specific to cyanophages and is not found in their cyanobacterial hosts.
