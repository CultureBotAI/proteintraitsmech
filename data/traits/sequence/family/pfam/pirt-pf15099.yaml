identifier: Pfam:PF15099
label: Phosphoinositide-interacting protein family
definition: >-
  Phosphoinositide-Binding Protein (PIRT) is thought to have a role in positively regulating transient receptor potential vanilloid 1 (TRPV1) channel activity via phosphatidylinositol 4,5-bisphosphate (PIP2). TRPV1 is a molecular sensor of noxious heat and capsaicin. PIRT is predicted to be a multi-pass membrane protein and is located in the cell membrane.
