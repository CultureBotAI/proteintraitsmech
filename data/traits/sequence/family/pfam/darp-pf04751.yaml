identifier: Pfam:PF04751
label: Dual-action ribosomal maturation protein DarP
definition: >-
  The entry represents the Dual-action ribosomal maturation protein DarP (also known as YjgA) from Escherichia coli and related proteins. This protein binds pre-50S ribosomal subunits near the 23S rRNA L1 stalk, where it may mediate correct positioning of the L1 stalk. It plays a dual role in the late stages of assembly of the 50S ribosomal subunit where it promotes peptidyl transferase centre maturation by modulating the docking of 23S rRNA helix H68, and maintains the stability of helix H89 with the help of uL16 (rplP), facilitating the final maturation of the peptidyl transferase centre.
