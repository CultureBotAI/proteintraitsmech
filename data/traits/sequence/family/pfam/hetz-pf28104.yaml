identifier: Pfam:PF28104
label: Heterocyst differentiation protein HetZ-like
definition: >-
  This entry represents HetZ, a heterocyst differentiation protein from Anabaena sp., and related proteins found mainly in cyanobacteria. HetZ is among the most important factors involved in heterocyst differentiation. HetZ functions in the patterning stage of differentiation. Deletion of hetZ fails to express the developmental genes hetR, patS, hetP and hetZ correctly and fails to produce heterocysts.
