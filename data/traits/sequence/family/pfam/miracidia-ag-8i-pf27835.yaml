identifier: Pfam:PF27835
label: Immunogenic miracidial antigen 8I'
definition: >-
  Antigens of schistosome eggs are released from live and dead eggs that are trapped in host tissue. Many such egg antigens, a large portion of which are presumed to originate from the enclosed miracidia, elicit a host-immune response during infections. Several immunopositive clones have been isolated; three of these were studied in detail and found to contain members of a large, closely related gene family encoding an immunogenic miracidial antigen. At least two members of this family are tightly linked to the Schistosoma japonicum (blood fluke) genome. The fact that there are so many gene copies encoding this antigen, which is reactive with both chronically infected human and mouse sera, make this a potentially important antigen.
