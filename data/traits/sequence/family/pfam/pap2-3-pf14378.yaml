identifier: Pfam:PF14378
label: PAP2 superfamily
definition: >-
  This entry includes a group of inositolphosphotransferases, including inositol phosphorylceramide synthase catalytic subunit Aur1 and inositolphosphotransferase 1 (Ipt1) from S. cerevisiae. Aur1 is a catalytic component of the inositol phosphorylceramide synthase which catalyses the addition of a phosphorylinositol group onto ceramide to form inositol phosphorylceramide, an essential step in sphingolipid biosynthesis. Ipt1 is involved in synthesis of mannose-(inositol-P)2-ceramide (M(IP)2C), the most abundant and complex sphingolipid in S. cerevisiae. This entry also includes some uncharacterised archaeal and bacterial proteins.
