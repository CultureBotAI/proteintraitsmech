identifier: Pfam:PF25693
label: Bacteriophage T4-like Y01A protein
definition: >-
  This entry represents a family of small proteins found in T4-like bacteriophages, including Y01A proteins. The function of these proteins is currently unknown. The proteins are approximately 12 kDa in size and are highly conserved across a wide range of phages that infect different bacterial hosts, including Enterobacteria, Acinetobacter, Shewanella, Klebsiella, and other Gram-negative bacteria. Structure prediction suggests that these proteins are composed of a small β-sheet of three strands packed with two α-helices, with an additional β-hairpin between the two helices. Structure prediction also suggests these proteins are likely to form homodimers.
