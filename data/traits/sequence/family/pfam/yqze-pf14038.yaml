identifier: Pfam:PF14038
label: YqzE-like protein
definition: >-
  This entry represents forespore factor SpoIIIL and related proteins. SpoIIIL acts as a forespore-specific factor that contributes to the cell-cell signalling pathway leading to sigma K activation in the mother cell. It is required for efficient accumulation of peptidoglycan precursors at intermediate stages of development and for efficient SpoIVB activity and pro-sigma K processing. SpoIIIL may contribute to the activity of SpoIVB, a secreted forespore protease that initiates the signalling pathway required for processing of inactive pro-sigma K to active sigma K in the mother cell, which in turn up-regulates peptidoglycan precursor synthesis required for cortex formation. Additionally, SpoIIIL helps maintain forespore differentiation and sigma G activity; however, it is not required for sigma G activation per se. This entry also includes YqzE-like proteins, including B. subtilis YqzE protein , which is functionally uncharacterised. It is a part of the ComG operon, which is regulated by the competence transcription factor ComK.
