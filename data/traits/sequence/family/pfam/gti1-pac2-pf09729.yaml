identifier: Pfam:PF09729
label: Gti1/Pac2 family
definition: >-
  This entry represents global transcription factors found in fungi. In Schizosaccharomyces pombe the Gti1 protein promotes the onset of gluconate uptake upon glucose starvation. The Pac2 protein controls the onset of sexual development by inhibiting the expression of ste11 in a pathway that is independent of the cAMP cascade. Sge1 is a global transcriptional regulator of pathogenicity. It acts as an activator of parasitic growth. It is not essential for colonisation or penetration of the root surface but is required for expression of genes encoding effectors that are secreted during infection. It is involved in conidiogenesis but is not required for conidial fitness, overall (colony) morphology, vegetative growth or carbon source utilisation.
