identifier: Pfam:PF05394
label: Avirulence protein
definition: >-
  This entry represents the avirulence B and C proteins from Pseudomonas syringae and related proteins from Xanthomonas campestris. avrB and avrC encode these proteins, which are 36 and 39 kilodaltons in size respectively. Pathogenic bacterial effectors suppress pathogen-associated molecular pattern (PAMP)-triggered host immunity, thereby promoting parasitism. AvrB suppresses PAMP-triggered immunity (PTI) through RAR1, which is for effector-triggered immunity (ETI).
