identifier: Pfam:PF04484
label: QWRF family
definition: >-
  The plant augmin complex is involved in assembly of microtubules (MT) arrays during mitosis and contains eight subunits (AUG1 -AUG8). Among them, AUG1 to AUG6 share similarity with their animal counterparts, but AUG7 and AUG8 share homology only with proteins of plant origin. AUG8 belongs to the plant QWRF motif-containing protein family, which also includes microtubule-associated protein ENDOSPERM DEFECTIVE 1 and SNOWY COTYLEDON 3. AUG8 binds the microtubule and participates in the reorientation of microtubules in hypocotyls (the stem of a germinating seedling).
