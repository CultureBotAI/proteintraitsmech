identifier: Pfam:PF24175
label: SU10 adaptor protein
definition: >-
  This entry represents adaptor proteins found in SU10-like bacteriophages and prophages. The dodecamer of SU10 adaptor proteins forms the interface between the dodecamer of portal proteins and hexamer of nozzle proteins. The adaptor complex provides six attachment sites for long tail fibres, each of which is formed by a trimer of long tail fibre proximal proteins and a trimer of long tail fibre distal proteins. The adaptor protein of SU10 has the same domain organisation as those of phages T7 and KP32. Its structure consists of an α-helical bundle domain composed of intertwined N- and C-terminal helices; and a β-sandwich long tail fibre dock domain.
