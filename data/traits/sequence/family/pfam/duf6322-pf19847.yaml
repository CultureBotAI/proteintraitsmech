identifier: Pfam:PF19847
label: Family of unknown function (DUF6322)
definition: >-
  This family of proteins, predominantly found in Caudovirales, is functionally uncharacterised. Proteins in this family are approximately 150 amino acids in length. There are conserved sequences: ETINSMDYNTGY at the N-terminal, WTG in the centre and TDTTS at the C-terminal.
