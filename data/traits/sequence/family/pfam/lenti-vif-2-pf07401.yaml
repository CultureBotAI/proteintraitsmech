identifier: Pfam:PF07401
label: Bovine Lentivirus VIF protein
definition: >-
  This family consists of several Lentivirus viral infectivity factor (VIF) proteins. VIF is known to be essential for ability of cell-free virus preparation to infect cells. Members of this family are specific to Bovine immunodeficiency virus (BIV) and Jembrana disease virus (JDV) which also infects cattle.
