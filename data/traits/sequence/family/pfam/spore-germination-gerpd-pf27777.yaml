identifier: Pfam:PF27777
label: Putative spore germination protein GerPD
definition: >-
  This entry represents a predicted spore germination protein GerPD. They are required for the formation of functionally normal spores. They could be involved in the establishment of normal spore coat structure and/or permeability, which allows the access of germinants to their receptor. Members are mainly found in Bacillales.
