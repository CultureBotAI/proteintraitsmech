identifier: Pfam:PF15461
label: Beta-carotene 15,15'-dioxygenase
definition: >-
  This prokaryotic integral membrane protein family includes Brp (bacterio-opsin related protein) and Blh (Brp-like protein). Bacteriorhodopsin is a light-driven proton pump consisting of the membrane apoprotein bacterioopsin and a covalently bound retinal cofactor that appears to be derived of beta-carotene. Blh has been shown to cleave beta-carotene to produce two all-trans retinal molecules. It has been suggested that Brp and Blh are similar proteins that catalyze or regulate the conversion of beta-carotene to retinal. Mammalian enzymes with similar enzymatic function are not multiple membrane spanning proteins and are not homologous.
