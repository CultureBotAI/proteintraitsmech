identifier: Pfam:PF30011
label: ER export of PMA1 protein 1
definition: >-
  This entry represents ER export of PMA1 protein 1 (EXP1). EXP1 functions as a specific cargo receptor protein for the plasma membrane ATPase PMA1 and acts with PSG1 to promote the transport and maturation of PMA1. EXP1 and PSG1 act sequentially to promote PMA1 sorting between the ER and the Golgi, with EXP1 promoting PMA1 export from the ER to the Golgi. The protein is a single-pass type I membrane protein that cycles between the ER and the Golgi apparatus via COPI and COPII-coated vesicles. EXP1 interacts with PMA1 and PSG1, and its disruption leads to ER retention of PMA1.
