identifier: Pfam:PF05038
label: Cytochrome Cytochrome b558 alpha-subunit
definition: >-
  Flavocytochrome b558 is the catalytic core of the respiratory-burst oxidase, an enzyme complex that catalyzes the NADPH-dependent reduction of O2 into the superoxide anion O2 in phagocytic cells. Flavocytochrome b558 is anchored in the plasma membrane. It is a heterodimer that consists of a large glycoprotein gp91phox (phox forphagocyte oxidase) (beta subunit) and a small protein p22phox (alpha subunit). The other components of the respiratory-burst oxidase are water-soluble proteins of cytosolic origin, namely p67phox, p47phox, p40phox and Rac. Upon cell stimulation, they assemble with the membrane-bound flavocytochrome b558 which becomes activated and generates O2-.
