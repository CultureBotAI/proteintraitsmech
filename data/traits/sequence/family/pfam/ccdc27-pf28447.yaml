identifier: Pfam:PF28447
label: Coiled-coil domain-containing protein 27
definition: >-
  This entry represents the coiled-coil region of coiled-coil domain-containing protein 27 (CCDC27) and Forkhead-associated domain-containing protein 1 (FHAD1). CCDC27 contains a single coiled-coil region located in the central portion of the sequence. CCDC27 is widely conserved across mammalian species and shows enriched expression in testis. The protein contains multiple disordered regions including acidic-rich compositional bias regions. CCDC27 is classified as a forkhead-associated domain-containing protein 1-related protein. The function of this protein remains to be determined. FHAD1 is a regulator of sperm motility and spermatocyte meiosis.
