identifier: Pfam:PF05824
label: Pro-melanin-concentrating hormone (Pro-MCH)
definition: >-
  Melanin-concentrating hormone (MCH) is a cyclic peptide originally identified in teleost fish. In fish, MCH is released from the pituitary and causes lightening of skin pigment cells through pigment aggregation. In mammals, MCH is predominantly expressed in the hypothalamus, and functions as a neurotransmitter in the control of a range of functions. A major role of MCH is thought to be in the regulation of feeding: injection of MCH into rat brains stimulates feeding; expression of MCH is upregulated in the hypothalamus of obese and fasting mice; and mice lacking MCH are lean and eat less. MCH and alpha melanocyte-stimulating hormone (alpha-MSH) have antagonistic effects on a number of physiological functions. Alpha-MSH darkens pigmentation in fish and reduces feeding in mammals, whereas MCH increases feeding. MCH is derived from a pre-pro-hormone (pre-pro-MCH), which contains 1-2 hormones other than MCH, depending on the species. In all species, the 17-19 C-terminal amino acids are cleaved to release MCH. In mammals, amino acids 132-144 encode the hormone neuropeptide EI (NEI), whilst in salmonids, the analogous region encodes neuropeptide EV (NEV), and in other fish, the region determines MCH gene-related peptide (Mgrp). A further peptide, known as neuropeptide GE (NGE), is thought to be found in mammalian pre-pro-MCH upstream of NEI, encoded by amino acids 110-129. NEI has been shown to enhance oxytocin and reduce arginine vasopressin secretion from rat pituitary. Two paralogues of MCH, known as pro-MCH-like 1 and 2 genes (PMCHL1 and PMCHL2), which arose recently in primate evolution, also exist. At present, it is unclear whether the PMCHL genes are functional genes or inactive pseudogenes.
