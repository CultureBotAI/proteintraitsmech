identifier: Pfam:PF04339
label: Peptidogalycan biosysnthesis/recognition
definition: >-
  This is a family of both bacterial and plant proteins with responsibility for building interpeptide bridges in peptidoglycan. Such a function is feasible for bacteria but less likely for the plant members of this family. Perhaps the plant-members are using homologous proteins to recognise bacterial peptidoglcans as part of their innate immune system.
