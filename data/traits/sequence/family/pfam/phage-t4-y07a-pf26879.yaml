identifier: Pfam:PF26879
label: Bacteriophage T4 protein Y07A
definition: >-
  This entry represents the Y07A protein family found in T4-like bacteriophages. Y07A is an uncharacterised protein found in the e-segB intergenic region of bacteriophage T4. The protein is encoded within the phage genome that infects Escherichia coli. While the specific function of Y07A remains unknown, its genomic location between the e and segB genes may provide context for its role in phage biology.
