identifier: Pfam:PF14704
label: Dermatopontin
definition: >-
  This family includes dermatopontin, millepora cytotoxin-1 and hemagglutinin/amebocyte aggregation factor. Dermatopontin is a small molecular weight protein in the extracellular matrix, which has been reported to be involved in different functions. It seems to mediate adhesion by cell surface integrin binding. It interacts with transforming growth factor beta. A role of this protein in cell proliferation and collagen fibrillogenesis has also been reported.
