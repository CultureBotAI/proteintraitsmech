identifier: Pfam:PF28149
label: Anti-CRISPR type II subtype A6-like
definition: >-
  AcrIIA6 is an anti-CRISPR (Acr) protein which was discovered via a self-targeting method that inhibits the type II-A CRISPR-Cas system (Csy). It is the largest known type II-A Acr, and it contains a helix-turn-helix (HTH) motif that is part of its dimerisation interface. AcrIIA6 inhibits target DNA binding to Cas9 via an allosteric mechanism and can induce Cas9 dimerisation. The protospacer adjacent motif (PAM) and AcrIIA6 recognition sites are structurally close and allosterically linked. AcrIIA6 affects Cas9 conformational dynamics associated with PAM binding. Almost all type II Acrs characterised to date directly interact with the Cas9 endonuclease, although by distinct mechanisms. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Acr families are named for their type and subtype which are numbered sequentially as they are discovered.
