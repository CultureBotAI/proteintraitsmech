identifier: Pfam:PF25716
label: Late promoter-activating protein
definition: >-
  This entry represents the Late promoter-activating protein (Lpa) from bacteriophage P1. Lpa is a trans-activating factor involved in the late regulation of the P1 lytic growth cycle. It may function as the transcriptional activator of all late P1 functions. The protein has DNA-binding activity.
