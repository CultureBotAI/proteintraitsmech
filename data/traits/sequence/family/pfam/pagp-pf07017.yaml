identifier: Pfam:PF07017
label: Antimicrobial peptide resistance and lipid A acylation protein PagP
definition: >-
  This family consists of several bacterial lipid A acylation (PagP) proteins. The bacterial outer membrane enzyme PagP transfers a palmitate chain from a phospholipid to lipid A. In a number of pathogenic Gram-negative bacteria, PagP confers resistance to certain cationic antimicrobial peptides produced during the host innate immune response.
