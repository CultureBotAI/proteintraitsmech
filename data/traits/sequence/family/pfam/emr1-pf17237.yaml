identifier: Pfam:PF17237
label: ERMES regulator 1
definition: >-
  The endoplasmic reticulum-mitochondria encounter structure (ERMES) complex creates contact sites between the endoplasmic reticulum and mitochondria, playing crucial roles in interorganelle communication, mitochondrial fission, mtDNA inheritance, lipid transfer, and autophagy. Emr1, also known as Mco6 in budding yeasts, mediates the formation ERMES foci, thereby contributing to the formation of ER-mitochondrial contact sites.
