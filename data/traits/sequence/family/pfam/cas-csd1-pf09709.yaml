identifier: Pfam:PF09709
label: CRISPR-associated protein (Cas_Csd1)
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This entry represents the Csd1 (CRISPR/Cas Subtype DVULG protein 1) family of Cas proteins, which tend to be found near CRISPR repeats of the DVULG subtype of CRISPR/Cas locus. The species range for this subtype, so far, is exclusively bacterial and mesophilic, although CRISPR loci in general are particularly common among archaea and thermophilic bacteria.
