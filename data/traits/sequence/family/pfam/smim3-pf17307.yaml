identifier: Pfam:PF17307
label: Small integral membrane protein 3
definition: >-
  Smim3 (Small integral membrane protein 3) also known as NID67 (NGF-induced differentiation clone 67) may be involved in forming or regulating ion channels in neuronal differentiation. It is strongly induced by NGF (Nerve Growth Factor) and FGF (Fibroblast Growth Factor), both of which cause these cells to differentiate. The amino acid sequence of NID67 is strongly conserved among rat, mouse and human. This family of small membrane proteins is only 60 amino acids long and analysis of the predicted peptide sequence reveals a stretch of 29 hydrophobic and uncharged residues which very likely comprise a trans-membrane region. SMIM3 has been found highly expressed in adult AML, which was associated with a poor prognosis in adult AML. Knockdown of SMIM3 inhibited the proliferation of AML through regulation of the PI3K-AKT signalling pathway, making SMIM3 a potential prognostic marker and a therapeutic target for AML.
