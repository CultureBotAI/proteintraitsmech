label: Family of unknown function (DUF6073)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001804) is described by MIBiG as an example of the following biosynthetic class, polyketide. This family includes a protein from the tiancimycin biosynthetic gene cluster from Streptomyces sp. CB03234 and appears to be predominantly found in bacteria. A member of this family, DynF from the dynemicin-biosynthesis pathway of Micromonospora chersina, has beed structurally characterised. The structure revealed to be a dimeric eight-stranded β-barrel with palmitic acid bound within a cavity ( ).
