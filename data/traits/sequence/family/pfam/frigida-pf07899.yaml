identifier: Pfam:PF07899
label: Frigida-like protein
definition: >-
  This family is composed of plant proteins that are similar to FRIGIDA protein expressed by Arabidopsis thaliana (Mouse-ear cress) ( ). This protein is probably nuclear and is required for the regulation of flowering time in the late-flowering phenotype. It is known to increase RNA levels of flowering locus C. Allelic variation at the FRIGIDA locus is a major determinant of natural variation in flowering time.
