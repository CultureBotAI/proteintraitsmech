identifier: Pfam:PF03606
label: C4-dicarboxylate anaerobic carrier
definition: >-
  Escherichia coli contains four different secondary carriers (DcuA, DcuB, DcuC, and DctA) for C4-dicarboxylates DcuA is used for aerobic growth on C4-dicarboxylates, whereas the Dcu carriers (encoded by the dcuA, dcuB, and dcuC genes) are used under anaerobic conditions and form a distinct family of carriers. Each of the Dcu carriers is able to catalyze the uptake, antiport, and possibly also efflux of C4-dicarboxylates. DcuB is the major C4-dicarboxylate carrier for fumarate respiration with high fumarate-succinate exchange activity. It is synthesized only in the absence of oxygen and nitrate and in the presence of C4-dicarboxylates. DcuA is expressed constitutively in aerobic and anaerobic growth and can substitute for DcuB. These proteins are members of the C4-dicarboxylate Uptake C (DcuC) family. DcuC has 12 GES predicted transmembrane regions, is induced only under anaerobic conditions, and is not repressed by glucose. DcuC may therefore function as a succinate efflux system during anaerobic glucose fermentation. However, when overexpressed, it can replace either DcuA or DcuB in catalyzing fumarate-succinate exchange and fumarate uptake. DcuC shows the same transport modes as DcuA and DcuB (exchange, uptake, and presumably efflux of C4-dicarboxylates).
