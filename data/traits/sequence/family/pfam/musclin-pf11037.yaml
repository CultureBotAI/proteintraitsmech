identifier: Pfam:PF11037
label: Insulin-resistance promoting peptide in skeletal muscle
definition: >-
  Osteocrin, also known as Musclin, is a muscle derived secretory peptide which induces insulin resistance in vitro. It encodes a 130 amino acid sequence including a N-terminal 30 amino acid signal sequence. Musclin expression level is tightly regulated by nutritional changes.
