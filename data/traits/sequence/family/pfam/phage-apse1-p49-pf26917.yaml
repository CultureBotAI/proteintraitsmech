label: Bacteriophage APSE-1 protein p49
definition: >-
  This entry represents protein p49 found in APSE-1-like bacteriophages. Protein p49 is an uncharacterised protein of 90 amino acids (10.5 kDa) found in bacteriophage APSE-1 that infects the secondary endosymbiont of Acyrthosiphon pisum.
