identifier: Pfam:PF10494
label: Inactive serine-threonine protein kinase 19
definition: >-
  This entry represents a group of eukaryotic proteins, including human Inactive serine/threonine-protein kinase 19 (STK19, also known as Winged helix repair factor 1, WHR1), a transcription-coupled repair factor required for nucleotide excision repair. It is unlikely to show intrinsic kinase activity as reported, but rather more likely to control NRAS activity via an associated kinase. The homologue from Schizosaccharomyces pombe (MUG51) has a role in meiosis.
