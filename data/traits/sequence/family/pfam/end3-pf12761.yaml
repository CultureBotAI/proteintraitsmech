identifier: Pfam:PF12761
label: Actin cytoskeleton-regulatory complex protein END3
definition: >-
  Endocytosis is accomplished through the sequential recruitment at endocytic sites of proteins that drive cargo sorting, membrane invagination and vesicle release. End3 forms a complex with Pan1 and Sla1. This complex plays important roles in organisation of the actin cytoskeleton and endocytosis. This complex is also required for normal cell wall morphogenesis in yeast. The subunits of the Pan1 complex are homologous to mammalian intersectin.
