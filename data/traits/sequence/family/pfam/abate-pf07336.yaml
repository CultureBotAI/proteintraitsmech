identifier: Pfam:PF07336
label: Putative stress-induced transcription regulator
definition: >-
  The structure of one member of the ABATE domain family consists of a two-domain organisation, with the N-terminal domain presenting a new fold called the ABATE domain that may bind an as yet unknown ligand. The C-terminal domain forms a treble-clef zinc-finger that is likely to be involved in DNA binding. suggests a role as stress-induced transcriptional regulator. Further computational analyses sugeests a role as a stress-induced transcriptional regulator. Members of this family are found in Streptomyces, Rhizobium, Ralstonia, Agrobacterium and Bradyrhizobium species.
