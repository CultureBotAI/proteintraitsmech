identifier: Pfam:PF01970
label: Tripartite tricarboxylate transporter TctA family
definition: >-
  This entry represents a domain found in a group of uncharacterised prokaryotic sequences, including 52.8 kDa protein in TAR-I ttuC' 3'region from the common pathogen of grapevine Agrobacterium vitis. In most members of this group, predicted to be integral membrane proteins, this domain covers the whole length of the protein, and many of them are annotated as the TctA subunit of the tripartite tricarboxylate transport (TTT) family. A member of this group from M. maripaludis (MMJJ_13030, ) was shown to be essential for natural transformation.
