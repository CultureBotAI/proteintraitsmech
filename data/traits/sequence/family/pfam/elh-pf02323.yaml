identifier: Pfam:PF02323
label: 'Egg-laying hormone precursor    '
definition: >-
  This family consists of egg-laying hormone (ELH) precursor and atrial gland peptides from the little (Aplysia parvula) and california (Aplysia californica) sea hares. The family also includes ovulation prohormone precursor from the great pond snail (Lymnaea stagnalis). This family thus represents a conserved gastropoda ovulation and egg production prohormone. Note that many of the proteins present are further cleaved to give individual peptides. Neuropeptidergic bag cells of the marine mollusc A. californica synthesize an egg-laying hormone (ELH) precursor protein which is cleaved to generate several bioacitve peptides including ELH, bag cell peptides (BCP) and acidic peptide (AP).
