identifier: Pfam:PF30108
label: Cell division inhibitor SidA
definition: >-
  This entry represents SidA (SOS-induced inhibitor of cell division A) found in Caulobacter and Phenylobacterium. SidA inhibits cell division by binding directly to FtsW to prevent the final constriction of the FtsZ ring.
