identifier: Pfam:PF11964
label: SpoIIAA-like
definition: >-
  These proteins adopt an α/β SpoIIAA-like fold, similar to that found in STAT . They adopt open and closed conformations arising from different arrangements of their α2 and α3 helices. They may be membrane associated and may function as carriers of non-polar compounds.
