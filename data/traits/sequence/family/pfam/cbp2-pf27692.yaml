label: Cytochrome B pre-mRNA-processing protein 2
definition: >-
  Cytochrome B pre-mRNA-processing protein 2 (Cbp2) is required for splicing of the group I intron bI5 of the COB pre-mRNA. It can also stimulate the splicing of the omega intron of the precursor of large ribosomal RNA.
