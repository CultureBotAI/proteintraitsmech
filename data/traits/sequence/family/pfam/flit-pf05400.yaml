identifier: Pfam:PF05400
label: Flagellar protein FliT
definition: >-
  This entry represents the bacterial flagellar FliT family of dual-function proteins. Together with FlgN, FliT has been proposed to act as a substrate-specific export chaperone, facilitating the incorporation of the enterobacterial hook-associated axial proteins (HAPs) FlgK/FlgL and FliD into the growing flagellum. FliT has also been shown to act as a transcriptional regulator in Salmonella typhimurium.
