identifier: Pfam:PF18996
label: Family of unknown function (DUF5726)
definition: >-
  This domain is found in various Platyhelminthes, with many of the sequences annotated as being the polyprotein of the transposon Ty3-I Gag-Pol. However, the genomic location of other members suggests that this region is not always found in a transposon. The domain is characterised by a highly conserved DxDxDxCC motif. The function of this domain is currently unknown.
