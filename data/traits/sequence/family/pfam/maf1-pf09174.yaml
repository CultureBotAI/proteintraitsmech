identifier: Pfam:PF09174
label: Maf1 regulator
definition: >-
  Maf1 is a negative regulator of RNA polymerase III. It inhibits the de novo assembly of TFIIIB onto DNA. Maf1 represses Pol III in response to DNA damage, oxidative stress, growth to stationary phase, treatment with rapamycin or chlorpromazine, and blocking of the secretory pathway. It targets the initiation factor TFIIIB. Its structure has been solved.
