identifier: Pfam:PF28211
label: Gephyrin-like molybdotransferase receptor GlpR
definition: >-
  This entry represents a group of sequences from actinomycetes, including the cell division protein GlpR from Corynebacterium glutamicum ( ), also known as SepX (septal protein X). Eukaryotic gephyrin-like molybdotransferase Glp and its membrane receptor GlpR bind to FtsZ and Wag31 to form a tight protein complex, which plays an important role in divisome-elongasome transition during cytokinesis in Corynebacteriales.
