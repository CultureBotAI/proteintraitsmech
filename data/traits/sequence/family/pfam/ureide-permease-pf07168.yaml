identifier: Pfam:PF07168
label: Ureide permease
definition: >-
  This entry represents Ureide permease 1-5 from Arabidopsis thaliana and similar proteins from plants and bacteria. UPS transports a wide spectrum of oxo derivatives of heterocyclic nitrogen compounds, including allantoin, uric acid and xanthine, but not adenine. Transport is dependent on glucose and a proton gradient. UPS5, which transports allantoin, has been related to salt and stress tolerance in Arabidopsis plants.
