identifier: Pfam:PF28215
label: Symporter small accessory protein
definition: >-
  Members of this family share a conserved N-terminal region of about 33 amino acids, with variable length C-terminal regions. As the conserved region is highly hydrophobic, and member proteins are nearly always encoded adjacent to sodium:solute symporter family proteins, typically with coding regions that overlap by at least one nucleotide, it seems likely that members of this family act as a transporter small subunit or assembly factor. Note that because members of this family may be shorter than 40 amino acids, members of this family may have been missed systematically by many annotation pipeline versions. Members of this family are found in both archaea and bacteria.
