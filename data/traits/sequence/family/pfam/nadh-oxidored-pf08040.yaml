identifier: Pfam:PF08040
label: MNLL subunit
definition: >-
  This family consists of the subunit 1 (NADH dehydrogenase [ubiquinone] 1 beta subcomplex subunit 1 NDUB1 or NDUFB1, also known as MNLL subunit) of NADH:ubiquinone oxidoreductase complex. This is an accessory subunit of complex I, not involved in catalysis.
