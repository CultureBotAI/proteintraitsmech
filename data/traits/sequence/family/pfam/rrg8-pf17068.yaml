identifier: Pfam:PF17068
label: Required for respiratory growth protein 8 mitochondrial
definition: >-
  The function of Rrg8 (required for respiratory growth protein 8) is not clear. It is required for respiratory activity and maintenance and expression of the mitochondrial genome. It is also involved in the plasma membrane electron transport in S. cerevisiae.
