identifier: Pfam:PF22593
label: Sperm microtubule inner protein 11
definition: >-
  This entry includes Sperm microtubule inner protein 11 (SPMIP11 also known as TEX49). SPMIP11 is a microtubule inner protein (MIP) part of the axonemal dynein-decorated doublet microtubules (DMTs). It is likely involved in the stabilisation of the microtubule structure in the sperm flagella.
