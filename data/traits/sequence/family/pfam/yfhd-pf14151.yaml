identifier: Pfam:PF14151
label: YfhD-like protein
definition: >-
  The YfhD-like protein family includes the Bacillus subtilis YfhD protein , which is functionally uncharacterised. Its expression is regulated by the sporulation-specific sigma factor sigma-F. The proteins in this family contain a single completely conserved residue E that may be functionally important.
