identifier: Pfam:PF08738
label: Gon7 family
definition: >-
  In Saccharomyces cerevisiae Gon7 is a member of the EKC/KEOPS protein complex. The complex proposed to be involved in transcription and promoting telomere uncapping and telomere elongation and is required for efficient recruitment of transcriptional coactivators.
