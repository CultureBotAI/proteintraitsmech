identifier: Pfam:PF03907
label: Spo7-like protein
definition: >-
  In budding yeasts, Spo7 is part of the Nem1-Spo7 protein phosphatase complex which acts as a phosphatase and dephosphorylates the phosphatidic acid phosphohydrolase PAH1. The Nem1-Spo7 complex mediates regulation of membrane biogenesis is needed to promote mitophagy in yeast.
