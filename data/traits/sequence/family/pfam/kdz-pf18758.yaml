identifier: Pfam:PF18758
label: Kyakuja-Dileera-Zisupton transposase
definition: >-
  A transposase family with an RNaseH catalytic domain, often fused to DNA binding domains such as SAP or cysteine cluster domains. KDZ transposases are widely present in fungi, metazoa, chlorophytes and haotpohytes. Fungal versions are often associated with a TET/JBP family of dioxygenases.
