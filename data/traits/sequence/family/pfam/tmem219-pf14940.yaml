identifier: Pfam:PF14940
label: Transmembrane 219
definition: >-
  Proteins containing this domain include TMEM248 and TMEM219 (also known as insulin-like growth factor-binding protein 3 receptor, IGFBP-3R) from animals. TMEM219 is a cell death receptor and is essential for the IGFBP-3-induced apoptosis and tumor suppression. The function of TMEM248 is not clear.
