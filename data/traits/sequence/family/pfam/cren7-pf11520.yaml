identifier: Pfam:PF11520
label: Chromatin protein Cren7
definition: >-
  Cren7 is a chromatin protein found in Crenarchaeota and has a higher affinity for double-stranded DNA than for single-stranded DNA. The protein contains negative DNA supercoils and is associated with genomic DNA in vivo. Cren7 interacts with duplex DNA through a β-sheet and a long flexible loop. It is binding to double-stranded DNA without sequence specificity. There is approximately 1 Cren7 molecule for 12 bp of DNA. The function of Cren7 has not been completely determined but it is thought that the protein may have a role similar to that of archaeal proteins in Euryarchaea.
