identifier: Pfam:PF24446
label: Family of unknown function (DUF7565)
definition: >-
  This entry represents a small family of uncharacterised proteins found in archaea and eukaryotes. These proteins contain two pairs of conserved cysteines and two pairs of conserved histidines that are probably involved in zinc coordination. These proteins likely resemble two classical C2H2 zinc fingers that pack on each other and form a compact globular structure.
