definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001796) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the tauramamide biosynthetic gene cluster from Brevibacillus laterosporus DSM 25 and appears to be predominantly found in bacteria.
