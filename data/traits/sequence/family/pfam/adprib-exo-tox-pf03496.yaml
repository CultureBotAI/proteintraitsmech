identifier: Pfam:PF03496
label: ADP-ribosyltransferase exoenzyme
definition: >-
  This entry represents a C-terminal domain found in RHS (rearrangement hotspot) family proteins and related polymorphic toxin proteins. It is often associated with ADP-ribosyltransferase toxin domains ( ) and RHS repeats ( ). In Escherichia coli K12, the domain is found in YibJ, which may be a pseudogene. The family is predominantly found in Actinomycetota, particularly Pseudonocardiaceae, and also in Proteobacteria. The function of this domain remains to be determined. Shows similarity to SteB family and .
