identifier: Pfam:PF03304
label: Mlp lipoprotein family
definition: >-
  The Mlp (for Multicopy Lipoprotein) family of lipoproteins is found in Borrelia species. These proteins were previously known as 2.9 lipoprotein genes. These surface expressed genes may represent new candidate vaccinogens for Lyme disease. Members of this family generally are downstream of four ORFs called A,B,C and D that are involved in hemolytic activity.
