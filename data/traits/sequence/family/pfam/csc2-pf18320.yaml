identifier: Pfam:PF18320
label: Csc2 Crispr
definition: >-
  This entry represents the type I-D Cas7/Csc2 family of Cas proteins that are strictly associated with the Cyano subtype of CRISPR/Cas locus and found in several species of Cyanobacteria and several archaeal species. This family is designated Csc2 for CRISPR/Cas Subtype Cyano protein 2, as it is often the second gene upstream of the core cas genes, cas3-cas4-cas1-cas2. Structural analysis of T. pendens Csc2 revealed that it forms a core RRM-like domain, flanked by three peripheral insertion domains: a lid domain, a zinc-binding domain and a helical domain. Csc2 binds single-stranded RNA in vitro in a sequence-independent manner. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
