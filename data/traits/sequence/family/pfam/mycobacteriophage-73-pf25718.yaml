identifier: Pfam:PF25718
label: Mycobacteriophage L5 gene 73 protein
definition: >-
  This entry represents a family of small proteins found in mycobacteriophages, typified by the gene 73 protein (Gp73) from Mycobacteriophage L5. The function of this protein family is currently unknown. The protein is relatively small (85 amino acids) and appears to be phage-specific. Mycobacteriophage L5 is a temperate phage that infects Mycobacterium species and has been used as a genetic tool for mycobacterial genetics.
