identifier: Pfam:PF13334
label: Domain of unknown function (DUF4094)
definition: >-
  This domain is found in a number of proteins, including eleven beta-1,3-galactosyltransferases paralogues from Arabidopsis thaliana. Beta-1,3-galactosyltransferase transfers galactose from UDP-galactose to substrates with a terminal glycosyl residue. This domain is found in N-terminal domain of the beta-1,3-galactosyltransferase.
