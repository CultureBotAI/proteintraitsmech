identifier: Pfam:PF13167
label: GTP-binding GTPase N-terminal
definition: >-
  This domain represents the N-terminal region of GTP-binding HflX-like proteins. These proteins interact with the 50S ribosome and are GTPases, hydrolysing GTP/GDP/ATP/ADP. The N-terminal region is necessary for stability of the whole protein.
