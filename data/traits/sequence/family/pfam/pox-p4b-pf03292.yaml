identifier: Pfam:PF03292
label: Poxvirus P4B major core protein
definition: >-
  This family includes the major core protein 4b from Vaccinia virus, also known as Major core protein OPG129. It is a major component of the virion core that undergoes proteolytic processing during the immature virion (IV) to mature virion (MV) transition. It is essential for the formation of a structurally normal core.
