identifier: Pfam:PF04506
label: Rft protein
definition: >-
  This entry represents the Man(5)GlcNAc(2)-PP-dolichol translocation protein RFT1, and related proteins, requited for the translocation of lipid-linked oligosaccharides across the ER membrane. Rft1 may have a critical accessory role in translocating Man(5)GlcNAc(2)-PP-Dol in vivo. Asymmetric lipid distribution is a fundamental characteristic of biological lipid bilayers, one such axample is the translocation of the Man 5 GlcNAc 2 -PP-Dol intermediate from the cytosolic side of the ER membrane to the lumen before the completion of the biosynthesis of Glc 3 Man 9 GlcNAc 2 -PP-Dol. RFT1 encodes an evolutionarily conserved protein required for this translocation.
