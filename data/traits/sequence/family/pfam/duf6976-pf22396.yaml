label: Family of unknown function (DUF6976)
definition: >-
  This family of uncharacterised proteins is found mostly in Proteobacteria. It is likely to consists of two domains that engage in extensive contacts mainly via hydrophobic residues. The predicted structure of the N-terminal domain has similarity to chorismatases.
