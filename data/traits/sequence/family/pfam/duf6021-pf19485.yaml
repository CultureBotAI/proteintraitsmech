label: Family of unknown function (DUF6021)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000399) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). This family includes a protein from the orfamide A biosynthetic gene cluster from Pseudomonas protegens Pf-5 and appears to be predominantly found in Pseudomonadaceae.
