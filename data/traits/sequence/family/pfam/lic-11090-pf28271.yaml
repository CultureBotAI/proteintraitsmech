identifier: Pfam:PF28271
label: LIC_11090-like
definition: >-
  Members of this family average about 150 amino acids in length and share five invariant Cys residues, including two CxC motifs. The family is found in Leptospira, and named for LIC_11090 from the model strain Leptospira interrogans serovar Copenhageni str. Fiocruz L1-130. Some members contain a lipoprotein lipid attachment site suggesting they may be associated with a membrane.
