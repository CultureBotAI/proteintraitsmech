identifier: Pfam:PF01263
label: Aldose 1-epimerase
definition: >-
  Aldose 1-epimerase ( ) (mutarotase) is the enzyme responsible for the anomeric interconversion of D-glucose and other aldoses between their alpha- and beta-forms. Glucose-6-phosphate 1-epimerase ( ) has been shown to catalyse the interconversion between the alpha and beta anomers from at least three hexose 6-phosphate sugars (Glc6P, Gal6P, and Man6P).
