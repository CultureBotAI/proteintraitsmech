identifier: Pfam:PF17388
label: Mycobacteriophage tail assembly protein
definition: >-
  This entry includes the tail assembly protein Gp24 and Gp25. In some strains Gp24 is the N-terminal domain of a fusion protein with the following ORF, Gp25. In Mycobacteriophages these proteins are likely to interact with the tape measure protein.
