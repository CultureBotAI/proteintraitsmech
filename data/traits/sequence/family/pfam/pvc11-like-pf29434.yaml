identifier: Pfam:PF29434
label: Baseplate protein PVC11-like
definition: >-
  This entry represents the Baseplate protein PVC11 from Photorhabdus luminescens and related proteins including Alg11 from Algoriphagus machipongonensis. PVC11 and Alg11 are components of the Contractile injection systems which are phage tail-like nanomachines, mediating bacterial cell-cell interactions. Pvc11 and Pvc12 arrange in heterodimers in a complex which exhibits a 6-fold symmetry. Similarly Alg11 interacts with Alg12. Both Pvc11 and Alg11 form an expanded cage around the central spike. The folding of the cage extensions is also similar in both cases, although it is shorter in Pvc11.
