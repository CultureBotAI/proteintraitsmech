identifier: Pfam:PF20933
label: Haptoglobin-hemoglobin receptor
definition: >-
  Haptoglobin-hemoglobin receptor (HpHbR), a protein found within the variant surface glycoprotein (VSG) from trypanosomes, plays a key role in determining if humans can be infected by these parasites developing sleeping sickness. HpHbR is responsible for the acquisition of haem, an important growth factor for these organism that are deficient in its biosynthesis. This protein folds into an elongated three α-helical bundle with a small head structure containing the ligand-binding site that is distal to the C-terminal GPI-anchor attachment site. This structure appears to be conserved among trypanosome species.
