identifier: Pfam:PF28987
label: Unclassified hydrophobin dewD
definition: >-
  This entry represents a family of unclassified hydrophobins found in filamentous fungi, particularly within the Aspergillaceae family. The prototype protein dewD from Aspergillus nidulans is a small secreted amphipathic protein that contributes to the hydrophobicity of the spore surface. These proteins contain four conserved disulphide bonds and are expressed after 12 to 24 hours post induction of asexual development, correlating with the development of metulae and phialides. Members of this family can self-assemble to form functional amyloid fibrils called rodlets that associate laterally to form amphipathic monolayers. These proteins contribute to fungal surface hydrophobicity, germination, stress tolerance and support fungal growth, development and dispersal.
