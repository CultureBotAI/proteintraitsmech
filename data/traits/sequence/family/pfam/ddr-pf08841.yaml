identifier: Pfam:PF08841
label: Diol dehydratase reactivase ATPase-like domain
definition: >-
  Diol dehydratase (DDH, ) and its isofunctional homologue glycerol dehydratase (GDH, ) are enzymes which catalyse the conversion of glycerol 1,2-propanediol, and 1,2-ethanediol to aldehydes. These reactions require coenzyme B12. Cleavage of the Co-C bond of coenzyme B12 by substrates or coenzyme analogues results in inactivation during which coenzyme B12 remains tightly bound to the apoenzyme.
