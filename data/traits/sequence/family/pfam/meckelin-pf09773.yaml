identifier: Pfam:PF09773
label: Meckelin (Transmembrane protein 67)
definition: >-
  Meckelin (also known as MKS3) is part of the tectonic-like complex which is required for tissue-specific ciliogenesis and may regulate ciliary membrane composition. It is involved in centrosome migration to the apical cell surface during early ciliogenesis. It is required for ciliary structure and function, including a role in regulating length and appropriate number through modulating centrosome duplication. It is essential for endoplasmic reticulum-associated degradation (ERAD) of surfactant protein C (sftpc).
