identifier: Pfam:PF12433
label: 'Parvovirus non-structural protein 1 '
definition: >-
  This entry represents a domain of the parvovirus Initiator protein 1 (NS1, also known as non-structural protein 1). It is found immediately N-terminal to the helicase domain and binds to the origin of replication. Parvoviral NS1 regulates host gene expression through histone acetylation. Parvoviruses are some of the smallest viruses containing linear, non-segmented single-stranded DNA genomes, with an average genome size of 5000 nucleotides. Parvoviruses have been described that infect a wide range of invertebrates and vertebrates and are well known for causing enteric disease in mammals. Genomes contain two large ORFs: NS1 and VP1; other ORFs are found in some sub-types and different gene products can arise from splice variants and the use of different start codons.
