identifier: Pfam:PF05366
label: Sarcolipin
definition: >-
  This entry represents Sarcolipin (SLN) and similar proteins from vertebrates. SLN is a short integral membrane protein that regulates Ca-ATPase activity in skeletal muscle. It has also been shown to amplify calcineurin signalling, and is a potential therapeutic target for the management of muscular dystrophy, as it is upregulated in the skeletal muscle of the classical mouse model for Duchenne muscular dystrophy.
