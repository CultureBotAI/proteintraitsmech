identifier: Pfam:PF22046
label: Enoyl-acyl carrier protein reductase FabMG
definition: >-
  This entry, previously known as DUF6936, represents FabMG enoyl-acyl carrier protein reductase (ENR) and related proteins. This enzyme is a FabI-type ENR that employs NADH as a coenzyme and mediates resistance to triclosan. FabMG ( , ) adopts an α/β structure, with a central parallel β-sheet elaborated with α-helices on both sides ( ). FabMG differs from other related ENRs in sequence and structure. These differences, in particular in the substrate-binding loop and pocket regions in which triclosan binds, could be responsible for the triclosan resistance.
