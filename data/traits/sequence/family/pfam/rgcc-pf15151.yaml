label: Response gene to complement 32 protein family
definition: >-
  RGCC (also known as RGC32) modulates the activity of cell cycle-specific kinases and may play a role in cell cycle activation. This family of proteins is found in eukaryotes and has a conserved KLGDT sequence motif.
