identifier: Pfam:PF14152
label: YfhE-like protein
definition: >-
  The YfhE-like protein family includes the Bacillus subtilis YfhE protein , which is functionally uncharacterised. Its expression may be regulated by the sigma factor sigma-B, which regulates the expression of stress-response proteins. The proteins in this family contain a conserved QEV sequence motif.
