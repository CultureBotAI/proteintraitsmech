identifier: Pfam:PF27666
label: Encapsidation protein CP3
definition: >-
  Staphylococcus aureus pathogenicity islands (SaPIs) are highly mobile phage-related pathogenicity islands that typically carry genes for one or more superantigens. They are the primary cause of superantigen-induced diseases, especially toxic shock syndrome. SaPIs are induced to excise and replicate by the presence of a temperate phage. The SaPI then induces the phage to produce special small capsids into which it is encapsidated, resulting in exteremly high transfer frequences. This entry represents the SaPI CP3 protein, which is involved in the morphogenesis of the characteristic small SaPI capsids.
