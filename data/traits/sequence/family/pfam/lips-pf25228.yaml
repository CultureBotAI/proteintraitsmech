identifier: Pfam:PF25228
label: Lips protein
definition: >-
  This entry corresponds to an uncharacterised protein family. A structure prediction of the dimer of this protein gives rise to a large complex with a pair of hydrophobic lips that might interact with a cell membrane. STRING networks suggest that this protein may interact with RNA polymerase.
