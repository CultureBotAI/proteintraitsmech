identifier: Pfam:PF28152
label: Nickel-binding protein HpnL
definition: >-
  This entry represents the Hpn-like protein HpnL, or Hpn-2, including founding member HP1432 from Helicobacter pylori ( ). HpnL is a histidine and glutamine-rich metal-binding polypeptide that binds nickel, among other metals. It may help deliver sequestered nickel for the biosynthesis of urease, which is critical to the survival of Helicobacter pylori during exposures to strongly acidic conditions. This protein is a paralogue to the histidine-rich nickel storage protein Hpn (e.g. HP1427). Both nickel-binding proteins are expressed in response to nickel, under control of the regulator NikR. Members of this family are found exclusively in Helicobacter.
