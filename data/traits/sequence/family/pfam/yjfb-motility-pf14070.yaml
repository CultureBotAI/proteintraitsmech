identifier: Pfam:PF14070
label: Putative motility protein
definition: >-
  This family of proteins is regulated in B. subtilis by SigD, and is likely to be involved in motility or flagellin production. Proteins in this family are approximately 60 amino acids in length, and contain two highly conserved asparagine residues.
