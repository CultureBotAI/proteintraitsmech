identifier: Pfam:PF26406
label: Family of unknown function (DUF8104)
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins in this family are predominantly found in the class Halobacteria, which includes organisms such as Haloferacaceae and Halobacteriales. The proteins in this family typically range from 124 to 143 amino acids in length. Many proteins in this family contain predicted coiled-coil regions.
