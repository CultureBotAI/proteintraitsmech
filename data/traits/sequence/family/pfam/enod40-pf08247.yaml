identifier: Pfam:PF08247
label: ENOD40 protein
definition: >-
  This entry represents the family of nodulin 40 proteins. The soybean early nodulin 40 (ENOD40) mRNA contains two short overlapping ORFs; in vitro translation yields two peptides of 12 and 24 amino acids. The putative role of the ENOD40 genes has been in favour of organogenesis, such as induction of the cortical cell divisions that lead to initiation of nodule primordia, in developing lateral roots and embryonic tissues. This supports the hypothesis for a role of ENOD40 in lateral organ development.
