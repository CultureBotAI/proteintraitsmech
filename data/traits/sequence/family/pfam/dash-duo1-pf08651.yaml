identifier: Pfam:PF08651
label: DASH complex subunit Duo1
definition: >-
  The DASH complex is a ~10 subunit microtubule-binding complex that is transferred to the kinetochore prior to mitosis. In Saccharomyces cerevisiae (Baker's yeast) DASH forms both rings and spiral structures on microtubules in vitro.
