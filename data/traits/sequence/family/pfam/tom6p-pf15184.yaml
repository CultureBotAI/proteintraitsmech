identifier: Pfam:PF15184
label: Mitochondrial import receptor subunit TOM6 homolog
definition: >-
  In budding yeasts, Tom6 forms part of the pre-protein translocase complex of the outer mitochondrial membrane (TOM complex). This family is found in metazoans. Proteins in this family are homologues of the yeast Tom6, and are typically between 43 and 74 amino acids in length.
