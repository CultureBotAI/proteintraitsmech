identifier: Pfam:PF24675
label: 16S rRNA (adenine(1408)-N(1))-methyltransferase
definition: >-
  This entry represents the 16S rRNA (adenine(1408)-N(1))-methyltransferase from Escherichia coli (NPMA) and similar bacterial proteins. NPMA specifically methylates the N1 position of adenine 1408 in 16S rRNA and confers resistance to various aminoglycosides, including kanamycin, neomycin, apramycin, ribostamycin and gentamicin.
