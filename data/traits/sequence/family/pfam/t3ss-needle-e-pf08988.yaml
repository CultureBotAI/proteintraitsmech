identifier: Pfam:PF08988
label: Type III secretion system, cytoplasmic E component of needle
definition: >-
  Members of this family are found exclusively in type III secretion apparatus gene clusters in bacteria. Those bacteria with a protein from this family tend to target animal cells, as does Yersinia pestis. This is a small protein (about 70 amino acids) known as YscE in Y. pestis, SsaE of Salmonella spp., PscE of P. aeruginosa, AscE of A. hydrophila and EscE in Edwardsiella piscicida. They are described as the chaperones of the type III secretion (T3S) injectisome that translocates effector toxins into host cells, facilitating the establishment and dissemination of infection. EscE forms a complex with EsaH which interacts with EsaG, stabilizing it and therefore, controlling T3SS protein secretion as EsaG secretion itself leads to the secretion of the middle and late T3SS substrates. PscE prevents premature polymerization of PscF, along with PscG, within the cytoplasm, it is required for type III secretion needle assembly and also for cytotoxicity by influencing PscF levels.
