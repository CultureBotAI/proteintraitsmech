identifier: Pfam:PF28205
label: Ciprofloxacin tolerance protein
definition: >-
  This entry represents the AciT ciprofloxacin tolerance protein found mainly in Moraxellaceae. This is likely localised at the cell membrane. Disruption of this gene results in higher susceptibility to ciprofloxacin. AciT ( ) is essential for tolerance to ciprofloxacin, likely by enabling filamentation in response to the antibiotic.
