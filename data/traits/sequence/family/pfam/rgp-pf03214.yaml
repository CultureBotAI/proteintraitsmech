identifier: Pfam:PF03214
label: Reversibly glycosylated polypeptide
definition: >-
  This family includes UDP-arabinopyranose mutases and putative alpha-1,4-glucan-protein synthase [UDP-forming]. The former catalyses the interconversion of UDP-L-arabinopyranose (UDP-Arap) and UDP-L-arabinofuranose (UDP-Araf), while the latter catalyses the reaction between UDP-glucose and a protein to produce UDP and alpha-D-glucosyl-protein. UDP-arabinopyranose mutases are essential for cell wall establishment and plant development. This entry also includes uncharacterised prokaryotic proteins.
