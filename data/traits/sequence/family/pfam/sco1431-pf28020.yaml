identifier: Pfam:PF28020
label: Membrane protein SCO1431-like
definition: >-
  This entry represents proteins related to SCO1431 from Streptomyces coelicolor A3(2), which are small and extremely hydrophobic proteins that lack an N-terminal signal peptide. Toward the C terminus they are predicted to contain a single transmembrane helix that is sufficient for localization, suggesting a targeting pathway that is independent of the SRP (signal recognition particle). Members of this family are restricted to the genus Streptomyces.
