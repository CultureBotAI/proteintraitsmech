identifier: Pfam:PF29911
label: YPR027C
definition: >-
  This entry represents a family of uncharacterised membrane proteins found in yeasts, particularly Saccharomyces cerevisiae. Members include YPR027C, YNL033W and YNL019C. These are glycoproteins that contain signal peptides and single transmembrane domains. YNL019C and YNL033W show sequence similarity to each other. The function of this protein family remains to be determined.
