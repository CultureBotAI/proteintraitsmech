identifier: Pfam:PF25194
label: Diatom pyrenoid component 3
definition: >-
  DPC3 localises to the pyrenoid periphery and co-localises with Shell4. DPC3 may act as an intermediary between the Rubisco matrix and the shell. It has low abundance compared to Shell proteins and shows no structural similarity to Shell proteins.
