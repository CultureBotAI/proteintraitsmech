identifier: Pfam:PF12675
label: Protein of unknown function (DUF3795)
definition: >-
  This domain is found in uncharacterised proteins from bacteria and archaea. These proteins are typically between 99 and 171 amino acids in length. These proteins are likely to be zinc-binding given the conserved cysteines. This domain can be found covering the total length of the protein or at the N- or C- terminal region.
