label: Family of unknown function (DUF6153)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001435) is described by MIBiG as an example of the following biosynthetic classes, polyketide and NRP (non-ribosomal peptide). It includes a member from the ikarugamycin biosynthetic gene cluster from Streptomyces sp. ZJ306 and appears to be predominantly found in Actinobacteria.
