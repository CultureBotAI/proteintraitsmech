identifier: Pfam:PF06013
label: Proteins of 100 residues with WXG
definition: >-
  This superfamily includes proteins homologous to YukC in B. subtilis and EssB in Staphylococcus aureus. The YukC protein family is thought to participate to the formation of a translocon required for the secretion (type VII secretion) of WXG100 proteins ( ) in monoderm bacteria, the WXG100 protein secretion system (Wss) ( ). The membrane-bound EssB is an integral and essential component of the bacterial type VII secretion system that can contribute to pathogenicity. The asymmetric unit consists of a single polypeptide folded into an elongated structure, which consists of two domains. This superfamily represents the C-terminal segment, which is positioned on the exterior of the membrane and adopts a helical fold. This segment contributes most to dimer formation. The domain may serve as an anchor point for the secretion apparatus, which is embedded in the cytoplasmic membrane, the C-terminal domain protruding out to interact with partner proteins or components of peptidoglycan.
