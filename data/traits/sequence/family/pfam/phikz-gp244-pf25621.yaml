identifier: Pfam:PF25621
label: Bacteriophage PhiKZ capsid decoration protein gp244
definition: >-
  This entry represents the capsid decoration protein gp244 from jumbo bacteriophage PhiKZ that infects Pseudomonas aeruginosa. This protein is located in the outer surface of the viral capsid, specifically positioned on the top of each pentameric capsomer. The structure consists of a core domain and an N-terminal arm. The core domain mainly consists of three α-helices, a four-stranded β-sheet and a long loop. Five copies of gp244 molecules form a ring-like structure that caps and enhances the stability of a pentameric capsomer. Each gp244 subunit makes contact with two of the five major capsid protein (MCP) subunits within the pentameric capsomer. The N-terminal arm of each gp244 subunit extends towards an adjacent gp244 subunit, engaging in favourable hydrophobic interactions. The long loop in the core domain is positioned near the boundary between two MCP subunits, establishing extensive interactions with both. Additionally, the C-terminal arm of each MCP subunit extends to the junction between two gp244 molecules, interacting with both. This protein plays a critical role in stabilising the pentameric vertices of the capsid. Similar proteins are found in other jumbo phages, suggesting a conserved mechanism for capsid assembly and stabilisation in large viruses.
