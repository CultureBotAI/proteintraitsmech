identifier: Pfam:PF27926
label: Mucin-7
definition: >-
  Mucins are high-molecular-weight glycoproteins present on all mucosal surfaces. Mucins are characterised by the presence of tandemly repeated amino acid sequences, the mucin domains that contain high amounts of serine and threonine and thus create an attachment point for O-linked glycosylation. The mucins and their glycosylation are essential to a variety of saliva properties, including microbial defense and biolubrication. MUC7 has been identified as the major mucin in the low-molecular-weight mucin fraction called mucin glycoprotein 2 (MG2) in saliva. Salivary MG2-MUC7 has been suggested to be important for binding of salivary neutrophils via L-selectin and mediating the interaction between neutrophils and oral bacteria.
