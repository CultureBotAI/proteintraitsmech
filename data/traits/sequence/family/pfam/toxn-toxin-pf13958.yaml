identifier: Pfam:PF13958
label: Toxin ToxN, type III toxin-antitoxin system
definition: >-
  ToxN acts as a toxin, it is part of a type III toxin-antitoxin system. It acts as a ribosome independent endoribonuclease. It interacts with, and is inhibited by, the RNA antitoxin, ToxI. Three ToxN monomers bind to three ToxI monomers to create a trimeric ToxN-ToxI complex.
