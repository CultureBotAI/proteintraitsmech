identifier: Pfam:PF25616
label: Bacteriophage PhiKZ capsid decoration protein gp35
definition: >-
  This entry represents the capsid decoration protein gp35 from jumbo bacteriophage PhiKZ that infects Pseudomonas aeruginosa. This protein decorates the outer surface of the viral capsid near the vertices. Only the C-terminal portion of gp35 (residues 160-266) was resolved in the cryo-EM structure, as the N-terminal portion showed no clear density. Structure predictions suggest the unresolved N-terminal region forms a lengthy loop that could exhibit significant flexibility. Gp35 is positioned at the quasi-three-fold axis formed by each pentameric capsomer and its two adjacent hexameric capsomers 1. This strategic positioning allows gp35 to interact with these three capsomers simultaneously, thereby reinforcing the stability of the viral capsid near the vertices. While trimeric decoration proteins at quasi-three-fold axes are common in other phages (e.g., P74-26, TW1), gp35 is unusual in adopting a monomeric structure. This protein plays a critical role in stabilising the capsid vertex. Similar proteins are found in other jumbo phages, suggesting a conserved mechanism for capsid assembly and stabilisation in large viruses.
