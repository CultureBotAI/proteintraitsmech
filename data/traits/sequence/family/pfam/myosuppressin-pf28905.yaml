identifier: Pfam:PF28905
label: Myosuppressin
definition: >-
  This entry represents myosuppressin neuropeptide precursors found in insects. These precursor proteins contain an N-terminal signal peptide followed by a propeptide region and a C-terminal mature peptide that functions as a myoinhibiting neuropeptide. The mature myosuppressin peptide typically consists of 10 amino acids with the conserved sequence TDVDHVFLRFamide and is C-terminally amidated. The neuropeptide is expressed throughout the nervous system and functions in negative regulation of muscle contraction, heart rate, and digestive processes. The precursor protein adopts an all-helical structure and undergoes post-translational processing including cleavage at basic residues and amidation. Myosuppressin precursors are found across insect orders including Diptera, Hymenoptera, and other arthropods. The mature peptide exhibits myoinhibiting activity and plays a role in neuropeptide signalling pathways.
