identifier: Pfam:PF27799
label: CRISPR-associated protein Csx19
definition: >-
  Members of this protein family are found exclusively in CRISPR-containing organisms, in operon contexts with RAMP (repeat-associated mystery protein) proteins also linked to CRISPR. The Csx19 family previously was known as the TIGR03984 family CRISPR-associated protein.
