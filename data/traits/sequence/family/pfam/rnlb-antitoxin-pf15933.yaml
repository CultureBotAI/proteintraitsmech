identifier: Pfam:PF15933
label: Antitoxin to bacterial toxin RNase LS or RnlA
definition: >-
  RnlB antitoxin, formerly known as yfjO, has been found to be the antidote protein to RNase LS or RnlA in E. coli. Bacterial toxin-antitoxin systems consist of a stable toxin and an unstable antitoxin. In this case, a novel type II system, RnlA is the stable toxin that causes inhibition of cell growth and rapidly degrades T4 late mRNAs to prevent their expression, and this is neutralised by the activity of the unstable antitoxin RnlB. Antitoxin IsoB inhibits the endonuclease activity of cognate toxin LsoA, but not that of non-cognate toxin RnlA.
