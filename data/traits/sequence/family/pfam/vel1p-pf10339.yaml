identifier: Pfam:PF10339
label: Yeast-specific zinc responsive
definition: >-
  This is a small family of proteins from Saccharomyces and related species. The function is not known but member proteins are highly induced in zinc-depleted conditions and have increased expression in NAP1-deletion mutants. The S. cerevisiae genes are named Vel1 by association with Velum formation in the wine making process.
