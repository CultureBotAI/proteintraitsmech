identifier: Pfam:PF06784
label: Uncharacterised protein family (UPF0240)
definition: >-
  NADH dehydrogenase [ubiquinone] 1 alpha subcomplex assembly factor 4 (NDUFAF4, also known as HRPAP20) is involved in the assembly of mitochondrial NADH:ubiquinone oxidoreductase complex (complex I). It may be involved in cell proliferation and survival of hormone-dependent tumor cells.
