identifier: Pfam:PF31275
label: Testis-expressed protein 51
definition: >-
  This entry represents the human Testis-expressed protein 51 (TEX51) and related proteins. TEX51 is a testis-specific membrane protein implicated in sperm development and male fertility. It is predicted to be an integral membrane protein. TEX52 is similar to the N-terminal domain of IZUMO proteins and it is predicted to adopt a similar structure.
