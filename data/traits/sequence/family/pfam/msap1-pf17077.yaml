identifier: Pfam:PF17077
label: Mitotic spindle associated protein SHE1
definition: >-
  She1 is a microtubule associated protein that binds microtubules in vitro and localises to mitotic spindles, cytoplasmic microtubules, and a ring structure at the bud neck. It has been shown to interact with components of the Dam1 (DASH) complex. She1 inhibits the dynein activity, and this inhibition is important to prevent excessive detachment of cytoplasmic microtubules, particularly in G1 cells.
