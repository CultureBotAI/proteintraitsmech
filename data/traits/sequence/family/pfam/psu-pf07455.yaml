identifier: Pfam:PF07455
label: Phage polarity suppression protein (Psu)
definition: >-
  This family contains phage polarity suppression proteins (Psu) (approximately 190 residues long). The Psu protein of Bacteriophage P4 causes suppression of transcriptional polarity in Escherichia coli by overcoming Rho termination factor activity. It has the structure of a golf stick composed of seven helices. Psu is described to have a complicated knotted dimeric conformation. It binds to the hexameric capsomere on the P4 capsid to prevent DNA leakage.
