identifier: Pfam:PF15721
label: Annexin-2 receptor
definition: >-
  Annexin-2 is a heterotetramer that is produced by osteoclasts and stimulates osteoclast formation. This family of proteins acts as annexin-2 receptors (ANXA2R, AXIIR). Besides being a cell surface receptor of annexin-2, AXIIR can also be located in cytoplasm and act as an activator of apoptosis in human cells.
