identifier: Pfam:PF01988
label: VIT family
definition: >-
  This entry represents the Ccc1 family, which consists of a group of putative vacuolar ion transporters. Proteins in this family include yeast Ccc1, which has a role in calcium and manganese homeostasis, and Arabidopsis VIT1, which serves as a vacuolar Fe2+ uptake transporter.
