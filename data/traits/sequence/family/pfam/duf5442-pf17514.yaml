  This domain is found in a group of proteins from non-biting midges (Chironomidae), including Balbiani ring A 67 kDa protein from Chironomus thummi thummi. These proteins are encoded by genes contained in Balbiani ring A, a large puff (active region) on the polytene chromosomes of Chironomus.
