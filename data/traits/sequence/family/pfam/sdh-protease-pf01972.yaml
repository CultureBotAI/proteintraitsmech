identifier: Pfam:PF01972
label: ClpP-like SDH-type serine proteinase
definition: >-
  This family of archaebacterial proteins, ex DUF114, has been found to be a serine proteinase, distantly related to ClpP proteinases that belong to the serine proteinase superfamily. The family belong to MEROPS peptidase family S49; they are mostly uncharacterised peptidases. This family includes Uncharacterized protein MJ0137 and Uncharacterized protein MJ1495. Members of this family contain a catalytic triad of Ser, Asp, His residues in a linear sequential arrangement (SDH), which shows an altered residue ordering compared with the classical ClpP proteinases (SHD) but similar to that of the carboxypeptidase clan.
