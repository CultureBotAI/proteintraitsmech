identifier: Pfam:PF19211
label: Coronavirus replicase NSP2, N-terminal
definition: >-
  Coronavirus non-structural protein 2 (NSP2) is encoded by ORF1a/1ab and proteolytically released from the pp1a/1ab polyprotein. This protein has been implicated in processes ranging from translation repression to endosomal transport, ribosome biogenesis, and actin filament binding. NSP2 in SARS-CoV-2 and other coronaviruses have been observed to localise to endosomes and replication-transcription complexes (RTC). It may be involved in binding nucleic acids and regulating intracellular signalling pathways. Viral-host protein interaction studies in SARS-CoV and SARS-CoV-2 found that this protein could interact with several host proteins, including prohibitin 1 (PHB1) and PHB2, which are implicated in a number of cellular functions, including cellular migration, differentiation and apoptosis. NSP2 structure from SARS-CoV-2 has been recently solved and revealed that it consists of an N-terminal, middle and C-terminal domains. NSP2 has been pointed as an interesting target to develop anti-SARS-CoV-2 therapies as it may play important roles during viral infection. This entry represents the N-terminal of NSP2 which consists of ten α-helices (α1-α10) and fourteen β-sheets (β1-β14) with three zinc fingers, belonging to the C2H2, C4, and C2HC types, respectively (see ). The three zinc fingers are not involved in binding nucleic acids directly but may play other unknown functions. The interaction of NSP2 and nucleic acid is mainly dependent on a large positively charged region on the electrostatic surface of the NSP2 N-terminal domain.
