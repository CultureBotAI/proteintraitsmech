identifier: Pfam:PF28218
label: Embryonic flower 1
definition: >-
  EMBRYONIC FLOWER1 (EMF1) is a plant-specific protein that encodes a transcriptional regulator. It is involved in plant Polycomb-mediated gene repression and also targets flower homeotic genes directly. EMF1 regulates developmental phase transitions, as well as specifies cell fates, during vegetative development. It also regulates additional gene programs, including photosynthesis, seed development, hormone, stress, and cold signalling.
