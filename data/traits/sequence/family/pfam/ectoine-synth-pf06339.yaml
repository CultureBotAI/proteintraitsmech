identifier: Pfam:PF06339
label: Ectoine synthase
definition: >-
  This family consists of several bacterial ectoine synthase proteins. The ectABC genes encode the diaminobutyric acid acetyltransferase (EctA), the diaminobutyric acid aminotransferase (EctB), and the ectoine synthase (EctC). Together these proteins constitute the ectoine biosynthetic pathway. Ectoine synthase, also known as L-ectoine synthase or N-acetyldiaminobutyrate dehydratase ( ) is a cupin-like bacterial protein that converts N'-acetyldiaminobutyric acid to ectoine, in the last step of the L-ectoine biosynthetic pathway, via a cyclo-condensation reaction and using iron as the cofactor.
