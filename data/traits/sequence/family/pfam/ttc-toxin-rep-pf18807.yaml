identifier: Pfam:PF18807
label: Tripartite Tc toxins repeat
definition: >-
  Toxin complexes (Tcs) are virulence factors of many bacteria which are composed of bacterial protein toxins that form large, multisubunit complexes. Tcs mode of action is to perforate the host membrane and transfer toxic enzymes into the host cell. Tc protein subunits can be classified as either type A, B or C. This entry describes a single repeat unit, as found in TcC-like proteins such as toxin subunits YenC1 and 2 from Yersinia entomophaga.
