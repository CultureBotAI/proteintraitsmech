identifier: Pfam:PF11779
label: Small subunit of serine palmitoyltransferase-like
definition: >-
  Serine palmitoyltransferase (SPT) catalyzes the first committed step in sphingolipid biosynthesis. In mammals, two small subunits of serine palmitoyltransferase, ssSPTa and ssSPTb, substantially enhance the activity of SPT, conferring full enzyme activity upon it. The 2 ssSPT isoforms share a conserved hydrophobic central domain, which is predicted to reside in the membrane. This entry represents the small subunits of serine palmitoyltransferase. It also includes a number of putative uncharacterised proteins from fungi and plants.
