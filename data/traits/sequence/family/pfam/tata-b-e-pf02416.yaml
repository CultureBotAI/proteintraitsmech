identifier: Pfam:PF02416
label: mttA/Hcf106 family
definition: >-
  This entry represents the N-terminal region of the related related TatA, TatB and TatE proteins. Translocation of proteins across the two membranes of Gram-negative bacteria can be carried out via a number of routes. Most proteins marked for export carry a secretion signal at their N terminus, and are secreted by the general secretory pathway. The signal peptide is cleaved as they pass through the outer membrane. Other secretion systems include the type III system found in a select group of Gram-negative plant and animal pathogens, and the CagA system of Helicobacter pylori. In some bacterial species, however, there exists a system that operates independently of the Sec pathway. It selectively translocates periplasmic-bound molecules that are synthesised with, or are in close association with, "partner" proteins bearing an (S/T)RRXFLK twin arginine motif at the N terminus. The pathway is therefore termed the Twin-Arginine Translocation or TAT system. Surprisingly, the four components that make up the TAT system are structurally and mechanistically related to a pH-dependent import system in plant chloroplast thylakoid membranes. The gene products responsible for the Sec-independent pathway are called TatA, TatB, TatC and TatE.
