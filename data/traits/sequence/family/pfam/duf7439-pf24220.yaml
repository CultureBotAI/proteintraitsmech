identifier: Pfam:PF24220
label: Family of unknown function (DUF7439)
definition: >-
  This entry represents a family of small putative transmembrane proteins found primarily in Streptomyces phages and some bacteria. The family is characterised by a conserved transmembrane region typically located between residues 20-45 of the alignment. Many members of this family are around 70 amino acids in length. The function of this protein family is currently unknown.
