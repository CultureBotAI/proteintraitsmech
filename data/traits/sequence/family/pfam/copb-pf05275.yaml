identifier: Pfam:PF05275
label: Copper resistance protein B precursor (CopB)
definition: >-
  This family consists of several bacterial copper resistance proteins. Copper is essential and serves as a cofactor for more than 30 enzymes yet a surplus of copper is toxic and leads to free radical formation and oxidation of biomolecules. Therefore, copper homeostasis is a key requisite for every organism. CopB serves to extrude copper when it approaches toxic levels and has been shown to act as an ATPase ( ).
