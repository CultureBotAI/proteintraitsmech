identifier: Pfam:PF17135
label: Ribosomal protein 60S L18 and 50S L18e
definition: >-
  This entry represents a domain conserved both in large ribosomal subunit proteins uL15 and eL18, which share a common structure consisting mainly of parallel β sheets (β-α-β units) with a core of three turns of irregular (β-β-α)n superhelix. This entry includes uL15 proteins that were known as L15 from bacteria, L28 from yeast, and L27A from higher eukaryotes, fungal mitochondrial uL15m (previously L10), mitochondrial uL15m (MRLP15), and eL18 proteins from archaea and eukaryotes. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like projections that extend into the rRNA core to stabilise its structure. Most of the proteins interact with multiple RNA elements, of…
