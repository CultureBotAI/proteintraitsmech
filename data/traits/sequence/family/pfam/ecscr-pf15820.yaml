identifier: Pfam:PF15820
label: Endothelial cell-specific chemotaxis regulator
definition: >-
  Endothelial cell-specific chemotaxis regulator, ECSCR (also known as endothelial cell-specific molecule 2, ECMS2), is a novel cell surface protein that regulates endothelial chemotaxis and tube formation; it also interacts with filamin A, implicating a role in angiogenesis via modulation of the actin cytoskeleton. ECSCR is a 205-amino acid protein containing a putative transmembrane (TM) domain, a conserved intracellular domain and a variable extracellular domain, but no other known functional sites, and no similarity to any other known proteins. It has been shown that the protein is a marker of primary hemangioblasts and endothelial progenitors, and not other hematopoietic progenitor cells, but little else is known about the protein.
