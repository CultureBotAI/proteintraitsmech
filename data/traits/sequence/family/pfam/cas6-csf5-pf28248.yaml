identifier: Pfam:PF28248
label: Type IV CRISPR-associated endonuclease Csf5
definition: >-
  This entry represents the type IV CRISPR-associated endonuclease Csf5 from Aromatoleum aromaticum ( ) and similar bacterial sequences. Csf5 generates CRISPR RNAs (crRNAs) that are specifically incorporated into type IV CRISPR-ribonucleoprotein (crRNP) complexes.
