identifier: Pfam:PF01222
label: Ergosterol biosynthesis ERG4/ERG24 family
definition: >-
  This entry represents a group of enzymes involved in the steroid biosynthetic pathway, including 7-dehydrocholesterol reductase and Delta(14)-sterol reductase LBR (lamin B receptor) from animals, Delta(14)-sterol reductase from fungi and plants and Delta(24(24(1)))-sterol reductase from yeast. These proteins act by reducing double bonds in precursors of ergosterol, are highly hydrophobic and seem to contain seven or eight transmembrane regions.
