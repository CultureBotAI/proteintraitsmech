identifier: Pfam:PF25185
label: Type I Thoeris inhibitor Tad3
definition: >-
  This entry represents the Tad3 family of phage proteins that inhibit the bacterial Type I Thoeris defence system. Tad3 forms a homodimer that binds two ThsB proteins, blocking their active sites by inserting a conserved serine residue (S48) that forms a hydrogen bond with the ThsB catalytic residue E85. This prevents the production of the immune signalling molecule gcADPR. The structure has been solved in complex with ThsB at 1.8A resolution ( ) The protein contains N-terminal helices that mediate homodimer formation and C-terminal regions that make extensive contacts with ThsB. This entry also includes a group of uncharacterised prokaryotic proteins.
