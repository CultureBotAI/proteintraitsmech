identifier: Pfam:PF03514
label: GRAS domain family
definition: >-
  Sequence analysis of the products of the GRAS (GAI, RGA, SCR) gene family indicates that they share a variable N terminus and a highly conserved C terminus that contains five recognizable motifs. Proteins in the GRAS family are major players in gibberellin (GA) signaling, which regulates various aspects of plant growth and development. Mutation of the SCARECROW (SCR) gene results in a radial pattern defect, loss of a ground tissue layer, in the root. The PAT1 protein is involved in phytochrome A signal transduction. A sequence, structure and evolutionary analysis showed that the GRAS family emerged in bacteria and belongs to the Rossmann-fold, AdoMET (SAM)-dependent methyltransferase superfamily. All bacterial, and a subset of plant GRAS proteins, are predicted to be active and function as small-molecule methylases. Several plant GRAS proteins lack one or more AdoMet (SAM)-binding residues while preserving their substrate-binding residues. Although GRAS proteins are implicated to function as transcriptional factors, the above analysis suggests that they instead might either modify or bind small molecules. Some proteins known to belong to the GRAS family are listed below: Arabidopsis thaliana SCARECROW (SCR) protein. It regulates asymetric cell divisions of cortex/endodermal initial cells during root development. Arabidopsis thaliana SCARECROW-LIKE (SCL) protein. Arabidopsis thaliana GIBBERELLIN-ACID INSENSITIVE (GAI) and REPRESSOR OF GA1 (RGA), two closely related proteins involved in gibberellin signaling. Arabidopsis thaliana SHORT ROOT (SHR) protein. It is necessary for cell division and endodermis specification. Arabidopsis thaliana PAT1 protein. It inhibits light signaling via the phytochrome A (phyA). LATERAL SUPPRESSOR (LS), a protein from tomato that controls t…
