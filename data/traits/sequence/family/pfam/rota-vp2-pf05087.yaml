identifier: Pfam:PF05087
label: Rotavirus VP2 protein
definition: >-
  Rotavirus particles consist of three concentric proteinaceous capsid layers. The innermost capsid (core) is made of VP2. The genomic RNA and the two minor proteins VP1 and VP3 are encapsidated within this layer. The N terminus of rotavirus VP2 is necessary for the encapsidation of VP1 and VP3.
