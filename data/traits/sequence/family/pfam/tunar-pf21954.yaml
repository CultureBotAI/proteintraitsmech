identifier: Pfam:PF21954
label: TUNAR
definition: >-
  This protein family includes the human protein TUNAR and similar sequences from vertebrates. TUNAR is a 48-amino-acid micropeptide with a single-pass transmembrane domain involved in the regulation of intracellular calcium levels in neurons and in the endoplasmic reticulum of pancreatic beta cells, where it also enhances glucose-stimulated insulin secretion.
