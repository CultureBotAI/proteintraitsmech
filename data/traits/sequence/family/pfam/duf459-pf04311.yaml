identifier: Pfam:PF04311
label: Protein of unknown function (DUF459)
definition: >-
  This is a putative periplasmic protein and a member of the SGNH-family of hydrolases, a diverse family of lipases and esterases. The tertiary fold of the enzyme is substantially different from that of the alpha/beta hydrolase family and unique among all known hydrolases; its active site closely resembles the Ser-His-Asp(Glu) triad found in other serine hydrolases.
