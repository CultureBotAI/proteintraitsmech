identifier: Pfam:PF30689
label: Transmembrane protein 116
definition: >-
  This entry represents transmembrane protein 116 (TMEM116), an uncharacterised multi-pass membrane protein found in vertebrates. The protein contains four predicted transmembrane helices and is predicted to adopt a fold similar to G protein-coupled receptors. In humans, TMEM116 shows enhanced expression in the choroid plexus and parathyroid gland. The function of this protein remains to be determined.
