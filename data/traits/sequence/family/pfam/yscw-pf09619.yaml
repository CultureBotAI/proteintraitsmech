identifier: Pfam:PF09619
label: Type III secretion system lipoprotein chaperone (YscW)
definition: >-
  The type III secretion system (T3SS) is a macromolecular machinery that inject toxins directly into the cytoplasm of target cells. This entry includes outer membrane lipoproteins such as Pilotin (also known as Exoenzyme S synthesis protein B, or ExsB) that are involved in the T3SS assembly.
