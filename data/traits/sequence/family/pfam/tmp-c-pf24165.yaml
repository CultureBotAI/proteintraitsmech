identifier: Pfam:PF24165
label: Tape measure protein C-terminal
definition: >-
  This entry represents the C-terminal conserved region of the Tape measure protein PB2 and related proteins found mainly in T5-like phages. PB2 functions as a tape measure protein that serves as a base for tail tube protein polymerisation and acts as a template for tail length determination. This protein fills the tail tube with its long coiled-coil domain and is expelled during the conformation changes that follow T5 binding to host FhuA receptor. The tape measure protein C-terminal region is composed of two α-helices that are organised in an extended L-shape. The C-terminal region of the TMP was found within the tail tip suggesting that the tail tip complex returns to its original state after DNA ejection.
