identifier: Pfam:PF09727
label: Cortactin-binding protein-2
definition: >-
  This entry represents a N-terminal domain found in cortactin-binding protein 2 and in filamin A interacting protein 1 (Filip1). In addition to being a positional candidate for autism, cortactin-binding protein 2 is expressed at highest levels in the brain in humans. Towards the C-terminal end of this protein are a series of proline-rich regions which are likely to be the points of interaction with the SH3 domain of cortactin. The human protein has six associated ankyrin repeat domains ( ) towards the C terminus of the protein which act as protein-protein interaction domains.
