identifier: Pfam:PF08520
label: Mitofissin
definition: >-
  This is a family of fungal proteins identified as mitochondrial fission factors (mitofissin, also referred to as Atg44) which are essential for mitophagy. Mitofissin directly binds to lipid membranes to drive mitochondrial fission required for mitophagy. This intermembrane space protein is essential for the completion of mitochondrial division.
