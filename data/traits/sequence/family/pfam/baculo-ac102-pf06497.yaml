identifier: Pfam:PF06497
label: Baculovirus Ac102
definition: >-
  This family of baculovirus proteins is represented by Autographa californica nuclear polyhedrosis virus (AcMNPV) Ac102. Nuclear actin is critical for AcMNPV progeny production, and Ac102 plays an essential role in actin translocation to the nucleus. It plays a role in regulating nuclear actin polymerization as well as the morphogenesis and spatial distribution of viral capsid structures in the host nucleus.
