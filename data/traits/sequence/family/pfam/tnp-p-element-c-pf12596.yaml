identifier: Pfam:PF12596
label: 87kDa Transposase
definition: >-
  This domain is found in arthropods, and is typically between 78 and 110 amino acids in length. It represents the C-terminal domain of transposable element P transposase (TNP) from Drosophila. TNP specifically mediates transposition of P-elements, being involved in both precise and imprecise excision. It has unique features such as the requirement for a guanosine triphosphate cofactor and the generation of long staggered DNA breaks during transposition. TNP structure revealed that it consists of several domains: THAP at the N-terminal, followed by a dimerization domain, a HTH domain, the catalytic RNase H domain is interrupted by a GTP-binding insertion domain (GBD) and a C-terminal one. The HTH, GBD and C-terminal domains are involved in protein-DNA interactions.
