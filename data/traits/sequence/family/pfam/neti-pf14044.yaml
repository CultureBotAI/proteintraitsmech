label: NETI protein
definition: >-
  This family includes the B. subtilis YebG protein ( ), which is functionally uncharacterised (note - this is not a homologue of E. coli YebG). Proteins in this family are typically between 42 and 66 amino acids in length and contain a conserved NETI motif.
