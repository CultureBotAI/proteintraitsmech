identifier: Pfam:PF05818
label: Enterobacterial TraT complement resistance protein
definition: >-
  The traT gene is one of the F factor transfer genes and encodes an outer membrane protein which is involved in interactions between Escherichia coli and its surroundings. The protein plays a role in preventing unproductive conjugation between bacteria carrying like plasmids.
