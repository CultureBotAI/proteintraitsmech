identifier: Pfam:PF12424
label: Plasma membrane calcium transporter ATPase C terminal
definition: >-
  This domain represents the C terminus of a calcium transporting ATPase located in the plasma membrane. This domain is found in eukaryotes, and is approximately 60 amino acids in length. It contains a conserved QTQ sequence motif.
