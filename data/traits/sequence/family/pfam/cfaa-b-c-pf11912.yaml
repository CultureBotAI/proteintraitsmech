identifier: Pfam:PF11912
label: Counting factor-associated protein A/B/C
definition: >-
  Developing Dictyostelium (Slime mold) cells form large aggregation streams that break up into groups of cells. Each group then becomes a fruiting body. Cells sense if there are too many cells in a stream by sensing the concentration of counting factor (CF), a protein complex secreted by the aggregating cells. This entry includes counting factor-associated protein A/B/C from Slime mold.
