identifier: Pfam:PF29261
label: Uncharacterised archaeal protein MJ1145
definition: >-
  This entry represents an uncharacterised protein MJ1145 found in methanogenic archaea of the Methanococcales order. This protein contains an N-terminal signal peptide (residues 1-19), indicating it is likely secreted or membrane- associated. It is conserved within members of Methanococcaceae and Methanocaldococcaceae families.
