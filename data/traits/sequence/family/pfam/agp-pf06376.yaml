identifier: Pfam:PF06376
label: Arabinogalactan peptide
definition: >-
  This entry represents a group of arabinogalactan proteins (AGPs) from plants, and includes AGP16, AGP20, AGP22 and AGP41. These proteoglycans have been implicated in various processes associated with plant growth and development, including embryogenesis and cell proliferation
