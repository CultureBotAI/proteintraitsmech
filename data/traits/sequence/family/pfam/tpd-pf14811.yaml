identifier: Pfam:PF14811
label: Protein of unknown function TPD sequence-motif
definition: >-
  This is a family of proteins includes CDIN1 from human, and homologues. CDIN1 is thought to play a role in erythroid cell differentiation. Some family members have an associated zinc-finger domain. All members carry a highly conserved TPD sequence-motif.
