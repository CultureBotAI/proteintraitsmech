identifier: Pfam:PF27830
label: Apolipoprotein B receptor
definition: >-
  Apolipoprotein B receptor (also known as apolipoprotein B-100 receptor) is a macrophage receptor that binds to apolipoprotein (apo) B48 of dietary triglyceride (TG)-rich lipoproteins, or to an apoB100-like domain in hypertriglyceridemic very low-density lipoproteins. The receptor has been shown to be capable of binding and internalising triglyceride-rich lipoproteins, even in the absence of other macrophage-specific proteins, such as apoE or lipoprotein lipase, that can enhance macrophage uptake of lipoproteins. Apolipoprotein B receptor may be involved in provision of essential lipids to reticuloendothelial cells. It also has a role in remnant lipoprotein-induced macrophage foam cell formation, and thus may be involved in atherosclerosis.
