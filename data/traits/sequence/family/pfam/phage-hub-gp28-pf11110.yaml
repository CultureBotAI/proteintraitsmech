identifier: Pfam:PF11110
label: Baseplate hub distal subunit
definition: >-
  Gp28 is a structural component of the central part of the bacteriophage T4 baseplate. The membrane-bound protein forms a complex with an another baseplate structural component, Gp27. This complex may function as an initiator of the central hub assembly.
