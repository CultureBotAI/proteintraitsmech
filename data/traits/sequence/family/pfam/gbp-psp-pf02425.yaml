identifier: Pfam:PF02425
label: Paralytic/GBP/PSP peptide
definition: >-
  This family includes insect peptides that are short (23 amino acids) and contain 1 disulphide bridge. The family includes growth-blocking peptide (GBP) of Pseudaletia separata (Oriental armyworm) and the paralytic peptides from Manduca sexta (Tobacco hawkmoth), Heliothis virescens (Noctuid moth), and Spodoptera exigua (Beet armyworm) as well as plasmatocyte-spreading peptide (PSP1). These peptides function to halt metamorphosis from larvae to pupae.
