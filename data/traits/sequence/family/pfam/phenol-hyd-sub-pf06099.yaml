identifier: Pfam:PF06099
label: Phenol hydroxylase subunit
definition: >-
  This family consists of several bacterial phenol hydroxylase subunit proteins, which are part of a multicomponent phenol hydroxylase, including Phenol 2-monooxygenase, auxiliary component DmpK from Pseudomonas sp. DmpK may be involved in the post-translational incorporation of iron into the oxygenase component of the phenol hydroxylase.
