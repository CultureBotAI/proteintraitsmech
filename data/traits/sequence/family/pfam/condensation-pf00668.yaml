identifier: Pfam:PF00668
label: Condensation domain
definition: >-
  This domain is found in many multi-domain enzymes which synthesise peptide antibiotics. This domain catalyses a condensation reaction to form peptide bonds in non-ribosomal peptide biosynthesis. It is usually found on the carboxy side of a phosphopantetheine binding domain (pp-binding) ( ). This domain was described as a pseudo-dimer of two lobes, the N-terminal lobe (N-lobe) and the C-terminal lobe (C-lobe), each of them consisting of one large central β-sheet, flanked by predominantly α-helices. The active site motif, HHxxxDG, is located in a loop that connects the central strand of the N-lobe and one of its long α-helices. Mutations in the HHXXXDG motif abolish the domain activity.
