identifier: Pfam:PF12739
label: ER-Golgi trafficking TRAPP I complex 85 kDa subunit
definition: >-
  This entry represents Trs85, a subunit of the TRAPP III complex. Trs85 is a multimeric guanine nucleotide-exchange factor for Ypt1, required for membrane expansion during autophagy and the CVT pathway. It directs Ypt1 to the phagophore assembly site.
