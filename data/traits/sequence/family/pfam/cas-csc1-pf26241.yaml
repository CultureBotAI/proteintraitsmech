identifier: Pfam:PF26241
label: Type I-D CRISPR-associated protein Cas5/Csc1
definition: >-
  This entry represents the type I-D Csc1 family of Cas proteins that are strictly associated with the Cyano subtype of CRISPR/Cas locus and found in several species of Cyanobacteria and several archaeal species. This family is designated Csc1 for CRISPR/Cas Subtype Cyano protein 1, as it is often the first gene upstream of the core cas genes, cas3-cas4-cas1-cas2. Type I-D cascade is capable of specifically binding ssRNA. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
