identifier: Pfam:PF24688
label: SseK/NleB family
definition: >-
  This entry represents the proteobacterial effector proteins SseK and NleB and their homologues. SseK and NleB are bona fide protein-arginine N-acetylglucosaminyltransferases that glycosylate host proteins on arginine residues, leading to reduced NF-kappaB-dependent responses to infection. These proteins have different substrate specificity. They have a detectable sequence similarity and share similar structural core with glucosyltransferases family 88 ( ). A conserved HEN motif (His-Glu-Asn) in their active site is important for enzyme catalysis and bacterial virulence.
