identifier: Pfam:PF02694
label: Uncharacterised BCR, YnfA/UPF0060 family
definition: >-
  This family of proteins is primarily found mainly in bacteria. Proteins in this family are integral membrane proteins that are approximately 50 amino acids in length. There is a C-terminal conserved APFIY sequence motif. This family may have distant partial similarity to suggesting this may be a transporter protein.
