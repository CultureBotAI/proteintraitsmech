identifier: Pfam:PF30936
label: SOB FIVE-LIKE
definition: >-
  This entry represents the SUPPRESSOR OF PHYTOCHROME B (SOB) five-Like (SOFL) family of novel plant-specific proteins which have high sequence similarity and similar protein structures. These proteins are involved in cytokinin-mediated development and contain two highly conserved domains SOFL-A and SOFL-B, which are necessary for their function. These proteins are positive modulators of the endogenous content of specific cytokinin levels derived from the biosynthetic intermediates trans-zeatin riboside monophosphate (tZRMP) and N6-(Delta2-isopentenyl)adenosine monophosphate (iPRMP) such as N-glucosides trans-zeatin 7-glucoside (tZ7G), cis-zeatin 7-glucoside (cZ7G) and N6-(Delta2-isopentenyl)adenine 7-glucoside (iP7G).
