identifier: Pfam:PF05681
label: Fumarate hydratase (Fumerase)
definition: >-
  This entry represents various Fe-S type hydro-lyases, including the alpha subunit from both L-tartrate dehydratase (TtdA; ) and class 1 fumarate hydratases ( ), which includes both aerobic (FumA) and anaerobic (FumB) types. A number of Fe-S cluster-containing hydro-lyases share a conserved motif, including argininosuccinate lyase, adenylosuccinate lyase, aspartase, class I fumarate hydratase (fumarase), and tartrate dehydratase (see ). Proteins in this group represent a subset of closely related proteins or modules, including the Escherichia coli tartrate dehydratase alpha chain and the N-terminal region of the class I fumarase (where the C-terminal region is homologous to the tartrate dehydratase beta chain). The activity of archaeal proteins in this group is unknown. Fumarate hydratase (also known as fumarase) is a component of the citric acid cycle. In facultative anaerobes such as E. coli, fumarase also engages in the reductive pathway from oxaloacetate to succinate during anaerobic growth. Three fumarases, FumA, FumB, and FumC, have been reported in E. coli. fumA and fumB genes are homologous and encode products of identical sizes which form thermolabile dimers of Mr 120,000. FumA and FumB are class I enzymes and are members of the iron-dependent hydrolases, which include aconitase and malate hydratase. The active FumA contains a 4Fe-4S centre, and it can be inactivated upon oxidation to give a 3Fe-4S centre.
