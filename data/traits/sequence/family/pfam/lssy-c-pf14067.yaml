identifier: Pfam:PF14067
label: LssY C-terminus
definition: >-
  This domain is found at the C terminus of Legionella LssY proteins, which may be a part of the type I secretion system. The domain is functionally uncharacterised. There are two completely conserved residues (P and W) that may be functionally important.
