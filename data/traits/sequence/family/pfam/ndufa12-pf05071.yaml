identifier: Pfam:PF05071
label: NADH ubiquinone oxidoreductase subunit NDUFA12
definition: >-
  This entry includes the NADH dehydrogenase [ubiquinone] 1 alpha subcomplex subunit 12 (NDUFA12) and the NADH dehydrogenase [ubiquinone] 1 alpha subcomplex assembly factor 2 (NDUFAF2). NDUFA12 is an accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I), not involved in catalysis. NDUFAF2 is a paralogue of the structural subunit NDUFA12. NDUFAF2 function is tightly associated with the attachment of the N module and NDUFA12, NDUFS4 and NDUFS6 work together to release the assembly factor in the final step of complex I biogenesis.
