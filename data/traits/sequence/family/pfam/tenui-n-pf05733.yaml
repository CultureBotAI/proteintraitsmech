identifier: Pfam:PF05733
label: Tenuivirus/Phlebovirus nucleocapsid protein
definition: >-
  This entry represents nucleocapsid proteins from the ssRNA viruses Tenuivirus and Phlebovirus. These are ssRNA viruses. In crystal structures, the nucleocapsid protein from the Rift Valley fever virus (RVFV) displays a ring-shaped oligomeric assembly. Electron microscopy (EM) also demonstrates that, in complex with RNA, the nucleocapsid protein forms rings in solution.
