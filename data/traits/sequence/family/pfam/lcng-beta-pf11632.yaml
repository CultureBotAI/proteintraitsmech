identifier: Pfam:PF11632
label: Lactococcin G-beta
definition: >-
  This entry represents Lactococcin-G subunit beta, which together with subunit alpha constitutes the two-peptide bacteriocin lactococcin G. This family of proteins represents the N-terminal domain which has an α-helical structure and is amphiphilic. Both peptides have a GxxxG motif which they use for interaction through a helix-helix structure. It is thought to kill Lactococci.
