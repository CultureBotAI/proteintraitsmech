identifier: Pfam:PF01516
label: Orbivirus helicase VP6
definition: >-
  Bluetongue virus VP6 protein binds ATP and exhibits an RNA-dependent ATPase function and a helicase activity that catalyses the unwinding of double-stranded RNA substrates. VP6 from five United States prototype bluetongue virus (BTV) serotypes contain unusually high concentrations of glycine, few aromatic amino acids, but a high concentration of charged amino acids, a characteristic of hydrophilic proteins. VP6 is an inner capsid protein that surrounds the genomic DS-RNA. Its hydrophilic nature coupled with a capability to bind ss-and ds-RNA, suggests that it interacts directly with the BTV genomic RNA.
