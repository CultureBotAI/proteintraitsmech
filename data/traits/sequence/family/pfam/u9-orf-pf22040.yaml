identifier: Pfam:PF22040
label: Secreted glycosylated protein U9-ORF
definition: >-
  This family represents the secreted glycosylated protein U9-ORF from Mus musculus and similar sequences from vertebrates. U9-ORF is a 118-residues protein encoded by U90926, a long non-coding RNAs (lncRNAs) that has been associated with the proliferation of herpes simplex virus 1 (HSV-1) in retinal photoreceptor cells. U9-ORF is secreted by activated myeloid cells. Its expression has been associated with protection during endotoxic shock and with the proliferation of herpes simplex virus 1 (HSV-1) in murine retinal photoreceptor cells.
