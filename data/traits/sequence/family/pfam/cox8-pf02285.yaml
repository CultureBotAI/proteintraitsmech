identifier: Pfam:PF02285
label: Cytochrome oxidase c subunit VIII
definition: >-
  Cytochrome c oxidase ( ) is an oligomeric enzymatic complex which is a component of the respiratory chain complex and is involved in the transfer of electrons from cytochrome c to oxygen. In fungi (as in other eukaryotes) this enzyme complex is located in the mitochondrial inner membrane. In eukaryotes, in addition to the three large subunits, I, II and III, that form the catalytic centre of the enzyme complex, there are a variable number of small polypeptide subunits. This family includes fungal-type cytochrome-c oxidase, subunit VIIa, also known as cytochrome c oxidase subunit 8.
