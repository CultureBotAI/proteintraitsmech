identifier: Pfam:PF04640
label: PLATZ transcription factor
definition: >-
  This family represents plant AT-rich sequence and zinc-binding proteins (PLATZ), which are zinc dependent DNA binding proteins. They bind to AT rich sequences and functions in transcriptional repression. Included in this family is the protein RGF1 INDUCIBLE TRANSCRIPTION FACTOR 1 (RITF1), a transcription factor that plays a central role in mediating RGF1 hormone peptide signalling, leading to the production of reactive oxygen species (ROS) in roots to modulate meristem size and root growth, probably via oxidative post-translational modification of the transcription factor PLETHORA.
