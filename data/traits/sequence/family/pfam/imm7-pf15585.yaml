identifier: Pfam:PF15585
label: Immunity protein 7
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved GxaG motif. They are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a Tox-REase-3 domain.
