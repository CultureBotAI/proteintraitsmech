identifier: Pfam:PF06254
label: Bacterial toxin ydaT
definition: >-
  YdaT is a transcriptional regulator whose expression significantly impairs bacterial growth and cell viability. It disrupts the expression of multiple regulons normally governed by RcsA, leading to defects in lipopolysaccharide biosynthesis and cell division. While YdaT has no impact on Rac prophage excision, its overexpression, particularly as part of the ydaST operon, has been linked to increased toxicity, morphological abnormalities, and further reductions in cell viability. YdaT toxin was first thought to be neutralised by the putative antitoxin YdaS ( ) but recent studies showed that both YdaS and YdaT can act independently as toxins and are regulated by RacR.
