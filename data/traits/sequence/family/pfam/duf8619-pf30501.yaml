identifier: Pfam:PF30501
label: Family of unknown function (DUF8619)
definition: >-
  This entry represents a protein family related to (DUF3239). The family is found in Cyanobacteria (Oscillatoriales, Nostocales, Chroococcales) and in photosynthetic eukaryotes including Chlorophyta (green algae) and Stramenopiles (Ochrophyta). The presence in eukaryotic algae likely reflects plastid-encoded or plastid-targeted proteins derived from the cyanobacterial endosymbiont ancestor. The function of this family remains to be determined.
