identifier: Pfam:PF26809
label: Bacteriophage T4 neck protein gp13
definition: >-
  This entry represents the neck protein gp13 from bacteriophage T4. After DNA packaging into the T4 head is completed, gp13 assembles with gp14 at the portal vertex to form the neck structure. The neck is located between the portal vertex gp20 and the connector protein gp15, and is essential for tail attachment. Gp13 consists of 309 amino acid residues and is rich in α-helices. In solution, gp13 exists as a monomer but forms a hetero-oligomeric complex with gp14 in a 10:5 stoichiometry after treatment with ammonium sulfate. Electron microscopy shows this complex forms a ring-like structure of 15 nm in diameter.
