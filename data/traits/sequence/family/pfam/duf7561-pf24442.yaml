identifier: Pfam:PF24442
label: Family of unknown function (DUF7561)
definition: >-
  This entry represents a small family of uncharacterised proteins found in archaea. They contain two pairs of conserved cysteines that are likely involved in metal coordination. These proteins are predicted to structurally resemble treble-clef zinc fingers.
