identifier: Pfam:PF17486
label: Cystine knot toxins
definition: >-
  This family is found in Araneaea (spiders) and family members are venomus peptides with 4 disulfide bonds. Cystine knot toxins (CKTs) are small, compact molecules cross-linked by three to five disulfide bonds and are often the key contributors to the activity and potency of the venom. While these disulfide-rich peptides can adopt a number of different structural motifs, three of the most observed structural scaffold motifs are the inhibitor cystine knot (ICK) and the disulfide-directed β-hairpin (DDH) and Kunitz motif. These venomus peptides mainly act on membrane proteins in electro-excitable cell membranes by modulating voltage-activated sodium (NaV), calcium (CaV), and potassium (KV) channels, acid-sensing ion channels (ASICs), transient receptor potential (TRP) channels, and mechanosensitive channels (MSCs).
