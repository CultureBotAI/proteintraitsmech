identifier: Pfam:PF15141
label: Ubiquinol-cytochrome-c reductase complex assembly factor 3
definition: >-
  Complex III (cytochrome bc1) is a protein complex of the mitochondrial inner membrane that transfers electrons from ubiquinol to cytochrome c. UQCC3 functions in complex III assembly. It is also a potent antiviral protein independent of interferon production.
