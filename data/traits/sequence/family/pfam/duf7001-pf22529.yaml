identifier: Pfam:PF22529
label: Family of unknown function (DUF7001)
definition: >-
  This is a family of uncharacterised proteins found in Archaea. They have sequence similarity to Zincin-like metalloproteases and are predicted to adopt the same structure. Only one of the two zinc binding sites are conserved suggesting that these proteins may possess different function.
