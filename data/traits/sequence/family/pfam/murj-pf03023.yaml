identifier: Pfam:PF03023
label: Lipid II flippase MurJ
definition: >-
  Peptidoglycan synthesis (PG) biosynthesis involves the formation of peptidoglycan precursor lipid II (undecaprenyl-pyrophosphate-linked N-acetyl glucosamine-N-acetyl muramic acid-pentapeptide) on the cytosolic face of the cell membrane. Lipid II is then translocated across the membrane and its glycopeptide moiety becomes incorporated into the growing cell wall mesh. MviN, renamed as MurJ, is a lipid II flippase essential for cell wall peptidoglycan synthesis. Unlike most MviN proteins, the mycobacterial MviN orthologue possess an extended C-terminal region that contains an intracellular pseudo-kinase domain and an extracellular domain resembling carbohydrate-binding proteins.
