identifier: Pfam:PF29114
label: Luqin-like RYamide neuropeptide precursor
definition: >-
  This entry represents the luqin-like RYamide neuropeptide precursor family, typified by LURY-1 from Caenorhabditis elegans. These are small precursor proteins of approximately 85-115 amino acids that contain signal peptides and produce bioactive neuropeptides. LURY-1 generates two C-terminally amidated peptides (LURY-1-1 and LURY-1-2) that function as ligands for the npr-22 receptor. The peptides regulate food-related behaviours including feeding, lifespan, egg-laying and roaming behaviour. The precursors are expressed in pharyngeal neurons and the peptides are secreted in a food-dependent manner. The family is found across nematodes and represents an important class of neuropeptides involved in feeding regulation.
