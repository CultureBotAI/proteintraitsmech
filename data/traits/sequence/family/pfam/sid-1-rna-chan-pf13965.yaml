identifier: Pfam:PF13965
label: dsRNA-gated channel SID-1
definition: >-
  This is a family of proteins that are transmembrane dsRNA-gated channels. They passively transport dsRNA into cells and do not act as ATP-dependent pumps. They are required for systemic RNA interference. This entry also includes CHUP-1 from C. elegans. CHUP-1 is the SID-1 paralog. However, it does not transport dsRNA. Instead, it is involved in dietary cholesterol uptake.
