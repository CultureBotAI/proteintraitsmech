identifier: Pfam:PF14348
label: IncC plasmid conjugative DNA transfer protein DtrJ-like
definition: >-
  This family includes the DNA transfer protein DtrJ (encoded by A074), a membrane-located homologue of TraJ that interacts with the coupling protein TraD, and is essential for IncC plasmid conjugation. Members of this group, previously known as DUF4400, are mainly found in proteobacteria.
