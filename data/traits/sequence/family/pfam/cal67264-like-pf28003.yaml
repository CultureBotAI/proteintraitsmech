identifier: Pfam:PF28003
label: CAL67264-like protein
definition: >-
  This family includes CAL65096 ( , ) from Gramella forsetii and similar sequences mainly found in flavobacteriales. Members of this family are small, well-conserved, hydrophobic, lineage-restricted proteins, about 60 amino acids in length, with an essentially invariant C-terminal motif LKGRV. They are predicted to fold into an α-helical hairpin.
