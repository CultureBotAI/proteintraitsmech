identifier: Pfam:PF08188
label: Spermatozal protamine family
definition: >-
  This entry consists of the spermatozal protamines. Spermatozal protamines play an important role in remodelling of the sperm chromatin during mammalian spermiogenesis. Nuclear elongation and chromatin condensation are concomitant with modifications in the basic protein complement associated with DNA. Somatic histones are initially replaced by testis-specific histone variants, then by transitional proteins, and ultimately by protamines.
