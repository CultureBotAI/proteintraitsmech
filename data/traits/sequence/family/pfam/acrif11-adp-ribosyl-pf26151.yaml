identifier: Pfam:PF26151
label: Anti-CRISPR Type I-F ADP-ribosyltransferase AcrIF11
definition: >-
  This entry represents a group of proteins from tailed bacteriophages and proteobacteria, including AcrIF11 from Pseudomonas aeruginosa, an ADP-ribosyltransferase that function as anti-CRISPR protein targeting Type I-F CRISPR-Cas systems. Members of this family inhibit CRISPR-Cas immune systems by ADP-ribosylating the Csy1/Cas8 component of the surveillance complex. This modification prevents target DNA binding and renders the CRISPR system inactive. Unlike stoichiometric inhibitors, these enzymatic anti-CRISPRs can remain potent even when CRISPR components are overexpressed. The modification occurs specifically at asparagine 250 of Csy1. The enzyme structure contains a β-sheet catalytic domain with conserved aspartate and glutamate residues critical for ADP-ribosylation activity.
