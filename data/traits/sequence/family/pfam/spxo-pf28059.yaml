identifier: Pfam:PF28059
label: Anti-adapter protein SpxO-like
definition: >-
  This entry represents the Anti-adapter protein SpxO from Bacillus subtilis and similar sequences from Bacillus species. SpxO is an inhibitor of Spx proteolytic control, while Spx is a global regulator of the oxidative stress response. SpxO acts by interacting with SpxH/YjbH, which disrupts interaction between SpxH and Spx, and inhibits SpxH-enhanced proteolysis of Spx by ClpXP. It is required for the stabilisation of Spx and activation of Spx-regulated genes in response to cell wall stress.
