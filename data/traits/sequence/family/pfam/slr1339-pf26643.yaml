identifier: Pfam:PF26643
label: Slr1339
definition: >-
  This entry represents Slr1339 and related proteins, strictly found in cyanobacteria. Slr1339 is one of several genes (along with sll1734, ssr3402, and ssr1853) found to be significantly induced after a 3-day salt stress in Synechocystis. Knockout mutants of these genes, including slr1339, were notably salt-sensitive, indicating that Slr1339 plays a role in long-term salt stress acclimation.
