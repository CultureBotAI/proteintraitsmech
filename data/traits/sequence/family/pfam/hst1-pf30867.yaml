identifier: Pfam:PF30867
label: Histatin-1-like
definition: >-
  Histatins are small molecular weight proteins produced by the human salivary glands that exhibit antifungal and antibacterial activities. They are also components of the acquired enamel pellicle (AEP). Histatins 1 and 3 are full-length peptides of 38 and 32 amino acid residues respectively; other characterised members of the histatin family are proteolytic products formed during secretion. The predominant histatins are histatin 1, 3, and 5; histatin 5 is a proteolytic product of histatin 3. Statherin is a 43-residue peptide, secreted by parotid and submandibular glands. It is a multifunctional molecule that prevents calcium phosphate precipitation in saliva, thus maintaining a high calcium and phosphate levels. Moreover, statherin and its C-terminal fragments inhibit the growth of anaerobic bacteria from the oral cavity. Statherin and histatin 1 reduce Streptococcus mutans adhesion onto hydroxyapatite surfaces.
