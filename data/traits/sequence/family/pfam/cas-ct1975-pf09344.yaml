identifier: Pfam:PF09344
label: CT1975-like protein
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This entry represents a family of Cas proteins, which includes CT1975 of Chlorobium tepidum. This family is also known as Cse4/CasC and Cas7 Type I-E.
