identifier: Pfam:PF26510
label: Halobacterial UvrD-like protein
definition: >-
  This entry represents a set of uncharacterised proteins in halobacteria. Structure comparison shows that this family is most similar to the 1A domain of the D.radiodurans UvrD protein. UvrD is a DNA helicase involved in several DNA repair pathways.
