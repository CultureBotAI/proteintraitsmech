identifier: Pfam:PF12115
label: Salivary protein of 15kDa inhibits CD4+ T cell activation
definition: >-
  This is a family of 15kDa salivary proteins (Salp15) from Acari Arachnids that is induced on feeding and assists the parasite to remain attached to its arthropod host. By repressing calcium fluxes triggered by TCR engagement, Salp15 inhibits CD4+ T cell activation and interleukin (IL)-2 production. It downregulates host immune system by binding to both dendritic cells, and CD4+ T cells. Salp15 shows weak similarity to Inhibin A, a member of the TGF-beta superfamily that inhibits the production of cytokines and the proliferation of T cells.
