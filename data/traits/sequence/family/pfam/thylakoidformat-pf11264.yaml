identifier: Pfam:PF11264
label: Thylakoid formation protein
definition: >-
  Thf1 protein (also known as Psb29) is found in Cyanobacteria and in the plastids of vascular plants. They may function in the biogenesis of Photosystem II complexes. In Synechocystis it was isolated and partially sequenced from purified photosystem II (PS II). Deletion of psb29 in Synechocystis 6803 results in slower growth rates under high light intensities, increased light sensitivity, and lower PSII efficiency, without affecting the PSII core electron transfer activities.
