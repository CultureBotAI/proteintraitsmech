identifier: Pfam:PF03870
label: RNA polymerase Rpb8
definition: >-
  This family includes DNA-directed RNA polymerases I, II, and III subunit RPABC3 (also known as Rpb8), an essential subunit common to the three RNA polymerases, pol I, II and III. Rpb8 interacts with the largest subunit Rpb1, and with Rpb3 and Rpb11, two smaller subunits.
