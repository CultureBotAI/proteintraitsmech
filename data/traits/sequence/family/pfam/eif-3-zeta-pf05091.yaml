identifier: Pfam:PF05091
label: Eukaryotic translation initiation factor 3 subunit 7 (eIF-3)
definition: >-
  Eukaryotic translation initiation factor 3 subunit D (eIF3d) is a component of the eukaryotic translation initiation factor 3 (eIF-3) complex, which is involved in protein synthesis and, together with other initiation factors, stimulates binding of mRNA and methionyl-tRNAi to the 40S ribosome. The gene coding for the protein has been implicated in cancer in mammals.
