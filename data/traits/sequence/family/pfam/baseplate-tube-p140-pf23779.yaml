identifier: Pfam:PF23779
label: Bacteriophage Baseplate Tube Protein Family
definition: >-
  This entry represents the bacteriophage Baseplate tube protein and related proteins, involved in the assembly of the simplified baseplate structure of bacteriophages. Baseplate tube protein p140, interacts with other proteins including the p132 collar protein ring and components of the cone, namely DTP-pb9 and BHP-pb3, to form a crucial part of the phage's baseplate. This structure is essential for the phage to attach to and penetrate the host bacterial cell wall during infection.
