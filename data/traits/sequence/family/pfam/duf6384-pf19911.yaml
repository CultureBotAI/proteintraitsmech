label: Family of unknown function (DUF6384)
definition: >-
  This family of proteins is functionally uncharacterised. Proteins in this family are typically between 306 and 346 amino acids in length and they are predominantly found in Proteobacteria. There is a conserved sequence MDXXdTLRH at the N terminus and a conserved sequence YxxVEA at the C terminus.
