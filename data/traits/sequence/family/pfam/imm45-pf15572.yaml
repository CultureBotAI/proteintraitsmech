identifier: Pfam:PF15572
label: Immunity protein 45
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved C-terminal tryptophan residue. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Tox-ColE3 family.
