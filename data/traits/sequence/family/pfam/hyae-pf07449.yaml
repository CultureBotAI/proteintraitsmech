identifier: Pfam:PF07449
label: Hydrogenase-1 expression protein HyaE
definition: >-
  This family contains bacterial hydrogenase-1 expression proteins approximately 120 residues long. This includes the Escherichia coli protein HyaE, and the homologous proteins HoxO of Ralstonia eutropha (Alcaligenes eutrophus) and HupG of Rhizobium leguminosarum. Deletion of the hoxO gene in R. eutropha led to complete loss of the uptake [NiFe] hydrogenase activity, suggesting that it has a critical role in hydrogenase assembly.
