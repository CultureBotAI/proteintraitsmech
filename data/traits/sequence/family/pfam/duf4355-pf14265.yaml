identifier: Pfam:PF14265
label: Capsid assembly scaffolding protein Gp46
definition: >-
  This entry includes the capsid assembly scaffolding protein Gp46 from Staphylococcus phage 80alpha, which is involved in icosahedric procapsid assembly. It coassembles with capsid proteins to form the procapsid. The scaffolding protein is found within the capsid as a series of concentric shells. During DNA packaging, the scaffolding protein molecules are released from the procapsid.
