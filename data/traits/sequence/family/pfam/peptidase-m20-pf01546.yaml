identifier: Pfam:PF01546
label: Peptidase family M20/M25/M40
definition: >-
  This group of proteins contains the metallopeptidases and non-peptidase homologues (amidohydrolases) that belong to the MEROPS peptidase family M20 (clan MH). The peptidases of this clan have two catalytic zinc ions at the active site, bound by His/Asp, Asp, Glu, Asp/Glu and His. The catalysed reaction involves the release of an N-terminal amino acid, usually neutral or hydrophobic, from a polypeptide. The peptidase M20 family has four subfamilies: M20A -type example, glutamate carboxypeptidase from Pseudomonas sp. RS16 ( ) M20B -type example, peptidase T from Escherichia coli ( ) M20C -type example, X-His dipeptidase from E. coli ( ) M20D -type example, carboxypeptidase Ss1 from Sulfolobus solfataricus ( ) Homologues from the family that are not peptidases include: Acetylornithine deacetylase, which releases an acetyl group and L-ornithine from N(2)-acetyl-L-ornithine N-acetyldiaminopimelate deacetylase, which catalyses the conversion of N-acetyl-diaminopimelate to diaminopimelate and acetate N-carbamoyl-L-amino-acid hydrolase, which converts D,L-5-monosubstituted hydantoins into D-or L-amino acids Aminoacylase-1, which hydrolyses N-acylated or N-acetylated amino acids Succinyl-diaminopimelate desuccinylase ( ), which catalyses the hydrolysis of N-succinyl-L,L-diaminopimelic acid, forming succinate and LL-2,6-diaminoheptanedioate (DAP, a component of bacterial cell walls)
