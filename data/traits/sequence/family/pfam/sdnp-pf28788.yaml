identifier: Pfam:PF28788
label: Sordarin biosynthesis protein P
definition: >-
  This entry represents the SdnP protein family, found in fungi, particularly Ascomycota. SdnP is part of the sordarin biosynthesis gene cluster that produces sordarin and hypoxysordarin, glycoside antibiotics with unique tetracyclic diterpene aglycone structures. The protein is predicted to be a multi-pass membrane protein with two transmembrane helices and contains multiple N-glycosylation sites. While the specific biochemical function of SdnP remains unclear, it is proposed to be involved in the dehydration of hydroxylated cycloaraneosene derivatives to construct the cyclopentadiene moiety during sordarin biosynthesis. The function of this protein remains to be determined.
