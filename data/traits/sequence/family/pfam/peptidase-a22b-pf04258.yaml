identifier: Pfam:PF04258
label: Signal peptide peptidase
definition: >-
  This entry represents the C-terminal domain of a group of aspartic endopeptidases that belong to MEROPS peptidase family A22 (presenilin family), subfamily A22B. These are intramembrane cleaving proteases (I-CLiPs). They are also known as signal peptide peptidases (SPPs). SPP cleaves remnant signal peptides left behind in the membrane by the action of signal peptidase and also plays key roles in immune surveillance and the maturation of certain viral proteins. The tertiary structure of a homologue from the archaean Methanoculleus marisnigri has been solved and shows a unique fold which includes nine transmembrane segments that form a horseshoe shape. SPPs do not require cofactors as demonstrated by expression in bacteria and purification of a proteolytically active form. This C-terminal region defines the functional domain, which is in itself sufficient for proteolytic activity.
