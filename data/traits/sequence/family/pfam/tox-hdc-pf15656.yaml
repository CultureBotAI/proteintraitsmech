identifier: Pfam:PF15656
label: Toxin with a H, D/N and C signature
definition: >-
  This entry represents a predicted α/β fold peptidase domain with a strongly conserved triad of a histidine, aspartate/asparagine and cysteine residues that are predicted to comprise the active site of the predicted peptidase. Proteins bearing this predicted toxin domain are particularly common in both intracellular and extracellular pathogens.
