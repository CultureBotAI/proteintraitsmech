identifier: Pfam:PF04714
label: BCL7, N-terminal conserver region
definition: >-
  The members of this group of sequences contain a conserved N-terminal domain which is found in the BCL7 family. Human BCL7 family consists of BCL7A, BCL7B, and BCL7C. They are involved in cancer incidence, progression, and development. BCL7B is commonly hemizygously deleted in patients with Williams syndrome. BCL7B regulates several signalling pathways including Wnt and apoptosis.
