identifier: Pfam:PF11807
label: Mycotoxin biosynthesis protein UstYa
definition: >-
  Oxidase ustYa is involved in the the production of ustiloxins, toxic cyclic peptides, in fungi. Ustiloxins were found to be the first example of cyclic peptidyl secondary metabolites that are ribosomally synthesized in filamentous fungi. The homologous genes ustYa and ustYb (which are found in the gene cluster for ustiloxins) have been shown to be involved in cyclization of the peptide. Other proteins in this entry include cyclochlorotine biosynthesis proteins O, P and R from Talaromyces islandicus which are encoded within a cluster of genes required for biosynthesis of the mycotoxin cyclochlorotine. CccP is probably the phenylalanine aminomutase that provides the unusual beta-Phe amino acid, but the roles of the other proteins are unknown.
