identifier: Pfam:PF15153
label: Cytokine-like protein 1
definition: >-
  Cytokine-like protein 1 (CYTL1) was identified as a secretory protein expressed in CD34+ haemopoietic cells. CYTL1 seems to regulate chondrogenesis and is required for the maintenance of cartilage homeostasis. It may also work as a regulatory factor in embryo implantation.
