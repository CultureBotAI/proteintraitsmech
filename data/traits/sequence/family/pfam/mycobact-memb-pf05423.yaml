identifier: Pfam:PF05423
label: Mycobacterium membrane protein
definition: >-
  This entry represents a group of putative transport accessory proteins, including MmpS1-5 from Mycobacterium tuberculosis and Divisome factor lamA. MmpS1-S5 and IamA are part of an export system required for biosynthesis and secretion of siderophores and are essential for virulence of Mycobacterium tuberculosis. MmpS4 possesses an N-terminal transmembrane (TM) helix and a C-terminal soluble domain.
