identifier: Pfam:PF11860
label: N-acetylmuramidase
definition: >-
  This domain is found in proteins from bacteria and viruses. It is found C-terminal in a novel Salmonella bacteriophage endolysin, where it has been shown to be responsible for its N-acetylmuramidase (lysozyme) activity.
