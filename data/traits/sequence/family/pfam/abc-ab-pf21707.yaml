identifier: Pfam:PF21707
label: 'Emaravirus ABC_AB protein '
definition: >-
  This family corresponds to the ABC proteins of clades A and B of emaraviruses (plant-infecting bunyaviruses). They are involved in pathogenicity, and may act as silencing suppressors in some species (Characterisation of a novel Emaravirus identified in mosaic-diseased Eurasian aspen (Populus tremula) [ , https://doi.org/10.3390/f13111868]. This family contains a hydrophobic region bordered by two highly conserved positions R/K and G. They may consist of three helices according to structure predictions.
