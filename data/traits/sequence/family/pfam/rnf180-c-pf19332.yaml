identifier: Pfam:PF19332
label: E3 ubiquitin-protein ligase RNF180 C-terminus
definition: >-
  This entry represents the C-terminal domain of the E3 ubiquitin-protein ligase RNF180. This region is predicted to be a transmembrane domain. RNF180 (also known as Rines: RING finger protein in neural stem cells) is an integral membrane protein located mainly on the cytoplasmic side of the endoplasmic reticulum. It promotes polyubiquitination and degradation by the proteasome pathway of ZIC2. It is thought that it is involved in modulation of neuronal function, such as regulation of synaptic structure and synaptic plasticity due to its high expression in mature brain. It has been related to neurodegenerative diseases and to disorders associated with emotion. Methylation of RNF180 has been linked to gastric cancer.
