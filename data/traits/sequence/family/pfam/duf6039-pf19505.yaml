label: Family of unknown function (DUF6039)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001101) is described by MIBiG as an example of the following biosynthetic classes, NRP and Polyketide (Macrolide). This family includes a protein from the leinamycin biosynthetic gene cluster from Streptomyces atroolivaceus and appears to be predominantly found in Actinobacteria.
