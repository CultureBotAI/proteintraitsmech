identifier: Pfam:PF26838
label: Phage T4 Y01E protein
definition: >-
  This entry represents protein Y01E found in bacteriophages. The prototype is from bacteriophage T4, a 60 amino acid protein with a molecular weight of 7.0 kDa located in the modB-mrh intergenic region. The protein is also known as dda.6 or modA.2 and remains uncharacterised. The function of this protein is unknown.
