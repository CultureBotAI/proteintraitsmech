identifier: Pfam:PF11577
label: NF-kappa-B essential modulator NEMO
definition: >-
  This entry represents a conserved domain found at the N-terminal of NF-kappa-B essential modulator (NEMO) and optineurin proteins. NEMO is a regulatory protein which is part of the IKK complex along with the catalytic IKKalpha and beta kinases. The IKK complex phosphorylates IkappaB targeting it for degradation which results in the release of NF-kappaB which initiates the inflammatory response, cell proliferation or cell differentiation. NEMO activates the IKK complex's activity by associating with the unphosphorylated IKK kinase C termini. The core domain of NEMO is a dimer which binds to two fragments of IKK.
