identifier: Pfam:PF05459
label: Herpesvirus transcriptional regulator family
definition: >-
  This entry includes a group of proteins from Herpesviridae, including ICP27 from Human herpesvirus 1. ICP27 is a multifunctional regulatory protein that plays an essential role in viral transcription, nuclear export of intronless RNAs, translation of viral transcripts, and virion host shutoff function. It interacts with the nuclear pore complex through Nup62 and may compete with some host cell transport receptors for binding, resulting in inhibition of those host transport pathways. It also regulates alternative pre-mRNA polyadenylation and splicing in a sequence-dependent manner.
