identifier: Pfam:PF30145
label: Nullo cellularisation protein
definition: >-
  This entry represents the Nullo protein family, found in dipteran insects, particularly within the Drosophilidae. Nullo is essential for actin-myosin network stability during cellularisation in Drosophila embryonic development. The protein is involved in increasing actin-actin interactions and membrane-to-cytoskeleton attachments during the formation of cell boundaries. Nullo is expressed specifically in the blastoderm throughout the embryonic cortex and appears first at nuclear cell cycle 11, disappearing rapidly as cellularisation begins. During cycle 14, nullo protein levels are coupled to the nucleocytoplasmic ratio. The protein functions together with Sry-alpha and bottleneck to provide auxiliary functions in stabilising and regulating large microfilament structures during early embryogenesis. Nullo is essential for proper cell-cell junction assembly, cleavage furrow formation, and regulation of cell shape during embryonic development.
