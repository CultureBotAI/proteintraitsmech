identifier: Pfam:PF06635
label: Type 3 secretion system stator protein
definition: >-
  This family consists of type III secretion system (T3SS) stator protein, previously known as nodulation protein NolV, from different Rhizobium species. The function of this family is unclear, however, it has been suggested that T3SS stator protein is a component of the T3SS, which is used to inject bacterial effector proteins into eukaryotic host cells.
