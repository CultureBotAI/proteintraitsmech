identifier: Pfam:PF11124
label: Inorganic phosphate transporter chaperone Pho86
definition: >-
  Pho86p is an ER chaperone required for chaperoning multi-pass membrane proteins through the ER membrane compartment. It is essential for growth when phosphate levels are limiting, being involved in the regulation of Pho84p, a high-affinity phosphate transporter, which is localised to the endoplasmic reticulum (ER) in low phosphate medium. When the level of phosphate increases Pho84p is transported to the vacuole. Pho86p is required for packaging of Pho84p in to COPII vesicles.
