identifier: Pfam:PF29107
label: Chromosome 2 open reading frame 92
definition: >-
  This entry represents the C2orf92 family of uncharacterised proteins found in mammals. The proteins are approximately 265 amino acids in length and are predicted to be single-pass membrane proteins with an N-terminal signal peptide and a transmembrane domain in the C-terminal region. The proteins are expressed in various tissues including choroid plexus and testis in humans. The function of this protein family remains to be determined.
