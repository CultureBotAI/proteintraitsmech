identifier: Pfam:PF07545
label: Vestigial/Tondu family
definition: >-
  The mammalian TEF and the Drosophila scalloped genes belong to a conserved family of transcriptional factors that possesses a TEA/ATTS DNA-binding domain. Transcriptional activation by these proteins likely requires interactions with specific coactivators. In Drosophila, Vestigial (Vg) has a short 25 aa motif necessary and sufficient to interact with Scalloped (Sd) to form a complex. This motif is also present in four mammalian proteins, which are named Vestigial-like proteins (Vgl1-4). In Drosophila, the Vg-Sd complex binds DNA through the Sd TEA/ATTS domain. The Sd-Vg heterodimer is a key regulator of wing development, which directly controls several target genes and is able to induce wing outgrowth when ectopically expressed. This short conserved region is needed for interaction with Sd. Mammalian Vgl-1 may promote cancer progression. Vgl-2 interacts with TEF-1 and MEF2 to promote skeletal muscle differentiation. Vgl-4, is the only member of the Vestigial-like family expressed in the heart.
