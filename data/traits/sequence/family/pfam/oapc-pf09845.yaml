identifier: Pfam:PF09845
label: Origin-associated protein OapC
definition: >-
  This entry includes archaeal Zinc-ribbon containing proteins which are mostly uncharacterised. Some members of this entry have been described as OapC/ArvC, encoded by oapC gene which is part of the three-gene cluster oapABC (origin-associated proteins), involved in generation of extracellular vesicles (arv, archaeal vesiculating GTAse). Knockout of OapC/ArvC leads to over vesiculation, possibly due to dysregulation of OapA/ArvA, a small GTPase, therefore, it has been suggested that OapC/ArvC may represent a GAP.
