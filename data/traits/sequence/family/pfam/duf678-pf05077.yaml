label: Protein of unknown function (DUF678)
definition: >-
  This entry represents Protein A19 from Vaccinia virus, also known as Protein OPG146, and similar sequences from poxvirus. A19 plays a role in the maturation of immature virions to infectious particles. It may also participate in viral transcription.
