identifier: Pfam:PF16492
label: Cadherin cytoplasmic C-terminal
definition: >-
  This entry represents the cytoplasmic C-terminal domain of some proto-cadherins. It is this region of the cadherins that allows cell-adhesion and the essential feature of metazoan multicellularity. Cadherins are cell-surface receptors that function in cell adhesion, cell polarity, and tissue morphogenesis.
