identifier: Pfam:PF20493
label: Fungal WD-like
definition: >-
  This is a domain found in an uncharacterised family of proteins from fungi. It is present in S. japonicus but seems to be absent in S. pombe and S. cerevisiae. It may be a divergent WD repeat-like family of proteins. There are eight conserved cysteine residues.
