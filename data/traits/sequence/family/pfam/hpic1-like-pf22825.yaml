identifier: Pfam:PF22825
label: HpiC1 cyclase
definition: >-
  This entry represents HpiC1, a Stig cyclase that catalyses the formation of 12-epi-hapalindole U. This enzyme folds into a β-sandwich with jelly-roll topology that is distantly related to galactose-binding domains. HpiC1 has two integral Ca2 ions, each with octahedral coordination geometry. Ca2 ions are required for catalytic activity.
