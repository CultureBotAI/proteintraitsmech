label: Family of unknown function (DUF6387)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001055) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide, in particular the yersiniabactin biosynthetic gene cluster from Escherichia coli. This family appears to be predominantly found in Proteobacteria.
