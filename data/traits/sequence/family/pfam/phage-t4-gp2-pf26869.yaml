identifier: Pfam:PF26869
label: Phage T4 terminal DNA protecting protein
definition: >-
  This entry represents the terminal DNA protecting protein found in bacteriophages, including the member from bacteriophage T4, a 274 amino acid protein with a molecular weight of 31.6 kDa. The protein is also known as gene product 64 (gp64) or head protein Gp2. It functions to bind viral DNA ends and protect the viral DNA against recBCD-mediated degradation by the host. The protein is a structural component of the virion capsid and plays a critical role in viral immune evasion by suppressing host innate immune responses. This represents a key mechanism by which phages protect their DNA from host nuclease activity during infection.
