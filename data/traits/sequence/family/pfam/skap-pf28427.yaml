identifier: Pfam:PF28427
label: Small kinetochore-associated protein
definition: >-
  Small kinetochore associated protein (SKAP) cooperates with kinetochore and mitotic spindle proteins to regulate the metaphase-to-anaphase transition. Its interaction with astrin in the kinetochore is important for normal spindle architecture and chromosome alignment. It interacts with MIS13 to orchestrate accurate interaction between kinetochore and dynamic spindle microtubules. It also interacts with mitotic motor CENP-E to orchestrate accurate chromosome segregation in mitosis. SKAP may also promote UV-induced cell apoptosis by negatively regulating the anti-apoptotic protein Prp19.
