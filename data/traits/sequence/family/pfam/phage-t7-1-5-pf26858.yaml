identifier: Pfam:PF26858
label: Phage T7 protein 1.5
definition: >-
  This entry represents protein 1.5 found in bacteriophages. The prototype is from bacteriophage T7, a small 29 amino acid protein with a molecular weight of 3.2 kDa. The protein is also known as gene product 1.5 (Gp1.5) and contains a hydrophobic N-terminal region suggesting potential membrane association. The function of this protein is unknown.
