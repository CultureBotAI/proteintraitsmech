identifier: Pfam:PF09746
label: Tumour-associated protein
definition: >-
  Membralin is evolutionarily highly conserved, though it appears to represent a unique protein family. The protein appears to contain several transmembrane regions. In humans it is expressed in certain cancers, particularly ovarian cancers. Membralin-like gene homologues have been identified in plants including grape, cotton and tomato.
