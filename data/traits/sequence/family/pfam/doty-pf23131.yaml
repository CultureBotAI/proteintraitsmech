identifier: Pfam:PF23131
label: DotY
definition: >-
  This entry represent the type 4 apparatus protein DotY from Legionella pneumophila and related proteins from gammaproteobacteria. DotY is a component of Type 4B secretion (T4BS) system that translocates over 300 effectors into the host cell during infection. This protein is part of a subcomplex which recruits effector proteins and delivers them to the core transmembrane subcomplex. In the membrane-embedded T4 coupling complex (T4CC), DotY makes extensive contacts with DotZ. The DotLMNYZ components form a hetero-pentameric core of the T4CC complex from which the flexible IcmSW module protrudes. These hetero-pentameric complexes assemble and form an inner membrane channel for effectors to pass through. DotY and DotZ play a role in effector translocation and optimise secretion by modulating the delivery trajectory of the IcmSW module.
