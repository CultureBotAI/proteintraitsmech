identifier: Pfam:PF04636
label: PA26 p53-induced protein (sestrin)
definition: >-
  Sestrins (Sesns) are involved in ROS (reactive oxygen species) regulation. In mammals, there are three Sestrins (Sesn1, Sesn2, and Sesn3), while in Drosophila melanogaster and C. elegans, there is only one Sesn. The N-terminal of Sesns shares protein sequence and structural similarity with the C-terminal α-helical domain of the AhpD protein from Mycobacterium tuberculosis. Interestingly, AhpD is a component of alkyl-hydroperoxide reductase participating in defense against ROS and ROS produced by host immune cells.
