identifier: Pfam:PF05115
label: Cytochrome B6-F complex subunit VI (PetL)
definition: >-
  This family consists of several Cytochrome B6-F complex subunit VI (PetL) proteins found in a number of plant species and cyanobacteria. PetL is one of the small subunits which make up the cytochrome b(6)f complex. PetL is not absolutely required for either the accumulation or for the function of cytochrome b6f; in its absence, however, the complex becomes unstable in vivo in aging cells and labile in vitro . It has been suggested that the N terminus of the protein is likely to lie in the thylakoid lumen.
