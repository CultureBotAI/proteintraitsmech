identifier: Pfam:PF14406
label: Ribosomally synthesized peptide in Bacteroidetes
definition: >-
  This ribosomally synthesized peptide is usually in the gene neighbourhood of a RimK-like ATP-grasp, and an ABC ATPase fused to a papain-like domain. It is often present in multiple tandem gene copies. The gene contexts suggest that it is modified by the ATP-grasp as in the biosynthesis of microviridin and marinostatin. They might function in defence or development or as peptide antibiotics.
