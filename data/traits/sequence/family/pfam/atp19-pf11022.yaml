identifier: Pfam:PF11022
label: ATP synthase subunit K
definition: >-
  This entry represents ATP synthase subunit K (Atp19) from fungi. Atp19 is the subunit k of the mitochondrial F1F0 ATP synthase, which produces ATP from ADP in the presence of a proton gradient across the membrane which is generated by electron transport complexes of the respiratory chain. In the yeast Pichia angusta this is known as ATP synthase subunit L.
