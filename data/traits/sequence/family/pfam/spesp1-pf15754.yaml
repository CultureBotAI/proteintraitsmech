identifier: Pfam:PF15754
label: Sperm equatorial segment protein 1
definition: >-
  Equatorial segment protein (ESP) been localised to the equatorial segment of the acrosome in sperm. It defines a discrete acrosomal subcompartment that persists throughout acrosomal biogenesis and is required for fully fertile sperm.
