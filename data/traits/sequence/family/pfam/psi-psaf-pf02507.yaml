identifier: Pfam:PF02507
label: Photosystem I reaction centre subunit III
definition: >-
  Photosystem I (PSI) is an integral membrane protein complex that uses light energy to mediate electron transfer from plastocyanin to ferredoxin. Subunit III (or PsaF) is one of at least 14 different subunits that compose the photosystem I reaction centre (PSI-RC).
