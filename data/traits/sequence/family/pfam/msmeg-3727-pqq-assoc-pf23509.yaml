identifier: Pfam:PF23509
label: MSMEG_3727, PQQ-associated
definition: >-
  Members of this protein family are restricted to members of the Actinobacteria (Mycobacterium smegmatis, Streptomyces hygroscopicus, Geodermatophilus obscurus, Pseudonocardia dioxanivorans, Saccharomonospora marina, etc) that synthesize PQQ. These are small proteins, 155 amino acids long on average, found regularly next to a much larger protein, a PQQ-dependent oxidoreductase, and might be a companion subunit or an accessory protein such as chaperone involved in cofactor insertion.
