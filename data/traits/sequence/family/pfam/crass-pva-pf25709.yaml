identifier: Pfam:PF25709
label: Portal vertex auxiliary protein
definition: >-
  This entry represents the portal vertex auxiliary protein found in bacteriophages. This protein forms a homodimer stabilised by disulfide bonds between residues 25-88 and 47-47 of the two subunits. It is localised at the portal vertex of the viral capsid, with two copies per virion. The protein interacts with the major capsid protein and substitutes for the capsid auxiliary protein at the portal vertex. The portal vertex auxiliary protein has been structurally characterised in the Bacteroides phage crAss001, where it plays an important role in the assembly and stability of the portal-containing vertex of the viral capsid.
