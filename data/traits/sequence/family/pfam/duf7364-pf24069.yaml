identifier: Pfam:PF24069
label: Family of unknown function (DUF7364)
definition: >-
  This entry represents a small uncharacterised family of Pseudomonas phage proteins. Structure prediction suggests that these proteins adopt a pair of α-helices. These proteins are predicted to dimerise to form a four helical bundle. In the predicted dimer there is a short C-terminal β-strand that forms an anti parallel cap at one end of the helical bundle.
