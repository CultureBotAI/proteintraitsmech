identifier: Pfam:PF26867
label: Phage Mu gene product 18
definition: >-
  This entry represents Uncharacterized protein gp18 (Mup18) in bacteriophages. The protein is also known as E18 and is expressed during the intermediate phase of the viral replicative cycle. The protein is localised to the host cell cytoplasm and has been detected at the transcript level. The specific function of this protein remains to be determined. This entry also represents Mu prophage proteins in bacteria.
