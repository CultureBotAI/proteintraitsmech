identifier: Pfam:PF08041
label: PetM family of cytochrome b6f complex subunit 7
definition: >-
  This family consists of the PetM family of cytochrome b6f complex subunit IV. The cytochrome b6f complex consists of 7 subunits and contains 2 beta haem's and 1 chlorophyll alpha per cytochrome f. It is highly active in transferring electrons from decylplastoquinol to oxidised plastocyanin.
