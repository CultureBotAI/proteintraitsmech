identifier: Pfam:PF15290
label: Golgi-localised syntaxin-1-binding clamp
definition: >-
  This family consists of the eukaryotic proteins syntaphilin and syntabulin. Syntaphilin is selectively expressed in the brain. It competes with SNAP-25 for binding to syntaxin-1 and inhibits SNARE complex formation by absorbing free syntaxin-1. In this way, syntaphilin may function as a molecular clamp, controlling free syntaxin-1 availability for the assembly of the SNARE complex, thereby regulating synaptic vesicle exocytosis. Syntabulin is a microtubule-associated protein that has been implicated in syntaxin transport in neurons. It appears to function as a linker molecule that attaches syntaxin-cargo vesicles to kinesin I, enabling the transport of syntaxin-1 to neuronal processes.
