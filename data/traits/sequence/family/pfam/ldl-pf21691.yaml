identifier: Pfam:PF21691
label: Alpha-galactosyl binding lectin
definition: >-
  This protein family includes Alpha-galactosyl-binding lectin from Lyophyllum decastes (LDL) and similar proteins from fungi. This protein forms a compact structure with a five-stranded anti-parallel β-sheet and two α-helices packed against one side of the β-sheet. Two β-sheets pack nearly orthogonal against each other to form a homodimeric structure.
