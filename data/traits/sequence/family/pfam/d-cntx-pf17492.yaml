identifier: Pfam:PF17492
label: Delta Ctenitoxins
definition: >-
  This family includes peptides isolated from Phoneutria such as delta-ctenitoxins. Members of the CNTX-Pn1a family and its paralogues (delta-CNTX-Pn1b through delta-CNTX-Pn1e) of Phoneutria toxins have complex effects on sodium channels, but their primary effect appears to be an inhibition of channel inactivation, a pharmacology similar to that of the delta-atracotoxins and delta-conotoxins. Orthologous toxins such as delta-CNTX-Pr1/PK1 and Pn2 are also family members, some of which act by blocking the calcium channels. Delta-CNTX-Pn1a and delta-CNTX-PN2a are 48-amino-acid polypeptides, with 5 disulfide bridges. The later has a complex pharmacology that results in inhibition of NaV channel inactivation and a hyperpolarizing shift in the channel activation potential.
