identifier: Pfam:PF20882
label: Kinetochore protein Sos7
definition: >-
  This entry represents the central coiled-coil domain of fission yeast Kinetochore protein Sos7 ( , also known as Outer kinetochore KNL1 complex subunit sos7) and related fungal proteins. Attachment of sister chromatids to microtubules in the fission yeast Schizosaccharomyces pombe is mediated by the kinetochore complex NMS (Ndc80-MIND-Spc7). Sos7 is a component of the MIND complex and is required for kinetochore targeting of Spc7. This fungal kinetochore family represented by Sos7 is not present in yeasts belonging to the Saccharomyces. Instead, these organisms have proteins homologous to the S. cerevisiae Spc105 interaction partner Kre28.
