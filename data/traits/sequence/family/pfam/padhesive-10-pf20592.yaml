identifier: Pfam:PF20592
label: Putative adhesin domain (group 10)
definition: >-
  This entry represents a domain found N-terminal to repeating stalk domains in bacterial surface proteins. The structure model of this domain consists out of seven β-strands within two β-sheets, similar to the RrgB pilus backbone, which was again described to correspond to the collagen binding domain. The position of this domain at the tip of bacterial surface proteins suggests an adhesive function.
