identifier: Pfam:PF28973
label: Verrucosidin biosynthesis cluster protein U2
definition: >-
  This entry represents the VerU2 protein family found in ascomycetes. VerU2 is part of the gene cluster that mediates the biosynthesis of verrucosidin, a methylated alpha-pyrone polyketide neurotoxin that inhibits oxidative phosphorylation in mitochondria. The carbon backbone of verrucosidin is synthesised by the HR-PKS verA, and is further modified by other verrucosidin cluster enzymes. The protein contains a disordered N-terminal region. The specific function of VerU2 within the biosynthetic pathway remains to be determined.
