identifier: Pfam:PF17487
label: Ribosomal protein S12
definition: >-
  This entry represents the small ribosomal subunit protein uS12m found mainly in the mitochondria of some trypanosomatid species. RPS12 is a ribosomal protein encoded by the kinetoplast mitochondrion of Kinetoplastida protists such as Trypanosoma. Homologous RPS12 proteins in bacterial ribosomes participate in stabilizing the second base pair of the codon-anticodon duplex in the A site and is likely to be critical for the fidelity of decoding process. A similar role can be anticipated for this protein in mitochondrial ribosomes. This has been shown where the product of edited RPS12 mRNA translation represented a component of the mitoribosome's small subunit.
