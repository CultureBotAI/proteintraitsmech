identifier: Pfam:PF11649
label: Virus neck protein
definition: >-
  This family of protein is represented by bacteriophage T4 Gp14, a major component of the neck along with Gp13. When added to completed heads, Gp13 and Gp14 structural proteins activate the heads for tail joining in vitro complementation mixtures. Gp14 is rich is β-sheets. The formation of the neck to the head of the bacteriophage is crucial for the tail attachment.
