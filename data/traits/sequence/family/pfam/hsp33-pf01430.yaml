identifier: Pfam:PF01430
label: Hsp33 protein
definition: >-
  Hsp33 is a molecular chaperone, distinguished from all other known chaperones by its mode of functional regulation. Its activity is redox regulated. Hsp33 is a cytoplasmically localized protein with highly reactive cysteines that respond quickly to changes in the redox environment. Oxidizing conditions like H 2 O 2 cause disulphide bonds to form in Hsp33, a process that leads to the activation of its chaperone function. In normal (reducing) cytosolic conditions, four conserved Cys residues are coordinated by a Zn ion. Hsp33 is homodimeric in its functional form.
