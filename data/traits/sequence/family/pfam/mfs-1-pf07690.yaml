identifier: Pfam:PF07690
label: Major Facilitator Superfamily
definition: >-
  This family represents a number of transmembrane transporters that are members of the major facilitator superfamily (MFS) of transporters. The major facilitator superfamily (MFS) of membrane proteins represents the largest family of secondary transporters with members from Archaea to Homo sapiens. MFS proteins target a wide spectrum of substrates, including ions, carbohydrates, lipids, amino acids and peptides, nucleosides and other small molecules in both directions across the membrane, in many instances catalysing active transport by transducing the energy stored in an proton electrochemical gradient into a concentration gradient of substrate. One remarkable characteristic of the MFS is the high sequence variety within the superfamily. The sequences identity ranges around 12-18% but regions of functional similarity (e.g., substrate- or H-binding sites) align for only very closely related MFS transporters. A hydrophobic amino acid content of 60-70% of most MFS members, high α-helix content and an inherent symmetry of the proteins with regard to helix kinks and bends provides nonspecific overlapping of residues and probably accounts for the reported similarities. Structure from representative members show 12 transmembrane sections (TMSs) surrounding a central cavity, forming a semi-symmetrical structure. MFS includes 105 families based on phylogenetic analysis, sequence alignments, overlap of hydropathy plots, compatibility of repeat units, similarity of complexity profiles of transmembrane segments, shared protein domains and 3D structural similarities between transport proteins. Among the different families of transporter, only two occur ubiquitously in all classifications of organisms. These are the ATP-Binding Cassette (ABC) superfamily and the Major Facilitator Su…
