identifier: Pfam:PF00420
label: NADH-ubiquinone/plastoquinone oxidoreductase chain 4L
definition: >-
  This entry includes NADH:ubiquinone oxidoreductase, chain 4L and bacterial Mnh complex subunit C. They share significant protein sequence similarity. ADH:ubiquinone oxidoreductase (complex I) ( ) is a respiratory-chain enzyme that catalyses the transfer of two electrons from NADH to ubiquinone in a reaction that is associated with proton translocation across the membrane (NADH + ubiquinone = NAD+ + ubiquinol). In eukaryotes, NADH:ubiquinone oxidoreductase, chain 4L is usually found in either mitochondria or chloroplasts as part of the respiratory-chain NADH dehydrogenase (also known as complex I or NADH-ubiquinone oxidoreductase), an oligomeric enzymatic complex. However, it is also found in bacteria and archaea where it is annotated as NuoK subunit. Mnh subunit C1 is a cation antiporter, involved in K(+) and Na(+) excretion.
