identifier: Pfam:PF03437
label: BtpA family
definition: >-
  Members of this family are found in Caenorhabditis elegans, Synechocystis sp., E. coli, and several of the Archaea. Members in Cyanobacteria have been shown to play a role in protein complex biogenesis, and designated BtpA (biogenesis of thylakoid protein). BtpA appears to act at the level of Photosystem I (PSI) stabilisation. Homologues in non-photosynthetic species, where thylakoid intracytoplasmic membranes are lacking, are likely to act elsewhere in membrane protein biogenesis.
