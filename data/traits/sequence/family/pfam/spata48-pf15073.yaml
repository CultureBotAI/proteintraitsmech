identifier: Pfam:PF15073
label: Spermatogenesis-associated protein 48
definition: >-
  Spermatogenesis-associated protein 48 is also known as sperm microtubule inner protein 7 (SPMIP7) and post-meiotic spermatogenesis protein 1. In humans, it is found in the chromosomal position, C7orf72. Lack of this protein leads to small testis and defective spermatogenesis in mice. SPATA48 has homologs in humans, mice, chimpanzees and macaques but these proteins have no conserved domains and their function is unclear.
