identifier: Pfam:PF26840
label: DSR anti-defense 1 family
definition: >-
  The DSR anti-defense 1 family functions to counteract the defense-associated sirtuin 2 (DSR2) defense system of the host. Members of this family inhibit the NADase activity of host DSR2 by competing with the tail tube protein that normally activates DSR2. This interaction occurs in a 2:4 ratio with Bacillus subtilis DSR2, preventing the activation of the NADase defence activity of DSR2.
