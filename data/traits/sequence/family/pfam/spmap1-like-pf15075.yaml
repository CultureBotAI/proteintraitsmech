identifier: Pfam:PF15075
label: Sperm microtubule associated protein 1
definition: >-
  This family (previously DUF4542) represents the homologs of Sperm microtubule associated protein 1 (SPMAP1 also known as C17orf98). These proteins contain a conserved IPPYN sequence motif. The EM structure of sperm DMTs shows that SPMAP1 interacts directly with the tubulin lattice at the A-tubule seam (between protofilaments A09/A10) where outer dense fibers (ODFs) are connected to dynein-decorated doublet microtubules (DMTs).
