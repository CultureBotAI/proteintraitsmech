identifier: Pfam:PF05287
label: PMG protein
definition: >-
  This entry represents the keratin-associated proteins, PMG type. The major structural proteins of mammalian hair are the hair keratin intermediate filaments (KIFs) and the keratin-associated proteins (KRTAPs). In the hair cortex, hair keratins are embedded in an inter-filamentous matrix consisting of KRTAPs which are essential for the formation of a rigid and resistant hair shaft as a result of disulphide bonds between cysteine residues. There are essentially three groups of KRTAPs, viz: the high-sulphur (HS) and ultra-high-sulphur (UHS) KRTAPs (cysteine content: 16-30 and >30 mol%, respectively) and the high-glycine/tyrosine (HGT: 35-60 mol% glycine and tyrosine) KRTAPs.
