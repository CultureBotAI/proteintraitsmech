identifier: Pfam:PF24296
label: SrfA protein
definition: >-
  This entry represents the Stress Response Facilitator A SrfA from Pseudomonas aeruginosa ( ) and similar sequences from Pseudomonas species. SrfA was shown to play a positive role in the sigma(22)-dependent activation of the algD promoter under stress in both sessile and planktonic conditions. This protein folds into an α-helical hairpin.
