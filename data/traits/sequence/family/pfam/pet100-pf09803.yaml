identifier: Pfam:PF09803
label: Pet100
definition: >-
  Pet100 is a chaperone required for the assembly of cytochrome c oxidase. The human Pet100 homologue (also known as C19orf79) has been shown to be located in the mitochondrial inner membrane and forms a ~300kDa subcomplex with mitochondrial complex IV subunits.
