identifier: Pfam:PF15138
label: Syncollin
definition: >-
  Syncollin is a protein associated with the luminal surface of the zymogen granule membrane in the pancreatic acinar cell. It functions in exocytosis regulating the maturation and concentration of zymogens in zymogen granules. Syncollin is also present in neutrophilic granulocytes and promyelocytic HL-60 cells.
