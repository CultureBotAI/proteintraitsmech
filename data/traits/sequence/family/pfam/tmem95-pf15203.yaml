identifier: Pfam:PF15203
label: TMEM95 family
definition: >-
  TMEM95 and its homologues can be found in eukaryotes. They have a conserved LGG sequence motif. TMEM95 is a sperm membrane protein required for sperm-oocyte fusion and is essential for mammalian fertilization.
