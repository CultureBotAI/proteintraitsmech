identifier: Pfam:PF04668
label: Twisted gastrulation (Tsg) protein conserved region
definition: >-
  This entry represents the C-terminal domain of Tsg. This domain contains a mixed α/β fold. It is stabilised by disulfide bonds. It directly binds the C-terminal region of Chordin, a BMP antagonist, to stabilise the inhibitory complex that blocks BMP-receptor interactions. Twisted gastrulation (Tsg) was identified in Drosophila melanogaster as being required to specify the dorsal-most structures in the embryo, for example, the amnioserosa. Biochemical experiments have revealed three key properties of Tsg: It can synergistically inhibit Dpp/BMP action in both D. melanogaster and vertebrates by forming a tripartite complex between itself, SOG/chordin and a BMP ligand; Tsg seems to enhance the Tld/BMP-1-mediated cleavage rate of SOG/chordin and may change the preference of site utilisation; Tsg can promote the dissociation of chordin cysteine-rich-containing fragments from the ligand to inhibit BMP signalling.
