identifier: Pfam:PF28796
label: Small integral membrane protein 26
definition: >-
  This protein family includes human Small integral membrane protein 2 (SMIM26) and similar sequences. SMIM26 may play a role in cell viability. This microprotein suppresses clear cell renal cell carcinoma growth and metastasis. It is predicted to adopt an α helical configuration.
