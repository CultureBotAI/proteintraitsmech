identifier: Pfam:PF06089
label: L-asparaginase II
definition: >-
  This family consists of several bacterial L-asparaginase II proteins. L-asparaginase ( ) catalyses the hydrolysis of L-asparagine to L-aspartate and ammonium. Rhizobium etli possesses two asparaginases: asparaginase I, which is thermostable and constitutive, and asparaginase II, which is thermolabile, induced by asparagine and repressed by the carbon source.
