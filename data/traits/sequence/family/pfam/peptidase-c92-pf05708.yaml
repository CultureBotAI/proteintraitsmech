identifier: Pfam:PF05708
label: Permuted papain-like amidase enzyme, YaeF/YiiX, C92 family
definition: >-
  Amidase_YiiX is a family of permuted papain-like amidases. It has amidase specificity for the amide bond between a lipid and an amino acid (or peptide). From the structure, a tetramer, each monomer is made up of a layered α-β fold with a central, 6-stranded, antiparallel β-sheet that is protected by helices on either side. The catalytic Cys154 in , , is located on the N terminus of helix αF. The two additional helices located above Cys154 contribute to the formation of the active site, where the lysine ligand is bound. This family also includes poxvirus protein G6 (also known as OPG091) which has sequence similarity with a group of bacterial permuted papain-like amidases, whose gene might have been acquired from a bacterial source at the onset of poxvirus evolution.
