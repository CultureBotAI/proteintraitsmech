identifier: Pfam:PF21980
label: Condensin complex protein MksE
definition: >-
  This entry represents a small family of MksE proteins. These proteins are part of MksBEF complex, which primarily function in structural chromosome maintenance. The N-terminal part of MksE is remotely related to the chromosome partition protein MukE and most likely adopts the same structure that consists of two winged helix domains (WHD).
