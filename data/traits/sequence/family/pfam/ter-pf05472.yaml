identifier: Pfam:PF05472
label: DNA replication terminus site-binding protein (Ter protein)
definition: >-
  This entry contains several bacterial DNA replication terminus site-binding proteins (also known as Tus or Ter-binding proteins). They are required for the termination of DNA replication and function by binding to DNA replication terminator sequences, thus preventing the passage of replication forks. The termination efficiency is affected by the affinity of a particular protein for the terminator sequence.
