identifier: Pfam:PF13310
label: Virulence protein RhuM family
definition: >-
  There are currently no experimental data for members of this group or their homologues. However, these proteins are implicated in virulence/pathogenicity because RhuM is encoded in the SPI-3 pathogenicity island in Salmonella typhimurium.
