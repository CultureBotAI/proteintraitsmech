identifier: Pfam:PF08316
label: Pal1 cell morphology protein
definition: >-
  Pal1 is a membrane associated protein that is involved in the maintenance of cylindrical cellular morphology. It localises to sites of active growth. Pal1 physically interacts and displays overlapping localisation with the Huntingtin-interacting-protein (Hip1)-related protein Sla2p/End4p. Fission yeast Pal1 is involved in cellular morphogenesis and cell wall integrity.
