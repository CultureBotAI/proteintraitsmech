identifier: Pfam:PF13801
label: Heavy-metal resistance
definition: >-
  This is a family of metal-binding proteins which are involved in resistance to heavy-metal ions. These proteins form a four-helix hooked hairpin, consisting of two long α helices each flanked by a shorter α helix. They bind a metal ion in a type-2 like centre and contain two copies of an LTXXQ motif. This family includes Signaling pathway modulator ZraP which is Is the main zinc containing protein under zinc stress conditions and is a component of the Zra signaling pathway, an envelope stress response (ESR) system composed of the periplasmic accessory protein ZraP, the histidine kinase ZraS and the transcriptional regulator ZraR. Another members of this family are the Nickel and cobalt resistance proteins CnrR and NccX which are responsible for the linked resistance to nickel and cobalt.
