identifier: Pfam:PF27931
label: Succinate dehydrogenase subunit 7, mitochondrial
definition: >-
  The succinate dehydrogenase complex (complex II) is a highly conserved protein complex composed of the SDH1-SDH4 subunits in bacteria and in the mitochondria of animals and fungi, with up to four additional subunits in complex II of plants, termed SDH5-SDH8. SDH6 and SDH7 contribute to anchoring succinate dehydrogenase to the inner mitochondrial membrane. This entry represents SDH7.
