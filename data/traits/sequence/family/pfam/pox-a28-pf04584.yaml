identifier: Pfam:PF04584
label: Poxvirus A28 family
definition: >-
  The poxvirus A28 protein, also known as Envelope protein OPG155, is expressed at late times during the virus replication cycle and is a membrane component of the intracellular mature virion. Repression of A28 inhibits cell-to-cell spread, suggesting that all poxviruses use a common A28-dependent mechanism of cell penetration. An N-terminal hydrophobic sequence, present in all poxvirus A28 orthologues, anchors the protein in the virion surface membrane so that most of it is exposed to the cytoplasm.
