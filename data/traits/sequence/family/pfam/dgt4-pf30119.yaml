identifier: Pfam:PF30119
label: Augmin complex subunit dgt4
definition: >-
  This entry represents the DGT4 family of proteins found in arthropods. DGT4 is a component of the augmin complex which plays a role in centrosome-independent generation of spindle microtubules. The complex is required for mitotic spindle assembly through its involvement in localising gamma-tubulin to spindle microtubules. DGT4 is part of the eight-subunit augmin complex composed of dgt2, dgt3, dgt4, dgt5, dgt6, msd1, msd5 and wac. The protein localises to the cytoplasm and spindle.
