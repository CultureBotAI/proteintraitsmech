identifier: Pfam:PF15603
label: Immunity protein 74
definition: >-
  This family consists of predicted immunity proteins with an α+β fold. They are encoded by genes present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, which usually contains toxin domains of the Tox-ARC family. They are also found in heterogeneous polyimmunity loci.
