identifier: Pfam:PF25617
label: Bacteriophage PhiKZ vertex-binding protein gp86
definition: >-
  This entry represents the vertex-binding protein gp86 from jumbo bacteriophage PhiKZ that infects Pseudomonas aeruginosa. This protein is a product of proteolytic cleavage by the head maturation protease Gp175, with the N terminus of the modelled part located near verified proteolytic sites. Gp86 has an elongated shape rich in α-helices and forms the peripheral edge of the vertex-binding complex attached to the inner surface of the viral capsid. It is further supported by two minor capsid proteins - Gp162I, which interacts with Gp86 by joining its α-helix with the α-helix bundle of Gp86, and Gp184, which inserts into the hollow between Gp86 and the centre of hexameric capsomer 1. Gp86 extensively interacts with almost all MCP subunits from hexameric capsomer 1 (except for subunit d, where Gp184 fills the gap). This protein plays a critical role in stabilising the capsid vertex by linking the vertex-binding complex to the hexameric capsomer. Similar proteins are found in other jumbo phages, suggesting a conserved mechanism for capsid assembly and stabilisation in large viruses.
