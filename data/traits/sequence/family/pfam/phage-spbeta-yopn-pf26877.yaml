identifier: Pfam:PF26877
label: SPbeta prophage protein YopN
definition: >-
  This entry represents the YopN protein family found in SPbeta prophages. YopN is an uncharacterised protein of 105 amino acids found in the temperate bacteriophage SPbeta that infects Bacillus subtilis. The protein is encoded within the prophage genome when SPbeta is integrated into the host chromosome. SPbeta is a well-studied temperate phage that can exist in both lysogenic and lytic states. The specific function of YopN remains unknown.
