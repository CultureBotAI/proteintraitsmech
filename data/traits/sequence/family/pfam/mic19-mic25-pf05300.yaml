identifier: Pfam:PF05300
label: MICOS complex subunit MIC19/MIC25
definition: >-
  MIC19 (also known as ChChd3) and MIC25 (also known as ChChd6) are components of the MICOS complex, a large protein complex of the mitochondrial inner membrane that plays crucial roles in the maintenance of crista junctions, inner membrane architecture, and formation of contact sites to the outer membrane. MIC19 plays an important role in the maintenance of the MICOS complex stability and the mitochondrial cristae morphology.
