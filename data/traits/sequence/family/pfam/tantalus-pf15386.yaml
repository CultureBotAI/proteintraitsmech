identifier: Pfam:PF15386
label: Drosophila Tantalus-like
definition: >-
  This entry consist of an α+β fold domain found in metazoan proteins such as tantalus from Drosophila. Tantalus is a potential cofactor involved in sensory organ development. It binds the chromatin protein additional sex combs (Asx) and also binds DNA in vitro. Proteins containing this domain also include proline-rich protein 14 (PRR14) and related proteins from mammals.
