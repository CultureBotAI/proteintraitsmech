identifier: Pfam:PF12259
label: Baculovirus F protein
definition: >-
  This entry includes the Baculovirus envelope fusion protein, which is an envelope glycoprotein mediating the fusion of viral and host endosomal membranes leading to virus entry into the host cell. Protein AC23, which is a nonfunctional F-like protein from the Autographa californica nuclear polyhedrosis virus, is a pathogenicity factor that accelerates mortality in the host insect. This entry also includes transposable element that have sequence similarity to the envelope fusion proteins of Baculovirus, such as retrovirus-related Env polyprotein from copia-like transposable element 17.6 (Env 17.6) from Drosophila melanogaster.
