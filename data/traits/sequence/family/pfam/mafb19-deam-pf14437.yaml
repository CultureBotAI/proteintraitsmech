identifier: Pfam:PF14437
label: MafB19-like deaminase
definition: >-
  Cytidine deaminase ( ) (cytidine aminohydrolase) catalyses the hydrolysis of cytidine into uridine and ammonia while deoxycytidylate deaminase ( ) (dCMP deaminase) hydrolyses dCMP into dUMP. Both enzymes are known to bind zinc and to require it for their catalytic activity. The deaminases possess either one or two conserved zinc-coordinating (Z) motifs, with the consensus amino acid signature H-x(1)-E-x(24,28)-P-C-x(2,4)-C. This motif is required for catalytic activity. Zinc coordination is mediated by a histidine and two cysteines. The CMP/dCMP-type deaminase domain consists of a central β-sheet with one or more α-helices on each side. This entry represents the CMP/dCMP-type deaminase domain. Some enzymes, such as riboflavin biosynthesis protein PYRR, have a non-functional deaminase domain that lacks the catalytically essential zinc-binding residues.
