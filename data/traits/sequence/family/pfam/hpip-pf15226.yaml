identifier: Pfam:PF15226
label: HCF-1 beta-propeller-interacting protein family
definition: >-
  VP16 is a component of virion tegument layer that is required for the transcription of the viral immediate-early (IE) genes. In case of human herpes simplex virus (HSV) infection, VP16 binds to HCF-1 (host cell factor 1) and translocates to the nucleus to form a complex with the POU domain protein Oct-1. This complex then directs high level IE gene transcription by the potent activation domain in the C terminus of VP16. HCF-1 provides two functions required by VP16, complex assembly and nuclear targeting.
