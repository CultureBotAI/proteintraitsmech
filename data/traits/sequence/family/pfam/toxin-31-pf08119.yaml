identifier: Pfam:PF08119
label: Scorpion acidic alpha-KTx toxin family
definition: >-
  This entry represents proteins that are acidic alpha-KTx short chain scorpion toxins. These toxins are named parabutoxins, that binds and inhibit voltage-sensitive potassium channels and inhibit the vertebrate potassium channel Kv1.1 with low affinity. Furthermore, they lack the crucial pore-plugging lysine. In addition, the second important residue of the dyad, the hydrophobic residue (Phe or Tyr) is also missing.
