identifier: Pfam:PF08056
label: Tryptophan operon leader peptide
definition: >-
  This family consists of the tryptophan operon leader peptides, which are important for the control of tryptophan biosynthesis. The tryptophan operon is regulated by transcription attenuation in response to changes in the level of tryptophan. The transcript of the leader peptide can adopt alternative mutually-exclusive secondary structures that would either result in termination of transcription of the tryptophan structural genes or in transcription of the entire operon.
