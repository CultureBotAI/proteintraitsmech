identifier: Pfam:PF10221
label: Cell cycle and development regulator Mat89Bb
definition: >-
  This entry represents the cell cycle regulator Mat89b (also known as protein asunder), which plays an evolutionarily conserved role as a crucial regulator of both cell cycle and development. It is a component of INT (Integrator) complex, being involved in the 3'-end processing of the U7 snRNA, and also the spliceosomal snRNAs U1 and U5. Mat89Bb is also required for the correct dynein-dynactin perinuclear localization. Mat89Bb is a PNG kinase substrate that is essential for S-M cycles of early Drosophila embryogenesis, Xenopus embryonic cell cycles and morphogenesis, and cell division in cultured mammalian cells.
