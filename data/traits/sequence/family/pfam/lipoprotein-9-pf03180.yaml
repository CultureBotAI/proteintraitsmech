identifier: Pfam:PF03180
label: NlpA lipoprotein
definition: >-
  This entry represents bacterial lipoproteins that belong to the NlpA family. It contains several antigenic members, that may be involved in bacterial virulence. This entry includes the D-methionine binding lipoprotein MetQ, which is the substrate-binding component of a D-methionine permease, a binding protein-dependent, ATP-driven transport system. Other members of this family, such as NlpA, have been identified as putative substrate-binding components of ABC transporters. NlpA, is an inner-membrane-anchored lipoprotein that has been shown to have a minor role in methionine import.
