label: Family of unknown function (DUF6190)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0002018) is described by MIBiG as an example of an unspecified biosynthetic class. It includes a member from the azomycin biosynthetic gene cluster from Streptomyces cattleya NRRL 8057 = DSM 46488. This family appears to be predominantly found in bacteria.
