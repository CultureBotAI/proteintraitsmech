identifier: Pfam:PF14183
label: YwpF-like protein
definition: >-
  The YwpF-like protein family includes the B. subtilis YwpF protein , which is functionally uncharacterised. Proteins in this family are typically between 146 and 167 amino acids in length and contain a conserved IIN sequence motif.
