identifier: Pfam:PF30310
label: MICOS complex subunit MIC27
definition: >-
  This entry represents MICOS complex subunit MIC27, found in Saccharomycetaceae yeasts. MIC27 is a component of the mitochondrial contact site and cristae organising system (MICOS) complex, which includes MIC10, MIC12, MIC19, MIC26, MIC27 and MIC60. The MICOS complex plays crucial roles in maintenance of crista junctions, inner membrane architecture, and formation of contact sites to the outer membrane. MIC27 is a multi-pass membrane protein localised to the mitochondrial inner membrane and enriched at crista junctions.
