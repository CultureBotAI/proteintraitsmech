identifier: Pfam:PF17574
label: Inhibitor of toxin/antitoxin system (Gp4.5)
definition: >-
  This is a family of prokaryotic toxin-antitoxin (TA) systems inhibitors, found in Podoviridae such as Enterobacteria phage T7. Family members such as Gene product 4.5 have been shown to neutralize TA-system-mediated abortive infection by inhibiting the Lon protease activity, thus preventing antitoxin degradation and toxin activation.
