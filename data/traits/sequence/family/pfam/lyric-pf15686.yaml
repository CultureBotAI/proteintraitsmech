identifier: Pfam:PF15686
label: Lysine-rich CEACAM1 co-isolated protein family
definition: >-
  LYRIC (Lysine-rich CEACAM1 co-isolated protein), also known as Astrocyte-elevated gene-1 (AEG-1), is a type-1b membrane protein with a single transmembrane domain and localises to the endoplasmic reticulum and the nuclear envelope. It is also found in the nucleolus, suggesting functional relationships between these two cellular compartments. It is found to be colocalised with tight junction proteins ZO-1 and occludin in polarised epithelial cells, suggesting that LYRIC is part of the tight junction complex. LYRIC has been shown to promote angiogenesis and tumour cell migration and invasion by activating the transcription factor NF-kappaB.
