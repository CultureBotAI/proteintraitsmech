identifier: Pfam:PF16296
label: N-terminal of TM subunit in PBP-dependent ABC transporters
definition: >-
  This domain is found in putative transmembrane subunits (TM) from Periplasmic Binding Protein (PBP)-dependent ATP-Binding Cassette (ABC) transporters which generally bind type 2 PBPs, such maltose transport permease MalF. It is mainly found in Actinobacteria and Thermotoga species. The function of this domain is unknown.
