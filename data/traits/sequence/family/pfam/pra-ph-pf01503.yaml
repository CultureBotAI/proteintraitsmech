identifier: Pfam:PF01503
label: Phosphoribosyl-ATP pyrophosphohydrolase
definition: >-
  Phosphoribosyl-ATP pyrophosphatase, catalyses the second step in the histidine biosynthetic pathway: 5-phosphoribosyl-ATP + H2O = 5-phosphoribosyl-AMP + PPi The Neurospora crassa enzyme also catalyzes the reactions of histidinol dehydrogenase ( ) and phosphoribosyl-AMP cyclohydrolase ( ). This entry also includes the Bacillus subtilis Cof proteins, which catalyze the hydrolysis of 4-amino-2-methyl-5-hydroxymethylpyrimidine pyrophosphate to 4-amino-2-methyl-5-hydroxymethylpyrimidine phosphate.
