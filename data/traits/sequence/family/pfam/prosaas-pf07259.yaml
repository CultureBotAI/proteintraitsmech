identifier: Pfam:PF07259
label: ProSAAS precursor
definition: >-
  Prohormone convertases (PCs) 1 and 2 are a family of eukaryotic subtilisins thought to mediate the proteolytic cleavage of many peptide precursors. This family represents proSAAS, which belongs to MEROPS inhibitor family I49. It is a neuroendocrine secretory protein which is a potent endogenous PC1 inhibitor. ProSAAS consists of an N-terminal domain and a C-terminal domain separated by a furin cleavage site. The inhibitory region of proSAAS is located in the C-terminal domain and includes the LLRVKR hexapeptide sequence. However, the distribution of ProSAAS and PC1/3 within the brain is different and their expression is also not coregulated and a wider range of neuronal functions has been reported for ProSAAS, including acting as an amyloid anti-aggregant chaperon in Alzheimer's disease, inhibition of the fibrillation of alpha-synuclein in the substantia nigra of patients with Parkinson's disease and exhibits a neuroprotective function. This protein has also been associated with tau inclusions in Pick's disease. ProSAAS-derived peptides are involved in several physiologically important processes, including regulation of food intake. The proSAAS peptides are highly abundant and broadly expressed in the brain, and their receptors represent an emerging target for novel therapeutics for anxiety, pain and and body weight regulation. Recently, the neuropeptide PEN derived from the precursor ProSAAS has been identified as a selective, high affinity endogenous ligand for the orphan receptor GPR83 and showed regional specific expression in neuroendocrine tissues which suggests it can be a potential target for the treatment of neurological and immune diseases.
