identifier: Pfam:PF11692
label: Protein of unknown function (DUF3289)
definition: >-
  Members of this protein family have been found in several species of gammaproteobacteria, including Yersinia pestis and Yersinia pseudotuberculosis, Xylella fastidiosa, and Escherichia coli (strain UTI89 / UPEC). As many as five members can be found in a single genome; their function is unknown. Recently, it was proposed that members of this family along with members of should be recognised as a putative toxin-antitoxin pair in which is a homologue of Colicin M and acts as its cognate immunity protein.
