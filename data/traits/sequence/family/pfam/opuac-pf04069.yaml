identifier: Pfam:PF04069
label: Substrate binding domain of ABC-type glycine betaine transport system
definition: >-
  This domain is a part of a high affinity multicomponent binding-protein-dependent transport system involved in bacterial osmoregulation. This domain is often fused to the permease component of the transporter complex. It is often found in integral membrane proteins or proteins predicted to be attached to the membrane by a lipid anchor. Glycine betaine is involved in protection from high osmolarity environments for example in Bacillus subtilis. OpuBC is closely related and involved in choline transport. Choline is necessary for the biosynthesis of glycine betaine. L-carnitine is important for osmoregulation in Listeria monocytogenes. This domain is found also in proteins binding l-proline (ProX), histidine (HisX), trimethylamine N-oxide (TMAO) and taurine (TauA).
