identifier: Pfam:PF08757
label: CotH kinase protein
definition: >-
  Members of this family include the Bacillus subtilis spore coat protein H (CotH). Assembly of CotH requires both CotE and GerE and is required for the correct assembly of both inner and outer layers of the coat. CotH appears to be a structural component of the coat being localised at the interface of the 2 coat layers. Furthermore, CotH has been shown to be an atypical protein kinase. CotH-dependent phosphorylation of CotB and CotG is required for the efficient germination of B. subtilis spores. This entry also includes CotH2/3/7 from Rhizopus delemar (mucormycosis agent), which promote invasion of host epithelial cells by adhering to receptors on the host cell surface to facilitate endocytosis of the pathogen into host cells.
