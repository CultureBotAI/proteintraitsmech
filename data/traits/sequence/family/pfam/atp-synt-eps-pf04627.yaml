identifier: Pfam:PF04627
label: Mitochondrial ATP synthase epsilon chain
definition: >-
  Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP. F-ATPases (also known as ATP synthases, F1F0-ATPase, or H(+)-transporting two-sector ATPase) ( ) are composed of two linked complexes: the F1 ATPase complex is the catalytic core and is composed of 5 subunits (alpha, beta, gamma, delta, epsilon), while the F0 ATPase complex is the membrane-embedded proton channel that is composed of at least 3 subunits (A-C), with additional subunits in mitochondria. Both the F1 and F0 complexes are rotary motors that are coupled back-to-back. In the F1 complex, the central gamma subunit forms the rotor inside the cylinder made of the α(3)β(3) subunits, while in the F0 complex, the ring-shaped C subunits forms the rotor. The two rotors rotate in opposite directions, but the F0 rotor is usually stronger, using the force from the proton gradient to push the F1 rotor in reverse in order to drive ATP synthesis. These ATPases can also work in reverse in bacteria, hydrolysing ATP to create a proton gradient. This family constitutes the mitochondrial ATP synthase epsilon subunit, which is distinct from the bacterial epsilon subunit (the latter being homologous to the mitochondrial delta subunit, ). The mitochondrial epsilon subunit is located in the stalk region of the F1 complex, and acts as an inhibitor of the ATPase catalytic core. The epsilon subunit can assume two conformations, contracted and extended, where the latter inhibits ATP hydrolysis. The conformation of the epsilon subunit is determ…
