identifier: Pfam:PF25724
label: Crassvirus tail hub protein A
definition: >-
  This entry represents the tail hub protein A (THA) found in bacteriophages. The protein forms a heterotrimer with tail hub protein B (THB), with each assembly consisting of two copies of THA and one copy of THB ( ). These heterotrimers further assemble as 12 docking hubs that form a continuous collar around the tail barrel. The docking hubs interact with the trimeric tail fibre protein, accommodating its N-terminal region. THA forms disulfide bonds with THB and with the ring proteins of the tail barrel, contributing to the stability of the tail assembly. The tail hub proteins play an important structural role in phage architecture, serving as the attachment point for the tail fibre appendages that are involved in host recognition. THA has been structurally characterised in the Bacteroides phage crAss001, revealing its role in the architecture of the phage tail.
