identifier: Pfam:PF06841
label: T4-like virus tail tube protein gp19
definition: >-
  This family consists of several tail tube protein gp19 and gp3 from the T4-like viruses. The contractile tail of bacteriophage T4 consists of a contractile sheath, a tube and a baseplate. The central cylindrical segment of the tail consists of a rigid tube, composed of multiple copies of gp19, surrounded by the outer contractile sheath assembled from gp18 subunits. Gp3 plays an essential role in tail assembly by capping the rapidly polymerizing tail once it has reached its requisite length and serving as the interaction surface for the completion protein.
