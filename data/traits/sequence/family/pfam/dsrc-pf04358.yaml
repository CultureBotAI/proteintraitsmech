identifier: Pfam:PF04358
label: DsrC like protein
definition: >-
  Members of this protein family include TusE, a partner to TusBCD in a sulphur relay system for 2-thiouridine biosynthesis, a tRNA base modification process. Other members are DsrC, a functionally similar protein in species where the sulphur relay system exists primarily for sulphur metabolism, rather than tRNA base modification. Some members of this family are known explicitly as the gamma subunit of sulphite reductases.
