label: Family of unknown function (DUF6577)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is found in bacteria, mainly Bacteroidetes and Firmicutes. Proteins in this family are typically between 239 and 255 amino acids in length. There are some conserved sequences, GxY, EKxxVD and YAxxRR and a conserved His.
