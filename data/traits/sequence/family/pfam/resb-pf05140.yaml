identifier: Pfam:PF05140
label: 'ResB-like family '
definition: >-
  This domain is found in a number of known and suspected cytochrome c biogenesis proteins, including ResB. Mutations in ResB indicate that they are essential for growth. ResB is predicted to be a transmembrane protein.
