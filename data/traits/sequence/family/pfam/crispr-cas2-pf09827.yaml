identifier: Pfam:PF09827
label: CRISPR associated protein Cas2
definition: >-
  This entry represents members of the family of Cas2, one of the first four protein families found to be associated with prokaryotic genomes containing multiple CRISPR elements. CRISPR systems protect against invasive nucleic acid sequences, including phage. Cas2 proteins have been characterised as either endoribonuclease (for ssRNA) or endodeoxyribonuclease (for dsDNA), depending on the system to which the Cas2 belongs. The cas genes usually are found near the palindromic repeats. It's worth noting that there is a distinct branch of the Cas2 family showing a very low level of sequence identity. The structural subunit of Cas2, belongs to the VapD family of interferases. The interferase catalytic site is intact in the majority of the Cas2 proteins but is disrupted in some, and is not required for spacer acquisition. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This entry also includes the endoribonuclease VapD. These proteins are defined by a conserved region found at the N terminus of the VapD protein.
