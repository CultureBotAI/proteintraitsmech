identifier: Pfam:PF30736
label: VHS2/MLF3
definition: >-
  This entry represents the VHS2/MLF3 family of proteins found in fungi. In Saccharomyces cerevisiae, VHS2 (Viable in a HAL3 SIT4 background protein 2) can suppress the synthetic lethality of the hal3 sit4 double mutation when overexpressed, suggesting involvement in the G1-S cell cycle transition. MLF3 (Multicopy suppressor of Leflunomide sensitivity 3) affects resistance to the immunosuppressant leflunomide. Both VHS2 and MLF3 are cytoplasmic proteins that contain multiple phosphorylation sites and are involved in establishment or maintenance of actin cytoskeleton polarity.
