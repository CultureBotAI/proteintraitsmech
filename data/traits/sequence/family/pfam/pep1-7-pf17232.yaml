identifier: Pfam:PF17232
label: Elicitor peptide 1-7
definition: >-
  This entry include a group of elicitor peptides from plants, including Arabidopsis AtPEP1-7. AtPEP1 activates transcription of the defensive gene defensin (PDF1.2) and activates the synthesis of H(2)O(2), both being components of the innate immune response. It also induces lignin and callose depositions, which leads to strengthen cell walls in root as part of the immune response.
