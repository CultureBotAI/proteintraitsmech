identifier: Pfam:PF12262
label: Bacterial virulence factor lipase N-terminal
definition: >-
  This domain is found in bacterial sequences, and is typically between 258 and 271 amino acids in length. There are two conserved sequence motifs: DGT and DGWST. The domains occurs in the N-terminal region of bacterial virulence factor lipase. The N-terminal region contains a potential signalling sequence.
