identifier: Pfam:PF06109
label: Haemolysin E (HlyE)
definition: >-
  This family consists of bacterial haemolysin E (HlyE) proteins. HlyE is a toxin, which has some hemolytic activity towards mammalian cells. It acts by forming a pore-like structure upon contact with mammalian cells. HlyE is unrelated to the well characterised pore-forming E. coli haemolysins of the RTX family, haemolysin A (HlyA), and the enterohaemolysin encoded by the plasmid borne ehxA gene of E. coli 0157. However, it is evident that expression of HlyE in the absence of the RTX toxins is sufficient to give a haemolytic phenotype in E. coli. HlyE is a protein of 34kDa that is expressed during anaerobic growth of E. coli. Anaerobic expression is controlled by the transcription factor, FNR, such that, upon ingestion and entry into the anaerobic mammalian intestine, HlyE is produced and may then contribute to the colonisation of the host.
