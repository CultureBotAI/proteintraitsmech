identifier: Pfam:PF08327
label: Activator of Hsp90 ATPase homolog 1-like protein
definition: >-
  This entry represents a domain found in eukaryotic, prokaryotic and archaeal proteins that bear similarity to a C-terminal region of human activator of 90kDa heat shock protein ATPase homologue 1 (AHSA1/p38, ) and Aha1 from yeast. This is a START-like domain (also referred to as SRPBCC domain which stands for START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) which interacts with, and stabilizes the hydrophobic binding groove exposed after the interaction between the N-terminal domain of Aha1 ( ) and the middle domain of Hsp90. SRPBCC domains have a deep hydrophobic ligand-binding pocket. This domain is found repeated in two members of this entry ( and ). AHSA1/Aha1 are known to interact with the middle domain of Hsp90, and stimulate its ATPase activity, one Aha1 molecule per Hsp90 dimer is sufficient for a full stimulation of Hsp90. It is probably a general up regulator of Hsp90 function, particularly contributing to its efficiency in conditions of increased stress. AHSA1 is also known to interact with the cytoplasmic domain of the VSV G protein, and may thus be involved in protein transport. It has also been reported as being under expressed in Down's syndrome.
