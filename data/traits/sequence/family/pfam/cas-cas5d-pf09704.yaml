identifier: Pfam:PF09704
label: CRISPR-associated protein (Cas_Cas5)
definition: >-
  This entry represents Cas5, a sequence-specific endonuclease that cleaves pre-crRNA into mature crRNA, possibly by an intramolecular attack of the 2'-hydroxyl group of G26 on the scissile phosphodiester, cutting the precursor 3' to G26 residue yielding 5'-hydroxyl and 2' and/or 3' ends lacking a hydroxyl group (perhaps a 2'/3' cyclic phosphodiester). Cas5 and Cas6 are also required for optimal crRNA processing and/or stability. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
