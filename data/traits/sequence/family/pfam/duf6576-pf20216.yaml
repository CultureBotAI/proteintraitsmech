identifier: Pfam:PF20216
label: Family of unknown function (DUF6576)
definition: >-
  This presumed domain is functionally uncharacterised. This domain family corresponds to the C-terminal domain of proteins that are thought to belong to the rhomboid family. It is approximately 40 amino acids in length and it is found mainly in Bacteroidetes. It contains the conserved sequences DxILDKI, GYxxL and EKxxL.
