identifier: Pfam:PF28043
label: Anti-phage protein KwaA
definition: >-
  This entry represents the anti-phage protein KwaA, a component of the antiviral defense system Kiwa, which is composed of KwaA and KwaB. Its expression in E.coli (strain MG1655) confers resistance to phages lambda and SECphi18.
