identifier: Pfam:PF11599
label: RRNA methyltransferase AviRa
definition: >-
  This family of proteins includes the methyltransferase AviRa from Streptomyces viridochromogenes. This protein mediates the resistance to the antibiotic avilamycin. AviRa methylates a specific guanine base within the peptidyl-transferase loop of the 23S ribosomal RNA.
