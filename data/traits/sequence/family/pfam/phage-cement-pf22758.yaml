identifier: Pfam:PF22758
label: Structural cement protein (E217 gp24/Pam3 gp6)
definition: >-
  E217 is a Pseudomonas phage used in an experimental cocktail to eradicate cystic fibrosis-associated Pseudomonas aeruginosa. Gp24 is a trimeric structural protein and component of the E217 icosahedral head. Gp24 adopts a beta-tulip fold similar to the gp87 protein found in the thermophilic phage P74-26. Each gp24 subunit consists of two anti-parallel beta-sheets, that form a tulip-like structure. Gp24 structural protein probably stabilises the E217 capsid. This entry includes the cement protein gp6 of cyanophage Pam3. It consists of an N-terminal β-tulip domain followed by a C-terminal domain of seven antiparallel beta-strands. Gp6 trimers sit at the icosahedral threefold and quasi-threefold axes, stabilising the capsid shell.
