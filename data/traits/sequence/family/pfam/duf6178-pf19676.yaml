identifier: Pfam:PF19676
label: Family of unknown function (DUF6178)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001091) is described by MIBiG as an example of the NRP (non-ribosomal peptide) and polyketide biosynthetic classes. It includes a member from the corallopyronin biosynthetic gene cluster from Corallococcus coralloides. This family appears to be predominantly found in Pseudomonadati.
