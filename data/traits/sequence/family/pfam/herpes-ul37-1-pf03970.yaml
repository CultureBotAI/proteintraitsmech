identifier: Pfam:PF03970
label: Herpesvirus UL37 tegument protein
definition: >-
  The herpes simplex virus 1 (HSV-1) UL37 protein functions in both retrograde and anterograde transport of virion capsids, and plays critical roles in cytoplasmic virion envelopment by interacting with glycoprotein K and UL20. It also interacts with UL36, which is thought to be an important early step in tegumentation during virion morphogenesis in the cytoplasm.
