identifier: Pfam:PF25721
label: Phage T4 Y03C protein family
definition: >-
  This entry represents a family of small uncharacterised proteins found in bacteriophage T4 and related tailed bacteriophages, including the 10.3 kDa protein encoded in the Gp46-Gp47 intergenic region of T4 phage (Y03C). The function of this protein family remains unknown.
