identifier: Pfam:PF15375
label: 40S small subunit processome assembly factor 1
definition: >-
  This entry represents human 40S small subunit processome assembly factor 1 (FSAF1), its homologue from Schizosaccharomyces pombe C3F10.08c, and similar proteins mainly found in animals. FSAF1 is part of the small subunit (SSU) processome, the first precursor of the small eukaryotic ribosomal subunit. During the assembly of the SSU processome in the nucleolus, many ribosome biogenesis factors, an RNA chaperone and ribosomal proteins associate with the nascent pre-rRNA and work in concert to generate RNA folding, modifications, rearrangements and cleavage as well as targeted degradation of pre-ribosomal RNA by the RNA exosome.
