identifier: Pfam:PF20022
label: vWA-MoxR associated protein middle region 19
definition: >-
  This domain is known as VMAP-M19. This domain represents a highly variable central region of the vWA-MoxR associated protein (VMAP) of the classical ternary system (vWA-MoxR-VMAP) in NTP-dependent conflict systems. Using sequence similarity-based clustering it has been possible to identify 29 distinct versions named VMAP-M0-28, that may be involved in sensing of invasive entities. It is predicted to adopt an all-α-helical secondary structure.
