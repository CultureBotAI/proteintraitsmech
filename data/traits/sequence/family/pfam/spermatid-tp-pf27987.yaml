identifier: Pfam:PF27987
label: Spermatid nuclear transition protein
definition: >-
  Transition nuclear proteins (TNPs), major proteins found in the chromatin of condensing spermatids, have been implicated in spermatogenesis and male fertility. This entry includes TNP3 and TNP4. Ram TNP3 and boar TP4 belong to the same group and probably play similar functions in chromatin remodelling during spermiogenesis. TNP4 stimulates the DNA-relaxing activity of topoisomerase I. This entry also includes human uncharacterised protein CXorf51.
