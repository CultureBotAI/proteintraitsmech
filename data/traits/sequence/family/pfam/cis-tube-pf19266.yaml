identifier: Pfam:PF19266
label: Contractile injection system tube protein
definition: >-
  Contractile injection systems (CISs) are cell-puncturing nanodevices that share ancestry with contractile tail bacteriophages. This entry represents a domain found in the tube proteins of the extracellular CISs present in bacteria and archaea. Proteins containing this domain include Pvc7, which is part of the Photorhabdus asymbiotica virulence cassette (PVC). Pvc7 is a tube protein with an additional LysM domain. The equivalents of these two parts in T4 phage are gp48 and gp53, respectively.
