identifier: Pfam:PF05395
label: Protein phosphatase inhibitor 1/DARPP-32
definition: >-
  This entry represents the protein phosphatase inhibitor 1 (IPP-1) family, which consists of PPP1R1A/B/C. They are involved in signal transduction and are endogenous inhibitors of protein phosphatase-1. PPP1R1B, also known as DARPP-32, has a key role in many neurotransmitter pathways throughout the brain and has been shown to be involved in controlling receptors, ion channels and other physiological factors including the brain's response to drugs of abuse, such as cocaine, opiates and nicotine. If phosphorylated, DARPP-32 can inhibit protein-phosphatase-1. DARPP-32 is reciprocally regulated by the two neurotransmitters that are most often implicated in schizophrenia - dopamine and glutamate. Dopamine activates DARPP-32 through the D1 receptor pathway and disables DARPP-32 through the D2 receptor. Glutamate, acting through the N-methyl-d-aspartate receptor, renders DARPP-32 inactive. A mutant form of DARPP-32 has been linked with gastric cancers.
