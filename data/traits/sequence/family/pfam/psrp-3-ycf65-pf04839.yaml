identifier: Pfam:PF04839
label: Plastid and cyanobacterial ribosomal protein (PSRP-3 / Ycf65)
definition: >-
  This small acidic protein is found in 30S ribosomal subunit of cyanobacteria and plant plastids. In plants it has been named plastid-specific ribosomal protein 3 (PSRP-3), and in cyanobacteria it is named Ycf65, with both also known as small ribosomal subunit protein cS23. Plastid-specific ribosomal proteins may mediate the effects of nuclear factors on plastid translation. The acidic PSRPs are thought to contribute to protein-protein interactions in the 30S subunit, and are not thought to bind RNA.
