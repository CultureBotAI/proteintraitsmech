identifier: Pfam:PF31214
label: Alpha-D-galactose-binding lectin
definition: >-
  MytiLec is an alpha-D-galactose-binding lectin from the mussel Mytilus galloprovincialis that binds D-GalNAc and exhibits cytotoxicity toward certain cancer cells, particularly globotriaosylceramide-expressing lymphoma cells. It shows haemagglutinating activity toward rabbit erythrocytes and has bacteriostatic effects against both Gram-positive and Gram-negative bacteria. It belongs to a family that includes homologues such as MCL from Mytilus californianus and CGL from Crenomytilus grayanus. These lectins share specificity for galactose-containing carbohydrate moieties and display diverse biological activities, including erythrocyte agglutination, antimicrobial effects, and anti-cancer properties through recognition of Gb3. Structurally, members of this family contain a ricin B-type lectin domain with a β-trefoil fold composed of 12 β-strands forming three subdomains, each potentially containing a sugar-binding site.
