identifier: Pfam:PF11550
label: Intracellular growth locus C protein
definition: >-
  IglC protein is involved in the escape of Francisella tularensis live vaccine strain. It has been shown that the expression of IglC is essential for F. tularensis to induce macrophage apoptosis. IglC adopts a β-sandwich conformation that has no similarity to any known protein structure.
