identifier: Pfam:PF05461
label: Apolipoprotein L
definition: >-
  Apo L belongs to the high density lipoprotein family that plays a central role in cholesterol transport. The cholesterol content of membranes is important in cellular processes such as modulating gene transcription and signal transduction both in the adult brain and during neurodevelopment. There are six apo L genes located in close proximity to each other on chromosome 22q12 in humans. 22q12 is a confirmed high-susceptibility locus for schizophrenia and close to the region associated with velocardiofacial syndrome that includes symptoms of schizophrenia. The various functions of apoL are still not entirely clear. Apolipoprotein L-I has been identified as a trypanolytic agent and displays similar phylogenetic distribution to the programmed cell death protein Bcl-2 and BH-3 domain-containing proteins, suggesting a possible role in apoptosis.
