identifier: Pfam:PF06719
label: AraC-type transcriptional regulator N-terminus
definition: >-
  This entry represents the N terminus of bacterial ARAC-type transcriptional regulators. In Escherichia coli these regulate the L-arabinose operon through sensing the presence of arabinose, and when the sugar is present, transmitting this information from the arabinose-binding domains to the protein s DNA-binding domains. This family might represent the N-terminal arm of the protein, which binds to the C-terminal DNA binding domains to hold them in a state where the protein prefers to loop and remain non-activating. This domain is found in HTH-type transcriptional regulator YqhC from Escherichia coli, which positively regulates the expression of the yqhD-dkgA operon.
