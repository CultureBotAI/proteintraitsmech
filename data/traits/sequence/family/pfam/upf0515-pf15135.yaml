identifier: Pfam:PF15135
label: Uncharacterised protein UPF0515
definition: >-
  This family describes shiftless antiviral inhibitor of ribosomal frameshifting protein (SHFL). SHFL has been shown to inhibit programmed -1 ribosomal frameshifting (-1PRF) in a variety of mRNAs from viruses (for example HIV1 GAG-POL) as well as cellular genes. SHFL is also known as repressor of yield of DENV (RyDEN), and has been identified as a interferon-stimulated cellular inhibitor against Dengue Virus (DENV) and other viruses replication. It is likely to interfere with the translation of DENV via interaction with viral RNA and cellular mRNA-binding proteins.
