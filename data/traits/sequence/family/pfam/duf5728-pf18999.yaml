identifier: Pfam:PF18999
label: Family of unknown function (DUF5728)
definition: >-
  This is a highly conserved domain of unknown function found in Platyhelminthes, with many of the sequences annotated as being the small conductance calcium-activated potassium channel protein. However, the location suggests that this domain belongs to the intracellular amino terminus of these transmembrane proteins, immediately next to the calcium-activated SK potassium channel.
