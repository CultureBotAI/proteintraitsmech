identifier: Pfam:PF29365
label: Keratin-associated protein 17-1
definition: >-
  This entry represents keratin-associated protein 17-1 and related proteins. In the hair cortex, hair keratin intermediate filaments are embedded in an interfilamentous matrix consisting of keratin-associated proteins, which are essential for the formation of a rigid and resistant hair shaft through extensive disulfide bond cross-linking with abundant cysteine residues of hair keratins. The matrix proteins include high-sulfur and high-glycine-tyrosine keratins. KRTAP17-1 interacts with hair keratins and is expressed in skin tissue. The proteins are localised to the cytosol and intermediate filaments.
