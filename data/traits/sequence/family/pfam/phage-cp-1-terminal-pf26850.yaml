identifier: Pfam:PF26850
label: Phage Cp-1 terminal protein family
definition: >-
  The Terminal protein family is crucial for DNA replication, as it is linked to the 5'-ends of both strands of the genome through a phosphodiester bond. This bond is formed between the beta-hydroxyl group of a threonine residue and the 5'-phosphate of the terminal deoxyadenylate. The family plays a significant role in the priming of DNA elongation, ensuring the proper initiation and continuation of DNA synthesis. By facilitating the attachment of the terminal deoxyadenylate, the Terminal protein family helps maintain the integrity and stability of the genetic material during replication processes.
