identifier: Pfam:PF06589
label: Circumsporozoite-related antigen (CRA)
definition: >-
  This entry represents the malaria protein EXP-1, also known as the circumsporozoite-related antigen (CRA). This protein is addressed to a new compartment within the cytoplasm of the infected red cell and also surrounds the parasite, probably in the parasitophorous vacuole membrane. This antigen and the circumsporozoite protein (CSP) appear to have a common epitope. The mode of chloroquine action or resistance of the malarial parasite Plasmodium falciparum is not fully elucidated and presents a huge challenge worldwide. Plasmodial EXP-1 protein changes under chloroquine treatment, making it a potential chloroquine resistance marker. Although there are no authentic repeats in this antigen, there are a number of internal homologies (N-A-N-P) and (N-A-D-P). The first of these tetramers is the dominant repeat found in the CSP of P. falciparum and reacts with antibodies against CRA. It is possible that immune responses to CRA may act against the CSP also. The CRA is found in many parasitic strains.
