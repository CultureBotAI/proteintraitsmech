identifier: Pfam:PF10558
label: 'Mitochondrial 18 KDa protein (MTP18)  '
definition: >-
  This family of proteins are mitochondrial 18kDa proteins that are often misannotated as carbonic anhydrases. It was shown that knockdown of MTP18 protein results in a cytochrome c release from mitochondria and consequently leads to apoptosis. Over expression studies suggest that MTP18 is required for mitochondrial fission.
