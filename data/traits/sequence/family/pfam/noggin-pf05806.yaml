identifier: Pfam:PF05806
label: Noggin
definition: >-
  Noggin was first discovered by its ability to induce secondary axis formation in Xenopus embryos. It is a secreted homodimeric glycoprotein that serves as a BMP (bone morphogenetic protein) antagonist. It has been found that noggin arrests the differentiation of stromal cells, preventing cellular maturation. In humans increased noggin activity results in skeletal dysplasia such as proximal symphalangism (SYM1) and multiple synostosis syndrome 1 (SYNS1). Noggin maintains prolonged growth of human embryonic stem cells in vitro and regulates the stem cell niche during neurogenesis. This entry also includes the Trunk protein. In Drosophila, it is a secreted growth factor critical for anterior-posterior embryonic patterning. It activates the Torso (Tor) receptor tyrosine kinase pathway, which determines terminal structures like the head and tail. Trunk undergoes proteolytic cleavage to release its active C-terminal fragment, enabling localised Tor signaling despite its uniform distribution in the embryo. This cleavage is essential for its function but does not depend on Torso-like (Tsl), a perforin-like protein that instead regulates Trunk secretion. Trunk is not a direct orthologue of Noggin but shares a distant evolutionary relationship within the cysteine knot protein superfamily.
