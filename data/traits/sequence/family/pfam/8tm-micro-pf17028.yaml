identifier: Pfam:PF17028
label: 8TM Microsporidial transmembrane domain
definition: >-
  This entry represents the eight transmembrane regions (in two blocks of four) of microsporidial-specific proteins. Such an arrangement of TMs suggests a transporter function of some kind. There is a highly conserved NFLNW sequence-motif at the C terminus which might be of functional importance.
