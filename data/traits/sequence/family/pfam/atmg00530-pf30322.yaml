identifier: Pfam:PF30322
label: AtMg00530
definition: >-
  This entry represents an uncharacterised protein found in the mitochondria of land plants. In Arabidopsis thaliana, the gene encoding this protein (AtMg00530/ORF109) is located in the mitochondrial genome, with an additional copy (At2g07776) present in the nuclear genome resulting from a duplication of mitochondrial DNA into chromosome 2. The function of this protein remains to be determined.
