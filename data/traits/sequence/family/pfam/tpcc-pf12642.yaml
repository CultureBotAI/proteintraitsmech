identifier: Pfam:PF12642
label: Conjugative transposon protein TcpC
definition: >-
  TcpC is required for efficient conjugative transfer, localizing to the cell membrane independently of other conjugation proteins, where membrane localization is important for its function, oligomerization and interaction with the conjugation proteins TcpA, TcpH, and TcpG. Its C-terminal domain is critical for interactions with these other conjugation proteins. TcpC has low level sequence identity to proteins encoded by the conjugative transposon Tn916, which is responsible for a large proportion of the tetracycline resistance in different pathogens.
