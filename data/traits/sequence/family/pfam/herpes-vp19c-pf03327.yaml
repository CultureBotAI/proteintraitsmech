identifier: Pfam:PF03327
label: Herpesvirus capsid shell protein VP19C
definition: >-
  The family includes the triplex capsid protein 1 (TRX1, UL38 or VP19C) from herpesviruses, which is a structural component of the icosahedral capsid. The capsid is composed of pentamers and hexamers of the major capsid protein, which are linked together by heterotrimers called triplexes. These triplexes are formed by a single molecule of TRX1 and two copies of triplex protein 2 (TRX2). Additionally, TRX1 is required for efficient transport of TRX2 to the nucleus, which is the site of capsid assembly.
