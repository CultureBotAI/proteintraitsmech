identifier: Pfam:PF20836
label: Hypothetical protein NE1300
definition: >-
  This entry represents a group of proteins from Nitrosomonadales, including NE1300 from Nitrosomonas europaea ( ), which seems to be a binding partner of Hydroxylamine oxidoreductase (HAO) in vivo that may play a structural role in the ternary complex with cytochrome c554, the physiological electron acceptor of HAO. HAO is responsible for the conversion of hydroxylamine to nitrite in nitrifying bacteria. The exact function of NE1300 is not clear.
