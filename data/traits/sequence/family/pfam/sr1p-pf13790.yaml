identifier: Pfam:PF13790
label: SR1 protein
definition: >-
  This family of proteins is encoded by the dual function SR1 RNA. SR1 is a sRNA which regulates arginine metabolism, it also encodes a short protein that binds to glyceraldehyde-3-phosphate dehydrogenase (GapA) and stabilises the gapA operon mRNAs.
