identifier: Pfam:PF06550
label: Signal-peptide peptidase, presenilin aspartyl protease
definition: >-
  This entry contains putative SPP, which are signal-peptide aspartyl proteases. The family carries the characteristic catalytic aspartate GXGD motif, and members are integral membrane peptidases of the presenilin-type with nine transmembrane regions. This entry includes PSH from Methanoculleus marisnigri (Memar_1924, ), which can cleave the amyloid precursor protein (APP), which makes it interesting for Alzheimer's disease research and HVO_1107 from Haloferax volcanii ( ).
