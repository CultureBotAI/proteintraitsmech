identifier: Pfam:PF28014
label: IcmT-like
definition: >-
  This entry represents IcmT family of bacterial proteins. IcmT is essential for pore formation-mediated lysis of mammalian and protozoan cells and the subsequent bacterial egress. Residues at the C terminus of IcmT are essential for both pore formation and bacterial egress.
