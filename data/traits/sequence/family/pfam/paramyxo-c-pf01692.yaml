identifier: Pfam:PF01692
label: Paramyxovirus non-structural protein C
definition: >-
  This family consist of the C proteins (C', C, Y1, Y2) found in the Paramyxovirinae, e.g. Human parainfluenza virus 3, and Sendai virus. The C proteins effect viral RNA synthesis having both a positive and negative effect during the course of infection. The paramyxovirinae have a negative-strand ssRNA genome of 15.3 kb from which six mRNAs are transcribed, five of these are monocistronic. The P/C mRNA is polycistronic and has two overlapping open reading frames P and C, C encodes the nested C proteins C', C, Y1 and Y2.
