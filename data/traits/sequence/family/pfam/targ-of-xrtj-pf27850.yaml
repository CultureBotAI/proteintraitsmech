identifier: Pfam:PF27850
label: XrtJ-associated TM-motif-TM protein
definition: >-
  This entry represents essentially the full length, ~60 residues, of a two-gene paralogous family from Acidobacterium sp. MP5ACTX8, which are referred as to PExPT-CTERM proteins, the predicted target for protein sorting a cleavage by the exosortase XrtJ. Sequences consist of an N-terminal signal sequence ending in a GC motif, suggestive of the lipoprotein signal sequence, followed immediately by a C-terminal domain sequence with characteristics PEP-CTERM-like sequences, including a PExP motif and a transmembrane helix. Both members occur next to the novel exosortase variant, XrtJ, which contains a novel C-terminal domain. This highly unusual arrangement suggests that PExPT-CTERM proteins may be used as an adaptor molecule to assist in the proper sorting and anchoring of other proteins.
