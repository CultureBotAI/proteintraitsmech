identifier: Pfam:PF00260
label: Protamine P1
definition: >-
  Protamines are small, highly basic proteins, that substitute for histones in sperm chromatin during the haploid phase of spermatogenesis. They pack sperm DNA into a highly condensed, stable and inactive complex, creating a more hydrodynamic sperm head for efficient swimming and protects the DNA from UV radiation and DNA damage. These proteins bind nonspecifically to the DNA and use a multi-step process to loop the DNA. There are two different types of mammalian protamine, called P1 and P2. P1 has been found in all species studied, while P2 is sometimes absent. There seems to be a single type of avian protamine whose sequence is closely related to that of mammalian P1. Sequence comparisons of vertebrate and invertebrate protamines show that the sequence, structure, and probably function of these proteins evolve independently in vertebrates and various invertebrate groups.
