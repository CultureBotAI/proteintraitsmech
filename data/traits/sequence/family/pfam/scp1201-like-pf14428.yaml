identifier: Pfam:PF14428
label: SCP1.201-like deaminase
definition: >-
  Members of this family are predicted SCP1.201-like deaminases mainly from bacteria such as . They are a recently reclassified group of cytidine deaminases, originally annotated as "dsDNA deaminase toxin A-like" (DddA-like). According to structural predictions, these proteins could be efficient ssDNA base editors in both plant and mammalian cells.
