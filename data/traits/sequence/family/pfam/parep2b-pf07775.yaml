identifier: Pfam:PF07775
label: PaRep2b protein
definition: >-
  This is a group of proteins, expressed in the crenarchaeon Pyrobaculum aerophilum, whose members are variable in length and level of conservation. The presence of numerous frameshifts and internal stop codons in multiple alignments are thought to indicate that most family members are no longer functional.
