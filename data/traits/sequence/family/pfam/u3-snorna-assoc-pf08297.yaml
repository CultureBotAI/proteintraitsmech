identifier: Pfam:PF08297
label: U3 snoRNA associated
definition: >-
  This family of proteins is associated with U3 snoRNA. U3 snoRNA is required for nucleolar processing of pre-18S ribosomal RNA. Proteins in this family include U3 small nucleolar RNA-associated protein 16 (UTP16, also known as Bud21) from S. cerevisiae. Bud21 is a component of small ribosomal subunit (SSU) processosome and has a role in bud site selection maybe via the regulation of expression of bipolar budding components. This protein functions as a connector between Utp4 and Noc4.
