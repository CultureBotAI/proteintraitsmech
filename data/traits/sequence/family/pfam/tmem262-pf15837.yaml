identifier: Pfam:PF15837
label: Transmembrane protein 262
definition: >-
  This entry represents transmembrane protein 262, also known as cation channel sperm-associated auxiliary subunit eta or CATSPERH. TMEM262 is an auxiliary component of the CatSper complex, which is involved in sperm cell hyperactivation. The protein is a component of the CatSpermasome, a multi-subunit complex composed of core pore-forming members and auxiliary members that form a cation channel essential for sperm motility. TMEM262 interacts with CATSPERB and helps stabilise the complex. The protein contains three transmembrane helices and is localised to the flagellar membrane of sperm cells. TMEM262 is found in mammals and is specifically expressed in testis tissue. The protein is essential for male fertility through its role in sperm hyperactivation.
