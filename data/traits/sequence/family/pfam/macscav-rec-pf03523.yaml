identifier: Pfam:PF03523
label: Macrophage scavenger receptor
definition: >-
  Scavenger receptors type I and II were the first scavenger receptors purified and are products of alternative splicing of a single gene. They are now named as class A, type I and type II (SR-AI/II) or collectively SR-A member 1. They can recognise a wide variety of ligands, from bacteria and yeast to self (native proteins) and self-modified ligands and they are involved in host defense, homeostasis, antigen presentation, pathogenesis of neurodegenerative disorders and atherosclerosis.
