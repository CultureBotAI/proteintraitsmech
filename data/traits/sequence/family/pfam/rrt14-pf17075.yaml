identifier: Pfam:PF17075
label: Regular of rDNA transcription protein 14
definition: >-
  Rrt14 is a nucleolar protein whose function is not clear. It was identified in a screen for mutants with decreased levels of rDNA transcription. It may be involved in ribosome biogenesis.
