identifier: Pfam:PF13712
label: Glycosyltransferase like family
definition: >-
  This domain is found standalone in Streptomycin biosynthesis protein StrF and in uncharacterised bacterial proteins predicted to adopt a fold typical for Nucleotide-diphospho-sugar transferases . StrF is encoded by a gene which is part of the strFGHIK gene cluster. The products of the strF and/or strG genes may be involved in the formation of N-methyl-L-glucosamine. This domain is also found associated with other domains.
