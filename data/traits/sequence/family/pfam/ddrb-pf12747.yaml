identifier: Pfam:PF12747
label: DdrB-like protein
definition: >-
  This family includes the Deinococcus DdrB protein, a ssDNA binding protein induced by ionizing radiation which has a role in genome reconstitution. The structure of DdrB is known. This family also includes some possibly distantly related cyanobacterial proteins.
