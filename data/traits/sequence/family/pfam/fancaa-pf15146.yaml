identifier: Pfam:PF15146
label: 'Fanconi anemia-associated '
definition: >-
  Fanconi anemia-associated protein of 100kDa (FAAP100) is component of the Fanconi anemia (FA) core complex, which plays a central role in FA-associated DNA damage response. FAAP100 is essential for the stability and function of the complex. Fanconi anemia (FA) is a human disorder characterised by cancer susceptibility and cellular sensitivity to DNA crosslinks and other damages. The FA complex repairs the interstrand cross-linking (ICL) lesions and coordinates activities of the downstream DNA repair pathway including nucleotide excision repair, translesion synthesis, and homologous recombination. It is required for the monoubiquitylation of FANCD2 and FANCI heterodimer. The FA core complex consists of FANCA, FANCB, FANCC, FANCE, FANCF, FANCG, FANCL, FANCM, FANCT (UBET2), FAAP100 and FAAP24.
