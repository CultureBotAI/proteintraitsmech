identifier: Pfam:PF03935
label: Beta-glucan synthesis-associated protein SKN1/KRE6/Sbg1
definition: >-
  This family consists of the beta-glucan synthesis-associated proteins SKN1, KRE6 and Sbg1. Beta1,6-Glucan is a key component of the yeast cell wall, interconnecting cell wall proteins, beta1,3-glucan, and chitin. SKN1 and KRE6 show similarities to glycoside hydrolase family 16 glycoside hydrolases, suggesting that they are glycosyl hydrolases or transglycosylases. Loss of KRE6 shows reduced levels of both beta-1,3-glucan and beta-1,6-glucan synthesis, while loss of SKN1 affects sphingolipid biosynthesis, being related with the synthesis and anchorage of cell wall proteins of glucan polymers of the yeast cell wall, although they play redundant roles. SKN1, KRE6 and Sbg1 share the SKN1 domain, which is conserved in SKN1 and KRE6 proteins of many fungal species. Sbg1 is an integral membrane protein essential for contractile-ring constriction and septum formation during cytokinesis, which interacts with the conserved beta-glucan synthase Bgs1 and regulates its protein levels and localisation.
