identifier: Pfam:PF02791
label: DDT domain
definition: >-
  The DDT has been named after the better characterised DNA-binding homeobox- containing proteins and the Different Transcription and chromatin remodelling factors in which it is found. It is a domain of about 60 amino acids which is exclusively associated with nuclear domains like AT-Hook, PHD finger, methyl-CpG-binding domain, bromodomain and DNA-binding homeodomain. The DDT domain is characterised by a number of conserved aromatic and charged residues and is predicted to consist of three α helices. A DNA-binding function for the DDT domain has been proposed.
