identifier: Pfam:PF17058
label: Mitochondrial biogenesis regulation protein 1
definition: >-
  The function of Mbr1 is not clear. It has a paralogue, Mbr3, also known as Isf1. They are serine-rich, hydrophilic proteins. Overexpression of Mbr1 and Mbr3 can suppress the growth defect of hap2, hap3 and hap4 mutants. They may be involved in mitochondrial functions and stress response.
