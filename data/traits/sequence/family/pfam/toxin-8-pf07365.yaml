identifier: Pfam:PF07365
label: Alpha conotoxin precursor
definition: >-
  This family consists of several alpha-conotoxin precursor proteins from a number of Conus species. Cone snail toxins, conotoxins, are small peptides with disulphide connectivity that target ion channels or G-protein-coupled receptors. Based on the number and pattern of disulphide bonds and biological activities, conotoxins can be classified into several families. Alpha-conotoxins are neurotoxins from the venom of fish-hunting cone snails that block nicotinic acetylcholine receptors (nAChRs). Alpha-conotoxin-like Lv1.4 has analgesic effects in mice, being a potential drug for therapeutic applications. Omega, delta and kappa families of conotoxins have a knottin or inhibitor cystine knot scaffold. The knotted scaffold is a very special disulphide through a disulphide knot, in which the III-VI disulphide bond crosses the macrocycle formed by two other disulphide bonds (I-IV and II-V) and the interconnecting backbone segments, where I-VI indicates the six cysteine residues starting from the N-terminal.
