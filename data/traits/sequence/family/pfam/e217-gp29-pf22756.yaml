identifier: Pfam:PF22756
label: E217 gateway protein gp29
definition: >-
  This entry represents a family of proteins from tailed bacteriophages and bacterial prophages, including Gp29 from E217, a Pseudomonas phage used in an experimental cocktail to eradicate cystic fibrosis-associated Pseudomonas aeruginosa. The gateway protein gp29 is a neck factor of the E217 virion that connects the neck to the sheath lattice.
