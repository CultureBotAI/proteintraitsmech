identifier: Pfam:PF06327
label: Adenylate cyclase, conserved domain
definition: >-
  Cyclic AMP (cAMP) is a ubiquitous signalling molecule which mediates many cellular processes by activating cAMP-dependent kinases and also inducing protein-protein interactions. This molecule is produced by the adenylate cyclase (AC) enzyme, using ATP as its substrate. Mammalian adenylate cyclase has nine closely related membrane-bound isoforms (AC1-9) showing significant sequence homology and sharing the same overall structure: two hydrophobic transmembrane domains, and two cytoplasmic domains that are responsible for the catalytic activity. These isoforms differ in both their tissue specificity and their regulation. Regulatory factors known to influence one or more of these isoforms include G proteins, protein kinases, calcium and calmodulin. This entry represents a region of unknown function found in many of these isoforms. It is part of the N-terminal cytoplasmic domain but its presence is not necessary for catalytic activity.
