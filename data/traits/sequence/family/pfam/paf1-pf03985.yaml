identifier: Pfam:PF03985
label: 'Paf1 '
definition: >-
  In budding yeasts, Paf1 is part of the Paf1 complex, an RNA polymerase II-associated protein complex containing Paf1, Cdc73, Ctr9, Rtf1 and Leo1. Paf1 complex is involved in histone modifications, transcription elongation and other gene expression processes that include transcript site selection.
