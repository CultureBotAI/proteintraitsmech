identifier: Pfam:PF23898
label: Crassvirus major capsid protein
definition: >-
  This entry represents the major capsid protein found in crassviruses. The major capsid protein self-assembles to form an icosahedral capsid. In the bacteriophage crAss001, the capsid has a T=9 symmetry and is about 77 nm in diameter. The major capsid protein displays an HK97-like fold with an insertion domain that protrudes at the capsid surface.
