identifier: Pfam:PF21586
label: DraIII
definition: >-
  This protein family includes DraIII from Deinococcus radiophilus, a type IIP restriction endonuclease that recognises a gapped double-stranded DNA sequence and nicks creating a double strand break with a three base 3' overhang. DraIII adopts a homodimeric configuration. Each monomer shows a ββα-metal fold in the C terminus, where the HNH active site is located. It also has two zinc and one magnesium-binding sites.
