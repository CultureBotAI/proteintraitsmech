identifier: Pfam:PF15676
label: Six6 opposite strand transcript 1 family
definition: >-
  Protein SIX6OS1 (Six6 opposite strand transcript 1) may be involved in eye development through regulation of the SIX6 transcription factor. It is a meiotic protein that localizes to the central element of the synaptonemal complex and is required for chromosome synapsis during meiotic recombination.
