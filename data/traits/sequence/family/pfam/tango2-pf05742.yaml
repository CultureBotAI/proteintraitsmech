identifier: Pfam:PF05742
label: Transport and Golgi organisation 2
definition: >-
  In eukaryotes this family is predicted to play a role in protein secretion and Golgi organisation. In plants this family includes , which is involved in water permeability in the cuticles of fruit. has been found to be expressed during early embryogenesis in mice. This protein contains a conserved NRDE motif. This gene has been characterised in Drosophila melanogaster and named as transport and Golgi organisation 2, hence the name Tango2.
