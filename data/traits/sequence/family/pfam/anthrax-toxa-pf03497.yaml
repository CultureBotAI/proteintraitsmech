identifier: Pfam:PF03497
label: Anthrax toxin LF subunit
definition: >-
  Anthrax toxin is a plasmid-encoded toxin complex produced by the Gram-positive, spore-forming bacteria, Bacillus anthracis. The toxin consists of three non-toxic proteins: the protective antigen (PA), the lethal factor (LF) and the edema factor (EF). These component proteins self-assemble at the surface of host cell receptors, yielding a series of toxic complexes that can produce shock-like symptoms and death. Anthrax toxin is one of a large group of Bacillus and Clostridium exotoxins referred to as binary toxins, forming independent enzymatic (A moiety) and binding (B moiety) components. The LF and EF proteins are the enzymes (A moiety) that act on cytosolic substrates, while PA is a multi-functional protein (B moiety) that binds to cell surface receptors, mediates the assembly and internalisation of the complexes, and delivers them to the host cell endosome. Once PA is attached to the host receptor, it must then be cleaved by a host cell surface (furin family) protease before it is able to bind EF and LF. The cleavage of the N terminus of PA enables the C-terminal fragment to self-associate into a ring-shaped heptameric complex (prepore) that can bind LF or EF competitively. The PA-LF/EF complex is then internalised by endocytosis, and delivered to the endosome, where PA forms a pore in the endosomal membrane in order to translocate LF and EF to the cytosol. LF is a Zn-dependent metalloprotease that cleaves and inactivates mitogen-activated protein (MAP) kinases, kills macrophages, and causes death of the host by inhibiting cell proliferation. EF is a calcium-and calmodulin-dependent adenylyl cyclase that can cause edema (fluid-filled swelling) when associated with PA. EF is not toxic by itself, and is required for the survival of germinated Bacillus spores within ma…
