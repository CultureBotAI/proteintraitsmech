identifier: Pfam:PF19027
label: Family of unknown function (DUF5752)
definition: >-
  This family describes proteins of unknown function. It includes the uncharacterised protein OrfY from the hyperthermophilic archaeum Thermoproteus tenax , a protein that co-occurs with the treS/P protein in an operon regulating the synthesis of trehalose. The structure of this protein shows it contains an internal duplication.
