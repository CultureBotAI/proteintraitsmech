identifier: Pfam:PF06074
label: Portal protein of Mu bacteriophage
definition: >-
  This entry represents phage portal proteins found in bacteriophage Mu (gp29 protein) and related proteins. This protein forms the portal vertex of the capsid. This portal plays critical roles in head assembly, genome packaging, neck/tail attachment, and genome ejection. The portal protein multimerizes as a single ring-shaped homododecamer arranged around a central channel.
