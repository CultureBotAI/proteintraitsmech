identifier: Pfam:PF27357
label: MJ1579 family
definition: >-
  This entry represents the MJ1579 family of small uncharacterised proteins found exclusively in archaea. The family is found predominantly in thermophilic and hyperthermophilic archaea including Thermococcus, Methanococcaceae, Methanocaldococcaceae, and Thermococcaceae, with some members in candidate division MSBL1. The proteins are approximately 70 amino acids in length. The function of this protein family remains to be determined.
