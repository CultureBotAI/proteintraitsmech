identifier: Pfam:PF30607
label: Family of unknown function (DUF8668)
definition: >-
  This entry represents a family of small uncharacterised proteins of approximately 48 residues. Some family members are annotated as translation initiation factors, although the basis for this annotation is unclear. The family is restricted to marine picocyanobacteria, specifically Prochlorococcus and Synechococcus species (Synechococcales). The function of this family remains to be determined.
