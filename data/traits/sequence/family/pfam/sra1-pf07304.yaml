identifier: Pfam:PF07304
label: Steroid receptor RNA activator (SRA1)
definition: >-
  This domain can be found in several hypothetical mammalian steroid receptor RNA activator proteins. The SRA-RNAs encode stable proteins that are widely expressed and upregulated in breast cancer cell lines. SRA-RNA is a steroid receptor co-activator which acts as a functional RNA. This domain is also found at the C terminus of Sec31, a component of the coat protein complex II (COPII, which promotes the formation of transport vesicles from the endoplasmic reticulum (ER). COPII has two main functions, the physical deformation of the endoplasmic reticulum membrane into vesicles and the selection of cargo molecules.
