identifier: Pfam:PF24741
label: AlkZ related
definition: >-
  This entry represents uncharacterised bacterial proteins that have similarity to AlkZ-like proteins . AlkZ adopts a unique fold in which three tandem winged helix-turn-helix (HTH) motifs scaffold a positively charged concave surface shaped for binding to duplex DNA. In contrast, the members of this family contain two instead of three tandem HTH motifs. They still probably retain the basic interface to bind DNA, however it is unclear whether these proteins possess enzymatic activity.
