identifier: Pfam:PF09726
label: Macoilin family
definition: >-
  Macoilin has several highly conserved predicted transmembrane domains towards the N terminus and the coiled-coil regions at the C terminus. It is a conserved nervous system-specific ER membrane protein that regulates neuronal functions.
