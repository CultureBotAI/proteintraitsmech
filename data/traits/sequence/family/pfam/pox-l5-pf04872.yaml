identifier: Pfam:PF04872
label: Poxvirus L5 protein family
definition: >-
  This family represents Protein L5 from variola (smallpox), vaccinia virus, and similar proteins from poxvirus. L5, also known as Entry-fusion complex protein OPG094, is a component of the entry fusion complex (EFC), which consists of 11 proteins. During cell infection, this complex mediates entry of the virion core into the host cytoplasm by a two-step mechanism consisting of lipid mixing of the viral and cellular membranes and subsequent pore formation.
