identifier: Pfam:PF06486
label: Protein of unknown function (DUF1093)
definition: >-
  These are a family of small (about 115 amino acids) uncharacterised proteins with N-terminal signal sequences, found predominantly in Gram-positive organisms. Most genomes that have any members of this family have at least two members. This entry includes YxeA from Bacillus subtilis, which gene is located in operon encoding the ABC transporter structural genes YxdJKLM. YxeA is transcriptionally regulated by YxdJ. It is predicted to participate in antibiotic resistance mechanism as an immunity peptide interacting with and neutralising antibiotic.
