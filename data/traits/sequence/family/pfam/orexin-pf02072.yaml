identifier: Pfam:PF02072
label: Prepro-orexin
definition: >-
  Orexins (also known as hypocretins) are neuropeptides that are specifically localised to the hypothalamus. They are thought to interact with autonomic, neurendocrine and neuroregulatory systems, and play an important role in the regulation of feeding behaviour. When applied to hypothalamic neurones, these peptides are neuroexcitatory, which action is probably mediated by their binding to a new family of G-protein-coupled receptors (orexin receptors 1 and 2), which were previously orphan. To date, two orexins have been characterised (orexin-A and -B), both encoded by a single mRNA transcript (prepro-orexin or hypocretin neuropeptide precursor, whose product is represented in this entry): orexin-A is a 33-residue peptide with two intramolecular disulphide bonds in the N-terminal region; and orexin-B is a linear 28-residue peptide. These peptides have 46% identity at the amino acid sequence level, and show some similarity to the glucagon/vasoactive intestinal polypeptide/secretin peptide family.
