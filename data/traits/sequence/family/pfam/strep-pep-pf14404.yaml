identifier: Pfam:PF14404
label: Ribosomally synthesized peptide in Streptomyces species
definition: >-
  This family consists of ribosomally synthesised peptides from Streptomyces species and related to microviridin and marinostatin. They are usually in the gene neighbourhood of one or more RimK-like ATP-grasp. The gene-context suggests that it is further modified by the ATP-grasp. The peptide is predicted to function in a defensive or developmental role, or as an antibiotic.
