identifier: Pfam:PF04531
label: Bacteriophage holin
definition: >-
  This family of holins is found in tailed bacteriophages, antinobacteria and firmicutes. Phage proteins for bacterial lysis typically include a membrane-disrupting protein, or holin, and one or more cell wall degrading enzymes that reach the cell wall because of holin action. Holins are found in a large number of mutually non-homologous families. Holins form large oligomeric flexible pores in the cytoplasmic membranes of bacteria to allow the endolysins to gain access to the cell wall, where they exert their actions by cleaving various bonds in the peptidoglycan polymer and inducing cell death. These proteins and its corresponding genes have been identified in a wide variety of Gram-negative and Gram-positive bacteria and their phages.
