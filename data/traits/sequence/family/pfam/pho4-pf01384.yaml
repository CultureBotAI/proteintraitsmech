identifier: Pfam:PF01384
label: Phosphate transporter family
definition: >-
  The PHO-4 family of transporters includes the phosphate-repressible phosphate permease (PHO-4) from Neurospora crassa, which is probably a sodium-phosphate symporter and the Low-affinity inorganic phosphate transporter PitA from Escherichia coli, whose activity impacts bacterial growth in low Mg2+ conditions. This family also includes the human leukemia virus receptor.
