identifier: Pfam:PF12751
label: Vacuolar segregation subunit 7
definition: >-
  Vac7 is localised at the vacuole membrane, a location which is consistent with its involvement in vacuole morphology and inheritance. Vac7 has been shown to function as an upstream regulator of the Fab1 lipid kinase pathway. The Fab1 lipid pathway is important for correct regulation of membrane trafficking events. It has been identified as a LEA-2 homologue together with TMEM106B from humans and Tag1 in yeast, all predicted to be lipid transfer proteins.
