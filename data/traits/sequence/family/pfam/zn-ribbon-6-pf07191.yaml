identifier: Pfam:PF07191
label: Double zinc ribbon
definition: >-
  This family, previously known as DUF1407, consists of several short bacterial proteins, including Uncharacterised protein YfgJ from E. coli ( ) and other related proteins mainly from proteobacteria. Members of this entry have 8 highly conserved cysteine residues, which form two zinc ribbon domains.
