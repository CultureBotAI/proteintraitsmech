identifier: Pfam:PF15245
label: Transcription cofactor vestigial-like protein 4
definition: >-
  Transcription cofactor vestigial-like protein 4 (Vgl-4) is a member of the Vgl family of TEF-1 (transcriptional enhancer factor-1) cofactors. Vgl-4 has two TDU motifs and is the only Vgl member expressed in the heart. Vgl-4 modulates the activity of TEF-1 factors and counteracts alpha1-adrenergic activation of gene expression in cardiac myocytes.
