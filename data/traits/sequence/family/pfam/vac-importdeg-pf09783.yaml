identifier: Pfam:PF09783
label: Vacuolar import and degradation protein
definition: >-
  This entry represents yeast GID complex substrate-recognition subunit 4 and 10 (GID4/10) and similar eukaryotic proteins. GID4, also known as Vacuolar import and degradation protein 24, VID24, is required for proteasome-dependent catabolite degradation of fructose-1,6-bisphosphatase (FBP1), malate dehydrogenase (MDH2), and other gluconeogenic enzymes, probably by targeting FBP1-containing vesicles to the vacuole, but is not required for FBP1 sequestration in cytoplasmic vesicles. GID10 is required for the adaptation to osmotic or heat stress and for the regulation of protein levels of the adapter protein ART2, a component of the ART-Rsp5 ubiquitin ligase pathway, part of the plasma membrane quality control. These proteins are the substrate-recognition components of the GID E3 ligase complex catalysing ubiquitination of proteins targeted for degradation. GID E3 is regulated through assembly with interchangeable N-degron-binding substrate receptors induced by distinct environmental perturbations.
