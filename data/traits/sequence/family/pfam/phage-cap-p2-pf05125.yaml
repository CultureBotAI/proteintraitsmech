identifier: Pfam:PF05125
label: 'Phage major capsid protein, P2 family '
definition: >-
  This entry represents Capsid proteins from Bacteriophage P2 (GpN) and similar proteins from tailed bacteriophages and bacterial prophages mainly among Proteobacteria. GpN undergoes proteolytic cleavage into three products: Minor capsid protein H1, a 39 kDa protein Minor capsid protein H2, 38.6 kDa Major capsid protein N*, 36.7 kDa The capsid of P4, the satellite phage of P2, consists of those same gene products encoded by P2, although in this case the resulting capsids are smaller than those usually formed by P2 alone. P2 procapsid have a dextro HK97 fold with T = 7 symmetry.
