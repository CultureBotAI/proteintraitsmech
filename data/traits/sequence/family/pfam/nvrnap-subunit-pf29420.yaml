identifier: Pfam:PF29420
label: Non-virion RNA polymerase subunit
definition: >-
  This entry represents a subunit of the multi-subunit non-virion RNA polymerase found in jumbophages. The non-virion RNA polymerase is a bacterial RNA polymerase homologue that allows these large bacteriophages to transcribe their own genes independently of the host RNA polymerase. This subunit is approximately 500-540 amino acids in length and is encoded by genes such as ORF123 in phage phiKZ.
