identifier: Pfam:PF01062
label: Bestrophin, RFP-TM, chloride channel
definition: >-
  This entry represents animal bestrophin homologues. Bestrophin is a 68kDa basolateral plasma membrane protein expressed in retinal pigment epithelial cells (RPE). It is encoded by the VMD2 gene, which is mutated in Best macular dystrophy, a disease characterised by a depressed light peak in the electrooculogram. VMD2 encodes a 585-amino acid protein with an approximate mass of 68kDa which has been designated bestrophin. Bestrophin shares homology with the Caenorhabditis elegans RFP gene family, named for the presence of a conserved arginine (R), phenylalanine (F), proline (P), amino acid sequence motif. Bestrophin is a plasma membrane protein, localised to the basolateral surface of RPE cells consistent with a role for bestrophin in the generation or regulation of the EOG light peak. Bestrophin and other RFP family members represent a new class of calcium-activated chloride channels (CaCC), indicating a direct role for bestrophin in generating the light peak. Bestrophins are also permeable to other monovalent anions including bicarbonate, bromine, iodine, thiocyanate an nitrate. Structural analysis revealed that N-terminal region of the proteins is highly conserved and sufficient for its CaCC activity. The C-terminal region has low sequence identity. The VMD2 gene underlying Best disease was shown to represent the first human member of the RFP-TM protein family. More than 97% of the disease-causing mutations are located in the N-terminal domain altering the electrophysiological properties of the channel. The bestrophins are four-pass transmembrane chloride-channel proteins, and the RFP-TM or bestrophin domain extends from the N terminus through approximately 350 amino acids and contains all of the TM domains as well as nearly all reported disease causing mutations. Int…
