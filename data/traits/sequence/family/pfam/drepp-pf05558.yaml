identifier: Pfam:PF05558
label: DREPP plasma membrane polypeptide
definition: >-
  This family contains several plant plasma membrane proteins termed DREPPs as they are developmentally regulated plasma membrane polypeptides, including the salt stress root protein RS1 and plasma membrane-associated cation-binding protein 1 (PCAP1). DREPPs are thought to be signal proteins.
