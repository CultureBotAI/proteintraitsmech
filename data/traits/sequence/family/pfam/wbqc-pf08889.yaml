identifier: Pfam:PF08889
label: WbqC-like protein family
definition: >-
  This family of proteins are functionally uncharacterised. However, it is found in an O-antigen gene cluster in Escherichia coli and other bacteria suggesting a role in O-antigen production. It has been suggested that wbnG may code for a glycine transferase.
