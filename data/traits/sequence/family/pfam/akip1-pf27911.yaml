identifier: Pfam:PF27911
label: A-kinase-interacting protein 1
definition: >-
  AKIP1 regulates the effect of the cAMP-dependent protein kinase (PKAc) signalling pathway on the NF-kB activation cascade. AKIP1 binds PKA and co-localises with the NF-kB subunit p65. In humans, there are three splice variants, whereas only the full-length protein is present in rodents. AKIP1 seems to act as a modulator of PKA in NF-kappaB signalling; different splice variants have been shown to repress or enhance NF-kB transcription.
