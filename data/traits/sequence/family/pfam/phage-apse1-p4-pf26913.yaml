label: Bacteriophage APSE-1 protein p4
definition: >-
  This entry represents protein p4 found in APSE-1-like bacteriophages. Protein p4 is an uncharacterised protein of 73 amino acids (9.0 kDa) found in bacteriophage APSE-1 that infects the secondary endosymbiont of Acyrthosiphon pisum.
