identifier: Pfam:PF27958
label: Small integral membrane protein 9
definition: >-
  The small integral membrane protein 9 (Smim9) is an uncharacterised, membrane protein. It has a signal peptide, a small extracellular domain, a single transmembrane region, and a short cytoplasmic tail. It is known from mammals and birds.
