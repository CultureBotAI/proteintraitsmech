identifier: Pfam:PF04353
label: Regulator of RNA polymerase sigma(70) subunit, Rsd/AlgQ
definition: >-
  This family includes bacterial transcriptional regulators that are thought to act through an interaction with the conserved region 4 of the sigma(70) subunit of RNA polymerase. The Pseudomonas aeruginosa homologue, AlgQ, positively regulates virulence gene expression and is associated with the mucoid phenotype observed in P. aeruginosa isolates from cystic fibrosis patients.
