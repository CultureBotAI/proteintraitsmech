identifier: Pfam:PF08336
label: Prolyl 4-Hydroxylase alpha-subunit, N-terminal region
definition: >-
  Prolyl 4-hydroxylase alpha-subunit (P4H) ( ) catalyses the formation of 4-hydroxyproline, a key post-translational modification required for collagen biosynthesis. In vertebrates, the functional enzyme is an α 2 β 2 tetramer, with the β-subunit being identical to protein disulphide isomerase. Members of the P4HA family specifically hydroxylate proline residues in -Xaa-Pro-Gly- motifs, a modification that stabilises the collagen triple helix by enabling hydrogen bond formation. This hydroxylation step is essential for the structural integrity and function of collagen, and thereby for the proper organisation of the extracellular matrix.
