identifier: Pfam:PF25634
label: Pyrobaculum filamentous virus capsid protein
definition: >-
  The Pyrobaculum filamentous virus Major capsid protein is involved in the formation of a helical, filamentous nucleocapsid that measures approximately 400 nm in length and 20 nm in width. This family of proteins works in conjunction with capsid protein 2 to wrap around viral DNA, maintaining it in an A-form. This structural conformation is likely achieved through non-specific desolvation and specific coordination of DNA phosphate groups by positively charged residues. Such a configuration is crucial for protecting viral DNA, particularly under extreme conditions such as the desiccation experienced by the host organism.
