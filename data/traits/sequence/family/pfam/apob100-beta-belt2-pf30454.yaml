identifier: Pfam:PF30454
label: Apolipoprotein B100, beta-belt
definition: >-
  This region is found in the human Apolipoprotein B100 and related proteins. Apolipoprotein B100 (apoB100), one of the largest proteins in the genome, is the primary structural and functional component of the Low-density lipoprotein (LDL). ApoB100 functions as a recognition signal for the cellular binding and internalization of LDL particles by the apoB/E receptor. The region represented by this entry is located between insert 4 and insert 6 and is one of the fragments of the so-called beta-belt. The beta-belt is a continuous amphipathic meander β-sheet that wraps around the LDL particle like a belt. Across the two sides of the beta-belt are nine interstrand inserts that extend across the lipid surface to provide additional structural support through a network of long-range interactions.
