identifier: Pfam:PF07233
label: Protein of unknown function (DUF1425)
definition: >-
  This family consists of uncharacterised bacterial proteins predominantly found in Proteobacteria, including YcfL from Escherichia coli and Putative lipoprotein from Campylobacter jejuni. The protein adopts a single domain configuration with two β-sheets formed respectively by three and four β-strands (β-sandwich) and contains a Greek key motif, representing a singular variant of the Ig-like fold. Many proteins of this group have a lipid attachment site at the N-terminal of this domain, which together with the structure solved, suggests a role in bacterial lipoproteins.
