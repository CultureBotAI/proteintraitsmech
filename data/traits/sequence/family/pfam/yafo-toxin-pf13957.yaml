identifier: Pfam:PF13957
label: Toxin YafO, type II toxin-antitoxin system
definition: >-
  YafO is a toxin which inhibits protein synthesis. It acts as a ribosome-dependent mRNA interferase. It forms part of a type II toxin-antitoxin system, where the YafN protein acts as an antitoxin.
