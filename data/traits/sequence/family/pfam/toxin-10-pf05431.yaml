identifier: Pfam:PF05431
label: 'Insecticidal Crystal Toxin, P42 '
definition: >-
  This entry represents a domain found in insecticidal crystal toxins. Strains of Bacillus that have this insecticidal activity use a binary toxin comprised of two proteins, P51 and P42 (this entry). This domain is also found in Binary larvicide subunit BinA, a component of a binary toxin active against Culex and some Aedes mosquito larvae. Members of this entry are highly conserved between strains of different serotypes and phage groups.
