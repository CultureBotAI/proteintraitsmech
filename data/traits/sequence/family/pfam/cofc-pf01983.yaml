identifier: Pfam:PF01983
label: Guanylyl transferase CofC like
definition: >-
  Coenzyme F420 is a hydride carrier cofactor that plays important roles in primary and secondary metabolism in a range of bacteria and archaea. This entry represents CofC family, guanylyltransferases involved in coenzyme F420 biosynthesis. CofC has been shown to catalyse the activation of phosphoenolpyruvate (PEP) as enolpyruvoyl-2-diphospho-5'-guanosine, via the condensation of PEP with GTP. This family also includes 3-phospho-D-glycerate guanylyltransferase which catalyses the activation of 3-phosphoglycerate (3PG) as 3-[glyceryl]-diphospho-5'-guanosine, via the condensation of 3PG with GTP.
