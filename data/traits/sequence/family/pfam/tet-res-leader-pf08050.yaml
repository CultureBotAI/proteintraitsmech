identifier: Pfam:PF08050
label: Tetracycline resistance leader peptide
definition: >-
  This entry represents the tetracycline resistance leader peptide, which can be found in Tet(L) efflux proteins. Tet(L) is a transmembrane protein that can function as a metal-tetracycline/H+ antiporter. Its sequence is preceded by a leader region region that contains a 20-amino-acid open reading frame and an appropriately spaced ribosome binding site. Expression of the gene is induced by addition of tetracycline, which is thought to act by binding to ribosomes that translate the tet(L) leader peptide coding sequence. The presence of three inverted repeats, which can form two different conformations of mRNA, suggests that the tetracycline resistance (TcR) region is regulated by a translational attenuation mechanism. A Rho-independent transcriptional terminator structure is present immediately after the translational stop codon of the Tet protein. The antibiotic tetracycline has a broad spectrum of activity, acting to inhibit bacterial protein synthesis by binding to the 30S ribosomal subunit, which prevents the association of the aminoacyl-tRNA to the ribosomal acceptor A site. Tetracycline binding is reversible, therefore diluting out the antibiotic can reverse its effects. Tetracycline resistance genes are often located on mobile elements, such as plasmids, transposons and/or conjugative transposons, which can sometimes be transferred between bacterial species. In certain cases, tetracycline can enhance the transfer of these elements, thereby promoting resistance amongst a bacterial colony. There are three types of tetracycline resistance: tetracycline efflux, ribosomal protection, and tetracycline modification: Tetracycline efflux proteins belong to the major facilitator superfamily. Efflux proteins are membrane-associated proteins that recognise and export tetracycl…
