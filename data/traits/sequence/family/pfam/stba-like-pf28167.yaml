identifier: Pfam:PF28167
label: Plasmid stabilization protein StbA-like
definition: >-
  This entry represents the plasmid stabilisation protein StbA and related proteins found mainly in Enterobacterales. StbA is encoded within the stbABC operon and is required for plasmid stability. StbA and StbB control conjugation and both are considered part of an atypical plasmid stabilisation system that reconciles two modes: a maintenance mode (replication and segregation) and a propagation mode (conjugation).
