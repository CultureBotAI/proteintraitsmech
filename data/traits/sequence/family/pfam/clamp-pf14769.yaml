identifier: Pfam:PF14769
label: Flagellar C1a complex subunit C1a-32
definition: >-
  This family represents one small subunit, C1a-32, of the C1a projection (the seventh projection of the flagellum in Chlamydomonas). Numerous studies have indicated that each of the seven projections associated with the central pair of microtubules in the flagellum plays a distinct role in regulating eukaryotic ciliary/flagellar motility. The C1a projection is a complex of proteins including PF6, C1a-86, C1a-34, C1a-32, C1a-18, and calmodulin. C1a projection is involved in modulating flagella beat frequency and this is mediated via the C1a-34, C1a-32, and C1a-18 sub-complex by modulating the activity of both the inner and outer dynein arms. This entry also includes Cilia- and flagella-associated protein 119, whose function is unknown and ciliary-associated calcium-binding coiled-coil protein 1 (Cabcoco1) from vertebrates, a calcium-binding protein which may have a role in control of sperm flagellar movement.
