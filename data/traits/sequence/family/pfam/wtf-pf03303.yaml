identifier: Pfam:PF03303
label: WTF protein
definition: >-
  This Schizosaccharomyces family consists of post-meiotic segregation distorting elements (meiotic drivers). Meiotic drivers are selfish genes that break Mendel's law by skewing transmission rates to their own advantage, thereby contributing to reproductive isolation. WTF family includes diverse meiotic drivers and drive suppressors but they generally drive into >85% of gametes when heterozygous. Wtf4, a member of the large Wtf family, encodes two different proteins: one that acts as a poison and one that acts as an antidote. The antidote remains inside the gametes that contain the wtf4 gene, while the poison is released in the surrounding environment and kills all the gametes that do not posses the antidote.
