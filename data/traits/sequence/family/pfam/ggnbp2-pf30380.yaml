identifier: Pfam:PF30380
label: Gametogenetin-binding protein 2
definition: >-
  This entry represents gametogenetin-binding protein 2 (GGNBP2), a protein found in metazoans. GGNBP2 interacts with gametogenetin (GGN), which is the product of a testicular germ cell-specific gene specifically expressed from late pachytene spermatocytes through round spermatids, and may be involved in spermatogenesis. The protein localises to cytoplasmic vesicles. GGNBP2 is also known as laryngeal carcinoma- related gene 1 (LCRG1) and is down-regulated in laryngeal carcinoma and various cancer cell lines. In mouse, expression is testis- specific and induced by dioxin.
