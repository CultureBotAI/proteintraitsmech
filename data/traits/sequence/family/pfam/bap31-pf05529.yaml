identifier: Pfam:PF05529
label: Bap31/Bap29 transmembrane region
definition: >-
  The mammalian B-cell receptor-associated proteins of 29 and 31kDa (BAP29 and BAP31) are integral membrane proteins with a role in endoplasmic reticulum (ER) quality control and sorting. BAP31 is also involved in apoptosis. Saccharomyces cerevisiae possesses three homologues of BAP31 known as Yet1, Yet2, and Yet3. These proteins are predicted to have three transmembrane segments with a cytoplasmic, coiled-coil C-terminal domain. This entry represents the transmembrane region.
