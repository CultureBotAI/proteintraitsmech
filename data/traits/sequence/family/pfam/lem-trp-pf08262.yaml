identifier: Pfam:PF08262
label: 'Leucophaea maderae tachykinin-related peptide '
definition: >-
  These peptides are designated Leucophaea maderae (Madeira cockroach) tachykinin-related peptides (Lem TRPs). Some were isolated from the midgut of L. maderae, whereas others appear to be brain specific. The Lem TRPs of the brain are myotropic and induce increases in the amplitude and frequency of spontaneous contractions and tonus of hindgut muscle in L. maderae. They were also isolated from brain-corpora, cardiaca-corpora, allata-suboesophageal ganglion extracts of Locusta migratoria (Migratory locust). They stimulate visceral muscle contractions of the oviduct and the foregut of L. migratoria.
