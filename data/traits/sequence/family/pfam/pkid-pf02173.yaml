identifier: Pfam:PF02173
label: pKID domain
definition: >-
  This entry represents the phosphorylated kinase-inducible domain (pKID) of human Cyclic AMP-responsive element-binding protein 1 (CREB) and similar animal proteins. The nuclear factor CREB activates transcription of target genes in part through direct interactions with the KIX domain of the coactivator CREB binding protein (CBP, ) in a phosphorylation-dependent manner. CBP and Histone acetyltransferase p300 (P300) bind to the pKID of CREB. Additionally, binding of this domain to the complex formed by the transcription factor mixed-lineage leukemia (MLL, also known as Histone-lysine N-methyltransferase 2A) and KIX has been associated with repacking of the allosteric network in the hydrophobic core of this protein.
