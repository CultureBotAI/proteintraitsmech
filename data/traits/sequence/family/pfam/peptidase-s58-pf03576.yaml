identifier: Pfam:PF03576
label: 'Peptidase family S58 '
definition: >-
  This group of serine peptidases belong to MEROPS peptidase family S58 (DmpA aminopeptidase family, clan PE). The protein fold of the peptidase unit for members of this family resembles that of archaean proteasome subunit B, the type example of clan PB. The type example is aminopeptidase DmpA from Ochrobactrum anthropi. This family also contains proteins that have been found experimentally to be without peptidase activity, or lack amino acid residues that are believed to be essential for the catalytic activity of peptidases in the family. L-aminopeptidase D-Ala-esterase/amidase (DmpA) from O. anthropi releases the N-terminal L and/or D-Ala residues from peptide substrates. This is the only known enzyme to liberate N-terminal amino acids with both D and L stereospecificity. DmpA active form is an alphabeta heterodimer, which results from a putative autocatalytic cleavage of an inactive precursor polypeptide. DmpA shows structural homology to N-terminal nucleophile (Ntn) hydrolase family members, and may work by a similar catalytic mechanism, however their secondary structure elements differ significantly.
