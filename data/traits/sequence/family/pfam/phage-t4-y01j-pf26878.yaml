identifier: Pfam:PF26878
label: Bacteriophage T4 protein Y01J
definition: >-
  This entry represents the Y01J protein family found in T4-like bacteriophages. Y01J is an uncharacterised protein of 68 amino acids (8.3 kDa) found in the mrh-soc intergenic region of bacteriophage T4. The protein is encoded within the phage genome that infects Escherichia coli.
