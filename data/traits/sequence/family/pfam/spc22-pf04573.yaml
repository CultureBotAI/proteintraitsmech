identifier: Pfam:PF04573
label: Signal peptidase subunit
definition: >-
  This entry includes signal peptidase complex subunit 3 (Spc3, also known as SPC22) and its homologues from fungi, plants and animals. Translocation of polypeptide chains across the endoplasmic reticulum membrane is triggered by signal sequences. During translocation of the nascent chain through the membrane, the signal sequence of most secretory and membrane proteins is cleaved off. Cleavage occurs by the signal peptidase complex (SPC) which consists of four subunits in yeast and five in mammals.
