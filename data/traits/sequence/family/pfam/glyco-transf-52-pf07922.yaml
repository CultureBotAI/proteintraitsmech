identifier: Pfam:PF07922
label: Glycosyltransferase family 52
definition: >-
  This family features glycosyltransferases belonging to glycosyltransferase family 52, which have alpha-2,3- sialyltransferase ( ) and alpha-glucosyltransferase ( ) activity. For example, beta-galactoside alpha-2,3- sialyltransferase expressed by Neisseria meningitidis ( ) is a member of this family and is involved in a step of lipooligosaccharide biosynthesis requiring sialic acid transfer; these lipooligosaccharides are thought to be important in the process of pathogenesis. This family includes several bacterial lipooligosaccharide sialyltransferases similar to the Haemophilus ducreyi LST protein. Haemophilus ducreyi is the cause of the sexually transmitted disease chancroid and produces a lipooligosaccharide (LOS) containing a terminal sialyl N-acetyllactosamine trisaccharide.
