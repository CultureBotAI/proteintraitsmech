identifier: Pfam:PF05106
label: Phage holin family (Lysis protein S)
definition: >-
  This protein family represent one of a large number of mutually dissimilar families of phage holins. Holins act against the host cell membrane to allow lytic enzymes of the phage to reach the bacterial cell wall. This family includes the product of the S gene of phage lambda.
