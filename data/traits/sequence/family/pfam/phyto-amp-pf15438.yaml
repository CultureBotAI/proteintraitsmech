identifier: Pfam:PF15438
label: Antigenic membrane protein of phytoplasma
definition: >-
  This entry represents the antigenic membrane protein (also known as Phyto-Amp) from Candidatus Phytoplasma. The bacteria are limited to the phloem and pose a major threat to agriculture worldwide. They are transmitted in a persistent, propagative manner by phloem-sucking Hemipteran insects. Phytoplasma membrane proteins are in direct contact with hosts and are assumed to be involved in determining vector specificity. Phyto-Amp is thought to be one family of proteins that mediates such specificity. The proteins appear to be encoded by circular extrachromosomal elements, at least one of which is a plasmid.
