label: Protein of unknown function (DUF2895)
definition: >-
  This is a bacterial family of uncharacterised proteins. Members of this entry are found occasionally on plasmids such as the Pseudomonas putida TOL plasmid pWWO_p085. Usually, however, they are found on the bacterial main chromosome in regions flanked by markers of conjugative transfer and/or transposition.
