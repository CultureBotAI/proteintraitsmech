identifier: Pfam:PF12101
label: Protein of unknown function (DUF3577)
definition: >-
  This family of proteins is functionally uncharacterised. This protein is found in bacteria. Proteins in this family are typically between 143 to 307 amino acids in length. Members of this family regularly are found near a TopB family topoisomerase, in mobile elements such as certain pathogenicity islands, in regions of those islands thought to be involved in replication. The founding member of the family is STY4534 in Salmonella pathogenicity island 7 (SPI-7), a core protein shared by members of SPI-7's subclass of integrative and conjugative element (ICE).
