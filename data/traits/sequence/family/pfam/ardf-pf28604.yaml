identifier: Pfam:PF28604
label: Archaeal ribosome dimerization factor
definition: >-
  This entry represents a ribosome dimerization factor found in hyperthermophilic archaea, particularly Pyrococcus species. The protein functions as an anti-association factor that prevents 70S ribosome formation by binding to 30S ribosomal subunits and facilitating their dimerization in a unique head-to-body architecture. The factor forms homodimers that interact with 16S rRNA helices and the eS32 ribosomal protein, sterically blocking the 50S subunit association site. This mechanism differs from bacterial and eukaryotic hibernation factors by creating 30S-30S dimers rather than 70S-70S dimers. The protein likely serves as a translation regulation mechanism under extreme environmental conditions.
