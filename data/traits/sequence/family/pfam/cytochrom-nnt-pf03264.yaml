identifier: Pfam:PF03264
label: NapC/NirT cytochrome c family, N-terminal region
definition: >-
  Within the NapC/NirT family of cytochrome c proteins, some members, such as NapC and NirT , bind four haem groups, while others, such as TorC , bind five haems. This family aligns the common N-terminal region that contains four haem-binding C-X(2)-CH motifs.
