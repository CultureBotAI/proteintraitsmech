identifier: Pfam:PF10181
label: GPI-GlcNAc transferase complex, PIG-H component
definition: >-
  This entry represents a conserved domain found in PIG-H proteins. This entry also includes the PIG-H homologues from S. cerevisiae and S. pombe Gpi15. Phosphatidylinositol N-acetylglucosaminyltransferase subunit H (PIG-H, also known as Phosphatidylinositol-glycan biosynthesis class H protein) is part of the glycosylphosphatidylinositol-N-acetylglucosaminyltransferase (GPI-GnT) complex that catalyses the transfer of N-acetylglucosamine from UDP-N-acetylglucosamine to phosphatidylinositol and participates in the first step of GPI biosynthesis.
