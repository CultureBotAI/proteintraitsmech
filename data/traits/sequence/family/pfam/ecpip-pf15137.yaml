identifier: Pfam:PF15137
label: Exosomal polycystin 1 interacting protein
definition: >-
  This family includes the exosomal polycystin-1-interacting protein (also known as C21orf62 or CU062 in human), which is a small glycoprotein that can oligomerize with itself and interact with PC1 protein polycystin-1 (PC1). It may have a role in the identification of senescent mitochondria and their extrusion in extracellular vesicles.
