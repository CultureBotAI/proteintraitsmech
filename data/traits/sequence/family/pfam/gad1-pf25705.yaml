identifier: Pfam:PF25705
label: Gabija anti-defense 1
definition: >-
  This entry represents the Gabija anti-defense 1 (Gad1) protein family, which is encoded by bacteriophages to counteract the bacterial Gabija anti-phage defence system. Gad1 forms an octameric web that encases the Gabija GajAB complex, blocking its ability to bind and cleave phage DNA. The relatively large size of Gad1 (35 kDa) allows it to form multiple interaction interfaces with the host defence complex. Structural studies show that Gad1 contains distinctive fist, arm and shoulder domains that work together to inhibit GajA nuclease activity. The interaction between Gad1 and GajAB enables phages to overcome this widespread bacterial defence system.
