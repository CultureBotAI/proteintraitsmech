identifier: Pfam:PF04948
label: 'Poxvirus A51 protein '
definition: >-
  This entry represents Vaccinia virus A51, also known as Protein OPG181, and its homologues from poxvirus. This protein associates with ubiquitin and stabilises host microtubules, promotes viral protein stability, and plays an essential role in viral replication in vertebrate cells.
