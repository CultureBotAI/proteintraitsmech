identifier: Pfam:PF04120
label: 'Low affinity iron permease '
definition: >-
  Although originally identified as a low-affinity iron(II) permease, Fet4 has since been shown to import several other transition metal ions, including copper and zinc. Copper, cobalt, and cadmium inhibit Fet4. Fet4 is an integral protein of the plasma membrane. FET4 is not essential, not even in fet3 fet4 double mutants. Over expression of FET4 improves growth under alkaline conditions.
