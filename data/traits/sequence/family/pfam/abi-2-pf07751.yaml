identifier: Pfam:PF07751
label: Abi-like protein
definition: >-
  Bacteria have numerous mechanisms to resist bacteriophage infection. While most are based on preventing infection in the first place, the abortive infection (Abi) systems provide protection by the abortion of an existing phage infection. Typically, these Abi systems target a crucial step of phage multiplication such as replication, transcription or translation, and lead to the death of the infected cell. These protein sequences, found in various bacterial species, are similar to those of the AbiD and AbiF proteins from Lactococcus species. The proteins are thought to have helix-turn-helix motifs, found in many DNA-binding proteins, allowing them to perform their function.
