identifier: Pfam:PF01366
label: Herpesvirus processing and transport protein
definition: >-
  In herpesviruses the terminase complex is a genome-packaging motor formed by a small (S-terminase) and a large terminase subunit (L-terminase), plus a third terminase subunit known as T-terminase. The S-terminase subunit, pUL28 in HSV-1 and pUL56 in HCMV, binds packaging initiation sites on viral genome. These proteins play a central role in viral genome cleavage and packaging.
