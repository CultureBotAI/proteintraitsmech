identifier: Pfam:PF08248
label: Tryptophyllin-3 skin active peptide
definition: >-
  PdT-3 or Tryptophyllin-3 peptide is a subfamily of the family Tryptophyllin and of the superfamily FSAP (Frog Skin Active Peptide). Originally identified in skin extracts of Neotropical leaf frogs, Phyllomedusa sp. This subfamily has an average length of 13 amino acids. The pharmacological activity of the tryptophyllins remains to be established but it seems that these peptides possess an action on liver protein synthesis and body weight. It is thought to possesses insulin-releasing activity.
