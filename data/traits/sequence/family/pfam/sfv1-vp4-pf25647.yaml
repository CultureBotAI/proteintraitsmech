identifier: Pfam:PF25647
label: Sulfolobus filamentous virus 1 major coat protein VP4
definition: >-
  This entry represents one of the two major coat proteins (VP4) of Sulfolobus filamentous virus 1 (SFV1), a membrane-enveloped filamentous virus that infects the hyperthermophilic acidophile Sulfolobus shibatae. VP4 forms a heterodimer with VP5 and wraps around A-form DNA. Despite having no detectable sequence similarity with VP5 or with coat proteins from other archaeal filamentous viruses, VP4 exhibits remarkable structural similarity to these proteins. The N-terminal portion of VP4 contains residues that project into the groove of the viral DNA.
