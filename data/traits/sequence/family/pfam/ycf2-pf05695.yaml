identifier: Pfam:PF05695
label: Ycf2 family
definition: >-
  This entry, previously known as DUF825, represents the N-temrinal region of Ycf2 protein from Arabidopsis thaliana and related plant proteins. Ycf2 is a component of the Ycf2-FtsHi complex which has been identified as chloroplast import motor. The Ycf2-FtsHi complex is composed of six distinct components. This heterohexameric assembly is organized in a counterclockwise order with components arranged as Ycf2, FtsHi5, FtsHi1, FtsHi2, FtsHi4, and FtsH12. A collaborative interplay between the Ycf2-FtsHi complex and the TIC (translocon at the inner chloroplast membrane) complex, contributes to the efficient translocation of preproteins into the chloroplasts. This domain is found associated with .
