identifier: Pfam:PF06518
label: Protein of unknown function (DUF1104)
definition: >-
  This family consists of several hypothetical proteins of unknown function which appear to be found mainly in Helicobacter pylori. The structure of protein consists of a bundle of four α-helices connected by loops and stabilised by hydrophobic interactions. It has been suggested that this protein might represent a novel H. pylori sialic acid-specific adhesin and/or might be involved in metal ion homeostasis in H. pylori.
