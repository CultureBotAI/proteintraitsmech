identifier: Pfam:PF29763
label: Phasin PhaP
definition: >-
  This entry represents the phasin PhaP from cyanobacteria. PhaP attaches to the polyhydroxybutyrate (PHB) granule surface, regulating the number and size of PHB granules within a cell. It probably also acts as a regulator affecting the biosynthetic activity of PHB synthase in vivo. The protein forms homotetramers and contains two α-helices that are required for oligomerisation and targeting to PHB granules.
