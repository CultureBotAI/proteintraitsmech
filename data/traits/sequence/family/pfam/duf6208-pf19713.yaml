identifier: Pfam:PF19713
label: Family of unknown function (DUF6208)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC) and other uncharacterised bacterial proteins. This BGC (BGC0000976) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide. It includes a member from the curacin A biosynthetic gene cluster from Moorea producens 3L. This family appears to be predominantly found in Cyanobacteria.
