identifier: Pfam:PF25687
label: Mycobacteriophage Gene 3 protein
definition: >-
  This entry represents a family of small proteins found in mycobacteriophages. Members of this family include the Gene 3 protein (Gp3) from mycobacteriophages L5 and D29, which belong to the Fromanvirus genus. The function of these proteins remains unknown. The proteins are approximately 83 amino acids in length and show conservation in the central region, particularly around potential binding sites.
