identifier: Pfam:PF05628
label: Borrelia membrane protein P13
definition: >-
  Lyme borreliosis (or Lyme's disease) is one of the most common tick-borne diseases. It is caused by bacteria from the genus Borrelia. This family consists of P13 proteins from Borrelia species. P13 is a 13kDa integral membrane protein which is post-translationally processed at both ends and modified by an unknown mechanism.
