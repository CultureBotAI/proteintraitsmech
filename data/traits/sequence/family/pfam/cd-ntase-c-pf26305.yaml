identifier: Pfam:PF26305
label: cGAS/DncV-like nucleotidyltransferase C-terminal helical domain
definition: >-
  This entry represents the C-terminal helical domain of a group of prokaryotic cGAS/DncV-like nucleotidyltransferases (CD-NTases). CD-NTases are a family of enzymes that synthesise cyclic dinucleotides (CDNs) and cyclic trinucleotides (CTNs) which function as signalling molecules. While the N-terminal domain contains the conserved nucleotidyltransferase activity, the C-terminal helical domain shows a higher degree of variation and plays a critical role in determining substrate specificity. This domain contains key residues, particularly in the C-terminal loop region (including the conserved (R/Q)xW motif in clade E enzymes), that directly control donor nucleotide specificity. In cyclic di-pyrimidine-synthesising CD-NTases, this domain forms a restricted binding pocket that selectively accommodates pyrimidine nucleotides rather than purine nucleotides.
