identifier: Pfam:PF25703
label: Anti-CRISPR protein F31
definition: >-
  This entry represents anti-CRISPR protein AcrF31, a fusion of AcrIE4 and AcrIF7 domains that inhibits both type I-E and type I-F CRISPR-Cas systems. The N-terminal domain adopts a novel α-helical fold and targets the PAM (protospacer adjacent motif) interaction site of the type I-E Cas8e subunit. The C-terminal domain exhibits an α-β fold like native AcrIF7, which disables target DNA recognition by the PAM interaction site in the type I-F Cas8f subunit. The two domains are connected by a flexible linker that allows prompt docking onto their cognate Cas8 targets. Conserved negative charges in each Acr domain are required for interaction with their Cas8 targets. This protein was first identified in Pseudomonas citronellolis.
