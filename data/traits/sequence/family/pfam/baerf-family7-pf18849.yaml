identifier: Pfam:PF18849
label: Bacterial archaeo-eukaryotic release factor family 7
definition: >-
  This entry represetns the bacterial family that is under the the archaeo-eukaryotic release factor superfamily. It is likely to play roles in biological conflicts or regulation under stress conditions at the ribosome. Consistent with this, many members of the family associate on the genome with HPF-like ribosome hibernation factor.
