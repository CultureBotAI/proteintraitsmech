identifier: Pfam:PF04882
label: Peroxin-3
definition: >-
  Peroxin 3 (Pex3p), also known as Peroxisomal biogenesis factor 3, has been identified and characterised as a peroxisomal membrane protein in yeasts and mammals. Two putative peroxisomal membrane-bound Pex3p homologues have also been found in Arabidopsis thaliana. They possess a membrane peroxisomal targeting signal. Pex3p is an integral membrane protein of peroxisomes, exposing its N- and C-terminal parts to the cytosol. Peroxin is involved in peroxisome biosynthesis and integrity; it assembles membrane vesicles before the matrix proteins are translocated. In humans, defects in PEX3 are the cause of peroxisome biogenesis disorders, which include Zellweger syndrome (ZWS), neonatal adrenoleukodystrophy (NALD), infantile Refsum disease (IRD), and classical rhizomelic chondrodysplasia punctata (RCDP). These are peroxisomal disorders that are the result of proteins failing to be imported into the peroxisome.
