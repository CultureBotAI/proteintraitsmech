identifier: Pfam:PF28044
label: Bacteriocin 51 precursor BacA
definition: >-
  This entry represents the bacteriocin 51 precursor protein BacA described in Enterococcus. Bacteriocin proteins are synthesised by diverse types of Gram-positive and Gram-negative bacteria. These proteins possess the ability to hinder the proliferation of bacteria that are closely related to the producing strain. Typically, bacteriocins display a limited range of effectiveness, targeting specific bacterial strains or species rather than a broad spectrum of microorganisms.
