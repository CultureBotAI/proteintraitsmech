identifier: Pfam:PF07442
label: Ponericin
definition: >-
  This family contains a number of Poneritoxin (also known as ponericin) peptides (approximately 30 residues long) from the venom of the predatory ant Pachycondyla goeldii (Ponerine ant). These peptides exhibit antibacterial and insecticidal properties, and may adopt an amphipathic α-helical structure in polar environments such as cell membranes.
