identifier: Pfam:PF03512
label: Glycosyl hydrolase family 52
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 52 comprises enzymes with only one known activity; beta-xylosidase ( ). Proteins harboring beta-xylosidase and xylanase activitieshave been identified in the Gram-positive, facultative thermophilic aerobe Bacillus stearothermophilus 21. This microbe, which functions in xylan degradation, can utilise xylan as a sole source of carbon. The enzyme hydrolyses 1,4-beta-D-xylans, removing successive D-xylose residues from the non-reducing termini. It also hydrolyses xylobiose.
