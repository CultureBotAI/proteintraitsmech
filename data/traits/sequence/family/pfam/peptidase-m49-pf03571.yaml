identifier: Pfam:PF03571
label: Peptidase family M49
definition: >-
  This entry represents dipeptidyl peptidase 3 (DPP3), which cleaves and degrades bioactive peptides, including angiotensin, Leu-enkephalin and Met-enkephalin. It also cleaves Arg-Arg-beta-naphthylamide (in vitro). This entry also includes uncharacterised sequences from bacteria.
