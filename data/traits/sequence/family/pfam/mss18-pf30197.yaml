identifier: Pfam:PF30197
label: MSS18
definition: >-
  This entry represents the MSS18 protein family. These proteins are found particularly in Saccharomycetaceae. The proteins are involved in splicing of intron aI5-beta of the mitochondrial COX1 transcript. MSS18 proteins localise to mitochondria and are involved in mRNA processing and splicing. The function of this family remains to be determined.
