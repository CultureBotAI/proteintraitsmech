identifier: Pfam:PF03003
label: Pox virus entry-fusion-complex G9/A16
definition: >-
  This family includes two of the eight entry-fusion complex proteins of pox viruses. The viral fusion proteins are components of the mature virion, MV, membrane. Extracellular enveloped virions (EVs), the infecting particles, are MVs with an additional membrane that is opened or removed prior to the fusion of the MV and cell membrane during virus entry. G9 (also known as Entry-fusion complex protein OPG094) and A16 (Virion membrane protein OPG143) interact closely with each other and each is required for membrane fusion and virus entry as well as for interaction with A56/K2.
