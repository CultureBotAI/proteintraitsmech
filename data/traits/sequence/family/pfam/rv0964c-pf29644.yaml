label: Uncharacterised protein Rv0964c
definition: >-
  This entry represents an uncharacterised protein Rv0964c, found in Mycobacteriaceae, including Mycobacterium tuberculosis. The protein is 160 amino acids in length. The function of this protein remains to be determined. These proteins likely contain a type VII secretion signal a the N terminus.
