identifier: Pfam:PF03300
label: Tenuivirus non-structural, movement protein NS4
definition: >-
  NS4 (also known as pc4) transports viral genome to neighbouring plant cells directly through plasmosdesmata, without any budding. It allows efficient cell to cell propagation, by bypassing the host cell wall barrier.
