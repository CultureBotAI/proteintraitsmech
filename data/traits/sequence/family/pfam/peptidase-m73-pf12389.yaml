identifier: Pfam:PF12389
label: Camelysin metallo-endopeptidase
definition: >-
  Members of this largely Clostridial protein family contain the signal peptide, for the variant SipW form of the signal peptidase I family. The remainder of this protein, however, differs from families such as Peptidase_M73 ( ) and YqxM that share the same signal peptide domain. The two known targets for export by the SipW signal peptidase in Bacillus subtilis act in producing biofilm matrix material, but the function for the proteins in this entry is not known. Members of this Clostridial family include BsaA from Clostridium perfringens that was recently shown to be a matrix protein of extracellular polymeric substance.
