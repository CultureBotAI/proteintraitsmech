identifier: Pfam:PF12827
label: Peroxisomal biogenesis protein family
definition: >-
  Peroxin-22 is an integral peroxisomal membrane protein. The N terminus of peroxin-22 is located in the matrix, while the C terminus is located in the cytosol. Peroxin-22 interacts with the ubiquitin-conjugating enzyme Pex4p, anchoring it at the peroxisomal membrane. This association is required for ubiquitination of peroxisomal import receptor Pex5p mediated by Pex4p.
