label: Rv2628 protein family
definition: >-
  This entry represents the Rv2628 protein family, found in Mycobacterium tuberculosis. The representative member Rv2628 from Mycobacterium tuberculosis strain H37Rv is a 120 amino acid uncharacterised protein. The function of this protein remains to be determined.
