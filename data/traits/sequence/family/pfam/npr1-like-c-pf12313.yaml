identifier: Pfam:PF12313
label: NPR1/NIM1 like defence protein C terminal
definition: >-
  This entry represents the NPR1/NIM1 like defence protein, which is found in many plant species. The eukaryotic proteins are typically between 251 and 588 amino acids in length. NPR1/NIM1 like defence protein mediates the binding of TGA factors to the as-1 motif, found in the pathogenesis-related PR-1 gene which leads to the transcriptional regulation of the gene defence. Controls the onset of systemic acquired resistance (SAR).
