identifier: Pfam:PF07102
label: Putative nuclease YbcO
definition: >-
  This entry includes YbcO ( ), a putative nuclease from E. coli. Proteins in the entry have been predicted to have the His-Me finger nuclease domain and may act as a recombinase that participates in DNA repair and replication.
