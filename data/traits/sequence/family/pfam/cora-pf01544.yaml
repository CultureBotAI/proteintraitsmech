identifier: Pfam:PF01544
label: CorA-like Mg2+ transporter protein
definition: >-
  This entry includes prokaryotic magnesium transport protein CorA and its related protein, zinc transport protein ZntB. This entry also includes eukaryotic magnesium transporters, such as mitochondrial inner membrane magnesium transporter Mrs2 and magnesium transporter Alr1 and Alr2. These proteins are characterised by the conserved GMN motif at the end of the first of two conserved transmembrane (TM) domains near the C terminus. Thermotoga maritima CorA (TmCorA) has been reported to be an efflux system. It only has 2 TM domains,TM1 and TM2. The loop connecting TM1 and TM2 contains the conserved CorA signature motifs YGMNF and MPEL. With its N- and C-terminal ends face the cytosol and its similarity to the class II CorA (a CorA group lacking the MPEL motif and may transport divalent cations out of the cell), TmCorA is predicted to be primarily involved in ion efflux. It forms a pentameric membrane protein channel featuring a possible ion discriminating aspartate ring at the cytoplasmic entrance of the pore and two distinct cytoplasmic metal binding sites per monomer, which could have regulatory roles.
