identifier: Pfam:PF04012
label: PspA/IM30 family
definition: >-
  In Gram-negative organisms, PspA is part of the multi-gene Phage shock protein (Psp) response system that mitigates envelope damage by preventing proton leakage across a damaged membrane, thereby maintaining proton motive force. In Mycobacterium tuberculosis, PspA has been shown to integrate envelope stress-sensing and envelope-preserving functions. It also regulates lipid droplet homeostasis and nonreplicating persistence (NRP) in M. tuberculosis. The PspA homologue in plants, inner membrane-associated protein of 30 kDa (IM30), also known as vesicle-inducing protein in plastids 1 (VIPP1), plays a critical role in thylakoid biogenesis, essential for photosynthesis.
