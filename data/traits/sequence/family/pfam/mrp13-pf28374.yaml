identifier: Pfam:PF28374
label: Mitochondrial ribosomal protein mS27
definition: >-
  This entry represents mitochondrial ribosomal protein mS27 (also known as Small ribosomal subunit protein mS27 or Mrp13), a component of the small ribosomal subunit (37S) of mitochondrial ribosomes (mitoribosomes) in filamentous fungi such as Neurospora crassa. The mitoribosome is a dedicated translation machinery responsible for synthesis of mitochondrial genome-encoded proteins, including essential transmembrane subunits of the mitochondrial respiratory chain. The 37S small subunit contains a 16S ribosomal RNA and 32 different proteins. Mitoribosomes are attached to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. This protein belongs to the mitochondrion-specific ribosomal protein mS27 family.
