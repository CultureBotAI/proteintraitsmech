identifier: Pfam:PF15257
label: Domain of unknown function (DUF4590)
definition: >-
  This is an uncharacterised domain found in metazoan proteins, such as glutamate rich 3 (ERICH3) ( ) that is involved in neuronal vesicle biogenesis and neurotransmitter vesicular function. This domain is approximately 120 amino acids in length and it is predicted to fold into a β-sandwich. It contains two conserved sequence motifs: CCE and PCY.
