identifier: Pfam:PF11390
label: NADH-dependant formate dehydrogenase delta subunit FdsD
definition: >-
  FdsD is the delta subunit of the enzyme formate dehydrogenase. This subunit may play a role in maintaining the quaternary structure by means of electrostatic interactions with the other subunits. The delta subunit is not involved in the active centre of the enzyme.
