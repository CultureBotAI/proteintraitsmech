identifier: Pfam:PF26897
label: Bacteriophage T4 Y04O/Y04P family
definition: >-
  This entry represents the Y04O/Y04P protein family found in T4-like bacteriophages. This family includes two uncharacterised proteins, Y04O (308 amino acids, 36.3 kDa) and Y04P (333 amino acids, 39.0 kDa), both found in the nrdC-mobD intergenic region of bacteriophage T4.
