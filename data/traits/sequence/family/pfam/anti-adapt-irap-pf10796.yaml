identifier: Pfam:PF10796
label: 'Sigma-S stabilisation anti-adaptor protein '
definition: >-
  This entry is conserved in Enterobacteriaceae. It is one of a series of proteins, expressed by these bacteria in response to stress, that help to regulate Sigma-S, the stationary phase sigma factor of Escherichia coli and Salmonella. IraP is essential for Sigma-S stabilisation in some but not all starvation conditions.
