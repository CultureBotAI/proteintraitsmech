identifier: Pfam:PF24683
label: CT021 protein
definition: >-
  This entry represents the hypothetical protein CT021 from Chlamydia trachomatis ( ) and related proteins. The structure of this protein ( ) consists of β-meander that folds into an open β-barrel packed on a side with two α-helices. It structurally resembles the N-terminal domain of Sigma-E factor regulatory protein rseB ( ).
