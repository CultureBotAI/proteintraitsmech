identifier: Pfam:PF16074
label: Type IV Pilus-assembly protein W
definition: >-
  PilW is one of the component proteins of the pilus biogenesis process whereby pilus fibres are assembled in the periplasm, emerge onto the cell surface and are there stabilised, to allow bacterial attachment to host cells. PilW is an outer-membrane protein necessary for both the functionality of fibres and their stabilisation.
