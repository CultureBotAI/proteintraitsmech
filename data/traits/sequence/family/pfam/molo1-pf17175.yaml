identifier: Pfam:PF17175
label: Modulator of levamisole receptor-1
definition: >-
  MOLO1 is a one-pass transmembrane protein that contains a single extracellular globular domain. It is a positive regulator of levamisole-sensitive acetylcholine receptors in Caenorhabditis elegans ( ). These receptors are Cys-loop ligand-gated ion channels, and MOLO1 is an auxiliary subunit of the gated channel. The proteins carry a Rossmann fold.
