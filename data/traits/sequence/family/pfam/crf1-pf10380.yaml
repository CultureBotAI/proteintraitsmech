identifier: Pfam:PF10380
label: Transcription factor CRF1
definition: >-
  CRF1 and IFH1 are transcription factors that control ribosomal gene regulation in S. cerevisiae. CRF1 binds FHL1 via the TOR signalling pathway and protein kinase A, and co-represses ribosomal genes. Contrarily, IFH1 binds FHL1 under rich growth conditions and induces ribosomal protein expression. CRF1 and IFH1 are derived from the duplication and subsequent specialisation of a single ancestral protein.
