identifier: Pfam:PF24180
label: Effector protein Avr2
definition: >-
  This entry represents Fusarium oxysporum Avr2 effector protein ( ) and similar sequences from ascomycetes. Avr2 targets a conserved defence mechanism in different hosts. It also suppresses FLS2-mediated immune responses, such as growth inhibition, ROS production, MAPK activation and callose deposition following flagellin22 treatment. Avr2 folds into a β-sandwich with some similarity to TRAF domains.
