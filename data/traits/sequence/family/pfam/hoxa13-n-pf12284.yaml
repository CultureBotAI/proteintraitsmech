identifier: Pfam:PF12284
label: Hox protein A13 N terminal
definition: >-
  This domain represents the N-terminal region of HoxA13 and other Hox proteins (HoxB13, HoxC13 and HoxD13). HoxA13 is involved in formation of the digital arch of the hands and feet, as well as in correct genital formation. This domain is found in association with .
