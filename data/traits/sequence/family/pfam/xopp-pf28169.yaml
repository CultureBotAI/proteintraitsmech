identifier: Pfam:PF28169
label: Type III secretion system effector XopP-like
definition: >-
  This entry represents the Type III secretion system effector XopP and related proteins found in proteobacteria. This entry also covers the C-terminal in uncharacterised bacterial proteins. XopP is a highly conserved core-effector protein produced by X. campestris, the causal agent of black rot disease of crucifers such as Brassica spp., radish, and turnip. This protein is essential for virulence and inhibits the function of the host-plant exocyst complex by direct targeting of Exo70B, a subunit of the exocyst complex, which plays a significant role in plant immunity. XopP interferes with exocyst-dependent exocytosis and efficiently inhibits the host's pathogen-associated molecular pattern (PAMP)-triggered immunity.
