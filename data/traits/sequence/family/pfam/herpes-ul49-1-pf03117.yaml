identifier: Pfam:PF03117
label: UL49 family
definition: >-
  UL49 proteins are present in the viral tegument at the surface of the nucleocapsid. Many of the nonconserved tegument proteins of alpha-herpes viruses play important roles during different steps of the viral replication cycle, such as the shutoff of host cell functions by the vhs protein encoded by UL41 and the transcriptional activation of viral immediate-early genes by the UL48 gene product, VP16. UL49 of Human herpesvirus 1 (HHV-1) has been shown to directly interact with VP16. The UL49 gene products of HHV-1 and Bovine herpesvirus 1 exhibit virus-independent intercellular trafficking of unknown biological function but are dispensable for productive viral replication. Envelope glycoprotein M (gM) and the complex formed by glycoproteins E (gE) and I (gI) are involved in the secondary envelopment of Suid herpesvirus 1 (Pseudorabies virus, PrV) particles in the cytoplasm of infected cells. In the absence of the gE-gI complex and gM, envelopment is blocked and capsids surrounded by tegument proteins accumulate in the cytoplasm. The cytoplasmic domains of gE and gM specifically interact with the C-terminal part of the UL49 gene product of PrV suggesting a role for the protein in secondary envelopment during herpesvirus virion maturation.
