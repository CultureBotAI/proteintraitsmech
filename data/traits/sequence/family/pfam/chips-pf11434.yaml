identifier: Pfam:PF11434
label: Chemotaxis-inhibiting protein CHIPS
definition: >-
  Chemotaxis inhibitory protein (also knows as CHIPS) is a Staphylococcus aureus-secreted virulence factor that impairs the response of neutrophils and monocytes to FPR and C5a. CHIPS has been shown to reduce neutrophil recruitment toward C5a in mouse models (its activity is more potent on human than on mouse cells). As such, its properties may make it a candidate new anti-inflammatory therapeutic compound. CHIPS also plays an key role in bacterial invasion, by inhibiting FMLP- and C5a-induced calcium moblisation. By influencing 2 related receptors with very different ligand specificities (C5aR and FPR), the protein has a unique role; nevertheless, neither the manner in which it binds such structurally different molecules nor how its expression is regulated are currently unknown. The structure of a CHIPS fragment (residues 31-121) has been solved by NMR spectroscopy. This fragment has the same activity in blocking the C5aR relative to full-length CHIPS, but lacks FPR antagonism. The protein has a compact fold comprising 2 short α-helices packed onto a 4-stranded anti-parallel β-sheet: strands-2 and -3 are joined by a loop with a well-defined conformation. The protein shares a high degree of structural similarity with a number of proteins, including the C-terminal domain of staphylococcal superantigen-like proteins (SSLs) 5 and 7, staphyloccocal and streptococcal superantigens TSST-1 and SPE-C, and various domains of the staphylococcal extracellullar adherence protein (EAP).
