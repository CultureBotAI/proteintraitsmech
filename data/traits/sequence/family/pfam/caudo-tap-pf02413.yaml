identifier: Pfam:PF02413
label: Caudovirales tail fibre assembly protein, lambda gpK
definition: >-
  This entry contains Bacteriophage T4 gp38 and related bacterial prophage and phage proteins. Gene 38 of phage T4 codes for a protein containing 183 amino acid residues with a molecular weight of 22.3kDa. Together with genes 36 and 37, whose products are structural proteins of the fibre distal part, gene 38 forms one transcription unit. Gp38, is a chaperone, which is required for assembly of the distal part of the long fibres and which is absent from the mature phage particle. In the absence of gp38 gp37, which are components of the distal part of the long tail fibre, it fails to oligomerise. The carboxy-terminal region of gp37 forms the tip of the distal fibre that interacts with the cell receptors. Functionally the role of gp38 can be replaced by pTfa of Bacteriophage lambda.
