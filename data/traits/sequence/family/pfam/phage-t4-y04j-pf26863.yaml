identifier: Pfam:PF26863
label: Phage T4 Y04J protein
definition: >-
  This entry represents protein Y04J found in bacteriophages. This protein is located in the pin-nrdC intergenic region in Enterobacteria phage T4. The protein is also known as 49.1 and is found in the T4 genome region between map positions 48.266 kb and 39.166 kb. The function of this protein is unknown.
