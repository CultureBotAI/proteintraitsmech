identifier: Pfam:PF23983
label: Minor capsid protein P11, C-terminal conserved region
definition: >-
  This entry, previously known as DUF7306, represents a conserved region found C-terminal in the Minor capsid protein P11 and related phage proteins. P11 is one of the minor capsid proteins that constitute a network below the outer capsid shell, internal to the major capsid proteins and outside the lipid membrane. P11 plays crucial roles in determining the capsid size and binding neighbouring symmetrons together. The P11 proteins zip together most of the capsomers at the boundary of neighbouring tri- or penta-symmetrons via their C-terminal regions. The C-terminal regions of each P11 protein is located underneath the conjunction of a set of three neighbouring capsomers, gluing these capsomers together. These C-terminal regions are to a large extend unstructured.
