identifier: Pfam:PF27996
label: Deltacoronavirus Accessory protein NS6
definition: >-
  This family includes the accessory protein NS6 from deltacoronavirus such as porcine coronavirus HKU15, and several avian coronaviruses found in sparrow, pigeon, quail and falcon, and from gammacoronaviruses such as duck coronavirus, Canada goose coronavirus among others. Porcine deltacoronavirus (PDCoV) encodes three accessory proteins, NS6, NS7, and NS7a. During PDCoV infection, NS6 antagonizes RIG-I-like receptor (RLR)-mediated IFN-beta production to evade host innate immune defense; it interacts with RIG-I and MDA5 to impede their association with double-stranded RNA. This is an important finding towards novel therapeutic targets and may lead to the development of more effective vaccines against PDCoV infection.
