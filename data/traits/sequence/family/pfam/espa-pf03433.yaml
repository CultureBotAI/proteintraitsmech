identifier: Pfam:PF03433
label: 'EspA-like secreted protein '
definition: >-
  This entry represents EspA, SseB and related proteins, components of type III translocons. EspA, together with EspB, EspD and Tir are exported by a type III secretion system. These proteins are essential for attaching and effacing lesion formation. EspA is a structural protein and a major component of a large, transiently expressed, filamentous surface organelle which forms a direct link between the bacterium and the host cell. SseB, along with SseC, and SseD, is a substrate protein that is secreted by the SPI2 system in vitro. SseB, SseC, and SseD were isolated in a fraction detached from the bacterial cell surface by mechanical shearing, indicating that these proteins are predominantly assembled into complexes on the bacterial cell surface. The three proteins are required for the translocation of SPI2 effector proteins SspH1 and SspH2 into infected host cells. SseB, SseC, and SseD function as the translocon for effector proteins by intracellular Salmonella. SseB is required for correct localization of SseC and SseD on the bacterial cell surface.
