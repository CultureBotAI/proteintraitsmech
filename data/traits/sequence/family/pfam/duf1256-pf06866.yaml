identifier: Pfam:PF06866
label: Protein of unknown function (DUF1256)
definition: >-
  This family consists of a number of proteins conserved among the endospore-forming subset of the firmicutes, which are largely uncharacterised. A member of this entry, called YyaC, shows many similarities to the germination protease GPR, which is found in exactly the same set of organisms and has a known role in the sporulation/germination process.
