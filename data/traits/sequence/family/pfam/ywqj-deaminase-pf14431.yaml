identifier: Pfam:PF14431
label: YwqJ-like deaminase
definition: >-
  Members of this family are present in a wide phyletic range of bacteria and represent nucleic acid/nucleotide deaminase superfamily members prototyped by Bacillus YwqJ. Members of this family function as toxins in bacterial polymorphic toxin systems, such as YenC2 from Yersinia entomophaga.
