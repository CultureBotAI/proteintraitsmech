identifier: Pfam:PF02690
label: Na+/Pi-cotransporter
definition: >-
  This family consists of sodium-dependent phosphate transport proteins of the solute carrier family SLC34A. It includes mammalian type II renal Na+/Pi-cotransporters and other proteins from lower eukaryotes and bacteria, some of which are also Na+/Pi-cotransporters. In kidneys these proteins may be involved in actively transporting phosphate into cells via Na+ cotransport in the renal brush border membrane.
