identifier: Pfam:PF26849
label: Superinfection exclusion protein A
definition: >-
  The Superinfection exclusion protein A family is involved in preventing the entry of phage DNA into the cytoplasm by blocking its transfer across the inner membrane. This mechanism provides protection against superinfection by phages of the same family and also against DNA from other phages. This entry also includes related bacterial proteins.
