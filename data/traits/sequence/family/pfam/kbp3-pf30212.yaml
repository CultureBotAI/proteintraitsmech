identifier: Pfam:PF30212
label: Kinetochore-binding protein 3
definition: >-
  This entry represents the kinetochore-binding domain found in KBP-3 and related proteins from nematodes. KBP-3 is a component of the Ndc80 complex and localises to kinetochores throughout mitosis. The protein is involved in the attachment of spindle microtubules to kinetochores and begins to localise to chromosomes during prophase, persisting until the end of mitosis. The domain is essential for kinetochore function during cell division.
