identifier: Pfam:PF12436
label: ICP0-binding domain of Ubiquitin-specific protease 7
definition: >-
  This domain is found in proteins of the peptidase C19 family, which contains ubiquitinyl hydrolases like ubiquitin carboxyl-terminal hydrolase 7 (USP7). This domain is one of two C-terminal domains on the much longer ubiquitin-specific proteases. It is found to interact with the herpesvirus 1 trans-acting transcriptional protein ICP0/VMW110.
