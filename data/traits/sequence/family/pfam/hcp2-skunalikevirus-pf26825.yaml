identifier: Pfam:PF26825
label: Skunalikevirus head completion protein 2
definition: >-
  This entry represents the Skunalikevirus head completion protein 2 family which is involved in the assembly and morphogenesis of viral capsids. It likely acts as a stopper within the head-tail connector, securing the viral DNA inside the capsid. Additionally, it serves as a docking platform for the attachment of the preassembled tail, facilitating the completion of the virion structure after genome packaging.
