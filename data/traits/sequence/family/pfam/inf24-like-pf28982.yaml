identifier: Pfam:PF28982
label: Infection structure-specific protein 24-like
definition: >-
  This entry represents a family of uncharacterised proteins found predominantly in rust fungi of the Pucciniaceae family, including INF24 from Uromyces appendiculatus, which is involved in the development of infection structures during plant colonisation. Members of this family show variable length but are predicted to adopt a helical bundle structure. The germ tube elongates across the leaf surface until it recognises a stomate, where physical stimuli induce differentiation to form infection structures. INF24 expression is induced by physical stimulus of an oil-collodion membrane.
