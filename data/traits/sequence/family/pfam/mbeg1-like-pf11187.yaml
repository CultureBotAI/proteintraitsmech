label: Mbeg1-like
definition: >-
  This family includes a group of uncharacterised proteins from bacteria. Recently, a member from Gemella sanguinis M325, Mbeg1 (for "microbiome bacteria effector gene") has been identified as the first example of this protein family being associated with a potential effector function in the human microbiome.
