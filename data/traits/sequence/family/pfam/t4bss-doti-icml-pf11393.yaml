identifier: Pfam:PF11393
label: Type-IV b secretion system, inner-membrane complex component
definition: >-
  This is a family of DotI/IcmL proteins of type IVb secretion systems, that reside in the inner-membrane. It carries a single transmembrane helix in the N-terminal conserved region, has an extra-periplasmic domain, and is conserved in all T4BSSs including I-type conjugation systems (TraM). DotI/IcmL (and DotJ) may form an inner membrane complex that associates with the core complex.
