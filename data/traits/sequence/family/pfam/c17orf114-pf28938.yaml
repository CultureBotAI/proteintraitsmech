identifier: Pfam:PF28938
label: Uncharacterised protein C17orf114
definition: >-
  This entry represents a family of small uncharacterised proteins found in vertebrates, exemplified by human C17orf114. The proteins are typically 79-87 amino acids in length and contain a central disordered region (approximately residues 20-52 in the human protein). C17orf114 shows tissue-enhanced expression in brain according to the Human Protein Atlas. The function of this protein family remains to be determined.
