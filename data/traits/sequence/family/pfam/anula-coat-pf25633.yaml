identifier: Pfam:PF25633
label: Anulavirus coat protein
definition: >-
  The Anulavirus capsid protein family is involved in the formation of a quasi-spherical capsid structure, typically ranging from 25 to 35 nanometers in diameter. This structural protein self-assembles to create the protective shell of a virus, which encases the viral genome. The capsid plays a crucial role in the viral life cycle by protecting the genetic material from degradation and aiding in the delivery of the viral genome into host cells during infection.
