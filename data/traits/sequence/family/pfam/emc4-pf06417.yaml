identifier: Pfam:PF06417
label: ER membrane protein complex subunit 4
definition: >-
  This entry includes ER membrane protein complex subunit 4 (EMC4, also known as TMEM85 in mammals) from animals and its orthologue Emc4 from budding yeasts. They inhibit hydrogen peroxide mediated cell death in yeast. Emc4 is part of the ER membrane complex (EMC) that enables the energy-independent insertion into endoplasmic reticulum membranes of newly synthesized membrane proteins.
