identifier: Pfam:PF01755
label: Glycosyltransferase family 25 (LPS biosynthesis protein)
definition: >-
  The biosynthesis of disaccharides, oligosaccharides and polysaccharides involves the action of hundreds of different glycosyltransferases. These enzymes catalyse the transfer of sugar moieties from activated donor molecules to specific acceptor molecules, forming glycosidic bonds. A classification of glycosyltransferases using nucleotide diphospho-sugar, nucleotide monophospho-sugar and sugar phosphates ([ec:2.4.1.-]) and related proteins into distinct sequence-based families has been described. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. The same three-dimensional fold is expected to occur within each of the families. Because 3-D structures are better conserved than sequences, several of the families defined on the basis of sequence similarities may have similar 3-D structures and therefore form 'clans'. Glycosyltransferase family 25 ( ) comprises enzymes with primary function in bacterial lipopolysaccharide biosynthesis. These enzymes catalyse the transfer of various sugars onto the growing lipopolysaccharide chain during its biosynthesis. Some members such as UDP-Glc:hydroxylysine O-glucosyltransferase and occidiofungin β-xylosyltransferase participate in other glycan modifications.
