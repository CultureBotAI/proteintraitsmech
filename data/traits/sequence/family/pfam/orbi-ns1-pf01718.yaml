identifier: Pfam:PF01718
label: Orbivirus non-structural protein NS1, or hydrophobic tubular protein
definition: >-
  This family consists of orbivirus non-structural protein NS1, or hydrophobic tubular protein. NS1 has no specific function in virus replication, it is however thought to play a role in transport of mature virus particles from virus inclusion bodies to the cell membrane. Orbivirus are part of the larger reoviridae which have a dsRNA genome of at least 10 segments encoding at least 10 viral proteins; orbivirus found in this family include Bluetongue virus, and African horsesickness virus.
