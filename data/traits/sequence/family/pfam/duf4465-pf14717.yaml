identifier: Pfam:PF14717
label: Domain of unknown function (DUF4465)
definition: >-
  This entry represents a large family of uncharacterised proteins mostly from human gut bacteroides, but also some environmental and water bacteria (Planctomycetes), as well as metagenomic samples. Most proteins from this family are secreted or located on the outer surface, and may participate in cell-cell interactions or cell-nutrient interactions. This function is supported by a solved structure of a Bacteroides ovatus homologue, which adopts a galactose binding (jelly-roll) β barrel structure.
