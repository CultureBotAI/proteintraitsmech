identifier: Pfam:PF05460
label: Origin recognition complex subunit 6 (ORC6)
definition: >-
  This entry represents the first cyclin-like domain of ORC6, a protein that directs DNA replication by binding to replication origins and is also involved in transcriptional silencing; interacts with Spp1 and with trimethylated histone H3; phosphorylated by Cdc28. The Origin Recognition Complex (ORC) is a six-subunit ATP-dependent DNA-binding complex encoded by ORC1-6. ORC is a central component for eukaryotic DNA replication, and binds chromatin at replication origins throughout the cell cycle. ORC directs DNA replication throughout the genome and is required for its initiation. ORC bound at replication origins serves as the foundation for assembly of the pre-replicative complex (pre-RC), which includes Cdc6, Tah11 (aka Cdt1), and the Mcm2-7 complex. Pre-RC assembly during G1 is required for replication licensing of chromosomes prior to DNA synthesis during S phase. Cell cycle-regulated phosphorylation of ORC2, ORC6, Cdc6, and MCM by the cyclin-dependent protein kinase Cdc28 regulates initiation of DNA replication, including blocking reinitiation in G2/M phase. In yeast, ORC also plays a role in the establishment of silencing at the mating-type loci Hidden MAT Left (HML) and Hidden MAT Right (HMR). ORC participates in the assembly of transcriptionally silent chromatin at HML and HMR by recruiting the Sir1 silencing protein to the HML and HMR silencers.
