identifier: Pfam:PF15458
label: Nineteen complex-related protein 2
definition: >-
  This entry represents the pre-mRNA-splicing factor Ntr2. In Saccharomyces cerevisiae, Ntr1 and Ntr2 (nineTeen complex-Related proteins) formed a stable complex with DExD/H-box RNA helicase Prp43, which is involved in disassembly of the spliceosome and release of the excised intron in its branched, lariat form. Ntr1 is required for the association of Prp43 with the excised intron complex prior to its release and recycling of the splicing factors. Ntr2 can associate with late splicing complexes independently of Ntr1 but is not by itself sufficient to activate the intron release function of Prp43.
