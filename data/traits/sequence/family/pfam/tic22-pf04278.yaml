identifier: Pfam:PF04278
label: Tic22-like family
definition: >-
  Chloroplast function requires the import of nuclear encoded proteins from the cytoplasm across the chloroplast double membrane. This is accompished by two protein complexes, the Toc complex located at the outer membrane and the Tic complex loacted at the inner membrane. The Toc complex recognises specific proteins by a cleavable N-terminal sequence and is primarily responsible for translocation through the outer membrane, while the Tic complex translocates the protein through the inner membrane. This entry represents Tic22, a core member of the Tic complex. Tic22 is a soluble protein and the only Tic complex component of the intermembrane space that has been shown to interact with preproteins during import. It may also act as a chaperone that prevent misfolding or missorting of the preprotein to the intermembrane space and potentially serve as a component that links the Toc and Tic complexes.
