identifier: Pfam:PF26315
label: HSGNPxU motif selenoprotein TsoX
definition: >-
  This entry represents a small group of short bacterial selenoproteins with a UxxC selenocysteine-containing motif immediately preceded by a signature motif HSGNPX. Most members contain selenocysteine. At least five members are fusion proteins with a C-terminal thioredoxin-disulfide reductase region ( ). Members of this family are given the gene symbol TsoX (Three Selenoprotein Operon protein X), as it occasionally occurs in the same operon as selenoproteins TsoA, TsoB, and TsoC.
