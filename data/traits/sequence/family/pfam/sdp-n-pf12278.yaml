identifier: Pfam:PF12278
label: Sex determination protein N terminal
definition: >-
  This entry represents the N-terminal end of the sex determination protein. Sex determination proteins are found in eukaryotes. Proteins in this family are typically between 168 and 410 amino acids in length. It plays a role in the gender determination of around 20% of all animals. In the honeybee, the mechanism of sex determination depends on the complementary sex determiner (csd) gene which produces an SR-type protein. Males are hemizygous (haploid) or homozygous for csd alleles while females are heterozygous (diploid). Heterozygosity generates an active protein which initiates female development. When the csd gene is heterozygous, it activates the feminizer gene (fem) by directing the splicing to form female fem mRNAs, which encode the Fem protein. This leads to female development. In contrast, hemizygous or homozygous csd genes are non-active, resulting in male-specific splicing of fem mRNAs.
