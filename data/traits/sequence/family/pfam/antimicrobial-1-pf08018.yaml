identifier: Pfam:PF08018
label: 'Frog antimicrobial peptide '
definition: >-
  This family includes antimicrobial peptides secreted from skins of frogs. The secretion of antimicrobial peptides from the skins of frogs plays an important role in self defence. Structural analysis of these peptides showed that they can be classified into eight families. This is the brevinin-1 family, which includes brevinin-1 but excludes brevinin-2. It also includes lividin-1, Ranalexin, Gaegurin-5 and -6, Jingdongin-1 and Ranatuerin-4. This domain is found associated with the domain , which contains a signal peptide [ [.
