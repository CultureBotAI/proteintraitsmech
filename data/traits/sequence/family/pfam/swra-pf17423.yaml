identifier: Pfam:PF17423
label: Swarming motility protein
definition: >-
  SwrA is a transcription factor involved in swarming motility (a multicellular movement of hyper-flagellated cells on a surface). It acts synergistically with DegU to drive the fla/che operon encoding flagella components, chemotaxis constituents and the alternative sigma factor sigmaD, which is regarded as the primary event in the development of motility. LonA protease of Bacillus subtilis inhibits SwrA by proteolytically restricting its accumulation. SwrA does not contain any known DNA binding domain, and it has been shown to interact with the N-terminal domain of DegU. Anecdotally, in most laboratory strains, e.g. 168, the swrA coding sequence contains a nucleotide insertion that prematurely interrupts its reading frame, causing a non-swarming phenotype strain.
