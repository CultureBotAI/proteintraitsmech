identifier: Pfam:PF31141
label: Chloroplast protein ycf73
definition: >-
  This entry represents the ycf73 family, a group of uncharacterised proteins encoded in the chloroplast genome of grasses (Poaceae). The proteins are approximately 170-250 amino acids in length and are localised to the chloroplast. Members are found predominantly in the BOP clade (Bambusoideae, Oryzoideae, Pooideae) and PACMAD clade (Panicoideae, Arundinoideae, Chloridoideae, Micrairoideae, Aristidoideae, Danthonioideae) of the Poaceae. The function of this protein family remains to be determined.
