identifier: Pfam:PF09546
label: Stage III sporulation protein AE (spore_III_AE)
definition: >-
  This entry represents the stage III sporulation protein AE, which is encoded in a spore formation operon spoIIIAABCDEFGH under the control of sigma G. A comparative genome analysis of all sequenced genomes of Firmicutes shows that the proteins are strictly conserved among the sub-set of endospore-forming species.
