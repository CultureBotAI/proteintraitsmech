identifier: Pfam:PF11592
label: Central core of the bacterial effector protein AvrPto
definition: >-
  This entry represents the bacterial effector protein AvrPto, from Pseudomonas syringae and in particular the central core region of the protein that consists of a three-helix bundle motif. AvrPto is part of a type III secretion system from P.syringae which is involved in the bacterial speck disease of tomato. In resistant plants, AvrPto interacts with the host Pto kinase, which elicits an antibacterial defence response. In plants lacking resistance, the Pto kinase is not present and AvrPto acts as a virulence factor, promoting bacterial growth.
