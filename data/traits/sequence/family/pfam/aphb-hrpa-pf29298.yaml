identifier: Pfam:PF29298
label: HrpA N-terminal alpha helical hairpin binding domain
definition: >-
  This entry represents the N-terminal domain of bacterial DEAH/RHA-type RNA helicase HrpA, referred to as the APHB (antiparallel helix-bundle) domain. The domain comprises three closely packed α-helices (α1, α2, α3) that form an antiparallel helical bundle, with spatial conformation reinforced by hydrogen bonds between the helices and residues from the RecA1 domain. The APHB domain functions as a nucleic acid-binding domain that binds to both single-stranded DNA and single-stranded RNA, with a pronounced preference for ssRNA. It exhibits sequence-dependent binding, showing selectivity for guanine and cytosine bases in ssDNA. The domain is crucial for binding to non-canonical DNA structures, including G-quadruplex and i-motif structures. Structural studies have revealed the first i-motif-helicase complex, demonstrating that APHB domains from two HrpA molecules embrace the i-motif structure within a positively charged pocket. The APHB domain contributes to both ATPase activity and helicase function. Whilst the helicase core is essential for unwinding RNA/RNA and RNA/DNA duplexes, the N-terminal APHB domain is crucial for efficient unwinding activity. Truncation of APHB leads to significantly reduced binding affinity for nucleic acid substrates and compromised unwinding activity, demonstrating that the N-terminal and C-terminal domains cooperatively regulate HrpA function. HrpA is involved in modulating bacterial virulence and antibiotic susceptibility in species such as Escherichia coli, Borrelia burgdorferi, and other pathogenic bacteria.
