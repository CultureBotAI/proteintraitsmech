identifier: Pfam:PF14462
label: Prokaryotic E2 family E
definition: >-
  This entry represents the family E of the E2/UBC superfamily of proteins found in diverse bacteria. Analysis of the active site residues suggest that members of this family are inactive as they lack the characteristic catalytic residues of the E2 enzymes. They are usually fused to or in the neighbourhood of a multi/poly ubiquitin domain protein. Other proteins of the ubiquitin modification pathway such as the E1 and JAB proteins are also found in its gene neighbourhood along with a distinct predicted metal-binding protein.
