identifier: Pfam:PF05691
label: Raffinose synthase or seed imbibition protein Sip1
definition: >-
  This family consists of several galactinol-sucrose galactosyltransferase proteins, also known as raffinose synthases, which is a widespread oligosaccharide in plant seeds and other tissues. Raffinose synthase ( ) is the key enzyme that channels sucrose into the raffinose oligosaccharide pathway. Raffinose family oligosaccharides (RFOs) are ubiquitous in plant seeds and are thought to play critical roles in the acquisition of tolerance to desiccation and seed longevity. Raffinose synthases are alkaline alpha-galactosidases and are solely responsible for RFO breakdown in germinating maize seeds, whereas acidic galactosidases appear to have other functions. Glycoside hydrolase family 36 can be split into 11 families, GH36A to GH36K. This family includes enzymes from GH36C.
