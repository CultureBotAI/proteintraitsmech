identifier: Pfam:PF15534
label: Bacterial toxin 35
definition: >-
  Prokaryotic polymorphic toxin systems are implicated in intra-specific conflicts. They are characterised by a remarkable diversity of C-terminal toxin domains generated by recombination with standalone toxin-coding cassettes. This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems that is proposed to adopt the BECR (Barnase-EndoU-ColicinE5/D-RelE) fold, and contains a conserved histidine residue and a KH motif. In bacterial polymorphic toxin systems, the toxin is usually exported by the type 2 secretion system.
