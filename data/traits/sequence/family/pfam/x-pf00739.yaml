identifier: Pfam:PF00739
label: Trans-activation protein X
definition: >-
  The Hepatitis B virus (HBV) X gene shares sequences with both the polymerase and precore genes, carries several regulatory signals critical to the replicative cycle, and its product has a transactivating function. The transactivating function is probably associated with a tumourigenic potential of HBx, since x gene sequences, encoding functional HBx, have been repeatedly found integrated into the genome of liver carcinoma cells.
