identifier: Pfam:PF07021
label: Methionine biosynthesis protein MetW
definition: >-
  This family consists of several bacterial and one archaeal methionine biosynthesis MetW proteins. Biosynthesis of methionine from homoserine in Pseudomonas putida takes place in three steps. The first step is the acylation of homoserine to yield an acyl-L-homoserine. This reaction is catalysed by the products of the metXW genes and is equivalent to the first step in enterobacteria, Gram-positive bacteria and fungi, except that in these microorganisms the reaction is catalysed by a single polypeptide (the product of the metA gene in Escherichia coli and the met5 gene product in Neurospora crassa). In P. putida, as in Gram-positive bacteria and certain fungi, the second and third steps are a direct sulphydrylation that converts the O-acyl-L-homoserine into homocysteine and further methylation to yield methionine. The latter reaction can be mediated by either of the two methionine synthetases present in the cells. MetW from P. aeruginosa activates the enzymatic activity of MetX and is essential for the feedback inhibition by S-adenosyl-L-homocysteine (SAH), which suggests that MetW is a regulatory protein of MetX.
