identifier: Pfam:PF17112
label: Mitochondrial import receptor subunit Tom6, fungal
definition: >-
  Translocation of preproteins across the mitochondrial outer membrane is mediated by the translocase of the outer mitochondrial membrane (TOM) complex. Tom6 and Tom7, two small subunits of the TOM core are in direct contact with the major component of the pore, Tom40. In addition, Tom6 interacts with Tom22 in a manner that depends on the presence of preproteins in transit.
