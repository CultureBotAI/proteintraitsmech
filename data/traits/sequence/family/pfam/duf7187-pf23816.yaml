identifier: Pfam:PF23816
label: Family of unknown function (DUF7187)
definition: >-
  This entry represents a family of small proteins of around 60 residues found in Omarvirus and related bacteriophages that infect Streptomyces species. The function of this protein family is currently unknown. Homologous proteins are also found in a small number of Streptomyces genomes. The AlphaFold model of shows a pair of α helices at the C terminus of the protein.
