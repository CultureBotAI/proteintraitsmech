identifier: Pfam:PF21190
label: Bbp16
definition: >-
  This protein family includes Bbp16 from Bordetella phage BPP-1 and similar proteins from tailed bacteriophages and prophages, mainly found in proteobacteria. Bbp16, which adopts a dimeric configuration, is essential for forming infectious phage particles. This cement protein has a jelly roll fold with two β-sheets, each consisting of four antiparallel strands.
