identifier: Pfam:PF28838
label: DIA1
definition: >-
  This entry represents the DIA1 family of proteins found in yeasts. The family is named after DIA1 (Digs into agar protein 1) from Saccharomyces cerevisiae, which is involved in the regulation of invasive growth. DIA1 is a cytoplasmic protein that functions in the invasive growth response to glucose limitation. The family includes several uncharacterised proteins from related yeast species including YER186C, YNL165W and YOR385W from S. cerevisiae.
