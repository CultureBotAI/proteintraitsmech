identifier: Pfam:PF24274
label: T2SS substrate NttE
definition: >-
  This entry represents the type II secretion system substrate NttE from Legionella pneumophila ( ) and related proteins found mainly in Legionellales species. NttE structure is composed of two intertwined α/β domains, each of which consists of an antiparallel β-sheet and α-helices packed on it. This protein forms stable dimers and the dimer interface is contributed by the C-terminal domain. The N-terminal domain of NttE is mobile which is likely essential for its function in modifying the bacterial cell surface and/or during intracellular infection.
