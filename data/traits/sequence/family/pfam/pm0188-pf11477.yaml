identifier: Pfam:PF11477
label: Sialyltransferase PMO188
definition: >-
  PMO188 (also known as Alpha-2,3-sialyltransferase/sialidase) is a sialyltransferase from P.multocida. It transfers sialic acid from cytidine 5'-monophosphonuraminic acid to an acceptor sugar. It has important catalytic residues such as Asp141, His311, Glu338, Ser355 and Ser356. Beta-galactoside alpha2,6-sialyltransferase from Photobacterium damselae is also included in this entry. It is involved in glycan metabolism. In vitro, it catalyses the transfer of sialic acid (N-acetyl-neuraminic acid; Neu5Ac) from the nucleotide sugar donor CMP-Neu5Ac onto acceptor galactosides through an alpha2,6 linkage. In host-pathogen interactions may produce molecular mimics of host sialo-glycans or modify them to evade the host immune system and enhance bacterial virulence.
