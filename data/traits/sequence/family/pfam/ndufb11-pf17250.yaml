identifier: Pfam:PF17250
label: NADH-ubiquinone oxidoreductase 11 kDa subunit
definition: >-
  Complex I of the respiratory chain is a proton-pumping NADH ubiquinone oxidoreductase that oxidises NADH in the electron transport pathway. Plants contain the series of 14 highly conserved complex I subunits found in other eukaryotic and related prokaryotic enzymes.
