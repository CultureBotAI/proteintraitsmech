identifier: Pfam:PF17317
label: Mating hormone A-factor 1&2
definition: >-
  In budding yeasts, the mating hormone active factor is excreted into the culture medium by haploid cells of the A mating type and acts on cells of the opposite mating type (type alpha). It mediates the conjugation process between the two types by inhibiting the initiation of DNA synthesis in type alpha cells and synchronizing them with type A. Mfa1 and Mfa2 are precursors of 36 and 38 amino acids, respectively. They have a single amino acid residue difference: Mfa1 contains a valine instead of the leucine in Mfa2 at position 6 of the mature a-factor.
