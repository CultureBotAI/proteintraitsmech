identifier: Pfam:PF15895
label: CAAX box cerebral protein 1
definition: >-
  CAAX box protein 1 (CAAX1, FAM127A) is found in primates. CAAX refers to the highly characteristic C-terminal residues, a cysteine and two aliphatic residues followed by any residue, a C-terminal tetrapeptide recognition motif called the Ca1a2X box. This motif on substrates is recognised by prenyltransferases that then attach an isoprenoid lipid (a process termed prenylation), one of the many post-translational modifications that occur in cells. The function of the prenylated protein is not known.
