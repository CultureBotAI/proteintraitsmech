identifier: Pfam:PF21529
label: Gloven 1/2
definition: >-
  This entry represents a group of plant proteins, including GLV1 and GLV2 (also known as RGF9) from Arabidopsis. GLV2 is a signalling peptide (root growth factor) that regulates the pattern of root growth and lateral root development by modulating the length and the number of cortical cells in the root apical meristem (RAM), and the anticlinal asymmetric cell divisions in lateral root initiation cells. It is also involved in the regulation of hypocotyl bending and root gravitropism, probably by influencing the formation of auxin gradients. In general, RGFs are required for maintenance of the root stem cell niche and transit amplifying cell proliferation in Arabidopsis.
