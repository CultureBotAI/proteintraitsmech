identifier: Pfam:PF07328
label: T-DNA border endonuclease VirD1
definition: >-
  This family consists of several T-DNA border endonuclease VirD1 proteins, which appear to be found exclusively in Agrobacterium species. Agrobacterium, a plant pathogen, is capable to stably transform the plant cell with a segment of its own DNA called T-DNA (transferred DNA). This process depends, among others, on the specialised bacterial virulence proteins VirD1 and VirD2 that excise the T-DNA from its adjacent sequences. VirD1 is thought to interact with VirD2 in this process.
