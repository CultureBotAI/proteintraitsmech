identifier: Pfam:PF10048
label: BufA1 family periplasmic bufferin-type metallophore
definition: >-
  BufA1 family periplasmic bufferin-type metallophore belongs to a family of ribosomally synthesised and post-translationally modified peptide (RiPP) precursors that are modified by multinuclear nonheme iron-dependent oxidase (MNIO) enzymes. Unusual among RiPPs, these peptides have a Sec-dependent N-terminal signal peptide, and are delivered to the periplasm. Members of this family act as metallophores, analogous to methanobactin, can be induced by stress from excess concentrations of copper or other metals, reduce metal toxicity by sequestration, and are termed bufferins.
