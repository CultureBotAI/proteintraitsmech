identifier: Pfam:PF02616
label: Segregation and condensation protein ScpA
definition: >-
  This family represents ScpA, which along with ScpB ( ) interacts with SMC in vivo forming a complex that is required for chromosome condensation and segregation. The SMC-Scp complex appears to be similar to the MukB-MukE-Muk-F complex in Escherichia coli, where MukB ( ) is the homologue of SMC. ScpA and ScpB have little sequence similarity to MukE ( ) or MukF ( ), they are predicted to be structurally similar, being predominantly α-helical with coiled coil regions.
