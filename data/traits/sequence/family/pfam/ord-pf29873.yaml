identifier: Pfam:PF29873
label: Protein ORD
definition: >-
  This entry represents the ORD (Orientation disrupter) protein family found in Diptera. ORD is essential for proper maintenance of sister-chromatid cohesion in both male and female meiosis. The protein is required for chiasma maintenance in female meiosis and mutations reduce recombination frequency. ORD localises to the nucleus and associates with chromosomes and centromeres during meiosis. The protein assembles onto chromosomes in late G2 and remains at centromeres through meiosis I until sister chromatid separation at anaphase II. ORD interacts with Sce protein and is crucial for proper chromosome segregation during meiotic divisions.
