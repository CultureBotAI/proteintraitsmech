identifier: Pfam:PF29578
label: Jumbo bacteriophage sigma-like promoter specificity subunit
definition: >-
  This entry represents the promoter specificity subunit (gp226 in Bacillus phage AR9) of the non-virion RNA polymerase (nvRNAP) found in jumbo bacteriophages. These phages encode two distinct multisubunit DNA-dependent RNA polymerases, with the nvRNAP responsible for late gene transcription. The protein consists of an N-terminal domain and C-terminal domain connected by a linker. Despite showing only approximately 10% sequence identity to bacterial sigma factors, the protein displays structural similarity to sigma-2 and sigma-4 elements and functions analogously to confer promoter-specific transcription. The AR9 nvRNAP recognises promoters in the template strand of double-stranded DNA with the consensus 3'-UUGU-N6-AU-5', where the first uracil is at position -11 and the final adenine is at the transcription start site. This subunit forms two nucleotide base-accepting pockets in conjunction with the nvRNAP core enzyme that specifically recognise the conserved deoxyuridines within the promoter. A single valine residue (V206 in AR9 gp226) is critical for discriminating uracil from thymine, with substitution to glycine allowing thymine recognition. Orthologues are found in other jumbo phages that contain uracil in their genomic DNA.
