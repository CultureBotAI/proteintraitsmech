identifier: Pfam:PF11740
label: Plasmid replication region DNA-binding N-term
definition: >-
  The KfrA family of proteins are encoded on plasmids, generally in or near gene clusters involved in stable inheritance functions. These proteins are thought to form an all-helical structure, consisting of an N-terminal helix-turn-helix DNA binding domain and an extended coiled-coil tail. The best-characterised KfrA protein, encoded on the broad host-range Plasmid RK2, is a site-specific DNA-binding protein whose operator overlaps its own promoter. The DNA-binding domain is essential for function, while the coiled-coil domain is probably responsible for formation of multimers, and may provide an example of a bridge to host structures required for plasmid partitioning. This entry represents the N-terminal DNA-binding domain.
