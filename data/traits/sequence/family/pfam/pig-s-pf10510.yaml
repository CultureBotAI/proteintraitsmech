identifier: Pfam:PF10510
label: Phosphatidylinositol-glycan biosynthesis class S protein
definition: >-
  Phosphatidylinositol-glycan biosynthesis class S protein (PIG-S, also known as Gpi17 in budding yeasts) is one of several key, core components of the glycosylphosphatidylinositol (GPI) trans-amidase complex that adds GPIs to newly synthesized proteins. Mammalian GPI transamidase consists of at least five components: Gaa1, Gpi8, PIG-S, PIG-T, and PIG-U, all five of which are required for its function. It is possible that Gaa1, Gpi8, PIG-S, and PIG-T form a tightly associated core that is only weakly associated with PIG-U.
