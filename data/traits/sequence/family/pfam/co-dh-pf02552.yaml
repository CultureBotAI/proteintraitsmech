identifier: Pfam:PF02552
label: CO dehydrogenase beta subunit/acetyl-CoA synthase epsilon subunit
definition: >-
  The ACDS complex contains five subunits, among which beta possesses an Ni-Fe-S active-site metal cluster, the A-cluster, at which reaction with acetyl-CoA takes place, generating an acetyl-enzyme species poised for C-C bond cleavage. The ACDS complex is made up of alpha, epsilon, beta, gamma and delta chains with a probable stoichiometry of (alpha(2)epsilon(2))(4)-beta(8)-(gamma(1)delta(1))(8). This entry represents the epsilon subunit. Acetyl-CoA decarbonylase/synthase (ACDS) is a 5-subunit-containing multienzyme complex found exclusively in methanogens and certain other Archaea. ACDS catalyses the central reaction of acetyl C-C bond cleavage in methanogens growing on acetate and is also responsible for synthesis of acetyl units during growth on C-1 substrates.
