identifier: Pfam:PF09681
label: N-terminal phage replisome organiser (Phage_rep_org_N)
definition: >-
  This entry represents the N-terminal domain of a small family of phage proteins. The proteins in this group contain a region of low-complexity sequence that reflects DNA direct repeats able to function as an origin of phage replication. The low-complexity region is adjacent to this N-terminal domain.
