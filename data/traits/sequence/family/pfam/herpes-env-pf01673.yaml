identifier: Pfam:PF01673
label: Herpesvirus putative major envelope glycoprotein
definition: >-
  This family consists of Packaging protein UL32 from herpesviridae including Human herpesvirus 1 (HHV-1), Human cytomegalovirus (HHV-5) and Human herpesvirus 3 (HHV-3). Members of the herpesviridae have a dsDNA genome and do not have an RNA stage during their replication. Packaging protein UL32 plays a role in the efficient localization of newly synthesized capsids to nuclear replication compartments, thereby controlling the cleavage and packaging of viral genomic DNA. Through this activity, UL32 facilitates the transfer of newly replicated viral genomes to the packaging motor.
