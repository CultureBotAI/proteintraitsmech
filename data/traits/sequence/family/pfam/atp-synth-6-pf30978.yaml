identifier: Pfam:PF30978
label: Mitochondrial ATP synthase 6 kDa subunit
definition: >-
  This family of proteins is involved in the synthesis of ATP via the mitochondrial membrane ATP synthase, also known as Complex V. These proteins are part of the F(0) domain of the enzyme, which is responsible for proton translocation across the membrane. The proton gradient required for this process is established by the respiratory chain's electron transport complexes. The ATP synthesis occurs in the F(1) catalytic domain and is mechanically coupled to proton translocation through a rotary mechanism of the central stalk subunits. Members of this family are also implicated in conferring tolerance to various abiotic stresses, likely by ensuring cellular energy homeostasis under such conditions.
