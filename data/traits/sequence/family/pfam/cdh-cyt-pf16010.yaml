identifier: Pfam:PF16010
label: Cytochrome domain of cellobiose dehydrogenase
definition: >-
  Cellobiose dehydrogenase (CHD; ) is found in a variety of fungi, including white rot, brown rot and plant pathogen fungi. The enzyme is extracellular flavocytochrome that degrades both cellulose and lignin. Specifically, CDHs oxidize cellobiose, cellodextrins, and lactose to corresponding lactones, utilizing a variety of electron acceptors. It acts as a monomer consisting of two domains: a cytochrome domain containing a b-type haem, which is linked through a peptide linker to a large flavodehydrogenase domain containing FAD as a cofactor. This entry represents the b-type cytochrome domain found at the N-terminal of these enzymes, that belongs to the DOMON domain superfamily, a ligand-interacting motif found in all three kingdoms of life. This domain assumes a β-sandwich fold consisting of 7 or 8 β-strands in 2 sheets with a Greek key topology; the haem iron is ligated by a Met/His couple and is docked at the exterior of the enzyme. This entry also includes Pyrroloquinoline quinone-dependent pyranose dehydrogenase (PDH), which exhibits amino acid sequence homology with CDH.
