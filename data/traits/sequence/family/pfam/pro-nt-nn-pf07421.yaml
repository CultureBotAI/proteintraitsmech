identifier: Pfam:PF07421
label: Neurotensin/neuromedin N precursor
definition: >-
  Neurotensin is a 13-residue peptide transmitter, sharing significant similarity in its 6 C-terminal amino acid residues with several other neuropeptides, including neuromedin N (which is derived from the same precursor). This C-terminal region is responsible for the full biological activity, the N-terminal portion having a modulatory role. Neurotensin is distributed throughout the central nervous system, with highest levels in the hypothalamus, amygdala and nucleus accumbens. It induces a variety of effects, including: analgesia, hypothermia and increased locomotor activity. It is also involved in regulation of dopamine pathways. In the periphery, neurotensin is found in endocrine cells of the small intestine, where it leads to secretion and smooth muscle contraction. The neurotensin/neuromedin N precursor can also be processed to produce large 125-138 amino acid peptides with the neurotensin or neuromedin N sequence at their C terminus. These large peptides appear to be less potent than their smaller counterparts, but are also less sensitive to degradation and may represent endogenous, long-lasting activators in a number of pathophysiological situations.
