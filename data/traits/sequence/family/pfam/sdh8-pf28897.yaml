identifier: Pfam:PF28897
label: Succinate dehydrogenase subunit 8, mitochondrial
definition: >-
  This entry represents succinate dehydrogenase subunit 8 (SDH8), a plant-specific component of mitochondrial respiratory complex II. Complex II (succinate dehydrogenase) in plants contains eight subunits: the four classical SDH subunits (SDH1, SDH2, SDH3 and SDH4) plus four additional plant-specific subunits including SDH8. The classical subunits comprise a flavoprotein, an iron-sulphur protein, and a cytochrome b composed of large and small subunits. SDH8 is a small peripheral membrane protein localised to the mitochondrial inner membrane and is involved in the tricarboxylic acid cycle. This family is found exclusively in plants and represents one of the additional subunits that distinguish plant complex II from those found in bacteria and other eukaryotes. The protein is approximately 46-58 amino acids in length and has been experimentally characterised in Arabidopsis thaliana.
