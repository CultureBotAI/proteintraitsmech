identifier: Pfam:PF17137
label: Domain of unknown function (DUF5110)
definition: >-
  This domain is found C-terminal in some glycoside hydrolase family 31 proteins ( ). It adopts a β-sandwich fold and could be responsible for the stabilisation of the catalytic domain rather than for substrate binding, given that no interactions between this domain and the active-site pocket are observed in the proteins that are currently structurally characterised. In glucosidase II, this domain is involved in a network of interactions with the regulatory beta-subunit.
