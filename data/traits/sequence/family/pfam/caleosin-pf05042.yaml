identifier: Pfam:PF05042
label: Caleosin related protein
definition: >-
  Caleosins are a family of lipid-associated proteins that are ubiquitous in plants and true fungi. In plants, caleosinss are Ca(2+)-binding oil-body surface proteins. Later, caleosin was identified as a putative peroxygenase, which is involved in oxylipin metabolism during biotic and abiotic stress responses in Arabidopsis. The calcium binding domain is probably related to the calcium-binding EF-hands motif .
