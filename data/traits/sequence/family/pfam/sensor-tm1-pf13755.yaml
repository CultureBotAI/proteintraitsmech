identifier: Pfam:PF13755
label: Sensor N-terminal transmembrane domain
definition: >-
  This domain is found at the N terminus of the sensor component of the two-component regulatory system. It includes a transmembrane region and part of the periplasmic region, which is likely to be involved in stimulus sensing.
