identifier: Pfam:PF25727
label: Cytomegalovirus UL74A protein
definition: >-
  This entry represents the UL74A protein found in Human cytomegalovirus (HCMV). It is a small viral envelope protein of approximately 70 amino acids in length with a single transmembrane helix. The specific function of this protein remains to be determined, but it is localised to the virion membrane.
