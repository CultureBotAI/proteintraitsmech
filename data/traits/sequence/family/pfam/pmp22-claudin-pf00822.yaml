identifier: Pfam:PF00822
label: PMP-22/EMP/MP20/Claudin family
definition: >-
  This family of evolutionarily related integral membrane proteins includes PMP22, EMP, claudins and voltage-gated calcium channel gamma subunits, many of which perform diverse functions at specialised cell-cell contacts. Family members from vertebrates and invertebrates are highly divergent.
