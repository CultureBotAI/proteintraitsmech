identifier: Pfam:PF04595
label: Poxvirus I6-like family
definition: >-
  This entry represents a domain found in 36 kDa major membrane protein F5 and Telomere-binding protein I6 from Vaccinia virus, and similar sequences from poxvirus. F5, also named Protein OPG049, plays a role in the spread of virus to neighbouring cells ex vivo. I6, also known as Telomere-binding protein OPG082, binds tightly and with great specificity to the hairpin form of the viral telomeric sequence. This telomere binding protein is thought to play a role in the initiation of vaccinia virus genome replication and/or genome encapsidation.
