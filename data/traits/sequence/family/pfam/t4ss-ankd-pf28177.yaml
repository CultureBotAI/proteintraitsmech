label: Dot/Icm T4SS effector AnkD/LegA15
definition: >-
  This entry represents a group of proteins from Legionellales, including the ankyrin repeat-containing protein LegA15 (AnkD, ) from Legionella pneumophila, which shows structural similarity to another effector, LegA3/AnkH ( ). This protein contains a cysteine protease-like (CPL) domain with similarity to ubiquitin-like hydrolases.
