identifier: Pfam:PF24806
label: Family of unknown function (DUF7706)
definition: >-
  This entry represents an uncharacterised family of bacterial proteins. Structure prediction ( , AF3 iPTM=0.93) suggests that these proteins form dimers. The monomer is composed of three α helices. STRING provides some weak evidence that these proteins may be immunity proteins or perhaps part of a plasmid addiction system.
