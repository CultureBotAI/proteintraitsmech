identifier: Pfam:PF29393
label: Family of unknown function (DUF8542)
definition: >-
  This entry represents a family of proteins of approximately 320-330 amino acids found exclusively in tailed bacteriophages. The family is restricted to the class Caudoviricetes, particularly members of the family Demerecviridae. Within this family, the proteins are found in the genera Tequintavirus and Epseptimavirus. The function of these proteins remains to be determined.
