identifier: Pfam:PF06252
label: Bacteriophage Mu, GemA protein
definition: >-
  This family consists of several bacterial and phage proteins, including GemA (also known as gp16) protein from Bacteriophage Mu. GemA is an early protein responsible for decreasing host DNA gyrase activity, that promotes DNA relaxation of bacterial host genome. Modulates the expression of various host genes probably controlled by supercoiling of their promoters. Host genes affected include DNA replication and cell division determinants. This family also includes the Mu-like prophage FluMu protein gp16 from Haemophilus influenzae.
