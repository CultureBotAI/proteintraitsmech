identifier: Pfam:PF10731
label: Thrombin inhibitor from mosquito
definition: >-
  This family represents Salivary thrombin inhibitor anophelin from Anopheles albimanus and similar proteins from insects. AT is a salivary protein with anticoagulant activity that inhibits host thrombin (F2), the peptidase that is at the end of the blood coagulation cascade and which creates the clot by cleaving fibrinogen. The interaction between thrombin and fibrinogen involves two different areas of contact - via the thrombin active site and via a second substrate-binding site known as an exosite. The inhibitor acts by blocking the exosite, rather than by interacting with the active site. The inhibitors are from mosquitoes that feed on human blood and which, by inhibiting thrombin, prevent the blood from clotting and keep it flowing.
