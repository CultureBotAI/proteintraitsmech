identifier: Pfam:PF28120
label: Lmo0850-like
definition: >-
  This entry represents the uncharacterised protein Lmo0850 ( ) from Listeria monocytogenes and related proteins found in bacillales. The function of these proteins is unknown, but the sRNA LhrA sRNA regulates expression of Lmo0850 in L. monocytogenes by negatively regulating the stability of its mRNA. The regulation depends on Hfq and involves an antisense interaction.
