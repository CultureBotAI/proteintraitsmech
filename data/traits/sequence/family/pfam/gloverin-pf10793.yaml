identifier: Pfam:PF10793
label: 'Gloverin-like protein '
definition: >-
  This entry represents proteins that are Gloverin-like. Gloverin is a 13.8kDa inducible antibacterial insect protein which inhibits the synthesis of vital outer membrane proteins leading to a permeable outer membrane. Gloverin contains a large number of glycine residues.
