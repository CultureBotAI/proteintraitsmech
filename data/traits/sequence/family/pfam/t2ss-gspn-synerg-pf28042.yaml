identifier: Pfam:PF28042
label: Type II secretion system protein GspN-like, Synergistales
definition: >-
  This entry represents the GspN subunit of a rare variant form of type II secretion system (T2SS) found exclusively in the Synergistota, with the SYNERG-CTERM protein-sorting system. SYNERG-CTERM is a C-terminal sorting signal with an invariant Cys residue in its signature domain. The sorting enzyme for SYNERG-CTERM proteins, MrtS (myxosortase S), is a homologue of the MYXO-CTERM-processing enzyme MrtX and of the eukaryotic CAAX prenyl protease Rce1. SYNERG-CTERM proteins are predicted to become surface-anchored by a lipid group attached to a C-terminal Cys sidechain.
