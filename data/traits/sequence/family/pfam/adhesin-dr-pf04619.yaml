identifier: Pfam:PF04619
label: Dr-family adhesin
definition: >-
  The Afa/Dr family of adhesins bind to the Dr blood group antigen component of decay-accelerating factor. These proteins contain both fimbriated and afimbriated adherence structures and mediate adherence of uropathogenic Escherichia coli to the urinary tract, leading to urinary tract infections (UTIs) and pregnancy complications. They also confer the mannose-resistant hemagglutination (MHRA) phenotype, which can be inhibited by chloramphenicol. The N-terminal portion of the mature protein is thought to be responsible for chloramphenicol sensitivity. These proteins remain attached to host cells or collagen once bound even in the presence of elevated shear stress or of chloramphenicol, a competitive inhibitor of binding.
