identifier: Pfam:PF15952
label: Enhancer of split M4 family
definition: >-
  In Drosophila, the majority of Notch target genes known so far is located in the Enhancer of split complex (E(spl)-C), encoding small basic helix-loop-helix (bHLH) proteins that presumably act as transcriptional repressors. E(spl)-C contains three additional Notch responsive, non-bHLH genes: m4 and ma, which are structurally related, and m2. This entry represents the E(spl) m4 family, which act as antagonists of the Notch signal in the process of adult sensory organ precursor singularisation.
