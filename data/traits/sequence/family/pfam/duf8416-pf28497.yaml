identifier: Pfam:PF28497
label: Family of unknown function (DUF8416)
definition: >-
  This family represents an uncharacterised domain found in bacterial proteins from the Bacteroidota phylum, particularly in members of Flavobacteriaceae and Sphingobacteriaceae. The domain typically spans approximately 90-100 residues and is positioned between the TMEM260-like domain ( ) and the TMEM260_2 domain ( ) in the protein architecture. These proteins appear to be glycosyltransferases or related membrane proteins. The function of this domain remains to be determined.
