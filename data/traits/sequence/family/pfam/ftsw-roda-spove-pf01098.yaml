identifier: Pfam:PF01098
label: Cell cycle protein
definition: >-
  A number of prokaryotic integral membrane proteins involved in cell cycle processes have been found to be structurally related. These proteins include, the Escherichia coli and related bacteria cell division protein ftsW and the rod shape-determining protein rodA (or mrdB), the Bacillus subtilis stage V sporulation protein E (spoVE), the B. subtilis hypothetical proteins ywcF and ylaO and the Cyanophora paradoxa cyanelle ftsW homologue. They constitute the SEDS (shape, elongation, division and sporulation) family. SEDS proteins are thought to be peptidoglycan polymerases, functioning as cell wall synthases of the cell elongation and division machinery.
