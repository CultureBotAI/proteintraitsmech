identifier: Pfam:PF27008
label: Bacteriophage P7 repressor protein C1
definition: >-
  This entry represents repressor protein C1 found in P7-like bacteriophages. Repressor protein C1 is a sequence-specific DNA-binding protein required for the establishment and maintenance of lysogeny. The protein is 283 amino acids (32.5 kDa) and contains a helix-turn-helix DNA-binding motif (residues 30-49) and a disordered C-terminal region (residues 254-283). The protein shows structural similarity to the DNA replication terminus site-binding protein Tus protein. Repressor protein C1 is a sequence-specific DNA-binding protein which recognises the sequence 5'-ATTTATTAGAGCA[AT]T-3'. The binding of C1 to operator DNA is sensitive to N-ethylmaleimide.
