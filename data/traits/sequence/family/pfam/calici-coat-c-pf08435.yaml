identifier: Pfam:PF08435
label: Calicivirus coat protein C-terminal
definition: >-
  This is the calicivirus coat protein ( ) C-terminal region. Bovine calicivirus is a positive-stranded ssRNA viruses that cause gastroenteritis. The calicivirus genome contains two open reading frames, ORF1 and ORF2. ORF1 encodes a non-structural polypeptide, which has RNA helicase, cysteine protease and RNA polymerase activity. The regions of the poly-protein in which these activities lie are similar to proteins produced by the picornaviruses. ORF2 encodes a structural protein. This signature finds ORF2, the structural coat protein. Two different families of caliciviruses can be distinguished on the basis of sequence similarity, namely those classified as small round structured viruses (SRSVs) and those classed as non-SRSVs. Rabbit hemorrhagic disease virus (RHDV) which causes a highly contagious disease of wild and domestic rabbits belongs to the family Caliciviridae. The capsid protein self assembles to form an icosahedral capsid with a T=3 symmetry. It is about 38nm in diameter and consists of 180 capsid proteins. The capsid encapsulates the genomic RNA and VP2 proteins and attaches the virion to target cells by binding histo-blood group antigens present on gastroduodenal epithelial cells. The Shell domain (S domain) contains elements essential for the formation of the icosahedron. The Protruding domain (P domain) is divided into sub-domains P1 and P2. An hypervariable region in P2 is thought to play an important role in receptor binding and immune reactivity.
