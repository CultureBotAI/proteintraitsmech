identifier: Pfam:PF25655
label: Phi6 bacteriophage P8 capsid protein
definition: >-
  This entry represents the major outer capsid protein P8 from dsRNA bacteriophage phi6, which forms the T=13 shell of the nucleocapsid. The protein consists of two α-helical domains: an N-terminal peripheral domain and a C-terminal core domain, joined by a ~10-residue linker that allows the trimer to adopt either a closed or an open conformation. In the open conformation, the trimers swap domains with each other, allowing assembly of the outer shell. This domain-swapping is regulated by calcium concentration, which induces the transition of P8 from the closed to open conformation. The structure includes a proline residue (Pro93) that breaks a helix in the C-terminal domain and may play a role in modulating the equilibrium between open and closed states.
