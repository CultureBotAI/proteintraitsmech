label: Family of unknown function (DUF7714)
definition: >-
  This entry represents a group of uncharacterised prokaryotic proteins. They are likely to contain two domains that create a compact, elongated structure. Towards the C-terminal, these proteins have two highly conserved pairs of cysteines which are likely to be involved in metal coordination.
