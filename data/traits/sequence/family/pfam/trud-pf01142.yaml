identifier: Pfam:PF01142
label: tRNA pseudouridine synthase D (TruD)
definition: >-
  Pseudouridine synthase TruD modifies uracil-13 in tRNA. TruD belongs to a large family of pseudouridine synthases present in all kingdoms of life. It folds into a V-shaped molecule with an RNA-binding cleft formed between its two domains: a catalytic domain and an insertion domain. The catalytic domain differs in sequence but is structurally very similar to the catalytic domain of other pseudouridine synthases. The insertion (or TRUD) domain displays an α/β structure that forms a compact fold titled away from the catalytic domain to create a deep cleft in TruD which is lined with basic residues from each domain. The insertion domain is characterised by two conserved sequence motifs that form a part of the hydrophobic core, as well as by large insertions at several specific sites that are seen in many archaeal and eukaryotic homologues. The insertion domain is likely to be involved in substrate recognition and may represent a RNA binding module. Pseudouridine synthases catalyse the isomerisation of uridine to pseudouridine (Psi) in a variety of RNA molecules, and may function as RNA chaperones. Pseudouridine is the most abundant modified nucleotide found in all cellular RNAs. There are four distinct families of pseudouridine synthases that share no global sequence similarity, but which do share the same fold of their catalytic domain(s) and uracil-binding site and are descended from a common molecular ancestor. The catalytic domain consists of two subdomains, each of which has an α+β structure that has some similarity to the ferredoxin-like fold (note: some pseudouridine synthases contain additional domains). The active site is the most conserved structural region of the superfamily and is located between the two homologous domains. These families are: Pseudouridine syn…
