identifier: Pfam:PF14177
label: YkyB-like protein
definition: >-
  The YkyB-like protein family includes the B. subtilis YkyB protein , which is functionally uncharacterised. Proteins in this family are approximately 150 amino acids in length and contain two conserved sequence motifs: NRHAKTA and HLG.
