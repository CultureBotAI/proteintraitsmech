identifier: Pfam:PF12139
label: Adenosine-5'-phosphosulfate reductase beta subunit
definition: >-
  During dissimilatory sulphate reduction and sulphur oxidation, adenylylsulphate (APS) reductase catalyzes reversibly the two-electron reduction of APS to sulphite and AMP. Found in several bacterial lineages and in Archaeoglobales, APS reductase is a heterodimer composed of an alpha subunit containing a noncovalently bound FAD, and a beta subunit containing two [4Fe-4S] clusters. This entry describes the C-terminal domain of the beta subunit of APS reductase.
