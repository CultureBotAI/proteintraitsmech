identifier: Pfam:PF02405
label: Permease MlaE
definition: >-
  Intermembrane phospholipid transport system permease protein MlaE is a permease which in E. coli is a component of the Mla pathway, an ABC transport system that functions to maintain the asymmetry of the outer membrane. In it is involved in L-glutamate import into the cell. In it is involved in lipid transfer within the cell. Many bacterial species have one or two members from this family. The Mycobacteria have large paralogous families included in this entry.
