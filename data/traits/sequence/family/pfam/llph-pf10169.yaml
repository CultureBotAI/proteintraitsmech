identifier: Pfam:PF10169
label: LLP homolog
definition: >-
  This entry represents a family of LLP homolog (LLPH) animal proteins, including 18 kDa learning-associated protein of slug from Lehmannia marginata (LAPS18), which functions in the regulation of neuronal cell adhesion and/or movement and synapse attachment. It has been shown to bind to the ApC/EBP (Aplysia CCAAT/enhancer binding protein) promoter and activate the transcription of ApC/EBP mRNA. In mice hippocampal neurons, regulates dendritic and spine growth and synaptic transmission. In humans, LLPH plays a role in the ribosome biogenesis as one of the pre-60S assembly factors.
