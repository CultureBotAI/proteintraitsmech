identifier: Pfam:PF24387
label: Archaeo-eukaryotic primase 1D-like
definition: >-
  This entry represents a nucleotidyltransferase of the bacterial primase superfamily predicted to produce an oligo/cyclic nucleotide signal that activates the associated effectors in the associated prokaryotic antiviral immunity system. These proteins feature a single aspartate in the DXD active site.
