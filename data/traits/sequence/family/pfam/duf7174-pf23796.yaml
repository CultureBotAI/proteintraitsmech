identifier: Pfam:PF23796
label: Family of unknown function (DUF7174)
definition: >-
  This protein is found in caudoviruses, which are tailed bacteriophages. The protein is typically around 150-180 amino acids in length. Its function is currently unknown. It is found in viruses from the Drexlerviridae family, including Rogunavirinae, Braunvirinae, Tempevirinae, and Kyungwonvirus genera.
