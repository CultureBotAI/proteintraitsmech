identifier: Pfam:PF20657
label: Family of unknown function (DUF6811)
definition: >-
  This entry represents an uncharacterised protein family, these proteins are approximately 90 amino acids in length and are predominantly found in Deltaproteobacteria. The proteins that constitute this family contain four invariant Cys residues. They possess a number of conserved motifs including CxGC, PxxKW (for which the family is named after), CNxATH, and NP[LI]KASKR near the C terminus.
