identifier: Pfam:PF06983
label: 3-demethylubiquinone-9 3-methyltransferase
definition: >-
  The Escherichia coli phnB gene is found next to an operon of fourteen genes (phnC-to-phnP) related to the cleavage of carbon-phosphorus (C-P) bonds in unactivated alkylphosphonates, supporting bacterial growth on alkylphosphonates as the sole phosphorus source. It was originally considered part of that operon. PhnB appears to play no direct catalytic role in the usage of alkylphosphonate. PA2721, an uncharacterised protein from P. aeruginosa, also belongs to this family.
