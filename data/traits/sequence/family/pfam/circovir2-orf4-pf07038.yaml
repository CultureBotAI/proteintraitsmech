identifier: Pfam:PF07038
label: Circovirus 2, anti-apoptotic ORF4
definition: >-
  This family represents the anti-apoptotic ORF4 protein from Circovirus 2, which antagonises host cell apoptosis by interacting with host ferritin heavy chain (FHC). This protein physically binds host FHC, resulting in the reduction of FHC protein levels in host cells. The reduction of FHC concentration further inhibits the accumulation of reactive oxygen in host cells, leading to reduced apoptosis.
