identifier: Pfam:PF23809
label: Bacteriophage holin
definition: >-
  This entry represents a family of bacteriophage holin proteins. Holins are small membrane proteins that control the timing of host cell lysis during the phage lytic cycle. Holins typically have 2-4 transmembrane helices. The exact mechanism of how holins trigger cell lysis is not fully understood. The holin family is found in phages that infect actinobacteria, primarily mycobacteria and gordonia species.
