identifier: Pfam:PF04628
label: Sedlin
definition: >-
  Trafficking protein particle complex subunit 2, also known as Sedlin, is a 140 amino-acid protein with a putative role in endoplasmic reticulum-to-Golgi transport. Several missense mutations and deletion mutations in the SEDL gene, which result in protein truncation by frame shift, are responsible for spondyloepiphyseal dysplasia tarda, a progressive skeletal disorder.
