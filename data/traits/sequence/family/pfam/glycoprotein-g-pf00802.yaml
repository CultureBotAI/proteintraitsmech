identifier: Pfam:PF00802
label: Pneumovirus attachment glycoprotein G
definition: >-
  Respiratory synctial virus (RSV) has two major virion envelope proteins, the fusion F and major attachment G glycoproteins, which are the two viral neutralisation antigens. This entry represents the major surface glycoprotein G from RSV. G glycoprotein interacts with host CX3CR1, the receptor for the CX3C chemokine fractalkine, to modulate the immune response and facilitate infection. There are two versions of the G protein: the full length G protein (mG), which is anchored by a transmembrane domain near the N terminus; the secreted version (sG), which lacks the transmembrane domain due to an alternative initiation of translation. The secreted version-sG helps the virus evade antibody-mediated restriction of replication by acting as an antigen decoy.
