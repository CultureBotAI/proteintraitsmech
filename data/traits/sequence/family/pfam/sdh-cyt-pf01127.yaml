identifier: Pfam:PF01127
label: Succinate dehydrogenase/Fumarate reductase transmembrane subunit
definition: >-
  Succinate dehydrogenase (SDH) is a membrane-bound complex of two main components: a membrane-extrinsic component composed of an FAD-binding flavoprotein and an iron-sulphur protein, and a hydrophobic component composed of a cytochrome b and a membrane anchor protein. The cytochrome b component is a mono-haem transmembrane protein belonging to a family that includes: Cytochrome b-556 from bacterial SDH (gene sdhC). Cytochrome b560 from the mammalian mitochondrial SDH complex, which is encoded in the mitochondrial genome of some algae and in the plant Marchantia polymorpha. Cytochrome b from yeast mitochondrial SDH complex (gene SDH3 or CYB3). Protein cyt-1 from Caenorhabditis elegans. These cytochromes are proteins of about 130 residues that comprise three transmembrane regions. There are two conserved histidines which may be involved in binding the haem group. This family also includes the subunit C (the cytochrome B subunit) of type B fumarate reductases.
