identifier: Pfam:PF24689
label: Immunity protein TriTu
definition: >-
  This entry represents the immunity protein TriTu from Salmonella enterica and related batcerial proteins. TriTu is a part of the TreTu/TriTu toxin/antitoxin system. TriTu immunity protein neutralises TreTu activity by acting like a lid that closes the TreTu catalytic site and traps the NAD+. TriTu is composed of a flat five-stranded antiparallel β-sheet flanked on one side by two α-helices ( ).
