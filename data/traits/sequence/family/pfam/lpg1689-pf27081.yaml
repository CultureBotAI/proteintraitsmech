identifier: Pfam:PF27081
label: Lpg1689-like protein
definition: >-
  This entry represents a family of uncharacterised proteins found in Legionella species. The prototype member lpg1689 from Legionella pneumophila subsp. pneumophila (strain Philadelphia 1) is a 208 amino acid protein of unknown function. L. pneumophila is an accidental human pathogen that causes Legionnaires' disease, a severe form of pneumonia. The function of this protein family remains to be determined.
