identifier: Pfam:PF02472
label: Biopolymer transport protein ExbD/TolR
definition: >-
  This group of proteins are membrane bound transport proteins essential for ferric ion uptake in bacteria. The family consists of ExbD, and TolR which are involved in TonB-dependent transport of various receptor bound substrates including colicins.
