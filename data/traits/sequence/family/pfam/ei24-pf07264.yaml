identifier: Pfam:PF07264
label: Sulfate transporter CysZ/Etoposide-induced protein 2.4
definition: >-
  This family contains a number of eukaryotic etoposide-induced 2.4 (EI24) proteins approximately 350 residues long as well as bacterial CysZ proteins (formerly known as DUF540). In cells treated with the cytotoxic drug etoposide, ei24 is induced by p53 and may play an important role in negative cell growth control by functioning as an apoptotic effector of p53 tumor suppressor activities. These proteins regulate the formation of degradative autolysosomes during autophagy. CysZ is a high affinity, high specificity proton-dependent sulfate transporter, which mediates sulfate uptake.
