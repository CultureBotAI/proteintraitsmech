identifier: Pfam:PF11413
label: Hypoxia-inducible factor-1
definition: >-
  Hypoxia-inducible factors (HIFs) are transcription factors that respond to changes in available oxygen in the cellular environment. Specifically, they respond to decreases in oxygen, mediating the effects of hypoxia. HIFs are heterodimers, composed of an alpha and a beta subunit. At least 3 different alpha subunits are known to exist, termed HIF-1, -2 and -3 alpha. Beta subunits, meanwhile, are constitutively-expressed aryl hydrocarbon receptor nuclear translocators (ARNTs). In addition to their role in hypoxia, HIFs have been shown to be involved in a range of processes, including angiogenesis, metal transport, mitochondrial function and cell growth. This entry represents a domain found in HIF alpha subunits and endothelial PAS domain-containing protein 1 (HIF1-alpha-like).
