identifier: Pfam:PF27901
label: 3-deoxy-D-manno-octulosonic acid transferase WaaZ
definition: >-
  This entry represents WaaZ, also known as Kdo-III transferase and related proteins from proteobacteria. This family is related to . WaaZ is present in some strains of E. coli and its allies but not others, performs a non-stoichiometric addition of a third 3-deoxy-D-manno-oct-2-ulosonic acid (KDO-III) onto some fraction of KDO-II in the lipopolysaccharide (LPS) inner core.
