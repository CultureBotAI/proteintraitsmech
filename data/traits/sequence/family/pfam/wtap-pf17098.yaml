identifier: Pfam:PF17098
label: WTAP/Mum2p family
definition: >-
  Pre-mRNA-splicing regulator WTAP (Wilms' tumor 1-associating protein) is a regulatory subunit of the WMM N6-methyltransferase complex, a multiprotein complex that mediates N6-methyladenosine (m6A) formation, which acts as an epitranscriptomic marker. It plays a role in the efficiency of mRNA splicing and processing, and mRNA stability. In Drosophila, the homologous protein pfemale-lethal(2)D has been implicated in alternative splicing regulation of genes involved in sexual determination and is required for eye development. FKBP12-interacting protein of 37kDa (AtFIP37, At3g54170), the homologue from Arabidopsis, may also have a role in splicing events. AtFIP37 interacts with mRNA adenosine methylase (MTA, encoded by At4g10760) in vitro and in vivo.
