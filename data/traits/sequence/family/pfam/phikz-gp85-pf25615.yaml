identifier: Pfam:PF25615
label: Bacteriophage PhiKZ vertex-binding protein gp85
definition: >-
  This entry represents the vertex-binding protein gp85 from jumbo bacteriophage PhiKZ that infects Pseudomonas aeruginosa. This protein forms a homodimer and functions as a key component of the vertex-binding complex attached to the inner surface of the viral capsid. The gp85 dimer, along with gp28 and gp119, forms a sandwich structure at the centre of the vertex-binding complex. The two subunits within the gp85 dimer share nearly identical structures. This dimer interacts with almost all other members in the vertex-binding complex (except for gp91 and gp184) and also interacts with two major capsid protein (MCP) subunits in hexameric capsomer 1. The gp85 dimer plays a critical role in maintaining the stability of the capsid vertex by bridging multiple components of the vertex structure. Similar proteins are found in other jumbo phages, suggesting a conserved mechanism for capsid assembly and stabilisation in large viruses.
