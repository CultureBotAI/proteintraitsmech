identifier: Pfam:PF27724
label: RGS1-HXK1-interacting protein 1
definition: >-
  This entry represents RGS1-HXK1-interacting protein 1 found in Arabidopsis thaliana and similar proteins found in plant. RHIP1 provides a physical connection between the glucose signaling sensors RGS1 and HXK1, and is required for some glucose-regulated gene expression in plants.
