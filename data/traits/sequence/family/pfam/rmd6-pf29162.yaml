identifier: Pfam:PF29162
label: Sporulation protein RMD6
definition: >-
  This entry represents the RMD6 protein family, also known as Required for Meiotic Nuclear Division protein 6. RMD6 is required for sporulation and meiotic nuclear division in Saccharomyces cerevisiae. The protein is localised to peroxisomes and is conserved across fungal species, particularly within the Saccharomycotina subphylum including Saccharomycetaceae, Pichiaceae, and Debaryomycetaceae families. The protein comprises 231 amino acids and is essential for proper completion of the meiotic cell cycle and spore formation.
