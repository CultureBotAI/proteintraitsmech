identifier: Pfam:PF19620
label: Family of unknown function (DUF6125)
definition: >-
  This family of proteins is functionally uncharacterised. This family of proteins is found in bacteria and archaea. Proteins in this family are typically between 170 and 247 amino acids in length. Some of them are annotated as Cytosolic proteins. They contain a small β-sheet connected to a helical region.
