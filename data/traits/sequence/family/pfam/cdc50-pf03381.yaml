identifier: Pfam:PF03381
label: LEM3 (ligand-effect modulator 3) family / CDC50 family
definition: >-
  CDC50/LEM3 is a family of membrane proteins whose members include cell cycle control protein 50, alkylphosphocholine resistance protein LEM3, which is is required for phospholipid translocation across the plasma membrane in Saccharomyces cerevisiae, and several ALA-interacting subunits, which are plant proteins involved in lipid translocation and secretory vesicle formation. CDC50 (also known as P4-ATPase flippase complex beta subunit TMEM30A) is an accessory component of a P4-ATPase flippase complex which catalyzes the hydrolysis of ATP coupled to the transport of aminophospholipids from the outer to the inner leaflet of various membranes and ensures the maintenance of asymmetric distribution of phospholipids. It is required for the proper folding, assembly and ER to Golgi exit of the ATP8A2:CDC50A flippase complex, which may be involved in regulation of neurite outgrowth, and, reconstituted to liposomes, predominantly transports phosphatidylserine (PS) and to a lesser extent phosphatidylethanolamine (PE). In complex with ATP8A1, may play a role in regulation of cell migration probably involving flippase-mediated translocation of phosphatidylethanolamine (PE) at the plasma membrane.
