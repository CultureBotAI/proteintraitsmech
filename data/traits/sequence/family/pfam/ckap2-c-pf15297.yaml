identifier: Pfam:PF15297
label: Cytoskeleton-associated protein 2 C-terminus
definition: >-
  This entry represents the C terminus of CKAP2 (cytoskeleton-associated protein 2) and CKAP2L (cytoskeleton-associated protein 2-like). Mouse CKAP2 has been shown to possess microtubule stabilising properties and is involved in regulating aneuploidy, cell cycle, and cell death in a p53-dependent manner. In human, CKAMP2 is up-regulated in primary gastric cancers. It has been shown that human CKAP2 is degraded by APC/C-Cdh1 during mitotic exit and that a tight regulation of CKAP2 protein level is important for mitotic progression.
