identifier: Pfam:PF12094
label: Protein of unknown function (DUF3570)
definition: >-
  This family of bacterial proteins is functionally uncharacterised. Proteins in this family are typically between 396 to 444 amino acids in length. Members in this family contain the conserved [S/T]GA[S/T] motif and are flavinylation substrates for ApbE, which suggests that they may be involved in extra cytosolic redox activities.
