identifier: Pfam:PF08116
label: PhTx neurotoxin family
definition: >-
  This family consists of PhTx insecticidal neurotoxins that are found in the venom of Phoneutria nigriventer (Brazilian armed spider). The venom of the P. nigrivente contains numerous neurotoxic polypeptides of 30-140 amino acids, which exert a range of biological effects. While some of these neurotoxins are lethal to mice after intracerebroventricular injections, others are extremely toxic to insects of the orders Diptera and Dictyoptera but had much weaker toxic effects on mice.
