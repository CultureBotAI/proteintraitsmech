identifier: Pfam:PF11980
label: C-terminal domain of neuropilin glycoprotein
definition: >-
  This domain of unknown function is located in the C terminus of the eukaryotic neuropilin receptors. There are two completely conserved residues (Y and E) that may be functionally important. Neuropilins are essential multifunctional vertebrate cell surface receptors. They function as receptors for axon guidance factor semaphorin class 3 (Sema3), vascular endothelial growth factor (VEGF) and placenta growth factor-2 (PLGF-2).
