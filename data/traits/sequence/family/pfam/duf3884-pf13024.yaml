identifier: Pfam:PF13024
label: Protein of unknown function (DUF3884)
definition: >-
  This family of proteins is functionally uncharacterised. Several of them are annotated as Tagatose 1,6-diphosphate aldolase, but there appears to be no direct evidence to support this. Proteins in this family are typically between 61 and 106 amino acids in length and have two completely conserved residues (Y and F) that may be functionally important.
