identifier: Pfam:PF19402
label: Lanthionine-containing peptide SapB precursor RamS
definition: >-
  This entry represents a member of a bacterial biosynthetic gene cluster (BGC). The BGC (BGC0000551) is described by MIBiG as an example of the following biosynthetic class, RiPP (ribosomally synthesised and post- translationally modified peptide). This family includes RamS, the precursor of lanthionine-containing peptide SapB (also known as ProSapB). SapB, which does not appear to exhibit antibiotic activity, is formed from RamS through proteolytic cleavage and subsequent creation of lanthionine bridges.
