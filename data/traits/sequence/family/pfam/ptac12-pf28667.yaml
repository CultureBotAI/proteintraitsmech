identifier: Pfam:PF28667
label: Plastid transcriptionally active protein 12
definition: >-
  PTAC12, also known as HEMERA (HMR), has been shown in both rice and Arabidopsis to be involved in chloroplast development. Furthermore, PTAC12/HMR has a function in the nucleus, where it acts specifically in phytochrome signalling. It is essential for both phytochrome B localization to photobodies and PIF (phytochrome-interacting factor) degradation. Photoactivated phytochromes directly interact with HMR and promote HMR accumulation, which in turn mediates the formation of photobodies and the degradation of PIF transcription factors to trigger photomorphogenesis.
