identifier: Pfam:PF03807
label: NADP oxidoreductase coenzyme F420-dependent
definition: >-
  Pyrroline-5-carboxylate reductase consists of two domains, an N-terminal catalytic domain and a C-terminal dimerisation domain. This entry represents the N-terminal catalytic domain, which consists of an α/β/α sandwich with a canonical NADP-binding Rossmann fold. This type of NADP-binding domain is also found in F420-dependent NADP reductases.
