identifier: Pfam:PF27890
label: CRISPR type III-associated protein, CHP04423 family
definition: >-
  Members of this protein family occur only in species with CRISPR systems, in the context of type III systems that resemble type III-A (MTUBE) and III-B (the RAMP module). It occurs in several species of Prevotella, Helicobacter, Campylobacter, and Bacteroides.
