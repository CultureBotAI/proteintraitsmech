identifier: Pfam:PF01310
label: Adenovirus hexon associated protein, protein VIII
definition: >-
  This family includes the minor capsid protein VIII from adenoviruses. Protein VIII is a structural component of the virion that lashes peripentonal hexons to the hexons situated in the facets through its interaction with the capsid vertex protein. Adenoviruses are responsible for diseases such as pneumonia, cystitis, conjunctivitis and diarrhoea, all of which can be fatal to patients who are immunocompromised.
