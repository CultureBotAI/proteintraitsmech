identifier: Pfam:PF27396
label: HI_1128 single transmembrane helix domain
definition: >-
  This entry represents a transmembrane domain covering large portion of the HI_1128 proteins found in Haemophilus influenzae. The protein contains a single transmembrane helix and is found predominantly in Gammaproteobacteria, with representatives in Pasteurellales and Moraxellales orders. The function of this protein remains to be determined. This domain also covers the C-terminal in putative carbon starvation bacterial proteins.
