identifier: Pfam:PF21919
label: Phage P23-45 portal protein
definition: >-
  This entry represents the Thermus phage P23-45 portal protein. The portal protein is a key component of many double-stranded DNA viruses, governing capsid assembly and genome packaging. Twelve subunits of the portal protein define a tunnel, through which DNA is translocated into the capsid.
