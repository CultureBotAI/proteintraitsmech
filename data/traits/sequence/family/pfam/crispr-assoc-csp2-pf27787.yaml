identifier: Pfam:PF27787
label: CRISPR-associated protein Csp2
definition: >-
  Members of this protein family are cas, or CRISPR-associated, proteins. They are found within cas gene clusters that are adjacent to CRISPR DNA repeats mainly in Bacteroidales, including Porphyromonas gingivalis. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
