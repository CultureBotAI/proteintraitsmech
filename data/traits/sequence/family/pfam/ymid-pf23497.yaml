identifier: Pfam:PF23497
label: YmiD
definition: >-
  This protein family includes the uncharacterised protein YmiD from Escherichia coli, a 42-residue micropeptide encoded by a small open reading frame (smORF). Proteins 50 or fewer residues long have been shown to regulate the functions of larger proteins in a variety of organisms. It is expressed in both exponential and stationary phases in rich media.
