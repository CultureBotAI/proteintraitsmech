identifier: Pfam:PF23877
label: Family of unknown function (DUF7231)
definition: >-
  This entry represents a family of unknown function found in phage proteins, typically 120-130 amino acids in length. Some members contain a C-terminal region enriched in basic residues that is predicted to be disordered. The N-terminal of the proteins contain a small globular domain. These proteins are found in the Ackermannviridae family of phages that infect Enterobacteria such as Salmonella, Escherichia, Shigella, and Dickeya.
