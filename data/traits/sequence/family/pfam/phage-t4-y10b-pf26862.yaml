identifier: Pfam:PF26862
label: Phage T4 Y10B protein
definition: >-
  This entry represents a group of uncharacterised proteins found in bacteriophages, including Y10B from bacteriophage T4, a 92 amino acid protein with a molecular weight of 11.0 kDa located in the Gp24-hoc intergenic region. The protein is also known as ORF2 or 24.2 and remains uncharacterised. The function of this protein is unknown.
