identifier: Pfam:PF17067
label: Ribosomal protein S31e
definition: >-
  This entry represents a lineage-specific bacterial ribosomal small subunit protein bTHX (previously THX), originally shown to exist in the genus Thermus. The protein is conserved for the first 26 amino acids, past which some members continue with additional sequence, often repetitive or low-complexity. This entry also includes 30S ribosomal proteins bTHXc/bTHXm from plant chloroplasts and mitochondria, which have additional N-terminal transit peptides.
