label: Family of unknown function (DUF6226)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000223) is described by MIBiG as an example of the polyketide biosynthetic class. It includes a member from the rabelomycin biosynthetic gene cluster from uncultured bacterium BAC AB649/1850. This family appears to be predominantly found in Actinobacteria.
