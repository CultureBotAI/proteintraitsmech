identifier: Pfam:PF29133
label: Spore membrane assembly protein 2
definition: >-
  This entry represents the spore membrane assembly protein 2 (SMA2) family found in fungi. SMA2 is required for the efficient assembly of the precursors of the prospore membrane to a continuous prospore membrane during spore and ascus formation. The protein is a multi-pass transmembrane protein that localises to the prospore membrane and the endoplasmic reticulum. Family members are approximately 360-385 amino acids in length and contain four transmembrane helices. The protein accumulates in the endoplasmic reticulum in vegetative and sporulating ERV14-deleted cells.
