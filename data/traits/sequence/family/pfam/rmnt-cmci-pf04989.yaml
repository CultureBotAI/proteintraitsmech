identifier: Pfam:PF04989
label: Rhamnosyl O-methyltransferase/CmcI
definition: >-
  This entry contains Rhamnosyl O-methyltransferase which catalyses the O-methylation of the hydroxyl group located on C-2 of the first rhamnosyl residue linked to the phenolic group of glycosylated phenolphthiocerol dimycocerosates (PGL) and p-hydroxybenzoic acid derivatives (p-HBAD). Members of this family are about 220 amino acids long. It also includes the CmcI protein , which was previously thought to represent the cephalosporin-7--hydroxylase, however, it is apparently a methyltransferase that works with hydroxylase CmcJ, and its most likely function is to catalyse the transfer of a methyl group from SAM to the 7alpha-hydroxy cephalosporin in the second catalytic reaction of cephamycin formation. Studies using recombinant proteins purified from E. coli suggest that the complex, but not the separate proteins, exhibits a strong interaction with SAM and cephalosporin C.
