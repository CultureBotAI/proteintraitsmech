identifier: Pfam:PF04178
label: 'Got1/Sft2-like family '
definition: >-
  Traffic through the yeast Golgi complex depends on a member of the syntaxin family of SNARE proteins, Sed5, present in early Golgi cisternae. Got1 is thought to facilitate Sed5-dependent fusion events. This is a family of sequences derived from eukaryotic proteins. They are similar to a region of a SNARE-like protein required for traffic through the Golgi complex, SFT2 protein ( ). This is a conserved protein with four putative transmembrane helices, thought to be involved in vesicular transport in later Golgi compartments.
