identifier: Pfam:PF27990
label: Phytoreovirus mRNA-capping enzyme P5
definition: >-
  This entry represents the putative mRNA-capping enzyme P5 of Phytoreovirus, like rice dwarf virus. It is a nucleoside-2'-O-methyltransferase (2'OMTase) involved in the mRNA capping.
