identifier: Pfam:PF29122
label: Small integral membrane protein 40
definition: >-
  This entry represents the small integral membrane protein 40 (SMIM40) family, found in vertebrates. SMIM40 is a short protein of approximately 79 amino acids containing a single transmembrane helix. The protein is predicted to be a single-pass membrane protein. In humans, SMIM40 shows tissue-enriched expression in the retina and is also expressed in granulocytes and other cell types. The protein has been identified by mass spectrometry in human liver phosphoproteome studies, suggesting it may be subject to phosphorylation. The function of this protein family remains to be determined.
