identifier: Pfam:PF12495
label: 'Vegetative insecticide protein 3A N terminal '
definition: >-
  This entry includes Vip3A and related proteins, such as Vip3B and Vip3C including A0A3A3GLR0, A0A290WPI2 and Q58XI2. They are insecticidal proteins produced during the vegetative growth phase of B. thuringiensis. Vip3A contains a conserved N-terminal domain and a highly variable C-terminal region. After ingestion of the toxin by the larva, Vip3A is activated through proteolytic process by trypsin-like proteases.
