identifier: Pfam:PF05994
label: Cytoplasmic Fragile-X interacting family
definition: >-
  This entry includes cytoplasmic fragile X messenger ribonucleoprotein 1-interacting proteins from humans and their homologues, such as Sra-1 (specifically Rac1-associated protein 1) from Drosophila and PIROGI from Arabidopsis. In humans, there are two members, CYFIP1 and CYFIP2. They both interact with FMRP (Fragile X messenger ribonucleoprotein 1), which is responsible for pathologic manifestations in the Fragile X Syndrome. CYFIP1 interacts with the small GTPase Rac1. CYFIP1 represses cap-dependent translation of mRNA by interacting with the initiation factor eIF4E. CYFIP1 and CYFIP2 are part of the Wiskott-Aldrich syndrome protein-family verprolin-homologous protein (WAVE) complex that regulates actin polymerization at synapses. Drosophila Sra-1 interacts with the Kette and Wasp. It is required for neuronal and bristle development in Drosophila.
