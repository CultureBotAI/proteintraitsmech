identifier: Pfam:PF26944
label: Bacteriophage T4 protein ac
definition: >-
  This entry represents Uncharacterized protein 52.2 found in T4-like bacteriophages. This protein is an uncharacterised membrane protein of 51 amino acids (5.5 kDa) that localises to the host membrane. The protein contains two predicted transmembrane helices (residues 6-26 and 28-48). Mutations in this gene confer resistance to acridine-inhibition of phage development.
