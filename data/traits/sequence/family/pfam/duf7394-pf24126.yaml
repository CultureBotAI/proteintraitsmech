identifier: Pfam:PF24126
label: Family of unknown function (DUF7394)
definition: >-
  This entry represents a protein of unknown function, found primarily in phage proteins of about 60 to 75 amino acids in length. It contains a single predicted transmembrane helix in many members. Most sequences also contain a region of predicted intrinsic disorder at the C-terminal rich in basic and acidic residues. Further experimental study is required to determine the function of these proteins. Some proteins are annotated as holins but the source of this annotation is unknown.
