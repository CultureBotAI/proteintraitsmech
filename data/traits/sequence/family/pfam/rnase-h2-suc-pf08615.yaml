identifier: Pfam:PF08615
label: Ribonuclease H2 non-catalytic subunit (Ylr154p-like)
definition: >-
  Whereas bacterial and archaeal RNases H2 are active as single polypeptides, eukaryotic RNase H2 is a heterotrimeric complex of the RNase H2A, RNase H2B, and RNase H2C proteins that are all required for proper function and activity , ]. RNase H2 is an endonuclease that specifically degrades the RNA of RNA:DNA hybrids. It participates in DNA replication, possibly by mediating the removal of lagging-strand Okazaki fragment RNA primers during DNA replication. This entry represents the non-catalytic C subunit of RNase H2.
