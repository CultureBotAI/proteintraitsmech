identifier: Pfam:PF27360
label: UU048
definition: >-
  This entry represents UU048, an uncharacterised membrane protein found in Mycoplasmatota. The protein from Ureaplasma parvum is 496 amino acids in length and contains 12 predicted transmembrane helices, making it a multi-pass membrane protein localised to the cell membrane. These proteins are found across Mycoplasmoidales, including members of Mycoplasmopsis, Mycoplasma, and Metamycoplasma genera. The protein belongs to the MSC_0624_12TM group based on its 12 transmembrane architecture. The function of this protein remains to be determined.
