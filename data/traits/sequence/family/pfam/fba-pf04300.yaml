identifier: Pfam:PF04300
label: F-box associated region
definition: >-
  F-box proteins have a bipartite structure: they contain a carboxy-terminal domain that interacts with substrates and a 42-48 amino-acid F-box domain which binds to the protein Skp1. A subset of F-box proteins is characterised by a ~180-residue carboxy-terminal region, which has been called the F-box-associated (FBA) domain. A FBA domain has also been identified in the catfish, tilapia, and zebrafish nonspecific cytotoxic cell receptor proteins (NCCRP-1), which do not contain the F-box domain. NCCRP-1 may function as an antigen recognition molecule and, as such, may participate in innate immunity in teleosts. The FBA domain is likely to be a glycoprotein-binding module.
