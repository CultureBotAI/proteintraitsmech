identifier: Pfam:PF16590
label: Exocrine gland-secreting peptide
definition: >-
  Exocrine gland-secreting peptide Esp1 is produced by the rodent male extraorbital lacrimal gland to be secreted into the tear fluid. Other mice including females detect these peptides through receptors in the vomeronasal organ, and the receptors report information on mouse-strain, sex and species. Esp22 is produced by juveniles and functions as a mating inhibitor. The peptides are short, all carrying an N-terminal signal peptide to indicate they are for secretion which accounts for much of the common conservation.
