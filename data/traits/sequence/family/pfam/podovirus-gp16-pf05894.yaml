identifier: Pfam:PF05894
label: Podovirus DNA encapsidation protein (Gp16)
definition: >-
  This family includes several DNA encapsidation protein sequences from the phi-29-like viruses (gene product 16, Gp16). Gp16 is the primary ATPase of the motor assembly of phi-29; it binds to the prohead RNA to form a pentameric ring to complete the assembly of the DNA packaging motor. The characteristics of the protein distribution suggest prophage matches.
