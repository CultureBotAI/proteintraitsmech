identifier: Pfam:PF30986
label: E6 cell wall protein
definition: >-
  E6 is one of the predominant fibre-specific mRNAs present during early fibre development. However, E6 seems not to be critical for the normal development or structural integrity of cotton fibres. The distinguishing feature of E6 protein is the presence of a motif where a dimer, Ser-Gly, is repeated several times.
