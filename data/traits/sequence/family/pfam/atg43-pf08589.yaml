identifier: Pfam:PF08589
label: Autophagy receptor ATG43
definition: >-
  Mitophagy is a selective type of autophagy in which damaged or unnecessary mitochondria are sequestered by double-membranous structures called phagophores and delivered to vacuoles/lysosomes for degradation. This family represents Atg43 from fungi, a mitochondrial outer membrane protein that serves as a mitophagy receptor that tethers Atg8 to the mitochondrial outer membrane to promote selective autophagy.
