identifier: Pfam:PF30915
label: POLAR asymmetric cell division scaffold
definition: >-
  Development of stomata in Arabidopsis thaliana begins with de novo asymmetric divisions producing meristemoids. POLAR is thought to be involved in this process. It is polarly localized and unequally segregated during asymmetric cell divisions of the stomatal lineage. This entry also includes Arabidopsis POLAR-like 1 (PL1), which acts as a stomatal lineage scaffold.
