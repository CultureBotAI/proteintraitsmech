identifier: Pfam:PF24754
label: Macrodomain effector MavL
definition: >-
  This entry represents the Legionella macrodomain effector MavL, an ADP-ribosyl hydrolase that reverses the arginine ADP-ribosylation, to minimise potential detrimental effects caused by the modified ubiquitin. Legionella pneumophila mediates atypical ubiquitination of host targets using the SidE effector family. This entry also includes other macrodomain-containing proteins found in small arthropods and diatoms.
