identifier: Pfam:PF28166
label: Avirulence protein
definition: >-
  This entry represents Avirulence protein AvrXv3, a type III secretion system effector from Xanthomonas euvesicatoria ( ), and similar proteins found mainly in gammaproteobacteria. The expression of this protein is controlled by the hypersensitivity and pathogenicity (hrp) regulatory system. AvrXv3 possess transcription activation activity in yeast, and the domain located at the C terminus of this protein is responsible for this activity.
