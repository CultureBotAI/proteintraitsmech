identifier: Pfam:PF13939
label: Toxin TisB, type I toxin-antitoxin system
definition: >-
  TisB (toxicity-induced by SOS B) is an SOS-induced toxic peptide and is part of the type I toxin-antitoxin system, in which the antitoxin is a non-coding RNA. It is a hydrophobic membrane-spanning protein that inhibits cell growth. Its expression is inhibited by the antisense RNA IstR-1. TisB appears to induce a persister state by dissipating transmembrane potential, thus depleting ATP. Persister cells, unable to grow until the persister state changes, survive a number of challenges, including exposure to most antibiotics.
