identifier: Pfam:PF30977
label: Bucky ball germ plasm organiser
definition: >-
  This entry represents the Bucky ball protein family found in vertebrates, predominantly in teleost fish. Bucky ball is a prion-like protein required for the formation of the Balbiani body and germ plasm assembly, and for the establishment of oocyte polarity during early oogenesis. The protein localises to the cytoplasm, nuage, and the Balbiani body during oogenesis, and accumulates at embryonic cleavage furrows. Bucky ball interacts with several proteins including TDRD6, RBPMS2, DAZL, and Kinesin-1/KIF5BA. The C-terminal region contains RG motifs that undergo symmetric dimethylarginine modification, which promotes interaction with TDRD6.
