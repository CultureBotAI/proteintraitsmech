identifier: Pfam:PF08691
label: DNA repair proteins Nse5 and Nse6
definition: >-
  Nse5 and Nse6 are non-structural nuclear proteins that are critical for chromosome segregation in fission yeast. Nse5 forms a dimer with Nse6 and facilitates DNA repair as part of the Smc5-Smc6 holocomplex. Nse6 is also known as KRE29.
