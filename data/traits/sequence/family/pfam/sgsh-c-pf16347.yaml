identifier: Pfam:PF16347
label: N-sulphoglucosamine sulphohydrolase, C-terminal
definition: >-
  This entry represents a domain found at the C-terminal end of sulfatases and alkaline phosphatases from bacteria, eukaryotes and archaea, including N-sulphoglucosamine sulphohydrolase from humans (SGSH) and Bifunctional sulfatase/alpha-L-rhamnosidase from Formosa agariphila (P36_S1_25). This domain shows a four-stranded antiparallel β-sheet, with four surrounding α-helices, followed by a C-terminal extension consisting of a small two-stranded antiparallel β-sheet.
