identifier: Pfam:PF07020
label: Orthopoxvirus C10L protein
definition: >-
  This family consists of several Orthopoxvirus C10L proteins. C10L viral protein, also known as OPG024 protein, can play an important role in vaccinia virus evasion of the host immune system. It may consist in the blockade of IL-1 receptors by the C10L protein, a homologue of the IL-1 Ra.
