identifier: Pfam:PF05958
label: tRNA (Uracil-5-)-methyltransferase
definition: >-
  This family consists of (uracil-5-)-methyltransferases from bacteria, archaea and eukaryotes. They are class I-like SAM-binding methyltransferases. Methyltransferases (MTs) (EC 2.1.1.-) constitute an important class of enzymes present in every life form. They transfer a methyl group most frequently from S-adenosyl L-methionine (SAM or AdoMet) to a nucleophilic acceptor such as nitrogen, oxygen, sulfur or carbon leading to S-adenosyl-L-homocysteine (AdoHcy) and a methylated molecule. The substrates that are methylated by these enzymes cover virtually every kind of biomolecules ranging from small molecules, to lipids, proteins and nucleic acids. MTs are therefore involved in many essential cellular processes including biosynthesis, signal transduction, protein repair, chromatin regulation and gene silencing. More than 230 different enzymatic reactions of MTs have been described so far, of which more than 220 use SAM as the methyl donor. A review published in 2003 divides all MTs into 5 classes based on the structure of their catalytic domain (fold): class I: Rossmann-like α/β class II: TIM β/α-barrel α/β class III: tetrapyrrole methylase α/β class IV: SPOUT α/β class V: SET domain all β A more recent paper based on a study of the Saccharomyces cerevisiae methyltransferome argues for four more folds: class VI: transmembrane all α class VII: DNA/RNA-binding 3-helical bundle all α class VIII: SSo0622-like α+β class IX: thymidylate synthetase α+β The vast majority of MTs belong to the Rossmann-like fold (Class I) which consists in a seven-stranded β-sheet adjoined by α-helices. The β-sheet contains a central topological switch-point resulting in a deep cleft in which SAM binds. Class I MTs display two conserved positions, the first one is a GxGxG motif (or at least a GxG mot…
