identifier: Pfam:PF08191
label: LRR adjacent
definition: >-
  These are small, all β-strand domains, structurally described for the protein Internalin (InlA) and related proteins InlB, InlC, InlH from the pathogenic bacterium Listeria monocytogenes, in which it has been described as Ig-like inter-repeat (IR) region. Their function appears to be mainly structural: they are fused to the C-terminal end of leucine-rich repeats (LRR), significantly stabilising the LRR, and forming a common rigid entity with the LRR. They are themselves not involved in protein-protein interactions but help to present the adjacent LRR-domain for this purpose. These domains belong to the family of Ig-like domains in that they consist of two sandwiched β-sheets that follow the classical connectivity of Ig-domains. The β-strands in one of the sheets is, however, much smaller than in most standard Ig-like domains, making it somewhat of an outlier.
