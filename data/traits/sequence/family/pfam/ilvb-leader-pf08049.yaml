identifier: Pfam:PF08049
label: IlvB leader peptide
definition: >-
  This family consists of the leader peptides of the ilvB operon. This operon contains the structural gene for acetohydroxy acid synthase I, an enzyme required for the biosynthesis of valine and isoleucine. The DNA sequence of the ilvB operon promoter-control region encodes a potential leader polypeptide containing 32 amino acids, 12 of which are valine or leucine. A model for the multivalent regulation of this operon by valyl- and leucyl-tRNA is proposed on the basis of the mutually exclusive formation of five strong stem-and-loop structures in the leader mRNA.
