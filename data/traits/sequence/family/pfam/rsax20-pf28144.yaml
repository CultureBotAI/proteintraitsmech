identifier: Pfam:PF28144
label: RsaX20-like
definition: >-
  Members of this family average just 38 amino acids in length, but are widely conserved among species of Gram-positive firmicutes. Expression of an RNA designated RsaX20, which encodes a member of this family, was studied in a Staphylococcus aureus of possible structural RNAs, and shown to be controlled by Fur-like transcription factor Zur. The broad conservation of the coding region across multiple species and protein-like pattern of amino acid substitutions in multiple sequence alignments strongly suggests that that members of this family are indeed translated into functional proteins.
