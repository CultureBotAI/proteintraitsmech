identifier: Pfam:PF23965
label: Family of unknown function (DUF7293)
definition: >-
  This entry represents an uncharacterised protein of approximately 54 amino acids found in T5-like bacteriophages that infect Escherichia coli and Salmonella. Homologues have been identified in several T5-like phages including bacteriophage T5, Salmonella phage vB_SenS_SB13, and Escherichia phage vB_EcoS-26175V. Structure prediction suggests that this protein forms a strand swapped homodimeric arrangement. The dimeric structure forms two four stranded sheets that are connected by two α-helices. The C-terminal of each protein is donated to the sheet made by the other monomer.
