identifier: Pfam:PF00688
label: TGF-beta propeptide
definition: >-
  This entry represents the propeptide region of TGF-beta that forms LAP. TGF-beta is secreted as a latent complex, consisting of the TGF-beta dimer non-covalently bound to LAP (latency associated peptide) plus a latent TGF-beta binding protein (LTBP). After post-translational processing, TGF-beta binds non-covalently to LAP, a homodimer formed from the propeptide region of TGF-beta, to confer latency. Latent TGF-beta can then be targeted to the extracellular matrix (ECM) by LTBP. The LAP dimer is usually disulfide-bound to LTBP.
