identifier: Pfam:PF05791
label: Bacillus haemolytic enterotoxin (HBL)
definition: >-
  This entry consists of the hemolysin BL-binding component. Hemolysin BL is an enterotoxin and is composed of a binding component, B, and two lytic components, L1 and L2. Hemolysin BL is responsible for binding to erythrocytes and is thought to be the cause of the diarrheal form of gastroenteritis caused by food-borne strains of B. cereus.
