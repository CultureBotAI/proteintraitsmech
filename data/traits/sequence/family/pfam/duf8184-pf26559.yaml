identifier: Pfam:PF26559
label: Family of unknown function (DUF8184)
definition: >-
  This entry represents a family of uncharacterised proteins from the Bacteroidota phylum, particularly within the Chitinophagales order. Proteins in this family are found in various bacterial species, including Chitinophaga and Flavobacterium. The proteins typically range from approximately 200 to 380 amino acids in length. This family corresponds to a duplication of a PH-domain-like fold.
