identifier: Pfam:PF19681
label: Family of unknown function (DUF6183)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001726) is described by MIBiG as an example of the NRP (non-ribosomal peptide) and polyketide biosynthetic classes. It includes a member from the pactamides biosynthetic gene cluster from Streptomyces pactum. This family appears to be predominantly found in Actinobacteria.
