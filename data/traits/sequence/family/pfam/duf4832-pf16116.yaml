identifier: Pfam:PF16116
label: Domain of unknown function (DUF4832)
definition: >-
  This domain is mainly found in various Bacteroides species. Its function is unknown. Distant homology analysis suggests a possible similarity of proteins from this family to TIM barrel glycoside hydrolases and, subsequently its involvement in carbohydrate metabolism. The domain lies downstream of glycosyl hydrolases 42, suggesting that as a domain it might represent the carbohydrate-binding region of the enzyme.
