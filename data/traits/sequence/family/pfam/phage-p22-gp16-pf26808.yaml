identifier: Pfam:PF26808
label: Bacteriophage P22 ejection protein gp16
definition: >-
  This entry represents gp16, one of three ejection proteins found in bacteriophage P22 that infects Salmonella enterica. Gp16, along with gp7 and gp20, is packaged inside the procapsid during phage assembly. These ejection proteins are required to facilitate transport of bacteriophage P22 double-stranded DNA safely through membranes of Salmonella. During infection, the three ejection proteins are released with the DNA and may prepare the host cytoplasm for DNA arrival or physically aid the transfer of DNA through the host membranes and/or periplasmic space. The proteins may form a tube-like structure that serves as a conduit for DNA delivery into the cytoplasm. All three ejection proteins are required for successful DNA release into the target cell, though they are not required for assembly of normal-appearing virions.
