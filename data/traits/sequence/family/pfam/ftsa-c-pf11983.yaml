identifier: Pfam:PF11983
label: Cell division protein FtsA, C-terminal
definition: >-
  FtsA is essential for bacterial cell division, and co-localizes to the septal ring with FtsZ. It has been suggested that the interaction of FtsA-FtsZ has arisen through coevolution in different bacterial strains. This C-terminal domain is found in FtsA from Firmicutes (Gram-positive bacteria). It acts as an intra-molecular switch, triggered by ATP, to promote polymerisation of the whole protein and to attach it to the membrane.
