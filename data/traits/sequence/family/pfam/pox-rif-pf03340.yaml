identifier: Pfam:PF03340
label: Poxvirus rifampicin resistance protein
definition: >-
  This family represents the Poxvirus rifampicin resistance protein (Scaffold protein OPG125), a scaffold protein which forms a transitory spherical honeycomb lattice providing curvature and rigidity to the convex membrane of crescent and immature virions (IV). This association occurs concomitantly with viral membrane formation. It is targeted by the drug rifampicin, which prevents the formation of this lattice, and hence virus morphogenesis. In the presence of rifampicin, irregularly shaped membranes that lack the honeycomb layer accumulate around areas of electron-dense viroplasm. This layer is lost from virions during maturation from IV to mature virion (MV), through the proteolysis of OPG158 N terminus.
