identifier: Pfam:PF28385
label: Coiled-coil domain-containing protein 172
definition: >-
  This entry represents the coiled-coil domain-containing protein 172 (CCDC172) family, also known as TEKT2-binding protein 1. This protein is found in vertebrates and contains multiple coiled-coil domains. CCDC172 localises to the cytoplasm and cilia, particularly in the sperm midpiece where it is concentrated at the mitochondrial sheath of flagella and colocalises with TEKT2 at the perinuclear region. The protein is predominantly expressed in testis and spermatozoa, with expression increasing after 3 weeks of postnatal development. CCDC172 may interact with TEKT2, suggesting a role in sperm structure and function.
