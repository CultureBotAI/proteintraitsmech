identifier: Pfam:PF28180
label: EF0163-like
definition: >-
  This entry represents a group of predicted lipoproteins from lactobacillales, including EF0163 from Enterococcus faecalis ( ), which was found to be upregulated more than six-fold in a mice peritonitis model. Many members of this family have an N-terminal lipoprotein signal peptide-like region, followed by a nearly 50 amino acid stretch rich in Glu, Asp, Gln, Asn, Ser, and Thr, and average about 170 amino acids in length.
