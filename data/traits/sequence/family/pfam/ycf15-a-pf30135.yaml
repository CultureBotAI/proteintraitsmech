identifier: Pfam:PF30135
label: YCF15 A/B chloroplast
definition: >-
  This entry represents the YCF15 (ycf15) protein family found in chloroplast genomes. YCF15 is a small protein found in plants, particularly within the Viridiplantae lineage including eudicotyledons and monocotyledons. The protein is encoded by chloroplast DNA and is localised to the chloroplast. YCF15 is present in various plant families including Asteraceae, Malvaceae, and Fabaceae. The protein may exist as duplicated copies (ycf15-A and ycf15-B) in some species. In some lineages, ycf15 may represent a pseudogene that has lost function during evolution. The specific function of this chloroplast protein family remains to be determined.
