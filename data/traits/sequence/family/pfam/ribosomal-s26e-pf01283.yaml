identifier: Pfam:PF01283
label: Ribosomal protein S26e
definition: >-
  This family represents the small ribosomal subunit protein eS26 (previously known as S26) which is found mainly in eukaryotes and includes mammalian S26; Octopus S26; Drosophila S26 (DS31); plant cytoplasmic S26; and fungal S26. S26 may be involved in the attachment of eIF3 and poly (U). Disruption of RPS26, the gene encoding a homologue of ribosomal protein small subunit S26 in yeast (S. cerevisiae), resulted in the formation of micro-colonies, suggesting that it is important for the normal cell growth of S. cerevisiae. This entry also includes uncharacterised archaeal sequences. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like projections that extend into…
