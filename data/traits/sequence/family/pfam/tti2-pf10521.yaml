identifier: Pfam:PF10521
label: 'Tti2 family '
definition: >-
  This family includes budding yeast Tel2-interacting protein 2 (Tti2) and similar proteins from animals and fungi. Tti2 is a component of the tel2-tti1-tti2 (TTT) complex, which is involved in the cellular resistance to DNA damage stresses, like ionizing radiation (IR), ultraviolet (UV) and mitomycin C (MMC). Its homologue from humans, together with the TTT complex and HSP90, may participate in the proper folding of newly synthesised phosphatidylinositol 3-kinase-related protein kinase (PIKK) proteins. In fission yeast, it was shown that the TTT complex stabilizes protein levels of the phosphatidylinositol 3-kinase-related protein kinase (PIKK) family proteins.
