identifier: Pfam:PF06988
label: NifT/FixU protein
definition: >-
  This family consists of several NifT and FixU bacterial proteins. The function of NifT is unknown although it is thought that the protein may be involved in biosynthesis of the FeMo cofactor of nitrogenase although perturbation of nifT expression in Klebsiella pneumoniae has only a limited effect on nitrogen fixation.
