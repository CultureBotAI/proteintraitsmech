label: RTA1 like protein
definition: >-
  This family is comprised of fungal proteins with multiple transmembrane regions. RTA1 ( ) is involved in resistance to 7-aminocholesterol, while RTM1 ( ) confers resistance to an unknown toxic chemical in molasses. RSB1 is also a member of this family; it is sphingoid long-chain base transporter.
