identifier: Pfam:PF03737
label: Aldolase/RraA
definition: >-
  This entry represents the regulator of ribonuclease E activity A (RraA). These proteins contain a swivelling 3-layer β/β/α domain that appears to be mobile in most multi-domain proteins known to contain it. These proteins are structurally similar, and may have distant homology, to the phosphohistidine domain of pyruvate phosphate dikinase. The RraA fold is an ancient platform that has been adapted for a wide range of functions. RraA had been identified as a putative demethylmenaquinone methyltransferase and was annotated as MenG, but further analysis showed that RraA lacked the structural motifs usually required for methylases. This entry also includes the Bifunctional 3-hexulose-6-phosphate synthase/demethylmenaquinone methyltransferase, in which it covers the C-terminal region.
