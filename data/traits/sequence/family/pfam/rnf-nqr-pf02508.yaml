identifier: Pfam:PF02508
label: Rnf-Nqr subunit, membrane protein
definition: >-
  This is a family of integral membrane proteins including Rdf complex subunits RnfA and RnfE and Na+-translocating NADH:ubiquinone oxidoreductase (Na+-NQR) subunits NqrD and NqrE. The Rnf complex is a ferredoxin:NAD+ oxidoreductase that appears to translocate different ions (protons or sodium) in different bacteria. The similarity of RnfD to NADH-ubiquinone oxidoreductases was previously noted.
