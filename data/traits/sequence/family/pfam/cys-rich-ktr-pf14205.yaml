identifier: Pfam:PF14205
label: Cysteine-rich KTR
definition: >-
  This family of proteins is functionally uncharacterised. Family members are found in bacteria and viruses. Proteins in this family are approximately 60 amino acids in length. There are 4 conserved cysteines and a conserved KTR sequence motif.
