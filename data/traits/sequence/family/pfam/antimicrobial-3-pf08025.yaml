identifier: Pfam:PF08025
label: Spider antimicrobial peptide
definition: >-
  This family includes antimicrobial peptides isolated from the crude venom of the wolf spider Oxyopes kitabensis (Wolf spider). These peptides, known as oxyopinins, are the largest linear cationic amphipathic peptides chemically characterised and exhibit disrupting activities towards biological membranes.
