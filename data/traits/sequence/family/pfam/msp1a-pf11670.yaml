identifier: Pfam:PF11670
label: Major surface protein 1a (MSP1a)
definition: >-
  MSP1a is part of the A.marginale major surface protein 1 (MSP1) complex and exists as a heterodimer with MSP1b. The complex has adhesive functions in bovine erythrocytes invasion.
