identifier: Pfam:PF15158
label: Cation channel sperm-associated auxiliary subunit TMEM249
definition: >-
  This family of transmembrane proteins is found in eukaryotes and includes Cation channel sperm-associated auxiliary subunit TMEM249 (also referred to as C8orfK29). It is an auxiliary component of the CatSper complex, a complex involved in sperm cell hyperactivation. TMEM249 contributes to the assembly of the CatSpermasome.
