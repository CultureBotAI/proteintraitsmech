identifier: Pfam:PF09676
label: Type IV conjugative transfer system lipoprotein (TraV)
definition: >-
  This entry represents TraV, a component of a conjugative type IV secretion system. TraV is an outer membrane lipoprotein that is believed to interact with the secretin TraK. It is involved in F pilus assembly, appearing to facilitate the polymerization of inner membrane-located pilin subunits into extracellular F pilus filaments. This protein contains three conserved cysteines in the N-terminal half.
