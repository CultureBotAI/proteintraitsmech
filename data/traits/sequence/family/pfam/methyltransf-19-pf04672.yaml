identifier: Pfam:PF04672
label: S-adenosyl methyltransferase
definition: >-
  This family contains a SAM (S-adenosyl methyltransferase) domain, with a central β sheet with 3 α-helices on both sides. Crystal packing analysis of the structure of suggests that a monomer is the solution state oligomeric form. An unidentified ligand (UNL, cyan) was found at the putative active site surrounded by the residues His57, His170, Phe171, Tyr216 and Met22. The UNL is likely to be a phenylalanine or phenylalanine-like molecule.
