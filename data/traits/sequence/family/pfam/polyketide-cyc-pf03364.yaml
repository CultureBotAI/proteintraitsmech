identifier: Pfam:PF03364
label: Polyketide cyclase / dehydrase and lipid transport
definition: >-
  This entry represents the START domain found in polyketide cylcases/dehydrases such as TcmN and in coenzyme Q-binding protein COQ10. COQ10 is required for the function of coenzyme Q in the respiratory chain and has a steroidogenic acute regulatory protein-related lipid transfer (START) domain, known to bind specific lipids in other START domain family members.
