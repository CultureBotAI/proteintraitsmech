identifier: Pfam:PF02606
label: Tetraacyldisaccharide-1-P 4'-kinase
definition: >-
  Tetraacyldisaccharide 4'-kinase (LpxK) phosphorylates the 4'-position of a tetraacyldisaccharide 1-phosphate precursor (DS-1-P) of lipid. This enzyme is involved in the synthesis of lipid A portion of the bacterial lipopolysaccharide layer (LPS). It is organised into two α/β/α sandwich domains linked by a two-stranded β-sheet.
