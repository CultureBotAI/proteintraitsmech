identifier: Pfam:PF15582
label: Immunity protein 65
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved YxC motif. They are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, which usually contains toxin domains of the Tox-JAB1 family. The immunity protein typically contains a signal peptide and a lipobox.
