identifier: Pfam:PF11073
label: 'Rift valley fever virus non structural protein (NSs) like '
definition: >-
  This family contains several Phlebovirus non structural proteins which act as a major determinant of virulence by antagonising interferon-beta gene expression. It also includes the hypotetical protein FPV063 from Fowlpox virus.
