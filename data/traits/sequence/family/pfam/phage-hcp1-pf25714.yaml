identifier: Pfam:PF25714
label: Head completion protein 1, phage connector
definition: >-
  This entry represents the phage Head completion protein 1 (HCP1) that forms part of the connector complex between the phage capsid and tail in lactococcal phages. This protein has been characterised in Lactococcus phage p2, a member of the Skunavirus genus (formerly 936 group of lactococcal phages), which infects Lactococcus lactis. This protein exhibits an open central channel for viral DNA ejection and plays a crucial role in the morphogenesis of the virion after genome packaging. In lactococcal phage p2, this protein (ORF-8) is located at a position normally occupied by the first head completion protein, binding to both the portal protein and the stopper (head completion protein 2). The connector complex is essential for the packaging of phage DNA inside the capsid and subsequent DNA release during host infection. Similar head completion proteins are likely present in other members of the Skunavirus genus that infect dairy-relevant Lactococcus strains.
