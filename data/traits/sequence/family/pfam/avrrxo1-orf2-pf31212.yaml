identifier: Pfam:PF31212
label: AvrRxo1 antitoxin
definition: >-
  This entry represents AvrRxo1-ORF2, an antitoxin protein found in Xanthomonas oryzae pv. oryzicola ( ) and related plant pathogenic bacteria. The protein adopts a novel fold comprising four α-helices. The first helix mediates homodimerisation, while helices two to four form a kinase-binding domain that occupies the substrate-binding cavity of the type III effector AvrRxo1-ORF1, a T4 polynucleotide kinase-like toxin. Two molecules each of ORF1 and ORF2 form a stable heterotetramer. AvrRxo1-ORF2 suppresses the bacteriostatic activity of AvrRxo1-ORF1 in bacterial cells and inhibits plant cell death when co-expressed with AvrRxo1-ORF1. Despite being encoded adjacent to a type III secretion effector, AvrRxo1-ORF2 has no structural similarity to characterised T3S effector-binding chaperones and instead functions as an antitoxin.
