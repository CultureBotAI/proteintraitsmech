identifier: Pfam:PF03134
label: TB2/DP1, HVA22 family
definition: >-
  This family includes members from a wide variety of eukaryotes and includes Receptor expression-enhancing proteins (REEPs), its homologues from fungi Yop1 and similar sequences from plants. REEP/DP1/Yop1 family of proteins are involved in the control of endoplasmic reticulum organisation and mutations in some members of this family are associated with inherited diseases like Hereditary spastic paraplegias (HSPs). REEP5, also known as TB2/DP1 (deleted in polyposis) protein, plays an essential role in heart function and development by regulating the organization and function of the sarcoplasmic reticulum in cardiomyocytes. In human is deleted in severe forms of familial adenomatous polyposis, an autosomal dominant oncological inherited disease. The family also includes the plant protein of known similarity to TB2/DP1, the HVA22 abscisic acid-induced protein, which is thought to be a regulatory protein.
