identifier: Pfam:PF06806
label: Putative excisionase (DUF1233)
definition: >-
  This entry represents XisR, an excisionase that induces excision of the Rac prophage, a cryptic prophage harbouring several genes with important physiological functions. XisR binds to and shifts the right attachment site of Rac, facilitating prophage excision.
