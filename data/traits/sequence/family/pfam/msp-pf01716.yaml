identifier: Pfam:PF01716
label: Manganese-stabilising protein / photosystem II polypeptide
definition: >-
  In PSII, the oxygen-evolving complex (OEC) is responsible for catalysing the splitting of water to O(2) and 4H+. The OEC is composed of a cluster of manganese, calcium and chloride ions bound to extrinsic proteins. In cyanobacteria there are five extrinsic proteins in OEC (PsbO, PsbP-like, PsbQ-like, PsbU and PsbV), while in plants there are only three (PsbO, PsbP and PsbQ), PsbU and PsbV having been lost during the evolution of green plants. This family represents the PSII OEC protein PsbO, which appears to be the most important extrinsic protein for oxygen evolution. PsbO lies closest to the Mn cluster where water oxidation occurs, and has a stabilising effect on the Mn cluster. As a result, PsbO is often referred to as the Mn-stabilising protein (MSP), although none of its amino acids are likely ligands for Mn. Calcium ions were found to modify the conformation of PsbO in solution. PSII is a multisubunit protein-pigment complex containing polypeptides both intrinsic and extrinsic to the photosynthetic membrane. Within the core of the complex, the chlorophyll and β-carotene pigments are mainly bound to the antenna proteins CP43 (PsbC) and CP47 (PsbB), which pass the excitation energy on to the reaction centre proteins D1 (Qb, PsbA) and D2 (Qa, PsbD) that bind all the redox-active cofactors involved in the energy conversion process. The PSII oxygen-evolving complex (OEC) oxidises water to provide protons for use by PSI, and consists of OEE1 (PsbO), OEE2 (PsbP) and OEE3 (PsbQ). The remaining subunits in PSII are of low molecular weight (less than 10kDa), and are involved in PSII assembly, stabilisation, dimerisation, and photo-protection. Oxygenic photosynthesis uses two multi-subunit photosystems (I and II) located in the cell membranes of cyanobacteria and in the thy…
