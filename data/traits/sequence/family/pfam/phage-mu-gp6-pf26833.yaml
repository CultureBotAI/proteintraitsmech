identifier: Pfam:PF26833
label: Phage Mu gene product 6
definition: >-
  This entry represents gene product 6 (gp6) found in bacteriophages. The prototype is from Escherichia phage Mu, a 76-amino-acid protein with a molecular weight of 8.5 kDa. Gp6 is an early protein expressed during the early phase of the viral replicative cycle. Expression is repressed by the viral Repc protein during latency and promoted by the viral Ner protein. The protein is localised to the host cell cytoplasm. The specific function of this protein remains to be determined. This entry also includes bacterial proteins.
