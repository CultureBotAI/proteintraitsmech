identifier: Pfam:PF24229
label: Staphylococcus phage terminal repeat-encoded protein TreK
definition: >-
  This entry represents terminal repeat-encoded proteins (TreK) found in Twort-like Staphylococcus phages. Twort-like viruses are members of the Myoviridae family and are characterised by large genomes (>125 kb) with a low G+C content (30-31%) and terminally redundant ends. These terminal repeats are several thousand base pairs long and may influence the host range. The TreK protein is encoded within these terminal repeat regions. Twort-like phages are known for their broad host range and strictly lytic life cycle, making them suitable candidates for phage therapy against Staphylococcus aureus infections. This domain is often found in various Staphylococcus phages, particularly those belonging to the Herelleviridae family. The protein is typically around 90-95 amino acids in length. While its exact function remains unknown, its conservation among Twort-like phages suggests it plays an important role in phage biology, possibly related to host range determination or genome packaging. Structure prediction shows these proteins form a globular domain that includes a five-stranded highly curved β-sheet with a C-terminal helix.
