identifier: Pfam:PF26875
label: Phage T4 Y06R protein
definition: >-
  This entry represents protein Y06R found in bacteriophages. The prototype is from bacteriophage T4, a 111 amino acid protein with a molecular weight of 13.1 kDa located in the e-segB intergenic region. The protein is also known as e.7 or msp2 and is found in the region between lysozyme and the tRNA genes. The function of this protein is unknown.
