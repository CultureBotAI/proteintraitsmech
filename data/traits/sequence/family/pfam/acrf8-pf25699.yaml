identifier: Pfam:PF25699
label: Anti-CRISPR protein AcrF8
definition: >-
  This entry represents AcrF8, an anti-CRISPR protein that inhibits the type I-F CRISPR-Cas system. AcrF8 is a 92-residue protein that occupies the cavity surrounded by Cas5f, Cas7.4-7.6f, and Cas8f subunits in the Csy complex. AcrF8 forms unique interactions with crRNA, making it distinct from other anti-CRISPR proteins against the Csy complex. Specifically, AcrF8 interacts with nucleobases of three nucleotides of crRNA (U[+21], U[+22], G[+23]) that are located just after the kink caused by the thumb of Cas7.5f. This interaction forms a continuous 4-nt region that interferes with DNA-crRNA hybridisation. AcrF8 thus prevents target DNA hybridisation to crRNA and subsequent DNA degradation by Cas3.
