identifier: Pfam:PF23701
label: Micropeptide inhibiting actin cytoskeleton
definition: >-
  This protein family includes human Micropeptide inhibiting actin cytoskeleton (MIAC) and similar sequences from vertebrates. MIAC is a 51-residues long protein that reduces filamentous actin fibres by interacting with aquaporin AQP2. It also inhibits the activation of the EREG/EGFR signalling pathway. Low expression of this micropeptide is associated with poor survival of head and neck squamous cell carcinoma (HNSCC).
