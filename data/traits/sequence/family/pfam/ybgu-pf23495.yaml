identifier: Pfam:PF23495
label: YbgU
definition: >-
  This protein family includes the uncharacterised protein YbgU from Escherichia coli and similar sequences from gammaproteobacteria. YbgU is a 35-residues micropeptide encoded by a small open reading frame (smORF) that overlaps another smORF, ybgV, on the same strand in another reading frame. Proteins 50 or fewer residues-long have been shown to regulate the functions of larger proteins in a variety of organisms.
