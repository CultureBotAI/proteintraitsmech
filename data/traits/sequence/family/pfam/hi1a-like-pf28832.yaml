identifier: Pfam:PF28832
label: U10-hexatoxin-Hi1a
definition: >-
  This entry represents a family of small venom peptides found in spiders, exemplified by U10-hexatoxin-Hi1a from Hadronyche infensa. The family is found across orb-weaver spiders (Araneoidea) including members of the Nephilidae and Araneidae families. These peptides are approximately 100-130 amino acids in length and are secreted from venom glands. The proteins contain multiple disulfide bonds and function as probable ion channel inhibitors. The family appears to have evolved through duplication and diversification of an ancient peptide-encoding gene.
