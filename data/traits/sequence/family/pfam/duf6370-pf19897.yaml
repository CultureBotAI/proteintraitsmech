label: Family of unknown function (DUF6370)
definition: >-
  This entry represents a family of proteins mainly found in bacteria and functionally uncharacterised. Some of the members included in this family are thought to be glutaminyl-tRNA synthetases. There are some conserved sequence motifs: CGxC, YFVD/EG and GDAH.
