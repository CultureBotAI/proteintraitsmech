identifier: Pfam:PF02377
label: Dishevelled specific domain
definition: >-
  This domain is specific to the signalling protein dishevelled. Dishevelled (Dsh/Dvl) is a highly conserved protein family that plays an important role in mediating Wnt signaling. Wnt signal transduction pathways control a variety of developmental and homeostatic events. Dishevelled is involved in both the canonical and non-canonical (B-catenin-independent) pathways. This domain is found adjacent to the PDZ domain ( ), often in conjunction with DEP ( ) and DIX ( ).
