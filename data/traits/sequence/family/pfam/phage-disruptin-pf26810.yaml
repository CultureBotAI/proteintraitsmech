identifier: Pfam:PF26810
label: Phage-encoded cationic antimicrobial peptide for lysis
definition: >-
  This entry represents the disruptin family, a class of phage lysis proteins required for outer membrane disruption during bacteriophage lysis of Gram-negative bacterial hosts. Disruptins are small cationic antimicrobial peptides that function as an alternative to spanins for outer membrane disruption. The prototype member is phiKT gp28, a 56-amino-acid protein with a net charge of +7 and predicted amphipathic helical structure. Unlike spanins, which form periplasm-spanning complexes connecting the inner and outer membranes, disruptins function through their similarity to cationic antimicrobial peptides (CAMPs). The protein localises to both inner and outer membranes and is thought to disrupt the outer membrane by competing for divalent cation binding sites in the lipopolysaccharide layer, thereby weakening the membrane's tensile strength. This makes the outer membrane susceptible to rupture after peptidoglycan degradation by the endolysin. Disruptins are found in approximately 15% of phages that infect Gram-negative bacteria and lack identifiable spanin genes. Synthetic gp28 exhibits antimicrobial activity comparable to the human cathelicidin LL-37 in standard bactericidal assays.
