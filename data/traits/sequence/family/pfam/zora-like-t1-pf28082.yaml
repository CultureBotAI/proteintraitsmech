identifier: Pfam:PF28082
label: Anti-phage protein ZorA, Zorya type I system
definition: >-
  This family includes anti-phage ZorA-like proteins found in bacteria. ZorA is a component of the antiviral defense Zorya type I system, composed of ZorA, ZorB, ZorC, and ZorD. The expression of Zorya type I system in E.coli (strain MG1655) confers resistance to phages SECphi7, lambda, and T7.
