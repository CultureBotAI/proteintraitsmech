identifier: Pfam:PF17104
label: YBL010C/LAA2
definition: >-
  This is a family of fungal sequences, including YBL010C (also known as LAA2) from S. cerevisiae and its orthologue from S. pombe, C8E11.05c. LAA2 is a clathrin adaptor (adaptin) accessory protein that physically interacts with and is involved in localization of clathrin adaptor protein complex-1 (AP-1).
