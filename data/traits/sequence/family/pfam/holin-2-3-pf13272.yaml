identifier: Pfam:PF13272
label: Putative 2/3 transmembrane domain holin
definition: >-
  Holin_2-3 is a putative holins with 2 or 3 transmembrane segments. It consists of many proteobacterial proteins ranging in size from about 70 aas to 120 aas. They have 2 or 3 predicted TMSs. Although some are annotated as phage proteins or holins, none appears to be functionally characterised.
