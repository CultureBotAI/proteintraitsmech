identifier: Pfam:PF01524
label: Geminivirus V2 protein
definition: >-
  This entry represents protein V2 and related proteins found in geminivirus. V2, through its interaction with host SGS3, acts as a suppressor of RNA-mediated gene silencing, also known as post-transcriptional gene silencing (PTGS), a mechanism of plant viral defence that limits the accumulation of viral RNAs. Disruption of the V2 gene in Tomato yellow leaf curl virus (TYLCV) stopped its ability to systemically infect Solanum lycopersicum (Tomato) (Lycopersicon esculentum) plants, suggesting that the V2 gene product is required for successful infection of the host.
