identifier: Pfam:PF06377
label: Adipokinetic hormone
definition: >-
  This family consists of several insect adipokinetic hormone as well as the related crustacean red pigment concentrating hormone (RPCH). Flight activity of insects comprises one of the most intense biochemical processes known in nature, and therefore provides an attractive model system to study the hormonal regulation of metabolism during physical exercise. In long-distance flying insects, such as the migratory locust, both carbohydrate and lipid reserves are utilised as fuels for sustained flight activity. The mobilisation of these energy stores in Locusta migratoria (Migratory locust) is mediated by three structurally related adipokinetic hormones (AKHs), which are all capable of stimulating the release of both carbohydrates and lipids from the fat body.
