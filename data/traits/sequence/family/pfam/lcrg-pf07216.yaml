identifier: Pfam:PF07216
label: LcrG protein
definition: >-
  LcrG is found in type III secretion operons, along with LcrR, H and V. LcrG is a negative regulator for secretion of Yersinia outer-membrane proteins (Yops) by blocking the secretion apparatus from the inner membrane. Also known as PcrG in Pseudomonas, the protein is believed to make a 1:1 complex with PcrV (LcrV). Mutations in LcrG cause premature secretion of effector proteins into the medium.
