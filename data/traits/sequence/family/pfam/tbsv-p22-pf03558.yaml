identifier: Pfam:PF03558
label: TBSV core protein P21/P22
definition: >-
  Two small nested genes (p19 and p22) are located near the 3' end of the genome of tomato bushy stunt virus (TBSV) -the p19 gene encodes a soluble protein, whereas the p22 gene specifies a membrane-associated protein. p22 is required for cell-to-cell movement in all plants tested.
