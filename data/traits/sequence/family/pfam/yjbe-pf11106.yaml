identifier: Pfam:PF11106
label: Exopolysaccharide production protein YjbE
definition: >-
  YjbE is part of a four gene operon which is involved in exopolysaccharide production. The expression of YjbE is higher than the rest of the operon yjbEFGH. It is predominantly found in Enterobacteriaceae and Erwiniaceae.
