identifier: Pfam:PF15161
label: Neuropeptide-like
definition: >-
  Nicol protein (also known as C4ORF48 in humans) is a small secreted protein crucial for lumicrine signalling. It forms a complex with NELL2, facilitating sperm maturation in the epididymis. Males lacking NICOL are sterile, but fertility can be restored by NICOL expression in testicular germ cells, highlighting its importance in male reproduction.
