identifier: Pfam:PF01778
label: Ribosomal L28e protein family
definition: >-
  Ribosomal protein eL28 forms part of the 60S ribosomal subunit. This entry is found in eukaryotes. In rat there are 9 or 10 copies of the eL28 gene. The eL28 protein contains a possible internal duplication of 9 residues. In budding yeast, Mak16 forms part of the 66S pre-ribosomal particles and functions as a transacting actor involved in rRNA processing. This entry represents a ribosomal L28e domain that also matches the N-terminal region of Mak16.
