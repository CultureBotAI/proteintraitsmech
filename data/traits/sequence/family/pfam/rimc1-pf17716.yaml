identifier: Pfam:PF17716
label: RAB7A-interacting MON1-CCZ1 complex subunit 1
definition: >-
  RAB7A-interacting MON1-CCZ1 complex subunit 1 (RIMC1, previously known as UPF0600 protein C5orf51) plays an important role in the removal of damaged mitochondria via mitophagy by controlling the stability and localization of RAB7A. It is required for the recruitment of RAB7A and ATG9A vesicles to damaged mitochondria and promotes the stability of RAB7A by inhibiting its proteasomal degradation during mitophagy.
