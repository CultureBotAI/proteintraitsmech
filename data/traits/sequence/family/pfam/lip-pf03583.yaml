identifier: Pfam:PF03583
label: 'Secretory lipase '
definition: >-
  This entry represents a family of secreted lipases. Family members include the LIP lipases from Candida albicans, which are expressed and secreted during the infection cycle of these pathogens. This entry also includes trichothecene C-3 esterase (also known as Tri8) from Fusarium sporotrichioides. It is part of the core gene cluster that mediates the biosynthesis of trichothecenes, a very large family of chemically related bicyclic sesquiterpene compounds acting as mycotoxins, including T2-toxin. Also included in this family is lactone esterase (also known as lipase-like enzyme SBLE), which is responsible for the lactonization of acidic sophorolipids.
