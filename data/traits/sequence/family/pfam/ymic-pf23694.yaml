identifier: Pfam:PF23694
label: YmiC-like
definition: >-
  This entry represents a group of proteins from enterobacterales, including YmiC from Escherichia coli, an uncharacterised predicted protein about 32 amino acids long predicted to be a membrane protein based on conservation across multiple gammaproteobacteria with constant length and hydrophobic character. Expression was verified for a construct with an added C-terminal epitope. Homologues tend to show a pattern of conservative amino acid substitutions. A usual feature is three perfectly invariant Trp residues, and a highly conserved fourth, in a stretch of 19 residues. They are predicted to adopt an α-helical configuration.
