identifier: Pfam:PF26620
label: Family of unknown function (DUF8197)
definition: >-
  This entry represents a group of uncharacterised proteins mainly from bacteria. These proteins are small in size and are predicted to adopt a single α-helix. One member, PA3496 from Pseudomonas aeruginosa, was shown to be upregulated in the presence of inulin or inulin-derived fructooligosaccharide.
