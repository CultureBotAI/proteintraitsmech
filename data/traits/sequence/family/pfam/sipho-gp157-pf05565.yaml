identifier: Pfam:PF05565
label: Siphovirus Gp157
definition: >-
  This family contains both viral and bacterial proteins which are related to the Gp157 protein of the Streptococcus thermophilus SFi bacteriophage. It is thought that bacteria possessing the gene coding for this protein have an increased resistance to the bacteriophage.
