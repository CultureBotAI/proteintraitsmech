identifier: Pfam:PF03702
label: Anhydro-N-acetylmuramic acid kinase
definition: >-
  This entry represents the enzyme Anhydro-N-acetylmuramic acid kinase, predominantly found in bacteria. This protein catalyses the specific phosphorylation of 1,6-anhydro-N-acetylmuramic acid (anhMurNAc) with the simultaneous cleavage of the 1,6-anhydro ring, generating MurNAc-6-P. It is also required for the utilisation of anhMurNAc, either imported from the medium, or derived from its own cell wall murein, and in so doing plays a role in cell wall recycling. This family also includes Levoglucosan kinase from the oleaginous yeast Lipomyces starkeyi, which catalyses the transfer of a phosphate group from ATP to levoglucosan (1,6-anhydro-beta-D-glucopyranose, LG) to yield glucose 6-phosphate in the presence of magnesium ion and ATP.
