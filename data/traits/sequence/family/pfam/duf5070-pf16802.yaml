identifier: Pfam:PF16802
label: Domain of unknown function (DUF5070)
definition: >-
  This protein family is specific to Chlamydia. Members of this group had initially been related to a divalent cation transcription repressor. However, protein CT296 from Chlamydia trachomatis , which show structural features typical of non-heme Fe(II) 2-oxoglutarate-dependent enzymes, contradicts this statement. The specific function of these proteins is not known.
