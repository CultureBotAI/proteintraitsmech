identifier: Pfam:PF02455
label: Hexon-associated protein (IIIa)
definition: >-
  The major capsid protein of the adenovirus strain is also known as a hexon. This entry represents protein IIIa, which is a hexon-associated protein that is likely to participate in vertex stabilisation and genome packaging. It stabilises vertices by tethering the penton bases to neighbouring peripentonal hexons, and lashes peripentonal hexons to the neighbouring hexons through its interaction with hexon-linking protein. During virus assembly, it seems to play a role in packaging of viral DNA via its interaction with packaging protein 3.
