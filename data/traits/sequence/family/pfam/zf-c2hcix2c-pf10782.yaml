identifier: Pfam:PF10782
label: Zinc-finger
definition: >-
  This entry represents a family of proteins predominantly found in Firmicutes, including Uncharacterized protein YpeQ from Bacillus subtilis. Members of this group adopt the structure of a zinc-finger domain of the C2HC type with an additional cysteine. They have no known function.
