identifier: Pfam:PF18919
label: Family of unknown function (DUF5670)
definition: >-
  Members of this family are very small (about 45 amino acids) and highly hydrophobic, containing two transmembrane helices, and have a broad phylogenetic distribution, mainly found in bacteria and a few archaeal species. There is a single completely conserved residue W that may be functionally important. Lmo0937, from the pathogen Listeria monocytogenes, is described as up-regulated when the bacterium is in the mouse spleen, suggesting a role in stress response.
