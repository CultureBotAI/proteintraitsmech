identifier: Pfam:PF26818
label: Phage YlcG protein
definition: >-
  This entry represents the family of YlcG ( ) from the DLP12 prophage region of Eschichia coli K-12, and homologues from the Gifsy-1 and Gifsy-2 prophage regions of Salmonella enterica subsp. enterica serovar Typhimurium str. LT2. Members of this family are small, about 46 amino acids long. YlcG is known to be expressed. It is encoded immediately downstream of the Holliday junction resolvase RusA by the cryptic lambdoid prophage DLP12.
