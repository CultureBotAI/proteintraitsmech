identifier: Pfam:PF17222
label: Viral cysteine endopeptidase C107
definition: >-
  This is a family of viral cysteine endopeptidases that process RNA polyproteins (MEROPS family C107). Processing sites have been identified in the mesonivirus. The endopeptidase is described as "3C-like" and probably has a trypsin-like fold. Site directed mutagenesis suggest that residues His-1434 and Cys-1539 form the catalytic dyad.
