identifier: Pfam:PF04485
label: 'Phycobilisome degradation protein nblA '
definition: >-
  In the cyanobacterium Synechococcus species PCC 7942 ( ), nblA triggers degradation of light-harvesting phycobiliproteins in response to deprivation nutrients including nitrogen, phosphorus and sulphur. The mechanism of nblA function is not known, but it has been hypothesised that nblA may act by disrupting phycobilisome structure, activating a protease or tagging phycobiliproteins for proteolysis. Members of this family have also been identified in the chloroplasts of some red algae.
