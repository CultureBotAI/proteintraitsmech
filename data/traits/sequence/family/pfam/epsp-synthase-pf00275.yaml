identifier: Pfam:PF00275
label: EPSP synthase (3-phosphoshikimate 1-carboxyvinyltransferase)
definition: >-
  This entry represents the core domain of 3-phosphoshikimate 1-carboxyvinyltransferase and UDP-N-acetylglucosamine 1-carboxyvinyltransferase. These proteins transfer enolpryruvate from phosphoenolpyruvate to 3-phosphoshikimate and UDP-N-acetyl-alpha-D-glucosamine respectively. The domain can also be found in the fungal Pentafunctional AROM polypeptide (also known as 3-dehydroquinate synthase), although is this case it does not cover the whole protein but appears in association with other domains such as . This protein catalyses 5 consecutive enzymatic reactions in prechorismate polyaromatic amino acid biosynthesis.
