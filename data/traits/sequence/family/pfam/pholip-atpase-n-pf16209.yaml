identifier: Pfam:PF16209
label: Phospholipid-translocating ATPase N-terminal
definition: >-
  This domain is found at the N terminus of a number of phospholipid-translocating ATPases in eukaryotes. It plays a key role in specific subcellular localization of these ATPases to endosomal compartments.
