identifier: Pfam:PF10109
label: Phage tail assembly chaperone proteins, E, or 41 or 14
definition: >-
  This entry includes a set of bacteriophage proteins, Tail assembly protein E and E', also known as TAC (tail assembly chaperone) which promote tail assembly by creating a scaffold for the tail tube proteins. Tail assembly proteins E and E' would wrap the linear tape measure protein to create a tail assembly scaffold.
