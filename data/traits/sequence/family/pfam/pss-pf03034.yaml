identifier: Pfam:PF03034
label: Phosphatidyl serine synthase
definition: >-
  Phosphatidyl serine synthase is also known as serine exchange enzyme ( ). This family represents eukaryotic PSS I and II, membrane bound proteins that catalyse the replacement of the head group of a phospholipid (phosphotidylcholine or phosphotidylethanolamine) by L-serine. Proteins in this entry include Pss from Drosophila melanogaster. Pss has been shown to regulate cell growth, lipid storage and mitochondrial function.
