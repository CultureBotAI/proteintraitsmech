identifier: Pfam:PF20188
label: Family of unknown function (DUF6551)
definition: >-
  This presumed domain is functionally uncharacterised. This domain family is found in bacteria, and is approximately 200 amino acids in length. Many sequences are related to ParB proteins, annotated as ParB-like or ParB domain-containing proteins. It contains the conserved motifs YQR, DGQH and EAxxF.
