identifier: Pfam:PF11061
label: Cytochrome b6f, subunit Tsr0524-like
definition: >-
  This family of proteins is predominantly found in cyanobacteria and red algae, including Uncharacterized protein ORF65 from Porphyra purpurea , Tsr0524 from Thermosynechococcus vestitus and Cytochrome b6-f regulatory subunit PetP. Tsr0524 (also known as PetP) is a component of the cyanobacterial cytochrome b6f that may play an essential role in the regulation of photosynthetic electron transport. It shows an SH3 domain fold with five antiparallel β-sheets. PetP probably modulates the balance between linear electron transfer and cyclic electron transfer reactions of the cytochrome b6-f complex. The cytochrome b6-f complex mediates electron transfer between photosystem II (PSII) and photosystem I (PSI), cyclic electron flow around PSI, and state transitions.
