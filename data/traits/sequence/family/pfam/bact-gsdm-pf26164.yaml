identifier: Pfam:PF26164
label: Bacterial Gasdermin Family
definition: >-
  This entry represents a group of gasdermin proteins found in bacteria and fungi. Gasodermin is involved in defence against bacteriophages. Members of this family are precursors of pore-forming proteins that, upon activation by specific proteases, release an active N-terminal moiety. This active form inserts into membranes, forming large, homooligomeric ring-shaped pores that lead to membrane permeabilisation and cell death, likely through a pyroptosis-like mechanism. The proteins exhibit structural similarity to mammalian gasdermins, with a marked resemblance in their N-terminal domains. The C-terminal region stabilises the inactive state, while activation involves significant structural rearrangements, including the formation of β-stranded transmembrane 'fingers' from α helices. These proteins provide significant protection against certain bacteriophages when expressed in bacterial systems.
