identifier: Pfam:PF02956
label: TT viral orf 1
definition: >-
  This entry represents the capsid protein of Torque teno virus and related Anelloviridae, which self-assembles to form an icosahedral capsid with T=1 symmetry, approximately 30 nm in diameter and consisting of 60 capsid proteins. The capsid encapsulates the genomic DNA and is involved in attachment to and entry into the host cell. Torque teno virus was isolated initially from a Japanese patient with hepatitis of unknown aetiology and has since been found to infect both healthy and diseased individuals. Prevalence studies have raised questions about its role in unexplained hepatitis. The capsid protein is encoded by ORF1 and is approximately 750 residues in length.
