identifier: Pfam:PF08259
label: Periviscerokinin family
definition: >-
  Perviscerokinin neuropeptides are found in the abdominal perisympathetic organs of insects. They mediate visceral muscle contractile activity (myotropic activity). CAPA, which are in the periviscerokinin and pyrokinin peptide families, has potential medical importance. This is due to its myotropic effects on, for example, heart muscles and due to its occurrence in the Ixodoidea (ticks), which are important vectors in the transmission of many animal diseases. These peptides also have a strong diuretic or anti-diuretic effect, suggesting they have significant medical implications.
