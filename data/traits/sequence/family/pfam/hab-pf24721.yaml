identifier: Pfam:PF24721
label: Half a barrel family
definition: >-
  This entry represents a region found in proteins possibly related to plasmid partitioning. This domain is composed of two copies of this region each of which forms three strands of a 6-stranded β-barrel. This entry is named the HAB region for Half A Barrel. The β-barrel is capped at one end by two short β-strands, one from each region and at the other end of the barrel by a pair of longer α-helices, again one contributed by each subunit.
