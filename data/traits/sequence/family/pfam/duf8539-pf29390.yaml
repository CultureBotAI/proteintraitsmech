identifier: Pfam:PF29390
label: Family of unknown function (DUF8539)
definition: >-
  This entry represents a family of small proteins of approximately 54-55 amino acids found exclusively in tailed bacteriophages. The family is restricted to the class Caudoviricetes, particularly members of the family Demerecviridae. Within this family, the proteins are found in the genera Tequintavirus and Epseptimavirus. The function of these proteins remains to be determined.
