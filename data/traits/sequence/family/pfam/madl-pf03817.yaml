identifier: Pfam:PF03817
label: Malonate transporter MadL subunit
definition: >-
  The MSS family includes the monobasic malonate:Na+ symporter of Malonomonas rubra. It consists of two integral membrane proteins, MadL and MadM. The transporter is believed to catalyse the electroneutral reversible uptake of H+-malonate with one Na+, and both subunits have been shown to be essential for activity.
