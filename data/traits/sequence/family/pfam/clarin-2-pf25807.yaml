identifier: Pfam:PF25807
label: Clarin-2-like
definition: >-
  The clarin family consists of clarin-1, clarin-2 and clarin-3. Clarin-1 is a four-transmembrane protein expressed in cochlear hair cells and neural retina. It is also known as Usher syndrome type-3 protein, as mutations in the gene coding for this protein cause Usher syndrome type 3 (USH3), which is a genetically heterogeneous condition characterised by the association of retinitis pigmentosa and sensorineural deafness. It may have a role in the excitatory ribbon synapse junctions between hair cells and cochlear ganglion cells, and presumably also in analogous synapses within the retina. The function of clarin-2 and clarin-3 is not clear. Clarin-2 is predicted to adopt an α-β configuration.
