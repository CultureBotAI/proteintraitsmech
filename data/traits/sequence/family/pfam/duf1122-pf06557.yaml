label: Protein of unknown function (DUF1122)
definition: >-
  This family consists of several hypothetical archaeal and bacterial proteins of unknown function, including from Aquifex aeolicus. The structure of this protein has been solved but its function remains unknown. Members of this family seem to have an acyl-CoA N-acyltransferase topology.
