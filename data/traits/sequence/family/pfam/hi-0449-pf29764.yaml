identifier: Pfam:PF29764
label: Uncharacterised lipoprotein HI_0449
definition: >-
  This entry represents an uncharacterised lipoprotein found in Haemophilus influenzae (HI_0449) and related Pasteurellaceae. The protein contains a prokaryotic membrane lipoprotein lipid attachment site and is a conserved surface-exposed protein. The function of this protein remains to be determined.
