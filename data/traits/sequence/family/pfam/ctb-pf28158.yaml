identifier: Pfam:PF28158
label: Cyanobacterial tandem bacteriocin
definition: >-
  This entry represents a family of cyanobacterial proteins named CTB (Cyanobacterial Tandem Bacteriocin) as multiple family members can be encoded in tandem in a single genome. Members of this family, which average about 85 amino acids in length, resemble class II bacteriocins. They show N-terminal sequence similarity to bacteriocin leader peptide domain and lack Cys residues (enriched in lanthipeptides as well as disulfide-forming bacteriocins) almost entirely. They are encoded next to homologues of families and , involved in bacteriocin cleavage and export.
