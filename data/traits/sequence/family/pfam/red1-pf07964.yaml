identifier: Pfam:PF07964
label: Rec10 / Red1
definition: >-
  Budding yeast Red1 is involved in meiotic recombination and chromosome segregation during homologous chromosome formation. Red1 is a component of the axial element protein cores in synaptonemal complexes (SC). Synaptonemal complexes are found at synapses between homologous chromosomes during meiosis, and form when sister chromatids condense upon axial elements. Besides its structural role in SC, Red1 also couples checkpoint signalling to SC formation.
