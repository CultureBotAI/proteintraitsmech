identifier: Pfam:PF11485
label: STK_08120-like
definition: >-
  This entry represents a family of proteins from thermoacidophile archaea that includes STK_08120 ( ) from Sulfurisphaera tokodaii. This protein shows three α-helices and a seven-stranded β-sheet. It may function as a carrier of fatty acids in their biosynthesis, metabolism, and/or intracellular transport processes. This entry also includes bacterial proteins with similar fold.
