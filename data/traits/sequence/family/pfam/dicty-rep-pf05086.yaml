identifier: Pfam:PF05086
label: Dictyostelium (Slime Mold) REP protein
definition: >-
  This family consists of REP proteins from a number of Dictyostelium species (Slime molds). REP protein is probably involved in transcription regulation and control of DNA replication, specifically the amplification of plasmid at low copy numbers. The formation of homomultimers may be required for their regulatory activity.
