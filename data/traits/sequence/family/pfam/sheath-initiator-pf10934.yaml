identifier: Pfam:PF10934
label: Contractile injection system sheath initiator
definition: >-
  This entry represents the sheath initiator protein found in contractile injection systems like diffocins, pyocins, and phage tail-like particles. The sheath initiator acts as an intermediate between the baseplate triplex and the first layer of the sheath, and between the tube tail and hub. It has a critical role in transmitting contraction signals from the baseplate wedge to the sheath through the N-terminal domain which binds to the core bundle of the triplex, while the C-terminal β-hairpin interacts with two sheath proteins on the first layer by forming a conserved handshake interface. The N-terminal loops of adjacent sheath initiators adopt different conformations to accommodate the symmetry mismatch between the baseplate wedge and hub. This entry was previously known as DUF2634.
