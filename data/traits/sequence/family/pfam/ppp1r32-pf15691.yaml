identifier: Pfam:PF15691
label: Protein phosphatase 1 regulatory subunit 32
definition: >-
  This entry represents the homologues of Stabilizer of axonemal microtubules 4 (SAXO4, formerly PPP1R32). SAXO4 belongs to a class of SAXO proteins that contain multiple Mn motifs that bind longitudinally along a single protofilament. In such proteins, Mn motitfs are speced 40 residues apart, corresponding to an apparent internal repeat of 8 nm. Mn motif consists of a 5- to 6-residue helix flanked by a Tyr/Phe residue on one end and by a Ser/Thr on the other that binds the shoulder of the α-tubulin S9/S10 loop. SAXO4 interacts with TEKT1 and bridges the tektin bundle with tubulin protofilaments close to the inner junction of axonemal doublet microtubules.
