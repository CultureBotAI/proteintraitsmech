identifier: Pfam:PF26471
label: Family of unknown function (DUF8146)
definition: >-
  This entry represents a C-terminal region from a family of uncharacterised proteins from halophilic archaea. The proteins in this family are predominantly found in the class Halobacteria, which includes families such as Haloferacaceae, Natrialbaceae, and Haloarculaceae. The proteins in this family are approximately 130-150 amino acids in length. This region is often associated with an N-terminal RHH domain.
