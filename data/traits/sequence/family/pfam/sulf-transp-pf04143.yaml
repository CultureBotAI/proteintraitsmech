identifier: Pfam:PF04143
label: Sulphur transport
definition: >-
  This family represents transporter proteins that are primarily involved in the uptake of thiosulfate, a sulfur-containing oxyanion. Members of this family are characterised by their ability to mediate the transport of thiosulfate across the cellular membrane, which is essential for sulfur metabolism in various organisms. The proteins have an hourglass-shaped architecture, which facilitates the binding and translocation of thiosulfate. The positively charged outer concave side of these transporters is likely involved in the initial interaction with thiosulfate ions. Proteins in this family contains several conserved glycines and an invariant cysteine that is probably an important functional residue.
