identifier: Pfam:PF06064
label: Host-nuclease inhibitor protein Gam
definition: >-
  This superfamily represents the host-nuclease inhibitor protein Gam. Structurally, it consists of 4 α helices, 2 long and 2 short. Within bacteriophage lambda protein Gam, one of the long helices (H4) acts as a dimerisation interface to form an antiparallel helix. The two short helices (H2 and H3) from each dimer form a 'cross-brace', while the other long helix (H1) protrudes out of the protein. Within bacteriophage lambda, Gam is involved in inhibiting host nucleases.
