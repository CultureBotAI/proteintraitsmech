identifier: Pfam:PF11046
label: Transcriptional repressor of hyc and hyp operons
definition: >-
  This family is conserved in gammaroteobacteria. It is likely to be the transcriptional repressor molecule for the hyc and hyp operons, which express, amongst others, the protein HycA. This protein may be harnessed for the reduction of technetium oxide, an unwelcome product of radio-nucleotide bioaccumulation. HycA produces formate hydrogenlyase, one of the key proteins necessary for metal compound reduction.
