identifier: Pfam:PF02007
label: Tetrahydromethanopterin S-methyltransferase MtrH subunit
definition: >-
  In archaea the enzyme tetrahydromethanopterin S-methyltransferase is composed of eight subunits, MtrA-H. The enzyme is a membrane- associated enzyme complex which catalyzes an energy-conserving, sodium-ion-translocating step in methanogenesis from hydrogen and carbon dioxide. Subunit MtrH catalyzes the methylation reaction and was shown to exhibit methyltetrahydromethanopterin:cob(I)alamin methyltransferase activity. CH3-H4MPT + cob(I)alamin -->H4MPT + CH3-cob(III)alamin (H4MPT = tetrahydromethanopterin) Methyltransferase MtxH from the archaea Methanosarcina may be part of a complex composed of 3 subunits; MtxA, MtxH and MtxX. This entry also includes methylcorrinoid:tetrahydrofolate methyltransferase (also known as [methyl-Co(III) glycine betaine-specific corrinoid protein]--tetrahydrofolate methyltransferase) from Desulfitobacterium hafniense, which in vitro catalyses the transfer of a methyl group from methylcobalamin to tetrahydrofolate. In vivo this may permit anaerobic methylotrophic growth using glycine betaine.
