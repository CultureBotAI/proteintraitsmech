identifier: Pfam:PF11650
label: P22 tail accessory factor
definition: >-
  The tail complex in bacteriophage P22, and related phages, mediates host cell attachment and DNA injection. Tail assembly is a complex event that is essential for the retention and stabilisation of the newly packaged DNA within the capsid. This process involves the sequential addition of three tail accessory factors (GP4, GP10, GP26) and the adhesion tailspike protein (GP9) to the capsid-bound portal protein. Gp4 is the first factor to attach after DNA packaging. Twelve monomeric subunits of GP4 bind to the exposed surface of the portal ring, beginning the tail assembly process. GP4 does not physically block the DNA entry/exit channel, but appears to act as a structural adaptor for the other tail accessory factors GP10 and GP26. Gp4 has been shown to have peptidoglycan hydrolase activity.
