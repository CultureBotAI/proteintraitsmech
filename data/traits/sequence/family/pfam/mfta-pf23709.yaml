identifier: Pfam:PF23709
label: Mycofactocin precursor peptide
definition: >-
  Mycofactocin precursor peptide MftA is the precursor peptide that leads to mycofactocin (MFT), a redox cofactor which belongs to the family of ribosomally synthesized and post-translationally modified peptides (RiPPs) and is involved in alcohol metabolism of mycobacteria including Mycobacterium tuberculosis. MftA suffers extensive post-translational modifications by enzymes encoded by adjacent genes, namely mftB, mftC, mftD, mftE, and mftF.
