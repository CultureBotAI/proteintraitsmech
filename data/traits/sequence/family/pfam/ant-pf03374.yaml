identifier: Pfam:PF03374
label: Phage antirepressor protein KilAC domain
definition: >-
  This entry represents the C-terminal domain of the antirepressor protein (Ant) from Enterobacteria phage P1. Prophages P1 and P7 exist as unit copy DNA plasmids in the bacterial cell. Maintenance of the prophage state requires the continuous expression of two repressors: (i) C1 is a protein which negatively regulates the expression of lytic genes including the C1 inactivator gene coi, and (ii) C4 is an antisense RNA which specifically inhibits the synthesis of an anti-repressor Ant. This domain, also known as KilAC domain, may be a DNA-binding domain of the viral regulatory proteins.
