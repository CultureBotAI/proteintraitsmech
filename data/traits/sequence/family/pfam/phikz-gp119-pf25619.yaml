identifier: Pfam:PF25619
label: Bacteriophage PhiKZ vertex-binding protein gp119
definition: >-
  This entry represents the vertex-binding protein gp119 from the jumbo bacteriophage PhiKZ that infects Pseudomonas aeruginosa. This α-helical protein forms part of the vertex-binding complex attached to the inner surface of the viral capsid. Gp119, along with gp28 and the gp85 dimer, forms a sandwich structure at the centre of the vertex-binding complex. It interacts with one major capsid protein (MCP) subunit in hexameric capsomer 1 and with gp91 (which binds to the pentameric capsomer), thereby bridging the pentameric capsomer and hexameric capsomer 1. Neighbouring vertex-binding complexes are connected via interactions between gp28 from one complex and gp119 from an adjacent complex. This protein plays a critical role in stabilising the capsid vertex by facilitating the connection between the pentameric capsomer and surrounding hexameric capsomers. Similar proteins are found in other jumbo phages, suggesting a conserved mechanism for capsid assembly and stabilisation in large viruses.
