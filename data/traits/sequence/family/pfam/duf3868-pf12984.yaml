identifier: Pfam:PF12984
label: Domain of unknown function (DUF3868)
definition: >-
  This domain of unknown function is found at the N-terminal of a group of proteins from bacteroidetes. The function of the proteins is not known, but the Bacteroides thetaiotaomicron gene appears to be up-regulated in the presence of host or other bacterial species compared to pure culture.
