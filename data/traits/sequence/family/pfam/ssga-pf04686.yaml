identifier: Pfam:PF04686
label: Streptomyces sporulation and cell division protein, SsgA
definition: >-
  SsgB is a conserved activator of developmental cell division in morphologically complex actinomycetes. It controls cell division and spore maturation in streptomycetes. Together with SsgA, SsgB activates sporulation-specific cell division by controlling the localisation of FtsZ. SsgB shows structural similarity to whirly ssDNA/guide RNA-binding proteins found in mitochondria or in plants, but the interaction of this protein with nucleic acids is unlikely. On the other hand, a conserved surface for protein-protein interaction has been identified and suggest that SsgB might be a binding partner.
