identifier: Pfam:PF26826
label: Mycobacteriophage gene 51 protein
definition: >-
  This entry represents gene 51 protein (Gp51) found in mycobacteriophages. Members of this family are small proteins of 65-67 amino acids, including those from mycobacteriophages L5 and D29. The function of this protein remains unknown.
