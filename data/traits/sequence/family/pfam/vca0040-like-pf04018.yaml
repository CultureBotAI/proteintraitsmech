identifier: Pfam:PF04018
label: Undecaprenyl phosphate translocase-like
definition: >-
  This entry represents a group of prokaryotic proteins associated with transmembrane transport of undecaprenyl phosphate lipids, which is required for the biogenesis of microbial cell surface polymers, including from Vibrio cholerae (VCA0040). Members of this family usually have between 6 and 9 predicted transmembrane segments.
