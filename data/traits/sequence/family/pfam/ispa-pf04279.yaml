identifier: Pfam:PF04279
label: 'Intracellular septation protein A '
definition: >-
  Inner membrane-spanning protein YciB (also known as intracellular septation protein A) is a family of proteins which are essential for both normal cell division and bacterial virulence and are believed to play a role in the septation process. These proteins play a role in cell envelope biogenesis, maintenance of cell envelope integrity and membrane homeostasis.
