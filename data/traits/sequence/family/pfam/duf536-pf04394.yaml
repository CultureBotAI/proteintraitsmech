identifier: Pfam:PF04394
label: Protein of unknown function, DUF536
definition: >-
  This entry represents the C-terminal coiled-coil region found in proteins predominantly from Firmicutes, including Regulator of chromosome segregation from Streptococcus pneumoniae (RocS). RocS is required for cell division and chromosome segregation. It binds to DNA and is involved in segregating the origin of replication (oriC) region to new daughter cells. When the nucleoid is not properly segregated, it is involved in blocking the cell division to protect the nucleoid against premature truncation by the newly forming septum, a function which is dependent on CpsD and its autophosphorylation level. This entry also includes Par protein ( , ) in which it mediates oligomerization. This region had previously been related with a theta-type replication mechanism.
