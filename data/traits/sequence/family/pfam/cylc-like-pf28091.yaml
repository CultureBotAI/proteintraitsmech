identifier: Pfam:PF28091
label: Acyl halogenase CylC-like
definition: >-
  This entry represents the homologues of CylC and related proteins mainly from cyanobacteria. CylC has been characterised as a halogenase involved in the biosynthesis of cylindrocyclophane. Another member of this family, cyanobacterial NocO, has recently been implicated in the biosynthesis of chlorosphaerolactylates and nocuolactylates. NocO had been suggested to play a role in the synthesis of natural oxadiazines such as nocuolin A (NoA, exhibits anti-proliferative activity against human cancer cell lines). Members of this family are also similar to cyanobacterial ColD and ColE, putative acyl halogenases involved in columbamide biosynthesis.
