label: Family of unknown function (DUF6210)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001448) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the malacidin A biosynthetic gene cluster from uncultured bacterium. This family appears to be predominantly found in bacteria.
