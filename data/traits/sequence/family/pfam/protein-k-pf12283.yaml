identifier: Pfam:PF12283
label: Bacteriophage protein K
definition: >-
  This family of proteins is found in the microviridae (isometric ssDNA phages) and are approximately 60 amino acids in length. The function of these proteins are unknown. In phi X174 site-directed mutagenesis of gene K produces small plaques on su- hosts. The mutant phage has an identical latent period, but a more reduced burst size than that of the wild-type phi X174. The reduced burst size in the gene K mutant suggests that the gene K protein, although not essential, has a role in increasing infectivity by increasing the burst size three to six fold.
