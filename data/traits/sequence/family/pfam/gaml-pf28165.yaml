identifier: Pfam:PF28165
label: Host nuclease inhibitor GamL-like
definition: >-
  This entry represents a family of proteins mainly found in tailed bacteriophages and prophages from Enterobacterales, including Host nuclease inhibitor GamL from the Enterobacteria phage phi80. Members of this family are phage inhibitors of host nucleases such as RecBCD and SbcCD. This family has a distant relationship to Gam (see ), which inhibits RecBCD.
