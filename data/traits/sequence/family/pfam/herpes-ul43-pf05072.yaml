identifier: Pfam:PF05072
label: Herpesvirus UL43 protein
definition: >-
  UL43 genes are expressed with true-late (gamma2) kinetics and have been identified as a virion tegument component. Studies suggest that the N-terminal sequences target UL43 to protein aggregates and that C-terminal sequences are important for incorporation into particles.
