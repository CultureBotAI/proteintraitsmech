identifier: Pfam:PF28285
label: RcgA-like
definition: >-
  RcgA (Rhizobial Conjugative Gene A), from a Rhizobium favelukesii plasmid, plays an essential role in a quorum-sensing-dependent conjugative transfer system. It is thought to be a transporter that allows uptake of a quorum-signalling lactone. Its partner protein, RgcR, with an α/β hydrolase domain, inhibits the transfer and may catabolise the signalling molecule.
