identifier: Pfam:PF27128
label: Rv1109c N-terminal bi-helical domain
definition: >-
  This entry represents the N-terminal bi-helical domain of uncharacterised protein Rv1109c from Mycobacterium tuberculosis and related mycobacteria. The Rv1109c protein has been detected in the cytosol, plasma membrane, and peptidoglycan-based cell wall fractions.
