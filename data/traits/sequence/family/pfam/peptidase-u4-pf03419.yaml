identifier: Pfam:PF03419
label: 'Sporulation factor SpoIIGA '
definition: >-
  Sporulation in bacteria such as Bacillus subtilis involves the formation of a polar septum, which divides the sporangium into a mother cell and a forespore. The sigma E factor, which is encoded within the spoIIG operon, is a cell-specific regulatory protein that directs gene transcription in the mother cell. Sigma E is synthesised as an inactive proprotein pro-sigma E, which is converted to the mature factor by the processing enzyme SpoIIGA, releasing an N-terminal peptide. The SpoIIGA peptidase (MEROPS peptidase family A36) is assumed to be an aspartic peptidase because of the presence of an Asp-Thr/Ser-Gly motif in which the Asp is an active site residue. The peptidase is active as a homodimer. SpoIIGA has five transmembrane helices at the N-terminal half of the molecule; the proteolytic activity is in the C-terminal half. Its tertiary structure is not known.
