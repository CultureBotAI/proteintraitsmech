identifier: Pfam:PF16208
label: Keratin type II head
definition: >-
  All intermediate filament proteins feature a central α-helical rod domain and variable nonhelical domains located at the N-terminal (head) and C-terminal (tail). The central rod domain is the main driver of self-assembly into filaments, whereas the N- and C-terminal domains are involved in post-translational modifications and interactions with other proteins. Type I and type II keratin form heteropolymeric intermediate filaments providing vital mechanical support in epithelia. This entry represents the N-terminal domain (head) of type II keratins.
