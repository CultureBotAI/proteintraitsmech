identifier: Pfam:PF01153
label: Glypican
definition: >-
  Glypicans are a family of heparan sulphate proteoglycans which are anchored to cell membranes by a glycosylphosphatidylinositol (GPI) linkage. Six members (GPC1-6) are known in vertebrates. The main function of glypicans is to regulate several signaling pathways, including those of Wnts, Hedgehogs, fibroblast growth factors and bone morphogenetic proteins (BMPs). Structurally, these proteins consist of three separate domains: A signal sequence; An extracellular domain of about 500 residues that contains 12 conserved cysteines probably involved in disulphide bonds and which also contains the sites of attachment of the heparan sulphate glycosaminoglycan side chains; A C-terminal hydrophobic region which is post-translationally removed after formation of the GPI-anchor.
