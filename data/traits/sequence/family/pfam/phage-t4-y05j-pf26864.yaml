identifier: Pfam:PF26864
label: Phage T4 Y05J protein
definition: >-
  This entry represents protein Y05J found in bacteriophages. The prototype is from bacteriophage T4, a small 34 amino acid protein with a molecular weight of 4.2 kDa located in the mobD-ri intergenic region. The protein is also known as mobD.2 or tk.-8 and is found in the nonessential region between the tk and nrdC genes. The function of this protein is unknown.
