identifier: Pfam:PF15996
label: Arginine/serine-rich protein PNISR
definition: >-
  Pinin (PNN) has been identified as central in the establishment and maintenance of corneal epithelial cell-cell adhesion. Three SR-rich proteins have been identified that interact with the C terminus of PNN; one of them is this 130kDa nuclear protein, SRrp130, also known as PNISR. SRrp130 is a protein of 805 amino acid residues with multiple arginine-serine (RS) repeats but had no RNA recognition motif. Its function is unknown.
