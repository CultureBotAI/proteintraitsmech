identifier: Pfam:PF08638
label: Mediator complex subunit MED14
definition: >-
  This entry represents the N-terminal domain found human Mediator of RNA polymerase II transcription subunit 14 (Med14) and its homologues. Med14 is a component of the Mediator complex, a coactivator involved in the regulated transcription of nearly all RNA polymerase II-dependent genes. Mediator functions as a bridge to convey information from gene-specific regulatory proteins to the basal RNA polymerase II transcription machinery. Mediator is recruited to promoters by direct interactions with regulatory proteins and serves as a scaffold for the assembly of a functional preinitiation complex with RNA polymerase II and the general transcription factors. Med14 along with Med17 are scaffold subunits in nucleating Mediator. The major portion of Med14 exists in the Head-Shoulder module of the Mediator and consists of nine tandem repeats (RM1 to RM9), which are arranged in an atypical right-handed helix. Saccharomyces cerevisiae (Baker's yeast) RGR1 mediator complex subunit affects chromatin structure, transcriptional regulation of diverse genes, and sporulation. It is required for glucose repression, HO repression, RME1 repression and sporulation. This subunit is also found in higher eukaryotes and MED14 is the agreed unified nomenclature for this subunit.
