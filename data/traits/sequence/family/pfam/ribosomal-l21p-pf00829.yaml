identifier: Pfam:PF00829
label: Ribosomal prokaryotic L21 protein
definition: >-
  This entry represents large ribosomal subunit protein bL21 (previously known as L21) that is found in bacteria and eukaryotic organelles such as chloroplast and mitochondria. This entry also includes the S. pombe Aco2 protein, a fusion of mitochondrial ribosomal protein bL21m (Mrpl49) and aconitase that has essential function in mitochondrial translation in fission yeast. bL21 consists of a small β-barrel-like domain that is connected to an extended loop. In Escherichia coli, bL21 is known to bind to the 23S rRNA in the presence of bL20. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups: Bacterial bL21 (old name L21). Marchantia polymorpha chloroplast bL21 (old name L21). Plant chloroplast bL21 (old name L21, nuclear-encoded). Bacterial bL21 is a protein of about 100 amino-acid residues, the mature form of the spinach chloroplast L21 has 200 residues.
