identifier: Pfam:PF02939
label: UcrQ family
definition: >-
  The ubiquinol-cytochrome C reductase complex (cytochrome bc1 complex) is a respiratory multi-enzyme complex, which recognises a mitochondrial targeting presequence. The bc1 complex contains 11 subunits: 3 respiratory subunits (cytochrome b, cytochrome c1 and Rieske protein), 2 core proteins and 6 low molecular weight proteins. This family represents the 9.5kDa subunit of the complex, known as subunit 8 or protein QP-C. This subunit together with cytochrome B binds to ubiquinone.
