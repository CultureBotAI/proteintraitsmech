identifier: Pfam:PF15015
label: Spermatogenesis-associated, N-terminal
definition: >-
  NYD-SP12, also known as SPATA16, is a germ-cell specific participant in the Golgi apparatus, and its expression is confined to spermatogenic epithelium, not being found in interstitial cells. Computer analysis of the protein-sequence showed that NYD-SP12 contains a cluster of phosphorylation sites for protein kinase C as well as for cyclic nucleotide-dependent protein kinases. It has been postulated that, since the mutation of some Golgi apparatus proteins is responsible for male infertility, NYD-SP12 might play a role in modification and sorting of acrosomal enzymes.
