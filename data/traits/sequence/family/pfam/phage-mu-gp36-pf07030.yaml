identifier: Pfam:PF07030
label: Bacteriophage Mu, Gp36
definition: >-
  This entry represents the Gene product J from Escherichia phage Mu (GpJ, previously known as Gp36) and similar proteins found in tailed bacteriophages and in bacterial prophages. The structure of GpJ shows a characteristic aromatic hydrophobic core. This protein might interact directly with the Head-tail connector (Gp29).
