identifier: Pfam:PF30667
label: Mitotic checkpoint protein BFA1
definition: >-
  Bfa1 is required for the spindle assembly checkpoint in budding yeast. It functions in the same pathway with Bub2 in one of the branches of the spindle assembly checkpoint which prevents cytokinesis before the completion of chromosome segregation. Bub2 and Bfa1 are also required for the maintenance of G2/M arrest in response to DNA damage and to spindle misorientation. The homologue of Bfa1 in fission yeast is Byr4, which together with Cdc16 (homologue of Bub2) forms a two-component GTPase-activating protein for Spg1 GTPase. Spg1 GTPase positively regulates septation and constriction of the actomyosin ring for cell division. Bfa1 and Bub2 may function as a universal checkpoint in response to various checkpoint signals to avoid improper mitotic exit.
