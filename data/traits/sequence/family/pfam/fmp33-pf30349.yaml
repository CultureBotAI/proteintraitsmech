identifier: Pfam:PF30349
label: Mitochondrial membrane protein FMP33
definition: >-
  This entry represents the mitochondrial membrane protein FMP33, found in budding yeasts (Saccharomycetaceae). FMP33 is a multi-pass membrane protein of approximately 180 residues that localises to the mitochondrial membrane. The protein contains three predicted transmembrane helices. FMP33 expression is induced by cell wall perturbation. The function of this protein remains to be determined.
