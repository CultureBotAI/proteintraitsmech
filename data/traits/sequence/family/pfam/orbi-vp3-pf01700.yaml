identifier: Pfam:PF01700
label: Orbivirus VP3 (T2) protein
definition: >-
  This entry represents the inner layer core protein VP3 from Orbiviruses, a family of Reoviruses that have dsRNA genomes of 10-12 linear segments. Orbiviruses include Broadhaven virus (BRD), Epizootic hemorrhagic disease virus and Bluetongue virus (BTV). The Orbivirus VP3 protein is part of the virus core and makes a 'subcore' shell made up of 120 copies of the 100K protein. VP3 particles can also bind RNA and are fundamental in the early stages of viral core formation. The structural core protein VP2 from BRD is similar to VP3 from BTV.
