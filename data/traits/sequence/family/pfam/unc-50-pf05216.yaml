identifier: Pfam:PF05216
label: UNC-50 family
definition: >-
  This family contains several eukaryotic transmembrane proteins which are related to the Caenorhabditis elegans protein UNC-50 . A mammalian homologue, UNCL is a novel inner nuclear membrane protein that associates with RNA and is involved in the cell-surface expression of neuronal nicotinic receptors. UNCL plays a broader role because UNCL homologues are present in two yeast and a plant species, none of which express nicotinic receptors and it is also found in tissues that lack nicotinic receptors.
