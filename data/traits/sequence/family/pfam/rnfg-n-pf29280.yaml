identifier: Pfam:PF29280
label: RnfG N-terminal region
definition: >-
  This entry represents a helix found at the N terminus of RnfG, the G subunit of the ion-translocating oxidoreductase complex. RnfG is part of a membrane-bound complex that couples electron transfer with translocation of ions across the membrane. The complex is composed of six subunits: RnfA, RnfB, RnfC, RnfD, RnfE and RnfG. The full-length RnfG protein contains a single-pass transmembrane helix within this N-terminal region and a C-terminal FMN-binding domain ( ).
