identifier: Pfam:PF22511
label: PolB1 Binding Protein 2
definition: >-
  This is a family of archaeal proteins, previously known as DUF6995, representing homologues of PolB1 binding protein 2 (PBP2) such as . PBP2, is a subunit of PolB1 enzyme that is a member of the archaeal B-family of DNA polymerases. PBP2 along with PBP1, associate with distinct surfaces of the larger catalytic subunit and influence the enzymatic properties of the DNA polymerase. Members of this family adopt a winged helix (HTH) fold ( ).
