identifier: Pfam:PF11478
label: Antimicrobial chitin binding protein tachystatin B
definition: >-
  Tachystatin B is an antimicrobial chitin binding peptide and consists of two isotopes B1 and B2. Both structures contain a short antiparallel β sheet with an inhibitory cysteine knot motif. Tyr(14) and Arg(17) are thought to be the essential residues for chitin binding.
