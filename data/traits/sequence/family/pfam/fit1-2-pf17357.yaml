identifier: Pfam:PF17357
label: Facilitor Of iron transport 1 and 2
definition: >-
  Budding yeast Fit proteins (facilitor of iron transport) found on cell wall are mannoproteins implicated in the siderophore-iron bound transport. The Fit1-3 cell wall mannoproteins are attached to the beta-glucan layer through a GPI (glycosylphosphatidylinoisitol) anchor.
