label: Family of unknown function (DUF6068)
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001902) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide. This family includes a protein from the bengamide biosynthetic gene cluster from Myxococcus virescens and appears to be predominantly found in Cystobacterineae.
