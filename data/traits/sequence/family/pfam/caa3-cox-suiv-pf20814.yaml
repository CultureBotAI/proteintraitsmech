identifier: Pfam:PF20814
label: CAA3-type cytochrome c oxidase subunit IV
definition: >-
  Cytochrome c oxidase, a haem copper oxidase superfamily member, is the final step in the electron-transport chain, linking O 2 reduction to transmembrane pumping in mitochondria and aerobic prokaryotes. Cytochrome c oxidase (aka Complex IV) catalyzes the reduction of O 2 to 2H 2 O, and acts downstream of Complexes I-III: NADH-Q oxidoreductase, succinate-Q reductase, and Q-cytochrome c oxidoreductase. In Thermus thermophilus caa3-oxidase is comprised of subunit (SU) I/III, a fusion of classical SU I and SU III, and IIc as well SU IV, which is composed of two connected transmembrane helices that interface with SU I/III.
