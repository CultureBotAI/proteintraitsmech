identifier: Pfam:PF26865
label: Phage T4 Y02C protein
definition: >-
  This entry represents protein Y02C found in bacteriophages. The prototype is from bacteriophage T4, a 49 amino acid protein with a molecular weight of 5.6 kDa located in the Gp42-imm intergenic region. The protein is also known as 42.1 or T4T045 and remains uncharacterised. The function of this protein is unknown.
