identifier: Pfam:PF03148
label: Tektin family
definition: >-
  Tektins are cytoskeletal proteins. They have been demonstrated in such cellular sites as centrioles, basal bodies, and along ciliary and flagellar doublet microtubules. Tektins form unique protofilaments, organised as longitudinal polymers of tektin heterodimers with axial periodicity matching tubulin. Tektin polypeptides consist of several α-helical regions that are predicted to form coiled coils. Indeed, tektins share considerable structural similarities with intermediate filament proteins. Possible functional roles for tektins are: stabilisation of tubulin protofilaments; attachment of A and B-tubules in ciliary/flagellar microtubule doublets and C-tubules in centrioles; binding of axonemal components. This entry also includes Tektin-like protein 1 (TEKTL1) that shares many structural features with tektins, including the overall helix-turn-helix fold and head-to-tail association into filaments, but does not seem to assemble into the large oligomeric bundles associated with tektins. Thus, the mechanism by which TEKTL1 and tektins assemble into filaments differs slightly. In both sea urchin and bovine sperm, TEKTL1 binds to the outer inter-protofilament cleft of A11/A12, where it may help stabilise the outer junction.
