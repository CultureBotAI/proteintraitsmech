identifier: Pfam:PF06971
label: Putative DNA-binding protein N-terminus
definition: >-
  This entry represents the C terminus (approximately 30 residues) of a number of Rex proteins. These are redox-sensing repressors that appear to be widespread among Gram-positive bacteria. They modulate transcription in response to changes in cellular NADH/NAD (+) redox state. Rex is predicted to include a pyridine nucleotide-binding domain (Rossmann fold), and residues that might play key structural and nucleotide binding roles are highly conserved.
