identifier: Pfam:PF05353
label: Delta Atracotoxin
definition: >-
  Delta-hexatoxin (also known as delta-atracotoxin) is an arachnid toxin that produces potentially fatal neurotoxic symptoms in primates by slowing the inactivation of voltage-gated sodium channels. Effects are an increase in resting tension, a muscle fasciculation and a decrease in indirect twitch tension. In vivo, it is lethal to both vertebrates and insects. Its structure comprises a core β-region containing a triple-stranded a thumb-like extension protruding from the β-region and a C-terminal helix. The β-region contains a cysteine knot motif, a feature seen in other neurotoxic polypeptides.
