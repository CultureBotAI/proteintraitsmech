identifier: Pfam:PF04443
label: Acyl-protein synthetase, LuxE
definition: >-
  LuxE is an acyl-protein synthetase found in bioluminescent bacteria. LuxE catalyses the formation of an acyl-protein thiolester from a fatty acid and a protein. This is the second step in the bioluminescent fatty acid reduction system, which converts tetradecanoic acid to the aldehyde substrate of the luciferase-catalysed bioluminescence reaction. A conserved cysteine found at position 364 in Photobacterium phosphoreum LuxE ( ) is thought to be acylated during the transfer of the acyl group from the synthetase subunit to the reductase. The C-terminal of the synthetase is though to act as a flexible arm to transfer acyl groups between the sites of activation and reduction. A LuxE domain is also found in the Vibrio cholerae RBFN protein ( ), which is involved in the biosynthesis of the O-antigen component 3-deoxy-L-glycero-tetronic acid. This entry represents the LuxE domain, which is found in archaeal and bacterial proteins.
