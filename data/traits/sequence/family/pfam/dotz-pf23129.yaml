identifier: Pfam:PF23129
label: DotZ
definition: >-
  This entry represents the Type 4 apparatus protein DotZ ( ) from Legionella pneumophila and related proteins fround in Legionella species. DotZ is a component of membrane-embedded T4 coupling complex (T4CC), which consists of the DotL ATPase, the DotM and DotN proteins, and DotY and DotZ. The DotLMNYZ hetero-pentamer plays an essential role in the recruitment and delivery of effectors to the Type IV secretion (T4S) machinery in Legionella pneumophila, a bacterial pathogen that uses a T4S system to inject effector proteins into human macrophages. DotZ is an integral part of the T4CC and plays a significant role in the translocation of effectors.
