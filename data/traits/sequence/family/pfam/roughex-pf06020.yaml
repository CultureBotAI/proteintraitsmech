identifier: Pfam:PF06020
label: Drosophila roughex protein
definition: >-
  This family consists of several roughex (RUX) proteins specific to Drosophila species. Roughex can influence the intracellular distribution of cyclin A and is therefore defined as a distinct and specialised cell cycle inhibitor for cyclin A-dependent kinase activity. Rux is though to regulate the metaphase to anaphase transition during development.
