identifier: Pfam:PF14817
label: HAUS augmin-like complex subunit 5
definition: >-
  This entry represents HAUS augmin-like complex subunit 5 (HAUS5) from eukaryotes. The HAUS augmin-like complex shares similarity with Drosophila Augmin that regulates gamma-tubulin localization in mitotic spindles, but not at the centrosome. It contributes to mitotic spindle assembly, maintenance of chromosome integrity and completion of cytokinesis. Plant and animal augmin complexes have similar functions in microtubule nucleation and organisation in mitotic microtubule arrays. The human augmin complex contains 8 subunits. The Arabidopsis augmin complex contains both conserved and unique subunits compared with its animal counterparts. This entry includes plant AUG5.
