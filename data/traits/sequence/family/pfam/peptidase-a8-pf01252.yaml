identifier: Pfam:PF01252
label: Signal peptidase (SPase) II
definition: >-
  This group of aspartic endopeptidases belong to the MEROPS peptidase family A8 (signal peptidase II family). The type example is the Escherichia coli lipoprotein signal peptidase or SPase II ( , MEROPS identifier A08.001), which removes the signal peptide from the N terminus of the murein prolipoprotein, an essential step in production of the bacterial cell wall. This enzyme recognises a conserved sequence known as the "lipobox sequence" (Leu-Xaa-Yaa+Cys, in which Xaa is Ala or Ser and Yaa is Gly or Ala) and cleaves on the amino side of the cysteine residue to which a glyceride-fatty acid lipid is attached. SPase II is an integral membrane protein with four transmembrane regions, with the active site on the periplasmic side and close to the membrane surface. The active site aspartic acid residues have been identified by site-directed mutagenesis and occur in the motifs GNXXDRX and FNXAD, where X is a hydrophobic residue. The enzyme is inhibited by the cyclic pentapeptide antibiotic globomycin and also by pepstatin. Although no tertiary structure has been solved, proteins in this family are unlikely to have similar folds to any other aspartic peptidase, and family A8 is assigned to is own clan, AC. Homologues are found only in bacteria. Most bacteria have one homologue, but a few bacteria, including Pseudomonas fluorescens and Staphylococcus epidermidis , have two family members. Predicted homologues in eukaryotes are probably derived from contaminants. Aspartic peptidases, also known as aspartyl proteases ([ec:3.4.23.-]), are widely distributed proteolytic enzymes known to exist in vertebrates, fungi, plants, protozoa, bacteria, archaea, retroviruses and some plant viruses. All known aspartic peptidases are endopeptidases. A water molecule, activated by two aspartic ac…
