identifier: Pfam:PF15595
label: Immunity protein 51
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved tryptophan and Dx[DE] motif. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Tox-RES or Tox-URI1 families. Proteins containing this domain are present in heterogeneous polyimmunity loci in polymorphic toxin systems.
