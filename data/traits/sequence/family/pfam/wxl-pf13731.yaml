identifier: Pfam:PF13731
label: WxL domain surface cell wall-binding
definition: >-
  The WxL motif appears in two or three copies in these bacterial proteins and confers a cell surface localisation function. It seems likely that this region is the cell wall-binding domain of Gram-positive bacteria, and may interact with the peptidoglycan.
