identifier: Pfam:PF23699
label: PAR-amplifying and CtIP-maintaining micropeptide
definition: >-
  This protein family includes PAR-amplifying and CtIP-maintaining micropeptide (also known as Poly-ADP-ribosylation-amplifying and CtIP-maintaining micropeptide, PACMP). PACMP is recruited to DNA damage sites and acts as a regulator via association with poly-ADP-ribose chains, and enhances the poly-ADP-ribosyltransferase activity of PARP1. This protein sequence is 44-residues long.
