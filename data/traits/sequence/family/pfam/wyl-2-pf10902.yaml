identifier: Pfam:PF10902
label: WYL_2, Sm-like SH3 beta-barrel fold
definition: >-
  This entry represents a group of WYL domain containing proteins. WYL is named for three conserved amino acids found in a subset of domains of this superfamily. These residues are not strongly conserved throughout the family. Rather, the conservation pattern includes four basic residues and a position often occupied by a cysteine, which are predicted to line a ligand-binding groove typical of the Sm-like SH3 β-barrels. It is predicted to be a ligand-sensing domain that could bind negatively charged ligands, such as nucleotides or nucleic acid fragments, to regulate CRISPR-Cas and other defense systems such as the abortive infection AbiG system.
