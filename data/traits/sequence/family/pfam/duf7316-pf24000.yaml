identifier: Pfam:PF24000
label: Family of unknown function (DUF7316)
definition: >-
  This entry represents a small family of phage proteins. These proteins form a confident dimer according to structure prediction. The dimer adopts a novel fold composed of a long four stranded β-sheet with two α-helical elements packed at each end of the twisted sheet. There is quite a bit of structural variability across the family with a variety of alternative elaborations.
