identifier: Pfam:PF25858
label: Family of unknown function (DUF7958)
definition: >-
  This entry represents uncharacterised protein from Halogeometricum borinquense ( ) and related archaeal proteins. This protein is found next to a toxic gene, Hbor_38900, and is likely an immunity protein which is able to prevent self-intoxication. This protein is predicted to adopt a complex α/β structure with a unique topology.
