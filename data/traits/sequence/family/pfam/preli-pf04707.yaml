identifier: Pfam:PF04707
label: PRELI-like family
definition: >-
  The PRELI/MSF1 domain is an eukaryotic protein module which occurs in stand- alone form in several proteins, including the human PRELI protein and the yeast MSF1 protein, and as an amino-terminal domain in an orthologous group of proteins typified by human SEC14L1, which is conserved in all animals. In this group of proteins, the PRELI/MSF1 domain co-occurs with the CRAL-TRIO and the GOLD domains. The PRELI/MSF1 domain is approximately 170 residues long and is predicted to assume a globular α + β fold with six β strands and four α helices. It has been suggested that the PRELI/MSF1 domain may have a function associated with cellular membrane.
