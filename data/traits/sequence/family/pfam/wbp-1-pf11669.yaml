identifier: Pfam:PF11669
label: WW domain-binding protein 1
definition: >-
  This entry includes WBP-1 and its homologous. WBP-1 is a ligand of the WW domain of Yes-associated protein. This protein has a proline-rich domain. WBP-1 does not bind to the SH3 domain. This entry also includes transmembrane protein 92 (TMEM92), whose function is not clear.
