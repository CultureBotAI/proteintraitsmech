identifier: Pfam:PF23780
label: S-Adenosylmethionine lyase family
definition: >-
  This entry represents S-Adenosylmethionine lyases ( ) and related proteins. S-Adenosylmethionine lyase catalyses the hydrolysis of S-adenosyl-L-methionine, cleaving it to form L-homoserine and methylthioadenosine. This enzyme is produced by Bacteriophage T3, which infects Escherichia coli cells. SAM hydrolase can remove S-adenosylmethionine from the E. coli cell, thereby inhibiting a variety of SAM-related activities, such as dam and dcm methylase-directed DNA modifications and the synthesis of spermidine from putrescine. It inhibits the host S-adenosylmethionine synthase METK/MAT which prevents methylation of the viral genome. This activity facilitates the transition of the virus from a lytic to a lysogenic infection under certain stress conditions, such as glucose starvation, by blocking viral expression. Expression of SAM hydrolase in T3-transformed E. coli induces the met regulon by cleaving the SAM co-repressor to form 5'-methylthioadenosine, which is then cleaved to produce 5-methylthioribose. Additionally, S-Adenosylmethionine lyase induces the polymerisation of the host's S-adenosylmethionine synthase into inactive filaments, which contributes to the unmethylated state of the viral genome, although it does not confer immunity against host restriction-modification systems. This family shows structural similarity to .
