identifier: Pfam:PF02346
label: Chordopoxvirus multifunctional envelope protein A27
definition: >-
  This is a domain found in viral fusion proteins from the chordopoxviruses, including the poxvirus envelope protein OPG153 (also known as A26L or p4c). 14 kDa fusion protein ( ) from Vaccinia Virus has been demonstrated to function as a viral fusion protein mediating cell fusion at endosmomal (low) pH. More recently it has been shown that A27 forms disulfide-linked protein complexes with A26 protein providing an anchor for A26 protein packaging into mature virions. A27 regulates virion-membrane fusion rather than inducing it and is critical for the successful egress of mature virus particles.
