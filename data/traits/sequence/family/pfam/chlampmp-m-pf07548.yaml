identifier: Pfam:PF07548
label: Chlamydia polymorphic membrane protein middle domain
definition: >-
  This domain is found in several Chlamydia polymorphic membrane proteins. Chlamydia pneumoniae (Chlamydophila pneumoniae) is an obligate intracellular bacterium and a common human pathogen causing infection of the upper and lower respiratory tract. This domain is found between the β-helical repeats ( ) and the C-terminal .
