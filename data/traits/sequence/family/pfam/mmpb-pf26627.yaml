identifier: Pfam:PF26627
label: Morphogenic membrane protein MmpB
definition: >-
  This entry represents the morphogenic membrane protein MmpB and related proteins from Streptomycetaceae. MmpB expression in S. coelicolor is regulated by a two-component system (TCS) MacRS. MmpB interacts with the membrane proteins MmpA and MmpC, which are also regulated by MacRS TCS. MmpA-C proteins are morphogenic factors that delay the formation of aerial mycelium.
