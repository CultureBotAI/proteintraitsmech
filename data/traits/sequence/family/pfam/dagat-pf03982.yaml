identifier: Pfam:PF03982
label: 'Diacylglycerol acyltransferase '
definition: >-
  This family includes diacylglycerol acyltransferases which catalyse the terminal and only committed step in triacylglycerol (TAG) synthesis using diacylglycerol (DAG) and fatty acyl-CoA as substrates. It is required for synthesis and storage of intracellular triglycerides. In yeast, it is involved in lipid particle synthesis from the endoplasmic reticulum, promoting localized TAG production at discrete ER subdomains, and in ergosterol biosynthesis. This family also includes Acyl-CoA wax alcohol acyltransferase 1 and 2 (AWAT1/2), which catalyse the formation of ester bonds between fatty alcohols and fatty acyl-CoAs to form wax monoesters. AWAT2 (also known as MFAT) also possesses acyl-CoA retinol acyltransferase (ARAT) activity that catalyses 11-cis-specific retinyl ester synthesis and shows higher catalytic efficiency toward 11-cis-retinol versus 9-cis-retinol, 13-cis-retinol, and all-trans-retinol substrates. Phytyl ester synthase 1/2, chloroplastic, an acyltransferase involved in fatty acid phytyl ester synthesis in chloroplasts, also belongs to this family. This process is required for the maintenance of the photosynthetic membrane integrity during abiotic stress and senescence.
