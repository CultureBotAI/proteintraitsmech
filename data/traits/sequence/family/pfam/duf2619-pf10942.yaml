identifier: Pfam:PF10942
label: Protein of unknown function (DUF2619)
definition: >-
  This bacterial family of proteins has no known function. This family includes the B. subtilis YqhV protein which is found just upstream of the SpoIIIA operon, suggesting it may play a role in sporulation or its regulation [1]. The protein is composed of three hydrophobic α-helices that may form transmembrane helices.
