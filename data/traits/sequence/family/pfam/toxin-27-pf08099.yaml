identifier: Pfam:PF08099
label: Scorpion calcine family
definition: >-
  Toxins of the scorpion calcine family bind directly to ryanodine receptors (RyRs), intracellular channel targets of the endoplasmic reticulum, and induce long lasting channel openings in a mode of smaller conductance. They have the ability to translocate into cells by crossing the plasma membrane. Toxins of scorpion calcine family are highly basic 33-amino acid peptides that present three disulphide bridges (C1-C4, C2-C5, and C3-C6) and fold along a knottin or inhibitor cystine knot motif (https://www.dsimb.inserm.fr/KNOTTIN/). Their three dimensional structure consists of a compact disulphide-bonded core from which emerge loops and the N terminus. The main element of regular secondary structure is a double-stranded antiparallel β-sheet. A third peripheral extended strand is almost perpendicular to the double-stranded antiparallel β-sheet. Scorpion calcine mimic the activating segment of the dihydropyridine receptor II-III loop, which interacts with a region of the ryanodine receptor.
