identifier: Pfam:PF26812
label: Y04H protein
definition: >-
  This entry represents Uncharacterized 7.9 kDa protein in Gp55-nrdG intergenic region (Y04H) found in bacteriophage T4 and related phages. Y04H (gene 55.8) is located in the intergenic region between genes Gp55 and nrdG in bacteriophage T4. The protein has a predicted molecular weight of 7.9 kDa and contains a hydrophobic region suggesting potential membrane association. The N-terminal region shows characteristics of a signal sequence or membrane-targeting domain with multiple hydrophobic residues. The function of this protein family remains to be determined.
