identifier: Pfam:PF30918
label: Phylloplanin antifungal protein
definition: >-
  This entry represents the phylloplanin family of secreted proteins found in flowering plants. In Nicotiana tabacum, phylloplanin (T-phylloplanin) is secreted by small glandular trichomes and inhibits spore germination and leaf infection by fungal pathogens. The protein is thought to be covalently linked to cuticular lipids or trichome exudate compounds to increase solubility and dispersion on the leaf surface. Family members contain a signal peptide for secretion. This entry also includes Non-classical arabinogalactan protein 30.
