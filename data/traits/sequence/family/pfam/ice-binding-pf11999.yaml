identifier: Pfam:PF11999
label: Ice-binding-like
definition: >-
  This entry represents ice-binding proteins mainly found in bacteria and fungi. In Antarctic bacterium Flavobacterium frigoris PS1, FfIBP is an ice-binding protein (IBP) that inhibits ice growth through direct interaction with ice crystals to permit the survival of polar organisms in extremely cold environments. In arctic yeast Leucosporidium sp, LeIBP, an ice-binding protein, can lower the freezing point below the melting point once it binds to ice. The 3D structure of these proteins is a discontinuous β-solenoid with a triangular cross-section and an adjacent α-helix.
