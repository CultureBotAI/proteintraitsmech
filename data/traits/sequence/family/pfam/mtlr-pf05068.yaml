identifier: Pfam:PF05068
label: Mannitol repressor
definition: >-
  The mannitol operon of Escherichia coli, encoding the mannitol-specific enzyme II of the phosphotransferase system (MtlA) and mannitol phosphate dehydrogenase (MtlD) contains an additional downstream open reading frame which encodes the mannitol repressor (MtlR). Although it is involved in the repression of the expression of the mannitol operon it does not bind the operator/promoter regulatory region of this operon. MtlR and homologous protein YggD belong to a new class of transcription factors in bacteria that may regulate gene expression indirectly as a part of a larger transcriptional complex.
