identifier: Pfam:PF30128
label: Stationary phase gene 1 protein
definition: >-
  This entry represents the SPG1 (stationary phase gene 1) protein. SPG1 is a small transmembrane protein found in fungi. The protein is localised to the mitochondrial membrane and contains a single transmembrane helix. SPG1 is abundantly expressed during stationary phase (G0) in yeast cells, and its mRNA levels rapidly decrease upon exit from this growth phase. The protein is associated with the cellular response to nutrient limitation and stationary phase conditions. The specific function of this protein family remains to be determined.
