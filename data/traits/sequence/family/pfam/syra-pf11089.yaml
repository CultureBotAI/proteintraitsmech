identifier: Pfam:PF11089
label: Exopolysaccharide production repressor
definition: >-
  SyrA is a small protein located in the cytoplasmic membrane that lacks an apparent DNA binding domain. SyrA mediates the transcriptional up-regulation of exo genes involved in the biosynthesis of the symbiotic exopolysaccharide succinoglycan. It does this through a mechanism which requires a two component system. This entry also represents related exopolysaccharide production repressor proteins, including y4xQ from fungi.
