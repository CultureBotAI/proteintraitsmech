identifier: Pfam:PF17334
label: Minor curli fiber component A
definition: >-
  Curli are extracellular functional amyloids that are assembled by enteric bacteria during biofilm formation and host colonization. The csg (curli specific gene) operon encodes major structural and accessory proteins that are required for curli production. The csgBAC operon encodes the major and minor curli fibre components, CsgA and CsgB, respectively. CsgA is secreted to the extracellular milieu as an unfolded protein and forms amyloid polymers upon interacting with the CsgB nucleator. CsgA is comprised of five imperfect repeating units with highly conserved glutamine and asparagine residues that are important for amyloid formation. Each repeating unit is predicted to form a strand-loop-strand motif. In vitro, CsgC inhibits CsgA amyloid formation at substoichiometric concentrations and maintains CsgA in a non-β-sheet rich conformation, making CsgC an efficient and selective amyloid inhibitor.
