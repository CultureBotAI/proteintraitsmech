identifier: Pfam:PF12415
label: Poxvirus DNA dependent RNA polymerase
definition: >-
  All three classes of poxvirus genes -early, intermediate and late -are transcribed by the viral RNA polymerase compex. This complex is composed of nine distinct subunits which total more than 500kDa in mass. The two largest subunits (147 and 136kDa) are homologous to the largest subunits of eukaryotic and prokaryotic RNA polymerases and, like them, are thought to form a claw-shaped structure whose cleft is the site of template interaction and phosphodiester bond formation. While the smaller subunits of poxvirus RNA polymerase show much less similarity, if any, to the smaller subunits of the eukaryotic and prokaryotic enzymes, it is thought that they may play a similar role in interacting with transcription factors. The 132kDa subunit is the second largest subunit of the poxvirus DNA dependent RNA polymerase and shows structural similarity to the second-largest RNA polymerase subunits of eubacteria, archaebacteria, and eukaryotes.
