identifier: Pfam:PF00898
label: Orbivirus outer capsid protein VP2
definition: >-
  This family contains the outer capsid, VP2 proteins from the orbiviruses; these are dsRNA viruses belonging to the Reoviridae. VP2 acts as an anchor for VP1 and VP3 and contains a non-specific DNA and RNA binding domain in the N terminus.
