identifier: Pfam:PF25587
label: Rv2743c family
definition: >-
  This entry represents Putative envelope-preserving system protein Rv2743c from Mycobacterium tuberculosis and similar proteins from actinomycetes. Rv2743c plays a crucial role in maintaining envelope integrity and tolerance to surface stress. It is part of a four-gene operon that includes clgR, pspA, rv2743c, and rv2742c, which is regulated by the envelope-stress-responsive sigma factor sigmaE and ClgR itself. Rv2743c forms a complex with PspA and Rv2742c, which is targeted to the cell membrane. This protein contains transmembrane helices.
