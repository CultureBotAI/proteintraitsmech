identifier: Pfam:PF08890
label: Phage XkdN-like tail assembly chaperone protein, TAC
definition: >-
  This entry is represents Phage-like element PBSX protein XkdN from Bacillus subtilis (strain 168) and similar proteins predominantly found in Firmicutes and some tailed bacteriophages. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. Members of this group of proteins are chaperones involved in phage tail assembly and have been predicted to form a spiral structure.
