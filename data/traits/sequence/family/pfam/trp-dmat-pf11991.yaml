identifier: Pfam:PF11991
label: Tryptophan dimethylallyltransferase
definition: >-
  This entry represents fungal enzymes involved in secondary metabolite production such as Prenyltransferase nscD, Tryptophan dimethylallyltransferase, ftmPT2, LtxC from lyngbyatoxin biosynthesis and related proteins. This family also includes some proteins from bacteria, such as TleC, which has being identified as a prenyltransferase involved in the synthesis of teleocidin B in Streptomyces. Prenyltransferase NscD is part of the biosynthetic gene cluster responsible for the production of neosartoricin, a prenylated anthracenone compound with T-cell antiproliferative activity, suggesting a physiological role as an immunosuppressive agent. In this pathway, the non-reducing polyketide synthase NscA likely synthesises and cyclises the decaketide backbone, while the hydrolase NscB facilitates product release via hydrolysis, followed by spontaneous decarboxylation. NscD specifically catalyses the transfer of a dimethylallyl group to the aromatic C5 position of the intermediate. This is followed by a stereospecific hydroxylation at C2, catalysed by the FAD-dependent monooxygenase NscC. Notably, the gene cluster does not encode an O-acetyltransferase, suggesting that the final 2-O-acetylation step required for neosartoricin biosynthesis is likely carried out by an unidentified enzyme. Tryptophan dimethylallyltransferase ( ) catalyses the first step of ergot alkaloid biosynthesis. Ergot alkaloids, which are produced by endophyte fungi, can enhance plant host fitness, but also cause livestock toxicosis to host plants. O-glucose prenyltransferase PaPT is required for the biosynthesis of fusicoccins, potent activators of plasma membrane H+-ATPases in plants causing constriction canker. O-dimethylallyltransferase cpaD is required for the biosynthesis of the fungal neurotoxin cyclopi…
