identifier: Pfam:PF05065
label: 'Phage capsid family '
definition: >-
  This entry represents a domain found in bacteria and viruses (Caudovirales), including bacteriophage capsid proteins. The major capsid protein of Enterobacteria phage HK97 assembles to form an icosahedral capsid. Included within the capsid protein is the delta domain which acts as the scaffold upon which the capsid is built. Bacterial and archaeal encapsulin-like systems and HK97-type viruses share a common ancestor and it is likely that encapsulins have evolved from HK97-type phages ]. This domain is found at the C-terminal in some instances, associated with a protease domain at the N-terminal.
