identifier: Pfam:PF04134
label: DCC1-like thiol-disulfide oxidoreductase
definition: >-
  Members of this family have two highly conserved cysteine residues within the DxxCxxC motif at the N-terminal. This motif is conserved in the thiol-disulfide oxidoreductase family. This family includes At5g50100 (also known as DCC1) from Arabidopsis thaliana, a thioredoxin that modulates ROS homeostasis resulting in de novo shoot initiation and may be involved in the improvement of the capacity of plant regeneration. Uncharacterised proteins from bacteria are also included in this family.
