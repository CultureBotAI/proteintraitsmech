identifier: Pfam:PF28249
label: Sactipeptide RiPP StsA
definition: >-
  Members of this small family are encoded next to the radical SAM enzyme StsB, and are average about 40 amino acids in length. Maturation involves the introduction of three sulfur-to-alpha carbon thioether (sactionine) crosslinks, from the Cys residues in the motif CxCxC to glycines in a nearby motif GxGxG that runs antiparallel in a hairpin structure.
