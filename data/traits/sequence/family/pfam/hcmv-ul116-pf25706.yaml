identifier: Pfam:PF25706
label: Human cytomegalovirus UL116 protein
definition: >-
  This entry represents the human cytomegalovirus (HCMV) UL116 protein, which forms a complex with glycoprotein H (gH) independently from glycoprotein L (gL). UL116 acts as a chaperone for gH and promotes the expression of gH/gL complexes and is required for efficient production of infectious cell-free virions. UL116 interacts with UL148, a viral endoplasmic reticulum (ER)-resident glycoprotein, and promotes the incorporation of gH/gL complexes into virions. Unlike gL, UL116 does not form a disulfide linkage to gH. UL116 is found in betaherpesviruses, particularly in human and primate cytomegaloviruses.
