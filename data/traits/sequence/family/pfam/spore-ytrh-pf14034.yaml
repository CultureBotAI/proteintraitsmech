identifier: Pfam:PF14034
label: Sporulation protein YtrH
definition: >-
  This family of proteins is involved in sporulation. It may contribute to the formation and stability of the thick peptidoglycan layer between the two membranes of the spore, known as the cortex. In Bacillus subtilis its expression is regulated by sigma-E.
