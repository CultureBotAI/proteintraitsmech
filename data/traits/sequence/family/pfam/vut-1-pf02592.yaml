identifier: Pfam:PF02592
label: Putative vitamin uptake transporter
definition: >-
  This entry includes queuosine (Q) precursor transporter from Escherichia coli , which is required for the import and rescue of the queuosine precursors 7-cyano-7-deazaguanine (preQ0) and 7-aminomethyl-7-deazaguanine (preQ1). Membranes are impermeable to purines; therefore, transporters are required for the salvage of Q precursors.
