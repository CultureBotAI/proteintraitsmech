identifier: Pfam:PF29422
label: Bacteriophage G278-like virion protein
definition: >-
  This entry represents a virion structural protein found in large tailed bacteriophages, including Bacillus phage PBS1 and Yersinia phage phiR1-37. Proteins in this family are approximately 215-220 amino acids in length. The protein was identified as part of the phage particle proteome of phiR1-37. The specific function of this virion component remains to be determined.
