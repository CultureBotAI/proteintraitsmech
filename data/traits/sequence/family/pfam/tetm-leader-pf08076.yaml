identifier: Pfam:PF08076
label: Tetracycline resistance determinant leader peptide
definition: >-
  The antibiotic tetracycline has a broad spectrum of activity, acting to inhibit bacterial protein synthesis by binding to the 30S ribosomal subunit, which prevents the association of the aminoacyl-tRNA to the ribosomal acceptor A site. Tetracycline binding is reversible, therefore diluting out the antibiotic can reverse its effects. Tetracycline resistance genes are often located on mobile elements, such as plasmids, transposons and/or conjugative transposons, which can sometimes be transferred between bacterial species. In certain cases, tetracycline can enhance the transfer of these elements, thereby promoting resistance amongst a bacterial colony. There are three types of tetracycline resistance: tetracycline efflux, ribosomal protection, and tetracycline modification: Tetracycline efflux proteins belong to the major facilitator superfamily. Efflux proteins are membrane-associated proteins that recognise and export tetracycline from the cell. They are found in both Gram-positive and Gram-negative bacteria. There are at least 22 different tetracycline efflux proteins, grouped according to sequence similarity: Group 1 are Tet(A), Tet(B), Tet(C), Tet(D), Tet(E), Tet(G), Tet(H), Tet(J), Tet(Z) and Tet(30); Group 2 are Tet(K) and Tet(L); Group 3 are Otr(B) and Tcr(3); Group 4 is TetA(P); Group 5 is Tet(V). In addition, there are the efflux proteins Tet(31), Tet(33), Tet(V), Tet(Y), Tet(34), and Tet(35). Ribosomal protection proteins are cytoplasmic proteins that display homology with the elongation factors EF-Tu and EF-G. Protection proteins bind the ribosome, causing an alteration in ribosomal conformation that prevents tetracycline from binding. There are at least ten ribosomal protection proteins: Tet(M), Tet(O), Tet(S), Tet(W), Tet(32), Tet(36), Tet(Q), Tet(T), Otr(A…
