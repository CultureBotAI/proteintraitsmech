identifier: Pfam:PF15440
label: THRAP3/BCLAF1 family
definition: >-
  This family includes thyroid hormone receptor-associated protein 3 (THRAP3), which is a spliceosome component and a subunit of the TRAP complex which plays a role in pre-mRNA splicing and mRNA decay. It also includes the transcriptional repressor Bcl-2-associated transcription factor 1 (BCLAF1).
