identifier: Pfam:PF29559
label: Bacteriophage inner body protein
definition: >-
  This entry represents a protein family found in the inner body of bacteriophages within Caudoviricetes. The inner body is a large cylindrical proteinaceous structure located within the phage head. Members of this family are highly abundant virion proteins found in diverse jumbo phage genera including Phikzvirus, Tepukevirus, Serwervirus, Ripduovirus, Phabiovirus, Miltoncavirus, Goslarvirus, and Takahashivirus. Mass spectrometry studies identified gp89, gp90, gp93, gp95, gp97, and gp162 as the major constituents of the inner body structure in phage phiKZ. Members of this family, exemplified by PHIKZ089 ( , gp89), are packaged into the virion but remain within the virion structure and are not injected into the host cell during infection. In contrast, other inner body proteins (gp90, gp93, gp95, gp97) are co-injected with the phage genomic DNA and play roles in establishing the early phage infection vesicle. The precise structural and functional role of this protein family within the inner body remains to be determined.
