identifier: Pfam:PF05288
label: Poxvirus A3L Protein
definition: >-
  This family represents A2.5L from Vaccinia virus, also known as Protein OPG128, and similar sequences from poxvirus. A2.5L is a late protein which probably participates in disulfide bond formation by functioning as a thiol-disulfide transfer protein between membrane-associated OPG072 and OPG08. It is an all-α-helical protein with a conserved Cxx(x)C motif in the N-terminal α-helix. It appears to be an integral component of intracellular virions.
