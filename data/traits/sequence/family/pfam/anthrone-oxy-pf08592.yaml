identifier: Pfam:PF08592
label: Anthrone oxygenase
definition: >-
  This family consists of anthrone oxygenases found in bacteria and fungi, and similar proteins involved in the synthesis of different products. GedH from Aspergillus terreus is part of the gene cluster that mediates the biosynthesis of geodin, EncC from Neosartorya fumigata is involved in the biosynthesis of endocrocin, and MdpH from Aspergillus nidulans in the biosynthesis of monodictyphenone. The anthrone oxygenase MdpH-2 is part of a gene cluster responsible for the biosynthesis of monodictyphenone, a prenyl xanthone derivative. Within this pathway, MdpH-2 catalyses the oxidation of emodinanthrone to emodin by similarity. The biosynthesis begins with the polyketide synthase MdpG producing atrochrysone thioester, which is then cleaved by the atrochrysone carboxyl ACP thioesterase MdpF to release atrochrysone carboxylic acid. This acid is converted to atrochrysone by MdpH-1 and further transformed into emodin anthrone. MdpH-2 subsequently oxidises emodinanthrone to emodin. Emodin undergoes several modifications involving MdpB, MdpC, and MdpL, leading to the production of monodictyphenone. Branching from this pathway, MdpJ and MdpK contribute to the synthesis of arugosin F, which is further converted to shamixanthone and epishamixanthone through intermediates such as arugosins I, H, A, B, and variecoxanthone A. These conversions are facilitated by the FAD-dependent monooxygenase MdpD, the xanthone prenyltransferases XptA and XptB, and the probable involvement of the dehydrogenase XptC.
