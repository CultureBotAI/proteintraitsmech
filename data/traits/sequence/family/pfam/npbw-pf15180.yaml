identifier: Pfam:PF15180
label: Neuropeptides B and W
definition: >-
  Two closely related neuropeptide precursors, which share no significant sequence similarity with other known neuropeptides, have recently been identified and named preproneuropeptide B and preproneuropeptide W. In humans, each precursor contains a signal sequence and two dibasic cleavage sites. Alternative cleavage of these sites results in long (29 or 30 amino acid) and short (23 amino acid) forms of the resultant neuropeptides. Murine, rat and bovine versions of preproneuropeptide B, however, contain only the second cleavage site, resulting in only the long form of neuropeptide B. Neuropeptide B is expressed in both the central nervous system (CNS) and in the periphery. In the CNS, the highest levels of the peptide are found in the substantia nigra and hypothalamus, suggesting a possible role in locomotor control and the release of pituitary hormones. In the periphery, the peptide is most abundant in testis, ovary, uterus, placenta, spleen, lymph nodes and peripheral blood leukocytes, indicating potential roles in the reproductive and immune systems. Unusually, neuropeptide B purified from bovine hypothalamus was found to be brominated at its N terminus. Neuropeptide W has a more limited distribution in the brain than neuropeptide B, and is found at highest levels in the substantia nigra, again suggesting an involvement in locomotor control. In the periphery, neuropeptide W is more widespread than neuropeptide B. In addition to the reproductive and immune tissues in which neuropeptide B is expressed, neuropeptide W has been found at high levels in the liver, stomach and trachea. Intracerebroventricular administration of neuropeptide W in rats has been reported to produce an acute increase in food intake and to stimulate prolactin release. This entry represents the ne…
