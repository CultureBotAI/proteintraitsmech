identifier: Pfam:PF06100
label: MCRA family
definition: >-
  Oleate hydratase catalyses the hydration of oleate at its cis-9-double bond to yield 10-hydroxyoctadecanoate. The hydration of unsaturated fatty acids is suggested to be a detoxification mechanism and a survival strategy for living in fatty acid-rich environments. It also appears to play a role in bacterial virulence.
