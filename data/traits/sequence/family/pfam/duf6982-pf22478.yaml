label: Family of unknown function (DUF6982)
definition: >-
  This family of proteins is found in bacteria. Proteins in this family are typically between 135 and 1024 amino acids in length. This family of proteins are structurally related to a family of transcriptional repressors of phase-1 flagellin genes. The family appears to contain two related subdomains with SH3-like fold.
