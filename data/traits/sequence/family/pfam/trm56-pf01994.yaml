identifier: Pfam:PF01994
label: tRNA ribose 2'-O-methyltransferase, aTrm56
definition: >-
  This entry represents tRNA ribose 2'-O-methyltransferase aTrm56, which specifically catalyses the AdoMet-dependent 2'-O-ribose methylation of cytidine at position 56 in tRNAs. The crystal structure of Pyrococcus horikoshii aTrm56 complexed with S-adenosyl-L-methionine has been determined to 2.48 A resolution. aTrm56 consists of the SPOUT domain, which contains the characteristic deep trefoil knot, and a unique C-terminal β-hairpin. A conserved cytidine at position 56 of tRNA contributes to the maintenance of the L-shaped tertiary structure. aTrm56 catalyses the 2'-O-methylation of the cytidine residue in archaeal tRNA, using S-adenosyl-L-methionine. Biochemical assays showed that aTrm56 forms a dimer and prefers the L-shaped tRNA to the lambda form as its substrate.
