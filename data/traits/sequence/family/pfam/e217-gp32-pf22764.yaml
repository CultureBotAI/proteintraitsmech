identifier: Pfam:PF22764
label: 'Tail fiber protein gp32   '
definition: >-
  This entry represents a family of proteins from tailed bacteriophages and bacterial prophages, including Gp32 from E217, a Pseudomonas phage used in an experimental cocktail to eradicate cystic fibrosis-associated Pseudomonas aeruginosa. Stacked hexamers of the tail tube protein gp32 form the central tube of the E217 tail. The tail tube protein is structurally conserved and homologous to the tail tube protein gp32 found in non-contractile tails, bacterial pyocins, and type VI secretion systems. Gp32 consists of a classical β-sandwich that contains two four-stranded sheets facing each other and surrounded by a long α-helix and an extended β-turn.
