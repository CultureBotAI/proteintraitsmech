identifier: Pfam:PF22760
label: Baseplate component gp38
definition: >-
  This entry represents a family of proteins from tailed bacteriophages, including Gp38 from E217, a Pseudomonas phage used in an experimental cocktail to eradicate cystic fibrosis-associated Pseudomonas aeruginosa. Gp38 is a baseplate cap component that forms a heterodimeric complex with Gp37. These proteins adopt a similar fold, consisting of two orthogonally packed β-sheets that coil into a barrel shape.
