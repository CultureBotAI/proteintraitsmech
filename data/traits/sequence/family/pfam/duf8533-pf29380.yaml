identifier: Pfam:PF29380
label: Family of unknown function (DUF8533)
definition: >-
  This entry represents a family of small proteins of approximately 90 amino acids found exclusively in tailed bacteriophages. The family is restricted to the class Caudoviricetes, particularly members of the families Demerecviridae and Straboviridae. Within these families, the proteins are predominantly found in the genera Tequintavirus and Epseptimavirus. The function of these proteins remains to be determined.
