identifier: Pfam:PF05254
label: Uncharacterised protein family (UPF0203)
definition: >-
  This is a family of small highly conserved proteins. In Saccharomyces cerevisiae (Baker's yeast) the gene YKL053C-A (MDM35) is one of the genes essential for maintenance of normal mitochondrial distribution and morphology (MDM); wherease in Homo sapiens (Human), p53CSV, is a direct transcriptional target for p53 and appears to be a cell-survival mediator in response to genotoxic stress including low-levels of DNA damage. It is suggested that p53CSV modulates the apoptotic pathway through interaction with HSP70 and Apaf-1 thereby inhibiting activation of procaspase-3 and procaspase-9.
