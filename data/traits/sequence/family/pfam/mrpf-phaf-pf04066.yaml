identifier: Pfam:PF04066
label: Multiple resistance and pH regulation protein F (MrpF / PhaF)
definition: >-
  Members of this family are predicted to be integral membrane proteins with three transmembrane regions, involved in regulation of pH. PhaF is part of a potassium efflux system involved in pH regulation. It is also involved in symbiosis in Rhizobium meliloti (Sinorhizobium meliloti). MrpF is a part of a Na + /H + antiporter complex, also involved in pH homeostasis. MrpF is thought to be an efflux system for Na + and cholate. The Mrp system in Gram-positive species may also have primary energisation capacities.
