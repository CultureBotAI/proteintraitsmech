identifier: Pfam:PF06996
label: Type VI secretion, TssG
definition: >-
  The bacterial Type VI secretion system (T6SS) is capable of injecting toxins into eukaryotic cells, which contributes to a successful infection. This entry represents a group of Gram-negative bacterial proteins that form part of the type VI pathogenicity secretion system (T6SS), including TssG. TssG is homologues to phage tail proteins and is required for proper assembly of the Hcp tube (the T6SS inner tube) in bacteria. One other member in this family, SciB ( ) from Salmonella enterica, is thought to be involved in virulence.
