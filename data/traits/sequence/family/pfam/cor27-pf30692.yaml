identifier: Pfam:PF30692
label: Cold-regulated protein 27/28 family
definition: >-
  This entry represents the cold-regulated protein 27/28 family found in plants. These nuclear proteins are transcriptional repressors that integrate circadian clock regulation with cold response pathways. COR27 and COR28 function together by binding to chromatin of evening genes such as TOC1, PRR5 and ELF4 to repress their transcription. The proteins are regulated by the circadian clock and are induced by cold and darkness but repressed by light. They also play roles in flowering regulation and freezing tolerance.
