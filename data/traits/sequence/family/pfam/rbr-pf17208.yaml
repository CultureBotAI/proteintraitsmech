identifier: Pfam:PF17208
label: RNA binding Region
definition: >-
  This entry represents the RNA-binding region of human SCML2/4, also found in other Polycomb-group proteins from the Scm (Sex comb on midleg) subfamily. Members of this group are found in vertebrates. Sex comb on midleg-like protein 2 (SCML2) is a mammalian Polycomb-group protein, which associates with the Polycomb repressive complex-1 (PRC1) that is essential for the epigenetic regulation of gene expression. Isoform SCML2A has been shown to bind to PRC1 via its SPM domain and to interact with ncRNAs through a novel RNA-binding region (RBR). The RBR is necessary for targeting of SCML2A to chromatin and PRC1 recruitment, suggesting a role for ncRNAs in regulating SCML2 function. Sex comb on midleg-like protein 4 (SCML4), which is thought to have a similar function, has been associated with coronary artery disease.
