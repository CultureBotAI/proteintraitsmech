identifier: Pfam:PF15811
label: Small VCP/p97-interacting protein
definition: >-
  This entry includes mammalian SVIP, small VCP/p97-interacting protein and its orthologues from yeast. SVIP was identified by yeast two-hybrid screening to be an interactive partner of VCP/p97. Mammalian VCP/p97 and its yeast counterpart Cdc48 participate in the formation of organelles, including the endoplasmic reticulum (ER), Golgi apparatus, and nuclear envelope. SVIP has been identified as an endogenous inhibitor of endoplasmic reticulum-associated degradation. Over-expression of SVIP caused the formation of large vacuoles that seemed to be derived from the ER. Proteins in this family have two putative coiled-coil regions and are approximately 80 amino acids in length.
