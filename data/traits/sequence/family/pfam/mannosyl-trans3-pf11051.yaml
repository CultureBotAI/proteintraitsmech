identifier: Pfam:PF11051
label: Mannosyltransferase putative
definition: >-
  Alpha-mannosyltransferase is responsible for the addition of residues to the outer chain of core N-linked polysaccharides and to O-linked mannotriose. It is implicated in late Golgi modifications. The proteins matching this entry are conserved in fungi and also found in some phototrophic organisms.
