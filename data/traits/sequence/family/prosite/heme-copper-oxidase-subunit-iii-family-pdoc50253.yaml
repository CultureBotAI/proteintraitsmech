identifier: PROSITE:PDOC50253
label: "Heme-copper oxidase subunit III family"
definition: >-
  Heme-copper oxidase subunit III profile. Cytochrome c oxidase (EC 1.9.3.1) is the terminal enzyme of the respiratory chain of mitochondria and many aerobic bacteria. It catalyzes the transfer of electrons from reduced cytochrome c to molecular oxygen. This reaction is coupled to the pumping of four additional protons across the mitochondrial or bacterial membrane.
