  KBD domain profile. The c-Kit-binding domain (KBD) composed of about 50 amino acids is found in a family of membrane-bound molecules, Spreds, which contain an EVH1 domain (see <PDOC50229>) in the N-terminus and a Sprouty-related cysteine rich region (SPR domain) (see <PDOC51227>) in the C-terminus:
