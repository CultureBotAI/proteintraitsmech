identifier: PROSITE:PDOC00640
label: "Glycosyl hydrolases family"
definition: >-
  Glycosyl hydrolases family 8 signature. The microbial degradation of cellulose and xylans requires several types of enzymes such as endoglucanases (EC 3.2.1.4), cellobiohydrolases (EC 3.2.1.91) (exoglucanases), or xylanases (EC 3.2.1.8). Fungi and bacteria produces a spectrum of cellulolytic enzymes (cellulases) and xylanases which, on the basis of sequence similarities, can be classified into families. One of these families is known as the cellulase family D or as the glycosyl hydrolases family 8. The enzymes which are currently known to belong to this family are listed below.
