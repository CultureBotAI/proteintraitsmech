identifier: PROSITE:PDOC00276
label: "Small, acid-soluble spore proteins, alpha/beta type, signature"
definition: >-
  Small, acid-soluble spore proteins, alpha/beta type, signatures. Small, acid-soluble spore proteins (SASP or ASSP) are proteins found in the spores of bacteria of the genera Bacillus, Thermoactynomycetes, and Clostridium. SASP are bound to spore DNA. They are double-stranded DNA-binding proteins that cause DNA to change to an A-like conformation. They protect the DNA backbone from chemical and enzymatic cleavage and are thus involved in dormant spore's high resistance to UV light. SASP are degraded in the first minutes of spore germination and provide amino acids for both new protein synthesis and metabolism.
