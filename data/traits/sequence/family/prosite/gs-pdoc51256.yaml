identifier: PROSITE:PDOC51256
label: GS
definition: >-
  GS domain profile. Transforming growth factor beta (TGF-beta) is a member of a large family of secreted growth factors of central importance in eukaryotic development and homeostasis. Members of this family, which includes the activins, inhibins and bone morphogenic proteins (BMPs), bind to receptors that consist of two transmembrane serine/threonine (Ser/Thr) kinases called the type I and type II receptors (TbetaR-I and TbetaR-II, respectively).
