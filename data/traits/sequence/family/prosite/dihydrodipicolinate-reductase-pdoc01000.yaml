identifier: PROSITE:PDOC01000
label: "Dihydrodipicolinate reductase"
definition: >-
  Dihydrodipicolinate reductase signature. Dihydrodipicolinate reductase (EC 1.3.1.26) catalyzes the second step in the biosynthesis of diaminopimelic acid and lysine, the NAD or NADP-dependent reduction of 2,3-dihydrodipicolinate into 2,3,4,5-tetrahydrodipicolinate. This enzyme is present in bacteria (gene dapB) and higher plants.
