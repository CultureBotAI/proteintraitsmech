identifier: PROSITE:PDOC50215
label: "ADAM type metalloprotease"
definition: >-
  ADAM type metalloprotease domain profile. ADAMs are transmembrane proteins containing both a disintegrin (see <PDOC00351>) and a metalloprotease domain. About two third of the proteins with an ADAM type metalloprotease domain also contain the zinc protease pattern (see <PDOC00129>) which locates the active site of these proteases. As they contain an adhesion domain and a protease domain, ADAM proteins potentially have both cell adhesion and protease activities. They play a role in various biological processes, including fertilization, neurogenesis, myogenesis, embryonic TGF-alpha release and inflammatory response.
