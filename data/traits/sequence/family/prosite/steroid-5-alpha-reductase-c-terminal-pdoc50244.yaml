identifier: PROSITE:PDOC50244
label: "Steroid 5-alpha reductase C-terminal"
definition: >-
  Steroid 5-alpha reductase C-terminal domain profile. Steroid 5-alpha reductases (EC 1.3.99.5) are responsible for the NADPH- dependent reduction of testosterone into dihydrotestosterone, a key reaction in androgen action. This enzyme is also found in plants where it is involved in brassinosteroids biosynthesis. A domain of around 80 amino acids is found in the C-terminal part of the protein and contains the binding site for NADPH.
