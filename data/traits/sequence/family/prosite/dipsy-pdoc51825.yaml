identifier: PROSITE:PDOC51825
label: DIPSY
definition: >-
  DIPSY domain profile. In fungi, cell adhesion is required for flocculation, mating and virulence, and it is mediated by covalently bound cell wall proteins termed adhesins, which include flocculins and mating agglutinins. Several members of the Mam3/ Map4 adhesin family possess a variety of conserved domains at their C-termini. One of these, the DIPSY (Asp-Ile-Pro-Ser-Tyr) domain appears to be specific to the genus Schizosaccharomyces. Four S. pombe proteins as well as one S. japonicus protein contain DIPSY domains:
