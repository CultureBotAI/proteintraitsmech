identifier: PROSITE:PDOC00192
label: "Anion exchangers family signature"
definition: >-
  Anion exchangers family signatures. Anion exchange is a cellular transport function which contributes to the regulation of cell pH and volume. Anion exchangers are a family of functionally related proteins that contributes to these properties by maintaining the intracellular level of the two principal anions: chloride and HCO3-.
