identifier: PROSITE:PDOC00275
label: "S-100/ICaBP type calcium binding protein"
definition: >-
  S-100/ICaBP type calcium binding protein signature. S-100 are small dimeric acidic calcium and zinc-binding proteins abundant in the brain. They have two different types of calcium-binding sites: a low affinity one with a special structure and a 'normal' EF-hand type high affinity site. The vitamin-D dependent intestinal calcium-binding proteins (ICaBP or calbindin 9 Kd) also belong to this family of proteins, but it does not form dimers.
