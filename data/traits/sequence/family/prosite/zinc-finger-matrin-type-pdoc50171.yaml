identifier: PROSITE:PDOC50171
label: "Zinc finger matrin-type"
definition: >-
  Zinc finger matrin-type profile. This C2H2 zinc finger was first identified in the protein Matrin 3. It is also found in several spliceosome RNA-binding proteins, suggesting a possible role in pre-mRNA binding.
