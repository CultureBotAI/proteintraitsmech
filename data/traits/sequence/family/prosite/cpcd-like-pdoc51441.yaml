identifier: PROSITE:PDOC51441
label: CpcD-like
definition: >-
  CpcD-like domain profile. Ferredoxin-NADP(+) oxydoreductase (FNR) (EC=1.18.1.2) transfers electrons from ferredoxin (or flavodoxin) to NADP(+) to generate NADPH. In eucaryotes, the nuclear-encoded, chloroplast-targeted enzyme contains two domains: an FAD- binding domain (see <PDOC51384>) and an NADP(+)-binding domain. With the exception of Gloeobacter violaceous PCC 7421, the predicted sequences of all cyanobacterial petH genes, encoding FNR, correspond to a protein containing three domains. Two domains at the C-terminus correspond to the FAD- and NADP(+)-binding domains of higher plants FNR protein, which compose the catalytic domains of the enzyme.
