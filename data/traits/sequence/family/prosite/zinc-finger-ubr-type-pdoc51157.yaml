identifier: PROSITE:PDOC51157
label: "Zinc finger UBR-type"
definition: >-
  Zinc finger UBR-type profile. It has been observed that the identity of N-terminal residues of a protein is related to the half life of the protein. This observation yields a rule, called the N-end rule. Similar but distinct versions of the N-end rule operate in all organisms examined, from mammals to fungi and bacteria. In eukaryotes, the N-end rule pathway is a part of the ubiquitin degradation system. Some proteins that have a very short half life contain a specific motif at their N-terminus, the N-degron. It consists of a destabilizing N-terminal residue and an internal Lys, which is the site of poly-Ub chain.
