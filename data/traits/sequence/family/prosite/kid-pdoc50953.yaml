identifier: PROSITE:PDOC50953
label: KID
definition: >-
  KID domain profile. Transcriptional activators are believed to stimulate gene expression via protein-protein interactions with the basal machinery. The cAMP-regulated transcription factor CREB has been shown to stimulate target gene expression, in part by associating with the coactivator paralogs p300 and CREB binding protein (CBP). The CREB transactivation domain is bipartite, consisting of a kinase-inducible domain (KID) and a glutamine-rich constitutive activator termed Q2 which synergize to stimulate target gene expression in response to cAMP.
