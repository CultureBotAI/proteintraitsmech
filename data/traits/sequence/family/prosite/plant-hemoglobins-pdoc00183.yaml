identifier: PROSITE:PDOC00183
label: "Plant hemoglobins"
definition: >-
  Plant hemoglobins signature. Leghemoglobins are hemoproteins present in the root nodules of leguminous plants. Leghemoglobins are structurally and functionally related to hemoglobin and myoglobin. By providing oxygen to the bacteroids, they are essential for symbiotic nitrogen fixation.
