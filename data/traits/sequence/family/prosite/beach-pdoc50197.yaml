identifier: PROSITE:PDOC50197
label: BEACH
definition: >-
  BEACH domain profile. The BEACH (for BEIge And CHS) domain is a region of about 300 residues that is highly conserved in a large family of eukaryotic proteins. Many of the proteins that contain a BEACH domain are very large (with >2000 residues) and have putative functions in vesicular transport, membrane dynamics and receptor signaling. The BEACH domain is crucial for the normal function of these proteins. In all known BEACH-containing proteins, the BEACH domain is located just prior to a WD-40 domain (see <PDOC00574>) in the primary sequence, which is located at the extreme C-terminus of most of these proteins.
