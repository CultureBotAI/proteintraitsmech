identifier: PROSITE:PDOC00184
label: "Arthropod hemocyanins / insect LSPs signature"
definition: >-
  Arthropod hemocyanins / insect LSPs signatures. Hemocyanins are copper-containing oxygen carriers occurring freely dissolved in the hemolymph of many molluscs and arthropods. Arthropod hemocyanins consist of hexamer or multi-hexamers with subunits of about 75 Kd. Each of these subunits binds two copper ions.
