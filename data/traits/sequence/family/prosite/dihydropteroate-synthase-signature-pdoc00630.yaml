identifier: PROSITE:PDOC00630
label: "Dihydropteroate synthase signature"
definition: >-
  Dihydropteroate synthase signatures. All organisms require reduced folate cofactors for the synthesis of a variety of metabolites. Most microorganisms must synthesize folate de novo because they lack the active transport system of higher vertebrate cells which allows these organisms to use dietary folates. Enzymes that are involved in the biosynthesis of folates are therefore the target of a variety of antimicrobial agents such as trimethoprim or sulfonamides.
