identifier: PROSITE:PDOC51871
label: "Potyviridae P1 protease"
definition: >-
  Potyviridae P1 protease domain profile. The Potyviridae family is a major group of plant viruses including nearly 200 species distributed in seven genera. The viral RNA genome is translated into large polyproteins that are further processed into functional peptides by virus-encoded endopeptidases. Amongst these are P1 proteins, chymotrypsin-like serine proteases located at the beginning of viral polyproteins. Generally present in one copy, some potyvirids code for two P1 proteins with different proteolytic specificities. P1 proteins can be classified as Type A or Type B on the basis, amongst other things, of their dependence or not on a host factor to develop their protease activity.
