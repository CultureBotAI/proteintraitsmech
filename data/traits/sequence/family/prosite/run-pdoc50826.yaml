identifier: PROSITE:PDOC50826
label: RUN
definition: >-
  RUN domain profile. The RUN domain, named after RPIP8, unc-14 and NESCA, is organized into six conserved blocks (A-F), which are predicted to constitute the 'core' of a globular structure tolerating insertions of considerable length between the conserved blocks. The RUN domain is found in one or two copies in several proteins that are linked particularly to the functions of GTPases in the Rap and Rab families. RUN domains can be associated with TBC/rab GAP (see <PDOC50086>), FYVE (see <PDOC50178>), DENN, SH3 (see <PDOC50002>), DAG/PE- binding (see <PDOC00379>), PLAT/LH2, PH (see <PDOC50003>) or PX (see <PDOC50195>) domains.
