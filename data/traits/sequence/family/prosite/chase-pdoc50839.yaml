identifier: PROSITE:PDOC50839
label: CHASE
definition: >-
  CHASE domain profile. The CHASE domain is an extracellular domain of 200-230 amino acids, which is found in transmembrane receptors from bacteria, lower eukaryotes and plants. It has been named CHASE (Cyclases/Histidine kinases Associated Sensory Extracellular) because of its presence in diverse receptor-like proteins with histidine kinase and nucleotide cyclase domains.
