identifier: PROSITE:PDOC00700
label: "Cysteine synthase/cystathionine beta-synthase P-phosphate attachment site"
definition: >-
  Cysteine synthase/cystathionine beta-synthase P-phosphate attachment site. Cysteine synthase (EC 2.5.1.47) (CSase) is the pyridoxal-phosphate dependent enzyme responsible for the formation of cysteine from O-acetyl-serine and hydrogen sulfide with the concomitant release of acetic acid. In bacteria such as Escherichia coli, two forms of the enzyme are known (genes cysK and cysM). In plants there are also two forms, one located in the cytoplasm and the other in chloroplasts.
