identifier: PROSITE:PDOC00225
label: "Interferon alpha, beta and delta family"
definition: >-
  Interferon alpha, beta and delta family signature. Interferons are proteins which produce antiviral and antiproliferative responses in cells. On the basis of their sequence interferons are classified into five groups: alpha, alpha-II (or omega), beta, delta (or trophoblast) and gamma. Except for gamma-interferon, the sequence of all the others are related. Once the signal peptide has been removed, these interferons are mature proteins of 160 to 170 residues.
