identifier: PROSITE:PDOC50025
label: "Laminin G"
definition: >-
  Laminin G domain profile. The Laminin G or LNS domain (for Laminin-alpha, Neurexin and Sex hormone-binding globulin) is an around 180 amino acid long domain found in a large and diverse set of extracellular proteins. It often occures in multiple copies probably serving as general protein interaction domains that bind the target proteins and other macromolecules, such as carbohydrates. In most proteins, the precise function of the laminin G domain is unknown. A large number of ligands in the G domain of laminin has been reported, including heparin, sulfatides, integrins, dystroglycan, nidogen, and fibulin.
