identifier: PROSITE:PDOC00445
label: "Fibrinogen C-terminal"
definition: >-
  Fibrinogen C-terminal domain signature and profile. Fibrinogen, the principal protein of vertebrate blood clotting is a hexamer containing two sets of three different chains (alpha, beta, and gamma), linked to each other by disulfide bonds. The N-terminal sections of these three chains contain the cysteines that participate in the cross-linking of the chains. The C-terminal parts of the alpha, beta and gamma chains contain a domain of about 225 amino-acid residues, which can function as a molecular recognition unit [2-6]. In fibrinogen as well as in angiopoietin this domain is implicated in protein-protein interactions.
