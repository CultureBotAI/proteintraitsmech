identifier: PROSITE:PDOC51285
label: "AGC-kinase C-terminal"
definition: >-
  AGC-kinase C-terminal domain profile. The AGC (cAMP-dependent, cGMP-dependent and protein kinase C) protein kinase family embraces a collection of protein kinases that display a high degree of sequence similarity within their respective kinase domains. AGC kinase proteins are characterized by three conserved phosphorylation sites that critically regulate their function. The first one is located in an activation loop in the center of the kinase domain. The two other phosphorylation sites are located outside the kinase domain in a conserved region on its C-terminal side, the AGC-kinase C-terminal domain.
