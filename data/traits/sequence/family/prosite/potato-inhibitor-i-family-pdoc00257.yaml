identifier: PROSITE:PDOC00257
label: "Potato inhibitor I family"
definition: >-
  Potato inhibitor I family signature. The potato inhibitor I family is one of the numerous families of serine proteinase inhibitors. Members of this protein family are found in plants; in the seeds of barley or beans, and in potato or tomato leaves where they accumulate in response to mechanical damage. An inhibitor belonging to this family is also found in leech. It is interesting to note that, currently, this is the only proteinase inhibitor family to be found both in plant and animal kingdoms.
