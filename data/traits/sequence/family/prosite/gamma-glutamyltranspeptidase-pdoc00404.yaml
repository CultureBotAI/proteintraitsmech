identifier: PROSITE:PDOC00404
label: Gamma-glutamyltranspeptidase
definition: >-
  Gamma-glutamyltranspeptidase signature. Gamma-glutamyltranspeptidase (EC 2.3.2.2) (GGT) catalyzes the transfer of the gamma-glutamyl moiety of glutathione to an acceptor that may be an amino acid, a peptide or water (forming glutamate). GGT plays a key role in the gamma-glutamyl cycle, a pathway for the synthesis and degradation of glutathione. In prokaryotes and eukaryotes, it is an enzyme that consists of two polypeptide chains, a heavy and a light subunit, processed from a single chain precursor. The active site of GGT is known to be located in the light subunit.
