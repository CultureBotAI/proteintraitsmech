identifier: PROSITE:PDOC51170
label: "Cell wall-binding repeat"
definition: >-
  Cell wall-binding repeat profile. The cell wall-binding repeat (CW) is a ~20 amino acid residue module essentially found in two bacterial Gram-positive protein families: choline binding proteins and glucosyltransferases (EC 2.4.1.5). In choline-binding proteins cell wall binding repeats bind to choline moieties of both teichoic and lipoteichoic acids, two components peculiar to the cell surface of Gram-positive bacteria. In glucosyltransferases the region spanning the CW repeats is a glucan binding domain.
