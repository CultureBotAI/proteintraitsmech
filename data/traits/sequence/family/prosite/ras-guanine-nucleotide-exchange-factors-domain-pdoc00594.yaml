identifier: PROSITE:PDOC00594
label: "Ras Guanine-nucleotide exchange factors domain"
definition: >-
  Ras guanine-nucleotide exchange factors domain signature and profiles. Ras proteins are membrane-associated molecular switches that bind GTP and GDP and slowly hydrolyze GTP to GDP. The balance between the GTP bound (active) and GDP bound (inactive) states is regulated by the opposite action of proteins activating the GTPase activity and that of proteins which promote the loss of bound GDP and the uptake of fresh GTP. The latter proteins are known as guanine-nucleotide exchange (or releasing) factors (GEFs or GRFs) (or also as guanine-nucleotide dissociation stimulators (GDSs)).
