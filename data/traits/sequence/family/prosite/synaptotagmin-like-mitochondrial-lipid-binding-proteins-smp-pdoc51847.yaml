identifier: PROSITE:PDOC51847
label: "Synaptotagmin-like mitochondrial lipid-binding proteins (SMP)"
definition: >-
  Synaptotagmin-like mitochondrial lipid-binding proteins (SMP) domain profile. Membrane contacts sites (MCSs), regions where two organelles come in close proximity to one another, act as molecular hubs for the exchange of small molecules (e.g. lipids) and signals (e.g. calcium ions). Synaptotagmin-like Mitochondrial lipid-binding Proteins (SMP) domains are exclusively found at MCSs between different organelles such as endoplasmic reticulum (ER)- Mitochondrion, ER-Plasma membrane (PM) and Nucleus-Vacuole junctions.
