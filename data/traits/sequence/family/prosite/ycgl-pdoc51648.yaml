identifier: PROSITE:PDOC51648
label: YcgL
definition: >-
  YcgL domain profile. YcgL represents a conserved class of small proteins widespread in gammaproteobacteria. This group of protein contains a 85-residue domain of unknown function. The YcgL domain contains two alpha-helices and four beta- strands in the sequential arrangement beta1-beta2-alpha1-beta3-alpha2-beta4 as a 3-layer (alpha/beta/alpha) sandwich (see <PDB:2H7A>).
