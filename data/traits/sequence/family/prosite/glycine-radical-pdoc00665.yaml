identifier: PROSITE:PDOC00665
label: "Glycine radical"
definition: >-
  Glycine radical domain signature and profile. Protein radicals are components of several biologically important reactions. Glycyl radical enzymes are involved in a great variety of functions, for example, nucleotide, pyruvate and toluene metabolism. These enzymes are posttranslationally interconverted, under anaerobic conditions, from an inactive to an active form that carries a stable radical localized to a specific glycine at the C-terminal region of the polypeptidic chain.
