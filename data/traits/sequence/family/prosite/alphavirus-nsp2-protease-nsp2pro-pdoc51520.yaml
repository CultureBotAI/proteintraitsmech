label: "Alphavirus nsp2 protease (nsp2pro)"
definition: >-
  Alphavirus nsp2 protease (nsp2pro) domain profile. The family of alphaviruses includes 26 known members. They infect a variety of hosts including mosquitoes, birds, rodents and other mammals with worldwide distribution. Alphaviruses also pose a potential threat to human health in many area. For example, Venezuelan Equine Encephalitis Virus (VEEV) causes encephalitis in humans as well as livestock in Central and South America, and some variants of Sinbis Virus (SIN) and Semliki Forest Virus (SFV) have been found to cause fever and arthritis in humans.
