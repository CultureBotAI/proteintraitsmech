identifier: PROSITE:PDOC00223
label: "TGF-beta family"
definition: >-
  TGF-beta family signature and profile. Transforming growth factor-beta (TGF-beta) is a multifunctional peptide that controls proliferation, differentiation and other functions in many cell types. TGF-beta-1 is a peptide of 112 amino acid residues derived by proteolytic cleavage from the C-terminal of a precursor protein. A number of proteins are known to be related to TGF-beta-1. They are listed below.
