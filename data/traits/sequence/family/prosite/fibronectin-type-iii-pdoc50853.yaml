identifier: PROSITE:PDOC50853
label: "Fibronectin type-III"
definition: >-
  Fibronectin type-III domain profile. Fibronectin is a dimeric glycoprotein composed of disulfide-linked subunits with a molecular weight of 220-250 kDa each. It is involved in cell adhesion, cell morphology, thrombosis, cell migration, and embryonic differentiation. Fibronectin is a modular protein composed of homologous repeats of three prototypical types of domains known as types I, II, and III.
