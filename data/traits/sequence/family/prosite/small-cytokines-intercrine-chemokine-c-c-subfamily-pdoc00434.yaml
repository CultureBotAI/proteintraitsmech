label: "Small cytokines (intercrine/chemokine) C-C subfamily"
definition: >-
  Small cytokines (intercrine/chemokine) signatures. Many low-molecular weight factors secreted by cells including fibroblasts, macrophages and endothelial cells, in response to a variety of stimuli such as growth factors, interferons, viral transformation and bacterial products, are structurally related. Most members of this family of proteins seem to have mitogenic, chemotactic or inflammatory activities. These small cytokines are also called intercrines or chemokines. They are cationic proteins of 70 to 100 amino acid residues that share four conserved cysteine residues involved in two disulfide bonds, as shown in the following schematic representation:
