identifier: PROSITE:PDOC00748
label: "Antenna complexes beta subunits"
definition: >-
  Antenna complexes alpha and beta subunits signatures. In photosynthetic bacteria the antenna complexes function as light-harvesting systems that absorb light radiation and transfer the excitation energy to the reaction centers. The antenna complexes are generally composed of two polypeptides (alpha and beta chains); two or three bacteriochlorophyll (BChl) molecules and some carotenoids.
