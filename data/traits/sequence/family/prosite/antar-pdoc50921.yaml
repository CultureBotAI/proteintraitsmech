identifier: PROSITE:PDOC50921
label: ANTAR
definition: >-
  ANTAR domain profile. The ANTAR (AmiR and NasR transcription antitermination regulators) domain is present in bacterial regulatory proteins that are predicted to share the distinct transcription antitermination mechanism reported for amiR and nasR. Three distinct classes of ANTAR-containing proteins have been identified. Most proteins are classical response regulators, where residues comprising an active site are conserved. Therefore, these proteins are predicted to serve as cognate regulators for sensor histidine kinases. Proteins from the second class are predicted to serve as cognate response regulators for sensor histidine kinases.
