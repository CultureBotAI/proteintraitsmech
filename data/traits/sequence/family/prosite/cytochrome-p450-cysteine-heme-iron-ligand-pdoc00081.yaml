identifier: PROSITE:PDOC00081
label: "Cytochrome P450 cysteine heme-iron ligand"
definition: >-
  Cytochrome P450 cysteine heme-iron ligand signature. Cytochrome P450's are a group of enzymes involved in the oxidative metabolism of a high number of natural compounds (such as steroids, fatty acids, prostaglandins, leukotrienes, etc) as well as drugs, carcinogens and mutagens. Based on sequence similarities, P450's have been classified into about forty different families. P450's are proteins of 400 to 530 amino acids; the only exception is Bacillus BM-3 (CYP102) which is a protein of 1048 residues that contains a N-terminal P450 domain followed by a reductase domain. P450's are heme proteins.
