identifier: PROSITE:PDOC00684
label: "Indoleamine 2,3-dioxygenase signature"
definition: >-
  Indoleamine 2,3-dioxygenase signatures. Indoleamine 2,3-dioxygenase (EC 1.13.11.42) (IDO) is an enzyme responsible for the conversion of tryptophan and other indole derivatives to kynurenines. In mammals, IDO is induced by interferon-gamma (IFN-gamma) and responsible for some of its anti-proliferative effects. The degradative action of IDO on tryptophan leads to cell death by starvation of this essential and relatively scarce amino acid. IDO is a heme-containing enzyme of about 400 amino acids.
