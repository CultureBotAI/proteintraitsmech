identifier: PROSITE:PDOC00755
label: "Bacterial-type phytoene dehydrogenase"
definition: >-
  Bacterial-type phytoene dehydrogenase signature. Phytoene dehydrogenase (phytoene desaturase) is an enzyme of carotenoid biosynthesis that converts phytoene into zeta-carotene via the symmetrical introduction of two double bonds at the C-11 and C-11' positions of phytoene. The sequence of phytoene dehydrogenase from bacteria (gene crtI or carC) and fungi (gene AL-1) are not related to that from cyanobacteria and plants but is evolutionary related to that of another enzyme of carotenoid biosynthesis, methoxyneurosporene dehydrogenase (gene crtD).
