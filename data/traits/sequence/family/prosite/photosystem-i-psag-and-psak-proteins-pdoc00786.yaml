identifier: PROSITE:PDOC00786
label: "Photosystem I psaG and psaK proteins"
definition: >-
  Photosystem I psaG and psaK proteins signature. Photosystem I (PSI) is an integral membrane protein complex that uses light energy to mediate electron transfer from plastocyanin to ferredoxin. It is found in the chloroplasts of plants and cyanobacteria. PSI is composed of at least 14 different subunits, two of which - PSI-G (gene psaG) and PSI-K (gene psaK) - are small hydrophobic proteins of about 7 to 9 Kd and evolutionary related. Both seem to contain two transmembrane regions. Cyanobacteria seem to encode only for PSI-K.
