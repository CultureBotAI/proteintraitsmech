identifier: PROSITE:PDOC01006
label: "Uncharacterized protein family UPF0758"
definition: >-
  Uncharacterized protein family UPF0758 signature. UPF0758 was previously known as the radC family. The name was assigned according to the radC102 mutant of E. coli which was later demonstrated to be an allele of the transcription-repair-coupling factor recG (see <PDOC51192>). The function of the UPF0758 remains to be determined.
