label: "Thiol-activated cytolysins"
definition: >-
  Thiol-activated cytolysins signature. Thiol-activated cytolysins are toxins produced by a variety of Gram- positive bacteria and are characterized by their ability to lyse cholesterol- containing membranes, their reversible inactivation by oxidation and their capacity to bind to cholesterol. The sequences of some of these toxins is currently known:
