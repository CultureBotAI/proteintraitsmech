label: Interleukin-1
definition: >-
  Interleukin-1 signature. Interleukin-1 (IL-1) is a member of a family of cellular mediators known as cytokines. IL-1 has many biological activities. Among other functions, it is a fever-producing factor (pyrogen), induces prostaglandin synthesis, is involved in T-lymphocyte activation and proliferation as well as in B-lymphocyte activation and proliferation via interleukin-2.
