identifier: PROSITE:PDOC00163
label: "Ubiquitin-conjugating (UBC) core"
definition: >-
  Ubiquitin-conjugating (UBC) active site signature and core domain profile. Ubiquitin-conjugating enzymes (EC 2.3.2.23) (UBC or E2 enzymes) catalyze the covalent attachment of ubiquitin to target proteins. Ubiquitin is conjugated to the target protein through the coordinated action of three enzyme activities designated E1, E2, and E3. The E1 or ubiquitin-activating enzyme (see <PDOC00463>) forms, in an ATP-dependent manner, a thioester linkage between its active site cysteine and the carboxy terminus of ubiquitin. The activated ubiquitin moiety is then transferred from E1 to the active site cysteine in E2 through a trans-thiol esterification reaction.
