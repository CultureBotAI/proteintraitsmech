identifier: PROSITE:PDOC00694
label: HIT
definition: >-
  HIT domain signature and profile. HIT (histidine triad) proteins, named for a short motif related to the sequence (His-x-His-x-His-x-x, where x is a hydrophobic residue) are a superfamily of nucleotide hydrolases which acts on the alpha-phosphate of ribonucleotides. This superfamily can be divided in two branches: the Hint branch that is the most widely conserved and has representatives in all cellular life and the Fhit (for "fragile histidine triad") branch which is only found in animals and fungi. The two branches share a conserved core region of about 1oo amino acids, the HIT domain.
