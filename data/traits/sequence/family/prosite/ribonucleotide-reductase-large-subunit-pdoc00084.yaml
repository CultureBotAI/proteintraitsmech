identifier: PROSITE:PDOC00084
label: "Ribonucleotide reductase large subunit"
definition: >-
  Ribonucleotide reductase large subunit signature. Ribonucleotide reductase (EC 1.17.4.1) catalyzes the reductive synthesis of deoxyribonucleotides from their corresponding ribonucleotides. It provides the precursors necessary for DNA synthesis. Ribonucleotide reductase is an oligomeric enzyme composed of a large subunit (700 to 1000 residues) and a small subunit (300 to 400 residues). There are regions of similarities in the sequence of the large chain from prokaryotes, eukaryotes and viruses. We have selected one of these regions as a signature pattern.
