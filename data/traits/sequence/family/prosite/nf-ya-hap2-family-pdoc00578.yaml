identifier: PROSITE:PDOC00578
label: "NF-YA/HAP2 family"
definition: >-
  NF-Y/HAP subunits signatures and profile. Diverse DNA binding proteins are known to bind the CCAAT box, a common cis- acting element found in the promoter and enhancer regions of a large number of genes in eukaryotes. Amongst these proteins is one known as the CCAAT-binding factor (CBF) or NF-Y. CBF is a heteromeric transcription factor that consists of two different components both needed for DNA-binding.
