identifier: PROSITE:PDOC50944
label: "DtxR-type HTH"
definition: >-
  DtxR-type HTH domain profile. The dtxR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 65 residues present in metalloregulators of the dtxR/mntR family. The family is named after Corynebacterium diphtheriae dtxR, an iron-specific diphtheria toxin repressor, and Bacillus subtilis mntR, a manganese transport regulator. Iron-responsive metalloregulators such as dtxR and ideR occur in Gram-positive bacteria of the high GC branch, while manganese-responsive metalloregulators like mntR are described in diverse genera of Gram-positive and Gram-negative bacteria and also in Archaea.
