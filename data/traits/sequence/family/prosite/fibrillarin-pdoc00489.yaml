identifier: PROSITE:PDOC00489
label: Fibrillarin
definition: >-
  Fibrillarin signature. Fibrillarin is a component of a nucleolar small nuclear ribonucleoprotein (SnRNP) particle thought to participate in the first step of the processing of pre-rRNA. In mammals, fibrillarin is associated with the U3, U8 and U13 small nuclear RNAs.
