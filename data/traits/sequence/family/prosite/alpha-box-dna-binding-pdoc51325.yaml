identifier: PROSITE:PDOC51325
label: "Alpha box DNA-binding"
definition: >-
  Alpha box DNA-binding domain profile. Sexual reproduction in ascomycetes is controlled by a single regulatory locus, referred to as a mating type type (MAT). The single MAT locus has alternate forms, termed idiomorphs, that must be different for two isolates to mate. All ascomycete MAT idiomorphs encode proteins with confirmed or putative DNA- binding motifs, such as an alpha box for MAT1-1 strains and a high mobility group (HMG) (see <PDOC00305>) DNA-binding domain for MAT1-2 strains. The alpha box domain is related to the HMG domain.
