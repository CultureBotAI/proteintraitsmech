identifier: PROSITE:PDOC00025
label: Chitin-binding
definition: >-
  Chitin-binding type-1 domain signature and profile. Many plants respond to pathogenic attack by producing defense proteins that are capable of reversible binding to chitin, an N-acetylglucosamine polysaccharide present in the cell wall of fungi and the exoskeleton of insects. Most of these chitin-binding proteins include a common structural motif of 30 to 43 residues organized around a conserved four-disulfide core, known as the chitin-binding domain type-1. The topological arrangement of the four disulfide bonds is shown in the following figure:
