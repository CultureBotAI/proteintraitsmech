identifier: PROSITE:PDOC00940
label: "Gamma-glutamyl phosphate reductase"
definition: >-
  Gamma-glutamyl phosphate reductase signature. Gamma-glutamyl phosphate reductase (EC 1.2.1.41) (GPR) is the enzyme that catalyzes the second step in the biosynthesis of proline from glutamate, the NADP-dependent reduction of L-glutamate 5-phosphate into L-glutamate 5- semialdehyde and phosphate.
