identifier: PROSITE:PDOC51489
label: "BUB1 N-terminal"
definition: >-
  BUB1 N-terminal domain profile. The missegregation of sister chromatids during mitosis results in the loss or gain of chromosomes in daughter cells (aneuploidy). This disastrous outcome is avoided by the mitotic checkpoint for spindle assembly (SAC), which monitors the proper assembly of the mitotic spindle and blocks the onset of anaphase until the kinetochores of all chromosomes receive a bipolar attachment to spindle microtubules. BUB1 and BUB1R (BUB1-related kinase, known as MAD3 in the yeast) are multidomain proteins that play central roles in this process, working together with other kinetochore-bound components including MAD2, BUB3, CDC20, and MPS1.
