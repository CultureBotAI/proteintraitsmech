identifier: PROSITE:PDOC51954
label: "Coronavirus (CoV) guanine-N7-methyltransferase (N7-MTase)"
definition: >-
  Coronavirus (CoV) guanine-N7-methyltransferase (N7-MTase) domain profile. Coronaviruses (CoVs) are enveloped positive-strand RNA viruses that infect many species, including humans, other mammals, and birds. After infection, the host may develop respiratory, bowel, liver, and neurological diseases. Coronaviruses are divided into four genera: Alphacoronavirus, Betacoronavirus, Gammacoronavirus, and Deltacoronavirus. The ideal hosts of AlphaCoV and BetaCoV are mammals, and GammaCoV primarily infects birds, while DeltaCoV has been identified in both mammals and birds.
