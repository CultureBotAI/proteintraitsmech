identifier: PROSITE:PDOC50103
label: "Zinc finger C3H1-type"
definition: >-
  Zinc finger C3H1-type profile. The well conserved cysteine-histidine arrangement, C-x(8)-C-x(5)-C-x(3)-H, of the C3H1-type zinc finger is present in many eukaryotic proteins from yeast to mammals. In various proteins the C3H1-type zinc finger has been shown to interact with the 3'-untranslated region of mRNAs (see below). It is very often present in two copies.
