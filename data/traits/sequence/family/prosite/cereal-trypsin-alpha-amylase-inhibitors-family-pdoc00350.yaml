identifier: PROSITE:PDOC00350
label: "Cereal trypsin/alpha-amylase inhibitors family"
definition: >-
  Cereal trypsin/alpha-amylase inhibitors family signature. The seeds of cereals contain numerous serine proteases and alpha-amylase inhibitors. These inhibitors can be grouped into families based on structural similarities. The cereal trypsin/alpha-amylase inhibitor family consists of proteins of about 120 amino acids which contain 10 cysteine residues, all of which are involved in disulfide bonds. Some of these inhibitors are specific to trypsin, others to alpha-amylase, and a few are bifunctional. The schematic representation of the structure of these inhibitors is shown below:
