identifier: PROSITE:PDOC01049
label: "MAP kinase"
definition: >-
  MAP kinase signature. Mitogen-activated protein kinases (EC 2.7.11.24) (MAP kinases, also called ERKs for extracellularly-regulated kinases) form a group of serine/threonine protein kinases (see <PDOC00100>) that play important roles in signal transduction pathways regulating adaptative response to a wide range of stimuli.
