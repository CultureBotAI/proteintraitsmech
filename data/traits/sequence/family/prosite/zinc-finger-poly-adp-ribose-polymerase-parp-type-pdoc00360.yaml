identifier: PROSITE:PDOC00360
label: "Zinc finger poly(ADP-ribose) polymerase (PARP)-type"
definition: >-
  Zinc finger poly(ADP-ribose) polymerase (PARP)-type signature and profile. Poly(ADP-ribose) polymerase (EC 2.4.2.30) (PARP) is a eukaryotic enzyme that catalyzes the covalent attachment of ADP-ribose units from NAD(+) to various nuclear acceptor proteins. This post-translational modification of nuclear proteins is dependent on DNA. It appears to be involved in the regulation of various important cellular processes such as differentiation, proliferation and tumor transformation as well as in the regulation of the molecular events involved in the recovery of the cell from DNA damage.
