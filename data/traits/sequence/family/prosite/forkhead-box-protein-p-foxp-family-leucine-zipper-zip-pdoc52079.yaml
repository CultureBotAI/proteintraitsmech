identifier: PROSITE:PDOC52079
label: "Forkhead box protein P (FoxP) family leucine zipper (ZIP)"
definition: >-
  Forkhead box protein P (FoxP) family leucine zipper (ZIP) domain profile. The Forkhead box (Fox) protein superfamily consists of a large group of transcriptional regulators with a forkhead/winged-helix DNA-binding domain (see <PDOC00564>), which are essentially implicated in regulation of development, homeostasis and metabolism. In human, based on sequence homology, Fox proteins are further categorized into 19 subfamilies (FoxA to FoxS). The FoxP family consists of four members, FoxP1 to FoxP4, the evolutionary origin of which can be traced back to sea lampreys and invertebrates.
