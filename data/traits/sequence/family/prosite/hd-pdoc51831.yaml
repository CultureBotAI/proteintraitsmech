identifier: PROSITE:PDOC51831
label: HD
definition: >-
  HD, HD-GYP and HD-related output (HDOD) domains profiles. The HD domain, named after the conserved doublet of predicted catalytic residues, is found in a wide range of bacterial, archaeal and eukaryotic proteins. It defines a superfamily of phosphohydrolases that can catalyze both metal-dependent and -independent phosphomonoesterase and phosphodiesterase reactions for a broad range of substrates:
