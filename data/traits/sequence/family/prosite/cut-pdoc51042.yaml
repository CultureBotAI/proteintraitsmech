identifier: PROSITE:PDOC51042
label: CUT
definition: >-
  CUT domain profile. The CUT domain, first discovered in the Drosophila Cut protein, consists of about 88 amino acids and is a DNA-binding motif which can bind independently or in cooperation with the homeodomain, often found downstream of the CUT domain. However, the homeodomain of this gene family has properties quite distinct from the classical homeodomain (see <PDOC00027>). On its own these homeodomain has little DNA-binding affinity or specificity. DNA-binding is mediated mostly by the CUT domain, but the sequence specificity and binding kinetics are greatly influenced by the presence of the homeodomain.
