identifier: PROSITE:PDOC52053
label: "Novel E3 ligase (NEL)"
definition: >-
  Novel E3 ligase (NEL) domain profile. The ubiquitin system regulates diverse cellular processes in all eukaryotes through the covalent attachment of ubiquitin to acceptor lysine residues on target substrates, thereby dictating protein stability, activity, and localization. Ubiquitination involves one ubiquitin-activating enzyme (E1), a limited number of ubiquitin-conjugating enzymes (E2s), and a large number of ubiquitin-ligating enzymes (E3s). E3 ligases determine the substrate specificity of ubiquitination and have been classified into two main classes, the HECT (homologous with E6-associated protein C-terminus) and RING (really interesting new gene) finger families.
