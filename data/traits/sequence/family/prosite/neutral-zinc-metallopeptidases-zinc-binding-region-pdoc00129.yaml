identifier: PROSITE:PDOC00129
label: "Neutral zinc metallopeptidases, zinc-binding region"
definition: >-
  Neutral zinc metallopeptidases, zinc-binding region signature. The majority of zinc-dependent metallopeptidases (with the notable exception of the carboxypeptidases) share a common pattern of primary structure in the part of their sequence involved in the binding of zinc, and can be grouped together as a superfamily,known as the metzincins, on the basis of this sequence similarity. They can be classified into a number of distinct families which are listed below along with the proteases which are currently known to belong to these families.
