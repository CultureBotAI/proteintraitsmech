identifier: PROSITE:PDOC00407
label: "Polyprenyl synthases signature"
definition: >-
  Polyprenyl synthases signatures. A variety of isoprenoid compounds are synthesized by various organisms. For example in eukaryotes the isoprenoid biosynthetic pathway is responsible for the synthesis of a variety of end products including cholesterol, dolichol, ubiquinone or coenzyme Q. In bacteria this pathway leads to the synthesis of isopentenyl tRNA, isoprenoid quinones, and sugar carrier lipids. Among the enzymes that participate in that pathway, are a number of polyprenyl synthase enzymes which catalyze a 1'4-condensation between 5 carbon isoprene units.
