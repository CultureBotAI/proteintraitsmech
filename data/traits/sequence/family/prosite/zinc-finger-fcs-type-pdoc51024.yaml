identifier: PROSITE:PDOC51024
label: "Zinc finger FCS-type"
definition: >-
  Zinc finger FCS-type profile. The FCS-type zinc finger, after the signature FCS residues associated with the third cysteine, is present in several polycomb group proteins. The FCS zinc finger is expected to adopt a Zn-ribbon like fold. Molecular data suggest that this domain can bind RNA in a non-sequence-specific manner.
