label: "Parathyroid hormone family"
definition: >-
  Parathyroid hormone family signature. Parathyroid hormone (PTH) is a polypeptidic hormone that elevates calcium level by dissolving the salts in bone and preventing their renal excretion. PTH is a protein of about 80 amino acid residues, but its biological activity seems to be contained within the first 34 residues.
