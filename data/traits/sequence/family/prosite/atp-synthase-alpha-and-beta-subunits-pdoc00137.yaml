identifier: PROSITE:PDOC00137
label: "ATP synthase alpha and beta subunits"
definition: >-
  ATP synthase alpha and beta subunits signature. ATP synthase (proton-translocating ATPase) (EC 3.6.3.14) is a component of the cytoplasmic membrane of eubacteria, the inner membrane of mitochondria, and the thylakoid membrane of chloroplasts. The ATPase complex is composed of an oligomeric transmembrane sector, called CF(0), and a catalytic core, called coupling factor CF(1). The former acts as a proton channel; the latter is composed of five subunits, alpha, beta, gamma, delta and epsilon. The sequences of subunits alpha and beta are related and both contain a nucleotide-binding site for ATP and ADP. The beta chain has catalytic activity, while the alpha chain is a regulatory subunit.
