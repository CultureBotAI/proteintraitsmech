label: "Glutamine synthetase signature"
definition: >-
  Glutamine synthetase signatures. Glutamine synthetase (EC 6.3.1.2) (GS) plays an essential role in the metabolism of nitrogen by catalyzing the condensation of glutamate and ammonia to form glutamine.
