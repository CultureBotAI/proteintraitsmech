identifier: PROSITE:PDOC51176
label: "Prephenate/arogenate dehydrogenase"
definition: >-
  Prephenate/arogenate dehydrogenase domain profile. Dehydrogenases for the biosynthesis of L-tyrosine (Tyr) comprise prephenate dehydrogenase (EC 1.3.1.12) (PDH), arogenate dehydrogenase (EC 1.3.1.43) (ADH) and cyclohexadienyl dehydrogenase that can accept both prephenate and arogenate as substrate. These enzymes use a nicotinamide nucleotide as co-substrate and can be specific for NAD(+), for NADP(+) or can utilize either of these. Bacteria, archaea, plants and fungi possess one or more of these enzymes, which participate in two alternative pathways for the synthesis of Tyr. Prephenate, the common precursor, is formed from chorismate by chorismate mutase.
