identifier: PROSITE:PDOC00249
label: "Channel forming colicins"
definition: >-
  Channel forming colicins signature. Colicins are plasmid-encoded polypeptide toxins produced by and active against Escherichia coli and closely related bacteria. The channel-forming colicins are transmembrane proteins that depolarize the cytoplasmic membrane, leading to dissipation of cellular energy. Colicins A, B, E1, Ia, Ib, and N belong to that group. The N-terminal part of these colicins is involved in their uptake; the central part is important for binding to outer membrane receptors and the C-terminal part is the channel-forming region.
