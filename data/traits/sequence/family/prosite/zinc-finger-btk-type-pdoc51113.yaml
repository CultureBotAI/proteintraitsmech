identifier: PROSITE:PDOC51113
label: "Zinc finger Btk-type"
definition: >-
  Zinc finger Btk-type profile. The Btk-type zinc finger or Btk motif (BM) is a domain of ~37 amino acids present in eukaryotic signalling proteins. The domain is named after Bruton's tyrosine kinase (Btk), an enzyme which is essential for B cell maturation in humans and mice. Btk and other protein tyrosine kinases (PTK) of the Tec family contain a conserved Tec homology (TH) region between the N-terminal pleckstrin homology (PH) domain (see <PDOC50003>) and the Src homology 3 (SH3) domain (see <PDOC50002>). The Btk domain forms the N-terminal part of the Tec homology region while the C-terminal portion of TH contains a proline-rich region.
