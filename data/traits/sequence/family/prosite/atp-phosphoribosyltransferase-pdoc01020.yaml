identifier: PROSITE:PDOC01020
label: "ATP phosphoribosyltransferase"
definition: >-
  ATP phosphoribosyltransferase signature. ATP phosphoribosyltransferase (EC 2.4.2.17) is the enzyme that catalyzes the first step in the biosynthesis of histidine in bacteria, fungi and plants. It is a protein of about 23 to 32 Kd. As a signature pattern we selected a region located in the C-terminal part of this enzyme.
