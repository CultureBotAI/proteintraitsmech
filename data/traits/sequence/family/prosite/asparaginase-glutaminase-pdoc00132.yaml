identifier: PROSITE:PDOC00132
label: "Asparaginase / glutaminase"
definition: >-
  Asparaginase / glutaminase active sites signatures and domain profile. L-Asparaginases (EC 3.5.1.1) hydrolyze L-asparagine to L-aspartate and ammonia. Enzymes with asparaginase activity play an important role in the metabolism of all living organisms. Enzymes capable of converting L- asparagine to L-aspartate can be classified as bacterial-type or plant-type L- asparaginase. Bacterial-type L-asparaginase are further divided into subtypes I and II, defined by their intra-/extra-cellular localization, substrate affinity, and oligomeric form. Homologous bacterial-type L-asparaginase are found in all kingdoms of life.
