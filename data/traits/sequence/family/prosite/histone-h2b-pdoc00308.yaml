identifier: PROSITE:PDOC00308
label: "Histone H2B"
definition: >-
  Histone H2B signature. Histone H2B is one of the four histones, along with H2A, H3 and H4, which forms the eukaryotic nucleosome core. Using alignments of histone H2B sequences, we selected a conserved region in the C-terminal part of H2B.
