identifier: PROSITE:PDOC00138
label: "ATP synthase gamma subunit"
definition: >-
  ATP synthase gamma subunit signature. ATP synthase (proton-translocating ATPase) (EC 3.6.3.14) is a component of the cytoplasmic membrane of eubacteria, the inner membrane of mitochondria, and the thylakoid membrane of chloroplasts. The ATPase complex is composed of an oligomeric transmembrane sector, called CF(0), and a catalytic core, called coupling factor CF(1). The former acts as a proton channel; the latter is composed of five subunits, alpha, beta, gamma, delta and epsilon. Subunit gamma is believed to be important in regulating ATPase activity and the flow of protons through the CF(0) complex.
