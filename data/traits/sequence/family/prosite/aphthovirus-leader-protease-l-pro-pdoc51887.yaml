identifier: PROSITE:PDOC51887
label: "Aphthovirus leader protease (L(pro))"
definition: >-
  Aphthovirus leader protease (L(pro)) domain profile. Foot-and-mouth disease virus (FMDV) is arguably the world's most important pathogen of domesticated animals, capable of causing devastating economic loss to the cattle, sheep and pig industries in particular. FMDV is a member of the genus Aphthovirus in the family Picornaviridae, which also contains bovine rhinitis A and B viruses, and equine rhinitis A virus (ERAV). The genome of aphthoviruses consists of a positive sense RNA that codes for a single polyprotein. Members of the genus Aphthovirus are unusual in having a leader proteinase (L(pro)) as the first component of the polyprotein.
