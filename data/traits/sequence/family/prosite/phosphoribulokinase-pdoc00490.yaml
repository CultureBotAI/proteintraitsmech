label: Phosphoribulokinase
definition: >-
  Phosphoribulokinase signature. Phosphoribulokinase (EC 2.7.1.19) (PRK) is one of the enzymes specific to the Calvin's reductive pentose phosphate cycle which is the major route by which carbon dioxide is assimilated and reduced by autotrophic organisms. PRK catalyzes the ATP-dependent phosphorylation of ribulose 5-phosphate into ribulose 1,5-bisphosphate which is the substrate for RubisCO.
