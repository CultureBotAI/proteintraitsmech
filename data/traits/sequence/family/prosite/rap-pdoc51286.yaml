identifier: PROSITE:PDOC51286
label: RAP
definition: >-
  RAP domain profile. The ~60-residue RAP (an acronym for RNA-binding domain abundant in Apicomplexans) domain is found in various proteins in eucaryotes. It is particularly abundant in apicomplexans and might mediate a range of cellular functions through its potential interactions with RNA.
