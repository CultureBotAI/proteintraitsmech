identifier: PROSITE:PDOC00973
label: "Tpx family"
definition: >-
  Tpx family signature. Escherichia coli protein tpx is an antioxidant protein with a thiol peroxidase activity. It is a small protein of 18 Kd whose sequence is well conserved in other bacterial species.
