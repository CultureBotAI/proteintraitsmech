identifier: PROSITE:PDOC50177
label: "Nuclear transport factor"
definition: >-
  Nuclear transport factor 2 domain profile. Nucleocytoplasmic transport is mediated by large supramolecular structures that span the nuclear envelope called nuclear pore complexes (NPC). Classical import pathway involves proteins containing nuclear localisation signal (NLS). This transport signal is recognized in the cytosol by importin alpha. Binding of the resulting complex to the cytoplasmic fibrils of the NPC is mediated by the cytosolic factor importin beta. From their, the substrate-alpha-beta transport complex move to a central NPC region, where it pass through a gated channel.
