identifier: PROSITE:PDOC51701
label: "6-Cysteine (6-Cys)"
definition: >-
  6-Cysteine (6-Cys) domain profile. The 6-Cysteine (6-Cys) domain is found in Plasmodium proteins that are expressed in all stages of the parasite life cycle in both the vertebrate and mosquito hosts. The domain is of roughly 120 amino acids and contains six positionally conserved cysteines. It might occur in 1-14 copies per protein, either as the sole globular domain or in combination wih beta-helix-forming hexapeptide repeats as is the case of sequestrin. It is generally found in tandem pairs of A-type and B-type domains.
