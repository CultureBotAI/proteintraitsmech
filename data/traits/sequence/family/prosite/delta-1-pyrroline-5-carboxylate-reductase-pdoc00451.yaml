identifier: PROSITE:PDOC00451
label: "Delta 1-pyrroline-5-carboxylate reductase"
definition: >-
  Delta 1-pyrroline-5-carboxylate reductase signature. Delta 1-pyrroline-5-carboxylate reductase (P5CR) (EC 1.5.1.2) is the enzyme that catalyzes the terminal step in the biosynthesis of proline from glutamate, the NAD(P) dependent oxidation of 1-pyrroline-5-carboxylate into proline.
