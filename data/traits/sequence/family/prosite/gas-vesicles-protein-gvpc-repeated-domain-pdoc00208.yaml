identifier: PROSITE:PDOC00208
label: "Gas vesicles protein GVPc repeated domain"
definition: >-
  Gas vesicles protein GVPc repeated domain signature. Gas vesicles are small, hollow, gas filled protein structures found in several cyanobacterial and archaebacterial microorganisms. They allow the positioning of the bacteria at the favorable depth for growth. Gas vesicles are hollow cylindrical tubes, closed by a hollow, conical cap at each end. Both the conical end caps and central cylinder are made up of 4-5 nm wide ribs that run at right angles to the long axis of the structure. Gas vesicles seem to be constituted of two different protein components: GVPa and GVPc.
