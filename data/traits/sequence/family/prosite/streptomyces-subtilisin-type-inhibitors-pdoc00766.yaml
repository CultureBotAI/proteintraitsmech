identifier: PROSITE:PDOC00766
label: "Streptomyces subtilisin-type inhibitors"
definition: >-
  Streptomyces subtilisin-type inhibitors signature. Bacteria of the Streptomyces family produce a family of proteinase inhibitors characterized by their strong activity toward subtilisin. They are collectively known as SSI's: Streptomyces Subtilisin Inhibitors. Some SSI's also inhibit trypsin or chymotrypsin. In their mature secreted form, SSI's are proteins of about 110 residues with two conserved disulfide bonds.
