identifier: PROSITE:PDOC50974
label: "AdoMet activation"
definition: >-
  AdoMet activation domain profile. Prokaryotic and eukaryotic B12-dependent methionine synthase (MetH) (EC 2.1.1.13) is a large, modular protein that catalyses the transfer of a methyl group from methyltetrahydrofolate (CH3-H4folate) to homocysteine (Hcy) to form methionine, using cobalamin as an intermediate methyl carrier. MetH enzymes consist of four functional modules arranged in a linear fashion with single interdomain connectors.
