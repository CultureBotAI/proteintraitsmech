label: "E1-E2 ATPases phosphorylation site"
definition: >-
  P-type ATPases phosphorylation site. P-type ATPases (also known as E1-E2) are cation transport ATPases which form an aspartyl phosphate intermediate in the course of ATP hydrolysis. ATPases which belong to this family are listed below.
