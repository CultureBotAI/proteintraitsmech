identifier: PROSITE:PDOC00200
label: "Tubulin-beta mRNA autoregulation signal"
definition: >-
  Tubulin-beta mRNA autoregulation signal. The stability of beta-tubulin mRNAs are autoregulated by their own translation product. Unpolymerized tubulin subunits bind directly (or activate a factor(s) which binds co-translationally) to the nascent N-terminus of beta- tubulin. This binding is transduced through the adjacent ribosomes to activate an RNAse that degrades the polysome-bound mRNA. The recognition element has been shown to be the first four amino acids of beta-tubulin: Met-Arg-Glu-Ile.
