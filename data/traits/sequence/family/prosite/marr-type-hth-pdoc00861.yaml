identifier: PROSITE:PDOC00861
label: "MarR-type HTH"
definition: >-
  MarR-type HTH domain signature and profile. The marR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 135 amino acids present in transcription regulators of the marR/slyA family, involved in the development of antibiotic resistance. This family of transcription regulators is named after Escherichia coli marR, a repressor of genes which activate the multiple antibiotic resistance and oxidative stress regulons, and after slyA from Salmonella typhimurium and E. coli, a transcription regulator that is required for virulence and survival in the macrophage environment.
