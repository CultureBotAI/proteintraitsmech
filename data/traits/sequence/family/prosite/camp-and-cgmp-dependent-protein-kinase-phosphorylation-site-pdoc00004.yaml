identifier: PROSITE:PDOC00004
label: "cAMP- and cGMP-dependent protein kinase phosphorylation site"
definition: >-
  cAMP- and cGMP-dependent protein kinase phosphorylation site. There has been a number of studies relative to the specificity of cAMP- and cGMP-dependent protein kinases. Both types of kinases appear to share a preference for the phosphorylation of serine or threonine residues found close to at least two consecutive N-terminal basic residues. It is important to note that there are quite a number of exceptions to this rule.
