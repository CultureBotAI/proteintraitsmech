identifier: PROSITE:PDOC00962
label: "Hydrogenases expression/synthesis hypA family"
definition: >-
  Hydrogenases expression/synthesis hypA family signature. Bacterial membrane-bound nickel-dependent hydrogenases requires a number of accessory proteins which are involved in their maturation. The exact role of these proteins is not yet clear, but some seem to be required for the incorporation of the nickel ions. One of these proteins is generally known as hypA. It is a protein of about 12 to 14 Kd that contains, in its C- terminal region four conserved cysteines that may bind nickel.
