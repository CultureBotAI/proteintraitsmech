identifier: PROSITE:PDOC52045
label: "Neprosin prolyl endopeptidase (PEP) catalytic"
definition: >-
  Neprosin prolyl endopeptidase (PEP) catalytic domain profile. Proteases are a class of enzymes that catalyze proteolysis, a process that breaks down peptide bonds of protein into smaller polypeptides or amino acids. Proteases are involved in various biological processes, ranging from specific proteolysis in the living organism to unspecific proteolysis of food proteins. For instance, proteases play important roles in protein localization, modulation of protein-protein interactions, molecular signal transduction, and generation of cell information.
