label: "Bacterial quinoprotein dehydrogenases signature"
definition: >-
  Bacterial quinoprotein dehydrogenases signatures. Pyrrolo-quinoline quinone (PQQ) is redox coenzyme, which serves as a cofactor for a number of enzymes (quinoproteins) and particularly for some bacterial dehydrogenases. A number of these bacterial quinoproteins are clearly evolutionary related. These proteins are listed below.
