identifier: PROSITE:PDOC00441
label: "Malate synthase"
definition: >-
  Malate synthase signature. Malate synthase (EC 2.3.3.9) catalyzes the aldol condensation of glyoxylate with acetyl-CoA to form malate - the second step of the glyoxylate bypass, an alternative to the tricarboxylic acid cycle in bacteria, fungi and plants.
