identifier: PROSITE:PDOC50194
label: "Filamin/ABP280 repeat"
definition: >-
  Filamin/ABP280 repeat profile. The many different actin cross-linking proteins share a common architecture, consisting of a globular actin-binding domain and an extended rod. Whereas their actin-binding domains consist of two calponin homology domains (see <PDOC50021>), their rods fall into three families.
