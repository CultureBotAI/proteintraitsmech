identifier: PROSITE:PDOC50202
label: "Major sperm protein (MSP)"
definition: >-
  Major sperm protein (MSP) domain profile. Nematode sperm are unusual amoeboid cells in which motility is not based on actin, but instead on the major sperm protein (MSP) that polymerizes to form a cytoskeleton constructed from intermeshed filaments. MSP is a dimeric molecule that polymerizes to form non-polar filaments constructed from two helical subfilaments that wind round one another. The filaments then assemble into larger macromolecular assemblies called fibre complexes. MSP is a small (~14 kDa) basic protein typically encoded by a multigene family of up to 28 members. An about 120-amino acid domain similar to MSP has been found in the following proteins:
