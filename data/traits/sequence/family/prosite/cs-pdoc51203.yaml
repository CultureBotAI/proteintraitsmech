identifier: PROSITE:PDOC51203
label: CS
definition: >-
  CS domain profile. The bipartite CS domain, which was named after CHORD-containing proteins and SGT1, is a ~100-residue protein-protein interaction module. It is only present in eukaryota (alveolata, fungi, metazoa, and plant divisions). The CS domain can be found in stand-alone form, as well as fused with other domains, such as CHORD, SGS (see <PDOC51048>), TPR (see <PDOC50005>), cytochrome b5 (see <PDOC00170>) or b5 reductase, in multidomain proteins.
