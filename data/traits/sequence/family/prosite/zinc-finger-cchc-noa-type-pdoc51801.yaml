identifier: PROSITE:PDOC51801
label: "Zinc finger CCHC NOA-type"
definition: >-
  Zinc finger CCHC NOA-type profile. The regulatory NEMO (NF-kappaB essential modulator) protein has a crucial role in the canonical NF-kappaB signaling pathway notably involved in immune and inflammatory responses, apoptosis and oncogenesis. The regulatory domain is located in the C-terminal half of NEMO and contains a CCHC-type zinc finger (ZF). A similar CCHC-type zinc finger is also found in other regulators of NF- kappaB, such as Optineurin and ABIN2. The CCHC NOA (NEMO Optineurin ABIN2)- type zinc finger has been shown to function as an ubiquitin-binding domain (UBD).
