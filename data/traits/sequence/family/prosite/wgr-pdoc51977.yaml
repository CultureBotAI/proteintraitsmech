identifier: PROSITE:PDOC51977
label: WGR
definition: >-
  WGR domain profile. Poly (ADP-ribose) polymerase (PARP) enzymes are a family of proteins involved in a number of cellular processes including gene regulation, chromatin remodeling, DNA repair and apoptosis. These enzymes are present in all eukaryotes except yeast. PARPs can either transfer a single unit of (ADP- ribose) or more than one (ADP-ribose) moieties from NAD(+) onto substrates yielding poly (ADP-ribose) (PAR) chains, which can be of varying length and branch content.
