identifier: PROSITE:PDOC51781
label: SH3b
definition: >-
  SH3b domain profile. Src homology 3 (SH3) domains (see <PDOC50002>) are widespread among metazoan intracellular signalling proteins and typically bind proline-rich polypeptides. The SH3b domain is a prokaryotic homologue. The SH3b domain might have two possible functions: (1) promoting survival of a pathogen within the invaded cell by modulating pathways controlled by SH3 domains; or (2) promoting invasion by binding to receptors on eukaryotic cells.
