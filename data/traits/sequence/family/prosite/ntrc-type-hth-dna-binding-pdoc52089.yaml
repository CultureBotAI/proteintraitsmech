identifier: PROSITE:PDOC52089
label: "NtrC-type HTH DNA-binding"
definition: >-
  NtrC-type HTH DNA-binding domain profile. Transcription initiation is the most regulated step of gene expression and is essential for the cells response to environmental changes. Bacterial transcription initiation is regulated by a complex network of cell signalling pathways, which culminate in the recruitment of RNA polymerase (RNAP) to specific promoter regions by sigma factors and the formation of open promoter complexes. Sigma factors are directly responsible for promoter recognition, are the targets of transcription activator proteins and are required for DNA melting to make a transcription competent open promoter complex.
