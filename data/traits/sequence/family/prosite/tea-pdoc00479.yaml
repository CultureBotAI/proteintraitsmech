identifier: PROSITE:PDOC00479
label: TEA
definition: >-
  TEA domain signature and profile. The TEA domain is a DNA-binding region of ~80 amino acids that has been named after the two proteins that originally defined the domain: TEF-1 and AbaA. It is also referred to as the ATTS domain because of the 4 proteins first found to harbor this motif (AbaA and TEC1 in yeast, TEF1/TEAD1 in vertebrates and Scalloped in fly). The TEA domain is located toward the amino terminus of eukaryotic transcription factors of the TEA/ATTS family. The consensus DNA sequence bound by an isolated TEA domain is N-[ATG]-G-[ATC]-A-T-N-T; where, N=A, T, C. or G.
