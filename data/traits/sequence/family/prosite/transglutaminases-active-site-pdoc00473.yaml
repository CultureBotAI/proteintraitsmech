identifier: PROSITE:PDOC00473
label: "Transglutaminases active site"
definition: >-
  Transglutaminases active site. Transglutaminases (EC 2.3.2.13) (TGase) are calcium-dependent enzymes that catalyze the cross-linking of proteins by promoting the formation of isopeptide bonds between the gamma-carboxyl group of a glutamine in one polypeptide chain and the epsilon-amino group of a lysine in a second polypeptide chain. TGases also catalyze the conjugation of polyamines to proteins.
