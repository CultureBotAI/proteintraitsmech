identifier: PROSITE:PDOC00583
label: "Electron transfer flavoprotein alpha-subunit"
definition: >-
  Electron transfer flavoprotein alpha-subunit signature. The electron transfer flavoprotein (ETF) serves as a specific electron acceptor for various mitochondrial dehydrogenases. ETF transfers electrons to the main respiratory chain via ETF-ubiquinone oxidoreductase. ETF is an heterodimer that consist of an alpha and a beta subunit and which bind one molecule of FAD per dimer. A similar system also exists in some bacteria.
