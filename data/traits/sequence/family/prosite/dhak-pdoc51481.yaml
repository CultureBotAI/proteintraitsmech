identifier: PROSITE:PDOC51481
label: DhaK
definition: >-
  DhaK domain profile. Dihydroxyacetone (Dha) kinases are a family of sequence-conserved enzymes that phosphorylate dihydroxyacetone, glyceraldehyde and other short-chain ketoses and aldoses. They can be divided into two groups according to the source of high-energy phosphate that they utilize, either ATP or phosphoenolpyruvate (PEP). The ATP-dependent forms are the two-domain Dha kinases (DAK), which occur in animals, plants and eubacteria. They consist of a Dha binding (K) and an ATP binding (L) (see <PDOC51480>) domain. The PEP-dependent forms occur only in eubacteria and a few archaebacteria and consist of three subunits. Two subunits, DhaK and DhaL, are homologous to the K and L domains.
