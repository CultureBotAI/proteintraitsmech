identifier: PROSITE:PDOC51037
label: YEATS
definition: >-
  YEATS domain profile. The YEATS (Yaf9, ENL, AF9, Taf14, and Sas5) domain is an evolutionarily conserved module present from yeast to human. The YEATS domain proteins are found in major chromatin-remodeling and histone acetyltransferase (HAT) complexes and implicated in the regulation of chromatin structure, histone acetylation and deposition, gene transcription, and DNA damage response. The YEATS domain is a reader module that selectively recognizes histone lysine acylation, including acetylation, propionylation, butyrylation, crotonylation, 2-hydroxyisobutyrylation, and succinylation.
