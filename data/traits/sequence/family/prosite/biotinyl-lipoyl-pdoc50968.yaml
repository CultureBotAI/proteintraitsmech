identifier: PROSITE:PDOC50968
label: Biotinyl/lipoyl
definition: >-
  Biotinyl/lipoyl domain profile. Biotin and lipoic acid moieties are the covalently bound cofactors of several multicomponent enzyme complexes that catalyze key metabolic reactions. They are attached to a lysine residue, via an amide bond, by specific biotinyl and lipoyl protein ligases. The lipoyl-lysine and biotinyl-lysine residues serve as swinging arms, ferrying substrate between the three active sites in their relevant enzyme complexes. The 80 residues surrounding the biotinyl-binding lysine residue (see <PDOC00167>) display some sequence similarity to that around the lipoyl-binding lysine residue (see <PDOC00168>).
