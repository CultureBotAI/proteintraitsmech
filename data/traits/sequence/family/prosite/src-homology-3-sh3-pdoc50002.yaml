identifier: PROSITE:PDOC50002
label: "Src homology 3 (SH3)"
definition: >-
  Src homology 3 (SH3) domain profile. The Src homology 3 (SH3) domain is a small protein domain of about 60 amino- acid residues first identified as a conserved sequence in the non-catalytic part of several cytoplasmic protein tyrosine kinases (e.g. Src, Abl, Lck). Since then, it has been found in a great variety of other intracellular or membrane-associated proteins.
