identifier: PROSITE:PDOC52028
label: "Streptococcal M proteins C repeat"
definition: >-
  Streptococcal M proteins C repeat and D repeats region profiles. M proteins belong to a family of fibrous streptococcal surface proteins that interact with the immune system of the host and represent major virulence factors due to their antiphagocytic activities. These antiphagocytic properties are explained by binding to a variety of different host proteins, with the most prominent one being fibrinogen. Another hypothesis relies on the M-protein-mediated formation of large bacterial aggregates, thereby inhibiting phagocytic engulfment.
