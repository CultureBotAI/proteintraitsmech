identifier: PROSITE:PDOC00554
label: "Respiratory-chain NADH dehydrogenase 75 Kd subunit signature"
definition: >-
  Respiratory-chain NADH dehydrogenase 75 Kd subunit signatures. Respiratory-chain NADH dehydrogenase (EC 1.6.5.3) (also known as complex I or NADH-ubiquinone oxidoreductase) is an oligomeric enzymatic complex located in the inner mitochondrial membrane which also seems to exist in the chloroplast and in cyanobacteria (as a NADH-plastoquinone oxidoreductase). Among the 25 to 30 polypeptide subunits of this bioenergetic enzyme complex there is one with a molecular weight of 75 Kd (in mammals), which is the largest subunit of complex I and is a component of the iron-sulfur (IP) fragment of the enzyme. It seems to bind to two 4Fe-4S clusters (called N-3 and N-4).
