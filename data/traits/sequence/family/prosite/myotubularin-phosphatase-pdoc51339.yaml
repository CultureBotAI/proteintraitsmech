identifier: PROSITE:PDOC51339
label: "Myotubularin phosphatase"
definition: >-
  Myotubularin phosphatase domain. Myotubularin phosphatases are members of the protein tyrosine phosphatase (PTP) superfamily. The PTP domain is found in a diverse group of enzymes that catalyze phosphoester hydrolysis using a cysteine nucleophile and an arginine residue that binds to oxygen atoms of the phosphate. These two catalytically essential residues are found in a Cys-x(5)-Arg motif, which is a hallmark of PTP domains (see <PDOC00323>). The PTP superfamily of enzymes includes tyrosine-specific, dual specificity, low molecular weight, and Cdc25 phosphatases. All of these enzymes utilize phosphoproteins as substrates.
