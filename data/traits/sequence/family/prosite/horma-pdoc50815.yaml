label: HORMA
definition: >-
  HORMA domain profile. The HORMA domain (for HOP1, REV7 and MAD2) is an about 180-240 amino acids region containing several conserved motifs. Whereas the MAD2 and the REV7 proteins are almost entirely made up of HORMA domains, HOP1 contains a HORMA domain in its N-terminal region and a Zn-finger domain, whose general arrangement of metal-chelating residues is similar to that of the PHD finger, in the C-terminal region. The HORMA domain is found in proteins showing a direct association with chromatin of all crown group eukaryotes.
