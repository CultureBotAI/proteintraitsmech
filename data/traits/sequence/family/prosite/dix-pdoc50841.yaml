identifier: PROSITE:PDOC50841
label: DIX
definition: >-
  DIX domain profile. Proteins of the dishevelled family (Dsh and Dvl) play a key role in the transduction of the Wg/Wnt signal (see <PDOC00219>) from the cell surface to the nucleus: in response to Wnt signal, they block the degradation of beta- catenin by interacting with the scaffolding protein axin. The N-terminus of proteins of the dishevelled family and the C-terminus of proteins of the axin family share a region of homology of about 85 amino acids, which has been called DIX for DIshevelled and aXin.
