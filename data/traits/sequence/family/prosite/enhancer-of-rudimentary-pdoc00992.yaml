identifier: PROSITE:PDOC00992
label: "Enhancer of rudimentary"
definition: >-
  Enhancer of rudimentary signature. The Drosophila protein 'enhancer of rudimentary' (gene (e(r)) is a small protein of 104 residues whose function is not yet clear. From an evolutionary point of view, it is highly conserved and has been found to exist in probably all multicellular eukaryotic organisms. It has been proposed that this protein plays a role in the cell cycle.
