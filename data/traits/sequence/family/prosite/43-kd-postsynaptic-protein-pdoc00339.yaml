identifier: PROSITE:PDOC00339
label: "43 Kd postsynaptic protein"
definition: >-
  43 Kd postsynaptic protein signature. The 43 Kd postsynaptic protein is a peripheral membrane protein thought to play some role in anchoring or stabilizing the nicotinic acetylcholine receptor at synaptic sites. It may link the receptor to the underlying post- synaptic cytoskeleton, possibly by direct association with actin or spectrin.
