identifier: PROSITE:PDOC51779
label: POTRA
definition: >-
  POTRA domain profile. The polypeptide-transport-associated (POTRA) domain is a module found in members of the FtsQ/DivIB, ShlB, CGI51 (with one repeat), Toc75, YTFM (with three repeats) and D15 (with five repeats) protein families. The POTRA domains are hypothesized to mediate protein-protein interactions, nucleate beta- strands formation in nascent outer membrane proteins (OMPs) and have chaperone-like activity.
