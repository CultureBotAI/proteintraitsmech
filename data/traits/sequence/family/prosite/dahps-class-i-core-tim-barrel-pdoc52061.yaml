identifier: PROSITE:PDOC52061
label: "DAHPS class-I core TIM-barrel"
definition: >-
  DAHPS class-I and -II core TIM-barrel domains profiles. Despite their different biosynthetic roles in microorganisms and plants, the enzymes 3-deoxy-D-arabino-heptulosonate-7-phosphate synthase (DAHPS) and 3- deoxy-D-manno-octulosonate-8-phosphate synthase (KDOPS) possess significant mechanistic and structural similarities. DAHPS catalyzes the first step in the biosynthesis of the aromatic amino acids as well as other aromatic compounds of primary and secondary metabolism, the aldol-like condensation of phosphoenolpyruvate (PEP) and D-erythrose-4-phosphate (E4P) with the formation of DAHP and phosphate.
