identifier: PROSITE:PDOC01042
label: "Cornichon family"
definition: >-
  Cornichon family signature. The Drosophila cornichon protein (gene: cni) is required in the germline for dorsal-ventral signaling. The dorsal-ventral pattern formation involves a reorganization of the microtubule network correlated with the movement of the oocyte nucleus, and depending on the initial correct establishment of the anterior-posterior axis via a signal from the oocyte produced by cornichon and gurken and received by torpedo protein in the follicle cells. The biochemical function of the cornichon protein is currently not known.
