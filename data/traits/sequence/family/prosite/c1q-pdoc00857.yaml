label: C1q
definition: >-
  C1q domain profile. C1q is a subunit of the C1 enzyme complex that activates the serum complement system. It is composed of 9 disulfide-linked dimers of the chains A, B and C, which share a common structure which consist of a N-terminal nonhelical region, a triple helical (collagenous) region and a C-terminal globular head which is called the C1q domain. That domain consists of about 136 amino acids and has been found in the C-terminus of vertebrate secreted or membrane-bound proteins which are mostly short-chain collagens and collagen-like molecules [1-4]. These proteins are listed below:
