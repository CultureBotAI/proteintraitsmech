identifier: PROSITE:PDOC00572
label: "AAA-protein family"
definition: >-
  AAA-protein family signature. A large family of ATPases has been described whose key feature is that they share a conserved region of about 220 amino acids that contains an ATP-binding site. This family is now called AAA, for 'A'TPases 'A'ssociated with diverse cellular 'A'ctivities. The proteins that belong to this family either contain one or two AAA domains.
