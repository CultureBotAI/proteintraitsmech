identifier: PROSITE:PDOC00538
label: "Histidine acid phosphatases active site"
definition: >-
  Histidine acid phosphatases signatures. Acid phosphatases (EC 3.1.3.2) are a heterogeneous group of proteins that hydrolyze phosphate esters, optimally at low pH. It has been shown that a number of acid phosphatases, from both prokaryotes and eukaryotes, share two regions of sequence similarity, each centered around a conserved histidine residue. These two histidines seem to be involved in the enzymes' catalytic mechanism. The first histidine is located in the N-terminal section and forms a phosphohistidine intermediate while the second is located in the C- terminal section and possibly acts as proton donor.
