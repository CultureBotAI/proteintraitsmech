label: "Bacterial rhodopsins signature"
definition: >-
  Bacterial rhodopsins signatures. Bacterial rhodopsins are a family of retinal-containing proteins found in extremely halophilic bacteria which provide light-dependent ion transport and sensory functions for these organisms. Bacterial rhodopsins are integral membrane proteins with seven transmembrane regions. The retinal choromophore is covalently linked, via a Schiff's base, to the epsilon-amino group of a conserved lysine residue in the middle of the last transmembrane helix (called helix G). There are at least three types of bacterial rhodopsins:
