label: "D-isomer specific 2-hydroxyacid dehydrogenases signature"
definition: >-
  D-isomer specific 2-hydroxyacid dehydrogenases signatures. A number of NAD-dependent 2-hydroxyacid dehydrogenases which seem to be specific for the D-isomer of their substrate have been shown to be functionally and structurally related. These enzymes are listed below.
