identifier: PROSITE:PDOC00699
label: "Ependymins signature"
definition: >-
  Ependymins signatures. Ependymins were originally identified in the ependymal zone of goldfish brain and are the major glycoprotein component of cerebrospinal fluid (CSF) in various orders of teleost fish. Several N-glycosylation variants of ependymin have been identified and an important role appears to be the binding of calcium via N-linked sialic acid residues. The precise function of ependymins is still being elucidated. Beside the piscine ependymin this group is formed by Ependymin Related Proteins (ERP) in Xenopus and in mammals (MERP or UCC1).
