identifier: PROSITE:PDOC00286
label: "Thaumatin family"
definition: >-
  Thaumatin family signature and profile. Thaumatin is an intensely sweet-tasting protein (100 000 times sweeter than sucrose on a molar basis) found in berries from Thaumatococcus daniellii, an African bush. The protein consists of about 200 residues and contains 8 disulfide bonds. Several stress-induced proteins of plants have been found to be related to thaumatins. Some of these proteins are listed below.
