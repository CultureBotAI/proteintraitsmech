identifier: PROSITE:PDOC50887
label: GGDEF
definition: >-
  GGDEF domain profile. The GGDEF domain, which has been named after the conserved central sequence pattern GG[DE][DE]F is widespread in prokaryotes. It is typically present in multidomain proteins containing regulatory domains of signaling pathways or protein-protein or protein-ligand interaction modules, such as the response regulatory domain (see <PDOC50110)), the EAL domain (see <PDOC50883>), the PAS/PAC domain (see <PDOC50112>), the HAMP domain (see <PDOC50885>), the GAF domain, the FHA domain (see <PS50006>) or the TPR repeat. However a few single-domain proteins are also known.
