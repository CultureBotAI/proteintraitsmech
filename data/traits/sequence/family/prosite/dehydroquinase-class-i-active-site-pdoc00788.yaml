identifier: PROSITE:PDOC00788
label: "Dehydroquinase class I active site"
definition: >-
  Dehydroquinase class I active site. 3-dehydroquinate dehydratase (EC 4.2.1.10), or dehydroquinase, catalyzes the conversion of 3-dehydroquinate into 3-dehydroshikimate. It is the third step in the shikimate pathway for the biosynthesis of aromatic amino acids from chorismate. Two classes of dehydroquinases exist, known as types I and II. The best studied type I enzyme is from Escherichia coli (gene aroD) and related bacteria where it is a homodimeric protein of a chain of about 250 residues. In fungi, dehydroquinase is part of a multifunctional enzyme which catalyzes five consecutive steps in the shikimate pathway.
