identifier: PROSITE:PDOC51233
label: VWFD
definition: >-
  VWFD domain profile. Von Willebrand factor (VWF) is a large, multimeric blood glycoprotein synthesized in endothelial cells and megakaryocytes, that is required for normal hemostasis. Mutant forms are involved in the most common inherited bleeding disorder (von Willebrand disease: VWD). VWF mediates the adhesion of platelets to sites of vascular damage by binding to specific platelet membrane glycoproteins and to constituents of exposed connective tissue. It is also essential for the transport of the blood clotting factor VIII.
