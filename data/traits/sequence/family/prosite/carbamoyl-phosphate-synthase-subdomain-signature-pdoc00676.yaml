identifier: PROSITE:PDOC00676
label: "Carbamoyl-phosphate synthase subdomain signature"
definition: >-
  Carbamoyl-phosphate synthase subdomain signatures. Carbamoyl-phosphate synthase (CPSase) catalyzes the ATP-dependent synthesis of carbamyl-phosphate from glutamine (EC 6.3.5.5) or ammonia (EC 6.3.4.16) and bicarbonate. This important enzyme initiates both the urea cycle and the biosynthesis of arginine and pyrimidines.
