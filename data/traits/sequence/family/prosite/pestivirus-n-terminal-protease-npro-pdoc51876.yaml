identifier: PROSITE:PDOC51876
label: "Pestivirus N-terminal protease Npro"
definition: >-
  Pestivirus N-terminal protease (Npro) domain profile. Pestiviruses, such has bovine viral diarrhea virus (BVDV) and classical swine fever virus (CSFV), are a considerable cause of livestock disease and pathology. This versatile viral family shows a broad spectrum of strain- specific cytopathogenicity, virulence, infection modes, and persistence among their hosts, comprising cattle, swine sheep and wildlife ruminants. Pestiviruses express their genome as a single polypeptide that is subsequently cleaved into individual proteins by host- and virus-encoded proteases.
