identifier: PROSITE:PDOC00045
label: "Histone H2A"
definition: >-
  Histone H2A signature. Histone H2A is one of the four histones, along with H2B, H3 and H4, which forms the eukaryotic nucleosome core. Using alignments of histone H2A sequences we selected, as a signature pattern, a conserved region in the N-terminal part of H2A. This region is conserved both in classical S- phase regulated H2A's and in variant histone H2A's which are synthesized throughout the cell cycle.
