identifier: PROSITE:PDOC51693
label: "Hepacivirus nonstructural protein 2 (NS2) protease"
definition: >-
  Hepacivirus nonstructural protein 2 (NS2) protease domain profile. The hepatitis C virus (HCV) is the predominant member of the genus Hepacivirus in the family Flaviviridae. It is a major causative agent of acute and chronic liver diseases, including liver cirrhosis and hepatocellular carcinoma. The HCV genome is a single-stranded RNA encoding a polyprotein that includes two proteases essential for virus replication. The NS2 cysteine protease mediates a single cleavage at the NS2/NS3 junction, whereas the NS3 serine protease cleaves at four downstream sites in the polyprotein.
