identifier: PROSITE:PDOC50833
label: Brix
definition: >-
  Brix domain profile. Analysis of the Brix (biogenesis of ribosomes in Xenopus) protein leaded to the identification of a region of 150-180 residues length, called the Brix domain, which is found in six protein families: one archaean family (I) including hypothetical proteins (one per genome); and five eukaryote families, each named according to a representative member and including close homologues of this prototype: (II) Peter Pan (D. melanogaster) and SSF1/2 (S.cerevisiae); (III) RPF1 (S. cerevisiae); (IV) IMP4 (S. cerevisiae); (V) Brix (X.laevis) and BRX1 (S. cerevisiae); and (VI) RPF2 (S.cerevisiae).
