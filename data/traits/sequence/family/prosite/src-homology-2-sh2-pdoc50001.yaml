identifier: PROSITE:PDOC50001
label: "Src homology 2 (SH2)"
definition: >-
  Src homology 2 (SH2) domain profile. The Src homology 2 (SH2) domain is a protein domain of about 100 amino-acid residues first identified as a conserved sequence region between the oncoproteins Src and Fps. Similar sequences were later found in many other intracellular signal-transducing proteins. SH2 domains function as regulatory modules of intracellular signalling cascades by interacting with high affinity to phosphotyrosine-containing target peptides in a sequence- specific and strictly phosphorylation-dependent manner.
