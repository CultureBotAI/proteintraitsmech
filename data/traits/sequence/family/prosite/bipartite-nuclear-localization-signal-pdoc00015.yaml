identifier: PROSITE:PDOC00015
label: "Bipartite nuclear localization signal"
definition: >-
  Bipartite nuclear localization signal profile. The uptake of protein by the nucleus is extremely selective and nuclear proteins must therefore contain within their final structure a signal that specifies selective accumulation in the nucleus. Studies on some nuclear proteins, such as the large T antigen of SV40, have indicated which part of the sequence is required for nuclear translocation. The known nuclear targeting sequences are generally basic, but there seems to be no clear common denominator between all the known sequences.
