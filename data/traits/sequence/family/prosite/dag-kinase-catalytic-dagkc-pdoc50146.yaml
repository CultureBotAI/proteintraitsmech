identifier: PROSITE:PDOC50146
label: "DAG-kinase catalytic (DAGKc)"
definition: >-
  DAG-kinase catalytic (DAGKc) domain profile. The DAG-kinase catalytic domain or DAGKc domain is present in mammalian lipid kinases, such as diacylglycerol (DAG), ceramide and sphingosine kinases, as well as in related bacterial proteins. Eukaryotic DAG-kinase (EC 2.7.1.107) catalyzes the phosphorylation of DAG to phosphatidic acid, thus modulating the balance between the two signaling lipids.
