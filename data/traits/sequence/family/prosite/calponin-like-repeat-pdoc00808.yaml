identifier: PROSITE:PDOC00808
label: "Calponin-like repeat"
definition: >-
  Calponin-like repeat signature and profile. Calponin is a thin filament-associated protein that is implicated in the regulation and modulation of smooth muscle contraction. It is capable of binding to actin, calmodulin, troponin C and tropomyosin. The interaction of calponin with actin inhibits the actomyosin MgATPase activity. Calponin is a basic protein of approximately 34 Kd. Multiple isoforms are found in smooth muscles.
