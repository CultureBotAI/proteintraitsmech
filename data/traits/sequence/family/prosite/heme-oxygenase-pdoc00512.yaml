identifier: PROSITE:PDOC00512
label: "Heme oxygenase"
definition: >-
  Heme oxygenase signature. Heme oxygenase (EC 1.14.99.3) (HO) is the microsomal enzyme that, in animals, carries out the oxidation of heme, it cleaves the heme ring at the alpha methene bridge to form biliverdin and carbon monoxide. Biliverdin is subsequently converted to bilirubin by biliverdin reductase.
