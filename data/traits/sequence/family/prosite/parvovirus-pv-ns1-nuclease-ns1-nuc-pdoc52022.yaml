identifier: PROSITE:PDOC52022
label: "Parvovirus (PV) NS1 nuclease (NS1-Nuc)"
definition: >-
  Parvovirus (PV) NS1 nuclease (NS1-Nuc) domain profile. The family Parvoviridae is a group of small (18-26nm diameter), non-enveloped, and autonomously replicating icosahedral viruses containing a single-stranded linear DNA genome ranging from 4-6 kb in length, with terminal hairpins. The parvoviral single-stranded DNA genome contains two open reading frames (ORFs), one encoding nonstructural (NS) proteins, the other capsid proteins. All parvoviruses encode a nonstructural protein NS1 (termed Rep in adeno- associated virus [AAV]) that is essential for viral DNA replication and packaging of viral DNA into capsid.
