identifier: PROSITE:PDOC00131
label: recA
definition: >-
  recA family signature and profiles. The bacterial recA protein is essential for homologous recombination and recombinational repair of DNA damage. RecA has many activities: it filaments, it binds to single- and double-stranded DNA, it binds and hydrolyzes ATP, it is also a recombinase and, finally, it interacts with lexA causing its activation and leading to its autocatalytic cleavage.
