label: "Gram-negative pili assembly chaperone"
definition: >-
  Gram-negative pili assembly chaperone signature. Most Gram-negative bacteria possess a supramolecular structure - the pili - on their surface, that mediates attachment to specific receptors. The assembly of the pili requires the help of specialized periplasmic chaperones. These proteins are structurally and possibly evolutionary related to the immunoglobulin family. Known members of this family are listed below:
