identifier: PROSITE:PDOC00440
label: "Alpha-2-macroglobulin family thiolester region"
definition: >-
  Alpha-2-macroglobulin family thiolester region signature. The proteinase-binding alpha-macroglobulins (A2M) are large glycoproteins found in the plasma of vertebrates, in the hemolymph of some invertebrates and in reptilian and avian egg white. A2M-like proteins are able to inhibit all four classes of proteinases by a 'trapping' mechanism. They have a peptide stretch, called the 'bait region', which contains specific cleavage sites for different proteinases. When a proteinase cleaves the bait region, a conformational change is induced in the protein, thus trapping the proteinase.
