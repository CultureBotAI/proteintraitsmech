identifier: PROSITE:PDOC51316
label: "Olduvai (ODV)"
definition: >-
  Olduvai (ODV) domain profile. Proteins of the neuroblastoma breakpoint family (NBPF) contain a highly conserved domain of approximately 65 amino acids, which has been named the Olduvai (ODV) domain. The Olduvai domain is present in multiple copies in NBPF proteins and once, with lower homology, in mammalian myomegalin (PDE4DIP), a protein localized in the Golgi/centrosomal area which functions as an anchor to localize components of the cyclic adenosine monophosphate-dependent pathway to this region.
