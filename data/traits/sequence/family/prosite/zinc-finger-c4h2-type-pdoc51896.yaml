identifier: PROSITE:PDOC51896
label: "Zinc finger C4H2-type"
definition: >-
  Zinc finger C4H2-type profile. ZC4H2, which belongs to a conserved gene family found in all metazoans, is located on the X chromosome and has been found to be expressed in various human tissues, particularly fetal brain. ZC4H2 plays an important role during embryonic development of the central and peripheral nervous systems. Alterations of ZC4H2 orthologues in mouse brain and zebrafish affect central nervous system (CNS) embryogenesis, particularly the development and specification of dendritic spines.
