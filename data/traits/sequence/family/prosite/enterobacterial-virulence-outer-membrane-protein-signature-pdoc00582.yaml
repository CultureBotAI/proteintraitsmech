label: "Enterobacterial virulence outer membrane protein signature"
definition: >-
  Enterobacterial virulence outer membrane protein signatures. A number of enterobacterial outer membrane proteins which are involved in virulence and seem to promote the invasion of bacteria into eukaryotic cells have been shown to be structurally related. These proteins are listed below.
