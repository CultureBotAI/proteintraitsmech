identifier: PROSITE:PDOC51893
label: "A kinase-anchoring proteins AKAP-5 and AKAP-12 calmodulin (CaM)-binding motif"
definition: >-
  A kinase-anchoring proteins AKAP-5 and AKAP-12 calmodulin (CaM)-binding motif profile. The A kinase-anchoring proteins AKAP-5 and AKAP-12 (Gravin) bind calmodulin (CaM), a Ca(2+)-sensing protein that is expressed in all eukaryotic cells and mediates many essential processes driven by Ca(2+), including long-term changes in synaptic connections in the brain, apoptosis, and immune responses. The AKAP CaM-binding motif contains hydrophobic amino acids in a 1-4-7-8 pattern within an helix (see <PDB:5NIN>).
