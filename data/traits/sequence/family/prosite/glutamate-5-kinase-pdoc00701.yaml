identifier: PROSITE:PDOC00701
label: "Glutamate 5-kinase"
definition: >-
  Glutamate 5-kinase signature. Glutamate 5-kinase (EC 2.7.2.11) (gamma-glutamyl kinase) (GK) is the enzyme that catalyzes the first step in the biosynthesis of proline from glutamate, the ATP-dependent phosphorylation of L-glutamate into L-glutamate 5-phosphate.
