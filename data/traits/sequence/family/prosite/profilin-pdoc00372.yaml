identifier: PROSITE:PDOC00372
label: Profilin
definition: >-
  Profilin signature. Profilin is a small eukaryotic protein that binds to monomeric actin (G-actin) in a 1:1 ratio thus preventing the polymerization of actin into filaments (F-actin). It can also, in certain circumstance promotes actin polymerization. Profilin also binds to polyphosphoinositides such as PIP2.
