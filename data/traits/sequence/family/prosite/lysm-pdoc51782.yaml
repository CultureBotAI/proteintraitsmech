identifier: PROSITE:PDOC51782
label: LysM
definition: >-
  LysM domain profile. A highly conserved carbohydrate binding module, LysM (lysin-like motif), is found in proteins from viruses, bacteria, fungi, plants and mammals. It is present in bacterial extracellular proteins including hydrolases, adhesins and virulence factors such as Protein A from Staphylococcus aureus. It is also found in proteins produced by fungal pathogens acting as modulators of host immunity, and is present in a large number of proteins from insects, mammals and plants involved in defence against pathogens and symbiotic signalling.
