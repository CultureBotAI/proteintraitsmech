identifier: PROSITE:PDOC00261
label: "Pentraxin (PTX)"
definition: >-
  Pentraxin (PTX) domain signature and profile. Pentraxins (earlier also termed pentaxins), named for their homopentameric quaternary structure, are a superfamily of multifunctional conserved proteins that are characterized by a cyclic multimeric structure and by the presence in their carboxyl-terminal of an ~200 aa-long conserved domain, called pentraxin (PTX) domain. In addition, all the members of this family share an 8 aa-long conserved sequence (HxCxS/TWxS, in which x is any amino acid) in the pentraxin domain, called pentraxin signature.
