identifier: PROSITE:PDOC51082
label: WH2
definition: >-
  WH2 domain profile. The WH2 (WASP-Homology 2, or Wiskott-Aldrich homology 2) domain is an ~18 amino acids actin-binding motif. This domain was first recognized as an essential element for the regulation of the cytoskeleton by the mammalian Wiskott-Aldrich syndrome protein (WASP) family. WH2 proteins occur in eukaryotes from yeast to mammals, in insect viruses, and in some bacteria. The WH2 domain is found as a modular part of larger proteins; it can be associated with the WH1 or EVH1 domain (see <PDOC50229>) and with the CRIB domain (see <PDOC50108>), and the WH2 domain can occur as a tandem repeat.
