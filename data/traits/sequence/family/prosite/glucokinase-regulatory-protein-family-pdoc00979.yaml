identifier: PROSITE:PDOC00979
label: "Glucokinase regulatory protein family"
definition: >-
  Glucokinase regulatory protein family signature. The glucokinase regulatory protein (GCKR) is a vertebrate protein that inhibits glucokinase by forming a complex with the enzyme, which plays a role in the control of blood glucose homeostasis. GCKR is a protein of about 70 Kd which is evolutionary related to bacterial N-acetylmuramic acid 6-phosphate etherases (MurNAc-6-P etherase, murQ) which are about half the size of GCKR and form active homodimers. MurNAc-6-P etherases catalyze the cleavage of the D-lactyl ether substituent of the bacterial cell wall sugar MurNAc and play a role in recycling of the cell wall.
