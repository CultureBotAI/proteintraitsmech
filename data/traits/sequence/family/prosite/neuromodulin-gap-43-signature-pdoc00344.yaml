identifier: PROSITE:PDOC00344
label: "Neuromodulin (GAP-43) signature"
definition: >-
  Neuromodulin (GAP-43) signatures. Neuromodulin (also known as GAP-43, pp46, B-50, F1, and P-57) is an axonal membrane protein associated with nerve growth. It is a major component of the motile growth cones that form the tips of elongating axons. Neuromodulin is an hydrophilic protein of 210 to 240 amino acid residues, which binds calmodulin and inhibits phosphatidylinositol phosphate kinase (PIP kinase). It is phosphorylated by protein kinase C, and regulates the binding of GTP to G(0). Neuromodulin contains an IQ motif (see <PDOC50096>).
