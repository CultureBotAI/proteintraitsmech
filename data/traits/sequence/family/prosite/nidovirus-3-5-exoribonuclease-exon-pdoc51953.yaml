identifier: PROSITE:PDOC51953
label: "Nidovirus 3'-5' exoribonuclease (ExoN)"
definition: >-
  Nidovirus 3'-5' exoribonuclease (ExoN) domain profile. The largest RNA virus genomes currently known are found in the order Nidovirales, an order of positive-stranded RNA (+RNA) viruses, which includes the family Coronaviridae and also the planarian secretory cell nidovirus (PSCNV), which has the largest RNA genome identified thus far. These agents can infect a striking variety of vertebrate and invertebrate hosts, including mammals, birds, amphibians, fish, reptiles, arthropods, molluscs, and helminths. Nidoviruses employ a complex RNA-synthesizing machinery comprising a variety of non-structural proteins (Nsps).
