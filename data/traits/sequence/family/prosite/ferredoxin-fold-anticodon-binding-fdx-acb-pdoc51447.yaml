identifier: PROSITE:PDOC51447
label: "Ferredoxin-fold anticodon binding (FDX-ACB)"
definition: >-
  Ferredoxin-fold anticodon binding (FDX-ACB) domain profile. Aminoacyl-tRNA synthetases (aaRSs) play a crucial role in the translation of the genetic code by means of covalent attachment of amino acids to their cognate tRNAs. Phenylalanine--tRNA synthetase (PheRS) is known to be among the most complex enzymes of the aaRS family. Bacterial and mitochondrial PheRSs share a ferredoxin-fold anticodon binding (FDX-ACB) domain, which represents a canonical double split alpha+beta motif having no insertions. The FDX-ACB domain displays a typical RNA recognition fold (RRM) (see <PDOC00030>) formed by the four-stranded antiparallel beta sheet, with two helices packed against it (see <PDB:3CMQ>).
