identifier: PROSITE:PDOC50085
label: "Rap GTPase activating proteins"
definition: >-
  Rap GTPase activating proteins domain profile. Rap small G proteins have been implicated in various cellular processes such as exocytosis, cAMP signalling, cell adhesion and cell proliferation. Rap proteins acts as molecular switches, with an active GTP-bound form and an inactive GDP-bound form. The inactive GDP bound form is promoted by GTPase-activating proteins (GAPs). GAP proteins specific for Rap contain a conserved region of around 200 amino-acid residues, the RapGAP domain. This domain can accelerate the GTP hydrolysis activity of Rap by five orders of magnitude.
