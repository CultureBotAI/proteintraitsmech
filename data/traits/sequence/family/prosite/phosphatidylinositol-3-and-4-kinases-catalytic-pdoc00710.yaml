label: "Phosphatidylinositol 3- and 4-kinases catalytic"
definition: >-
  Phosphatidylinositol 3- and 4-kinases catalytic domain signatures and profile. Phosphatidylinositol 3-kinase (PI3-kinase) (EC 2.7.1.137) is an enzyme that phosphorylates phosphoinositides on the 3-hydroxyl group of the inositol ring. The exact function of the three products of PI3-kinase - PI-3-P, PI-3,4-P(2) and PI-3,4,5-P(3) - is not yet known, although it is proposed that they function as second messengers in cell signalling. Currently, three forms of PI3-kinase are known:
