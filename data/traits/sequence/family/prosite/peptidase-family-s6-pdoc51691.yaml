label: "Peptidase family S6"
definition: >-
  Peptidase family S6 domain profile. Autotransporters (ATs) represent a large superfamily of virulence factors produced by Gram-negative bacteria. ATs have evolved a unique export mechanism. Initially the protein is synthetized with an N-terminal leader peptide directing the protein to the periplasm via the signal recognition particle. Once accross the inner membrane, the C-terminal domain form a beta- barrel structure (see <PDOC51208>) allowing the passenger domain to escape to the external medium, where it is released proteolytically from the cell. The 300-residue peptidase family S6 domain is found in a subfamily of autotransporter including:
