identifier: PROSITE:PDOC51688
label: "Intramolecular chaperone auto-processing (ICA)"
definition: >-
  Intramolecular chaperone auto-processing (ICA) domain profile. The Intramolecular Chaperone Auto-processing (ICA) domain, also called Intramolecuar Chaperone Domain (ICD) or C-terminal Intramolecular Chaperone Domain (CIMCD), is capable of catalyzing trimerization-dependent auto-proteolysis. The ICA domain contains two absolutely conserved serine and lysine residues. They form a catalytic dyad that mediates cleavage at the serine residue.
