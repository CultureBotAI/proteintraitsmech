identifier: PROSITE:PDOC01021
label: "SsrA-binding protein"
definition: >-
  SsrA-binding protein. A protein which orignally was called, in Escherichia coli, small protein B (gene smpB) binds specifically to the ssrA RNA (tmRNA) and is required for stable association of ssrA with ribosomes. It is a hydrophilic protein of about 145 to 160 amino-acid residues.
