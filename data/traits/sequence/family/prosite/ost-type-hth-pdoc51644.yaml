identifier: PROSITE:PDOC51644
label: "OST-type HTH"
definition: >-
  OST-type HTH domain profile. The OST-HTH (Oskar-TDRD5/TDRD7 HTH) or LOTUS (after Limkain-b1, Oskar and TUdor-containing proteins 5 and 7) domain is a motif of about 80 amino acids and is likely to adopt a winged helix-turn-helix (wHTH) fold, which is characterized by a core 3-stranded HTH with a C-terminal extension of two strands. The OST-HTH domain is primarily found in eukaryotes and bacteria with very rare occurences in archaea that appear to be relatively late lateral transfers of bacterial versions.
