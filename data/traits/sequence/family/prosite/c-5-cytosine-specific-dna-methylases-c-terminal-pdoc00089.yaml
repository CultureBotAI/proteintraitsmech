label: "C-5 cytosine-specific DNA methylases C-terminal"
definition: >-
  C-5 cytosine-specific DNA methylases signatures. C-5 cytosine-specific DNA methylases (EC 2.1.1.37) (C5 Mtase) are enzymes that specifically methylate the C-5 carbon of cytosines in DNA. Such enzymes are found in the proteins described below.
