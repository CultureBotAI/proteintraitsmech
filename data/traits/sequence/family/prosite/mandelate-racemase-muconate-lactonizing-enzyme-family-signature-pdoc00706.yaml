identifier: PROSITE:PDOC00706
label: "Mandelate racemase / muconate lactonizing enzyme family signature"
definition: >-
  Mandelate racemase / muconate lactonizing enzyme family signatures. Mandelate racemase (EC 5.1.2.2) (MR) and muconate lactonizing enzyme (EC 5.5.1.1) (MLE) are two bacterial enzymes involved in aromatic acid catabolism. They catalyze mechanistically distinct reactions yet they are related at the level of their primary, quaternary (homooctamer) and tertiary structures.
