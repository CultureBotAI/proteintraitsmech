identifier: PROSITE:PDOC51038
label: BAH
definition: >-
  BAH domain profile. The Bromo-adjacent homology (BAH) domain is a domain first identified in the vertebrate polybromo protein, a protein present in the large nuclear complex Swi/Snf. It corresponds to a region of about 110 amino-acids, which can contain insertions of variable length. This domain has been identified in a number of proteins present in large complex involved in chromatin replication, epigenetic mechanisms (DNA methylation), transcriptional repression or activation. The BAH domain appears to act as a protein-protein interaction module specialized in gene silencing, as suggested by its interaction within yeast Orc1p with the silent information regulator Sir1p.
