identifier: PROSITE:PDOC50884
label: "Zinc finger Dof-type"
definition: >-
  Zinc finger Dof-type signature and profile. The Dof (DNA-binding with one finger) Cys2/Cys2-type zing finger is an around 50 amino acid motif found in plant transcription factors involved in the regulation of various processes. The arrangement of cysteines has some significant ressemblance to GATA (see <PDOC00300>) and steroid hormone receptor (see <PDOC00031>) zinc fingers. Like other zinc fingers the Dof domain has a dual activity: it binds DNA in a sequence-specific manner with the core binding site formed by the AAAG sequence and it can also mediates protein-protein interaction (see below).
