label: "Chaperonins clpA/B signature"
definition: >-
  Chaperonins clpA/B signatures. A number of ATP-binding proteins that are are thought to protect cells from extreme stress by controlling the aggregation of denaturation of vital cellular structures have been shown to be evolutionary related. These proteins are listed below.
