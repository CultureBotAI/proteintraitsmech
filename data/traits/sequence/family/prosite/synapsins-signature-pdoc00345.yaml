label: "Synapsins signature"
definition: >-
  Synapsins signatures. Synapsins are neuronal phosphoproteins that coat synaptic vesicles, bind to several elements of the cytoskeleton (including actin filaments), and are believed to function in the regulation of neurotransmitter release.
