identifier: PROSITE:PDOC00366
label: "LacI-type HTH"
definition: >-
  LacI-type HTH domain signature and profile. The lacI-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 50-60 residues present in the lacI/galR family of transcriptional regulators involved in metabolic regulation in prokaryotes. Most of these bacterial regulators recognize sugar-inducers. The family is named after the Escherichia coli lactose operon repressor lacI and galactose operon repressor galR. LacI-type regulators are present in diverse bacterial genera, in the cytoplasm. The 'helix-turn-helix' DNA-binding motif is located in the N-terminal extremity of these transcriptional regulators.
