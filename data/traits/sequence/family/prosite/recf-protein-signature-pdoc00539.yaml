identifier: PROSITE:PDOC00539
label: "RecF protein signature"
definition: >-
  recF protein signatures. The prokaryotic protein recF is a single-stranded DNA-binding protein which also probably binds ATP. RecF is involved in DNA metabolism; it is required for recombinational DNA repair and for induction of the SOS response.
