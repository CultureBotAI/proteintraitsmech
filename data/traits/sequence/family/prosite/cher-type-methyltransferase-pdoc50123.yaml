identifier: PROSITE:PDOC50123
label: "CheR-type methyltransferase"
definition: >-
  CheR-type methyltransferase profile. Chemotaxis in bacteria is a behavourial response that allows bacteria to migrate towards favorable chemicals and away from unfavorable ones. The signaling activity of bacterial chemotaxis transmembrane receptors is modulated by reversible methylation of specific glutamate residues predicted to lie within a coiled-coil region of the receptors cytoplasmic domain. The level of receptor methylation results from the activities of a specific S-adenosyl-L-methionine-dependent methyltransferase (EC 2.1.1.80), CheR, and CheB methylesterase (see <PDOC50122>).
