label: "Bombesin-like peptides family"
definition: >-
  Bombesin-like peptides family signature. Bombesin-like peptides comprise a large family of peptides which were initially isolated from amphibian skin, where they stimulate smooth muscle contraction. They were later found to be widely distributed in mammalian neural and endocrine cells. The amphibian peptides which belong to this family are currently classified into three subfamilies:
