label: "Respiratory-chain NADH dehydrogenase 20 Kd subunit"
definition: >-
  Respiratory-chain NADH dehydrogenase 20 Kd subunit signature. Respiratory-chain NADH dehydrogenase (EC 1.6.5.3) (also known as complex I or NADH-ubiquinone oxidoreductase) is an oligomeric enzymatic complex located in the inner mitochondrial membrane which also seems to exist in the chloroplast and in cyanobacteria (as a NADH-plastoquinone oxidoreductase). Among the 25 to 30 polypeptide subunits of this bioenergetic enzyme complex there is one with a molecular weight of 20 Kd (in mammals), which is a component of the iron-sulfur (IP) fragment of the enzyme. It seems to bind a 4Fe-4S iron-sulfur cluster. The 20 Kd subunit has been found to be:
