identifier: PROSITE:PDOC51302
label: "Single-minded C-terminal"
definition: >-
  Single-minded C-terminal domain profile. In Drosophila, single-minded (sim) is a transcription factor that acts as the master regulator of neurogenesis. Two mammalian homologs of Sim, Sim1 and Sim2, have been identified. There is a high level of homology among mammalian and Drosophila sim proteins in their amino-terminal half where the conserved bHLH (see <PDOC00038>), PAS (see <PDOC50112>) and HST domains are present. In contrast, the carboxy-terminal parts are only conserved in vertebrates. The Sim1 C-terminus contains a Ser-rich region, whereas the Sim2 C-terminus both contain Ser/Thr-rich regions, Pro/Ser-rich regions, Pro/Ala-rich regions, and positively charged regions.
