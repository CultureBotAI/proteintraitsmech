identifier: PROSITE:PDOC51662
label: "Beta-propeller phytase (BPP)"
definition: >-
  Beta-propeller phytase (BPP) domain profile. Phytic acid (myo-inositol hexakisphosphate or phytate when in salt form) is the major storage form of organic phosphorus in nature. Phytases (myo- inositol hexakisphosphate phosphohydrolases; EC 3.1.3.8 or 3.1.3.26) hydrolyze phytic acid to less phosphorylated myo-inositol derivatives and inorganic phosphate. According to their three-dimensional structures and catalytic mechanisms, phytases are classified into four subfamilies: histidine acid phosphatase (HAP) (see <PDOC00538>), beta-propeller phytase (BPP), cysteine phytase, and purple acid phytase.
