identifier: PROSITE:PDOC52060
label: "Egg vitelline envelope receptor for lysin (VERL) repeat"
definition: >-
  Egg vitelline envelope receptor for lysin (VERL) repeat profile. Fertilization is a complex process involving a cascade of molecular interactions, including gamete release, sperm chemoattraction to the egg, passage of the sperm through the egg jelly, attachment to the vitelline envelope, induction of the sperm acrosome reaction, dissolution of the vitelline envelope (VE), and fusion of the sperm-egg plasma membranes. Each of these stages is mediated by specific recognition systems, often facilitated by gamete recognition proteins (GRPs). GRPs are crucial to many of these stages and have been identified in various taxa, including mammals, marine invertebrates, insects, plants, and protists.
