identifier: PROSITE:PDOC00649
label: "MARCKS family signature"
definition: >-
  MARCKS family signatures. The myristoylated alanine-rich C-kinase substrate (MARCKS) is a protein of about 300 amino acid residues . It is one of the most prominent cellular substrate for protein kinase C (PKC). The N-terminal glycine residue of MARCKS is myristoylated and allows the protein to associate with plasma membranes. MARCKS binds calmodulin in a calcium-dependent manner; the region of MARCKS responsible for calcium-binding is a highly basic domain of 25 amino acids (called PSD) that contains the PKC phosphorylation sites. When it is not phosphorylated, the PSD domain can bind to filamentous actin.
