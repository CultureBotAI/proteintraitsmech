identifier: PROSITE:PDOC51212
label: WSC
definition: >-
  WSC domain profile. The WSC domain is a putative carbohydrate binding domain of about 90 amino acids. The domain is named after yeast WSC1-WSC4 (cell wall integrity and stress response components 1-4) proteins, which each contain a single WSC domain. The WSC domain can also be found as more copies in tandem or in combination with other domains, such as PKD (see <PDOC50093>), LDL-receptor class A (see<PDOC00929>), C-type lectin (see <PDOC00537>); kringle (see <PDOC00020>), CUB (see <PDOC00908>); FN3 (see <PDOC50853>) and protein kinase (see <PDOC00100>). The WSC domain contains eight conserved cysteine residues which are predicted to form disulfide bridges.
