identifier: PROSITE:PDOC51550
label: "Eph receptor ligand-binding"
definition: >-
  Eph receptor ligand binding (Eph LBD) domain profile. The Eph receptors, which bind a group of cell-membrane-anchored ligands known as ephrins, represent the largest subfamily of receptor tyrosine kinases (RTKs) (see <PDOC00629>). The Eph receptors and their ephrin ligands control a diverse array of cell-cell interactions in the nervous and vascular systems. On ephrin binding, the Eph kinase domain is activated, initiating 'forward' signaling in the receptor-expressing cells. Simultaneously, signals are also induced in the ligand-expressing cells a phenomenon referred to as 'reverse' signalling.
