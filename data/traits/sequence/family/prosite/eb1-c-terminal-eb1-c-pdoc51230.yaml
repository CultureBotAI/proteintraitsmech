identifier: PROSITE:PDOC51230
label: "EB1-C terminal (EB1-C)"
definition: >-
  EB1-like C-terminal (EB1-C) domain profile. A group of microtubule-associated proteins called +TIPs (plus end tracking proteins), including EB1 (end-binding protein 1) family proteins, label growing microtubules ends specifically in diverse organisms and are implicated in spindle dynamics, chromosome segregation, and directing microtubules toward cortical sites. EB1 members have a bipartite composition: the N-terminal CH domain (see <PDOC50021>) mediates microtubule plus end localization and a C- terminal cargo binding domain (EB1-C) that captures cell polarity determinants. The EB1-C domain comprises a unique EB1-like sequence motif that acts as a binding site for other +TIP proteins.
