identifier: PROSITE:PDOC51808
label: "Coiled coil-helix-coiled coil-helix (CHCH)"
definition: >-
  Coiled coil-helix-coiled coil-helix (CHCH) domain profile. Twin CX(9)C proteins constitute a large protein family among all eukaryotes. They adopt a coiled coil-helix-coiled coil helix (CHCH) fold stabilized by two disulfide bonds which are formed by the four cysteines in the twin CX(9)C motifs (i.e. two pairs of cysteines each spaced by nine residues). The large majority of twin CX(9)C proteins contains a single CHCH domain, while the others contain two. In those containing a single CHCH domain, this is most frequently located in the central part of the sequence, with C-terminal and N- terminal CHCH domains being less common.
