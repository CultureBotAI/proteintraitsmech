identifier: PROSITE:PDOC00771
label: "DnaA protein"
definition: >-
  DnaA protein signature. The bacterial dnaA protein plays an important role in initiating and regulating chromosomal replication. DnaA is an ATP- and DNA-binding protein. It binds specifically to 9 bp nucleotide repeats known as dnaA boxes which are found in the chromosome origin of replication (oriC).
