identifier: PROSITE:PDOC00115
label: "Serine/threonine specific protein phosphatases"
definition: >-
  Serine/threonine specific protein phosphatases signature. Serine/threonine specific protein phosphatases (EC 3.1.3.16) (PP) are enzymes that catalyze the removal of a phosphate group attached to a serine or a threonine residue. They are very important in controlling intracellular events in eukaryotic cells. In mammalian tissues four different types of PP have been identified and are known as PP1, PP2A, PP2B and PP2C. Except for PP2C, these enzymes are evolutionary related.
