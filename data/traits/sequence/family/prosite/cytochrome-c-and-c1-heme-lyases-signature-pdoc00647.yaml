identifier: PROSITE:PDOC00647
label: "Cytochrome c and c1 heme lyases signature"
definition: >-
  Cytochrome c and c1 heme lyases signatures. Cytochrome c heme lyase (CCHL) (EC 4.4.1.17) and cytochrome c1 heme lyase (CC1HL) are mitochondrial enzymes that catalyze the covalent attachment of a heme group on two cysteine residues of cytochrome c and c1.
