identifier: PROSITE:PDOC00164
label: "Phosphoribosylglycinamide synthetase"
definition: >-
  Phosphoribosylglycinamide synthetase signature. Phosphoribosylglycinamide synthetase (EC 6.3.4.13) (GARS) (phosphoribosylamine glycine ligase) catalyzes the second step in the de novo biosynthesis of purine, the ATP-dependent addition of 5-phosphoribosylamine to glycine to form 5'phosphoribosylglycinamide.
