identifier: PROSITE:PDOC50005
label: "TPR repeat"
definition: >-
  TPR repeat profiles. The tetratrico peptide repeat (TPRs) is a degenerate 34-amino acid repeated motif that is widespread among all organisms. In the cell, TPR containing proteins are localized in a variety of subcellular compartment, including the nucleus, the cytoplasm and mitochondria. Processes involving TPR proteins include cell-cycle control, transcription repression, stress response, protein kinase inhibition, mitochondrial and peroxisomal protein transport and neurogenesis. TPR repeats mediate protein-protein interactions and the assembly of multiprotein complexes. The smallest functional unit that is widely used appears to be three tandem-TPR motifs.
