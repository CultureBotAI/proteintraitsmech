identifier: PROSITE:PDOC51070
label: "Stonin homology domain (SHD)"
definition: >-
  Stonin homology domain (SHD) profile. Human stonins, like their Drosophila homologue stoned B are supposed to be endocytotic proteins involved in clathrin-mediated endocytosis at synapses. The two human stonins, as well as their Drosophila melanogaster and Caenorhabditis elegans homologues, exhibit a modular structure consisting of an N-terminal proline- and serine-rich domain, a central stonin homology domain (SHD), and a C-terminal domain homologous to the signal-binding domain of the mu subunits of adaptor protein (AP) complexes (mu-homology domain) (see <PDOC51072>).
