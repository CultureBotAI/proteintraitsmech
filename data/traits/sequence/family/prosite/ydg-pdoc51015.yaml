identifier: PROSITE:PDOC51015
label: YDG
definition: >-
  YDG domain profile. The YDG domain is a 150-170 amino acid long module, which has been named for its characteristic YDG motif. Further characteristics of the domain are the conservation of up to 13 evenly spaced glycine residues and a VRV(I/V)RG motif. The YDG domain is found in proteins in combination with different domains, some of which connected with an irreversible enzymatic activity: SET domain (histone methylation) (see <PDOC50280>), RING finger (ubquitination) (see <PDOC00449>), HNH domain (non-specific endonuclease reaction), PHD finger (see <PDOC50016>), AT hook motif, and ubiquitin domain (see <PDOC00271>).
