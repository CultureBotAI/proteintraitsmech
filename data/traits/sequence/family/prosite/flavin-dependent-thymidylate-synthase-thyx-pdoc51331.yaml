identifier: PROSITE:PDOC51331
label: "Flavin-dependent thymidylate synthase (thyX)"
definition: >-
  Flavin-dependent thymidylate synthase (thyX) domain profile. All cellular organisms need thymidylate (dTMP) for the replication of their chromosomes, as dTMP is required for the biosynthesis of dTTP, a building block of DNA. Cells can produce thymidylate either de novo from dUMP or incorporate thymidine using thymidine kinase. The de novo pathway of dTMP synthesis requires a specific enzyme, thymidylate synthase, that methylates dUMP at position 5 of the pyrimidine ring. Two structurally and mechanistically distinct classes of thymidylate synthases exist.
