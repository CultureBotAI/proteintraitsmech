label: "Coronavirus (CoV) ExoN/MTase coactivator"
definition: >-
  Coronavirus (CoV) ExoN/MTase coactivator domain profile. Coronaviruses (CoVs) are enveloped positive-strand RNA viruses that infect many species, including humans, other mammals, and birds. After infection, the host may develop respiratory, bowel, liver, and neurological diseases. Coronaviruses are divided into four genera: Alphacoronavirus, Betacoronavirus, Gammacoronavirus, and Deltacoronavirus. The ideal hosts of AlphaCoV and BetaCoV are mammals, and GammaCoV primarily infects birds, while DeltaCoV has been identified in both mammals and birds. SARS, SARS-CoV-2, BatCoV RaTG13 and Bat-SARS-like coronavirus (BATSL-CoVZXC21 and BAT-SL-CoVZC45) belong to the Sarbecovirus subgenus of BetaCoV.
