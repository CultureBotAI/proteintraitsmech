identifier: PROSITE:PDOC00486
label: "CBM1 (carbohydrate binding type-1)"
definition: >-
  CBM1 (Carbohydrate-binding type-1) domain signature and profile. The microbial degradation of cellulose and xylans requires several types of enzymes such as endoglucanases (EC 3.2.1.4), cellobiohydrolases (EC 3.2.1.91) (exoglucanases), or xylanases (EC 3.2.1.8). Cellulases and xylanases generally consist of a catalytic domain and a cellulose-binding domain (CBD) also called carbohydrate-binding module (CBM).
