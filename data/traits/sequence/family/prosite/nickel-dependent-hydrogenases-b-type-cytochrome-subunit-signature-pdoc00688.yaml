identifier: PROSITE:PDOC00688
label: "Nickel-dependent hydrogenases b-type cytochrome subunit signature"
definition: >-
  Nickel-dependent hydrogenases b-type cytochrome subunit signatures. Bacterial membrane-bound nickel-dependent hydrogenases seem to be associated with a b-type cytochrome involved in electron transfer from hydrogen to oxygen. This cytochrome is a protein of about 28 Kd that seems to have four transmembrane regions. The gene coding for this cytochrome is adjacent to that coding for the large subunit of the hydrogenase. It has been assigned a variety of names in different species: hupC, hyaC, hydC or hoxZ.
