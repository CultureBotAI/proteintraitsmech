identifier: PROSITE:PDOC00465
label: "Bacterial chemotaxis sensory transducers"
definition: >-
  Bacterial chemotaxis sensory transducers signature and profile. Bacterial chemotactic-signal transducers are proteins that respond to changes in the concentration of attractants and repellents in the environment, and transduce a signal from the outside to the inside of the cell. These proteins undergo two covalent modifications: deamidation and reversible methylation. Attractants increase the level of methylation while repellents decrease it. The methyl groups are added by the methyl-transferase cheR and are removed by the methylesterase cheB.
