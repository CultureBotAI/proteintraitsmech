label: K-box
definition: >-
  K-box domain profile. MADS genes in plants encode key developmental regulators of vegetative and reproductive development. The majority of the plant MADS proteins share a stereotypical MIKC structure. It comprises (from N- to C-terminal) an N- terminal domain, which is, however, present only in a minority of proteins; a MADS domain (see <PDOC00302>), which is the major determinant of DNA-binding but which also performs dimerization and accessory factor binding functions; a weakly conserved intervening (I) domain, which constitutes a key molecular determinant for the selective formation of DNA-binding dimers; a keratin-like (K-box) domain, which promotes protein dimerization; and a C-terminal…
