identifier: PROSITE:PDOC51996
label: "Toxin-related mono-ADP-ribosyltransferase (TR mART) core"
definition: >-
  Toxin-related mono-ADP-ribosyltransferase (TR mART) core domain profile. ADP-ribosylation is a protein modification process that occurs widely in pathogenic mechanisms, intracellular signaling systems, DNA repair, and cell division. The reaction is catalyzed by ADP-ribosyltransferases which transfer the ADP-ribose moiety of NAD to a target protein with nicotinamide release. This stereospecific reaction is catalyzed by mono- and poly-ADP- ribosyltransferases (mARTs and pARTs).
