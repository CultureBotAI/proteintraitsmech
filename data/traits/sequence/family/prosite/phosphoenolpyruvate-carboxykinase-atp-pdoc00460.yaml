identifier: PROSITE:PDOC00460
label: "Phosphoenolpyruvate carboxykinase (ATP)"
definition: >-
  Phosphoenolpyruvate carboxykinase (ATP) signature. Phosphoenolpyruvate carboxykinase (ATP) (EC 4.1.1.49) (PEPCK) catalyzes the formation of phosphoenolpyruvate by decarboxylation of oxaloacetate while hydrolyzing ATP, a rate limiting step in gluconeogenesis (the biosynthesis of glucose).
