identifier: PROSITE:PDOC50834
label: "HIN-200 A and B domains"
definition: >-
  HIN-200 A and B domains profile. Interferons (IFNs) are cytokines that regulate host resistance against infections by exerting antimicrobial, immunomodulatory and cell growth regulatory functions. Following their binding to specific cell surface receptors, they induce the expression of a defined set of genes that elicit a number of cellular responses. The HIN-200 (hematopoietic interferon-inducible nuclear proteins with a 200-amino-acid repeat) gene family found on human and mouse chromosome 1 is positively regulated by INFs.
