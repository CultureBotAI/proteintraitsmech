identifier: PROSITE:PDOC00879
label: "Bacterial type II secretion system protein N"
definition: >-
  Bacterial type II secretion system protein N signature. The secretion pathway (GSP) for the export of proteins (also called the type II pathway) requires a number of protein components. One of them is known as the 'N' protein and has been sequenced in a variety of bacteria such as Aeromonas (gene exeN); Erwinia (gene outN); Klebsiella pneumoniae (gene pulN); or Vibrio cholerae (gene epsN).
