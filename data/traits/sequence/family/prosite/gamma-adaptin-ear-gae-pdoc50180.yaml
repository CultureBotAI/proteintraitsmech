identifier: PROSITE:PDOC50180
label: "Gamma-adaptin ear (GAE)"
definition: >-
  Gamma-adaptin ear (GAE) domain profile. The adaptor proteins AP-1 and GGA (Golgi-localized, gamma ear-containing, ADP- ribosylation factor (ARF)-binding proteins) regulate membrane traffic between the trans-Golgi network (TGN) and endosome/lysosomes through ARF-regulated membrane association, recognition of sorting signals, and recruitment of clathrin and accessory proteins. The gamma-adaptin ear (GAE) domain is a C- terminal appendage or ear of about 120 residues, which is found in gamma- adaptins, the heavy subunits of the AP-1 complex, and in GGAs.
