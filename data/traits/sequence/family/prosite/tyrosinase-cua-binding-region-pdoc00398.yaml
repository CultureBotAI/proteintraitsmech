identifier: PROSITE:PDOC00398
label: "Tyrosinase CuA-binding region"
definition: >-
  Tyrosinase signatures. Tyrosinase (EC 1.14.18.1) is a copper monooxygenases that catalyzes the hydroxylation of monophenols and the oxidation of o-diphenols to o-quinols. This enzyme, found in prokaryotes as well as in eukaryotes, is involved in the formation of pigments such as melanins and other polyphenolic compounds.
