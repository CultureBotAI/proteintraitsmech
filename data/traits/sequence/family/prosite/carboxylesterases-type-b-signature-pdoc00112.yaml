label: "Carboxylesterases type-B signature"
definition: >-
  Carboxylesterases type-B signatures. Higher eukaryotes have many distinct esterases. Among the different types are those which act on carboxylic esters (EC 3.1.1.-). Carboxyl-esterases have been classified into three categories (A, B and C) on the basis of differential patterns of inhibition by organophosphates. The sequence of a number of type-B carboxylesterases indicates that the majority are evolutionary related. This family currently consists of the following proteins:
