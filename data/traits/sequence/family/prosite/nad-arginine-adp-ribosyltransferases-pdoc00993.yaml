identifier: PROSITE:PDOC00993
label: "NAD:arginine ADP-ribosyltransferases"
definition: >-
  NAD:arginine ADP-ribosyltransferase signature. Mono(ADP-ribosyl)transferase (EC 2.4.2.31) catalyzes the transfer of the ADP- ribose moiety of nicotinamide adenine dinucleotide (NAD) to an acceptor amino acid in proteins. In vertebrates there is a family of such enzymes that transfer an NAD group to arginine.
