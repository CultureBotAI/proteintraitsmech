identifier: PROSITE:PDOC00516
label: "Plant lipid transfer proteins"
definition: >-
  Plant lipid transfer proteins signature. Plant cells contain proteins, called lipid transfer proteins (LTP), which are able to facilitate the transfer of phospholipids and other lipids across membranes. These proteins, whose subcellular location is not yet known, could play a major role in membrane biogenesis by conveying phospholipids such as waxes or cutin from their site of biosynthesis to membranes unable to form these lipids.
