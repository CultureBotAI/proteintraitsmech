identifier: PROSITE:PDOC50809
label: "DM DNA-binding"
definition: >-
  DM DNA-binding domain signature and profile. The DM (Doublesex/Mab-3) domain is found in proteins from worm to mammals. Null mutation in DM domain containing proteins doublesex and mab-3 are associated with intersexual phenotypes. These proteins are believed to function as transcription factors on downstream sex-determination genes, especially on neuroblast differenciation and yolk protein genes transcription.
