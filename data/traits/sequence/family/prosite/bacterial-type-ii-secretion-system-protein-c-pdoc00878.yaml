identifier: PROSITE:PDOC00878
label: "Bacterial type II secretion system protein C"
definition: >-
  Bacterial type II secretion system protein C signature. The secretion pathway (GSP) for the export of proteins (also called the type II pathway) requires a number of protein components. One of them is known as the 'C' protein and has been sequenced in a variety of bacteria such as Aeromonas (gene exeC); Erwinia (gene outC); Escherichia coli (gene yheE); Klebsiella pneumoniae (gene pulC); Pseudomonas aeruginosa (gene xcpS) or Vibrio cholerae (gene epsC).
