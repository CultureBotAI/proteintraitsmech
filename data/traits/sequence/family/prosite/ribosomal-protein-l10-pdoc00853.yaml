identifier: PROSITE:PDOC00853
label: "Ribosomal protein L10"
definition: >-
  Ribosomal protein L10 signature. Ribosomal protein L10 is one of the proteins from the large ribosomal subunit. L10 is a protein of 162 to 185 amino-acid residues which has only been found so far in eubacteria. As a signature pattern, we selected a conserved region located in the N-terminal section of these proteins.
