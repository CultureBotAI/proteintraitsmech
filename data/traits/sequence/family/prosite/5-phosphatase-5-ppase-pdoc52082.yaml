label: "5-phosphatase (5-PPase)"
definition: >-
  5-phosphatase (5-PPase) domain profile. Phosphoinositides (PIPs) are membrane lipids that, together with their corresponding soluble inositol phosphates (IPs), regulate various cellular processes, including membrane recruitment of proteins, actin polymerization, synaptic vesicle trafficking and exo- and endocytosis. The dynamic control of the membrane distribution and relative abundance of the seven naturally occurring PIPs by a multitude of phosphoinositide kinases and phosphatases forms a versatile signaling mechanism able to tune the spatial and temporal regulation of many crucial events in the cell.
