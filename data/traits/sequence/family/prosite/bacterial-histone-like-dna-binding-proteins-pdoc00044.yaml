identifier: PROSITE:PDOC00044
label: "Bacterial histone-like DNA-binding proteins"
definition: >-
  Bacterial histone-like DNA-binding proteins signature. Bacteria synthesize a set of small, usually basic proteins of about 90 residues that bind DNA and are known as histone-like proteins. The exact function of these proteins is not yet clear but they are capable of wrapping DNA and stabilizing it from denaturation under extreme environmental conditions. The sequence of a number of different types of these proteins is known:
