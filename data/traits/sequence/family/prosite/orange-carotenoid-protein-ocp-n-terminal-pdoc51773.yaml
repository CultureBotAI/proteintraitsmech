identifier: PROSITE:PDOC51773
label: "Orange carotenoid protein (OCP) N-terminal"
definition: >-
  Orange carotenoid protein (OCP) N-terminal domain profile. The photoprotective processes of photosynthetic organisms involve the dissipation of excess absorbed light energy as heat. Photoprotection in cyanobacteria is mechanistically distinct from that in plants; it involves the orange carotenoid protein (OCP), a water soluble protein containing a single carotenoid. The OCP serves as a sensor of light intensity and an effector of phycobilisome (PB)-associated photoprotection in cyanobacteria. Structurally, the OCP is composed of two distinct domains spanned by a single carotenoid chromophore.
