identifier: PROSITE:PDOC51864
label: Astacin-like
definition: >-
  Astacin-like domain profile. Astacin or M12A family zinc metalloproteases are found in bacteria and animals. They belong to the metzincin protease family (see <PDOC00129>) and have diverse roles ranging from digestion of food to processing of extracellular matrix components. The first member of this family (astacin), a digestive enzyme, was identified in the freshwater crayfish Astacus astacus.
