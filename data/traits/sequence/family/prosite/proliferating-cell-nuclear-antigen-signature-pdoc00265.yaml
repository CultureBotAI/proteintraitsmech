label: "Proliferating cell nuclear antigen signature"
definition: >-
  Proliferating cell nuclear antigen signatures. Proliferating cell nuclear antigen (PCNA) is a protein involved in DNA replication by acting as a cofactor for DNA polymerase delta, the polymerase responsible for lagging strand DNA replication.
