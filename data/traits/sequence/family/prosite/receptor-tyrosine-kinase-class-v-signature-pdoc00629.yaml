identifier: PROSITE:PDOC00629
label: "Receptor tyrosine kinase class V signature"
definition: >-
  Receptor tyrosine kinase class V signatures. A number of growth factors stimulate mitogenesis by interacting with a family of cell surface receptors which possess an intrinsic, ligand-sensitive, protein tyrosine kinase activity. These receptor tyrosine kinases (RTK) all share the same topology: an extracellular ligand-binding domain, a single transmembrane region and a cytoplasmic kinase domain. However they can be classified into at least five groups on the basis of sequence similarities.
