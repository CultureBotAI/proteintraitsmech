identifier: PROSITE:PDOC00088
label: "N-4 cytosine-specific DNA methylases"
definition: >-
  N-4 cytosine-specific DNA methylases signature. N-4 cytosine-specific DNA methylases (EC 2.1.1.113) are enzymes that specifically methylate the amino group at the C-4 position of cytosines in DNA. Such enzymes are found as components of type II restriction-modification systems in prokaryotes. Such enzymes recognize a specific sequence in DNA and methylate a cytosine in that sequence. By this action they protect DNA from cleavage by type II restriction enzymes that recognize the same sequence.
