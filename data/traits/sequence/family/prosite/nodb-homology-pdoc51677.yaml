identifier: PROSITE:PDOC51677
label: "NodB homology"
definition: >-
  NodB homology domain profile. The NodB homology domain is a catalytic domain of ~200 amino acid residues, which has been named after its similarity to rhizobial NodB chitooligosaccharide deacetylase. It is found in members of carbohydrate esterase family 4 (CE4) and in PuuE proteins.
