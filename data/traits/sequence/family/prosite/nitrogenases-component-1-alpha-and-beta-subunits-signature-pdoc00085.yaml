definition: >-
  Nitrogenases component 1 alpha and beta subunits signatures. Nitrogenase (EC 1.18.6.1) is the enzyme system responsible for biological nitrogen fixation. Nitrogenase is an oligomeric complex which consists of two components: component 2 is an homodimer of an iron-sulfur protein, while component 1 which contains the active site for the reduction of nitrogen to ammonia exists in three different forms:
