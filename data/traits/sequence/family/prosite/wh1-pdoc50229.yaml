identifier: PROSITE:PDOC50229
label: WH1
definition: >-
  WH1 domain profile. The WH1 (WASP-Homology 1, or Wiskott-Aldrich homology 1) or EVH1 (Ena/VASP homology 1, or Enabled/Vasodilator-stimulated phosphoprotein homology 1) domain is an ~110 amino acids protein-protein interaction module. WH1 proteins occur in eukaryotes from yeast to mammals and play a role in signaling and regulation of the cytoskeleton. The WH1 domain is usually located in the N-terminal part. A CRIB domain (see <PDOC50108>) or a WH2 domain (see <PDOC51082>) can occur C-terminal to the WH1 domain.
