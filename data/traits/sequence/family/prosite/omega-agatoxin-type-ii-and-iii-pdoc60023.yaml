identifier: PROSITE:PDOC60023
label: "Omega-agatoxin type II and III"
definition: >-
  Omega-agatoxin type II and III signature. The spider venoms often contain many active peptides such as neurotoxins, lectins, inhibitors to enzyme, etc. These peptides are very important for spider's hunting and defending. During the long history of spider evolution, the peptides evolved into different structures and functions. Spider venoms possess a diverse array of peptide toxins composed of high number of cysteine residues varying from 6 to 14. Several peptide toxins, collectively referred to as omega-toxins, block with differential selectivity the different types of voltage-gated Ca2+ channels.
