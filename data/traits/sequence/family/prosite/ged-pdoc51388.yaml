label: GED
definition: >-
  GED domain profile. Dynamin superfamily members are large GTPases, conserved through evolution mainly described as mechanochemical enzymes involved in membrane scission events. The dynamin superfamily has been subdivided into several subgroups based on domain organization: classical dynamin, dynamin-like proteins (Dlps), Mc proteins, optic atrophy 1 protein (OPA1), Mitofusins, guanylate-binding proteins (GBP) and alastatins.
