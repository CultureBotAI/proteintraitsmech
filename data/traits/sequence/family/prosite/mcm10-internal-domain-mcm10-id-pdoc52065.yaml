identifier: PROSITE:PDOC52065
label: "MCM10 internal domain (MCM10-ID)"
definition: >-
  MCM10 internal and C-terminal domains (MCM-ID and MCM-CTD) profiles. Eukaryotic DNA replication is carried out by large multiprotein machines that coordinate DNA unwinding and synthesis at the replication fork. Minichromosome Maintenance protein 10 (MCM10) is exclusive to eukaryotes and is essential to both initiation and elongation phases of chromosomal DNA replication. MCM10 works as scaffold protein that can interact with many proteins, such as DNA polymerase alpha (pol alpha) and DNA primase, some subunits of Cdc45-Mcm2-7- GINS helicase (CMG) complex, and PCNA. In addition, MCM10 binds both single- stranded (ss) and double-stranded (ds) DNA.
