identifier: PROSITE:PDOC00717
label: "Trehalase signature"
definition: >-
  Trehalase signatures. Trehalase (EC 3.2.1.28) is the enzyme responsible for the degradation of the disaccharide alpha,alpha-trehalose yielding two glucose subunits. It is an enzyme found in a wide variety of organisms and whose sequence has been highly conserved throughout evolution.
