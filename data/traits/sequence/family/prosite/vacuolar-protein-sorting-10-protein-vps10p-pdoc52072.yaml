identifier: PROSITE:PDOC52072
label: "Vacuolar protein sorting 10 protein (Vps10p)"
definition: >-
  Vacuolar protein sorting 10 protein (Vps10p) domain profile. The Vps10p domain is a large (~700 residue) luminal/extracellular domain found in type-I transmembrane receptors. It was originally found in the yeast vacuolar protein sorting 10 protein (Vps10p), which contains two copies of the domain, and it occurs in only five proteins in mammals: Sortilin, the mutually homologues SorCS1-3 and SorLA, which constitute the Vps10p receptor family and are all highly expressed in neuronal tissues.
