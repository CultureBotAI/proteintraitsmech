identifier: PROSITE:PDOC00810
label: "SAICAR synthetase signature"
definition: >-
  SAICAR synthetase signatures. Phosphoribosylaminoimidazole-succinocarboxamide synthase (EC 6.3.2.6) (SAICAR synthetase) catalyzes the seventh step in the de novo purine biosynthetic pathway; the ATP-dependent conversion of 5'-phosphoribosyl-5-aminoimidazole-4- carboxylic acid and aspartic acid to SAICAR. In bacteria (gene purC), fungi (gene ADE1) and plants, SAICAR synthetase is a monofunctional protein; in higher vertebrates it is the N-terminal domain of a bifunctional enzyme that also catalyze phosphoribosylaminoimidazole carboxylase (AIRC) activity.
