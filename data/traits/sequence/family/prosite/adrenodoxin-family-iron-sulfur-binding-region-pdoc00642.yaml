label: "Adrenodoxin family, iron-sulfur binding region"
definition: >-
  Adrenodoxin family, iron-sulfur binding region signature. Ferredoxins are a group of iron-sulfur proteins which mediate electron transfer in a wide variety of metabolic reactions. Ferredoxins can be divided into several subgroups depending upon the physiological nature of the iron sulfur cluster(s) and according to sequence similarities. One family of ferredoxins groups together the following proteins that all bind a single 2Fe- 2S iron-sulfur cluster:
