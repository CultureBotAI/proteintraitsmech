identifier: PROSITE:PDOC60001
label: "Nitric oxide synthase (NOS)"
definition: >-
  Nitric oxide synthase (NOS) signature. Nitric oxide synthase (EC 1.14.13.39) (NOS) enzymes produce nitric oxide (NO) by catalyzing a five-electron oxidation of a guanidino nitrogen of L-arginine (L-Arg). Oxidation of L-Arg to L-citrulline occurs via two successive monooxygenation reactions producing N(omega)-hydroxy-L-arginine as an intermediate. 2 mol of O(2) and 1.5 mol of NADPH are consumed per mole of NO formed.
