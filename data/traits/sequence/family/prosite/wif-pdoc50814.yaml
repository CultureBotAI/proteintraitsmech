identifier: PROSITE:PDOC50814
label: WIF
definition: >-
  WIF domain profile. The WIF domain is an around 140-amino acid module which presents an independent folding unit in receptor molecules that bind to palmitoylated signaling proteins. It has been identified in the extracellular region of the Ryk receptor tyrosine kinases and in the secreted Wnt-inhibitory-factor-1 (WIF-1) proteins. As the WIF module is both necessary and sufficient for Wnt binding by WIF-1, it has been proposed that the WIF module of Ryk receptors might also serve to bind to Wnt proteins or related ligands. It has been suggested that the WIF domain recognizes and binds to Wnts that have been activated by palmitoylation.
