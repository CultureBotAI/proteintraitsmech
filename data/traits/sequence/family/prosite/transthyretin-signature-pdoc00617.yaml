identifier: PROSITE:PDOC00617
label: "Transthyretin signature"
definition: >-
  Transthyretin signatures. Transthyretin (prealbumin) is a thyroid hormone-binding protein that seems to transport thyroxine (T4) from the bloodstream to the brain. It is a protein of about 130 amino acids that assembles as a homotetramer and forms an internal channel that binds thyroxine. Transthyretin is mainly synthesized in the brain choroid plexus. In humans, variants of the protein are associated with distinct forms of amyloidosis.
