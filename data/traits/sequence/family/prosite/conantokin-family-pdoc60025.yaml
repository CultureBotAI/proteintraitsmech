identifier: PROSITE:PDOC60025
label: "Conantokin family"
definition: >-
  Conantokin family signature. The conantokins are a family of neuroactive peptides found in the venoms of fish-hunting cone snails. They possess a high content of gamma-carboxyglutamic acid (Gla) (4-5 residues), a non-standard amino-acid made by the post- translational modification of glutamate (Glu) residue. Conantokins are the only natural biochemical-characterized peptides known to be N-methyl-D- aspartate (NMDA) receptor antagonists. They are one class of agents that show therapeutic promise in treating conditions associated with NMDA receptor dysfunction.
