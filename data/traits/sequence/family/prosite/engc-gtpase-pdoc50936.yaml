identifier: PROSITE:PDOC50936
label: "EngC GTPase"
definition: >-
  EngC GTPase domain profile. GTPases function as crucial molecular switches in a broad variety of biochemical processes. The majority of GTPases form a vast class of evolutionarily related proteins within the superclass of P-loop-containing ATPases (see <PDOC00017>). The P-loop GTPases share a conserved amino acid sequence G1-G3-G4 motif pattern (G2 is a less conserved motif found only in some GTPases) present in the GTPase domain. The Escherichia coli protein engC represents a protein family whose members are broadly conserved in bacteria and have been shown to be indispensable to the growth of E. coli and Bacillus subtilis.
