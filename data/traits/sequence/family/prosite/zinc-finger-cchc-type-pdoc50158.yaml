identifier: PROSITE:PDOC50158
label: "Zinc finger CCHC-type"
definition: >-
  Zinc finger CCHC-type profile. The 18 residues CCHC zinc finger is mainly found in the nucleocapsid protein of retrovirus. It is required for viral genome packaging and for early infection process. It is also found in eukaryotic proteins involved in RNA binding or single-stranded DNA binding.
