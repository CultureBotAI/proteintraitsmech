identifier: PROSITE:PDOC00522
label: "IRF tryptophan pentad repeat DNA-binding"
definition: >-
  IRF tryptophan pentad repeat DNA-binding domain signature and profile. Viral infections induce the expression of type I interferons (IFN-alpha and IFN-beta) genes. The induction is due to the transcriptional activation of the IFN genes. Interferon regulatory factor I (IRF-1) is one of the transcription factors responsible for that activation. IRF-1 binds to an upstream regulatory cis element, known as the interferon consensus sequence (ICS), which is found in the promoters of type I IFN and IFN-inducible MHC class I genes.
