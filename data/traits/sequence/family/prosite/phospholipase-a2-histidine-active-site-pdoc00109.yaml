identifier: PROSITE:PDOC00109
label: "Phospholipase A2 histidine active site"
definition: >-
  Phospholipase A2 active sites signatures. Phospholipase A2 (EC 3.1.1.4) (PA2) is an enzyme which releases fatty acids from the second carbon group of glycerol. PA2's are small and rigid proteins of 120 amino-acid residues that have four to seven disulfide bonds. PA2 binds a calcium ion which is required for activity. The side chains of two conserved residues, a histidine and an aspartic acid, participate in a 'catalytic network'.
