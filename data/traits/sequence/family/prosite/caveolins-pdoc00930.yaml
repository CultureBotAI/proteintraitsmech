identifier: PROSITE:PDOC00930
label: Caveolins
definition: >-
  Caveolins signature. Caveolins are a family of integral membrane proteins which are the principal components of caveolae membranes. Cavoleae are flask-shaped plasma membrane invaginations whose exact cellular function is not yet clear. Caveolins may act as scaffolding proteins within caveolar membranes. They interact directly with G-protein alpha subunits and can functionally regulate their activity.
