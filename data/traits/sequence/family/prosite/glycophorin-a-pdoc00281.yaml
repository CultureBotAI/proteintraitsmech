identifier: PROSITE:PDOC00281
label: "Glycophorin A"
definition: >-
  Glycophorin A signature. Glycophorin A is the major sialoglycoprotein of erythrocyte membrane. Structurally, glycophorin A consists of an N-terminal extracellular domain, heavily glycosylated on serine and threonine residues, followed by a transmembrane region and a C-terminal cytoplasmic domain.
