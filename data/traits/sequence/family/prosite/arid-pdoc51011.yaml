identifier: PROSITE:PDOC51011
label: ARID
definition: >-
  ARID domain profile. The AT-rich interaction domain (ARID) is an ~100-amino acid DNA-binding module found in a large number of eukaryotic transcription factors that regulate cell proliferation, differentiation and development. The ARID domain appears as a single-copy motif and can be found in association with other domains, such as JmjC, JmjN, Tudor (see <PDOC50304>) and PHD-type zinc finger (see <PDOC50016>).
