identifier: PROSITE:PDOC50838
label: "MAGE conserved"
definition: >-
  MAGE conserved domain profile. The first mammalian members of the MAGE (melanoma-associated antigen) gene family were originally described as completely silent in normal adult tissues, with the exception of male germ cells, and, for some of them, placenta. By contrast, these genes were expressed in various kind of tumors. However, other members of the family were recently found to be expressed in normal cells, indicating that the family is larger and more disparate than initially expected. MAGE-like genes have also been identified in non-mammalian species, like the zebrafish or Drosophila melanogaster.
