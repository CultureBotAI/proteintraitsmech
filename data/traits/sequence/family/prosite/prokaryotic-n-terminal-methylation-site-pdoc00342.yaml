identifier: PROSITE:PDOC00342
label: "Prokaryotic N-terminal methylation site"
definition: >-
  Prokaryotic N-terminal methylation site. A number of bacteria express filamentous adhesins known as pili. The pili are polar flexible filaments of about 5.4 nm diameter and 2500 nm average length; they consist of a single polypeptide chain (called pilin or fimbrial protein) arranged in a helical configuration of five subunits per turn in the assembled pilus. Gram-negative bacteria produce pilin which are characterized by the presence of a very short leader peptide of 6 to 7 residues, followed by a methylated N-terminal phenylalanine residue and by a highly conserved sequence of about 24 hydrophobic residues. This class of pilin is often referred to as NMePhe or type-4 pili.
