identifier: PROSITE:PDOC00091
label: "Aspartate and ornithine carbamoyltransferases"
definition: >-
  Aspartate and ornithine carbamoyltransferases signature. Aspartate carbamoyltransferase (EC 2.1.3.2) (ATCase) catalyzes the conversion of aspartate and carbamoyl phosphate to carbamoylaspartate, the second step in the de novo biosynthesis of pyrimidine nucleotides. In prokaryotes ATCase consists of two subunits: a catalytic chain (gene pyrB) and a regulatory chain (gene pyrI), while in eukaryotes it is a domain in a multi- functional enzyme (called URA2 in yeast, rudimentary in Drosophila, and CAD in mammals) that also catalyzes other steps of the biosynthesis of pyrimidines.
