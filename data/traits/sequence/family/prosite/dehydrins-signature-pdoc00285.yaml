identifier: PROSITE:PDOC00285
label: "Dehydrins signature"
definition: >-
  Dehydrins signatures. A number of proteins are produced by plants that experience water-stress. Water-stress takes place when the water available to a plant falls below a critical level. The plant hormone abscisic acid (ABA) appears to modulate the response of plant to water-stress. Proteins that are expressed during water- stress are called dehydrins or LEA group 2 proteins. The proteins that belong to this family are listed below.
