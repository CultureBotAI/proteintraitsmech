identifier: PROSITE:PDOC00274
label: "Eukaryotic initiation factor 5A hypusine"
definition: >-
  Eukaryotic initiation factor 5A hypusine signature. Eukaryotic initiation factor 5A (eIF-5A) (formerly known as eIF-4D) is a small protein whose precise role in the initiation of protein synthesis is not known. It appears to promote the formation of the first peptide bond. eIF-5A seems to be the only eukaryotic protein to contain an hypusine residue. Hypusine is derived from lysine by the post-translational addition of a butylamino group (from spermidine) to the epsilon-amino group of lysine. The hypusine group is essential to the function of eIF-5A.
