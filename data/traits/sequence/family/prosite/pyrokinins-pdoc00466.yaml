label: Pyrokinins
definition: >-
  Pyrokinins signature. Pyrokinins are insect neuropeptides that mediate visceral muscle contractile activity (myotropic activity). The pyrokinins are peptides of 8 to 16 amino acids that share the amide-blocked C-terminal sequence Phe-Xaa-Pro-Arg- Leu-NH2, where Xaa is either Gly, Ser, Thr, or Val. This pentapeptide is sufficient to elicit a significant myotropic activity. The same C-terminal sequence is present in the following insect neuropeptides:
