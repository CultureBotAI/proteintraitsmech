identifier: PROSITE:PDOC51110
label: "Saposin A-type"
definition: >-
  Saposin A-type domain profile. The saposin A-type domain is a ~40 amino acid domain present in the saposin precursor, prosaposin, in the propeptides that are cleaved off in the activation reaction. The domain is named after the small lysosomal proteins, saposins, which serve as sphingolipid hydrolase activator proteins in vertebrates. The mammalian saposins are synthesized as a single precursor molecule (prosaposin) which contains four saposin B-type domains (see <PDOC50015>) yielding the active saposins A, B, C and D after proteolytic cleavage, and two saposin A-type domains in the extremities that are removed in the activation reaction.
