identifier: PROSITE:PDOC00218
label: "Phytochrome chromophore attachment site"
definition: >-
  Phytochrome chromophore attachment site. Phytochrome is a plant protein that acts as a regulatory photoreceptor and which mediates red-light effects on a wide variety of physiological and molecular responses. Phytochrome can undergo a reversible photochemical conversion between a biologically inactive red light-absorbing form and the active far-red light-absorbing form. Phytochrome is a dimer of identical 124 Kd subunits, each of which contains a covalently attached linear tetrapyrrole chromophore.
