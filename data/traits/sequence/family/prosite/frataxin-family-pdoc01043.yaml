identifier: PROSITE:PDOC01043
label: "Frataxin family"
definition: >-
  Frataxin family signature and profile. Frataxin (gene FRDA) is a mitochondrial protein, which is involved in Friedreich's ataxia (FA), an autosomal recessive, progressive degenerative disease characterized by neurodegeneration, cardiomyopathy and diabetes mellitus. Frataxin defect causes mitochondrial iron accumulation, which could lead to specific deficiency in the activities of aconitases and of mitochondrial iron-sulfur dependent enzymes, as suggested by biochemical data.
