definition: >-
  Zinc carboxypeptidases, zinc-binding regions signatures. There are a number of different types of zinc-dependent carboxypeptidases (EC 3.4.17.-). All these enzymes seem to be structurally and functionally related. The enzymes that belong to this family are listed below.
