identifier: PROSITE:PDOC00066
label: "Malate dehydrogenase active site"
definition: >-
  Malate dehydrogenase active site signature. Malate dehydrogenase (EC 1.1.1.37) (MDH) catalyzes the interconversion of malate to oxaloacetate utilizing the NAD/NADH cofactor system. The enzyme participates in the citric acid cycle and exists in all aerobics organisms.
