identifier: PROSITE:PDOC00314
label: "Nitrite and sulfite reductases iron-sulfur/siroheme-binding site"
definition: >-
  Nitrite and sulfite reductases iron-sulfur/siroheme-binding site. Nitrite reductases (NiR) catalyze the reduction of nitrite into ammonium, the second step in the assimilation of nitrate. There are two types of NiR: the higher plant chloroplastic form of NiR (EC 1.7.7.1) is a monomeric protein that uses reduced ferredoxin as the electron donor; while fungal and bacterial NiR (EC 1.7.1.4) are homodimeric proteins that uses NAD(P)H as the electron donor. Both forms of NiR contain a siroheme-Fe and iron-sulfur centers.
