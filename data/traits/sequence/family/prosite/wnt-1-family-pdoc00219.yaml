identifier: PROSITE:PDOC00219
label: "Wnt-1 family"
definition: >-
  Wnt-1 family signature. Wnt-1 (previously known as int-1) is a proto-oncogene induced by the integration of the mouse mammary tumor virus. It is thought to play a role in intercellular communication and seems to be a signalling molecule important in the development of the central nervous system (CNS). The sequence of wnt-1 is highly conserved in mammals, fish, and amphibians.
