identifier: PROSITE:PDOC51433
label: "Pointed (PNT)"
definition: >-
  Pointed (PNT) domain profile. The highly conserved PNT (or Pointed) domain is found within a subset of the Ets transcription factors (see <PDOC00374>), including mammalian Ets-1, Ets-2, Erg, Fli-1, GABPalpha, and Tel, as well as Drosophila Pnt-P2 and Yan. The PNT domain is structurally related to the larger group of SAM domains (see <PDOC50105>) through a common tertiary arrangement of four alpha-helices (see <PDB:1SXE>). A role in protein-protein association has been established for the PNT domain.
