identifier: PROSITE:PDOC51743
label: "Alphavirus-like methyltransferase (MT)"
definition: >-
  Alphavirus-like methyltransferase (MT) domain profile. The alphavirus-like methyltransferase (MT) domain is found in a superfamily of positive-strand RNA viruses that includes alphaviruses, hepatis E virus, and rubella virus, that are animal viruses, as well as a large number of plant viruses: tobra-, tobamo-, bromo-, tymo-, potex-, and carlaviruses and other groups. The alphavirus-like MT domain is involved in methylation of the cap during viral RNA maturation: S-adenosylmethionine (AdoMet) reacts with GTP to yield 7-methyl-GTP (m(7)GTP) and S-adenosylhomocysteine (AdoHcy).
