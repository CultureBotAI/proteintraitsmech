identifier: PROSITE:PDOC00266
label: "Prenyl group binding site (CAAX box)"
definition: >-
  Prenyl group binding site (CAAX box). A number of eukaryotic proteins are post-translationally modified by the attachment of either a farnesyl or a geranyl-geranyl group to a cysteine residue. The modification occurs on cysteine residues that are three residues away from the C-terminal extremity; the two residues that separate this cysteine from the C-terminal residue are generally aliphatic. This Cys- Ali-Ali-X pattern is generally known as the CAAX box. Proteins known or strongly presumed to be the target of this modification are listed below.
