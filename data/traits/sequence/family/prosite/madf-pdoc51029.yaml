identifier: PROSITE:PDOC51029
label: MADF
definition: >-
  MADF domain profile. The myb/SANT-like domain in Adf-1 (MADF) is a ~80-amino-acid module that directs sequence specific DNA binding to a site consisting of multiple trinucleotide repeats. The MADF domain is found in one or more copies in eukaryotic and viral proteins and is often associated with the BESS domain (see <PDOC51031>).
