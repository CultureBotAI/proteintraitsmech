identifier: PROSITE:PDOC00907
label: "Phosphotyrosine interaction domain (PID)"
definition: >-
  Phosphotyrosine interaction domain (PID) profile. Proteins encoding phosphotyrosine binding (PTB) domains function as adaptors or scaffolds to organize the signaling complexes involved in wide-ranging physiological processes including neural development, immunity, tissue homeostasis and cell growth. Due to structural differences, PTB domains are divided into three groups represented by phosphotyrosine-dependent IRS-like (see <PDOC51064>), phosphotyrosine-dependent Shc-like, and phosphotyrosine- independent Dab-like PTBs. The last two PTBs have been named as phosphotyrosine interaction domain (PID or PI domain). PID domain has an average length of about 160 amino acids.
