identifier: PROSITE:PDOC01039
label: "Ornithine decarboxylase antizyme"
definition: >-
  Ornithine decarboxylase antizyme signature. Ornithine decarboxylase antizyme (ODC-AZ) binds to, and destabilizes, ornithine decarboxylase (ODC), a key enzyme in polyamine synthesis. ODC is then rapidly degraded. The expression of ODC-AZ requires programmed, ribosomal frameshifting which is modulated according to the cellular concentration of polyamines. High levels of polyamines induce a +1 ribosomal frameshift in the translation of mRNA for the antizyme leading to the expression of a full- length protein.
