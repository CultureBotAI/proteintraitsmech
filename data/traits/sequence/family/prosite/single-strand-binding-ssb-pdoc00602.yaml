identifier: PROSITE:PDOC00602
label: "Single-strand binding (SSB)"
definition: >-
  Single-strand binding (SSB) domain profile. The Escherichia coli single-strand binding protein (gene ssb), also known as the helix-destabilizing protein, is a protein of 177 amino acids. It binds tightly, as a homotetramer, to single-stranded DNA (ss-DNA) and plays an important role in DNA replication, recombination and repair.
