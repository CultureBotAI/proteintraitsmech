label: VWFC
definition: >-
  VWFC domain signature and profile. The VWFC domain is named after the von Willebrand factor (VWF) type C repeat which is found twice in this multidomain protein. It has a length of about 70 amino acids covering 10 well conserved cysteines. Proteins with such a domain [1-4] are listed below.
