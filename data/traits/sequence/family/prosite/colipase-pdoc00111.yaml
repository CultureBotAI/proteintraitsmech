identifier: PROSITE:PDOC00111
label: Colipase
definition: >-
  Colipase family signature and profile. Colipase is a protein that functions as a cofactor for pancreatic lipase, with which it forms a stoichiometric complex. It also binds to the bile-salt covered triacylglycerol interface thus allowing the enzyme to anchor itself to the water-lipid interface.
