identifier: PROSITE:PDOC51534
label: SEFIR
definition: >-
  SEFIR domain profile. The SEFIR domain (after SEFs and IL17Rs) is a conserved sequence segment identified in transmembrane receptors (including SEFs, IL17Rs) and soluble factors (including CIKS/ACT1) in eukaryotes and bacteria. In addition to the SEFIR sequence homology, SEFs and IL17Rs share the same architecture. Their extracellular regions are sequentially divergent but appear structurally similar to a tandem fibronectin 3 (FN3)-like domain arrangement. A single transmembrane region is followed by a high-complexity sequence region involving the SEFIR domain and a C-terminal tail that is enriched with polar residues and, sometimes, with low complexity regions.
