identifier: PROSITE:PDOC51934
label: LRAT
definition: >-
  LRAT domain profile. NlpC/P60 superfamily papain-like enzymes play important roles in all kingdoms of life. Characterized members of this superfamily have diverse enzymatic functions, such as peptidases, amidases, transglutaminases and acetyltransferases. This divergent superfamily consists of four main families: P60-like, AcmB/LytN-like (see <PDOC50911>), YaeF/YiiX-like, and LRAT-like.
