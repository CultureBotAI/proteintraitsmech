identifier: PROSITE:PDOC51327
label: "Dicer double-stranded RNA-binding fold"
definition: >-
  Dicer double-stranded RNA-binding fold domain profile. RNA interference (RNAi) is an ancient gene-silencing process that plays a fundamental role in diverse eukaryotic functions including viral defense, chromatin remodeling, genome rearrangement, developmental timing, brain morphogenesis, and stem cell maintenance. All RNAi pathways require the multidomain ribonuclease Dicer, which initiates RNAi by cleaving double- stranded RNA (dsRNA) substrates into small fragments ~25 nuleotides in length.
