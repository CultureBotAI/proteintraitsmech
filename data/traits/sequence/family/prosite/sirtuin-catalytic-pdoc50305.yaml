identifier: PROSITE:PDOC50305
label: "Sirtuin catalytic"
definition: >-
  Sirtuin catalytic domain profile. The sirtuin family is broadly conserved from bacteria to human. Yeast SIR2, the founding member, was first isolated as part of the SIR complex required for maintaining a modified chromatin structure at telomeres. SIR2 functions in transcriptional silencing, cell cycle progression, and chromosome stability. Although most sirtuins in eukaryotic cells are located in the nucleus, others are cytoplasmic or mitochondrial.
