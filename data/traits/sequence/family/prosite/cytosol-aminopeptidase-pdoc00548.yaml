identifier: PROSITE:PDOC00548
label: "Cytosol aminopeptidase"
definition: >-
  Cytosol aminopeptidase signature. Cytosol aminopeptidase is a eukaryotic cytosolic zinc-dependent exopeptidase that catalyzes the removal of unsubstituted amino-acid residues from the N-terminus of proteins. This enzyme is often known as leucine aminopeptidase (EC 3.4.11.1) (LAP) but has been shown to be identical with prolyl aminopeptidase (EC 3.4.11.5). Cytosol aminopeptidase is a hexamer of identical chains, each of which binds two zinc ions.
