identifier: PROSITE:PDOC00712
label: "Nitrilases / cyanide hydratase signature"
definition: >-
  Nitrilases / cyanide hydratase signatures. Nitrilases (EC 3.5.5.1) are enzymes that convert nitriles into their corresponding acids and ammonia. They are widespread in microbes as well as in plants where they convert indole-3-acetonitrile to the hormone indole-3- acetic acid. A conserved cysteine has been shown to be essential for enzyme activity; it seems to be involved in a nucleophilic attack on the nitrile carbon atom.
