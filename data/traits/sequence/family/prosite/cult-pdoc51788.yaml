identifier: PROSITE:PDOC51788
label: CULT
definition: >-
  CULT domain profile. Despite having caused one of the greatest medical catastrophies of the last century through its teratogenic side-effects, thalidomide continues to be an important agent in the treatment of leprosy and cancer. The cereblon protein originally identified in a screen for mutations causing mild mental retardation is a major target of thalidomide, and its derivatives, and is responsible for the teratogenic effects of the drug. Cereblon owes its name to its involvment in brain development and to its Lon N-terminal domain (see <PDOC51787>). Cereblon proteins occur throughout eukaryotes, however not in fungi.
