identifier: PROSITE:PDOC51937
label: "HNF-1 dimerization (HNF-p1)"
definition: >-
  HNF-1 dimerization (HNF-p1) domain profile. The homeodomain proteins hepatocyte nuclear factor (HNF)-1alpha and HNF-1beta comprise a functionnally important family in which dimerization is essential for DNA binding. HNF-1alpha and HNF-1beta regulate tissue-specific genes in liver, kidney, intestine, and pancreas. These proteins form homo- and heterodimers through an autonomously folded domain encompassing the 32 N- terminal amino acids (HNF-p1). The dimerization domain also binds the transcriptional coactivator DCoH, which stimulates HNF-1alpha activity.
