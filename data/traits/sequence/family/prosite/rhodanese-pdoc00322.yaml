identifier: PROSITE:PDOC00322
label: Rhodanese
definition: >-
  Rhodanese signatures and profile. Rhodanese (thiosulfate sulfurtransferase) (EC 2.8.1.1) is an enzyme which catalyzes the transfer of the sulfane atom of thiosulfate to cyanide, to form sulfite and thiocyanate. Rhodanese (from the german word for thioyanate, 'rhodanid') is a widespread enzyme, rhodanese activity having been detected in all major phyla, including eubacteria and mammals. In vertebrates, rhodanese is a mitochondrial enzyme of about 300 amino-acid residues involved in forming iron-sulfur complexes and cyanide detoxification.
