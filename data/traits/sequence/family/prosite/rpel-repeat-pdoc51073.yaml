identifier: PROSITE:PDOC51073
label: "RPEL repeat"
definition: >-
  RPEL repeat profile. RPEL repeat (RPxxxEL) containing proteins are found in a wide range of metazoan organisms. RPEL repeats have been shown to be required for unpolymerized actin binding and proteins containing RPEL repeats are able to modify cell shape and/or are important in the regulation of gene expression by the actin cytoskeleton. RPEL repeats can be found in association with the SAP motif (see <PDOC50800>), which could be involved in DNA binding.
