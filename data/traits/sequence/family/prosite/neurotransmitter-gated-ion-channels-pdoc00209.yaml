label: "Neurotransmitter-gated ion-channels"
definition: >-
  Neurotransmitter-gated ion-channels signature. Neurotransmitter-gated ion-channels provide the molecular basis for rapid signal transmission at chemical synapses. They are post-synaptic oligomeric transmembrane complexes that transiently form a ionic channel upon the binding of a specific neurotransmitter. Presently, the sequence of subunits from five types of neurotransmitter-gated receptors are known:
