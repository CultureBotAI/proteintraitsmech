identifier: PROSITE:PDOC52024
label: "Betaherpesvirus glycoprotein L (gL)"
definition: >-
  Alpha-, beta-, and gammaherpesvirus glycoprotein L (gL) domains profiles. Herpesviruses are enveloped, double-stranded DNA viruses that infect a variety of hosts across the animal kingdom. More than 100 species of herpesviruses are classified into three subfamilies, namely alpha-, beta-, and gammaherpesviruses/herpesvirinae. Like other enveloped viruses, herpesviruses enter cells by fusing their lipid envelopes with a host cell membrane, either the plasma membrane or the membrane of an endocytic vesicle/endosome after internalization, which releases the viral capsid and associated proteins into the host cytoplasm.
