identifier: PROSITE:PDOC51344
label: "TFE/IIEalpha-type HTH"
definition: >-
  TFE/IIEalpha-type HTH domain profile. Initiation of eukaryotic mRNA transcription requires melting of promoter DNA with the help of the general transcription factors TFIIE and TFIIH. TFIIE consists of a large and a small subunit, referred to as alpha and beta, respectively, in higher eukaryotes. Archaea contain a TFIIE homolog, called TFE, that corresponds to the N-terminal half of TFIIEalpha. It appears that archaeal TFE corresponds to the minimal essential region of eukaryal TFIIEalpha. In archaea TFE contains an N-terminal, weakly conserved, helix- turn-helix (HTH) motif within a leucine-rich region and a C-terminal zinc ribbon [1-3].
