identifier: PROSITE:PDOC00394
label: "Peroxidases active site"
definition: >-
  Heme peroxidase signatures and profiles. Heme-binding peroxidases (EC 1.11.1.-) carry out a variety of biosynthetic and degradative functions using hydrogen peroxide as the electron acceptor. The heme prosthetic group is protoporphyrin IX and the fifth ligand of the heme iron is a histidine (known as the proximal histidine). An other histidine residue (the distal histidine) serves as an acid-base catalyst in the reaction between hydrogen peroxide and the enzyme. The regions around these two active site residues are more or less conserved in a majority of peroxidases.
