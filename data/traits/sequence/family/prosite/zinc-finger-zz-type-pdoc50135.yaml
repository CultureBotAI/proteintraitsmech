identifier: PROSITE:PDOC50135
label: "Zinc finger ZZ-type"
definition: >-
  Zinc finger ZZ-type signature and profile. The putative ZZ zinc finger, was first identified in the Dystrophin gene, a 427 kDa protein, involved in the Duchenne muscular dystrophy (DMD). This motif is also present in the adaptor proteins CBP and P300 in a region known to interact with YY1, E1A and TFIIB, which suggest a possible protein binding function for this domain. It is closely related to the B-box zinc finger, (see <PDOC50119>) however B-box do not contain the Asp-Tyr-Asp-Leu motif present in most of the ZZ zinc fingers.
