identifier: PROSITE:PDOC51553
label: "GMP synthetase ATP pyrophosphatase (GMPS ATP-PPase)"
definition: >-
  GMP synthetase ATP pyrophosphatase (GMPS ATP-PPase) domain profile. Guanosine 5'-monophosphate synthetase (GMPS) is a widespread enzyme seen in all domains of life. GMPS is required for the final step of the de novo synthesis of guanine nucleotides, converting xanthosine 5'-monophosphate (XMP) into guanosine 5'-monophosphate (GMP), a precursor of DNA and RNA. GMPS consists of two catalytic units, glutamine amidotransferase (GATase) (see <PDOC00405>) and ATP pyrophosphatase (ATP-PPase). GATase hydrolyzes glutamine to yield glutamate and ammonia, while ATP-PPase utilizes ammonia to convert adenyl xanthosine 5'-monophosphate (adenyl-XMP) into GMP.
