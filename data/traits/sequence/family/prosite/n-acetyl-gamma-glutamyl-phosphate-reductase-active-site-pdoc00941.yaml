identifier: PROSITE:PDOC00941
label: "N-acetyl-gamma-glutamyl-phosphate reductase active site"
definition: >-
  N-acetyl-gamma-glutamyl-phosphate reductase active site. N-acetyl-gamma-glutamyl-phosphate reductase (EC 1.2.1.38) (AGPR) is the enzyme that catalyzes the third step in the biosynthesis of arginine from glutamate, the NADP-dependent reduction of N-acetyl-5-glutamyl phosphate into N-acetylglutamate 5-semialdehyde.
