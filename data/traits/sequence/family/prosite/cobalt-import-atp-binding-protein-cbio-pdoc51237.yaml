identifier: PROSITE:PDOC51237
label: "Cobalt import ATP-binding protein cbiO"
definition: >-
  ABC transporter family profiles. ABC transporters belong to the ATP-Binding Cassette (ABC) superfamily which use the hydrolysis of ATP to energize diverse biological systems. It forms one of the largest of all protein families with a diversity of physiological functions (see <PDOC00185>). Several studies have shown that there is a correlation between the functional characterisation and the phylogenetic classification of the ABC cassette. More than 50 families have been described based on a phylogenetic and functional classification.
