identifier: PROSITE:PDOC00118
label: "Pancreatic ribonuclease family"
definition: >-
  Pancreatic ribonuclease family signature. Pancreatic ribonucleases (EC 3.1.27.5) are pyrimidine-specific endonucleases present in high quantity in the pancreas of a number of mammalian taxa and of a few reptiles. As shown in the following schematic representation of the sequence of pancreatic RNases there are four conserved disulfide bonds and three amino acid residues involved in the catalytic activity.
