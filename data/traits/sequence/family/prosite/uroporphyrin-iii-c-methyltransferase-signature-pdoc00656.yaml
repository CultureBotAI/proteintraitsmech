identifier: PROSITE:PDOC00656
label: "Uroporphyrin-III C-methyltransferase signature"
definition: >-
  Uroporphyrin-III C-methyltransferase signatures. Uroporphyrin-III C-methyltransferase (EC 2.1.1.107) (SUMT) catalyzes the transfer of two methyl groups from S-adenosyl-L-methionine to the C-2 and C-7 atoms of uroporphyrinogen III to yield precorrin-2 via the intermediate formation of precorrin-1. SUMT is the first enzyme specific to the cobalamin pathway and precorrin-2 is a common intermediate in the biosynthesis of corrinoids such as vitamin B12, siroheme and coenzyme F430.
