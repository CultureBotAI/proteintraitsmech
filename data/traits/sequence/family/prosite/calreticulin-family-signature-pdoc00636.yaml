label: "Calreticulin family signature"
definition: >-
  Calreticulin family signatures. Calreticulin (also known as calregulin, CRP55 or HACBP) is a high-capacity calcium-binding protein which is present in most tissues and located at the periphery of the endoplasmic (ER) and the sarcoplamic reticulum (SR) membranes. It probably plays a role in the storage of calcium in the lumen of the ER and SR and it may well have other important functions. Structurally, calreticulin is a protein of about 400 amino acid residues consisting of three domains:
