identifier: PROSITE:PDOC00435
label: Myotoxins
definition: >-
  Myotoxins family signature and profile. Myotoxins are small basic peptides (42 to 45 residues) from the venom of rattlesnakes that cause severe muscle necrosis by a non-enzymatic mechanism. Myotoxins act extremely rapidly and serve two primary biological functions: limiting the flight of prey by causing instantaneous paralysis of the hind limbs and promoting rapid death by paralysis of the diaphragm.
