identifier: PROSITE:PDOC50164
label: GIY-YIG
definition: >-
  GIY-YIG domain profile. Nucleases of the GIY-YIG family are involved in many cellular processes, including DNA repair and recombination, transfer of mobile genetic elements, and restriction of incoming foreign DNA. The GIY-YIG superfamily groups together nucleases characterized by the presence of a domain of typically ~100 amino acids, with two short motifs "GIY" and "YIG" in the N-terminal part, followed by an Arg residue in the center and a Glu residue in the C-terminal part.
