definition: >-
  Staphylococcal enterotoxins / Streptococcal pyrogenic exotoxins signatures. Staphylococcal enterotoxins and streptococcal pyrogenic exotoxins constitute a family of biologically and structurally related toxins produced by Staphylococcus aureus and Streptococcus pyogenes. These toxins share the ability to bind to the major histocompatibility complex proteins of their hosts. The toxins that belong to this family are:
