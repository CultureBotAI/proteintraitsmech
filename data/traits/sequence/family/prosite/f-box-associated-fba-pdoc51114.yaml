identifier: PROSITE:PDOC51114
label: "F-box-associated (FBA)"
definition: >-
  F-box-associated (FBA) domain profile. F-box proteins have a bipartite structure: they contain a carboxy-terminal domain that interacts with substrates and a 42-48 amino-acid F-box domain (see <PDOC50181>) which binds to the protein Skp1. A subset of F-box proteins is characterized by a ~180-residue carboxy-terminal region, which has been called the F-box-associated (FBA) domain. A FBA domain has also been identified in the catfish, tilapia, and zebrafish nonspecific cytotoxic cell receptor proteins (NCCRP-1), which do not contain the F-box domain. NCCRP-1 may function as an antigen recognition molecule and, as such, may participate in innate immunity in teleosts.
