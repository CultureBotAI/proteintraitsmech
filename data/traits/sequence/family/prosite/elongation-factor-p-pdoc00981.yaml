identifier: PROSITE:PDOC00981
label: "Elongation factor P"
definition: >-
  Elongation factor P signature. Elongation factor P (EF-P) is a prokaryotic protein translation factor required for efficient peptide bond synthesis on 70S ribosomes from fMet- tRNAfMet. EF-P is a protein of 21 Kd. It is evolutionary related to yeiP, an hypothetical protein from Escherichia coli.
