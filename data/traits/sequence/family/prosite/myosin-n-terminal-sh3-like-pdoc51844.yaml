identifier: PROSITE:PDOC51844
label: "Myosin N-terminal SH3-like"
definition: >-
  Myosin N-terminal SH3-like domain profile. Members of the myosin superfamily of actin-based motors act in a variety of cellular functions such as muscle contraction, cell and organelle movement, membrane trafficking, and signal transduction. Although myosin motor domains (see <PDOC51456>) show a high degree of sequence conservation, the individual myosin classes are clearly defined by differences in the head structure. The N-terminal region of myosins from different classes varies greatly in length and amino acid composition among the individual members. Many myosins have an SH3-like domain at the N-terminus of the motor domain. This includes myosins in classes II, V, VI, XI, XXII and XXIV.
