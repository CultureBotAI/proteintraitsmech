identifier: PROSITE:PDOC50115
label: "ARF GTPase-activating proteins"
definition: >-
  ARF GTPase-activating proteins domain profile. The ARFGAP domain was first identified in the cell cycle control GTPase activating protein (GAP) GCS1. GCS1 is important for the inactivation of the ADP ribosylation factor ARF a member of the Ras superfamily of GTP-binding proteins. GTP-bound form of ARF is essential for the maintenance of normal Golgi morphology, it participates in recruitment of coat proteins which are required for budding and fission of membranes. Before the fusion with an acceptor compartment the membrane must be uncoated. This step required the hydrolysis of GTP associated to ARF, a process dependent on the ARFGAP domain of GCS1.
