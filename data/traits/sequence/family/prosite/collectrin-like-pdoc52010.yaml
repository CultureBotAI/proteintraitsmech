identifier: PROSITE:PDOC52010
label: Collectrin-like
definition: >-
  Collectrin-like domain profile. The transmembrane protease angiotensin converting enzyme 2 (ACE2) is a protective regulator within the renin angiotensin system and additionally represents the cellular receptor for SARS-CoVs. It functions as carboxypeptidase and cleaves the C-terminal amino acid of angiotensin I to angiotensin 1-9 or directly converts angiotensin II to angiotensin 1-7. ACE2 consists of an N-terminal catalytically active metalloprotease domain and a C- terminal collectrin-like domain. Collectrin is a type I membrane protein and shares significant homology with the C-terminal domain of ACE2.
