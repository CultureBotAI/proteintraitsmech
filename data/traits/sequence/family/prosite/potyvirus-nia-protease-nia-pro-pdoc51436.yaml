identifier: PROSITE:PDOC51436
label: "Potyvirus NIa protease (NIa-pro)"
definition: >-
  Potyvirus NIa protease (NIa-pro) domain profile. Tobacco etch virus (TEV), tomato vein mottling virus (TVMV), and plum pox virus (PPV) are members of the Potyviridae family. The potyvirus genome is a (+) stranded RNA and is translated into a single polyprotein upon infection, which is processed by the virally encoded proteases P1, HC-Pro, and NIa. Most of the cleavage events are performed by NIa (nuclear inclusion protein a) protease (NIa-pro). NIa-pro processes seven sites present in the potyvirus polyprotein, named as A, B, C, D, V, E, and F. NIa-pros obtained from potyviruses have similar structures and functions.
