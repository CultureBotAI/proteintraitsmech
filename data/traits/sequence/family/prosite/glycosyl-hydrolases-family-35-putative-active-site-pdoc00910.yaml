label: "Glycosyl hydrolases family 35 putative active site"
definition: >-
  Glycosyl hydrolases family 35 putative active site. Beta-galactosidases (EC 3.2.1.23) from mammals, fungi, plants and the bacteria Xanthomonas manihotis are evolutionary related. They belong to family 35 in the classification of glycosyl hydrolases.
