identifier: PROSITE:PDOC00187
label: Lipocalin
definition: >-
  Lipocalin signature. Proteins which transport small hydrophobic molecules such as steroids, bilins, retinoids, and lipids share limited regions of sequence homology and a common tertiary structure architecture. This is an eight stranded antiparallel beta-barrel with a repeated + 1 topology enclosing a internal ligand binding site. The name 'lipocalin' has been proposed for this protein family. Proteins known to belong to this family are listed below (references are only provided for recently determined sequences).
