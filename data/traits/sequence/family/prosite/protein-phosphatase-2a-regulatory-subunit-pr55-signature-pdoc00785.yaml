identifier: PROSITE:PDOC00785
label: "Protein phosphatase 2A regulatory subunit PR55 signature"
definition: >-
  Protein phosphatase 2A regulatory subunit PR55 signatures. Protein phosphatase 2A (PP2A) is a serine/threonine phosphatase involved in many aspects of cellular function including the regulation of metabolic enzymes and proteins involved in signal transduction. PP2A is a trimeric enzyme that consists of a core composed of a catalytic subunit associated with a 65 Kd regulatory subunit (PR65), also called subunit A; this complex then associates with a third variable subunit (subunit B), which confers distinct properties to the holoenzyme.
