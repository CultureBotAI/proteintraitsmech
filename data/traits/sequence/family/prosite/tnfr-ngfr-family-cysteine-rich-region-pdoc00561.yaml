label: "TNFR/NGFR family cysteine-rich region"
definition: >-
  TNFR/NGFR family cysteine-rich region signature and profile. A number of proteins, some of which are known to be receptors for growth factors, have been found to contain a cysteine-rich domain of about 110 to 160 amino acids in their N-terminal part, that can be subdivided into four (or in some cases, three) modules of about 40 residues containing 6 conserved cysteines. Proteins known to belong to this family are listed below:
