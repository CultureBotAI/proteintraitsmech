label: "Phosphatidylethanolamine-binding protein family"
definition: >-
  Phosphatidylethanolamine-binding protein family signature. Mammalian phosphatidylethanolamine-binding protein (also knowns as basic cytosolic 21 Kd protein) is a 186 residue protein found in a variety of tissues. It binds hydrophobic ligands, such as phosphatidylethanolamine, but also seems to bind nucleotides such as GTP and FMN, it is suggested that it could act in membrane remodeling during growth and maturation. This protein belongs to a family that also includes:
