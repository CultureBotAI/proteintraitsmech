identifier: PROSITE:PDOC52001
label: AD
definition: >-
  AD domain profile. The AD domain, which may function in RNA-binding based on its predicted anticodon-binding fold, is found in the Hezron/Gemin6/Lsm12 protein family. Members of this eukaryotic protein family have an N-terminal Sm domain (see <PDOC52002>) followed by an AD domain and are involved in RNA metabolism.
