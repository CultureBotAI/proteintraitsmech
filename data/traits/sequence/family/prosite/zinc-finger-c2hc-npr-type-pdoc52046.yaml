identifier: PROSITE:PDOC52046
label: "Zinc finger C2HC NPR-type"
definition: >-
  Zinc finger C2HC NPR-type profile. Nonexpressor of pathogenesis-related genes 1 (NPR1) is a master regulator of the defence transcriptome induced by the plant immune signal salicylic acid (SA). It encodes a protein with two protein-protein interaction domains, a BTB/POZ domain (see <PDOC50097>) at the N-terminus and an ankyrin-repeat domain (see <PDOC50088>) in the central region. In response to SA-induced redox changes, NPR1 protein is released from a quiescent oligomer to translocate into the nucleus, where it serves as a coactivator in complex with transcription factors (TFs), such as TGAs, a family of basic leucine zipper (bZIP) TGACG motif-binding transcription factors.
