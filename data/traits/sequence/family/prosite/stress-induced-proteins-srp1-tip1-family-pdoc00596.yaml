label: "Stress-induced proteins SRP1/TIP1 family"
definition: >-
  Stress-induced proteins SRP1/TIP1 family signature. It has been recently shown that three yeast proteins, two of which are known to be induced by various stress conditions, are structurally related and are probably part of a larger family. These proteins are listed below.
