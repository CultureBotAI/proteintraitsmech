label: "Lipin/Ned1/Smp2 (LNS2)"
definition: >-
  Lipin/Ned1/Smp2 (LNS2) domain profile. Phosphatidic acid (PA) is a truly versatile lipid, with parallel activities as a vital metabolic intermediate, a second messenger, and a determinant of unique membrane properties. PA serves as a precursor for lipid species such as diacylglycerol (DAG), lysophosphatidic acid, and CDP-DAG, each of which is used in its own signaling and metabolic pathways.
