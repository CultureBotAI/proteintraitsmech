identifier: PROSITE:PDOC51300
label: "NADH-nitrite reductase subunit D family"
definition: >-
  NADH-nitrite reductase subunit D family profile. In Proteobacteria and Actinobacteria the main nitrite reductase activity is contributed by the NADH-dependent nitrite reductase, which detoxifies the nitrite formed as the product of nitrate reduction. The NADH-nitrite reductase operon consists of 4 genes: nirB, nirD, nirC and cysG. The enzyme is formed by the two subunits nirB and nirD. NirC is a nitrite transporter and cysG is required for the synthesis of siroheme, a cofactor of the nirB subunit.
