identifier: PROSITE:PDOC51884
label: Chaplin
definition: >-
  Chaplin domain profile. Streptomycetes differentiate by forming specialized spore-bearing aerial hyphae that grow into the air. In order to break surface tension streptomycetes have to coat their aerial hyphae in an extremely hydrophobic sheath that is absent from the vegetative hyphae growing in the aqueous phase. The hydrophobic sheath, which permits the aerial hyphae to escape surface tension and likely also prevents their desiccation in air, is made up of two families of proteins, the chaplins, for coelicolor hydrophobic aerial proteins, and the rodins. The chaplins are surface-active proteins that can be divided into two classes: the short chaplins and the long chaplins.
