identifier: PROSITE:PDOC51988
label: "Herpesviridae UL32 packaging protein family"
definition: >-
  Herpesviridae UL32 packaging protein family profile. Herpesviruses are large, double-stranded DNA viruses with complex virion assembly and maturation strategies. Herpesviral DNA packaging into nascent capsids requires multiple conserved viral proteins that coordinate genome encapsidation. Proteins of the UL32 family, required for viral DNA encapsidation, form homopentameric rings with a positively charged central channel that binds double-stranded DNA. The central channel of ORF68 is lined with positively charged residues that are necessary for nucleic acid binding and production of infectious virions.
