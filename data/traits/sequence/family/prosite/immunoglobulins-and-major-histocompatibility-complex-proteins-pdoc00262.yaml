identifier: PROSITE:PDOC00262
label: "Immunoglobulins and major histocompatibility complex proteins"
definition: >-
  Immunoglobulins and major histocompatibility complex proteins signature. The basic structure of immunoglobulin (Ig) molecules is a tetramer of two light chains and two heavy chains linked by disulfide bonds. There are two types of light chains: kappa and lambda, each composed of a constant domain (CL) and a variable domain (VL). There are five types of heavy chains: alpha, delta, epsilon, gamma and mu, all consisting of a variable domain (VH) and three (in alpha, delta and gamma) or four (in epsilon and mu) constant domains (CH1 to CH4).
