identifier: PROSITE:PDOC00469
label: "HlyD family secretion proteins"
definition: >-
  HlyD family secretion proteins signature. Gram-negative bacteria produce a number of proteins which are secreted into the growth medium by a mechanism that does not require a cleaved N-terminal signal sequence. These proteins, while having different functions, require the help of two or more proteins for their secretion across the cell envelope. Amongst which a protein belonging to the ABC transporters family (see the relevant entry <PDOC00185>) and a protein belonging to a family which is currently composed of the following members:
