identifier: PROSITE:PDOC00708
label: "Dihydroorotate dehydrogenase signature"
definition: >-
  Dihydroorotate dehydrogenase signatures. Dihydroorotate dehydrogenase (EC 1.3.3.1) (DHOdehase) catalyzes the fourth step in the de novo biosynthesis of pyrimidine, the conversion of dihydroorotate into orotate. DHOdehase is a ubiquitous FAD flavoprotein.
