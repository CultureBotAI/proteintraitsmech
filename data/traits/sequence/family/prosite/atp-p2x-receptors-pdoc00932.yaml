label: "ATP P2X receptors"
definition: >-
  ATP P2X receptors signature. P2X purinoreceptors are cation-selective ion channels that open on binding to extracellular ATP; they play a role in fast synaptic transmission between neurones, and from autonomic nerves to smooth muscles. When ATP is released as a neurotransmitter from central and peripheral nerves it acts at P2X receptors to produce postsynaptic depolarization and excitation.
