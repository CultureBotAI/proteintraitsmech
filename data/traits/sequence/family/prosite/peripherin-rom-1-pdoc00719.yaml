identifier: PROSITE:PDOC00719
label: "Peripherin / rom-1"
definition: >-
  Peripherin / rom-1 signature. Peripherin (or RDS) and rom-1 are related retinal-specific integral membrane proteins which are located at the rims of the photoreceptor disks, where they may act jointly in disk morphogenesis. Both peripherin and rom-1 form disulfide-linked homodimers.
