identifier: PROSITE:PDOC50095
label: PLAT
definition: >-
  PLAT domain profile. The PLAT domain (after polycystin-1, lipoxygenase and alpha toxin) is an intracellular domain of ~150 residues. The PLAT domain can be found associated with other domains such as LRR, PKD (see <PDOC50093>), C-type lectin (see <PDOC00537>), GPS (see <PDOC50221>), lipase, lipoxygenase (see <PDOC00077>) prokaryotic zinc-dependent phospholipase C (see <PDOC00357>), LCCL (see <PDOC50820>) or SRCR (see <PDOC00348>), It has been proposed that the PLAT domain may be involved in protein-protein and protein-lipid interaction.
