identifier: PROSITE:PDOC00830
label: "TetR-type HTH"
definition: >-
  TetR-type HTH domain signature and profile. The tetR-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 60 residues present in the tetR family of prokaryotic transcription regulators. Several of these bacterial regulators are repressors of genes and operons for membrane transport and cell envelope permeability. The family is named after the tetracycline repressor tetR of enterobacteria found on Tn10 and other transposons and plasmids. The 'helix-turn-helix' DNA-binding motif is located in the N-terminal extremity of these transcriptional regulators.
