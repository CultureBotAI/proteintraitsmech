identifier: PROSITE:PDOC51649
label: NPH3
definition: >-
  NPH3 domain profile. The NRL (for NPH3/RPT2-Like) family is formed by signaling molecules specific to higher plant. Several regions of sequence and predicted structural conservation define members of the NRL family, with three domains being most notable: an N-terminal BTB domain (see <PDOC50097>), a centrally located NPH3 domain, and a C-terminal coiled coil domain. The function of the NPH3 domain is not yet known.
