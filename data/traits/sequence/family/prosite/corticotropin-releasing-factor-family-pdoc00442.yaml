label: "Corticotropin-releasing factor family"
definition: >-
  Corticotropin-releasing factor family signature. Corticotropin-releasing factor (CRF) (corticoliberin) is a hormone from the hypothalamus that regulates the release of corticotropin (ACTH) from the pituitary gland. CRF is evolutionary related to a number of other active peptides which are listed below.
