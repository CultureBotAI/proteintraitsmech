identifier: PROSITE:PDOC00716
label: "Lysyl oxidase putative copper-binding region"
definition: >-
  Lysyl oxidase putative copper-binding region signature. Lysyl oxidase (EC 1.4.3.13) (LOX) is an extracellular copper-dependent enzyme that catalyzes the oxidative deamination of peptidyl lysine residues in precursors of various collagens and elastins. The deaminated lysines are then able to form aldehyde cross-links.
