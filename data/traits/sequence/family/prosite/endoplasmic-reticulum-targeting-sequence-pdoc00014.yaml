label: "Endoplasmic reticulum targeting sequence"
definition: >-
  Endoplasmic reticulum targeting sequence. Proteins that permanently reside in the lumen of the endoplasmic reticulum (ER) seem to be distinguished from newly synthesized secretory proteins by the presence of the C-terminal sequence Lys-Asp-Glu-Leu (KDEL). While KDEL is the preferred signal in many species, variants of that signal are used by different species. This situation is described in the following table.
