identifier: PROSITE:PDOC00397
label: "Bacterial luciferase subunits"
definition: >-
  Bacterial luciferase subunits signature. Luminous bacteria are abundant and widely distributed Gram-negative motile rods. The enzyme responsible for bioluminescence, bacterial luciferase (EC 1.14.14.3), catalyzes the oxidation of reduced riboflavin phosphate (FMNH2) and a long chain fatty aldehyde with the emission of blue green light (490 nm). Luciferase is a heterodimeric enzyme composed of an alpha subunit (gene luxA) and a beta subunit (gene luxB). The two subunits appear to have arisen by gene duplication.
