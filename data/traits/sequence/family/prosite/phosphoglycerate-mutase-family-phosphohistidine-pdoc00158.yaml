definition: >-
  Phosphoglycerate mutase family phosphohistidine signature. Phosphoglycerate mutase (EC 5.4.2.1) (PGAM) and bisphosphoglycerate mutase (EC 5.4.2.4) (BPGM) are structurally related enzymes which catalyze reactions involving the transfer of phospho groups between the three carbon atoms of phosphoglycerate. Both enzymes can catalyze three different reactions, although in different proportions:
