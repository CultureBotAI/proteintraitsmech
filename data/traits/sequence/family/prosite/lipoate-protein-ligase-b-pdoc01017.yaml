identifier: PROSITE:PDOC01017
label: "Lipoate-protein ligase B"
definition: >-
  Octanoyl-[acyl-carrier-protein]-protein N-octanoyltransferase (lipB) signature. Octanoyl-[acyl-carrier-protein]-protein N-octanoyltransferase (gene lipB) is the bacterial enzyme that creates an amide linkage that joins the free carboxyl group of octanoyl acid to the epsilon-amino group of a specific lysine residue in lipoyl domains (see <PDOC50968>).
