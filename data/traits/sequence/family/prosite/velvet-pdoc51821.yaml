identifier: PROSITE:PDOC51821
label: Velvet
definition: >-
  Velvet domain profile. The fungus-specific velvet family of regulatory proteins plays a key role in coordinating secondary metabolism and differenciation processes such as asexual or sexual sporulation and sclerotia or fruiting body formation. These velvet regulators are present in most parts of the fungal kingdom from chytrids to basidiomycetes. Velvet proteins interact with each other, alone ("homodimers"), in various combinations ("heterodimers"), and also with other proteins. The velvet proteins share a homologous region comprising about 150 amino acids, wich lack significant sequence similarity to any other known proteins.
