identifier: PROSITE:PDOC00461
label: "Porphobilinogen deaminase cofactor-binding site"
definition: >-
  Porphobilinogen deaminase cofactor-binding site. Porphobilinogen deaminase (EC 2.5.1.61), or hydroxymethylbilane synthase, is an enzyme involved in the biosynthesis of porphyrins and related macrocycles. It catalyzes the assembly of four porphobilinogen (PBG) units in a head to tail fashion to form hydroxymethylbilane.
