identifier: PROSITE:PDOC60018
label: "Delta-atracotoxin (ACTX) family"
definition: >-
  Delta-atracotoxin (ACTX) family signature. Delta-atracotoxins (ACTXs) are peptide toxins isolated from the venom of Australian funnel-web spiders that inhibit conversion of the sodium channel from the open to the inactivated state, resulting in sodium current remaining at membrane potentials where inactivation is normally complete. They induce spontaneous repetitive firing and prolongation of action potentials resulting in neurotransmitter release from somatic and autonomic nerve endings. This results from a selective slowing of tetrodotoxin (TTX) voltage-gated sodium channel inactivation and a hyperpolarizing shift of the voltage-dependence of activation.
