identifier: PROSITE:PDOC51131
label: "Rad50 zinc-hook"
definition: >-
  Rad50 zinc-hook domain profile. The MRN complex (Mre11-Rad50-Nbs1) plays an important role in many DNA metabolic events that involve DNA double-stranded breaks. MRN is one of the first factors to be localized to DNA lesions where it might have a structural role by tethering and stabilizing broken chromosomes.
