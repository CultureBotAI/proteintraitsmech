identifier: PROSITE:PDOC60004
label: "Mu-conotoxin family"
definition: >-
  Conotoxin families signatures. Cone snail toxins, conotoxins, are small peptides with disulfide connectivity, that target ion-channels or G-protein coupled receptors. Based on the number and pattern of disulfide bonds and biological activities, conotoxins can be classified into several families. Omega, delta and kappa families of conotoxins have a knottin or inhibitor cystine knot scaffold. The knottin scaffold is a very special disulfide through disulfide knot, in which the III- VI disulfide bond crosses the macrocycle formed by two other disulfide bonds (I-IV and II-V) and the interconnecting backbone segments, where I-VI indicates the six cysteine residues starting from the N-terminus.
