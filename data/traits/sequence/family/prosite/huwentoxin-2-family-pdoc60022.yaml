label: "Huwentoxin-2 family"
definition: >-
  Huwentoxin-2 family signature. The spider venoms often contain many active peptides such as neurotoxins, lectins, inhibitors to enzyme, etc. These peptides are very important for spider's hunting and defending. During the long history of spider evolution, the peptides evolved into different structures and functions. The following peptides share high similarity and belong to the huwentoxin-2 family [1-4]:
