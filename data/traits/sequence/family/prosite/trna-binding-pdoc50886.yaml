identifier: PROSITE:PDOC50886
label: tRNA-binding
definition: >-
  tRNA-binding domain profile. The tRNA-binding domain (TRBD) is a domain of ~110 amino acids which is widespread among all living organisms, from eubacteria, archaea or eukarya. The TRBD domain, which is also called Trbp111-like domain or EMAP II-like domain, is widely distributed among different tRNA synthetases and their association factors (such as p43, ARC1, and Trbp111 isolated from various species).
