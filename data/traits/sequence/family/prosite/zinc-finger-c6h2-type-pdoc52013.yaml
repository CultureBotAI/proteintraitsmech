identifier: PROSITE:PDOC52013
label: "Zinc finger C6H2-type"
definition: >-
  Zinc finger C6H2-type profile. Methionine Aminopeptidases (MetAPs) are "metalloenzymes" primarily responsible for the co-translational cleavage of the initial methionine residue from the nascent polypeptides. MetAPs are classified into two isoforms: namely, MetAP1 and MetAP2. Only one type of MetAP, either type 1 or type 2, can be found in a prokaryotic cell. Archaea contain type 2 MetAPs, and eubacteria contain type 1 MetAPs. However, all eukaryotic genomes studied to date encode at least a cytosolic type 1 MetAP and a cytosolic type 2 MetAP. All MetAPs C-terminal catalytic domains are conserved in both prokaryotes and eukaryotes.
