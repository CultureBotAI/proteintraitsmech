identifier: PROSITE:PDOC50196
label: "Ran binding domain"
definition: >-
  Ran binding domain type 1 profile. RanBP proteins form a heterogeneous family of proteins involved in nuclear transport. Among them, some contain a common region (RanBD1) involved in the binding of Ran, a Ras-related GTPase (see <PDOC00859>). This domain binds RanGTP and increases the rate of RanGAP1-induced GTP hydrolysis. RanBD1 displays some similarity with the WASP domain.
