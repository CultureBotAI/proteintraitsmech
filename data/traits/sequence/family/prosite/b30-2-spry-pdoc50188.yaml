identifier: PROSITE:PDOC50188
label: B30.2/SPRY
definition: >-
  B30.2/SPRY domain profile. The B30.2 domain was first identified as a protein domain encoded by an exon (named B30-2) in the human class I major histocompatibility complex region, whereas the SPRY domain was first identified in a Dictyostelium discoideum kinase splA and mammalian calcium-release channels ryanodine receptors. The SPRY domains are shorter at the N-terminus than the B30.2 domains and appear as a subdomain of the latter. The ~200-residue B30.2/SPRY (for B30.2 and/or SPRY) domain is present in a large number of proteins with diverse individual functions in different biological processes.
