identifier: PROSITE:PDOC51127
label: "Big-1 (bacterial Ig-like domain 1)"
definition: >-
  Big-1 (bacterial Ig-like domain 1) domain profile. The bacterial immunoglobulin-like (Ig) domain 1 or Big-1 domain is a domain of ~95 amino acids present in bacterial adhesion molecules of the intimin/invasin family, involved in pathogenicity. The domain is named after the 3D structure of the domain in enteropathogenic Escherichia coli intimin and in Yersinia pseudotuberculosis invasin, which are both adhesins with a tandem repeat of the Big-1 domain. The 3D structure of the Big-1 domain is a beta-sheet sandwich (see <PDB:1CWV>) with a topology similar to eukaryotic members of the immunoglobulin superfamily (see <PDOC50835>).
