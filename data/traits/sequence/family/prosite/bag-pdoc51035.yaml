identifier: PROSITE:PDOC51035
label: BAG
definition: >-
  BAG domain profile. Bcl2-associated athanogene (BAG) family proteins participate in a wide variety of cellular processes including cell survival (stress response), proliferation, migration and apoptosis. These proteins share a conserved region of about 110 amino-acids at their carboxy terminus, named as the BAG domain. It has been shown that the BAG domain can interact with the heat shock proteins 70 (Hsc70/Hsp70) (see <PDOC00269>) and can modulate either positively or negatively these chaperone proteins. In BAG-1, the BAG domain also interact with the serine/threonine kinase Raf-1 in a mutually exclusive interaction. BAG-1 promotes cell growth by binding to and stimulating Raf-1 activity.
