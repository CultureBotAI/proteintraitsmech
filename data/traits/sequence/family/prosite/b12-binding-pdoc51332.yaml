identifier: PROSITE:PDOC51332
label: B12-binding
definition: >-
  B12-binding and B12-binding N-terminal domain profiles. The B12-binding domain is mainly found in two families of enzymes present in animals and prokaryotes, which use vitamin B12 (cobalamin) as cofactor. The B12-binding domain can bind two different forms of the cobalamin cofactor, with cobalt bonded either to a methyl group or to 5'-deoxyadenosine. Methyl- and adenosylcobalamin enzymes perform distinct kinds of reactions at the cobalt-carbon bond. The enzymes that bind methylcobalamin carry out methyl transfer reactions.
