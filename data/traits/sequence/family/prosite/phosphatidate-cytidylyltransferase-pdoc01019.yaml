identifier: PROSITE:PDOC01019
label: "Phosphatidate cytidylyltransferase"
definition: >-
  Phosphatidate cytidylyltransferase signature. Phosphatidate cytidylyltransferase (EC 2.7.7.41) (also known as CDP- diacylglycerol synthase) (CDS) is the enzyme that catalyzes the synthesis of CDP-diacylglycerol from CTP and phosphatidate (PA). CDP-diacylglycerol is an important branch point intermediate in both prokaryotic and eukaryotic organisms. CDS is a membrane-bound enzyme. As a signature pattern we selected a conserved region located in the C-terminal part.
