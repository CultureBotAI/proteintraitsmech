identifier: PROSITE:PDOC00558
label: "Bacterial ribonuclease P protein component"
definition: >-
  Bacterial ribonuclease P protein component signature. Ribonuclease P (EC 3.1.26.5) (RNase P) is a site specific endonuclease that generates mature tRNAs by cleaving-off the leader sequences at their 5'ends. In bacteria RNase P is known to be composed of two components: a large (about 400 base pairs) RNA (gene rnpB) and a small protein (119 to 133 amino acids) (gene rnpA). The RNA moiety of RNase P carries the catalytic activity; the function of the protein component is not yet clear although it may act as an electrostatic screen allowing the highly negatively charged RNA enzyme- substrate complex to fold into the catalytic conformation.
