identifier: PROSITE:PDOC51823
label: "Clueless (Clu)"
definition: >-
  Clueless (Clu) domain profile. The protein Clueless (Clu) is a large multi-domain protein that is highly conserved and directly required for mitochondrial function. Clu is involved in binding and directing nuclear encoded mitochondrially destined mRNAs to the mitochondrial outer membrane and potentially positioning them for co- translational import. Clu may act as a type of scaffold that can bring together several mechanisms in order to maintain mitochondrial function and output. Clu-related proteins are highly conserved and share a ~245-amino acid region (the 'Clu domain') and TPR repeats (see <PDOC50005>).
