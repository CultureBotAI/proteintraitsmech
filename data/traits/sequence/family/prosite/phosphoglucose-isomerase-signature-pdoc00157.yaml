identifier: PROSITE:PDOC00157
label: "Phosphoglucose isomerase signature"
definition: >-
  Glucose-6-phosphate isomerase (GPI) family signatures and profile. Glucose-6-phosphate isomerase (GPI) (EC 5.3.1.9) or phosphoglucose isomerase (PGI) is a dimeric enzyme that catalyzes the reversible isomerization of glucose-6-phosphate and fructose-6-phosphate. PGI is involved in different pathways: in most higher organisms it is involved in glycolysis; in mammals it is involved in gluconeogenesis; in plants in carbohydrate biosynthesis; in some bacteria it provides a gateway for fructose into the Entner-Doudouroff pathway.
