identifier: PROSITE:PDOC00462
label: Ferrochelatase
definition: >-
  Ferrochelatase signature. Ferrochelatase (EC 4.99.1.1) (protoheme ferro-lyase) catalyzes the last step in heme biosynthesis: the chelation of a ferrous ion to proto-porphyrin IX, to form protoheme.
