label: "Ergtoxin family"
definition: >-
  Ergtoxin (ErgTx) family signature. The Ergtoxin (ErgTx) family is a class of peptides from scorpion venom that specifically block ERG (ether-a-go-go-related gene) K+ channels of the nerve, heart and endocrine cells.
