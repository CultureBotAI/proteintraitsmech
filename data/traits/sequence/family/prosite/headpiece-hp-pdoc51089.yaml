identifier: PROSITE:PDOC51089
label: "Headpiece (HP)"
definition: >-
  Headpiece (HP) domain profile. Headpiece is an ~70-residue F-actin-binding domain present at the C terminus of many cytoskeletal proteins. It was first discovered in the epithelial brush border protein villin, a member of the gelsolin family, which consists of six gelsolin repeats, followed by the C-terminal headpiece domain.
