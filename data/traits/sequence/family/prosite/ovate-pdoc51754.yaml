identifier: PROSITE:PDOC51754
label: OVATE
definition: >-
  OVATE domain profile. OVATE family proteins (OFPs) are a plant-specific family of regulatory proteins that function as transcriptional repressors and regulate multiple aspects of plant growth and development. They are characterized by a conserved C-terminal OVATE domain of approximately 70 amino acids.
