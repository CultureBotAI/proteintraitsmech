identifier: PROSITE:PDOC00383
label: "Zinc finger TFIIS-type"
definition: >-
  Zinc finger TFIIS-type signature and profile. In eukaryotes the initiation of transcription of protein encoding genes by polymerase II (Pol II) is modulated by general and specific transcription factors. The general transcription factors operate through common promoters elements (such as the TATA box). At least eight different proteins associate to form the general transcription factors: TFIIA, -IIB, -IID, -IIE, -IIF, -IIG, -IIH and -IIS.
