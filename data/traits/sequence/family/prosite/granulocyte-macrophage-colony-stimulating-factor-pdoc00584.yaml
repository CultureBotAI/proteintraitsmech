identifier: PROSITE:PDOC00584
label: "Granulocyte-macrophage colony-stimulating factor"
definition: >-
  Granulocyte-macrophage colony-stimulating factor signature. Granulocyte-macrophage colony-stimulating factor (GM-CSF) is a cytokine that acts in hematopoiesis by stimulating the growth and differentiation of hematopoietic precursor cells from various lineages, including granulocytes, macrophages, eosinophils and erythrocytes.
