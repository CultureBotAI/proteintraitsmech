identifier: PROSITE:PDOC51293
label: SANT
definition: >-
  SANT domain profile. The myb family can be classified into three groups: the myb-type HTH domain, which binds DNA (see <PDOC00037>), the SANT domain, which is a protein-protein interaction module and the myb-like domain that can be involved in either of these functions.
