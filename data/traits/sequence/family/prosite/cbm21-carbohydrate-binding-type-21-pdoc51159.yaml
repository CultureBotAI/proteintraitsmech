identifier: PROSITE:PDOC51159
label: "CBM21 (carbohydrate binding type-21)"
definition: >-
  CBM21 (carbohydrate binding type-21) domain profile. The carbohydrate binding type-21 or CBM21 domain is a 90-130 amino acid carbohydrate binding domain. The domain is named after proteins classified in carbohydrate-binding module (CBM) family 21 and is sometimes called starch-binding domain (SBD). The CBM21 domain occurs in several eukaryotic proteins implicated in glycogen metabolism. A glucoamylase active site region (see <PDOC00646>) or alpha amylase catalytic domain can occur C-terminal to the CBM21 domain. The CBM21 domain of Rhizopus oryzae glucoamylase can bind to raw starch.
