identifier: PROSITE:PDOC00459
label: "Ribonuclease T2 family histidine active site"
definition: >-
  Ribonuclease T2 family histidine active sites. The fungal ribonucleases T2 from Aspergillus oryzae, M from Aspergillus saitoi and Rh from Rhizopeus niveus are structurally and functionally related 30 Kd glycoproteins that cleave the 3'-5' internucleotide linkage of RNA via a nucleotide 2',3'-cyclic phosphate intermediates (EC 3.1.27.1).
