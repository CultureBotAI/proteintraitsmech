identifier: PROSITE:PDOC00892
label: "Macrophage migration inhibitory factor family"
definition: >-
  Macrophage migration inhibitory factor family signature. A protein called macrophage migration inhibitory factor (MIF) seems to exerts an important role in host inflammatory responses. It play a pivotal role in the host response to endotoxic shock and appears to serve as a pituitary "stress" hormone that regulates systemic inflammatory responses. MIF is a secreted protein of 115 residues which is not processed from a larger precursor.
