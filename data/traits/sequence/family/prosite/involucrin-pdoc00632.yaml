identifier: PROSITE:PDOC00632
label: Involucrin
definition: >-
  Involucrin signature. Involucrin is a protein present in keratinocytes of epidermis and other stratified squamous epithelia. Involucrin first appears in the cell cytosol, but ultimately becomes cross-linked to membrane proteins by transglutaminase thus helping in the formation of an insoluble envelope beneath the plasma membrane.
