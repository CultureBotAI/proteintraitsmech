identifier: PROSITE:PDOC00415
label: "Polygalacturonase active site"
definition: >-
  Polygalacturonase active site. Polygalacturonase (EC 3.2.1.15) (PG) (pectinase) catalyzes the random hydrolysis of 1,4-alpha-D-galactosiduronic linkages in pectate and other galacturonans. In fruit, polygalacturonase plays an important role in cell wall metabolism during ripening. In plant bacterial pathogens such as Erwinia carotovora or Pseudomonas solanacearum and fungal pathogens such as Aspergillus niger, polygalacturonase is involved in maceration and soft- rotting of plant tissue.
