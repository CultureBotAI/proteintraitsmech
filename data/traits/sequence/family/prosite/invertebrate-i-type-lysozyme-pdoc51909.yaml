identifier: PROSITE:PDOC51909
label: "Invertebrate (I)-type lysozyme"
definition: >-
  Invertebrate (I)-type lysozyme domain profile. Lysozyme (EC 3.2.1.17) is an ubiquitous enzyme and is widely distributed in a range of phylogenetically diverse organisms from bacteriophage to humans. Lysozyme is mainly involved in the innate immune system and protection of host against microbial infection. The mechanism of lysozyme in killing bacteria is by hydrolyzing the beta-1,4-glycosidic linkages between N-acetyl muramic acid (NAM) and N-acetyl glucosamine (NAG) of peptidoglycan (PG), which is a layer in the bacterial cell wall.
