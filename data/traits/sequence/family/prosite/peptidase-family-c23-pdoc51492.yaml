identifier: PROSITE:PDOC51492
label: "Peptidase family C23"
definition: >-
  Peptidase family C23 domain profile. Betaflexiviridae are a family of plant viruses containing a single-stranded positive-sense RNA genome. The first open reading frame (ORF1) of Betaflexiviridae encodes a putative replication-associated protein that is autocatalytically processed by a peptidase family C23 domain. The peptidase family C23 domain is a papain-like proteinase domain with catalytic cysteine and histidine residues.
