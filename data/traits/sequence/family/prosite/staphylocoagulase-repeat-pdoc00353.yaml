identifier: PROSITE:PDOC00353
label: "Staphylocoagulase repeat"
definition: >-
  Staphylocoagulase repeat signature. Staphylocoagulase is an extracellular protein produced by several strains of Staphylococcus aureus and which specifically forms a complex with prothrombin. This complex named staphylothrombin can clot fibrinogen without any proteolytic cleavage of prothrombin.
