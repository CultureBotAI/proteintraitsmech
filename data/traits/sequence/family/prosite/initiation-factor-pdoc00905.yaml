identifier: PROSITE:PDOC00905
label: "Initiation factor"
definition: >-
  Initiation factor 2 signature. Initiation factor 2 (IF-2) (gene infB) is one of the three factors required for the initiation of protein biosynthesis in bacteria. IF-2 promotes the GTP-dependent binding of the initiator tRNA to the small subunit of the ribosome. IF-2 is a protein of about 70 to 95 Kd which contains a central GTP-binding domain flanked by a highly variable N-terminal domain and a more conserved C-terminal domain.
