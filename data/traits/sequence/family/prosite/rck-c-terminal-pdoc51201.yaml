identifier: PROSITE:PDOC51201
label: "RCK C-terminal"
definition: >-
  RCK N-terminal and C-terminal domain profiles. Regulators of K+ conductance (RCK) domain is found in many ligand-gated K+ channels, most often attached to the intracellular carboxy terminus. The domain is prevalent among prokaryotic K+ channels, and also found in eukaryotic, high-conductance Ca2+-activated K+ channels (BK channels).. Largely involved in redox-linked regulation of potassium channels, the N-terminal part of the RCK domain is predicted to be an active dehydrogenase at least in some cases. Some have a conserved sequence motif (G-x-G-x-x-G-x(n)-[DE]) for NAD+ binding, but others do not, reflecting the diversity of ligands for RCK domains.
