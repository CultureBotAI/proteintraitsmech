identifier: PROSITE:PDOC00406
label: "Glutamine amidotransferase"
definition: >-
  Glutamine amidotransferase type 2 domain profile. A large group of biosynthetic enzymes are able to catalyze the removal of the ammonia group from glutamine and then to transfer this group to a substrate to form a new carbon-nitrogen group. This catalytic activity is known as glutamine amidotransferase (GATase) (EC 2.4.2.-). The GATase domain exists either as a separate polypeptidic subunit or as part of a larger polypeptide fused in different ways to a synthase domain. On the basis of sequence similarities two classes of GATase domains have been identified: class-I (also known as trpG-type or triad) (see <PDOC00405>) and class-II (also known as purF-type or Ntn).
