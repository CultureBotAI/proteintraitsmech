identifier: PROSITE:PDOC01016
label: "SecA family"
definition: >-
  SecA family signature and profile. SecA is a cytoplasmic protein of 800 to 960 amino acid residues. The eubacterial secA protein plays an important role in protein export. It interacts with the secY and secE components of the protein translocation system. It has a central role in coupling the hydrolysis of ATP to the transfer of proteins across the membrane.
