identifier: PROSITE:PDOC00216
label: "Integrins beta chain EGF (I-EGF)"
definition: >-
  Integrins beta chain EGF (I-EGF) domain signature and profile. Integrins are a large family of cell surface receptors that mediate cell to cell as well as cell to matrix adhesion. Some integrins recognize the R-G-D sequence (see <PDOC00016>) in their extracellular matrix protein ligand. Structurally, integrins consist of a dimer of an alpha and a beta chain. Each subunit has a large N-terminal extracellular domain followed by a transmembrane domain and a short C-terminal cytoplasmic region. Some receptors share a common beta chain while having different alpha chains. The sequence of a number of different beta chains has been determined and are listed below:
