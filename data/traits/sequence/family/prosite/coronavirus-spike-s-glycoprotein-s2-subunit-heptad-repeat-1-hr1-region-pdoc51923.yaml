identifier: PROSITE:PDOC51923
label: "Coronavirus spike (S) glycoprotein S2 subunit heptad repeat 1 (HR1) region"
definition: >-
  Coronavirus spike (S) glycoprotein S2 subunit heptad repeat 1 (HR1) and 2 (HR2) regions profiles. Coronaviruses (CoVs) are a diverse group of enveloped, plus-stranded RNA viruses that infect humans and many animal species, in which they can cause respiratory, enteric, hepatic, central nervous system and neurological diseases of varying severity. A CoV contains four structural proteins, including spike (S), envelope (E), membrane (M), and nucleocapsid (N) proteins. Among them, the S protein, which is located on the envelope surface of the virion, functions to mediate receptor recognition and membrane fusion and is therefore a key factor determining the virus tropism for a specific species.
