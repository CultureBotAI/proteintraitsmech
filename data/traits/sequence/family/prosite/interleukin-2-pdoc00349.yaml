identifier: PROSITE:PDOC00349
label: Interleukin-2
definition: >-
  Interleukin-2 signature. Interleukin-2 (IL-2) is a cytokine produced by T-helper cells in response to antigenic or mitogenic stimulation. This protein is required for T-cell proliferation and other activities crucial to the regulation of the immune response.
