identifier: PROSITE:PDOC00800
label: "Homoserine dehydrogenase"
definition: >-
  Homoserine dehydrogenase signature. Homoserine dehydrogenase (EC 1.1.1.3) (HDh) catalyzes NAD-dependent reduction of aspartate beta-semialdehyde into homoserine. This reaction is the third step in a pathway leading from aspartate to homoserine. The latter participates in the biosynthesis of threonine and then isoleucine as well as in that of methionine.
