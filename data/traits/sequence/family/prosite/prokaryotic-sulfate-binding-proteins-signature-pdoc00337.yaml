identifier: PROSITE:PDOC00337
label: "Prokaryotic sulfate-binding proteins signature"
definition: >-
  Prokaryotic sulfate- and thiosulfate-binding proteins signatures. Sulfate-binding protein (gene sbp or sbpA) and thiosulfate-binding protein (gene cysP) are two structurally related periplasmic bacterial proteins which specifically bind sulfate and thiosulfate and are involved in the transport systems for these nutrients.
