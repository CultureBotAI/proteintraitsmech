identifier: PROSITE:PDOC00644
label: "Erythropoietin / thrombopoeitin"
definition: >-
  Erythropoietin / thrombopoeitin signature. Erythropoietin (EPO) is the mammalian hormone involved in the regulation of erythrocyte differentiation and the maintenance of a physiological level of erythrocytes in the bloodstream. The mature form of EPO is a glycoprotein of 166 amino acid residues.
