identifier: PROSITE:PDOC51027
label: "Integrase DNA binding"
definition: >-
  Integrase DNA binding domain profile. The retroviral integrase is the enzyme responsible for the insertion of a DNA copy of the viral genome into host DNA, an essential step in the replication cycle of viruses. Integrases comprise three functional and structural domains: the central core domain, which contains the catalytic residues (see <PDOC50994>), an N-terminal zinc finger (see <PDOC50876>) and a C-terminal DNA binding domain. The DNA binding domain displays the same DNA binding characteristic and affinity for viral and nonspecific double-stranded DNA as the intact integrase protein.
