identifier: PROSITE:PDOC00493
label: "Bacterial ring hydroxylating dioxygenases alpha-subunit"
definition: >-
  Bacterial ring hydroxylating dioxygenases alpha-subunit signature. Bacterial ring hydroxylating dioxygenases are multicomponent enzymatic complexes composed of a hydroxylase component and an electron transfer component. The hydroxylase component is itself composed of two subunits: an alpha-subunit of about 50 Kd, and a beta-subunit of about 20 Kd. The electron transfer component is either composed of two subunits: a ferredoxin and a ferredoxin reductase or by a single bifunctional ferredoxin/reductase subunit.
