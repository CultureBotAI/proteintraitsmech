identifier: PROSITE:PDOC00631
label: "7,8-dihydro-6-hydroxymethylpterin-pyrophosphokinase"
definition: >-
  7,8-dihydro-6-hydroxymethylpterin-pyrophosphokinase signature. All organisms require reduced folate cofactors for the synthesis of a variety of metabolites. Most microorganisms must synthesize folate de novo because they lack the active transport system of higher vertebrate cells which allows these organisms to use dietary folates. Enzymes involved in folate biosynthesis are therefore targets for a variety of antimicrobial agents such as trimethoprim or sulfonamides.
