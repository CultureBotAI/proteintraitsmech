identifier: PROSITE:PDOC00947
label: Urocanase
definition: >-
  Urocanase signature. Urocanase (EC 4.2.1.49) (also known as imidazolonepropionate hydrolase or urocanate hydratase) is the enzyme that catalyzes the second step in the degradation of histidine, the hydration of urocanate into imidazolonepropionate. Urocanase is found in some bacteria (gene hutU), in the liver of many vertebrates and has also been found in the plant Trifolium repens (white clover).
