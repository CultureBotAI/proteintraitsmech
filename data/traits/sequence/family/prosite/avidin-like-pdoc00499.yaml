identifier: PROSITE:PDOC00499
label: Avidin-like
definition: >-
  Avidin-like domain signature and profile. Avidin is a minor constituent of egg white in several groups of oviparous vertebrates. Avidin, which was discovered in the 1920's, takes its name from the avidity with which it binds biotin. These two molecules bind so strongly that it is highly difficult to separate them. Streptavidin is a protein produced by Streptomyces avidinii which also binds biotin and whose sequence is evolutionary related to that of avidin.
