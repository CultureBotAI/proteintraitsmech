identifier: PROSITE:PDOC00673
label: Galanin
definition: >-
  Galanin signature. Galanin is a neuropeptide that controls various biological activities: it regulates the release growth hormone, inhibits the release of insulin and somatostatin, contracts smooth muscle of the gastrointestinal and genitourinary tract and may be involved in the control of adrenal secretion.
