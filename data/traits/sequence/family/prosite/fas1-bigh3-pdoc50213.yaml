identifier: PROSITE:PDOC50213
label: FAS1/BIgH3
definition: >-
  FAS1/BIgH3 domain profile. The FAS1 or BIgH3 domain is an extracellular module of about 140 amino acid residues. It has been suggested that the FAS1 domain represents an ancient cell adhesion domain common to plants and animals; related FAS1 domains are also found in bacteria. Most FAS1 domain containing proteins are GPI anchored and contain two or four copies of the domain. FAS1 domains of BIgH3 protein mediate cell adhesion throught an interaction with alpha3/beta1 integrin. A short motif (EPDIM), located on the C-teminal side of the fourth domain, is essential for the binding to integrin.
