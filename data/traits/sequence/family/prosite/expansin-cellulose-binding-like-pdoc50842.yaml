identifier: PROSITE:PDOC50842
label: "Expansin, Cellulose-binding-like"
definition: >-
  Expansin family profiles. Expansins are secreted proteins of 25 to 27 Kd that were isolated first from young cucumber seedling and subsequently from other plant tissues. Expression of expansin genes correlates with growth of cells. Increase in expansin content also occurs during fruit ripening. Expansins act on the cell wall to promote its extensibility. The model for its mechanism of action postulates that expansins break non-covalent bonds between cell-wall polysaccharides, thereby permitting pressure dependent expansion of the cell.
