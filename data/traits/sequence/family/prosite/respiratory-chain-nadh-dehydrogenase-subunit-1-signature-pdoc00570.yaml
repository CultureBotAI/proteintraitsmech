identifier: PROSITE:PDOC00570
label: "Respiratory-chain NADH dehydrogenase subunit 1 signature"
definition: >-
  Respiratory-chain NADH dehydrogenase subunit 1 signatures. Respiratory-chain NADH dehydrogenase (EC 1.6.5.3) (also known as complex I or NADH-ubiquinone oxidoreductase) is an oligomeric enzymatic complex located in the inner mitochondrial membrane which also seems to exist in the chloroplast and in cyanobacteria (as a NADH-plastoquinone oxidoreductase). Among the 25 to 30 polypeptide subunits of this bioenergetic enzyme complex there are fifteen which are located in the membrane part, seven of which are encoded by the mitochondrial and chloroplast genomes of most species.
