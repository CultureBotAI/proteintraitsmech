identifier: PROSITE:PDOC51231
label: "Diaphanous autoregulatory domain (DAD)"
definition: >-
  Diaphanous autoregulatory domain (DAD) profile. Formins participate in the assembly of the actin and microtubule cytoskeletons in processes like cell division, migration, and development. Diaphanous-related formins (DRF) contain an N-terminal GTPase-binding domain (GBD) and a C-terminal diaphanous autoregulatory domain (DAD). DRFs are regulated by an autoinhibitory interaction of the C-terminal DAD with the DRF N-terminal armadillo repeat-like region (see <PDOC50176>) in the DID or GBD/FH3 domain [1-3]. This autoinhibition is released upon competitive binding of an activated Rho GTPase to the GBD.
