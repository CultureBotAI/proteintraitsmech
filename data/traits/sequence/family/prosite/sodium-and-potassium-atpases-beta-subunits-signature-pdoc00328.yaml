identifier: PROSITE:PDOC00328
label: "Sodium and potassium ATPases beta subunits signature"
definition: >-
  Sodium and potassium ATPases beta subunits signatures. The sodium pump (Na+,K+ ATPase), located in the plasma membrane of all animal cells, is an heterotrimer of a catalytic subunit (alpha chain), a glycoprotein subunit of about 34 Kd (beta chain) and a small hydrophobic protein of about 6 Kd. The beta subunit seems to regulate, through the assembly of alpha/beta heterodimers, the number of sodium pumps transported to the plasma membrane.
