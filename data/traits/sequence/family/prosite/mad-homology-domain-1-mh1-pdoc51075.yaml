label: "MAD homology domain 1 (MH1)"
definition: >-
  MAD homology domains MH1 and MH2 profiles. Smad proteins are signal transducers and transcriptional comodulators of the TGF-beta superfamily of ligands, which play a central role in regulating a broad range of cellular responses, including cell growth, differentiation, and specification of developmental fate, in diverse organisms from C. elegans to humans. Ligand binding to specific transmembrane receptor kinases induces receptor oligomerization and phosphorylation of the receptor specific Smad protein (R-Smad) in the cytoplasm. The R-Smad proteins regulate distinct signaling pathways.
