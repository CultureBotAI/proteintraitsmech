identifier: PROSITE:PDOC51650
label: DOCKER
definition: >-
  C2 DOCK-type and DOCKER domains profiles. Rho guanosine triphosphatases (GTPases) are critical regulators of cell motility, polarity, adhesion, cytoskeletal organization, proliferation, gene expression, and apoptosis. Conversion of these biomolecular switches to the activated GTP-bound state is controlled by two families of guanine nucleotide exchanges factors (GEFs). DH-PH proteins are a large group of Rho GEFs comprising a catalytic Dbl homology (DH) domain (see <PDOC00605>) with an adjacent pleckstrin homology (PH) domain (see <PDOC50003>) within the context of functionally diverse signalling modules.
