identifier: PROSITE:PDOC00409
label: "Nucleoside diphosphate kinase (NDPK)-like"
definition: >-
  Nucleoside diphosphate kinase (NDPK) active site signature and NDPK-like domain profile. The Nme (Non-metastatic) protein family, previously known as Non-metastatic 23 (Nm23) or nucleoside diphosphate kinase (NDPK), consists of evolutionarily conserved proteins present in all three domains of life (bacteria, archaea and eukaryotes) and in some viruses. Some members of the family, but not all, exhibit a Nucleoside Diphosphate Kinase (NDPK) activity (EC 2.7.4.6).
