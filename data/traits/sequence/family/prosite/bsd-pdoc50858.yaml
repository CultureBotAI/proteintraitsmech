identifier: PROSITE:PDOC50858
label: BSD
definition: >-
  BSD domain profile. The BSD domain is an about 60-residue long domain named after the BTF2-like transcription factors, Synapse-associated proteins and DOS2-like proteins in which it is found. Additionally, it is also found in several hypothetical proteins. The BSD domain occurs in one or two copies in a variety of species ranging from primal protozoan to human. It can be found associated with other domains such as the BTB domain (see <PDOC50097>) or the U-box in multidomain proteins. The function of the BSD domain is yet unknown.
