identifier: PROSITE:PDOC00472
label: "Matrixins cysteine switch"
definition: >-
  Matrixins cysteine switch. Mammalian extracellular matrix metalloproteinases (EC 3.4.24.-), also known as matrixins (see <PDOC00129>), are zinc-dependent enzymes. They are secreted by cells in an inactive form (zymogen) that differs from the mature enzyme by the presence of an N-terminal propeptide. A highly conserved octapeptide is found two residues downstream of the C-terminal end of the propeptide. This region has been shown to be involved in autoinhibition of matrixins; a cysteine within the octapeptide chelates the active site zinc ion, thus inhibiting the enzyme. This region has been called the 'cysteine switch' or 'autoinhibitor region'.
