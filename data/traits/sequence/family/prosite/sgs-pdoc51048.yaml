identifier: PROSITE:PDOC51048
label: SGS
definition: >-
  SGS domain profile. The SGT1-specific (SGS) domain is a module of ~90 amino acids, which was initially identified in eukaryotic SGT1 proteins. It was latter also found in calcyclin-binding proteins. The SGS domain has been shown to bind to proteins of the S100 family, which are thought to function as sensors of calcium ion concentration in the cell.
