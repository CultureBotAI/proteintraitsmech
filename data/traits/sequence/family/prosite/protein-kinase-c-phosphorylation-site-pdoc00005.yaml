identifier: PROSITE:PDOC00005
label: "Protein kinase C phosphorylation site"
definition: >-
  Protein kinase C phosphorylation site. In vivo, protein kinase C exhibits a preference for the phosphorylation of serine or threonine residues found close to a C-terminal basic residue. The presence of additional basic residues at the N- or C-terminal of the target amino acid enhances the Vmax and Km of the phosphorylation reaction.
