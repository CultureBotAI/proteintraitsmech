identifier: PROSITE:PDOC52090
label: "Heme-nitric oxide/oxygen binding (H-NOX)"
definition: >-
  Heme-nitric oxide/oxygen binding (H-NOX) domain profile. Heme-nitric oxide/oxygen binding (H-NOX) domains bind diatomic gaseous ligands for signal transduction in organisms spanning prokaryotic and eukaryotic kingdoms. In prokaryotes, H-NOX sensors function as both stand-alone proteins and as members of multidomain proteins, and respond to nitric oxide (NO), oxygen and potentially other ligands such as carbon monoxide (CO) to induce a signaling cascade.
