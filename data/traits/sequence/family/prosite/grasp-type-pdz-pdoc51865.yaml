identifier: PROSITE:PDOC51865
label: "GRASP-type PDZ"
definition: >-
  GRASP-type PDZ domain profile. The Golgi apparatus is a highly dynamic organelle responsible for sorting out proteins and other biomolecules to the cell surface and to the extracellular milieu. The Golgi apparatus is comprised of flattened membrane-bound compartments called cisternae, which are apposed to one another to form a Golgi stack. The structural organization of the cisternae into stacks and their lateral connection, building the Golgi ribbon, requires a family of proteins called Golgi ReAssembly and Stacking Proteins (GRASP).
