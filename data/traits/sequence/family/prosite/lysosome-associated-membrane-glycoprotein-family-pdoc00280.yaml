identifier: PROSITE:PDOC00280
label: "Lysosome-associated membrane glycoprotein family"
definition: >-
  Lysosome-associated membrane glycoprotein family signatures and profile. Lysosome-associated membrane glycoproteins (lamp) are integral membrane proteins, specific to lysosomes, and whose exact biological function is not yet clear. Structurally, the lamp proteins consist of two internally homologous lysosome-luminal domains separated by a proline-rich hinge region; at the C-terminal extremity there is a transmembrane region followed by a very short cytoplasmic tail. In each of the duplicated domains, there are two conserved disulfide bonds. This structure is schematically represented in the figure below.
