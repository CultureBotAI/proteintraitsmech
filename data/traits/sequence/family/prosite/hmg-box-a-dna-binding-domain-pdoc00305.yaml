identifier: PROSITE:PDOC00305
label: "HMG box A DNA-binding domain"
definition: >-
  HMG boxes A and B DNA-binding domains signature and profile. High mobility group (HMG) chromosomal proteins are a family of relatively low molecular weight non-histone components that bind DNA without sequence specificity. HMG1 (also called HMG-T in fish) and HMG2 are related proteins that have two distinguishing features: two HMG boxes (A and B), homologous folded domains of around 80 amino acid residues, and a long acidic tail containing 20 to 30 aspartic or glutamic acid residues. The HMG box A is only found in HMG 1 and 2 proteins whereas the HMG box B is also present in various transcription factors. HMG boxes have unusual DNA binding activity.
