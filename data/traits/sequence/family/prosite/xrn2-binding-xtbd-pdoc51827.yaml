label: "XRN2-binding (XTBD)"
definition: >-
  XRN2-binding (XTBD) domain profile. XRN2 is an essential eukaryotic exoribonuclease that processes and degrades various substrates. The ~80-residue XRN2-binding domain (XTBD) constitutes an XRN2-binding module that is employed by different metazoan proteins to link to XRN2:
