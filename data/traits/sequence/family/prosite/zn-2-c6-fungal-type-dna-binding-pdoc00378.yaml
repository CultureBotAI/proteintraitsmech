identifier: PROSITE:PDOC00378
label: "Zn(2)-C6 fungal-type DNA-binding"
definition: >-
  Zn(2)-C6 fungal-type DNA-binding domain signature and profile. A number of fungal transcriptional activator proteins contain a cysteine-rich region that binds DNA in a zinc-dependent fashion. It has been shown that this region forms a binuclear zinc cluster where six conserved cysteines bind two zinc cations. Some proteins known to contain such a domain are listed below.
