label: "Occludin/ELL (OCEL)"
definition: >-
  Occludin/ELL (OCEL) domain profile. Tight junctions (TJs) are intercellular contacts located in epithelial and endothelial cell layers, which are responsible for the maintenance of the paracellular barrier. This barrier is required to limit paracellular passage of undesirables, like toxins, antigens, and microbes, while permitting vectorial transport of material across the layer. The actual barrier is formed by continuous adhesive strands of transmembrane proteins that interact to seal the paracellular space. The TJ proteins tricellulin and occludin show some similarities.
