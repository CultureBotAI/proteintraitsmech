identifier: PROSITE:PDOC00065
label: "3-hydroxyacyl-CoA dehydrogenase"
definition: >-
  3-hydroxyacyl-CoA dehydrogenase signature. 3-hydroxyacyl-CoA dehydrogenase (EC 1.1.1.35) (HCDH) is an enzyme involved in fatty acid metabolism, it catalyzes the reduction of 3-hydroxyacyl-CoA to 3-oxoacyl-CoA. Most eukaryotic cells have 2 fatty-acid beta-oxidation systems, one located in mitochondria and the other in peroxisomes. In peroxisomes 3-hydroxyacyl-CoA dehydrogenase forms, with enoyl-CoA hydratase (ECH) and 3,2-trans-enoyl-CoA isomerase (ECI) a multifunctional enzyme where the N- terminal domain bears the hydratase/isomerase activities and the C-terminal domain the dehydrogenase activity.
