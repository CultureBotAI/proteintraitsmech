label: "Myristoyl-CoA:protein N-myristoyltransferase signature"
definition: >-
  Myristoyl-CoA:protein N-myristoyltransferase signatures. Myristoyl-CoA:protein N-myristoyltransferase (EC 2.3.1.97) (Nmt) is the enzyme responsible for transferring a myristate group on the N-terminal glycine of a number of cellular eukaryotics and viral proteins.
