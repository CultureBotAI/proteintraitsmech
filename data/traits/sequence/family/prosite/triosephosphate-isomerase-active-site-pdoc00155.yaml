identifier: PROSITE:PDOC00155
label: "Triosephosphate isomerase active site"
definition: >-
  Triosephosphate isomerase (TIM) family signature and profile. Triosephosphate isomerase (EC 5.3.1.1) (TIM) is the glycolytic enzyme that catalyzes the reversible interconversion of glyceraldehyde 3-phosphate and dihydroxyacetone phosphate. TIM plays an important role in several metabolic pathways and is essential for efficient energy production. It is present in eukaryotes as well as in prokaryotes. TIM is a dimer of identical subunits, each of which is made up of about 250 amino-acid residues. A glutamic acid and a histidine residue are involved in the catalytic mechanism.
