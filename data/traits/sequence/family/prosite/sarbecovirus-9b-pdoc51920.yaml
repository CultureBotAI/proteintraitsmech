identifier: PROSITE:PDOC51920
label: "Sarbecovirus 9b"
definition: >-
  Sarbecovirus 9b domain profile. Coronaviruses are enveloped positive-strand RNA viruses that infect many species, including humans, other mammals, and birds. After infection, the host may develop respiratory, bowel, liver, and neurological diseases. Coronaviruses are divided into four genera: Alphacoronavirus, Betacoronavirus, Gammacoronavirus, and Deltacoronavirus. SARS, SARS-CoV-2, BatCoV RaTG13 and Bat-SARS-like coronavirus (BATSL-CoVZXC21 and BAT-SL-CoVZC45) belong to the Sarbecovirus subgenus of Betacoronavirus.
