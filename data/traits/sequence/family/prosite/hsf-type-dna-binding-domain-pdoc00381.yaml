identifier: PROSITE:PDOC00381
label: "HSF-type DNA-binding domain"
definition: >-
  HSF-type DNA-binding domain signature. Heat shock factor (HSF) is a DNA-binding protein that specifically binds heat shock promoter elements (HSE). HSE is a palindromic element rich with repetitive purine and pyrimidine motifs: 5'-nGAAnnTTCnnGAAnnTTCn-3'. HSF is expressed at normal temperatures but is activated by heat shock or chemical stressors. The sequences of HSF from various species show extensive similarity in a region of about 90 amino acids, which has been shown to bind DNA.
