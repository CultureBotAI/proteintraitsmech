identifier: PROSITE:PDOC51426
label: ABL
definition: >-
  ABL domain profile. The Rcs signaling pathway controls a variety of physiological functions like capsule synthesis, cell division or motility in prokaryotes. The Rcs regulatory pathway is a complex modification of the standard bacterial two- component signaling systems. The Rcs regulatory cascade, involving a multi- step phosphorelay between the two membrane bound hybrid sensor kinases RcsC and RcsD and the global regulator RcsB, is, up to now, one of the most complicated regulatory systems in bacteria. This signal transfer is mediated by a RcsC/RcsD/RcsB phosphorelay cascade involving conserved integrated phosphate shuttle domains.
