identifier: PROSITE:PDOC50119
label: "Zinc finger B-box type"
definition: >-
  Zinc finger B-box-type profile. The B-box zinc finger is an around 40 amino acids domain. One or two copies of this motif are generally associated with a RING finger and a coiled coil motif to form the so-called tripartite motif. It is found essentially in transcription factors, ribonucleoproteins and proto-oncoproteins, but no function is clearly assigned to this domain. It has been shown to be essential but not sufficient to localize the PML protein in a punctate pattern in interphase nuclei.
