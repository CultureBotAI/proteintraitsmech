identifier: PROSITE:PDOC51146
label: KaiC
definition: >-
  KaiC domain profile. The kaiC domain is a ~240 residue domain of the cyanobacterial circadian (daily) clock protein kaiC and related prokaryotic proteins. The domain is named after Synechococcus sp. kaiC, a regulator of the kai genes and circadian oscillations in cyanobacteria ('kai' means cycle in Japanese). The kaiC protein is composed of two kaiC domains. Besides the typical double-domain kaiC, several single-kaiC-domain proteins occur, also in archaea and proteobacteria, and whereof only certain subfamilies perform circadian functions. The domain has a recA/dnaB-like sequence and structure (see <PDOC00131>).
