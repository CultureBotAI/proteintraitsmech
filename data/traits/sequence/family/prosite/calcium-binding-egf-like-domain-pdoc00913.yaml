identifier: PROSITE:PDOC00913
label: "Calcium-binding EGF-like domain"
definition: >-
  Calcium-binding EGF-like domain signature. A sequence of about forty amino-acid residues long found in the sequence of epidermal growth factor (EGF) has been shown [1-6] to be present in a large number of membrane-bound and extracellular, mostly animal proteins (see <PDOC00021>). Many of these proteins require calcium for their biological function and a calcium-binding site has been found to be located at the N-terminus of some EGF-like domains. Calcium-binding may be crucial for numerous protein-protein interactions. Proteins that are known or that are predicted to contain calcium-binding EGF-like domains are listed below.
