identifier: PROSITE:PDOC01047
label: "Nodulation protein nodA"
definition: >-
  Nodulation protein nodA signature. Symbiosis between Rhizobia and legumes leads to the formation of nitrogen- fixing nodules. Bacteria produce lipochitooligosaccharides signals, the Nod factors, which act as morphogens to trigger the formation of nodules on plants. Several genes are involved in the biosynthesis and modification of the Nod factors. The nodA protein encodes an N-acyltransferase which transfers an acyl chain to the nonreducing end of the chitooligosaccharide.
