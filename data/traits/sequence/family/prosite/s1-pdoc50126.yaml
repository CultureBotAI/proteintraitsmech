identifier: PROSITE:PDOC50126
label: S1
definition: >-
  S1 domain profiles. The S1 domain of around 70 amino acids, originally identified in ribosomal protein S1, is found in a large number of RNA-associated proteins. It has been shown that S1 proteins bind RNA through their S1 domains with some degree of sequence specificity.
