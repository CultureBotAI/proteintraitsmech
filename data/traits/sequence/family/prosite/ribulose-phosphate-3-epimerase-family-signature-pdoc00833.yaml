label: "Ribulose-phosphate 3-epimerase family signature"
definition: >-
  Ribulose-phosphate 3-epimerase family signatures. Ribulose-phosphate 3-epimerase (EC 5.1.3.1) (also known as pentose-5-phosphate 3-epimerase or PPE) is the enzyme that converts D-ribulose 5-phosphate into D-xylulose 5-phosphate in Calvin's reductive pentose phosphate cycle. In Alcaligenes eutrophus two copies of the gene coding for PPE are known, one is chromosomally encoded (cbbEC), the other one is on a plasmid (cbbeP). PPE has been found in a wide range of organisms from all kingdoms of life. The sequence of PPE is highly related to:
