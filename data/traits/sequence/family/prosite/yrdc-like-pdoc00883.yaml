identifier: PROSITE:PDOC00883
label: YrdC-like
definition: >-
  YrdC-like domain profile. The yrdC-like domain is an ~185-residue module which can be found in stand- alone form, or in association with other domains such as the acylphosphatase- like domain (see <PDOC00136>), the sua5-like domain, the hypF-like domain or the hypF-type zinc finger.
