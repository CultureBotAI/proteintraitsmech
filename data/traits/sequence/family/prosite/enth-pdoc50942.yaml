identifier: PROSITE:PDOC50942
label: ENTH
definition: >-
  ENTH domain profile. The epsin NH2-terminal homology (ENTH) domain is a membrane interacting module of ~140 amino acids. Typically it is located within 20 residues of the NH2- terminus of proteins that often contain consensus sequences for binding to clathrin coat components and their accessory factors, and therefore function as endocytic adaptors. ENTH domain containing proteins have additional roles in signaling and actin regulation and may have yet other actions in the nucleus. The ENTH domain is found associated with other domains such as UIM (see <PDOC50330>), the EH domain binding motif NPF, the DPW/F motif or the I/LWEQ domain.
