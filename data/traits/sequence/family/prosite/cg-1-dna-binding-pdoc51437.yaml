identifier: PROSITE:PDOC51437
label: "CG-1 DNA-binding"
definition: >-
  CG-1 DNA-binding domain profile. Calmodulin-binding transcription activators (CAMTAs) comprise a conserved family of transcription activators in a wide range of multicellular eukaryotes, which possibly respond to calcium signaling by direct binding of calmodulin. The CAMTA proteins consist of multiple predicted functional domains, evolutionarily conserved in amino acid sequences, and organized in a conserved order.
