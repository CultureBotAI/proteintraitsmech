identifier: PROSITE:PDOC50104
label: TIR
definition: >-
  TIR domain profile. Toll proteins or Toll-like receptors (TLRs) and the interleukin-1 receptor (IL-1R) superfamily are both involved in innate antibacterial and antifungal immunity in insects as well as in mammals. These receptors share a conserved cytoplasmic domain of approximately 200 amino acids, known as the Toll/IL-1R homologous region (TIR). The similarity between TLRs and IL-1Rs is not restricted to sequence homology since these proteins also share a similar signaling pathway. They both induce the activation of a Rel type transcription factor via an adaptor protein and a protein kinase.
