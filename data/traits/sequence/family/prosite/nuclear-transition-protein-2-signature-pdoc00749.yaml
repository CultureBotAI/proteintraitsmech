identifier: PROSITE:PDOC00749
label: "Nuclear transition protein 2 signature"
definition: >-
  Nuclear transition protein 2 signatures. In mammals, the second stage of spermatogenesis is characterized by the conversion of nucleosomal chromatin to the compact, nonnucleosomal and transcriptionally inactive form found in the sperm nucleus. This condensation is associated with a double-protein transition. The first transition corresponds to the replacement of histones by several spermatid-specific proteins, also called transition proteins, which are themselves replaced by protamines during the second transition.
