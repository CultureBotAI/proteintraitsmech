identifier: PROSITE:PDOC00143
label: "Fructose-bisphosphate aldolase class-I active site"
definition: >-
  Fructose-bisphosphate aldolase class-I active site. Fructose-bisphosphate aldolase (EC 4.1.2.13) is a glycolytic enzyme that catalyzes the reversible aldol cleavage or condensation of fructose-1,6- bisphosphate into dihydroxyacetone-phosphate and glyceraldehyde 3-phosphate. There are two classes of fructose-bisphosphate aldolases with different catalytic mechanisms. Class-I aldolases, mainly found in higher eukaryotes, are homotetrameric enzymes which form a Schiff-base intermediate between the C-2 carbonyl group of the substrate (dihydroxyacetone phosphate) and the epsilon-amino group of a lysine residue.
