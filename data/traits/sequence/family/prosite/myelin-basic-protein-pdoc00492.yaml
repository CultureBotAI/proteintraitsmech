identifier: PROSITE:PDOC00492
label: "Myelin basic protein"
definition: >-
  Myelin basic protein signature. Myelin basic protein (MBP) is an important hydrophilic protein which may function to maintain proper structure of myelin. MBP interacts with myelin lipids both electrostatically and by hydrophobic interactions.
