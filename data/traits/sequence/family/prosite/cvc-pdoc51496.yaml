identifier: PROSITE:PDOC51496
label: CVC
definition: >-
  CVC domain profile. Homeobox-containing genes encode transcription factors and are characterized by the homeodomain (HD) (see <PDOC00027>), a motif that directs specific DNA binding to regulate the expression of target genes. Homeobox genes are grouped into several subclasses according to the primary structure of their HD and its flanking sequences. Among the paired-like subclass, the paired-like CVC (PLC)- homeodomain proteins (HDPs) are characterized by a conserved CVC domain and can be grouped into the Vsx-1 and Vsx-2 family, containing orthologs from several species.
