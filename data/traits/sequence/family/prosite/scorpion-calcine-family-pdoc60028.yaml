identifier: PROSITE:PDOC60028
label: "Scorpion calcine family"
definition: >-
  Scorpion calcine family signature. Toxins of the scorpion calcine family bind directly to ryanodine receptors (RyRs), intracellular channel targets of the endoplasmic reticulum, and induce long lasting channel openings in a mode of smaller conductance. They have the ability to translocate into cells by crossing the plasma membrane [1-3].
