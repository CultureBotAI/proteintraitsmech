identifier: PROSITE:PDOC50835
label: Ig-like
definition: >-
  Ig-like domain profile. The Ig-like domain is probably the most widespread domain, at least in animals. This domain can be considered as an heterogeneous group built on a common fold. Proteins containing an Ig-like domain differ in their tissue distribution, amino acid composition, and biological role.
