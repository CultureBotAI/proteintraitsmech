identifier: PROSITE:PDOC00290
label: Tropomyosins
definition: >-
  Tropomyosins signature. Tropomyosins are family of closely related proteins present in muscle and non-muscle cells. In striated muscle, tropomyosin mediate the interactions between the troponin complex and actin so as to regulate muscle contraction. The role of tropomyosin in smooth muscle and non-muscle tissues is not clear. Tropomyosin is an alpha-helical protein that forms a coiled-coil dimer.
