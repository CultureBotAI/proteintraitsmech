identifier: PROSITE:PDOC00702
label: "Cytidine and deoxycytidylate deaminases"
definition: >-
  Cytidine and deoxycytidylate deaminases zinc-binding region signature and domain profile. Cytidine deaminase (EC 3.5.4.5) (cytidine aminohydrolase) catalyzes the hydrolysis of cytidine into uridine and ammonia while deoxycytidylate deaminase (EC 3.5.4.12) (dCMP deaminase) hydrolyzes dCMP into dUMP. Both enzymes are known to bind zinc and to require it for their catalytic activity. The deaminases possess either one or two conserved zinc-coordinating (Z) motifs, with the consensus amino acid signature H-x(1)-E-x(24,28)-P-C- x(2,4)-C. This motif is required for catalytic activity. Zinc coordination is mediated by a histidine and two cysteines.
