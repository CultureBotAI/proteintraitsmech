identifier: PROSITE:PDOC51755
label: "OmpR/PhoB-type DNA-binding"
definition: >-
  OmpR/PhoB-type DNA-binding domain profile. Bacteria and plants frequently use two-components signal transduction systems (TCSs) to adapt to environmental changes and to survive under stress conditions. Typical TCSs couple a transmembrane histidine protein kinase (HK) (see <PDOC50109>), which detects changes in the environmnent, to a cytosolic response regulator (RR), which often alters gene expression. Most RRs contain two distinct domains: an N-terminal receiver domain (see <PDOC50110>) and a C- terminal effector domain. The OmpR/PhoB subfamily is the largest subfamily of RRs.
