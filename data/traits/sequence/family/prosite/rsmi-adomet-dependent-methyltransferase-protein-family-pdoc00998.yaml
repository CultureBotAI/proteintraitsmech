identifier: PROSITE:PDOC00998
label: "RsmI AdoMet-dependent methyltransferase protein family"
definition: >-
  RsmI AdoMet-dependent methyltransferase protein family signature. In bacterial 16S rRNAs, methylated nucleosides are clustered within the decoding center, and these nucleoside modifications are thought to modulate translational fidelity. The N(4), 2'-O-dimethylcytidine (m(4)Cm) at position 1402 of the Escherichia coli 16S rRNA directly interacts with the P-site codon of the mRNA. RsmI is an AdoMet-dependent methyltransferase responsible for the 2'O-methylation of C1402. It is conserved in almost all species of bacteria.
