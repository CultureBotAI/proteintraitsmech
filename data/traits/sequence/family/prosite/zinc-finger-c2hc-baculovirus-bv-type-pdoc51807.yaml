identifier: PROSITE:PDOC51807
label: "Zinc finger C2HC baculovirus (BV)-type"
definition: >-
  Zinc finger C2HC baculovirus (BV)-type profile. Baculovirus are a family of enveloped double-stranded DNA viruses that are specifically pathogenic to arthropods, mainly affecting insects of the order Lepidoptera, Hymenoptera, and Diptera. The baculovirus capsid-associated protein Vp91 plays multiple roles in the baculovirus life cycle and is essential for nucleocapsid assembly and for efficient establishment of per os infection. It contains a C2HC zinc finger with the consensus sequence C-x(5)- C-x(n)-H-x(6)-C. The C2HC BV-type zinc finger may perform a pivotal role in the association of Vp91 with other per os infectivity factors (PIFs).
