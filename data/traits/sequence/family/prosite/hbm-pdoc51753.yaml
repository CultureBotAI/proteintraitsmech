identifier: PROSITE:PDOC51753
label: HBM
definition: >-
  HBM domain profile. The helical bimodular (HBM) domain is a small molecule binding domain of around 250 amino acids. It is found in Bacteria and Archaea but is absent from eukaryotes and forms part of chemoreceptors (see <PDOC00465>) and histidine kinases (see <PDOC50109>). The HBM domain is composed of two structural modules, each of which recognizes a different type of ligand. The conservation of amino acids in the ligand binding sites of both modules suggests that HBM family members recognize similar ligands.
