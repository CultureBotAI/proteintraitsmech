identifier: PROSITE:PDOC51301
label: KilA-N
definition: >-
  KilA-N domain profile. The amino-terminal module of the poxvirus D6R/NIR proteins defines a novel conserved DNA-binding domain (the KilA-N domain) that is found in a wide range of proteins of large bacterial and eukaryotic DNA viruses. Putative proteins with homology to the KilA-N domain have also been identified in Maverick transposable elements of the parabasalid protozoa Trichomonas vaginalis. The KilA-N domain has been suggested to be homologous to the fungal DNA-binding APSES domain (see <PDOC51299>). In all proteins shown to contain the KilA-N domain, it occurs at the extreme amino terminus accompanied by a wide range of distinct carboxy-terminal domains.
