identifier: PROSITE:PDOC00351
label: Disintegrin
definition: >-
  Disintegrin domain signature and profile. Disintegrins are snake venom proteins which inhibit fibrinogen interaction with platelet receptors expressed on the glycoprotein IIb-IIIa complex. They act by binding to the integrin glycoprotein IIb-IIIa receptor on the platelet surface and inhibit aggregation induced by ADP, thrombin, platelet-activating factor and collagen.
