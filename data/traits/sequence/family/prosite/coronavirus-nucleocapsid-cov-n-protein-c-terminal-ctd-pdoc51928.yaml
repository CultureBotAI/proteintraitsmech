identifier: PROSITE:PDOC51928
label: "Coronavirus nucleocapsid (CoV N) protein C-terminal (CTD)"
definition: >-
  Coronavirus nucleocapsid (CoV N) protein N- and C-terminal (NTD and CTD) domains profiles. Coronaviruses (CoVs) are a diverse group of enveloped, plus-stranded RNA viruses that infect humans and many animal species, in which they can cause respiratory, enteric, hepatic, central nervous system and neurological diseases of varying severity. The main CoV structural proteins are S (spike) (see <PDOC51923>), E (envelope) (see <PDOC51926>), M (membrane) (see <PDOC51927>), and N (nucleocapsid), where S, E, and M are integral membrane proteins.
