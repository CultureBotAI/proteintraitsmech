identifier: PROSITE:PDOC60029
label: "Spider toxin CSTX family"
definition: >-
  Spider toxin CSTX family signature. Spider toxins of the CSTX family are ion channel toxins containing an inhibitor cystine knot (ICK) structural motif or Knottin scaffold (see <PDOC60004>). The four disulfide bonds present in the CSTX spider toxin family are arranged in the following pattern: 1-4, 2-5, 3-8 and 6-7.
