identifier: PROSITE:PDOC50137
label: "Double stranded RNA-binding domain (dsRBD)"
definition: >-
  Double stranded RNA-binding domain (dsRBD) profile. In contrast to other RNA-binding domains, the about 65 amino acids long dsRBD domain has been found in a number of proteins that specifically recognize double-stranded RNAs. The dsRBD domain is also known as DSRM (Double-Stranded RNA-binding Motif). dsRBD proteins are mainly involved in posttranscriptional gene regulation, for example by preventing the expression of proteins or by mediating RNAs localization. This domain is also found in RNA editing proteins. Interaction of the dsRBD with RNA is unlikely to involve the recognition of specific sequences.
