identifier: PROSITE:PDOC00400
label: "Nickel-dependent hydrogenases large subunit signature"
definition: >-
  Nickel-dependent hydrogenases large subunit signatures. Hydrogenases are enzymes that catalyze the reversible activation of hydrogen and which occur widely in prokaryotes as well as in some eukaryotes. There are various types of hydrogenases, but all of them seem to contain at least one iron-sulfur cluster. They can be broadly divided into two groups: hydrogenases containing nickel and, in some cases, also selenium (the [NiFe] and [NiFeSe] hydrogenases) and those lacking nickel (the [Fe] hydrogenases).
