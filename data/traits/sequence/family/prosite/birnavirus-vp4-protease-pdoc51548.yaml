identifier: PROSITE:PDOC51548
label: "Birnavirus VP4 protease"
definition: >-
  Birnavirus VP4 protease domain profile. Viruses of the Birnaviridae family infect animal species belonging to vertebrates, mollusks, insects and rotifers and are characterized by their bi- segmented double-stranded RNA genome (segments A and B). Segment A encodes two overlapping reading frames and the larger open reading frame encodes a polyprotein (NH2-pVP2-VP4-VP3-COOH). The polyprotein is processed through the proteolytic activity of VP4 to generate pVP2 and VP3. During virus assembly pVP2 is further processed by VP4 to generate the capsid protein VP2 and structural peptides. Evolutionarily, the VP4 protease of the Birnaviridae family belongs to clan SJ and family S50.
