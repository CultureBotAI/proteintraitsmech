identifier: PROSITE:PDOC00179
label: Rubredoxin
definition: >-
  Rubredoxin signature. Rubredoxins are small electron-transfer prokaryotic proteins. They contain an iron atom which is ligated by four cysteine residues. Rubredoxins are, in some cases, functionally interchangeable with ferredoxins. As a pattern for these proteins we have selected a conserved region that includes two of the cysteine residues that bind the iron atom.
