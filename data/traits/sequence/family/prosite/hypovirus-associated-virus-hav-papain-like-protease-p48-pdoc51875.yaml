identifier: PROSITE:PDOC51875
label: "Hypovirus-associated virus (HAV) papain-like protease p48"
definition: >-
  Hypovirulence-associated virus (HAV) papain-like proteases p29 and p48 domains profiles. Hypoviruses are positive-strand RNA mycoviruses that attenuate virulence of their pathogenic fungal hosts. They employ a gene expression strategy that involves the autocatalytic processing of the N-terminal portion of encoded polyproteins by papain-like protease domains. The prototypic hypovirus CHV-1/EP713, responsible for virulence attenuation (hypovirulence) of the chestnut blight fungus Cryphonectria parasitica, encodes two contiguous open reading frames (ORFs) designated ORF A and ORF B, which contain N-terminal proteases p29 and p48, respectively.
