identifier: PROSITE:PDOC51121
label: "NtA (N-terminal agrin)"
definition: >-
  NtA (N-terminal agrin) domain profile. Agrin is involved in postsynaptic differentiation at the site of nerve-muscle contact. The N-terminal Agrin (NtA) domain is a region of ~135 amino acids required for the localization of agrin to synaptic basal lamina and other basement membranes. Agrin is a heparan sulfate proteoglycan whereof the NtA domain forms the most N-terminal part, followed by 9 Kazal-like domains and 2 LE domains (see <PDOC00961>). The C-terminal part consists of a SEA domain (see <PDOC50024>), 4 EGF-like domains (see <PDOC00021>) and 3 Laminin G domains (see <PDOC50025>), responsible for the clustering of acetylcholine receptors.
