identifier: PROSITE:PDOC00346
label: "Potexviruses and carlaviruses coat protein"
definition: >-
  Potexviruses and carlaviruses coat protein signature. Potexviruses and carlaviruses are plant-infecting viruses whose genome consist of a single-stranded RNA molecule encapsided in a coat protein. The genome of many potexviruses is known and their coat protein sequence has been shown to be rather well conserved. The same observation applies to the coat protein of a variety of carlaviruses whose sequences are related to those of potexviruses. The coat proteins of potexviruses and of carlaviruses contain from 190 to 300 amino acid residues.
