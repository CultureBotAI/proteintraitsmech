identifier: PROSITE:PDOC00960
label: "Inosine-uridine preferring nucleoside hydrolase family"
definition: >-
  Inosine-uridine preferring nucleoside hydrolase family signature. Inosine-uridine preferring nucleoside hydrolase (EC 3.2.2.1) (IU-nucleoside hydrolase or IUNH) is an enzyme first identified in protozoan that catalyzes the hydrolysis of all of the commonly occuring purine and pyrimidine nucleosides into ribose and the associated base, but has a preference for inosine and uridine as substrates. This enzyme is important for these parasitic organisms, which are deficient in de novo synthsis of purines, to salvage the host purine nucleosides.
