identifier: PROSITE:PDOC00097
label: "EPSP synthase signature"
definition: >-
  EPSP synthase signatures. EPSP synthase (3-phosphoshikimate 1-carboxyvinyltransferase) (EC 2.5.1.19) catalyzes the sixth step in the biosynthesis from chorismate of the aromatic amino acids (the shikimate pathway) in bacteria (gene aroA), plants and fungi (where it is part of a multifunctional enzyme which catalyzes five consecutive steps in this pathway). EPSP synthase has been extensively studied as it is the target of the potent herbicide glyphosate which inhibits the enzyme.
