identifier: PROSITE:PDOC00401
label: "Dihydroorotase signature"
definition: >-
  Dihydroorotase signatures. Dihydroorotase (EC 3.5.2.3) (DHOase) catalyzes the third step in the de novo biosynthesis of pyrimidine, the conversion of ureidosuccinic acid (N- carbamoyl-L-aspartate) into dihydroorotate. Dihydroorotase binds a zinc ion which is required for its catalytic activity.
