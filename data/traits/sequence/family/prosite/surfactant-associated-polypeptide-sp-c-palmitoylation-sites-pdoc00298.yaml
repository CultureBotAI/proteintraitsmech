identifier: PROSITE:PDOC00298
label: "Surfactant associated polypeptide SP-C palmitoylation sites"
definition: >-
  Surfactant associated polypeptide SP-C palmitoylation sites. Pulmonary surfactant associated proteins promote alveolar stability by lowering the surface tension at the air-liquid interface in the peripheral air spaces. SP-C, a component of surfactant, is a highly hydrophobic peptide of 35 amino acid residues which is processed from a larger precursor protein. SP-C is post-translationally modified by the covalent attachment of two palmitoyl groups on two adjacent cysteines.
