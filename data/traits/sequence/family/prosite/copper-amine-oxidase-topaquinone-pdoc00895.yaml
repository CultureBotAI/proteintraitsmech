label: "Copper amine oxidase topaquinone"
definition: >-
  Copper amine oxidase signatures. Amine oxidases (AO) are enzymes that catalyze the oxidation of a wide range of biogenic amines including many neurotransmitters, histamine and xenobiotic amines. There are two classes of amine oxidases: flavin-containing (EC 1.4.3.4) and copper-containing (EC 1.4.3.6).
