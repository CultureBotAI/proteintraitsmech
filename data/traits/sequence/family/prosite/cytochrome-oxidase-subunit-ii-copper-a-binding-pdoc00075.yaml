identifier: PROSITE:PDOC00075
label: "Cytochrome oxidase subunit II copper A binding"
definition: >-
  Cytochrome c oxidase subunit II signature and profiles. Cytochrome c oxidase (EC 1.9.3.1) is an oligomeric enzymatic complex which is a component of the respiratory chain and is involved in the transfer of electrons from cytochrome c to oxygen. In eukaryotes this enzyme complex is located in the mitochondrial inner membrane; in aerobic prokaryotes it is found in the plasma membrane. The enzyme complex consists of 3-4 subunits (prokaryotes) to up to 13 polypeptides (mammals).
