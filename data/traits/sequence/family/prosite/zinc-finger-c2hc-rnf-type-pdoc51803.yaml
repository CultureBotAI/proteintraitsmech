identifier: PROSITE:PDOC51803
label: "Zinc finger C2HC RNF-type"
definition: >-
  Zinc finger C2HC RNF-type profile. Ubiquitination is a posttranslational modification that mediates the covalent attachment of ubiquitin (Ub), a small, highly conserved, cytoplasmic protein of 76 amino acid residues, to target proteins. This conjugation is catalyzed by the sequential action of three enzymes: Ub-activating (E1) enzyme, Ub- conjugating (E2) enzyme and Ub ligase (E3). A large number of RING finger (RNF) (see <PDOC00449>) proteins are present in eukaryotic cells and the majority of them are believed to act as E3 ubiquitin ligases.
