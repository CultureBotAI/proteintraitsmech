identifier: PROSITE:PDOC52032
label: "MarR-like, BRCT and chromo domains module"
definition: >-
  MarR-like, BRCT and chromo domains module profile. Mammalian SWI/SNF (mSWI/SNF) of BAF complexes are a subfamily of SWI/SNF ATP- dependent chromatin remodelers that dynamically modulate chromatin structure to regulate fundamental cellular processes including gene transcription, cell cycle control, and DNA damage response. The BAF155/SMARCC1 subunit is a component of all complexes identified to date, incorporated either as a homodimer or as a heterodimer with its paralog BAF170/SMARCC2. The BAF155 subunit predominates in stem cells, while the BAF170 subunit is incorporated during differentiation.
