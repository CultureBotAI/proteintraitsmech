identifier: PROSITE:PDOC01038
label: "S-adenosylmethionine decarboxylase"
definition: >-
  S-adenosylmethionine decarboxylase signature. S-adenosylmethionine decarboxylase (EC 4.1.1.50) (AdoMetDC) catalyzes the removal of the carboxylate group of S-adenosylmethionine to form S-adenosyl- 5'-3-methylpropylamine which then acts as the n-propylamine group donor in the synthesis of the polyamines spermidine and spermine from putrescine.
