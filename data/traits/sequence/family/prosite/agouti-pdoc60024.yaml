identifier: PROSITE:PDOC60024
label: Agouti
definition: >-
  Agouti domain signature and profile. The agouti signaling protein (ASIP or the agouti protein) and its neuropeptide homolog the agouti-related protein (AgRP) are paracrine signaling molecules that act as inverse agonists at distinct subsets of melanocortin receptors. ASIP antagonizes the binding of alpha-melanocyte stimulating hormone (alpha-MSH) to melanocortin 1 receptor (MC1R), switching melanin synthesis from eumelanin (black/brown) to phaeomelanin (red/yellow). The effect of ASIP on pigment type-switching is responsible for a variety of coat color patterns accross a broad range of mammalian species.
