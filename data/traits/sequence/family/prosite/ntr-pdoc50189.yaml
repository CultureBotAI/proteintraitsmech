identifier: PROSITE:PDOC50189
label: NTR
definition: >-
  NTR domain profile. The netrin (NTR) module is an about 130-residue domain found in the C- terminal parts of netrins, complement proteins C3, C4, and C5, secreted frizzled-related proteins, and type I procollagen C-proteinase enhancer proteins (PCOLCEs), as well as in the N-terminal parts of tissue inhibitors of metalloproteinases (TIMPs) (see <PDOC00260>). The proteins harboring the NTR domain fulfill diverse biological roles ranging from axon guidance, regulation of Wnt signalling, to the control of the activity of metalloproteinases.
