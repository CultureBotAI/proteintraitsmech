identifier: PROSITE:PDOC00731
label: "Autoinducer synthase family"
definition: >-
  Autoinducer synthase family signature and profile. Autoinducers are hormone-like molecules produced by bacteria as signals to sense cell density and activate adaptations, by a process termed quorum sensing. N-(3-oxohexanoyl)-L-homoserine lactone (OHHL) is a molecule produced by a number of Gram-negative bacteria that acts as an autoinducer by binding to transcriptional regulatory proteins and activating them. OHHL and related molecules such as N-butanoyl- (BHL), N-hexanoyl- (HHL) and N- oxododecanoyl- (PAI) homoserine lactones are produced by a family of proteins which have a length of about 200 amino acids.
