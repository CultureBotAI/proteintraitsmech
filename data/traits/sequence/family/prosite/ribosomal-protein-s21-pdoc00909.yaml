label: "Ribosomal protein S21"
definition: >-
  Ribosomal protein S21 signature. Ribosomal protein S21 is one of the proteins from the small ribosomal subunit. So far S21 has only been found in eubacteria. It is a protein of 55 to 70 amino-acid residues.
