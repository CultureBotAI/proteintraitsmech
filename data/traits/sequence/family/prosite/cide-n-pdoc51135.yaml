identifier: PROSITE:PDOC51135
label: CIDE-N
definition: >-
  CIDE-N domain profile. The CIDE-N or CAD domain is a ~78 amino acid protein-protein interaction domain in the N-terminal part of Cell death-Inducing DFF45-like Effector (CIDE) proteins, involved in apoptosis. At the final stage of programmed cell death, chromosomal DNA is degraded into fragments by Caspase-activated DNase (CAD), also named DNA fragmentation factor 40 kDa (DFF40). In normal cells CAD/DFF40 is completely inhibited by its binding to DFF45 or Inhibitor of CAD (ICAD). Apoptotic stimuli provoke cleavage of ICAD/DFF45 by caspases, resulting in self-assembly of CAD/DFF40 into the active dimer.
