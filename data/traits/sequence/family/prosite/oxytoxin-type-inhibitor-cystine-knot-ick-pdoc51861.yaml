identifier: PROSITE:PDOC51861
label: "Oxytoxin-type inhibitor cystine knot (ICK)"
definition: >-
  Oxytoxin-type inhibitor cystine knot (ICK) domain profile. Spiders are widely acknowledged to produce potent and selective toxins. In addition to the conventional neurotoxins and cytotosins, venom of lynx spiders (genus Oxyopes) was found to contain two-domain modular toxins named spiderines: OspTx1a, 1b, 2a and 2b. Spiderines consist of two distinct modules separated by a short linker. The N-terminal part (~40 residues) contains no cysteine residues, is highly cationic, forms amphipathic alpha- helical structures in a membrane-mimicking environment, and shows potent cytolytic effects on cells of various origins.
