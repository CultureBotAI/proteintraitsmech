identifier: PROSITE:PDOC00470
label: "Methylmalonyl-CoA mutase"
definition: >-
  Methylmalonyl-CoA mutase signature. Methylmalonyl-CoA mutase (EC 5.4.99.2) (MCM) is an adenosylcobalamin (vitamin B12) dependent enzyme that catalyzes the isomerization between methylmalonyl-CoA and succinyl-CoA. MCM is involved in various catabolic or biosynthetic pathways; for example in man it is involved in the degradation of several amino acids, odd-chain fatty acids and cholesterol via propionyl-CoA to the tricarboxylic acid cycle; while in some bacteria it is involved in the synthesis of propionate from tricarboxylic acid-cycle intermediates.
