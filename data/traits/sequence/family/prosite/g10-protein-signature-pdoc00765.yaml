identifier: PROSITE:PDOC00765
label: "G10 protein signature"
definition: >-
  G10 protein signatures. A Xenopus protein known as G10 has been found to be highly conserved in a wide range of eukaryotic species. The function of G10 is still unknown. G10 is a protein of about 17 to 18 Kd (143 to 157 residues) which is hydrophilic and whose C-terminal half is rich in cysteines and could be involved in metal- binding. As signature patterns, we selected two of these cysteine-rich segments.
