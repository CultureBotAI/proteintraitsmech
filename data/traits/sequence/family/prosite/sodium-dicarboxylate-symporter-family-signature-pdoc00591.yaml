label: "Sodium:dicarboxylate symporter family signature"
definition: >-
  Sodium:dicarboxylate symporter family signatures. It has been shown that integral membrane proteins that mediate the intake of a wide variety of molecules with the concomitant uptake of sodium ions (sodium symporters) can be grouped, on the basis of sequence and functional similarities into a number of distinct families. One of these families is known as the sodium:dicarboxylate symporter family (SDF) and currently consists of the following proteins:
