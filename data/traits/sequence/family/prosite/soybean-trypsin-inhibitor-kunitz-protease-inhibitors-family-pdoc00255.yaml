label: "Soybean trypsin inhibitor (Kunitz) protease inhibitors family"
definition: >-
  Soybean trypsin inhibitor (Kunitz) protease inhibitors family signature. The soybean trypsin inhibitor (Kunitz) family is one of the numerous families of proteinase inhibitors. It comprise plant proteins which have inhibitory activity against serine proteinases from the trypsin and subtilisin families, thiol proteinases and aspartic proteinases as well as some proteins that are probably involved in seed storage. This family is currently known to group the following proteins:
