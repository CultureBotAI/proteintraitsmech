identifier: PROSITE:PDOC00862
label: "Translation initiation factor SUI1 family"
definition: >-
  Translation initiation factor SUI1 profile. In budding yeast (Saccharomyces cerevisiae), SUI1 is a translation initiation factor that functions in concert with eIF-2 and the initiator tRNA-Met in directing the ribosome to the proper start site of translation. SUI1 is a protein of 108 residues. Close homologs of SUI1 have been found in mammals, insects and plants.
