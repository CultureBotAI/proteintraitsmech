label: "Nerve growth factor family"
definition: >-
  Nerve growth factor family signature and profile. Nerve growth factor (NGF or beta-NGF) is a vertebrate protein that stimulates division and differentiation of sympathetic and embryonic sensory neurons. NGF is a protein of about 120 residues that is cleaved from a larger precursor molecule. It contains six cysteines all involved in intrachain disulfide bonds. A schematic representation of the structure of NGF is shown below:
