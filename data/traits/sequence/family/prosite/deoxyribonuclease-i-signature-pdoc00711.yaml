identifier: PROSITE:PDOC00711
label: "Deoxyribonuclease I signature"
definition: >-
  Deoxyribonuclease I signatures. Deoxyribonuclease I (DNase I) (EC 3.1.21.1) is a vertebrate enzyme which catalyzes the endonucleolytic cleavage of double-stranded DNA to 5'- phosphodinucleotide and 5'-phosphooligonucleotide end-products. DNase I is an enzyme involved in DNA degradation; it is normally secreted outside of the cell but seems to be able to gain access to the nucleus where it is involved in cell death by apoptosis.
