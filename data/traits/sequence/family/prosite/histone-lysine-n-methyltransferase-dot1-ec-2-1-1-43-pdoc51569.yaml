identifier: PROSITE:PDOC51569
label: "Histone-lysine N-methyltransferase DOT1 (EC 2.1.1.43)"
definition: >-
  DOT1 domain profile. The Dot1 protein (Dot1p) is an histone-lysine N-methyltransferase (EC 2.1.1.43) that methylates lysine 79 (Lys-79) of histone H3. It was first identified as a Disruptor Of Telomeric silencing in yeast where Dot1p is implicated in gene silencing and localization of the Silent Information Regulator (SIR) complex; in higher eukaryotes the methylation carried out by this enzyme may be used for differentiating chromatin domains.
