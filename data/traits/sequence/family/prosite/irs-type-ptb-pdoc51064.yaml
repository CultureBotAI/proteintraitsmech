identifier: PROSITE:PDOC51064
label: "IRS-type PTB"
definition: >-
  IRS-type phosphotyrosine binding domain (PTB) profile. Proteins encoding phosphotyrosine binding (PTB) domains function as adaptors or scaffolds to organize the signaling complexes involved in wide-ranging physiological processes including neural development, immunity, tissue homeostasis and cell growth. Due to structural differences, PTB domains are divided into three groups represented by phosphotyrosine-dependent IRS-like, phosphotyrosine-dependent Shc-like (see <PDOC00907>), and phosphotyrosine- independent Dab-like PTBs (see <PDOC00907>).
