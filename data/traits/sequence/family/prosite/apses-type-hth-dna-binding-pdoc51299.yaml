identifier: PROSITE:PDOC51299
label: "APSES-type HTH DNA-binding"
definition: >-
  APSES-type HTH DNA-binding domain profile. The APSES (ASM-1, Phd1, StuA, EFG1, and Sok2) domain is an ~110-residue sequence-specific DNA-binding domain found in a family of fungal transcription factors that regulate development or cell cycle progression. The APSES domain is found associated with ankyrin repeats (see <PDOC50088>) and a heterodimerization domain.
