identifier: PROSITE:PDOC00150
label: "Enoyl-CoA hydratase/isomerase"
definition: >-
  Enoyl-CoA hydratase/isomerase signature. Enoyl-CoA hydratase (EC 4.2.1.17) (ECH) and D3,D2-enoyl-CoA isomerase (EC 5.3.3.8) (ECI) are two enzymes involved in fatty acid metabolism. ECH catalyzes the hydratation of 2-trans-enoyl-CoA into 3-hydroxyacyl-CoA and ECI shifts the 3- double bond of the intermediates of unsaturated fatty acid oxidation to the 2-trans position.
