identifier: PROSITE:PDOC00485
label: "CBM2 (Carbohydrate-binding type-2)"
definition: >-
  CBM2 (carbohydrate-binding type-2) domain signature and profile. The microbial degradation of cellulose and xylans requires several types of enzyme such as endoglucanases (EC 3.2.1.4), cellobiohydrolases (EC 3.2.1.91) (exoglucanases), or xylanases (EC 3.2.1.8). Structurally, cellulases and xylanases generally consist of a catalytic domain and a conserved region of ~100 amino acid residues, the carbohydrate-binding module 2 (CBM2). It is found either at the N-terminal or at the C-terminal extremity of these enzymes.
