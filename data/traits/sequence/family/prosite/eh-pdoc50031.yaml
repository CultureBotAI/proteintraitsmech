identifier: PROSITE:PDOC50031
label: EH
definition: >-
  EH domain profile. The EH (for Eps15 Homology) domain is a protein-protein interaction module of approximately 95 residues which was originally identified as a repeated sequence present in three copies at the N-terminus of the tyrosine kinase substrates Eps15 and Eps15R. The EH domain was subsequently found in several proteins implicated in endocytosis, vesicle transport and signal transduction in organisms ranging from yeast to mammals. EH domains are present in one to three copies and they may include calcium-binding domains of the EF-hand type (see <PDOC00018>).
