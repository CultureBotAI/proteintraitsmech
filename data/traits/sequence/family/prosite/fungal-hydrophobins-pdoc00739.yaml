identifier: PROSITE:PDOC00739
label: "Fungal hydrophobins"
definition: >-
  Fungal hydrophobins signature. The surface of many fungal spores is covered by a hydrophobic sheath, the rodlet layer whose main component is a protein known as the rodlet protein. The rodlet proteins of Neurospora crassa (gene eas) and Emericella nidulans (gene rodA) are evolutionary related to proteins found in the cell wall of fruiting bodies of the mushroom Schizophyllum commune. Collectively, these low-molecular-weight, cysteine-rich (8 conserved cysteines), hydrophobic proteins, are known as hydrophobins.
