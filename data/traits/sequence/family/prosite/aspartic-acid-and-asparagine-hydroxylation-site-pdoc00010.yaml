identifier: PROSITE:PDOC00010
label: "Aspartic acid and asparagine hydroxylation site"
definition: >-
  Aspartic acid and asparagine hydroxylation site. Post-translational hydroxylation of aspartic acid or asparagine to form erythro-beta-hydroxyaspartic acid or erythro-beta-hydroxyasparagine has been identified in a number of proteins with domains homologous to epidermal growth factor (EGF). Examples of such proteins are the blood coagulation protein factors VII, IX and X, proteins C, S, and Z, the LDL receptor, thrombomodulin, etc. Based on sequence comparisons of the EGF-homology region that contains hydroxylated Asp or Asn, a consensus sequence has been identified that seems to be required by the hydroxylase(s).
