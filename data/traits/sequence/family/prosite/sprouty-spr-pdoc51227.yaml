identifier: PROSITE:PDOC51227
label: "Sprouty (SPR)"
definition: >-
  Sprouty (SPR) domain profile. Sprouty (Spry) and Spred (Sprouty related EVH1 domain) proteins have been identified as inhibitors of the Ras/mitogen-activated protein kinase (MAPK) cascade, a pathway crucial for developmental processes initiated by activation of various receptor tyrosine kinases. These proteins share a conserved, C-terminal cysteine-rich region, the SPR domain. This domain has been defined as a novel cytosol to membrane translocation domain. It has been found to be a PtdIns(4,5)P2-binding domain that targets the proteins to a cellular localization that maximizes their inhibitory potential. It also mediates homodimer formation of these proteins.
