identifier: PROSITE:PDOC00320
label: "Methylated-DNA--protein-cysteine methyltransferase active site"
definition: >-
  Methylated-DNA--protein-cysteine methyltransferase active site. The major mutagenic and carcinogenic effect of methylating agents in DNA is the formation of O6-alkylguanine. The repair of DNA containing O6-alkylated guanine is carried out by the enzyme 6-O-methylguanine-DNA methyltransferase (EC 2.1.1.63) (methylated-DNA--protein-cysteine methyltransferase) (MGMT). The alkyl group at the O-6 position is transferred to a cysteine residue in the enzyme. This is a suicide reaction: the enzyme is irreversibly inactivated and the methylated protein accumulates as a dead-end product. Most, but not all MGMT are also able to repair O-4-methylthymine.
