identifier: PROSITE:PDOC51898
label: "Tyrosine recombinase"
definition: >-
  Tyrosine recombinase domains profiles. Tyrosine-type site-specific recombinases are ubiquitous in eubacteria, prevalent in archaea and temperate phages and present in certain yeast strains. They catalyze a variety of sequence-specific DNA rearrangements in biological systems, including the integration and excision of phage genomes into and out of their bacterial hosts, conjugative transposition, resolution of catenated DNA circles, regulation of plasmid copy number, DNA excision to control gene expression for nitrogen fixation in Anabaena and DNA inversions controlling expression of cell surface proteins or DNA replication.
