identifier: PROSITE:PDOC51079
label: "MBT repeat"
definition: >-
  MBT repeat profile. The Polycomb-group protein Sex Comb on midleg (SCM) and the tumor suppressor protein lethal (3) malignant brain tumor (l(3)mbt) , share a homology region consisting of two repeats, each about 100 amino acids in length. This repeat has been name MBT after its occurence in l(3)mbt.
