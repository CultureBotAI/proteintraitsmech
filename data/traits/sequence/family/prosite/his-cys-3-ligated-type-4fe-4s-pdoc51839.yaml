label: "His(Cys)3-ligated-type [4Fe-4S]"
definition: >-
  His(Cys)3-ligated-type [4Fe-4S] domain profile. The following proteins contain a His(Cys)3-ligated-type [4Fe-4S] domain that consists of just two alpha helices separated by a loop region that coordinates a [4Fe-4S] cluster through an unusual H-x(3)-C-x(2)-C-x(5)-C motif that includes one His and three Cys residues (see <PDB:1FEH>):
