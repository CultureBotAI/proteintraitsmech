identifier: PROSITE:PDOC51021
label: BAR
definition: >-
  BAR domain profile. The BAR (Bin-Amphiphysin-Rvs) domain is about 200 amino acid long. This domain can be found alone or in association with other domains such as SH3 (see <PDOC50002>) and RhoGAP (see <PDOC50238>). BAR domain containing proteins are a unique class of adaptor proteins characterized by a common N-terminal fold termed the BAR domain. This set of adaptors, which includes the mammalian proteins amphiphysin and Bin1 and the yeast proteins Rvs167 and Rvs161, has been implicated in diverse cellular processes, including synaptic vesicle endocytosis, actin regulation, differentiation, cell survival, and tumorigenesis.
