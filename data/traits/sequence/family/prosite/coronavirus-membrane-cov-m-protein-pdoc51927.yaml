identifier: PROSITE:PDOC51927
label: "Coronavirus membrane (Cov-M) protein"
definition: >-
  Coronavirus membrane (CoV M) protein profile. Coronaviruses (CoVs) are a diverse group of enveloped, plus-stranded RNA viruses that infect humans and many animal species, in which they can cause respiratory, enteric, hepatic, central nervous system and neurological diseases of varying severity. The main CoV structural proteins are S (spike) (see <PDOC51923>), E (envelope) (see <PDOC51926>), M (membrane), and N (nucleocapsid), where S, E, and M are integral membrane proteins. The M protein of coronavirus plays a central role in virus assembly, turning cellular membranes into workshops where virus and host factors come together to make new virus particles.
