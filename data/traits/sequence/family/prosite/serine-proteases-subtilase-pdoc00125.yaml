identifier: PROSITE:PDOC00125
label: "Serine proteases, subtilase"
definition: >-
  Serine proteases, subtilase family, active sites signatures and domain profile. Subtilases are an extensive family of serine proteases which occur in Archaea, Bacteria, fungi, yeasts, and higher eukaryotes. Their catalytic activity is provided by a charge relay system similar to that of the trypsin family of serine proteases but which evolved by independent convergent evolution. The sequence around the residues involved in the catalytic triad (aspartic acid, serine and histidine) are completely different from that of the analogous residues in the trypsin serine proteases and can be used as signatures specific to that category of proteases.
