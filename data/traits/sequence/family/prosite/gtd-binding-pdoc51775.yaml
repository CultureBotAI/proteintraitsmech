identifier: PROSITE:PDOC51775
label: GTD-binding
definition: >-
  GTD-binding domain profile. The GTD-binding domain is a plant-specific protein-protein interaction domain. It emerged in primitive land plants and founded a multigene family that is conserved in all flowering plants. Proteins with GTD-binding domains fall into four groups, where group 1-3 contain the GTD-binding domain at the C-terminal half of the protein and one (group 2) or more (group1) predicted transmembrane domains, or an endoplasmic reticulum signal peptide (group 3) at the N- terminus, whereas group 4 contains the GTD-binding domain near the N-terminus.
