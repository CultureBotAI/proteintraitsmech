identifier: PROSITE:PDOC00661
label: "ArsR-type HTH"
definition: >-
  ArsR-type HTH domain signature and profile. The arsR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 90-100 amino acids present in transcription regulators of the arsR/smtB family, involved in stress-response to heavy metal ions. This family of prokaryotic metal-sensing transcription repressors is named after Escherichia coli arsR, an arsenic-responsive repressor of the ars operon for arsenate reductase and metal ion extrusion, and after Synechococcus PCC 7942 smtB, a Zn(II)-responsive repressor of the smtA gene for a Zn sequestering metallothionein.
