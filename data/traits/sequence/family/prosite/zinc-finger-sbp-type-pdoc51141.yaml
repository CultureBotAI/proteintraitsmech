identifier: PROSITE:PDOC51141
label: "Zinc finger SBP-type"
definition: >-
  Zinc finger SBP-type profile. SQUAMOSA promoter binding proteins (SBPs) form a major family of plant-specific transcription factors related to flower development. They share a highly conserved DNA-binding domain that contains two zinc-binding sites. Among the 11 possible ligands for the zinc atoms that are conserved in the SBP zinc finger, only 8 are used. The SBP zinc finger follows the general pattern C-x4-C-x16-C-x2-[HC]-x15-C-x2-C-x3-H-x11-C. Three other histidines are well conserved but not involved in zinc binding.
