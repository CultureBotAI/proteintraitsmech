identifier: PROSITE:PDOC00705
label: "Uroporphyrinogen decarboxylase signature"
definition: >-
  Uroporphyrinogen decarboxylase signatures. Uroporphyrinogen decarboxylase (EC 4.1.1.37) (URO-D), the fifth enzyme of the heme biosynthetic pathway, catalyzes the sequential decarboxylation of the four acetyl side chains of uroporphyrinogen to yield coproporphyrinogen.
