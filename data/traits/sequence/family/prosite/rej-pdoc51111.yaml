identifier: PROSITE:PDOC51111
label: REJ
definition: >-
  REJ domain profile. The REJ domain is an extracellular module of ~700 amino acids, which is found associated with others domains, such as EGF (see <PDOC00021>), the GPS proteolytic cleavage site (see <PDOC50221>), C-type lectin (see <PDOC00537>), SUEL-type lectin (see <PDOC50228>), LRR, LDL-A, PLAT (see <PDOC50095>) or PKD (see <PDOC50093>). Although its function is unknown, the REJ domain has been shown to be required for cleavage to occur at the GPS. It has been proposed that the REJ domain might function in ion transport homeostasis.
