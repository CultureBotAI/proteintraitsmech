identifier: PROSITE:PDOC00925
label: "Iodothyronine deiodinases active site"
definition: >-
  Iodothyronine deiodinases active site. Iodothyronine deiodinase (EC 1.97.1.10) (DI) is the vertebrate enzyme responsible for the deiodination of the prohormone thyroxine (T4 or 3,5,3',5'- tetraiodothyronine) into the biologically active hormone T3 (3,5,3'- triiodothyronine) and of T3 into the inactive metabolite T2 (3,3'- diiodothyronine). Three types of DI are known. All known DI are proteins of about 250 residues that contain a selenocysteine at their active site.
