identifier: PROSITE:PDOC51442
label: "Coronavirus main protease (M-pro)"
definition: >-
  Coronavirus main protease (M-pro) domain profile. Coronaviruses (CoVs) are positive-stranded RNA viruses that can infect humans and multiple species of animals, causing a wide spectrum of diseases. The CoV replicase gene encodes two overlapping polyproteins, termed pp1a and pp1ab, which mediate viral replication and transcription. The maturation of CoVs involves a highly complex cascade of proteolytic processing events on the polyproteins to control viral gene expression and replication.
