identifier: PROSITE:PDOC00105
label: "Phosphoribosyl pyrophosphate synthase"
definition: >-
  Phosphoribosyl pyrophosphate synthase signature. Phosphoribosyl pyrophosphate synthase (EC 2.7.6.1) (PRPP synthase) catalyzes the formation of PRPP from ATP and ribose 5-phosphate. PRPP is then used in various biosynthetic pathways, as for example in the formation of purines, pyrimidines, histidine and tryptophan. PRPP synthase requires inorganic phosphate and magnesium ions for its stability and activity.
