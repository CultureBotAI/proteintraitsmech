definition: >-
  Pyridine nucleotide-disulphide oxidoreductases class-I active site. The pyridine nucleotide-disulphide oxidoreductases are FAD flavoproteins which contains a pair of redox-active cysteines involved in the transfer of reducing equivalents from the FAD cofactor to the substrate. On the basis of sequence and structural similarities these enzymes can be classified into two categories. The first category groups together the following enzymes:
