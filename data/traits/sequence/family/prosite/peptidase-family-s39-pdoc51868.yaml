identifier: PROSITE:PDOC51868
label: "Peptidase family S39"
definition: >-
  Peptidase family S39 domain profile. Polyprotein processing is one of the major strategies employed by both animal and plant viruses to generate more than one functional protein from the same polypeptide chain. To accomplish cleavage at specific sites, viruses employ one or more proteases with unique cleavage specificities. Plant viruses of the Solemoviridae and subgroup II Luteoviridae families and the mycovirus of the Barnaviridae family contain an N-terminal serine protease domain of the S39 family that is responsible for the processing of the polyprotein both in cis and in trans.
