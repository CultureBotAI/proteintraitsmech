identifier: PROSITE:PDOC50892
label: "v-SNARE coiled-coil homology"
definition: >-
  v-SNARE coiled-coil homology domain profile. The process of vesicular membrane fusion in eukaryotic cells depends on a conserved fusion machinery called SNARE (soluble N-ethylmaleimide-sensitive factor (NSF) attachment protein (SNAP) receptors). In the process of vesicle docking, proteins present on the vesicle (v-SNARE) have to bind to their counterpart on the target membrane (t-SNARE) to form a core complex that can then recruit the soluble proteins NSF and SNAP. This so called fusion complex can then disassemble after ATP hydrolysis mediated by the ATPase NSF in a process that leads to membrane fusion and the release of the vesicle contents.
