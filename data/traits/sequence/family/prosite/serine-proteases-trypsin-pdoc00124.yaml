identifier: PROSITE:PDOC00124
label: "Serine proteases, trypsin"
definition: >-
  Serine proteases, trypsin family, signatures and profile. The catalytic activity of the serine proteases from the trypsin family is provided by a charge relay system involving an aspartic acid residue hydrogen- bonded to a histidine, which itself is hydrogen-bonded to a serine. The sequences in the vicinity of the active site serine and histidine residues are well conserved in this family of proteases. A partial list of proteases known to belong to the trypsin family is shown below.
