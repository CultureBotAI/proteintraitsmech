identifier: PROSITE:PDOC51205
label: VPS9
definition: >-
  VPS9 domain profile. Rab proteins form a family of signal-transducing GTPases that cycle between active GTP-bound and inactive GDP-bound forms. The Rab5 GTPase is an essential regulator of endocytosis and endosome biogenesis. Rab5 is activated by GDP-GTP exchange factors (GEFs) that contain a VPS9 domain and generate the Rab5-GTP complex. The VPS9 domain catalyzes nucleotide exchange on Rab5 or the yeast homolog VPS21. The domain has a length of ~140 residues and forms the central part of the yeast VPS9 (vacuolar protein sorting-associated) protein, which acts as a GEF for VPS21.
