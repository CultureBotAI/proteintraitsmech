identifier: PROSITE:PDOC51885
label: "Neprilysin-like (M13) protease"
definition: >-
  Neprilysin-like (M13) protease domain profile. The neprilysin (M13) family of endopeptidases are zinc-metalloenzymes, the majority of which are type II integral membrane proteins with their active sites facing the extracellular environment. The best characterized of this family is neprilysin (EC 3.4.24.11, neural endopeptidase, NEP), which has important roles in inactivating signaling peptides involved in modulating neuronal activity, blood pressure and the immune system.
