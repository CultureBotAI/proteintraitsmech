identifier: PROSITE:PDOC00534
label: "Histidinol dehydrogenase"
definition: >-
  Histidinol dehydrogenase signature. Histidinol dehydrogenase (EC 1.1.1.23) (HDH) catalyzes the terminal step in the biosynthesis of histidine in bacteria, fungi, and plants, the four- electron oxidation of L-histidinol to histidine.
