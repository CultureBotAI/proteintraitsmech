identifier: PROSITE:PDOC00868
label: "Shikimate kinase"
definition: >-
  Shikimate kinase signature. Shikimate kinase (EC 2.7.1.71) catalyzes the fifth step in the biosynthesis from chorismate of the aromatic amino acids (the shikimate pathway) in bacteria (gene aroK or aroL), plants and in fungi (where it is part of a multifunctional enzyme which catalyzes five consecutive steps in this pathway).
