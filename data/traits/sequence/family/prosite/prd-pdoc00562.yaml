identifier: PROSITE:PDOC00562
label: PRD
definition: >-
  PRD domain profile and signature. Transcriptional antiterminators and activators containing phosphoenolpyruvate: sugar phosphotransferase system (PTS) regulation domains (PRDs) form a class of bacterial regulatory proteins whose activity is modulated by phosphorylation. These regulators stimulate the expression of genes and operons involved in carbohydrate metabolism. They are characterized by the presence of a duplicated regulatory module of ~100 residues that can be reversibly phosphorylated on histidyl residues by the PTS. PRDs in transcriptional antiterminators and activators are PTS regulatory targets that are (de)phosphorylated in response to the availability of carbon sources [1-5].
