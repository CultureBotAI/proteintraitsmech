identifier: PROSITE:PDOC51017
label: CCT
definition: >-
  CCT domain profile. The CCT (CONSTANS, CO-like, and TOC1) domain is a highly conserved basic module of ~43 amino acids, which is found near the C-terminus of plant proteins often involved in light signal transduction. The CCT domain is found in association with other domains, such as the B-box zinc finger (see <PDOC50119>), the GATA-type zinc finger (see <PDOC00300>), the ZIM motif or the response regulatory domain (see <PDOC50110>). The CCT domain has been shown to be involved in nuclear localization and probably also has a role in protein-protein interaction.
