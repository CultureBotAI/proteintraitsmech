identifier: PROSITE:PDOC50176
label: "Armadillo/plakoglobin ARM repeat"
definition: >-
  Armadillo/plakoglobin ARM repeat profile. The armadillo repeat is an approximately 40 amino acids long tandemly repeated sequence motif first identified in the Drosophila segment polarity gene product armadillo, a protein that mediates cell adhesion. Similar repeats were later found in the mammalian armadillo homolog beta-catenin, the junctional plaque protein plakoglobin, the adenomatous polyposis coli (APC) tumor suppressor protein, and a number of other proteins. These proteins exert several functions through interactions of their tandem armadillo repeats domain with diverse binding partners.
