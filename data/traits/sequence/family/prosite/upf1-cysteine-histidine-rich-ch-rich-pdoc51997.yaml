identifier: PROSITE:PDOC51997
label: "Upf1 cysteine-histidine-rich (CH-rich)"
definition: >-
  Upf1 cysteine-histidine-rich (CH-rich) domain profile. The up-frameshift protein 1 (Upf1 also known as Regulator of nonsense transcripts, Rent1) is an essential eukaryotic RNA helicase that plays a key role in various mRNA degradation pathways, notably nonsense-mediated mRNA decay (NMD). In combination with Upf2 and Upf3, it forms part of the surveillance complex that detects mRNAs containing premature stop codons and triggers their degradation in all organisms studied from yeast to human. In the complex, Upf1 exhibits ATPase activity that is essential for NMD. Upf2 and Upf3 are nonenzymatic components of the surveillance complex that stimulate the activity of Upf1.
