label: "cAMP phosphodiesterases class-II"
definition: >-
  cAMP phosphodiesterases class-II signature. Cyclic AMP phosphodiesterase (EC 3.1.4.17) (cAMP-PDEase) catalyzes the hydrolysis of cAMP to the corresponding nucleoside 5' monophosphate. While most PDEases can be, on the basis of sequence similarities, grouped together, there are at least two enzymes which do not belong to the main family of PDEases and which represent a second class of these enzymes:
