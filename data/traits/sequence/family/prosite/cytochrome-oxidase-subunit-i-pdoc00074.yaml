identifier: PROSITE:PDOC00074
label: "Cytochrome oxidase subunit I"
definition: >-
  Cytochrome c oxidase subunit I signature and profile. Cytochrome c oxidase (EC 1.9.3.1) is an oligomeric integral membrane protein complexes that catalyze the terminal step in the respiratory chain: they transfer electrons from cytochrome c or a quinol to oxygen. Some terminal oxidases generate a transmembrane proton gradient across the plasma membrane (prokaryotes) or the mitochondrial inner membrane (eukaryotes). The enzyme complex consists of 3-4 subunits (prokaryotes) up to 13 polypeptides (mammals) of which only the catalytic subunit (equivalent to mammalian subunit 1 (CO I)) is found in all heme-copper respiratory oxidases.
