identifier: PROSITE:PDOC00228
label: "Interleukin-7 and -9"
definition: >-
  Interleukin-7 and -9 signature. Interleukin-7 (IL-7) is a cytokine that serves as a growth factor for early lymphoid cells of both B- and T-cell lineages. Interleukin-9 (IL-9) is a cytokine that supports IL-2 independent and IL-4 independent growth of helper T-cells.
