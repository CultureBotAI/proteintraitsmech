identifier: PROSITE:PDOC00450
label: "Interleukin-10 family"
definition: >-
  Interleukin-10 family signature. Interleukin-10 (IL-10) is a protein that inhibits the synthesis of a number of cytokines, including IFN-gamma, IL-2, IL-3, TNF and GM-CSF produced by activated macrophages and by helper T cells.
