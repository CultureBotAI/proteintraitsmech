identifier: PROSITE:PDOC00241
label: "Cecropin family"
definition: >-
  Cecropin family signature. Cecropins are potent antibacterial proteins that constitute a main part of the cell-free immunity of insects. Cecropins are small proteins of about 35 amino acid residues active against both Gram-positive and Gram- negative bacteria. They seem to exert a lytic action on bacterial membranes.
