identifier: PROSITE:PDOC00152
label: "Tryptophan synthase beta chain pyridoxal-phosphate attachment site"
definition: >-
  Tryptophan synthase beta chain pyridoxal-phosphate attachment site. Tryptophan synthase (EC 4.2.1.20) catalyzes the last step in the biosynthesis of tryptophan: the conversion of indoleglycerol phosphate and serine, to tryptophan and glyceraldehyde 3-phosphate. It has two functional domains: one for the aldol cleavage of indoleglycerol phosphate to indole and glyceraldehyde 3-phosphate and the other for the synthesis of tryptophan from indole and serine. In bacteria and plants, each domain is found on a separate subunit (alpha and beta chains), while in fungi the two domains are fused together on a single multifunctional protein.
