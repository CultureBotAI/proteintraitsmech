identifier: PROSITE:PDOC51764
label: "Glycosyl hydrolases family 26 (GH26)"
definition: >-
  Glycosyl hydrolases family 26 (GH26) domain profile. Glycoside hydrolases (GHs) play a critical role in both eukaryotes and prokaryotes, where they fulfill numerous important functions such as substrate acquisition and the remote remodelling of cell walls and the glycan decorations of glycoproteins. GH family 26 consists mainly of endo-beta-1,4- mannanases (mannanases), although some members of this family display beta- 1,3-xylanase activity. The family 26 GHs are members of clan GH-A.
