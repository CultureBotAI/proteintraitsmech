identifier: PROSITE:PDOC00839
label: "Glycosyl hydrolases family 18 (GH18)"
definition: >-
  Glycosyl hydrolases family 18 (GH18) active site signature and domain profile. The glycosyl hydrolases family 18 (GH18) is widely distributed in all kingdoms, including viruses, bacteria, plants, fungi and animals. The GH18 family contains hydrolytic enzymes with chitinase or endo-N-acetyl-beta-D- glucosaminidase (ENGase) activity as well as chitinase like lectins (chi- lectins/proteins (CLPs). Chitinases (EC 3.2.1.14) are hydrolytic enzymes that cleave the beta-1,4-bond releasing oligomeric, dimeric (chitobiose) or monomeric (N-actetylglucosamine, GlcNAc) products.
