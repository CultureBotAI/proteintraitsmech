identifier: PROSITE:PDOC00745
label: Syndecans
definition: >-
  Syndecans signature. Syndecans (from the greek syndein; to bind together) are a family of transmembrane heparan sulfate proteoglycans which are implicated in the binding of extracellular matrix components and growth factors. Syndecans bind a variety of molecules via their heparan sulfate chains and can act as receptors or as co-receptors.
