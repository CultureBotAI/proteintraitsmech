identifier: PROSITE:PDOC00983
label: "Ribonuclease PH"
definition: >-
  Ribonuclease PH signature. Prokaryotic ribonuclease PH (EC 2.7.7.56) (RNase PH) is a phosphorolytic exoribonuclease that removes nucleotide residues following the -CCA terminus of tRNA and adds nucleotides to the ends of RNA molecules by using nucleoside diphosphates as substrates.
