identifier: PROSITE:PDOC50950
label: "Zinc finger THAP-type"
definition: >-
  Zinc finger THAP-type profile. The THAP-type zinc finger (consensus: C-x(2,4)-C-x(35,50)-C-x(2)-H) is an ~90-residue domain restricted to animals, which is shared between the THAP family of cellular DNA-binding proteins, and transposases from mobile genomic parasites. THAP1, the prototype of the THAP family, possesses zinc-dependent sequence-specific DNA binding activity and recognizes a consensus DNA target sequence of 11 nucleotides. The THAP-type zinc finger can be found in one or more copies and can be associated with other domains, such as the C2H2-type zinc finger (see <PDOC00028>).
