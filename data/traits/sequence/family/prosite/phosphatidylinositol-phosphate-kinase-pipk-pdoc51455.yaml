identifier: PROSITE:PDOC51455
label: "Phosphatidylinositol phosphate kinase (PIPK)"
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) domain profile. Phosphoinositides (PIs) are central to signal transduction and membrane trafficking in all eukaryotes. They are derived from phosphatidylinositol (PtdIns) as the result of phosphorylation of hydroxyl groups at positions 3, 4 or 5 of the PtdIns head group. Phosphatidylinositol phosphate kinases (PIPKs) phosphorylate phosphatidylinositol phosphate (PtdInsP) to phosphatidylinositol bisphosphate (PtdInsP2). Three types of PIPKs are present throughout the eukaryotic kingdoms. Type I (PtdIns4P 5-kinase) and type II (PtdIns5P 4- kinase) generate PtdIns(4,5)P2 from PtdIns4P and PtdIns5P, respectively.
