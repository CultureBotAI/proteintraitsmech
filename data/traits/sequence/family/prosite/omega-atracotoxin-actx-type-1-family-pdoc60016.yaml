identifier: PROSITE:PDOC60016
label: "Omega-atracotoxin (ACTX) type 1 family"
definition: >-
  Omega-atracotoxin (ACTX) families signatures. Omega-atracotoxins (ACTX) form a family of neurotoxins that block insect but not vertebrate voltage-gated calcium channels. Omega-ACTXs are environmentally benign, insect-specific toxins that represent excellent leads for the development of new pesticides. Omega-ACTXs comprise a disulfide-rich region that has a [C-C-CC-C-C] arrangement and possess a Knottin scaffold (see <PDOC60004>).
