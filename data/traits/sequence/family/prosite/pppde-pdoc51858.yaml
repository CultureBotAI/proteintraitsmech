identifier: PROSITE:PDOC51858
label: PPPDE
definition: >-
  PPPDE domain profile. Ubiquitin is a highly conserved 76-residue protein that is found in eukaryotes but not in bacteria and archaea. A wide variety of proteins are post- translationally modified by covalent attachment of a single or multiple molecule(s) of ubiquitin, a process called ubiquitination or ubiquitylation. Following the discovery of ubiquitin, a number of ubiquitin-like proteins have been found, including small ubiquitin-like modifiers (SUMOs), interferon- stimulated gene 15 (ISG15), neural precursor cell expressed, developmentally down regulated 8 (NEDD8), Autophygy 8 (Atg8), and Atg12.
