identifier: PROSITE:PDOC50984
label: TRUD
definition: >-
  TRUD domain profile. The most abundant modification seen in structured RNAs (transfer, ribosomal, and splicing RNAs) is the isomerization of uridine (U) to pseudouridine (5- ribosyluracil). Pseudouridine is made by a set of enzymes called pseudouridine synthase, which select specific U residues in a polynucleotide chain for isomerization to pseudouridine. Pseudouridine synthases are ubiquitous as putative synthase genes have been found in all genomes so far sequenced. TruD, a pseudouridine synthase in Escherichia coli, is responsible for modifying U 13 in tRNA-Glu to pseudouridine. Homologs of truD have been identified in eubacteria, archaea, and eukarya.
