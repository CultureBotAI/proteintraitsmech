identifier: PROSITE:PDOC01048
label: "2C-methyl-D-erythritol 2,4-cyclodiphosphate synthase"
definition: >-
  2C-methyl-D-erythritol 2,4-cyclodiphosphate synthase signature. The bacterial ispF protein catalyzes the fifth step of the deoxyxylulose- 5-phosphate pathway (DXP) of isoprenoid biosynthesis; the conversion of 4-diphosphocytidyl-2C-methyl-D-erythritol 2-phosphate into 2C-methyl-D- erythritol 2,4-cyclodiphosphate and CMP. It can also converts 4- diphosphocytidyl-2C-methyl-D-erythritol into 2C-methyl-D-erythritol 3,4- cyclophosphate and CMP.
