identifier: PROSITE:PDOC00017
label: "ATP/GTP-binding site motif A (P-loop)"
definition: >-
  ATP/GTP-binding site motif A (P-loop). From sequence comparisons and crystallographic data analysis it has been shown that an appreciable proportion of proteins that bind ATP or GTP share a number of more or less conserved sequence motifs. The best conserved of these motifs is a glycine-rich region, which typically forms a flexible loop between a beta-strand and an alpha-helix. This loop interacts with one of the phosphate groups of the nucleotide. This sequence motif is generally referred to as the 'A' consensus sequence or the 'P-loop'.
