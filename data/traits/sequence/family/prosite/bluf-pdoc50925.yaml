identifier: PROSITE:PDOC50925
label: BLUF
definition: >-
  BLUF domain profile. The BLUF (for 'sensors of blue-light using FAD') domain is an about 90-residue FAD-binding domain involved in sensory transduction in microorganisms. The BLUF domain is mainly found in two branches of Bacteria, Proteobacteria and Cyanobacteria, but also in the eukaryotic unicellular flagellate Euglena gracilis. BLUF domain proteins can be divided into 'complex', multidomain proteins and 'short' proteins composed of a BLUF domain plus 30-70 additional amino acids with no significant similarity to known protein motifs. In complex proteins the BLUF domain can be linked to the adenyl cyclase, GGDEF (see <PDOC50887>) or EAL (see <PDOC50883>) domains.
