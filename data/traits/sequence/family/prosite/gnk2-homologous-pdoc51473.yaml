identifier: PROSITE:PDOC51473
label: Gnk2-homologous
definition: >-
  Gnk2-homologous domain profile. Ginkbilobin-2 (Gnk2) is an antifungal protein found in the endosperm of Ginkgo seeds, which inhibits the growth of phytopathogenic fungi such as Fusarium oxysporum. Gnk2 has considerable homology (~85%) to embryo-abundant proteins (EAP) from the gymnosperms Picea abies and P. glauca. Plant EAP are expressed in the late stage of seed maturation and are involved in protection against environmental stresses such as drought. The sequence of Gnk2 is also 28-31% identical to the extracellular domain of cysteine-rich receptor-like kinases (CRK) from the angiosperm Arabidopsis.
