identifier: PROSITE:PDOC51504
label: "Linker histone H1/H5 globular (H15)"
definition: >-
  Linker histone H1/H5 globular (H15) domain profile. Histone proteins have central roles in both chromatin organization (as structural units of the nucleosome) and gene regulation (as dynamic components that have a direct impact on DNA transcription and replication). Eukaryotic DNA wraps around a histone octamer to form a nucleosome, the first order of compaction of eukaryotic chromatin. The core histone octamer is composed of a central H3-H4 tetramer and two flanking H2A-H2B dimers. Each of the core histone contains a common structural motif, called the histone fold, which facilitates the interactions between the individual core histones.
