identifier: PROSITE:PDOC01045
label: "Claudin family"
definition: >-
  Claudin family signature. The claudins are a family of integral membrane proteins that are major components of tight junction (TJ) strands. There are at least 17 members of this family in mammals. The claudins are proteins of about 200 to 230 residues that contains four conserved transmembrane domains.
