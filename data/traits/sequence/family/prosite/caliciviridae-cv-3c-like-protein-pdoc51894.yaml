identifier: PROSITE:PDOC51894
label: "Caliciviridae (CV) 3C-like protein"
definition: >-
  Caliciviridae (CV) 3C-like protease (3CLpro) domain profile. The Caliciviridae family of small positive-stranded RNA viruses includes viruses that infect a broad range of hosts, including humans and animals, and cause a variety of diseases and disorders, such as gastroenteritis, vesicular lesions, respiratory infections, reproductive failure, and hemorrhagic disease. This family contains five established genera, Lagovirus, Nebovirus, Norovirus, Sapovirus, and Vesivirus. The generation of mature Caliciviridae proteins requires that proteolytic clevages be effected at specific sites of the large polyprotein translated from the viral genomic RNA.
