identifier: PROSITE:PDOC01053
label: "Short hematopoietin receptor family"
definition: >-
  Short hematopoietin receptor family 1 signature. A number of receptors for lymphokines, hematopoietic growth factors and growth hormone-related molecules have been found to share a common binding domain. These receptors are designated as hematopoietin receptors and the corresponding ligands as hematopoietins. Further, hematopoietins have been subdivided into two major structural groups: Large/long and small/short hematopoietins.
