identifier: PROSITE:PDOC00523
label: "Fructose-bisphosphate aldolase class-II signature"
definition: >-
  Fructose-bisphosphate aldolase class-II signatures. Fructose-bisphosphate aldolase (EC 4.1.2.13) is a glycolytic enzyme that catalyzes the reversible aldol cleavage or condensation of fructose-1,6- bisphosphate into dihydroxyacetone-phosphate and glyceraldehyde 3-phosphate. There are two classes of fructose-bisphosphate aldolases with different catalytic mechanisms. Class-II aldolases, mainly found in prokaryotes and fungi, are homodimeric enzymes which require a divalent metal ion - generally zinc - for their activity.
