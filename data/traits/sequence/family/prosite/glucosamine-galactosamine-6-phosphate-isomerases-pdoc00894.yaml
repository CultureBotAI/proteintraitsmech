identifier: PROSITE:PDOC00894
label: "Glucosamine/galactosamine-6-phosphate isomerases"
definition: >-
  Glucosamine/galactosamine-6-phosphate isomerases signature. Glucosamine-6-phosphate isomerase (EC 3.5.99.6) (or Glc-6-P deaminase) is the enzyme responsible for the conversion of glucosamine 6-phosphate into fructose 6 phosphate. It is the last specific step in the pathway for N- acetylglucosamine (GlcNAC) utilization in bacteria such as Escherichia coli (gene nagB) or in fungi such as Candida albicans (gene NAG1).
