label: "Endogenous opioids neuropeptides precursors"
definition: >-
  Endogenous opioids neuropeptides precursors signature. Vertebrate endogenous opioids neuropeptides are released by post-translational proteolytic processing of precursor proteins. These precursor proteins consist of a signal sequence followed by a conserved region of about 50 residues, a variable length region and the sequence of the various neuropeptides. Three types of precursors are currently known:
