identifier: PROSITE:PDOC00182
label: Transferrin-like
definition: >-
  Transferrin-like domain signatures and profile. The transferrin family is a group of glycosylated proteins found in both vertebrates and invertebrates. Included in this group are molecules known to bind iron, including serotransferrin, ovotransferrin, lactotransferrin, and melanotransferrin (MTF). Additional members of this family include inhibitor of carbonic anhydrase (ICA; mammals), major yolk protein (sea urchins), saxiphilin (frog), pacifastin (crayfish), and TTF-1 (algae). Most family members contain two transferrin-like domains of around 340 amino acids, the result of an ancient duplication event.
