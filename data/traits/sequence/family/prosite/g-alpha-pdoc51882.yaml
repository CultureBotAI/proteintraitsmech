identifier: PROSITE:PDOC51882
label: G-alpha
definition: >-
  G-alpha domain profile. Signaling via heterotrimeric G proteins, composed of alpha, beta, and gamma subunits, is highly conserved in eukaryotes. Classically, G protein-mediated signaling is initiated by ligand binding to a cell surface G protein-coupled receptor, which has seven transmembrane domains. Ligand binding activates receptor-mediated GDP/GTP exchange on the alpha subunit. Resultant GTP binding causes the dissociation of G-alpha from the G-beta/gamma dimer, and the activated G-alpha and G-beta/gamma interact with downstream target proteins, leading to numerous cellular responses.
