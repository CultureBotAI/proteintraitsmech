identifier: PROSITE:PDOC51049
label: KASH
definition: >-
  KASH domain profile. The KASH (for Klarsicht/ANC-1/Syne-1 homology) or KLS domain is a highly hydrophobic nuclear envelope localization domain of ~60 amino acids comprising an ~20-amino-acid transmembrane region and a 30-35-residue C-terminal region that lies between the inner and the outer nuclear membranes. The KASH domain is found in association with other domains, such as spectrin repeats and CH (see <PDOC50021>), at the C-terminus of proteins tethered to the nuclear membrane in diverse cell types.
