definition: >-
  LDL-receptor class A (LDLRA) domain signature and profile. Low-density lipoprotein (LDL) receptors are the major cholesterol-carrying lipoproteins of plasma. Seven successive cysteine-rich repeats of about 40 amino acids are present in the N-terminal of this multidomain membrane protein. Similar domains have been found (see references in) in other extracellular and membrane proteins which are listed below:
