identifier: PROSITE:PDOC52071
label: "GPN-loop GTPase core"
definition: >-
  GPN-loop GTPase core domain profile. GTPases are a large family of GTP-binding and -hydrolyzing enzymes that are widely distributed across all three domains of life. They contain a highly conserved GTPase domain (G domain) housing five fingerprint motifs responsible for coordination of GTP and catalysis: G1 (also P-loop or Walker A motif) interacts with the 5' phosphate moieties of GTP, the G2 and G3 motifs are required for coordination of a magnesium ion essential for catalysis, the latter of which specifically accommodates the5' gamma-phosphate of GTP, and G4 and G5 establish specific binding of the nucleotides' guanine base.
