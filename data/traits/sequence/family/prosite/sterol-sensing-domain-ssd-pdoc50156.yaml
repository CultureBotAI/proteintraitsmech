identifier: PROSITE:PDOC50156
label: "Sterol-sensing domain (SSD)"
definition: >-
  Sterol-sensing domain (SSD) profile. The sterol-sensing domain (SSD) is an around 180 residues long cluster of five membrane-spanning segments. The SSD domain is conserved across phyla and confers sensitivity to regulation by sterol. Although the SSD domain appears to function as a regulatory domain involved in linking vesicle trafficking and protein localization with such varied processes as cholesterol homeostasis, cell signalling and cytokinesis, its exact mode of action is not clear. It is not known whether it interacts with sterols, such as cholesterol, or whether it interacts with another-sterol regulated protein. Alternatively, the SSD may interact with lipids other than cholesterol.
