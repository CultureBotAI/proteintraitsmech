  ASD1 and ASD2 domains profiles. The Shroom (Shrm) protein family is found only in animals. Proteins of this family are predicted to be utilized in multiple morphogenic and developmental processes across animal phyla to regulate cells shape or intracellular architecture in an actin and myosin-dependent manner. While the founding member of the Shrm family is Shrm1 (formerly Apx), it appears that this protein is found only in Xenopus. In mice and humans, the Shrm family of proteins consists of:
