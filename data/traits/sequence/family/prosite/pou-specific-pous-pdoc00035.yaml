identifier: PROSITE:PDOC00035
label: "POU-specific (POUs)"
definition: >-
  POU-specific (POUs) domain signatures and profile and POUs atypical domain profile. The POU (pronounced 'pow') domain [1 to 7 ] is a highly charged 155-162-amino acid region of sequence similarity which has been identified in the three mammalian transcription factors Pit-1, Oct-1, and Oct-2 and in the product of the nematode gene unc-86. The POU domain is a bipartite DNA binding protein module that binds selectively to the DNA octamer motif ATGCAAAT and a subset of derivatives. It consists of two subdomains, a C-terminal homeodomain (POUh) (see <PDOC00027>) and an N-terminal 75- to 82-residue POU-specific (POUs) region separated by a short non-conserved linker.
