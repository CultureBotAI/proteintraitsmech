identifier: PROSITE:PDOC00363
label: "Alanyl-transfer RNA synthetases family"
definition: >-
  Aminoacyl-transfer RNA synthetases class-II profiles. Aminoacyl-tRNA synthetases (EC 6.1.1.-) are a group of enzymes which activate amino acids and transfer them to specific tRNA molecules as the first step in protein biosynthesis. In prokaryotic organisms there are at least twenty different types of aminoacyl-tRNA synthetases, one for each different amino acid. In eukaryotes there are generally two aminoacyl-tRNA synthetases for each different amino acid: one cytosolic form and a mitochondrial form. While all these enzymes have a common function, they are widely diverse in terms of subunit size and of quaternary structure.
