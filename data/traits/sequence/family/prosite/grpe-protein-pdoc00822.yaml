identifier: PROSITE:PDOC00822
label: "grpE protein"
definition: >-
  grpE protein signature. In prokaryotes the grpE protein stimulates, jointly with dnaJ, the ATPase activity of the dnaK chaperone. It seems to accelerate the release of ADP from dnaK thus allowing dnaK to recycle more efficiently. GrpE is a protein of about 22 to 25 Kd. In yeast, an evolutionary related mitochondrial protein (gene GRPE) has been shown to associate with the mitochondrial hsp70 protein and to thus play a role in the import of proteins from the cytoplasm.
