identifier: PROSITE:PDOC52034
label: "Peptidase family M32"
definition: >-
  Peptidase family M32 domain profile. Carboxypeptidases (CPs) are a group of hydrolases that perform many diverse physiological functions by removing C-terminal amino acids from proteins and peptides. According to the chemical nature of their catalytic site, these hydrolases can be divided into three major classes, namely serine carboxypeptidases, cysteine carboxypeptidases, and metallocarboxypeptidases (MCPs), with the latter group usually employing zinc as a catalytic cofactor. Among MCPs, the M32 or Thermus aquaticus carboxypeptidase (TaqCP) family consists of a large number of enzymes with broad specificity.
