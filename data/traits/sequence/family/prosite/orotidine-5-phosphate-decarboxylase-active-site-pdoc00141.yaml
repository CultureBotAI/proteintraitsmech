identifier: PROSITE:PDOC00141
label: "Orotidine 5'-phosphate decarboxylase active site"
definition: >-
  Orotidine 5'-phosphate decarboxylase active site. Orotidine 5'-phosphate decarboxylase (EC 4.1.1.23) (OMPdecase) catalyzes the last step in the de novo biosynthesis of pyrimidines, the decarboxylation of OMP into UMP. In higher eukaryotes OMPdecase is part, with orotate phosphoribosyltransferase, of a bifunctional enzyme, while the prokaryotic and fungal OMPdecases are monofunctional protein.
