identifier: PROSITE:PDOC00678
label: "Renal dipeptidase family"
definition: >-
  Renal dipeptidase family signature and profile. Renal dipeptidase (rDP) (EC 3.4.13.19), also known as microsomal dipeptidase or membrane dipeptidase, is a zinc-dependent metalloenzyme which hydrolyzes a wide range of dipeptides. It is involved in renal metabolism of glutathione and its conjugates. It is a homodimeric disulfide-linked glycoprotein attached to the renal brush border microvilli membrane by a GPI-anchor.
