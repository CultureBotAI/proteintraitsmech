identifier: PROSITE:PDOC50985
label: "GRAS family"
definition: >-
  GRAS domain profile. GRAS proteins are a family of plant-specific transcriptional regulators named after GAI, RGA and SCR, the first three of its members isolated. Their functions are related to diverse processes involved in plant growth and development. These include gibberellic acid signaling , shoot meristem maintenance, root radial patterning, light signal transduction, male gametogenesis, axillary meristem formation, and nodule morphogenesis. GRAS proteins form homodimers and heterodimers with other GRAS family members and this is likely important for their transcriptional regulation function.
