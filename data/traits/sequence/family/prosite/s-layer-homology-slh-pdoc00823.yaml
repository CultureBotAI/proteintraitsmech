identifier: PROSITE:PDOC00823
label: "S-layer homology (SLH)"
definition: >-
  S-layer homology (SLH) domain profile. S-layers are paracrystalline mono-layered assemblies of (glyco)proteins which coat the surface of bacteria. Several S-layer proteins and some other cell wall proteins contain one or more copies of a domain of about 50-60 residues, which has been called SLH (for S-layer homology). Although it was originally proposed that SLH domains bind to peptidoglycan, it is now evident that pyruvylated secondary cell wall polymers (SCWPs), which are either teichoic acids, teichuronic acids, lipoteichoic acids or lipoglycans, serve as the anchoring structures for SLH motifs in the Gram-positive cell wall.
