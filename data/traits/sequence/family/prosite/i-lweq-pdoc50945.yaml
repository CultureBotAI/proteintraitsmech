identifier: PROSITE:PDOC50945
label: I/LWEQ
definition: >-
  I/LWEQ domain profile. The I/LWEQ domain is a ~250-residue actin-binding module that is found in the C-termini of functionally diverse proteins from yeast to mammals. The I/LWEQ domain contains four conserved blocks and has been named after the conserved initial residues of blocks 1-4. The I/LWEQ domain is generally found near the C-terminus and in association with other domains, such as FERM (see <PDOC00566>) or ENTH (see <PDOC50942>). The I/LWEQ domain has been shown to bind to F-actin and to bundle actin filaments [1-3].
