label: Thyroglobulin
definition: >-
  Thyroglobulin type-1 domain signature and profile. Thyroglobulin (Tg) is a large glycoprotein specific to the thyroid gland and it is the precursor of the iodinated thyroid hormones thyroxine (T4) and triiodothyronine (T3). The N-terminal section of Tg contains 11 repeats of a domain of about 70 amino acids which is known as the Tg type-1 repeat [1-3]. Such a domain has also been found (as a single or repeated sequence) in the proteins listed below:
