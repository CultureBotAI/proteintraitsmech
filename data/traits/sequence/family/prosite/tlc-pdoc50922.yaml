definition: >-
  TLC domain profile. The TLC (TRAM-LAG1-CLN8) domain is an about 200-residue domain found in a family of membrane-associated proteins related to yeast LAG1 and mammalian TRAM. It is predicted to contain five transmembrane alpha helices. Although the role of the TLC domain is not known, four possible function have been suggested:
