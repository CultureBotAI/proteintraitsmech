identifier: PROSITE:PDOC51913
label: "HARE-type HTH"
definition: >-
  HARE-type HTH domain profile. Human ASXL proteins, orthologs of Drosophila Additional Sex combs, have been implicated in conjunction with TET2 as a major target for mutations and translocations leading to a wide range of myeloid leukemias, related myelodysplastic conditions (ASXL1 and ASXL2) and the Bohring-Opitz syndrome, a developmental disorder (ASXL1).
