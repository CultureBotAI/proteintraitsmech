identifier: PROSITE:PDOC00287
label: "Histone H3 signature"
definition: >-
  Histone H3 signatures. Histone H3 is one of the four histones, along with H2A, H2B and H4, which forms the eukaryotic nucleosome core. It is a highly conserved protein of 135 amino acid residues.
