identifier: PROSITE:PDOC00064
label: "Hydroxymethylglutaryl-coenzyme A reductases family"
definition: >-
  Hydroxymethylglutaryl-coenzyme A reductase signatures and profile. Hydroxymethylglutaryl-coenzyme A reductase (EC 1.1.1.34) (HMG-CoA reductase) catalyzes the NADP-dependent synthesis of mevalonate from 3-hydroxy-3- methylglutaryl-CoA. In vertebrates, HMG-CoA reductase is the rate-limiting enzyme in cholesterol biosynthesis. In plants, mevalonate is the precursor of all isoprenoid compounds.
