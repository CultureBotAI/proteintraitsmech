identifier: PROSITE:PDOC00597
label: "Germin family"
definition: >-
  Germin family signature. Germins and germin-like proteins are a family of hexameric ubiquitous plant glycoproteins. They are not restricted to germinating grains as initially sought and thereof called 'germins', but they exist in all organs and developmental stages. All are at least partly associated with the extracellular matrix.
