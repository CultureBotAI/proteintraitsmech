identifier: PROSITE:PDOC00740
label: "NAD-dependent glycerol-3-phosphate dehydrogenase"
definition: >-
  NAD-dependent glycerol-3-phosphate dehydrogenase signature. NAD-dependent glycerol-3-phosphate dehydrogenase (EC 1.1.1.8) (GPD) catalyzes the reversible reduction of dihydroxyacetone phosphate to glycerol-3- phosphate. It is a eukaryotic cytosolic homodimeric protein of about 40 Kd. As a signature pattern we selected a glycine-rich region that is probably involved in NAD-binding.
