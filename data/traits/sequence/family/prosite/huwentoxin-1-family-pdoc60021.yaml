label: "Huwentoxin-1 family"
definition: >-
  Huwentoxin-1 family signature. The spider venoms often contain many active peptides such as neurotoxins, lectins, inhibitors to enzyme, etc. These peptides are very important for spider's hunting and defending. During the long history of spider evolution, the peptides evolved into different structures and functions. Despite their different biological functions the following peptides appear to have evolved from the same ancestors and belong to the huwentoxin-1 family:
