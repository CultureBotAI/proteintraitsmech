identifier: PROSITE:PDOC51535
label: "Pestivirus NS3 protease (NS3pro)"
definition: >-
  Pestivirus NS3 protease (NS3pro) domain profile. The genome of pestiviruses is a single plus-strand RNA and contains a single large open reading frame (ORF), a 5' untranslated region (5'UTR) and a 3' untranslated region (3'UTR). The ORF encodes a polyprotein, which is processed by viral and cellular proteases into mature proteins (the structural proteins in the N-terminal portion of the polyprotein whilst the replicative (non-structural or NS) proteins constitute the remainder). The pestivirus NS3 protein is a multifunctional protein possessing serine protease, RNA helicase (see <PDOC51192>), and a nucleoside triphosphatase (NTPase) activities located in two functionally distinct domains.
