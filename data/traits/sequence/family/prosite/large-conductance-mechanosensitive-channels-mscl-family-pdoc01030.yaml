identifier: PROSITE:PDOC01030
label: "Large-conductance mechanosensitive channels mscL family"
definition: >-
  Large-conductance mechanosensitive channels mscL family signature. Mechanosensitive ion channels play a critical role in transducing physical stresses at the cell membrane into an electrochemical response. Prokaryotes harbor a large-conductance mechanosensitive channel (gene mscL) which is opened by membrane stretch force and may participate in the regulation of osmotic pressure changes within the cell.
