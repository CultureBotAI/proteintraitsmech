identifier: PROSITE:PDOC00283
label: "Bacterial ice-nucleation proteins octamer repeat"
definition: >-
  Bacterial ice-nucleation proteins octamer repeat. Some Gram-negative bacteria express proteins that enable them to promote the nucleation of ice at relatively high temperature (above -5 degree Celsius). These proteins are localized at the surface of the outer membrane of the bacteria and can cause frost injury to many plant species. The primary structure of these ice-nucleation proteins is highly repetitive. A central repetitive domain represents about 80% of the total sequence. This domain is mainly formed by the repetition of a conserved region of forty eight residues (48-mer). The 48-mers are themselves composed of three blocks of 16 residues (16-mer).
