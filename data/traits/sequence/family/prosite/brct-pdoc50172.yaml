identifier: PROSITE:PDOC50172
label: BRCT
definition: >-
  BRCT domain profile. The breast cancer susceptibility gene contains at its C-terminus two copies of a conserved domain that was named BRCT for BRCA1 C-terminus. This domain of about 95 amino acids exists in a large number of proteins from prokaryotes to eukaryotes. BRCT domain-containing proteins are involved in multiple cellular responses, including cell cycle checkpoint control, DNA repair, and transcription regulation. The BRCT domain is not limited to the C- termini of protein sequences and can be found in multiple copies or in a single copy as in RAP1 and TdT.
