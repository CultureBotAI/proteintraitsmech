identifier: PROSITE:PDOC00037
label: Myb-like
definition: >-
  Myb-type HTH DNA-binding domain profiles. The myb family can be classified into three groups: the myb-type HTH domain, which binds DNA, the SANT domain, which is a protein-protein interaction module (see <PDOC51293>) and the myb-like domain that can be involved in either of these functions.
