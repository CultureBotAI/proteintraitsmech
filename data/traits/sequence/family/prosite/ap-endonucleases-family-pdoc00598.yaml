identifier: PROSITE:PDOC00598
label: "AP endonucleases family"
definition: >-
  AP endonucleases family 1 signatures and profile. Cellular DNA is spontaneously and continuously damaged by environmental and internal factors such as X-rays, UV light and agents such as the antitumor drugs bleomycin and neocarzinostatin or those that generate oxygen radicals. Apurinic/apyrimidinic (AP) sites form both spontaneously and as highly cytotoxic intermediates in the removal of the damaged base by the base excision repair (BER) pathway. DNA repair at the AP sites is initiated by specific endonuclease cleavage of the phosphodiester backbone. Such endonucleases are also generally capable of removing blocking groups from the 3'terminus of DNA strand breaks.
