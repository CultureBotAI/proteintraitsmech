identifier: PROSITE:PDOC00267
label: Arrestins
definition: >-
  Arrestins signature. Arrestin (or S-antigen) is a protein that interacts with light-activated phosphorylated rhodopsin thereby inhibiting or 'arresting' its ability to interact with transducin. In mammals, arrestin is associated with autoimmune uveitis.
