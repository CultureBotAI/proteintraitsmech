identifier: PROSITE:PDOC00651
label: "Prokaryotic transcription elongation factors signature"
definition: >-
  Prokaryotic transcription elongation factors signatures. Bacterial proteins greA and greB are necessary for efficient RNA polymerase transcription elongation past template-encoded arresting sites. Arresting sites in DNA have the property of trapping a certain fraction of elongating RNA polymerases that pass through, resulting in locked DNA/RNA/ polymerase ternary complexes. Cleavage of the nascent transcript by cleavage factors, such as greA or greB, allows the resumption of elongation from the new 3'terminus. GreA induces cleavage 2 or 3 nucleotides behind the terminus while greB releases longer sequences up to 9 nucleotides in length.
