identifier: PROSITE:PDOC00536
label: "Indole-3-glycerol phosphate synthase"
definition: >-
  Indole-3-glycerol phosphate synthase signature. Indole-3-glycerol phosphate synthase (EC 4.1.1.48) (IGPS) catalyzes the fourth step in the biosynthesis of tryptophan: the ring closure of 1-(2-carboxy- phenylamino)-1-deoxyribulose into indol-3-glycerol-phosphate.
