identifier: PROSITE:PDOC51818
label: Homeo-Prospero
definition: >-
  Homeo-Prospero (HPD) domain profile. The prospero-related homeoproteins Prox1 and Prox2 are the vertebrate homologs of the Drosophila melanogaster homeodomain-containing protein Prospero, the founder member of a family of transcription factors which have been shown to play critical roles in many developmental events. The only common feature of this family of proteins is the 160-residue C-terminal Homeo- Prospero domain (HPD), which consists of a highly divergent homeodomain (HD) and an associated Prospero domain (PD) that are essential for sequence- specific DNA binding and the transcriptional activation function of Prospero.
