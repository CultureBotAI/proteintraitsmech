identifier: PROSITE:PDOC51822
label: "Hepacivirus/Pegivirus NS3 protease"
definition: >-
  Hepacivirus/Pegivirus NS3 protease domain profile. Hepaciviruses and pegiviruses are two genera of the viral family Flaviviridae. Both the Hepacivirus and Pegivirus genera contain species that infect humans. Hepatitis C is a disease caused by the hepatitis C virus (HCV), a hepacivirus that is one of the most important causes of severe chronic liver disease. Human pegivirus (HPgV) is the most closely related human virus to HCV. HPgV is a lymphotropic virus but unlike HCV it has little, if any, associated pathogenicity in humans. The genome structures of hepaciviruses and pegiviruses are conserved and share many similarities.
