identifier: PROSITE:PDOC00488
label: "Argininosuccinate synthase signature"
definition: >-
  Argininosuccinate synthase signatures. Argininosuccinate synthase (EC 6.3.4.5) (AS) is a urea cycle enzyme that catalyzes the penultimate step in arginine biosynthesis: the ATP-dependent ligation of citrulline to aspartate to form argininosuccinate, AMP and pyrophosphate.
