identifier: PROSITE:PDOC00416
label: "Clostridium cellulosome enzymes repeated domain"
definition: >-
  Clostridium cellulosome enzymes repeated domain signature. Gram-positive, thermophilic anaerobes such as Clostridium thermocellum or Clostridium cellulolyticum secretes a highly active and thermostable cellulase complex (cellulosome) responsible for the degradation of crystalline cellulose. The cellulosome contains at least 30 polypeptides, the majority of the enzymes are endoglucanases (EC 3.2.1.4), but there are also some xylanases (EC 3.2.1.8), beta-glucosidases (EC 3.2.1.21) and endo-beta-1,3-1,4-glucanases (EC 3.2.1.73).
