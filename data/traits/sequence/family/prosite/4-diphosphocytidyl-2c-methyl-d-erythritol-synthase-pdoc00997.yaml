identifier: PROSITE:PDOC00997
label: "4-diphosphocytidyl-2C-methyl-D-erythritol synthase"
definition: >-
  4-diphosphocytidyl-2C-methyl-D-erythritol synthase signature. The bacterial ispD protein catalyzes the third step of the deoxyxylulose- 5-phosphate pathway (DXP) of isoprenoid biosynthesis; the formation of 4- diphosphocytidyl-2C-methyl-D-erythritol from CTP and 2C-methyl-D-erythritol 4-phosphate.
