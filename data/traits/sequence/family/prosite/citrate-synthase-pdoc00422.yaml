identifier: PROSITE:PDOC00422
label: "Citrate synthase"
definition: >-
  Citrate synthase signature. Citrate synthase (EC 2.3.3.1) (CS) is the tricarboxylic acid cycle enzyme that catalyzes the synthesis of citrate from oxaloacetate and acetyl-CoA in an aldol condensation. CS can directly form a carbon-carbon bond in the absence of metal ion cofactors.
