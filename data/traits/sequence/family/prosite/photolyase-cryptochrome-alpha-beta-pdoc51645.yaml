identifier: PROSITE:PDOC51645
label: "Photolyase/cryptochrome alpha/beta"
definition: >-
  Photolyase/cryptochrome alpha/beta domain profile. The photolyase/cryptochrome family consists of flavoproteins that perform various functions using blue-light photons as an energie source. It is present in all three domains of life, that is, archaea, eubacteria, and eukaryotes, and hence has arisen very early during evolution to protect genomes against the genotoxic effects of ultraviolet light originating from the sun. The photolyase/cryptochrome family is divided into two major groups: photolyases and cryptochromes.
