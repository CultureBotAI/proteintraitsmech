identifier: PROSITE:PDOC51810
label: "Zinc finger CCHC FOG-type"
definition: >-
  Zinc finger CCHC FOG-type profile. Zinc fingers (ZnFs) are among the most common of all protein domains. They have traditionally been regarded as sequence-specific DNA-binding motifs. However it has also become apparent that many ZnFs mediate specific protein- protein interactions. Transcriptional cofactors of the Friend of GATA (FOG) family are diverse in sequence but their individual ZnF regions share considerable homology. They contain either eight or nine ZnFs that are related to the classical CCHH ZnFs (which have a conserved C-X(2,5)-C-X(12)-H-X(2,5)-H sequence).
