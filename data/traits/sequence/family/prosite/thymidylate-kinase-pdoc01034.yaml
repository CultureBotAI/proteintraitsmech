identifier: PROSITE:PDOC01034
label: "Thymidylate kinase"
definition: >-
  Thymidylate kinase signature. Thymidylate kinase (EC 2.7.4.9) (dTMP kinase) catalyzes the phosphorylation of thymidine 5'-monophosphate (dTMP) to thymidine 5'-diphosphate (dTDP) in the presence of ATP and magnesium. This enzyme is important in the pathway of synthesis of dTTP from dTMP. Thymidylate kinase is an ubiquitous enzyme of about 25 Kd.
