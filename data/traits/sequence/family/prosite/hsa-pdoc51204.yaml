identifier: PROSITE:PDOC51204
label: HSA
definition: >-
  HSA domain profile. The helicase/SANT-associated (HSA) domain is a predicted DNA-binding domain of ~75 amino acids, which is found in the eukaryotic SRCAP/p400/DOM and SNF2/brahma families. While each family has the core sequences that define the HSA domain, they each also have additional sequences that distinguish these families from one another. For example, the sequence HWDY(L/C)EEEM(Q/V) is found in the SRCAP/p400/DOM family, whereas the sequence HQE(Y/F)LNSILQ is found in the SNF2 /brahma family. In addition to the SANT and helicase (see <PDOC51192>) domains, the HSA domain is also found in association with bromo (see <PDOC00550>).
