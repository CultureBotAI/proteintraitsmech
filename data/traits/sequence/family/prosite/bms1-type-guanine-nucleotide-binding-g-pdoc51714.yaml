identifier: PROSITE:PDOC51714
label: "Bms1-type guanine nucleotide-binding (G)"
definition: >-
  Bms1-type guanine nucleotide-binding (G) domain profile. The P-loop (see <PDOC00017>) guanosine triphosphatases (GTPases) control a multitude of biological processes, ranging from cell division, cell cycling, and signal transduction, to ribosome assembly and protein synthesis. GTPases exert their control by interchanging between an inactive GDP-bound state and an active GTP-bound state, thereby acting as molecular switches. The common denominator of GTPases is the highly conserved guanine nucleotide-binding (G) domain that is responsible for binding and hydrolysis of guanine nucleotides.
