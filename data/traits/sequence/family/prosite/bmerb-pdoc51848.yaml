identifier: PROSITE:PDOC51848
label: bMERB
definition: >-
  bMERB domain profile. A variety of different effector proteins interact specifically with GTP-bound Rab proteins and mediate their versatile roles in membrane trafficking, including budding of vesicles from a donor membrane, directed transport through the cell and finally tethering and fusion with a target membrane. The "bivalent Mical/EHBP Rab binding" (bMERB) domain is a Rab effector domain that is present in proteins of the Mical and EHBP families, both known to act in endosomal trafficking.
