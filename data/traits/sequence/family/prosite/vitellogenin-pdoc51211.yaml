identifier: PROSITE:PDOC51211
label: Vitellogenin
definition: >-
  Vitellogenin domain profile. The vitellogenin (VTG) protein, a major lipoprotein in many oviparous animals, is a precursor of a lipid-binding product named as lipovitellin. Lipovitellin is the major lipid-protein complex found in the yolk of egg-laying animals, and is involved in lipid and metal storage. At the N-terminal, it contains a sequence of about 670 amino acids (LV1n chain), which is also conserved in other large lipoproteins, such as microsomal triglyceride transfer protein (MTP) and apolipoprotein B-100 (apoB).
