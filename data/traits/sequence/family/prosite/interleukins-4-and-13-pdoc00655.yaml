identifier: PROSITE:PDOC00655
label: "Interleukins -4 and -13"
definition: >-
  Interleukins -4 and -13 signature. Interleukin-4 (IL-4) is a cytokine that plays a central role in the control and regulation of the immune and inflammatory system. IL-4 is a participant in several B-cell activation processes. It also stimulates other cell types such as T cells or mast cells. IL-4 is a glycoprotein of 110 to 131 residues. It contains three disulfide bonds. The position of these disulfide bonds is not highly conserved since the topology of two of them differs in Human and mouse IL-4.
