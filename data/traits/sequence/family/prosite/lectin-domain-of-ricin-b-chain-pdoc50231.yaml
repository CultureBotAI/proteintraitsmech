identifier: PROSITE:PDOC50231
label: "Lectin domain of ricin B chain"
definition: >-
  Lectin domain of ricin B chain profile. Primary structure analysis has shown the presence of a similar domain in many carbohydrate-recognition proteins like plant and bacterial AB-toxins, glycosidases or proteases. This domain, known as the ricin B lectin domain, can be present in one or more copies and has been shown in some instance to bind simple sugars, such as galactose or lactose.
