identifier: PROSITE:PDOC50980
label: "Acetyl-coenzyme A (CoA) carboxyltransferase C-terminal"
definition: >-
  Acetyl-coenzyme A carboxyltransferase domain profiles. Acetyl-coenzyme A carboxylase (EC 6.4.1.2) (ACC), a member of the biotin-dependent enzyme family, catalyses the formation of malonyl-coenzyme A (CoA) and regulates fatty acid biosynthesis and oxidation. Biotin-dependent carboxylase enzymes perform a two step reaction: enzyme-bound biotin is first carboxylated by bicarbonate and ATP and the carboxyl group temporarily bound to biotin is subsequently transferred to an acceptor substrate such as acetyl-CoA. The carboxyltransferase domain perform the second part of the reaction.
