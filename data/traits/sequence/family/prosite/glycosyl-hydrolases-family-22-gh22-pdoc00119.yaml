identifier: PROSITE:PDOC00119
label: "Glycosyl hydrolases family 22 (GH22)"
definition: >-
  Glycosyl hydrolases family 22 (GH22) domain signature and profile. Alpha-lactalbumin, a milk protein, is the regulatory subunit of lactose synthase. In the mammary gland, alpha-lactalbumin changes the substrate specificity of galactosyltransferase from N-acetylglucosamine to glucose.
