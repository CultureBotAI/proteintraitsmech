identifier: PROSITE:PDOC50819
label: "Intein DOD-type homing endonuclease"
definition: >-
  Intein DOD-type homing endonuclease domain profile. Inteins (for INternal proTEINs) are in frame intervening sequences that disrupt the coding region of a host gene. They are post-translationally excised from a protein precursor by a self-catalytic protein splicing process. Most inteins are bifunctional proteins mediating both protein splicing and DNA cleavage. The domain involved in splicing is formed by the two terminal splicing regions (see <PDOC00687>), which are separated by a small linker in mini-inteins or a 200- to 250-amino-acid homing endonuclease in larger inteins. Homing endonucleases are rare-cutting enzymes encoded by inteins and introns.
