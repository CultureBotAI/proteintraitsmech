identifier: PROSITE:PDOC51880
label: TGS
definition: >-
  TGS domain profile. The TGS domain, named after the presence in ThrRS, GTPase, and SpoT, is a small domain that consists of ~50 amino acid residues and has nucleic acid binding affinity. It is shared by eukaryotic and some of the bacterial ThrRS, a distinct family of GTPases (the OBG family), and guanosine polyphosphate hydrolase (SpoT) and synthetase (RelA), which are involved in stringent response in bacteria, and uridine kinase from the spirochaete Treponema pallidum (but not any other organisnm, including the related spirochaete Borrelia burgdorferi).
