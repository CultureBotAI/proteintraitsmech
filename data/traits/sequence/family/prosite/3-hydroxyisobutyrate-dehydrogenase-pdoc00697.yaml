label: "3-hydroxyisobutyrate dehydrogenase"
definition: >-
  3-hydroxyisobutyrate dehydrogenase signature. 3-hydroxyisobutyrate dehydrogenase (EC 1.1.1.31) catalyzes the NAD-dependent, reversible oxidation of 3-hydroxbutyrate to methylmalonate. In eukaryotes, it is a homodimeric mitochondrial protein involved in valine catabolism. In Pseudomonas aeruginosa (gene mmsB), it is involved in the distal valine metabolic pathway.
