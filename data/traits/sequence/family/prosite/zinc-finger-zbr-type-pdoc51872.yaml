identifier: PROSITE:PDOC51872
label: "Zinc finger ZBR-type"
definition: >-
  Zinc finger ZBR-type profile. The post-translational modification of proteins by the covalent attachment of ubiquitin (ubiquitylation) regulates various cellular processes of eukaryotes. The ubiquitylation reaction is catalyzed by a set of three enzymes: ubiquitin- activating enzyme, E1; ubiquitin-conjugating enzyme, E2; and ubiquitin ligase, E3. The anaphase-promoting complex or cyclosome (APC/C) is a multisubunit E3 ligase enzyme that regulates cell division by promoting timely ubiquitin- mediated proteolysis of key cell-cycle regulatory proteins.
