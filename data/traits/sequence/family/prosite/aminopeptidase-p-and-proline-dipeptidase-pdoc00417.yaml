identifier: PROSITE:PDOC00417
label: "Aminopeptidase P and proline dipeptidase"
definition: >-
  Aminopeptidase P and proline dipeptidase signature. Aminopeptidase P (EC 3.4.11.9) is the enzyme responsible for the release of any N-terminal amino acid adjacent to a proline residue. Proline dipeptidase (EC 3.4.13.9) (prolidase) splits dipeptides with a prolyl residue in the carboxyl terminal position.
