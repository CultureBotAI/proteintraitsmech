identifier: PROSITE:PDOC50236
label: "Clathrin heavy-chain (CHCR) repeat"
definition: >-
  Clathrin heavy-chain (CHCR) repeat profile. Clathrin is a triskelion-shaped cytoplasmic protein that polymerizes into a polyhedral lattice on intracellular membranes to form protein-coated membrane vesicles. Lattice formation induces the sorting of membrane proteins during endocytosis and organelle biogenesis by interacting with membrane-associated adaptor molecules. Clathrin functions as a trimer, and these trimers, or triskelions, are comprised of three legs joined by a central vertex. Each leg consists of one heavy chain and one light chain. The clathrin heavy-chain contains a 145-residue repeat that is present in seven copies.
