identifier: PROSITE:PDOC50088
label: "Ankyrin repeat"
definition: >-
  Ankyrin repeat and ankyrin repeat region profiles. Ankyrin repeats (ANK) are tandemly repeated modules of about 33 amino acids. They occur in a large number of functionally diverse proteins mainly from eukaryotes. The few known examples from prokaryotes and viruses may be the result of horizontal gene transfers.
