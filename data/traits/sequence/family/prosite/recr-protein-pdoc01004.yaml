identifier: PROSITE:PDOC01004
label: "RecR protein"
definition: >-
  recR protein signature. The bacterial protein recR seems to play a role in a recombinational process of DNA repair. It may act with recF and recO. RecR is a protein of about 200 amino acid residues. It contains, in its N-terminal section, a putative C4-type zinc finger that we use a signature pattern.
