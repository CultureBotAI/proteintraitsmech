identifier: PROSITE:PDOC51800
label: "Zinc finger CHHC U11-48K-type"
definition: >-
  Zinc finger CHHC U11-48K-type profile. The CHHC U11-48K-type zinc finger is found only in eukaryotes. It has been identified in spliceosomal U11-48K proteins, tRNA methyl-transferases TRM13 and gametocyte specific factors (GTSF). The CHHC U11-48K-type zinc finger (~30 residues) is present in a single copy in U11-48k AND TRM13, whereas GTSF contains two repeats separated by a short linker. The CHHC U11-48K-type zinc finger may function as a RNA recognition and binding module.
