identifier: PROSITE:PDOC51554
label: "Pyruvate formate-lyase"
definition: >-
  Pyruvate formate lyase (PFL) domain profile. Pyruvate formate lyase (PFL) catalyzes the non-oxidative conversion of pyruvate and CoA to formate and acetyl-CoA. Several other enzymes have been identified in the pyruvate formate lyase family: ketoacid formate lyase, glycerol dehydratase (GD), benzyl succinate synthetase and p-hydroxyphenylacetate decarboxylase.
