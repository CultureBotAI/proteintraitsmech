identifier: PROSITE:PDOC51789
label: "RIG-I-like receptor (RLR) C-terminal regulatory (CTR)"
definition: >-
  RIG-I-like receptor (RLR) C-terminal regulatory (CTR) domain profile. Intracellular RIG-I-like receptors (RLRs: retinoic acid-inducible gene I, RIG-I; melanoma differenciation-associated gene 5, MDA-5; and laboratory of genetics and physiology 2, LGP2) recognize viral RNAs as pathogen-associated molecular patterns (PAMPs) and initiate an antiviral immune response. RLRs belong to the superfamily 2 (SF2) helicases or ATPases. Among SF2 ATPases, RIG-I, MDA5, and LGP2 possess a unique domain structure.
