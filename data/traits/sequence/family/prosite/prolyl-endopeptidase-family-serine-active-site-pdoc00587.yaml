identifier: PROSITE:PDOC00587
label: "Prolyl endopeptidase family serine active site"
definition: >-
  Prolyl oligopeptidase family serine active site. The prolyl oligopeptidase family consist of a number of evolutionary related peptidases whose catalytic activity seems to be provided by a charge relay system similar to that of the trypsin family of serine proteases, but which evolved by independent convergent evolution. The known members of this family are listed below.
