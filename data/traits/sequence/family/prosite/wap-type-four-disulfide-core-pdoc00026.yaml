identifier: PROSITE:PDOC00026
label: "WAP-type 'four-disulfide core'"
definition: >-
  WAP-type 'four-disulfide core' domain profile. The 'four-disulfide core' or WAP domain comprises 8 cysteine residues involved in disulfide bonds in a conserved arrangement. One or more of these domains occur in whey acidic protein (WAP), antileukoproteinase, elastase-inhibitor proteins and other structurally related proteins which are listed below.
