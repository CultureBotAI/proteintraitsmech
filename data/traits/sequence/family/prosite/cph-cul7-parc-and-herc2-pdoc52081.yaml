identifier: PROSITE:PDOC52081
label: "CPH (CUL7, PARC, and HERC2)"
definition: >-
  CPH (CUL7, PARC, and HERC2) domain profile. The p53 tumor suppressor responds to cellular stress by inducing apoptosis, senescence, and growth arrest. Regulation of stress responses by p53 is primarily mediated through its action as a transcription factor. The predominant mechanisms controlling p53 function are regulation of its protein stability, subcellular localization, and post-translational modification. Ubiquitin-mediated proteasomal targeting of p53 serves to regulate p53 protein levels. The tetramerization domain (TD) of p53 has been implicated in multiple aspects of p53 function including sequence-specific DNA binding, subcellular localization, and protein-protein interactions.
