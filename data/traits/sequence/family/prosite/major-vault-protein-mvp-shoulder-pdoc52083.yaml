identifier: PROSITE:PDOC52083
label: "Major vault protein (MVP) shoulder"
definition: >-
  Major vault protein (MVP) shoulder domain profile. The vault is the biggest ribonucleoprotein organelle present in many eukaryotic cells, three times the size of a ribosome. Vaults have been identified in a wide variety of species, including mammals, birds, fish, echinoids and slime molds. Although several functions have been proposed for vaults since their discovery in 1986, including roles in multidrug resistance, cell signaling, and innate immunity, their cellular function remains unclear. Most vault particles are present in the cytoplasm, but a few of them localize to the nucleus.
