label: "3'5'-cyclic nucleotide phosphodiesterase"
definition: >-
  3'5'-cyclic nucleotide phosphodiesterase domain signature and profile. 3'5'-cyclic nucleotide phosphodiesterases (EC 3.1.4.17) (PDEases) comprise a family of enzymes that modulate the immune response, inflammation, and memory, among many other functions. They catalyze the hydrolysis of cyclic nucleotides, cAMP and cGMP, to the corresponding nucleoside 5' monophosphates. There are at least eleven different subfamilies of PDEases, differing according to their sequence homologies, enzymatic properties, and tissue distributions:
