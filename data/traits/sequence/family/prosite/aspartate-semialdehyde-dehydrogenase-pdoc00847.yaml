identifier: PROSITE:PDOC00847
label: "Aspartate-semialdehyde dehydrogenase"
definition: >-
  Aspartate-semialdehyde dehydrogenase signature. Aspartate-semialdehyde dehydrogenase (EC 1.2.1.11) (ASD) catalyzes the second step in the common biosynthetic pathway leading from Asp to diaminopimelate and Lys, to Met, and to Thr; the NADP-dependent reductive dephosphorylation of L-aspartyl phosphate to L-aspartate-semialdehyde. In bacteria and fungi, ASD is a protein of about 40 Kd (340 to 370 residues) whose sequence is not extremely well conserved. A conserved cysteine residue has been implicated as important for the catalytic activity.
