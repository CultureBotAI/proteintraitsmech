identifier: PROSITE:PDOC51793
label: Mis18
definition: >-
  Mis18 domain profile. The centromere is the chromosomal site that joins to microtubules during mitosis for proper segregation. Centromere protein A (CENP-A) is a histone H3 variant and an essential component of centromeres. Mis18 proteins are involved in the priming of centromeres for recruitment of CENP-A. They possess two structurally distinct domains: an N-terminal globular domain mainly comprised of beta-strands and a C-terminal alpha-helical domain. The oligomerization of Mis18, mediated by its conserved N-terminal globular domain, is crucial for its centromere localization and function.
