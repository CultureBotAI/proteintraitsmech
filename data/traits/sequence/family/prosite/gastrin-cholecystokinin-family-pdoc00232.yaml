identifier: PROSITE:PDOC00232
label: "Gastrin / cholecystokinin family"
definition: >-
  Gastrin / cholecystokinin family signature. Gastrin and cholecystokinin (CCK) are structurally and functionally related peptide hormones that function as hormonal regulators of various digestive processes and feeding behaviors . They are known to induce gastric secretion, stimulate pancreatic secretion, increase blood circulation and water secretion in the stomach and intestine, and stimulate smooth muscle contraction. Originally found in the gut, these hormones have since been shown to be present in various parts of the nervous system. Like many other active peptides they are synthesized as larger protein precursors that are enzymatically converted to their mature forms.
