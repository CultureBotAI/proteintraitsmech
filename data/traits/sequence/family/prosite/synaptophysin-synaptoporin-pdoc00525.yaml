identifier: PROSITE:PDOC00525
label: "Synaptophysin / synaptoporin"
definition: >-
  Synaptophysin / synaptoporin signature. Synaptophysin and synaptoporin are structurally related proteins, found in the membrane of synaptic vesicles, which may function as ionic or solute channels. These two glycoproteins seem to span the membrane four times. Both their N- and C-termini sequences seem to be cytoplasmically located.
