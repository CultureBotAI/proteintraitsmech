identifier: PROSITE:PDOC00820
label: "Prokaryotic diacylglycerol kinase"
definition: >-
  Prokaryotic diacylglycerol kinase signature. Diacylglycerol kinase (EC 2.7.1.107) (DAGK) is an enzyme that catalyzes the formation of phosphatidic acid from diacylglycerol and ATP, an important step in phospholipid biosynthesis. In bacteria DAGK is very small (13 to 15 Kd) membrane protein which seems to contain three transmembrane domains.
