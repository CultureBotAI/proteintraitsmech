identifier: PROSITE:PDOC50309
label: Doublecortin
definition: >-
  Doublecortin domain profile. X-linked lissencephaly is a severe brain malformation affecting males. Recently it has been demonstrated that the doublecortin gene is implicated in this disorder. Doublecortin was found to bind to the microtubule cytoskeleton. In vivo and in vitro assays show that Doublecortin stabilizes microtubules and causes bundling. Doublecortin is a basic protein with an iso-electric point of 10, typical of microtubule-binding proteins. However, its sequence contains no known microtubule-binding domain(s).
