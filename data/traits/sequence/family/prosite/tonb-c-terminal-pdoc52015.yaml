label: "TonB C-terminal"
definition: >-
  TonB C-terminal domain profile. The cell wall of Gram-negative bacteria consists of two lipid bilayers, the outer membrane (OM) and the cytoplasmic membrane (CM) with the peptidoglycan layer in between. The OM protects Gram-negative bacteria from environmental hazards such as antibiotics and detergents. At the same time, Gram-negative bacteria require rare essential nutrients such as iron, vitamins that are present in the extracellular environment at very low concentrations. Gram- negative bacteria have evolved active acquisition systems to pass the essential nutrients through OM and CM.
