identifier: PROSITE:PDOC00036
label: "Basic-leucine zipper (bZIP)"
definition: >-
  Basic-leucine zipper (bZIP) domain signature and profile. The bZIP superfamily of eukaryotic DNA-binding transcription factors groups together proteins that contain a basic region mediating sequence- specific DNA-binding followed by a leucine zipper (see <PDOC00029>) required for dimerization. bZIP domains usually bind a palindromic 6 nucleotide site, but the specificity can be altered by interaction with accessory factor.
