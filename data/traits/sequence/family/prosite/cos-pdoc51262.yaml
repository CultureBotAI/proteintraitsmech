label: COS
definition: >-
  COS domain profile. N-terminal RING finger (see <PDOC00449>)/B-box (see <PDOC50119>)/coiled coil (RBCC) or tripartite motif (TRIM) proteins, which are found in metazoan, are involved in a vast array of intracellular functions. They appear to function as part of large protein complexes and possess ubiquitin-protein isopeptide ligase activity. The following RBCC proteins contain an ~60-residue COS (C- terminal subgroup one signature) domain, which is also found in a distantly related non-RBCC microtubule-binding protein, GLFND:
