identifier: PROSITE:PDOC51656
label: 4Fe-4S
definition: >-
  4Fe-4S domain profile. The cobalt- and iron-containing corrinoid iron-sulfur protein (CoFeSP) is functional in the acetyl-CoA pathway of autotrophic carbon fixation in various bacteria and acrchaea, where it is essential for the biosynthesis of acetyl- CoA. CoFeSP acts in two methylation reactions: the transfer of a methyl group from methyltransferase (MeTr)-bound methyltetrahydrofolate to the cob(I)amide of CoFeSP and the transfer of the methyl group of methyl-cob(III)amide to the reduced Ni-Ni-[4Fe-4S] active site cluster A of acetyl-CoA synthase (ACS). CoFeSP is a heterodimer consisting of a large subunit (CfsA) and a small subunit (CfsB).
