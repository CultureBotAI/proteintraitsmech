identifier: PROSITE:PDOC00390
label: "6-phosphogluconate dehydrogenase"
definition: >-
  6-phosphogluconate dehydrogenase signature. 6-phosphogluconate dehydrogenase (EC 1.1.1.44) (6PGD) catalyzes the third step in the hexose monophosphate shunt, the decarboxylating reduction of 6-phosphogluconate in to ribulose 5-phosphate.
