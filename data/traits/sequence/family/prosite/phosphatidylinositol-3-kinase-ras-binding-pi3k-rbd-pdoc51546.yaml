identifier: PROSITE:PDOC51546
label: "Phosphatidylinositol 3-kinase Ras-binding (PI3K RBD)"
definition: >-
  Phosphatidylinositol 3-kinase Ras-binding (PI3K RBD) domain profiles. Phosphatidylinositol 3-kinases (PI3Ks) are lipid kinases that phosphorylate 4,5-bisphonate (PI(4,5) P2 or PIP2) at the 3-position of the inositol ring, and thus generate phosphatidylinositol 3,4,5-trisphosphate (PIP3), which, in turns, initiates a vast array of signaling events. PI3Ks can be grouped into three classes based on their domain organization. Class I PI3Ks are heterodimers consisting of a p110 catalytic subunit and a regulatory subunit of either the p85 type (associated with the class IA p110 isoforms p110alpha, p110beta or p110delta) or the p101 type (associated with the class IB p110 isoform p110gamma).
