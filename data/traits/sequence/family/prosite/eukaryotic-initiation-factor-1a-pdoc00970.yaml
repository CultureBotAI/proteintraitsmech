identifier: PROSITE:PDOC00970
label: "Eukaryotic initiation factor 1A"
definition: >-
  Eukaryotic initiation factor 1A signature. Eukaryotic translation initiation factor 1A (eIF-1A) (formerly known as eiF-4C) is a protein that seems to be required for maximal rate of protein biosynthesis. It enhances ribosome dissociation into subunits and stabilizes the binding of the initiator Met-tRNA to 40S ribosomal subunits.
