identifier: PROSITE:PDOC50975
label: "ATP-grasp fold"
definition: >-
  ATP-grasp domain profile. The ATP-grasp superfamily currently includes 17 groups of enzymes, catalyzing ATP-dependent ligation of a carboxylate containing molecule to an amino or thiol group-containing molecule. They contribute predominantly to macromolecular synthesis. ATP-hydrolysis is used to activate a substrate. For example, DD-ligase transfers phosphate from ATP to D-alanine on the first step of catalysis. On the second step the resulting acylphosphate is attacked by a second D-alanine to produce a DD dipeptide following phosphate elimination.
