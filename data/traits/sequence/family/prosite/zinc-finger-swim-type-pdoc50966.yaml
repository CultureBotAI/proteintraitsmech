identifier: PROSITE:PDOC50966
label: "Zinc finger SWIM-type"
definition: >-
  Zinc finger SWIM-type profile. The zinc finger-like domain SWIM was first identified in the bacterial ATPases of the SWI2/SNF2 family, the plant MuDR transposases and vertebrate MEK kinase-1. It is represented in all major lineages of prokaryotes and eukaryotes. It has the signature of predicted zinc-binding residues C-x-C-x(6,25)-C-x-H surounded by two blocks of conserved residues, an N-terminal aromatic/hydrophobic motif and a C-terminal region enriched in small and hydrophobic residues. The SWIM domain appears to have a beta-beta-alpha structure suggesting that it might adopt a fold similar to that of the classic C2H2 zinc-finger (see <PDOC00028>).
