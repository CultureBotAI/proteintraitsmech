identifier: PROSITE:PDOC00873
label: "FtsZ protein signature"
definition: >-
  FtsZ protein signatures. In bacteria, ftsZ is an essential cell division protein involved in cytokinesis. It assembles into a ring on the inner surface of the cytoplasmic membrane at the place where division will occur. The ring serves as a scaffold that is disassembled when septation is completed. FtsZ is a GTP binding protein with a GTPase activity. It undergoes GTP-dependent polymerization into filaments (or tubules) that seem to form a cytoskeleton involved in septum synthesis.
