identifier: PROSITE:PDOC52020
label: "CRESS-DNA virus replication initiator protein (Rep) endonuclease"
definition: >-
  CRESS-DNA virus replication initiator protein (Rep) endonuclease domain profile. Circular Rep-encoding single-stranded DNA (CRESS-DNA) viruses, such as circoviruses, nanoviruses, and geminiviruses, are eukaryotic viruses with small circular single-stranded DNA (ssDNA) genomes encoding a replication initiator protein (Rep) with a distinctive two functional domain organization, containing an endonuclease domain toward the N-terminus and a superfamily 3 (SF3) helicase domain at the C-terminus. The Rep endonuclease domain is responsible for initiating, progressing, and completing rolling circle replication (RCR) of the genome.
