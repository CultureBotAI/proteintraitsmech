identifier: PROSITE:PDOC01023
label: "Ribosome-binding factor A"
definition: >-
  Ribosome-binding factor A signature. Ribosome-binding factor A (gene rbfA) is a bacterial protein that associates with free 30S ribosomal subunits. It does not associates with 30S subunits that are part of 70S ribosomes or polysomes. It is essential for efficient processing of 16S rRNA.
