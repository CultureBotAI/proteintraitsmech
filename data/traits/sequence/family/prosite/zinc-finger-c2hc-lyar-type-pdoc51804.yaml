identifier: PROSITE:PDOC51804
label: "Zinc finger C2HC LYAR-type"
definition: >-
  Zinc finger C2HC LYAR-type profile. Zinc finger (ZF) proteins are a large family of metalloproteins that utilize zinc for structural purposes. Zinc coordinates to a combination of cysteine thiol and histidine imidazole residues within the ZF polypetide sequence resulting in a folded and functional protein. Ly-1 antibody reactive clone (Lyar), which is known to be expressed abundantly in the testis, encodes a nucleolar protein that contain a LYAR-type C2HC zinc finger motif and three nuclear localization signals. It is a nucleolar protein abundantly expressed in spermatocytes and spermatids, but not sperm.
