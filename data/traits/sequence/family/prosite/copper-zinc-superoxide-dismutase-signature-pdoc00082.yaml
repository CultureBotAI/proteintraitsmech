identifier: PROSITE:PDOC00082
label: "Copper/Zinc superoxide dismutase signature"
definition: >-
  Copper/Zinc superoxide dismutase signatures. Copper/Zinc superoxide dismutase (EC 1.15.1.1) (SODC) is one of the three forms of an enzyme that catalyzes the dismutation of superoxide radicals. SODC binds one atom each of zinc and copper. Various forms of SODC are known: a cytoplasmic form in eukaryotes, an additional chloroplast form in plants, an extracellular form in some eukaryotes, and a periplasmic form in prokaryotes. The metal binding sites are conserved in all the known SODC sequences.
