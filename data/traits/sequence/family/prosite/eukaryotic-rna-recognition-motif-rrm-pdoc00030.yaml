identifier: PROSITE:PDOC00030
label: "Eukaryotic RNA Recognition Motif (RRM)"
definition: >-
  Eukaryotic RNA recognition motif profile. Many eukaryotic proteins that are known or supposed to bind single-stranded RNA contain one or more copies of a putative RNA-binding domain of about 90 amino acids. This domain is known as the RNA recognition motif (RRM).
