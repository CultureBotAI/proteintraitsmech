identifier: PROSITE:PDOC51221
label: TTL
definition: >-
  TTL domain profile. Tubulin tyrosine ligase (TTL) (EC 6.3.2.25) is an enzyme involved in the posttranslational modification of tubulin. Assembled microtubules are detyrosinated over time at the C-terminus of alpha-tubulin. After microtubular disassembly TTL restores tyrosine residues back to the detyrosinated tubulin leading to a cycle of detyrosination/tyrosination. TTL may play a role in tumor cell regulation.
