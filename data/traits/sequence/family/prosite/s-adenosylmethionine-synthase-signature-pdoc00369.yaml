identifier: PROSITE:PDOC00369
label: "S-adenosylmethionine synthase signature"
definition: >-
  S-adenosylmethionine synthase signatures. S-adenosylmethionine synthase (EC 2.5.1.6) is the enzyme that catalyzes the formation of S-adenosylmethionine (AdoMet) from methionine and ATP. AdoMet is an important methyl donor for transmethylation and is also the propylamino donor in polyamine biosynthesis.
