label: JmjC
definition: >-
  JmjN and JmjC domains profiles. The JmjN and JmjC domains are two non-adjacent domains which have been identified in the jumonji family of transcription factors. Although it was originally suggested that the JmjN and JmjC domains always co-occur and might form a single functional unit within the folded protein, the JmjC domain was latter found without the JmjN domain in organisms from bacteria to human.
