identifier: PROSITE:PDOC51726
label: "MYST-type histone acetyltransferase (HAT)"
definition: >-
  MYST-type histone acetyltransferase (HAT) domain profile. Histone acetyltransferase (HAT) enzymes play important roles in the regulation of chromatin assembly, RNA transcription, DNA repair and other DNA-templated reactions through the lysine side-chain acetylation of histones and other transcription factors. HATs fall into at least four different families based on sequence conservation within the HAT domain. This includes Gcn5/PCAF (see <PDOC51186>), p300/CBP, Rtt109 and MYST (named for the founding members MOZ, Ybf2/Sas3, Sas2 and Tip 60) families.
