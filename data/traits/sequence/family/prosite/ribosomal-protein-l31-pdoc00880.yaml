identifier: PROSITE:PDOC00880
label: "Ribosomal protein L31"
definition: >-
  Ribosomal protein L31 signature. Ribosomal protein L31 is one of the proteins from the large ribosomal subunit. L31 is a protein of 66 to 97 amino-acid residues which has only been found in eubacteria (some of which have two different copies) and in some algal chloroplasts.
