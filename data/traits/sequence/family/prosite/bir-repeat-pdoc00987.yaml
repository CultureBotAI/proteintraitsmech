identifier: PROSITE:PDOC00987
label: "BIR repeat"
definition: >-
  BIR repeat signature and profile. The 'baculovirus inhibitior of apoptosis protein repeat' (BIR) is a domain of about 70 residues arranged in tandem repeats separated by a variable length linker, that seems to confer cell death-preventing activity. It is found in proteins belonging to the IAP (inhibitor of apoptosis proteins) family. The critical motifs required for anti-apoptotic activity of IAP proteins are the BIRs. All IAP proteins contain from one to three BIRs, and all known interactions between IAPs and other proteins are mediated by one or more BIRs.
