identifier: PROSITE:PDOC51490
label: KHA
definition: >-
  KHA domain profile. Potassium channels take part in important processes of higher plants, including opening and closing of stomatal pores and leaf movement. Inward rectifying potassium (K(+)in) channels play an important role in turgor regulation and ion uptake in higher plants. All of them comprise, from their N-terminal to their C-terminal ends: a short hydrophilic region, a hydrophobic region structurally analogous and partially homologous to the transmembrane domain of voltage-gated animal channels from the Shaker superfamily, a putative cyclic nucleotide-binding domain (see <PDOC00691>), and a conserved C-terminal KHA domain.
