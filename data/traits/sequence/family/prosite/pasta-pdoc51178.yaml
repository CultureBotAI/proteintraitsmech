identifier: PROSITE:PDOC51178
label: PASTA
definition: >-
  PASTA domain profile. The PASTA domain (for penicillin-binding protein and serine/threonine kinase associated domain) is an extracellular module of ~70 residues that is found in the C-termini of eukaryotic-like serine/threonine kinases (PSTKs) and high molecular weight penicilin-binding proteins (PBPs). The PASTA domain is distributed mainly in the GRAM-positive bacteria, most notably among species of the genera Bacillus and Clostridia. It is not found in eukaryotes. The PASTA domain occurs both singly and in multiple copies, which suggests that it is a domain rather than a structural repeat.
