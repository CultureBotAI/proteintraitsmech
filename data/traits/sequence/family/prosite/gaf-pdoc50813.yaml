identifier: PROSITE:PDOC50813
label: GAF
definition: >-
  GAF domain profile. GAF domains are ubiquitous motifs present in one, two, or three degenerate copies in cyclic GMP (cGMP)-regulated cyclic nucleotide phosphodiesterases (PDEs), certain adenylyl cyclases, the bacterial transcription factor FhlA, and hundreds of other signaling and sensory proteins from all three kingdoms of life. GAF domains in general may regulate allosterically catalytic activities via the binding of ligands, such as nucleotides and small molecules. Given the diverse evolutionary and functional contexts within which GAF domains are found, it has been proposed that not all these domains possess identical functions.
