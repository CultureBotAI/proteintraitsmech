identifier: PROSITE:PDOC50878
label: "Reverse transcriptase (RT) catalytic"
definition: >-
  Reverse transcriptase (RT) catalytic domain profile. Retroviral reverse transcriptases (EC 2.7.7.49) (prototypical RTs) exhibit three enzymatic activities: an RNA-dependent DNA polymerase, Ribonuclease H, and a DNA-dependent DNA polymerase. These are employed in copying the plus strand RNA genome to produce a minus strand of DNA, removal of the RNA template, and synthesis of the plus strand of DNA using the minus-strand DNA as a template, respectively. Both polymerase activities are performed by the RT domain whereas the ribonuclease activity is achieved by the RNase H domain (see <PDOC50879>).
