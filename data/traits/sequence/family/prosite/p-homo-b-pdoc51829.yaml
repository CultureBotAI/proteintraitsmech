identifier: PROSITE:PDOC51829
label: "P/Homo B"
definition: >-
  P/Homo B domain profile. In eukaryotes, many essential secreted proteins and peptide hormones are excised from larger precursors by members of a class of calcium-dependent endoproteinases, the prohormone-proprotein convertases (PCs).The P (known as such because it is essential for proteolytic activity), or Homo B, domain of ~150 residues is a distinctive characteristic of members of the proprotein convertase family. The P/Homo B domain appears to be necessary to both fold and maintain the subtilisin-like active catalytic module and to regulate its specialized features of calcium and more acidic pH dependence.
