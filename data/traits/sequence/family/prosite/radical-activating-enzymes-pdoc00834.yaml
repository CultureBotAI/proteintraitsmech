identifier: PROSITE:PDOC00834
label: "Radical activating enzymes"
definition: >-
  Radical activating enzymes signature. In Escherichia coli and related bacteria, the pflA protein (or act) is involved (EC 1.97.1.4) in the activation of pyruvate formate-lyase (gene pflB) under anaerobic conditions by generation of an organic free radical, using S- adenosylmethionine and reduced flavodoxin as cosubstrates to produce 5'-deoxy- adenosine. A protein highly similar to pflA and termed pflC is probably involved in the activation of a second pyruvate format lyase (gene pflD).
