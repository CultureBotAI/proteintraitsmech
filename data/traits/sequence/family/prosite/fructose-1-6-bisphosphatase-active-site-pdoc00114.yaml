identifier: PROSITE:PDOC00114
label: "Fructose-1-6-bisphosphatase active site"
definition: >-
  Fructose-1-6-bisphosphatase active site. Fructose-1,6-bisphosphatase (EC 3.1.3.11) (FBPase), a regulatory enzyme in gluconeogenesis, catalyzes the hydrolysis of fructose 1,6-bisphosphate to fructose 6-phosphate. It is involved in many different metabolic pathways and found in most organisms.
