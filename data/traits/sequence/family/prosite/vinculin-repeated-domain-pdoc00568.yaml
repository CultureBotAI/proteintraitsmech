identifier: PROSITE:PDOC00568
label: "Vinculin repeated domain"
definition: >-
  Vinculin family signatures. Vinculin is a eukaryotic protein that seems to be involved in the attachment of the actin-based microfilaments to the plasma membrane. Vinculin is located at the cytoplasmic side of focal contacts or adhesion plaques. In addition to actin, vinculin interacts with other structural proteins such as talin and alpha-actinins.
