identifier: PROSITE:PDOC00199
label: "Tubulin subunits alpha, beta, and gamma"
definition: >-
  Tubulin subunits alpha, beta, and gamma signature. Tubulins, the major constituent of microtubules are dimeric proteins which consist of two closely related subunits (alpha and beta). Tubulin binds two molecules of GTP at two different sites (N and E). At the E (Exchangeable) site, GTP is hydrolyzed during incorporation into the microtubule. Near the E site is an invariant region rich in glycines which is found in both chains and which is now said to control the access of the nucleotide to its binding site. We developed a signature pattern from this region.
