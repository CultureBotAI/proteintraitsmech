identifier: PROSITE:PDOC52055
label: "Bacterial ISG15-like (Bil) ubiquitin-like"
definition: >-
  Bacterial ISG15-like (Bil) ubiquitin-like domain profile. Ubiquitylation is a widespread posttranslational modification that controls most of eukaryotic cell biology. The process relies on a cascade of E1 ubiquitin-activating enzymes, E2 ubiquitin-conjugating enzymes, and E3 ubiquitin ligases to conjugate the small protein ubiquitin onto substrates. Ubiquitination can be reversed by deubiquitinases (DUBs), which are peptidases capable of removing ubiquitin from target molecule.
