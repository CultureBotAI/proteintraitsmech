identifier: PROSITE:PDOC01037
label: "Methylglyoxal synthase active site"
definition: >-
  Methylglyoxal synthase active site. Methylglyoxal synthase (EC 4.2.3.3) (MGS) catalyzes the conversion of dihydroxyacetone phosphate to methylglyoxal and phosphate. It provides bacteria with an alternative to triosephosphate isomerase for metabolizing dihydroxyacetone phosphate.
