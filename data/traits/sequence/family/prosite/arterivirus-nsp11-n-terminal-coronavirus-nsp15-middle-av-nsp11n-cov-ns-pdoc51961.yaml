identifier: PROSITE:PDOC51961
label: "Arterivirus Nsp11 N-terminal/coronavirus NSP15 middle (AV-Nsp11N/CoV-Nsp15M)"
definition: >-
  Arterivirus Nsp11 N-terminal/coronavirus NSP15 middle (AV-Nsp11N/CoV-Nsp15M) domain profile. Positive-stranded RNA (+RNA) viruses that belong to the order Nidovirales infect a wide range of vertebrates (families Arteriviridae and Coronaviridae) or invertebrates (Mesoniviridae and Roniviridae). Examples of nidoviruses with high economic and societal impact are the arterivirus porcine reproductive and respiratory syndrome virus (PRRSV) and the zoonotic coronaviruses (CoVs) causing severe acute respiratory syndrome (SARS), Middle East respiratory syndrome (MERS) and Covid-19 (SARS-CoV-2) in humans.
