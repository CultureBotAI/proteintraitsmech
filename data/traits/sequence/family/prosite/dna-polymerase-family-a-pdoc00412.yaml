identifier: PROSITE:PDOC00412
label: "DNA polymerase family A"
definition: >-
  DNA polymerase family A signature. Replicative DNA polymerases (EC 2.7.7.7) are the key enzymes catalyzing the accurate replication of DNA. They require either a small RNA molecule or a protein as a primer for the de novo synthesis of a DNA chain. On the basis of sequence similarities a number of DNA polymerases have been grouped together under the designation of DNA polymerase family A. The polymerases that belong to this family are listed below.
