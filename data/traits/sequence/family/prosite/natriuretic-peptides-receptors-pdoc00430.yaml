label: "Natriuretic peptides receptors"
definition: >-
  Natriuretic peptides receptors signature. Natriuretic peptides are hormones involved in the regulation of fluid and electrolyte homeostasis. These hormones stimulate the intracellular production of cyclic GMP as a second messenger.
