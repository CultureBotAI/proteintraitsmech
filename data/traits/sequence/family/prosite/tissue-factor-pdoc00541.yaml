identifier: PROSITE:PDOC00541
label: "Tissue factor"
definition: >-
  Tissue factor signature. Tissue factor (TF) is an integral membrane glycoprotein that initiates blood coagulation by forming a complex with circulating factor VII or VIIa. The complex then activates factors IX or X by specific limited proteolysis.
