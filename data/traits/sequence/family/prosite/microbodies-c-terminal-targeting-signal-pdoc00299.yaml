identifier: PROSITE:PDOC00299
label: "Microbodies C-terminal targeting signal"
definition: >-
  Microbodies C-terminal targeting signal. Microbodies are a class of small, single membraned organelles to which belong peroxisomes, glyoxysomes, and glycosomes. Microbody proteins are synthesized on free polysomes and imported into the organelle post-translationally. Unlike the import of proteins into mitochondria, chloroplasts or the ER/secretion pathway, import into microbodies does not generally require the removal of a presequence. It has been experimentally shown that, in some peroxisomal proteins, the targeting signal (PTS) resides in the last three amino acids of the C-terminus.
