label: "DNA mismatch repair proteins mutL / hexB / PMS1"
definition: >-
  DNA mismatch repair proteins mutL / hexB / PMS1 signature. Mismatch repair contributes to the overall fidelity of DNA replication. It involves the correction of mismatched base pairs that have been missed by the proofreading element of the DNA polymerase complex. The sequence of some proteins involved in mismatch repair in different organisms have been found to be evolutionary related. These proteins are:
