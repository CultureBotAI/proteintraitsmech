identifier: PROSITE:PDOC00986
label: "Glucose inhibited division protein A family signature"
definition: >-
  Glucose inhibited division protein A family signatures. Bacterial glucose inhibited division protein A (gene gidA) is a protein of 70 Kd whose function is not yet known and whose sequence is highly conserved. It is evolutionary related to yeast hypothetical protein YGL236C, Caenorhabditis elegans hypothetical protein F52H3.2 and a Bacillus subtilis protein called gid (and which is different from B.subtilis gidA).
