identifier: PROSITE:PDOC51215
label: AWS
definition: >-
  AWS domain profile. The SET domain is an evolutionarily conserved domain found predominantly in histone methyltransferases (HMTs) (see <PDOC50280>). Not all SET domain- containing proteins possess HMTase activities. The HTMase activity is probably restricted to a subset of SET domain proteins as it requires the combination of the SET domain with the adjacent cysteine-rich regions, one located N- terminally (pre-SET) and the other posterior to the SET domain (post-SET). In a subset of SET and post-SET containing proteins, a so-called associated with SET (AWS) domain is found instead of the pre-SET domain.
