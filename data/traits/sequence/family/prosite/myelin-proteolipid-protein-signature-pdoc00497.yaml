identifier: PROSITE:PDOC00497
label: "Myelin proteolipid protein signature"
definition: >-
  Myelin proteolipid protein signatures. Myelin proteolipid protein (PLP or lipophilin) is the major myelin protein from the central nervous system (CNS). It probably plays an important role in the formation or maintenance of the multilamellar structure of myelin. In man point mutations in PLP are the cause of Pelizaeus-Merzbacher disease (PMD), a neurologic disorder of myelin metabolism. In animals dismyelinating diseases such as mouse 'jimpy' (jp), rat md, or dog 'shaking pup' are also caused by mutations in PLP.
