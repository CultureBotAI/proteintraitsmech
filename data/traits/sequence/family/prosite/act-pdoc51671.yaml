identifier: PROSITE:PDOC51671
label: ACT
definition: >-
  ACT and ACT-like domain profiles. The ACT domain is a 90 amino acid long domain, which has been named after three of the allosterically regulated enzymes in which it is found: aspartate kinase, chorismate mutase and TyrA (prephenate dehydrogenase). The ACT domain is found in a variety of contexts and is proposed to be a structurally conserved regulatory domain involved in the binding of small ligands, such as amino acids. Most of the proteins in which it is found are involved in amino acid and purine metabolism:
