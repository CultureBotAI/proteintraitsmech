identifier: PROSITE:PDOC51890
label: DAZ
definition: >-
  DAZ domain profile. DAZ (Deleted in Azoospermia) proteins are found almost exclusively in germ cells in distant animal species. Deletion or mutations of their encoding genes usually impair either oogenesis or spermatogenesis or both. The family includes three members, Boule (or Boll), Dazl (or Dazla) and DAZ, encoding RNA binding proteins. Boule is the ancestral gene that is conserved from flies to humans, whereas, Dazl arose in the early vertebrate lineage and Daz arrived on Y chromosome during primate evolution. Basically, DAZ family proteins have been proposed to function as adaptors for target mRNA transport and activators of their translation.
