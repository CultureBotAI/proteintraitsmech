identifier: PROSITE:PDOC00244
label: "Plant thionins"
definition: >-
  Plant thionins signature. Thionins are small, basic, plant proteins generally toxic to animal cells. They seem to exert their toxic effect at the level of the cell membrane but their exact function is not known. They consist of a polypeptide chain of forty five to fifty amino acids with three to four internal disulfide bonds. They are found in seeds but also in the cell wall of leaves. Thionins are processed from larger precursor proteins. Crambin, a hydrophobic plant seed protein, also belongs to this family. The pattern we developed to detect this family of proteins includes three of the six cysteine residues involved in disulfide bonds.
