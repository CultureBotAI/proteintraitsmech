identifier: PROSITE:PDOC50896
label: "LIS1 homology (LisH) motif"
definition: >-
  LIS1 homology (LisH) motif and C-terminal to LisH (CTLH) motif profiles. The 33-residue LIS1 homology (LisH) motif is found in eukaryotic intracellular proteins involved in microtubule dynamics, cell migration, nucleokinesis and chromosome segregation. The LisH motif is likely to possess a conserved protein-binding function and it has been proposed that LisH motifs contribute to the regulation of microtubule dynamics, either by mediating dimerization, or else by binding cytoplasmic dynein heavy chain or microtubules directly. The LisH motif is found associated to other domains, such as WD-40 (see <PDOC00574>), SPRY, Kelch, AAA ATPase, RasGEF, or HEAT (see <PDOC50077>).
