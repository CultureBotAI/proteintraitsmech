identifier: PROSITE:PDOC00581
label: "Riboflavin synthase alpha chain lumazine-binding repeat"
definition: >-
  Riboflavin synthase alpha chain lumazine-binding repeat profile. Riboflavin synthase (RS-alpha) catalyzes the biosynthesis of riboflavin (vitamin B2) by dismutation of 6,7-dimethyl-8-(1'-D-ribityl)lumazine (Lum) (EC 2.5.1.9). Riboflavin synthases of bacteria and fungi are structurally and evolutionary related to antenna proteins involved in bioluminescence of marine bacteria. These proteins seem to have evolved from the duplication of a domain of about 100 residues, the lumazine-binding repeat.
