identifier: PROSITE:PDOC50106
label: PDZ
definition: >-
  PDZ domain profile. PDZ domains (also called Discs-large homologous regions (DHR) or GLGF) are conserved structural elements of 80 to 100 amino acids that were originally identified in the post-synaptic density protein PSD-95, the Drosophila tumor suppressor discs-large, and the tight-junction protein ZO-1. PDZ domains occur as single or, more frequently, as multiple tandemly repeated copies in a large and diverse set of proteins from all eukaryotes. The presence of one or two copies of PDZ domains in some bacteria may be explained by horizontal gene transfer.
