identifier: PROSITE:PDOC00079
label: "Intradiol ring-cleavage dioxygenases"
definition: >-
  Intradiol ring-cleavage dioxygenases signature. Dioxygenases catalyze the incorporation of both atoms of molecular oxygen into substrates. Cleavage of aromatic rings is one of the most important function of dioxygenases. The substrates of ring-cleavage dioxygenases can be classified into two groups according to the mode of scission of the aromatic ring. Intradiol enzymes cleave the aromatic ring between two hydroxyl groups, whereas extradiol enzymes cleave the aromatic ring between a hydroxylated carbon and another adjacent nonhydroxylated carbon. Intradiol dioxygenases require a nonheme ferric ion as a cofactor. The enzymes that belong to this family are:
