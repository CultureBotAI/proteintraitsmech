identifier: PROSITE:PDOC00289
label: Aspartokinase
definition: >-
  Aspartokinase signature. Aspartokinase (EC 2.7.2.4) (AK) catalyzes the phosphorylation of aspartate. The product of this reaction can then be used in the biosynthesis of lysine or in the pathway leading to homoserine, which participates in the biosynthesis of threonine, isoleucine and methionine.
