identifier: PROSITE:PDOC00204
label: "Amyloid precursor protein (APP) E1"
definition: >-
  APP E1 and E2 domains profiles and CuBD and intracellular domains signatures. Alzheimer's disease (AD) is the most frequent form of progressive dementia, occurring predominantly in the elderly population. AD is characterized by the presence of amyloid plaques, extensive neuronal death and shrinkage of the brain. It is increasingly accepted that the neurotoxic beta-amyloid or A4 peptide (beta/A4) is responsible for compromising neuronal functions and triggering cell death. The peptide is derived from the cleavage of the amyloid precursor protein (APP) and is the main constituent of the amyloid plaques.
