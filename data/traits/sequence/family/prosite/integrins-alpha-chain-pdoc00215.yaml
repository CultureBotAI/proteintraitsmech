identifier: PROSITE:PDOC00215
label: "Integrins alpha chain"
definition: >-
  Integrins alpha chain signature. Integrins are a large family of cell surface receptors that mediate cell to cell as well as cell to matrix adhesion. Some integrins recognize the R-G-D sequence in their extracellular matrix protein ligand. Structurally, integrins consist of a dimer of an alpha and a beta chain. Each subunit has a large N-terminal extracellular domain followed by a transmembrane domain and a short C-terminal cytoplasmic region. Some alpha subunits are cleaved post- translationally to produce a heavy and a light chain linked by a disulfide bond. The sequence of a number of alpha chains has been obtained and are listed below:
