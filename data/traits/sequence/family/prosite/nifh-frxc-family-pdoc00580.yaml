identifier: PROSITE:PDOC00580
label: "NIFH_FRXC family"
definition: >-
  NifH/frxC family signatures and profile. Nitrogenase (EC 1.18.6.1) is the enzyme system responsible for biological nitrogen fixation. Nitrogenase is an oligomeric complex which consists of two components: component 1 which contains the active site for the reduction of nitrogen to ammonia and component 2 (also called the iron protein).
