identifier: PROSITE:PDOC50330
label: "Ubiquitin-interacting motif (UIM)"
definition: >-
  Ubiquitin-interacting motif (UIM) domain profile. Covalent modification of proteins by the small, evolutionary conserved protein ubiquitin (see <PDOC00271>) plays a central role in a variety of cellular processes, including bulk protein degradation, cell-cycle control, stress response, DNA repair, signal transduction, transcriptional regulation and vesicular traffic. A cascade of three enzymes (called E1, E2 and E3) catalyzes the conjugation of ubiquitin to lysine side-chains of target proteins. Ubiquitination is a reversible process: several specific ubiquitin carboxy- terminal hydrolases (UBPs) (see <PDOC00750>) can remove ubiquitin from proteins.
