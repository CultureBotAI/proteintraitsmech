identifier: PROSITE:PDOC00672
label: "GTP cyclohydrolase I signature"
definition: >-
  GTP cyclohydrolase I signatures. GTP cyclohydrolase I (EC 3.5.4.16) catalyzes the biosynthesis of formic acid and dihydroneopterin triphosphate from GTP. This reaction is the first step in the biosynthesis of tetrahydrofolate in prokaryotes, of tetrahydrobiopterin in vertebrates, and of pteridine-containing pigments in insects.
