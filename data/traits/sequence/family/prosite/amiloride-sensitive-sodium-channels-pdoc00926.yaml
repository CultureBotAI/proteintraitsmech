identifier: PROSITE:PDOC00926
label: "Amiloride-sensitive sodium channels"
definition: >-
  Amiloride-sensitive sodium channels signature. Amiloride-sensitive sodium channels (ASC) are sodium permeable non- voltage-sensitive ion channels inhibited by the diuretic amiloride. They mediate the electrodiffusion of the luminal sodium (and water, which follows osmotically) through the apical membrane of epithelial cells. In vertebrates, these channels control the reabsorption of sodium in kidney, colon, lung and sweat glands. They also play a role in taste perception. The ASC are composed of three homologous subunits, called alpha, beta and gamma. A fourth subunit (delta) can replace the alpha subunit.
