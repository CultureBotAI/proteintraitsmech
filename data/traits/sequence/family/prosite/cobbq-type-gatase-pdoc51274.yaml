identifier: PROSITE:PDOC51274
label: "CobBQ-type GATase"
definition: >-
  CobBQ-type GATase domain profile. Vitamin B12 (cobalamin) is an essential nutrient that serves as a co-factor for enzymatic reactions. The biosynthesis of this coenzyme is a complex process that is confined to certain prokaryotes and requires circa 25 different enzymes. During the assembly, six amide groups are introduced at the a, b, c, d, e and g carboxylates. In the aerobic and anaerobic biosynthetic pathways, the six amidation steps are carried out by two seperate enzymes. Cobyrinic acid a,c-diamide synthethase (cbiA and cobB) is responsible for the introduction of the two amide groups at the a and c positions in either cobyrinic acid or hydrogenobrynic acid.
