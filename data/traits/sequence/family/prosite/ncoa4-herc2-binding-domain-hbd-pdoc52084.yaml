label: "NCOA4 HERC2-binding domain (HBD)"
definition: >-
  NCOA4 HERC2-binding domain (HBD) profile. Iron is essential for the survival of nearly all organisms as it serves as a cofactor for a host of biochemical processes including oxygen storage, oxidative phosphorylation, and enzymatic reactions required for cellular proliferation. However, the levels of free iron in a cell must be tightly controlled to avoid the generation of reactive oxygen species (ROS) via the Fenton reaction. As such, iron metabolism is a tightly regulated process controlled by a network of iron-dependent proteins. The cell has evolved mechanisms whereby iron can be sequestered and released from protein complexes in response to changing iron levels.
