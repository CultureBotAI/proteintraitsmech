identifier: PROSITE:PDOC00867
label: "Elongation factor Ts signature"
definition: >-
  Elongation factor Ts signatures. In prokaryotes elongation factor Ts (EF-Ts) is a component of the elongation cycle of protein biosynthesis. It associates with the EF-Tu.GDP complex and induces the exchange of GDP to GTP, it remains bound to the aminoacyl-tRNA. EF-Tu.GTP complex up to the GTP hydrolysis stage on the ribosome.
