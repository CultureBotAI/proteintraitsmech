identifier: PROSITE:PDOC51862
label: "BetaSPN-type cysteine-stabilized alpha/beta (CS-alpha/beta)"
definition: >-
  BetaSPN-type cysteine-stabilized alpha/beta (CS-alpha/beta) domain profile. Scorpion venoms are complex mixture of peptides with a variety of pharmacological functions. These toxin peptides include ion channel modulators, antibacterial peptides, and protease inhibitors. Scorpion toxins targeting various ion channels share a cysteine-stabilized alpha/beta (CS- alpha/beta) structure, which can be divided into two types: short-chain toxins of 23-42 amino acid residues with 3 or 4 disulfide bridges, which are commonly potassium channel blockers, and long-chain toxins of 53-78 amino acids, which are mostly modulators of sodium channels.
