identifier: PROSITE:PDOC51055
label: "ITAM motif mammalian type"
definition: >-
  ITAM motif profiles. Signal transduction by T and B cell antigen receptors and certain receptors for Ig Fc regions involves a conserved sequence motif, termed an immunoreceptor tyrosine-based activation motif (ITAM). It is also found in the cytoplasmic domain of apoptosis receptor. Phosphorylation of the two ITAM tyrosines is a critical event in signal transduction. All (p)2ITAMs, but not their nonphosphorylated counterparts, induced extensive protein tyrosine phosphorylation in permeabilized cells.
