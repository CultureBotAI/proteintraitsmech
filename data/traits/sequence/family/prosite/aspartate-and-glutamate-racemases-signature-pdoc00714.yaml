identifier: PROSITE:PDOC00714
label: "Aspartate and glutamate racemases signature"
definition: >-
  Aspartate and glutamate racemases signatures. Aspartate racemase (EC 5.1.1.13) and glutamate racemase (EC 5.1.1.3) are two evolutionary related bacterial enzymes that do not seem to require a cofactor for their activity. Glutamate racemase, which interconverts L-glutamate into D-glutamate, is required for the biosynthesis of peptidoglycan and some peptide-based antibiotics such as gramicidin S.
