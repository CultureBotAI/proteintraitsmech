identifier: PROSITE:PDOC51643
label: "HD Cas3-type"
definition: >-
  HD Cas3-type domain profile. Clustered regularly interspaced short palindromic repeats (CRISPRs) and Cas proteins represents an adaptative microbial immunity system against viruses and plasmids. Cas3 proteins have been proposed to play a key role in the CRISPR mechanism through the direct cleavage of invasive nucleic acids. Cas3 proteins are predicted to contain the DExD/H-box helicase (see <PDOC51192>) and HD domains, which can be covalently fused (Cas3) or encoded as individual proteins (Cas3' or Cas3'', respectively).
