label: "Bacteriocin class IIa family"
definition: >-
  Bacteriocin class IIa family signature. Many Gram-positive bacteria produce ribosomally synthesized antimicrobial peptides, often termed bacteriocins. One important and well studied class of bacteriocins is the class IIa or pediocin-like bacteriocins produced by lactic acid bacteria. All class IIa bacteriocins are produced by food-associated strains, isolated from a variety of food products of industrial and natural origins, including meat products, dairy products and vegetables. Class IIa bacteriocins are all cationic, display anti-Listeria activity, and kill target cells by permeabilizing the cell membrane [1-3].
