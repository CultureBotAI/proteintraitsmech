identifier: PROSITE:PDOC50249
label: MPN
definition: >-
  MPN domain profile. The MPN (Mpr1, Pad1 N-terminal) domain (also known as the Mov34, JAB, PAD-1, or JAMM (JAB1/MPN/Mov34 metalloenzyme) domain) is a widespread 120 amino acid protein module found in archaea, bacteria and eukaryotes. In eukaryotes the MPN domain is found in subunits of several multiprotein complexes including the proteasome, whereas in eubacteria and archaea, the MPN domain is usually found in single domain proteins.
