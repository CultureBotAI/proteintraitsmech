identifier: PROSITE:PDOC00106
label: "Eukaryotic RNA polymerase II heptapeptide repeat"
definition: >-
  Eukaryotic RNA polymerase II heptapeptide repeat. RNA polymerase II (EC 2.7.7.6) is one of the three forms of RNA polymerase that exist in eukaryotic nuclei. The C-terminal region of the largest subunit of this oligomeric enzyme consists of the tandem repeat of a conserved heptapeptide. The number of repeats varies according to the species (for example: 17 in Plasmodium, 26 in yeast, 44 in Drosophila, and 52 in mammals). The region containing these repeats is essential to the function of polymerase II. This repeated heptapeptide (called CT7n or CTD) is rich in hydroxyl groups.
