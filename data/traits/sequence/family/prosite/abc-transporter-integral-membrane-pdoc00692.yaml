identifier: PROSITE:PDOC00692
label: "ABC transporter integral membrane"
definition: >-
  ABC transporter integral membrane type-2 domain profile. ABC transporters belong to the ATP-Binding Cassette (ABC) superfamily which uses the hydrolysis of ATP to energize diverse biological import and export systems. ABC transporters are minimally constituted of two conserved regions: a highly conserved ATP binding cassette (ABC) (see <PDOC00185>) and a less conserved transmembrane domain (TMD). These regions can be found on the same protein (mostly in eukaryotes and bacterial exporters) or on two different ones (mostly bacterial importers).
