identifier: PROSITE:PDOC00103
label: "Phosphagen kinase C-terminal"
definition: >-
  Phosphagen kinase active site signature and N- and C-terminal domain profiles. Phosphagen (guanidino) kinases, including creatine kinase (CK), arginine kinase (AK), taurocyamine kinase (TK), lombricine kinase (LK), glycocyamine kinase (GK), and hypotaurocyamine kinase (HTK), are enzymes that catalyze the reversible transfer of the gamma-phosphoryl group of adenosine triphosphate (ATP) to naturally occuring guanidino compounds such as creatine, arginine, yelding adenosine diphosphate (ADP) and a phosphorylated guanidine typically referred to as phosphagen (phosphocreatine, phosphoarginine and etc).
