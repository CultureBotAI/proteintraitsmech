identifier: PROSITE:PDOC00641
label: "Eukaryotic initiation factor 4E"
definition: >-
  Eukaryotic initiation factor 4E signature. Eukaryotic translation initiation factor 4E (eIF-4E) is a protein that binds to the cap structure of eukaryotic cellular mRNAs. eIF-4E recognizes and binds the 7-methylguanosine-containing (m7Gppp) cap during an early step in the initiation of protein synthesis and facilitates ribosome binding to a mRNA by inducing the unwinding of its secondary structures.
