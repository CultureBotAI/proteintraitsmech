identifier: PROSITE:PDOC00603
label: "S-adenosyl-L-homocysteine hydrolase signature"
definition: >-
  S-adenosyl-L-homocysteine hydrolase signatures. S-adenosyl-L-homocysteine hydrolase (EC 3.3.1.1) (AdoHcyase) is an enzyme of the activated methyl cycle, responsible for the reversible hydratation of S- adenosyl-L-homocysteine into adenosine and homocysteine. AdoHcyase is an ubiquitous enzyme which binds and requires NAD+ as a cofactor.
