identifier: PROSITE:PDOC50845
label: Reticulon
definition: >-
  Reticulon domain profile. Eukaryotic proteins of the reticulon (RTN) family all share an association with the endoplasmic reticulum (ER). Whereas amino-terminal regions are not related to one another, all reticulon proteins share a 200-amino-acid residue region of sequence similarity at the C-terminus. This region contains two large hydrophobic regions separated by a 66-residue hydrophilic segment. The conserved hydrophobic C-terminal portion has been shown to play an essential role in the association of reticulons with the ER membrane. The hydrophobic portions are supposed to be membrane-embedded and the hydrophilic 66-residue localized to the lumenal/extracellular face of the membrane.
