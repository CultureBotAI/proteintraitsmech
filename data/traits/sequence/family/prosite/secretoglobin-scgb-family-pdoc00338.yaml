identifier: PROSITE:PDOC00338
label: "Secretoglobin (SCGB) family"
definition: >-
  Secretoglobin (SCGB) family profile. Proteins of the secretoglobin (SCGB) family have the following common characteristics: secretion, small size, alpha-helical, and dimeric structure. The secretoglobin monomere structure is composed of four alpha-helices, H1 to H4, that do not form a canonical four helix-bundle motif, but a 'boomerang'-shaped structure in which helices H1, H3, and H4 form the interface of a dimeric structure displaying a large oblong internal cavity (see <PDB:1UTG>).
