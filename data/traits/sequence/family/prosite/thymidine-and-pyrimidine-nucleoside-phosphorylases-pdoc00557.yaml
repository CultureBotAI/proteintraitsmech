identifier: PROSITE:PDOC00557
label: "Thymidine and pyrimidine-nucleoside phosphorylases"
definition: >-
  Thymidine and pyrimidine-nucleoside phosphorylases signature. Thymidine phosphorylase (EC 2.4.2.4) catalyzes the reversible phosphorolysis of thymidine, deoxyuridine and their analogues to their respective bases and 2-deoxyribose 1-phosphate. This enzyme regulates the availability of thymidine and is therefore essential to nucleic acid metabolism.
