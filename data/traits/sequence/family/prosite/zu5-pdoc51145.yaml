identifier: PROSITE:PDOC51145
label: ZU5
definition: >-
  ZU5 domain profile. The ZU5 domain is a domain of ~150 residues present in zona occludens 1 (ZO-1) protein, in unc5-like netrin receptors and in ankyrins. The ZU5 domain is named after the mouse tight junction protein ZO-1 and the C. elegans uncoordinated protein 5 (unc-5) and related Unc5-like netrin receptors. ZU5 domains are found in eukaryotic proteins that in most cases contain a C-terminal death domain (see <PDOC50017>).
