identifier: PROSITE:PDOC00024
label: "P-type 'Trefoil'"
definition: >-
  P-type ('Trefoil') domain signature and profile. A cysteine-rich domain of approximately forty five amino-acid residues has been found in some extracellular eukaryotic proteins. This domain is known as either the 'P', 'trefoil' or 'TFF' domain. It contains six cysteines that are linked by three disulfide bonds in a 1-5, 2-4, and 3-6 configuration. This leads to a characteristic three leafed structure ('trefoil'). The P-type domain is clearly composed of three looplike regions. The central core of the domain consists of a short two-stranded antiparallel beta-sheet, which is capped by an irregular loop and forms a central hairpin (loop 3).
