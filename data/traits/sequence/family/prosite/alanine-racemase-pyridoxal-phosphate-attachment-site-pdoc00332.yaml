identifier: PROSITE:PDOC00332
label: "Alanine racemase pyridoxal-phosphate attachment site"
definition: >-
  Alanine racemase pyridoxal-phosphate attachment site. Alanine racemase (EC 5.1.1.1) catalyzes the pyridoxal-dependent conversion of L-alanine into D-alanine, a key building block of bacterial peptidoglycan. In bacteria such as Escherichia coli or Salmonella typhimurium, there are two forms of alanine racemase: a biosynthetic form (alr) required for cell wall formation and a form (dadB) that functions in L-alanine catabolism. In contrast to dadB and alr which are monomeric enzymes, the alanine racemase of Bacillaceae are homodimers.
