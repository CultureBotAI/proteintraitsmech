identifier: PROSITE:PDOC00433
label: "Thymosin beta-4 family"
definition: >-
  Thymosin beta-4 family signature. Thymosin beta-4 is a polypeptide of 43 amino acid residues which plays an important role in the organization of the cytoskeleton. It binds to and sequesters actin monomers (G actin) and therefore inhibits actin polymerization.
