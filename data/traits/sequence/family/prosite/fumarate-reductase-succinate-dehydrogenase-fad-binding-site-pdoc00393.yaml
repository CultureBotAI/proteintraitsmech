identifier: PROSITE:PDOC00393
label: "Fumarate reductase / succinate dehydrogenase FAD-binding site"
definition: >-
  Fumarate reductase / succinate dehydrogenase FAD-binding site. In bacteria two distinct, membrane-bound, enzyme complexes are responsible for the interconversion of fumarate and succinate (EC 1.3.99.1): fumarate reductase (Frd) is used in anaerobic growth, and succinate dehydrogenase (Sdh) is used in aerobic growth. Both complexes consist of two main components: a membrane-extrinsic component composed of a FAD-binding flavoprotein and an iron-sulfur protein; and an hydrophobic component composed of a membrane anchor protein and/or a cytochrome B.
