identifier: PROSITE:PDOC51891
label: CENP-V/GFA
definition: >-
  CENP-V/GFA domain profile. Centrome protein (CENP)-V is a kinetochore protein that drives the progression of mitosis by coordinating chromatin condensation, positioning of sister chromatid centromeres and targeting of the chromosome passager complex (CPC), a machinery that regulates the attachment of spindle microtubules (MTs) to kinetochores. CENP-V homologues are found in all vertebrates as well as in plants and nematodes.
