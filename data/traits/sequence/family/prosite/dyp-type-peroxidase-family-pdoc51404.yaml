identifier: PROSITE:PDOC51404
label: "DyP-type peroxidase family"
definition: >-
  DyP-type peroxidase family. Heme peroxidases were originally divided into two superfamilies, namely, the animal peroxidases and the plant peroxidases (class I, II and III), which include fungal (class II) and bacterial peroxidases. The DyP (for dye-decolorizing peroxidase) family constitutes a novel class of heme peroxidase. Because these enzymes were derived from fungal sources, the DyP family was thought to be structurally related to the class II secretory fungal peroxidases.
