identifier: PROSITE:PDOC00783
label: "Coproporphyrinogen III oxidase"
definition: >-
  Coproporphyrinogen III oxidase signature. Coproporphyrinogen III oxidase (EC 1.3.3.3) (coproporphyrinogenase) catalyzes the oxidative decarboxylation of coproporphyrinogen III into protoporphyrinogen IX, a common step in the pathway for the biosynthesis of porphyrins such as heme, chlorophyll or cobalamin.
