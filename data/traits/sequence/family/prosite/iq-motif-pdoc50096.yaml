identifier: PROSITE:PDOC50096
label: "IQ motif"
definition: >-
  IQ motif profile. The IQ motif is an extremely basic unit of about 23 amino acids, whose conserved core usually fits the consensus A-x(3)-I-Q-x(2)-F-R-x(4)-K-K. The IQ motif, which can be present in one or more copies, serves as a binding site for different EF-hand proteins (see <PDOC00018>) including the essential and regulatory myosin light chains, calmodulin (CaM), and CaM-like proteins. Many IQ motis are protein kinase C (PKC) phosphorylation sites.
