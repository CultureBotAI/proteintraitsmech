identifier: PROSITE:PDOC00589
label: "Phosphoglucomutase and phosphomannomutase phosphoserine"
definition: >-
  Phosphoglucomutase and phosphomannomutase phosphoserine signature. - Phosphoglucomutase (EC 5.4.2.2) (PGM). PGM is an enzyme responsible for the conversion of D-glucose 1-phosphate into D-glucose 6-phosphate. PGM participates in both the breakdown and synthesis of glucose. - Phosphomannomutase (EC 5.4.2.8) (PMM). PMM is an enzyme responsible for the conversion of D-mannose 1-phosphate into D-mannose 6-phosphate. PMM is required for different biosynthetic pathways in bacteria.
