identifier: PROSITE:PDOC50016
label: "Zinc finger PHD-type"
definition: >-
  Zinc finger PHD-type signature and profile. The Plant Homeodomain (PHD) type zinc finger (C4HC3) is found in nuclear proteins thought to be involved in chromatin-mediated transcriptional regulation. The PHD finger motif is reminiscent of, but distinct from the C3HC4-type RING finger. A general function of the PHD finger is not yet known, but in the CREB-binding protein (CBP) it is an integral part of the enzymatic core of the acetyltransferase domain and is also a key contributor to the transcriptional activity of CBP.
