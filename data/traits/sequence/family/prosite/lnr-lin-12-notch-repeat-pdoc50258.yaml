identifier: PROSITE:PDOC50258
label: "LNR (Lin-12/Notch) repeat"
definition: >-
  LNR (Lin-12/Notch) repeat profile. The Lin-12/Notch proteins act as transmembrane receptors for intercellular signals that specify cell fates during animal development. In response to ligand, proteolytic cleavages release the intracellular domain of Notch, which then gains access to the nucleus and acts as a transcriptional co-activator. The Lin-12/Notch repeat (LNR) is a region present only in Notch related proteins. The LNR is supposed to negatively regulates the Lin-12/Notch proteins activity, and participates in maintaining the receptor in its resting conformation prior to ligand binding.
