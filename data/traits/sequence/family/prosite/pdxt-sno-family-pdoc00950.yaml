identifier: PROSITE:PDOC00950
label: "PdxT/SNO family"
definition: >-
  PdxT/SNO family signature and profile. The term vitamin B6 is used to refer collectively to the compound pyridoxine and its vitameric forms, pyridoxal, pyridoxamine, and their phosphorylated derivatives. Vitamin B6 is required by all organisms and plays an essential role as a co-factor for enzymatic reactions. Plants, fungi, bacteria, archaebacteria, and protists synthetize vitamin B6. Animals and some highly specialized obligate pathogens obtain it nutritionally. Vitamin B6 has two distinct biosynthetic pathways, which do not coexist in any organism. The pdxA/pdxJ pathway, that has been extensively characterized in Escherichia coli, is found in the gamma subdivision of the proteobacteria.
