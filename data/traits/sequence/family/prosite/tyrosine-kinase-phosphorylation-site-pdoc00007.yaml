identifier: PROSITE:PDOC00007
label: "Tyrosine kinase phosphorylation site"
definition: >-
  Tyrosine kinase phosphorylation sites. Substrates of tyrosine protein kinases are generally characterized by a lysine or an arginine seven residues to the N-terminal side of the phosphorylated tyrosine. An acidic residue (Asp or Glu) is often found at either three or four residues to the N-terminal side of the tyrosine. There are a number of exceptions to this rule such as the tyrosine phosphorylation sites of enolase and lipocortin II.
