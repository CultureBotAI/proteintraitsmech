label: "Aldose 1-epimerase putative active site"
definition: >-
  Aldose 1-epimerase putative active site. Aldose 1-epimerase (EC 5.1.3.3) (mutarotase) is the enzyme responsible for the anomeric interconversion of D-glucose and other aldoses between their alpha- and beta-forms.
