identifier: PROSITE:PDOC51843
label: "Nuclear receptor (NR) ligand-binding (LBD)"
definition: >-
  Nuclear receptor (NR) ligand-binding (LBD) domain profile. Nuclear receptors (NRs), such as the receptors for steroids and thyroid hormones, retinoids and vitamin D3, are one of the most abundant classes of transcriptional regulators in animals (metazoans). They regulate diverse functions, such as homeostasis, reproduction, development and metabolism. The most prominent feature differentiating them from other transcription factors is their capacity to bind small hydrophobic molecules specifically. These ligands constitute regulatory signals, which modify the NR transcriptional activity through conformational changes.
