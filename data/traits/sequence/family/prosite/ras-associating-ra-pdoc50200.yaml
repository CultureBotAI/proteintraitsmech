identifier: PROSITE:PDOC50200
label: "Ras-associating (RA)"
definition: >-
  Ras-associating (RA) domain profile. Ras proteins are signal-transducing GTPases that cycle between inactive GDP- bound and active GTP-bound forms. Ras is a prolific signalling molecule interacting with a spectrum of effector molecules and acting through more than one signalling pathway. A domain of about 100 residues, termed RA for RalGDS/AF-6 or Ras-Associating, interacts with Ras and other small GTPases. It occurs in one or two copies in a variety of signalling molecules.
