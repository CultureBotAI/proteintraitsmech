identifier: PROSITE:PDOC00814
label: "Sigma-70 factors ECF subfamily"
definition: >-
  Sigma-70 factors ECF subfamily signature. Sigma factors are bacterial transcription initiation factors that promote the attachment of the core RNA polymerase to specific initiation sites and are then released. They alter the specificity of promoter recognition. Most bacteria express a multiplicity of sigma factors. With regards to sequence similarity, sigma factors can be grouped into two classes: the sigma-54 and sigma-70 families. The sigma-70 family includes, in addition to the primary sigma factor, a wide variety of sigma factors. It also includes a divergent subfamily that regulates gene encoding for proteins with extracytoplasmic function.
