identifier: PROSITE:PDOC00278
label: "Legume lectins beta-chain"
definition: >-
  Legume lectins signatures. Leguminous plants synthesize sugar-binding proteins which are called legume lectins. These lectins are generally found in the seeds. The exact function of legume lectins is not known but they may be involved in the attachment of nitrogen-fixing bacteria to legumes and in the protection against pathogens. Legume lectins bind calcium and manganese (or other transition metals).
