label: "Small heat shock protein (sHSP)"
definition: >-
  Small heat shock protein (sHSP) domain profile. Prokaryotic and eukaryotic organisms respond to heat shock or other environmental stress by inducing the synthesis of proteins collectively known as heat-shock proteins (HSP). According to their molecular weight, HSPs are classified into several families such as HSP100, HSP90, HSP70, HSP60, and small HSPs (sHSPs) with molecular size ranging from 15 to 30 kDas. These seem to act as chaperones that can protect other proteins against heat-induced denaturation and aggregation. sHSP proteins seem to form large heterooligomeric aggregates; their family is currently composed of the following members:
