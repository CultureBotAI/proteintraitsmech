identifier: PROSITE:PDOC00078
label: "Extradiol ring-cleavage dioxygenases"
definition: >-
  Extradiol ring-cleavage dioxygenases signature. Dioxygenases catalyze the incorporation of both atoms of molecular oxygen into substrates. Cleavage of aromatic rings is one of the most important function of dioxygenases. The substrates of ring-cleavage dioxygenases can be classified into two groups according to the mode of scission of the aromatic ring. Intradiol enzymes cleave the aromatic ring between two hydroxyl groups, whereas extradiol enzymes cleave the aromatic ring between a hydroxylated carbon and another adjacent nonhydroxylated carbon. Extradiol dioxygenases are usually homomultimeric, bind one atom of ferrous ion per subunit and have a subunit size of about 33 Kd.
