label: "Respiratory chain NADH dehydrogenase 30 Kd subunit"
definition: >-
  Respiratory-chain NADH dehydrogenase 30 Kd subunit signature. Respiratory-chain NADH dehydrogenase (EC 1.6.5.3) (also known as complex I or NADH-ubiquinone oxidoreductase) is an oligomeric enzymatic complex located in the inner mitochondrial membrane which also seems to exist in the chloroplast and in cyanobacteria (as a NADH-plastoquinone oxidoreductase). Among the 25 to 30 polypeptide subunits of this bioenergetic enzyme complex there is one with a molecular weight of 30 Kd (in mammals) which has been found to be:
