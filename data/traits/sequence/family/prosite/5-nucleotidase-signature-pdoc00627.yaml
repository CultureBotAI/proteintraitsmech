definition: >-
  5'-nucleotidase signatures. 5'-nucleotidases (EC 3.1.3.5) are enzymes that catalyze the hydrolysis of phosphate esterified at carbon 5' of the ribose and deoxyribose portions of nucleotide molecules. 5'-nucleotidase is a ubiquitous enzyme found in a wide variety of species and which occurs in different cellular locations. The sequences of the following 5'-nucleotidases are currently known:
