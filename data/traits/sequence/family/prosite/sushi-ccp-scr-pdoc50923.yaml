identifier: PROSITE:PDOC50923
label: Sushi/CCP/SCR
definition: >-
  Sushi/CCP/SCR domain profile. The extracellular sushi domain is characterized by a consensus sequence spanning ~60 residues containing four invariant cysteine residues forming two disulfide-bridges (I-III and II-IV), a highly conserved tryptophan, and conserved glycine, proline, and hydrophobic residues. Sushi domains are known to be involved in many recognition processes, including the binding of several complement factors to fragments C3b and C4b. The sushi domain is also known as the complement controle protein (CCP) module or the short consensus repeat (SCR).
