label: "D-alanine--D-alanine ligase signature"
definition: >-
  D-alanine--D-alanine ligase signatures. D-alanine--D-alanine ligase (EC 6.3.2.4) is a bacterial enzyme involved in cell-wall biosynthesis. It participates in forming UDP-N-acetylmuramyl pentapeptide, the peptidoglycan precursor.
