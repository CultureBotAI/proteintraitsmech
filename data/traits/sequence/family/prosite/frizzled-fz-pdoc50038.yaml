label: "Frizzled (fz)"
definition: >-
  Frizzled (fz) domain profile. The frizzled (fz) domain is an extracellular domain of about 120 amino acids. It was first identified in the alpha-1 chain of type XVIII collagen and in members of the Frizzled family of seven transmembrane (7TM) proteins which act as receptors for secreted Wingless (Wg)/Wnt glycoproteins (see <PDOC00219>). In addition to these proteins, one or two copies of the fz domain are also found in:
