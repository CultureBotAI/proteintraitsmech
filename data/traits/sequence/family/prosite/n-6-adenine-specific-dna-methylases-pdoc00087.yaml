identifier: PROSITE:PDOC00087
label: "N-6 Adenine-specific DNA methylases"
definition: >-
  N-6 Adenine-specific DNA methylases signature. N-6 adenine-specific DNA methylases (EC 2.1.1.72) (A-Mtase) are enzymes that specifically methylate the amino group at the C-6 position of adenines in DNA. Such enzymes are found in the three existing types of bacterial restriction- modification systems (in type I system the A-Mtase is the product of the hsdM gene, and in type III it is the product of the mod gene). All of these enzymes recognize a specific sequence in DNA and methylate an adenine in that sequence.
