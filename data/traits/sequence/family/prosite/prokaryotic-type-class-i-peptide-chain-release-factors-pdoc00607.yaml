identifier: PROSITE:PDOC00607
label: "Prokaryotic-type class I peptide chain release factors"
definition: >-
  Prokaryotic-type class I peptide chain release factors signature. Peptide chain release factors (RFs) are required for the termination of protein biosynthesis. At present two classes of RFs can be distinguished. Class I RFs bind to ribosomes that have encountered a stop codon at their decoding site and induce release of the nascent polypeptide. Class II RFs are GTP-binding proteins that interact with class I RFs and enhance class I RF activity.
