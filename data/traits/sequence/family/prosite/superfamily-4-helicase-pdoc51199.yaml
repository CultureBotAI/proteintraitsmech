identifier: PROSITE:PDOC51199
label: "Superfamily 4 helicase"
definition: >-
  Superfamily 4 helicase domain profile. Helicases have been classified in 5 superfamilies (SF1-SF5). All of the proteins bind ATP and, consequently, all of them carry the classical Walker A (phosphate-binding loop or P-loop) (see <PDOC00017>) and Walker B (Mg2+-binding aspartic acid) motifs. Superfamily 4 helicase, related to bacterial dnaB proteins, comprises a relatively small compact family of proteins containing, in addition to Walker A and B, three distinct conserved motifs which are not present in other helicase superfamilies. SF4 is a hexameric helicase that function mainly in bacterial or bacteriophage DNA replication.
