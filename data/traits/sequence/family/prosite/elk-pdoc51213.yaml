identifier: PROSITE:PDOC51213
label: ELK
definition: >-
  ELK domain profile. Homeobox genes, which encode homeodomain (HD) (see <PDOC00027>) transcription factors, are known to be key regulators of both plant and animal development. In plants homeobox genes are divided into several groups by sequences, one of which is the KNOX (for knotted1-type homeobox) family. Proteins of this family share other conserved domains, the KNOX domain and ELK domain, which is immediately upstream of the HD. The ELK domain spans ~21 amino acids and was dubbed for a highly conserved series of Glu, Leu, and Lys amino acids. It could function as a nuclear localization signal.
