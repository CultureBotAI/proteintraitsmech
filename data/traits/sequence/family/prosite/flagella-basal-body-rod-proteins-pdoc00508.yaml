identifier: PROSITE:PDOC00508
label: "Flagella basal body rod proteins"
definition: >-
  Flagella basal body rod proteins signature. Many bacterial species swim actively by means of flagella. The flagella organelle is made of three parts: the basal body, the hook and the filament. The basal body consists of four rings (L,P,S, and M) mounted on a central rod. In Salmonella typhimurium and related organisms the rod has been shown to consist of four different, yet evolutionary related proteins: in the distal portion of the rod there are about 26 subunits of protein flgG and in the proximal portion there are about 6 subunits each of proteins flgB, flgC, and flgF.
