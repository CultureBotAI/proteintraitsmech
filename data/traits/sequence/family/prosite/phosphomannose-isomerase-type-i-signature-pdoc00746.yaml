identifier: PROSITE:PDOC00746
label: "Phosphomannose isomerase type I signature"
definition: >-
  Phosphomannose isomerase type I signatures. Phosphomannose isomerase (EC 5.3.1.8) (PMI) is the enzyme that catalyzes the interconversion of mannose-6-phosphate and fructose-6-phosphate. In eukaryotes, it is involved in the synthesis of GDP-mannose which is a constituent of N- and O-linked glycans as well as GPI anchors. In prokaryotes, it is involved in a variety of pathways including capsular polysaccharide biosynthesis and D-mannose metabolism.
