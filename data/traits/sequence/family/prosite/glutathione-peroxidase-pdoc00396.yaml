identifier: PROSITE:PDOC00396
label: "Glutathione peroxidase"
definition: >-
  Glutathione peroxidases signatures and profile. Glutathione peroxidase (EC 1.11.1.9) (GSHPx) is an enzyme that catalyzes the reduction of hydroxyperoxides by glutathione. Its main function is to protect against the damaging effect of endogenously formed hydroxyperoxides.
