label: "Sodium:neurotransmitter symporter family"
definition: >-
  Sodium:neurotransmitter symporter family signatures and profile. After their release by synapses the action of a number of neurotransmitters is terminated by their high affinity sodium-dependent reuptake into presynaptic terminals by specific transport proteins. These proteins are the target of psychomotor stimulants such as amphetamines or cocaine. All these proteins belong to a family, known as the sodium:neurotransmitter symporter family (SNF), that also include some transporters that function outside the brain and carry related molecules. The SNF family is currently known to consist of transporters for:
