identifier: PROSITE:PDOC00202
label: "Neuraxin and MAP1B proteins repeated region"
definition: >-
  Neuraxin and MAP1B proteins repeated region signature. MAP1B, and neuraxin are neuronal microtubule-binding proteins. Both proteins contain a region that consists of 12 tandem repeats of a 17 residues motif.
