label: YTH
definition: >-
  YTH domain profile. The YTH (for YT521-B homology) is a 100-150-residue domain that has been identified in the mammalian pre-mRNA splicing factor YT521-B and its Drosophila and yeast homologues. The YTH domain is found in a number of eukaryotic nuclear proteins of unknown function that could be involved in RNA binding. It is particularly abundant in plants. The YTH domain is usually located in the middle of the protein sequence. It has been predicted that the biological function of the YTH domain is to bind to RNA.
