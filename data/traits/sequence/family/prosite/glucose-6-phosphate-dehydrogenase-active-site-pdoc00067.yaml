identifier: PROSITE:PDOC00067
label: "Glucose-6-phosphate dehydrogenase active site"
definition: >-
  Glucose-6-phosphate dehydrogenase active site. Glucose-6-phosphate dehydrogenase (EC 1.1.1.49) (G6PD) catalyzes the first step in the pentose pathway, the reduction of glucose-6-phosphate to gluconolactone 6-phosphate. A lysine residue has been identified as a reactive nucleophile associated with the activity of the enzyme. The sequence around this lysine is totally conserved from bacterial to mammalian G6PD's and can be used as a signature pattern.
