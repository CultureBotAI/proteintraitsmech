identifier: PROSITE:PDOC51479
label: "RTR1-type zinc finger"
definition: >-
  Zinc finger RTR1-type profile. Proper RNA processing involves the recruitment of a wide variety of accessory proteins to the C-terminal domain (CTD) of the largest subunit of RNA polymerase II (RNAPII), Rpb1. One regulatory mechanism involves reversible phosphorylation of the C-terminal domain within RNAPII. The eukaryotic protein family Rtr1/RPAP2 interacts with the CTD of RNAPII. It has been shown in yeast that Rtr1 is a CTD phosphatase that regulates RNAPII during the transition from serine 5 to serine 2 phosphorylation. In addition to Rtr1, the phosphatases Ssu72 and Fcp1 (see <PDOC50969>) also play an important role in the regulation of CTD phosphorylation.
