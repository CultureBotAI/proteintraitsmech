identifier: PROSITE:PDOC51879
label: RST
definition: >-
  RST domain profiles. The RST (for RCD1 SRO TAF4) domain is a plant-specific domain found in WWE- PARPs (poly(ADP-ribose) polymerase) (see <PDOC50918> and <PDOC51059>) and TAF4s (TBP-Associated Factor 4), a component of several multimeric protein complexes including primarily the general transcription factor TFIID involved in transcriptional initiation. The RST domain is a protein-protein interaction domain suggested to be critical for the interaction with several, mostly plant-specific transcription factors.
