identifier: PROSITE:PDOC00573
label: "D-amino acid oxidases"
definition: >-
  D-amino acid oxidases signature. D-amino acid oxidase (EC 1.4.3.3) (DAMOX or DAO) is an FAD flavoenzyme that catalyzes the oxidation of neutral and basic D-amino acids into their corresponding keto acids. DAOs have been characterized and sequenced in fungi and vertebrates where they are known to be located in the peroxisomes.
