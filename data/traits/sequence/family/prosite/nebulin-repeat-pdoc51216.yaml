identifier: PROSITE:PDOC51216
label: "Nebulin repeat"
definition: >-
  Nebulin repeat profile. The nebulin-like motif or nebulin repeat is a tandemly repeated actin-binding module of about 35 amino acids. The repeat is named after the nebulin protein, which is a large protein specific for vertebrate skeletal muscle that may regulate the length of thin filaments. Nebulin contains about 185 copies of the repeat and those in the central part of nebulin are organized into seven-module super-repeats, which seems to reflect an interaction with tropomysin/troponin. Nebulin repeats occur in metazoan actin-binding proteins, most of which are specific for muscle tissues.
