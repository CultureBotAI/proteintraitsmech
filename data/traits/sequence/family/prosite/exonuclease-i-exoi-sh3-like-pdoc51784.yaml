identifier: PROSITE:PDOC51784
label: "Exonuclease I (ExoI) SH3-like"
definition: >-
  Exonuclease I (ExoI) SH3-like and C-terminal domains profiles. In bacteria, exonuclease I (ExoI) is a monomeric processive 3'-5' exonuclease that degrades single-stranded DNA. The enzyme has been implicated as primarily being involved in repairing frameshift mutations. ExoI consists of three domains: an N-terminal nuclease domain with homology to the proofreading domain of E. coli DNA polymereae I and other DnaQ superfamily enzymes, a central domain with a portion that resembles an SH3 domain fold and a C- terminal alpha-helical domain.
