identifier: PROSITE:PDOC51978
label: PBC
definition: >-
  PBC domain profile. The homeobox transcription factors (TFs) are ubiquitous in eukaryotes, carrying a DNA-binding homeodomain typically 60 amino acids that folds into three alpha-helices. Homeodomain proteins are classified into different classes based on the sequence of the homeodomain itself, as well as on the basis of additional conserved domains found in these proteins. The atypical or TALE (three-amino acid length extension) superclass of homeobox TFs shares a three-amino-acid insertion between helix 1 and 2 and plays essential roles during embryonic development by participating in interactive TF networks.
