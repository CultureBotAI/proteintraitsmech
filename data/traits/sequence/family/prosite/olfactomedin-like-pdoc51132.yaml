identifier: PROSITE:PDOC51132
label: Olfactomedin-like
definition: >-
  Olfactomedin-like domain profile. The olfactomedin-like or OLF domain is a module of ~260 residues present in metazoan secreted glycoproteins with a characteristic tissue-specific expression. The domain is named after bullfrog olfactomedin, an extracellular matrix protein of olfactory neuroepithelium, whereof it forms the C-terminal part. Other proteins of the olfactomedin family contain the OLF domain in the C-terminal part, while the N-terminus is more variable.
