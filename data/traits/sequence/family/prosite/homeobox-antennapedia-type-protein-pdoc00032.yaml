identifier: PROSITE:PDOC00032
label: "'Homeobox' antennapedia-type protein"
definition: >-
  'Homeobox' antennapedia-type protein signature. The homeotic Hox proteins are sequence-specific transcription factors. They are part of a developmental regulatory system that provides cells with specific positional identities on the anterior-posterior (A-P) axis. The hox proteins contain a 'homeobox' domain. In Drosophila and other insects, there are eight different Hox genes that are encoded in two gene complexes, ANT-C and BX-C. In vertebrates there are 38 genes organized in four complexes.
