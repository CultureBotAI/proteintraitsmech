identifier: PROSITE:PDOC00196
label: "Clathrin light chain signature"
definition: >-
  Clathrin light chains signatures. Clathrin is the major coat-forming protein that encloses vesicles such as coated pits and forms cell surface patches involved in membrane traffic within eukaryotic cells. The clathrin coats (called triskelions) are composed of three heavy chains (180 Kd) and three light chains (23 to 27 Kd).
