label: "Alkylbase DNA glycosidases alkA family"
definition: >-
  Alkylbase DNA glycosidases alkA family signature. Alkylbase DNA glycosidases are DNA repair enzymes that hydrolyzes the deoxyribose N-glycosidic bond to excise various alkylated bases from a damaged DNA polymer.
