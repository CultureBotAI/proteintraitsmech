identifier: PROSITE:PDOC00483
label: "Eukaryotic mitochondrial porin"
definition: >-
  Eukaryotic mitochondrial porin signature. The major protein of the outer mitochondrial membrane of eukaryotes is a porin that forms a voltage-dependent anion-selective channel (VDAC) that behaves as a general diffusion pore for small hydrophilic molecules. The channel adopts an open conformation at low or zero membrane potential and a closed conformation at potentials above 30-40 mV.
