identifier: PROSITE:PDOC00624
label: "Transcription factor TFIIB repeat"
definition: >-
  Transcription factor TFIIB repeat signature. In eukaryotes the initiation of transcription of protein encoding genes by polymerase II is modulated by general and specific transcription factors. The general transcription factors operate through common promoters elements (such as the TATA box). At least seven different proteins associates to form the general transcription factors: TFIIA, -IIB, -IID, -IIE, -IIF, -IIG, and -IIH.
