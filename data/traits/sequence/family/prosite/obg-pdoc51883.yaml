identifier: PROSITE:PDOC51883
label: Obg
definition: >-
  Obg domain profile. Obg (spo0B-associated GTP-binding) proteins (also known as ObgE, YhbZ and CgtA) are a subfamily of P-loop GTPases, conserved from bacteria to eukaryotes. Like other GTPases, Obg proteins cycle between a GTP-bound ON and a GDP-bound OFF state, thereby controlling cellular processes. Obg proteins have been attributed a host of cellular functions, including roles in essential cellular processes (DNA replication, ribosome maturation) and roles in different stress adaptation pathways (stringent response, sporulation, general stress response). Obg GTPases function in ribosome maturation in eubacteria, mitochondria of yeast and human nuclei.
