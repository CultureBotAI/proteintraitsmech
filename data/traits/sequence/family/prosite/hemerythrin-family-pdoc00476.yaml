identifier: PROSITE:PDOC00476
label: "Hemerythrin family"
definition: >-
  Hemerythrin family signature. Marine invertebrates such as annelids or sipunculans possess two completely different types of oxygen binding proteins: globins which are found in the blood and hemerythrins which are found in the vascular system and the coelemic fluid or in muscles (myohemerythrins). Hemerythrins and myohemerythrins are small proteins of about 110 to 129 amino acid residues that bind two iron atoms. Five histidines, one glutamic acid and one aspartic acid are involved in the binding of the iron atoms.
