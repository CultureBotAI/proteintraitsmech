identifier: PROSITE:PDOC51484
label: G8
definition: >-
  G8 domain profile. The G8 (for eight conserved glycine residues) domain is widely distributed, being found in proteins from various animals (from Strongylocentrotus purpuratus to Homo sapiens), lower eukaryotes (such as Dictyostelium discoideum and Tetrahymena thermophila) and bacteria (such as the alpha- proteobacteria Nitrobacter hamburgensis, gamma-proteobacterium Hahella chejuensis and the green non-sulfur bacterium Chloroflexus aurantiacus) but absent in plants, viruses and archaea. Many G8-containing proteins are integral membrane proteins with signal peptides and/or transmembrane segments, and others lacking TM domain may be secreted.
