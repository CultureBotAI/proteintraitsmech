identifier: PROSITE:PDOC00779
label: "Glycoprotease family"
definition: >-
  Glycoprotease family signature. Glycoprotease (GCP) (EC 3.4.24.57), or o-syaloglycoprotein endopeptidase, is a metalloprotease secreted by Pasteurella haemolytica which specifically cleaves O-sialoglycoproteins such as glycophorin A. The sequence of GCP is highly similar to uncharacterized orthologs in most complete genomes of bacteria and archaebacteria as well as in yeast (QRI7 and YKR038c).
