identifier: PROSITE:PDOC51223
label: "MAP repeat"
definition: >-
  MAP repeat profile. Map (MHC class II analogous protein), also known as eap (extracellular adherence protein) and p70, is exclusively found in Staphylococcus aureus. It is a cell-wall associated protein, which is capable of binding to a number of different extracellular matrix glycoploteins and plasma proteins, and to the cell surface of Staphylococcus aureus.
