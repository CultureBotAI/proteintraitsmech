label: "RNA polymerases beta chain"
definition: >-
  RNA polymerases beta chain signature. DNA-dependent RNA polymerases (EC 2.7.7.6) are ubiquitous enzymes necessary for the transcription of genomic DNA into RNA. Most RNA polymerases are multimeric enzymes and are composed of a variable number of subunits. However the two largest subunits (generally known as alpha and beta chains) are present in all known multimeric RNA polymerases. The beta chain is currently known in:
