identifier: PROSITE:PDOC00529
label: "Ketosynthase family 3 (KS3)"
definition: >-
  Ketosynthase family 3 (KS3) active signature and domain profile. In all organisms studied to date, fatty acid synthases (FASs) and polyketide synthases (PKSs) are closely related and have a common evolutionary history. FASs and PKSs share a similar enzymatic domain structure in which acyl transferase (AT), ketosynthase (KS) and an acyl carrier protein (ACP) form the core structure for condensation of acyl units, and are essential for both PKSs and FASs. The other domains, ketoreductases (KR), enoyl reductase (ER) and dehydratase (DH) modify the acyl units after condensation, which is essential for FASs, but selectively present/absent in PKS.
