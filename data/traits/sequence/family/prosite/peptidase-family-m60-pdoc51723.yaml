identifier: PROSITE:PDOC51723
label: "Peptidase family M60"
definition: >-
  Peptidase family M60 domain profile. The peptidase family M60 domain belongs to the zincin superfamily of zinc- requiring metalloproteases (clan MA, subclan MA(E)). The peptidase family M60 domain contains the metal-binding consensus motif HExxH. The two histidine residues are ligands of the catalytic Zn(2+) and the glutamic acid residue is involved in nucleophilic attack. An additional conserved glutamic acid is found approximately 20 residues from the first histidine within the metal- binding motif. The second conserved glutamic acid potentially acts as a third proteous Zn(2+) ligand. The peptidase family M60 domain targets complex host glycoproteins, such as mucins.
