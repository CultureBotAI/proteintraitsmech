identifier: PROSITE:PDOC00556
label: "Ribosomal protein S13"
definition: >-
  Ribosomal protein S13 signature and profile. Ribosomal protein S13 is one of the proteins from the small ribosomal subunit. In Escherichia coli, S13 is known to be involved in binding fMet-tRNA and, hence, in the initiation of translation. It is a basic protein of 115 to 177 amino-acid residues.
