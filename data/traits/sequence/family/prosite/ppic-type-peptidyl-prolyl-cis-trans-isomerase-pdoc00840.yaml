identifier: PROSITE:PDOC00840
label: "PpiC-type peptidyl-prolyl cis-trans isomerase"
definition: >-
  PpiC-type peptidyl-prolyl cis-trans isomerase signature and profile. Peptidyl-prolyl cis-trans isomerase (EC 5.2.1.8) (PPIase or rotamase) is an enzyme that accelerates protein folding by catalyzing the cis-trans isomerization of proline imidic peptide bonds in oligopeptides. Most characterized PPiases belong to two families, the cyclophilin-type (see <PDOC00154>) and the the FKBP-type (see <PDOC00426>). Recently a third family has been discovered.
