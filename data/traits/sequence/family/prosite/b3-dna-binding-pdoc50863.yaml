identifier: PROSITE:PDOC50863
label: "B3 DNA-binding"
definition: >-
  B3 DNA-binding domain profile. The B3 domain is an about 120-amino acid residue region defined originally as the third basic region of maize VP1, which shares the largest contiguous block of sequence identity with its ortholog, Arabidopsis ABI3. The B3 domain, which has also been called REM domain, is found only in higher plant species. It is characteristic of several transcription factors and has been shown to possess a highly cooperative, sequence-specific DNA-binding activity. The B3 domain can be found in one or more copies and in association with other domains, such as the AP2 DNA-binding domain, an acidic domain or the Aux/IAA-ARF domain (see <PDOC51745>).
