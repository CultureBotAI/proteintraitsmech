identifier: PROSITE:PDOC00837
label: "Adenylate cyclase class-I signature"
definition: >-
  Adenylate cyclase class-I signatures. Adenylate cyclase (EC 4.6.1.1) is the enzyme responsible for the synthesis of cAMP from ATP. From sequence data, it has been proposed that there are three different classes of adenylate cyclases. Class I cyclases are found in enterobacteria and related Gram-negative bacteria. They are proteins of about 850 residues that consist of two functional domains: a N-terminal catalytic domain and a C-terminal regulatory domain.
