identifier: PROSITE:PDOC00019
label: "Actinin-type actin-binding domain signature"
definition: >-
  Actinin-type actin-binding domain signatures. Alpha-actinin is a F-actin cross-linking protein which is thought to anchor actin to a variety of intracellular structures. The actin-binding domain of alpha-actinin seems to reside in the first 250 residues of the protein. A similar actin-binding domain has been found in the N-terminal region of many different actin-binding proteins:
