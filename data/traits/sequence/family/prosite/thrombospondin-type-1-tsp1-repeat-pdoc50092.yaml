identifier: PROSITE:PDOC50092
label: "Thrombospondin type-1 (TSP1) repeat"
definition: >-
  Thrombospondin type-1 (TSP1) repeat profile. The thrombospondin type-1 repeat (TSP1) was first identified as an about 55 amino acids long module present in thrombospondin 1 and 2 and in the circumsporozoite (CS) protein of Plasmodium. Since, a number of proteins involved in the complement pathway (properdin, C6, C7, C8A, C8B, C9) as well as extracellular matrix proteins like ADAMTS (see <PDOC50215>), mindin, F- spondin or SCO-spondin and TRAP proteins of Plasmodium have been found to contain one to seven TSP1s. Within these TSP1 modules, the WSXW and CSVTCG motifs are highly conserved although not ubiquitous. TSP1s may bind both protein and glycoconjugate ligands.
