label: "Thymidine kinase cellular-type"
definition: >-
  Thymidine kinase cellular-type signature. Thymidine kinase (TK) (EC 2.7.1.21) is an ubiquitous enzyme that catalyzes the ATP-dependent phosphorylation of thymidine. A comparison of TK sequences has shown that there are two different families of TK. One family groups together TK from herpesviruses as well as cellular thymidylate kinases, while the second family currently consists of TK from the following sources:
