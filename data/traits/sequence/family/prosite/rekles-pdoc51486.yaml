identifier: PROSITE:PDOC51486
label: REKLES
definition: >-
  REKLES domain profile. Members of the ARID (AT-rich interaction domain) (see <PDOC51011>) family of DNA-binding proteins are found in fungi and invertebrate and vertebrate metazoans. Bright/ARID3a and the other two members (Bdp/ARID3b and Bright- like/ARID3c) have been described as the "extended" or eARID subfamily, having additional conserved sequences at both the N and C termini of the core ARID domain. In addition to the conserved regions immediately adjacent to the core ARID, the eARID proteins also share a conserved motif C-terminal to the ARID, named the REKLES domain after a conserved amino acid motif. The REKLES domain has not been found in any non-ARID proteins.
