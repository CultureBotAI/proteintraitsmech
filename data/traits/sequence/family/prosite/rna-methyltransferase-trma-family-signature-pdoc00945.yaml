label: "RNA methyltransferase trmA family signature"
definition: >-
  RNA methyltransferase trmA family signatures. In Escherichia coli, the trmA protein is a tRNA (uracil-5-)-methyltransferase (EC 2.1.1.35) that catalyzes the S-adenosylmethionine dependent methylation of U54 in all tRNAs. Orthologs of trmA are found in many eubacterial species. A number of uncharacterized homologs of trmA have been found:
