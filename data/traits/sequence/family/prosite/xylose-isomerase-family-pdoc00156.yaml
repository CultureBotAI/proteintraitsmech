identifier: PROSITE:PDOC00156
label: "Xylose isomerase family"
definition: >-
  Xylose isomerase family profile. Xylose isomerase (EC 5.3.1.5) is an enzyme found in microorganisms which catalyzes the interconversion of an aldo sugar D-xylose to a keto sugar D-xylulose. It can also isomerize D-ribose to D-ribulose and D-glucose to D-fructose. Xylose isomerase seems to require magnesium for its activity, while cobalt is necessary to stabilize the tetrameric structure of the enzyme.
