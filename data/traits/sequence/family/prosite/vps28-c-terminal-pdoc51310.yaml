identifier: PROSITE:PDOC51310
label: "VPS28 C-terminal"
definition: >-
  VPS28 C-terminal domain profile. The endosomal sorting complex I required for transport (ESCRT-I) is composed of the three subunits VPS23/TSG101, VPS28 and VPS37. ESCRT-I is recruited to cellular membranes during multivesicular endosome biogenesis and by enveloped viruses such as HIV-1 to mediate budding from the cell. The C-terminal domain of VPS28 is characterized by a high-sequence conservation throughout all kingdoms of life. It does not directly participate in ESCRT-I assembly (see <PDOC51312>) but serves as an adaptor module linked to the ESCRT-I complex that connects its function to other components of the VPS machinery, including ESCRT-III VPS20.
