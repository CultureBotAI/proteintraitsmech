label: "Glycoside hydrolase family 168 (GH168)"
definition: >-
  CAZy glycoside hydrolase family 168 (GH168) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: fucan endo-a-1,3-(2-sulfo)-fucosidase, fucan endo-a-1,4-(2-sulfo)-fucosidase, fucan (Ib) endo-a-1,3-L-fucosidase.
