label: "Glycoside hydrolase family 176 (GH176)"
definition: >-
  CAZy glycoside hydrolase family 176 (GH176) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: starch endo-a-1,6-glucosidase.
