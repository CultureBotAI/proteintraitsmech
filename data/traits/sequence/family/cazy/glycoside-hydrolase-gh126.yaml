identifier: CAZy:GH126
label: "Glycoside hydrolase family 126 (GH126)"
definition: >-
  CAZy glycoside hydrolase family 126 (GH126) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: amylose endo-a-1,4-glucosidase.
