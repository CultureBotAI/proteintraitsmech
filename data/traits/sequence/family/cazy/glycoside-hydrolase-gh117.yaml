identifier: CAZy:GH117
label: "Glycoside hydrolase family 117 (GH117)"
definition: >-
  CAZy glycoside hydrolase family 117 (GH117) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-F (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: 5-fold β-propeller. Representative activities: b-galactofuranosidase, agarose exo-a-1,3-anhydro-L-galactosidase, agarobiose exo-a-1,3-anhydro-L-galactosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH-F
xrefs:
  - EC:3.2.1.146
  - EC:3.2.1.159
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Hydrolysis of the 1,3-alpha-L-galactosidic linkages of neoagaro- oligosaccharides that are smaller than a hexamer, yielding 3,6-anhydro-L- galactose and D-galactose
    source: "mapped enzyme EC:3.2.1.159"
