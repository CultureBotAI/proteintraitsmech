identifier: CAZy:GH120
label: "Glycoside hydrolase family 120 (GH120)"
definition: >-
  CAZy glycoside hydrolase family 120 (GH120) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: parallel β-helix. Representative activities: xylan exo-b-1,4-xylosidase.
