identifier: CAZy:GH86
label: "Glycoside hydrolase family 86 (GH86)"
definition: >-
  CAZy glycoside hydrolase family 86 (GH86) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: agarose endo-b-1,4-galactosidase, porphyran endo-b-1,4-galactosidase, funoran endo-b-1,4-(6-sulfo)-galactosidase.
