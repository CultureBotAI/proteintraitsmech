label: "Glycoside hydrolase family 136 (GH136)"
definition: >-
  CAZy glycoside hydrolase family 136 (GH136) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: parallel β-helix. Representative activities: antigen b-1,3-lacto-N-biosidase, lewis antigen endo-b-1,3-(fucosyl)-N-acetylglucosidase.
