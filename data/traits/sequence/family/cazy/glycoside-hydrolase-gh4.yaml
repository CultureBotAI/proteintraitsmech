identifier: CAZy:GH4
label: "Glycoside hydrolase family 4 (GH4)"
definition: >-
  CAZy glycoside hydrolase family 4 (GH4) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: Other a,e. Catalytic 3D fold: Rossmann fold. Representative activities: a-glucosidase, a-galactosidase, galacturonan exo-a-1,4-galacturonidase, b-(6 phospho)-glucosidase, a-(6-phospho)-1,4-glucosidase, a-glucuronidase. Corresponds to InterPro 'Glycoside hydrolase, family 4'.
