label: "Glycoside hydrolase family 20 (GH20)"
definition: >-
  CAZy glycoside hydrolase family 20 (GH20) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-K (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-N-acetylhexosaminidase, b-N-acetylgalactosaminidase, mannosyl-oligosaccharide endo-b-1,4-N-acetylglucosaminidase, antigen b-1,3-lacto-N-biosidase, poly-N-acetylglucose endo-b-1,6-N-acetylglucosaminidase, chitin exo-b-1,4-N-acetylglucosaminidase, b-Nâ€acetyl-lactosaminidase, b-N-Acetyl-(6-sulfo)-glucosaminidase. Corresponds to InterPro 'Chitobiase C-terminal domain'.
