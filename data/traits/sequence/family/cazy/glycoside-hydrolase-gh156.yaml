identifier: CAZy:GH156
label: "Glycoside hydrolase family 156 (GH156)"
definition: >-
  CAZy glycoside hydrolase family 156 (GH156) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: a-neuraminidase.
