identifier: CAZy:GH16
label: "Glycoside hydrolase family 16 (GH16)"
definition: >-
  CAZy glycoside hydrolase family 16 (GH16) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-B (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: β-jelly roll. Representative activities: MLG endo-b-1,3/4-glucosidase, b-glucosidase, b-galactosidase, hyaluronan endo-b-1,4-N-acetylglucosaminidase, glucan endo-b-1,3-glucosidase, glucan exo-b-1,3-glucosidase, MLG endo-b-1,4-glucosidase, agarose endo-b-1,4-galactosidase (+11 more). Corresponds to InterPro 'Beta-glucanase-like, N-terminal domain'.
