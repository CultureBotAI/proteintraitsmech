identifier: CAZy:GH194
label: "Glycoside hydrolase family 194 (GH194)"
definition: >-
  CAZy glycoside hydrolase family 194 (GH194) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-S (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: glucan endo-b-1,2-glucosidase.
