identifier: CAZy:GH44
label: "Glycoside hydrolase family 44 (GH44)"
definition: >-
  CAZy glycoside hydrolase family 44 (GH44) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: cellulose endo-b-1,4-glucosidase, xylan endo-b-1,4-xylosidase, MLG endo-b-1,4-glucosidase, xyloglucan endo-b-1,4-glucosidase.
