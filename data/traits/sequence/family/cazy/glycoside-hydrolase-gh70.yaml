identifier: CAZy:GH70
label: "Glycoside hydrolase family 70 (GH70)"
definition: >-
  CAZy glycoside hydrolase family 70 (GH70) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-H (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: dextransucrase, Alternansucrase a-1,3-glucosyltransferase, Alternansucrase a-1,6-glucosyltransferase, reuteransucrase a-1,6-glucosyltransferase, reuteransucrase a-1,4-glucosyltransferase, a-1,2-branched dextransucrase, a-4,6-glucanotransferase, a-4,3-glucanotransferase. Corresponds to InterPro 'Glycoside hydrolase, family 70, catalytic domain'.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
