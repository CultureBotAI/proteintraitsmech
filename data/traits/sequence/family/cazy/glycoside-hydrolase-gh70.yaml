definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Transfers alternately an alpha-D-glucosyl residue from sucrose to the 6-position and the 3-position of the non-reducing terminal residue of an alpha-D-glucan, thus producing a glucan having alternating alpha-(1->6)- and alpha-(1->3)-linkages
    source: "mapped enzyme EC:2.4.1.140"
