identifier: CAZy:GH36
label: "Glycoside hydrolase family 36 (GH36)"
definition: >-
  CAZy glycoside hydrolase family 36 (GH36) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-D (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: a-galactosidase, antigen a-1,3-N-acetylgalactosaminidase, b-L-arabinopyranosidase, antigen a-1,3-galactosidase, antigen exo-a-1,3-galactosamine, raffinose exo-a-1,6-galactosidase, galactinol-raffinose galactosyltransferase, galactinol-sucrose galactosyltransferase. Corresponds to InterPro 'Glycoside hydrolase family 36'.
