label: "Glycoside hydrolase family 123 (GH123)"
definition: >-
  CAZy glycoside hydrolase family 123 (GH123) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-N-acetylgalactosaminidase, exo-b-1,3-N-acetylgalactosaminidase, exo-b-1,4-N-acetylgalactosaminidase, b-N-acetyl-4-sulfo-galactosaminidase, endo-b-1,4-N-acetylgalactosaminidase, endo-b-1,3-N-acetylgalactosaminidase. Corresponds to InterPro 'Glycoside hydrolase 123, fourth domain'.
