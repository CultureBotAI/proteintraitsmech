identifier: CAZy:PL9
label: "Polysaccharide lyase family 9 (PL9)"
definition: >-
  CAZy polysaccharide lyase family 9 (PL9) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: parallel β-helix. Representative activities: pectate lyase, exo-unsaturated disaccharide pectate lyase, pectin lyase, rhamnogalacturonan lyase, thiopeptidoglycan lyase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
