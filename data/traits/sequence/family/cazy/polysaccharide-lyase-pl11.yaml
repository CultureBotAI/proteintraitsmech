identifier: CAZy:PL11
label: "Polysaccharide lyase family 11 (PL11)"
definition: >-
  CAZy polysaccharide lyase family 11 (PL11) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: 8-fold β-propeller. Representative activities: rhamnogalacturonan lyase, exo-unsaturated rhamnogalacturonan lyase.
