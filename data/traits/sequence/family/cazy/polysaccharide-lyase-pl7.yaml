identifier: CAZy:PL7
label: "Polysaccharide lyase family 7 (PL7)"
definition: >-
  CAZy polysaccharide lyase family 7 (PL7) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: β-jelly roll. Representative activities: endo-b-D-mannuronate-alginate lyase, guluronate-specific alginate lyase, glucuronan lyase, exo-polyMG-alginate lyase, exo-polyGM-alginate lyase, endo-polyMG-alginate lyase, endo-polyGM-alginate lyase, alginate lyase (unspecified).
