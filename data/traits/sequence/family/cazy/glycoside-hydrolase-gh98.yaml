label: "Glycoside hydrolase family 98 (GH98)"
definition: >-
  CAZy glycoside hydrolase family 98 (GH98) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: xylan endo-b-1,4-xylosidase, antigen endo-b-1,4-galactosidase.
