identifier: CAZy:GH10
label: "Glycoside hydrolase family 10 (GH10)"
definition: >-
  CAZy glycoside hydrolase family 10 (GH10) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: cellulose endo-b-1,4-glucosidase, xylan endo-b-1,4-xylosidase, xylan endo-b-1,3-xylosidase, xylan exo-b-1,4-xylosidase, reducing end xylan exo-b-1,4-xylosidase, tomatin b-galatosidase, arabinoxylan endo-b-1,4-xylosidase, xylan transglycosidase. Corresponds to InterPro 'Glycoside hydrolase family 10'.
