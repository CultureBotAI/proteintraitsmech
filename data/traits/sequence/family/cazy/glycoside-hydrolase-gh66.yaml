identifier: CAZy:GH66
label: "Glycoside hydrolase family 66 (GH66)"
definition: >-
  CAZy glycoside hydrolase family 66 (GH66) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: dextran endo-a-1,6-glucosidase, cycloisomaltooligosaccharide glucanotransferase.
