label: "Glycoside hydrolase family 140 (GH140)"
definition: >-
  CAZy glycoside hydrolase family 140 (GH140) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: rhamnogalacturonan II endo-b-1,2-apiosidase.
