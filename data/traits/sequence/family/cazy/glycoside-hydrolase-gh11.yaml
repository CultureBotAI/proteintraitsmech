definition: >-
  CAZy glycoside hydrolase family 11 (GH11) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-C (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: β-jelly roll. Representative activities: xylan endo-b-1,4-xylosidase, xylan exo-b-1,4-xylosidase. Corresponds to InterPro 'Glycoside hydrolase family 11'.
