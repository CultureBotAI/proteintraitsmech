identifier: CAZy:PL24
label: "Polysaccharide lyase family 24 (PL24)"
definition: >-
  CAZy polysaccharide lyase family 24 (PL24) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: 7-fold β-propeller. Representative activities: b-D-glucuronate ulvan lyase, a-L-iduronate ulvan lyase.
