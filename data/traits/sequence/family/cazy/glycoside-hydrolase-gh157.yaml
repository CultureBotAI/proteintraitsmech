identifier: CAZy:GH157
label: "Glycoside hydrolase family 157 (GH157)"
definition: >-
  CAZy glycoside hydrolase family 157 (GH157) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: MLG endo-b-1,3/4-glucosidase, glucan endo-b-1,3-glucosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH-A
xrefs:
  - EC:3.2.1.6
  - EC:3.2.1.39
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Endohydrolysis of (1->3)- or (1->4)-linkages in beta-D-glucans when the glucose residue whose reducing group is involved in the linkage to be hydrolyzed is itself substituted at C-3
    source: "mapped enzyme EC:3.2.1.6"
    method: SOURCED
