definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Hydrolysis of (1->2)-alpha-D-(4-O-methyl)glucuronosyl links in the main chain of hardwood xylans
    source: "mapped enzyme EC:3.2.1.131"
