identifier: CAZy:GH115
label: "Glycoside hydrolase family 115 (GH115)"
definition: >-
  CAZy glycoside hydrolase family 115 (GH115) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: xylan exo-a-1,2-(4 OMethyl)-glucuronosidase, arabinogalactan exo-a-1,6-(4-OMethyl)-glucuronidase.
