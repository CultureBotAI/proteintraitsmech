identifier: CAZy:GH39
label: "Glycoside hydrolase family 39 (GH39)"
definition: >-
  CAZy glycoside hydrolase family 39 (GH39) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-glucosidase, b-galactosidase, xylan exo-b-1,4-xylosidase, cellulose exo-b-1,4-glucosidase, dermatan sulfate endo-a-1,3-iduronidase, arabinogalactan a-1,3-(galactosyl)-arabinofuranosidase, ulvan endo-a-1,3-L-(3-sulfo)-rhamnosidase, arabinogalactan a-1,3-(L-arabinopyranosyl)-L-arabinofuranosidase. Corresponds to InterPro 'Glycoside hydrolase, family 39'.
