identifier: CAZy:GH91
label: "Glycoside hydrolase family 91 (GH91)"
definition: >-
  CAZy glycoside hydrolase family 91 (GH91) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: parallel β-helix. Representative activities: dianhydride (1,2':2,3') fructofuranose b-2,3-fructosidase.
