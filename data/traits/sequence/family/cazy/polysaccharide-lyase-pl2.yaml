identifier: CAZy:PL2
label: "Polysaccharide lyase family 2 (PL2)"
definition: >-
  CAZy polysaccharide lyase family 2 (PL2) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 7 barrel. Representative activities: pectate lyase, exo-unsaturated disaccharide pectate lyase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
  - EC:4.2.2.2
  - EC:4.2.2.9
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Eliminative cleavage of (1->4)-alpha-D-galacturonan to give oligosaccharides with 4-deoxy-alpha-D-galact-4-enuronosyl groups at their non-reducing ends
    source: "mapped enzyme EC:4.2.2.2"
    method: SOURCED
