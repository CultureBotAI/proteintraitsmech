identifier: CAZy:GH79
label: "Glycoside hydrolase family 79 (GH79)"
definition: >-
  CAZy glycoside hydrolase family 79 (GH79) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-glucuronidase, hyaluronan endo-b-1,3-glucuronidase, glycyrrhizin b-glucuronidase, heparan sulfate endo-b-1,4-glucuronidase, baicalin b-glucuronidase, arabinogalactan exo-b-1,6-(4-OMethyl)-glucuronidase, 4-O-a-L-rhamnosyl-b-D-glucuronidase. Corresponds to InterPro 'Glycoside hydrolase, family 79'.
