identifier: CAZy:GH28
label: "Glycoside hydrolase family 28 (GH28)"
definition: >-
  CAZy glycoside hydrolase family 28 (GH28) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-N (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: parallel β-helix. Representative activities: galacturonan endo-a-1,4-galacturonidase, galacturonan exo-a-1,4-galacturonidase, galacturonan exo-a-1,4-galacturobiodase, rhamnogalacturonan I endo-a-1,2-galacturonidase, rhamnogalacturonan I exo-a-1,2-galacturonidase, xylogalacturonan endo-a-1,4-galacturonidase. Corresponds to InterPro 'Glycoside hydrolase, family 28'.
