identifier: CAZy:GH43
label: "Glycoside hydrolase family 43 (GH43)"
definition: >-
  CAZy glycoside hydrolase family 43 (GH43) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-F (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: 5-fold β-propeller. Representative activities: xylan endo-b-1,4-xylosidase, xylan exo-b-1,4-xylosidase, a-L-arabinofuranosidase, xylan exo-b-1,3-xylosidase, arabinan endo-a-1,5-arabinofuranosidase, galactan exo-b-1,3-galactosidase, b-galactofuranosidase, galactan endo-b-1,3-galactosidase. Corresponds to InterPro 'Glycoside hydrolase, family 43, endo-1, 5-alpha-L-arabinosidase'.
