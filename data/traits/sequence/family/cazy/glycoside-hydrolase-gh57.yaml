identifier: CAZy:GH57
label: "Glycoside hydrolase family 57 (GH57)"
definition: >-
  CAZy glycoside hydrolase family 57 (GH57) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-T (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 7 barrel. Representative activities: amylose endo-a-1,4-glucosidase, a-galactosidase, pullulan endo-a-1,6-glucosidase, cyclomaltodextrin endo-a-1,4-glucosidase, amylose exo-a-1,4-glucobiosidase, 1,4-a-glucan branching enzyme, 4-a-glucanotransferase. Corresponds to InterPro 'Glycosyl hydrolase family 57'.
