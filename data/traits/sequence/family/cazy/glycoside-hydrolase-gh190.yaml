identifier: CAZy:GH190
label: "Glycoside hydrolase family 190 (GH190)"
definition: >-
  CAZy glycoside hydrolase family 190 (GH190) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: Orthogonal helix bundle + antiparallel β-sheet. Representative activities: peptidoglycan lytic b-1,4-muraminidase.
