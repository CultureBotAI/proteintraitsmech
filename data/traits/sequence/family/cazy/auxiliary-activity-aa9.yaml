label: "Auxiliary activity family 9 (AA9)"
definition: >-
  CAZy auxiliary activity family 9 (AA9) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: monooxygenase. Representative activities: lytic cellulose monooxygenase (C1-hydroxylating), lytic cellulose monooxygenase (C4-dehydrogenating), lytic xylan monooxygenase / xylan oxidase (C1-hydroxylating), lytic xylan monooxygenase / xylan oxidase (C4-dehydrogenating). Corresponds to InterPro 'Auxiliary Activity family 9'.
