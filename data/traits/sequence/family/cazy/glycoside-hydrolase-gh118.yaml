xrefs:
  - EC:3.2.1.81
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Hydrolysis of (1->4)-beta-D-galactosidic linkages in agarose, giving the tetramer as the predominant product
    source: "mapped enzyme EC:3.2.1.81"
