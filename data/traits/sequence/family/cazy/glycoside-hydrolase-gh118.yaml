identifier: CAZy:GH118
label: "Glycoside hydrolase family 118 (GH118)"
definition: >-
  CAZy glycoside hydrolase family 118 (GH118) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: Parallel β-helix (AlphaFold). Representative activities: agarose endo-b-1,4-galactosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
