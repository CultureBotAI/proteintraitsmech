identifier: CAZy:GH84
label: "Glycoside hydrolase family 84 (GH84)"
definition: >-
  CAZy glycoside hydrolase family 84 (GH84) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: hyaluronan endo-b-1,4-N-acetylglucosaminidase, b-N-acetylhexosaminidase, protein O b-N-acetylglucosaminidase.
