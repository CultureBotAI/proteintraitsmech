label: "Glycoside hydrolase family 23 (GH23)"
definition: >-
  CAZy glycoside hydrolase family 23 (GH23) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: Unknown e. Catalytic 3D fold: lysozyme fold. Representative activities: chitin endo-b-1,4-N-acetylglucosaminidase, peptidoglycan endo-b-1,4-N-acetylmuramidase, peptidoglycan lytic b-1,4-muraminidase. Corresponds to InterPro 'Glycoside hydrolase, family 23'.
