identifier: CAZy:GH128
label: "Glycoside hydrolase family 128 (GH128)"
definition: >-
  CAZy glycoside hydrolase family 128 (GH128) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: glucan endo-b-1,3-glucosidase, glucan exo-b-1,3-glucosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH-A
xrefs:
  - EC:3.2.1.39
  - EC:3.2.1.58
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Successive hydrolysis of beta-D-glucose units from the non-reducing ends of (1->3)-beta-D-glucans, releasing alpha-glucose
    source: "mapped enzyme EC:3.2.1.58"
