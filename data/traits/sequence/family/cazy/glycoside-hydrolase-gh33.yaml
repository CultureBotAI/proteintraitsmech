identifier: CAZy:GH33
label: "Glycoside hydrolase family 33 (GH33)"
definition: >-
  CAZy glycoside hydrolase family 33 (GH33) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-E (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: 6-fold β-propeller. Representative activities: a-neuraminidase, LPS exo-a-3-deoxy-2-octulosonidase (Kdo hydrolase), a-(2-keto)-(3-deoxy)-nononic acid hydrolase (KDNase), trans-sialidase, anhydrosialidase. Corresponds to InterPro 'Glycoside hydrolase, family 33, N-terminal'.
