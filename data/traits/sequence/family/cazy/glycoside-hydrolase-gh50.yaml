identifier: CAZy:GH50
label: "Glycoside hydrolase family 50 (GH50)"
definition: >-
  CAZy glycoside hydrolase family 50 (GH50) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-galactosidase, glucan endo-b-1,3-glucosidase, agarose endo-b-1,4-galactosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH-A
xrefs:
  - EC:3.2.1.23
  - EC:3.2.1.39
  - EC:3.2.1.81
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Hydrolysis of (1->4)-beta-D-galactosidic linkages in agarose, giving the tetramer as the predominant product
    source: "mapped enzyme EC:3.2.1.81"
