label: "Glycoside hydrolase family 178 (GH178)"
definition: >-
  CAZy glycoside hydrolase family 178 (GH178) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-L (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: mannan endo-a-1,4-mannosidase.
