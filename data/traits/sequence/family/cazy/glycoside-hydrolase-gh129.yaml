definition: >-
  CAZy glycoside hydrolase family 129 (GH129) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: antigen a-1,3-N-acetylgalactosaminidase, b-carrageenan exo-a-1,3-anhydro-galactosidase.
