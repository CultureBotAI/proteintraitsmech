label: "Glycoside hydrolase family 189 (GH189)"
definition: >-
  CAZy glycoside hydrolase family 189 (GH189) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: b-1,2-glucan synthetase (elongation), b-1,2-glucan synthetase (cyclisation).
