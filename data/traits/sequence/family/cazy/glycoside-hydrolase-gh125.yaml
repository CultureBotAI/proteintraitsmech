identifier: CAZy:GH125
label: "Glycoside hydrolase family 125 (GH125)"
definition: >-
  CAZy glycoside hydrolase family 125 (GH125) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-L (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: mannosyl-oligosaccharide exo-a-1,6-mannosidase.
