identifier: CAZy:GH26
label: "Glycoside hydrolase family 26 (GH26)"
definition: >-
  CAZy glycoside hydrolase family 26 (GH26) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: cellulose endo-b-1,4-glucosidase, xylan endo-b-1,3-xylosidase, MLG endo-b-1,4-glucosidase, mannan endo-b-1,4-mannosidase, mannan exo-b-1,4-mannobiosidase, xyloglucan endo-b-1,4-glucosidase, MLX exo-b-1,4-xylosidase, xylan exo-b-1,3-xylobiosidase. Corresponds to InterPro 'Glycoside hydrolase family 26'.
