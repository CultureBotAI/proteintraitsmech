identifier: CAZy:GH6
label: "Glycoside hydrolase family 6 (GH6)"
definition: >-
  CAZy glycoside hydrolase family 6 (GH6) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (β / α) 7 barrel. Representative activities: cellulose endo-b-1,4-glucosidase, xylan endo-b-1,4-xylosidase, MLG endo-b-1,4-glucosidase, cellulose exo-b-1,4-glucobiosidase. Corresponds to InterPro 'Glycoside hydrolase, family 6, conserved site'.
