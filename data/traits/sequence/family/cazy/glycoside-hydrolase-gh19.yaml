identifier: CAZy:GH19
label: "Glycoside hydrolase family 19 (GH19)"
definition: >-
  CAZy glycoside hydrolase family 19 (GH19) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: lysozyme fold. Representative activities: chitin endo-b-1,4-N-acetylglucosaminidase, peptidoglycan endo-b-1,4-N-acetylmuramidase, reducing end chitin exo-b-1,4-N-acetylglucosaminidase. Corresponds to InterPro 'Glycoside hydrolase, family 19'.
