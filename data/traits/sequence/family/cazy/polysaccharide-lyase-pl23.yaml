identifier: CAZy:PL23
label: "Polysaccharide lyase family 23 (PL23)"
definition: >-
  CAZy polysaccharide lyase family 23 (PL23) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 5 toroid + anti-parallel β-sheet. Representative activities: chondroitin lyase/chondroitinase.
