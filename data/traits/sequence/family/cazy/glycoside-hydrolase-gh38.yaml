identifier: CAZy:GH38
label: "Glycoside hydrolase family 38 (GH38)"
definition: >-
  CAZy glycoside hydrolase family 38 (GH38) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: mannosidase fold. Representative activities: a-mannosidase, mannosyl-oligosaccharide exo-a-1,2-mannosidase, mannosyl-oligosaccharide exo-a-1,3-mannosidase, mannosyl-oligosaccharide exo-a-1,6-mannosidase, mannosyl-oligosaccharide endo-a-1,P-mannosidase, a-1,2-mannosidase. Corresponds to InterPro 'Glycoside hydrolase family 38, N-terminal domain'.
