identifier: CAZy:PL5
label: "Polysaccharide lyase family 5 (PL5)"
definition: >-
  CAZy polysaccharide lyase family 5 (PL5) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: endo-b-D-mannuronate-alginate lyase, glucuronan lyase.
