identifier: CAZy:GH106
label: "Glycoside hydrolase family 106 (GH106)"
definition: >-
  CAZy glycoside hydrolase family 106 (GH106) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: a-L-rhamnosidase, rhamnogalacturonan I exo-a-1,4-L-rhamnosidase, flavonoid-O-(a-1,6-L-rhamnosyl-)glucoside a-1,6-L-rhamnosidase, flavonoid-O-(a-1,2-L-rhamnosyl-)glucoside a-1,2-L-rhamnosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH
xrefs:
  - EC:3.2.1.40
  - EC:3.2.1.174
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Exohydrolysis of the alpha-L-Rha-(1->4)-alpha-D-GalA bond in rhamnogalacturonan oligosaccharides with initial inversion of configuration releasing beta-L-rhamnose from the non-reducing end of rhamnogalacturonan oligosaccharides
    source: "mapped enzyme EC:3.2.1.174"
