identifier: CAZy:GH3
label: "Glycoside hydrolase family 3 (GH3)"
definition: >-
  CAZy glycoside hydrolase family 3 (GH3) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: MLG endo-b-1,3/4-glucosidase, xylan endo-b-1,4-xylosidase, b-glucosidase, b-galactosidase, b-glucuronidase, xylan exo-b-1,4-xylosidase, b-fucosidase, ceramide b-glucosidase (+23 more). Corresponds to InterPro 'Glycoside hydrolase, family 3, N-terminal'.
