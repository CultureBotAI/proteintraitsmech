identifier: CAZy:GH100
label: "Glycoside hydrolase family 100 (GH100)"
definition: >-
  CAZy glycoside hydrolase family 100 (GH100) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-G (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: sucrose a-1,2-glucosidase.
