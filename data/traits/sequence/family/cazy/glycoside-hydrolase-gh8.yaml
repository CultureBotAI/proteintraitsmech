identifier: CAZy:GH8
label: "Glycoside hydrolase family 8 (GH8)"
definition: >-
  CAZy glycoside hydrolase family 8 (GH8) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-M (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: cellulose endo-b-1,4-glucosidase, MLG endo-b-1,3/4-glucosidase, xylan endo-b-1,4-xylosidase, xylan endo-b-1,3-xylosidase, MLG endo-b-1,4-glucosidase, chitosan endo-b-1,4-N-glucosaminase, reducing end xylan exo-b-1,4-xylosidase. Corresponds to InterPro 'Glycoside hydrolase, family 8'.
