identifier: CAZy:GH62
label: "Glycoside hydrolase family 62 (GH62)"
definition: >-
  CAZy glycoside hydrolase family 62 (GH62) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-F (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: 5-fold β-propeller. Representative activities: xylan endo-b-1,4-xylosidase, a-L-arabinofuranosidase, arabinan exo-a-1,3-L-arabinofuranosidase, glucuronoxylan exo-b-1,2-xylosidase. Corresponds to InterPro 'Glycoside hydrolase, family 62, arabinosidase'.
