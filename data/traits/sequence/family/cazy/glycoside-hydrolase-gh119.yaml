identifier: CAZy:GH119
label: "Glycoside hydrolase family 119 (GH119)"
definition: >-
  CAZy glycoside hydrolase family 119 (GH119) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-T (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 7 barrel. Representative activities: amylose endo-a-1,4-glucosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH-T
xrefs:
  - EC:3.2.1.1
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Endohydrolysis of (1->4)-alpha-D-glucosidic linkages in polysaccharides containing three or more (1->4)-alpha-linked D-glucose units
    source: "mapped enzyme EC:3.2.1.1"
