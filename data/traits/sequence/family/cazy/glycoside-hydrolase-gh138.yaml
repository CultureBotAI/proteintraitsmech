definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Exohydrolysis of the alpha-D-GalA-(1->2)-alpha-L-Rha bond in rhamnogalacturonan oligosaccharides with initial inversion of configuration releasing D-galacturonic acid from the non-reducing end of rhamnogalacturonan oligosaccharides
    source: "mapped enzyme EC:3.2.1.173"
