identifier: CAZy:GH138
label: "Glycoside hydrolase family 138 (GH138)"
definition: >-
  CAZy glycoside hydrolase family 138 (GH138) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: rhamnogalacturonan I exo-a-1,2-galacturonidase.
