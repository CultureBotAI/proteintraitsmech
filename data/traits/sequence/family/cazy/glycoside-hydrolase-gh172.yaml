label: "Glycoside hydrolase family 172 (GH172)"
definition: >-
  CAZy glycoside hydrolase family 172 (GH172) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: β-jelly roll. Representative activities: a-D-arabinofuranosidase, a-D-fructofuranosidase, exo-a-1,5-D-arabinofuranosidase.
