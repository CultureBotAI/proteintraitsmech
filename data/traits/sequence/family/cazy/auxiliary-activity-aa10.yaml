identifier: CAZy:AA10
label: "Auxiliary activity family 10 (AA10)"
definition: >-
  CAZy auxiliary activity family 10 (AA10) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: peroxygenase. Representative activities: lytic chitin monooxygenase, lytic cellulose monooxygenase (C1-hydroxylating), lytic cellulose monooxygenase (C4-dehydrogenating), lytic xylan monooxygenase / xylan oxidase (C4-dehydrogenating).
