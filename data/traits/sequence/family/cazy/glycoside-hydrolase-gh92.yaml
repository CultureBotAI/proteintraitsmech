identifier: CAZy:GH92
label: "Glycoside hydrolase family 92 (GH92)"
definition: >-
  CAZy glycoside hydrolase family 92 (GH92) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: a-mannosidase, mannosyl-oligosaccharide exo-a-1,2-mannosidase, mannosyl-oligosaccharide exo-a-1,4-mannosidase, mannosyl-oligosaccharide exo-a-1,3-mannosidase, mannosyl-oligosaccharide endo-a-1,P-mannosidase, a-1,2-mannosidase.
