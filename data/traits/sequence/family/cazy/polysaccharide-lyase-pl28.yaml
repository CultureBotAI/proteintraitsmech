identifier: CAZy:PL28
label: "Polysaccharide lyase family 28 (PL28)"
definition: >-
  CAZy polysaccharide lyase family 28 (PL28) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: β-jelly roll. Representative activities: b-D-glucuronate ulvan lyase, a-L-iduronate ulvan lyase.
