identifier: CAZy:GH9
label: "Glycoside hydrolase family 9 (GH9)"
definition: >-
  CAZy glycoside hydrolase family 9 (GH9) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: cellulose endo-b-1,4-glucosidase, MLG endo-b-1,3/4-glucosidase, xylan endo-b-1,4-xylosidase, MLG endo-b-1,4-glucosidase, cellulose exo-b-1,4-glucosidase, cellulose exo-b-1,4-glucobiosidase, xyloglucan endo-b-1,4-glucosidase, chitosan exo-b-1,4-N-glucosaminase. Corresponds to InterPro 'Glycoside hydrolase family 9'.
