  - EC:4.2.2.8
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Eliminative degradation of polysaccharides containing 1,4-beta-D- hexosaminyl and 1,3-beta-D-glucuronosyl linkages to disaccharides containing 4-deoxy-beta-D-gluc-4-enuronosyl groups
