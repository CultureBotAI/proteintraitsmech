identifier: CAZy:PL37
label: "Polysaccharide lyase family 37 (PL37)"
definition: >-
  CAZy polysaccharide lyase family 37 (PL37) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Representative activities: chondroitin AC lyase, heparin-sulfate lyase, b-D-glucuronate ulvan lyase, a-L-iduronate ulvan lyase.
