identifier: CAZy:GH15
label: "Glycoside hydrolase family 15 (GH15)"
definition: >-
  CAZy glycoside hydrolase family 15 (GH15) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-L (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: amylose exo-a-1,4-glucosidase, trehalose a-1,1-glucosidase, dextran exo-a-1,6-glucosidase, isomaltose a-1,6-glucosidase, dextrin dextranase. Corresponds to InterPro 'Glucoamylase'.
