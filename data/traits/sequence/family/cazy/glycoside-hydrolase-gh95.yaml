identifier: CAZy:GH95
label: "Glycoside hydrolase family 95 (GH95)"
definition: >-
  CAZy glycoside hydrolase family 95 (GH95) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: a-L-fucosidase, exo-a-1,2-L-fucosidase, Rhamnogalacturonan a-1,2-L-galactosidase, glucuronoarabinoxylan a-1,2-L-galactosidase.
