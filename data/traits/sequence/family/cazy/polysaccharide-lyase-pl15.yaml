identifier: CAZy:PL15
label: "Polysaccharide lyase family 15 (PL15)"
definition: >-
  CAZy polysaccharide lyase family 15 (PL15) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 6 toroid + anti-parallel β-sheet. Representative activities: endo-b-D-mannuronate-alginate lyase, exo-heparin lyase (reducing-end specific), exo-polyMG-alginate lyase, exo-polyGM-alginate lyase, exo-a-L-guluronate-alginate lyase, exo-b-D-mannuronate-alginate lyase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
