identifier: CAZy:GH56
label: "Glycoside hydrolase family 56 (GH56)"
definition: >-
  CAZy glycoside hydrolase family 56 (GH56) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: (β / α) 7 barrel. Representative activities: hyaluronan endo-b-1,4-N-acetylglucosaminidase, chondroitin endo-b-1,4-N-acetylgalactosaminidase. Corresponds to InterPro 'Glycoside hydrolase family 56, bee venom hyaluronidase'.
