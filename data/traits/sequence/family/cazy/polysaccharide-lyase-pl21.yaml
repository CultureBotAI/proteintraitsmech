identifier: CAZy:PL21
label: "Polysaccharide lyase family 21 (PL21)"
definition: >-
  CAZy polysaccharide lyase family 21 (PL21) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 6 toroid + anti-parallel β-sheet. Representative activities: heparin lyase, heparin-sulfate lyase, acharan-sulfate lyase.
