    predicate: skos:relatedMatch
    mapping_source: InterPro CAZY cross-reference
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Hydrolysis of cellobiose from the reducing end of xyloglucans consisting of a beta-(1->4)-linked glucan carrying alpha-D-xylosyl groups on O-6 of the glucose residues. To be a substrate, the first residue must be unsubstituted, the second residue may bear a xylosyl group, whether further glycosylated or not, and the third residue, which becomes the new terminus by the action of the enzyme, is preferably xylosylated, but this xylose residue must not be further substituted
    source: "mapped enzyme EC:3.2.1.150"
    method: SOURCED
