identifier: CAZy:GH74
label: "Glycoside hydrolase family 74 (GH74)"
definition: >-
  CAZy glycoside hydrolase family 74 (GH74) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: 7-fold β-propeller. Representative activities: cellulose endo-b-1,4-glucosidase, reducing end xyloglucan exo-b-1,4-glucobiosidase, xyloglucan endo-b-1,4-glucosidase. Corresponds to InterPro 'Xyloglucan-specific glycosyl hydrolase'.
