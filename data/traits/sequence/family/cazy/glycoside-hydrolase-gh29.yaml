identifier: CAZy:GH29
label: "Glycoside hydrolase family 29 (GH29)"
definition: >-
  CAZy glycoside hydrolase family 29 (GH29) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-R (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: a-L-fucosidase, exo-a-1,2-L-fucosidase, antigen exo-a-1,3-L-fucosidase, antigen a-1,6-fucosidase, a-1,3-L-galactosidase, Lewis A antigen exo-a-1,4-fucosidase, a-L-glucosidase, antigen 3-fucosyllactose exo-a-1,3-L-fucosidase. Corresponds to InterPro 'Glycoside hydrolase, family 29'.
