definition: >-
  CAZy glycoside hydrolase family 169 (GH169) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel (inferred). Representative activities: capsular polysaccharide endo-b-1,4-glucuronidase.
