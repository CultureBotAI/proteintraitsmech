label: "Glycoside hydrolase family 148 (GH148)"
definition: >-
  CAZy glycoside hydrolase family 148 (GH148) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel (inferred). Representative activities: cellulose endo-b-1,4-glucosidase, MLG endo-b-1,4-glucosidase, MLG endo-b-1,3-glucosidase.
