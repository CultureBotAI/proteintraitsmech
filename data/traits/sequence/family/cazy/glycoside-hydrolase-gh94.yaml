identifier: CAZy:GH94
label: "Glycoside hydrolase family 94 (GH94)"
definition: >-
  CAZy glycoside hydrolase family 94 (GH94) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-Q (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: cellobiose phosphorylase, laminaribiose phosphorylase, cellodextrin phosphorylase, chitobiose phosphorylase, cellobionic acid phosphorylase, b-1,2-glucan phosphorylase, solabiose phosphorylase, b-1,3-glucosyl-glucuronic acid phosphorylase. Corresponds to InterPro 'Glycoside hydrolase family 65, N-terminal domain'.
