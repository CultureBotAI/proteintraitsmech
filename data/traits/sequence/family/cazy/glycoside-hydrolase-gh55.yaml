identifier: CAZy:GH55
label: "Glycoside hydrolase family 55 (GH55)"
definition: >-
  CAZy glycoside hydrolase family 55 (GH55) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: parallel β-helix. Representative activities: glucan endo-b-1,3-glucosidase, glucan exo-b-1,3-glucosidase, Flavonoid 6-O-a-L-rhamnosyl-b-glucosidase, laminarin endo-b-1,3-glucosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH
xrefs:
  - EC:3.2.1.39
  - EC:3.2.1.58
  - EC:3.2.1.168
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Successive hydrolysis of beta-D-glucose units from the non-reducing ends of (1->3)-beta-D-glucans, releasing alpha-glucose
    source: "mapped enzyme EC:3.2.1.58"
    method: SOURCED
