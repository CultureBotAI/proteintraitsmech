identifier: CAZy:GH31
label: "Glycoside hydrolase family 31 (GH31)"
definition: >-
  CAZy glycoside hydrolase family 31 (GH31) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-D (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: oligo exo-a-1,6-glucosidase, dextran endo-a-1,6-glucosidase, a-glucosidase, a-galactosidase, a-mannosidase, sucrose a-1,2-glucosidase, glucan exo-a-1,3-glucosidase, a-xylosidase (+5 more). Corresponds to InterPro 'Glycosyl transferase, family 31'.
