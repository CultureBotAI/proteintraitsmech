definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: a peptidoglycan chain = a peptidoglycan chain with N-acetyl-1,6- anhydromuramyl-[peptide] at the reducing end + a peptidoglycan chain with N-acetylglucosamine at the non-reducing end
