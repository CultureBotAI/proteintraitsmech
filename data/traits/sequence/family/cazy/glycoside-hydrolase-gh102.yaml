identifier: CAZy:GH102
label: "Glycoside hydrolase family 102 (GH102)"
definition: >-
  CAZy glycoside hydrolase family 102 (GH102) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: lysozyme fold. Representative activities: peptidoglycan lytic b-1,4-muraminidase.
