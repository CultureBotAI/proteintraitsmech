identifier: CAZy:GH17
label: "Glycoside hydrolase family 17 (GH17)"
definition: >-
  CAZy glycoside hydrolase family 17 (GH17) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: glucan endo-b-1,3-glucosidase, glucan exo-b-1,3-glucosidase, MLG endo-b-1,4-glucosidase, abscisate b-glucosidase, b-1,3-glucanosyltransglucosidase, laminarin b-1,6-glucanosyltransglucosidase. Corresponds to InterPro 'Glycoside hydrolase family 17, plant'.
