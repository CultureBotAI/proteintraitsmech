identifier: CAZy:GH18
label: "Glycoside hydrolase family 18 (GH18)"
definition: >-
  CAZy glycoside hydrolase family 18 (GH18) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-K (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: chitin endo-b-1,4-N-acetylglucosaminidase, b-N-acetylhexosaminidase, mannosyl-oligosaccharide endo-b-1,4-N-acetylglucosaminidase, chitosan endo-b-1,4-N-glucosaminase, chitin exo-b-1,4-N-acetylglucobiosaminidase, reducing end chitin exo-b-1,4-N-acetylglucosaminidase, mannosyl-oligosaccharide exo-b-1,4-N-acetylglucosaminidase, chitin exo-b-1,4-N-acetylglucosaminidase. Corresponds to InterPro 'Glycoside hydrolase family 18, catalytic domain'.
