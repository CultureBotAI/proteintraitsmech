identifier: CAZy:GH109
label: "Glycoside hydrolase family 109 (GH109)"
definition: >-
  CAZy glycoside hydrolase family 109 (GH109) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: Other a,e. Catalytic 3D fold: Rossmann fold. Representative activities: hyaluronan endo-b-1,4-N-acetylglucosaminidase, antigen a-1,3-N-acetylgalactosaminidase, b-N-acetylhexosaminidase, protein O exo-a-N-acetylgalactosaminidase.
