identifier: CAZy:GH113
label: "Glycoside hydrolase family 113 (GH113)"
definition: >-
  CAZy glycoside hydrolase family 113 (GH113) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-mannosidase, mannan endo-b-1,4-mannosidase, reducing end mannan exo-b1,4-mannosidase.
