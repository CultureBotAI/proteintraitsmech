label: "Glycoside hydrolase family 124 (GH124)"
definition: >-
  CAZy glycoside hydrolase family 124 (GH124) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: lysozyme fold. Representative activities: cellulose endo-b-1,4-glucosidase.
