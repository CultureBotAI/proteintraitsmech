identifier: CAZy:GH1
label: "Glycoside hydrolase family 1 (GH1)"
definition: >-
  CAZy glycoside hydrolase family 1 (GH1) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: a-neuraminidase, b-glucosidase, b-galactosidase, b-mannosidase, b-glucuronidase, xylan exo-b-1,4-xylosidase, b-fucosidase, ceramide b-glucosidase (+23 more). Corresponds to InterPro 'Glycoside hydrolase, family 1, beta-glucosidase'.
