identifier: CAZy:GH68
label: "Glycoside hydrolase family 68 (GH68)"
definition: >-
  CAZy glycoside hydrolase family 68 (GH68) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-J (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: 5-fold β-propeller. Representative activities: sucrose b-2,1-fructosidase, inulosucrase, levansucrase. Corresponds to InterPro 'Glycoside hydrolase, family 68'.
