identifier: CAZy:GH27
label: "Glycoside hydrolase family 27 (GH27)"
definition: >-
  CAZy glycoside hydrolase family 27 (GH27) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-D (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: dextran endo-a-1,6-glucosidase, a-galactosidase, antigen a-1,3-N-acetylgalactosaminidase, b-L-arabinopyranosidase, dextran exo-a-1,6-glucobiosidase, galactomannan exo-a-1,6-galactosidase, raffinose exo-a-1,6-galactosidase, galactan:galactan galactosyltransferase. Corresponds to InterPro 'Glycoside hydrolase, family 27'.
