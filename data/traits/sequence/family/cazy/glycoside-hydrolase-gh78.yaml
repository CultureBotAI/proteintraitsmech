identifier: CAZy:GH78
label: "Glycoside hydrolase family 78 (GH78)"
definition: >-
  CAZy glycoside hydrolase family 78 (GH78) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: a-L-rhamnosidase, rhamnogalacturonan I exo-a-1,4-L-rhamnosidase, flavonoid-O-(a-1,6-L-rhamnosyl-)glucoside a-1,6-L-rhamnosidase, flavonoid-O-(a-1,2-L-rhamnosyl-)glucoside a-1,2-L-rhamnosidase.
