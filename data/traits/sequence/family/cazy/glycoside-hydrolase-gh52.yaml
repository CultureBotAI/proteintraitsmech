  CAZy glycoside hydrolase family 52 (GH52) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-O (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: xylan exo-b-1,4-xylosidase. Corresponds to InterPro 'Glycoside hydrolase, family 52'.
