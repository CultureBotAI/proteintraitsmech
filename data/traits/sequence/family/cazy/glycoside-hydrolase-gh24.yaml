identifier: CAZy:GH24
label: "Glycoside hydrolase family 24 (GH24)"
definition: >-
  CAZy glycoside hydrolase family 24 (GH24) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-I (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: lysozyme fold. Representative activities: peptidoglycan endo-b-1,4-N-acetylmuramidase. Corresponds to InterPro 'Glycoside hydrolase, family 24'.
