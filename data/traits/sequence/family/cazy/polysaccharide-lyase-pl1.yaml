identifier: CAZy:PL1
label: "Polysaccharide lyase family 1 (PL1)"
definition: >-
  CAZy polysaccharide lyase family 1 (PL1) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: parallel β-helix. Representative activities: pectate lyase, pectin lyase, poly a-D-N-acetylgalactosaminuric acid lyase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
  - EC:4.2.2.2
  - EC:4.2.2.10
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Eliminative cleavage of (1->4)-alpha-D-galacturonan methyl ester to give oligosaccharides with 4-deoxy-6-O-methyl-alpha-D-galact-4-enuronosyl groups at their non-reducing ends
    source: "mapped enzyme EC:4.2.2.10"
    method: SOURCED
