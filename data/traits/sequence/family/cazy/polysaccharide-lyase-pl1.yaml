identifier: CAZy:PL1
label: "Polysaccharide lyase family 1 (PL1)"
definition: >-
  CAZy polysaccharide lyase family 1 (PL1) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: parallel β-helix. Representative activities: pectate lyase, pectin lyase, poly a-D-N-acetylgalactosaminuric acid lyase.
