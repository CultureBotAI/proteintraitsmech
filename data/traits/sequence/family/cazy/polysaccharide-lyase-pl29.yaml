identifier: CAZy:PL29
label: "Polysaccharide lyase family 29 (PL29)"
definition: >-
  CAZy polysaccharide lyase family 29 (PL29) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Representative activities: hyaluronate lyase, chondroitin AC lyase, chondroitin B lyase.
