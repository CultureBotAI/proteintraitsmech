definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) Hydrolysis of (1->6)-alpha-D-glucosidic linkages in some oligosaccharides produced from starch and glycogen by alpha-amylase, and in isomaltose. (2) isomaltose + H2O = alpha-D-glucose + D-glucose
    source: "mapped enzyme EC:3.2.1.10"
