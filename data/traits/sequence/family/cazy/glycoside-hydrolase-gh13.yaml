identifier: CAZy:GH13
label: "Glycoside hydrolase family 13 (GH13)"
definition: >-
  CAZy glycoside hydrolase family 13 (GH13) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-H (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: amylose endo-a-1,4-glucosidase, amylose exo-a-1,4-glucosidase, oligo exo-a-1,6-glucosidase, a-glucosidase, trehalose a-1,1-glucosidase, pullulan endo-a-1,6-glucosidase, sucrose a-1,2-glucosidase, cyclomaltodextrin endo-a-1,4-glucosidase (+29 more). Corresponds to InterPro 'Glycosyl transferase, family 13'.
