identifier: CAZy:GH7
label: "Glycoside hydrolase family 7 (GH7)"
definition: >-
  CAZy glycoside hydrolase family 7 (GH7) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-B (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: β-jelly roll. Representative activities: cellulose endo-b-1,4-glucosidase, MLG endo-b-1,4-glucosidase, chitosan endo-b-1,4-N-glucosaminase, reducing end cellulose exo-b-1,4-glucobiosidase. Corresponds to InterPro 'Glycoside hydrolase, family 7'.
