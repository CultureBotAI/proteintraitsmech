identifier: CAZy:GH150
label: "Glycoside hydrolase family 150 (GH150)"
definition: >-
  CAZy glycoside hydrolase family 150 (GH150) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Representative activities: l-carrageenan endo-b-1,4-(2-sulfo)-galactosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH
xrefs:
  - EC:3.2.1.162
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Endohydrolysis of (1->4)-beta-linkages in the backbone of lambda- carrageenan, resulting in the tetrasaccharide alpha-D-Galp2,6S2-(1->3)- beta-D-Galp2S-(1->4)-alpha-D-Galp2,6S2-(1->3)-D-Galp2S
    source: "mapped enzyme EC:3.2.1.162"
