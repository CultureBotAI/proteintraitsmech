label: "Glycoside hydrolase family 54 (GH54)"
definition: >-
  CAZy glycoside hydrolase family 54 (GH54) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: β-jelly roll. Representative activities: b-galactosidase, xylan exo-b-1,4-xylosidase, a-L-arabinofuranosidase.
