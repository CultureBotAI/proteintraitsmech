identifier: CAZy:GH35
label: "Glycoside hydrolase family 35 (GH35)"
definition: >-
  CAZy glycoside hydrolase family 35 (GH35) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-galactosidase, chitosan exo-b-1,4-N-glucosaminase, antigen exo-b-1,3-galactosidase, galactan exo-b-1,4-galactosidase, b-1,2-glucan synthetase (elongation), galactooligosaccharide exo-b-1,2-galactosidase. Corresponds to InterPro 'Glycoside hydrolase, family 35'.
