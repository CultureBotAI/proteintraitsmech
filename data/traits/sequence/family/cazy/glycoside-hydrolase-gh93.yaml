identifier: CAZy:GH93
label: "Glycoside hydrolase family 93 (GH93)"
definition: >-
  CAZy glycoside hydrolase family 93 (GH93) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-E (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: 6-fold β-propeller. Representative activities: arabinan exo-a-1,5-L-arabinofuranobiosidase.
