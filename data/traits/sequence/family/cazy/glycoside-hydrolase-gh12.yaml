identifier: CAZy:GH12
label: "Glycoside hydrolase family 12 (GH12)"
definition: >-
  CAZy glycoside hydrolase family 12 (GH12) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-C (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: β-jelly roll. Representative activities: cellulose endo-b-1,4-glucosidase, MLG endo-b-1,4-glucosidase, xyloglucan endo-b-1,4-glucosidase. Corresponds to InterPro 'Glycoside hydrolase family 12'.
