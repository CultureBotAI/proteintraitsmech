identifier: CAZy:GH80
label: "Glycoside hydrolase family 80 (GH80)"
definition: >-
  CAZy glycoside hydrolase family 80 (GH80) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-I (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: lysozyme fold. Representative activities: chitosan endo-b-1,4-N-glucosaminase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH-I
xrefs:
  - EC:3.2.1.132
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Endohydrolysis of beta-(1->4)-linkages between D-glucosamine residues in a partly acetylated chitosan
    source: "mapped enzyme EC:3.2.1.132"
