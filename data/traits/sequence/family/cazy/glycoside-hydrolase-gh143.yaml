label: "Glycoside hydrolase family 143 (GH143)"
definition: >-
  CAZy glycoside hydrolase family 143 (GH143) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: retaining. Catalytic 3D fold: 5-fold β-propeller. Representative activities: rhamnogalacturonan II endo-b-2,3-(2-keto)-(3-deoxy)-lyxo-heptulosaric acid hydrolase.
