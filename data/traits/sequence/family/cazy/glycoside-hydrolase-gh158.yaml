  CAZy glycoside hydrolase family 158 (GH158) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: glucan endo-b-1,3-glucosidase.
