identifier: CAZy:PL33
label: "Polysaccharide lyase family 33 (PL33)"
definition: >-
  CAZy polysaccharide lyase family 33 (PL33) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 6 toroid + anti-parallel β-sheet. Representative activities: hyaluronate lyase, chondroitin AC lyase, chondroitin B lyase, gellan lyase, heparosan lyase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
