label: "Glycoside hydrolase family 105 (GH105)"
definition: >-
  CAZy glycoside hydrolase family 105 (GH105) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: Other a,e. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: rhamnogalacturonan I unsaturated-a-1,2-galacturonidase, unsaturated-b-glucuronidase, homogalacturonan unsaturated-a-1,4-galacturonidase.
