identifier: CAZy:GH130
label: "Glycoside hydrolase family 130 (GH130)"
definition: >-
  CAZy glycoside hydrolase family 130 (GH130) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: 5-fold β-propeller. Representative activities: b-mannan exo-b-1,2-mannosidase, b-1,4-mannosyl-glucose phosphorylase, b-1,4-mannan phosphorylase, b-1,4-mannosyl-N-acetyl-glucosamine phosphorylase, b-1,2-mannobiose phosphorylase, b-1,2-mannan phosphorylase, b-1,3-mannan phosphorylase, b-mannoside phosphorylase.
