identifier: CAZy:GH2
label: "Glycoside hydrolase family 2 (GH2)"
definition: >-
  CAZy glycoside hydrolase family 2 (GH2) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-glucosidase, b-galactosidase, b-mannosidase, b-glucuronidase, xylan exo-b-1,4-xylosidase, b-N-acetylhexosaminidase, a-L-arabinofuranosidase, lactose b-1,4-galactosidase (+6 more). Corresponds to InterPro 'Glycoside hydrolase, family 2'.
