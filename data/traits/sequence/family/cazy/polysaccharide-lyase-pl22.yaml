identifier: CAZy:PL22
label: "Polysaccharide lyase family 22 (PL22)"
definition: >-
  CAZy polysaccharide lyase family 22 (PL22) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: 7-fold β-propeller. Representative activities: exo-unsaturated pectate lyase, exo-unsaturated disaccharide pectate lyase.
