identifier: CAZy:GH45
label: "Glycoside hydrolase family 45 (GH45)"
definition: >-
  CAZy glycoside hydrolase family 45 (GH45) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: 6-stranded β-barrel. Representative activities: cellulose endo-b-1,4-glucosidase, xyloglucan endo-b-1,4-glucosidase, glucomannan endo-b-1,4-glucosidase. Corresponds to InterPro 'Glycoside hydrolase, family 45'.
