identifier: CAZy:GH30
label: "Glycoside hydrolase family 30 (GH30)"
definition: >-
  CAZy glycoside hydrolase family 30 (GH30) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: xylan endo-b-1,4-xylosidase, b-glucosidase, xylan exo-b-1,4-xylosidase, b-fucosidase, ceramide b-glucosidase, pustulan endo-b-1,6-glucosidase, glucuronoarabinoxylan endo-b-1,4-xylosidase, reducing end xylan exo-b-1,4-xylosidase (+5 more). Corresponds to InterPro 'Glycoside hydrolase family 30'.
