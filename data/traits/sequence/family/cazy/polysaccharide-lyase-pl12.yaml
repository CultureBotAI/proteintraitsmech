identifier: CAZy:PL12
label: "Polysaccharide lyase family 12 (PL12)"
definition: >-
  CAZy polysaccharide lyase family 12 (PL12) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 5 toroid + anti-parallel β-sheet. Representative activities: heparin lyase, heparin-sulfate lyase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
  - EC:4.2.2.7
  - EC:4.2.2.8
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Eliminative cleavage of polysaccharides containing (1->4)-linked D-glucuronate or L-iduronate residues and (1->4)-alpha-linked 2-sulfoamino-2-deoxy-6-sulfo-D-glucose residues to give oligosaccharides with terminal 4-deoxy-alpha-D-gluc-4-enuronosyl groups at their non- reducing ends
    source: "mapped enzyme EC:4.2.2.7"
    method: SOURCED
