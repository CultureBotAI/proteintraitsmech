identifier: CAZy:GH5
label: "Glycoside hydrolase family 5 (GH5)"
definition: >-
  CAZy glycoside hydrolase family 5 (GH5) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: cellulose endo-b-1,4-glucosidase, MLG endo-b-1,3/4-glucosidase, xylan endo-b-1,4-xylosidase, b-glucosidase, b-galactosidase, b-mannosidase, xylan exo-b-1,4-xylosidase, glucan endo-b-1,3-glucosidase (+20 more). Corresponds to InterPro 'Glycoside hydrolase, family 5, endoglucanase B'.
