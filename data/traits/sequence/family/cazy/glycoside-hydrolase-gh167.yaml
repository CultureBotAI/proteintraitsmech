identifier: CAZy:GH167
label: "Glycoside hydrolase family 167 (GH167)"
definition: >-
  CAZy glycoside hydrolase family 167 (GH167) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-neocarrageen exo-b-1,4-galactobiosidase, k-neocarrageen exo-b-1,4-(4-sulfo)-galactobiosidase.
