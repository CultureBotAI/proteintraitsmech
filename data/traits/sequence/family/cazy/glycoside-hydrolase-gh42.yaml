label: "Glycoside hydrolase family 42 (GH42)"
definition: >-
  CAZy glycoside hydrolase family 42 (GH42) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-galactosidase, antigen exo-b-1,3-galactosidase, a-L-arabinopyranosidase. Corresponds to InterPro 'Glycoside hydrolase, family 42'.
