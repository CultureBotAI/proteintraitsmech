identifier: CAZy:PL40
label: "Polysaccharide lyase family 40 (PL40)"
definition: >-
  CAZy polysaccharide lyase family 40 (PL40) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 6 toroid + anti-parallel β-sheet. Representative activities: b-D-glucuronate ulvan lyase, a-L-iduronate ulvan lyase.
