identifier: CAZy:PL31
label: "Polysaccharide lyase family 31 (PL31)"
definition: >-
  CAZy polysaccharide lyase family 31 (PL31) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: parallel β-helix. Representative activities: endo-b-D-mannuronate-alginate lyase, glucuronan lyase.
