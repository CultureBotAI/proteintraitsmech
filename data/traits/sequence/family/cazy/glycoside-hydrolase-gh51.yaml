identifier: CAZy:GH51
label: "Glycoside hydrolase family 51 (GH51)"
definition: >-
  CAZy glycoside hydrolase family 51 (GH51) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: cellulose endo-b-1,4-glucosidase, MLG endo-b-1,3/4-glucosidase, xylan endo-b-1,4-xylosidase, xylan exo-b-1,4-xylosidase, a-L-arabinofuranosidase, cellulose exo-b-1,4-glucobiosidase, arabinan exo-a-1,2-L-arabinofuranosidase, a-L-arabinopyranosidase.
definition_source: CAZy
