identifier: CAZy:GH116
label: "Glycoside hydrolase family 116 (GH116)"
definition: >-
  CAZy glycoside hydrolase family 116 (GH116) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-O (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: b-glucosidase, xylan exo-b-1,4-xylosidase, ceramide b-glucosidase, b-N-acetylhexosaminidase, b-D-arabinofuranosidase.
