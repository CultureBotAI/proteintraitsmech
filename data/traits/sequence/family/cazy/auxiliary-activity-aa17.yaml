label: "Auxiliary activity family 17 (AA17)"
definition: >-
  CAZy auxiliary activity family 17 (AA17) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: peroxygenase. Representative activities: lytic polygalacturonan acid monooxygenase / polygalacturonan acid oxidase (C4-dehydrogenating).
