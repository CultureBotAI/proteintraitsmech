identifier: CAZy:GH110
label: "Glycoside hydrolase family 110 (GH110)"
definition: >-
  CAZy glycoside hydrolase family 110 (GH110) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: parallel β-helix. Representative activities: a-galactosidase, antigen a-1,3-galactosidase, a-1,3-D-galactosidase.
