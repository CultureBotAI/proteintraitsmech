identifier: CAZy:GH85
label: "Glycoside hydrolase family 85 (GH85)"
definition: >-
  CAZy glycoside hydrolase family 85 (GH85) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-K (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: mannosyl-oligosaccharide endo-b-1,4-N-acetylglucosaminidase. Corresponds to InterPro 'Cytosolic endo-beta-N-acetylglucosaminidase, TIM barrel domain'.
