identifier: CAZy:PL4
label: "Polysaccharide lyase family 4 (PL4)"
definition: >-
  CAZy polysaccharide lyase family 4 (PL4) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: β-sandwich + β-sheet. Representative activities: rhamnogalacturonan lyase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
  - EC:4.2.2.23
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Endotype eliminative cleavage of L-alpha-rhamnopyranosyl-(1->4)-alpha-D- galactopyranosyluronic acid bonds of rhamnogalacturonan I domains in ramified hairy regions of pectin leaving L-rhamnopyranose at the reducing end and 4-deoxy-4,5-unsaturated D-galactopyranosyluronic acid at the non- reducing end
    source: "mapped enzyme EC:4.2.2.23"
