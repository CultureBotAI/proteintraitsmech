identifier: CAZy:GH107
label: "Glycoside hydrolase family 107 (GH107)"
definition: >-
  CAZy glycoside hydrolase family 107 (GH107) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-R (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: fucan endo-a-1,3-(2-sulfo)-fucosidase, fucan endo-a-1,4-(2-sulfo)-fucosidase, fucan endo-a-1,3-L-(4-sulfo)-fucosidase, fucan endo-a-1,3-L-(2,4-disulfo)-fucosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
