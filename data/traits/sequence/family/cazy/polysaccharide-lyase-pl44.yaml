identifier: CAZy:PL44
label: "Polysaccharide lyase family 44 (PL44)"
definition: >-
  CAZy polysaccharide lyase family 44 (PL44) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: parallel β-helix (AlphaFold). Representative activities: endo-b-D-mannuronate-alginate lyase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
  - EC:4.2.2.3
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Eliminative cleavage of alginate to give oligosaccharides with 4-deoxy- alpha-L-erythro-hex-4-enuronosyl groups at their non-reducing ends and beta-D-mannuronate at their reducing end
    source: "mapped enzyme EC:4.2.2.3"
    method: SOURCED
