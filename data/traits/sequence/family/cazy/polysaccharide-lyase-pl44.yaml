label: "Polysaccharide lyase family 44 (PL44)"
definition: >-
  CAZy polysaccharide lyase family 44 (PL44) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: parallel β-helix (AlphaFold). Representative activities: endo-b-D-mannuronate-alginate lyase.
