identifier: CAZy:GH48
label: "Glycoside hydrolase family 48 (GH48)"
definition: >-
  CAZy glycoside hydrolase family 48 (GH48) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-M (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: cellulose endo-b-1,4-glucosidase, chitin endo-b-1,4-N-acetylglucosaminidase, cellulose exo-b-1,4-glucobiosidase, reducing end cellulose exo-b-1,4-glucobiosidase. Corresponds to InterPro 'Glycoside hydrolase, 48F'.
