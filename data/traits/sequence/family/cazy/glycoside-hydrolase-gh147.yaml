label: "Glycoside hydrolase family 147 (GH147)"
definition: >-
  CAZy glycoside hydrolase family 147 (GH147) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-A (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (β / α) 8 barrel (inferred). Representative activities: b-galactosidase, arabinogalactan endo-b-1,4-galactosidase.
