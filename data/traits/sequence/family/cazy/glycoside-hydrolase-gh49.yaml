identifier: CAZy:GH49
label: "Glycoside hydrolase family 49 (GH49)"
definition: >-
  CAZy glycoside hydrolase family 49 (GH49) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-N (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: parallel β-helix. Representative activities: dextran endo-a-1,6-glucosidase, pullulan exo-a-1,4-isopanosidase, dextran exo-a-1,6-glucotriosidase, chaetomorphan endo-b-1,4-(3-sulfo)-arabinopyranosidase, panose a-1,4-glucosidase. Corresponds to InterPro 'Glycoside hydrolase, family 49, C-terminal'.
