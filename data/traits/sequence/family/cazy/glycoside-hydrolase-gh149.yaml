label: "Glycoside hydrolase family 149 (GH149)"
definition: >-
  CAZy glycoside hydrolase family 149 (GH149) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-Q (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: b-1,3-glucan phosphorylase. Corresponds to InterPro 'Cellobiose phosphorylase-like, insertion domain 2'.
