identifier: CAZy:PL38
label: "Polysaccharide lyase family 38 (PL38)"
definition: >-
  CAZy polysaccharide lyase family 38 (PL38) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 7 barrel. Representative activities: endo-b-D-mannuronate-alginate lyase, guluronate-specific alginate lyase, glucuronan lyase, exo-b-1,4-glucuronan lyase, endo-polyMG-alginate lyase, endo-polyGM-alginate lyase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
  - EC:4.2.2.3
  - EC:4.2.2.11
  - EC:4.2.2.14
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Eliminative cleavage of (1->4)-beta-D-glucuronans to give oligosaccharides with 4-deoxy-beta-D-gluc-4-enuronosyl groups at their non-reducing ends. Complete degradation of glucuronans results in the formation of tetrasaccharides
    source: "mapped enzyme EC:4.2.2.14"
    method: SOURCED
