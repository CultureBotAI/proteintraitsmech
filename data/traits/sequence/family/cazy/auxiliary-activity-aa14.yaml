identifier: CAZy:AA14
label: "Auxiliary activity family 14 (AA14)"
definition: >-
  CAZy auxiliary activity family 14 (AA14) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: peroxygenase. Representative activities: lytic cellulose monooxygenase (C1-hydroxylating), lytic xylan monooxygenase / xylan oxidase (C1-hydroxylating).
