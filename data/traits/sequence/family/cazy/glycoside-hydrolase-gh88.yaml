label: "Glycoside hydrolase family 88 (GH88)"
definition: >-
  CAZy glycoside hydrolase family 88 (GH88) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: Other a,e. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: gellan unsaturated-b-1,4-glucuronidase, chondroitin sulfate unsaturated-b-1,3-glucuronidase, unsaturated-b-glucuronidase, chondroitin unsaturated-b-1,3-glucuronidase.
