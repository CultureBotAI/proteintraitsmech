identifier: CAZy:PL6
label: "Polysaccharide lyase family 6 (PL6)"
definition: >-
  CAZy polysaccharide lyase family 6 (PL6) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: parallel β-helix. Representative activities: endo-b-D-mannuronate-alginate lyase, guluronate-specific alginate lyase, chondroitin B lyase, exo-polyMG-alginate lyase, exo-polyGM-alginate lyase, endo-polyMG-alginate lyase, endo-polyGM-alginate lyase, alginate lyase (unspecified).
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
  - EC:4.2.2.3
  - EC:4.2.2.11
  - EC:4.2.2.19
  - EC:4.2.2.26
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Eliminative cleavage of dermatan sulfate containing (1->4)-beta-D- hexosaminyl and (1->3)-beta-D-glucurosonyl or (1->3)-alpha-L-iduronosyl linkages to disaccharides containing 4-deoxy-beta-D-gluc-4-enuronosyl groups to yield a 4,5-unsaturated dermatan-sulfate disaccharide (DeltaUA- GalNAc-4S)
    source: "mapped enzyme EC:4.2.2.19"
