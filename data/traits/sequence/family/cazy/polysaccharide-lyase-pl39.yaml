identifier: CAZy:PL39
label: "Polysaccharide lyase family 39 (PL39)"
definition: >-
  CAZy polysaccharide lyase family 39 (PL39) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 6 toroid + anti-parallel β-sheet. Representative activities: endo-b-D-mannuronate-alginate lyase, guluronate-specific alginate lyase, endo-polyMG-alginate lyase, endo-polyGM-alginate lyase.
