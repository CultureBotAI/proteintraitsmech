identifier: CAZy:GH112
label: "Glycoside hydrolase family 112 (GH112)"
definition: >-
  CAZy glycoside hydrolase family 112 (GH112) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: b-1,3-galactosyl-N-acetyl-glucosamine phosphorylase, b-1,3-galactosyl-N-acetyl-galactosamine phosphorylase, b-1,4-galactosyl-L-rhamnose phosphorylase, b-galactoside phosphorylase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH
xrefs:
  - EC:2.4.1.211
  - EC:2.4.1.247
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: beta-D-galactosyl-(1->3)-N-acetyl-D-glucosamine + phosphate = alpha-D- galactose 1-phosphate + N-acetyl-D-glucosamine
    source: "mapped enzyme EC:2.4.1.211"
