identifier: CAZy:GH65
label: "Glycoside hydrolase family 65 (GH65)"
definition: >-
  CAZy glycoside hydrolase family 65 (GH65) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-L (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: trehalose a-1,1-glucosidase, hydroxylysine exo-a-1,2-glucosidase, kojibiose a-1,2-glucosidase, branched-dextran exo-1,2-a-glucosidase, maltose phosphorylase, trehalose phosphorylase, trehalose 6-phosphate phosphorylase, kojibiose phosphorylase (+2 more). Corresponds to InterPro 'Glycoside hydrolase family 65, C-terminal'.
