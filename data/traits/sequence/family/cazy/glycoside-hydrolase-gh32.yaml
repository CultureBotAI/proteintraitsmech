identifier: CAZy:GH32
label: "Glycoside hydrolase family 32 (GH32)"
definition: >-
  CAZy glycoside hydrolase family 32 (GH32) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-J (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: 5-fold β-propeller. Representative activities: inulin endo-b-2,1-fructosidase, sucrose b-2,1-fructosidase, levan exo-b-2,6-fructobiosidase, levan endo-b-2,6-fructosidase, inulin exo-b-2,1-fructosidase, levan exo-b-2,6-fructosidase, 6-kesose b-2,6-fructose, levansucrase (+2 more). Corresponds to InterPro 'Glycoside hydrolase, family 32'.
