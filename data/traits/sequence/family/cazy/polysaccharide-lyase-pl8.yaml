identifier: CAZy:PL8
label: "Polysaccharide lyase family 8 (PL8)"
definition: >-
  CAZy polysaccharide lyase family 8 (PL8) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: (α / α) 6 toroid + anti-parallel β-sheet. Representative activities: hyaluronate lyase, endo-b-D-mannuronate-alginate lyase, chondroitin AC lyase, heparin lyase, xanthan lyase, chondroitin B lyase, exo-b-1,4-glucuronan lyase, exo-hyaluronate lyase.
