identifier: CAZy:GH144
label: "Glycoside hydrolase family 144 (GH144)"
definition: >-
  CAZy glycoside hydrolase family 144 (GH144) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-S (shared fold and catalytic machinery). Mechanism: inverting. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: glucan endo-b-1,2-glucosidase, glucan exo-b-1,2-glucobiosidase. Corresponds to InterPro 'Glycoamylase-like, conserved domain'.
