identifier: CAZy:GH34
label: "Glycoside hydrolase family 34 (GH34)"
definition: >-
  CAZy glycoside hydrolase family 34 (GH34) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-E (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: 6-fold β-propeller. Representative activities: a-neuraminidase. Corresponds to InterPro 'Glycoside hydrolase, family 34'.
