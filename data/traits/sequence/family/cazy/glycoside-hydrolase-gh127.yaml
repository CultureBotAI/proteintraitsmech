identifier: CAZy:GH127
label: "Glycoside hydrolase family 127 (GH127)"
definition: >-
  CAZy glycoside hydrolase family 127 (GH127) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Clan GH-P (shared fold and catalytic machinery). Mechanism: retaining. Catalytic 3D fold: (α / α) 6 barrel. Representative activities: b-L-arabinofuranosidase, rhamnogalacturonan II endo-a-1,3-aceric acid hydrolase, b-carrageenan exo-a-1,3-anhydro-galactosidase, hydroxyproline exo-b-1,2-L-arabinofuranosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
