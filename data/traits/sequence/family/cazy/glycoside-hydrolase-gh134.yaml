label: "Glycoside hydrolase family 134 (GH134)"
definition: >-
  CAZy glycoside hydrolase family 134 (GH134) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: lysozyme fold. Representative activities: mannan endo-b-1,4-mannosidase.
