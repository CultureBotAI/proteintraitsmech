identifier: CAZy:PL18
label: "Polysaccharide lyase family 18 (PL18)"
definition: >-
  CAZy polysaccharide lyase family 18 (PL18) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: b-elimination. Catalytic 3D fold: β-jelly roll. Representative activities: endo-b-D-mannuronate-alginate lyase, guluronate-specific alginate lyase, endo-polyMG-alginate lyase, endo-polyGM-alginate lyase, alginate lyase (unspecified).
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:PL
xrefs:
  - EC:4.2.2.3
  - EC:4.2.2.11
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Eliminative cleavage of alginate to give oligosaccharides with 4-deoxy- alpha-L-erythro-hex-4-enuronosyl groups at their non-reducing ends and beta-D-mannuronate at their reducing end
    source: "mapped enzyme EC:4.2.2.3"
