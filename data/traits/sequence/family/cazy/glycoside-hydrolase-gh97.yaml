  - EC:3.2.1.20
  - EC:3.2.1.22
  - EC:3.2.1.70
  - EC:3.2.1.88
definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Hydrolysis of terminal, non-reducing alpha-D-galactose residues in alpha- D-galactosides, including galactose oligosaccharides, galactomannans and galactolipids
    source: "mapped enzyme EC:3.2.1.22"
