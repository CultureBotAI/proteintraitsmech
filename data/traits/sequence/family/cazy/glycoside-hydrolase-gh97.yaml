identifier: CAZy:GH97
label: "Glycoside hydrolase family 97 (GH97)"
definition: >-
  CAZy glycoside hydrolase family 97 (GH97) — a sequence-based family in the CAZy (Carbohydrate-Active enZymes) classification. Mechanism: inverting. Catalytic 3D fold: (β / α) 8 barrel. Representative activities: amylose exo-a-1,4-glucosidase, a-glucosidase, a-galactosidase, dextran exo-a-1,6-glucosidase, b-L-arabinopyranosidase.
definition_source: CAZy
trait_axis: SEQUENCE
trait_category: SEQ_FAMILY
term_kind: CLASS
mapping_status: SEEDED
parent_traits:
  - CAZy:GH
xrefs:
