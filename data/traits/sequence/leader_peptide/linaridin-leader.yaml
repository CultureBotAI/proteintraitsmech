identifier: proteintraitsmech:RIPP_LEADER_LINARIDIN
label: "linaridin leader peptide"
definition: >-
  Leader peptide of a linaridin precursor — linear dehydrated RiPP (dehydroamino acids without lanthionine). The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
