identifier: proteintraitsmech:RIPP_LEADER_MICROCIN
label: "microcin leader peptide"
definition: >-
  Leader peptide of a microcin precursor — small gene-encoded antibacterial RiPP/bacteriocin of Enterobacteria. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
