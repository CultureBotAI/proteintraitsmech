identifier: proteintraitsmech:RIPP_LEADER_PROTEUSIN
label: "proteusin leader peptide"
definition: >-
  Leader peptide of a proteusin precursor — polytheonamide-type RiPP with extensive epimerization/methylation. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
