label: "microviridin leader peptide"
definition: >-
  Leader peptide of a microviridin precursor — ω-ester/amide crosslinked (graspetide) RiPP protease inhibitor. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
