identifier: proteintraitsmech:RIPP_LEADER_BOTTROMYCIN
label: "bottromycin leader peptide"
definition: >-
  Leader peptide of a bottromycin precursor — macrocyclic amidine RiPP with a C-terminal decarboxylated thiazole. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
