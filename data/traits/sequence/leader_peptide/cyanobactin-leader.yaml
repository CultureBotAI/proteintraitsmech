identifier: proteintraitsmech:RIPP_LEADER_CYANOBACTIN
label: "cyanobactin leader peptide"
definition: >-
  Leader peptide of a cyanobactin precursor — N–C macrocyclic RiPP with heterocycles, from cyanobacteria (PatA/PatG proteases). The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
