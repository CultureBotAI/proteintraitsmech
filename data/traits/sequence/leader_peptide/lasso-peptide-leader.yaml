identifier: proteintraitsmech:RIPP_LEADER_LASSO_PEPTIDE
label: "lasso peptide leader peptide"
definition: >-
  Leader peptide of a lasso peptide precursor — threaded lariat-knot RiPP; leader recognised by the lasso cyclase/peptidase (B/C proteins). The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
