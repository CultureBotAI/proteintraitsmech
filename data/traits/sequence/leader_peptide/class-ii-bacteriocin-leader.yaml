identifier: proteintraitsmech:RIPP_LEADER_CLASS_II_BACTERIOCIN
label: "class II bacteriocin leader peptide"
definition: >-
  Leader peptide of a class II bacteriocin precursor — unmodified/small-modified heat-stable bacteriocin with a double-glycine leader. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
trait_axis: SEQUENCE
trait_category: SEQ_LEADER_PEPTIDE
term_kind: CLASS
mapping_status: SEEDED
synonyms:
