identifier: proteintraitsmech:RIPP_LEADER_THIOAMITIDE
label: "thioamitide leader peptide"
definition: >-
  Leader peptide of a thioamitide precursor — thioamide-bearing RiPP (e.g. thioviridamide). The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
