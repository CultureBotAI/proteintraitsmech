identifier: proteintraitsmech:RIPP_LEADER_THIOPEPTIDE
label: "thiopeptide leader peptide"
definition: >-
  Leader peptide of a thiopeptide precursor — pyridine/azole-containing macrocyclic RiPP (thiazolyl peptide). The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
