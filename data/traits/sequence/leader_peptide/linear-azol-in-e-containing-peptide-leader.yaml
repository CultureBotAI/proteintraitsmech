label: "linear azol(in)e-containing peptide leader peptide"
definition: >-
  Leader peptide of a linear azol(in)e-containing peptide precursor — cyclodehydratase-installed azole/azoline RiPP (LAP). The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
