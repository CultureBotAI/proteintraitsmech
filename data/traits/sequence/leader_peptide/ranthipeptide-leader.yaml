identifier: proteintraitsmech:RIPP_LEADER_RANTHIPEPTIDE
label: "ranthipeptide leader peptide"
definition: >-
  Leader peptide of a ranthipeptide precursor — radical non-α-thioether-linked RiPP (radical SAM). The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
