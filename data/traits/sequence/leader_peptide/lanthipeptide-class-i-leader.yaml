label: "lanthipeptide class I leader peptide"
definition: >-
  Leader peptide of a lanthipeptide class I precursor — LanB dehydratase + LanC cyclase lanthipeptide. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
