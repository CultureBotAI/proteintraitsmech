identifier: proteintraitsmech:RIPP_LEADER_HEAD_TO_TAIL_CYCLIZED_BACTERIOCIN
label: "head-to-tail cyclized bacteriocin leader peptide"
definition: >-
  Leader peptide of a head-to-tail cyclized bacteriocin precursor — circular bacteriocin with a peptide bond joining N- and C-termini. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
