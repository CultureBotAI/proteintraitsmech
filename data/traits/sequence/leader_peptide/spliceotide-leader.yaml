identifier: proteintraitsmech:RIPP_LEADER_SPLICEOTIDE
label: "spliceotide leader peptide"
definition: >-
  Leader peptide of a spliceotide precursor — RiPP with a β-amino-acid backbone splice (protease-inhibiting). The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
