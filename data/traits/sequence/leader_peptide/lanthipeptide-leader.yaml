identifier: proteintraitsmech:RIPP_LEADER_LANTHIPEPTIDE
label: "lanthipeptide leader peptide"
definition: >-
  Leader peptide of a lanthipeptide precursor — lanthionine/methyllanthionine-crosslinked RiPP (lantibiotics); leader guides LanBC/LanM modification then LanP/LanT cleavage. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
