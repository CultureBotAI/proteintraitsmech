identifier: proteintraitsmech:RIPP_LEADER_SACTIPEPTIDE
label: "sactipeptide leader peptide"
definition: >-
  Leader peptide of a sactipeptide precursor — sulfur-to-α-carbon (sactionine) crosslinked RiPP made by a radical-SAM enzyme. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
trait_axis: SEQUENCE
trait_category: SEQ_LEADER_PEPTIDE
term_kind: CLASS
mapping_status: SEEDED
synonyms:
