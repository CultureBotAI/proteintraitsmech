identifier: proteintraitsmech:RIPP_LEADER_EPIPEPTIDE
label: "epipeptide leader peptide"
definition: >-
  Leader peptide of a epipeptide precursor — D-amino-acid-containing RiPP made by a radical-SAM epimerase. The N-terminal leader directs post-translational modification and is cleaved to release the mature peptide.
definition_source: "ProteinTraitsMech curated RiPP-class taxonomy (antiSMASH/MIBiG/BAGEL4 nomenclature)"
