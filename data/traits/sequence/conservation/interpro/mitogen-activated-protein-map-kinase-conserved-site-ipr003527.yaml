identifier: InterPro:IPR003527
label: Mitogen-activated protein (MAP) kinase, conserved site
definition: >-
  Eukaryotic serine-threonine mitogen-activated protein (MAP) kinases are key regulators of cellular signal transduction systems and are conserved from Saccharomyces cerevisiae (Baker's yeast) to human beings. MAPK pathways are signalling cascades differentially regulated by growth factors, mitogens, hormones and stress which mediate cell growth, differentiation and survival. MAPK activity is regulated through a (usually) three-tiered cascade composed of a MAPK, a MAPK kinase (MAPKK, MEK) and a MAPK kinase kinase (MAPKK, MEKK). Substrates for the MAPKs include other kinases and transcription factors. Protein phosphorylation, which plays a key role in most cellular activities, is a reversible process mediated by protein kinases and phosphoprotein phosphatases. Protein kinases catalyse the transfer of the gamma phosphate from nucleotide triphosphates (often ATP) to one or more amino acid residues in a protein substrate side chain, resulting in a conformational change affecting protein function. Phosphoprotein phosphatases catalyse the reverse process. Protein kinases fall into three broad classes, characterised with respect to substrate specificity: Serine/threonine-protein kinases Tyrosine-protein kinases Dual specificity protein kinases (e.g. MEK -phosphorylates both Thr and Tyr on target proteins) Protein kinase function is evolutionarily conserved from Escherichia coli to human. Protein kinases play a role in a multitude of cellular processes, including division, proliferation, apoptosis, and differentiation. Phosphorylation usually results in a functional change of the target protein by changing enzyme activity, cellular location, or association with other proteins. The catalytic subunits of protein kinases are highly conserved, and several structures have been solved…
