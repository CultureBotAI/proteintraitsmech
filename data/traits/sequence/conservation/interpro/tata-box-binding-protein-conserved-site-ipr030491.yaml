identifier: InterPro:IPR030491
label: "TATA-box binding protein, conserved site"
definition: >-
  Transcription factor TFIID (or TATA-binding protein, TBP) is a general factor that plays a major role in the activation of eukaryotic genes transcribed by RNA polymerase II. TFIID binds specifically to the TATA box promoter element which lies close to the position of transcription initiation. There is a remarkable degree of sequence conservation of a C-terminal domain of about 180 residues in TFIID from various eukaryotic sources. This region is necessary and sufficient for TATA box binding. The most significant structural feature of this domain is the presence of two conserved repeats of a 77 amino- acid region. The intramolecular symmetry generates a saddle-shaped structure that sits astride the DNA. Drosophila TRF (TBP-related factor) is a sequence-specific transcription factor that also binds to the TATA box and is highly similar to TFIID. Archaebacteria also possess a TBP homologue. This entry represents a conserved site that spans the last 50 residues of the repeated region.
