identifier: InterPro:IPR001589
label: "Actinin-type actin-binding domain, conserved site"
definition: >-
  Alpha-actinin is a F-actin cross-linking protein which is thought to anchor actin to a variety of intracellular structures. The actin-binding domain of alpha-actinin seems to reside in the first 250 residues of the protein. A similar actin-binding domain has been found in the N-terminal region of many different actin-binding proteins, like the beta chain of spectrin (or fodrin), dystrophin, the slime mold gelation factor (or ABP-120), filamin and fimbrin. This entry represents two conserved sites for the actin-binding domain.
