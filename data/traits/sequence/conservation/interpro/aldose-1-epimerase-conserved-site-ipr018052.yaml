identifier: InterPro:IPR018052
label: "Aldose 1-epimerase, conserved site"
definition: >-
  Aldose 1-epimerase (mutarotase) is the enzyme responsible for the anomeric interconversion of D-glucose and other aldoses between their alpha- and beta-forms. The sequence of mutarotase from two bacteria, Acinetobacter calcoaceticus and Streptococcus thermophilus is available. It has also been shown that, on the basis of extensive sequence similarities, a mutarotase domain seems to be present in the C-terminal half of the fungal GAL10 protein which encodes, in the N-terminal part, UDP-glucose 4-epimerase. The entry represents a conserved site of aldose 1-epimerase, which is centred around a conserved histidine residue and may be involved in the catalytic mechanism.
