identifier: InterPro:IPR018266
label: "Large ribosomal subunit protein eL33, conserved site"
definition: >-
  The ribosomal eL33 eukaryotic and archaebacterial ribosomal proteins, previously known as L35A, can be grouped on the basis of sequence similarities. One of these families consists of: Vertebrate eL33 (old name L35A). Caenorhabditis elegans eL33 (old name L35A (F10E7.7)). Saccharomyces cerevisiae eL33A/eL33B (old name L37A/L37B (Rp47)). Plant eL33 (old name L35A). Pyrococcus woesei eL33 (old name L35A) homologue. These proteins have 87 to 110 amino-acid residues. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like projections that extend into the rRNA core to stabilise its structure. Most of the proteins interact with multiple RNA elements, often from differen…
