identifier: InterPro:IPR018235
label: Bacterial luciferase, conserved site
definition: >-
  The enzyme responsible for bioluminescence in motile Gram-negative luminous bacteria is bacterial luciferase ( ), which catalyses the oxidation the oxidation of reduced riboflavin phosphate (FMNH2) and a long chain fatty aldehyde with the emission of blue green light (490 nm). Luciferase is a heterodimeric enzyme composed of an alpha subunit (gene luxA) and a beta subunit (gene luxB). The two subunits appear to have arisen by gene duplication. The bioluminescence operon of some species of Photobacterium encodes a protein known as the non-fluorescent flavoprotein (NFP) (gene luxF). NFP, whose function is not yet known, contains an unusual non-covalently bound flavin. It is evolutionary related to the luxA/luxB subunits. This conserved site is located in the central part of the proteins in this entry.
