identifier: InterPro:IPR060780
label: "ESX-1 associated ATP-binding protein EpsI, conserved site"
definition: >-
  This entry represents a short homology region that is located before the proline-rich region at the N-terminal in EpsI proteins. In Mycobacterium tuberculosis, the ATP-binding protein EpsI is found associated with the ESX-1, a type VII secretion system (T7SS), and regulates that system in response to ATP levels. EpsI-like proteins contain long regions of proline-rich low-complexity sequence.
