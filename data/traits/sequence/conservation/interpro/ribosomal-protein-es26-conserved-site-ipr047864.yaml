identifier: InterPro:IPR047864
label: "Ribosomal protein eS26, conserved site"
definition: >-
  This entry represents a conserved octapeptide in the central part of small ribosomal subunit protein eS26 (previously known as S26), mainly found in eukaryotes. This entry includes mammalian S26; Octopus S26; Drosophila S26 (DS31); plant cytoplasmic S26; and fungal S26. S26 may be involved in the attachment of eIF3 and poly (U). Disruption of RPS26, the gene encoding a homologue of ribosomal protein small subunit S26 in yeast (S. cerevisiae), resulted in the formation of micro-colonies, suggesting that it is important for the normal cell growth of S. cerevisiae. This entry also includes uncharacterised archaeal sequences.
