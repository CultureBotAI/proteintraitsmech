identifier: InterPro:IPR018264
label: "Large ribosomal subunit protein bL33, conserved site"
definition: >-
  Ribosomal protein bL33 is one of the proteins from the large ribosomal subunit. In Escherichia coli, bL33 has been shown to be on the surface of 50S subunit. This entry represents a conserved site located in the central section of these proteins: Eubacterial bL33. Algal and plant chloroplast bL33c. Cyanelle bL33. Fungal bL33m (also known as MRPL39). L33 is a small protein of 49 to 66 amino-acid residues.
