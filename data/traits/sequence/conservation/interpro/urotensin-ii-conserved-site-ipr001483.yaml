identifier: InterPro:IPR001483
label: "Urotensin II, conserved site"
definition: >-
  Urotensin II (UII) is a vasoactive somatostatin-like or cortistatin-like peptide hormone. However, despite the apparent structural similarity to these peptide hormones, they are not homologous to UII. Urotensin II was first identified in fish spinal cord but later found in humans and other mammals. In fish, UII is secreted at the back part of the spinal cord, in a neurosecretory centre called uroneurapophysa, and is involved in the regulation of the renal and cardiovascular systems. In mammals, urotensin II is the most potent mammalian vasoconstrictor identified to date and causes contraction of arterial blood vessels, including the thoracic aorta. This entry represents a conserved site found at the C-terminal of urotensin II.
