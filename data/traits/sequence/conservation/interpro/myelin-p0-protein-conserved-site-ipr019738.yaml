identifier: InterPro:IPR019738
label: "Myelin P0 protein, conserved site"
definition: >-
  The P0 protein is a major structural glycoprotein of the peripheral nervous system (PNS) myelin, which probably plays an important role for the formation and the maintenance of myelin structure; it is well conserved across species. P0 is a protein of about 28 Kd that consists of three domains: a N-terminal extracellular domain of about 125 residues which seems to form a V-type immunoglobulin domain; a transmembrane region, and a cytoplasmic C-terminal domain of about 70 residues which contains many positively charged residues and which is a substrate of some serine protein kinases.
