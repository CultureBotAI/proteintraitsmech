identifier: InterPro:IPR018122
label: "Fork head domain conserved site1"
definition: >-
  The fork head domain is a conserved domain of about 100 amino-acid residues found in some eukaryotic transcription factors. It is involved in DNA-binding. This entry represents a conserved site found in the N-terminal section of the fork head domain.
