identifier: InterPro:IPR020816
label: "Histone-like DNA-binding protein, conserved site"
definition: >-
  This entry represents a twenty residue sequence which includes three perfectly conserved positions. According to the tertiary structure of one of these proteins, this pattern spans exactly the first half of the flexible DNA-binding arm. Bacteria synthesise a set of small, usually basic proteins of about 90 residues that bind DNA and are known as histone-like proteins. Examples include the HU protein in Escherichia coli which is a dimer of closely related alpha and beta chains and in other bacteria can be a dimer of identical chains. HU-type proteins have been found in a variety of eubacteria, cyanobacteria and archaebacteria, and are also encoded in the chloroplast genome of some algae. The integration host factor (IHF), a dimer of closely related chains which seem to function in genetic recombination as well as in translational and transcriptional control is found in enterobacteria and viral proteins include the African Swine fever virus protein Pret-047 (also known as A104R or LMW5-AR). The exact function of these proteins is not yet clear but they are capable of wrapping DNA and stabilising it from denaturation under extreme environmental conditions. The structure is known for one of these proteins. The protein exists as a dimer and two "β-arms" function as the non-specific binding site for bacterial DNA.
