identifier: InterPro:IPR019806
label: Heat-stable enterotoxin, conserved site
definition: >-
  This entry represents a group of heat-stable enterotoxins, such as STa from Escherichia coli, which are an important cause of acute diarrhoea in infants and travellers in developing countries. The mature STa protein is a 19-residue peptide containing three disulphide bridges that are functionally important. STa contains an N-terminal signal peptide composed of two domains, Pre and Pro, involved in extracellular toxin release, and a core enterotoxigenic domain. STa binds to and activates the guanylate cyclase C intestinal receptor, causing an increase in the intracellular levels of cyclic guanosine monophosphate (cGMP). The signature pattern used in this entry contains the 6 cysteines that are involved in disulphide bridges and the three conserved residues of the mature enterotoxin.
