identifier: InterPro:IPR000633
label: Vinculin, conserved site
definition: >-
  Vinculin is a eukaryotic protein that appears to be involved in the attachment of actin-based microfilaments to the plasma membrane. It also interacts with other structural proteins, such as talin and alpha-actinin. The protein is located on the cytoplasmic side of focal contacts or adhesion plaques. Vinculin is a large protein (~1000 residues) that contains an acidic N-terminal domain, separated from a smaller, basic C-terminal domain by a 50-residue proline-rich region. The central part of the N-terminal domain consists of a variable number of repeats of a 110-residue domain, one of which is lacking in nematode vinculin.
