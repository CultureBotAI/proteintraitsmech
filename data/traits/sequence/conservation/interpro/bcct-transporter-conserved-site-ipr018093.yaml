identifier: InterPro:IPR018093
label: "BCCT transporter, conserved site"
definition: >-
  These prokaryotic transport proteins belong to a family known as BCCT (for Betaine / Carnitine / Choline Transporters) and are specific for compounds containing a quaternary nitrogen atom. The BCCT proteins contain 12 transmembrane regions and are energized by proton symport. They contain a conserved region with four tryptophans in their central region. This entry represents a conserved sequence region from these proteins containing four tryptophan residues.
