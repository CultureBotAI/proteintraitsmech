identifier: InterPro:IPR018520
label: Di-trans-poly-cis-decaprenylcistransferase-like, conserved site
definition: >-
  Synonym(s): Di-trans-poly-cis-undecaprenyl-diphosphate synthase, Undecaprenyl pyrophosphate synthetase, Undecaprenyl pyrophosphate synthase, UPP synthetase Di-trans-poly-cis-decaprenylcistransferase ( ) (UPP synthetase) generates undecaprenyl pyrophosphate (UPP) from isopentenyl pyrophosphate (IPP). This bacterial enzyme is also found in archaebacteria and in a number of uncharacterised proteins including some from yeasts. This conserved pattern is found towards the C-terminal region in many of the proteins in this entry. The proteins are of about 26 to 40kDa whose central region is well conserved. This pattern also hits related enzymes such as dehydrodolichyl diphosphate synthase.
