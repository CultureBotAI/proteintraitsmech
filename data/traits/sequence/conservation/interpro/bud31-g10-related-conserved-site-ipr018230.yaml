identifier: InterPro:IPR018230
label: "BUD31/G10-related, conserved site"
definition: >-
  A Xenopus protein known as G10 and alternatively as BUD31-homologue has been found to be highly conserved in a wide range of eukaryotic species. The function of G10 is still unknown. G10 is a protein of about 17 to 18kDa (143 to 157 residues) which is hydrophilic and whose C-terminal half is rich in cysteines and could be involved in metal-binding.
