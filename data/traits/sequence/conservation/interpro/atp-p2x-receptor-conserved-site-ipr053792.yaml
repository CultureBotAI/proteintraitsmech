identifier: InterPro:IPR053792
label: "ATP P2X receptor, conserved site"
definition: >-
  This entry represents a conserved region in P2X purinoceptors, located in the central part of the extracellular domain, which contains two of the conserved cysteines. P2X purinoceptors are cation-selective ion channels that open on binding to extracellular ATP; they play a role in fast synaptic transmission between neurons, and from autonomic nerves to smooth muscles. When ATP is released as a neurotransmitter from central and peripheral nerves, it acts at P2X receptors to produce postsynaptic depolarization and excitation. P2X purinoceptors are cell membrane ion channels, gated by adenosine 5'-triphosphate (ATP) and other nucleotides; they have been found to be widely expressed on mammalian cells, and, by means of their functional properties, can be differentiated into three sub-groups. The first group is almost equally well activated by ATP and its analogue alpha,betamethylene-ATP, whereas, the second group is not activated by the latter compound. A third type of receptor (also called P2Z) is distinguished by the fact that repeated or prolonged agonist application leads to the opening of much larger pores, allowing large molecules to traverse the cell membrane. This increased permeability rapidly leads to cell death, and lysis. Molecular cloning studies have identified seven P2X receptor subtypes, designated P2XR1-P2XR7, however, P2X1R, P2X2R, P2X3R, P2X4R, and P2X7R are functional. These receptors are proteins that share 35-48% amino acid identity, and possess two putative transmembrane (TM) domains, separated by a long (~270 residues) intervening sequence, which is thought to form an extracellular loop. Around 1/4 of the residues within the loop are invariant between the cloned subtypes, including 10 characteristic cysteines. Studies of the functional properties of…
