label: "Large ribosomal subunit protein uL29, conserved site"
definition: >-
  Ribosomal protein uL29 is one of the proteins from the large ribosomal subunit. uL29 belongs to a family of ribosomal proteins of 63 to 138 amino-acid residues which, on the basis of sequence similarities, groups: Red algal uL29. Bacterial uL29. Mammalian uL29 (known as L35) Caenorhabditis elegans uL29 (known as L35) (ZK652.4). Yeast uL29 (known as L35). uL29 is located on the surface of the large ribosomal subunit, where it participates in forming a protein ring that surrounds the polypeptide exit channel, providing structural support for the ribosome. uL29 is involved in forming the translocon binding site, along with L19, L22, L23, L24, and L31e. In addition, uL29 and L23 form the interaction site for trigger factor (TF) on the ribosomal surface, adjacent to the exit tunnel. uL29 forms numerous interactions with L23 and with the 23S rRNA. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the s…
