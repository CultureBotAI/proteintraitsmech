identifier: InterPro:IPR022539
label: "Picornavirus VP1, conserved C-terminal region"
definition: >-
  This region is found in VP1 structural proteins of picornaviruses, and is approximately 20 amino acids in length. It is located C-terminal to . This region constitutes the part of VP1 that is unstructured and interacts with VP0/VP2 structural protein. It contains an invariant tyrosine that engages in interaction with VP0/VP2.
