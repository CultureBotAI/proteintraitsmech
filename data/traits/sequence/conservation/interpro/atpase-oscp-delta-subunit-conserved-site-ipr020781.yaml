identifier: InterPro:IPR020781
label: ATPase, OSCP/delta subunit, conserved site
definition: >-
  ATP synthase (proton-translocating ATPase) is a component of the cytoplasmic membrane of eubacteria, the inner membrane of mitochondria, and the thylakoid membrane of chloroplasts. The ATPase complex is composed of an oligomeric transmembrane sector, called CF(0), which acts as a proton channel, and a catalytic core, termed coupling factor CF(1). One of the subunits of the ATPase complex, known as subunit delta in bacteria and chloroplasts, or the Oligomycin Sensitivity Conferral Protein (OSCP) in mitochondria, seems to be part of the stalk that links CF(0) to CF(1). It either transmits conformational changes from CF(0) into CF(1) or is involved in proton conduction. The different delta/OSCP subunits are proteins of approximately 200 amino-acid residues - once the transit peptide has been removed in the chloroplast and mitochondrial forms - which show only moderate sequence homology. This entry represents a conserved site in the C-terminal section of these proteins.
