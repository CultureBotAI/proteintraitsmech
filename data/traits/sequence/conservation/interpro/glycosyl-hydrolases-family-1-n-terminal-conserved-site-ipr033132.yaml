label: "Glycosyl hydrolases family 1, N-terminal conserved site"
definition: >-
  This entry represents a conserved site at the N-terminal in Glycosyl hydrolases family 1 proteins. Glycoside hydrolase family 1 ( ) comprises enzymes with a number of known activities; beta-glucosidase ( ); beta-galactosidase ( ); 6-phospho-beta-galactosidase ( ); 6-phospho-beta-glucosidase ( ); lactase-phlorizin hydrolase ( )/( ); beta-mannosidase ( ); myrosinase ( ).
