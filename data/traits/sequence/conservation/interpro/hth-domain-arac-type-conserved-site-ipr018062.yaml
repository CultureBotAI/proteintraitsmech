identifier: InterPro:IPR018062
label: HTH domain AraC-type, conserved site
definition: >-
  Many bacterial transcription regulation proteins bind DNA through a 'helix-turn-helix' (HTH) motif. One major subfamily of these proteins is related to the arabinose operon regulatory protein AraC [ , . Except for celD, all of these proteins seem to be positive transcriptional factors. Although the sequences belonging to this family differ somewhat in length, in nearly every case the HTH motif is situated towards the C terminus in the third quarter of most of the sequences. The minimal DNA binding domain spans roughly 100 residues and comprises two HTH subdomains; the classical HTH domain and another HTH subdomain with similarity to the classical HTH domain but with an insertion of one residue in the turn-region. The N-terminal and central regions of these proteins are presumed to interact with effector molecules and may be involved in dimerisation. The known structure of MarA shows that the AraC domain is α helical and shows the two HTH subdomains both bind the major groove of the DNA. The two HTH subdomains are separated by only 27 angstroms, which causes the cognate DNA to bend. This entry represents the conserved region covering the first HTH domain and the putative second HTH domain within the AraC binding region.
