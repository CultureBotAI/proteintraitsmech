identifier: InterPro:IPR018271
label: Small ribosomal subunit protein uS14, conserved site
definition: >-
  uS14 is one of the proteins from the small ribosomal subunit. In Escherichia coli, uS14 is known to be required for the assembly of 30S particles and may also be responsible for determining the conformation of 16S rRNA at the A site. It belongs to a family of ribosomal proteins that include bacterial, algal and plant chloroplast uS14, cyanelle uS14, archaebacteria Methanococcus vannielii uS14, as well as yeast mitochondrial MRP2, yeast RPS29A/B, and mammalian RPS29.
