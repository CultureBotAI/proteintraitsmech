identifier: InterPro:IPR018099
label: Purine phosphorylase, family 2, conserved site
definition: >-
  This entry consists of purine nucleoside phosphorylase ( ) (PNP) that catalyses the cleavage of guanosine or inosine to respective bases and sugar-1-phosphate molecules, 6-oxopurine nucleoside phosphorylase ( ) that is a purine nucleoside phosphorylase specific for 6-oxopurine nucleosides, 5'-methylthioadenosine phosphorylase ( ) (MTAP) that catalyses the reversible phosphorylation of S-methyl-5'-thioadenosine (MTA) to adenine and 5-methylthioribose-1-phosphate and xanthosine phosphorylase ( ) that degrades all purine nucleosides except adenosine and deoxyadenosine.
