identifier: InterPro:IPR018275
label: Small ribosomal subunit protein bS18, conserved site
definition: >-
  The small ribosomal subunit protein bS18 (previously known as S18) is known to be involved in binding the aminoacyl-tRNA complex in Escherichia coli, and appears to be situated at the tRNA A-site. Experimental evidence has revealed that bS18 is well exposed on the surface of the E. coli ribosome, and is a secondary rRNA binding protein. bS18 belongs to a family of ribosomal proteins that includes: eubacterial bS18; metazoan mitochondrial bS18m, algal and plant chloroplast bS18c; and cyanelle S18. There are 3 mitochondrial isoforms of bS18 in mammals, localizing to 3 distinct sites in the mitoribosome. bS18m (b1S8c) binds to the same site as bacterial bS18, mS40 (also known as bS18b) binds to a novel location of the 28S small subunit, and mL66 (bS18a) binds to the 39S large subunit. This entry represents a conserved region in the central section of bacterial bS18, plant bS18c and bS18m from animals, which contains two basic residues that may be involved in RNA-binding. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of R…
