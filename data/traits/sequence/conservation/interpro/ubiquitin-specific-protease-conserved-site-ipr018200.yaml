identifier: InterPro:IPR018200
label: Ubiquitin specific protease, conserved site
definition: >-
  Protein ubiquitination is a reversible posttranslational modification that affects a large number of cellular processes, including protein degradation, trafficking, cell signalling, and the DNA damage response. Ubiquitination is reversible, and dedicated deubiquitinases exist that hydrolyse isopeptide bonds. Ubiquitin-specific proteases (USPs) are the largest family of deubiquitinating enzymes. USP domains consist of a common conserved catalytic core that is interspersed at five points with insertions, some of which are as large as the catalytic domain itself. The insertions can fold into independent domains that can be involved in the regulation of deubiquitinase activity. As commonly found in signalling proteins, many USP deubiquitinases have a modular architecture and not only contain a catalytic domain but also additional protein-protein interaction and localisation domains. Most USP domains cleave the isopeptide linkage between two ubiquitin molecules and hence contain (at least) two ubiquitin-binding sites, one for the distal ubiquitin, the C terminus of which is linked to the Lys residue on the proximal ubiquitin in a second, proximal binding site. The USP domain forms the peptidase family C19. The USP catalytic core can be divided into six conserved boxes that are present in all USP domains. Box 1 contains the catalytic Cys residue, box 5 contains the catalytic His, and box 6 contains the catalytic Asp/Asn residue. All boxes show several additional conserved features and residues. Boxes 3 and 4 contain a Cys-X-X-Cys motif each, which have been shown to constitute a functional zinc-binding motif. Potentially, zinc-binding facilitates folding of the USP core, helping the interaction of sequence motifs some few hundred residues apart. USP domains share a common co…
