identifier: InterPro:IPR000399
label: TPP-binding enzyme, conserved site
definition: >-
  A number of enzymes require thiamine pyrophosphate (TPP) (vitamin B1) as a cofactor. It has been shown that some of these enzymes are structurally related. Enzymes with a TPP-binding domain include: Pyruvate oxidase (POX). Reaction catalysed: pyruvate + orthophosphate + O(2) + H(2)O = acetyl phosphate + CO(2) + H(2)O(2). Pyruvate decarboxylase (PDC). Reaction catalysed: pyruvate = acetaldehyde + CO(2). Indolepyruvate decarboxylase. Reaction catalysed: indole-3-pyruvate = indole-3-acetaldehyde + CO(2). Acetolactate synthase (ALS). Reaction catalysed: 2x pyruvate = acetolactate + CO(2). Benzoylformate decarboxylase (BFD). Reaction catalysed: benzoylformate = benzaldehyde + CO(2).
