identifier: InterPro:IPR018219
label: "Thiol peroxidase conserved site"
definition: >-
  Escherichia coli protein Tpx is an antioxidant protein with a thiol peroxidase activity. It acts as an antioxidant enzyme by removing peroxides within the catalase-and peroxidase-deficient periplasmic space of E. coli. It is a small protein of 18kDa whose sequence is well conserved in other bacterial species.
