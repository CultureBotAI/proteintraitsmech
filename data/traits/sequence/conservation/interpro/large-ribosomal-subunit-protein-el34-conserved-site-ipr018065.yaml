identifier: InterPro:IPR018065
label: "Large ribosomal subunit protein eL34, conserved site"
definition: >-
  This entry represents the conserved site of large ribosomal subunit protein eL34. A number of eukaryotic and archaebacterial ribosomal proteins belong to the eL34 family. These include, vertebrate eL34, mosquito eL34 (known as L31), plant eL34, yeast putative ribosomal protein YIL052c and archaebacterial eL34.
