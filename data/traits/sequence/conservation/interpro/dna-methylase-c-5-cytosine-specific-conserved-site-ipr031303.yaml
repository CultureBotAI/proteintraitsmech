identifier: InterPro:IPR031303
label: "DNA methylase, C-5 cytosine-specific, conserved site"
definition: >-
  C-5 cytosine-specific DNA methylases (C5 Mtase) are enzymes that specifically methylate the C-5 carbon of cytosines in DNA. Such enzymes are found in the proteins described below. As a component of type II restriction-modification systems in prokaryotes and some bacteriophages. Such enzymes recognise a specific DNA sequence where they methylate a cytosine. In doing so, they protect DNA from cleavage by type II restriction enzymes that recognise the same sequence. The sequences of a large number of type II C-5 Mtases are known. In vertebrates, there are a number of C-5 Mtases that methylate CpG dinucleotides. The sequence of the mammalian enzyme is known. C-5 Mtases share a number of short conserved regions. This conserved region is located at the C-terminal extremity in type-II enzymes.
