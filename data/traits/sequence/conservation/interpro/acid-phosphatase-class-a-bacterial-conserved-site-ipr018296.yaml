identifier: InterPro:IPR018296
label: "Acid phosphatase, class A, bacterial, conserved site"
definition: >-
  Class A bacterial acid phosphatases ( ) are a group of related proteins that catalyse the conversion of an orthophosphoric monoester and water to an alcohol and orthophosphate. This reaction is non-specific and occurs in the periplasm. The enzyme is found as a homotetramer in Morganella morganii (Proteus morganii) and possibly as a homodimer in Salmonella typhimurium, where it is regulated by a 2-component regulatory system formed by the products of the phoP and phoQ genes.
