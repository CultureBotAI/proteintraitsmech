identifier: InterPro:IPR002365
label: "Terpene synthase, conserved site"
definition: >-
  Several enzymes catalyse mechanistically related reactions which involve the highly complex cyclic rearrangement of squalene or its 2,3 oxide. Lanosterol synthase ( ) (oxidosqualene--lanosterol cyclase) catalyzes the cyclization of (S)-2,3-epoxysqualene to lanosterol, the initial precursor of cholesterol, steroid hormones and vitamin D in vertebrates and of ergosterol in fungi (gene ERG7). Cycloartenol synthase ( ) (2,3-epoxysqualene--cycloartenol cyclase), is a plant enzyme that catalyzes the cyclization of (S)-2,3-epoxysqualene to cycloartenol, and hopene synthase ( ) (squalene--hopene cyclase), is a bacterial enzyme that catalyzes the cyclization of squalene into hopene, a key step in hopanoid (triterpenoid) metabolism. These enzymes are evolutionary related proteins of about 70 to 85 kD. This highly conserved region is rich in aromatic residues and is located in the C-terminal section.
