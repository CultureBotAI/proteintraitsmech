identifier: InterPro:IPR013852
label: "Translation elongation factor P/YeiP, conserved site"
definition: >-
  Elongation factor P (EF-P) is a prokaryotic protein translation factor required for efficient peptide bond synthesis on 70S ribosomes from fMet-tRNAfMet. Probably functions indirectly by altering the affinity of the ribosome for aminoacyl-tRNA, thus increasing their reactivity as acceptors for peptidyl transferase. This entry represents a conserved sequence region found near the C terminus.
