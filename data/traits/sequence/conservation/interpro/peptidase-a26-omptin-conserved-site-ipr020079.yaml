identifier: InterPro:IPR020079
label: Peptidase A26, omptin, conserved site
definition: >-
  This entry represents two well conserved regions in the central part of these proteins. This group of aspartic peptidases belongs to the MEROPS family A26 (clan AF). Members of the family are transmembrane proteins. The type example for the family is omptin (also known as protease VII) from Escherichia coli, the product of the ompT gene. Omptin preferentially cleaves polypeptides between two basically-charged amino acids. The tertiary structure has been solved and shows a ten-stranded β barrel, and because the strands are amphipathic, hydrolphilic rsidue point into the barrel with the hydrophobic residue on the outside. The active site residues, two pairs of aspartic acids and a histidine, are on opposite sides of the active site groove and at the periplasmic surface. Because the enzyme is sensitive to the serine protease inhibitor diisopropylfluoro-phosphate, omptin was incorrectly identified as a serine peptidase. The family also includes the surface protease Pla from the plague organism Yersinia pestis, which is an important virulence factor. Pla can activate plasminogen and inactivate plasmin inhibitor, which may lead to uncontrolled proteolysis and aid entry of the bacterium into the circulation. Pla is temperature sensitive, with proteolytic activity changing with temperature. At temperatures below 30 C, Pla acts as a coagulase, but at temperatures above 30 C it is fibrolytic. Aspartic peptidases, also known as aspartyl proteases ([ec:3.4.23.-]), are widely distributed proteolytic enzymes known to exist in vertebrates, fungi, plants, protozoa, bacteria, archaea, retroviruses and some plant viruses. All known aspartic peptidases are endopeptidases. A water molecule, activated by two aspartic acid residues, acts as the nucleophile in catalysis. Aspartic peptidases…
