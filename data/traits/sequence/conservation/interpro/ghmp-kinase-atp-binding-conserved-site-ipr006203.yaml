identifier: InterPro:IPR006203
label: GHMP kinase, ATP-binding, conserved site
definition: >-
  The galacto- ( ), homoserine ( ), mevalonate ( ) and phosphomevalonate ( ) kinases contain, in their N-terminal section, a conserved Gly/Ser-rich region which is probably involved in the binding of ATP. This group of kinases has been called 'GHMP' (from the first letter of their substrates). This site is also found in some diphosphomevalonate decarboxylases, which are structurally related members of the GHMP superfamily, but do not possess kinase activity.
