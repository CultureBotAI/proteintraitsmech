identifier: InterPro:IPR057488
label: "Diatom pyrenoid component 4, C-terminal motif"
definition: >-
  This entry represents a small motif found in two copies at the C-terminal of DPC4. DPC4 localises throughout the pyrenoid matrix in diatoms. Shows matrix-type localisation and interacts with Shell4 and Rubisco but function currently unknown. May have a role in matrix assembly/organisation.
