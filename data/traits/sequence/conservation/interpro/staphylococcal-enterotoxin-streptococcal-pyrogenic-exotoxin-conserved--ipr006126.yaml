identifier: InterPro:IPR006126
label: "Staphylococcal enterotoxin/Streptococcal pyrogenic exotoxin, conserved site"
definition: >-
  Staphylococcal enterotoxins and streptococcal pyrogenic exotoxins constitute a family of biologically and structurally related toxins produced by Staphylococcus aureus and Streptococcus pyogenes. These toxins share the ability to bind to the major histocompatibility complex proteins of their hosts. A more distant relative of the family is the S. aureus toxic shock syndrome toxin (TSST-1), which shares only a low level of sequence similarity with this group. This family is identified by a well conserved region of enterotoxins and pyrogenic exotoxins, but which does not pick up TSST-1.
