identifier: InterPro:IPR020593
label: Gamma-glutamyl phosphate reductase GPR, conserved site
definition: >-
  This entry represents a conserved region that contains two histidine residues. This region is located in the last third of GPR. Gamma-glutamyl phosphate reductase ( ) (GPR) is the enzyme that catalyzes the second step in the biosynthesis of proline from glutamate, the NADP-dependent reduction of L-glutamate 5-phosphate into L-glutamate 5-semialdehyde and phosphate. In bacteria (gene proA) and yeast (gene PRO2), GPR is a monofunctional protein, while in plants and mammals, it is a bifunctional enzyme (P5CS) that consists of two domains, an N-terminal glutamate 5-kinase domain ( ) and a C-terminal GPR domain.
