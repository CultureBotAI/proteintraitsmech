identifier: InterPro:IPR019790
label: "Xylulose 5-phosphate/Fructose 6-phosphate phosphoketolase, conserved site"
definition: >-
  Phosphoketolases (PK) are key enzymes of the pentose phosphate pathway of heterofermentative and facultative homofermentative lactic acid bacteria and of the D-fructose 6-phosphate shunt of bifidobacteria. PK activity has been sporadically reported in other microorganisms including eukaryotic yeasts. Xylulose-5-phosphate/fructose-6-phosphate phosphoketolase is a thiamine diphosphate (ThdP)-dependent enzyme found in bacteria such as Bifidobacterium sp. This enzyme has dual-specificity with the following catalytic activities: : xylose 5-P + Pi = acetyl-P + glyeraldehyde-3-P : fructose-6-P + Pi = acetyl-P + erythrose-4-P Phosphoketolases are distantly related to transketolases, e.g. . A multiple alignment of PK sequences shows several highly conserved regions. The function of the conserved site represented by the signature in this entry is unknown.
