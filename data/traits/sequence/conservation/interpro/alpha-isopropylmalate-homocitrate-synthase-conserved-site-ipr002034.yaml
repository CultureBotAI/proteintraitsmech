identifier: InterPro:IPR002034
label: Alpha-isopropylmalate/homocitrate synthase, conserved site
definition: >-
  A number of enzymes have been shown to be functionally as well as evolutionary related. The nifV and leuA genes encode homocitrate synthase and alpha-isopropylmalate synthase, respectively The N-terminal parts of NifV and LeuA from bacteria are highly similar to each other. Homocitrate synthase ( ) (gene nifV) is involved in the biosynthesis of the iron-molybdenum cofactor of nitrogenase and catalyzes the condensation of acetyl-CoA and alpha-ketoglutarate into homocitrate. Alpha-isopropylmalate synthase ( ) catalyses the first step in the biosynthesis of leucine, the condensation ofacetyl-CoA and alpha-ketoisovalerate to form 2-isopropylmalate synthase.
