label: "Large ribosomal subunit protein uL24, conserved site"
definition: >-
  This entry represents a conserved site found in the large ribosomal subunit protein uL24 family. Ribosomal protein uL24 is one of the proteins from the large ribosomal subunit. uL24 belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups: Eubacterial uL24. Plant chloroplast uL24 (nuclear-encoded). Red algal uL24. Vertebrate uL24 (known as L26). Yeast uL24 (known as L26 (YL33)). Archaebacterial HmaL24 (HL15). A probable ribosomal protein from Sulfolobus acidocaldarius. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like projections that extend into the rRNA core to stabilise its structure. Most of the proteins interact wit…
