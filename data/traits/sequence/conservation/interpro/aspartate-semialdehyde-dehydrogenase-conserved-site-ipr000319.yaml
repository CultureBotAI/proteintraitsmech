identifier: InterPro:IPR000319
label: Aspartate-semialdehyde dehydrogenase, conserved site
definition: >-
  Bacteria, plants and fungi metabolise aspartic acid to produce four amino acids -lysine, threonine, methionine and isoleucine -in a series of reactions known as the aspartate pathway. Additionally, several important metabolic intermediates are produced by these reactions, such as diaminopimelic acid, an essential component of bacterial cell wall biosynthesis, and dipicolinic acid, which is involved in sporulation in Gram-positive bacteria. Members of the animal kingdom do not posses this pathway and must therefore acquire these essential amino acids through their diet. Research into improving the metabolic flux through this pathway has the potential to increase the yield of the essential amino acids in important crops, thus improving their nutritional value. Additionally, since the enzymes are not present in animals, inhibitors of them are promising targets for the development of novel antibiotics and herbicides. For more information see. Aspartate-semialdehyde dehydrogenase, the second enzyme in the aspartate pathway, converts aspartyl phosphate to aspartate-semialdehyde, the branch point intermediate between the lysine and threonine/methionine pathways. Based on sequence alignments, the aspartate-semialdehyde dehydrogenase family appears to have at least three distinct subfamilies. Most studies have been performed on enzymes isolated from Gram-negative bacteria. The N-terminal domain forms the active site and NADP-binding pocket, while C-terminal domain is primarily involved in hydrophobic intersubunit contacts. The catalytic mechanism involves the formation of a covalent thioester acyl-enzyme intermediate mediated through nucleophilic attack by an active site cysteine residue on the substrate aspartyl phosphate. Release of inorganic phosphate is followed by hydr…
