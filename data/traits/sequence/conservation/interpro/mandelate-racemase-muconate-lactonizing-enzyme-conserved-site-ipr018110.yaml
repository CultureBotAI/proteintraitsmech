identifier: InterPro:IPR018110
label: "Mandelate racemase/muconate lactonizing enzyme, conserved site"
definition: >-
  Mandelate racemase (MR) and muconate lactonizing enzyme (MLE) are two bacterial enzymes involved in aromatic acid catabolism. They catalyse mechanistically distinct reactions, yet they are related at the level of their primary, quaternary (homooctamer) and tertiary structures. A number of other proteins also seem to be evolutionary related to these two enzymes. These include various plasmid-encoded chloromuconate cycloisomerases , Escherichia coli protein rspA, E. coli bifunctional DGOA protein, E. coli hypothetical proteins ycjG, yfaW and yidU, and a hypothetical protein from Streptomyces ambofaciens.
