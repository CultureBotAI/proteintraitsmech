identifier: InterPro:IPR018293
label: 43kDa postsynaptic, conserved site
definition: >-
  The 43kDa postsynaptic protein is a peripheral membrane protein thought to be involved in the anchoring or stabilisation of the nicotinic acetylcholine receptor at synaptic sites. It may link the receptor to the postsynaptic cytoskeleton through direct association with actin or spectrin. The 43kDa protein is highly conserved across species. Two highly conserved regions, one encompassing the N terminus and the other near the C terminus, may be important for interaction of the protein with other components of the postsynaptic membrane. This entry represents the N-terminal sequence of the mature protein (after removal of the initiator methionine); the resulting N-terminal glycine is thought to be myristoylated.
