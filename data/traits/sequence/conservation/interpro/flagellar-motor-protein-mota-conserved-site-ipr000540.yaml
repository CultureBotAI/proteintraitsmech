identifier: InterPro:IPR000540
label: "Flagellar motor protein MotA, conserved site"
definition: >-
  The bacterial protein motA is required for the rotation of the flagellar motor. This protein probably forms a transmembrane proton channel used to energize the flagellar rotary motor. The motA protein is an integral membrane protein that contains four transmembrane domains.
