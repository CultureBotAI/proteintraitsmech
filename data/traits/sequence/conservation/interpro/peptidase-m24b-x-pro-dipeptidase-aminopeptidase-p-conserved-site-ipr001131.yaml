identifier: InterPro:IPR001131
label: "Peptidase M24B, X-Pro dipeptidase/aminopeptidase P, conserved site"
definition: >-
  Over 70 metallopeptidase families have been identified to date. In these enzymes a divalent cation, which is usually zinc but may be cobalt, manganese or copper, activates the water molecule. The metal ion is held in place by amino acid ligands, usually three in number. In some families of co-catalytic metallopeptidases, two metal ions are observed in crystal structures ligated by five amino acids, with one amino acid ligating both metal ions. The known metal ligands are His, Glu, Asp or Lys. At least one other residue is required for catalysis, which may play an electrophilic role. Many metalloproteases contain an HEXXH motif, which has been shown in crystallographic studies to form part of the metal-binding site. The HEXXH motif is relatively common but can be more stringently defined for metalloproteases as 'abXHEbbHbc', where 'a' is most often valine or threonine and forms part of the S1' subsite in thermolysin and neprilysin, 'b' is an uncharged residue, and 'c' a hydrophobic residue. Proline is never found in this site, possibly because it would break the helical structure adopted by this motif in metalloproteases. This entry represents the cataltyic core of a group of metallopeptidases belong to MEROPS peptidase family M24 (clan MG), subfamily M24B. A number of different enzymes from various sources have the proline dipeptidase domain. Enzymes know to have this domain include the Xaa-Pro dipeptidase ( ) (prolidase) and the Xaa-Pro aminopeptidase ( ). Xaa-Pro dipeptidase ( ) (prolidase) splits dipeptides with a prolyl residue in the carboxyl terminal position. Xaa-Pro aminopeptidase ( ) is the enzyme responsible for the release of any N-terminal amino acid adjacent to a proline residue.
