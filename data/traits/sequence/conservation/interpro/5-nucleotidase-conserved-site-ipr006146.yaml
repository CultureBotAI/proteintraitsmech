identifier: InterPro:IPR006146
label: "5'-Nucleotidase, conserved site"
definition: >-
  5'-nucleotidases ( ) are enzymes that catalyse the hydrolysis of phosphate esterified at carbon 5' of the ribose and deoxyribose portions of nucleotide molecules. 5'-nucleotidase is a ubiquitous enzyme found in a wide variety of species and which occurs in different cellular locations. All these proteins share regions of sequence similarity, the conserved sites represented in this entry are located in the N-terminal section of these enzymes and contain a perfectly conserved pentapeptide.
