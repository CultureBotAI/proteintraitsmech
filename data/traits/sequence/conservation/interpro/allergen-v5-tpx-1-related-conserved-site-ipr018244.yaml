identifier: InterPro:IPR018244
label: Allergen V5/Tpx-1-related, conserved site
definition: >-
  The cysteine-rich secretory proteins (Crisp) are predominantly found in the mammalian male reproductive tract as well as in the venom of reptiles. This family includes mammalian testis-specific protein (Tpx-1), also known as cysteine-rich secretory protein 2 (CRISP2); venom allergen 5 from vespid wasps and venom allergen 3 from fire ants, which are potent allergens that mediate allergic reactions to stings insects of the Hymenoptera family; scoloptoxins from Scolopendra dehaani (Thai centipede); plant pathogenesis proteins of the PR-1 family, which are synthesised during pathogen infection or other stress-related responses; allurin, a sperm chemoattractant, serotriflin, etc. The precise function of some of these proteins is still unclear. Tpx-1 or CRISP2 may regulate some ion channels' activity and thereby regulate calcium fluxes during sperm capacitation. This entry also includes allergen Tab y 5.0101 from horsefly salivary glands.
