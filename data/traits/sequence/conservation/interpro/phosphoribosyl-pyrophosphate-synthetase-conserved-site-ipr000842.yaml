identifier: InterPro:IPR000842
label: Phosphoribosyl pyrophosphate synthetase, conserved site
definition: >-
  Phosphoribosyl pyrophosphate synthetase ( ) (PRib-PP synthetase) catalyses the formation of PRib-PP from ATP and ribose 5-phosphate. PRib-PP is then used in various biosynthetic pathways, for example in the formation of purines, pyrimidines, histidine and tryptophan. PRib-PP synthetase requires inorganic phosphate and magnesium ions for its stability and activity. In mammals, three isozymes of PRib-PP synthetase are found, while in yeast there are at least four isozymes. A very conserved region containing two conserved aspartic acid residues as well as a histidine has been suggested to be involved in binding divalent cations. These residues are all potential ligands for a cation such as magnesium.
