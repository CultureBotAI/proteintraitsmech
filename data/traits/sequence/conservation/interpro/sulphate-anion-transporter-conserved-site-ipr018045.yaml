identifier: InterPro:IPR018045
label: Sulphate anion transporter, conserved site
definition: >-
  A number of proteins involved in the transport of sulphate across a membrane as well as some yet uncharacterised proteins have been shown to be evolutionary related. These proteins are: Neurospora crassa sulphate permease II (gene cys-14). Yeast sulphate permeases (genes SUL1 and SUL2). Rat sulphate anion transporter 1 (SAT-1). Mammalian DTDST, a probable sulphate transporter which, in human, is involved in the genetic disease, diastrophic dysplasia (DTD). Sulphate transporters 1, 2 and 3 from the legume Stylosanthes hamata. Human pendrin (gene PDS), which is involved in a number of hearing loss genetic diseases. Human protein DRA (Down-Regulated in Adenoma). Soybean early nodulin 70. Escherichia coli hypothetical protein ychM. Caenorhabditis elegans hypothetical protein F41D9.5. These proteins are highly hydrophobic and seem to contain about 12 transmembrane domains.
