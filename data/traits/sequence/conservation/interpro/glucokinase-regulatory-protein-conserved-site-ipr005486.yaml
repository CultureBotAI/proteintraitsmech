identifier: InterPro:IPR005486
label: "Glucokinase regulatory protein, conserved site"
definition: >-
  The glucokinase regulatory protein (GCKR) is a vertebrate protein that inhibits glucokinase by forming a complex with the enzyme, which plays a role in the control of blood glucose homeostasis. GCKR is a protein of about 70 Kd which is evolutionary related to bacterial N-acetylmuramic acid 6-phosphate etherases (MurNAc-6-P etherase, murQ), which are about half the size of GCKR and form active homodimers. MurNAc-6-P etherases catalyse the cleavage of the D-lactyl ether substituent of the bacterial cell wall sugar MurNAc and play a role in recycling of the cell wall. The 3D structure of the Haemophilus influenzae HI0754/murQ protein shows structural relationships with other sugar isomerase (SIS) domain proteins. In contrast to mono-SIS bacterial MurNAc-6-P etherase, mammalian GCKR is composed of two SIS domains.
