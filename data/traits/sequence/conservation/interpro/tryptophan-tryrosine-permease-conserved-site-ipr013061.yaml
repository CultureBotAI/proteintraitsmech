identifier: InterPro:IPR013061
label: "Tryptophan/tryrosine permease, conserved site"
definition: >-
  Amino acid permeases are integral membrane proteins involved in the transport of amino acids into the cell. A number of such proteins have been found to be evolutionary related. Aromatic amino acids are concentrated in the cytoplasm of Escherichia coli by 4 distinct transport systems: a general aromatic amino acid permease, and a specific permease for each of the 3 types (Phe, Tyr and Trp). It has been shown that some permeases in E. coli and related bacteria are evolutionary related. These permeases are proteins of about 400 to 420 amino acids and are located in the cytoplasmic membrane and, like bacterial sugar/cation transporters, are thought to contain 12 transmembrane (TM) regions - hydropathy analysis, however, is inconclusive, suggesting the possibility of 10 to 12 membrane-spanning domains. The best conserved domain is a stretch of 20 residues which seems to be located in a cytoplasmic loop between the first and second transmembrane region. This entry represents a conserved site specific for tyryptophan and tyrosine permeases.
