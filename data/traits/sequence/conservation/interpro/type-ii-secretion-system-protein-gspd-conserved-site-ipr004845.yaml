identifier: InterPro:IPR004845
label: "Type II secretion system protein GspD, conserved site"
definition: >-
  A number of proteins are involved in the general secretion pathway (GSP); one of these is known as protein D (GSPD protein). Protein D is involved in the type II general secretion pathway within Gram-negative bacteria, a signal sequence-dependent process responsible for protein export. The most probable location of protein D is the outer membrane. This suggests that protein D constitutes the apparatus of the accessory mechanism, and is thus involved in transporting exoproteins from the periplasm, across the outer membrane, to the extracellular environment.
