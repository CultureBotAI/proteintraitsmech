identifier: InterPro:IPR028626
label: "Ribosomal protein eS28 conserved site"
definition: >-
  A number of eukaryotic and archaebacterial ribosomal proteins can be grouped on the basis of sequence similarities. One of these families consists of: Mammalian S28. Plant S28. Fungi S33. Archaebacterial S28e. These proteins have from 64 to 78 amino acids. This entry represents a highly conserved nonapeptide from the C-terminal extremity of these proteins. NOTE: This entry matches , which is a translation initiation factor IF-2. This is a false positive.
