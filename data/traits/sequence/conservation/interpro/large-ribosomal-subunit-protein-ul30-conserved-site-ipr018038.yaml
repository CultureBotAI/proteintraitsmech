identifier: InterPro:IPR018038
label: "Large ribosomal subunit protein uL30, conserved site"
definition: >-
  Ribosomal protein uL30 is one of the proteins from the large ribosomal subunit. uL30 belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups bacteria and archaea uL30 (known as L30), yeast mitochondrial uL30m (known as L33), and Drosophila melanogaster, Dictyostelium discoideum (Slime mold), fungal and mammalian uL30 (known as L7) ribosomal proteins. uL30 from bacteria are small proteins of about 60 residues, those from archaea are proteins of about 150 residues, and eukaryotic uL30 (L7) are proteins of about 250 to 270 residues. This entry represents a conserved site of prokaryotic uL30 and eukaryotic uL30 (L7) ribosomal proteins. It is also found in ribosome biogenesis protein RLP7, a nucleolar protein that plays a critical role in processing of precursors to the large ribosomal subunit RNAs.
