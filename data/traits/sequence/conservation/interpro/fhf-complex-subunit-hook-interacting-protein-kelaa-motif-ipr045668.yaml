identifier: InterPro:IPR045668
label: "FHF complex subunit HOOK-interacting protein, KELAA motif"
definition: >-
  This short motif is found at the C terminus of the FHF complex subunit HOOK-interacting protein (also known as FTS and Hook-interacting protein, FHIP). This complex may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting complex (the HOPS complex). The motif has a conserved KELAA sequence for which it is named. Members of this entry are predominantly found in animals.
