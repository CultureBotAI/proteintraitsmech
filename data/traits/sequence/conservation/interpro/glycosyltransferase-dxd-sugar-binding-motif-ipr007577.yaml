identifier: InterPro:IPR007577
label: "Glycosyltransferase, DXD sugar-binding motif"
definition: >-
  This entry represents the DXD motif, a sugar-binding regions in glycosyltransferases. The DXD motif is a highly conserved sequence, consisting of Aspartate-X-Aspartate (where X is any amino acid), essential for the catalytic activity of many glycosyltransferases and some bacterial toxins. It primarily functions to bind divalent cations, usually manganese (Mn2), which are necessary to stabilise the phosphate groups of nucleotide sugar donors during enzymatic reactions. The DXD motif plays a role in carbohydrate binding in sugar-nucleoside diphosphates and manganese dependent glycosyltransferases.
