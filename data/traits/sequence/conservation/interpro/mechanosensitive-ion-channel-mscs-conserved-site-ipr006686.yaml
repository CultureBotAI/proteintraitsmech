identifier: InterPro:IPR006686
label: "Mechanosensitive ion channel MscS, conserved site"
definition: >-
  MscS is a mechanosensitive channel present in the membrane of bacteria, archaea and eukarya that responds both to stretching of the cell membrane and to membrane depolarisation. MscS folds as a homo-heptamer with a cylindrical shape, and can be divided into transmembrane and extramembrane regions: an N-terminal periplasmic region, a transmembrane region, and a C-terminal cytoplasmic region. The C-terminal cytoplasmic region can be further divided into middle and C-terminal domains, which together create a framework that connects to the cytoplasm through distinct openings. The middle domain exhibits a Sm-like structure, consisting of five β-strands that pack together with those of other subunits to form a barrel-like sheet extending around the entire protein.
