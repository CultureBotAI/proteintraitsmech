identifier: InterPro:IPR022671
label: Large ribosomal subunit protein uL2, conserved site
definition: >-
  This entry represents the best conserved region located in the C-terminal section of the large ribosomal subunit protein uL2. Ribosomal protein uL2 is one of the proteins from the large ribosomal subunit. The best conserved region is located in the C-terminal section of these proteins. In Escherichia coli, uL2 is known to bind to the 23S rRNA and to have peptidyltransferase activity. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups: Eubacterial uL2 (old name L2). Algal and plant chloroplast uL2 (old name L2). Cyanelle uL2 (old name L2). Archaebacterial uL2 (old name L2). Plant uL2 (old name L2). Slime mold uL2 (old name L2). Marchantia polymorpha mitochondrial uL2m (old name L2). Paramecium tetraurelia mitochondrial uL2m (old name L2). Fission yeast K5, K37 and KD4. Yeast YL6. Vertebrate uL2 (old name L8). Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they bel…
