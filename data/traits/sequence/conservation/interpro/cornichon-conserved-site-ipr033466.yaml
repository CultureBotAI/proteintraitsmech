identifier: InterPro:IPR033466
label: "Cornichon, conserved site"
definition: >-
  The drosophila cornichon protein (gene: cni), the founding member of this family, is an integral component of the COPII-coated vesicles that mediate cargo export from the yeast endoplasmic reticulum (ER). It is required in the germline for dorsal-ventral signalling. The dorsal-ventral pattern formation involves a reorganisation of the microtubule network correlated with the movement of the oocyte nucleus, and depending on the initial correct establishment of the anterior-posterior axis via a signal from the oocyte produced by cornichon and gurken and received by torpedo protein in the follicle cells.
