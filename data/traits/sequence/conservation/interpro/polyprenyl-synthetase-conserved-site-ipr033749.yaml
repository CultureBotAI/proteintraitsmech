identifier: InterPro:IPR033749
label: "Polyprenyl synthetase, conserved site"
definition: >-
  A variety of isoprenoid compounds are synthesised by various organisms. For example in eukaryotes the isoprenoid biosynthetic pathway is responsible for the synthesis of a variety of end products including cholesterol, dolichol, ubiquinone or coenzyme Q. In bacteria this pathway leads to the synthesis of isopentenyl tRNA, isoprenoid quinones, and sugar carrier lipids. Among the enzymes that participate in that pathway, are a number of polyprenyl synthetase enzymes which catalyse a 1'4-condensation between 5 carbon isoprene units. It has been shown that these enzymes share some regions of sequence similarity. Two of these regions, represented by this entry, are rich in aspartic-acid residues and could be involved in the catalytic mechanism and/or the binding of the substrates.
