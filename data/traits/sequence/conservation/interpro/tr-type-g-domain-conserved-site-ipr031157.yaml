identifier: InterPro:IPR031157
label: "Tr-type G domain, conserved site"
definition: >-
  The P-loop guanosine triphosphatases (GTPases) control a multitude of biological processes, ranging from cell division, cell cycling, and signal transduction, to ribosome assembly and protein synthesis. GTPases exert their control by interchanging between an inactive GDP-bound state and an active GTP-bound state, thereby acting as molecular switches. The common denominator of GTPases is the highly conserved guanine nucleotide-binding (G) domain that is responsible for binding and hydrolysis of guanine nucleotides. Translational GTPases (trGTPases) are a family of proteins in which GTPase activity is stimulated by the large ribosomal subunit. This family includes translation initiation, elongation, and release factors and contains four subfamilies that are widespread, if not ubiquitous, in all three superkingdoms: Prokaryotic initiation factor 2 (IF2) and the related eukaryotic initiation factor 5B (eIF5B), catalyze ribosomal subunit joining to form elongation- competent ribosomes. Bacterial SelB and eukaryotic/archaeal gamma subunit of initiation factor 2 (eIF-2gamma), specifically recognise noncanonical tRNAs. SelB specifically recognises selenocysteylated tRNA(Sec) and eIF-2gamma initiator tRNA (Met-tRNA(i)). Bacterial elongation factor Tu (EF-Tu) and its archaeal and eukaryotic counterpart elongation factor 1 (EF-1 alpha), bring the aminoacyl-tRNA into the A site of the ribosome. Bacterial peptide elongation factor G (EF-G) and its counterpart in Eukarya and Archaea, EF-2, catalyse the translocation step of translation. The basic topology of the tr-type G domain consists of a six-stranded central β-sheet surrounded by five α-helices. Helices alpha2, alpha3 and alpha4 are on one side of the sheet, whereas alpha1 and alpha5 are on the other. GTP is bound by the CTF-ty…
