identifier: InterPro:IPR019809
label: Histone H4, conserved site
definition: >-
  Histone H4 is one of the four histones, along with H2A, H2B and H3, which form the eukaryotic nucleosome core. The sequence of histone H4 has remained almost invariant in more then 2 billion years of evolution. The signature pattern for this entry is a pentapeptide found in positions 14 to 18 of all H4 sequences. It contains a lysine residue which is often acetylated and a histidine residue which is implicated in DNA-binding.
