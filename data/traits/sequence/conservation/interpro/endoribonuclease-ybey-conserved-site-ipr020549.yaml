identifier: InterPro:IPR020549
label: "Endoribonuclease YbeY, conserved site"
definition: >-
  YbeY is a single strand-specific metallo-endoribonuclease involved in late-stage 70S ribosome quality control and in maturation of the 3' terminus of the 16S rRNA. It acts together with the RNase R to eliminate defective 70S ribosomes, but not properly matured 70S ribosomes or individual subunits, by a process mediated specifically by the 30S ribosomal subunit. It is involved in the processing of 16S, 23S and 5S rRNAs, with a particularly strong effect on maturation at both the 5'-and 3'-ends of 16S rRNA as well as maturation of the 5'-end of 23S and 5S rRNAs. YbeY contains a conserved region with three histidines at the C terminus. This entry represents this region.
