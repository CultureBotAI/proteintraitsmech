identifier: InterPro:IPR019743
label: "Involucrin, conserved site"
definition: >-
  Involucrin is a highly reactive, soluble, transglutaminase substrate protein present in keratinocytes of epidermis and other stratified squamous epithelia. Involucrin first appears in the cell cytosol, but ultimately becomes cross-linked to membrane proteins by transglutaminase thus helping in the formation of an insoluble envelope beneath the plasma membrane functioning as a glutamyl donor during assembly of the cornified envelope. This entry represents the signature pattern for involucrin, which is located at the N-terminal extremity of these proteins.
