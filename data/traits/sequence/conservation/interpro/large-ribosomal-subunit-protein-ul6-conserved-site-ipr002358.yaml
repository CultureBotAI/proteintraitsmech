label: "Large ribosomal subunit protein uL6, conserved site"
definition: >-
  This entry represents a conserved region of the large ribosomal subunit protein uL6 previously known as ribosomal protein L6. In Escherichia coli, L6 is known to bind directly to the 23S rRNA and is located at the aminoacyl-tRNA binding site of the peptidyltransferase centre. It belongs to a family of ribosomal proteins, which on the basis of sequence similarities groups: bacterial, algal chloroplast, cyanelle, archaeal, Marchantia polymorpha mitochondrial L6, yeast mitochondrial YmL6 (gene MRPL6), mammalian, Drosophila melanogaster; plant and yeast L9. This entry includes uL6 proteins from bacteria and some eukaryotes, while uL6 proteins from other organisms are found in . Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are com…
