identifier: InterPro:IPR021132
label: Large ribosomal subunit protein eL18, conserved site
definition: >-
  This signature covers a stretch of about 13 residues in the first third of teh members of the large ribosomal subunit protein eL18 family. Members of this family are large subunit ribosomal proteins which are found in eukaryotes and archaea. These proteins have 115 to 187 amino-acid residues. The family consists of: Vertebrate eL18 (known as L14 in Xenopus) Plant eL18 Yeast eL18 (Rp28) Haloarcula marismortui (Halobacterium marismortui) HL29 Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like projections that extend into the rRNA core to stabilise its structure. Most of the proteins interact with multiple RNA elements, often from different domains. In the large…
