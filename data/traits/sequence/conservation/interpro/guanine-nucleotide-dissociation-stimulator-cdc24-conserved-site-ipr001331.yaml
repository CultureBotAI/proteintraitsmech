identifier: InterPro:IPR001331
label: Guanine-nucleotide dissociation stimulator, CDC24, conserved site
definition: >-
  Ras proteins are membrane-associated molecular switches that bind GTP and GDP and slowly hydrolyze GTP to GDP. The balance between the GTP bound (active) and GDP bound (inactive) states is regulated by the opposite action of proteins activating the GTPase activity and that of proteins which promote the loss of bound GDP and the uptake of fresh GTP. The latter proteins are known as guanine-nucleotide dissociation stimulators (GDSs) or also as guanine-nucleotide releasing (or exchange) factors (GRFs). Proteins that act as GDS can be classified into at least two families. One of these families is currently known to group the CDC24 family of proteins.
