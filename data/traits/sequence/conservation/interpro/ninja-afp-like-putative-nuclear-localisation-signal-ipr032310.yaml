identifier: InterPro:IPR032310
label: "Ninja/AFP-like, putative nuclear localisation signal"
definition: >-
  This entry represents a likely nuclear localisation motif that is found in the plant NINJA and AFP proteins. NINJA proteins are Novel INteractor of JAZ proteins found in plants. NINJA proteins act as transcriptional repressors, the activity of which is mediated by a functional TPL-binding EAR repression motif upstream from this domain.
