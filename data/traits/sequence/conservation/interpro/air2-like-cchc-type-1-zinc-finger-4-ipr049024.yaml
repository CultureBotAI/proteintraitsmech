identifier: InterPro:IPR049024
label: "AIR2-like, CCHC-type 1 zinc finger 4"
definition: >-
  This motif is found in AIR1 and AIR2 from Saccharomyces cerevisiae (also known as Arginine methyltransferase-interacting RING finger proteins 1 and 2) and similar proteins mainly found in yeast. AIR2 is an RNA-binding subunit of the TRAMP complex which has a poly(A) RNA polymerase activity and is involved in a post-transcriptional quality control mechanism limiting inappropriate expression of genetic information. This protein contain five tandemly arranged zinc-knuckle (ZnK) motifs of the CCHC-type (CX2CX4HX4C), which been shown to bind nucleic acids and proteins in unrelated proteins. This entry represents the fourth CCHC-type 1 zinc finger (ZnK4) of AIR2, which is important for TRAMP functions and integrity.
