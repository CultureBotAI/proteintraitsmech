identifier: InterPro:IPR017891
label: "Insulin-like growth factor binding protein, N-terminal, Cys-rich conserved site"
definition: >-
  The insulin-like growth factors (IGF-I and IGF-II) bind to specific binding proteins in extracellular fluids with high affinity. These IGF-binding proteins (IGFBP) prolong the half-life of the IGFs and have been shown to either inhibit or stimulate the growth promoting effects of the IGFs on cells culture. They seem to alter the interaction of IGFs with their cell surface receptors. The IGFBP family comprises six proteins (IGFBP-1 to -6) that bind to IGFs with high affinity. The precursor forms of all six IGFBPs have secretory signal peptides. All IGFBPs share a common domain organisation and also a high degree of similarity in their primary protein structure. The highest conservation is found in the N- and C-terminal cysteine-rich regions. Twelve conserved cysteines (ten in IGFBP-6) are found in the N-terminal domain, and six are found in the C-terminal domain. Both the N- and C-terminal domains participate in binding to IGFs, although the specific roles each of these domains in IGF binding have not been decisively established. In general, the strongest binding to IGFs is shown by amino-terminal fragments, which, however bind to IGF with 10- to 1000-fold lower affinity than full length IGFBPs. The central weakly conserved part (L domain) contains most of the cleavage sites for specific proteases. The N-terminal domain is about 80 residues in length and has an L-like structure. It can be divided into two subdomains that are connected by a short stretch of amino acids. The two subdomains are perpendicular to each other, creating the "L" shape for the whole N-terminal domain. The core of the first subdomain presents a novel fold stabilised by a short two-stranded β sheet and four disulphide bridges forming a disulphide bond ladder-like structure. The β sheet and disulphi…
