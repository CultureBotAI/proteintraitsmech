identifier: InterPro:IPR043639
label: "AF4 interaction motif"
definition: >-
  This short motif is found in the AF4 protein and interacts with AF9. The AFF (AF4/FMR2) family includes four members: AFF1/AF4, AFF2/FMR2, AFF3/LAF4 and AFF4/AF5q31. All AFF proteins are localized in the cell nucleus and are involved in regulation of gene expression. In humans, AFF2/FMR2 is silenced in FRAXE intellectual disability, while the other three members have been reported to form fusion genes as a consequence of chromosome translocations with the myeloid/lymphoid or mixed lineage leukemia (MLL) gene in acute lymphoblastic leukemias (ALLs).
