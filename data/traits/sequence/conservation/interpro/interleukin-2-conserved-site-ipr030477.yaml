identifier: InterPro:IPR030477
label: "Interleukin-2, conserved site"
definition: >-
  Interleukin-2 (IL-2) is a cytokine produced by T-helper cells in response to antigenic or mitogenic stimulation. This protein is required for T-cell proliferation and other activities crucial to the regulation of the immune response. The mature form of IL-2, after cleavage of the signal sequence, is a glycoprotein of about 130 amino acids that contains a single disulfide bond. This conserved site includes the first cysteine involved in the disulfide bond.
