identifier: InterPro:IPR001479
label: "Quinoprotein dehydrogenase, conserved site"
definition: >-
  This entry represents two conserved regions found in mainly proteobacterial PQQ dehydrogenases. Pyrrolo-quinoline quinone (PQQ) is a redox coenzyme, which serves as a cofactor for a number of enzymes (quinoproteins) and particularly for some bacterial dehydrogenases.
