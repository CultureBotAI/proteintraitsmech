identifier: InterPro:IPR014783
label: "Copper type II, ascorbate-dependent monooxygenase, histidine-cluster-2 conserved site"
definition: >-
  Copper type II, ascorbate-dependent monooxygenases are a class of enzymes that requires copper as a cofactor and which uses ascorbate as an electron donor. This family contains two related enzymes, dopamine-beta-monooxygenase ( ) and peptidyl-glycine alpha-amidating monooxygenase ( ). There are a few regions of sequence similarities between these two enzymes, two of these regions contain clusters of conserved histidine residues which are most probably involved in binding copper. This entry represents a conserved site that covers the second cluster of conserved histidine residues.
