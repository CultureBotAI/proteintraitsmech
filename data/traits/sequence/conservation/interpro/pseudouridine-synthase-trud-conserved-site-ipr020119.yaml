label: "Pseudouridine synthase TruD, conserved site"
definition: >-
  Pseudouridine synthases catalyse the isomerisation of uridine to pseudouridine (Psi) in a variety of RNA molecules, and may function as RNA chaperones. Pseudouridine is the most abundant modified nucleotide found in all cellular RNAs. There are four distinct families of pseudouridine synthases that share no global sequence similarity, but which do share the same fold of their catalytic domain(s) and uracil-binding site and are descended from a common molecular ancestor. The catalytic domain consists of two subdomains, each of which has an α+β structure that has some similarity to the ferredoxin-like fold (note: some pseudouridine synthases contain additional domains). The active site is the most conserved structural region of the superfamily and is located between the two homologous domains. These families are: Pseudouridine synthase I, TruA. Pseudouridine synthase II, TruB, which contains and additional C-terminal PUA domain. Pseudouridine synthase RsuA. RluB, RluE and RluF are also part of this family. Pseudouridine synthase RluA. TruC, RluC and RluD belong to this family. Pseudouridine synthase TruD, which has a natural circular permutation in the catalytic domain, as well as an insertion of a family-specific α+β subdomain. Pseudouridine synthase TruD modifies uracil-13 in tRNA. TruD belongs to a large family of pseudouridine synthases present in all kingdoms of life. It folds into a V-shaped molecule with an RNA-binding cleft formed between its two domains: a catalytic domain and an insertion domain. The catalytic domain differs in sequence but is structurally very similar to the catalytic domain of other pseudouridine synthases. The insertion (or TRUD) domain displays an α/β structure that forms a compact fold titled away from the catalytic domain to create a deep…
