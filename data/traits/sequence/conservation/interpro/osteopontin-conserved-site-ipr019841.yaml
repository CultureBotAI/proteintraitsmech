identifier: InterPro:IPR019841
label: "Osteopontin, conserved site"
definition: >-
  The major event of endochondrial ossification is the proteolytic degradation of calcified cartilage and the extracellular matrix, and their substitution with bone-specific extracellular matrix produced and organised by osteoblasts. One of the most abundant products of osteoblasts is osteopontin, a glycosylated phosphoprotein with a high acidic amino acid content and one copy of the cell attachment sequence RGD. It is thought that osteopontin may act as a bridge between osteoblasts and the apatite mineral of the bone. Osteopontin-K is a kidney protein, similar to osteopontin and probably also involved in cell adhesion. The signature pattern used in this entry covers a highly conserved region located at the N-terminal extremity of the mature protein.
