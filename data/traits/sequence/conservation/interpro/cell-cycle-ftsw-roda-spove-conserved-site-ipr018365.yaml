identifier: InterPro:IPR018365
label: Cell cycle, FtsW / RodA / SpoVE, conserved site
definition: >-
  A number of prokaryotic integral membrane proteins involved in cell cycle processes have been found to be structurally related. These proteins include, the Escherichia coli and related bacteria cell division protein ftsW and the rod shape-determining protein rodA (or mrdB), the Bacillus subtilis stage V sporulation protein E (spoVE), the B. subtilis hypothetical proteins ywcF and ylaO and the Cyanophora paradoxa cyanelle ftsW homologue. FtsW is an integral membrane protein with ten transmembrane segments. In general, it is one of two paralogues involved in peptidoglycan biosynthesis, the other being RodA, and is essential for cell division. In endospore-forming bacteria (e.g. Bacillus subtilis) three or more RodA/FtsW/SpoVE family paralogues are present. SpoVE acts in spore cortex formation and is dispensable for growth. FtsW belongs to the so called SEDS (shape, elongation, division and sporulation) family, which are thought to be peptidoglycan polymerases. Treponema pallidum RodA and Escherichia coli MrdB are probable peptidoglycan polymerases that are essential for cell wall elongation. RodA is a member of the FtsW/RodA/SpoVE family. It is found only in species with rod (or spiral) shapes. RodA is required for the maintenance of the rod cell shape and is essential for the elongation of the lateral wall of the cell. In Escherichai coli, the rodA and pbpA genes occur in the same operon, and RodA is required for the expression of the enzymatic activity of the penicillin-binding protein 2 (PbpA).
