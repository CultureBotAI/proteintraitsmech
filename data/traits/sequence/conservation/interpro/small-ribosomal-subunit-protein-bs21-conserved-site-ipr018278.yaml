identifier: InterPro:IPR018278
label: Small ribosomal subunit protein bS21, conserved site
definition: >-
  This entry represents a conserved region found at the N-terminal of bacterial bS21. Evidence suggests that, in prokaryotes, the peptidyl transferase reaction is performed by the large subunit 23S rRNA, whereas proteins probably have a greater role in eukaryote ribosomes. Most of the proteins lie close to, or on the surface of, the 30S subunit, arranged peripherally around the rRNA. The small subunit ribosomal proteins can be categorised as primary binding proteins, which bind directly and independently to 16S rRNA; secondary binding proteins, which display no specific affinity for 16S rRNA, but its assembly is contingent upon the presence of one or more primary binding proteins; and tertiary binding proteins, which require the presence of one or more secondary binding proteins and sometimes other tertiary binding proteins. The small ribosomal subunit protein bS21 contains 55-70 amino acid residues, and was thought to be present only in eubacteria, however, plant chloroplasts and mammalian mitochondria contain ribosomal subunit protein bS21 (referred to as bS21c and bS21m, respectively). Experimental evidence has revealed that bS21 is well exposed on the surface of the Escherichia coli ribosome, and is one of the 'split proteins': these are a discrete group that are selectively removed from 30S subunits under low salt conditions and are required for the formation of activated 30S reconstitution intermediate (RI*) particles. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in t…
