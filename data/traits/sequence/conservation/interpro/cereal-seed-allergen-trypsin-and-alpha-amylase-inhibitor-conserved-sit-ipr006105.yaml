identifier: InterPro:IPR006105
label: Cereal seed allergen/trypsin and alpha-amylase inhibitor, conserved site
definition: >-
  The seeds of cereals contain numerous serine protease and alpha-amylase inhibitors. These inhibitors can be grouped into families based on structural similarities. This domain identifies sequences belonging to the cereal (monocotyledon) trypsin/alpha-amylase inhibitor family. It includes those annotated solely as seed allergens or alpha-amyalse inhibitors. Many belong to MEROPS inhibitor family I6, clan IJ. Some are known to be inhibit trypsin (an S1 peptidase, ). For some there is no direct evidence to suggest they any can inhibit trypsin or any other serine peptidase. Studies on the alpha-amylase inhibitor from Secale cereale (Rye) has demonstrated no activity against trypsin, and illustrates the necessity of exercising caution in assigning function based on sequence comparisons.
