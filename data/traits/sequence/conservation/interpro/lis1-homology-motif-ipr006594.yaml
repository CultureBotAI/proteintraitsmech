identifier: InterPro:IPR006594
label: "LIS1 homology motif"
definition: >-
  The 33-residue LIS1 homology (LisH) motif is found in eukaryotic intracellular proteins involved in microtubule dynamics, cell migration, nucleokinesis and chromosome segregation. The LisH motif is likely to possess a conserved protein-binding function and it has been proposed that LisH motifs contribute to the regulation of microtubule dynamics, either by mediating dimerisation, or else by binding cytoplasmic dynein heavy chain or microtubules directly. The LisH motif is found associated to other domains, such as WD-40, SPRY, Kelch, AAA ATPase, RasGEF, or HEAT. The secondary structure of the LisH domain is predicted to adopt a two α-helices fold.
