identifier: InterPro:IPR023058
label: "Peptidyl-prolyl cis-trans isomerase, PpiC-type, conserved site"
definition: >-
  Peptidylprolyl isomerase ( ) is an enzyme that accelerates protein folding by catalyzing the cis-trans isomerization of proline imidic peptide bonds in oligopeptides. It has been reported in bacteria and eukayotes. Synonyms for proteins with this domain are: Peptidylprolyl isomerase, Peptidyl-prolyl cis-trans isomerase, PPIase, rotamase, cyclophilin, FKBP65.
