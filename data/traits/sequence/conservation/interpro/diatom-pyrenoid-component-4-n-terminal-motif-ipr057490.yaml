identifier: InterPro:IPR057490
label: "Diatom pyrenoid component 4, N-terminal motif"
definition: >-
  This entry represents a short N-terminal motif that is found in two copies in DPC4. DPC4 localises throughout the pyrenoid matrix in diatoms. Shows matrix-type localisation and interacts with Shell4 and Rubisco but function currently unknown. May have a role in matrix assembly/organisation.
