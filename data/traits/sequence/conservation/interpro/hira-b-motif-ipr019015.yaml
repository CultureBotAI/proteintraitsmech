identifier: InterPro:IPR019015
label: "HIRA B motif"
definition: >-
  The HirA B (Histone regulatory homologue A binding) motif is the essential binding interface between and ASF1a, of approx. 40 residues. It forms an antiparallel β-hairpin that binds perpendicular to the strands of the β-sandwich of ASF1a N-terminal core domain, via β-sheet, salt bridge and van der Waals interactions. The two histone chaperone proteins, HIRA and ASF1a, form a heterodimer with histones H3 and H4. HIRA is the human orthologue of Hir proteins known to silence histone gene expression and create transcriptionally silent heterochromatin in yeast, flies, plants and humans.
