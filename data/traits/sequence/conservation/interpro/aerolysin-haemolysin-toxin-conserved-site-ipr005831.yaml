identifier: InterPro:IPR005831
label: "Aerolysin/haemolysin toxin, conserved site"
definition: >-
  Aerolysin is a cytolytic toxin exported by the Gram-negative Aeromonas bacteria. The mature toxin binds to eukaryotic cells and aggregates to form holes (approximately 3 nm in diameter) leading to the destruction of the membrane permeability barrier and osmotic lysis. Staphylococcus aureus also exports a cytotoxin, alpha-toxin, whose biological activity is similar to that of aerolysin. The sequences of both toxins are not similar except for a stretch of ten residues rather well conserved.
