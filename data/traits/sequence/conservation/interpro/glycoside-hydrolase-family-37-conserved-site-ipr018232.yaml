identifier: InterPro:IPR018232
label: Glycoside hydrolase, family 37, conserved site
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 37 comprises enzymes with only one known activity; trehalase ( ). Trehalase is the enzyme responsible for the degradation of the disaccharide alpha,alpha-trehalose yielding two glucose subunits. It is an enzyme found in a wide variety of organisms and whose sequence has been highly conserved throughout evolution.
