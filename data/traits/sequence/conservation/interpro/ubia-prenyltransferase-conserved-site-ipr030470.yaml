identifier: InterPro:IPR030470
label: "UbiA prenyltransferase conserved site"
definition: >-
  The following prenyltransferases are evolutionary related: Bacterial 4-hydroxybenzoate octaprenyltransferase (gene ubiA). Yeast mitochondrial para-hydroxybenzoate--polyprenyltransferase (gene COQ2). Protoheme IX farnesyltransferase (heme O synthase) from yeast and mammals (gene COX10) and from bacteria (genes cyoE or ctaB). These proteins probably contain seven transmembrane segments. The best conserved region is located in a loop between the second and third of these segments. It is represented by this entry.
