identifier: InterPro:IPR025505
label: "FHIPEP conserved site"
definition: >-
  A number of bacterial proteins seem to be involved in translocating specific proteins across the bacterial cell membrane by a distinct secretory mechanism that does not require the cleavage of a signal peptide. They belong to the FHIPEP family, which stands for Flagella/Hr/Invasion Proteins Export Pore. The N-terminal half of these proteins is highly conserved and seems to contain 6 to 8 transmembrane domains. The C-terminal half is less conserved and seemingly devoid of transmembrane domains. It is possible that these proteins serve as pores for the export of specific proteins. This entry represents a highly conserved hydrophilic region between two transmembranes regions.
