identifier: InterPro:IPR018238
label: "Glycoside hydrolase, family 14, conserved site"
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 14 comprises enzymes with only one known activity; beta-amylase ( ). A Glu residue has been proposed as a catalytic residue, but it is not known if it is the nucleophile or the proton donor.
