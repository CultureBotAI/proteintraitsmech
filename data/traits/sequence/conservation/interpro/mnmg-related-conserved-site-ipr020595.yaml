identifier: InterPro:IPR020595
label: "MnmG-related, conserved site"
definition: >-
  MnmG (also known as GidA) is a tRNA modification enzyme found in bacteria and mitochondria. Though its precise molecular function of these proteins is not known, it is involved in the 5-carboxymethylaminomethyl modification of the wobble uridine base in some tRNAs. Sequence variations in the human mitochondrial protein may influence the severity of aminoglycoside-induced deafness. This entry includes MnmG and related proteins, such as the methylenetetrahydrofolate--tRNA-(uracil-5-)-methyltransferase enzyme TrmFO.
