identifier: InterPro:IPR006213
label: "Bax inhibitor 1, conserved site"
definition: >-
  Bax inhibitor-1 (BI-1) (gene TEGT) is a suppressor of apoptosis that interacts with BCL2 and BCL-X. These are proteins of about 25kDa which seem to contain seven transmembrane domains. Homologues are found in plants and bacteria. This entry corresponds to a conserved region that starts with the beginning of the third transmembrane domain and ends in the middle of the fourth one.
