identifier: InterPro:IPR006074
label: GTP1/OBG, conserved site
definition: >-
  A widespread family of GTP-binding proteins has been recently characterised. The function of the proteins that belong to this family is not yet known. They are polypeptides of about 40 to 48kDa which contain the five small sequence elements characteristic of GTP-binding proteins. As a signature pattern was selected the region that correspond to the ATP/GTP B motif (also called G-3 in GTP-binding proteins).
