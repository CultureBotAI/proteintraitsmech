identifier: InterPro:IPR025820
label: "Methyltransferase NNMT/PNMT/TEMT, conserved site"
definition: >-
  Several cytoplasmic vertebrate methyltransferases are evolutionary related, including nicotinamide N-methyltransferase ( ) (NNMT); phenylethanolamine N-methyltransferase ( ) (PNMT); and thioether S-methyltransferase ( ) (TEMT). NNMT catalyses the N-methylation of nicotinamide and other pyridines to form pyridinium ions. This activity is important for the biotransformation of many drugs and xenobiotic compounds. PNMT catalyses the last step in catecholamine biosynthesis, the conversion of noradrenalin to adrenalin; and TEMT catalyses the methylation of dimethyl sulphide into trimethylsulphonium. These three enzymes use S-adenosyl-L-methionine as the methyl donor. They are proteins of 30 to 32kDa. This entry represents the most conserved region, a stretch of 16 residues which are located in the N-terminal section of these enzymes.
