identifier: InterPro:IPR000283
label: NADH:ubiquinone oxidoreductase, 75kDa subunit, conserved site
definition: >-
  This entry represents the 75kDa subunit from NADH:ubiquinone oxidoreductase. Among the many polypeptide subunits that make up complex I, there is one with a molecular weight of 75kDa (in mammals), which is the largest subunit of complex I and is a component of the iron-sulphur (IP) fragment of the enzyme. It seems to bind to two 4Fe-4S clusters (called N-3 and N-4).
