identifier: InterPro:IPR022658
label: "XPA, conserved site"
definition: >-
  Xeroderma pigmentosum (XP) is a human autosomal recessive disease, characterised by a high incidence of sunlight-induced skin cancer. Skin cells of individual's with this condition are hypersensitive to ultraviolet light, due to defects in the incision step of DNA excision repair. There are a minimum of seven genetic complementation groups involved in this pathway: XP-A to XP-G. XP-A is the most severe form of the disease and is due to defects in a 30kDa nuclear protein called XPA (or XPAC). The sequence of the XPA protein is conserved from higher eukaryotes to yeast (gene RAD14). XPA is a hydrophilic protein of 247 to 296 amino-acid residues which has a C4-type zinc finger motif in its central section. This entry corresponds to the second conserved site in the XPA protein. It is a highly conserved region located some 12 residues after the zinc finger region
