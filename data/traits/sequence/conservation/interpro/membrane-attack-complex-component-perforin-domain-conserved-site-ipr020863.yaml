identifier: InterPro:IPR020863
label: "Membrane attack complex component/perforin domain, conserved site"
definition: >-
  The membrane attack complex/perforin (MACPF) domain is conserved in bacteria, fungi, mammals and plants. It was originally identified and named as being common to five complement components (C6, C7, C8-alpha, C8-beta, and C9) and perforin. These molecules perform critical functions in innate and adaptive immunity. The MAC family proteins and perforin are known to participate in lytic pore formation. In response to pathogen infection, a sequential and highly specific interaction between the constituent elements occurs to form transmembrane channels which are known as the membrane-attack complex (MAC).Only a few other MACPF proteins have been characterised and several are thought to form pores for invasion or protection. Examples are proteins from malarial parasites, the cytolytic toxins from sea anemones, and proteins that provide plant immunity. Functionally uncharacterised MACPF proteins are also evident in pathogenic bacteria such as Chlamydia spp and Photorhabdus luminescens (Xenorhabdus luminescens). The MACPF domain is commonly found to be associated with other N- and C-terminal domains, such as TSP1 (see ), LDLRA (see ), EGF-like (see ),Sushi/CCP/SCR (see ), FIMAC or C2 (see ). They probably control or target MACPF function. The MACPF domain oligomerizes, undergoes conformational change, and is required for lytic activity. The MACPF domain consists of a central kinked four-stranded antiparallel β sheet surrounded by α helices and β strands, forming two structural segments. Overall, the MACPF domain has a thin L-shaped appearance. MACPF domains exhibit limited sequence similarity but contain a signature [YW]-G-[TS]-H-[FY]-x(6)-G-G motif. Some proteins known to contain a MACPF domain are listed below: Vertebrate complement proteins C6 to C9. Complement factors C6 t…
