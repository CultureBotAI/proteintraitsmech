identifier: InterPro:IPR030480
label: "Natriuretic peptide, conserved site"
definition: >-
  Atrial natriuretic peptides (ANPs) are vertebrate hormones that play an important role in the control of cardiovascular homeostatis, and sodium and water balance in general. There are different NPs that vary in length but share a common core. All are processed from a single precursor. A disulphide bond resident in the C-terminal section is required for full activity of atriopeptins. This entry represent a conserved site which includes the two cysteines involved in the disulfide bond, and two conserved glycines that may be important for the conformation of the peptides.
