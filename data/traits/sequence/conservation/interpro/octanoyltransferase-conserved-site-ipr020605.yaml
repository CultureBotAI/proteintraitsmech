identifier: InterPro:IPR020605
label: "Octanoyltransferase, conserved site"
definition: >-
  Lipoate-protein ligase B (gene lipB), alternatively known as octanoyltransferase ( ) is an enzyme that creates an amide linkage that joins the free carboxyl group of lipoic acid to the ε-amino group of a specific lysine residue in lipoate-dependent enzymes. octanoyl-[acyl-carrier-protein] + protein = protein N6-(octanoyl)lysine + acyl carrier protein Lipoyl(octanoyl) transferase catalyses the first committed step in the biosynthesis of lipoyl cofactor. The lipoyl cofactor is essential for the function of several key enzymes involved in oxidative metabolism, as it converts apoprotein into the biologically active holoprotein. Examples of such lipoylated proteins include pyruvate dehydrogenase (E2 domain), 2-oxoglutarate dehydrogenase (E2 domain), the branched-chain 2-oxoacid dehydrogenases and the glycine cleavage system (H protein). Lipoyl-ACP can also act as a substrate although octanoyl-ACP is likely to be the true substrate. The other enzyme involved in the biosynthesis of lipoyl cofactor is , lipoyl synthase. An alternative lipoylation pathway involves , lipoate-protein ligase, which can lipoylate apoproteins using exogenous lipoic acid (or its analogues). Such an enzyme has also been found in fungi, where it is located in the mitochondria. It also seems to exist in plants and is encoded in the chloroplast genome of the red alga Cyanidium caldarium. This entry represents a conserved region, located in the central part of the enzyme; this region contains one of two conserved histidines.
