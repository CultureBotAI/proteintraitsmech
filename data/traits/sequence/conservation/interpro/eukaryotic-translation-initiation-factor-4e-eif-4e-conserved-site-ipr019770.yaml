identifier: InterPro:IPR019770
label: "Eukaryotic translation initiation factor 4E (eIF-4E), conserved site"
definition: >-
  Eukaryotic translation initiation factor 4E (eIF-4E) is a protein that binds to the cap structure of eukaryotic cellular mRNAs. eIF-4E recognises and binds the 7-methylguanosine-containing (m7Gppp) cap during an early step in the initiation of protein synthesis and facilitates ribosome binding to a mRNA by inducing the unwinding of its secondary structures.
