identifier: InterPro:IPR018236
label: "SAICAR synthetase, conserved site"
definition: >-
  Phosphoribosylaminoimidazole-succinocarboxamide synthase ( ) (SAICAR synthetase) catalyses the seventh step in the de novo purine biosynthetic pathway; the ATP-dependent conversion of 5'-phosphoribosyl-5-aminoimidazole-4-carboxylic acid and aspartic acid to SAICAR. In bacteria (purC), fungi (ADE1) and plants (Pur7), SAICAR synthetase is a monofunctional protein; in animals it is the N-terminal domain of a bifunctional enzyme that also catalyse phosphoribosylaminoimidazole carboxylase (AIRC) activity (see ).
