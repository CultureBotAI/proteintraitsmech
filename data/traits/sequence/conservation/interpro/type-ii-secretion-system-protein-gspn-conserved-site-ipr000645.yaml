identifier: InterPro:IPR000645
label: "Type II secretion system protein GspN, conserved site"
definition: >-
  GspN is a cytoplasmic membrane component of the type II secretion system (T2SS). It is present in T2SS operons of a subset of Gram-negative speciesI, such as Aeromonas hydrophila (gene exeN); Erwinia carotovora (gene outN); Klebsiella pneumoniae (gene pulN); or Vibrio cholerae (gene epsN). The size of the 'N' protein is around 250 amino acids. It apparently contains a single transmembrane domain located in the N-terminal section. The short N-terminal domain is predicted to be cytoplasmic and the large C-terminal domain periplasmic. This entry represents a conserved site found towards the N terminus of bacterial type II secretion system protein GspN.
