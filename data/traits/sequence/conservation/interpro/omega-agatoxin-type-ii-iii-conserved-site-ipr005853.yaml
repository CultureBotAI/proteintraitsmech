identifier: InterPro:IPR005853
label: "Omega-agatoxin type II/III, conserved site"
definition: >-
  Spider venoms often contain many active peptides, such as neurotoxins, lectins, and enzyme inhibitors, which are important for both hunting and defence. Starting from a common ancestor these peptides have evolved into a diverse array of toxins with different structures and functions. These toxins contain contain a relatively high number of cysteine residues, generally ranging from 6 to 14. Several peptide toxins, collectively referred to as omega-toxins, block the different types of voltage-gated Ca2+ channels with differential selectivity.
