identifier: InterPro:IPR045347
label: HIND motif
definition: >-
  The Hub1 interacting motif (HIND) is a short conserved motif found in 1 to 3 copies in spliceosomal proteins such as SART1 from animals and Snu66 in yeast (both components of the U4/U6-U5 tri-snRNP complex). The motif is bound by the Hub1 protein, playing a key role in the splicing process.
