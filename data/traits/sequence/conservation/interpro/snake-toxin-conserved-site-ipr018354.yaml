identifier: InterPro:IPR018354
label: Snake toxin, conserved site
definition: >-
  Snake toxins belong to a family of proteins which groups short and long neurotoxins, cytotoxins and short toxins, as well as a other miscellaneous venom peptides. Most of these toxins act by binding to the nicotinic acetylcholine receptors in the postsynaptic membrane of skeletal muscles and prevent the binding of acetylcholine, thereby blocking the excitation of muscles. Snake toxins are proteins that consist of sixty to seventy five amino acids. Among the invariant residues are eight cysteines all involved in disulphide bonds. The structure is small, disulphide-rich, nearly all β sheet. This entry represents a conserved site found in some snake toxins.
