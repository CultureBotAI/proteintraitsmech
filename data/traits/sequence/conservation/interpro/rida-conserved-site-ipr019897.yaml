identifier: InterPro:IPR019897
label: "RidA, conserved site"
definition: >-
  This entry represents a conserved site found towards the C-terminal of the YjgF family members. YjgF contains the enamine/imine deaminase activity and can accelerate the release of ammonia from reactive enamine/imine intermediates of the pyridoxal 5'-phosphate-dependent threonine dehydratase (IlvA). Therefore, YjgF is also known as RidA (reactive intermediate/imine deaminase A). The RidA family members are widely distributed in eubacteria, archaea and eukaryotes. Although they share protein sequences and structures similarity, they may have different functions.
