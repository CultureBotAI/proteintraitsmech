identifier: InterPro:IPR021159
label: "Glycerate/sugar phosphate transporter, conserved site"
definition: >-
  Proteins in this group are involved in the transport system that mediates the uptake of a number of sugar phosphates as well as the regulatory components that are responsible for induction of this transport system by external glucose 6-phosphate. In Escherichia coli its role in transmembrane signalling may involve sugar-phosphate-binding sites and transmembrane orientations similar to those of the transport protein. The following proteins in this entry, involved in the uptake of phosphorylated metabolites, are evolutionary related: E. coli, Bacillus subtilis and Haemophilus influenzae glycerol-3- phosphate transporter (gene glpT). Salmonella typhimurium phosphoglycerate transporter (gene pgtP). E. coli and S. typhimurium hexose-6-phosphate transporter (gene uhpT). E. coli and S. typhimurium protein uhpC. UhpC is necessary for the expression of uhpT and seems to act jointly with the uhpB sensor/kinase protein. Human glucose 6-phosphate translocase. These proteins of about 50kDa apparently contain 12 transmembrane regions. This entry represents a conserved region in the central section of these transporters.
