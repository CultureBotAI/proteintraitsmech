identifier: InterPro:IPR019740
label: Pyridoxamine 5'-phosphate oxidase, conserved site
definition: >-
  Pyridoxamine 5'-phosphate oxidase is a FMN flavoprotein involved in the de novo synthesis of pyridoxine (vitamin B6) and pyridoxal phosphate. It oxidizes pyridoxamine-5-P (PMP) and pyridoxine-5-P (PNP) to pyridoxal-5-P. The sequences of the enzyme from bacterial (genes pdxH or fprA) and fungal (gene PDX3) sources show that this protein has been highly conserved throughout evolution. PdxH is evolutionary related to one of the enzymes in the phenazine biosynthesis protein pathway, phzD (also known as phzG). This entry represents a highly conserved region located in the C-terminal part of these enzymes.
