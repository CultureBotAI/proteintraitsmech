identifier: InterPro:IPR018130
label: "Small ribosomal subunit protein uS2, conserved site"
definition: >-
  Ribosomal protein uS2 is is a protein of 235 to 394 amino-acid residues and is one of the proteins from the small ribosomal subunit. uS2 belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups: Eubacterial uS2. Algal and plant chloroplast uS2. Cyanelle uS2. Archaebacterial uS2. Higher eukaryotes P40 (previously thought to be a laminin receptor). Yeast NAB1. Plant mitochondrial uS2. Yeast mitochondrial uS2 (also know as MRP4).
