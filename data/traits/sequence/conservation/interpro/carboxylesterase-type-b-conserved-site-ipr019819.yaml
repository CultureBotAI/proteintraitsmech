label: "Carboxylesterase type B, conserved site"
definition: >-
  Higher eukaryotes have many distinct esterases. Among the different types are those which act on carboxylic esters ( ). Carboxyl-esterases have been classified into three categories (A, B and C) on the basis of differential patterns of inhibition by organophosphates. The sequence of a number of type-B carboxylesterases indicates that the majority are evolutionary related. As is the case for lipases and serine proteases, the catalytic apparatus of esterases involves three residues (catalytic triad): a serine, a glutamate or aspartate and a histidine. As is the case for lipases and serine proteases, the catalytic apparatus of esterases involves three residues (catalytic triad): a serine, a glutamate or aspartate and a histidine. This entry represents a well conserved site located in the N-terminal section, which contains a cysteine involved in a disulphide bond. Human esterase-D, also a type-B carboxylesterase, does not seem to be evolutionary related.
