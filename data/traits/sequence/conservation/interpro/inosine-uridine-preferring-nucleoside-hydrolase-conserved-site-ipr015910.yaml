identifier: InterPro:IPR015910
label: "Inosine/uridine-preferring nucleoside hydrolase, conserved site"
definition: >-
  Inosine-uridine preferring nucleoside hydrolase ( ) (IU-nucleoside hydrolase or IUNH) is an enzyme first identified in protozoan that catalyzes the hydrolysis of all of the commonly occurring purine and pyrimidine nucleosides into ribose and the associated base, but has a preference for inosine and uridine as substrates. This enzyme is important for these parasitic organisms, which are deficient in de novo synthesis of purines, to salvage the host purine nucleosides. IUNH from Crithidia fasciculata has been sequenced and characterised, it is an homotetrameric enzyme of subunits of 34 Kd. An histidine has been shown to be important for the catalytic mechanism, it acts as a proton donor to activate the hypoxanthine leaving group. IUNH is evolutionary related to a number of uncharacterised proteins from various biological sources. This entry represents the highly conserved region located in the N-terminal extremity that contains the four conserved aspartates that have been shown to be located in the active site cavity.
