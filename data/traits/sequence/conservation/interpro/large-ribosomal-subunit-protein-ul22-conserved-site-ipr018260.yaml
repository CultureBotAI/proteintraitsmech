label: "Large ribosomal subunit protein uL22, conserved site"
definition: >-
  Ribosomal protein uL22 is one of the proteins from the large ribosomal subunit. In Escherichia coli, uL22 is known to bind 23S rRNA. It belongs to a family of ribosomal proteins which includes: bacterial uL22; algal and plant chloroplast uL22 (in legumes uL22 is encoded in the nucleus instead of the chloroplast); cyanelle uL22; archaebacterial uL22; mammalian and plant uL22 (also known as L17) and yeast uL22 (known as YL17). Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like projections that extend into the rRNA core to stabilise its structure. Most of the proteins interact with multiple RNA elements, often from different domains. In the large subunit, about…
