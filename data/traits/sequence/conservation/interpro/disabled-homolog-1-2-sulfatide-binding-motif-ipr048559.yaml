identifier: InterPro:IPR048559
label: "Disabled homolog 1/2, sulfatide-binding motif"
definition: >-
  This region is found at the N-terminal end of human Disabled homolog 2 (DAB2) and similar sequences predominantly found in vertebrates. DAB2 is an adaptor protein involved in endocytosis, cell surface receptor turnover, and cell signalling. The membrane binding properties of this protein depend on its sulfatide-binding motifs (SBM, represented by this entry), which display a helical conformation. This region is N-terminal to the PID domain ( ).
