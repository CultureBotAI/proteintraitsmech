identifier: InterPro:IPR022678
label: "Glycylpeptide N-tetradecanoyltransferase, conserved site"
definition: >-
  Glycylpeptide N-tetradecanoyltransferase, also known as Myristoyl-CoA:protein N-myristoyltransferase ( ) (Nmt), is the enzyme responsible for transferring a myristate group on the N-terminal glycine of a number of cellular eukaryotics and viral proteins. Nmt is a monomeric protein of about 50 to 60kDa whose sequence appears to be well conserved. In Drosophila, this protein is critical for the developmental processes that involve cell shape changes and movement. Two highly conserved regions are found. The first one is located in the central section, the second in the C-terminal part.
