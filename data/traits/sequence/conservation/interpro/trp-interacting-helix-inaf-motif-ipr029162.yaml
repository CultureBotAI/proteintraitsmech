identifier: InterPro:IPR029162
label: "TRP-interacting helix, InaF motif"
definition: >-
  This highly conserved motif is thought to be a transmembrane helix that binds to transient receptor potential (TRP) calcium channel. It is found in proline-rich protein 24 (PRR24) and in InaF proteins. It is known that proline-rich proteins inactivate tannins found in food compounds, and it is thought that PRR24 does too. This is important since tannins often inhibit the uptake of iron. InaF is a protein required for TRP calcium channel function in Drosophila. TRP-related channels have been suggested to mediate "store-operated" calcium entry, important for Ca2+ homeostasis in a wide variety of cell types.
