identifier: InterPro:IPR018171
label: Peptidyl-tRNA hydrolase, conserved site
definition: >-
  This entry represents two conserved regions that each contain an histidine. The first of these regions is located in the N-terminal part of the protein, the other in the central part. Peptidyl-tRNA hydrolase ( ) (PTH) is a bacterial enzyme that cleaves peptidyl-tRNA or N-acyl-aminoacyl-tRNA to yield free peptides or N-acyl-amino acids and tRNA. The natural substrate for this enzyme may be peptidyl-tRNA which drop off the ribosome during protein synthesis. Bacterial PTH has been found to be evolutionary related to a yeast protein. This enzyme is interesting as a potential target for the discovery of new antimicrobial agents as it is critical for the viability of bacteria [ }. It folds into a single α/β globular domain with seven β-strands forming a twisted mixed central β-sheet, surrounded by a total of six helices.
