identifier: InterPro:IPR018336
label: "Ribonuclease PH, conserved site"
definition: >-
  Prokaryotic ribonuclease PH ( ) (RNase PH) is a phosphorolytic exoribonuclease that removes nucleotide residues following the -CCA terminus of tRNA and adds nucleotides to the ends of RNA molecules by using nucleoside diphosphates as substrates. There is a similar protein in Caenorhabditis elegans that belongs to this group.
