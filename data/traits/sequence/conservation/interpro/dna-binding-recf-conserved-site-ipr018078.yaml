identifier: InterPro:IPR018078
label: "DNA-binding, RecF, conserved site"
definition: >-
  All proteins in this family, including RecF, for which functions are known are DNA binding proteins that assist the filamentation of RecA onto DNA for the initiation of recombination or recombinational repair. RecF is involved in DNA metabolism and is required for recombinational DNA repair and for induction of the SOS response.
