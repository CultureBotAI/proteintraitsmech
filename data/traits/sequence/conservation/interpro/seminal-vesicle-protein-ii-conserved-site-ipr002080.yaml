identifier: InterPro:IPR002080
label: "Seminal vesicle protein II, conserved site"
definition: >-
  Seminal vesicle protein II (SVP-II) is one of the six major secretory proteins secreted by rat seminal vesicle. It is a clotting protein that serves as the substrate in the formation of the copulatory plug. Covalent clotting of this protein is catalyzed by a transglutaminase and involves the formation of gamma-glutamyl-epsilon-lysine crosslinks. SVS-II sequence contains thirteen repeats of a thirteen amino acid residue domain which is probably involved in the cross-linking. There are a number of invariant residues in this signature, four of them (two lysines and two glutamines) probably participate in the cross-links.
