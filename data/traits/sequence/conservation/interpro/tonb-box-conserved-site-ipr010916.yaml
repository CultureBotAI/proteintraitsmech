identifier: InterPro:IPR010916
label: "TonB box, conserved site"
definition: >-
  This entry describes a short conserved region at the N terminus called the tonB-box, which is involved in the interaction of the protein with the TonB protein. In Escherichia coli the TonB protein interacts with outer membrane receptor proteins that carry out high-affinity binding and energy-dependent uptake of specific substrates into the periplasmic space. These substrates are either poorly permeable through the porin channels or are encountered at very low concentrations. In the absence of tonB these receptors bind their substrates but do not carry out active transport. The TonB protein also interacts with some colicins.
