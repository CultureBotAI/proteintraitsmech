identifier: InterPro:IPR049979
label: "Cysteine-responsive attenuator conserved region, actinomycetes"
definition: >-
  This entry represents a conserved region of polycysteine-encoding leaderless short ORFs from Actinomycetes, which act as cysteine-responsive attenuators of operonic gene expression. It is often found towards the C-terminal end of the proteins.
