identifier: InterPro:IPR018116
label: "Somatotropin hormone, conserved site"
definition: >-
  Somatotropin is a hormone that plays an important role in growth control. It belongs to a family that includes choriomammotropin (lactogen), its placental analogue; prolactin, which promotes lactation in the mammary gland, and placental prolactin-related proteins; proliferin and proliferin related protein; and somatolactin from various fish. The 3D structure of bovine somatotropin has been predicted using a combination of heuristics and energy minimisation.
