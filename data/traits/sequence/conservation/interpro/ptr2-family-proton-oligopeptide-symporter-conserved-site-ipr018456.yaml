identifier: InterPro:IPR018456
label: "PTR2 family proton/oligopeptide symporter, conserved site"
definition: >-
  The transport of peptides into cells is a well-documented biological phenomenon which is accomplished by specific, energy-dependent transporters found in a number of organisms as diverse as bacteria and humans. The PTR family of proteins is distinct from the ABC-type peptide transporters and was uncovered by sequence analyses of a number of recently discovered peptide transport proteins. These proteins that seem to be mainly involved in the intake of small peptides with the concomitant uptake of a proton. These integral membrane proteins are predicted to comprise twelve transmembrane regions. This entry describes two conserved sites. The first conserved site is found within a region that includes the end of the second transmembrane region, a cytoplasmic loop as well as the third transmembrane region. The second conserved site corresponds to the core of the fifth transmembrane region.
