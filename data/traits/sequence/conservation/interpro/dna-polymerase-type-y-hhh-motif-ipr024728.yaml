identifier: InterPro:IPR024728
label: "DNA polymerase type-Y, HhH motif"
definition: >-
  This helix-hairpin-helix motif is found in proteins belonging to the type-Y family of DNA polymerases. This type of polymerases are thought to be involved in UV protection and mutation.
