identifier: InterPro:IPR006690
label: "Outer membrane protein, OmpA-like, conserved site"
definition: >-
  Most of the bacterial outer membrane proteins in this group are porin-like integral membrane proteins (such as ompA), but some are small lipid-anchored proteins (such as pal). It is also found in MotB and related proteins. They are present in the outer membrane of many Gram-negative organisms. This domain is found at the C-terminal half of these proteins and is well conserved. The N-terminal half is variable although some of the proteins in this group have the OmpA-like transmembrane domain at the N terminus.
