identifier: InterPro:IPR018083
label: Sterol reductase, conserved site
definition: >-
  The following enzymes belong to a conserved family of sterol reductases which act by reducing double bonds: Fungal delta(14)-sterol reductase ( ) (C-14 sterol reductase) (gene ERG24 in budding yeast), an enzyme of ergosterol biosynthesis. Mammalian (TM7SF2) and plant delta(14)-sterol reductases. Fungal delta(24(24(1)))-sterol reductase ( ) (C-24(28) sterol reductase) (gene ERG4 in budding yeast), an enzyme of ergosterol biosynthesis. Mammalian 7-dehydrocholesterol reductase ( ) which produces cholesterol by reduction of C7-C8 double bond of 7-dehydrocholesterol (7- DHC). Lamin B receptor, which is thought to anchor the lamina to the inner nuclear membrane. All these proteins are highly hydrophobic and seem to contain seven or eight transmembrane regions.
