label: "Large ribosomal subunit protein uL15, conserved site"
definition: >-
  This entry represents a conserved region in the C-terminal section of the large ribosomal subunit protein uL15, which is found in al cellular organisms. Large ribosomal subunit protein uL15 was previously known as L15. In Escherichia coli, L15 is known to bind the 23S rRNA. Ribosomal protein, L15 from bacteria and plant chloroplasts (nuclear-encoded) belong to this family. Vertebrate L27a, Tetrahymena thermophila L29 and fungal L27a (L29, CRP-1, CYH2) also are members of this group. Ribosomal uL18 protein from a number of archaebacteria show homology to both the eukaryotic eL18 and eubacterial ribosomal protein uL15, an observation which has been seen to substantiate the belief that archaea represent an evolutionary stage between bacteria and eukaryotes. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the s…
