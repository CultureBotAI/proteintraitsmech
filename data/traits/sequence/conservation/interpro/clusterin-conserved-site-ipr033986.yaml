identifier: InterPro:IPR033986
label: "Clusterin, conserved site"
definition: >-
  Clusterin is a vertebrate glycoprotein that functionas as a extracellular chaperone and has been associated with programmed cell death. Clusterin (Apo-J) is synthesized as a precursor polypeptide of about 400 amino acids which is post-translationally cleaved to form two subunits (of about 200 amino acids each). The two subunits are linked by five disulfide bonds to form an antiparallel ladder-like structure. In each of the mature subunits the five cysteines that are involved in disulfide bonds are clustered in domains of about 30 amino acids located in the central part of the subunits. This entry represents two conserved sites for clusterin, found one in each of the two subunits. Both of them contain three cysteines.
