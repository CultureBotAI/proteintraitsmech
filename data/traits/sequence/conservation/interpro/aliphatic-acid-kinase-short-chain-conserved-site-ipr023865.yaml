identifier: InterPro:IPR023865
label: Aliphatic acid kinase, short-chain, conserved site
definition: >-
  Acetate kinase, which is predominantly found in microorganisms, facilitates the production of acetyl-CoA by phosphorylating acetate in the presence of ATP and a divalent cation. The enzyme is important in the process of glycolysis, enzyme levels being increased in the presence of excess glucose. The growth of a bacterial mutant lacking acetate kinase has been shown to be inhibited by glucose, suggesting that the enzyme is involved in excretion of excess carbohydrate. A related enzyme, butyrate kinase, facilitates the formation of butyryl-CoA by phosphorylating butyrate in the presence of ATP to form butyryl phosphate. This entry contains two signature patterns for these enzymes; the first one is located in the N-terminal section and the second in the central section. Both of them are glycine-rich and could be involved in substrate or ATP-binding.
