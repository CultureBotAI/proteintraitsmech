identifier: InterPro:IPR010810
label: "Flagellin hook, IN motif"
definition: >-
  The function of this region is not clear, but it is found in many flagellar hook proteins, including FliD homologues. This motif is found in single copy or repeated in various flagellar proteins. Conserved Ile-Asn (IN) residues are seen at the centre of the motif. The diversity of these motifs makes it likely that some members of the family are not identified.
