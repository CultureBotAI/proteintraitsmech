identifier: InterPro:IPR018199
label: "Small ribosomal subunit protein eS4, N-terminal, conserved site"
definition: >-
  A number of eukaryotic and archaeal ribosomal proteins can be grouped on the basis of sequence similarities. One of these families includes small ribosomal subunit protein eS4 from archaea and eukaryotes. Small ribosomal subunit protein eS4A from yeast is also known as S7/YS6; archaeal members are also known as S4e; and mammalian and plant cytoplasmic proteins were previously known as S4. Two highly similar isoforms of mammalian S4 exist, one coded by a gene on chromosome Y, and the other on chromosome X. This entry represents the conserved site of the ribosomal protein eS4 that is found at the N-terminal region and includes some charged residues.
