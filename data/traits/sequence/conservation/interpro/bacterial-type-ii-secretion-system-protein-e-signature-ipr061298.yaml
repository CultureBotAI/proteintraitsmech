identifier: InterPro:IPR061298
label: "Bacterial type II secretion system protein, E signature"
definition: >-
  This entry represents a cite that overlaps the 'B' motif of ATP-binding proteins. A number of bacterial proteins, some of which are involved in a general secretion pathway (GSP) for the export of proteins (also called the type II pathway), have been found to be evolutionary related. These proteins are probably cytoplasmically located and, on the basis of the presence of a conserved P-loop region, probably bind ATP. The type II protein secretion system (T2SS) is a sophisticated multi-protein machinery containing 12-15 different proteins. Historically, this system was described as the main terminal branch (MTB) of the general secretory pathway (GSP), but this nomenclature is now on obsolete.
