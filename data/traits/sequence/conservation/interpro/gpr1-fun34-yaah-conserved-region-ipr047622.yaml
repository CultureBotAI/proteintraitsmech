identifier: InterPro:IPR047622
label: "GPR1/FUN34/YaaH conserved region"
definition: >-
  This entry represents a conserved region found in a group of evolutionary related proteins that includes Yarrowia lipolytica (Candida lipolytica) glyxoxylate pathway regulator GPR1, Saccharomyces cerevisiae Ady2 and FUN34 (also known as Ato2); fission yeast Mug86 (also known as SpAC5D6.09c); Escherichia coli SatP (YaaH); and Aspergillus nidulans AcpA (AN5226). They contain six transmembrane regions that are involved in transport. This entry represents a region found in the first transmembrane helix ( ). Saccharomyces cerevisiae Ady2 is necessary for the expression of an acetate permease. Gpr1p affects sensitivity to acetic acid in the yeast Yarrowia lipolytica. AcpA may be an acetate transporter that is essential for acetate permease activity in the hyphal fungus Aspergillus nidulans. SatP is involved in the uptake of acetate and succinate.
