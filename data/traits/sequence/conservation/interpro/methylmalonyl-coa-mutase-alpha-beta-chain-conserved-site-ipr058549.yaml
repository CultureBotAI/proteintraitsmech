identifier: InterPro:IPR058549
label: "Methylmalonyl-CoA mutase, alpha/beta chain, conserved site"
definition: >-
  This entry represents the best conserved region which is located in the central part of the Methylmalonyl-CoA mutase. Methylmalonyl-CoA mutase ( ) (MCM) is an adenosylcobalamin (vitamin B12) dependent enzyme that catalyses the isomerization between methylmalonyl-CoA and succinyl-CoA. MCM is involved in various catabolic or biosynthetic pathways; for example in human it is involved in the degradation of several amino acids, odd-chain fatty acids and cholesterol via propionyl-CoA to the tricarboxylic acid cycle; while in some bacteria it is involved in the synthesis of propionate from tricarboxylic acid-cycle intermediates. Deficiency of MCM in human causes an often fatal disorder of organic acid metabolism termed methylmalonic acidemia. The sequences of eukaryotic and prokaryotic MCM are rather well conserved. In eukaryotes, MCM is located in the mitochondrial matrix and is a homodimer of a polypeptide chain of about 710 amino acids. In bacteria MCM is a dimer of two non-identical, yet structurally related chains. A small degree of similarity is said to exist between MCM and the large subunit of the adenosylcobalamin-dependent enzyme ethanolamine ammonia-lyase, but this similarity is so weak that these two type of enzymes can not be detected by a single pattern.
