identifier: InterPro:IPR001484
label: "Pyrokinin, conserved site"
definition: >-
  Pyrokinins are insect neuropeptides that mediate visceral muscle contractile activity (myotropic activity). They share an amide-blocked C-terminal pentapeptide sequence that is sufficient to elicit a significant myotropic activity. Pheromonotropin which controls sex pheromone production also belongs to this group.
