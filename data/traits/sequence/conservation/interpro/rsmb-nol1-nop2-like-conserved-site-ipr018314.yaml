identifier: InterPro:IPR018314
label: "RsmB/NOL1/NOP2-like, conserved site"
definition: >-
  This entry represents a highly conserved region found in the conserved central domain of a group of class I-like SAM-binding methyltransferases found in archaea, bacterial and eukaryotes, including Trm4 from Methanocaldococcus jannaschii, RsmB from Escherichia coli (also known as Sun), NOP2 from fission yeast and human NOL1.
