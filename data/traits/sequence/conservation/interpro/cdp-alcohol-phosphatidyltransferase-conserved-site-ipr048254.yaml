identifier: InterPro:IPR048254
label: "CDP-alcohol phosphatidyltransferase, conserved site"
definition: >-
  This entry represents a conserved region found in a number of phosphatidyltransferases, which contains three aspartic acid residues. A number of phosphatidyltransferases, which are all involved in phospholipid biosynthesis and that share the property of catalysing the displacement of CMP from a CDP-alcohol by a second alcohol with formation of a phosphodiester bond and concomitant breaking of a phosphoride anhydride bond share a conserved sequence region. These enzymes are proteins of 200 to 400 amino acid residues, including EPT1 from yeast, CDP-diacylglycerol--glycerol-3-phosphate 3-phosphatidyltransferases from bacteria, CDP-diacylglycerol--serine O-phosphatidyltransferase from animals, among others. Also included in this entry is cardiolipin (CL) synthase (CMP-forming)/mitochondrial hydrolase fusion protein from S.pombe, a tandem fusion protein with a mitochondrial hydrolase. The CL synthase is essential for this organism.
