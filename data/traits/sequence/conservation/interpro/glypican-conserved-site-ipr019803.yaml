identifier: InterPro:IPR019803
label: "Glypican, conserved site"
definition: >-
  Glypicans are a family of heparan sulphate proteoglycans which are anchored to cell membranes by a glycosylphosphatidylinositol (GPI) linkage. Six members (GPC1-6) are known in vertebrates. Structurally, these proteins consist of three separate domains: A signal sequence; An extracellular domain of about 500 residues that contains 12 conserved cysteines probably involved in disulphide bonds and which also contains the sites of attachment of the heparan sulphate glycosaminoglycan side chains; A C-terminal hydrophobic region which is post-translationally removed after formation of the GPI-anchor. The signature pattern in this entry is located in the central section of the extracellular domain and contains five of the conserved cysteines.
