identifier: InterPro:IPR031372
label: CAMSAP, spectrin and Ca2+/calmodulin-binding region
definition: >-
  This entry represents a conserved region found in calmodulin-regulated spectrin-associated proteins (CAMSAPs) from animals. This conserved region (also known as CC1 region) binds to both spectrin and Ca2+/calmodulin in vitro, although the binding of Ca2+/calmodulin inhibits the binding of spectrin. CC1 appears to be a functional region of CAMSAP1 that links spectrin-binding to neurite outgrowth. The calmodulin-regulated spectrin-associated (CAMSAP) proteins are defined by a CKK domain that binds microtubules. It includes CAMSAPs from vertebrates and Patronin from invertebrates. CAMSAP1 is the representative member. It contains a conserved region, CC1, that binds to both spectrin and Ca2+/calmodulin in vitro and links spectrin-binding to neurite outgrowth. Patronin binds to and protects the MT minus-end against depolymerization. CAMSAP2 is a key microtubule-organising protein that specifically binds the minus end of non-centrosomal microtubules and regulates their dynamics and organisation. CAMSAP proteins carry an N-terminal region that includes two CH domains represented by and , a central region including a predicted coiled-coil, and a C-terminal CKK domain , which is involved in binding CAMSAP proteins to microtubules.
