identifier: InterPro:IPR017948
label: Transforming growth factor beta, conserved site
definition: >-
  This entry represents a a region which includes two of the conserved cysteines. Transforming growth factor-beta (TGF-beta) is a multifunctional peptide that controls proliferation, differentiation and other functions in many cell types. TGF-beta-1 is a peptide of 112 amino acid residues derived by proteolytic cleavage from the C-terminal of a precursor protein. A number of proteins are known to be related to TGF-beta-1. Proteins from the TGF-beta family are only active as homo- or heterodimer; the two chains being linked by a single disulphide bond. From X-ray studies of TGF-beta-2, it is known that all the other cysteines are involved in intrachain disulphide bonds. There are four disulphide bonds in the TGF-beta's and in inhibin beta chains, while the other members of this family lack the first bond. The regulatory cytokine TGF-beta exerts tumour-suppressive effects, but also modulates cell invasion and immune regulation. Misregulation of the TGF-beta signalling pathway can result in tumour development.
