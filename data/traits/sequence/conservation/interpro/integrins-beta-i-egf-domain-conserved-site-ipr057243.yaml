identifier: InterPro:IPR057243
label: "Integrins beta, I-EGF domain, conserved site"
definition: >-
  This entry represents a conserved region of the I-EGF domain that includes five of the conserved cysteines. The C terminus of the extracellular region of all the integrin beta chains has four cysteine-rich tandem repeats of forty amino acids, which are variants of the EGF-like domain, termed integrin- or I-EGF domains. The I-EGF domain is a small globular domain mainly composed by loops with a small anti-parallel β-sheet constituted of two β-strands (see ). The structure is stabilised by four disulfide bonds between the first and fifth, second and fourth, third and sixth, and seventh and eighth Cys residues. Three disulfide bonds are shared with classical EGF-like domains. The disulfide unique to I-EGF domains links the N terminus to the turn between the two β-strands. Compared to classical EGF-like modules with three disulfide bonds, the I-EGF module is less elongated, with a nosecone-like shape. The anti parallel sheet between the two β-strands is shortened because four highly conserved residues among classical EGF-like modules are deleted in I-EGF modules. I-EGF repeats in the integrin beta subunit stalk region relay activation signals to the ligand-binding headpiece. Integrins are the major metazoan receptors for cell adhesion to extracellular matrix proteins and, in vertebrates, also play important roles in certain cell-cell adhesions, make transmembrane connections to the cytoskeleton, and activate many intracellular signalling pathways. An integrin receptor is a heterodimer composed of alpha and beta subunits. Each subunit crosses the membrane once, with most of the polypeptide residing in the extracellular space, and has two short cytoplasmic domains. Some members of this family have EGF repeats at the C terminus and also have a VWA domain inserted within the i…
