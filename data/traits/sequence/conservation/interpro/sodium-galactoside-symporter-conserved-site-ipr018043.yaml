identifier: InterPro:IPR018043
label: "Sodium:galactoside symporter, conserved site"
definition: >-
  It has been shown that integral membrane proteins that mediate the intake of a wide variety of molecules with the concomitant uptake of sodium ions (sodium symporters) can be grouped, on the basis of sequence and functional similarities into a number of distinct families. This collection of sequences represents the sodium: galactoside symporter family (SGF). Like sugar transport proteins, these integral membrane proteins are predicted to comprise twelve membrane spanning domains.
