identifier: InterPro:IPR005108
label: "HELP motif"
definition: >-
  This entry represents the HELP (Hydrophobic ELP) motif found in animal EMAP and EMAP-like proteins (ELPs). These proteins are involved in the formation of the mitotic spindle and interphase microtubule network and for normal proliferation of neuronal progenitor cells in the developing brain and normal brain development. HELP is not an independent domain, it is part of the hydrophobic core that joints the two β-propellers contributing blades 1 and 14 that are buried at the interface between them. These β-propellers have been defined as TAPE (tandem atypical propeller in EMLs) domain. This motif is essential for the folding of the TAPE domain, which binds alpha/beta-tubulin.
