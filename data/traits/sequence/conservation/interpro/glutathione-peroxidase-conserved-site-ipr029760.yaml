identifier: InterPro:IPR029760
label: "Glutathione peroxidase conserved site"
definition: >-
  This entry represents a highly conserved octapeptide located in the central section of glutathione peroxidase. Glutathione peroxidase (GSHPx) ( ) is an enzyme that catalyses the reduction of hydroxyperoxides by glutathione. Its main function is to protect against the damaging effect of endogenously formed hydroxyperoxides. In higher vertebrates, several forms of GSHPx are known, including a ubiquitous cytosolic form (GSHPx-1), a gastrointestinal cytosolic form (GSHPx-GI), a plasma secreted form (GSHPx-P), and an epididymal secretory form (GSHPx-EP). In addition to these characterised forms, the sequence of a protein of unknown function has been shown to be evolutionary related to those of GSHPx's.
