identifier: InterPro:IPR000808
label: "Iron-sulfur cluster carrier protein-like, conserved site"
definition: >-
  This entry represents a conserved region found in Iron-sulfur cluster carrier protein from Escherichia coli protein (Mrp), a 41kDa ATP-binding protein of unknown function, and other Fe-S cluster protein sequences spread among all cellular organisms. Homologues are present in other bacteria including Bacillus subtilis ybaL, Haemophilus influenzae HI1277, Synechocystis sp. (strain PCC 6803) slr0067; and also in eukaryotes, for example human NBP, yeast NBP35 and YIL003w, Caenorhabditis elegans F10G8.6; and in archaebacteria, for example Methanocaldococcus jannaschii (Methanococcus jannaschii) MJ0283.
