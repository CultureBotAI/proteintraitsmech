identifier: InterPro:IPR043580
label: "Cutinase, serine active site"
definition: >-
  Cutinase is an extracellular fungal enzyme that catalyses the hydrolysis of cutin, an insoluble lipid-polyester that forms the structure of plant cuticle. Cutinase allows pathogenic fungi to penetrate through the host plant cuticular barrier during the initial stage of fungal infection. Cutinase is a serine esterase which contains the classical catalytic triad (Asp, Ser, and His) found in the serine hydrolases. Two cutinase-like proteins (MtCY39.35 and MtCY339.08c) have been found in the genome of the bacteria Mycobacterium tuberculosis. The sequence around the catalytic residues is well conserved in the sequence of the known fungal cutinases.
