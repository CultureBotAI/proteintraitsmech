identifier: InterPro:IPR000132
label: Nitrilase/cyanide hydratase, conserved site
definition: >-
  This family includes both nitrilases and cyanide hydratase. Nitrilases ( ) are enzymes that convert nitriles into their corresponding acids and ammonia. They are widespread in microbes as well as in plants where they convert indole-3-acetonitrile to the hormone indole-3- acetic acid. A conserved cysteine has been shown to be essential for enzyme activity; it seems to be involved in a nucleophilic attack on the nitrile carbon atom. Cyanide hydratase ( ) converts HCN to formamide. In phytopathogenic fungi, it is used to avoid the toxic effect of cyanide released by wounded plants.
