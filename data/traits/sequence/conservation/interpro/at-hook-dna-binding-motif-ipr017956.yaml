identifier: InterPro:IPR017956
label: "AT hook, DNA-binding motif"
definition: >-
  AT hooks are DNA-binding motifs with a preference for A/T rich regions. These motifs are found in a variety of proteins, including the high mobility group (HMG) proteins, in DNA-binding proteins from plants and in hBRG1 protein, a central ATPase of the human switching/sucrose non-fermenting (SWI/SNF) remodelling complex.
