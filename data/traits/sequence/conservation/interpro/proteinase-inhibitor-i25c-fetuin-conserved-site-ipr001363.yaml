identifier: InterPro:IPR001363
label: Proteinase inhibitor I25C, fetuin, conserved site
definition: >-
  The cystatins are a superfamily of similar proteins present in mammals, birds, fish, insects, plants and protozoa. In general they are potent peptidase inhibitors belonging to MEROPS inhibitor family I25, clan IH. This family of proteinase inhibitors are cystatins belonging to MEROPS inhibitor family I25 (clan IH), subfamily I25C. They are primarily metalloprotease inhibitors, which include snake venom anti-hemorrhagic factors and the mammalian fetuins, for example: Anti-hemorrhagic factor BJ46a, which is a potent inhibitor of atrolysin and jararhagin (MEROPS peptidase family M12) from the venomous snake Bothrops jararaca. Anti-hemorrhagic factor, HSF, from the Japanese Habu snake (Trimeresurus flavoviridis). HSF contains two N-terminal cystatin domains which show a remarkable sequence homology (about 50%) to those of plasma glycoproteins such as alpha 2-HS (human) and fetuin (bovine) and to a lesser extent to that of HRG (human). In spite of the presence of cystatin domains, HSF does not inhibit cysteine proteinases such as papain and cathepsin B but does inhibit several metalloproteases in Habu venom. Mammalian fetuins have been demonstrated to bind to matrix metalloproteinase (MMPs, MEROPS peptidase family M10). This binding protects the MMPs from autolytic degradation without interfering with their enzymatic activity. Fetuins are known to consist of three domains: two tandemly arranged N-terminal cystatin domains (D1 and D2) and an unrelated domain (D3) located in the C-terminal region. When compared with the other members of this family, D3, especially its N-terminal half, varies greatly due to deletions, insertions or substitutions. Sequence comparisons suggest that the conformation of the human alpha2HS glycoprotein differs greatly from that of other members of…
