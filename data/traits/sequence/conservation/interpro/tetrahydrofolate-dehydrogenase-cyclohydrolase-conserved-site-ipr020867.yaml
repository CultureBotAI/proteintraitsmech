identifier: InterPro:IPR020867
label: Tetrahydrofolate dehydrogenase/cyclohydrolase, conserved site
definition: >-
  Enzymes that participate in the transfer of one-carbon units require the coenzyme tetrahydrofolate (THF). Various reactions generate one-carbon derivatives of THF, which can be interconverted between different oxidation states by methylene-THF dehydrogenase, methenyl-THF cyclohydrolase and formyl-THF synthetase. The dehydrogenase and cyclohydrolase activities are expressed by a variety of multifunctional enzymes, including the tri-functional eukaryotic C1-tetrahydrofolate synthase; a bifunctional eukaryotic mitochondrial protein; and the bifunctional Escherichia coli folD protein. Methylene-tetrahydrofolate dehydrogenase and methenyltetrahydrofolate cyclo-hydrolase share an overlapping active site, and as such are usually located together in proteins, acting in tandem on the carbon-nitrogen bonds of substrates other than peptide bonds. The sequence of the dehydrogenase/cyclohydrolase domain is highly conserved in all forms of the enzyme. This entry contains two conserved signature patterns; the first one is located in the N-terminal part of these enzymes and contains three acidic residues. The second pattern is a highly conserved sequence of 9 amino acids, which is located in the C-terminal section.
