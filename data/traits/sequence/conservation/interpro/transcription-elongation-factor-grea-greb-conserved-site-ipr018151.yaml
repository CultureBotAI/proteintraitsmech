identifier: InterPro:IPR018151
label: Transcription elongation factor, GreA/GreB, conserved site
definition: >-
  Bacterial proteins GreA and GreB, are related proteins of about 160 amino-acid residues, and are necessary for efficient RNA polymerase transcription elongation past template-encoded arresting sites. Arresting sites in DNA have the property of trapping a certain fraction of elongating RNA polymerases that pass through, resulting in locked DNA/RNA/ polymerase ternary complexes. Cleavage of the nascent transcript by cleavage factors, such as GreA or GreB, allows the resumption of elongation from the new 3'-terminus. GreA induces cleavage 2 or 3 nucleotides behind the terminus while GreB releases longer sequences up to 9 nucleotides in length.
