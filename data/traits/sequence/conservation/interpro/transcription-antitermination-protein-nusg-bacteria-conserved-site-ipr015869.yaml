identifier: InterPro:IPR015869
label: "Transcription antitermination protein, NusG, bacteria, conserved site"
definition: >-
  Bacterial transcription antitermination protein, NusG, is a component of the transcription complex and interacts with the termination factor Rho and RNA polymerase. NusG is a bacterial transcriptional elongation factor involved in transcription termination and anti-termination.
