identifier: InterPro:IPR024002
label: "Formate/nitrite transporter, conserved site"
definition: >-
  A number of bacterial and archaebacterial proteins involved in transporting formate or nitrite have been shown to be related: FocA and FocB, from Escherichia coli, transporters involved in the bidirectional transport of formate. FdhC, from Methanobacterium formicicum and Methanothermobacter thermautotrophicus (Methanobacterium thermoformicicum), a probable formate transporter. NirC, from E. coli and Salmonella typhimurium, a probable nitrite transporter. Bacillus subtilis hypothetical protein YrhG. B. subtilis hypothetical protein YwcJ (ipa-48R). The 70 kd yeast hypothetical protein YHL008c is highly similar, in its N-terminal section, to the prokaryotic members of this family.
