identifier: InterPro:IPR061421
label: "CFI-box putative sorting motif"
definition: >-
  By several criteria, the motif represented by this entry seems likely to be a site of post-translational modification associated with protein-sorting and probably with attachment to the bacterial cell surface. Some members of have an extension with this motif while others do not. Some proteins in Desulfatibacillum aliphaticivorans share the motif at or close to the C-terminal. The Cys-aliphatic-aliphatic CFI motif suggests processing by a CPBP-family glutamic intramembrane endopeptidase, as is the case with Rce1 cleavage of the CAAX box in eukaryotes, but this has not yet been established.
