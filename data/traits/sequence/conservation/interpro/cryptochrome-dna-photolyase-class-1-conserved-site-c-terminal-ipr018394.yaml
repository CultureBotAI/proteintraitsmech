identifier: InterPro:IPR018394
label: "Cryptochrome/DNA photolyase class 1, conserved site, C-terminal"
definition: >-
  This entry represents a number of conserved sequence regions found in the C-terminal region of the class 1 cryptochrome/DNA photolyase. The cryptochrome and photolyase families consist of structurally related flavin adenine dinucleotide (FAD) proteins that use the absorption of blue light to accomplish different tasks. The photolyasess use the blue light for light-driven electron transfer to repair UV-damaged DNA, while the cryptochromes are blue-light photoreceptors involved in the circadian clock for plants and animals. On the basis of the primary structure, the cryptochrome/DNA photolyase family can be grouped into two classes. The first class contains cryptochromes and DNA photolyases from eubacteria, archaea, fungi, animals and plants. The second class contains DNA photolyases from prokaryotes, plants and animals. Phylogenetically, the groups are further divided into the class I to class III cyclobutane pyrimidine dimer (CPD) photolyases, plant cryptochromes (CRYs), DASH CRYs, as wells as animal type I and II CRYs.
