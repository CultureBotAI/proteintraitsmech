identifier: InterPro:IPR019950
label: "M protein-type anchor motif"
definition: >-
  Viruses, parasites and bacteria are covered in protein and sugar molecules that help them gain entry into a host by counteracting the host's defences. One such molecule is the M protein produced by certain streptococcal bacteria. M proteins embody an anchor motif that is now known to be shared by many Gram-positive bacterial surface proteins. The motif includes a conserved hexapeptide, with the consensus sequence LPXTGE, which precedes a hydrophobic region, which itself precedes a cluster of basic residues.
