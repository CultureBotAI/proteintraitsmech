identifier: InterPro:IPR018368
label: ClpA/B, conserved site 1
definition: >-
  The ClpA/B family of ATP-binding proteins includes the regulatory subunit of the ATP-dependent protease Clp, ClpA; heat shock proteins ClpB, 104 and 78; and chloroplast proteins CD4a (ClpC) and CD4b. The proteins are thought to protect cells from stress by controlling the aggregation and denaturation of vital cellular structures. They vary in size, but share two conserved regions of about 200 amino acids that each contains an ATP-binding site. This entry represents a conserved site found in the first conserved region.
