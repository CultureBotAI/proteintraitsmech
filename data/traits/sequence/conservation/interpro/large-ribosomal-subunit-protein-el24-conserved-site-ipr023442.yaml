identifier: InterPro:IPR023442
label: "Large ribosomal subunit protein eL24, conserved site"
definition: >-
  This entry represents a conserved sequence region found towards the N terminus of ribosomal protein eL24 (previously known as L24). It is also found in ribosomal protein eL24-like, an essential protein with similarity to Rpl24Ap and Rpl24Bp, which is associated with pre-60S ribosomal subunits and required for ribosomal large subunit biogenesis. A number of eukaryotic and archaeabacterial ribosomal proteins can be grouped on the basis of sequence similarities. One of these families consists of mammalian ribosomal protein eL24; yeast ribosomal protein eL24A/B; Kluyveromyces lactis ribosomal protein eL24; Arabidopsis thaliana ribosomal protein eL24y/z; Haloarcula marismortui ribosomal protein eL24; and Methanocaldococcus jannaschii protein eL24. These proteins have 60 to 160 amino-acid residues. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usuall…
