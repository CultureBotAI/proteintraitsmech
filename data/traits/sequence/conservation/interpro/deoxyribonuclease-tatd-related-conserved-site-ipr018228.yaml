identifier: InterPro:IPR018228
label: "Deoxyribonuclease, TatD-related, conserved site"
definition: >-
  This family of proteins are related to a large superfamily of metalloenzymes. TatD, a member of this family has been shown experimentally to be a DNase enzyme. Allantoinase , N-isopropylammelide isopropyl amidohydrolase and the SCN1 protein from fission yeast belong to this family.
