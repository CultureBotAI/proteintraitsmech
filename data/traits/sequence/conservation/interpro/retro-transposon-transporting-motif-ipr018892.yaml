identifier: InterPro:IPR018892
label: "Retro-transposon transporting motif"
definition: >-
  This is the highly conserved motif GRKIxxxxxRRKx of nucleoporins that plays a critical and unique role in the nuclear import of retro-transposons in both yeasts and higher organisms. It would appear that the arginine residues at positions 2 and 9-10 constitute a bipartite nuclear localisation signal, with two basic peptide motifs separated by an interchangeable spacer sequence, that is crucial for the retro-transposon activity.
