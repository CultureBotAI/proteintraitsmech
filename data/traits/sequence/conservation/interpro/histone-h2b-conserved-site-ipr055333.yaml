identifier: InterPro:IPR055333
label: "Histone H2B, conserved site"
definition: >-
  This entry represents a conserved region in the C-terminal part of H2B. Histone H2B is one of the five histones, along with H1/H5, H2A, H3 and H4. Two copies of each of the H2A, H2B, H3, and H4 histones ensemble to form the core of the nucleosome. The nucleosome forms octameric structure that wraps DNA in a left-handed manner. Histones can undergo several different types of post-translational modifications that affect transcription, DNA repair, DNA replication and chromosomal stability.
