identifier: InterPro:IPR049633
label: "Large ribosomal subunit protein eL6, conserved site"
definition: >-
  This entry represents a conserved site found in the centre of large ribosomal subunit proteins eL6 from eukaryotes, including mammalian eL6 (which was previously known as L6 and TAX-responsive enhancer element binding protein 107; Saccharomyces cerevisiae (Baker's yeast) ribosomal proteins eL6A/B (also known as YL16A/YL16B); and Mesembryanthemum crystallinum (Common ice plant) eL6 (also known as YL16-like). These proteins have 175 (yeast) to 287 (mammalian) amino acids.
