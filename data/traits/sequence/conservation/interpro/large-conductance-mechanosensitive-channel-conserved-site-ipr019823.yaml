identifier: InterPro:IPR019823
label: "Large-conductance mechanosensitive channel, conserved site"
definition: >-
  Mechanosensitive ion channels (MscL) play a critical role in transducing physical stresses at the cell membrane into an electrochemical response. MscL is a protein which forms a channel organised as a homopentamer, with each subunit containing two transmembrane regions. Prokaryotes harbor a large-conductance mechanosensitive channel (gene mscL) that opens in response to stretch forces in the membrane lipid bilayer and may participate in the regulation of osmotic pressure changes within the cell. The signature pattern of this entry is a conserved region located in the N-terminal region. It starts three residues before the beginning of the first transmembrane domain and ends in the middle of that domain.
