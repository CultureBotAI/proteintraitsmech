identifier: InterPro:IPR030472
label: "Tissue factor, conserved site"
definition: >-
  Tissue factor (TF) is an integral membrane glycoprotein that initiates blood coagulation by forming a complex with circulating factor VII or VIIa. The complex then activates factors IX or X by specific limited proteolysis. The mature form of TF is a protein of about 250 amino acid residues. TF consists of an extracellular domain of about 210 residues that contains two disulfide bonds, followed by a transmembrane region and a short cytoplasmic C-terminal domain. This entry represents the region centred on the two cysteines involved in the first disulfide bond.
