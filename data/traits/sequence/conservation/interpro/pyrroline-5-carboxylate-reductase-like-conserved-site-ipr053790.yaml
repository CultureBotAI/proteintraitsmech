identifier: InterPro:IPR053790
label: "Pyrroline-5-carboxylate reductase-like conserved site"
definition: >-
  Pyrroline-5-carboxylate reductase (P5CR) ( ) is the enzyme that catalyses the terminal step in the biosynthesis of proline from glutamate, the NAD(P) dependent oxidation of 1-pyrroline-5-carboxylate intoproline. This enzyme is also able to convert delta-1-piperideine-6-carboxylate (P6C) into pipecolic acid; this activity is part of pathway for the biosynthesis of the cyclic tetrapeptide apicidin F in the fungus Fusarium fujikuroi. This entry also includes Delta-1-pyrroline-5-carboxylate reductase kk1I part of the gene cluster that mediates the biosynthesis of KK-1, a novel cyclic depsipeptide with 10 residues which is a promising active compound with high activity against many plant pathogens, especially Botrytis cinerea. The sequences of P5CR from eubacteria (gene proC), archaebacteria and eukaryotes show only a moderate level of overall similarity. This entry represents the best conserved region located in the C-terminal section of P5CR.
