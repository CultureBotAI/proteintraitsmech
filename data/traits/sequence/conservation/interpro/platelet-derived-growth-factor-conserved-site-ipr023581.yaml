identifier: InterPro:IPR023581
label: "Platelet-derived growth factor, conserved site"
definition: >-
  This entry represents a conserved site found in PDGF and VEGF families, amongst others, that includes four of the eight cysteines conserved in the sequences of these proteins. In PDGF, these cysteines are known to be involved in intra and inter-chain disulphide bonds. Platelet-derived growth factor (PDGF) is a potent mitogen for cells of mesenchymal origin, including smooth muscle cells and glial cells. In both mouse and human, the PDGF signalling network consists of four ligands, PDGFA-D, and two receptors, PDGFRalpha and PDGFRbeta. All PDGFs function as secreted, disulphide-linked homodimers, but only PDGFA and B can form functional heterodimers. PDGFRs also function as homo- and heterodimers. All known PDGFs have characteristic 'PDGF domains', which include eight conserved cysteines that are involved in inter- and intramolecular bonds. Alternate splicing of the A chain transcript can give rise to two different forms that differ only in their C-terminal extremity. The transforming protein of Woolly monkey sarcoma virus (WMSV) (Simian sarcoma virus), encoded by the v-sis oncogene, is derived from the B chain of PDGF. PDGFs are mitogenic during early developmental stages, driving the proliferation of undifferentiated mesenchyme and some progenitor populations. During later maturation stages, PDGF signalling has been implicated in tissue remodelling and cellular differentiation, and in inductive events involved in patterning and morphogenesis. In addition to driving mesenchymal proliferation, PDGFs have been shown to direct the migration, differentiation and function of a variety of specialised mesenchymal and migratory cell types, both during development and in the adult animal. Other growth factors in this family include vascular endothelial growth factors B and C (VE…
