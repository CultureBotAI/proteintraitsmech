identifier: InterPro:IPR019885
label: "Transcription regulator HTH, AsnC-type, conserved site"
definition: >-
  The many bacterial transcription regulation proteins which bind DNA through a 'helix-turn-helix' motif can be classified into subfamilies on the basis of sequence similarities. One such family is the AsnC/Lrp subfamily. The Lrp family of transcriptional regulators appears to be widely distributed among bacteria and archaea, as an important regulatory system of the amino acid metabolism and related processes. This entry represents a conserved site that spans the complete helix-turn-helix motif and extends one residue downstream and one upstream of the HTH extremities.
