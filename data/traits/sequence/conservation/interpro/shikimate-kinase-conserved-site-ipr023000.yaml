identifier: InterPro:IPR023000
label: "Shikimate kinase, conserved site"
definition: >-
  This entry represents shikimate kinase ( ) catalyzes the fifth step in the biosynthesis from chorismate of the aromatic amino acids (the shikimate pathway) in bacteria (gene aroK or aroL), plants and in fungi (where it is part of a multifunctional enzyme which catalyzes five consecutive steps in this pathway). Shikimate kinase is a small protein of about 200 residues. Proteins belonging to this family also contain a copy of the ATP/GTP- binding motif 'A' (P-loop). The signature pattern used in this entry covers a conserved region that contains a run of three glycines.
