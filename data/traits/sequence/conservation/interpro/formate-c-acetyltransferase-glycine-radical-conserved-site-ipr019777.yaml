identifier: InterPro:IPR019777
label: "Formate C-acetyltransferase glycine radical, conserved site"
definition: >-
  This entry represents a conserved site found in Formate acetyltransferase. Protein radicals are components of several biologically important reactions. Glycyl radical enzymes are involved in a great variety of functions, for example, nucleotide, pyruvate and toluene metabolism. These enzymes are post-translationally interconverted, under anaerobic conditions, from an inactive to an active form that carries a stable radical localised to a specific glycine at the C-terminal region of the polypeptidic chain. Extreme sensitivity towards destruction by oxygen, leading to polypeptide cleavage between the N-C alpha-bond of the Gly residue, is a conspicuous property of all protein-based glycyl radicals, thus confining their existence to strictly anaerobic conditions.
