identifier: InterPro:IPR018258
label: Large ribosomal subunit protein bL21, conserved site
definition: >-
  This entry represents the Large ribosomal subunit protein bL21 found in bacteria and eukaryotic organelles such as chloroplast and mitochondria. In Escherichia coli, bL21 is known to bind to the 23S rRNA in the presence of bL20. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups: Bacterial bL21 (old name L21). Marchantia polymorpha, chloroplast bL21 (old name L21). Dictyostelium discoideum, mitochondrial bL21m (old name L21). Plant, chloroplast bL21c (old name L21, nuclear-encoded) and mitochondrial bL21m (old name L21). Bacterial bL21 is a protein of about 100 amino-acid residues, the mature form of the spinach chloroplast L21 has 200 residues. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the larg…
