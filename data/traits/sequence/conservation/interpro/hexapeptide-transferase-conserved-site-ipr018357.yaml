identifier: InterPro:IPR018357
label: Hexapeptide transferase, conserved site
definition: >-
  A variety of bacterial transferases contain a repeat structure composed of tandem repeats of a [LIV]-G-X(4) hexapeptide, which, in the tertiary structure of LpxA (UDP N-acetylglucosamine acyltransferase), has been shown to form a left-handed parallel β helix. A number of different transferase protein families contain this repeat, such as galactoside acetyltransferase-like proteins, the gamma-class of carbonic anhydrases, and tetrahydrodipicolinate-N-succinlytransferases (DapD), the latter containing an extra N-terminal 3-helical domain. The signature pattern of this entry represents a fourfold repeat of the a [LIV]-G-x(4) hexapeptide.
