identifier: InterPro:IPR018507
label: Cytochrome c oxidase, subunit VIa, conserved site
definition: >-
  Cytochrome c oxidase ( ) is an oligomeric enzymatic complex which is a component of the respiratory chain complex and is involved in the transfer of electrons from cytochrome c to oxygen. In eukaryotes this enzyme complex is located in the mitochondrial inner membrane; in aerobic prokaryotes it is found in the plasma membrane. In eukaryotes, in addition to the three large subunits, I, II and III, that form the catalytic centre of the enzyme complex, there are a variable number of small polypeptidic subunits. One of these subunits is known as VIa in vertebrates and fungi. Mammals have two tissue-specific isoforms of VIa, a liver and a heart form. Only one form is found in fish. This conserved signature pattern for cytochrome c oxidase subunit VIa is located in the C-terminal region.
