identifier: InterPro:IPR020805
label: Cell division protein FtsZ, conserved site
definition: >-
  In bacteria, FtsZ is an essential cell division protein involved in the initiation of this event. It assembles into a cytokinetic ring on the inner surface of the cytoplasmic membrane at the place where division will occur. The ring serves as a scaffold that is disassembled when septation is completed. FtsZ ring formation is initiated at a single site on one side of the bacterium and appears to grow bidirectionally. In Escherichia coli, MinCD , encoded by the MinB locus, form a complex which appears to block the formation of FtsZ rings at the cell poles, at the ancient mid cell division sites, whilst MinE, encoded at the same locus, specifically prevents the action of MinCD at mid cell. FtsZ is a GTP binding protein with a GTPase activity. It undergoes GTP-dependent polymerisation into filaments (or tubules) that seem to form a cytoskeleton involved in septum synthesis. The structure and the properties of FtsZ clearly provide it with the capacity for the cytoskeletal, perhaps motor role, necessary for "contraction" along the division plane. In addition, however, the FtsZ ring structure provides the framework for the recruitment or assembly of the ten or so membrane and cytoplasmic proteins, uniquely required for cell division in E. coli or Bacillus subtilis, some of which are required for biogenesis of the new hemispherical poles of the two daughter cells. FtsZ can polymerise into various structures, for example a single linear polymer of FtsZ monomers, called a protofilament. Protofilaments can associate laterally to form pairs (sometimes called thick filaments), bundles (ill-defined linear associations of multiple protofilaments) or thick filaments, sheets (parallel or anti-parallel two-dimensional associations of thick filaments) and tubes (anti-parallel association…
