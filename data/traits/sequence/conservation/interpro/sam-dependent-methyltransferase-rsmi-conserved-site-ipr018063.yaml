identifier: InterPro:IPR018063
label: "SAM-dependent methyltransferase RsmI, conserved site"
definition: >-
  Several uncharacterised proteins have been shown to share regions of similarities, including Escherichia coli hypothetical protein yraL, and HI1654, the corresponding Haemophilus influenzae protein; Bacillus subtilis hypothetical protein yabC; Helicobacter pylori hypothetical protein HP0552; Mycoplasma genitalium and Mycoplasma pneumoniae hypothetical protein MG056; Mycobacterium tuberculosis hypothetical protein MtCI237.19; and Synechocystis sp. (strain PCC 6803) hypothetical protein sll0818. In bacterial 16S rRNAs, methylated nucleosides are clustered within the decoding centre, and these nucleoside modifications are thought to modulate translational fidelity. The N(4), 2'-O-dimethylcytidine (m(4)Cm) at position 1402 of the Escherichia coli 16S rRNA directly interacts with the P-site codon of the mRNA. RsmI is an AdoMet-dependent methyltransferase responsible for the 2'O-methylation of C1402. It is conserved in almost all species of bacteria. Proteins of the RsmI family are of about 30 to 34 Kd and contain a number of conserved regions. The signature pattern in this entry is to a highly conserved region in the central section of the proteins.
