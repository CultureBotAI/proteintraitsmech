identifier: InterPro:IPR035090
label: "Phosphorylase pyridoxal-phosphate attachment site"
definition: >-
  Phosphorylases ( ) are important allosteric enzymes in carbohydrate metabolism. They catalyze the formation of glucose 1-phosphate from polyglucose such as glycogen, starch or maltodextrin. Enzymes from different sources differ in their regulatory mechanisms and their natural substrates. However, all known phosphorylases share catalytic and structural properties. They are pyridoxal-phosphate dependent enzymes; the pyridoxal-P group is attached to a lysine residue around which the sequence is highly conserved. This entry represents this conserved site that can be found in the glycosyl transferase family 35 members.
