identifier: InterPro:IPR020538
label: "Hydrogenase nickel incorporation protein HypA/HybF, conserved site"
definition: >-
  Bacterial membrane-bound nickel-dependent hydrogenases require a number of accessory proteins which are involved in their maturation. One of these proteins is generally known as HypA. HypA is a metallochaperone that binds nickel to bring it safely to its target. The nickel coordinates with four nitrogens within the protein. Four conserved cysteines towards the C terminus bind one zinc moiety, probably to stabilise the protein fold. In Helicobacter pylori, HypA is involved in the maturation of both hydrogenase and urease. Escherichia coli has two proteins that belong to this family, HypA and HybF. A homologue, MJ0214, has also been found in a number of archaeal species, including the genome of Methanocaldococcus jannaschii (Methanococcus jannaschii). Guanidine hydrolase-activating protein A (GhaA) from Synechocystis sp. is also included in this entry, as it shows similarity to HypA. GhaA is involved in the maturation of the nickel-dependent guanidine hydrolase GdmH. This entry represents a region from these proteins that contains two of the conserved cysteines.
