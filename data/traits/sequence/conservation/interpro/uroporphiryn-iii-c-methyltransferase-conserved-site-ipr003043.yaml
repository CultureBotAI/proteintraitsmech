identifier: InterPro:IPR003043
label: Uroporphiryn-III C-methyltransferase, conserved site
definition: >-
  Uroporphyrin-III C-methyltransferase ( )(SUMT) catalyses the transfer of two methyl groups from S-adenosyl-L-methionine to the C-2 and C-7 atoms of uroporphyrinogen III to yield precorrin-2 via the intermediate formation of precorrin-1. SUMT is the first enzyme specific to the cobalamin pathway and precorrin-2 is a common intermediate in the biosynthesis of corrinoids such as vitamin B12, siroheme and coenzyme F430. The sequences of SUMT from a variety of eubacterial and archaebacterial species are currently available. In species such as Bacillus megaterium (gene cobA), Pseudomonas denitrificans (cobA) or Methanobacterium ivanovii (gene corA) SUMT is a protein of about 25 to 30 Kd. In Escherichia coli and related bacteria, the cysG protein, which is involved in the biosynthesis of siroheme, is a multifunctional protein composed of a N-terminal domain, probably involved in transforming precorrin-2 into siroheme, and a C-terminal domain which has SUMT activity. The sequence of SUMT is related to that of a number of P. denitrificans and Salmonella typhimurium enzymes involved in the biosynthesis of cobalamin which also seem to be SAM-dependent methyltransferases. The similarity is especially strong with two of these enzymes: cobI/cbiL which encodes S-adenosyl-L-methionine--precorrin-2 methyltransferase and cobM/cbiF whose exact function is not known.
