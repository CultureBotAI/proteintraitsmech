identifier: InterPro:IPR030490
label: "Tissue inhibitor of metalloproteinase, conserved site"
definition: >-
  Tissue inhibitors of metalloproteinases (TIMP) are a family of proteins that can form complexes with extracellular matrix metalloproteinases (such as collagenases) and irreversibly inactivate them. TIMP's are proteins of about 200 amino acid residues, 12 of which are cysteines involved in disulfide bonds. The basic structure of such a type of inhibitor is shown in the following schematic representation: +-----------------------------+ +--------------+ **|** | | | CxCxCxxxxxxxxxxxxxxxxxCxxxxxxxxxCxxxxxxxCxCxCxCxCxxxxxCxxCxxx | | | | | | | | | +-----------------|-----------------+ +-+ +-----+ +---------------------+ 'C': conserved cysteine involved in a disulfide bond. This conserved site is found at the N-terminal extremity of these proteins, which includes three conserved cysteines.
