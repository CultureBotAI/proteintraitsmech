identifier: InterPro:IPR001949
label: NADH:ubiquinone oxidoreductase, 51kDa subunit, conserved site
definition: >-
  Among the many polypeptide subunits that make up complex I, there is one with a molecular weight of 51kDa (in mammals), which is the second largest subunit of complex I and is a component of the iron-sulphur (IP) fragment of the enzyme. It seems to bind to NAD, FMN, and a 2Fe-2S cluster. The 51kDa subunit and the bacterial hydrogenase alpha subunit contain three regions of sequence similarities. The first one most probably corresponds to the NAD-binding site, the second to the FMN-binding site, and the third one, which contains three cysteines, to the iron-sulphur binding region.
