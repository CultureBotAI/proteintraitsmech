identifier: InterPro:IPR047297
label: "Ion-transport regulator, FXYD motif"
definition: >-
  This entry represents the FXYD motif of a family of vertebrate small membrane proteins that are involved in the control of ion transport including Phospholemman (FXYD1) and FXYD domain-containing ion transport regulators FXYD2-8. This motif contains 35 invariant and conserved amino acid residues. Except for FXYD5, all these proteins are very small and their size range from 58 residues for FXYD2 to 95 for FXYD6. FXYD5 is longer (178 residues) due to a N-terminal extension. They all contain a single transmembrane domain. With the exception of FXYD2, they all seem to have a N-terminal signal peptide.
