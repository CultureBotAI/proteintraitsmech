identifier: InterPro:IPR028322
label: "Proline-rich nuclear receptor coactivator-like, proline rich region"
definition: >-
  This entry represents a conserved proline-rich region found in the Proline-rich nuclear receptor coactivator 1/2 (PNRC 1/2) and related eukaryotic proteins including Enhancer of mRNA-decapping protein 1/2 (Edc1/2). This region contains a conserved YAGxxF sequence motif at the beginning, known as 'activation motif', followed by Px[PA]xxxPxPxF motif, described as 'Dcp1 binding motif'. In Edc1, the latter interacts with the aromatic groove of Dcp1 EVH1 domain and thereby enhances the catalytic activity of the decapping enzyme. The recognition of this Edc1 motif by the Dcp1 EVH1 domain is reminiscent of the interactions that are observed between proline-rich sequences and, e.g., WW, SH3, and GYF domains. In all cases, the central motif in the proline-rich sequence contacts a surface exposed cluster of aromatic residues in the protein domain. Mutation in the YAGxxF motif results in loss of ability to activate the decapping complex. Proline-rich nuclear receptor coactivator 1 (PNRC1) and proline-rich nuclear receptor coactivator 2 (PNRC2) represent a new type of nuclear receptor co-regulatory proteins. PNRC1 may play a role in signal transduction. PNRC2 may be involved in nonsense-mediated mRNA decay (NMD). PNRC2 has been shown to play an important role in controlling the energy balance between energy storage and energy expenditure.
