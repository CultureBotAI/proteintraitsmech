identifier: InterPro:IPR018071
label: "Omega-atracotoxin, conserved site"
definition: >-
  This entry consists of several Hadronyche versuta (Blue mountains funnel-web spider) specific omega-atracotoxin proteins. Omega-Atracotoxin-Hv1a is an insect-specific neurotoxin whose phylogenetic specificity derives from its ability to antagonise insect, but not vertebrate, voltage-gated calcium channels. Two spatially proximal residues, Asn(27) and Arg(35), form a contiguous molecular surface that is essential for toxin activity. It has been proposed that this surface of the β-hairpin is a key site for interaction of the toxin with insect calcium channels. This entry represents the conserved site of Omega-atracotoxin.
