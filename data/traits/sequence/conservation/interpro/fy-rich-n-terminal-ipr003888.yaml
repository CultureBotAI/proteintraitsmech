identifier: InterPro:IPR003888
label: FY-rich, N-terminal
definition: >-
  The "FY-rich" domain N-terminal (FYRN) and "FY-rich" domain C-terminal (FYRC) sequence motifs are two poorly characterised phenylalanine/ tyrosine-rich regions of around 50 and 100 amino acids, respectively, that are found in a variety of chromatin-associated proteins. They are particularly common in histone H3K4 methyltransferases most notably in a family of proteins that includes human mixed lineage leukemia (MLL) and the Drosophila melanogaster protein trithorax. Both of these enzymes play a key role in the epigenetic regulation of gene expression during development, and the gene coding for MLL is frequently rearranged in infant and secondary therapy-related acute leukemias. They are also found in transforming growth factor beta regulator 1 (TBRG1), a growth inhibitory protein induced in cells undergoing arrest in response to DNA damage and transforming growth factor (TGF)-beta1. As TBRG1 has been shown to bind to both the tumor suppressor p14ARF and MDM2, a key regulator of p53, it is also known as nuclear interactor of ARF and MDM2 (NIAM). In most proteins, the FYRN and FYRC regions are closely juxtaposed, however, in MLL and its homologues they are far distant. To be fully active, MLL must be proteolytically processed by taspase1, which cleaves the protein between the FYRN and FYRC regions. The N-terminal and C-terminal fragments remain associated after proteolysis apparently as a result of an interaction between the FYRN and FYRC regions. How proteolytic processing regulates the activity of MLL is not known. Intriguingly, the FYRN and FYRC motifs of a second family of histone H3K4 methyltransferases, represented by MLL2 and MLL4 in humans and TRR in Drosophila melanogaster, are closely juxtaposed. FYRN and FYRC motifs are found in association with modules that c…
