identifier: InterPro:IPR001524
label: "Glycoside hydrolase, family 6, conserved site"
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 6 comprises enzymes with several known activities; endoglucanase ( ); cellobiohydrolase ( ). These enzymes were formerly known as cellulase family B. The 3D structure of the enzymatic core of cellobiohydrolase II (CBHII) from the fungus Trichoderma reesei reveals an α-β protein with a fold similar to the ubiquitous barrel topology first seen in triose phosphate isomerase. The active site of CBHII is located at the C-terminal end of a parallel β barrel, in an enclosed tunnel through which the cellulose threads. Two aspartic acid residues, located in the centre of the tunnel are the probable catalytic residues.
