identifier: InterPro:IPR018104
label: Translation initiation factor 1A (eIF-1A), conserved site
definition: >-
  Eukaryotic translation initiation factor A (eIF-1A) (formerly known as eiF-4C) is a protein that seems to be required for maximal rate of protein biosynthesis. It enhances ribosome dissociation into subunits and stabilises the binding of the initiator Met-tRNA to 40S ribosomal subunits. The archaea possess an eIF-1A homologue.
