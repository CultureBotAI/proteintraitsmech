identifier: InterPro:IPR022966
label: "Ribonuclease II/R, conserved site"
definition: >-
  This entry represents a conserved site for the ribonuclease II family. Proteins with this signature include characterised and related sequences to exoribonuclease II (RNase II) and ribonuclease R, a bacterial 3' --> 5' exoribonuclease homologous to RNase II.
