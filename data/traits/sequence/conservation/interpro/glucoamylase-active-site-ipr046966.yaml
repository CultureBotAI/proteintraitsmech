identifier: InterPro:IPR046966
label: "Glucoamylase, active site"
definition: >-
  Glucoamylase (GA) is an enzyme that catalyses the release of D-glucose from the non-reducing ends of starch and other oligo- or polysaccharides. Extensive studies of fungal GA have shown that three closely clustered acidic residues play a role in the catalytic mechanism of GA. The region that includes these residues is also conserved in a bacterial GA. This entry represents the GA active site.
