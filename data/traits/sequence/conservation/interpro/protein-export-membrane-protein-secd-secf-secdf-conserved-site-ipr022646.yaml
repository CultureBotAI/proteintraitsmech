identifier: InterPro:IPR022646
label: "Protein-export membrane protein SecD/SecF/SecDF, conserved site"
definition: >-
  Secretion across the inner membrane in some Gram-negative bacteria occurs via the preprotein translocase pathway. Proteins are produced in the cytoplasm as precursors, and require a chaperone subunit to direct them to the translocase component. From there, the mature proteins are either targeted to the outer membrane, or remain as periplasmic proteins. The translocase protein subunits are encoded on the bacterial chromosome. This entry represents a GG-containing domain found in the N-terminal region of prokaryotic SecD and SecF protein export membrane proteins. It is found in association with . SecD and SecF proteins are part of the multimeric protein export complex comprising SecA, D, E, F, G, Y, and YajC. SecD and SecF are required to maintain a proton motive force.
