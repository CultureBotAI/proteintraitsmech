identifier: InterPro:IPR053786
label: "LEPRxLL conserved site"
definition: >-
  This conserved site, which is about 24 amino acids long and contains the LEPRxLL motif, is found at the N-terminal of a group of bacterial repeat-filled giant proteins. Member proteins average over 8000 amino acids.
