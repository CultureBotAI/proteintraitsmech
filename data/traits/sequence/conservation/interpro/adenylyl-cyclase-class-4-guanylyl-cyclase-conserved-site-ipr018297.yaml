label: "Adenylyl cyclase class-4/guanylyl cyclase, conserved site"
definition: >-
  Guanylate cyclases ( ) catalyze the formation of cyclic GMP (cGMP) from GTP. cGMP acts as an intracellular messenger, activating cGMP-dependent kinases and regulating CGMP-sensitive ion channels. The role of cGMP as a second messenger in vascular smooth muscle relaxation and retinal photo-transduction is well established. Guanylate cyclase is found both in the soluble and particular fraction of eukaryotic cells. The soluble and plasma membrane-bound forms differ in structure, regulation and other properties. Most currently known plasma membrane-bound forms are receptors for small polypeptides. The topology of such proteins is the following: they have a N-terminal extracellular domain which acts as the ligand binding region, then a transmembrane domain, followed by a large cytoplasmic C-terminal region that can be subdivided into two domains: a protein kinase-like domain that appears important for proper signalling and a cyclase catalytic domain. This topology is schematically represented below. +-----------------------xxxxx----------------------+------------+ | Ligand-binding XXXXX Protein Kinase like | Cyclase | +-----------------------xxxxx----------------------+------------+ Extracellular Transmembrane Cytoplasmic The known guanylate cyclase receptors are: The sea-urchins receptors for speract and resact, which are small peptides that stimulate sperm motility and metabolism. The receptors for natriuretic peptides (ANF). Two forms of ANF receptors with guanylate cyclase activity are currently known: GC-A (or ANP-A) which seems specific to atrial natriuretic peptide (ANP), and GC-B (or ANP-B) which seems to be stimulated more effectively by brain natriuretic peptide (BNP) than by ANP. The receptor for Escherichia coli heat-stable enterotoxin (GC-C). The endogenous lig…
