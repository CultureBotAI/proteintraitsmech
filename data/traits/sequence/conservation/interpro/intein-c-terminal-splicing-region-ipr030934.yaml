identifier: InterPro:IPR030934
label: "Intein C-terminal splicing region"
definition: >-
  Inteins (for INternal proTEINs) are protein insertion sequences that are embedded in host protein sequences. They are post-translationally excised from the host protein by a self-catalytic protein splicing process, in which the intein sequence is precisely excised, and the flanking host protein sequences (N- and C-exteins) are religated to create a functional protein. Intein and protein splicing may be viewed as the protein equivalent of intron and RNA splicing, respectively. Inteins were initially discovered as translated intervening sequences that were present in the host gene but absent in homologous genes. Inteins occur in organisms spanning all three kingdoms of life (eubacteria, archaea and eukaryote). Although many inteins are in host proteins involved in nucleic acid metabolism, several inteins are located in metabolic enzymes, such as phosphoenolpyruvate synthase, anaerobic ribonucleoside triphosphate reductase, UDP-glucose dehydrogenase, ClpP protease/chaperone, vacuolar ATPase proton pump (VMA) and glutamine-fructose 6-phosphate transaminase. It should be noted that protein splicing can also occur in trans as in Synechocystis sp. PCC 6803, where the replicative DNA polymerase catalytic subunit (DnaE) is generated from two separate precursor fragments. Most inteins are bifunctional proteins mediating both protein splicing and DNA cleavage. The domain involved in splicing is formed by the two terminal splicing regions, which are separated by a small linker in mini-inteins or a homing endonuclease of 200-250 amino acids in larger inteins. The N-terminal splicing region spans the about 100 N-terminal amino acids and contains the conserved intein blocks A and B which are similar to the motifs found in the C-terminal autoprocessing domain of the hedgehog protein.…
