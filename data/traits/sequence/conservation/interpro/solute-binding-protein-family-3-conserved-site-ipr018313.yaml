label: "Solute-binding protein family 3, conserved site"
definition: >-
  Bacterial high affinity transport systems are involved in active transport of solutes across the cytoplasmic membrane. Most of the bacterial ABC (ATP-binding cassette) importers are composed of one or two transmembrane permease proteins, one or two nucleotide-binding proteins and a highly specific periplasmic solute-binding protein. In Gram-negative bacteria the solute-binding proteins are dissolved in the periplasm, while in archaea and Gram-positive bacteria, their solute-binding proteins are membrane-anchored lipoproteins. On the basis of sequence similarities, the vast majority of these solute-binding proteins can be grouped into eight families or clusters, which generally correlate with the nature of the solute bound. This entry represents a conserved site found in the extracellular solute-binding protein family 3 members from Gram-positive bacteria, Gram-negative bacteria and archaea. Familiy 3 members include: Histidine-binding protein (gene hisJ) of Escherichia coli and related bacteria. An homologous lipoprotein exists in Neisseria gonorrhoeae. Lysine/arginine/ornithine-binding proteins (LAO) (gene argT) of Escherichia coli and related bacteria are involved in the same transport system than hisJ. Both solute-binding proteins interact with a common membrane-bound receptor hisP of the binding protein dependent transport system HisQMP. Glutamine-binding proteins (gene glnH) of Escherichia coli and Bacillus stearothermophilus. Glutamate-binding protein (gene gluB) of Corynebacterium glutamicum. Arginine-binding proteins artI and artJ of Escherichia coli. Nopaline-binding protein (gene nocT) from Agrobacterium tumefaciens. Octopine-binding protein (gene occT) from Agrobacterium tumefaciens. Major cell-binding factor (CBF1) (gene: peb1A) from Campylobacter jejuni. B…
