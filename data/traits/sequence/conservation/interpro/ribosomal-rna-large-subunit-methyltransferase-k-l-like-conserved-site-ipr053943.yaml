identifier: InterPro:IPR053943
label: "Ribosomal RNA large subunit methyltransferase K/L-like, conserved site"
definition: >-
  This entry represents a conserved site found in ribosomal RNA large subunit methyltransferase K/L from Escherichia coli (RmlKL) and related proteins. RmlKL specifically methylates the guanine in positions 2445 and 2069 of 23S rRNA before its assembly into 50S subunits. This conserved site is defined by a D-P-[LIVMF]-C-G-[ST]-G-x(3)-[LI]-E conserved motif located within the methyltransferase domain.
