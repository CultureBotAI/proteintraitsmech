identifier: InterPro:IPR002204
label: "3-hydroxyisobutyrate dehydrogenase-related, conserved site"
definition: >-
  This entry identifies a conserved site in reductases/dehydrogenases. 3-hydroxyisobutyrate dehydrogenase ( ) catalyses the NAD-dependent, reversible oxidation of 3-hydroxbutyrate to methylmalonate. In eukaryotes, it is a homodimeric mitochondrial protein involved in valine catabolism. In Pseudomonas aeruginosa (gene mmsB), it is involved in the distal valine metabolic pathway. 2-hydroxy-3-oxopropionate reductase ( ) catalyses the NAP(P)H dependent reduction of 2-hydroxy-3-oxopropionate (tartronate semialdehyde) to D-glycerate. 6-phosphogluconate dehydrogenase ( ) catalyses the NADP-dependent decarboxylation of 6-phosphogluconate to D-ribulose 5-phosphate and CO 2 .
