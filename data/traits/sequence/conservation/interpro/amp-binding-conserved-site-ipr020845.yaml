identifier: InterPro:IPR020845
label: "AMP-binding, conserved site"
definition: >-
  It has been shown that a number of prokaryotic and eukaryotic enzymes which all probably act via an ATP-dependent covalent binding of AMP to their substrate, share a region of sequence similarity. These enzymes are: Insects luciferase (luciferin 4-monooxygenase) ( ). Luciferase produces light by catalysing the oxidation of luciferin in presence of ATP and molecular oxygen. Alpha-aminoadipate reductase ( ) from yeast (gene LYS2). This enzyme catalyses the activation of alpha-aminoadipate by ATP-dependent adenylation and the reduction of activated alpha-aminoadipate by NADPH. Acetate--CoA ligase ( ) (acetyl-CoA synthetase), an enzyme that catalyses the formation of acetyl-CoA from acetate and CoA. Long-chain-fatty-acid--CoA ligase ( ), an enzyme that activates long-chain fatty acids for both the synthesis of cellular lipids and their degradation via beta-oxidation. 4-coumarate--CoA ligase ( ) (4CL), a plant enzyme that catalyses the formation of 4-coumarate-CoA from 4-coumarate and coenzyme A; the branchpoint reactions between general phenylpropanoid metabolism and pathways leading to various specific end products. O-succinylbenzoic acid--CoA ligase ( ) (OSB-CoA synthetase) (gene menE), a bacterial enzyme involved in the biosynthesis of menaquinone (vitamin K2). 4-Chlorobenzoate--CoA ligase ( ) (4-CBA--CoA ligase), a Pseudomonas enzyme involved in the degradation of 4-CBA. Indoleacetate--lysine ligase ( ) (IAA-lysine synthetase), an enzyme from Pseudomonas syringae that converts indoleacetate to IAA-lysine. Bile acid-CoA ligase (gene baiB) from Eubacterium sp. (strain VPI 12708). This enzyme catalyses the ATP-dependent formation of a variety of C-24 bile acid-CoA. Crotonobetaine/carnitine-CoA ligase ( ) from Escherichia coli (gene caiC). L-(alpha-aminoadipyl)-L-cysteinyl…
