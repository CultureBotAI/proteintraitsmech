identifier: InterPro:IPR017900
label: "4Fe-4S ferredoxin, iron-sulphur binding, conserved site"
definition: >-
  This entry represents a conserved site of Fe-4S ferredoxin, iron-sulphur binding domain Ferredoxins are iron-sulphur proteins that mediate electron transfer in a range of metabolic reactions; they fall into several subgroups according to the nature of their iron-sulphur cluster(s). One group, originally found in bacteria, has been termed "bacterial-type", in which the active centre is a 4Fe-4S cluster. 4Fe-4S ferredoxins may in turn be subdivided into further groups, based on their sequence properties. Most contain at least one conserved domain, including four Cys residues that bind to a 4Fe-4S centre.
