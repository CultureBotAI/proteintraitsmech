identifier: InterPro:IPR011695
label: "Tash protein, PEST motif"
definition: >-
  The PEST motif is found in one or more copies in Tash AT-hook proteins from Theileria annulata. Tash proteins are transported to the host nucleus and are thought to be involved in pathogenesis. The PEST motif is often found in conjunction with the ( ), whose function is unknown. These repeats may be part of the PEST motif (a signal for rapid proteolytic degradation), though this is not proven. This motif is also found in other T. annulata proteins, which have no other known domains.
