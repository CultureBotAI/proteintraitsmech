identifier: InterPro:IPR019830
label: "Malate synthase, conserved site"
definition: >-
  Malate synthase ( ) catalyses the aldol condensation of glyoxylate with acetyl-CoA to form malate as part of the second step of the glyoxylate bypass and an alternative to the tricarboxylic acid cycle in bacteria, fungi and plants. Malate synthase has a TIM β/α-barrel fold. Malate synthase is a protein of 530 to 570 amino acids whose sequence is highly conserved across species. The signature pattern for this entry is to a very conserved region in the central section of the enzyme.
