label: Phosphoenolpyruvate carboxykinase (ATP), conserved site
definition: >-
  Phosphoenolpyruvate carboxykinase (ATP) ( ) (PEPCK) catalyses the formation of phosphoenolpyruvate by decarboxylation of oxaloacetate while hydrolysing ATP, a rate limiting step in gluconeogenesis (the biosynthesis of glucose).
