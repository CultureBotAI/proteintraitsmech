identifier: InterPro:IPR001295
label: "Dihydroorotate dehydrogenase, conserved site"
definition: >-
  Dihydroorotate dehydrogenase ( ) (DHOdehase) catalyses the fourth step in the de novo biosynthesis of pyrimidine, the conversion of dihydroorotate into orotate. DHOdehase is a ubiquitous FAD flavoprotein. In bacteria (gene pyrD), DHOdease is located on the inner side of the cytosolic membrane. In some yeasts, such as in Saccharomyces cerevisiae (gene URA1), it is a cytosolic protein while in other eukaryotes it is found in the mitochondria.
