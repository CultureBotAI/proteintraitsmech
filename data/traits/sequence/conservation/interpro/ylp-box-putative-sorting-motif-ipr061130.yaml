identifier: InterPro:IPR061130
label: "YLP-box putative sorting motif"
definition: >-
  The very short C-terminal protein sequence region described in this entry, is a putative protein-sorting signal, the YLP-box, whose hypothesised cognate sorting/anchoring partner remains unknown. Proteins ending with this sequence region average over 700 amino acids in length mainly from Chloroflexales and Thermoflexales.
