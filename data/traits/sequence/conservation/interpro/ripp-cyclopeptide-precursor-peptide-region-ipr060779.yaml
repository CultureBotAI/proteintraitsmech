identifier: InterPro:IPR060779
label: "RiPP cyclopeptide precursor peptide region"
definition: >-
  This entry represents the C-terminal precursor peptide region of fungal borosin biosynthetic proteins. Members of this family contain an N-terminal S-adenosylmethionine (SAM)-dependent α-N-methyltransferase domain . The methyltransferase domain iteratively methylates the backbone amide nitrogens of this precursor peptide in an N- to C-terminal direction. Following methylation, the modified precursor is proteolytically released and macrocyclised by a prolyl oligopeptidase (OphP) to yield the final cyclopeptide product. This "self-sacrificing" mechanism, where the modifying enzyme bears its own substrate, was first characterised in the biosynthesis of omphalotin A from Omphalotus olearius. The omphalotins are nematicidal cyclic dodecapeptides carrying up to nine backbone N-methylations. Related precursor sequences have been identified in other basidiomycetes including Lentinula edodes and Dendrothele bispora..
