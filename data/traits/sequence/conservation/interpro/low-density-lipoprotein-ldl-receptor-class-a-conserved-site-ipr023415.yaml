identifier: InterPro:IPR023415
label: "Low-density lipoprotein (LDL) receptor class A, conserved site"
definition: >-
  Low-density lipoprotein (LDL) receptors are the major cholesterol-carrying lipoproteins of plasma. Seven successive cysteine-rich repeats of about 40 amino acids are present in the N-terminal of this multidomain membrane protein. Similar domains have been found (see references in) in other extracellular and membrane proteins which are listed below: Vertebrate very low density lipoprotein (VLDL) receptor, which binds and transports VLDL. Its extracellular domain is composed of 8 LDLRA domains, 3 EGF-like domains and 6 LDL-receptor class B domains (LDLRB). Vertebrate low-density lipoprotein receptor-related protein 1 (LRP1) (reviewed in), which may act as a receptor for the endocytosis of extracellular ligands. LRP1 contains 31 LDLRA domains and 22 EGF-like domains. Vertebrate low-density lipoprotein receptor-related protein 2 (LRP2) (also known as gp330 or megalin). LRP2 contains 36 LDLRA domains and 17 EGF-like domains. A LRP-homologue from Caenorhabditis elegans, which contains 35 LDLRA domains and 17 EGF-like domains. Drosophila putative vitellogenin receptor, with 13 copies of LDLRA domains and 17 EGF-like repeats. Complement factor I, which is responsible for cleaving the alpha-chains of C4b and C3b. It consists of a FIMAC domain (Factor I/MAC proteins C6/C7), a scavenger receptor-like domain, 2 copies of LDLRA and a C-terminal serine protease domain. Complement components C6, C7, C8 and C9. They contain each one LDLRA domain. Perlecan, a large multidomain basement membrane heparan sulphate proteoglycan composed of 4 LDLRA domains, 3 LamB domains, 12 laminin EGF- like domains, 14-21 IG-like domains, 3 LamG domains, and 4 EGF-like domains. A similar but shorter proteoglycan (UNC52) is found in Caenorhabditis elegans which has 3 repeats of LDLRA. Invertebrate giant e…
