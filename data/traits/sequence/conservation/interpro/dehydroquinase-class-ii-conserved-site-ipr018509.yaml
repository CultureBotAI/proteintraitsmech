identifier: InterPro:IPR018509
label: "Dehydroquinase, class II, conserved site"
definition: >-
  3-dehydroquinate dehydratase ( ), or dehydroquinase, catalyzes the conversion of 3-dehydroquinate into 3-dehydroshikimate. It is the third step in the shikimate pathway for the biosynthesis of aromatic amino acids from chorismate. Two classes of dehydroquinases exist, known as types I and II. Class-II enzymes are homododecameric enzymes of about 17kDa. They are found in some bacteria such as actinomycetales and some fungi where they act in a catabolic pathway that allows the use of quinic acid as a carbon source. This conserved signature pattern is located in the N-terminal region.
