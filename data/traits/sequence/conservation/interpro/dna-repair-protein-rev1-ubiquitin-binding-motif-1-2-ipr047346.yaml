identifier: InterPro:IPR047346
label: "DNA repair protein REV1, ubiquitin-binding motif 1/2"
definition: >-
  REV1 is a DNA damage tolerance protein that contains two ubiquitin-binding motifs (UBM1 and UBM2) that acts as a translesion synthesis (TLS) DNA polymerase and may also recruit other TLS polymerases to the site of DNA damage; in that process the UBMs are essential for REV1 function, triggering TLS activation via recognition of ubiquitin moieties in PCNA, the proliferating cell nuclear antigen. From structural studies, it has been determined that REV1 UBM2 but not UBM1 is required for DNA damage tolerance. This entry represents both UBMs from REV1.
