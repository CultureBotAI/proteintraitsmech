identifier: InterPro:IPR026428
label: "VPXXXP-CTERM protein-sorting motif"
definition: >-
  This entry represents a 24-residue motif located at the C-terminal of archaeal proteins, functioning as a protein-sorting signal. It is characterised by invariant N-terminal Val-Pro-(x)-Pro residues and serves as a target for archaeosortase B, a protein-processing enzyme involved in C-terminal protein modification. This motif has been identified in multiple members from Methanohalophilus mahii DSM 5219 and Methanohalobium evestigatum Z-7303, where it resembles other C-terminal sorting signals such as PEP-CTERM, PEF-CTERM, and PGF-CTERM. Proteins bearing this motif co-cluster with a variant form of the exosortase/archaeosortase family and are thought to represent a specialised secondary sorting system in these species.
