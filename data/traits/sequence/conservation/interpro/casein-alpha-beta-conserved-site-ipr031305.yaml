identifier: InterPro:IPR031305
label: "Casein alpha/beta, conserved site"
definition: >-
  Caseins are the major protein constituent of milk. Caseins can be classified into two families; the first consists of the kappa-caseins, and the second groups the alpha-s1, alpha-s2, and beta-caseins. The alpha/beta caseins are a rapidly diverging family of proteins. However two regions are conserved: a cluster of phosphorylated serine residues and the signal sequence. This conserved site is based on the last eight residues of the signal sequence.
