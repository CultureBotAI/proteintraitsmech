identifier: InterPro:IPR018146
label: Glyoxalase I, conserved site
definition: >-
  Glyoxalase I (lactoylglutathione lyase) catalyzes the first step of the glyoxal pathway in the following reaction: glutathione + methylglyoxal = (R)-S-lactoylglutathione S-lactoylglutathione is then converted by glyoxalase II to lactic acid. Glyoxalase I is a ubiquitous enzyme which binds one mole of zinc per subunit. The bacterial and yeast enzymes are monomeric while the mammalian one is homodimeric. The sequence of glyoxalase I is well conserved. In bacteria and mammals the enzyme is a protein of about 130 to 180 residues while in fungi it is about twice as long. In these organisms the enzyme is built out of the tandem repeat of a homologous domain.
