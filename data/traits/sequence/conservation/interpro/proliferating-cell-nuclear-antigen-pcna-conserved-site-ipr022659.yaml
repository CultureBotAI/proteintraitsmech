identifier: InterPro:IPR022659
label: "Proliferating cell nuclear antigen, PCNA, conserved site"
definition: >-
  This entry represents two conserved regions located in the N-terminal section. The second one has been proposed to bind DNA. Proliferating cell nuclear antigen (PCNA), or cyclin, is a non-histone acidic nuclear protein that plays a key role in the control of eukaryotic DNA replication. It acts as a co-factor for DNA polymerase delta, which is responsible for leading strand DNA replication. The sequence of PCNA is well conserved between plants and animals, indicating a strong selective pressure for structure conservation, and suggesting that this type of DNA replication mechanism is conserved throughout eukaryotes. In Saccharomyces cerevisiae (Baker's yeast), POL30, is associated with polymerase III, the yeast analog of polymerase delta. Homologues of PCNA have also been identified in the archaea (known as DNA polymerase sliding clamp) and in Paramecium bursaria Chlorella virus 1 (PBCV-1) and in nuclear polyhedrosis viruses.
