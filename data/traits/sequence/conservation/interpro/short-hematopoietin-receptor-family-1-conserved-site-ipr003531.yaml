identifier: InterPro:IPR003531
label: Short hematopoietin receptor, family 1, conserved site
definition: >-
  A number of receptors for lymphokines, hematopoietic growth factors and growth hormone-related molecules have been found to share a common binding domain. These receptors are designated as hematopoietin receptors and the corresponding ligands as hematopoietins. Further, hematopoietins have been subdivided into two major structural groups: Large/long and small/short hematopoietins. One subset of individual receptor chains that are part of receptor complexes for small hematopoietins are structurally related such that their extracellular parts strictly contain the 200 amino-acids hematopoietin domain (duplicated in IL-3/-5/GM-CSF beta chain receptors KH97/AIC2B and AIC2A). They define a structural subgroup containing the following chains: Interleukin-2 receptor beta chain (IL2RB), Interleukin-2 receptor common gamma chain (IL2RG), Interleukin-3 receptor beta chain (AIC2A), Interleukin-3/-5/GM-CSF receptor common beta chain (KH97/AIC2B), Interleukin-4 receptor alpha chain (IL4RA), Interleukin-7 receptor alpha chain (IL7RA), Interleukin-9 receptor alpha chain (IL9RA).
