identifier: InterPro:IPR018312
label: Chromosomal replication control, initiator DnaA, conserved site
definition: >-
  The bacterial dnaA protein plays an important role in initiating and regulating chromosomal replication. DnaA is an ATP- and DNA-binding protein. It binds specifically to 9 bp nucleotide repeats known as dnaA boxes which are found in the chromosome origin of replication (oriC). DnaA is a protein of about 50kDa that contains two conserved regions: the first is located in the N-terminal half and corresponds to the ATP-binding domain, the second is located in the C-terminal half and could be involved in DNA-binding. The protein may also bind the RNA polymerase beta subunit, the dnaB and dnaZ proteins, and the groE gene products (chaperonins). The signature pattern in this entry is located in the most conserved part of the putative DNA-binding domain.
