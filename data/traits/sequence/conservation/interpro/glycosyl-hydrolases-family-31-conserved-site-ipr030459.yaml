identifier: InterPro:IPR030459
label: "Glycosyl hydrolases family 31, conserved site"
definition: >-
  This entry represents a conserved site in proteins of the glycoside hydrolase family 31. It contains two conserved cysteines. Glycoside hydrolase family 31 comprises enzymes with several known activities; alpha-glucosidase ( ), alpha-galactosidase ( ); glucoamylase ( ), sucrase-isomaltase ( ); isomaltase ( ); alpha-xylosidase ( ); alpha-glucan lyase ( ).
