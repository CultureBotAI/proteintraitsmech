identifier: InterPro:IPR011062
label: "Contryphan, conserved site"
definition: >-
  Contryphans are a family of short disulphide constrained peptides isolated from various species of cone shell. They constitute a group of conopeptides that are known to contain an unusual density of post-translational modifications including tryptophan bromination, amidation of the C-terminal residue, leucine and tryptophan isomerisation, proline hydroxylation and glutamic acid γ-carboxylation.
