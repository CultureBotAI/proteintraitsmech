identifier: InterPro:IPR000374
label: Phosphatidate cytidylyltransferase site
definition: >-
  This entry represents a conserved region located at the C-terminal part of Phosphatidate cytidylyltransferases. Phosphatidate cytidylyltransferase (also known as CDP- diacylglycerol synthase) (CDS) is the enzyme that catalyses the synthesis of CDP-diacylglycerol from CTP and phosphatidate (PA): CTP + phosphatidate = diphosphate + CDP-diacylglycerol CDP-diacylglycerol is an important branch point intermediate in both prokaryotic and eukaryotic organisms. CDS is a membrane-bound enzyme.
