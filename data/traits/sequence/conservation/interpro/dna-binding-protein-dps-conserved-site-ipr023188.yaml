identifier: InterPro:IPR023188
label: DNA-binding protein Dps, conserved site
definition: >-
  Escherichia coli protein Dps is a DNA-binding protein, synthesized during prolonged starvation, that seems to protect DNA from oxidative damage. Dps binds DNA without any apparent sequence specificity. It is a protein of about 19 Kd that associates into a complex of 12 subunits forming two stacked hexameric rings. Proteins similar to Dps have been found in other bacteria: Bacillus subtilis protein MrgA. Antigen TpF1/TyF1 from Treponema pallidum. Haemophilus ducreyi fine tangled pili major subunit (gene ftpA). Helicobacter pylori neutrophil-activating protein A (gene napA). Listeria innocua non-heme iron-containing ferritin. Synechococcus elongatus (strain PCC 7942) (Anacystis nidulans R2) nutrient-stress induced DNA binding protein (gene dpsA). A low-temperature induced protein from Anabaena variabilis. Haemophilus influenzae hypothetical protein HI1349. Synechocystis sp. (strain PCC 6803) hypothetical protein Slr1894. A hypothetical protein encoded in the 5' region of a gene coding for a bromoperoxidase, in plasmid pOP2621 of Streptomyces aureofaciens. All these proteins share a conserved region of about 50 residues in their central region. This entry corresponds to two conserved sites derived from both extremities of that region.
