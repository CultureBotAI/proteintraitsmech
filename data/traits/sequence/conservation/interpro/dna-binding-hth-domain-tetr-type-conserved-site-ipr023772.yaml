identifier: InterPro:IPR023772
label: "DNA-binding HTH domain, TetR-type, conserved site"
definition: >-
  The TetR-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 60 residues present in the TetR family of prokaryotic transcription regulators. Several of these bacterial regulators are repressors of genes and operons for membrane transport and cell envelope permeability. The family is named after the TetRacycline repressor TetR of enterobacteria found on Tn10 and other transposons and plasmids. The 'helix-turn-helix' DNA-binding motif is located in the N-terminal extremity of these transcriptional regulators. The C-terminal part of TetR-type regulators contains several regions that can be involved in (1) binding of inducers, which can be drugs, and (2) oligomerisation. The TetR and camR proteins are dimers, whilst qacR binds its operator as a pair of dimers and ethR seems to bind as an octamer. TetR-type transcription regulators include several bacterial regulators of drug export systems that protect pathogenic bacteria against antibiotics, antiseptics, disinfectants and host-encoded antimicrobials.
