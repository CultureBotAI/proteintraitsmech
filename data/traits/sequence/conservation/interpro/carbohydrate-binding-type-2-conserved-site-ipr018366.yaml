identifier: InterPro:IPR018366
label: Carbohydrate-binding type-2, conserved site
definition: >-
  The microbial degradation of cellulose and xylans requires several types of enzyme such as endoglucanases, cellobiohydrolases (exoglucanases), or xylanases. Structurally, cellulases and xylanases generally consist of a catalytic domain joined to a cellulose-binding domain (CBD) by a short linker sequence rich in proline and/or hydroxy-amino acids. The CBD domain is found either at the N-terminal or at the C-terminal extremity of these enzymes. As it is shown in the following schematic representation, there are two conserved cysteines in this CBD domain - one at each extremity of the domain - which have been shown to be involved in a disulphide bond. There are also four conserved tryptophan, two are involved in cellulose binding. The CBD of a number of bacterial cellulases has been shown to consist of about 105 amino acid residues. +-------------------------------------------------+ | | xCxxxxWxxxxxNxxxWxxxxxxxWxxxxxxxxWNxxxxxGxxxxxxxxxxCx 'C': conserved cysteine involved in a disulphide bond.
