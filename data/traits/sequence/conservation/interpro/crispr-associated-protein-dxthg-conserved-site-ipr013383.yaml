identifier: InterPro:IPR013383
label: "CRISPR-associated protein DxTHG, conserved site"
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This entry represents a conserved site found in two otherwise substantially different families of Cas proteins. This site includes the motif [VIL]-D-x-[ST]-H-[GS].
