identifier: InterPro:IPR001999
label: Osteonectin-like, conserved site
definition: >-
  The osteonectin like domain, of unknown function, is found in extracellular proteins strongly expressed in tissues undergoing morphogenesis. It is a 240 amino acids domain, highly conserved, localised in the C-terminal part of the protein. This domain has a N-terminal section of about 90 residues that contains 11 conserved cysteines, a central section that is probably in an α-helical conformation, and a C-terminal section that contains two EF-hand type calcium-binding regions and three conserved cysteines. This topology is schematically represented below. +----+ | | xCxCxCxxCCxCxxxCxxCxCxxxxxCxCxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx(Ca)xCxxC(Ca)Cxx C: conserved cysteines involved in disulphide bonds. Ca: EF-hand region see( ).
