identifier: InterPro:IPR057484
label: "Diatom pyrenoid component 1, conserved motif"
definition: >-
  DPC1 is localised at the pyrenoid matrix/stroma interface in diatoms. This entry represents a conserved motif found in DPC1 and its homologues. The function is currently unknown but could be a short linear motif involved in a protein-protein interaction.
