identifier: InterPro:IPR013139
label: "Omega-atracotoxin, conserved site-2"
definition: >-
  Omega-atracotoxins (ACTX) form a family of neurotoxins that block insect but not vertebrate voltage-gated calcium channels. Omega-ACTXs are environmentally benign, insect-specific toxins that represent excellent leads for the development of new pesticides. Omega-ACTXs comprise a disulphide-rich region that has a [C-C-CC-C-C] arrangement and possess a Knottin scaffold.
