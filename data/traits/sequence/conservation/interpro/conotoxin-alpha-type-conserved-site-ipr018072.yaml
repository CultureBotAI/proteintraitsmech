identifier: InterPro:IPR018072
label: "Conotoxin, alpha-type, conserved site"
definition: >-
  Conotoxin consists of several alpha conotoxin precursor proteins from a number of Conus species. Cone snail toxins, conotoxins, are small peptides with disulphide connectivity, that target ion-channels or G-protein coupled receptors. Based on the number and pattern of disulphide bonds and biological activities, conotoxins can be classified into several families. Alpha-conotoxins are neurotoxins from the venom of fish-hunting cone snails that block nicotinic acetylcholine receptors (nAChRs). Omega, delta and kappa families of conotoxins have a knottin or inhibitor cystine knot scaffold. The knottin scaffold is a very special disulphide through disulphide knot, in which the III-VI disulphide bond crosses the macrocycle formed by two other disulphide bonds (I-IV and II-V) and the interconnecting backbone segments, where I-VI indicates the six cysteine residues starting from the N terminus.
