identifier: InterPro:IPR010133
label: "Bacteriocin-type signal sequence"
definition: >-
  Bacteriocins are bacterial peptide products toxic to closely related bacteria. This entry represents a short N-terminal region up to the GG cleavage motif. Processing, to remove this bacteriocin leader peptide, occurs together with export by an ABC transporter.
