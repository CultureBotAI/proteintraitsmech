identifier: InterPro:IPR018067
label: "Protein phosphatase 2A regulatory subunit PR55, conserved site"
definition: >-
  Protein phosphatase 2A (PP2A) is a serine/threonine phosphatase implicated in many cellular processes, including the regulation of metabolic enzymes and proteins involved in signal transduction. PP2A is a trimer composed of a 36kDa catalytic subunit, a 65kDa regulatory subunit (subunit A) and a variable third subunit (subunit B). One form of the third subunit is a 55kDa protein (PR55), which exists in Drosophila melanogaster and yeast, and has up to three forms in mammals. PR55 may act as a substrate recognition unit, or may help to target the enzyme to the correct subcellular location. This entry represents conserved regions found in the N-terminal region and the centre of these proteins.
