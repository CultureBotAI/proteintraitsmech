identifier: InterPro:IPR010917
label: "TonB-dependent receptor, conserved site"
definition: >-
  This conserved site is found at the C terminus of outer membrane receptors which interact with the TonB. In Escherichia coli the TonB interacts with outer membrane receptor proteins that carry out high-affinity binding and energy-dependent uptake of specific substrates into the periplasmic space. These substrates are either poorly permeable through the porin channels or are encountered at very low concentrations. In the absence of TonB these receptors bind their substrates but do not carry out active transport. The TonB protein also interacts with some colicins.
