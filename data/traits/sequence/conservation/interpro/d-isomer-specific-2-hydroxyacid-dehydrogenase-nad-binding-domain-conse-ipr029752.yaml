identifier: InterPro:IPR029752
label: "D-isomer specific 2-hydroxyacid dehydrogenase, NAD-binding domain conserved site 1"
definition: >-
  A number of NAD-dependent 2-hydroxyacid dehydrogenases which seem to be specific for the D-isomer of their substrate have been shown to be functionally and structurally related. All these enzymes have similar enzymatic activities and are structurally related. This is a glycine-rich conserved site located in the central section of these enzymes, which probably corresponds to the NAD-binding domain.
