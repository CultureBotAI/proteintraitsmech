identifier: InterPro:IPR058074
label: "Bacteriocin-like conserved region"
definition: >-
  The sequence region that defines this family is found predominantly in the genus Chryseobacterium, consistently located at the N terminus. It terminates with a Gly-Gly (or occasionally Gly-Ala) motif, beyond which the sequences, while typically rich in cysteine, exhibit considerable diversity. This pattern is highly characteristic of bacteriocin leader peptides. Some members of this family are located near genes encoding C39 family Gly-Gly peptidase domain-containing transporters, lantibiotic dehydratases, and related proteins.
