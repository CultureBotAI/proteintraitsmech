identifier: InterPro:IPR056407
label: "CSLinker motif"
definition: >-
  The CSLinker motif is found in the pyrenoid linker protein from Chlorella sorokiniana. It binds to the large subunit of Rubisco (RbcL) and is involved in phase separation of Rubisco in the pyrenoid, a sub-compartment of the chloroplast that is part of the CO2-concentrating mechanism in algae. The motif consists of an α-helical region of approximately 10 residues that interacts with the N-terminal region of RbcL via two salt bridges and hydrophobic interactions. The key residues involved in binding are highly conserved. CSLinker is able to phase separate Rubisco from various species across the green lineage, including some plants, demonstrating its potential for engineering pyrenoids in crop plants to enhance CO2 fixation.
