identifier: InterPro:IPR017954
label: "Lipid-binding serum glycoprotein, conserved site"
definition: >-
  This entry represents a conserved sequence region found in the N-terminal domain of several lipid-binding serum glycoproteins. The N- and C-terminal domains of these proteins share a similar two-layer α/β structure, but they show little sequence identity. Proteins containing this N-terminal domain include: Bactericidal permeability-increasing protein (BPI) Lipopolysaccharide-binding protein (LBP) Cholesteryl ester transfer protein (CETP) Phospholipid transfer protein (PLTP) Palate, lung and nasal epithelium carcinoma-associated protein (PLUNC) Bactericidal permeability-increasing protein (BPI) is a potent antimicrobial protein of 456 residues that binds to and neutralises lipopolysaccharides from the outer membrane of Gram-negative bacteria. BPI contains two domains that adopt the same structural fold, even though they have little sequence similarity.
