identifier: InterPro:IPR024607
label: "Sulfatase, conserved site"
definition: >-
  Sulphatases are enzymes that hydrolyse various sulphate esters. The sequence of different types of sulphatases are available and have shown to be structurally related; these include: arylsulphatase A (ASA), a lysosomal enzyme which hydrolyses cerebroside sulphate; arylsulphatase B (ASB), which hydrolyses the sulphate ester group from N-acetylgalactosamine 4-sulphate residues of dermatan sulphate; arylsulphatase C (ASD) and E (ASE); steryl-sulphatase (STS), a membrane bound microsomal enzyme which hydrolyses 3-beta-hydroxy steroid sulphates; iduronate 2-sulphatase precursor (IDS), a lysosomal enzyme that hydrolyses the 2-sulphate groups from non-reducing-terminal iduronic acid residues in dermatan sulphate and heparan sulphate; N-acetylgalactosamine-6-sulphatase , which hydrolyses the 6-sulphate groups of the N-acetyl-d-galactosamine 6-sulphate units of chondroitin sulphate and the D-galactose 6-sulphate units of keratan sulphate; glucosamine-6-sulphatase (G6S), which hydrolyses the N-acetyl-D-glucosamine 6-sulphate units of heparan sulphate and keratan sulphate; N-sulphoglucosamine sulphohydrolase (sulphamidase), the lysosomal enzyme that catalyses the hydrolysis of N-sulpho-d-glucosamine into glucosamine and sulphate; sea urchin embryo arylsulphatase ; green algae arylsulphatase , which plays an important role in the mineralisation of sulphates; and arylsulphatase from Escherichia coli (aslA), Klebsiella aerogenes (gene atsA) and Pseudomonas aeruginosa (gene atsA). This entry represents two conserved sites for the sulphatase family located in the N-terminal region. The SULPHATASE_1 site contains the conserved arginine which could be implicated in the catalytic mechanism; it is located four residues after a position that, in eukaryotic sulphatases, is a conserved cyste…
