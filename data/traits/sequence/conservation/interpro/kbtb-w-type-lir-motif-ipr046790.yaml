identifier: InterPro:IPR046790
label: "KBTB, W-type LIR motif"
definition: >-
  LC3 Interacting Regions (LIRs), also known as ATG8-interacting motifs (AIMs), are short-linear motifs (SLiMs) of autophagy receptors and adaptor proteins that facilitates the selective recruitment of autophagy substrates to the autophagosome. ATG8 proteins are highly conserved in eukaryotes and play a key role in selective autophagy as they recognise and bind different autophagy receptors and adaptors containing a specific class of SLiMs. LIRs are characterised by degenerated sequences with a four-residue core central sequence involved in ATG8-binding, with the W/Y/FxxL/I/V pattern. Based on the aromatic amino acid in position 1 they can be classified into W-type, Y-type and F-type. This entry represents the W-type LIR motif from Kelch repeat and BTB domain-containing proteins (KBTBs), characterised by the core LIR sequence WVxV.
