identifier: InterPro:IPR018084
label: "Hok/gef cell toxic protein, conserved site"
definition: >-
  The hok/gef family of Gram-negative bacterial proteins are toxic to cells when over-expressed, killing the cells from within by interfering with a vital function in the cell membrane. Some family members (flm) increase the stability of unstable RNA, some (pnd) induce the degradation of stable RNA at higher than optimum growth temperatures, amongst others, affect the release of cellular magnesium by membrane alterations. The proteins are short (50-70 residues), consisting of an N-terminal hydrophobic (possibly membrane spanning) domain, and a C-terminal periplasmic region, which contains the toxic domain. The C-terminal region contains a conserved cysteine residue that mediates homo-dimerisation in the gef protein, although dimerisation is not necessary for the toxic effect. This entry represents a conserved region found within these proteins.
