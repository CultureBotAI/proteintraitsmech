identifier: InterPro:IPR007166
label: "Class III signal peptide motif"
definition: >-
  This entry represents the class III signal peptide motif QXSXEXXXL found at the N-terminal in major and minor structural pili proteins in archaea. The Q residue is the +1 residue of the signal peptidase cleavage site. Two proteins containing this motif are cleaved by a type IV pilin-like signal peptidase. The archaeal flagellum is the best-studied cell surface organelle in the domain Archaea; it resembles the bacterial type IV pilus system while also possessing certain archaeon-specific traits. It is usually composed of multiple flagellin subunits. The pili are composed mainly of glycoprotein subunits (major and minor structural pili proteins) with apparent molecular masses of 17 and 15 kDa, which are essential for pili formation, with the exception of EpdA which is not essential for pili formation.
