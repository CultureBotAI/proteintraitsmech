identifier: InterPro:IPR033138
label: "Multicopper oxidases, conserved site"
definition: >-
  Multicopper oxidases are enzymes that possess three spectroscopically different copper centres. These centres are called: type 1 (or blue), type 2 (or normal) and type 3 (or coupled binuclear). The enzymes that belong to this family include: Laccase (EC 1.10.3.2) (urishiol oxidase), an enzyme found in fungi and plants, which oxidizes many different types of phenols and diamines. L-ascorbate oxidase (EC 1.10.3.3), a higher plant enzyme. Ceruloplasmin (EC 1.16.3.1) (ferroxidase), a protein found in the serum of mammals and birds, which oxidizes a great variety of inorganic and organic substances. Structurally ceruloplasmin exhibits internal sequence homology, and seem to have evolved from the triplication of a copper-binding domain similar to that found in laccase and ascorbate oxidase. In addition to the above enzymes there are a number of proteins which, on the basis of sequence similarities, can be said to belong to this family. These proteins are: Copper resistance protein A (copA) from a plasmid in Pseudomonas syringae. This protein seems to be involved in the resistance of the microbial host to copper. Blood coagulation factor V (Fa V). Blood coagulation factor VIII (Fa VIII). Yeast FET3, which is required for ferrous iron uptake. Yeast hypothetical protein YFL041w and SpAC1F7.08, the fission yeast homologue. Factors V and VIII act as cofactors in blood coagulation and are structurally similar. Their sequence consists of a triplicated A domain, a B domain and a duplicated C domain; in the following order: A-A-B-A-C-C. The A-type domain is related to the multicopper oxidases. This entry is drawn from a conserved region, which in ascorbate oxidase, laccase, in the third domain of ceruloplasmin, and in copA, contains five residues that are known to be involved in the…
