identifier: InterPro:IPR001307
label: Thiosulphate sulfurtransferase, conserved site
definition: >-
  Synonym(s): Rhodanese Thiosulphate sulphurtransferase ( ) is an enzyme which catalyses the transfer of the sulphane atom of thiosulphate to cyanide, to form sulphite and thiocyanate. In vertebrates, rhodanese is a mitochondrial enzyme that is involved in forming iron-sulphur complexes and cyanide detoxification. A cysteine residue takes part in the catalytic mechanism. Some bacterial proteins may also express sulphotransferase activity. These include, SseA from Mycobacterium leprae and Escherichia coli, Azotobacter vinelandii rhdA, Saccharopolyspora erythraea cysA and Synechococcus sp. (strain PCC 7942) rhdA.
