identifier: InterPro:IPR049059
label: "NAD-glutamate dehydrogenase, helical motif 1"
definition: >-
  This entry represents the first helical motif (HM1) found in a group of NAD-specific glutamate dehydrogenases. Glutamate dehydrogenases (GDHs) are a broadly distributed group of enzymes that catalyse the reversible oxidative deamination of glutamate to ketoglutarate and ammonia. The structure of GDH from Mycobacterium smegmatis revealed that it has a long N- and C-terminal segments flanking the catalytic core, comprising several domains. The flexible N-terminal domain comprises ACT-like and PAS-type domains which could act as metabolic sensors for allosteric regulation. It also contains three α-helical motifs (HM1-3).
