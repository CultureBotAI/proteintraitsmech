identifier: InterPro:IPR019741
label: "Galactokinase, conserved site"
definition: >-
  This entry represents a conserved signature pattern located in the N-terminal domain of galactokinases. Galactokinase catalyses the first reaction in the galactose metabolism pathway, the ATP-dependent phosphorylation of galactose, yielding galactose-1-phosphate. Deficiency in this enzyme results in the disease galactosemia, which is responsible for the formation of cataracts in newborn babies, and is possibly responsible for presenile cataracts in adults. In yeast, the GAL3 gene product is required for the GAL4-mediated induction of other enzymes involved in galactose metabolism. The induction of GAL1 production then reinforces this process, increasing the expression of other galactose-inducible genes. GAL3 has been shown to be similar to the GAL1 protein.
