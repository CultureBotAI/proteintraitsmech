identifier: InterPro:IPR022657
label: "Orn/DAP/Arg decarboxylase 2, conserved site"
definition: >-
  These enzymes are collectively known as group IV decarboxylases. Pyridoxal-dependent decarboxylases acting on ornithine, lysine, arginine and related substrates can be classified into two different families on the basis of sequence similarities. Members of this family while most probably evolutionary related, do not share extensive regions of sequence similarities. This conserved site contains a stretch of three consecutive glycine residues and has been proposed to be part of a substrate-binding region.
