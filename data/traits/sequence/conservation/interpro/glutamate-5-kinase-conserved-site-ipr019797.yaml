identifier: InterPro:IPR019797
label: Glutamate 5-kinase, conserved site
definition: >-
  Glutamate 5-kinase (gamma-glutamyl kinase) (GK) is the enzyme that catalyzes the first step in the biosynthesis of proline from glutamate, the ATP-dependent phosphorylation of L-glutamate into L-glutamate 5-phosphate. In eubacteria (gene proB) and yeast (gene PRO1), GK is a monofunctional protein, while in plants and mammals, it is a bifunctional enzyme (P5CS) that consists of two domains: a N-terminal GK domain and a C-terminal gamma- glutamyl phosphate reductase domain. This entry represents a highly conserved glycine-and alanine- rich region located in the central section of these enzymes.
