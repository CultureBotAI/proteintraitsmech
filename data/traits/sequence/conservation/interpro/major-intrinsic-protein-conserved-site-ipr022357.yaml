identifier: InterPro:IPR022357
label: "Major intrinsic protein, conserved site"
definition: >-
  This entry represents a conserved region which is located in the cytoplasmic loop between the second and third transmembrane regions of MIP family members. The major intrinsic protein (MIP) family is large and diverse, possessing over 100 members that form transmembrane channels. These channel proteins function in water, small carbohydrate (e.g., glycerol), urea, NH3, CO2 and possibly ion transport, by an energy independent mechanism. They are found ubiquitously in bacteria, archaea and eukaryotes. The MIP family contains two major groups of channels: aquaporins and glycerol facilitators. The known aquaporins cluster loosely together as do the known glycerol facilitators. MIP family proteins are believed to form aqueous pores that selectively allow passive transport of their solute(s) across the membrane with minimal apparent recognition. Aquaporins selectively transport water (but not glycerol) while glycerol facilitators selectively transport glycerol but not water. Some aquaporins can transport NH3 and CO2. Glycerol facilitators function as solute nonspecific channels, and may transport glycerol, dihydroxyacetone, propanediol, urea and other small neutral molecules in physiologically important processes. Some members of the family, including the yeast FPS protein and tobacco NtTIPA may transport both water and small solutes.
