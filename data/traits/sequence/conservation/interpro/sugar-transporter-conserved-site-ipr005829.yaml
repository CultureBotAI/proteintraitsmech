identifier: InterPro:IPR005829
label: Sugar transporter, conserved site
definition: >-
  This entry represents two conserved sites. The first is centered on a G-R-[KR] motif. The second is based on a number of conserved residues which are located at the end of the fourth transmembrane segment and in the short loop region between the fourth and fifth segments. The sugar transporters belong to a superfamily of membrane proteins responsible for the binding and transport of various carbohydrates, organic alcohols, and acids in a wide range of prokaryotic and eukaryotic organisms. These integral membrane proteins are predicted to comprise twelve membrane spanning domains. It is likely that the transporters have evolved from an ancient protein present in living organisms before the divergence into prokaryotes and eukaryotes. In mammals, these proteins are expressed in a number of organs.
