identifier: InterPro:IPR023795
label: "Serpin, conserved site"
definition: >-
  This entry represents a conserved site for the Serpin family of proteins, centred on a well conserved Pro-Phe sequence which is found ten to fifteen residues on the C-terminal side of the reactive bond. Serpins (SERine Proteinase INhibitors) belong to MEROPS inhibitor family I4, clan ID. Most serpin family members are indeed serine protease inhibitors, but several have additional cross-class inhibition functions and inhibit cysteine protease family members such as the caspases and cathepsins. Others, such as ovalbumin, are incapable of protease inhibition and serve other functions.
