identifier: InterPro:IPR064115
label: "Cytosol aminopeptidase-like, conserved site"
definition: >-
  This entry includes a group of metallopeptidases that belong to the MEROPS peptidase family M17 (leucyl aminopeptidase family, clan MF), such as leucyl aminopeptidase (LAP), also known as Cytosol aminopeptidase from mammals. Cytosol aminopeptidase is an eukaryotic cytosolic zinc-dependent exopeptidase that catalyses the removal of unsubstituted amino acid residues from the N terminus of proteins. This enzyme is often known as leucine aminopeptidase but has been shown to be identical with prolyl aminopeptidase. Cytosol aminopeptidase is a hexamer of identical chains, each of which binds two zinc ions. Cytosol aminopeptidase is highly similar to Escherichia coli pepA, a manganese dependent aminopeptidase. Residues involved in zinc ion-binding in the mammalian enzyme are absolutely conserved in pepA where they presumably bind manganese. Most bacterial species contain a pepA-type enzyme. This entry represents a perfectly conserved octapeptide which contains two residues involved in binding metal ions: an aspartate and a glutamate.
