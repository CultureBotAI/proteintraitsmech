identifier: InterPro:IPR027310
label: "Profilin conserved site"
definition: >-
  Profilin is a small eukaryotic protein that binds to monomeric actin (G-actin) in a 1:1 ratio thus preventing the polymerisation of actin into filaments (F-actin). It can also, in certain circumstance promotes actin polymerisation. Profilin also binds to polyphosphoinositides such as PIP2. Overall sequence similarity among profilin from organisms which belong to different phyla (ranging from fungi to mammals) is low, but the N-terminal region is relatively well conserved. That region is thought to be involved in the binding to actin. This entry represents a conserved site at the N-terminal extremity of profilin. A protein structurally similar to profilin is present in the genome of variola and vaccinia viruses (gene A42R).
