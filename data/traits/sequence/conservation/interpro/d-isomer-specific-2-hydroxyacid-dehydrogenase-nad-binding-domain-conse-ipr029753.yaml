identifier: InterPro:IPR029753
label: "D-isomer specific 2-hydroxyacid dehydrogenase, NAD-binding domain conserved site"
definition: >-
  A number of NAD-dependent 2-hydroxyacid dehydrogenases which seem to be specific for the D-isomer of their substrate have been shown to be functionally and structurally related. All these enzymes have similar enzymatic activities and are structurally related. This entry includes two conserved sites that contain a number of conserved charged residues, some of which may play a role in the catalytic mechanism.
