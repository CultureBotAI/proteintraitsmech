identifier: InterPro:IPR020567
label: Nodulation protein A, NodA, conserved site
definition: >-
  Rhizobial nodulation (Nod) factors are signalling molecules secreted by root-nodulating rhizobia in response to flavanoids excreted by the host plant. They induce various symbiotic responses on the roots of the leguminous host plant at low concentrations, and are required for successful infection. Nodulation factors are lipo-chitooligosaccharides made by bacterial nitrogen-fixing bacteria as a signal to plant hosts. Nod factors differ slightly from system to system and serve as host range determinants. This signature pattern identifies a conserved region in the first third of the protein.
