identifier: InterPro:IPR057064
label: "p53, central conserved site"
definition: >-
  This entry represents a conserved stretch of 13 residues located in the central region of the p53. This region, known as domain IV in, is involved (along with an adjacent region) in the binding of the large T antigen of SV40. In homo sapiens, this region is the focus of a variety of point mutations in cancerous tumours. This entry also represents the central conserved site in related tumour proteins. The p53 tumour suppressor is a protein found in increased amounts in a wide variety of transformed cells. It is also detectable in many proliferating non-transformed cells, but it is undetectable or present at low levels in resting cells. It is frequently mutated or inactivated in many types of cancer. p53 seems to act as a tumour suppressor in some, but probably not all, tumour types. p53 has been implicated in cell cycle regulation, particularly in the monitoring of genomic DNA integrity prior to replication; for this reason it has been dubbed 'guardian of the genome'. p53 can be divided into different functional domains: an N-terminal transactivation domain ( ), a proline-rich domain, a DNA-binding domain ( ) which contains a conserved site ( ), a tetramerisation domain ( ) and a C-terminal regulatory region.
