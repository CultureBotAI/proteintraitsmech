identifier: InterPro:IPR021184
label: "Tumour necrosis factor, conserved site"
definition: >-
  This entry represents α conserved site located in a β-strand in the central section of the protein which is conserved across all members of the Tumor Necrosis Factor family. Cytokines can be grouped into a family on the basis of sequence, functional and structural similarities. Tumor necrosis factor (TNF) (also known as TNF-alpha or cachectin) is a monocyte-derived cytotoxin that has been implicated in tumour regression, septic shock and cachexia. The protein is synthesised as a prohormone with an unusually long and atypical signal sequence, which is absent from the mature secreted cytokine. A short hydrophobic stretch of amino acids serves to anchor the prohormone in lipid bilayers. Both the mature protein and a partially-processed form of the hormone are secreted after cleavage of the propeptide. There are a number of different families of TNF, but all these cytokines seem to form homotrimeric (or heterotrimeric in the case of LT-alpha/beta) complexes that are recognised by their specific receptors. The following cytokines can be grouped into a family on the basis of sequence, functional, and structural similarities: Tumor Necrosis Factor (TNF) (also known as cachectin or TNF-alpha) is a cytokine which has a wide variety of functions. It can cause cytolysis of certain tumor cell lines; it is involved in the induction of cachexia; it is a potent pyrogen, causing fever by direct action or by stimulation of interleukin-1 secretion; finally, it can stimulate cell proliferation and induce cell differentiation under certain conditions. Lymphotoxin-alpha (LT-alpha) and lymphotoxin-beta (LT-beta), two related cytokines produced by lymphocytes and which are cytotoxic for a wide range of tumor cells in vitro and in vivo. T cell antigen gp39 (CD40L), a cytokine which seems to b…
