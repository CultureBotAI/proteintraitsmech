identifier: InterPro:IPR020891
label: "Uncharacterised protein family UPF0758, conserved site"
definition: >-
  UPF0758 was previously known as the radC family. The name was assigned according to the radC102 mutant of E. coli which was later demonstrated to be an allele of the transcription-repair-coupling factor recG. It has been described as a putative JAMM-family deubiquitinating enzyme, but its function remains to be determined.
