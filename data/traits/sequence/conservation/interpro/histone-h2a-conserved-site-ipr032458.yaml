identifier: InterPro:IPR032458
label: "Histone H2A conserved site"
definition: >-
  Histone H2A is a small, highly conserved nuclear protein that, together with 2 molecules each of histones H2B, H3 and H4, forms the eukaryotic nucleosome core; the nucleosome octamer winds ~146 DNA base-pairs. This entry represents a conserved region in the N-terminal part of H2A. This region is conserved both in classical S-phase regulated H2A's and in variant histone H2A's which are synthesized throughout the cell cycle.
