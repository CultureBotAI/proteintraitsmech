identifier: InterPro:IPR043518
label: "2-5-oligoadenylate synthetase, N-terminal conserved site"
definition: >-
  In vertebrates, 2-5OASs (2'-5'-oligoadenylate synthetases) are induced by interferon during the innate immune response to protect against RNA virus infections. In the presence of an RNA activator, 2-5OASs catalyze the oligomerization of ATP into 2-5A. 2-5A activates endoribonuclease L, which leads to degradation of the viral RNA. 2-5OASs are also implicated in cell growth control, differentiation, and apoptosis. Three distinct classes of 2-5A synthetases have been described that correspond to proteins of 40-46 Kd, 69-71 Kd, and 100 Kd. The 40 and 46 Kd forms are produced by alternative splicing of the same gene. The 69 and 71 Kd forms are also produced by alternative splicing of a gene and consist of two adjacent homologous domains whose sequences are highly similar to that of the 40/46 Kd forms. The sequence of the 100 Kd form is not yet known. This site spans a region rich in glycine residues which has been proposed to be part of the ATP-binding site.
