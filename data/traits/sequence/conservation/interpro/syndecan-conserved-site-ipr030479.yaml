identifier: InterPro:IPR030479
label: "Syndecan, conserved site"
definition: >-
  The syndecans are multifunctional transmembrane heparan sulphate bearing cell surface receptors. There are four syndecans in mammals (syndecan1-4), but only one syndecan in C. elegans or D. melanogaster. These homologues have similar protein structure that consists of four separate domains: A signal sequence; An extracellular domain (ectodomain) of variable length whose sequence is not evolutionary conserved in the various forms of syndecans. The ectodomain contains the sites of attachment of the heparan sulphate glycosaminoglycan side chains; A transmembrane region; A highly conserved cytoplasmic domain of about 30 to 35 residues, which could interact with cytoskeletal proteins. This conserved site for syndecans starts with the last residue of the transmembrane region and includes the first 10 residues of the cytoplasmic domain. This region, which contains four basic residues, could act as a stop transfer site.
