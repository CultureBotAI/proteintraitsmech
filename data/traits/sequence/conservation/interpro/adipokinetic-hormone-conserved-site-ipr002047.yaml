identifier: InterPro:IPR002047
label: Adipokinetic hormone, conserved site
definition: >-
  Adipokinetic hormones (AKH) are small active peptides produced by some insect species. They bring on the release of diglycerides from the fat body and then stimulate the flight muscles to use them as an energy source. There are other types of active peptides structurally related to AKH. These peptides are eight to ten amino acid residues long.
