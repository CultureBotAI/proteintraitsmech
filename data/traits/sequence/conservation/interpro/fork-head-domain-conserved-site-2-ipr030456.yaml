identifier: InterPro:IPR030456
label: Fork head domain conserved site 2
definition: >-
  The fork head domain is a conserved domain of about 100 amino-acid residues found in some eukaryotic transcription factors. It is involved in DNA-binding. This entry represents a conserved heptapeptide located in the central section of the domain.
