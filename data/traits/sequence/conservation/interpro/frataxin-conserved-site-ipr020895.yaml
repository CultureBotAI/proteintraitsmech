identifier: InterPro:IPR020895
label: "Frataxin conserved site"
definition: >-
  This conserved site covers a conserved region in the central section of these proteins. The eukaryotic proteins in this entry include Frataxin, the protein that is mutated in Friedreich's ataxia, and related sequences. Friedreich's ataxia is a progressive neurodegenerative disorder caused by loss of function mutations in the gene encoding Frataxin (FRDA). Frataxin mRNA is predominantly expressed in tissues with a high metabolic rate (including liver, kidney, brown fat and heart). Mouse and yeast frataxin homologues contain a potential N-terminal mitochondrial targeting sequence, and human Frataxin has been observed to co-localise with a mitochondrial protein. Furthermore, disruption of the yeast gene has been shown to result in mitochondrial dysfunction. Friedreich's ataxia is thus believed to be a mitochondrial disease caused by a mutation in the nuclear genome (specifically, expansion of an intronic GAA triplet repeat). The bacterial proteins in this entry are iron-sulphur cluster (FeS) metabolism CyaY proteins homologous to eukaryotic Frataxin. Partial Phylogenetic Profiling suggests that CyaY most likely functions as part of the ISC system for FeS cluster biosynthesis, and is supported by experimental data in some species.
