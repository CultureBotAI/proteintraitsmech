identifier: InterPro:IPR018091
label: "Phosphoenolpyruvate carboxykinase, GTP-utilising, conserved site"
definition: >-
  This entry represents a conserved site found in GTP-utilising phosphoenolpyruvate carboxykinase enzymes. An essential cysteine residue has been proposed to be implicated in the catalytic mechanism; this residue is located in the central part of PEPCK and is in the centre of a perfectly conserved region.
