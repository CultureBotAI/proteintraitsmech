identifier: InterPro:IPR018192
label: "Small ribosomal subunit protein uS5, N-terminal, conserved site"
definition: >-
  Ribosomal protein uS5 is one of the proteins from the small ribosomal subunit, and is a protein of 166 to 254 amino-acid residues. In Escherichia coli, S5 is known to be important in the assembly and function of the 30S ribosomal subunit. Mutations in S5 have been shown to increase translational error frequencies. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups bacterial, cyanelle, red algal chloroplast, archaeal and fungal mitochondrial S5; mammalian, Caenorhabditis elegans, Drosophila and plant S2; and yeast S4 (SUP44). This entry represents a conserved glycine-rich region found at the N-terminal of the ribosomal protein uS5.
