identifier: InterPro:IPR020558
label: "Dihydroxy-acid/6-phosphogluconate dehydratase, conserved site"
definition: >-
  This entry represents two conserved sites: the first is located in the N-terminal half and contains a cysteine that could be involved in the binding of a 2Fe-2S iron-sulphur cluster; the second is located in the C-terminal half. Two dehydratases, dihydroxy-acid dehydratase ( ) (gene ilvD or ILV3) and 6-phosphogluconate dehydratase ( ) (gene edd) have been shown to be evolutionary related. Dihydroxy-acid dehydratase catalyses the fourth step in the biosynthesis of isoleucine and valine, the dehydratation of 2,3-dihydroxy-isovaleic acid into alpha-ketoisovaleric acid. 6-Phosphogluconate dehydratase catalyses the first step in the Entner-Doudoroff pathway, the dehydratation of 6-phospho-D-gluconate into 6-phospho-2-dehydro-3-deoxy-D-gluconate. Another protein containing this signature is Escherichia coli YjhG, which has been identified as a D-xylonate dehydratase. The N-terminal part of the proteins contains a cysteine that could be involved in the binding of a 2Fe-2S iron-sulphur cluster.
