label: "PdxT/SNO family, conserved site"
definition: >-
  The term vitamin B6 is used to refer collectively to the compound pyridoxine and its vitameric forms, pyridoxal, pyridoxamine, and their phosphorylated derivatives. Vitamin B6 is required by all organisms and plays an essential role as a co-factor for enzymatic reactions. Plants, fungi, bacteria, archaebacteria, and protists synthetize vitamin B6. Animals and some highly specialised obligate pathogens obtain it nutritionally. Vitamin B6 has two distinct biosynthetic pathways, which do not coexist in any organism. The pdxA/pdxJ pathway, that has been extensively characterised in Escherichia coli, is found in the gamma subdivision of the proteobacteria. A second pathway of vitamin B6 synthesis involving the pdxS/SNZ and pdxT/SNO protein families, which are completely unrelated in sequence to the pdxA/pdxJ proteins, is found in plants, fungi, protists, archaebacteria, and most bacteria. PdxS/SNZ and pdxT/SNO proteins form a complex which serves as a glutamine amidotransferase to supply ammonia as a source of the ring nitrogen of vitamin B6. PdxT/SNO and pdxS/SNZ appear to encode respectively the glutaminase subunit, which produces ammonia from glutamine, and the synthase subunit, which combines ammonia with five- and three-carbon phosphosugars to form vitamin B6. The pdxT/SNO family belongs to the triad glutamine aminotransferase fold, characterised by a conserved Cys-His-Glu active site. Two regions are highly conserved across all taxa, the PGGEST motif and the FHPE(LT) motif. PdxT/SNO proteins are an α/β three-layer sandwich containing a seven- stranded twisted mixed parallel β-sheet flanked by a six α-helices on the N-terminal stretch of the sheet, four on one side and two on the other. Proteins belonging to the pdxT/SNO family include: Bacillus subtilis glutamine amid…
