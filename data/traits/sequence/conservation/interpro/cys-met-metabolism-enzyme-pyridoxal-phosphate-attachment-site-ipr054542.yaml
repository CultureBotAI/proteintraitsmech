identifier: InterPro:IPR054542
label: "Cys/Met metabolism enzyme, pyridoxal-phosphate attachment site"
definition: >-
  This entry represents a conserved site which contains a lysine residue located in the central section of these enzymes to which the pyridoxal-P group is attached. The sequence around this residue is highly conserved. A number of pyridoxal-dependent enzymes involved in the metabolism of cysteine, homocysteine and methionine have been shown to be evolutionary related. These enzymes are proteins of about 400 amino-acid residues. The pyridoxal-P group is attached to a lysine residue located in the central section of these enzymes. One of these enzymes is the sulfhydrylase FUB7 from fungi such as Gibberella and Fusarium. The gene is part of a cluster that mediates the biosynthesis of fusaric acid, a mycotoxin with low to moderate toxicity to animals and humans, but with high phytotoxic properties. Pyridoxal phosphate is the active form of vitamin B6 (pyridoxine or pyridoxal). Pyridoxal 5'-phosphate (PLP) is a versatile catalyst, acting as a coenzyme in a multitude of reactions, including decarboxylation, deamination and transamination. PLP-dependent enzymes are primarily involved in the biosynthesis of amino acids and amino acid-derived metabolites, but they are also found in the biosynthetic pathways of amino sugars and in the synthesis or catabolism of neurotransmitters; pyridoxal phosphate can also inhibit DNA polymerases and several steroid receptors. Inadequate levels of pyridoxal phosphate in the brain can cause neurological dysfunction, particularly epilepsy. PLP enzymes exist in their resting state as a Schiff base, the aldehyde group of PLP forming a linkage with the ε-amino group of an active site lysine residue on the enzyme. The α-amino group of the substrate displaces the lysine ε-amino group, in the process forming a new aldimine with the substrate. This aldim…
