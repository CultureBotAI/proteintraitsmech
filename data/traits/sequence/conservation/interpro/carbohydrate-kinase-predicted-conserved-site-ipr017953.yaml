identifier: InterPro:IPR017953
label: "Carbohydrate kinase, predicted, conserved site"
definition: >-
  Proteins in this entry are related to Hydroxyethylthiazole kinase ( ) and PfkB carbohydrate kinase implying they are also carbohydrate kinases. Several uncharacterised proteins have been shown to share regions of similarities, including yeast chromosome XI hypothetical protein YKL151c; Caenorhabditis elegans hypothetical protein R107.2; Escherichia coli hypothetical protein yjeF; Bacillus subtilis hypothetical protein yxkO; Helicobacter pylori hypothetical protein HP1363; Mycobacterium tuberculosis hypothetical protein MtCY77.05c; Mycobacterium leprae hypothetical protein B229_C2_201; Synechocystis sp. (strain PCC 6803) hypothetical protein sll1433; and Methanocaldococcus jannaschii (Methanococcus jannaschii) hypothetical protein MJ1586. These are proteins of about 30 to 40kDa whose central region is well conserved.
