identifier: InterPro:IPR013373
label: "Flagellin/pilin, N-terminal site, archaea"
definition: >-
  This entry describes a hydrophobic N-terminal conserved site of archaeal flagellins and pilins. This site is directly analogous to the bacterial N-terminal methylation site , which has a cleavage motif resembling G^FxxxE followed by a strongly hydrophobic sequence. The bacterial domain is a recognition site for cleavage and methylation, found in pilus components, competence proteins and type II secretion proteins. This archaeal domain may play a similar role.
