identifier: InterPro:IPR057254
label: "Ubiquitin carboxyl-terminal hydrolase family 1, cysteine active-site"
definition: >-
  This entry represents the Ubiquitin carboxyl-terminal hydrolase family 1 cysteine active-site. Ubiquitin carboxyl-terminal hydrolases (EC 3.4.19.12) (UCH) (deubiquitinating enzymes) are thiol proteases that recognise and hydrolyse the peptide bond at the C-terminal glycine of ubiquitin. These enzymes are involved in the processing of poly-ubiquitin precursors as well as that of ubiquinated proteins. There are two distinct families of UCH. The first class is represented by: Mammalian isozymes L1 and L3. Yeast YUH1. Drosophila Uch. One of the active site residues of class-I UCH is a cysteine and the region surrounding this residue is highly conserved. This group of cysteine peptidases belong to the MEROPS peptidase family C12 (ubiquitin C-terminal hydrolase family, clan CA). Families within the CA clan are loosely termed papain-like as protein fold of the peptidase unit resembles that of papain, the type example for clan CA. The type example is the human ubiquitin C-terminal hydrolase UCH-L1. Ubiquitin is highly conserved, commonly found conjugated to proteins in eukaryotic cells, where it may act as a marker for rapid degradation, or it may have a chaperone function in protein assembly. The ubiquitin is released by cleavage from the bound protein by a protease. A number of deubiquitinising proteases are known: all are activated by thiol compounds, and inhibited by thiol-blocking agents and ubiquitin aldehyde, and as such have the properties of cysteine proteases. The deubiquitinsing proteases can be split into 2 size ranges: 20-30kDa (this entry) and 100-200kDa ( ). The 20-30kDa group includes the yeast yuh1, which is known to be active only against small ubiquitin conjugates, being inactive against conjugated beta-galactosidase. A mammalian homologue, UCH (ubiquitin co…
