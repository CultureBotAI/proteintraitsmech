identifier: InterPro:IPR061257
label: "ALQxL-like lanthipeptide, leader peptide"
definition: >-
  This 17-residue leader peptide region identifies a family of lanthipeptides that average 40 residues in length, with typically 3 or 4 Cys residues C-terminal to this region. Most members of this group are classified as class IV lanthipeptides by proximity to class IV lanthionine synthases.
