identifier: InterPro:IPR000952
label: "AB hydrolase 4, conserved site"
definition: >-
  This entry represents a conserved site found in some of the AB hydrolase 4 family members, including mammalian ABHD1/2/3, budding yeast Eht1, Eeb1 and MGL2, and bacterial putative esterases. Human ABHD3 is a phospholipase that may play a role in phospholipids remodeling. It may selectively cleave myristate (C14)-containing phosphatidylcholines through its predominant phospholipase 1 activity, cleaving preferentially acyl groups in sn1 position. Mouse ABHD2 may play a role in smooth muscle cells migration.
