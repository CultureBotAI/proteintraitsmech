identifier: InterPro:IPR001550
label: "Transcription antiterminator, conserved site"
definition: >-
  This is a family of bacterial proteins related to the Escherichia coli BglG protein. E. coli BglG protein mediates the positive regulation of the beta-glucoside (bgl) operon by functioning as a transcriptional antiterminator. BglG is an RNA-binding protein that recognises a specific sequence located just upstream of two termination sites within the operon. The activity of bglG is suppressed by its phosphorylation by bglF (EII-bgl), the permease from the beta-glucoside PTS system. BglG is highly similar to other proteins, which also probably act as transcriptional antiterminators.
