identifier: InterPro:IPR001598
label: "Transposase, IS30, conserved site"
definition: >-
  Autonomous mobile genetic elements such as transposon or insertion sequences (IS) encode an enzyme, called transposase, required for excising and inserting the mobile element. On the basis of sequence similarities, transposases can be grouped into various families. One of these families has been shown to consist of proteins of 340 to 380 amino acids.
