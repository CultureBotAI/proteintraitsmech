identifier: InterPro:IPR004840
label: "Amino acid permease, conserved site"
definition: >-
  This entry represents a conserved region located in the second transmembrane segment of amino acid permeases mainly found in bacteria and fungi. Amino acid permeases are integral membrane proteins involved in the transport of amino acids into the cell. A number of such proteins have been found to be evolutionary related. These proteins seem to contain up to 12 transmembrane segments. The best conserved region in this family is located in the second transmembrane segment.
