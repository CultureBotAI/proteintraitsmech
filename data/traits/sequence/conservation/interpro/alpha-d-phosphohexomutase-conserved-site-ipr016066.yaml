identifier: InterPro:IPR016066
label: "Alpha-D-phosphohexomutase, conserved site"
definition: >-
  The alpha-D-phosphohexomutase superfamily is composed of four related enzymes, each of which catalyses a phosphoryl transfer on their sugar substrates: phosphoglucomutase (PGM), phosphoglucomutase/phosphomannomutase (PGM/PMM), phosphoglucosamine mutase (PNGM), and phosphoacetylglucosamine mutase (PAGM). PGM ( ) converts D-glucose 1-phosphate into D-glucose 6-phosphate, and participates in both the breakdown and synthesis of glucose. PGM/PMM ( ; ) are primarily bacterial enzymes that use either glucose or mannose as substrate, participating in the biosynthesis of a variety of carbohydrates such as lipopolysaccharides and alginate. Both PNGM ( ) and PAGM ( ) are involved in the biosynthesis of UDP-N-acetylglucosamine. This entry represents the conserved site at the N-terminal region of alpha-D-phosphohexomutase enzymes.
