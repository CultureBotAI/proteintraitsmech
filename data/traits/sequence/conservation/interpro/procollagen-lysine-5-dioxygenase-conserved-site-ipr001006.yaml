identifier: InterPro:IPR001006
label: Procollagen-lysine 5-dioxygenase, conserved site
definition: >-
  Procollagen-lysine 5-dioxygenase ( ) catalyses the hydroxylation of lysine residues in X-Lys-Gly sequences in collagens. The resulting hydroxylysines serve as sites of attachment for carbohydrate units and are essential for the stability of the intermolecular collagen crosslinks. At least three isoforms are known in vertebrates. The enzyme requires iron, 2-oxoglutarate, oxygen and ascorbate for its activity. Three residues, two histidine and an aspartate, are involved in the binding of the iron ion. This entry represents a conserved region that contains two of these iron-binding ligands.
