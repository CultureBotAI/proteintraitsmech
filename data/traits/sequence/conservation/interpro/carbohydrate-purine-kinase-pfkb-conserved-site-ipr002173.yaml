identifier: InterPro:IPR002173
label: "Carbohydrate/purine kinase, PfkB, conserved site"
definition: >-
  It has been shown that the following carbohydrate and purine kinases are evolutionary related and can be grouped into a single family, which is known as the 'pfkB family': Fructokinase ( ) (gene scrK). 6-phosphofructokinase isozyme 2 ( ) (phosphofructokinase-2) (gene pfkB). pfkB is a minor phosphofructokinase isozyme in Escherichia coli and is not evolutionary related to the major isozyme (gene pfkA). Plant 6-phosphofructokinase also belong to this family. Ribokinase ( ) (gene rbsK). Adenosine kinase ( ) (gene ADK). 2-dehydro-3-deoxygluconokinase ( ) (gene: kdgK). 1-phosphofructokinase ( ) (fructose 1-phosphate kinase) (gene fruK). Inosine-guanosine kinase ( ) (gene gsk). Tagatose-6-phosphate kinase ( ) (phosphotagatokinase) (gene lacC). E. coli hypothetical protein yeiC. E. coli hypothetical protein yeiI. E. coli hypothetical protein yhfQ. E. coli hypothetical protein yihV. Yeast hypothetical protein YJR105w. All the above kinases are proteins of from 280 to 430 amino acid residues that share a few region of sequence similarity. Note: some bacterial fructokinases belong to the ROK family (see ).
