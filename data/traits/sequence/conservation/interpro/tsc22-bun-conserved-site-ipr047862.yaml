identifier: InterPro:IPR047862
label: "TSC22/Bun, conserved site"
definition: >-
  This entry represents a conserved site found in a group of eukaryotic proteins that are evolutionary related and involved in transcriptional regulation. These proteins are highly similar in a region of about 50 residues that include a conserved leucine-zipper domain most probably involved in homo- or hetero-dimerisation; the site represented here is located just in front of the leucine zipper. Proteins included in this entry are: Vertebrate protein TSC22, a transcriptional regulator which seems to act on C-type natriuretic peptide (CNP) promoter. Drosophila protein bunched (gene bun) (also known as shortsighted), a probable transcription factor required for peripheral nervous system morphogenesis, eye development and oogenesis. Caenorhabditis elegans protein tsct-1 (also known as T18D3.7), whose function is unknown.
