identifier: InterPro:IPR023997
label: "TonB-dependent outer membrane protein SusC/RagA, conserved site"
definition: >-
  This entry describes a short conserved site found in the SusC/RagA family of outer membrane proteins from the Bacteriodetes. While many TonB-dependent outer membrane receptors are associated with siderophore import, this conserved site seems to include generalised nutrient receptors that may convey fairly large oligomers of protein or carbohydrate. The conserved site occurs in high copy numbers in the most abundant species of the human gut microbiome.
