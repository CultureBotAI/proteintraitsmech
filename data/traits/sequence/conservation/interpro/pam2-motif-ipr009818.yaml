label: "PAM2 motif"
definition: >-
  The PABP-interacting motif PAM2 has been identified in various eukaryotic proteins as an important binding site for . It has been found in a wide range of eukaryotic proteins. Strikingly, this motif appears to occur solely outside of globular domains.
