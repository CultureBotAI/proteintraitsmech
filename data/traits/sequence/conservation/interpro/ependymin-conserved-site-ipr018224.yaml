identifier: InterPro:IPR018224
label: Ependymin, conserved site
definition: >-
  Ependymins are secretory proteins found predominantly in the cerebrospinal fluid of teleost fish. A bound form of the glycoproteins is associated with the extracellular matrix, probably with collagen fibrils, that may be the functional form of ependymins. The proteins bind calcium via N-linked sialic acid residues. The molecular function of ependymins appear to be related to cell contact phenomena involving the extracellular matrix.
