identifier: InterPro:IPR022664
label: Dihydrodipicolinate reductase, conserved site
definition: >-
  Dihydrodipicolinate reductase catalyzes the second step in the biosynthesis of diaminopimelic acid and lysine, the NAD or NADP-dependent reduction of 2,3-dihydrodipicolinate into 2,3,4,5-tetrahydrodipicolinate. In Escherichia coli and Mycobacterium tuberculosis, dihydrodipicolinate reductase has equal specificity for NADH and NADPH, however in Thermotoga maritima there it has a greater affinity for NADPH. In addition, the enzyme is inhibited by high concentrations of its substrate, which consequently acts as a feedback control on the lysine biosynthesis pathway. In T. maritima, the enzyme also lacks N-terminal and C-terminal loops which are present in enzyme of the former two organisms. This entry represents a conserved site in the central region of the protein which is found in the substrate binding region.
