label: "Dynamin, GTPase region, conserved site"
definition: >-
  The P-loop guanosine triphosphatases (GTPases) control a multitude of biological processes, ranging from cell division, cell cycling, and signal transduction, to ribosome assembly and protein synthesis. GTPases exert their control by interchanging between an inactive GDP-bound state and an active GTP-bound state, thereby acting as molecular switches. The common denominator of GTPases is the highly conserved guanine nucleotide-binding (G) domain that is responsible for binding and hydrolysis of guanine nucleotides. Members of the dynamin GTPase family appear to be ubiquitous. They catalyse diverse membrane remodelling events in endocytosis, cell division, and plastid maintenance. Their functional versatility also extends to other core cellular processes, such as maintenance of cell shape or centrosome cohesion. Members of the dynamin family are characterised by their common structure and by conserved sequences in the GTP-binding domain. The minimal distinguishing architectural features that are common to all dynamins and are distinct from other GTPases are the structure of the large GTPase domain (~280 amino acids) and the presence of two additional domains: the middle domain and the GTPase effector domain (GED), which are involved in oligomerisation and regulation of the GTPase activity. In many dynamin family members, the basic set of domains is supplemented by targeting domains, such as: pleckstrin-homology (PH) domain, proline-rich domains (PRDs), or by sequences that target dynamins to specific organelles, such as mitochondria and chloroplasts. The dynamin-type G domain consists of a central eight-stranded β-sheet surrounded by seven α helices and two one-turn helices. It contains the five canonical guanine nucleotide binding motifs (G1-5). The P-loop (G1) motif (G…
