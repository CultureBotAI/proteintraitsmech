identifier: InterPro:IPR018079
label: Small ribosomal subunit protein uS4, conserved site
definition: >-
  Ribosomal protein uS4 is one of the proteins from the small ribosomal subunit. In Escherichia coli, uS4 is known to bind directly to 16S ribosomal RNA. Mutations in uS4 have been shown to increase translational error frequencies. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups: Eubacterial uS4. Algal and plant chloroplast uS4. Cyanelle uS4. Archaebacterial uS4. Mammalian uS4 (known as S9). Yeast YS11 (SUP46). Marchantia polymorpha (Liverwort) mitochondrial uS4. Dictyostelium discoideum (Slime mold) rp1024. Yeast protein NAM9. NAM9 has been characterised as a suppressor for ochre mutations in mitochondrial DNA. It could be a ribosomal protein that acts as a suppressor by decreasing translation accuracy. uS4 is a protein of 171 to 205 amino-acid residues (except for NAM9 which is much larger).
