label: "Fimbrial membrane usher, conserved site"
definition: >-
  In Gram-negative bacteria the biogenesis of fimbriae (or pili) requires a two- component assembly and transport system which is composed of a periplasmic chaperone (see ) and an outer membrane protein which has been termed a molecular 'usher'.
