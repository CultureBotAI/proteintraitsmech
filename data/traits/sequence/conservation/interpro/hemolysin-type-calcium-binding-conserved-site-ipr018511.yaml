identifier: InterPro:IPR018511
label: "Hemolysin-type calcium-binding conserved site"
definition: >-
  Gram-negative bacteria produce a number of proteins that are secreted into the growth medium by a mechanism by the type I secretion system that does not require a cleaved N-terminal signal sequence. These proteins, while having different functions, share two properties: they bind calcium and they contain a multiple tandem repeat of a nonapeptide. The nonapeptide is found in a group of bacterial exported proteins that includes haemolysin, cyclolysin, leukotoxin and metallopeptidases belonging to MEROPS peptidase family M10 (clan MA(M)), subfamily 10B (serralysin). It has been suggested that the internally repeated domain of haemolysin may be involved in Ca-mediated binding to erythrocytes. It has been shown that such a domain is involved in the binding of calcium ions in a parallel β roll structure.
