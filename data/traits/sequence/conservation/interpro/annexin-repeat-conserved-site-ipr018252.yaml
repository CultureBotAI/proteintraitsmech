identifier: InterPro:IPR018252
label: Annexin repeat, conserved site
definition: >-
  Annexins are a group of calcium-binding proteins that associate reversibly with membranes. They bind to phospholipid bilayers in the presence of micromolar free calcium concentration. The binding is specific for calcium and for acidic phospholipids. Annexins have been claimed to be involved in cytoskeletal interactions, phospholipase inhibition, intracellular signaling, anticoagulation, and membrane fusion. Annexins are widely distributed among eukaryotes but largely absent in prokaryotes and yeast. They are classified according to the evolutionary divisions of the eukaryotes into five families: A (ANXA, vertebrates, including humans), B (ANXB, invertebrates), C (ANXC, fungi), D (ANXD, true plants), E (ANXE, protists). Each of these proteins consist of a unique N-terminal domain followed by four or eight copies (in annexin A6) of a conserved segment of approximately 70 residues. The tertiary structure of annexins is evolutionary conserved; a single molecule resembles a slightly curved disk with the calcium and phospholipid-binding sites located on the more convex surface and the more concave surface facing the cytoplasm. Each single annexin repeat (sometimes known as an 'endonexin fold') is comprised of five α-helices(A-E). Four of them (A, B, D and E) are arranged parallel and form a tightly packed helix-loop-helix bundle. In contrast, helix C is almost perpendicular and covers the remaining four on the surface. Each of the repeats has the potential to have a type II Ca(2)-binding bipartite motif, located on two different α-helices (GxGT-(38-40 residues)-D/E), but typically some of them are non-functional. The core of the helix bundle is composed largely of hydrophobic residues, while hydrophilic residues are exposed on the surface of the protein and between the repea…
