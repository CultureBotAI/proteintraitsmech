identifier: CDD:cd00471
label: PNPOx_like
definition: >-
  PNP_oxidases and related families. Members of this hierarchy are flavin mononucleotide (FMN) binding domains. Pyridoxine 5'-phosphate (PNP) oxidase catalyzes the terminal step in the biosynthesis of pyridoxal 5'-phosphate (PLP) by the flavin mononucleotide (FMN) oxidation of pyridoxine 5'-phosphate forming FMNH2 and hydrogen peroxide. In addition to the active site, the enzyme contains a non-catalytic site that binds pyridoxal 5'-phosphate to avoid releasing this highly reactive intermediate to the cytoplasm before it is channelled to the next enzyme that requires PLP as a cofactor
