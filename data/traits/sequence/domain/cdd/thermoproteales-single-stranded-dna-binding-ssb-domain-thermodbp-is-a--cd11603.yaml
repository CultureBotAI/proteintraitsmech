identifier: CDD:cd11603
label: ThermoDBP
definition: >-
  Thermoproteales single-stranded DNA-binding (SSB) domain. ThermoDBP is a SSB protein of the Thermoproteales. SSB proteins are essential for the genome maintenance of all known cellular organisms. Many SSBs contain an OB fold domain, albeit with low sequence conservation and OB fold-containing SSB proteins have been detected in all three domains of life. However, one group of Crenarchaea, the Thermoproteales, lack SSB encoding genes. The Thermoproteales SSB protein, ThermoDBP, lacks the OB fold and binds specifically to ssDNA with low sequence specificity. Its three-dimensional structure resembles that of the Hut operon positive regulatory protein HutP
