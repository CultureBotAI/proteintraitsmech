identifier: CDD:cd20600
label: "cyclin box found in retinoblastoma-like protein (RBL) subfamily. The RBL subfamily includes two retinoblastoma-like proteins, RBL1 and RBL2. They are key regulators of entry into cell division and are directly involved in heterochromatin formation by maintaining overall chromatin structure. RBL1 and RBL2 recruit and target histone methyltransferases KMT5B and KMT5C, leading to epigenetic transcriptional repression. They control histone H4 'Lys-20' trimethylation and probably act as transcription repressors by recruiting chromatin-modifying enzymes to promoters. They may also act as tumor suppressors. Members of this family contain one cyclin box. The cyclin box is a protein binding domain."
definition: >-
  cyclin box found in retinoblastoma-like protein (RBL) subfamily. The RBL subfamily includes two retinoblastoma-like proteins, RBL1 and RBL2. They are key regulators of entry into cell division and are directly involved in heterochromatin formation by maintaining overall chromatin structure. RBL1 and RBL2 recruit and target histone methyltransferases KMT5B and KMT5C, leading to epigenetic transcriptional repression. They control histone H4 'Lys-20' trimethylation and probably act as transcription repressors by recruiting chromatin-modifying enzymes to promoters. They may also act as tumor suppressors. Members of this family contain one cyclin box. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20600); members share this curated model.
