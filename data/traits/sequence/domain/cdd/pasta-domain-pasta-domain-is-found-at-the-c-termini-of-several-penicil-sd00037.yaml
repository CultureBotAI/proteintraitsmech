identifier: CDD:sd00037
label: "PASTA domain. PASTA domain is found at the C-termini of several penicillin-binding proteins (PBPs) and bacterial serine/threonine kinases. It is a small globular domain consisting of 3 beta-sheets and an alpha-helix. The name PASTA is derived from PBP and Serine/Threonine kinase Associated domain."
definition: >-
  PASTA domain. PASTA domain is found at the C-termini of several penicillin-binding proteins (PBPs) and bacterial serine/threonine kinases. It is a small globular domain consisting of 3 beta-sheets and an alpha-helix. The name PASTA is derived from PBP and Serine/Threonine kinase Associated domain. — an NCBI CDD conserved domain (sd00037); members share this curated model.
