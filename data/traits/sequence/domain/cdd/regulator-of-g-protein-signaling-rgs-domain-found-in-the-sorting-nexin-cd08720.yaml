identifier: CDD:cd08720
label: "Regulator of G protein signaling (RGS) domain found in the Sorting Nexin 25 (SNX25) protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the SNX25 (Sorting Nexin 25) protein, a member of  the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. SNX25 is a member of the Dopamine receptors (DAR) signalplex and regulates the trafficking of D1 and D2 DARs."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the Sorting Nexin 25 (SNX25) protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the SNX25 (Sorting Nexin 25) protein, a member of the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. SNX25 is a member of the Dopamine receptors (DAR) signalplex and regulates the trafficking of D1 and D2 DARs. — an NCBI CDD conserved domain (cd08720); members share this curated model.
