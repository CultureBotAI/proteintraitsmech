identifier: CDD:cd08716
label: "Regulator of G protein signaling (RGS) domain found in the RGS13 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS13 protein. RGS13 is member of the R4/RGS subfamily of the RGS family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G-alpha subunit which leads to G protein deactivation and promotes desensitization. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis.  RGS13 is predominantly expressed in T and B lymphocytes and in mast cells, and plays a role in adaptive immune responses. RGS13 also found in Rgs13, which is also expressed in dendritic cells and in neuroendocrine cells of the thymus, gastrointestinal, and respiratory tracts. Outside of the GPCR pathway, RGS5 interacts with the PIP3 protein."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS13 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS13 protein. RGS13 is member of the R4/RGS subfamily of the RGS family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G-alpha subunit which leads to G protein deactivation and promotes desensitization. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS13 is predominantly expressed in T and B lymphocytes and in mast cells, and plays a role in adaptive immune responses. RGS13 also found in Rgs13, which is also expressed in dendritic cells and in neuroendocrine cells of the thymus, gastrointestinal, and respiratory tracts. Outside of the GPCR pathway, RGS5 interacts with the PIP3 protein. — an NCBI CDD conserved domain (cd08716); members share this curated model.
