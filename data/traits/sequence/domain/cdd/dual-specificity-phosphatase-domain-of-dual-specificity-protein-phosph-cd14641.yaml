identifier: CDD:cd14641
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 2. Dual specificity protein phosphatase 2 (DUSP2), also called dual specificity protein phosphatase PAC-1, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other mitogen-activated protein kinase (MAPK) phosphatases (MKPs), it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class I subfamily and is a mitogen- and stress-inducible nuclear MKP. DUSP2 can preferentially dephosphorylate ERK1/2 and p38, but not JNK in vitro. It is predominantly expressed in hematopoietic tissues with high T-cell content, such as thymus, spleen, lymph nodes, peripheral blood and other organs such as the brain and liver. It has a critical and positive role in inflammatory responses. DUSP2 mRNA and protein are significantly reduced in most solid cancers including breast, colon, lung, ovary, kidney and prostate, and the suppression of DUSP2 is associated with tumorigenesis and malignancy. DUSP2 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 2. Dual specificity protein phosphatase 2 (DUSP2), also called dual specificity protein phosphatase PAC-1, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other mitogen-activated protein kinase (MAPK) phosphatases (MKPs), it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class I subfamily and is a mitogen- and stress-inducible nuclear MKP. DUSP2 can preferentially dephosphorylate ERK1/2 and p38, but not JNK in vitro. It is predominantly expressed in hematopoietic tissues with high T-cell content, such as thymus, spleen, lymph nodes, peripheral blood and other organs such as the brain and liver. It has a critical and positive role in inflammatory responses. DUSP2 mRNA and protein are significantly reduced in most solid cancers including breast, colon, lung, ovary, kidney and prostate, and the suppression of DUSP2 is associated with tumorigenesis and malignancy. DUSP2 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. — an NCBI CDD conserved domain (cd14641); members share this curated model.
