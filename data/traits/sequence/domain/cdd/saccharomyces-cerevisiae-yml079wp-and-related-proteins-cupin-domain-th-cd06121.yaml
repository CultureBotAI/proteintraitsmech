identifier: CDD:cd06121
label: "Saccharomyces cerevisiae YML079wp and related proteins, cupin domain. This family includes eukaryotic, bacterial, and archaeal proteins homologous to YML079wp, a Saccharomyces cerevisiae cupin-like protein of unknown function that structurally resembles plant seed storage and ligand-binding proteins (canavalin, glycinin, auxin binding protein) as well as the bacterial RmlC epimerase. YML079wp is non-essential in yeast and localizes to the nucleus and cytoplasm. The presence of a hydrophobic ligand within a well-conserved binding pocket inside the cupin beta-barrel and sequence similarity with bacterial epimerases suggests a possible biochemical function for YML079wp and its homologs. Also included in this family are Shewanella oneidensis So0799, Agrobacterium fabrum Atu3615 and Branchiostoma belcheri Bbduf985. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold and forms a homodimer."
definition: >-
  Saccharomyces cerevisiae YML079wp and related proteins, cupin domain. This family includes eukaryotic, bacterial, and archaeal proteins homologous to YML079wp, a Saccharomyces cerevisiae cupin-like protein of unknown function that structurally resembles plant seed storage and ligand-binding proteins (canavalin, glycinin, auxin binding protein) as well as the bacterial RmlC epimerase. YML079wp is non-essential in yeast and localizes to the nucleus and cytoplasm. The presence of a hydrophobic ligand within a well-conserved binding pocket inside the cupin beta-barrel and sequence similarity with bacterial epimerases suggests a possible biochemical function for YML079wp and its homologs. Also included in this family are Shewanella oneidensis So0799, Agrobacterium fabrum Atu3615 and Branchiostoma belcheri Bbduf985. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold and forms a homodimer. — an NCBI CDD conserved domain (cd06121); members share this curated model.
