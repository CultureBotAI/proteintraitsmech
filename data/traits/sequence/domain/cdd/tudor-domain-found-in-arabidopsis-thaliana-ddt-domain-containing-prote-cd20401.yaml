identifier: CDD:cd20401
label: "Tudor domain found in Arabidopsis thaliana DDT domain-containing protein PTM (AtPTM), Dirigent protein 17 (AtDIR17), and similar proteins. This family includes AtPTM and AtDIR17. AtPTM, also called DDT domain-containing protein 1, or PHD type transcription factor with transmembrane domains, is a membrane-bound transcription factor required for plastid-to-nucleus retrograde signaling. AtDIR17 imparts stereoselectivity on the phenoxy radical-coupling reaction, yielding optically active lignans from two molecules of coniferyl alcohol in the biosynthesis of lignans, flavonolignans, and alkaloids, and thus plays a central role in plant secondary metabolism. Members of this family contain one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Arabidopsis thaliana DDT domain-containing protein PTM (AtPTM), Dirigent protein 17 (AtDIR17), and similar proteins. This family includes AtPTM and AtDIR17. AtPTM, also called DDT domain-containing protein 1, or PHD type transcription factor with transmembrane domains, is a membrane-bound transcription factor required for plastid-to-nucleus retrograde signaling. AtDIR17 imparts stereoselectivity on the phenoxy radical-coupling reaction, yielding optically active lignans from two molecules of coniferyl alcohol in the biosynthesis of lignans, flavonolignans, and alkaloids, and thus plays a central role in plant secondary metabolism. Members of this family contain one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20401); members share this curated model.
