identifier: CDD:cd01101
label: "NC1, type IV collagen non-collagenous C-terminal fragment. This domain contains a tandem repeat of two C4-type domains. Type IV collagen is the most abundant constituent of basement membranes and is only found there. The NC1 domain contains highly conserved cysteines, and contributes to the type IV collagen polygonal network by forming NC1 domain hexamers, each linking two collagen IV protomers. The ubiqitous form of type IV collagen is a heterotrimer of two alpha1 and one alpha2(IV) chains, and is found in essentially all basement membranes. Mutations in the NC1-domain of alpha-5 collagen IV are associated with X-linked Alport syndrome."
definition: >-
  NC1, type IV collagen non-collagenous C-terminal fragment. This domain contains a tandem repeat of two C4-type domains. Type IV collagen is the most abundant constituent of basement membranes and is only found there. The NC1 domain contains highly conserved cysteines, and contributes to the type IV collagen polygonal network by forming NC1 domain hexamers, each linking two collagen IV protomers. The ubiqitous form of type IV collagen is a heterotrimer of two alpha1 and one alpha2(IV) chains, and is found in essentially all basement membranes. Mutations in the NC1-domain of alpha-5 collagen IV are associated with X-linked Alport syndrome. — an NCBI CDD conserved domain (cd01101); members share this curated model.
