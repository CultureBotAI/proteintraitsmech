identifier: CDD:cd15140
label: "prostaglandin D2 receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. Prostaglandin D2 receptor (also called prostanoid DP receptor, DP1, or PGD2R1) is a G-protein coupled receptor whose endogenous ligand is prostaglandin D2 (PGD2). PGD2, the major cyclooxygenase metabolite of arachidonic acid produced by mast cells, mediates inflammatory reactions in response to allergen challenge and causes peripheral vasodilation. PGD2 exerts its biological effects by binding to two types of cell surface receptors: a DP1 receptor that belongs to the prostanoid receptor family and a chemoattractant receptor-homologous molecule expressed on the T-helper type 2 cells (CRTH2 or PD2R2)."
