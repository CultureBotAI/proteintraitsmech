identifier: CDD:cd19073
label: "Escherichia coli 2,5-diketo-D-gluconic acid reductase B (DkgB/YafB), Sinorhizobium meliloti isatin reductase and similar proteins. Escherichia coli DkgB/YafB (EC 1.1.1.346), also called 2,5-didehydrogluconate reductase (2-dehydro-L-gulonate-forming), or 2,5-DKG reductase B, or 2,5-DKGR B, or 25DKGR-B, is a founding member of aldo-keto reductase family 3 member F2 (AKR3F2). It catalyzes the reduction of 2,5-diketo-D-gluconic acid (25DKG) to 2-keto-L-gulonic acid (2KLG). Sinorhizobium meliloti isatin reductase is a founding member of aldo-keto reductase family 3 member F3 (AKR3F3). It is a aldo/keto reductase family oxidoreductase."
definition: >-
  Escherichia coli 2,5-diketo-D-gluconic acid reductase B (DkgB/YafB), Sinorhizobium meliloti isatin reductase and similar proteins. Escherichia coli DkgB/YafB (EC 1.1.1.346), also called 2,5-didehydrogluconate reductase (2-dehydro-L-gulonate-forming), or 2,5-DKG reductase B, or 2,5-DKGR B, or 25DKGR-B, is a founding member of aldo-keto reductase family 3 member F2 (AKR3F2). It catalyzes the reduction of 2,5-diketo-D-gluconic acid (25DKG) to 2-keto-L-gulonic acid (2KLG). Sinorhizobium meliloti isatin reductase is a founding member of aldo-keto reductase family 3 member F3 (AKR3F3). It is a aldo/keto reductase family oxidoreductase. — an NCBI CDD conserved domain (cd19073); members share this curated model.
