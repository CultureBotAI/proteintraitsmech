identifier: CDD:cd06044
label: GH30_GCase
definition: >-
  GH30_GCase. GCase (acid beta-glucosidase), also known as glucocerebrosidase or glucosylceramidase, is a lysosomal enzyme that catalyzes the hydrolysis of glucosylceramide to beta-glucose and ceramide in the presence of the modulator protein saposin C and lipid. Mutations in GCase are responsible for the lysosomal storage disorder Gaucher's disease. GCase belongs to glycosyl hydrolase family 30 (GH30)
