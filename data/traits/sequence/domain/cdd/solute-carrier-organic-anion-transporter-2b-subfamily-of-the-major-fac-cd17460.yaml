identifier: CDD:cd17460
label: "Solute carrier organic anion transporter 2B subfamily of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 2B (SLCO2B), also called Organic anion-transporting polypeptide 2B (OATP2B), subfamily has one mammalian member, OATP2B1 (encoded by SLCO2B1). It mediates the Na(+)-independent transport of various organic anions such as taurocholate, the prostaglandins PGD2, PGE1, PGE2, leukotriene C4, thromboxane B2 and iloprost. It also mediates the transport of endogenous sex steroid conjugates such as dehydroepiandrosterone sulfate (DHEAS). SLCO2B1 variations result in differential expression and uptake of DHEAS, which impacts subsequent resistance to androgen-deprivation therapy (ADT), the primary treatment of metastatic prostate cancer. The SLCO2B/OATP2B subfamily belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier organic anion transporter 2B subfamily of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 2B (SLCO2B), also called Organic anion-transporting polypeptide 2B (OATP2B), subfamily has one mammalian member, OATP2B1 (encoded by SLCO2B1). It mediates the Na(+)-independent transport of various organic anions such as taurocholate, the prostaglandins PGD2, PGE1, PGE2, leukotriene C4, thromboxane B2 and iloprost. It also mediates the transport of endogenous sex steroid conjugates such as dehydroepiandrosterone sulfate (DHEAS). SLCO2B1 variations result in differential expression and uptake of DHEAS, which impacts subsequent resistance to androgen-deprivation therapy (ADT), the primary treatment of metastatic prostate cancer. The SLCO2B/OATP2B subfamily belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17460); members share this curated model.
