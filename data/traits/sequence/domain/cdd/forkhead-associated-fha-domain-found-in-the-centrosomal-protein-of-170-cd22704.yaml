identifier: CDD:cd22704
label: "forkhead associated (FHA) domain found in the centrosomal protein of 170 kDa protein (Cep170) family. The Cep170 family includes Cep170 and Cep170B. Cep170, also called Cep170A, KARP-1-binding protein, or KARP1-binding protein, is a protein that localizes to centrosomes as well as spindle microtubules and plays a role in microtubule organization and microtubule assembly. It is required for centriole subdistal appendage assembly. Cep170 is phosphorylated during M phase and interacts with Polo-like kinase 1 (Plk1). Cep170B, also called centrosomal protein 170B, plays a role in microtubule organization. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in the centrosomal protein of 170 kDa protein (Cep170) family. The Cep170 family includes Cep170 and Cep170B. Cep170, also called Cep170A, KARP-1-binding protein, or KARP1-binding protein, is a protein that localizes to centrosomes as well as spindle microtubules and plays a role in microtubule organization and microtubule assembly. It is required for centriole subdistal appendage assembly. Cep170 is phosphorylated during M phase and interacts with Polo-like kinase 1 (Plk1). Cep170B, also called centrosomal protein 170B, plays a role in microtubule organization. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22704); members share this curated model.
