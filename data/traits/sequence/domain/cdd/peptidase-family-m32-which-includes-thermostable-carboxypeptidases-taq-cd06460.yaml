identifier: CDD:cd06460
label: M32_Taq
definition: >-
  Peptidase family M32, which includes thermostable carboxypeptidases TaqCP, PfuCP and FisCP. Peptidase family M32 is a subclass of metallocarboxypeptidases, distributed mainly in bacteria and archaea, whose members contain a HEXXH motif that participates in coordinating a divalent cation such as Zn2+ or Co2+. It includes the thermostable carboxypeptidases (E.C. 3.4.17.19) from Thermus aquaticus (TaqCP) and Pyrococcus furiosus (PfuCP), which have broad specificities toward a wide range of C-terminal substrates that include basic, aromatic, neutral and polar amino acids. These enzymes have a similar fold to the M3 peptidases such as neurolysin and the M2 angiotensin converting enzyme (ACE). The keratin-degrading extremophilic eubacterium Fervidobacterium islandicum M32 carboxypeptidase (FisCP) plays an important role in cellular metabolism, and significantly enhances the degradation of native chicken feathers. It has been shown to mainly cleave the C-termini of peptides with a basic amino acid sequence. Novel M32 peptidases from some eukaryotes: protozoa Trypanosoma cruzi, a causative agent of Chagas' disease, and Leishmania major, a parasite that causes leishmaniasis, have been identified, thus making these enzymes an attractive potential target for drug development against these organisms
