identifier: CDD:cd22103
label: "F-box domain found in F-box only protein 32 (FBXO32) and similar proteins. FBXO32, also called FBX32, atrogin-1, or muscle atrophy F-box protein (MAFbx), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins during skeletal muscle atrophy. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 32 (FBXO32) and similar proteins. FBXO32, also called FBX32, atrogin-1, or muscle atrophy F-box protein (MAFbx), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins during skeletal muscle atrophy. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22103); members share this curated model.
