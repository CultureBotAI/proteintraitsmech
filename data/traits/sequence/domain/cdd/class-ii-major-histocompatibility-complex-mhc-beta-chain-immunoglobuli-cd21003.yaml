identifier: CDD:cd21003
label: "Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) DP; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) DP. HLA class II histocompatibility antigen, DP(W2) beta chain is a protein that in humans is encoded by the HLA-DPB1 gene.  It plays a central role in the immune system by presenting peptides derived from extracellular proteins.  MHC class II molecules are encoded by three different loci, HLA-DR, -DQ, and -DP, which are about 70% similar to each other. HLA-DP is an alphabeta heterodimer cell-surface receptor. Each DP subunit (alpha-subunit, beta-subunit) is composed of a alpha-helical N-terminal domain, an IgG-like beta sheet, a membrane spanning domain, and a cytoplasmic domain. The alpha-helical domain forms the sides of the peptide binding groove. The beta sheet regions form the base of the binding groove and the bulk of the molecule as well as the inter-subunit (non-covalent) binding region. Individuals carrying the MHCII allele, HLA-DP2, are at risk for chronic beryllium disease (CBD), a debilitating inflammatory lung condition caused by the reaction of CD4 T cells to inhaled beryllium. MHC class II molecules play a key role in the initiation of the antigen-specific immune reponse. These molecules have been shown to be expressed constitutively on the cell surface of professional antigen-presenting cells (APCs), including B-lymphocytes, monocytes, and macrophages in both humans and mice. The expression of these molecules has been shown to be induced in nonprofessional APCs such as keratinocyctes, and they are expressed on the surface of activated human T cells and on T cells from other species. The MHC II molecules present antigenic peptides to CD4(+) T-lymphocytes. These peptides derive mostly from proteolytic processing via the endocytic pathway, of antigens internalized by the APC. These peptides bind to the MHC class II molecules in the endosome before they are transported to the cell surface. MHC class II molecules are heterodimers, comprised of two similarly-sized membrane-spanning chains, alpha and beta. Each chain had two globular domains (N- and C-terminal), and a membrane-anchoring transmembrane segment. The two chains form a compact four-domain structure. The peptide-binding site is a cleft in the structure."
definition: >-
  Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) DP; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) DP. HLA class II histocompatibility antigen, DP(W2) beta chain is a protein that in humans is encoded by the HLA-DPB1 gene. It plays a central role in the immune system by presenting peptides derived from extracellular proteins. MHC class II molecules are encoded by three different loci, HLA-DR, -DQ, and -DP, which are about 70% similar to each other. HLA-DP is an alphabeta heterodimer cell-surface receptor. Each DP subunit (alpha-subunit, beta-subunit) is composed of a alpha-helical N-terminal domain, an IgG-like beta sheet, a membrane spanning domain, and a cytoplasmic domain. The alpha-helical domain forms the sides of the peptide binding groove. The beta sheet regions form the base of the binding groove and the bulk of the molecule as well as the inter-subunit (non-covalent) binding region. Individuals carrying the MHCII allele, HLA-DP2, are at risk for chronic beryllium disease (CBD), a debilitating inflammatory lung condition caused by the reaction of CD4 T cells to inhaled beryllium. MHC class II molecules play a key role in the initiation of the antigen-specific immune reponse. These molecules have been shown to be expressed constitutively on the cell surface of professional antigen-presenting cells (APCs), including B-lymphocytes, monocytes, and macrophages in both humans and mice. The expression of these molecules has been shown to be induced in nonprofessional APCs such as keratinocyctes, and they are expressed on the surface of activated human T cells and on T cells from other species. The MHC II molecules present antigenic peptides to CD4(+) T-lymphocytes. These peptides derive mostly from proteolytic processing via the endocytic pathway, of antigens internalized by the APC. These peptides bind to the MHC class II molecules in the endosome before they are transported to the cell surface. MHC class II molecules are heterodimers, comprised of two similarly-sized membrane-spanning chains, alpha and beta. Each chain had two globular domains (N- and C-terminal), and a membrane-anchoring transmembrane segment. The two chains form a compact four-domain structure. The peptide-binding site is a cleft in the structure. — an NCBI CDD conserved domain (cd21003); members share this curated model.
