identifier: CDD:cd22400
label: "first type I K homology (KH) RNA-binding domain found in the insulin-like growth factor 2 mRNA-binding protein (IGF2BP) family. The IGF2BP family includes three members: IGF2BP1/IMP-1/ CRD-BP/ VICKZ1, IGF2BP2/IMP-2/ VICKZ2, and IGF2BP3/IMP-3/VICKZ3, which are RNA-binding factors that recruit target transcripts to cytoplasmic protein-RNA complexes (mRNPs). They function by binding to the 5' UTR of the insulin-like growth factor 2 (IGF2) mRNA and regulating IGF2 translation. IGF2BP proteins contain four K-homology (KH) RNA-binding domains which are important in RNA binding and are known to be involved in RNA synthesis and metabolism. The model corresponds to the first one."
definition: >-
  first type I K homology (KH) RNA-binding domain found in the insulin-like growth factor 2 mRNA-binding protein (IGF2BP) family. The IGF2BP family includes three members: IGF2BP1/IMP-1/ CRD-BP/ VICKZ1, IGF2BP2/IMP-2/ VICKZ2, and IGF2BP3/IMP-3/VICKZ3, which are RNA-binding factors that recruit target transcripts to cytoplasmic protein-RNA complexes (mRNPs). They function by binding to the 5' UTR of the insulin-like growth factor 2 (IGF2) mRNA and regulating IGF2 translation. IGF2BP proteins contain four K-homology (KH) RNA-binding domains which are important in RNA binding and are known to be involved in RNA synthesis and metabolism. The model corresponds to the first one. — an NCBI CDD conserved domain (cd22400); members share this curated model.
