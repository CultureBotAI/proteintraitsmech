identifier: CDD:cd19148
label: "Bacillus subtilis aldo-keto reductase YhdN and similar proteins. Bacillus subtilis YhdN, also called general stress protein 69 (GSP69), is a founding member of aldo-keto reductase family 11 member B1 (AKR11B1). It acts as an aldo-keto reductase (AKR) that catalyzes the reversible reduction of ketones to the respective alcohols using NAD(P)H as a hydride donor."
