identifier: CDD:cd11426
label: "basic helix-loop-helix (bHLH) domain found in muscle, intestine and stomach expression 1 (MIST-1) family. MIST-1, also termed Class A basic helix-loop-helix protein 15 (bHLHa15), or Class B basic helix-loop-helix protein 8 (bHLHb8), is a bHLH transcription factor expressed in pancreatic acinar cells and other serous exocrine cells. It is essential for cytoskeletal organization and secretory activity. It also functions as a potent endoplasmic reticulum (ER) stress-inducible transcriptional regulator. MIST-1 is capable of binding to E-box (CANNTG) motifs as a homodimer or a heterodimer with E-proteins (E12 and E47) to regulate transcription. The family also includes Drosophila melanogaster protein dimmed and similar proteins. Dimmed, also termed DIMM, is a bHLH transcription factor that regulates neurosecretory (NS) cell function and neuroendocrine cell fate in Drosophila."
definition: >-
  basic helix-loop-helix (bHLH) domain found in muscle, intestine and stomach expression 1 (MIST-1) family. MIST-1, also termed Class A basic helix-loop-helix protein 15 (bHLHa15), or Class B basic helix-loop-helix protein 8 (bHLHb8), is a bHLH transcription factor expressed in pancreatic acinar cells and other serous exocrine cells. It is essential for cytoskeletal organization and secretory activity. It also functions as a potent endoplasmic reticulum (ER) stress-inducible transcriptional regulator. MIST-1 is capable of binding to E-box (CANNTG) motifs as a homodimer or a heterodimer with E-proteins (E12 and E47) to regulate transcription. The family also includes Drosophila melanogaster protein dimmed and similar proteins. Dimmed, also termed DIMM, is a bHLH transcription factor that regulates neurosecretory (NS) cell function and neuroendocrine cell fate in Drosophila. — an NCBI CDD conserved domain (cd11426); members share this curated model.
