identifier: CDD:cd18209
label: BTB_POZ_ZBTB21_ZNF295
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 21 (ZBTB21). ZBTB21, also called zinc finger protein 295 (ZNF295), is a transcription repressor that acts in a selective manner on different promoters. It may be involved in the bi-directional control of gene expression in concert with another transcription factor ZFP161. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
