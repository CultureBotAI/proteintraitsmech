identifier: CDD:cd20560
label: CYCLIN_CCNA1_rpt1
definition: >-
  first cyclin box found in cyclin-A1 (CCNA1). CCNA1 may primarily function in the control of the germline meiotic cell cycle and additionally in the control of mitotic cell cycle in some somatic cells. CCNA1 contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain
