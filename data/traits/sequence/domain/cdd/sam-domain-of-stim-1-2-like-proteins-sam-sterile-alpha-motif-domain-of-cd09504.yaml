identifier: CDD:cd09504
label: "SAM domain of STIM-1,2-like proteins. SAM (sterile alpha motif) domain of STIM-1,2-like (Stromal interaction molecule) proteins is a putative protein-protein interaction domain. STIM1 and STIM2 human proteins are type I transmembrane proteins. The N-terminal part of them includes \"hidden\" EF-hand and SAM domains. This region is responsible for sensing changes in store-operated and basal cytoplasmic Ca2+ levels and initiates oligomerization. \"Hidden\" EF hand and SAM domains have a stable intramolecular association, and the SAM domain is a component that regulates stability within STIM proteins. Destabilization of the EF-SAM association during Ca2+ depletion leads to partial unfolding and aggregation (homooligomerization), thus activating the store-operated Ca2+ entry. Immunoprecipitation analysis indicates that STIM1 and STIM2 can form co-precipitable oligomeric associations in vivo. It was suggested that STIM1 and STIM2 are involved in opposite regulation of store operated channels in plasma membrane."
definition: >-
  SAM domain of STIM-1,2-like proteins. SAM (sterile alpha motif) domain of STIM-1,2-like (Stromal interaction molecule) proteins is a putative protein-protein interaction domain. STIM1 and STIM2 human proteins are type I transmembrane proteins. The N-terminal part of them includes "hidden" EF-hand and SAM domains. This region is responsible for sensing changes in store-operated and basal cytoplasmic Ca2+ levels and initiates oligomerization. "Hidden" EF hand and SAM domains have a stable intramolecular association, and the SAM domain is a component that regulates stability within STIM proteins. Destabilization of the EF-SAM association during Ca2+ depletion leads to partial unfolding and aggregation (homooligomerization), thus activating the store-operated Ca2+ entry. Immunoprecipitation analysis indicates that STIM1 and STIM2 can form co-precipitable oligomeric associations in vivo. It was suggested that STIM1 and STIM2 are involved in opposite regulation of store operated channels in plasma membrane. — an NCBI CDD conserved domain (cd09504); members share this curated model.
