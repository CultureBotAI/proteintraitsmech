identifier: CDD:cd11515
label: "Na(+)-dependent neurotransmitter transporter 4, and related proteins; solute-binding domain. This subgroup includes the solute-binding domain of NTT4 (also called XT1) and SBAT1 (also called B0AT2, v7-3, NTT7-3); both these proteins can transport neutral amino acids. Human SBAT1 is encoded by the SLC6A15 gene, a susceptibility gene for major depression. SBAT1 is expressed in brain, and may have a role in transporting neurotransmitter precursors into neurons. Human NTT4 is encoded by the SLC6A17 gene. NTT4 is specifically expressed in the nervous system, in synaptic vesicles of glutamatergic and GABAergic neurons, and may play an important role in synaptic transmission. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)-dependent neurotransmitter transporter 4, and related proteins; solute-binding domain. This subgroup includes the solute-binding domain of NTT4 (also called XT1) and SBAT1 (also called B0AT2, v7-3, NTT7-3); both these proteins can transport neutral amino acids. Human SBAT1 is encoded by the SLC6A15 gene, a susceptibility gene for major depression. SBAT1 is expressed in brain, and may have a role in transporting neurotransmitter precursors into neurons. Human NTT4 is encoded by the SLC6A17 gene. NTT4 is specifically expressed in the nervous system, in synaptic vesicles of glutamatergic and GABAergic neurons, and may play an important role in synaptic transmission. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11515); members share this curated model.
