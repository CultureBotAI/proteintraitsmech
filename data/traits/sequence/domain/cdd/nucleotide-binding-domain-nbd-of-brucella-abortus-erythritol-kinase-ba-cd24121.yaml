identifier: CDD:cd24121
label: "nucleotide-binding domain (NBD) of Brucella abortus erythritol kinase (BaEryA) and similar proteins. The subfamily contains a group of uncharacterized proteins with similarity to Brucella abortus erythritol kinase (BaEryA; EC 2.7.1.215). It catalyzes the phosphorylation of erythritol to D-erythritol-1-phosphate. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of Brucella abortus erythritol kinase (BaEryA) and similar proteins. The subfamily contains a group of uncharacterized proteins with similarity to Brucella abortus erythritol kinase (BaEryA; EC 2.7.1.215). It catalyzes the phosphorylation of erythritol to D-erythritol-1-phosphate. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd24121); members share this curated model.
