identifier: CDD:cd20824
label: "protein kinase C conserved region 1 (C1 domain) found in Schizosaccharomyces pombe protein BZZ1 and similar proteins. BZZ1 is a syndapin-like F-BAR protein that plays a role in endocytosis and trafficking to the vacuole. It functions with type I myosins to restore polarity of the actin cytoskeleton after NaCl stress. BZZ1 contains an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs), a central coiled-coil, and two C-terminal SH3 domains. Schizosaccharomyces pombe BZZ1 also harbors a C1 domain, but Saccharomyces cerevisiae BZZ1 doesn't have any. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in Schizosaccharomyces pombe protein BZZ1 and similar proteins. BZZ1 is a syndapin-like F-BAR protein that plays a role in endocytosis and trafficking to the vacuole. It functions with type I myosins to restore polarity of the actin cytoskeleton after NaCl stress. BZZ1 contains an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs), a central coiled-coil, and two C-terminal SH3 domains. Schizosaccharomyces pombe BZZ1 also harbors a C1 domain, but Saccharomyces cerevisiae BZZ1 doesn't have any. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20824); members share this curated model.
