identifier: CDD:cd02252
label: "nylC-like family; composed of proteins with similarity to Flavobacterium endo-type 6-aminohexanoate-oligomer hydrolase (EIII), the product of the nylon oligomer degradation gene, nylC. EIII is an amide hydrolase that catalyzes the degradation of highly-polymerized 6-aminohexanoate oligomers. Together with other nylon degradation enzymes, such as 6-aminohexanoate cyclic dimer hydrolase (EI) and 6-aminohexanoate dimer hydrolase (EII), EIII plays a role in the detoxification and biological removal of the synthetic by-products of nylon manufacture. EIII shows sequence similarity to L-aminopeptidase D-amidase/D-esterase (DmpA), an aminopeptidase that releases N-terminal D and L amino acids from peptide substrates. Like DmpA, EIII undergoes autocatalytic cleavage in front of a nucleophile to form a heterodimer. DmpA shows similarity in catalytic mechanism to N-terminal nucleophile (Ntn) hydrolases, which are enzymes that catalyze the cleavage of amide bonds through the nucleophilic attack of the side chain of an N-terminal serine, threonine, or cysteine."
definition: >-
  nylC-like family; composed of proteins with similarity to Flavobacterium endo-type 6-aminohexanoate-oligomer hydrolase (EIII), the product of the nylon oligomer degradation gene, nylC. EIII is an amide hydrolase that catalyzes the degradation of highly-polymerized 6-aminohexanoate oligomers. Together with other nylon degradation enzymes, such as 6-aminohexanoate cyclic dimer hydrolase (EI) and 6-aminohexanoate dimer hydrolase (EII), EIII plays a role in the detoxification and biological removal of the synthetic by-products of nylon manufacture. EIII shows sequence similarity to L-aminopeptidase D-amidase/D-esterase (DmpA), an aminopeptidase that releases N-terminal D and L amino acids from peptide substrates. Like DmpA, EIII undergoes autocatalytic cleavage in front of a nucleophile to form a heterodimer. DmpA shows similarity in catalytic mechanism to N-terminal nucleophile (Ntn) hydrolases, which are enzymes that catalyze the cleavage of amide bonds through the nucleophilic attack of the side chain of an N-terminal serine, threonine, or cysteine. — an NCBI CDD conserved domain (cd02252); members share this curated model.
