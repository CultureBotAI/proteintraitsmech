identifier: CDD:cd08583
label: "Uncharacterized hypothetical proteins similar to the catalytic domains of Phosphoinositide-specific phospholipaseand Glycerophosphodiester phosphodiesterases. This subfamily corresponds to a group of uncharacterized hypothetical proteins similar to the catalytic domains of Phosphoinositide-specific phospholipase C (PI-PLC), and glycerophosphodiester phosphodiesterases (GP-GDE), and also sphingomyelinases D (SMases D) and similar proteins. They hydrolyze the 3'-5' phosphodiester bonds in different substrates, utilizing a similar mechanism of general base and acid catalysis involving two conserved histidine residues."
definition: >-
  Uncharacterized hypothetical proteins similar to the catalytic domains of Phosphoinositide-specific phospholipaseand Glycerophosphodiester phosphodiesterases. This subfamily corresponds to a group of uncharacterized hypothetical proteins similar to the catalytic domains of Phosphoinositide-specific phospholipase C (PI-PLC), and glycerophosphodiester phosphodiesterases (GP-GDE), and also sphingomyelinases D (SMases D) and similar proteins. They hydrolyze the 3'-5' phosphodiester bonds in different substrates, utilizing a similar mechanism of general base and acid catalysis involving two conserved histidine residues. — an NCBI CDD conserved domain (cd08583); members share this curated model.
