identifier: CDD:cd07981
label: "histone-fold domain found in transcription initiation factor TFIID subunit 12 (TAF12) and similar proteins. TAF12, also called TATA Binding Protein (TBP) associated factor 12, transcription initiation factor TFIID 20/15 kDa subunits, TAFII-20/TAFII-15, or TAFII20/TAFII15, is a TBP-associated factor (TAF). TAFs are components of the transcription factor IID (TFIID) complex, PCAF histone acetylase complex, and TBP-free TAFII complex (TFTC). TIIFD is multimeric protein complex that plays a central role in mediating promoter responses to various activators and repressors. TFIID and PCAF are composed of TATA binding protein (TBP) and several TAFs. TBP is not part of TFTC. TAFs are essential for mediating regulation of RNA polymerase transcription. TAF12 interacts with TAF4 and makes a novel histone-like heterodimer that binds DNA and has a core promoter function of a subset of genes. It is important for RAS-induced transformation properties of human colorectal cancer cells; its levels are increased in the cells harboring the RAS mutation. Also, TAF12 interacts with activating transcription factor 7 (ATF7) and contributes to the hypersensitivity of osteoclast (OCL) precursors to 1,25-dihydroxyvitamin D2 (1,25-(OH)2D3; also known as calcitriol) in Paget's disease (PD), a disorder of the bone remodeling process, in which the body absorbs old bone and forms abnormal new bone."
