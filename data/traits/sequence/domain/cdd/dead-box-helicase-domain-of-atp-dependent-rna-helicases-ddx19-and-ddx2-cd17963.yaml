identifier: CDD:cd17963
label: "DEAD-box helicase domain of ATP-dependent RNA helicases DDX19 and DDX25. DDX19 (also called DEAD box RNA helicase DEAD5) and DDX25 (also called gonadotropin-regulated testicular RNA helicase (GRTH)) are members of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of ATP-dependent RNA helicases DDX19 and DDX25. DDX19 (also called DEAD box RNA helicase DEAD5) and DDX25 (also called gonadotropin-regulated testicular RNA helicase (GRTH)) are members of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17963); members share this curated model.
