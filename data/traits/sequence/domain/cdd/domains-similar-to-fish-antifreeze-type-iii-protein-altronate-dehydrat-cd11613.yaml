identifier: CDD:cd11613
label: "Domains similar to fish antifreeze type III protein. Altronate dehydratase (EC 4.2.1.7) converts D-altronate into 2-dehydro-3-deoxy-D-gluconate and is part of a bacterial pathway for the degradation of D-galacturonate. D-galactarate dehydratase (EC 4.2.1.42) eliminates water from D-galactarate to yield 5-dehydro-4-deoxy-D-glucarate, initializing the degradation of D-galactarate. The function of the SAF domain in these enzymes is not clear. It may participate in dimerization."
definition: >-
  Domains similar to fish antifreeze type III protein. Altronate dehydratase (EC 4.2.1.7) converts D-altronate into 2-dehydro-3-deoxy-D-gluconate and is part of a bacterial pathway for the degradation of D-galacturonate. D-galactarate dehydratase (EC 4.2.1.42) eliminates water from D-galactarate to yield 5-dehydro-4-deoxy-D-glucarate, initializing the degradation of D-galactarate. The function of the SAF domain in these enzymes is not clear. It may participate in dimerization. — an NCBI CDD conserved domain (cd11613); members share this curated model.
