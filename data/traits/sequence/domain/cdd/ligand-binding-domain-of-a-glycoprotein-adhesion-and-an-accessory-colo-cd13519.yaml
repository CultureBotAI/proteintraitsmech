identifier: CDD:cd13519
label: "Ligand-binding domain of a glycoprotein adhesion and an accessory colonization factor, a member of the type 2 periplasmic binding fold superfamily. PEB3 is a glycoprotein adhesion from Campylobacter jejuni whose structure suggests a functional role in transport, and resembles PEB1a, an Asp/Glu transporter and an adhesin. The overall structure of PEB3 is a dimer and is similar to that of other type 2 periplasmic transport proteins such as the molybdate/tungstate, sulfate, and ferric iron transporters.  PEB3 has high sequence identity to Paa, an Escherichia coli adhesin, and to AcfC, an accessory colonization factor from Vibrio cholera."
definition: >-
  Ligand-binding domain of a glycoprotein adhesion and an accessory colonization factor, a member of the type 2 periplasmic binding fold superfamily. PEB3 is a glycoprotein adhesion from Campylobacter jejuni whose structure suggests a functional role in transport, and resembles PEB1a, an Asp/Glu transporter and an adhesin. The overall structure of PEB3 is a dimer and is similar to that of other type 2 periplasmic transport proteins such as the molybdate/tungstate, sulfate, and ferric iron transporters. PEB3 has high sequence identity to Paa, an Escherichia coli adhesin, and to AcfC, an accessory colonization factor from Vibrio cholera. — an NCBI CDD conserved domain (cd13519); members share this curated model.
