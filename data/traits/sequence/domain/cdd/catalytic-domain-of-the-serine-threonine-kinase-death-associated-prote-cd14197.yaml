identifier: CDD:cd14197
label: "Catalytic domain of the Serine/Threonine Kinase, Death-associated protein kinase-Related Apoptosis-inducing protein Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DRAKs were named based on their similarity (around 50% identity) to the kinase domain of DAPKs. They contain an N-terminal kinase domain and a C-terminal regulatory domain. Vertebrates contain two subfamily members, DRAK1 (also called STK17A) and DRAK2. Both DRAKs are localized to the nucleus, autophosphorylate themselves, and phosphorylate myosin light chain as a substrate. Rabbit DRAK1 has been shown to induce apoptosis in osteoclasts and overexpressio of human DRAK1 induces apoptosis in cultured fibroblast cells. DRAK1 may be involved in apoptotic signaling. The DRAK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Death-associated protein kinase-Related Apoptosis-inducing protein Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DRAKs were named based on their similarity (around 50% identity) to the kinase domain of DAPKs. They contain an N-terminal kinase domain and a C-terminal regulatory domain. Vertebrates contain two subfamily members, DRAK1 (also called STK17A) and DRAK2. Both DRAKs are localized to the nucleus, autophosphorylate themselves, and phosphorylate myosin light chain as a substrate. Rabbit DRAK1 has been shown to induce apoptosis in osteoclasts and overexpressio of human DRAK1 induces apoptosis in cultured fibroblast cells. DRAK1 may be involved in apoptotic signaling. The DRAK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14197); members share this curated model.
