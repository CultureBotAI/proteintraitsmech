label: "YAP-binding domain (YBD) of transcriptional enhanced associate (TEA) domain (TEAD) protein. TEAD proteins contain an N-terminal DNA-binding domain and a C-terminal YAP-binding domain (YBD).YBD domain of TEAD interact with YAP which has an activation domain to form functional heterodimeric transcription factors that activate proliferative gene expression programs."
definition: >-
