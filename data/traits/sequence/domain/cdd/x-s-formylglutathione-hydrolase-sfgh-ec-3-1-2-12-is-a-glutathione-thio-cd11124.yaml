identifier: CDD:cd11124
label: S_formylglutathione_hydrolase
definition: >-
  x. S-formylglutathione hydrolase (SFGH, EC 3.1.2.12) is a glutathione thiol esterase that catalyzes the hydrolysis of S-formylglutathione to glutathione and formate. SFGH is found in eukaryotes and bacteria, where it functions in the formaldehyde detoxification pathway
