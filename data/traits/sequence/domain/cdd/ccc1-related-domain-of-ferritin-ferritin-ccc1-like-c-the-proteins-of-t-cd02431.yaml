identifier: CDD:cd02431
label: "CCC1-related domain of ferritin. Ferritin_CCC1_like_C: The proteins of this family contain two domains. This is the C-terminal domain that is closely related to the CCC1, a vacuole transmembrane protein functioning as an iron and manganese transporter. The N-terminal domain is similar to ferritin-like diiron-carboxylate proteins, which are involved in a variety of iron ion related functions, such as iron storage and regulation, mono-oxygenation, and reactive radical production. This family may be unique to certain bacteria and archaea."
definition: >-
