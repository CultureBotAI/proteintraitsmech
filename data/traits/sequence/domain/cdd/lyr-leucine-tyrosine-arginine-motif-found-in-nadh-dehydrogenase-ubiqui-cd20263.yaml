identifier: CDD:cd20263
label: "LYR (leucine-tyrosine-arginine) motif found in NADH dehydrogenase [ubiquinone] 1 beta subcomplex subunit 9 (NDUFB9) and similar proteins. NDUFB9, also called LYR motif-containing protein 3 (LYRM3), or Complex I-B22 (CI-B22), or NADH-ubiquinone oxidoreductase B22 subunit (UQOR22), is an accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (complex I), and is believed to be not involved in catalysis. In general, accessory subunits are integral for assembly and function of Complex I, which functions in the transfer of electrons from NADH to the respiratory chain. NDUFB9 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus."
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in NADH dehydrogenase [ubiquinone] 1 beta subcomplex subunit 9 (NDUFB9) and similar proteins. NDUFB9, also called LYR motif-containing protein 3 (LYRM3), or Complex I-B22 (CI-B22), or NADH-ubiquinone oxidoreductase B22 subunit (UQOR22), is an accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (complex I), and is believed to be not involved in catalysis. In general, accessory subunits are integral for assembly and function of Complex I, which functions in the transfer of electrons from NADH to the respiratory chain. NDUFB9 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus. — an NCBI CDD conserved domain (cd20263); members share this curated model.
