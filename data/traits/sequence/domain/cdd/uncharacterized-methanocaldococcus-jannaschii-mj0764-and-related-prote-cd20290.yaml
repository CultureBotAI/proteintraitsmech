label: cupin_Mj0764-like
definition: >-
  uncharacterized Methanocaldococcus jannaschii Mj0764 and related proteins, cupin domain. This family includes archaeal and bacterial proteins homologous to MJ0764, a Methanocaldococcus jannaschii protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization
