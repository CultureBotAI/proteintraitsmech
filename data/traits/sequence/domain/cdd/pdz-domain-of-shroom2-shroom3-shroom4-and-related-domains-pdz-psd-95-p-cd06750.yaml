identifier: CDD:cd06750
label: "PDZ domain of shroom2, shroom3, shroom4, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of shroom2, shroom3, shroom4, and related domains. Shroom family proteins shroom2 (also known as apical-like protein; protein APXL), shroom3 (also known as shroom-related protein), and shroom4 (also known as second homolog of apical protein) are essential regulators of cell morphology during animal development; they regulate cell architecture by directing the subcellular distribution and activation of Rho kinase (ROCK), which results in the localized activation of non-muscle myosin. The interaction between shroom and ROCK is mediated by the shroom domain 2 (SD2). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This shroom2,3,4-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of shroom2, shroom3, shroom4, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of shroom2, shroom3, shroom4, and related domains. Shroom family proteins shroom2 (also known as apical-like protein; protein APXL), shroom3 (also known as shroom-related protein), and shroom4 (also known as second homolog of apical protein) are essential regulators of cell morphology during animal development; they regulate cell architecture by directing the subcellular distribution and activation of Rho kinase (ROCK), which results in the localized activation of non-muscle myosin. The interaction between shroom and ROCK is mediated by the shroom domain 2 (SD2). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This shroom2,3,4-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06750); members share this curated model.
