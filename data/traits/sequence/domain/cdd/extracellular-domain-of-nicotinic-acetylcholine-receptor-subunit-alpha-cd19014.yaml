identifier: CDD:cd19014
label: "extracellular domain of nicotinic acetylcholine receptor subunit alpha 1 (CHRNA1). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit alpha 1 (alpha1), encoded by the CHRNA1 gene. These muscle type nicotinic subunits form heteropentamers with other nAChR subunits, most broadly expressed as combination of two alpha1, beta1, delta, and epsilon subunits in mature muscles, and of two alpha1, beta1, delta, and gamma in embryonic cells. The alpha1 subunit in human nAChR is the primary target of Myasthenia gravis antibodies that disrupt communication between the nervous system and the muscle, causing chronic muscle weakness."
definition: >-
