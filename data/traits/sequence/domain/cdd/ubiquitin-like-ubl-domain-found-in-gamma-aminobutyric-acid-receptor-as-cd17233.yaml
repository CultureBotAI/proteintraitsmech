  ubiquitin-like (Ubl) domain found in gamma-aminobutyric acid receptor-associated protein-like 1 (GABARAPL1) and similar proteins. GABARAPL1, also termed GEC1, or GABA(A) receptor-associated protein-like, belongs to the small family of GABARAP proteins which includes GABARAP, GABARAPL1, GABARAPL2/GATE-16, and GABARAPL3. GABARAPL1 has been involved in the intracellular transport of receptors via interactions with tubulin and GABA(A) or kappa opioid receptors. It is also a Ubl modifier that functions as a mediator involved in androgen-regulated autophagy process. It is transcriptionally modulated by androgen receptor (AR) and has a repressive role in autophagy. In addition, GABARAPL1 is required for increased membrane expression of epidermal growth factor receptor (EGFR) during hypoxia, suggesting a possible role in the trafficking of these membrane proteins. GABARAPL1 may also play a key role in several important biological processes such as cancer or neurodegenerative diseases. Low expression of GABARAPL1 is associated with poor prognosis of patients with hepatocellular carcinoma. This family also includes GABARAPL3, a paralog of GABARAPL1. — an NCBI CDD conserved domain (cd17233); members share this curated model.
