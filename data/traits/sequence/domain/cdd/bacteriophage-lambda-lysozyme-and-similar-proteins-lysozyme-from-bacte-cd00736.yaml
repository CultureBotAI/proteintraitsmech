identifier: CDD:cd00736
label: "Bacteriophage lambda lysozyme and similar proteins. Lysozyme from bacteriophage lambda hydrolyzes the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc), as do other lysozymes. However, unlike other lysozymes, bacteriophage lambda does not produce a reducing end upon cleavage of the peptidoglycan, but rather uses the 6-OH of the same MurNAc residue to produce a 1,6-anhydromuramic acid terminal residue and is therefore a lytic transglycosylase. An identical 1,6-anhydro bond is formed in bacterial peptidoglycans by the action of the lytic transglycosylases of E. coli, though they differ structurally."
definition: >-
  Bacteriophage lambda lysozyme and similar proteins. Lysozyme from bacteriophage lambda hydrolyzes the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc), as do other lysozymes. However, unlike other lysozymes, bacteriophage lambda does not produce a reducing end upon cleavage of the peptidoglycan, but rather uses the 6-OH of the same MurNAc residue to produce a 1,6-anhydromuramic acid terminal residue and is therefore a lytic transglycosylase. An identical 1,6-anhydro bond is formed in bacterial peptidoglycans by the action of the lytic transglycosylases of E. coli, though they differ structurally. — an NCBI CDD conserved domain (cd00736); members share this curated model.
