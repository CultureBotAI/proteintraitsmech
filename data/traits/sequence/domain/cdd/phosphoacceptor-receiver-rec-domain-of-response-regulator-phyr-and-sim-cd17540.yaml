identifier: CDD:cd17540
label: "phosphoacceptor receiver (REC) domain of response regulator PhyR and similar proteins. PhyR is a hybrid stress regulator that contains an N-terminal sigma-like (SL) domain and a C-terminal REC domain. Phosphorylation of the REC domain is known to promote binding of the SL domain to an anti-sigma factor. PhyR thus functions as an anti-anti-sigma factor in its phosphorylated state. It is involved in the general stress response. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of response regulator PhyR and similar proteins. PhyR is a hybrid stress regulator that contains an N-terminal sigma-like (SL) domain and a C-terminal REC domain. Phosphorylation of the REC domain is known to promote binding of the SL domain to an anti-sigma factor. PhyR thus functions as an anti-anti-sigma factor in its phosphorylated state. It is involved in the general stress response. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17540); members share this curated model.
