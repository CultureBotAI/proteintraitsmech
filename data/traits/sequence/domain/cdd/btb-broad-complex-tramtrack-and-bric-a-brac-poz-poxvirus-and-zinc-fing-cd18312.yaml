identifier: CDD:cd18312
label: "BTB (Broad-Complex, Tramtrack and Bric a brac) /POZ (poxvirus and zinc finger) domain found in Arabidopsis thaliana protein naked pins in YUC mutants 3 (NPY3), Root phototropism protein 3 (RPT3), and similar proteins. NPY3 may play an essential role in auxin-mediated organogenesis and in root gravitropic responses in Arabidopsis. RPT3 is a signal transducer of the phototropic response and photo-induced movements. It is necessary for root and hypocotyl phototropisms, but not for the regulation of stomata opening. Proteins in this subfamily contain an N-terminal BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac) /POZ (poxvirus and zinc finger) domain found in Arabidopsis thaliana protein naked pins in YUC mutants 3 (NPY3), Root phototropism protein 3 (RPT3), and similar proteins. NPY3 may play an essential role in auxin-mediated organogenesis and in root gravitropic responses in Arabidopsis. RPT3 is a signal transducer of the phototropic response and photo-induced movements. It is necessary for root and hypocotyl phototropisms, but not for the regulation of stomata opening. Proteins in this subfamily contain an N-terminal BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18312); members share this curated model.
