identifier: CDD:cd12293
label: "deviant RNA recognition motif (dRRM) in yeast ribosomal RNA-processing protein 7 (Rrp7p) and similar proteins. Rrp7p is encoded by YCL031C gene from Saccharomyces cerevisiae. It is an essential yeast protein involved in pre-rRNA processing and ribosome assembly, and is speculated to be required for correct assembly of rpS27 into the pre-ribosomal particle. Rrp7p contains a deviant RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a RRP7 domain. The classic RRM fold has a topology of beta1-alpha1-beta2-beta3-alpha2-beta4 with juxtaposed N- and C-termini. By contrast, the N-terminal region of Rrp7 displays a cyclic permutation of RRM topology: the strand equivalent to RRM beta4 is shuffled to the N-terminus of the strand equivalent to RRM beta1. Moreover, Rrp7 has an extra strand beta1, which, together with other four beta-strands, forms an antiparallel five-stranded beta-sheet."
definition: >-
  deviant RNA recognition motif (dRRM) in yeast ribosomal RNA-processing protein 7 (Rrp7p) and similar proteins. Rrp7p is encoded by YCL031C gene from Saccharomyces cerevisiae. It is an essential yeast protein involved in pre-rRNA processing and ribosome assembly, and is speculated to be required for correct assembly of rpS27 into the pre-ribosomal particle. Rrp7p contains a deviant RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a RRP7 domain. The classic RRM fold has a topology of beta1-alpha1-beta2-beta3-alpha2-beta4 with juxtaposed N- and C-termini. By contrast, the N-terminal region of Rrp7 displays a cyclic permutation of RRM topology: the strand equivalent to RRM beta4 is shuffled to the N-terminus of the strand equivalent to RRM beta1. Moreover, Rrp7 has an extra strand beta1, which, together with other four beta-strands, forms an antiparallel five-stranded beta-sheet. — an NCBI CDD conserved domain (cd12293); members share this curated model.
