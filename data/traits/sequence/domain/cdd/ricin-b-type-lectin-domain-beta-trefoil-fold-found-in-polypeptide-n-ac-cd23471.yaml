  ricin B-type lectin domain, beta-trefoil fold, found in polypeptide N-acetylgalactosaminyltransferase 12 (GALNT12) and similar proteins. GALNT12 (EC 2.4.1.41), also called polypeptide GalNAc transferase 12, GalNAc-T12, pp-GaNTase 12, protein-UDP acetylgalactosaminyltransferase 12, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 12, catalyzes the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT12 has activity toward non-glycosylated peptides such as Muc5AC, Muc1a and EA2, and no detectable activity with non-glycosylated Muc2 and Muc7. It displays enzymatic activity toward the Gal-NAc-Muc5AC glycopeptide, but no detectable activity to mono-GalNAc-glycosylated Muc1a, Muc2, Muc7 and EA2. It may play an important role in the initial step of mucin-type oligosaccharide biosynthesis in digestive organs. GALNT12 comprises a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity. — an NCBI CDD conserved domain (cd23471); members share this curated model.
