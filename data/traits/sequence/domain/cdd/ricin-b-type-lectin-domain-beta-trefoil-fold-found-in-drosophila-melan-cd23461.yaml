identifier: CDD:cd23461
label: "ricin B-type lectin domain, beta-trefoil fold, found in Drosophila melanogaster polypeptide N-acetylgalactosaminyltransferase 8 (Pgant8) and similar proteins. This subfamily includes Pgant8 (also called pp-GaNTase 8, protein-UDP acetylgalactosaminyltransferase 8, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 8), Pgant10 (also called polypeptide N-acetylgalactosaminyltransferase 10, pp-GaNTase 10, protein-UDP acetylgalactosaminyltransferase 10, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 10), Pgant11 (also called polypeptide N-acetylgalactosaminyltransferase 11, pp-GaNTase 11, protein-UDP acetylgalactosaminyltransferase 11, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 11) and Pgant12 (also called polypeptide N-acetylgalactosaminyltransferase 12, pp-GaNTase 12, protein-UDP acetylgalactosaminyltransferase 12, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 12). They function as GalNAc transferases (EC 2.4.1.41) that catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. Pgant8 can both act as a peptide transferase that transfers GalNAc onto unmodified peptide substrates, and as a glycopeptide transferase that requires the prior addition of a GalNAc on a peptide before adding additional GalNAc moieties. It prefers both EA2 and the diglycosylated Muc5AC-3/13 as substrates, albeit at very low levels for Muc5AC-3/13. Members of this subfamily contain a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Drosophila melanogaster polypeptide N-acetylgalactosaminyltransferase 8 (Pgant8) and similar proteins. This subfamily includes Pgant8 (also called pp-GaNTase 8, protein-UDP acetylgalactosaminyltransferase 8, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 8), Pgant10 (also called polypeptide N-acetylgalactosaminyltransferase 10, pp-GaNTase 10, protein-UDP acetylgalactosaminyltransferase 10, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 10), Pgant11 (also called polypeptide N-acetylgalactosaminyltransferase 11, pp-GaNTase 11, protein-UDP acetylgalactosaminyltransferase 11, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 11) and Pgant12 (also called polypeptide N-acetylgalactosaminyltransferase 12, pp-GaNTase 12, protein-UDP acetylgalactosaminyltransferase 12, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 12). They function as GalNAc transferases (EC 2.4.1.41) that catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. Pgant8 can both act as a peptide transferase that transfers GalNAc onto unmodified peptide substrates, and as a glycopeptide transferase that requires the prior addition of a GalNAc on a peptide before adding additional GalNAc moieties. It prefers both EA2 and the diglycosylated Muc5AC-3/13 as substrates, albeit at very low levels for Muc5AC-3/13. Members of this subfamily contain a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23461); members share this curated model.
