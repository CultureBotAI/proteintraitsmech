identifier: CDD:cd14642
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 6. Dual specificity protein phosphatase 6 (DUSP6), also called mitogen-activated protein kinase (MAPK) phosphatase 3 (MKP-3) or dual specificity protein phosphatase PYST1, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class II subfamily and is an ERK-selective cytoplasmic MKP. DUSP6/MKP-3 plays an important role in obesity-related hyperglycemia by promoting hepatic glucose output. MKP-3 deficiency attenuates body weight gain induced by a high-fat diet, protects mice from developing obesity-related hepatosteatosis, and reduces adiposity, possibly by repressing adipocyte differentiation. It also contributes to p53-controlled cellular senescence. It contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 6. Dual specificity protein phosphatase 6 (DUSP6), also called mitogen-activated protein kinase (MAPK) phosphatase 3 (MKP-3) or dual specificity protein phosphatase PYST1, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class II subfamily and is an ERK-selective cytoplasmic MKP. DUSP6/MKP-3 plays an important role in obesity-related hyperglycemia by promoting hepatic glucose output. MKP-3 deficiency attenuates body weight gain induced by a high-fat diet, protects mice from developing obesity-related hepatosteatosis, and reduces adiposity, possibly by repressing adipocyte differentiation. It also contributes to p53-controlled cellular senescence. It contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. — an NCBI CDD conserved domain (cd14642); members share this curated model.
