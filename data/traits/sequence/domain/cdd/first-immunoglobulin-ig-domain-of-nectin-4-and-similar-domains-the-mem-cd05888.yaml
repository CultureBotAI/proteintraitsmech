label: "First immunoglobulin (Ig) domain of nectin-4, and similar domains. The members here are composed of the first immunoglobulin (Ig) domain of nectin-4 (also known as poliovirus receptor related protein 4 or LNIR receptor). Nectin-4 belongs to the nectin family, which is comprised of four transmembrane glycoproteins (nectins-1 through -4). Nectins are synaptic cell adhesion molecules (CAMs) which participate in adhesion and signaling at various intracellular junctions. Nectins form homophilic cis-dimers, followed by homophilic and heterophilic trans-dimers involved in cell-cell adhesion. For example nectin-4 trans-interacts with nectin-1. Nectin-4 has also been shown to interact with the actin filament-binding protein, afadin. Unlike the other nectins, which are widely expressed in adult tissues, nectin-4 is mainly expressed during embryogenesis, and is not detected in normal adult tissue or in serum. Nectin-4 is re-expressed in breast carcinoma, and patients having metastatic breast cancer have a circulating form of nectin-4 formed from the ectodomain"
definition: >-
  First immunoglobulin (Ig) domain of nectin-4, and similar domains. The members here are composed of the first immunoglobulin (Ig) domain of nectin-4 (also known as poliovirus receptor related protein 4 or LNIR receptor). Nectin-4 belongs to the nectin family, which is comprised of four transmembrane glycoproteins (nectins-1 through -4). Nectins are synaptic cell adhesion molecules (CAMs) which participate in adhesion and signaling at various intracellular junctions. Nectins form homophilic cis-dimers, followed by homophilic and heterophilic trans-dimers involved in cell-cell adhesion. For example nectin-4 trans-interacts with nectin-1. Nectin-4 has also been shown to interact with the actin filament-binding protein, afadin. Unlike the other nectins, which are widely expressed in adult tissues, nectin-4 is mainly expressed during embryogenesis, and is not detected in normal adult tissue or in serum. Nectin-4 is re-expressed in breast carcinoma, and patients having metastatic breast cancer have a circulating form of nectin-4 formed from the ectodomain — an NCBI CDD conserved domain (cd05888); members share this curated model.
