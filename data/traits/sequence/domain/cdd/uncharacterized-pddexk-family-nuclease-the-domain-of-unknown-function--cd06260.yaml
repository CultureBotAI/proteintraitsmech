identifier: CDD:cd06260
label: "Uncharacterized PDDEXK family nuclease. The Domain of unknown function 820 (DUF820) family is composed of hypothetical proteins that are greatly expanded in cyanobacteria. The proteins are found sporadically in other bacteria. They have been predicted to belong to the PD-(D/E)xK superfamily of nucleases, which includes very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Uncharacterized PDDEXK family nuclease. The Domain of unknown function 820 (DUF820) family is composed of hypothetical proteins that are greatly expanded in cyanobacteria. The proteins are found sporadically in other bacteria. They have been predicted to belong to the PD-(D/E)xK superfamily of nucleases, which includes very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd06260); members share this curated model.
