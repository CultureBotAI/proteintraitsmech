identifier: CDD:cd21160
label: "Nidoviral uridylate-specific endoribonuclease (NendoU) domain of arterivirus PRRSV Nonstructural protein 11 (Nsp11), and related proteins. Nidovirus endoribonucleases (NendoUs) are uridylate-specific endoribonucleases, which release a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end. NendoUs include Nsp15 from coronaviruses and Nsp11 from arteriviruses, both of which may participate in the viral replication process and in the evasion of the host immune system. Mn2+ is dispensable, and to some extent inhibits the activity of arterivirus (Porcine Reproductive and Respiratory Syndrome virus) PRRSV Nsp11. This Nsp11 exists as a dimer. NendoUs are distantly related to Xenopus laevis Mn(2+)-dependent uridylate-specific endoribonuclease (XendoU) which is involved in the processing of intron-encoded box C/D U16 small, nucleolar RNA."
definition: >-
  Nidoviral uridylate-specific endoribonuclease (NendoU) domain of arterivirus PRRSV Nonstructural protein 11 (Nsp11), and related proteins. Nidovirus endoribonucleases (NendoUs) are uridylate-specific endoribonucleases, which release a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end. NendoUs include Nsp15 from coronaviruses and Nsp11 from arteriviruses, both of which may participate in the viral replication process and in the evasion of the host immune system. Mn2+ is dispensable, and to some extent inhibits the activity of arterivirus (Porcine Reproductive and Respiratory Syndrome virus) PRRSV Nsp11. This Nsp11 exists as a dimer. NendoUs are distantly related to Xenopus laevis Mn(2+)-dependent uridylate-specific endoribonuclease (XendoU) which is involved in the processing of intron-encoded box C/D U16 small, nucleolar RNA. — an NCBI CDD conserved domain (cd21160); members share this curated model.
