identifier: CDD:cd18349
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 6 (BTBD6). BTBD6, also termed lens BTB domain protein, is a BTB-domain-containing Kelch-like protein required for proper embryogenesis and plays an essential evolutionary conserved role during neuronal development. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 6 (BTBD6). BTBD6, also termed lens BTB domain protein, is a BTB-domain-containing Kelch-like protein required for proper embryogenesis and plays an essential evolutionary conserved role during neuronal development. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18349); members share this curated model.
