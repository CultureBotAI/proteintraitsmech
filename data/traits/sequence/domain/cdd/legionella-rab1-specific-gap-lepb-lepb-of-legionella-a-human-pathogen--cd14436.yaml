identifier: CDD:cd14436
label: "Legionella Rab1-specific GAP LepB. LepB of Legionella, a human pathogen, is a specific RabGAP for Rab1, a member of the largest subfamily of small GTPases. RabGTPases play a role in the control of vesicular trafficking and are switched off by GTPase-activating enzymes (GAPs) that stimulate the intrinsic GTP hydrolysis activity. Legionella LepB is unrelated to the TBC family of human Rab1 RabGAPs."
definition: >-
  Legionella Rab1-specific GAP LepB. LepB of Legionella, a human pathogen, is a specific RabGAP for Rab1, a member of the largest subfamily of small GTPases. RabGTPases play a role in the control of vesicular trafficking and are switched off by GTPase-activating enzymes (GAPs) that stimulate the intrinsic GTP hydrolysis activity. Legionella LepB is unrelated to the TBC family of human Rab1 RabGAPs. — an NCBI CDD conserved domain (cd14436); members share this curated model.
