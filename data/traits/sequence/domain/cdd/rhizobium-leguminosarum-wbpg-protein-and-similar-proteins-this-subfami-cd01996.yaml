identifier: CDD:cd01996
label: "Rhizobium leguminosarum WbpG protein and similar proteins. This subfamily includes Rhizobium leguminosarum WbpG and Campylobacter jejuni PseA proteins. They belong to the of adenine nucleotide alpha hydrolase (AANH) superfamily that also includes N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to adenosine group. This subfamily of proteins is predicted to bind ATP. This domain has a strongly conserved motif SGGKD at the N-terminus."
definition: >-
  Rhizobium leguminosarum WbpG protein and similar proteins. This subfamily includes Rhizobium leguminosarum WbpG and Campylobacter jejuni PseA proteins. They belong to the of adenine nucleotide alpha hydrolase (AANH) superfamily that also includes N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to adenosine group. This subfamily of proteins is predicted to bind ATP. This domain has a strongly conserved motif SGGKD at the N-terminus. — an NCBI CDD conserved domain (cd01996); members share this curated model.
