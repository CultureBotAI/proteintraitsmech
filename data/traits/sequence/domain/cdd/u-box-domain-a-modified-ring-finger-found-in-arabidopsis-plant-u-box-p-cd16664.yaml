identifier: CDD:cd16664
label: "U-box domain, a modified RING finger, found in Arabidopsis plant U-box proteins (AtPUB) and similar proteins. The plant PUB proteins, also known as U-box domain-containing proteins, are much more numerous in Arabidopsis which has 62 in comparison with the typical 6 in most animals. The majority of AtPUBs in this subfamily are known as ARM domain-containing PUB proteins, containing a C-terminally-located, tandem ARM (armadillo) repeat protein-interaction region in addition to the U-box domain. They have been implicated in the regulation of cell death and defense. They also play important roles in other plant-specific pathways, such as controlling both self-incompatibility and pseudo-self-incompatibility, as well as acting in abiotic stress. A subgroup of ARM domain-containing PUB proteins harbors a plant-specific U-box N-terminal domain."
definition: >-
  U-box domain, a modified RING finger, found in Arabidopsis plant U-box proteins (AtPUB) and similar proteins. The plant PUB proteins, also known as U-box domain-containing proteins, are much more numerous in Arabidopsis which has 62 in comparison with the typical 6 in most animals. The majority of AtPUBs in this subfamily are known as ARM domain-containing PUB proteins, containing a C-terminally-located, tandem ARM (armadillo) repeat protein-interaction region in addition to the U-box domain. They have been implicated in the regulation of cell death and defense. They also play important roles in other plant-specific pathways, such as controlling both self-incompatibility and pseudo-self-incompatibility, as well as acting in abiotic stress. A subgroup of ARM domain-containing PUB proteins harbors a plant-specific U-box N-terminal domain. — an NCBI CDD conserved domain (cd16664); members share this curated model.
