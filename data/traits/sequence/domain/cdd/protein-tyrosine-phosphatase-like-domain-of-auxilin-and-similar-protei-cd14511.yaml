identifier: CDD:cd14511
label: "protein tyrosine phosphatase-like domain of auxilin and similar proteins. This subfamily contains proteins similar to auxilin, characterized by also containing a J domain. It includes auxilin, also called auxilin-1, and cyclin-G-associated kinase (GAK), also called auxilin-2. Auxilin-1 and -2 facilitate Hsc70-mediated dissociation of clathrin from clathrin-coated vesicles. GAK is expressed ubiquitously and is enriched in the Golgi, while auxilin-1 which is nerve-specific. Both proteins contain a protein tyrosine phosphatase (PTP)-like domain similar to the PTP-like domain of PTEN (a phosphoinositide 3-phosphatase), and a C-terminal region with clathrin-binding and J domains. In addition, GAK contains an N-terminal protein kinase domain that phosphorylates the mu subunits of adaptor protein (AP) 1 and AP2."
definition: >-
  protein tyrosine phosphatase-like domain of auxilin and similar proteins. This subfamily contains proteins similar to auxilin, characterized by also containing a J domain. It includes auxilin, also called auxilin-1, and cyclin-G-associated kinase (GAK), also called auxilin-2. Auxilin-1 and -2 facilitate Hsc70-mediated dissociation of clathrin from clathrin-coated vesicles. GAK is expressed ubiquitously and is enriched in the Golgi, while auxilin-1 which is nerve-specific. Both proteins contain a protein tyrosine phosphatase (PTP)-like domain similar to the PTP-like domain of PTEN (a phosphoinositide 3-phosphatase), and a C-terminal region with clathrin-binding and J domains. In addition, GAK contains an N-terminal protein kinase domain that phosphorylates the mu subunits of adaptor protein (AP) 1 and AP2. — an NCBI CDD conserved domain (cd14511); members share this curated model.
