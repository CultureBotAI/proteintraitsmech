identifier: CDD:cd20022
label: "Forkhead (FH) domain found in the Forkhead box protein H (FOXH) subfamily. The FOXH subfamily includes a winged helix transcription factor, FOXH1, which is also called Forkhead activin signal transducer 1 (Fast-1), or Forkhead activin signal transducer 2 (Fast-2). FOXH1 acts as a transcriptional activator that recognizes and binds to the DNA sequence 5'-TGT[GT][GT]ATT-3'. It is required for induction of the goosecoid (GSC) promoter by TGF-beta or activin signaling. FOXH1 forms a transcriptionally active complex containing FOXH1/SMAD2/SMAD4 on a site on the GSC promoter called TARE (TGF-beta/activin response element). The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein H (FOXH) subfamily. The FOXH subfamily includes a winged helix transcription factor, FOXH1, which is also called Forkhead activin signal transducer 1 (Fast-1), or Forkhead activin signal transducer 2 (Fast-2). FOXH1 acts as a transcriptional activator that recognizes and binds to the DNA sequence 5'-TGT[GT][GT]ATT-3'. It is required for induction of the goosecoid (GSC) promoter by TGF-beta or activin signaling. FOXH1 forms a transcriptionally active complex containing FOXH1/SMAD2/SMAD4 on a site on the GSC promoter called TARE (TGF-beta/activin response element). The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20022); members share this curated model.
