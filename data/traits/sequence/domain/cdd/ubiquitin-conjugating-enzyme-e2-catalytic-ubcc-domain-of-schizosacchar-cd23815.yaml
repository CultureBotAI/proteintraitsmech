identifier: CDD:cd23815
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of Schizosaccharomyces pombe UBC14 and related proteins. Schizosaccharomyces pombe UBC14 (EC 2.3.2.23), also called ubiquitin-conjugating enzyme E2 14, E2 ubiquitin-conjugating enzyme 14, ubiquitin carrier protein 14, or ubiquitin-protein ligase 14, acts as a ubiquitin-conjugating enzyme that catalyzes the covalent attachment of ubiquitin to other proteins. It mediates the selective degradation of short-lived and abnormal proteins."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of Schizosaccharomyces pombe UBC14 and related proteins. Schizosaccharomyces pombe UBC14 (EC 2.3.2.23), also called ubiquitin-conjugating enzyme E2 14, E2 ubiquitin-conjugating enzyme 14, ubiquitin carrier protein 14, or ubiquitin-protein ligase 14, acts as a ubiquitin-conjugating enzyme that catalyzes the covalent attachment of ubiquitin to other proteins. It mediates the selective degradation of short-lived and abnormal proteins. — an NCBI CDD conserved domain (cd23815); members share this curated model.
