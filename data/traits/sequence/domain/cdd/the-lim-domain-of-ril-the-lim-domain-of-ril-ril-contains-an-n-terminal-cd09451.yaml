identifier: CDD:cd09451
label: "The LIM domain of RIL. The LIM domain of RIL: RIL contains an N-terminal PDZ domain, a LIM domain, and a short consensus C-terminal region. It is the smallest molecule in the ALP LIM domain containing protein family. RIL was identified in rat fibroblasts and in human lymphocytes. The LIM domain interacts with the AMPA glutamate receptor in dendritic spines. The consensus C-terminus interacts with PTP-BL, a submembranous protein tyrosine phosphatase and the PDZ domain is responsible to interact with alpha-actinin molecules. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The LIM domain of RIL. The LIM domain of RIL: RIL contains an N-terminal PDZ domain, a LIM domain, and a short consensus C-terminal region. It is the smallest molecule in the ALP LIM domain containing protein family. RIL was identified in rat fibroblasts and in human lymphocytes. The LIM domain interacts with the AMPA glutamate receptor in dendritic spines. The consensus C-terminus interacts with PTP-BL, a submembranous protein tyrosine phosphatase and the PDZ domain is responsible to interact with alpha-actinin molecules. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09451); members share this curated model.
