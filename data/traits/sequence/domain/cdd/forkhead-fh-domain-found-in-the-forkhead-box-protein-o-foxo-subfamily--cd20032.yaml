identifier: CDD:cd20032
label: FH_FOXO
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein O (FOXO) subfamily. The FOXO subfamily includes several winged helix transcription factors: FOXO1, FOXO3, FOXO4 and FOXO6. FOXO transcription factors are involved in the regulation of longevity phenomenon via insulin and insulin-like growth factor signaling. All FOXOs bind to the consensus sequence 5'-GTAAACAA-3', known as the DAF-16 family member-binding element, which includes the core sequence 5'-(A/C)AA(C/T)A-3' recognized by all FOX family members. FOXO1, also called Forkhead box protein O1A or Forkhead in rhabdomyosarcoma (FKHR), is a transcription factor that is the main target of insulin signaling and regulates metabolic homeostasis in response to oxidative stress. FOXO3, also called AF6q21 protein or Forkhead in rhabdomyosarcoma-like 1 (FKHRL1), is a transcriptional activator which triggers apoptosis in the absence of survival factors, including neuronal cell death upon oxidative stress. It recognizes and binds to the DNA sequence 5'-[AG]TAAA[TC]A-3'. FOXO4, also called Fork head domain transcription factor AFX1, is a transcription factor involved in the regulation of the insulin signaling pathway. It binds to insulin-response elements (IREs) and can activate transcription of IGFBP1. FOXO6 acts as a transcriptional activator that may play an important role on tumor invasion, metastasis, and prognosis. The FH domain is a winged helix DNA-binding domain
