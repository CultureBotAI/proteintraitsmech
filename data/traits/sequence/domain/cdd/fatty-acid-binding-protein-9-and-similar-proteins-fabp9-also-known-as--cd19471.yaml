identifier: CDD:cd19471
label: "fatty acid binding protein 9 and similar proteins. FABP9 (also known as testis-FABP, T-FABP, PERF15) is a major protein found in the inner acrosomal membrane and outer face of the nuclear envelope of mammalian sperm. Its expression is increased in prostate cancer. This subgroup belongs to the intracellular fatty-acid binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
