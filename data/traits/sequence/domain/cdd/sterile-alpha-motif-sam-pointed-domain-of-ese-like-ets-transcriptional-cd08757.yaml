identifier: CDD:cd08757
label: "Sterile alpha motif (SAM)/Pointed domain of ESE-like ETS transcriptional regulators. SAM Pointed domain of ESE-like (Epithelium-Specific ETS) subfamily of ETS transcriptional regulators is a putative protein-protein interaction domain. It can act as a major transactivator by providing a potential docking site for co-activators. ETS factors are important for cell differentiation. They can be involved in regulation of gene expression in different types of epithelial cells. They are expressed in salivary gland, intestine, stomach, pancreas, lungs, kidneys, colon, mammary gland, and prostate. Members of this group are proto-oncogenes. Expression profiles of these factors are altered in epithelial cancers, which makes them potential targets for cancer therapy."
