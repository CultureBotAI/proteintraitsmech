identifier: CDD:cd00802
label: "catalytic core domain of class I amino acyl-tRNA synthetase. Class I amino acyl-tRNA synthetase (aaRS) catalytic core domain. These enzymes are mostly monomers which aminoacylate the 2'-OH of the nucleotide at the 3' of the appropriate tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the characteristic class I HIGH and KMSKS motifs, which are involved in ATP binding."
definition: >-
  catalytic core domain of class I amino acyl-tRNA synthetase. Class I amino acyl-tRNA synthetase (aaRS) catalytic core domain. These enzymes are mostly monomers which aminoacylate the 2'-OH of the nucleotide at the 3' of the appropriate tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the characteristic class I HIGH and KMSKS motifs, which are involved in ATP binding. — an NCBI CDD conserved domain (cd00802); members share this curated model.
