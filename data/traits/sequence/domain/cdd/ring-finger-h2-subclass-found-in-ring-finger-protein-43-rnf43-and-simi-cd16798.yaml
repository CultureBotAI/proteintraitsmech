identifier: CDD:cd16798
label: "RING finger, H2 subclass, found in RING finger protein 43 (RNF43) and similar proteins. RNF43 is a transmembrane E3 ubiquitin-protein ligase that plays an important role in frizzled (FZD)-dependent regulation of the Wnt/beta-catenin pathway. It functions as a tumor suppressor that inhibits Wnt/beta-catenin signaling by ubiquitinating FZD receptor and targeting it to the lysosomal pathway for degradation. miR-550a-5p directly targeted the 3'-UTR of gene RNF43 and regulated its expression. Moreover, RNF43 interacts with NEDD-4-like ubiquitin-protein ligase-1 (NEDL1) and regulates p53-mediated transcription. It may also be involved in cell growth control through the interaction with HAP95, a chromatin-associated protein interfacing the nuclear envelope. Mutations of RNF43 have been identified in various tumors, including colorectal cancer (CRC), endometrial cancer, mucinous ovarian tumors, gastric adenocarcinoma, pancreatic ductal adenocarcinoma, liver fluke-associated cholangiocarcinoma, hepatocellular carcinoma, and glioma. RNF43 contains an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C3H2C3-type RING-H2 finger followed by a long C-terminal region."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 43 (RNF43) and similar proteins. RNF43 is a transmembrane E3 ubiquitin-protein ligase that plays an important role in frizzled (FZD)-dependent regulation of the Wnt/beta-catenin pathway. It functions as a tumor suppressor that inhibits Wnt/beta-catenin signaling by ubiquitinating FZD receptor and targeting it to the lysosomal pathway for degradation. miR-550a-5p directly targeted the 3'-UTR of gene RNF43 and regulated its expression. Moreover, RNF43 interacts with NEDD-4-like ubiquitin-protein ligase-1 (NEDL1) and regulates p53-mediated transcription. It may also be involved in cell growth control through the interaction with HAP95, a chromatin-associated protein interfacing the nuclear envelope. Mutations of RNF43 have been identified in various tumors, including colorectal cancer (CRC), endometrial cancer, mucinous ovarian tumors, gastric adenocarcinoma, pancreatic ductal adenocarcinoma, liver fluke-associated cholangiocarcinoma, hepatocellular carcinoma, and glioma. RNF43 contains an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C3H2C3-type RING-H2 finger followed by a long C-terminal region. — an NCBI CDD conserved domain (cd16798); members share this curated model.
