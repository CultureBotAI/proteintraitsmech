identifier: CDD:cd08732
label: "Uncharacterized Regulator of G protein Signaling (RGS) domain subfamily, child 4. These uncharacterized RGS-like domains consists largely of hypothetical proteins. The RGS domain is an essential part of the Regulator of G-protein Signaling (RGS) protein family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory role as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. RGS proteins play critical regulatory role as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. Several RGS proteins can fine-tune immune responses, while others play an important role in neuronal signal modulation. Some RGS proteins are the principal elements needed for proper vision."
definition: >-
  Uncharacterized Regulator of G protein Signaling (RGS) domain subfamily, child 4. These uncharacterized RGS-like domains consists largely of hypothetical proteins. The RGS domain is an essential part of the Regulator of G-protein Signaling (RGS) protein family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory role as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. RGS proteins play critical regulatory role as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. Several RGS proteins can fine-tune immune responses, while others play an important role in neuronal signal modulation. Some RGS proteins are the principal elements needed for proper vision. — an NCBI CDD conserved domain (cd08732); members share this curated model.
