identifier: CDD:cd11431
label: "basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster protein taxi and similar proteins. Protein taxi, also termed protein delilah (Dei), is a bHLH transcription factor that is involved in regulation of cell adhesion and attachment that is expressed in specialized cells that provide anchoring sites to either muscles (tendon cells), or proprioceptors (chordotonal attachment cells) during embryonic development. It probably plays an important role in the differentiation of epidermal cells into the tendon cells that form the attachment sites for all muscles."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster protein taxi and similar proteins. Protein taxi, also termed protein delilah (Dei), is a bHLH transcription factor that is involved in regulation of cell adhesion and attachment that is expressed in specialized cells that provide anchoring sites to either muscles (tendon cells), or proprioceptors (chordotonal attachment cells) during embryonic development. It probably plays an important role in the differentiation of epidermal cells into the tendon cells that form the attachment sites for all muscles. — an NCBI CDD conserved domain (cd11431); members share this curated model.
