identifier: CDD:cd20728
label: "uncharacterized protein Thermoproteus tenax OrfY and similar proteins. OrfY is a protein of unknown function derived from the hyperthermophilic archaeum Thermoproteus tenax. OrfY was predicted to belong to a class of bacterial transcription factors possibly activated by trehalose derivatives due to its co-occurrence with the treS/P protein in an operon structure regulating the synthesis of trehalose and possible implications in trehalose metabolism."
definition: >-
  uncharacterized protein Thermoproteus tenax OrfY and similar proteins. OrfY is a protein of unknown function derived from the hyperthermophilic archaeum Thermoproteus tenax. OrfY was predicted to belong to a class of bacterial transcription factors possibly activated by trehalose derivatives due to its co-occurrence with the treS/P protein in an operon structure regulating the synthesis of trehalose and possible implications in trehalose metabolism. — an NCBI CDD conserved domain (cd20728); members share this curated model.
