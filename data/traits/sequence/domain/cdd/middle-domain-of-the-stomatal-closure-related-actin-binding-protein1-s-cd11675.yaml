identifier: CDD:cd11675
label: "middle domain of the stomatal closure-related actin binding protein1. SCAB1 is a dimeric actin crosslinker conserved in plants. The three-dimensional structure of this domain resembles that of fibronectin type III repeat units and immunoglobulins. It is situated between a coiled-coil dimerization domain and a C-terminal pleckstrin homology-like module. SCAB1 appears to be required for normal actin dynamics in guard cells stomatal movement. The function of the middle domain is not clear."
definition: >-
  middle domain of the stomatal closure-related actin binding protein1. SCAB1 is a dimeric actin crosslinker conserved in plants. The three-dimensional structure of this domain resembles that of fibronectin type III repeat units and immunoglobulins. It is situated between a coiled-coil dimerization domain and a C-terminal pleckstrin homology-like module. SCAB1 appears to be required for normal actin dynamics in guard cells stomatal movement. The function of the middle domain is not clear. — an NCBI CDD conserved domain (cd11675); members share this curated model.
