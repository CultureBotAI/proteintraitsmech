identifier: CDD:cd07126
label: "Delta(1)-pyrroline-5-carboxylate dehydrogenase, ALDH family 12. Delta(1)-pyrroline-5-carboxylate dehydrogenase (P5CDH, EC=1.5.1.12), family 12: a proline catabolic enzyme of the aldehyde dehydrogenase (ALDH) protein superfamily. P5CDH is a mitochondrial enzyme involved in proline degradation and catalyzes the NAD + -dependent conversion of P5C to glutamate.  The P5CDH, ALDH12A1 gene, in Arabidopsis, has been identified as an osmotic-stress-inducible ALDH gene. This CD contains both Viridiplantae and Alveolata P5CDH sequences."
definition: >-
  Delta(1)-pyrroline-5-carboxylate dehydrogenase, ALDH family 12. Delta(1)-pyrroline-5-carboxylate dehydrogenase (P5CDH, EC=1.5.1.12), family 12: a proline catabolic enzyme of the aldehyde dehydrogenase (ALDH) protein superfamily. P5CDH is a mitochondrial enzyme involved in proline degradation and catalyzes the NAD + -dependent conversion of P5C to glutamate. The P5CDH, ALDH12A1 gene, in Arabidopsis, has been identified as an osmotic-stress-inducible ALDH gene. This CD contains both Viridiplantae and Alveolata P5CDH sequences. — an NCBI CDD conserved domain (cd07126); members share this curated model.
