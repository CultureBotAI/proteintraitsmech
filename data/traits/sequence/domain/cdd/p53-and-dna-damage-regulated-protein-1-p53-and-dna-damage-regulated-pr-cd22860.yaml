identifier: CDD:cd22860
label: "p53 and DNA damage-regulated protein 1. p53 and DNA damage-regulated protein 1 (PDRG1) is a beta-type subunit of the prefoldin-like complex that is part of the PAQosome (Particle for Arrangement of Quaternary structure) complex. The PAQosome is a cochaperone that assists the chaperone HSP90 in assembly of large protein complexes. PDRG1 acts as a tumor marker in multiple cancer types, including testicular cancer, lung cancer, colorectal cancer, liver cancer, etc. Prefoldin is a hexameric molecular chaperone complex, found in both eukaryotes and archaea, that binds and stabilizes newly synthesized polypeptides allowing them to fold correctly.  The complex contains two alpha and four beta subunits, the two subunits being evolutionarily related."
definition: >-
  p53 and DNA damage-regulated protein 1. p53 and DNA damage-regulated protein 1 (PDRG1) is a beta-type subunit of the prefoldin-like complex that is part of the PAQosome (Particle for Arrangement of Quaternary structure) complex. The PAQosome is a cochaperone that assists the chaperone HSP90 in assembly of large protein complexes. PDRG1 acts as a tumor marker in multiple cancer types, including testicular cancer, lung cancer, colorectal cancer, liver cancer, etc. Prefoldin is a hexameric molecular chaperone complex, found in both eukaryotes and archaea, that binds and stabilizes newly synthesized polypeptides allowing them to fold correctly. The complex contains two alpha and four beta subunits, the two subunits being evolutionarily related. — an NCBI CDD conserved domain (cd22860); members share this curated model.
