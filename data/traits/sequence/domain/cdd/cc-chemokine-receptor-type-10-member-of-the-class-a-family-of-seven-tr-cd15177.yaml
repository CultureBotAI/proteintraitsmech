identifier: CDD:cd15177
label: "CC chemokine receptor type 10, member of the class A family of seven-transmembrane G protein-coupled receptors. CCR10 is a homeostatic receptor specific for two C-C motif chemokines, CCL27 and CCL28.  Activation of CCR10 by its two ligands mediates diverse activities, ranging from leukocyte trafficking to skin cancer. Chemokines are principal regulators for leukocyte trafficking, recruitment, and activation. Chemokine family membership is defined on the basis of sequence homology and on the presence of variations on a conserved cysteine motif, which allows the family to further divide into four subfamilies (CC, CXC, XC, and CX3C). Chemokines interact with seven-transmembrane receptors which are typically coupled to G protein for signaling. Currently, there are ten known receptors for CC chemokines, seven for CXC chemokines, and single receptors for the XC and CX3C chemokines. The CC chemokine receptors are all activating the G protein Gi."
definition: >-
  CC chemokine receptor type 10, member of the class A family of seven-transmembrane G protein-coupled receptors. CCR10 is a homeostatic receptor specific for two C-C motif chemokines, CCL27 and CCL28. Activation of CCR10 by its two ligands mediates diverse activities, ranging from leukocyte trafficking to skin cancer. Chemokines are principal regulators for leukocyte trafficking, recruitment, and activation. Chemokine family membership is defined on the basis of sequence homology and on the presence of variations on a conserved cysteine motif, which allows the family to further divide into four subfamilies (CC, CXC, XC, and CX3C). Chemokines interact with seven-transmembrane receptors which are typically coupled to G protein for signaling. Currently, there are ten known receptors for CC chemokines, seven for CXC chemokines, and single receptors for the XC and CX3C chemokines. The CC chemokine receptors are all activating the G protein Gi. — an NCBI CDD conserved domain (cd15177); members share this curated model.
