identifier: CDD:cd20053
label: "Forkhead (FH) domain found in Forkhead box protein I1 (FOXI1) and similar proteins. FOXI1 is also called Forkhead-related protein FKHL10, Forkhead-related transcription factor 6 (FREAC-6), Hepatocyte nuclear factor 3 Forkhead homolog 3 (HFH-3), or HNF-3/fork-head homolog 3. It is a master regulator of vacuolar H-ATPase proton pump subunits in the inner ear, kidney, and epididymis, and is required for the development of normal hearing, sense of balance, and kidney function. Its epididymal expression is required for male fertility. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein I1 (FOXI1) and similar proteins. FOXI1 is also called Forkhead-related protein FKHL10, Forkhead-related transcription factor 6 (FREAC-6), Hepatocyte nuclear factor 3 Forkhead homolog 3 (HFH-3), or HNF-3/fork-head homolog 3. It is a master regulator of vacuolar H-ATPase proton pump subunits in the inner ear, kidney, and epididymis, and is required for the development of normal hearing, sense of balance, and kidney function. Its epididymal expression is required for male fertility. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20053); members share this curated model.
