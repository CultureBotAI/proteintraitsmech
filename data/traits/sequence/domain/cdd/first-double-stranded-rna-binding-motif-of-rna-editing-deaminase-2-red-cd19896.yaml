identifier: CDD:cd19896
label: "first double-stranded RNA binding motif of RNA-editing deaminase 2 (RED2) and similar proteins. RED2 (also known as double-stranded RNA-specific editase B2, RNA-dependent adenosine deaminase 3, RNA-editing enzyme 2, dsRNA adenosine deaminase B2, ADAR3, or ADARB2) prevents the binding of other ADAR enzymes to targets in vitro, and decreases the efficiency of  these enzymes. It is capable of binding to dsRNA but also to ssRNA. RED2 contains two double-stranded RNA binding motifs (DSRMs) and a C-terminal RNA-specific adenosine-deaminase (editase) domain. This model describes the first DSRM. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. RED2 lacks editing activity for currently known substrate RNAs, and may have an inactive editase domain."
definition: >-
  first double-stranded RNA binding motif of RNA-editing deaminase 2 (RED2) and similar proteins. RED2 (also known as double-stranded RNA-specific editase B2, RNA-dependent adenosine deaminase 3, RNA-editing enzyme 2, dsRNA adenosine deaminase B2, ADAR3, or ADARB2) prevents the binding of other ADAR enzymes to targets in vitro, and decreases the efficiency of these enzymes. It is capable of binding to dsRNA but also to ssRNA. RED2 contains two double-stranded RNA binding motifs (DSRMs) and a C-terminal RNA-specific adenosine-deaminase (editase) domain. This model describes the first DSRM. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. RED2 lacks editing activity for currently known substrate RNAs, and may have an inactive editase domain. — an NCBI CDD conserved domain (cd19896); members share this curated model.
