identifier: CDD:cd08308
label: "Death domain of Tube. Death domains (DDs) similar to the DD in the protein Tube from Drosophila melanogaster. In Drosophila, interaction between the DDs of Tube and Pelle is an important component of the Toll pathway, which functions in establishing dorsoventral polarity in embryos and also in mediating innate immune response to pathogens. Tube and Pelle transmit the signal from the Toll receptor to the Dorsal/Cactus complex. Some members of this subfamily contain a C-terminal kinase domain, like Pelle, in addition to the DD. Tube has no counterpart in vertebrates. It contains an N-terminal DD and a C-terminal region with five copies of the Tube repeat, an 8-amino acid motif. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Death domain of Tube. Death domains (DDs) similar to the DD in the protein Tube from Drosophila melanogaster. In Drosophila, interaction between the DDs of Tube and Pelle is an important component of the Toll pathway, which functions in establishing dorsoventral polarity in embryos and also in mediating innate immune response to pathogens. Tube and Pelle transmit the signal from the Toll receptor to the Dorsal/Cactus complex. Some members of this subfamily contain a C-terminal kinase domain, like Pelle, in addition to the DD. Tube has no counterpart in vertebrates. It contains an N-terminal DD and a C-terminal region with five copies of the Tube repeat, an 8-amino acid motif. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08308); members share this curated model.
