identifier: CDD:cd21783
label: "C-terminal domain found in Drosophila melanogaster JmjC domain-containing histone demethylation protein 1 and similar proteins. JmjC domain-containing histone demethylation protein 1 (Jhd1), also called lysine (K)-specific demethylase 2 (KDM2), or [Histone-H3]-lysine-36 demethylase 1, is a histone demethylase (EC 1.14.11.27) that specifically demethylates 'Lys-36' of histone H3, thereby playing a central role in the histone code. Jhd1 consists of two Jumonji domains (JmjN and JmjC), a CXXC zinc-finger domain, a plant homeodomain (PHD) finger, an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain. This model corresponds to a small conserved region in Jhd1 between the JmjC domain and the CXXC zinc-finger domain, which has been called the C-terminal domain by literature."
definition: >-
  C-terminal domain found in Drosophila melanogaster JmjC domain-containing histone demethylation protein 1 and similar proteins. JmjC domain-containing histone demethylation protein 1 (Jhd1), also called lysine (K)-specific demethylase 2 (KDM2), or [Histone-H3]-lysine-36 demethylase 1, is a histone demethylase (EC 1.14.11.27) that specifically demethylates 'Lys-36' of histone H3, thereby playing a central role in the histone code. Jhd1 consists of two Jumonji domains (JmjN and JmjC), a CXXC zinc-finger domain, a plant homeodomain (PHD) finger, an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain. This model corresponds to a small conserved region in Jhd1 between the JmjC domain and the CXXC zinc-finger domain, which has been called the C-terminal domain by literature. — an NCBI CDD conserved domain (cd21783); members share this curated model.
