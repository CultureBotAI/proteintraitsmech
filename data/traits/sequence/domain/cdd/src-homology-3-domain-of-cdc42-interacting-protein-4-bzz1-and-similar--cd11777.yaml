identifier: CDD:cd11777
label: "Src Homology 3 domain of Cdc42-Interacting Protein 4, Bzz1 and similar domains. This subfamily is composed of Cdc42-Interacting Protein 4 (CIP4) and similar proteins such as Formin Binding Protein 17 (FBP17) and FormiN Binding Protein 1-Like (FNBP1L), as well as yeast Bzz1 (or Bzz1p). CIP4 and FNBP1L are Cdc42 effectors that bind Wiskott-Aldrich syndrome protein (WASP) and function in endocytosis. CIP4 and FBP17 bind to the Fas ligand and may be implicated in the inflammatory response. CIP4 may also play a role in phagocytosis. Bzz1 is also a WASP/Las17-interacting protein involved in endocytosis and trafficking to the vacuole. It physically interacts with type I myosins and functions in the early steps of endocytosis. Members of this subfamily contain an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain as well as at least one C-terminal SH3 domain. Bzz1 contains a second SH3 domain at the C-terminus. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Cdc42-Interacting Protein 4, Bzz1 and similar domains. This subfamily is composed of Cdc42-Interacting Protein 4 (CIP4) and similar proteins such as Formin Binding Protein 17 (FBP17) and FormiN Binding Protein 1-Like (FNBP1L), as well as yeast Bzz1 (or Bzz1p). CIP4 and FNBP1L are Cdc42 effectors that bind Wiskott-Aldrich syndrome protein (WASP) and function in endocytosis. CIP4 and FBP17 bind to the Fas ligand and may be implicated in the inflammatory response. CIP4 may also play a role in phagocytosis. Bzz1 is also a WASP/Las17-interacting protein involved in endocytosis and trafficking to the vacuole. It physically interacts with type I myosins and functions in the early steps of endocytosis. Members of this subfamily contain an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain as well as at least one C-terminal SH3 domain. Bzz1 contains a second SH3 domain at the C-terminus. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11777); members share this curated model.
