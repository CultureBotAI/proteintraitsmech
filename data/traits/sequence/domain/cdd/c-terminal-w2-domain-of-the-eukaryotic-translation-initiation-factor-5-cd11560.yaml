identifier: CDD:cd11560
label: "C-terminal W2 domain of the eukaryotic translation initiation factor 5C and similar proteins. eIF5C appears to be essential for the initiation of protein translation; its actual function, and specifically that of the C-terminal W2 domain, are not well understood. The Drosophila ortholog, kra (krasavietz) or exba (extra bases), may be involved in translational inhibition in neural development. The structure of this C-terminal domain resembles that of a set of concatenated HEAT repeats."
definition: >-
  C-terminal W2 domain of the eukaryotic translation initiation factor 5C and similar proteins. eIF5C appears to be essential for the initiation of protein translation; its actual function, and specifically that of the C-terminal W2 domain, are not well understood. The Drosophila ortholog, kra (krasavietz) or exba (extra bases), may be involved in translational inhibition in neural development. The structure of this C-terminal domain resembles that of a set of concatenated HEAT repeats. — an NCBI CDD conserved domain (cd11560); members share this curated model.
