identifier: CDD:cd05438
label: NT_POLXc_Mu
definition: >-
  Nucleotidyltransferase (NT) domain of Pol mu and related proteins. NT_PolXc_Mu: A subgroup of the Polymerase X family DNA polymerase domain containing proteins similar to human (h)Pol mu. hPol mu has been implicated in non-homologous end joining (NHEJ) repair of DNA double-strand breaks, and in NHEJ repair of intermediates in V(D)J recombination; in the latter process, Pol mu contributes to the restricted light chain junctional diversity. hPol mu is a DNA template-dependent polymerase which lacks exonuclease proofreading activity; it is a low fidelity polymerase able to extend mispaired primer-termini. hPol Mu has some intrinsic template-independent terminal deoxyribonucleotidyl transferase (TdT)-like activity. hPol Mu can also act as a DNA-directed RNA polymerase, and as a DNA-independent RNA polymerases. hPol mu has an N-terminal BRCT (BRCA1 C-terminal) domain through which it interacts with end-joining factors, Ku, and the XRCC4: DNA ligase IV complex. hPOL Mu is preferentially expressed in secondary lymphoid tissues. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these PolXc_Mu NT domains
