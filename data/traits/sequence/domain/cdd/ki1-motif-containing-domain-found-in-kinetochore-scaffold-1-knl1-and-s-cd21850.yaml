identifier: CDD:cd21850
label: "KI1 motif-containing domain found in kinetochore scaffold 1 (KNL1) and similar proteins. KNL1, also called ALL1-fused gene from chromosome 15q14 protein (AF15q14), or Bub-linking kinetochore protein (Blinkin), or cancer susceptibility candidate gene 5 protein (CASC5), or cancer/testis antigen 29 (CT29), or Kinetochore-null protein 1, or protein D40/AF15q14, plays crucial roles during mitosis. It is essential for spindle-assembly checkpoint signaling and for correct chromosome alignment. It is required for attachment of the kinetochores to the spindle microtubules. KNL1 directly links BUB1 and BUB1B to kinetochores. It is part of the MIS12 complex, which may be fundamental for kinetochore formation and proper chromosome segregation during mitosis. KNL1 also acts in coordination with CENPK to recruit the NDC80 complex to the outer kinetochore. In the N-terminal region of KNL1, there are two conserved KI motifs (from the first two residues of their consensus sequence, KI(D/N)XXXF(L/I)XXLK, in which X's are nonconserved residues), which directly interact with TPRs of Bub1 and BubR1, respectively. The model corresponds to KI1 motif-containing domain, also called Bub1-binding domain."
definition: >-
  KI1 motif-containing domain found in kinetochore scaffold 1 (KNL1) and similar proteins. KNL1, also called ALL1-fused gene from chromosome 15q14 protein (AF15q14), or Bub-linking kinetochore protein (Blinkin), or cancer susceptibility candidate gene 5 protein (CASC5), or cancer/testis antigen 29 (CT29), or Kinetochore-null protein 1, or protein D40/AF15q14, plays crucial roles during mitosis. It is essential for spindle-assembly checkpoint signaling and for correct chromosome alignment. It is required for attachment of the kinetochores to the spindle microtubules. KNL1 directly links BUB1 and BUB1B to kinetochores. It is part of the MIS12 complex, which may be fundamental for kinetochore formation and proper chromosome segregation during mitosis. KNL1 also acts in coordination with CENPK to recruit the NDC80 complex to the outer kinetochore. In the N-terminal region of KNL1, there are two conserved KI motifs (from the first two residues of their consensus sequence, KI(D/N)XXXF(L/I)XXLK, in which X's are nonconserved residues), which directly interact with TPRs of Bub1 and BubR1, respectively. The model corresponds to KI1 motif-containing domain, also called Bub1-binding domain. — an NCBI CDD conserved domain (cd21850); members share this curated model.
