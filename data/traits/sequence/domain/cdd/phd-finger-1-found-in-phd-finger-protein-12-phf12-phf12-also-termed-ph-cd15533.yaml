identifier: CDD:cd15533
label: "PHD finger 1 found in PHD finger protein 12 (PHF12). PHF12, also termed PHD factor 1 (Pf1), is a plant homeodomain (PHD) zinc finger-containing protein that bridges the transducin-like enhancer of split (TLE) corepressor to the mSin3A-histone deacetylase (HDAC)-complex, and further represses transcription at targeted genes. PHF12 also interacts with MRG15 (mortality factor-related genes on chromosome 15), a member of the mortality factor (MORF) family of proteins implicated in regulating cellular senescence. PHF12 contains two plant-homeodomain (PHD) zinc fingers followed by a polybasic region. The PHD fingers function downstream of phosphoinositide signaling triggered by the interaction between polybasic regions and phosphoinositides. This model corresponds to the first PHD finger."
definition: >-
  PHD finger 1 found in PHD finger protein 12 (PHF12). PHF12, also termed PHD factor 1 (Pf1), is a plant homeodomain (PHD) zinc finger-containing protein that bridges the transducin-like enhancer of split (TLE) corepressor to the mSin3A-histone deacetylase (HDAC)-complex, and further represses transcription at targeted genes. PHF12 also interacts with MRG15 (mortality factor-related genes on chromosome 15), a member of the mortality factor (MORF) family of proteins implicated in regulating cellular senescence. PHF12 contains two plant-homeodomain (PHD) zinc fingers followed by a polybasic region. The PHD fingers function downstream of phosphoinositide signaling triggered by the interaction between polybasic regions and phosphoinositides. This model corresponds to the first PHD finger. — an NCBI CDD conserved domain (cd15533); members share this curated model.
