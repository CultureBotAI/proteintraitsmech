identifier: CDD:cd16163
label: "OCRE domain found in RNA-binding protein 6 (RBM6) and similar proteins. RBM6, also called lung cancer antigen NY-LU-12, or protein G16, or RNA-binding protein DEF-3, has been predicted to be a nuclear factor based on its nuclear localization signal. It shows high sequence similarity to RNA-binding protein 5 (RBM5 or LUCA15 or NY-REN-9). Both specifically binds poly(G) RNA. RBM6 contain two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), an OCtamer REpeat (OCRE) domain, two C2H2-type zinc fingers, a nuclear localization signal, and a G-patch/D111 domain. In contrast to RBM5, RBM6 has an additional unique domain, the POZ (poxvirus and zinc finger) domain, which may be involved in protein-protein interactions and inhibit binding of target sequences by zinc fingers."
definition: >-
  OCRE domain found in RNA-binding protein 6 (RBM6) and similar proteins. RBM6, also called lung cancer antigen NY-LU-12, or protein G16, or RNA-binding protein DEF-3, has been predicted to be a nuclear factor based on its nuclear localization signal. It shows high sequence similarity to RNA-binding protein 5 (RBM5 or LUCA15 or NY-REN-9). Both specifically binds poly(G) RNA. RBM6 contain two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), an OCtamer REpeat (OCRE) domain, two C2H2-type zinc fingers, a nuclear localization signal, and a G-patch/D111 domain. In contrast to RBM5, RBM6 has an additional unique domain, the POZ (poxvirus and zinc finger) domain, which may be involved in protein-protein interactions and inhibit binding of target sequences by zinc fingers. — an NCBI CDD conserved domain (cd16163); members share this curated model.
