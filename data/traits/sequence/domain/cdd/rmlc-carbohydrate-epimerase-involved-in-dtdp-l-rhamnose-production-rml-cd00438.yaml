identifier: CDD:cd00438
label: "RmlC carbohydrate epimerase, involved in dTDP-L-rhamnose production. RmlC (deoxythymidine diphosphate (dTDP)-4-keto-6-deoxy-D-hexulose 3, 5-epimerase or dTDP-6-deoxy-D-xylo-4-hexulose 3,5-epimerase; also known as RfbC) is a carbohydrate epimerase involved in the production of dTDP-L-rhamnose, a precursor of the bacterial cell wall constituent, L-rhamnose. L-Rhamnose (6-deoxy-l-mannose) plays an important role in the cell-wall structure of many bacterial species. It has been found to contribute to the virulence of several species, including the Gram-negative Salmonella enterica and Vibrio cholerae, where it is present as a part of the O-antigen, and is essential for the growth of Gram-positive bacteria such as Streptococcus pyogenes. RmlC converts dTDP-6-deoxy-D-xylo-4-hexulose to dTDP-6-deoxy-L-xylo-hexulose by catalyzing the epimerization of the 5-methyl and 3-hydroxyl groups of hexulose, the third of four steps in the dTDP-L-rhamnose biosynthetic pathway. RmlC belongs to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  RmlC carbohydrate epimerase, involved in dTDP-L-rhamnose production. RmlC (deoxythymidine diphosphate (dTDP)-4-keto-6-deoxy-D-hexulose 3, 5-epimerase or dTDP-6-deoxy-D-xylo-4-hexulose 3,5-epimerase; also known as RfbC) is a carbohydrate epimerase involved in the production of dTDP-L-rhamnose, a precursor of the bacterial cell wall constituent, L-rhamnose. L-Rhamnose (6-deoxy-l-mannose) plays an important role in the cell-wall structure of many bacterial species. It has been found to contribute to the virulence of several species, including the Gram-negative Salmonella enterica and Vibrio cholerae, where it is present as a part of the O-antigen, and is essential for the growth of Gram-positive bacteria such as Streptococcus pyogenes. RmlC converts dTDP-6-deoxy-D-xylo-4-hexulose to dTDP-6-deoxy-L-xylo-hexulose by catalyzing the epimerization of the 5-methyl and 3-hydroxyl groups of hexulose, the third of four steps in the dTDP-L-rhamnose biosynthetic pathway. RmlC belongs to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd00438); members share this curated model.
