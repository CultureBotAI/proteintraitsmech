identifier: CDD:cd08311
label: "Death domain of p75 Neurotrophin Receptor. Death Domain (DD) found in p75 neurotrophin receptor (p75NTR, NGFR, TNFRSF16). p75NTR binds members of the neurotrophin (NT) family including nerve growth factor (NGF), brain-derived neurotrophic factor (BDNF), and NT3, among others. It contains an NT-binding extracellular region that bears four cysteine-rich repeats, a transmembrane domain, and an intracellular DD. p75NTR plays roles in the immune, vascular, and nervous systems, and has been shown to promote cell death or survival, and to induce neurite outgrowth or collapse depending on its ligands and co-receptors. In general, DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Death domain of p75 Neurotrophin Receptor. Death Domain (DD) found in p75 neurotrophin receptor (p75NTR, NGFR, TNFRSF16). p75NTR binds members of the neurotrophin (NT) family including nerve growth factor (NGF), brain-derived neurotrophic factor (BDNF), and NT3, among others. It contains an NT-binding extracellular region that bears four cysteine-rich repeats, a transmembrane domain, and an intracellular DD. p75NTR plays roles in the immune, vascular, and nervous systems, and has been shown to promote cell death or survival, and to induce neurite outgrowth or collapse depending on its ligands and co-receptors. In general, DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08311); members share this curated model.
