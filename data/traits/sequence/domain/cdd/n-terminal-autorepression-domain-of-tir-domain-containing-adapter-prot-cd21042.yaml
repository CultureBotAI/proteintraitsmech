identifier: CDD:cd21042
label: "N-terminal autorepression domain of TIR domain-containing adapter protein inducing IFN-beta (TRIF) and similar proteins. TRIF, also termed proline-rich, vinculin and TIR domain-containing protein B (PRVTIRB), or putative NF-kappa-B-activating protein 502H, or Toll-interleukin-1 receptor domain-containing adapter protein inducing interferon beta, or MyD88-3, or TIR domain-containing adapter molecule 1 (TICAM-1), is an adaptor molecule that participates in Toll-like receptor 3-mediated interferon-beta induction. It is a component of a multi-helicase-TRIF complex that acts as a cytoplasmic sensor of viral double-stranded RNA (dsRNA) and plays a role in the activation of a cascade of antiviral responses including the induction of proinflammatory cytokines. The model corresponds to the N-terminal autorepression domain of TRIF, which has a structure that consists of eight antiparallel helices and may be involved in self-regulation of TRIF by interacting with its Toll/interleukin-1 receptor (TIR) domain."
definition: >-
  N-terminal autorepression domain of TIR domain-containing adapter protein inducing IFN-beta (TRIF) and similar proteins. TRIF, also termed proline-rich, vinculin and TIR domain-containing protein B (PRVTIRB), or putative NF-kappa-B-activating protein 502H, or Toll-interleukin-1 receptor domain-containing adapter protein inducing interferon beta, or MyD88-3, or TIR domain-containing adapter molecule 1 (TICAM-1), is an adaptor molecule that participates in Toll-like receptor 3-mediated interferon-beta induction. It is a component of a multi-helicase-TRIF complex that acts as a cytoplasmic sensor of viral double-stranded RNA (dsRNA) and plays a role in the activation of a cascade of antiviral responses including the induction of proinflammatory cytokines. The model corresponds to the N-terminal autorepression domain of TRIF, which has a structure that consists of eight antiparallel helices and may be involved in self-regulation of TRIF by interacting with its Toll/interleukin-1 receptor (TIR) domain. — an NCBI CDD conserved domain (cd21042); members share this curated model.
