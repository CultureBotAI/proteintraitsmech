identifier: CDD:cd08071
label: "Mov34/MPN/PAD-1 family. Mov34 DUF2466 (also known as DNA repair protein RadC) domain of unknown function contains the signature JAB1/MPN/Mov34 metalloenzyme (JAMM) motif, EXnHS/THX7SXXD, which is involved in zinc ion coordination and provides the active site for isopeptidase activity. However, to date, the name RadC has been misleading and no function has been determined."
definition: >-
  Mov34/MPN/PAD-1 family. Mov34 DUF2466 (also known as DNA repair protein RadC) domain of unknown function contains the signature JAB1/MPN/Mov34 metalloenzyme (JAMM) motif, EXnHS/THX7SXXD, which is involved in zinc ion coordination and provides the active site for isopeptidase activity. However, to date, the name RadC has been misleading and no function has been determined. — an NCBI CDD conserved domain (cd08071); members share this curated model.
