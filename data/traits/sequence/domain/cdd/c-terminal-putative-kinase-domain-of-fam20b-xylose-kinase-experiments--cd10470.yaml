identifier: CDD:cd10470
label: "C-terminal putative kinase domain of FAM20B xylose kinase. Experiments with human FAM20B suggest that it is a xylose kinase that participates in proteoglycan production. It may regulate the number of glycosaminoglycan chains by phosphorylating the xylose residue in the glycosaminoglycan-protein linkage region of proteoglycans. The C-terminal domain of FAM20B is a putative kinase domain, based on mutagenesis of the C-terminal domain of Drosophila Four-Jointed, a related Golgi kinase. This subfamily belongs to the FAM20_C (also known as DUF1193) domain family."
definition: >-
  C-terminal putative kinase domain of FAM20B xylose kinase. Experiments with human FAM20B suggest that it is a xylose kinase that participates in proteoglycan production. It may regulate the number of glycosaminoglycan chains by phosphorylating the xylose residue in the glycosaminoglycan-protein linkage region of proteoglycans. The C-terminal domain of FAM20B is a putative kinase domain, based on mutagenesis of the C-terminal domain of Drosophila Four-Jointed, a related Golgi kinase. This subfamily belongs to the FAM20_C (also known as DUF1193) domain family. — an NCBI CDD conserved domain (cd10470); members share this curated model.
