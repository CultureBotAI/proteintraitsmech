identifier: CDD:cd22330
label: "Restriction endonuclease HindIII and similar endonucleases. The type II restriction endonuclease HindIII cleaves DNA at the palindromic sequence A|AGCTT (| denotes the cleavage site). It belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease HindIII and similar endonucleases. The type II restriction endonuclease HindIII cleaves DNA at the palindromic sequence A|AGCTT (| denotes the cleavage site). It belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22330); members share this curated model.
