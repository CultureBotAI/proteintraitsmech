identifier: CDD:cd08740
label: "Regulator of G protein signaling (RGS) domain found in the RGS11 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS11 protein, a member of R7 subfamily of the RGS protein family. RGS is a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. Other members of the R7 subfamily (Neuronal RGS) include: RGS6, RGS7, and RGS9, all of which are expressed predominantly in the nervous system, form an obligatory complex with G-beta-5, and play important roles in the regulation of crucial neuronal processes such as vision and motor control.  Additionally they have been implicated in many neurological conditions such as anxiety, schizophrenia, and drug dependence. RGS11 is expressed exclusively in retinal ON-bipolar neurons in which it forms complexes with G-beta-5  and  R7AP (RGS7 anchor protein ) and plays crucial roles in processing the light responses of retinal neurons."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS11 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS11 protein, a member of R7 subfamily of the RGS protein family. RGS is a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. Other members of the R7 subfamily (Neuronal RGS) include: RGS6, RGS7, and RGS9, all of which are expressed predominantly in the nervous system, form an obligatory complex with G-beta-5, and play important roles in the regulation of crucial neuronal processes such as vision and motor control. Additionally they have been implicated in many neurological conditions such as anxiety, schizophrenia, and drug dependence. RGS11 is expressed exclusively in retinal ON-bipolar neurons in which it forms complexes with G-beta-5 and R7AP (RGS7 anchor protein ) and plays crucial roles in processing the light responses of retinal neurons. — an NCBI CDD conserved domain (cd08740); members share this curated model.
