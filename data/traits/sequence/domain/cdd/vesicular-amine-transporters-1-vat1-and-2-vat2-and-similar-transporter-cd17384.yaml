identifier: CDD:cd17384
label: "Vesicular amine transporters 1 (VAT1) and 2 (VAT2), and similar transporters of the Major Facilitator Superfamily. Vesicular amine transporter 1 (VAT1 or VMAT1) is also called solute carrier family 18 member 1 (SLC18A1) or chromaffin granule amine transporter, while VAT2 (or VMAT2) is also called SLC18A2, synaptic vesicular amine transporter, or monoamine transporter. VATs (or VMATs) are responsible for the uptake of cytosolic monoamines into synaptic vesicles in monoaminergic neurons. VAT1 and VAT2 distinct pharmacological properties and tissue distributions. VAT1 is preferentially expressed in neuroendocrine cells and endocrine cells, where it transports biogenic monoamines, such as serotonin, from the cytoplasm into the secretory vesicles. VAT2 is primarily expressed in the CNS and is involved in the ATP-dependent vesicular transport of biogenic amine neurotransmitters including dopamine, norepinephrine, serotonin, and histamine into synaptic vesicles. VATs belong to the bacterial MdtG-like and eukaryotic solute carrier 18 (SLC18) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Vesicular amine transporters 1 (VAT1) and 2 (VAT2), and similar transporters of the Major Facilitator Superfamily. Vesicular amine transporter 1 (VAT1 or VMAT1) is also called solute carrier family 18 member 1 (SLC18A1) or chromaffin granule amine transporter, while VAT2 (or VMAT2) is also called SLC18A2, synaptic vesicular amine transporter, or monoamine transporter. VATs (or VMATs) are responsible for the uptake of cytosolic monoamines into synaptic vesicles in monoaminergic neurons. VAT1 and VAT2 distinct pharmacological properties and tissue distributions. VAT1 is preferentially expressed in neuroendocrine cells and endocrine cells, where it transports biogenic monoamines, such as serotonin, from the cytoplasm into the secretory vesicles. VAT2 is primarily expressed in the CNS and is involved in the ATP-dependent vesicular transport of biogenic amine neurotransmitters including dopamine, norepinephrine, serotonin, and histamine into synaptic vesicles. VATs belong to the bacterial MdtG-like and eukaryotic solute carrier 18 (SLC18) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17384); members share this curated model.
