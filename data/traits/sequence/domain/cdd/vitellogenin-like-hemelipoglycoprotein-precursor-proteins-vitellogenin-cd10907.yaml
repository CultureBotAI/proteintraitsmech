label: Vitellogenin_hemelipoglycoprotein
definition: >-
  Vitellogenin-like hemelipoglycoprotein precursor proteins. Vitellogenin_N; This family contains regions from: Vitellogenin, Microsomal triglyceride transfer protein and apolipoprotein B-100. These proteins are all involved in lipid transport. This family contains the LV1n chain from lipovitellin, that contains two structural domains
