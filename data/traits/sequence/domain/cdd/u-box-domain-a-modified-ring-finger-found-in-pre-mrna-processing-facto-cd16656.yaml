identifier: CDD:cd16656
label: "U-box domain, a modified RING finger, found in pre-mRNA-processing factor 19 (Prp19) and similar proteins. Prp19, also known as nuclear matrix protein 200 (NMP200), senescence evasion factor (SNEV), or DNA repair protein Pso4 (psoralen-sensitive mutant 4), is a ubiquitously expressed multifunctional E3 ubiquitin ligase with pleiotropic activities in DNA damage signaling, repair, and replicative senescence. It functions as a critical component of DNA repair and DNA damage checkpoint complexes. It senses DNA damage, binds double-stranded DNA in a sequence-independent manner, facilitates processing of damaged DNA, promotes DNA end joining, regulates replication protein A (RPA2) phosphorylation and ubiquitination at damaged DNA, and regulates RNA splicing and mitotic spindle formation in its integral capacity as a scaffold for a multimeric core complex. Prp19 contains an N-terminal E3 ubiquitin ligase U-box domain with E2 recruitment function that facilitates dimerization and is essential for its auto-ubiquitination activity in vitro or when overexpressed, a coiled-coil Prp19 homology region that mediates its tetramerization and interaction with CDC5L and SPF27, and a C-terminal seven-bladed WD40 beta-propeller type of leucine-rich architectural repeats that form an asymmetrical barrel-shaped structure important for substrate recognition and recruitment."
definition: >-
  U-box domain, a modified RING finger, found in pre-mRNA-processing factor 19 (Prp19) and similar proteins. Prp19, also known as nuclear matrix protein 200 (NMP200), senescence evasion factor (SNEV), or DNA repair protein Pso4 (psoralen-sensitive mutant 4), is a ubiquitously expressed multifunctional E3 ubiquitin ligase with pleiotropic activities in DNA damage signaling, repair, and replicative senescence. It functions as a critical component of DNA repair and DNA damage checkpoint complexes. It senses DNA damage, binds double-stranded DNA in a sequence-independent manner, facilitates processing of damaged DNA, promotes DNA end joining, regulates replication protein A (RPA2) phosphorylation and ubiquitination at damaged DNA, and regulates RNA splicing and mitotic spindle formation in its integral capacity as a scaffold for a multimeric core complex. Prp19 contains an N-terminal E3 ubiquitin ligase U-box domain with E2 recruitment function that facilitates dimerization and is essential for its auto-ubiquitination activity in vitro or when overexpressed, a coiled-coil Prp19 homology region that mediates its tetramerization and interaction with CDC5L and SPF27, and a C-terminal seven-bladed WD40 beta-propeller type of leucine-rich architectural repeats that form an asymmetrical barrel-shaped structure important for substrate recognition and recruitment. — an NCBI CDD conserved domain (cd16656); members share this curated model.
