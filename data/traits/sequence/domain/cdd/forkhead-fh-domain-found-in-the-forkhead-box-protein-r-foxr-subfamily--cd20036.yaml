identifier: CDD:cd20036
label: "Forkhead (FH) domain found in the Forkhead box protein R (FOXR) subfamily. The FOXR subfamily includes two winged helix transcription factors, FOXR1-2. FOXR1, also called Forkhead box protein N5 (FOXN5), is required for proper cell division and survival possibly via the p21 and mTOR pathways. FOXR2, also called Forkhead box protein N6 (FOXN6), is an important player in a wide range of cellular processes such as proliferation, migration, differentiation, and apoptosis. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein R (FOXR) subfamily. The FOXR subfamily includes two winged helix transcription factors, FOXR1-2. FOXR1, also called Forkhead box protein N5 (FOXN5), is required for proper cell division and survival possibly via the p21 and mTOR pathways. FOXR2, also called Forkhead box protein N6 (FOXN6), is an important player in a wide range of cellular processes such as proliferation, migration, differentiation, and apoptosis. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20036); members share this curated model.
