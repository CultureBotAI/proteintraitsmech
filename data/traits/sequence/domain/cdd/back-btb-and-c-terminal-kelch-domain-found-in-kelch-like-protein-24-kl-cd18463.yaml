identifier: CDD:cd18463
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 24 (KLHL24). KLHL24, also called kainate receptor-interacting protein for GluR6 (KRIP6), or protein DRE1, is necessary to maintain the balance between intermediate filament stability and degradation, a process that is essential for skin integrity. KLHL24 is a component of the BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that mediates ubiquitination of KRT14 and controls its levels during keratinocyte differentiation."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 24 (KLHL24). KLHL24, also called kainate receptor-interacting protein for GluR6 (KRIP6), or protein DRE1, is necessary to maintain the balance between intermediate filament stability and degradation, a process that is essential for skin integrity. KLHL24 is a component of the BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that mediates ubiquitination of KRT14 and controls its levels during keratinocyte differentiation. — an NCBI CDD conserved domain (cd18463); members share this curated model.
