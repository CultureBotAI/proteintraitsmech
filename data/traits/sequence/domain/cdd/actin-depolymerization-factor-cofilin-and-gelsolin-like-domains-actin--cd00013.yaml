label: "Actin depolymerization factor/cofilin- and gelsolin-like domains. Actin depolymerization factor/cofilin-like domains are present in a family of essential eukaryotic actin regulatory proteins; these proteins enhance the turnover rate of actin and interact with actin monomers as well as actin filaments."
