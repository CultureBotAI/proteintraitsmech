identifier: CDD:cd16896
label: "uncharacterized lytic transglycosylase subfamily with similarity to Slt70. Uncharacterized lytic transglycosylase (LT) with a conserved sequence pattern suggesting similarity to the Slt70, a 70kda soluble lytic transglycosylase which also has an N-terminal U-shaped U-domain and a linker L-domain. LTs catalyze the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetyl-D-glucosamine (GlcNAc), as do \"goose-type\" lysozymes. However, in addition to this, they also make a new glycosidic bond with the C6 hydroxyl group of the same muramic acid residue."
definition: >-
  uncharacterized lytic transglycosylase subfamily with similarity to Slt70. Uncharacterized lytic transglycosylase (LT) with a conserved sequence pattern suggesting similarity to the Slt70, a 70kda soluble lytic transglycosylase which also has an N-terminal U-shaped U-domain and a linker L-domain. LTs catalyze the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetyl-D-glucosamine (GlcNAc), as do "goose-type" lysozymes. However, in addition to this, they also make a new glycosidic bond with the C6 hydroxyl group of the same muramic acid residue. — an NCBI CDD conserved domain (cd16896); members share this curated model.
