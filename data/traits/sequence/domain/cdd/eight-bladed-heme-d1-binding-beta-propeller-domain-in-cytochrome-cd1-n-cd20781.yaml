identifier: CDD:cd20781
label: "eight-bladed heme d1-binding beta-propeller domain in cytochrome cd1 nitrate reductase NiR alpha and gamma proteobacteria subdivisions. Cytochrome cd1 (nitrite reductase) catalyzes in vitro the reduction of molecular oxygen to water and the reduction of nitrite to nitric oxide. Purification and characterization of NiR from several bacterial sources have shown that there are two distinct classes of dissimilatory NiRs that yield NO as the main reaction product, containing either copper or heme as cofactor, the heme-containing enzyme occurring more frequently.  It forms a homodimer each containing one C and one D1 heme group. The C heme is the electron accepting pole of the molecule and is reduced in vitro by either azurin or cytochrome c551. The D1 heme is the site where nitrite, and oxygen reduction occur. NiR is a key denitrification enzyme, which controls the rate of the production of toxic nitric oxide (NO) and ultimately regulates the release of NO into the atmosphere. The two types of heme are located in separate domains whose arrangement suggests a mechanism requiring domain movement during catalysis. Heme binding nitrite reductase from alphaproteobacteria and gammaproteobacteria are present here."
definition: >-
  eight-bladed heme d1-binding beta-propeller domain in cytochrome cd1 nitrate reductase NiR alpha and gamma proteobacteria subdivisions. Cytochrome cd1 (nitrite reductase) catalyzes in vitro the reduction of molecular oxygen to water and the reduction of nitrite to nitric oxide. Purification and characterization of NiR from several bacterial sources have shown that there are two distinct classes of dissimilatory NiRs that yield NO as the main reaction product, containing either copper or heme as cofactor, the heme-containing enzyme occurring more frequently. It forms a homodimer each containing one C and one D1 heme group. The C heme is the electron accepting pole of the molecule and is reduced in vitro by either azurin or cytochrome c551. The D1 heme is the site where nitrite, and oxygen reduction occur. NiR is a key denitrification enzyme, which controls the rate of the production of toxic nitric oxide (NO) and ultimately regulates the release of NO into the atmosphere. The two types of heme are located in separate domains whose arrangement suggests a mechanism requiring domain movement during catalysis. Heme binding nitrite reductase from alphaproteobacteria and gammaproteobacteria are present here. — an NCBI CDD conserved domain (cd20781); members share this curated model.
