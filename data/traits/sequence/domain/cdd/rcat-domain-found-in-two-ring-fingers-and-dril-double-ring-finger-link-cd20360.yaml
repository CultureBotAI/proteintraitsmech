identifier: CDD:cd20360
label: "Rcat domain found in two RING fingers and DRIL [double RING finger linked] 1 (TRIAD1). TRIAD1, also called ariadne-2 (ARI-2), protein ariadne-2 homolog, Ariadne RBR E3 ubiquitin protein ligase 2 (ARIH2), or UbcM4-interacting protein 48, is an RBR-type E3 ubiquitin-protein ligase that catalyzes the formation of polyubiquitin chains linked via lysine-48 as well as lysine-63 residues. Its auto-ubiquitylation can be catalyzed by the E2 conjugating enzyme UBCH7. TRIAD1 has been implicated in hematopoiesis, specifically in myelopoiesis, as well as in embryogenesis. It functions as a regulator of endosomal transport, and is required for the proper function of multivesicular bodies. It also acts as a novel ubiquitination target for proteasome-dependent degradation by murine double minute 2 (MDM2). As a proapoptotic protein, TRIAD1 promotes p53 activation, and inhibits MDM2-mediated p53 ubiquitination and degradation. Furthermore, TRIAD1 can inhibit the ubiquitination and proteasomal degradation of growth factor independence 1 (Gfi1), a transcriptional repressor essential for the function and development of many different hematopoietic lineages. TRIAD1 contains an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of TRIAD1 that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain."
definition: >-
  Rcat domain found in two RING fingers and DRIL [double RING finger linked] 1 (TRIAD1). TRIAD1, also called ariadne-2 (ARI-2), protein ariadne-2 homolog, Ariadne RBR E3 ubiquitin protein ligase 2 (ARIH2), or UbcM4-interacting protein 48, is an RBR-type E3 ubiquitin-protein ligase that catalyzes the formation of polyubiquitin chains linked via lysine-48 as well as lysine-63 residues. Its auto-ubiquitylation can be catalyzed by the E2 conjugating enzyme UBCH7. TRIAD1 has been implicated in hematopoiesis, specifically in myelopoiesis, as well as in embryogenesis. It functions as a regulator of endosomal transport, and is required for the proper function of multivesicular bodies. It also acts as a novel ubiquitination target for proteasome-dependent degradation by murine double minute 2 (MDM2). As a proapoptotic protein, TRIAD1 promotes p53 activation, and inhibits MDM2-mediated p53 ubiquitination and degradation. Furthermore, TRIAD1 can inhibit the ubiquitination and proteasomal degradation of growth factor independence 1 (Gfi1), a transcriptional repressor essential for the function and development of many different hematopoietic lineages. TRIAD1 contains an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of TRIAD1 that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain. — an NCBI CDD conserved domain (cd20360); members share this curated model.
