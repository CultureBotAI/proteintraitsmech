identifier: CDD:cd11473
label: "C-terminal domain of eIF4-gamma/eIF5/eIF2b-epsilon. This domain is found at the C-terminus of several translation initiation factors, including the epsilon chain of eIF2b, where it has been found to catalyze the conversion of eIF2.GDP to its active eIF2.GTP form. The structure of the domain resembles that of a set of concatenated HEAT repeats."
definition: >-
  C-terminal domain of eIF4-gamma/eIF5/eIF2b-epsilon. This domain is found at the C-terminus of several translation initiation factors, including the epsilon chain of eIF2b, where it has been found to catalyze the conversion of eIF2.GDP to its active eIF2.GTP form. The structure of the domain resembles that of a set of concatenated HEAT repeats. — an NCBI CDD conserved domain (cd11473); members share this curated model.
