identifier: CDD:cd24084
label: "nucleotide-binding domain (NBD) of Clostridium acetobutylicum N-acetylmuramic acid/N-acetylglucosamine kinase (MurK) and similar proteins. The family includes a group of uncharacterized proteins similar to Clostridium acetobutylicum N-acetylmuramic acid/N-acetylglucosamine kinase (MurK; EC 2.7.1.-/EC 2.7.1.59), also known MurNAc/GlcNAc kinase, or murein sugar kinase. It catalyzes the ATP-dependent phosphorylation of both cell wall (peptidoglycan) amino sugars, N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc), at the 6-hydroxyl group. Neither the non-N-acetylated forms of the cell wall sugars, i.e., glucosamine and/or muramic acid, nor epimeric hexoses or 1,6-anhydro-MurNAc are substrates for the enzyme. MurK may have a role in the rescue of the murein sugars GlcNAc and MurNAc released from muropeptides during cell wall turnover in C.acetobutylicum."
definition: >-
  nucleotide-binding domain (NBD) of Clostridium acetobutylicum N-acetylmuramic acid/N-acetylglucosamine kinase (MurK) and similar proteins. The family includes a group of uncharacterized proteins similar to Clostridium acetobutylicum N-acetylmuramic acid/N-acetylglucosamine kinase (MurK; EC 2.7.1.-/EC 2.7.1.59), also known MurNAc/GlcNAc kinase, or murein sugar kinase. It catalyzes the ATP-dependent phosphorylation of both cell wall (peptidoglycan) amino sugars, N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc), at the 6-hydroxyl group. Neither the non-N-acetylated forms of the cell wall sugars, i.e., glucosamine and/or muramic acid, nor epimeric hexoses or 1,6-anhydro-MurNAc are substrates for the enzyme. MurK may have a role in the rescue of the murein sugars GlcNAc and MurNAc released from muropeptides during cell wall turnover in C.acetobutylicum. — an NCBI CDD conserved domain (cd24084); members share this curated model.
