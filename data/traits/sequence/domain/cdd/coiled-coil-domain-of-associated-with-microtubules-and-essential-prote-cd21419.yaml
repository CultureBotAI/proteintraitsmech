identifier: CDD:cd21419
label: "coiled-coil domain of associated with microtubules and essential protein 1 (AME1) and similar protein. AME1, also called CENP-U homolog, or constitutive centromere-associated network protein AME1, is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. The model corresponds to a coiled-coil domain of AME1, which may mediate functionally important protein-protein interactions."
definition: >-
  coiled-coil domain of associated with microtubules and essential protein 1 (AME1) and similar protein. AME1, also called CENP-U homolog, or constitutive centromere-associated network protein AME1, is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. The model corresponds to a coiled-coil domain of AME1, which may mediate functionally important protein-protein interactions. — an NCBI CDD conserved domain (cd21419); members share this curated model.
