identifier: CDD:cd16614
label: "RING finger, HC subclass, found in RING finger protein unkempt (UNK), unkempt-like (UNKL), and similar proteins. UNK, also known as zinc finger CCCH domain-containing protein 5, is a metazoan-specific zinc finger protein enriched in embryonic brains. It may play a broad regulatory role during the formation of the central nervous system (CNS). It is a sequence-specific RNA-binding protein required for early neuronal morphology. UNK is a neurogenic component of the mTOR pathway, and functions as a negative regulator of the timing of photoreceptor differentiation. It also specifically binds to Brg/Brm-associated factor BAF60b and promotes its ubiquitination in a Rac1-dependent manner. UNKL, also known as zinc finger CCCH domain-containing protein 5-like, is a putative E3 ubiquitin-protein ligase that may participate in a protein complex showing an E3 ligase activity regulated by RAC1. Both UNK and UNKL contain several tandem CCCH-type zinc fingers at the N-terminus, and a C3HC4-type RING-HC finger at its C-terminus."
definition: >-
  RING finger, HC subclass, found in RING finger protein unkempt (UNK), unkempt-like (UNKL), and similar proteins. UNK, also known as zinc finger CCCH domain-containing protein 5, is a metazoan-specific zinc finger protein enriched in embryonic brains. It may play a broad regulatory role during the formation of the central nervous system (CNS). It is a sequence-specific RNA-binding protein required for early neuronal morphology. UNK is a neurogenic component of the mTOR pathway, and functions as a negative regulator of the timing of photoreceptor differentiation. It also specifically binds to Brg/Brm-associated factor BAF60b and promotes its ubiquitination in a Rac1-dependent manner. UNKL, also known as zinc finger CCCH domain-containing protein 5-like, is a putative E3 ubiquitin-protein ligase that may participate in a protein complex showing an E3 ligase activity regulated by RAC1. Both UNK and UNKL contain several tandem CCCH-type zinc fingers at the N-terminus, and a C3HC4-type RING-HC finger at its C-terminus. — an NCBI CDD conserved domain (cd16614); members share this curated model.
