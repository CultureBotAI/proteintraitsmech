identifier: CDD:cd00920
label: "Cupredoxin superfamily. Cupredoxins contain type I copper centers and are involved in inter-molecular electron transfer reactions. Cupredoxins are blue copper proteins, having an intense blue color due to the presence of a mononuclear type 1 (T1) copper site. Structurally, the cupredoxin-like fold consists of a beta-sandwich with 7 strands in 2 beta-sheets, which is arranged in a Greek-key beta-barrel. Some of these proteins have lost the ability to bind copper. The majority of family members contain multiple cupredoxin domain repeats: ceruloplasmin and the coagulation factors V/VIII have six repeats; laccase, ascorbate oxidase, spore coat protein A, and multicopper oxidase CueO contain three repeats; and nitrite reductase has two repeats. Others are mono-domain cupredoxins, such as plastocyanin, pseudoazurin, plantacyanin, azurin, rusticyanin, stellacyanin, quinol oxidase, and the periplasmic domain of cytochrome c oxidase subunit II."
definition: >-
  Cupredoxin superfamily. Cupredoxins contain type I copper centers and are involved in inter-molecular electron transfer reactions. Cupredoxins are blue copper proteins, having an intense blue color due to the presence of a mononuclear type 1 (T1) copper site. Structurally, the cupredoxin-like fold consists of a beta-sandwich with 7 strands in 2 beta-sheets, which is arranged in a Greek-key beta-barrel. Some of these proteins have lost the ability to bind copper. The majority of family members contain multiple cupredoxin domain repeats: ceruloplasmin and the coagulation factors V/VIII have six repeats; laccase, ascorbate oxidase, spore coat protein A, and multicopper oxidase CueO contain three repeats; and nitrite reductase has two repeats. Others are mono-domain cupredoxins, such as plastocyanin, pseudoazurin, plantacyanin, azurin, rusticyanin, stellacyanin, quinol oxidase, and the periplasmic domain of cytochrome c oxidase subunit II. — an NCBI CDD conserved domain (cd00920); members share this curated model.
