identifier: CDD:cd21983
label: "high mobility group (HMG)-box found in SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily E member 1 (SMARCE1) and similar proteins. SMARCE1, also called BRG1-associated factor 57 (BAF57), is a ubiquitously expressed protein involved in transcriptional activation and repression of select genes by chromatin remodeling. It is a component of SWI/SNF chromatin remodeling complexes that carry out key enzymatic activities, changing chromatin structure by altering DNA-histone contacts within a nucleosome in an ATP-dependent manner. SMARCE1 has a single HMG domain that displays non-specific DNA-binding characteristics. It also contains a kinesin-like coiled-coil (KLCC) domain."
definition: >-
  high mobility group (HMG)-box found in SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily E member 1 (SMARCE1) and similar proteins. SMARCE1, also called BRG1-associated factor 57 (BAF57), is a ubiquitously expressed protein involved in transcriptional activation and repression of select genes by chromatin remodeling. It is a component of SWI/SNF chromatin remodeling complexes that carry out key enzymatic activities, changing chromatin structure by altering DNA-histone contacts within a nucleosome in an ATP-dependent manner. SMARCE1 has a single HMG domain that displays non-specific DNA-binding characteristics. It also contains a kinesin-like coiled-coil (KLCC) domain. — an NCBI CDD conserved domain (cd21983); members share this curated model.
