identifier: CDD:cd16788
label: "Modified RING finger, HC subclass (C3HC5-type), found in RING finger protein 26 (RNF26) and similar proteins. RNF26 is an E3 ubiquitin ligase that temporally regulates virus-triggered type I interferon induction by increasing the stability of Mediator of IRF3 activation, MITA, also known as STING, through K11-linked polyubiquitination of MITA after viral infection, and promoting the degradation of IRF3, another important component required for virus-triggered interferon induction. Although RNF26 substrates of ubiquitination remain unclear at present, RNF26 upregulation in gastric cancer might be implicated in carcinogenesis through dysregulation of growth regulators. RNF26 contains an N-terminal leucine zipper domain and a C-terminal modified C3HC5-type RING-HC finger, which is distinguished from typical C3HC4 RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain."
definition: >-
  Modified RING finger, HC subclass (C3HC5-type), found in RING finger protein 26 (RNF26) and similar proteins. RNF26 is an E3 ubiquitin ligase that temporally regulates virus-triggered type I interferon induction by increasing the stability of Mediator of IRF3 activation, MITA, also known as STING, through K11-linked polyubiquitination of MITA after viral infection, and promoting the degradation of IRF3, another important component required for virus-triggered interferon induction. Although RNF26 substrates of ubiquitination remain unclear at present, RNF26 upregulation in gastric cancer might be implicated in carcinogenesis through dysregulation of growth regulators. RNF26 contains an N-terminal leucine zipper domain and a C-terminal modified C3HC5-type RING-HC finger, which is distinguished from typical C3HC4 RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain. — an NCBI CDD conserved domain (cd16788); members share this curated model.
