identifier: CDD:cd13986
label: "Catalytic domain of Serine/Threonine Kinase 16. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. STK16 is associated with many names including Myristylated and Palmitylated Serine/threonine Kinase 1 (MPSK1), Kinase related to cerevisiae and thaliana (Krct), and Protein Kinase expressed in day 12 fetal liver (PKL12). It is widely expressed in mammals with highest levels found in liver, testis, and kidney. It is localized in the Golgi but is translocated to the nucleus upon disorganization of the Golgi. STK16 is constitutively active and is capable of phosphorylating itself and other substrates. It may be involved in regulating stromal-epithelial interactions during mammary gland ductal morphogenesis. It may also function as a transcriptional co-activator of type-C natriuretic peptide and VEGF. The STK16 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of Serine/Threonine Kinase 16. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. STK16 is associated with many names including Myristylated and Palmitylated Serine/threonine Kinase 1 (MPSK1), Kinase related to cerevisiae and thaliana (Krct), and Protein Kinase expressed in day 12 fetal liver (PKL12). It is widely expressed in mammals with highest levels found in liver, testis, and kidney. It is localized in the Golgi but is translocated to the nucleus upon disorganization of the Golgi. STK16 is constitutively active and is capable of phosphorylating itself and other substrates. It may be involved in regulating stromal-epithelial interactions during mammary gland ductal morphogenesis. It may also function as a transcriptional co-activator of type-C natriuretic peptide and VEGF. The STK16 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd13986); members share this curated model.
