identifier: CDD:cd21994
label: "high mobility group (HMG)-box found in structure-specific recognition protein 1 (SSRP1) and similar proteins. SSRP1, also called FACT complex subunit SSRP1, chromatin-specific transcription elongation factor 80 kDa subunit, facilitates chromatin transcription complex 80 kDa subunit (FACT 80 kDa subunit or FACTp80), facilitates chromatin transcription complex subunit SSRP1, recombination signal sequence recognition protein 1, or T160, is a factor that facilitates transcript elongation through nucleosomes. It is a component of the FACT complex, a general chromatin factor that acts to reorganize nucleosomes. The FACT complex is involved in multiple processes that require DNA as a template such as mRNA elongation, DNA replication, and DNA repair."
definition: >-
  high mobility group (HMG)-box found in structure-specific recognition protein 1 (SSRP1) and similar proteins. SSRP1, also called FACT complex subunit SSRP1, chromatin-specific transcription elongation factor 80 kDa subunit, facilitates chromatin transcription complex 80 kDa subunit (FACT 80 kDa subunit or FACTp80), facilitates chromatin transcription complex subunit SSRP1, recombination signal sequence recognition protein 1, or T160, is a factor that facilitates transcript elongation through nucleosomes. It is a component of the FACT complex, a general chromatin factor that acts to reorganize nucleosomes. The FACT complex is involved in multiple processes that require DNA as a template such as mRNA elongation, DNA replication, and DNA repair. — an NCBI CDD conserved domain (cd21994); members share this curated model.
