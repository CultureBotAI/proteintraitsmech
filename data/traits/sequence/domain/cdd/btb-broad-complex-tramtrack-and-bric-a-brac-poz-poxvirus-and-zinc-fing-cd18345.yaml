identifier: CDD:cd18345
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Drosophila melanogaster protein roadkill and similar proteins. Drosophila melanogaster protein roadkill, also called Hh-induced MATH and BTB domain-containing protein (HIB), is a hedgehog-induced BTB protein that modulates hedgehog signaling by degrading Ci/Gli transcription factor. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Drosophila melanogaster protein roadkill and similar proteins. Drosophila melanogaster protein roadkill, also called Hh-induced MATH and BTB domain-containing protein (HIB), is a hedgehog-induced BTB protein that modulates hedgehog signaling by degrading Ci/Gli transcription factor. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18345); members share this curated model.
