identifier: CDD:cd14058
label: "Catalytic domain of the Serine/Threonine Kinase, Transforming Growth Factor beta Activated Kinase-1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TAK1 is also known as mitogen-activated protein kinase kinase kinase 7 (MAPKKK7 or MAP3K7), TAK, or MEKK7. As a MAPKKK, it is an important mediator of cellular responses to extracellular signals. It regulates both the c-Jun N-terminal kinase and p38 MAPK cascades by activating the MAPK kinases, MKK4 and MKK3/6. In addition, TAK1 plays diverse roles in immunity and development, in different biological contexts, through many signaling pathways including TGFbeta/BMP, Wnt/Fz, and NF-kB. It is also implicated in the activation of the tumor suppressor kinase, LKB1. The TAK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Transforming Growth Factor beta Activated Kinase-1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TAK1 is also known as mitogen-activated protein kinase kinase kinase 7 (MAPKKK7 or MAP3K7), TAK, or MEKK7. As a MAPKKK, it is an important mediator of cellular responses to extracellular signals. It regulates both the c-Jun N-terminal kinase and p38 MAPK cascades by activating the MAPK kinases, MKK4 and MKK3/6. In addition, TAK1 plays diverse roles in immunity and development, in different biological contexts, through many signaling pathways including TGFbeta/BMP, Wnt/Fz, and NF-kB. It is also implicated in the activation of the tumor suppressor kinase, LKB1. The TAK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14058); members share this curated model.
