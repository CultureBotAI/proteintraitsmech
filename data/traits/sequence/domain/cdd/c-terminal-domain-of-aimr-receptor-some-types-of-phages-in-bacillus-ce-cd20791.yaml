identifier: CDD:cd20791
label: AimR_C
definition: >-
  C-terminal domain of AimR receptor. Some types of phages in Bacillus cells have arbitrium communication which is a quorum-sensing (QS) system for regulation of entry into lytic or lysogenic cycle. The arbitrium system is composed of three genes: aimP, which encodes the arbitrium peptide, aimR, encoding a transcription factor that interacts with AimP, and aimX, which produces a small non-coding RNA that exerts a negative regulatory effect on lysogeny. AimR contains N-terminal helix-turn-helix DNA binding motif followed by a tetratricopeptide repeat (TPR) domain. aimR and aimP are expressed immediately at the first encounter of a phage with a bacterial population. AimR receptor binds the arbitrium molecule AimP leading to lysogeny. Dimerized AimR will activate AimX expression leading to inhibition of lysogeny
