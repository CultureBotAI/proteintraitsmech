identifier: CDD:cd12062
label: "Src Homology 3 domain of CASK interacting protein 1. Caskin1 is a multidomain adaptor protein that contains six ankyrin repeats, a single SH3 domain, tandem sterile alpha motif (SAM) domains, and a long disordered proline-rich region. It is expressed at high levels in the brain and is localized in presynaptic regions. It binds to the multidomain scaffolding protein CASK through the CaMK domain in competition with Munc-interacting protein 1 (Mint1). CASK participates in one of two evolutionarily conserved tripartite complexes containing either Mint1 and Velis or Caskin1 and Velis. Caskin1 may play a role in infantile myoclonic epilepsy. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
