identifier: CDD:cd05163
label: "Pseudokinase domain of TRansformation/tRanscription domain-Associated Protein. TRRAP belongs to the the phosphoinositide 3-kinase-related protein kinase (PIKK) subfamily. It contains a FATC (FRAP, ATM and TRRAP, C-terminal) domain and has a large molecular weight. Unlike most PIKK proteins, however, it contains an inactive PI3K-like pseudokinase domain, which lacks the conserved residues necessary for ATP binding and catalytic activity. TRRAP also contains many motifs that may be critical for protein-protein interactions. TRRAP is a common component of many histone acetyltransferase (HAT) complexes, and is responsible for the recruitment of these complexes to chromatin during transcription, replication, and DNA repair. TRRAP also exists in non-HAT complexes such as the p400 and MRN complexes, which are implicated in ATP-dependent remodeling and DNA repair, respectively. The TRRAP pseudokinase domain subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as the typical serine/threonine/tyrosine protein kinases (PKs), aminoglycoside phosphotransferase, choline kinase, and RIO kinases."
definition: >-
  Pseudokinase domain of TRansformation/tRanscription domain-Associated Protein. TRRAP belongs to the the phosphoinositide 3-kinase-related protein kinase (PIKK) subfamily. It contains a FATC (FRAP, ATM and TRRAP, C-terminal) domain and has a large molecular weight. Unlike most PIKK proteins, however, it contains an inactive PI3K-like pseudokinase domain, which lacks the conserved residues necessary for ATP binding and catalytic activity. TRRAP also contains many motifs that may be critical for protein-protein interactions. TRRAP is a common component of many histone acetyltransferase (HAT) complexes, and is responsible for the recruitment of these complexes to chromatin during transcription, replication, and DNA repair. TRRAP also exists in non-HAT complexes such as the p400 and MRN complexes, which are implicated in ATP-dependent remodeling and DNA repair, respectively. The TRRAP pseudokinase domain subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as the typical serine/threonine/tyrosine protein kinases (PKs), aminoglycoside phosphotransferase, choline kinase, and RIO kinases. — an NCBI CDD conserved domain (cd05163); members share this curated model.
