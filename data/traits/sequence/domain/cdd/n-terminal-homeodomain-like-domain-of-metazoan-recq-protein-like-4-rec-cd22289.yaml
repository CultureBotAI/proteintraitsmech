identifier: CDD:cd22289
label: "N-terminal homeodomain-like domain of metazoan RecQ protein-like 4 (RecQL4), fungal DNA replication regulator SLD2 and similar proteins. RecQL4, also called ATP-dependent DNA helicase Q4, or DNA helicase, RecQ-like type 4 (RecQ4), or RTS, is a DNA-dependent ATPase that may modulate chromosome segregation. This family also includes fungal DNA replication regulator SLD2, also known as DNA replication and checkpoint protein 1 (DRC1), which functions with DPB11 to control DNA replication and the S-phase checkpoint. It is also required for the proper activation of RAD53 in response to DNA damage and replication blocks. This model corresponds to the N-terminal domain of RecQL4 and SLD2, which is a homeodomain-like DNA interaction motif."
definition: >-
  N-terminal homeodomain-like domain of metazoan RecQ protein-like 4 (RecQL4), fungal DNA replication regulator SLD2 and similar proteins. RecQL4, also called ATP-dependent DNA helicase Q4, or DNA helicase, RecQ-like type 4 (RecQ4), or RTS, is a DNA-dependent ATPase that may modulate chromosome segregation. This family also includes fungal DNA replication regulator SLD2, also known as DNA replication and checkpoint protein 1 (DRC1), which functions with DPB11 to control DNA replication and the S-phase checkpoint. It is also required for the proper activation of RAD53 in response to DNA damage and replication blocks. This model corresponds to the N-terminal domain of RecQL4 and SLD2, which is a homeodomain-like DNA interaction motif. — an NCBI CDD conserved domain (cd22289); members share this curated model.
