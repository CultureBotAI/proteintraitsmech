identifier: CDD:cd16548
label: "RING finger, HC subclass, found in RING finger protein 152 (RNF152) and similar proteins. RNF152 is a lysosome-anchored E3 ubiquitin-protein ligase involved in apoptosis. It is polyubiquitinated through K48 linkage. It negatively regulates the activation of the mTORC1 pathway by targeting RagA GTPase for K63-linked ubiquitination. It interacts with and ubiquitinates RagA in an amino-acid-sensitive manner. The ubiquitination of RagA recruits its inhibitor GATOR1, a GAP complex for Rag GTPases, to the Rag complex, thereby inactivating mTORC1 signaling. RNF152 contains an N-terminal C3HC4-type RING-HC finger and a C-terminal transmembrane domain, both of which are responsible for its E3 ligase activity."
definition: >-
  RING finger, HC subclass, found in RING finger protein 152 (RNF152) and similar proteins. RNF152 is a lysosome-anchored E3 ubiquitin-protein ligase involved in apoptosis. It is polyubiquitinated through K48 linkage. It negatively regulates the activation of the mTORC1 pathway by targeting RagA GTPase for K63-linked ubiquitination. It interacts with and ubiquitinates RagA in an amino-acid-sensitive manner. The ubiquitination of RagA recruits its inhibitor GATOR1, a GAP complex for Rag GTPases, to the Rag complex, thereby inactivating mTORC1 signaling. RNF152 contains an N-terminal C3HC4-type RING-HC finger and a C-terminal transmembrane domain, both of which are responsible for its E3 ligase activity. — an NCBI CDD conserved domain (cd16548); members share this curated model.
