identifier: CDD:cd01994
label: "putative ATP pyrophosphatase PF0828 and similar proteins. This subfamily includes Pyrococcus furiosus putative ATP pyrophosphatase PF0828 and Pyrococcus horikoshii PH1257. They belong to the adenine nucleotide alpha hydrolase (AANH) superfamily that also includes other N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to the adenosine group. This subfamily of proteins is predicted to bind ATP. This domain has a strongly conserved motif SGGKD at the N-terminus."
definition: >-
  putative ATP pyrophosphatase PF0828 and similar proteins. This subfamily includes Pyrococcus furiosus putative ATP pyrophosphatase PF0828 and Pyrococcus horikoshii PH1257. They belong to the adenine nucleotide alpha hydrolase (AANH) superfamily that also includes other N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to the adenosine group. This subfamily of proteins is predicted to bind ATP. This domain has a strongly conserved motif SGGKD at the N-terminus. — an NCBI CDD conserved domain (cd01994); members share this curated model.
