identifier: CDD:cd15555
label: "PHD finger found in Lysine-specific demethylase KDM2A, KDM2B, and similar proteins. This family includes KDM2A, KDM2B, and F-box and leucine-rich repeat protein 19 (FBXL19). KDM2A is a ubiquitously expressed histone H3 lysine 36 (H3K36) demethylase that has been implicated in gene silencing, cell cycle, cell growth, and cancer development. KDM2B is a ubiquitously expressed histone H3 lysine 4 (H3K4me2) or histone H3 lysine 36 (H3K36me2) demethylase that functions as a regulator of chemokine expression, cellular morphology, and the metabolome of fibroblasts. Both KDM2A and KDM2B belong to the JmjC-domain-containing histone demethylase family. They consist of two Jumonji C (JmjC) domains, and FBXHA and FBXHB domains. A CXXC zinc-finger domain, followed by a plant homeodomain (PHD) finger, is located within the FBXHA domain, and an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain, is located within the FBXHB domain. FBXL19 belongs to the Skp1-Cullin-F-box (SCF) family of E3 ubiquitin ligases. It mediates ubiquitination and interleukin 33 (IL-33)-induced degradation of ST2L receptor in lung epithelia, blocks IL-33-mediated apoptosis, and prevents endotoxin-induced acute lung injury. FBXL19 consists of FBXHA and FBXHB domains, similar to KDM2A and KDM2B."
definition: >-
  PHD finger found in Lysine-specific demethylase KDM2A, KDM2B, and similar proteins. This family includes KDM2A, KDM2B, and F-box and leucine-rich repeat protein 19 (FBXL19). KDM2A is a ubiquitously expressed histone H3 lysine 36 (H3K36) demethylase that has been implicated in gene silencing, cell cycle, cell growth, and cancer development. KDM2B is a ubiquitously expressed histone H3 lysine 4 (H3K4me2) or histone H3 lysine 36 (H3K36me2) demethylase that functions as a regulator of chemokine expression, cellular morphology, and the metabolome of fibroblasts. Both KDM2A and KDM2B belong to the JmjC-domain-containing histone demethylase family. They consist of two Jumonji C (JmjC) domains, and FBXHA and FBXHB domains. A CXXC zinc-finger domain, followed by a plant homeodomain (PHD) finger, is located within the FBXHA domain, and an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain, is located within the FBXHB domain. FBXL19 belongs to the Skp1-Cullin-F-box (SCF) family of E3 ubiquitin ligases. It mediates ubiquitination and interleukin 33 (IL-33)-induced degradation of ST2L receptor in lung epithelia, blocks IL-33-mediated apoptosis, and prevents endotoxin-induced acute lung injury. FBXL19 consists of FBXHA and FBXHB domains, similar to KDM2A and KDM2B. — an NCBI CDD conserved domain (cd15555); members share this curated model.
