identifier: CDD:cd18197
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 6 (ZBTB6). ZBTB6, also called zinc finger protein 482 (ZNF482) or zinc finger protein with interaction domain, may be involved in transcriptional regulation. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 6 (ZBTB6). ZBTB6, also called zinc finger protein 482 (ZNF482) or zinc finger protein with interaction domain, may be involved in transcriptional regulation. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18197); members share this curated model.
