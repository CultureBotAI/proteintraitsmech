identifier: CDD:cd19632
label: "FadL fatty acid transport proteins. FadL outer membrane (OM) protein family.  A general, lateral diffusion mechanism for the uptake of hydrophobic substrates by the FadL outer membrane (OM) protein family involves hydrophobic substrates diffusing via a long hydrophobic passageway laterally into the outer leaflet of the OM, via a lateral opening in the barrel wall. From the outer leaflet the substrate can move to the inner leaflet of the OM and diffuse into the periplasm. The hydrophobic substrates bypass the hydrophilic LPS layer of the OM without having to move through an aqueous channel. FadL channels are substrate specific."
definition: >-
  FadL fatty acid transport proteins. FadL outer membrane (OM) protein family. A general, lateral diffusion mechanism for the uptake of hydrophobic substrates by the FadL outer membrane (OM) protein family involves hydrophobic substrates diffusing via a long hydrophobic passageway laterally into the outer leaflet of the OM, via a lateral opening in the barrel wall. From the outer leaflet the substrate can move to the inner leaflet of the OM and diffuse into the periplasm. The hydrophobic substrates bypass the hydrophilic LPS layer of the OM without having to move through an aqueous channel. FadL channels are substrate specific. — an NCBI CDD conserved domain (cd19632); members share this curated model.
