identifier: CDD:cd10350
label: "Src homology 2 domain found in the SH2 domain containing protein 4A (SH2D4A). SH2D4A contains a single SH2 domain. In general SH2 domains are involved in signal transduction.  They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in the SH2 domain containing protein 4A (SH2D4A). SH2D4A contains a single SH2 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10350); members share this curated model.
