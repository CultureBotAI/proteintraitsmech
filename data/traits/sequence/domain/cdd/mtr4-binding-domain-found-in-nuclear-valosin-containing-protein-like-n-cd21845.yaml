identifier: CDD:cd21845
label: "MTR4 binding domain found in nuclear valosin-containing protein-like (NVL) and similar proteins. NVL, also called NVL2, or nuclear VCP-like protein (NVLp), is a new member of the AAA family of ATPases localized to the nucleus. It participates in the assembly of the telomerase holoenzyme and effecting of telomerase activity via its interaction with TERT. It is involved in both early and late stages of the pre-rRNA processing pathways. NVL spatiotemporally regulates 60S ribosomal subunit biogenesis in the nucleolus. It catalyzes the release of specific assembly factors, such as WDR74, from pre-60S ribosomal particles through the ATPase activity. NVL is a multidomain protein characterized by an N-terminal nucleolin-binding domain and a linker region followed by two globular domains, characteristic of AAA-ATPases that are responsible for catalytic activity. The model corresponds to a conserved tryptophan arch-interacting motif (W-AIM)-containing MTR4 binding domain located in the N-terminal linker region of NVL."
definition: >-
  MTR4 binding domain found in nuclear valosin-containing protein-like (NVL) and similar proteins. NVL, also called NVL2, or nuclear VCP-like protein (NVLp), is a new member of the AAA family of ATPases localized to the nucleus. It participates in the assembly of the telomerase holoenzyme and effecting of telomerase activity via its interaction with TERT. It is involved in both early and late stages of the pre-rRNA processing pathways. NVL spatiotemporally regulates 60S ribosomal subunit biogenesis in the nucleolus. It catalyzes the release of specific assembly factors, such as WDR74, from pre-60S ribosomal particles through the ATPase activity. NVL is a multidomain protein characterized by an N-terminal nucleolin-binding domain and a linker region followed by two globular domains, characteristic of AAA-ATPases that are responsible for catalytic activity. The model corresponds to a conserved tryptophan arch-interacting motif (W-AIM)-containing MTR4 binding domain located in the N-terminal linker region of NVL. — an NCBI CDD conserved domain (cd21845); members share this curated model.
