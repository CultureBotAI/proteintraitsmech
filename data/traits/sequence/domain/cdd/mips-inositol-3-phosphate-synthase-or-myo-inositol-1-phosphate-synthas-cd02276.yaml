identifier: CDD:cd02276
label: MIPS
definition: >-
  MIPS. Inositol-3-phosphate synthase or myo-inositol-1-phosphate synthase (MIPS) catalyses the first enzymatic (and rate-limiting) step in the de novo biosynthesis of inositol. Inositol-containing compounds play critical and diverse biological roles, including signal transduction, stress response, and cell wall biogenesis; and are widely observed in eukaryotes, less commonly in eubacteria and archaea. In the presence of NAD+, MIPS catalyzes the conversion of glucose-6-phosphate to 1-D-myo-inositol-3-phosphate, which is subsequently dephosphorylated to myo-inositol. MIPS catalyses a three-step reaction, an oxidation step with NAD+ serving as a hydrogen acceptor, an intramolecular aldol cyclization step, and a reduction step with NADH acting as the hydrogen donor regenerating NAD+. A structural metal ion site, where a single metal ion bound to the carbonyl moiety of the nicotinamide ring (proposed to provide polarization necessary for the first proton-transfer) has been observed in eukaryotic, bacterial and archaeal MIPS structures. Archaeal MIPSs are proposed to have a second catalytic metal ion used to stabilize the transition state of the cyclization step, however, in eukaryotic enzymes, this role is most likely served by the monovalent activator NH4+. Biologically active tetrameric forms have been observed in Mycobacterium, Archaeoglobus, and Saccharomyces MIPS structures with the monomer of the bacterial/archaeal enzymes composed of two domains (a Rossmann fold, NAD binding domain and a catalytic/tetramerization domain) and the eukaryotic enzymes composed of three domains (the two afore mentioned domains and an additional dimerization domain). MIPS, with their Rossmann fold NAD(P) binding domain and catalytic/tetramerization domain with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain, are placed in the NADB_G3PDH superfamily of proteins
