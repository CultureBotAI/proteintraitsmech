identifier: CDD:cd11476
label: "Na(+)/urea-polyamine cotransporter DUR3, and related proteins; solute-binding domain. Dur3 is the yeast plasma membrane urea transporter. Saccharomyces cerevisiae DUR3 also transports polyamine. The polyamine uptake of S. cerevisiae DUR3 is activated upon its phosphorylation by polyamine transport protein kinase 2 (PTK2). S. cerevisiae DUR3 also appears to play a role in regulating the cellular boron concentration. This subfamily belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  Na(+)/urea-polyamine cotransporter DUR3, and related proteins; solute-binding domain. Dur3 is the yeast plasma membrane urea transporter. Saccharomyces cerevisiae DUR3 also transports polyamine. The polyamine uptake of S. cerevisiae DUR3 is activated upon its phosphorylation by polyamine transport protein kinase 2 (PTK2). S. cerevisiae DUR3 also appears to play a role in regulating the cellular boron concentration. This subfamily belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd11476); members share this curated model.
