identifier: CDD:cd12055
label: "Second Src Homology 3 domain (SH3B) of Cbl-interacting protein of 85 kDa. CIN85, also called SH3 domain-containing kinase-binding protein 1 (SH3KBP1) or CD2-binding protein 3 (CD2BP3) or Ruk, is an adaptor protein that is involved in the downregulation of receptor tyrosine kinases by facilitating endocytosis through interaction with endophilin-associated ubiquitin ligase Cbl proteins. It is also important in many other cellular processes including vesicle-mediated transport, cytoskeletal remodelling, apoptosis, cell adhesion and migration, and viral infection, among others. CIN85 exists as multiple variants from alternative splicing; the main variant contains three SH3 domains, a proline-rich region, and a C-terminal coiled-coil domain. All of these domains enable CIN85 to bind various protein partners and assemble complexes that have been implicated in many different functions. This alignment model represents the second SH3 domain (SH3B) of CIN85. SH3B has been shown to bind Cbl proline-rich peptides and ubiquitin. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Second Src Homology 3 domain (SH3B) of Cbl-interacting protein of 85 kDa. CIN85, also called SH3 domain-containing kinase-binding protein 1 (SH3KBP1) or CD2-binding protein 3 (CD2BP3) or Ruk, is an adaptor protein that is involved in the downregulation of receptor tyrosine kinases by facilitating endocytosis through interaction with endophilin-associated ubiquitin ligase Cbl proteins. It is also important in many other cellular processes including vesicle-mediated transport, cytoskeletal remodelling, apoptosis, cell adhesion and migration, and viral infection, among others. CIN85 exists as multiple variants from alternative splicing; the main variant contains three SH3 domains, a proline-rich region, and a C-terminal coiled-coil domain. All of these domains enable CIN85 to bind various protein partners and assemble complexes that have been implicated in many different functions. This alignment model represents the second SH3 domain (SH3B) of CIN85. SH3B has been shown to bind Cbl proline-rich peptides and ubiquitin. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12055); members share this curated model.
