identifier: CDD:cd16838
label: "Protein of unknown function (DUF3816). This is a family of membrane transporters from several different tranport systems. It includes thiamine, cobalamin, biotin, riboflavin, transporters among others. This family of proteins is found in bacteria and archaea. Proteins in this family are typically between 177 and 208 amino acids in length. A subset of this family is associated with the TM1506 proteins. In this context, transport through the channel is predicted to be regulated by the TM1506 protein by either regulating redox potential or modification of substrates."
definition: >-
  Protein of unknown function (DUF3816). This is a family of membrane transporters from several different tranport systems. It includes thiamine, cobalamin, biotin, riboflavin, transporters among others. This family of proteins is found in bacteria and archaea. Proteins in this family are typically between 177 and 208 amino acids in length. A subset of this family is associated with the TM1506 proteins. In this context, transport through the channel is predicted to be regulated by the TM1506 protein by either regulating redox potential or modification of substrates. — an NCBI CDD conserved domain (cd16838); members share this curated model.
