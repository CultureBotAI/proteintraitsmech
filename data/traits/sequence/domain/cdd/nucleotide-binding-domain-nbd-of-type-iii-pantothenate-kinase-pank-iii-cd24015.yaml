identifier: CDD:cd24015
label: "nucleotide-binding domain (NBD) of type III pantothenate kinase (PanK-III) and similar proteins. PanK (EC 2.7.1.33), also called pantothenic acid kinase, is the first enzyme in the Coenzyme A (CoA) biosynthetic pathway. It catalyzes the phosphorylation of pantothenate (vitamin B5) to form 4'-phosphopantothenate at the expense of a molecule of adenosine triphosphate (ATP), which is the rate-limiting step in CoA biosynthesis. It cannot utilize a phosphoryl donor other than ATP. Three distinct types of PanK have been identified, PanK-I, PanK-II and PanK-III. The model corresponds to PanK-III that belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of type III pantothenate kinase (PanK-III) and similar proteins. PanK (EC 2.7.1.33), also called pantothenic acid kinase, is the first enzyme in the Coenzyme A (CoA) biosynthetic pathway. It catalyzes the phosphorylation of pantothenate (vitamin B5) to form 4'-phosphopantothenate at the expense of a molecule of adenosine triphosphate (ATP), which is the rate-limiting step in CoA biosynthesis. It cannot utilize a phosphoryl donor other than ATP. Three distinct types of PanK have been identified, PanK-I, PanK-II and PanK-III. The model corresponds to PanK-III that belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24015); members share this curated model.
