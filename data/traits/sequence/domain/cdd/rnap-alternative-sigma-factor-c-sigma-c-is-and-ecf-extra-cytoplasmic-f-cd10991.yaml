identifier: CDD:cd10991
label: RNAP_alt-sigC
definition: >-
  RNAP alternative sigma factor C. Sigma C is and ECF (extra-cytoplasmic factor) sigma in Mycobacterium tuber-culosis which is important to promote virulence and pathogenesis of the bac-terium. ECF sigmas are a subfamily of the Sig70 fam. Unlike other sigma fac-tors, SigC does not appear to have a regulatory anti-sigma factor located on the same operon. SigC is also different from other ECF factors in that it has an N-terminal domain consisting of 126 amino acids preceding region2 and 4 do-mains. ECF (extra-cytoplasmic function) sigma factors govern environment dependent regulation and transcription. They have 2 domains called r4 and r2 which recognize -10 and -35 promoter elements. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs
