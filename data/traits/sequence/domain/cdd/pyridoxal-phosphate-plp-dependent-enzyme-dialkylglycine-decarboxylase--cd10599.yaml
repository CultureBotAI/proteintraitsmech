identifier: CDD:cd10599
label: "Pyridoxal phosphate (PLP) dependent enzyme: Dialkylglycine decarboxylase. Dialkylglycine decarboxylase family. Dialkylglycine decarboxylase (DGD) is a bifunctional, pyridoxal phosphate (PLP) dependent enzyme that catalyzes the degradation of small dialkylamino acids. The catalytic mechanism involves two half-reactions. In the first half reaction, a dialkylamino acid is oxidatively decarboxylated to give CO2 and the corresponding ketone, with amino transfer to the cofactor PLP. The second half of the reaction consists of a classical transamination reaction with pyruvate as the oxoacid substrate, yielding L-alanine. DGD is activated by K+ and Rb+ ions, whereas Li+ and Na+ ions are inhibitory. The enzyme is an alpha 4 tetramer, built up as a dimer of dimers."
definition: >-
  Pyridoxal phosphate (PLP) dependent enzyme: Dialkylglycine decarboxylase. Dialkylglycine decarboxylase family. Dialkylglycine decarboxylase (DGD) is a bifunctional, pyridoxal phosphate (PLP) dependent enzyme that catalyzes the degradation of small dialkylamino acids. The catalytic mechanism involves two half-reactions. In the first half reaction, a dialkylamino acid is oxidatively decarboxylated to give CO2 and the corresponding ketone, with amino transfer to the cofactor PLP. The second half of the reaction consists of a classical transamination reaction with pyruvate as the oxoacid substrate, yielding L-alanine. DGD is activated by K+ and Rb+ ions, whereas Li+ and Na+ ions are inhibitory. The enzyme is an alpha 4 tetramer, built up as a dimer of dimers. — an NCBI CDD conserved domain (cd10599); members share this curated model.
