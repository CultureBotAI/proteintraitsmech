identifier: CDD:cd05608
label: "Catalytic domain of the Serine/Threonine Kinase, G protein-coupled Receptor Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. GRK1 (also called rhodopsin kinase) belongs to the visual group of GRKs and is expressed in retinal cells. It phosphorylates rhodopsin in rod cells, which leads to termination of the phototransduction cascade. Mutations in GRK1 are associated to a recessively inherited form of stationary nightblindness called Oguchi disease. GRKs phosphorylate and regulate G protein-coupled receptors (GPCRs), the largest superfamily of cell surface receptors, which regulate some part of nearly all physiological functions. Phosphorylated GPCRs bind to arrestins, which prevents further G protein signaling despite the presence of activating ligand. The GRK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, G protein-coupled Receptor Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. GRK1 (also called rhodopsin kinase) belongs to the visual group of GRKs and is expressed in retinal cells. It phosphorylates rhodopsin in rod cells, which leads to termination of the phototransduction cascade. Mutations in GRK1 are associated to a recessively inherited form of stationary nightblindness called Oguchi disease. GRKs phosphorylate and regulate G protein-coupled receptors (GPCRs), the largest superfamily of cell surface receptors, which regulate some part of nearly all physiological functions. Phosphorylated GPCRs bind to arrestins, which prevents further G protein signaling despite the presence of activating ligand. The GRK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05608); members share this curated model.
