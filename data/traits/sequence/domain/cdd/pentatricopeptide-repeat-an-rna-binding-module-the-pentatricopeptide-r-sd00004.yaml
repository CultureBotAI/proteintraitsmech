identifier: CDD:sd00004
label: "Pentatricopeptide repeat, an RNA-binding module. The Pentatricopeptide repeat (PPR) is a 35-residue repeat motif that forms two anti-parallel alpha helices and binds single-stranded RNA in a sequence-specific and modular manner. It is present in a large family of RNA-binding proteins that are found in protists, fungi, and metazoan, but are most abundant in the mitochondria and chloroplasts of terrestrial plants. PPR proteins function in many aspects of RNA metabolism, including splicing, editing, degradation, and translation. They contain between 2 to 30 PPR repeats, organized into a hairpin of alpha helices. Proteins containing only arrays of PPR repeats that are 35-amino acid in length are called P class proteins. The second type of PPR proteins, called PLS class, contain additional C-terminal endonuclease or RNA editing domains and a distinct PPR architecture of triplet repeats alternating between a typical PPR, a longer PPR and a short PPR of 31 residues."
definition: >-
  Pentatricopeptide repeat, an RNA-binding module. The Pentatricopeptide repeat (PPR) is a 35-residue repeat motif that forms two anti-parallel alpha helices and binds single-stranded RNA in a sequence-specific and modular manner. It is present in a large family of RNA-binding proteins that are found in protists, fungi, and metazoan, but are most abundant in the mitochondria and chloroplasts of terrestrial plants. PPR proteins function in many aspects of RNA metabolism, including splicing, editing, degradation, and translation. They contain between 2 to 30 PPR repeats, organized into a hairpin of alpha helices. Proteins containing only arrays of PPR repeats that are 35-amino acid in length are called P class proteins. The second type of PPR proteins, called PLS class, contain additional C-terminal endonuclease or RNA editing domains and a distinct PPR architecture of triplet repeats alternating between a typical PPR, a longer PPR and a short PPR of 31 residues. — an NCBI CDD conserved domain (sd00004); members share this curated model.
