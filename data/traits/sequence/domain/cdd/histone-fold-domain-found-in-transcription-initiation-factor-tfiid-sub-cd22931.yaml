identifier: CDD:cd22931
label: "histone-fold domain found in transcription initiation factor TFIID subunit 6 (TAF6) and similar proteins. TAF6, also called TATA Binding Protein (TBP) associated factor 6, RNA polymerase II TBP-associated factor subunit E, transcription initiation factor TFIID 70 kDa subunit (TAF(II)70, TAFII-70, TAFII70), or transcription initiation factor TFIID 80 kDa subunit (TAF(II)80, TAFII-80, TAFII80), is a TBP-associated factor (TAF). TAFs are components of the transcription factor IID (TFIID) complex, PCAF histone acetylase complex, and TBP-free TAFII complex (TFTC). TIIFD is a multimeric protein complex that plays a central role in mediating promoter responses to various activators and repressors. TFIID and PCAF are composed of TATA binding protein (TBP) and several TAFs. TBP is not part of TFTC."
definition: >-
  histone-fold domain found in transcription initiation factor TFIID subunit 6 (TAF6) and similar proteins. TAF6, also called TATA Binding Protein (TBP) associated factor 6, RNA polymerase II TBP-associated factor subunit E, transcription initiation factor TFIID 70 kDa subunit (TAF(II)70, TAFII-70, TAFII70), or transcription initiation factor TFIID 80 kDa subunit (TAF(II)80, TAFII-80, TAFII80), is a TBP-associated factor (TAF). TAFs are components of the transcription factor IID (TFIID) complex, PCAF histone acetylase complex, and TBP-free TAFII complex (TFTC). TIIFD is a multimeric protein complex that plays a central role in mediating promoter responses to various activators and repressors. TFIID and PCAF are composed of TATA binding protein (TBP) and several TAFs. TBP is not part of TFTC. — an NCBI CDD conserved domain (cd22931); members share this curated model.
