label: LsrG_ABM_NECAB_like
definition: >-
  Escherichai coli LsrG, antibiotic biosynthesis monooxygenase (ABM)-like domains of NECABS, and related proteins. This family includes the ABM_like domains of NECAB1 (N-terminal EF-hand calcium binding protein 1, also known as neuronal calcium-binding protein 1), NECAB2, (also known as neuronal calcium-binding protein 2 and synaptotagmin-interacting protein 2), and NECAB3 (also known as neuronal calcium-binding protein 3, amyloid beta A4 protein-binding family A member 2-binding protein, Nek2-interacting protein 1, and X11L-binding protein 51). NECAB3 is a Golgi protein, a potential substrate of Nek2 protein kinase, and interacts with the N-terminal domain of APBA2/ X11L. NECABs have an N-terminal Ca2+-binding EF-hand domain and are primarily expressed in the brain. Prokaryotic members include Escherichai coli LsrG which is encoded on the Lsr operon, and involved in processing of the quorum-sensing signal autoinducer-2 (AI-2). LsrG catalyzes the isomerization of P-DPD (4-hydroxy-2,3-pentanedione-5-phosphate) into P-TPO (3,4,4-trihydroxy-2-pentanone-5-phosphate ). Another prokaryotic member is E. coli YgiN, a quinol monooxygenase which may function along with MdaB (modulator of drug activity B) to form an enzymatic quinone reduction-oxidation cycle in E.coli, and thereby may protect cells from reactive oxygen species generated in single electron redox reactions. That this domain is present as a repeat in some members is suggestive that the other proteins function as multimers. The ABM_like superfamily contains distantly related domains that may have lost the active site
