identifier: CDD:cd22982
label: "dimerization/docking (D/D) domain found in Chlamydomonas reinhardtii flagellar radial spoke protein 2 (RSP2) and similar proteins. Flagellar radial spokes contribute to the regulation of dynein arm activity and thus the pattern of flagellar bending. They consist of a thin stalk, which is attached to the a subfiber of the outer doublet microtubule, and a bulbous head, which is attached to the stalk and appears to interact with the projections from the central pair of microtubules. RSP2 is a calmodulin binding spoke stalk protein required for motility in Chlamydomonas reinhardtii. It binds calmodulin in a calcium-dependent manner. This model corresponds to the C-terminal domain of RSP2, which shows high sequence similarity to the dimerization/docking (D/D) domain of protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in Chlamydomonas reinhardtii flagellar radial spoke protein 2 (RSP2) and similar proteins. Flagellar radial spokes contribute to the regulation of dynein arm activity and thus the pattern of flagellar bending. They consist of a thin stalk, which is attached to the a subfiber of the outer doublet microtubule, and a bulbous head, which is attached to the stalk and appears to interact with the projections from the central pair of microtubules. RSP2 is a calmodulin binding spoke stalk protein required for motility in Chlamydomonas reinhardtii. It binds calmodulin in a calcium-dependent manner. This model corresponds to the C-terminal domain of RSP2, which shows high sequence similarity to the dimerization/docking (D/D) domain of protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22982); members share this curated model.
