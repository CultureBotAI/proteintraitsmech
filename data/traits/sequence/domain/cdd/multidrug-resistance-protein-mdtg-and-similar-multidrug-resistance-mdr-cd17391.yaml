identifier: CDD:cd17391
label: "Multidrug resistance protein MdtG and similar multidrug resistance (MDR) transporters of the Major Facilitator Superfamily. This subfamily is composed of Escherichia coli multidrug resistance protein MdtG, Streptococcus pneumoniae multidrug resistance efflux pump PmrA, and similar multidrug resistance (MDR) transporters from bacteria. MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. MdtG confers resistance to fosfomycin and deoxycholate. PmrA serves as an efflux pump for various substrates and is associated with fluoroquinolone resistance. MdtG-like MDR transporters belong to the bacterial MdtG-like and eukaryotic solute carrier 18 (SLC18) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Multidrug resistance protein MdtG and similar multidrug resistance (MDR) transporters of the Major Facilitator Superfamily. This subfamily is composed of Escherichia coli multidrug resistance protein MdtG, Streptococcus pneumoniae multidrug resistance efflux pump PmrA, and similar multidrug resistance (MDR) transporters from bacteria. MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. MdtG confers resistance to fosfomycin and deoxycholate. PmrA serves as an efflux pump for various substrates and is associated with fluoroquinolone resistance. MdtG-like MDR transporters belong to the bacterial MdtG-like and eukaryotic solute carrier 18 (SLC18) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17391); members share this curated model.
