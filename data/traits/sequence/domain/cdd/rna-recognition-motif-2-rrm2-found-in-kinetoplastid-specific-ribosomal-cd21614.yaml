identifier: CDD:cd21614
label: "RNA recognition motif 2 (RRM2) found in Kinetoplastid-Specific Ribosomal Protein (KSRP) and similar proteins. KSRP is an essential protein located at the solvent face of the 40S subunit, where it binds and stabilizes kinetoplastid-specific domains of rRNA, suggesting its role in ribosome integrity. It also interacts with the kinetoplastid-specific C-terminal region of protein eS6. KSRP contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The model corresponds to the second RRM motif."
definition: >-
  RNA recognition motif 2 (RRM2) found in Kinetoplastid-Specific Ribosomal Protein (KSRP) and similar proteins. KSRP is an essential protein located at the solvent face of the 40S subunit, where it binds and stabilizes kinetoplastid-specific domains of rRNA, suggesting its role in ribosome integrity. It also interacts with the kinetoplastid-specific C-terminal region of protein eS6. KSRP contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The model corresponds to the second RRM motif. — an NCBI CDD conserved domain (cd21614); members share this curated model.
