identifier: CDD:cd07678
label: "The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of FCH and double SH3 domains 1 (FCHSD1). F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. FCH and double SH3 domains 1 (FCHSD1) contains an N-terminal F-BAR domain and two SH3 domains at the C-terminus. It has been characterized only in silico, and its biological function is still unknown. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules."
definition: >-
  The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of FCH and double SH3 domains 1 (FCHSD1). F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. FCH and double SH3 domains 1 (FCHSD1) contains an N-terminal F-BAR domain and two SH3 domains at the C-terminus. It has been characterized only in silico, and its biological function is still unknown. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules. — an NCBI CDD conserved domain (cd07678); members share this curated model.
