identifier: CDD:cd01935
label: "Choloylglycine hydrolase (CGH)_like. This family of choloylglycine hydrolase-like proteins includes conjugated bile acid hydrolase (CBAH), penicillin V acylase (PVA), acid ceramidase (AC), and N-acylethanolamine-hydrolyzing acid amidase (NAAA) which cleave non-peptide carbon-nitrogen bonds in bile salt constituents.  These enzymes have an N-terminal nucleophilic cysteine, as do other members of the Ntn hydrolase family to which they belong.  This nucleophilic cysteine is exposed by post-translational prossessing of the precursor protein."
definition: >-
  Choloylglycine hydrolase (CGH)_like. This family of choloylglycine hydrolase-like proteins includes conjugated bile acid hydrolase (CBAH), penicillin V acylase (PVA), acid ceramidase (AC), and N-acylethanolamine-hydrolyzing acid amidase (NAAA) which cleave non-peptide carbon-nitrogen bonds in bile salt constituents. These enzymes have an N-terminal nucleophilic cysteine, as do other members of the Ntn hydrolase family to which they belong. This nucleophilic cysteine is exposed by post-translational prossessing of the precursor protein. — an NCBI CDD conserved domain (cd01935); members share this curated model.
