identifier: CDD:cd15069
label: "adenosine receptor subtype 2AB, member of the class A family of seven-transmembrane G protein-coupled receptors. The A2B receptor, a member of the adenosine receptor family of G protein-coupled receptors, binds adenosine as its endogenous ligand and is involved in regulating myocardial oxygen consumption and coronary blood flow. High-affinity A2A and low-affinity A2B receptors are preferentially coupled to G proteins of the stimulatory (Gs) family, which lead to activation of adenylate cyclase and thereby increasing the intracellular cAMP levels. The A2A receptor activation protects against tissue injury and acts as anti-inflammatory agent. In human skin endothelial cells, activation of A2B receptor, but not the A2A receptor, promotes angiogenesis. Alternatively, activated A2A receptor, but not the A2B receptor, promotes angiogenesis in human umbilical vein and lung microvascular endothelial cells. The A2A receptor alters cardiac contractility indirectly by modulating the anti-adrenergic effect of A1 receptor, while the A2B receptor exerts direct effects on cardiac contractile function, but does not modulate beta-adrenergic or A1 anti-adrenergic effects."
definition: >-
  adenosine receptor subtype 2AB, member of the class A family of seven-transmembrane G protein-coupled receptors. The A2B receptor, a member of the adenosine receptor family of G protein-coupled receptors, binds adenosine as its endogenous ligand and is involved in regulating myocardial oxygen consumption and coronary blood flow. High-affinity A2A and low-affinity A2B receptors are preferentially coupled to G proteins of the stimulatory (Gs) family, which lead to activation of adenylate cyclase and thereby increasing the intracellular cAMP levels. The A2A receptor activation protects against tissue injury and acts as anti-inflammatory agent. In human skin endothelial cells, activation of A2B receptor, but not the A2A receptor, promotes angiogenesis. Alternatively, activated A2A receptor, but not the A2B receptor, promotes angiogenesis in human umbilical vein and lung microvascular endothelial cells. The A2A receptor alters cardiac contractility indirectly by modulating the anti-adrenergic effect of A1 receptor, while the A2B receptor exerts direct effects on cardiac contractile function, but does not modulate beta-adrenergic or A1 anti-adrenergic effects. — an NCBI CDD conserved domain (cd15069); members share this curated model.
