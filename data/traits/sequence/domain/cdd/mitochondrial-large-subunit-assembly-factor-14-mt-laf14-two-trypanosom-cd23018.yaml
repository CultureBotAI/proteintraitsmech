identifier: CDD:cd23018
label: "mitochondrial large subunit assembly factor 14 (mt-LAF14). Two Trypanosoma brucei mitochondrial large subunit assembly factors, mt-LAF14 and mt-LAF2, with five mitoribosomal proteins (bL28m, bL35m, bL19m, mL64 and mL74) make a protein mass to stabilize GTPase assembly factor mt-EngA at the pre-mtLSU (pre-mitoribosomal large subunit). Factor mt-LAF14 is an exclusively helical protein, comprised of at least 29 helices, which spans over the top of the central protuberance (CP), where it stabilizes unwound rRNA at the pre-mtLSU. The mtLSU accommodates the peptidyl transferase center (PTC) that catalyzes formation of peptide bonds between amino acids, tRNA-binding sites, the L7/L12 stalk that is responsible for the recruitment of translation factors, the L1 stalk, the CP that facilitates communication between various functional sites, and the exit tunnel to egress a synthesized protein. The process of mtLSU assembly relies on an extensive protein network formed by the assembly factors that connect a premature PTC, the L1, and L7/L12 stalks with the CP, while the exit tunnel is blocked."
definition: >-
  mitochondrial large subunit assembly factor 14 (mt-LAF14). Two Trypanosoma brucei mitochondrial large subunit assembly factors, mt-LAF14 and mt-LAF2, with five mitoribosomal proteins (bL28m, bL35m, bL19m, mL64 and mL74) make a protein mass to stabilize GTPase assembly factor mt-EngA at the pre-mtLSU (pre-mitoribosomal large subunit). Factor mt-LAF14 is an exclusively helical protein, comprised of at least 29 helices, which spans over the top of the central protuberance (CP), where it stabilizes unwound rRNA at the pre-mtLSU. The mtLSU accommodates the peptidyl transferase center (PTC) that catalyzes formation of peptide bonds between amino acids, tRNA-binding sites, the L7/L12 stalk that is responsible for the recruitment of translation factors, the L1 stalk, the CP that facilitates communication between various functional sites, and the exit tunnel to egress a synthesized protein. The process of mtLSU assembly relies on an extensive protein network formed by the assembly factors that connect a premature PTC, the L1, and L7/L12 stalks with the CP, while the exit tunnel is blocked. — an NCBI CDD conserved domain (cd23018); members share this curated model.
