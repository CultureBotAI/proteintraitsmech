identifier: CDD:cd18045
label: "DEAD-box helicase domain of eukaryotic initiation factor 4A-III. Eukaryotic initiation factor 4A-III (EIF4AIII, also known as DDX48) is part of the exon junction complex (EJC) that plays a major role in posttranscriptional regulation of mRNA. EJC consists of four proteins (eIF4AIII, Barentsz [Btz], Mago, and Y14), mRNA, and ATP. DDX48 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of eukaryotic initiation factor 4A-III. Eukaryotic initiation factor 4A-III (EIF4AIII, also known as DDX48) is part of the exon junction complex (EJC) that plays a major role in posttranscriptional regulation of mRNA. EJC consists of four proteins (eIF4AIII, Barentsz [Btz], Mago, and Y14), mRNA, and ATP. DDX48 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18045); members share this curated model.
