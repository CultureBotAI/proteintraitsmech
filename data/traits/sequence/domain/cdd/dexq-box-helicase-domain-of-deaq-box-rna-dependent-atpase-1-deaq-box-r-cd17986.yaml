label: "DEXQ-box helicase domain of DEAQ-box RNA dependent ATPase 1. DEAQ-box RNA dependent ATPase 1 (DQX1) belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
