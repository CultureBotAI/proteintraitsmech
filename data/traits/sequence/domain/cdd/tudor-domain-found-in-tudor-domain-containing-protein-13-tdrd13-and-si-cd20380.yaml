identifier: CDD:cd20380
label: "Tudor domain found in Tudor domain-containing protein 13 (TDRD13) and similar proteins. The TDRD13 family includes TDRD13 and OTU domain-containing protein 4 (OTUD4). TDRD13, also called asparagine-linked glycosylation 13 (ALG13), glycosyltransferase 28 domain-containing protein 1 (GLT28D1), or UDP-N-acetylglucosamine transferase subunit ALG13, is a putative bifunctional UDP-N-acetylglucosamine transferase and deubiquitinase (EC 2.4.1.141/EC 3.4.19.12). It is a potential member of the Alg7p/Alg13p/Alg14p complex catalyzing the first two initial reactions in the N-glycosylation process. OTUD4, also called HIV-1-induced protein HIN-1, is a phospho-activated K63 deubiquitinase that hydrolyzes the isopeptide bond between the ubiquitin C-terminus and the lysine epsilon-amino group of the target protein. It may negatively regulate inflammatory and pathogen recognition signaling in innate immune response. Members of this family contain one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Tudor domain-containing protein 13 (TDRD13) and similar proteins. The TDRD13 family includes TDRD13 and OTU domain-containing protein 4 (OTUD4). TDRD13, also called asparagine-linked glycosylation 13 (ALG13), glycosyltransferase 28 domain-containing protein 1 (GLT28D1), or UDP-N-acetylglucosamine transferase subunit ALG13, is a putative bifunctional UDP-N-acetylglucosamine transferase and deubiquitinase (EC 2.4.1.141/EC 3.4.19.12). It is a potential member of the Alg7p/Alg13p/Alg14p complex catalyzing the first two initial reactions in the N-glycosylation process. OTUD4, also called HIV-1-induced protein HIN-1, is a phospho-activated K63 deubiquitinase that hydrolyzes the isopeptide bond between the ubiquitin C-terminus and the lysine epsilon-amino group of the target protein. It may negatively regulate inflammatory and pathogen recognition signaling in innate immune response. Members of this family contain one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20380); members share this curated model.
