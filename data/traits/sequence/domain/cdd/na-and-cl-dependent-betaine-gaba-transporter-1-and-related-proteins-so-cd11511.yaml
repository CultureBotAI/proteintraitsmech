identifier: CDD:cd11511
label: "Na(+)- and Cl(-)-dependent betaine/GABA transporter-1, and related proteins; solute-binding domain. BGT1 is a relatively low-affinity transporter of gamma-aminobutyric acid (GABA), and can also transport betaine. GABA is the main inhibitory neurotransmitter within the mammalian CNS. Human BGT1 is encoded by the SLC6A12 gene, and is similar to mouse GAT2. Mouse GAT2 plays a role in transporting GABA across the blood-brain barrier. In addition to being expressed in cells of the central nervous system, BGT1 is expressed in peripheral tissues, including kidney, liver, and heart. An association has been shown between the SLC6A12 gene and the occurrence of aspirin-intolerant asthma, and BGT1 is a drug target for antiepileptic drugs. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
