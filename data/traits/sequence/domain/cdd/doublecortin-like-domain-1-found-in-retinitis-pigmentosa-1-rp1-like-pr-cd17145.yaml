identifier: CDD:cd17145
label: "Doublecortin-like domain 1 found in retinitis pigmentosa 1 (RP1)-like protein. RP1, also termed oxygen-regulated protein 1, is a member of the doublecortin (DCX) family. Its DCX domains occur in double tandem repeats. RP1 is associated with retinitis pigmentosa, which is a type of inherited blindness. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. The RP1 protein is expressed in photoreceptors and is required for correct stacking of outer segment discs. It interacts with many of the same cytoskeleton related proteins that other members of the DCX family interact with."
definition: >-
  Doublecortin-like domain 1 found in retinitis pigmentosa 1 (RP1)-like protein. RP1, also termed oxygen-regulated protein 1, is a member of the doublecortin (DCX) family. Its DCX domains occur in double tandem repeats. RP1 is associated with retinitis pigmentosa, which is a type of inherited blindness. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. The RP1 protein is expressed in photoreceptors and is required for correct stacking of outer segment discs. It interacts with many of the same cytoskeleton related proteins that other members of the DCX family interact with. — an NCBI CDD conserved domain (cd17145); members share this curated model.
