identifier: CDD:cd17211
label: "Ras-associating (RA) domain found in Ral guanine nucleotide dissociation stimulator-like 2 (RalGDS-like 2) and similar proteins. RalGDS-like 2 (RGL2), also termed RalGDS-like factor (RLF), or Ras-associated protein RAB2L, is a novel Ras and Rap 1A-associating protein that belongs to RalGDS family, whose members are involved in Ras and Ral signaling pathways as downstream effector proteins. RGL2 exhibits guanine nucleotide exchange activity towards the small GTPase Ral. Members in this family have similar domain structure: a central CDC25 homology domain with an upstream Ras Exchange motif (REM), and a C-terminal Ras-associating (RA) domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. The RA domain of RGL2 is phosphorylated by protein kinase A and the phosphorylation affects the ability of RGL2 to bind both Ras and Rap1."
definition: >-
  Ras-associating (RA) domain found in Ral guanine nucleotide dissociation stimulator-like 2 (RalGDS-like 2) and similar proteins. RalGDS-like 2 (RGL2), also termed RalGDS-like factor (RLF), or Ras-associated protein RAB2L, is a novel Ras and Rap 1A-associating protein that belongs to RalGDS family, whose members are involved in Ras and Ral signaling pathways as downstream effector proteins. RGL2 exhibits guanine nucleotide exchange activity towards the small GTPase Ral. Members in this family have similar domain structure: a central CDC25 homology domain with an upstream Ras Exchange motif (REM), and a C-terminal Ras-associating (RA) domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. The RA domain of RGL2 is phosphorylated by protein kinase A and the phosphorylation affects the ability of RGL2 to bind both Ras and Rap1. — an NCBI CDD conserved domain (cd17211); members share this curated model.
