identifier: CDD:cd22887
label: "Coiled-coiled domain of autophagy-related 16 (Atg16) family proteins. The Atg16 family includes Saccharomyces cerevisiae Atg16 (also called cytoplasm to vacuole targeting protein 11, CVT11, or SAP18), human autophagy-related protein 16-1 (also called APG16-like 1, ATG16L1, or APG16L) and autophagy-related protein 16-2 (also called APG16-like 2, ATG16L2, WD repeat-containing protein 80 or WDR80), and similar proteins. Atg16 stabilizes the Atg5-Atg12 conjugate and mediates the formation of the 350 kDa complex, which is necessary for autophagy. The Atg5-Atg12/Atg16 complex is required for efficient promotion of Atg8-conjugation to phosphatidylethanolamine and Atg8 localization to the pre-autophagosomal structure (PAS). Similarly, human ATG16L1 plays an essential role in autophagy and acts as a molecular scaffold which mediates protein-protein interactions essential for autophagosome formation. ATG16L2, though structurally similar to ATG16L1 and able to form a complex with the autophagy proteins Atg5 and Atg12, is not essential for autophagy. Single-nucleotide polymorphisms in ATG16L1 is associated with an increased risk of developing Crohn disease. Saccharomyces cerevisiae Atg16 contains an N-terminal domain (NTD) that interacts with the Atg5-Atg12 protein conjugate and a coiled-coil domain (CCD) that dimerizes and mediates self-assembly. Human ATG16L1 and ATG16L2 also contains an N-terminal region that binds Atg5, a CCD homologous to the yeast CCD, and a WD40 domain that represents approximately 50% of the full-length protein. This model corresponds to the CCD of Atg16 family proteins."
definition: >-
  Coiled-coiled domain of autophagy-related 16 (Atg16) family proteins. The Atg16 family includes Saccharomyces cerevisiae Atg16 (also called cytoplasm to vacuole targeting protein 11, CVT11, or SAP18), human autophagy-related protein 16-1 (also called APG16-like 1, ATG16L1, or APG16L) and autophagy-related protein 16-2 (also called APG16-like 2, ATG16L2, WD repeat-containing protein 80 or WDR80), and similar proteins. Atg16 stabilizes the Atg5-Atg12 conjugate and mediates the formation of the 350 kDa complex, which is necessary for autophagy. The Atg5-Atg12/Atg16 complex is required for efficient promotion of Atg8-conjugation to phosphatidylethanolamine and Atg8 localization to the pre-autophagosomal structure (PAS). Similarly, human ATG16L1 plays an essential role in autophagy and acts as a molecular scaffold which mediates protein-protein interactions essential for autophagosome formation. ATG16L2, though structurally similar to ATG16L1 and able to form a complex with the autophagy proteins Atg5 and Atg12, is not essential for autophagy. Single-nucleotide polymorphisms in ATG16L1 is associated with an increased risk of developing Crohn disease. Saccharomyces cerevisiae Atg16 contains an N-terminal domain (NTD) that interacts with the Atg5-Atg12 protein conjugate and a coiled-coil domain (CCD) that dimerizes and mediates self-assembly. Human ATG16L1 and ATG16L2 also contains an N-terminal region that binds Atg5, a CCD homologous to the yeast CCD, and a WD40 domain that represents approximately 50% of the full-length protein. This model corresponds to the CCD of Atg16 family proteins. — an NCBI CDD conserved domain (cd22887); members share this curated model.
