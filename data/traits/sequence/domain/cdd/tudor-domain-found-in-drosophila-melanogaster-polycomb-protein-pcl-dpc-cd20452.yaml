identifier: CDD:cd20452
label: "Tudor domain found in Drosophila melanogaster Polycomb protein PCL (dPCL)and similar proteins. dPCL, also called Polycomblike protein, is a Polycomb group (PcG) protein that is specifically required during the first 6 hours of embryogenesis to establish the repressed state. dPCL is a component of the Esc/E(z) complex, which methylates 'Lys-9' and 'Lys-27' residues of histone H3, leading to transcriptional repression of the affected target gene. Like other PCL family proteins, it consists of an N-terminal Tudor domain followed by two PHD domains, and a C-terminal MTF2 domain. PCL proteins specifically recognize tri-methylated H3K36 (H3K36me3) through their N-terminal Tudor domains."
definition: >-
