identifier: CDD:cd08923
label: "Class1 nonsymbiotic hemoglobins (nsHbs), class II nsHbs, leghemoglobins (Lbs,) and related proteins. Class1 nsHbs include the dimeric hexacoordinate Trema tomentosa nsHb and the dimeric hexacoordinate nsHb from monocot barley. Also belonging to this family is ParaHb, a dimeric pentacoordinate Hb from the root nodules of Parasponia andersonii, a non-legume capable of symbiotic nitrogen fixation. ParaHb is unusual in that it has different heme redox potentials for each subunit; it may have evolved from class1 nsHbs. Lbs are pentacoordinate, and facilitate the diffusion of O2 to the respiring Rhizobium bacteroids within root nodules. They may have evolved from class 2 nonsymbiotic hemoglobins (class2 nsHb)."
definition: >-
  Class1 nonsymbiotic hemoglobins (nsHbs), class II nsHbs, leghemoglobins (Lbs,) and related proteins. Class1 nsHbs include the dimeric hexacoordinate Trema tomentosa nsHb and the dimeric hexacoordinate nsHb from monocot barley. Also belonging to this family is ParaHb, a dimeric pentacoordinate Hb from the root nodules of Parasponia andersonii, a non-legume capable of symbiotic nitrogen fixation. ParaHb is unusual in that it has different heme redox potentials for each subunit; it may have evolved from class1 nsHbs. Lbs are pentacoordinate, and facilitate the diffusion of O2 to the respiring Rhizobium bacteroids within root nodules. They may have evolved from class 2 nonsymbiotic hemoglobins (class2 nsHb). — an NCBI CDD conserved domain (cd08923); members share this curated model.
