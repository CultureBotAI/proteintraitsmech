identifier: CDD:cd13766
label: "transforming growth factor beta (TGF-beta) like domain found in growth/differentiation factor 5 (GDF5), factor 6 (GDF6), factor 7 (GDF7) and similar proteins. The family includes GDF5, GDF6 and GDF7. GDF5, also termed bone morphogenetic protein 14 (BMP-14), or cartilage-derived morphogenetic protein 1 (CDMP-1), or lipopolysaccharide-associated protein 4 (LAP-4), or LPS-associated protein 4, or radotermin, is a growth factor involved in bone and cartilage formation. GDF6, also termed bone morphogenetic protein 13 (BMP-13), or growth/differentiation factor 16, is a growth factor that controls proliferation and cellular differentiation in the retina and bone formation. GDF7, also termed bone morphogenetic protein 12 (BMP-12), may play an active role in the motor area of the primate neocortex."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in growth/differentiation factor 5 (GDF5), factor 6 (GDF6), factor 7 (GDF7) and similar proteins. The family includes GDF5, GDF6 and GDF7. GDF5, also termed bone morphogenetic protein 14 (BMP-14), or cartilage-derived morphogenetic protein 1 (CDMP-1), or lipopolysaccharide-associated protein 4 (LAP-4), or LPS-associated protein 4, or radotermin, is a growth factor involved in bone and cartilage formation. GDF6, also termed bone morphogenetic protein 13 (BMP-13), or growth/differentiation factor 16, is a growth factor that controls proliferation and cellular differentiation in the retina and bone formation. GDF7, also termed bone morphogenetic protein 12 (BMP-12), may play an active role in the motor area of the primate neocortex. — an NCBI CDD conserved domain (cd13766); members share this curated model.
