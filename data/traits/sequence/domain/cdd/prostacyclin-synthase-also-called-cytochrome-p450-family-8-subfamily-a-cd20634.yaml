identifier: CDD:cd20634
label: "prostacyclin Synthase, also called cytochrome P450 family 8, subfamily A, polypeptide 1. Prostacyclin synthase, also called prostaglandin I2 synthase (PGIS) or cytochrome P450 8a1 (CYP8A1), catalyzes the isomerization of prostaglandin H2 to prostacyclin (or prostaglandin I2), a potent mediator of vasodilation and anti-platelet aggregation. It belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  prostacyclin Synthase, also called cytochrome P450 family 8, subfamily A, polypeptide 1. Prostacyclin synthase, also called prostaglandin I2 synthase (PGIS) or cytochrome P450 8a1 (CYP8A1), catalyzes the isomerization of prostaglandin H2 to prostacyclin (or prostaglandin I2), a potent mediator of vasodilation and anti-platelet aggregation. It belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20634); members share this curated model.
