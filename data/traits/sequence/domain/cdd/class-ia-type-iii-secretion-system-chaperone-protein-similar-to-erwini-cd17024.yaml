identifier: CDD:cd17024
label: "Class IA type III secretion system chaperone protein, similar to Erwinia amylovora DspF (DspF/AvrF family protein). This family includes type III secretion system (T3SS) chaperone proteins similar to Erwinia amylovora DspF, Pantoea stewartii WtsE, Pseudomonas viridiflava AvrF, and similar proteins, all of which bind AvrE family type III effector proteins. In E. amylovora, a gram-negative enterobacterium that causes a devastating blight disease of apple and pear trees, the T3SS allows injection of effector DspE via the chaperone DspF. DspE has been shown to interact with several apple proteins, suppress salicylic acid-mediated host defenses and cause necrotic cell death in host and non-host plants. In Pectobacterium carotovorum, DspE is required early in solanum tuberosum leaf infection to cause cell death. Effector WtsE in P. stewartii causes disease-associated cell death in corn and requires the chaperone protein WtsF for stability."
definition: >-
  Class IA type III secretion system chaperone protein, similar to Erwinia amylovora DspF (DspF/AvrF family protein). This family includes type III secretion system (T3SS) chaperone proteins similar to Erwinia amylovora DspF, Pantoea stewartii WtsE, Pseudomonas viridiflava AvrF, and similar proteins, all of which bind AvrE family type III effector proteins. In E. amylovora, a gram-negative enterobacterium that causes a devastating blight disease of apple and pear trees, the T3SS allows injection of effector DspE via the chaperone DspF. DspE has been shown to interact with several apple proteins, suppress salicylic acid-mediated host defenses and cause necrotic cell death in host and non-host plants. In Pectobacterium carotovorum, DspE is required early in solanum tuberosum leaf infection to cause cell death. Effector WtsE in P. stewartii causes disease-associated cell death in corn and requires the chaperone protein WtsF for stability. — an NCBI CDD conserved domain (cd17024); members share this curated model.
