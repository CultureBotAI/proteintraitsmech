identifier: CDD:cd20261
label: Complex1_LYR_LYRM1
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in LYR motif-containing protein 1 (LYRM1) and similar proteins. LYR motif-containing protein 1 (LYRM1) may promote cell proliferation and inhibition of apoptosis of preadipocytes. Overexpression of the human LYRM1 causes mitochondrial dysfunction and induces insulin resistance in 3T3-L1 adipocytes. LYRM1 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus
