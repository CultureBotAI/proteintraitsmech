identifier: CDD:cd11956
label: "Src homology 3 domain of Slit-Robo GTPase Activating Protein 4. srGAP4, also called ARHGAP4, is highly expressed in hematopoietic cells and may play a role in lymphocyte differentiation. It is able to stimulate the GTPase activity of Rac1, Cdc42, and RhoA. In the nervous system, srGAP4 has been detected in differentiating neurites and may be involved in axon and dendritic growth. srGAPs are Rho GAPs that interact with Robo1, the transmembrane receptor of Slit proteins. Slit proteins are secreted proteins that control axon guidance and the migration of neurons and leukocytes. srGAPs contain an N-terminal F-BAR domain, a Rho GAP domain, and a C-terminal SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Slit-Robo GTPase Activating Protein 4. srGAP4, also called ARHGAP4, is highly expressed in hematopoietic cells and may play a role in lymphocyte differentiation. It is able to stimulate the GTPase activity of Rac1, Cdc42, and RhoA. In the nervous system, srGAP4 has been detected in differentiating neurites and may be involved in axon and dendritic growth. srGAPs are Rho GAPs that interact with Robo1, the transmembrane receptor of Slit proteins. Slit proteins are secreted proteins that control axon guidance and the migration of neurons and leukocytes. srGAPs contain an N-terminal F-BAR domain, a Rho GAP domain, and a C-terminal SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11956); members share this curated model.
