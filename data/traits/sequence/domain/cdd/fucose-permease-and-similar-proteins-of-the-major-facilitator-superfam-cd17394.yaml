identifier: CDD:cd17394
label: "Fucose permease and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of L-fucose permease (also called L-fucose-proton symporter) and similar proteins such as glucose/galactose transporter and N-acetyl glucosamine transporter NagP. L-fucose permease facilitates the uptake of L-fucose across the boundary membrane with the concomitant transport of protons into the cell; it can also transport L-galactose and D-arabinose. Glucose/galactose transporter functions in the uptake of of glucose and galactose. The FucP-like subfamily belongs to the bacterial fucose permease, eukaryotic Major facilitator superfamily domain-containing protein 4 (FucP/MFSD4) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Fucose permease and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of L-fucose permease (also called L-fucose-proton symporter) and similar proteins such as glucose/galactose transporter and N-acetyl glucosamine transporter NagP. L-fucose permease facilitates the uptake of L-fucose across the boundary membrane with the concomitant transport of protons into the cell; it can also transport L-galactose and D-arabinose. Glucose/galactose transporter functions in the uptake of of glucose and galactose. The FucP-like subfamily belongs to the bacterial fucose permease, eukaryotic Major facilitator superfamily domain-containing protein 4 (FucP/MFSD4) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17394); members share this curated model.
