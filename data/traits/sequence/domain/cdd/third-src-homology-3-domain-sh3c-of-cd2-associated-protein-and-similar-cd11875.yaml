identifier: CDD:cd11875
label: "Third Src Homology 3 domain (SH3C) of CD2-associated protein and similar proteins. This subfamily is composed of the third SH3 domain (SH3C) of CD2AP, CIN85 (Cbl-interacting protein of 85 kDa), and similar domains. CD2AP and CIN85 are adaptor proteins that bind to protein partners and assemble complexes that have been implicated in T cell activation, kidney function, and apoptosis of neuronal cells. They also associate with endocytic proteins, actin cytoskeleton components, and other adaptor proteins involved in receptor tyrosine kinase (RTK) signaling. CD2AP and the main isoform of CIN85 contain three SH3 domains, a proline-rich region, and a C-terminal coiled-coil domain. All of these domains enable CD2AP and CIN85 to bind various protein partners and assemble complexes that have been implicated in many different functions. SH3C of both proteins have been shown to bind to ubiquitin. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Third Src Homology 3 domain (SH3C) of CD2-associated protein and similar proteins. This subfamily is composed of the third SH3 domain (SH3C) of CD2AP, CIN85 (Cbl-interacting protein of 85 kDa), and similar domains. CD2AP and CIN85 are adaptor proteins that bind to protein partners and assemble complexes that have been implicated in T cell activation, kidney function, and apoptosis of neuronal cells. They also associate with endocytic proteins, actin cytoskeleton components, and other adaptor proteins involved in receptor tyrosine kinase (RTK) signaling. CD2AP and the main isoform of CIN85 contain three SH3 domains, a proline-rich region, and a C-terminal coiled-coil domain. All of these domains enable CD2AP and CIN85 to bind various protein partners and assemble complexes that have been implicated in many different functions. SH3C of both proteins have been shown to bind to ubiquitin. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11875); members share this curated model.
