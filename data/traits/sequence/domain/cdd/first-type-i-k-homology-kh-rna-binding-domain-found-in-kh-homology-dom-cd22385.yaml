identifier: CDD:cd22385
label: "first type I K homology (KH) RNA-binding domain found in KH homology domain-containing protein 4 (KHDC4) and similar proteins. KHDC4, also called Brings lots of money 7 (Blom7), or pre-mRNA splicing factor protein KHDC4, is an RNA-binding protein involved in pre-mRNA splicing. It interacts with the PRP19C/Prp19 complex/NTC/Nineteen complex which is part of the spliceosome. KHDC4 binds preferentially RNA with A/C rich sequences and poly-C stretches. KHDC4 contains two type I K homology (KH) RNA-binding domains. The model corresponds to the first one. The KH1 domain is a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  first type I K homology (KH) RNA-binding domain found in KH homology domain-containing protein 4 (KHDC4) and similar proteins. KHDC4, also called Brings lots of money 7 (Blom7), or pre-mRNA splicing factor protein KHDC4, is an RNA-binding protein involved in pre-mRNA splicing. It interacts with the PRP19C/Prp19 complex/NTC/Nineteen complex which is part of the spliceosome. KHDC4 binds preferentially RNA with A/C rich sequences and poly-C stretches. KHDC4 contains two type I K homology (KH) RNA-binding domains. The model corresponds to the first one. The KH1 domain is a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22385); members share this curated model.
