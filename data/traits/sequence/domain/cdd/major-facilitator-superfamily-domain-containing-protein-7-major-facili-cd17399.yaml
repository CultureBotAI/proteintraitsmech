identifier: CDD:cd17399
label: "Major facilitator superfamily domain-containing protein 7. Major facilitator superfamily domain-containing protein 7 (MFSD7) is also called myosin light polypeptide 5 regulatory protein (MYL5). It's function is unknown. It is encoded by the a SLC49A3 gene and is a member of the Solute carrier 49 (SLC49) family, which also includes feline leukemia virus subgroup C receptor 1 (FLVCR1, SLC49A1), FLVCR2 (SLC49A2), as well as disrupted in renal carcinoma protein 2 (DIRC2, SLC49A4). FLVCR1 and FLVCR2 are heme transporters. DIRC2 is an electrogenic lysosomal metabolite transporter that is regulated by limited proteolytic processing by cathepsin L. MFSD7 belongs to the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing protein 7. Major facilitator superfamily domain-containing protein 7 (MFSD7) is also called myosin light polypeptide 5 regulatory protein (MYL5). It's function is unknown. It is encoded by the a SLC49A3 gene and is a member of the Solute carrier 49 (SLC49) family, which also includes feline leukemia virus subgroup C receptor 1 (FLVCR1, SLC49A1), FLVCR2 (SLC49A2), as well as disrupted in renal carcinoma protein 2 (DIRC2, SLC49A4). FLVCR1 and FLVCR2 are heme transporters. DIRC2 is an electrogenic lysosomal metabolite transporter that is regulated by limited proteolytic processing by cathepsin L. MFSD7 belongs to the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17399); members share this curated model.
