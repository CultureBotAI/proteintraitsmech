identifier: CDD:cd13425
label: "Peptidases of the G1 family and homologs that might lack peptidase activity. Some members of this family had been classified earlier as carboxyl peptidases insensitive to pepstatin, and the family has also been called the eqolisin family, due to the fact that the conserved catalytic dyad of the family consists of a glutamate (E) and glutamine (Q) residue. The family is found in fungi and bacteria. This family also includes homologous uncharacterized proteins that might lack peptidase activity."
definition: >-
  Peptidases of the G1 family and homologs that might lack peptidase activity. Some members of this family had been classified earlier as carboxyl peptidases insensitive to pepstatin, and the family has also been called the eqolisin family, due to the fact that the conserved catalytic dyad of the family consists of a glutamate (E) and glutamine (Q) residue. The family is found in fungi and bacteria. This family also includes homologous uncharacterized proteins that might lack peptidase activity. — an NCBI CDD conserved domain (cd13425); members share this curated model.
