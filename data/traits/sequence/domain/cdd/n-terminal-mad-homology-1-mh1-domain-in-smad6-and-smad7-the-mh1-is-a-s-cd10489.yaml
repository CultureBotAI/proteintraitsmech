identifier: CDD:cd10489
label: "N-terminal Mad Homology 1 (MH1) domain in SMAD6 and SMAD7. The MH1 is a small DNA-binding domain present in SMAD (small mothers against decapentaplegic) family of proteins, which are signal transducers and transcriptional modulators that mediate multiple signaling pathways.  MH1 binds to the DNA major groove in an unusual manner via a beta hairpin structure.  It negatively regulates the functions of the MH2 domain, the C-terminal domain of SMAD. This MH1 domain is found in SMAD6 and SMAD7, both inhibitory SMADs (I-SMADs) and negative regulators of signaling mediated by TGF-beta superfamily. SMAD6 specifically inhibits bone morphogenetic protein (BMP) type I receptor mediated signaling while SMAD7 enhances muscle differentiation and is often associated with cancer, tissue fibrosis and inflammatory diseases."
definition: >-
