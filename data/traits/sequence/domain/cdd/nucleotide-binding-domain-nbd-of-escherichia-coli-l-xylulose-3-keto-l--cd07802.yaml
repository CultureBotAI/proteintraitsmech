identifier: CDD:cd07802
label: "nucleotide-binding domain (NBD) of Escherichia coli L-xylulose/3-keto-L-gulonate kinase (EcLyxK) and similar proteins. The subfamily contains a group of uncharacterized proteins with similarity to Escherichia coli L-xylulose/3-keto-L-gulonate kinase (EcLyxK; EC 2.7.1.-/EC 2.7.1.53), Pasteurella multocida L-xylulose kinase (PmLyX, also known as L-xylulokinase; EC 2.7.1.53), and Brucella abortus erythritol kinase (BaEryA; EC 2.7.1.215). EcLyxK catalyzes the phosphorylation of L-xylulose and 3-keto-L-gulonate. It is involved in L-lyxose utilization via xylulose and may also be involved in the utilization of 2,3-diketo-L-gulonate. PmLyX catalyzes the phosphorylation of L-xylulose only. BaEryA catalyzes the phosphorylation of erythritol to D-erythritol-1-phosphate. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli L-xylulose/3-keto-L-gulonate kinase (EcLyxK) and similar proteins. The subfamily contains a group of uncharacterized proteins with similarity to Escherichia coli L-xylulose/3-keto-L-gulonate kinase (EcLyxK; EC 2.7.1.-/EC 2.7.1.53), Pasteurella multocida L-xylulose kinase (PmLyX, also known as L-xylulokinase; EC 2.7.1.53), and Brucella abortus erythritol kinase (BaEryA; EC 2.7.1.215). EcLyxK catalyzes the phosphorylation of L-xylulose and 3-keto-L-gulonate. It is involved in L-lyxose utilization via xylulose and may also be involved in the utilization of 2,3-diketo-L-gulonate. PmLyX catalyzes the phosphorylation of L-xylulose only. BaEryA catalyzes the phosphorylation of erythritol to D-erythritol-1-phosphate. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07802); members share this curated model.
