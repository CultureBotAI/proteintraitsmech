identifier: CDD:cd06978
label: "L-ectoine synthase, cupin domain. Ectoine synthase (EctC; also known as L-ectoine synthase or N-acetyldiaminobutyrate dehydratase; EC 4.2.1.108) is a cupin-like bacterial protein that converts N'-acetyldiaminobutyric acid to ectoine, in the last step of the L-ectoine biosynthetic pathway, via a cyclo-condensation reaction and using iron as the cofactor. Ectoines are potent microbial stress protectants, primarily synthesized by bacteria but also found in a few obligate halophilic protists and archaea, based on the ectoine biosynthetic ectABC gene. In halophilic eubacteria, the osmolytic ectoines enable the organisms to adapt to a wide range of salt concentrations by adjusting the cytoplasmic solute pool to the osmolarity of the surrounding environment. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  L-ectoine synthase, cupin domain. Ectoine synthase (EctC; also known as L-ectoine synthase or N-acetyldiaminobutyrate dehydratase; EC 4.2.1.108) is a cupin-like bacterial protein that converts N'-acetyldiaminobutyric acid to ectoine, in the last step of the L-ectoine biosynthetic pathway, via a cyclo-condensation reaction and using iron as the cofactor. Ectoines are potent microbial stress protectants, primarily synthesized by bacteria but also found in a few obligate halophilic protists and archaea, based on the ectoine biosynthetic ectABC gene. In halophilic eubacteria, the osmolytic ectoines enable the organisms to adapt to a wide range of salt concentrations by adjusting the cytoplasmic solute pool to the osmolarity of the surrounding environment. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd06978); members share this curated model.
