identifier: CDD:cd04720
label: "BAH, or Bromo Adjacent Homology domain, as present in Orc1p, which again is part of the Saccharomyces cerevisiae Sir1-origin recognition complex, and as present in Sir3p. The Orc1p BAH doman functions in epigenetic silencing. BAH domains are found in a variety of proteins playing roles in transcriptional silencing and the remodeling of chromatin. It is assumed that in most or all of these instances the BAH domain mediates protein-protein interactions."
definition: >-
  BAH, or Bromo Adjacent Homology domain, as present in Orc1p, which again is part of the Saccharomyces cerevisiae Sir1-origin recognition complex, and as present in Sir3p. The Orc1p BAH doman functions in epigenetic silencing. BAH domains are found in a variety of proteins playing roles in transcriptional silencing and the remodeling of chromatin. It is assumed that in most or all of these instances the BAH domain mediates protein-protein interactions. — an NCBI CDD conserved domain (cd04720); members share this curated model.
