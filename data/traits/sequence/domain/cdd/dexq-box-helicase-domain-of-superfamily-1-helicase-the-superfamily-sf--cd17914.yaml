identifier: CDD:cd17914
label: "DEXQ-box helicase domain of superfamily 1 helicase. The superfamily (SF)1 family members include UvrD/Rep, Pif1-like, and Upf-1-like proteins. Like SF2, they do not form toroidal, predominantly hexameric structures like SF3-6. Their helicase core is surrounded by C and N-terminal domains with specific functions such as nucleases, RNA or DNA binding domains or domains engaged in protein-protein interactions. SF1 is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXQ-box helicase domain of superfamily 1 helicase. The superfamily (SF)1 family members include UvrD/Rep, Pif1-like, and Upf-1-like proteins. Like SF2, they do not form toroidal, predominantly hexameric structures like SF3-6. Their helicase core is surrounded by C and N-terminal domains with specific functions such as nucleases, RNA or DNA binding domains or domains engaged in protein-protein interactions. SF1 is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17914); members share this curated model.
