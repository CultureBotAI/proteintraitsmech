identifier: CDD:cd06920
label: "NEAr Transport domain, a component of cell surface proteins. NEAr Transporter (NEAT) domain; used by pathogenic bacteria to to scavenge heme-iron from host hemoproteins. The NEAT domain is a component of cell surface proteins (iron regulated surface determinants, or Isd, such as IsdA and IsdC)  in various gram-positive bacteria, and may be arranged in tandem repeats."
definition: >-
  NEAr Transport domain, a component of cell surface proteins. NEAr Transporter (NEAT) domain; used by pathogenic bacteria to to scavenge heme-iron from host hemoproteins. The NEAT domain is a component of cell surface proteins (iron regulated surface determinants, or Isd, such as IsdA and IsdC) in various gram-positive bacteria, and may be arranged in tandem repeats. — an NCBI CDD conserved domain (cd06920); members share this curated model.
