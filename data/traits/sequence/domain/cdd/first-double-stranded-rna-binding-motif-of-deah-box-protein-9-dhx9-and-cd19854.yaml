identifier: CDD:cd19854
label: "first double-stranded RNA binding motif of DEAH box protein 9 (DHX9) and similar proteins. DHX9 (EC 3.6.4.13; also known as ATP-dependent RNA helicase A, DExH-box helicase 9 (DDX9), Leukophysin (LKP), nuclear DNA helicase II (NDH II), NDH2, or RNA helicase A) is a multifunctional ATP-dependent nucleic acid helicase that unwinds DNA and RNA in a 3' to 5' direction and plays important roles in many processes, such as DNA replication, transcriptional activation, post-transcriptional RNA regulation, mRNA translation, and RNA-mediated gene silencing. It contains two double-stranded RNA binding motifs (DSRMs) at the N-terminal region. This model corresponds to the first motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  first double-stranded RNA binding motif of DEAH box protein 9 (DHX9) and similar proteins. DHX9 (EC 3.6.4.13; also known as ATP-dependent RNA helicase A, DExH-box helicase 9 (DDX9), Leukophysin (LKP), nuclear DNA helicase II (NDH II), NDH2, or RNA helicase A) is a multifunctional ATP-dependent nucleic acid helicase that unwinds DNA and RNA in a 3' to 5' direction and plays important roles in many processes, such as DNA replication, transcriptional activation, post-transcriptional RNA regulation, mRNA translation, and RNA-mediated gene silencing. It contains two double-stranded RNA binding motifs (DSRMs) at the N-terminal region. This model corresponds to the first motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19854); members share this curated model.
