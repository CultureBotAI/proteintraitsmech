identifier: CDD:cd02029
label: "Phosphoribulokinase-like (PRK-like) is a family of proteins similar to phosphoribulokinase (PRK), the enzyme involved in the Benson-Calvin cycle in chloroplasts or photosynthetic prokaryotes. PRK catalyzes the phosphorylation of D-ribulose 5-phosphate to form D-ribulose 1, 5-biphosphate, using ATP and NADPH produced by the primary reactions of photosynthesis."
definition: >-
  Phosphoribulokinase-like (PRK-like) is a family of proteins similar to phosphoribulokinase (PRK), the enzyme involved in the Benson-Calvin cycle in chloroplasts or photosynthetic prokaryotes. PRK catalyzes the phosphorylation of D-ribulose 5-phosphate to form D-ribulose 1, 5-biphosphate, using ATP and NADPH produced by the primary reactions of photosynthesis. — an NCBI CDD conserved domain (cd02029); members share this curated model.
