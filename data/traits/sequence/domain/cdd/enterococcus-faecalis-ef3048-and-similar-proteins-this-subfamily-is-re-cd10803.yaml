identifier: CDD:cd10803
label: "Enterococcus faecalis EF3048 and similar proteins. This subfamily is represented by a putative cellobiose-phosphate cleavage protein EF3048 from Enterococcus faecalis v583. It is similar to Escherichia coli YdjC, a hypothetical protein encoded by the celG gene. EF3048 might function as a homodimer. Each of the monomers consists of a (beta/alpha)-barrel fold that forms an active homodimer. The molecular function of the EF3048 is unclear."
definition: >-
  Enterococcus faecalis EF3048 and similar proteins. This subfamily is represented by a putative cellobiose-phosphate cleavage protein EF3048 from Enterococcus faecalis v583. It is similar to Escherichia coli YdjC, a hypothetical protein encoded by the celG gene. EF3048 might function as a homodimer. Each of the monomers consists of a (beta/alpha)-barrel fold that forms an active homodimer. The molecular function of the EF3048 is unclear. — an NCBI CDD conserved domain (cd10803); members share this curated model.
