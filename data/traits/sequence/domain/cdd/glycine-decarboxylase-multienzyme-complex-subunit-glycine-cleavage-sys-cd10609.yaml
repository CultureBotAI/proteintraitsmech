identifier: CDD:cd10609
label: GDC-P_alpha
definition: >-
  Glycine decarboxylase multienzyme complex subunit: Glycine cleavage system P-protein, alpha-subunit. Glycine cleavage system P-protein, alpha-subunit. This family consists of Glycine cleavage system P-proteins EC:1.4.4.2 from bacterial, mammalian and plant sources. The P protein is part of the glycine decarboxylase multienzyme complex EC:2.1.2.10 (GDC) also annotated as glycine cleavage system or glycine synthase. GDC consists of four proteins P, H, L and T. The reaction catalysed by this protein is: Glycine + lipoylprotein <=> S-aminomethyldihydrolipoylprotein + CO2. Alpha-beta-type dimers associate to form an alpha(2)beta(2) tetramer, where the alpha- and beta-subunits are structurally similar and appear to have arisen by gene duplication and subsequent divergence with loss of the active site in the alpha-subunit. The members of this CD are widely dispersed among all three forms of cellular life. In eukaryotes and some bacteria, the two subunits are present on the same polypeptide
