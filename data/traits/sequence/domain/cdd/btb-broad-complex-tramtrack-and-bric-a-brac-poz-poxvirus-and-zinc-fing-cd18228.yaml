identifier: CDD:cd18228
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 44 (ZBTB44). ZBTB44, also called BTB/POZ domain-containing protein 15 (BTBD15) or zinc finger protein 851 (ZNF851), may be involved in transcriptional regulation. Single-nucleotide polymorphisms of ZBTB44 showed a suggestive association with disease progression of Crohn's disease. ZBTB44 has also preferentially been recognized by sera of patients with peripheral T-cell lymphoma (PTCL). It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 44 (ZBTB44). ZBTB44, also called BTB/POZ domain-containing protein 15 (BTBD15) or zinc finger protein 851 (ZNF851), may be involved in transcriptional regulation. Single-nucleotide polymorphisms of ZBTB44 showed a suggestive association with disease progression of Crohn's disease. ZBTB44 has also preferentially been recognized by sera of patients with peripheral T-cell lymphoma (PTCL). It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18228); members share this curated model.
