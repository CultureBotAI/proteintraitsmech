identifier: CDD:cd16799
label: "RING finger, H2 subclass, found in zinc/RING finger protein 3 (ZNRF3) and similar proteins. ZNRF3, also known as RING finger protein 203 (RNF203), is a homolog of Ring finger protein 43 (RNF43). It is a transmembrane E3 ubiquitin-protein ligase that is associated with the Wnt receptor complex, and negatively regulates Wnt signaling by promoting the turnover of frizzled and lipoprotein receptor-related protein LRP6 in an R-spondin-sensitive manner. It inhibits gastric cancer cell growth and promotes cell apoptosis by affecting the Wnt/beta-catenin/TCF signaling pathway. ZNRF3 contains an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C3H2C3-type RING-H2 finger followed by a long C-terminal region."
definition: >-
  RING finger, H2 subclass, found in zinc/RING finger protein 3 (ZNRF3) and similar proteins. ZNRF3, also known as RING finger protein 203 (RNF203), is a homolog of Ring finger protein 43 (RNF43). It is a transmembrane E3 ubiquitin-protein ligase that is associated with the Wnt receptor complex, and negatively regulates Wnt signaling by promoting the turnover of frizzled and lipoprotein receptor-related protein LRP6 in an R-spondin-sensitive manner. It inhibits gastric cancer cell growth and promotes cell apoptosis by affecting the Wnt/beta-catenin/TCF signaling pathway. ZNRF3 contains an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C3H2C3-type RING-H2 finger followed by a long C-terminal region. — an NCBI CDD conserved domain (cd16799); members share this curated model.
