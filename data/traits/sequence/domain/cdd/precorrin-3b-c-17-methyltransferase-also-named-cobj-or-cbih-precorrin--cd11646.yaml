identifier: CDD:cd11646
label: "Precorrin-3B C(17)-methyltransferase (also named CobJ or CbiH). Precorrin-3B C(17)-methyltransferase participates in the pathway toward the biosynthesis of cobalamin (vitamin B12). There are two distinct cobalamin biosynthetic pathways. The aerobic pathway requires oxygen, and cobalt is inserted late in the pathway; the anaerobic pathway does not require oxygen, and cobalt insertion is the first committed step towards cobalamin synthesis. This model includes CobJ of the aerobic pathway and CbiH of the anaerobic pathway, both as stand-alone enzymes and when CobJ or CbiH form part of bifunctional enzymes, such as in Mycobacterium tuberculosis CobIJ  where CobJ fuses with a precorrin-2 C(20)-methyltransferase domain, or Bacillus megaterium CbiH60, where CbiH is fused to a nitrite and sulfite reductase-like domain. In the aerobic pathway, once CobG has generated precorrin-3b, CobJ catalyzes the methylation of precorrin-3b at C-17 to form precorrin-4 (the extruded methylated C-20 fragment is left attached as an acyl group at C-1). In the corresponding anaerobic  pathway, CbiH carries out this ring contraction, using cobalt-precorrin-3b as a substrate to generate a tetramethylated delta-lactone."
definition: >-
  Precorrin-3B C(17)-methyltransferase (also named CobJ or CbiH). Precorrin-3B C(17)-methyltransferase participates in the pathway toward the biosynthesis of cobalamin (vitamin B12). There are two distinct cobalamin biosynthetic pathways. The aerobic pathway requires oxygen, and cobalt is inserted late in the pathway; the anaerobic pathway does not require oxygen, and cobalt insertion is the first committed step towards cobalamin synthesis. This model includes CobJ of the aerobic pathway and CbiH of the anaerobic pathway, both as stand-alone enzymes and when CobJ or CbiH form part of bifunctional enzymes, such as in Mycobacterium tuberculosis CobIJ where CobJ fuses with a precorrin-2 C(20)-methyltransferase domain, or Bacillus megaterium CbiH60, where CbiH is fused to a nitrite and sulfite reductase-like domain. In the aerobic pathway, once CobG has generated precorrin-3b, CobJ catalyzes the methylation of precorrin-3b at C-17 to form precorrin-4 (the extruded methylated C-20 fragment is left attached as an acyl group at C-1). In the corresponding anaerobic pathway, CbiH carries out this ring contraction, using cobalt-precorrin-3b as a substrate to generate a tetramethylated delta-lactone. — an NCBI CDD conserved domain (cd11646); members share this curated model.
