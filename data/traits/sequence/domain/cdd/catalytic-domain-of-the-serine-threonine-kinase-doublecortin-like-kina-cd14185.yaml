identifier: CDD:cd14185
label: "Catalytic domain of the Serine/Threonine Kinase, Doublecortin-like kinase 3 (also called Doublecortin-like and CAM kinase-like 3). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DCKL3 (or DCAMKL3) belongs to the doublecortin (DCX) family of proteins which are involved in neuronal migration, neurogenesis, and eye receptor development, among others. Family members typically contain tandem doublecortin (DCX) domains at the N-terminus; DCX domains can bind microtubules and serve as protein-interaction platforms. DCKL3 contains a single DCX domain (instead of a tandem) and a C-terminal kinase domain with similarity to CAMKs. It has been shown to interact with tubulin and JIP1/2. The DCKL3 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Doublecortin-like kinase 3 (also called Doublecortin-like and CAM kinase-like 3). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DCKL3 (or DCAMKL3) belongs to the doublecortin (DCX) family of proteins which are involved in neuronal migration, neurogenesis, and eye receptor development, among others. Family members typically contain tandem doublecortin (DCX) domains at the N-terminus; DCX domains can bind microtubules and serve as protein-interaction platforms. DCKL3 contains a single DCX domain (instead of a tandem) and a C-terminal kinase domain with similarity to CAMKs. It has been shown to interact with tubulin and JIP1/2. The DCKL3 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14185); members share this curated model.
