identifier: CDD:cd23674
label: "mitochondrial 3' processome (MPsome) subunit 4. MPSS4 is a subunit of the mitochondrial 3' processome (MPsome) which is involved in 3'-5' trimming of messenger RNA (mRNA) precursors, in U-tailing of ribosomal RNA (rRNA) and some mRNAs, and in 3'-5' trimming and U-tailing of guide RNAs (gRNAs), during kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode gRNAs involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species.  MPsome subunits include KDSS1 3'-5' exonuclease, RET1 terminal uridyltransferase (TUTase), and several subunits of as yet undefined functions (MPSS1-MPSS6). The maxicircle and minicircle RNAs are transcribed as 3' extended precursors and processed by MPsome-dependent 3'-5' degradation, and in the case of rRNAs and gRNAs also 3' uridylated. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. The MPsome catalyzes the primary uridylation of about 800 nt gRNA precursor transcripts, their processive degradation to a mature size of 40-60 nt, and secondary U-tail addition. MPSS4 is predicted (AlphaFold) to have a structure containing only alpha helices, with nine domains (calculated by VAST). This model represents domains 3-5 (D3-D5), as well as parts of D2 and D6. No structure neighbors for the entire protein was detected, however, each domain showed many similar structures. Examples include similarity between MPSS4 D2 with Entamoeba histolytica diaphanous protein, D3 with domain 3 of Saccharomyces cerevisiae YPP1, and D4 with domain 3 of Human herpesvirus 2 envelope glycoprotein H, among others."
definition: >-
  mitochondrial 3' processome (MPsome) subunit 4. MPSS4 is a subunit of the mitochondrial 3' processome (MPsome) which is involved in 3'-5' trimming of messenger RNA (mRNA) precursors, in U-tailing of ribosomal RNA (rRNA) and some mRNAs, and in 3'-5' trimming and U-tailing of guide RNAs (gRNAs), during kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode gRNAs involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. MPsome subunits include KDSS1 3'-5' exonuclease, RET1 terminal uridyltransferase (TUTase), and several subunits of as yet undefined functions (MPSS1-MPSS6). The maxicircle and minicircle RNAs are transcribed as 3' extended precursors and processed by MPsome-dependent 3'-5' degradation, and in the case of rRNAs and gRNAs also 3' uridylated. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. The MPsome catalyzes the primary uridylation of about 800 nt gRNA precursor transcripts, their processive degradation to a mature size of 40-60 nt, and secondary U-tail addition. MPSS4 is predicted (AlphaFold) to have a structure containing only alpha helices, with nine domains (calculated by VAST). This model represents domains 3-5 (D3-D5), as well as parts of D2 and D6. No structure neighbors for the entire protein was detected, however, each domain showed many similar structures. Examples include similarity between MPSS4 D2 with Entamoeba histolytica diaphanous protein, D3 with domain 3 of Saccharomyces cerevisiae YPP1, and D4 with domain 3 of Human herpesvirus 2 envelope glycoprotein H, among others. — an NCBI CDD conserved domain (cd23674); members share this curated model.
