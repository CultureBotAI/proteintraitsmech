identifier: CDD:cd20266
label: Complex1_LYR_NDUFA6_LYRM6
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in NADH dehydrogenase [ubiquinone] 1 alpha subcomplex subunit 6 (NDUFA6) and similar proteins. NDUFA6, also called LYR motif-containing protein 6 (LYRM6), or Complex I-B14 (CI-B14), or NADH-ubiquinone oxidoreductase B14 subunit, is an accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I), and is believed to be not involved in catalysis. In general, accessory subunits are integral for assembly and function of Complex I, which functions in the transfer of electrons from NADH to the respiratory chain. NDUFA6 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus
