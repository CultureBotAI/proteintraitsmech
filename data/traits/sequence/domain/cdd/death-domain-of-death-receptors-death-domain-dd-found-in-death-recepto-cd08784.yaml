identifier: CDD:cd08784
label: "Death Domain of Death Receptors. Death domain (DD) found in death receptor proteins. Death receptors are members of the tumor necrosis factor (TNF) receptor superfamily, characterized by having a cytoplasmic DD. Known members of the family are Fas (CD95/APO-1), TNF-receptor 1 (TNFR1/TNFRSF1A/p55/CD120a), TNF-related apoptosis-inducing ligand receptor 1 (TRAIL-R1 /DR4), and receptor 2 (TRAIL-R2/DR5/APO-2/KILLER), as well as Death Receptor 3 (DR3/APO-3/TRAMP/WSL-1/LARD). They are involved in apoptosis signaling pathways. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Death Domain of Death Receptors. Death domain (DD) found in death receptor proteins. Death receptors are members of the tumor necrosis factor (TNF) receptor superfamily, characterized by having a cytoplasmic DD. Known members of the family are Fas (CD95/APO-1), TNF-receptor 1 (TNFR1/TNFRSF1A/p55/CD120a), TNF-related apoptosis-inducing ligand receptor 1 (TRAIL-R1 /DR4), and receptor 2 (TRAIL-R2/DR5/APO-2/KILLER), as well as Death Receptor 3 (DR3/APO-3/TRAMP/WSL-1/LARD). They are involved in apoptosis signaling pathways. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08784); members share this curated model.
