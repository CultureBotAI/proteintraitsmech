identifier: CDD:cd19423
label: "Triatominae salivary lipocalins such as Rhodnius prolixus LTBP1 and Meccus pallidipennis triabin, and similar proteins. This subfamily includes various insect proteins found in the saliva of Triatominae (kissing bugs), including Rhodnius prolixus leukotriene-binding LTBP1. Rhodnius prolixus, a vector of the pathogen Trypanosoma cruzi, sequesters cysteinyl leukotrienes during feeding to inhibit immediate inflammatory responses; LTBP1 binds leukotrienes C4 (LTC4), D4 (LTD4), and E4 (LTE4). Meccus pallidipennis (syn Triatoma pallidipennis) triabin is a potent and selective thrombin inhibitor. It also includes Triatoma protracta procalin, a major salivary allergen which causes an allergic reaction in humans. It belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
  Triatominae salivary lipocalins such as Rhodnius prolixus LTBP1 and Meccus pallidipennis triabin, and similar proteins. This subfamily includes various insect proteins found in the saliva of Triatominae (kissing bugs), including Rhodnius prolixus leukotriene-binding LTBP1. Rhodnius prolixus, a vector of the pathogen Trypanosoma cruzi, sequesters cysteinyl leukotrienes during feeding to inhibit immediate inflammatory responses; LTBP1 binds leukotrienes C4 (LTC4), D4 (LTD4), and E4 (LTE4). Meccus pallidipennis (syn Triatoma pallidipennis) triabin is a potent and selective thrombin inhibitor. It also includes Triatoma protracta procalin, a major salivary allergen which causes an allergic reaction in humans. It belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development. — an NCBI CDD conserved domain (cd19423); members share this curated model.
