identifier: CDD:cd03839
label: PNPOx_Rv1155_like
definition: >-
  Pyridoxine 5'-phosphate (PNP) oxidase-like protein. An open reading frame Rv1155 from Mycobacterium tuberculosis shows structural and functional similarity with the Pyridoxine 5'-phosphate (PNP) oxidase. PNP oxidase catalyzes the terminal step in the biosynthesis of pyridoxal 5'-phosphate (PLP) by the oxidation of either pyridoxine 5'-phosphate (PNP) or pyridoxamine 5'-phosphate (PMP). During the oxidation, a pair of electrons and a hydrogen atom are removed from the C4' alcohol or amino group of PNP or PMP to an aldehyde. The electrons are transferred to FMN and then to oxygen, forming hydrogen peroxide and regenerating FMN. In addition to the active site, the enzyme contains a non-catalytic site that binds pyridoxal 5'-phosphate to avoid releasing this highly reactive intermediate to the cytoplasm before it is channelled to the next enzyme that requires PLP as a cofactor. Most of the enzymes that require PLP as cofactor are involved in amino acid metabolism
