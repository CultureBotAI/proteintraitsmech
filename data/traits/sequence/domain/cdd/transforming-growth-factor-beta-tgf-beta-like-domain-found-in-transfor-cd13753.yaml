identifier: CDD:cd13753
label: TGF_beta_TGFbeta1_2_3
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in transforming growth factor beta-1 (TGF-beta-1), beta-2 (TGF-beta-2), beta-3 (TGF-beta-3) and similar proteins. The family includes TGF-beta-1, TGF-beta-2 and TGF-beta-3, which are polypeptide members of the transforming growth factor beta superfamily of cytokines. TGF-beta-1 is a secreted protein that performs many cellular functions, including the control of cell growth, cell proliferation, cell differentiation, and apoptosis. TGF-beta-2 is a secreted protein that performs many cellular functions and has a vital role during embryonic development. It can suppress the effects of interleukin-2 dependent T-cell growth. TGF-beta-3 is involved in embryogenesis and cell differentiation. It regulates molecules involved in cellular adhesion and extracellular matrix (ECM) formation during the process of palate development
