identifier: CDD:cd23937
label: "C-terminal catalytic domain of D-erythrose-4-phosphate dehydrogenase (E4PDH) and similar proteins. D-erythrose-4-phosphate dehydrogenase (E4PDH; EC 1.2.1.72), also called E4P dehydrogenase, catalyzes the NAD-dependent conversion of D-erythrose 4-phosphate (E4P) to 4-phosphoerythronate, a precursor for the de novo synthesis of pyridoxine via 4-hydroxythreonine and D-1-deoxyxylulose. This enzyme activity appears to have evolved from glyceraldehyde-3-phosphate dehydrogenase (GADPH), whose substrate differs only in the lack of one carbon relative to E4P.  E4PDH proteins contain an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal GADPH-like catalytic domain and are members of the GAPDH superfamily of proteins."
definition: >-
  C-terminal catalytic domain of D-erythrose-4-phosphate dehydrogenase (E4PDH) and similar proteins. D-erythrose-4-phosphate dehydrogenase (E4PDH; EC 1.2.1.72), also called E4P dehydrogenase, catalyzes the NAD-dependent conversion of D-erythrose 4-phosphate (E4P) to 4-phosphoerythronate, a precursor for the de novo synthesis of pyridoxine via 4-hydroxythreonine and D-1-deoxyxylulose. This enzyme activity appears to have evolved from glyceraldehyde-3-phosphate dehydrogenase (GADPH), whose substrate differs only in the lack of one carbon relative to E4P. E4PDH proteins contain an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal GADPH-like catalytic domain and are members of the GAPDH superfamily of proteins. — an NCBI CDD conserved domain (cd23937); members share this curated model.
