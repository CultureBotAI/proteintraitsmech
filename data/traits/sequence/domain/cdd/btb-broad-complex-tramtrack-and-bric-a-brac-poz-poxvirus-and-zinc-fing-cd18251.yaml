identifier: CDD:cd18251
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 22 (KLHL22). KLHL22 is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex required for chromosome alignment and localization of polo-like kinase 1 (PLK1) at kinetochores. The BCR(KLHL22) ubiquitin ligase complex mediates mono-ubiquitination of PLK1, leading to PLK1 dissociation from phosphoreceptor proteins and subsequent removal from kinetochores, allowing silencing of the spindle assembly checkpoint (SAC) and chromosome segregation. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 22 (KLHL22). KLHL22 is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex required for chromosome alignment and localization of polo-like kinase 1 (PLK1) at kinetochores. The BCR(KLHL22) ubiquitin ligase complex mediates mono-ubiquitination of PLK1, leading to PLK1 dissociation from phosphoreceptor proteins and subsequent removal from kinetochores, allowing silencing of the spindle assembly checkpoint (SAC) and chromosome segregation. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18251); members share this curated model.
