identifier: CDD:cd10966
label: "Putative catalytic polysaccharide deacetylase domain of uncharacterized protein yadE and similar proteins. This family contains an uncharacterized protein yadE from Escherichia coli and its bacterial homologs. Although its molecular function remains unknown, yadE shows high sequence similarity with the catalytic NodB homology domain of outer membrane lipoprotein PgaB and the surface-attached protein intercellular adhesion protein IcaB. Both PgaB and IcaB are essential in bacterial biofilm formation."
definition: >-
  Putative catalytic polysaccharide deacetylase domain of uncharacterized protein yadE and similar proteins. This family contains an uncharacterized protein yadE from Escherichia coli and its bacterial homologs. Although its molecular function remains unknown, yadE shows high sequence similarity with the catalytic NodB homology domain of outer membrane lipoprotein PgaB and the surface-attached protein intercellular adhesion protein IcaB. Both PgaB and IcaB are essential in bacterial biofilm formation. — an NCBI CDD conserved domain (cd10966); members share this curated model.
