identifier: CDD:cd08660
label: "M20 Peptidase Aminoacylase 1-like family. This family includes aminoacylase 1 (ACY1) and Aminoacylase 1-like protein 2 (ACY1L2). Aminoacylase 1 proteins are a class of zinc binding homodimeric enzymes involved in hydrolysis of N-acetylated proteins. ACY1 (acyl-L-amino-acid amidohydrolase; EC 3.5.1.14) is the most abundant of the aminoacylases, a class of zinc binding homodimeric enzymes involved in hydrolysis of N-acetylated proteins. It is encoded by the aminoacylase 1 gene (Acy1) on chromosome 3p21 that comprises 15 exons. N-terminal acetylation of proteins is a widespread and highly conserved process that is involved in protection and stability of proteins. Several types of aminoacylases can be distinguished on the basis of substrate specificity; substrates include indoleacetic acid (IAA) N-conjugates of amino acids, N-acetyl-L-amino acids and aminobenzoylglutamate. ACY1 breaks down cytosolic aliphatic N-acyl-alpha-amino acids (except L-aspartate), especially N-acetyl-methionine and acetyl-glutamate into L-amino acids and an acyl group. However, ACY1 can also catalyze the reverse reaction, the synthesis of acetylated amino acids. ACY1L2 family contains many uncharacterized proteins predicted as amidohydrolases, including gene products of abgA and abgB that catalyze the cleavage of p-aminobenzoyl-glutamate, a folate catabolite in E. coli, to p-aminobenzoate and glutamate. p-Aminobenzoyl-glutamate utilization is catalyzed by the abg region gene product, AbgT. Defects in ACY1 are the cause of aminoacylase-1 deficiency (ACY1D) resulting in a metabolic disorder manifesting with encephalopathy and psychomotor delay."
