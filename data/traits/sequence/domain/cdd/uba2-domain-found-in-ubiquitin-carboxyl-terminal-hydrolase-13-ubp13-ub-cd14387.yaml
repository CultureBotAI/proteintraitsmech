identifier: CDD:cd14387
label: "UBA2 domain found in ubiquitin carboxyl-terminal hydrolase 13 (UBP13). UBP13, also called deubiquitinating enzyme 13, Isopeptidase T-3 (isoT3), ubiquitin thioesterase 13, or ubiquitin-specific-processing protease 13 is an ortholog of UBP5 implicated in catalyzing hydrolysis of various ubiquitin (Ub)-chains. It contains a zinc finger (ZnF) domain, a catalytic ubiquitin-specific processing protease (UBP) domain (catalytic C-box and H-box), and two ubiquitin-associated (UBA) domains. Due to the non-activating catalysis for K63-polyubiquitin chains, UBP13 may function differently from USP5 in cellular deubiquitination processes. Moreover, the zinc finger (ZnF) domain of USP13 cannot bind to Ub. Its tandem UBA domains can bind with different types of diUb but preferentially with K63-linked.USP13 can also regulate the protein level of CD3delta in cells via its UBA domains. This model corresponds to the UBA2 domain."
definition: >-
  UBA2 domain found in ubiquitin carboxyl-terminal hydrolase 13 (UBP13). UBP13, also called deubiquitinating enzyme 13, Isopeptidase T-3 (isoT3), ubiquitin thioesterase 13, or ubiquitin-specific-processing protease 13 is an ortholog of UBP5 implicated in catalyzing hydrolysis of various ubiquitin (Ub)-chains. It contains a zinc finger (ZnF) domain, a catalytic ubiquitin-specific processing protease (UBP) domain (catalytic C-box and H-box), and two ubiquitin-associated (UBA) domains. Due to the non-activating catalysis for K63-polyubiquitin chains, UBP13 may function differently from USP5 in cellular deubiquitination processes. Moreover, the zinc finger (ZnF) domain of USP13 cannot bind to Ub. Its tandem UBA domains can bind with different types of diUb but preferentially with K63-linked.USP13 can also regulate the protein level of CD3delta in cells via its UBA domains. This model corresponds to the UBA2 domain. — an NCBI CDD conserved domain (cd14387); members share this curated model.
