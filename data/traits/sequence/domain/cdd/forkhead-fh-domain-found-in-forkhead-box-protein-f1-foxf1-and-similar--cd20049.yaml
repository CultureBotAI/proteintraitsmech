identifier: CDD:cd20049
label: "Forkhead (FH) domain found in Forkhead box protein F1 (FOXF1) and similar proteins. FOXF1, also called Forkhead-related activator 1 (FREAC-1), Forkhead-related protein FKHL5, or Forkhead-related transcription factor 1, is a probable transcription activator for a number of lung-specific genes. FOXF1 mutations in sporadic and familial cases of alveolar capillary dysplasia with misaligned pulmonary veins (ACD/MPV) suggest its involvement in ACD/MPV and lung organogenesis. The role of FOXF1 in cancer is conflicting; its loss in some cancers suggests a tumor suppressive function, but its abundance in others is associated with protumorigenic and metastatic traits. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein F1 (FOXF1) and similar proteins. FOXF1, also called Forkhead-related activator 1 (FREAC-1), Forkhead-related protein FKHL5, or Forkhead-related transcription factor 1, is a probable transcription activator for a number of lung-specific genes. FOXF1 mutations in sporadic and familial cases of alveolar capillary dysplasia with misaligned pulmonary veins (ACD/MPV) suggest its involvement in ACD/MPV and lung organogenesis. The role of FOXF1 in cancer is conflicting; its loss in some cancers suggests a tumor suppressive function, but its abundance in others is associated with protumorigenic and metastatic traits. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20049); members share this curated model.
