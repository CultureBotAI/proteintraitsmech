identifier: CDD:cd02173
label: "CTP:phosphoethanolamine cytidylyltransferase (ECT). CTP:phosphoethanolamine cytidylyltransferase (ECT) catalyzes the conversion of phosphoethanolamine to CDP-ethanolamine as part of the CDP-ethanolamine biosynthesis pathway.  ECT expression in hepatocytes is localized predominantly to areas of the cytoplasm that are rich in rough endoplasmic reticulum. Several ECTs, including yeast and human ECT, have large repetitive sequences located within their N- and C-termini."
definition: >-
  CTP:phosphoethanolamine cytidylyltransferase (ECT). CTP:phosphoethanolamine cytidylyltransferase (ECT) catalyzes the conversion of phosphoethanolamine to CDP-ethanolamine as part of the CDP-ethanolamine biosynthesis pathway. ECT expression in hepatocytes is localized predominantly to areas of the cytoplasm that are rich in rough endoplasmic reticulum. Several ECTs, including yeast and human ECT, have large repetitive sequences located within their N- and C-termini. — an NCBI CDD conserved domain (cd02173); members share this curated model.
