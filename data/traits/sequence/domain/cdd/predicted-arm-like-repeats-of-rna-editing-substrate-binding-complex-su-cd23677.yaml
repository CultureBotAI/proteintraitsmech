identifier: CDD:cd23677
label: RESC3_ARM-like
definition: >-
  predicted ARM-like repeats of RNA-editing substrate-binding complex subunit 3. RESC3 (GRBC3, MRB8620) is a component of the RNA-editing substrate-binding complex (RESC), consisting of about 20 components, that is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. This alignment model represents the predicted (by AlphaFold) Armadillo (ARM)/beta-catenin-like repeats of RESC3, which makes up about 80 percent of the protein. ARM repeats are involved in mediating protein-protein interactions
