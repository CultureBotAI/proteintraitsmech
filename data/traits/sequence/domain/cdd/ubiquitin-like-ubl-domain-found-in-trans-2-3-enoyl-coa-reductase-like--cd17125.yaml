identifier: CDD:cd17125
label: Ubl_TECRL
definition: >-
  ubiquitin-like (Ubl) domain found in trans-2,3-enoyl-CoA reductase-like (TECRL). TECRL, also termed steroid 5-alpha-reductase 2-like 2 protein (SRD5A2L2), is associated with life?threatening inherited arrhythmias displaying features of both long QT syndrome (LQTS) and catecholaminergic polymorphic ventricular tachycardia (CPVT). TECRL contains an N-terminal ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions, as well as a C-terminal catalytic domain
