label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 21 and type 14. Tyrosine-protein phosphatase non-receptor type 21 (PTPN21) and type 14 (PTPN14) belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Both PTPN21 and PTPN14 contain an N-terminal FERM domain and a C-terminal catalytic PTP domain, separated by a long intervening sequence."
definition: >-
