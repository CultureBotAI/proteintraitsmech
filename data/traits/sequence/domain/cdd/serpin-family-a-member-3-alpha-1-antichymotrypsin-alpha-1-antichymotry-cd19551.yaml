identifier: CDD:cd19551
label: "serpin family A member 3, alpha 1-antichymotrypsin. Alpha 1-antichymotrypsin (a1AC/A1AC/a1ACT/AACT) is an alpha globulin glycoprotein that is a member of the serpin superfamily. In humans, it is encoded by the SERPINA3 gene. It inhibits the activity of proteases, such as cathepsin G that is found in neutrophils, and chymases found in mast cells, by cleaving them into a different shape or conformation. This activity protects some tissues, such as the lower respiratory tract, from damage caused by proteolytic enzymes. Deficiency of this protein has been associated with liver disease. Mutations have been identified in patients with Parkinson disease and chronic obstructive pulmonary disease. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
