identifier: CDD:cd00539
label: "Methyl-coenzyme M reductase (MCR) gamma subunit. MCR catalyzes the terminal step of methane formation in the energy metabolism of all methanogenic archaea, in which methyl-coenzyme M and coenzyme B are converted to methane and the heterodisulfide of coenzyme M and coenzyme B (CoM-S-S-CoB). MCR is a dimer of trimers, each of which consists of one alpha, one beta, and one gamma subunit, with two identical active sites containing nickel porphinoid factor 430 (F430)."
definition: >-
  Methyl-coenzyme M reductase (MCR) gamma subunit. MCR catalyzes the terminal step of methane formation in the energy metabolism of all methanogenic archaea, in which methyl-coenzyme M and coenzyme B are converted to methane and the heterodisulfide of coenzyme M and coenzyme B (CoM-S-S-CoB). MCR is a dimer of trimers, each of which consists of one alpha, one beta, and one gamma subunit, with two identical active sites containing nickel porphinoid factor 430 (F430). — an NCBI CDD conserved domain (cd00539); members share this curated model.
