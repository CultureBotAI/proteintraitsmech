label: "Archeal pseudouridine synthases. This group consists of archeal pseudouridine synthases.Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi).  No cofactors are required. This group of proteins make Psedouridine in tRNAs."
