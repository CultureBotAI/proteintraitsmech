identifier: CDD:cd15928
label: "growth hormone secretagogue receptor, motilin receptor, and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This subfamily includes growth hormone secretagogue receptor (GHSR or ghrelin receptor), motilin receptor (also called GPR38), and related proteins. Both GHSR and GPR38 bind peptide hormones. Ghrelin, the endogenous ligand for GHSR, is an acylated 28-amino acid peptide hormone produced by ghrelin cells in the gastrointestinal tract. Ghrelin is also called the hunger hormone and is involved in the regulation of growth hormone release, appetite and feeding, gut motility, lipid and glucose metabolism, and energy balance. Motilin, the ligand for GPR38, is a 22 amino acid peptide hormone expressed throughout the gastrointestinal tract and stimulates contraction of gut smooth muscle. It is involved in the regulation of digestive tract motility."
definition: >-
