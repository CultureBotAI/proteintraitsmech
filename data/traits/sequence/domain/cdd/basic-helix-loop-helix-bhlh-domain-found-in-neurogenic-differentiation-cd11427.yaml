identifier: CDD:cd11427
label: "basic helix-loop-helix (bHLH) domain found in neurogenic differentiation factor (NeuroD) family. The NeuroD family includes NeuroD1, NeuroD2, NeuroD4 and NeuroD6. NeuroD1, also termed Class A basic helix-loop-helix protein 3 (bHLHa3), is a neuronal bHLH transcription factor involved in the development and maintenance of the endocrine pancreas and neuronal elements. It acts as an essential regulator of glutamatergic neuronal differentiation. Loss of NeuroD1 causes ataxia, cerebellar hypoplasia, sensorineural deafness, and severe retinal dystrophy in mice. NeuroD2, also termed Class A basic helix-loop-helix protein 1 (bHLHa1), or NeuroD-related factor (NDRF), is a neuronal calcium-dependent bHLH transcription factor that induces neuronal differentiation and promotes neuronal survival. It plays a central role in thalamocortical synaptic maturation. NeuroD2 mediates calcium-dependent transcription activation by binding to E box-containing promoter. NeuroD4, also termed Class A basic helix-loop-helix protein 4 (bHLHa4), or protein atonal homolog 3 (ATH-3), or Atoh3, or Math-3, is a bHLH transcriptional activator that mediates neuronal differentiation. NeuroD6, also termed Class A basic helix-loop-helix protein 2 (bHLHa2), or protein atonal homolog 2 (ATH-2), or Atoh2, or Math2, or Nex1, is a neurogenic bHLH transcription factor involved in neuronal development, differentiation, and survival in Alzheimer's disease (AD) brains of both cohorts. It plays an integrative role in coordinating increase in mitochondrial mass with cytoskeletal remodeling, suggesting that it may act as a co-regulator of neuronal differentiation and energy metabolism."
definition: >-
  basic helix-loop-helix (bHLH) domain found in neurogenic differentiation factor (NeuroD) family. The NeuroD family includes NeuroD1, NeuroD2, NeuroD4 and NeuroD6. NeuroD1, also termed Class A basic helix-loop-helix protein 3 (bHLHa3), is a neuronal bHLH transcription factor involved in the development and maintenance of the endocrine pancreas and neuronal elements. It acts as an essential regulator of glutamatergic neuronal differentiation. Loss of NeuroD1 causes ataxia, cerebellar hypoplasia, sensorineural deafness, and severe retinal dystrophy in mice. NeuroD2, also termed Class A basic helix-loop-helix protein 1 (bHLHa1), or NeuroD-related factor (NDRF), is a neuronal calcium-dependent bHLH transcription factor that induces neuronal differentiation and promotes neuronal survival. It plays a central role in thalamocortical synaptic maturation. NeuroD2 mediates calcium-dependent transcription activation by binding to E box-containing promoter. NeuroD4, also termed Class A basic helix-loop-helix protein 4 (bHLHa4), or protein atonal homolog 3 (ATH-3), or Atoh3, or Math-3, is a bHLH transcriptional activator that mediates neuronal differentiation. NeuroD6, also termed Class A basic helix-loop-helix protein 2 (bHLHa2), or protein atonal homolog 2 (ATH-2), or Atoh2, or Math2, or Nex1, is a neurogenic bHLH transcription factor involved in neuronal development, differentiation, and survival in Alzheimer's disease (AD) brains of both cohorts. It plays an integrative role in coordinating increase in mitochondrial mass with cytoskeletal remodeling, suggesting that it may act as a co-regulator of neuronal differentiation and energy metabolism. — an NCBI CDD conserved domain (cd11427); members share this curated model.
