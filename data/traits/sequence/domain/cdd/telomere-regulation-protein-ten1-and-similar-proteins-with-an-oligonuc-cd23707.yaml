identifier: CDD:cd23707
label: Ten1_OBF
definition: >-
  telomere regulation protein Ten1 and similar proteins, with an oligonucleotide/oligosaccharide-binding (OB) fold. Telomere regulation protein Ten1 is required to regulate telomere length, as well as to prevent lethal damage to telomeric DNA. It interacts physically with both Stn1 and Cdc13 to form the Cdc13-Stn1-Ten1 (CST) complex that plays an essential role in telomere protection and maintenance in budding yeast. Stn1 and Ten1 also control a Cdc13-independent telomere capping mechanism that is coupled to the conventional DNA replication machinery. Ten1 adopts the oligonucleotide/oligosaccharide-binding (OB) fold
