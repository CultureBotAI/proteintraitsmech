identifier: CDD:cd22609
label: "trophoblast Kunitz domain protein (TKDP) and similar proteins. This model contains the trophoblast Kunitz domain protein 1 (TKDP-1) and splice variant TKDP-4, among others, which are Kunitz inhibitor domain proteins. TKDP-1 is expressed in the trophectoderm which forms the outer epithelial layer of the trophoblast, and may play a role in mediating maternal-conceptus interactions in the immediate preimplantation period. However, it does not appear to have proteinase inhibitory activity. These domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  trophoblast Kunitz domain protein (TKDP) and similar proteins. This model contains the trophoblast Kunitz domain protein 1 (TKDP-1) and splice variant TKDP-4, among others, which are Kunitz inhibitor domain proteins. TKDP-1 is expressed in the trophectoderm which forms the outer epithelial layer of the trophoblast, and may play a role in mediating maternal-conceptus interactions in the immediate preimplantation period. However, it does not appear to have proteinase inhibitory activity. These domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22609); members share this curated model.
