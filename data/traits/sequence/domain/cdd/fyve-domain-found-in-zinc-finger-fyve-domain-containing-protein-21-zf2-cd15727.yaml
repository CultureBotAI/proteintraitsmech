identifier: CDD:cd15727
label: "FYVE domain found in zinc finger FYVE domain-containing protein 21 (ZF21) and similar proteins. ZF21 is phosphoinositide-binding protein that functions as a regulator of focal adhesions and cell movement through interaction with focal adhesion kinase. It can also bind to the cytoplasmic tail of membrane type 1 matrix metalloproteinase, a potent invasion-promoting protease, and play a key role in regulating multiple aspects of cancer cell migration and invasion. ZF21 contains a FYVE domain, which corresponds to this model."
definition: >-
  FYVE domain found in zinc finger FYVE domain-containing protein 21 (ZF21) and similar proteins. ZF21 is phosphoinositide-binding protein that functions as a regulator of focal adhesions and cell movement through interaction with focal adhesion kinase. It can also bind to the cytoplasmic tail of membrane type 1 matrix metalloproteinase, a potent invasion-promoting protease, and play a key role in regulating multiple aspects of cancer cell migration and invasion. ZF21 contains a FYVE domain, which corresponds to this model. — an NCBI CDD conserved domain (cd15727); members share this curated model.
