identifier: CDD:cd08903
label: "Lipid-binding START domain of mammalian STARD5 and related proteins. This subgroup includes the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domains of mammalian STARD5, and related domains. It belongs to the START domain family, and in turn to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. STARD5 is ubiquitously expressed, with highest levels in liver and kidney. STARD5 functions in the kidney within the proximal tubule cells where it is associated with the Endoplasmic Reticulum (ER), and may participate in ER-associated cholesterol transport. It binds cholesterol and 25-hydroxycholesterol. Expression of the gene encoding STARD5 is increased by ER stress, and its mRNA and protein levels are elevated in a type I diabetic mouse model of human diabetic nephropathy."
definition: >-
  Lipid-binding START domain of mammalian STARD5 and related proteins. This subgroup includes the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domains of mammalian STARD5, and related domains. It belongs to the START domain family, and in turn to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. STARD5 is ubiquitously expressed, with highest levels in liver and kidney. STARD5 functions in the kidney within the proximal tubule cells where it is associated with the Endoplasmic Reticulum (ER), and may participate in ER-associated cholesterol transport. It binds cholesterol and 25-hydroxycholesterol. Expression of the gene encoding STARD5 is increased by ER stress, and its mRNA and protein levels are elevated in a type I diabetic mouse model of human diabetic nephropathy. — an NCBI CDD conserved domain (cd08903); members share this curated model.
