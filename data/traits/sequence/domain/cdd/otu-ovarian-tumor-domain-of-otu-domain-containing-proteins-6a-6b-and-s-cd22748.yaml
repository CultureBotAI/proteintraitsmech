identifier: CDD:cd22748
label: "OTU (ovarian tumor) domain of OTU domain-containing proteins 6A, 6B, and similar proteins. This subfamily is composed of mammalian OTU domain-containing protein 6A (OTUD6A, also called DUBA-2, vertebrate OTU domain-containing protein 6B (OTUD6B, also called DUBA-5), fungal OTU domain-containing protein 2 (OTU2), and similar proteins. OTUD6A, OTUD6B, and Schizosaccharomyces pombe OTU2 are deubiquitinating enzymes/ubiquitinyl hydrolases (EC 3.4.19.12). OTUD6A hydrolyzes 'Lys-27'-, 'Lys-29'-, and 'Lys-33'-linked polyubiquitin chains, and may also be able to hydrolyze 'Lys-11'-linked ubiquitin chains. It deubiquitylates and stabilizes dynamin-related protein 1 (Drp1), a cytosolic protein responsible for mitochondrial fission and is essential in the initiation and development of several human diseases including cancer, thereby facilitating tumorigenesis. OTUD6B is a functional deubiquitinase in in vitro enzyme assays. It may play a role in the ubiquitin-dependent regulation of protein synthesis downstream of mTORC1, and may modify the ubiquitination of the protein synthesis initiation complex to repress translation. Biallelic variants in OTUD6B cause an intellectual disability syndrome that is associated with seizures and dysmorphic features. This subfamily belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad."
definition: >-
  OTU (ovarian tumor) domain of OTU domain-containing proteins 6A, 6B, and similar proteins. This subfamily is composed of mammalian OTU domain-containing protein 6A (OTUD6A, also called DUBA-2, vertebrate OTU domain-containing protein 6B (OTUD6B, also called DUBA-5), fungal OTU domain-containing protein 2 (OTU2), and similar proteins. OTUD6A, OTUD6B, and Schizosaccharomyces pombe OTU2 are deubiquitinating enzymes/ubiquitinyl hydrolases (EC 3.4.19.12). OTUD6A hydrolyzes 'Lys-27'-, 'Lys-29'-, and 'Lys-33'-linked polyubiquitin chains, and may also be able to hydrolyze 'Lys-11'-linked ubiquitin chains. It deubiquitylates and stabilizes dynamin-related protein 1 (Drp1), a cytosolic protein responsible for mitochondrial fission and is essential in the initiation and development of several human diseases including cancer, thereby facilitating tumorigenesis. OTUD6B is a functional deubiquitinase in in vitro enzyme assays. It may play a role in the ubiquitin-dependent regulation of protein synthesis downstream of mTORC1, and may modify the ubiquitination of the protein synthesis initiation complex to repress translation. Biallelic variants in OTUD6B cause an intellectual disability syndrome that is associated with seizures and dysmorphic features. This subfamily belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. — an NCBI CDD conserved domain (cd22748); members share this curated model.
