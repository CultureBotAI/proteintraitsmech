identifier: CDD:cd23387
label: "ricin B-type lectin domain, beta-trefoil fold, found in cytolethal distending toxin subunit A (CdtA), subunit C (CdtC), and similar proteins. Cytolethal distending toxins (CDTs) are cytotoxins which induce host cell distension, growth arrest in G2/M phase, nucleus swelling, and chromatin fragmentation in HeLa cells. CDT is a heterotrimer consisting of the three subunits, CdtA, CdtB, and CdtC. CdtA, along with CdtC, probably forms a heterodimeric subunit required for the delivery of nuclease CdtB. Both CdtA and CdtC contain a ricin B-type lectin domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. The third beta strand is missing in CdtC."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in cytolethal distending toxin subunit A (CdtA), subunit C (CdtC), and similar proteins. Cytolethal distending toxins (CDTs) are cytotoxins which induce host cell distension, growth arrest in G2/M phase, nucleus swelling, and chromatin fragmentation in HeLa cells. CDT is a heterotrimer consisting of the three subunits, CdtA, CdtB, and CdtC. CdtA, along with CdtC, probably forms a heterodimeric subunit required for the delivery of nuclease CdtB. Both CdtA and CdtC contain a ricin B-type lectin domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. The third beta strand is missing in CdtC. — an NCBI CDD conserved domain (cd23387); members share this curated model.
