identifier: CDD:cd16063
label: TNFSF13B
definition: >-
  Tumor necrosis factor ligand superfamily member 13B (TNFSF13B), also known as B-cell activating factor or BAFF. This family contains TNFSF13B (also known as B-cell activating factor or BAFF, and apoptosis ligand-related leukocyte-expressed ligand-1 or TALL-1, TNF homolog that activates apoptosis, NF-kB and c-Jun NH2-terminal kinase or THANK, B lymphocyte stimulator or BLyS, DTL, CD257, TNFSF20 and zTNF4), a cytokine that plays a crucial role in B-cell development by promoting B-cell survival as well as transition from the immature to mature B-cell stage. It also plays a role in Ig-class switching and subsequent antibody production. BAFF is a type II membrane-bound protein that can be released as a soluble form that binds to three different TNF receptors: TNFRSF17 (also known as B-cell maturation antigen or BCMA), TNFRSF13B (also known as transmembrane activator and calcium modulator and cyclophilin ligand interactor or TACI), and TNFRSF13C (also known as BAFF-R or BR3). BAFF binds to its high-affinity BAFF-R and activates the NF-kB pathway and MAPK pathway, leading to the expression of genes essential for B-cell survival. BCMA and TACI are also receptors for a proliferation-inducing ligand (APRIL), another B-cell survival ligand. BAFF may occur as monomers, homotrimers or heterotrimers with APRIL or TNF-like weak inducer of apoptosis (TWEAK). BAFF has a primary role in promoting survival of immature B cells while APRIL acts at later stages of B-cell development supporting the maintenance of plasma cells. Elevated serum levels of BAFF have been observed in several rheumatic diseases such as systemic lupus erythematosus (SLE), Sjogren's syndrome, systemic sclerosis (SS), and rheumatoid arthritis (RA). In addition, BAFF is also elevated in organ-specific autoimmune diseases such as Graves' disease, multiple sclerosis, anti-GBM disease, autoimmune pancreatitis, myasthenia gravis and idiopathic thrombocytopenic purpura. Increased soluble BAFF levels have been found in B-cell malignancies such as chronic lymphocytic leukemia (CLL), B-cell non-Hodgkin lymphoma (B-NHL), correlated with aggressive disease and a poor response to therapy. Blocking BAFF and their receptors can be a plausible therapeutic strategy in these malignancies; belimumab (fully human IgG1 monoclonal antibody against BAFF) has been approved for the treatment of SLE
