identifier: CDD:cd01784
label: "Ras-associating (RA) domain found in Ras-association domain family members, RASSF2, RASSF4, and RASSF6. The RASSF family of proteins shares a conserved RalGDS/AF6 RA domain either in the C-terminus (RASSF1-6) or N-terminus (RASSF7-10). The classical family members (RASSF1-6) contain a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that functions as scaffolding and regulatory interactions. The RA domain of the classical RASSF protein family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. Classical RASSF members interact either directly or indirectly with activated Ras. Ras proteins are small GTPases that are involved in cellular signal transduction. The classical RASSF protein family seem to modulate some of the growth inhibitory responses mediated by Ras and may serve as tumor suppressor genes. This family contains RASSF2, RASSF4, and RASSF6."
definition: >-
  Ras-associating (RA) domain found in Ras-association domain family members, RASSF2, RASSF4, and RASSF6. The RASSF family of proteins shares a conserved RalGDS/AF6 RA domain either in the C-terminus (RASSF1-6) or N-terminus (RASSF7-10). The classical family members (RASSF1-6) contain a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that functions as scaffolding and regulatory interactions. The RA domain of the classical RASSF protein family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. Classical RASSF members interact either directly or indirectly with activated Ras. Ras proteins are small GTPases that are involved in cellular signal transduction. The classical RASSF protein family seem to modulate some of the growth inhibitory responses mediated by Ras and may serve as tumor suppressor genes. This family contains RASSF2, RASSF4, and RASSF6. — an NCBI CDD conserved domain (cd01784); members share this curated model.
