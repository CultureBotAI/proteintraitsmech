identifier: CDD:cd12718
label: "RNA recognition motif (RRM) found in BRCA1-associated protein (BRAP2). This subgroup corresponds to the RRM of BRAP2, also termed impedes mitogenic signal propagation (IMP), or ring finger protein 52, or renal carcinoma antigen NY-REN-63, a novel cytoplasmic protein interacting with the two functional nuclear localisation signal (NLS) motifs of BRCA1, a nuclear protein linked to breast cancer. It also binds to the SV40 large T antigen NLS motif and the bipartite NLS motif found in mitosin. BRAP2 may serve as a cytoplasmic retention protein and play a role in the regulation of nuclear protein transport. It contains an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by a C3HC4-type ring finger domain and a UBP-type zinc finger."
definition: >-
  RNA recognition motif (RRM) found in BRCA1-associated protein (BRAP2). This subgroup corresponds to the RRM of BRAP2, also termed impedes mitogenic signal propagation (IMP), or ring finger protein 52, or renal carcinoma antigen NY-REN-63, a novel cytoplasmic protein interacting with the two functional nuclear localisation signal (NLS) motifs of BRCA1, a nuclear protein linked to breast cancer. It also binds to the SV40 large T antigen NLS motif and the bipartite NLS motif found in mitosin. BRAP2 may serve as a cytoplasmic retention protein and play a role in the regulation of nuclear protein transport. It contains an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by a C3HC4-type ring finger domain and a UBP-type zinc finger. — an NCBI CDD conserved domain (cd12718); members share this curated model.
