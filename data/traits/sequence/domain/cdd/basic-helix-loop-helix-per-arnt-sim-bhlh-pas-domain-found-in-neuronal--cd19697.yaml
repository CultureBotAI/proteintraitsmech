identifier: CDD:cd19697
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in neuronal PAS domain-containing protein 4 (NPAS4) and similar proteins. NPAS4, also termed neuronal Per-Arnt-Sim homology (PAS) factor 4, or neuronal PAS4, or Class E basic helix-loop-helix protein 79 (bHLHe79), or HLH-PAS transcription factor NXF, or PAS domain-containing protein 10 (PASD10), is a bHLH-PAS neuronal activity-dependent transcription factor which heterodimerizes with ARNT2 to regulate genes involved in inhibitory synapse formation."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in neuronal PAS domain-containing protein 4 (NPAS4) and similar proteins. NPAS4, also termed neuronal Per-Arnt-Sim homology (PAS) factor 4, or neuronal PAS4, or Class E basic helix-loop-helix protein 79 (bHLHe79), or HLH-PAS transcription factor NXF, or PAS domain-containing protein 10 (PASD10), is a bHLH-PAS neuronal activity-dependent transcription factor which heterodimerizes with ARNT2 to regulate genes involved in inhibitory synapse formation. — an NCBI CDD conserved domain (cd19697); members share this curated model.
