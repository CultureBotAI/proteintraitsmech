identifier: CDD:cd16811
label: "RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING finger protein MARCH4, MARCH9, and similar proteins. This subfamily includes the closely related MARCH4 and MARCH9, both belonging to the family of MARCH E3 ligases. They downregulate major histocompatibility complex-I (MHC-I). In the presence of MARCH4 or MARCH9, MHC-I can be ubiquitinated and rapidly internalized by endocytosis, whereas MHC-I molecules lacking lysines in their cytoplasmic tail are resistant to downregulation. Moreover, MARCH4 and MARCH9, but not other MARCH proteins, can associate with Mult1 and prevent Mult1 expression at the cell surface in a lysine-dependent manner that can be reversed by heat shocking the cells. Both MARCH4 and MARCH9 contain an N-terminal C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, followed by two transmembrane regions."
definition: >-
  RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING finger protein MARCH4, MARCH9, and similar proteins. This subfamily includes the closely related MARCH4 and MARCH9, both belonging to the family of MARCH E3 ligases. They downregulate major histocompatibility complex-I (MHC-I). In the presence of MARCH4 or MARCH9, MHC-I can be ubiquitinated and rapidly internalized by endocytosis, whereas MHC-I molecules lacking lysines in their cytoplasmic tail are resistant to downregulation. Moreover, MARCH4 and MARCH9, but not other MARCH proteins, can associate with Mult1 and prevent Mult1 expression at the cell surface in a lysine-dependent manner that can be reversed by heat shocking the cells. Both MARCH4 and MARCH9 contain an N-terminal C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, followed by two transmembrane regions. — an NCBI CDD conserved domain (cd16811); members share this curated model.
