identifier: CDD:cd11579
label: "Glycosyl hydrolase family 99-like domain of WbsX-like glycosyltransferases. Members of this domain family are found in proteins within O-antigen biosynthesis clusters in Gram negative bacteria, where they may function as glycosyl hydrolases and typically co-occur with glycosyltransferase domains. They bear resemblance to GH71 and the GH99 family of alpha-1,2-mannosidases and may share a similar cataltyic site and mechanism. The O-antigens are essential lipopolysaccharides in gram-negative bacteria's outer membrane and have been linked to pathogenicity."
definition: >-
  Glycosyl hydrolase family 99-like domain of WbsX-like glycosyltransferases. Members of this domain family are found in proteins within O-antigen biosynthesis clusters in Gram negative bacteria, where they may function as glycosyl hydrolases and typically co-occur with glycosyltransferase domains. They bear resemblance to GH71 and the GH99 family of alpha-1,2-mannosidases and may share a similar cataltyic site and mechanism. The O-antigens are essential lipopolysaccharides in gram-negative bacteria's outer membrane and have been linked to pathogenicity. — an NCBI CDD conserved domain (cd11579); members share this curated model.
