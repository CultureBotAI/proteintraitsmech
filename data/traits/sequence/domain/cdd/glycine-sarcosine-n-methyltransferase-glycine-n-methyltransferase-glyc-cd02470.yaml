identifier: CDD:cd02470
label: GSMT_GNMT
definition: >-
  glycine sarcosine N-methyltransferase/glycine N-methyltransferase. Glycine sarcosine N-methyltransferase (GSMT) is an enzyme in the biosynthetic pathway of the osmoprotectant betaine and catalyzes N-methylation of glycine and sarcosine. Glycine N-methyltransferase (EC 2.1.1.20) catalyzes the transfer of the methyl group of S-adenosylmethionine (AdoMet) to glycine to form S-adenosylhomocysteine and sarcosine
