identifier: CDD:cd15734
label: "FYVE domains found in zinc finger FYVE domain-containing protein 1 (ZFYV1) and similar proteins. ZFYV1, also termed double FYVE-containing protein 1 (DFCP1), or SR3, or tandem FYVE fingers-1, is a novel tandem FYVE domain containing protein that binds phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) with high specificity over other phosphoinositides. The subcellular distribution of exogenously-expressed ZFYV1 to Golgi, endoplasmic reticulum (ER) and vesicular is governed in part by its FYVE domains but unaffected by wortmannin, a PI3-kinase inhibitor. In addition to C-terminal tandem FYVE domain, ZFYV1 contains an N-terminal putative C2H2 type zinc finger and a possible nucleotide binding P-loop."
definition: >-
  FYVE domains found in zinc finger FYVE domain-containing protein 1 (ZFYV1) and similar proteins. ZFYV1, also termed double FYVE-containing protein 1 (DFCP1), or SR3, or tandem FYVE fingers-1, is a novel tandem FYVE domain containing protein that binds phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) with high specificity over other phosphoinositides. The subcellular distribution of exogenously-expressed ZFYV1 to Golgi, endoplasmic reticulum (ER) and vesicular is governed in part by its FYVE domains but unaffected by wortmannin, a PI3-kinase inhibitor. In addition to C-terminal tandem FYVE domain, ZFYV1 contains an N-terminal putative C2H2 type zinc finger and a possible nucleotide binding P-loop. — an NCBI CDD conserved domain (cd15734); members share this curated model.
