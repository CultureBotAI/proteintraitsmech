identifier: CDD:cd22339
label: "Restriction endonuclease NciI and similar endonucleases. NciI is a type II restriction endonuclease that recognizes and cleaves the sequence CC|SGG (S stands for C or G, | denotes the cleavage site). It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease NciI and similar endonucleases. NciI is a type II restriction endonuclease that recognizes and cleaves the sequence CC|SGG (S stands for C or G, | denotes the cleavage site). It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22339); members share this curated model.
