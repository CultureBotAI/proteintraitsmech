identifier: CDD:cd19611
label: "leucine-rich-repeat (LRR) domain and LRR insertion domain of centromere DNA-binding protein complex CBF3 subunit C (Ctf13). Ctf13, is an F-box protein of the leucine-rich-repeat superfamily; it is a component of CEN binding factor 3 (CBF3), a complex that recognizes point centromeres found in budding yeast, associating specifically with the third centromere DNA element (CDEIII) DNA. CBF3 is comprised of two homodimers of Cep3 and Ndc10, and a Ctf13-Skp1 heterodimer. The Skp1-Ctf13 heterodimer interacts with Cep3, Ndc10 and CDEIII at a completely conserved G, centrally positioned between the TGC/CCG sites. The eight leucine-rich repeat (LRR) motifs of Ctf13 (LRR 1-8) form a solenoid structure. At the N-terminus of the Ctf13 LRR is an expanded F-box, and at the C-terminal end, an alpha-beta domain formed by insertions within the latter LRRs of Ctf13 (LRR insertion domain). This domain model includes the LLR domain and the LRR insertion domain."
definition: >-
  leucine-rich-repeat (LRR) domain and LRR insertion domain of centromere DNA-binding protein complex CBF3 subunit C (Ctf13). Ctf13, is an F-box protein of the leucine-rich-repeat superfamily; it is a component of CEN binding factor 3 (CBF3), a complex that recognizes point centromeres found in budding yeast, associating specifically with the third centromere DNA element (CDEIII) DNA. CBF3 is comprised of two homodimers of Cep3 and Ndc10, and a Ctf13-Skp1 heterodimer. The Skp1-Ctf13 heterodimer interacts with Cep3, Ndc10 and CDEIII at a completely conserved G, centrally positioned between the TGC/CCG sites. The eight leucine-rich repeat (LRR) motifs of Ctf13 (LRR 1-8) form a solenoid structure. At the N-terminus of the Ctf13 LRR is an expanded F-box, and at the C-terminal end, an alpha-beta domain formed by insertions within the latter LRRs of Ctf13 (LRR insertion domain). This domain model includes the LLR domain and the LRR insertion domain. — an NCBI CDD conserved domain (cd19611); members share this curated model.
