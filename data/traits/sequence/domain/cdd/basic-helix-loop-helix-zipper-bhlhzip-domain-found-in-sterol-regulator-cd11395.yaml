identifier: CDD:cd11395
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in sterol regulatory element-binding protein (SREBP) family and similar proteins. The SREBP family includes SREBP1 and SREBP2, which are bHLHzip transcriptional activator of genes encoding proteins essential for cholesterol biosynthesis/uptake and fatty acid biosynthesis. SREBP1 and SREBP2 are principally found in the liver and in adipocytes and made up of an N-terminal transcription factor portion (composed of an activation domain, a bHLHzip domain, and a nuclear localization signal), a hydrophobic region containing two membrane spanning regions, and a C-terminal regulatory segment. They recognize a symmetric sterol regulatory element (TCACNCCAC) instead of E-box. The family also includes Saccharomyces cerevisiae transcription factor HMS1 (also termed high-copy MEP suppressor protein 1) and serine-rich protein TYE7. HMS1 is a putative bHLHzip transcription factor involved in exit from mitosis and pseudohyphal differentiation. TYE7, also termed basic-helix-loop-helix protein SGC1, is a putative bHLHzip transcription activator required for Ty1-mediated glycolytic gene expression. TYE7 N-terminal is extremely rich in serine residues. It binds DNA on E-box motifs, 5'-CANNTG-3'. TYE7 is not essential for growth."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in sterol regulatory element-binding protein (SREBP) family and similar proteins. The SREBP family includes SREBP1 and SREBP2, which are bHLHzip transcriptional activator of genes encoding proteins essential for cholesterol biosynthesis/uptake and fatty acid biosynthesis. SREBP1 and SREBP2 are principally found in the liver and in adipocytes and made up of an N-terminal transcription factor portion (composed of an activation domain, a bHLHzip domain, and a nuclear localization signal), a hydrophobic region containing two membrane spanning regions, and a C-terminal regulatory segment. They recognize a symmetric sterol regulatory element (TCACNCCAC) instead of E-box. The family also includes Saccharomyces cerevisiae transcription factor HMS1 (also termed high-copy MEP suppressor protein 1) and serine-rich protein TYE7. HMS1 is a putative bHLHzip transcription factor involved in exit from mitosis and pseudohyphal differentiation. TYE7, also termed basic-helix-loop-helix protein SGC1, is a putative bHLHzip transcription activator required for Ty1-mediated glycolytic gene expression. TYE7 N-terminal is extremely rich in serine residues. It binds DNA on E-box motifs, 5'-CANNTG-3'. TYE7 is not essential for growth. — an NCBI CDD conserved domain (cd11395); members share this curated model.
