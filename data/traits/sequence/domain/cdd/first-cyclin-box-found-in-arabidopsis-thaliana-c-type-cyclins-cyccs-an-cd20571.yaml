identifier: CDD:cd20571
label: CYCLIN_AtCycC_rpt1
definition: >-
  first cyclin box found in Arabidopsis thaliana C-type cyclins (CycCs) and similar proteins. Plant CycCs are the cognate cyclin partners of cyclin-dependent kinase CDK8. They may be involved in cell cycle control. CycCs contain two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain
