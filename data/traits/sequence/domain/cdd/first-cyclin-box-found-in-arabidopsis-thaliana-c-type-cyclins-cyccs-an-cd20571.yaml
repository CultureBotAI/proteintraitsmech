identifier: CDD:cd20571
label: "first cyclin box found in Arabidopsis thaliana C-type cyclins (CycCs) and similar proteins. Plant CycCs are the cognate cyclin partners of cyclin-dependent kinase CDK8. They may be involved in cell cycle control. CycCs contain two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain."
definition: >-
  first cyclin box found in Arabidopsis thaliana C-type cyclins (CycCs) and similar proteins. Plant CycCs are the cognate cyclin partners of cyclin-dependent kinase CDK8. They may be involved in cell cycle control. CycCs contain two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20571); members share this curated model.
