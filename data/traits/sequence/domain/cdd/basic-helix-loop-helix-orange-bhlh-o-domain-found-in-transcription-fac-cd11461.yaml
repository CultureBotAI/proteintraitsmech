identifier: CDD:cd11461
label: "basic helix-loop-helix-orange (bHLH-O) domain found in transcription factor HES-5 and similar proteins. HES-5, also termed Class B basic helix-loop-helix protein 38 (bHLHb38), or hairy and enhancer of split 5, is a bHLH-O transcription factor that is involved in cell differentiation and proliferation in a variety of tissues. HES-5 is an essential effector for Notch signaling. It acts as a transducer of Notch signals in brain vascular development. It also acts as a key mediator of Wnt-3a-induced neuronal differentiation and plays a crucial role in normal inner ear hair cell development. HES-5 is one mammalian counterpart of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability."
definition: >-
