identifier: CDD:cd11745
label: "C-terminal dimerization domain (DD) of Saccharomyces cerevisiae Yos9 and related proteins. Yos9 participates in the ER-associated protein degradation pathway that targets misfolded proteins for proteolysis. Yos9 is a component of the reductase degradation (HRD) ubiquitin-ligase complex, specifically part of the luminal submodule of the ligase. Yos9 scans proteins for specific oligosaccharide modifications, which are critical determinants of degradation signal. It has been shown to be involved in the degradation of glycosylated proteins and various nonglycosylated proteins. Yos9 functions as a homodimer where this domain is responsible for the self-association; it has an alphabeta-roll domain architecture, and is found at the C-terminus of the protein. The N-terminal portion of Yos9 which includes an MRH domain is required for binding to Hrd3p, another component of the HRD complex. The DD domain does not appear to be directly binding Hrd3p."
definition: >-
  C-terminal dimerization domain (DD) of Saccharomyces cerevisiae Yos9 and related proteins. Yos9 participates in the ER-associated protein degradation pathway that targets misfolded proteins for proteolysis. Yos9 is a component of the reductase degradation (HRD) ubiquitin-ligase complex, specifically part of the luminal submodule of the ligase. Yos9 scans proteins for specific oligosaccharide modifications, which are critical determinants of degradation signal. It has been shown to be involved in the degradation of glycosylated proteins and various nonglycosylated proteins. Yos9 functions as a homodimer where this domain is responsible for the self-association; it has an alphabeta-roll domain architecture, and is found at the C-terminus of the protein. The N-terminal portion of Yos9 which includes an MRH domain is required for binding to Hrd3p, another component of the HRD complex. The DD domain does not appear to be directly binding Hrd3p. — an NCBI CDD conserved domain (cd11745); members share this curated model.
