identifier: CDD:cd13220
label: "GRAM domain-containing protein (GRAMDC) Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain. The GRAMDC proteins are membrane proteins. Nothing is known about its function. Members include: GRAMDC1A, GRAMDC1B, GRAMDC1C, GRAMDC2, GRAMDC3, GRAMDC4, and GRAMDC-like proteins. All of the members, except for GRAMDC4 are included in this hierarchy. Each contains a single PH-GRAM domain at their N-terminus. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold."
definition: >-
  GRAM domain-containing protein (GRAMDC) Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain. The GRAMDC proteins are membrane proteins. Nothing is known about its function. Members include: GRAMDC1A, GRAMDC1B, GRAMDC1C, GRAMDC2, GRAMDC3, GRAMDC4, and GRAMDC-like proteins. All of the members, except for GRAMDC4 are included in this hierarchy. Each contains a single PH-GRAM domain at their N-terminus. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold. — an NCBI CDD conserved domain (cd13220); members share this curated model.
