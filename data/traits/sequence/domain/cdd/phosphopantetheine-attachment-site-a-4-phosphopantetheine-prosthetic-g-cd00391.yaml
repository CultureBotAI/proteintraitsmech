identifier: CDD:cd00391
label: pp-binding
definition: >-
  Phosphopantetheine attachment site. A 4'-phosphopantetheine prosthetic group is attached through a serine. This prosthetic group acts as a a 'swinging arm' for the attachment of activated fatty acid and amino-acid groups. This domain forms a four helix bundle. The inclusion of family members is supported by sequence analysis and functional evidence. Some related domains have the attachment serine replaced by an alanine
