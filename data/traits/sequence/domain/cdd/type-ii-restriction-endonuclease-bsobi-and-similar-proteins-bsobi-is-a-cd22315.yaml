identifier: CDD:cd22315
label: "Type II restriction endonuclease BsoBI and similar proteins. BsoBI is a thermophilic PDDEXK-family restriction endonuclease exhibiting both base-specific and degenerate recognition within the sequence C-Y-C-G-R-G. (R = A or G, Y = T or C) A conserved histidine has been proposed to act as a general base in the catalysis. BsoBI belongs to a wider superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Type II restriction endonuclease BsoBI and similar proteins. BsoBI is a thermophilic PDDEXK-family restriction endonuclease exhibiting both base-specific and degenerate recognition within the sequence C-Y-C-G-R-G. (R = A or G, Y = T or C) A conserved histidine has been proposed to act as a general base in the catalysis. BsoBI belongs to a wider superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22315); members share this curated model.
