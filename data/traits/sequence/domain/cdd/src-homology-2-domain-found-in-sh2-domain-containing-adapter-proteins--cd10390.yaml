identifier: CDD:cd10390
label: "Src homology 2 domain found in SH2 domain-containing adapter proteins D (SHD). The expression of SHD is restricted to the brain. SHD may be a physiological substrate of c-Abl and may function as an adapter protein in the central nervous system. It is also thought to be involved in apoptotic regulation. SHD contains five YXXP motifs, a substrate sequence preferred by Abl tyrosine kinases, in addition to a poly-proline rich region and a C-terminal SH2 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in SH2 domain-containing adapter proteins D (SHD). The expression of SHD is restricted to the brain. SHD may be a physiological substrate of c-Abl and may function as an adapter protein in the central nervous system. It is also thought to be involved in apoptotic regulation. SHD contains five YXXP motifs, a substrate sequence preferred by Abl tyrosine kinases, in addition to a poly-proline rich region and a C-terminal SH2 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10390); members share this curated model.
