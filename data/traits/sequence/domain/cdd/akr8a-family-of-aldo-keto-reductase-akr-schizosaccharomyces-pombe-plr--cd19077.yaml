identifier: CDD:cd19077
label: "AKR8A family of aldo-keto reductase (AKR). Schizosaccharomyces pombe PLR and PLR2 are founding members of aldo-keto reductase family 8 member A1-2 (AKR8A1-2), respectively. PLR (EC 1.1.1.65), also called PL reductase (PL-red), catalyzes the reduction of pyridoxal (PL) with NADPH and oxidation of pyridoxine (PN) with NADP(+)."
definition: >-
  AKR8A family of aldo-keto reductase (AKR). Schizosaccharomyces pombe PLR and PLR2 are founding members of aldo-keto reductase family 8 member A1-2 (AKR8A1-2), respectively. PLR (EC 1.1.1.65), also called PL reductase (PL-red), catalyzes the reduction of pyridoxal (PL) with NADPH and oxidation of pyridoxine (PN) with NADP(+). — an NCBI CDD conserved domain (cd19077); members share this curated model.
