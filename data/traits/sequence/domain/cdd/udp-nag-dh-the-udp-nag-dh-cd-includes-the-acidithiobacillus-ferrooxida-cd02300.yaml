identifier: CDD:cd02300
label: "UDP-NAG-DH. The UDP-NAG-DH CD includes the Acidithiobacillus ferrooxidans oxidoreductase, GnnA, an NAD+ dependent UDP-N-acetylglucosamine 3-dehydrogenase involved in lipid biosynthesis; and other related sequences. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins."
definition: >-
  UDP-NAG-DH. The UDP-NAG-DH CD includes the Acidithiobacillus ferrooxidans oxidoreductase, GnnA, an NAD+ dependent UDP-N-acetylglucosamine 3-dehydrogenase involved in lipid biosynthesis; and other related sequences. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins. — an NCBI CDD conserved domain (cd02300); members share this curated model.
