identifier: CDD:cd20766
label: N6P_GNL-like
definition: >-
  uncharacterized gluconolactonase-like family. This model represents a subfamily of the N6P (Nucleophilic attack 6-bladed beta-propeller) superfamily, a set of enzymes including and related to vertebrate paraoxonase, an enzyme that hydrolyses organophosphorous esters. The family is widely distributed across all three kindgoms of life and many subfamilies are uncharacterized. Included are the major royal jelly protein, the yellow protein of drosophila, members of the senescence marker protein 30 (SMP30)/gluconolactonase family, regulocalcin, S-valerolactone hydrolase, and strictosidine synthase. The proteins in this family are composed of six beta-propeller repeats that form a closed structure, similar to WD40- and NHL-repeat containing protein families. Some family members are also referred to as the calcium-dependent phosphotriesterases
