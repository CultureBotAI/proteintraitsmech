identifier: CDD:cd02393
label: "type I K homology (KH) RNA-binding domain found in polyribonucleotide nucleotidyltransferase (PNPase) and similar proteins. PNPase, also called polynucleotide phosphorylase, is a polyribonucleotide nucleotidyl transferase that degrades mRNA in prokaryotes and plant chloroplasts. It catalyzes the phosphorolysis of single-stranded polyribonucleotides processively in the 3'- to 5'-direction.  It is also involved, along with RNase II, in tRNA processing. The C-terminal region of PNPase contains domains homologous to those in other RNA binding proteins: a KH domain and an S1 domain. The model corresponds to the KH domain."
definition: >-
  type I K homology (KH) RNA-binding domain found in polyribonucleotide nucleotidyltransferase (PNPase) and similar proteins. PNPase, also called polynucleotide phosphorylase, is a polyribonucleotide nucleotidyl transferase that degrades mRNA in prokaryotes and plant chloroplasts. It catalyzes the phosphorolysis of single-stranded polyribonucleotides processively in the 3'- to 5'-direction. It is also involved, along with RNase II, in tRNA processing. The C-terminal region of PNPase contains domains homologous to those in other RNA binding proteins: a KH domain and an S1 domain. The model corresponds to the KH domain. — an NCBI CDD conserved domain (cd02393); members share this curated model.
