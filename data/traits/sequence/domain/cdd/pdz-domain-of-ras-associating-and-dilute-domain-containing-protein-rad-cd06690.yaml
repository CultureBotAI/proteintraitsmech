identifier: CDD:cd06690
label: "PDZ domain of Ras-associating and dilute domain-containing protein (Radil) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of Radil (also known as protein KIAA1849) and related domains. Radil is required for cell adhesion and migration of neural crest precursors during development. Radil is a component of a Rasip1-Radil-ARHGAP29 complex at endothelial cell-cell junctions. Rap1, via its effectors Radil and Rasip1 and their binding partner ArhGAP29, controls the endothelial barrier by decreasing Rho-mediated radial tension on cell-cell junctions. ArhGAP29 binds the Radil PDZ domain. The Radil PDZ domain also binds kinesin family protein 14 (KIF14); KIF14 negatively regulates Rap1-mediated inside-out integrin activation by tethering Radil on microtubules. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This Radil-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of Ras-associating and dilute domain-containing protein (Radil) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of Radil (also known as protein KIAA1849) and related domains. Radil is required for cell adhesion and migration of neural crest precursors during development. Radil is a component of a Rasip1-Radil-ARHGAP29 complex at endothelial cell-cell junctions. Rap1, via its effectors Radil and Rasip1 and their binding partner ArhGAP29, controls the endothelial barrier by decreasing Rho-mediated radial tension on cell-cell junctions. ArhGAP29 binds the Radil PDZ domain. The Radil PDZ domain also binds kinesin family protein 14 (KIF14); KIF14 negatively regulates Rap1-mediated inside-out integrin activation by tethering Radil on microtubules. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This Radil-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06690); members share this curated model.
