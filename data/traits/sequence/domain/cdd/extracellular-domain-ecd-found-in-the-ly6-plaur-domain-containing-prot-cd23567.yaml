identifier: CDD:cd23567
label: "extracellular domain (ECD) found in the Ly6/PLAUR domain-containing protein 6 (LYPD6)-like family. The LYPD6-like family includes LYPD6 and LYPD6B. LYPD6 acts as a modulator of nicotinic acetylcholine receptors (nAChRs) function in the brain. It inhibits nicotine-induced Ca(2+) influx through nAChRs. It functions as a positive regulator of Wnt/beta-catenin signaling. LYPD6B (also called LYPD7) may act as a modulator of nicotinic acetylcholine receptors (nAChRs) activity. In vitro it acts on nAChRs in a subtype- and stoichiometry-dependent manner. LYPD6B modulates specifically alpha-3(3):beta-4(2) nAChRs by enhancing the sensitivity to ACh, decreasing ACh-induced maximal current response and increasing the rate of desensitization to ACh; has no effect on alpha-7 homomeric nAChRs; modulates alpha-3(2):alpha-5:beta-4(2) nAChRs in the context of CHRNA5/alpha-5 variant Asn-398, but not its wild-type sequence. LYPD6B also activates AP1 (PMA)-mediated transcriptional activation. Members in this family contain an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in the Ly6/PLAUR domain-containing protein 6 (LYPD6)-like family. The LYPD6-like family includes LYPD6 and LYPD6B. LYPD6 acts as a modulator of nicotinic acetylcholine receptors (nAChRs) function in the brain. It inhibits nicotine-induced Ca(2+) influx through nAChRs. It functions as a positive regulator of Wnt/beta-catenin signaling. LYPD6B (also called LYPD7) may act as a modulator of nicotinic acetylcholine receptors (nAChRs) activity. In vitro it acts on nAChRs in a subtype- and stoichiometry-dependent manner. LYPD6B modulates specifically alpha-3(3):beta-4(2) nAChRs by enhancing the sensitivity to ACh, decreasing ACh-induced maximal current response and increasing the rate of desensitization to ACh; has no effect on alpha-7 homomeric nAChRs; modulates alpha-3(2):alpha-5:beta-4(2) nAChRs in the context of CHRNA5/alpha-5 variant Asn-398, but not its wild-type sequence. LYPD6B also activates AP1 (PMA)-mediated transcriptional activation. Members in this family contain an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23567); members share this curated model.
