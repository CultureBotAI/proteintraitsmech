identifier: CDD:cd14273
label: "UBA-like domain found in the NXF family of mRNA nuclear export factors and similar proteins. This family includes nuclear RNA export factors (NXF1/NXF2), FAS-associated factors (FAF1/2), tyrosyl-DNA phosphodiesterase 2 (TDP2), OTU domain-containing proteins (OTU7A/OTU7B), NSFL1 cofactor p47, defective in cullin neddylation protein 1 (DCN1)-like protein (DCNL1/DCNL2), yeast defective in cullin neddylation protein 1 (DCN1) and similar proteins. NXF proteins can stimulate nuclear export of mRNAs and facilitate the export of unspliced viral mRNA containing the constitutive transport element. FAF1 is an apoptotic signaling molecule that acts downstream in the Fas signal transduction pathway. It interacts with the cytoplasmic domain of Fas, but not to a Fas mutant that is deficient in signal transduction. FAF2 is the translation product of a highly expressed gene in the T-cells and eosinophils of atopic dermatitis patients compared with those of normal individuals. Its biological function remains unclear. TDP2 is a 5'-Tyr-DNA phosphodiesterase required for the efficient repair of topoisomerase II-induced DNA double strand breaks. OTU7A and OTU7B are zinc finger proteins that function as deubiquitinating enzymes. p47 is a major cofactor of the cytosolic AAA ATPase p97. It is required for the p97-regulated membrane reassembly of the endoplasmic reticulum (ER), the nuclear envelope and the Golgi apparatus. DCNL1 plays an essential role in the neddylation E3 complex and participates in the release of inhibitory effects of CAND1 on cullin-RING ligase E3 complex assembly and activity. The biological function of DCNL2 remains unclear. Yeast DCN1 is a scaffold-type E3 ligase for cullin neddylation. It can bind directly to cullins and the ubiquitin-like protein Nedd8-specific E2 (Ubc12), and regulate cullin neddylation and thus display ubiquitin ligase activity."
definition: >-
  UBA-like domain found in the NXF family of mRNA nuclear export factors and similar proteins. This family includes nuclear RNA export factors (NXF1/NXF2), FAS-associated factors (FAF1/2), tyrosyl-DNA phosphodiesterase 2 (TDP2), OTU domain-containing proteins (OTU7A/OTU7B), NSFL1 cofactor p47, defective in cullin neddylation protein 1 (DCN1)-like protein (DCNL1/DCNL2), yeast defective in cullin neddylation protein 1 (DCN1) and similar proteins. NXF proteins can stimulate nuclear export of mRNAs and facilitate the export of unspliced viral mRNA containing the constitutive transport element. FAF1 is an apoptotic signaling molecule that acts downstream in the Fas signal transduction pathway. It interacts with the cytoplasmic domain of Fas, but not to a Fas mutant that is deficient in signal transduction. FAF2 is the translation product of a highly expressed gene in the T-cells and eosinophils of atopic dermatitis patients compared with those of normal individuals. Its biological function remains unclear. TDP2 is a 5'-Tyr-DNA phosphodiesterase required for the efficient repair of topoisomerase II-induced DNA double strand breaks. OTU7A and OTU7B are zinc finger proteins that function as deubiquitinating enzymes. p47 is a major cofactor of the cytosolic AAA ATPase p97. It is required for the p97-regulated membrane reassembly of the endoplasmic reticulum (ER), the nuclear envelope and the Golgi apparatus. DCNL1 plays an essential role in the neddylation E3 complex and participates in the release of inhibitory effects of CAND1 on cullin-RING ligase E3 complex assembly and activity. The biological function of DCNL2 remains unclear. Yeast DCN1 is a scaffold-type E3 ligase for cullin neddylation. It can bind directly to cullins and the ubiquitin-like protein Nedd8-specific E2 (Ubc12), and regulate cullin neddylation and thus display ubiquitin ligase activity. — an NCBI CDD conserved domain (cd14273); members share this curated model.
