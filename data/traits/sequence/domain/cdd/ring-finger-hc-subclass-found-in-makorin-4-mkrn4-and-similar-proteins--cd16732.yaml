identifier: CDD:cd16732
label: "RING finger, HC subclass, found in makorin-4 (MKRN4) and similar proteins. MKRN4, also known as makorin RING finger protein pseudogene 4, makorin RING finger protein pseudogene 5, RING finger protein 64 (RNF64), zinc finger protein 127-Xp (ZNF127-Xp), or zinc finger protein 127-like 1, is a new divergent member of the makorin protein family in vertebrates. It may have an ancestral gonad-specific function and maternal embryonic expression before duplication in vertebrates. MKRN4 contains typical arrays of one to four C3H1-type zinc fingers, a motif rich in Cys and His residues (CH) and a C3HC4-type RING-HC finger. The RING-HC finger of mammalian MKRN4 shows high sequence similarity with that of MKRN3, and is not included in this model."
definition: >-
  RING finger, HC subclass, found in makorin-4 (MKRN4) and similar proteins. MKRN4, also known as makorin RING finger protein pseudogene 4, makorin RING finger protein pseudogene 5, RING finger protein 64 (RNF64), zinc finger protein 127-Xp (ZNF127-Xp), or zinc finger protein 127-like 1, is a new divergent member of the makorin protein family in vertebrates. It may have an ancestral gonad-specific function and maternal embryonic expression before duplication in vertebrates. MKRN4 contains typical arrays of one to four C3H1-type zinc fingers, a motif rich in Cys and His residues (CH) and a C3HC4-type RING-HC finger. The RING-HC finger of mammalian MKRN4 shows high sequence similarity with that of MKRN3, and is not included in this model. — an NCBI CDD conserved domain (cd16732); members share this curated model.
