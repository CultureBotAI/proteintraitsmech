label: Rhamnose_isomerase
definition: >-
  Rhamnose isomerase. Rhamnose isomerase catalyzes the reversable conversion of L-rhamnose to L-rhamnulose. It is a member of the xylose isomerase-like superfamily of TIM-barrel enzymes
