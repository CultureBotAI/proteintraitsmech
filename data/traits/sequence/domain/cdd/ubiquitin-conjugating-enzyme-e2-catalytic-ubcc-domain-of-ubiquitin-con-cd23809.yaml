identifier: CDD:cd23809
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 Z and related proteins. The E2Z subfamily includes mammalian ubiquitin-conjugating enzymes E2 Z (UBE2Z/HOYS7) and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2Z, also called Uba6-specific E2 conjugating enzyme 1 (Use1), acts as a ubiquitin-conjugating enzyme that accept ubiquitin from the E1 complex and catalyzes the covalent attachment to other proteins. It is a specific substrate for UBA6, not charged with ubiquitin by UBE1. It may be involved in apoptosis regulation."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 Z and related proteins. The E2Z subfamily includes mammalian ubiquitin-conjugating enzymes E2 Z (UBE2Z/HOYS7) and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2Z, also called Uba6-specific E2 conjugating enzyme 1 (Use1), acts as a ubiquitin-conjugating enzyme that accept ubiquitin from the E1 complex and catalyzes the covalent attachment to other proteins. It is a specific substrate for UBA6, not charged with ubiquitin by UBE1. It may be involved in apoptosis regulation. — an NCBI CDD conserved domain (cd23809); members share this curated model.
