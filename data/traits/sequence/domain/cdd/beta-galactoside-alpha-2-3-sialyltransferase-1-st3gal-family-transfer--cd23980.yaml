label: "beta-galactoside alpha-2,3-sialyltransferase 1. ST3GAL family transfer sialic acid from CMP-Sia to the terminal galactose residues of glycochains through an 2,3-linkage. ST3GAL1 preferentially utilizes the Galbeta1,3GalNAc on O-glycans of glycoproteins (core1 O-glycans) as an acceptor substrate. Members of this family belong to glycosyltransferase family29 (GT29)."
definition: >-
