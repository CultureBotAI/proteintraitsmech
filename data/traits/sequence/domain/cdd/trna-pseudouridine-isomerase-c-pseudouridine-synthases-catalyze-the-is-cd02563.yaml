label: "tRNA pseudouridine isomerase C. Pseudouridine synthases catalyze the isomerization of specific uridines in an tRNA molecule to pseudouridines (5-ribosyluracil, psi).  No cofactors are required. TruC makes psi65 in tRNAs.  This psi residue is not universally conserved."
