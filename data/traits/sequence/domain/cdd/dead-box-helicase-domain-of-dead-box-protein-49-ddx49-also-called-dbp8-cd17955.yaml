identifier: CDD:cd17955
label: "DEAD-box helicase domain of DEAD box protein 49. DDX49 (also called Dbp8) is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 49. DDX49 (also called Dbp8) is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17955); members share this curated model.
