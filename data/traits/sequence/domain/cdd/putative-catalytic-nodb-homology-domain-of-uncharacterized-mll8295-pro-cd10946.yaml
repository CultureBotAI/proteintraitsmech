identifier: CDD:cd10946
label: "Putative catalytic NodB homology domain of uncharacterized Mll8295 protein encoded from Rhizobium loti and its bacterial homologs. This family is represented by a putative polysaccharide deacetylase Mll8295 encoded from Rhizobium loti. Although its biological function still remains unknown, Mll8295 shows high sequence homology to the catalytic domain of Streptococcus pneumoniae polysaccharide deacetylase PgdA (SpPgdA), which is an extracellular metal-dependent polysaccharide deacetylase with de-N-acetylase activity toward a hexamer of chitooligosaccharide N-acetylglucosamine, but not shorter chitooligosaccharides or a synthetic peptidoglycan tetrasaccharide. Both Mll8295 and SpPgdA belong to the carbohydrate esterase 4 (CE4) superfamily. This family also includes many uncharacterized bacterial polysaccharide deacetylases."
definition: >-
