identifier: CDD:cd16527
label: "RING finger, HC subclass, found in peroxin-10 (PEX10) and similar proteins. PEX10, also known as peroxisome biogenesis factor 10, peroxisomal biogenesis factor 10, peroxisome assembly protein 10, or RING finger protein 69 (RNF69), is an integral peroxisomal membrane protein with two transmembrane regions and a C3HC4-type RING-HC finger within its cytoplasmically exposed C-terminus. It plays an essential role in peroxisome assembly, import of target substrates, and recycling or degradation of protein complexes and amino acids. It is an essential component of the spinal locomotor circuit, and thus its mutations may be involved in peroxisomal biogenesis disorders (PBD). Mutations in human PEX10 also result in autosomal recessive ataxia. Moreover, PEX10 functions as an E3-ubiquitin ligase with an E2, UBCH5C. It mono- or poly-ubiquitinates PEX5, a key player in peroxisomal matrix protein import, in a UBC4-dependent manner, to control PEX5 receptor recycling or degradation. It also links the E2 ubiquitin conjugating enzyme PEX4 to the protein import machinery of the peroxisome."
definition: >-
  RING finger, HC subclass, found in peroxin-10 (PEX10) and similar proteins. PEX10, also known as peroxisome biogenesis factor 10, peroxisomal biogenesis factor 10, peroxisome assembly protein 10, or RING finger protein 69 (RNF69), is an integral peroxisomal membrane protein with two transmembrane regions and a C3HC4-type RING-HC finger within its cytoplasmically exposed C-terminus. It plays an essential role in peroxisome assembly, import of target substrates, and recycling or degradation of protein complexes and amino acids. It is an essential component of the spinal locomotor circuit, and thus its mutations may be involved in peroxisomal biogenesis disorders (PBD). Mutations in human PEX10 also result in autosomal recessive ataxia. Moreover, PEX10 functions as an E3-ubiquitin ligase with an E2, UBCH5C. It mono- or poly-ubiquitinates PEX5, a key player in peroxisomal matrix protein import, in a UBC4-dependent manner, to control PEX5 receptor recycling or degradation. It also links the E2 ubiquitin conjugating enzyme PEX4 to the protein import machinery of the peroxisome. — an NCBI CDD conserved domain (cd16527); members share this curated model.
