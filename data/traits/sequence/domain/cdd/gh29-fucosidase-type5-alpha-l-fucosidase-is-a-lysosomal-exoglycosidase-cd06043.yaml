identifier: CDD:cd06043
label: "GH29_fucosidase_type5. Alpha-L-fucosidase is a lysosomal exoglycosidase belonging to glycosyl hydrolase family 29 (GH29), which is responsible for hydrolyzing the alpha-1,6-linked fucose joined to the reducing-end N-acetylglucosamine of the carbohydrate moieties of glycoproteins. Alpha-L-fucosidases efficiently catalyze the synthesis of highly branched fuco-oligosaccharides as large as tetrasaccharides, starting from monosaccharides. In mammals, alpha-L-fucosidases are involved in many biological processes including inflammation, metastasis and deficiencies of alpha-L-fucosidase cause the lysosomal storage disease fucosidosis characterized by rapid neurodegeneration, resulting in severe mental and motor deterioration. In plants, alpha-L-fucosylated oligosaccharides derived from xyloglucan have been shown to regulate auxin- and acid pH-induced growth. This enzyme assembles as a hexamer and displays a two-domain fold, composed of a catalytic (beta/alpha)(8)-like domain and a C-terminal beta-sandwich domain.  This alignment model represents the catalyic domain."
definition: >-
  GH29_fucosidase_type5. Alpha-L-fucosidase is a lysosomal exoglycosidase belonging to glycosyl hydrolase family 29 (GH29), which is responsible for hydrolyzing the alpha-1,6-linked fucose joined to the reducing-end N-acetylglucosamine of the carbohydrate moieties of glycoproteins. Alpha-L-fucosidases efficiently catalyze the synthesis of highly branched fuco-oligosaccharides as large as tetrasaccharides, starting from monosaccharides. In mammals, alpha-L-fucosidases are involved in many biological processes including inflammation, metastasis and deficiencies of alpha-L-fucosidase cause the lysosomal storage disease fucosidosis characterized by rapid neurodegeneration, resulting in severe mental and motor deterioration. In plants, alpha-L-fucosylated oligosaccharides derived from xyloglucan have been shown to regulate auxin- and acid pH-induced growth. This enzyme assembles as a hexamer and displays a two-domain fold, composed of a catalytic (beta/alpha)(8)-like domain and a C-terminal beta-sandwich domain. This alignment model represents the catalyic domain. — an NCBI CDD conserved domain (cd06043); members share this curated model.
