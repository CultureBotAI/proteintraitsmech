identifier: CDD:cd02955
label: "TRX domain, SSP411 protein family; members of this family are highly conserved proteins present in eukaryotes, bacteria and archaea, about 600-800 amino acids in length, which contain a TRX domain with a redox active CXXC motif. The human/rat protein, called SSP411, is specifically expressed in the testis in an age-dependent manner. The SSP411 mRNA is increased during spermiogenesis and is localized in round and elongated spermatids, suggesting a function in fertility regulation."
definition: >-
  TRX domain, SSP411 protein family; members of this family are highly conserved proteins present in eukaryotes, bacteria and archaea, about 600-800 amino acids in length, which contain a TRX domain with a redox active CXXC motif. The human/rat protein, called SSP411, is specifically expressed in the testis in an age-dependent manner. The SSP411 mRNA is increased during spermiogenesis and is localized in round and elongated spermatids, suggesting a function in fertility regulation. — an NCBI CDD conserved domain (cd02955); members share this curated model.
