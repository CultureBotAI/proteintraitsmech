identifier: CDD:cd07979
label: "histone-fold domain found in transcription initiation factor TFIID subunit 9 (TAF9) and similar proteins. The family includes TAF9 (also called TATA Binding Protein (TBP) associated factor 9, RNA polymerase II TBP-associated factor subunit G, STAF31/32, transcription initiation factor TFIID 31 kDa subunit, TAFII-31, TAFII31, transcription initiation factor TFIID 32 kDa subunit, TAFII-32, or TAFII32) and TAF9-like (also called transcription initiation factor TFIID subunit 9B, neuronal cell death-related protein 7, DN-7, or transcription-associated factor TAFII31L), which are essential for cell viability. They are involved in transcriptional activation as well as the repression of distinct but overlapping sets of genes. They may have roles in gene regulation associated with apoptosis. Both TAF9 and TAF9-like are TAFs that are components of the transcription factor IID (TFIID) complex, the TBP-free TAFII complex (TFTC), the PCAF histone acetylase complex and the STAGA transcription coactivator-HAT complex. TFIID or TFTC are essential for the regulation of RNA polymerase II-mediated transcription. TAF9 interacts directly with different transcription factors such as p53, herpes simplex virus activator vp16, and the basal transcription factor TFIIB."
definition: >-
  histone-fold domain found in transcription initiation factor TFIID subunit 9 (TAF9) and similar proteins. The family includes TAF9 (also called TATA Binding Protein (TBP) associated factor 9, RNA polymerase II TBP-associated factor subunit G, STAF31/32, transcription initiation factor TFIID 31 kDa subunit, TAFII-31, TAFII31, transcription initiation factor TFIID 32 kDa subunit, TAFII-32, or TAFII32) and TAF9-like (also called transcription initiation factor TFIID subunit 9B, neuronal cell death-related protein 7, DN-7, or transcription-associated factor TAFII31L), which are essential for cell viability. They are involved in transcriptional activation as well as the repression of distinct but overlapping sets of genes. They may have roles in gene regulation associated with apoptosis. Both TAF9 and TAF9-like are TAFs that are components of the transcription factor IID (TFIID) complex, the TBP-free TAFII complex (TFTC), the PCAF histone acetylase complex and the STAGA transcription coactivator-HAT complex. TFIID or TFTC are essential for the regulation of RNA polymerase II-mediated transcription. TAF9 interacts directly with different transcription factors such as p53, herpes simplex virus activator vp16, and the basal transcription factor TFIIB. — an NCBI CDD conserved domain (cd07979); members share this curated model.
