label: "Desulfitobacterium hafniense dsy2733 and related proteins, cupin domain. This family includes bacterial proteins homologous to dsy2733, a Desulfitobacterium hafniense protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
