identifier: CDD:cd22850
label: "Ribosome biogenesis protein Nsa1 and similar proteins. Ribosome biogenesis protein Nsa1 (Nop7-associated 1) from fungi and WDR74 (WD repeat-containing protein 74) from mammals and plants, are homologous essential factors for ribosome assembly. In cooperation with the assembly factor Rix7/NVL2, Nsa1/WDR74 participates in an early cleavage of the pre-rRNA processing pathway. Rix7/NVL2 is a type II double ring, AAA-ATPase, that may mediate the release of Nsa1/WDR74 from nucleolar pre-60S particles. Nsa1/WDR74 contains an N-terminal seven-bladed beta-propeller WD40 domain that associates with the D1-AAA domain of the AAA-ATPase Rix7/NVL2, and a flexible lysine-rich C-terminus that extends outward from the WD40 domain, and is required for nucleolar localization."
definition: >-
