identifier: CDD:cd11866
label: "Src Homology 3 domain of Src Kinase-Associated Phosphoprotein 1 and similar proteins. This subfamily is composed of SKAP1, SKAP2, and similar proteins. SKAP1 and SKAP2 are immune cell-specific adaptor proteins that play roles in T- and B-cell adhesion, respectively, and are thus important in the migration of T- and B-cells to sites of inflammation and for movement during T-cell conjugation with antigen-presenting cells. Both SKAP1 and SKAP2 bind to ADAP (adhesion and degranulation-promoting adaptor protein), among many other binding partners. They contain a pleckstrin homology (PH) domain, a C-terminal SH3 domain, and several tyrosine phosphorylation sites. The SH3 domain of SKAP1 is necessary for its ability to regulate T-cell conjugation with antigen-presenting cells and the formation of LFA-1 clusters. SKAP1 binds primarily to a proline-rich region of ADAP through its SH3 domain; its degradation is regulated by ADAP. A secondary interaction occurs via the ADAP SH3 domain and the RKxxYxxY motif in SKAP1. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Src Kinase-Associated Phosphoprotein 1 and similar proteins. This subfamily is composed of SKAP1, SKAP2, and similar proteins. SKAP1 and SKAP2 are immune cell-specific adaptor proteins that play roles in T- and B-cell adhesion, respectively, and are thus important in the migration of T- and B-cells to sites of inflammation and for movement during T-cell conjugation with antigen-presenting cells. Both SKAP1 and SKAP2 bind to ADAP (adhesion and degranulation-promoting adaptor protein), among many other binding partners. They contain a pleckstrin homology (PH) domain, a C-terminal SH3 domain, and several tyrosine phosphorylation sites. The SH3 domain of SKAP1 is necessary for its ability to regulate T-cell conjugation with antigen-presenting cells and the formation of LFA-1 clusters. SKAP1 binds primarily to a proline-rich region of ADAP through its SH3 domain; its degradation is regulated by ADAP. A secondary interaction occurs via the ADAP SH3 domain and the RKxxYxxY motif in SKAP1. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11866); members share this curated model.
