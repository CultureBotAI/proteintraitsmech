identifier: CDD:cd11952
label: "Src Homology 3 (SH3) domain of Inhibitor of ASPP protein (iASPP). iASPP, also called RelA-associated inhibitor (RAI), is an oncoprotein that inhibits the apoptotic transactivation potential of p53. It is upregulated in human breast cancers expressing wild-type p53, in acute leukemias regardless of the p53 mutation status, as well as in ovarian cancer where it is associated with poor patient outcome and chemoresistance. iASPP is also a binding partner and negative regulator of p65RelA, which promotes cell proliferation and inhibits apoptosis; p65RelA has the opposite effect on cell growth compared to the p53 family. It contains a proline-rich region, four ankyrin (ANK) repeats, and an SH3 domain at its C-terminal half. The SH3 domain and the ANK repeats of iASPP contribute to the p53 binding site; they bind to the DNA binding domain of p53. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 (SH3) domain of Inhibitor of ASPP protein (iASPP). iASPP, also called RelA-associated inhibitor (RAI), is an oncoprotein that inhibits the apoptotic transactivation potential of p53. It is upregulated in human breast cancers expressing wild-type p53, in acute leukemias regardless of the p53 mutation status, as well as in ovarian cancer where it is associated with poor patient outcome and chemoresistance. iASPP is also a binding partner and negative regulator of p65RelA, which promotes cell proliferation and inhibits apoptosis; p65RelA has the opposite effect on cell growth compared to the p53 family. It contains a proline-rich region, four ankyrin (ANK) repeats, and an SH3 domain at its C-terminal half. The SH3 domain and the ANK repeats of iASPP contribute to the p53 binding site; they bind to the DNA binding domain of p53. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11952); members share this curated model.
