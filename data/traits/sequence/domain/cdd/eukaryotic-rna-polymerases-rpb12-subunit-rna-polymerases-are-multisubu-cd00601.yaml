identifier: CDD:cd00601
label: RNA_pol_P_RPB12
definition: >-
  Eukaryotic RNA polymerases RPB12 subunit. RNA polymerases are multisubunit enzymes that synthesize RNA from DNA. While three different RNA polymerases (I, II, and III) exist in eukaryotes, only one is present in archea. Eukaryotic RPB12 subunit and its archeal homolog subunit P have a conserved tetrahedral Zn(2+)-binding site with the following conserved motif,[ C-X(2)-C-X(1,)-C-X(2)-C]. RPB12 bridges RPB2 and RPB3 and plays an important role in subunit assembly. RPB12 is a universal subunit, being present in all three eukaryotic RNA polymerases, as are subunits RPB5, RPB6, RPB8, and RPB10
