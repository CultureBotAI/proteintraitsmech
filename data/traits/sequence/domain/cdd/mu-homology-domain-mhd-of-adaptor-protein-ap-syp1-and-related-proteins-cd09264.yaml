identifier: CDD:cd09264
label: "mu-homology domain (MHD) of adaptor protein (AP), Syp1, and related proteins. This family corresponds to the MHD found in a novel endocytic adaptor Syp1 and related proteins. Syp1 is a poorly characterized yeast protein with multiple biological functions. It was originally identified as a suppressor of a yeast profiling deletion and later as a suppressor of arf3delta (Arf3 is the yeast homologue of Arf6, a mammalian regulator of endocytosis). Syp1 can bind to septins and physically link with cell polarity factors. It also directly binds to the endocytic adaptor/scaffold protein Ede1, and plays a role in endocytosis. Further studies show that Syp1 is itself an endocytic adaptor protein contributing to stress responses. Its mu-homology domain at the C-terminus binds to the cargo protein Mid2, a transmembrane stress sensor protein, and mediates Mid2 internalization. In addition, Syp1 contains an EFC/F-BAR domain which can induce membrane tabulation."
definition: >-
  mu-homology domain (MHD) of adaptor protein (AP), Syp1, and related proteins. This family corresponds to the MHD found in a novel endocytic adaptor Syp1 and related proteins. Syp1 is a poorly characterized yeast protein with multiple biological functions. It was originally identified as a suppressor of a yeast profiling deletion and later as a suppressor of arf3delta (Arf3 is the yeast homologue of Arf6, a mammalian regulator of endocytosis). Syp1 can bind to septins and physically link with cell polarity factors. It also directly binds to the endocytic adaptor/scaffold protein Ede1, and plays a role in endocytosis. Further studies show that Syp1 is itself an endocytic adaptor protein contributing to stress responses. Its mu-homology domain at the C-terminus binds to the cargo protein Mid2, a transmembrane stress sensor protein, and mediates Mid2 internalization. In addition, Syp1 contains an EFC/F-BAR domain which can induce membrane tabulation. — an NCBI CDD conserved domain (cd09264); members share this curated model.
