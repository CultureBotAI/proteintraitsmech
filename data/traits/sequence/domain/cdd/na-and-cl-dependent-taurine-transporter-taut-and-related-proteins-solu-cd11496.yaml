identifier: CDD:cd11496
label: "Na(+)- and Cl(-)-dependent taurine transporter TauT, and related proteins; solute-binding domain. This subgroup represents the solute-binding domain of TauT-like Na(+)- and Cl(-)-dependent transporters. Family members include: human TauT which transports taurine, human GAT1, GAT2, and GAT3, and BGT1, which transport gamma-aminobutyric acid (GABA), and human CT1 which transports creatine. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent taurine transporter TauT, and related proteins; solute-binding domain. This subgroup represents the solute-binding domain of TauT-like Na(+)- and Cl(-)-dependent transporters. Family members include: human TauT which transports taurine, human GAT1, GAT2, and GAT3, and BGT1, which transport gamma-aminobutyric acid (GABA), and human CT1 which transports creatine. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11496); members share this curated model.
