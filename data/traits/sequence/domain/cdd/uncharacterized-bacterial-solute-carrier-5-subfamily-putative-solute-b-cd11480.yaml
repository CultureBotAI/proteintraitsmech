identifier: CDD:cd11480
label: "Uncharacterized bacterial solute carrier 5 subfamily; putative solute-binding domain. SLC5 (also called the sodium/glucose cotransporter family or solute sodium symporter family) is a family of proteins that co-transports Na+ with sugars, amino acids, inorganic ions or vitamins. Prokaryotic members of this family include Vibrio parahaemolyticus glucose/galactose (vSGLT), and Escherichia coli proline (PutP) and pantothenate (PutF) cotransporters. One member of the SLC5 family, human SGLT3, has been characterized as a glucose sensor and not a transporter. This subfamily belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  Uncharacterized bacterial solute carrier 5 subfamily; putative solute-binding domain. SLC5 (also called the sodium/glucose cotransporter family or solute sodium symporter family) is a family of proteins that co-transports Na+ with sugars, amino acids, inorganic ions or vitamins. Prokaryotic members of this family include Vibrio parahaemolyticus glucose/galactose (vSGLT), and Escherichia coli proline (PutP) and pantothenate (PutF) cotransporters. One member of the SLC5 family, human SGLT3, has been characterized as a glucose sensor and not a transporter. This subfamily belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd11480); members share this curated model.
