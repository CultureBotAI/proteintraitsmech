identifier: CDD:cd11487
label: "Na(+)/glucose cotransporter SGLT2 and related proteins; solute-binding domain. Human SGLT2 (hSGLT2) is a high-capacity, low-affinity glucose transporter, that plays an important role in renal glucose reabsorption. It is encoded by the SLC5A2 gene and expressed almost exclusively in renal proximal tubule cells. Mutations in hSGLT2 cause Familial Renal Glucosuria (FRG), a rare autosomal defect in glucose transport. hSGLT2 is a major drug target for regulating blood glucose levels in diabetes. hSGLT2 is predicted to have 14 membrane-spanning regions. This subgroup belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  Na(+)/glucose cotransporter SGLT2 and related proteins; solute-binding domain. Human SGLT2 (hSGLT2) is a high-capacity, low-affinity glucose transporter, that plays an important role in renal glucose reabsorption. It is encoded by the SLC5A2 gene and expressed almost exclusively in renal proximal tubule cells. Mutations in hSGLT2 cause Familial Renal Glucosuria (FRG), a rare autosomal defect in glucose transport. hSGLT2 is a major drug target for regulating blood glucose levels in diabetes. hSGLT2 is predicted to have 14 membrane-spanning regions. This subgroup belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd11487); members share this curated model.
