identifier: CDD:cd21303
label: "fourth calponin homology (CH) domain found in Saccharomyces cerevisiae fimbrin and similar proteins. Fimbrin binds to actin, and functionally associates with actin structures involved in the development and maintenance of cell polarity. Members of this family contain four copies of the CH domain. This model corresponds to the fourth CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  fourth calponin homology (CH) domain found in Saccharomyces cerevisiae fimbrin and similar proteins. Fimbrin binds to actin, and functionally associates with actin structures involved in the development and maintenance of cell polarity. Members of this family contain four copies of the CH domain. This model corresponds to the fourth CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21303); members share this curated model.
