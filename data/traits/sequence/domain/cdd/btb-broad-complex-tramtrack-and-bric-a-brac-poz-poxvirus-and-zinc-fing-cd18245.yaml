identifier: CDD:cd18245
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in gigaxonin. Gigaxonin, also called Kelch-like protein 16 (KLHL16), may be a cytoskeletal component that directly or indirectly plays an important role in neurofilament architecture. It may also act as a substrate-specific adaptor of an E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, including tubulin folding cofactor B (TBCB), microtubule-associated protein MAP1B, and glial fibrillary acidic protein (GFAP). Gigaxonin is mutated in giant axonal neuropathy. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in gigaxonin. Gigaxonin, also called Kelch-like protein 16 (KLHL16), may be a cytoskeletal component that directly or indirectly plays an important role in neurofilament architecture. It may also act as a substrate-specific adaptor of an E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, including tubulin folding cofactor B (TBCB), microtubule-associated protein MAP1B, and glial fibrillary acidic protein (GFAP). Gigaxonin is mutated in giant axonal neuropathy. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18245); members share this curated model.
