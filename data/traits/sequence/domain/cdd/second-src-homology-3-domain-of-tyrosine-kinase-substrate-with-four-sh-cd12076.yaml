identifier: CDD:cd12076
label: "Second Src homology 3 domain of Tyrosine kinase substrate with four SH3 domains. Tks4, also called SH3 and PX domain-containing protein 2B (SH3PXD2B) or HOFI, is a Src substrate and scaffolding protein that plays an important role in the formation of podosomes and invadopodia, the dynamic actin-rich structures that are related to cell migration and cancer cell invasion. It is required in the formation of functional podosomes, EGF-induced membrane ruffling, and lamellipodia generation. It plays an important role in cellular attachment and cell spreading. Tks4 is essential for the localization of MT1-MMP (membrane-type 1 matrix metalloproteinase) to invadopodia. It contains an N-terminal Phox homology (PX) domain and four SH3 domains. This model characterizes the second SH3 domain of Tks4. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Second Src homology 3 domain of Tyrosine kinase substrate with four SH3 domains. Tks4, also called SH3 and PX domain-containing protein 2B (SH3PXD2B) or HOFI, is a Src substrate and scaffolding protein that plays an important role in the formation of podosomes and invadopodia, the dynamic actin-rich structures that are related to cell migration and cancer cell invasion. It is required in the formation of functional podosomes, EGF-induced membrane ruffling, and lamellipodia generation. It plays an important role in cellular attachment and cell spreading. Tks4 is essential for the localization of MT1-MMP (membrane-type 1 matrix metalloproteinase) to invadopodia. It contains an N-terminal Phox homology (PX) domain and four SH3 domains. This model characterizes the second SH3 domain of Tks4. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12076); members share this curated model.
