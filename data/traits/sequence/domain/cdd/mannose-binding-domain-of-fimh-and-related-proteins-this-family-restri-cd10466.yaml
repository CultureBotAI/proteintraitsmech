identifier: CDD:cd10466
label: "Mannose binding  domain of FimH and related proteins. This family, restricted to gammaproteobacteria, includes FimH, a mannose-specific adhesin of uropathogenic Escherichia coli strains. The domain appears to bind specifically to D-mannose and mediates cellular adhesion to mannosylated proteins, a prerequisite to colonization and subsequent invasion of epithelial tissues."
definition: >-
  Mannose binding domain of FimH and related proteins. This family, restricted to gammaproteobacteria, includes FimH, a mannose-specific adhesin of uropathogenic Escherichia coli strains. The domain appears to bind specifically to D-mannose and mediates cellular adhesion to mannosylated proteins, a prerequisite to colonization and subsequent invasion of epithelial tissues. — an NCBI CDD conserved domain (cd10466); members share this curated model.
