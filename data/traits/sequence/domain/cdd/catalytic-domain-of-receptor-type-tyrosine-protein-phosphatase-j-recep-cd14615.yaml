identifier: CDD:cd14615
label: "catalytic domain of receptor-type tyrosine-protein phosphatase J. Receptor-type tyrosine-protein phosphatase J (PTPRJ or R-PTP-J), also known as receptor-type tyrosine-protein phosphatase eta (R-PTP-eta) or density-enhanced phosphatase 1 (DEP-1) OR CD148, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRJ is a member of the R3 subfamily of receptor-type phosphotyrosine phosphatases (RPTP), characterized by a unique modular composition consisting of multiple extracellular fibronectin type III (FN3) repeats (eight in PTPRJ) and a single (most RPTP subtypes have two) cytoplasmic catalytic PTP domain. It is expressed in various cell types including epithelial, hematopoietic, and endothelial cells. It plays a role in cell adhesion, migration, proliferation and differentiation. It dephosphorylates or contributes to the dephosphorylation of various substrates including protein kinases such as FLT3, PDGFRB, MET, RET (variant MEN2A), VEGFR-2, LYN, SRC, MAPK1, MAPK3, and EGFR, as well as PIK3R1 and PIK3R2."
