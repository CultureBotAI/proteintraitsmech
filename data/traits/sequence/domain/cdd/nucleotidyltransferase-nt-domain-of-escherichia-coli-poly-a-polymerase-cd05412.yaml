identifier: CDD:cd05412
label: NT_EcPAP1_like
definition: >-
  Nucleotidyltransferase (NT) domain of Escherichia coli poly (A) polymerase I, class II, and related proteins. NT_EcPAP1_like: Escherichia coli poly (A) polymerase I (PAPI). This enzyme responsible for the majority of polyadenylation in E.coli. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Escherichia coli CCAase is related to this group but is not included as this enzyme lacks the N-terminal helix conserved in the remainder of the NT superfamily
