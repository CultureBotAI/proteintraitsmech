identifier: CDD:cd10992
label: RNAP_sig_32_B_C_rpoD_rpoS_hrdA_hrdD_hrdC
definition: >-
  RNAP sigma factor 32; alternative-sigma factors B and C; sigma factor encoding genes rpoD, rpOS, hrdA, hrdD, hrdC. Sigma B and C are alternative sigma factors which respond to environmental stress in Bacillus Subtilis and Mycobacterium tuberculosis, respectively. rpoS, rpoD, hrdA, hrdD, hrdC, are all genes which most likely encode sigma factors which are very similar to the Sig70 protein.Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs
