identifier: CDD:cd11508
label: "Na(+)- and Cl(-)-dependent GABA transporter 3; solute-binding domain. This family includes human GAT3 (hGAT3) a high-affinity transporter of gamma-aminobutyric acid (GABA). GABA is the main inhibitory neurotransmitter within the mammalian CNS. hGAT3 is encoded by the SLC6A11 gene, and is similar to mouse GAT4, and rat GAT3/GATB. GAT3 is expressed primarily in the glia of the brain, and is a potential drug target for antiepileptic drugs. This subgroup belongs to the solute carrier 6 (SLC6) transporter family"
definition: >-
  Na(+)- and Cl(-)-dependent GABA transporter 3; solute-binding domain. This family includes human GAT3 (hGAT3) a high-affinity transporter of gamma-aminobutyric acid (GABA). GABA is the main inhibitory neurotransmitter within the mammalian CNS. hGAT3 is encoded by the SLC6A11 gene, and is similar to mouse GAT4, and rat GAT3/GATB. GAT3 is expressed primarily in the glia of the brain, and is a potential drug target for antiepileptic drugs. This subgroup belongs to the solute carrier 6 (SLC6) transporter family — an NCBI CDD conserved domain (cd11508); members share this curated model.
