identifier: CDD:cd06178
label: "Uncharacterized Unc-93-like proteins of the Major Facilitator Superfamily of transporters. This subfamily consists of uncharacterized proteins, mainly from fungi and plants, with similarity to Caenorhabditis elegans uncoordinated protein 93 (also called putative potassium channel regulatory protein unc-93). Unc-93 acts as a regulatory subunit of a multi-subunit  potassium channel complex that may function in coordinating muscle contraction in C. elegans. The unc93-like subfamily belongs to the Unc-93 family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Uncharacterized Unc-93-like proteins of the Major Facilitator Superfamily of transporters. This subfamily consists of uncharacterized proteins, mainly from fungi and plants, with similarity to Caenorhabditis elegans uncoordinated protein 93 (also called putative potassium channel regulatory protein unc-93). Unc-93 acts as a regulatory subunit of a multi-subunit potassium channel complex that may function in coordinating muscle contraction in C. elegans. The unc93-like subfamily belongs to the Unc-93 family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd06178); members share this curated model.
