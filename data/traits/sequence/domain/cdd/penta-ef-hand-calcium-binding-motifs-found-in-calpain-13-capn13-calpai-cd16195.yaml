identifier: CDD:cd16195
label: "Penta-EF hand, calcium binding motifs, found in calpain-13 (CAPN13), calpain-14 (CAPN14), and similar proteins. CAPN13, also termed calcium-activated neutral proteinase 13 (CANP 13), a 63.6 kDa calpain large subunit that exhibits a restricted tissue distribution with low levels of expression detected only in human testis and lung. In calpain family, CAPN13 is most closely related to calpain-14 (CAPN14). CAPN14, also termed calcium-activated neutral proteinase 14 (CANP 14), is a 76.7 kDa calpain large subunit that is most highly expressed in the oesophagus. Its expression and calpain activity can be induced by IL-13. Both CAPN13 and CAPN14 contain a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain."
definition: >-
  Penta-EF hand, calcium binding motifs, found in calpain-13 (CAPN13), calpain-14 (CAPN14), and similar proteins. CAPN13, also termed calcium-activated neutral proteinase 13 (CANP 13), a 63.6 kDa calpain large subunit that exhibits a restricted tissue distribution with low levels of expression detected only in human testis and lung. In calpain family, CAPN13 is most closely related to calpain-14 (CAPN14). CAPN14, also termed calcium-activated neutral proteinase 14 (CANP 14), is a 76.7 kDa calpain large subunit that is most highly expressed in the oesophagus. Its expression and calpain activity can be induced by IL-13. Both CAPN13 and CAPN14 contain a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. — an NCBI CDD conserved domain (cd16195); members share this curated model.
