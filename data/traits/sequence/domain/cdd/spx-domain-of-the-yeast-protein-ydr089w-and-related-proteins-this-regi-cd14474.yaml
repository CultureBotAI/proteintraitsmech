identifier: CDD:cd14474
label: "SPX domain of the yeast protein YDR089W and related proteins. This region has been named the SPX domain after (Syg1, Pho81 and XPR1). The domain is found at the amino terminus of a variety of proteins. The uncharacterized yeast protein YDR089W has not been shown to be involved in phosphate homeostasis, in contrast to most of the other SPX-domain containing proteins."
definition: >-
  SPX domain of the yeast protein YDR089W and related proteins. This region has been named the SPX domain after (Syg1, Pho81 and XPR1). The domain is found at the amino terminus of a variety of proteins. The uncharacterized yeast protein YDR089W has not been shown to be involved in phosphate homeostasis, in contrast to most of the other SPX-domain containing proteins. — an NCBI CDD conserved domain (cd14474); members share this curated model.
