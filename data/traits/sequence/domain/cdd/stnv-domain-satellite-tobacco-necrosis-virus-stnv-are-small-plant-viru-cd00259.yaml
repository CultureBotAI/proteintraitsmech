identifier: CDD:cd00259
label: "STNV domain; satellite tobacco necrosis virus (STNV) are small plant viruses which are completely dependent on the presence of a specific helper virus, TNV, for their replication;  60 identical subunits, this domain is one of them; form an icosahedral shell around a single RNA molecule. Half of the RNA codes for the coat protein with the other half being non-coding. The STNV domain has a \"Swiss roll\" Greek key topology with its two 4-stranded antiparallel beta sheets"
definition: >-
  STNV domain; satellite tobacco necrosis virus (STNV) are small plant viruses which are completely dependent on the presence of a specific helper virus, TNV, for their replication; 60 identical subunits, this domain is one of them; form an icosahedral shell around a single RNA molecule. Half of the RNA codes for the coat protein with the other half being non-coding. The STNV domain has a "Swiss roll" Greek key topology with its two 4-stranded antiparallel beta sheets — an NCBI CDD conserved domain (cd00259); members share this curated model.
