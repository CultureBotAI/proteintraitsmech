identifier: CDD:cd23315
label: "FGF domain, beta-trefoil fold, found in fibroblast growth factor 3 (FGF3) and similar proteins. FGF3, also called heparin-binding growth factor 3 (HBGF3), or proto-oncogene Int-2, plays an important role in the regulation of embryonic development, cell proliferation, and cell differentiation. It is required for normal ear development. FGF3 interacts with fibroblast growth factor receptors, FGFR1 and FGFR2. Affinity between FGFs and their receptors is increased by heparan sulfate glycosaminoglycans that function as coreceptors. FGF3 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
