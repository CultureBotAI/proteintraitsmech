identifier: CDD:cd04792
label: "Cyclases involved in the biosynthesis of class II lantibiotics, and similar proteins. LanM-like proteins. LanM is a bifunctional enzyme, involved in the synthesis of class II lantibiotics. It is responsible for both the dehydration and the cyclization of the precursor-peptide during lantibiotic synthesis. The C-terminal domain shows similarity to LanC, the cyclase component of the lan operon, but the N terminus seems to be unrelated to the dehydratase, LanB."
definition: >-
  Cyclases involved in the biosynthesis of class II lantibiotics, and similar proteins. LanM-like proteins. LanM is a bifunctional enzyme, involved in the synthesis of class II lantibiotics. It is responsible for both the dehydration and the cyclization of the precursor-peptide during lantibiotic synthesis. The C-terminal domain shows similarity to LanC, the cyclase component of the lan operon, but the N terminus seems to be unrelated to the dehydratase, LanB. — an NCBI CDD conserved domain (cd04792); members share this curated model.
