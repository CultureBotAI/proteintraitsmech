identifier: CDD:cd15526
label: "PHD finger 1 found in monocytic leukemia zinc-finger protein (MOZ), its factor (MORF), and d4 gene family proteins. MOZ is a MYST-type histone acetyltransferase (HAT) that functions as a coactivator for acute myeloid leukemia 1 protein (AML1)- and p53-dependent transcription. It possesses intrinsic HAT activity and to acetylate both itself and lysine (K) residues on histone H2B, histone H3 (K14) and histone H4 (K5, K8, K12 and K16) in vitro and H3K9 in vivo. MOZ-related factor (MORF) is a ubiquitously expressed transcriptional regulator with intrinsic HAT activity. It can interact with the Runt-domain transcription factor Runx2 and form a tetrameric complex with BRPFs, ING5, and EAF6. Both MOZ and MORF are catalytic subunits of HAT complexes that are required for normal developmental programs, such as hematopoiesis, neurogenesis, and skeletogenesis, and are implicated in human leukemias. MOZ is also the catalytic subunit of a tetrameric inhibitor of growth 5 (ING5) complex, which specifically acetylates nucleosomal histone H3K14. Moreover, MOZ and MORF are involved in regulating transcriptional activation mediated by Runx2 (or Cbfa1), a Runt-domain transcription factor known to play important roles in T cell lymphoma genesis and bone development, and its homologs. This family also includes three members of the d4 gene family, DPF1 (neuro-d4), DPF2 (ubi-d4/Requiem), and DPF3 (cer-d4), which function as transcription factors and are involved in transcriptional regulation of genes via changing the condensed/decondensed state of chromatin in nucleus. DPF2 is ubiquitously expressed and it acts as a transcription factor that may participate in developmentally programmed cell death. DPF1 and DPF3 are expressed predominantly in neural tissues, and they may be involved in the transcription regulation of neuro specific gene clusters. All family members contain two plant homeodomain (PHD) fingers. This model corresponds to the first PHD finger."
definition: >-
  PHD finger 1 found in monocytic leukemia zinc-finger protein (MOZ), its factor (MORF), and d4 gene family proteins. MOZ is a MYST-type histone acetyltransferase (HAT) that functions as a coactivator for acute myeloid leukemia 1 protein (AML1)- and p53-dependent transcription. It possesses intrinsic HAT activity and to acetylate both itself and lysine (K) residues on histone H2B, histone H3 (K14) and histone H4 (K5, K8, K12 and K16) in vitro and H3K9 in vivo. MOZ-related factor (MORF) is a ubiquitously expressed transcriptional regulator with intrinsic HAT activity. It can interact with the Runt-domain transcription factor Runx2 and form a tetrameric complex with BRPFs, ING5, and EAF6. Both MOZ and MORF are catalytic subunits of HAT complexes that are required for normal developmental programs, such as hematopoiesis, neurogenesis, and skeletogenesis, and are implicated in human leukemias. MOZ is also the catalytic subunit of a tetrameric inhibitor of growth 5 (ING5) complex, which specifically acetylates nucleosomal histone H3K14. Moreover, MOZ and MORF are involved in regulating transcriptional activation mediated by Runx2 (or Cbfa1), a Runt-domain transcription factor known to play important roles in T cell lymphoma genesis and bone development, and its homologs. This family also includes three members of the d4 gene family, DPF1 (neuro-d4), DPF2 (ubi-d4/Requiem), and DPF3 (cer-d4), which function as transcription factors and are involved in transcriptional regulation of genes via changing the condensed/decondensed state of chromatin in nucleus. DPF2 is ubiquitously expressed and it acts as a transcription factor that may participate in developmentally programmed cell death. DPF1 and DPF3 are expressed predominantly in neural tissues, and they may be involved in the transcription regulation of neuro specific gene clusters. All family members contain two plant homeodomain (PHD) fingers. This model corresponds to the first PHD finger. — an NCBI CDD conserved domain (cd15526); members share this curated model.
