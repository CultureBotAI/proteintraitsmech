identifier: CDD:cd20079
label: "XPF-like nuclease domain of DNA excision repair protein ERCC1. ERCC1 is a non-catalytic component of a structure-specific DNA repair endonuclease responsible for the 5'-incision during DNA repair. In conjunction with SLX4, ERCC1 is responsible for the first step in the repair of interstrand cross-links (ICL), as well as for homology-directed repair (HDR) of DNA double-strand breaks. ERCC1 participates in the processing of anaphase bridge-generating DNA structures, which consist in incompletely processed DNA lesions arising during S or G2 phase, and can result in cytokinesis failure. ERCC1 also plays a critical role in targeting the XPF-ERCC1 complex to DNA. XPF-ERRC1 and its yeast homolog Rad1-Rad10 play key roles in the excision of DNA lesions and are required for certain types of homologous recombination events and for the repair of DNA cross-links. The critical motif, DX(n)ERKX(3)D, for endonuclease activity is absent in the nuclease domain of ERCC1."
definition: >-
  XPF-like nuclease domain of DNA excision repair protein ERCC1. ERCC1 is a non-catalytic component of a structure-specific DNA repair endonuclease responsible for the 5'-incision during DNA repair. In conjunction with SLX4, ERCC1 is responsible for the first step in the repair of interstrand cross-links (ICL), as well as for homology-directed repair (HDR) of DNA double-strand breaks. ERCC1 participates in the processing of anaphase bridge-generating DNA structures, which consist in incompletely processed DNA lesions arising during S or G2 phase, and can result in cytokinesis failure. ERCC1 also plays a critical role in targeting the XPF-ERCC1 complex to DNA. XPF-ERRC1 and its yeast homolog Rad1-Rad10 play key roles in the excision of DNA lesions and are required for certain types of homologous recombination events and for the repair of DNA cross-links. The critical motif, DX(n)ERKX(3)D, for endonuclease activity is absent in the nuclease domain of ERCC1. — an NCBI CDD conserved domain (cd20079); members share this curated model.
