identifier: CDD:cd22991
label: "Trypanosoma brucei mitochondrial large subunit assembly factor 23 (mt-LAF23), and related proteins. mt-LAF23 is a Trypanosoma brucei mitochondrial large subunit (mt-LSU) assembly factor (mt-LAF) that may play a role in stabilizing partially mature 12S ribosomal RNA (rRNA) during the assembly process of the mt-LSU. Mitochondrial ribosomes (mitoribosomes) are ribonucleoprotein complexes and consist of a large subunit (mt-LSU) and a small subunit (mt-SSU). They differ markedly in composition and architecture from their bacterial counterparts and between different eukaryotic lineages, and their biogenesis involves exchange of assembly factors by ribosomal proteins. An investigation of native assembly intermediates of the mt-LSU from T. brucei has identified 28 assembly factors, some of which are homologous to bacterial and eukaryotic ribosome assembly factors. mt-LAF23 is part of a cluster of nine assembly factors identified as specific to an assembly intermediate referred to as state A, and which stabilized the 12S rRNA in an immature conformation. Mitochondrial biogenesis is biomedically important since mutations in mitoribosomal proteins, rRNAs and assembly factors have been linked to a heterogeneous group of human multisystemic oxidative phosphorylation (OXPHOS) diseases, and cancer development and progression."
definition: >-
  Trypanosoma brucei mitochondrial large subunit assembly factor 23 (mt-LAF23), and related proteins. mt-LAF23 is a Trypanosoma brucei mitochondrial large subunit (mt-LSU) assembly factor (mt-LAF) that may play a role in stabilizing partially mature 12S ribosomal RNA (rRNA) during the assembly process of the mt-LSU. Mitochondrial ribosomes (mitoribosomes) are ribonucleoprotein complexes and consist of a large subunit (mt-LSU) and a small subunit (mt-SSU). They differ markedly in composition and architecture from their bacterial counterparts and between different eukaryotic lineages, and their biogenesis involves exchange of assembly factors by ribosomal proteins. An investigation of native assembly intermediates of the mt-LSU from T. brucei has identified 28 assembly factors, some of which are homologous to bacterial and eukaryotic ribosome assembly factors. mt-LAF23 is part of a cluster of nine assembly factors identified as specific to an assembly intermediate referred to as state A, and which stabilized the 12S rRNA in an immature conformation. Mitochondrial biogenesis is biomedically important since mutations in mitoribosomal proteins, rRNAs and assembly factors have been linked to a heterogeneous group of human multisystemic oxidative phosphorylation (OXPHOS) diseases, and cancer development and progression. — an NCBI CDD conserved domain (cd22991); members share this curated model.
