identifier: CDD:cd07913
label: "Proline dehydrogenase, catalytic TIM barrel domain. Proline dehydrogenase (PRODH) is a flavoenzyme that catalyzes the first step of proline catabolism, the oxidation of proline to pyrroline-5-carboxylate (P5C).  P5C is hydrolyzed nonenzymatically to glutamate semialdehyde and P5C dehydrogenase (P5CDH) completes the transformation of proline to glutamate by catalyzing the oxidation of glutamate semialdehyde.  PRODH and P5CDH are separate enzymes in eukaryotes and in some bacteria, such as Thermus thermophilus, but they are fused into a bifunctional enzyme called proline utilization A (PutA) in other bacteria.  The PRODH domain is a distorted TIM barrel with an active site formed by residues from the loops between the alternating strands and helices of the barrel.  The PRODH domain binds the FAD (flavin adenine dinucleotide) cofactor which is required for its activity.  Human PRODH contributes to p53-mediated apoptosis by serving as a superoxide generator, and mutations in the PRODH gene have been linked to increased susceptibility to schizophrenia."
definition: >-
  Proline dehydrogenase, catalytic TIM barrel domain. Proline dehydrogenase (PRODH) is a flavoenzyme that catalyzes the first step of proline catabolism, the oxidation of proline to pyrroline-5-carboxylate (P5C). P5C is hydrolyzed nonenzymatically to glutamate semialdehyde and P5C dehydrogenase (P5CDH) completes the transformation of proline to glutamate by catalyzing the oxidation of glutamate semialdehyde. PRODH and P5CDH are separate enzymes in eukaryotes and in some bacteria, such as Thermus thermophilus, but they are fused into a bifunctional enzyme called proline utilization A (PutA) in other bacteria. The PRODH domain is a distorted TIM barrel with an active site formed by residues from the loops between the alternating strands and helices of the barrel. The PRODH domain binds the FAD (flavin adenine dinucleotide) cofactor which is required for its activity. Human PRODH contributes to p53-mediated apoptosis by serving as a superoxide generator, and mutations in the PRODH gene have been linked to increased susceptibility to schizophrenia. — an NCBI CDD conserved domain (cd07913); members share this curated model.
