  Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Rho-associated coiled-coil containing protein kinase. ROCK is also referred to as Rho-associated kinase or simply as Rho kinase. It is a serine/threonine protein kinase that is activated via interaction with Rho GTPases and is involved in many cellular functions including contraction, adhesion, migration, motility, proliferation, and apoptosis. ROCKs are the best-described effectors of RhoA. There are two isoforms, ROCK1 and ROCK2, which may be functionally redundant in some systems, but exhibit different tissue distributions. Both isoforms are ubiquitously expressed in most tissues, but ROCK2 is more prominent in brain and skeletal muscle while ROCK1 is more pronounced in the liver, testes, and kidney. Studies in knockout mice result in different phenotypes, suggesting that the two isoforms do not compensate for each other during embryonic development. ROCK contains an N-terminal extension, a catalytic kinase domain, and a long C-terminal extension, which contains a Rho-binding HR1 domain and a pleckstrin homology (PH) domain. ROCK is auto-inhibited by HR1 and PH domains interacting with the catalytic domain. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family. — an NCBI CDD conserved domain (cd11626); members share this curated model.
