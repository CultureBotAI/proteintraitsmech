identifier: CDD:cd10220
label: "nucleotide-binding domain (NBD) of actin-related protein2 (Arp2) and similar proteins. Arp2, also called actin-like protein 2, is the ATP-binding component of the Arp2/3 complex, a multiprotein complex that mediates actin polymerization upon stimulation by nucleation-promoting factor (NPF). The Arp2/3 complex is comprised of 7 proteins (Arp2, Arp3, and five conserved proteins, ARPC1-5). It generates cytoplasmic branched filaments networks, by promoting nucleation of actin filaments as 70 degrees branches on the side of older filaments. It is activated, by simultaneously binding to a pre-existing filament and a nucleation promoting factor plus an actin monomer. Daughter branches subsequently detach/debranch from the mother filament. Its Arp2 and Arp3 subunits must be loaded with ATP for it to initiate the assembly of branched actin filaments. ATP hydrolysis may be required for branch initiation or debranching. The Arp2/3 complex is also found in the nucleus where it plays a role in promoting de novo actin polymerization and in RNA polymerase II-dependent transcription. This may in part be through regulating nuclear actin polymerization in a way like its function in the cytoplasm. Human Arp2 is encoded by the ACTR2 gene."
definition: >-
  nucleotide-binding domain (NBD) of actin-related protein2 (Arp2) and similar proteins. Arp2, also called actin-like protein 2, is the ATP-binding component of the Arp2/3 complex, a multiprotein complex that mediates actin polymerization upon stimulation by nucleation-promoting factor (NPF). The Arp2/3 complex is comprised of 7 proteins (Arp2, Arp3, and five conserved proteins, ARPC1-5). It generates cytoplasmic branched filaments networks, by promoting nucleation of actin filaments as 70 degrees branches on the side of older filaments. It is activated, by simultaneously binding to a pre-existing filament and a nucleation promoting factor plus an actin monomer. Daughter branches subsequently detach/debranch from the mother filament. Its Arp2 and Arp3 subunits must be loaded with ATP for it to initiate the assembly of branched actin filaments. ATP hydrolysis may be required for branch initiation or debranching. The Arp2/3 complex is also found in the nucleus where it plays a role in promoting de novo actin polymerization and in RNA polymerase II-dependent transcription. This may in part be through regulating nuclear actin polymerization in a way like its function in the cytoplasm. Human Arp2 is encoded by the ACTR2 gene. — an NCBI CDD conserved domain (cd10220); members share this curated model.
