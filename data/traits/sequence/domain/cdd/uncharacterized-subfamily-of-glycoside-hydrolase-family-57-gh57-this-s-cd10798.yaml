identifier: CDD:cd10798
label: "Uncharacterized subfamily of  glycoside hydrolase family 57 (GH57). This subfamily of uncharacterized bacterial proteins, shows high sequence homology to glycoside hydrolase family 57 (GH57). Glycoside hydrolase family 57(GH57) is a chiefly prokaryotic family with the majority of thermostable enzymes coming from extremophiles (many of these are archaeal hyperthermophiles), which exhibit the enzyme specificities of alpha-amylase (EC 3.2.1.1), 4-alpha-glucanotransferase (EC 2.4.1.25), amylopullulanase (EC 3.2.1.1/41), and alpha-galactosidase (EC 3.2.1.22)."
definition: >-
  Uncharacterized subfamily of glycoside hydrolase family 57 (GH57). This subfamily of uncharacterized bacterial proteins, shows high sequence homology to glycoside hydrolase family 57 (GH57). Glycoside hydrolase family 57(GH57) is a chiefly prokaryotic family with the majority of thermostable enzymes coming from extremophiles (many of these are archaeal hyperthermophiles), which exhibit the enzyme specificities of alpha-amylase (EC 3.2.1.1), 4-alpha-glucanotransferase (EC 2.4.1.25), amylopullulanase (EC 3.2.1.1/41), and alpha-galactosidase (EC 3.2.1.22). — an NCBI CDD conserved domain (cd10798); members share this curated model.
