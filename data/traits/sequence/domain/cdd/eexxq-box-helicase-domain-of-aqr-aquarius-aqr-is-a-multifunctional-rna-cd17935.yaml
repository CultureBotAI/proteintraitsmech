identifier: CDD:cd17935
label: "EEXXQ-box helicase domain of AQR. Aquarius (AQR) is a multifunctional RNA helicase that binds precursor-mRNA introns at a defined position and is part of a pentameric intron-binding complex (IBC). It is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  EEXXQ-box helicase domain of AQR. Aquarius (AQR) is a multifunctional RNA helicase that binds precursor-mRNA introns at a defined position and is part of a pentameric intron-binding complex (IBC). It is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17935); members share this curated model.
