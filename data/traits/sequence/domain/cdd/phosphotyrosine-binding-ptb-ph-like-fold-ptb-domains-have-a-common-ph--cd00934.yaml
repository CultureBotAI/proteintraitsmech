identifier: CDD:cd00934
label: "Phosphotyrosine-binding (PTB) PH-like fold. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to bind peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains."
definition: >-
  Phosphotyrosine-binding (PTB) PH-like fold. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to bind peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. — an NCBI CDD conserved domain (cd00934); members share this curated model.
