identifier: CDD:cd23645
label: "histone-fold domain found in Schizosaccharomyces pombe DNA polymerase epsilon subunit C (Dpb3) and similar proteins. Schizosaccharomyces pombe Dpb3 is an accessory component of the DNA polymerase epsilon (DNA polymerase II) that is a heterotetramer consisting of cdc20/Pol2, Dpb2, Dpb3, and Dpb4, and participates in chromosomal DNA replication. Dpb3 is required during synthesis of the leading and lagging DNA strands at the replication fork and binds at/or near replication origins and moves along DNA with the replication fork. It has 3'-5' proofreading exonuclease activity that correct errors arising during DNA replication. It is also involved in DNA synthesis during DNA repair. The Dpb3-Dpb4 dimer associates with histone deacetylases, chromatin remodelers, and histones and plays a crucial role in the inheritance of histone hypoacetylation and H3K9 methylation in heterochromatin. The Dpb3-Dpb4 dimer is also required for the recruitment of sir2 to heterochromatin."
definition: >-
  histone-fold domain found in Schizosaccharomyces pombe DNA polymerase epsilon subunit C (Dpb3) and similar proteins. Schizosaccharomyces pombe Dpb3 is an accessory component of the DNA polymerase epsilon (DNA polymerase II) that is a heterotetramer consisting of cdc20/Pol2, Dpb2, Dpb3, and Dpb4, and participates in chromosomal DNA replication. Dpb3 is required during synthesis of the leading and lagging DNA strands at the replication fork and binds at/or near replication origins and moves along DNA with the replication fork. It has 3'-5' proofreading exonuclease activity that correct errors arising during DNA replication. It is also involved in DNA synthesis during DNA repair. The Dpb3-Dpb4 dimer associates with histone deacetylases, chromatin remodelers, and histones and plays a crucial role in the inheritance of histone hypoacetylation and H3K9 methylation in heterochromatin. The Dpb3-Dpb4 dimer is also required for the recruitment of sir2 to heterochromatin. — an NCBI CDD conserved domain (cd23645); members share this curated model.
