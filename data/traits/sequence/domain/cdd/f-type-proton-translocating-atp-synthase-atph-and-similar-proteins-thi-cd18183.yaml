label: "F-type proton-translocating ATP synthase (ATPH) and similar proteins. This family includes subunit c of chloroplast F-ATP synthase (F1Fo-ATP synthase), also known as ATP synthase F(o) sector subunit c (also called ATPase subunit III, F-type ATPase subunit c, or F-ATPase subunit c)and similar proteins. It is a proton-translocating subunit of the ATP synthase encoded by gene atpH."
