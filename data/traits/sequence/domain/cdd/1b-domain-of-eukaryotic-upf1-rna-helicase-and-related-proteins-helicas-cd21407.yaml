identifier: CDD:cd21407
label: "1B domain of eukaryotic UPF1 RNA helicase and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. UPF1 belongs to helicase superfamily 1 (SF1). It participates in nonsense-mediated mRNA decay (NMD), a pathway which degrades transcripts with premature termination codons. UPF1 is a multidomain protein; it includes an N-terminal Cys/His rich zinc-binding domain (CH/ZBD), a regulatory 1B domain, and a SF1 helicase core. The 1B domain is involved in nucleic acid substrate binding; the 1B domain of the related Equine arteritis virus (EAV) Nsp10 undergoes large conformational change upon substrate binding, and together with the 1A and 2A domains of the helicase core form a channel that accommodates the single stranded nucleic acids."
definition: >-
  1B domain of eukaryotic UPF1 RNA helicase and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. UPF1 belongs to helicase superfamily 1 (SF1). It participates in nonsense-mediated mRNA decay (NMD), a pathway which degrades transcripts with premature termination codons. UPF1 is a multidomain protein; it includes an N-terminal Cys/His rich zinc-binding domain (CH/ZBD), a regulatory 1B domain, and a SF1 helicase core. The 1B domain is involved in nucleic acid substrate binding; the 1B domain of the related Equine arteritis virus (EAV) Nsp10 undergoes large conformational change upon substrate binding, and together with the 1A and 2A domains of the helicase core form a channel that accommodates the single stranded nucleic acids. — an NCBI CDD conserved domain (cd21407); members share this curated model.
