identifier: CDD:cd23651
label: "cysteine-rich domain (CRD) found in Paramecium tetraurelia PiggyMac, and similar proteins. PiggyMac is a domesticated PiggyBac transposase involved in programmed genome rearrangements. It contains a core catalytic domain typical of PiggyBac-related transposases and a short cysteine-rich domain (CRD), flanked by N- and C-terminal extensions. This model corresponds to CRD that is essential for PiggyMac activity in vivo. PiggyMac CRD does not bind DNA; instead, it interacts weakly with the N-terminus of histone H3, whatever its lysine methylation state."
definition: >-
  cysteine-rich domain (CRD) found in Paramecium tetraurelia PiggyMac, and similar proteins. PiggyMac is a domesticated PiggyBac transposase involved in programmed genome rearrangements. It contains a core catalytic domain typical of PiggyBac-related transposases and a short cysteine-rich domain (CRD), flanked by N- and C-terminal extensions. This model corresponds to CRD that is essential for PiggyMac activity in vivo. PiggyMac CRD does not bind DNA; instead, it interacts weakly with the N-terminus of histone H3, whatever its lysine methylation state. — an NCBI CDD conserved domain (cd23651); members share this curated model.
