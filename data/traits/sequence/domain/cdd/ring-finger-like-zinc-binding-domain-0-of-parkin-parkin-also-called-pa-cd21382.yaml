identifier: CDD:cd21382
label: "RING finger-like zinc-binding domain 0 of parkin. Parkin, also called Parkinson juvenile disease protein 2, is a RBR (RING1-BRcat-Rcat)-type E3 ubiquitin-protein ligase that is associated with recessive early onset Parkinson's disease (PD), and exerts a protective effect against dopamine-induced alpha-synuclein-dependent cell toxicity. Mutations in the parkin gene cause autosomal recessive juvenile parkinsonism. Parkin functions within a multiprotein E3 ubiquitin ligase complex, catalyzing the covalent attachment of ubiquitin moieties onto substrate proteins. It is involved in regulating mitochondrial quality control. Its activation is a key regulatory event in the pathway to the clearance of depolarized or damaged mitochondria. Parkin contains an N-terminal ubiquitin-like domain, an acid linker, a RING finger-like domain 0 (RING0), and a C-terminal RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. This model represents RING0 of parkin."
definition: >-
  RING finger-like zinc-binding domain 0 of parkin. Parkin, also called Parkinson juvenile disease protein 2, is a RBR (RING1-BRcat-Rcat)-type E3 ubiquitin-protein ligase that is associated with recessive early onset Parkinson's disease (PD), and exerts a protective effect against dopamine-induced alpha-synuclein-dependent cell toxicity. Mutations in the parkin gene cause autosomal recessive juvenile parkinsonism. Parkin functions within a multiprotein E3 ubiquitin ligase complex, catalyzing the covalent attachment of ubiquitin moieties onto substrate proteins. It is involved in regulating mitochondrial quality control. Its activation is a key regulatory event in the pathway to the clearance of depolarized or damaged mitochondria. Parkin contains an N-terminal ubiquitin-like domain, an acid linker, a RING finger-like domain 0 (RING0), and a C-terminal RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. This model represents RING0 of parkin. — an NCBI CDD conserved domain (cd21382); members share this curated model.
