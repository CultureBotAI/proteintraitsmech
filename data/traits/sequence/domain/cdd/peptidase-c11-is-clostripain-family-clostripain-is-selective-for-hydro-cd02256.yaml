identifier: CDD:cd02256
label: "Peptidase-C11 is Clostripain family.Clostripain is selective for hydrolysis of arginyl bonds. It requires calcium ions for activity, as well as a reducing environment.  Molecular structure Clostripain is synthesized as a proprotein, and activation requires loss of a 23-residue propeptide and autolytic removal of an internal nonapeptide to produce a heterodimer consisting of a 131-residue light chain and a 336-residue heavy chain that contains the residues of the catalytic dyad. The active site sequence motif -HG-(Xaa)n-AC- conserved in family C11 places it in clan CD . No tertiary structure is available for clostripain at the time of writing."
definition: >-
  Peptidase-C11 is Clostripain family.Clostripain is selective for hydrolysis of arginyl bonds. It requires calcium ions for activity, as well as a reducing environment. Molecular structure Clostripain is synthesized as a proprotein, and activation requires loss of a 23-residue propeptide and autolytic removal of an internal nonapeptide to produce a heterodimer consisting of a 131-residue light chain and a 336-residue heavy chain that contains the residues of the catalytic dyad. The active site sequence motif -HG-(Xaa)n-AC- conserved in family C11 places it in clan CD . No tertiary structure is available for clostripain at the time of writing. — an NCBI CDD conserved domain (cd02256); members share this curated model.
