identifier: CDD:cd23267
label: "C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium neurotoxin family. The Clostridium neurotoxin (CNT) family is composed of tetanus neurotoxins (TeNT) and seven well-established serotypes (A-G) of botulinum neurotoxin (BoNT), which cause the diseases tetanus and botulism respectively. A new toxin serotype, BoNT/X, was recently identified. BoNTs are the primary virulence factors and vaccine components against botulism. They have been exploited as cosmetics and muscle-disorder treatment medicines for decades, are well known for their extreme neurotoxicity to humans. At motor neurons, BoNTs cleave neuronal soluble N-ethylmaleimide-sensitive-factor attachment protein receptor (SNARE) proteins that inhibits synaptic vesicle (SV) exocytosis, resulting in flaccid paralysis, whereas TeNT is subjected to retrograde transport into inhibitory neurons and blocks release of glycine and gamma-aminobutyric acid, which results in spastic paralysis. Uptake of BoNT/A, B, E, F, and G requires a dual interaction with complex polysialylated gangliosides found on neural tissue and specific membrane-anchored proteins found in synaptic vesicles, such as synaptotagmin or SV2 (synaptic vesicle glycoprotein 2), whereas little is known about the cell entry mechanisms of the serotypes C and D. The family also includes Enterococcus botulinum-like toxin eBoNT/J and Paraclostridium bifermentans mosquitocidal protein 1 (PMP1). eBoNT/J might be a precursor of a toxin that binds to an unknown eukaryotic cell receptor(s) and be taken up into the host cell via the endocytic pathway. PMP1 is a clostridial-like neurotoxin that selectively targets anopheline mosquitoes. All family members comprise three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium neurotoxin family. The Clostridium neurotoxin (CNT) family is composed of tetanus neurotoxins (TeNT) and seven well-established serotypes (A-G) of botulinum neurotoxin (BoNT), which cause the diseases tetanus and botulism respectively. A new toxin serotype, BoNT/X, was recently identified. BoNTs are the primary virulence factors and vaccine components against botulism. They have been exploited as cosmetics and muscle-disorder treatment medicines for decades, are well known for their extreme neurotoxicity to humans. At motor neurons, BoNTs cleave neuronal soluble N-ethylmaleimide-sensitive-factor attachment protein receptor (SNARE) proteins that inhibits synaptic vesicle (SV) exocytosis, resulting in flaccid paralysis, whereas TeNT is subjected to retrograde transport into inhibitory neurons and blocks release of glycine and gamma-aminobutyric acid, which results in spastic paralysis. Uptake of BoNT/A, B, E, F, and G requires a dual interaction with complex polysialylated gangliosides found on neural tissue and specific membrane-anchored proteins found in synaptic vesicles, such as synaptotagmin or SV2 (synaptic vesicle glycoprotein 2), whereas little is known about the cell entry mechanisms of the serotypes C and D. The family also includes Enterococcus botulinum-like toxin eBoNT/J and Paraclostridium bifermentans mosquitocidal protein 1 (PMP1). eBoNT/J might be a precursor of a toxin that binds to an unknown eukaryotic cell receptor(s) and be taken up into the host cell via the endocytic pathway. PMP1 is a clostridial-like neurotoxin that selectively targets anopheline mosquitoes. All family members comprise three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23267); members share this curated model.
