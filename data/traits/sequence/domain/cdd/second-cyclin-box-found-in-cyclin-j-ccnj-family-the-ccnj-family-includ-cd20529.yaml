identifier: CDD:cd20529
label: "second cyclin box found in cyclin-J (CCNJ) family. The CCNJ family includes two cyclins, CCNJ and CCNJ-like. CCNJ may regulate the cell cycle or transcription. Members of this family contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in cyclin-J (CCNJ) family. The CCNJ family includes two cyclins, CCNJ and CCNJ-like. CCNJ may regulate the cell cycle or transcription. Members of this family contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20529); members share this curated model.
