identifier: CDD:cd07915
label: "Proline utilization A (PutA), N-terminal proline dehydrogenase domain. PutA (Proline utilization A) is a peripheral membrane-associated bifunctional enzyme, found primarily in bacteria, that converts proline to glutamate in a multistep reaction.  PutA has proline dehydrogenase (PRODH) and pyrroline-5-carboxylate dehydrogenase (P5CDH) domains located at the N- and C-termini, respectively.  The PRODH domain catalyzes the first step of proline catabolism, the oxidation of proline to pyrroline-5-carboxylate (P5C).  P5C is hydrolyzed nonenzymatically to glutamate semialdehyde and P5C dehydrogenase (P5CDH) completes the transformation of proline to glutamate by catalyzing the oxidation of glutamate semialdehyde.  The PRODH domain is a distorted TIM barrel with an active site formed by residues from the loops between the alternating strands and helices of the barrel.  The PRODH domain binds the FAD (flavin adenine dinucleotide) cofactor which is required for its activity.  In some bacteria, such as Escherichia coli, Salmonella typhimurium, and Pseudomonas putida, PutA is also a transcriptional repressor of the putA and putP genes with an additional N-terminal ribbon-helix-helix (RHH) DNA-binding domain."
definition: >-
  Proline utilization A (PutA), N-terminal proline dehydrogenase domain. PutA (Proline utilization A) is a peripheral membrane-associated bifunctional enzyme, found primarily in bacteria, that converts proline to glutamate in a multistep reaction. PutA has proline dehydrogenase (PRODH) and pyrroline-5-carboxylate dehydrogenase (P5CDH) domains located at the N- and C-termini, respectively. The PRODH domain catalyzes the first step of proline catabolism, the oxidation of proline to pyrroline-5-carboxylate (P5C). P5C is hydrolyzed nonenzymatically to glutamate semialdehyde and P5C dehydrogenase (P5CDH) completes the transformation of proline to glutamate by catalyzing the oxidation of glutamate semialdehyde. The PRODH domain is a distorted TIM barrel with an active site formed by residues from the loops between the alternating strands and helices of the barrel. The PRODH domain binds the FAD (flavin adenine dinucleotide) cofactor which is required for its activity. In some bacteria, such as Escherichia coli, Salmonella typhimurium, and Pseudomonas putida, PutA is also a transcriptional repressor of the putA and putP genes with an additional N-terminal ribbon-helix-helix (RHH) DNA-binding domain. — an NCBI CDD conserved domain (cd07915); members share this curated model.
