identifier: CDD:cd22672
label: "forkhead associated (FHA) domain found in checkpoint with forkhead and RING finger domains protein (CHFR). CHFR, also called RING finger protein 196 (RNF196), is a checkpoint protein that delays entry into mitosis in response to stress. It functions as an E3 ubiquitin ligase that ubiquitinates and degrades its target proteins, such as Aurora-A, Plk1, Kif22 and PARP-1, which are critical for proper mitotic transitions. It also plays an important role in cell cycle progression and tumor suppression and is negatively regulated by SUMOylation-mediated proteasomal ubiquitylation. Moreover, CHFR is involved in the early stage of the DNA damage response, which mediates the crosstalk between ubiquitination and poly-ADP-ribosylation. CHFR contains a fork head associated-(FHA) domain and a RING-HC finger. The CHFR FHA domain has been crystallized as a segment-swapped dimer. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in checkpoint with forkhead and RING finger domains protein (CHFR). CHFR, also called RING finger protein 196 (RNF196), is a checkpoint protein that delays entry into mitosis in response to stress. It functions as an E3 ubiquitin ligase that ubiquitinates and degrades its target proteins, such as Aurora-A, Plk1, Kif22 and PARP-1, which are critical for proper mitotic transitions. It also plays an important role in cell cycle progression and tumor suppression and is negatively regulated by SUMOylation-mediated proteasomal ubiquitylation. Moreover, CHFR is involved in the early stage of the DNA damage response, which mediates the crosstalk between ubiquitination and poly-ADP-ribosylation. CHFR contains a fork head associated-(FHA) domain and a RING-HC finger. The CHFR FHA domain has been crystallized as a segment-swapped dimer. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22672); members share this curated model.
