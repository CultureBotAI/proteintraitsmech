identifier: CDD:cd10206
label: "nucleotide-binding domain (NBD) of the actin-related protein 8 (Arp8)-like subfamily. The Arp8-like family includes Arp8, also called actin-like protein 8, from vertebrates and fungi. Human Arp8 is encoded by the ACTR8 gene and is also known as INO80 complex subunit N. It plays an important role in the functional organization of mitotic chromosomes. Arp8 exhibits low basal ATPase activity, and is unable to polymerize. It is probably a core component of the chromatin remodeling INO80 complex which is involved in transcriptional regulation, DNA replication, and probably DNA repair. it is required for the recruitment of INO80 (and probably the INO80 complex) to sites of DNA damage. Arp8 strongly prefers nucleosomes and H3-H4 tetramers over H2A-H2B dimers, suggesting it may act as a nucleosome recognition module within the complex. This subfamily also contains Arabidopsis thaliana Arp9."
definition: >-
  nucleotide-binding domain (NBD) of the actin-related protein 8 (Arp8)-like subfamily. The Arp8-like family includes Arp8, also called actin-like protein 8, from vertebrates and fungi. Human Arp8 is encoded by the ACTR8 gene and is also known as INO80 complex subunit N. It plays an important role in the functional organization of mitotic chromosomes. Arp8 exhibits low basal ATPase activity, and is unable to polymerize. It is probably a core component of the chromatin remodeling INO80 complex which is involved in transcriptional regulation, DNA replication, and probably DNA repair. it is required for the recruitment of INO80 (and probably the INO80 complex) to sites of DNA damage. Arp8 strongly prefers nucleosomes and H3-H4 tetramers over H2A-H2B dimers, suggesting it may act as a nucleosome recognition module within the complex. This subfamily also contains Arabidopsis thaliana Arp9. — an NCBI CDD conserved domain (cd10206); members share this curated model.
