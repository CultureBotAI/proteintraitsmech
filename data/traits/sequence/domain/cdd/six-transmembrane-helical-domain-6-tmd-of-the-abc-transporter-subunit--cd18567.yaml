identifier: CDD:cd18567
label: "Six-transmembrane helical domain (6-TMD) of the ABC transporter subunit of the type 1 secretion systems, CvaB and RaxB, and similar proteins. This group represents the six-transmembrane helical domain (6-TMD) of the peptidase-containing ABC transporter subunit of T1SS (Type 1 secretion systems), such as Escherichia coli colicin V secretion/processing ATP-binding protein CvaB and putative ABC transporter RaxB. These ABC-transporter proteins carry a proteolytic peptidase domain in their N-termini, termed as C39, which cleaves a double glycine (GG) motif-containing signal peptide from substrates before secretion. RaxB is part of the T1SS RaxABC, which is responsible for the type 1-dependent secretion of the bacterial quorum-sensing molecule AvrXa21. Both CvaB and RaxB belong to a subgroup of T1SS ABC transporters that contain a C39 peptidase domain. T1SS are found in pathogenic Gram-negative bacteria to export proteins (often proteases) across both inner and outer membranes to the extracellular medium."
definition: >-
  Six-transmembrane helical domain (6-TMD) of the ABC transporter subunit of the type 1 secretion systems, CvaB and RaxB, and similar proteins. This group represents the six-transmembrane helical domain (6-TMD) of the peptidase-containing ABC transporter subunit of T1SS (Type 1 secretion systems), such as Escherichia coli colicin V secretion/processing ATP-binding protein CvaB and putative ABC transporter RaxB. These ABC-transporter proteins carry a proteolytic peptidase domain in their N-termini, termed as C39, which cleaves a double glycine (GG) motif-containing signal peptide from substrates before secretion. RaxB is part of the T1SS RaxABC, which is responsible for the type 1-dependent secretion of the bacterial quorum-sensing molecule AvrXa21. Both CvaB and RaxB belong to a subgroup of T1SS ABC transporters that contain a C39 peptidase domain. T1SS are found in pathogenic Gram-negative bacteria to export proteins (often proteases) across both inner and outer membranes to the extracellular medium. — an NCBI CDD conserved domain (cd18567); members share this curated model.
