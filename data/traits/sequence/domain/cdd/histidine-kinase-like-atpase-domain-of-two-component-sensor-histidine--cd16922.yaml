identifier: CDD:cd16922
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases, many are hybrid sensor histidine kinases, similar to Escherichia coli EvgS, ArcB, TorS, BarA, RcsC. This family contains the histidine kinase-like ATPase (HATPase) domains of various two-component hybrid sensor histidine kinases (HKs), including the following Escherichia coli HKs: EvgS, a HK of the EvgS-EvgA two-component system (TCS) that confers acid resistance; ArcB, a HK of the ArcB-ArcA TCS that modulates the expression of numerous genes in response to respiratory growth conditions; TorS, a HK of the TorS-TorR TCS which is involved in the anaerobic utilization of trimethylamine-N-oxide; BarA, a HK of the BarA-UvrY TCS involved in the regulation of carbon metabolism; and RcsC, a HK of the RcsB-RcsC TCS which regulates the expression of the capsule operon and of the cell division gene ftsZ. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), with most having accessory sensor domain(s) such as GAF, PAS and CHASE; many are hybrid sensor histidine kinases as they also contain a REC signal receiver domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases, many are hybrid sensor histidine kinases, similar to Escherichia coli EvgS, ArcB, TorS, BarA, RcsC. This family contains the histidine kinase-like ATPase (HATPase) domains of various two-component hybrid sensor histidine kinases (HKs), including the following Escherichia coli HKs: EvgS, a HK of the EvgS-EvgA two-component system (TCS) that confers acid resistance; ArcB, a HK of the ArcB-ArcA TCS that modulates the expression of numerous genes in response to respiratory growth conditions; TorS, a HK of the TorS-TorR TCS which is involved in the anaerobic utilization of trimethylamine-N-oxide; BarA, a HK of the BarA-UvrY TCS involved in the regulation of carbon metabolism; and RcsC, a HK of the RcsB-RcsC TCS which regulates the expression of the capsule operon and of the cell division gene ftsZ. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), with most having accessory sensor domain(s) such as GAF, PAS and CHASE; many are hybrid sensor histidine kinases as they also contain a REC signal receiver domain. — an NCBI CDD conserved domain (cd16922); members share this curated model.
