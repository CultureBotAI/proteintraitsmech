identifier: CDD:cd19051
label: "transmembrane domain of Cys-loop neurotransmitter-gated ion channels, includes 5HT3, nAChR, and ZAC. This superfamily contains the transmembrane (TM) domain of cationic Cys-loop neurotransmitter-gated ion channels, which include nicotinic acetylcholine receptor (nAChR), serotonin 5-hydroxytryptamine receptor (5-HT3), and zinc-activated ligand-gated ion channel (ZAC) receptor. The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. The ligand-gated ion channels (LGICs) in this family are found across metazoans and have close homologs in bacteria. They are vital for communication throughout the nervous system. nAChR is a non-selective cation channel that is permeable to Na+ and K+, and some subunit combinations are also permeable to Ca2+. Na+ enters and K+ exits to allow net flow of positively charged ions inward. 5-HT3, a cation-selective channel, binds serotonin and is permeable to Na+, K+, and Ca2+. It mediates neuronal depolarization and excitation within the central and peripheral nervous systems. ZAC forms an ion channel gated by Zn2+, Cu2+, and H+ and is non-selectively permeable to monovalent cations. However, the role of ZAC in Zn2+, Cu2+, and H+ signaling require is as yet unknown."
definition: >-
  transmembrane domain of Cys-loop neurotransmitter-gated ion channels, includes 5HT3, nAChR, and ZAC. This superfamily contains the transmembrane (TM) domain of cationic Cys-loop neurotransmitter-gated ion channels, which include nicotinic acetylcholine receptor (nAChR), serotonin 5-hydroxytryptamine receptor (5-HT3), and zinc-activated ligand-gated ion channel (ZAC) receptor. The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. The ligand-gated ion channels (LGICs) in this family are found across metazoans and have close homologs in bacteria. They are vital for communication throughout the nervous system. nAChR is a non-selective cation channel that is permeable to Na+ and K+, and some subunit combinations are also permeable to Ca2+. Na+ enters and K+ exits to allow net flow of positively charged ions inward. 5-HT3, a cation-selective channel, binds serotonin and is permeable to Na+, K+, and Ca2+. It mediates neuronal depolarization and excitation within the central and peripheral nervous systems. ZAC forms an ion channel gated by Zn2+, Cu2+, and H+ and is non-selectively permeable to monovalent cations. However, the role of ZAC in Zn2+, Cu2+, and H+ signaling require is as yet unknown. — an NCBI CDD conserved domain (cd19051); members share this curated model.
