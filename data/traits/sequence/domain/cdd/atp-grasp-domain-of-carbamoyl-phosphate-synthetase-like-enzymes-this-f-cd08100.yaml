identifier: CDD:cd08100
label: ATP-G_CPS-like
definition: >-
  ATP-grasp domain of carbamoyl phosphate synthetase like enzymes. This family appears to have the sequence and structural similarity with the ATP-grasp domain. Enzymes related to ATP-grasp superfamily catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. Catalytic center requires the presence of one or more metal ions as a physiological cofactor. ATP-grasp superfamily members also share a conserved Mg-ATP-binding domain that is believed to undergo a conformational change on substrate binding. Carbamoyl phosphate synthetase family appears to be the closest homologue of this family
