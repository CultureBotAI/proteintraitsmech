identifier: CDD:cd16071
label: TNFSF_Eiger
definition: >-
  Tumor Necrosis Factor Superfamily ortholog Eiger (eda-like cell death trigger). This family includes Drosophila TNF ortholog Eiger (eda-like cell death trigger), where it is the sole fly ortholog of TNF. It binds its receptor Wengen, a type I transmembrane protein, which encodes a transmembrane protein with a TNFR homology domain in the extracellular region, and is required for Eiger-induced cell death. Two isoforms, Eiger-L and Eiger-S, have been reported. Overexpression of Eiger in imaginal discs can induce cell death through activation of the c-Jun N-terminal kinase (JNK) pathway. Eiger, specifically expressed in embryonic neurons and glia, is not involved in developmental neuronal apoptosis or in apoptotic cell clearance but is required for damage-induced apoptosis in the embryonic CNS through regulation of the pro-apoptotic gene head involution defective (hid) independently of the JNK pathway
