identifier: CDD:cd12675
label: "RNA recognition motif 2 (RRM2) found in yeast nucleolar protein 4 (Nop4p) and similar proteins. This subgroup corresponds to the RRM2 of Nop4p (also known as Nop77p), encoded by YPL043W from Saccharomyces cerevisiae. It is an essential nucleolar protein involved in processing and maturation of 27S pre-rRNA and biogenesis of 60S ribosomal subunits. Nop4p has four RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains)."
definition: >-
  RNA recognition motif 2 (RRM2) found in yeast nucleolar protein 4 (Nop4p) and similar proteins. This subgroup corresponds to the RRM2 of Nop4p (also known as Nop77p), encoded by YPL043W from Saccharomyces cerevisiae. It is an essential nucleolar protein involved in processing and maturation of 27S pre-rRNA and biogenesis of 60S ribosomal subunits. Nop4p has four RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). — an NCBI CDD conserved domain (cd12675); members share this curated model.
