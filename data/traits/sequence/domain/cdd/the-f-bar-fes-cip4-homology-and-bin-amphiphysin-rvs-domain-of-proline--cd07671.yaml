identifier: CDD:cd07671
label: "The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of Proline-Serine-Threonine Phosphatase-Interacting Protein 1. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Proline-Serine-Threonine Phosphatase-Interacting Protein 1 (PSTPIP1), also known as CD2 Binding Protein 1 (CD2BP1), is mainly expressed in hematopoietic cells. It is a binding partner of the cell surface receptor CD2 and PTP-PEST, a tyrosine phosphatase which functions in cell motility and Rac1 regulation. It also plays a role in the activation of the Wiskott-Aldrich syndrome protein (WASP), which couples actin rearrangement and T cell activation. Mutations in the gene encoding PSTPIP1 cause the autoinflammatory disorder known as PAPA (pyogenic sterile arthritis, pyoderma gangrenosum, and acne) syndrome. PSTPIP1 contains an N-terminal F-BAR domain, PEST motifs, and a C-terminal SH3 domain. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules."
definition: >-
  The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of Proline-Serine-Threonine Phosphatase-Interacting Protein 1. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Proline-Serine-Threonine Phosphatase-Interacting Protein 1 (PSTPIP1), also known as CD2 Binding Protein 1 (CD2BP1), is mainly expressed in hematopoietic cells. It is a binding partner of the cell surface receptor CD2 and PTP-PEST, a tyrosine phosphatase which functions in cell motility and Rac1 regulation. It also plays a role in the activation of the Wiskott-Aldrich syndrome protein (WASP), which couples actin rearrangement and T cell activation. Mutations in the gene encoding PSTPIP1 cause the autoinflammatory disorder known as PAPA (pyogenic sterile arthritis, pyoderma gangrenosum, and acne) syndrome. PSTPIP1 contains an N-terminal F-BAR domain, PEST motifs, and a C-terminal SH3 domain. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules. — an NCBI CDD conserved domain (cd07671); members share this curated model.
