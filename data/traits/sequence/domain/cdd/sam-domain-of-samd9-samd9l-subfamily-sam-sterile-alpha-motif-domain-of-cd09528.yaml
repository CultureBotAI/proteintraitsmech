identifier: CDD:cd09528
label: "SAM domain of Samd9/Samd9L subfamily. SAM (sterile alpha motif) domain of Samd9/Samd9L subfamily is a putative protein-protein interaction domain. SAM is a widespread domain in signaling proteins. Samd9 is a tumor suppressor gene. It is involved in death signaling of malignant glioblastoma. Samd9 suppression blocks cancer cell death induced by HVJ-E or IFN-beta treatment. Deleterious mutations in Samd9 lead to normophosphatemic familial tumoral calcinosis, a cutaneous disorder characterized by cutaneous calcification or ossification."
definition: >-
  SAM domain of Samd9/Samd9L subfamily. SAM (sterile alpha motif) domain of Samd9/Samd9L subfamily is a putative protein-protein interaction domain. SAM is a widespread domain in signaling proteins. Samd9 is a tumor suppressor gene. It is involved in death signaling of malignant glioblastoma. Samd9 suppression blocks cancer cell death induced by HVJ-E or IFN-beta treatment. Deleterious mutations in Samd9 lead to normophosphatemic familial tumoral calcinosis, a cutaneous disorder characterized by cutaneous calcification or ossification. — an NCBI CDD conserved domain (cd09528); members share this curated model.
