label: "transforming growth factor beta (TGF-beta) like domain found in the glial cell-line-derived neurotrophic factor (GDNF) family of ligands. GDNF family of ligands includes GDNF, Artemin, Neurturin, and Persephin. They plays an important role in the development and maintenance of the central and peripheral nervous system, renal morphogenesis, and spermatogenesis."
