identifier: CDD:cd19912
label: "second double-stranded RNA binding motif of interleukin enhancer-binding factor 3 (ILF3) and similar proteins. ILF3 (also known as double-stranded RNA-binding protein 76 (DRBP76), M-phase phosphoprotein 4 (MPP4), nuclear factor associated with dsRNA (NFAR), nuclear factor of activated T-cells 90 kDa (NF-AT-90), or translational control protein 80 (TCP80)) is an RNA-binding protein that plays an essential role in the biogenesis of circular RNAs (circRNAs) which are produced by back-splicing circularization of pre-mRNAs. ILF3 contains an N-terminal DZF domain and two double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  second double-stranded RNA binding motif of interleukin enhancer-binding factor 3 (ILF3) and similar proteins. ILF3 (also known as double-stranded RNA-binding protein 76 (DRBP76), M-phase phosphoprotein 4 (MPP4), nuclear factor associated with dsRNA (NFAR), nuclear factor of activated T-cells 90 kDa (NF-AT-90), or translational control protein 80 (TCP80)) is an RNA-binding protein that plays an essential role in the biogenesis of circular RNAs (circRNAs) which are produced by back-splicing circularization of pre-mRNAs. ILF3 contains an N-terminal DZF domain and two double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19912); members share this curated model.
