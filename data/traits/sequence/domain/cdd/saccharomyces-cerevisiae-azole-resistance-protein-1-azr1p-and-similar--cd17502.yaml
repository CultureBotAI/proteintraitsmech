identifier: CDD:cd17502
label: "Saccharomyces cerevisiae Azole resistance protein 1 (Azr1p), and similar multidrug resistance (MDR) transporters of the Major Facilitator Superfamily. This subfamily is composed of multidrug resistance (MDR) transporters including various Saccharomyces cerevisiae proteins such as azole resistance protein 1 (Azr1p), vacuolar basic amino acid transporter 1 (Vba1p), vacuolar basic amino acid transporter 5 (Vba5p), and Sge1p (also known as Nor1p, 10-N-nonyl acridine orange resistance protein, and crystal violet resistance protein). MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. This subfamily belongs to the Methylenomycin A resistance protein (also called MMR peptide) and similar multidrug resistance (MDR) transporters (MMR-like MDR transporter) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Saccharomyces cerevisiae Azole resistance protein 1 (Azr1p), and similar multidrug resistance (MDR) transporters of the Major Facilitator Superfamily. This subfamily is composed of multidrug resistance (MDR) transporters including various Saccharomyces cerevisiae proteins such as azole resistance protein 1 (Azr1p), vacuolar basic amino acid transporter 1 (Vba1p), vacuolar basic amino acid transporter 5 (Vba5p), and Sge1p (also known as Nor1p, 10-N-nonyl acridine orange resistance protein, and crystal violet resistance protein). MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. This subfamily belongs to the Methylenomycin A resistance protein (also called MMR peptide) and similar multidrug resistance (MDR) transporters (MMR-like MDR transporter) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17502); members share this curated model.
