identifier: CDD:cd22126
label: "F-box domain found in F-box/LRR-repeat protein 15 (FBXL15) and similar proteins. FBXL15, also called F-box only protein 37 (FBXO37), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of Smad ubiquitination regulatory factor 1 (SMURF1), thereby acting as a positive regulator of the BMP signaling pathway. It is required for dorsal/ventral pattern formation and bone mass maintenance. It also mediates ubiquitination of SMURF2 and WWP2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 15 (FBXL15) and similar proteins. FBXL15, also called F-box only protein 37 (FBXO37), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of Smad ubiquitination regulatory factor 1 (SMURF1), thereby acting as a positive regulator of the BMP signaling pathway. It is required for dorsal/ventral pattern formation and bone mass maintenance. It also mediates ubiquitination of SMURF2 and WWP2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22126); members share this curated model.
