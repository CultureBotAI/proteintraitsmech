identifier: CDD:cd23541
label: "extracellular domain (ECD) found in mouse Ly-6A like lymphocyte antigens and similar proteins. The family includes mouse Ly-6 lymphocyte antigens, such as Ly-6A/Ly-6E, Ly-6B, Ly-6C1/6C2, Ly-6F, and Ly-6I/Ly-6M. Ly-6A/Ly-6E (also called stem cell antigen 1/SCA-1, or T-cell-activating protein/TAP) and Ly-6C are involved in T-cell activation. Members in this family contain an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in mouse Ly-6A like lymphocyte antigens and similar proteins. The family includes mouse Ly-6 lymphocyte antigens, such as Ly-6A/Ly-6E, Ly-6B, Ly-6C1/6C2, Ly-6F, and Ly-6I/Ly-6M. Ly-6A/Ly-6E (also called stem cell antigen 1/SCA-1, or T-cell-activating protein/TAP) and Ly-6C are involved in T-cell activation. Members in this family contain an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23541); members share this curated model.
