identifier: CDD:cd10995
label: RNAP_Sigma_alt-G_F
definition: >-
  RNAP alternative sigma factors G and F. Both located in Bacillus subtilis, Sigma G and Sigma F are alternative sigma factors which have strikingly different functions within the organism. Sigma G is involved in the sporulation process while Sigma F is a flagellar sigma factor. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs
