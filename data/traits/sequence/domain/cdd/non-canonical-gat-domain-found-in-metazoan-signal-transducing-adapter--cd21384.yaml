identifier: CDD:cd21384
label: "non-canonical GAT domain found in metazoan signal transducing adapter molecules (STAMs), fungal vacuolar protein sorting-associated protein 27 (Vps27), and similar proteins. This family includes several components of the ESCRT-0 complex, including STAMs, hepatocyte growth factor-regulated tyrosine kinase substrate (Hrs), as well as vacuolar protein sorting-associated protein 27 (Vps27) and class E vacuolar protein-sorting machinery protein Hse1 from fungi. The ESCRT-0 complex binds ubiquitin and acts as a sorting machinery that recognizes ubiquitinated receptors and transfers them for further sequential lysosomal sorting/trafficking processes. Members in this family contain a non-canonical GAT (GGA and Tom1) domain consisting of two helices. By contrast, a canonical GAT domain is a monomeric three-helix bundle that bind to ubiquitin. Hrs together with STAM forms a Hrs/STAM core complex. Vps27, together with Hse1, forms a Vps27/Hse1 core complex. Those complexes consist of two intertwined non-canonical GAT domains, each consisting of two helices from one subunit, and one from the other subunit. The intertwined GAT heterodimer acts as a scaffold for binding of ubiquitinated cargo proteins and coordinating ubiquitination and deubiquitination reactions that regulate sorting."
definition: >-
  non-canonical GAT domain found in metazoan signal transducing adapter molecules (STAMs), fungal vacuolar protein sorting-associated protein 27 (Vps27), and similar proteins. This family includes several components of the ESCRT-0 complex, including STAMs, hepatocyte growth factor-regulated tyrosine kinase substrate (Hrs), as well as vacuolar protein sorting-associated protein 27 (Vps27) and class E vacuolar protein-sorting machinery protein Hse1 from fungi. The ESCRT-0 complex binds ubiquitin and acts as a sorting machinery that recognizes ubiquitinated receptors and transfers them for further sequential lysosomal sorting/trafficking processes. Members in this family contain a non-canonical GAT (GGA and Tom1) domain consisting of two helices. By contrast, a canonical GAT domain is a monomeric three-helix bundle that bind to ubiquitin. Hrs together with STAM forms a Hrs/STAM core complex. Vps27, together with Hse1, forms a Vps27/Hse1 core complex. Those complexes consist of two intertwined non-canonical GAT domains, each consisting of two helices from one subunit, and one from the other subunit. The intertwined GAT heterodimer acts as a scaffold for binding of ubiquitinated cargo proteins and coordinating ubiquitination and deubiquitination reactions that regulate sorting. — an NCBI CDD conserved domain (cd21384); members share this curated model.
