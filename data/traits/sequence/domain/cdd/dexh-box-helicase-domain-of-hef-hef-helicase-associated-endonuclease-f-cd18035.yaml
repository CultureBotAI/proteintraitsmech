identifier: CDD:cd18035
label: "DEXH-box helicase domain of Hef. Hef (helicase-associated endonuclease fork-structure) belongs to the XPF/MUS81/FANCM family of endonucleases and is involved in stalled replication fork repair. All archaea encode a protein of the XPF/MUS81/FANCM family of endonucleases. It exists in two forms: a long form, referred as Hef which consists of an N-terminal helicase fused to a C-terminal nuclease and is specific to euryarchaea and a short form, referred as XPF which lacks the helicase domain and is specific to crenarchaea and thaumarchaea. Hef has the unique feature of having both active helicase and nuclease domains. This domain configuration is highly similar with the human FANCM, a possible ortholog of archaeal Hef proteins. Hef is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of Hef. Hef (helicase-associated endonuclease fork-structure) belongs to the XPF/MUS81/FANCM family of endonucleases and is involved in stalled replication fork repair. All archaea encode a protein of the XPF/MUS81/FANCM family of endonucleases. It exists in two forms: a long form, referred as Hef which consists of an N-terminal helicase fused to a C-terminal nuclease and is specific to euryarchaea and a short form, referred as XPF which lacks the helicase domain and is specific to crenarchaea and thaumarchaea. Hef has the unique feature of having both active helicase and nuclease domains. This domain configuration is highly similar with the human FANCM, a possible ortholog of archaeal Hef proteins. Hef is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18035); members share this curated model.
