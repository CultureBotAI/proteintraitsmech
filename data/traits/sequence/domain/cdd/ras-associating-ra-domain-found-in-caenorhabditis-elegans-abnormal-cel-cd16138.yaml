identifier: CDD:cd16138
label: "Ras-associating (RA) domain found in Caenorhabditis elegans abnormal cell migration protein 10 (MIG-10) and similar proteins. MIG-10 is lamellipodin (Lpd) found in C. elegans. It stabilizes invading cell adhesion to basement membrane and is a negative transcriptional target of Evi-1 proto-oncogene, EGL-43, in C. elegans. It also shows netrin-independent functions and is a transcriptional target of FOS-1A, a transcription factor that promotes basement membrane breaching, during anchor cell invasion in C. elegans. MIG-10 is a member of MRL (Mig10/RIAM/Lpd) family of proteins that is involved in antero-posterior migration of embryonic neurons CAN (canalassociated neurons), ALM (anterior lateral microtubule cells) and HSN (hermaphrodite-specific neurons). MRL proteins share a common structural architecture, including a central structural unit consisting of an RA domain and a pleckstrin homology (PH) domain, an upstream coiled-coil region, and a number of polyproline motifs. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. RA and PH form a tandem domain pair (RA-PH), and serve tightly coordinated functions in both Ras GTPase signaling via the RA domain and membrane translocalization via the PH domain."
definition: >-
  Ras-associating (RA) domain found in Caenorhabditis elegans abnormal cell migration protein 10 (MIG-10) and similar proteins. MIG-10 is lamellipodin (Lpd) found in C. elegans. It stabilizes invading cell adhesion to basement membrane and is a negative transcriptional target of Evi-1 proto-oncogene, EGL-43, in C. elegans. It also shows netrin-independent functions and is a transcriptional target of FOS-1A, a transcription factor that promotes basement membrane breaching, during anchor cell invasion in C. elegans. MIG-10 is a member of MRL (Mig10/RIAM/Lpd) family of proteins that is involved in antero-posterior migration of embryonic neurons CAN (canalassociated neurons), ALM (anterior lateral microtubule cells) and HSN (hermaphrodite-specific neurons). MRL proteins share a common structural architecture, including a central structural unit consisting of an RA domain and a pleckstrin homology (PH) domain, an upstream coiled-coil region, and a number of polyproline motifs. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. RA and PH form a tandem domain pair (RA-PH), and serve tightly coordinated functions in both Ras GTPase signaling via the RA domain and membrane translocalization via the PH domain. — an NCBI CDD conserved domain (cd16138); members share this curated model.
