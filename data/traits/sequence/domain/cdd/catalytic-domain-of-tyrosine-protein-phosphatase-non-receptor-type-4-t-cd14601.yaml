identifier: CDD:cd14601
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 4. Tyrosine-protein phosphatase non-receptor type 4 (PTPN4), also called protein-tyrosine phosphatase MEG1, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN4 functions in TCR cell signaling, apoptosis, cerebellar synaptic plasticity, and innate immune responses. It specifically inhibits the TRIF-dependent TLR4 pathway by suppressing tyrosine phosphorylation of TRAM. It is a large modular protein containing an N-terminal FERM domain, a PDZ domain and a C-terminal catalytic PTP domain; the PDZ domain regulates the catalytic activity of PTPN4."
definition: >-
  catalytic domain of tyrosine-protein phosphatase non-receptor type 4. Tyrosine-protein phosphatase non-receptor type 4 (PTPN4), also called protein-tyrosine phosphatase MEG1, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN4 functions in TCR cell signaling, apoptosis, cerebellar synaptic plasticity, and innate immune responses. It specifically inhibits the TRIF-dependent TLR4 pathway by suppressing tyrosine phosphorylation of TRAM. It is a large modular protein containing an N-terminal FERM domain, a PDZ domain and a C-terminal catalytic PTP domain; the PDZ domain regulates the catalytic activity of PTPN4. — an NCBI CDD conserved domain (cd14601); members share this curated model.
