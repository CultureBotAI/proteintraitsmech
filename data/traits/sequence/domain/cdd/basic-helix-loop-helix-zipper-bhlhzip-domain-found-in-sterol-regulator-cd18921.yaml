identifier: CDD:cd18921
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in sterol regulatory element-binding protein 1 (SREBP1) and similar proteins. SREBP1, also termed Class D basic helix-loop-helix protein 1 (bHLHd1), or sterol regulatory element-binding transcription factor 1 (SREBF1), is a member of a family of bHLHzip transcription factors that recognize sterol regulatory element 1 (SRE-1). It acts as a transcriptional activator required for lipid homeostasis. It may control transcription of the low-density lipoprotein receptor gene as well as the fatty acid. SREBP1 has dual sequence specificity binding to both an E-box motif (5'-ATCACGTGA-3') and to SRE-1 (5'-ATCACCCCAC-3')."
definition: >-
