identifier: CDD:cd14206
label: "Catalytic domain of the Protein Tyrosine Kinases, Apoptosis-associated tyrosine kinase 3. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Aatyk3, also called lemur tyrosine kinase 3 (Lmtk3) is a receptor kinase containing a transmembrane segment and a long C-terminal cytoplasmic tail with a catalytic domain. The function of Aatyk3 is still unknown. The Aatyk3 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, and phosphoinositide 3-kinase (PI3K)."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinases, Apoptosis-associated tyrosine kinase 3. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Aatyk3, also called lemur tyrosine kinase 3 (Lmtk3) is a receptor kinase containing a transmembrane segment and a long C-terminal cytoplasmic tail with a catalytic domain. The function of Aatyk3 is still unknown. The Aatyk3 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, and phosphoinositide 3-kinase (PI3K). — an NCBI CDD conserved domain (cd14206); members share this curated model.
