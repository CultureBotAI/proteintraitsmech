identifier: CDD:cd22791
label: "OTU (ovarian tumor) domain of vertnin and similar proteins. Vertnin (VRTN) is an OTU domain-containing protein that is required for the development of thoracic vertebrae in mammals. OTU domains typically function as deubiquitinases (DUBs)/ubiquitin thiolesterases (EC 3.4.19.12) that catalyze the thiol-dependent hydrolysis of ester, thioester, amide, peptide and isopeptide bonds formed by the C-terminal Gly of ubiquitin, a small regulatory protein that can be conjugated to a large range of target proteins. Protein ubiquitination is a post-translational modification of mostly Lys residues that regulates many cellular processes, including protein degradation, intracellular trafficking, cell signaling, autophagy, transcription, translation, and the DNA damage response. These DUBs may play important regulatory roles at the level of protein turnover by preventing degradation. Vertnin and some subfamily members do not possess the conserved catalytic residues and may not have DUB activity. VRTN gene is associated with variations in vertebral number."
definition: >-
  OTU (ovarian tumor) domain of vertnin and similar proteins. Vertnin (VRTN) is an OTU domain-containing protein that is required for the development of thoracic vertebrae in mammals. OTU domains typically function as deubiquitinases (DUBs)/ubiquitin thiolesterases (EC 3.4.19.12) that catalyze the thiol-dependent hydrolysis of ester, thioester, amide, peptide and isopeptide bonds formed by the C-terminal Gly of ubiquitin, a small regulatory protein that can be conjugated to a large range of target proteins. Protein ubiquitination is a post-translational modification of mostly Lys residues that regulates many cellular processes, including protein degradation, intracellular trafficking, cell signaling, autophagy, transcription, translation, and the DNA damage response. These DUBs may play important regulatory roles at the level of protein turnover by preventing degradation. Vertnin and some subfamily members do not possess the conserved catalytic residues and may not have DUB activity. VRTN gene is associated with variations in vertebral number. — an NCBI CDD conserved domain (cd22791); members share this curated model.
