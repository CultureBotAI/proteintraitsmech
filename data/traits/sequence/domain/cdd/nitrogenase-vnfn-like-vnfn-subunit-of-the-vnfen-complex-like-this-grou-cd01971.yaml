identifier: CDD:cd01971
label: "Nitrogenase_vnfN_like: VnfN subunit of the VnfEN complex-like.  This group in addition to VnfN contains a subset of the beta subunit of the nitrogenase MoFe protein and NifN-like proteins. The nitrogenase enzyme system catalyzes the ATP-dependent reduction of dinitrogen to ammonia.  NifEN participates in the synthesis of the iron-molybdenum cofactor (FeMoco) of MoFe protein of the molybdenum(Mo)-nitrogenase.  NifB-co (an iron and sulfur containing precursor of the FeMoco) from NifB is transferred to NifEN where it is further processed to FeMoco. VnfEN  may similarly be a scaffolding protien for the iron-vanadium cofactor (FeVco) of  the vanadium-dependent (V)-nitrogenase.  NifE and NifN are essential for the Mo-nitrogenase, VnfE and VnfN are not essential for the V-nitrogenase. NifE and NifN can substitute when the vnfEN genes are inactivated."
definition: >-
  Nitrogenase_vnfN_like: VnfN subunit of the VnfEN complex-like. This group in addition to VnfN contains a subset of the beta subunit of the nitrogenase MoFe protein and NifN-like proteins. The nitrogenase enzyme system catalyzes the ATP-dependent reduction of dinitrogen to ammonia. NifEN participates in the synthesis of the iron-molybdenum cofactor (FeMoco) of MoFe protein of the molybdenum(Mo)-nitrogenase. NifB-co (an iron and sulfur containing precursor of the FeMoco) from NifB is transferred to NifEN where it is further processed to FeMoco. VnfEN may similarly be a scaffolding protien for the iron-vanadium cofactor (FeVco) of the vanadium-dependent (V)-nitrogenase. NifE and NifN are essential for the Mo-nitrogenase, VnfE and VnfN are not essential for the V-nitrogenase. NifE and NifN can substitute when the vnfEN genes are inactivated. — an NCBI CDD conserved domain (cd01971); members share this curated model.
