identifier: CDD:cd24012
label: ASKHA_NBD_KDGal-kinase
definition: >-
  nucleotide-binding domain (NBD) of the 2-keto-3-deoxy-galactonokinase (DgoK) domain family. 2-keto-3-deoxy-galactonokinase (EC 2.7.1.58), also called KDGal kinase, 2-dehydro-3-deoxygalactonokinase, or oxo-3-deoxygalactonate kinase, is a bacterial transferase which catalyzes the penultimate reaction in the Ley-Doudoroff pathway, where D-galactose is metabolized into pyruvate and d-glyceraldehyde 3-phosphate. This reaction involves the phosphorylation of 2-oxo-3-deoxygalactonate to 2-oxo-3-deoxygalactonate 6-phosphate using ATP as a phosphoryl-group donor. The N-terminal domain of 2-dehydro-3-deoxygalactonokinase reveals a putative substrate-binding site. Its C-terminal domain contains a nucleotide biding site. The KDGal kinase family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains
