identifier: CDD:cd22793
label: "OTU (ovarian tumor) domain of deubiquitinating enzyme OTU1 and OTU2 from plants and similar proteins. Deubiquitinating enzyme OTU2, also called OTU domain-containing protein 2, is a deubiquitinase (DUB) or ubiquitin thiolesterase (EC 3.4.19.12) that catalyzes the thiol-dependent hydrolysis of ester, thioester, amide, peptide and isopeptide bonds formed by the C-terminal Gly of ubiquitin, a small regulatory protein that can be conjugated to a large range of target proteins. Protein ubiquitination is a post-translational modification of mostly Lys residues that regulates many cellular processes, including protein degradation, intracellular trafficking, cell signaling, autophagy, transcription, translation, and the DNA damage response. OTU2 exhibited equivalent binding affinities for K48- and K63-linked ubiquitin chains and no cleavage activity toward linear UB chains. It may also be involved in endoplasmic-reticulum-associated protein degradation (ERAD). OTU2 belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad."
definition: >-
  OTU (ovarian tumor) domain of deubiquitinating enzyme OTU1 and OTU2 from plants and similar proteins. Deubiquitinating enzyme OTU2, also called OTU domain-containing protein 2, is a deubiquitinase (DUB) or ubiquitin thiolesterase (EC 3.4.19.12) that catalyzes the thiol-dependent hydrolysis of ester, thioester, amide, peptide and isopeptide bonds formed by the C-terminal Gly of ubiquitin, a small regulatory protein that can be conjugated to a large range of target proteins. Protein ubiquitination is a post-translational modification of mostly Lys residues that regulates many cellular processes, including protein degradation, intracellular trafficking, cell signaling, autophagy, transcription, translation, and the DNA damage response. OTU2 exhibited equivalent binding affinities for K48- and K63-linked ubiquitin chains and no cleavage activity toward linear UB chains. It may also be involved in endoplasmic-reticulum-associated protein degradation (ERAD). OTU2 belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. — an NCBI CDD conserved domain (cd22793); members share this curated model.
