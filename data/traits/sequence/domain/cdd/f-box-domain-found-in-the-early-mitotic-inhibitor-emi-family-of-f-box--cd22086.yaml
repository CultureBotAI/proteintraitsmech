identifier: CDD:cd22086
label: "F-box domain found in the early mitotic inhibitor (EMI) family of F-box proteins. The EMI family includes FBX5 (EMI1) and FBX43 (EMI2), which are anaphase-promoting complex/cyclosome (APC/C) inhibitors that bind APC/C-CCD20 (Cell division cycle protein 20) and/or APC/C-CDH1 (CDC20 homologue 1) complexes. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in the early mitotic inhibitor (EMI) family of F-box proteins. The EMI family includes FBX5 (EMI1) and FBX43 (EMI2), which are anaphase-promoting complex/cyclosome (APC/C) inhibitors that bind APC/C-CCD20 (Cell division cycle protein 20) and/or APC/C-CDH1 (CDC20 homologue 1) complexes. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22086); members share this curated model.
