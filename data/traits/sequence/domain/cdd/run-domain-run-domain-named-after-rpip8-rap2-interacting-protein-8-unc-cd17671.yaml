identifier: CDD:cd17671
label: "RUN domain. RUN domain, named after RPIP8 (Rap2 interacting protein 8), UNC-14 and NESCA (new molecule containing SH3 at the carboxyl-terminus), is a less conserved protein motif that comprises six conserved regions, which in some proteins have considerable insertions between them. The domain core is thought to take up a predominantly alpha fold, with basic amino acids in regions A and D possibly playing a functional role in interactions with Ras GTPases. RUN domains are often found in proteins linked particularly to the functions of GTPases in the Rap and Rab families, suggesting the RUN domain may be involved in Rab-mediated membrane trafficking, possibly as a Rab-binding site. RUN domain-containing proteins could hence play important roles in multiple Ras-like GTPase signalling pathways."
definition: >-
  RUN domain. RUN domain, named after RPIP8 (Rap2 interacting protein 8), UNC-14 and NESCA (new molecule containing SH3 at the carboxyl-terminus), is a less conserved protein motif that comprises six conserved regions, which in some proteins have considerable insertions between them. The domain core is thought to take up a predominantly alpha fold, with basic amino acids in regions A and D possibly playing a functional role in interactions with Ras GTPases. RUN domains are often found in proteins linked particularly to the functions of GTPases in the Rap and Rab families, suggesting the RUN domain may be involved in Rab-mediated membrane trafficking, possibly as a Rab-binding site. RUN domain-containing proteins could hence play important roles in multiple Ras-like GTPase signalling pathways. — an NCBI CDD conserved domain (cd17671); members share this curated model.
