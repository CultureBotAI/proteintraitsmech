identifier: CDD:cd04217
label: "Cupredoxin domain of PKHDL1, a homolog of the autosomal recessive polycystic kidney disease protein. One member of this family is Fibrocystin-L, a homolog of the autosomal recessive polycystic kidney disease protein PKHD1. Human fibrocystin-L is predicted to be a large receptor protein (466 kDa) with a signal peptide, a single transmembrane domain and a short cytoplasmic tail. Fibrocystin-L is widely expressed at a low level in most tissues but is up-regulated specifically in T lymphocytes following activation signals. It may play roles in immunity."
definition: >-
  Cupredoxin domain of PKHDL1, a homolog of the autosomal recessive polycystic kidney disease protein. One member of this family is Fibrocystin-L, a homolog of the autosomal recessive polycystic kidney disease protein PKHD1. Human fibrocystin-L is predicted to be a large receptor protein (466 kDa) with a signal peptide, a single transmembrane domain and a short cytoplasmic tail. Fibrocystin-L is widely expressed at a low level in most tissues but is up-regulated specifically in T lymphocytes following activation signals. It may play roles in immunity. — an NCBI CDD conserved domain (cd04217); members share this curated model.
