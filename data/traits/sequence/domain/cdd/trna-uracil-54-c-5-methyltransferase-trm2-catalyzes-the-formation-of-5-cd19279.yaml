label: TRM2
definition: >-
  tRNA (uracil(54)-C(5))-methyltransferase. TRM2 catalyzes the formation of 5-methyl-uridine at position 54 (m5U54) in all tRNAs and may also have a role in tRNA stabilization or maturation
