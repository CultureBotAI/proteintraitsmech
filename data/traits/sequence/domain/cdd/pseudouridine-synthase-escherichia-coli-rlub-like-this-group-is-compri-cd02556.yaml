identifier: CDD:cd02556
label: "Pseudouridine synthase, Escherichia coli RluB like. This group is comprised of bacterial and eukaryotic proteins similar to E. coli RluB. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi).  No cofactors are required. E.coli RluB makes psi2605 in 23S RNA.  psi2605 has been detected in eubacteria but, not in eukarya and archea despite the presence of a precursor U at that site."
definition: >-
  Pseudouridine synthase, Escherichia coli RluB like. This group is comprised of bacterial and eukaryotic proteins similar to E. coli RluB. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi). No cofactors are required. E.coli RluB makes psi2605 in 23S RNA. psi2605 has been detected in eubacteria but, not in eukarya and archea despite the presence of a precursor U at that site. — an NCBI CDD conserved domain (cd02556); members share this curated model.
