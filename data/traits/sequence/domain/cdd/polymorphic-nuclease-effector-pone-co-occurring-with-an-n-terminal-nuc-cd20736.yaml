identifier: CDD:cd20736
label: PoNe_Nuclease
definition: >-
  Polymorphic Nuclease effector (PoNe) co-occurring with an N-terminal nuclease domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with nuclease N-terminal domains such as endonucleases involved in methyl-directed DNA mismatch repair in gram negative bacteria
