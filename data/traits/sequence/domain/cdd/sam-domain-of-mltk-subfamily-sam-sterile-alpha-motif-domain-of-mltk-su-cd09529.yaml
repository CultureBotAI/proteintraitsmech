identifier: CDD:cd09529
label: "SAM domain of MLTK subfamily. SAM (sterile alpha motif) domain of MLTK subfamily is a protein-protein interaction domain. Besides SAM domain, these proteins have N-terminal protein tyrosine kinase domain and leucine-zipper motif. Proteins of this group act as mitogen-activated protein triple kinase in a number of MAPK cascades. They can be activated by autophosphorylation in response to stress signals. MLTK-alpha is known to phosphorylate histone H3. In mammals, MLTKs participate in the activation of the JNK/SAPK, p38, ERK5 pathways, the transcriptional factor NF-kB, in the regulation of the cell cycle checkpoint, and in the induction of apoptosis in a hepatoma cell line. Some members of this subfamily are proto-oncogenes, thus MLTK-alpha is involved in neoplasmic cell transformation and/or skin cancer development in athymic nude mice. Based on in vivo coprecipitation experiments in mammalian cells, it has been demonstrated that MLTK proteins might form homodimers/oligomers via their SAM domains."
definition: >-
  SAM domain of MLTK subfamily. SAM (sterile alpha motif) domain of MLTK subfamily is a protein-protein interaction domain. Besides SAM domain, these proteins have N-terminal protein tyrosine kinase domain and leucine-zipper motif. Proteins of this group act as mitogen-activated protein triple kinase in a number of MAPK cascades. They can be activated by autophosphorylation in response to stress signals. MLTK-alpha is known to phosphorylate histone H3. In mammals, MLTKs participate in the activation of the JNK/SAPK, p38, ERK5 pathways, the transcriptional factor NF-kB, in the regulation of the cell cycle checkpoint, and in the induction of apoptosis in a hepatoma cell line. Some members of this subfamily are proto-oncogenes, thus MLTK-alpha is involved in neoplasmic cell transformation and/or skin cancer development in athymic nude mice. Based on in vivo coprecipitation experiments in mammalian cells, it has been demonstrated that MLTK proteins might form homodimers/oligomers via their SAM domains. — an NCBI CDD conserved domain (cd09529); members share this curated model.
