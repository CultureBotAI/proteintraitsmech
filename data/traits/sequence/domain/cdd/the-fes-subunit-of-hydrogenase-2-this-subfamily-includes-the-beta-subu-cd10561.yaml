identifier: CDD:cd10561
label: "the FeS subunit of hydrogenase 2. This subfamily includes the beta-subunit of hydrogenase 2 (Hyd-2), an enzyme that catalyzes the reversible oxidation of H2 to protons and electrons. Hyd-2 is membrane-associated and forms an unusual heterotetrameric [NiFe]-hydrogenase in that it lacks the typical cytochrome b membrane anchor subunit that transfers electrons to the quinone pool. The electron transfer subunit of Hyd-2 (HybA) which is predicted to contain four iron-sulfur clusters, is essential for electron transfer from Hyd-2 to menaquinone/demethylmenaquinone (MQ/DMQ) to couple hydrogen oxidation to fumarate reduction."
definition: >-
  the FeS subunit of hydrogenase 2. This subfamily includes the beta-subunit of hydrogenase 2 (Hyd-2), an enzyme that catalyzes the reversible oxidation of H2 to protons and electrons. Hyd-2 is membrane-associated and forms an unusual heterotetrameric [NiFe]-hydrogenase in that it lacks the typical cytochrome b membrane anchor subunit that transfers electrons to the quinone pool. The electron transfer subunit of Hyd-2 (HybA) which is predicted to contain four iron-sulfur clusters, is essential for electron transfer from Hyd-2 to menaquinone/demethylmenaquinone (MQ/DMQ) to couple hydrogen oxidation to fumarate reduction. — an NCBI CDD conserved domain (cd10561); members share this curated model.
