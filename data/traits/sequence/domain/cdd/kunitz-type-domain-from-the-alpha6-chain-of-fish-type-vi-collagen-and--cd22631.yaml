identifier: CDD:cd22631
label: "Kunitz-type domain from the alpha6 chain of fish type VI collagen, and similar proteins. This model includes the Kunitz-type domain from the alpha6 chain of type VI collagen (collagen alpha 6(VI) chain) and similar proteins. Collagen VI is a widely expressed member of the triple helix-containing protein superfamily of collagens and forms beaded microfibrils that anchor large interstitial structures. Immediately after fibril formation, the Kunitz domain can be cleaved off. This domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz-type domain from the alpha6 chain of fish type VI collagen, and similar proteins. This model includes the Kunitz-type domain from the alpha6 chain of type VI collagen (collagen alpha 6(VI) chain) and similar proteins. Collagen VI is a widely expressed member of the triple helix-containing protein superfamily of collagens and forms beaded microfibrils that anchor large interstitial structures. Immediately after fibril formation, the Kunitz domain can be cleaved off. This domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22631); members share this curated model.
