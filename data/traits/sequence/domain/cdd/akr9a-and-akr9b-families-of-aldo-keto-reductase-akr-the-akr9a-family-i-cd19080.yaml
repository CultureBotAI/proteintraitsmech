identifier: CDD:cd19080
label: "AKR9A and AKR9B families of aldo-keto reductase (AKR). The AKR9A family includes Aspergillus nidulans sterigmatocystin biosynthesis dehydrogenase StcV, Aspergillus flavus norsolorinic acid reductase (NOR), and Phanerochaete chrysosporium aryl-alcohol dehydrogenase [NADP(+)] (AAD), are founding members of aldo-keto reductase family 9 member A1-3 (AKR9A1-3), respectively. StcV may be involved in the dehydration of 5'-hydroxyaverantin to form averufin. NOR is involved in aflatoxin biosynthesis. AAD (EC1.1.1.91) is involved in lignin degradation and reduces aromatic benzaldehydes to their respective alcohols in the presence of NADP(H). The AKR9B family includes Saccharomyces cerevisiae aryl-alcohol dehydrogenases AAD14p, AAD3p, AAD4p, and AAD10p, which are founding members of aldo-keto reductase family 9 member B1-4 (AKR9B1-4), respectively."
definition: >-
  AKR9A and AKR9B families of aldo-keto reductase (AKR). The AKR9A family includes Aspergillus nidulans sterigmatocystin biosynthesis dehydrogenase StcV, Aspergillus flavus norsolorinic acid reductase (NOR), and Phanerochaete chrysosporium aryl-alcohol dehydrogenase [NADP(+)] (AAD), are founding members of aldo-keto reductase family 9 member A1-3 (AKR9A1-3), respectively. StcV may be involved in the dehydration of 5'-hydroxyaverantin to form averufin. NOR is involved in aflatoxin biosynthesis. AAD (EC1.1.1.91) is involved in lignin degradation and reduces aromatic benzaldehydes to their respective alcohols in the presence of NADP(H). The AKR9B family includes Saccharomyces cerevisiae aryl-alcohol dehydrogenases AAD14p, AAD3p, AAD4p, and AAD10p, which are founding members of aldo-keto reductase family 9 member B1-4 (AKR9B1-4), respectively. — an NCBI CDD conserved domain (cd19080); members share this curated model.
