identifier: CDD:cd21138
label: "Maintenance of carboxysome distribution (Mcd) protein B and similar proteins. This family contains maintenance of carboxysome distribution (Mcd) protein B (McdB), also called maintenance of carboxysome positioning B protein (McsB). It is found in cyanobacteria, where carboxysome maintenance is mediated by a DNA partition-like ParA-ParB system called the McdA-McdB. In order to actively position carboxysomes, McdB binds directly to McdA, a putative Walker-box ParA-like protein. McdB harbors a unique helical fold and it enables McdA dimer formation."
definition: >-
  Maintenance of carboxysome distribution (Mcd) protein B and similar proteins. This family contains maintenance of carboxysome distribution (Mcd) protein B (McdB), also called maintenance of carboxysome positioning B protein (McsB). It is found in cyanobacteria, where carboxysome maintenance is mediated by a DNA partition-like ParA-ParB system called the McdA-McdB. In order to actively position carboxysomes, McdB binds directly to McdA, a putative Walker-box ParA-like protein. McdB harbors a unique helical fold and it enables McdA dimer formation. — an NCBI CDD conserved domain (cd21138); members share this curated model.
