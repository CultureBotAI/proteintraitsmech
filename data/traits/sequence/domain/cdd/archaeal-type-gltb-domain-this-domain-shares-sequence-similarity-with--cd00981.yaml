identifier: CDD:cd00981
label: "Archaeal-type gltB domain. This domain shares sequence similarity with a region of unknown function found in the large subunit of glutamate synthase, which is encoded by gltB and found in most bacteria and eukaryotes.  It is predicted to be homologous to the C-terminal domain of glutamate synthase based upon sequence similarity coupled with genome organization data, showing that this domain is found in a gene cluster with other domains of Glts, which are annotated. This domain is found primarily in archaea, but is also present in a few bacteria, likely as a result of lateral gene transfer."
definition: >-
  Archaeal-type gltB domain. This domain shares sequence similarity with a region of unknown function found in the large subunit of glutamate synthase, which is encoded by gltB and found in most bacteria and eukaryotes. It is predicted to be homologous to the C-terminal domain of glutamate synthase based upon sequence similarity coupled with genome organization data, showing that this domain is found in a gene cluster with other domains of Glts, which are annotated. This domain is found primarily in archaea, but is also present in a few bacteria, likely as a result of lateral gene transfer. — an NCBI CDD conserved domain (cd00981); members share this curated model.
