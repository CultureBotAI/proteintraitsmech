identifier: CDD:cd05877
label: "Immunoglobulin (Ig)-like domain of human cartilage link protein (LP), and similar domains. The members here are composed of the immunoglobulin (Ig)-like domain similar to that found in human cartilage link protein (LP; also called hyaluronan and proteoglycan link protein). In cartilage, chondroitin-keratan sulfate proteoglycan (CSPG), aggrecan, forms cartilage link protein stabilized aggregates with hyaluronan (HA). These aggregates contribute to the tissue's load bearing properties. Aggregates having other CSPGs substituting for aggrecan may contribute to the structural integrity of many different tissues. Members of the vertebrate HPLN (hyaluronan/HA and proteoglycan binding link) protein family are physically linked adjacent to CSPG genes."
definition: >-
  Immunoglobulin (Ig)-like domain of human cartilage link protein (LP), and similar domains. The members here are composed of the immunoglobulin (Ig)-like domain similar to that found in human cartilage link protein (LP; also called hyaluronan and proteoglycan link protein). In cartilage, chondroitin-keratan sulfate proteoglycan (CSPG), aggrecan, forms cartilage link protein stabilized aggregates with hyaluronan (HA). These aggregates contribute to the tissue's load bearing properties. Aggregates having other CSPGs substituting for aggrecan may contribute to the structural integrity of many different tissues. Members of the vertebrate HPLN (hyaluronan/HA and proteoglycan binding link) protein family are physically linked adjacent to CSPG genes. — an NCBI CDD conserved domain (cd05877); members share this curated model.
