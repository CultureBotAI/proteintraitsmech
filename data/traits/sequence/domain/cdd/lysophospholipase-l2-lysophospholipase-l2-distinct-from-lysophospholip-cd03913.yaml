identifier: CDD:cd03913
label: lysophos_L2
definition: >-
  Lysophospholipase L2. Lysophospholipase L2, distinct from lysophospholipase L1, hydrolyzes 2-acyl glycerophosphoethanolamine (GPE) and 2-acyl glycerophosphocholine (GPC), and also catalyzes the transfer of an acyl group from lysophospholipid to phosphatidylglycerol for formation of acyl phosphatidylglycerol
