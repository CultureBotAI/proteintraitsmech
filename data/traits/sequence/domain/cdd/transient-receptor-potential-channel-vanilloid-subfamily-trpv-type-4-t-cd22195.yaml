identifier: CDD:cd22195
label: "Transient Receptor Potential channel, Vanilloid subfamily (TRPV), type 4. TRPV4 is expressed broadly in neuronal and non-neuronal cells. It is activated by various stimuli, including hypo-osmolarity, warm temperature, and chemical ligands. TRPV4 acts in physiological functions such as osmoregulation and thermoregulation. It also has a role in mechanosensation in the vascular endothelium and urinary tract, and in cell barrier formation in vascular and epidermal tissues. Knockout mice studies suggested the functional importance of TRPV4 in the central nervous system, nociception, and bone formation. TRPV4 belongs to the vanilloid TRP subfamily (TRPV), named after the founding member vanilloid receptor 1 (TRPV1). The structure of TRPV shows the typical topology features of all Transient Receptor Potential (TRP) ion channel family members, such as six transmembrane regions, a short hydrophobic stretch between transmembrane segments 5 and 6 and large intracellular N- and C-terminal domains."
definition: >-
  Transient Receptor Potential channel, Vanilloid subfamily (TRPV), type 4. TRPV4 is expressed broadly in neuronal and non-neuronal cells. It is activated by various stimuli, including hypo-osmolarity, warm temperature, and chemical ligands. TRPV4 acts in physiological functions such as osmoregulation and thermoregulation. It also has a role in mechanosensation in the vascular endothelium and urinary tract, and in cell barrier formation in vascular and epidermal tissues. Knockout mice studies suggested the functional importance of TRPV4 in the central nervous system, nociception, and bone formation. TRPV4 belongs to the vanilloid TRP subfamily (TRPV), named after the founding member vanilloid receptor 1 (TRPV1). The structure of TRPV shows the typical topology features of all Transient Receptor Potential (TRP) ion channel family members, such as six transmembrane regions, a short hydrophobic stretch between transmembrane segments 5 and 6 and large intracellular N- and C-terminal domains. — an NCBI CDD conserved domain (cd22195); members share this curated model.
