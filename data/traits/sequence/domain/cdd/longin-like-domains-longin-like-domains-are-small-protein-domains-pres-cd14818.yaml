identifier: CDD:cd14818
label: "Longin-like domains. Longin-like domains are small protein domains present in a variety of proteins and members of protein complexes involved in or required for different steps during the transport of proteins from the ribosome to the ER to the plasma membrane, via the Golgi apparatus. Examples are mu and sigma subunits of the heterotetrameric adaptor protein (AP) complex, zeta and delta subunits of the heterotetrameric F-COPI complex, a subgroup of R-SNARE proteins, a subfamily of the transport protein particle (TRAPP), and the signal recognition particle receptor subunit alpha (SR-alpha)."
definition: >-
  Longin-like domains. Longin-like domains are small protein domains present in a variety of proteins and members of protein complexes involved in or required for different steps during the transport of proteins from the ribosome to the ER to the plasma membrane, via the Golgi apparatus. Examples are mu and sigma subunits of the heterotetrameric adaptor protein (AP) complex, zeta and delta subunits of the heterotetrameric F-COPI complex, a subgroup of R-SNARE proteins, a subfamily of the transport protein particle (TRAPP), and the signal recognition particle receptor subunit alpha (SR-alpha). — an NCBI CDD conserved domain (cd14818); members share this curated model.
