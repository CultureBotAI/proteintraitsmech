identifier: CDD:cd13156
label: KOW_RPL6
definition: >-
  KOW motif of Ribosomal Protein L6. RPL6 contains KOW motif that has an extra ribosomal role as an oncogenic. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4
