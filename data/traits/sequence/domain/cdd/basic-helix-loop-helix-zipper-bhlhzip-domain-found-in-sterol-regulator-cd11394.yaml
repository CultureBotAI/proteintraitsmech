identifier: CDD:cd11394
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in sterol regulatory element-binding protein (SREBP) family. The SREBP family includes SREBP1 and SREBP2, which are bHLHzip transcriptional activator of genes encoding proteins essential for cholesterol biosynthesis/uptake and fatty acid biosynthesis. SREBP1 and SREBP2 are principally found in the liver and in adipocytes and made up of an N-terminal transcription factor portion (composed of an activation domain, a bHLHzip domain, and a nuclear localization signal), a hydrophobic region containing two membrane spanning regions, and a C-terminal regulatory segment. They recognize a symmetric sterol regulatory element (TCACNCCAC) instead of E-box."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in sterol regulatory element-binding protein (SREBP) family. The SREBP family includes SREBP1 and SREBP2, which are bHLHzip transcriptional activator of genes encoding proteins essential for cholesterol biosynthesis/uptake and fatty acid biosynthesis. SREBP1 and SREBP2 are principally found in the liver and in adipocytes and made up of an N-terminal transcription factor portion (composed of an activation domain, a bHLHzip domain, and a nuclear localization signal), a hydrophobic region containing two membrane spanning regions, and a C-terminal regulatory segment. They recognize a symmetric sterol regulatory element (TCACNCCAC) instead of E-box. — an NCBI CDD conserved domain (cd11394); members share this curated model.
