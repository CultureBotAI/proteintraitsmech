identifier: CDD:cd22244
label: akirin-2
definition: >-
  akirin-2. Akirins are small, highly conserved eumetazoan nuclear proteins that play a role in immune response and tumorigenesis. It is believed that they act as a connector between a variety of transcription factors and major chromatin remodeling complexes. Akirin-2 is one of the two orthologs in vertebrates that plays a role in immunity, myogenesis, and brain- and limb-development. Akirin-2 is partly cytosolic. It has been shown to interact with nuclear importins and therefore may play a role in proper transport between nucleus and cytoplasm
