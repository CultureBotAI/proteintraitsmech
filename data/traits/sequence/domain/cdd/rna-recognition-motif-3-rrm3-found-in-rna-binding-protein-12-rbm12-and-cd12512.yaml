identifier: CDD:cd12512
label: "RNA recognition motif 3 (RRM3) found in RNA-binding protein 12 (RBM12) and similar proteins. This subfamily corresponds to the RRM3 of RBM12. RBM12, also termed SH3/WW domain anchor protein in the nucleus (SWAN), is ubiquitously expressed. It contains five distinct RNA binding motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two proline-rich regions, and several putative transmembrane domains. The biological role of RBM12 remains unclear."
definition: >-
  RNA recognition motif 3 (RRM3) found in RNA-binding protein 12 (RBM12) and similar proteins. This subfamily corresponds to the RRM3 of RBM12. RBM12, also termed SH3/WW domain anchor protein in the nucleus (SWAN), is ubiquitously expressed. It contains five distinct RNA binding motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two proline-rich regions, and several putative transmembrane domains. The biological role of RBM12 remains unclear. — an NCBI CDD conserved domain (cd12512); members share this curated model.
