identifier: CDD:cd10968
label: "Putative catalytic NodB homology domain of Mesorhizobium loti Mlr8448 protein and its bacterial homologs. This family contains Mesorhizobium loti Mlr8448 protein and its bacterial homologs. Although their biochemical properties are yet to be determined, members in this subfamily contain a conserved domain with a 5-stranded beta/alpha barrel, which is similar to the catalytic NodB homology domain of rhizobial NodB-like proteins, belonging to the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Putative catalytic NodB homology domain of Mesorhizobium loti Mlr8448 protein and its bacterial homologs. This family contains Mesorhizobium loti Mlr8448 protein and its bacterial homologs. Although their biochemical properties are yet to be determined, members in this subfamily contain a conserved domain with a 5-stranded beta/alpha barrel, which is similar to the catalytic NodB homology domain of rhizobial NodB-like proteins, belonging to the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10968); members share this curated model.
