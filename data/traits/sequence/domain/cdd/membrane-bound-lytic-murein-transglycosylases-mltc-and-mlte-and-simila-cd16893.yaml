label: "membrane-bound lytic murein transglycosylases MltC and MltE, and similar proteins. MltC and MltE are periplasmic, outer membrane attached lytic transglycosylases (LTs), which cleave beta-1,4-glycosidic bonds joining N-acetylmuramic acid and N-acetylglucosamine in the cell wall peptidoglycan, yielding 1,6-anhydromuropeptides. Proteins similar to this family include the soluble and insoluble membrane-bound LTs in bacteria and the LTs in bacteriophage lambda"
definition: >-
  membrane-bound lytic murein transglycosylases MltC and MltE, and similar proteins. MltC and MltE are periplasmic, outer membrane attached lytic transglycosylases (LTs), which cleave beta-1,4-glycosidic bonds joining N-acetylmuramic acid and N-acetylglucosamine in the cell wall peptidoglycan, yielding 1,6-anhydromuropeptides. Proteins similar to this family include the soluble and insoluble membrane-bound LTs in bacteria and the LTs in bacteriophage lambda — an NCBI CDD conserved domain (cd16893); members share this curated model.
