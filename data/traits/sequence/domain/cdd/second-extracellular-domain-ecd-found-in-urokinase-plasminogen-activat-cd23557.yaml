label: TFP_LU_ECD_uPAR_rpt2
definition: >-
  second extracellular domain (ECD) found in urokinase plasminogen activator surface receptor (uPAR) and similar proteins. uPAR (also called U-PAR, or monocyte activation antigen Mo3, or CD87) acts as a receptor for urokinase plasminogen activator. It plays a role in localizing and promoting plasmin formation. It mediates the proteolysis-independent signal transduction activation effects of U-PA. It is subject to negative-feedback regulation by U-PA which cleaves it into an inactive form. uPAR contains three extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the second ECD
