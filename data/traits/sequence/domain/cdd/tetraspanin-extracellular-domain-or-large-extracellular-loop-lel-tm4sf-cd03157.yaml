identifier: CDD:cd03157
label: "Tetraspanin, extracellular domain or large extracellular loop (LEL), TM4SF12_like family. Tetraspanins are trans-membrane proteins with 4 trans-membrane segments. Both the N- and C-termini lie on the intracellular side of the membrane. This alignment model spans the extracellular domain between the 3rd and 4th trans-membrane segment. Tetraspanins are involved in diverse processes and their various functions may relate to their ability to act as molecular facilitators. Tetraspanins associate laterally with one another and cluster dynamically with numerous parnter domains in membrane microdomains, forming a network of multimolecular complexes, the \"tetraspanin web\". This sub-family contains proteins similar to human transmembrane 4 superfamily member 12 (TM4SF12)."
definition: >-
  Tetraspanin, extracellular domain or large extracellular loop (LEL), TM4SF12_like family. Tetraspanins are trans-membrane proteins with 4 trans-membrane segments. Both the N- and C-termini lie on the intracellular side of the membrane. This alignment model spans the extracellular domain between the 3rd and 4th trans-membrane segment. Tetraspanins are involved in diverse processes and their various functions may relate to their ability to act as molecular facilitators. Tetraspanins associate laterally with one another and cluster dynamically with numerous parnter domains in membrane microdomains, forming a network of multimolecular complexes, the "tetraspanin web". This sub-family contains proteins similar to human transmembrane 4 superfamily member 12 (TM4SF12). — an NCBI CDD conserved domain (cd03157); members share this curated model.
