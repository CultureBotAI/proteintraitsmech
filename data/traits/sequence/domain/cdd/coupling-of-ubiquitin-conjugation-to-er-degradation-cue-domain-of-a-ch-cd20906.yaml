identifier: CDD:cd20906
label: SMARCAD1_CUE
definition: >-
  Coupling of Ubiquitin conjugation to ER degradation (CUE) domain of a chromatin remodeler SMARCAD1. CUE domains of SMARCAD1 (human; Etl1 in mouse; Fun30 budding yeast) are ubiquitin-binding domains (UBDs) that might also interact to a not-ubiquitin structure. SMARCAD1 interaction with ubiquitylated histone H2A is a CUE domain-dependent and its CUE domain N-terminal mediates interaction with the chromatin regulator KAP1. SMARCAD1 is conserved from yeast to humans and has reported roles in the maintenance of heterochromatin following replication and in double-strand break repair. CUE domain exists in one or more copies in almost all SMARCAD1 orthologs but its binding to ubiquitylated histones is not a conserved property of its orthologs
