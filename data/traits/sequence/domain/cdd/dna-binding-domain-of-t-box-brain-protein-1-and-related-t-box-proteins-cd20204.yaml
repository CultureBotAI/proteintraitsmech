identifier: CDD:cd20204
label: "DNA-binding domain of T-box brain protein 1 and related T-box proteins. TBR1 (also known as T-brain-1 or TES-56) is a neuron-specific transcription factor of the T-box family and involved in forebrain development. It has been recognized as a high-confidence risk gene for autism spectrum disorders (ASD); it regulates the expression of ASD-related genes that are critical for cortical development. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
