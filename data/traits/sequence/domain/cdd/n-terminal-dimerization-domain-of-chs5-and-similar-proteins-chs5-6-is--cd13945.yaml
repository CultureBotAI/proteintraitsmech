identifier: CDD:cd13945
label: "N-terminal dimerization domain of Chs5 and similar proteins. Chs5/6 is a multi-protein complex conserved in fungi that interacts with chitin synthase III (Chs3p) and is involved in its transport to the cell surface from the trans-Golgi network, functioning as an exomer cargo adapter. Chs5p appears to form a complex with Chs6p and its paralogs Bch1p, Bud7p, and Bch2p. In this complex, Chs5p may act as a central scaffold. The N-terminal domain characterized by this model forms a homodimer and has been shown to interact with Chs6p and Bch1p. It may function as a flexible hinge domain that allows the exomer to interact with both proteins and the Golgi membrane as the latter undergoes changes in curvature during the formation of transport vesicles. The dimerization domain sits N-terminally to a conserved FBE (FN3-BRCT) unit, which binds Arf1 an is involved in the recruitment of the exomer to the membrane."
definition: >-
  N-terminal dimerization domain of Chs5 and similar proteins. Chs5/6 is a multi-protein complex conserved in fungi that interacts with chitin synthase III (Chs3p) and is involved in its transport to the cell surface from the trans-Golgi network, functioning as an exomer cargo adapter. Chs5p appears to form a complex with Chs6p and its paralogs Bch1p, Bud7p, and Bch2p. In this complex, Chs5p may act as a central scaffold. The N-terminal domain characterized by this model forms a homodimer and has been shown to interact with Chs6p and Bch1p. It may function as a flexible hinge domain that allows the exomer to interact with both proteins and the Golgi membrane as the latter undergoes changes in curvature during the formation of transport vesicles. The dimerization domain sits N-terminally to a conserved FBE (FN3-BRCT) unit, which binds Arf1 an is involved in the recruitment of the exomer to the membrane. — an NCBI CDD conserved domain (cd13945); members share this curated model.
