identifier: CDD:cd17405
label: "Solute carrier organic anion transporter 6 family of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 6 (SLCO6) or Organic anion transporting polypeptide 6 (OATP6) family contains only one subfamily, OATP6A, which contains only one human member OATP6A1 (encoded by SLCO6A1). The OATP6 family is the most diverged of the OATPs. OATP6A1 is also called cancer/testis antigen 48 (CT48) or gonad-specific transporter. It is strongly expressed only in normal testis, and weakly in spleen, brain, fetal brain, and placenta. It is found in tumor samples (lung, bladder, and esophageal) and cancer cell lines (lung), and may be of potential use as a target for therapy for a variety of tumor types. The SLCO6/OATP6 family belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier organic anion transporter 6 family of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 6 (SLCO6) or Organic anion transporting polypeptide 6 (OATP6) family contains only one subfamily, OATP6A, which contains only one human member OATP6A1 (encoded by SLCO6A1). The OATP6 family is the most diverged of the OATPs. OATP6A1 is also called cancer/testis antigen 48 (CT48) or gonad-specific transporter. It is strongly expressed only in normal testis, and weakly in spleen, brain, fetal brain, and placenta. It is found in tumor samples (lung, bladder, and esophageal) and cancer cell lines (lung), and may be of potential use as a target for therapy for a variety of tumor types. The SLCO6/OATP6 family belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17405); members share this curated model.
