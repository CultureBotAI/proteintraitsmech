identifier: CDD:cd01964
label: "ATP-grasp domain of pyruvate phosphate dikinase-like enzymes. Pyruvate phosphate dikinase-like family members have the signature nucleotide-binding domain of ATP-grasp superfamily. The catalytic reaction requires the presence of ATP and Mg ions. All members have very similar sequences and perform similar catalytic reactions. Catalysis involves three domains; C-terminal phosphoenolpyruvate /pyruvate binding domain, central domain containing catalytic histidine, and N-terminal nucleotide-binding domain with an exception of alpha-glucan water dikinase where the nucleotide-binding domain is at the C-terminus. The three characterizes subfamilies included in this family are pyruvate phosphate dikinase (PPDK), phosphoenolpyruvate synthetase (PPS), and alpha-glucan water dikinase (GWD)."
definition: >-
  ATP-grasp domain of pyruvate phosphate dikinase-like enzymes. Pyruvate phosphate dikinase-like family members have the signature nucleotide-binding domain of ATP-grasp superfamily. The catalytic reaction requires the presence of ATP and Mg ions. All members have very similar sequences and perform similar catalytic reactions. Catalysis involves three domains; C-terminal phosphoenolpyruvate /pyruvate binding domain, central domain containing catalytic histidine, and N-terminal nucleotide-binding domain with an exception of alpha-glucan water dikinase where the nucleotide-binding domain is at the C-terminus. The three characterizes subfamilies included in this family are pyruvate phosphate dikinase (PPDK), phosphoenolpyruvate synthetase (PPS), and alpha-glucan water dikinase (GWD). — an NCBI CDD conserved domain (cd01964); members share this curated model.
