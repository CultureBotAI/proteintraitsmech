identifier: CDD:cd19446
label: "fatty acid-binding protein 6. Human fatty acid-binding protein 6 (also known as gastrotropin, I-15P, I-BABP, I-BALB, I-BAP, ILBP, ILBP3, ileal bile acid-binding protein, ILLBP, \"ileal lipid-binding protein) is an intracellular carrier of bile salts in the epithelial cells of the distal small intestine and has a key role in the enterohepatic circulation of bile salts. It recognizes a series of physiological bile salts that vary in the number and position of steroidal hydroxyl groups, and the presence and type of side-chain conjugation. This subgroup belongs to the intracellular fatty acid-binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
