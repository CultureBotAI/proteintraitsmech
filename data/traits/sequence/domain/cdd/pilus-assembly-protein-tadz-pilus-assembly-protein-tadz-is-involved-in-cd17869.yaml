label: "pilus assembly protein TadZ. Pilus assembly protein TadZ is involved in the production of a variant of type IV pili. It is part of the SIMIBI superfamily which contains a variety of proteins which share a common ATP-binding domain. Functionally, proteins in this superfamily use the energy from hydrolysis of NTP to transfer electron or ion."
