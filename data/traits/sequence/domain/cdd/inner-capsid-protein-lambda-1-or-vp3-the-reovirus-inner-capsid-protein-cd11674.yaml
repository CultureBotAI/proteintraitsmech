identifier: CDD:cd11674
label: "inner capsid protein lambda-1 or VP3. The reovirus inner capsid protein lambda-1 displays nucleoside triphosphate phosphohydrolase (NTPase), RNA-5'-triphosphatase (RTPase), and RNA helicase activity and may play a role in the transcription of the virus genome, the unwinding or reannealing of double-stranded RNA during RNA synthesis. The RTPase activity constitutes the first step in the capping of RNA, resulting in a 5'-diphosphorylated RNA plus-strand. lambda1 is an Orthoreovirus core protein, VP3 is the homologous core protein in Aquareoviruses."
definition: >-
