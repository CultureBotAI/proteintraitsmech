identifier: CDD:cd17258
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to S.Sau13435ORF2165P TRD1-CR1 and S.SauL3067ORFAP TRD1-CR1. Staphylococcus aureus NCTC 13435 S subunit (S.Sau13435ORF2165P) recognizes 5'... TCTANNNNNNRTTC ... 3'; the recognition sequence of Staphylococcus aureus 3067 S.Sau3067ORFAP S subunit is as yet undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example, S.Sau13435ORF2165P TRD1 recognizes TCTA/TAGA, and S.Sau13435ORF2165P TRD2 recognizes GAAY/RTTC. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains mostly TRD1-CR1. It may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases."
definition: >-
  Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to S.Sau13435ORF2165P TRD1-CR1 and S.SauL3067ORFAP TRD1-CR1. Staphylococcus aureus NCTC 13435 S subunit (S.Sau13435ORF2165P) recognizes 5'... TCTANNNNNNRTTC ... 3'; the recognition sequence of Staphylococcus aureus 3067 S.Sau3067ORFAP S subunit is as yet undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example, S.Sau13435ORF2165P TRD1 recognizes TCTA/TAGA, and S.Sau13435ORF2165P TRD2 recognizes GAAY/RTTC. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains mostly TRD1-CR1. It may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases. — an NCBI CDD conserved domain (cd17258); members share this curated model.
