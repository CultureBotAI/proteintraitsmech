identifier: CDD:cd19731
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in neuronal PAS domain-containing protein 1 (NPAS1) and similar proteins. NPAS1, also termed neuronal PAS1, or Basic-helix-loop-helix-PAS protein MOP5, or Class E basic helix-loop-helix protein 11 (bHLHe11), or member of PAS protein 5, or PAS domain-containing protein 5 (PASD5), is a bHLH-PAS transcriptional repressor expressed in the central nervous system and involved in neuronal differentiation. It is active during late embryogenesis and postnatal development."
definition: >-
