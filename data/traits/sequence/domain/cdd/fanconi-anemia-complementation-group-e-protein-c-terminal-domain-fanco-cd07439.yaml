identifier: CDD:cd07439
label: "Fanconi anemia complementation group E protein, C-terminal domain. Fanconi Anemia (FA) is an autosomal recessive disorder associated with increased susceptibility to various cancers, bone marrow failure, cardiac, renal, and limb malformations, and other characteristics. Cells are highly sensitive to DNA damaging agents. A multi-subunit protein complex, the FA core complex, is responsible for ubiquitination of the protein FANCD2 in response to DNA damage. This monoubiquitination results in a downstream effect on homology-directed DNA repair. FANCE is part of the FA core complex and its C-terminal domain, which is modeled here, has been shown to directly interact with FANCD2. The domain contains a five-fold repeat of a structural unit similar to ARM and HEAT repeats. FANCE appears conserved in metazoa and in plants."
definition: >-
