identifier: CDD:cd09853
label: "FEN-like PIN domains of structure-specific 5' nucleases (or Flap endonuclease-1-like) involved in DNA replication, repair, and recombination. Structure-specific 5' nucleases are capable of both 5'-3' exonucleolytic activity and cleaving bifurcated or branched DNA, in an endonucleolytic, structure-specific manner. The family includes the PIN (PilT N terminus) domains of Flap endonuclease-1 (FEN1), exonuclease-1 (EXO1), Mkt1, Gap Endonuclease 1 (GEN1), and Xeroderma pigmentosum complementation group G (XPG) nuclease. Also included are the PIN domains of the 5'-3' exonucleases of DNA polymerase I and single domain protein homologs, as well as, the bacteriophage T4- and T5-5' nucleases, and other homologs. Canonical members of this FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), and at the C-terminus of the PIN domain a H3TH (helix-3-turn-helix) domain, an atypical helix-hairpin-helix-2-like region. Both the H3TH domain (not included in this model) and the helical arch/clamp region are involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons."
definition: >-
  FEN-like PIN domains of structure-specific 5' nucleases (or Flap endonuclease-1-like) involved in DNA replication, repair, and recombination. Structure-specific 5' nucleases are capable of both 5'-3' exonucleolytic activity and cleaving bifurcated or branched DNA, in an endonucleolytic, structure-specific manner. The family includes the PIN (PilT N terminus) domains of Flap endonuclease-1 (FEN1), exonuclease-1 (EXO1), Mkt1, Gap Endonuclease 1 (GEN1), and Xeroderma pigmentosum complementation group G (XPG) nuclease. Also included are the PIN domains of the 5'-3' exonucleases of DNA polymerase I and single domain protein homologs, as well as, the bacteriophage T4- and T5-5' nucleases, and other homologs. Canonical members of this FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), and at the C-terminus of the PIN domain a H3TH (helix-3-turn-helix) domain, an atypical helix-hairpin-helix-2-like region. Both the H3TH domain (not included in this model) and the helical arch/clamp region are involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. — an NCBI CDD conserved domain (cd09853); members share this curated model.
