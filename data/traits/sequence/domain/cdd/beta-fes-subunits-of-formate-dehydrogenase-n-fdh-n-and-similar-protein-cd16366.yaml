identifier: CDD:cd16366
label: "beta FeS subunits of formate dehydrogenase N (FDH-N) and similar proteins. This family contains beta FeS subunits of several dehydrogenases in the DMSO reductase superfamily, including formate dehydrogenase N (FDH-N), tungsten-containing formate dehydrogenase (W-FDH) and other similar proteins. FDH-N is a major component of nitrate respiration of Escherichia coli; it catalyzes the oxidation of formate to carbon dioxide, donating the electrons to a second substrate to a cytochrome.  W-FDH contains a tungsten instead of molybdenum at the catalytic center and seems to be exclusively found in organisms such as hyperthermophilic archaea that live in extreme environments. It catalyzes the oxidation of formate to carbon dioxide, donating the electrons to a second substrate."
definition: >-
  beta FeS subunits of formate dehydrogenase N (FDH-N) and similar proteins. This family contains beta FeS subunits of several dehydrogenases in the DMSO reductase superfamily, including formate dehydrogenase N (FDH-N), tungsten-containing formate dehydrogenase (W-FDH) and other similar proteins. FDH-N is a major component of nitrate respiration of Escherichia coli; it catalyzes the oxidation of formate to carbon dioxide, donating the electrons to a second substrate to a cytochrome. W-FDH contains a tungsten instead of molybdenum at the catalytic center and seems to be exclusively found in organisms such as hyperthermophilic archaea that live in extreme environments. It catalyzes the oxidation of formate to carbon dioxide, donating the electrons to a second substrate. — an NCBI CDD conserved domain (cd16366); members share this curated model.
