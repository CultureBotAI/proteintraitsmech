identifier: CDD:cd05763
label: "Immunoglobulin (Ig)-like ectodomain of the LRIG1 (Leucine-rich Repeats And Immunoglobulin-like Domains Protein 1) and similar proteins; member of the I-set of IgSF domains. The members here are composed of subgroup of the immunoglobulin (Ig) domain found in the Ig superfamily. The Ig superfamily is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. A predominant feature of most Ig domains is a disulfide bridge connecting the two beta-sheets with a tryptophan residue packed against the disulfide bond. The ectodomain of LRIG1 has two distinct regions: the proposed 15 LRRs and three Ig-like domains closer to the membrane. LRIG1 has been reported to interact with many receptor tyrosine kinases, GDNF/c-Ret, E-cadherin, JAK/STAT, c-Met, and the EGFR family signaling systems. Immunoglobulin Superfamily (IgSF) domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The structure of the LRIG1 extracellular Ig domain lacks a C\" strand and thus is better described as a member of the I-set of IgSF domains."
definition: >-
  Immunoglobulin (Ig)-like ectodomain of the LRIG1 (Leucine-rich Repeats And Immunoglobulin-like Domains Protein 1) and similar proteins; member of the I-set of IgSF domains. The members here are composed of subgroup of the immunoglobulin (Ig) domain found in the Ig superfamily. The Ig superfamily is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. A predominant feature of most Ig domains is a disulfide bridge connecting the two beta-sheets with a tryptophan residue packed against the disulfide bond. The ectodomain of LRIG1 has two distinct regions: the proposed 15 LRRs and three Ig-like domains closer to the membrane. LRIG1 has been reported to interact with many receptor tyrosine kinases, GDNF/c-Ret, E-cadherin, JAK/STAT, c-Met, and the EGFR family signaling systems. Immunoglobulin Superfamily (IgSF) domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The structure of the LRIG1 extracellular Ig domain lacks a C" strand and thus is better described as a member of the I-set of IgSF domains. — an NCBI CDD conserved domain (cd05763); members share this curated model.
