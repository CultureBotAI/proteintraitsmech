identifier: CDD:cd22113
label: "F-box domain found in F-box only protein 48 (FBXO48) and similar proteins. FBXO48, also called FBX48, is one of the paralogs of the F-box only protein 7 (FBXO7), which is the causative gene for PARK15 (also known as Parkinsonian-pyramidal disease, PPD). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 48 (FBXO48) and similar proteins. FBXO48, also called FBX48, is one of the paralogs of the F-box only protein 7 (FBXO7), which is the causative gene for PARK15 (also known as Parkinsonian-pyramidal disease, PPD). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22113); members share this curated model.
