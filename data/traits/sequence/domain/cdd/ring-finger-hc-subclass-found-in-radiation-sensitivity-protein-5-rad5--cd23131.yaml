identifier: CDD:cd23131
label: "RING finger, HC subclass, found in radiation sensitivity protein 5 (RAD5) and similar proteins. RAD5, also known as revertibility protein 2 (REV2), or DNA repair protein RAD5, is a probable helicase, and a member of the UBC2/RAD6 epistasis group. It functions with the DNA repair protein RAD18 in error-free postreplication DNA repair. It is involved in the maintenance of wild-type rates of instability of simple repetitive sequences such as poly(GT) repeats. It may also be involved in maintaining a balance which acts in favor of error-prone non-homologous joining during DNA double-strand breaks repairs. It recruits the UBC13-MMS2 dimer to chromatin for DNA repair. RAD5 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in radiation sensitivity protein 5 (RAD5) and similar proteins. RAD5, also known as revertibility protein 2 (REV2), or DNA repair protein RAD5, is a probable helicase, and a member of the UBC2/RAD6 epistasis group. It functions with the DNA repair protein RAD18 in error-free postreplication DNA repair. It is involved in the maintenance of wild-type rates of instability of simple repetitive sequences such as poly(GT) repeats. It may also be involved in maintaining a balance which acts in favor of error-prone non-homologous joining during DNA double-strand breaks repairs. It recruits the UBC13-MMS2 dimer to chromatin for DNA repair. RAD5 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23131); members share this curated model.
