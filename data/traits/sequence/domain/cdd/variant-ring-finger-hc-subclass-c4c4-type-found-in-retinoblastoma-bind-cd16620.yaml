identifier: CDD:cd16620
label: "Variant RING finger, HC subclass (C4C4-type), found in retinoblastoma-binding protein 6 (RBBP6) and similar proteins. RBBP6, also known as proliferation potential-related protein, protein P2P-R, retinoblastoma-binding Q protein 1 (RBQ-1), or p53-associated cellular protein of testis (PACT), is a nuclear E3 ubiquitin-protein ligase involved in multiple processes, such as the control of gene expression, mitosis, cell differentiation, and cell apoptosis. It plays a role in both promoting and inhibiting apoptosis in many human cancers, including esophageal, lung, hepatocellular, and colon cancers, familial myeloproliferative neoplasms, as well as in human immunodeficiency virus-associated nephropathy (HIVAN). It functions as an Rb- and p53-binding protein that plays an important role in chaperone-mediated ubiquitination and possibly in protein quality control. It acts as a scaffold protein to promote the assembly of the p53/TP53-MDM2 complex, resulting in an increase of MDM2-mediated ubiquitination and degradation of p53/TP53, and leading to both apoptosis and cell growth. It is also a double-stranded RNA-binding protein that plays a role in mRNA processing by regulating the human polyadenylation machinery and modulating expression of mRNAs with AU-rich 3' untranslated regions (UTRs). Moreover, RBBP6 ubiquitinates and destabilizes the transcriptional repressor ZBTB38 that negatively regulates transcription and levels of the MCM10 replication factor on chromatin. Furthermore, RBBP6 is involved in tunicamycin-induced apoptosis by mediating protein kinase (PKR) activation. RBBP6 contains an N-terminal ubiquitin-like domain and a C4C4-type RING finger, whose overall folding is similar to that of the typical C3HC4-type RING-HC finger. RBBP6 interacts with chaperones Hsp70 and Hsp40 through its N-terminal ubiquitin-like domain. It promotes the ubiquitination of p53 by Hdm2 in an E4-like manner through its RING finger. It also interacts directly with the pro-proliferative transcription factor Y-box-binding protein-1 (YB-1) via its RING finger."
definition: >-
  Variant RING finger, HC subclass (C4C4-type), found in retinoblastoma-binding protein 6 (RBBP6) and similar proteins. RBBP6, also known as proliferation potential-related protein, protein P2P-R, retinoblastoma-binding Q protein 1 (RBQ-1), or p53-associated cellular protein of testis (PACT), is a nuclear E3 ubiquitin-protein ligase involved in multiple processes, such as the control of gene expression, mitosis, cell differentiation, and cell apoptosis. It plays a role in both promoting and inhibiting apoptosis in many human cancers, including esophageal, lung, hepatocellular, and colon cancers, familial myeloproliferative neoplasms, as well as in human immunodeficiency virus-associated nephropathy (HIVAN). It functions as an Rb- and p53-binding protein that plays an important role in chaperone-mediated ubiquitination and possibly in protein quality control. It acts as a scaffold protein to promote the assembly of the p53/TP53-MDM2 complex, resulting in an increase of MDM2-mediated ubiquitination and degradation of p53/TP53, and leading to both apoptosis and cell growth. It is also a double-stranded RNA-binding protein that plays a role in mRNA processing by regulating the human polyadenylation machinery and modulating expression of mRNAs with AU-rich 3' untranslated regions (UTRs). Moreover, RBBP6 ubiquitinates and destabilizes the transcriptional repressor ZBTB38 that negatively regulates transcription and levels of the MCM10 replication factor on chromatin. Furthermore, RBBP6 is involved in tunicamycin-induced apoptosis by mediating protein kinase (PKR) activation. RBBP6 contains an N-terminal ubiquitin-like domain and a C4C4-type RING finger, whose overall folding is similar to that of the typical C3HC4-type RING-HC finger. RBBP6 interacts with chaperones Hsp70 and Hsp40 through its N-terminal ubiquitin-like domain. It promotes the ubiquitination of p53 by Hdm2 in an E4-like manner through its RING finger. It also interacts directly with the pro-proliferative transcription factor Y-box-binding protein-1 (YB-1) via its RING finger. — an NCBI CDD conserved domain (cd16620); members share this curated model.
