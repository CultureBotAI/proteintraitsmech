identifier: CDD:cd14547
label: "catalytic domain of the kinase interaction motif (KIM) family of protein-tyrosine phosphatases. The kinase interaction motif (KIM) family of protein-tyrosine phosphatases (PTPs) includes tyrosine-protein phosphatases non-receptor type 7 (PTPN7) and non-receptor type 5 (PTPN5), and protein-tyrosine phosphatase receptor type R (PTPRR). PTPN7 is also called hematopoietic protein-tyrosine phosphatase (HePTP) while PTPN5 is also called  striatal-enriched protein-tyrosine phosphatase (STEP). They belong to the family of classical tyrosine-specific PTPs (EC 3.1.3.48) that catalyze the dephosphorylation of phosphotyrosine peptides. KIM-PTPs are characterized by the presence of a 16-amino-acid KIM that binds specifically to members of the MAPK (mitogen-activated protein kinase) family. They are highly specific to the MAPKs ERK1/2 (extracellular-signal-regulated kinase 1/2) and p38, over JNK (c-Jun N-terminal kinase); they dephosphorylate these kinases and thereby critically modulate cell proliferation and differentiation."
definition: >-
  catalytic domain of the kinase interaction motif (KIM) family of protein-tyrosine phosphatases. The kinase interaction motif (KIM) family of protein-tyrosine phosphatases (PTPs) includes tyrosine-protein phosphatases non-receptor type 7 (PTPN7) and non-receptor type 5 (PTPN5), and protein-tyrosine phosphatase receptor type R (PTPRR). PTPN7 is also called hematopoietic protein-tyrosine phosphatase (HePTP) while PTPN5 is also called striatal-enriched protein-tyrosine phosphatase (STEP). They belong to the family of classical tyrosine-specific PTPs (EC 3.1.3.48) that catalyze the dephosphorylation of phosphotyrosine peptides. KIM-PTPs are characterized by the presence of a 16-amino-acid KIM that binds specifically to members of the MAPK (mitogen-activated protein kinase) family. They are highly specific to the MAPKs ERK1/2 (extracellular-signal-regulated kinase 1/2) and p38, over JNK (c-Jun N-terminal kinase); they dephosphorylate these kinases and thereby critically modulate cell proliferation and differentiation. — an NCBI CDD conserved domain (cd14547); members share this curated model.
