identifier: CDD:cd22354
label: RecU-like
definition: >-
  Holliday junction resolvase RecU (recombination protein U) and similar nucleases. Holliday junction (HJ) resolving enzyme RecU is involved in DNA repair and recombination. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI
