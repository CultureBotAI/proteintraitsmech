identifier: CDD:cd19371
label: "Uracil DNA glycosylase family 1, includes Human uracil DNA glycosylase, Vaccinia virus protein D4, Nitratifractor salsuginis UNG and similar proteins. Uracil DNA glycosylase family 1 is the most efficient of all uracil-DNA glycosylases (UDGs, also known as UNGs) and shows a specificity for uracil in DNA. UDG catalyzes the removal of uracil from DNA to initiate the DNA base excision repair pathway. Uracil in DNA can arise as a result of misincorporation of dUMP residues by DNA polymerase or deamination of cytosine. Uracil mispaired with guanine in DNA is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other. More distant members of UDG family 1 include Nitratifractor salsuginis UNG (NsaUNG) and Vaccinia virus (VAVC) protein D4 uracil-DNA glycosylase, a subunit of the VACV DNA polymerase holoenzyme. NsaUNG only exhibits robust enzymatic activity on uracil-containing DNAs, in particular double-stranded uracil-containing substrates; it does not act on hypoxanthine- and xanthine-containing substrates. NsUNG is not inhibited by Ugi protein that specifically inhibits conventional family 1 UDGs. D4, in addition to excising uracil residues from DNA, is part of a heterodimeric processivity factor which potentiates the DNA polymerase activity."
definition: >-
  Uracil DNA glycosylase family 1, includes Human uracil DNA glycosylase, Vaccinia virus protein D4, Nitratifractor salsuginis UNG and similar proteins. Uracil DNA glycosylase family 1 is the most efficient of all uracil-DNA glycosylases (UDGs, also known as UNGs) and shows a specificity for uracil in DNA. UDG catalyzes the removal of uracil from DNA to initiate the DNA base excision repair pathway. Uracil in DNA can arise as a result of misincorporation of dUMP residues by DNA polymerase or deamination of cytosine. Uracil mispaired with guanine in DNA is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other. More distant members of UDG family 1 include Nitratifractor salsuginis UNG (NsaUNG) and Vaccinia virus (VAVC) protein D4 uracil-DNA glycosylase, a subunit of the VACV DNA polymerase holoenzyme. NsaUNG only exhibits robust enzymatic activity on uracil-containing DNAs, in particular double-stranded uracil-containing substrates; it does not act on hypoxanthine- and xanthine-containing substrates. NsUNG is not inhibited by Ugi protein that specifically inhibits conventional family 1 UDGs. D4, in addition to excising uracil residues from DNA, is part of a heterodimeric processivity factor which potentiates the DNA polymerase activity. — an NCBI CDD conserved domain (cd19371); members share this curated model.
