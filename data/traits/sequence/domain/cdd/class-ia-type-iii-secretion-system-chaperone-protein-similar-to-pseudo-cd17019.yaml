identifier: CDD:cd17019
label: T3SC_IA_ShcA-like
definition: >-
  Class IA type III secretion system chaperone protein, similar to Pseudomonas syringae chaperone protein ShcA. This family includes type III secretion system (T3SS) chaperone proteins similar to Pseudomonas syringae ShcA and similar proteins. In P. syringae, which is a plant pathogen that can infect a wide range of species, the T3SS allows injection of the effector HopA1 (previously known as HopPsyA or HrmA), a protein that has unknown functions in the host cell but possesses close homologs that trigger the plant hypersensitive response in resistant strains. Chaperone ShcA binding to Hop1A shows that interactions in animal pathogens are preserved in the Gram-negative pathogens of plants
