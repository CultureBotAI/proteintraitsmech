identifier: CDD:cd14577
label: "dual specificity protein phosphatase 13 isoform B. Dual specificity protein phosphatase 13 isoform B (DUSP13B), also called testis- and skeletal-muscle-specific DSP (TMDP) or dual specificity phosphatase SKRP4, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. DUSP13B is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. DUSP13B inactivates MAPK activation in the order of selectivity, JNK = p38 > ERK in cells. It may play a role  in protection from external stress during spermatogenesis."
