identifier: CDD:cd21276
label: "calponin homology (CH) domain found in Ras GTPase-activating-like protein IQGAP3. IQ motif containing GTPase activating protein 3 (IQGAP3) associates with Ras GTP-binding proteins. It regulates the organization of the cytoskeleton under the regulation of Rac1 and Cdc42 in neuronal cells. The depletion of IQGAP3 is shown to impair neurite or axon outgrowth in neuronal cells with disorganized cytoskeleton.  It belongs to the IQGAP family, which consists of multi-domain proteins having a calponin-homology (CH) domain which binds F-actin, IQGAP-specific repeats, a single WW domain, four IQ motifs that mediate interactions with calmodulin, and a RasGAP related domain that binds active Rho family GTPases. IQGAP3 contains a single copy of the CH domain at the N-terminus."
definition: >-
  calponin homology (CH) domain found in Ras GTPase-activating-like protein IQGAP3. IQ motif containing GTPase activating protein 3 (IQGAP3) associates with Ras GTP-binding proteins. It regulates the organization of the cytoskeleton under the regulation of Rac1 and Cdc42 in neuronal cells. The depletion of IQGAP3 is shown to impair neurite or axon outgrowth in neuronal cells with disorganized cytoskeleton. It belongs to the IQGAP family, which consists of multi-domain proteins having a calponin-homology (CH) domain which binds F-actin, IQGAP-specific repeats, a single WW domain, four IQ motifs that mediate interactions with calmodulin, and a RasGAP related domain that binds active Rho family GTPases. IQGAP3 contains a single copy of the CH domain at the N-terminus. — an NCBI CDD conserved domain (cd21276); members share this curated model.
