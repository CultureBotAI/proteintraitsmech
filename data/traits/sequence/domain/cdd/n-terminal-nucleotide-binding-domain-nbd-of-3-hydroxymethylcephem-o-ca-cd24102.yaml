identifier: CDD:cd24102
label: "N-terminal nucleotide-binding domain (NBD) of 3'-hydroxymethylcephem-O-carbamoyltransferase (CmcH) and similar proteins. CmcH (EC 2.1.3.7), also called 3'-hydroxymethylcephem-O-CASE (CCT), has 3-hydroxymethylcephem carbamoyltransferase activity. It catalyzes the carbamoylation reaction in the cephamycin (antibiotic) biosynthesis. Members of this family consist of two domains. The model corresponds to the N-terminal Kae1-like domain."
definition: >-
  N-terminal nucleotide-binding domain (NBD) of 3'-hydroxymethylcephem-O-carbamoyltransferase (CmcH) and similar proteins. CmcH (EC 2.1.3.7), also called 3'-hydroxymethylcephem-O-CASE (CCT), has 3-hydroxymethylcephem carbamoyltransferase activity. It catalyzes the carbamoylation reaction in the cephamycin (antibiotic) biosynthesis. Members of this family consist of two domains. The model corresponds to the N-terminal Kae1-like domain. — an NCBI CDD conserved domain (cd24102); members share this curated model.
