identifier: CDD:cd16542
label: "RING finger, HC subclass, found in RING finger protein 125 (RNF125). RNF125, also known as T-cell RING activation protein 1 (TRAC-1), is an E3 ubiquitin-protein ligase that is predominantly expressed in lymphoid cells, and functions as a positive regulator of T cell activation. It also down-modulates HIV replication and inhibits pathogen-induced cytokine production. It negatively regulates type I interferon signaling, which conjugates Lys(48)-linked ubiquitination to retinoic acid-inducible gene-I (RIG-I) and subsequently leads to the proteasome-dependent degradation of RIG-I. Further, RNF125 conjugates ubiquitin to melanoma differentiation-associated gene 5 (MDA5), a family protein of RIG-I. It thus acts as a negative regulator of RIG-I signaling, and is a direct target of miR-15b in the context of Japanese encephalitis virus (JEV) infection. Moreover, RNF125 binds to and ubiquitinates JAK1, prompting its degradation and inhibition of receptor tyrosine kinase (RTK) expression. It also negatively regulates p53 function through physical interaction and ubiquitin-mediated proteasome degradation. Mutations in RNF125 may lead to overgrowth syndromes (OGS). RNF125, together with three closely related proteins: RNF114, RNF138 and RNF166, forms a novel family of ubiquitin ligases with a C3HC4-type RING-HC finger, a C2HC-, and two C2H2-type zinc fingers, as well as a ubiquitin interacting motif (UIM). The UIM of RNF125 binds K48-linked poly-ubiquitin chains and is, together with the RING domain, required for auto-ubiquitination."
definition: >-
  RING finger, HC subclass, found in RING finger protein 125 (RNF125). RNF125, also known as T-cell RING activation protein 1 (TRAC-1), is an E3 ubiquitin-protein ligase that is predominantly expressed in lymphoid cells, and functions as a positive regulator of T cell activation. It also down-modulates HIV replication and inhibits pathogen-induced cytokine production. It negatively regulates type I interferon signaling, which conjugates Lys(48)-linked ubiquitination to retinoic acid-inducible gene-I (RIG-I) and subsequently leads to the proteasome-dependent degradation of RIG-I. Further, RNF125 conjugates ubiquitin to melanoma differentiation-associated gene 5 (MDA5), a family protein of RIG-I. It thus acts as a negative regulator of RIG-I signaling, and is a direct target of miR-15b in the context of Japanese encephalitis virus (JEV) infection. Moreover, RNF125 binds to and ubiquitinates JAK1, prompting its degradation and inhibition of receptor tyrosine kinase (RTK) expression. It also negatively regulates p53 function through physical interaction and ubiquitin-mediated proteasome degradation. Mutations in RNF125 may lead to overgrowth syndromes (OGS). RNF125, together with three closely related proteins: RNF114, RNF138 and RNF166, forms a novel family of ubiquitin ligases with a C3HC4-type RING-HC finger, a C2HC-, and two C2H2-type zinc fingers, as well as a ubiquitin interacting motif (UIM). The UIM of RNF125 binds K48-linked poly-ubiquitin chains and is, together with the RING domain, required for auto-ubiquitination. — an NCBI CDD conserved domain (cd16542); members share this curated model.
