  orphan G protein-coupled receptor 153, member of the class A family of seven-transmembrane G protein-coupled receptors. This subgroup represents the G-protein coupled receptor 153 (GPR153) with unknown endogenous ligand and function. GPR153 shares a common evolutionary origin with GPR162 and is highly expressed in central nervous system (CNS) including the thalamus, cerebellum, and the arcuate nucleus. Although categorized as a member of the rhodopsin-like class A GPCRs, GPR153 contains HRM-motif instead of the highly conserved Asp-Arg-Tyr (DRY) motif found in the third transmembrane helix (TM3) of class A receptors and important for efficient G protein-coupled signal transduction. Moreover, the LPxFL motif, a variant of NPxxY motif that plays a crucial role during receptor activation, is found at the end of TM7 in GPR153. All GPCRs have a common structural architecture comprising of seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops. A general feature of GPCR signaling is agonist-induced conformational changes in the receptors, leading to activation of the heterotrimeric G proteins, which consist of the guanine nucleotide-binding G-alpha subunit and the dimeric G-beta-gamma subunits. The activated G proteins then bind to and activate numerous downstream effector proteins, which generate second messengers that mediate a broad range of cellular and physiological processes. — an NCBI CDD conserved domain (cd15907); members share this curated model.
