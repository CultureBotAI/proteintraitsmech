identifier: CDD:cd21426
label: "coiled-coil domain of non-essential kinetochore protein 1 (NKP1) and similar protein. NKP1, also called constitutive centromere-associated network protein NKP1, is a Component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. The model corresponds to a coiled-coil domain of NKP1, which may mediate functionally important protein-protein interactions."
definition: >-
  coiled-coil domain of non-essential kinetochore protein 1 (NKP1) and similar protein. NKP1, also called constitutive centromere-associated network protein NKP1, is a Component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. The model corresponds to a coiled-coil domain of NKP1, which may mediate functionally important protein-protein interactions. — an NCBI CDD conserved domain (cd21426); members share this curated model.
