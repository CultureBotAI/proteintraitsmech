identifier: CDD:cd20265
label: "LYR (leucine-tyrosine-arginine) motif found in electron transfer flavoprotein regulatory factor 1 (ETFRF1) and similar proteins. ETFRF1, also called LYR motif-containing protein 5 (LYRM5), or Ghiso (growth-factor inducible soluble) factor, acts as a regulator of the electron transfer flavoprotein by promoting the removal of flavin from the ETF holoenzyme (composed of ETFA and ETFB). It belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus."
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in electron transfer flavoprotein regulatory factor 1 (ETFRF1) and similar proteins. ETFRF1, also called LYR motif-containing protein 5 (LYRM5), or Ghiso (growth-factor inducible soluble) factor, acts as a regulator of the electron transfer flavoprotein by promoting the removal of flavin from the ETF holoenzyme (composed of ETFA and ETFB). It belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus. — an NCBI CDD conserved domain (cd20265); members share this curated model.
