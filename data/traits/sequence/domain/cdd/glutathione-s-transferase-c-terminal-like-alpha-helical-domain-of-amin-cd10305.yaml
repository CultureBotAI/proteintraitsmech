identifier: CDD:cd10305
label: "Glutathione S-transferase C-terminal-like, alpha helical domain of Aminoacyl tRNA synthetase complex-Interacting Multifunctional Protein 3. Glutathione S-transferase (GST) C-terminal domain family, Aminoacyl tRNA synthetase complex-Interacting Multifunctional Protein (AIMP) 3 subfamily; AIMPs are non-enzymatic cofactors that play critical roles in the assembly and formation of a macromolecular multi-tRNA synthetase protein complex that functions as a molecular hub to coordinate protein synthesis. There are three AIMPs, named AIMP1-3, which play diverse regulatory roles. AIMP3, also called p18 or eukaryotic translation elongation factor 1 epsilon-1 (EEF1E1), contains a C-terminal domain with similarity to the C-terminal alpha helical domain of GSTs. It specifically interacts with methionyl-tRNA synthetase (MetRS) and is translocated to the nucleus during DNA synthesis or in response to DNA damage and oncogenic stress. In the nucleus, it interacts with ATM and ATR, which are upstream kinase regulators of p53. It appears to work against DNA damage in cooperation with AIMP2, and similar to AIMP2, AIMP3 is also a haploinsufficient tumor suppressor. AIMP3 transgenic mice have shorter lifespans than wild-type mice and they show characteristics of progeria, suggesting that AIMP3 may also be involved in cellular and organismal aging."
