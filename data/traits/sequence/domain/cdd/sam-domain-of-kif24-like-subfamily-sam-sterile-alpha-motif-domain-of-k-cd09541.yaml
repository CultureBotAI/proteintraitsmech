identifier: CDD:cd09541
label: "SAM domain of KIF24-like subfamily. SAM (sterile alpha motif) domain of KIF24 subfamily is a putative protein-protein interaction domain. This subfamily includes proteins related to human kinesin-like protein KIF24. SAM domain is located at the N-terminus followed by kinesin motor domain. Kinesins are proteins involved in a number of different cell processes including microtubule dynamics and axonal transport. Kinesins of this group belong to N-type; they drive microtubule plus end-directed transport. SAM apparently plays the role of adaptor or scaffold domain. In many cases SAM is known as a mediator of dimerization/oligomerization."
definition: >-
  SAM domain of KIF24-like subfamily. SAM (sterile alpha motif) domain of KIF24 subfamily is a putative protein-protein interaction domain. This subfamily includes proteins related to human kinesin-like protein KIF24. SAM domain is located at the N-terminus followed by kinesin motor domain. Kinesins are proteins involved in a number of different cell processes including microtubule dynamics and axonal transport. Kinesins of this group belong to N-type; they drive microtubule plus end-directed transport. SAM apparently plays the role of adaptor or scaffold domain. In many cases SAM is known as a mediator of dimerization/oligomerization. — an NCBI CDD conserved domain (cd09541); members share this curated model.
