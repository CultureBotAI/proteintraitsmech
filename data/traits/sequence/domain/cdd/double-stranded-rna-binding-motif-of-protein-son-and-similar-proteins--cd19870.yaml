identifier: CDD:cd19870
label: "double-stranded RNA binding motif of protein SON and similar proteins. Protein SON (also known as Bax antagonist selected in saccharomyces 1 (BASS1), negative regulatory element-binding protein (NRE-binding protein), or protein DBP-5, or SON3) is an RNA-binding protein which acts as an mRNA splicing cofactor by promoting efficient splicing of transcripts that possess weak splice sites. It specifically promotes splicing of many cell-cycle and DNA-repair transcripts that possess weak splice sites, such as TUBG1, KATNB1, TUBGCP2, AURKB, PCNT, AKT1, RAD23A, and FANCG. Members of this group contain a double-stranded RNA binding motif (DSRM) at the C-terminus. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of protein SON and similar proteins. Protein SON (also known as Bax antagonist selected in saccharomyces 1 (BASS1), negative regulatory element-binding protein (NRE-binding protein), or protein DBP-5, or SON3) is an RNA-binding protein which acts as an mRNA splicing cofactor by promoting efficient splicing of transcripts that possess weak splice sites. It specifically promotes splicing of many cell-cycle and DNA-repair transcripts that possess weak splice sites, such as TUBG1, KATNB1, TUBGCP2, AURKB, PCNT, AKT1, RAD23A, and FANCG. Members of this group contain a double-stranded RNA binding motif (DSRM) at the C-terminus. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19870); members share this curated model.
