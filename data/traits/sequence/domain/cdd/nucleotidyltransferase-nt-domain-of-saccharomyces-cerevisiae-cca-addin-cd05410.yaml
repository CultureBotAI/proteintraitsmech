identifier: CDD:cd05410
label: "Nucleotidyltransferase (NT) domain of  Saccharomyces cerevisiae CCA-adding enzyme, class II, and related proteins. NT_ScCCA1_like:  Saccharomyces cerevisiae CCA-adding enzyme [ATP (CTP): tRNA nucleotidyltransferase, CCAase, CCA1p]-like, class II. CCAase in a template-independent reaction adds the precise sequence [cytidine(C)-cytidine-adenosine (A)], one nucleotide at a time, onto the 3prime end of tRNA. A single catalytic pocket appears to recognize both ATP and CTP substrates. The class II group of CCAase enzymes is comprised mainly of eubacterial and eukaryotic enzymes. This subgroup includes proteins similar to S. cerevisiae CCA1p; the CCA1 gene encodes mitochondrial, cytosolic, and nuclear CCAase isozymes, accommodating the multiple locations of tRNA biosynthesis. Class II CCAases are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group."
definition: >-
  Nucleotidyltransferase (NT) domain of Saccharomyces cerevisiae CCA-adding enzyme, class II, and related proteins. NT_ScCCA1_like: Saccharomyces cerevisiae CCA-adding enzyme [ATP (CTP): tRNA nucleotidyltransferase, CCAase, CCA1p]-like, class II. CCAase in a template-independent reaction adds the precise sequence [cytidine(C)-cytidine-adenosine (A)], one nucleotide at a time, onto the 3prime end of tRNA. A single catalytic pocket appears to recognize both ATP and CTP substrates. The class II group of CCAase enzymes is comprised mainly of eubacterial and eukaryotic enzymes. This subgroup includes proteins similar to S. cerevisiae CCA1p; the CCA1 gene encodes mitochondrial, cytosolic, and nuclear CCAase isozymes, accommodating the multiple locations of tRNA biosynthesis. Class II CCAases are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. — an NCBI CDD conserved domain (cd05410); members share this curated model.
