identifier: CDD:cd12904
label: "SPRY domain in Ro-Ret family. This domain, named BSPRY, has been identified in the Ro-Ret family, since the protein is composed of a B-box, an alpha-helical coiled coil and a SPRY domain. The gene for BSPRY resides on human chromosome 9 and is specifically expressed in testis. The function of BSPRY is not known, but several related proteins of the RING-Box-coiled-coil (RBCC) family have been implicated in cell transformation."
definition: >-
  SPRY domain in Ro-Ret family. This domain, named BSPRY, has been identified in the Ro-Ret family, since the protein is composed of a B-box, an alpha-helical coiled coil and a SPRY domain. The gene for BSPRY resides on human chromosome 9 and is specifically expressed in testis. The function of BSPRY is not known, but several related proteins of the RING-Box-coiled-coil (RBCC) family have been implicated in cell transformation. — an NCBI CDD conserved domain (cd12904); members share this curated model.
