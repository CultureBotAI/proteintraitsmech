identifier: CDD:cd20430
label: "Tudor domain found in Tudor domain-containing protein 8 (TDRD8) and similar proteins. TDRD8, also called serine/threonine-protein kinase (EC 2.7.11.1) 31 (STK31), serine/threonine-protein kinase NYD-SPK, or Sugen kinase 396 (SgK396), is a germ cell-specific factor expressed in embryonic gonocytes of both sexes, and in postnatal spermatocytes and round spermatids in males. It acts as a cell-cycle regulated protein that contributes to the tumorigenicity of epithelial cancer cells. TDRD8 contains a Tudor domain and a serine/threonine kinase domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Tudor domain-containing protein 8 (TDRD8) and similar proteins. TDRD8, also called serine/threonine-protein kinase (EC 2.7.11.1) 31 (STK31), serine/threonine-protein kinase NYD-SPK, or Sugen kinase 396 (SgK396), is a germ cell-specific factor expressed in embryonic gonocytes of both sexes, and in postnatal spermatocytes and round spermatids in males. It acts as a cell-cycle regulated protein that contributes to the tumorigenicity of epithelial cancer cells. TDRD8 contains a Tudor domain and a serine/threonine kinase domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20430); members share this curated model.
