identifier: CDD:cd20625
label: "cytochrome P450 family 164 and similar cytochrome P450s. This group is composed mostly of bacterial cytochrome P450s from multiple families, including Mycobacterium smegmatis CYP164A2, Streptomyces sp. CYP245A1, Bacillus subtilis CYP107H1, Micromonospora echinospora P450 oxidase Calo2, and putative P450s such as Xylella fastidiosa CYP133 and Mycobacterium tuberculosis CYP140. CYP107H1, also called cytochrome P450(BioI), catalyzes the C-C bond cleavage of fatty acid linked to acyl carrier protein (ACP) to generate pimelic acid for biotin biosynthesis. CYP245A1, also called cytochrome P450 StaP, catalyzes the intramolecular C-C bond formation and oxidative decarboxylation of chromopyrrolic acid (CPA) to form the indolocarbazole core, a key step in staurosporine biosynthesis. CalO2 is involved in calicheamicin biosynthesis. The CYP164-like group belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 164 and similar cytochrome P450s. This group is composed mostly of bacterial cytochrome P450s from multiple families, including Mycobacterium smegmatis CYP164A2, Streptomyces sp. CYP245A1, Bacillus subtilis CYP107H1, Micromonospora echinospora P450 oxidase Calo2, and putative P450s such as Xylella fastidiosa CYP133 and Mycobacterium tuberculosis CYP140. CYP107H1, also called cytochrome P450(BioI), catalyzes the C-C bond cleavage of fatty acid linked to acyl carrier protein (ACP) to generate pimelic acid for biotin biosynthesis. CYP245A1, also called cytochrome P450 StaP, catalyzes the intramolecular C-C bond formation and oxidative decarboxylation of chromopyrrolic acid (CPA) to form the indolocarbazole core, a key step in staurosporine biosynthesis. CalO2 is involved in calicheamicin biosynthesis. The CYP164-like group belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20625); members share this curated model.
