identifier: CDD:cd19547
label: "Condensation domain of nonribosomal peptide synthetases (NRPSs) similar to Nocardia uniformis NocB which exhibits an unusual cyclization to form beta-lactam rings in pro-nocardicin G synthesis. Nocardia uniformis NRPS NocB acts centrally in the biosynthesis of the nocardicin monocyclic beta-lactam antibiotics. Along with another NRPS NocA, it mediates an unusual cyclization to form beta-lactam rings in the synthesis of the beta-lactam-containing pentapeptide pro-nocardicin G. This small subfamily is related to DCL-type Condensation (C) domains, which catalyze condensation between a D-aminoacyl/peptidyl-PCP donor and a L-aminoacyl-PCP acceptor. NRPSs catalyze peptide bond formation within (usually) large multi-modular enzymatic complexes. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long (with various activities such as antibiotic, antifungal, antitumor and immunosuppression). There are various subtypes of C-domains such as the LCL-type which catalyzes peptide bond formation between two L-amino acids, the DCL-type which links an L-amino acid to the D-amino acid at the end of a growing peptide, starter C-domains which acylate the first amino acid with a beta-hydroxy carboxylic acid, and heterocyclization (Cyc) domains which catalyze both peptide bond formation and cyclization of Cys, Ser, or Thr residues. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a C-domain. NRPS modules may also include specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C (epimerization and condensation) domains, and the X-domain. C-domains typically have a conserved HHxxxD motif at the active site; domains belonging to this subfamily have an HHHxxxD motif at the active site."
definition: >-
  Condensation domain of nonribosomal peptide synthetases (NRPSs) similar to Nocardia uniformis NocB which exhibits an unusual cyclization to form beta-lactam rings in pro-nocardicin G synthesis. Nocardia uniformis NRPS NocB acts centrally in the biosynthesis of the nocardicin monocyclic beta-lactam antibiotics. Along with another NRPS NocA, it mediates an unusual cyclization to form beta-lactam rings in the synthesis of the beta-lactam-containing pentapeptide pro-nocardicin G. This small subfamily is related to DCL-type Condensation (C) domains, which catalyze condensation between a D-aminoacyl/peptidyl-PCP donor and a L-aminoacyl-PCP acceptor. NRPSs catalyze peptide bond formation within (usually) large multi-modular enzymatic complexes. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long (with various activities such as antibiotic, antifungal, antitumor and immunosuppression). There are various subtypes of C-domains such as the LCL-type which catalyzes peptide bond formation between two L-amino acids, the DCL-type which links an L-amino acid to the D-amino acid at the end of a growing peptide, starter C-domains which acylate the first amino acid with a beta-hydroxy carboxylic acid, and heterocyclization (Cyc) domains which catalyze both peptide bond formation and cyclization of Cys, Ser, or Thr residues. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a C-domain. NRPS modules may also include specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C (epimerization and condensation) domains, and the X-domain. C-domains typically have a conserved HHxxxD motif at the active site; domains belonging to this subfamily have an HHHxxxD motif at the active site. — an NCBI CDD conserved domain (cd19547); members share this curated model.
