identifier: CDD:cd21137
label: "AA13 lytic polysaccharide monooxygenase, and similar proteins. This family contains starch-degrading (also called starch-active) lytic polysaccharide monooxygenase (LPMO), a representative of the new CAZy AA13 family and classified as an auxiliary activity enzyme. This enzyme acts on alpha-linked glycosidic bonds and displays a binding surface that is quite different from those of LPMOs acting on beta-linked glycosidic bonds, indicating that the AA13 family proteins interact with their substrate in a distinct fashion. The active site contains an amino-terminal histidine-ligated mononuclear copper. This enzyme generates aldonic acid-terminated malto-oligosaccharides from retrograded starch and significantly boosts the conversion of this recalcitrant substrate to maltose by beta-amylase."
definition: >-
  AA13 lytic polysaccharide monooxygenase, and similar proteins. This family contains starch-degrading (also called starch-active) lytic polysaccharide monooxygenase (LPMO), a representative of the new CAZy AA13 family and classified as an auxiliary activity enzyme. This enzyme acts on alpha-linked glycosidic bonds and displays a binding surface that is quite different from those of LPMOs acting on beta-linked glycosidic bonds, indicating that the AA13 family proteins interact with their substrate in a distinct fashion. The active site contains an amino-terminal histidine-ligated mononuclear copper. This enzyme generates aldonic acid-terminated malto-oligosaccharides from retrograded starch and significantly boosts the conversion of this recalcitrant substrate to maltose by beta-amylase. — an NCBI CDD conserved domain (cd21137); members share this curated model.
