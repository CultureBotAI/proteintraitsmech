identifier: CDD:cd12958
label: "Spindle and kinetochore-associated protein 1, N-terminal domain. SKA1 is a component of the SKA complex, which is formed by the association of three subunits (SKA1, SKA2, annd SKA3). The SKA complex is essential for accurate cell division. It functions with the Ndc80 network to establish stable kinetochore-microtubule interactions, which are crucial for the highly orchestrated chromosome movements during mitosis. The biological unit is a W-shaped homodimer of the three-subunit complex. This model represents the N-terminal domain of SKA1, which is involved in interactions with SKA2 and SKA3 to form the SKA complex. The C-terminal portion of SKA1 is involved in creating a microtubule-binding surface."
definition: >-
  Spindle and kinetochore-associated protein 1, N-terminal domain. SKA1 is a component of the SKA complex, which is formed by the association of three subunits (SKA1, SKA2, annd SKA3). The SKA complex is essential for accurate cell division. It functions with the Ndc80 network to establish stable kinetochore-microtubule interactions, which are crucial for the highly orchestrated chromosome movements during mitosis. The biological unit is a W-shaped homodimer of the three-subunit complex. This model represents the N-terminal domain of SKA1, which is involved in interactions with SKA2 and SKA3 to form the SKA complex. The C-terminal portion of SKA1 is involved in creating a microtubule-binding surface. — an NCBI CDD conserved domain (cd12958); members share this curated model.
