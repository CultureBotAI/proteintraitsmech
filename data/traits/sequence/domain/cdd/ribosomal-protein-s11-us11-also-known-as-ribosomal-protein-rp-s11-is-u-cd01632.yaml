identifier: CDD:cd01632
label: "Ribosomal protein S11. uS11, also known as Ribosomal Protein (RP)S11, is universally present in the small subunit of prokaryotic (RPS11) and eukaryotic (RPS14) ribosomes. The ribosome small subunit is one of the two subunits of ribosome organelle, that use mRNA as a template for protein synthesis in a process called translation. The small subunits of bacteria and eukaryotes have the same shape of head, body, platform, beak, and shoulder. RPS11 interacts with RPS7 which constitutes a contact between the 30 S head and platform. This interaction likely causes the conformational changes undergone by the 30 S during translation. Ribosomal proteins have functions during various cellular processes which are independent of the protein biosynthesis function. The S11 extra ribosomal functions might be in apoptotic and cancer cells which its expression is changed by intracellular environments, such as replication."
definition: >-
  Ribosomal protein S11. uS11, also known as Ribosomal Protein (RP)S11, is universally present in the small subunit of prokaryotic (RPS11) and eukaryotic (RPS14) ribosomes. The ribosome small subunit is one of the two subunits of ribosome organelle, that use mRNA as a template for protein synthesis in a process called translation. The small subunits of bacteria and eukaryotes have the same shape of head, body, platform, beak, and shoulder. RPS11 interacts with RPS7 which constitutes a contact between the 30 S head and platform. This interaction likely causes the conformational changes undergone by the 30 S during translation. Ribosomal proteins have functions during various cellular processes which are independent of the protein biosynthesis function. The S11 extra ribosomal functions might be in apoptotic and cancer cells which its expression is changed by intracellular environments, such as replication. — an NCBI CDD conserved domain (cd01632); members share this curated model.
