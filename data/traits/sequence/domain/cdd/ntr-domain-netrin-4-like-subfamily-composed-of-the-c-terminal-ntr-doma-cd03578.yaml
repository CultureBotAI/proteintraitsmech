identifier: CDD:cd03578
label: "NTR domain, Netrin-4-like subfamily; composed of the C-terminal NTR domains of netrin-4 (beta netrin) and similar proteins. Netrins are secreted proteins that function as tropic cues in the direction of axon growth and cell migration during neural development. Netrin-4 is a basement membrane component that is important in neural, kidney and vascular development. It may also be involved in regulating the outgrowth and shape of epithelial cells during lung branching morphogenesis."
definition: >-
  NTR domain, Netrin-4-like subfamily; composed of the C-terminal NTR domains of netrin-4 (beta netrin) and similar proteins. Netrins are secreted proteins that function as tropic cues in the direction of axon growth and cell migration during neural development. Netrin-4 is a basement membrane component that is important in neural, kidney and vascular development. It may also be involved in regulating the outgrowth and shape of epithelial cells during lung branching morphogenesis. — an NCBI CDD conserved domain (cd03578); members share this curated model.
