identifier: CDD:cd21436
label: "C-terminal domain of Saccharomyces cerevisiae V0 assembly protein 1 (Voa1) and similar protein. Voa1 is an assembly factor that functions with VMA21 in assembly of the integral membrane sector (also called V0 complex) of the V-ATPase in the endoplasmic reticulum. The model corresponds to the C-terminal domain of Voa1. It is a transmembrane alpha helix that is bound inside the proteolipid ring, where it contributes to the stability of the complex."
definition: >-
  C-terminal domain of Saccharomyces cerevisiae V0 assembly protein 1 (Voa1) and similar protein. Voa1 is an assembly factor that functions with VMA21 in assembly of the integral membrane sector (also called V0 complex) of the V-ATPase in the endoplasmic reticulum. The model corresponds to the C-terminal domain of Voa1. It is a transmembrane alpha helix that is bound inside the proteolipid ring, where it contributes to the stability of the complex. — an NCBI CDD conserved domain (cd21436); members share this curated model.
