identifier: CDD:cd07728
label: "Bacillus subtilis YtnP and related proteins; MBL-fold metallo hydrolase domain. Bacillus subtilis YtnP inhibits the signaling pathway required for the streptomycin production and development of aerial mycelium in Streptomyces griseus. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  Bacillus subtilis YtnP and related proteins; MBL-fold metallo hydrolase domain. Bacillus subtilis YtnP inhibits the signaling pathway required for the streptomycin production and development of aerial mycelium in Streptomyces griseus. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd07728); members share this curated model.
