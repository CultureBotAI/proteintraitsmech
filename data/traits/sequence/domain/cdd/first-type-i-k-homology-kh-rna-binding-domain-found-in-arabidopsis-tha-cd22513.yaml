label: "first type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana protein BTR1 and similar proteins. BTR1, also called Binding to ToMV RNA 1, is a negative regulator of tomato mosaic virus (ToMV) multiplication but has no effect on the multiplication of cucumber mosaic virus (CMV). BTR1 contains three K-homology (KH) RNA-binding domains. The model corresponds to the first one."
definition: >-
  first type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana protein BTR1 and similar proteins. BTR1, also called Binding to ToMV RNA 1, is a negative regulator of tomato mosaic virus (ToMV) multiplication but has no effect on the multiplication of cucumber mosaic virus (CMV). BTR1 contains three K-homology (KH) RNA-binding domains. The model corresponds to the first one. — an NCBI CDD conserved domain (cd22513); members share this curated model.
