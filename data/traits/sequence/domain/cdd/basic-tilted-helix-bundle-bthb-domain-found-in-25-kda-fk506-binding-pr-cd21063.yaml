identifier: CDD:cd21063
label: "basic tilted helix bundle (BTHB) domain found in 25 kDa FK506-binding protein (FKBP25) and similar proteins. FKBP25, also called 25 kDa FKBP, FK506-binding protein 3 (FKBP-3), immunophilin FKBP-25, rapamycin-selective 25 kDa immunophilin or rotamase, acts as a peptidyl-prolyl cis-trans isomerase (PPIase, EC 5.2.1.8) that interconverts the cis and trans isomers of peptide bonds with the amino acid proline. FKBP25 binds both FK506 and rapamycin, and thus belongs to a family of receptors for the two immunosuppressants which inhibit T-cell proliferation by arresting two distinct cytoplasmic signal transmission pathways."
definition: >-
  basic tilted helix bundle (BTHB) domain found in 25 kDa FK506-binding protein (FKBP25) and similar proteins. FKBP25, also called 25 kDa FKBP, FK506-binding protein 3 (FKBP-3), immunophilin FKBP-25, rapamycin-selective 25 kDa immunophilin or rotamase, acts as a peptidyl-prolyl cis-trans isomerase (PPIase, EC 5.2.1.8) that interconverts the cis and trans isomers of peptide bonds with the amino acid proline. FKBP25 binds both FK506 and rapamycin, and thus belongs to a family of receptors for the two immunosuppressants which inhibit T-cell proliferation by arresting two distinct cytoplasmic signal transmission pathways. — an NCBI CDD conserved domain (cd21063); members share this curated model.
