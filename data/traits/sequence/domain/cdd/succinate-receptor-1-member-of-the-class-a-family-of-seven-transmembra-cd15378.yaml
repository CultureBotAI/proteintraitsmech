identifier: CDD:cd15378
label: "succinate receptor 1, member of the class A family of seven-transmembrane G protein-coupled receptors. Succinate receptor (SUCNR1) GPR91 exclusively couples to G(i) protein to inhibit cAMP production and also activates PLC-beta to increase intracellular calcium concentrations in an inositol phosphate dependent mechanism. Succinate, an intermediate molecule of the citric cycle, is shown to cause cardiac hypertrophy via GPR91 activation. Furthermore, succinate-induced GPR91 activation is involved in the regulation of renin-angiotensin system and is suggested to play an important role in the development of renovascular hypertension and diabetic nephropathy. SUCNR1 belongs to the class A GPCR superfamily and is phylogenetically related to the purinergic P2Y1-like receptor subfamily, whose members are coupled to G(q) protein to activate phospholipase C (PLC)."
definition: >-
