identifier: CDD:cd04894
label: "ACT domain-containing protein which is composed almost entirely of four ACT domain repeats (the \"ACR\" protein). This CD includes the N-terminal ACT domain of a novel type of ACT domain-containing protein which is composed almost entirely of four ACT domain repeats (the \"ACR\" protein). ACR proteins, found only in Arabidopsis and Oryza, as yet, are proposed to function as novel regulatory or sensor proteins in plants. Nine ACR gene products (ACR1-8 in Arabidopsis and OsARC1-9 in Oryza) have been described, however, the ACR-like sequences in this CD are distinct from those characterized. This CD includes the Oryza sativa ACR-like protein (Os05g0113000) encoded on chromosome 5 and the Arabidopsis thaliana predicted gene product, At2g39570. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  ACT domain-containing protein which is composed almost entirely of four ACT domain repeats (the "ACR" protein). This CD includes the N-terminal ACT domain of a novel type of ACT domain-containing protein which is composed almost entirely of four ACT domain repeats (the "ACR" protein). ACR proteins, found only in Arabidopsis and Oryza, as yet, are proposed to function as novel regulatory or sensor proteins in plants. Nine ACR gene products (ACR1-8 in Arabidopsis and OsARC1-9 in Oryza) have been described, however, the ACR-like sequences in this CD are distinct from those characterized. This CD includes the Oryza sativa ACR-like protein (Os05g0113000) encoded on chromosome 5 and the Arabidopsis thaliana predicted gene product, At2g39570. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04894); members share this curated model.
