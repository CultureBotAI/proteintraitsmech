identifier: CDD:cd16973
label: "Alpha-kinase domain of alpha-protein kinase 3. Alpha-protein kinase 3 (ALPK3) is also called muscle alpha-protein kinase (MAK) or myocytic induction/differentiation originator (Midori). Its expression is restricted to fetal and adult heart and adult skeletal muscle, and is localized in the nucleus. It is thought to act as a transcriptional regulator implicated in early cardiac development. Loss of function mutations in ALPK3 can cause early-onset and familial cardiomyopathy in humans. ALPK3 contains a C-terminal alpha-kinase domain and two immunoglobulin (Ig)-like domains. Alpha-kinase is an atypical protein kinase catalytic domain with no detectable similarity to conventional protein serine/threonine kinases. The alpha-kinase family was named after the unique mode of substrate recognition by its initial members, the Dictyostelium heavy chain kinases, which targeted protein sequences that adopt an alpha-helical conformation. More recently, alpha-kinases were found to also target residues in non-helical regions."
definition: >-
  Alpha-kinase domain of alpha-protein kinase 3. Alpha-protein kinase 3 (ALPK3) is also called muscle alpha-protein kinase (MAK) or myocytic induction/differentiation originator (Midori). Its expression is restricted to fetal and adult heart and adult skeletal muscle, and is localized in the nucleus. It is thought to act as a transcriptional regulator implicated in early cardiac development. Loss of function mutations in ALPK3 can cause early-onset and familial cardiomyopathy in humans. ALPK3 contains a C-terminal alpha-kinase domain and two immunoglobulin (Ig)-like domains. Alpha-kinase is an atypical protein kinase catalytic domain with no detectable similarity to conventional protein serine/threonine kinases. The alpha-kinase family was named after the unique mode of substrate recognition by its initial members, the Dictyostelium heavy chain kinases, which targeted protein sequences that adopt an alpha-helical conformation. More recently, alpha-kinases were found to also target residues in non-helical regions. — an NCBI CDD conserved domain (cd16973); members share this curated model.
