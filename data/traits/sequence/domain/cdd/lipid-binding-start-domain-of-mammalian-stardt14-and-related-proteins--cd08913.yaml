identifier: CDD:cd08913
label: "Lipid-binding START domain of mammalian STARDT14 and related proteins. This subgroup includes the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domains of mammalian brown fat-inducible STARD14 (also known as Acyl-Coenzyme A Thioesterase 11 or ACOT11, BFIT, THEA, THEM1, KIAA0707, and MGC25974) and related proteins. It belongs to the START domain family, and in turn to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. STARD14/ACOT11 is a type II acetyl-CoA thioesterase; it catalyzes the hydrolysis of acyl-CoAs to free fatty acid and CoASH. Human STARD14 displays acetyl-CoA thioesterase activity towards medium(C12)- and long(C16)-chain fatty acyl-CoA substrates. In addition to having a START domain, most proteins in this subgroup have two tandem copies of the hotdog domain. There are two splice variants of human STARD14, named BFIT1 and BFIT2, which differ in their C-termini.  Human BFIT2 is equivalent to mouse mBFIT/Acot11, whose transcription is increased two fold in obesity-resistant mice compared with obesity-prone mice."
definition: >-
  Lipid-binding START domain of mammalian STARDT14 and related proteins. This subgroup includes the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domains of mammalian brown fat-inducible STARD14 (also known as Acyl-Coenzyme A Thioesterase 11 or ACOT11, BFIT, THEA, THEM1, KIAA0707, and MGC25974) and related proteins. It belongs to the START domain family, and in turn to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. STARD14/ACOT11 is a type II acetyl-CoA thioesterase; it catalyzes the hydrolysis of acyl-CoAs to free fatty acid and CoASH. Human STARD14 displays acetyl-CoA thioesterase activity towards medium(C12)- and long(C16)-chain fatty acyl-CoA substrates. In addition to having a START domain, most proteins in this subgroup have two tandem copies of the hotdog domain. There are two splice variants of human STARD14, named BFIT1 and BFIT2, which differ in their C-termini. Human BFIT2 is equivalent to mouse mBFIT/Acot11, whose transcription is increased two fold in obesity-resistant mice compared with obesity-prone mice. — an NCBI CDD conserved domain (cd08913); members share this curated model.
