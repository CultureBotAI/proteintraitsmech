identifier: CDD:cd22843
label: "galactose/rhamnose binding lectin-like domain found in Plasmodium falciparum P113 and similar proteins. P113 is an abundant glycosylphosphatidylinositol (GPI)-anchored merozoite surface protein that tethers the RH5:CyRPA:RIPR complex to the merozoite surface. The N-terminal region of P113 contains two closely interacting domains, which resemble the galactose/rhamnose-binding lectin domains found in proteins such as sea urchin egg lectin (SUEL), plant beta-galactosidases, mammalian latrophilins, and catfish rhamnose-binding lectin (SAL) eggs. Due to the lack of rhamnose-binding key residues, the galactose/rhamnose binding lectin-like domains of P113 do not form a binding pocket for rhamnose. Therefore, P113 is unlikely to act as a rhamnose-binding lectin. This model corresponds to galactose/rhamnose binding lectin-like domain of P113."
definition: >-
  galactose/rhamnose binding lectin-like domain found in Plasmodium falciparum P113 and similar proteins. P113 is an abundant glycosylphosphatidylinositol (GPI)-anchored merozoite surface protein that tethers the RH5:CyRPA:RIPR complex to the merozoite surface. The N-terminal region of P113 contains two closely interacting domains, which resemble the galactose/rhamnose-binding lectin domains found in proteins such as sea urchin egg lectin (SUEL), plant beta-galactosidases, mammalian latrophilins, and catfish rhamnose-binding lectin (SAL) eggs. Due to the lack of rhamnose-binding key residues, the galactose/rhamnose binding lectin-like domains of P113 do not form a binding pocket for rhamnose. Therefore, P113 is unlikely to act as a rhamnose-binding lectin. This model corresponds to galactose/rhamnose binding lectin-like domain of P113. — an NCBI CDD conserved domain (cd22843); members share this curated model.
