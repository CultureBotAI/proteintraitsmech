identifier: CDD:cd11058
label: "cytochrome P450 family 60, subfamily B and similar cytochrome P450s. This family is composed of fungal cytochrome P450s including: Aspergillus nidulans cytochrome P450 60B (CYP60B), also called versicolorin B desaturase, which catalyzes the conversion of versicolorin B to versicolorin A during sterigmatocystin biosynthesis; Fusarium sporotrichioides cytochrome P450 65A1 (CYP65A1), also called isotrichodermin C-15 hydroxylase, which catalyzes the hydroxylation at C-15 of isotricodermin in trichothecene biosynthesis; and Penicillium aethiopicum P450 monooxygenase vrtK, also called viridicatumtoxin synthesis protein K, which catalyzes the spirocyclization of the geranyl moiety of previridicatumtoxin to produce viridicatumtoxin, a tetracycline-like fungal meroterpenoid. The CYP60B-like family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 60, subfamily B and similar cytochrome P450s. This family is composed of fungal cytochrome P450s including: Aspergillus nidulans cytochrome P450 60B (CYP60B), also called versicolorin B desaturase, which catalyzes the conversion of versicolorin B to versicolorin A during sterigmatocystin biosynthesis; Fusarium sporotrichioides cytochrome P450 65A1 (CYP65A1), also called isotrichodermin C-15 hydroxylase, which catalyzes the hydroxylation at C-15 of isotricodermin in trichothecene biosynthesis; and Penicillium aethiopicum P450 monooxygenase vrtK, also called viridicatumtoxin synthesis protein K, which catalyzes the spirocyclization of the geranyl moiety of previridicatumtoxin to produce viridicatumtoxin, a tetracycline-like fungal meroterpenoid. The CYP60B-like family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11058); members share this curated model.
