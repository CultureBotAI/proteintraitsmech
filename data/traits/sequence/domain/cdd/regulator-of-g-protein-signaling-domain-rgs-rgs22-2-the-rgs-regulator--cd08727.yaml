identifier: CDD:cd08727
label: "Regulator of G protein signaling domain RGS_RGS22_2. The RGS (Regulator of G-protein Signaling) domain found in the RGS22 protein, a member of the RA/RGS subfamily of the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. RGS22 contains at least 3 copies of the RGS domain in vertebrata and exists in multiple splicing variants. RGS22 is predominantly expressed in testis and believed to play an important role in spermatogenesis."
definition: >-
