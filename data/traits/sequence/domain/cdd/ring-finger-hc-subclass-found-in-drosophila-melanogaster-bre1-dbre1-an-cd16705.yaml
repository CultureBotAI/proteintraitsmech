identifier: CDD:cd16705
label: "RING finger, HC subclass, found in Drosophila melanogaster Bre1 (dBre1) and similar proteins. dBre1 is the functional homolog of yeast Bre1, an E3 ubiquitin ligase required for the monoubiquitination of histone H2B and, indirectly, for H3K4 methylation. dBre1 acts as a nuclear component required for the expression of Notch target genes in Drosophila development. dBre1 contains a C3HC4-type RING-HC finger at its C-terminus."
definition: >-
  RING finger, HC subclass, found in Drosophila melanogaster Bre1 (dBre1) and similar proteins. dBre1 is the functional homolog of yeast Bre1, an E3 ubiquitin ligase required for the monoubiquitination of histone H2B and, indirectly, for H3K4 methylation. dBre1 acts as a nuclear component required for the expression of Notch target genes in Drosophila development. dBre1 contains a C3HC4-type RING-HC finger at its C-terminus. — an NCBI CDD conserved domain (cd16705); members share this curated model.
