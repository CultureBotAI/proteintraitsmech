identifier: CDD:cd16059
label: "Tumor necrosis factor ligand superfamily member 12 (TNFSF12), also known as TNF-like weak inducer of apoptosis or TWEAK. This family contains TNFSF12 (also known as TNF-like weak inducer of apoptosis or TWEAK, APO3L or DR3LG), a multifunctional cytokine that regulates many cellular activities including proliferation, migration, differentiation, apoptosis, angiogenesis, and inflammation during tissue repair after acute injuries and in physiological tissue remodeling. TWEAK exist as membrane bound as well as soluble forms and can induce apoptosis via multiple pathways of cell death in a cell type-specific manner. Through its cognate inducible receptor, TNFRSF12 (commonly known as FGF-inducible molecule-14 or Fn14, or TWEAKR), which is the smallest member of the TNF receptor superfamily with a single cysteine rich domain (CRD), it can induce beneficial as well as deleterious activity that has a profound effect on cell survival. TWEAK is widely expressed in many different tissue and tumor specimens, while Fn14 is expressed in all cell types, except primary B and T cells. Dysregulation of TWEAK signaling is involved in various pathological processes like autoimmune diseases and cancer. TWEAK serves as a regulator of the innate immune system and its interplay with adaptive immunity. The TWEAK/Fn14 system may promote inflammation and tissue injury during peritonitis and peritoneal dialysis.  TWEAK and Fn14 expressed by cells of the neurovascular unit help regulate and maintain vascular and tissue homeostasis. sTWEAK has been proposed as a biomarker of cardiovascular diseases (CVDs). Data also strongly suggest the TWEAK/Fn14 axis as a potential new therapeutic target for achieving cardiac protection in patients with cardiovascular diseases (CVDs). TWEAK/FN14 induces liver-resident progenitor cells (LPC) proliferation via NFkB activation during an inflammatory response in chronic liver diseases (CLD) (e.g. hepatitis B and C virus infection, alcoholic liver disease, and non-alcoholic steatohepatitis) which are associated with hepatocellular necrosis, continual inflammation, and hepatic fibrosis, thereby affecting both, the inflammatory and wound healing responses of the liver. Increased expression of TWEAK and Fn14 has been reported in immune-mediated kidney injury, contributing to cell death and interstitial inflammation during acute kidney injury, to glomerular injury in lupus nephritis, to tubular cell hyperplasia following unilateral nephrectomy, and to hyperlipidemia-associated kidney injury. Evidence suggests that the TWEAK/Fn14 system plays an essential role in skeletal muscle remodeling and metabolism, causing skeletal muscle atrophy; inhibition of this cytokine-receptor axis may be used as a therapy to maintain skeletal muscle mass and metabolic function. TWEAK/Fn14 axis as a potential target for several novel therapeutics is being considered."
