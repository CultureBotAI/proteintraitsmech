identifier: CDD:cd20546
label: CYCLIN_SpCG1C_ScCTK2-like_rpt2
definition: >-
  second cyclin box found in Schizosaccharomyces pombe cyclin C homolog 1 (pch1), Saccharomyces cerevisiae CTD kinase subunit 2 (ScCTK2), and similar proteins. Cyclin pch1 is essential for progression through the whole cell cycle. It is a homolog of cyclin T; it forms a heterodimer with its partner kinase, cyclin-dependent kinase 9 (CDK9), that can phosphorylate both the pol II C-terminal domain (CTD) and the CTD of transcription elongation factor Spt5. Yeast Cdk9/Pch1, with mRNA capping enzyme Pct1, may also form an elongation checkpoint for mRNA quality control. CTK2, also called CTD kinase subunit beta, CTDK-I subunit beta, or CTD kinase 38 kDa subunit, is the cyclin subunit of the CTDK-I complex, which hyperphosphorylates the C-terminal heptapeptide repeat domain (CTD) of the largest RNA polymerase II subunit. This group also includes yeast RNA polymerase II holoenzyme cyclin-like subunit, a component of the SRB8-11 complex, a regulatory module of the Mediator complex which is involved in regulation of basal and activated RNA polymerase II-dependent transcription. Members of this family contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain
