identifier: CDD:cd08345
label: "Fosfomycin resistant protein. This family contains three types of fosfomycin resistant protein. Fosfomycin inhibits the enzyme UDP-N-acetylglucosamine-3-enolpyruvyltransferase (MurA), which catalyzes the first committed step in bacterial cell wall biosynthesis. The three types of fosfomycin resistance proteins, employ different mechanisms to render fosfomycin [(1R,2S)-epoxypropylphosphonic acid] inactive. FosB catalyzes the addition of L-cysteine to the epoxide ring of fosfomycin. FosX catalyzes the addition of a water molecule to the C1 position of the antibiotic with inversion of configuration at C1. FosA catalyzes the addition of glutathione to the antibiotic fosfomycin, making it inactive. Catalytic activities of both FosX and FosA are Mn(II)-dependent, but FosB is activated by Mg(II). Fosfomycin resistant proteins are evolutionarily related to glyoxalase I and type I extradiol dioxygenases."
definition: >-
  Fosfomycin resistant protein. This family contains three types of fosfomycin resistant protein. Fosfomycin inhibits the enzyme UDP-N-acetylglucosamine-3-enolpyruvyltransferase (MurA), which catalyzes the first committed step in bacterial cell wall biosynthesis. The three types of fosfomycin resistance proteins, employ different mechanisms to render fosfomycin [(1R,2S)-epoxypropylphosphonic acid] inactive. FosB catalyzes the addition of L-cysteine to the epoxide ring of fosfomycin. FosX catalyzes the addition of a water molecule to the C1 position of the antibiotic with inversion of configuration at C1. FosA catalyzes the addition of glutathione to the antibiotic fosfomycin, making it inactive. Catalytic activities of both FosX and FosA are Mn(II)-dependent, but FosB is activated by Mg(II). Fosfomycin resistant proteins are evolutionarily related to glyoxalase I and type I extradiol dioxygenases. — an NCBI CDD conserved domain (cd08345); members share this curated model.
