identifier: CDD:cd18518
label: "BACK (BTB and C-terminal Kelch) domain found in speckle-type POZ protein (SPOP). SPOP, also termed HIB homolog 1, or Roadkill homolog 1, is a novel nuclear speckle-type protein which serves as an adaptor of cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination and proteasomal degradation of target proteins, such as BRMS1, DAXX, PDX1/IPF1, GLI2 and GLI3."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in speckle-type POZ protein (SPOP). SPOP, also termed HIB homolog 1, or Roadkill homolog 1, is a novel nuclear speckle-type protein which serves as an adaptor of cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination and proteasomal degradation of target proteins, such as BRMS1, DAXX, PDX1/IPF1, GLI2 and GLI3. — an NCBI CDD conserved domain (cd18518); members share this curated model.
