identifier: CDD:cd11253
label: "The Sema domain, a protein interacting module, of semaphorin 3E (Sema3E). Sema3E is a secreted molecule implicated in axonal path finding and inhibition of developmental and postischemic angiogenesis. It is also highly expressed in metastatic cancer cells. Sema3E signaling, through its high affinity functional receptor Plexin D1, drives cancer cell invasiveness and metastatic spreading. Sema3E is a member of the class 3 semaphorin family of proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 3E (Sema3E). Sema3E is a secreted molecule implicated in axonal path finding and inhibition of developmental and postischemic angiogenesis. It is also highly expressed in metastatic cancer cells. Sema3E signaling, through its high affinity functional receptor Plexin D1, drives cancer cell invasiveness and metastatic spreading. Sema3E is a member of the class 3 semaphorin family of proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11253); members share this curated model.
