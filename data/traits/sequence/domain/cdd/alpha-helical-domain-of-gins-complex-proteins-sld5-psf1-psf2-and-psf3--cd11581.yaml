identifier: CDD:cd11581
label: "Alpha-helical domain of GINS complex proteins; Sld5, Psf1, Psf2 and Psf3. The GINS complex is involved in both initiation and elongation stages of eukaryotic chromosome replication, with GINS being the component that most likely serves as the replicative helicase that unwinds duplex DNA ahead of the moving replication fork. In eukaryotes, GINS is a tetrameric arrangement of four subunits Sld5, Psf1, Psf2 and Psf3. The GINS complex has been found in eukaryotes and archaea, but not in bacteria. The four subunits of the complex are homologous and consist of two domains each, termed the alpha-helical (A) and beta-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3."
definition: >-
  Alpha-helical domain of GINS complex proteins; Sld5, Psf1, Psf2 and Psf3. The GINS complex is involved in both initiation and elongation stages of eukaryotic chromosome replication, with GINS being the component that most likely serves as the replicative helicase that unwinds duplex DNA ahead of the moving replication fork. In eukaryotes, GINS is a tetrameric arrangement of four subunits Sld5, Psf1, Psf2 and Psf3. The GINS complex has been found in eukaryotes and archaea, but not in bacteria. The four subunits of the complex are homologous and consist of two domains each, termed the alpha-helical (A) and beta-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3. — an NCBI CDD conserved domain (cd11581); members share this curated model.
