identifier: CDD:cd24110
label: "nucleotide-binding domain (NBD) of ectonucleoside triphosphate diphosphohydrolase 1 (NTPDase1) and similar proteins. NTPDase1 (EC 3.6.1.5), also called Ecto-ATP diphosphohydrolase 1, Ecto-ATPDase 1, Ecto-ATPase 1, Ecto-apyrase, or lymphoid cell activation antigen CD39, is a known E-type apyrase that could hydrolyze ATP and other nucleotides to regulate purinergic neurotransmission in the nervous system. It could also be implicated in the prevention of platelet aggregation by hydrolyzing platelet-activating ADP to AMP. NTPDase1 hydrolyzes ATP and ADP equally well. In addition, NTPDase1 can also hydrolyze ATP to AMP without the release of ADP."
definition: >-
  nucleotide-binding domain (NBD) of ectonucleoside triphosphate diphosphohydrolase 1 (NTPDase1) and similar proteins. NTPDase1 (EC 3.6.1.5), also called Ecto-ATP diphosphohydrolase 1, Ecto-ATPDase 1, Ecto-ATPase 1, Ecto-apyrase, or lymphoid cell activation antigen CD39, is a known E-type apyrase that could hydrolyze ATP and other nucleotides to regulate purinergic neurotransmission in the nervous system. It could also be implicated in the prevention of platelet aggregation by hydrolyzing platelet-activating ADP to AMP. NTPDase1 hydrolyzes ATP and ADP equally well. In addition, NTPDase1 can also hydrolyze ATP to AMP without the release of ADP. — an NCBI CDD conserved domain (cd24110); members share this curated model.
