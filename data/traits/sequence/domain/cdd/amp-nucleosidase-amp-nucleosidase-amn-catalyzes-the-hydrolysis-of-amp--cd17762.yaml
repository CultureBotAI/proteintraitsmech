identifier: CDD:cd17762
label: "AMP nucleosidase. AMP nucleosidase (AMN) catalyzes the hydrolysis of AMP to ribose 5-phosphate and adenine. It is a prokaryotic enzyme which plays a role in purine nucleoside salvage and intracellular AMP level regulation. AMN is active as a homohexamer; each monomer is comprised of a catalytic domain and a putative regulatory domain. This model represents the catalytic domain. AMN belongs to the nucleoside phosphorylase-I (NP-I) family, whose members accept a range of purine nucleosides as well as the pyrimidine nucleoside uridine. The NP-1 family  includes phosphorolytic nucleosidases, such as purine nucleoside phosphorylase (PNPs, EC. 2.4.2.1), uridine phosphorylase (UP, EC 2.4.2.3), and 5'-deoxy-5'-methylthioadenosine phosphorylase (MTAP, EC 2.4.2.28), and hydrolytic nucleosidases, such as AMP nucleosidase (AMN, EC 3.2.2.4), and 5'-methylthioadenosine/S-adenosylhomocysteine (MTA/SAH) nucleosidase (MTAN, EC 3.2.2.16). The NP-I family is distinct from nucleoside phosphorylase-II, which belongs to a different structural family."
definition: >-
  AMP nucleosidase. AMP nucleosidase (AMN) catalyzes the hydrolysis of AMP to ribose 5-phosphate and adenine. It is a prokaryotic enzyme which plays a role in purine nucleoside salvage and intracellular AMP level regulation. AMN is active as a homohexamer; each monomer is comprised of a catalytic domain and a putative regulatory domain. This model represents the catalytic domain. AMN belongs to the nucleoside phosphorylase-I (NP-I) family, whose members accept a range of purine nucleosides as well as the pyrimidine nucleoside uridine. The NP-1 family includes phosphorolytic nucleosidases, such as purine nucleoside phosphorylase (PNPs, EC. 2.4.2.1), uridine phosphorylase (UP, EC 2.4.2.3), and 5'-deoxy-5'-methylthioadenosine phosphorylase (MTAP, EC 2.4.2.28), and hydrolytic nucleosidases, such as AMP nucleosidase (AMN, EC 3.2.2.4), and 5'-methylthioadenosine/S-adenosylhomocysteine (MTA/SAH) nucleosidase (MTAN, EC 3.2.2.16). The NP-I family is distinct from nucleoside phosphorylase-II, which belongs to a different structural family. — an NCBI CDD conserved domain (cd17762); members share this curated model.
