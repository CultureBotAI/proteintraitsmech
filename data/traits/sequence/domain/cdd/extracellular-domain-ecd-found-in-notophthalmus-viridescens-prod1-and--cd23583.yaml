identifier: CDD:cd23583
label: TFP_LU_ECD_Prod1
definition: >-
  extracellular domain (ECD) found in Notophthalmus viridescens Prod1 and similar proteins. Prod1 is a member of the three-finger protein superfamily implicated in salamander limb regeneration. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)
