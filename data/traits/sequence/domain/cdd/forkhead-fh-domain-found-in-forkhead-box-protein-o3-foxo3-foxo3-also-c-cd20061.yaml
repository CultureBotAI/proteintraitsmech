identifier: CDD:cd20061
label: "Forkhead (FH) domain found in Forkhead box protein O3 (FOXO3). FOXO3, also called AF6q21 protein or Forkhead in rhabdomyosarcoma-like 1 (FKHRL1), is a transcriptional activator which triggers apoptosis in the absence of survival factors, including neuronal cell death upon oxidative stress. It recognizes and binds to the DNA sequence 5'-[AG]TAAA[TC]A-3'. The FH domain is a winged helix DNA-binding domain. All FOXOs bind to the consensus sequence 5'-GTAAACAA-3', known as the DAF-16 family member-binding element, which includes the core sequence 5'-(A/C)AA(C/T)A-3' recognized by all FOX family members."
definition: >-
