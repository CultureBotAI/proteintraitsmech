identifier: CDD:cd16952
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli PhoR. This family includes histidine kinase-like ATPase (HATPase) domain of two-component sensor histidine kinases similar to Escherichia coli or Vibrio cholera PhoR, the histidine kinase (HK) of PhoB-PhoR a two-component signal transduction system (TCS) involved in phosphate regulation. PhoR monitors extracellular inorganic phosphate (Pi) availability and PhoB, the response regulator, regulates transcription of genes of the phosphate regulon. PhoR is a bifunctional histidine autokinase/phospho-PhoB phosphatase; in phosphate deficiency, it autophosphorylates and Pi is transferred to PhoB, and when environmental Pi is abundant, it removes the phosphoryl group from phosphorylated PhoB. Other roles of PhoB-PhoR TCS have been described, including motility, biofilm formation, intestinal colonization, and virulence in V. cholera. E.coli PhoR and Bacillus subtilis PhoR (whose HATPase domain belongs to a different family) sense very different signals in each bacterium. In E. coli the PhoR signal comes from phosphate transport mediated by the PstSCAB2 phosphate transporter and the PhoU chaperone-like protein while in B. subtilis, the PhoR activation signal comes from wall teichoic acid (WTA) metabolism."
