identifier: CDD:cd15925
label: "relaxin-3 receptor 2 (RNL3R2), member of the class A family of seven-transmembrane G protein-coupled receptors. The G protein-coupled receptor RNL3R2 is also known as GPR100, GPR142, and relaxin family peptide receptor 4 (RXFP4). Insulin-like peptide 5 (INSL5) is an endogenous ligand for RNL3R2 and plays a role in fat and glucose metabolism. INSL5 is highly expressed in human rectal and colon tissues. RNL3R2 signals through G(i) protein and inhibit adenylate cyclase, thereby inhibit cAMP accumulation."
definition: >-
  relaxin-3 receptor 2 (RNL3R2), member of the class A family of seven-transmembrane G protein-coupled receptors. The G protein-coupled receptor RNL3R2 is also known as GPR100, GPR142, and relaxin family peptide receptor 4 (RXFP4). Insulin-like peptide 5 (INSL5) is an endogenous ligand for RNL3R2 and plays a role in fat and glucose metabolism. INSL5 is highly expressed in human rectal and colon tissues. RNL3R2 signals through G(i) protein and inhibit adenylate cyclase, thereby inhibit cAMP accumulation. — an NCBI CDD conserved domain (cd15925); members share this curated model.
