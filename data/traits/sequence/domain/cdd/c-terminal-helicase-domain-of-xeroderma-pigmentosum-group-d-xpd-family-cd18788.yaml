identifier: CDD:cd18788
label: "C-terminal helicase domain of xeroderma pigmentosum group D (XPD) family DEAD-like helicases. The xeroderma pigmentosum group D (XPD)-like family members are DEAD-box helicases belonging to superfamily (SF)2. This family includes DDX11 (also called ChlR1), a protein involved in maintaining chromosome transmission fidelity and genome stability, the TFIIH basal transcription factor complex XPD subunit, and FANCJ (also known as BRIP1), a DNA helicase required for the maintenance of chromosomal stability. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC."
definition: >-
  C-terminal helicase domain of xeroderma pigmentosum group D (XPD) family DEAD-like helicases. The xeroderma pigmentosum group D (XPD)-like family members are DEAD-box helicases belonging to superfamily (SF)2. This family includes DDX11 (also called ChlR1), a protein involved in maintaining chromosome transmission fidelity and genome stability, the TFIIH basal transcription factor complex XPD subunit, and FANCJ (also known as BRIP1), a DNA helicase required for the maintenance of chromosomal stability. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC. — an NCBI CDD conserved domain (cd18788); members share this curated model.
