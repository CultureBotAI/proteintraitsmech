identifier: CDD:cd11423
label: "basic helix-loop-helix (bHLH) domain found in musculin, transcription factor 21 (TCF-21) and similar proteins. The family includes two bHLH transcription factors, musculin and transcription factor 21 (TCF-21). Musculin, also termed activated B-cell factor 1 (ABF-1), or Class A basic helix-loop-helix protein 22 (bHLHa22), is a bHLH transcription factor expressed in activated B lymphocytes. It acts as a transcription repressor capable of inhibiting the transactivation capability of TCF3/E47. Musculin may play a role in regulating antigen-dependent B-cell differentiation. The mouse homolog, musculin, is suggested to be a repressor of myogenesis that is expressed in developing muscle and in the spleen. TCF-21, also termed capsulin, or Class A basic helix-loop-helix protein 23 (bHLHa23), or epicardin, or podocyte-expressed 1 (Pod-1), is a bHLH transcription factor expressed specifically in mesodermally-derived cells that surround the epithelium of the developing gastrointestinal, genitourinary and respiratory systems during mouse embryogenesis. It may play a role in the specification or differentiation of one or more subsets of epicardial cell types."
definition: >-
  basic helix-loop-helix (bHLH) domain found in musculin, transcription factor 21 (TCF-21) and similar proteins. The family includes two bHLH transcription factors, musculin and transcription factor 21 (TCF-21). Musculin, also termed activated B-cell factor 1 (ABF-1), or Class A basic helix-loop-helix protein 22 (bHLHa22), is a bHLH transcription factor expressed in activated B lymphocytes. It acts as a transcription repressor capable of inhibiting the transactivation capability of TCF3/E47. Musculin may play a role in regulating antigen-dependent B-cell differentiation. The mouse homolog, musculin, is suggested to be a repressor of myogenesis that is expressed in developing muscle and in the spleen. TCF-21, also termed capsulin, or Class A basic helix-loop-helix protein 23 (bHLHa23), or epicardin, or podocyte-expressed 1 (Pod-1), is a bHLH transcription factor expressed specifically in mesodermally-derived cells that surround the epithelium of the developing gastrointestinal, genitourinary and respiratory systems during mouse embryogenesis. It may play a role in the specification or differentiation of one or more subsets of epicardial cell types. — an NCBI CDD conserved domain (cd11423); members share this curated model.
