identifier: CDD:cd16149
label: "uncharacterized sulfatase subfamily. Sulfatases catalyze the hydrolysis of sulfate esters from wide range of substrates, including steroids, carbohydrates and proteins. Sulfate esters may be formed from various alcohols and amines. The biological roles of sulfatase includes the cycling of sulfur in the environment, in the degradation of sulfated glycosaminoglycans and glycolipids in the lysosome, and in remodeling sulfated glycosaminoglycans in the extracellular space. The sulfatases are essential for human metabolism. At least eight human monogenic diseases are caused by the deficiency of individual sulfatases."
