label: bHLH_E-protein_E47-like
definition: >-
  basic helix-loop-helix (bHLH) domain found in transcription factor E47 and similar proteins. E47 is a class I bHLH transcriptional regulator that forms heterodimers with class II bHLH proteins to regulate distinct differentiation pathways. Its homodimers regulate B lymphocytes development
