identifier: CDD:cd23532
label: "extracellular domain (ECD) found in the family of bone morphogenetic protein receptor type-1 (BMPR1). The BMPR1 family includes BMPR-1A (also known as activin receptor-like kinase 3/ALK-3, or serine/threonine-protein kinase receptor R5/SKR5, or CD292) and BMPR-1B (also known as activin receptor-like kinase 6/ALK-6, or CDw293). They form a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. BMPR-1A is the receptor for BMP2, BMP4, GDF5, and GDF6. It positively regulates chondrocyte differentiation through GDF5 interaction and mediates induction of adipogenesis by GDF6. BMPR-1B is the receptor for BMP7/OP-1 and GDF5. It positively regulates chondrocyte differentiation through GDF5 interaction. Members in this family contain an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in the family of bone morphogenetic protein receptor type-1 (BMPR1). The BMPR1 family includes BMPR-1A (also known as activin receptor-like kinase 3/ALK-3, or serine/threonine-protein kinase receptor R5/SKR5, or CD292) and BMPR-1B (also known as activin receptor-like kinase 6/ALK-6, or CDw293). They form a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. BMPR-1A is the receptor for BMP2, BMP4, GDF5, and GDF6. It positively regulates chondrocyte differentiation through GDF5 interaction and mediates induction of adipogenesis by GDF6. BMPR-1B is the receptor for BMP7/OP-1 and GDF5. It positively regulates chondrocyte differentiation through GDF5 interaction. Members in this family contain an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23532); members share this curated model.
