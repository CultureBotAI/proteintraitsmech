identifier: CDD:cd09508
label: "SAM domain of HD-phosphohydrolase. SAM (sterile alpha motif) domain of SAM_HD subfamily proteins is a putative protein-protein interaction domain. Proteins of this group, additionally to the SAM domain, contain a HD hydrolase domain. Human SAM-HD1 is a nuclear protein involved in innate immune response and may act as a negative regulator of the cell-intrinsic antiviral response. Mutations in this gene lead to Aicardi-Goutieres syndrome (symptoms include cerebral atrophy, leukoencephalopathy, hepatosplenomegaly, and increased production of alpha-interferon)."
definition: >-
  SAM domain of HD-phosphohydrolase. SAM (sterile alpha motif) domain of SAM_HD subfamily proteins is a putative protein-protein interaction domain. Proteins of this group, additionally to the SAM domain, contain a HD hydrolase domain. Human SAM-HD1 is a nuclear protein involved in innate immune response and may act as a negative regulator of the cell-intrinsic antiviral response. Mutations in this gene lead to Aicardi-Goutieres syndrome (symptoms include cerebral atrophy, leukoencephalopathy, hepatosplenomegaly, and increased production of alpha-interferon). — an NCBI CDD conserved domain (cd09508); members share this curated model.
