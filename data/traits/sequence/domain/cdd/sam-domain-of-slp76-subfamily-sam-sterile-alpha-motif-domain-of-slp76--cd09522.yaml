identifier: CDD:cd09522
label: "SAM domain of SLP76 subfamily. SAM (sterile alpha motif) domain of SLP76 (SH2 domain-containing leukocyte protein 76), also known as LCP2 (Lymphocyte cytosolic protein), subfamily is a protein-protein interaction domain. Proteins of this group have an N-terminal SAM domain, 3 phosphotyrosine motifs, a proline-rich region and a C-terminal SH2 domain. They are scaffold proteins involved in protein complex formation. The complexes play a role in T-cell receptor mediated signaling pathways such as integrin activation, cytoskeletal organization, MARK activation, and calcium flux.  SAM domain deleted SLP76 knockin mice show a number of defects, including partially blocked thymocyte development, impaired positive and negative thymic selection and changes in T-cell receptor mediated signaling."
definition: >-
  SAM domain of SLP76 subfamily. SAM (sterile alpha motif) domain of SLP76 (SH2 domain-containing leukocyte protein 76), also known as LCP2 (Lymphocyte cytosolic protein), subfamily is a protein-protein interaction domain. Proteins of this group have an N-terminal SAM domain, 3 phosphotyrosine motifs, a proline-rich region and a C-terminal SH2 domain. They are scaffold proteins involved in protein complex formation. The complexes play a role in T-cell receptor mediated signaling pathways such as integrin activation, cytoskeletal organization, MARK activation, and calcium flux. SAM domain deleted SLP76 knockin mice show a number of defects, including partially blocked thymocyte development, impaired positive and negative thymic selection and changes in T-cell receptor mediated signaling. — an NCBI CDD conserved domain (cd09522); members share this curated model.
