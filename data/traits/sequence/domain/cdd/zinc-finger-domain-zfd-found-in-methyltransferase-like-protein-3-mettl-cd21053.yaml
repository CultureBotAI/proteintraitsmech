label: ZFD_METTL3
definition: >-
  zinc finger domain (ZFD) found in methyltransferase-like protein 3 (METTL3) and similar proteins. METTL3 (EC2.1.1.62), also termed N6-adenosine-methyltransferase catalytic subunit, or N6-adenosine-methyltransferase 70 kDa subunit (MT-A70), heterodimerizes with METTL14 and then forms a N6-methyltransferase complex that methylates adenosine residues at the N(6) position of some RNAs and regulates various processes such as the circadian clock, differentiation of embryonic and haematopoietic stem cells, cortical neurogenesis, response to DNA damage, differentiation of T-cells and primary miRNA processing. The model corresponds to the zinc finger domain (ZFD) of METTL3, which specifically binds to an RNA containing 5'-GGACU-3' consensus sequence, but does not to one without
