identifier: CDD:cd17478
label: "Fosmidomycin resistance protein of the Major Facilitator Superfamily of transporters. Fosmidomycin resistance protein (FsR) confers resistance against fosmidomycin. It shows sequence similarity with the bacterial drug-export proteins that mediate resistance to tetracycline and chloramphenicol. This FsR family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Fosmidomycin resistance protein of the Major Facilitator Superfamily of transporters. Fosmidomycin resistance protein (FsR) confers resistance against fosmidomycin. It shows sequence similarity with the bacterial drug-export proteins that mediate resistance to tetracycline and chloramphenicol. This FsR family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17478); members share this curated model.
