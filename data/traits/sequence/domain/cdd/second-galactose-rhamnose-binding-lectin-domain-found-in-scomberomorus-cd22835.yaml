identifier: CDD:cd22835
label: "second galactose/rhamnose binding lectin domain found in Scomberomorus niphonius L-rhamnose-binding lectin (SML) and similar proteins. SML is a rhamnose-binding lectin that also binds melibiose, raffinose, D-galactose, L-arabinose, D-fucose, maltose and D-glucose with decreasing affinity. It does not bind D-arabinose, L-fucose, lactose, xylose or 2-deoxy-D-galactose. SML shows strong hemagglutinating activity against rabbit erythrocytes. SML contains two tandem galactose/rhamnose-binding lectin domains. This model corresponds to the second one."
definition: >-
  second galactose/rhamnose binding lectin domain found in Scomberomorus niphonius L-rhamnose-binding lectin (SML) and similar proteins. SML is a rhamnose-binding lectin that also binds melibiose, raffinose, D-galactose, L-arabinose, D-fucose, maltose and D-glucose with decreasing affinity. It does not bind D-arabinose, L-fucose, lactose, xylose or 2-deoxy-D-galactose. SML shows strong hemagglutinating activity against rabbit erythrocytes. SML contains two tandem galactose/rhamnose-binding lectin domains. This model corresponds to the second one. — an NCBI CDD conserved domain (cd22835); members share this curated model.
