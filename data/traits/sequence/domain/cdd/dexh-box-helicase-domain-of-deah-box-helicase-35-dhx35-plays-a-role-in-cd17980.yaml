identifier: CDD:cd17980
label: "DEXH-box helicase domain of DEAH-box helicase 35. DHX35 plays a role in colorectal cancers and seems to be associated with risk to thyroid cancers. It also has been shown to positively regulate poxviruses, such as Myxoma virus.  DEAH-box helicase 35 (DHX35) belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 35. DHX35 plays a role in colorectal cancers and seems to be associated with risk to thyroid cancers. It also has been shown to positively regulate poxviruses, such as Myxoma virus. DEAH-box helicase 35 (DHX35) belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17980); members share this curated model.
