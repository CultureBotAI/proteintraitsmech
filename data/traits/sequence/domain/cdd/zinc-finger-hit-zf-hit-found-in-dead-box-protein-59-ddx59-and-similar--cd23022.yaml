identifier: CDD:cd23022
label: "zinc finger HIT (zf-HIT) found in DEAD box protein 59 (DDX59) and similar proteins. DDX59, also called zinc finger HIT domain-containing protein 5 (ZNHIT5), is a probable ATP-dependent RNA helicase (EC 3.6.4.13) that plays a role in nervous system development and function. It has an important role in lung cancer development through promoting DNA replication. Mutations in DDX59 implicate RNA helicase in the pathogenesis of oral-facial-digital syndrome (OFDS). DDX59 contains a zf-HIT domain which is characterized by a fold in \"treble-clef\" through interleaved CCCC and CCHC zinc finger motifs that both bind a zinc ion."
definition: >-
  zinc finger HIT (zf-HIT) found in DEAD box protein 59 (DDX59) and similar proteins. DDX59, also called zinc finger HIT domain-containing protein 5 (ZNHIT5), is a probable ATP-dependent RNA helicase (EC 3.6.4.13) that plays a role in nervous system development and function. It has an important role in lung cancer development through promoting DNA replication. Mutations in DDX59 implicate RNA helicase in the pathogenesis of oral-facial-digital syndrome (OFDS). DDX59 contains a zf-HIT domain which is characterized by a fold in "treble-clef" through interleaved CCCC and CCHC zinc finger motifs that both bind a zinc ion. — an NCBI CDD conserved domain (cd23022); members share this curated model.
