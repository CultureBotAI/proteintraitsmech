identifier: CDD:cd11465
label: "basic helix-loop-helix (bHLH) domain found in scleraxis, transcription factor 15 (TCF-15) and similar proteins. The family includes scleraxis and transcription factor 15 (TCF-15). Scleraxis, also termed SCX, or Class A basic helix-loop-helix protein 41 (bHLHa41), or Class A basic helix-loop-helix protein 48 (bHLHa48), is a bHLH transcription factor that is expressed in sclerotome limb bud cranial and body wall mesenchyme, pericardium and heart valves, ligaments and tendons. It is required for tendon formation ligaments, connective tissue, the diaphragm, and testis development. Scleraxis plays a central role in promoting fibroblast proliferation and matrix synthesis during the embryonic development of tendons. TCF-15, also termed Class A basic helix-loop-helix protein 40 (bHLHa40), or paraxis, or protein bHLH-EC2, is a bHLH transcription factor expressed in caudal lateral and paraxial mesoderm dermomyotome and sclerotome fore limb buds during embryo development. It may function as an early transcriptional regulator involved in the patterning of the mesoderm and in lineage determination of cell types derived from the mesoderm."
definition: >-
  basic helix-loop-helix (bHLH) domain found in scleraxis, transcription factor 15 (TCF-15) and similar proteins. The family includes scleraxis and transcription factor 15 (TCF-15). Scleraxis, also termed SCX, or Class A basic helix-loop-helix protein 41 (bHLHa41), or Class A basic helix-loop-helix protein 48 (bHLHa48), is a bHLH transcription factor that is expressed in sclerotome limb bud cranial and body wall mesenchyme, pericardium and heart valves, ligaments and tendons. It is required for tendon formation ligaments, connective tissue, the diaphragm, and testis development. Scleraxis plays a central role in promoting fibroblast proliferation and matrix synthesis during the embryonic development of tendons. TCF-15, also termed Class A basic helix-loop-helix protein 40 (bHLHa40), or paraxis, or protein bHLH-EC2, is a bHLH transcription factor expressed in caudal lateral and paraxial mesoderm dermomyotome and sclerotome fore limb buds during embryo development. It may function as an early transcriptional regulator involved in the patterning of the mesoderm and in lineage determination of cell types derived from the mesoderm. — an NCBI CDD conserved domain (cd11465); members share this curated model.
