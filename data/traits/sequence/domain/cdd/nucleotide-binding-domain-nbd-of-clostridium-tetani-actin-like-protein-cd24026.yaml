identifier: CDD:cd24026
label: "nucleotide-binding domain (NBD) of Clostridium tetani actin-like protein Alp12 and similar proteins from the ParM domain family. The family corresponds to a group of uncharacterized proteins similar to Clostridium tetani actin-like protein Alp12. It is a dynamically unstable force-generating motor involved in segregating the pE88 plasmid, which encodes the lethal tetanus toxin. Alp12 filaments have a unique polymer structure that is entirely different from F-actin and display dynamic behavior like microtubules. Alp12 can be repeatedly cycled between states of polymerization and dissociation, making it a novel candidate for incorporation into fuel-propelled nanobiopolymer machines."
definition: >-
  nucleotide-binding domain (NBD) of Clostridium tetani actin-like protein Alp12 and similar proteins from the ParM domain family. The family corresponds to a group of uncharacterized proteins similar to Clostridium tetani actin-like protein Alp12. It is a dynamically unstable force-generating motor involved in segregating the pE88 plasmid, which encodes the lethal tetanus toxin. Alp12 filaments have a unique polymer structure that is entirely different from F-actin and display dynamic behavior like microtubules. Alp12 can be repeatedly cycled between states of polymerization and dissociation, making it a novel candidate for incorporation into fuel-propelled nanobiopolymer machines. — an NCBI CDD conserved domain (cd24026); members share this curated model.
