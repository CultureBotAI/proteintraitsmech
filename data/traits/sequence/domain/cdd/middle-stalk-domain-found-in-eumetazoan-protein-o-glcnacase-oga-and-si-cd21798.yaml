identifier: CDD:cd21798
label: "middle stalk domain found in eumetazoan protein O-GlcNAcase (OGA) and similar proteins. OGA (EC 3.2.1.169), also called beta-N-acetylglucosaminidase, or beta-N-acetylhexosaminidase, or beta-hexosaminidase, or meningioma-expressed antigen 5 (MGEA5), or N-acetyl-beta-D-glucosaminidase, or N-acetyl-beta-glucosaminidase, or nuclear cytoplasmic O-GlcNAcase and acetyltransferase (NCOAT), functions both as a hyaluronidase and an N-acetylglucosaminidase. It cleaves GlcNAc but not GalNAc from O-glycosylated proteins. It can use p-nitrophenyl-beta-GlcNAc as substrate but not p-nitrophenyl-beta-GalNAc or p-nitrophenyl-alpha-GlcNAc (in vitro). OGA contains an N-terminal catalytic hexosaminidase domain, a middle stalk domain, and a C-terminal HAT (histone acetyltransferase) domain. The model corresponds to the middle stalk domain."
definition: >-
  middle stalk domain found in eumetazoan protein O-GlcNAcase (OGA) and similar proteins. OGA (EC 3.2.1.169), also called beta-N-acetylglucosaminidase, or beta-N-acetylhexosaminidase, or beta-hexosaminidase, or meningioma-expressed antigen 5 (MGEA5), or N-acetyl-beta-D-glucosaminidase, or N-acetyl-beta-glucosaminidase, or nuclear cytoplasmic O-GlcNAcase and acetyltransferase (NCOAT), functions both as a hyaluronidase and an N-acetylglucosaminidase. It cleaves GlcNAc but not GalNAc from O-glycosylated proteins. It can use p-nitrophenyl-beta-GlcNAc as substrate but not p-nitrophenyl-beta-GalNAc or p-nitrophenyl-alpha-GlcNAc (in vitro). OGA contains an N-terminal catalytic hexosaminidase domain, a middle stalk domain, and a C-terminal HAT (histone acetyltransferase) domain. The model corresponds to the middle stalk domain. — an NCBI CDD conserved domain (cd21798); members share this curated model.
