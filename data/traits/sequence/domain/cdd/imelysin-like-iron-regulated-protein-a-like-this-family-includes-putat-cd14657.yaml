identifier: CDD:cd14657
label: "Imelysin-like iron-regulated protein A-like. This family includes putative iron-regulated protein A (IrpA) mainly from Bacteriodes, proteobacteria and cyanobacteria, as well as uncharacterized proteins with domains similar to insulin-cleaving membrane protease (imelysin, ICMP) protein. IrpA has been shown to be essential for growth under iron-deficient conditions in the cyanobacteria Synechococcus sp. The conserved GxHxxE motif is similar to other known imelysin-like proteins that are regulated by iron, such as ICMP, IrpA and EfeO. Imelysin is a membrane protein with the active site outside the cell envelope. The tertiary structure shows a fold consisting of two domains, each of which consists of a bundle of four helices that are similar to each other, implying an ancient gene duplication and fusion event."
definition: >-
  Imelysin-like iron-regulated protein A-like. This family includes putative iron-regulated protein A (IrpA) mainly from Bacteriodes, proteobacteria and cyanobacteria, as well as uncharacterized proteins with domains similar to insulin-cleaving membrane protease (imelysin, ICMP) protein. IrpA has been shown to be essential for growth under iron-deficient conditions in the cyanobacteria Synechococcus sp. The conserved GxHxxE motif is similar to other known imelysin-like proteins that are regulated by iron, such as ICMP, IrpA and EfeO. Imelysin is a membrane protein with the active site outside the cell envelope. The tertiary structure shows a fold consisting of two domains, each of which consists of a bundle of four helices that are similar to each other, implying an ancient gene duplication and fusion event. — an NCBI CDD conserved domain (cd14657); members share this curated model.
