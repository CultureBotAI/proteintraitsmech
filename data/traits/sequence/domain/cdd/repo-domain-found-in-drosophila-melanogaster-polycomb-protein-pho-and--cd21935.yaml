identifier: CDD:cd21935
label: REPO_PHO
definition: >-
  REPO domain found in Drosophila melanogaster polycomb protein PHO and similar proteins. PHO, also called protein pleiohomeotic, is the transcription factor YY1 homolog. As polycomb group (PcG) protein, PHO binds to the 5'-CNGCCATNNNNG-3' sequence found in the regulatory regions of many genes. The model corresponds to the REPO domain (also known as Pho spacer) of PHO, which functions in recruitment of Polycomb
