identifier: CDD:cd22854
label: "Plasmodium falciparum Venus Flytrap protein PfVFT1 and similar proteins. PfVFT1 is a highly immunogenic protein, but its biological role in the Plasmodium falciparum parasite is unknown. It is a parasite-specific antigen expressed by the P. falciparum 3D7 strain in both sexual and asexual stages and was identified as a major candidate for inclusion in a multicomponent blood stage malaria vaccine. Bioinformatic analysis predicts a signal peptide with no identifiable membrane anchors suggesting that it coordinates a membrane-associated partner to enable surface localization. Fractionation of detergent-resistance membranes showed that PfVFT1 clusters with GPI-anchored parasite proteins including Pf38, Pf92, Pf113, PfMSP-1, PfMSP-4, PfASP, and PfRAMA."
definition: >-
  Plasmodium falciparum Venus Flytrap protein PfVFT1 and similar proteins. PfVFT1 is a highly immunogenic protein, but its biological role in the Plasmodium falciparum parasite is unknown. It is a parasite-specific antigen expressed by the P. falciparum 3D7 strain in both sexual and asexual stages and was identified as a major candidate for inclusion in a multicomponent blood stage malaria vaccine. Bioinformatic analysis predicts a signal peptide with no identifiable membrane anchors suggesting that it coordinates a membrane-associated partner to enable surface localization. Fractionation of detergent-resistance membranes showed that PfVFT1 clusters with GPI-anchored parasite proteins including Pf38, Pf92, Pf113, PfMSP-1, PfMSP-4, PfASP, and PfRAMA. — an NCBI CDD conserved domain (cd22854); members share this curated model.
