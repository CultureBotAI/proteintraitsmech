identifier: CDD:cd08590
label: "Catalytic domain of uncharacterized Mycobacterium tuberculosis Rv2075c-like proteins. This subfamily corresponds to the catalytic domain present in uncharacterized Mycobacterium tuberculosis Rv2075c and its homologs. Members in this family are more closely related to the Streptomyces antibioticus phosphatidylinositol-specific phospholipase C1(SaPLC1)-like proteins rather than the typical bacterial phosphatidylinositol-specific phospholipase C (PI-PLC, EC 4.6.1.13), which participate in Ca2+-independent PI metabolism, hydrolyzing the membrane lipid phosphatidylinositol (PI) to produce phosphorylated myo-inositol and diacylglycerol (DAG). In contrast, SaPLC1-like proteins have two Ca2+-chelating amino acid substitutions which convert them to metal-dependent bacterial PI-PLC. Rv2075c and its homologs have the same amino acid substitutions as well, which might suggest they have metal-dependent PI-PLC activity."
definition: >-
  Catalytic domain of uncharacterized Mycobacterium tuberculosis Rv2075c-like proteins. This subfamily corresponds to the catalytic domain present in uncharacterized Mycobacterium tuberculosis Rv2075c and its homologs. Members in this family are more closely related to the Streptomyces antibioticus phosphatidylinositol-specific phospholipase C1(SaPLC1)-like proteins rather than the typical bacterial phosphatidylinositol-specific phospholipase C (PI-PLC, EC 4.6.1.13), which participate in Ca2+-independent PI metabolism, hydrolyzing the membrane lipid phosphatidylinositol (PI) to produce phosphorylated myo-inositol and diacylglycerol (DAG). In contrast, SaPLC1-like proteins have two Ca2+-chelating amino acid substitutions which convert them to metal-dependent bacterial PI-PLC. Rv2075c and its homologs have the same amino acid substitutions as well, which might suggest they have metal-dependent PI-PLC activity. — an NCBI CDD conserved domain (cd08590); members share this curated model.
