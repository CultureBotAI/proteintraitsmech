identifier: CDD:cd14590
label: "protein tyrosine phosphatase-like domain of myotubularin related phosphoinositide phosphatase 2. Myotubularin related phosphoinositide phosphatase 2 (MTMR2) is enzymatically active and contains an additional N-terminal PH-GRAM domain and C-terminal coiled-coiled domain and PDZ binding site. Mutations in MTMR2 causes Charcot-Marie-Tooth type 4B1, a severe childhood-onset neuromuscular disorder, characterized by demyelination and redundant loops of myelin known as myelin outfoldings, a similar phenotype as mutations in MTMR13. MTMR13, an inactive phosphatase, is believed to interact with MTMR2 and stimulate its phosphatase activity. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively."
definition: >-
  protein tyrosine phosphatase-like domain of myotubularin related phosphoinositide phosphatase 2. Myotubularin related phosphoinositide phosphatase 2 (MTMR2) is enzymatically active and contains an additional N-terminal PH-GRAM domain and C-terminal coiled-coiled domain and PDZ binding site. Mutations in MTMR2 causes Charcot-Marie-Tooth type 4B1, a severe childhood-onset neuromuscular disorder, characterized by demyelination and redundant loops of myelin known as myelin outfoldings, a similar phenotype as mutations in MTMR13. MTMR13, an inactive phosphatase, is believed to interact with MTMR2 and stimulate its phosphatase activity. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively. — an NCBI CDD conserved domain (cd14590); members share this curated model.
