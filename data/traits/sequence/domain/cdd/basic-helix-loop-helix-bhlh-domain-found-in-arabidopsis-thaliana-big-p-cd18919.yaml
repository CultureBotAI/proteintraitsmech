identifier: CDD:cd18919
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana BIG PETAL (BPE) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as BPE, HBI1 and BEE proteins (BEE1-3). BPE, also termed AtbHLH31, or EN 88, is involved in the control of Arabidopsis petal size, by interfering with postmitotic cell expansion to limit final petal cell size. HBI1, also termed AtbHLH64, or homolog of bee2 interacting with IBH1, or EN 79, is an atypical bHLH transcription factor that acts as positive regulator of cell elongation downstream of multiple external and endogenous signals by direct binding to the promoters and activation of the two expansin genes EXPA1 and EXPA8, encoding cell wall loosening enzymes. BEEs, also termed protein Brassinosteroid enhanced expression, are positive regulators of brassinosteroid signaling."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana BIG PETAL (BPE) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as BPE, HBI1 and BEE proteins (BEE1-3). BPE, also termed AtbHLH31, or EN 88, is involved in the control of Arabidopsis petal size, by interfering with postmitotic cell expansion to limit final petal cell size. HBI1, also termed AtbHLH64, or homolog of bee2 interacting with IBH1, or EN 79, is an atypical bHLH transcription factor that acts as positive regulator of cell elongation downstream of multiple external and endogenous signals by direct binding to the promoters and activation of the two expansin genes EXPA1 and EXPA8, encoding cell wall loosening enzymes. BEEs, also termed protein Brassinosteroid enhanced expression, are positive regulators of brassinosteroid signaling. — an NCBI CDD conserved domain (cd18919); members share this curated model.
