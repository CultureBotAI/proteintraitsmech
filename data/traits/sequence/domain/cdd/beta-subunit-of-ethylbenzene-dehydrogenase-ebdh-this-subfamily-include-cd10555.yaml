identifier: CDD:cd10555
label: "beta subunit of ethylbenzene-dehydrogenase (EBDH). This subfamily includes ethylbenzene dehydrogenase (EBDH, EC 1.17.99.2), a member of the DMSO reductase family.  EBDH oxidizes the hydrocarbon ethylbenzene to (S)-1-phenylethanol. It is a heterotrimer, with the alpha subunit containing the catalytic center with a molybdenum held by two molybdopterin-guanine dinucleotides, the beta subunit containing four iron-sulfur clusters (the electron transfer subunit) and the gamma subunit containing a methionine and a lysine as axial heme ligands.  During catalysis, electrons produced by substrate oxidation are transferred to a heme in the gamma subunit and then presumably to a separate cytochrome involved in nitrate respiration."
definition: >-
  beta subunit of ethylbenzene-dehydrogenase (EBDH). This subfamily includes ethylbenzene dehydrogenase (EBDH, EC 1.17.99.2), a member of the DMSO reductase family. EBDH oxidizes the hydrocarbon ethylbenzene to (S)-1-phenylethanol. It is a heterotrimer, with the alpha subunit containing the catalytic center with a molybdenum held by two molybdopterin-guanine dinucleotides, the beta subunit containing four iron-sulfur clusters (the electron transfer subunit) and the gamma subunit containing a methionine and a lysine as axial heme ligands. During catalysis, electrons produced by substrate oxidation are transferred to a heme in the gamma subunit and then presumably to a separate cytochrome involved in nitrate respiration. — an NCBI CDD conserved domain (cd10555); members share this curated model.
