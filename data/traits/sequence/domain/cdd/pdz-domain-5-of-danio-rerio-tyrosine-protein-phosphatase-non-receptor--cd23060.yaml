identifier: CDD:cd23060
label: "PDZ domain 5 of Danio rerio tyrosine-protein phosphatase non-receptor type 13 (Ptpn13) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 5 of Danio rerio Ptpn13, and related domains. Protein-tyrosine phosphatases (PTPs) dephosphorylate phosphotyrosyl residues in proteins that are phosphorylated by protein tyrosine kinases (PTKs). Danio rerio Ptpn13 is a classical non-receptor-like PTP. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PTPN13-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
