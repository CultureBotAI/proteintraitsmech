identifier: CDD:cd20642
label: "cytochrome P450 family 72. Cytochrome P450 family 72 (CYP72) belongs to the plant CYP72 clan, which is generally associated with the metabolism of a diversity of fairly hydrophobic compounds including fatty acids and isoprenoids, with the catabolism of hormones (brassinosteroids and gibberellin, GA) and with the biosynthesis of cytokinins. Characterized members, among others, include: Catharanthus roseus cytochrome P450 72A1 (CYP72A1), also called secologanin synthase (EC 1.3.3.9), that catalyzes the conversion of loganin into secologanin, the precursor of monoterpenoid indole alkaloids and ipecac alkaloids; Medicago truncatula CYP72A67 that catalyzes a key oxidative step in hemolytic sapogenin biosynthesis; and Arabidopsis thaliana CYP72C1, an atypical CYP that acts on brassinolide precursors and functions as a brassinosteroid-inactivating enzyme. This family also includes Panax ginseng CYP716A47 that catalyzes the formation of protopanaxadiol from dammarenediol-II during ginsenoside biosynthesis. CYP72 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 72. Cytochrome P450 family 72 (CYP72) belongs to the plant CYP72 clan, which is generally associated with the metabolism of a diversity of fairly hydrophobic compounds including fatty acids and isoprenoids, with the catabolism of hormones (brassinosteroids and gibberellin, GA) and with the biosynthesis of cytokinins. Characterized members, among others, include: Catharanthus roseus cytochrome P450 72A1 (CYP72A1), also called secologanin synthase (EC 1.3.3.9), that catalyzes the conversion of loganin into secologanin, the precursor of monoterpenoid indole alkaloids and ipecac alkaloids; Medicago truncatula CYP72A67 that catalyzes a key oxidative step in hemolytic sapogenin biosynthesis; and Arabidopsis thaliana CYP72C1, an atypical CYP that acts on brassinolide precursors and functions as a brassinosteroid-inactivating enzyme. This family also includes Panax ginseng CYP716A47 that catalyzes the formation of protopanaxadiol from dammarenediol-II during ginsenoside biosynthesis. CYP72 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20642); members share this curated model.
