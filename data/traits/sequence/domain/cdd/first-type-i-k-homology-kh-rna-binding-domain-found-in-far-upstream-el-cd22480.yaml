identifier: CDD:cd22480
label: "first type I K homology (KH) RNA-binding domain found in far upstream element-binding protein 3 (FUBP3) and similar proteins. FUBP3, also called FUSE-binding protein 3, or MARTA2, was previously shown to mediate dendritic targeting of MAP2 mRNA in neurons. It may interact with single-stranded DNA from the far-upstream element (FUSE) and activate gene expression. It is required for beta-actin mRNA localization. It also interacts with fibroblast growth factor 9 (FGF9) 3'-UTR UG repeats and positively controls FGF9 expression through increasing translation of FGF9 mRNA. FUBP3 contains four K-homology (KH) RNA-binding domains. The model corresponds to the first one."
definition: >-
  first type I K homology (KH) RNA-binding domain found in far upstream element-binding protein 3 (FUBP3) and similar proteins. FUBP3, also called FUSE-binding protein 3, or MARTA2, was previously shown to mediate dendritic targeting of MAP2 mRNA in neurons. It may interact with single-stranded DNA from the far-upstream element (FUSE) and activate gene expression. It is required for beta-actin mRNA localization. It also interacts with fibroblast growth factor 9 (FGF9) 3'-UTR UG repeats and positively controls FGF9 expression through increasing translation of FGF9 mRNA. FUBP3 contains four K-homology (KH) RNA-binding domains. The model corresponds to the first one. — an NCBI CDD conserved domain (cd22480); members share this curated model.
