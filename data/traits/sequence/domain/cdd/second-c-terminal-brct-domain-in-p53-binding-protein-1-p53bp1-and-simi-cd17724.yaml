identifier: CDD:cd17724
label: "Second (C-terminal) BRCT domain in p53-binding protein 1 (p53BP1) and similar proteins. p53BP1, also termed 53BP1, or TP53-binding protein 1 (TP53BP1) , is a double-strand break (DSB) repair protein involved in response to DNA damage, telomere dynamics, and class-switch recombination (CSR) during antibody genesis. TP53BP1 contains two tandem BRCT repeats. This family corresponds to the second BRCT domain."
definition: >-
  Second (C-terminal) BRCT domain in p53-binding protein 1 (p53BP1) and similar proteins. p53BP1, also termed 53BP1, or TP53-binding protein 1 (TP53BP1) , is a double-strand break (DSB) repair protein involved in response to DNA damage, telomere dynamics, and class-switch recombination (CSR) during antibody genesis. TP53BP1 contains two tandem BRCT repeats. This family corresponds to the second BRCT domain. — an NCBI CDD conserved domain (cd17724); members share this curated model.
