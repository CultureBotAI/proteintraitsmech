identifier: CDD:cd21941
label: "leucine zipper domain found in TSC22 domain family protein 4. TSC22 domain family protein 4 (TSC22D4), also called TSC22-related-inducible leucine zipper protein 2 (TILZ2), or Tsc-22-like protein THG-1, is a transcriptional repressor that acts as a molecular determinant of insulin signalling and glucose handling. It also functions in hepatic lipid handling by regulating hepatic very-low-density-lipoprotein (VLDL) release and lipogenic gene expression. This model corresponds to the conserved leucine zipper (ZIP) domain located at the C-terminus of TSC22D4. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. Thus, the DNA-binding capability of the ZIP domain is not obvious. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription."
definition: >-
  leucine zipper domain found in TSC22 domain family protein 4. TSC22 domain family protein 4 (TSC22D4), also called TSC22-related-inducible leucine zipper protein 2 (TILZ2), or Tsc-22-like protein THG-1, is a transcriptional repressor that acts as a molecular determinant of insulin signalling and glucose handling. It also functions in hepatic lipid handling by regulating hepatic very-low-density-lipoprotein (VLDL) release and lipogenic gene expression. This model corresponds to the conserved leucine zipper (ZIP) domain located at the C-terminus of TSC22D4. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. Thus, the DNA-binding capability of the ZIP domain is not obvious. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription. — an NCBI CDD conserved domain (cd21941); members share this curated model.
