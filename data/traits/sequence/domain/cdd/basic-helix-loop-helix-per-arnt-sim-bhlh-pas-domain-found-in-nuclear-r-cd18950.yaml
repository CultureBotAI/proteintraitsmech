identifier: CDD:cd18950
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in nuclear receptor coactivator 2 (NCoA-2) and similar proteins. NCoA-2, also termed Class E basic helix-loop-helix protein 75 (bHLHe75), or transcriptional intermediary factor 2 (TIF2), or steroid receptor coactivator 2 (SRC-2), or glucocorticoid receptor interacting protein-1 (GRIP1), is a bHLH-PAS transcriptional coactivator for steroid receptors and nuclear receptors. It is required with NCoA-1 to control energy balance between white and brown adipose tissues."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in nuclear receptor coactivator 2 (NCoA-2) and similar proteins. NCoA-2, also termed Class E basic helix-loop-helix protein 75 (bHLHe75), or transcriptional intermediary factor 2 (TIF2), or steroid receptor coactivator 2 (SRC-2), or glucocorticoid receptor interacting protein-1 (GRIP1), is a bHLH-PAS transcriptional coactivator for steroid receptors and nuclear receptors. It is required with NCoA-1 to control energy balance between white and brown adipose tissues. — an NCBI CDD conserved domain (cd18950); members share this curated model.
