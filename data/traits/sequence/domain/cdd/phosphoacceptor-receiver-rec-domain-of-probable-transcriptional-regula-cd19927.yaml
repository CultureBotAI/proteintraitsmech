identifier: CDD:cd19927
label: "phosphoacceptor receiver (REC) domain of probable transcriptional regulator Ycf29. Ycf29 is a probable response regulator of a two-component system (TCS), typically consisting a sensor and a response regulator, that functions in adaptation to changing environments. Processes regulated by TCSs in bacteria include sporulation, pathogenicity, virulence, chemotaxis, and membrane transport. Ycf29 contains an N-terminal REC domain and a LuxR-type helix-turn-helix DNA-binding output domain. REC domains function as phosphorylation-mediated switches within RRs, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of probable transcriptional regulator Ycf29. Ycf29 is a probable response regulator of a two-component system (TCS), typically consisting a sensor and a response regulator, that functions in adaptation to changing environments. Processes regulated by TCSs in bacteria include sporulation, pathogenicity, virulence, chemotaxis, and membrane transport. Ycf29 contains an N-terminal REC domain and a LuxR-type helix-turn-helix DNA-binding output domain. REC domains function as phosphorylation-mediated switches within RRs, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19927); members share this curated model.
