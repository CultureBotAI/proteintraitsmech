identifier: CDD:cd18193
label: BTB_POZ_ZBTB2
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 2 (ZBTB2). ZBTB2 is a POZ domain Kruppel-like zinc finger (POK) family transcription factor acting as a potent repressor of the ARF-HDM2-p53-p21 pathway, which is important in cell cycle regulation. It represses transcription of the ARF, p53, and p21 genes, but activates the HDM2 gene. ZBTB2 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
