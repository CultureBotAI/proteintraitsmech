identifier: CDD:cd08532
label: "Sterile alpha motif (SAM)/Pointed domain of prostate-derived ETS factor. SAM Pointed domain of PDEF-like (Prostate-Derived ETS Factor) subfamily of ETS transcriptional regulators is a putative protein-protein interaction domain. In human males this activator is highly expressed in the prostate gland and enhances androgen-mediated activation of the PSA promoter though interaction with the DNA binding domain of androgen receptor. PDEF may play a role in prostate cancer development as well as in goblet cell formation and mucus production in the epithelial lining of respiratory and intestinal tracts."
definition: >-
  Sterile alpha motif (SAM)/Pointed domain of prostate-derived ETS factor. SAM Pointed domain of PDEF-like (Prostate-Derived ETS Factor) subfamily of ETS transcriptional regulators is a putative protein-protein interaction domain. In human males this activator is highly expressed in the prostate gland and enhances androgen-mediated activation of the PSA promoter though interaction with the DNA binding domain of androgen receptor. PDEF may play a role in prostate cancer development as well as in goblet cell formation and mucus production in the epithelial lining of respiratory and intestinal tracts. — an NCBI CDD conserved domain (cd08532); members share this curated model.
