identifier: CDD:cd22137
label: "F-box domain found in F-box/WD repeat-containing protein 12 (FBXW12) and similar proteins. FBXW12, also called F-box and WD-40 domain-containing protein 12, or F-box only protein 35 (FBXO35), is the substrate-recognition component of the SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex that mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It functions as an epithelial growth suppressor. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/WD repeat-containing protein 12 (FBXW12) and similar proteins. FBXW12, also called F-box and WD-40 domain-containing protein 12, or F-box only protein 35 (FBXO35), is the substrate-recognition component of the SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex that mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It functions as an epithelial growth suppressor. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22137); members share this curated model.
