identifier: CDD:cd09911
label: "Listerrria innocua Lin0431  is similar to the N-Utilization Substance G (NusG) N terminal (NGN) insert (DII). This family contains domains homologous to Listeria innocua Lin0431, a protein that is similar to the N-Utilization Substance G (NusG) N terminal (NGN) insert (domain II, DII). Lin0431 and Aquifex aeolicus NusG DII (AaeNusG DII ) have similar structure and similar basic charged surface distributions that may bind negatively charged nucleic acids and/or another anionic binding partner, suggesting a possible role in transcription/translation regulating functions. Despite these two domains having low sequence similarity, the NusG DII and DUF1312 domain families may have diverged from common evolutionary ancestral proteins, and may have similar biochemical functions."
definition: >-
  Listerrria innocua Lin0431 is similar to the N-Utilization Substance G (NusG) N terminal (NGN) insert (DII). This family contains domains homologous to Listeria innocua Lin0431, a protein that is similar to the N-Utilization Substance G (NusG) N terminal (NGN) insert (domain II, DII). Lin0431 and Aquifex aeolicus NusG DII (AaeNusG DII ) have similar structure and similar basic charged surface distributions that may bind negatively charged nucleic acids and/or another anionic binding partner, suggesting a possible role in transcription/translation regulating functions. Despite these two domains having low sequence similarity, the NusG DII and DUF1312 domain families may have diverged from common evolutionary ancestral proteins, and may have similar biochemical functions. — an NCBI CDD conserved domain (cd09911); members share this curated model.
