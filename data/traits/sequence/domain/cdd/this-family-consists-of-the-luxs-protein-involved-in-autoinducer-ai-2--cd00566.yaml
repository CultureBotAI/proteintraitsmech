identifier: CDD:cd00566
label: "This family consists of the LuxS protein involved in autoinducer AI-2 production in the quorum-sensing system 2. Quorum sensing allows bacterial populations to collectively control gene expression, and thus synchronize group behavior. The LuxS acts as an AI-2 synthase and the AI-2 is produced from S-adenosylmethionine in three enzymatic steps. The substrate for LuxS is S-ribosylhomocystein, which is cleaved to form two products, homocysteine and AI-2. LuxS is a homodimeric enzyme that has two identical active sites; each site has a substrate and a tetrahedral Zn2+ binding site. Autoinducer AI-2 has been proposed to serve as a 'universal signal' for interspecies commmunications."
definition: >-
  This family consists of the LuxS protein involved in autoinducer AI-2 production in the quorum-sensing system 2. Quorum sensing allows bacterial populations to collectively control gene expression, and thus synchronize group behavior. The LuxS acts as an AI-2 synthase and the AI-2 is produced from S-adenosylmethionine in three enzymatic steps. The substrate for LuxS is S-ribosylhomocystein, which is cleaved to form two products, homocysteine and AI-2. LuxS is a homodimeric enzyme that has two identical active sites; each site has a substrate and a tetrahedral Zn2+ binding site. Autoinducer AI-2 has been proposed to serve as a 'universal signal' for interspecies commmunications. — an NCBI CDD conserved domain (cd00566); members share this curated model.
