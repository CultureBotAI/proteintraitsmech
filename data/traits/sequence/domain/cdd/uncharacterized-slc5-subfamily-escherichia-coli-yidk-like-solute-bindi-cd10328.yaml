identifier: CDD:cd10328
label: "uncharacterized SLC5 subfamily, Escherichia coli YidK-like; solute binding domain. Uncharacterized subfamily of the solute binding domain of the solute carrier 5 (SLC5) transporter family (also called the sodium/glucose cotransporter family or solute sodium symporter family) that co-transports Na+ with sugars, amino acids, inorganic ions or vitamins. One member of the SLC5 family, human SGLT3, has been characterized as a glucose sensor and not a transporter. This subfamily includes the uncharacterized Escherichia coli YidK protein, and belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  uncharacterized SLC5 subfamily, Escherichia coli YidK-like; solute binding domain. Uncharacterized subfamily of the solute binding domain of the solute carrier 5 (SLC5) transporter family (also called the sodium/glucose cotransporter family or solute sodium symporter family) that co-transports Na+ with sugars, amino acids, inorganic ions or vitamins. One member of the SLC5 family, human SGLT3, has been characterized as a glucose sensor and not a transporter. This subfamily includes the uncharacterized Escherichia coli YidK protein, and belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd10328); members share this curated model.
