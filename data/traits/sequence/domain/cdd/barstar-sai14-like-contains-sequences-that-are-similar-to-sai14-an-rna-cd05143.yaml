identifier: CDD:cd05143
label: "Barstar_SaI14_like contains sequences that are similar to SaI14, an RNAase inhibitor, which are members of the Barstar family. Barstar is an intracellular inhibitor of barnase, an extracellular ribonuclease of Bacillus amyloliquefaciens. Barstar binds tightly to the barnase active site and sterically blocks it thus inhibiting its potentially lethal RNase activity inside the cell. The sequences in this subfamily are mostly uncharacterized, but believed to have a similar function and role."
definition: >-
  Barstar_SaI14_like contains sequences that are similar to SaI14, an RNAase inhibitor, which are members of the Barstar family. Barstar is an intracellular inhibitor of barnase, an extracellular ribonuclease of Bacillus amyloliquefaciens. Barstar binds tightly to the barnase active site and sterically blocks it thus inhibiting its potentially lethal RNase activity inside the cell. The sequences in this subfamily are mostly uncharacterized, but believed to have a similar function and role. — an NCBI CDD conserved domain (cd05143); members share this curated model.
