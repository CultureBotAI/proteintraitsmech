identifier: CDD:cd17982
label: "DEXH-box helicase domain of DEAH-box helicase 37. DHX37 plays a role in the development of the human nervous system and has been linked to schizophrenia.  It also negatively regulates poxviruses such as Myxoma virus. DEAH-box helicase 37 (DHX37) belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 37. DHX37 plays a role in the development of the human nervous system and has been linked to schizophrenia. It also negatively regulates poxviruses such as Myxoma virus. DEAH-box helicase 37 (DHX37) belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17982); members share this curated model.
