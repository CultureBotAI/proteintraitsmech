identifier: CDD:cd11145
label: DPPIV_like
definition: >-
  Dipeptidyl-peptidase IV. Dipeptidyl-peptidase IV (DPPIV, CD26) is a peptidease that regulates the activity of several biologically relevant peptides, and also acts as a receptor for adenosine deaminase (ADA), which regulates T-lymphocyte co-stimulatory signals. DPPIV is responsible for inactivating the hormones glucagon-like peptide-1 (GLP-1) and glucose-dependent insulinotropic peptide (GIP). These hormones are centrally involved in insulin release and utilization following a meal. In humans, DPPIV is a possible target in the treatment of Type 2 Diabetes. DPPIV is a homodimer, with each dimer containing both a beta propeller and an alpha/beta domain. This family also contains an esterase/lipase domain from human fibroblast activating protein alpha, which is implicated in numerous types of human cancer, including melanoma and breast cancer
