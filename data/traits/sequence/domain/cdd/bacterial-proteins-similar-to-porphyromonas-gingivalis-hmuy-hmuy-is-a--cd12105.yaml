identifier: CDD:cd12105
label: HmuY
definition: >-
  Bacterial proteins similar to Porphyromonas gingivalis HmuY. HmuY is a hemophore that scavenges heme from infected hosts and delivers it to the outer membrane receptor HmuR. Related but uncharacterized proteins do not appear to share the specific heme-binding site
