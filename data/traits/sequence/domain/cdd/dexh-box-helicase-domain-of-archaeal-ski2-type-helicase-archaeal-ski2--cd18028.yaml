identifier: CDD:cd18028
label: "DEXH-box helicase domain of archaeal Ski2-type helicase. Archaeal Ski2-type RNA helicases play an important role in RNA degradation, processing and splicing pathways. They belong to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of archaeal Ski2-type helicase. Archaeal Ski2-type RNA helicases play an important role in RNA degradation, processing and splicing pathways. They belong to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18028); members share this curated model.
