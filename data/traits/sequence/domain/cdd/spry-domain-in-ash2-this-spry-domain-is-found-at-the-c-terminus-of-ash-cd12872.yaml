identifier: CDD:cd12872
label: "SPRY domain in Ash2. This SPRY domain is found at the C-terminus of Ash2 (absent, small, or homeotic discs 2) -like proteins, core components of all mixed-lineage leukemia (MLL) family histone methyltransferases. Ash2 is a member of the trithorax group of transcriptional regulators of the Hox genes. Recent studies show that the SPRY domain of Ash2 mediates the interaction with RbBP5 and has an important role in regulating the methyltransferase activity of MLL complexes. In yeast, Ash2 is involved in histone methylation and is required for the earliest stages of embryogenesis."
definition: >-
  SPRY domain in Ash2. This SPRY domain is found at the C-terminus of Ash2 (absent, small, or homeotic discs 2) -like proteins, core components of all mixed-lineage leukemia (MLL) family histone methyltransferases. Ash2 is a member of the trithorax group of transcriptional regulators of the Hox genes. Recent studies show that the SPRY domain of Ash2 mediates the interaction with RbBP5 and has an important role in regulating the methyltransferase activity of MLL complexes. In yeast, Ash2 is involved in histone methylation and is required for the earliest stages of embryogenesis. — an NCBI CDD conserved domain (cd12872); members share this curated model.
