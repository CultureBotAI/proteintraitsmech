identifier: CDD:cd10969
label: "Putative catalytic NodB homology domain of a hypothetical protein Ecf1 from Escherichia coli and similar proteins. This family contains a hypothetical protein Ecf1 from Escherichia coli and its prokaryotic homologs. Although their biochemical properties remain to be determined, members in this family contain a conserved domain with a 5-stranded beta/alpha barrel, which is similar to the catalytic NodB homology domain of rhizobial NodB-like proteins, belonging to the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Putative catalytic NodB homology domain of a hypothetical protein Ecf1 from Escherichia coli and similar proteins. This family contains a hypothetical protein Ecf1 from Escherichia coli and its prokaryotic homologs. Although their biochemical properties remain to be determined, members in this family contain a conserved domain with a 5-stranded beta/alpha barrel, which is similar to the catalytic NodB homology domain of rhizobial NodB-like proteins, belonging to the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10969); members share this curated model.
