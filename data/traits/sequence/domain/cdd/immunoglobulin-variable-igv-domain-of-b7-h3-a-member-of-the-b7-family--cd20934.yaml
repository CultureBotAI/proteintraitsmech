identifier: CDD:cd20934
label: "Immunoglobulin Variable (IgV) domain of B7-H3, a member of the B7 family of immune checkpoint molecules. The members here are composed of the immunoglobulin variable (IgV) domain of B7-H3 also known as CD276), a member of the B7 family of immune checkpoint molecules. B7-H3 is an important immune checkpoint member of the B7 family and shares homology with other B7 ligands such as programmed death ligand 1 (PD-L1). The B7 family molecules interact with CD28 on T-cells to provide co-stimulatory signals that regulate T-cell activation and T-helper cell differentiation. Although B7-H3 has been shown to have both co-stimulatory and co-inhibitory effects on T-cell responses, the most current studies describe B7-H3 as a T cell inhibitor that promotes tumor aggressiveness and proliferation. Moreover, B7-H3 is highly overexpressed on a wide range of human solid cancers and promotes tumor growth, metastasis, and drug resistance. Thus, B7-H3 expression in tumors often correlates with both negative prognosis and poor clinical outcome in cancer patients. B7-H3 protein contains a predicted signal peptide, V- and C-like Ig domains (IgV and IgC), a transmembrane region, and an intracellular tail."
definition: >-
  Immunoglobulin Variable (IgV) domain of B7-H3, a member of the B7 family of immune checkpoint molecules. The members here are composed of the immunoglobulin variable (IgV) domain of B7-H3 also known as CD276), a member of the B7 family of immune checkpoint molecules. B7-H3 is an important immune checkpoint member of the B7 family and shares homology with other B7 ligands such as programmed death ligand 1 (PD-L1). The B7 family molecules interact with CD28 on T-cells to provide co-stimulatory signals that regulate T-cell activation and T-helper cell differentiation. Although B7-H3 has been shown to have both co-stimulatory and co-inhibitory effects on T-cell responses, the most current studies describe B7-H3 as a T cell inhibitor that promotes tumor aggressiveness and proliferation. Moreover, B7-H3 is highly overexpressed on a wide range of human solid cancers and promotes tumor growth, metastasis, and drug resistance. Thus, B7-H3 expression in tumors often correlates with both negative prognosis and poor clinical outcome in cancer patients. B7-H3 protein contains a predicted signal peptide, V- and C-like Ig domains (IgV and IgC), a transmembrane region, and an intracellular tail. — an NCBI CDD conserved domain (cd20934); members share this curated model.
