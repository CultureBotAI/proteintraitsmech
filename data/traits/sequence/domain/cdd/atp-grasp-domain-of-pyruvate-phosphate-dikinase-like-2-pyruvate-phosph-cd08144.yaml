identifier: CDD:cd08144
label: ATP-G_PPDK_N_like-2
definition: >-
  ATP-grasp domain of pyruvate phosphate dikinase-like 2. Pyruvate phosphate dikinase-like family members have the signature nucleotide-binding domain of ATP-grasp superfamily. Based on the sequence conservation it appears that this family has similar catalytic mechanism to that of PPDK. ATP and MG-binding sites are also conserved
