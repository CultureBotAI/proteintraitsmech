identifier: CDD:cd20076
label: "XPF-like nuclease domain of Fanconi anemia associated protein 24 kDa (FAAP24). FAAP24, also called Fanconi anemia core complex-associated protein 24, plays a role in DNA repair through recruitment of the Fanconi anemia (FA) core complex to damaged DNA. It regulates FANCD2 monoubiquitination upon DNA damage and induces chromosomal instability as well as hypersensitivity to DNA cross-linking agents, when repressed. FAAP24 may possess a high affinity toward single-stranded DNA (ssDNA). The nuclease domain of FAAP24 lacks the catalytic motif. The FANCM/FAAP24 complex is related to XPF/MUS81 endonucleases but lacks endonucleolytic activity. It binds branched DNA structures containing ssDNA regions, such as splayed-arm and 3'-flap DNA structures, and anchors the FA core complex to chromatin in repairing DNA interstrand crosslinks."
definition: >-
  XPF-like nuclease domain of Fanconi anemia associated protein 24 kDa (FAAP24). FAAP24, also called Fanconi anemia core complex-associated protein 24, plays a role in DNA repair through recruitment of the Fanconi anemia (FA) core complex to damaged DNA. It regulates FANCD2 monoubiquitination upon DNA damage and induces chromosomal instability as well as hypersensitivity to DNA cross-linking agents, when repressed. FAAP24 may possess a high affinity toward single-stranded DNA (ssDNA). The nuclease domain of FAAP24 lacks the catalytic motif. The FANCM/FAAP24 complex is related to XPF/MUS81 endonucleases but lacks endonucleolytic activity. It binds branched DNA structures containing ssDNA regions, such as splayed-arm and 3'-flap DNA structures, and anchors the FA core complex to chromatin in repairing DNA interstrand crosslinks. — an NCBI CDD conserved domain (cd20076); members share this curated model.
