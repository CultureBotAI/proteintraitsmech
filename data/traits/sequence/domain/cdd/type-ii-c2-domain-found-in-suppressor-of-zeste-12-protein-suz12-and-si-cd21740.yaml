identifier: CDD:cd21740
label: C2_II_SUZ12
definition: >-
  type II C2 domain found in suppressor of zeste 12 protein (SUZ12) and similar proteins. SUZ12, also called chromatin precipitated E2F target 9 protein (ChET 9 protein), or joined to JAZF1 protein, is a Polycomb group (PcG) protein that is a component of the PRC2/EED-EZH2 complex, which methylates 'Lys-9' (H3K9me) and 'Lys-27' (H3K27me) of histone H3, leading to transcriptional repression of the affected target gene. The PRC2/EED-EZH2 complex may also serve as a recruiting platform for DNA methyltransferases, thereby linking two epigenetic repression systems. SUZ12 is also involved in various cellular processes, including cell differentiation, proliferation, and apoptosis, and is frequently overexpressed in cancer cells. The model corresponds to the noncanonical type II C2 domain of SUZ12, which shares notable structural homology with the classical C2 domains and plays a role in protein-protein interactions that may contribute to its diverse functions
