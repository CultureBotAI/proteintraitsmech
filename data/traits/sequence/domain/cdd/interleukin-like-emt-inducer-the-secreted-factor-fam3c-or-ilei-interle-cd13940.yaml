identifier: CDD:cd13940
label: "Interleukin-like EMT inducer. The secreted factor FAM3C or ILEI (InterLeukin-like Emt Inducer) has been identifed as a protein involved in the epithelial-mesenchymal transition (EMT) and in processes associated with metastasis formation and the progression of cancer. The protein had initially been predicted to be a member of the four-helical cytokine family, hence the FAM3C designation. ILEI has been found to be widely expressed, and to be involved in retinal development."
definition: >-
  Interleukin-like EMT inducer. The secreted factor FAM3C or ILEI (InterLeukin-like Emt Inducer) has been identifed as a protein involved in the epithelial-mesenchymal transition (EMT) and in processes associated with metastasis formation and the progression of cancer. The protein had initially been predicted to be a member of the four-helical cytokine family, hence the FAM3C designation. ILEI has been found to be widely expressed, and to be involved in retinal development. — an NCBI CDD conserved domain (cd13940); members share this curated model.
