identifier: CDD:cd19357
label: "TenA_E proteins similar to Arabidopsis thaliana At3g16990. This family of TenA proteins belongs to the TenA_E class, and lacks the conserved active site Cys residue of the TenA_C class; most have a pair of structurally conserved Glu residues in the active site. TenA_C proteins (EC 3.5.99.2; aminopyrimidine aminohydrolase, also known as thiaminase II) catalyze the hydrolysis of the thiamin breakdown product 4-amino-5-amino-methyl-2-methylpyrimidine (amino-HMP) to 4-amino-5-hydroxymethyl-2-methylpyrimidine (HMP) in a thiamin salvage pathway; the role of TenA_E proteins is less clear. Members of this family include Arabidopsis thaliana At3g16990, Zea mays GRMZM2G080501, and Pyrococcus furiosus PF1337, among others. Arabidopsis thaliana TenA_E hydrolyzes amino-HMP to AMP, and the N-formyl derivative of amino-HMP to amino-HMP, but does not hydrolyze thiamin; nor does it have activity with other thiamine degradation products such as thiamine mono- or diphosphate, oxythiamine, oxothiamine, thiamine disulfide, desthiothiamine or thiochrome as substrates. Structural studies of P. furiosus PF1337 strongly support its enzymatic function in thiamine biosynthesis. It has also been suggested that TenA proteins act as transcriptional regulators based on changes in gene-expression patterns when TenA is overexpressed in Bacillus subtilis, however this effect may be indirect."
definition: >-
  TenA_E proteins similar to Arabidopsis thaliana At3g16990. This family of TenA proteins belongs to the TenA_E class, and lacks the conserved active site Cys residue of the TenA_C class; most have a pair of structurally conserved Glu residues in the active site. TenA_C proteins (EC 3.5.99.2; aminopyrimidine aminohydrolase, also known as thiaminase II) catalyze the hydrolysis of the thiamin breakdown product 4-amino-5-amino-methyl-2-methylpyrimidine (amino-HMP) to 4-amino-5-hydroxymethyl-2-methylpyrimidine (HMP) in a thiamin salvage pathway; the role of TenA_E proteins is less clear. Members of this family include Arabidopsis thaliana At3g16990, Zea mays GRMZM2G080501, and Pyrococcus furiosus PF1337, among others. Arabidopsis thaliana TenA_E hydrolyzes amino-HMP to AMP, and the N-formyl derivative of amino-HMP to amino-HMP, but does not hydrolyze thiamin; nor does it have activity with other thiamine degradation products such as thiamine mono- or diphosphate, oxythiamine, oxothiamine, thiamine disulfide, desthiothiamine or thiochrome as substrates. Structural studies of P. furiosus PF1337 strongly support its enzymatic function in thiamine biosynthesis. It has also been suggested that TenA proteins act as transcriptional regulators based on changes in gene-expression patterns when TenA is overexpressed in Bacillus subtilis, however this effect may be indirect. — an NCBI CDD conserved domain (cd19357); members share this curated model.
