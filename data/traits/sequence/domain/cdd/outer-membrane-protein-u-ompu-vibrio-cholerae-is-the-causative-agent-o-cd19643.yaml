identifier: CDD:cd19643
label: beta16_OmpU
definition: >-
  Outer membrane protein U (OmpU). Vibrio cholerae is the causative agent of cholera, a disease estimated to affect 18 million people each year worldwide. Vibrio expresses an array of OMPs with a range of subunit molecular masses. Porin OmpU is one of the most widely studied. It has been shown to mediate host/Vibrio interactions, being involved in the resistance to antimicrobial peptides, the adherence to host cells, or pathogen/symbiont recognition. Additionally OmpU plays essential roles in the flagellum as a part of the sheath structure. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface
