identifier: CDD:cd06709
label: "PDZ domain of synaptojanin-2-binding protein (SYNJ2BP), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of SYNJ2BP, and related domains. SYNJ2BP (also known as mitochondrial outer membrane protein 25, OMP25) regulates endocytosis of activin type 2 receptor kinases through the Ral/RALBP1-dependent pathway and may be involved in suppression of activin-induced signal transduction. Binding partners of the SYNJ2BP PDZ domain include activin type II receptors (ActR-II), and SYNJ2. SYNJ2BP interacts with the PDZ binding motif of the Notch Delta-like ligand 1 (DLL1) and DLL4, promoting Delta-Notch signaling, and inhibiting sprouting angiogenesis. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This SYNJ2BP-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of synaptojanin-2-binding protein (SYNJ2BP), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of SYNJ2BP, and related domains. SYNJ2BP (also known as mitochondrial outer membrane protein 25, OMP25) regulates endocytosis of activin type 2 receptor kinases through the Ral/RALBP1-dependent pathway and may be involved in suppression of activin-induced signal transduction. Binding partners of the SYNJ2BP PDZ domain include activin type II receptors (ActR-II), and SYNJ2. SYNJ2BP interacts with the PDZ binding motif of the Notch Delta-like ligand 1 (DLL1) and DLL4, promoting Delta-Notch signaling, and inhibiting sprouting angiogenesis. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This SYNJ2BP-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06709); members share this curated model.
