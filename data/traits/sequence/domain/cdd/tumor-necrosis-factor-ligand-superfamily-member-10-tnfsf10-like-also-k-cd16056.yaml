identifier: CDD:cd16056
label: "Tumor necrosis factor ligand superfamily member 10 (TNFSF10)-like, also known as a TNF-related apoptosis inducing ligand (TRAIL)-like. This family contains domains similar to TNFSF10 (also known as TNF-related apoptosis inducing ligand or TRAIL, TNF-like 2 or TL2, APO2L, CD253 or Apo-2L) which is involved in induction of apoptosis in tumor, infected, or transformed cells through activation of specific receptors. It is expressed on the surface of activated immune cells (natural killer cells, T cells, macrophages and dendritic cells) where it functions as an immune effector molecule and mediates antitumor cytotoxicity and immune surveillance. It can mediate the ability of some natural killer cells to block tumor growth and metastasis, and modulate memory T-cells functions. TRAIL promotes apoptosis in a variety of cancer cell types by interacting with the transmembrane death receptors (DRs) TRAIL-R1 (DR4/TNFRSF10A) and TRAIL-R2 (DR5/TNFRSF10B). The DRs contain an intracellular death domain, and when activated, can stimulate extrinsic apoptosis pathway as well as survival/proliferation pathways, such as nuclear factor kB (NF-kB), ERK1/ERK2, and Akt. TRAIL also binds to transmembrane receptors TRAIL-R3 (TRID/DcR1/TNFRSF10C) and TRAIL-R4 (DcR2/TNFRSF10D, as well as the soluble receptor osteoprotegerin (OPG) known to act as decoy or regulatory receptors (DcRs). Thus, TRAIL receptor/ligand system is considered among the death receptor family members as the most suitable target for therapeutic exploitation in human cancers. DcR1 and DcR2 genes are reported to be hyper-methylated in prostate cancer and the TRAIL ligand has been explored as a therapeutic drug.  Experimental data has shown that DR4 specific TRAIL variants are more efficacious than wild-type TRAIL in pancreatic cancer. TRAIL may be implicated in the development and progression of diabetes; in Type 1 Diabetes Mellitus (T1DM) patients TRAIL circulating levels are decreased and negatively correlated with insulin requirement. TRAIL/TRAIL-R system also plays an important role in relevant ocular pathologic settings, such as cancers and major diabetic complications such as retinopathy and macular degeneration.  TRAIL expression levels in human hepatocellular carcinoma (HCC) have implications for tumor growth, recurrence and survival; low TRAIL mRNA level is not only a dominant feature in HCC development and growth, but also a predictor of tumor recurrence and poorer survival rates."
definition: >-
  Tumor necrosis factor ligand superfamily member 10 (TNFSF10)-like, also known as a TNF-related apoptosis inducing ligand (TRAIL)-like. This family contains domains similar to TNFSF10 (also known as TNF-related apoptosis inducing ligand or TRAIL, TNF-like 2 or TL2, APO2L, CD253 or Apo-2L) which is involved in induction of apoptosis in tumor, infected, or transformed cells through activation of specific receptors. It is expressed on the surface of activated immune cells (natural killer cells, T cells, macrophages and dendritic cells) where it functions as an immune effector molecule and mediates antitumor cytotoxicity and immune surveillance. It can mediate the ability of some natural killer cells to block tumor growth and metastasis, and modulate memory T-cells functions. TRAIL promotes apoptosis in a variety of cancer cell types by interacting with the transmembrane death receptors (DRs) TRAIL-R1 (DR4/TNFRSF10A) and TRAIL-R2 (DR5/TNFRSF10B). The DRs contain an intracellular death domain, and when activated, can stimulate extrinsic apoptosis pathway as well as survival/proliferation pathways, such as nuclear factor kB (NF-kB), ERK1/ERK2, and Akt. TRAIL also binds to transmembrane receptors TRAIL-R3 (TRID/DcR1/TNFRSF10C) and TRAIL-R4 (DcR2/TNFRSF10D, as well as the soluble receptor osteoprotegerin (OPG) known to act as decoy or regulatory receptors (DcRs). Thus, TRAIL receptor/ligand system is considered among the death receptor family members as the most suitable target for therapeutic exploitation in human cancers. DcR1 and DcR2 genes are reported to be hyper-methylated in prostate cancer and the TRAIL ligand has been explored as a therapeutic drug. Experimental data has shown that DR4 specific TRAIL variants are more efficacious than wild-type TRAIL in pancreatic cancer. TRAIL may be implicated in the development and progression of diabetes; in Type 1 Diabetes Mellitus (T1DM) patients TRAIL circulating levels are decreased and negatively correlated with insulin requirement. TRAIL/TRAIL-R system also plays an important role in relevant ocular pathologic settings, such as cancers and major diabetic complications such as retinopathy and macular degeneration. TRAIL expression levels in human hepatocellular carcinoma (HCC) have implications for tumor growth, recurrence and survival; low TRAIL mRNA level is not only a dominant feature in HCC development and growth, but also a predictor of tumor recurrence and poorer survival rates. — an NCBI CDD conserved domain (cd16056); members share this curated model.
