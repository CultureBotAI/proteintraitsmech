identifier: CDD:cd24106
label: "nucleotide-binding domain (NBD) of benzoyl-CoA reductase, bzd-type, Q subunit (BzdQ) and similar proteins. bzd-type benzoyl-CoA reductase BzdQ is encoded by the gene bzdQ from a benzoate-inducible catabolic operon in Azoarcus sp. The bzd-type benzoyl-CoA reductase system catalyzes the dearomatization of benzoyl-CoA, a common intermediate in pathways for the degradation for several different aromatic compounds, such as phenol and toluene. BzdQ may function the same as the A subunit of benzoyl-CoA reductase BcrA from Thauera aromatica and benzoyl-CoA reductase BadF from Rhodopseudomonas palustris."
definition: >-
