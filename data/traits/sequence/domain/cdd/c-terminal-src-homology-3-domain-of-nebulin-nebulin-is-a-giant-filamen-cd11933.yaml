identifier: CDD:cd11933
label: "C-terminal Src Homology 3 domain of Nebulin. Nebulin is a giant filamentous protein (600-900 kD) that is expressed abundantly in skeletal muscle. It binds to actin thin filaments and regulates its assembly and function. Nebulin was thought to be part of a molecular ruler complex that is critical in determining the lengths of actin thin filaments in skeletal muscle since its length, which varies due to alternative splicing, correlates with the length of thin filaments in various muscle types. Recent studies indicate that nebulin regulates thin filament length by stabilizing the filaments and preventing depolymerization. Mutations in nebulin can cause nemaline myopathy, characterized by muscle weakness which can be severe and can lead to neonatal lethality. Nebulin contains an N-terminal LIM domain, many nebulin repeats/super repeats, and a C-terminal SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  C-terminal Src Homology 3 domain of Nebulin. Nebulin is a giant filamentous protein (600-900 kD) that is expressed abundantly in skeletal muscle. It binds to actin thin filaments and regulates its assembly and function. Nebulin was thought to be part of a molecular ruler complex that is critical in determining the lengths of actin thin filaments in skeletal muscle since its length, which varies due to alternative splicing, correlates with the length of thin filaments in various muscle types. Recent studies indicate that nebulin regulates thin filament length by stabilizing the filaments and preventing depolymerization. Mutations in nebulin can cause nemaline myopathy, characterized by muscle weakness which can be severe and can lead to neonatal lethality. Nebulin contains an N-terminal LIM domain, many nebulin repeats/super repeats, and a C-terminal SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11933); members share this curated model.
