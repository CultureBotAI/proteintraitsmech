identifier: CDD:cd03113
label: "N-terminal domain of cytidine 5'-triphosphate synthase. Cytidine 5'-triphosphate synthase (CTPS) is a two-domain protein, which consists of an N-terminal synthetase domain and C-terminal glutaminase domain. The enzymes hydrolyze the amide bond of glutamine to ammonia and glutamate at the glutaminase domains and transfer nascent ammonia to the acceptor substrate at the synthetase domain to form an aminated product."
definition: >-
  N-terminal domain of cytidine 5'-triphosphate synthase. Cytidine 5'-triphosphate synthase (CTPS) is a two-domain protein, which consists of an N-terminal synthetase domain and C-terminal glutaminase domain. The enzymes hydrolyze the amide bond of glutamine to ammonia and glutamate at the glutaminase domains and transfer nascent ammonia to the acceptor substrate at the synthetase domain to form an aminated product. — an NCBI CDD conserved domain (cd03113); members share this curated model.
