identifier: CDD:cd18938
label: bHLH_TS_Mesp
definition: >-
  basic helix-loop-helix (bHLH) domain found in the mesoderm posterior protein (Mesp) family. Mesp, a bHLH tissue specific transcription factor, acts as a key regulator of the cardiovascular transcriptional network by inducing directly and/or indirectly the expression of the majority of key cardiovascular transcription factors. The Mesp family includes two bHLH transcription factors, Mesp1 and Mesp2. Mesp1, also termed Class C basic helix-loop-helix protein 5 (bHLHc5), promotes cardiovascular differentiation during embryonic development and embryonic stem cell differentiation. Mesp2, also termed Class C basic helix-loop-helix protein 6 (bHLHc6), plays an important role in somitogenesis
