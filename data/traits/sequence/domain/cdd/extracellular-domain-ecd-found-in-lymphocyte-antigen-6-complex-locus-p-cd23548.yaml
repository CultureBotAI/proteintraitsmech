identifier: CDD:cd23548
label: "extracellular domain (ECD) found in lymphocyte antigen 6 complex locus protein G6e (Ly6G6e) and similar proteins. Ly6G6e (also called lymphocyte antigen 6G6e) is a glycosylated, GPI-anchored, cell surface molecule, located on filopodia, which could act as cell receptor with potential roles in signaling or cell-cell interactions. It may act as a modulator of nicotinic acetylcholine receptors (nAChRs) activity. In vitro it potentiates alpha-3:beta-4-containing nAChRs maximum response by increasing peak current and slowing down receptor desensitization; the activity is dependent on its cell surface localization. Ly6G6e contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in lymphocyte antigen 6 complex locus protein G6e (Ly6G6e) and similar proteins. Ly6G6e (also called lymphocyte antigen 6G6e) is a glycosylated, GPI-anchored, cell surface molecule, located on filopodia, which could act as cell receptor with potential roles in signaling or cell-cell interactions. It may act as a modulator of nicotinic acetylcholine receptors (nAChRs) activity. In vitro it potentiates alpha-3:beta-4-containing nAChRs maximum response by increasing peak current and slowing down receptor desensitization; the activity is dependent on its cell surface localization. Ly6G6e contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23548); members share this curated model.
