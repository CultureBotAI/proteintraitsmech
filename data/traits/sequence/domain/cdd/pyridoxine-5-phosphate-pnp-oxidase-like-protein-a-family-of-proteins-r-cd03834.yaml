identifier: CDD:cd03834
label: PNPOx_like_2
definition: >-
  Pyridoxine 5'-phosphate (PNP) oxidase-like protein. A family of proteins relates to PNP oxidases and other flavin mononucleotide (FMN) binding proteins, including the Nim genes which are responsible for 5-Nitroimidazole-based antibiotics resistant. Members of this family catalyze FMN-mediated redox reactions. The electron is transferred from substrate to FMN and then pass along to another substrate. The specific function of this family is unknown
