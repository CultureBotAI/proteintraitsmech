identifier: CDD:cd17281
label: RMtype1_S_HpyAXIII_TRD1-CR1_like
definition: >-
  Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to Helicobacter pylori 26695 S subunit (S.HpyAXIII/Prototype S.Hpy26695ORF4050P) TRD1-CR1, Neisseria meningitidis 510612 S subunit (S.Nme510612ORF1157P) TRD1-CR1 and Streptococcus mitis SVGS_061 S subunit (S2.Smi61ORF7905P) TRD1-CR1. Helicobacter pylori 26695 S subunit (S.HpyAXIII/Prototype S.Hpy26695ORF4050P) recognizes 5'... CTANNNNNNNNTGT ... 3', and the recognition sequences of Neisseria meningitidis 510612 S subunit (S.Nme510612ORF1157P) and Streptococcus mitis SVGS_061 S subunit (S2.Smi61ORF7905P) are undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example, Helicobacter pylori 26695 S subunit (S.HpyAXIII/Prototype S.Hpy26695ORF4050P) TRD1 recognizes CTA/TAG, and TRD2 recognizes ACA/TGT. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one heteromeric enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases
