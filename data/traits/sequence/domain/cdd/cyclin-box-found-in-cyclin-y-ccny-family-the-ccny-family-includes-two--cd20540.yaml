identifier: CDD:cd20540
label: "cyclin box found in cyclin-Y (CCNY) family. The CCNY family includes two cyclins, CCNY and CCNY-like protein 1 (CCNYL1). They can enhance Wnt/beta-catenin signaling in mitosis. CCNY, also called Cyc-Y, cyclin box protein 1 (CBCP1), cyclin fold protein 1 (CFP1), or cyclin-X (CCNX), is a key cell cycle regulator that acts as a growth factor sensor to integrate extracellular signals with the cell cycle machinery. It is a positive regulatory subunit of the cyclin-dependent kinases CDK14/PFTK1 and CDK16. It acts as a cell-cycle regulator of Wnt signaling pathway during G2/M phase by recruiting CDK14/PFTK1 to the plasma membrane and promoting phosphorylation of LRP6, leading to the activation of the Wnt signaling pathway. Members of this family contain one cyclin box. The cyclin box is a protein binding domain."
definition: >-
  cyclin box found in cyclin-Y (CCNY) family. The CCNY family includes two cyclins, CCNY and CCNY-like protein 1 (CCNYL1). They can enhance Wnt/beta-catenin signaling in mitosis. CCNY, also called Cyc-Y, cyclin box protein 1 (CBCP1), cyclin fold protein 1 (CFP1), or cyclin-X (CCNX), is a key cell cycle regulator that acts as a growth factor sensor to integrate extracellular signals with the cell cycle machinery. It is a positive regulatory subunit of the cyclin-dependent kinases CDK14/PFTK1 and CDK16. It acts as a cell-cycle regulator of Wnt signaling pathway during G2/M phase by recruiting CDK14/PFTK1 to the plasma membrane and promoting phosphorylation of LRP6, leading to the activation of the Wnt signaling pathway. Members of this family contain one cyclin box. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20540); members share this curated model.
