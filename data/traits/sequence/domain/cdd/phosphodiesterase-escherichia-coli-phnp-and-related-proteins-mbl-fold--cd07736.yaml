identifier: CDD:cd07736
label: "phosphodiesterase Escherichia coli PhnP and related proteins; MBL-fold metallo hydrolase domain. Escherichia coli PhnP catalyzes the hydrolysis of 5-phospho-D-ribose-1,2-cyclic phosphate to D-ribose-1,5-bisphosphate, a step in the C-P lyase pathway. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
