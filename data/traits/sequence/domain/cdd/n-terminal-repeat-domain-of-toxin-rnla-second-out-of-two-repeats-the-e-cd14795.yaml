identifier: CDD:cd14795
label: RNLA_N_2
definition: >-
  N-terminal repeat domain of toxin RnlA; second out of two repeats. The Escherichia coli toxin RnlA functions as an mRNA endoribonuclease and is part of a two-component toxin-antitoxin system that promotes resistance to phage infections, together with the antitoxin RnlB. RNAse activity is located in the C-terminal domain. This N-terminal domain appears to participate in homodimerization and is the second out of two repeats
