identifier: CDD:cd21054
label: "C-terminal domain of protein lin-9 (LIN9) and similar proteins. LIN9, also termed HuLin-9, or beta subunit-associated regulator of apoptosis, or TUDOR gene similar protein, or type I interferon receptor beta chain-associated protein, or pRB-associated protein, acts as a tumor suppressor that inhibits DNA synthesis. Its ability to inhibit oncogenic transformation is mediated through its association with RB1. LIN9 also plays a role in the expression of genes required for the G1/S transition. The model corresponds to C-terminal domain of LIN9, which forms heterodimer with LIN52. LIN9 and LIN52 are two components of MuvB complex that cooperates with B-Myb during S-phase of the cell cycle to activate mitotic gene. LIN9 and LIN52 form the binding interface that recruits B-Myb to the MuvB complex."
definition: >-
  C-terminal domain of protein lin-9 (LIN9) and similar proteins. LIN9, also termed HuLin-9, or beta subunit-associated regulator of apoptosis, or TUDOR gene similar protein, or type I interferon receptor beta chain-associated protein, or pRB-associated protein, acts as a tumor suppressor that inhibits DNA synthesis. Its ability to inhibit oncogenic transformation is mediated through its association with RB1. LIN9 also plays a role in the expression of genes required for the G1/S transition. The model corresponds to C-terminal domain of LIN9, which forms heterodimer with LIN52. LIN9 and LIN52 are two components of MuvB complex that cooperates with B-Myb during S-phase of the cell cycle to activate mitotic gene. LIN9 and LIN52 form the binding interface that recruits B-Myb to the MuvB complex. — an NCBI CDD conserved domain (cd21054); members share this curated model.
