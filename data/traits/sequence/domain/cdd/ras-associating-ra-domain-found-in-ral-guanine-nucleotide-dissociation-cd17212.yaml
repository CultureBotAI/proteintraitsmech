identifier: CDD:cd17212
label: "Ras-associating (RA) domain found in Ral guanine nucleotide dissociation stimulator-like 3 (RalGDS-like 3) and similar proteins. RalGDS-like 3 (RGL3), also termed Ras pathway modulator (RPM), interacts in a GTP- and effector loop-dependent manner with Rit and Ras. As a novel potential effector of both p21 Ras and M-Ras, RGL3 negatively regulates Elk-1-dependent gene induction downstream of p21 Ras or mitogen activated protein/extracellular signal regulated kinase Kinase 1 (MEKK1). It also functions as a potential binding partner for Rap-family small G-proteins and profilin II. RGL3 belongs to RalGDS family, whose members are involved in Ras and Ral signaling pathways as downstream effector proteins. Members in this family have similar domain structure: a central CDC25 homology domain with an upstream Ras Exchange motif (REM), and a C-terminal Ras-associating (RA) domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier (Ubiquitination) in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair."
definition: >-
  Ras-associating (RA) domain found in Ral guanine nucleotide dissociation stimulator-like 3 (RalGDS-like 3) and similar proteins. RalGDS-like 3 (RGL3), also termed Ras pathway modulator (RPM), interacts in a GTP- and effector loop-dependent manner with Rit and Ras. As a novel potential effector of both p21 Ras and M-Ras, RGL3 negatively regulates Elk-1-dependent gene induction downstream of p21 Ras or mitogen activated protein/extracellular signal regulated kinase Kinase 1 (MEKK1). It also functions as a potential binding partner for Rap-family small G-proteins and profilin II. RGL3 belongs to RalGDS family, whose members are involved in Ras and Ral signaling pathways as downstream effector proteins. Members in this family have similar domain structure: a central CDC25 homology domain with an upstream Ras Exchange motif (REM), and a C-terminal Ras-associating (RA) domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier (Ubiquitination) in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. — an NCBI CDD conserved domain (cd17212); members share this curated model.
