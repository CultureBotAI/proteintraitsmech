identifier: CDD:cd11832
label: "Src homology 3 domain of SH3 and multiple ankyrin repeat domains (Shank) proteins. Shank proteins carry scaffolding functions through multiple sites of protein-protein interaction in its domain architecture, including ankyrin (ANK) repeats, a long proline rich region, as well as SH3, PDZ, and SAM domains. They bind a variety of membrane and cytosolic proteins, and exist in alternatively spliced isoforms. They are highly enriched in postsynaptic density (PSD) where they interact with the cytoskeleton and with postsynaptic membrane receptors including NMDA and glutamate receptors. They are crucial in the construction and organization of the PSD and dendritic spines of excitatory synapses. There are three members of this family (Shank1, Shank2, Shank3) which show distinct and cell-type specific patterns of expression. Shank1 is brain-specific; Shank2 is found in neurons, glia, endocrine cells, liver, and kidney; Shank3 is widely expressed. The SH3 domain of Shank binds GRIP, a scaffold protein that binds AMPA receptors and Eph receptors/ligands. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of SH3 and multiple ankyrin repeat domains (Shank) proteins. Shank proteins carry scaffolding functions through multiple sites of protein-protein interaction in its domain architecture, including ankyrin (ANK) repeats, a long proline rich region, as well as SH3, PDZ, and SAM domains. They bind a variety of membrane and cytosolic proteins, and exist in alternatively spliced isoforms. They are highly enriched in postsynaptic density (PSD) where they interact with the cytoskeleton and with postsynaptic membrane receptors including NMDA and glutamate receptors. They are crucial in the construction and organization of the PSD and dendritic spines of excitatory synapses. There are three members of this family (Shank1, Shank2, Shank3) which show distinct and cell-type specific patterns of expression. Shank1 is brain-specific; Shank2 is found in neurons, glia, endocrine cells, liver, and kidney; Shank3 is widely expressed. The SH3 domain of Shank binds GRIP, a scaffold protein that binds AMPA receptors and Eph receptors/ligands. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11832); members share this curated model.
