identifier: CDD:cd19404
label: TGF_beta_INHBA
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in inhibin beta A chain (INHBA) and similar proteins. INHBA, also termed activin beta-A chain, or erythroid differentiation protein (EDF), is a component of inhibin A, activin A, or activin AB. Inhibins and activins inhibit and activate, respectively, the secretion of follitropin by the pituitary gland
