identifier: CDD:cd23588
label: "extracellular domain (ECD) found in Elaphe quadrivirgata phospholipase A2 inhibitor gamma subunit (gamma-PLI) family. The gamma-PLI family includes gamma-PLI A and gamma-PLI B. Gamma-PLI inhibits the enzymatic activity of all phospholipase A2 (PA2) groups. Gamma-PLI A and gamma-PLI B form a heterodimer. Members in this family contain an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Elaphe quadrivirgata phospholipase A2 inhibitor gamma subunit (gamma-PLI) family. The gamma-PLI family includes gamma-PLI A and gamma-PLI B. Gamma-PLI inhibits the enzymatic activity of all phospholipase A2 (PA2) groups. Gamma-PLI A and gamma-PLI B form a heterodimer. Members in this family contain an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23588); members share this curated model.
