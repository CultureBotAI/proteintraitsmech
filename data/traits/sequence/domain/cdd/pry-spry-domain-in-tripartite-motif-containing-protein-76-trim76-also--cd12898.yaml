identifier: CDD:cd12898
label: "PRY/SPRY domain in tripartite motif-containing protein 76 (TRIM76), also called cardiomyopathy-associated protein 5. This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM76, a Class I TRIM protein. TRIM76 (also known as cardiomyopathy-associated protein 5 or CMYA5 or myospryn or SPRYD2) is a muscle-specific member of the TRIM superfamily, but lacks the RING domain. It has been suggested that TRIM76 is involved in two distinct processes, protein kinase A signaling and vesicular trafficking. It has also been implicated in Duchenne muscular dystrophy and cardiac disease; gene polymorphism of TRIM76 is associated with left ventricular wall thickness in patients with hypertension while its interactions with M-band titin and calpain 3 link it to tibial and limb-girdle muscular dystrophies."
