identifier: CDD:cd22503
label: "type I K homology (KH) RNA-binding domain found in ankyrin repeat and KH domain-containing protein 1 (ANKHD1) and similar proteins. ANKHD1, also called HIV-1 Vpr-binding ankyrin repeat protein, or multiple ankyrin repeats single KH domain, or Hmask, is highly expressed in various cancer tissues and is involved in cancer progression, including proliferation and invasion. It acts as a scaffolding protein that may be associated with the abnormal phenotype of leukemia cells. It may play might have a role in MM cell proliferation and cell cycle progression by regulating expression of p21. It also regulates cell cycle progression and proliferation in multiple myeloma cells. ANKHD1 is a component of Hippo signaling pathway. It functions as a positive regulator of YAP1 and promotes cell growth and cell cycle progression through Cyclin A upregulation in prostate cancer cells."
definition: >-
