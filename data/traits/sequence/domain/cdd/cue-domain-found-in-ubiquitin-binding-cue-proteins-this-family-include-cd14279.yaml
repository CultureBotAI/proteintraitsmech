identifier: CDD:cd14279
label: "CUE domain found in ubiquitin-binding CUE proteins. This family includes many coupling of ubiquitin conjugation to endoplasmic reticulum degradation (CUE) domain containing proteins that are characterized by an FP and a di-leucine-like sequence and bind to monoubiquitin with varying affinities. Some higher eukaryotic CUE domain proteins do not bind monoubiquitin efficiently, since they carry LP, rather than FP among CUE domains. CUE domains form three-helix bundle structures and are distantly related to the ubiquitin-associated (UBA) domains which are widely occurring ubiquitin-binding motifs found in a broad range of cellular proteins in species ranging from yeast to human. The majority of family members contain one CUE domain, but some family members from fungi harbor two CUE domains."
definition: >-
  CUE domain found in ubiquitin-binding CUE proteins. This family includes many coupling of ubiquitin conjugation to endoplasmic reticulum degradation (CUE) domain containing proteins that are characterized by an FP and a di-leucine-like sequence and bind to monoubiquitin with varying affinities. Some higher eukaryotic CUE domain proteins do not bind monoubiquitin efficiently, since they carry LP, rather than FP among CUE domains. CUE domains form three-helix bundle structures and are distantly related to the ubiquitin-associated (UBA) domains which are widely occurring ubiquitin-binding motifs found in a broad range of cellular proteins in species ranging from yeast to human. The majority of family members contain one CUE domain, but some family members from fungi harbor two CUE domains. — an NCBI CDD conserved domain (cd14279); members share this curated model.
