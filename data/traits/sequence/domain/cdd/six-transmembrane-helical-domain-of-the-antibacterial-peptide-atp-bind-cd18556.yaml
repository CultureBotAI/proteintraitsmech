identifier: CDD:cd18556
label: "Six-transmembrane helical domain of the antibacterial peptide ATP-binding cassette transporter McjD and similar proteins. This group represents the 6-TM subunit of the ABC transporter McjD that exports the antibacterial peptide microcin J25, which is an antimicrobial peptide produced by Enterobacteriaceae against other microorganisms for survival under nutrient starvation. Thus, the ABC exporter McjD provides self-immunity of the producing bacteria through export of the toxic peptide out of the cell. Bacterial ABC exporters are typically expressed as half-transporters that contain one transmembrane domain (TMD) fused to a nucleotide-binding domain (NBD), which dimerize to form the full transporter."
definition: >-
  Six-transmembrane helical domain of the antibacterial peptide ATP-binding cassette transporter McjD and similar proteins. This group represents the 6-TM subunit of the ABC transporter McjD that exports the antibacterial peptide microcin J25, which is an antimicrobial peptide produced by Enterobacteriaceae against other microorganisms for survival under nutrient starvation. Thus, the ABC exporter McjD provides self-immunity of the producing bacteria through export of the toxic peptide out of the cell. Bacterial ABC exporters are typically expressed as half-transporters that contain one transmembrane domain (TMD) fused to a nucleotide-binding domain (NBD), which dimerize to form the full transporter. — an NCBI CDD conserved domain (cd18556); members share this curated model.
