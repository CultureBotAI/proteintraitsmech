identifier: CDD:cd21489
label: IER_orf
definition: >-
  incompatibility-enhancing region protein. Protein family related to an ORF found in the incompatibility-enhancing region of plant nopaline type tumor-inducing (Ti) plasmid pTiC58. However, deletion analysis showed that this ORF (in contrast to two other ORFs in this region ) is not essential in imparting plasmid incompatibility
