identifier: CDD:cd18316
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins. The potassium channel tetramerization domain (KCTD) family proteins contain the BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD proteins play crucial roles in a variety of fundamental biological processes, such as protein ubiquitination and degradation, suppression of proliferation or transcription, cytoskeleton regulation, tetramerization and gating of ion channels and others. Some KCTD proteins are involved in protein ubiquitination as part of the CRL (Cullin RING Ligase) E3 ligases. Some others show Cullin-independent functions including binding and regulation of GABA (gamma-aminobutyric acid) receptors (KCTD8, KCTD12 and KCTD16) and inhibition of AP-2 function (KCTD15). KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins. The potassium channel tetramerization domain (KCTD) family proteins contain the BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD proteins play crucial roles in a variety of fundamental biological processes, such as protein ubiquitination and degradation, suppression of proliferation or transcription, cytoskeleton regulation, tetramerization and gating of ion channels and others. Some KCTD proteins are involved in protein ubiquitination as part of the CRL (Cullin RING Ligase) E3 ligases. Some others show Cullin-independent functions including binding and regulation of GABA (gamma-aminobutyric acid) receptors (KCTD8, KCTD12 and KCTD16) and inhibition of AP-2 function (KCTD15). KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18316); members share this curated model.
