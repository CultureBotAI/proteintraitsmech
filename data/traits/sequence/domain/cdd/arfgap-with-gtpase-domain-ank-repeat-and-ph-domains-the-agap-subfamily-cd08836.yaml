identifier: CDD:cd08836
label: "ArfGAP with GTPase domain, ANK repeat and PH domains. The AGAP subfamily of ADP-ribosylation factor GTPase-activating proteins (Arf GAPs) includes three members: AGAP1-3. In addition to the Arf GAP domain, AGAP proteins contain GTP-binding protein-like, ANK repeat and pleckstrin homology (PH) domains.  AGAP1 and AGAP2 have phosphatidylinositol 4,5-bisphosphate (PI(4,5)P2)-mediated GTPase-activating protein (GAP) activity preferentially toward Arf1, and function in the endocytic system. AGAP1 and AGAP2 independently regulate AP-3 endosomes and AP-1/Rab4 fast recycling endosomes, respectively. AGAP1, via its PH domain, directly interacts with the adapter protein 3 (AP-3), which is a coat protein involved in trafficking in the endosomal-lysosomal system, and regulates AP-3-dependent trafficking.  In other hand, AGAP2 specifically binds the clathrin adaptor protein AP-1 and regulates the AP-1/Rab-4 dependent endosomal trafficking. AGAP2 is overexpressed in different human cancers including prostate carcinoma and glioblastoma, and promotes cancer cell invasion. AGAP3 exists as a component of the NMDA receptor complex that regulates Arf6 and Ras/ERK signaling pathways. Moreover, AGAP3 regulates AMPA receptor trafficking through the ArfGAP domain. Together, AGAP3 is believed to involve in linking NMDA receptor activation to AMPA receptor trafficking."
definition: >-
  ArfGAP with GTPase domain, ANK repeat and PH domains. The AGAP subfamily of ADP-ribosylation factor GTPase-activating proteins (Arf GAPs) includes three members: AGAP1-3. In addition to the Arf GAP domain, AGAP proteins contain GTP-binding protein-like, ANK repeat and pleckstrin homology (PH) domains. AGAP1 and AGAP2 have phosphatidylinositol 4,5-bisphosphate (PI(4,5)P2)-mediated GTPase-activating protein (GAP) activity preferentially toward Arf1, and function in the endocytic system. AGAP1 and AGAP2 independently regulate AP-3 endosomes and AP-1/Rab4 fast recycling endosomes, respectively. AGAP1, via its PH domain, directly interacts with the adapter protein 3 (AP-3), which is a coat protein involved in trafficking in the endosomal-lysosomal system, and regulates AP-3-dependent trafficking. In other hand, AGAP2 specifically binds the clathrin adaptor protein AP-1 and regulates the AP-1/Rab-4 dependent endosomal trafficking. AGAP2 is overexpressed in different human cancers including prostate carcinoma and glioblastoma, and promotes cancer cell invasion. AGAP3 exists as a component of the NMDA receptor complex that regulates Arf6 and Ras/ERK signaling pathways. Moreover, AGAP3 regulates AMPA receptor trafficking through the ArfGAP domain. Together, AGAP3 is believed to involve in linking NMDA receptor activation to AMPA receptor trafficking. — an NCBI CDD conserved domain (cd08836); members share this curated model.
