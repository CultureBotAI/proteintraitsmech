identifier: CDD:cd12409
label: "RNA recognition motif 1 (RRM1) found in yeast regulator of rDNA transcription protein 5 (RRT5) and similar proteins. This subfamily corresponds to the RRM1 of the lineage specific family containing a group of uncharacterized yeast regulators of rDNA transcription protein 5 (RRT5), which may play roles in the modulation of rDNA transcription. RRT5 contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains)."
definition: >-
  RNA recognition motif 1 (RRM1) found in yeast regulator of rDNA transcription protein 5 (RRT5) and similar proteins. This subfamily corresponds to the RRM1 of the lineage specific family containing a group of uncharacterized yeast regulators of rDNA transcription protein 5 (RRT5), which may play roles in the modulation of rDNA transcription. RRT5 contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). — an NCBI CDD conserved domain (cd12409); members share this curated model.
