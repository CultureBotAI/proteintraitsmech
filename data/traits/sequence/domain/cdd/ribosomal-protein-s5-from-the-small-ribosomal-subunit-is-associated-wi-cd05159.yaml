identifier: CDD:cd05159
label: Ribosomal_S5_bacteria_eukaryota
definition: >-
  Ribosomal protein S5 from the small ribosomal subunit is associated with two types of mutations, those that reduce translational fidelity and those that produce resistance to the antibiotic spectinomycin. S5 has two structural domains both of which are included in this model, an N-terminal double-stranded RNA-binding domain (dsRBD) and a C-terminal RRM (RNA recognition motif) -like domain. The S5 C-terminal domain is thought to organize RNA structures associated with the message decoding region
