label: "cyclin box found in CDK5 and ABL1 enzyme substrate 2 (CABLES2). CABLES2, also called interactor with CDK3 2 (Ik3-2), acts as a proapoptotic factor involved in both p53-mediated and p53-independent apoptotic pathways. CABLES2 contains one cyclin box. The cyclin box is a protein binding domain."
