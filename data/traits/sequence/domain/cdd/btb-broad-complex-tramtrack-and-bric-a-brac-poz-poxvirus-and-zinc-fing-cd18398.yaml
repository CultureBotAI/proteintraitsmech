identifier: CDD:cd18398
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 16 (KCTD16). KCTD16 is a BTB/POZ domain-containing protein that is an auxiliary subunit of GABAB receptors associated with mood disorders. It interacts with amyloid beta precursor protein (APP), a type I transmembrane protein involved in a variety of cellular processes such as cell adhesion and axon guidance. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 16 (KCTD16). KCTD16 is a BTB/POZ domain-containing protein that is an auxiliary subunit of GABAB receptors associated with mood disorders. It interacts with amyloid beta precursor protein (APP), a type I transmembrane protein involved in a variety of cellular processes such as cell adhesion and axon guidance. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18398); members share this curated model.
