identifier: CDD:cd16721
label: "RING finger, HC subclass, found in RNA-binding protein MEX3B. MEX3B, also known as RING finger and KH domain-containing protein 3 (RKHD3), or RING finger protein 195 (RNF195), is an RNA-binding phosphoprotein that localizes in P-bodies and stress granules, which are two structures involved in the storage and turnover of mRNAs. It regulates the spatial organization of the Rap1 pathway that orchestrates Sertoli cell functions. It has a 3' long conserved untranslated region (3'LCU)-mediated fine-tuning system for mRNA regulation in early vertebrate development such as anteroposterior (AP) patterning and signal transduction. MEX3B contains two K homology (KH) domains that provide RNA-binding capacity, and a C-terminal C3HC4-type RING-HC finger. Like other MEX-3 family proteins, MEX3B shuttles between the nucleus and the cytoplasm via the CRM1-dependent export pathway."
definition: >-
  RING finger, HC subclass, found in RNA-binding protein MEX3B. MEX3B, also known as RING finger and KH domain-containing protein 3 (RKHD3), or RING finger protein 195 (RNF195), is an RNA-binding phosphoprotein that localizes in P-bodies and stress granules, which are two structures involved in the storage and turnover of mRNAs. It regulates the spatial organization of the Rap1 pathway that orchestrates Sertoli cell functions. It has a 3' long conserved untranslated region (3'LCU)-mediated fine-tuning system for mRNA regulation in early vertebrate development such as anteroposterior (AP) patterning and signal transduction. MEX3B contains two K homology (KH) domains that provide RNA-binding capacity, and a C-terminal C3HC4-type RING-HC finger. Like other MEX-3 family proteins, MEX3B shuttles between the nucleus and the cytoplasm via the CRM1-dependent export pathway. — an NCBI CDD conserved domain (cd16721); members share this curated model.
