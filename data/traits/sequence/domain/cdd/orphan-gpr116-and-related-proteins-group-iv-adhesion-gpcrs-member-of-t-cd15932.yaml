identifier: CDD:cd15932
label: "orphan GPR116 and related proteins, group IV adhesion GPCRs, member of the class B2 family of seven-transmembrane G protein-coupled receptors. group VI adhesion GPCRs consist of orphan receptors GPR110, GPR111, GPR113, GPR115, GPR116, and closely related proteins. The adhesion receptors are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in ligand recognition as well as cell-cell adhesion and cell-matrix interactions, linked by a stalk region to a class B seven-transmembrane domain. GPR110 possesses a SEA box in the N-terminal has been identified as an oncogene over-expressed in lung and prostate cancer. GPR113 contains a hormone binding domain and one EGF (epidermal grown factor) domain. GPR112 has extremely long N-terminus (about 2,400 amino acids) containing a number of Ser/Thr-rich glycosylation sites and a pentraxin (PTX) domain. GPR116 has two C2-set immunoglobulin-like repeats, which is found in the members of the immunoglobulin superfamily of cell surface proteins, and a SEA (sea urchin sperm protein, enterokinase, and a grin)-box, which is present in the extracellular domain of the transmembrane mucin (MUC) family and known to enhance O-glycosylation. In addition, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR-autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions. However, several adhesion GPCRs, including GPR 111, GPR115, and CELSR1, are predicted to be non-cleavable at the GAIN domain because of the lack of a consensus catalytic triad sequence (His-Leu-Ser/Thr) within their GPS."
