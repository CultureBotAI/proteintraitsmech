identifier: CDD:cd20828
label: "protein kinase C conserved region 1 (C1 domain) found in uncharacterized proteins similar to myotubularin-related proteins. The family includes a group of uncharacterized proteins that show high sequence similarity to vertebrate myotubularin-related proteins (MTMRs), such as MTMR5 and MTMR13. MTMRs may function as guanine nucleotide exchange factors (GEFs). Vertebrate MTMR5 and MTMR13 contain an N-terminal DENN domain, a PH-GRAM domain, an inactive PTP domain, a SET interaction domain, a coiled-coil domain, and a C-terminal PH domain. Members of this family contain these domains and have an additional C1 domain. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in uncharacterized proteins similar to myotubularin-related proteins. The family includes a group of uncharacterized proteins that show high sequence similarity to vertebrate myotubularin-related proteins (MTMRs), such as MTMR5 and MTMR13. MTMRs may function as guanine nucleotide exchange factors (GEFs). Vertebrate MTMR5 and MTMR13 contain an N-terminal DENN domain, a PH-GRAM domain, an inactive PTP domain, a SET interaction domain, a coiled-coil domain, and a C-terminal PH domain. Members of this family contain these domains and have an additional C1 domain. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20828); members share this curated model.
