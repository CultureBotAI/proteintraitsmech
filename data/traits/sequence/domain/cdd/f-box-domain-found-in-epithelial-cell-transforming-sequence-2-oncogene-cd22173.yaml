identifier: CDD:cd22173
label: "F-box domain found in epithelial cell-transforming sequence 2 oncogene-like (ECT2L) and similar proteins. ECT2L, also called lung-specific F-box and DH domain-containing protein, or putative guanine nucleotide exchange factor LFDH, may act as a guanine nucleotide exchange factor (GEF). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in epithelial cell-transforming sequence 2 oncogene-like (ECT2L) and similar proteins. ECT2L, also called lung-specific F-box and DH domain-containing protein, or putative guanine nucleotide exchange factor LFDH, may act as a guanine nucleotide exchange factor (GEF). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22173); members share this curated model.
