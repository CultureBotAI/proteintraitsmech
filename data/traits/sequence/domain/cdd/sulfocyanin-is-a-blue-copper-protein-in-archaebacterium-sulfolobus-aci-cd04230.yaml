identifier: CDD:cd04230
label: Sulfocyanin
definition: >-
  Sulfocyanin is a blue copper protein in archaebacterium Sulfolobus acidocaldarius. Sulfocyanin is a blue copper protein with a putative membrane anchoring hydrophobic motif at the N-terminus. It may substitute for cytochrome C in electron transfer reactions in archaea
