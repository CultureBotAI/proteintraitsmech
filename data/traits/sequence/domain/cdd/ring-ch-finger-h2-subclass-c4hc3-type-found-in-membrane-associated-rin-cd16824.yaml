identifier: CDD:cd16824
label: "RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH4 (MARCH4). MARCH4, also known as membrane-associated RING finger protein 4, membrane-associated RING-CH protein IV (MARCH-IV), or RING finger protein 174 (RNF174), is a transmembrane E3 ubiquitin-protein ligase that down-regulates the tetraspanin CD81 and major histocompatibility complex-I (MHC). It also associates with Mult1, suppressing Mult1 expression at the cell surface in a lysine-dependent manner that can be reversed by heat shocking the cells. MARCH4 contains an N-terminal C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, followed by two transmembrane regions."
definition: >-
  RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH4 (MARCH4). MARCH4, also known as membrane-associated RING finger protein 4, membrane-associated RING-CH protein IV (MARCH-IV), or RING finger protein 174 (RNF174), is a transmembrane E3 ubiquitin-protein ligase that down-regulates the tetraspanin CD81 and major histocompatibility complex-I (MHC). It also associates with Mult1, suppressing Mult1 expression at the cell surface in a lysine-dependent manner that can be reversed by heat shocking the cells. MARCH4 contains an N-terminal C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, followed by two transmembrane regions. — an NCBI CDD conserved domain (cd16824); members share this curated model.
