identifier: CDD:cd17408
label: "Protein unc-93 homolog B1 of the Major Facilitator Superfamily of transporters. Protein unc-93 homolog B1 (UNC93B1) controls intracellular trafficking and transport of a subset of Toll-like receptors (TLRs), including TLR3, TLR7 and TLR9, from the endoplasmic reticulum to endolysosomes where they can engage pathogen nucleotides and activate signaling cascades. It regulates differential transport of TLR7 and TLR9 into signaling endosomes to prevent autoimmunity. UNC93B1 belongs to the Unc-93 family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Protein unc-93 homolog B1 of the Major Facilitator Superfamily of transporters. Protein unc-93 homolog B1 (UNC93B1) controls intracellular trafficking and transport of a subset of Toll-like receptors (TLRs), including TLR3, TLR7 and TLR9, from the endoplasmic reticulum to endolysosomes where they can engage pathogen nucleotides and activate signaling cascades. It regulates differential transport of TLR7 and TLR9 into signaling endosomes to prevent autoimmunity. UNC93B1 belongs to the Unc-93 family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17408); members share this curated model.
