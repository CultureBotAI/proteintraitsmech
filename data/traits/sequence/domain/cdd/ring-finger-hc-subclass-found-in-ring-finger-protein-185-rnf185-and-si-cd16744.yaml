identifier: CDD:cd16744
label: "RING finger, HC subclass, found in RING finger protein 185 (RNF185) and similar proteins. RNF185 is an E3 ubiquitin-protein ligase of endoplasmic reticulum-associated degradation (ERAD) that targets cystic fibrosis transmembrane conductance regulator (CFTR). It controls the degradation of CFTR and CFTR F508del allele in a RING- and proteasome-dependent manner, but does not control that of other classical ERAD model substrates. It also negatively regulates osteogenic differentiation by targeting dishevelled2 (Dvl2), a key mediator of the Wnt signaling pathway, for degradation. Moreover, RNF185 regulates selective mitochondrial autophagy through interaction with the Bcl-2 family protein BNIP1. It also plays an important role in cell adhesion and migration through the modulation of cell migration by ubiquitinating paxillin. RNF185 contains a C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger protein 185 (RNF185) and similar proteins. RNF185 is an E3 ubiquitin-protein ligase of endoplasmic reticulum-associated degradation (ERAD) that targets cystic fibrosis transmembrane conductance regulator (CFTR). It controls the degradation of CFTR and CFTR F508del allele in a RING- and proteasome-dependent manner, but does not control that of other classical ERAD model substrates. It also negatively regulates osteogenic differentiation by targeting dishevelled2 (Dvl2), a key mediator of the Wnt signaling pathway, for degradation. Moreover, RNF185 regulates selective mitochondrial autophagy through interaction with the Bcl-2 family protein BNIP1. It also plays an important role in cell adhesion and migration through the modulation of cell migration by ubiquitinating paxillin. RNF185 contains a C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16744); members share this curated model.
