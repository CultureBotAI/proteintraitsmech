identifier: CDD:cd17424
label: "Monocarboxylate transporter 12 of the of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 12 (MCT12) is also called Solute carrier family 16 member 12 (SLC16A12). It is a creatine transporter encoded by the cataract and glucosuria associated gene SLC16A12. A heterozygous mutation of the gene causes a syndrome with juvenile cataracts, microcornea, and glucosuria. MCT12 may function in a basolateral exit pathway for creatine in the proximal tubule. It belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporter 12 of the of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 12 (MCT12) is also called Solute carrier family 16 member 12 (SLC16A12). It is a creatine transporter encoded by the cataract and glucosuria associated gene SLC16A12. A heterozygous mutation of the gene causes a syndrome with juvenile cataracts, microcornea, and glucosuria. MCT12 may function in a basolateral exit pathway for creatine in the proximal tubule. It belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17424); members share this curated model.
