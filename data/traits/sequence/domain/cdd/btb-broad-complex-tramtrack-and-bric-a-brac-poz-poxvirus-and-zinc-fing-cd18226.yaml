identifier: CDD:cd18226
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 41 (ZBTB41). ZBTB41, also called FRBZ1, may be involved in transcriptional regulation. Its specific function is as yet unknown. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 41 (ZBTB41). ZBTB41, also called FRBZ1, may be involved in transcriptional regulation. Its specific function is as yet unknown. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18226); members share this curated model.
