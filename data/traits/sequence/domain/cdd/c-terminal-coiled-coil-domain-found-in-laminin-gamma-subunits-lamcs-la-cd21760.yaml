identifier: CDD:cd21760
label: "C-terminal coiled-coil domain found in laminin gamma subunits (LAMCs). LAMCs are components of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma), which are bound to each other by disulfide bonds into a cross-shaped molecule comprising one long and three short arms with globules at each end. Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. The family includes three isoforms of LAMCs: LAMC1 (also called laminin B2 chain, or S-laminin subunit gamma, or S-LAM gamma), LAMC2 (also called cell-scattering factor 140 kDa subunit, or CSF 140 kDa subunit, or epiligrin subunit gamma, or kalinin subunit gamma, or kalinin/nicein/epiligrin 100 kDa subunit, or ladsin 140 kDa subunit, or laminin B2t chain, or laminin-5 subunit gamma, or large adhesive scatter factor 140 kDa subunit, or nicein subunit gamma) and LAMC3 (also called laminin-12 subunit gamma, or laminin-14 subunit gamma, or laminin-15 subunit gamma). The model corresponds to the C-terminal coiled-coil domain of LAMCs, which is responsible for the laminin alpha/beta/gamma heterotrimer formation."
definition: >-
  C-terminal coiled-coil domain found in laminin gamma subunits (LAMCs). LAMCs are components of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma), which are bound to each other by disulfide bonds into a cross-shaped molecule comprising one long and three short arms with globules at each end. Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. The family includes three isoforms of LAMCs: LAMC1 (also called laminin B2 chain, or S-laminin subunit gamma, or S-LAM gamma), LAMC2 (also called cell-scattering factor 140 kDa subunit, or CSF 140 kDa subunit, or epiligrin subunit gamma, or kalinin subunit gamma, or kalinin/nicein/epiligrin 100 kDa subunit, or ladsin 140 kDa subunit, or laminin B2t chain, or laminin-5 subunit gamma, or large adhesive scatter factor 140 kDa subunit, or nicein subunit gamma) and LAMC3 (also called laminin-12 subunit gamma, or laminin-14 subunit gamma, or laminin-15 subunit gamma). The model corresponds to the C-terminal coiled-coil domain of LAMCs, which is responsible for the laminin alpha/beta/gamma heterotrimer formation. — an NCBI CDD conserved domain (cd21760); members share this curated model.
