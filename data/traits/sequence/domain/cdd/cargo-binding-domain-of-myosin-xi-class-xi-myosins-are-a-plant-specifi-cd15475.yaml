label: "cargo binding domain of myosin XI. Class XI myosins are a plant specific group, homologous to class V myosins.  C-terminal domain of Arabidopsis myosin XI has been shown to be homologous  to the cargo-binding domain of yeast myosin V myo2p, which targets myosin to vacuole- and mitochondria, as well as secretory vesicle."
definition: >-
  cargo binding domain of myosin XI. Class XI myosins are a plant specific group, homologous to class V myosins. C-terminal domain of Arabidopsis myosin XI has been shown to be homologous to the cargo-binding domain of yeast myosin V myo2p, which targets myosin to vacuole- and mitochondria, as well as secretory vesicle. — an NCBI CDD conserved domain (cd15475); members share this curated model.
