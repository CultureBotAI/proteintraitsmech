identifier: CDD:cd15809
label: "PRY/SPRY domain in tripartite motif-binding protein 4 (TRIM4), also known as RING finger protein 87 (RNF87). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM4 which is also known as RING finger protein 87 (RNF87). TRIM4 domain is composed of RING/B-box/coiled-coil core and also known as RBCC protein. It is a positive regulator of RIG-I-mediated interferon (IFN) induction. It regulates virus-induced IFN induction and cellular antiviral innate immunity by targeting RIG-I for K63-linked poly-ubiquitination. Over-expression of TRIM4 enhances virus-triggered activation of transcription factors IRF3 and NF-kappaB, as well as IFN-beta induction. Expression of TRIM4 differs significantly in Huntington's Disease (HD) neural cells when compared with wild-type controls, possibly impacting down-regulation of the Huntingtin (HTT) gene, which is involved in the regulation of diverse cellular activities that are impaired in Huntington's Disease (HD) cells."
definition: >-
