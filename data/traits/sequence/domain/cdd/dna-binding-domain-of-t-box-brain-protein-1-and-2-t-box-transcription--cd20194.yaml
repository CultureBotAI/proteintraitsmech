identifier: CDD:cd20194
label: "DNA-binding domain of T-box brain protein 1 and 2, T-box transcription factor 21 and related T-box proteins. TBX21 (also known as T-cell-specific T-box transcription factor T-bet or transcription factor TBLYM) is a lineage-defining transcription factor which directs T helper type 1 (Th1) cell differentiation. This subfamily includes TBR1 (also known as T-brain-1, or TES-56), which is a neuron-specific transcription factor involved in forebrain development, and TBR2 (also known as Eomesodermin, Eomes, or T-brain-2), which is associated with neurogenesis, cardiogenesis and tumor immune response. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
  DNA-binding domain of T-box brain protein 1 and 2, T-box transcription factor 21 and related T-box proteins. TBX21 (also known as T-cell-specific T-box transcription factor T-bet or transcription factor TBLYM) is a lineage-defining transcription factor which directs T helper type 1 (Th1) cell differentiation. This subfamily includes TBR1 (also known as T-brain-1, or TES-56), which is a neuron-specific transcription factor involved in forebrain development, and TBR2 (also known as Eomesodermin, Eomes, or T-brain-2), which is associated with neurogenesis, cardiogenesis and tumor immune response. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. — an NCBI CDD conserved domain (cd20194); members share this curated model.
