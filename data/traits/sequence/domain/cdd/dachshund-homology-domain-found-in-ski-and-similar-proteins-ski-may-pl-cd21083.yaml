identifier: CDD:cd21083
label: "Dachshund-homology domain found in Ski and similar proteins. Ski may play a role in terminal differentiation of skeletal muscle cells but not in the determination of cells to the myogenic lineage. It functions as a repressor of transforming growth factor-beta (TGF-beta) signaling. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA."
definition: >-
  Dachshund-homology domain found in Ski and similar proteins. Ski may play a role in terminal differentiation of skeletal muscle cells but not in the determination of cells to the myogenic lineage. It functions as a repressor of transforming growth factor-beta (TGF-beta) signaling. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA. — an NCBI CDD conserved domain (cd21083); members share this curated model.
