identifier: CDD:cd06179
label: "Fungal trichothecene efflux pump (TRI12) of the Major Facilitator Superfamily of transporters. This family includes Fusarium sporotrichioides trichothecene efflux pump (TRI12), which may play a role in F. sporotrichioides self-protection against trichothecenes. TRI12 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Fungal trichothecene efflux pump (TRI12) of the Major Facilitator Superfamily of transporters. This family includes Fusarium sporotrichioides trichothecene efflux pump (TRI12), which may play a role in F. sporotrichioides self-protection against trichothecenes. TRI12 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd06179); members share this curated model.
