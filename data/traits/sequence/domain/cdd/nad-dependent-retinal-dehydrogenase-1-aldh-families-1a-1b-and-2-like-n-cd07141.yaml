identifier: CDD:cd07141
label: "NAD+-dependent retinal dehydrogenase 1, ALDH families 1A, 1B, and 2-like. NAD+-dependent retinal dehydrogenase 1 (RALDH 1, ALDH1, EC=1.2.1.36) also known as aldehyde dehydrogenase family 1 member A1 (ALDH1A1) in humans, is a homotetrameric, cytosolic enzyme that catalyzes the oxidation of retinaldehyde to retinoic acid. Human ALDH1B1 and ALDH2 are also in this cluster; both are mitochrondrial homotetramers which play important roles in acetaldehyde oxidation; ALDH1B1 in response to UV light exposure and ALDH2 during ethanol metabolism."
definition: >-
  NAD+-dependent retinal dehydrogenase 1, ALDH families 1A, 1B, and 2-like. NAD+-dependent retinal dehydrogenase 1 (RALDH 1, ALDH1, EC=1.2.1.36) also known as aldehyde dehydrogenase family 1 member A1 (ALDH1A1) in humans, is a homotetrameric, cytosolic enzyme that catalyzes the oxidation of retinaldehyde to retinoic acid. Human ALDH1B1 and ALDH2 are also in this cluster; both are mitochrondrial homotetramers which play important roles in acetaldehyde oxidation; ALDH1B1 in response to UV light exposure and ALDH2 during ethanol metabolism. — an NCBI CDD conserved domain (cd07141); members share this curated model.
