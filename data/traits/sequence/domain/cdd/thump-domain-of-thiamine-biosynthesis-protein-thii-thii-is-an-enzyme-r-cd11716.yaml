identifier: CDD:cd11716
label: "THUMP domain of thiamine biosynthesis protein ThiI. ThiI is an enzyme responsible for the formation of the modified base S(4)U (4-thiouridine) found at position 8 in some prokaryotic tRNAs. This modification acts as a signal for UV exposure, triggering a response that provides protection against its damaging effects. ThiI consists of an N-terminal THUMP domain, followed by an NFLD domain, and a C-terminal PP-loop pyrophosphatase domain. The N-terminal THUMP domain has been implicated in the recognition of the acceptor-stem region. The THUMP domain is named after thiouridine synthases, methylases and PSUSs. The domain consists of about 110 amino acid residues. It is predicted to be an RNA-binding domain and probably functions by delivering a variety of RNA modification enzymes to their targets."
definition: >-
  THUMP domain of thiamine biosynthesis protein ThiI. ThiI is an enzyme responsible for the formation of the modified base S(4)U (4-thiouridine) found at position 8 in some prokaryotic tRNAs. This modification acts as a signal for UV exposure, triggering a response that provides protection against its damaging effects. ThiI consists of an N-terminal THUMP domain, followed by an NFLD domain, and a C-terminal PP-loop pyrophosphatase domain. The N-terminal THUMP domain has been implicated in the recognition of the acceptor-stem region. The THUMP domain is named after thiouridine synthases, methylases and PSUSs. The domain consists of about 110 amino acid residues. It is predicted to be an RNA-binding domain and probably functions by delivering a variety of RNA modification enzymes to their targets. — an NCBI CDD conserved domain (cd11716); members share this curated model.
