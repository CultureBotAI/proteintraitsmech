identifier: CDD:cd08111
label: ATP-G_TTLL4
definition: >-
  Tubulin tyrosine ligase-like family, member 4. Tubulin tyrosine ligase-like family, member 4 (TTLL4) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 4 gene (TTLL4) maps to chromosome region 2p24.3-p24.1 and encodes for a 1199 amino acid protein
