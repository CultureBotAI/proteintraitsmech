identifier: CDD:cd10588
label: Thr-synth_3
definition: >-
  Trp-synth-beta_II. Threonine synthase catalyzes the pyridoxal 5'-phosphate dependent, final step of threonine biosynthesis, the conversion of O-phosphohomoserine into threonine and inorganic phosphate. Members included in this CD, Thr-synth_3, are found mainly in bacteria and archaea
