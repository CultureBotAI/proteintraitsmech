identifier: CDD:cd20911
label: Ebony_C_like
definition: >-
  Condensation (C) domain of Drosophila melanogaster Ebony, a unique non-ribosomal peptide synthetase (NRPS), and similar proteins. Ebony from Drosophila melanogaster plays a central role in the regulation of amine neurotransmitters. It is a nonribosomal peptide (NRP) synthetase involved in the regulation of histamine and dopamine in various tissues through condensation of these amines with beta-alanine. In glial cells, it catalyzes the condensation of beta-alanine with histamine to form to beta-alanyl-histamine (carcinine). In cuticular cells it catalyzes the condensation of beta-alanine with dopamine to form beta-alanyl-dopamine. It is a rare example of an NRPS from a higher eukaryote with an atypical condensation domain. The core catalytic components of the Ebony NRPS module are an Adenylation-Peptidyl Carrier Protein (A-PCP) di-domain and this C-terminal condensation (C) domain. Ebony's C domain performs both the selection of an amine moiety (dopamine/histamine) and the condensation of these residues with beta-alanine. This domain belongs to the GCN5-related N-acetyltransferase (GNAT) superfamily
