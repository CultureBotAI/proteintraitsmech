identifier: CDD:cd18441
label: "second BRCT domain of mediator of DNA damage checkpoint protein 1 (MDC1) and similar proteins. MDC1, also termed nuclear factor with BRCT domains 1 (NFBD1), is a nuclear chromatin-associated protein that is required for checkpoint mediated cell cycle arrest in response to DNA damage within both the S phase and G2/M phases of the cell cycle. It directly binds phosphorylated histone H2AX to regulate cellular responses to DNA double-strand breaks. MDC1 contains a forkhead-associated (FHA) domain and two BRCT domains, as well as an internal 41-amino acid repeat sequence. The family corresponds to the second BRCT domain. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this family."
definition: >-
  second BRCT domain of mediator of DNA damage checkpoint protein 1 (MDC1) and similar proteins. MDC1, also termed nuclear factor with BRCT domains 1 (NFBD1), is a nuclear chromatin-associated protein that is required for checkpoint mediated cell cycle arrest in response to DNA damage within both the S phase and G2/M phases of the cell cycle. It directly binds phosphorylated histone H2AX to regulate cellular responses to DNA double-strand breaks. MDC1 contains a forkhead-associated (FHA) domain and two BRCT domains, as well as an internal 41-amino acid repeat sequence. The family corresponds to the second BRCT domain. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this family. — an NCBI CDD conserved domain (cd18441); members share this curated model.
