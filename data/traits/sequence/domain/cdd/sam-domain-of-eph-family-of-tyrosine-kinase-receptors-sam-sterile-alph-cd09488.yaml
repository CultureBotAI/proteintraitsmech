identifier: CDD:cd09488
label: "SAM domain of EPH family of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH (erythropoietin-producing hepatocyte) family of receptor tyrosine kinases is a C-terminal signal transduction module located in the cytoplasmic region of these receptors. SAM appears to mediate cell-cell initiated signal transduction via binding proteins to a conserved tyrosine that is phosphorylated. In some cases the SAM domain mediates homodimerization/oligomerization and plays a role in the clustering process necessary for signaling. EPH kinases are the largest family of receptor tyrosine kinases. They are classified into two groups based on their abilities to bind ephrin-A and ephrin-B ligands. The EPH receptors are involved in regulation of cell movement, shape, and attachment during embryonic development; they control cell-cell interactions in the vascular, nervous, epithelial, and immune systems, and in many tumors. They are potential molecular markers for cancer diagnostics and potential targets for cancer therapy."
