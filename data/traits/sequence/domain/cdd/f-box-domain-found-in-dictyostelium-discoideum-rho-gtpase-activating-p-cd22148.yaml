identifier: CDD:cd22148
label: "F-box domain found in Dictyostelium discoideum Rho GTPase-activating protein gacFF (DdgacFF) and similar proteins. DdgacFF, also called GTPase activating factor for raC protein FF, is a Rho GTPase-activating protein involved in the signal transduction pathway. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Dictyostelium discoideum Rho GTPase-activating protein gacFF (DdgacFF) and similar proteins. DdgacFF, also called GTPase activating factor for raC protein FF, is a Rho GTPase-activating protein involved in the signal transduction pathway. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22148); members share this curated model.
