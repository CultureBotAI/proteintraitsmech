label: "Aerolysin/Pertussis toxin (APT) domain. This family represents the N-terminal domain of aerolysin and pertussis toxin and has a C-type lectin-like fold. Pertussis toxin is the causative agent of whooping cough. This C-type lectin-like domain might be involved in receptor binding."
definition: >-
  Aerolysin/Pertussis toxin (APT) domain. This family represents the N-terminal domain of aerolysin and pertussis toxin and has a C-type lectin-like fold. Pertussis toxin is the causative agent of whooping cough. This C-type lectin-like domain might be involved in receptor binding. — an NCBI CDD conserved domain (cd01103); members share this curated model.
