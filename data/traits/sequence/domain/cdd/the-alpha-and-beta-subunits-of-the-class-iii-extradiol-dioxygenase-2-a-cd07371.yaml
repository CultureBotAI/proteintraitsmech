identifier: CDD:cd07371
label: "The alpha and beta subunits of the Class III extradiol dioxygenase, 2-amino-5-chlorophenol 1,6-dioxygenase, which catalyzes the oxidization and subsequent ring-opening of 2-amino-5-chlorophenol. This subfamily contains both alpha and beta subunits of 2-amino-5-chlorophenol 1,6-dioxygenase (2A5CPDO), which catalyzes the oxidization and subsequent ring-opening of 2-amino-5-chlorophenol, an intermediate during p-chloronitrobenzene degradation. 2A5CPDO is a member of the class III extradiol dioxygenase family, a group of enzymes which use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon. The active enzyme is probably a heterotetramer, composed of two alpha and two beta subunits. Alpha and beta subunits share significant sequence similarity and may have evolved by gene duplication."
definition: >-
  The alpha and beta subunits of the Class III extradiol dioxygenase, 2-amino-5-chlorophenol 1,6-dioxygenase, which catalyzes the oxidization and subsequent ring-opening of 2-amino-5-chlorophenol. This subfamily contains both alpha and beta subunits of 2-amino-5-chlorophenol 1,6-dioxygenase (2A5CPDO), which catalyzes the oxidization and subsequent ring-opening of 2-amino-5-chlorophenol, an intermediate during p-chloronitrobenzene degradation. 2A5CPDO is a member of the class III extradiol dioxygenase family, a group of enzymes which use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon. The active enzyme is probably a heterotetramer, composed of two alpha and two beta subunits. Alpha and beta subunits share significant sequence similarity and may have evolved by gene duplication. — an NCBI CDD conserved domain (cd07371); members share this curated model.
