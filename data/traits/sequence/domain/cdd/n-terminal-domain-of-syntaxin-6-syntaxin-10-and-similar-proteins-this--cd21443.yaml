identifier: CDD:cd21443
label: "N-terminal domain of syntaxin-6, syntaxin-10, and similar proteins. This subfamily includes two soluble NSF attachment protein receptor (SNARE) proteins, syntaxin-6 (STX6) and syntaxin-10 (STX10). STX6 is involved in intracellular vesicle trafficking. STX10, also called Syn10, is involved in vesicular transport from the late endosomes to the trans-Golgi network. This model corresponds to the N-terminal domain of STX6 and STX10, which is a regulatory domain named Habc."
definition: >-
  N-terminal domain of syntaxin-6, syntaxin-10, and similar proteins. This subfamily includes two soluble NSF attachment protein receptor (SNARE) proteins, syntaxin-6 (STX6) and syntaxin-10 (STX10). STX6 is involved in intracellular vesicle trafficking. STX10, also called Syn10, is involved in vesicular transport from the late endosomes to the trans-Golgi network. This model corresponds to the N-terminal domain of STX6 and STX10, which is a regulatory domain named Habc. — an NCBI CDD conserved domain (cd21443); members share this curated model.
