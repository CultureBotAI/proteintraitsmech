identifier: CDD:cd05607
label: "Catalytic domain of the Protein Serine/Threonine Kinase, G protein-coupled Receptor Kinase 7. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. GRK7 (also called iodopsin kinase) belongs to the visual group of GRKs. It is primarily found in the retina and plays a role in the regulation of opsin light receptors. GRK7 is located in retinal cone outer segments and plays an important role in regulating photoresponse of the cones. GRKs phosphorylate and regulate G protein-coupled receptors (GPCRs), the largest superfamily of cell surface receptors, which regulate some part of nearly all physiological functions. Phosphorylated GPCRs bind to arrestins, which prevents further G protein signaling despite the presence of activating ligand. The GRK7 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Serine/Threonine Kinase, G protein-coupled Receptor Kinase 7. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. GRK7 (also called iodopsin kinase) belongs to the visual group of GRKs. It is primarily found in the retina and plays a role in the regulation of opsin light receptors. GRK7 is located in retinal cone outer segments and plays an important role in regulating photoresponse of the cones. GRKs phosphorylate and regulate G protein-coupled receptors (GPCRs), the largest superfamily of cell surface receptors, which regulate some part of nearly all physiological functions. Phosphorylated GPCRs bind to arrestins, which prevents further G protein signaling despite the presence of activating ligand. The GRK7 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05607); members share this curated model.
