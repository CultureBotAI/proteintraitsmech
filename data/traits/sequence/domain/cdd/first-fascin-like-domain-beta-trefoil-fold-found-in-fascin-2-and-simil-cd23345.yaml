identifier: CDD:cd23345
label: "first fascin-like domain, beta-trefoil fold, found in fascin-2 and similar proteins. Fascin-2, also called retinal fascin, is a photoreceptor-specific paralog of the actin-bundling protein fascin. It may play a pivotal role in photoreceptor cell-specific events, such as disk morphogenesis. Fascin-2 is composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the first fascin-like beta-trefoil domain."
definition: >-
  first fascin-like domain, beta-trefoil fold, found in fascin-2 and similar proteins. Fascin-2, also called retinal fascin, is a photoreceptor-specific paralog of the actin-bundling protein fascin. It may play a pivotal role in photoreceptor cell-specific events, such as disk morphogenesis. Fascin-2 is composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the first fascin-like beta-trefoil domain. — an NCBI CDD conserved domain (cd23345); members share this curated model.
