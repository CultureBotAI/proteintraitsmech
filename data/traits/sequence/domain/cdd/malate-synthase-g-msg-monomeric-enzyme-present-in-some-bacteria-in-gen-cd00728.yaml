identifier: CDD:cd00728
label: "Malate synthase G (MSG), monomeric enzyme present in some bacteria. In general, malate synthase catalyzes the Claisen condensation of glyoxylate and acetyl-CoA to malyl-CoA , which hydrolyzes to malate and CoA. This reaction is part of the glyoxylate cycle, which allows certain organisms to derive their carbon requirements from two-carbon compounds, by bypassing the two carboxylation steps of the citric acid cycle."
definition: >-
  Malate synthase G (MSG), monomeric enzyme present in some bacteria. In general, malate synthase catalyzes the Claisen condensation of glyoxylate and acetyl-CoA to malyl-CoA , which hydrolyzes to malate and CoA. This reaction is part of the glyoxylate cycle, which allows certain organisms to derive their carbon requirements from two-carbon compounds, by bypassing the two carboxylation steps of the citric acid cycle. — an NCBI CDD conserved domain (cd00728); members share this curated model.
