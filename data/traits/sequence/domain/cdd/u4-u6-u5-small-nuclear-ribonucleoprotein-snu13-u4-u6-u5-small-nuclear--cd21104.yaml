label: "U4/U6.U5 small nuclear ribonucleoprotein SNU13. U4/U6.U5 small nuclear ribonucleoprotein SNU13, also known as NHP2-like protein 1 or U4/U6.U5 tri-snRNP 15.5 kDa protein, is a component of the spliceosome B complex, involved in pre-mRNA splicing. It binds to the 5'-stem-loop of U4 snRNA."
definition: >-
