identifier: CDD:cd19076
label: "AKR13A and AKR13D families of aldo-keto reductase (AKR). Schizosaccharomyces pombe aldo-keto reductase YakC is a founding member of aldo-keto reductase family 13 member A1 (AKR13A1). It catalyzes the reversible reduction of ketones to the respective alcohols using NADP(+) as a hydride donor. Rauvolfia serpentina PR is a founding member of aldo-keto reductase family 13 member D1 (AKR13D1). It catalyzes the NADPH-dependent reduction of the aldehyde perakine to yield the alcohol raucaffrinoline in the biosynthetic pathway of ajmaline in Rauvolfia, a key step in indole alkaloid biosynthesis. This family also includes Arabidopsis thaliana aldo-keto reductases, ALKR1-6."
definition: >-
  AKR13A and AKR13D families of aldo-keto reductase (AKR). Schizosaccharomyces pombe aldo-keto reductase YakC is a founding member of aldo-keto reductase family 13 member A1 (AKR13A1). It catalyzes the reversible reduction of ketones to the respective alcohols using NADP(+) as a hydride donor. Rauvolfia serpentina PR is a founding member of aldo-keto reductase family 13 member D1 (AKR13D1). It catalyzes the NADPH-dependent reduction of the aldehyde perakine to yield the alcohol raucaffrinoline in the biosynthetic pathway of ajmaline in Rauvolfia, a key step in indole alkaloid biosynthesis. This family also includes Arabidopsis thaliana aldo-keto reductases, ALKR1-6. — an NCBI CDD conserved domain (cd19076); members share this curated model.
