identifier: CDD:cd08893
label: "Putative hydrophobic ligand-binding SRPBCC domain of an uncharacterized subgroup of CalC- and Aha1-like proteins; some contain an N-terminal GntR family winged HTH DNA-binding domain. SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain of a functionally uncharacterized subgroup of CalC- and Aha1-like proteins. This group shows similarity to the SRPBCC domains of Micromonospora echinospora CalC (a protein which confers resistance to enediynes) and human Aha1 (one of several co-chaperones which regulate the dimeric chaperone Hsp90), and belongs to the SRPBCC domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket and they bind diverse ligands. Some proteins in this subgroup contain an N-terminal winged helix-turn-helix DNA-binding domain found in the GntR family of proteins which include bacterial transcriptional regulators and their putative homologs from eukaryota and archaea."
definition: >-
  Putative hydrophobic ligand-binding SRPBCC domain of an uncharacterized subgroup of CalC- and Aha1-like proteins; some contain an N-terminal GntR family winged HTH DNA-binding domain. SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain of a functionally uncharacterized subgroup of CalC- and Aha1-like proteins. This group shows similarity to the SRPBCC domains of Micromonospora echinospora CalC (a protein which confers resistance to enediynes) and human Aha1 (one of several co-chaperones which regulate the dimeric chaperone Hsp90), and belongs to the SRPBCC domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket and they bind diverse ligands. Some proteins in this subgroup contain an N-terminal winged helix-turn-helix DNA-binding domain found in the GntR family of proteins which include bacterial transcriptional regulators and their putative homologs from eukaryota and archaea. — an NCBI CDD conserved domain (cd08893); members share this curated model.
