label: "forkhead associated (FHA) domain found in Synechocystis sp. Slr1951 protein and similar proteins. This subfamily corresponds to a group of uncharacterized FHA domain-containing proteins which show high sequence similarity with Synechocystis sp. protein Slr1951 and protein Sll1895. The FHA domain is a small phosphopeptide recognition module."
