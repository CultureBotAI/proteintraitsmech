label: "galactose/rhamnose binding lectin domain found in Strongylocentrotus purpuratus receptor for egg jelly 3 protein (REJ3) and similar proteins. REJ3 is a polycystin-1 protein (components of non-selective cation channels) that is cleaved at the GPS (G-protein-coupled receptor proteolytic site) domain and localizes to the acrosomal region of sea urchin sperm. REJ3 is a multidomain protein containing only one galactose/rhamnose-binding lectin domain at its N-terminus."
definition: >-
  galactose/rhamnose binding lectin domain found in Strongylocentrotus purpuratus receptor for egg jelly 3 protein (REJ3) and similar proteins. REJ3 is a polycystin-1 protein (components of non-selective cation channels) that is cleaved at the GPS (G-protein-coupled receptor proteolytic site) domain and localizes to the acrosomal region of sea urchin sperm. REJ3 is a multidomain protein containing only one galactose/rhamnose-binding lectin domain at its N-terminus. — an NCBI CDD conserved domain (cd22841); members share this curated model.
