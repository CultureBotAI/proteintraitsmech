identifier: CDD:cd10936
label: "Putative catalytic domain of family 2 polysaccharide deacetylases (DACs) from bacteria. This family contains an uncharacterized protein BH1492 from Bacillus halodurans, an uncharacterized protein ATU2773 from Agrobacterium tumefaciens C58, and other bacterial hypothetical proteins. Although their functions are still unknown, structural superposition and sequence comparison suggest that BH1492 and ATU2773 might be divergently related to the 7-stranded barrel catalytic domain of polysaccharide deacetylases (DACs) from the carbohydrate esterase 4 (CE4) superfamily, which remove N-linked acetyl groups from cell wall polysaccharides. This family is designated as DAC family 2, a divergent DAC family."
definition: >-
  Putative catalytic domain of family 2 polysaccharide deacetylases (DACs) from bacteria. This family contains an uncharacterized protein BH1492 from Bacillus halodurans, an uncharacterized protein ATU2773 from Agrobacterium tumefaciens C58, and other bacterial hypothetical proteins. Although their functions are still unknown, structural superposition and sequence comparison suggest that BH1492 and ATU2773 might be divergently related to the 7-stranded barrel catalytic domain of polysaccharide deacetylases (DACs) from the carbohydrate esterase 4 (CE4) superfamily, which remove N-linked acetyl groups from cell wall polysaccharides. This family is designated as DAC family 2, a divergent DAC family. — an NCBI CDD conserved domain (cd10936); members share this curated model.
