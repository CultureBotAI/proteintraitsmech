identifier: CDD:cd14475
label: "SPX domain of the yeast plasma protein Syg1 and related proteins. This region has been named the SPX domain after (Syg1, Pho81 and XPR1). The domain is found at the amino terminus of a variety of proteins. In the yeast protein Syg1, the N-terminus binds directly to the G-protein beta subunit and inhibits transduction of the mating pheromone signal, and it co-occurs with a C-terminal domain from the EXS family."
definition: >-
  SPX domain of the yeast plasma protein Syg1 and related proteins. This region has been named the SPX domain after (Syg1, Pho81 and XPR1). The domain is found at the amino terminus of a variety of proteins. In the yeast protein Syg1, the N-terminus binds directly to the G-protein beta subunit and inhibits transduction of the mating pheromone signal, and it co-occurs with a C-terminal domain from the EXS family. — an NCBI CDD conserved domain (cd14475); members share this curated model.
