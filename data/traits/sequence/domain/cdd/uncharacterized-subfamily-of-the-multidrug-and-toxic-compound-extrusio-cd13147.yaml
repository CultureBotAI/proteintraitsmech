identifier: CDD:cd13147
label: "Uncharacterized subfamily of the multidrug and toxic compound extrusion (MATE) proteins, similar to Methanocaldococcus jannaschii MJ0709. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. A number of family members are involved in the synthesis of peptidoglycan components in bacteria."
definition: >-
  Uncharacterized subfamily of the multidrug and toxic compound extrusion (MATE) proteins, similar to Methanocaldococcus jannaschii MJ0709. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. A number of family members are involved in the synthesis of peptidoglycan components in bacteria. — an NCBI CDD conserved domain (cd13147); members share this curated model.
