identifier: CDD:cd02213
label: "Phosphomannose isomerase type II, C-terminal cupin domain. This family includes the C-terminal cupin domain of mannose-6-phosphate isomerases (MPIs) which have been classified broadly into two groups, type I and type II, based on domain organization. This family contains type II phosphomannose isomerase (also known as PMI-GDP, phosphomannose isomerase/GDP-D-mannose pyrophosphorylase), a bifunctional enzyme with two domains that catalyze the first and third steps in the GDP-mannose pathway in which fructose 6-phosphate is converted to GDP-D-mannose. The N-terminal domain catalyzes the first and rate-limiting step, the isomerization from D-fructose-6-phosphate to D-mannose-6-phosphate, while the C-terminal cupin domain (represented in this alignment model) converts mannose 1-phosphate to GDP-D-mannose in the final step of the reaction. Although these two domains occur together in one protein in most organisms, they occur as separate proteins in certain cyanobacterial organisms. Also, although type I and type II MPIs have no overall sequence similarity, they share a conserved catalytic motif."
definition: >-
  Phosphomannose isomerase type II, C-terminal cupin domain. This family includes the C-terminal cupin domain of mannose-6-phosphate isomerases (MPIs) which have been classified broadly into two groups, type I and type II, based on domain organization. This family contains type II phosphomannose isomerase (also known as PMI-GDP, phosphomannose isomerase/GDP-D-mannose pyrophosphorylase), a bifunctional enzyme with two domains that catalyze the first and third steps in the GDP-mannose pathway in which fructose 6-phosphate is converted to GDP-D-mannose. The N-terminal domain catalyzes the first and rate-limiting step, the isomerization from D-fructose-6-phosphate to D-mannose-6-phosphate, while the C-terminal cupin domain (represented in this alignment model) converts mannose 1-phosphate to GDP-D-mannose in the final step of the reaction. Although these two domains occur together in one protein in most organisms, they occur as separate proteins in certain cyanobacterial organisms. Also, although type I and type II MPIs have no overall sequence similarity, they share a conserved catalytic motif. — an NCBI CDD conserved domain (cd02213); members share this curated model.
