identifier: CDD:cd17550
label: "phosphoacceptor receiver (REC) domain of nitrogen assimilation regulatory protein NtrX and similar proteins. NtrX is part of the two-component regulatory system NtrY/NtrX that is involved in the activation of nitrogen assimilatory genes such as Gln. It is phosphorylated by the histidine kinase NtrY and interacts with sigma-54. NtrX is a member of the NtrC family, characterized by a domain architecture containing an N-terminal REC domain, followed by a central sigma-54 interaction/ATPase domain, and a C-terminal DNA binding domain. NtrC family response regulators are sigma54-dependent transcriptional activators. Also included in this subfamily is Aquifex aeolicus NtrC4. The ability of the central domain to hydrolyze ATP and thus to interact effectively with a complex of RNA polymerase, sigma54, and promoter, is controlled by the phosphorylation status of the REC domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of nitrogen assimilation regulatory protein NtrX and similar proteins. NtrX is part of the two-component regulatory system NtrY/NtrX that is involved in the activation of nitrogen assimilatory genes such as Gln. It is phosphorylated by the histidine kinase NtrY and interacts with sigma-54. NtrX is a member of the NtrC family, characterized by a domain architecture containing an N-terminal REC domain, followed by a central sigma-54 interaction/ATPase domain, and a C-terminal DNA binding domain. NtrC family response regulators are sigma54-dependent transcriptional activators. Also included in this subfamily is Aquifex aeolicus NtrC4. The ability of the central domain to hydrolyze ATP and thus to interact effectively with a complex of RNA polymerase, sigma54, and promoter, is controlled by the phosphorylation status of the REC domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17550); members share this curated model.
