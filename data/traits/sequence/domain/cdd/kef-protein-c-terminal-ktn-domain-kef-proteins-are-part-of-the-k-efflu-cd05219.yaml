identifier: CDD:cd05219
label: "Kef protein C-terminal KTN domain. Kef proteins are part of the K+ efflux system.  KTN (k+ transport, nucelotide binding) domains are found in a  number of ion transport systems, including Trk uptake systems,  efflux systems such as Kef, and Ktr active transport. KTN is a conserved intracellular domain of prokayotic and eukaryotic potasium channels and transporters. These proteins have a traditional Rossmann fold topology, and form dimers thru a C-terminal helix. Unlike the related Rck domain, these proteins exhibit a GxGxxG nucleotide binding motif,  and bind NAD+ in the hinge region between monomers. Binding of NADH is accompanied by a conformational switch, with the hinge region becoming a large empty groove."
definition: >-
  Kef protein C-terminal KTN domain. Kef proteins are part of the K+ efflux system. KTN (k+ transport, nucelotide binding) domains are found in a number of ion transport systems, including Trk uptake systems, efflux systems such as Kef, and Ktr active transport. KTN is a conserved intracellular domain of prokayotic and eukaryotic potasium channels and transporters. These proteins have a traditional Rossmann fold topology, and form dimers thru a C-terminal helix. Unlike the related Rck domain, these proteins exhibit a GxGxxG nucleotide binding motif, and bind NAD+ in the hinge region between monomers. Binding of NADH is accompanied by a conformational switch, with the hinge region becoming a large empty groove. — an NCBI CDD conserved domain (cd05219); members share this curated model.
