identifier: CDD:cd19110
label: "AKR1E family of aldo-keto reductase (AKR). The AKR1E family of AKR includes 1,5-anhydro-D-fructose reductase (EC 1.1.1.263) from Mus musculus (liver, AKR1E1) and Homo sapiens (AKR1E2). 1,5-anhydro-D-fructose reductase), also called AF reductase, or aldo-keto reductase family 1 member C-like protein 2 (AKR1CL2), catalyzes the NADPH-dependent reduction of 1,5-anhydro-D-fructose (AF) to 1,5-anhydro-D-glucitol. AKR1E2 is a testis aldo-keto reductase (tAKR), which is also known as testis-specific protein (TSP), or LoopADR."
definition: >-
  AKR1E family of aldo-keto reductase (AKR). The AKR1E family of AKR includes 1,5-anhydro-D-fructose reductase (EC 1.1.1.263) from Mus musculus (liver, AKR1E1) and Homo sapiens (AKR1E2). 1,5-anhydro-D-fructose reductase), also called AF reductase, or aldo-keto reductase family 1 member C-like protein 2 (AKR1CL2), catalyzes the NADPH-dependent reduction of 1,5-anhydro-D-fructose (AF) to 1,5-anhydro-D-glucitol. AKR1E2 is a testis aldo-keto reductase (tAKR), which is also known as testis-specific protein (TSP), or LoopADR. — an NCBI CDD conserved domain (cd19110); members share this curated model.
