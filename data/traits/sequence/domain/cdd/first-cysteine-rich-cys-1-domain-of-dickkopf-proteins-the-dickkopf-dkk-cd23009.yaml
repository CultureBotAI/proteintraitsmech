identifier: CDD:cd23009
label: "first cysteine-rich (Cys-1) domain of Dickkopf proteins. The Dickkopf (Dkk) family comprises a discrete class of secreted Wnt inhibitors. The Wnt gene family is a large class of secreted proteins that are expressed in a variety of tissues and organs, and are required for many developmental processes, including segmentation, endoderm development, limb polarity, neural crest differentiation, kidney morphogenesis, sex determination and brain development. Dkks 1-4 each possesses an N-terminal signal peptide and contains two conserved cysteine-rich domains (Cys-1 and Cys-2) separated by a linker region. Each domain possesses 10 conserved cysteine residues. The Cys-2 domain is closely similar to those in the colipase family; it has been suggested that the Cys-2 domain of Dkks may enable interaction with lipids in order to regulate Wnt function. This model corresponds to the Cys-1 domain of Dickkopf proteins 1- 4."
definition: >-
  first cysteine-rich (Cys-1) domain of Dickkopf proteins. The Dickkopf (Dkk) family comprises a discrete class of secreted Wnt inhibitors. The Wnt gene family is a large class of secreted proteins that are expressed in a variety of tissues and organs, and are required for many developmental processes, including segmentation, endoderm development, limb polarity, neural crest differentiation, kidney morphogenesis, sex determination and brain development. Dkks 1-4 each possesses an N-terminal signal peptide and contains two conserved cysteine-rich domains (Cys-1 and Cys-2) separated by a linker region. Each domain possesses 10 conserved cysteine residues. The Cys-2 domain is closely similar to those in the colipase family; it has been suggested that the Cys-2 domain of Dkks may enable interaction with lipids in order to regulate Wnt function. This model corresponds to the Cys-1 domain of Dickkopf proteins 1- 4. — an NCBI CDD conserved domain (cd23009); members share this curated model.
