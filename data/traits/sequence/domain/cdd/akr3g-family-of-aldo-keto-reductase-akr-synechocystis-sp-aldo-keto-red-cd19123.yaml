identifier: CDD:cd19123
label: "AKR3G family of aldo-keto reductase (AKR). Synechocystis sp. aldo/keto reductase slr0942 is a founding member of aldo-keto reductase family 3 member G1 (AKR3G1). It is an aldo/keto reductase that catalyzes the NADPH-dependent reduction of aldehyde- and ketone-groups of different classes of carbonyl compounds to the corresponding alcohols."
definition: >-
  AKR3G family of aldo-keto reductase (AKR). Synechocystis sp. aldo/keto reductase slr0942 is a founding member of aldo-keto reductase family 3 member G1 (AKR3G1). It is an aldo/keto reductase that catalyzes the NADPH-dependent reduction of aldehyde- and ketone-groups of different classes of carbonyl compounds to the corresponding alcohols. — an NCBI CDD conserved domain (cd19123); members share this curated model.
