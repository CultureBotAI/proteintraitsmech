identifier: CDD:cd10283
label: "Mycoplasma pulmonis MnuA nuclease-like. This subfamily includes Mycoplasma pulmonis MnuA, a membrane-associated nuclease related to Deoxyribonuclease 1 (DNase1 or DNase I, EC 3.1.21.1). The in vivo role of MnuA is as yet undetermined. This subfamily belongs to the large EEP (exonuclease/endonuclease/phosphatase) superfamily that contains functionally diverse enzymes that share a common catalytic mechanism of cleaving phosphodiester bonds."
definition: >-
