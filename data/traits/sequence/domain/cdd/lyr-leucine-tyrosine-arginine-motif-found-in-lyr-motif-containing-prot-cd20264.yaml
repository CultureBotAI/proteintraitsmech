identifier: CDD:cd20264
label: Complex1_LYR_LYRM4
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in LYR motif-containing protein 4 (LYRM4) and similar proteins. LYRM4, also called ISD11, is a eukaryote-specific component of the mitochondrial biogenesis of Fe-S clusters which are essential cofactors in multiple processes, including oxidative phosphorylation. It is required for nuclear and mitochondrial iron-sulfur protein biosynthesis by forming a complex with, and stabilizing, the sulfur donor NFS1. LYRM4 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus
