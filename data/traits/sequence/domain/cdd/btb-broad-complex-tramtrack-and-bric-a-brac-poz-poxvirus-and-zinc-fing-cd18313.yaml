identifier: CDD:cd18313
label: BTB_POZ_BT
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Arabidopsis thaliana BTB/POZ and TAZ domain-containing proteins, BT1-5. BT1-5 may act as substrate-specific adaptors of an E3 ubiquitin-protein ligase complex (CUL3-RBX1-BTB) which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. They contain a BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids
