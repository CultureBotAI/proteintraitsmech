identifier: CDD:cd15062
label: "alpha-1 adrenergic receptors,  member of the class A family of seven-transmembrane G protein-coupled receptors. The alpha-1 adrenergic receptors (or adrenoceptors) are a subfamily of the class A rhodopsin-like GPCRs that share a common architecture of seven transmembrane helices. This subfamily consists of three highly homologous receptor subtypes that primarily mediate smooth muscle contraction: alpha-1A, alpha-1B, and alpha-1D. Activation of alpha-1 receptors by catecholamines such as norepinephrine and epinephrine couples to the G(q) protein, which then activates the phospholipase C pathway, leading to an increase in IP3 and calcium. Consequently, the elevation of intracellular calcium concentration leads to vasoconstriction in smooth muscle of blood vessels. In addition, activation of alpha-1 receptors by phenylpropanolamine (PPA) produces anorexia and may induce appetite suppression in rats."
definition: >-
  alpha-1 adrenergic receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. The alpha-1 adrenergic receptors (or adrenoceptors) are a subfamily of the class A rhodopsin-like GPCRs that share a common architecture of seven transmembrane helices. This subfamily consists of three highly homologous receptor subtypes that primarily mediate smooth muscle contraction: alpha-1A, alpha-1B, and alpha-1D. Activation of alpha-1 receptors by catecholamines such as norepinephrine and epinephrine couples to the G(q) protein, which then activates the phospholipase C pathway, leading to an increase in IP3 and calcium. Consequently, the elevation of intracellular calcium concentration leads to vasoconstriction in smooth muscle of blood vessels. In addition, activation of alpha-1 receptors by phenylpropanolamine (PPA) produces anorexia and may induce appetite suppression in rats. — an NCBI CDD conserved domain (cd15062); members share this curated model.
