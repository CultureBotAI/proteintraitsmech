identifier: CDD:cd00260
label: "sialidases/neuraminidases. Sialidases or neuraminidases function to bind and hydrolyze terminal sialic acid residues from various glycoconjugates as well as playing roles in pathogenesis, bacterial nutrition and cellular interactions. They have a six-bladed beta-propeller fold. This hierarchy includes eubacterial, eukaryotic, and viral sialidases."
definition: >-
  sialidases/neuraminidases. Sialidases or neuraminidases function to bind and hydrolyze terminal sialic acid residues from various glycoconjugates as well as playing roles in pathogenesis, bacterial nutrition and cellular interactions. They have a six-bladed beta-propeller fold. This hierarchy includes eubacterial, eukaryotic, and viral sialidases. — an NCBI CDD conserved domain (cd00260); members share this curated model.
