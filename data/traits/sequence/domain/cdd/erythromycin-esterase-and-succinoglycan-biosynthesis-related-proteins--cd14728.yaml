identifier: CDD:cd14728
label: "Erythromycin esterase and succinoglycan biosynthesis related proteins. This group contains erythromycin esterase, which shares conserved active site residues of the Tiki/TraB family. Erythromycin esterases (EreA and EreB) disrupt erythromycin via the hydrolysis of the macrolactone ring. A critical catalytic histidine acts as a general base in the activation of a water molecule. Macrolides act by inhibiting bacterial protein synthesis by binding at the exit tunnel of ribosomal subunit 50s, blocking the translation of the polypeptide. Erythromycin esterase, typically found in integrons and transposons, confers antibiotic resistance through the disruption of the drug ring structure. EreB substrate profile is substantially broader than that for EreA, being able to also metabolize semisynthetic derivatives such as azalide azithromycin."
definition: >-
  Erythromycin esterase and succinoglycan biosynthesis related proteins. This group contains erythromycin esterase, which shares conserved active site residues of the Tiki/TraB family. Erythromycin esterases (EreA and EreB) disrupt erythromycin via the hydrolysis of the macrolactone ring. A critical catalytic histidine acts as a general base in the activation of a water molecule. Macrolides act by inhibiting bacterial protein synthesis by binding at the exit tunnel of ribosomal subunit 50s, blocking the translation of the polypeptide. Erythromycin esterase, typically found in integrons and transposons, confers antibiotic resistance through the disruption of the drug ring structure. EreB substrate profile is substantially broader than that for EreA, being able to also metabolize semisynthetic derivatives such as azalide azithromycin. — an NCBI CDD conserved domain (cd14728); members share this curated model.
