identifier: CDD:cd19159
label: "voltage-gated potassium channel subunit beta-1 (KCAB1B) and similar proteins. KCAB1B from Homo sapiens, Mus musculus, Mustela putorius, Rattus norvegicus, and Kvb1.1, Kvb1.2 from Oryctolagus cuniculus, are founding members of aldo-keto reductase family 6 member A3 (AKR6A3), A8 (AKR6A8), A10a (AKR6A10a), A13 (AKR6A13), A7 (AKR6A7) and A10b (AKR6A10b), respectively. KCAB1B, also called Shaker channel b-subunit 1(Kvb1), K(+) channel subunit beta-1, or Kv-beta-1, is a cytoplasmic potassium channel subunit that modulates the characteristics of the channel-forming alpha-subunits. It modulates action potentials via its effect on the pore-forming alpha subunits."
definition: >-
  voltage-gated potassium channel subunit beta-1 (KCAB1B) and similar proteins. KCAB1B from Homo sapiens, Mus musculus, Mustela putorius, Rattus norvegicus, and Kvb1.1, Kvb1.2 from Oryctolagus cuniculus, are founding members of aldo-keto reductase family 6 member A3 (AKR6A3), A8 (AKR6A8), A10a (AKR6A10a), A13 (AKR6A13), A7 (AKR6A7) and A10b (AKR6A10b), respectively. KCAB1B, also called Shaker channel b-subunit 1(Kvb1), K(+) channel subunit beta-1, or Kv-beta-1, is a cytoplasmic potassium channel subunit that modulates the characteristics of the channel-forming alpha-subunits. It modulates action potentials via its effect on the pore-forming alpha subunits. — an NCBI CDD conserved domain (cd19159); members share this curated model.
