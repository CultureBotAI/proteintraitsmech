identifier: CDD:cd12458
label: "RNA recognition motif (RRM) found in Arabidopsis thaliana zinc finger CCCH domain-containing protein 46 (AtC3H46) and similar proteins. This subfamily corresponds to the RRM domain in AtC3H46, a putative RNA-binding protein that contains an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a CCCH class of zinc finger, typically C-X8-C-X5-C-X3-H. It may possess ribonuclease activity."
definition: >-
  RNA recognition motif (RRM) found in Arabidopsis thaliana zinc finger CCCH domain-containing protein 46 (AtC3H46) and similar proteins. This subfamily corresponds to the RRM domain in AtC3H46, a putative RNA-binding protein that contains an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a CCCH class of zinc finger, typically C-X8-C-X5-C-X3-H. It may possess ribonuclease activity. — an NCBI CDD conserved domain (cd12458); members share this curated model.
