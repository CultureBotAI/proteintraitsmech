identifier: CDD:cd08384
label: "C2 domain second repeat present in Rabphilin and Double C2 domain. Rabphilin is found neurons and in neuroendrocrine cells, while Doc2 is found not only in the brain but in tissues, including mast cells, chromaffin cells, and osteoblasts.  Rabphilin and Doc2s share highly homologous tandem C2 domains, although their N-terminal structures are completely different: rabphilin contains an N-terminal Rab-binding domain (RBD),7 whereas Doc2 contains an N-terminal Munc13-1-interacting domain (MID). C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins.  Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1.  However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain.  C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. This cd contains the second C2 repeat, C2B, and has a type-I topology."
definition: >-
  C2 domain second repeat present in Rabphilin and Double C2 domain. Rabphilin is found neurons and in neuroendrocrine cells, while Doc2 is found not only in the brain but in tissues, including mast cells, chromaffin cells, and osteoblasts. Rabphilin and Doc2s share highly homologous tandem C2 domains, although their N-terminal structures are completely different: rabphilin contains an N-terminal Rab-binding domain (RBD),7 whereas Doc2 contains an N-terminal Munc13-1-interacting domain (MID). C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. This cd contains the second C2 repeat, C2B, and has a type-I topology. — an NCBI CDD conserved domain (cd08384); members share this curated model.
