identifier: CDD:cd16386
label: TcpC_N
definition: >-
  N-terminal domain of conjugative transposon protein TcpC. This family contains the N-terminal domain of conjugation protein TcpC and similar proteins. TcpC is required for efficient conjugative transfer, localizing to the cell membrane independently of other conjugation proteins, where membrane localization is important for its function, oligomerization and interaction with the conjugation proteins TcpA, TcpH, and TcpG. N-terminal region (sometimes referred to as central domain) of TcpC is required for efficient conjugation, oligomerization and protein-protein interactions. TcpC has low level sequence identity to proteins encoded by the conjugative transposon Tn916, which is responsible for a large proportion of the tetracycline resistance in different pathogens
