identifier: CDD:cd21765
label: "N-terminal domain of alpha-protein kinase 1 (ALPK1) and similar proteins. ALPK1, also called chromosome 4 kinase, or lymphocyte alpha-protein kinase (LAK), is a serine/threonine-protein kinase that detects bacterial pathogen-associated molecular pattern metabolites (PAMPs) and initiates an innate immune response, a critical step for pathogen elimination and engagement of adaptive immunity. It specifically recognizes and binds ADP-D-glycero-beta-D-manno-heptose (ADP-heptose), a potent PAMP present in all Gram-negative and some Gram-positive bacteria. (LAK). ALPK1 is implicated in epithelial cell polarity and exocytic vesicular transport towards the apical plasma membrane. It resides on Golgi-derived vesicles where it phosphorylates myosin IA, a motor protein that regulates the delivery of vesicles to the plasma-membrane. It may be associated with inflammation-related diseases such as gout and type 2 diabetes mellitus. The model corresponds to the N-terminal domain of ALPK1 that is responsible for the binding of ADP-heptose."
definition: >-
  N-terminal domain of alpha-protein kinase 1 (ALPK1) and similar proteins. ALPK1, also called chromosome 4 kinase, or lymphocyte alpha-protein kinase (LAK), is a serine/threonine-protein kinase that detects bacterial pathogen-associated molecular pattern metabolites (PAMPs) and initiates an innate immune response, a critical step for pathogen elimination and engagement of adaptive immunity. It specifically recognizes and binds ADP-D-glycero-beta-D-manno-heptose (ADP-heptose), a potent PAMP present in all Gram-negative and some Gram-positive bacteria. (LAK). ALPK1 is implicated in epithelial cell polarity and exocytic vesicular transport towards the apical plasma membrane. It resides on Golgi-derived vesicles where it phosphorylates myosin IA, a motor protein that regulates the delivery of vesicles to the plasma-membrane. It may be associated with inflammation-related diseases such as gout and type 2 diabetes mellitus. The model corresponds to the N-terminal domain of ALPK1 that is responsible for the binding of ADP-heptose. — an NCBI CDD conserved domain (cd21765); members share this curated model.
