identifier: CDD:cd18105
label: "SAM-dependent rRNA methylase related to MRM1. MRM1 catalyzes the methylation of 2'-O-ribose residues G1145 to GmG residue of the mitochondrial 16S rRNA. MRM1 is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  SAM-dependent rRNA methylase related to MRM1. MRM1 catalyzes the methylation of 2'-O-ribose residues G1145 to GmG residue of the mitochondrial 16S rRNA. MRM1 is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18105); members share this curated model.
