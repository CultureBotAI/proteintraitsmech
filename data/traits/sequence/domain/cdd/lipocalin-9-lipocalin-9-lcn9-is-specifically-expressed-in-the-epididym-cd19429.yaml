identifier: CDD:cd19429
label: "lipocalin 9. Lipocalin 9 (LCN9) is specifically expressed in the epididymis. It belongs to the lipocalin/cytosolic fatty-acid binding protein family. Lipocalins are typically small extracellular proteins that bind small hydrophobic molecules, such as lipids, steroid hormones, bilins, and retinoids and form covalent or non-covalent complexes with soluble macromolecules as well as membrane bound-receptors. They are involved in many important functions, like ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior."
