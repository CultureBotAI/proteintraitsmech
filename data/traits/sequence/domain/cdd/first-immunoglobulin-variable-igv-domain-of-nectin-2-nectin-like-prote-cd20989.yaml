identifier: CDD:cd20989
label: "First immunoglobulin variable (IgV) domain of nectin-2, nectin-like protein 5, and similar domains. The members here are composed of the second immunoglobulin (Ig) domain of nectin-2 (also known as poliovirus receptor related protein 2 or Cluster of Differentiation 112 (CD112)), nectin-like protein 5 (CD155), and similar proteins. Nectins and Nectin-like molecules are a family of Ca(2+)-independent immunoglobulin-like transmembrane glycoproteins belonging to the class of adhesion receptors, consisting of nine members (nectins 1 through 4 and nectin-like proteins 1 through 5). Nectins are synaptic cell adhesion molecules (CAMs) which facilitate adhesion and signaling at various intracellular junctions. Nectins form homophilic cis-dimers, followed by homophilic and heterophilic trans-dimers involved in cell-cell adhesion. Nectin-2 and nectin-3 localize at Sertoli-spermatid junctions where they form heterophilic trans-interactions between the cells that are essential for the formation and maintenance of the junctions and for spermatid development. CD155 is the fifth member in the nectin-like molecule family, and functions as the receptor of poliovirus; therefore, CD155 is also referred to as Necl-5, or PVR. In contrast to all other family members, CD155 lacks self-adhesion capacity, yet it shares with nectins the feature to interact with other nectins. For instance, CD155 heterophilically trans-interacts with nectin-3, thereby contributing significantly to the establishment of adherens junctions between epithelial cells. This group belongs to the Constant 1 (C1)-set of IgSF domains, which has one beta-sheet that is formed by strands A-B-E-D and the other strands by G-F-C-C'."
definition: >-
  First immunoglobulin variable (IgV) domain of nectin-2, nectin-like protein 5, and similar domains. The members here are composed of the second immunoglobulin (Ig) domain of nectin-2 (also known as poliovirus receptor related protein 2 or Cluster of Differentiation 112 (CD112)), nectin-like protein 5 (CD155), and similar proteins. Nectins and Nectin-like molecules are a family of Ca(2+)-independent immunoglobulin-like transmembrane glycoproteins belonging to the class of adhesion receptors, consisting of nine members (nectins 1 through 4 and nectin-like proteins 1 through 5). Nectins are synaptic cell adhesion molecules (CAMs) which facilitate adhesion and signaling at various intracellular junctions. Nectins form homophilic cis-dimers, followed by homophilic and heterophilic trans-dimers involved in cell-cell adhesion. Nectin-2 and nectin-3 localize at Sertoli-spermatid junctions where they form heterophilic trans-interactions between the cells that are essential for the formation and maintenance of the junctions and for spermatid development. CD155 is the fifth member in the nectin-like molecule family, and functions as the receptor of poliovirus; therefore, CD155 is also referred to as Necl-5, or PVR. In contrast to all other family members, CD155 lacks self-adhesion capacity, yet it shares with nectins the feature to interact with other nectins. For instance, CD155 heterophilically trans-interacts with nectin-3, thereby contributing significantly to the establishment of adherens junctions between epithelial cells. This group belongs to the Constant 1 (C1)-set of IgSF domains, which has one beta-sheet that is formed by strands A-B-E-D and the other strands by G-F-C-C'. — an NCBI CDD conserved domain (cd20989); members share this curated model.
