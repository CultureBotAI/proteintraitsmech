identifier: CDD:cd20760
label: capping_2-OMTase_Mimiviridae
definition: >-
  Cap-0 specific (nucleoside-2'-O-)-methyltransferase of mimiviridae and pithoviridae. Cap-0 specific (nucleoside-2'-O-)-methyltransferase (2'OMTase) catalyzes the methylation of Cap-0 (m7GpppNp) at the 2'-hydroxyl of the ribose of the first nucleotide, using S-adenosyl-L-methionine (AdoMet) as the methyl donor. This reaction is the fourth and last step in mRNA capping, the creation of the stabilizing five-prime cap (5' cap) on mRNA. Mimiviridae and pithoviridae are part of the nucleocytoplasmic large dsDNA virus clade (NCLDV), and they cap their mRNAs. The 2'OMTase activity is located in the polyA polymerase regulatory subunit. This family also contains related proteins from a broad group of eukaryotes that include opisthokonts and protists
