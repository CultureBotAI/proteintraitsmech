identifier: CDD:cd01118
label: "Anion permease ArsB.  These permeases have been shown to export arsenate and antimonite in eubacteria and archaea.  A typical ArsB permease contains 8-13 transmembrane helices and can function either independently as a chemiosmotic transporter or as a channel-forming subunit of an ATP-driven anion pump (ArsAB).  The ArsAB complex is similar in many ways to ATP-binding cassette transporters, which have two groups of six transmembrane-spanning helical segments and two nucleotide-binding domains. The ArsB proteins belong to the ArsB/NhaD superfamily of permeases that translocate sodium, arsenate, sulfate, and organic anions across biological membranes in all three kingdoms of life."
definition: >-
  Anion permease ArsB. These permeases have been shown to export arsenate and antimonite in eubacteria and archaea. A typical ArsB permease contains 8-13 transmembrane helices and can function either independently as a chemiosmotic transporter or as a channel-forming subunit of an ATP-driven anion pump (ArsAB). The ArsAB complex is similar in many ways to ATP-binding cassette transporters, which have two groups of six transmembrane-spanning helical segments and two nucleotide-binding domains. The ArsB proteins belong to the ArsB/NhaD superfamily of permeases that translocate sodium, arsenate, sulfate, and organic anions across biological membranes in all three kingdoms of life. — an NCBI CDD conserved domain (cd01118); members share this curated model.
