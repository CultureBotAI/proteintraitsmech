identifier: CDD:cd18935
label: "basic helix-loop-helix (bHLH) domain found in myogenin (MYOG) and similar proteins. MYOG, also termed Class C basic helix-loop-helix protein 3 (bHLHc3), or myogenic factor 4 (Myf-4), is a bHLH transcriptional activator that promotes transcription of muscle-specific target genes and plays a role in muscle differentiation, cell cycle exit and muscle atrophy."
definition: >-
