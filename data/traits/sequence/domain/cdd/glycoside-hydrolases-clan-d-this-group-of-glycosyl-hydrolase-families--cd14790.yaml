identifier: CDD:cd14790
label: "Glycoside hydrolases, clan D. This group of glycosyl hydrolase families is comprised of glycosyl hydrolase family 31 (GH31), family 36 (GH36), and family 27 (GH27). These structurally and mechanistically related protein families are retaining enzymes that cleave their substrates via an acid/base-catalyzed, double-displacement mechanism involving a covalent glycosyl-enzyme intermediate. Two aspartic acid residues have been identified as the catalytic nucleophile and the acid/base, respectively. They have a wide range of functions including alpha-glucosidase, alpha-xylosidase, 6-alpha-glucosyltransferase, 3-alpha-isomaltosyltransferase, alpha-N-acetylgalactosaminidase, stachyose synthase, raffinose synthase, and alpha-1,4-glucan lyase."
