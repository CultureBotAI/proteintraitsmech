identifier: CDD:cd14588
label: "protein tyrosine phosphatase-like pseudophosphatase domain of myotubularin related phosphoinositide phosphatase 5. Myotubularin related phosphoinositide phosphatase 5 (MTMR5), also known as SET binding factor 1 (SBF1), is enzymatically inactive and contains a variety of other domains, including a DENN and a PH-like domain. Mutations in the MTMR5 gene cause Charcot-Marie-tooth disease type 4B3. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. MTMR5 is a pseudophosphatase that lacks the catalytic cysteine in its catalytic pocket. It interacts with MTMR2, an active myotubularin related phosphatidylinositol phosphatase, regulates its enzymatic activity and subcellular location."
