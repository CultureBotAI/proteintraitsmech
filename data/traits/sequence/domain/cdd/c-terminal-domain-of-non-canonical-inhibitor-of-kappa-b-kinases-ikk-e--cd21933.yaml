identifier: CDD:cd21933
label: "C-terminal domain of non-canonical Inhibitor of kappa B kinases, IKK-E and TBK1, and similar proteins. Inhibitor of nuclear factor kappa-B kinase subunit epsilon (IKK-E or IKK-epsilon) and TANK-binding kinase 1 (TBK1) are non-canonical members of IKK family. They have been characterized as activators of nuclear factor-kappaB (NF-kappaB), but they are not essential for NF-kappaB activation. They play critical roles in antiviral response via phosphorylation and activation of transcription factors IRF3, IRF7, STAT1, and STAT3. They are also involved in the survival, tumorigenesis, and development of various cancers. Both IKK-epsilon and TBK1 contain an N-terminal protein kinase domain followed by a ubiquitin-like (Ubl) domain, a coiled-coil domain 1 (CCD1), and a C-terminal elongated alpha-helical domain. The model corresponds to the C-terminal elongated alpha-helical domain. It is responsible for the binding of adaptor proteins, optineurin (OPTN) and NAP1, to TBK1."
definition: >-
  C-terminal domain of non-canonical Inhibitor of kappa B kinases, IKK-E and TBK1, and similar proteins. Inhibitor of nuclear factor kappa-B kinase subunit epsilon (IKK-E or IKK-epsilon) and TANK-binding kinase 1 (TBK1) are non-canonical members of IKK family. They have been characterized as activators of nuclear factor-kappaB (NF-kappaB), but they are not essential for NF-kappaB activation. They play critical roles in antiviral response via phosphorylation and activation of transcription factors IRF3, IRF7, STAT1, and STAT3. They are also involved in the survival, tumorigenesis, and development of various cancers. Both IKK-epsilon and TBK1 contain an N-terminal protein kinase domain followed by a ubiquitin-like (Ubl) domain, a coiled-coil domain 1 (CCD1), and a C-terminal elongated alpha-helical domain. The model corresponds to the C-terminal elongated alpha-helical domain. It is responsible for the binding of adaptor proteins, optineurin (OPTN) and NAP1, to TBK1. — an NCBI CDD conserved domain (cd21933); members share this curated model.
