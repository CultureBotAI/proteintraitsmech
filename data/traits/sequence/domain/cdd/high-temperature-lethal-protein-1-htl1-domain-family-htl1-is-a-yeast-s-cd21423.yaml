identifier: CDD:cd21423
label: HTL1
definition: >-
  high temperature lethal protein 1 (HTL1) domain family. HTL1 is a yeast-specific component of the chromatin structure-remodeling complex (RSC), which is involved in transcription regulation and nucleosome positioning. HTL1 binds to the coiled-coil (CC) domain of RSC. It is required for cell cycle progression through G2/M transition at temperatures higher than 33 degrees Celsius
