identifier: CDD:cd18090
label: "SAM-dependent arginine methyltransferase related to yeast Sfm1. Arginine methyltransferase Sfm1 methylates R146 of 40S ribosomal protein S3 (Rps3), which contacts 18S RNA. Sfm1 is part of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent mainly RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  SAM-dependent arginine methyltransferase related to yeast Sfm1. Arginine methyltransferase Sfm1 methylates R146 of 40S ribosomal protein S3 (Rps3), which contacts 18S RNA. Sfm1 is part of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent mainly RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18090); members share this curated model.
