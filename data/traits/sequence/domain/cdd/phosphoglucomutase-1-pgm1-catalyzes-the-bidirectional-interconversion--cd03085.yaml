identifier: CDD:cd03085
label: "Phosphoglucomutase 1 (PGM1) catalyzes the bidirectional interconversion of glucose-1-phosphate (G-1-P) and glucose-6-phosphate (G-6-P) via a glucose 1,6-diphosphate intermediate, an important metabolic step in prokaryotes and eukaryotes. In one direction, G-1-P produced from sucrose catabolism is converted to G-6-P, the first intermediate in glycolysis. In the other direction, conversion of G-6-P to G-1-P generates a substrate for synthesis of UDP-glucose which is required for synthesis of a variety of cellular constituents including cell wall polymers and glycoproteins. The PGM1 family also includes a non-enzymatic PGM-related protein (PGM-RP) thought to play a structural role in eukaryotes, as well as pp63/parafusin, a phosphoglycoprotein that plays an important role in calcium-regulated exocytosis in ciliated protozoans. PGM1 belongs to the alpha-D-phosphohexomutase superfamily which includes several related enzymes that catalyze a reversible intramolecular phosphoryl transfer on their sugar substrates. Other members of this superfamily include phosphoglucosamine mutase (PNGM), phosphoacetylglucosamine mutase (PAGM), the bacterial phosphomannomutase ManB, the bacterial phosphoglucosamine mutase GlmM, and the bifunctional phosphomannomutase/phosphoglucomutase (PMM/PGM). Each of these enzymes has four domains with a centrally located active site formed by four loops, one from each domain. All four domains are included in this alignment model."
definition: >-
  Phosphoglucomutase 1 (PGM1) catalyzes the bidirectional interconversion of glucose-1-phosphate (G-1-P) and glucose-6-phosphate (G-6-P) via a glucose 1,6-diphosphate intermediate, an important metabolic step in prokaryotes and eukaryotes. In one direction, G-1-P produced from sucrose catabolism is converted to G-6-P, the first intermediate in glycolysis. In the other direction, conversion of G-6-P to G-1-P generates a substrate for synthesis of UDP-glucose which is required for synthesis of a variety of cellular constituents including cell wall polymers and glycoproteins. The PGM1 family also includes a non-enzymatic PGM-related protein (PGM-RP) thought to play a structural role in eukaryotes, as well as pp63/parafusin, a phosphoglycoprotein that plays an important role in calcium-regulated exocytosis in ciliated protozoans. PGM1 belongs to the alpha-D-phosphohexomutase superfamily which includes several related enzymes that catalyze a reversible intramolecular phosphoryl transfer on their sugar substrates. Other members of this superfamily include phosphoglucosamine mutase (PNGM), phosphoacetylglucosamine mutase (PAGM), the bacterial phosphomannomutase ManB, the bacterial phosphoglucosamine mutase GlmM, and the bifunctional phosphomannomutase/phosphoglucomutase (PMM/PGM). Each of these enzymes has four domains with a centrally located active site formed by four loops, one from each domain. All four domains are included in this alignment model. — an NCBI CDD conserved domain (cd03085); members share this curated model.
