identifier: CDD:cd20141
label: "PWWP domain found in methyl-CpG-binding domain protein 5 (MBD5) and similar proteins. MBD5, is a methyl-CpG-binding protein that binds to heterochromatin. It does not interact with either methylated or unmethylated DNA. MBD5 acts as a transcriptional regulator responsible for 2q23.1 deletion syndrome. It belongs to the MBD family proteins, which play central roles in transcriptional regulation and development. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  PWWP domain found in methyl-CpG-binding domain protein 5 (MBD5) and similar proteins. MBD5, is a methyl-CpG-binding protein that binds to heterochromatin. It does not interact with either methylated or unmethylated DNA. MBD5 acts as a transcriptional regulator responsible for 2q23.1 deletion syndrome. It belongs to the MBD family proteins, which play central roles in transcriptional regulation and development. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd20141); members share this curated model.
