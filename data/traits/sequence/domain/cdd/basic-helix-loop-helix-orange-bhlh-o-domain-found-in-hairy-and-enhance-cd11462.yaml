identifier: CDD:cd11462
label: "basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split 7 (HES-7) and similar proteins. HES-7, also termed Class B basic helix-loop-helix protein 37 (bHLHb37), or bHLH factor Hes7, is a bHLH-O transcriptional repressor that is expressed in an oscillatory manner and acts as a key regulator of the pace of the segmentation clock. It is regulated by the Notch and Fgf/Mapk pathways. HES-7 is one mammalian counterpart of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split 7 (HES-7) and similar proteins. HES-7, also termed Class B basic helix-loop-helix protein 37 (bHLHb37), or bHLH factor Hes7, is a bHLH-O transcriptional repressor that is expressed in an oscillatory manner and acts as a key regulator of the pace of the segmentation clock. It is regulated by the Notch and Fgf/Mapk pathways. HES-7 is one mammalian counterpart of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability. — an NCBI CDD conserved domain (cd11462); members share this curated model.
