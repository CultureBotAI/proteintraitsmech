identifier: CDD:cd08703
label: "The C-terminal subdomain of the hydrolase domain on the bi-functional protein 10-formyltetrahydrofolate dehydrogenase. The family represents the C-terminal subdomain of the hydrolase domain on the bi-functional protein, 10-formyltetrahydrofolate dehydrogenase (FDH). FDH catalyzes the conversion of 10-formyltetrahydrofolate, a precursor for nucleotide biosynthesis, to tetrahydrofolate. The protein comprises two functional domains: the N-terminal hydrolase domain that removes a formyl group from 10-formyltetrahydrofolate and the C-terminal NADP-dependent dehydrogenase domain that reduces the formyl group to carbon dioxide. The hydrolase domain contains an N-terminal formyl transferase catalytic core subdomain and this C-terminal subdomain, which may be involved in substrate binding."
definition: >-
  The C-terminal subdomain of the hydrolase domain on the bi-functional protein 10-formyltetrahydrofolate dehydrogenase. The family represents the C-terminal subdomain of the hydrolase domain on the bi-functional protein, 10-formyltetrahydrofolate dehydrogenase (FDH). FDH catalyzes the conversion of 10-formyltetrahydrofolate, a precursor for nucleotide biosynthesis, to tetrahydrofolate. The protein comprises two functional domains: the N-terminal hydrolase domain that removes a formyl group from 10-formyltetrahydrofolate and the C-terminal NADP-dependent dehydrogenase domain that reduces the formyl group to carbon dioxide. The hydrolase domain contains an N-terminal formyl transferase catalytic core subdomain and this C-terminal subdomain, which may be involved in substrate binding. — an NCBI CDD conserved domain (cd08703); members share this curated model.
