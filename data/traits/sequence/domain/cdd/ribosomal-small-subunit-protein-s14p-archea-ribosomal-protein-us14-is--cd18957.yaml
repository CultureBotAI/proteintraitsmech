identifier: CDD:cd18957
label: "Ribosomal small subunit protein S14p, archea. Ribosomal protein uS14 is highly conserved among the three kingdoms, Bacteria, Archaea and Eukarya. Archaeal ribosomes have an intermediate complexity compared with bacterial and eukaryotic ones, sharing several additional components of the translation machinery with eukaryotes that are absent in bacteria. Ribosomal protein S14 is a member of the small ribosomal subunit forming a tight cluster with subunits S3 and S10 in the head region of the ribosome and16S ribosomal RNA. S14p contains a bound zinc ion that is coordinated by four cysteine residues through zinc motif."
definition: >-
  Ribosomal small subunit protein S14p, archea. Ribosomal protein uS14 is highly conserved among the three kingdoms, Bacteria, Archaea and Eukarya. Archaeal ribosomes have an intermediate complexity compared with bacterial and eukaryotic ones, sharing several additional components of the translation machinery with eukaryotes that are absent in bacteria. Ribosomal protein S14 is a member of the small ribosomal subunit forming a tight cluster with subunits S3 and S10 in the head region of the ribosome and16S ribosomal RNA. S14p contains a bound zinc ion that is coordinated by four cysteine residues through zinc motif. — an NCBI CDD conserved domain (cd18957); members share this curated model.
