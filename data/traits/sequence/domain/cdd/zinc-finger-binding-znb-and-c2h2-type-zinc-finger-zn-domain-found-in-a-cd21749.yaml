identifier: CDD:cd21749
label: "zinc finger-binding (ZnB) and C2H2-type zinc finger (Zn) domain found in Arabidopsis thaliana Polycomb group protein EMBRYONIC FLOWER 2 (EMF2), and similar proteins. This family includes a group of plant proteins similar to Arabidopsis thaliana Polycomb group (PcG) proteins EMF2 and FERTILIZATION-INDEPENDENT SEED 2 (FIS2). EMF2 is involved in flowering processes by repressing unknown target genes and preventing reproductive development. It participates in polycomb group (PcG) protein complex-mediated (probably in complex with EMF1) silencing of the flower homeotic genes AGAMOUS (AG), PISTILLATA (PI), and APETALA3 (AP3), as well as of some regulatory genes such as ABSCISIC ACID INSENSITIVE3 (ABI3), LONG VEGETATIVE PHASE1 (LOV1), and FLOWERING LOCUS C (FLC) during vegetative development, by mediating trimethylation of histone 3 lysine 27 on the AG chromatin (H3K27me3). FIS2 is required to prevent the proliferation of the central cell by repressing unknown target genes before fertilization. It regulates the anteroposterior organization of the endosperm. Members in this family show high sequence similarity with a unique structural ZnB-Zn platform found in metazoan, which consists of zinc finger-binding (ZnB) and C2H2-type zinc finger (Zn)."
definition: >-
  zinc finger-binding (ZnB) and C2H2-type zinc finger (Zn) domain found in Arabidopsis thaliana Polycomb group protein EMBRYONIC FLOWER 2 (EMF2), and similar proteins. This family includes a group of plant proteins similar to Arabidopsis thaliana Polycomb group (PcG) proteins EMF2 and FERTILIZATION-INDEPENDENT SEED 2 (FIS2). EMF2 is involved in flowering processes by repressing unknown target genes and preventing reproductive development. It participates in polycomb group (PcG) protein complex-mediated (probably in complex with EMF1) silencing of the flower homeotic genes AGAMOUS (AG), PISTILLATA (PI), and APETALA3 (AP3), as well as of some regulatory genes such as ABSCISIC ACID INSENSITIVE3 (ABI3), LONG VEGETATIVE PHASE1 (LOV1), and FLOWERING LOCUS C (FLC) during vegetative development, by mediating trimethylation of histone 3 lysine 27 on the AG chromatin (H3K27me3). FIS2 is required to prevent the proliferation of the central cell by repressing unknown target genes before fertilization. It regulates the anteroposterior organization of the endosperm. Members in this family show high sequence similarity with a unique structural ZnB-Zn platform found in metazoan, which consists of zinc finger-binding (ZnB) and C2H2-type zinc finger (Zn). — an NCBI CDD conserved domain (cd21749); members share this curated model.
