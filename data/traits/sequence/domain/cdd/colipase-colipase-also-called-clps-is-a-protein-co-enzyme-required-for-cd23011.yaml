identifier: CDD:cd23011
label: "Colipase. Colipase, also called CLPS, is a protein co-enzyme required for optimal enzyme activity of pancreatic lipase. It is secreted by the pancreas in an inactive form, procolipase, which is activated in the intestinal lumen by trypsin. Its function is to prevent the inhibitory effect of bile salts on the lipase-catalyzed intraduodenal hydrolysis of dietary long-chain triglycerides. Bile salts, at concentrations near their critical micellar concentration, desorb lipase from emulsified  triacylglycerol and, thereby, inhibit lipolysis. Colipase functions by anchoring pancreatic lipase to the lipid-water interface through the formation of the  stoichiometric colipase-lipase complex."
definition: >-
  Colipase. Colipase, also called CLPS, is a protein co-enzyme required for optimal enzyme activity of pancreatic lipase. It is secreted by the pancreas in an inactive form, procolipase, which is activated in the intestinal lumen by trypsin. Its function is to prevent the inhibitory effect of bile salts on the lipase-catalyzed intraduodenal hydrolysis of dietary long-chain triglycerides. Bile salts, at concentrations near their critical micellar concentration, desorb lipase from emulsified triacylglycerol and, thereby, inhibit lipolysis. Colipase functions by anchoring pancreatic lipase to the lipid-water interface through the formation of the stoichiometric colipase-lipase complex. — an NCBI CDD conserved domain (cd23011); members share this curated model.
