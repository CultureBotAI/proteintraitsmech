identifier: CDD:cd14412
label: "UBA-like domain found in DCN1-like protein 2 (DCNL2) and similar proteins. DCNL2 (defective in cullin neddylation protein 1-like protein 2), also called DCUN1 domain-containing protein 2, is encoded by gene DCUN1D2. Although its biological function remains unclear, DCNL2 shows high sequence similarity with DCNL1, a protein that plays an essential role in the neddylation E3 complex and participates in the release of inhibitory effects of CAND1 on cullin-RING ligase E3 complex assembly and activity. At this point, DCNL2 may also contribute to neddylation of cullin components of SCF-type E3 ubiquitin ligase complexes. Like DCNL1, DCNL2 contains an N-terminal ubiquitin-associated (UBA)-like domain and a C-terminal cullin binding domain that is responsible for the binding to cullins and Rbx-1, components of an E3 ubiquitin ligase complex for neddylation."
definition: >-
  UBA-like domain found in DCN1-like protein 2 (DCNL2) and similar proteins. DCNL2 (defective in cullin neddylation protein 1-like protein 2), also called DCUN1 domain-containing protein 2, is encoded by gene DCUN1D2. Although its biological function remains unclear, DCNL2 shows high sequence similarity with DCNL1, a protein that plays an essential role in the neddylation E3 complex and participates in the release of inhibitory effects of CAND1 on cullin-RING ligase E3 complex assembly and activity. At this point, DCNL2 may also contribute to neddylation of cullin components of SCF-type E3 ubiquitin ligase complexes. Like DCNL1, DCNL2 contains an N-terminal ubiquitin-associated (UBA)-like domain and a C-terminal cullin binding domain that is responsible for the binding to cullins and Rbx-1, components of an E3 ubiquitin ligase complex for neddylation. — an NCBI CDD conserved domain (cd14412); members share this curated model.
