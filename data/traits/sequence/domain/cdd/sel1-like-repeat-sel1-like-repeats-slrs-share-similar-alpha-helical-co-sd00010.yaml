identifier: CDD:sd00010
label: "Sel1-like repeat. Sel1-like repeats (SLRs) share similar alpha-helical conformations with Tetratricopeptide repeats (TPRs), but with different consensus sequence lengths and superhelical topologies. SLRs contain 36 to 44 amino acids and are present in bacteria and eukaryotes but not in archaea. SLR proteins are involved in a variety of functions, and many serve as adaptor proteins for the assembly of macromolecular complexes. The SLR family was named after the Caenorhabditis elegans Sel1 protein which is predicted to fold into 11 SLRs, a transmembrane domain, and an N-terminal signal sequence. The human Sel1L protein contains an additional fibronectin type-II domain and an N-terminal PEST sequence. Its downregulation is associated with the development of breast and pancreatic carcinomas."
definition: >-
