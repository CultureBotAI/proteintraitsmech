identifier: CDD:cd19025
label: "extracellular domain of nicotinic acetylcholine receptor subunit beta 2 (CHRNB2). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit beta 2 (beta2), encoded by the CHRNB2 gene. The most abundant nicotinic subtype in the human brain is alpha4beta2 receptor which is known to assemble in two functional subunit stoichiometries, (alpha4)3(beta2)2 and (alpha4)2(beta2)3, the latter having a much higher affinity for both acetylcholine and nicotine. This subtype is implicated in the pathophysiology of neurodevelopmental disorders such as schizophrenia and autism, and neurodegenerative disorders such as Parkinson's disease and Alzheimer's disease. Thus, pharmacological ligands targeting this subtype have been researched and developed as a treatment approach implicated in these diseases. They include agonists such as varenicline and cytisine used as smoking cessation aids, as well as positive allosteric modulators (PAMs) such as desformylflustrabromine (dFBr), which are ligands that bind to nicotinic receptors at sites other than the orthosteric site where acetylcholine binds, and are not able to act as agonists on nAChR."
definition: >-
  extracellular domain of nicotinic acetylcholine receptor subunit beta 2 (CHRNB2). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit beta 2 (beta2), encoded by the CHRNB2 gene. The most abundant nicotinic subtype in the human brain is alpha4beta2 receptor which is known to assemble in two functional subunit stoichiometries, (alpha4)3(beta2)2 and (alpha4)2(beta2)3, the latter having a much higher affinity for both acetylcholine and nicotine. This subtype is implicated in the pathophysiology of neurodevelopmental disorders such as schizophrenia and autism, and neurodegenerative disorders such as Parkinson's disease and Alzheimer's disease. Thus, pharmacological ligands targeting this subtype have been researched and developed as a treatment approach implicated in these diseases. They include agonists such as varenicline and cytisine used as smoking cessation aids, as well as positive allosteric modulators (PAMs) such as desformylflustrabromine (dFBr), which are ligands that bind to nicotinic receptors at sites other than the orthosteric site where acetylcholine binds, and are not able to act as agonists on nAChR. — an NCBI CDD conserved domain (cd19025); members share this curated model.
