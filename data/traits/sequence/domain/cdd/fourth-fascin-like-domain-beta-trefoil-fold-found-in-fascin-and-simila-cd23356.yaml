identifier: CDD:cd23356
label: "fourth fascin-like domain, beta-trefoil fold, found in fascin and similar proteins. Fascin, also called fascin-1, 55 kDa actin-bundling protein, singed-like protein, or p55, is an actin-binding protein that contains 2 major actin binding sites. It is involved in the organization of actin filament bundles and the formation of microspikes, membrane ruffles, and stress fibers. It plays an important role for the formation of a diverse set of cell protrusions, such as filopodia, and for cell motility and migration. It mediates reorganization of the actin cytoskeleton and axon growth cone collapse in response to nerve growth factor (NGF). Fascin is composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the fourth fascin-like beta-trefoil domain."
definition: >-
  fourth fascin-like domain, beta-trefoil fold, found in fascin and similar proteins. Fascin, also called fascin-1, 55 kDa actin-bundling protein, singed-like protein, or p55, is an actin-binding protein that contains 2 major actin binding sites. It is involved in the organization of actin filament bundles and the formation of microspikes, membrane ruffles, and stress fibers. It plays an important role for the formation of a diverse set of cell protrusions, such as filopodia, and for cell motility and migration. It mediates reorganization of the actin cytoskeleton and axon growth cone collapse in response to nerve growth factor (NGF). Fascin is composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the fourth fascin-like beta-trefoil domain. — an NCBI CDD conserved domain (cd23356); members share this curated model.
