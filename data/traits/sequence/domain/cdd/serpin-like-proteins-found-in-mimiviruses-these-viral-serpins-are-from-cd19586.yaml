identifier: CDD:cd19586
label: "serpin-like proteins found in mimiviruses. These viral serpins are from Mimiviridae (Tupanvirus, Powai, Bandra, Moumouvirus, and Megavirus) and may represent a new clade of viral serpins. Mimiviridae are thought to have a common evolutionary origin with Poxviridae whose viral serpins are classified into clades N and O. N is composed of viral serpin-1 (SPI-1-like) and viral serpin-2 (SPI-2-like) serpins and clade O is made up of viral serpin-3 (SPI-3-like) serpins. Mimiviruses have the only known viral serpins outside of the poxvirus family. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin-like proteins found in mimiviruses. These viral serpins are from Mimiviridae (Tupanvirus, Powai, Bandra, Moumouvirus, and Megavirus) and may represent a new clade of viral serpins. Mimiviridae are thought to have a common evolutionary origin with Poxviridae whose viral serpins are classified into clades N and O. N is composed of viral serpin-1 (SPI-1-like) and viral serpin-2 (SPI-2-like) serpins and clade O is made up of viral serpin-3 (SPI-3-like) serpins. Mimiviruses have the only known viral serpins outside of the poxvirus family. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19586); members share this curated model.
