identifier: CDD:cd21206
label: "calponin homology (CH) domain found in the IQ motif containing GTPase activating protein  family. Members of the IQ motif containing GTPase activating protein (IQGAP) family are associated with the Ras GTP-binding protein and act as essential regulators of cytoskeletal function. There are three known IQGAP family members: IQGAP1, IQGAP2, and IQGAP3. They are multi-domain molecules having a calponin-homology (CH) domain which binds F-actin, IQGAP-specific repeats, a single WW domain, four IQ motifs that mediate interactions with calmodulin, and a RasGAP related domain that binds active Rho family GTPases. IQGAP1 negatively regulates Ras family GTPases by stimulating their intrinsic GTPase activity. It lacks GAP activity. Both IQGAP1 and IQGAP2 specifically bind to Cdc42 and Rac1, but not to RhoA. Despite similarities to part of the sequence of RasGAP, neither IQGAP1 nor IQGAP2 interacts with Ras. IQGAP3 regulates the organization of the cytoskeleton under the regulation of Rac1 and Cdc42 in neuronal cells. The depletion of IQGAP3 is shown to impair neurite or axon outgrowth in neuronal cells with disorganized cytoskeleton."
definition: >-
  calponin homology (CH) domain found in the IQ motif containing GTPase activating protein family. Members of the IQ motif containing GTPase activating protein (IQGAP) family are associated with the Ras GTP-binding protein and act as essential regulators of cytoskeletal function. There are three known IQGAP family members: IQGAP1, IQGAP2, and IQGAP3. They are multi-domain molecules having a calponin-homology (CH) domain which binds F-actin, IQGAP-specific repeats, a single WW domain, four IQ motifs that mediate interactions with calmodulin, and a RasGAP related domain that binds active Rho family GTPases. IQGAP1 negatively regulates Ras family GTPases by stimulating their intrinsic GTPase activity. It lacks GAP activity. Both IQGAP1 and IQGAP2 specifically bind to Cdc42 and Rac1, but not to RhoA. Despite similarities to part of the sequence of RasGAP, neither IQGAP1 nor IQGAP2 interacts with Ras. IQGAP3 regulates the organization of the cytoskeleton under the regulation of Rac1 and Cdc42 in neuronal cells. The depletion of IQGAP3 is shown to impair neurite or axon outgrowth in neuronal cells with disorganized cytoskeleton. — an NCBI CDD conserved domain (cd21206); members share this curated model.
