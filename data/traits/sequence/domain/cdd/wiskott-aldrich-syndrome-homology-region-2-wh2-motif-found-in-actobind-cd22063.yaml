identifier: CDD:cd22063
label: WH2_Actobindin
definition: >-
  Wiskott Aldrich syndrome homology region 2 (WH2 motif) found in Actobindin and similar proteins. This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in actobindin, an actin-binding protein from amoeba. Actobindin is able to bind two actin monomers at high concentrations of G-actin. It inhibits actin polymerization by sequestering G-actin and stabilizing actin dimers, thus making it a more potent inhibitor of the early phase of actin polymerization than of F-actin elongation
