identifier: CDD:sd00008
label: "C-terminal Tetratricopeptide repeat (TPR) region of YbbN and similar motifs. The Tetratricopeptide repeat (TPR) typically contains 34 amino acids and is found in a variety of organisms including bacteria, cyanobacteria, yeast, fungi, plants, and humans. It is present in a variety of proteins including those involved in chaperone, cell-cycle, transcription, and protein transport complexes. YbbN is a thioredoxin-like protein containing two tandem TPR repeats at the C-terminus, separated by two alpha helices. Its N-terminal thioredoxin-like domain is not a functional oxidoreductase. It functions in heat stress response and DNA synthesis as a chaperone or co-chaperone."
definition: >-
  C-terminal Tetratricopeptide repeat (TPR) region of YbbN and similar motifs. The Tetratricopeptide repeat (TPR) typically contains 34 amino acids and is found in a variety of organisms including bacteria, cyanobacteria, yeast, fungi, plants, and humans. It is present in a variety of proteins including those involved in chaperone, cell-cycle, transcription, and protein transport complexes. YbbN is a thioredoxin-like protein containing two tandem TPR repeats at the C-terminus, separated by two alpha helices. Its N-terminal thioredoxin-like domain is not a functional oxidoreductase. It functions in heat stress response and DNA synthesis as a chaperone or co-chaperone. — an NCBI CDD conserved domain (sd00008); members share this curated model.
