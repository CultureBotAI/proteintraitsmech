identifier: CDD:cd20627
label: "cytochrome P450 family 20, subfamily A, polypeptide 1. Cytochrome P450, family 20, subfamily A, polypeptide 1 (cytochrome P450 20A1 or CYP20A1) is expressed in human hippocampus and substantia nigra. In zebrafish, maternal transcript of CYP20A1 occurs in eggs, suggesting involvement in brain and early development. CYP20A1 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
