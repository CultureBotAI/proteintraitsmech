identifier: CDD:cd14835
label: "AP-1 complex subunit mu N-terminal domain. AP-1 complex mu subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large gamma-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In the case of AP-1 the coat protein is clathrin. AP-1 binds the phospholipid  PI(4)P which plays a role in its localisation to the trans-Golgi network (TGN)/endosome. The mu subunit is comprised of an N-terminal longin domain followed by a C-terminal domain which is involved in the binding of the Y-X-X-Phi sorting signal."
definition: >-
  AP-1 complex subunit mu N-terminal domain. AP-1 complex mu subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large gamma-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In the case of AP-1 the coat protein is clathrin. AP-1 binds the phospholipid PI(4)P which plays a role in its localisation to the trans-Golgi network (TGN)/endosome. The mu subunit is comprised of an N-terminal longin domain followed by a C-terminal domain which is involved in the binding of the Y-X-X-Phi sorting signal. — an NCBI CDD conserved domain (cd14835); members share this curated model.
