identifier: CDD:cd21806
label: DEFL_defensin-like
definition: >-
  defensin-like domain found in bilateria defensins, sapecins, tenecins, phormicins, and lucifensins. This subfamily includes a group of bactericidal proteins, such as defensins, sapecins, tenecins, phormicins, and lucifensins from bilateria. They are host defense peptides produced in response to injury and mostly active against Gram-positive bacteria. This model corresponds to the defensin-like (DEFL) domain, which adopts a typical structure characterized by cysteine-stabilized alpha/beta scaffold
