identifier: CDD:cd22566
label: MrpH-like
definition: >-
  Mannose-resistant Proteus-like fimbriae (MR/P) tip adhesin (MrpH) and similar proteins. This model contains mannose-resistant Proteus-like fimbriae (MR/P) tip adhesin (MrpH) found in Proteus mirabilis, a Gram-negative uropathogen and a major causative agent in catheter-associated urinary tract infections. MrpH is required for MR/P-dependent adherence to surfaces. While MR/P belongs to a well-known class of adhesive fimbriae encoded by the chaperone-usher pathway, MrpH has a markedly different structure compared with other tip-located adhesins in this family. It is a novel class of metal-binding adhesin that requires zinc to mediate biofilm formation
