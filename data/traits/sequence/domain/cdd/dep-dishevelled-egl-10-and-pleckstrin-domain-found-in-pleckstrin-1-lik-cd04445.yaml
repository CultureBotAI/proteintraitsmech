identifier: CDD:cd04445
label: DEP_PLEK1
definition: >-
  DEP (Dishevelled, Egl-10, and Pleckstrin) domain found in pleckstrin 1-like proteins. Pleckstrin 1 plays a role in cell spreading and reorganization of actin cytoskeleton in platelets and leukocytes. Its activity is highly regulated by phosphorylation, mainly by protein kinase C. Pleckstrin-like proteins contain a central DEP domain, flanked by 2 PH (pleckstrin homology) domains
