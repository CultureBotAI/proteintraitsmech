identifier: CDD:cd24022
label: "nucleotide-binding domain (NBD) of Escherichia coli plasmid segregation protein ParM and similar proteins from ParM domain family. Type II plasmid partition systems utilize ParM NTPases in coordination with a centromere-binding protein called ParR to mediate accurate DNA segregation, a process critical for plasmid retention. The family corresponds to a group of uncharacterized proteins similar to Escherichia coli ParM, also called ParA locus 36 kDa protein, or protein StbA. It is a plasmid-encoded protein involved in the control of plasmid partition and required for accurate segregation of low-copy-number plasmid R1."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli plasmid segregation protein ParM and similar proteins from ParM domain family. Type II plasmid partition systems utilize ParM NTPases in coordination with a centromere-binding protein called ParR to mediate accurate DNA segregation, a process critical for plasmid retention. The family corresponds to a group of uncharacterized proteins similar to Escherichia coli ParM, also called ParA locus 36 kDa protein, or protein StbA. It is a plasmid-encoded protein involved in the control of plasmid partition and required for accurate segregation of low-copy-number plasmid R1. — an NCBI CDD conserved domain (cd24022); members share this curated model.
