identifier: CDD:cd18376
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Arabidopsis thaliana FH protein interacting protein FIP2 and similar proteins. FIP2 may act as a substrate-specific adaptor of an E3 ubiquitin-protein ligase complex (CUL3-RBX1-BTB) which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It contains a BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Arabidopsis thaliana FH protein interacting protein FIP2 and similar proteins. FIP2 may act as a substrate-specific adaptor of an E3 ubiquitin-protein ligase complex (CUL3-RBX1-BTB) which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It contains a BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. — an NCBI CDD conserved domain (cd18376); members share this curated model.
