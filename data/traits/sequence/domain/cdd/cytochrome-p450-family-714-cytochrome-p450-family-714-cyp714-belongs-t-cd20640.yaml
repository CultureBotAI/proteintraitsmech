identifier: CDD:cd20640
label: "cytochrome P450 family 714. Cytochrome P450 family 714 (CYP714) belongs to the plant CYP72 clan, which is generally associated with the metabolism of a diversity of fairly hydrophobic compounds including fatty acids and isoprenoids, with the catabolism of hormones (brassinosteroids and gibberellin, GA) and with the biosynthesis of cytokinins. CYP714 enzymes are involved in the biosynthesis of gibberellins (GAs) and the mechanism to control their bioactive endogenous levels. They contribute to the production of diverse GA compounds through various oxidations of C and D rings in both monocots and eudicots. CYP714B1 and CYP714B2 encode the enzyme GA 13-oxidase, which is required for GA1 biosynthesis, while CYP714D1 encodes GA 16a,17-epoxidase, which inactivates the non-13-hydroxy GAs in rice. Arabidopsis CYP714A1 is an inactivation enzyme that catalyzes the conversion of GA12 to 16-carboxylated GA12 (16-carboxy-16beta,17-dihydro GA12). CYP714 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
