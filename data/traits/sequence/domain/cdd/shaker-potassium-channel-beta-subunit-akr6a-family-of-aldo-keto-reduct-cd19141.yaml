identifier: CDD:cd19141
label: "Shaker potassium channel beta subunit (AKR6A) family of aldo-keto reductase (AKR). This family includes voltage-gated potassium channel subunits, beta-1 (KCAB1B), beta-2 (KCAB2B) and  beta-3 (KCAB3B). KCAB1B and KCAB2B are cytoplasmic potassium channel subunits that modulate the characteristics of the channel-forming alpha-subunits. KCAB3B is an accessory potassium channel protein which modulates the activity of the pore-forming alpha subunit."
definition: >-
  Shaker potassium channel beta subunit (AKR6A) family of aldo-keto reductase (AKR). This family includes voltage-gated potassium channel subunits, beta-1 (KCAB1B), beta-2 (KCAB2B) and beta-3 (KCAB3B). KCAB1B and KCAB2B are cytoplasmic potassium channel subunits that modulate the characteristics of the channel-forming alpha-subunits. KCAB3B is an accessory potassium channel protein which modulates the activity of the pore-forming alpha subunit. — an NCBI CDD conserved domain (cd19141); members share this curated model.
