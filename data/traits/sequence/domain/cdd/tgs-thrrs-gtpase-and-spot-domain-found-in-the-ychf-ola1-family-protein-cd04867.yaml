identifier: CDD:cd04867
label: "TGS (ThrRS, GTPase and SpoT) domain found in the YchF/OLA1 family proteins. The YchF/Ola1 family includes bacterial ribosome-binding ATPase YchF as well as its human homolog Obg-like ATPase 1 (OLA1), both of which belong to the Obg family of GTPases, and are novel ATPases that bind and hydrolyze ATP more efficiently than GTP. They have been associated with various cellular processes and pathologies, including DNA repair, tumorigenesis, and apoptosis, in addition to the regulation of the oxidative stress response. OLA1 is also termed DNA damage-regulated overexpressed in cancer 45 (DOC45), or GTP-binding protein 9 (GTPBP9). It is over-expressed in several human malignancies, including cancers of the colon, rectum, ovary, lung, stomach, and uterus. It is linked to the cellular stress response and tumorigenesis, and may also serve as a valuable tumor marker. Members in this family contain a central Obg-type G (guanine nucleotide-binding) domain, flanked by a coiled-coil domain and this TGS (ThrRS, GTPase, SpoT) domain of unknown function."
definition: >-
  TGS (ThrRS, GTPase and SpoT) domain found in the YchF/OLA1 family proteins. The YchF/Ola1 family includes bacterial ribosome-binding ATPase YchF as well as its human homolog Obg-like ATPase 1 (OLA1), both of which belong to the Obg family of GTPases, and are novel ATPases that bind and hydrolyze ATP more efficiently than GTP. They have been associated with various cellular processes and pathologies, including DNA repair, tumorigenesis, and apoptosis, in addition to the regulation of the oxidative stress response. OLA1 is also termed DNA damage-regulated overexpressed in cancer 45 (DOC45), or GTP-binding protein 9 (GTPBP9). It is over-expressed in several human malignancies, including cancers of the colon, rectum, ovary, lung, stomach, and uterus. It is linked to the cellular stress response and tumorigenesis, and may also serve as a valuable tumor marker. Members in this family contain a central Obg-type G (guanine nucleotide-binding) domain, flanked by a coiled-coil domain and this TGS (ThrRS, GTPase, SpoT) domain of unknown function. — an NCBI CDD conserved domain (cd04867); members share this curated model.
