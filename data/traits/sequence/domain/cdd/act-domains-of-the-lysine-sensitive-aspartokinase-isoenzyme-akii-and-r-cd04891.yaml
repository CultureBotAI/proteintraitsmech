identifier: CDD:cd04891
label: "ACT domains of the lysine-sensitive aspartokinase isoenzyme AKII and related proteins. This CD includes the N-terminal of the two ACT domains of the lysine-sensitive aspartokinase isoenzyme AKII of Bacillus subtilis (BS) strain 168, and the lysine plus threonine-sensitive aspartokinase of Corynebacterium glutamicum, as well as, the first and third, of four, ACT domains present in cyanobacteria AK. Also included are the N-terminal of the two ACT domains of the diaminopimelate-sensitive aspartokinase isoenzyme AKI found in Bacilli (Bacillus subtilis strain 168), Clostridia, and Actinobacteria bacterial species. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  ACT domains of the lysine-sensitive aspartokinase isoenzyme AKII and related proteins. This CD includes the N-terminal of the two ACT domains of the lysine-sensitive aspartokinase isoenzyme AKII of Bacillus subtilis (BS) strain 168, and the lysine plus threonine-sensitive aspartokinase of Corynebacterium glutamicum, as well as, the first and third, of four, ACT domains present in cyanobacteria AK. Also included are the N-terminal of the two ACT domains of the diaminopimelate-sensitive aspartokinase isoenzyme AKI found in Bacilli (Bacillus subtilis strain 168), Clostridia, and Actinobacteria bacterial species. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04891); members share this curated model.
