identifier: CDD:cd21865
label: "DEUBAD domain found in nuclear factor related to kappa-B-binding protein (NFRKB) and similar proteins. NFRKB, also called DNA-binding protein R kappa-B, or INO80 complex subunit G (INO80G), is a regulatory component of the metazoan INO80 complex involved in chromatin remodeling, transcription regulation, DNA replication and DNA repair. It modulates the deubiquitinase activity of UCHL5 in the INO80 complex. It binds to the DNA consensus sequence 5'-GGGGAATCTCC-3'. The model corresponds to the DEUBAD domain (conserved domain within the UCH regulatory proteins RPN13, NFRKB/INO80G, and ASX) of NFRKB, which binds primarily to the C-terminal ULD domain of UCH-L5."
definition: >-
  DEUBAD domain found in nuclear factor related to kappa-B-binding protein (NFRKB) and similar proteins. NFRKB, also called DNA-binding protein R kappa-B, or INO80 complex subunit G (INO80G), is a regulatory component of the metazoan INO80 complex involved in chromatin remodeling, transcription regulation, DNA replication and DNA repair. It modulates the deubiquitinase activity of UCHL5 in the INO80 complex. It binds to the DNA consensus sequence 5'-GGGGAATCTCC-3'. The model corresponds to the DEUBAD domain (conserved domain within the UCH regulatory proteins RPN13, NFRKB/INO80G, and ASX) of NFRKB, which binds primarily to the C-terminal ULD domain of UCH-L5. — an NCBI CDD conserved domain (cd21865); members share this curated model.
