identifier: CDD:cd17412
label: "Solute Carrier family 15 member 1 of the Major Facilitator Superfamily of transporters. Solute carrier family 15 member 1 (SLC15A1), also called peptide transporter 1 (PepT1), is a member of the proton-coupled oligopeptide transporter (POT) family of integral membrane proteins that mediate the cellular uptake of di/tripeptides and peptide-like drugs. SLC15A1, as well as SLC15A2, mediate the proton-coupled active transport of a broad range of dipeptides and tripeptides, including zwitterionic, anionic and cationic peptides, as well as a variety of peptide-like drugs such as cefadroxil, enalapril, and valacyclovir. SLC15A1 is primarily expressed in the brush border membranes of enterocytes of the small intestine and is also known as the intestinal isoform. It is a high-capacity/low-affinity transporter that drives the transport of di-and tripeptides for metabolic purposes. It's expression is upregulated in the colon during chronic inflammation associated with inflammatory bowel disease. SLC15A1/PepT1 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute Carrier family 15 member 1 of the Major Facilitator Superfamily of transporters. Solute carrier family 15 member 1 (SLC15A1), also called peptide transporter 1 (PepT1), is a member of the proton-coupled oligopeptide transporter (POT) family of integral membrane proteins that mediate the cellular uptake of di/tripeptides and peptide-like drugs. SLC15A1, as well as SLC15A2, mediate the proton-coupled active transport of a broad range of dipeptides and tripeptides, including zwitterionic, anionic and cationic peptides, as well as a variety of peptide-like drugs such as cefadroxil, enalapril, and valacyclovir. SLC15A1 is primarily expressed in the brush border membranes of enterocytes of the small intestine and is also known as the intestinal isoform. It is a high-capacity/low-affinity transporter that drives the transport of di-and tripeptides for metabolic purposes. It's expression is upregulated in the colon during chronic inflammation associated with inflammatory bowel disease. SLC15A1/PepT1 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17412); members share this curated model.
