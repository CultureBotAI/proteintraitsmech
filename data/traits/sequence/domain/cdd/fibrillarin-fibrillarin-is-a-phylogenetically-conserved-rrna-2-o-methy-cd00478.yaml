identifier: CDD:cd00478
label: Fibrillarin
definition: >-
  fibrillarin. Fibrillarin is a phylogenetically conserved rRNA 2'-O-methyltransferase required for pre-mRNA processing during ribosomal biogenesis. Fibrillarin is a common component of many small nucleolar ribonucleoprotein (snRNP) particles and is the antiigen for an autoimmune disease called scheroderma
