identifier: CDD:cd08166
label: "uncharacterized subgroup related to Saccharomyces cerevisiae CDC1, metallophosphatase domain. A functionally uncharacterized subgroup related to the metallophosphatase domain of Saccharomyces cerevisiae Cdc1, S. cerevisiae Ted1 and human MPPE1. Cdc1 is an endoplasmic reticulum-localized transmembrane lipid phosphatase and is a subunit of DNA polymerase delta. TED1 (trafficking of Emp24p/Erv25p-dependent cargo disrupted 1), acts together with Emp24p and Erv25p in cargo exit from the ER.  The MPPE1 gene is a candidate susceptibility gene for Bipolar disorder.  Proteins in this uncharacterized subgroup belong to the metallophosphatase (MPP) superfamily.  MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The MPP superfamily includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases).  The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination."
definition: >-
  uncharacterized subgroup related to Saccharomyces cerevisiae CDC1, metallophosphatase domain. A functionally uncharacterized subgroup related to the metallophosphatase domain of Saccharomyces cerevisiae Cdc1, S. cerevisiae Ted1 and human MPPE1. Cdc1 is an endoplasmic reticulum-localized transmembrane lipid phosphatase and is a subunit of DNA polymerase delta. TED1 (trafficking of Emp24p/Erv25p-dependent cargo disrupted 1), acts together with Emp24p and Erv25p in cargo exit from the ER. The MPPE1 gene is a candidate susceptibility gene for Bipolar disorder. Proteins in this uncharacterized subgroup belong to the metallophosphatase (MPP) superfamily. MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The MPP superfamily includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases). The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination. — an NCBI CDD conserved domain (cd08166); members share this curated model.
