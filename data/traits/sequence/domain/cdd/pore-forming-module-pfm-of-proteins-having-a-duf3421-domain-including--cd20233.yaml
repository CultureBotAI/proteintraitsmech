identifier: CDD:cd20233
label: "pore-forming module (PFM) of proteins having a DUF3421 domain including Drosophila unzipped, honey bee anarchy 1,  and similar aerolysin-type beta-barrel pore-forming proteins. Many proteins belonging to this group have N-terminal DUF3421. Drosophila melanogaster unzipped protein is required for normal axon patterning during neurogenesis, and honey bee anarchy 1 may play a role in worker sterility in a social insect.  Members of this group belong to the aerolysin family of beta-pore-forming proteins (beta-PFPs). PFPs are generally secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores harmful to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel, are found in all kingdoms of life and many are bacterial toxins. In addition to having a role in microbial infection, they have potential as biotechnological sensors and delivery systems. They share a similar monomeric architecture, with a variable membrane-binding domain and a structurally conserved pore-forming region. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin)."
definition: >-
  pore-forming module (PFM) of proteins having a DUF3421 domain including Drosophila unzipped, honey bee anarchy 1, and similar aerolysin-type beta-barrel pore-forming proteins. Many proteins belonging to this group have N-terminal DUF3421. Drosophila melanogaster unzipped protein is required for normal axon patterning during neurogenesis, and honey bee anarchy 1 may play a role in worker sterility in a social insect. Members of this group belong to the aerolysin family of beta-pore-forming proteins (beta-PFPs). PFPs are generally secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores harmful to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel, are found in all kingdoms of life and many are bacterial toxins. In addition to having a role in microbial infection, they have potential as biotechnological sensors and delivery systems. They share a similar monomeric architecture, with a variable membrane-binding domain and a structurally conserved pore-forming region. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin). — an NCBI CDD conserved domain (cd20233); members share this curated model.
