identifier: CDD:cd14796
label: "N-terminal domain of ribonuclease H3. RNAse H3 (HIII) is a bacterial type 2 ribonuclease, which endonucleolytically hydrolyzes an RNA strand when it is annealed to a complementary DNA strand in the presence of divalent cations, and plays a role in DNA replication and repair. The N-terminal domain characterized by this model has been shown to be important in substrate binding; it might form initial contacts with the substrate and not be part of the active complex that involves the C-terminal ribonuclease domain. This domain has also been characterized as DUF3378."
definition: >-
  N-terminal domain of ribonuclease H3. RNAse H3 (HIII) is a bacterial type 2 ribonuclease, which endonucleolytically hydrolyzes an RNA strand when it is annealed to a complementary DNA strand in the presence of divalent cations, and plays a role in DNA replication and repair. The N-terminal domain characterized by this model has been shown to be important in substrate binding; it might form initial contacts with the substrate and not be part of the active complex that involves the C-terminal ribonuclease domain. This domain has also been characterized as DUF3378. — an NCBI CDD conserved domain (cd14796); members share this curated model.
