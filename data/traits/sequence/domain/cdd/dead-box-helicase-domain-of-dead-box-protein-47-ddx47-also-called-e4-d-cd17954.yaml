identifier: CDD:cd17954
label: "DEAD-box helicase domain of DEAD box protein 47. DDX47 (also called E4-DEAD box protein) can shuttle between the nucleus and the cytoplasm, and has an RNA-independent ATPase activity. DX47 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 47. DDX47 (also called E4-DEAD box protein) can shuttle between the nucleus and the cytoplasm, and has an RNA-independent ATPase activity. DX47 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17954); members share this curated model.
