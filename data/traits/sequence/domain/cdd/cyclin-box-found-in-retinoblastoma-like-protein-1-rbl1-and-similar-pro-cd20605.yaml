identifier: CDD:cd20605
label: "cyclin box found in retinoblastoma-like protein 1 (RBL1) and similar proteins. RBL1, also called 107 kDa retinoblastoma-associated protein (p107), retinoblastoma-related protein 1 (RBR-1), or pRb1, is a key regulator of entry into cell division. It is directly involved in heterochromatin formation by maintaining overall chromatin structure, especially that of constitutive heterochromatin by stabilizing histone methylation. RBL1 recruits and targets histone methyltransferases KMT5B and KMT5C, leading to epigenetic transcriptional repression. It controls histone H4 'Lys-20' trimethylation. RBL1 probably acts as a transcription repressor by recruiting chromatin-modifying enzymes to promoters. It may also act as a tumor suppressor. RBL1 contains one cyclin box. The cyclin box is a protein binding domain."
definition: >-
  cyclin box found in retinoblastoma-like protein 1 (RBL1) and similar proteins. RBL1, also called 107 kDa retinoblastoma-associated protein (p107), retinoblastoma-related protein 1 (RBR-1), or pRb1, is a key regulator of entry into cell division. It is directly involved in heterochromatin formation by maintaining overall chromatin structure, especially that of constitutive heterochromatin by stabilizing histone methylation. RBL1 recruits and targets histone methyltransferases KMT5B and KMT5C, leading to epigenetic transcriptional repression. It controls histone H4 'Lys-20' trimethylation. RBL1 probably acts as a transcription repressor by recruiting chromatin-modifying enzymes to promoters. It may also act as a tumor suppressor. RBL1 contains one cyclin box. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20605); members share this curated model.
