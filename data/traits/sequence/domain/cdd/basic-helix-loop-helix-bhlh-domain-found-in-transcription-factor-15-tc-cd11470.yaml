identifier: CDD:cd11470
label: "basic helix-loop-helix (bHLH) domain found in transcription factor 15 (TCF-15) and similar proteins. TCF-15, also termed Class A basic helix-loop-helix protein 40 (bHLHa40), or paraxis, or protein bHLH-EC2, is a bHLH transcription factor expressed in caudal lateral and paraxial mesoderm dermomyotome and sclerotome fore limb buds during embryo development. It may function as an early transcriptional regulator involved in the patterning of the mesoderm and in lineage determination of cell types derived from the mesoderm."
definition: >-
  basic helix-loop-helix (bHLH) domain found in transcription factor 15 (TCF-15) and similar proteins. TCF-15, also termed Class A basic helix-loop-helix protein 40 (bHLHa40), or paraxis, or protein bHLH-EC2, is a bHLH transcription factor expressed in caudal lateral and paraxial mesoderm dermomyotome and sclerotome fore limb buds during embryo development. It may function as an early transcriptional regulator involved in the patterning of the mesoderm and in lineage determination of cell types derived from the mesoderm. — an NCBI CDD conserved domain (cd11470); members share this curated model.
