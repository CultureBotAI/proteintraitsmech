identifier: CDD:cd23069
label: "PDZ domain of ARHGEF11, ARHGEF12, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of ARHGEF11, ARHGEF12, and related domains. This subfamily includes the GEFs (guanine exchange factors) ARHGEF11 (Rho guanine nucleotide exchange factor 11, known as PDZ-RhoGEF) and ARHGEF12 (Rho guanine nucleotide exchange factor 12, also known as leukemia-associated RhoGEF). GEFs activate Rho GTPases by promoting GTP binding. ARHGEF11/12 are regulators of G protein signaling (RGS) domain-containing GEFs; the RGS domain mediates their binding to and activation of Galpha (and Gq also in the case of ARHGEF12), in response to G-protein coupled receptor activation. ARHGEF11 and 12 are involved in serum-signaling, and regulate Yes-Associated Protein (YAP1)-dependent transcription. The ARHGEF12 PDZ domain binds plexin-B1 and the receptor tyrosine kinase insulin-like growth factor receptor (IGF-R1) beta-subunit. ARHGEF12 also interacts with glutamate receptor delta-1(GluD1), a postsynaptic organizer of inhibitory synapses in cortical pyramidal neurons. The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This ARHGEF11-12-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
