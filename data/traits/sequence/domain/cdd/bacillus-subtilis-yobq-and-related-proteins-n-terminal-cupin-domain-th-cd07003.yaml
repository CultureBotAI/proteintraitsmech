identifier: CDD:cd07003
label: "Bacillus subtilis YobQ and related proteins, N-terminal cupin domain. This family includes bacterial proteins homologous to Bacillus subtilis YobQ and Photobacterium leiognathi LumQ, both uncharacterized proteins thought to be DNA-binding proteins that may function as AraC/XylS family transcriptional regulators. YobQ has an N-terminal cupin beta barrel domain (represented by this alignment model) and a C-terminal AraC/XylS family helix-turn-helix (HTH) DNA-binding domain. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Bacillus subtilis YobQ and related proteins, N-terminal cupin domain. This family includes bacterial proteins homologous to Bacillus subtilis YobQ and Photobacterium leiognathi LumQ, both uncharacterized proteins thought to be DNA-binding proteins that may function as AraC/XylS family transcriptional regulators. YobQ has an N-terminal cupin beta barrel domain (represented by this alignment model) and a C-terminal AraC/XylS family helix-turn-helix (HTH) DNA-binding domain. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd07003); members share this curated model.
