identifier: CDD:cd17314
label: "Monocarboxylate transporter (MCT) family and similar transporters of the Major Facilitator Superfamily. The group is composed of the Monocarboxylate transporter (MCT) family in animals and similar transporters from fungi, plants, archaea, and bacteria. MCT is also called Solute carrier family 16 (SLC16 or SLC16A). It is composed of 14 members, MCT1-14. MCTs play an integral role in cellular metabolism via lactate transport and have been implicated in metabolic synergy in tumors. MCTs have been found to facilitate the transport across the plasma membrane not only of monocarboxylates (MCT1-4), but also thyroid hormones (MCT8/10), and aromatic acids (MCT10). Yeast MCT homologous (Mch) proteins are not involved in the uptake of monocarboxylates; their substrates are not known. The MCT-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporter (MCT) family and similar transporters of the Major Facilitator Superfamily. The group is composed of the Monocarboxylate transporter (MCT) family in animals and similar transporters from fungi, plants, archaea, and bacteria. MCT is also called Solute carrier family 16 (SLC16 or SLC16A). It is composed of 14 members, MCT1-14. MCTs play an integral role in cellular metabolism via lactate transport and have been implicated in metabolic synergy in tumors. MCTs have been found to facilitate the transport across the plasma membrane not only of monocarboxylates (MCT1-4), but also thyroid hormones (MCT8/10), and aromatic acids (MCT10). Yeast MCT homologous (Mch) proteins are not involved in the uptake of monocarboxylates; their substrates are not known. The MCT-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17314); members share this curated model.
