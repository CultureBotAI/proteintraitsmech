identifier: CDD:cd14497
label: "protein tyrosine phosphatase-like domain of phosphatase and tensin homolog and similar proteins. Phosphatase and tensin homolog (PTEN) is a tumor suppressor that acts as a dual-specificity protein phosphatase and as a lipid phosphatase. It dephosphorylates phosphoinositide trisphosphate. In addition to PTEN, this family includes tensins, voltage-sensitive phosphatases (VSPs), and auxilins. They all contain a protein tyrosine phosphatase-like domain although not all are active phosphatases. Tensins are intracellular proteins that act as links between the extracellular matrix and the cytoskeleton, and thereby mediate signaling for cell shape and motility, and they may or may not have phosphatase activity. VSPs are phosphoinositide phosphatases with substrates that include phosphatidylinositol-4,5-diphosphate and phosphatidylinositol-3,4,5-trisphosphate. Auxilins are J domain-containing proteins that facilitate Hsc70-mediated dissociation of clathrin from clathrin-coated vesicles, and they do not exhibit phosphatase activity."
definition: >-
  protein tyrosine phosphatase-like domain of phosphatase and tensin homolog and similar proteins. Phosphatase and tensin homolog (PTEN) is a tumor suppressor that acts as a dual-specificity protein phosphatase and as a lipid phosphatase. It dephosphorylates phosphoinositide trisphosphate. In addition to PTEN, this family includes tensins, voltage-sensitive phosphatases (VSPs), and auxilins. They all contain a protein tyrosine phosphatase-like domain although not all are active phosphatases. Tensins are intracellular proteins that act as links between the extracellular matrix and the cytoskeleton, and thereby mediate signaling for cell shape and motility, and they may or may not have phosphatase activity. VSPs are phosphoinositide phosphatases with substrates that include phosphatidylinositol-4,5-diphosphate and phosphatidylinositol-3,4,5-trisphosphate. Auxilins are J domain-containing proteins that facilitate Hsc70-mediated dissociation of clathrin from clathrin-coated vesicles, and they do not exhibit phosphatase activity. — an NCBI CDD conserved domain (cd14497); members share this curated model.
