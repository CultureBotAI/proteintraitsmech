identifier: CDD:cd17958
label: "DEAD-box helicase domain of DEAD box proteins 43 and 53. DDX43 (also called cancer/testis antigen 13 or helical antigen) displays tumor-specific expression.  Diseases associated with DDX43 include rheumatoid lung disease. DDX53 is also called cancer/testis antigen 26 or DEAD-Box Protein CAGE. Both DDX46 and DDX53 are members of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box proteins 43 and 53. DDX43 (also called cancer/testis antigen 13 or helical antigen) displays tumor-specific expression. Diseases associated with DDX43 include rheumatoid lung disease. DDX53 is also called cancer/testis antigen 26 or DEAD-Box Protein CAGE. Both DDX46 and DDX53 are members of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17958); members share this curated model.
