identifier: CDD:cd09262
label: "Mu homology domain (MHD) of adaptor-like protein (AP-like), stonin-1 (also called Stoned B-like factor). A small family of proteins named stonins has been characterized as clathrin-dependent AP-2 mu2 chain related factors, which may act as cargo-specific sorting adaptors in endocytosis. Stonins include stonin 1 and stonin 2, which are the only mammalian homologs of Drosophila stoned B, a presynaptic protein implicated in neurotransmission and synaptic vesicle (SV) recycling. They are conserved from C. elegans to humans, but are not found in prokaryotes or yeasts. This family corresponds to the mu homology domain of stonin 1, which is distantly related to the C-terminal domain of mu chains among AP complexes. Due to the low degree of sequence conservation of the corresponding binding site, the mu homology domain of stonin-1 is unable to recognize tyrosine-based endocytic sorting signals. To data, little is known about the localization and function of stonin-1."
definition: >-
  Mu homology domain (MHD) of adaptor-like protein (AP-like), stonin-1 (also called Stoned B-like factor). A small family of proteins named stonins has been characterized as clathrin-dependent AP-2 mu2 chain related factors, which may act as cargo-specific sorting adaptors in endocytosis. Stonins include stonin 1 and stonin 2, which are the only mammalian homologs of Drosophila stoned B, a presynaptic protein implicated in neurotransmission and synaptic vesicle (SV) recycling. They are conserved from C. elegans to humans, but are not found in prokaryotes or yeasts. This family corresponds to the mu homology domain of stonin 1, which is distantly related to the C-terminal domain of mu chains among AP complexes. Due to the low degree of sequence conservation of the corresponding binding site, the mu homology domain of stonin-1 is unable to recognize tyrosine-based endocytic sorting signals. To data, little is known about the localization and function of stonin-1. — an NCBI CDD conserved domain (cd09262); members share this curated model.
