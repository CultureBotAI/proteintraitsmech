identifier: CDD:cd24020
label: "nucleotide-binding domain (NBD) of plant hexokinase (HK) domain family. Hexokinase (EC 2.7.1.1) possesses the ability to transfer an inorganic phosphate group from ATP to a substrate. It catalyzes the ATP-dependent phosphorylation of aldo- and keto-hexose sugars to the hexose-6-phosphate (H6P). It can catalyze this reaction on glucose, fructose, sorbitol and glucosamine, and as such is the first step in a number of metabolic pathways. Hexokinase contains two structurally similar domains. Some members of the family have two copies of each of these domains. Hexokinases act as sugar sensors in higher plants. They may regulate sugar-dependent gene repression or activation. They mediate the effects of sugar on plant growth and development independently of its catalytic activity or the sugar metabolism. They may also regulate the execution of program cell death in plant cells, as well as promote roots and leaves growth."
