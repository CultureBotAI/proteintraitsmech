identifier: CDD:cd12881
label: "SPRY domain in HERC1. This SPRY domain is found in the HERC1, a large protein related to chromosome condensation regulator RCC1. It is widely expressed in many tissues, playing an important role in intracellular membrane trafficking in the cytoplasm as well as Golgi apparatus. HERC1 also interacts with tuberous sclerosis 2 (TSC2, tuberin), which suppresses cell growth, and results in the destabilization of TSC2. However, the biological function of HERC1 has yet to be defined."
definition: >-
  SPRY domain in HERC1. This SPRY domain is found in the HERC1, a large protein related to chromosome condensation regulator RCC1. It is widely expressed in many tissues, playing an important role in intracellular membrane trafficking in the cytoplasm as well as Golgi apparatus. HERC1 also interacts with tuberous sclerosis 2 (TSC2, tuberin), which suppresses cell growth, and results in the destabilization of TSC2. However, the biological function of HERC1 has yet to be defined. — an NCBI CDD conserved domain (cd12881); members share this curated model.
