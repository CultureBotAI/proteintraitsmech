identifier: CDD:cd13094
label: "Thrombospondin N (TSPN)-like domain of Kielin. Kielin contains multiple chordin-like cysteine rich repeats flanked by an N-terminal TSPN domain (not present in all homologs) and a C-terminal von Willebrand factor (vWF)-like domain. First isolated in Xenopus, as a signaling molecule that plays a role in induction in the embryonic midline, its mouse homolog has been identified as an enhancer of BMP (bone morphogenetic protein) signaling. The thrombospondin N, the laminin G, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Thrombospondin N (TSPN)-like domain of Kielin. Kielin contains multiple chordin-like cysteine rich repeats flanked by an N-terminal TSPN domain (not present in all homologs) and a C-terminal von Willebrand factor (vWF)-like domain. First isolated in Xenopus, as a signaling molecule that plays a role in induction in the embryonic midline, its mouse homolog has been identified as an enhancer of BMP (bone morphogenetic protein) signaling. The thrombospondin N, the laminin G, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13094); members share this curated model.
