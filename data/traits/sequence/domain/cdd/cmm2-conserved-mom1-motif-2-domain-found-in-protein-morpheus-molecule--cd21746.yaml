identifier: CDD:cd21746
label: CMM2_MOM1
definition: >-
  CMM2 (Conserved MOM1 Motif 2) domain found in protein MORPHEUS MOLECULE 1 (MOM1) and similar proteins. MOM1, also called protein MAINTENANCE OF METHYLATION, is a helicase protein required for the heritable maintenance of transcriptional gene silencing (TGS) in heterochromatin, and particularly in the intermediate bivalent heterochromatin, characterized by an unsual methylation pattern consisting in hypermethylated DNA and histone H3 'Lys-4' methylation (H3K4me) together with depletion of histone H3 'Lys-9' methylation (H3K9me), in a chromatin methylation-independent manner, in a non-CG methylation context. The model corresponds to CMM2 (Conserved MOM1 Motif 2)of MOM1, which acts as a minimal MOM1 fragment capable of transcriptional regulation
