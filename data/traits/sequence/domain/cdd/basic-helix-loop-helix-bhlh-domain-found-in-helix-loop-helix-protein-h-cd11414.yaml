identifier: CDD:cd11414
label: bHLH_TS_HEN
definition: >-
  basic helix-loop-helix (bHLH) domain found in helix-loop-helix protein (HEN) family. The HEN family includes two neuron-specific bHLH transcription factors, HEN-1 (also known as Nhlh1 or bHLHa35 or NSCL-1) and HEN-2 (also known as Nhlh2 or bHLHa34 or NSCL-2). They may serve as DNA-binding protein that is involved in the control of cell-type determination, possibly within the developing nervous system
