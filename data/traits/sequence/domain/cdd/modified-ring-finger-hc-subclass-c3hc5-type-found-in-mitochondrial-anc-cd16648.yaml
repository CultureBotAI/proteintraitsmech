identifier: CDD:cd16648
label: "Modified RING finger, HC subclass (C3HC5-type), found in mitochondrial-anchored protein ligase (MAPL) and similar proteins. MAPL, also known as MULAN, mitochondrial ubiquitin ligase activator of NFKB 1, E3 SUMO-protein ligase MUL1, E3 ubiquitin-protein ligase MUL1, growth inhibition and death E3 ligase (GIDE), putative NF-kappa-B-activating protein 266, or RING finger protein 218 (RNF218), is a multifunctional mitochondrial outer membrane protein involved in several processes specific to metazoan (multicellular animal) cells, such as NF-kappaB activation, innate immunity and antiviral signaling, suppression of PINK1/parkin defects, mitophagy in skeletal muscle, and caspase-dependent apoptosis. MAPL contains a unique BAM (beside a membrane)/GIDE (growth inhibition death E3 ligase) domain and a C-terminal modified cytosolic C3HC5-type RING-HC finger which is distinguished from typical C3HC4-type RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain."
definition: >-
  Modified RING finger, HC subclass (C3HC5-type), found in mitochondrial-anchored protein ligase (MAPL) and similar proteins. MAPL, also known as MULAN, mitochondrial ubiquitin ligase activator of NFKB 1, E3 SUMO-protein ligase MUL1, E3 ubiquitin-protein ligase MUL1, growth inhibition and death E3 ligase (GIDE), putative NF-kappa-B-activating protein 266, or RING finger protein 218 (RNF218), is a multifunctional mitochondrial outer membrane protein involved in several processes specific to metazoan (multicellular animal) cells, such as NF-kappaB activation, innate immunity and antiviral signaling, suppression of PINK1/parkin defects, mitophagy in skeletal muscle, and caspase-dependent apoptosis. MAPL contains a unique BAM (beside a membrane)/GIDE (growth inhibition death E3 ligase) domain and a C-terminal modified cytosolic C3HC5-type RING-HC finger which is distinguished from typical C3HC4-type RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain. — an NCBI CDD conserved domain (cd16648); members share this curated model.
