label: "uncharacterized protein bxe_c0505, cupin domain. This family includes mostly bacterial proteins homologous to bxe_c0505, a Burkholderia xenovorans protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
