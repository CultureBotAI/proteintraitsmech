identifier: CDD:cd20689
label: "C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system (CdiA-CT) of Burkholderia pseudomallei, and similar proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the C-terminal (CT) toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular model includes the C-terminal (CT) toxin domains of Burkholderia pseudomallei E479 and 1026b, both appearing to be RNAses acting on tRNA."
definition: >-
  C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system (CdiA-CT) of Burkholderia pseudomallei, and similar proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the C-terminal (CT) toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular model includes the C-terminal (CT) toxin domains of Burkholderia pseudomallei E479 and 1026b, both appearing to be RNAses acting on tRNA. — an NCBI CDD conserved domain (cd20689); members share this curated model.
