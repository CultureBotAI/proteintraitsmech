identifier: CDD:cd12815
label: LbR_CS-like
definition: >-
  Circumsporozoite protein-like, left-handed beta-roll. This poorly characterized group contains domains related to the left-handed beta-roll domains of cell surface adhesion proteins, virulence factors, and ice-binding proteins. This group contains proteins identified as the circumsporozoite (CS) protein of Plasmodium yoellii nigeriensis. CS is a highly immunogenic protein of Plasmodium and an important target for vaccine efforts
