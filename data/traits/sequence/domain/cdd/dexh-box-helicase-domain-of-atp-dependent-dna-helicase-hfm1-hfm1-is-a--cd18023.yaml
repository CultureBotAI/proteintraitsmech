identifier: CDD:cd18023
label: "DEXH-box helicase domain of ATP-dependent DNA helicase HFM1. HFM1 is a type II DEAD box helicase, required for crossover formation and complete synapsis of homologous chromosomes during meiosis. HFM1 belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of ATP-dependent DNA helicase HFM1. HFM1 is a type II DEAD box helicase, required for crossover formation and complete synapsis of homologous chromosomes during meiosis. HFM1 belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18023); members share this curated model.
