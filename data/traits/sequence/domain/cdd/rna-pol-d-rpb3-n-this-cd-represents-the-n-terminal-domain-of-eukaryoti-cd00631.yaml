identifier: CDD:cd00631
label: RNA_pol_D_RPB3_N
definition: >-
  RNA_pol_D_RPB3_N. This CD represents the N-terminal domain of eukaryotic RNA polymerase II subunit RPB3 and its orthologs, bacterial subunit alpha and archeal subunit D. Also included is subunit AC40, a sequence homolog (a paralog) of RPB3 that assembles into the RNA polymerase I and III complexesin eukaryotes. RPB3 dimerizes with RPB11 as does the bacterial alpha subunit with a second alpha subunit ( the latter referred to as the alpha NTD dimer). A conserved, surface-exposed region within this domain serves as a target for transcription activators. In archaea, this domain exists as a stand-alone protein, without an additional C-terminal domain
