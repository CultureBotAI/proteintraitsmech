identifier: CDD:cd18389
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 2 (KCTD2). KCTD2 is a BTB/POZ domain-containing protein that functions as an adaptor of Cullin3 E3 ubiquitin ligase. It suppresses gliomagenesis by destabilizing c-Myc. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. KCTD5 and KCTD17 BTB domain, highly similar to KCTD2, form pentamer structures."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 2 (KCTD2). KCTD2 is a BTB/POZ domain-containing protein that functions as an adaptor of Cullin3 E3 ubiquitin ligase. It suppresses gliomagenesis by destabilizing c-Myc. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. KCTD5 and KCTD17 BTB domain, highly similar to KCTD2, form pentamer structures. — an NCBI CDD conserved domain (cd18389); members share this curated model.
