identifier: CDD:cd10578
label: "Tumor necrosis factor receptor superfamily member 3 (TNFRSF3),  also known as lymphotoxin beta receptor (LTBR). TNFRSF3 (also known as lymphotoxin beta receptor, LTbetaR, CD18, TNFCR, TNFR3, D12S370, TNFR-RP, TNFR2-RP, LT-BETA-R, TNF-R-III) plays a role in signaling during development of lymphoid and other organs, lipid metabolism, immune response, and programmed cell death. Its ligands include lymphotoxin (LT) alpha/beta membrane form (heterotrimer) and tumor necrosis factor ligand superfamily member 14 (also known as LIGHT). TNFRSF3 agonism by these ligands initiates canonical, as well as non-canonical nuclear factor-kappaB (NF-kappaB) signaling, and preferentially results in the translocation of p52-RELB complexes into the nucleus. While these ligands are often expressed by T and B cells, TNFRSF3 is conspicuous absence on T and B lymphocytes and NK cells, suggesting that signaling may be unidirectional for TNFRSF3. Activity of this receptor has also been linked to carcinogenesis; it helps trigger apoptosis and can also lead to release of the interleukin 8 (IL8). Alternatively spliced transcript variants encoding multiple isoforms have been observed."
definition: >-
  Tumor necrosis factor receptor superfamily member 3 (TNFRSF3), also known as lymphotoxin beta receptor (LTBR). TNFRSF3 (also known as lymphotoxin beta receptor, LTbetaR, CD18, TNFCR, TNFR3, D12S370, TNFR-RP, TNFR2-RP, LT-BETA-R, TNF-R-III) plays a role in signaling during development of lymphoid and other organs, lipid metabolism, immune response, and programmed cell death. Its ligands include lymphotoxin (LT) alpha/beta membrane form (heterotrimer) and tumor necrosis factor ligand superfamily member 14 (also known as LIGHT). TNFRSF3 agonism by these ligands initiates canonical, as well as non-canonical nuclear factor-kappaB (NF-kappaB) signaling, and preferentially results in the translocation of p52-RELB complexes into the nucleus. While these ligands are often expressed by T and B cells, TNFRSF3 is conspicuous absence on T and B lymphocytes and NK cells, suggesting that signaling may be unidirectional for TNFRSF3. Activity of this receptor has also been linked to carcinogenesis; it helps trigger apoptosis and can also lead to release of the interleukin 8 (IL8). Alternatively spliced transcript variants encoding multiple isoforms have been observed. — an NCBI CDD conserved domain (cd10578); members share this curated model.
