identifier: CDD:cd20729
label: "Polymorphic Nuclease effector (PoNe) co-occurring with N-terminal LXG domains. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains some members that contain LXG domains in the N-terminal region. This group of polymorphic toxin proteins in bacteria are predicted to be associated with type VII secretion pathways to mediate export of bacterial toxins."
definition: >-
  Polymorphic Nuclease effector (PoNe) co-occurring with N-terminal LXG domains. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains some members that contain LXG domains in the N-terminal region. This group of polymorphic toxin proteins in bacteria are predicted to be associated with type VII secretion pathways to mediate export of bacterial toxins. — an NCBI CDD conserved domain (cd20729); members share this curated model.
