identifier: CDD:cd12202
label: "Caspase 8-associated protein 2 myb-like domain. This domain is the SANT/myb-like domain of Caspase 8-associated protein 2 (CASP8AP2) / GON-4 like proteins. CASP8AP2 (aka Flice-Associated Huge Protein (FLASH)) is implicated in numerous gene regulatory roles including roles in embryogenesis, oncogenesis, down-regulation of replication-dependent histone genes, regulation of Caspase 8 activity at the death-inducing signaling complex (DISC), and as a useful marker in leukemia prognosis. Gon-4 is critical in Caenorhabditis elegans gonadogenesis. Danio rerio GON4 is a regulator of gene expression in hematopoietic development, possibly by repressing expression. These proteins are members of the SANT/myb group. SANT is named after 'SWI3, ADA2, N-CoR and TFIIIB', several factors that share this domain. The SANT domain resembles the 3 alpha-helix bundle of the DNA-binding Myb domains and is found in a diverse set of proteins."
definition: >-
  Caspase 8-associated protein 2 myb-like domain. This domain is the SANT/myb-like domain of Caspase 8-associated protein 2 (CASP8AP2) / GON-4 like proteins. CASP8AP2 (aka Flice-Associated Huge Protein (FLASH)) is implicated in numerous gene regulatory roles including roles in embryogenesis, oncogenesis, down-regulation of replication-dependent histone genes, regulation of Caspase 8 activity at the death-inducing signaling complex (DISC), and as a useful marker in leukemia prognosis. Gon-4 is critical in Caenorhabditis elegans gonadogenesis. Danio rerio GON4 is a regulator of gene expression in hematopoietic development, possibly by repressing expression. These proteins are members of the SANT/myb group. SANT is named after 'SWI3, ADA2, N-CoR and TFIIIB', several factors that share this domain. The SANT domain resembles the 3 alpha-helix bundle of the DNA-binding Myb domains and is found in a diverse set of proteins. — an NCBI CDD conserved domain (cd12202); members share this curated model.
