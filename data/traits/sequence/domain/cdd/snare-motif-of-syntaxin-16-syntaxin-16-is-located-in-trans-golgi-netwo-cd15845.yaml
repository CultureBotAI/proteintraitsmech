identifier: CDD:cd15845
label: "SNARE motif of syntaxin 16. Syntaxin 16 is located in trans-Golgi network (TGN) and regulated by the SM protein Vps45p. It forms a complex with syntaxin 6 (Qc), Vti1a (Qb) and VAMP4 (R-SNARE) and is involved in the regulation of recycling of early endosomes to the trans-Golgi network (TGN). Syntaxin 16 is a member of the Qa subgroup of SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins, which consist of coiled-coil helices (called SNARE motifs) that mediate the interactions between SNARE proteins, and a transmembrane domain. The SNARE complexes mediate membrane fusion, important for trafficking of newly synthesized proteins, recycling of pre-existing proteins and organelle formation. SNARE proteins are classified into four groups, Qa-, Qb-, Qc- and R-SNAREs, depending on whether the residue in the hydrophilic center layer of the four-helical bundle is a glutamine (Q) or arginine (R). Qa-, as well as Qb- and Qc-SNAREs, are localized to target organelle membranes, while R-SNARE is localized to vesicle membranes. They form unique complexes consisting of one member of each subgroup, that mediate fusion between a specific type of vesicles and their target organelle."
definition: >-
  SNARE motif of syntaxin 16. Syntaxin 16 is located in trans-Golgi network (TGN) and regulated by the SM protein Vps45p. It forms a complex with syntaxin 6 (Qc), Vti1a (Qb) and VAMP4 (R-SNARE) and is involved in the regulation of recycling of early endosomes to the trans-Golgi network (TGN). Syntaxin 16 is a member of the Qa subgroup of SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins, which consist of coiled-coil helices (called SNARE motifs) that mediate the interactions between SNARE proteins, and a transmembrane domain. The SNARE complexes mediate membrane fusion, important for trafficking of newly synthesized proteins, recycling of pre-existing proteins and organelle formation. SNARE proteins are classified into four groups, Qa-, Qb-, Qc- and R-SNAREs, depending on whether the residue in the hydrophilic center layer of the four-helical bundle is a glutamine (Q) or arginine (R). Qa-, as well as Qb- and Qc-SNAREs, are localized to target organelle membranes, while R-SNARE is localized to vesicle membranes. They form unique complexes consisting of one member of each subgroup, that mediate fusion between a specific type of vesicles and their target organelle. — an NCBI CDD conserved domain (cd15845); members share this curated model.
