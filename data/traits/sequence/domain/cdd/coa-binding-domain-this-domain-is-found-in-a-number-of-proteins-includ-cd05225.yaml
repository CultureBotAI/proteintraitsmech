identifier: CDD:cd05225
label: "CoA binding domain. This domain is found in a number of proteins including succinyl CoA synthetases, malate and ATP-citrate ligases. It has a Rossmann fold that binds the ADP component of CoA. Succinyl-CoA synthase (SCS) catalyzes the conversion of  succinyl-CoA +  Pi + NDP to succinate + CoA + NTP. The functional  unit is a dimer (E. coli SCS forms 2 catalytically indpendent dimers in a tetramer) with each subunit having an alpha, CoA-binding domain in a Rossmann fold and a beta subunit that confers nucleotide specificity."
definition: >-
  CoA binding domain. This domain is found in a number of proteins including succinyl CoA synthetases, malate and ATP-citrate ligases. It has a Rossmann fold that binds the ADP component of CoA. Succinyl-CoA synthase (SCS) catalyzes the conversion of succinyl-CoA + Pi + NDP to succinate + CoA + NTP. The functional unit is a dimer (E. coli SCS forms 2 catalytically indpendent dimers in a tetramer) with each subunit having an alpha, CoA-binding domain in a Rossmann fold and a beta subunit that confers nucleotide specificity. — an NCBI CDD conserved domain (cd05225); members share this curated model.
