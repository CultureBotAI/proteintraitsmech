identifier: CDD:cd09817
label: "Linoleate (8R)-dioxygenase and related enzymes. These fungal enzymes, related to animal heme peroxidases, catalyze the oxygenation of linoleate and similar targets. Linoleate (8R)-dioxygenase, also called linoleate:oxygen 7S,8S-oxidoreductase, generates (9Z,12Z)-(7S,8S)-dihydroxyoctadeca-9,12-dienoate as a product. Other members are 5,8-linoleate dioxygenase (LDS, ppoA) and linoleate 10R-dioxygenase (ppoC), involved in the biosynthesis of oxylipins."
definition: >-
  Linoleate (8R)-dioxygenase and related enzymes. These fungal enzymes, related to animal heme peroxidases, catalyze the oxygenation of linoleate and similar targets. Linoleate (8R)-dioxygenase, also called linoleate:oxygen 7S,8S-oxidoreductase, generates (9Z,12Z)-(7S,8S)-dihydroxyoctadeca-9,12-dienoate as a product. Other members are 5,8-linoleate dioxygenase (LDS, ppoA) and linoleate 10R-dioxygenase (ppoC), involved in the biosynthesis of oxylipins. — an NCBI CDD conserved domain (cd09817); members share this curated model.
