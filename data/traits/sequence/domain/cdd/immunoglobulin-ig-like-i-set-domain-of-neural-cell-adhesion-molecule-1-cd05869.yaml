identifier: CDD:cd05869
label: "Immunoglobulin (Ig)-like I-set domain of Neural Cell Adhesion Molecule 1 (NCAM-1). The members here are composed of the fourth Ig domain of Neural Cell Adhesion Molecule 1(NCAM-1). NCAM plays important roles in the development and regeneration of the central nervous system, in synaptogenesis and neural migration. NCAM mediates cell-cell and cell-substratum recognition and adhesion via homophilic (NCAM-NCAM) and heterophilic (NCAM-non-NCAM) interactions. NCAM is expressed as three major isoforms having different intracellular extensions. The extracellular portion of NCAM has five N-terminal Ig-like domains and two fibronectin type III domains. The double zipper adhesion complex model for NCAM homophilic binding involves Ig1, Ig2, and Ig3. By this model, Ig1 and Ig2 mediate dimerization of NCAM molecules situated on the same cell surface (cis interactions), and Ig3 domains mediate interactions between NCAM molecules expressed on the surface of opposing cells (trans interactions), through binding to the Ig1 and Ig2 domains. The adhesive ability of NCAM is modulated by the addition of polysialic acid chains to the fifth Ig-like domain. One of the unique features of I-set domains is the lack of a C\" strand. The structures of this group show that the Ig domain lacks this strand and thus is a member of the I-set of Ig domains."
definition: >-
  Immunoglobulin (Ig)-like I-set domain of Neural Cell Adhesion Molecule 1 (NCAM-1). The members here are composed of the fourth Ig domain of Neural Cell Adhesion Molecule 1(NCAM-1). NCAM plays important roles in the development and regeneration of the central nervous system, in synaptogenesis and neural migration. NCAM mediates cell-cell and cell-substratum recognition and adhesion via homophilic (NCAM-NCAM) and heterophilic (NCAM-non-NCAM) interactions. NCAM is expressed as three major isoforms having different intracellular extensions. The extracellular portion of NCAM has five N-terminal Ig-like domains and two fibronectin type III domains. The double zipper adhesion complex model for NCAM homophilic binding involves Ig1, Ig2, and Ig3. By this model, Ig1 and Ig2 mediate dimerization of NCAM molecules situated on the same cell surface (cis interactions), and Ig3 domains mediate interactions between NCAM molecules expressed on the surface of opposing cells (trans interactions), through binding to the Ig1 and Ig2 domains. The adhesive ability of NCAM is modulated by the addition of polysialic acid chains to the fifth Ig-like domain. One of the unique features of I-set domains is the lack of a C" strand. The structures of this group show that the Ig domain lacks this strand and thus is a member of the I-set of Ig domains. — an NCBI CDD conserved domain (cd05869); members share this curated model.
