identifier: CDD:cd24116
label: "nucleotide-binding domain (NBD) of Escherichia coli exopolyphosphatase (EcPPX) and similar proteins. EcPPX (EC 3.6.1.11), also called exopolyPase, or metaphosphatase, mediates the metabolism of cellular inorganic polyphosphate (polyP). It catalyzes degradation of polyP and releases orthophosphate processively from the ends of the polyP chain. It has a strong preference for long-chain polyphosphates and has only weak affinity for smaller size polyP of about 15 residues. Unlike other PPX/GppA family members containing one PPX/GppA homolog, E. coli possesses two homologs, EcGppA and EcPPX, which are indistinguishable in their domain arrangement."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli exopolyphosphatase (EcPPX) and similar proteins. EcPPX (EC 3.6.1.11), also called exopolyPase, or metaphosphatase, mediates the metabolism of cellular inorganic polyphosphate (polyP). It catalyzes degradation of polyP and releases orthophosphate processively from the ends of the polyP chain. It has a strong preference for long-chain polyphosphates and has only weak affinity for smaller size polyP of about 15 residues. Unlike other PPX/GppA family members containing one PPX/GppA homolog, E. coli possesses two homologs, EcGppA and EcPPX, which are indistinguishable in their domain arrangement. — an NCBI CDD conserved domain (cd24116); members share this curated model.
