identifier: CDD:cd08026
label: "Cysteine-rich 4 helical bundle widely conserved in bacteria. This functionally uncharacterized protein forms a 4-helical bundle with a bromodomain-like topology. It is present in major bacterial lineages and contains highly conserved cysteines in a repeated pattern, whose sidechains appear buried. Some family members have been (mis)annotated as putative ferredoxins."
definition: >-
  Cysteine-rich 4 helical bundle widely conserved in bacteria. This functionally uncharacterized protein forms a 4-helical bundle with a bromodomain-like topology. It is present in major bacterial lineages and contains highly conserved cysteines in a repeated pattern, whose sidechains appear buried. Some family members have been (mis)annotated as putative ferredoxins. — an NCBI CDD conserved domain (cd08026); members share this curated model.
