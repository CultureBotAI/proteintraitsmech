identifier: CDD:cd15745
label: "FYVE-related domain found in RUN and FYVE domain-containing protein 4 (RUFY4) and similar proteins. RUFY4 belongs to the FUFY protein family which is characterized by the presence of an N-terminal RUN domain and a C-terminal FYVE domain. The FYVE domain of RUFY4 resembles the FYVE-related domain as it lacks the WxxD motif (x for any residue). The biological function of RUFY4 still remains unclear."
definition: >-
  FYVE-related domain found in RUN and FYVE domain-containing protein 4 (RUFY4) and similar proteins. RUFY4 belongs to the FUFY protein family which is characterized by the presence of an N-terminal RUN domain and a C-terminal FYVE domain. The FYVE domain of RUFY4 resembles the FYVE-related domain as it lacks the WxxD motif (x for any residue). The biological function of RUFY4 still remains unclear. — an NCBI CDD conserved domain (cd15745); members share this curated model.
