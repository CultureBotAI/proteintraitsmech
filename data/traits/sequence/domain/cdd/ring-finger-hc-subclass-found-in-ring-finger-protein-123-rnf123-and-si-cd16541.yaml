identifier: CDD:cd16541
label: "RING finger, HC subclass, found in RING finger protein 123 (RNF123) and similar proteins. RNF123, also known as Kip1 ubiquitination-promoting complex protein 1 (KPC1), is an E3 ubiquitin-protein ligase that mediates ubiquitination and proteasomal processing of the nuclear factor-kappaB 1 (NF-kappaB1) precursor p105 to the p50 active subunit that restricts tumor growth. It also regulates degradation of heterochromatin protein 1alpha (HP1alpha) and 1beta (HP1beta) in lamin A/C knock-down cells. Moreover, RNF123, together with Kip1 ubiquitylation-promoting complex 2 (KPC2), forms the Kip1 ubiquitination-promoting complex (KPC), acting as a cytoplasmic ubiquitin ligase that regulates degradation of the cyclin-dependent kinase inhibitor p27 (Kip1) at the G1 phase of the cell cycle. RNF123 may also function as a clinically relevant, peripheral state marker of depression. RNF123 contains a C3HC4-type RING-HC finger at the C-terminus."
definition: >-
  RING finger, HC subclass, found in RING finger protein 123 (RNF123) and similar proteins. RNF123, also known as Kip1 ubiquitination-promoting complex protein 1 (KPC1), is an E3 ubiquitin-protein ligase that mediates ubiquitination and proteasomal processing of the nuclear factor-kappaB 1 (NF-kappaB1) precursor p105 to the p50 active subunit that restricts tumor growth. It also regulates degradation of heterochromatin protein 1alpha (HP1alpha) and 1beta (HP1beta) in lamin A/C knock-down cells. Moreover, RNF123, together with Kip1 ubiquitylation-promoting complex 2 (KPC2), forms the Kip1 ubiquitination-promoting complex (KPC), acting as a cytoplasmic ubiquitin ligase that regulates degradation of the cyclin-dependent kinase inhibitor p27 (Kip1) at the G1 phase of the cell cycle. RNF123 may also function as a clinically relevant, peripheral state marker of depression. RNF123 contains a C3HC4-type RING-HC finger at the C-terminus. — an NCBI CDD conserved domain (cd16541); members share this curated model.
