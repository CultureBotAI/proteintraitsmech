identifier: CDD:cd11620
label: "Second Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of fungal Protein Kinase C-like proteins. This subfamily is composed of fungal PKC-like proteins including Pkc1p from Saccharomyces cerevisiae, and Pck1p and Pck2p from Schizosaccharomyces pombe. The yeast PKC-like proteins play a critical role in regulating cell wall biosynthesis and maintaining cell wall integrity. They contain two HR1 domains, C2 and C1 domains, and a kinase domain. This model characterizes the second HR1 domain. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family. The HR1 domains of Pck1p and Pck2p interact with GTP-bound Rho1p and Rho2p."
definition: >-
  Second Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of fungal Protein Kinase C-like proteins. This subfamily is composed of fungal PKC-like proteins including Pkc1p from Saccharomyces cerevisiae, and Pck1p and Pck2p from Schizosaccharomyces pombe. The yeast PKC-like proteins play a critical role in regulating cell wall biosynthesis and maintaining cell wall integrity. They contain two HR1 domains, C2 and C1 domains, and a kinase domain. This model characterizes the second HR1 domain. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family. The HR1 domains of Pck1p and Pck2p interact with GTP-bound Rho1p and Rho2p. — an NCBI CDD conserved domain (cd11620); members share this curated model.
