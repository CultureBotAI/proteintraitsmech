identifier: CDD:cd03568
label: "VHS (Vps27/Hrs/STAM) domain of the STAM (Signal Transducing Adaptor Molecule) subfamily. STAM (Signal Transducing Adaptor Molecule) subfamily members have at their N-termini a VHS domain, which is involved in cytokine-mediated intracellular signal transduction and has a superhelical structure similar to the structure of ARM (Armadillo) repeats, followed by a Ubiquitin-Interacting Motif (UIM) and a SH3 (Src Homology 3) domain, which is a well-established protein-protein interaction domain, and a GAT (GGA and TOM) domain. At the C-termini of most vertebrate STAMs, an Immunoreceptor Tyrosine-based Activation Motif (ITAM) is present, which mediates the binding of HRS (hepatocyte growth factor-regulated tyrosine kinase substrate) in endocytic and exocytic machineries. STAM is a component of the ESCRT (Endosomal Sorting Complex Required for Transport)-0 machinery and together with Hrs, functions to bind and sequester cargoes for downstream sorting into intralumenal vesicles. Jawed vertebrates have two STAM subfamily members, STAM1 and STAM2."
definition: >-
  VHS (Vps27/Hrs/STAM) domain of the STAM (Signal Transducing Adaptor Molecule) subfamily. STAM (Signal Transducing Adaptor Molecule) subfamily members have at their N-termini a VHS domain, which is involved in cytokine-mediated intracellular signal transduction and has a superhelical structure similar to the structure of ARM (Armadillo) repeats, followed by a Ubiquitin-Interacting Motif (UIM) and a SH3 (Src Homology 3) domain, which is a well-established protein-protein interaction domain, and a GAT (GGA and TOM) domain. At the C-termini of most vertebrate STAMs, an Immunoreceptor Tyrosine-based Activation Motif (ITAM) is present, which mediates the binding of HRS (hepatocyte growth factor-regulated tyrosine kinase substrate) in endocytic and exocytic machineries. STAM is a component of the ESCRT (Endosomal Sorting Complex Required for Transport)-0 machinery and together with Hrs, functions to bind and sequester cargoes for downstream sorting into intralumenal vesicles. Jawed vertebrates have two STAM subfamily members, STAM1 and STAM2. — an NCBI CDD conserved domain (cd03568); members share this curated model.
