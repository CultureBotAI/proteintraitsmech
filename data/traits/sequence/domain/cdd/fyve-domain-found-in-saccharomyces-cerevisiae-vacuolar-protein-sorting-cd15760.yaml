identifier: CDD:cd15760
label: "FYVE domain found in Saccharomyces cerevisiae vacuolar protein sorting-associated protein 27 (scVps27p) and similar proteins. scVps27p, also termed Golgi retention defective protein 11, is the putative yeast counterpart of the mammalian protein Hrs and is involved in endosome maturation. It is a mono-ubiquitin-binding protein that interacts with ubiquitinated cargoes, such as Hse1p, and is required for protein sorting into the multivesicular body. Vps27p forms a complex with Hse1p. The complex binds ubiquitin and mediates endosomal protein sorting. At the endosome, Vps27p and a trimeric protein complex, ESCRT-1, bind ubiquitin and are important for multivesicular body (MVB) sorting. Vps27p contains an N-terminal VHS (Vps27/Hrs/STAM) domain, a FYVE domain that binds PtdIns3P, followed by two ubiquitin-interacting motifs (UIMs), and a C-terminal clathrin-binding motif."
definition: >-
  FYVE domain found in Saccharomyces cerevisiae vacuolar protein sorting-associated protein 27 (scVps27p) and similar proteins. scVps27p, also termed Golgi retention defective protein 11, is the putative yeast counterpart of the mammalian protein Hrs and is involved in endosome maturation. It is a mono-ubiquitin-binding protein that interacts with ubiquitinated cargoes, such as Hse1p, and is required for protein sorting into the multivesicular body. Vps27p forms a complex with Hse1p. The complex binds ubiquitin and mediates endosomal protein sorting. At the endosome, Vps27p and a trimeric protein complex, ESCRT-1, bind ubiquitin and are important for multivesicular body (MVB) sorting. Vps27p contains an N-terminal VHS (Vps27/Hrs/STAM) domain, a FYVE domain that binds PtdIns3P, followed by two ubiquitin-interacting motifs (UIMs), and a C-terminal clathrin-binding motif. — an NCBI CDD conserved domain (cd15760); members share this curated model.
