identifier: CDD:cd18296
label: "second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Ankyrin repeat and BTB/POZ domain-containing protein 1 (ABTB1). ABTB1, also called elongation factor 1A-binding protein or bood POZ containing gene type 1 (BPOZ-1), is an anti-proliferative factor that may act as a mediator of the phosphatase and tensin homolog (PTEN) growth-suppressive signaling pathway. It may play a role in developmental processes. ABTB1 contains an ankyrin repeat and two BTB domains. This model corresponds to the second BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Ankyrin repeat and BTB/POZ domain-containing protein 1 (ABTB1). ABTB1, also called elongation factor 1A-binding protein or bood POZ containing gene type 1 (BPOZ-1), is an anti-proliferative factor that may act as a mediator of the phosphatase and tensin homolog (PTEN) growth-suppressive signaling pathway. It may play a role in developmental processes. ABTB1 contains an ankyrin repeat and two BTB domains. This model corresponds to the second BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18296); members share this curated model.
