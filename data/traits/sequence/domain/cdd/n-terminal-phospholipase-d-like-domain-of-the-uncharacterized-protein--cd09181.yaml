identifier: CDD:cd09181
label: "N-terminal phospholipase D-like domain of the uncharacterized protein, Family with sequence similarity 83A. N-terminal phospholipase D (PLD)-like domain of the uncharacterized protein, Family with sequence similarity 83A (FAM83A), also known as tumor antigen BJ-TSA-9. FAM83A or BJ-TSA-9 is a novel tumor-specific gene highly expressed in human lung adenocarcinoma. Due to this specific expression pattern, it may serve as a biomarker for lung cancer, especially in the early detection of micrometastasis for lung adenocarcinoma patients. Since the N-terminal PLD-like domain of FAM83 proteins shows only trace similarity to the PLD catalytic domain and lacks the functionally important histidine residue, FAM83 proteins may share a similar three-dimensional fold with PLD enzymes, but are most unlikely to carry PLD activity."
definition: >-
