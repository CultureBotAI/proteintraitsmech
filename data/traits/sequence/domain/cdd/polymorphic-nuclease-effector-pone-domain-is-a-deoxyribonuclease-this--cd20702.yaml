identifier: CDD:cd20702
label: "Polymorphic Nuclease effector (PoNe) domain is a deoxyribonuclease. This family contains the DNase toxin domain called PoNe (Polymorphic Nuclease effector), which belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. The PoNe domain co-occurs with a variety of N-terminal domains such as filamentous hemagglutinin, nuclease, HINT, DUFs, PAAR, RHS repeat, or LXG domains. Some members of this family also co-occur with the FIX (Found in type sIX effector) domain of unknown function, as identified by Jana et al., who have also identified this PoNe domain."
definition: >-
  Polymorphic Nuclease effector (PoNe) domain is a deoxyribonuclease. This family contains the DNase toxin domain called PoNe (Polymorphic Nuclease effector), which belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. The PoNe domain co-occurs with a variety of N-terminal domains such as filamentous hemagglutinin, nuclease, HINT, DUFs, PAAR, RHS repeat, or LXG domains. Some members of this family also co-occur with the FIX (Found in type sIX effector) domain of unknown function, as identified by Jana et al., who have also identified this PoNe domain. — an NCBI CDD conserved domain (cd20702); members share this curated model.
