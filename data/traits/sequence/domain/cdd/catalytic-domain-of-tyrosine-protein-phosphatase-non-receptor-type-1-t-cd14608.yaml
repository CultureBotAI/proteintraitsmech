identifier: CDD:cd14608
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 1. Tyrosine-protein phosphatase non-receptor type 1 (PTPN1), also called protein-tyrosine phosphatase 1B (PTP-1B), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN1/PTP-1B is the first PTP to be purified and characterized and is the prototypical intracellular PTP found in a wide variety of human tissues. It contains an N-terminal catalytic PTP domain, followed by two tandem proline-rich motifs that mediate interaction with SH3-domain-containing proteins, and a small  hydrophobic stretch that localizes the enzyme to the endoplasmic reticulum (ER). It dephosphorylates and regulates the activity of a number of receptor tyrosine kinases, including the insulin receptor, the EGF receptor, and the PDGF receptor."
definition: >-
  catalytic domain of tyrosine-protein phosphatase non-receptor type 1. Tyrosine-protein phosphatase non-receptor type 1 (PTPN1), also called protein-tyrosine phosphatase 1B (PTP-1B), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN1/PTP-1B is the first PTP to be purified and characterized and is the prototypical intracellular PTP found in a wide variety of human tissues. It contains an N-terminal catalytic PTP domain, followed by two tandem proline-rich motifs that mediate interaction with SH3-domain-containing proteins, and a small hydrophobic stretch that localizes the enzyme to the endoplasmic reticulum (ER). It dephosphorylates and regulates the activity of a number of receptor tyrosine kinases, including the insulin receptor, the EGF receptor, and the PDGF receptor. — an NCBI CDD conserved domain (cd14608); members share this curated model.
