identifier: CDD:cd08392
label: "C2 domain first repeat present in Synaptotagmin-like protein 3. All Slp members basically share an N-terminal Slp homology domain (SHD) and C-terminal tandem C2 domains (named the C2A domain and the C2B domain) with the SHD and C2 domains being separated by a linker sequence of various length. SHD of Slp (except for the Slp4-SHD) function as a specific Rab27A/B-binding domain.  In addition to Slp, rabphilin, Noc2, and  Munc13-4 also function as Rab27-binding proteins. Little is known about the expression or localization of Slp3.  The C2A domain of Slp3 is Ca2+ dependent.  It has been demonstrated that Slp3 promotes dense-core vesicle exocytosis.  C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins.  Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1.  However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain.  C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions.  This cd contains the first C2 repeat, C2A, and has a type-I topology."
definition: >-
  C2 domain first repeat present in Synaptotagmin-like protein 3. All Slp members basically share an N-terminal Slp homology domain (SHD) and C-terminal tandem C2 domains (named the C2A domain and the C2B domain) with the SHD and C2 domains being separated by a linker sequence of various length. SHD of Slp (except for the Slp4-SHD) function as a specific Rab27A/B-binding domain. In addition to Slp, rabphilin, Noc2, and Munc13-4 also function as Rab27-binding proteins. Little is known about the expression or localization of Slp3. The C2A domain of Slp3 is Ca2+ dependent. It has been demonstrated that Slp3 promotes dense-core vesicle exocytosis. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. This cd contains the first C2 repeat, C2A, and has a type-I topology. — an NCBI CDD conserved domain (cd08392); members share this curated model.
