identifier: CDD:cd24067
label: "nucleotide-binding domain (NBD) of Bacillus subtilis fructokinase (FRK) and similar proteins. Bacillus subtilis FRK (EC 2.7.1.4), also called glucomannan utilization protein E, catalyzes the phosphorylation of fructose to fructose-6-P. It seems to be involved in the degradation of glucomannan. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities."
definition: >-
  nucleotide-binding domain (NBD) of Bacillus subtilis fructokinase (FRK) and similar proteins. Bacillus subtilis FRK (EC 2.7.1.4), also called glucomannan utilization protein E, catalyzes the phosphorylation of fructose to fructose-6-P. It seems to be involved in the degradation of glucomannan. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. — an NCBI CDD conserved domain (cd24067); members share this curated model.
