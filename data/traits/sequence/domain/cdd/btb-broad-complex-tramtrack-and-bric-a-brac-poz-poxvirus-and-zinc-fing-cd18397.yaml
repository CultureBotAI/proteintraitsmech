identifier: CDD:cd18397
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 12 (KCTD12). KCTD12, also called predominantly fetal expressed T1 domain (Pfetin), is a BTB/POZ domain-containing protein that is an auxiliary subunit of GABAB receptors associated with mood disorders. It regulates agonist potency and kinetics of GABAB receptor signaling. It promotes tumorigenesis by facilitating CDC25B/CDK1/Aurora A-dependent G2/M transition. It also regulates colorectal cancer cell stemness through the ERK pathway. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 12 (KCTD12). KCTD12, also called predominantly fetal expressed T1 domain (Pfetin), is a BTB/POZ domain-containing protein that is an auxiliary subunit of GABAB receptors associated with mood disorders. It regulates agonist potency and kinetics of GABAB receptor signaling. It promotes tumorigenesis by facilitating CDC25B/CDK1/Aurora A-dependent G2/M transition. It also regulates colorectal cancer cell stemness through the ERK pathway. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18397); members share this curated model.
