identifier: CDD:cd21114
label: "NAC domain. This family contains the NAC domain, named after the nascent polypeptide-associated complex (NAC) whose subunits contain NAC domains. In eukaryotes, the NAC complex, which plays an important role in co-translational targeting of nascent polypeptides to endoplasmic reticulum (ER), consists of 2 subunits: NAC alpha and a shortened splice variant of the basal transcription factor 3 (BTF3; also called BTF3b or NAC beta). The full length BTF3a protein excites transcription."
definition: >-
  NAC domain. This family contains the NAC domain, named after the nascent polypeptide-associated complex (NAC) whose subunits contain NAC domains. In eukaryotes, the NAC complex, which plays an important role in co-translational targeting of nascent polypeptides to endoplasmic reticulum (ER), consists of 2 subunits: NAC alpha and a shortened splice variant of the basal transcription factor 3 (BTF3; also called BTF3b or NAC beta). The full length BTF3a protein excites transcription. — an NCBI CDD conserved domain (cd21114); members share this curated model.
