identifier: CDD:cd23613
label: "extracellular domain (ECD) found in bone morphogenetic protein receptor type-1B (BMPR-1B) and similar proteins. BMPR-1B (EC 2.7.11.30, also called BMP type-1B receptor, or CDw293, or activin receptor-like kinase 6 (ALK-6)) on ligand binding forms a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. BMPR-1B is the receptor for BMP7/OP-1 and GDF5. It positively regulates chondrocyte differentiation through GDF5 interaction. This model corresponds to extracellular domain (ECD) of BMPR-1B, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in bone morphogenetic protein receptor type-1B (BMPR-1B) and similar proteins. BMPR-1B (EC 2.7.11.30, also called BMP type-1B receptor, or CDw293, or activin receptor-like kinase 6 (ALK-6)) on ligand binding forms a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. BMPR-1B is the receptor for BMP7/OP-1 and GDF5. It positively regulates chondrocyte differentiation through GDF5 interaction. This model corresponds to extracellular domain (ECD) of BMPR-1B, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23613); members share this curated model.
