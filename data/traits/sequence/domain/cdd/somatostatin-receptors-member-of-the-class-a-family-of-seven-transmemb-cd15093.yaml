identifier: CDD:cd15093
label: "somatostatin receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. G protein-coupled somatostatin receptors (SSTRs) are composed of five distinct subtypes (SSTR1-5) that display strong sequence similarity with opioid receptors. All five receptor subtypes bind the natural somatostatin (somatotropin release inhibiting factor), a polypeptide hormone that regulates a wide variety of physiological functions such as neurotransmission, cell proliferation, contractility of smooth muscle cells, and endocrine signaling as well as inhibition of the release of many secondary hormones. They share common signaling cascades such as inhibition of adenylyl cyclase, activation of phosphotyrosine phosphatase activity, and G-protein-dependent regulation of MAPKs."
definition: >-
  somatostatin receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. G protein-coupled somatostatin receptors (SSTRs) are composed of five distinct subtypes (SSTR1-5) that display strong sequence similarity with opioid receptors. All five receptor subtypes bind the natural somatostatin (somatotropin release inhibiting factor), a polypeptide hormone that regulates a wide variety of physiological functions such as neurotransmission, cell proliferation, contractility of smooth muscle cells, and endocrine signaling as well as inhibition of the release of many secondary hormones. They share common signaling cascades such as inhibition of adenylyl cyclase, activation of phosphotyrosine phosphatase activity, and G-protein-dependent regulation of MAPKs. — an NCBI CDD conserved domain (cd15093); members share this curated model.
