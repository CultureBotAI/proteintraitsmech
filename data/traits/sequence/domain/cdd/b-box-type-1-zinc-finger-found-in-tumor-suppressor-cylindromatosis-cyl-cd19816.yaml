identifier: CDD:cd19816
label: "B-box-type 1 zinc finger found in tumor suppressor cylindromatosis (CYLD) and similar proteins. CYLD, also termed ubiquitin carboxyl-terminal hydrolase CYLD, or deubiquitinating enzyme CYLD, or ubiquitin thioesterase CYLD, or ubiquitin-specific-processing protease CYLD, is a microtubule-associated deubiquitinase that specifically cleaves Lys-63-linked polyubiquitin chains. It plays a pivotal role in a wide range of cellular activities, including innate immunity, cell division, and ciliogenesis. CYLD antagonizes NF-kappaB and JNK signaling by disassembly of Lys63-linked ubiquitin chains synthesized in response to cytokine stimulation. Structural characterization reveals a small zinc-binding B-box inserted within the ubiquitin specific protease (USP) domain of CYLD. The B-box motif shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs) and is responsible for its intermolecular interaction and cytoplasmic localization. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif."
definition: >-
  B-box-type 1 zinc finger found in tumor suppressor cylindromatosis (CYLD) and similar proteins. CYLD, also termed ubiquitin carboxyl-terminal hydrolase CYLD, or deubiquitinating enzyme CYLD, or ubiquitin thioesterase CYLD, or ubiquitin-specific-processing protease CYLD, is a microtubule-associated deubiquitinase that specifically cleaves Lys-63-linked polyubiquitin chains. It plays a pivotal role in a wide range of cellular activities, including innate immunity, cell division, and ciliogenesis. CYLD antagonizes NF-kappaB and JNK signaling by disassembly of Lys63-linked ubiquitin chains synthesized in response to cytokine stimulation. Structural characterization reveals a small zinc-binding B-box inserted within the ubiquitin specific protease (USP) domain of CYLD. The B-box motif shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs) and is responsible for its intermolecular interaction and cytoplasmic localization. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19816); members share this curated model.
