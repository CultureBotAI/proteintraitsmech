identifier: CDD:cd19106
label: "AKR1A family of aldo-keto reductase (AKR). The AKR1A family of AKR includes alcohol dehydrogenase [NADP(+)] (ALR, EC 1.1.1.2) from Homo sapiens (AKR1A1), Sus scrofa (AKR1A2), Rattus norvegicus (liver, AKR1A3), and Mus musculus (AKR1A4). ALR, also known as aldehyde reductase, or ALDR1, catalyzes the NADPH-dependent reduction of a variety of aromatic and aliphatic aldehydes to their corresponding alcohols. In vitro substrates include succinic semialdehyde, 4-nitrobenzaldehyde, 1,2-naphthoquinone, methylglyoxal, and D-glucuronic acid."
definition: >-
  AKR1A family of aldo-keto reductase (AKR). The AKR1A family of AKR includes alcohol dehydrogenase [NADP(+)] (ALR, EC 1.1.1.2) from Homo sapiens (AKR1A1), Sus scrofa (AKR1A2), Rattus norvegicus (liver, AKR1A3), and Mus musculus (AKR1A4). ALR, also known as aldehyde reductase, or ALDR1, catalyzes the NADPH-dependent reduction of a variety of aromatic and aliphatic aldehydes to their corresponding alcohols. In vitro substrates include succinic semialdehyde, 4-nitrobenzaldehyde, 1,2-naphthoquinone, methylglyoxal, and D-glucuronic acid. — an NCBI CDD conserved domain (cd19106); members share this curated model.
