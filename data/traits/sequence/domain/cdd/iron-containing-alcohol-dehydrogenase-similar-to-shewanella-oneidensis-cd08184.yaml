identifier: CDD:cd08184
label: "Iron-containing alcohol dehydrogenase similar to Shewanella oneidensis KdnB required for Kdo8N biosynthesis. This family contains iron-containing alcohol dehydrogenase-like proteins, many of which have not been characterized. Their specific function is unknown. The protein structure represents a dehydroquinate synthase-like fold and belongs to the iron-containing alcohol dehydrogenase-like superfamily. It is distinct from other alcohol dehydrogenases which contain different protein domains. Alcohol dehydrogenase catalyzes the reduction of acetaldehyde to alcohol with NADP as cofactor. Its activity requires iron or zinc ions. This family also includes Shewanella oneidensis KdnB which is required for biosynthesis of 8-Amino-3,8-dideoxy-D-manno-octulosonic acid (Kdo8N), a unique amino sugar that has thus far only been observed on the lipopolysaccharides of marine bacteria belonging to the genus Shewanella, and thought to be important for the integrity of the bacterial cell outer membrane. KdnB requires NAD(P) and zinc ion for activity."
definition: >-
  Iron-containing alcohol dehydrogenase similar to Shewanella oneidensis KdnB required for Kdo8N biosynthesis. This family contains iron-containing alcohol dehydrogenase-like proteins, many of which have not been characterized. Their specific function is unknown. The protein structure represents a dehydroquinate synthase-like fold and belongs to the iron-containing alcohol dehydrogenase-like superfamily. It is distinct from other alcohol dehydrogenases which contain different protein domains. Alcohol dehydrogenase catalyzes the reduction of acetaldehyde to alcohol with NADP as cofactor. Its activity requires iron or zinc ions. This family also includes Shewanella oneidensis KdnB which is required for biosynthesis of 8-Amino-3,8-dideoxy-D-manno-octulosonic acid (Kdo8N), a unique amino sugar that has thus far only been observed on the lipopolysaccharides of marine bacteria belonging to the genus Shewanella, and thought to be important for the integrity of the bacterial cell outer membrane. KdnB requires NAD(P) and zinc ion for activity. — an NCBI CDD conserved domain (cd08184); members share this curated model.
