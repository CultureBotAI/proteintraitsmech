identifier: CDD:cd21389
label: "non-canonical GAT domain found in signal transducing adapter molecule 1 (STAM-1) and similar proteins. STAM-1 is involved in intracellular signal transduction mediated by cytokines and growth factors. It may also play a role in T-cell development. STAM-1 is a component of the ESCRT-0 complex that binds ubiquitin and acts as sorting machinery that recognizes ubiquitinated receptors and transfers them for further sequential lysosomal sorting/trafficking processes. Members of this subfamily contain a non-canonical GAT (GGA and Tom1) domain consisting of two helices. A canonical GAT domain is a monomeric three-helix bundle that bind to ubiquitin. STAM-1, together with another GAT domain-containing protein Hrs, forms a Hrs/STAM1 core complex that consists of two intertwined GAT domains, each consisting of two helices from one subunit, and one from the other subunit. The two GAT domains are connected by a two-stranded coiled-coil. The Hrs/STAM1 complex, an intertwined GAT heterodimer, is a scaffold for binding of ubiquitinated cargo proteins and coordinating ubiquitination and deubiquitination reactions that regulate sorting."
definition: >-
  non-canonical GAT domain found in signal transducing adapter molecule 1 (STAM-1) and similar proteins. STAM-1 is involved in intracellular signal transduction mediated by cytokines and growth factors. It may also play a role in T-cell development. STAM-1 is a component of the ESCRT-0 complex that binds ubiquitin and acts as sorting machinery that recognizes ubiquitinated receptors and transfers them for further sequential lysosomal sorting/trafficking processes. Members of this subfamily contain a non-canonical GAT (GGA and Tom1) domain consisting of two helices. A canonical GAT domain is a monomeric three-helix bundle that bind to ubiquitin. STAM-1, together with another GAT domain-containing protein Hrs, forms a Hrs/STAM1 core complex that consists of two intertwined GAT domains, each consisting of two helices from one subunit, and one from the other subunit. The two GAT domains are connected by a two-stranded coiled-coil. The Hrs/STAM1 complex, an intertwined GAT heterodimer, is a scaffold for binding of ubiquitinated cargo proteins and coordinating ubiquitination and deubiquitination reactions that regulate sorting. — an NCBI CDD conserved domain (cd21389); members share this curated model.
