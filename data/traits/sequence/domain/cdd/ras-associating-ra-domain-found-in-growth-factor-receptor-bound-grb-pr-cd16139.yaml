identifier: CDD:cd16139
label: "Ras-associating (RA) domain found in growth factor receptor-bound (Grb) protein 14. Grb14, a member of cytoplasmic adaptor proteins, is a tissue-specific negative regulator of insulin signaling. RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub). Ubi is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. A novel function of Grb14 RA domain is to interact with the nucleotide binding pocket of a cyclic nucleotide gated channel alpha subunit (CNGA1) and inhibits its activity. Grb7 and its related family members Grb10 and Grb14 share a conserved domain architecture that includes an amino-terminal proline-rich region, a central segment termed the GM region (for Grb and Mig) which includes the RA, PIR, and PH domains, and a carboxyl-terminal SH2 domain.  Grb7/10/14 family proteins are phosphorylated on serine/threonine as well as tyrosine residues and are mainly localized to the cytoplasm."
definition: >-
  Ras-associating (RA) domain found in growth factor receptor-bound (Grb) protein 14. Grb14, a member of cytoplasmic adaptor proteins, is a tissue-specific negative regulator of insulin signaling. RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub). Ubi is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. A novel function of Grb14 RA domain is to interact with the nucleotide binding pocket of a cyclic nucleotide gated channel alpha subunit (CNGA1) and inhibits its activity. Grb7 and its related family members Grb10 and Grb14 share a conserved domain architecture that includes an amino-terminal proline-rich region, a central segment termed the GM region (for Grb and Mig) which includes the RA, PIR, and PH domains, and a carboxyl-terminal SH2 domain. Grb7/10/14 family proteins are phosphorylated on serine/threonine as well as tyrosine residues and are mainly localized to the cytoplasm. — an NCBI CDD conserved domain (cd16139); members share this curated model.
