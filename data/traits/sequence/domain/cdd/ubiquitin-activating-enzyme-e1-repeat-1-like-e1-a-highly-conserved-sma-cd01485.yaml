identifier: CDD:cd01485
label: "Ubiquitin activating enzyme (E1), repeat 1-like. E1, a highly conserved small protein present universally in eukaryotic cells, is part of cascade to attach ubiquitin (Ub) covalently to substrate proteins. This cascade consists of activating (E1), conjugating (E2), and/or ligating (E3) enzymes and then targets them for degradation by the 26S proteasome. E1 activates ubiquitin by C-terminal adenylation, and subsequently forms a highly reactive thioester bond between its catalytic cysteine and ubiquitin's C-terminus. The E1 also associates with E2 and promotes ubiquitin transfer to the E2's catalytic cysteine. A set of novel molecules with a structural similarity to Ub, called Ub-like proteins (Ubls), have similar conjugation cascades. In contrast to ubiquitin-E1, which is a single-chain protein with a weakly conserved two-fold repeat, many of the Ubls-E1are a heterodimer where each subunit corresponds to one half of a single-chain E1. This CD represents the family homologous to the first repeat of Ub-E1."
definition: >-
  Ubiquitin activating enzyme (E1), repeat 1-like. E1, a highly conserved small protein present universally in eukaryotic cells, is part of cascade to attach ubiquitin (Ub) covalently to substrate proteins. This cascade consists of activating (E1), conjugating (E2), and/or ligating (E3) enzymes and then targets them for degradation by the 26S proteasome. E1 activates ubiquitin by C-terminal adenylation, and subsequently forms a highly reactive thioester bond between its catalytic cysteine and ubiquitin's C-terminus. The E1 also associates with E2 and promotes ubiquitin transfer to the E2's catalytic cysteine. A set of novel molecules with a structural similarity to Ub, called Ub-like proteins (Ubls), have similar conjugation cascades. In contrast to ubiquitin-E1, which is a single-chain protein with a weakly conserved two-fold repeat, many of the Ubls-E1are a heterodimer where each subunit corresponds to one half of a single-chain E1. This CD represents the family homologous to the first repeat of Ub-E1. — an NCBI CDD conserved domain (cd01485); members share this curated model.
