identifier: CDD:cd00236
label: "FinO bacterial conjugation repressor domain;  the basic protein FinO is part of the the two component FinOP system which is responsible for repressing bacterial conjugation; the FinOP system represses the transfer (tra) operon of the F-plasmid which encodes the proteins responsible for conjugative transfer of this plasmid from host to recipient Escherichia coli cells; antisense RNA, FinP is thought to interact with traJ mRNA to occlude its ribosome binding site, blocking traJ translation and thereby inhibiting transcription of the tra operon; FinO protects FinP against degradation by binding to FinP and sterically blocking the cellular endonuclease RNase E; FinO also also binds to the complementary stem-loop structures in traJ mRNA and promotes duplex formation between FinP and traJ RNA in vitro;  this domain contains two independent RNA binding regions"
definition: >-
  FinO bacterial conjugation repressor domain; the basic protein FinO is part of the the two component FinOP system which is responsible for repressing bacterial conjugation; the FinOP system represses the transfer (tra) operon of the F-plasmid which encodes the proteins responsible for conjugative transfer of this plasmid from host to recipient Escherichia coli cells; antisense RNA, FinP is thought to interact with traJ mRNA to occlude its ribosome binding site, blocking traJ translation and thereby inhibiting transcription of the tra operon; FinO protects FinP against degradation by binding to FinP and sterically blocking the cellular endonuclease RNase E; FinO also also binds to the complementary stem-loop structures in traJ mRNA and promotes duplex formation between FinP and traJ RNA in vitro; this domain contains two independent RNA binding regions — an NCBI CDD conserved domain (cd00236); members share this curated model.
