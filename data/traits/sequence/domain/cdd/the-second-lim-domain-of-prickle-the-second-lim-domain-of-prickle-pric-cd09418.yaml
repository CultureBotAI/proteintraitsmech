identifier: CDD:cd09418
label: "The second LIM domain of Prickle. The second LIM domain of Prickle: Prickle contains three C-terminal LIM domains and a N-terminal PET domain.  Prickles have been implicated in roles of regulating tissue polarity or planar cell polarity (PCP).  PCP establishment requires the conserved Frizzled/Dishevelled PCP pathway. Prickle interacts with Dishevelled, thereby modulating Frizzled/Dishevelled activity and PCP signaling. Two forms of prickles have been identified; namely prickle 1 and prickle 2. Prickle 1 and prickle 2 are differentially expressed. While prickle 1 is expressed in fetal heart and hematological malignancies, prickle 2 is found in fetal brain, adult cartilage, pancreatic islet, and some types of timorous cells. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The second LIM domain of Prickle. The second LIM domain of Prickle: Prickle contains three C-terminal LIM domains and a N-terminal PET domain. Prickles have been implicated in roles of regulating tissue polarity or planar cell polarity (PCP). PCP establishment requires the conserved Frizzled/Dishevelled PCP pathway. Prickle interacts with Dishevelled, thereby modulating Frizzled/Dishevelled activity and PCP signaling. Two forms of prickles have been identified; namely prickle 1 and prickle 2. Prickle 1 and prickle 2 are differentially expressed. While prickle 1 is expressed in fetal heart and hematological malignancies, prickle 2 is found in fetal brain, adult cartilage, pancreatic islet, and some types of timorous cells. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09418); members share this curated model.
