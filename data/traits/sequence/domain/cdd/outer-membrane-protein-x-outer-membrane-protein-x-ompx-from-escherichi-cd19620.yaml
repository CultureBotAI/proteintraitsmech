label: beta8_ompX
definition: >-
  outer membrane protein X. Outer membrane protein X (OmpX from Escherichia coli belongs to a family of highly conserved bacterial proteins that promote bacterial adhesion to and entry into mammalian cells. They also play a role in the resistance against attack by the human complement system. OmpX is an eight-stranded antiparallel beta barrel with two girdles of aromatic amino acid residues and a ribbon of nonpolar residues that attach to the membrane interior. The core of the barrel is composed of an extended hydrogen-bonding network of highly conserved residues. The loops form a protruding beta sheet, which is thought to bind to external proteins. It is hypothesized that this type of binding promotes cell adhesion and invasion and helps defend against the complement system. Although OmpX has the same beta-sheet topology as the structurally related OmpA, their barrels differ with respect to the shear numbers and internal hydrogen-bonding networks
