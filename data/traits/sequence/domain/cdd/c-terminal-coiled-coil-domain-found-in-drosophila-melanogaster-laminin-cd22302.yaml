identifier: CDD:cd22302
label: "C-terminal coiled-coil domain found in Drosophila melanogaster laminin subunit beta-1 (DmLAMB1) and similar proteins. DmLAMB1, also called LanB1, is a glycoprotein required for nidogen (Ndg) localization to the basement membrane. It is a component of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma). Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration, and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. This model corresponds to the C-terminal coiled-coil domain of DmLAMB1, which may be involved in the integrin binding activity."
definition: >-
  C-terminal coiled-coil domain found in Drosophila melanogaster laminin subunit beta-1 (DmLAMB1) and similar proteins. DmLAMB1, also called LanB1, is a glycoprotein required for nidogen (Ndg) localization to the basement membrane. It is a component of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma). Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration, and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. This model corresponds to the C-terminal coiled-coil domain of DmLAMB1, which may be involved in the integrin binding activity. — an NCBI CDD conserved domain (cd22302); members share this curated model.
