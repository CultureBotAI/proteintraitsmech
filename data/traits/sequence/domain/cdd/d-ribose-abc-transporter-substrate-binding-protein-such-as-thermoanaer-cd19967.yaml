identifier: CDD:cd19967
label: "D-ribose ABC transporter substrate-binding protein such as Thermoanaerobacter tengcongensis ribose binding protein (ttRBP). Periplasmic sugar-binding domain of the thermophilic Thermoanaerobacter tengcongensis ribose binding protein (ttRBP) and its mesophilic homologs. Members of this group are belonging to the type 1 periplasmic binding protein superfamily, whose members are involved in chemotaxis, ATP-binding cassette transport, and intercellular communication in central nervous system. The thermophilic and mesophilic ribose-binding proteins are structurally very similar, but differ substantially in thermal stability."
definition: >-
  D-ribose ABC transporter substrate-binding protein such as Thermoanaerobacter tengcongensis ribose binding protein (ttRBP). Periplasmic sugar-binding domain of the thermophilic Thermoanaerobacter tengcongensis ribose binding protein (ttRBP) and its mesophilic homologs. Members of this group are belonging to the type 1 periplasmic binding protein superfamily, whose members are involved in chemotaxis, ATP-binding cassette transport, and intercellular communication in central nervous system. The thermophilic and mesophilic ribose-binding proteins are structurally very similar, but differ substantially in thermal stability. — an NCBI CDD conserved domain (cd19967); members share this curated model.
