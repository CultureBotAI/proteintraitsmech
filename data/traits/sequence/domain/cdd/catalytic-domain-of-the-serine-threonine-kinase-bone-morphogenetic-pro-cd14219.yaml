  Catalytic domain of the Serine/Threonine Kinase, Bone Morphogenetic Protein Type IB. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. BMPR1b, also called Activin receptor-Like Kinase 6 (ALK6), functions as a receptor for bone morphogenetic proteins (BMPs), which are involved in the regulation of cell proliferation, survival, differentiation, and apoptosis. BMPs are able to induce bone, cartilage, ligament, and tendon formation, and may play roles in bone diseases and tumors. Mutations in BMPR1b that led to inhibition of chondrogenesis can cause Brachydactyly (BD) type A2, a dominant hand malformation characterized by shortening and lateral deviation of the index fingers. A point mutation in the BMPR1b kinase domain is also associated with the Booroola phenotype, characterized by precocious differentiation of ovarian follicles. BMPR1b belongs to a group of receptors for the TGFbeta family of secreted signaling molecules that includes TGFbeta, BMPs, activins, growth and differentiation factors, and anti-Mullerian hormone, among others. These receptors contain an extracellular domain that binds ligands, a single transmembrane (TM) region, and a cytoplasmic catalytic kinase domain. Type I receptors, like BMPR1b, are low-affinity receptors that bind ligands only after they are recruited by the ligand/type II high-affinity receptor complex. Following activation, they start intracellular signaling to the nucleus by phosphorylating SMAD proteins. Type I receptors contain an additional domain located between the TM and kinase domains called the GS domain, which contains the activating phosphorylation site and confers preference for specific SMAD proteins. The BMPR1b subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14219); members share this curated model.
