identifier: CDD:cd17118
label: "ubiquitin-like (Ubl) domain found in homocysteine-inducible endoplasmic reticulum stress protein HERP1 and similar proteins. HERP1, also termed homocysteine-responsive endoplasmic reticulum-resident ubiquitin-like domain member 1 protein (HERPUD1), or methyl methanesulfonate (MMF)-inducible fragment protein 1 (MIF1), is an endoplasmic reticulum (ER) integral membrane protein containing an N-terminal ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold. HERP1 is a component of the ER quality control (ERQC) system, also called ER-associated degradation (ERAD), which is involved in ubiquitin-dependent degradation of misfolded ER proteins. It promotes the degradation of ER-resident Ca2+ channels. It is also involved in ubiquitin ligase HRD1-dependent protein degradation at the ER. Moreover, HERP1 plays a role in regulating the cell cycle, apoptosis and steroid hormone biosynthesis in mouse granulosa cells."
definition: >-
