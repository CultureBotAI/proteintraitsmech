identifier: CDD:cd12907
label: "SPRY domain in the F-box family Fbxo45. Fbxo45 is a novel synaptic E3 and ubiquitin ligase, related to the suppressor of cytokine signaling (SOCS) proteins and located N-terminal to a SPRY (SPla and the ryanodine receptor) domain. Fbxo45 induces the degradation of a synaptic vesicle-priming factor, Munc13-1, via the SPRY domain, thus playing an important role in the regulation of neurotransmission by modulating Munc13-1 at the synapse. F-box motifs are found in proteins that function as the substrate recognition component of SCF E3 complexes."
definition: >-
  SPRY domain in the F-box family Fbxo45. Fbxo45 is a novel synaptic E3 and ubiquitin ligase, related to the suppressor of cytokine signaling (SOCS) proteins and located N-terminal to a SPRY (SPla and the ryanodine receptor) domain. Fbxo45 induces the degradation of a synaptic vesicle-priming factor, Munc13-1, via the SPRY domain, thus playing an important role in the regulation of neurotransmission by modulating Munc13-1 at the synapse. F-box motifs are found in proteins that function as the substrate recognition component of SCF E3 complexes. — an NCBI CDD conserved domain (cd12907); members share this curated model.
