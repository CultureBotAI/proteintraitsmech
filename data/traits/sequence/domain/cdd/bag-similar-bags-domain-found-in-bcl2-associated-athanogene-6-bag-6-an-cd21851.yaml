identifier: CDD:cd21851
label: BAGS_BAG6
definition: >-
  BAG-similar (BAGS) domain found in BCL2-associated athanogene 6 (BAG-6) and similar proteins. BAG-6, also called large proline-rich protein BAG6, or BAG family molecular chaperone regulator 6, or HLA-B-associated transcript 3, or protein G3, or protein Scythe, is an ATP-independent molecular chaperone preventing the aggregation of misfolded and hydrophobic patches-containing proteins. BAG-6 functions as part of a cytosolic protein quality control complex, the BAG6/BAT3 complex, which maintains these client proteins in a soluble state and participates to their proper delivery to the endoplasmic reticulum or alternatively can promote their sorting to the proteasome where they undergo degradation. The model corresponds to the C-terminal heterodimerization domain of BAG-6, which has been called BAG-similar (BAGS) domain responsible for the binding of Ubl4a
