identifier: CDD:cd23796
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 G2 and related proteins. The subfamily includes mammalian ubiquitin-conjugating enzymes E2 G2 (UBE2G2/UBC7), yeast E2 ubiquitin-conjugating enzyme 7 (UBC7) and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. In vitro, UBE2G2 catalyzes 'Lys-48'-linked polyubiquitination. It is involved in endoplasmic reticulum-associated degradation (ERAD) and is required for sterol-induced ubiquitination of 3-hydroxy-3-methylglutaryl coenzyme A reductase and its subsequent proteasomal degradation. UBC7, also called ubiquitin-conjugating enzyme E2-18 kDa, functions in the degradation of misfolded or regulated proteins localized in the endoplasmic reticulum (ER) lumen or membrane via the ubiquitin-proteasome system."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 G2 and related proteins. The subfamily includes mammalian ubiquitin-conjugating enzymes E2 G2 (UBE2G2/UBC7), yeast E2 ubiquitin-conjugating enzyme 7 (UBC7) and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. In vitro, UBE2G2 catalyzes 'Lys-48'-linked polyubiquitination. It is involved in endoplasmic reticulum-associated degradation (ERAD) and is required for sterol-induced ubiquitination of 3-hydroxy-3-methylglutaryl coenzyme A reductase and its subsequent proteasomal degradation. UBC7, also called ubiquitin-conjugating enzyme E2-18 kDa, functions in the degradation of misfolded or regulated proteins localized in the endoplasmic reticulum (ER) lumen or membrane via the ubiquitin-proteasome system. — an NCBI CDD conserved domain (cd23796); members share this curated model.
