identifier: CDD:cd17217
label: "Ras-associating (RA) domain found in Myosin-IXb. Myosin-IXb, also termed myosin-9b (Myo9b), is a motor protein with a Rho GTPase activating domain (RhoGAP); it is an actin-dependent motor protein of the unconventional myosin IX class. It is expressed abundantly in tissues of the immune system, like lymph nodes, thymus, and spleen and in several immune cells including dendritic cells, macrophages and CD4+ T. Myosin-IXb contains a Ras-associating (RA) domain, a motor domain, a protein kinase C conserved region 1 (C1), and a RhoGAP domain. Its RA domain is located at its head domain and has the beta-grasp ubiquitin-like fold with unknown function. Myosin-IXb acts as a motorized signaling molecule that links Rho signaling to the dynamic actin cytoskeleton. It regulates leukocyte migration by controlling RhoA signaling. Myosin-IXb is also involved in the development of autoimmune diseases, including rheumatoid arthritis, systemic lupus erythematosus and type 1 diabetes. Moreover, Myosin-IXb is a ROBO-interacting protein that suppresses RhoA activity in lung cancer cells."
definition: >-
  Ras-associating (RA) domain found in Myosin-IXb. Myosin-IXb, also termed myosin-9b (Myo9b), is a motor protein with a Rho GTPase activating domain (RhoGAP); it is an actin-dependent motor protein of the unconventional myosin IX class. It is expressed abundantly in tissues of the immune system, like lymph nodes, thymus, and spleen and in several immune cells including dendritic cells, macrophages and CD4+ T. Myosin-IXb contains a Ras-associating (RA) domain, a motor domain, a protein kinase C conserved region 1 (C1), and a RhoGAP domain. Its RA domain is located at its head domain and has the beta-grasp ubiquitin-like fold with unknown function. Myosin-IXb acts as a motorized signaling molecule that links Rho signaling to the dynamic actin cytoskeleton. It regulates leukocyte migration by controlling RhoA signaling. Myosin-IXb is also involved in the development of autoimmune diseases, including rheumatoid arthritis, systemic lupus erythematosus and type 1 diabetes. Moreover, Myosin-IXb is a ROBO-interacting protein that suppresses RhoA activity in lung cancer cells. — an NCBI CDD conserved domain (cd17217); members share this curated model.
