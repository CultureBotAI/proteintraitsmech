identifier: CDD:cd10236
label: "nucleotide-binding domain (NBD) of Escherichia coli chaperone protein HscA and similar proteins. Escherichia coli HscA, also called Hsc66, acts as a chaperone involved in the maturation of iron-sulfur cluster-containing proteins. It has a low intrinsic ATPase activity which is markedly stimulated by HscB. It is involved in the maturation of IscU. Members in this subfamily belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly and can direct incompetent \"client\" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs). HscA's partner J-domain protein is HscB; it does not appear to require a NEF and has been shown to be induced by cold-shock. The HscA-HscB chaperone/co-chaperone pair is involved in [Fe-S] cluster assembly."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli chaperone protein HscA and similar proteins. Escherichia coli HscA, also called Hsc66, acts as a chaperone involved in the maturation of iron-sulfur cluster-containing proteins. It has a low intrinsic ATPase activity which is markedly stimulated by HscB. It is involved in the maturation of IscU. Members in this subfamily belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly and can direct incompetent "client" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs). HscA's partner J-domain protein is HscB; it does not appear to require a NEF and has been shown to be induced by cold-shock. The HscA-HscB chaperone/co-chaperone pair is involved in [Fe-S] cluster assembly. — an NCBI CDD conserved domain (cd10236); members share this curated model.
