identifier: CDD:cd18591
label: "Six-transmembrane helical domain 1 (TMD1) of the sulphonylurea receptors SUR1/2. This group represents the six-transmembrane domain 1 (TMD1) of the sulphonylurea receptors SUR1/2 (ABCC8), which function as a modulator of ATP-sensitive potassium channels and insulin release, and they belong to the ABCC subfamily. The ATP-sensitive (K-ATP) channel is an octameric complex of four pore-forming Kir6.2 subunits and four regulatory SUR subunits. Thus, in contrast to other ABC transporters, the SUR serves as the regulatory subunit of an ion channel. Mutations and deficiencies in the SUR proteins have been observed in patients with hyperinsulinemic hypoglycemia of infancy, an autosomal recessive disorder of unregulated and high insulin secretion. Mutations have also been associated with non-insulin-dependent diabetes mellitus type 2, an autosomal dominant disease of defective insulin secretion."
definition: >-
  Six-transmembrane helical domain 1 (TMD1) of the sulphonylurea receptors SUR1/2. This group represents the six-transmembrane domain 1 (TMD1) of the sulphonylurea receptors SUR1/2 (ABCC8), which function as a modulator of ATP-sensitive potassium channels and insulin release, and they belong to the ABCC subfamily. The ATP-sensitive (K-ATP) channel is an octameric complex of four pore-forming Kir6.2 subunits and four regulatory SUR subunits. Thus, in contrast to other ABC transporters, the SUR serves as the regulatory subunit of an ion channel. Mutations and deficiencies in the SUR proteins have been observed in patients with hyperinsulinemic hypoglycemia of infancy, an autosomal recessive disorder of unregulated and high insulin secretion. Mutations have also been associated with non-insulin-dependent diabetes mellitus type 2, an autosomal dominant disease of defective insulin secretion. — an NCBI CDD conserved domain (cd18591); members share this curated model.
