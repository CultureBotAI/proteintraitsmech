identifier: CDD:cd13840
label: "Small metal-binding protein conserved in proteobacteria. This periplasmic protein appears capable of binding multiple equivalents of a variety of divalent and trivalent metals, including Cu(2+) and Fe(3+) but also Mn(2+), Ni(2+), Mg(2+), and Zn(2+). It has been suggested that SMBP is a metal scavenging protein that plays a role in cellular copper management in Nitrosomonas europaea."
definition: >-
  Small metal-binding protein conserved in proteobacteria. This periplasmic protein appears capable of binding multiple equivalents of a variety of divalent and trivalent metals, including Cu(2+) and Fe(3+) but also Mn(2+), Ni(2+), Mg(2+), and Zn(2+). It has been suggested that SMBP is a metal scavenging protein that plays a role in cellular copper management in Nitrosomonas europaea. — an NCBI CDD conserved domain (cd13840); members share this curated model.
