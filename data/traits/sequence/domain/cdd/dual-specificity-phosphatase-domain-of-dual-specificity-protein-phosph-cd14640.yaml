identifier: CDD:cd14640
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 4. Dual specificity protein phosphatase 4 (DUSP4), also called mitogen-activated protein kinase (MAPK) phosphatase 2 (MKP-2), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class I subfamily and is a mitogen- and stress-inducible nuclear MKP. DUSP4 regulates either ERK or c-JUN N-terminal kinase (JNK), depending on the cell type. It dephosphorylates nuclear JNK and induces apoptosis in diffuse large B cell lymphoma (DLBCL) cells. It acts as a negative regulator of macrophage M1 activation and inhibits inflammation during macrophage-adipocyte interaction. It has been linked to different aspects of cancer: it may have a role in the development of ovarian cancers, oesophagogastric rib metastasis, and pancreatic tumours; it may also be a candidate tumor suppressor gene, with its deletion implicated in breast cancer, prostate cancer, and gliomas. DUSP4/MKP-2 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 4. Dual specificity protein phosphatase 4 (DUSP4), also called mitogen-activated protein kinase (MAPK) phosphatase 2 (MKP-2), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class I subfamily and is a mitogen- and stress-inducible nuclear MKP. DUSP4 regulates either ERK or c-JUN N-terminal kinase (JNK), depending on the cell type. It dephosphorylates nuclear JNK and induces apoptosis in diffuse large B cell lymphoma (DLBCL) cells. It acts as a negative regulator of macrophage M1 activation and inhibits inflammation during macrophage-adipocyte interaction. It has been linked to different aspects of cancer: it may have a role in the development of ovarian cancers, oesophagogastric rib metastasis, and pancreatic tumours; it may also be a candidate tumor suppressor gene, with its deletion implicated in breast cancer, prostate cancer, and gliomas. DUSP4/MKP-2 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. — an NCBI CDD conserved domain (cd14640); members share this curated model.
