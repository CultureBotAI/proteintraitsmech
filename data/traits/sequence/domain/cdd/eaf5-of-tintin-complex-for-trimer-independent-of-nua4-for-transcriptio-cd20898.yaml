label: TINTIN_Eaf5
definition: >-
  Eaf5 of TINTIN complex, for Trimer Independent of NuA4 for Transcription Interactions with Nucleosome. Eaf5 is part of TINTIN triad of Eaf5/7/3 complex in yeast. TINTIN is involved in transcription elongation, both as an integral part of the chromatin modifying enzyme NuA4 histone acetyltransferase and as an independent functional entity. There is no homolog of Eaf5 in human cells
