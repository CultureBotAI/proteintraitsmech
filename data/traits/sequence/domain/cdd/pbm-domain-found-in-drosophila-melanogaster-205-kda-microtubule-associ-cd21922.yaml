identifier: CDD:cd21922
label: PBM_Map205
definition: >-
  PBM domain found in Drosophila melanogaster 205 kDa microtubule-associated protein (Map205) and similar proteins. Map205 is a microtubule-associated protein Map205 that binds strongly with the Polo-box domain (PBD) of Drosophila Polo or human Polo-like kinase 1 (hPLK1) in a phospho-independent manner. It thus plays an important role in the regulation of microtubule assembly and interaction. The model corresponds to a PBM (PBD-binding motif) domain of Map205, which is responsible for PBD binding
