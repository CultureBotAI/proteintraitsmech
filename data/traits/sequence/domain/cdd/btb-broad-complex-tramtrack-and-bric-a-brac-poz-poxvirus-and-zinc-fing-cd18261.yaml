identifier: CDD:cd18261
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 32 (KLHL32). KLHL32, also called BTB and kelch domain-containing protein 5 (BKLHD5), contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. Deletion of KLHL32 may be ssociated with Tourette syndrome and obsessive-compulsive disorder. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 32 (KLHL32). KLHL32, also called BTB and kelch domain-containing protein 5 (BKLHD5), contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. Deletion of KLHL32 may be ssociated with Tourette syndrome and obsessive-compulsive disorder. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18261); members share this curated model.
