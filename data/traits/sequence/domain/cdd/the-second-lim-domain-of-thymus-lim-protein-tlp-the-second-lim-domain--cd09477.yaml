identifier: CDD:cd09477
label: "The second LIM domain of thymus LIM protein (TLP). The second LIM domain of thymus LIM protein (TLP):  TLP is the distant member of the CRP family of proteins. TLP has two isomers (TLP-A and TLP-B) and sharing approximately 30% with each of the three other CRPs.  Like CRP1, CRP2 and CRP3/MLP, TLP has two LIM domains, connected by a flexible linker region. Unlike the CRPs, TLP lacks the nuclear targeting signal (K/R-K/R-Y-G-P-K) and is localized solely in the cytoplasm. TLP is specifically expressed in the thymus in a subset of cortical epithelial cells. TLP has a role in development of normal thymus and in controlling the development and differentiation of thymic epithelial cells. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The second LIM domain of thymus LIM protein (TLP). The second LIM domain of thymus LIM protein (TLP): TLP is the distant member of the CRP family of proteins. TLP has two isomers (TLP-A and TLP-B) and sharing approximately 30% with each of the three other CRPs. Like CRP1, CRP2 and CRP3/MLP, TLP has two LIM domains, connected by a flexible linker region. Unlike the CRPs, TLP lacks the nuclear targeting signal (K/R-K/R-Y-G-P-K) and is localized solely in the cytoplasm. TLP is specifically expressed in the thymus in a subset of cortical epithelial cells. TLP has a role in development of normal thymus and in controlling the development and differentiation of thymic epithelial cells. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09477); members share this curated model.
