identifier: CDD:cd17370
label: "MJ1317 and similar transporters of the Major Facilitator Superfamily. This family is composed of Methanocaldococcus jannaschii MFS-type transporter MJ1317, Mycobacterium bovis protein Mb2288, and similar proteins. They are uncharacterized transporters belonging to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  MJ1317 and similar transporters of the Major Facilitator Superfamily. This family is composed of Methanocaldococcus jannaschii MFS-type transporter MJ1317, Mycobacterium bovis protein Mb2288, and similar proteins. They are uncharacterized transporters belonging to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17370); members share this curated model.
