identifier: CDD:cd05674
label: "M20 Peptidase, carboxypeptidase yscS. Peptidase M20 family, yscS (GlyX-carboxypeptidase, CPS1, carboxypeptidase S, carboxypeptidase a, carboxypeptidase yscS, glycine carboxypeptidase)-like subfamily. This group mostly contains proteins that have been uncharacterized to date, but also includes vacuolar proteins involved in nitrogen metabolism which are essential for use of certain peptides that are sole nitrogen sources. YscS releases a C-terminal amino acid from a peptide that has glycine as the penultimate residue. It is synthesized as one polypeptide chain precursor which yields two active precursor molecules after carbohydrate modification in the secretory pathway. The proteolytically unprocessed forms are associated with the membrane, whereas the mature forms of the enzyme are soluble. Enzymes in this subfamily may also cleave intracellularly generated peptides in order to recycle amino acids for protein synthesis. Also included in this subfamily is peptidase M20 domain containing 1 (PM20D1), that is enriched in uncoupling protein 1, UCP1(+) versus UCP1(-) adipocytes is a bidirectional enzyme in vitro, catalyzing both the condensation of fatty acids and amino acids to generate N-acyl amino acids and also the reverse hydrolytic reaction; N-acyl amino acids directly bind mitochondria and function as endogenous uncouplers of UCP1-independent respiration. Mice studies show increased circulating PM20D1 augments respiration and increases N-acyl amino acids in blood, and administration of N-acyl amino acids improves glucose homeostasis and increases energy expenditure."
