identifier: CDD:cd13350
label: "TBC1 domain family member 8B (TBC1D8B) Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain, repeat 1. TBC1D8B may act as a GTPase-activating protein for Rab family protein(s). TBC1D8B contains an N-terminal PH-GRAM domain and a C-terminal Rab-GTPase-TBC (Tre-2, BUB2p, and Cdc16p) domain. This cd contains the first repeat of the PH-GRAM domain. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold."
definition: >-
  TBC1 domain family member 8B (TBC1D8B) Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain, repeat 1. TBC1D8B may act as a GTPase-activating protein for Rab family protein(s). TBC1D8B contains an N-terminal PH-GRAM domain and a C-terminal Rab-GTPase-TBC (Tre-2, BUB2p, and Cdc16p) domain. This cd contains the first repeat of the PH-GRAM domain. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold. — an NCBI CDD conserved domain (cd13350); members share this curated model.
