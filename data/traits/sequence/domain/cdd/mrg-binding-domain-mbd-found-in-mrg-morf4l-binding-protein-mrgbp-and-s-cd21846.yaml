identifier: CDD:cd21846
label: MBD_MRGBP
definition: >-
  MRG-binding domain (MBD) found in MRG/MORF4L-binding protein (MRGBP) and similar proteins. MRGBP, also called MRG-binding protein, or up-regulated in colon cancer 4 (Urcc4), or chromosome 20 open reading frame 20 (C20orf20), is a subunit of the transformation/transcription domain-associated protein (TRRAP)/tat-interacting protein 60 (TIP60)-containing histone acetyltransferase complex and has an important function in proliferation of cancer cells. MRGBP is a component of the NuA4 histone acetyltransferase (HAT) complex which is involved in transcriptional activation of select genes principally by acetylation of nucleosomal histones H4 and H2A. The model corresponds to MRG-binding domain (MBD) of MRGBP
