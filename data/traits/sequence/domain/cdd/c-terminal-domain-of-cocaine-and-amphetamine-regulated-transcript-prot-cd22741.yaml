identifier: CDD:cd22741
label: CART_CTD-like
definition: >-
  C-terminal domain of cocaine-and amphetamine-regulated transcript protein (CART) and similar proteins. Cocaine and amphetamine regulated transcript (CART) protein is a satiety factor closely associated with the actions of leptin and neuropeptide Y. It is an anorectic peptide that inhibits both normal and starvation-induced feeding and completely blocks the feeding response induced by neuropeptide Y. It is regulated by leptin in the hypothalamus. CART has been shown to promote neuronal development and survival in vitro. This model corresponds to the C-terminal domain (CTD) of CART, which belongs to the fold-family of small globular knottins. The CTD, containing the three disulfide bridges, is the biologically active part of the molecule affecting food intake
