identifier: CDD:cd23599
label: "extracellular domain (ECD) found in Drosophila melanogaster protein coiled and similar proteins. Coiled (Cold) is coded by the Drosophila cold gene that is expressed in a subset of glial cells. It is a member of the Drosophila Ly6 superfamily of extracellular ligands and could behave as a membrane component of the septate junctions (SJ). Cold is essential for tracheal morphogenesis and the organization of the insect SJ in a cell autonomous way. It is also required for organization of the blood-brain-barrier in the Drosophila nervous system. Coiled contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Drosophila melanogaster protein coiled and similar proteins. Coiled (Cold) is coded by the Drosophila cold gene that is expressed in a subset of glial cells. It is a member of the Drosophila Ly6 superfamily of extracellular ligands and could behave as a membrane component of the septate junctions (SJ). Cold is essential for tracheal morphogenesis and the organization of the insect SJ in a cell autonomous way. It is also required for organization of the blood-brain-barrier in the Drosophila nervous system. Coiled contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23599); members share this curated model.
