identifier: CDD:cd23589
label: "extracellular domain (ECD) found in Drosophila melanogaster protein retroactive and similar proteins. Retroactive (Rtv) is a membrane-anchored extracellular protein required for cuticle organization in the larva of Drosophila melanogaster. It is a member of the Drosophila Ly6 superfamily. Retroactive contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Drosophila melanogaster protein retroactive and similar proteins. Retroactive (Rtv) is a membrane-anchored extracellular protein required for cuticle organization in the larva of Drosophila melanogaster. It is a member of the Drosophila Ly6 superfamily. Retroactive contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23589); members share this curated model.
