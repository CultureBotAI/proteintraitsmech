identifier: CDD:cd05735
label: "Immunoglobulin (Ig) domain of Down Syndrome Cell Adhesion molecule (DSCAM). The members here are composed of the immunoglobulin (Ig) domain of Down Syndrome Cell Adhesion molecule (DSCAM). DSCAM is a cell adhesion molecule expressed largely in the developing nervous system. The gene encoding DSCAM is located at human chromosome 21q22, the locus associated with the intellectual disability phenotype of Down Syndrome. DSCAM is predicted to be the largest member of the IG superfamily. It has been demonstrated that DSCAM can mediate cation-independent homophilic intercellular adhesion."
definition: >-
  Immunoglobulin (Ig) domain of Down Syndrome Cell Adhesion molecule (DSCAM). The members here are composed of the immunoglobulin (Ig) domain of Down Syndrome Cell Adhesion molecule (DSCAM). DSCAM is a cell adhesion molecule expressed largely in the developing nervous system. The gene encoding DSCAM is located at human chromosome 21q22, the locus associated with the intellectual disability phenotype of Down Syndrome. DSCAM is predicted to be the largest member of the IG superfamily. It has been demonstrated that DSCAM can mediate cation-independent homophilic intercellular adhesion. — an NCBI CDD conserved domain (cd05735); members share this curated model.
