identifier: CDD:cd24146
label: "N-terminal NAD(P)-binding domain of native NAD(P)H-dependent amine dehydrogenases (nat-AmDHs) and similar proteins. The family corresponds to a group of native NAD(P)H-dependent amine dehydrogenases (nat-AmDHs) that catalyze the reductive amination of ketone and aldehyde substrates using NAD(P)H as the hydride source. nat-AmDHs can naturally catalyze the amination of 'neutral' carbonyl compounds using ammonia. They possess tremendous potential for the efficient asymmetric synthesis of alpha-chiral amines. The family also contains 2,4-diaminopentanoate dehydrogenase (DAPDH) and similar proteins. DAPDH, also known as ORD, is involved in the ornithine fermentation pathway. It catalyzes the oxidative deamination of (2R,4S)-2,4-diaminopentanoate ((2R,4S)-DAP) to yield 2-amino-4-ketopentanoate (AKP). Although DAPDH is more efficient with (2R,4S)-DAP, the diastereoisomer (2R,4R)-DAP can also be metabolized. Different forms of DAPDH exist which utilize NAD(+) (EC 1.4.1.26) or NAD(+)/NADP(+)  (EC 1.4.1.12). Members of this family contain an N-terminal Rossmann fold NAD(P)-binding domain and a C-terminal dimerization domain."
definition: >-
  N-terminal NAD(P)-binding domain of native NAD(P)H-dependent amine dehydrogenases (nat-AmDHs) and similar proteins. The family corresponds to a group of native NAD(P)H-dependent amine dehydrogenases (nat-AmDHs) that catalyze the reductive amination of ketone and aldehyde substrates using NAD(P)H as the hydride source. nat-AmDHs can naturally catalyze the amination of 'neutral' carbonyl compounds using ammonia. They possess tremendous potential for the efficient asymmetric synthesis of alpha-chiral amines. The family also contains 2,4-diaminopentanoate dehydrogenase (DAPDH) and similar proteins. DAPDH, also known as ORD, is involved in the ornithine fermentation pathway. It catalyzes the oxidative deamination of (2R,4S)-2,4-diaminopentanoate ((2R,4S)-DAP) to yield 2-amino-4-ketopentanoate (AKP). Although DAPDH is more efficient with (2R,4S)-DAP, the diastereoisomer (2R,4R)-DAP can also be metabolized. Different forms of DAPDH exist which utilize NAD(+) (EC 1.4.1.26) or NAD(+)/NADP(+) (EC 1.4.1.12). Members of this family contain an N-terminal Rossmann fold NAD(P)-binding domain and a C-terminal dimerization domain. — an NCBI CDD conserved domain (cd24146); members share this curated model.
