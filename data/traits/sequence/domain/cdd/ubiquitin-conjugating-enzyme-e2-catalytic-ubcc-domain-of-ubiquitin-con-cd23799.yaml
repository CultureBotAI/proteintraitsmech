identifier: CDD:cd23799
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 J1, J2 and related proteins. The E2J subfamily includes mammalian ubiquitin-conjugating enzymes E2 J1 (UBE2J1/HSPC153/HSPC205/NCUBE1) and J2 (UBE2J2/NCUBE1), yeast ubiquitin-conjugating enzyme E2 6 (UBC6/DOA2), and plant ubiquitin-conjugating enzyme E2 32-34 (UBC32-34). They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2J1 and UBE2J2 are non-canonical ubiquitin-conjugating enzyme (NCUBE), which function in the selective degradation of misfolded membrane proteins from the endoplasmic reticulum (ERAD). Saccharomyces cerevisiae UBC6 functions in degradation of misfolded or regulated proteins localized in the endoplasmic reticulum (ER) lumen or membrane via the ubiquitin-proteasome system. It is a cognate E2 conjugating enzyme for the DOA10 ubiquitin ligase complex, which is part of the ERAD-C pathway responsible for the rapid degradation of membrane proteins with misfolded cytoplasmic domains."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 J1, J2 and related proteins. The E2J subfamily includes mammalian ubiquitin-conjugating enzymes E2 J1 (UBE2J1/HSPC153/HSPC205/NCUBE1) and J2 (UBE2J2/NCUBE1), yeast ubiquitin-conjugating enzyme E2 6 (UBC6/DOA2), and plant ubiquitin-conjugating enzyme E2 32-34 (UBC32-34). They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2J1 and UBE2J2 are non-canonical ubiquitin-conjugating enzyme (NCUBE), which function in the selective degradation of misfolded membrane proteins from the endoplasmic reticulum (ERAD). Saccharomyces cerevisiae UBC6 functions in degradation of misfolded or regulated proteins localized in the endoplasmic reticulum (ER) lumen or membrane via the ubiquitin-proteasome system. It is a cognate E2 conjugating enzyme for the DOA10 ubiquitin ligase complex, which is part of the ERAD-C pathway responsible for the rapid degradation of membrane proteins with misfolded cytoplasmic domains. — an NCBI CDD conserved domain (cd23799); members share this curated model.
