identifier: CDD:cd23510
label: "Mating pheromones Er-1/Er-3, Er-2/Er-9, and Er-10. This model contains the structurally homologous pheromones Er-1/Er-3 (also known as euplomone R1/R3), Er-2/Er9 (also known as euplomone R2/R9) and Er-10 ((also known as euplomone R10) from the ciliated protozoan Euplotes raikovi. Mating ciliate pheromones (or gamones) are diffusible extracellular communication signals that distinguish different intraspecific classes of cells commonly referred to as 'mating types'. The pheromones prepare these cells for conjugation by changing their cell surface properties. The membrane-bound form promotes inter-cellular communication and adhesion for mating pair formation and may act as a binding site for the secreted form. Thermodynamic stability studies show that the structure, which consists of an up-down-up bundle of 3 short helices with three disulfide bridges, is stable."
definition: >-
  Mating pheromones Er-1/Er-3, Er-2/Er-9, and Er-10. This model contains the structurally homologous pheromones Er-1/Er-3 (also known as euplomone R1/R3), Er-2/Er9 (also known as euplomone R2/R9) and Er-10 ((also known as euplomone R10) from the ciliated protozoan Euplotes raikovi. Mating ciliate pheromones (or gamones) are diffusible extracellular communication signals that distinguish different intraspecific classes of cells commonly referred to as 'mating types'. The pheromones prepare these cells for conjugation by changing their cell surface properties. The membrane-bound form promotes inter-cellular communication and adhesion for mating pair formation and may act as a binding site for the secreted form. Thermodynamic stability studies show that the structure, which consists of an up-down-up bundle of 3 short helices with three disulfide bridges, is stable. — an NCBI CDD conserved domain (cd23510); members share this curated model.
