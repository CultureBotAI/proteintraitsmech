identifier: CDD:cd11286
label: "Cofilin, Destrin, and related actin depolymerizing factors. Actin depolymerization factor/cofilin-like domains (ADF domains) are present in a family of essential eukaryotic actin regulatory proteins. These proteins enhance the turnover rate of actin, and interact with actin monomers (G-actin) as well as actin filaments (F-actin), typically with a preference for ADP-G-actin subunits. The basic function of cofilin is to promote disassembly of aged actin filaments. Vertebrates have three isoforms of cofilin: cofilin-1 (Cfl1, non-muscle cofilin), cofilin-2 (muscle cofilin), and ADF (destrin). When bound to actin monomers, cofilins inhibit their spontaneous exchange of nucleotides. The cooperative binding to (aged) ADP-F-actin induces a local change in the actin filament structure and further promotes aging."
definition: >-
  Cofilin, Destrin, and related actin depolymerizing factors. Actin depolymerization factor/cofilin-like domains (ADF domains) are present in a family of essential eukaryotic actin regulatory proteins. These proteins enhance the turnover rate of actin, and interact with actin monomers (G-actin) as well as actin filaments (F-actin), typically with a preference for ADP-G-actin subunits. The basic function of cofilin is to promote disassembly of aged actin filaments. Vertebrates have three isoforms of cofilin: cofilin-1 (Cfl1, non-muscle cofilin), cofilin-2 (muscle cofilin), and ADF (destrin). When bound to actin monomers, cofilins inhibit their spontaneous exchange of nucleotides. The cooperative binding to (aged) ADP-F-actin induces a local change in the actin filament structure and further promotes aging. — an NCBI CDD conserved domain (cd11286); members share this curated model.
