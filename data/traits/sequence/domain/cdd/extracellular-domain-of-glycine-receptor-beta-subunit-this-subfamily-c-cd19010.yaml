identifier: CDD:cd19010
label: "extracellular domain of glycine receptor beta subunit. This subfamily contains extracellular domain of glycine receptor (GlyR or GLR) beta subunit of the amino acid neurotransmitter glycine encoded by GLRB gene. These subunits form heteropentamers with a combination of alpha and beta subunits, either a 2alpha-3beta or 3alpha-2beta stoichiometry. While the alpha subunits contain binding sites for agonists and antagonists and are responsible for ion channel formation, the beta subunit displays structural and regulatory functions, such as GlyR clustering in synaptic locations by interaction between intracellular loop domains with the scaffolding protein gephyrin, and control of pharmacologic responses to agonist or allosteric modulators due in part to the presence of interfaces alpha/beta and beta/beta. GLRB gene mutations are associated with the neurological disorder hyperekplexia, a rare neurological disorder characterized by neonatal hypertonia and exaggerated startle responses to unexpected stimuli, as well as agoraphobic cognitions."
