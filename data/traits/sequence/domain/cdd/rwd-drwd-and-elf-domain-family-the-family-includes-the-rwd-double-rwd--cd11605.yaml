identifier: CDD:cd11605
label: "RWD, DRWD, and ELF domain family. The family includes the RWD, double-RWD (DRWD), and ELF domains. They belong to the ubiquitin-conjugating (UBC) superfamily that represents a structural domain with an alpha-beta(4)-alpha(3) core fold. The RWD domain (named after three major RWD-containing proteins: RING finger, WD-repeat-containing proteins and DEXD-like helicases) mediates protein-protein interactions in a variety of pathways in eukaryotes. The DRWD domain is responsible for substrate binding. It is involved in interactions with other kinetochore proteins. The ELF (N-terminal E2-like fold) domain is found in all Fanconi anemia group L protein (FANCL) homologs. It is required to promote efficient DNA damage-induced FANCD2 (Fanconi anemia group D2 protein) monoubiquitination in vertebrate cells."
definition: >-
