identifier: CDD:cd21774
label: "Mob-binding domain found in the large tumor suppressor (LATS) subfamily. LATS was originally identified in Drosophila using a screen for genes whose inactivation led to overproliferation of cells. In tetrapods, there are two LATS isoforms, LATS1 and LATS2. Inactivation of LATS1 in mice results in the development of various tumors, including sarcomas and ovarian cancer. LATS functions as a tumor suppressor and is implicated in cell cycle regulation. This subfamily belongs to the NDR/LATS family of kinases that bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of \"Hippo\" signaling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of NDR/LATS kinases. LATS proteins contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain that contains an auto-inhibitory sequence. This model corresponds to the NTR or Mob-binding domain of LATS subfamily serine/threonine protein kinases."
definition: >-
  Mob-binding domain found in the large tumor suppressor (LATS) subfamily. LATS was originally identified in Drosophila using a screen for genes whose inactivation led to overproliferation of cells. In tetrapods, there are two LATS isoforms, LATS1 and LATS2. Inactivation of LATS1 in mice results in the development of various tumors, including sarcomas and ovarian cancer. LATS functions as a tumor suppressor and is implicated in cell cycle regulation. This subfamily belongs to the NDR/LATS family of kinases that bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of "Hippo" signaling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of NDR/LATS kinases. LATS proteins contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain that contains an auto-inhibitory sequence. This model corresponds to the NTR or Mob-binding domain of LATS subfamily serine/threonine protein kinases. — an NCBI CDD conserved domain (cd21774); members share this curated model.
