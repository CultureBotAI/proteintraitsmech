identifier: CDD:cd11439
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in steroid receptor coactivator (SRC) family. The SRC family of coactivators includes SRC-1 (NcoA-1/p160), SRC-2(TIF2/GRIP1/NcoA-2) and SRC-3(NcoA-3/pCIP/RAC3/ACTR/pCIP/AIB1/TRAM1), which are critical mediators of steroid receptor action. They contain bHLH-PAS domain at the N-terminal that is followed by receptor interacting domain and C-terminal transcriptional activation domain. SRC coactivators interact with nuclear receptors in a ligand-dependent manner and enhance transcriptional activation by the receptor via histone acetylation/methylation."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in steroid receptor coactivator (SRC) family. The SRC family of coactivators includes SRC-1 (NcoA-1/p160), SRC-2(TIF2/GRIP1/NcoA-2) and SRC-3(NcoA-3/pCIP/RAC3/ACTR/pCIP/AIB1/TRAM1), which are critical mediators of steroid receptor action. They contain bHLH-PAS domain at the N-terminal that is followed by receptor interacting domain and C-terminal transcriptional activation domain. SRC coactivators interact with nuclear receptors in a ligand-dependent manner and enhance transcriptional activation by the receptor via histone acetylation/methylation. — an NCBI CDD conserved domain (cd11439); members share this curated model.
