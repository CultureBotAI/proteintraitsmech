identifier: CDD:cd16447
label: "C1q-like family containing adiponectin, and C-terminal NCI domains of collagen VIII and X. This family contains adiponectin (also known as GBP28, apM1, adipocyte complement-related protein of 30 kDa, AdipoQ and ACRP30) as well as C-terminal non-collagenous domain (NC1) domains of collagen VIII and X proteins. Adiponectin is an adipose tissue-specific protein hormone that regulates whole body metabolism and energy homeostasis and increasingly recognized as a potential therapeutic agent for the treatment of diabetes and other metabolic diseases. It circulates in plasma as homotrimers and higher-order oliogomers of homotrimers. It is expressed and secreted by adipocytes and is the most abundant adipokine. It is highly homologous to the complement factor C1q family, as well as C-terminal non-collagenous (NC1) domains of collagen VIII and X proteins. Collagen VIII (also known as type VIII collagen) is a major component of Descemet's membrane and is also found in vascular sub-endothelial matrices. Collagen X (also known as type X collagen) is expressed specifically by hypertrophic chondrocytes in the endochondral growth plate and is re-activated during fracture repair and in osteoarthritis. The NC1 domains of collagen VIII and X, form stable trimers, similar to TNF superfamily. Mutations in the COL10A1 gene in collagen X cause metaphyseal chondrodysplasia type Schmid (MCDS), an autosomal dominant form of human skeletal dysplasia. These mutations are clustered in the NC1 encoding domains responsible for initiating trimerization of collagen X during biosynthesis, strongly suggestion the predominant mechanism causing MCDS involves a dominant interference of mutant chains on wild type chain assembly."
definition: >-
  C1q-like family containing adiponectin, and C-terminal NCI domains of collagen VIII and X. This family contains adiponectin (also known as GBP28, apM1, adipocyte complement-related protein of 30 kDa, AdipoQ and ACRP30) as well as C-terminal non-collagenous domain (NC1) domains of collagen VIII and X proteins. Adiponectin is an adipose tissue-specific protein hormone that regulates whole body metabolism and energy homeostasis and increasingly recognized as a potential therapeutic agent for the treatment of diabetes and other metabolic diseases. It circulates in plasma as homotrimers and higher-order oliogomers of homotrimers. It is expressed and secreted by adipocytes and is the most abundant adipokine. It is highly homologous to the complement factor C1q family, as well as C-terminal non-collagenous (NC1) domains of collagen VIII and X proteins. Collagen VIII (also known as type VIII collagen) is a major component of Descemet's membrane and is also found in vascular sub-endothelial matrices. Collagen X (also known as type X collagen) is expressed specifically by hypertrophic chondrocytes in the endochondral growth plate and is re-activated during fracture repair and in osteoarthritis. The NC1 domains of collagen VIII and X, form stable trimers, similar to TNF superfamily. Mutations in the COL10A1 gene in collagen X cause metaphyseal chondrodysplasia type Schmid (MCDS), an autosomal dominant form of human skeletal dysplasia. These mutations are clustered in the NC1 encoding domains responsible for initiating trimerization of collagen X during biosynthesis, strongly suggestion the predominant mechanism causing MCDS involves a dominant interference of mutant chains on wild type chain assembly. — an NCBI CDD conserved domain (cd16447); members share this curated model.
