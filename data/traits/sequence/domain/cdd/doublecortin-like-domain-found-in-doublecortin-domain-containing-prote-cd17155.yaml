identifier: CDD:cd17155
label: DCX_DCDC1
definition: >-
  Doublecortin-like domain found in doublecortin domain-containing protein 1 (DCDC1). Doublecortin (DCX) is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of the cytoskeleton that are involved in cell movement, shape determination, division and transport. DCX gene family consists of eleven paralogs in human and mouse, such that its protein domains can occur in tandem or single repeats. Proteins with DCX tandem domains in general have roles in microtubule (MT) regulation and signal transduction while single DCX repeat proteins are normally localized to actin-rich subcellular structures or to the nucleus. DCDC1 is a hydrophilic intracellular protein that contains only one DCX repeat. Therefore, DCDC1 might only bind to microtubules without microtubule polymerization properties. DCDC1 is mainly expressed in adult testis
