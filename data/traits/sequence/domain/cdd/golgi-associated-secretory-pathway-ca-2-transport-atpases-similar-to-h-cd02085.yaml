identifier: CDD:cd02085
label: "golgi-associated secretory pathway Ca(2+) transport ATPases, similar to human ATPase secretory pathway Ca(2+) transporting 1/hSPCA1 and Saccharomyces cerevisiae Ca(2+)/Mn(2+)-transporting P-type ATPase, Pmr1p. SPCAs are Ca(2+) pumps important for the golgi-associated secretion pathway, in addition some function as Mn(2+) pumps in Mn(2+) detoxification. Saccharomyces cerevisiae Pmr1p is a high affinity Ca(2+)/Mn(2+) ATPase which transports Ca(2+) and Mn(2+) from the cytoplasm into the Golgi. Pmr1p also contributes to Cd(2+) detoxification.  This subfamily includes human SPCA1 and SPCA2, encoded by the ATP2C1 and ATP2C2 genes; autosomal dominant Hailey-Hailey disease is caused by mutations in the human ATP2C1 gene. It also includes Strongylocentrotus purpuratus testis secretory pathway calcium transporting ATPase SPCA which plays an important role in fertilization. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  golgi-associated secretory pathway Ca(2+) transport ATPases, similar to human ATPase secretory pathway Ca(2+) transporting 1/hSPCA1 and Saccharomyces cerevisiae Ca(2+)/Mn(2+)-transporting P-type ATPase, Pmr1p. SPCAs are Ca(2+) pumps important for the golgi-associated secretion pathway, in addition some function as Mn(2+) pumps in Mn(2+) detoxification. Saccharomyces cerevisiae Pmr1p is a high affinity Ca(2+)/Mn(2+) ATPase which transports Ca(2+) and Mn(2+) from the cytoplasm into the Golgi. Pmr1p also contributes to Cd(2+) detoxification. This subfamily includes human SPCA1 and SPCA2, encoded by the ATP2C1 and ATP2C2 genes; autosomal dominant Hailey-Hailey disease is caused by mutations in the human ATP2C1 gene. It also includes Strongylocentrotus purpuratus testis secretory pathway calcium transporting ATPase SPCA which plays an important role in fertilization. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd02085); members share this curated model.
