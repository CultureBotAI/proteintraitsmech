identifier: CDD:cd12760
label: "RNA recognition motif 1 (RRM1) found in RNA-binding protein Musashi homolog 2 (Musashi-2 ) and similar proteins. This subgroup corresponds to the RRM2 of Musashi-2 (also termed Msi2) which has been identified as a regulator of the hematopoietic stem cell (HSC) compartment and of leukemic stem cells after transplantation of cells with loss and gain of function of the gene. It influences proliferation and differentiation of HSCs and myeloid progenitors, and further modulates normal hematopoiesis and promotes aggressive myeloid leukemia. Musashi-2 contains two conserved N-terminal tandem RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), along with other domains of unknown function."
definition: >-
  RNA recognition motif 1 (RRM1) found in RNA-binding protein Musashi homolog 2 (Musashi-2 ) and similar proteins. This subgroup corresponds to the RRM2 of Musashi-2 (also termed Msi2) which has been identified as a regulator of the hematopoietic stem cell (HSC) compartment and of leukemic stem cells after transplantation of cells with loss and gain of function of the gene. It influences proliferation and differentiation of HSCs and myeloid progenitors, and further modulates normal hematopoiesis and promotes aggressive myeloid leukemia. Musashi-2 contains two conserved N-terminal tandem RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), along with other domains of unknown function. — an NCBI CDD conserved domain (cd12760); members share this curated model.
