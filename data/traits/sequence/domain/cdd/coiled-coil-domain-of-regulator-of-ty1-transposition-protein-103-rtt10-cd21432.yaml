  coiled-coil domain of regulator of Ty1 transposition protein 103 (RTT103) and similar proteins. RTT103 is a 3?-end RNA-processing and transcription termination factor involved in transcription termination by RNA polymerase II and in regulation of Ty1 transposition. The model corresponds to the coiled-coil domain which mediates RTT103 dimerization
