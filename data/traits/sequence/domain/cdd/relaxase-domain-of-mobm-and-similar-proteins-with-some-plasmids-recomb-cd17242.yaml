identifier: CDD:cd17242
label: "relaxase domain of MobM and similar proteins. With some plasmids, recombination can occur in a site-specific manner that is independent of RecA. In such cases, the recombination event requires another protein called Pre (plasmid recombination enzyme), also known as Mob (conjugative mobilization). The best characterized member of this family is encoded by the streptococcal plasmid pMV158 that recognizes the plasmid origin of transfer. MobM converts supercoiled plasmid DNA into relaxed DNA by cleaving a phosphodiester bond of a specific dinucleotide and remains bound to the 5'-end of the nick site."
definition: >-
  relaxase domain of MobM and similar proteins. With some plasmids, recombination can occur in a site-specific manner that is independent of RecA. In such cases, the recombination event requires another protein called Pre (plasmid recombination enzyme), also known as Mob (conjugative mobilization). The best characterized member of this family is encoded by the streptococcal plasmid pMV158 that recognizes the plasmid origin of transfer. MobM converts supercoiled plasmid DNA into relaxed DNA by cleaving a phosphodiester bond of a specific dinucleotide and remains bound to the 5'-end of the nick site. — an NCBI CDD conserved domain (cd17242); members share this curated model.
