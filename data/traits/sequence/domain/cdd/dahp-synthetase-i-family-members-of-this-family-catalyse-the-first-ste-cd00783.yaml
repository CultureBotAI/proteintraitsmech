identifier: CDD:cd00783
label: DAHP_synth_1
definition: >-
  DAHP synthetase I family. Members of this family catalyse the first step in aromatic amino acid biosynthesis from chorismate. E-coli has three related synthetases, which are inhibited by different aromatic amino acids. This family also includes KDSA which has very similar catalytic activity but is involved in the first step of liposaccharide biosynthesis
