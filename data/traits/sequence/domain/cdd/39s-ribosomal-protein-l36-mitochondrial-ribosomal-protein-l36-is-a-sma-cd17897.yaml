identifier: CDD:cd17897
label: "39s ribosomal protein l36 mitochondrial. Ribosomal protein L36 is a small protein that is highly conserved in bacteria, as well as in mitochondria and chloroplasts with a conserved CCCH binding motif. Rpl36 might be involved in late steps of ribosome subunit assembly which its removal causes extensive disruptions in the rRNA tertiary structure. Rpl36 may function as an effective tumor suppressor during pancreatic tumorigenesis. Mitochondrial L36 with a conserved CCCH binding motif can be used as biomarkers of mercury exposure in aquatic animals."
definition: >-
  39s ribosomal protein l36 mitochondrial. Ribosomal protein L36 is a small protein that is highly conserved in bacteria, as well as in mitochondria and chloroplasts with a conserved CCCH binding motif. Rpl36 might be involved in late steps of ribosome subunit assembly which its removal causes extensive disruptions in the rRNA tertiary structure. Rpl36 may function as an effective tumor suppressor during pancreatic tumorigenesis. Mitochondrial L36 with a conserved CCCH binding motif can be used as biomarkers of mercury exposure in aquatic animals. — an NCBI CDD conserved domain (cd17897); members share this curated model.
