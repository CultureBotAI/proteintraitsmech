identifier: CDD:cd18815
label: "CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of peptidase inhibitor R3HDML. Peptidase inhibitor R3HDML, also called cysteine-rich secretory protein R3HDML, is a putative serine protease inhibitor. The R3HDML gene may be associated with clinical dimensions of schizophrenia. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others."
definition: >-
  CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of peptidase inhibitor R3HDML. Peptidase inhibitor R3HDML, also called cysteine-rich secretory protein R3HDML, is a putative serine protease inhibitor. The R3HDML gene may be associated with clinical dimensions of schizophrenia. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. — an NCBI CDD conserved domain (cd18815); members share this curated model.
