identifier: CDD:cd06181
label: "BAX inhibitor (BI)-1/YccA-like protein family. Mammalian members of the BAX inhibitor (BI)-1 like family of small transmembrane proteins have been shown to have an antiapoptotic effect either by stimulating the antiapoptotic function of Bcl-2, a well-characterized oncogene, or by inhibiting the proapoptotic effect of Bax, another member of the Bcl-2 family. Their broad tissue distribution and high degree of conservation suggests an important regulatory role. This superfamily also contains the lifeguard(LFG)-like proteins and other subfamilies which appear to be related by common descent and also function as inhibitors of apoptosis. In plants, BI-1 like proteins play a role in pathogen resistance. A prokaryotic member, Escherichia coli YccA, has been shown to interact with ATP-dependent protease FtsH, which degrades abnormal membrane proteins as part of a quality control mechanism to keep the integrity of biological membranes."
