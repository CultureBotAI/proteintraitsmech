identifier: CDD:cd14604
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 12. Tyrosine-protein phosphatase non-receptor type 12 (PTPN12), also called PTP-PEST or protein-tyrosine phosphatase G1 (PTPG1), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN12 is characterized as a tumor suppressor and a pivotal regulator of EGFR/HER2 signaling. It regulates various physiological processes, including cell migration, immune response, and neuronal activity, by dephosphorylating multiple substrates including HER2, FAK, PYK2, PSTPIP, WASP, p130Cas, paxillin, Shc, catenin, c-Abl, ArgBP2, p190RhoGAP, RhoGDI, cell adhesion kinase beta, and Rho GTPase."
