identifier: CDD:cd06792
label: "PDZ domain 2 of tyrosine kinase PTPN13, FERM and PDZ domain-containing protein 2 (FRMPD2), and similar domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 2 of human PTPN13, and related domains. PTPN13, also known as Fas-associated protein-tyrosine phosphatase 1 (FAP-1), protein-tyrosine phosphatase 1E (PTP-E1), and protein-tyrosine phosphatase (PTPL1), negatively regulates FAS-mediated apoptosis and NGFR-mediated pro-apoptotic signaling, and may also regulate phosphoinositide 3-kinase (PI3K) signaling. It contains 5 PDZ domains; interaction partners of its second PDZ domain (PDZ2) include the Fas receptor (TNFRSF6) and thyroid receptor-interacting protein 6 (TRIP6). The second PDZ (PDZ2) domain, but not PDZ1 or PDZ3, of FRMPD2 binds to GluN2A and GluN2B, two subunits of N-methyl-d-aspartic acid (NMDA) receptors. Other binding partners of the FRMPDZ2 PDZ2 domain include NOD2, and catenin family members, delta catenin (CTNND2), armadillo repeat gene deleted in velo-cardio-facial syndrome (ARVCF) and p0071 (also known as plakophilin 4; PKP4). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PTPN13-like family PDZ2 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain 2 of tyrosine kinase PTPN13, FERM and PDZ domain-containing protein 2 (FRMPD2), and similar domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 2 of human PTPN13, and related domains. PTPN13, also known as Fas-associated protein-tyrosine phosphatase 1 (FAP-1), protein-tyrosine phosphatase 1E (PTP-E1), and protein-tyrosine phosphatase (PTPL1), negatively regulates FAS-mediated apoptosis and NGFR-mediated pro-apoptotic signaling, and may also regulate phosphoinositide 3-kinase (PI3K) signaling. It contains 5 PDZ domains; interaction partners of its second PDZ domain (PDZ2) include the Fas receptor (TNFRSF6) and thyroid receptor-interacting protein 6 (TRIP6). The second PDZ (PDZ2) domain, but not PDZ1 or PDZ3, of FRMPD2 binds to GluN2A and GluN2B, two subunits of N-methyl-d-aspartic acid (NMDA) receptors. Other binding partners of the FRMPDZ2 PDZ2 domain include NOD2, and catenin family members, delta catenin (CTNND2), armadillo repeat gene deleted in velo-cardio-facial syndrome (ARVCF) and p0071 (also known as plakophilin 4; PKP4). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PTPN13-like family PDZ2 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06792); members share this curated model.
