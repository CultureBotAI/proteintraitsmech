identifier: CDD:cd10306
label: "Glutathione S-transferase C-terminal-like, alpha helical domain of Glutamyl-tRNA synthetase. Glutathione S-transferase (GST) C-terminal domain family, Glutamyl-tRNA synthetase (GluRS) subfamily; This model characterizes the GST_C-like domain found in the N-terminal region of GluRS from lower eukaryotes. Aminoacyl-tRNA synthetases (aaRSs) comprise a family of enzymes that catalyze the coupling of amino acids with their matching tRNAs. This involves the formation of an aminoacyl adenylate using ATP, followed by the transfer of the activated amino acid to the 3'-adenosine moiety of the tRNA. AaRSs may also be involved in translational and transcriptional regulation, as well as in tRNA processing. The GST_C-like domain of GluRS is involved in protein-protein interactions. This domain mediates the formation of the MetRS-Arc1p-GluRS ternary complex found in lower eukaryotes, which is considered an evolutionary intermediate between prokaryotic aaRS and the multi-aaRS complex found in higher eukaryotes. AaRSs from prokaryotes, which are active as dimers, do not contain this GST_C-like domain."
definition: >-
