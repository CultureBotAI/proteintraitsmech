identifier: CDD:cd19588
label: "serpin miropin and similar proteins. Miropin, the serpin from Tannerella forsythia, is thought to contribute to the virulence of periodontal pathogens by inhibiting neutrophil serine proteases. Miropin broadly inhibits serine endopeptidases (SEPs) including trypsin, neutrophil elastase, pancreatic elastase, subtilisin, and cathepsin G and cysteine endopeptidases (CEPs) including papain, calpain-like peptidase Tpr, and gingipain K through various reactive-site bonds. This is achieved by offering several target bonds of the RCL for cleavage within a bait region, instead of a single RSB as found in canonical serpins. In addition, promiscuous inhibition is facilitated by the capacity to insert strands deviating from the canonical length into the central sheet A, while keeping the prey peptidase bound and inactivated. The structural adaptation of miropin to provide a relaxed inhibitory specificity, which allows for formation of inhibitory complexes using different sites, is unique among serpins. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin miropin and similar proteins. Miropin, the serpin from Tannerella forsythia, is thought to contribute to the virulence of periodontal pathogens by inhibiting neutrophil serine proteases. Miropin broadly inhibits serine endopeptidases (SEPs) including trypsin, neutrophil elastase, pancreatic elastase, subtilisin, and cathepsin G and cysteine endopeptidases (CEPs) including papain, calpain-like peptidase Tpr, and gingipain K through various reactive-site bonds. This is achieved by offering several target bonds of the RCL for cleavage within a bait region, instead of a single RSB as found in canonical serpins. In addition, promiscuous inhibition is facilitated by the capacity to insert strands deviating from the canonical length into the central sheet A, while keeping the prey peptidase bound and inactivated. The structural adaptation of miropin to provide a relaxed inhibitory specificity, which allows for formation of inhibitory complexes using different sites, is unique among serpins. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19588); members share this curated model.
