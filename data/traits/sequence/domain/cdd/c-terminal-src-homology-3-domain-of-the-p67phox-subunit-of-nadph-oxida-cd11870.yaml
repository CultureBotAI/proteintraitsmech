identifier: CDD:cd11870
label: "C-terminal Src Homology 3 domain of the p67phox subunit of NADPH oxidase and similar proteins. This subfamily is composed of p67phox, NADPH oxidase activator 1 (Noxa1), and similar proteins. p67phox, also called Neutrophil cytosol factor 2 (NCF-2), and Noxa1 are homologs and are the cytosolic subunits of the phagocytic (Nox2) and nonphagocytic (Nox1) NADPH oxidase complexes, respectively. NADPH oxidase catalyzes the transfer of electrons from NADPH to oxygen during phagocytosis forming superoxide and reactive oxygen species. p67phox and Noxa1 play regulatory roles. p67phox contains N-terminal TPR, first SH3 (or N-terminal or central SH3), PB1, and C-terminal SH3 domains. Noxa1 has a similar domain architecture except it is lacking the N-terminal SH3 domain. The TPR domain of both binds activated GTP-bound Rac, while the C-terminal SH3 domain of p67phox and Noxa1 binds the polyproline motif found at the C-terminus of p47phox and Noxo1, respectively. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  C-terminal Src Homology 3 domain of the p67phox subunit of NADPH oxidase and similar proteins. This subfamily is composed of p67phox, NADPH oxidase activator 1 (Noxa1), and similar proteins. p67phox, also called Neutrophil cytosol factor 2 (NCF-2), and Noxa1 are homologs and are the cytosolic subunits of the phagocytic (Nox2) and nonphagocytic (Nox1) NADPH oxidase complexes, respectively. NADPH oxidase catalyzes the transfer of electrons from NADPH to oxygen during phagocytosis forming superoxide and reactive oxygen species. p67phox and Noxa1 play regulatory roles. p67phox contains N-terminal TPR, first SH3 (or N-terminal or central SH3), PB1, and C-terminal SH3 domains. Noxa1 has a similar domain architecture except it is lacking the N-terminal SH3 domain. The TPR domain of both binds activated GTP-bound Rac, while the C-terminal SH3 domain of p67phox and Noxa1 binds the polyproline motif found at the C-terminus of p47phox and Noxo1, respectively. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11870); members share this curated model.
