identifier: CDD:cd17445
label: "Solute carrier family 22, member 17 of the Major Facilitator Superfamily. Solute carrier family 22, member 17 (SLC22A17) is also called 24p3 receptor (24p3R), lipocalin-2 receptor, or neutrophil gelatinase-associated lipocalin (NGAL) receptor (NGALR). It functions as a cell surface receptor for lipocalin-2 (LCN2), also called NGAL or 24p3, which plays a key role in iron homeostasis and transport. LCN2 is a secreted protein of the lipocalin family that induces apoptosis in some types of cells and inhibits bacterial growth by sequestration of the iron-laden bacterial siderophore. Over-expressions of NGAL and NGALR have been found to be correlated with unfavorable clinicopathologic features and poor prognosis of patients with hepatocellular carcinoma. SLC22A17 is a member of the SLC22 family of organic cation/anion/zwitterion transporters, which includes organic cation transporters (OCTs/OCTNs) and organic anion transporters (OATs). It belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier family 22, member 17 of the Major Facilitator Superfamily. Solute carrier family 22, member 17 (SLC22A17) is also called 24p3 receptor (24p3R), lipocalin-2 receptor, or neutrophil gelatinase-associated lipocalin (NGAL) receptor (NGALR). It functions as a cell surface receptor for lipocalin-2 (LCN2), also called NGAL or 24p3, which plays a key role in iron homeostasis and transport. LCN2 is a secreted protein of the lipocalin family that induces apoptosis in some types of cells and inhibits bacterial growth by sequestration of the iron-laden bacterial siderophore. Over-expressions of NGAL and NGALR have been found to be correlated with unfavorable clinicopathologic features and poor prognosis of patients with hepatocellular carcinoma. SLC22A17 is a member of the SLC22 family of organic cation/anion/zwitterion transporters, which includes organic cation transporters (OCTs/OCTNs) and organic anion transporters (OATs). It belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17445); members share this curated model.
