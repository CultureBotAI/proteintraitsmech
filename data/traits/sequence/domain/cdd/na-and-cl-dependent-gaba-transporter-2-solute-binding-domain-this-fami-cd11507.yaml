identifier: CDD:cd11507
label: "Na(+)- and Cl(-)-dependent GABA transporter 2; solute-binding domain. This family includes human GAT2 (hGAT2) which transports gamma-aminobutyric acid (GABA). GABA is the main inhibitory neurotransmitter within the mammalian CNS. hGAT2 is encoded by the SLC6A13 gene, and is similar to mouse GAT-3, and rat GAT2. hGAT2 is expressed in brain, kidney, lung, and testis. hGAT2 is a potential drug target for treatment of epilepsy. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent GABA transporter 2; solute-binding domain. This family includes human GAT2 (hGAT2) which transports gamma-aminobutyric acid (GABA). GABA is the main inhibitory neurotransmitter within the mammalian CNS. hGAT2 is encoded by the SLC6A13 gene, and is similar to mouse GAT-3, and rat GAT2. hGAT2 is expressed in brain, kidney, lung, and testis. hGAT2 is a potential drug target for treatment of epilepsy. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11507); members share this curated model.
