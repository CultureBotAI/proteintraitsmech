identifier: CDD:cd17662
label: "atypical dual specificity phosphatases similar to oxidant-induced cell-cycle arrest protein 4. Oxidant-induced cell-cycle arrest protein 4 (Oca4) is an atypical dual specificity phosphatase of unknown function. It belongs to a group of atypical DSPs present in plants, fungi, kinetoplastids, and slime molds called plant and fungi atypical dual-specificity phosphatases (PFA-DSPs). Oca4 may be an inactive DSP-like protein as it lacks the CxxxxxR catalytic motif."
definition: >-
  atypical dual specificity phosphatases similar to oxidant-induced cell-cycle arrest protein 4. Oxidant-induced cell-cycle arrest protein 4 (Oca4) is an atypical dual specificity phosphatase of unknown function. It belongs to a group of atypical DSPs present in plants, fungi, kinetoplastids, and slime molds called plant and fungi atypical dual-specificity phosphatases (PFA-DSPs). Oca4 may be an inactive DSP-like protein as it lacks the CxxxxxR catalytic motif. — an NCBI CDD conserved domain (cd17662); members share this curated model.
