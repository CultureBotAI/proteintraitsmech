identifier: CDD:cd16484
label: "RING finger, H2 subclass, found in vacuolar protein sorting-associated proteins Vps8, Vps11, Vps18, Vps41, and similar proteins. This subfamily corresponds to a group of vacuolar protein sorting-associated proteins containing a C-terminal C3H2C3-type RING-H2 finger, which includes Vps8, Vps11, Vps18, and Vps41. Vps11 and Vps18 associate with Vps16 and Vps33 to form a Class C Vps core complex that is required for soluble N-ethylmaleimide-sensitive factor attachment protein receptors (SNARE)-mediated membrane fusion at the lysosome-like yeast vacuole. The core complex, together with two additional compartment-specific subunits, forms the tethering complexes HOPS (homotypic vacuole fusion and protein sorting) and CORVET (class C core vacuole/endosome transport). CORVET contains the additional Vps3 and Vps8 subunits. It operates at endosomes, controls traffic into late endosomes and interacts with the Rab5/Vps21-GTP form. HOPS contains the additional Vps39 and Vps41 subunits. It operates at the lysosomal vacuole, controls all traffic from late endosomes into the vacuole and interacts with the Rab7/Ypt7-GTP form."
definition: >-
  RING finger, H2 subclass, found in vacuolar protein sorting-associated proteins Vps8, Vps11, Vps18, Vps41, and similar proteins. This subfamily corresponds to a group of vacuolar protein sorting-associated proteins containing a C-terminal C3H2C3-type RING-H2 finger, which includes Vps8, Vps11, Vps18, and Vps41. Vps11 and Vps18 associate with Vps16 and Vps33 to form a Class C Vps core complex that is required for soluble N-ethylmaleimide-sensitive factor attachment protein receptors (SNARE)-mediated membrane fusion at the lysosome-like yeast vacuole. The core complex, together with two additional compartment-specific subunits, forms the tethering complexes HOPS (homotypic vacuole fusion and protein sorting) and CORVET (class C core vacuole/endosome transport). CORVET contains the additional Vps3 and Vps8 subunits. It operates at endosomes, controls traffic into late endosomes and interacts with the Rab5/Vps21-GTP form. HOPS contains the additional Vps39 and Vps41 subunits. It operates at the lysosomal vacuole, controls all traffic from late endosomes into the vacuole and interacts with the Rab7/Ypt7-GTP form. — an NCBI CDD conserved domain (cd16484); members share this curated model.
