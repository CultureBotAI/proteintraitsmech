identifier: CDD:cd19187
label: "PR-SET domain found in PR domain zinc finger protein 1 (PRDM1) and similar proteins. PRDM1 (also termed BLIMP-1, beta-interferon gene positive regulatory domain I-binding factor, PR domain-containing protein 1, positive regulatory domain I-binding factor 1, PRDI-BF1, or PRDI-binding factor 1)  acts as a transcription factor that mediates a transcriptional program in various innate and adaptive immune tissue-resident lymphocyte T cell types such as tissue-resident memory T (Trm), natural killer (trNK) and natural killer T (NKT) cells and negatively regulates gene expression of proteins that promote the egress of tissue-resident T-cell populations from non-lymphoid organs."
definition: >-
  PR-SET domain found in PR domain zinc finger protein 1 (PRDM1) and similar proteins. PRDM1 (also termed BLIMP-1, beta-interferon gene positive regulatory domain I-binding factor, PR domain-containing protein 1, positive regulatory domain I-binding factor 1, PRDI-BF1, or PRDI-binding factor 1) acts as a transcription factor that mediates a transcriptional program in various innate and adaptive immune tissue-resident lymphocyte T cell types such as tissue-resident memory T (Trm), natural killer (trNK) and natural killer T (NKT) cells and negatively regulates gene expression of proteins that promote the egress of tissue-resident T-cell populations from non-lymphoid organs. — an NCBI CDD conserved domain (cd19187); members share this curated model.
