identifier: CDD:cd14410
label: "UBA domain found in salt-inducible kinase 3 (SIK3). SIK3, also called salt-inducible kinase 3 or serine/threonine-protein kinase QSK, is a serine/threonine kinase ubiquitously expressed. It belongs to the AMP-activated protein kinases (AMPK) family involved in the regulation of metabolism during energy stress. It acts as a novel energy regulator that modulates cholesterol and bile acid metabolism by coupling with retinoid metabolism. It also play an essential role in facilitating chondrocyte hypertrophy during skeletogenesis and growth plate maintenance. SIK3 contains an N-terminal protein kinase catalytic domain followed by an ubiquitin-associated (UBA) domain."
definition: >-
  UBA domain found in salt-inducible kinase 3 (SIK3). SIK3, also called salt-inducible kinase 3 or serine/threonine-protein kinase QSK, is a serine/threonine kinase ubiquitously expressed. It belongs to the AMP-activated protein kinases (AMPK) family involved in the regulation of metabolism during energy stress. It acts as a novel energy regulator that modulates cholesterol and bile acid metabolism by coupling with retinoid metabolism. It also play an essential role in facilitating chondrocyte hypertrophy during skeletogenesis and growth plate maintenance. SIK3 contains an N-terminal protein kinase catalytic domain followed by an ubiquitin-associated (UBA) domain. — an NCBI CDD conserved domain (cd14410); members share this curated model.
