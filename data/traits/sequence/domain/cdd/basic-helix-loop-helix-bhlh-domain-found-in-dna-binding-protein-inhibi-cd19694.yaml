identifier: CDD:cd19694
label: bHLH_dnHLH_ID4
definition: >-
  basic helix-loop-helix (bHLH) domain found in DNA-binding protein inhibitor ID4 and similar proteins. ID4, also termed Class B basic helix-loop-helix protein 27 (bHLHb27), or inhibitor of DNA binding 4, or inhibitor of differentiation 4, is a dominant negative helix-loop-helix (dnHLH) transcriptional regulator (lacking a basic DNA binding domain) which negatively regulates the bHLH transcription factors by forming heterodimers and inhibiting their DNA binding and transcriptional activity. It plays a role in adipose cell differentiation
