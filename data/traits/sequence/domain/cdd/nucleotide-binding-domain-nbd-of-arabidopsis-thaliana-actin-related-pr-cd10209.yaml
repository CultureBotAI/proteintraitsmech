identifier: CDD:cd10209
label: "nucleotide-binding domain (NBD) of Arabidopsis thaliana actin-related protein 7 and similar proteins. Arabidopsis thaliana ARP7 is an essential nuclear protein, ubiquitously expressed in all cell types. It is needed for normal embryogenesis, plant architecture, and floral organ abscission. It may play a role in regulating various phases of plant development through chromatin-mediated gene regulation."
