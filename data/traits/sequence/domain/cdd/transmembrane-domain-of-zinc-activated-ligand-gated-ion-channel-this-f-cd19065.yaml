identifier: CDD:cd19065
label: "transmembrane domain of zinc-activated ligand-gated ion channel. This family contains transmembrane (TM) domain of zinc-activated ligand-gated ion channel (ZAC). The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. ZAC displays low sequence similarity to other members in the superfamily, with closest matches to the human serotonin 5-HT3 receptor (5-HT3R) subunits 5-HT3A and 5-HT3B, and nAChR alpha7 subunits that exhibit approximately 15% amino acid sequence identity to ZAC. Expression of ZAC has been detected in human fetal whole brain, spinal cord, pancreas, placenta, prostate, thyroid, trachea, and stomach, as well as in adult hippocampus, striatum, amygdala, and thalamus. ZAC forms an ion channel gated by Zn2+, Cu2+, and H+, and is non-selectively permeable to monovalent cations. However, the role of ZAC in Zn2+, Cu2+, and H+ signaling is as yet unknown."
