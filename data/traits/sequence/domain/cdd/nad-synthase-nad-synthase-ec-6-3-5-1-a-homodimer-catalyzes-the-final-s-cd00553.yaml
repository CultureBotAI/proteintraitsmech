identifier: CDD:cd00553
label: "NAD(+) synthase. NAD(+) synthase (EC 6.3.5.1), a homodimer, catalyzes the final step in the de novo nicotinamide adenine dinucleotide (NAD(+)) biosynthesis, an amide transfer from either ammonia or glutamine to nicotinic acid adenine dinucleotide (NaAD). The conversion of NaAD to NAD(+) occurs via a NAD-adenylate intermediate and requires ATP and Mg(2+). The intermediate is subsequently cleaved into NAD(+) and AMP. In many prokaryotes, such as Escherichia coli, NAD synthase consists of a single domain and is strictly ammonia dependent. In contrast, eukaryotes and other prokaryotes have an additional N-terminal amidohydrolase domain that prefer glutamine. Interestingly, NAD(+) synthases in these prokaryotes, can also utilize ammonia as an amide source."
definition: >-
  NAD(+) synthase. NAD(+) synthase (EC 6.3.5.1), a homodimer, catalyzes the final step in the de novo nicotinamide adenine dinucleotide (NAD(+)) biosynthesis, an amide transfer from either ammonia or glutamine to nicotinic acid adenine dinucleotide (NaAD). The conversion of NaAD to NAD(+) occurs via a NAD-adenylate intermediate and requires ATP and Mg(2+). The intermediate is subsequently cleaved into NAD(+) and AMP. In many prokaryotes, such as Escherichia coli, NAD synthase consists of a single domain and is strictly ammonia dependent. In contrast, eukaryotes and other prokaryotes have an additional N-terminal amidohydrolase domain that prefer glutamine. Interestingly, NAD(+) synthases in these prokaryotes, can also utilize ammonia as an amide source. — an NCBI CDD conserved domain (cd00553); members share this curated model.
