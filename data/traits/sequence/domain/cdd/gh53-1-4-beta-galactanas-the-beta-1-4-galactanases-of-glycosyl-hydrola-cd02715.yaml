identifier: CDD:cd02715
label: GH53_1_4_beta_galactanase
definition: >-
  GH53_1_4_beta_galactanas. The Beta-1,4-Galactanases of glycosyl hydrolase family 53 (GH53) hydrolyze the galactan and arabinogalactan side chains that are part of the complex carbohydrate structure of pectin. Pectin is a major and complex component of the plant cell wall, requiring many enzymes for its degradation. Pectin has "smooth" regions of alpha-1,4-linked galacturonic acid (homogalacturonan) and "hairy" regions of rhamnogalacturonan. Beta-1,4-galactanase is involved in the hydrolysis of Beta-1,4-galactan in the hairy regions of pectin. Beta-1,4-galactanase and other GH53 enzymes use a catalytic retaining mechanism involving two glutamic acid residues, a nucleophile and an acid/base, located at the ends of beta strands 4 and 7
