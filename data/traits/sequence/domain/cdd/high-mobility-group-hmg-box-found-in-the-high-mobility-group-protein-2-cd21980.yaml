identifier: CDD:cd21980
label: "high mobility group (HMG)-box found in the high mobility group protein 20 (HMG20) subfamily. The HMG20 subfamily includes HMG20A and HMG20B. HMG20A, also called HMG box-containing protein 20A, HMG domain-containing protein 1, HMG domain-containing protein HMGX1, HMGXB1, or iBRAF, is a chromatin-associated protein involved in neuronal differentiation and maturation. It is required for SNAI1-mediated epithelial to mesenchymal transition. HMG20A acts as an inhibitor of HMG20B. HMG20B, also called SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily E member 1-related, SMARCE1-related protein (SMARCE1R), BRCA2-associated factor 35 (BRAF35), HMG box-containing protein 20B, HMG domain-containing protein 2, HMG domain-containing protein HMGX2, Sox-like transcriptional factor, or structural DNA-binding protein BRAF35, is a DNA binding factor that acts as a repressor of erythroid differentiation. It is required for correct progression through the G2 phase of the cell cycle and entry into mitosis. It is also required for RCOR1/CoREST mediated repression of neuronal specific gene promoters. HMG20B is a core subunit of the Lys-specific demethylase 1/REST co-repressor 1 (LSD1-CoREST) histone demethylase complex. Both HMG20A and HMG20B contain one HMG-box."
definition: >-
  high mobility group (HMG)-box found in the high mobility group protein 20 (HMG20) subfamily. The HMG20 subfamily includes HMG20A and HMG20B. HMG20A, also called HMG box-containing protein 20A, HMG domain-containing protein 1, HMG domain-containing protein HMGX1, HMGXB1, or iBRAF, is a chromatin-associated protein involved in neuronal differentiation and maturation. It is required for SNAI1-mediated epithelial to mesenchymal transition. HMG20A acts as an inhibitor of HMG20B. HMG20B, also called SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily E member 1-related, SMARCE1-related protein (SMARCE1R), BRCA2-associated factor 35 (BRAF35), HMG box-containing protein 20B, HMG domain-containing protein 2, HMG domain-containing protein HMGX2, Sox-like transcriptional factor, or structural DNA-binding protein BRAF35, is a DNA binding factor that acts as a repressor of erythroid differentiation. It is required for correct progression through the G2 phase of the cell cycle and entry into mitosis. It is also required for RCOR1/CoREST mediated repression of neuronal specific gene promoters. HMG20B is a core subunit of the Lys-specific demethylase 1/REST co-repressor 1 (LSD1-CoREST) histone demethylase complex. Both HMG20A and HMG20B contain one HMG-box. — an NCBI CDD conserved domain (cd21980); members share this curated model.
