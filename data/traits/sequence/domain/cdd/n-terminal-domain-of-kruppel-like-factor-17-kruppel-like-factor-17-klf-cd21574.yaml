identifier: CDD:cd21574
label: "N-terminal domain of Kruppel-like factor 17. Kruppel-like factor 17 (KLF17), or Krueppel-like factor 17, is a protein that, in humans, is encoded by the KLF17 gene and acts as a tumor suppressor. It negatively regulates epithelial-mesenchymal transition and metastasis in breast cancer. KLF17 is thought to be the human ortholog of the mouse gene, zinc finger protein 393 (Zfp393), although it has diverged significantly. KLF17 can regulate gene transcription from CACCC-box elements. It belongs to a family of proteins, called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the N-terminal domain of KLF17."
definition: >-
  N-terminal domain of Kruppel-like factor 17. Kruppel-like factor 17 (KLF17), or Krueppel-like factor 17, is a protein that, in humans, is encoded by the KLF17 gene and acts as a tumor suppressor. It negatively regulates epithelial-mesenchymal transition and metastasis in breast cancer. KLF17 is thought to be the human ortholog of the mouse gene, zinc finger protein 393 (Zfp393), although it has diverged significantly. KLF17 can regulate gene transcription from CACCC-box elements. It belongs to a family of proteins, called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the N-terminal domain of KLF17. — an NCBI CDD conserved domain (cd21574); members share this curated model.
