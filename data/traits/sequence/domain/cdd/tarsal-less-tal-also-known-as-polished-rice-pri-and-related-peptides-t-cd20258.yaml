identifier: CDD:cd20258
label: Tal_Pri
definition: >-
  Tarsal-less (Tal), also known as polished rice (Pri), and related peptides. The tal/pri gene produces a single polycistronic transcript that encodes 4 related peptides: tal-1A, tal-2A, and tal-3A which are each 11 amino acids long, and tal-AA, which is 32 amino acids long, the shorter ones contain one conserved LDPTGXY motif, tal-AA contains two. The Tal/Pri peptides function redundantly in several developmental processes. They are required for embryonic and imaginal development in Drosophila. They control epidermal differentiation in Drosophila by triggering the amino-terminal truncation of the transcription factor Shavenbaby (Svb), converting Svb from a repressor to an activator. In addition, Tal/Pri peptides are required for denticle formation and may play a role in the developmental timing of trichome differentiation. They are essential for the development of taenidial folds in the trachea, and in the early stages of leg development, for the intercalation of the tarsal segments during the mid-third instar stage and later for tarsal joint formation. Furthermore, Tal/Pri peptides are required for correct wing and leg formation through their regulation of several genes including those in the Notch signaling pathway. The Tribolium orthologue mille-pattes (mlpt) is essential for embryo segmentation; it also encodes a polycistronic mRNA that codes for four peptides: Mlpt peptides 1-3 range in size from 11 to 15 amino acids and each contain one conserved LDPTGXY motif; Mlpt peptide 4 is 23 amino acids, is not represented here, and does not contain this motif
