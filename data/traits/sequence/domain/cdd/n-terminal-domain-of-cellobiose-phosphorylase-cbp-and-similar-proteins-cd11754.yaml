identifier: CDD:cd11754
label: "N-terminal domain of cellobiose phosphorylase (CBP) and similar proteins. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cellobiose phosphorylase (EC:2.4.1.20) or cellobiose:phosphate alpha-D-glucosyltransferase, or CepA. This N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain [an (alpha/alpha)(6) barrel]. Cellobiose phosphorylase participates in the degradation of cellulose, it catalyzes the phosphate dependent hydrolysis of cellobiose into alpha-D-glucose-1-phosphate and D-glucose, a reversible reaction."
definition: >-
  N-terminal domain of cellobiose phosphorylase (CBP) and similar proteins. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cellobiose phosphorylase (EC:2.4.1.20) or cellobiose:phosphate alpha-D-glucosyltransferase, or CepA. This N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain [an (alpha/alpha)(6) barrel]. Cellobiose phosphorylase participates in the degradation of cellulose, it catalyzes the phosphate dependent hydrolysis of cellobiose into alpha-D-glucose-1-phosphate and D-glucose, a reversible reaction. — an NCBI CDD conserved domain (cd11754); members share this curated model.
