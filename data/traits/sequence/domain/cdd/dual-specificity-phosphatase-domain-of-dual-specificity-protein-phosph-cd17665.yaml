identifier: CDD:cd17665
label: "dual-specificity phosphatase domain of dual specificity protein phosphatase 11 and similar proteins. dual specificity protein phosphatase 11 (DUSP11), also known as RNA/RNP complex-1-interacting phosphatase or phosphatase that interacts with RNA/RNP complex 1 (PIR1), has RNA 5'-triphosphatase and diphosphatase activity, but only poor protein-tyrosine phosphatase activity. It has activity for short RNAs but is less active toward mononucleotide triphosphates, suggesting that its primary function in vivo is to dephosphorylate RNA 5'-ends. It may play a role in nuclear mRNA metabolism. Also included in this subfamily is baculovirus RNA 5'-triphosphatase for Autographa californica nuclear polyhedrosis virus."
definition: >-
  dual-specificity phosphatase domain of dual specificity protein phosphatase 11 and similar proteins. dual specificity protein phosphatase 11 (DUSP11), also known as RNA/RNP complex-1-interacting phosphatase or phosphatase that interacts with RNA/RNP complex 1 (PIR1), has RNA 5'-triphosphatase and diphosphatase activity, but only poor protein-tyrosine phosphatase activity. It has activity for short RNAs but is less active toward mononucleotide triphosphates, suggesting that its primary function in vivo is to dephosphorylate RNA 5'-ends. It may play a role in nuclear mRNA metabolism. Also included in this subfamily is baculovirus RNA 5'-triphosphatase for Autographa californica nuclear polyhedrosis virus. — an NCBI CDD conserved domain (cd17665); members share this curated model.
