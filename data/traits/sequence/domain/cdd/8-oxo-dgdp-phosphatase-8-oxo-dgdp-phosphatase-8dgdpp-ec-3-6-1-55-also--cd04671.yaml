identifier: CDD:cd04671
label: "8-oxo-DGDP phosphatase. 8-oxo-DGDP phosphatase (8DGDPP; EC 3.6.1.55), also known as NUDIX (nucleoside diphosphate-linked moiety X)) motif 18/Nudt18; 2-hydroxy-DADP phosphatase; 7,8-dihydro-8-oxoguanine phosphatase, hydrolyzes 8-oxo-7,8-dihydroguanine (8-oxo-Gua)-containing deoxyribo- and ribonucleoside diphosphates to the monophosphates. Members of the NUDIX hydrolase superfamily catalyze the hydrolysis of NUcleoside DIphosphates linked to other moieties, X. Enzymes belonging to this superfamily require a divalent cation, such as Mg2+ or Mn2+, for their activity and contain a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and catalytic site. Substrates of NUDIX hydrolases include intact and oxidatively damaged nucleoside triphosphates, dinucleoside polyphosphates, nucleotide-sugars and dinucleotide enzymes. These substrates are metabolites or cell signaling molecules that require regulation during different stages of the cell cycle or during periods of stress. In general, the role of the NUDIX hydrolase is to sanitize the nucleotide pools and to maintain cell viability, thereby serving as surveillance & \"house-cleaning\" enzymes. Substrate specificity is used to define families within the superfamily. Differences in substrate specificity are determined by the N-terminal extension or by residues in variable loop regions. Mechanistically, substrate hydrolysis occurs by a nucleophilic substitution reaction, with variation in the numbers and roles of divalent cations required."
