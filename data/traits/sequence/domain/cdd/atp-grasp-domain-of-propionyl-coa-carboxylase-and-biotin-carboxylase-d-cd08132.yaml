identifier: CDD:cd08132
label: "ATP-grasp domain of propionyl CoA carboxylase, and biotin carboxylase domain C. Propionyl-CoA carboxylase (PCC, EC 6.4.1.3) catalyzes the carboxylation of propionyl-CoA to methylmalonyl CoA. PCC is a heteropolymeric mitochondrial enzyme that is composed of alpha and beta subunits. The N-terminal of alpha-subunit contains biotin carboxylase (BC) domain while the C-terminal contains the biotin carboxyl carrier protein (BCCP). Carboxyltransferase (CT) activity is present on the beta subunit. Catalytic mechanism involves interaction between BC and BCCP domains to catalyze carboxybiotin in the presence of ATP and bicarbonate. The CT domain then transfers the carboxyl group from carboxybiotin to propionyl-CoA to produce methylmalonyl CoA. Human PCCAs belong to this family. Mutation in PCCA leads to an enzyme deficiency resulting in propionic acidemia."
definition: >-
  ATP-grasp domain of propionyl CoA carboxylase, and biotin carboxylase domain C. Propionyl-CoA carboxylase (PCC, EC 6.4.1.3) catalyzes the carboxylation of propionyl-CoA to methylmalonyl CoA. PCC is a heteropolymeric mitochondrial enzyme that is composed of alpha and beta subunits. The N-terminal of alpha-subunit contains biotin carboxylase (BC) domain while the C-terminal contains the biotin carboxyl carrier protein (BCCP). Carboxyltransferase (CT) activity is present on the beta subunit. Catalytic mechanism involves interaction between BC and BCCP domains to catalyze carboxybiotin in the presence of ATP and bicarbonate. The CT domain then transfers the carboxyl group from carboxybiotin to propionyl-CoA to produce methylmalonyl CoA. Human PCCAs belong to this family. Mutation in PCCA leads to an enzyme deficiency resulting in propionic acidemia. — an NCBI CDD conserved domain (cd08132); members share this curated model.
