identifier: CDD:cd17193
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 3 (PTPN3). PTPN3, also termed protein-tyrosine phosphatase H1 (PTP-H1), belongs to the non-transmembrane FERM-containing protein-tyrosine phosphatase (PTP) subfamily characterized by a conserved N-terminal FERM domain, a PDZ domain, and a C-terminal PTP catalytic domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). PTPN3 associates with the mitogen-activated protein kinase p38gamma (also known as MAPK12) to form a PTPN3-p38gamma complex that promotes Ras-induced oncogenesis. It may also act as a tumor suppressor in lung cancer through its modulation of epidermal growth factor receptor (EGFR) signaling. Moreover, PTPN3 shows sensitizing effect to anti-estrogens. It dephosphorylates the tyrosine kinase EGFR, disrupts its interaction with the nuclear estrogen receptor, and increases breast cancer sensitivity to small molecule tyrosine kinase inhibitors (TKIs). It also cooperates with vitamin D receptor to stimulate breast cancer growth through their mutual stabilization."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 3 (PTPN3). PTPN3, also termed protein-tyrosine phosphatase H1 (PTP-H1), belongs to the non-transmembrane FERM-containing protein-tyrosine phosphatase (PTP) subfamily characterized by a conserved N-terminal FERM domain, a PDZ domain, and a C-terminal PTP catalytic domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). PTPN3 associates with the mitogen-activated protein kinase p38gamma (also known as MAPK12) to form a PTPN3-p38gamma complex that promotes Ras-induced oncogenesis. It may also act as a tumor suppressor in lung cancer through its modulation of epidermal growth factor receptor (EGFR) signaling. Moreover, PTPN3 shows sensitizing effect to anti-estrogens. It dephosphorylates the tyrosine kinase EGFR, disrupts its interaction with the nuclear estrogen receptor, and increases breast cancer sensitivity to small molecule tyrosine kinase inhibitors (TKIs). It also cooperates with vitamin D receptor to stimulate breast cancer growth through their mutual stabilization. — an NCBI CDD conserved domain (cd17193); members share this curated model.
