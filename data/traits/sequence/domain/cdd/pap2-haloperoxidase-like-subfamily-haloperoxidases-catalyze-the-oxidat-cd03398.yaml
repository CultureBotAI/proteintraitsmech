identifier: CDD:cd03398
label: "PAP2, haloperoxidase_like subfamily. Haloperoxidases catalyze the oxidation of halides such as bromide or chloride by hydrogen peroxide, which results in subsequent halogenation of organic substrates, or halide-assisted disproportionation of hydrogen peroxide forming dioxygen. They are likely to participate in the biosynthesis of halogenated natural products, such as volatile halogenated hydrocarbons, chiral halogenated terpenes, acetogenins and indoles."
definition: >-
