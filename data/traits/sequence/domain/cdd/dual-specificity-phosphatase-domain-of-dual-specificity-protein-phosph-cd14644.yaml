identifier: CDD:cd14644
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 9. Dual specificity protein phosphatase 9 (DUSP9),  also called mitogen-activated protein kinase (MAPK) phosphatase 4 (MKP-4), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class II subfamily and is an ERK-selective cytoplasmic MKP. DUSP9 is a mediator of bone morphogenetic protein (BMP) signaling to control the appropriate ERK activity critical for the determination of embryonic stem cell fate. Down-regulation of DUSP9 expression has been linked to severe pre-eclamptic placenta as well as cancers such as hepatocellular carcinoma. DUSP9 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 9. Dual specificity protein phosphatase 9 (DUSP9), also called mitogen-activated protein kinase (MAPK) phosphatase 4 (MKP-4), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class II subfamily and is an ERK-selective cytoplasmic MKP. DUSP9 is a mediator of bone morphogenetic protein (BMP) signaling to control the appropriate ERK activity critical for the determination of embryonic stem cell fate. Down-regulation of DUSP9 expression has been linked to severe pre-eclamptic placenta as well as cancers such as hepatocellular carcinoma. DUSP9 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. — an NCBI CDD conserved domain (cd14644); members share this curated model.
