identifier: CDD:cd14308
label: "UBA domain found in Schizosaccharomyces pombe UBA domain-containing protein mud1 and similar proteins. Schizosaccharomyces pombe mud1 is an ortholog of the Saccharomyces cerevisiae DNA-damage response protein Ddi1. S. cerevisiae Ddi1, also called v-SNARE-master 1 (Vsm1), belongs to a family of proteins known as the ubiquitin receptors which can bind ubiquitinated substrates and the proteasome. It is involved in the degradation of the F-box protein Ufo1, involved in the G1/S transition. It also participates in Mec1-mediated degradation of Ho endonuclease. Both S. pombe mud1 and S. cerevisiae Ddi1 contain an N-terminal ubiquitin-like (UBL) domain, an aspartyl protease-like domain, and a C-terminal ubiquitin-associated (UBA) domain. S. pombe mud1 binds to K48-linked polyubiquitin (polyUb) through UBA domain."
definition: >-
  UBA domain found in Schizosaccharomyces pombe UBA domain-containing protein mud1 and similar proteins. Schizosaccharomyces pombe mud1 is an ortholog of the Saccharomyces cerevisiae DNA-damage response protein Ddi1. S. cerevisiae Ddi1, also called v-SNARE-master 1 (Vsm1), belongs to a family of proteins known as the ubiquitin receptors which can bind ubiquitinated substrates and the proteasome. It is involved in the degradation of the F-box protein Ufo1, involved in the G1/S transition. It also participates in Mec1-mediated degradation of Ho endonuclease. Both S. pombe mud1 and S. cerevisiae Ddi1 contain an N-terminal ubiquitin-like (UBL) domain, an aspartyl protease-like domain, and a C-terminal ubiquitin-associated (UBA) domain. S. pombe mud1 binds to K48-linked polyubiquitin (polyUb) through UBA domain. — an NCBI CDD conserved domain (cd14308); members share this curated model.
