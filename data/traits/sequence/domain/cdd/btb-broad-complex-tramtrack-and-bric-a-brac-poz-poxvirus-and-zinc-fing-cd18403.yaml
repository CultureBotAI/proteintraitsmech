identifier: CDD:cd18403
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily A members 2 (KCNA2) and 3 (KCNA3). KCNA2 is also called NGK1, voltage-gated K(+) channel HuKIV, voltage-gated potassium channel HBK5, or voltage-gated potassium channel subunit Kv1.2. KCNA3 is also called HGK5, HLK3, HPCN3, voltage-gated K(+) channel HuKIII, or voltage-gated potassium channel subunit Kv1.3. KCNA2 and KCNA3 mediate transmembrane potassium transport in excitable membranes. Assuming opened or closed conformations in response to the voltage difference across the membrane, the protein forms a tetrameric potassium-selective channel through which potassium ions may pass in accordance with their electrochemical gradient. KCNA2 primarily functions in the brain and the central nervous system, but also in the cardiovascular system. It prevents aberrant action potential firing and regulates neuronal output. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNA2 and KCNA3 are alpha subunits that form functional homo- or hetero-tetrameric channels (with other Kv1/KCNA alpha subunits) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily A members 2 (KCNA2) and 3 (KCNA3). KCNA2 is also called NGK1, voltage-gated K(+) channel HuKIV, voltage-gated potassium channel HBK5, or voltage-gated potassium channel subunit Kv1.2. KCNA3 is also called HGK5, HLK3, HPCN3, voltage-gated K(+) channel HuKIII, or voltage-gated potassium channel subunit Kv1.3. KCNA2 and KCNA3 mediate transmembrane potassium transport in excitable membranes. Assuming opened or closed conformations in response to the voltage difference across the membrane, the protein forms a tetrameric potassium-selective channel through which potassium ions may pass in accordance with their electrochemical gradient. KCNA2 primarily functions in the brain and the central nervous system, but also in the cardiovascular system. It prevents aberrant action potential firing and regulates neuronal output. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNA2 and KCNA3 are alpha subunits that form functional homo- or hetero-tetrameric channels (with other Kv1/KCNA alpha subunits) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. — an NCBI CDD conserved domain (cd18403); members share this curated model.
