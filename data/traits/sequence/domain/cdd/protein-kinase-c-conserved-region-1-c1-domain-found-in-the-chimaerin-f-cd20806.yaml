identifier: CDD:cd20806
label: "protein kinase C conserved region 1 (C1 domain) found in the chimaerin family. Chimaerins are a family of phorbolester- and diacylglycerol-responsive GTPase activating proteins (GAPs) specific for the Rho-like GTPase Rac. Alpha1-chimerin (formerly known as N-chimerin) and alpha2-chimerin are alternatively spliced products of a single gene, as are beta1- and beta2-chimerin. Alpha1- and beta1-chimerin have a relatively short N-terminal region that does not encode any recognizable domains, whereas alpha2- and beta2-chimerin both include a functional SH2 domain that can bind to phosphotyrosine motifs within receptors. All the isoforms contain a GAP domain with specificity in vitro for Rac1 and a diacylglycerol (DAG)-binding C1 domain which allows them to translocate to membranes in response to DAG signaling and anchors them in close proximity to activated Rac. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in the chimaerin family. Chimaerins are a family of phorbolester- and diacylglycerol-responsive GTPase activating proteins (GAPs) specific for the Rho-like GTPase Rac. Alpha1-chimerin (formerly known as N-chimerin) and alpha2-chimerin are alternatively spliced products of a single gene, as are beta1- and beta2-chimerin. Alpha1- and beta1-chimerin have a relatively short N-terminal region that does not encode any recognizable domains, whereas alpha2- and beta2-chimerin both include a functional SH2 domain that can bind to phosphotyrosine motifs within receptors. All the isoforms contain a GAP domain with specificity in vitro for Rac1 and a diacylglycerol (DAG)-binding C1 domain which allows them to translocate to membranes in response to DAG signaling and anchors them in close proximity to activated Rac. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20806); members share this curated model.
