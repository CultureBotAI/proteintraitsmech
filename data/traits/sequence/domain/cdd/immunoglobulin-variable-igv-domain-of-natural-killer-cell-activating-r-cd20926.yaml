identifier: CDD:cd20926
label: "Immunoglobulin variable (IgV) domain of Natural Killer cell activating receptor NKp30 and similar domains. The members here are composed of the immunoglobulin variable region (IgV) of Natural Killer cell activating receptor NKp30 (also known as Natural Cytotoxicity triggering Receptor 3 (NCR3)) and similar domains. NKp30 Recognizes the N-Terminal IgV Domain of B7-H6. In humans, the activating natural cytotoxicity receptor NKp30 plays a major role in NK cell-mediated tumor cell lysis. NKp30 recognizes the cell-surface protein B7-H6, which is expressed on tumor, but not healthy, cells."
definition: >-
