identifier: CDD:cd16026
label: "galactosamine-6-sulfatase; also known as N-acetylgalactosamine-6-sulfatase (GALNS). Lysosomal galactosamine-6-sulfatase removes sulfate groups from a terminal N-acetylgalactosamine-6-sulfate (or galactose-6-sulfate) in mucopolysaccharides such as keratan sulfate and chondroitin-6-sulfate. Defects in GALNS lead to accumulation of substrates, resulting in the development of the lysosomal storage disease mucopolysaccharidosis IV A."
definition: >-
  galactosamine-6-sulfatase; also known as N-acetylgalactosamine-6-sulfatase (GALNS). Lysosomal galactosamine-6-sulfatase removes sulfate groups from a terminal N-acetylgalactosamine-6-sulfate (or galactose-6-sulfate) in mucopolysaccharides such as keratan sulfate and chondroitin-6-sulfate. Defects in GALNS lead to accumulation of substrates, resulting in the development of the lysosomal storage disease mucopolysaccharidosis IV A. — an NCBI CDD conserved domain (cd16026); members share this curated model.
