label: "first histone-fold domain found in Aquifex Aeolicus protein Aq328 and similar proteins. This subfamily includes a group of uncharacterized DUF931 family proteins similar to Aquifex Aeolicus protein Aq328 and Thermus Thermophilus protein TTHA1479. Aq328 is possibly a DNA-binding protein that is involved in DNA packaging. The function of TTHA1479 remains unclear. All members contain two cross-shaped antiparallel histone-fold domains. This model corresponds to the first repeat."
definition: >-
  first histone-fold domain found in Aquifex Aeolicus protein Aq328 and similar proteins. This subfamily includes a group of uncharacterized DUF931 family proteins similar to Aquifex Aeolicus protein Aq328 and Thermus Thermophilus protein TTHA1479. Aq328 is possibly a DNA-binding protein that is involved in DNA packaging. The function of TTHA1479 remains unclear. All members contain two cross-shaped antiparallel histone-fold domains. This model corresponds to the first repeat. — an NCBI CDD conserved domain (cd22922); members share this curated model.
