identifier: CDD:cd19932
label: "phosphoacceptor receiver (REC) domain of PdtaR and similar proteins. This subfamily includes Mycobacterium tuberculosis PdtaR, also called Rv1626, and similar proteins containing a REC domain and an ANTAR (AmiR and NasR transcription antitermination regulators) RNA-binding output domain. PdtaR is a response regulator that acts at the level of transcriptional antitermination and is a member of the PdtaR/PdtaS two-component regulatory system. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of PdtaR and similar proteins. This subfamily includes Mycobacterium tuberculosis PdtaR, also called Rv1626, and similar proteins containing a REC domain and an ANTAR (AmiR and NasR transcription antitermination regulators) RNA-binding output domain. PdtaR is a response regulator that acts at the level of transcriptional antitermination and is a member of the PdtaR/PdtaS two-component regulatory system. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19932); members share this curated model.
