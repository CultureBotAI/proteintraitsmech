identifier: CDD:cd20732
label: PoNe_FilH_DUF637_VENN-like
definition: >-
  Polymorphic Nuclease effector (PoNe) domain co-occurring with N-terminal domains such as filamentous hemagglutinin repeats, DUF637, or pre-toxin domain with VENN motif. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with a PoNe domain typically co-occuring with N-terminal domains such as filamentous hemagglutinin repeats, hemagglutination activity domains, DUF637 - predicted to be a hemagglutinin domain, or pre-toxin domains with VENN motifs, which are found in many bacterial polymorphic toxins and are located before the C-terminal toxin modules
