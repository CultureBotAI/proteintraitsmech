identifier: CDD:cd11905
label: "Src Homology 3 domain of Tec (Tyrosine kinase expressed in hepatocellular carcinoma). Tec is a cytoplasmic (or nonreceptor) tyr kinase containing Src homology protein interaction domains (SH3, SH2) N-terminal to the catalytic tyr kinase domain. It also contains an N-terminal pleckstrin homology (PH) domain, which binds the products of PI3K and allows membrane recruitment and activation, and the Tec homology (TH) domain, which contains proline-rich and zinc-binding regions. It is more widely-expressed than other Tec subfamily kinases. Tec is found in endothelial cells, both B- and T-cells, and a variety of myeloid cells including mast cells, erythroid cells, platelets, macrophages and neutrophils. Tec is a key component of T-cell receptor (TCR) signaling, and is important in TCR-stimulated proliferation, IL-2 production and phospholipase C-gamma1 activation. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Tec (Tyrosine kinase expressed in hepatocellular carcinoma). Tec is a cytoplasmic (or nonreceptor) tyr kinase containing Src homology protein interaction domains (SH3, SH2) N-terminal to the catalytic tyr kinase domain. It also contains an N-terminal pleckstrin homology (PH) domain, which binds the products of PI3K and allows membrane recruitment and activation, and the Tec homology (TH) domain, which contains proline-rich and zinc-binding regions. It is more widely-expressed than other Tec subfamily kinases. Tec is found in endothelial cells, both B- and T-cells, and a variety of myeloid cells including mast cells, erythroid cells, platelets, macrophages and neutrophils. Tec is a key component of T-cell receptor (TCR) signaling, and is important in TCR-stimulated proliferation, IL-2 production and phospholipase C-gamma1 activation. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11905); members share this curated model.
