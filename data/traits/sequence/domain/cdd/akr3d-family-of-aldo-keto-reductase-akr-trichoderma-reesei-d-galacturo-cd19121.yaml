identifier: CDD:cd19121
label: "AKR3D family of aldo-keto reductase (AKR). Trichoderma reesei D-galacturonate reductase (GAR1, EC 1.1.1.365), also called D-galacturonic acid reductase, or GalUR, is a founding member of aldo-keto reductase family 3 member D1 (AKR3D1). It mediates the reduction of D-galacturonate to L-galactonate, the first step in D-galacturonate catabolic process. It also has activity with D-glucuronate and DL-glyceraldehyde. Its activity is seen only with NADPH and not with NADH."
definition: >-
  AKR3D family of aldo-keto reductase (AKR). Trichoderma reesei D-galacturonate reductase (GAR1, EC 1.1.1.365), also called D-galacturonic acid reductase, or GalUR, is a founding member of aldo-keto reductase family 3 member D1 (AKR3D1). It mediates the reduction of D-galacturonate to L-galactonate, the first step in D-galacturonate catabolic process. It also has activity with D-glucuronate and DL-glyceraldehyde. Its activity is seen only with NADPH and not with NADH. — an NCBI CDD conserved domain (cd19121); members share this curated model.
