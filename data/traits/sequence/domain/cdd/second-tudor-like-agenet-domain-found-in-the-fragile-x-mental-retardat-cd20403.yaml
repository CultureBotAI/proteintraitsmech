identifier: CDD:cd20403
label: "second Tudor-like Agenet domain found in the fragile X mental retardation protein (FMRP) family. The FMRP family includes synaptic functional regulator FMR1, fragile X mental retardation syndrome-related protein 1 (FXR1) and 2 (FXR2). FMR1, also called fragile X mental retardation protein 1 (FMRP), is a multifunctional polyribosome-associated RNA-binding protein that plays a central role in neuronal development and synaptic plasticity through the regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs. FXR1 and FXR2 are RNA-binding proteins that shuttle between the nucleus and cytoplasm and associate with polyribosomes, predominantly with the 60S ribosomal subunit. Members of this family contain two copies of the Tudor-like Agenet domain. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  second Tudor-like Agenet domain found in the fragile X mental retardation protein (FMRP) family. The FMRP family includes synaptic functional regulator FMR1, fragile X mental retardation syndrome-related protein 1 (FXR1) and 2 (FXR2). FMR1, also called fragile X mental retardation protein 1 (FMRP), is a multifunctional polyribosome-associated RNA-binding protein that plays a central role in neuronal development and synaptic plasticity through the regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs. FXR1 and FXR2 are RNA-binding proteins that shuttle between the nucleus and cytoplasm and associate with polyribosomes, predominantly with the 60S ribosomal subunit. Members of this family contain two copies of the Tudor-like Agenet domain. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20403); members share this curated model.
