identifier: CDD:cd20446
label: "Tudor domain found in Schizosaccharomyces pombe splicing factor spf30 (SpSPF30) and similar proteins. SpSPF30, also called survival of motor neuron-related-splicing factor 30, is necessary for spliceosome assembly. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Schizosaccharomyces pombe splicing factor spf30 (SpSPF30) and similar proteins. SpSPF30, also called survival of motor neuron-related-splicing factor 30, is necessary for spliceosome assembly. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20446); members share this curated model.
