identifier: CDD:cd11665
label: "Aspergillus nidulans lactam utilization protein LamB and similar proteins. This eukaryotic and bacterial subfamily of the LamB/YbgL family, includes Aspergillus nidulans protein LamB. The lamb gene locates at the lam locus of Aspergillus nidulans, consisting of two divergently transcribed genes, lamA and lamB, needed for the utilization of lactams such as 2-pyrrolidinone. Both genes are under the control of the positive regulatory gene amdR and are subject to carbon and nitrogen metabolite repression. Although the exact molecular function of lamb encoding protein LamB is unknown, it might be required for conversion of exogenous 2-pyrrolidinone to endogenous GABA."
definition: >-
  Aspergillus nidulans lactam utilization protein LamB and similar proteins. This eukaryotic and bacterial subfamily of the LamB/YbgL family, includes Aspergillus nidulans protein LamB. The lamb gene locates at the lam locus of Aspergillus nidulans, consisting of two divergently transcribed genes, lamA and lamB, needed for the utilization of lactams such as 2-pyrrolidinone. Both genes are under the control of the positive regulatory gene amdR and are subject to carbon and nitrogen metabolite repression. Although the exact molecular function of lamb encoding protein LamB is unknown, it might be required for conversion of exogenous 2-pyrrolidinone to endogenous GABA. — an NCBI CDD conserved domain (cd11665); members share this curated model.
