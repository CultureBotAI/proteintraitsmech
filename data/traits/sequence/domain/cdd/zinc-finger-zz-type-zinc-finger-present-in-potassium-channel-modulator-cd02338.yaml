identifier: CDD:cd02338
label: "Zinc finger, ZZ type. Zinc finger present in potassium channel modulatory factor (PCMF) 1  and related proteins. The ZZ motif coordinates two zinc ions and most likely participates in ligand binding or molecular scaffolding. Human potassium channel modulatory factor 1 or FIGC has been shown to possess intrinsic E3 ubiquitin ligase activity and to promote ubiquitination."
definition: >-
  Zinc finger, ZZ type. Zinc finger present in potassium channel modulatory factor (PCMF) 1 and related proteins. The ZZ motif coordinates two zinc ions and most likely participates in ligand binding or molecular scaffolding. Human potassium channel modulatory factor 1 or FIGC has been shown to possess intrinsic E3 ubiquitin ligase activity and to promote ubiquitination. — an NCBI CDD conserved domain (cd02338); members share this curated model.
