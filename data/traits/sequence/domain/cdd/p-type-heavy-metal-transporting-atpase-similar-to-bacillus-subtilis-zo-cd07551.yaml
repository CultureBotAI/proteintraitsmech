identifier: CDD:cd07551
label: "P-type heavy metal-transporting ATPase, similar to Bacillus subtilis ZosA/PfeT which transports copper, and perhaps zinc under oxidative stress, and perhaps ferrous iron. Bacillus subtilis ZosA/PfeT (previously known as YkvW) transports copper, it may also transport zinc under oxidative stress and may also be involved in ferrous iron efflux. ZosA/PfeT is expressed under the regulation of the peroxide-sensing repressor PerR. It is involved in competence development. Disruption of the zosA/pfeT gene results in low transformability. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type heavy metal-transporting ATPase, similar to Bacillus subtilis ZosA/PfeT which transports copper, and perhaps zinc under oxidative stress, and perhaps ferrous iron. Bacillus subtilis ZosA/PfeT (previously known as YkvW) transports copper, it may also transport zinc under oxidative stress and may also be involved in ferrous iron efflux. ZosA/PfeT is expressed under the regulation of the peroxide-sensing repressor PerR. It is involved in competence development. Disruption of the zosA/pfeT gene results in low transformability. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd07551); members share this curated model.
