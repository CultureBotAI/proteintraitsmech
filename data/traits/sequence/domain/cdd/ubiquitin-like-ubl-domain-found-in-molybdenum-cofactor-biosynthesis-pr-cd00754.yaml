identifier: CDD:cd00754
label: "ubiquitin-like (Ubl) domain found in molybdenum cofactor biosynthesis protein D (MoaD) and similar proteins. MoaD, also termed molybdopterin synthase sulfur carrier subunit, or MPT synthase subunit 1, or MPT synthase small subunit, or molybdopterin-converting factor small subunit, or molybdopterin-converting factor subunit 1, is a conserved small sulfur carrier protein that has beta-grasp ubiquitin-like (Ubl) fold involved in biosynthesis of the molybdenum cofactor (Moco), an essential cofactor of a diverse group of redox enzymes. MoaD is activated in an ATP-dependent manner by sulfurtransferases similar to the activation mechanism of ubiquitin-activating enzyme E1."
definition: >-
  ubiquitin-like (Ubl) domain found in molybdenum cofactor biosynthesis protein D (MoaD) and similar proteins. MoaD, also termed molybdopterin synthase sulfur carrier subunit, or MPT synthase subunit 1, or MPT synthase small subunit, or molybdopterin-converting factor small subunit, or molybdopterin-converting factor subunit 1, is a conserved small sulfur carrier protein that has beta-grasp ubiquitin-like (Ubl) fold involved in biosynthesis of the molybdenum cofactor (Moco), an essential cofactor of a diverse group of redox enzymes. MoaD is activated in an ATP-dependent manner by sulfurtransferases similar to the activation mechanism of ubiquitin-activating enzyme E1. — an NCBI CDD conserved domain (cd00754); members share this curated model.
