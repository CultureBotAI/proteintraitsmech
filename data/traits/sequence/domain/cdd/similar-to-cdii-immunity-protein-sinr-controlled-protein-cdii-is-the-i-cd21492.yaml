identifier: CDD:cd21492
label: CdiI_like
definition: >-
  similar to CdiI immunity protein, SinR-controlled protein. CdiI is the immunity protein of Pseudomonas Contact-Dependent growth Inhibition (CDI). CDI confer to host cells a competive advatange over CDI- bacteria. CDI systems also contain CdiA toxin secreted by CdiB, an outer membrane beta-barrel transporter. SinR helps control biofilm formation and swimming motility in Bacillus thuringiensis as well as biofilm formation and swarming motility in the Bacillus subtilis. SinR mutation has been shown to de-repress expression of proteins in this family in Bacillus thuringiensis
