identifier: CDD:cd17769
label: "nucleoside phosphorylases similar to Toxoplasma gondii uridine phosphorylase. This subfamily is composed of mostly uncharacterized proteins with similarity to Toxoplasma gondii uridine phosphorylase (TgUPase). Toxoplasma gondii appears to have a single non-specific uridine phosphorylase which catalyzes the reversible phosphorolysis of uridine, deoxyuridine and thymidine, rather than the two distinct enzymes of mammalian cells: uridine phosphorylase (nucleoside phosphorylase-I family) and thymidine phosphorylase (nucleoside phosphorylase-II family). TgUPase is a potential target for intervention against toxoplasmosis. It belongs to the nucleoside phosphorylase-I (NP-I) family, whose members accept a range of purine nucleosides as well as the pyrimidine nucleoside uridine. The NP-1 family includes phosphorolytic nucleosidases, such as purine nucleoside phosphorylase (PNPs, EC. 2.4.2.1), uridine phosphorylase (UP, EC 2.4.2.3), and 5'-deoxy-5'-methylthioadenosine phosphorylase (MTAP, EC 2.4.2.28), and hydrolytic nucleosidases, such as AMP nucleosidase (AMN, EC 3.2.2.4), and 5'-methylthioadenosine/S-adenosylhomocysteine (MTA/SAH) nucleosidase (MTAN, EC 3.2.2.16). The NP-I family is distinct from nucleoside phosphorylase-II, which belongs to a different structural family."
definition: >-
  nucleoside phosphorylases similar to Toxoplasma gondii uridine phosphorylase. This subfamily is composed of mostly uncharacterized proteins with similarity to Toxoplasma gondii uridine phosphorylase (TgUPase). Toxoplasma gondii appears to have a single non-specific uridine phosphorylase which catalyzes the reversible phosphorolysis of uridine, deoxyuridine and thymidine, rather than the two distinct enzymes of mammalian cells: uridine phosphorylase (nucleoside phosphorylase-I family) and thymidine phosphorylase (nucleoside phosphorylase-II family). TgUPase is a potential target for intervention against toxoplasmosis. It belongs to the nucleoside phosphorylase-I (NP-I) family, whose members accept a range of purine nucleosides as well as the pyrimidine nucleoside uridine. The NP-1 family includes phosphorolytic nucleosidases, such as purine nucleoside phosphorylase (PNPs, EC. 2.4.2.1), uridine phosphorylase (UP, EC 2.4.2.3), and 5'-deoxy-5'-methylthioadenosine phosphorylase (MTAP, EC 2.4.2.28), and hydrolytic nucleosidases, such as AMP nucleosidase (AMN, EC 3.2.2.4), and 5'-methylthioadenosine/S-adenosylhomocysteine (MTA/SAH) nucleosidase (MTAN, EC 3.2.2.16). The NP-I family is distinct from nucleoside phosphorylase-II, which belongs to a different structural family. — an NCBI CDD conserved domain (cd17769); members share this curated model.
