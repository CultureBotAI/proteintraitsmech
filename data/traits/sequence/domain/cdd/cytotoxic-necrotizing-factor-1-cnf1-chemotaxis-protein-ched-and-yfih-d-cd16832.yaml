identifier: CDD:cd16832
label: "cytotoxic necrotizing factor 1 (CNF1), chemotaxis protein CheD and YfiH (DUF152) are distant homologs. This family contains distant homologs that include cytotoxic necrotizing factor 1 (CNF1), chemotaxis protein CheD and a protein of unknown function YfiH. CNF-1 along with dermonecrotic toxin (DNT) from Bordetella species, and Burkholderia Lethal Factor 1 (BLF1, also known as BPSL1549) are Rho-activating toxins. The bacterial chemotaxis protein CheD stimulates methylation of methyl-accepting chemotaxis proteins (MCPs). YfiH, a domain of unknown function, also included in this family reveals a structure with a distant homology between to the CNF1, and CheD, all having an invariant Cys-His pair forming a catalytic dyad that is required by the CNF-1 toxins for deamidation activity."
definition: >-
  cytotoxic necrotizing factor 1 (CNF1), chemotaxis protein CheD and YfiH (DUF152) are distant homologs. This family contains distant homologs that include cytotoxic necrotizing factor 1 (CNF1), chemotaxis protein CheD and a protein of unknown function YfiH. CNF-1 along with dermonecrotic toxin (DNT) from Bordetella species, and Burkholderia Lethal Factor 1 (BLF1, also known as BPSL1549) are Rho-activating toxins. The bacterial chemotaxis protein CheD stimulates methylation of methyl-accepting chemotaxis proteins (MCPs). YfiH, a domain of unknown function, also included in this family reveals a structure with a distant homology between to the CNF1, and CheD, all having an invariant Cys-His pair forming a catalytic dyad that is required by the CNF-1 toxins for deamidation activity. — an NCBI CDD conserved domain (cd16832); members share this curated model.
