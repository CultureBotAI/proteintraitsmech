identifier: CDD:cd05587
label: "Catalytic domain of the Serine/Threonine Kinase, Classical (or Conventional) Protein Kinase C. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. cPKCs are potent kinases for histones, myelin basic protein, and protamine. They depend on calcium, DAG (1,2-diacylglycerol), and in most cases, phosphatidylserine (PS) for activation. cPKCs contain a calcium-binding C2 region in their regulatory domain. There are four cPKC isoforms, named alpha, betaI, betaII, and gamma. PKC-gamma is mainly expressed in neuronal tissues. It plays a role in protection from ischemia. PKCs are classified into three groups (classical, atypical, and novel) depending on their mode of activation and the structural characteristics of their regulatory domain. The cPKC subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Classical (or Conventional) Protein Kinase C. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. cPKCs are potent kinases for histones, myelin basic protein, and protamine. They depend on calcium, DAG (1,2-diacylglycerol), and in most cases, phosphatidylserine (PS) for activation. cPKCs contain a calcium-binding C2 region in their regulatory domain. There are four cPKC isoforms, named alpha, betaI, betaII, and gamma. PKC-gamma is mainly expressed in neuronal tissues. It plays a role in protection from ischemia. PKCs are classified into three groups (classical, atypical, and novel) depending on their mode of activation and the structural characteristics of their regulatory domain. The cPKC subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05587); members share this curated model.
