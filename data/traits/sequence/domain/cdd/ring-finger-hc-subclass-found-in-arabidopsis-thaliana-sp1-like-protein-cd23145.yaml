label: "RING finger, HC subclass, found in Arabidopsis thaliana SP1-like protein 2 (SPL2) and similar proteins. SPL2, also known as RING-type E3 ubiquitin transferase SPL2, acts as an E3 ubiquitin-protein ligase that mediates E2-dependent protein ubiquitination. SPL2 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana SP1-like protein 2 (SPL2) and similar proteins. SPL2, also known as RING-type E3 ubiquitin transferase SPL2, acts as an E3 ubiquitin-protein ligase that mediates E2-dependent protein ubiquitination. SPL2 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23145); members share this curated model.
