identifier: CDD:cd11437
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in aryl hydrocarbon receptor nuclear translocator (ARNT) family. The ARNT family of bHLH-PAS transcription regulators includes ARNT, ARNT-like proteins (ARNTL and ARNTL2), and Drosophila melanogaster protein cycle. They act as the heterodimeric partner for bHLH-PAS proteins such as aryl hydrocarbon receptor (AhR), hypoxia-inducible factor (HIF), and single-minded (SIM). These bHLH-PAS transcription complexes are involved in transcriptional responses to xenobiotic, hypoxia, and developmental pathways. Heterodimerization of bHLH-PAS proteins with ARNT is mediated by contacts between both the bHLH and the tandem PAS domains. ARNT use bHLH and/or PAS domains to interact with several transcriptional coactivators. It is required for activity of the aryl hydrocarbon (dioxin) receptor. ARNTL, also termed Basic-helix-loop-helix-PAS protein MOP3, or brain and muscle ARNT-like 1 (BMAL1), or Class E basic helix-loop-helix protein 5 (bHLHe5), or member of PAS protein 3, or PAS domain-containing protein 3 (PASD3), or bHLH-PAS protein JAP3, is a member of the bHLH-PAS transcription factor family that forms heterodimers with another bHLH-PAS protein, CLOCK (circadian locomotor output cycle kaput), which regulates circadian rhythm. ARNTL-CLOCK heterodimer complex activates transcription from E-box (CANNTG) elements found in the promoter of circadian responsive genes. ARNTL is highly homologous to ARNT. ARNTL2, also termed Basic-helix-loop-helix-PAS protein MOP9, or brain and muscle ARNT-like 2 (BMAL2), or CYCLE-like factor (CLIF), or Class E basic helix-loop-helix protein 6 (bHLHe6), or member of PAS protein 9, or PAS domain-containing protein 9 (PASD9), is a neuronal bHLH-PAS transcriptional factor, regulating cell cycle progression and preventing cell death, whose sustained expression might ensure brain neuron survival. It also plays important roles in tumor angiogenesis. Protein cycle, also termed brain and muscle ARNT-like 1 (BMAL1), or MOP3, is a putative bHLH-PAS transcription factor involved in the generation of biological rhythms in Drosophila. It activates cycling transcription of Period (PER) and Timeless (TIM) by binding to the E-box (5'-CACGTG-3') present in their promoters."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in aryl hydrocarbon receptor nuclear translocator (ARNT) family. The ARNT family of bHLH-PAS transcription regulators includes ARNT, ARNT-like proteins (ARNTL and ARNTL2), and Drosophila melanogaster protein cycle. They act as the heterodimeric partner for bHLH-PAS proteins such as aryl hydrocarbon receptor (AhR), hypoxia-inducible factor (HIF), and single-minded (SIM). These bHLH-PAS transcription complexes are involved in transcriptional responses to xenobiotic, hypoxia, and developmental pathways. Heterodimerization of bHLH-PAS proteins with ARNT is mediated by contacts between both the bHLH and the tandem PAS domains. ARNT use bHLH and/or PAS domains to interact with several transcriptional coactivators. It is required for activity of the aryl hydrocarbon (dioxin) receptor. ARNTL, also termed Basic-helix-loop-helix-PAS protein MOP3, or brain and muscle ARNT-like 1 (BMAL1), or Class E basic helix-loop-helix protein 5 (bHLHe5), or member of PAS protein 3, or PAS domain-containing protein 3 (PASD3), or bHLH-PAS protein JAP3, is a member of the bHLH-PAS transcription factor family that forms heterodimers with another bHLH-PAS protein, CLOCK (circadian locomotor output cycle kaput), which regulates circadian rhythm. ARNTL-CLOCK heterodimer complex activates transcription from E-box (CANNTG) elements found in the promoter of circadian responsive genes. ARNTL is highly homologous to ARNT. ARNTL2, also termed Basic-helix-loop-helix-PAS protein MOP9, or brain and muscle ARNT-like 2 (BMAL2), or CYCLE-like factor (CLIF), or Class E basic helix-loop-helix protein 6 (bHLHe6), or member of PAS protein 9, or PAS domain-containing protein 9 (PASD9), is a neuronal bHLH-PAS transcriptional factor, regulating cell cycle progression and preventing cell death, whose sustained expression might ensure brain neuron survival. It also plays important roles in tumor angiogenesis. Protein cycle, also termed brain and muscle ARNT-like 1 (BMAL1), or MOP3, is a putative bHLH-PAS transcription factor involved in the generation of biological rhythms in Drosophila. It activates cycling transcription of Period (PER) and Timeless (TIM) by binding to the E-box (5'-CACGTG-3') present in their promoters. — an NCBI CDD conserved domain (cd11437); members share this curated model.
