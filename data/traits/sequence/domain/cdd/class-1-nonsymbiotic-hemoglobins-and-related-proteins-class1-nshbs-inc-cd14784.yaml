identifier: CDD:cd14784
label: "Class 1 nonsymbiotic hemoglobins and related proteins. Class1 nsHbs include the dimeric hexacoordinate Trema tomentosa nsHb and the dimeric hexacoordinate nsHb from monocot barley. This subfamily also includes ParaHb, a dimeric pentacoordinate Hb from the root nodules of Parasponia andersonii, a non-legume capable of symbiotic nitrogen fixation. ParaHb is unusual in that it has different heme redox potentials for each subunit."
definition: >-
  Class 1 nonsymbiotic hemoglobins and related proteins. Class1 nsHbs include the dimeric hexacoordinate Trema tomentosa nsHb and the dimeric hexacoordinate nsHb from monocot barley. This subfamily also includes ParaHb, a dimeric pentacoordinate Hb from the root nodules of Parasponia andersonii, a non-legume capable of symbiotic nitrogen fixation. ParaHb is unusual in that it has different heme redox potentials for each subunit. — an NCBI CDD conserved domain (cd14784); members share this curated model.
