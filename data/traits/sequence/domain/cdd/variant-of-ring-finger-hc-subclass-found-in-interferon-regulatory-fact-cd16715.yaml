identifier: CDD:cd16715
label: "variant of RING finger, HC subclass, found in interferon regulatory factor 2-binding protein 1 (IRF-2BP1). IRF-2BP1, also known as IRF-2-binding protein 1, is a nuclear protein that binds to the C-terminal repression domain of IRF-2 and acts as an IRF-2-dependent transcriptional corepressor, both enhancer-activated and basal transcription. It binds to Jun-dimerization protein 2 (JDP2), a member of the activating protein-1 (AP-1) family of transcription factors, and enhances the polyubiquitination of JDP2. It also represses activating transcription factor-2 (ATF2)-mediated transcriptional activation from a cyclic AMP-responsive element (CRE)-containing promoter. IRF-2BP1 contains an N-terminal C4-type zinc finger and a C-terminal variant C3HC4-type RING-HC finger."
definition: >-
  variant of RING finger, HC subclass, found in interferon regulatory factor 2-binding protein 1 (IRF-2BP1). IRF-2BP1, also known as IRF-2-binding protein 1, is a nuclear protein that binds to the C-terminal repression domain of IRF-2 and acts as an IRF-2-dependent transcriptional corepressor, both enhancer-activated and basal transcription. It binds to Jun-dimerization protein 2 (JDP2), a member of the activating protein-1 (AP-1) family of transcription factors, and enhances the polyubiquitination of JDP2. It also represses activating transcription factor-2 (ATF2)-mediated transcriptional activation from a cyclic AMP-responsive element (CRE)-containing promoter. IRF-2BP1 contains an N-terminal C4-type zinc finger and a C-terminal variant C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16715); members share this curated model.
