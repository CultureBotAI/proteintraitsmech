identifier: CDD:cd00559
label: "Cyanase C-terminal domain. Cyanase (Cyanate lyase) is responsible for the hydrolysis of cyanate.  It catalyzes the reaction of cyanate with bicarbonate to produce ammonia and carbon dioxide. This allows organisms that possess the enzyme to overcome the toxicity of environmental cyanate and to use cyanate as a source of nitrogen for growth. This enzyme is a homodecamer, formed by five dimers. Each monomer is composed of two domains, an N-terminal helix-turn-helix and this structurally unique C-terminal domain."
definition: >-
  Cyanase C-terminal domain. Cyanase (Cyanate lyase) is responsible for the hydrolysis of cyanate. It catalyzes the reaction of cyanate with bicarbonate to produce ammonia and carbon dioxide. This allows organisms that possess the enzyme to overcome the toxicity of environmental cyanate and to use cyanate as a source of nitrogen for growth. This enzyme is a homodecamer, formed by five dimers. Each monomer is composed of two domains, an N-terminal helix-turn-helix and this structurally unique C-terminal domain. — an NCBI CDD conserved domain (cd00559); members share this curated model.
