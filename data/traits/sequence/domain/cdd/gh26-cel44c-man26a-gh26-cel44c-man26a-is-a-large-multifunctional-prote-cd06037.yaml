label: GH26_Cel44C_Man26A
definition: >-
  GH26_Cel44C_Man26A. GH26 Cel44c-Man26A is a large multifunctional protein, present in bacteria and fungi, that contains a glycosyl hydrolase family 44 (GH44) catalytic domain, a fibronectin domain type 3, a glycosyl hydrolase family 26 (GH26) catalytic domain, and a cellulose-binding module type 3. The multifunctional GH44 domain has cellulase, xylanase, and lichenase activities, while the GH26 domain has mannanase activity. This alignment model represents the GH26 domain only
