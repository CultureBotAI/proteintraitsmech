identifier: CDD:cd08785
label: "Caspase activation and recruitment domain of CARD9 and related proteins. Caspase activation and recruitment domain (CARD) found in CARD9, CARD14 (CARMA2), CARD10 (CARMA3), CARD11 (CARMA1) and BCL10. BCL10 (B-cell lymphoma 10), together with Malt1 (mucosa-associated lymphoid tissue-lymphoma-translocation gene 1), are integral components of the CBM signalosome. They associate with CARD9 to form M-CBM (CBM complex in myeloid immune cells), and with CARD11 to form L-CBM (CBM complex in lymphoid immune cells), which mediates activation of NF-kB and MAPK by ITAM-coupled receptors expressed on immune cells. BCL10/Malt1 also associates with CARD10, which is more widely expressed and is not restricted to hematopoietic cells, to play a role in GPCR-induced NF-kB activation. CARD14 has also been shown to associate with BCL10. In general, CARDs are death domains (DDs) found associated with caspases. They are known to be important in the signaling pathways for apoptosis, inflammation, and host-defense mechanisms. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and DED (Death Effector Domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Caspase activation and recruitment domain of CARD9 and related proteins. Caspase activation and recruitment domain (CARD) found in CARD9, CARD14 (CARMA2), CARD10 (CARMA3), CARD11 (CARMA1) and BCL10. BCL10 (B-cell lymphoma 10), together with Malt1 (mucosa-associated lymphoid tissue-lymphoma-translocation gene 1), are integral components of the CBM signalosome. They associate with CARD9 to form M-CBM (CBM complex in myeloid immune cells), and with CARD11 to form L-CBM (CBM complex in lymphoid immune cells), which mediates activation of NF-kB and MAPK by ITAM-coupled receptors expressed on immune cells. BCL10/Malt1 also associates with CARD10, which is more widely expressed and is not restricted to hematopoietic cells, to play a role in GPCR-induced NF-kB activation. CARD14 has also been shown to associate with BCL10. In general, CARDs are death domains (DDs) found associated with caspases. They are known to be important in the signaling pathways for apoptosis, inflammation, and host-defense mechanisms. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and DED (Death Effector Domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08785); members share this curated model.
