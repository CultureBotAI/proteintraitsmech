identifier: CDD:cd16729
label: "RING finger, HC subclass, found in RING domain ligase RGLG1, RGLG2 and similar proteins from plant. RGLG1 is a ubiquitously expressed E3 ubiquitin-protein ligase that interacts with UBC13 and, together with UBC13, catalyzes the formation of K63-linked polyubiquitin chains, which is involved in DNA damage repair. RGLG1 mediates the formation of canonical, K48-linked polyubiquitin chains that target proteins for degradation. It also regulates apical dominance by acting on the auxin transport proteins abundance. RGLG1 has overlapping functions with its closest sequelog, RGLG2. They both function as RING E3 ligases that interact with ethylene response factor 53 (ERF53) in the nucleus and negatively regulate the plant drought stress response. Members of this subfamily contain a Von Willebrand factor type A (vWA) domain and a C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING domain ligase RGLG1, RGLG2 and similar proteins from plant. RGLG1 is a ubiquitously expressed E3 ubiquitin-protein ligase that interacts with UBC13 and, together with UBC13, catalyzes the formation of K63-linked polyubiquitin chains, which is involved in DNA damage repair. RGLG1 mediates the formation of canonical, K48-linked polyubiquitin chains that target proteins for degradation. It also regulates apical dominance by acting on the auxin transport proteins abundance. RGLG1 has overlapping functions with its closest sequelog, RGLG2. They both function as RING E3 ligases that interact with ethylene response factor 53 (ERF53) in the nucleus and negatively regulate the plant drought stress response. Members of this subfamily contain a Von Willebrand factor type A (vWA) domain and a C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16729); members share this curated model.
