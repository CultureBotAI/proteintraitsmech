identifier: CDD:cd17602
label: "phosphoacceptor receiver (REC) domain of PatA and similar domains. Nostoc sp. (or Anabaena sp.) PatA is necessary for proper patterning of heterocysts along filaments. PatA contains phosphoacceptor REC domain at its C-terminus and an N-terminal PATAN (PatA N-terminus) domain, which was proposed in a bioinformatics study to mediate protein-protein interactions. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. Some members of this group may have an inactive REC domain, lacking canonical metal-binding and active site residues."
definition: >-
  phosphoacceptor receiver (REC) domain of PatA and similar domains. Nostoc sp. (or Anabaena sp.) PatA is necessary for proper patterning of heterocysts along filaments. PatA contains phosphoacceptor REC domain at its C-terminus and an N-terminal PATAN (PatA N-terminus) domain, which was proposed in a bioinformatics study to mediate protein-protein interactions. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. Some members of this group may have an inactive REC domain, lacking canonical metal-binding and active site residues. — an NCBI CDD conserved domain (cd17602); members share this curated model.
