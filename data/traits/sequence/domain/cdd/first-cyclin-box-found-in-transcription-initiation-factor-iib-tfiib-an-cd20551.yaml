identifier: CDD:cd20551
label: "first cyclin box found in transcription initiation factor IIB (TFIIB) and similar proteins. TFIIB, also called B-related factor 2 (BRF-2) or S300-II, is a general transcription factor that plays a role in transcription initiation by RNA polymerase II (Pol II). It is involved in the pre-initiation complex (PIC) formation and Pol II recruitment at promoter DNA. TFIIB contains two cyclin boxes. This model corresponds to the first one. The cyclin box fold is generally a protein binding domain, but binds DNA in TFIIB."
definition: >-
  first cyclin box found in transcription initiation factor IIB (TFIIB) and similar proteins. TFIIB, also called B-related factor 2 (BRF-2) or S300-II, is a general transcription factor that plays a role in transcription initiation by RNA polymerase II (Pol II). It is involved in the pre-initiation complex (PIC) formation and Pol II recruitment at promoter DNA. TFIIB contains two cyclin boxes. This model corresponds to the first one. The cyclin box fold is generally a protein binding domain, but binds DNA in TFIIB. — an NCBI CDD conserved domain (cd20551); members share this curated model.
