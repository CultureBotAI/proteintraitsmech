identifier: CDD:cd04355
label: Alpha_Subunit_MPP
definition: >-
  Mitochondrial processing peptidase (MPP) is a metalloendopeptidase consisting of alpha- and beta-subunits, only one of which, Beta, harbors the proteolytic active site. Each of the subunits, Alpha and Beta, is a result of fusion of two homologous domains. Each of these two domains is in turn homologous to LuxS. The peptidases coordinate a Zinc ion. MPP localizes to the matrix of the mitochondria, in some cases it is a part of the cytochrome bc1 complex. MPP cleaves the N-terminal presequence of mitochondrial protein precursors, transported into mitochondria from the cytoplasm
