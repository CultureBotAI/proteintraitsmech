identifier: CDD:cd11000
label: "RNAP sigma factor 24, alternative sigma factors E and W. Along with sigma factor 24, Sigma E is an alternative sigma factor found in E.coli which is programmed to respond to environmental stress, or conditions that would lead to protein degeneration, as well as directing promoter specificity in transcription. In Bacillus subtilis, Sigma E is involved in the sporulation process of the organism. Sigma W is an ECF (Extra-cytoplasmic function) alternative sigma factor found in Bacillus subtilis and performs the a similar function, respectively. The regulon for Sigma W also overlaps the regulon for another alternative sigma factor in Bacillus subtilis, Sigma X. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs."
definition: >-
  RNAP sigma factor 24, alternative sigma factors E and W. Along with sigma factor 24, Sigma E is an alternative sigma factor found in E.coli which is programmed to respond to environmental stress, or conditions that would lead to protein degeneration, as well as directing promoter specificity in transcription. In Bacillus subtilis, Sigma E is involved in the sporulation process of the organism. Sigma W is an ECF (Extra-cytoplasmic function) alternative sigma factor found in Bacillus subtilis and performs the a similar function, respectively. The regulon for Sigma W also overlaps the regulon for another alternative sigma factor in Bacillus subtilis, Sigma X. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs. — an NCBI CDD conserved domain (cd11000); members share this curated model.
