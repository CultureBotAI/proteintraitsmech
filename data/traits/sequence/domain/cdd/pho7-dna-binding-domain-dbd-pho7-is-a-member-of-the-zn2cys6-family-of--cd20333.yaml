identifier: CDD:cd20333
label: "Pho7 DNA Binding Domain (DBD). Pho7 is a member of the Zn2Cys6 family of fungal DNA-binding transcription regulators. Pho7 is a transcriptional activator that activates genes such as a cell surface acid phosphatase Pho1, an inorganic phosphate transporter Pho84, and a glycerophosphate transporter Tgp1 to response to phosphate starvation in fission yeast."
definition: >-
  Pho7 DNA Binding Domain (DBD). Pho7 is a member of the Zn2Cys6 family of fungal DNA-binding transcription regulators. Pho7 is a transcriptional activator that activates genes such as a cell surface acid phosphatase Pho1, an inorganic phosphate transporter Pho84, and a glycerophosphate transporter Tgp1 to response to phosphate starvation in fission yeast. — an NCBI CDD conserved domain (cd20333); members share this curated model.
