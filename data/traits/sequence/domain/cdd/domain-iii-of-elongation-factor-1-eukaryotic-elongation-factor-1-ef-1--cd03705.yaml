identifier: CDD:cd03705
label: "Domain III of Elongation Factor 1. Eukaryotic elongation factor 1 (EF-1) is responsible for the GTP-dependent binding of aminoacyl-tRNAs to ribosomes. EF-1 is composed of four subunits: the alpha chain, which binds GTP and aminoacyl-tRNAs; the gamma chain that probably plays a role in anchoring the complex to other cellular components; and the beta and delta (or beta') chains. This model represents the alpha subunit, which is the counterpart of bacterial EF-Tu for archaea (aEF-1 alpha) and eukaryotes (eEF-1 alpha)."
definition: >-
  Domain III of Elongation Factor 1. Eukaryotic elongation factor 1 (EF-1) is responsible for the GTP-dependent binding of aminoacyl-tRNAs to ribosomes. EF-1 is composed of four subunits: the alpha chain, which binds GTP and aminoacyl-tRNAs; the gamma chain that probably plays a role in anchoring the complex to other cellular components; and the beta and delta (or beta') chains. This model represents the alpha subunit, which is the counterpart of bacterial EF-Tu for archaea (aEF-1 alpha) and eukaryotes (eEF-1 alpha). — an NCBI CDD conserved domain (cd03705); members share this curated model.
