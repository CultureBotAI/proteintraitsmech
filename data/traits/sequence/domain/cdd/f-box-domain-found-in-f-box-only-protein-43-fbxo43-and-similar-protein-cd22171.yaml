identifier: CDD:cd22171
label: "F-box domain found in F-box only protein 43 (FBXO43) and similar proteins. FBXO43, also called FBX43, or endogenous meiotic inhibitor 2 (EMI2), plays a key role during the meiotic cell cycle. It is required to establish and maintain the arrest of oocytes at the second meiotic metaphase until fertilization. It probably acts by inhibiting the anaphase-promoting complex/cyclosome (APC/C) ubiquitin ligase. It may recognize and bind to some phosphorylated proteins and promote their ubiquitination and degradation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 43 (FBXO43) and similar proteins. FBXO43, also called FBX43, or endogenous meiotic inhibitor 2 (EMI2), plays a key role during the meiotic cell cycle. It is required to establish and maintain the arrest of oocytes at the second meiotic metaphase until fertilization. It probably acts by inhibiting the anaphase-promoting complex/cyclosome (APC/C) ubiquitin ligase. It may recognize and bind to some phosphorylated proteins and promote their ubiquitination and degradation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22171); members share this curated model.
