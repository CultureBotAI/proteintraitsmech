identifier: CDD:cd20191
label: "DNA-binding domain of T-box transcription factor 15, 18 and 22, and related T-box proteins. This subfamily includes the transcriptional regulators TBX15, TBX18 and TBX22 which are involved in various developmental processes. TBX15 (also known as TBX14) plays an important role in the development of the skeleton of the limb, vertebral column and head, possibly through its control of the number of mesenchymal precursor cells and chondrocytes; it also plays a role in the differentiation of brown and brite adipocytes. TBX18 is involved in the developmental processes of a variety of tissues and organs, including the ureter, vertebral column. epicardium and coronary vessels; it is important for the development of the head portion of the sino atrial node (SAN). Mutations in the T-box transcription factor gene TBX22 are found in X-linked Cleft Palate with or without Ankyloglossia syndrome (CPX syndrome), and associated with cleft lip and palate, and tooth agenesis. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
  DNA-binding domain of T-box transcription factor 15, 18 and 22, and related T-box proteins. This subfamily includes the transcriptional regulators TBX15, TBX18 and TBX22 which are involved in various developmental processes. TBX15 (also known as TBX14) plays an important role in the development of the skeleton of the limb, vertebral column and head, possibly through its control of the number of mesenchymal precursor cells and chondrocytes; it also plays a role in the differentiation of brown and brite adipocytes. TBX18 is involved in the developmental processes of a variety of tissues and organs, including the ureter, vertebral column. epicardium and coronary vessels; it is important for the development of the head portion of the sino atrial node (SAN). Mutations in the T-box transcription factor gene TBX22 are found in X-linked Cleft Palate with or without Ankyloglossia syndrome (CPX syndrome), and associated with cleft lip and palate, and tooth agenesis. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. — an NCBI CDD conserved domain (cd20191); members share this curated model.
