identifier: CDD:cd18496
label: BACK_LGALS3BP
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in lectin galactoside-binding soluble 3-binding protein (LGALS3BP). LGALS3BP, also called galectin-3-binding protein, or basement membrane autoantigen p105, or Mac-2-binding protein (MAC2BP/M2BP), or tumor-associated antigen 90K, promotes integrin-mediated cell adhesion. It may stimulate host defense against viruses and tumor cells
