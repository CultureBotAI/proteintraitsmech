identifier: CDD:cd05940
label: "Fatty acid transport proteins (FATP) play dual roles as fatty acid transporters and its activation enzymes. Fatty acid transport protein (FATP) transports long-chain or very-long-chain fatty acids across the plasma membrane. FATPs also have fatty acid CoA synthetase activity, thus playing dual roles as fatty acid transporters and its activation enzymes. At least five copies of FATPs are identified in mammalian cells. This family also includes prokaryotic FATPs. FATPs are the key players in the trafficking of exogenous fatty acids into the cell and in intracellular fatty acid homeostasis."
definition: >-
