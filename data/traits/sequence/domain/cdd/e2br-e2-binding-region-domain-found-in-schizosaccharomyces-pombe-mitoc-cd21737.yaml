label: E2BR_CUE4
definition: >-
  E2BR (E2-binding region) domain found in Schizosaccharomyces pombe mitochondrial CUE domain-containing protein 4 (CUE4). Although the biological function of S. pombe CUE4 remains unclear, it contains an E2BR domain, which recruits soluble endoplasmic reticulum (ER)-associated degradation (ERAD) E2 enzymes to the ER
