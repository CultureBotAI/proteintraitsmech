identifier: CDD:cd09447
label: "The LIM domain of LIM and SH3 Protein (LASP). The LIM domain of LIM and SH3 Protein (LASP):  LASP family contains two highly homologous members, LASP-1 and LASP-2. LASP contains a LIM motif at its amino terminus, a src homology 3 (SH3) domains at its C-terminal part, and a nebulin-like region in the middle. LASP-1 and -2 are highly conserved in their LIM, nebulin-like, and SH3 domains ,but differ significantly at their linker regions. Both proteins are ubiquitously expressed and involved in cytoskeletal architecture, especially in the organization of focal adhesions. LASP-1 and LASP-2, are important during early embryo- and fetogenesis and are highly expressed in the central nervous system of the adult. However, only LASP-1 seems to participate significantly in neuronal differentiation and plays an important functional role in migration and proliferation of certain cancer cells while the role of LASP-2 is more structural. The expression of LASP-1 in breast tumors is increased significantly. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  The LIM domain of LIM and SH3 Protein (LASP). The LIM domain of LIM and SH3 Protein (LASP): LASP family contains two highly homologous members, LASP-1 and LASP-2. LASP contains a LIM motif at its amino terminus, a src homology 3 (SH3) domains at its C-terminal part, and a nebulin-like region in the middle. LASP-1 and -2 are highly conserved in their LIM, nebulin-like, and SH3 domains ,but differ significantly at their linker regions. Both proteins are ubiquitously expressed and involved in cytoskeletal architecture, especially in the organization of focal adhesions. LASP-1 and LASP-2, are important during early embryo- and fetogenesis and are highly expressed in the central nervous system of the adult. However, only LASP-1 seems to participate significantly in neuronal differentiation and plays an important functional role in migration and proliferation of certain cancer cells while the role of LASP-2 is more structural. The expression of LASP-1 in breast tumors is increased significantly. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09447); members share this curated model.
