identifier: CDD:cd19019
label: "extracellular domain of nicotinic acetylcholine receptor subunit alpha 6 (CHRNA6). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit alpha 6 (alpha6), encoded by the CHRNA6 gene. Human (alpha6beta2)(alpha4beta2)3 nicotinic acetylcholine receptors (AChRs) are essential for addiction to nicotine and a target for drug development for smoking cessation. In xenopus oocytes, data show efficient expression of (alpha6beta2)2beta3 AChR subunits with only small changes in alpha6 subunits, while not altering AChR pharmacology or channel structure. Alternatively spliced transcript variants have been observed for this gene. Single nucleotide polymorphisms in this gene have been associated with both nicotine and alcohol dependence. CHRNA6 has a cellular expression signature for retinal ganglion cells with high correlation to Thy1, a known marker, and is preferentially expressed by retinal ganglion cells (RGCs) in the young and adult mouse retina and expression is reduced in glaucoma. A genetic variant in CHRNB3#CHRNA6 cluster is associated with esophageal adenocarcinoma."
definition: >-
  extracellular domain of nicotinic acetylcholine receptor subunit alpha 6 (CHRNA6). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit alpha 6 (alpha6), encoded by the CHRNA6 gene. Human (alpha6beta2)(alpha4beta2)3 nicotinic acetylcholine receptors (AChRs) are essential for addiction to nicotine and a target for drug development for smoking cessation. In xenopus oocytes, data show efficient expression of (alpha6beta2)2beta3 AChR subunits with only small changes in alpha6 subunits, while not altering AChR pharmacology or channel structure. Alternatively spliced transcript variants have been observed for this gene. Single nucleotide polymorphisms in this gene have been associated with both nicotine and alcohol dependence. CHRNA6 has a cellular expression signature for retinal ganglion cells with high correlation to Thy1, a known marker, and is preferentially expressed by retinal ganglion cells (RGCs) in the young and adult mouse retina and expression is reduced in glaucoma. A genetic variant in CHRNB3#CHRNA6 cluster is associated with esophageal adenocarcinoma. — an NCBI CDD conserved domain (cd19019); members share this curated model.
