identifier: CDD:cd08481
label: "The C-terminal substrate binding domain of LysR-type transcriptional regulators GcdR-like, contains the type 2 periplasmic binding fold. GcdR is involved in the glutaconate/glutarate-specific activation of the Pg promoter driving expression of a glutaryl-CoA dehydrogenase-encoding gene (gcdH). The GcdH protein is essential for the anaerobic catabolism of many aromatic compounds and some alicyclic and dicarboxylic acids.  The structural topology of this substrate-binding domain is most similar to the type 2 periplasmic binding proteins (PBP2), which are responsible for the uptake of a variety of substrates such as phosphate, sulfate, polysaccharides, lysine/arginine/ornithine, and histidine. The PBP2 bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis."
definition: >-
  The C-terminal substrate binding domain of LysR-type transcriptional regulators GcdR-like, contains the type 2 periplasmic binding fold. GcdR is involved in the glutaconate/glutarate-specific activation of the Pg promoter driving expression of a glutaryl-CoA dehydrogenase-encoding gene (gcdH). The GcdH protein is essential for the anaerobic catabolism of many aromatic compounds and some alicyclic and dicarboxylic acids. The structural topology of this substrate-binding domain is most similar to the type 2 periplasmic binding proteins (PBP2), which are responsible for the uptake of a variety of substrates such as phosphate, sulfate, polysaccharides, lysine/arginine/ornithine, and histidine. The PBP2 bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. — an NCBI CDD conserved domain (cd08481); members share this curated model.
