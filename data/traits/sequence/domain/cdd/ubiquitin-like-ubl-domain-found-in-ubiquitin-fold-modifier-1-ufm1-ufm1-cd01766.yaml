identifier: CDD:cd01766
label: "ubiquitin-like (Ubl) domain found in ubiquitin fold modifier 1 (UFM1). UFM1 belongs to the ubiquitin-like protein family with similar ubiquitin beta-grasp folds and mechanism of ligation to other proteins. UFM1 is present in nearly all eukaryotic organisms except fungi. Ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. The UNF1 cascade has been implicated in endoplasmic reticulum functions, cell cycle control and cell differentiation. The involvement of the UFM1 cascade in diseases is diverse; reports include its involvement in ischemic heart diseases, diabetes, gastric lesions, schizophrenia, hip dysplasia and cancer."
definition: >-
