identifier: CDD:cd17455
label: "Feline leukemia virus subgroup C receptor-related protein 1 of the Major Facilitator Superfamily of transporters. Feline leukemia virus subgroup C receptor-related protein 1 (FLVCR1) is also called feline leukemia virus subgroup C receptor (FLVCR). FLVCR1 is a heme transporter and it has two isoforms: 1 (or FLVCR1a), which exports cytoplasmic heme as well as coproporphyrin and protoporphyrin IX; and 2 (FLVCR1b), which promotes heme efflux from the mitochondrion to the cytoplasm. Mutations in the FLVCR1 gene have been linked to vision impairment, posterior column ataxia, and sensory neurodegeneration with loss of pain perception. FLVCR1 belongs to the Solute carrier 49 (SLC49) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Feline leukemia virus subgroup C receptor-related protein 1 of the Major Facilitator Superfamily of transporters. Feline leukemia virus subgroup C receptor-related protein 1 (FLVCR1) is also called feline leukemia virus subgroup C receptor (FLVCR). FLVCR1 is a heme transporter and it has two isoforms: 1 (or FLVCR1a), which exports cytoplasmic heme as well as coproporphyrin and protoporphyrin IX; and 2 (FLVCR1b), which promotes heme efflux from the mitochondrion to the cytoplasm. Mutations in the FLVCR1 gene have been linked to vision impairment, posterior column ataxia, and sensory neurodegeneration with loss of pain perception. FLVCR1 belongs to the Solute carrier 49 (SLC49) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17455); members share this curated model.
