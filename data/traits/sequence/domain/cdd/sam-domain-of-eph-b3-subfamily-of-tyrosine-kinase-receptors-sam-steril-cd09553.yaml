identifier: CDD:cd09553
label: "SAM domain of EPH-B3 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-B3 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-B3 receptors and appears to mediate cell-cell initiated signal transduction. EPH-B3 receptor protein kinase performs kinase-dependent and kinase-independent functions. It is known to be involved in thymus morphogenesis, in regulation of cell adhesion and migration. Also EphB3 controls cell positioning and ordered migration in the intestinal epithelium and plays a role in the regulation of adult retinal ganglion cell axon plasticity after optic nerve injury. In some experimental models overexpression of EphB3 enhances cell/cell contacts and suppresses colon tumor growth."
definition: >-
  SAM domain of EPH-B3 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-B3 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-B3 receptors and appears to mediate cell-cell initiated signal transduction. EPH-B3 receptor protein kinase performs kinase-dependent and kinase-independent functions. It is known to be involved in thymus morphogenesis, in regulation of cell adhesion and migration. Also EphB3 controls cell positioning and ordered migration in the intestinal epithelium and plays a role in the regulation of adult retinal ganglion cell axon plasticity after optic nerve injury. In some experimental models overexpression of EphB3 enhances cell/cell contacts and suppresses colon tumor growth. — an NCBI CDD conserved domain (cd09553); members share this curated model.
