identifier: CDD:cd16523
label: "RING finger, HC subclass, found in myosin regulatory light chain interacting protein (MYLIP) and similar proteins. MYLIP, also known as inducible degrader of the low-density lipoprotein (LDL)-receptor (IDOL), or MIR, is an E3 ubiquitin-protein ligase that mediates ubiquitination and subsequent proteasomal degradation of myosin regulatory light chain (MRLC), LDLR, VLDLR, and LRP8. Its activity depends on E2 ubiquitin-conjugating enzymes of the UBE2D family. MYLIP stimulates clathrin-independent endocytosis and acts as a sterol-dependent inhibitor of cellular cholesterol uptake by binding directly to the cytoplasmic tail of the LDLR and promoting its ubiquitination via the UBE2D1/E1 complex. The ubiquitinated LDLR then enters the multivesicular body (MVB) protein-sorting pathway and is shuttled to the lysosome for degradation. Moreover, MYLIP has been identified as a novel ERM-like protein that affects cytoskeleton interactions regulating cell motility, such as neurite outgrowth. The ERM proteins includes ezrin, radixin, and moesin, which are cytoskeletal effector proteins linking actin to membrane-bound proteins at the cell surface. MYLIP contains an ERM-homology domain and a C-terminal C3HC4-type RING-HC finger."
definition: >-
