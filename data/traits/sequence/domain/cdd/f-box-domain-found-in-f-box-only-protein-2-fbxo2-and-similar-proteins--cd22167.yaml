identifier: CDD:cd22167
label: F-box_FBXO2
definition: >-
  F-box domain found in F-box only protein 2 (FBXO2) and similar proteins. FBXO2, also called FBX2, is a neuron-specific substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex that mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It binds specifically to proteins attached with N-linked high-mannose type oligosaccharides, and subsequently contributes to ubiquitination of glycoproteins. FBXO2 regulates amyloid precursor protein (APP) levels and processing in the brain, and may play a role in modulating Alzheimer disease (AD) pathogenesis. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression
