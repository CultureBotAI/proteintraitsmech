identifier: CDD:cd20514
label: "second cyclin box found in cyclin-C (CCNC) and similar proteins. CCNC, also termed CycC, or SRB11, is a component of the Mediator complex, a coactivator involved in regulated gene transcription of nearly all RNA polymerase II-dependent genes. It mediates stress-induced mitochondrial fission and apoptosis. CCNC contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in cyclin-C (CCNC) and similar proteins. CCNC, also termed CycC, or SRB11, is a component of the Mediator complex, a coactivator involved in regulated gene transcription of nearly all RNA polymerase II-dependent genes. It mediates stress-induced mitochondrial fission and apoptosis. CCNC contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20514); members share this curated model.
