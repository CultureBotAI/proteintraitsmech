identifier: CDD:cd11504
label: "Na(+)/multivitamin cotransporter SMVT and related proteins; solute-binding domain. This multivitamin transporter SMVT (product of the SLC5A6 gene) transports biotin, pantothenic acid and lipoate, and is essential for mediating biotin uptake into mammalian cells. SMVT is expressed in the placenta, intestine, heart, brain, lung, liver, kidney and pancreas. Biotin may regulate its own cellular uptake through participation in holocarboxylase synthetase-dependent chromatin remodeling events at SMVT promoter loci. The cis regulatory elements, Kruppel-like factor 4 and activator protein-2, regulate the activity of the human SMVT promoter in the intestine. Glycosylation of the hSMVT is important for its transport function. This subgroup belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
