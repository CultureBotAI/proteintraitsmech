identifier: CDD:cd08185
label: "Iron-containing alcohol dehydrogenases-like. This family contains iron-containing alcohol dehydrogenase-like (ADH) proteins. Alcohol dehydrogenase catalyzes the reduction of acetaldehyde to alcohol with NADP as cofactor. Its activity requires iron ions. The protein structure represents a dehydroquinate synthase fold and is a member of the iron-containing alcohol dehydrogenase-like family. They are distinct from other alcohol dehydrogenases which contain different protein domains. Proteins of this family have not been characterized."
definition: >-
  Iron-containing alcohol dehydrogenases-like. This family contains iron-containing alcohol dehydrogenase-like (ADH) proteins. Alcohol dehydrogenase catalyzes the reduction of acetaldehyde to alcohol with NADP as cofactor. Its activity requires iron ions. The protein structure represents a dehydroquinate synthase fold and is a member of the iron-containing alcohol dehydrogenase-like family. They are distinct from other alcohol dehydrogenases which contain different protein domains. Proteins of this family have not been characterized. — an NCBI CDD conserved domain (cd08185); members share this curated model.
