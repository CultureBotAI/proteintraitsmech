identifier: CDD:cd15624
label: "PHD finger found in transcriptional intermediary factor 1 gamma (TIF1gamma). TIF1gamma, also termed tripartite motif-containing 33 (trim33), or ectodermin, or RFG7, or PTC7, is an E3-ubiquitin ligase that functions as a regulator of transforming growth factor beta (TGFbeta) signaling; it inhibits the Smad4-mediated TGFbeta response by interaction with Smad2/3 or ubiquitylation of Smad4. Moreover, TIF1gamma is an important regulator of transcription during hematopoiesis, as well as a key factor of tumorigenesis. Like other TIF1 family members, TIF1gamma also contains an intrinsic transcriptional silencing function. It can control erythroid cell fate by regulating transcription elongation. It can bind to the anaphase-promoting complex/cyclosome (APC/C) and promotes mitosis. TIF1gamma contains an N-terminal RBCC (RING finger, B-box zinc-fingers, coiled-coil), a plant homeodomain (PHD) finger, followed by a bromodomain in the C-terminal region."
definition: >-
  PHD finger found in transcriptional intermediary factor 1 gamma (TIF1gamma). TIF1gamma, also termed tripartite motif-containing 33 (trim33), or ectodermin, or RFG7, or PTC7, is an E3-ubiquitin ligase that functions as a regulator of transforming growth factor beta (TGFbeta) signaling; it inhibits the Smad4-mediated TGFbeta response by interaction with Smad2/3 or ubiquitylation of Smad4. Moreover, TIF1gamma is an important regulator of transcription during hematopoiesis, as well as a key factor of tumorigenesis. Like other TIF1 family members, TIF1gamma also contains an intrinsic transcriptional silencing function. It can control erythroid cell fate by regulating transcription elongation. It can bind to the anaphase-promoting complex/cyclosome (APC/C) and promotes mitosis. TIF1gamma contains an N-terminal RBCC (RING finger, B-box zinc-fingers, coiled-coil), a plant homeodomain (PHD) finger, followed by a bromodomain in the C-terminal region. — an NCBI CDD conserved domain (cd15624); members share this curated model.
