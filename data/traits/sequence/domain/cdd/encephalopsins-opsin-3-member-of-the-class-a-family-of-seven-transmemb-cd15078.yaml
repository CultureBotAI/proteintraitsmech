identifier: CDD:cd15078
label: "encephalopsins (opsin-3), member of the class A family of seven-transmembrane G protein-coupled receptors. Encephalopsin, also called Opsin-3 or Panopsin, is a mammalian extra-retinal opsin that is highly localized in the brain. It is thought to play a role in encephalic photoreception. Encephalopsin belongs to the class A of the G protein-coupled receptors and shows strong homology to the vertebrate visual opsins."
definition: >-
