identifier: CDD:cd11714
label: "Alpha-helical domain of archaeal GINS complex proteins. The GINS complex is involved in replication of archaeal and eukayotic genomes. The archaeal DNA replication system is a simplified version of that of the eukaryotes. Like its eukaryotic counterpart, the archaeal GINS complex is tetrameric, but instead of four different subunits (Sld5, Psf1, Psf2 and Psf3) it consists of two different proteins named Gins51 and Gins23. All GINS subunits are homologs and they can be classified into two groups. One group (the eukayotic Sld5 and Psf1, as well as the archaeal Gins51) has the alpha-helical (A) domain at the N-terminus and the beta-strand domain (B) at the C-terminus (this arrangement is called ABtype). The arrangement of the A and B domains is reversed in the second group (eukaryotic Psf2 and Psf3 and archaeal Gins23, also referred to as BAtype). The overall fold of each archaeal subunit and the overall tetrameric assembly of GINS are similar, but the relative locations of the C-terminal small domains are different with respect to the alpha helical domain characterized by this model, resulting in different subunit contacts in the archaeal GINS complex.Some archaea may have a homotetrameric GINS complex (4 copies of an AB-type module)."
definition: >-
  Alpha-helical domain of archaeal GINS complex proteins. The GINS complex is involved in replication of archaeal and eukayotic genomes. The archaeal DNA replication system is a simplified version of that of the eukaryotes. Like its eukaryotic counterpart, the archaeal GINS complex is tetrameric, but instead of four different subunits (Sld5, Psf1, Psf2 and Psf3) it consists of two different proteins named Gins51 and Gins23. All GINS subunits are homologs and they can be classified into two groups. One group (the eukayotic Sld5 and Psf1, as well as the archaeal Gins51) has the alpha-helical (A) domain at the N-terminus and the beta-strand domain (B) at the C-terminus (this arrangement is called ABtype). The arrangement of the A and B domains is reversed in the second group (eukaryotic Psf2 and Psf3 and archaeal Gins23, also referred to as BAtype). The overall fold of each archaeal subunit and the overall tetrameric assembly of GINS are similar, but the relative locations of the C-terminal small domains are different with respect to the alpha helical domain characterized by this model, resulting in different subunit contacts in the archaeal GINS complex.Some archaea may have a homotetrameric GINS complex (4 copies of an AB-type module). — an NCBI CDD conserved domain (cd11714); members share this curated model.
