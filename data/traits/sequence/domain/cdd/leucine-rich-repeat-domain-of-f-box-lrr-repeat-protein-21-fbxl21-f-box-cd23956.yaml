identifier: CDD:cd23956
label: "Leucine-rich repeat domain of F-box/LRR-repeat protein 21. FBXL21 (F-box/LRR-repeat protein 21) stabilizes CRY repressor proteins through ubiquitination and therefore counteracts FBXL3. FBXL3 (F-box/LRR-repeat protein 3), together with SKP1 (S-phase-kinase-associated protein-1) and the cullin subunit CUL1, forms a Skp1-Cul1-F-box-protein (SCF) ubiquitin ligase complex that ubiquitinates CRYs mediating their degradation. This plays an important role in oscillation of the circadian clock. FBXL21 has also been shown to regulate myoblast differentiation and sarcomere architecture via Myozenin 1 (MYOZ1; calsarcin-2) ubiquitination and NFAT signaling."
definition: >-
  Leucine-rich repeat domain of F-box/LRR-repeat protein 21. FBXL21 (F-box/LRR-repeat protein 21) stabilizes CRY repressor proteins through ubiquitination and therefore counteracts FBXL3. FBXL3 (F-box/LRR-repeat protein 3), together with SKP1 (S-phase-kinase-associated protein-1) and the cullin subunit CUL1, forms a Skp1-Cul1-F-box-protein (SCF) ubiquitin ligase complex that ubiquitinates CRYs mediating their degradation. This plays an important role in oscillation of the circadian clock. FBXL21 has also been shown to regulate myoblast differentiation and sarcomere architecture via Myozenin 1 (MYOZ1; calsarcin-2) ubiquitination and NFAT signaling. — an NCBI CDD conserved domain (cd23956); members share this curated model.
