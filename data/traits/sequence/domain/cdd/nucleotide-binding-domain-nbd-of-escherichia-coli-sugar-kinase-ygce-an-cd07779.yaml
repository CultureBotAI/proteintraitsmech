identifier: CDD:cd07779
label: "nucleotide-binding domain (NBD) of Escherichia coli sugar kinase YgcE and similar proteins. This subfamily contains a group of uncharacterized proteins with similarity to Escherichia coli sugar kinase YgcE. They belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli sugar kinase YgcE and similar proteins. This subfamily contains a group of uncharacterized proteins with similarity to Escherichia coli sugar kinase YgcE. They belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07779); members share this curated model.
