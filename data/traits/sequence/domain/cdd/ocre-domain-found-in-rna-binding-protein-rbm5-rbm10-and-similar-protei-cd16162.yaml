identifier: CDD:cd16162
label: "OCRE domain found in RNA-binding protein RBM5, RBM10, and similar proteins. RBM5 is a known modulator of apoptosis. It may also act as a tumor suppressor or an RNA splicing factor; it specifically binds poly(G) RNA. RBM10, a paralog of RBM5, may play an important role in mRNA generation, processing, and degradation in several cell types. The rat homolog of human RBM10 is protein S1-1, a hypothetical RNA binding protein with poly(G) and poly(U) binding capabilities. Both RBM5 and RBM10, contain two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), an OCtamer REpeat (OCRE) domain, two C2H2-type zinc fingers, and a G-patch/D111 domain."
definition: >-
  OCRE domain found in RNA-binding protein RBM5, RBM10, and similar proteins. RBM5 is a known modulator of apoptosis. It may also act as a tumor suppressor or an RNA splicing factor; it specifically binds poly(G) RNA. RBM10, a paralog of RBM5, may play an important role in mRNA generation, processing, and degradation in several cell types. The rat homolog of human RBM10 is protein S1-1, a hypothetical RNA binding protein with poly(G) and poly(U) binding capabilities. Both RBM5 and RBM10, contain two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), an OCtamer REpeat (OCRE) domain, two C2H2-type zinc fingers, and a G-patch/D111 domain. — an NCBI CDD conserved domain (cd16162); members share this curated model.
