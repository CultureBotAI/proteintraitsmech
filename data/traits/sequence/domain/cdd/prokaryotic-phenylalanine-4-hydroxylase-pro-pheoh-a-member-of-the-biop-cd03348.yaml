identifier: CDD:cd03348
label: "Prokaryotic phenylalanine-4-hydroxylase (pro_PheOH); a member of the biopterin-dependent aromatic amino acid hydroxylase family of non-heme, iron(II)-dependent enzymes that also includes the eukaryotic proteins, phenylalanine-4-hydroxylase (eu_PheOH), tyrosine hydroxylase (TyrOH) and tryptophan hydroxylase (TrpOH). PheOH catalyzes the hydroxylation of L-Phe to L-tyrosine (L-Tyr). It uses (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin (BH4) as the physiological electron donor."
definition: >-
  Prokaryotic phenylalanine-4-hydroxylase (pro_PheOH); a member of the biopterin-dependent aromatic amino acid hydroxylase family of non-heme, iron(II)-dependent enzymes that also includes the eukaryotic proteins, phenylalanine-4-hydroxylase (eu_PheOH), tyrosine hydroxylase (TyrOH) and tryptophan hydroxylase (TrpOH). PheOH catalyzes the hydroxylation of L-Phe to L-tyrosine (L-Tyr). It uses (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin (BH4) as the physiological electron donor. — an NCBI CDD conserved domain (cd03348); members share this curated model.
