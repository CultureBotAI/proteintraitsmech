identifier: CDD:cd24098
label: "N-terminal nucleotide-binding domain (NBD) of nebramycin 5' synthase (TobZ) and similar proteins. TobZ (EC 6.1.2.2), also called kanamycin A carbamoyltransferase, or tobramycin carbamoyltransferase, is involved in the biosynthesis of the 2-deoxystreptamine-containing aminoglycoside antibiotics such as nebramycin 5 and 6-O-carbamoylkanamycin. It catalyzes the hydrolysis of carbamoyl phosphate and its subsequent adenylation by ATP to yield O-carbamoyladenylate. Then it catalyzes the transfer of the carbamoyl moiety from O-carbamoyladenylate to the tobramycin 6-hydroxy group to yield nebramycin 5'. It catalyzes the same reaction with kanamycin A. These reactions are considerably slower in the presence of deoxy-ATP. TobZ consists of two major domains: the N-terminal Kae1-like domain is involved in the transfer of carbamoyl from O-carbamoyladenylate to tobramycin or kanamycin; the C-terminal YrdC-like domain is involved in the hydrolysis of carbamoyl phosphate and its subsequent adenylation by ATP. The model corresponds to the N-terminal domain."
definition: >-
  N-terminal nucleotide-binding domain (NBD) of nebramycin 5' synthase (TobZ) and similar proteins. TobZ (EC 6.1.2.2), also called kanamycin A carbamoyltransferase, or tobramycin carbamoyltransferase, is involved in the biosynthesis of the 2-deoxystreptamine-containing aminoglycoside antibiotics such as nebramycin 5 and 6-O-carbamoylkanamycin. It catalyzes the hydrolysis of carbamoyl phosphate and its subsequent adenylation by ATP to yield O-carbamoyladenylate. Then it catalyzes the transfer of the carbamoyl moiety from O-carbamoyladenylate to the tobramycin 6-hydroxy group to yield nebramycin 5'. It catalyzes the same reaction with kanamycin A. These reactions are considerably slower in the presence of deoxy-ATP. TobZ consists of two major domains: the N-terminal Kae1-like domain is involved in the transfer of carbamoyl from O-carbamoyladenylate to tobramycin or kanamycin; the C-terminal YrdC-like domain is involved in the hydrolysis of carbamoyl phosphate and its subsequent adenylation by ATP. The model corresponds to the N-terminal domain. — an NCBI CDD conserved domain (cd24098); members share this curated model.
