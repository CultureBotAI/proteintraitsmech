identifier: CDD:cd01662
label: "Ubiquinol oxidase subunit I.  Ubiquinol oxidase, the terminal oxidase in the respiratory chains of aerobic bacteria, is a multi-chain transmembrane protein located in the cell membrane.  It catalyzes the reduction of O2 and simultaneously pumps protons across the membrane. The number of subunits in ubiquinol oxidase varies from two to five. Subunit I contains a heme-copper binuclear center (the active site where O2 is reduced to water) formed by a high-spin heme and a copper ion.  It also contains a low-spin heme, believed to participate in the transfer of electrons from ubiquinol to the binuclear center.  For every reduction of an O2 molecule, eight protons are taken from the inside aqueous compartment and four electrons are taken from ubiquinol on the opposite side of the membrane.  The four electrons and four of the protons are used in the reduction of O2; the four remaining protons are pumped across the membrane. This charge separation of four charges contributes to the electrochemical gradient used for ATP synthesis.  Two proton channels, the D-pathway and K-pathway, leading to the binuclear center have been identified in subunit I.  It is generally believed that the channels contain water molecules that act as 'proton wires' to transfer the protons.  A well-defined pathway for the transfer of pumped protons beyond the binuclear center has not been identified.  Electrons are believed to be transferred directly from ubiquinol (the electron donor) to the low-spin heme, and directly from the low-spin heme to the binuclear center."
definition: >-
  Ubiquinol oxidase subunit I. Ubiquinol oxidase, the terminal oxidase in the respiratory chains of aerobic bacteria, is a multi-chain transmembrane protein located in the cell membrane. It catalyzes the reduction of O2 and simultaneously pumps protons across the membrane. The number of subunits in ubiquinol oxidase varies from two to five. Subunit I contains a heme-copper binuclear center (the active site where O2 is reduced to water) formed by a high-spin heme and a copper ion. It also contains a low-spin heme, believed to participate in the transfer of electrons from ubiquinol to the binuclear center. For every reduction of an O2 molecule, eight protons are taken from the inside aqueous compartment and four electrons are taken from ubiquinol on the opposite side of the membrane. The four electrons and four of the protons are used in the reduction of O2; the four remaining protons are pumped across the membrane. This charge separation of four charges contributes to the electrochemical gradient used for ATP synthesis. Two proton channels, the D-pathway and K-pathway, leading to the binuclear center have been identified in subunit I. It is generally believed that the channels contain water molecules that act as 'proton wires' to transfer the protons. A well-defined pathway for the transfer of pumped protons beyond the binuclear center has not been identified. Electrons are believed to be transferred directly from ubiquinol (the electron donor) to the low-spin heme, and directly from the low-spin heme to the binuclear center. — an NCBI CDD conserved domain (cd01662); members share this curated model.
