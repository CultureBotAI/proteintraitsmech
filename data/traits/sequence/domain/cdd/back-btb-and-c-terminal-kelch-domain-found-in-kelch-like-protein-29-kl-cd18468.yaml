identifier: CDD:cd18468
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 29 (KLHL29). KLHL29, also termed Kelch repeat and BTB domain-containing protein 9 (KBTBD9), belongs to the KLHL family. Its function remains unclear. A nuclear receptor subfamily 5, group A, member 2 (NR5A2)-Kelch-like family member 29 (KLHL29) fusion transcript may participate in the origin or progression of some colon cancers."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 29 (KLHL29). KLHL29, also termed Kelch repeat and BTB domain-containing protein 9 (KBTBD9), belongs to the KLHL family. Its function remains unclear. A nuclear receptor subfamily 5, group A, member 2 (NR5A2)-Kelch-like family member 29 (KLHL29) fusion transcript may participate in the origin or progression of some colon cancers. — an NCBI CDD conserved domain (cd18468); members share this curated model.
