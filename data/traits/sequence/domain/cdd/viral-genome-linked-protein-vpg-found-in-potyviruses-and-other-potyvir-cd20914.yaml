identifier: CDD:cd20914
label: VPg_potyvirus-like
definition: >-
  viral genome-linked protein (VPg) found in potyviruses and other Potyviridae members. The potyvirus-derived viral genome-linked protein (VPg) is covalently bound to the 5' end of viral genomic RNA (gRNA) and associates with host eIF4E for successful infection. Potyviruses are members of the picorna-like plant viruses. Their infection of mainstay crops has devastating economic consequences. The genetic interaction between VPg and eIF4E is only reported for potyviruses, while other virus families typically use these RNA conjugates for replication. Consistent with this, potyviral VPgs only show significant sequence homology with each other and not with VPgs from other families. VPg are present in a variety of virus families including Picornaviridae, Potyviridae and Caliciviridae. Members here are from the Potyviridae family
