identifier: CDD:cd15240
label: "Anabaena sensory rhodopsin and similar proteins, member of the seven-transmembrane GPCR superfamily. This subgroup includes eubacterial sensory rhodopsin from the freshwater cyanobacterium Anabaena and its closely related proteins. Unlike other sensory rhodopsins (SRI and SRII), the Anabaena sensory rhodopsin (ASR) activates a soluble transducer protein (ASRT), which may leading to transcriptional control of several genes. Although ASRT was shown to interact with DNA in vitro, the exact mechanism of photosensory transduction is not clearly understood. Moreover, the regulation of CRP (cAMP receptor protein) expression by ASR has been reported demonstrating a direct interaction of the C-terminal region of ASR with DNA, suggesting that ASR itself may also work as a transcription factor. ASR belongs to the microbial rhodopsin family, also known as type I rhodopsins, comprising the light-driven inward chloride pump halorhodopsin (HR), the outward proton pump bacteriorhodopsin (BR), the light-gated cation channel channelrhodopsin (ChR), the light-sensor activating transmembrane transducer protein sensory rhodopsin II (SRII), and the other light-driven proton pumps such as blue-light absorbing and green-light absorbing proteorhodopsins, among others. Microbial rhodopsins have been found in various single-celled microorganisms from all three domains of life, including halophile archaea, gamma-proteobacteria, cyanobacteria, fungi, and green algae. While microbial (type 1) and animal (type 2) rhodopsins have no sequence similarity with each other, they share a common architecture consisting of seven-transmembrane alpha-helices (TM) connected by extracellular loops and intracellular loops. Both types of rhodopsins consist of opsin and a covalently attached retinal (the aldehyde of vitamin A), a photoreactive chromophore, via a protonated Schiff base linkage to an amino group of lysine in the middle of the seventh transmembrane helix (TM7). Upon the absorption of light, microbial rhodopsins undergo light-induced photoisomerization of all-trans retinal into the 13-cis isomer, whereas the photoisomerization of 11-cis retinal to all-trans isomer occurs in the animal rhodopsins. While animal visual rhodopsins are activated by light to catalyze GDP/GTP exchange in the alpha subunit of the retinal G protein transducin (Gt), microbial rhodopsins do not activate G proteins, but instead can function as light-dependent ion pumps, cation channels, and sensors."
definition: >-
  Anabaena sensory rhodopsin and similar proteins, member of the seven-transmembrane GPCR superfamily. This subgroup includes eubacterial sensory rhodopsin from the freshwater cyanobacterium Anabaena and its closely related proteins. Unlike other sensory rhodopsins (SRI and SRII), the Anabaena sensory rhodopsin (ASR) activates a soluble transducer protein (ASRT), which may leading to transcriptional control of several genes. Although ASRT was shown to interact with DNA in vitro, the exact mechanism of photosensory transduction is not clearly understood. Moreover, the regulation of CRP (cAMP receptor protein) expression by ASR has been reported demonstrating a direct interaction of the C-terminal region of ASR with DNA, suggesting that ASR itself may also work as a transcription factor. ASR belongs to the microbial rhodopsin family, also known as type I rhodopsins, comprising the light-driven inward chloride pump halorhodopsin (HR), the outward proton pump bacteriorhodopsin (BR), the light-gated cation channel channelrhodopsin (ChR), the light-sensor activating transmembrane transducer protein sensory rhodopsin II (SRII), and the other light-driven proton pumps such as blue-light absorbing and green-light absorbing proteorhodopsins, among others. Microbial rhodopsins have been found in various single-celled microorganisms from all three domains of life, including halophile archaea, gamma-proteobacteria, cyanobacteria, fungi, and green algae. While microbial (type 1) and animal (type 2) rhodopsins have no sequence similarity with each other, they share a common architecture consisting of seven-transmembrane alpha-helices (TM) connected by extracellular loops and intracellular loops. Both types of rhodopsins consist of opsin and a covalently attached retinal (the aldehyde of vitamin A), a photoreactive chromophore, via a protonated Schiff base linkage to an amino group of lysine in the middle of the seventh transmembrane helix (TM7). Upon the absorption of light, microbial rhodopsins undergo light-induced photoisomerization of all-trans retinal into the 13-cis isomer, whereas the photoisomerization of 11-cis retinal to all-trans isomer occurs in the animal rhodopsins. While animal visual rhodopsins are activated by light to catalyze GDP/GTP exchange in the alpha subunit of the retinal G protein transducin (Gt), microbial rhodopsins do not activate G proteins, but instead can function as light-dependent ion pumps, cation channels, and sensors. — an NCBI CDD conserved domain (cd15240); members share this curated model.
