label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana OBP3-responsive gene 2 (ORG2), 3 (ORG3) and similar proteins. The family includes ORG2 (also termed AtbHLH38, or EN 8) and ORG3 (also termed AtbHLH39, or EN 9), both of which act as bHLH transcription factors."
