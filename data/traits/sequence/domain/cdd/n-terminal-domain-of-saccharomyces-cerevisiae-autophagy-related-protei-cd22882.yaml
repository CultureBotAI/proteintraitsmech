identifier: CDD:cd22882
label: "N-terminal domain of Saccharomyces cerevisiae autophagy-related protein 16 (Atg16). Atg16, also called cytoplasm to vacuole targeting protein 11 (CVT11), or SAP18, stabilizes the Atg5-Atg12 conjugate and mediates the formation of the 350 kDa complex, which is necessary for autophagy. The Atg5-Atg12/Atg16 complex is required for efficient promotion of Atg8-conjugation to phosphatidylethanolamine and Atg8 localization to the pre-autophagosomal structure (PAS). Atg16 interacts with the Atg12-Atg5 protein conjugate through its N-terminal domain (NTD) and self-assembles through its coiled-coil (CC) domain. This model corresponds to the NTD of Saccharomyces cerevisiae Atg16; it does not include the NTD of Atg16 from other organisms."
definition: >-
  N-terminal domain of Saccharomyces cerevisiae autophagy-related protein 16 (Atg16). Atg16, also called cytoplasm to vacuole targeting protein 11 (CVT11), or SAP18, stabilizes the Atg5-Atg12 conjugate and mediates the formation of the 350 kDa complex, which is necessary for autophagy. The Atg5-Atg12/Atg16 complex is required for efficient promotion of Atg8-conjugation to phosphatidylethanolamine and Atg8 localization to the pre-autophagosomal structure (PAS). Atg16 interacts with the Atg12-Atg5 protein conjugate through its N-terminal domain (NTD) and self-assembles through its coiled-coil (CC) domain. This model corresponds to the NTD of Saccharomyces cerevisiae Atg16; it does not include the NTD of Atg16 from other organisms. — an NCBI CDD conserved domain (cd22882); members share this curated model.
