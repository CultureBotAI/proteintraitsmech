identifier: CDD:cd21928
label: "LGN tetratricopeptide repeat-binding domain found in FERM and PDZ domain-containing proteins FRMPD1, FRMPD4, and similar proteins. The family includes FRMPD1, FRMPD4, and similar proteins. FRMPD1, also called FERM domain-containing protein 2 (FRMD2), stabilizes membrane-bound GPSM1, and thereby promotes its interaction with GNAI1. It also acts as a regulatory binding partner of Activator of G-protein Signaling 3 (AGS3). FRMPD4, also called PDZ domain-containing protein 10 (PDZD10), PDZK10, or PSD-95-interacting regulator of spine morphogenesis (Preso), is a novel PSD-95-interacting FERM and PDZ domain-containing protein that regulates dendritic spine morphogenesis. It acts as a positive regulator of dendritic spine morphogenesis and density. It is required for the maintenance of excitatory synaptic transmission. It binds phosphatidylinositol 4,5-bisphosphate. This model corresponds to a conserved region in FRMPD1 and FRMPD4 that binds to tetratricopeptide (TPR) repeats present in the N-terminal domain of adaptor protein LGN. LGN plays a crucial role in mitotic spindle orientation and cell polarization via interaction with multiple targets including FRMPD1 and FRMPD4."
definition: >-
  LGN tetratricopeptide repeat-binding domain found in FERM and PDZ domain-containing proteins FRMPD1, FRMPD4, and similar proteins. The family includes FRMPD1, FRMPD4, and similar proteins. FRMPD1, also called FERM domain-containing protein 2 (FRMD2), stabilizes membrane-bound GPSM1, and thereby promotes its interaction with GNAI1. It also acts as a regulatory binding partner of Activator of G-protein Signaling 3 (AGS3). FRMPD4, also called PDZ domain-containing protein 10 (PDZD10), PDZK10, or PSD-95-interacting regulator of spine morphogenesis (Preso), is a novel PSD-95-interacting FERM and PDZ domain-containing protein that regulates dendritic spine morphogenesis. It acts as a positive regulator of dendritic spine morphogenesis and density. It is required for the maintenance of excitatory synaptic transmission. It binds phosphatidylinositol 4,5-bisphosphate. This model corresponds to a conserved region in FRMPD1 and FRMPD4 that binds to tetratricopeptide (TPR) repeats present in the N-terminal domain of adaptor protein LGN. LGN plays a crucial role in mitotic spindle orientation and cell polarization via interaction with multiple targets including FRMPD1 and FRMPD4. — an NCBI CDD conserved domain (cd21928); members share this curated model.
