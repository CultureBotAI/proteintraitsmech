identifier: CDD:cd16601
label: "RING finger, HC subclass, found in tripartite motif-containing protein 39 (TRIM39) and similar proteins. TRIM39, also known as RING finger protein 23 (RNF23) or testis-abundant finger protein, is an E3 ubiquitin-protein ligase that plays a role in controlling DNA damage-induced apoptosis through inhibition of the anaphase promoting complex (APC/C), a multiprotein ubiquitin ligase that controls multiple cell cycle regulators, including cyclins, geminin, and others. TRIM39 also functions as a regulator of several key processes in the proliferative cycle. It directly regulates p53 stability. It modulates cell cycle progression and DNA damage responses via stabilizing p21. Moreover, TRIM39 negatively regulates the nuclear factor kappaB (NFkappaB)-mediated signaling pathway through stabilization of Cactin, an inhibitor of NFkappaB- and Toll-like receptor (TLR)-mediated transcription, which is induced by inflammatory stimulants such as tumor necrosis factor alpha. Furthermore, TRIM39 is a MOAP-1-binding protein that can promote apoptosis signaling through stabilization of MOAP-1 via the inhibition of its poly-ubiquitination process. TRIM39 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 39 (TRIM39) and similar proteins. TRIM39, also known as RING finger protein 23 (RNF23) or testis-abundant finger protein, is an E3 ubiquitin-protein ligase that plays a role in controlling DNA damage-induced apoptosis through inhibition of the anaphase promoting complex (APC/C), a multiprotein ubiquitin ligase that controls multiple cell cycle regulators, including cyclins, geminin, and others. TRIM39 also functions as a regulator of several key processes in the proliferative cycle. It directly regulates p53 stability. It modulates cell cycle progression and DNA damage responses via stabilizing p21. Moreover, TRIM39 negatively regulates the nuclear factor kappaB (NFkappaB)-mediated signaling pathway through stabilization of Cactin, an inhibitor of NFkappaB- and Toll-like receptor (TLR)-mediated transcription, which is induced by inflammatory stimulants such as tumor necrosis factor alpha. Furthermore, TRIM39 is a MOAP-1-binding protein that can promote apoptosis signaling through stabilization of MOAP-1 via the inhibition of its poly-ubiquitination process. TRIM39 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16601); members share this curated model.
