identifier: CDD:cd23498
label: "fourth ricin B-type lectin domain, beta-trefoil fold, found in Lysinibacillus sphaericus mosquitocidal toxin (MTX) and similar proteins. This subfamily includes Lysinibacillus sphaericus MTX and Pieris brassicae pierisin. MTX acts as an ADP-ribosyl transferase. Pierisin, also called NAD--DNA ADP-ribosyltransferase, pierisin-2, or pierisin-B, catalyzes the ADP ribosylation of double-stranded DNA by targeting the N2 amino group of dG residues. It induces apoptosis in a range of human cell lines. Members in this family contain four ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the fourth ricin B-type lectin domain. Each subdomain bears a potential sugar binding site."
definition: >-
  fourth ricin B-type lectin domain, beta-trefoil fold, found in Lysinibacillus sphaericus mosquitocidal toxin (MTX) and similar proteins. This subfamily includes Lysinibacillus sphaericus MTX and Pieris brassicae pierisin. MTX acts as an ADP-ribosyl transferase. Pierisin, also called NAD--DNA ADP-ribosyltransferase, pierisin-2, or pierisin-B, catalyzes the ADP ribosylation of double-stranded DNA by targeting the N2 amino group of dG residues. It induces apoptosis in a range of human cell lines. Members in this family contain four ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the fourth ricin B-type lectin domain. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23498); members share this curated model.
