identifier: CDD:cd00089
label: "Protein kinase C-related kinase homology region 1 (HR1) domain that binds Rho family small GTPases. The HR1 domain, also called the ACC (anti-parallel coiled-coil) finger domain or Rho-binding domain binds small GTPases from the Rho family. It is found in Rho effector proteins including PKC-related kinases such as vertebrate PRK1 (or PKN) and yeast PKC1 protein kinases C, as well as in rhophilins and Rho-associated kinase (ROCK). Rho family members function as molecular switches, cycling between inactive and active forms, controlling a variety of cellular processes. HR1 domains may occur in repeat arrangements (PKN contains three HR1 domains), separated by a short linker region."
definition: >-
