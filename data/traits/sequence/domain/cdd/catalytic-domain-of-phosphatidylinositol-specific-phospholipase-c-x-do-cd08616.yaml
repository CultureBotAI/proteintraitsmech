identifier: CDD:cd08616
label: "Catalytic domain of phosphatidylinositol-specific phospholipase C, X domain containing 1. This subfamily corresponds to the catalytic domain present in a group of phosphatidylinositol-specific phospholipase C X domain containing 1 (PI-PLCXD1), 2 (PI-PLCXD2) and 3 (PI-PLCXD3), which are bacterial phosphatidylinositol-specific phospholipase C (PI-PLC, EC 4.6.1.13) sequence homologs found in vertebrates. The typical eukaryotic phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11) has a multidomain organization that consists of a PLC catalytic core domain, and various regulatory domains. The catalytic core domain is assembled from two highly conserved X- and Y-regions split by a divergent linker sequence. In contrast, members in this group contain a single TIM-barrel type catalytic domain, X domain, and are more closely related to bacterial PI-PLCs, which participate in Ca2+-independent PI metabolism, hydrolyzing the membrane lipid phosphatidylinositol (PI) to produce phosphorylated myo-inositol and diacylglycerol (DAG). Although the biological function of eukaryotic PI-PLCXDs still remains unclear, it may distinct from that of typical eukaryotic PI-PLCs."
definition: >-
  Catalytic domain of phosphatidylinositol-specific phospholipase C, X domain containing 1. This subfamily corresponds to the catalytic domain present in a group of phosphatidylinositol-specific phospholipase C X domain containing 1 (PI-PLCXD1), 2 (PI-PLCXD2) and 3 (PI-PLCXD3), which are bacterial phosphatidylinositol-specific phospholipase C (PI-PLC, EC 4.6.1.13) sequence homologs found in vertebrates. The typical eukaryotic phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11) has a multidomain organization that consists of a PLC catalytic core domain, and various regulatory domains. The catalytic core domain is assembled from two highly conserved X- and Y-regions split by a divergent linker sequence. In contrast, members in this group contain a single TIM-barrel type catalytic domain, X domain, and are more closely related to bacterial PI-PLCs, which participate in Ca2+-independent PI metabolism, hydrolyzing the membrane lipid phosphatidylinositol (PI) to produce phosphorylated myo-inositol and diacylglycerol (DAG). Although the biological function of eukaryotic PI-PLCXDs still remains unclear, it may distinct from that of typical eukaryotic PI-PLCs. — an NCBI CDD conserved domain (cd08616); members share this curated model.
