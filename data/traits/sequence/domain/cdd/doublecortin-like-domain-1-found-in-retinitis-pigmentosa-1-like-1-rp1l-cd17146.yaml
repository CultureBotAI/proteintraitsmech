identifier: CDD:cd17146
label: "Doublecortin-like domain 1 found in retinitis pigmentosa 1-like 1 (RP1L1) protein. RP1L1 is a member of the doublecortin (DCX) family. Its DCX domains occur in double tandem repeats. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. The DCX-domain of RP1L1 localizes to the photoreceptor and is genetically associated with retinitis pigmentosa."
definition: >-
  Doublecortin-like domain 1 found in retinitis pigmentosa 1-like 1 (RP1L1) protein. RP1L1 is a member of the doublecortin (DCX) family. Its DCX domains occur in double tandem repeats. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. The DCX-domain of RP1L1 localizes to the photoreceptor and is genetically associated with retinitis pigmentosa. — an NCBI CDD conserved domain (cd17146); members share this curated model.
