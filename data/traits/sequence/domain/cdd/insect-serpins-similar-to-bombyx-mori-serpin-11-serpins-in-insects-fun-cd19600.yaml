identifier: CDD:cd19600
label: "insect serpins similar to Bombyx mori Serpin-11. Serpins in insects function within development, wound healing and immunity. The specific function of Bombyx mori serpin-11 (SPN19) is unknown. Insect serpins from sawfly, mealworm, riceborer, moth, silkworm, bollworm are included in this subfamily. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  insect serpins similar to Bombyx mori Serpin-11. Serpins in insects function within development, wound healing and immunity. The specific function of Bombyx mori serpin-11 (SPN19) is unknown. Insect serpins from sawfly, mealworm, riceborer, moth, silkworm, bollworm are included in this subfamily. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19600); members share this curated model.
