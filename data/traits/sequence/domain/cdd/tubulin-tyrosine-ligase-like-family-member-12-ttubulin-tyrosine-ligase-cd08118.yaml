identifier: CDD:cd08118
label: ATP-G_TTLL12
definition: >-
  Tubulin tyrosine ligase-like family, member 12. TTubulin tyrosine ligase-like family, member 12 (TTLL12) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 12 gene (TTLL12) maps to chromosome region 22q13.31 and encodes for a 644 amino acid protein. It has been suggested that the murine TTLL12 has no glycylation activity in vivo or in vitro (unpublished data)
