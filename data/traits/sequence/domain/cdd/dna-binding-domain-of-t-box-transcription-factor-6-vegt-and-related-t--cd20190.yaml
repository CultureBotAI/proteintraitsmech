identifier: CDD:cd20190
label: "DNA-binding domain of T-box transcription factor 6, VegT and related T-box proteins. This subfamily includes the transcriptional regulators TBX6 and VegT. TBX6 plays an essential role in the fate determination of axial stem to become either neural or mesodermal. It also plays an essential role in the regulation of left/right patterning in mouse embryos through effects on nodal cilia and perinodal signaling. VegT (also known as Antipodean, Brat and Xombi) is required in early Xenopus embryos for the formation of both the mesoderm and endoderm germ layers. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved 1DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
  DNA-binding domain of T-box transcription factor 6, VegT and related T-box proteins. This subfamily includes the transcriptional regulators TBX6 and VegT. TBX6 plays an essential role in the fate determination of axial stem to become either neural or mesodermal. It also plays an essential role in the regulation of left/right patterning in mouse embryos through effects on nodal cilia and perinodal signaling. VegT (also known as Antipodean, Brat and Xombi) is required in early Xenopus embryos for the formation of both the mesoderm and endoderm germ layers. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved 1DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. — an NCBI CDD conserved domain (cd20190); members share this curated model.
