identifier: CDD:cd10763
label: AcbO-like
definition: >-
  AcbO-like subfamily of the Xylose-isomerase-like superfamily. Includes the 2-epi-5-epi-valiolone-7-phosphate 2-epimerase AcbO protein from Actinoplanes. The enzyme catalyzes the epimerisation of 2-epi-5-epi-valiolone-7-phosphate as part of the metabolism of acarbose, a glucosidase inhibitor. This belongs to the Xylose-isomerase-like superfamily
