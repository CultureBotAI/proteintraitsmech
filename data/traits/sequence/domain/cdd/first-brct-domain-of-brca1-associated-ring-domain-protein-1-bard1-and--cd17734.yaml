identifier: CDD:cd17734
label: "first BRCT domain of BRCA1-associated RING domain protein 1 (Bard1) and similar proteins. Bard1, also termed BARD-1, or RING-type E3 ubiquitin transferase BARD1, is a critical factor in BRCA1-mediated tumor suppression and may also serve as a target for tumorigenic lesions in some human cancers. It associates with BRCA1 (breast cancer-1) to form a heterodimeric BRCA1/BARD1 complex that is responsible for maintaining genomic stability through nuclear functions involving DNA damage signaling and repair, transcriptional regulation, and cell cycle control. The BRCA1/BARD1 complex catalyzes autoubiquitination of BRCA1 and trans ubiquitination of other protein substrates. Its E3 ligase activity is dramatically reduced in the presence of UBX domain protein 1 (UBXN1). BARD-1 contains an N-terminal C3HC4-type RING-HC finger that binds BRCA1, and a C-terminal region with three ankyrin repeats and tandem BRCT domains that bind CstF-50 (cleavage stimulation factor) to modulate mRNA processing and RNAP II stability in response to DNA damage. The family corresponds to the first BRCT domain."
definition: >-
  first BRCT domain of BRCA1-associated RING domain protein 1 (Bard1) and similar proteins. Bard1, also termed BARD-1, or RING-type E3 ubiquitin transferase BARD1, is a critical factor in BRCA1-mediated tumor suppression and may also serve as a target for tumorigenic lesions in some human cancers. It associates with BRCA1 (breast cancer-1) to form a heterodimeric BRCA1/BARD1 complex that is responsible for maintaining genomic stability through nuclear functions involving DNA damage signaling and repair, transcriptional regulation, and cell cycle control. The BRCA1/BARD1 complex catalyzes autoubiquitination of BRCA1 and trans ubiquitination of other protein substrates. Its E3 ligase activity is dramatically reduced in the presence of UBX domain protein 1 (UBXN1). BARD-1 contains an N-terminal C3HC4-type RING-HC finger that binds BRCA1, and a C-terminal region with three ankyrin repeats and tandem BRCT domains that bind CstF-50 (cleavage stimulation factor) to modulate mRNA processing and RNAP II stability in response to DNA damage. The family corresponds to the first BRCT domain. — an NCBI CDD conserved domain (cd17734); members share this curated model.
