identifier: CDD:cd18594
label: "Six-transmembrane helical domain 1 of Cystic Fibrosis Transmembrane Conductance Regulator. This group represents the six-transmembrane domain 1 (TMD1) of the cystic fibrosis transmembrane conductance regulator (CFTR, ABCC7), which belongs to the ABCC subfamily. CFTR functions as a chloride channel, in contrast to other ABC transporters, and controls ion and water secretion and absorption in epithelial tissues. ABC proteins are formed from two homologous halves each containing a transmembrane domain (TMD) and a cytosolic nucleotide binding domain (NBD). In CFTR, these two TMD-NBD halves are linked by the unique regulatory (R) domain, which is not present in other ABC transporters. The ion channel only opens when its R-domain is phosphorylated by cyclic AMP-dependent protein kinase (PKA) and ATP is bound at the NBDs. Mutations in CFTR cause cystic fibrosis, the most common lethal genetic disorder in populations of Northern European descent."
