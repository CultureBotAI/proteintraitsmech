identifier: CDD:cd12640
label: "RNA recognition motif 3 (RRM3) found in Drosophila melanogaster Bruno protein and similar proteins. This subgroup corresponds to the RRM3 of Bruno protein, a Drosophila RNA recognition motif (RRM)-containing protein that plays a central role in regulation of Oskar (Osk) expression. It mediates repression by binding to regulatory Bruno response elements (BREs) in the Osk mRNA 3' UTR. The full-length Bruno protein contains three RRMs, two located in the N-terminal half of the protein and the third near the C-terminus, separated by a linker region."
definition: >-
  RNA recognition motif 3 (RRM3) found in Drosophila melanogaster Bruno protein and similar proteins. This subgroup corresponds to the RRM3 of Bruno protein, a Drosophila RNA recognition motif (RRM)-containing protein that plays a central role in regulation of Oskar (Osk) expression. It mediates repression by binding to regulatory Bruno response elements (BREs) in the Osk mRNA 3' UTR. The full-length Bruno protein contains three RRMs, two located in the N-terminal half of the protein and the third near the C-terminus, separated by a linker region. — an NCBI CDD conserved domain (cd12640); members share this curated model.
