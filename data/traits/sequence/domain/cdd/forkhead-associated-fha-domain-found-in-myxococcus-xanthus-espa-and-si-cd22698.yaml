identifier: CDD:cd22698
label: "forkhead associated (FHA) domain found in Myxococcus xanthus EspA and similar proteins. EspA is a histidine protein kinase with a fork head-associated (FHA) domain at the N-terminus and a receiver domain at the C-terminus. It functions as an inhibitor of sporulation during early fruiting body development while cells are aggregating into raised mounds. EspA is part of a two-component signal transduction system that regulates the timing of sporulation initiation. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Myxococcus xanthus EspA and similar proteins. EspA is a histidine protein kinase with a fork head-associated (FHA) domain at the N-terminus and a receiver domain at the C-terminus. It functions as an inhibitor of sporulation during early fruiting body development while cells are aggregating into raised mounds. EspA is part of a two-component signal transduction system that regulates the timing of sporulation initiation. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22698); members share this curated model.
