identifier: CDD:cd21105
label: "Post-GPI attachment to proteins factor 4 and similar proteins. This family includes post-GPI attachment to proteins factor 4 (PGAP4), also known as post-GPI attachment to proteins GalNAc transferase 4 or transmembrane protein 246 (TMEM246). PGAP4 has been shown to be a Golgi-resident GPI-GalNAc transferase. Many eukaryotic proteins are anchored to the cell surface through glycolipid glycosylphosphatidylinositol (GPI). GPIs have a conserved core but exhibit diverse N-acetylgalactosamine (GalNAc) modifications. PGAP4 knockout cells lose GPI-GalNAc structures. PGAP4 is most likely involved in the initial steps of GPI-GalNAc biosynthesis. In contrast to other Golgi glycotransferases, it contains three transmembrane domains. This family also includes uncharacterized fungal proteins with similarity to PGAP4."
definition: >-
  Post-GPI attachment to proteins factor 4 and similar proteins. This family includes post-GPI attachment to proteins factor 4 (PGAP4), also known as post-GPI attachment to proteins GalNAc transferase 4 or transmembrane protein 246 (TMEM246). PGAP4 has been shown to be a Golgi-resident GPI-GalNAc transferase. Many eukaryotic proteins are anchored to the cell surface through glycolipid glycosylphosphatidylinositol (GPI). GPIs have a conserved core but exhibit diverse N-acetylgalactosamine (GalNAc) modifications. PGAP4 knockout cells lose GPI-GalNAc structures. PGAP4 is most likely involved in the initial steps of GPI-GalNAc biosynthesis. In contrast to other Golgi glycotransferases, it contains three transmembrane domains. This family also includes uncharacterized fungal proteins with similarity to PGAP4. — an NCBI CDD conserved domain (cd21105); members share this curated model.
