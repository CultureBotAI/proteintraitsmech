identifier: CDD:cd11641
label: "Precorrin-4 C11-methyltransferase (CbiF/CobM). Precorrin-4 C11-methyltransferase participates in the pathway toward the biosynthesis of cobalamin (vitamin B12). There are two distinct cobalamin biosynthetic pathways in bacteria. The aerobic pathway requires oxygen, and cobalt is inserted late in the pathway; the anaerobic pathway does not require oxygen, and cobalt insertion is the first committed step towards cobalamin synthesis. In the aerobic pathway, CobM catalyzes the methylation of precorrin-4 at C-11 to yield precorrin-5. In the anaerobic pathway, CibF catalyzes the methylation of cobalt-precorrin-4 to cobalt-precorrin-5. Both CibF and CobM, which are homologous, are included in this model. There are about 30 enzymes involved in vitamin B12 synthetic pathway. The enzymes involved in the aerobic pathway are prefixed Cob and those of the anaerobic pathway Cbi. Most of the enzymes are shared in both pathways and several of these enzymes are pathway-specific."
definition: >-
  Precorrin-4 C11-methyltransferase (CbiF/CobM). Precorrin-4 C11-methyltransferase participates in the pathway toward the biosynthesis of cobalamin (vitamin B12). There are two distinct cobalamin biosynthetic pathways in bacteria. The aerobic pathway requires oxygen, and cobalt is inserted late in the pathway; the anaerobic pathway does not require oxygen, and cobalt insertion is the first committed step towards cobalamin synthesis. In the aerobic pathway, CobM catalyzes the methylation of precorrin-4 at C-11 to yield precorrin-5. In the anaerobic pathway, CibF catalyzes the methylation of cobalt-precorrin-4 to cobalt-precorrin-5. Both CibF and CobM, which are homologous, are included in this model. There are about 30 enzymes involved in vitamin B12 synthetic pathway. The enzymes involved in the aerobic pathway are prefixed Cob and those of the anaerobic pathway Cbi. Most of the enzymes are shared in both pathways and several of these enzymes are pathway-specific. — an NCBI CDD conserved domain (cd11641); members share this curated model.
