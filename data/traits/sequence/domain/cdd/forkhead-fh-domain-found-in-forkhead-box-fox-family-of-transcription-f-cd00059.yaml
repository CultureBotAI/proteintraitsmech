identifier: CDD:cd00059
label: FH_FOX
definition: >-
  Forkhead (FH) domain found in Forkhead box (FOX) family of transcription factors and similar proteins. The FOX family comprises diverse tissue- and cell type-specific transcription factors with an evolutionary conserved "Forkhead (FH)" or "winged helix" DNA-binding domain. FH is named for the Drosophila fork head protein, a transcription factor which promotes terminal rather than segmental development. The structure of the FH domain contains 2 flexible loops or "wings" in the C-terminal region, hence the term winged helix. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. They participate in a variety of cellular processes, such as cell cycle progression, proliferation, differentiation, migration, metabolism, and DNA damage response. Their expression can be regulated by multiple factors, and they can act as co-activators and/or transcriptional repressors. Fifty FOX-encoding genes in humans have been categorized into 19 subfamilies based on protein sequence homology (FOXA to FOXS)
