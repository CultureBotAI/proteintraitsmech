identifier: CDD:cd06777
label: "circularly permuted PDZ domain of DegS serine endoprotease. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Escherichia coli DegS and related domains. DegS (also known as Site-1 protease DegS, S1P protease DegS, and Site-1-type intramembrane protease) participates in the activation of the sigma(E) extracytoplasmic stress response. Initially, there is an accumulation of misfolded membrane proteins (OMPs) in the periplasm which bind by their YXF motif to the DegS PDZ domain, activating DegS-catalyzed cleavage of the RseA periplasmic domain and making RseA a substrate for cleavage by another membrane protease RseP. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E,  alpha-helix 2 and beta-strand F. This DegS family PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus."
definition: >-
  circularly permuted PDZ domain of DegS serine endoprotease. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Escherichia coli DegS and related domains. DegS (also known as Site-1 protease DegS, S1P protease DegS, and Site-1-type intramembrane protease) participates in the activation of the sigma(E) extracytoplasmic stress response. Initially, there is an accumulation of misfolded membrane proteins (OMPs) in the periplasm which bind by their YXF motif to the DegS PDZ domain, activating DegS-catalyzed cleavage of the RseA periplasmic domain and making RseA a substrate for cleavage by another membrane protease RseP. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This DegS family PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus. — an NCBI CDD conserved domain (cd06777); members share this curated model.
