identifier: CDD:cd16317
label: "Chryseobacterium indologenes IND-1, IND-2, IND-7and related metallo-beta-lactamases, subclass B1; MBL-fold metallo-hydrolase domain. Includes the chromosome-encoded MBLs Chryseobacterium indologenes IND-1, IND-2, and IND-7 and related MBLs. MBLs (class B of the Ambler beta-lactamase classification) are a diverse group of metallo-enzymes that are capable of catalyzing the hydrolysis of a wide range of beta-lactam antibiotics. MBLs have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. This subgroup of MBLs belongs to the B1 subclass. B1 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile."
