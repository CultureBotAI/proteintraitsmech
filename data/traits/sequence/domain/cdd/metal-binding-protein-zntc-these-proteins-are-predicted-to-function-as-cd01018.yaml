identifier: CDD:cd01018
label: "Metal binding protein ZntC.  These proteins are predicted to function as initial receptors in ABC transport of metal ions.  They belong to the TroA superfamily of helical backbone metal receptor proteins that share a distinct fold and ligand binding mechanism.  They are comprised of two globular subdomains connected by a long alpha helix and bind their specific ligands in the cleft between these domains.  In addition, many of these proteins possess a metal-binding histidine-rich motif (repetitive HDH sequence)."
definition: >-
  Metal binding protein ZntC. These proteins are predicted to function as initial receptors in ABC transport of metal ions. They belong to the TroA superfamily of helical backbone metal receptor proteins that share a distinct fold and ligand binding mechanism. They are comprised of two globular subdomains connected by a long alpha helix and bind their specific ligands in the cleft between these domains. In addition, many of these proteins possess a metal-binding histidine-rich motif (repetitive HDH sequence). — an NCBI CDD conserved domain (cd01018); members share this curated model.
