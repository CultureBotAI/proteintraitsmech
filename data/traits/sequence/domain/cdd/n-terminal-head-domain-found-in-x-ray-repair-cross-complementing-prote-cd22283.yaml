identifier: CDD:cd22283
label: "N-terminal head domain found in X-ray repair cross-complementing protein 4 and similar proteins. X-ray repair cross-complementing protein 4 (XRCC4) is a DNA repair protein involved in DNA non-homologous end-joining (NHEJ), which is required for double-strand break repair and V(D)J recombination. The DNA ligase IV (LIG4)- XRCC4 complex is responsible for the ligation step of NHEJ, and XRCC4 enhances the joining activity of LIG4. Binding of the LIG4-XRCC4 complex to DNA ends is dependent on the assembly of the DNA-dependent protein kinase complex DNA-PK to these DNA ends. XRCC4 monomers are comprised of an N-terminal globular head domain, a centrally located coiled-coil, and a C-terminal region. These monomers homodimerize through two dimerization domains, the N-terminal globular head domains and long extended alpha-helical coiled-coil regions. In addition, XRCC4 and XLF form symmetric heterodimers that interact through their globular head domains at the opposite end of the homodimer interface, and may form XLF-XRCC4 filaments. This model corresponds to the N-terminal head domain of XRCC4, which is structurally related to other XRCC4-superfamily members, PAXX, XLF, SAS6, and CCDC61."
definition: >-
  N-terminal head domain found in X-ray repair cross-complementing protein 4 and similar proteins. X-ray repair cross-complementing protein 4 (XRCC4) is a DNA repair protein involved in DNA non-homologous end-joining (NHEJ), which is required for double-strand break repair and V(D)J recombination. The DNA ligase IV (LIG4)- XRCC4 complex is responsible for the ligation step of NHEJ, and XRCC4 enhances the joining activity of LIG4. Binding of the LIG4-XRCC4 complex to DNA ends is dependent on the assembly of the DNA-dependent protein kinase complex DNA-PK to these DNA ends. XRCC4 monomers are comprised of an N-terminal globular head domain, a centrally located coiled-coil, and a C-terminal region. These monomers homodimerize through two dimerization domains, the N-terminal globular head domains and long extended alpha-helical coiled-coil regions. In addition, XRCC4 and XLF form symmetric heterodimers that interact through their globular head domains at the opposite end of the homodimer interface, and may form XLF-XRCC4 filaments. This model corresponds to the N-terminal head domain of XRCC4, which is structurally related to other XRCC4-superfamily members, PAXX, XLF, SAS6, and CCDC61. — an NCBI CDD conserved domain (cd22283); members share this curated model.
