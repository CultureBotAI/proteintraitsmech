identifier: CDD:cd16424
label: VirB8
definition: >-
  periplasmic domain of VirB8 protein. This family contains the periplasmic domain of VirB8 protein which is an essential assembly factor of type IV secretion system (T4SS) channel proteins that are highly diverse in function relative to other bacterial secretion systems. T4SS proteins are important virulence factors for many Gram-negative pathogens, such as Agrobacterium, Brucella, Legionella, and Helicobacter. VirB8 is a bacterial virulence protein with cytoplasmic, transmembrane, and periplasmic regions. It is thought that VirB8 is a primary constituent of a DNA transporter. It is a crucial structural and functional component of the T4SS, with interactions between VirB8 and many other T4SS proteins, including VirB10, VirB9, VirB1, VirB4, and VirB11, as well as with itself
