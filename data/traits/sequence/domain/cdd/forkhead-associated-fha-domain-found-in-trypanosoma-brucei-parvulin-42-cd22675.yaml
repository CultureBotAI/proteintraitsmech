identifier: CDD:cd22675
label: "forkhead associated (FHA) domain found in Trypanosoma brucei Parvulin 42 (TbPar42) and similar proteins. TbPar42 is a nuclear protein that plays a key role in parasite cell proliferation. It exhibits an N-terminal forkhead associated (FHA)-domain and a peptidyl-prolyl-cis/trans-isomerase (PPIase) domain, both connected by a linker. Its PPIase domain adopts a parvulin fold and reflects structural elements of Pin1-type proteins but is catalytically inactive. Its FHA domain may be involved in the binding of phosphorylated target proteins. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Trypanosoma brucei Parvulin 42 (TbPar42) and similar proteins. TbPar42 is a nuclear protein that plays a key role in parasite cell proliferation. It exhibits an N-terminal forkhead associated (FHA)-domain and a peptidyl-prolyl-cis/trans-isomerase (PPIase) domain, both connected by a linker. Its PPIase domain adopts a parvulin fold and reflects structural elements of Pin1-type proteins but is catalytically inactive. Its FHA domain may be involved in the binding of phosphorylated target proteins. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22675); members share this curated model.
