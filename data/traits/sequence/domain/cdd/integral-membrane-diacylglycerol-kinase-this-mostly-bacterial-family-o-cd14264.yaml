identifier: CDD:cd14264
label: "Integral membrane diacylglycerol kinase. This mostly bacterial family of homo-trimeric integral membrane enzymes, the products of the dgkA gene, catalyzes the ATP-dependent phosphorylation of diacylglycerol to phosphatidic acid. Escherichia coli DAGK participates in the membrane-derived oligosaccharide cycle (MDO cycle) by recycling lipids to restore phosphatidylglycerols that were used up in the biosynthesis of MDOs. DAGK also recycles diacylglycerols that are produced during the biosynthesis of lipopolysaccharides (LPS) back to phospholipids. DAGK is not the main source of phosphatidic acid in de-novo biosynthesis of glycerophospholipids. Escherichia coli DAGK has low activity as an undecaprenol kinase."
definition: >-
  Integral membrane diacylglycerol kinase. This mostly bacterial family of homo-trimeric integral membrane enzymes, the products of the dgkA gene, catalyzes the ATP-dependent phosphorylation of diacylglycerol to phosphatidic acid. Escherichia coli DAGK participates in the membrane-derived oligosaccharide cycle (MDO cycle) by recycling lipids to restore phosphatidylglycerols that were used up in the biosynthesis of MDOs. DAGK also recycles diacylglycerols that are produced during the biosynthesis of lipopolysaccharides (LPS) back to phospholipids. DAGK is not the main source of phosphatidic acid in de-novo biosynthesis of glycerophospholipids. Escherichia coli DAGK has low activity as an undecaprenol kinase. — an NCBI CDD conserved domain (cd14264); members share this curated model.
