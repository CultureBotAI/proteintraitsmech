identifier: CDD:cd17097
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in the ERM family proteins. The ezrin-radixin-moesin (ERM) family includes a group of closely related cytoskeletal proteins that play an essential role in microvilli formation, T-cell activation, and tumor metastasis through providing a regulated linkage between F-actin and membrane-associated proteins. These proteins may also function in signaling cascades that regulate the assembly of actin stress fibers. The ERM proteins consist of an N-terminal FERM domain, a coiled-coil (CC) domain and a C-terminal tail segment (C-tail) containing a well-defined actin-binding motif. They exist in two states, a dormant state in which the FERM domain binds to its own C-terminal tail and thereby precludes binding of some partner proteins, and an activated state, in which the FERM domain binds to one of many membrane binding proteins and the C-terminal tail binds to F-actin. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). Merlin, which is highly related to the members of the ezrin, radixin, and moesin (ERM) protein family that are directly attached to and functionally linked with NHE1, is included in this family."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in the ERM family proteins. The ezrin-radixin-moesin (ERM) family includes a group of closely related cytoskeletal proteins that play an essential role in microvilli formation, T-cell activation, and tumor metastasis through providing a regulated linkage between F-actin and membrane-associated proteins. These proteins may also function in signaling cascades that regulate the assembly of actin stress fibers. The ERM proteins consist of an N-terminal FERM domain, a coiled-coil (CC) domain and a C-terminal tail segment (C-tail) containing a well-defined actin-binding motif. They exist in two states, a dormant state in which the FERM domain binds to its own C-terminal tail and thereby precludes binding of some partner proteins, and an activated state, in which the FERM domain binds to one of many membrane binding proteins and the C-terminal tail binds to F-actin. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). Merlin, which is highly related to the members of the ezrin, radixin, and moesin (ERM) protein family that are directly attached to and functionally linked with NHE1, is included in this family. — an NCBI CDD conserved domain (cd17097); members share this curated model.
