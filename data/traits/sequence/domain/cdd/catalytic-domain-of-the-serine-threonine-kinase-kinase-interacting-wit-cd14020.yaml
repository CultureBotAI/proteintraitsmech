identifier: CDD:cd14020
label: "Catalytic domain of the Serine/Threonine Kinase, Kinase Interacting with Stathmin (also called U2AF homology motif (UHM) kinase 1). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. KIS (or UHMK1) contains an N-terminal kinase domain and a C-terminal domain with a UHM motif, a protein interaction motif initially found in the pre-mRNA splicing factor U2AF. It phosphorylates the splicing factor SF1, which enhances binding to the splice site to promote spliceosome assembly. KIS was first identified as a kinase that interacts with stathmin, a phosphoprotein that plays a role in axon development and microtubule dynamics. It localizes in RNA granules in neurons and is important in neurite outgrowth. The KIS/UHMK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Kinase Interacting with Stathmin (also called U2AF homology motif (UHM) kinase 1). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. KIS (or UHMK1) contains an N-terminal kinase domain and a C-terminal domain with a UHM motif, a protein interaction motif initially found in the pre-mRNA splicing factor U2AF. It phosphorylates the splicing factor SF1, which enhances binding to the splice site to promote spliceosome assembly. KIS was first identified as a kinase that interacts with stathmin, a phosphoprotein that plays a role in axon development and microtubule dynamics. It localizes in RNA granules in neurons and is important in neurite outgrowth. The KIS/UHMK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14020); members share this curated model.
