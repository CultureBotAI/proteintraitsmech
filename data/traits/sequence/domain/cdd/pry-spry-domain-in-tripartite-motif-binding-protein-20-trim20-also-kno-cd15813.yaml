identifier: CDD:cd15813
label: "PRY/SPRY domain in tripartite motif-binding protein 20 (TRIM20), also known as pyrin. This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM20, which is also known as pyrin or marenostrin. Unlike TRIM domains that are composed of RING/B-box/coiled-coil core, the N-terminal RING domain in TRIM20 is exchanged by a PYRIN domain (PYD), a prime mediator of protein interactions necessary for apoptosis, inflammation and innate immune signaling pathway, and it also harbors a C-terminal B30.2 domain. Mutations in pyrin (TRIM20) are associated with familial Mediterranean fever (FMF), a recessively hereditary periodic fever syndrome, characterized by episodes of inflammation and fever. These mutations cluster in the C-terminal B30.2 domain and therefore it is assumed that pyrin plays a role in the innate immune system by possibly effecting caspase-1-dependent IL-1beta maturation."
definition: >-
  PRY/SPRY domain in tripartite motif-binding protein 20 (TRIM20), also known as pyrin. This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM20, which is also known as pyrin or marenostrin. Unlike TRIM domains that are composed of RING/B-box/coiled-coil core, the N-terminal RING domain in TRIM20 is exchanged by a PYRIN domain (PYD), a prime mediator of protein interactions necessary for apoptosis, inflammation and innate immune signaling pathway, and it also harbors a C-terminal B30.2 domain. Mutations in pyrin (TRIM20) are associated with familial Mediterranean fever (FMF), a recessively hereditary periodic fever syndrome, characterized by episodes of inflammation and fever. These mutations cluster in the C-terminal B30.2 domain and therefore it is assumed that pyrin plays a role in the innate immune system by possibly effecting caspase-1-dependent IL-1beta maturation. — an NCBI CDD conserved domain (cd15813); members share this curated model.
