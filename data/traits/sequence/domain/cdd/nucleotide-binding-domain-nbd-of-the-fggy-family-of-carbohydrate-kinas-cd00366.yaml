identifier: CDD:cd00366
label: "nucleotide-binding domain (NBD) of the FGGY family of carbohydrate kinases. This family is predominantly composed of glycerol kinase (GK) and similar carbohydrate kinases including rhamnulokinase (RhuK), xylulokinase (XK), gluconokinase (GntK), ribulokinase (RBK), and fuculokinase (FK). These enzymes catalyze the transfer of a phosphate group, usually from ATP, to their carbohydrate substrates. The monomer of FGGY proteins contains two large domains, which are separated by a deep cleft that forms the active site. One domain is primarily involved in sugar substrate binding, and the other is mainly responsible for ATP binding. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. Substrate-induced conformational changes and a divalent cation may be required for the catalytic activity. The FGGY family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of the FGGY family of carbohydrate kinases. This family is predominantly composed of glycerol kinase (GK) and similar carbohydrate kinases including rhamnulokinase (RhuK), xylulokinase (XK), gluconokinase (GntK), ribulokinase (RBK), and fuculokinase (FK). These enzymes catalyze the transfer of a phosphate group, usually from ATP, to their carbohydrate substrates. The monomer of FGGY proteins contains two large domains, which are separated by a deep cleft that forms the active site. One domain is primarily involved in sugar substrate binding, and the other is mainly responsible for ATP binding. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. Substrate-induced conformational changes and a divalent cation may be required for the catalytic activity. The FGGY family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd00366); members share this curated model.
