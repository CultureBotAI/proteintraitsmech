identifier: CDD:cd17905
label: "chemotaxis protein CheC; includes CheC classes I, II, and III. This family contains chemotaxis protein CheC that acts as a weak CheY-P phosphatase but shows increased activity in the presence of CheD. This CheC family includes three classes: class I containing Bacillus subtilis CheC which might function as a regulator of CheD; class II CheCs that likely function as phosphatases in systems other than chemotaxis; and class III CheCs that are found chiefly in the archaeal class Halobacteria and might function similarly as class I CheCs. Class I CheCs contain two active sites with the consensus sequence ([DS]xxxExxNx(22)P), with four conserved residues thought to form the phosphatase active site; class II and class III CheCs have only one actve site."
definition: >-
