identifier: CDD:cd18512
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 2 (KLHL2). KLHL2, also called actin-binding protein Mayven, is a novel actin-binding protein predominantly expressed in the brain. It plays a role in the reorganization of the actin cytoskeleton, and promotes growth of cell projections in oligodendrocyte precursors. KLHL2 is a component of a cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination of target proteins, such as NPTXR, leading most often to their proteasomal degradation."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 2 (KLHL2). KLHL2, also called actin-binding protein Mayven, is a novel actin-binding protein predominantly expressed in the brain. It plays a role in the reorganization of the actin cytoskeleton, and promotes growth of cell projections in oligodendrocyte precursors. KLHL2 is a component of a cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination of target proteins, such as NPTXR, leading most often to their proteasomal degradation. — an NCBI CDD conserved domain (cd18512); members share this curated model.
