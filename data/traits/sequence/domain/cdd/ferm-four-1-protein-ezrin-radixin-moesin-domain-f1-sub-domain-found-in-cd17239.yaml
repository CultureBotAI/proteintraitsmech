identifier: CDD:cd17239
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in Ezrin and similar proteins. Ezrin, also termed cytovillin, or villin-2, or p81, is a member of the ezrin/radixin/moesin (ERM) family of cytoskeletal proteins that plays an essential role in microvilli formation, T-cell activation, and tumor metastasis through providing a regulated linkage between F-actin and membrane-associated proteins. These proteins may also function in signaling cascades that regulate the assembly of actin stress fibers. The ERM proteins consist of an N-terminal FERM domain, a coiled-coil (CC) domain and a C-terminal tail segment (C-tail) containing a well-defined actin-binding motif. The C-terminal domain can fold back to bind to the FERM domain forming an autoinhibited conformation. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N).  Ezrin is a tyrosine kinase substrate that functions as a cross-linker between actin cytoskeleton and plasma membrane. It has been implicated in the regulation of the proliferation, apoptosis, adhesion, invasion, metastasis and angiogenesis of cancer cells."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in Ezrin and similar proteins. Ezrin, also termed cytovillin, or villin-2, or p81, is a member of the ezrin/radixin/moesin (ERM) family of cytoskeletal proteins that plays an essential role in microvilli formation, T-cell activation, and tumor metastasis through providing a regulated linkage between F-actin and membrane-associated proteins. These proteins may also function in signaling cascades that regulate the assembly of actin stress fibers. The ERM proteins consist of an N-terminal FERM domain, a coiled-coil (CC) domain and a C-terminal tail segment (C-tail) containing a well-defined actin-binding motif. The C-terminal domain can fold back to bind to the FERM domain forming an autoinhibited conformation. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). Ezrin is a tyrosine kinase substrate that functions as a cross-linker between actin cytoskeleton and plasma membrane. It has been implicated in the regulation of the proliferation, apoptosis, adhesion, invasion, metastasis and angiogenesis of cancer cells. — an NCBI CDD conserved domain (cd17239); members share this curated model.
