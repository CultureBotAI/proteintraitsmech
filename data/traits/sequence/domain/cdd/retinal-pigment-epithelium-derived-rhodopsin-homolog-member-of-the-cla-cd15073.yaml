identifier: CDD:cd15073
label: "retinal pigment epithelium-derived rhodopsin homolog, member of the class A family of seven-transmembrane G protein-coupled receptors. Peropsin, also known as a retinal pigment epithelium-derived rhodopsin homolog (RRH), is a visual pigment-like protein found exclusively in the apical microvilli of the retinal pigment epithelium. Peropsin belongs to the type 2 opsin family of the class A G-protein coupled receptors. Peropsin presumably plays a physiological role in the retinal pigment epithelium either by detecting light directly or monitoring the levels of retinoids, the primary light absorber in visual perception, or other pigment-related compounds in the eye."
definition: >-
