identifier: CDD:cd18385
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 10 (BTBD10). BTBD10, also called glucose metabolism-related protein 1 (GMRP1), plays a major role as an activator of AKT family members. It binds to Akt and protein phosphatase 2A (PP2A) and inhibits the PP2A-mediated dephosphorylation of Akt, thereby keeping Akt activated. It also plays a role in preventing motor neuronal death and accelerating the growth of pancreatic beta cells. BTBD10 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 10 (BTBD10). BTBD10, also called glucose metabolism-related protein 1 (GMRP1), plays a major role as an activator of AKT family members. It binds to Akt and protein phosphatase 2A (PP2A) and inhibits the PP2A-mediated dephosphorylation of Akt, thereby keeping Akt activated. It also plays a role in preventing motor neuronal death and accelerating the growth of pancreatic beta cells. BTBD10 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18385); members share this curated model.
