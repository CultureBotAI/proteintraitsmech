identifier: CDD:cd16909
label: "YEATS domain found in YEATS domain-containing protein 4 and similar proteins. glioma amplified sequence 41 (GAS41, also known as,  YEATS domain-containing protein 4, NuMA-binding protein 1 ) is a YEATS domain family protein that is amplified and acts as an oncogene in human glioma. GAS41 is a YEATS domain family protein and has been shown to interact with the general transcription factor TFIIF via the YEATS domain. DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein."
definition: >-
  YEATS domain found in YEATS domain-containing protein 4 and similar proteins. glioma amplified sequence 41 (GAS41, also known as, YEATS domain-containing protein 4, NuMA-binding protein 1 ) is a YEATS domain family protein that is amplified and acts as an oncogene in human glioma. GAS41 is a YEATS domain family protein and has been shown to interact with the general transcription factor TFIIF via the YEATS domain. DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein. — an NCBI CDD conserved domain (cd16909); members share this curated model.
