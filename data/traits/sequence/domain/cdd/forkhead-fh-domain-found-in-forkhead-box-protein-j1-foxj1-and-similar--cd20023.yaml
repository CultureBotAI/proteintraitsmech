identifier: CDD:cd20023
label: "Forkhead (FH) domain found in Forkhead box protein J1 (FOXJ1) and similar proteins. FOXJ1, also called Forkhead-related protein FKHL13 or hepatocyte nuclear factor 3 Forkhead homolog 4 (HFH-4), acts as a transcription factor specifically required for the formation of motile cilia. It acts by activating transcription of genes that mediate assembly of motile cilia, such as CFAP157. FOXJ1 binds the DNA consensus sequences 5'-HWDTGTTTGTTTA-3' or 5'-KTTTGTTGTTKTW-3' (where H is not G, W is A or T, D is not C, and K is G or T). It activates the transcription of a variety of ciliary proteins in the developing brain and lung. The FH domain is a winged helix DNA-binding domain."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein J1 (FOXJ1) and similar proteins. FOXJ1, also called Forkhead-related protein FKHL13 or hepatocyte nuclear factor 3 Forkhead homolog 4 (HFH-4), acts as a transcription factor specifically required for the formation of motile cilia. It acts by activating transcription of genes that mediate assembly of motile cilia, such as CFAP157. FOXJ1 binds the DNA consensus sequences 5'-HWDTGTTTGTTTA-3' or 5'-KTTTGTTGTTKTW-3' (where H is not G, W is A or T, D is not C, and K is G or T). It activates the transcription of a variety of ciliary proteins in the developing brain and lung. The FH domain is a winged helix DNA-binding domain. — an NCBI CDD conserved domain (cd20023); members share this curated model.
