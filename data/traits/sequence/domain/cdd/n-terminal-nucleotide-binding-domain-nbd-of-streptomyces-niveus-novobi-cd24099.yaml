identifier: CDD:cd24099
label: "N-terminal nucleotide-binding domain (NBD) of Streptomyces niveus novobiocin biosynthesis protein N (NovN) and similar proteins. The family includes a group of proteins similar to Streptomyces niveus novobiocin biosynthesis protein N (NovN) and Sinorhizobium fredii nodulation protein NolNO. NovN (EC 2.1.3.12), also called decarbamoylnovobiocin carbamoyltransferase, acts as a carbamoyltransferase that mediates 3'-carbamoylation of the noviosyl ring to produce novobiocin, the final step in the novobiocin biosynthesis pathway. Novobiocincin is an aminocoumarin family antibiotic that targets bacterial DNA gyrases. NolNO (EC 2.1.3.-), also called NolO or Y4hD, is involved in the O-carbamoylation of nod factors. Members of this family consist of two domains. The model corresponds to the N-terminal Kae1-like domain."
definition: >-
  N-terminal nucleotide-binding domain (NBD) of Streptomyces niveus novobiocin biosynthesis protein N (NovN) and similar proteins. The family includes a group of proteins similar to Streptomyces niveus novobiocin biosynthesis protein N (NovN) and Sinorhizobium fredii nodulation protein NolNO. NovN (EC 2.1.3.12), also called decarbamoylnovobiocin carbamoyltransferase, acts as a carbamoyltransferase that mediates 3'-carbamoylation of the noviosyl ring to produce novobiocin, the final step in the novobiocin biosynthesis pathway. Novobiocincin is an aminocoumarin family antibiotic that targets bacterial DNA gyrases. NolNO (EC 2.1.3.-), also called NolO or Y4hD, is involved in the O-carbamoylation of nod factors. Members of this family consist of two domains. The model corresponds to the N-terminal Kae1-like domain. — an NCBI CDD conserved domain (cd24099); members share this curated model.
