identifier: CDD:cd21542
label: "SPOC (Spen paralog and ortholog C-terminal) domain found in Saccharomyces cerevisiae bypass of ESS1 protein 1 (Bye1p) and similar proteins. Yeast Bye1p is a nuclear transcription factor with a domain resembling the central domain in the transcription elongation factor TFIIS. It plays an inhibitory role during transcription elongation. It functions as a multicopy suppressor of Ess1, a peptidyl-prolyl cis-trans isomerase involved in proline isomerization of the C-terminal domain (CTD) of RNA polymerase II (Pol II). Bye1p contains an N-terminal plant homeodomain (PHD) finger, a central Pol II-binding TFIIS-like domain (TLD) domain, and a C-terminal SPOC domain. This model corresponds to the SPOC domain which is involved in developmental signaling and has also been proposed to be a phosphorylation binding module."
definition: >-
  SPOC (Spen paralog and ortholog C-terminal) domain found in Saccharomyces cerevisiae bypass of ESS1 protein 1 (Bye1p) and similar proteins. Yeast Bye1p is a nuclear transcription factor with a domain resembling the central domain in the transcription elongation factor TFIIS. It plays an inhibitory role during transcription elongation. It functions as a multicopy suppressor of Ess1, a peptidyl-prolyl cis-trans isomerase involved in proline isomerization of the C-terminal domain (CTD) of RNA polymerase II (Pol II). Bye1p contains an N-terminal plant homeodomain (PHD) finger, a central Pol II-binding TFIIS-like domain (TLD) domain, and a C-terminal SPOC domain. This model corresponds to the SPOC domain which is involved in developmental signaling and has also been proposed to be a phosphorylation binding module. — an NCBI CDD conserved domain (cd21542); members share this curated model.
