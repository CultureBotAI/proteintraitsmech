identifier: CDD:cd17261
label: "Type I restriction-modification system specificity (S) subunit TRD-CR, similar to Escherichia coli str. K-12 substr. MG1655 S subunit (S.EcoKI) TRD2-CR2, Escherichia coli A58 S subunit (S.EcoEI) TRD2-CR2, and Aminomonas paucivorans S subunit (S.Apa12260I) TRD2-CR2. Escherichia coli str. K-12 substr. MG1655 S subunit (S.EcoKI) recognizes 5'...  AACNNNNNNGTGC  ... 3', Escherichia coli A58 S subunit (S.EcoEI) recognizes 5'... GAGNNNNNNNATGC ... 3', and Aminomonas paucivorans S subunit (S.Apa12260I) recognizes 5'... GCCNNNNNCTCC ... 3'. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example, S.EcoKI-TRD1 recognizes AAC/GTT and S.EcoKI-TRD2 recognizes GCAC/GTGC, S.EcoEI TRD1 recognizes GAG/CTC and S.EcoEI TRD2 recognizes GCAT/ATGC, and S.Apa12260I TRD1 recognizes GCC/GGC and S.Apa12260I TRD2 recognizes GGAG/CTCC. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases."
definition: >-
  Type I restriction-modification system specificity (S) subunit TRD-CR, similar to Escherichia coli str. K-12 substr. MG1655 S subunit (S.EcoKI) TRD2-CR2, Escherichia coli A58 S subunit (S.EcoEI) TRD2-CR2, and Aminomonas paucivorans S subunit (S.Apa12260I) TRD2-CR2. Escherichia coli str. K-12 substr. MG1655 S subunit (S.EcoKI) recognizes 5'... AACNNNNNNGTGC ... 3', Escherichia coli A58 S subunit (S.EcoEI) recognizes 5'... GAGNNNNNNNATGC ... 3', and Aminomonas paucivorans S subunit (S.Apa12260I) recognizes 5'... GCCNNNNNCTCC ... 3'. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example, S.EcoKI-TRD1 recognizes AAC/GTT and S.EcoKI-TRD2 recognizes GCAC/GTGC, S.EcoEI TRD1 recognizes GAG/CTC and S.EcoEI TRD2 recognizes GCAT/ATGC, and S.Apa12260I TRD1 recognizes GCC/GGC and S.Apa12260I TRD2 recognizes GGAG/CTCC. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases. — an NCBI CDD conserved domain (cd17261); members share this curated model.
