identifier: CDD:cd22146
label: "F-box domain found in Saccharomyces cerevisiae mitochondrial F-box protein MFB1 (ScMFB1) and similar proteins. ScMFB1 is a novel mitochondria-associated F-box protein that functions to increase mitochondrial connectivity in yeast. ScMFB1 acts as a key component of a Skp1-Cdc53/Cullin-F-box protein (SCF) ubiquitin ligase complex machinery that regulates mitochondrial dynamics throughout the yeast's entire life cycle. It interacts with Skp1p in an F-box-dependent manner. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Saccharomyces cerevisiae mitochondrial F-box protein MFB1 (ScMFB1) and similar proteins. ScMFB1 is a novel mitochondria-associated F-box protein that functions to increase mitochondrial connectivity in yeast. ScMFB1 acts as a key component of a Skp1-Cdc53/Cullin-F-box protein (SCF) ubiquitin ligase complex machinery that regulates mitochondrial dynamics throughout the yeast's entire life cycle. It interacts with Skp1p in an F-box-dependent manner. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22146); members share this curated model.
