identifier: CDD:cd23175
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Potyviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Potyviridae, order: Patatavirales. Potyviridae, is the largest family of RNA plant viruses, members of which have (+)ssRNA genomes and flexuous filamentous particles. The family is divided into eight genera: Brambyvirus, Bymovirus, Ipomovirus, Macluravirus, Poacevirus, Potyvirus, Rymovirus, and Tritimovirus. Most genomes are monopartite but those of members of the genus Bymovirus are bipartite. Some members cause serious disease epidemics in cultivated plants. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Potyviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Potyviridae, order: Patatavirales. Potyviridae, is the largest family of RNA plant viruses, members of which have (+)ssRNA genomes and flexuous filamentous particles. The family is divided into eight genera: Brambyvirus, Bymovirus, Ipomovirus, Macluravirus, Poacevirus, Potyvirus, Rymovirus, and Tritimovirus. Most genomes are monopartite but those of members of the genus Bymovirus are bipartite. Some members cause serious disease epidemics in cultivated plants. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23175); members share this curated model.
