identifier: CDD:cd01308
label: "Isoaspartyl dipeptidase hydrolyzes the beta-L-isoaspartyl linkages in dipeptides, as part of the degradative pathway to eliminate proteins with beta-L-isoaspartyl peptide bonds, bonds whereby the beta-group of an aspartate forms the peptide link with the amino group of the following amino acid. Formation of this bond is a spontaneous nonenzymatic reaction in nature and can profoundly effect the function of the protein. Isoaspartyl dipeptidase is an octameric enzyme that contains a binuclear zinc center in the active site of each subunit and shows a strong preference of hydrolyzing Asp-Leu dipeptides."
definition: >-
  Isoaspartyl dipeptidase hydrolyzes the beta-L-isoaspartyl linkages in dipeptides, as part of the degradative pathway to eliminate proteins with beta-L-isoaspartyl peptide bonds, bonds whereby the beta-group of an aspartate forms the peptide link with the amino group of the following amino acid. Formation of this bond is a spontaneous nonenzymatic reaction in nature and can profoundly effect the function of the protein. Isoaspartyl dipeptidase is an octameric enzyme that contains a binuclear zinc center in the active site of each subunit and shows a strong preference of hydrolyzing Asp-Leu dipeptides. — an NCBI CDD conserved domain (cd01308); members share this curated model.
