identifier: CDD:cd11412
label: "basic helix-loop-helix (bHLH) domain found in twist-related protein 1 (TWIST1) and similar proteins. TWIST1, also termed Class A basic helix-loop-helix protein 38 (bHLHa38), or H-twist, is a bHLH transcriptional regulator that inhibits myogenesis by sequestrating E proteins, inhibiting trans-activation by MEF2, and inhibiting DNA-binding by MYOD1 through physical interaction. It also represses expression of proinflammatory cytokines such as TNFA and IL1B. In addition, TWIST1 is involved in cancer development and progression."
definition: >-
