identifier: CDD:cd16649
label: "Modified RING finger, HC subclass (C3HC5-type), found in RING finger proteins, RNF26, RNF197 (CGRRF1), RNF156 (MGRN1), RNF157 and similar proteins. This subfamily corresponds to a group of RING finger proteins containing a modified C3HC5-type RING-HC finger, which is distinguished from typical C3HC4 RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain. Cell growth regulator with RING finger domain protein 1 (CGRRF1), also known as cell growth regulatory gene 19 protein (CGR19) or RING finger protein 197 (RNF197), functions as a novel biomarker to monitor endometrial sensitivity and response to insulin-sensitizing drugs, such as metformin, in the context of obesity. RNF26 is an E3 ubiquitin ligase that temporally regulates virus-triggered type I interferon induction by increasing the stability of Mediator of IRF3 activation, MITA, also known as STING, through K11-linked polyubiquitination after viral infection and promoting degradation of IRF3, another important component required for virus-triggered interferon induction. Mahogunin ring finger-1 (MGRN1), also known as RING finger protein 156 (RNF156), is a cytosolic E3 ubiquitin-protein ligase that inhibits signaling through the G protein-coupled melanocortin receptors-1 (MC1R), -2 (MC2R) and -4 (MC4R) via ubiquitylation-dependent and -independent processes. It suppresses chaperone-associated misfolded protein aggregation and toxicity. RNF157 is a cytoplasmic E3 ubiquitin ligase predominantly expressed in the brain. It is a homolog of the E3 ligase MGRN1. In cultured neurons, it promotes neuronal survival in an E3 ligase-dependent manner. In contrast, it supports growth and maintenance of dendrites independent of its E3 ligase activity. RNF157 interacts with and ubiquitinates the adaptor protein APBB1 (amyloid beta precursor protein-binding, family B, member 1 or Fe65), which regulates neuronal survival, but not dendritic growth downstream of RNF157. The nuclear localization of APBB1 together with its interaction partner RNA-binding protein SART3 (squamous cell carcinoma antigen recognized by T cells 3 or Tip110) is crucial to trigger apoptosis."
definition: >-
  Modified RING finger, HC subclass (C3HC5-type), found in RING finger proteins, RNF26, RNF197 (CGRRF1), RNF156 (MGRN1), RNF157 and similar proteins. This subfamily corresponds to a group of RING finger proteins containing a modified C3HC5-type RING-HC finger, which is distinguished from typical C3HC4 RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain. Cell growth regulator with RING finger domain protein 1 (CGRRF1), also known as cell growth regulatory gene 19 protein (CGR19) or RING finger protein 197 (RNF197), functions as a novel biomarker to monitor endometrial sensitivity and response to insulin-sensitizing drugs, such as metformin, in the context of obesity. RNF26 is an E3 ubiquitin ligase that temporally regulates virus-triggered type I interferon induction by increasing the stability of Mediator of IRF3 activation, MITA, also known as STING, through K11-linked polyubiquitination after viral infection and promoting degradation of IRF3, another important component required for virus-triggered interferon induction. Mahogunin ring finger-1 (MGRN1), also known as RING finger protein 156 (RNF156), is a cytosolic E3 ubiquitin-protein ligase that inhibits signaling through the G protein-coupled melanocortin receptors-1 (MC1R), -2 (MC2R) and -4 (MC4R) via ubiquitylation-dependent and -independent processes. It suppresses chaperone-associated misfolded protein aggregation and toxicity. RNF157 is a cytoplasmic E3 ubiquitin ligase predominantly expressed in the brain. It is a homolog of the E3 ligase MGRN1. In cultured neurons, it promotes neuronal survival in an E3 ligase-dependent manner. In contrast, it supports growth and maintenance of dendrites independent of its E3 ligase activity. RNF157 interacts with and ubiquitinates the adaptor protein APBB1 (amyloid beta precursor protein-binding, family B, member 1 or Fe65), which regulates neuronal survival, but not dendritic growth downstream of RNF157. The nuclear localization of APBB1 together with its interaction partner RNA-binding protein SART3 (squamous cell carcinoma antigen recognized by T cells 3 or Tip110) is crucial to trigger apoptosis. — an NCBI CDD conserved domain (cd16649); members share this curated model.
