identifier: CDD:cd14319
label: "UBA domain of next to BRCA1 gene 1 protein (NBR1) and similar proteins. NBR1, also called cell migration-inducing gene 19 protein, membrane component chromosome 17 surface marker 2, neighbor of BRCA1 gene 1 protein, or protein 1A1-3B, is a scaffold protein that may be involved in signal transmission downstream of the serine/protein kinase from the giant muscle protein titin. Moreover, NBR1 functions as an autophagic receptor for ubiquitinated cargo. It interacts with ATG8-family proteins for its degradation by autophagy. NBR1 contains an N-terminal Phox and Bem1p (PB1) domain that plays a critical role in mediating protein-protein interactions with both titin kinase and with another scaffold protein, p62. NBR1 also has a LC3-interaction region (LIR) and a ubiquitin-associated (UBA) domain. The LIR is required for the autophagic clearance of NBR1. UBA domain is responsible for the ubiquitin binding which is necessary for the puromycin-induced formation of ubiquitinated protein aggregates."
definition: >-
  UBA domain of next to BRCA1 gene 1 protein (NBR1) and similar proteins. NBR1, also called cell migration-inducing gene 19 protein, membrane component chromosome 17 surface marker 2, neighbor of BRCA1 gene 1 protein, or protein 1A1-3B, is a scaffold protein that may be involved in signal transmission downstream of the serine/protein kinase from the giant muscle protein titin. Moreover, NBR1 functions as an autophagic receptor for ubiquitinated cargo. It interacts with ATG8-family proteins for its degradation by autophagy. NBR1 contains an N-terminal Phox and Bem1p (PB1) domain that plays a critical role in mediating protein-protein interactions with both titin kinase and with another scaffold protein, p62. NBR1 also has a LC3-interaction region (LIR) and a ubiquitin-associated (UBA) domain. The LIR is required for the autophagic clearance of NBR1. UBA domain is responsible for the ubiquitin binding which is necessary for the puromycin-induced formation of ubiquitinated protein aggregates. — an NCBI CDD conserved domain (cd14319); members share this curated model.
