identifier: CDD:cd00406
label: "FabD_like. FabD domain also known as Malonyl-CoA: transacylase (MAT)domain bacterial fabD gene product participates in both fatty acid and polyketide pathways, transferring malonyl groups that are used as extender units in chain growth from Malonyl-CoA to pathway -specific acyl carrier proteins (ACP). FabD is 32 kDa monomer composed of two subdomain.The core of first subdomen is structurally similar to  hydrolases. The second subdomen has ferredoxin-like fold. FabD domain is essential part of both type I and type II fatty acid synthases(FAS) and polyketide synthases (PKS).The type II  FAS and PKS is a collection of individual enzymes encoded by separate genes, whereas type I FAS and PKS is a single polypeptide with multiple active sites that performs all the catalytic reactions."
definition: >-
  FabD_like. FabD domain also known as Malonyl-CoA: transacylase (MAT)domain bacterial fabD gene product participates in both fatty acid and polyketide pathways, transferring malonyl groups that are used as extender units in chain growth from Malonyl-CoA to pathway -specific acyl carrier proteins (ACP). FabD is 32 kDa monomer composed of two subdomain.The core of first subdomen is structurally similar to hydrolases. The second subdomen has ferredoxin-like fold. FabD domain is essential part of both type I and type II fatty acid synthases(FAS) and polyketide synthases (PKS).The type II FAS and PKS is a collection of individual enzymes encoded by separate genes, whereas type I FAS and PKS is a single polypeptide with multiple active sites that performs all the catalytic reactions. — an NCBI CDD conserved domain (cd00406); members share this curated model.
