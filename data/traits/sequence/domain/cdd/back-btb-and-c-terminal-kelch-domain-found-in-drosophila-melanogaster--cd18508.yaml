identifier: CDD:cd18508
label: "BACK (BTB and C-terminal Kelch) domain found in Drosophila melanogaster ring canal kelch protein (KEL) and similar proteins. KEL, also termed kelch short protein, is a component of ring canals that regulates the flow of cytoplasm between cells. It binds actin and may be involved in the regulation of cytoplasm flow from nurse cells to the oocyte during oogenesis."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Drosophila melanogaster ring canal kelch protein (KEL) and similar proteins. KEL, also termed kelch short protein, is a component of ring canals that regulates the flow of cytoplasm between cells. It binds actin and may be involved in the regulation of cytoplasm flow from nurse cells to the oocyte during oogenesis. — an NCBI CDD conserved domain (cd18508); members share this curated model.
