identifier: CDD:cd22363
label: tRNA-intron_lyase_C
definition: >-
  catalytic C-terminal domain of the tRNA-intron lyase. This C-terminal catalytic domain of tRNA intron endonucleases cleaves pre tRNA at the 5' and 3' splice sites to release the intron (EC:3.1.27.9). It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI
