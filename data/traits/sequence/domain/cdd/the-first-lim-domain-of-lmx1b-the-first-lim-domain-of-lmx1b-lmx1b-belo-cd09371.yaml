identifier: CDD:cd09371
label: "The first LIM domain of Lmx1b. The first LIM domain of Lmx1b: Lmx1b belongs to the LHX protein family, which features two tandem N-terminal LIM domains and a C-terminal DNA binding homeodomain. Members of LHX family are found in the nucleus and act as transcription factors or cofactors. LHX proteins are critical for the development of specialized cells in multiple tissue types, including the nervous system, skeletal muscle, the heart, the kidneys, and endocrine organs, such as the pituitary gland and the pancreas.  In mouse, Lmx1b functions in the developing limbs and eyes, the kidneys, the brain, and in cranial mesenchyme. The disruption of Lmx1b gene results kidney and limb defects. In the brain, Lmx1b is important for generation of mesencephalic dopamine neurons and the differentiation of serotonergic neurons. In the mouse eye, Lmx1b regulates anterior segment (cornea, iris, ciliary body, trabecular meshwork, and lens) development. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  The first LIM domain of Lmx1b. The first LIM domain of Lmx1b: Lmx1b belongs to the LHX protein family, which features two tandem N-terminal LIM domains and a C-terminal DNA binding homeodomain. Members of LHX family are found in the nucleus and act as transcription factors or cofactors. LHX proteins are critical for the development of specialized cells in multiple tissue types, including the nervous system, skeletal muscle, the heart, the kidneys, and endocrine organs, such as the pituitary gland and the pancreas. In mouse, Lmx1b functions in the developing limbs and eyes, the kidneys, the brain, and in cranial mesenchyme. The disruption of Lmx1b gene results kidney and limb defects. In the brain, Lmx1b is important for generation of mesencephalic dopamine neurons and the differentiation of serotonergic neurons. In the mouse eye, Lmx1b regulates anterior segment (cornea, iris, ciliary body, trabecular meshwork, and lens) development. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09371); members share this curated model.
