identifier: CDD:cd22638
label: "Caenorhabditis elegans Kunitz domain 11 of papilin (also called abnormal cell migration protein 6 or mig-6), Amblyomma hebraeum amblin domain 1, and similar proteins. This model includes Caenorhabditis elegans Kunitz domain 11 of papilin (also called abnormal cell migration protein 6 or mig-6) and domain 1 of Amblyomma hebraeum amblin, and similar proteins. C. elegans papilin (also called abnormal cell migration protein 6) mig-6 encodes long (MIG-6L) and short (MIG-6S) isoforms of the extracellular matrix protein papilin, each required for distinct aspects of distal tip cell (DTC) migration and both isoforms have an N-terminal papilin cassette, lagrin repeats and six C-terminal Kunitz-type serine proteinase inhibitory domains. It plays a role in embryogenesis, the second phase of distal cell tip migration and is required for distribution of the metalloproteinase, mig-17, during organogenesis. Amblin contains two Kunitz-like domains and specifically inhibits thrombin. These domains are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Caenorhabditis elegans Kunitz domain 11 of papilin (also called abnormal cell migration protein 6 or mig-6), Amblyomma hebraeum amblin domain 1, and similar proteins. This model includes Caenorhabditis elegans Kunitz domain 11 of papilin (also called abnormal cell migration protein 6 or mig-6) and domain 1 of Amblyomma hebraeum amblin, and similar proteins. C. elegans papilin (also called abnormal cell migration protein 6) mig-6 encodes long (MIG-6L) and short (MIG-6S) isoforms of the extracellular matrix protein papilin, each required for distinct aspects of distal tip cell (DTC) migration and both isoforms have an N-terminal papilin cassette, lagrin repeats and six C-terminal Kunitz-type serine proteinase inhibitory domains. It plays a role in embryogenesis, the second phase of distal cell tip migration and is required for distribution of the metalloproteinase, mig-17, during organogenesis. Amblin contains two Kunitz-like domains and specifically inhibits thrombin. These domains are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22638); members share this curated model.
