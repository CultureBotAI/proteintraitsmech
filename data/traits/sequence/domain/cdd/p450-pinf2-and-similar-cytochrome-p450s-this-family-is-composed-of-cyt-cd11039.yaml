identifier: CDD:cd11039
label: "P450-pinF2 and similar cytochrome P450s. This family is composed of cytochrome P450s (CYPs) with similarity to Agrobacterium tumefaciens P450-pinF2, whose expression is induced by the presence of wounded plant tissue and by plant phenolic compounds such as acetosyringone. P450-pinF2 may be involved in the detoxification of plant protective agents at the site of wounding. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
