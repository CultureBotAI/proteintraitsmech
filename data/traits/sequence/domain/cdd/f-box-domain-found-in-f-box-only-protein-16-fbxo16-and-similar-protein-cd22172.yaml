identifier: CDD:cd22172
label: "F-box domain found in F-box only protein 16 (FBXO16) and similar proteins. FBXO16, also called FBX16, is part of an SCF (SKP1-cullin-F-box) protein ligase complex. It probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation. It functions as a tumor suppressor by attenuating nuclear beta-catenin function. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 16 (FBXO16) and similar proteins. FBXO16, also called FBX16, is part of an SCF (SKP1-cullin-F-box) protein ligase complex. It probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation. It functions as a tumor suppressor by attenuating nuclear beta-catenin function. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22172); members share this curated model.
