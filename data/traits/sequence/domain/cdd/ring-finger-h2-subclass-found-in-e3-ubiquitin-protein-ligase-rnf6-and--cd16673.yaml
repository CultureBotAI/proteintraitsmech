identifier: CDD:cd16673
label: "RING finger, H2 subclass, found in E3 ubiquitin-protein ligase RNF6 and similar proteins. RNF6 is an androgen receptor (AR)-associated protein that induces AR ubiquitination and promotes AR transcriptional activity. RNF6-induced ubiquitination may regulate AR transcriptional activity and specificity by modulating cofactor recruitment. RNF6 is overexpressed in hormone-refractory human prostate cancer tissues and required for prostate cancer cell growth under androgen-depleted conditions. Moreover, RNF6 regulates local serine/threonine kinase LIM kinase 1 (LIMK1) levels in axonal growth cones. RNF6-induced LIMK1 polyubiquitination is mediated via K48 of ubiquitin and leads to proteasomal degradation of the kinase. RNF6 also binds and upregulates the Inha promoter, and functions as a transcription regulatory protein in the mouse sertoli cell. RNF6 also acts as a potential tumor suppressor gene involved in the pathogenesis of esophageal squamous cell carcinoma (ESCC). RNF6 contains an N-terminal coiled-coil domain, a Lys-X-X-Leu/Ile-X-X-Leu/Ile (KIL) motif, and a C-terminal C3H2C3-type RING-H2 finger which is responsible for its ubiquitin ligase activity. The KIL motif is present in a subset of RING-H2 proteins from organisms as evolutionarily diverse as human, mouse, chicken, Drosophila, Caenorhabditis elegans, and Arabidopsis thaliana."
definition: >-
  RING finger, H2 subclass, found in E3 ubiquitin-protein ligase RNF6 and similar proteins. RNF6 is an androgen receptor (AR)-associated protein that induces AR ubiquitination and promotes AR transcriptional activity. RNF6-induced ubiquitination may regulate AR transcriptional activity and specificity by modulating cofactor recruitment. RNF6 is overexpressed in hormone-refractory human prostate cancer tissues and required for prostate cancer cell growth under androgen-depleted conditions. Moreover, RNF6 regulates local serine/threonine kinase LIM kinase 1 (LIMK1) levels in axonal growth cones. RNF6-induced LIMK1 polyubiquitination is mediated via K48 of ubiquitin and leads to proteasomal degradation of the kinase. RNF6 also binds and upregulates the Inha promoter, and functions as a transcription regulatory protein in the mouse sertoli cell. RNF6 also acts as a potential tumor suppressor gene involved in the pathogenesis of esophageal squamous cell carcinoma (ESCC). RNF6 contains an N-terminal coiled-coil domain, a Lys-X-X-Leu/Ile-X-X-Leu/Ile (KIL) motif, and a C-terminal C3H2C3-type RING-H2 finger which is responsible for its ubiquitin ligase activity. The KIL motif is present in a subset of RING-H2 proteins from organisms as evolutionarily diverse as human, mouse, chicken, Drosophila, Caenorhabditis elegans, and Arabidopsis thaliana. — an NCBI CDD conserved domain (cd16673); members share this curated model.
