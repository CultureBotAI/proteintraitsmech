identifier: CDD:cd14361
label: "UBA-like domain found in Huntingtin-interacting protein K (HYPK) and similar proteins. HYPK, also called Huntingtin yeast partner K or Huntingtin yeast two-hybrid protein K, is an intrinsically unstructured Huntingtin (HTT)-interacting protein with chaperone-like activity. It is involved in regulating cell growth, cell cycle, unfolded protein response, and cell death. All members in this subfamily contain an N-terminal ubiquitin-associated (UBA) that shows high sequence similarity with that of eukaryotic nascent polypeptide-associated complex proteins (NAC) which is one of the cytosolic chaperones that contact the nascent polypeptide chains as they emerge from the ribosome and assist in post-translational processes."
definition: >-
  UBA-like domain found in Huntingtin-interacting protein K (HYPK) and similar proteins. HYPK, also called Huntingtin yeast partner K or Huntingtin yeast two-hybrid protein K, is an intrinsically unstructured Huntingtin (HTT)-interacting protein with chaperone-like activity. It is involved in regulating cell growth, cell cycle, unfolded protein response, and cell death. All members in this subfamily contain an N-terminal ubiquitin-associated (UBA) that shows high sequence similarity with that of eukaryotic nascent polypeptide-associated complex proteins (NAC) which is one of the cytosolic chaperones that contact the nascent polypeptide chains as they emerge from the ribosome and assist in post-translational processes. — an NCBI CDD conserved domain (cd14361); members share this curated model.
