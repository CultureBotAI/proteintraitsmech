identifier: CDD:cd02171
label: "glycerol-3-phosphate cytidylyltransferase. Glycerol-3-phosphate cytidylyltransferase,(CDP-glycerol pyrophosphorylase). Glycerol-3-phosphate cytidyltransferase acts in pathways of teichoic acid biosynthesis. Teichoic acids are substituted polymers, linked by phosphodiester bonds, of glycerol, ribitol, etc. An example is poly(glycerol phosphate), the major teichoic acid of the Bacillus subtilis cell wall. Most, but not all, species encoding proteins in this family are Gram-positive bacteria.  A closely related protein assigned a different function experimentally is a human ethanolamine-phosphate cytidylyltransferase."
definition: >-
  glycerol-3-phosphate cytidylyltransferase. Glycerol-3-phosphate cytidylyltransferase,(CDP-glycerol pyrophosphorylase). Glycerol-3-phosphate cytidyltransferase acts in pathways of teichoic acid biosynthesis. Teichoic acids are substituted polymers, linked by phosphodiester bonds, of glycerol, ribitol, etc. An example is poly(glycerol phosphate), the major teichoic acid of the Bacillus subtilis cell wall. Most, but not all, species encoding proteins in this family are Gram-positive bacteria. A closely related protein assigned a different function experimentally is a human ethanolamine-phosphate cytidylyltransferase. — an NCBI CDD conserved domain (cd02171); members share this curated model.
