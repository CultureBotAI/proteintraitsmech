identifier: CDD:cd17975
label: "DEXH-box helicase domain of DEAH-box helicase 29. DEAH-box helicase 29 (DHX29) is a part of the 43S pre-initiation complex involved in translation initiation of mRNAs with structured 5'-UTRs. DHX29 is part of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 29. DEAH-box helicase 29 (DHX29) is a part of the 43S pre-initiation complex involved in translation initiation of mRNAs with structured 5'-UTRs. DHX29 is part of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17975); members share this curated model.
