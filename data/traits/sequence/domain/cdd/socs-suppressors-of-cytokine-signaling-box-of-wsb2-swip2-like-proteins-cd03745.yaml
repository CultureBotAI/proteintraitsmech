identifier: CDD:cd03745
label: "SOCS (suppressors of cytokine signaling) box of WSB2/SWiP2-like proteins. This family consists of WSB-2 (SOCS-box-containing WD-40 protein) and SWiP-2 (SOCS box and WD-repeats in Protein). No functional information is available for WSB2 or SWiP-2, but limited information is available for the isoforms WSB-1 and SWiP-1.  The general function of the SOCS box is the recruitment of the ubiquitin-transferase system. The SOCS box interacts with Elongins B and C, Cullin-5 or Cullin-2, Rbx-1, and E2. Therefore, SOCS-box-containing proteins probably function as E3 ubiquitin ligases and mediate the degradation of proteins associated through their N-terminal regions."
definition: >-
