identifier: CDD:cd18425
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily V member 2 (KCNV2). KCNV2, also called voltage-gated potassium channel subunit Kv8.2, is a modulatory voltage-gated potassium channel alpha subunit that modulates channel activity by shifting the threshold and the half-maximal activation to more negative values. KCNV2 is essential for visual function and cone survival. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNV2 is a regulatory alpha subunit that cannot form a functional homo-tetrameric channel. It forms hetero-tetrameric channels (with other functional alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily V member 2 (KCNV2). KCNV2, also called voltage-gated potassium channel subunit Kv8.2, is a modulatory voltage-gated potassium channel alpha subunit that modulates channel activity by shifting the threshold and the half-maximal activation to more negative values. KCNV2 is essential for visual function and cone survival. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNV2 is a regulatory alpha subunit that cannot form a functional homo-tetrameric channel. It forms hetero-tetrameric channels (with other functional alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. — an NCBI CDD conserved domain (cd18425); members share this curated model.
