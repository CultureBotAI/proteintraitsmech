identifier: CDD:cd22035
label: "high mobility group (HMG)-box found in sex determining region Y (SRY)-box 15 (SOX15) and similar proteins. SOX-15, also called SOX-12, SOX-20, SOX-26, or SOX-27, is a crucial transcription factor involved in the regulation of embryonic development and in cell fate determination. It binds to the 5'-AACAAT-3' sequence. SOX-15 can be a tumor suppressor in multiple cancer types. SOX-5 is the only member of group G SRY-related high-mobility group (HMG) box (Sox) transcription factors."
definition: >-
  high mobility group (HMG)-box found in sex determining region Y (SRY)-box 15 (SOX15) and similar proteins. SOX-15, also called SOX-12, SOX-20, SOX-26, or SOX-27, is a crucial transcription factor involved in the regulation of embryonic development and in cell fate determination. It binds to the 5'-AACAAT-3' sequence. SOX-15 can be a tumor suppressor in multiple cancer types. SOX-5 is the only member of group G SRY-related high-mobility group (HMG) box (Sox) transcription factors. — an NCBI CDD conserved domain (cd22035); members share this curated model.
