identifier: CDD:cd14342
label: "UBA-like domain found in nuclear RNA export factor NXF1, NXF2 and similar proteins. The NXF family of mRNA nuclear export factors including vertebrate NXF1 (also called tip-associated protein or mRNA export factor TAP), NXF2 (also called cancer/testis antigen CT39 or TAP-like protein TAPL-2), Caenorhabditis elegans NXF1 (ceNXF1), Saccharomyces cerevisiae mRNA nuclear export factor Mex67p and similar proteins. NXF proteins can stimulate nuclear export of mRNAs and facilitate the export of unspliced viral mRNA containing the constitutive transport element. It is a multi-domain protein with a nuclear localization sequence (NLS), a non-canonical mRNA-binding domain, and four leucine-rich repeats (LLR) at the N-terminal region. Its C-terminal part contains a NTF2-like domain and a ubiquitin-associated (UBA)-like domain, joined by flexible Pro-rich linker. Caenorhabditis elegans NXF1 are essential for the nuclear export of poly(A)+mRNA. In budding yeast, Mex67p binds mRNAs through its adaptor Yra1/REF. It also interacts directly with Nab2, an essential shuttling mRNA-binding protein required for export. Moreover, Mex67p associates with both nuclear pore protein (nucleoporin) FG repeats and Hpr1, a component of the TREX/THO complex linking transcription and export."
definition: >-
  UBA-like domain found in nuclear RNA export factor NXF1, NXF2 and similar proteins. The NXF family of mRNA nuclear export factors including vertebrate NXF1 (also called tip-associated protein or mRNA export factor TAP), NXF2 (also called cancer/testis antigen CT39 or TAP-like protein TAPL-2), Caenorhabditis elegans NXF1 (ceNXF1), Saccharomyces cerevisiae mRNA nuclear export factor Mex67p and similar proteins. NXF proteins can stimulate nuclear export of mRNAs and facilitate the export of unspliced viral mRNA containing the constitutive transport element. It is a multi-domain protein with a nuclear localization sequence (NLS), a non-canonical mRNA-binding domain, and four leucine-rich repeats (LLR) at the N-terminal region. Its C-terminal part contains a NTF2-like domain and a ubiquitin-associated (UBA)-like domain, joined by flexible Pro-rich linker. Caenorhabditis elegans NXF1 are essential for the nuclear export of poly(A)+mRNA. In budding yeast, Mex67p binds mRNAs through its adaptor Yra1/REF. It also interacts directly with Nab2, an essential shuttling mRNA-binding protein required for export. Moreover, Mex67p associates with both nuclear pore protein (nucleoporin) FG repeats and Hpr1, a component of the TREX/THO complex linking transcription and export. — an NCBI CDD conserved domain (cd14342); members share this curated model.
