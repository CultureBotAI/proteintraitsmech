identifier: CDD:cd02290
label: "GFOR_ydgJ. The GFOR_ydgJ  CD includes Escherichia coli ydgJ, Bacillus subtilis yvaA, and other related uncharacterized proteins which share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins."
definition: >-
  GFOR_ydgJ. The GFOR_ydgJ CD includes Escherichia coli ydgJ, Bacillus subtilis yvaA, and other related uncharacterized proteins which share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins. — an NCBI CDD conserved domain (cd02290); members share this curated model.
