identifier: CDD:cd15970
label: "somatostatin receptor type 1, member of the class A family of seven-transmembrane G protein-coupled receptors. G protein-coupled somatostatin receptors (SSTRs) are composed of five distinct subtypes (SSTR1-5) that display strong sequence similarity with opioid receptors. All five receptor subtypes bind the natural somatostatin (somatotropin release inhibiting factor), a polypeptide hormone that regulates a wide variety of physiological functions such as neurotransmission, cell proliferation, contractility of smooth muscle cells, and endocrine signaling as well as inhibition of the release of many secondary hormones. SSTR1 is coupled to a Na/H exchanger, voltage-dependent calcium channels, and AMPA/kainate glutamate channels. SSTR1 is expressed in the normal human pituitary and in nearly half of all pituitary adenoma subtypes."
