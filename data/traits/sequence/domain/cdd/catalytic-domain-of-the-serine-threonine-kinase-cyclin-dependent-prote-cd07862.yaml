identifier: CDD:cd07862
label: "Catalytic domain of the Serine/Threonine Kinase, Cyclin-Dependent protein Kinase 6. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDK6 is regulated by D-type cyclins and INK4 inhibitors. It is active towards the retinoblastoma (pRb) protein, implicating it to function in regulating the early G1 phase of the cell cycle. It is expressed ubiquitously and is localized in the cytoplasm. It is also present in the ruffling edge of spreading fibroblasts and may play a role in cell spreading. It binds to the p21 inhibitor without any effect on its own activity and it is overexpressed in squamous cell carcinomas and neuroblastomas. CDK6 has also been shown to inhibit cell differentiation in many cell types. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. The CDK6 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Cyclin-Dependent protein Kinase 6. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDK6 is regulated by D-type cyclins and INK4 inhibitors. It is active towards the retinoblastoma (pRb) protein, implicating it to function in regulating the early G1 phase of the cell cycle. It is expressed ubiquitously and is localized in the cytoplasm. It is also present in the ruffling edge of spreading fibroblasts and may play a role in cell spreading. It binds to the p21 inhibitor without any effect on its own activity and it is overexpressed in squamous cell carcinomas and neuroblastomas. CDK6 has also been shown to inhibit cell differentiation in many cell types. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. The CDK6 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd07862); members share this curated model.
