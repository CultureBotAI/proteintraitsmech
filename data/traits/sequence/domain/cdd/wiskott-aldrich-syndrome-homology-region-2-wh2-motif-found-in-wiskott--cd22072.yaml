identifier: CDD:cd22072
label: "Wiskott Aldrich syndrome homology region 2 (WH2 motif) found in Wiskott-Aldrich Syndrome Protein Family Member 2 (WASP2 or WAVE2 or WASF2 or SCAR2). This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in the Wiskott-Aldrich syndrome protein (WASP) relative WAVE 2 (also called WASP-family verprolin homologous protein 2 or WASF2 or SCAR2 or WAVE2). WAVE2 is a downstream effector protein involved in the transmission of signals from tyrosine kinase receptors and small GTPases to the actin cytoskeleton. It participates in multiple processes related to actin dynamics, such as lamellipodia and filopodium formation, cell migration and protrusion, and embryogenesis. It regulates lamellipodia formation via a hetero-pentameric WAVE regulatory complex (WRC) with additional proteins in the cell (Sra1/Cyfip1, Nap1/Hem-2, Abi and HSPC300) that regulates actin filament reorganization via its interaction with the actin related protein (Arp)2/3 complex. The WRC is stimulated by the Rac GTPase, kinases and phosphatidylinositols, and binds and activates the Arp2/3 complex via WAVE2 C-terminal domain. It interacts with actin via the WH2 domain. WAVE2 can also be phosphorylated by MAPK and forms a complex with PKA that regulates membrane protrusion. In mouse oocyte, WAVE2 regulates meiotic spindle stability, peripheral positioning and polar body emission, probably via an actin-mediated pathway."
definition: >-
  Wiskott Aldrich syndrome homology region 2 (WH2 motif) found in Wiskott-Aldrich Syndrome Protein Family Member 2 (WASP2 or WAVE2 or WASF2 or SCAR2). This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in the Wiskott-Aldrich syndrome protein (WASP) relative WAVE 2 (also called WASP-family verprolin homologous protein 2 or WASF2 or SCAR2 or WAVE2). WAVE2 is a downstream effector protein involved in the transmission of signals from tyrosine kinase receptors and small GTPases to the actin cytoskeleton. It participates in multiple processes related to actin dynamics, such as lamellipodia and filopodium formation, cell migration and protrusion, and embryogenesis. It regulates lamellipodia formation via a hetero-pentameric WAVE regulatory complex (WRC) with additional proteins in the cell (Sra1/Cyfip1, Nap1/Hem-2, Abi and HSPC300) that regulates actin filament reorganization via its interaction with the actin related protein (Arp)2/3 complex. The WRC is stimulated by the Rac GTPase, kinases and phosphatidylinositols, and binds and activates the Arp2/3 complex via WAVE2 C-terminal domain. It interacts with actin via the WH2 domain. WAVE2 can also be phosphorylated by MAPK and forms a complex with PKA that regulates membrane protrusion. In mouse oocyte, WAVE2 regulates meiotic spindle stability, peripheral positioning and polar body emission, probably via an actin-mediated pathway. — an NCBI CDD conserved domain (cd22072); members share this curated model.
