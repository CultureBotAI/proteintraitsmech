identifier: CDD:cd22118
label: "F-box domain found in F-box/LRR-repeat protein 5 (FBXL5) and similar proteins. FBXL5, also called F-box and leucine-rich repeat protein 5, F-box protein FBL4/FBL5, or p45SKP2-like protein, is the substrate-recognition component of an SCF (SKP1-cullin-F-box) protein ligase complex that plays a central role in iron homeostasis by promoting the ubiquitination and subsequent degradation of IREB2/IRP2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 5 (FBXL5) and similar proteins. FBXL5, also called F-box and leucine-rich repeat protein 5, F-box protein FBL4/FBL5, or p45SKP2-like protein, is the substrate-recognition component of an SCF (SKP1-cullin-F-box) protein ligase complex that plays a central role in iron homeostasis by promoting the ubiquitination and subsequent degradation of IREB2/IRP2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22118); members share this curated model.
