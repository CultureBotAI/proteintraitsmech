identifier: CDD:cd11855
label: "Src homology 3 domain of High osmolarity signaling protein Sho1p. Sho1p (or Sho1), also called SSU81 (Suppressor of SUA8-1 mutation), is a yeast membrane protein that regulates adaptation to high salt conditions by activating the HOG (high-osmolarity glycerol) pathway. High salt concentrations lead to the localization to the membrane of the MAPKK Pbs2, which is then activated by the MAPKK Ste11 and in turn, activates the MAPK Hog1. Pbs2 is localized to the membrane though the interaction of its PxxP motif with the SH3 domain of Sho1p. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
