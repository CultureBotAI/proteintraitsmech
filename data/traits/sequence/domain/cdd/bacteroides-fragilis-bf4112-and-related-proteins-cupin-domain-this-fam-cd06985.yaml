label: "Bacteroides fragilis BF4112 and related proteins, cupin domain. This family includes archaeal and bacterial proteins homologous to BF4112, a Bacteroides fragilis protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
