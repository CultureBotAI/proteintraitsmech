label: "second type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana protein RIK and similar proteins. RIK, also called rough sheath 2-interacting KH domain protein, or RS2-interacting KH domain protein, is a RNA binding protein that acts together with RS2/AS1 in the recruitment of HIRA. RIK contains two type I K homology (KH) RNA-binding domains. The model corresponds to the second one."
definition: >-
  second type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana protein RIK and similar proteins. RIK, also called rough sheath 2-interacting KH domain protein, or RS2-interacting KH domain protein, is a RNA binding protein that acts together with RS2/AS1 in the recruitment of HIRA. RIK contains two type I K homology (KH) RNA-binding domains. The model corresponds to the second one. — an NCBI CDD conserved domain (cd22472); members share this curated model.
