label: "NADP binding domain of 3-hydroxyisobutyrate dehydrogenase (HIBADH). The NAD binding domain of HIBADH adopts a Rossmann fold. 3-Hydroxyisobutyrate, a central metabolite in the valine catabolic pathway,  is reversibly oxidized to methylmalonate semialdehyde by HIBADH, with NAD(P) as a co-factor."
definition: >-
  NADP binding domain of 3-hydroxyisobutyrate dehydrogenase (HIBADH). The NAD binding domain of HIBADH adopts a Rossmann fold. 3-Hydroxyisobutyrate, a central metabolite in the valine catabolic pathway, is reversibly oxidized to methylmalonate semialdehyde by HIBADH, with NAD(P) as a co-factor. — an NCBI CDD conserved domain (cd05202); members share this curated model.
