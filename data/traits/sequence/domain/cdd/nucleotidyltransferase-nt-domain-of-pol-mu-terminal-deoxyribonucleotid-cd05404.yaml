identifier: CDD:cd05404
label: NT_POLXc_Mu_TdT
definition: >-
  Nucleotidyltransferase (NT) domain of Pol mu, terminal deoxyribonucleotidyl transferase and related proteins. NT_PolXc_Mu_TdT_like: A subgroup of the Polymerase X family DNA polymerase domain containing proteins similar to human (h)Pol mu, and terminal deoxyribonucleotidyl transferase (TdT). hPol mu has been implicated in non-homologous end joining (NHEJ) repair of DNA double-strand breaks. hPol mu and TdT participate in NHEJ repair of intermediates in V(D)J recombination; TdT contributes to the junctional variability of heavy chain genes, Pol mu contributes to the restricted light chain junctional diversity. hPol mu is a DNA template-dependent polymerase which, lacks exonuclease proofreading activity; it is a low fidelity polymerase able to extend mispaired primer-termini. TdT is DNA template-independent polymerase. hPol Mu has some intrinsic TdT-like activity. hPol Mu can also act as a DNA-directed RNA polymerase, and hPol mu, and TdT can act as DNA-independent RNA polymerases. hPol mu, and TdT have an N-terminal BRCT (BRCA1 C-terminal) domain, responsible for protein-protein and/or protein-DNA interactions. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these PolXc_Mu_TdT_like NT domains
