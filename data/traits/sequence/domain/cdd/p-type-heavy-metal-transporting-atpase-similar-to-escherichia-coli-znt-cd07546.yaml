identifier: CDD:cd07546
label: "P-type heavy metal-transporting ATPase, similar to Escherichia coli ZntA which is selective for Pb(2+), Zn(2+), and Cd(2+). Escherichia coli ZntA mediates resistance to toxic levels of selected divalent metal ions. ZntA has the highest selectivity for Pb(2+), followed by Zn(2+) and Cd(2+); it also shows low levels of activity with Cu(2+), Ni(2+), and Co(2+). It is upregulated by the transcription factor ZntR at high zinc concentrations. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type heavy metal-transporting ATPase, similar to Escherichia coli ZntA which is selective for Pb(2+), Zn(2+), and Cd(2+). Escherichia coli ZntA mediates resistance to toxic levels of selected divalent metal ions. ZntA has the highest selectivity for Pb(2+), followed by Zn(2+) and Cd(2+); it also shows low levels of activity with Cu(2+), Ni(2+), and Co(2+). It is upregulated by the transcription factor ZntR at high zinc concentrations. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd07546); members share this curated model.
