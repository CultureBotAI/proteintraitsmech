label: "transforming growth factor beta (TGF-beta) like domain found in Caenorhabditis elegans Dauer larva development regulatory growth factor DAF-7 and similar proteins. DAF-7, also termed abnormal dauer formation protein 7, may act as a negative regulator of dauer larva development by transducing chemosensory information from ASI neurons. It is involved in sensitivity to CO2 levels."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in Caenorhabditis elegans Dauer larva development regulatory growth factor DAF-7 and similar proteins. DAF-7, also termed abnormal dauer formation protein 7, may act as a negative regulator of dauer larva development by transducing chemosensory information from ASI neurons. It is involved in sensitivity to CO2 levels. — an NCBI CDD conserved domain (cd19378); members share this curated model.
