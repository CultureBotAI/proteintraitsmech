identifier: CDD:cd22136
label: "F-box domain found in F-box/WD repeat-containing protein 10 (FBXW10) and similar proteins. FBXW10, also called F-box and WD-40 domain-containing protein 10, or ubiquitin ligase-specificity factor, is a probable substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. Its overexpression leads to degradation of CBX5 and CBX1. FBXW10 is negatively regulated in transcription and expression levels by protein O-GlcNAcylation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
