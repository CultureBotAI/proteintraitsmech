label: "basic helix-loop-helix (bHLH) domain found in transcription factor 12 (TCF-12) and similar proteins. TCF-12, also termed HEB, or Class B basic helix-loop-helix protein 20 (bHLHb20), or DNA-binding protein HTF4, or E-box-binding protein, or transcription factor HTF-4, is a bHLH transcription factor that is involved in the initiation of neuronal differentiation."
