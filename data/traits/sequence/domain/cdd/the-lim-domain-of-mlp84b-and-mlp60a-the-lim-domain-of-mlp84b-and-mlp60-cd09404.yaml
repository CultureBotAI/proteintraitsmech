identifier: CDD:cd09404
label: "The LIM domain of Mlp84B and Mlp60A. The LIM domain of Mlp84B and Mlp60A: Mlp84B and Mlp60A belong to the CRP LIM domain protein family. The Mlp84B protein contains five copies of the LIM domains, each followed by a Glycin Rich Region (GRR). However, only the first LIM domain of Mlp84B is in this family. Mlp60A exhibits only one LIM domain linked to a glycin-rich region. Mlp84B and Mlp60A are muscle specific proteins and have been implicated in muscle differentiation. While Mlp84B transcripts are enriched at the terminal ends of muscle fibers, Mlp60A transcripts are found throughout the muscle fibers. All LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The LIM domain of Mlp84B and Mlp60A. The LIM domain of Mlp84B and Mlp60A: Mlp84B and Mlp60A belong to the CRP LIM domain protein family. The Mlp84B protein contains five copies of the LIM domains, each followed by a Glycin Rich Region (GRR). However, only the first LIM domain of Mlp84B is in this family. Mlp60A exhibits only one LIM domain linked to a glycin-rich region. Mlp84B and Mlp60A are muscle specific proteins and have been implicated in muscle differentiation. While Mlp84B transcripts are enriched at the terminal ends of muscle fibers, Mlp60A transcripts are found throughout the muscle fibers. All LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09404); members share this curated model.
