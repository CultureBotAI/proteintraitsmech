identifier: CDD:cd11677
label: "Gemin 7. Gemins 7, together with the survival motor neuron (SMN) protein, other Gemins, and Unr-interacting protein (UNRIP) form the SMN complex, which plays an important role in the Sm core assembly reaction, by binding directly to the Sm proteins, as well as UsnRNAs. Gemin 7 forms a heterodimer with Gemin 6, which serve as a surrogate for the SmB-SmD3 dimer during the formation of the heptameric Sm ring."
definition: >-
  Gemin 7. Gemins 7, together with the survival motor neuron (SMN) protein, other Gemins, and Unr-interacting protein (UNRIP) form the SMN complex, which plays an important role in the Sm core assembly reaction, by binding directly to the Sm proteins, as well as UsnRNAs. Gemin 7 forms a heterodimer with Gemin 6, which serve as a surrogate for the SmB-SmD3 dimer during the formation of the heptameric Sm ring. — an NCBI CDD conserved domain (cd11677); members share this curated model.
