identifier: CDD:cd17774
label: "2 tandem repeats of the CBS domain in the two-component sensor histidine kinase and related-proteins, repeat 2. This cd contains 2 tandem repeats of the CBS domain in the two-component sensor histidine kinase and related-proteins. Two-component regulation is the predominant form of signal recognition and response coupling mechanism used by bacteria to sense and respond to diverse environmental stresses and cues ranging from common environmental stimuli to host signals recognized by pathogens and bacterial cell-cell communication signals.  The structures of both sensors and regulators are modular, and numerous variations in domain architecture and composition have evolved to tailor to specific needs in signal perception and signal transduction. The simplest histidine kinase sensors consists of only sensing and kinase domains. The more complex hybrid sensors contain an additional REC domain typical of two-component regulators and in some cases a C-terminal histidine phosphotransferase (HPT) domain. The CBS domain, named after human CBS, is a small domain originally identified in cystathionine beta-synthase and is subsequently found in a wide range of different proteins. CBS domains usually occur in tandem repeats. They associate to form a so-called Bateman domain or a CBS pair based on crystallographic studies in bacteria.  The CBS pair was used as a basis for this cd hierarchy since the human CBS proteins can adopt the typical core structure and form an intramolecular CBS pair.  The interface between the two CBS domains forms a cleft that is a potential ligand binding site. The CBS pair coexists with a variety of other functional domains and this has been used to help in its classification here.  It has been proposed that the CBS domain may play a regulatory role, although its exact function is unknown. Mutations of conserved residues within this domain are associated with a variety of human hereditary diseases, including congenital myotonia, idiopathic generalized epilepsy, hypercalciuric nephrolithiasis, and classic Bartter syndrome (CLC chloride channel family members), Wolff-Parkinson-White syndrome (gamma 2 subunit of AMP-activated protein kinase), retinitis pigmentosa (IMP dehydrogenase-1), and homocystinuria (cystathionine beta-synthase)."
definition: >-
  2 tandem repeats of the CBS domain in the two-component sensor histidine kinase and related-proteins, repeat 2. This cd contains 2 tandem repeats of the CBS domain in the two-component sensor histidine kinase and related-proteins. Two-component regulation is the predominant form of signal recognition and response coupling mechanism used by bacteria to sense and respond to diverse environmental stresses and cues ranging from common environmental stimuli to host signals recognized by pathogens and bacterial cell-cell communication signals. The structures of both sensors and regulators are modular, and numerous variations in domain architecture and composition have evolved to tailor to specific needs in signal perception and signal transduction. The simplest histidine kinase sensors consists of only sensing and kinase domains. The more complex hybrid sensors contain an additional REC domain typical of two-component regulators and in some cases a C-terminal histidine phosphotransferase (HPT) domain. The CBS domain, named after human CBS, is a small domain originally identified in cystathionine beta-synthase and is subsequently found in a wide range of different proteins. CBS domains usually occur in tandem repeats. They associate to form a so-called Bateman domain or a CBS pair based on crystallographic studies in bacteria. The CBS pair was used as a basis for this cd hierarchy since the human CBS proteins can adopt the typical core structure and form an intramolecular CBS pair. The interface between the two CBS domains forms a cleft that is a potential ligand binding site. The CBS pair coexists with a variety of other functional domains and this has been used to help in its classification here. It has been proposed that the CBS domain may play a regulatory role, although its exact function is unknown. Mutations of conserved residues within this domain are associated with a variety of human hereditary diseases, including congenital myotonia, idiopathic generalized epilepsy, hypercalciuric nephrolithiasis, and classic Bartter syndrome (CLC chloride channel family members), Wolff-Parkinson-White syndrome (gamma 2 subunit of AMP-activated protein kinase), retinitis pigmentosa (IMP dehydrogenase-1), and homocystinuria (cystathionine beta-synthase). — an NCBI CDD conserved domain (cd17774); members share this curated model.
