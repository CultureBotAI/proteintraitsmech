identifier: CDD:cd14328
label: "UBA domain found in non-receptor tyrosine-protein kinase TNK1 and similar proteins. TNK1, also called CD38 negative kinase 1, is a non-receptor protein tyrosine kinase (NRPTK) that has been implicated in the regulation of apoptosis, cell growth, nuclear factor-kappaB, and Ras. It associates with phospholipase C (PLC)-gamma1 and may play a role in phospholipid signal transduction. TNK1 contains an NH2-terminal kinase, a Src Homology 3 (SH3) domain, a proline-rich (PR) region, and a C-terminal ubiquitin-association (UBA) domain."
definition: >-
  UBA domain found in non-receptor tyrosine-protein kinase TNK1 and similar proteins. TNK1, also called CD38 negative kinase 1, is a non-receptor protein tyrosine kinase (NRPTK) that has been implicated in the regulation of apoptosis, cell growth, nuclear factor-kappaB, and Ras. It associates with phospholipase C (PLC)-gamma1 and may play a role in phospholipid signal transduction. TNK1 contains an NH2-terminal kinase, a Src Homology 3 (SH3) domain, a proline-rich (PR) region, and a C-terminal ubiquitin-association (UBA) domain. — an NCBI CDD conserved domain (cd14328); members share this curated model.
