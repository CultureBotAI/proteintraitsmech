identifier: CDD:cd19914
label: "second double-stranded RNA binding motif of double-stranded RNA-specific adenosine deaminase (DRADA) and similar proteins. DRADA (EC 3.5.4.37; also known as 136 kDa double-stranded RNA-binding protein (p136), interferon-inducible protein 4 (IFI-4), K88DSRBP, ADAR1, G1P1, or ADAR) catalyzes the hydrolytic deamination of adenosine to inosine in double-stranded RNA (dsRNA), referred to as A-to-I RNA editing. Vertebrate DRADA contains three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  second double-stranded RNA binding motif of double-stranded RNA-specific adenosine deaminase (DRADA) and similar proteins. DRADA (EC 3.5.4.37; also known as 136 kDa double-stranded RNA-binding protein (p136), interferon-inducible protein 4 (IFI-4), K88DSRBP, ADAR1, G1P1, or ADAR) catalyzes the hydrolytic deamination of adenosine to inosine in double-stranded RNA (dsRNA), referred to as A-to-I RNA editing. Vertebrate DRADA contains three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19914); members share this curated model.
