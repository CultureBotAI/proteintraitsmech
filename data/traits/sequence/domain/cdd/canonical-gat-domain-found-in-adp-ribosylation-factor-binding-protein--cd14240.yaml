identifier: CDD:cd14240
label: "canonical GAT domain found in ADP-ribosylation factor-binding protein GGA3. GGA3, also called Golgi-localized gamma ear-containing Arf-binding protein 3, belongs to a family of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins that regulate clathrin-mediated trafficking of cargo proteins from the trans-Golgi network (TGN) to endosomes. GGA3 interacts selectively with the Met/Hepatocyte Growth Factor receptor tyrosine kinase (RTK) when stimulated. It functions as a specific cargo adaptor to target the Met RTK into recycling tubules, and further coordinates the recycling, signaling and degradative fates of the Met RTK. Moreover, GGA3, together with PACS-1 and the protein kinase CK2, forms a complex that regulates cation-independent mannose-6-phosphate receptor (CI-MPR) trafficking. Furthermore, GGA3 has been identified as an interacting protein of the beta-site APP-cleaving enzyme-1 (BACE1), a stress-related protease that is involved in Alzheimer's disease (AD) pathology. GGA3 has a multidomain structure consisting of an N-terminal VHS (Vps27/Hrs/Stam) domain, a GAT (GGA and TOM) domain, a largely unstructured hinge region that contains clathrin-binding motifs, and a C-terminal GAE (gamma-adaptin ear homology) domain. The GAT domain of GGAs interacts with class I GTP-bound form of Arf proteins, Rabaptin-5, ubiquitin, and/or the tumor susceptibility gene 101 product (TSG101)."
definition: >-
  canonical GAT domain found in ADP-ribosylation factor-binding protein GGA3. GGA3, also called Golgi-localized gamma ear-containing Arf-binding protein 3, belongs to a family of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins that regulate clathrin-mediated trafficking of cargo proteins from the trans-Golgi network (TGN) to endosomes. GGA3 interacts selectively with the Met/Hepatocyte Growth Factor receptor tyrosine kinase (RTK) when stimulated. It functions as a specific cargo adaptor to target the Met RTK into recycling tubules, and further coordinates the recycling, signaling and degradative fates of the Met RTK. Moreover, GGA3, together with PACS-1 and the protein kinase CK2, forms a complex that regulates cation-independent mannose-6-phosphate receptor (CI-MPR) trafficking. Furthermore, GGA3 has been identified as an interacting protein of the beta-site APP-cleaving enzyme-1 (BACE1), a stress-related protease that is involved in Alzheimer's disease (AD) pathology. GGA3 has a multidomain structure consisting of an N-terminal VHS (Vps27/Hrs/Stam) domain, a GAT (GGA and TOM) domain, a largely unstructured hinge region that contains clathrin-binding motifs, and a C-terminal GAE (gamma-adaptin ear homology) domain. The GAT domain of GGAs interacts with class I GTP-bound form of Arf proteins, Rabaptin-5, ubiquitin, and/or the tumor susceptibility gene 101 product (TSG101). — an NCBI CDD conserved domain (cd14240); members share this curated model.
