identifier: CDD:cd01445
label: "Thiosulfate sulfurtransferases (TST) contain 2 copies of the Rhodanese Homology Domain. Only the second repeat contains the catalytically active Cys residue. The role of the 1st repeat is uncertain, but believed to be involved in protein interaction. This CD aligns the 1st and 2nd repeats."
definition: >-
  Thiosulfate sulfurtransferases (TST) contain 2 copies of the Rhodanese Homology Domain. Only the second repeat contains the catalytically active Cys residue. The role of the 1st repeat is uncertain, but believed to be involved in protein interaction. This CD aligns the 1st and 2nd repeats. — an NCBI CDD conserved domain (cd01445); members share this curated model.
