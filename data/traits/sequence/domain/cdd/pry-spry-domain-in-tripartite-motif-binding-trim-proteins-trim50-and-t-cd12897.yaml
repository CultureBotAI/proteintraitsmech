identifier: CDD:cd12897
label: "PRY/SPRY domain in tripartite motif-binding (TRIM) proteins TRIM50 and TRIM72. This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of several TRIM proteins, including TRIM72 and TRIM50. TRIM72 (also known as MG53) has been shown to perform a critical function in membrane repair following acute muscle injury by nucleating the assembly of the repair machinery at injury sites. It is expressed specifically in skeletal muscle and heart, and tethered to the plasma membrane and cytoplasmic vesicles via its interaction with phosphatidylserine. TRIM50, an E3 ubiquitin ligase, is deleted in Williams-Beuren (WBS) syndrome, a multi-system neurodevelopmental disorder caused by the deletion of contiguous genes at chromosome region 7q11.23."
definition: >-
