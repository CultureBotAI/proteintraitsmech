identifier: CDD:cd16592
label: "RING finger, HC subclass, found in RING finger protein 39 (RNF39) and similar proteins. RNF39, also called protein HZFw, may play a role in prolonged long term-potentiation (LTP) maintenance. It is involved in the etiology of Behcet's disease (BD). It may also be involved in HIV-1 replication. RNF39 acts as an E3 ubiquitin ligase that inhibits retinoic acid-inducible gene-I (RIG-I)-like receptor (RLR) pathways by mediating K48-linked ubiquitination and proteasomal degradation of DDX3X (DEAD-box RNA helicase 3, X-linked). RNF39 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger protein 39 (RNF39) and similar proteins. RNF39, also called protein HZFw, may play a role in prolonged long term-potentiation (LTP) maintenance. It is involved in the etiology of Behcet's disease (BD). It may also be involved in HIV-1 replication. RNF39 acts as an E3 ubiquitin ligase that inhibits retinoic acid-inducible gene-I (RIG-I)-like receptor (RLR) pathways by mediating K48-linked ubiquitination and proteasomal degradation of DDX3X (DEAD-box RNA helicase 3, X-linked). RNF39 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16592); members share this curated model.
