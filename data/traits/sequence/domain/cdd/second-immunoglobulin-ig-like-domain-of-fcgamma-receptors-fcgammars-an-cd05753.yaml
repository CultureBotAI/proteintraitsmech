identifier: CDD:cd05753
label: "Second immunoglobulin (Ig)-like domain of  Fcgamma-receptors (FcgammaRs), and similar domains. The members here are composed of the second immunoglobulin (Ig)-like domain of  Fcgamma-receptors (FcgammaRs). Interactions between IgG and FcgammaR are important to the initiation of cellular and humoral response. IgG binding to FcgammaR leads to a cascade of signals and ultimately to functions such as antibody-dependent-cellular-cytotoxicity (ADCC), endocytosis, phagocytosis, release of inflammatory mediators, etc. FcgammaR has two Ig-like domains. This group also contains FcepsilonRI which binds IgE with high affinity."
definition: >-
  Second immunoglobulin (Ig)-like domain of Fcgamma-receptors (FcgammaRs), and similar domains. The members here are composed of the second immunoglobulin (Ig)-like domain of Fcgamma-receptors (FcgammaRs). Interactions between IgG and FcgammaR are important to the initiation of cellular and humoral response. IgG binding to FcgammaR leads to a cascade of signals and ultimately to functions such as antibody-dependent-cellular-cytotoxicity (ADCC), endocytosis, phagocytosis, release of inflammatory mediators, etc. FcgammaR has two Ig-like domains. This group also contains FcepsilonRI which binds IgE with high affinity. — an NCBI CDD conserved domain (cd05753); members share this curated model.
