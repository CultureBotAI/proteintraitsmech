identifier: CDD:cd06977
label: "HTH-type transcriptional activator RhaR and RhaS and related proteins, N-terminal cupin domain. Members of this family contain an N-terminal cupin domain and a C-terminal AraC/XylS family helix-turn-helix (HTH) DNA-binding domain, including the HTH-type transcription activators RhaS and RhaR. RhaS and RhaR respond to the availability of L-rhamnose and activate transcription of the operons in the Escherichia coli L-rhamnose catabolic regulon. The E. coli RhaR protein activates expression of the rhaSR operon in the presence of its effector, L-rhamnose. The resulting RhaS protein (plus L-rhamnose) activates expression of the L-rhamnose catabolic operon rhaBAD as well as the transport operon rhaT. These proteins bind DNA as dimers, via their HTH motifs. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  HTH-type transcriptional activator RhaR and RhaS and related proteins, N-terminal cupin domain. Members of this family contain an N-terminal cupin domain and a C-terminal AraC/XylS family helix-turn-helix (HTH) DNA-binding domain, including the HTH-type transcription activators RhaS and RhaR. RhaS and RhaR respond to the availability of L-rhamnose and activate transcription of the operons in the Escherichia coli L-rhamnose catabolic regulon. The E. coli RhaR protein activates expression of the rhaSR operon in the presence of its effector, L-rhamnose. The resulting RhaS protein (plus L-rhamnose) activates expression of the L-rhamnose catabolic operon rhaBAD as well as the transport operon rhaT. These proteins bind DNA as dimers, via their HTH motifs. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06977); members share this curated model.
