identifier: CDD:cd11464
label: "basic helix-loop-helix (bHLH) domain found in twist-related protein (TWIST) family. The TWIST family includes TWIST1 and TWIST2, which are highly homologous bHLH transcription factors that promote epithelial-mesenchymal transition (EMT) during development and tumor metastasis. They are involved in the negative regulation of cellular determination and in the differentiation of several lineages, including myogenesis, osteogenesis, and neurogenesis. TWIST factors express in broad partially-overlapping patterns during embryo development and dimerize with a broad sets of dimer partners that form numerous unique transcriptional complexes to regulate embryonic development."
definition: >-
  basic helix-loop-helix (bHLH) domain found in twist-related protein (TWIST) family. The TWIST family includes TWIST1 and TWIST2, which are highly homologous bHLH transcription factors that promote epithelial-mesenchymal transition (EMT) during development and tumor metastasis. They are involved in the negative regulation of cellular determination and in the differentiation of several lineages, including myogenesis, osteogenesis, and neurogenesis. TWIST factors express in broad partially-overlapping patterns during embryo development and dimerize with a broad sets of dimer partners that form numerous unique transcriptional complexes to regulate embryonic development. — an NCBI CDD conserved domain (cd11464); members share this curated model.
