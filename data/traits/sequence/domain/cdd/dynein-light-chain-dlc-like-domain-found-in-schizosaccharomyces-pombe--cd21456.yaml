identifier: CDD:cd21456
label: DLC-like_SpDlc1-like
definition: >-
  dynein light chain (DLC)-like domain found in Schizosaccharomyces pombe dynein light chain Tctex-type (SpDlc1) and similar proteins. Schizosaccharomyces pombe dynein light chain 1 (SpDlc1) belongs to the 14-kDa Tctex-1 dynein light chain family. It acts as a non-catalytic accessory component of a dynein complex. It is required for regular oscillatory nuclear movement and efficient recombination during meiotic prophase in fission yeast. The model corresponds to the dynein light chain (DLC)-like domain found in SpDlc1 and similar proteins
