identifier: CDD:cd11524
label: "The SYLF domain (also called DUF500), a novel lipid-binding module. The SYLF domain is named after SH3YL1, Ysc84p/Lsb4p, Lsb3p, and plant FYVE, which are proteins that contain it. It is also called DUF500 and is highly conserved from bacteria to mammals. Some members, such as SH3YL1, Ysc84p, and Lsb3p, which represent the best characterized members of the family, also contain an SH3 domain, while family members from plants and stramenopiles also contain a FYVE zinc finger domain. Other members only contain a stand-alone SYLF domain. The SYLF domain of SH3YL1 binds phosphoinositides with high affinity, while the N-terminal SYLF domains of both Ysc84p and Lsb3p have been shown to bind and bundle actin filaments, as well as bind liposomes with high affinity."
definition: >-
  The SYLF domain (also called DUF500), a novel lipid-binding module. The SYLF domain is named after SH3YL1, Ysc84p/Lsb4p, Lsb3p, and plant FYVE, which are proteins that contain it. It is also called DUF500 and is highly conserved from bacteria to mammals. Some members, such as SH3YL1, Ysc84p, and Lsb3p, which represent the best characterized members of the family, also contain an SH3 domain, while family members from plants and stramenopiles also contain a FYVE zinc finger domain. Other members only contain a stand-alone SYLF domain. The SYLF domain of SH3YL1 binds phosphoinositides with high affinity, while the N-terminal SYLF domains of both Ysc84p and Lsb3p have been shown to bind and bundle actin filaments, as well as bind liposomes with high affinity. — an NCBI CDD conserved domain (cd11524); members share this curated model.
