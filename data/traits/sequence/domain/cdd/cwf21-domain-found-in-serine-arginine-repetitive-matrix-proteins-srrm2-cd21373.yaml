identifier: CDD:cd21373
label: "cwf21 domain found in serine/arginine repetitive matrix proteins, SRRM2, SRRM3 and similar proteins. This subfamily includes SRRM2 and SRRM3, both of which contain a cwf21 domain at the N-terminus. SRRM2, also called 300 kDa nuclear matrix antigen, serine/arginine-rich splicing factor-related nuclear matrix protein of 300 kDa, SR-related nuclear matrix protein of 300 kDa, Ser/Arg-related nuclear matrix protein of 300 kDa, splicing coactivator subunit SRm300, or Tax-responsive enhancer element-binding protein 803 (TaxREB803), is required for pre-mRNA splicing as component of the spliceosome. SRRM3 may play a role in regulating breast cancer cell invasiveness. It may be involved in RYBP-mediated breast cancer progression. The cwf21 domain is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8."
definition: >-
  cwf21 domain found in serine/arginine repetitive matrix proteins, SRRM2, SRRM3 and similar proteins. This subfamily includes SRRM2 and SRRM3, both of which contain a cwf21 domain at the N-terminus. SRRM2, also called 300 kDa nuclear matrix antigen, serine/arginine-rich splicing factor-related nuclear matrix protein of 300 kDa, SR-related nuclear matrix protein of 300 kDa, Ser/Arg-related nuclear matrix protein of 300 kDa, splicing coactivator subunit SRm300, or Tax-responsive enhancer element-binding protein 803 (TaxREB803), is required for pre-mRNA splicing as component of the spliceosome. SRRM3 may play a role in regulating breast cancer cell invasiveness. It may be involved in RYBP-mediated breast cancer progression. The cwf21 domain is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8. — an NCBI CDD conserved domain (cd21373); members share this curated model.
