identifier: CDD:cd20526
label: "cyclin box found in cyclin-I (CCNI) and similar proteins. CCNI is an atypical cyclin because it is most abundant in post-mitotic cells. It is involved in various biological processes, such as cell survival, angiogenesis, cell differentiation, and cell cycle progression. CCNI contains a typical cyclin box near the N-terminus and a PEST sequence near the C-terminus. The cyclin box is a protein binding domain."
definition: >-
  cyclin box found in cyclin-I (CCNI) and similar proteins. CCNI is an atypical cyclin because it is most abundant in post-mitotic cells. It is involved in various biological processes, such as cell survival, angiogenesis, cell differentiation, and cell cycle progression. CCNI contains a typical cyclin box near the N-terminus and a PEST sequence near the C-terminus. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20526); members share this curated model.
