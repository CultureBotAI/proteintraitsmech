identifier: CDD:cd13154
label: "KOW_Mtr4 is an inserted domain in Mtr4 globular domain. Mtr4 is a conserved helicase with a core DExH region that cooperates with the eukaryotic nuclear exosome in RNA processing and degradation. KOW_Mtr4 motif might be involved in presenting RNA substrates to the helicase core. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. KOW motif is located at the extended insertion of Mtr4 protein."
definition: >-
  KOW_Mtr4 is an inserted domain in Mtr4 globular domain. Mtr4 is a conserved helicase with a core DExH region that cooperates with the eukaryotic nuclear exosome in RNA processing and degradation. KOW_Mtr4 motif might be involved in presenting RNA substrates to the helicase core. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. KOW motif is located at the extended insertion of Mtr4 protein. — an NCBI CDD conserved domain (cd13154); members share this curated model.
