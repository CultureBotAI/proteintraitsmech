identifier: CDD:cd12107
label: "Hemerythrin. Hemerythrin (Hr) is a non-heme diiron oxygen transport protein found in four marine invertebrate phyla including priapulida, brachiopoda, sipunculida, and annelida, as well as in protozoa. Myohemerythrin (Mhr), a hemerythrin homolog, is found in the muscle tissue of sipunculids as well as in polycheate and oligocheate annelids. In addition to oxygen transport, Mhr proteins are involved in cadmium fixation and host anti-bacterial defense. Hr and Mhr proteins have the same \"four alpha helix bundle\" motif and active site structure. Hr forms oligomers, the octameric form being most prevalent, while Mhr is monomeric."
definition: >-
  Hemerythrin. Hemerythrin (Hr) is a non-heme diiron oxygen transport protein found in four marine invertebrate phyla including priapulida, brachiopoda, sipunculida, and annelida, as well as in protozoa. Myohemerythrin (Mhr), a hemerythrin homolog, is found in the muscle tissue of sipunculids as well as in polycheate and oligocheate annelids. In addition to oxygen transport, Mhr proteins are involved in cadmium fixation and host anti-bacterial defense. Hr and Mhr proteins have the same "four alpha helix bundle" motif and active site structure. Hr forms oligomers, the octameric form being most prevalent, while Mhr is monomeric. — an NCBI CDD conserved domain (cd12107); members share this curated model.
