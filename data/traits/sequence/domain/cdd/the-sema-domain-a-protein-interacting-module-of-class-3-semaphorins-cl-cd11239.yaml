identifier: CDD:cd11239
label: "The Sema domain, a protein interacting module, of class 3 semaphorins. Class 3 semaphorins (Sema3s) are secreted regulator molecules involved in the development of the nervous system, vasculogenesis, angiogenesis,and tumorigenesis. There are 7 distinct subfamilies named Sema3A to 3G. Sema3s function as repellent signals during axon guidance by repelling neurons away from the source of Sema3s. However, Sema3s that are secreted by tumor cells play an inhibitory role in tumor growth and angiogenesis (specifically Sema3B and Sema3F). Sema3s functions by forming complexes with neuropilins and A-type plexins, where neuropilins serve as the ligand binding moiety and the plexins function as signal transduction component. Sema3s primarily inhibit the cell motility and migration of tumor and endothelial cells by inducing collapse of the actin cytoskeleton via neuropilins and plexins. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of class 3 semaphorins. Class 3 semaphorins (Sema3s) are secreted regulator molecules involved in the development of the nervous system, vasculogenesis, angiogenesis,and tumorigenesis. There are 7 distinct subfamilies named Sema3A to 3G. Sema3s function as repellent signals during axon guidance by repelling neurons away from the source of Sema3s. However, Sema3s that are secreted by tumor cells play an inhibitory role in tumor growth and angiogenesis (specifically Sema3B and Sema3F). Sema3s functions by forming complexes with neuropilins and A-type plexins, where neuropilins serve as the ligand binding moiety and the plexins function as signal transduction component. Sema3s primarily inhibit the cell motility and migration of tumor and endothelial cells by inducing collapse of the actin cytoskeleton via neuropilins and plexins. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11239); members share this curated model.
