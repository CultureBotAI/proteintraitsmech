identifier: CDD:cd15726
label: "FYVE domain found in FYVE and coiled-coil domain-containing protein 1 (FYCO1) and similar proteins. FYCO1, also termed zinc finger FYVE domain-containing protein 7, is a phosphatidylinositol 3-phosphate (PtdIns3P or PI3P)-binding protein that is associated with the exterior of autophagosomes and mediates microtubule plus-end-directed vesicle transport. It acts as an effector of GTP-bound Rab7, a GTPase that recruits FYCO1 to autophagosomes and has been implicated in autophagosome-lysosomal fusion. FYCO1 also interacts with two microtubule motor proteins, kinesin (KIF) 5B and KIF23, and thus functions as a platform for assembly of vesicle fusion and trafficking factors. FYCO1 contains an N-terminal alpha-helical RUN domain followed by a long central coiled-coil region, a FYVE domain and a GOLD (Golgi dynamics) domain in C-terminus."
definition: >-
  FYVE domain found in FYVE and coiled-coil domain-containing protein 1 (FYCO1) and similar proteins. FYCO1, also termed zinc finger FYVE domain-containing protein 7, is a phosphatidylinositol 3-phosphate (PtdIns3P or PI3P)-binding protein that is associated with the exterior of autophagosomes and mediates microtubule plus-end-directed vesicle transport. It acts as an effector of GTP-bound Rab7, a GTPase that recruits FYCO1 to autophagosomes and has been implicated in autophagosome-lysosomal fusion. FYCO1 also interacts with two microtubule motor proteins, kinesin (KIF) 5B and KIF23, and thus functions as a platform for assembly of vesicle fusion and trafficking factors. FYCO1 contains an N-terminal alpha-helical RUN domain followed by a long central coiled-coil region, a FYVE domain and a GOLD (Golgi dynamics) domain in C-terminus. — an NCBI CDD conserved domain (cd15726); members share this curated model.
