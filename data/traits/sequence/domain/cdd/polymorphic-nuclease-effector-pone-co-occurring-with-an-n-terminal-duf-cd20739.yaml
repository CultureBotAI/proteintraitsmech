identifier: CDD:cd20739
label: "Polymorphic Nuclease effector (PoNe) co-occurring with an N-terminal DUF637 domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with N-terminal domains such as DUF637 predicted to be a hemagglutinin domain."
definition: >-
  Polymorphic Nuclease effector (PoNe) co-occurring with an N-terminal DUF637 domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with N-terminal domains such as DUF637 predicted to be a hemagglutinin domain. — an NCBI CDD conserved domain (cd20739); members share this curated model.
