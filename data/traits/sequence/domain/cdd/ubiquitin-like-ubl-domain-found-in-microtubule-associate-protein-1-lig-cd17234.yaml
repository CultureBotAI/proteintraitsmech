identifier: CDD:cd17234
label: "ubiquitin-like (Ubl) domain found in microtubule associate protein 1 light chain 3A (MAP1LC3A). Autophagy is an essential intracellular process that targets large protein complexes, bacterial pathogens, and organelles for degradation. MAP1LC3A is belong to MAP1LC3 (short name LC3) family proteins. MAP1LC3 has a ubiquitin-like fold (Ubl) that belongs to the autophagy-related 8 (ATG8) protein family. A Ubl conjugation of MAP1LC3 by the phospholipid phosphatidylethanolamine (PE) is an essential process for the formation of autophagosomes. MAP1LC3 is cleaved by cysteine protease ATG4 and then conjugated with PE by E1-like enzyme ATG7 and ATG3, an E2-like enzyme. The Ubl conversion of MAPLC3 is known as a marker of autophagy-induction. MAP1LC3A staining patterns are used for different cancer diagnostic."
definition: >-
  ubiquitin-like (Ubl) domain found in microtubule associate protein 1 light chain 3A (MAP1LC3A). Autophagy is an essential intracellular process that targets large protein complexes, bacterial pathogens, and organelles for degradation. MAP1LC3A is belong to MAP1LC3 (short name LC3) family proteins. MAP1LC3 has a ubiquitin-like fold (Ubl) that belongs to the autophagy-related 8 (ATG8) protein family. A Ubl conjugation of MAP1LC3 by the phospholipid phosphatidylethanolamine (PE) is an essential process for the formation of autophagosomes. MAP1LC3 is cleaved by cysteine protease ATG4 and then conjugated with PE by E1-like enzyme ATG7 and ATG3, an E2-like enzyme. The Ubl conversion of MAPLC3 is known as a marker of autophagy-induction. MAP1LC3A staining patterns are used for different cancer diagnostic. — an NCBI CDD conserved domain (cd17234); members share this curated model.
