identifier: CDD:cd10146
label: "C-terminal domain of LabA_like proteins. This C-terminal domain is found in a well conserved group of mainly bacterial proteins with no defined function, which contain an N-terminal LabA-like domain. LabA from Synechococcus elongatus PCC 7942, (which does not contain this C-terminal domain) has been shown to play a role in cyanobacterial circadian timing. LabA-like C-terminal domains described here may be related to the LOTUS domain family (which also co-occurs with LabA-like N-terminal domains)."
definition: >-
  C-terminal domain of LabA_like proteins. This C-terminal domain is found in a well conserved group of mainly bacterial proteins with no defined function, which contain an N-terminal LabA-like domain. LabA from Synechococcus elongatus PCC 7942, (which does not contain this C-terminal domain) has been shown to play a role in cyanobacterial circadian timing. LabA-like C-terminal domains described here may be related to the LOTUS domain family (which also co-occurs with LabA-like N-terminal domains). — an NCBI CDD conserved domain (cd10146); members share this curated model.
