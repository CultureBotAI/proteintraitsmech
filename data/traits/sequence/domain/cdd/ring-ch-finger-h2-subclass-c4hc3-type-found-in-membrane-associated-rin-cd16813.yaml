identifier: CDD:cd16813
label: "RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH10 (MARCH10). MARCH10, also known as membrane-associated RING finger protein 10, membrane-associated RING-CH protein X (MARCH-X), or RING finger protein 190 (RNF190), is a microtubule-associated E3 ubiquitin ligase in developing spermatids and is involved in spermiogenesis by regulating the formation and maintenance of the flagella. It is localized to the principal piece of elongating spermatids. Unlike other MARCH proteins, MARCH10 is predicted to have no transmembrane spanning region. It harbors a C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, that is responsible for its E3 activity."
definition: >-
  RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH10 (MARCH10). MARCH10, also known as membrane-associated RING finger protein 10, membrane-associated RING-CH protein X (MARCH-X), or RING finger protein 190 (RNF190), is a microtubule-associated E3 ubiquitin ligase in developing spermatids and is involved in spermiogenesis by regulating the formation and maintenance of the flagella. It is localized to the principal piece of elongating spermatids. Unlike other MARCH proteins, MARCH10 is predicted to have no transmembrane spanning region. It harbors a C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, that is responsible for its E3 activity. — an NCBI CDD conserved domain (cd16813); members share this curated model.
