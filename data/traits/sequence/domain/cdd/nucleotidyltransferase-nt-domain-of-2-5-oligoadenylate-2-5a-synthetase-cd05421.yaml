identifier: CDD:cd05421
label: "Nucleotidyltransferase (NT) domain of 2'5'-oligoadenylate (2-5A)synthetase (2-5OAS) and class I CCA-adding enzyme family; uncharacterized subgroup. NT_2-5OAS_CCAase_class1:  A bacterial subgroup similar to the catalytic domain found in 2prime, 5prime-oligoadenylate (2-5A) synthetase [2-5OAS], and CCA-adding enzyme [ATP (CTP): tRNA nucleotidyltransferase class1_like, CCAase]. Little is known functionally about the proteins in this subgroup. 2-5OAS are enzymes induced in vertebrates, by interferon during the innate (natural) immune response against RNA virus infections; in the presence of a suitable RNA activator, active 2-5OASs oligomerize ATP into 2-5A. 2-5A in turn activates endoribonuclease L, leading to the degradation of viral RNA. This vertebrate 2-5OAS system is also implicated in cell growth control, differentiation, and apoptosis. CCAases are archaeal  enzymes which in a template-independent reaction add the precise sequence [cytidine(C)-cytidine-adenosine (A)], one nucleotide at a time, onto the 3prime end of tRNA. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are fairly well conserved in these 2-5OAS_CCAase_class1_1 NT domains."
