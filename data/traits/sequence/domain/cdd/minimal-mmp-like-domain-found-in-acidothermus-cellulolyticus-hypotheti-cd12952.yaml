identifier: CDD:cd12952
label: "Minimal MMP-like domain found in Acidothermus cellulolyticus hypothetical protein ACEL2062 and similar protein. The subfamily includes an uncharacterized protein from Acidothermus cellulolyticus (ACEL2062) and its homologs from bacteria. Although its biological role remains unclear, ACEL2062 contains a minimal metalloprotease (MMP)-like domain consisting of 3-stranded mixed 2-beta sheets and a HExxHxxGxxD/S (x could be any amino acid) motif. It may belong to a superfamily of bacterial zinc metallo-peptidases, which is characterized by a conserved HExxHxxGxxD motif."
definition: >-
  Minimal MMP-like domain found in Acidothermus cellulolyticus hypothetical protein ACEL2062 and similar protein. The subfamily includes an uncharacterized protein from Acidothermus cellulolyticus (ACEL2062) and its homologs from bacteria. Although its biological role remains unclear, ACEL2062 contains a minimal metalloprotease (MMP)-like domain consisting of 3-stranded mixed 2-beta sheets and a HExxHxxGxxD/S (x could be any amino acid) motif. It may belong to a superfamily of bacterial zinc metallo-peptidases, which is characterized by a conserved HExxHxxGxxD motif. — an NCBI CDD conserved domain (cd12952); members share this curated model.
