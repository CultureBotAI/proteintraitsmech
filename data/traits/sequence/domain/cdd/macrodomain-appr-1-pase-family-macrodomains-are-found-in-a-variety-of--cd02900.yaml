identifier: CDD:cd02900
label: "macrodomain, Appr-1\"-pase family. Macrodomains are found in a variety of proteins with diverse cellular functions, as a stand-alone domain or in combination with other domains like in histone macroH2A and some PARPs (poly ADP-ribose polymerases). Macrodomains can recognize ADP-ribose (ADPr) in both its free and protein-linked forms, in related ligands, such as O-acyl-ADP-ribose (OAADPr), and even in ligands unrelated to ADPr. The yeast protein Ymx7 and related proteins in this family contain a stand-alone macrodomain and may be specific phosphatases catalyzing the conversion of ADP-ribose-1\"-monophosphate (Appr-1\"-p) to ADP-ribose. Appr-1\"-p is an intermediate in a metabolic pathway involved in pre-tRNA splicing."
definition: >-
  macrodomain, Appr-1"-pase family. Macrodomains are found in a variety of proteins with diverse cellular functions, as a stand-alone domain or in combination with other domains like in histone macroH2A and some PARPs (poly ADP-ribose polymerases). Macrodomains can recognize ADP-ribose (ADPr) in both its free and protein-linked forms, in related ligands, such as O-acyl-ADP-ribose (OAADPr), and even in ligands unrelated to ADPr. The yeast protein Ymx7 and related proteins in this family contain a stand-alone macrodomain and may be specific phosphatases catalyzing the conversion of ADP-ribose-1"-monophosphate (Appr-1"-p) to ADP-ribose. Appr-1"-p is an intermediate in a metabolic pathway involved in pre-tRNA splicing. — an NCBI CDD conserved domain (cd02900); members share this curated model.
