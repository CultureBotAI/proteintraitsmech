identifier: CDD:cd02413
label: "type II K-homology (KH) RNA-binding domain found in 40S ribosomal protein S3 and similar proteins. 40S ribosomal protein S3, also called small ribosomal subunit protein uS3, is part of the head region of the 40S ribosomal subunit and is involved in translation. It is believed to interact with mRNA as it threads its way from the latch into the channel. 40S ribosomal protein S3 has endonuclease activity and plays a role in repair of damaged DNA. It cleaves phosphodiester bonds of DNAs containing altered bases with broad specificity and cleaves supercoiled DNA more efficiently than relaxed DNA. Members of this family are mainly from prokaryotes and contain only one canonical type II K-homology (KH) domain that has the signature motif GXXG (where X represents any amino acid)."
definition: >-
  type II K-homology (KH) RNA-binding domain found in 40S ribosomal protein S3 and similar proteins. 40S ribosomal protein S3, also called small ribosomal subunit protein uS3, is part of the head region of the 40S ribosomal subunit and is involved in translation. It is believed to interact with mRNA as it threads its way from the latch into the channel. 40S ribosomal protein S3 has endonuclease activity and plays a role in repair of damaged DNA. It cleaves phosphodiester bonds of DNAs containing altered bases with broad specificity and cleaves supercoiled DNA more efficiently than relaxed DNA. Members of this family are mainly from prokaryotes and contain only one canonical type II K-homology (KH) domain that has the signature motif GXXG (where X represents any amino acid). — an NCBI CDD conserved domain (cd02413); members share this curated model.
