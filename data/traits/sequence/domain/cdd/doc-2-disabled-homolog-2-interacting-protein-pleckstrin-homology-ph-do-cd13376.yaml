identifier: CDD:cd13376
label: "DOC-2/Disabled homolog 2-interacting protein Pleckstrin homology (PH) domain. DAB2IP (also called AIP1/ASK1-interacting protein-1 and DIP1/2) is a member of the RasSynGAP family along with Synaptic Ras-GTPase activating protein (SynGAP) and neuronal growth-associated protein (nGAP/RASAL2). DAB2IP is a critical component of many signal transduction pathways mediated by Ras and tumor necrosis factors including apoptosis pathways, and it is involved in the formation of many types of tumors. DAB2IP participates in regulation of gene expression and pluripotency of cells. Human DAB2IP is expressed in the adrenal gland, pancreas, endocardium, stomach, kidney, testis, small intestine, liver, trachea, skin, ovary, endometrium, lung, esophagus and bladder. No expression was observed in the cerebrum, parotid gland, thymus, thyroid gland and spleen. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes."
definition: >-
  DOC-2/Disabled homolog 2-interacting protein Pleckstrin homology (PH) domain. DAB2IP (also called AIP1/ASK1-interacting protein-1 and DIP1/2) is a member of the RasSynGAP family along with Synaptic Ras-GTPase activating protein (SynGAP) and neuronal growth-associated protein (nGAP/RASAL2). DAB2IP is a critical component of many signal transduction pathways mediated by Ras and tumor necrosis factors including apoptosis pathways, and it is involved in the formation of many types of tumors. DAB2IP participates in regulation of gene expression and pluripotency of cells. Human DAB2IP is expressed in the adrenal gland, pancreas, endocardium, stomach, kidney, testis, small intestine, liver, trachea, skin, ovary, endometrium, lung, esophagus and bladder. No expression was observed in the cerebrum, parotid gland, thymus, thyroid gland and spleen. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes. — an NCBI CDD conserved domain (cd13376); members share this curated model.
