identifier: CDD:cd17090
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in Talin and similar proteins. Talin is a cytoskeletal protein that activates integrins and couples them to cytoskeletal actin. Talin consists of an N-terminal head and a C-terminal rod. The talin head harbors a FERM (Band 4.1, ezrin, radixin, moesin) domain made up of F1, F2 and F3 domains, as well as an N-terminal region that precedes the FERM domain and has been referred to as the F0 domain. Both F0 and F1 domains have similar ubiquitin-like folds. This family corresponds to the F0 domain that is joined to the F1 domain in a novel fixed orientation by an extensive charged interface. It is required for maximal integrin-activation, by interacting with other FA components; no binding partner has yet been found for it."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in Talin and similar proteins. Talin is a cytoskeletal protein that activates integrins and couples them to cytoskeletal actin. Talin consists of an N-terminal head and a C-terminal rod. The talin head harbors a FERM (Band 4.1, ezrin, radixin, moesin) domain made up of F1, F2 and F3 domains, as well as an N-terminal region that precedes the FERM domain and has been referred to as the F0 domain. Both F0 and F1 domains have similar ubiquitin-like folds. This family corresponds to the F0 domain that is joined to the F1 domain in a novel fixed orientation by an extensive charged interface. It is required for maximal integrin-activation, by interacting with other FA components; no binding partner has yet been found for it. — an NCBI CDD conserved domain (cd17090); members share this curated model.
