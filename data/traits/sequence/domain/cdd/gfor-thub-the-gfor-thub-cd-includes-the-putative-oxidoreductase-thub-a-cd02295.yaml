identifier: CDD:cd02295
label: "GFOR_ThuB. The GFOR_ThuB CD includes the putative oxidoreductase,ThuB, associated with trehalose utilization in Sinorhizobium meliloti, and other related sequences. These proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase (GFOR) which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins."
definition: >-
  GFOR_ThuB. The GFOR_ThuB CD includes the putative oxidoreductase,ThuB, associated with trehalose utilization in Sinorhizobium meliloti, and other related sequences. These proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase (GFOR) which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins. — an NCBI CDD conserved domain (cd02295); members share this curated model.
