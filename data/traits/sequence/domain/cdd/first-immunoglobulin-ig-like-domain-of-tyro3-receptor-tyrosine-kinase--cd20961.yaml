identifier: CDD:cd20961
label: "First immunoglobulin (Ig)-like domain of Tyro3 receptor tyrosine kinase (RTK), and similar domains. The members here are composed of the first immunoglobulin (Ig)-like domain of Tyro3 receptor tyrosine kinase (RTK). Tyro3 together with Axl and Mer form the Axl/Tyro3 family of receptor tyrosine kinases (RTKs). This family includes Axl (also known as Ark, Ufo, and Tyro7), Tyro3 (also known as Sky, Rse, Brt, Dtk, and Tif), and Mer (also known as Nyk, c-Eyk, and Tyro12). Axl/Tyro3 family receptors have an extracellular portion with two Ig-like domains followed by two fibronectin-types III (FNIII) domains, a membrane-spanning single helix, and a cytoplasmic tyrosine kinase domain. Axl, Tyro3 and Mer are widely expressed in adult tissues, though they show higher expression in the brain, in the lymphatic and vascular systems, and in the testis. Axl, Tyro3, and Mer bind the vitamin K dependent protein Gas6 with high affinity, and in doing so activate their tyrosine kinase activity. Axl/Gas6 signaling may play a part in cell adhesion processes, prevention of apoptosis, and cell proliferation."
definition: >-
