identifier: CDD:cd17397
label: "Disrupted in renal carcinoma protein 2 of the Major Facilitator Superfamily of transporters. Disrupted in renal carcinoma protein 2 or disrupted in renal cancer protein 2 (DIRC2), encoded by the SLC49A4 gene, was initially identified as a breakpoint-spanning gene in a chromosomal translocation associated with the development of renal cancer. It is an electrogenic lysosomal metabolite transporter that is regulated by limited proteolytic processing by cathepsin L. DIRC2 belongs to the Solute carrier 49 (SLC49) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
