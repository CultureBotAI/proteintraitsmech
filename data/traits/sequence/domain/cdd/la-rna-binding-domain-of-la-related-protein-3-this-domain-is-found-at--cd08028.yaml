identifier: CDD:cd08028
label: "La RNA-binding domain of La-related protein 3. This domain is found at the N-terminus of the La autoantigen and similar proteins, and co-occurs with an RNA-recognition motif (RRM). Together these domains function to bind primary transcripts of RNA polymerase III at their 3' terminus and protect them from exonucleolytic degradation. Binding is specific for the 3'-terminal UUU-OH motif. The La autoantigen is also called Lupus La protein, LARP3, or Sjoegren syndrome type B antigen (SS-B)."
definition: >-
  La RNA-binding domain of La-related protein 3. This domain is found at the N-terminus of the La autoantigen and similar proteins, and co-occurs with an RNA-recognition motif (RRM). Together these domains function to bind primary transcripts of RNA polymerase III at their 3' terminus and protect them from exonucleolytic degradation. Binding is specific for the 3'-terminal UUU-OH motif. The La autoantigen is also called Lupus La protein, LARP3, or Sjoegren syndrome type B antigen (SS-B). — an NCBI CDD conserved domain (cd08028); members share this curated model.
