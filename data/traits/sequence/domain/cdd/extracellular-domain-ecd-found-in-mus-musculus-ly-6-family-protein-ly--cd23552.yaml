identifier: CDD:cd23552
label: "extracellular domain (ECD) found in Mus musculus Ly-6 family protein Ly-6M and similar proteins. Ly-6M is a novel member of the Ly-6 family of hematopoietic proteins. It contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Mus musculus Ly-6 family protein Ly-6M and similar proteins. Ly-6M is a novel member of the Ly-6 family of hematopoietic proteins. It contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23552); members share this curated model.
