identifier: CDD:cd20496
label: "peptidase C58 domain. The C58 family peptidases are endopeptidases that also act as transamidases, attaching a lipid moiety to the newly exposed N-terminus of the substrate. These include the Pseudomonas avirulence (Avr) protein AvrPphB and the homologous protein from Yersinia known as YopT; both are involved in bacterial pathogenesis. These proteins have a papain-like fold and a distinct substrate-binding site. The proteolytic activity of AvrPphB is essential for autoproteolytic cleavage of an AvrPphB precursor as well as for eliciting the hypersensitive response in plants. Yersinia pestis YopT cleaves the post-translationally modified Rho GTPases near their carboxyl termini, releasing them from the membrane. This leads to the disruption of actin cytoskeleton in host cells. Also included in this family is the Pseudomonas syringae HopN1 peptidase, a type III secretion system effector that can suppress plant cell death events in both compatible and incompatible interactions. All of these proteolytic activities are dependent upon the invariant C/H/D residues conserved in the C58/YopT family peptidase domain."
definition: >-
  peptidase C58 domain. The C58 family peptidases are endopeptidases that also act as transamidases, attaching a lipid moiety to the newly exposed N-terminus of the substrate. These include the Pseudomonas avirulence (Avr) protein AvrPphB and the homologous protein from Yersinia known as YopT; both are involved in bacterial pathogenesis. These proteins have a papain-like fold and a distinct substrate-binding site. The proteolytic activity of AvrPphB is essential for autoproteolytic cleavage of an AvrPphB precursor as well as for eliciting the hypersensitive response in plants. Yersinia pestis YopT cleaves the post-translationally modified Rho GTPases near their carboxyl termini, releasing them from the membrane. This leads to the disruption of actin cytoskeleton in host cells. Also included in this family is the Pseudomonas syringae HopN1 peptidase, a type III secretion system effector that can suppress plant cell death events in both compatible and incompatible interactions. All of these proteolytic activities are dependent upon the invariant C/H/D residues conserved in the C58/YopT family peptidase domain. — an NCBI CDD conserved domain (cd20496); members share this curated model.
