identifier: CDD:cd11066
label: "fungal cytochrome P450s similar to Aspergillus nidulans phenylacetate 2-hydroxylase. This group includes Aspergillus nidulans phenylacetate 2-hydroxylase (encoded by the phacA gene) and similar fungal cytochrome P450s. PhacA catalyzes the ortho-hydroxylation of phenylacetate, the first step of A. nidulans phenylacetate catabolism. The PhacA-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
