identifier: CDD:cd19627
label: TEA
definition: >-
  N-terminal DNA binding domain of TEAD proteins (TEA). TEAD proteins contain an N-terminal DNA-binding TEA (also known as ATTS because of the 4 proteins first found to harbor this motif (AbaA and TEC1 in yeast, TEF1/TEAD1 in vertebrates and Scalloped in fly) domain and a C-terminal YAP-binding domain (YBD) but lack an activation domain which through interaction with YAP (Yes-associated protein) form functional heterodimeric transcription factors that activate proliferative gene expression programs. TEAD proteins compose a family of transcription factors that regulate the expression of diverse genes associated with cell proliferation, differentiation and apoptosis. Mammalian TEAD proteins contain four members, named TEAD1-4. TEAD1-4 proteins are involved in Hippo pathway for control of tumorigenesis in metazoans
