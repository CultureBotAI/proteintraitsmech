identifier: CDD:cd12047
label: "C-terminal Src Homology 3 domain of NADPH oxidase activator 1. Noxa1 is a homolog of p67phox and is a cytosolic subunit of the nonphagocytic NADPH oxidase complex Nox1, which catalyzes the transfer of electrons from NADPH to molecular oxygen to form superoxide. Noxa1 is co-expressed with Nox1 in colon, stomach, uterus, prostate, and vascular smooth muscle cells, consistent with its regulatory role. It does not interact with p40phox, unlike p67phox, making Nox1 activity independent of p40phox, unlike Nox2. Noxa1 contains TPR, PB1, and C-terminal SH3 domains, but lacks the central SH3 domain that is present in p67phox. The TPR domain binds activated GTP-bound Rac. The C-terminal SH3 domain binds the polyproline motif found at the C-terminus of Noxo1, a homolog of p47phox. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  C-terminal Src Homology 3 domain of NADPH oxidase activator 1. Noxa1 is a homolog of p67phox and is a cytosolic subunit of the nonphagocytic NADPH oxidase complex Nox1, which catalyzes the transfer of electrons from NADPH to molecular oxygen to form superoxide. Noxa1 is co-expressed with Nox1 in colon, stomach, uterus, prostate, and vascular smooth muscle cells, consistent with its regulatory role. It does not interact with p40phox, unlike p67phox, making Nox1 activity independent of p40phox, unlike Nox2. Noxa1 contains TPR, PB1, and C-terminal SH3 domains, but lacks the central SH3 domain that is present in p67phox. The TPR domain binds activated GTP-bound Rac. The C-terminal SH3 domain binds the polyproline motif found at the C-terminus of Noxo1, a homolog of p47phox. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12047); members share this curated model.
