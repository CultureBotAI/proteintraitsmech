identifier: CDD:cd17079
label: "SUMO-like domain 2 (SLD2), structurally similar to a beta-grasp ubiquitin-like fold, found in nuclear factor of activated T-cells 2 interacting protein (NFATC2ip) and similar proteins. NFATC2ip, also termed nuclear factor of activated T cells (NFAT), cytoplasmic, calcineurin dependent 2 interacting protein, or 45 kDa NF-AT-interacting protein, or 45 kDa NFAT-interacting protein (Nip45), or nuclear factor of activated T-cells, or cytoplasmic 2-interacting protein, belongs to the eukaryotic-specific Rad60-Esc2-Nip45 (RENi) protein family. The family members may act as factors in transcriptional regulation, chromatin silencing and genomic stability, and typically contain an N-terminal polar/charged low-complexity segment and two C-terminal consecutive unique small ubiquitin-related modifier (SUMO)-like domains (SLD1 and SLD2) with beta-grasp fold. NFATC2ip was firstly identified as a co-regulator with NFAT and the T helper 2 (Th2)-specific transcription factor, c-Maf, to induce IL-4 production. NFATC2ip has also been involved in cellular differentiation and coordination of the immune response in humans and mice. NFATC2ip SLD2 domain binds to E2 SUMOylation enzyme, Ubc9, in an almost identical manner to that of SUMO and thereby inhibits elongation of poly-SUMO chains."
definition: >-
  SUMO-like domain 2 (SLD2), structurally similar to a beta-grasp ubiquitin-like fold, found in nuclear factor of activated T-cells 2 interacting protein (NFATC2ip) and similar proteins. NFATC2ip, also termed nuclear factor of activated T cells (NFAT), cytoplasmic, calcineurin dependent 2 interacting protein, or 45 kDa NF-AT-interacting protein, or 45 kDa NFAT-interacting protein (Nip45), or nuclear factor of activated T-cells, or cytoplasmic 2-interacting protein, belongs to the eukaryotic-specific Rad60-Esc2-Nip45 (RENi) protein family. The family members may act as factors in transcriptional regulation, chromatin silencing and genomic stability, and typically contain an N-terminal polar/charged low-complexity segment and two C-terminal consecutive unique small ubiquitin-related modifier (SUMO)-like domains (SLD1 and SLD2) with beta-grasp fold. NFATC2ip was firstly identified as a co-regulator with NFAT and the T helper 2 (Th2)-specific transcription factor, c-Maf, to induce IL-4 production. NFATC2ip has also been involved in cellular differentiation and coordination of the immune response in humans and mice. NFATC2ip SLD2 domain binds to E2 SUMOylation enzyme, Ubc9, in an almost identical manner to that of SUMO and thereby inhibits elongation of poly-SUMO chains. — an NCBI CDD conserved domain (cd17079); members share this curated model.
