identifier: CDD:cd11442
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana paclobutrazol resistance (PRE) family. The PRE family includes several bHLH transcription factors from Arabidopsis thaliana, such as PRE1-6. PRE1 (also termed AtbHLH136, or protein banquo 1), PRE2 (also termed AtbHLH134, or protein banquo 2, or EN 52), PRE4 (also termed AtbHLH161, or protein banquo 3), and PRE5 (also termed AtbHLH164) are atypical and probable non DNA-binding bHLH transcription factors that integrate multiple signaling pathways to regulate cell elongation and plant development. PRE3 (also termed AtbHLH135, or protein activation-tagged BRI1 suppressor 1, or ATBS1, or protein target of MOOPTEROS 7, or EN 67) is an atypical and probable non DNA-binding bHLH transcription factor required for MONOPTEROS-dependent root initiation in embryo. It promotes the correct definition of the hypophysis cell division plane. PRE5 (also termed AtbHLH163, or protein KIDARI) is an atypical and probable non DNA-binding bHLH transcription factor that regulates light-mediated responses in day light conditions by binding and inhibiting the activity of the bHLH transcription factor HFR1, a critical regulator of light signaling and shade avoidance."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana paclobutrazol resistance (PRE) family. The PRE family includes several bHLH transcription factors from Arabidopsis thaliana, such as PRE1-6. PRE1 (also termed AtbHLH136, or protein banquo 1), PRE2 (also termed AtbHLH134, or protein banquo 2, or EN 52), PRE4 (also termed AtbHLH161, or protein banquo 3), and PRE5 (also termed AtbHLH164) are atypical and probable non DNA-binding bHLH transcription factors that integrate multiple signaling pathways to regulate cell elongation and plant development. PRE3 (also termed AtbHLH135, or protein activation-tagged BRI1 suppressor 1, or ATBS1, or protein target of MOOPTEROS 7, or EN 67) is an atypical and probable non DNA-binding bHLH transcription factor required for MONOPTEROS-dependent root initiation in embryo. It promotes the correct definition of the hypophysis cell division plane. PRE5 (also termed AtbHLH163, or protein KIDARI) is an atypical and probable non DNA-binding bHLH transcription factor that regulates light-mediated responses in day light conditions by binding and inhibiting the activity of the bHLH transcription factor HFR1, a critical regulator of light signaling and shade avoidance. — an NCBI CDD conserved domain (cd11442); members share this curated model.
