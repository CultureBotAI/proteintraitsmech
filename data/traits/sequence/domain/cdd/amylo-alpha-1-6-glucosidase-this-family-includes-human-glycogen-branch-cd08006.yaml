definition: >-
  Amylo-alpha-1,6-glucosidase. This family includes human glycogen branching enzyme. This enzyme contains a number of distinct catalytic activities. It has been shown for the yeast homologue that mutations in this region disrupt the enzymes Amylo-alpha-1,6-glucosidase (EC:3.2.1.33)
