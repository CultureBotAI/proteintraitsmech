identifier: CDD:cd10800
label: "Escherichia coli putative lactam utilization protein YbgL and similar proteins. This subfamily of the LamB/YbgL family is represented by the Escherichia coli putative lactam utilization protein YbgL. Although their molecular function of member of this subfamily is unknown, they show high sequence similarity to the Aspergillus nidulans lactam utilization protein LamB, which might be required for conversion of exogenous 2-pyrrolidinone to endogenous GABA."
definition: >-
  Escherichia coli putative lactam utilization protein YbgL and similar proteins. This subfamily of the LamB/YbgL family is represented by the Escherichia coli putative lactam utilization protein YbgL. Although their molecular function of member of this subfamily is unknown, they show high sequence similarity to the Aspergillus nidulans lactam utilization protein LamB, which might be required for conversion of exogenous 2-pyrrolidinone to endogenous GABA. — an NCBI CDD conserved domain (cd10800); members share this curated model.
