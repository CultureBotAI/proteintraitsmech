identifier: CDD:cd16135
label: "Ras-associating (RA) domain found in N-terminal Ras-association domain family 7 (RASSF7). RASSF7, also termed HRAS1-related cluster protein 1, is a member of the N-terminus RASSF7-10 protein family. RASSF7-10 has an RA-domain at the N-terminus and lacks a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that is found in members of the RASSF1-6 family. The RA domain of N-terminal RASSF protein family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RASSF7 is a potential Ras effector as its function has been linked to some key biological processes including the regulation of cell death and proliferation; for example, RASSF7 is up-regulated in pancreatic cancer."
definition: >-
  Ras-associating (RA) domain found in N-terminal Ras-association domain family 7 (RASSF7). RASSF7, also termed HRAS1-related cluster protein 1, is a member of the N-terminus RASSF7-10 protein family. RASSF7-10 has an RA-domain at the N-terminus and lacks a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that is found in members of the RASSF1-6 family. The RA domain of N-terminal RASSF protein family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RASSF7 is a potential Ras effector as its function has been linked to some key biological processes including the regulation of cell death and proliferation; for example, RASSF7 is up-regulated in pancreatic cancer. — an NCBI CDD conserved domain (cd16135); members share this curated model.
