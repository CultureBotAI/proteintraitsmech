identifier: CDD:cd19911
label: "second double-stranded RNA binding motif of spermatid perinuclear RNA-binding protein (STRBP) and similar proteins. STRBP is a double-stranded DNA and RNA binding protein that is involved in spermatogenesis and sperm function. It plays a role in regulation of cell growth. STRBP contains an N-terminal DZF domain and two double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  second double-stranded RNA binding motif of spermatid perinuclear RNA-binding protein (STRBP) and similar proteins. STRBP is a double-stranded DNA and RNA binding protein that is involved in spermatogenesis and sperm function. It plays a role in regulation of cell growth. STRBP contains an N-terminal DZF domain and two double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19911); members share this curated model.
