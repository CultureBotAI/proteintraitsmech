identifier: CDD:cd17072
label: "Doublecortin-like domain found in doublecortin domain-containing protein 5 (DCDC5) and similar proteins. DCDC5 is a member of doublecortin (DCX) family. It is a microtubule-associated protein (MAP) with stable double tandem DCX repeats of ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. Microtubules are key components of the cytoskeleton that are involved in cell movement, shape determination, division and transport. DCDC5 is expressed during mitosis and involved in coordinating late cytokinesis. DCDC5 interacts with cytoplasmic dynein and Rab8 as well as with the Rab8 nucleotide exchange factor Rabin8. This family also includes DCDC1, which is a hydrophilic intracellular protein that contains only one DCX repeat. Therefore, DCDC1 might only bind to microtubules without microtubule polymerization properties. DCDC1 is mainly expressed in adult testis."
definition: >-
  Doublecortin-like domain found in doublecortin domain-containing protein 5 (DCDC5) and similar proteins. DCDC5 is a member of doublecortin (DCX) family. It is a microtubule-associated protein (MAP) with stable double tandem DCX repeats of ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. Microtubules are key components of the cytoskeleton that are involved in cell movement, shape determination, division and transport. DCDC5 is expressed during mitosis and involved in coordinating late cytokinesis. DCDC5 interacts with cytoplasmic dynein and Rab8 as well as with the Rab8 nucleotide exchange factor Rabin8. This family also includes DCDC1, which is a hydrophilic intracellular protein that contains only one DCX repeat. Therefore, DCDC1 might only bind to microtubules without microtubule polymerization properties. DCDC1 is mainly expressed in adult testis. — an NCBI CDD conserved domain (cd17072); members share this curated model.
