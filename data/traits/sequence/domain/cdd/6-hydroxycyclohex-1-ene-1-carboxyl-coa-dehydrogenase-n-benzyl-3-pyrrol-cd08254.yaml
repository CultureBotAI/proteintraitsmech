identifier: CDD:cd08254
label: "6-hydroxycyclohex-1-ene-1-carboxyl-CoA dehydrogenase, N-benzyl-3-pyrrolidinol dehydrogenase, and other MDR family members. This group contains enzymes of the zinc-dependent alcohol dehydrogenase family, including members (aka MDR) identified as 6-hydroxycyclohex-1-ene-1-carboxyl-CoA dehydrogenase and N-benzyl-3-pyrrolidinol dehydrogenase. 6-hydroxycyclohex-1-ene-1-carboxyl-CoA dehydrogenase catalyzes the conversion of 6-Hydroxycyclohex-1-enecarbonyl-CoA and NAD+ to 6-Ketoxycyclohex-1-ene-1-carboxyl-CoA,NADH, and H+. This group displays the characteristic catalytic and structural zinc sites of the zinc-dependent alcohol dehydrogenases. NAD(P)(H)-dependent oxidoreductases are the major enzymes in the interconversion of alcohols and aldehydes, or ketones.  Alcohol dehydrogenase in the liver converts ethanol and NAD+ to acetaldehyde and NADH, while in yeast and some other microorganisms ADH catalyzes the conversion acetaldehyde to ethanol in alcoholic fermentation. ADH is a member of the medium chain alcohol dehydrogenase family (MDR), which have a NAD(P)(H)-binding domain in a Rossmann fold of a beta-alpha form.  The NAD(H)-binding region is comprised of 2 structurally similar halves, each of which contacts a mononucleotide. A GxGxxG motif after the first mononucleotide contact half allows the close contact of the coenzyme with the ADH backbone. The N-terminal catalytic domain has a distant homology to GroES. These proteins typically form dimers (typically higher plants, mammals) or tetramers (yeast, bacteria), and have 2 tightly bound zinc atoms per subunit, a catalytic zinc at the active site and a structural zinc in a lobe of the catalytic domain. NAD(H)-binding occurs in the cleft between the catalytic  and coenzyme-binding domains at the active site, and coenzyme binding induces a conformational closing of this cleft. Coenzyme binding typically precedes and contributes to substrate binding. In human ADH catalysis, the zinc ion helps coordinate the alcohol, followed by deprotonation of  a histidine, the ribose of NAD, a serine, then the alcohol, which allows the transfer of a hydride to NAD+, creating NADH and a zinc-bound aldehyde or ketone. In yeast and some bacteria, the active site zinc binds an aldehyde, polarizing it, and leading to the reverse reaction."
definition: >-
  6-hydroxycyclohex-1-ene-1-carboxyl-CoA dehydrogenase, N-benzyl-3-pyrrolidinol dehydrogenase, and other MDR family members. This group contains enzymes of the zinc-dependent alcohol dehydrogenase family, including members (aka MDR) identified as 6-hydroxycyclohex-1-ene-1-carboxyl-CoA dehydrogenase and N-benzyl-3-pyrrolidinol dehydrogenase. 6-hydroxycyclohex-1-ene-1-carboxyl-CoA dehydrogenase catalyzes the conversion of 6-Hydroxycyclohex-1-enecarbonyl-CoA and NAD+ to 6-Ketoxycyclohex-1-ene-1-carboxyl-CoA,NADH, and H+. This group displays the characteristic catalytic and structural zinc sites of the zinc-dependent alcohol dehydrogenases. NAD(P)(H)-dependent oxidoreductases are the major enzymes in the interconversion of alcohols and aldehydes, or ketones. Alcohol dehydrogenase in the liver converts ethanol and NAD+ to acetaldehyde and NADH, while in yeast and some other microorganisms ADH catalyzes the conversion acetaldehyde to ethanol in alcoholic fermentation. ADH is a member of the medium chain alcohol dehydrogenase family (MDR), which have a NAD(P)(H)-binding domain in a Rossmann fold of a beta-alpha form. The NAD(H)-binding region is comprised of 2 structurally similar halves, each of which contacts a mononucleotide. A GxGxxG motif after the first mononucleotide contact half allows the close contact of the coenzyme with the ADH backbone. The N-terminal catalytic domain has a distant homology to GroES. These proteins typically form dimers (typically higher plants, mammals) or tetramers (yeast, bacteria), and have 2 tightly bound zinc atoms per subunit, a catalytic zinc at the active site and a structural zinc in a lobe of the catalytic domain. NAD(H)-binding occurs in the cleft between the catalytic and coenzyme-binding domains at the active site, and coenzyme binding induces a conformational closing of this cleft. Coenzyme binding typically precedes and contributes to substrate binding. In human ADH catalysis, the zinc ion helps coordinate the alcohol, followed by deprotonation of a histidine, the ribose of NAD, a serine, then the alcohol, which allows the transfer of a hydride to NAD+, creating NADH and a zinc-bound aldehyde or ketone. In yeast and some bacteria, the active site zinc binds an aldehyde, polarizing it, and leading to the reverse reaction. — an NCBI CDD conserved domain (cd08254); members share this curated model.
