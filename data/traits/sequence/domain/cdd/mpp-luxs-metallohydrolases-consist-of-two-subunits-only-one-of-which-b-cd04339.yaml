identifier: CDD:cd04339
label: "MPP/LuxS metallohydrolases consist of two subunits, only one of which, Beta, harbors the proteolytic active site. Each of the subunits, Alpha and Beta, is a result of fusion of two homologous domains. Each of these two domains is in turn homologous to LuxS. The peptidases coordinate a metal ion, at least in many cases, if not all, it is Zinc. They function in a variety of pathways, including mitochondrial and chloroplast presequence cleavage, quorum sensing in bacteria, hemoglobin catabolism in P. falciparum, insulin degradation, alpha-factor production in yeast, and others."
definition: >-
  MPP/LuxS metallohydrolases consist of two subunits, only one of which, Beta, harbors the proteolytic active site. Each of the subunits, Alpha and Beta, is a result of fusion of two homologous domains. Each of these two domains is in turn homologous to LuxS. The peptidases coordinate a metal ion, at least in many cases, if not all, it is Zinc. They function in a variety of pathways, including mitochondrial and chloroplast presequence cleavage, quorum sensing in bacteria, hemoglobin catabolism in P. falciparum, insulin degradation, alpha-factor production in yeast, and others. — an NCBI CDD conserved domain (cd04339); members share this curated model.
