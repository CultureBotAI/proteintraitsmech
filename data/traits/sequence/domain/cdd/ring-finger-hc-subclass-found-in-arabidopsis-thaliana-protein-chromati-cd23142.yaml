identifier: CDD:cd23142
label: "RING finger, HC subclass, found in Arabidopsis thaliana protein CHROMATIN REMODELING 27 (CHR27)  and similar proteins. CHR27, also called protein SNF2-RING-HELICASE-LIKE 1, is a probable helicase-like transcription factor involved in transcriptional gene silencing. It associates with SUVR2 and contributes to transcriptional gene silencing at RNA-directed DNA methylation (RdDM) target loci but also at RdDM-independent target loci. It may be involved in nucleosome positioning to form ordered nucleosome arrays on chromatin. It associates with SUVR2 and functions redundantly with FRG2. It is required for the efficient methylation of a broad range of RdDM target loci. CHR27 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana protein CHROMATIN REMODELING 27 (CHR27) and similar proteins. CHR27, also called protein SNF2-RING-HELICASE-LIKE 1, is a probable helicase-like transcription factor involved in transcriptional gene silencing. It associates with SUVR2 and contributes to transcriptional gene silencing at RNA-directed DNA methylation (RdDM) target loci but also at RdDM-independent target loci. It may be involved in nucleosome positioning to form ordered nucleosome arrays on chromatin. It associates with SUVR2 and functions redundantly with FRG2. It is required for the efficient methylation of a broad range of RdDM target loci. CHR27 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23142); members share this curated model.
