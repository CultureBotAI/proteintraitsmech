identifier: CDD:cd03739
label: "SOCS (suppressors of cytokine signaling) box of SOCS5-like proteins. Together with CIS1, the CIS/SOCS family of proteins is characterized by the presence of a C-terminal SOCS box and a central SH2 domain. SOCS5 inhibits Th2 differentiation by inhibiting IL-4 signaling. The general function of the SOCS box is the recruitment of the ubiquitin-transferase system.   The SOCS box interacts with Elongins B and C, Cullin-5 or Cullin-2, Rbx-1, and E2. Therefore, SOCS-box-containing proteins probably function as E3 ubiquitin ligases and mediate the degradation of proteins associated through their N-terminal regions."
definition: >-
  SOCS (suppressors of cytokine signaling) box of SOCS5-like proteins. Together with CIS1, the CIS/SOCS family of proteins is characterized by the presence of a C-terminal SOCS box and a central SH2 domain. SOCS5 inhibits Th2 differentiation by inhibiting IL-4 signaling. The general function of the SOCS box is the recruitment of the ubiquitin-transferase system. The SOCS box interacts with Elongins B and C, Cullin-5 or Cullin-2, Rbx-1, and E2. Therefore, SOCS-box-containing proteins probably function as E3 ubiquitin ligases and mediate the degradation of proteins associated through their N-terminal regions. — an NCBI CDD conserved domain (cd03739); members share this curated model.
