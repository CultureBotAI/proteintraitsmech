identifier: CDD:cd20839
label: "first protein kinase C conserved region 1 (C1 domain) found in protein kinase D (PKD) and similar proteins. PKD is also called PKD1, PRKD1, protein kinase C mu type (nPKC-mu), PRKCM, serine/threonine-protein kinase D1, or nPKC-D1. It is a serine/threonine-protein kinase that converts transient diacylglycerol (DAG) signals into prolonged physiological effects downstream of PKC, and is involved in the regulation of MAPK8/JNK1 and Ras signaling, Golgi membrane integrity and trafficking, cell survival through NF-kappa-B activation, cell migration, cell differentiation by mediating HDAC7 nuclear export, cell proliferation via MAPK1/3 (ERK1/2) signaling, and plays a role in cardiac hypertrophy, VEGFA-induced angiogenesis, genotoxic-induced apoptosis and flagellin-stimulated inflammatory response. PKD contains N-terminal tandem cysteine-rich zinc binding C1 (PKC conserved region 1), central PH (Pleckstrin Homology), and C-terminal catalytic kinase domains. This model corresponds to the first C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  first protein kinase C conserved region 1 (C1 domain) found in protein kinase D (PKD) and similar proteins. PKD is also called PKD1, PRKD1, protein kinase C mu type (nPKC-mu), PRKCM, serine/threonine-protein kinase D1, or nPKC-D1. It is a serine/threonine-protein kinase that converts transient diacylglycerol (DAG) signals into prolonged physiological effects downstream of PKC, and is involved in the regulation of MAPK8/JNK1 and Ras signaling, Golgi membrane integrity and trafficking, cell survival through NF-kappa-B activation, cell migration, cell differentiation by mediating HDAC7 nuclear export, cell proliferation via MAPK1/3 (ERK1/2) signaling, and plays a role in cardiac hypertrophy, VEGFA-induced angiogenesis, genotoxic-induced apoptosis and flagellin-stimulated inflammatory response. PKD contains N-terminal tandem cysteine-rich zinc binding C1 (PKC conserved region 1), central PH (Pleckstrin Homology), and C-terminal catalytic kinase domains. This model corresponds to the first C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20839); members share this curated model.
