identifier: CDD:cd18307
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in calicin. Calicin is a basic cytoskeletal protein involved in the formation and maintenance of the highly regular organization of the postacrosomal perinuclear theca, the calyx of mammalian spermatozoa. It contains BTB and BACK domains at the N-terminal region and kelch repeats at the C-terminal region. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in calicin. Calicin is a basic cytoskeletal protein involved in the formation and maintenance of the highly regular organization of the postacrosomal perinuclear theca, the calyx of mammalian spermatozoa. It contains BTB and BACK domains at the N-terminal region and kelch repeats at the C-terminal region. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18307); members share this curated model.
