identifier: CDD:cd15570
label: "PHD domain found in Saccharomyces cerevisiae bypass of ESS1 protein 1 (Bye1p), the E3 Sumo Ligase SIZ1, and similar proteins. Yeast Bye1p is a nuclear transcription factor with a domain resembling the central domain in the transcription elongation factor TFIIS and plays an inhibitory role during transcription elongation. It functions as a multicopy suppressor of Ess1, a peptidyl-prolyl cis-trans isomerase involved in proline isomerization of the C-terminal domain (CTD) of RNA polymerase II (Pol II). Bye1p contains an N-terminal plant homeodomain (PHD) finger, a central Pol II-binding TFIIS-like domain (TLD) domain, and a C-terminal Spen paralogue and orthologue C-terminal (SPOC) domain. The PHD domain binds to a histone H3 tail peptide containing trimethylated lysine 4 (H3K4me3). The TLD domain is responsible for the association with chromatin. Plant SIZ1 protein is a SUMO (small ubiquitin-related modifier) E3 ligase that facilitates conjugation of SUMO to substrate target proteins (sumoylation) and belongs to the protein inhibitor of activated STAT (PIAS) protein family. It negatively regulates abscisic acid (ABA) signaling, which is dependent on the bZIP transcripton factor ABI5. It also modulates plant growth and plays a role in drought stress response likely through the regulation of gene expression. SIZ1 functions as a floral repressor that not only represses the salicylic acid (SA)-dependent pathway, but also promotes FLOWERING LOCUS C (FLC) expression by repressing FLOWERING LOCUS D (FLD) activity through sumoylation. SIZ1 contains a PHD finger, which specifically binds methylated histone H3 at lysine 4 and arginine 2."
definition: >-
  PHD domain found in Saccharomyces cerevisiae bypass of ESS1 protein 1 (Bye1p), the E3 Sumo Ligase SIZ1, and similar proteins. Yeast Bye1p is a nuclear transcription factor with a domain resembling the central domain in the transcription elongation factor TFIIS and plays an inhibitory role during transcription elongation. It functions as a multicopy suppressor of Ess1, a peptidyl-prolyl cis-trans isomerase involved in proline isomerization of the C-terminal domain (CTD) of RNA polymerase II (Pol II). Bye1p contains an N-terminal plant homeodomain (PHD) finger, a central Pol II-binding TFIIS-like domain (TLD) domain, and a C-terminal Spen paralogue and orthologue C-terminal (SPOC) domain. The PHD domain binds to a histone H3 tail peptide containing trimethylated lysine 4 (H3K4me3). The TLD domain is responsible for the association with chromatin. Plant SIZ1 protein is a SUMO (small ubiquitin-related modifier) E3 ligase that facilitates conjugation of SUMO to substrate target proteins (sumoylation) and belongs to the protein inhibitor of activated STAT (PIAS) protein family. It negatively regulates abscisic acid (ABA) signaling, which is dependent on the bZIP transcripton factor ABI5. It also modulates plant growth and plays a role in drought stress response likely through the regulation of gene expression. SIZ1 functions as a floral repressor that not only represses the salicylic acid (SA)-dependent pathway, but also promotes FLOWERING LOCUS C (FLC) expression by repressing FLOWERING LOCUS D (FLD) activity through sumoylation. SIZ1 contains a PHD finger, which specifically binds methylated histone H3 at lysine 4 and arginine 2. — an NCBI CDD conserved domain (cd15570); members share this curated model.
