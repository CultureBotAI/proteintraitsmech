identifier: CDD:cd18382
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCNG/Kv6 subfamily of potassium voltage-gated channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv6, also known as subfamily G, includes KCNG1 (Kv6.1), KCNG2 (Kv6.2 or KCNF2), KCNG3 (Kv6.3) and KCNG4 (Kv6.4), which are regulatory alpha subunits and do not form functional channels on their own. KCNG1 can form functional heterotetrameric channels with KCNB1 (also known as Kv2.1), and further modulates the delayed rectifier voltage-gated potassium channel activation and deactivation rates of KCNB1. KCNG2, also called cardiac potassium channel subunit, can form functional heterodimeric channels with KCNB1, and further modulates channel activity by shifting the threshold and the half-maximal activation to more negative values. KCNG3, also called voltage-gated potassium channel subunit Kv10.1, is an electrically silent modulatory subunit that can form functional heterotetrameric channels with KCNB1, and further promotes a reduction in the rate of activation and inactivation of the delayed rectifier voltage-gated potassium channel KCNB1. KCNG4 is a silent voltage-gated potassium (KvS) channel subunit that can form functional heterotetrameric channels with KCNB1, and further modulates the delayed rectifier voltage-gated potassium channel activation and deactivation rates of KCNB1."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCNG/Kv6 subfamily of potassium voltage-gated channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv6, also known as subfamily G, includes KCNG1 (Kv6.1), KCNG2 (Kv6.2 or KCNF2), KCNG3 (Kv6.3) and KCNG4 (Kv6.4), which are regulatory alpha subunits and do not form functional channels on their own. KCNG1 can form functional heterotetrameric channels with KCNB1 (also known as Kv2.1), and further modulates the delayed rectifier voltage-gated potassium channel activation and deactivation rates of KCNB1. KCNG2, also called cardiac potassium channel subunit, can form functional heterodimeric channels with KCNB1, and further modulates channel activity by shifting the threshold and the half-maximal activation to more negative values. KCNG3, also called voltage-gated potassium channel subunit Kv10.1, is an electrically silent modulatory subunit that can form functional heterotetrameric channels with KCNB1, and further promotes a reduction in the rate of activation and inactivation of the delayed rectifier voltage-gated potassium channel KCNB1. KCNG4 is a silent voltage-gated potassium (KvS) channel subunit that can form functional heterotetrameric channels with KCNB1, and further modulates the delayed rectifier voltage-gated potassium channel activation and deactivation rates of KCNB1. — an NCBI CDD conserved domain (cd18382); members share this curated model.
