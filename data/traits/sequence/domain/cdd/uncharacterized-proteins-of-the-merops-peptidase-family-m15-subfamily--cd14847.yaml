identifier: CDD:cd14847
label: "Uncharacterized proteins of the MEROPS peptidase family M15, subfamily B. This family of uncharacterized proteins similar to D-Ala-D-Ala carboxypeptidase pdcA (Myxococcus-type) are zinc-binding enzymes that belong to the peptidase M15 subfamily B. The enzyme D-Ala-D-Ala carbozypeptidase catalyzes carboxypeptidation reactions involved in bacterial cell wall metabolism."
definition: >-
