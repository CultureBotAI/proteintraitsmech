identifier: CDD:cd22530
label: "first type II K-homology (KH) RNA-binding domain found in archaeal probable transcription termination protein NusA and similar proteins. NusA, also called N utilization substance protein A, is an essential multifunctional transcription elongation factor that is universally conserved among prokaryotes and archaea. It participates in both transcription termination and antitermination. NusA homologs consisting of only the two type II K-homology (KH) domains are widely conserved in archaea. Although their function remains unclear, it has been found that Aeropyrum pernix NusA strongly binds to a certain CU-rich sequence near a termination signal. Archaeal NusA may have retained some functions of bacterial NusA, including ssRNA-binding ability. This model corresponds to the first KH domain of NusA found mainly in archaea."
definition: >-
  first type II K-homology (KH) RNA-binding domain found in archaeal probable transcription termination protein NusA and similar proteins. NusA, also called N utilization substance protein A, is an essential multifunctional transcription elongation factor that is universally conserved among prokaryotes and archaea. It participates in both transcription termination and antitermination. NusA homologs consisting of only the two type II K-homology (KH) domains are widely conserved in archaea. Although their function remains unclear, it has been found that Aeropyrum pernix NusA strongly binds to a certain CU-rich sequence near a termination signal. Archaeal NusA may have retained some functions of bacterial NusA, including ssRNA-binding ability. This model corresponds to the first KH domain of NusA found mainly in archaea. — an NCBI CDD conserved domain (cd22530); members share this curated model.
