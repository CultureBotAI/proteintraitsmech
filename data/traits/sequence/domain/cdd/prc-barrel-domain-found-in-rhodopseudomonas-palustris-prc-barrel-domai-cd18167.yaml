identifier: CDD:cd18167
label: PRC_RpPRC_like
definition: >-
  PRC-barrel domain found in Rhodopseudomonas Palustris PRC-barrel domain protein and similar proteins. This family includes a group uncharacterized proteins similar to Rhodopseudomonas Palustris PRC-barrel domain protein that has no known function. Many family members contain two or three copies of photoreaction center (PRC) domains
