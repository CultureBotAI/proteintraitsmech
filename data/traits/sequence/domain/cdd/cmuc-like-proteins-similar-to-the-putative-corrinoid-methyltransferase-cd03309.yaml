label: "CmuC_like. Proteins similar to the putative corrinoid methyltransferase CmuC. Its function has been inferred from sequence similarity to the methyltransferases CmuA and MtaA. Mutants of Methylobacterium sp. disrupted in cmuC and purU appear deficient in some step of chloromethane metabolism."
