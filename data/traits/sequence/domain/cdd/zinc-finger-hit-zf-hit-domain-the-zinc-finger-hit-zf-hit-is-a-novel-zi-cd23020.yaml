identifier: CDD:cd23020
label: "zinc finger HIT (zf-HIT) domain. The zinc finger HIT (zf-HIT) is a novel zinc-binding domain with about 50 amino acids. It is characterized by a fold in \"treble-clef\" through interleaved CCCC and CCHC zinc finger motifs that both bind a zinc ion. zf-HIT domain may function as a protein-protein interaction domain. It is mainly found in nuclear proteins involved in gene regulation and chromatin remodeling. The zf-HIT family includes six proteins containing zf-HIT domain present in human and three in yeast proteome, all belonging to multimodular RNA/protein complexes."
definition: >-
  zinc finger HIT (zf-HIT) domain. The zinc finger HIT (zf-HIT) is a novel zinc-binding domain with about 50 amino acids. It is characterized by a fold in "treble-clef" through interleaved CCCC and CCHC zinc finger motifs that both bind a zinc ion. zf-HIT domain may function as a protein-protein interaction domain. It is mainly found in nuclear proteins involved in gene regulation and chromatin remodeling. The zf-HIT family includes six proteins containing zf-HIT domain present in human and three in yeast proteome, all belonging to multimodular RNA/protein complexes. — an NCBI CDD conserved domain (cd23020); members share this curated model.
