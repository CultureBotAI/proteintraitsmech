identifier: CDD:cd23643
label: mS23
definition: >-
  mS23 domain family. mS23 is an uncharacterized mitochondrial protein from Trypanosoma cruzi. It is a component of T. cruzi mitochondrial ribosome (mitoribosome) small subunits (Tb-mt-SSUs), which forms a complex with the C-terminal domain (CTD) of initiation factor IF-3 (Tb-mt-SSU/IF-3); it may be involved in mitoribosomal maturation
