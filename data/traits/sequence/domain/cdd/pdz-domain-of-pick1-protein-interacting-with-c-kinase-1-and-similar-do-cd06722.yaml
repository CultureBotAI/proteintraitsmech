identifier: CDD:cd06722
label: "PDZ domain of PICK1 (protein interacting with C-kinase 1) and similar domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of PICK1, and related domains. PICK1 (also known as PRKCA-binding protein and protein kinase C-alpha-binding protein) plays a key role in regulating trafficking of binding partners by altering either their subcellular targeting and/or surface expression. PICK1 plays a role in synaptic plasticity by regulating the trafficking and internalization of amino-3-hydroxy-5-methylisoxazole-4-propionic acid (AMPA) receptors; the PICK1-PDZ domain binds the AMPA receptor subunits. The PICK1 PDZ domain also binds glutamate transporters, Eph receptors, metabotropic glutamate receptors, and ASICs (acid-sensing ion channels), among others. Clustering and synaptic targeting of PICK1 requires direct interaction between the PDZ domain and lipid membranes. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PICK-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta- strand F."
definition: >-
  PDZ domain of PICK1 (protein interacting with C-kinase 1) and similar domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of PICK1, and related domains. PICK1 (also known as PRKCA-binding protein and protein kinase C-alpha-binding protein) plays a key role in regulating trafficking of binding partners by altering either their subcellular targeting and/or surface expression. PICK1 plays a role in synaptic plasticity by regulating the trafficking and internalization of amino-3-hydroxy-5-methylisoxazole-4-propionic acid (AMPA) receptors; the PICK1-PDZ domain binds the AMPA receptor subunits. The PICK1 PDZ domain also binds glutamate transporters, Eph receptors, metabotropic glutamate receptors, and ASICs (acid-sensing ion channels), among others. Clustering and synaptic targeting of PICK1 requires direct interaction between the PDZ domain and lipid membranes. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PICK-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta- strand F. — an NCBI CDD conserved domain (cd06722); members share this curated model.
