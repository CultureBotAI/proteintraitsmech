identifier: CDD:cd20397
label: "Tudor domain found in the BAH and coiled-coil domain-containing protein 1 (BAHCC1) family. The family of BAHCC1 includes BAHCC1 and trinucleotide repeat-containing gene 18 protein (TNRC18). BAHCC1 may function as a transcriptional regulator. The biological function of TNRC18 remains unclear. Members of this family contain one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in the BAH and coiled-coil domain-containing protein 1 (BAHCC1) family. The family of BAHCC1 includes BAHCC1 and trinucleotide repeat-containing gene 18 protein (TNRC18). BAHCC1 may function as a transcriptional regulator. The biological function of TNRC18 remains unclear. Members of this family contain one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20397); members share this curated model.
