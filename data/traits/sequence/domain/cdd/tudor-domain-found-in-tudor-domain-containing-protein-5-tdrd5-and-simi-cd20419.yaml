identifier: CDD:cd20419
label: "Tudor domain found in Tudor domain-containing protein 5 (TDRD5) and similar proteins. TDRD5 is an RNA-binding protein directly associated with piRNA precursors. It is required for retrotransposon silencing, chromatoid body assembly, and spermiogenesis. TDRD5 participates in the repression of transposable elements and prevents their mobilization, which is essential for germline integrity. TDRD5 contains three LOTUS domains and one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Tudor domain-containing protein 5 (TDRD5) and similar proteins. TDRD5 is an RNA-binding protein directly associated with piRNA precursors. It is required for retrotransposon silencing, chromatoid body assembly, and spermiogenesis. TDRD5 participates in the repression of transposable elements and prevents their mobilization, which is essential for germline integrity. TDRD5 contains three LOTUS domains and one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20419); members share this curated model.
