identifier: CDD:cd19852
label: "fatty acid-binding protein similar to Locusta migratoria FABP (Lm-FABP). This subfamily includes fatty acid-binding protein found mainly in insects such as the migratory locust (Locusta migratoria) FABP (Lm-FABP) and the desert locust (Schistocerca gregaria) FABP (Sg-FABP), having flight muscle tissues that contain unusually high levels FABP, similar to migratory birds. Both Sg- and Lm-FABP are closely related to the mammalian i-LBP subfamily IV, especially to the heart and adipocyte FABP forms. This subgroup belongs to the intracellular fatty-acid binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
