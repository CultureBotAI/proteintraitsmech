identifier: CDD:cd12066
label: "Src Homology 3 domain of GTPase Regulator Associated with Focal adhesion kinase 3. GRAF3 is also called Rho GTPase activating protein 42 (ARHGAP42) or ARHGAP10-like. Though its function has not been characterized, it may be a GAP with activity towards RhoA and Cdc42, based on its similarity to GRAF and GRAF2. It contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, a Rho GAP domain, and a C-terminal SH3 domain. The SH3 domain of GRAF and GRAF2 binds PKNbeta, a target of the small GTPase Rho. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
