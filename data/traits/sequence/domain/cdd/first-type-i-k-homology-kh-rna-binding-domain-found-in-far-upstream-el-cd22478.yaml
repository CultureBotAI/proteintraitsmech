identifier: CDD:cd22478
label: "first type I K homology (KH) RNA-binding domain found in far upstream element-binding protein 1 (FUBP1) and similar proteins. FUBP1, also called FBP, or FUSE-binding protein 1, or DNA helicase V, or DH V, binds RNA and single-stranded DNA (ssDNA) and may act both as activator and repressor of transcription. It regulates MYC expression by binding to a single-stranded far-upstream element (FUSE) upstream of the MYC promoter. FUBP1 contains four K-homology (KH) RNA-binding domains. The model corresponds to the first one."
definition: >-
  first type I K homology (KH) RNA-binding domain found in far upstream element-binding protein 1 (FUBP1) and similar proteins. FUBP1, also called FBP, or FUSE-binding protein 1, or DNA helicase V, or DH V, binds RNA and single-stranded DNA (ssDNA) and may act both as activator and repressor of transcription. It regulates MYC expression by binding to a single-stranded far-upstream element (FUSE) upstream of the MYC promoter. FUBP1 contains four K-homology (KH) RNA-binding domains. The model corresponds to the first one. — an NCBI CDD conserved domain (cd22478); members share this curated model.
