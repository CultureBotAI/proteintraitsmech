identifier: CDD:cd02092
label: "Rhizobium meliloti FixI and related proteins; belongs to P-type heavy metal-transporting ATPase subfamily. FixI may be a pump of a specific cation involved in symbiotic nitrogen fixation. The Rhizobium fixI gene is part of an operon conserved among rhizobia, fixGHIS. FixG, FixH, FixI, and FixS may participate in a membrane-bound complex coupling the FixI cation pump with a redox process catalyzed by FixG, an iron-sulfur protein. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  Rhizobium meliloti FixI and related proteins; belongs to P-type heavy metal-transporting ATPase subfamily. FixI may be a pump of a specific cation involved in symbiotic nitrogen fixation. The Rhizobium fixI gene is part of an operon conserved among rhizobia, fixGHIS. FixG, FixH, FixI, and FixS may participate in a membrane-bound complex coupling the FixI cation pump with a redox process catalyzed by FixG, an iron-sulfur protein. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd02092); members share this curated model.
