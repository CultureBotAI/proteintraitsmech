identifier: CDD:cd19800
label: "B-box-type 2 zinc finger  found in Xenopus laevis nuclear factor 7 (xNF7) and similar proteins. xNF7 is a maternally expressed novel zinc finger nuclear phosphoprotein. It acts as a transcription factor that determines dorsal-ventral body axis. xNF7 harbors a B-box motif that shows high sequence similarity with B-Box-type zinc finger 2 found in tripartite motif-containing proteins (TRIMs). The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
definition: >-
  B-box-type 2 zinc finger found in Xenopus laevis nuclear factor 7 (xNF7) and similar proteins. xNF7 is a maternally expressed novel zinc finger nuclear phosphoprotein. It acts as a transcription factor that determines dorsal-ventral body axis. xNF7 harbors a B-box motif that shows high sequence similarity with B-Box-type zinc finger 2 found in tripartite motif-containing proteins (TRIMs). The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19800); members share this curated model.
