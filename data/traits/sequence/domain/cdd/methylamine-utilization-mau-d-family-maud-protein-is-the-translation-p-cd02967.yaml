identifier: CDD:cd02967
label: "Methylamine utilization (mau) D family; mauD protein is the translation product of the mauD gene found in methylotrophic bacteria, which are able to use methylamine as a sole carbon source and a nitrogen source. mauD is an essential accessory protein for the biosynthesis of methylamine dehydrogenase (MADH), the enzyme that catalyzes the oxidation of methylamine and other primary amines. MADH possesses an alpha2beta2 subunit structure; the alpha subunit is also referred to as the large subunit. Each beta (small) subunit contains a tryptophan tryptophylquinone (TTQ) prosthetic group. Accessory proteins are essential for the proper transport of MADH to the periplasm, TTQ synthesis and the formation of several structural disulfide bonds. Bacterial mutants containing an insertion on the mauD gene were unable to grow on methylamine as a sole carbon source, were found to lack the MADH small subunit and had decreased amounts of the MADH large subunit."
definition: >-
  Methylamine utilization (mau) D family; mauD protein is the translation product of the mauD gene found in methylotrophic bacteria, which are able to use methylamine as a sole carbon source and a nitrogen source. mauD is an essential accessory protein for the biosynthesis of methylamine dehydrogenase (MADH), the enzyme that catalyzes the oxidation of methylamine and other primary amines. MADH possesses an alpha2beta2 subunit structure; the alpha subunit is also referred to as the large subunit. Each beta (small) subunit contains a tryptophan tryptophylquinone (TTQ) prosthetic group. Accessory proteins are essential for the proper transport of MADH to the periplasm, TTQ synthesis and the formation of several structural disulfide bonds. Bacterial mutants containing an insertion on the mauD gene were unable to grow on methylamine as a sole carbon source, were found to lack the MADH small subunit and had decreased amounts of the MADH large subunit. — an NCBI CDD conserved domain (cd02967); members share this curated model.
