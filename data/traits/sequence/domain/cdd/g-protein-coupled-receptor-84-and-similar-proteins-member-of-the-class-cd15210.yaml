identifier: CDD:cd15210
label: "G protein-coupled receptor 84 and similar proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR84, also known as the inflammation-related G-Protein coupled receptor EX33, is a receptor for medium-chain free fatty acid (FFA) with carbon chain lengths of C9 to C14. Among these medium-chain FFAs, capric acid (C10:0), undecanoic acid (C11:0), and lauric acid (C12:0) are the most potent endogenous agonists of GPR84, whereas short-chain and long-chain saturated and unsaturated FFAs do not activate this receptor. GPR84 contains a [G/N]RY-motif instead of the highly conserved Asp-Arg-Tyr (DRY) motif found in the third transmembrane helix (TM3) of the rhodopsin-like class A receptors and important for efficient G protein-coupled signal transduction. All GPCRs have a common structural architecture comprising of seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops. A general feature of GPCR signaling is agonist-induced conformational changes in the receptors, which then activate the heterotrimeric G proteins. In the case of GPR84, activation of the receptor couples to a pertussis toxin sensitive G(i/o)-protein pathway. GPR84 knockout mice showed increased Th2 cytokine production including IL-4, IL-5, and IL-13 compared to wild-type mice. It has been also shown that activation of GPR84 augments lipopolysaccharide-stimulated IL-8 production in polymorphonuclear leukocytes and TNF-alpha production in macrophages, suggesting that GPR84 may function as a proinflammatory receptor."
definition: >-
  G protein-coupled receptor 84 and similar proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR84, also known as the inflammation-related G-Protein coupled receptor EX33, is a receptor for medium-chain free fatty acid (FFA) with carbon chain lengths of C9 to C14. Among these medium-chain FFAs, capric acid (C10:0), undecanoic acid (C11:0), and lauric acid (C12:0) are the most potent endogenous agonists of GPR84, whereas short-chain and long-chain saturated and unsaturated FFAs do not activate this receptor. GPR84 contains a [G/N]RY-motif instead of the highly conserved Asp-Arg-Tyr (DRY) motif found in the third transmembrane helix (TM3) of the rhodopsin-like class A receptors and important for efficient G protein-coupled signal transduction. All GPCRs have a common structural architecture comprising of seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops. A general feature of GPCR signaling is agonist-induced conformational changes in the receptors, which then activate the heterotrimeric G proteins. In the case of GPR84, activation of the receptor couples to a pertussis toxin sensitive G(i/o)-protein pathway. GPR84 knockout mice showed increased Th2 cytokine production including IL-4, IL-5, and IL-13 compared to wild-type mice. It has been also shown that activation of GPR84 augments lipopolysaccharide-stimulated IL-8 production in polymorphonuclear leukocytes and TNF-alpha production in macrophages, suggesting that GPR84 may function as a proinflammatory receptor. — an NCBI CDD conserved domain (cd15210); members share this curated model.
