identifier: CDD:cd17895
label: "N-terminal NAD(P)-binding domain of N-acetyl-gamma-glutamyl-phosphate reductase (AGPR), type 1 and similar proteins. AGPR (EC 1.2.1.38), also called N-acetyl-glutamate semialdehyde dehydrogenase, or NAGSA dehydrogenase, catalyzes the NADPH-dependent reduction of N-acetyl-gamma-glutamyl-phosphate phosphate; the third step of arginine biosynthesis. N-acetyl-gamma-glutamyl-phosphate phosphate, the product of the second step catalyzed by acetylglutamate kinase, undergoes reductive dephosphorylation to give N-acetylglutamic semialdehyde, which is converted to ornithine by acetylornithine aminotransferase and acetylornithine deacetylase. AGPR proteins contain an N-terminal Rossmann fold NAD(P)-binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain and are members of the GAPDH superfamily of proteins. NADP(+) binds in a cleft between these domains and contacts both. There are two related families of N-acetyl-gamma-glutamyl-phosphate reductase, which differ by phylogeny, similarity clustering, and gap architecture in a multiple sequence alignment. The model corresponds to type 1 AGPR family. Bacterial members of this family tend to be found within Arg biosynthesis operons. The type 1 AGPR family also includes LysY (LysW-L-2-aminoadipate/LysW-L-glutamate phosphate reductase), which is involved in both the arginine and lysine biosynthetic pathways."
definition: >-
  N-terminal NAD(P)-binding domain of N-acetyl-gamma-glutamyl-phosphate reductase (AGPR), type 1 and similar proteins. AGPR (EC 1.2.1.38), also called N-acetyl-glutamate semialdehyde dehydrogenase, or NAGSA dehydrogenase, catalyzes the NADPH-dependent reduction of N-acetyl-gamma-glutamyl-phosphate phosphate; the third step of arginine biosynthesis. N-acetyl-gamma-glutamyl-phosphate phosphate, the product of the second step catalyzed by acetylglutamate kinase, undergoes reductive dephosphorylation to give N-acetylglutamic semialdehyde, which is converted to ornithine by acetylornithine aminotransferase and acetylornithine deacetylase. AGPR proteins contain an N-terminal Rossmann fold NAD(P)-binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain and are members of the GAPDH superfamily of proteins. NADP(+) binds in a cleft between these domains and contacts both. There are two related families of N-acetyl-gamma-glutamyl-phosphate reductase, which differ by phylogeny, similarity clustering, and gap architecture in a multiple sequence alignment. The model corresponds to type 1 AGPR family. Bacterial members of this family tend to be found within Arg biosynthesis operons. The type 1 AGPR family also includes LysY (LysW-L-2-aminoadipate/LysW-L-glutamate phosphate reductase), which is involved in both the arginine and lysine biosynthetic pathways. — an NCBI CDD conserved domain (cd17895); members share this curated model.
