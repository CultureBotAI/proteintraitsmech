identifier: CDD:cd14519
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 22, 15, and similar proteins. Dual specificity protein phosphatase 22 (DUSP22, also known as VHX) and 15 (DUSP15, also known as VHY) function as protein-serine/threonine phosphatases (EC 3.1.3.16) and protein-tyrosine-phosphatases (EC 3.1.3.48). They are atypical DUSPs; they contain the catalytic dual specificity phosphatase domain but lack the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. The both contain N-terminal myristoylation recognition sequences and myristoylation regulates their subcellular location. DUSP22 negatively regulates the estrogen receptor-alpha-mediated signaling pathway and the IL6-leukemia inhibitory factor (LIF)-STAT3-mediated signaling pathway. DUSP15 has been identified as a regulator of oligodendrocyte differentiation. DUSP22 is a single domain protein containing only the catalytic dual specificity phosphatase domain while DUSP15 contains a short C-terminal tail."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 22, 15, and similar proteins. Dual specificity protein phosphatase 22 (DUSP22, also known as VHX) and 15 (DUSP15, also known as VHY) function as protein-serine/threonine phosphatases (EC 3.1.3.16) and protein-tyrosine-phosphatases (EC 3.1.3.48). They are atypical DUSPs; they contain the catalytic dual specificity phosphatase domain but lack the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. The both contain N-terminal myristoylation recognition sequences and myristoylation regulates their subcellular location. DUSP22 negatively regulates the estrogen receptor-alpha-mediated signaling pathway and the IL6-leukemia inhibitory factor (LIF)-STAT3-mediated signaling pathway. DUSP15 has been identified as a regulator of oligodendrocyte differentiation. DUSP22 is a single domain protein containing only the catalytic dual specificity phosphatase domain while DUSP15 contains a short C-terminal tail. — an NCBI CDD conserved domain (cd14519); members share this curated model.
