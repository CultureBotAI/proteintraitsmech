identifier: CDD:cd22226
label: "Hook domain found in protein Hook 3 (Hook3) and similar proteins. Hook3 is an adaptor protein for microtubule-dependent intracellular vesicle and protein trafficking. It is involved in Golgi and endosome transport. It acts as a scaffold for the opposite-polarity microtubule-based motors cytoplasmic dynein-1 and the kinesin KIF1C. It may participate in the turnover of the endocytosed scavenger receptor. Hook3 is a component of the FTS/Hook/FHIP complex (FHF complex), which may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting (HOPS) complex."
definition: >-
  Hook domain found in protein Hook 3 (Hook3) and similar proteins. Hook3 is an adaptor protein for microtubule-dependent intracellular vesicle and protein trafficking. It is involved in Golgi and endosome transport. It acts as a scaffold for the opposite-polarity microtubule-based motors cytoplasmic dynein-1 and the kinesin KIF1C. It may participate in the turnover of the endocytosed scavenger receptor. Hook3 is a component of the FTS/Hook/FHIP complex (FHF complex), which may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting (HOPS) complex. — an NCBI CDD conserved domain (cd22226); members share this curated model.
