identifier: CDD:cd22387
label: "type I K homology (KH) RNA-binding domain found in the family of DEAD box protein 46 (DDX46). The DDX46 family includes DEAD box protein 46 (DDX46), fungal pre-mRNA-processing ATP-dependent RNA helicase PRP5, Arabidopsis thaliana DEAD-box ATP-dependent RNA helicase RH42 and similar proteins. DDX46, also called PRP5 homolog, is an ATP-dependent RNA helicase that plays an essential role in splicing, either prior to, or during splicing A complex formation. It inhibits antiviral innate responses by entrapping selected antiviral transcripts in the nucleus. It is also involved in the development of several tumors. PRP5 is an ATP-dependent RNA helicase involved spliceosome assembly and in nuclear splicing. It catalyzes an ATP-dependent conformational change of U2 snRNP. PRP5 interacts with the U2 snRNP and HSH155. RH42, also called DEAD-box RNA helicase RCF1, or REGULATOR OF CBF GENE EXPRESSION 1, is a helicase required for pre-mRNA splicing, cold-responsive gene regulation and cold tolerance. Members in this family contain a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  type I K homology (KH) RNA-binding domain found in the family of DEAD box protein 46 (DDX46). The DDX46 family includes DEAD box protein 46 (DDX46), fungal pre-mRNA-processing ATP-dependent RNA helicase PRP5, Arabidopsis thaliana DEAD-box ATP-dependent RNA helicase RH42 and similar proteins. DDX46, also called PRP5 homolog, is an ATP-dependent RNA helicase that plays an essential role in splicing, either prior to, or during splicing A complex formation. It inhibits antiviral innate responses by entrapping selected antiviral transcripts in the nucleus. It is also involved in the development of several tumors. PRP5 is an ATP-dependent RNA helicase involved spliceosome assembly and in nuclear splicing. It catalyzes an ATP-dependent conformational change of U2 snRNP. PRP5 interacts with the U2 snRNP and HSH155. RH42, also called DEAD-box RNA helicase RCF1, or REGULATOR OF CBF GENE EXPRESSION 1, is a helicase required for pre-mRNA splicing, cold-responsive gene regulation and cold tolerance. Members in this family contain a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22387); members share this curated model.
