identifier: CDD:cd11509
label: "Na(+)- and Cl(-)-dependent creatine transporter 1; solute-binding domain. CT1 (also called CRTR, CRT) transports creatine. Human CT1 is encoded by the SLC6A8 gene. CT1 is ubiquitously expressed, with highest levels found in skeletal muscle and kidney. Creatine is absorbed from food or synthesized from arginine and plays an important role in energy metabolism. Deficiency in human CT1 leads to X-linked cerebral creatine transporter deficiency. In males, this disorder is characterized by language and speech delays, autistic-like behavior, seizures in about 50% of cases, and can also involve midfacial hypoplasia, and short stature. In females, it is characterized by mild cognitive impairment with behavior and learning problems. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
