identifier: CDD:cd14772
label: TrHb2_Bs-trHb-like_O
definition: >-
  Truncated hemoglobins, group 2 (O); Bacillus subtilis TrHb like. The M- and S families exhibit the canonical secondary structure of hemoglobins, a 3-over-3 alpha-helical sandwich structure (3/3 Mb-fold), built by eight alpha-helical segments. Truncated hemoglobins (TrHbs, 2/2Hb, or 2/2 globins) or the T family globins adopt a 2-on-2 alpha-helical sandwich structure, resulting from extensive and complex modifications of the canonical 3-on-3 alpha-helical sandwich that are distributed throughout the whole protein molecule. TrHbs are classified into three main groups based on their structural properties and named after Mycobacterium sp. genes glbN, glbO, and glbP: TrHb1s (N), TrHb2s (O) and TrHb3s (P). TrHb2's belonging to this group include monomeric Bacillus subtilis trHb (Bs-trHb), which exhibits an extremely high oxygen affinity, and a dimeric TrHb2 from the thermophilic aerobic spore forming bacterium Geobacillus stearothermophilus(Gs-trHb)
