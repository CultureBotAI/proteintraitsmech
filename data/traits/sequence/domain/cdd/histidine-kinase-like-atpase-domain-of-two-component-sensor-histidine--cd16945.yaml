identifier: CDD:cd16945
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli CreC. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Escherichia coli CreC of the CreC-CreB two-component regulatory system (TCS) involved in catabolic regulation. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), and accessory sensory domain(s) such as HAMP, CACHE or PAS."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli CreC. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Escherichia coli CreC of the CreC-CreB two-component regulatory system (TCS) involved in catabolic regulation. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), and accessory sensory domain(s) such as HAMP, CACHE or PAS. — an NCBI CDD conserved domain (cd16945); members share this curated model.
