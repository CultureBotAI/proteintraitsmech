identifier: CDD:cd03390
label: "PAP2, subfamily similar to human phosphatidic_acid_phosphatase_type_2_domain_containing_1. Most likely membrane-associated phosphatidic acid phosphatases. Plant members of this group are constitutively expressed in many tissues and exhibit both diacylglycerol pyrophosphate phosphatase activity as well as phosphatidate (PA) phosphatase activity, they may have a more generic housekeeping role in lipid metabolism."
definition: >-
  PAP2, subfamily similar to human phosphatidic_acid_phosphatase_type_2_domain_containing_1. Most likely membrane-associated phosphatidic acid phosphatases. Plant members of this group are constitutively expressed in many tissues and exhibit both diacylglycerol pyrophosphate phosphatase activity as well as phosphatidate (PA) phosphatase activity, they may have a more generic housekeeping role in lipid metabolism. — an NCBI CDD conserved domain (cd03390); members share this curated model.
