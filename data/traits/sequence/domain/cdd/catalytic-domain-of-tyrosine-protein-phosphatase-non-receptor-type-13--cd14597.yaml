identifier: CDD:cd14597
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 13. Tyrosine-protein phosphatase non-receptor type 13 (PTPN13, also known as PTPL1) belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Human PTPN13 is an important regulator of tumor aggressiveness. It regulates breast cancer cell aggressiveness through direct inactivation of Src kinase. In hepatocellular carcinoma, PTPN13 is a tumor suppressor. PTPN13 contains a FERM domain, five PDZ domains, and a C-terminal catalytic PTP domain. With its PDZ domains, PTPN13 has numerous interacting partners that can actively participate in the regulation of its phosphatase activity or can permit direct or indirect recruitment of tyrosine phosphorylated substrates. Its FERM domain is necessary for localization to the membrane."
definition: >-
  catalytic domain of tyrosine-protein phosphatase non-receptor type 13. Tyrosine-protein phosphatase non-receptor type 13 (PTPN13, also known as PTPL1) belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Human PTPN13 is an important regulator of tumor aggressiveness. It regulates breast cancer cell aggressiveness through direct inactivation of Src kinase. In hepatocellular carcinoma, PTPN13 is a tumor suppressor. PTPN13 contains a FERM domain, five PDZ domains, and a C-terminal catalytic PTP domain. With its PDZ domains, PTPN13 has numerous interacting partners that can actively participate in the regulation of its phosphatase activity or can permit direct or indirect recruitment of tyrosine phosphorylated substrates. Its FERM domain is necessary for localization to the membrane. — an NCBI CDD conserved domain (cd14597); members share this curated model.
