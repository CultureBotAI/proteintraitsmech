label: "ligand binding domain of the group II metabotropic glutamate receptor. Ligand binding domain of the group II metabotropic glutamate receptor, a family that contains mGlu2R and mGlu3R, all of which inhibit adenylyl cyclase. The metabotropic glutamate receptor is a member of the family C of G-protein-coupled receptors that transduce extracellular signals into G-protein activation and ultimately into intracellular responses. The mGluRs are classified into three groups which comprise eight subtypes"
definition: >-
  ligand binding domain of the group II metabotropic glutamate receptor. Ligand binding domain of the group II metabotropic glutamate receptor, a family that contains mGlu2R and mGlu3R, all of which inhibit adenylyl cyclase. The metabotropic glutamate receptor is a member of the family C of G-protein-coupled receptors that transduce extracellular signals into G-protein activation and ultimately into intracellular responses. The mGluRs are classified into three groups which comprise eight subtypes — an NCBI CDD conserved domain (cd06375); members share this curated model.
