identifier: CDD:cd12274
label: "RNA recognition motif 2 (RRM2) found in vertebrate putative RNA exonuclease NEF-sp. This subfamily corresponds to the RRM2 of NEF-sp., including uncharacterized putative RNA exonuclease NEF-sp found in vertebrates. Although its cellular functions remains unclear, NEF-sp contains an exonuclease domain and two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), suggesting it may possess both exonuclease and RNA-binding activities."
definition: >-
  RNA recognition motif 2 (RRM2) found in vertebrate putative RNA exonuclease NEF-sp. This subfamily corresponds to the RRM2 of NEF-sp., including uncharacterized putative RNA exonuclease NEF-sp found in vertebrates. Although its cellular functions remains unclear, NEF-sp contains an exonuclease domain and two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), suggesting it may possess both exonuclease and RNA-binding activities. — an NCBI CDD conserved domain (cd12274); members share this curated model.
