identifier: CDD:cd19722
label: bHLH_TS_NeuroD6_ATOH2
definition: >-
  basic helix-loop-helix (bHLH) domain found in neurogenic differentiation factor 6 (NeuroD6) and similar proteins. NeuroD6, also termed Class A basic helix-loop-helix protein 2 (bHLHa2), or protein atonal homolog 2 (ATH-2), or Atoh2, or Math2, or Nex1, is a neurogenic bHLH transcription factor involved in neuronal development, differentiation, and survival in Alzheimer's disease (AD) brains of both cohorts. It plays an integrative role in coordinating increase in mitochondrial mass with cytoskeletal remodeling, suggesting that it may act as a co-regulator of neuronal differentiation and energy metabolism
