identifier: CDD:cd18880
label: "ADP-ribose pyrophosphatase and similar proteins. ADP-ribose pyrophosphatase (ADPRase; EC 3.6.1.13) catalyzes the hydrolysis of ADP-ribose to AMP and ribose-5-P. Like other members of the NUDIX hydrolase superfamily of enzymes, it is thought to require a divalent cation, such as Mg2+, for its activity. It also contains a 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site. In addition to the NUDIX motif, there are additional conserved amino acid residues, distal from the signature sequence, that correlate with substrate specificity. In humans, there are four distinct ADPRase activities, three putative cytosolic (ADPRase-I, -II, and -Mn) and a single mitochondrial enzyme (ADPRase-m). ADPRase-m is also known as NUDT9. It can be distinugished from the cytosolic ADPRase by a N-terminal target sequence unique to mitochondrial ADPRase. NUDT9 functions as a monomer."
definition: >-
  ADP-ribose pyrophosphatase and similar proteins. ADP-ribose pyrophosphatase (ADPRase; EC 3.6.1.13) catalyzes the hydrolysis of ADP-ribose to AMP and ribose-5-P. Like other members of the NUDIX hydrolase superfamily of enzymes, it is thought to require a divalent cation, such as Mg2+, for its activity. It also contains a 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site. In addition to the NUDIX motif, there are additional conserved amino acid residues, distal from the signature sequence, that correlate with substrate specificity. In humans, there are four distinct ADPRase activities, three putative cytosolic (ADPRase-I, -II, and -Mn) and a single mitochondrial enzyme (ADPRase-m). ADPRase-m is also known as NUDT9. It can be distinugished from the cytosolic ADPRase by a N-terminal target sequence unique to mitochondrial ADPRase. NUDT9 functions as a monomer. — an NCBI CDD conserved domain (cd18880); members share this curated model.
