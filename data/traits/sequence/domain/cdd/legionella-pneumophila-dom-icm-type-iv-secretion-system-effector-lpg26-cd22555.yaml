identifier: CDD:cd22555
label: "Legionella pneumophila Dom/Icm type IV secretion system effector Lpg2603 kinase domain. This model contains the kinase domain of the type IV secretion system effector (T4SS) Lpg2603, an atypical kinase from the bacterial pathogen Legionella pneumophila. Lpg2603 is a remote member of the protein kinase superfamily having structural similarity, but notable differences in primary amino acid sequence. Studies show that Lpg2603 is an active protein kinase that requires the eukaryote-specific host signaling molecule inositol hexakisphosphate (IP6) for activity; IP6 binding rearranges the active site to allow for ATP binding and catalysis. The C-terminal domain of Lpg2603 is a PI4P-binding domain."
definition: >-
  Legionella pneumophila Dom/Icm type IV secretion system effector Lpg2603 kinase domain. This model contains the kinase domain of the type IV secretion system effector (T4SS) Lpg2603, an atypical kinase from the bacterial pathogen Legionella pneumophila. Lpg2603 is a remote member of the protein kinase superfamily having structural similarity, but notable differences in primary amino acid sequence. Studies show that Lpg2603 is an active protein kinase that requires the eukaryote-specific host signaling molecule inositol hexakisphosphate (IP6) for activity; IP6 binding rearranges the active site to allow for ATP binding and catalysis. The C-terminal domain of Lpg2603 is a PI4P-binding domain. — an NCBI CDD conserved domain (cd22555); members share this curated model.
