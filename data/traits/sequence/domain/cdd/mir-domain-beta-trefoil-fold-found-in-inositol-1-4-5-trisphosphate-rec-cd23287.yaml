identifier: CDD:cd23287
label: "MIR domain, beta-trefoil fold, found in inositol 1,4,5-trisphosphate receptor type 1 (ITPR1) and similar proteins. ITPR1, also called IP3 receptor isoform 1 (IP3R 1), or InsP3R1, or type 1 inositol 1,4,5-trisphosphate receptor, or type 1 InsP3 receptor, is an intracellular channel that mediates calcium release from the endoplasmic reticulum following stimulation by inositol 1,4,5-trisphosphate. It is involved in the regulation of epithelial secretion of electrolytes and fluid through the interaction with AHCYL1. It plays a role in endoplasmic reticulum (ER) stress-induced apoptosis. ITPR1 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in inositol 1,4,5-trisphosphate receptor type 1 (ITPR1) and similar proteins. ITPR1, also called IP3 receptor isoform 1 (IP3R 1), or InsP3R1, or type 1 inositol 1,4,5-trisphosphate receptor, or type 1 InsP3 receptor, is an intracellular channel that mediates calcium release from the endoplasmic reticulum following stimulation by inositol 1,4,5-trisphosphate. It is involved in the regulation of epithelial secretion of electrolytes and fluid through the interaction with AHCYL1. It plays a role in endoplasmic reticulum (ER) stress-induced apoptosis. ITPR1 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23287); members share this curated model.
