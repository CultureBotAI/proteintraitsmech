identifier: CDD:cd07635
label: "The Bin/Amphiphysin/Rvs (BAR) domain of GTPase Regulator Associated with Focal adhesion 2. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. GTPase Regulator Associated with Focal adhesion kinase 2 (GRAF2), also called Rho GTPase activating protein 10 (ARHGAP10) or PS-GAP, is a GAP with activity towards Cdc42 and RhoA which regulates caspase-activated p21-activated protein kinase-2 (PAK-2p34). GRAF2 interacts with PAK-2p34, leading to its stabilization and decrease of cell death. It is highly expressed in skeletal muscle and also interacts with PKNbeta, which is a target of Rho. GRAF2 contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, a Rho GAP domain, and a C-terminal SH3 domain. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. The BAR domain of the related protein GRAF directly interacts with its Rho GAP domain and inhibits its activity. Autoinhibited GRAF is capable of binding membranes and tubulating liposomes, showing that the membrane-tubulation and GAP-inhibitory functions of the BAR domain can occur simultaneously."
definition: >-
  The Bin/Amphiphysin/Rvs (BAR) domain of GTPase Regulator Associated with Focal adhesion 2. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. GTPase Regulator Associated with Focal adhesion kinase 2 (GRAF2), also called Rho GTPase activating protein 10 (ARHGAP10) or PS-GAP, is a GAP with activity towards Cdc42 and RhoA which regulates caspase-activated p21-activated protein kinase-2 (PAK-2p34). GRAF2 interacts with PAK-2p34, leading to its stabilization and decrease of cell death. It is highly expressed in skeletal muscle and also interacts with PKNbeta, which is a target of Rho. GRAF2 contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, a Rho GAP domain, and a C-terminal SH3 domain. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. The BAR domain of the related protein GRAF directly interacts with its Rho GAP domain and inhibits its activity. Autoinhibited GRAF is capable of binding membranes and tubulating liposomes, showing that the membrane-tubulation and GAP-inhibitory functions of the BAR domain can occur simultaneously. — an NCBI CDD conserved domain (cd07635); members share this curated model.
