identifier: CDD:cd17447
label: "Solute carrier family 22 member 7 (also called Organic anion transporter 2) of the Major Facilitator Superfamily of transporters. Solute carrier family 22 member 7 (SLC22A7), also called organic anion transporter 2 (OAT2) mediates sodium-independent transport of a variety of organic anions including prostaglandin E2, prostaglandin F2, tetracycline, bumetanide, estrone sulfate, glutarate, dehydroepiandrosterone sulfate, allopurinol, 5-fluorouracil, paclitaxel, L-ascorbic acid, salicylate, ethotrexate, and alpha-ketoglutarate. It also plays a role in renal uric acid uptake from blood as a first step of tubular secretion. OAT2 belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS)of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier family 22 member 7 (also called Organic anion transporter 2) of the Major Facilitator Superfamily of transporters. Solute carrier family 22 member 7 (SLC22A7), also called organic anion transporter 2 (OAT2) mediates sodium-independent transport of a variety of organic anions including prostaglandin E2, prostaglandin F2, tetracycline, bumetanide, estrone sulfate, glutarate, dehydroepiandrosterone sulfate, allopurinol, 5-fluorouracil, paclitaxel, L-ascorbic acid, salicylate, ethotrexate, and alpha-ketoglutarate. It also plays a role in renal uric acid uptake from blood as a first step of tubular secretion. OAT2 belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS)of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17447); members share this curated model.
