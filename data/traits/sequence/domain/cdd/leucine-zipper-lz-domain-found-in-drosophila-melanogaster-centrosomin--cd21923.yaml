identifier: CDD:cd21923
label: LZ_cnn
definition: >-
  leucine zipper (LZ) domain found in Drosophila melanogaster centrosomin (cnn)and similar proteins. Centrosomin (cnn), also called protein arrow, is a core component of the centrosome throughout spermatogenesis. It forms a phosphorylation-dependent scaffold that recruits proteins to the mitotic centrosome. It may participate in mitotic spindle assembly and the mechanics of morphogenesis through an interaction with microtubules, either directly or indirectly. It is a target of several homeotic genes. Cnn contains a phospho-regulated multimerization (PReM) domain that consists of the leucine zipper motif (LZ) and additional C-terminal and N-terminal extensions that are predicted to be largely helical. The multimerization of the phosphorylated PReM domain is crucial for cnn-scaffold assembly. The model corresponds to the LZ conserved region of cnn
