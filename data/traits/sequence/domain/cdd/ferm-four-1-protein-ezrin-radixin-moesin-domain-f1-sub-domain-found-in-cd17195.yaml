identifier: CDD:cd17195
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 13 (PTPN13). PTPN13, also termed Fas-associated protein-tyrosine phosphatase 1 (FAP-1), or PTP-BAS, or protein-tyrosine phosphatase 1E (PTP-E1 or PTPE1), or protein-tyrosine phosphatase PTPL1, belongs to the non-transmembrane FERM-containing protein-tyrosine phosphatase (PTP) subfamily characterized by a KIND domain, a FERM domain, five PDZ domains, and a C-terminal PTP catalytic domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). PTPN13 interacts with a variety of ligands, suggests an important role as a scaffolding protein. It is also involved in the regulation of apoptosis, cytokinesis and cell cycle progression."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 13 (PTPN13). PTPN13, also termed Fas-associated protein-tyrosine phosphatase 1 (FAP-1), or PTP-BAS, or protein-tyrosine phosphatase 1E (PTP-E1 or PTPE1), or protein-tyrosine phosphatase PTPL1, belongs to the non-transmembrane FERM-containing protein-tyrosine phosphatase (PTP) subfamily characterized by a KIND domain, a FERM domain, five PDZ domains, and a C-terminal PTP catalytic domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). PTPN13 interacts with a variety of ligands, suggests an important role as a scaffolding protein. It is also involved in the regulation of apoptosis, cytokinesis and cell cycle progression. — an NCBI CDD conserved domain (cd17195); members share this curated model.
