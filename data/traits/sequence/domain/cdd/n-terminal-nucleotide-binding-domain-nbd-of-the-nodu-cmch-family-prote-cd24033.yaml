identifier: CDD:cd24033
label: "N-terminal nucleotide-binding domain (NBD) of the NodU/CmcH family proteins. The NodU/CmcH family includes NodU from Rhizobium, CmcH from Amycolatopsis lactamdurans, the bifunctional carbamoyltransferase TobZ from Streptoalloteichus tenebrarius, NovN from Streptomyces niveus and NolNO from Sinorhizobium fredii. NodU is a Rhizobium nodulation protein involved in the synthesis of nodulation factors has 6-O-carbamoyltransferase-like activity. 3'-hydroxymethylcephem-O-carbamoyltransferase CmcH (EC 2.1.3.7), also called 3'-hydroxymethylcephem-O-CASE (CCT), is involved in cephamycin (antibiotic) biosynthesis and has 3-hydroxymethylcephem carbamoyltransferase activity. nebramycin 5' synthase TobZ (EC 6.1.2.2), also called kanamycin A carbamoyltransferase, or tobramycin carbamoyltransferase, functions as an ATP carbamoyltransferase and tobramycin carbamoyltransferase. Novobiocin biosynthesis protein NovN (EC 2.1.3.12), also called decarbamoylnovobiocin carbamoyltransferase, acts as a carbamoyltransferase that mediates 3'-carbamoylation of the noviosyl ring to produce novobiocin, the final step in the novobiocin biosynthesis pathway. Nodulation protein NolNO (EC 2.1.3.-), also called NolO or Y4hD, is involved in the O-carbamoylation of nod factors. Members in this family consist of two domains. The model corresponds to the N-terminal Kae1-like domain."
definition: >-
  N-terminal nucleotide-binding domain (NBD) of the NodU/CmcH family proteins. The NodU/CmcH family includes NodU from Rhizobium, CmcH from Amycolatopsis lactamdurans, the bifunctional carbamoyltransferase TobZ from Streptoalloteichus tenebrarius, NovN from Streptomyces niveus and NolNO from Sinorhizobium fredii. NodU is a Rhizobium nodulation protein involved in the synthesis of nodulation factors has 6-O-carbamoyltransferase-like activity. 3'-hydroxymethylcephem-O-carbamoyltransferase CmcH (EC 2.1.3.7), also called 3'-hydroxymethylcephem-O-CASE (CCT), is involved in cephamycin (antibiotic) biosynthesis and has 3-hydroxymethylcephem carbamoyltransferase activity. nebramycin 5' synthase TobZ (EC 6.1.2.2), also called kanamycin A carbamoyltransferase, or tobramycin carbamoyltransferase, functions as an ATP carbamoyltransferase and tobramycin carbamoyltransferase. Novobiocin biosynthesis protein NovN (EC 2.1.3.12), also called decarbamoylnovobiocin carbamoyltransferase, acts as a carbamoyltransferase that mediates 3'-carbamoylation of the noviosyl ring to produce novobiocin, the final step in the novobiocin biosynthesis pathway. Nodulation protein NolNO (EC 2.1.3.-), also called NolO or Y4hD, is involved in the O-carbamoylation of nod factors. Members in this family consist of two domains. The model corresponds to the N-terminal Kae1-like domain. — an NCBI CDD conserved domain (cd24033); members share this curated model.
