identifier: CDD:cd22064
label: "Wiskott Aldrich syndrome homology region 2 (WH2 motif) in WAS/WASL-interacting protein (WIP). This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in WAS/WASL-interacting protein family (WIPF, also known as WASP-interacting protein or WIP). Human WIP protein is proline rich and has high sequence similarity to yeast protein verprolin (included in this model). WIP forms complexes with WASP/N-WASP and modulates their function in vivo. It is involved in the regulation of endocytosis and participates in several cellular processes, some of which are relevant in cancer and may be dependent on different oncogenic stimuli. WIP interacts directly with mammalian actin-binding protein-1 (mABP1) via the SH3 domain during platelet-derived growth factor (PDGF)-mediated dorsal ruffle formation. WIP family includes members 1 (WAS/WASL-interacting protein family member 1) or WIPF1), 2 (WIPF2) and 3 (WIPF3). Aberrant expression of WIPF1 contributes to the invasion and metastasis of several malignancies such breast cancer, glioma and colorectal cancer; it has been identified as an oncoprotein in human pancreatic ductal adenocarcinoma (PDAC) and is associated with poor survival. WIPF2 may be an important regulator of the actin cytoskeleton. WIPF2 binds to N-WASP, regulating actin dynamics close to the plasma membrane; N-WASP in turn controls the second phase insulin secretion through the regulation of the Arp2/3 complex. WIPF3, along with LIPA (lysosomal acid lipase A), are expressed in microphages and are involved in pathological abdominal aortic aneurysm (AAA), a serious condition of the aorta. In yeast, verprolin is involved in cytoskeletal organization and cellular growth. It may exert its effects on the cytoskeleton directly, or indirectly via proline-binding proteins, such as profilin, or via proteins possessing SH3 domains."
definition: >-
  Wiskott Aldrich syndrome homology region 2 (WH2 motif) in WAS/WASL-interacting protein (WIP). This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in WAS/WASL-interacting protein family (WIPF, also known as WASP-interacting protein or WIP). Human WIP protein is proline rich and has high sequence similarity to yeast protein verprolin (included in this model). WIP forms complexes with WASP/N-WASP and modulates their function in vivo. It is involved in the regulation of endocytosis and participates in several cellular processes, some of which are relevant in cancer and may be dependent on different oncogenic stimuli. WIP interacts directly with mammalian actin-binding protein-1 (mABP1) via the SH3 domain during platelet-derived growth factor (PDGF)-mediated dorsal ruffle formation. WIP family includes members 1 (WAS/WASL-interacting protein family member 1) or WIPF1), 2 (WIPF2) and 3 (WIPF3). Aberrant expression of WIPF1 contributes to the invasion and metastasis of several malignancies such breast cancer, glioma and colorectal cancer; it has been identified as an oncoprotein in human pancreatic ductal adenocarcinoma (PDAC) and is associated with poor survival. WIPF2 may be an important regulator of the actin cytoskeleton. WIPF2 binds to N-WASP, regulating actin dynamics close to the plasma membrane; N-WASP in turn controls the second phase insulin secretion through the regulation of the Arp2/3 complex. WIPF3, along with LIPA (lysosomal acid lipase A), are expressed in microphages and are involved in pathological abdominal aortic aneurysm (AAA), a serious condition of the aorta. In yeast, verprolin is involved in cytoskeletal organization and cellular growth. It may exert its effects on the cytoskeleton directly, or indirectly via proline-binding proteins, such as profilin, or via proteins possessing SH3 domains. — an NCBI CDD conserved domain (cd22064); members share this curated model.
