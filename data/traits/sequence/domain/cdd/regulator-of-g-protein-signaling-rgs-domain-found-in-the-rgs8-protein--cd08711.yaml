identifier: CDD:cd08711
label: "Regulator of G protein signaling (RGS) domain found in the RGS8 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS8 protein. RGS8 is a member of R4/RGS subfamily of RGS family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G-alpha subunit which leads to G protein deactivation and promotes desensitization. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS8 is involved in G-protein-gated potassium channels regulation and predominantly expressed in the brain. RGS8 also is selectively expressed in the hematopoietic system (NK cells)."
definition: >-
