identifier: CDD:cd22121
label: "F-box domain found in F-box/LRR-repeat protein 8 (FBXL8) and similar proteins. FBXL8, also called F-box and leucine-rich repeat protein 8, or F-box protein FBL8, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 8 (FBXL8) and similar proteins. FBXL8, also called F-box and leucine-rich repeat protein 8, or F-box protein FBL8, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22121); members share this curated model.
