identifier: CDD:cd14563
label: "N-terminal protein tyrosine phosphatase-like domain of auxilin. Auxilin, also called auxilin-1 or DnaJ homolog subfamily C member 6 (DNAJC6), is a J-domain containing protein that recruits the ATP-dependent chaperone Hsc70 to newly budded clathrin-coated vesicles and promotes uncoating of clathrin-coated vesicles, driving the clathrin assembly#disassembly cycle. Mutations in the DNAJC6 gene, encoding auxilin, are associated with early-onset Parkinson's disease. Auxilin contains an N-terminal protein tyrosine phosphatase (PTP)-like domain similar to the PTP-like domain of PTEN, a phosphoinositide 3-phosphatase, and a C-terminal region with clathrin-binding and J domains."
definition: >-
  N-terminal protein tyrosine phosphatase-like domain of auxilin. Auxilin, also called auxilin-1 or DnaJ homolog subfamily C member 6 (DNAJC6), is a J-domain containing protein that recruits the ATP-dependent chaperone Hsc70 to newly budded clathrin-coated vesicles and promotes uncoating of clathrin-coated vesicles, driving the clathrin assembly#disassembly cycle. Mutations in the DNAJC6 gene, encoding auxilin, are associated with early-onset Parkinson's disease. Auxilin contains an N-terminal protein tyrosine phosphatase (PTP)-like domain similar to the PTP-like domain of PTEN, a phosphoinositide 3-phosphatase, and a C-terminal region with clathrin-binding and J domains. — an NCBI CDD conserved domain (cd14563); members share this curated model.
