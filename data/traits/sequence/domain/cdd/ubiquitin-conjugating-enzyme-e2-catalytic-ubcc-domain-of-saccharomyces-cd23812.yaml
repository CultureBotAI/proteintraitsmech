identifier: CDD:cd23812
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of Saccharomyces cerevisiae Peroxin-4 (PEX4) protein and related proteins. Saccharomyces cerevisiae PEX4 (EC 2.3.2.23), also called ubiquitin-conjugating enzyme E2-21 kDa, UBC10, or PAS2, acts as a ubiquitin-conjugating enzyme that catalyzes the covalent attachment of ubiquitin to other proteins. It is essential for peroxisome biogenesis and is required for UBC4-independent ubiquitination of PEX5. This subfamily also includes Arabidopsis thaliana PEX4 (also known as UBC21, EC 2.3.2.23) that is required for peroxisome biogenesis. It is necessary for the developmental elimination of obsolete peroxisome matrix proteins. It may be involved in the ubiquitination of PEX5, targeting it for recycling."
definition: >-
