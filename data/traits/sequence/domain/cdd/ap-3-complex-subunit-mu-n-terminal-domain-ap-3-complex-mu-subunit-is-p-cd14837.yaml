identifier: CDD:cd14837
label: "AP-3 complex subunit mu N-terminal domain. AP-3 complex mu subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large delta-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. AP-3 binds the coat protein clathrin and the phospholipid  PI(3)P and it is localized in the endosome. The mu subunit is comprised of an N-terminal longin domain followed by a C-terminal domain which is involved in the binding of the Y-X-X-Phi sorting signal."
definition: >-
  AP-3 complex subunit mu N-terminal domain. AP-3 complex mu subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large delta-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. AP-3 binds the coat protein clathrin and the phospholipid PI(3)P and it is localized in the endosome. The mu subunit is comprised of an N-terminal longin domain followed by a C-terminal domain which is involved in the binding of the Y-X-X-Phi sorting signal. — an NCBI CDD conserved domain (cd14837); members share this curated model.
