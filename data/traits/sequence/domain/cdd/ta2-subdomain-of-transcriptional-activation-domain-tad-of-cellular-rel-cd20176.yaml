identifier: CDD:cd20176
label: Rel_TAD_TA2
definition: >-
  TA2 subdomain of transcriptional activation domain (TAD) of cellular Rel/NF-kB. The inducible transcription factor NF-kB has a major role in immune response. NF-kB family in vertebrates has five members, RelA (also known as p65), RelB, c-Rel, p50, and p52. All of the family members have a structurally conserved N-terminal rel homology region (RHR) but only RelA, RelB and c-Rel have the transcriptional activation domain (TAD), which is important for the transcriptional regulation of the NF-kB regulated genes. TAD is divided into two regions, TA1 and TA2
