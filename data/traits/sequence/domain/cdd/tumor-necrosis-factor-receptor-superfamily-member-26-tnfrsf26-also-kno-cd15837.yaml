identifier: CDD:cd15837
label: "Tumor necrosis factor receptor superfamily member 26 (TNFRSF26), also known as tumor necrosis factor receptor homolog 3 (TNFRH3). TNFRSF26 (also known as tumor necrosis factor receptor homolog 3 (TNFRH3) or TNFRSF24) is predominantly expressed in embryos and lymphoid cell types, along with its closely related TNFRSF22 and TNFRSF23 orthologs, and is developmentally regulated. Unlike TNFRSF22/23, TNFRSF26 does not serve as a TRAIL decoy receptor; it remains an orphan receptor."
definition: >-
  Tumor necrosis factor receptor superfamily member 26 (TNFRSF26), also known as tumor necrosis factor receptor homolog 3 (TNFRH3). TNFRSF26 (also known as tumor necrosis factor receptor homolog 3 (TNFRH3) or TNFRSF24) is predominantly expressed in embryos and lymphoid cell types, along with its closely related TNFRSF22 and TNFRSF23 orthologs, and is developmentally regulated. Unlike TNFRSF22/23, TNFRSF26 does not serve as a TRAIL decoy receptor; it remains an orphan receptor. — an NCBI CDD conserved domain (cd15837); members share this curated model.
