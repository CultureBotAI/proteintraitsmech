identifier: CDD:cd12816
label: "Conidiospore surface protein-like proteins, left-handed beta-roll. This poorly-defined group group contains a member identified as the Conidiospore Surface Protein of Trichoderma. This multi-domain protein accumulates during photo-induced sporulation. This domain resemble a group of left-handed beta-roll domains that include such proteins as cell surface adhesion molecules that contribute to bacterial virulence and an ice-binding protein."
definition: >-
  Conidiospore surface protein-like proteins, left-handed beta-roll. This poorly-defined group group contains a member identified as the Conidiospore Surface Protein of Trichoderma. This multi-domain protein accumulates during photo-induced sporulation. This domain resemble a group of left-handed beta-roll domains that include such proteins as cell surface adhesion molecules that contribute to bacterial virulence and an ice-binding protein. — an NCBI CDD conserved domain (cd12816); members share this curated model.
