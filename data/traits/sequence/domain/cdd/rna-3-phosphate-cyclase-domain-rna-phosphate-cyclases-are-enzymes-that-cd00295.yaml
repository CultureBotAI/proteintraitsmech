identifier: CDD:cd00295
label: "RNA 3' phosphate cyclase domain -  RNA phosphate cyclases are enzymes that catalyze the ATP-dependent conversion of 3'-phosphate at the end of RNA into 2', 3'-cyclic phosphodiester bond. The enzymes are conserved in eucaryotes, bacteria and archaea. The exact biological role of this enzyme is unknown, but it has been proposed that it is likely to function in cellular RNA metabolism and processing. RNA phosphate cyclase has been characterized in human (with at least three isozymes), and E. coli, and it seems to be taxonomically widespread. The crystal structure of RNA phospate cyclase shows that it consists of two domains. The larger domain contains three repeats of a fold originally identified in the bacterial translation initiation factor IF3."
definition: >-
  RNA 3' phosphate cyclase domain - RNA phosphate cyclases are enzymes that catalyze the ATP-dependent conversion of 3'-phosphate at the end of RNA into 2', 3'-cyclic phosphodiester bond. The enzymes are conserved in eucaryotes, bacteria and archaea. The exact biological role of this enzyme is unknown, but it has been proposed that it is likely to function in cellular RNA metabolism and processing. RNA phosphate cyclase has been characterized in human (with at least three isozymes), and E. coli, and it seems to be taxonomically widespread. The crystal structure of RNA phospate cyclase shows that it consists of two domains. The larger domain contains three repeats of a fold originally identified in the bacterial translation initiation factor IF3. — an NCBI CDD conserved domain (cd00295); members share this curated model.
