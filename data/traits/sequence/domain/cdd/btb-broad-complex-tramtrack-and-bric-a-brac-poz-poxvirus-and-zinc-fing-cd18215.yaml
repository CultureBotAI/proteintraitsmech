identifier: CDD:cd18215
label: BTB_POZ_ZBTB27-like
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in B-cell lymphoma 6 proteins, BCL-6 and BCL-6B. This family includes B-cell lymphoma 6 proteins, BCL-6 and BCL-6B. BCL-6 is a transcriptional repressor mainly required for germinal center (GC) formation and antibody affinity maturation, which have different mechanisms of action specific to the lineage and biological functions. BCL-6B is a sequence-specific transcriptional repressor in association with BCL-6. It may function in a narrow stage or be related to some events in the early B-cell development. Family members contain a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
