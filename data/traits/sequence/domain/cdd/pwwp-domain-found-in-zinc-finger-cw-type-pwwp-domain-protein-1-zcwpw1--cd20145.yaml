identifier: CDD:cd20145
label: "PWWP domain found in zinc finger CW-type PWWP domain protein 1 (ZCWPW1) and similar proteins. ZCWPW1 is a histone H3K4me3 reader. It is associated with late-onset Alzheimer's disease (LOAD). In addition to the PWWP domain, ZCWPW1 contains a zinc finger CW (zf-CW) domain that is a histone modification reader for the histone H3 tail with trimethylated K4. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  PWWP domain found in zinc finger CW-type PWWP domain protein 1 (ZCWPW1) and similar proteins. ZCWPW1 is a histone H3K4me3 reader. It is associated with late-onset Alzheimer's disease (LOAD). In addition to the PWWP domain, ZCWPW1 contains a zinc finger CW (zf-CW) domain that is a histone modification reader for the histone H3 tail with trimethylated K4. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd20145); members share this curated model.
