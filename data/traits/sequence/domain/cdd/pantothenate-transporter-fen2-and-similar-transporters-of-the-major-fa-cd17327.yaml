identifier: CDD:cd17327
label: "Pantothenate transporter FEN2 and similar transporters of the Major Facilitator Superfamily. This family is composed of Saccharomyces cerevisiae pantothenate transporter FEN2 (or fenpropimorph resistance protein 2) and similar proteins from fungi and bacteria including fungal vitamin H transporter, allantoate permease, and high-affinity nicotinic acid transporter, as well as Pseudomonas putida phthalate transporter and nicotinate degradation protein T (nicT). These proteins are involved in the uptake into the cell of specific substrates such as pathothenate, biotin, allantoate, and nicotinic acid, among others. The FEN2-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Pantothenate transporter FEN2 and similar transporters of the Major Facilitator Superfamily. This family is composed of Saccharomyces cerevisiae pantothenate transporter FEN2 (or fenpropimorph resistance protein 2) and similar proteins from fungi and bacteria including fungal vitamin H transporter, allantoate permease, and high-affinity nicotinic acid transporter, as well as Pseudomonas putida phthalate transporter and nicotinate degradation protein T (nicT). These proteins are involved in the uptake into the cell of specific substrates such as pathothenate, biotin, allantoate, and nicotinic acid, among others. The FEN2-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17327); members share this curated model.
