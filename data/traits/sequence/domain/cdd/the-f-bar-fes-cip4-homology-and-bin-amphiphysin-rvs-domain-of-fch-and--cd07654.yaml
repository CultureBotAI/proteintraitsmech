identifier: CDD:cd07654
label: "The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of FCH and double SH3 domains proteins (FCHSD). F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. This subfamily is composed of FCH and double SH3 domain (FCHSD) proteins, so named as they contain an N-terminal F-BAR domain and two SH3 domains at the C-terminus. Vertebrates harbor two subfamily members, FCHSD1 and FCHSD2, which have been characterized only in silico. Their biological function is still unknown. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules."
definition: >-
  The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of FCH and double SH3 domains proteins (FCHSD). F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. This subfamily is composed of FCH and double SH3 domain (FCHSD) proteins, so named as they contain an N-terminal F-BAR domain and two SH3 domains at the C-terminus. Vertebrates harbor two subfamily members, FCHSD1 and FCHSD2, which have been characterized only in silico. Their biological function is still unknown. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules. — an NCBI CDD conserved domain (cd07654); members share this curated model.
