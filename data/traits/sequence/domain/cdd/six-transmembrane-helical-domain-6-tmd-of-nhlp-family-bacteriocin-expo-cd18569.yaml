identifier: CDD:cd18569
label: "Six-transmembrane helical domain (6-TMD) of NHLP family bacteriocin export ABC transporters. This group includes the six-transmembrane helical domain (6-TMD) of the ABC subunit of NHLM (Nitrile Hydratase Leader Microcin) bacteriocin system, which contains ABC transporter (permease/ATP-binding fused protein) with a peptidase domain. ABC-transporter proteins in this group are predicted to be a subunit of a bacteriocin processing and export system, and they carry a proteolytic peptidase domain in their N-termini, termed as C39, which cleaves a double glycine (GG) motif-containing signal peptide from substrates before secretion."
definition: >-
  Six-transmembrane helical domain (6-TMD) of NHLP family bacteriocin export ABC transporters. This group includes the six-transmembrane helical domain (6-TMD) of the ABC subunit of NHLM (Nitrile Hydratase Leader Microcin) bacteriocin system, which contains ABC transporter (permease/ATP-binding fused protein) with a peptidase domain. ABC-transporter proteins in this group are predicted to be a subunit of a bacteriocin processing and export system, and they carry a proteolytic peptidase domain in their N-termini, termed as C39, which cleaves a double glycine (GG) motif-containing signal peptide from substrates before secretion. — an NCBI CDD conserved domain (cd18569); members share this curated model.
