identifier: CDD:cd16487
label: "Modified RING finger, H2 subclass (C3DHC3-type), found in zinc finger protein-like 1 (ZFPL1) and similar proteins. ZFPL1, also known as zinc finger protein MCG4, is a novel mitotic Golgi phosphoprotein required for cis-Golgi integrity and efficient endoplasmic reticulum (ER)-to-Golgi transport via directly interacting with the cis-Golgi matrix protein GM130. ZFPL1 is a widely expressed integral membrane protein with two predicted zinc fingers at its N-terminus. One is a novel type of zinc finger, and the other is a modified RING-H2 finger that lacks the fourth zinc-binding residue of the consensus C3H2C3-type RING-H2 finger. It also contains a bipartite nuclear localization signal (NLS), and a leucine zipper at the C-terminus."
definition: >-
  Modified RING finger, H2 subclass (C3DHC3-type), found in zinc finger protein-like 1 (ZFPL1) and similar proteins. ZFPL1, also known as zinc finger protein MCG4, is a novel mitotic Golgi phosphoprotein required for cis-Golgi integrity and efficient endoplasmic reticulum (ER)-to-Golgi transport via directly interacting with the cis-Golgi matrix protein GM130. ZFPL1 is a widely expressed integral membrane protein with two predicted zinc fingers at its N-terminus. One is a novel type of zinc finger, and the other is a modified RING-H2 finger that lacks the fourth zinc-binding residue of the consensus C3H2C3-type RING-H2 finger. It also contains a bipartite nuclear localization signal (NLS), and a leucine zipper at the C-terminus. — an NCBI CDD conserved domain (cd16487); members share this curated model.
