identifier: CDD:cd13743
label: "PRY/SPRY domain in tripartite motif-binding protein 50 (TRIM50). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM50. TRIM50, an E3 ubiquitin ligase, is deleted in Williams-Beuren (WBS) syndrome, a multi-system neurodevelopmental disorder caused by the deletion of contiguous genes at chromosome region 7q11.23. It is specifically expressed in gastric parietal cells and may play an essential role in tubulovesicular dynamics. It also interacts with and increases the level of p62, a multifunctional adaptor protein that is implicated in various cellular processes such as the autophagy clearance of polyubiquitinated protein aggregates."
definition: >-
