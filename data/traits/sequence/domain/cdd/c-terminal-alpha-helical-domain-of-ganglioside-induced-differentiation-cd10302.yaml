identifier: CDD:cd10302
label: "C-terminal, alpha helical domain of Ganglioside-induced differentiation-associated protein 1-like 1. Glutathione S-transferase (GST) C-terminal domain family, Ganglioside-induced differentiation-associated protein 1-like 1 (GDAP1L1) subfamily; GDAP1L1 is a paralogue of GDAP1 with about 56% sequence identity and 70% similarity. It's function is unknown. Like GDAP1, it does not exhibit GST activity using standard substrates. GDAP1 was originally identified as a highly expressed gene at the differentiated stage of GD3 synthase-transfected cells. More recently, mutations in GDAP1 have been reported to cause both axonal and demyelinating autosomal-recessive Charcot-Marie-Tooth (CMT) type 4A neuropathy. CMT is characterized by slow and progressive weakness and atrophy of muscles. Sequence analysis of GDAP1 shows similarities and differences with GSTs; it appears to contain both N-terminal thioredoxin-fold and C-terminal alpha helical domains of GSTs, however, it also contains additional C-terminal transmembrane domains unlike GSTs. GDAP1 is mainly expressed in neuronal cells and is localized in the mitochondria through its transmembrane domains."
definition: >-
  C-terminal, alpha helical domain of Ganglioside-induced differentiation-associated protein 1-like 1. Glutathione S-transferase (GST) C-terminal domain family, Ganglioside-induced differentiation-associated protein 1-like 1 (GDAP1L1) subfamily; GDAP1L1 is a paralogue of GDAP1 with about 56% sequence identity and 70% similarity. It's function is unknown. Like GDAP1, it does not exhibit GST activity using standard substrates. GDAP1 was originally identified as a highly expressed gene at the differentiated stage of GD3 synthase-transfected cells. More recently, mutations in GDAP1 have been reported to cause both axonal and demyelinating autosomal-recessive Charcot-Marie-Tooth (CMT) type 4A neuropathy. CMT is characterized by slow and progressive weakness and atrophy of muscles. Sequence analysis of GDAP1 shows similarities and differences with GSTs; it appears to contain both N-terminal thioredoxin-fold and C-terminal alpha helical domains of GSTs, however, it also contains additional C-terminal transmembrane domains unlike GSTs. GDAP1 is mainly expressed in neuronal cells and is localized in the mitochondria through its transmembrane domains. — an NCBI CDD conserved domain (cd10302); members share this curated model.
