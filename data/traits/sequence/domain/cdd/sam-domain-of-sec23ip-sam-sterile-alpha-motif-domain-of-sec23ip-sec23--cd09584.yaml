identifier: CDD:cd09584
label: "SAM domain of sec23ip. SAM (sterile alpha motif) domain of Sec23ip (Sec23 interacting protein) group is a potential protein-protein interaction domain. Sec23ip proteins (also known as p125) contain an N-terminal proline-rich region, a central region containing a SAM domain and a C-terminal region with a predicted metal-binding domain. Sec23ip interacts with Sec23p/Sec24p part of COPII-coated vesicles complex involved in protein transport from the ER to the Golgi apparatus. The proline-rich region plays an essential role in this interaction. Overexpression of Sec23ip leads to disorganization of ER/Golgi intermediate compartment."
definition: >-
  SAM domain of sec23ip. SAM (sterile alpha motif) domain of Sec23ip (Sec23 interacting protein) group is a potential protein-protein interaction domain. Sec23ip proteins (also known as p125) contain an N-terminal proline-rich region, a central region containing a SAM domain and a C-terminal region with a predicted metal-binding domain. Sec23ip interacts with Sec23p/Sec24p part of COPII-coated vesicles complex involved in protein transport from the ER to the Golgi apparatus. The proline-rich region plays an essential role in this interaction. Overexpression of Sec23ip leads to disorganization of ER/Golgi intermediate compartment. — an NCBI CDD conserved domain (cd09584); members share this curated model.
