identifier: CDD:cd09001
label: "Glycosyl hydrolase family 43 such as Fibrobacter succinogenes subsp. succinogenes S85 arabinoxylan alpha-L-arabinofuranosidase. This glycosyl hydrolase family 43 (GH43) includes mostly enzymes that have been annotated as having beta-1,4-xylosidase (beta-D-xylosidase; xylan 1,4-beta-xylosidase; EC 3.2.1.37) activity. They are part of an array of hemicellulases that are involved in the final breakdown of plant cell-wall whereby they degrade xylan. They hydrolyze beta-1,4 glycosidic bonds between two xylose units in short xylooligosaccharides. These are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. This subfamily includes the characterized Clostridium stercorarium F-9 beta-xylosidase Xyl43B. It also includes Humicola insolens AXHd3 (HiAXHd3), a GH43 arabinofuranosidase (EC 3.2.1.55) that hydrolyzes O3-linked arabinose of doubly substituted xylans, a feature of the polysaccharide that is recalcitrant to degradation. It possesses an additional C-terminal beta-sandwich domain such that the interface between the domains comprises a xylan binding cleft that houses the active site pocket. The HiAXHd3 active site is tuned to hydrolyze arabinofuranosyl or xylosyl linkages, and the topology of the distal regions of the substrate binding surface confers specificity. It also includes Fibrobacter succinogenes subsp. succinogenes S85  arabinoxylan alpha-L-arabinofuranosidase (Axh1;Fisuc_1769;FSU_2269), Paenibacillus sp. E18  alpha-L-arabinofuranosidase (Abf43A), Bifidobacterium adolescentis ATCC 15703  double substituted xylan alpha-1,3-L-specific arabinofuranosidase d3 (AXHd3;AXH-d3;BaAXH-d3;BAD_0301;E-AFAM2), and Chrysosporium lucknowense C1 arabinoxylan hydrolase / double substituted xylan alpha-1,3-L-arabinofuranosidase (Abn7;AXHd). A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller."
definition: >-
  Glycosyl hydrolase family 43 such as Fibrobacter succinogenes subsp. succinogenes S85 arabinoxylan alpha-L-arabinofuranosidase. This glycosyl hydrolase family 43 (GH43) includes mostly enzymes that have been annotated as having beta-1,4-xylosidase (beta-D-xylosidase; xylan 1,4-beta-xylosidase; EC 3.2.1.37) activity. They are part of an array of hemicellulases that are involved in the final breakdown of plant cell-wall whereby they degrade xylan. They hydrolyze beta-1,4 glycosidic bonds between two xylose units in short xylooligosaccharides. These are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. This subfamily includes the characterized Clostridium stercorarium F-9 beta-xylosidase Xyl43B. It also includes Humicola insolens AXHd3 (HiAXHd3), a GH43 arabinofuranosidase (EC 3.2.1.55) that hydrolyzes O3-linked arabinose of doubly substituted xylans, a feature of the polysaccharide that is recalcitrant to degradation. It possesses an additional C-terminal beta-sandwich domain such that the interface between the domains comprises a xylan binding cleft that houses the active site pocket. The HiAXHd3 active site is tuned to hydrolyze arabinofuranosyl or xylosyl linkages, and the topology of the distal regions of the substrate binding surface confers specificity. It also includes Fibrobacter succinogenes subsp. succinogenes S85 arabinoxylan alpha-L-arabinofuranosidase (Axh1;Fisuc_1769;FSU_2269), Paenibacillus sp. E18 alpha-L-arabinofuranosidase (Abf43A), Bifidobacterium adolescentis ATCC 15703 double substituted xylan alpha-1,3-L-specific arabinofuranosidase d3 (AXHd3;AXH-d3;BaAXH-d3;BAD_0301;E-AFAM2), and Chrysosporium lucknowense C1 arabinoxylan hydrolase / double substituted xylan alpha-1,3-L-arabinofuranosidase (Abn7;AXHd). A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. — an NCBI CDD conserved domain (cd09001); members share this curated model.
