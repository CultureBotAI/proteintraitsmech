identifier: CDD:cd08509
label: "The substrate binding domain of a cellulose-binding protein from Thermotoga maritima contains the type 2 periplasmic binding fold. This family represents the substrate-binding domain of a cellulose-binding protein from the hyperthermophilic bacterium Thermotoga maritima (TmCBP) and its closest related proteins. TmCBP binds a variety of lengths of beta-1,4-linked glucose oligomers, ranging from two sugar rings (cellobiose) to five (cellopentose). TmCBP is structurally homologous to domains I and III of the ATP-binding cassette (ABC)-type oligopeptide-binding proteins and thus belongs to the type 2 periplasmic binding fold protein (PBP2) superfamily.  The type 2 periplasmic binding proteins are soluble ligand-binding components of ABC or tripartite ATP-independent transporters and chemotaxis systems. Members of the PBP2 superfamily function in uptake of a variety of metabolites in bacteria such as amino acids, carbohydrate, ions, and polyamines. Ligands are then transported across the cytoplasmic membrane energized by ATP hydrolysis or electrochemical ion gradient. Besides transport proteins, the PBP2 superfamily includes the ligand-binding domains from ionotropic glutamate receptors, LysR-type transcriptional regulators, and unorthodox sensor proteins involved in signal transduction."
definition: >-
  The substrate binding domain of a cellulose-binding protein from Thermotoga maritima contains the type 2 periplasmic binding fold. This family represents the substrate-binding domain of a cellulose-binding protein from the hyperthermophilic bacterium Thermotoga maritima (TmCBP) and its closest related proteins. TmCBP binds a variety of lengths of beta-1,4-linked glucose oligomers, ranging from two sugar rings (cellobiose) to five (cellopentose). TmCBP is structurally homologous to domains I and III of the ATP-binding cassette (ABC)-type oligopeptide-binding proteins and thus belongs to the type 2 periplasmic binding fold protein (PBP2) superfamily. The type 2 periplasmic binding proteins are soluble ligand-binding components of ABC or tripartite ATP-independent transporters and chemotaxis systems. Members of the PBP2 superfamily function in uptake of a variety of metabolites in bacteria such as amino acids, carbohydrate, ions, and polyamines. Ligands are then transported across the cytoplasmic membrane energized by ATP hydrolysis or electrochemical ion gradient. Besides transport proteins, the PBP2 superfamily includes the ligand-binding domains from ionotropic glutamate receptors, LysR-type transcriptional regulators, and unorthodox sensor proteins involved in signal transduction. — an NCBI CDD conserved domain (cd08509); members share this curated model.
