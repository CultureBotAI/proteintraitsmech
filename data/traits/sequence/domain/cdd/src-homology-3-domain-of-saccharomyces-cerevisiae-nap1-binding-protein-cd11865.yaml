identifier: CDD:cd11865
label: "Src Homology 3 domain of Saccharomyces cerevisiae Nap1-binding protein 2 and similar fungal proteins. This subfamily includes Saccharomyces cerevisiae Nbp2 (Nucleosome assembly protein 1 (Nap1)-binding protein 2), Schizosaccharomyces pombe Skb5, and similar proteins. Nbp2 interacts with Nap1, which is essential for maintaining proper nucleosome structures in transcription and replication. It is also the binding partner of the yeast type II protein phosphatase Ptc1p and serves as a scaffolding protein that brings seven kinases in close contact to Ptc1p. Nbp2 plays a role many cell processes including organelle inheritance, mating hormone response, cell wall stress, mitotic cell growth at elevated temperatures, and high osmolarity. Skb5 interacts with the p21-activated kinase (PAK) homolog Shk1, which is critical for fission yeast cell viability. Skb5 activates Shk1 and plays a role in regulating cell morphology and growth under hypertonic conditions. Nbp2 and Skb5 contain an SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Saccharomyces cerevisiae Nap1-binding protein 2 and similar fungal proteins. This subfamily includes Saccharomyces cerevisiae Nbp2 (Nucleosome assembly protein 1 (Nap1)-binding protein 2), Schizosaccharomyces pombe Skb5, and similar proteins. Nbp2 interacts with Nap1, which is essential for maintaining proper nucleosome structures in transcription and replication. It is also the binding partner of the yeast type II protein phosphatase Ptc1p and serves as a scaffolding protein that brings seven kinases in close contact to Ptc1p. Nbp2 plays a role many cell processes including organelle inheritance, mating hormone response, cell wall stress, mitotic cell growth at elevated temperatures, and high osmolarity. Skb5 interacts with the p21-activated kinase (PAK) homolog Shk1, which is critical for fission yeast cell viability. Skb5 activates Shk1 and plays a role in regulating cell morphology and growth under hypertonic conditions. Nbp2 and Skb5 contain an SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11865); members share this curated model.
