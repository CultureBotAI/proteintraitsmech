identifier: CDD:cd17454
label: "Sodium-dependent glucose transporter 1, also called Major facilitator superfamily domain-containing protein 4B. Sodium-dependent glucose transporter 1 (NaGLT1) is also called major facilitator superfamily domain-containing protein 4B (MFSD4B). NaGLT1 is a primary fructose transporter in rat renal brush-border membranes. It also facilitates sodium-independent urea uptake in assays performed on Xenopus oocytes. NaGLT1/MFSD4B belongs to the bacterial fucose permease, eukaryotic Major facilitator superfamily domain-containing protein 4 (FucP/MFSD4) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Sodium-dependent glucose transporter 1, also called Major facilitator superfamily domain-containing protein 4B. Sodium-dependent glucose transporter 1 (NaGLT1) is also called major facilitator superfamily domain-containing protein 4B (MFSD4B). NaGLT1 is a primary fructose transporter in rat renal brush-border membranes. It also facilitates sodium-independent urea uptake in assays performed on Xenopus oocytes. NaGLT1/MFSD4B belongs to the bacterial fucose permease, eukaryotic Major facilitator superfamily domain-containing protein 4 (FucP/MFSD4) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17454); members share this curated model.
