identifier: CDD:cd10820
label: "PDZ domain of synaptopodin 2 (SYNPO2), synaptopodin 2-like protein (SYNPO2L), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of SYNPO2, SYNPO2L, and related domains. SYNPO2 (also known as genethonin-2, myopodin) is a cytoskeleton adaptor protein. It participates in chaperone-assisted selective autophagy (CASA), a mechanism for the disposal of misfolded and damaged proteins and provides a link between the CASA chaperone complex and a membrane-tethering and fusion machinery that generates autophagosome membranes. The SYNPO2 PPxY motif binds CASA cochaperone BCL2-associated athanogene 3 (BAG3) and the SYNPO2 PDZ domain binds vacuolar protein sorting 18 homolog (VPS18). There are three isoforms of SYNPO2, which possess an amino-terminal PDZ domain (SYNPO2a, b, c); the short isoform SYNPO2d, lacks the PDZ domain. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This SYNPO2-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of synaptopodin 2 (SYNPO2), synaptopodin 2-like protein (SYNPO2L), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of SYNPO2, SYNPO2L, and related domains. SYNPO2 (also known as genethonin-2, myopodin) is a cytoskeleton adaptor protein. It participates in chaperone-assisted selective autophagy (CASA), a mechanism for the disposal of misfolded and damaged proteins and provides a link between the CASA chaperone complex and a membrane-tethering and fusion machinery that generates autophagosome membranes. The SYNPO2 PPxY motif binds CASA cochaperone BCL2-associated athanogene 3 (BAG3) and the SYNPO2 PDZ domain binds vacuolar protein sorting 18 homolog (VPS18). There are three isoforms of SYNPO2, which possess an amino-terminal PDZ domain (SYNPO2a, b, c); the short isoform SYNPO2d, lacks the PDZ domain. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This SYNPO2-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd10820); members share this curated model.
