identifier: CDD:cd18327
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 7B (ZBTB7B). ZBTB7B is also called Krueppel-related zinc finger protein cKrox, T-helper-inducing POZ/Krueppel-like factor, zinc finger and BTB domain-containing protein 15 (ZBTB15), zinc finger protein 67 (ZNF67), Zfp67, zinc finger protein 857B (ZNF857B), or zinc finger protein Th-POK. It is a transcriptional regulator of extracellular matrix gene expression. It plays widespread and critical roles in T-cell development, particularly as the master regulator of CD4 commitment. It also plays a role as a potent driver of brown fat development and thermogenesis, as well as cold-induced beige fat formation. ZBTB7B contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 7B (ZBTB7B). ZBTB7B is also called Krueppel-related zinc finger protein cKrox, T-helper-inducing POZ/Krueppel-like factor, zinc finger and BTB domain-containing protein 15 (ZBTB15), zinc finger protein 67 (ZNF67), Zfp67, zinc finger protein 857B (ZNF857B), or zinc finger protein Th-POK. It is a transcriptional regulator of extracellular matrix gene expression. It plays widespread and critical roles in T-cell development, particularly as the master regulator of CD4 commitment. It also plays a role as a potent driver of brown fat development and thermogenesis, as well as cold-induced beige fat formation. ZBTB7B contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18327); members share this curated model.
