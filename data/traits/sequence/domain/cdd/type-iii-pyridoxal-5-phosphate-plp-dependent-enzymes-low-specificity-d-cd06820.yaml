identifier: CDD:cd06820
label: "Type III Pyridoxal 5-phosphate (PLP)-Dependent Enzymes, Low Specificity D-Threonine Aldolase-like. This subfamily is composed of uncharacterized bacterial proteins with similarity to low specificity D-threonine aldolase (D-TA), which is a fold type III PLP-dependent enzyme that catalyzes the interconversion between D-threonine/D-allo-threonine and glycine plus acetaldehyde. Both PLP and divalent cations (eg. Mn2+) are required for catalytic activity. Low specificity D-TAs show similarity to bacterial alanine racemase (AR), which contains an N-terminal PLP-binding TIM-barrel domain and a C-terminal beta-sandwich domain. AR exists as homodimers with active sites that lie at the interface between the TIM barrel domain of one subunit and the beta-sandwich domain of the other subunit. Based on its similarity to AR, it is possible that low specificity D-TAs also form dimers in solution. Experimental data show that the monomeric form of low specificity D-TAs exhibit full catalytic activity."
definition: >-
  Type III Pyridoxal 5-phosphate (PLP)-Dependent Enzymes, Low Specificity D-Threonine Aldolase-like. This subfamily is composed of uncharacterized bacterial proteins with similarity to low specificity D-threonine aldolase (D-TA), which is a fold type III PLP-dependent enzyme that catalyzes the interconversion between D-threonine/D-allo-threonine and glycine plus acetaldehyde. Both PLP and divalent cations (eg. Mn2+) are required for catalytic activity. Low specificity D-TAs show similarity to bacterial alanine racemase (AR), which contains an N-terminal PLP-binding TIM-barrel domain and a C-terminal beta-sandwich domain. AR exists as homodimers with active sites that lie at the interface between the TIM barrel domain of one subunit and the beta-sandwich domain of the other subunit. Based on its similarity to AR, it is possible that low specificity D-TAs also form dimers in solution. Experimental data show that the monomeric form of low specificity D-TAs exhibit full catalytic activity. — an NCBI CDD conserved domain (cd06820); members share this curated model.
