identifier: CDD:cd19383
label: TGF_beta_Neurturin
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in Neurturin and similar proteins. Neurturin is a member of the glial cell-line-derived neurotrophic factor (GDNF) family. It acts as a neurotrophic factor that supports the survival of sympathetic neurons in culture and may regulate the development and maintenance of the CNS. It might control the size of non-neuronal cell population such as haemopoietic cells
