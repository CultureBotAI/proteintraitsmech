identifier: CDD:cd21678
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in the tricalbin (TCB) family. The tricalbin (TCB) family includes Saccharomyces cerevisiae TCB1-3 and similar proteins. They may play a role in membrane trafficking. This model corresponds to the SMP domain of TCB family proteins, which may be implicated in lipid transport."
definition: >-
