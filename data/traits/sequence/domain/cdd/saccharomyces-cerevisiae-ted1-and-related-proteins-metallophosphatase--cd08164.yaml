identifier: CDD:cd08164
label: "Saccharomyces cerevisiae Ted1 and related proteins, metallophosphatase domain. Saccharomyces cerevisiae Ted1 (trafficking of Emp24p/Erv25p-dependent cargo disrupted 1) is a metallophosphatase domain-containing protein which acts together with Emp24p and Erv25p in cargo exit from the ER.  Ted1 belongs to the metallophosphatase (MPP) superfamily.  MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The MPP superfamily includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases).  The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination."
definition: >-
  Saccharomyces cerevisiae Ted1 and related proteins, metallophosphatase domain. Saccharomyces cerevisiae Ted1 (trafficking of Emp24p/Erv25p-dependent cargo disrupted 1) is a metallophosphatase domain-containing protein which acts together with Emp24p and Erv25p in cargo exit from the ER. Ted1 belongs to the metallophosphatase (MPP) superfamily. MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The MPP superfamily includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases). The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination. — an NCBI CDD conserved domain (cd08164); members share this curated model.
