identifier: CDD:cd19313
label: TRM7
definition: >-
  tRNA (cytidine(32)/guanosine(34)-2'-O)-methyltransferase TRM7. TRM7 is a tRNA (cytidine(32)/guanosine(34)-2'-O)-methyltransferase methylates the 2'-O-ribose of nucleotides at positions 32 and 34 of the tRNA anticodon loop of tRNA(Phe), tRNA(Trp) and tRNA(Leu(UAA))
