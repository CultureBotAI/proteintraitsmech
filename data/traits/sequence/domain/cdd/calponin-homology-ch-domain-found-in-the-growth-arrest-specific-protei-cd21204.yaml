identifier: CDD:cd21204
label: "calponin homology (CH) domain found in the growth arrest-specific protein 2 family. The growth arrest-specific protein 2 (GAS-2) family includes GAS-2, and GAS-2 like proteins, GAS2L1-3. GAS-2 may play a role in apoptosis by acting as a cell death substrate for caspases. GAS2L1 (also called GAS2-related protein on chromosome 22 or growth arrest-specific protein 2-like 1) and GAS2L2 (also called GAS2-related protein on chromosome 17 or growth arrest-specific protein 2-like 2) may be involved in the cross-linking of microtubules and microfilaments. GAS2L3, also called GAS2-like protein 3, is a cytoskeletal linker protein that may promote and stabilize the formation of the actin and microtubule network. Members of this family contain a single copy of the CH domain at the N-terminal region. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in the growth arrest-specific protein 2 family. The growth arrest-specific protein 2 (GAS-2) family includes GAS-2, and GAS-2 like proteins, GAS2L1-3. GAS-2 may play a role in apoptosis by acting as a cell death substrate for caspases. GAS2L1 (also called GAS2-related protein on chromosome 22 or growth arrest-specific protein 2-like 1) and GAS2L2 (also called GAS2-related protein on chromosome 17 or growth arrest-specific protein 2-like 2) may be involved in the cross-linking of microtubules and microfilaments. GAS2L3, also called GAS2-like protein 3, is a cytoskeletal linker protein that may promote and stabilize the formation of the actin and microtubule network. Members of this family contain a single copy of the CH domain at the N-terminal region. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21204); members share this curated model.
