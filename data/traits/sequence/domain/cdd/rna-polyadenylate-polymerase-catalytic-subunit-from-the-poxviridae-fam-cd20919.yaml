identifier: CDD:cd20919
label: "RNA polyadenylate polymerase catalytic subunit from the Poxviridae family of viruses. Poly(A) polymerases (PAPs) catalyze the attachment of adenylates to the 3' ends of messenger RNA and other RNAs, forming poly(A) tails. PAP acts as a nucleic acid template-independent NMP-transferase, preferentially utilizing a single species of NTP, namely ATP. The polyadenylation state of an mRNA may correlate with the efficiency of its translation. In Vaccinia virus, from the Poxviridae family of viruses, polyadenylation is crucial for virion maturation and is carried out by a heterodimer, formed by the catalytic subunit VP55 and the processivity factor (VP39). In the absence of VP39, oligo(A) tails are added to permissive primers by VP55 in a rapid processive burst, which ceases abruptly after tails have reached 30-35 nucleotides in length. With VP39, tails with lengths in the hundreds of nucleotides are processively synthesized with no abrupt termination of elongation. In contrast to mammalian cells, polyadenylation is not dependent on a multiprotein mRNA 3' end processing complex. VP55 translocates with respect to its single-stranded nucleic acid substrate during poly(A) tail addition. The catalytic subunit of Poxviridae PAPs contains two topologically identical subdomains with a nucleotidyltransferase fold, suggesting that an ancestral duplication was at the origin of these viral PAPs."
definition: >-
  RNA polyadenylate polymerase catalytic subunit from the Poxviridae family of viruses. Poly(A) polymerases (PAPs) catalyze the attachment of adenylates to the 3' ends of messenger RNA and other RNAs, forming poly(A) tails. PAP acts as a nucleic acid template-independent NMP-transferase, preferentially utilizing a single species of NTP, namely ATP. The polyadenylation state of an mRNA may correlate with the efficiency of its translation. In Vaccinia virus, from the Poxviridae family of viruses, polyadenylation is crucial for virion maturation and is carried out by a heterodimer, formed by the catalytic subunit VP55 and the processivity factor (VP39). In the absence of VP39, oligo(A) tails are added to permissive primers by VP55 in a rapid processive burst, which ceases abruptly after tails have reached 30-35 nucleotides in length. With VP39, tails with lengths in the hundreds of nucleotides are processively synthesized with no abrupt termination of elongation. In contrast to mammalian cells, polyadenylation is not dependent on a multiprotein mRNA 3' end processing complex. VP55 translocates with respect to its single-stranded nucleic acid substrate during poly(A) tail addition. The catalytic subunit of Poxviridae PAPs contains two topologically identical subdomains with a nucleotidyltransferase fold, suggesting that an ancestral duplication was at the origin of these viral PAPs. — an NCBI CDD conserved domain (cd20919); members share this curated model.
