identifier: CDD:cd14411
label: "UBA-like domain found in DCN1-like protein 1 (DCNL1) and similar proteins. DCNL1 (defective in cullin neddylation protein 1-like protein 1), also called DCUN1 domain-containing protein 1, is encoded by squamous cell carcinoma-related oncogene SCCRO (DCUN1D1). It interacts with known cullin isoforms as well as ROC1, Ubc12 and CAND1, the components of the neddylation pathway. It plays an essential role in the neddylation E3 complex and participates in the release of inhibitory effects of CAND1 on cullin-RING ligase E3 complex assembly and activity. DCNL1 contains an N-terminal ubiquitin-associated (UBA)-like domain and a C-terminal cullin binding domain that binds to cullins and Rbx-1, components of an E3 ubiquitin ligase complex for neddylation."
definition: >-
  UBA-like domain found in DCN1-like protein 1 (DCNL1) and similar proteins. DCNL1 (defective in cullin neddylation protein 1-like protein 1), also called DCUN1 domain-containing protein 1, is encoded by squamous cell carcinoma-related oncogene SCCRO (DCUN1D1). It interacts with known cullin isoforms as well as ROC1, Ubc12 and CAND1, the components of the neddylation pathway. It plays an essential role in the neddylation E3 complex and participates in the release of inhibitory effects of CAND1 on cullin-RING ligase E3 complex assembly and activity. DCNL1 contains an N-terminal ubiquitin-associated (UBA)-like domain and a C-terminal cullin binding domain that binds to cullins and Rbx-1, components of an E3 ubiquitin ligase complex for neddylation. — an NCBI CDD conserved domain (cd14411); members share this curated model.
