identifier: CDD:cd12439
label: "RNA recognition motif (RRM) found in tRNA (uracil-5-)-methyltransferase homolog A (TRMT2A) and similar proteins. This subfamily corresponds to the RRM of TRMT2A, also known as HpaII tiny fragments locus 9c protein (HTF9C), a novel cell cycle regulated protein. It is an independent biologic factor expressed in tumors associated with clinical outcome in HER2 expressing breast cancer. The function of TRMT2A remains unclear although by sequence homology it has a RNA recognition motif (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain), related to RNA methyltransferases."
definition: >-
  RNA recognition motif (RRM) found in tRNA (uracil-5-)-methyltransferase homolog A (TRMT2A) and similar proteins. This subfamily corresponds to the RRM of TRMT2A, also known as HpaII tiny fragments locus 9c protein (HTF9C), a novel cell cycle regulated protein. It is an independent biologic factor expressed in tumors associated with clinical outcome in HER2 expressing breast cancer. The function of TRMT2A remains unclear although by sequence homology it has a RNA recognition motif (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain), related to RNA methyltransferases. — an NCBI CDD conserved domain (cd12439); members share this curated model.
