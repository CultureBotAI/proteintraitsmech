identifier: CDD:cd23017
label: "mitochondrial large subunit assembly factor 19 (mt-LAF19) and related proteins. mt-LAF19 is a Trypanosoma brucei mitochondrial large subunit (mt-LSU) assembly factor (mt-LAF); in native mt-LSU assembly intermediates, the lariat-like structure of the 12S rRNA helix H88 is sandwiched between a loop of mt-LAF19, the core domain of mt-LAF4, and mt-LAF14. Mitochondrial ribosomes (mitoribosomes) are ribonucleoprotein complexes and consist of a large (mt-LSU) and small subunit (mt-SSU). They differ markedly in composition and architecture from their bacterial counterparts and between different eukaryotic lineages, and their biogenesis involves exchange of assembly factors by ribosomal proteins. An investigation of native assembly intermediates of the mt-LSU from T. brucei identified 28 assembly factors, some of which are homologous to bacterial and eukaryotic ribosome assembly factors. Mitochondrial biogenesis is biomedically important since mutations in mitoribosomal proteins, rRNAs, and assembly factors have been linked to a heterogeneous group of human multisystemic oxidative phosphorylation (OXPHOS) diseases and cancer development and progression."
definition: >-
  mitochondrial large subunit assembly factor 19 (mt-LAF19) and related proteins. mt-LAF19 is a Trypanosoma brucei mitochondrial large subunit (mt-LSU) assembly factor (mt-LAF); in native mt-LSU assembly intermediates, the lariat-like structure of the 12S rRNA helix H88 is sandwiched between a loop of mt-LAF19, the core domain of mt-LAF4, and mt-LAF14. Mitochondrial ribosomes (mitoribosomes) are ribonucleoprotein complexes and consist of a large (mt-LSU) and small subunit (mt-SSU). They differ markedly in composition and architecture from their bacterial counterparts and between different eukaryotic lineages, and their biogenesis involves exchange of assembly factors by ribosomal proteins. An investigation of native assembly intermediates of the mt-LSU from T. brucei identified 28 assembly factors, some of which are homologous to bacterial and eukaryotic ribosome assembly factors. Mitochondrial biogenesis is biomedically important since mutations in mitoribosomal proteins, rRNAs, and assembly factors have been linked to a heterogeneous group of human multisystemic oxidative phosphorylation (OXPHOS) diseases and cancer development and progression. — an NCBI CDD conserved domain (cd23017); members share this curated model.
