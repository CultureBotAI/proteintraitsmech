identifier: CDD:cd21210
label: "calponin homology (CH) domain found in Saccharomyces cerevisiae transgelin (SCP1) and similar proteins. The family includes transgelins from Saccharomyces cerevisiae and Schizosaccharomyces pombe, which are also called SCP1 and STG1, respectively. Transgelin, also called calponin homolog 1, has actin-binding and actin-bundling activity. It stabilizes actin filaments against disassembly. Transgelin contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in Saccharomyces cerevisiae transgelin (SCP1) and similar proteins. The family includes transgelins from Saccharomyces cerevisiae and Schizosaccharomyces pombe, which are also called SCP1 and STG1, respectively. Transgelin, also called calponin homolog 1, has actin-binding and actin-bundling activity. It stabilizes actin filaments against disassembly. Transgelin contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21210); members share this curated model.
