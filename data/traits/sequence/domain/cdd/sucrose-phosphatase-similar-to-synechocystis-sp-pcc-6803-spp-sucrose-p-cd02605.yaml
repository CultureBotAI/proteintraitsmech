identifier: CDD:cd02605
label: "sucrose-phosphatase, similar to Synechocystis sp PCC 6803 SPP. Sucrose-phosphatase (SPP; EC 3.1.3.24) catalyzes the dephosphorylation of sucrose-6(F)-phosphate (Suc6P)-the final step in the pathway of sucrose biosynthesis in plants and cyanobacteria. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  sucrose-phosphatase, similar to Synechocystis sp PCC 6803 SPP. Sucrose-phosphatase (SPP; EC 3.1.3.24) catalyzes the dephosphorylation of sucrose-6(F)-phosphate (Suc6P)-the final step in the pathway of sucrose biosynthesis in plants and cyanobacteria. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd02605); members share this curated model.
