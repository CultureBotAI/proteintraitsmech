identifier: CDD:cd01780
label: "Ras-associating (RA) domain 2 found in Phosphatidylinositide-specific phospholipase C (PLC)-epsilon. PLC is a signaling enzyme that hydrolyzes membrane phospholipids to generate inositol triphosphate. PLC-epsilon represents a novel forth class of PLC that has a PLC catalytic core domain, a CDC25 guanine nucleotide exchange factor domain and two RA (Ras-association) domains. RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. Although PLC RA1 and RA2 have homologous ubiquitin-like folds only RA2 can bind Ras and activate it. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and involve in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. This family corresponds to the second RA domain of PLC-epsilon."
definition: >-
  Ras-associating (RA) domain 2 found in Phosphatidylinositide-specific phospholipase C (PLC)-epsilon. PLC is a signaling enzyme that hydrolyzes membrane phospholipids to generate inositol triphosphate. PLC-epsilon represents a novel forth class of PLC that has a PLC catalytic core domain, a CDC25 guanine nucleotide exchange factor domain and two RA (Ras-association) domains. RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. Although PLC RA1 and RA2 have homologous ubiquitin-like folds only RA2 can bind Ras and activate it. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and involve in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. This family corresponds to the second RA domain of PLC-epsilon. — an NCBI CDD conserved domain (cd01780); members share this curated model.
