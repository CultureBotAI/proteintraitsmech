identifier: CDD:cd23667
label: beta-trefoil_Ricin_CqDVP-like
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Culex quinquefasciatus salivary peptide (CqDVP) and similar proteins. CqDVP is a Cysteine and Tryptophan-Rich (CWRC) protein that is specific to adult female salivary glands and is secreted into vector saliva. It contains a ricin B-type lectin domain that shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site
