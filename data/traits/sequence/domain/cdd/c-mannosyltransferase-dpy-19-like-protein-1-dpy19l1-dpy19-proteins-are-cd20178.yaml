identifier: CDD:cd20178
label: "C-mannosyltransferase Dpy-19-like protein 1 (Dpy19L1). Dpy19 proteins are C-mannosyltransferases that mediate C-mannosylation of tryptophan residues on target proteins. C-mannosylation is the attachment of alpha-mannose to the indole C2 carbon of the first tryptophan residue in the consensus amino acid sequence Trp-Xaa-Xaa-Trp/Cys through a C-C bond. This reaction takes place in the endoplasmic reticulum (ER) lumen. Dpy19 is a transmembrane domain family whose name is derived from the Caenorhabditis elegans Dumpy mutant. Dpy19L1 (also called protein Dpy-19 homolog 1) regulates neurite extension during development."
definition: >-
  C-mannosyltransferase Dpy-19-like protein 1 (Dpy19L1). Dpy19 proteins are C-mannosyltransferases that mediate C-mannosylation of tryptophan residues on target proteins. C-mannosylation is the attachment of alpha-mannose to the indole C2 carbon of the first tryptophan residue in the consensus amino acid sequence Trp-Xaa-Xaa-Trp/Cys through a C-C bond. This reaction takes place in the endoplasmic reticulum (ER) lumen. Dpy19 is a transmembrane domain family whose name is derived from the Caenorhabditis elegans Dumpy mutant. Dpy19L1 (also called protein Dpy-19 homolog 1) regulates neurite extension during development. — an NCBI CDD conserved domain (cd20178); members share this curated model.
