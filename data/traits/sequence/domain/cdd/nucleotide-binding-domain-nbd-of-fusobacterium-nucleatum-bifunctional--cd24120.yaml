identifier: CDD:cd24120
label: "nucleotide-binding domain (NBD) of Fusobacterium nucleatum bifunctional 3-dehydroquinate synthase/phosphatase (AroB) and similar proteins. The family includes a group of PPX/GppA family proteins similar to Fusobacterium nucleatum bifunctional 3-dehydroquinate synthase/phosphatase (AroB; EC 4.2.3.4/EC 3.6.1.-). AroB contains 3-dehydroquinate synthase and an unknown phosphatase. 3-dehydroquinate synthase catalyzes the second step in the shikimate pathway, which is essential to produce aromatic amino acids in bacteria, plants, and fungi, but not mammals."
definition: >-
  nucleotide-binding domain (NBD) of Fusobacterium nucleatum bifunctional 3-dehydroquinate synthase/phosphatase (AroB) and similar proteins. The family includes a group of PPX/GppA family proteins similar to Fusobacterium nucleatum bifunctional 3-dehydroquinate synthase/phosphatase (AroB; EC 4.2.3.4/EC 3.6.1.-). AroB contains 3-dehydroquinate synthase and an unknown phosphatase. 3-dehydroquinate synthase catalyzes the second step in the shikimate pathway, which is essential to produce aromatic amino acids in bacteria, plants, and fungi, but not mammals. — an NCBI CDD conserved domain (cd24120); members share this curated model.
