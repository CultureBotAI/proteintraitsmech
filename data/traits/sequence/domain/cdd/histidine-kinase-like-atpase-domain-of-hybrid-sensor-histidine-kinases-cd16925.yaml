identifier: CDD:cd16925
label: "Histidine kinase-like ATPase domain of hybrid sensor histidine kinases similar to Pseudomonas putida TodS and Thauera aromatica TutC. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component hybrid sensor histidine kinase (HKs) such Pseudomonas putida TodS HK of the TodS-TodT two-component regulatory system (TCS) which controls the expression of a toluene degradation pathway. Thauera aromatica TutC may be part of a TCS that is involved in anaerobic toluene metabolism. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), PAS sensor domain(s) and a REC domain."
definition: >-
  Histidine kinase-like ATPase domain of hybrid sensor histidine kinases similar to Pseudomonas putida TodS and Thauera aromatica TutC. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component hybrid sensor histidine kinase (HKs) such Pseudomonas putida TodS HK of the TodS-TodT two-component regulatory system (TCS) which controls the expression of a toluene degradation pathway. Thauera aromatica TutC may be part of a TCS that is involved in anaerobic toluene metabolism. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), PAS sensor domain(s) and a REC domain. — an NCBI CDD conserved domain (cd16925); members share this curated model.
