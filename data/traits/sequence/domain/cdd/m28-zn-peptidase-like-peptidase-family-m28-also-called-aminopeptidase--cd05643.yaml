identifier: CDD:cd05643
label: "M28 Zn-peptidase-like. Peptidase family M28 (also called aminopeptidase Y family), uncharacterized subfamily. The M28 family contains aminopeptidases as well as carboxypeptidases. They typically have co-catalytic zinc ions; each zinc ion is tetrahedrally co-ordinated, with three amino acid ligands plus activated water; one aspartate residue binds both metal ions. This protein subfamily conserves some of the metal-coordinating residues of the typically co-catalytic M28 family which might suggest binding of a single metal ion."
definition: >-
  M28 Zn-peptidase-like. Peptidase family M28 (also called aminopeptidase Y family), uncharacterized subfamily. The M28 family contains aminopeptidases as well as carboxypeptidases. They typically have co-catalytic zinc ions; each zinc ion is tetrahedrally co-ordinated, with three amino acid ligands plus activated water; one aspartate residue binds both metal ions. This protein subfamily conserves some of the metal-coordinating residues of the typically co-catalytic M28 family which might suggest binding of a single metal ion. — an NCBI CDD conserved domain (cd05643); members share this curated model.
