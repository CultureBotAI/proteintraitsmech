identifier: CDD:cd12499
label: "RNA recognition motif (RRM) found in Escherichia coli cold-shock DEAD box protein A (CsdA) and similar proteins. This subgroup corresponds to the C-terminal RRM homology domain of E. coli CsdA, also termed ATP-dependent RNA helicase deaD, or translation factor W2, a member of the DbpA subfamily of prokaryotic DEAD-box rRNA helicases that have been implicated in ribosome biogenesis. CsdA may be involved in translation initiation, gene regulation after cold-shock, mRNA decay and biogenesis of the large or small ribosomal subunit. It contains two N-terminal ATPase catalytic domains and a C-terminal RNA binding domain, an atypical RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNPs (ribonucleoprotein domain). The catalytic domains bind to nearby regions of RNA to stimulate ATP hydrolysis and disrupt RNA structures. The C-terminal domain is responsible for the high-affinity RNA binding."
definition: >-
  RNA recognition motif (RRM) found in Escherichia coli cold-shock DEAD box protein A (CsdA) and similar proteins. This subgroup corresponds to the C-terminal RRM homology domain of E. coli CsdA, also termed ATP-dependent RNA helicase deaD, or translation factor W2, a member of the DbpA subfamily of prokaryotic DEAD-box rRNA helicases that have been implicated in ribosome biogenesis. CsdA may be involved in translation initiation, gene regulation after cold-shock, mRNA decay and biogenesis of the large or small ribosomal subunit. It contains two N-terminal ATPase catalytic domains and a C-terminal RNA binding domain, an atypical RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNPs (ribonucleoprotein domain). The catalytic domains bind to nearby regions of RNA to stimulate ATP hydrolysis and disrupt RNA structures. The C-terminal domain is responsible for the high-affinity RNA binding. — an NCBI CDD conserved domain (cd12499); members share this curated model.
