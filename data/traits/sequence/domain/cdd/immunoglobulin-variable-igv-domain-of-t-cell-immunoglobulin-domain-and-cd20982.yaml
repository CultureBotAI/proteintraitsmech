identifier: CDD:cd20982
label: "Immunoglobulin Variable (IgV) domain of T cell Immunoglobulin Domain and Mucin Domain 3 (Tim-3), and similar domains. The members here are composed of the immunoglobulin variable (IgV) domain of T cell immunoglobulin domain and mucin domain 3 (Tim-3; also known as Hepatitis A virus cellular receptor 2 (HAVcr-2) and Cluster of Differentiation 366 (CD366)) and similar proteins. TIM-3 is a checkpoint inhibitor in immune responses to tumors, as well as involved in chronic viral infections. Thus, Tim-3 has emerged as one of most promising immune checkpoint targets for cancer immunotherapy. Tim-3 is highly expressed on Th1 lymphocytes and CD11b(+) macrophages and is upregulated on activated T and myeloid cells. TIM-3 regulates macrophage, activation and inhibits Th1 mediated immune responses to promote immunological tolerance. There are three TIM family members in humans (TIM-1, TIM-3, and TIM-4) and eight members in mice (TIM-1 to TIM-8). The IgV domain of human TIM-3 has been shown to bind ligands such as carcinoembryonic antigen cell adhesion molecule 1 (CEACAM1), high mobility group protein B1 (HMGB1)and galectin-9 (GAL9). The binding of GAL9 to TIM-3 can negatively regulate Th1 immune response, enhance immune tolerance and inhibit anti#tumor immunity. Dysregulation of the TIM-3/GAL9 pathway is implicated in numerous chronic autoimmune diseases, such as multiple sclerosis and systemic lupus erythematosus."
definition: >-
  Immunoglobulin Variable (IgV) domain of T cell Immunoglobulin Domain and Mucin Domain 3 (Tim-3), and similar domains. The members here are composed of the immunoglobulin variable (IgV) domain of T cell immunoglobulin domain and mucin domain 3 (Tim-3; also known as Hepatitis A virus cellular receptor 2 (HAVcr-2) and Cluster of Differentiation 366 (CD366)) and similar proteins. TIM-3 is a checkpoint inhibitor in immune responses to tumors, as well as involved in chronic viral infections. Thus, Tim-3 has emerged as one of most promising immune checkpoint targets for cancer immunotherapy. Tim-3 is highly expressed on Th1 lymphocytes and CD11b(+) macrophages and is upregulated on activated T and myeloid cells. TIM-3 regulates macrophage, activation and inhibits Th1 mediated immune responses to promote immunological tolerance. There are three TIM family members in humans (TIM-1, TIM-3, and TIM-4) and eight members in mice (TIM-1 to TIM-8). The IgV domain of human TIM-3 has been shown to bind ligands such as carcinoembryonic antigen cell adhesion molecule 1 (CEACAM1), high mobility group protein B1 (HMGB1)and galectin-9 (GAL9). The binding of GAL9 to TIM-3 can negatively regulate Th1 immune response, enhance immune tolerance and inhibit anti#tumor immunity. Dysregulation of the TIM-3/GAL9 pathway is implicated in numerous chronic autoimmune diseases, such as multiple sclerosis and systemic lupus erythematosus. — an NCBI CDD conserved domain (cd20982); members share this curated model.
