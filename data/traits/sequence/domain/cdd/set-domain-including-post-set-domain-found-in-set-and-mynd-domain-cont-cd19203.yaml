identifier: CDD:cd19203
label: "SET domain (including post-SET domain) found in SET and MYND domain-containing protein 3 (SMYD3) and similar proteins. SMYD3 (also termed zinc finger MYND domain-containing protein 1) functions as a histone methyltransferase that specifically methylates 'Lys-4' of histone H3, inducing di- and tri-methylation, but not monomethylation. It also methylates 'Lys-5' of histone H4. SMYD3 plays an important role in transcriptional activation as a member of an RNA polymerase complex. It is overexpressed in colorectal, breast, prostate, and hepatocellular tumors, and has been implicated as an oncogene in human malignancies. Methylation of MEKK2 by SMYD3 is important for regulation of the MEK/ERK pathway, suggesting the possibility of selectively targeting SMYD3 in RAS-driven cancers."
