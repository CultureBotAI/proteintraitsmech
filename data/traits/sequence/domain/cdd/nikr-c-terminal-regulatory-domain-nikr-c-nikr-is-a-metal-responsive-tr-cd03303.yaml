identifier: CDD:cd03303
label: "NikR, C-terminal, regulatory domain (NikR-C): NikR is a metal-responsive transcription factor that controls nickel uptake in various bacteria and archaea. In Escherichia coli, it regulates the expression of a nickel-specific ATP-binding cassette (ABC) transporter. NikR consists of two dimeric DNA-binding domains separated by central tetrameric regulatory domains that bind nickel. NikR contains four nickel-binding sites at the tetramer interface, each exhibiting a novel square-planar coordination. Occupation of these sites results in NikR binding to its operator in the nikABCDE promoter. The N-terminal DNA-binding domain belongs to the ribbon-helix-helix family of transcription factors and the C-terminal regulatory/tetramerization domain appears to be structurally similar to the ACT domain family, however, it does not appear to be a homolog."
definition: >-
  NikR, C-terminal, regulatory domain (NikR-C): NikR is a metal-responsive transcription factor that controls nickel uptake in various bacteria and archaea. In Escherichia coli, it regulates the expression of a nickel-specific ATP-binding cassette (ABC) transporter. NikR consists of two dimeric DNA-binding domains separated by central tetrameric regulatory domains that bind nickel. NikR contains four nickel-binding sites at the tetramer interface, each exhibiting a novel square-planar coordination. Occupation of these sites results in NikR binding to its operator in the nikABCDE promoter. The N-terminal DNA-binding domain belongs to the ribbon-helix-helix family of transcription factors and the C-terminal regulatory/tetramerization domain appears to be structurally similar to the ACT domain family, however, it does not appear to be a homolog. — an NCBI CDD conserved domain (cd03303); members share this curated model.
