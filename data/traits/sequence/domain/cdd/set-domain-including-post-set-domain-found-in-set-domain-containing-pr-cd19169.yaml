identifier: CDD:cd19169
label: "SET domain (including post-SET domain) found in SET domain-containing protein 1 (SETD1) and similar proteins. This family includes SET domain-containing protein 1A (SETD1A) and SET domain-containing protein 1B (SETD1B). These proteins are histone-lysine N-methyltransferases that specifically methylate 'Lys-4' of histone H3 (H3K4me) when part of the SET1 histone methyltransferase (HMT) complex, but not if the neighboring 'Lys-9' residue is already methylated."
definition: >-
  SET domain (including post-SET domain) found in SET domain-containing protein 1 (SETD1) and similar proteins. This family includes SET domain-containing protein 1A (SETD1A) and SET domain-containing protein 1B (SETD1B). These proteins are histone-lysine N-methyltransferases that specifically methylate 'Lys-4' of histone H3 (H3K4me) when part of the SET1 histone methyltransferase (HMT) complex, but not if the neighboring 'Lys-9' residue is already methylated. — an NCBI CDD conserved domain (cd19169); members share this curated model.
