identifier: CDD:cd22893
label: PlcA-like
definition: >-
  phospholipase C similar to Legionella pneumophila PlcA. This family includes phospholipase C (PLC) from Legionella pneumophila (PlcA) and Pseudomonas fluorescens (PlcC), and similar proteins. PlcA and PlcC are secreted phosphatidylcholine-hydrolyzing PLCs. PlcC is involved in P. fluorescens's hemolytic activity. Its preferred substrates are 1-palmitoyl-2-arachidonoyl-phosphatidylcholine and dipalmitoyl-phosphatidylcholine. The active enzyme is a monomer that requires calcium and zinc ions for activity
