identifier: CDD:cd18087
label: "tRNA (pseudouridine(54)-N(1))-methyltransferase TrmY. tRNA (pseudouridine(54)-N(1))-methyltransferase TrmY catalyzes the N1-methylation of pseudouridine at position 54 (Psi54) in tRNAs. TrmY is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  tRNA (pseudouridine(54)-N(1))-methyltransferase TrmY. tRNA (pseudouridine(54)-N(1))-methyltransferase TrmY catalyzes the N1-methylation of pseudouridine at position 54 (Psi54) in tRNAs. TrmY is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18087); members share this curated model.
