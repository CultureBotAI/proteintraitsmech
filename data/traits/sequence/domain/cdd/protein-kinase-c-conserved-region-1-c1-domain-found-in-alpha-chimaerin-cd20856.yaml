identifier: CDD:cd20856
label: "protein kinase C conserved region 1 (C1 domain) found in alpha-chimaerin and similar proteins. Alpha-chimaerin, also called A-chimaerin, N-chimaerin (CHN), alpha-chimerin, N-chimerin (NC), or Rho GTPase-activating protein 2 (ARHGAP2), is a GTPase-activating protein (GAP) for p21-rac and a phorbol ester receptor. It is involved in the assembly of neuronal locomotor circuits as a direct effector of EPHA4 in axon guidance. Alpha-chimaerin contains a functional SH2 domain that can bind to phosphotyrosine motifs within receptors, a GAP domain with specificity in vitro for Rac1 and a diacylglycerol (DAG)-binding C1 domain which allows them to translocate to membranes in response to DAG signaling and anchors them in close proximity to activated Rac. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in alpha-chimaerin and similar proteins. Alpha-chimaerin, also called A-chimaerin, N-chimaerin (CHN), alpha-chimerin, N-chimerin (NC), or Rho GTPase-activating protein 2 (ARHGAP2), is a GTPase-activating protein (GAP) for p21-rac and a phorbol ester receptor. It is involved in the assembly of neuronal locomotor circuits as a direct effector of EPHA4 in axon guidance. Alpha-chimaerin contains a functional SH2 domain that can bind to phosphotyrosine motifs within receptors, a GAP domain with specificity in vitro for Rac1 and a diacylglycerol (DAG)-binding C1 domain which allows them to translocate to membranes in response to DAG signaling and anchors them in close proximity to activated Rac. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20856); members share this curated model.
