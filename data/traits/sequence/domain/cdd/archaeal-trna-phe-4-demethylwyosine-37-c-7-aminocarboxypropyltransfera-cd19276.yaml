identifier: CDD:cd19276
label: arch_TYW2
definition: >-
  archaeal tRNA(Phe)(4-demethylwyosine(37)-C(7)) aminocarboxypropyltransferase. archaeal tRNA(Phe)(4-demethylwyosine(37)-C(7)) aminocarboxypropyltransferase (TYW2; EC 2.1.1.114) catalyzes the transfer of the alpha-amino-alpha-carboxypropyl (acp) group from S-adenosyl-L-methionine to the C-7 position of 4-demethylwyosine (imG-14) to produce wybutosine-86, hyper modified guanosine with a tricyclic base
