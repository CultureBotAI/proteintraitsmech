identifier: CDD:cd09629
label: "DOMON-like domain of Brassica carinata CIL1 and similar proteins. Brassica carinata CIL1 has been described as involved in suppression of axillary meristem development. It contains a single DOMON domain, the function of which is unclear. Members in this diverse family of plant proteins may have a cytochrome b561 domain C-terminal to the DOMON domain, some members from Arabidopsis have been characterized as auxin-responsive or auxin-induced proteins. DOMON domains were initially thought to confer protein-protein interactions. They were subsequently found as a heme-binding motif in cellobiose dehydrogenase, an extracellular fungal oxidoreductase that degrades both lignin and cellulose, and in ethylbenzene dehydrogenase, an enzyme that aids in the anaerobic degradation of hydrocarbons. The domain interacts with sugars in the type 9 carbohydrate binding modules (CBM9), which are present in a variety of glycosyl hydrolases, and it can also be found at the N-terminus of sensor histidine kinases."
definition: >-
  DOMON-like domain of Brassica carinata CIL1 and similar proteins. Brassica carinata CIL1 has been described as involved in suppression of axillary meristem development. It contains a single DOMON domain, the function of which is unclear. Members in this diverse family of plant proteins may have a cytochrome b561 domain C-terminal to the DOMON domain, some members from Arabidopsis have been characterized as auxin-responsive or auxin-induced proteins. DOMON domains were initially thought to confer protein-protein interactions. They were subsequently found as a heme-binding motif in cellobiose dehydrogenase, an extracellular fungal oxidoreductase that degrades both lignin and cellulose, and in ethylbenzene dehydrogenase, an enzyme that aids in the anaerobic degradation of hydrocarbons. The domain interacts with sugars in the type 9 carbohydrate binding modules (CBM9), which are present in a variety of glycosyl hydrolases, and it can also be found at the N-terminus of sensor histidine kinases. — an NCBI CDD conserved domain (cd09629); members share this curated model.
