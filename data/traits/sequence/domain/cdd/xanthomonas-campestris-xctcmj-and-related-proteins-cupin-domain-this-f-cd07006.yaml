identifier: CDD:cd07006
label: "Xanthomonas campestris XcTcmJ and related proteins, cupin domain. This family includes bacterial and archaeal proteins homologous to plant pathogen Xanthomonas campestris tetracenomycin polyketide synthesis protein XcTcmJ, a protein encoded by the tcmJ gene. XcTcmJ is annotated as being involved in tetracenomycin polyketide biosynthesis. Also included is Xc5357 from a different strain of X. campestris. Structure studies show that binding of zinc induces conformational changes and serves a functional role in this cupin protein. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Xanthomonas campestris XcTcmJ and related proteins, cupin domain. This family includes bacterial and archaeal proteins homologous to plant pathogen Xanthomonas campestris tetracenomycin polyketide synthesis protein XcTcmJ, a protein encoded by the tcmJ gene. XcTcmJ is annotated as being involved in tetracenomycin polyketide biosynthesis. Also included is Xc5357 from a different strain of X. campestris. Structure studies show that binding of zinc induces conformational changes and serves a functional role in this cupin protein. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd07006); members share this curated model.
