identifier: CDD:cd11438
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in aryl hydrocarbon receptor nuclear translocator-like protein 1 (ARNTL) and similar proteins. ARNTL, also termed Basic-helix-loop-helix-PAS protein MOP3, or brain and muscle ARNT-like 1 (BMAL1), or Class E basic helix-loop-helix protein 5 (bHLHe5), or member of PAS protein 3, or PAS domain-containing protein 3 (PASD3), or bHLH-PAS protein JAP3, is a member of the bHLH-PAS transcription factor family that forms heterodimers with another bHLH-PAS protein, CLOCK (circadian locomotor output cycle kaput), which regulates circadian rhythm. ARNTL-CLOCK heterodimer complex activates transcription from E-box (CANNTG) elements found in the promoter of circadian responsive genes. ARNTL is highly homologous to ARNT."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in aryl hydrocarbon receptor nuclear translocator-like protein 1 (ARNTL) and similar proteins. ARNTL, also termed Basic-helix-loop-helix-PAS protein MOP3, or brain and muscle ARNT-like 1 (BMAL1), or Class E basic helix-loop-helix protein 5 (bHLHe5), or member of PAS protein 3, or PAS domain-containing protein 3 (PASD3), or bHLH-PAS protein JAP3, is a member of the bHLH-PAS transcription factor family that forms heterodimers with another bHLH-PAS protein, CLOCK (circadian locomotor output cycle kaput), which regulates circadian rhythm. ARNTL-CLOCK heterodimer complex activates transcription from E-box (CANNTG) elements found in the promoter of circadian responsive genes. ARNTL is highly homologous to ARNT. — an NCBI CDD conserved domain (cd11438); members share this curated model.
