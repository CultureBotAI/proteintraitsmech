identifier: CDD:cd11601
label: "N-terminal domain of Nip7 and similar proteins. This domain of various proteins is often found N-terminal to a PUA (PseudoUridine synthase and Archaeosine transglycosylase) RNA binding domain. The family contains Nip7, a protein that was shown to be required for efficient biogenesis of the 60S ribosome subunit in Saccharomyces cerevisiae. Recently, it was demonstrated that human Nip7 is essential in the accurate processing of pre-rRNA. Also included are KD93, a human homolog of Nip7, as well as an archaeal homolog and bacterial RsmB/RsmF family ribosomal methyltransferases."
definition: >-
  N-terminal domain of Nip7 and similar proteins. This domain of various proteins is often found N-terminal to a PUA (PseudoUridine synthase and Archaeosine transglycosylase) RNA binding domain. The family contains Nip7, a protein that was shown to be required for efficient biogenesis of the 60S ribosome subunit in Saccharomyces cerevisiae. Recently, it was demonstrated that human Nip7 is essential in the accurate processing of pre-rRNA. Also included are KD93, a human homolog of Nip7, as well as an archaeal homolog and bacterial RsmB/RsmF family ribosomal methyltransferases. — an NCBI CDD conserved domain (cd11601); members share this curated model.
