identifier: CDD:cd20372
label: Nun
definition: >-
  Coliphage HK022 Nun protein. Phage HK022 Nun protein is a transcription elongation arrest factor that blocks superinfection. Nun interacts with the Escherichia coli ternary elongation complex (TEC) to arrest transcription elongation. Coliphage HK022 Nun protein excludes phage lambda superinfection by specifically blocking TEC translocation on lambda DNA
