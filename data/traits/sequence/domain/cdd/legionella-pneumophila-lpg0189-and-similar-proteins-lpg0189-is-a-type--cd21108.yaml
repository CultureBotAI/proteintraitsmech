label: "Legionella pneumophila Lpg0189 and similar proteins. Lpg0189 is a type II secretion system (T2SS)-dependent exoprotein of Legionella pneumophila and related Legionellales, encoded by the lpw02811 ORF. Homologs of this protein are present within ~65% of Legionella species and are absent from non-Legionella species."
