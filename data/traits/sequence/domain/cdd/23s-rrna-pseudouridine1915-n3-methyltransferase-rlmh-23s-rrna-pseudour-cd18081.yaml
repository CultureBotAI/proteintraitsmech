identifier: CDD:cd18081
label: RlmH-like
definition: >-
  23S-rRNA-pseudouridine1915-N3-methyltransferase RlmH. 23S rRNA (pseudouridine1915-N3)-methyltransferase RlmH catalyzes the addition of a methyl group at the N-3 position of pseudouridine Psi1915 in 23S rRNA to form m(3)Psi1915. This family of proteins belongs to the SPOUT methyltransferases. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot
