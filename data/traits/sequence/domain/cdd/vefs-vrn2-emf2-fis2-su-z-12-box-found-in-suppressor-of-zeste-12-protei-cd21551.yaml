identifier: CDD:cd21551
label: "VEFS (VRN2-EMF2-FIS2-Su(z)12) box found in suppressor of zeste 12 protein (SUZ12) and similar proteins. SUZ12, also called chromatin precipitated E2F target 9 protein (ChET 9 protein), or joined to JAZF1 protein, is a Polycomb group (PcG) protein that acts as a component of the PRC2/EED-EZH2 complex, which methylates 'Lys-9' (H3K9me) and 'Lys-27' (H3K27me) of histone H3, leading to transcriptional repression of the affected target gene. The PRC2/EED-EZH2 complex may also serve as a recruiting platform for DNA methyltransferases, thereby linking two epigenetic repression systems. This model corresponds to the VEFS (VRN2-EMF2-FIS2-Su(z)12) box at the C-terminus of SUZ12, which is responsible for binding to EED and EZH2."
definition: >-
  VEFS (VRN2-EMF2-FIS2-Su(z)12) box found in suppressor of zeste 12 protein (SUZ12) and similar proteins. SUZ12, also called chromatin precipitated E2F target 9 protein (ChET 9 protein), or joined to JAZF1 protein, is a Polycomb group (PcG) protein that acts as a component of the PRC2/EED-EZH2 complex, which methylates 'Lys-9' (H3K9me) and 'Lys-27' (H3K27me) of histone H3, leading to transcriptional repression of the affected target gene. The PRC2/EED-EZH2 complex may also serve as a recruiting platform for DNA methyltransferases, thereby linking two epigenetic repression systems. This model corresponds to the VEFS (VRN2-EMF2-FIS2-Su(z)12) box at the C-terminus of SUZ12, which is responsible for binding to EED and EZH2. — an NCBI CDD conserved domain (cd21551); members share this curated model.
