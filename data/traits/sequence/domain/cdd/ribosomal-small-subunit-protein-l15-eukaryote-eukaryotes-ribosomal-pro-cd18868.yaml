definition: >-
  Ribosomal small subunit protein L15, eukaryote. Eukaryotes ribosomal protein eL15 (L15) has various secondary functions such as overexpresions in gastric and esophageal cancers in human beside the housekeeping role. Eukaryotes have 80S ribosomes, consisting of the small (40S) and the large (60S) subunit. ribosomal proteins
