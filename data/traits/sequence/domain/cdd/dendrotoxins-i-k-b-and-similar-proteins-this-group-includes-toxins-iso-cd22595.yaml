identifier: CDD:cd22595
label: "dendrotoxins I, K, B and similar proteins. This group includes toxins isolated from snake venoms, such as dendrotoxins (DTXs) I, K and B, mambaquaretin-1 (MQ-1) and calcicludine. The dendrotoxins have little or no anti-protease activity but have been shown to block certain subtypes of voltage dependent potassium channels in neurons. Dendroaspis angusticeps (green mamba) alpha-dendrotoxin is a neurotoxin that enhances acetylcholine release at neuromuscular junctions. Studies with cloned K(+) channels show that this toxin blocks Kv1.1, Kv1.2 and Kv1.6 channels in the nanomolar range, whereas Dendroaspis polylepis (black mamba) dendrotoxin K preferentially blocks Kv1.1 channels. Also, structural analogs of dendrotoxins have facilitated defining the molecular recognition properties of different types of K(+) channels, and therefore, dendrotoxins are widely used as probes for studying the function of K(+) channels in physiology and pathophysiology. The structures of these toxins are similar to that of Kunitz-type proteinase  inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  dendrotoxins I, K, B and similar proteins. This group includes toxins isolated from snake venoms, such as dendrotoxins (DTXs) I, K and B, mambaquaretin-1 (MQ-1) and calcicludine. The dendrotoxins have little or no anti-protease activity but have been shown to block certain subtypes of voltage dependent potassium channels in neurons. Dendroaspis angusticeps (green mamba) alpha-dendrotoxin is a neurotoxin that enhances acetylcholine release at neuromuscular junctions. Studies with cloned K(+) channels show that this toxin blocks Kv1.1, Kv1.2 and Kv1.6 channels in the nanomolar range, whereas Dendroaspis polylepis (black mamba) dendrotoxin K preferentially blocks Kv1.1 channels. Also, structural analogs of dendrotoxins have facilitated defining the molecular recognition properties of different types of K(+) channels, and therefore, dendrotoxins are widely used as probes for studying the function of K(+) channels in physiology and pathophysiology. The structures of these toxins are similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22595); members share this curated model.
