identifier: CDD:cd01414
label: "non-metazoan 5-aminoimidazole-4-(N-succinylcarboxamide) ribonucleotide (SAICAR) synthase. Eukaryotic, bacterial, and archaeal group of SAICAR synthetases represented by the Saccharomyces cerevisiae (Sc) enzyme, mostly absent in metazoans. SAICAR synthetase catalyzes the seventh step of the de novo biosynthesis of purine nucleotides (also reported as eighth step). It converts 5-aminoimidazole-4-carboxyribonucleotide (CAIR), ATP, and L-aspartate into 5-aminoimidazole-4-(N-succinylcarboxamide) ribonucleotide (SAICAR), ADP, and phosphate."
definition: >-
  non-metazoan 5-aminoimidazole-4-(N-succinylcarboxamide) ribonucleotide (SAICAR) synthase. Eukaryotic, bacterial, and archaeal group of SAICAR synthetases represented by the Saccharomyces cerevisiae (Sc) enzyme, mostly absent in metazoans. SAICAR synthetase catalyzes the seventh step of the de novo biosynthesis of purine nucleotides (also reported as eighth step). It converts 5-aminoimidazole-4-carboxyribonucleotide (CAIR), ATP, and L-aspartate into 5-aminoimidazole-4-(N-succinylcarboxamide) ribonucleotide (SAICAR), ADP, and phosphate. — an NCBI CDD conserved domain (cd01414); members share this curated model.
