identifier: CDD:cd21601
label: "RNA recognition motif 1 (RRM1) found in Saccharomyces cerevisiae protein PES4, protein MIP6 and similar proteins. The family includes PES4 (also called DNA polymerase epsilon suppressor 4) and MIP6 (also called MEX67-interacting protein 6), both of which are predicted RNA binding proteins that may act as regulators of late translation, protection, and mRNA localization. MIP6 acts as a novel factor for nuclear mRNA export, binds to both poly(A)+ RNA and nuclear pores. It interacts with MEX67. Members in this family contain four RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The model corresponds to the first RRM motif."
definition: >-
  RNA recognition motif 1 (RRM1) found in Saccharomyces cerevisiae protein PES4, protein MIP6 and similar proteins. The family includes PES4 (also called DNA polymerase epsilon suppressor 4) and MIP6 (also called MEX67-interacting protein 6), both of which are predicted RNA binding proteins that may act as regulators of late translation, protection, and mRNA localization. MIP6 acts as a novel factor for nuclear mRNA export, binds to both poly(A)+ RNA and nuclear pores. It interacts with MEX67. Members in this family contain four RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The model corresponds to the first RRM motif. — an NCBI CDD conserved domain (cd21601); members share this curated model.
