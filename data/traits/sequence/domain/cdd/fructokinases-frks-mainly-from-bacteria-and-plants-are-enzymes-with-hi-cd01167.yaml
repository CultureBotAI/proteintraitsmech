identifier: CDD:cd01167
label: "Fructokinases (FRKs) mainly from bacteria and plants are enzymes with high specificity for fructose, as are all FRKs, but they catalyzes the conversion of fructose to fructose-6-phosphate, which is an entry point into glycolysis via conversion into glucose-6-phosphate. This is in contrast to FRKs [or ketohexokinases (KHKs)] from mammalia and halophilic archaebacteria, which phosphorylate fructose to fructose-1-phosphate."
definition: >-
  Fructokinases (FRKs) mainly from bacteria and plants are enzymes with high specificity for fructose, as are all FRKs, but they catalyzes the conversion of fructose to fructose-6-phosphate, which is an entry point into glycolysis via conversion into glucose-6-phosphate. This is in contrast to FRKs [or ketohexokinases (KHKs)] from mammalia and halophilic archaebacteria, which phosphorylate fructose to fructose-1-phosphate. — an NCBI CDD conserved domain (cd01167); members share this curated model.
