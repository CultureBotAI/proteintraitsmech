identifier: CDD:cd20182
label: "Multiple antibiotic resistance Regulator like (MarR-like). Protein of this family are water-soluble that have winged helix-turn-helix signature of the MarR family of transcriptional regulators. MarR family proteins are widely conserved transcription factors that control bacterial resistance to antibiotics, environmental stresses, as well as the regulation of virulence determinants."
definition: >-
  Multiple antibiotic resistance Regulator like (MarR-like). Protein of this family are water-soluble that have winged helix-turn-helix signature of the MarR family of transcriptional regulators. MarR family proteins are widely conserved transcription factors that control bacterial resistance to antibiotics, environmental stresses, as well as the regulation of virulence determinants. — an NCBI CDD conserved domain (cd20182); members share this curated model.
