identifier: CDD:cd08714
label: "Regulator of G protein signaling (RGS) domain found in the RGS4 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS4 protein. RGS4 is a member of the R4/RGS subfamily of the RGS family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G-alpha subunit which leads to G protein deactivation and promotes desensitization. RGS4 is expressed widely in brain including prefrontal cortex, striatum, locus coeruleus (LC), and hippocampus and has been implicated in regulation of opioid, cholinergic, and serotonergic signaling. Dysfunctions in RGS4 proteins are involved  in etiology of Parkinson's disease, addiction, and schizophrenia. RGS4 also is up-regulated in the failing human heart. RGS4 interacts with many binding partners outside of GPCR pathways, including calmodulin, COP, Kir3, PIP, calcium/CaM, PA, ErbB3, and 14-3-3."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS4 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS4 protein. RGS4 is a member of the R4/RGS subfamily of the RGS family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G-alpha subunit which leads to G protein deactivation and promotes desensitization. RGS4 is expressed widely in brain including prefrontal cortex, striatum, locus coeruleus (LC), and hippocampus and has been implicated in regulation of opioid, cholinergic, and serotonergic signaling. Dysfunctions in RGS4 proteins are involved in etiology of Parkinson's disease, addiction, and schizophrenia. RGS4 also is up-regulated in the failing human heart. RGS4 interacts with many binding partners outside of GPCR pathways, including calmodulin, COP, Kir3, PIP, calcium/CaM, PA, ErbB3, and 14-3-3. — an NCBI CDD conserved domain (cd08714); members share this curated model.
