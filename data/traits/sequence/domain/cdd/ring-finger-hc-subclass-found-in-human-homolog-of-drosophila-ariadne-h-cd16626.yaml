identifier: CDD:cd16626
label: "RING finger, HC subclass, found in human homolog of Drosophila ariadne (HHARI) and similar proteins. This subfamily includes Drosophila melanogaster protein ariadne-1 (ARI-1), and its eukaryotic homologs, such as HHARI. ARI-1 is a widely expressed Drosophila RING-finger protein that localizes mainly in the cytoplasm and is required for neural development. It interacts with a novel ubiquitin-conjugating enzyme, UbcD10. HHARI, also known as H7-AP2, monocyte protein 6 (MOP-6), protein ariadne-1 homolog, Ariadne RBR E3 ubiquitin protein ligase 1 (ARIH1), ariadne-1 (ARI-1), UbcH7-binding protein, UbcM4-interacting protein, or ubiquitin-conjugating enzyme E2-binding protein 1, is an RBR-type E3 ubiquitin-protein ligase highly expressed in nuclei, where it is co-localized with nuclear bodies including Cajal, PML, and Lewy bodies. It interacts with the E2 conjugating enzymes UbcH7, UbcH8, UbcM4, and UbcD10 in human, mouse, and fly, and modulates the ubiquitylation of substrate proteins including single-minded 2 (SIM2) and translation initiation factor 4E homologous protein (4EHP). It functions as a potent mediator of DNA damage-induced translation arrest, which protects stem and cancer cells against genotoxic stress by initiating a 4EHP-mediated mRNA translation arrest. HHARI contains an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been corrected as RING-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR (RING1-BRcat-Rcat) domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase function to facilitate the ubiquitination reaction. This model corresponds to the RING domain, a C3HC4-type RING-HC finger required for RBR-mediated ubiquitination."
definition: >-
  RING finger, HC subclass, found in human homolog of Drosophila ariadne (HHARI) and similar proteins. This subfamily includes Drosophila melanogaster protein ariadne-1 (ARI-1), and its eukaryotic homologs, such as HHARI. ARI-1 is a widely expressed Drosophila RING-finger protein that localizes mainly in the cytoplasm and is required for neural development. It interacts with a novel ubiquitin-conjugating enzyme, UbcD10. HHARI, also known as H7-AP2, monocyte protein 6 (MOP-6), protein ariadne-1 homolog, Ariadne RBR E3 ubiquitin protein ligase 1 (ARIH1), ariadne-1 (ARI-1), UbcH7-binding protein, UbcM4-interacting protein, or ubiquitin-conjugating enzyme E2-binding protein 1, is an RBR-type E3 ubiquitin-protein ligase highly expressed in nuclei, where it is co-localized with nuclear bodies including Cajal, PML, and Lewy bodies. It interacts with the E2 conjugating enzymes UbcH7, UbcH8, UbcM4, and UbcD10 in human, mouse, and fly, and modulates the ubiquitylation of substrate proteins including single-minded 2 (SIM2) and translation initiation factor 4E homologous protein (4EHP). It functions as a potent mediator of DNA damage-induced translation arrest, which protects stem and cancer cells against genotoxic stress by initiating a 4EHP-mediated mRNA translation arrest. HHARI contains an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been corrected as RING-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR (RING1-BRcat-Rcat) domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase function to facilitate the ubiquitination reaction. This model corresponds to the RING domain, a C3HC4-type RING-HC finger required for RBR-mediated ubiquitination. — an NCBI CDD conserved domain (cd16626); members share this curated model.
