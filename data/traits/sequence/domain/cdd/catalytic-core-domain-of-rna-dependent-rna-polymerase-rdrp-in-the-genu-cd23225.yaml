identifier: CDD:cd23225
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the genus Mosavirus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within the family Picornaviridae. This group contains the catalytic core domain of the RdRp of RNA viruses belonging to the Mosavirus genus within the family Picornaviridae, order Picornavirales. The Mosavirus contains viruses with (+)ssRNA genomes that produce nonenveloped virions. This genus includes two species: Mosavirus A, which found in the feces of a canyon mouse (Peromyscus crinitus), and Mosavirus B, which contains marmot mosavirus. Mosavirus stands for mouse stool-associated picornavirus. RdRps catalyze RNA template-dependent formation of phosphodiester bonds between ribonucleotides in the presence of divalent metal ions. The initiation of synthesis occurs at the 3'-end of the template in a VPg-dependent manner and proceeds in the direction of 5'-3'. The active sites of RdRps are highly conserved in different species of picornaviruses. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
