identifier: CDD:cd07209
label: "Hypothetical patatin similar to Z1214 protein of Escherichia coli. Patatin-like phospholipase similar to Z1214 protein of Escherichia coli. This family predominantly consists of bacterial patatin glycoproteins and some representatives from eukaryotes and archaea. The patatin protein accounts for up to 40% of the total soluble protein in potato tubers. Patatin is a storage protein, but it also has the enzymatic activity of a lipid acyl hydrolase, catalyzing the cleavage of fatty acids from membrane lipids. Members of this family have also been found in vertebrates."
