identifier: CDD:cd14725
label: "Leucine zipper Dimerization coil of Gal4-like transcription factors. The Gal4p family of transcriptional activators contain an N-terminal DNA-binding domain with a Zn2Cys6 binuclear cluster that interact with CCG triplets and a leucine zipper-like heptad repeat that dimerizes. Dimerization allows binding of targets which contain two CCG motifs oriented in an inverted (CGG-CCG), direct (CCG-CCG), or everted (CCG-CGG) manner. Gal4p family members are involved in the activation of genes in response to a specific signal. Gal4p functions in the induction of GAL genes in the presence of galactose; GAL proteins are responsible for the transport of galactose into the cell and for its metabolism through the glycolytic pathway. Hap1p promotes transcription of genes required for respiration and controlling oxidative damage in response to heme. Put3p activates the transcription of the PUT1 and PUT2 genes in the presence of proline, allowing yeast cells to use proline as a nitrogen source. Sip4p activates target genes under conditions of glucose deprivation while Nir1 plays a role during nitrogen-starvation conditions. This subfamily is composed of uncharacterized members of the Gal4p family."
definition: >-
  Leucine zipper Dimerization coil of Gal4-like transcription factors. The Gal4p family of transcriptional activators contain an N-terminal DNA-binding domain with a Zn2Cys6 binuclear cluster that interact with CCG triplets and a leucine zipper-like heptad repeat that dimerizes. Dimerization allows binding of targets which contain two CCG motifs oriented in an inverted (CGG-CCG), direct (CCG-CCG), or everted (CCG-CGG) manner. Gal4p family members are involved in the activation of genes in response to a specific signal. Gal4p functions in the induction of GAL genes in the presence of galactose; GAL proteins are responsible for the transport of galactose into the cell and for its metabolism through the glycolytic pathway. Hap1p promotes transcription of genes required for respiration and controlling oxidative damage in response to heme. Put3p activates the transcription of the PUT1 and PUT2 genes in the presence of proline, allowing yeast cells to use proline as a nitrogen source. Sip4p activates target genes under conditions of glucose deprivation while Nir1 plays a role during nitrogen-starvation conditions. This subfamily is composed of uncharacterized members of the Gal4p family. — an NCBI CDD conserved domain (cd14725); members share this curated model.
