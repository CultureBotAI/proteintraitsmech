identifier: CDD:cd23245
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Betaflexiviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses, in the order Tymovirales. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Betaflexiviridae, order Tymovirales. Virions within the Betaflexiviridae family are flexuous filaments, usually 12#13 nm in diameter (range 10#15 nm) and from 600 to over 1000 nm in length, depending on the genus. They infect plants which share a distinct lineage of alphavirus-like replication proteins. There are 108 species in the family Betaflexiviridae, assigned to 13 genera in two subfamilies (Quinvirinae and Trivirinae). Diseases associated with this family include: mosaic and ringspot symptoms. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides.."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Betaflexiviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses, in the order Tymovirales. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Betaflexiviridae, order Tymovirales. Virions within the Betaflexiviridae family are flexuous filaments, usually 12#13 nm in diameter (range 10#15 nm) and from 600 to over 1000 nm in length, depending on the genus. They infect plants which share a distinct lineage of alphavirus-like replication proteins. There are 108 species in the family Betaflexiviridae, assigned to 13 genera in two subfamilies (Quinvirinae and Trivirinae). Diseases associated with this family include: mosaic and ringspot symptoms. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides.. — an NCBI CDD conserved domain (cd23245); members share this curated model.
