identifier: CDD:cd15738
label: "FYVE-related domain found in uncharacterized myotubularin-related proteins mainly from eumetazoa. This family includes a group of uncharacterized myotubularin-related proteins mainly found in eumetazoa. Although their biological functions remain unclear, they share similar domain architecture that consists of an N-terminal pleckstrin homology (PH) domain, a highly conserved region related to myotubularin proteins, a C-terminal FYVE domain. The model corresponds to the FYVE domain, which resembles the FYVE-related domain as it has an altered sequence in the basic ligand binding patch."
definition: >-
  FYVE-related domain found in uncharacterized myotubularin-related proteins mainly from eumetazoa. This family includes a group of uncharacterized myotubularin-related proteins mainly found in eumetazoa. Although their biological functions remain unclear, they share similar domain architecture that consists of an N-terminal pleckstrin homology (PH) domain, a highly conserved region related to myotubularin proteins, a C-terminal FYVE domain. The model corresponds to the FYVE domain, which resembles the FYVE-related domain as it has an altered sequence in the basic ligand binding patch. — an NCBI CDD conserved domain (cd15738); members share this curated model.
