identifier: CDD:cd18559
label: "Six-transmembrane helical domain of the ABC transporters, subfamily C. This group represents the 6-transmembrane (6TM) domain of the ABC transporters that belong to the ABCC subfamily, such as the sulphonylurea receptors SUR1/2 (ABCC8), the cystic fibrosis transmembrane conductance regulator (CFTR, ABCC7), Multidrug-Resistance associated Proteins (MRP1-9), VMR1 (vacuolar multidrug resistance protein 1), and YOR1 (yeast oligomycin resistance transporter protein). This TM subunit exhibits the type 3 ATP-binding cassette (ABC) exporter fold, which is characterized by 6 TM helices per subunit (domain), or a total of 12 TM helices for the complete transporter. The type 3 ABC exporters are found in both prokaryotes and eukaryotes, where they mediate the cellular secretion of toxic compounds, a various type of lipids and polypeptides."
definition: >-
