identifier: CDD:cd16598
label: "RING finger, HC subclass, found in tripartite motif-containing protein 26 (TRIM26) and similar proteins. TRIM26, also known as acid finger protein (AFP), RING finger protein 95 (RNF95), or zinc finger protein 173 (ZNF173), is an E3 ubiquitin-protein ligase that negatively regulates interferon-beta production and antiviral response through polyubiquitination and degradation of nuclear transcription factor IRF3. It functions as an important regulator for RNA virus-triggered innate immune response by bridging TBK1 to NEMO (NF-kappaB essential modulator, also known as IKKgamma) and mediating TBK1 activation. It also acts as a novel tumor suppressor of hepatocellular carcinoma by regulating cancer cell proliferation, colony forming ability, migration, and invasion. TRIM26 belongs the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, a B-box, and two coiled coil domains, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 26 (TRIM26) and similar proteins. TRIM26, also known as acid finger protein (AFP), RING finger protein 95 (RNF95), or zinc finger protein 173 (ZNF173), is an E3 ubiquitin-protein ligase that negatively regulates interferon-beta production and antiviral response through polyubiquitination and degradation of nuclear transcription factor IRF3. It functions as an important regulator for RNA virus-triggered innate immune response by bridging TBK1 to NEMO (NF-kappaB essential modulator, also known as IKKgamma) and mediating TBK1 activation. It also acts as a novel tumor suppressor of hepatocellular carcinoma by regulating cancer cell proliferation, colony forming ability, migration, and invasion. TRIM26 belongs the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, a B-box, and two coiled coil domains, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16598); members share this curated model.
