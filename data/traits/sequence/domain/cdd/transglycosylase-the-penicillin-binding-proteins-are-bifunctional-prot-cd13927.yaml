label: Transgly
definition: >-
  Transglycosylase. The penicillin-binding proteins are bifunctional proteins consisting of transglycosylase and transpeptidase in the N- and C-terminus respectively. The transglycosylase domain catalyzes the polymerisation of murein glycan chains
