identifier: CDD:cd15971
label: "somatostatin receptor type 2, member of the class A family of seven-transmembrane G protein-coupled receptors. G protein-coupled somatostatin receptors (SSTRs), which display strong sequence similarity with opioid receptors, binds somatostatin, a polypeptide hormone that regulates a wide variety of physiological such as neurotransmission, endocrine secretion, cell proliferation, and smooth muscle contractility. SSTRs are composed of five distinct subtypes (SSTR1-5) which are encoded by separate genes on different chromosomes. SSTR2 plays critical roles in growth hormone secretion, glucagon secretion, and immune responses. SSTR2 is expressed in the normal human pituitary and in nearly all pituitary growth hormone adenomas."
definition: >-
