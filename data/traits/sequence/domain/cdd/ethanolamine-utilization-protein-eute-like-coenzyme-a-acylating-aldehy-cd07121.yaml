identifier: CDD:cd07121
label: "Ethanolamine utilization protein EutE-like. Coenzyme A acylating aldehyde dehydrogenase (ACDH), an NAD+ and CoA-dependent acetaldehyde dehydrogenase, acetylating (EC=1.2.1.10), converts acetaldehyde into acetyl-CoA.  This CD is limited to such monofunctional enzymes as the Ethanolamine utilization protein, EutE, in Salmonella typhimurium.  Mutations in eutE abolish the ability to utilize ethanolamine as a carbon source."
definition: >-
  Ethanolamine utilization protein EutE-like. Coenzyme A acylating aldehyde dehydrogenase (ACDH), an NAD+ and CoA-dependent acetaldehyde dehydrogenase, acetylating (EC=1.2.1.10), converts acetaldehyde into acetyl-CoA. This CD is limited to such monofunctional enzymes as the Ethanolamine utilization protein, EutE, in Salmonella typhimurium. Mutations in eutE abolish the ability to utilize ethanolamine as a carbon source. — an NCBI CDD conserved domain (cd07121); members share this curated model.
