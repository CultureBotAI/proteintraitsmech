label: "Giardia lamblia aldose reductase (AR) and similar proteins. Giardia lamblia AR (EC 1.1.1.21), also called aldehyde reductase, is the prototype of this family. It catalyzes the NADPH-dependent reduction of a wide variety of carbonyl-containing compounds to their corresponding alcohols with a broad range of catalytic efficiencies."
