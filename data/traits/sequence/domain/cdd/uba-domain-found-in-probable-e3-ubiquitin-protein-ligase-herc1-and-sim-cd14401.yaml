identifier: CDD:cd14401
label: "UBA domain found in probable E3 ubiquitin-protein ligase HERC1 and similar proteins. HERC1, also called HECT domain and RCC1-like domain-containing protein 1, or p532, or p619, is an ubiquitously expressed multi-domain protein involved in ubiquitin-dependent intracellular membrane trafficking through its interaction with vesicle coat proteins such as clathrin and ARF. Moreover, it has been identified as a tuberous sclerosis complex TSC2-interacting protein that may play a role in TSC-mTOR (mammalian target of rapamycin) pathway. In addition to a ubiquitin-association (UBA) domain, HERC1 contains more than one RCC1-like domains (RLDs) and a C-terminal HECT E3 ubiquitin ligase domain. At this point, it may function as both E3 ubiquitin ligases and guanine nucleotide exchange factors (GEFs)."
definition: >-
  UBA domain found in probable E3 ubiquitin-protein ligase HERC1 and similar proteins. HERC1, also called HECT domain and RCC1-like domain-containing protein 1, or p532, or p619, is an ubiquitously expressed multi-domain protein involved in ubiquitin-dependent intracellular membrane trafficking through its interaction with vesicle coat proteins such as clathrin and ARF. Moreover, it has been identified as a tuberous sclerosis complex TSC2-interacting protein that may play a role in TSC-mTOR (mammalian target of rapamycin) pathway. In addition to a ubiquitin-association (UBA) domain, HERC1 contains more than one RCC1-like domains (RLDs) and a C-terminal HECT E3 ubiquitin ligase domain. At this point, it may function as both E3 ubiquitin ligases and guanine nucleotide exchange factors (GEFs). — an NCBI CDD conserved domain (cd14401); members share this curated model.
