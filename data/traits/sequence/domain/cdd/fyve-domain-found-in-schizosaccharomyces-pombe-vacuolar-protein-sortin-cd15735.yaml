identifier: CDD:cd15735
label: "FYVE domain found in Schizosaccharomyces pombe vacuolar protein sorting-associated protein 27 (spVps27p) and similar proteins. spVps27p, also termed suppressor of ste12 deletion protein 4 (Sst4p), is a conserved homolog of budding Saccharomyces cerevisiae Vps27 and of mammalian Hrs. It functions as a downstream factor for phosphatidylinositol 3-kinase (PtdIns 3-kinase) in forespore membrane formation with normal morphology. It colocalizes and interacts with Hse1p, a homolog of Saccharomyces cerevisiae Hse1p and of mammalian STAM, to form a complex whose ubiquitin-interacting motifs (UIMs) are important for sporulation. spVps27p contains a VHS (Vps27p/Hrs/Stam) domain, a FYVE domain, and two UIMs."
definition: >-
  FYVE domain found in Schizosaccharomyces pombe vacuolar protein sorting-associated protein 27 (spVps27p) and similar proteins. spVps27p, also termed suppressor of ste12 deletion protein 4 (Sst4p), is a conserved homolog of budding Saccharomyces cerevisiae Vps27 and of mammalian Hrs. It functions as a downstream factor for phosphatidylinositol 3-kinase (PtdIns 3-kinase) in forespore membrane formation with normal morphology. It colocalizes and interacts with Hse1p, a homolog of Saccharomyces cerevisiae Hse1p and of mammalian STAM, to form a complex whose ubiquitin-interacting motifs (UIMs) are important for sporulation. spVps27p contains a VHS (Vps27p/Hrs/Stam) domain, a FYVE domain, and two UIMs. — an NCBI CDD conserved domain (cd15735); members share this curated model.
