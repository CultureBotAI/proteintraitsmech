identifier: CDD:cd05218
label: KTN_K_channel_domain
definition: >-
  KTN (k+ transport, nucleotide binding) domains are found in a number of ion transport systems, including Trk uptake systems, efflux systems such as Kef, and Ktr active transport. KTN is a conserved intracellular domain of prokayotic and eukaryotic potasium channels and transporters. These proteins have a traditional Rossmann fold topology, and form dimers thru a C-terminal helix. Unlike the related Rck domain, these proteins exhibit a GxGxxG nucleotide binding motif, and bind NAD+ in the hinge region between monomers. Binding of NADH is accompanied by a conformational switch, with the hinge region becoming a large empty groove
