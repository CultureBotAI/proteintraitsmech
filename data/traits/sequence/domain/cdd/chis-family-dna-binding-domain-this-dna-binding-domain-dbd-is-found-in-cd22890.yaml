identifier: CDD:cd22890
label: "ChiS-family DNA-Binding domain. This DNA-binding domain (DBD) is found in Vibrio cholerae sensor histidine kinase ChiS and related proteins. ChiS senses chitin, an abundant source of carbon and nitrogen for V. cholerae and other marine bacteria, and in response to chitin activates the expression of the chitin utilization program. ChiS can directly bind to DNA to regulate the expression of the chitobiose operon, chbBCARFG which is required for the uptake and degradation of the chitin disaccharide chitobiose. This ChiS DBD contains a distinct variant of the canonical helix-turn-helix domain (termed a helix-sheet-helix), in which the canonical tight turn of the HTH is replaced with an insertion containing a beta-sheet. Residues within the ChiS helix-sheet-helix are critical for DNA binding. The ChiS DBD is conserved in diverse proteobacterial proteins and may represent a novel group of transcriptional regulators. Unlike prototypical TCSs, that ChiS DNA binding is diminished, rather than stimulated, by phosphorylation, and ChiS may activates gene expression by directly recruiting RNA polymerase."
definition: >-
  ChiS-family DNA-Binding domain. This DNA-binding domain (DBD) is found in Vibrio cholerae sensor histidine kinase ChiS and related proteins. ChiS senses chitin, an abundant source of carbon and nitrogen for V. cholerae and other marine bacteria, and in response to chitin activates the expression of the chitin utilization program. ChiS can directly bind to DNA to regulate the expression of the chitobiose operon, chbBCARFG which is required for the uptake and degradation of the chitin disaccharide chitobiose. This ChiS DBD contains a distinct variant of the canonical helix-turn-helix domain (termed a helix-sheet-helix), in which the canonical tight turn of the HTH is replaced with an insertion containing a beta-sheet. Residues within the ChiS helix-sheet-helix are critical for DNA binding. The ChiS DBD is conserved in diverse proteobacterial proteins and may represent a novel group of transcriptional regulators. Unlike prototypical TCSs, that ChiS DNA binding is diminished, rather than stimulated, by phosphorylation, and ChiS may activates gene expression by directly recruiting RNA polymerase. — an NCBI CDD conserved domain (cd22890); members share this curated model.
