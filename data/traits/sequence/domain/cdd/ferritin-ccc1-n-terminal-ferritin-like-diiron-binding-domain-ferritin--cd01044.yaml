identifier: CDD:cd01044
label: "Ferritin-CCC1, N-terminal ferritin-like diiron-binding domain. Ferritin-like N-terminal domain present in an uncharacterized family of proteins found in bacteria and archaea.  These proteins also have a C-terminal CCC1-like transmembrane domain and are thought to be involved in iron and/or manganese transport.  This domain has the conserved residues of a diiron center found in other ferritin-like proteins."
definition: >-
  Ferritin-CCC1, N-terminal ferritin-like diiron-binding domain. Ferritin-like N-terminal domain present in an uncharacterized family of proteins found in bacteria and archaea. These proteins also have a C-terminal CCC1-like transmembrane domain and are thought to be involved in iron and/or manganese transport. This domain has the conserved residues of a diiron center found in other ferritin-like proteins. — an NCBI CDD conserved domain (cd01044); members share this curated model.
