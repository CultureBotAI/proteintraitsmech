identifier: CDD:cd13129
label: "Multidrug and toxic compound extrusion family and similar proteins. This model represents a subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins, including Ralstonia solanaceraum GMI1000 epsE, which may be involved in exporting exopolysaccharide EPS I, a virulence factor. Proteins from the MATE family are involved in exporting metabolites across the cell membrane and are often responsible for multidrug resistance (MDR)."
definition: >-
  Multidrug and toxic compound extrusion family and similar proteins. This model represents a subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins, including Ralstonia solanaceraum GMI1000 epsE, which may be involved in exporting exopolysaccharide EPS I, a virulence factor. Proteins from the MATE family are involved in exporting metabolites across the cell membrane and are often responsible for multidrug resistance (MDR). — an NCBI CDD conserved domain (cd13129); members share this curated model.
