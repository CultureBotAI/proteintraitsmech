identifier: CDD:cd19693
label: "basic helix-loop-helix (bHLH) domain found in DNA-binding protein inhibitor ID3 and similar proteins. ID3, also termed Class B basic helix-loop-helix protein 25 (bHLHb25), or helix-loop-helix protein HEIR-1, or ID-like protein inhibitor HLH 1R21, or inhibitor of DNA binding 3, or inhibitor of differentiation 3, is a dominant negative helix-loop-helix (dnHLH) transcriptional regulator (lacking a basic DNA binding domain) which negatively regulates the bHLH transcription factors by forming heterodimers and inhibiting their DNA binding and transcriptional activity. It negatively regulates muscle differentiation by inhibiting the DNA-binding activities of the myogenic regulatory factors."
definition: >-
  basic helix-loop-helix (bHLH) domain found in DNA-binding protein inhibitor ID3 and similar proteins. ID3, also termed Class B basic helix-loop-helix protein 25 (bHLHb25), or helix-loop-helix protein HEIR-1, or ID-like protein inhibitor HLH 1R21, or inhibitor of DNA binding 3, or inhibitor of differentiation 3, is a dominant negative helix-loop-helix (dnHLH) transcriptional regulator (lacking a basic DNA binding domain) which negatively regulates the bHLH transcription factors by forming heterodimers and inhibiting their DNA binding and transcriptional activity. It negatively regulates muscle differentiation by inhibiting the DNA-binding activities of the myogenic regulatory factors. — an NCBI CDD conserved domain (cd19693); members share this curated model.
