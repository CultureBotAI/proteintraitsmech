identifier: CDD:cd03840
label: "FMN binding protein. Members of this hierarchy are flavin mononucleotide (FMN) binding domains. This subfamily contains proteins similar to Desulfovibrio vulgaris FMN_bp, one of the smallest FMN-binding proteins known. Its biological function is unknown, the protein may take part in an electron transfer pathway."
definition: >-
