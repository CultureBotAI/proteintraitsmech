identifier: CDD:cd18153
label: "PagP. PagP, an integral membrane enzyme, transfers a palmitoyl group from the sn-1 position of a glycerophospholipid to the lipid A (endotoxin) moiety of lipopolysaccharide (LPS) resulting in the production of a palmitoylated lipid A and a lysophospholipid by-product, allowing Escherichia coli to evade host immune defenses during infection. PagP measures the palmitoyl group with an internal hydrocarbon ruler that is formed in the interior of the eight-stranded antiparallel beta barrel. The access and egress of the palmitoyl group is thought to take a lateral route from the bilayer phase to the barrel interior. The phospholipid access occurs at the crenel present between strands F and G of PagP with the phospholipid head group can remain exposed to the cell exterior while the lipid acyl chain remains in a predominantly hydrophobic environment as it translocates to the protein interior."
definition: >-
  PagP. PagP, an integral membrane enzyme, transfers a palmitoyl group from the sn-1 position of a glycerophospholipid to the lipid A (endotoxin) moiety of lipopolysaccharide (LPS) resulting in the production of a palmitoylated lipid A and a lysophospholipid by-product, allowing Escherichia coli to evade host immune defenses during infection. PagP measures the palmitoyl group with an internal hydrocarbon ruler that is formed in the interior of the eight-stranded antiparallel beta barrel. The access and egress of the palmitoyl group is thought to take a lateral route from the bilayer phase to the barrel interior. The phospholipid access occurs at the crenel present between strands F and G of PagP with the phospholipid head group can remain exposed to the cell exterior while the lipid acyl chain remains in a predominantly hydrophobic environment as it translocates to the protein interior. — an NCBI CDD conserved domain (cd18153); members share this curated model.
