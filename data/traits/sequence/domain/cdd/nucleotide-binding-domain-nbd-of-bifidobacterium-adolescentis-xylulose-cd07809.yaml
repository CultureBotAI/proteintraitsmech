identifier: CDD:cd07809
label: "nucleotide-binding domain (NBD) of Bifidobacterium adolescentis xylulose kinase (XK) and similar proteins. The subfamily includes a group of uncharacterized proteins with similarity to xylulose kinases (XKs) from Bifidobacterium adolescentis, Streptomyces coelicolor, Actinoplanes missouriensis and Haemophilus influenzae. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of Bifidobacterium adolescentis xylulose kinase (XK) and similar proteins. The subfamily includes a group of uncharacterized proteins with similarity to xylulose kinases (XKs) from Bifidobacterium adolescentis, Streptomyces coelicolor, Actinoplanes missouriensis and Haemophilus influenzae. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07809); members share this curated model.
