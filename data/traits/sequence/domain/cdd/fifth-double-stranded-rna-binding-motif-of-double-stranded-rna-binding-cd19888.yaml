identifier: CDD:cd19888
label: "fifth double-stranded RNA binding motif of double-stranded RNA-binding protein Staufen homolog 2 (Staufen 2) and similar proteins. Staufen 2 is an RNA-binding protein required for the microtubule-dependent transport of neuronal RNA from the cell body to the dendrite. Staufen 2 contains five double-stranded RNA binding motifs (DSRMs). This model describes the fifth motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  fifth double-stranded RNA binding motif of double-stranded RNA-binding protein Staufen homolog 2 (Staufen 2) and similar proteins. Staufen 2 is an RNA-binding protein required for the microtubule-dependent transport of neuronal RNA from the cell body to the dendrite. Staufen 2 contains five double-stranded RNA binding motifs (DSRMs). This model describes the fifth motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19888); members share this curated model.
