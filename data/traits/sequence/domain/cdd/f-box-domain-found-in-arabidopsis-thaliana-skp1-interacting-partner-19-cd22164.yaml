identifier: CDD:cd22164
label: "F-box domain found in Arabidopsis thaliana SKP1-interacting partner 19 (AtSKIP19) and similar proteins. AtSKIP19, also called F-box protein SKIP19, or F-box/LRR-repeat protein 20 (FBL20), is a component of SCF (SPK1/ASK-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It interacts with CUL1 and SPK1B/ASK2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana SKP1-interacting partner 19 (AtSKIP19) and similar proteins. AtSKIP19, also called F-box protein SKIP19, or F-box/LRR-repeat protein 20 (FBL20), is a component of SCF (SPK1/ASK-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It interacts with CUL1 and SPK1B/ASK2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22164); members share this curated model.
