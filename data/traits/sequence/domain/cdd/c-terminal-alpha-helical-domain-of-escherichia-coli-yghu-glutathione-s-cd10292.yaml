identifier: CDD:cd10292
label: "C-terminal, alpha helical domain of Escherichia coli Yghu Glutathione S-transferases and related uncharacterized proteins. Glutathione S-transferase (GST) C-terminal domain family, YghU-like subfamily; composed of the Escherichia coli YghU and related proteins. GSTs are cytosolic dimeric proteins involved in cellular detoxification by catalyzing the conjugation of glutathione (GSH) with a wide range of endogenous and xenobiotic alkylating agents, including carcinogens, therapeutic drugs, environmental toxins and products of oxidative stress. GSTs also show GSH peroxidase activity and are involved in the synthesis of prostaglandins and leukotrienes. The GST active site is located in a cleft between the N- and C-terminal domains. GSH binds to the N-terminal domain while the hydrophobic substrate occupies a pocket in the C-terminal domain. YghU is one of nine GST homologs in the genome of Escherichia coli. It is similar to Escherichia coli YfcG in that it has poor GSH transferase activity towards typical substrates. It shows modest reductase activity towards some organic hydroperoxides. Like YfcG, YghU also shows good disulfide bond oxidoreductase activity comparable to the activities of glutaredoxins and thioredoxins. YghU does not contain a redox active cysteine residue, and may use a bound thiol disulfide couple such as 2GSH/GSSG for activity. The crystal structure of YghU reveals two GSH molecules bound in its active site."
