identifier: CDD:cd17389
label: "Major facilitator superfamily domain-containing protein 10. Major facilitator superfamily domain-containing protein 10 (MFSD10) is also called tetracycline transporter-like protein (TETRAN). It is expressed in various human tissues, including the kidney. In cultured cells, its overexpression facilitated the uptake of organic anions such as some non-steroidal anti-inflammatory drugs (NSAIDs). MFSD10/TETRAN overexpression cause resistance to some NSAIDs, suggesting that it may be an organic anion transporter that serves as an efflux pump for some NSAIDs and various other organic anions at the final excretion step. MFSD10 belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing protein 10. Major facilitator superfamily domain-containing protein 10 (MFSD10) is also called tetracycline transporter-like protein (TETRAN). It is expressed in various human tissues, including the kidney. In cultured cells, its overexpression facilitated the uptake of organic anions such as some non-steroidal anti-inflammatory drugs (NSAIDs). MFSD10/TETRAN overexpression cause resistance to some NSAIDs, suggesting that it may be an organic anion transporter that serves as an efflux pump for some NSAIDs and various other organic anions at the final excretion step. MFSD10 belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17389); members share this curated model.
