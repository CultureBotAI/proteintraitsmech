identifier: CDD:cd21770
label: NRD_FoxM1
definition: >-
  negative regulatory domain (NRD) found in forkhead box protein M1 (FoxM1) and similar proteins. FoxM1, also called forkhead-related protein FKHL16, or hepatocyte nuclear factor 3 forkhead homolog 11 (HFH-11), or HNF-3/fork-head homolog 11, or M-phase phosphoprotein 2, or MPM-2 reactive phosphoprotein 2, or transcription factor Trident, or winged-helix factor from INS-1 cells, is a transcriptional factor regulating the expression of cell cycle genes essential for DNA replication and mitosis. It plays a role in the control of cell proliferation, as well as in DNA breaks repair participating in the DNA damage checkpoint response. FoxM1 contains four distinct functional domains: a negative regulatory domain (NRD), a DNA binding domain (DBD), a region containing several cyclin-dependent kinase (Cdk) consensus sites (called here the Cdk site region or CSR) and a transactivation domain (TAD). The model corresponds to NRD domain, which negatively regulates the TAD through a sequestration mechanism and inhibits transcription factor transactivation activity early in the cell cycle
