identifier: CDD:cd16258
label: "Domain III of Tetracycline resistance protein Tet. Tetracycline resistance proteins, including TetM and TetO, catalyze the release of tetracycline (Tc) from the ribosome in a GTP-dependent manner thereby mediating Tc resistance. Tcs are broad-spectrum antibiotics. Typical Tcs bind to the ribosome and inhibit the elongation phase of protein synthesis, by inhibiting the occupation of site A by aminoacyl-tRNA."
definition: >-
  Domain III of Tetracycline resistance protein Tet. Tetracycline resistance proteins, including TetM and TetO, catalyze the release of tetracycline (Tc) from the ribosome in a GTP-dependent manner thereby mediating Tc resistance. Tcs are broad-spectrum antibiotics. Typical Tcs bind to the ribosome and inhibit the elongation phase of protein synthesis, by inhibiting the occupation of site A by aminoacyl-tRNA. — an NCBI CDD conserved domain (cd16258); members share this curated model.
