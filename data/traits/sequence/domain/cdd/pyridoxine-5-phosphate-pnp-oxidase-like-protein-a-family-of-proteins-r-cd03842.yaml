identifier: CDD:cd03842
label: PNPOx_like_5
definition: >-
  Pyridoxine 5'-phosphate (PNP) oxidase-like protein. A family of proteins relates to PNP oxidases and other flavin mononucleotide (FMN) binding proteins which catalyze FMN-mediated redox reactions. The electron is transferred from substrate to FMN and then pass along to another substrate. The specific function of this family is unknown
