identifier: CDD:cd01083
label: "Glycosaminoglycan (GAG) polysaccharide lyase family. This family consists of a group of secreted bacterial lyase enzymes capable of acting on glycosaminoglycans, such as hyaluronan and chondroitin, in the extracellular matrix of host tissues, contributing to the invasive capacity of the pathogen. These are broad-specificity glycosaminoglycan lyases which recognize uronyl residues in polysaccharides and cleave their glycosidic bonds via a beta-elimination reaction to form a double bond between C-4 and C-5 of the non-reducing terminal uronyl residues of released products. Substrates include chondroitin, chondroitin 4-sulfate, chondroitin 6-sulfate, and hyaluronic acid. Family members include chondroitin AC lyase, chondroitin abc lyase, xanthan lyase, and hyalurate lyase."
definition: >-
  Glycosaminoglycan (GAG) polysaccharide lyase family. This family consists of a group of secreted bacterial lyase enzymes capable of acting on glycosaminoglycans, such as hyaluronan and chondroitin, in the extracellular matrix of host tissues, contributing to the invasive capacity of the pathogen. These are broad-specificity glycosaminoglycan lyases which recognize uronyl residues in polysaccharides and cleave their glycosidic bonds via a beta-elimination reaction to form a double bond between C-4 and C-5 of the non-reducing terminal uronyl residues of released products. Substrates include chondroitin, chondroitin 4-sulfate, chondroitin 6-sulfate, and hyaluronic acid. Family members include chondroitin AC lyase, chondroitin abc lyase, xanthan lyase, and hyalurate lyase. — an NCBI CDD conserved domain (cd01083); members share this curated model.
