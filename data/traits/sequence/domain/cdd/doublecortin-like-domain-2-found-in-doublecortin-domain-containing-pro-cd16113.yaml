identifier: CDD:cd16113
label: "Doublecortin-like domain 2 found in doublecortin domain-containing protein 2 (DCDC2). DCDC2 is a member of the doublecortin (DCX) family. It is a microtubule-associated protein (MAP) with stable double tandem DCX repeats of a ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. DCDC2 genetic variation in humans is associated with reading disability, attention deficit hyperactivity disorder (ADHD), and difficulties in mathematics. A genetic variant of DCDC2 associates with dyslexia, a common neurobehavioral disorder of reading. DCDC2 protein interacts with many of the same cytoskeleton related proteins that other members of the DCX family interact with."
definition: >-
  Doublecortin-like domain 2 found in doublecortin domain-containing protein 2 (DCDC2). DCDC2 is a member of the doublecortin (DCX) family. It is a microtubule-associated protein (MAP) with stable double tandem DCX repeats of a ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. DCDC2 genetic variation in humans is associated with reading disability, attention deficit hyperactivity disorder (ADHD), and difficulties in mathematics. A genetic variant of DCDC2 associates with dyslexia, a common neurobehavioral disorder of reading. DCDC2 protein interacts with many of the same cytoskeleton related proteins that other members of the DCX family interact with. — an NCBI CDD conserved domain (cd16113); members share this curated model.
