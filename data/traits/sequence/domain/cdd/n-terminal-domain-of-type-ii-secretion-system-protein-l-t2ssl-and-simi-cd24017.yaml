identifier: CDD:cd24017
label: "N-terminal domain of type II secretion system protein L (T2SSL) and similar proteins. Type II secretion system is composed of four main components: the outer membrane complex, the inner membrane complex, the cytoplasmic secretion ATPase and the periplasm-spanning pseudopilus. T2SSL, also called T2SS protein L, or general secretion pathway protein L, is an inner membrane component of the type II secretion system, also called secretion-dependent pathway (SDP), required for the energy-dependent secretion of extracellular factors such as proteases and toxins from the periplasm. T2SSL is predicted to contain a large cytoplasmic domain and has been shown to interact with the autophosphorylating cytoplasmic membrane protein T2SSE. It is thought that the tri-molecular complex of T2SSL, T2SSE and T2SSM might be involved in regulating the opening and closing of the secretion pore and/or transducing energy to the site of outer membrane translocation. The model corresponds to the N-terminal domain of T2SSL. It is a cytoplasmic domain that shows structural homology with the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. T2SSL is entirely missing domains 1B and 2B of the typical ASKHA proteins. The domain 2B of the ASKHA superfamily is critically important for binding the adenosine part of ATP. Due to the absence of 2B domain in T2SSL, it is therefore unlikely that T2SSL is an ATP-binding protein."
definition: >-
  N-terminal domain of type II secretion system protein L (T2SSL) and similar proteins. Type II secretion system is composed of four main components: the outer membrane complex, the inner membrane complex, the cytoplasmic secretion ATPase and the periplasm-spanning pseudopilus. T2SSL, also called T2SS protein L, or general secretion pathway protein L, is an inner membrane component of the type II secretion system, also called secretion-dependent pathway (SDP), required for the energy-dependent secretion of extracellular factors such as proteases and toxins from the periplasm. T2SSL is predicted to contain a large cytoplasmic domain and has been shown to interact with the autophosphorylating cytoplasmic membrane protein T2SSE. It is thought that the tri-molecular complex of T2SSL, T2SSE and T2SSM might be involved in regulating the opening and closing of the secretion pore and/or transducing energy to the site of outer membrane translocation. The model corresponds to the N-terminal domain of T2SSL. It is a cytoplasmic domain that shows structural homology with the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. T2SSL is entirely missing domains 1B and 2B of the typical ASKHA proteins. The domain 2B of the ASKHA superfamily is critically important for binding the adenosine part of ATP. Due to the absence of 2B domain in T2SSL, it is therefore unlikely that T2SSL is an ATP-binding protein. — an NCBI CDD conserved domain (cd24017); members share this curated model.
