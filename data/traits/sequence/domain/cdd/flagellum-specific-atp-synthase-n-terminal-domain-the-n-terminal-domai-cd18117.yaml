identifier: CDD:cd18117
label: "Flagellum-specific ATP synthase, N-terminal domain. The N-terminal domain of the flagellum-specific ATPase/type III secretory pathway virulence-related protein. This group of ATPases are responsible for the export of flagellum and virulence-related proteins.  The FliI ATPase is the soluble export component that drives flagellar protein export, and it shows extensive similarity to the alpha and beta subunits of F1-ATP synthase. Although they both are proton driven rotary molecular devices, the main function of the bacterial flagellar motor is to rotate the flagellar filament for cell motility. Intracellular pathogens, such as Salmonella and Chlamydia, also have proteins which are similar to the flagellar-specific ATPase, but function in the secretion of virulence-related proteins via the type III secretory pathway."
definition: >-
  Flagellum-specific ATP synthase, N-terminal domain. The N-terminal domain of the flagellum-specific ATPase/type III secretory pathway virulence-related protein. This group of ATPases are responsible for the export of flagellum and virulence-related proteins. The FliI ATPase is the soluble export component that drives flagellar protein export, and it shows extensive similarity to the alpha and beta subunits of F1-ATP synthase. Although they both are proton driven rotary molecular devices, the main function of the bacterial flagellar motor is to rotate the flagellar filament for cell motility. Intracellular pathogens, such as Salmonella and Chlamydia, also have proteins which are similar to the flagellar-specific ATPase, but function in the secretion of virulence-related proteins via the type III secretory pathway. — an NCBI CDD conserved domain (cd18117); members share this curated model.
