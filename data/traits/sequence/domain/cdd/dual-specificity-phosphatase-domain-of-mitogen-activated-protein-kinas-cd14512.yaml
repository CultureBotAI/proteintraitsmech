identifier: CDD:cd14512
label: "dual specificity phosphatase domain of mitogen-activated protein kinase phosphatase. Mitogen-activated protein kinase (MAPK) phosphatases (MKPs) are eukaryotic dual-specificity phosphatases (DUSPs) that act on MAPKs, which are involved in gene regulation, cell proliferation, programmed cell death and stress responses, as an important feedback control mechanism that limits MAPK cascades. MKPs, also referred to as typical DUSPs, function as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). They deactivate MAPKs by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. All MKPs contain an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. Based on sequence homology, subcellular localization and substrate specificity, 10 MKPs can be subdivided into three subfamilies (class I-III)."
definition: >-
  dual specificity phosphatase domain of mitogen-activated protein kinase phosphatase. Mitogen-activated protein kinase (MAPK) phosphatases (MKPs) are eukaryotic dual-specificity phosphatases (DUSPs) that act on MAPKs, which are involved in gene regulation, cell proliferation, programmed cell death and stress responses, as an important feedback control mechanism that limits MAPK cascades. MKPs, also referred to as typical DUSPs, function as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). They deactivate MAPKs by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. All MKPs contain an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. Based on sequence homology, subcellular localization and substrate specificity, 10 MKPs can be subdivided into three subfamilies (class I-III). — an NCBI CDD conserved domain (cd14512); members share this curated model.
