identifier: CDD:cd19380
label: "transforming growth factor beta (TGF-beta) like domain found in glial cell line-derived neurotrophic factor (GDNF) and similar proteins. GDNF, also termed astrocyte-derived trophic factor (ATF), is a member of the glial cell-line-derived neurotrophic factor (GDNF) family. It acts as a neurotrophic factor that enhances survival and morphological differentiation of dopaminergic neurons and increases their high-affinity dopamine uptake."
definition: >-
