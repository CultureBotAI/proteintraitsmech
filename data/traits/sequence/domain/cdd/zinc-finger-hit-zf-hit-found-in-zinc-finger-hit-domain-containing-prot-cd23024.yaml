identifier: CDD:cd23024
label: "zinc finger HIT (zf-HIT) found in zinc finger HIT domain-containing protein 2 (ZNHIT2), 3 (ZNHIT3) and similar proteins. ZNHIT2 and ZNHIT3 are members of the zf-HIT domain-containing protein family that play crucial roles in various biological processes. ZNHIT2 acts as a bridging factor between the R2TP/PFDL complex and U5 snRNP, while ZNHIT3 interacts specifically with the ligand binding domain of the thyroid receptor and is involved in small nucleolar ribonucleoprotein particle assembly, transcriptional regulation, and snoRNP assembly. ZNHIT3 is also associated with HNF-4alpha and may play a role in MODY, while its dysfunction is linked to PEHO syndrome. Both proteins contain the zf-HIT domain and interact with other proteins through their HIT-type zinc finger in the presence of ATP, ADP, or other factors."
