identifier: CDD:cd12723
label: "RNA recognition motif 1 (RRM1) found in cytoplasmic polyadenylation element-binding protein 1 (CPEB-1) and similar proteins. This subgroup corresponds to the RRM2 of CPEB-1 (also termed CPE-BP1 or CEBP), an RNA-binding protein that interacts with the cytoplasmic polyadenylation element (CPE), a short U-rich motif in the 3' untranslated regions (UTRs) of certain mRNAs. It functions as a translational regulator that plays a major role in the control of maternal CPE-containing mRNA in oocytes, as well as of subsynaptic CPE-containing mRNA in neurons. Once phosphorylated and recruiting the polyadenylation complex, CPEB-1 may function as a translational activator stimulating polyadenylation and translation. Otherwise, it may function as a translational inhibitor when dephosphorylated and bound to a protein such as maskin or neuroguidin, which blocks translation initiation through interfering with the assembly of eIF-4E and eIF-4G. Although CPEB-1 is mainly located in cytoplasm, it can shuttle between nucleus and cytoplasm. CPEB-1 contains an N-terminal unstructured region, two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and a Zn-finger motif. Both of the RRMs and the Zn finger are required for CPEB-1 to bind CPE. The N-terminal regulatory region may be responsible for CPEB-1 interacting with other proteins."
definition: >-
  RNA recognition motif 1 (RRM1) found in cytoplasmic polyadenylation element-binding protein 1 (CPEB-1) and similar proteins. This subgroup corresponds to the RRM2 of CPEB-1 (also termed CPE-BP1 or CEBP), an RNA-binding protein that interacts with the cytoplasmic polyadenylation element (CPE), a short U-rich motif in the 3' untranslated regions (UTRs) of certain mRNAs. It functions as a translational regulator that plays a major role in the control of maternal CPE-containing mRNA in oocytes, as well as of subsynaptic CPE-containing mRNA in neurons. Once phosphorylated and recruiting the polyadenylation complex, CPEB-1 may function as a translational activator stimulating polyadenylation and translation. Otherwise, it may function as a translational inhibitor when dephosphorylated and bound to a protein such as maskin or neuroguidin, which blocks translation initiation through interfering with the assembly of eIF-4E and eIF-4G. Although CPEB-1 is mainly located in cytoplasm, it can shuttle between nucleus and cytoplasm. CPEB-1 contains an N-terminal unstructured region, two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and a Zn-finger motif. Both of the RRMs and the Zn finger are required for CPEB-1 to bind CPE. The N-terminal regulatory region may be responsible for CPEB-1 interacting with other proteins. — an NCBI CDD conserved domain (cd12723); members share this curated model.
