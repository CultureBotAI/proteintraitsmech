identifier: CDD:cd16039
label: "PHD finger found in Set1 complex component SPP1. Set1C component SPP1, also called COMPASS component Spp1, or Complex proteins associated with set1 protein Spp1, or Suppressor of PRP protein 1, is a component of the COMPASS complex that links histone methylation to initiation of meiotic recombination. It induces double-strand break (DSB) formation by tethering to recombinationally cold regions. SPP1 interacts with H3K4me3 and Mer2, a protein required for DSB formation, to promote recruitment of potential meiotic DSB sites to the chromosomal axis. SPP1 contains a PHD finger, a zinc binding motif."
definition: >-
  PHD finger found in Set1 complex component SPP1. Set1C component SPP1, also called COMPASS component Spp1, or Complex proteins associated with set1 protein Spp1, or Suppressor of PRP protein 1, is a component of the COMPASS complex that links histone methylation to initiation of meiotic recombination. It induces double-strand break (DSB) formation by tethering to recombinationally cold regions. SPP1 interacts with H3K4me3 and Mer2, a protein required for DSB formation, to promote recruitment of potential meiotic DSB sites to the chromosomal axis. SPP1 contains a PHD finger, a zinc binding motif. — an NCBI CDD conserved domain (cd16039); members share this curated model.
