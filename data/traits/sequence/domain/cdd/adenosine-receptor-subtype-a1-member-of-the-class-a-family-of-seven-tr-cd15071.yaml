identifier: CDD:cd15071
label: "adenosine receptor subtype A1, member of the class A family of seven-transmembrane G protein-coupled receptors. The adenosine A1 receptor, a member of the adenosine receptor family of G protein-coupled receptors, binds adenosine as its endogenous ligand. The A1 receptor has primarily inhibitory function on the tissues in which it is located. The A1 receptor slows metabolic activity in the brain and has a strong anti-adrenergic effects in the heart. Thus, it antagonizes beta1-adrenergic receptor-induced stimulation and thereby reduces cardiac contractility. The A1 receptor preferentially couples to G proteins of the G(i/o) family, which lead to inhibition of adenylate cyclase and thereby lowering the intracellular cAMP levels."
definition: >-
  adenosine receptor subtype A1, member of the class A family of seven-transmembrane G protein-coupled receptors. The adenosine A1 receptor, a member of the adenosine receptor family of G protein-coupled receptors, binds adenosine as its endogenous ligand. The A1 receptor has primarily inhibitory function on the tissues in which it is located. The A1 receptor slows metabolic activity in the brain and has a strong anti-adrenergic effects in the heart. Thus, it antagonizes beta1-adrenergic receptor-induced stimulation and thereby reduces cardiac contractility. The A1 receptor preferentially couples to G proteins of the G(i/o) family, which lead to inhibition of adenylate cyclase and thereby lowering the intracellular cAMP levels. — an NCBI CDD conserved domain (cd15071); members share this curated model.
