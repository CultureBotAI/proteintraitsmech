identifier: CDD:cd09372
label: "The second LIM domain of the filamin-binding LIM protein-1 (FBLP-1). The second LIM domain of the filamin-binding LIM protein-1 (FBLP-1): Fblp-1 contains a proline-rich domain near its N terminus and two LIM domains at its C terminus. FBLP-1 mRNA was detected in a variety of tissues and cells including platelets and endothelial cells. FBLP-1 binds to Filamins. The association between filamin B and FBLP-1 may play an unknown role in cytoskeletal function, cell adhesion, and cell motility. As in other LIM domains, this domain family is 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  The second LIM domain of the filamin-binding LIM protein-1 (FBLP-1). The second LIM domain of the filamin-binding LIM protein-1 (FBLP-1): Fblp-1 contains a proline-rich domain near its N terminus and two LIM domains at its C terminus. FBLP-1 mRNA was detected in a variety of tissues and cells including platelets and endothelial cells. FBLP-1 binds to Filamins. The association between filamin B and FBLP-1 may play an unknown role in cytoskeletal function, cell adhesion, and cell motility. As in other LIM domains, this domain family is 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09372); members share this curated model.
