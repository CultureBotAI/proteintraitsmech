identifier: CDD:cd20738
label: "Polymorphic Nuclease effector (PoNe) co-occurring with an N-terminal DUF4280 domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with an N-terminal domain of unknown function (DUF4280), which has a single completely conserved residue C that may be functionally important."
definition: >-
  Polymorphic Nuclease effector (PoNe) co-occurring with an N-terminal DUF4280 domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with an N-terminal domain of unknown function (DUF4280), which has a single completely conserved residue C that may be functionally important. — an NCBI CDD conserved domain (cd20738); members share this curated model.
