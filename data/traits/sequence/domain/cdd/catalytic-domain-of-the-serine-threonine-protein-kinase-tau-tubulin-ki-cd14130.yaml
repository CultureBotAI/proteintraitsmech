identifier: CDD:cd14130
label: "Catalytic domain of the Serine/Threonine protein kinase, Tau-Tubulin Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TTBK is a neuron-specific kinase that phosphorylates the microtubule-associated protein tau and promotes its aggregation. Higher vertebrates contain two TTBK proteins, TTBK1 and TTBK2, both of which have been implicated in neurodegeneration. Genetic variations in TTBK1 are linked to Alzheimer's disease (AD). Hyperphosphorylated tau is a major component of paired helical filaments that accumulate in the brain of AD patients. Studies in transgenic mice show that TTBK1 is involved in the phosphorylation-dependent pathogenic aggregation of tau. The TTBK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine protein kinase, Tau-Tubulin Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TTBK is a neuron-specific kinase that phosphorylates the microtubule-associated protein tau and promotes its aggregation. Higher vertebrates contain two TTBK proteins, TTBK1 and TTBK2, both of which have been implicated in neurodegeneration. Genetic variations in TTBK1 are linked to Alzheimer's disease (AD). Hyperphosphorylated tau is a major component of paired helical filaments that accumulate in the brain of AD patients. Studies in transgenic mice show that TTBK1 is involved in the phosphorylation-dependent pathogenic aggregation of tau. The TTBK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14130); members share this curated model.
