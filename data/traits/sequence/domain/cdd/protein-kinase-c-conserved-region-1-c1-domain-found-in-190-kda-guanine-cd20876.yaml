identifier: CDD:cd20876
label: "protein kinase C conserved region 1 (C1 domain) found in 190 kDa guanine nucleotide exchange factor (p190RhoGEF) and similar proteins. p190RhoGEF, also called Rho guanine nucleotide exchange factor (RGNEF), Rho guanine nucleotide exchange factor 28 (ARHGEF28), or RIP2, is a brain-enriched, RhoA-specific guanine nucleotide exchange factor that regulates signaling pathways downstream of integrins and growth factor receptors. It is involved in axonal branching, synapse formation and dendritic morphogenesis, as well as in focal adhesion formation, cell motility and B-lymphocytes activation. In addition to the Dbl homology (DH)-PH domain, p190RhoGEF contains an N-terminal C1 (Protein kinase C conserved region 1) domain. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in 190 kDa guanine nucleotide exchange factor (p190RhoGEF) and similar proteins. p190RhoGEF, also called Rho guanine nucleotide exchange factor (RGNEF), Rho guanine nucleotide exchange factor 28 (ARHGEF28), or RIP2, is a brain-enriched, RhoA-specific guanine nucleotide exchange factor that regulates signaling pathways downstream of integrins and growth factor receptors. It is involved in axonal branching, synapse formation and dendritic morphogenesis, as well as in focal adhesion formation, cell motility and B-lymphocytes activation. In addition to the Dbl homology (DH)-PH domain, p190RhoGEF contains an N-terminal C1 (Protein kinase C conserved region 1) domain. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20876); members share this curated model.
