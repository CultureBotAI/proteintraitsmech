identifier: CDD:cd12496
label: "RNA recognition motif 3 (RRM3) found in vertebrate RNA-binding protein 46 (RBM46). This subgroup corresponds to the RRM3 of RBM46, also termed cancer/testis antigen 68 (CT68), is a putative RNA-binding protein that shows high sequence homology with heterogeneous nuclear ribonucleoprotein R (hnRNP R) and heterogeneous nuclear ribonucleoprotein Q (hnRNP Q). Its biological function remains unclear. Like hnRNP R and hnRNP Q, RBM46 contains two well defined and one degenerated RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains)."
definition: >-
  RNA recognition motif 3 (RRM3) found in vertebrate RNA-binding protein 46 (RBM46). This subgroup corresponds to the RRM3 of RBM46, also termed cancer/testis antigen 68 (CT68), is a putative RNA-binding protein that shows high sequence homology with heterogeneous nuclear ribonucleoprotein R (hnRNP R) and heterogeneous nuclear ribonucleoprotein Q (hnRNP Q). Its biological function remains unclear. Like hnRNP R and hnRNP Q, RBM46 contains two well defined and one degenerated RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). — an NCBI CDD conserved domain (cd12496); members share this curated model.
