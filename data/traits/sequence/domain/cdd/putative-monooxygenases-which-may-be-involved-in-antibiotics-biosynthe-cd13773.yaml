identifier: CDD:cd13773
label: ABM_like_1
definition: >-
  Putative monooxygenases, which may be involved in antibiotics biosynthesis. This domain is found in monooxygenases involved in various processes including the biosynthesis of several antibiotics by Streptomyces species. Streptomyces nogalater SnoaB, for example is involved in the biosynthesis of the aromatic polyketide antibiotic, nogalamycin, catalyzing the conversion of 12-deoxynogalonic acid to nogalonic acid. Escherichia coli YgiN is likely to function as a quinol monooxygenase and may protect cells from reactive oxygen species generated in single electron redox reactions. Rv0793, a hypothetical monooxygenase from Mycobacterium tuberculosis, may play a role in protecting the bacteria from host defense mechanisms involving reactive oxygen species. E. coli LsrG is involved in processing of the quorum-sensing signal autoinducer-2 (AI-2), catalyzing the isomerization of P-DPD (4-hydroxy-2,3-pentanedione-5-phosphate) into P-TPO (3,4,4-trihydroxy-2-pentanone-5-phosphate ). Members which bind and degrade heme include: Mycobacterium tuberculosis MhuD /Rv3592, and the ABM-like domain of Bacillus subtillis HmoB. A putative ABM from Azoarcus anaerobius is encoded on the R(+) cosmid along with other putative genes proposed to be involved in the anaerobic degradation of resorcinol. Metazoan members include the ABM-like domains of metazoan NECABs (N-terminal EF-hand calcium binding proteins 1-3). NECABs are primarily expressed in the brain; NECAB3 is a Golgi protein, a potential substrate of Nek2 protein kinase, and interacts with the N-terminal domain of APBA2/ X11L. That this domain is present as a repeat in some members is suggestive that the other proteins function as multimers
