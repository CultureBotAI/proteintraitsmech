identifier: CDD:cd23629
label: "extracellular domain (ECD) found in Elaphe quadrivirgata phospholipase A2 inhibitor gamma subunit A (gamma-PLI A) and similar proteins. Gamma-PLI inhibits the enzymatic activity of all phospholipase A2 (PA2) groups. There are two gamma-PLI subunits, subunit A and subunit B, which form a heterodimer. Members in this family contain an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Elaphe quadrivirgata phospholipase A2 inhibitor gamma subunit A (gamma-PLI A) and similar proteins. Gamma-PLI inhibits the enzymatic activity of all phospholipase A2 (PA2) groups. There are two gamma-PLI subunits, subunit A and subunit B, which form a heterodimer. Members in this family contain an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23629); members share this curated model.
