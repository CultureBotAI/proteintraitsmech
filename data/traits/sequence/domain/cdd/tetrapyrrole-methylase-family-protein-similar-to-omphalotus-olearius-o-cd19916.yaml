identifier: CDD:cd19916
label: "tetrapyrrole methylase family protein similar to Omphalotus olearius omphalotin methyltransferase (OphMA) and Dendrothele bispora dbOphMA. OphMA, is the precursor protein of the fungal cyclic peptide Omphalotin A. Omphalotin A is a potent nematicide, having 9 out of 12 of its residues methylated at the backbone amide. Omphalotin A derives from the C-terminus of OphMA (also known as OphA). OphMA catalyzes the automethylation of its own C-terminus using S-adenosyl methionine (SAM); this C terminus is subsequently released and macrocyclized by the protease OphP to give Omphalotin A."
definition: >-
  tetrapyrrole methylase family protein similar to Omphalotus olearius omphalotin methyltransferase (OphMA) and Dendrothele bispora dbOphMA. OphMA, is the precursor protein of the fungal cyclic peptide Omphalotin A. Omphalotin A is a potent nematicide, having 9 out of 12 of its residues methylated at the backbone amide. Omphalotin A derives from the C-terminus of OphMA (also known as OphA). OphMA catalyzes the automethylation of its own C-terminus using S-adenosyl methionine (SAM); this C terminus is subsequently released and macrocyclized by the protease OphP to give Omphalotin A. — an NCBI CDD conserved domain (cd19916); members share this curated model.
