identifier: CDD:cd12092
label: "Transmembrane domain of ErbB4, a Protein Tyrosine Kinase. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. ErbB4 (HER4) is a member of the EGFR (HER, ErbB) subfamily of proteins, which are receptor PTKs (RTKs) containing an extracellular EGF-related ligand-binding region, a transmembrane (TM) helix, and a cytoplasmic region with a tyr kinase domain and a regulatory C-terminal tail. It is activated by ligand-induced dimerization, leading to the phosphorylation of tyr residues in the C-terminal tail, which serve as binding sites for downstream signaling molecules. Ligands that bind ErbB4 fall into two groups, the neuregulins (or heregulins) and some EGFR (HER1, ErbB1) ligands including betacellulin, HBEGF, and epiregulin. All four neuregulins (NRG1-4) interact with ErbB4. Upon ligand binding, ErbB4 forms homo- or heterodimers with other ErbB proteins. The TM domain not only serves as a membrane anchor, but also plays an important role in receptor dimerization and optimal activation. Mutations in the TM domain of ErbB4 have been associated with increased breast cancer risk. ErbB4 is essential in embryonic development. It is implicated in mammary gland, cardiac, and neural development. As a postsynaptic receptor of NRG1, ErbB4 plays an important role in synaptic plasticity and maturation. The impairment of NRG1/ErbB4 signaling may contribute to schizophrenia."
