identifier: CDD:cd20721
label: CYCLIN_SDS-like_rpt2
definition: >-
  second cyclin box found in Arabidopsis thaliana cyclin-SDS and similar proteins. Cyclin-SDS, also called protein SOLO DANCERS, is a meiosis-specific cyclin that is required for normal homolog synapsis and recombination in early to mid-prophase 1. It contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain
