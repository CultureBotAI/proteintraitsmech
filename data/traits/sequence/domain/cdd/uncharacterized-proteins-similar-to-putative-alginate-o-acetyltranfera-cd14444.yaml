identifier: CDD:cd14444
label: "Uncharacterized proteins similar to putative alginate O-acetyltranferase. The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms, such those as by mucoid strains of Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. Its N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. Members of this uncharacterized family similar to AlgX_N have been annotated as cell division proteins FtsQ, although they share little or no similarity with experimentally characterized members of the FtsQ family."
definition: >-
  Uncharacterized proteins similar to putative alginate O-acetyltranferase. The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms, such those as by mucoid strains of Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. Its N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. Members of this uncharacterized family similar to AlgX_N have been annotated as cell division proteins FtsQ, although they share little or no similarity with experimentally characterized members of the FtsQ family. — an NCBI CDD conserved domain (cd14444); members share this curated model.
