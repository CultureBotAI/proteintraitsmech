identifier: CDD:cd21835
label: "streptolysin S-associated protein SagF. Streptolysin S-associated protein SagF is encoded by the sagF gene, which has been identified to be a hemolytic activity-related gene in SEZ (Streptococcus equi ssp. zooepidemicus). The sagF gene is located in the same operon with sagD gene in the SEZ genome implying that it should play an important role in SEZ hemolytic activity and is an indispensable gene in the sag operon for streptolysin S (SLS) biosynthesis."
definition: >-
  streptolysin S-associated protein SagF. Streptolysin S-associated protein SagF is encoded by the sagF gene, which has been identified to be a hemolytic activity-related gene in SEZ (Streptococcus equi ssp. zooepidemicus). The sagF gene is located in the same operon with sagD gene in the SEZ genome implying that it should play an important role in SEZ hemolytic activity and is an indispensable gene in the sag operon for streptolysin S (SLS) biosynthesis. — an NCBI CDD conserved domain (cd21835); members share this curated model.
