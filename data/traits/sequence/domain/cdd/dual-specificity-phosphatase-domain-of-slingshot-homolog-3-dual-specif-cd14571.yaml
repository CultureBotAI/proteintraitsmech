identifier: CDD:cd14571
label: "dual specificity phosphatase domain of slingshot homolog 3. Dual specificity protein phosphatase slingshot homolog 3 (SSH3), also called SSH-like protein 3, is part of the slingshot (SSH) family, whose members specifically dephosphorylate and reactivate Ser-3-phosphorylated cofilin (P-cofilin), an actin-binding protein that plays an essential role in actin filament dynamics. The Xenopus homolog (xSSH) is involved in the gastrulation movement. Mouse SSH3 dephosphorylates actin-depolymerizing factor (ADF) and cofilin but is dispensable for development. There are at least two human SSH3 isoforms reported: hSSH-3L (long) and hSSH-3. As SSH family phosphatases, they contain an N-terminal, SSH family-specific non-catalytic (SSH-N) domain, followed by a short domain with similarity to the C-terminal domain of the chromatin-associated protein DEK, and a dual specificity phosphatase catalytic domain. In addition, hSSH-3L contains a C-terminal tail while hSSH-3 does not."
definition: >-
  dual specificity phosphatase domain of slingshot homolog 3. Dual specificity protein phosphatase slingshot homolog 3 (SSH3), also called SSH-like protein 3, is part of the slingshot (SSH) family, whose members specifically dephosphorylate and reactivate Ser-3-phosphorylated cofilin (P-cofilin), an actin-binding protein that plays an essential role in actin filament dynamics. The Xenopus homolog (xSSH) is involved in the gastrulation movement. Mouse SSH3 dephosphorylates actin-depolymerizing factor (ADF) and cofilin but is dispensable for development. There are at least two human SSH3 isoforms reported: hSSH-3L (long) and hSSH-3. As SSH family phosphatases, they contain an N-terminal, SSH family-specific non-catalytic (SSH-N) domain, followed by a short domain with similarity to the C-terminal domain of the chromatin-associated protein DEK, and a dual specificity phosphatase catalytic domain. In addition, hSSH-3L contains a C-terminal tail while hSSH-3 does not. — an NCBI CDD conserved domain (cd14571); members share this curated model.
