identifier: CDD:cd22849
label: "NuzM subunit of NADH:Ubiquinone Oxidoreductase. The NuzM subunit is a fungal specific subunit of NADH:ubiquinone oxidoreductase (respiratory complex I) which is a redox-driven proton pump that plays a central role in aerobic energy metabolism. Redox-linked proton translocation by complex I creates the electrochemical gradient that powers mitochondrial adenosine triphosphate synthesis. Loss of NuzM leads to disassembly of fungal complex I, thus making it a potential antifungal drug target."
definition: >-
  NuzM subunit of NADH:Ubiquinone Oxidoreductase. The NuzM subunit is a fungal specific subunit of NADH:ubiquinone oxidoreductase (respiratory complex I) which is a redox-driven proton pump that plays a central role in aerobic energy metabolism. Redox-linked proton translocation by complex I creates the electrochemical gradient that powers mitochondrial adenosine triphosphate synthesis. Loss of NuzM leads to disassembly of fungal complex I, thus making it a potential antifungal drug target. — an NCBI CDD conserved domain (cd22849); members share this curated model.
