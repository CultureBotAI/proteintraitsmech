identifier: CDD:cd22383
label: "type I K homology (KH) RNA-binding domain found in protein quaking (Hqk) family. The Hqk family includes Hqk and protein held out wings (how) found in Drosophila. Hqk, also called HqkI, is an RNA-binding protein that plays a central role in myelinization. It binds to the 5'-NACUAAY-N(1,20)-UAAY-3' RNA core sequence and regulates target mRNA stability. It acts by regulating pre-mRNA splicing, mRNA export and protein translation. Hqk is a regulator of oligodendrocyte differentiation and maturation in the brain that may play a role in myelin and oligodendrocyte dysfunction in schizophrenia. How, also called KH domain protein KH93F, or protein muscle-specific, or protein Struthio, or protein wings held out (who), or Quaking-related 93F (qkr93F), is an RNA-binding protein involved in the control of muscular and cardiac activity. It is required for integrin-mediated cell-adhesion in wing blade. It plays essential roles during embryogenesis, in late stages of somatic muscle development, for myotube migration and during metamorphosis for muscle reorganization."
definition: >-
  type I K homology (KH) RNA-binding domain found in protein quaking (Hqk) family. The Hqk family includes Hqk and protein held out wings (how) found in Drosophila. Hqk, also called HqkI, is an RNA-binding protein that plays a central role in myelinization. It binds to the 5'-NACUAAY-N(1,20)-UAAY-3' RNA core sequence and regulates target mRNA stability. It acts by regulating pre-mRNA splicing, mRNA export and protein translation. Hqk is a regulator of oligodendrocyte differentiation and maturation in the brain that may play a role in myelin and oligodendrocyte dysfunction in schizophrenia. How, also called KH domain protein KH93F, or protein muscle-specific, or protein Struthio, or protein wings held out (who), or Quaking-related 93F (qkr93F), is an RNA-binding protein involved in the control of muscular and cardiac activity. It is required for integrin-mediated cell-adhesion in wing blade. It plays essential roles during embryogenesis, in late stages of somatic muscle development, for myotube migration and during metamorphosis for muscle reorganization. — an NCBI CDD conserved domain (cd22383); members share this curated model.
