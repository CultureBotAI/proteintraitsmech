identifier: CDD:cd14806
label: "Receptor-associated protein (RAP), Domain 1. This subfamily is the N-terminal domain (D1) of receptor-associated protein, RAP, an antagonist and a specialized chaperone in the endoplasmic reticulum that binds tightly to members of the low-density lipoprotein (LDL) receptor family and prevents them from associating with other ligands. D1 as well as domain 2 (D2) are essential for blocking low-density lipoprotein receptor-related protein (LRP) from binding of certain ligands, such as activated forms of alpha2-macroglobulin; D1 and D2 each bind LRP weakly but the tandem D1D2 binds much more tightly, suggesting the avidity effects arising from amino acid residues contributed from each domain. The double module of complement type repeats, CR56, of LRP binds many ligands including alpha2-macroglobulin, which promotes the catabolism of the Abeta-peptide implicated in Alzheimer's disease."
definition: >-
  Receptor-associated protein (RAP), Domain 1. This subfamily is the N-terminal domain (D1) of receptor-associated protein, RAP, an antagonist and a specialized chaperone in the endoplasmic reticulum that binds tightly to members of the low-density lipoprotein (LDL) receptor family and prevents them from associating with other ligands. D1 as well as domain 2 (D2) are essential for blocking low-density lipoprotein receptor-related protein (LRP) from binding of certain ligands, such as activated forms of alpha2-macroglobulin; D1 and D2 each bind LRP weakly but the tandem D1D2 binds much more tightly, suggesting the avidity effects arising from amino acid residues contributed from each domain. The double module of complement type repeats, CR56, of LRP binds many ligands including alpha2-macroglobulin, which promotes the catabolism of the Abeta-peptide implicated in Alzheimer's disease. — an NCBI CDD conserved domain (cd14806); members share this curated model.
