identifier: CDD:cd22469
label: "type I K homology (KH) RNA-binding domain found in KH domain-containing, RNA-binding, signal transduction-associated protein 2 (KHDRBS2) and similar proteins. KHDRBS2, also called Sam68-like mammalian protein 1, or SLM-1, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds both poly(A) and poly(U) homopolymers. KHDRBS2 may function as an adapter protein for Src kinases during mitosis."
definition: >-
  type I K homology (KH) RNA-binding domain found in KH domain-containing, RNA-binding, signal transduction-associated protein 2 (KHDRBS2) and similar proteins. KHDRBS2, also called Sam68-like mammalian protein 1, or SLM-1, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds both poly(A) and poly(U) homopolymers. KHDRBS2 may function as an adapter protein for Src kinases during mitosis. — an NCBI CDD conserved domain (cd22469); members share this curated model.
