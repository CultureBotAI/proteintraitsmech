identifier: CDD:cd21709
label: "juxtamembrane and transmembrane (JMTM) domain found in amyloid-like protein 2 (APLP-2) and similar proteins. Amyloid-like protein 2 (APLP-2), also called amyloid protein homolog (APPH), or CDEI box-binding protein (CDEBP), may play a role in the regulation of hemostasis. Its soluble form may have inhibitory properties towards coagulation factors. APLP-2 may bind to the DNA 5'-GTCACATG-3'(CDEI box). It inhibits trypsin, chymotrypsin, plasmin, factor XIA, and plasma and glandular kallikrein. This model corresponds to juxtamembrane and transmembrane (JMTM) domain of APLP-2, which consists of the intact transmembrane (TM) domain with adjacent N-terminal juxtamembrane (JM) region."
definition: >-
  juxtamembrane and transmembrane (JMTM) domain found in amyloid-like protein 2 (APLP-2) and similar proteins. Amyloid-like protein 2 (APLP-2), also called amyloid protein homolog (APPH), or CDEI box-binding protein (CDEBP), may play a role in the regulation of hemostasis. Its soluble form may have inhibitory properties towards coagulation factors. APLP-2 may bind to the DNA 5'-GTCACATG-3'(CDEI box). It inhibits trypsin, chymotrypsin, plasmin, factor XIA, and plasma and glandular kallikrein. This model corresponds to juxtamembrane and transmembrane (JMTM) domain of APLP-2, which consists of the intact transmembrane (TM) domain with adjacent N-terminal juxtamembrane (JM) region. — an NCBI CDD conserved domain (cd21709); members share this curated model.
