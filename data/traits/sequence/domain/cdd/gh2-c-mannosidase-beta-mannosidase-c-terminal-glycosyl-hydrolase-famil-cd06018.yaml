identifier: CDD:cd06018
label: GH2_C_mannosidase
definition: >-
  GH2_C_mannosidase. Beta-Mannosidase, C-terminal glycosyl hydrolase, family 2 (GH2) domain. Beta-Mannosidase is an exoglycosidase that catalyzes hydrolysis of non-reducing residues of beta-D-mannose in beta-D-mannosides. Beta-Mannosidase participates in the lysosomal degradation of N-glycoproteins by cleaving mannosidic bonds in the core part of N-linked glycans attached to glycoproteins. A deficiency of Beta-Mannosidase leads to an autosomal recessive inherited lysosomal storage disease called beta-mannosidosis. This disease is characterized by the storage and excretion of a disaccharide Man-beta(1,4)-GlcNAc, a trisaccharide Man-beta(1,4)-GlcNAc-beta(1,4)-GlcNAc, and other more complex undegraded oligosaccharides. Bacteria and fungi that degrade hemicellulose also secrete a Beta-Mannosidase that hydrolyzes beta(1,4)-D-mannosyl groups from manno-oligosaccharides and mannose-containing glycopeptides produced from the hemicellulose pulp by endoenzymes. In seeds that have galactomannans as storage carbohydrates, the enzyme converts manno-oligosaccharides to monosaccharides. The domain architecture of many of the Beta-Mannosidases includes an N-terminal carbohydrate-binding module (CBM), followed by an immunoglobulin/CBM-like fold, a catalytic TIM barrel GH2 fold, and a C-terminal domain containing most of the residues involved in homodimerization
