identifier: CDD:cd13131
label: "Subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins similar to Vibrio cholerae NorM. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. This subfamily includes Vibrio cholerae NorM and functions most likely as a multidrug efflux pump, removing xenobiotics from the interior of the cell. The pump utilizes a cation gradient across the membrane to facilitate the export process. NorM appears to bind monovalent cations in an outward-facing conformation and may subsequently cycle through an inward-facing and outward-facing conformation to capture and release its substrate."
definition: >-
  Subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins similar to Vibrio cholerae NorM. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. This subfamily includes Vibrio cholerae NorM and functions most likely as a multidrug efflux pump, removing xenobiotics from the interior of the cell. The pump utilizes a cation gradient across the membrane to facilitate the export process. NorM appears to bind monovalent cations in an outward-facing conformation and may subsequently cycle through an inward-facing and outward-facing conformation to capture and release its substrate. — an NCBI CDD conserved domain (cd13131); members share this curated model.
