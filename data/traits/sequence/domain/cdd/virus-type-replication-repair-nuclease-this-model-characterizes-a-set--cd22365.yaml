identifier: CDD:cd22365
label: VRR-NUC-like
definition: >-
  Virus-type replication repair nuclease. This model characterizes a set of nucleases that resemble Holliday-junction resolving enzymes. They belong to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI
