identifier: CDD:cd10920
label: "Catalytic domain of a putative polysaccharide deacetylase WbmS from Bordetella bronchiseptica and similar proteins. This family is represented by a putative polysaccharide deacetylase encoded by the O-antigen-related gene wbmS in Bordetella bronchiseptica. Although its precise function remains unknown, it has been suggested that WbmS might be involved in the biosynthesis of O-antigen, an important component of the gram-negative bacterial outer membrane, and may also play a role in sugar phosphate transfer. Structural superposition and sequence comparison show that WbmS consists of a conserved domain similar to the 7-stranded barrel catalytic domain of polysaccharide deacetylases (DACs) from the carbohydrate esterase 4 (CE4) superfamily, which removes N-linked acetyl groups from cell wall polysaccharides."
definition: >-
  Catalytic domain of a putative polysaccharide deacetylase WbmS from Bordetella bronchiseptica and similar proteins. This family is represented by a putative polysaccharide deacetylase encoded by the O-antigen-related gene wbmS in Bordetella bronchiseptica. Although its precise function remains unknown, it has been suggested that WbmS might be involved in the biosynthesis of O-antigen, an important component of the gram-negative bacterial outer membrane, and may also play a role in sugar phosphate transfer. Structural superposition and sequence comparison show that WbmS consists of a conserved domain similar to the 7-stranded barrel catalytic domain of polysaccharide deacetylases (DACs) from the carbohydrate esterase 4 (CE4) superfamily, which removes N-linked acetyl groups from cell wall polysaccharides. — an NCBI CDD conserved domain (cd10920); members share this curated model.
