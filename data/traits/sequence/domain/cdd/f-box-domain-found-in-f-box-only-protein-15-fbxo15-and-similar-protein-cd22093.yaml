identifier: CDD:cd22093
label: "F-box domain found in F-box only protein 15 (FBXO15) and similar proteins. FBXO15, also called FBX15, has a novel dual molecular function by controlling transcriptional repression and being part of SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligases, which is essential for stress response, gliotoxin production and virulence in the opportunistic human pathogen Aspergillus fumigatus. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 15 (FBXO15) and similar proteins. FBXO15, also called FBX15, has a novel dual molecular function by controlling transcriptional repression and being part of SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligases, which is essential for stress response, gliotoxin production and virulence in the opportunistic human pathogen Aspergillus fumigatus. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22093); members share this curated model.
