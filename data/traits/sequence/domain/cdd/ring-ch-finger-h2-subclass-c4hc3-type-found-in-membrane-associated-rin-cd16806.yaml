identifier: CDD:cd16806
label: "RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH1 (MARCH1). MARCH1, also known as membrane-associated RING finger protein 1, membrane-associated RING-CH protein I (MARCH-I), or RING finger protein 171 (RNF171), is a membrane-anchored E3 ubiquitin ligase that is mainly expressed in cells of the immune system. It regulates antigen presentation and T-cell costimulatory functions of dendritic cells by down-regulating the cell surface expression of major histocompatibility complex class II (MHCII) and CD86 molecules. It mediates ubiquitination of MHCII and CD86 in dendritic cells (DCs). This ubiquitination induces MHCII and CD86 endocytosis, lysosomal transport, and degradation. MARCH1 also plays a regulatory role in T cell activation during immune responses, as well as in splenic DC homeostasis. Moreover, MARCH1 may regulate its own expression through dimerization and autoubiquitination. MARCH1 contains an N-terminal cytoplasmic C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger and two transmembrane domains."
definition: >-
  RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH1 (MARCH1). MARCH1, also known as membrane-associated RING finger protein 1, membrane-associated RING-CH protein I (MARCH-I), or RING finger protein 171 (RNF171), is a membrane-anchored E3 ubiquitin ligase that is mainly expressed in cells of the immune system. It regulates antigen presentation and T-cell costimulatory functions of dendritic cells by down-regulating the cell surface expression of major histocompatibility complex class II (MHCII) and CD86 molecules. It mediates ubiquitination of MHCII and CD86 in dendritic cells (DCs). This ubiquitination induces MHCII and CD86 endocytosis, lysosomal transport, and degradation. MARCH1 also plays a regulatory role in T cell activation during immune responses, as well as in splenic DC homeostasis. Moreover, MARCH1 may regulate its own expression through dimerization and autoubiquitination. MARCH1 contains an N-terminal cytoplasmic C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger and two transmembrane domains. — an NCBI CDD conserved domain (cd16806); members share this curated model.
