identifier: CDD:cd08212
label: "Ribulose bisphosphate carboxylase large chain, Form I. Ribulose bisphosphate carboxylase (Rubisco) plays an important role in the Calvin reductive pentose phosphate pathway. It catalyzes the primary CO2 fixation step. Rubisco is activated by carbamylation of an active site lysine, stabilized by a divalent cation, which then catalyzes the proton abstraction from the substrate ribulose 1,5 bisphosphate (RuBP) and leads to the formation of two molecules of 3-phosphoglycerate. Members of the Rubisco family can be divided into 4 subgroups, Form I-IV , which differ in their taxonomic distribution and subunit composition. Form I is the most abundant class, present in plants, algae, and bacteria, and forms large complexes composed of 8 large and 8 small subunits."
definition: >-
  Ribulose bisphosphate carboxylase large chain, Form I. Ribulose bisphosphate carboxylase (Rubisco) plays an important role in the Calvin reductive pentose phosphate pathway. It catalyzes the primary CO2 fixation step. Rubisco is activated by carbamylation of an active site lysine, stabilized by a divalent cation, which then catalyzes the proton abstraction from the substrate ribulose 1,5 bisphosphate (RuBP) and leads to the formation of two molecules of 3-phosphoglycerate. Members of the Rubisco family can be divided into 4 subgroups, Form I-IV , which differ in their taxonomic distribution and subunit composition. Form I is the most abundant class, present in plants, algae, and bacteria, and forms large complexes composed of 8 large and 8 small subunits. — an NCBI CDD conserved domain (cd08212); members share this curated model.
