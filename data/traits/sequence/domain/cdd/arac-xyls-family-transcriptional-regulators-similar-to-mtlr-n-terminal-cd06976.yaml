identifier: CDD:cd06976
label: "AraC/XylS family transcriptional regulators similar to MtlR, N-terminal cupin domain. MtlR is a Pseudomonas fluorescens protein that acts as a transcriptional regulator of the mannitol utilization genes.  It has an N-terminal cupin domain (represented by this alignment) and a C-terminal AraC/XylS family helix-turn-helix (HTH) DNA-binding domain. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  AraC/XylS family transcriptional regulators similar to MtlR, N-terminal cupin domain. MtlR is a Pseudomonas fluorescens protein that acts as a transcriptional regulator of the mannitol utilization genes. It has an N-terminal cupin domain (represented by this alignment) and a C-terminal AraC/XylS family helix-turn-helix (HTH) DNA-binding domain. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd06976); members share this curated model.
