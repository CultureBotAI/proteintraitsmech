identifier: CDD:cd12894
label: "PRY/SPRY domain in tripartite motif-containing protein 36 (TRIM36). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM36, a Class I TRIM protein. TRIM36 (also known as Haprin or RNF98) has a ubiquitin ligase activity and interacts with centromere protein-H, one of the kinetochore proteins. It has been shown that TRIM36 is potentially associated with chromosome segregation and that an excess of TRIM36 may cause chromosomal instability. In Xenopus laevis, TRIM36 is expressed during early embryogenesis and plays an important role in the arrangement of somites during their formation."
definition: >-
  PRY/SPRY domain in tripartite motif-containing protein 36 (TRIM36). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM36, a Class I TRIM protein. TRIM36 (also known as Haprin or RNF98) has a ubiquitin ligase activity and interacts with centromere protein-H, one of the kinetochore proteins. It has been shown that TRIM36 is potentially associated with chromosome segregation and that an excess of TRIM36 may cause chromosomal instability. In Xenopus laevis, TRIM36 is expressed during early embryogenesis and plays an important role in the arrangement of somites during their formation. — an NCBI CDD conserved domain (cd12894); members share this curated model.
