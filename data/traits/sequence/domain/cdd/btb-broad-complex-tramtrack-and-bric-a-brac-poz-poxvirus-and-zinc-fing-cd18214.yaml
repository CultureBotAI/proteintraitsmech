identifier: CDD:cd18214
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 26 (ZBTB26). ZBTB26, also called zinc finger protein 481 (ZNF481) or zinc finger protein Bioref, may be involved in transcriptional regulation. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 26 (ZBTB26). ZBTB26, also called zinc finger protein 481 (ZNF481) or zinc finger protein Bioref, may be involved in transcriptional regulation. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18214); members share this curated model.
