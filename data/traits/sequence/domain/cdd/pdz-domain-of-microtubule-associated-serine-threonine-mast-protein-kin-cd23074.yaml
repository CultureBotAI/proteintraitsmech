identifier: CDD:cd23074
label: "PDZ domain of microtubule-associated serine-threonine (MAST) protein kinase 2. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MAST2 (also known as microtubule-associated serine/threonine kinase-205 kD, MAST205) , and related domains. MAST2 belongs to the MAST family kinases, which include MAST1-4. These MAST proteins contain a DUF1908 domain, a serine/threonine kinase domain, a AGC-kinase C-terminal domain, and a PDZ domain. MAST2 may function to link the dystrophin/utrophin network with microtubule filaments via the syntrophins. Binding partners of MAST2 include beta2-syntrophin, TNF receptor-associated factor 6 (TRAF6), cAMP-regulated phosphoprotein (ARPP-16), Na+/H+ exchanger NHE3 (SLC9A3) and PTEN. MAST2 is also associated with microtubules of the spermatid manchette. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MAST2 family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
