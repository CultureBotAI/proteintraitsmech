identifier: CDD:cd16690
label: "RING finger, H2 subclass, found in vacuolar protein sorting-associated protein 41 (Vps41) and similar proteins. Vps41, also known as S53, is a protein involved in trafficking of proteins from the late Golgi to the vacuole. It interacts with caspase-8, suggesting a potential role of Vps41 beyond lysosomal trafficking. It has been identified as a potential therapeutic target for human Parkinson's disease (PD). Vps41 and the soluble N-ethylmaleimide-sensitive factor attachment protein receptors protein VAMP7 are specifically involved in the fusion of the trans-Golgi network-derived lysosome-associated membrane protein carriers with late endosomes. Vps41 is a specific subunit of the lysosomal tethering complex HOPS (homotypic vacuole fusion and protein sorting) that also includes Vps39 and a Class C Vps core complex composed of Vps11, Vps16, Vps18, and Vps33. HOPS operates at the lysosomal vacuole, controls all traffic from late endosomes into the vacuole and interacts with the Rab7/Ypt7-GTP form. The HOPS-specific Vps39 and Vps41 subunits belong to the class B Vps. They form a subcomplex that interacts with Rab7/Ypt7 and is are required for homotypic and heterotypic late endosome fusion. Vps41 contains an N-terminal WD40 repeat, one or two clathrin repeats and a C3H2C3-type RING-H2 finger domain close to its C-terminus."
