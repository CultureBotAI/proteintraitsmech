identifier: CDD:cd17429
label: "Monocarboxylate transporter 14 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 14 (MCT14) is also called Solute carrier family 16 member 14 (SLC16A14). It is an orphan transporter expressed in the brain, heart, muscle, ovary, prostate, breast, lung, pancreas, liver, spleen, and thymus. It may function as a neuronal aromatic-amino-acid transporter. MCT14 belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporter 14 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 14 (MCT14) is also called Solute carrier family 16 member 14 (SLC16A14). It is an orphan transporter expressed in the brain, heart, muscle, ovary, prostate, breast, lung, pancreas, liver, spleen, and thymus. It may function as a neuronal aromatic-amino-acid transporter. MCT14 belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17429); members share this curated model.
