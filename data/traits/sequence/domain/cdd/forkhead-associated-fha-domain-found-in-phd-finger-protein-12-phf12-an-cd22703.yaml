identifier: CDD:cd22703
label: "forkhead associated (FHA) domain found in PHD finger protein 12 (PHF12) and similar proteins. PHF12, also called PHD factor 1 (Pf1), is a plant homeodomain (PHD) zinc finger-containing protein that bridges the transducin-like enhancer of split (TLE) corepressor to the mSin3A-histone deacetylase (HDAC)-complex, and further represses transcription at targeted genes. PHF12 also interacts with MRG15 (mortality factor-related genes on chromosome 15), a member of the mortality factor (MORF) family of proteins implicated in regulating cellular senescence. It also contains an FHA domain, which is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in PHD finger protein 12 (PHF12) and similar proteins. PHF12, also called PHD factor 1 (Pf1), is a plant homeodomain (PHD) zinc finger-containing protein that bridges the transducin-like enhancer of split (TLE) corepressor to the mSin3A-histone deacetylase (HDAC)-complex, and further represses transcription at targeted genes. PHF12 also interacts with MRG15 (mortality factor-related genes on chromosome 15), a member of the mortality factor (MORF) family of proteins implicated in regulating cellular senescence. It also contains an FHA domain, which is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22703); members share this curated model.
