identifier: CDD:cd09564
label: "SAM domain of kazrin proteins repeat 1. SAM (sterile alpha motif) domain repeat 1 of kazrin proteins is a protein-protein interaction domain.  The long isoform of kazrin contains three copies (repeats) of SAM domain. Kazrin can interact with periplakin. It is involved into interplay between desmosomes and in adheren junctions. Additionally kazrins play a role in regulation of intercellular differentiation, junction assembly, and cytoskeletal organization."
definition: >-
  SAM domain of kazrin proteins repeat 1. SAM (sterile alpha motif) domain repeat 1 of kazrin proteins is a protein-protein interaction domain. The long isoform of kazrin contains three copies (repeats) of SAM domain. Kazrin can interact with periplakin. It is involved into interplay between desmosomes and in adheren junctions. Additionally kazrins play a role in regulation of intercellular differentiation, junction assembly, and cytoskeletal organization. — an NCBI CDD conserved domain (cd09564); members share this curated model.
