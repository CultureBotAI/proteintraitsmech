identifier: CDD:cd02316
label: "N-terminal NAD(P)-binding domain of Vibrio cholerae aspartate beta-semialdehyde dehydrogenase 2 (ASADH2) and similar proteins. The family corresponds to a new branch of bacterial ASADH enzymes that has a similar overall fold and domain organization but sharing less sequence homology with the other bacterial ASADHs. The second isoform of ASADH in Vibrio cholerae is one of the prototypes of this family. It also includes ASADHs from Streptococcus pneumoniae, Mycobacterium tuberculosis, Thermus thermophilus, as well as from eukaryotes. ASADH (EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the NADPH-dependent formation of L-aspartate-semialdehyde (ASA) by the reductive dephosphorylation of L-aspartyl-4-phosphate, which is the second step of the aspartate biosynthetic pathway. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. ASADH contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain."
definition: >-
  N-terminal NAD(P)-binding domain of Vibrio cholerae aspartate beta-semialdehyde dehydrogenase 2 (ASADH2) and similar proteins. The family corresponds to a new branch of bacterial ASADH enzymes that has a similar overall fold and domain organization but sharing less sequence homology with the other bacterial ASADHs. The second isoform of ASADH in Vibrio cholerae is one of the prototypes of this family. It also includes ASADHs from Streptococcus pneumoniae, Mycobacterium tuberculosis, Thermus thermophilus, as well as from eukaryotes. ASADH (EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the NADPH-dependent formation of L-aspartate-semialdehyde (ASA) by the reductive dephosphorylation of L-aspartyl-4-phosphate, which is the second step of the aspartate biosynthetic pathway. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. ASADH contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain. — an NCBI CDD conserved domain (cd02316); members share this curated model.
