identifier: CDD:cd10362
label: "Src homology 2 (SH2) domain in lymphocyte cell kinase (Lck). Lck is a member of the Src non-receptor type tyrosine kinase family of proteins. It is expressed in the brain, T-cells, and NK cells.  The unique domain of Lck mediates its interaction with two T-cell surface molecules, CD4 and CD8. It associates with their cytoplasmic tails on CD4 T helper cells  and CD8 cytotoxic T cells to assist signaling from the T cell receptor (TCR) complex. When the T cell receptor is engaged by the specific antigen presented by MHC, Lck phosphorylase the intracellular chains of the CD3 and zeta-chains of the TCR complex, allowing ZAP-70 to bind them. Lck then phosphorylates and activates ZAP-70, which in turn phosphorylates Linker of Activated T cells (LAT), a transmembrane protein that serves as a docking site for proteins including: Shc-Grb2-SOS, PI3K, and phospholipase C (PLC). The tyrosine phosphorylation cascade culminates in the intracellular mobilization of a calcium ions and activation of important signaling cascades within the lymphocyte, including the Ras-MEK-ERK pathway, which goes on to activate certain transcription factors such as NFAT, NF-kappaB, and AP-1. These transcription factors regulate the production cytokines such as Interleukin-2 that promote long-term proliferation and differentiation of the activated lymphocytes.  The N-terminal tail of Lck is myristoylated and palmitoylated and it tethers the protein to the plasma membrane of the cell. Lck also contains a SH3 domain, a SH2 domain, and a C-terminal tyrosine kinase domain. Lck has 2 phosphorylation sites, the first an autophosphorylation site that is linked to activation of the protein and the second which is phosphorylated by Csk, which inhibits it. Lck is also inhibited by SHP-1 dephosphorylation and by Cbl ubiquitin ligase, which is part of the ubiquitin-mediated pathway. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain in lymphocyte cell kinase (Lck). Lck is a member of the Src non-receptor type tyrosine kinase family of proteins. It is expressed in the brain, T-cells, and NK cells. The unique domain of Lck mediates its interaction with two T-cell surface molecules, CD4 and CD8. It associates with their cytoplasmic tails on CD4 T helper cells and CD8 cytotoxic T cells to assist signaling from the T cell receptor (TCR) complex. When the T cell receptor is engaged by the specific antigen presented by MHC, Lck phosphorylase the intracellular chains of the CD3 and zeta-chains of the TCR complex, allowing ZAP-70 to bind them. Lck then phosphorylates and activates ZAP-70, which in turn phosphorylates Linker of Activated T cells (LAT), a transmembrane protein that serves as a docking site for proteins including: Shc-Grb2-SOS, PI3K, and phospholipase C (PLC). The tyrosine phosphorylation cascade culminates in the intracellular mobilization of a calcium ions and activation of important signaling cascades within the lymphocyte, including the Ras-MEK-ERK pathway, which goes on to activate certain transcription factors such as NFAT, NF-kappaB, and AP-1. These transcription factors regulate the production cytokines such as Interleukin-2 that promote long-term proliferation and differentiation of the activated lymphocytes. The N-terminal tail of Lck is myristoylated and palmitoylated and it tethers the protein to the plasma membrane of the cell. Lck also contains a SH3 domain, a SH2 domain, and a C-terminal tyrosine kinase domain. Lck has 2 phosphorylation sites, the first an autophosphorylation site that is linked to activation of the protein and the second which is phosphorylated by Csk, which inhibits it. Lck is also inhibited by SHP-1 dephosphorylation and by Cbl ubiquitin ligase, which is part of the ubiquitin-mediated pathway. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10362); members share this curated model.
