identifier: CDD:cd14779
label: "Globin domain of Alcaligenes eutrophus flavohemoglobin (FHP) and related proteins. Flavohemoglobins (flavoHbs) function primarily as nitric oxide dioxygenases (NODs, EC 1.14.12.17), converting NO and O2 to inert NO3- (nitrate). They have an N-terminal globin domain and a C-terminal ferredoxin reductase-like NAD- and FAD-binding domain, and use the reducing power of cellular NAD(P)H to drive regeneration of the ferrous heme. They protect from nitrosative stress (the broad range of cellular toxicities caused by NO), and modulate NO signaling pathways. NO scavenging by flavoHb maintains Medicago truncatula-Sinorhizobium meliloti symbiosis. Alcaligenes eutrophus FHP contains a phospholipid-binding site."
definition: >-
  Globin domain of Alcaligenes eutrophus flavohemoglobin (FHP) and related proteins. Flavohemoglobins (flavoHbs) function primarily as nitric oxide dioxygenases (NODs, EC 1.14.12.17), converting NO and O2 to inert NO3- (nitrate). They have an N-terminal globin domain and a C-terminal ferredoxin reductase-like NAD- and FAD-binding domain, and use the reducing power of cellular NAD(P)H to drive regeneration of the ferrous heme. They protect from nitrosative stress (the broad range of cellular toxicities caused by NO), and modulate NO signaling pathways. NO scavenging by flavoHb maintains Medicago truncatula-Sinorhizobium meliloti symbiosis. Alcaligenes eutrophus FHP contains a phospholipid-binding site. — an NCBI CDD conserved domain (cd14779); members share this curated model.
