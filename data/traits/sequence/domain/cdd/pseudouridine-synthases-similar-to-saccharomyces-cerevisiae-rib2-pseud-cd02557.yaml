identifier: CDD:cd02557
label: "Pseudouridine synthases similar to Saccharomyces cerevisiae RIB2. Pseudouridine synthase, Saccharomyces cerevisiae RIB2_like. This group is comprised of eukaryotic and bacterial proteins similar to Saccharomyces cerevisiae RIB2, S. cerevisiae Pus6p and human hRPUDSD2. S. cerevisiae RIB2 displays two distinct catalytic activities. The N-terminal domain of RIB2 is RNA:psi-synthase which makes psi32 on cytoplasmic tRNAs. Psi32 is highly phylogenetically conserved.   The C-terminal domain of RIB2 has a DRAP deaminase activity which catalyses the formation of 5-amino-6-ribitylamino-2,4(1H,3H)-pyrimidinedione 5'-phosphate from 2,5-diamino-6-ribitylamino-4(3H)-pyrimidinone 5'-phosphate during riboflavin biosynthesis. S. cerevisiae Pus6p makes the psi31 of cytoplasmic and mitochondrial tRNAs."
definition: >-
  Pseudouridine synthases similar to Saccharomyces cerevisiae RIB2. Pseudouridine synthase, Saccharomyces cerevisiae RIB2_like. This group is comprised of eukaryotic and bacterial proteins similar to Saccharomyces cerevisiae RIB2, S. cerevisiae Pus6p and human hRPUDSD2. S. cerevisiae RIB2 displays two distinct catalytic activities. The N-terminal domain of RIB2 is RNA:psi-synthase which makes psi32 on cytoplasmic tRNAs. Psi32 is highly phylogenetically conserved. The C-terminal domain of RIB2 has a DRAP deaminase activity which catalyses the formation of 5-amino-6-ribitylamino-2,4(1H,3H)-pyrimidinedione 5'-phosphate from 2,5-diamino-6-ribitylamino-4(3H)-pyrimidinone 5'-phosphate during riboflavin biosynthesis. S. cerevisiae Pus6p makes the psi31 of cytoplasmic and mitochondrial tRNAs. — an NCBI CDD conserved domain (cd02557); members share this curated model.
