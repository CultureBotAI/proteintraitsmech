identifier: CDD:cd22693
label: "forkhead associated (FHA) domain found in Mycobacterium tuberculosis FHA domain-containing protein FhaB and similar proteins. FhaB, also called FtsZ-interacting protein A (FipA), is a putative virulence factor involved in regulating cell shape. It can interact with polyketide-associated protein PapA5, a putative membrane protein involved in the biosynthesis of virulence enhancing lipids. FhaB regulates growth and cell division. It is probably required for divisomal protein assembly under oxidative stress. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Mycobacterium tuberculosis FHA domain-containing protein FhaB and similar proteins. FhaB, also called FtsZ-interacting protein A (FipA), is a putative virulence factor involved in regulating cell shape. It can interact with polyketide-associated protein PapA5, a putative membrane protein involved in the biosynthesis of virulence enhancing lipids. FhaB regulates growth and cell division. It is probably required for divisomal protein assembly under oxidative stress. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22693); members share this curated model.
