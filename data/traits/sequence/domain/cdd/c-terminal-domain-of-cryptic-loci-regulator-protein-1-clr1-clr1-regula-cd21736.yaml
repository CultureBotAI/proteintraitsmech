identifier: CDD:cd21736
label: Clr1_CTD
definition: >-
  C-terminal domain of cryptic loci regulator protein 1 (Clr1). Clr1 regulates silencing of the mat2 and mat3 loci. It organizes the chromatin structure of the mating-type region where it also participates in establishing the 'cold spot' for recombination. Clr1 is required for proper positioning of nucleosomes at heterochromatic loci and for transcriptional gene silencing (TGS) function of the Snf2/Hdac-containing repressor complex (SHREC). The model corresponds to C-terminal domain of Clr1, which is the assembly platform for the SHREC histone deacetylase (HDAC) module
