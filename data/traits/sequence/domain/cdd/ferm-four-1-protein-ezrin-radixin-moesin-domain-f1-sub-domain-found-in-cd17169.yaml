identifier: CDD:cd17169
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing protein 3 (FRMPD3). FRMPD3 is an uncharacterized FERM and PDZ domain-containing protein. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to the F1 sub-domain of the FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing protein 3 (FRMPD3). FRMPD3 is an uncharacterized FERM and PDZ domain-containing protein. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to the F1 sub-domain of the FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17169); members share this curated model.
