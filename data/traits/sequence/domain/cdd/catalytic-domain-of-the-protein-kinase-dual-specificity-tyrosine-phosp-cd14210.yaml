identifier: CDD:cd14210
label: "Catalytic domain of the protein kinase, Dual-specificity tYrosine-phosphorylated and -Regulated Kinase. Protein Kinases (PKs), Dual-specificity tYrosine-phosphorylated and -Regulated Kinase (DYRK) subfamily, catalytic (c) domain. Dual-specificity PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine (S/T) as well as tyrosine residues on protein substrates. The DYRK subfamily is part of a larger superfamily that includes the catalytic domains of other protein S/T PKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase (PI3K). DYRKs autophosphorylate themselves on tyrosine residues and phosphorylate their substrates exclusively on S/T residues. They play important roles in cell proliferation, differentiation, survival, and development. Vertebrates contain multiple DYRKs (DYRK1-4) and mammals contain two types of DYRK1 proteins, DYRK1A and DYRK1B. DYRK1A is involved in neuronal differentiation and is implicated in the pathogenesis of DS (Down syndrome). DYRK1B plays a critical role in muscle differentiation by regulating transcription, cell motility, survival, and cell cycle progression. It is overexpressed in many solid tumors where it acts as a tumor survival factor. DYRK2 promotes apoptosis in response to DNA damage by phosphorylating the tumor suppressor p53, while DYRK3 promotes cell survival by phosphorylating SIRT1 and promoting p53 deacetylation. DYRK4 is a testis-specific kinase that may function during spermiogenesis."
