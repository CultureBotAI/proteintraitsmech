label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 3 (KLHL3). KLHL3 serves as a substrate adapter in Cullin3 (Cul3) E3 ubiquitin ligase complexes. It is a component of an E3 ubiquitin ligase complex that regulates blood pressure by targeting With-No-Lysine (WNK) kinases for degradation."
definition: >-
