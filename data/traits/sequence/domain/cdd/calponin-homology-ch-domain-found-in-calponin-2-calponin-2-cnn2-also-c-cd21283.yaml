identifier: CDD:cd21283
label: "calponin homology (CH) domain found in calponin-2. Calponin-2 (CNN2), also called neutral calponin, or smooth muscle calponin H2, is an actin cytoskeleton-associated regulatory protein that inhibits the activity of myosin-ATPase and cytoskeleton dynamics. It contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs."
