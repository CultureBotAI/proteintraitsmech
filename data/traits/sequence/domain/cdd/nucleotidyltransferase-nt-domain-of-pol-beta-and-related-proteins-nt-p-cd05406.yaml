identifier: CDD:cd05406
label: "Nucleotidyltransferase (NT) domain of Pol beta and related proteins. NT_PolXc_beta _like: A subgroup of the Polymerase X family DNA polymerase domain containing proteins similar to human (h)Pol beta. hPol beta participates in human base excision repair (BER), it has an additional, 5prime-deoxyribose phosphate lyase activity (dRP) which complements DNA synthesis during BER. hPol beta is a DNA template-dependent polymerase which lacks exonuclease proofreading activity, but is a moderately high fidelity polymerase. hPol beta can also act as DNA-independent RNA polymerase. Mutations in the gene for pol beta have been identified in a variety of human carcinomas including colorectal, lung, and breast cancers. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these POLXc_beta NT domains."
