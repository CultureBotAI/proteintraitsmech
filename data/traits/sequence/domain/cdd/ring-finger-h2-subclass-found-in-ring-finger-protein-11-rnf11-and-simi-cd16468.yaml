identifier: CDD:cd16468
label: "RING finger, H2 subclass, found in RING finger protein 11 (RNF11) and similar proteins. RNF11 is an E3 ubiquitin-protein ligase that acts both as an adaptor and a modulator of itch-mediated control of ubiquitination events underlying membrane traffic. It acts downstream of an enzymatic cascade for the ubiquitination of specific substrates. It is also a molecular adaptor of homologous to E6-associated protein C-terminus (HECT)-type ligases. RNF11 has been implicated in the regulation of several signaling pathways. It enhances transforming growth factor receptor (TGFR) signaling by both abrogating Smurf2-mediated receptor ubiquitination and by promoting the Smurf2-mediated degradation of AMSH (associated molecule with the SH3 domain of STAM), a de-ubiquitinating enzyme that enhances TGF-beta signaling and epidermal growth factor receptor (EGFR) endosomal recycling. It also acts directly on Smad4 to enhance Smad4 function, and plays a role in prolonged TGF-beta signaling. RNF11 also functions as a critical component of the A20 ubiquitin-editing protein complex that negatively regulates tumor necrosis factor (TNF)-mediated nuclear factor (NF)-kappaB activation. It interacts with Smad anchor for receptor activation (SARA) and the endosomal sorting complex required for transport (ESCRT)-0 complex, thus participating in the regulation of lysosomal degradation of EGFR. RNF11 acts as a novel GGA cargo actively participating in regulating the ubiquitination of the GGA protein family. RNF11 functions together with TAX1BP1 to target TANK-binding kinase 1 (TBK1)/IkappaB kinase IKKi, and further restricts antiviral signaling and type I interferon (IFN)-beta production. RNF11 contains an N-terminal PPPY motif that binds WW domain-containing proteins such as AIP4/itch, Nedd4 and Smurf1/2 (SMAD-specific E3 ubiquitin-protein ligase 1/2), and a C-terminal C3H2C3-type RING-H2 finger that functions as a scaffold for the coordinated transfer of ubiquitin to substrate proteins together with the E2 enzymes UbcH527 and Ubc13."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 11 (RNF11) and similar proteins. RNF11 is an E3 ubiquitin-protein ligase that acts both as an adaptor and a modulator of itch-mediated control of ubiquitination events underlying membrane traffic. It acts downstream of an enzymatic cascade for the ubiquitination of specific substrates. It is also a molecular adaptor of homologous to E6-associated protein C-terminus (HECT)-type ligases. RNF11 has been implicated in the regulation of several signaling pathways. It enhances transforming growth factor receptor (TGFR) signaling by both abrogating Smurf2-mediated receptor ubiquitination and by promoting the Smurf2-mediated degradation of AMSH (associated molecule with the SH3 domain of STAM), a de-ubiquitinating enzyme that enhances TGF-beta signaling and epidermal growth factor receptor (EGFR) endosomal recycling. It also acts directly on Smad4 to enhance Smad4 function, and plays a role in prolonged TGF-beta signaling. RNF11 also functions as a critical component of the A20 ubiquitin-editing protein complex that negatively regulates tumor necrosis factor (TNF)-mediated nuclear factor (NF)-kappaB activation. It interacts with Smad anchor for receptor activation (SARA) and the endosomal sorting complex required for transport (ESCRT)-0 complex, thus participating in the regulation of lysosomal degradation of EGFR. RNF11 acts as a novel GGA cargo actively participating in regulating the ubiquitination of the GGA protein family. RNF11 functions together with TAX1BP1 to target TANK-binding kinase 1 (TBK1)/IkappaB kinase IKKi, and further restricts antiviral signaling and type I interferon (IFN)-beta production. RNF11 contains an N-terminal PPPY motif that binds WW domain-containing proteins such as AIP4/itch, Nedd4 and Smurf1/2 (SMAD-specific E3 ubiquitin-protein ligase 1/2), and a C-terminal C3H2C3-type RING-H2 finger that functions as a scaffold for the coordinated transfer of ubiquitin to substrate proteins together with the E2 enzymes UbcH527 and Ubc13. — an NCBI CDD conserved domain (cd16468); members share this curated model.
