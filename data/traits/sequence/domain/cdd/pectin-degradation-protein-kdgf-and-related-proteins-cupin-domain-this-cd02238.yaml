identifier: CDD:cd02238
label: "pectin degradation protein KdgF and related proteins, cupin domain. This family includes bacterial and archaeal pectin degradation protein KdgF that catalyzes the linearization of unsaturated uronates from both pectin and alginate, which are polysaccharides found in the cell walls of plants and brown algae, respectively, and represent an important source of carbon. These polysaccharides, mostly consisting of chains of uronates, can be metabolized by bacteria through a pathway of enzymatic steps to the key metabolite 2-keto-3-deoxygluconate (KDG). Pectin degradation is used by many plant-pathogenic bacteria during infection, and also, pectin and alginate can both represent abundant sources of carbohydrate for the production of biofuels. These proteins belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  pectin degradation protein KdgF and related proteins, cupin domain. This family includes bacterial and archaeal pectin degradation protein KdgF that catalyzes the linearization of unsaturated uronates from both pectin and alginate, which are polysaccharides found in the cell walls of plants and brown algae, respectively, and represent an important source of carbon. These polysaccharides, mostly consisting of chains of uronates, can be metabolized by bacteria through a pathway of enzymatic steps to the key metabolite 2-keto-3-deoxygluconate (KDG). Pectin degradation is used by many plant-pathogenic bacteria during infection, and also, pectin and alginate can both represent abundant sources of carbohydrate for the production of biofuels. These proteins belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd02238); members share this curated model.
