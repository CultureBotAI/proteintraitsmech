identifier: CDD:cd12056
label: "Third Src Homology 3 domain (SH3C) of CD2-associated protein. CD2AP, also called CMS (Cas ligand with Multiple SH3 domains) or METS1 (Mesenchyme-to-Epithelium Transition protein with SH3 domains), is a cytosolic adaptor protein that plays a role in regulating the cytoskeleton. It is critical in cell-to-cell union necessary for kidney function. It also stabilizes the contact between a T cell and antigen-presenting cells. It is primarily expressed in podocytes at the cytoplasmic face of the slit diaphragm and serves as a linker anchoring podocin and nephrin to the actin cytoskeleton. CD2AP contains three SH3 domains, a proline-rich region, and a C-terminal coiled-coil domain. All of these domains enable CD2AP to bind various protein partners and assemble complexes that have been implicated in many different functions. This alignment model represents the third SH3 domain (SH3C) of CD2AP. SH3C has been shown to bind ubiquitin. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Third Src Homology 3 domain (SH3C) of CD2-associated protein. CD2AP, also called CMS (Cas ligand with Multiple SH3 domains) or METS1 (Mesenchyme-to-Epithelium Transition protein with SH3 domains), is a cytosolic adaptor protein that plays a role in regulating the cytoskeleton. It is critical in cell-to-cell union necessary for kidney function. It also stabilizes the contact between a T cell and antigen-presenting cells. It is primarily expressed in podocytes at the cytoplasmic face of the slit diaphragm and serves as a linker anchoring podocin and nephrin to the actin cytoskeleton. CD2AP contains three SH3 domains, a proline-rich region, and a C-terminal coiled-coil domain. All of these domains enable CD2AP to bind various protein partners and assemble complexes that have been implicated in many different functions. This alignment model represents the third SH3 domain (SH3C) of CD2AP. SH3C has been shown to bind ubiquitin. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12056); members share this curated model.
