identifier: CDD:cd20705
label: "Marker for type sIX effectors domain, clan I. This subfamily contains the MIX (Marker for type sIX effectors) clan I (MIX I) domain. MIX is a marker of type VI secretion system (T6SS) effectors carrying polymorphic C-terminal toxins predicted to mediate antibacterial toxicity. These C-terminal toxin domains of Vibrionaceae MIX I effectors include pore-forming, nuclease and nucleotide deaminase activities. Members of the MIX I clan are similar, in both sequence and synteny, to the Vibrio parahaemolyticus MIX-effector VP1388, but their activity is unknown. Notably, many toxins identified as T6SS effectors do not contain a recognizable delivery domain or signal, suggesting that additional delivery domains may exist."
definition: >-
  Marker for type sIX effectors domain, clan I. This subfamily contains the MIX (Marker for type sIX effectors) clan I (MIX I) domain. MIX is a marker of type VI secretion system (T6SS) effectors carrying polymorphic C-terminal toxins predicted to mediate antibacterial toxicity. These C-terminal toxin domains of Vibrionaceae MIX I effectors include pore-forming, nuclease and nucleotide deaminase activities. Members of the MIX I clan are similar, in both sequence and synteny, to the Vibrio parahaemolyticus MIX-effector VP1388, but their activity is unknown. Notably, many toxins identified as T6SS effectors do not contain a recognizable delivery domain or signal, suggesting that additional delivery domains may exist. — an NCBI CDD conserved domain (cd20705); members share this curated model.
