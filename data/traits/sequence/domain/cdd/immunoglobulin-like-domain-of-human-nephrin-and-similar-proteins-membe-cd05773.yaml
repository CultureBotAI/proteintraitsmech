identifier: CDD:cd05773
label: "Immunoglobulin-like domain of human nephrin and similar proteins; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the immunoglobulin-like domain in human nephrin and similar proteins. Nephrin is an integral component of the slit diaphragm and is a central component of the glomerular ultrafilter. Nephrin plays a structural role and has a role in signaling. Nephrin is a transmembrane protein having a short intracellular portion, an extracellular portion comprised of eight Ig-like domains, and one fibronectin type III-like domain. The extracellular portions of nephrin from neighboring foot processes of separate podocyte cells may interact with each other, and in association with other components of the slit diaphragm form a porous molecular sieve within the slit pore.  The intracellular portion of nephrin is associated with linker proteins, which connect nephrin to the actin cytoskeleton. The intracellular portion is tyrosine phosphorylated, and mediates signaling from the slit diaphragm into the podocytes."
definition: >-
