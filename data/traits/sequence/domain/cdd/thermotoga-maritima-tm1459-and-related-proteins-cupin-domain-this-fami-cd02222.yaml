identifier: CDD:cd02222
label: "Thermotoga maritima TM1459 and related proteins, cupin domain. This family includes bacterial and archaeal proteins homologous to Thermotoga maritima TM1459, a manganese-containing cupin that has been shown to cleave C=C bonds in the presence of alkylperoxide as oxidant in vitro. Its biological function is still unknown. This family also includes Halorhodospira halophila Hhal_0468. Structures of these proteins show a cupin fold with a conserved \"jelly roll-like\" beta-barrel fold that form a homodimer."
definition: >-
  Thermotoga maritima TM1459 and related proteins, cupin domain. This family includes bacterial and archaeal proteins homologous to Thermotoga maritima TM1459, a manganese-containing cupin that has been shown to cleave C=C bonds in the presence of alkylperoxide as oxidant in vitro. Its biological function is still unknown. This family also includes Halorhodospira halophila Hhal_0468. Structures of these proteins show a cupin fold with a conserved "jelly roll-like" beta-barrel fold that form a homodimer. — an NCBI CDD conserved domain (cd02222); members share this curated model.
