identifier: CDD:cd23652
label: "Trypanosomal mitochondrial ribosomal protein mS38 domain family, and similar proteins. mS38 protein is a mitochondrial protein found in Trypanosoma, but its function has not yet been fully characterized. It is known to be a component of the small subunits of the Trypanosoma brucei mitochondrial ribosome (Tb-mt-SSUs) and interacts with the C-terminal domain (CTD) of initiation factor IF-3 to form a complex called Tb-mt-SSU/IF-3. This complex may play a role in the maturation of the mitochondrial ribosome."
definition: >-
  Trypanosomal mitochondrial ribosomal protein mS38 domain family, and similar proteins. mS38 protein is a mitochondrial protein found in Trypanosoma, but its function has not yet been fully characterized. It is known to be a component of the small subunits of the Trypanosoma brucei mitochondrial ribosome (Tb-mt-SSUs) and interacts with the C-terminal domain (CTD) of initiation factor IF-3 to form a complex called Tb-mt-SSU/IF-3. This complex may play a role in the maturation of the mitochondrial ribosome. — an NCBI CDD conserved domain (cd23652); members share this curated model.
