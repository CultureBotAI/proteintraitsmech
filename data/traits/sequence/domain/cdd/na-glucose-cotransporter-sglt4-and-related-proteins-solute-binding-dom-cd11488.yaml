identifier: CDD:cd11488
label: "Na(+)/glucose cotransporter SGLT4 and related proteins; solute-binding domain. Human SGLT4 (hSGLT4) has been reported to be a low-affinity glucose transporter with unusual sugar selectivity: it transports D-mannose but not galactose or 3-O-methyl-D-glucoside. It is encoded by the SLC5A9 gene and is expressed in intestine, kidney, liver, brain, lung, trachea, uterus, and pancreas. hSLGT4 is predicted to contain 14 membrane-spanning regions. This subgroup belongs to the solute carrier 5 (SLC5 )transporter family."
definition: >-
  Na(+)/glucose cotransporter SGLT4 and related proteins; solute-binding domain. Human SGLT4 (hSGLT4) has been reported to be a low-affinity glucose transporter with unusual sugar selectivity: it transports D-mannose but not galactose or 3-O-methyl-D-glucoside. It is encoded by the SLC5A9 gene and is expressed in intestine, kidney, liver, brain, lung, trachea, uterus, and pancreas. hSLGT4 is predicted to contain 14 membrane-spanning regions. This subgroup belongs to the solute carrier 5 (SLC5 )transporter family. — an NCBI CDD conserved domain (cd11488); members share this curated model.
