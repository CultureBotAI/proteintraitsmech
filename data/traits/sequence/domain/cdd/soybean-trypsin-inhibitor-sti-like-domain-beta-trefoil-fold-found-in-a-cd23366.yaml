identifier: CDD:cd23366
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Arabidopsis thaliana trypsin protease inhibitor (AtTPI) and similar proteins. AtTPI, also called kunitz trypsin inhibitor 4 (AtKTI4), or Kunitz trypsin inhibitor 1 (AtKTI1), exhibits Kunitz trypsin protease inhibitor activity. It is involved in modulating programmed cell death (PCD) in plant-pathogen interactions. It can also inhibit both serine proteases and cysteine proteases. It may be involved in the modulation of proteases that participate in the hydrolysis of dietary proteins in the gut of spider mites. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Arabidopsis thaliana trypsin protease inhibitor (AtTPI) and similar proteins. AtTPI, also called kunitz trypsin inhibitor 4 (AtKTI4), or Kunitz trypsin inhibitor 1 (AtKTI1), exhibits Kunitz trypsin protease inhibitor activity. It is involved in modulating programmed cell death (PCD) in plant-pathogen interactions. It can also inhibit both serine proteases and cysteine proteases. It may be involved in the modulation of proteases that participate in the hydrolysis of dietary proteins in the gut of spider mites. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23366); members share this curated model.
