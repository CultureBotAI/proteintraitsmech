identifier: CDD:cd21066
label: "NURR (N-terminal unit for RNA recognition) domain found in heterogeneous nuclear ribonucleoprotein Q (hnRNPQ) and similar proteins. hnRNPQ, also termed glycine- and tyrosine-rich RNA-binding protein (GRY-RBP), or NS1-associated protein 1 (NSAP1), or Synaptotagmin-binding, cytoplasmic RNA-interacting protein (SYNCRIP), is a highly conserved RNA-binding protein that mediates the exosomal partition of a set of miRNAs. It acts as a component of the hepatocyte exosomal miRNA sorting machinery. The model corresponds to NURR domain of hnRNPQ, which has structural similarity to bacterial protein Barstar and binds to Apobec1."
definition: >-
  NURR (N-terminal unit for RNA recognition) domain found in heterogeneous nuclear ribonucleoprotein Q (hnRNPQ) and similar proteins. hnRNPQ, also termed glycine- and tyrosine-rich RNA-binding protein (GRY-RBP), or NS1-associated protein 1 (NSAP1), or Synaptotagmin-binding, cytoplasmic RNA-interacting protein (SYNCRIP), is a highly conserved RNA-binding protein that mediates the exosomal partition of a set of miRNAs. It acts as a component of the hepatocyte exosomal miRNA sorting machinery. The model corresponds to NURR domain of hnRNPQ, which has structural similarity to bacterial protein Barstar and binds to Apobec1. — an NCBI CDD conserved domain (cd21066); members share this curated model.
