identifier: CDD:cd20667
label: "cytochrome P450, family 2, subfamily AB, polypeptide 1 and similar cytochrome P450s. The function of CYP2AB1 is unknown. CYP2AB1 belongs to family 2 of the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
