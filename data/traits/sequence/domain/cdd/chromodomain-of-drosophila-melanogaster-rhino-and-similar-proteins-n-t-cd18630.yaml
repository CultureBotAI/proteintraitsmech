identifier: CDD:cd18630
label: "chromodomain of Drosophila melanogaster Rhino, and similar proteins. N-terminal CHRomatin Organization Modifier (chromo) domain of Drosophila melanogaster Rhino (also known as heterochromatin protein 1-like), and similar proteins.  Rhino is a female-specific protein that affects chromosome structure and egg polarity that is required for germline PIWI-interacting RNA (piRNA) production. In Drosophila the RDC (rhino, deadlock, and cutoff) complex, composed of rhino, the protein deadlock (Del) and the Rai1-like transcription termination cofactor cutoff (Cuff) binds to chromatin of dual-strand piRNA clusters, special genomic regions, which encode piRNA precursors.  The RDC complex is anchored to H3K9me3-marked chromatin in part via the H3K9me3-binding activity of Rhino, and is required for transcription of piRNA precursors. A chromodomain is a conserved region of about 50 amino acids, found in a variety of chromosomal proteins, and which appears to play a role in the functional organization of the eukaryotic nucleus. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain."
definition: >-
  chromodomain of Drosophila melanogaster Rhino, and similar proteins. N-terminal CHRomatin Organization Modifier (chromo) domain of Drosophila melanogaster Rhino (also known as heterochromatin protein 1-like), and similar proteins. Rhino is a female-specific protein that affects chromosome structure and egg polarity that is required for germline PIWI-interacting RNA (piRNA) production. In Drosophila the RDC (rhino, deadlock, and cutoff) complex, composed of rhino, the protein deadlock (Del) and the Rai1-like transcription termination cofactor cutoff (Cuff) binds to chromatin of dual-strand piRNA clusters, special genomic regions, which encode piRNA precursors. The RDC complex is anchored to H3K9me3-marked chromatin in part via the H3K9me3-binding activity of Rhino, and is required for transcription of piRNA precursors. A chromodomain is a conserved region of about 50 amino acids, found in a variety of chromosomal proteins, and which appears to play a role in the functional organization of the eukaryotic nucleus. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain. — an NCBI CDD conserved domain (cd18630); members share this curated model.
