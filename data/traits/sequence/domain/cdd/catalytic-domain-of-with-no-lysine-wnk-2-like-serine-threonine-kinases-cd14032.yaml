identifier: CDD:cd14032
label: "Catalytic domain of With No Lysine (WNK) 2-like Serine/Threonine kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. WNK2 is widely expressed and has been shown to be epigenetically silenced in gliomas. It inhibits cell growth by acting as a negative regulator of MEK1-ERK1/2 signaling. WNK2 modulates growth factor-induced cancer cell proliferation, suggesting that it may be a tumor suppressor gene. WNKs comprise a subfamily of STKs with an unusual placement of the catalytic lysine relative to all other protein kinases. They are critical in regulating ion balance and are thus, important components in the control of blood pressure. The WNK2-like subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of With No Lysine (WNK) 2-like Serine/Threonine kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. WNK2 is widely expressed and has been shown to be epigenetically silenced in gliomas. It inhibits cell growth by acting as a negative regulator of MEK1-ERK1/2 signaling. WNK2 modulates growth factor-induced cancer cell proliferation, suggesting that it may be a tumor suppressor gene. WNKs comprise a subfamily of STKs with an unusual placement of the catalytic lysine relative to all other protein kinases. They are critical in regulating ion balance and are thus, important components in the control of blood pressure. The WNK2-like subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14032); members share this curated model.
