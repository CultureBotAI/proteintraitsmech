label: FAP273
definition: >-
  Chlamydomonas reinhardtii flagellum-associated protein 273 (FAP273), and similar proteins. The family includes Chlamydomonas reinhardtii FAP273 and similar proteins. Flagellum-associated protein 273 (FAP273) is a microtubule inner protein (MIP) that acts as a component of the decorated ciliary doublet microtubule, which reveals the identities, positions, repeat lengths and interactions of 38 associated proteins including 33 MIPs
