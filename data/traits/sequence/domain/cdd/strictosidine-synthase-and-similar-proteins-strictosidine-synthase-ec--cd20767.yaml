identifier: CDD:cd20767
label: strictosidine_synthase-like
definition: >-
  strictosidine synthase and similar proteins. Strictosidine synthase (EC 4.3.3.2) catalyzes the conversion of tryptamine and secologanin to 3-alpha(S)-strictosidine (Pictet-Spengler condensation) and is a key enzyme in the production of indole alkaloids, about 2000 monoterpenoid indole alkaloids in higher plants
