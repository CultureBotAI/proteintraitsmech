identifier: CDD:cd22981
label: "dimerization/docking (D/D) domain found in Trypanosoma brucei adenylate kinase (AK) and similar proteins. AK (EC 2.7.4.3), also called ATP-AMP transphosphorylase, ATP:AMP phosphotransferase, or adenylate monophosphate kinase, catalyzes the reversible transfer of the terminal phosphate group between ATP and AMP. It plays an important role in cellular energy homeostasis and in adenine nucleotide metabolism. Members of this subfamily contain an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in Trypanosoma brucei adenylate kinase (AK) and similar proteins. AK (EC 2.7.4.3), also called ATP-AMP transphosphorylase, ATP:AMP phosphotransferase, or adenylate monophosphate kinase, catalyzes the reversible transfer of the terminal phosphate group between ATP and AMP. It plays an important role in cellular energy homeostasis and in adenine nucleotide metabolism. Members of this subfamily contain an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22981); members share this curated model.
