identifier: CDD:cd12662
label: "RNA recognition motif 3 (RRM3) found in vertebrate myelin expression factor 2 (MEF-2). This subgroup corresponds to the RRM3 of MEF-2, also termed MyEF-2 or MST156, a sequence-specific single-stranded DNA (ssDNA) binding protein that binds specifically to ssDNA derived from the proximal (MB1) element of the myelin basic protein (MBP) promoter and represses transcription of the MBP gene. MEF-2 contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), which may be responsible for its ssDNA binding activity."
definition: >-
  RNA recognition motif 3 (RRM3) found in vertebrate myelin expression factor 2 (MEF-2). This subgroup corresponds to the RRM3 of MEF-2, also termed MyEF-2 or MST156, a sequence-specific single-stranded DNA (ssDNA) binding protein that binds specifically to ssDNA derived from the proximal (MB1) element of the myelin basic protein (MBP) promoter and represses transcription of the MBP gene. MEF-2 contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), which may be responsible for its ssDNA binding activity. — an NCBI CDD conserved domain (cd12662); members share this curated model.
