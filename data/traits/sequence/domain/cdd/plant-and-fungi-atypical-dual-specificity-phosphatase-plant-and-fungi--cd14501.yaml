identifier: CDD:cd14501
label: "plant and fungi atypical dual-specificity phosphatase. Plant and fungi atypical dual-specificity phosphatases (PFA-DSPs) are a group of atypical DSPs present in plants, fungi, kinetoplastids, and slime molds. They share structural similarity with atypical- and lipid phosphatase DSPs from mammals. The PFA-DSP group is composed of active as well as inactive phosphatases. The best characterized member is Saccharomyces Siw14, also known as Oca3, which plays a role in actin filament organization and endocytosis. Siw14 has been shown to be an inositol pyrophosphate phosphatase, hydrolyzing the beta-phosphate from 5-diphosphoinositol pentakisphosphate (5PP-IP5or IP7)."
