identifier: CDD:cd03846
label: FlaRed_like_1
definition: >-
  Flavin reductase-like protein family. It belongs to a flavin reductase superfamily which is part of a two-component enzyem system. The smaller component is a flavin reductase which reduces FMN or FAD using NAD(P)H as cofactor. The larger component enzyme then uses the reduced flavin to hydroxylate the substrates
