identifier: CDD:cd21111
label: "inulin fructotransferase. Inulin fructotransferase (IFTase; EC 4.2.2.17 and EC 4.2.2.18), a member of the glycoside hydrolase family 91, catalyzes depolymerization of beta-2,1-fructans inulin by successively removing the terminal difructosaccharide units as cyclic anhydrides via intramolecular fructosyl transfer. As a result, IFTase produces DFA-I (alpha-D-fructofuranose-beta-D-fructofuranose 2',1:2,1'-dianhydride) and DFA-III (alpha-D-fructofuranose-beta-D-fructofuranose 2',1:2,3'-dianhydride)."
definition: >-
