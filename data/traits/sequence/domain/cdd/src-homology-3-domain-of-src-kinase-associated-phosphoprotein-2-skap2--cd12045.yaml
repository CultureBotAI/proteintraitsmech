identifier: CDD:cd12045
label: "Src Homology 3 domain of Src Kinase-Associated Phosphoprotein 2. SKAP2, also called SKAP55-Related (SKAP55R) or SKAP55 homolog (SKAP-HOM or SKAP55-HOM), is an immune cell-specific adaptor protein that plays an important role in adhesion and migration of B-cells and macrophages. Binding partners include ADAP (adhesion and degranulation-promoting adaptor protein), YopH, SHPS1, and HPK1. SKAP2 has also been identified as a substrate for lymphoid-specific tyrosine phosphatase (Lyp), which has been implicated in a wide variety of autoimmune diseases. It contains a pleckstrin homology (PH) domain, a C-terminal SH3 domain, and several tyrosine phosphorylation sites. Like SKAP1, SKAP2 is expected to bind primarily to a proline-rich region of ADAP through its SH3 domain; its degradation may be regulated by ADAP. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Src Kinase-Associated Phosphoprotein 2. SKAP2, also called SKAP55-Related (SKAP55R) or SKAP55 homolog (SKAP-HOM or SKAP55-HOM), is an immune cell-specific adaptor protein that plays an important role in adhesion and migration of B-cells and macrophages. Binding partners include ADAP (adhesion and degranulation-promoting adaptor protein), YopH, SHPS1, and HPK1. SKAP2 has also been identified as a substrate for lymphoid-specific tyrosine phosphatase (Lyp), which has been implicated in a wide variety of autoimmune diseases. It contains a pleckstrin homology (PH) domain, a C-terminal SH3 domain, and several tyrosine phosphorylation sites. Like SKAP1, SKAP2 is expected to bind primarily to a proline-rich region of ADAP through its SH3 domain; its degradation may be regulated by ADAP. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12045); members share this curated model.
