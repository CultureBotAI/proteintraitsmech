identifier: CDD:cd16524
label: "RING finger, HC subclass, found in Caenorhabditis elegans RING finger protein NHL-1 and similar proteins. NHL-1 functions as an E3 ubiquitin-protein ligase in the presence of both UBC-13 and UBC-1 within the ubiquitin pathway of Caenorhabditis elegans. It acts in chemosensory neurons to promote stress resistance in distal tissues by the transcription factor DAF-16 activation but is dispensable for the activation of heat shock factor 1 (HSF-1). NHL-1 belongs to the TRIM (tripartite motif)-NHL family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil domain, as well as an NHL (named after proteins NCL-1, HT2A and Lin-41 that contain repeats folded into a six-bladed beta propeller) repeat domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in Caenorhabditis elegans RING finger protein NHL-1 and similar proteins. NHL-1 functions as an E3 ubiquitin-protein ligase in the presence of both UBC-13 and UBC-1 within the ubiquitin pathway of Caenorhabditis elegans. It acts in chemosensory neurons to promote stress resistance in distal tissues by the transcription factor DAF-16 activation but is dispensable for the activation of heat shock factor 1 (HSF-1). NHL-1 belongs to the TRIM (tripartite motif)-NHL family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil domain, as well as an NHL (named after proteins NCL-1, HT2A and Lin-41 that contain repeats folded into a six-bladed beta propeller) repeat domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16524); members share this curated model.
