identifier: CDD:cd05301
label: "D-glycerate dehydrogenase/hydroxypyruvate reductase (GDH). D-glycerate dehydrogenase (GDH, also known as hydroxypyruvate reductase, HPR) catalyzes the reversible reaction of (R)-glycerate + NAD+ to hydroxypyruvate + NADH + H+. In humans, HPR deficiency causes primary hyperoxaluria type 2, characterized by over-excretion of L-glycerate and oxalate in the urine, possibly due to an imbalance in competition with L-lactate dehydrogenase, another formate dehydrogenase (FDH)-like enzyme. GDH, like FDH and other members of the D-specific hydroxyacid dehydrogenase family that also includes L-alanine dehydrogenase and S-adenosylhomocysteine hydrolase, typically have a characteristic arrangement of 2 similar subdomains of the alpha/beta Rossmann-fold NAD+ binding form, despite often low sequence identity. The NAD+ binding domain is inserted within the linear sequence of the mostly N-terminal catalytic domain, which has a similar domain structure to the internal NAD binding domain. Structurally, these domains are connected by extended alpha helices and create a cleft in which NAD is bound, primarily to the C-terminal portion of the 2nd (internal) domain. Some related proteins have similar structural subdomain but with a tandem arrangement of the catalytic and NAD-binding subdomains in the linear sequence. While many members of this family are dimeric, alanine DH is hexameric and phosphoglycerate DH is tetrameric."
definition: >-
  D-glycerate dehydrogenase/hydroxypyruvate reductase (GDH). D-glycerate dehydrogenase (GDH, also known as hydroxypyruvate reductase, HPR) catalyzes the reversible reaction of (R)-glycerate + NAD+ to hydroxypyruvate + NADH + H+. In humans, HPR deficiency causes primary hyperoxaluria type 2, characterized by over-excretion of L-glycerate and oxalate in the urine, possibly due to an imbalance in competition with L-lactate dehydrogenase, another formate dehydrogenase (FDH)-like enzyme. GDH, like FDH and other members of the D-specific hydroxyacid dehydrogenase family that also includes L-alanine dehydrogenase and S-adenosylhomocysteine hydrolase, typically have a characteristic arrangement of 2 similar subdomains of the alpha/beta Rossmann-fold NAD+ binding form, despite often low sequence identity. The NAD+ binding domain is inserted within the linear sequence of the mostly N-terminal catalytic domain, which has a similar domain structure to the internal NAD binding domain. Structurally, these domains are connected by extended alpha helices and create a cleft in which NAD is bound, primarily to the C-terminal portion of the 2nd (internal) domain. Some related proteins have similar structural subdomain but with a tandem arrangement of the catalytic and NAD-binding subdomains in the linear sequence. While many members of this family are dimeric, alanine DH is hexameric and phosphoglycerate DH is tetrameric. — an NCBI CDD conserved domain (cd05301); members share this curated model.
