identifier: CDD:cd20910
label: "Nuclear Coactivator Binding Domain (NCBD) of CREB (cyclic AMP response element binding protein) binding protein (CREBBP, also known as CBP) and its paralog p300. CREBBP (also called CBP) and its paralog p300, generally referred to as CREBBP/p300, are universal transcriptional coactivators that interact with many important transcription factors and comodulators to activate transcription. The NCBD domain [nuclear coactivator binding domain, also known as IRF-3 binding domain (IBiD) or SRC1 interaction domain (SID)] of CREBBP/p300 behaves as an intrinsically disordered domain in isolation, but folds into helical structures with different topologies upon binding to different ligands such as nuclear receptor coactivator p160, CREBBP interaction domain (CID) from nuclear receptor coactivator 1 (NCOA1 or Src1), NCOA2 (Tif2), and NCOA3 (ACTR), or interferon regulatory factor 3 (IRF-3). In Drosophila, there is only one CREB-binding protein ortholog and it is called nejire, dCBP, CBP/p300, or CBP."
definition: >-
  Nuclear Coactivator Binding Domain (NCBD) of CREB (cyclic AMP response element binding protein) binding protein (CREBBP, also known as CBP) and its paralog p300. CREBBP (also called CBP) and its paralog p300, generally referred to as CREBBP/p300, are universal transcriptional coactivators that interact with many important transcription factors and comodulators to activate transcription. The NCBD domain [nuclear coactivator binding domain, also known as IRF-3 binding domain (IBiD) or SRC1 interaction domain (SID)] of CREBBP/p300 behaves as an intrinsically disordered domain in isolation, but folds into helical structures with different topologies upon binding to different ligands such as nuclear receptor coactivator p160, CREBBP interaction domain (CID) from nuclear receptor coactivator 1 (NCOA1 or Src1), NCOA2 (Tif2), and NCOA3 (ACTR), or interferon regulatory factor 3 (IRF-3). In Drosophila, there is only one CREB-binding protein ortholog and it is called nejire, dCBP, CBP/p300, or CBP. — an NCBI CDD conserved domain (cd20910); members share this curated model.
