identifier: CDD:cd20930
label: "Third immunoglobulin domain of Nectin-like Protein-5, and similar domains. The members here are composed of the third immunoglobulin domain of Nectin-like Protein-5 (also known as Cluster of Differentiation 155 (CD155)). Nectin-like Protein-5 mediates NK (Natural Killer) cell adhesion and triggers NK cell effector functions. CD155 binds two different NK cell receptors: CD96 and CD226. These interactions accumulate at the cell-cell contact site, leading to the formation of a mature immunological synapse between NK cell and target cell. This may trigger adhesion and secretion of lytic granules and IFN-gamma and activate cytotoxicity of activated NK cells. CD155 may also promote NK cell-target cell modular exchange, and PVR transfer to the NK cell. This transfer is more important in some tumor cells expressing a lot of PVR, and may trigger fratricide NK cell activation, providing tumors with a mechanism of immunoevasion. Moreover, CD155 plays a role in mediating tumor cell invasion and migration."
definition: >-
  Third immunoglobulin domain of Nectin-like Protein-5, and similar domains. The members here are composed of the third immunoglobulin domain of Nectin-like Protein-5 (also known as Cluster of Differentiation 155 (CD155)). Nectin-like Protein-5 mediates NK (Natural Killer) cell adhesion and triggers NK cell effector functions. CD155 binds two different NK cell receptors: CD96 and CD226. These interactions accumulate at the cell-cell contact site, leading to the formation of a mature immunological synapse between NK cell and target cell. This may trigger adhesion and secretion of lytic granules and IFN-gamma and activate cytotoxicity of activated NK cells. CD155 may also promote NK cell-target cell modular exchange, and PVR transfer to the NK cell. This transfer is more important in some tumor cells expressing a lot of PVR, and may trigger fratricide NK cell activation, providing tumors with a mechanism of immunoevasion. Moreover, CD155 plays a role in mediating tumor cell invasion and migration. — an NCBI CDD conserved domain (cd20930); members share this curated model.
