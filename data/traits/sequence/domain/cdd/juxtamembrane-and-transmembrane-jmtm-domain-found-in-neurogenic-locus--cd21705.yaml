identifier: CDD:cd21705
label: "juxtamembrane and transmembrane (JMTM) domain found in neurogenic locus notch homolog protein 4 (Notch4) and similar proteins. Neurogenic locus notch homolog protein 4 (Notch4) functions as a receptor for membrane-bound ligands Jagged1, Jagged2 and Delta1 to regulate cell-fate determination. Upon ligand activation through the released notch intracellular domain (NICD) it forms a transcriptional activator complex with RBPJ/RBPSUH and activates genes of the enhancer of split locus. It affects the implementation of differentiation, proliferation and apoptotic programs. This model corresponds to the juxtamembrane and transmembrane (JMTM) domain of Notch4, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand."
definition: >-
  juxtamembrane and transmembrane (JMTM) domain found in neurogenic locus notch homolog protein 4 (Notch4) and similar proteins. Neurogenic locus notch homolog protein 4 (Notch4) functions as a receptor for membrane-bound ligands Jagged1, Jagged2 and Delta1 to regulate cell-fate determination. Upon ligand activation through the released notch intracellular domain (NICD) it forms a transcriptional activator complex with RBPJ/RBPSUH and activates genes of the enhancer of split locus. It affects the implementation of differentiation, proliferation and apoptotic programs. This model corresponds to the juxtamembrane and transmembrane (JMTM) domain of Notch4, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand. — an NCBI CDD conserved domain (cd21705); members share this curated model.
