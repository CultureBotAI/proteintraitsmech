  Thermus thermophilus V/A-ATPase and similar proteins. This family includes a group of uncharacterized ATPase similar to Thermus thermophilus V/A-ATPase, which is homologous to the eukaryotic V-ATPase, but has a simpler subunit composition and functions in vivo to synthesize ATP rather than pump protons
