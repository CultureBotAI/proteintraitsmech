identifier: CDD:cd18362
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins KCTD2, KCTD5, and KCTD17, and similar proteins. This subfamily includes potassium channel tetramerization domain-containing proteins KCTD2, KCTD5, and KCTD17, all of which function as adaptors of Cullin3 based ubiquitin E3 ubiquitin ligases. KCTD2 suppresses gliomagenesis by destabilizing c-Myc. KCTD5 is a negative regulator of the AKT pathway, a key signaling cascade frequently deregulated in cancer. KCTD5 does not impact the operation of Kv4.2, Kv3.4, Kv2.1, or Kv1.2 channels. KCTD17 polyubiquitylates trichoplein, a protein involved in ciliogenesis down-regulation. It is a positive regulator of ciliogenesis, playing a crucial role in the initial steps of axoneme extension. A missense mutation in KCTD17 causes autosomal dominant myoclonus-dystonia (M-D). The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. KCTD5 and KCTD17 BTB domains form pentamer structures."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins KCTD2, KCTD5, and KCTD17, and similar proteins. This subfamily includes potassium channel tetramerization domain-containing proteins KCTD2, KCTD5, and KCTD17, all of which function as adaptors of Cullin3 based ubiquitin E3 ubiquitin ligases. KCTD2 suppresses gliomagenesis by destabilizing c-Myc. KCTD5 is a negative regulator of the AKT pathway, a key signaling cascade frequently deregulated in cancer. KCTD5 does not impact the operation of Kv4.2, Kv3.4, Kv2.1, or Kv1.2 channels. KCTD17 polyubiquitylates trichoplein, a protein involved in ciliogenesis down-regulation. It is a positive regulator of ciliogenesis, playing a crucial role in the initial steps of axoneme extension. A missense mutation in KCTD17 causes autosomal dominant myoclonus-dystonia (M-D). The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. KCTD5 and KCTD17 BTB domains form pentamer structures. — an NCBI CDD conserved domain (cd18362); members share this curated model.
