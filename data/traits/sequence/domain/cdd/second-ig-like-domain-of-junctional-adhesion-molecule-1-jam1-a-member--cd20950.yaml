identifier: CDD:cd20950
label: "Second Ig-like domain of Junctional adhesion molecule-1 (JAM1); a member of the I-set of IgSF domains. The members here are composed of the second Ig-like domain of Junctional adhesion molecule-1 (JAM1). JAM1 is an immunoglobulin superfamily (IgSF) protein with two Ig-like domains in its extracellular region; it plays a role in the formation of endothelial and epithelial tight junction and acts as a receptor for mammalian reovirus sigma-1. The IgSF is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. The two sheets are linked together by a conserved disulfide bond between B strand and F strand. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The second Ig-like domain of JAM1 is a member of the I-set Ig domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, the A strand of the I-set is discontinuous but lacks a C\" strand. I-set domains are found in several cell adhesion molecules (such as VCAM, ICAM, and MADCAM), and are also present in numerous other diverse protein families, including several tyrosine-protein kinase receptors."
definition: >-
  Second Ig-like domain of Junctional adhesion molecule-1 (JAM1); a member of the I-set of IgSF domains. The members here are composed of the second Ig-like domain of Junctional adhesion molecule-1 (JAM1). JAM1 is an immunoglobulin superfamily (IgSF) protein with two Ig-like domains in its extracellular region; it plays a role in the formation of endothelial and epithelial tight junction and acts as a receptor for mammalian reovirus sigma-1. The IgSF is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. The two sheets are linked together by a conserved disulfide bond between B strand and F strand. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The second Ig-like domain of JAM1 is a member of the I-set Ig domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, the A strand of the I-set is discontinuous but lacks a C" strand. I-set domains are found in several cell adhesion molecules (such as VCAM, ICAM, and MADCAM), and are also present in numerous other diverse protein families, including several tyrosine-protein kinase receptors. — an NCBI CDD conserved domain (cd20950); members share this curated model.
