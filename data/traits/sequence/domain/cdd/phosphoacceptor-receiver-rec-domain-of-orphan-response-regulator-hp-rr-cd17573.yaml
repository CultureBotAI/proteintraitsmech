identifier: CDD:cd17573
label: "phosphoacceptor receiver (REC) domain of orphan response regulator HP-RR and similar proteins. Helicobacter pylori response regulator hp1043 (HP-RR) is an orphan response regulator which is phosphorylation-independent and is essential for growth. HP-RR functions as a cell growth-associated regulator in the absence of post-translational modification. Members of this subfamily contain REC and DNA-binding output domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of orphan response regulator HP-RR and similar proteins. Helicobacter pylori response regulator hp1043 (HP-RR) is an orphan response regulator which is phosphorylation-independent and is essential for growth. HP-RR functions as a cell growth-associated regulator in the absence of post-translational modification. Members of this subfamily contain REC and DNA-binding output domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17573); members share this curated model.
