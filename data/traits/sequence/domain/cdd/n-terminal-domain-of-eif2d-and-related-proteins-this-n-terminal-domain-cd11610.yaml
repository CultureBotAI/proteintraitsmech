label: "N-terminal domain of eIF2D and related proteins. This N-terminal domain of eIF2D co-occurs with a PUA domain. eIF2D translation initiation factor (also known as ligatin) is involved in the recruitment and delivery of aminoacyl-tRNAs to the P-site of the eukaryotic ribosome in a GTP-independent manner."
