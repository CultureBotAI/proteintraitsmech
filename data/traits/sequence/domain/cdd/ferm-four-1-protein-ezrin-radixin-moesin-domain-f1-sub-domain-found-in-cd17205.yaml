identifier: CDD:cd17205
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like 5 (EPB41L5). EPB41L5 is a mesenchymal-specific protein that is an integral component of the ARF6-based pathway. It is normally induced during epithelial-mesenchymal transition (EMT) by an EMT-related transcriptional factor, ZEB1, which drives ARF6-based invasion, metastasis and drug resistance. EPB41L5 also binds to paxillin to enhance integrin/paxillin association, and thus promotes focal adhesion dynamics. Moreover, EPB41L5 acts as a substrate for the E3 ubiquitin ligase Mind bomb 1 (Mib1), which is essential for activation of Notch signaling. EPB41L5 is a member of the band 4.1/Nbl4 (novel band 4.1-like protein 4) group of the FERM protein superfamily. It contains a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like 5 (EPB41L5). EPB41L5 is a mesenchymal-specific protein that is an integral component of the ARF6-based pathway. It is normally induced during epithelial-mesenchymal transition (EMT) by an EMT-related transcriptional factor, ZEB1, which drives ARF6-based invasion, metastasis and drug resistance. EPB41L5 also binds to paxillin to enhance integrin/paxillin association, and thus promotes focal adhesion dynamics. Moreover, EPB41L5 acts as a substrate for the E3 ubiquitin ligase Mind bomb 1 (Mib1), which is essential for activation of Notch signaling. EPB41L5 is a member of the band 4.1/Nbl4 (novel band 4.1-like protein 4) group of the FERM protein superfamily. It contains a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17205); members share this curated model.
