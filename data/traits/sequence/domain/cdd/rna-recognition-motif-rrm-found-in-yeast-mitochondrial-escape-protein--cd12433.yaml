identifier: CDD:cd12433
label: "RNA recognition motif (RRM) found in yeast mitochondrial escape protein 2 (Yme2p) and similar proteins. This subfamily corresponds to the RRM of Yme2p, also termed protein RNA12, an inner mitochondrial membrane protein that plays a critical role in mitochondrial DNA transactions. It may serve as a mediator of nucleoid structure and number in mitochondria of the yeast Saccharomyces cerevisiae. Yme2p contains an exonuclease domain, an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal domain."
definition: >-
  RNA recognition motif (RRM) found in yeast mitochondrial escape protein 2 (Yme2p) and similar proteins. This subfamily corresponds to the RRM of Yme2p, also termed protein RNA12, an inner mitochondrial membrane protein that plays a critical role in mitochondrial DNA transactions. It may serve as a mediator of nucleoid structure and number in mitochondria of the yeast Saccharomyces cerevisiae. Yme2p contains an exonuclease domain, an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal domain. — an NCBI CDD conserved domain (cd12433); members share this curated model.
