identifier: CDD:cd19415
label: "apolipoprotein M and alpha1-acid glycoprotein family. Apolipoprotein M (ApoM) is mainly found in high-density lipoproteins (HDL) and is expressed in the liver and in the kidney; it is associated to a lesser extend with low density lipids and triglyceride rich lipoproteins. ApoM is involved in lipid transport and can bind sphingosine-1-phosphate, myristic acid, palmitic acid and stearic acid, retinol, all-trans-retinoic acid and 9-cis-retinoic acid. Alpha1-acid glycoprotein (AGP), also known as orosomucoid, has many important biological roles such as in the acute-phase reaction in response to inflammation, in immune regulation, in drug-binding and drug-transportation, in regulating sphingolipid synthesis and metabolism, and in maintaining the capillary barrier. This group belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
  apolipoprotein M and alpha1-acid glycoprotein family. Apolipoprotein M (ApoM) is mainly found in high-density lipoproteins (HDL) and is expressed in the liver and in the kidney; it is associated to a lesser extend with low density lipids and triglyceride rich lipoproteins. ApoM is involved in lipid transport and can bind sphingosine-1-phosphate, myristic acid, palmitic acid and stearic acid, retinol, all-trans-retinoic acid and 9-cis-retinoic acid. Alpha1-acid glycoprotein (AGP), also known as orosomucoid, has many important biological roles such as in the acute-phase reaction in response to inflammation, in immune regulation, in drug-binding and drug-transportation, in regulating sphingolipid synthesis and metabolism, and in maintaining the capillary barrier. This group belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development. — an NCBI CDD conserved domain (cd19415); members share this curated model.
