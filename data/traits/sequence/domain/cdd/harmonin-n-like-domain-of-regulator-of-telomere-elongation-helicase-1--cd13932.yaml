identifier: CDD:cd13932
label: "harmonin_N_like domain of regulator of telomere elongation helicase 1 (also known as RTEL). Mouse Rtel is an essential protein required for the maintenance of both telomeric and genomic stability. RTEL1 appears to maintain genome stability by suppressing homologous recombination (HR). In vitro, purified human and insect RTEL1 have been shown to promote the disassembly of D loop recombination intermediates, in a reaction dependent upon ATP hydrolysis. Human RTEL1 is implicated in the etiology of Dyskeratosis congenital (DC, is an inherited bone marrow failure and cancer predisposition syndrome). Point mutations in its helicase domains, and truncations which result in loss of its C-terminus have been discovered in DC families. RTEL1 is also a candidate gene influencing glioma susceptibility. The C-terminal domain of RTEL1, represented here, appears similar to the N-terminal domain of the scaffolding protein harmonin."
definition: >-
  harmonin_N_like domain of regulator of telomere elongation helicase 1 (also known as RTEL). Mouse Rtel is an essential protein required for the maintenance of both telomeric and genomic stability. RTEL1 appears to maintain genome stability by suppressing homologous recombination (HR). In vitro, purified human and insect RTEL1 have been shown to promote the disassembly of D loop recombination intermediates, in a reaction dependent upon ATP hydrolysis. Human RTEL1 is implicated in the etiology of Dyskeratosis congenital (DC, is an inherited bone marrow failure and cancer predisposition syndrome). Point mutations in its helicase domains, and truncations which result in loss of its C-terminus have been discovered in DC families. RTEL1 is also a candidate gene influencing glioma susceptibility. The C-terminal domain of RTEL1, represented here, appears similar to the N-terminal domain of the scaffolding protein harmonin. — an NCBI CDD conserved domain (cd13932); members share this curated model.
