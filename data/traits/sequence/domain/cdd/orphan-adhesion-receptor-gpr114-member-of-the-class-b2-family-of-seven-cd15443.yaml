identifier: CDD:cd15443
label: "orphan adhesion receptor GPR114, member of the class B2 family of seven-transmembrane G protein-coupled receptors. GPR114 is an orphan receptor that has been classified as that belongs to the Group VIII of adhesion GPCRs. Other members of the Group VII include GPR56, GPR64, GPR97, GPR112, and GPR126. GPR114 is mainly found in granulocytes (polymorphonuclear leukocytes), and GPR114-transfected cells induced an increase in cAMP levels via coupling to G(s) protein. The adhesion receptors are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain. Furthermore, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR- autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions."
definition: >-
  orphan adhesion receptor GPR114, member of the class B2 family of seven-transmembrane G protein-coupled receptors. GPR114 is an orphan receptor that has been classified as that belongs to the Group VIII of adhesion GPCRs. Other members of the Group VII include GPR56, GPR64, GPR97, GPR112, and GPR126. GPR114 is mainly found in granulocytes (polymorphonuclear leukocytes), and GPR114-transfected cells induced an increase in cAMP levels via coupling to G(s) protein. The adhesion receptors are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain. Furthermore, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR- autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions. — an NCBI CDD conserved domain (cd15443); members share this curated model.
