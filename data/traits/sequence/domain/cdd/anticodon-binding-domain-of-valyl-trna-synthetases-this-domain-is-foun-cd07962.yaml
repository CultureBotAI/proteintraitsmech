identifier: CDD:cd07962
label: "Anticodon-binding domain of valyl tRNA synthetases. This domain is found in valyl tRNA synthetases (ValRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain, and recognizes and specifically binds to the tRNA anticodon. ValRS catalyzes the transfer of valine to the 3'-end of its tRNA."
definition: >-
  Anticodon-binding domain of valyl tRNA synthetases. This domain is found in valyl tRNA synthetases (ValRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain, and recognizes and specifically binds to the tRNA anticodon. ValRS catalyzes the transfer of valine to the 3'-end of its tRNA. — an NCBI CDD conserved domain (cd07962); members share this curated model.
