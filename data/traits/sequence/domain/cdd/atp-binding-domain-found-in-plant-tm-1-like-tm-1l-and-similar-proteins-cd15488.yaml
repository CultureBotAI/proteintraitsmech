identifier: CDD:cd15488
label: "ATP-binding domain found in plant Tm-1-like (Tm-1L) and similar proteins. Members of this family have been annotated as UPF0261-domain containing proteins. They are found in plants, fungi, bacteria, and archaea. A three-dimensional structure of a complex between the tomato resistance gene product Tm-1 and tomato mosaic virus helicase reveals an organization encompassing two distinct structurally similar domains and an ATP-binding site present in the N-terminal subdomain. The Tm-1-like domain is found co-occurring with a C-terminal TIM-barrel signal transduction (TBST) domain in some plant proteins like Tm-1, and with an N-terminal ABC-transporter ATP-binding domain in a few bacterial proteins."
definition: >-
  ATP-binding domain found in plant Tm-1-like (Tm-1L) and similar proteins. Members of this family have been annotated as UPF0261-domain containing proteins. They are found in plants, fungi, bacteria, and archaea. A three-dimensional structure of a complex between the tomato resistance gene product Tm-1 and tomato mosaic virus helicase reveals an organization encompassing two distinct structurally similar domains and an ATP-binding site present in the N-terminal subdomain. The Tm-1-like domain is found co-occurring with a C-terminal TIM-barrel signal transduction (TBST) domain in some plant proteins like Tm-1, and with an N-terminal ABC-transporter ATP-binding domain in a few bacterial proteins. — an NCBI CDD conserved domain (cd15488); members share this curated model.
