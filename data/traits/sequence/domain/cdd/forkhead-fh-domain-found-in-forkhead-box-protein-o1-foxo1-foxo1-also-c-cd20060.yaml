identifier: CDD:cd20060
label: "Forkhead (FH) domain found in Forkhead box protein O1 (FOXO1). FOXO1, also called Forkhead box protein O1A or Forkhead in rhabdomyosarcoma (FKHR), is a transcription factor that is the main target of insulin signaling and regulates metabolic homeostasis in response to oxidative stress. It binds to the insulin response element (IRE) with the consensus sequence 5'-TT[G/A]TTTTG-3' and the related Daf-16 family binding element (DBE) with the consensus sequence 5'-TT[G/A]TTTAC-3'. The FH domain is a winged helix DNA-binding domain."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein O1 (FOXO1). FOXO1, also called Forkhead box protein O1A or Forkhead in rhabdomyosarcoma (FKHR), is a transcription factor that is the main target of insulin signaling and regulates metabolic homeostasis in response to oxidative stress. It binds to the insulin response element (IRE) with the consensus sequence 5'-TT[G/A]TTTTG-3' and the related Daf-16 family binding element (DBE) with the consensus sequence 5'-TT[G/A]TTTAC-3'. The FH domain is a winged helix DNA-binding domain. — an NCBI CDD conserved domain (cd20060); members share this curated model.
