identifier: CDD:cd11468
label: bHLH_TS_bHLHe22_like
definition: >-
  basic helix-loop-helix (bHLH) domain found in Class E basic helix-loop-helix protein bHLHe22, bHLHe23 and similar proteins. The family includes two OLIG-related bHLH transcription factors, bHLHe22 and bHLHe23. bHLHe22, also termed Class B basic helix-loop-helix protein 5 (bHLHb5), or trinucleotide repeat-containing gene 20 protein, is a neural-specific transcriptional repressor that is expressed in both excitatory (unipolar brush cells) and inhibitory neurons (cartwheel cells) of the dorsal cochlear nucleus (DCN) during development. It is important for the proper development and/or survival of a number of neural cell types. bHLHe23, also termed Class B basic helix-loop-helix protein 4 (bHLHb4), is expressed in rod bipolar cells and is required for rod bipolar cell maturation. bHLHe23 have roles in spinal interneuron differentiation by mechanisms linked to the Notch signaling pathway. It modulates the expression of genes required for the differentiation and/or maintenance of pancreatic and neuronal cell types
