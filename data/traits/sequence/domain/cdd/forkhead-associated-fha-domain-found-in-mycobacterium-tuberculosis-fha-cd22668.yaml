label: "forkhead associated (FHA) domain found in Mycobacterium tuberculosis FHA domain-containing protein FhaA and similar proteins. FhaA regulates cell growth and peptidoglycan synthesis by binding to MviN. It may inhibit the late stages of peptidoglycan synthesis. It contains an FHA domain, which is a small phosphopeptide recognition module."
