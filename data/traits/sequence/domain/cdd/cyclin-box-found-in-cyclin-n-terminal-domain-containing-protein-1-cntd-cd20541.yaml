identifier: CDD:cd20541
label: CYCLIN_CNTD1
definition: >-
  cyclin box found in Cyclin N-terminal domain-containing protein 1 (CNTD1) and similar proteins. CNTD1 is a cyclin-related protein critical for meiotic crossover maturation and deselection of excess precrossover sites. CNTD1 contains one cyclin box. The cyclin box is a protein binding domain
