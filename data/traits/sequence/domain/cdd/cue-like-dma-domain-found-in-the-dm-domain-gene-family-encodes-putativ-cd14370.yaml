identifier: CDD:cd14370
label: "CUE-like DMA domain found in the DM domain gene family encodes putative transcription factors DMRTA1, DMRTA2 and DMRTA3. The DM domain proteins are related to the sexual regulators doublesex from Drosophila melanogaster and MAB-3 from Caenorhabditis elegans. Thus, they have been named as doublesex- and mab-3-related transcription factors and may be involved in sexual development or in somite development. All DM domain proteins contain a DM domain which is an unusual zinc finger motif. In addition to an N-terminal DM domain, members in this family, including DMRTA1, DMRTA2 and DMRTA3, also harbor additional CUE-like DMA domain. DMRTA1 is encoded by gene DMRT1, a vertebrate equivalent of the D. melanogaster master sex regulator gene, doublesex. In D. melanogaster, doublesex controls the terminal switch of the pathway leading to sex fate choice. DMRT1 may function as regulator of sex differentiation in vertebrate. Especially, it is required for testis differentiation, but is not involved in the gonadal sex fate choice. DMRTA2, also called Doublesex- and mab-3-related transcription factor 5 (DMRT5), is encoded by gene DMRT2. In the zebrafish, DMRT2 is involved in somite development. DMRTA2 may act as an activator of cyclin-dependent kinase inhibitor 2C (cdkn2c) during spermatogenesis. It may also play significant roles in embryonic neurogenesis. DMRTA3 is encoded by tumor suppressor gene DMRT3 which serves as a novel potential target for homozygous deletion in squamous cell carcinoma of the lung."
definition: >-
  CUE-like DMA domain found in the DM domain gene family encodes putative transcription factors DMRTA1, DMRTA2 and DMRTA3. The DM domain proteins are related to the sexual regulators doublesex from Drosophila melanogaster and MAB-3 from Caenorhabditis elegans. Thus, they have been named as doublesex- and mab-3-related transcription factors and may be involved in sexual development or in somite development. All DM domain proteins contain a DM domain which is an unusual zinc finger motif. In addition to an N-terminal DM domain, members in this family, including DMRTA1, DMRTA2 and DMRTA3, also harbor additional CUE-like DMA domain. DMRTA1 is encoded by gene DMRT1, a vertebrate equivalent of the D. melanogaster master sex regulator gene, doublesex. In D. melanogaster, doublesex controls the terminal switch of the pathway leading to sex fate choice. DMRT1 may function as regulator of sex differentiation in vertebrate. Especially, it is required for testis differentiation, but is not involved in the gonadal sex fate choice. DMRTA2, also called Doublesex- and mab-3-related transcription factor 5 (DMRT5), is encoded by gene DMRT2. In the zebrafish, DMRT2 is involved in somite development. DMRTA2 may act as an activator of cyclin-dependent kinase inhibitor 2C (cdkn2c) during spermatogenesis. It may also play significant roles in embryonic neurogenesis. DMRTA3 is encoded by tumor suppressor gene DMRT3 which serves as a novel potential target for homozygous deletion in squamous cell carcinoma of the lung. — an NCBI CDD conserved domain (cd14370); members share this curated model.
