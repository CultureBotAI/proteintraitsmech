identifier: CDD:cd18351
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 11 (BTBD11). BTBD11, also called ankyrin repeat and BTB/POZ domain-containing protein BTBD11, is a BTB-domain-containing protein. The BTBD11 gene has been recently identified as an all-trans retinoic acid (atRA)-responsive gene that lies downstream of atRA and its receptors in the regulation of neurite outgrowth and cell adhesion in neural as well as non-neural tissues. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 11 (BTBD11). BTBD11, also called ankyrin repeat and BTB/POZ domain-containing protein BTBD11, is a BTB-domain-containing protein. The BTBD11 gene has been recently identified as an all-trans retinoic acid (atRA)-responsive gene that lies downstream of atRA and its receptors in the regulation of neurite outgrowth and cell adhesion in neural as well as non-neural tissues. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18351); members share this curated model.
