identifier: CDD:cd21445
label: "N-terminal domain of Arabidopsis thaliana syntaxin-61 and similar proteins. Arabidopsis thaliana syntaxin-61 (AtSYP61), also called osmotic stress-sensitive mutant 1 (OSM1), is a vesicle trafficking syntaxin protein that functions in the secretory pathway. It is involved in osmotic stress tolerance and in abscisic acid (ABA) regulation of stomatal responses in Arabidopsis. This model corresponds to the N-terminal domain of AtSYP61, which shows high sequence similarity with the N-terminal domain of yeast Tlg1p, a soluble NSF attachment protein receptor (SNARE) protein (of Qc type) involved in membrane fusion."
definition: >-
  N-terminal domain of Arabidopsis thaliana syntaxin-61 and similar proteins. Arabidopsis thaliana syntaxin-61 (AtSYP61), also called osmotic stress-sensitive mutant 1 (OSM1), is a vesicle trafficking syntaxin protein that functions in the secretory pathway. It is involved in osmotic stress tolerance and in abscisic acid (ABA) regulation of stomatal responses in Arabidopsis. This model corresponds to the N-terminal domain of AtSYP61, which shows high sequence similarity with the N-terminal domain of yeast Tlg1p, a soluble NSF attachment protein receptor (SNARE) protein (of Qc type) involved in membrane fusion. — an NCBI CDD conserved domain (cd21445); members share this curated model.
