definition: >-
  Interleukin 10 and related type 2 cytokines. IL10 and its homologs IL19, IL20, IL22, IL24, and IL26 constitue a group of helical cytokines which play a variety of roles in the immune system Interleukin 10 had first been characterized as the cytokine synthesis inhibitory factor (CSIF)
