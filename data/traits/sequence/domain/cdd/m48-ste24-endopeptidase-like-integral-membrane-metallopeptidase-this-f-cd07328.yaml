identifier: CDD:cd07328
label: "M48 Ste24 endopeptidase-like, integral membrane metallopeptidase. This family contains peptidase M48-like proteins that are as yet uncharacterized, but probably function as intracellular, membrane-associated zinc metalloproteases; they all contain the HEXXH Zn-binding motif, which is critical for Ste24p activity. They likely remove the C-terminal three residues of farnesylated proteins proteolytically and are possibly associated with the endoplasmic reticulum and golgi."
definition: >-
  M48 Ste24 endopeptidase-like, integral membrane metallopeptidase. This family contains peptidase M48-like proteins that are as yet uncharacterized, but probably function as intracellular, membrane-associated zinc metalloproteases; they all contain the HEXXH Zn-binding motif, which is critical for Ste24p activity. They likely remove the C-terminal three residues of farnesylated proteins proteolytically and are possibly associated with the endoplasmic reticulum and golgi. — an NCBI CDD conserved domain (cd07328); members share this curated model.
