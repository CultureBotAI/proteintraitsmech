identifier: CDD:cd07769
label: "nucleotide-binding domain (NBD) of glycerol kinase (GK) and similar proteins. GK (EC 2.7.1.30), also called ATP:glycerol 3-phosphotransferase, or glycerokinase, is a key enzyme in the regulation of glycerol uptake and metabolism. It catalyzes the Mg-ATP-dependent phosphorylation of glycerol to yield sn-glycerol 3-phosphate. It also catalyzes the phosphorylation of dihydroxyacetone, L-glyceraldehyde and D-glyceraldehyde.  The subfamily includes GKs and GK-like proteins from all three kingdoms of living organisms. Metazoan GKs, coded by X chromosome-linked GK genes, and GK-like proteins, coded by autosomal testis-specific GK-like genes GK2, GK3 and Gykl1 (in mouse) are closely related to the bacterial GKs. The metazoan GKs do have GK enzymatic activity. However, the GK-like metazoan proteins do not exhibit GK activity and their biological functions are not yet clear. Some of them lack important functional residues involved in the binding of ADP and Mg2+, which may result in the loss of GK catalytic function.  Others that have conserved catalytic residues have lost their GK activity as well; the reason remains unclear. It has been suggested the conserved catalytic residues might facilitate them performing a distinct function. Under different conditions, GKs from different species may exist in different oligomeric states. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of glycerol kinase (GK) and similar proteins. GK (EC 2.7.1.30), also called ATP:glycerol 3-phosphotransferase, or glycerokinase, is a key enzyme in the regulation of glycerol uptake and metabolism. It catalyzes the Mg-ATP-dependent phosphorylation of glycerol to yield sn-glycerol 3-phosphate. It also catalyzes the phosphorylation of dihydroxyacetone, L-glyceraldehyde and D-glyceraldehyde. The subfamily includes GKs and GK-like proteins from all three kingdoms of living organisms. Metazoan GKs, coded by X chromosome-linked GK genes, and GK-like proteins, coded by autosomal testis-specific GK-like genes GK2, GK3 and Gykl1 (in mouse) are closely related to the bacterial GKs. The metazoan GKs do have GK enzymatic activity. However, the GK-like metazoan proteins do not exhibit GK activity and their biological functions are not yet clear. Some of them lack important functional residues involved in the binding of ADP and Mg2+, which may result in the loss of GK catalytic function. Others that have conserved catalytic residues have lost their GK activity as well; the reason remains unclear. It has been suggested the conserved catalytic residues might facilitate them performing a distinct function. Under different conditions, GKs from different species may exist in different oligomeric states. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07769); members share this curated model.
