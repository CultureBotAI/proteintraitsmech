identifier: CDD:cd11755
label: "N-terminal domain of chitobiose phosphorylase (ChBP) and similar proteins. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes chitobiose phosphorylase (EC:2.4.1.-). This N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain [an (alpha/alpha)(6) barrel]. Chitobiose phosphorylase catalyzes the reversible phosphate dependent hydrolysis of chitobiose [(GlcNAc)2] into alpha-GlcNAc-1-phosphate and GlcNAc. In some organisms, ChBP may be involved in the production of GlcNac-6-phosphate in intracellular pathways."
definition: >-
  N-terminal domain of chitobiose phosphorylase (ChBP) and similar proteins. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes chitobiose phosphorylase (EC:2.4.1.-). This N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain [an (alpha/alpha)(6) barrel]. Chitobiose phosphorylase catalyzes the reversible phosphate dependent hydrolysis of chitobiose [(GlcNAc)2] into alpha-GlcNAc-1-phosphate and GlcNAc. In some organisms, ChBP may be involved in the production of GlcNac-6-phosphate in intracellular pathways. — an NCBI CDD conserved domain (cd11755); members share this curated model.
