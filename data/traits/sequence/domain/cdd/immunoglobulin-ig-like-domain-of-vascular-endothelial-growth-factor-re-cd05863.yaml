identifier: CDD:cd05863
label: "Immunoglobulin (Ig)-like domain of vascular endothelial growth factor receptor 3 (VEGFR-3); member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the immunoglobulin (Ig)-like domain of vascular endothelial growth factor receptor 3 (VEGFR-3). The VEGFRs have an extracellular component with seven Ig-like domains, a transmembrane segment, and an intracellular tyrosine kinase domain interrupted by a kinase-insert domain. VEGFRs bind VEGFs with high affinity at the Ig-like domains. VEGFR-3 (Flt-4) binds two members of the VEGF family (VEGF-C and VEGF-D) and is involved in tumor angiogenesis and growth. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C\" strand."
definition: >-
  Immunoglobulin (Ig)-like domain of vascular endothelial growth factor receptor 3 (VEGFR-3); member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the immunoglobulin (Ig)-like domain of vascular endothelial growth factor receptor 3 (VEGFR-3). The VEGFRs have an extracellular component with seven Ig-like domains, a transmembrane segment, and an intracellular tyrosine kinase domain interrupted by a kinase-insert domain. VEGFRs bind VEGFs with high affinity at the Ig-like domains. VEGFR-3 (Flt-4) binds two members of the VEGF family (VEGF-C and VEGF-D) and is involved in tumor angiogenesis and growth. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C" strand. — an NCBI CDD conserved domain (cd05863); members share this curated model.
