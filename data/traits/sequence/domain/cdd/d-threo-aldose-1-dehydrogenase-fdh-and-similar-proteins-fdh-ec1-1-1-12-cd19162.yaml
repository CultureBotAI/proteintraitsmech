identifier: CDD:cd19162
label: "D-threo-aldose 1-dehydrogenase (FDH) and similar proteins. FDH (EC1.1.1.122), also called (2S,3R)-aldose dehydrogenase, or L-fucose dehydrogenase, catalyzes the oxidation of L-fucose to L-fuconolactone in the presence of NADP(+). It is also active against L-galactose, and to a much lesser degree, D-arabinose."
definition: >-
  D-threo-aldose 1-dehydrogenase (FDH) and similar proteins. FDH (EC1.1.1.122), also called (2S,3R)-aldose dehydrogenase, or L-fucose dehydrogenase, catalyzes the oxidation of L-fucose to L-fuconolactone in the presence of NADP(+). It is also active against L-galactose, and to a much lesser degree, D-arabinose. — an NCBI CDD conserved domain (cd19162); members share this curated model.
