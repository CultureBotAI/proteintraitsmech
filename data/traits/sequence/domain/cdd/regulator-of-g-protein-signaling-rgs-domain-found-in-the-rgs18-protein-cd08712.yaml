identifier: CDD:cd08712
label: "Regulator of G protein signaling (RGS) domain found in the RGS18 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS18 protein.  RGS18 is a member of the RGS protein family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G-alpha subunit which leads to G protein deactivation and promotes desensitization. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS18 is a member of the R4/RGS subfamily and is expressed predominantly in osteoclasts where it acts as a negative regulator of the acidosis-induced osteoclastogenic OGR1/NFAT signaling pathway. RANKL (receptor activator of nuclear factor B ligand) stimulates osteoclastogenesis by inhibiting expression of RGS18."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS18 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS18 protein. RGS18 is a member of the RGS protein family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G-alpha subunit which leads to G protein deactivation and promotes desensitization. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS18 is a member of the R4/RGS subfamily and is expressed predominantly in osteoclasts where it acts as a negative regulator of the acidosis-induced osteoclastogenic OGR1/NFAT signaling pathway. RANKL (receptor activator of nuclear factor B ligand) stimulates osteoclastogenesis by inhibiting expression of RGS18. — an NCBI CDD conserved domain (cd08712); members share this curated model.
