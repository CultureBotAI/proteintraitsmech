identifier: CDD:cd17138
label: "Ras-binding domain (RBD) 2 of regulator of G protein signaling 12 (RGS12). RGS12 (regulator of G-protein signaling 12) is a multidomain RGS protein with numerous signaling regulatory elements. In addition to a central RGS domain which is responsible for GAP activity, the long RGS12 splice variant contains a PDZ (PSD-95/Discs-large/ZO-1 homology) domain capable of binding the interleukin-8 receptor B (CXCR2) or its own C-terminal, a phosphotyrosine-binding (PTB) domain that associates with tyrosine-phosphorylated N-type calcium channel, two tandem Ras-binding domains (RBDs) that may integrate signaling pathways involving both heterotrimeric and monomeric G-proteins, and a GoLoco (G-alpha-i/o-Loco) interaction motif which has guanine nucleotide dissociation inhibitor (GDI) activity toward G-alpha-i subunits. RBD is structurally similar to the beta-grasp fold of ubiquitin, a common structure involved in protein-protein interactions. RGS proteins belong to a large family of GTpase-accelerating proteins (GAPs) which act as key inhibitors of G-protein-mediated cell responses in eukaryotes."
definition: >-
  Ras-binding domain (RBD) 2 of regulator of G protein signaling 12 (RGS12). RGS12 (regulator of G-protein signaling 12) is a multidomain RGS protein with numerous signaling regulatory elements. In addition to a central RGS domain which is responsible for GAP activity, the long RGS12 splice variant contains a PDZ (PSD-95/Discs-large/ZO-1 homology) domain capable of binding the interleukin-8 receptor B (CXCR2) or its own C-terminal, a phosphotyrosine-binding (PTB) domain that associates with tyrosine-phosphorylated N-type calcium channel, two tandem Ras-binding domains (RBDs) that may integrate signaling pathways involving both heterotrimeric and monomeric G-proteins, and a GoLoco (G-alpha-i/o-Loco) interaction motif which has guanine nucleotide dissociation inhibitor (GDI) activity toward G-alpha-i subunits. RBD is structurally similar to the beta-grasp fold of ubiquitin, a common structure involved in protein-protein interactions. RGS proteins belong to a large family of GTpase-accelerating proteins (GAPs) which act as key inhibitors of G-protein-mediated cell responses in eukaryotes. — an NCBI CDD conserved domain (cd17138); members share this curated model.
