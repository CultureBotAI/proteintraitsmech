identifier: CDD:cd16229
label: "EF-hand, calcium binding motif, found in reticulocalbin-1 (RCN-1). RCN-1 is an endoplasmic reticulum resident low-affinity Ca2+-binding protein with six EF-hand motifs and a carboxyl-terminal His-Asp-Glu-Leu (HDEL) tetrapeptide signal. It is expressed at the cell surface. RCN-1 acts as a potential negative regulator of B-RAF activation and can negatively modulate cardiomyocyte hypertrophy by inhibition of the mitogen-activated protein kinase signaling cascade. It also plays a key role in the development of doxorubicin-associated resistance."
definition: >-
  EF-hand, calcium binding motif, found in reticulocalbin-1 (RCN-1). RCN-1 is an endoplasmic reticulum resident low-affinity Ca2+-binding protein with six EF-hand motifs and a carboxyl-terminal His-Asp-Glu-Leu (HDEL) tetrapeptide signal. It is expressed at the cell surface. RCN-1 acts as a potential negative regulator of B-RAF activation and can negatively modulate cardiomyocyte hypertrophy by inhibition of the mitogen-activated protein kinase signaling cascade. It also plays a key role in the development of doxorubicin-associated resistance. — an NCBI CDD conserved domain (cd16229); members share this curated model.
