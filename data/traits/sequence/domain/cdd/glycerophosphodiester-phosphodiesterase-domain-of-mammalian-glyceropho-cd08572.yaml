identifier: CDD:cd08572
label: "Glycerophosphodiester phosphodiesterase domain of mammalian glycerophosphodiester phosphodiesterase GDE5-like proteins. This subfamily corresponds to the glycerophosphodiester phosphodiesterase domain (GDPD) present in mammalian glycerophosphodiester phosphodiesterase GDE5-like proteins. GDE5 is widely expressed in mammalian tissues, with highest expression in spinal chord. Although its biological function remains unclear, mammalian GDE5 shows higher sequence homology to fungal and plant  glycerophosphodiester phosphodiesterases (GP-GDEs, EC 3.1.4.46) than to other bacterial and mammalian GP-GDEs. It may also hydrolyze glycerophosphodiesters to sn-glycerol-3-phosphate (G3P) and the corresponding alcohols."
definition: >-
  Glycerophosphodiester phosphodiesterase domain of mammalian glycerophosphodiester phosphodiesterase GDE5-like proteins. This subfamily corresponds to the glycerophosphodiester phosphodiesterase domain (GDPD) present in mammalian glycerophosphodiester phosphodiesterase GDE5-like proteins. GDE5 is widely expressed in mammalian tissues, with highest expression in spinal chord. Although its biological function remains unclear, mammalian GDE5 shows higher sequence homology to fungal and plant glycerophosphodiester phosphodiesterases (GP-GDEs, EC 3.1.4.46) than to other bacterial and mammalian GP-GDEs. It may also hydrolyze glycerophosphodiesters to sn-glycerol-3-phosphate (G3P) and the corresponding alcohols. — an NCBI CDD conserved domain (cd08572); members share this curated model.
