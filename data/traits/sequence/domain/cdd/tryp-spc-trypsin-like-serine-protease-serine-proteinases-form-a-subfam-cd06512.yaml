identifier: CDD:cd06512
label: "Tryp_SPc. Trypsin-like serine protease. Serine proteinases form a subfamily of trypsin-like proteases that include chymotrypsin-like enzymes, elastases, collagenases, plasminogen activators, granzymes and many more. Several of these are synthesized as inactive precursor zymogens that are cleaved during limited proteolysis to generate their active forms. The domain consists a catalytic triad of Ser, His, and Asp amino acids found at the interface of two beta-barrels. This CD also contains inactive enzymes that have substitutions of the catalytic residues."
definition: >-
  Tryp_SPc. Trypsin-like serine protease. Serine proteinases form a subfamily of trypsin-like proteases that include chymotrypsin-like enzymes, elastases, collagenases, plasminogen activators, granzymes and many more. Several of these are synthesized as inactive precursor zymogens that are cleaved during limited proteolysis to generate their active forms. The domain consists a catalytic triad of Ser, His, and Asp amino acids found at the interface of two beta-barrels. This CD also contains inactive enzymes that have substitutions of the catalytic residues. — an NCBI CDD conserved domain (cd06512); members share this curated model.
