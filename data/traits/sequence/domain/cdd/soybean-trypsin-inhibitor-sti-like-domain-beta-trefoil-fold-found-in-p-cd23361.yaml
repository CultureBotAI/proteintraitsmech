identifier: CDD:cd23361
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Psophocarpus tetragonolobus albumin-1 and similar proteins. Albumin-1, also called WBA-1, or winged bean albumin 1, acts as a 2S seed storage protein that is homologous with Kunitz-type seed trypsin inhibitors. It contains a soybean trypsin inhibitor (STI)-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Psophocarpus tetragonolobus albumin-1 and similar proteins. Albumin-1, also called WBA-1, or winged bean albumin 1, acts as a 2S seed storage protein that is homologous with Kunitz-type seed trypsin inhibitors. It contains a soybean trypsin inhibitor (STI)-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23361); members share this curated model.
