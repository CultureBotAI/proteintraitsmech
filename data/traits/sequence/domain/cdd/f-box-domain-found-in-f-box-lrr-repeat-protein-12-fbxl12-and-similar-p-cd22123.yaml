identifier: CDD:cd22123
label: "F-box domain found in F-box/LRR-repeat protein 12 (FBXL12) and similar proteins. FBXL12, also called F-box and leucine-rich repeat protein 12, or F-box protein FBL12, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It mediates the polyubiquitination and proteasomal degradation of calcium/calmodulin dependent protein kinase I (CAMK1) leading to disruption of cyclin D1/CDK4 complex assembly, which results in G1 cell cycle arrest in lung epithelia. It regulates T-cell differentiation in a cell-autonomous manner. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 12 (FBXL12) and similar proteins. FBXL12, also called F-box and leucine-rich repeat protein 12, or F-box protein FBL12, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It mediates the polyubiquitination and proteasomal degradation of calcium/calmodulin dependent protein kinase I (CAMK1) leading to disruption of cyclin D1/CDK4 complex assembly, which results in G1 cell cycle arrest in lung epithelia. It regulates T-cell differentiation in a cell-autonomous manner. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22123); members share this curated model.
