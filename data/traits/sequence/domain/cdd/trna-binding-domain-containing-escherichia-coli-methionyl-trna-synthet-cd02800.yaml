identifier: CDD:cd02800
label: "tRNA-binding-domain-containing Escherichia coli methionyl-tRNA synthetase (EcMetRS)-like proteins.  This family includes EcMetRS and Aquifex aeolicus Trbp111 (AaTrbp111). This domain has general tRNA binding properties.  MetRS aminoacylates methionine transfer RNAs (tRNAmet). AaTrbp111 is structure-specific molecular chaperone recognizing the L-shape of the tRNA fold. AaTrbp111 plays a role in nuclear trafficking of tRNAs. The functional unit of EcMetRs and AaTrbp111 is a homodimer, this domain acts as the dimerization domain."
definition: >-
  tRNA-binding-domain-containing Escherichia coli methionyl-tRNA synthetase (EcMetRS)-like proteins. This family includes EcMetRS and Aquifex aeolicus Trbp111 (AaTrbp111). This domain has general tRNA binding properties. MetRS aminoacylates methionine transfer RNAs (tRNAmet). AaTrbp111 is structure-specific molecular chaperone recognizing the L-shape of the tRNA fold. AaTrbp111 plays a role in nuclear trafficking of tRNAs. The functional unit of EcMetRs and AaTrbp111 is a homodimer, this domain acts as the dimerization domain. — an NCBI CDD conserved domain (cd02800); members share this curated model.
