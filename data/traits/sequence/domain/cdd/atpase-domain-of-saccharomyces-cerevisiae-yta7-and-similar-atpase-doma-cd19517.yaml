identifier: CDD:cd19517
label: "ATPase domain of Saccharomyces cerevisiae Yta7 and similar ATPase domains. Saccharomyces cerevisiae Yta7 is a chromatin-associated AAA-ATPase involved in regulation of chromatin dynamics. Its human ortholog  ANCCA/ATAD2 transcriptionally activates pathways of malignancy in a broad range of cancers. The RecA-like_Yta7 subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  ATPase domain of Saccharomyces cerevisiae Yta7 and similar ATPase domains. Saccharomyces cerevisiae Yta7 is a chromatin-associated AAA-ATPase involved in regulation of chromatin dynamics. Its human ortholog ANCCA/ATAD2 transcriptionally activates pathways of malignancy in a broad range of cancers. The RecA-like_Yta7 subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19517); members share this curated model.
