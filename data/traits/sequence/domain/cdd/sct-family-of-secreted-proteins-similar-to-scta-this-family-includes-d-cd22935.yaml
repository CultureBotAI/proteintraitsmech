identifier: CDD:cd22935
label: SctA-like
definition: >-
  Sct family of secreted proteins similar to SctA. This family includes Dictyostelium discoideum secreted proteins SctA, SctB, SctC, SctD, and similar ptoteins. SctA, also called protein gp17, has been identified in Dictyostelium discoideum as the most abundant protein present in pycnosomes, which are dense structures consisting of membranous materials in endocytic compartments that are constitutively secreted into the extracellular medium. SctA is also found in multilamellar bodies (MLBs), which consist of structures of lysosomal origin composed of multiple concentric membrane layers, that are secreted by amoeba when fed digestible bacteria. The cellular function of pycnosomes and of SctA is as yet unknown
