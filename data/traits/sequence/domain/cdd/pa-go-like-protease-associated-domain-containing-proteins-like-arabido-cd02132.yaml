identifier: CDD:cd02132
label: "PA_GO-like: Protease-associated domain containing proteins like Arabidopsis thaliana growth-on protein GRO10. This group contains various PA domain-containing proteins similar to the functionally uncharacterized Arabidopsis GRO10. The PA domain may be a protein-protein interaction domain. At peptidase active sites, the PA domain may participate in substrate binding and/or promoting conformational changes, which influence the stability and accessibility of the site to substrate."
definition: >-
  PA_GO-like: Protease-associated domain containing proteins like Arabidopsis thaliana growth-on protein GRO10. This group contains various PA domain-containing proteins similar to the functionally uncharacterized Arabidopsis GRO10. The PA domain may be a protein-protein interaction domain. At peptidase active sites, the PA domain may participate in substrate binding and/or promoting conformational changes, which influence the stability and accessibility of the site to substrate. — an NCBI CDD conserved domain (cd02132); members share this curated model.
