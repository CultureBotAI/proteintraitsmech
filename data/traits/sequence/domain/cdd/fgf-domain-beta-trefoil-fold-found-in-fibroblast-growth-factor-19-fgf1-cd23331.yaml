identifier: CDD:cd23331
label: "FGF domain, beta-trefoil fold, found in fibroblast growth factor 19 (FGF19) and similar proteins. FGF19 is involved in the suppression of bile acid biosynthesis through down-regulation of CYP7A1 expression, following positive regulation of the JNK and ERK1/2 cascades. It stimulates glucose uptake in adipocytes. Its activity requires the presence of beta-Klotho (KLB) and FGFR4. FGF-19 interacts with fibroblast growth factor receptors, FGFR1, FGFR2, FGFR3, and FGFR4. Affinity between fibroblast growth factors (FGFs) and their receptors is increased by alpha-Klotho (KL), KLB and heparan sulfate glycosaminoglycans that function as coreceptors. FGF19 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in fibroblast growth factor 19 (FGF19) and similar proteins. FGF19 is involved in the suppression of bile acid biosynthesis through down-regulation of CYP7A1 expression, following positive regulation of the JNK and ERK1/2 cascades. It stimulates glucose uptake in adipocytes. Its activity requires the presence of beta-Klotho (KLB) and FGFR4. FGF-19 interacts with fibroblast growth factor receptors, FGFR1, FGFR2, FGFR3, and FGFR4. Affinity between fibroblast growth factors (FGFs) and their receptors is increased by alpha-Klotho (KL), KLB and heparan sulfate glycosaminoglycans that function as coreceptors. FGF19 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23331); members share this curated model.
