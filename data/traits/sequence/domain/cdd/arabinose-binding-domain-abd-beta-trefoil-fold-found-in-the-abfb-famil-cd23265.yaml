identifier: CDD:cd23265
label: "Arabinose-binding domain (ABD), beta-trefoil fold, found in the ABFB family. The ABFB family includes alpha-L-arabinofuranosidase B (ABF B)-like proteins and otogelin-like proteins. Alpha-L-arabinofuranosidase (EC 3.2.1.55), also called ABF, or non-reducing end alpha-L-arabinofuranosidase, or arabinofuranosidase, or arabinosidase, is involved in the degradation of arabinoxylan, a major component of plant hemicellulose. It can hydrolyze 1,5-, 1,3- and 1,2-alpha-linkages not only in L-arabinofuranosyl oligosaccharides, but also in polysaccharides containing terminal non-reducing L-arabinofuranoses in side chains, like L-arabinan, arabinogalactan and arabinoxylan. ABF belongs to the glycosyl hydrolase 54 family. Hungateiclostridium thermocellum anti-sigma-I factor RsgI5 shows high sequence similarity with ABF B. It negatively regulates SigI5 activity through direct interaction. The OTOG subfamily includes otogelin (OTOG) and otogelin-like protein (OTOGL). OTOG is a glycoprotein specific to acellular membranes of the inner ear. It may be required for the anchoring of otoconial membranes and cupula to the underlying neuroepithelia in the vestibule. OTOG may be involved in the organization and/or stabilization of the fibrillar network that compose the tectorial membrane in the cochlea. OTOGL is a mucin glycoprotein that is a component of the tectorial membrane. It acts as a gel-forming mucin that forms high-molecular-weight complexes and is glycosylated through mucin-type O-glycosylation. Mutations in OTOG or OTOGL genes may cause hearing loss. Members of the ABFB family contain an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD binds two arabinose molecules in the beta and gamma subdomains."
definition: >-
  Arabinose-binding domain (ABD), beta-trefoil fold, found in the ABFB family. The ABFB family includes alpha-L-arabinofuranosidase B (ABF B)-like proteins and otogelin-like proteins. Alpha-L-arabinofuranosidase (EC 3.2.1.55), also called ABF, or non-reducing end alpha-L-arabinofuranosidase, or arabinofuranosidase, or arabinosidase, is involved in the degradation of arabinoxylan, a major component of plant hemicellulose. It can hydrolyze 1,5-, 1,3- and 1,2-alpha-linkages not only in L-arabinofuranosyl oligosaccharides, but also in polysaccharides containing terminal non-reducing L-arabinofuranoses in side chains, like L-arabinan, arabinogalactan and arabinoxylan. ABF belongs to the glycosyl hydrolase 54 family. Hungateiclostridium thermocellum anti-sigma-I factor RsgI5 shows high sequence similarity with ABF B. It negatively regulates SigI5 activity through direct interaction. The OTOG subfamily includes otogelin (OTOG) and otogelin-like protein (OTOGL). OTOG is a glycoprotein specific to acellular membranes of the inner ear. It may be required for the anchoring of otoconial membranes and cupula to the underlying neuroepithelia in the vestibule. OTOG may be involved in the organization and/or stabilization of the fibrillar network that compose the tectorial membrane in the cochlea. OTOGL is a mucin glycoprotein that is a component of the tectorial membrane. It acts as a gel-forming mucin that forms high-molecular-weight complexes and is glycosylated through mucin-type O-glycosylation. Mutations in OTOG or OTOGL genes may cause hearing loss. Members of the ABFB family contain an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD binds two arabinose molecules in the beta and gamma subdomains. — an NCBI CDD conserved domain (cd23265); members share this curated model.
