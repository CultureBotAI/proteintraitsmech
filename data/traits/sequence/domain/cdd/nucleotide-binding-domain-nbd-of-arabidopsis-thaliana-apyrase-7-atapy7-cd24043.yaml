identifier: CDD:cd24043
label: "nucleotide-binding domain (NBD) of Arabidopsis thaliana apyrase 7 (AtAPY7) and similar proteins. Apyrase 7 (APY7; EC 3.6.1.5), also called ATP-diphosphatase, ATP-diphosphohydrolase, adenosine diphosphatase, ADPase, NTPDase, or nucleoside triphosphate diphosphohydrolase 7, catalyzes the hydrolysis of phosphoanhydride bonds of nucleoside tri- and di-phosphates (NTPs and NDPs). AtAPY7 has been classified as a type IV-A membrane protein. It is important in pollen exine formation. AtAPY7 does not appear to function as a typical apyrase."
definition: >-
  nucleotide-binding domain (NBD) of Arabidopsis thaliana apyrase 7 (AtAPY7) and similar proteins. Apyrase 7 (APY7; EC 3.6.1.5), also called ATP-diphosphatase, ATP-diphosphohydrolase, adenosine diphosphatase, ADPase, NTPDase, or nucleoside triphosphate diphosphohydrolase 7, catalyzes the hydrolysis of phosphoanhydride bonds of nucleoside tri- and di-phosphates (NTPs and NDPs). AtAPY7 has been classified as a type IV-A membrane protein. It is important in pollen exine formation. AtAPY7 does not appear to function as a typical apyrase. — an NCBI CDD conserved domain (cd24043); members share this curated model.
