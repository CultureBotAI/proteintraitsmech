identifier: CDD:cd16376
label: "diversity-generating retroelement protein bAvd and similar proteins. The bacterial accessory variability determinant (bAvd) protein, together with a reverse transcriptase, is involved in retrohoming processes as part of a diversity-generating retroelement (DGR), a type of system that is involved in generating sequence variation in bacterial proteins by inserting coding information from a template region into a variable region of a protein coding gene. bAvd forms homopentamers and interacts with the reverse transcriptase as well as with DNA and/or RNA."
definition: >-
  diversity-generating retroelement protein bAvd and similar proteins. The bacterial accessory variability determinant (bAvd) protein, together with a reverse transcriptase, is involved in retrohoming processes as part of a diversity-generating retroelement (DGR), a type of system that is involved in generating sequence variation in bacterial proteins by inserting coding information from a template region into a variable region of a protein coding gene. bAvd forms homopentamers and interacts with the reverse transcriptase as well as with DNA and/or RNA. — an NCBI CDD conserved domain (cd16376); members share this curated model.
