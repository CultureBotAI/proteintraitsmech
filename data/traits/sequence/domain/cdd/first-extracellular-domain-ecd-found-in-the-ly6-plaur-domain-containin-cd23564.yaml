identifier: CDD:cd23564
label: "first extracellular domain (ECD) found in the Ly6/PLAUR domain-containing protein 4 (LYPD4)-like family. The LYPD4-like family includes LYPD4, testis-expressed protein 101 (TEX101), and CD177 antigen. LYPD4 is an acrosome protein expressed specifically in mammalian testes and sperm. It plays an essential role in mammalian fertilization. TEX101 (also called cell surface receptor NYD-SP8, or scleroderma-associated autoantigen, or spermatogenesis-related gene protein (SGRG)) is a germ cell-specific glycosylphosphatidylinositol (GPI)-anchored protein essential for sperm fertility and spermatogenesis. It plays a role in fertilization by controlling binding of sperm to zona pellucida and migration of spermatozoa into the oviduct.  It is associated with Ly6k during spermatogenesis in testis and is required for stable expression of lymphocyte antigen 6 family member K (Ly6k) on testicular germ cells. CD177, also called human neutrophil alloantigen 2a (HNA-2a), or NB1 glycoprotein (NB1 GP), or polycythemia rubra vera protein 1 (PRV-1), is a cell surface protein normally expressed on neutrophil. It modulates the function and homeostasis of tumor-infiltrating regulatory T cells. The expression of CD177 is an important biomarker of myeloproliferative diseases. HNA-2a is expressed on subpopulations of neutrophils. Gene CD177 has two alleles: NB1 and PRV-1, which encode a glycosylphoshatidylinositol (GPI)-anchored protein with three N-glycosylation sites that belongs to the uPAR/CD59/Ly6 snake toxin superfamily. NB1 glycoprotein binds to the endothelial cell adhesion molecule, platelet endothelial cell adhesion molecule-1 (PECAM-1) and participates in neutrophil transmigration. PRV-1 is a novel hematopoietic cell surface receptor which is overexpressed in polycythemia rubra vera. LYPD4 and TEX101 contain two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the first ECD. CD177 contains four ECD domains. This model corresponds to the first ECD domain of LYPD4 and TEX101, as well as first and third ECD domains of CD177."
definition: >-
  first extracellular domain (ECD) found in the Ly6/PLAUR domain-containing protein 4 (LYPD4)-like family. The LYPD4-like family includes LYPD4, testis-expressed protein 101 (TEX101), and CD177 antigen. LYPD4 is an acrosome protein expressed specifically in mammalian testes and sperm. It plays an essential role in mammalian fertilization. TEX101 (also called cell surface receptor NYD-SP8, or scleroderma-associated autoantigen, or spermatogenesis-related gene protein (SGRG)) is a germ cell-specific glycosylphosphatidylinositol (GPI)-anchored protein essential for sperm fertility and spermatogenesis. It plays a role in fertilization by controlling binding of sperm to zona pellucida and migration of spermatozoa into the oviduct. It is associated with Ly6k during spermatogenesis in testis and is required for stable expression of lymphocyte antigen 6 family member K (Ly6k) on testicular germ cells. CD177, also called human neutrophil alloantigen 2a (HNA-2a), or NB1 glycoprotein (NB1 GP), or polycythemia rubra vera protein 1 (PRV-1), is a cell surface protein normally expressed on neutrophil. It modulates the function and homeostasis of tumor-infiltrating regulatory T cells. The expression of CD177 is an important biomarker of myeloproliferative diseases. HNA-2a is expressed on subpopulations of neutrophils. Gene CD177 has two alleles: NB1 and PRV-1, which encode a glycosylphoshatidylinositol (GPI)-anchored protein with three N-glycosylation sites that belongs to the uPAR/CD59/Ly6 snake toxin superfamily. NB1 glycoprotein binds to the endothelial cell adhesion molecule, platelet endothelial cell adhesion molecule-1 (PECAM-1) and participates in neutrophil transmigration. PRV-1 is a novel hematopoietic cell surface receptor which is overexpressed in polycythemia rubra vera. LYPD4 and TEX101 contain two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the first ECD. CD177 contains four ECD domains. This model corresponds to the first ECD domain of LYPD4 and TEX101, as well as first and third ECD domains of CD177. — an NCBI CDD conserved domain (cd23564); members share this curated model.
