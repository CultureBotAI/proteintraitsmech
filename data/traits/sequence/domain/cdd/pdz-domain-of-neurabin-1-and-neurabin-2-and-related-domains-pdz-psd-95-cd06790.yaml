identifier: CDD:cd06790
label: "PDZ domain of neurabin-1 and neurabin-2, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of neurabin-1 (also known as protein phosphatase 1 regulatory subunit 9A) and neurabin-2 (also known as spinophilin, and protein phosphatase 1 regulatory subunit 9B), and related domains. Neurabin-1 and neurabin-2 are neuronal scaffolding proteins that play important roles in the regulation of synaptic transmission through their ability to interact with and target protein phosphatase 1 (PP1) to dendritic spines where PP1 dephosphorylates and inactivates glutamate receptors. Neurabin-2 interacts with multiple other synaptic proteins, including synaptic signaling and scaffolding proteins (e.g., GluN1 and SAPAP3) and cytoskeletal proteins (e.g., neurofilament medium polypeptide, NF-M). Neurabin-1 and neurabin-2 also binds F-actin. Other binding partners of neurabin-1 include adenosine A1 receptor (A1R), SAD-1 kinase and 70 kDa ribosomal protein S6 kinase (p70-S6K). This PDZ domain is immediately C-terminal to the PP1 binding domain. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This neurabin-like PDZ domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
