identifier: CDD:cd23581
label: "extracellular domain (ECD) found in Mus musculus prostate and testis expressed protein 6 (PATE6) and similar proteins. The family includes Mus musculus PATE6 and PATE7. PATE6 (also called called prostate and testis expressed 6, or PATE-like protein C) acts as nicotinic acetylcholine receptor (nAChR) regulator. The biological function of PATE7 (also called called prostate and testis expressed 7) remains unclear. Members in this family contain an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Mus musculus prostate and testis expressed protein 6 (PATE6) and similar proteins. The family includes Mus musculus PATE6 and PATE7. PATE6 (also called called prostate and testis expressed 6, or PATE-like protein C) acts as nicotinic acetylcholine receptor (nAChR) regulator. The biological function of PATE7 (also called called prostate and testis expressed 7) remains unclear. Members in this family contain an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23581); members share this curated model.
