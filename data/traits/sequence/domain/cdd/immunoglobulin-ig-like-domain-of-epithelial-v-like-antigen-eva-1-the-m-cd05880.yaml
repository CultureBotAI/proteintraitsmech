identifier: CDD:cd05880
label: "Immunoglobulin (Ig)-like domain of epithelial V-like antigen (EVA) 1. The members here are composed of the immunoglobulin (Ig) domain of epithelial V-like antigen 1 (EVA 1). EVA is also known as myelin protein zero-like 2. EVA is an adhesion molecule and may play a role in the structural organization of the thymus and early lymphocyte development."
definition: >-
  Immunoglobulin (Ig)-like domain of epithelial V-like antigen (EVA) 1. The members here are composed of the immunoglobulin (Ig) domain of epithelial V-like antigen 1 (EVA 1). EVA is also known as myelin protein zero-like 2. EVA is an adhesion molecule and may play a role in the structural organization of the thymus and early lymphocyte development. — an NCBI CDD conserved domain (cd05880); members share this curated model.
