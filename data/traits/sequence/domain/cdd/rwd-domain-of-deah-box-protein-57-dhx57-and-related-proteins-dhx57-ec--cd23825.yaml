identifier: CDD:cd23825
label: "RWD domain of DEAH box protein 57 (DHX57) and related proteins. DHX57 (EC 3.6.4.13) is a putative ATP-dependent RNA helicase. A genome-wide association study (GWAS) of cerebellar epigenetic age acceleration identified significant SNPs (single nucleotide polymorphisms) in a loci 2p22.1 inside the DHX57 gene, suggesting that variants in DHX57 are associated with epigenetic age in the cerebellum."
definition: >-
  RWD domain of DEAH box protein 57 (DHX57) and related proteins. DHX57 (EC 3.6.4.13) is a putative ATP-dependent RNA helicase. A genome-wide association study (GWAS) of cerebellar epigenetic age acceleration identified significant SNPs (single nucleotide polymorphisms) in a loci 2p22.1 inside the DHX57 gene, suggesting that variants in DHX57 are associated with epigenetic age in the cerebellum. — an NCBI CDD conserved domain (cd23825); members share this curated model.
