identifier: CDD:cd07738
label: "Dictyostelium discoideum phosphodiesterase 5 and related proteins; MBL-fold metallo hydrolase domain. Includes Dictyostelium discoideum cAMP/cGMP-dependent 3',5'-cAMP/cGMP phosphodiesterase A (also known as cyclic GMP-binding protein A, phosphodiesterase 5, phosphodiesterase D, and PDE5) and cAMP/cGMP-dependent 3',5'-cAMP/cGMP phosphodiesterase B (also known as cyclic GMP-binding protein B, phosphodiesterase 6, phosphodiesterase E, and PDE6. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  Dictyostelium discoideum phosphodiesterase 5 and related proteins; MBL-fold metallo hydrolase domain. Includes Dictyostelium discoideum cAMP/cGMP-dependent 3',5'-cAMP/cGMP phosphodiesterase A (also known as cyclic GMP-binding protein A, phosphodiesterase 5, phosphodiesterase D, and PDE5) and cAMP/cGMP-dependent 3',5'-cAMP/cGMP phosphodiesterase B (also known as cyclic GMP-binding protein B, phosphodiesterase 6, phosphodiesterase E, and PDE6. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd07738); members share this curated model.
