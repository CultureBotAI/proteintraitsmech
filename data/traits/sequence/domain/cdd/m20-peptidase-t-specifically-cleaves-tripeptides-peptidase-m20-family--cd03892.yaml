identifier: CDD:cd03892
label: "M20 Peptidase T specifically cleaves tripeptides. Peptidase M20 family, Peptidase T (peptT; tripeptide aminopeptidase; tripeptidase) subfamily. PepT acts only on tripeptide substrates, and is thus called a tripeptidase. It catalyzes the release of N-terminal amino acids with hydrophobic side chains from tripeptides with high specificity; dipeptides, tetrapeptides or tripeptides with the N-terminus blocked are not cleaved. Tripeptidases are known to function at the final stage of proteolysis in lactococcal bacteria and release amino acids from tripeptides produced during the digestion of milk proteins such as casein."
definition: >-
  M20 Peptidase T specifically cleaves tripeptides. Peptidase M20 family, Peptidase T (peptT; tripeptide aminopeptidase; tripeptidase) subfamily. PepT acts only on tripeptide substrates, and is thus called a tripeptidase. It catalyzes the release of N-terminal amino acids with hydrophobic side chains from tripeptides with high specificity; dipeptides, tetrapeptides or tripeptides with the N-terminus blocked are not cleaved. Tripeptidases are known to function at the final stage of proteolysis in lactococcal bacteria and release amino acids from tripeptides produced during the digestion of milk proteins such as casein. — an NCBI CDD conserved domain (cd03892); members share this curated model.
