identifier: CDD:cd19840
label: "B-box-type 1 zinc finger found in tripartite motif-containing protein 29 (TRIM29) and similar proteins. TRIM29, also termed ataxia telangiectasia group D-associated protein (ATDC), plays a crucial role in the regulation of macrophage activation in response to viral or bacterial infections within the respiratory tract. TRIM29 belongs to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif."
definition: >-
  B-box-type 1 zinc finger found in tripartite motif-containing protein 29 (TRIM29) and similar proteins. TRIM29, also termed ataxia telangiectasia group D-associated protein (ATDC), plays a crucial role in the regulation of macrophage activation in response to viral or bacterial infections within the respiratory tract. TRIM29 belongs to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19840); members share this curated model.
