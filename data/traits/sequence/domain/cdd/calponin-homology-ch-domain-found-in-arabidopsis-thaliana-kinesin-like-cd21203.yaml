identifier: CDD:cd21203
label: "calponin homology (CH) domain found in Arabidopsis thaliana Kinesin-like KIN-14 protein family. Kinesins are microtubule-dependent molecular motors that play important roles in intracellular transport and in cell division. This family includes a group of kinesin-like proteins belonging to KIN-14 protein family. They all contain a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
