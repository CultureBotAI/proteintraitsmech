identifier: CDD:cd08798
label: "Death domain of the Nuclear Factor-KappaB2 precursor protein p100. Death Domain (DD) of the Nuclear Factor-KappaB2 (NF-kB2) precursor protein p100. The NF-kB family of transcription factors play a central role in cardiovascular growth, stress response, and inflammation by controlling the expression of a network of different genes. There are five NF-kB proteins, all containing an N-terminal REL Homology Domain (RHD). NF-kB2 (or p52) is produced from the processing of the precursor protein p100, which contains ANK repeats and a C-terminal DD in addition to the RHD. It is regulated by the non-canonical NF-kB pathway. The p100 precursor is cytosolic and interacts with RelB. Upon phosphorylation by IKKalpha, p100 is processed to its 52kDa active, DNA-binding form and the p52/RelB complex is translocated into the nucleus. The non-canonical pathway plays a role in adaptive immunity and lymphorganogenesis. In general, DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Death domain of the Nuclear Factor-KappaB2 precursor protein p100. Death Domain (DD) of the Nuclear Factor-KappaB2 (NF-kB2) precursor protein p100. The NF-kB family of transcription factors play a central role in cardiovascular growth, stress response, and inflammation by controlling the expression of a network of different genes. There are five NF-kB proteins, all containing an N-terminal REL Homology Domain (RHD). NF-kB2 (or p52) is produced from the processing of the precursor protein p100, which contains ANK repeats and a C-terminal DD in addition to the RHD. It is regulated by the non-canonical NF-kB pathway. The p100 precursor is cytosolic and interacts with RelB. Upon phosphorylation by IKKalpha, p100 is processed to its 52kDa active, DNA-binding form and the p52/RelB complex is translocated into the nucleus. The non-canonical pathway plays a role in adaptive immunity and lymphorganogenesis. In general, DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08798); members share this curated model.
