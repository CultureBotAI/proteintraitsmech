label: "BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 6 (BTBD6). BTBD6, also called lens BTB domain protein, is a BTB-domain-containing Kelch-like protein that is required for proper embryogenesis and plays an essential evolutionarily-conserved role during neuronal development."
