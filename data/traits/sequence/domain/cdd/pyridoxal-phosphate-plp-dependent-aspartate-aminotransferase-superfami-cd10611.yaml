identifier: CDD:cd10611
label: DABD_like
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Diaminobutyrate decarboxylase-like. Diaminobutyrate decarboxylase (DABD) like. This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). Based on sequence identity there are two distinct types of histidine and glutamate decarboxylases (types a and b). The major groups in this family corresponds to DOPA/tyrosine decarboxylase (DDC), histidine decarboxylase type a (HDC_a) and glutamate decarboxylase type a (GDC_a). DDC is active as a dimer and catalyzes the decarboxylation of tyrosine. GDC_a catalyzes the decarboxylation of glutamate and HDC_a catalyzes the decarboxylation of histidine. All members in this CD are bacterial in origin
