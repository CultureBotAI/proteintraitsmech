identifier: CDD:cd14329
label: "UBA domain found in yeast auxilin-like clathrin uncoating factor SWA2 (Swa2p) and similar proteins. The lineage specific group includes Swa2p and other uncharacterized hypothetical proteins from Saccharomyces. Swa2p, also called bud site selection protein 24, DnaJ-related protein SWA2, or synthetic lethal with ARF1 protein 2, is the yeast auxilin ortholog that is a multifunctional protein with three N-terminal clathrin-binding (CB) motifs, a ubiquitin-association (UBA) domain, a tetratricopeptide repeat (TPR) domain, and a C-terminal J-domain. It is required for disassembly of clathrin-coated vesicles (CCVs) in an ATP-dependent manner, as well as for cortical endoplasmic reticulum (ER) inheritance."
definition: >-
  UBA domain found in yeast auxilin-like clathrin uncoating factor SWA2 (Swa2p) and similar proteins. The lineage specific group includes Swa2p and other uncharacterized hypothetical proteins from Saccharomyces. Swa2p, also called bud site selection protein 24, DnaJ-related protein SWA2, or synthetic lethal with ARF1 protein 2, is the yeast auxilin ortholog that is a multifunctional protein with three N-terminal clathrin-binding (CB) motifs, a ubiquitin-association (UBA) domain, a tetratricopeptide repeat (TPR) domain, and a C-terminal J-domain. It is required for disassembly of clathrin-coated vesicles (CCVs) in an ATP-dependent manner, as well as for cortical endoplasmic reticulum (ER) inheritance. — an NCBI CDD conserved domain (cd14329); members share this curated model.
