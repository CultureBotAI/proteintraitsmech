identifier: CDD:cd19398
label: "transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic protein 8A (BMP-8A), 8B (BMP-8B) and similar proteins. BMP-8A plays a role in the maintenance of spermatogenesis and the integrity of the epididymis. BMP-8B, also termed BMP-8, or osteogenic protein 2 (OP-2), may act as secreted factor in cancer progression. It also plays an essential role in bone metabolism and can regulate thermogenesis and energy balance. Like BMP-8A, BMP-8B plays a role in spermatogenesis and placental development. Mutation in either of the genes encoding BMP-8A or BMP-8B causes postnatal depletion of spermatogonia in mice."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic protein 8A (BMP-8A), 8B (BMP-8B) and similar proteins. BMP-8A plays a role in the maintenance of spermatogenesis and the integrity of the epididymis. BMP-8B, also termed BMP-8, or osteogenic protein 2 (OP-2), may act as secreted factor in cancer progression. It also plays an essential role in bone metabolism and can regulate thermogenesis and energy balance. Like BMP-8A, BMP-8B plays a role in spermatogenesis and placental development. Mutation in either of the genes encoding BMP-8A or BMP-8B causes postnatal depletion of spermatogonia in mice. — an NCBI CDD conserved domain (cd19398); members share this curated model.
