label: "lipoyl/octanoyl transferase. Lipoate-protein ligase B is a octanoyl-[acyl carrier protein]-protein acyltransferase the catalyzes the first step of lipoic acid synthesis. It transfers endogenous octanoic acid attached via a thioester bond to acyl carrier protein (ACP) onto lipoyl domains, which is later converted by lipoate synthase LipA into lipoylated derivatives."
