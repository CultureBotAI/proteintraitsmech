identifier: CDD:cd11784
label: "Third Src Homology 3 domain of SH3 domain containing ring finger 2. SH3RF2 is also called POSHER (POSH-eliminating RING protein) or HEPP1 (heart protein phosphatase 1-binding protein). It acts as an anti-apoptotic regulator of the JNK pathway by binding to and promoting the degradation of SH3RF1 (or POSH), a scaffold protein that is required for pro-apoptotic JNK activation. It may also play a role in cardiac functions together with protein phosphatase 1. SH3RF2 contains an N-terminal RING finger domain and three SH3 domains. This model represents the third SH3 domain, located in the middle, of SH3RF2. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Third Src Homology 3 domain of SH3 domain containing ring finger 2. SH3RF2 is also called POSHER (POSH-eliminating RING protein) or HEPP1 (heart protein phosphatase 1-binding protein). It acts as an anti-apoptotic regulator of the JNK pathway by binding to and promoting the degradation of SH3RF1 (or POSH), a scaffold protein that is required for pro-apoptotic JNK activation. It may also play a role in cardiac functions together with protein phosphatase 1. SH3RF2 contains an N-terminal RING finger domain and three SH3 domains. This model represents the third SH3 domain, located in the middle, of SH3RF2. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11784); members share this curated model.
