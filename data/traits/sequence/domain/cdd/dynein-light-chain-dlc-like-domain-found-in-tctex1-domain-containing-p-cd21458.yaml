label: "dynein light chain (DLC)-like domain found in Tctex1 domain-containing protein 1 (TCTEX1D1) and similar proteins. Tctex1 domain-containing protein 1 (TCTEX1D1) is a genetic modifier of disease progression in Duchenne muscular dystrophy (DMD). It can interact with ZMYND10 that stabilizes intermediate chain proteins in the cytoplasmic pre-assembly of dynein arms. The model corresponds to the (dynein light chain) DLC-like domain of TCTEX1D1."
definition: >-
  dynein light chain (DLC)-like domain found in Tctex1 domain-containing protein 1 (TCTEX1D1) and similar proteins. Tctex1 domain-containing protein 1 (TCTEX1D1) is a genetic modifier of disease progression in Duchenne muscular dystrophy (DMD). It can interact with ZMYND10 that stabilizes intermediate chain proteins in the cytoplasmic pre-assembly of dynein arms. The model corresponds to the (dynein light chain) DLC-like domain of TCTEX1D1. — an NCBI CDD conserved domain (cd21458); members share this curated model.
