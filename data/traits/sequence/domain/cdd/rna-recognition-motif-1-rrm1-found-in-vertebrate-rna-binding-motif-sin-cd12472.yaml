identifier: CDD:cd12472
label: "RNA recognition motif 1 (RRM1) found in vertebrate RNA-binding motif, single-stranded-interacting protein 3 (RBMS3). This subgroup corresponds to the RRM1 of RBMS3, a new member of the c-myc gene single-strand binding proteins (MSSP) family of DNA regulators. Unlike other MSSP proteins, RBMS3 is not a transcriptional regulator. It binds with high affinity to A/U-rich stretches of RNA, and to A/T-rich DNA sequences, and functions as a regulator of cytoplasmic activity. RBMS3 contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and its C-terminal region is acidic and enriched in prolines, glutamines and threonines."
definition: >-
  RNA recognition motif 1 (RRM1) found in vertebrate RNA-binding motif, single-stranded-interacting protein 3 (RBMS3). This subgroup corresponds to the RRM1 of RBMS3, a new member of the c-myc gene single-strand binding proteins (MSSP) family of DNA regulators. Unlike other MSSP proteins, RBMS3 is not a transcriptional regulator. It binds with high affinity to A/U-rich stretches of RNA, and to A/T-rich DNA sequences, and functions as a regulator of cytoplasmic activity. RBMS3 contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and its C-terminal region is acidic and enriched in prolines, glutamines and threonines. — an NCBI CDD conserved domain (cd12472); members share this curated model.
