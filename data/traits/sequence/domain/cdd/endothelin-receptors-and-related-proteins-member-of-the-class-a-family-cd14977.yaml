identifier: CDD:cd14977
label: "endothelin receptors and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This subfamily of G-protein coupled receptors includes endothelin receptors, bombesin receptor subtype 3 (BRS-3), gastrin-releasing peptide receptor (GRPR), neuromedin B receptor (NMB-R), endothelin B receptor-like 2 (ETBR-LP-2), and GRP37. The endothelin receptors and related proteins are members of the seven transmembrane rhodopsin-like G-protein coupled receptor family (class A GPCRs) which activate multiple effectors via different types of G protein."
definition: >-
  endothelin receptors and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This subfamily of G-protein coupled receptors includes endothelin receptors, bombesin receptor subtype 3 (BRS-3), gastrin-releasing peptide receptor (GRPR), neuromedin B receptor (NMB-R), endothelin B receptor-like 2 (ETBR-LP-2), and GRP37. The endothelin receptors and related proteins are members of the seven transmembrane rhodopsin-like G-protein coupled receptor family (class A GPCRs) which activate multiple effectors via different types of G protein. — an NCBI CDD conserved domain (cd14977); members share this curated model.
