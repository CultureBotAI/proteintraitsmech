identifier: CDD:cd08201
label: "Uncharacterized family of plant peroxidase-like proteins. This is a subgroup of heme-dependent peroxidases similar to plant peroxidases.  Along with animal peroxidases, these enzymes belong to a group of peroxidases containing a heme prosthetic group (ferriprotoporphyrin IX) which catalyzes a multistep oxidative reaction involving hydrogen peroxide as the electron acceptor. The plant peroxidase-like superfamily is found in all three kingdoms of life and carries out a variety of biosynthetic and degradative functions."
definition: >-
  Uncharacterized family of plant peroxidase-like proteins. This is a subgroup of heme-dependent peroxidases similar to plant peroxidases. Along with animal peroxidases, these enzymes belong to a group of peroxidases containing a heme prosthetic group (ferriprotoporphyrin IX) which catalyzes a multistep oxidative reaction involving hydrogen peroxide as the electron acceptor. The plant peroxidase-like superfamily is found in all three kingdoms of life and carries out a variety of biosynthetic and degradative functions. — an NCBI CDD conserved domain (cd08201); members share this curated model.
