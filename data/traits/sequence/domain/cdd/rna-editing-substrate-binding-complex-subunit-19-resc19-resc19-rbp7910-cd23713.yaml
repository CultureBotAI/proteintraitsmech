identifier: CDD:cd23713
label: "RNA-editing substrate-binding complex subunit 19 (RESC19). RESC19 (RBP7910) is a component of the RNA-editing substrate-binding complex (RESC), consisting of about 20 components, that is involved in kinetoplast RNA processing. RESC19 contains N- and C-terminal  Z-DNA-binding domains (ZDBs) that bind RNA, and preferentially interacts with multiple mitochondrial RNA classes containing poly(U) and poly(AU)-rich sequences. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. This model includes both the N- and C-terminal Z-DNA-binding domains, which are both predicted (by AlphaFold) to adopt winged helix-turn-helix structures, consistent with their nucleic acid-binding properties."
definition: >-
  RNA-editing substrate-binding complex subunit 19 (RESC19). RESC19 (RBP7910) is a component of the RNA-editing substrate-binding complex (RESC), consisting of about 20 components, that is involved in kinetoplast RNA processing. RESC19 contains N- and C-terminal Z-DNA-binding domains (ZDBs) that bind RNA, and preferentially interacts with multiple mitochondrial RNA classes containing poly(U) and poly(AU)-rich sequences. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. This model includes both the N- and C-terminal Z-DNA-binding domains, which are both predicted (by AlphaFold) to adopt winged helix-turn-helix structures, consistent with their nucleic acid-binding properties. — an NCBI CDD conserved domain (cd23713); members share this curated model.
