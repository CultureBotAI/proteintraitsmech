label: "RecA-like domain of ion-translocating ATPases. RecA-like NTPases. This family includes the NTP-binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. This group also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
