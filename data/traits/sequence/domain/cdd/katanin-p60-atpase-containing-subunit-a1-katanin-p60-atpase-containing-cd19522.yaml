identifier: CDD:cd19522
label: "Katanin p60 ATPase-containing subunit A1. Katanin p60 ATPase-containing subunit A1 (KTNA1) is the catalytic subunit of the Katanin complex which is severs microtubules in an ATP-dependent manner, and is implicated in multiple aspects of microtubule dynamics. In addition to the p60 catalytic ATPase subunit, Katanin contains an accessory subunit (p80 or p80-like). The microtubule-severing activity of the ATPase is essential for female meiotic spindle assembly, and male gamete production; and the katanin complex severing microtubules is under tight regulation during the transition from the meiotic to mitotic stage to allow proper embryogenesis. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  Katanin p60 ATPase-containing subunit A1. Katanin p60 ATPase-containing subunit A1 (KTNA1) is the catalytic subunit of the Katanin complex which is severs microtubules in an ATP-dependent manner, and is implicated in multiple aspects of microtubule dynamics. In addition to the p60 catalytic ATPase subunit, Katanin contains an accessory subunit (p80 or p80-like). The microtubule-severing activity of the ATPase is essential for female meiotic spindle assembly, and male gamete production; and the katanin complex severing microtubules is under tight regulation during the transition from the meiotic to mitotic stage to allow proper embryogenesis. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19522); members share this curated model.
