identifier: CDD:cd18634
label: "chromodomain of the Chromodomain Y-like protein family. This group includes the chromodomain found in the mammalian chromodomain Y-like (CDY) protein family, and similar proteins. The human CDY family includes 6 proteins: the genes encoding four of these: two copies of CDY1 (CDY1a, CDY1a) and two copies of CDY2(CDY2a and CDY2b), are located on chromosome Y, and the genes encoding the other two members (CDYL and CDYL2) are located on autosomes. The chromosomal genes are only present in primates, whereas the CDYL and CDYL2 genes exist in most mammalian species. The CDY family proteins contain two functional domains: a chromodomain involved in chromatin binding and a catalytic domain found in many coenzyme A (CoA)- dependent acylation enzymes. CDYL is ubiquitously expressed, whereas CDYL2 shows selective expression in tissues of testis, prostate, spleen, and leukocyte. The CDYL genes are ubiquitously expressed, the CDY genes are only expressed in the testis. Deletion of the CDY1b gene has been shown to be a risk factor for male infertility. Impairments in CDY2 expression could be implicated in the pathogenesis of maturation arrest (a failure of germ cell development)."
definition: >-
  chromodomain of the Chromodomain Y-like protein family. This group includes the chromodomain found in the mammalian chromodomain Y-like (CDY) protein family, and similar proteins. The human CDY family includes 6 proteins: the genes encoding four of these: two copies of CDY1 (CDY1a, CDY1a) and two copies of CDY2(CDY2a and CDY2b), are located on chromosome Y, and the genes encoding the other two members (CDYL and CDYL2) are located on autosomes. The chromosomal genes are only present in primates, whereas the CDYL and CDYL2 genes exist in most mammalian species. The CDY family proteins contain two functional domains: a chromodomain involved in chromatin binding and a catalytic domain found in many coenzyme A (CoA)- dependent acylation enzymes. CDYL is ubiquitously expressed, whereas CDYL2 shows selective expression in tissues of testis, prostate, spleen, and leukocyte. The CDYL genes are ubiquitously expressed, the CDY genes are only expressed in the testis. Deletion of the CDY1b gene has been shown to be a risk factor for male infertility. Impairments in CDY2 expression could be implicated in the pathogenesis of maturation arrest (a failure of germ cell development). — an NCBI CDD conserved domain (cd18634); members share this curated model.
