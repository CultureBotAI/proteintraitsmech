identifier: CDD:cd19020
label: "extracellular domain of neuronal acetylcholine receptor subunit alpha 7 (CHRNA7). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit alpha 7 (alpha7), encoded by the CHRNA7 gene. Alpha7 subunits form a homo-pentameric channel, displays marked permeability to calcium ions and is a major component of brain nicotinic receptors that are blocked by, and highly sensitive to, alpha-bungarotoxin. This protein is ubiquitously expressed in both the central nervous system and in the periphery, in several tissues, including adrenal, small intestine, testis, and stomach. CHRNA7 is located in a region identified as a major susceptibility locus for juvenile myoclonic epilepsy and a chromosomal location involved in the genetic transmission of schizophrenia. It is also genetically linked to other disorders with cognitive deficits, including bipolar disorder, ADHD, Alzheimer's disease, and Rett syndrome. An evolutionarily recent partial duplication of CHRNA7 on chromosome 15 forms a new gene, CHRFAM7A or FAM7A, which encodes the protein dup-alpha7. This protein assembles with alpha7 subunits, results in fewer binding sites and is a dominant negative regulator of alpha7 nAChR function."
definition: >-
  extracellular domain of neuronal acetylcholine receptor subunit alpha 7 (CHRNA7). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit alpha 7 (alpha7), encoded by the CHRNA7 gene. Alpha7 subunits form a homo-pentameric channel, displays marked permeability to calcium ions and is a major component of brain nicotinic receptors that are blocked by, and highly sensitive to, alpha-bungarotoxin. This protein is ubiquitously expressed in both the central nervous system and in the periphery, in several tissues, including adrenal, small intestine, testis, and stomach. CHRNA7 is located in a region identified as a major susceptibility locus for juvenile myoclonic epilepsy and a chromosomal location involved in the genetic transmission of schizophrenia. It is also genetically linked to other disorders with cognitive deficits, including bipolar disorder, ADHD, Alzheimer's disease, and Rett syndrome. An evolutionarily recent partial duplication of CHRNA7 on chromosome 15 forms a new gene, CHRFAM7A or FAM7A, which encodes the protein dup-alpha7. This protein assembles with alpha7 subunits, results in fewer binding sites and is a dominant negative regulator of alpha7 nAChR function. — an NCBI CDD conserved domain (cd19020); members share this curated model.
