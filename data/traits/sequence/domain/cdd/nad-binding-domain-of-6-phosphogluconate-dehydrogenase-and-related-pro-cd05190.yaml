identifier: CDD:cd05190
label: "NAD binding domain of 6-phosphogluconate dehydrogenase and related proteins. The NAD binding domain of 6-phosphogluconate dehydrogenase adopts a Rossmann fold.  6-PGDH catalyzes the oxidative decarboxylation of 6-phosphogluconate to ribulose 5-phosphate with NADP+ as an electron acceptor, as part of the pentose phosphate pathway.  6-PGDH is a homodimer in which monomers act independently. 6-PGDH has about a 1000-fold greater Km for NADP+ vs. NAD+. Rossman fold NAD(P)(+) binding proteins. These protein family members share in common  a Rossmann fold, NAD(P)H binding (NADB) domain.  This structural domain is found in numerous dehydrogenases of glycolysis  and other enzymes. These domains have an alpha-beta-alpha configuration. NAD binding involves numerous hydrogen and van der Waals contacts. In particular  H-bonding between the residues in the turn between the first strand and the subsequent  helix. Typically, the turn has a consensus binding pattern similar to GXGXXG, in which the  first 2 glycines participate in NAD(P)-binding, and the third facilitates close packing of  the helix to the beta-strand."
definition: >-
  NAD binding domain of 6-phosphogluconate dehydrogenase and related proteins. The NAD binding domain of 6-phosphogluconate dehydrogenase adopts a Rossmann fold. 6-PGDH catalyzes the oxidative decarboxylation of 6-phosphogluconate to ribulose 5-phosphate with NADP+ as an electron acceptor, as part of the pentose phosphate pathway. 6-PGDH is a homodimer in which monomers act independently. 6-PGDH has about a 1000-fold greater Km for NADP+ vs. NAD+. Rossman fold NAD(P)(+) binding proteins. These protein family members share in common a Rossmann fold, NAD(P)H binding (NADB) domain. This structural domain is found in numerous dehydrogenases of glycolysis and other enzymes. These domains have an alpha-beta-alpha configuration. NAD binding involves numerous hydrogen and van der Waals contacts. In particular H-bonding between the residues in the turn between the first strand and the subsequent helix. Typically, the turn has a consensus binding pattern similar to GXGXXG, in which the first 2 glycines participate in NAD(P)-binding, and the third facilitates close packing of the helix to the beta-strand. — an NCBI CDD conserved domain (cd05190); members share this curated model.
