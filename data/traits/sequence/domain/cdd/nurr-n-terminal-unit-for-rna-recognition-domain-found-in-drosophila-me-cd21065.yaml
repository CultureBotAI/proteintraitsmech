identifier: CDD:cd21065
label: "NURR (N-terminal unit for RNA recognition) domain found in Drosophila melanogaster Syncrip and similar proteins. Syncrip is a conserved RNA-binding protein important in neuronal and muscular development in Drosophila. It is essential for the morphology and growth of the neuromuscular junction and regulates cytoplasmic vesicle-based messenger RNA (mRNA) transport. The model corresponds to NURR domain of Syncrip, which is a RNA-binding domain with a highly conserved RNA-binding surface."
definition: >-
  NURR (N-terminal unit for RNA recognition) domain found in Drosophila melanogaster Syncrip and similar proteins. Syncrip is a conserved RNA-binding protein important in neuronal and muscular development in Drosophila. It is essential for the morphology and growth of the neuromuscular junction and regulates cytoplasmic vesicle-based messenger RNA (mRNA) transport. The model corresponds to NURR domain of Syncrip, which is a RNA-binding domain with a highly conserved RNA-binding surface. — an NCBI CDD conserved domain (cd21065); members share this curated model.
