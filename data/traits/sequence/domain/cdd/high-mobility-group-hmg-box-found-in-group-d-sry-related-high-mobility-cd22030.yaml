identifier: CDD:cd22030
label: "high mobility group (HMG)-box found in group D SRY-related high-mobility group (HMG) box (Sox) transcription factors. SoxD transcription factors includes three members, Sox5, Sox6, and Sox13. They function as important transcriptional regulators of glial development in the central nervous system. SoxD proteins influence multiple stages of oligodendrocyte development and modulate SoxE protein function. This subfamily also contains SoxD transcription factor homolog EGL-13, which specifies distinct O2 and CO2 sensory neuron fates in Caenorhabditis elegans. SOX-5 plays important roles in various cancer types. It binds specifically to the DNA sequence 5'-AACAAT-3'. SOX-6 plays a key role in cell proliferation, differentiation, and cell fate determination, as well as neurogenesis and skeleton formation. It is a tumor suppressor and downregulated in various cancers. SOX-6 binds specifically to the DNA sequence 5'-AACAAT-3'. SOX-13, also called Islet cell antigen 12 (ICA12), or type 1 diabetes auto-antigen ICA12, modulates T cell specification and is an autoimmune antigen. It binds to the sequence 5'-AACAAT-3'."
definition: >-
  high mobility group (HMG)-box found in group D SRY-related high-mobility group (HMG) box (Sox) transcription factors. SoxD transcription factors includes three members, Sox5, Sox6, and Sox13. They function as important transcriptional regulators of glial development in the central nervous system. SoxD proteins influence multiple stages of oligodendrocyte development and modulate SoxE protein function. This subfamily also contains SoxD transcription factor homolog EGL-13, which specifies distinct O2 and CO2 sensory neuron fates in Caenorhabditis elegans. SOX-5 plays important roles in various cancer types. It binds specifically to the DNA sequence 5'-AACAAT-3'. SOX-6 plays a key role in cell proliferation, differentiation, and cell fate determination, as well as neurogenesis and skeleton formation. It is a tumor suppressor and downregulated in various cancers. SOX-6 binds specifically to the DNA sequence 5'-AACAAT-3'. SOX-13, also called Islet cell antigen 12 (ICA12), or type 1 diabetes auto-antigen ICA12, modulates T cell specification and is an autoimmune antigen. It binds to the sequence 5'-AACAAT-3'. — an NCBI CDD conserved domain (cd22030); members share this curated model.
