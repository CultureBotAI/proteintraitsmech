identifier: CDD:cd18337
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 5 (KLHL5). KLHL5 shares high identity and similarity with the Drosophila kelch protein, a component of ring canals. It is abundantly expressed in the ovary, adrenal gland, and thymus. It contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 5 (KLHL5). KLHL5 shares high identity and similarity with the Drosophila kelch protein, a component of ring canals. It is abundantly expressed in the ovary, adrenal gland, and thymus. It contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18337); members share this curated model.
