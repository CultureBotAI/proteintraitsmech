identifier: CDD:cd19459
label: "Ornithodoros moubata CI, O. moubata moubatin, and similar proteins. The soft tick Ornithodoros moubata complement inhibitor CI (OmCI, also known as coversin) specifically targets C5, a member of the C3/C4/C5 protein family that orchestrates the assembly of the terminal C multiprotein complexes.  O.  moubata moubatin is a specific inhibitor of collagen-induced platelet aggregation. This subgroup belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
  Ornithodoros moubata CI, O. moubata moubatin, and similar proteins. The soft tick Ornithodoros moubata complement inhibitor CI (OmCI, also known as coversin) specifically targets C5, a member of the C3/C4/C5 protein family that orchestrates the assembly of the terminal C multiprotein complexes. O. moubata moubatin is a specific inhibitor of collagen-induced platelet aggregation. This subgroup belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development. — an NCBI CDD conserved domain (cd19459); members share this curated model.
