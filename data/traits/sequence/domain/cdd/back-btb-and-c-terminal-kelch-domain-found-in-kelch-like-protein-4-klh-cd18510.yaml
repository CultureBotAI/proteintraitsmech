label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 4 (KLHL4). KLHL4 shares high identity and similarity with the Drosophila kelch protein, a component of ring canals. It contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 4 (KLHL4). KLHL4 shares high identity and similarity with the Drosophila kelch protein, a component of ring canals. It contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. — an NCBI CDD conserved domain (cd18510); members share this curated model.
