identifier: CDD:cd18497
label: "BACK (BTB and C-terminal Kelch) domain found in ankyrin repeat and BTB/POZ domain-containing protein 1 (ABTB1). ABTB1, also called elongation factor 1A-binding protein, or Bood POZ containing gene type 1 (BPOZ-1), is an anti-proliferative factor that may act as a mediator of the phosphatase and tensin homologue (PTEN) growth-suppressive signaling pathway. It may play a role in developmental processes."
definition: >-
