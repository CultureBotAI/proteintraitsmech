identifier: CDD:cd17336
label: "Solute carrier organic anion transporters of the Major Facilitator Superfamily of transporters. Solute carrier organic anion transporters (SLCOs) are also called organic anion transporting polypeptides (OATPs) or SLC21 (Solute carrier family 21) proteins. They are sodium-independent transporters that mediate the transport of a broad range of endo- as well as xenobiotics. Their substrates are mainly amphipathic organic anions with a molecular weight of more than 300Da, although there are a few known neutral or positively charged substrates. These include drugs including statins, angiotensin-converting enzyme inhibitors, angiotensin receptor blockers, antibiotics, antihistaminics, antihypertensives, and anticancer drugs. SLCOs/OATPs can be classified into 6 families (SLCO1-6 or OATP1-6) and each family may have subfamilies (e.g. OATP1A, OATP1B, OATP1C). Within the subfamilies, individual members are numbered according to the chronology of their identification and if there is already an ortholog known, they are given the same number. For example, the first SLCO identified, is rat OATP1A1 (encoded by the Slco1a1 gene). The second SLCO identified is the first human SLCO from the same subfamily and is called OATP1A2 (encoded by the SLCO1A2 gene). There are 11 human SLCOs/OATPs. SLCOs belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier organic anion transporters of the Major Facilitator Superfamily of transporters. Solute carrier organic anion transporters (SLCOs) are also called organic anion transporting polypeptides (OATPs) or SLC21 (Solute carrier family 21) proteins. They are sodium-independent transporters that mediate the transport of a broad range of endo- as well as xenobiotics. Their substrates are mainly amphipathic organic anions with a molecular weight of more than 300Da, although there are a few known neutral or positively charged substrates. These include drugs including statins, angiotensin-converting enzyme inhibitors, angiotensin receptor blockers, antibiotics, antihistaminics, antihypertensives, and anticancer drugs. SLCOs/OATPs can be classified into 6 families (SLCO1-6 or OATP1-6) and each family may have subfamilies (e.g. OATP1A, OATP1B, OATP1C). Within the subfamilies, individual members are numbered according to the chronology of their identification and if there is already an ortholog known, they are given the same number. For example, the first SLCO identified, is rat OATP1A1 (encoded by the Slco1a1 gene). The second SLCO identified is the first human SLCO from the same subfamily and is called OATP1A2 (encoded by the SLCO1A2 gene). There are 11 human SLCOs/OATPs. SLCOs belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17336); members share this curated model.
