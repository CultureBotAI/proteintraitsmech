identifier: CDD:cd14388
label: "UBA2 domain found in Arabidopsis thaliana ubiquitin carboxyl-terminal hydrolase 14 (atUBP14) and similar proteins. atUBP14, also called deubiquitinating enzyme 14, TITAN-6 protein, ubiquitin thioesterase 14, or ubiquitin-specific-processing protease 14, is related to the isopeptidase T class of deubiquitinating enzymes that recycle polyubiquitin chains following protein degradation. atUBP14 is essential for early plant development. It can disassemble multi-ubiquitin chains linked internally via epsilon-amino isopeptide bonds using Lys48 and can process some, but not all, translational fusions of ubiquitin linked via alpha-amino peptide bonds. atUBP14 contains two ubiquitin-association (UBA) domains. This model corresponds to the UBA2 domain which show a high level of sequence similarity with mammalian ubiquitin-associated and SH3 domain-containing protein A (UBS3A)."
definition: >-
  UBA2 domain found in Arabidopsis thaliana ubiquitin carboxyl-terminal hydrolase 14 (atUBP14) and similar proteins. atUBP14, also called deubiquitinating enzyme 14, TITAN-6 protein, ubiquitin thioesterase 14, or ubiquitin-specific-processing protease 14, is related to the isopeptidase T class of deubiquitinating enzymes that recycle polyubiquitin chains following protein degradation. atUBP14 is essential for early plant development. It can disassemble multi-ubiquitin chains linked internally via epsilon-amino isopeptide bonds using Lys48 and can process some, but not all, translational fusions of ubiquitin linked via alpha-amino peptide bonds. atUBP14 contains two ubiquitin-association (UBA) domains. This model corresponds to the UBA2 domain which show a high level of sequence similarity with mammalian ubiquitin-associated and SH3 domain-containing protein A (UBS3A). — an NCBI CDD conserved domain (cd14388); members share this curated model.
