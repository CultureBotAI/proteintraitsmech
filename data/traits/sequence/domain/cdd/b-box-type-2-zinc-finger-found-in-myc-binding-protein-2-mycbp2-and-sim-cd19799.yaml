identifier: CDD:cd19799
label: "B-box-type 2 zinc finger  found in Myc-binding protein 2 (MYCBP2) and similar proteins. MYCBP2, also termed protein associated with Myc (Pam), is an atypical E3 ubiquitin-protein ligase which specifically mediates ubiquitination of threonine and serine residues on target proteins, instead of ubiquitinating lysine residues. MYCBP2 harbors a B-box motif that shows high sequence similarity with B-Box-type zinc finger 2 found in tripartite motif-containing proteins (TRIMs). The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
definition: >-
  B-box-type 2 zinc finger found in Myc-binding protein 2 (MYCBP2) and similar proteins. MYCBP2, also termed protein associated with Myc (Pam), is an atypical E3 ubiquitin-protein ligase which specifically mediates ubiquitination of threonine and serine residues on target proteins, instead of ubiquitinating lysine residues. MYCBP2 harbors a B-box motif that shows high sequence similarity with B-Box-type zinc finger 2 found in tripartite motif-containing proteins (TRIMs). The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19799); members share this curated model.
