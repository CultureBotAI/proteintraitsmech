identifier: CDD:cd19083
label: "AKR11A and  AKR11D families of aldo-keto reductase (AKR). Bacillus subtilis aldo-keto reductase IolS, also called vegetative protein 147 (VEG147), is a founding member of aldo-keto reductase family 11 member A1 (AKR11A1). It is able to reduce the standard aldo-keto reductase (AKR) substrates DL-glyceraldehyde, D-erythrose, and methylglyoxal in the presence of NADPH, albeit with poor efficiency in vitro. Bacillus aryabhattai aldo keto reductase is a founding member of aldo-keto reductase family 11 member D1 (AKR11D1)."
definition: >-
  AKR11A and AKR11D families of aldo-keto reductase (AKR). Bacillus subtilis aldo-keto reductase IolS, also called vegetative protein 147 (VEG147), is a founding member of aldo-keto reductase family 11 member A1 (AKR11A1). It is able to reduce the standard aldo-keto reductase (AKR) substrates DL-glyceraldehyde, D-erythrose, and methylglyoxal in the presence of NADPH, albeit with poor efficiency in vitro. Bacillus aryabhattai aldo keto reductase is a founding member of aldo-keto reductase family 11 member D1 (AKR11D1). — an NCBI CDD conserved domain (cd19083); members share this curated model.
