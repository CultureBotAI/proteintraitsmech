identifier: CDD:cd07056
label: "1,2-propanediol utilization protein K (PduK), Bacterial Micro-Compartment (BMC) domain repeat 1l. PduK proteins are homologs of the carboxysome shell protein. They are encoded within the pdu operon and might be required for the formation of the outer shell of the bacterial pdu polyhedral organelles which are involved in coenzyme B12-dependent degradation of 1,2-propanediol. Although it has been suggested that PduK might form hexamers and further assemble into the flat facets of the polyhedral outer shell of pdu organelles at present no experimental evidence directly supports this view."
definition: >-
