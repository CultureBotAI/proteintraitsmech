identifier: CDD:cd10807
label: YdjC_like_3
definition: >-
  uncharacterized YdjC-like family proteins from bacteria. This subfamily contains many hypothetical proteins, and belongs to the YdjC-like family of uncharacterized proteins from bacteria. The YdjC-family is represented by an uncharacterised protein YdjC (also known as ChbG) encoded by the chb (N,N'-diacetylchitobiose, also called [GlcNAc]2) or cel operon in Escherichia coli, which encodes enzymes involved in growth on an N,N'-diacetylchitobiose carbon source. The molecular function of this subfamily is unclear
