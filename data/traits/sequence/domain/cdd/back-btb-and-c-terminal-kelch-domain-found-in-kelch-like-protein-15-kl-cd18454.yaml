identifier: CDD:cd18454
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 15 (KLHL15). KLHL15 is a substrate-specific adaptor for Cullin3 E3 ubiquitin-protein ligase complex that target the serine/threonine-protein phosphatase 2A (PP2A) subunit PPP2R5B for ubiquitination and subsequent proteasomal degradation, thus promoting exchange with other regulatory subunits. It also plays a key role in DNA damage response, favoring DNA double-strand repair through error-prone non-homologous end joining (NHEJ) over error-free, RBBP8-mediated homologous recombination (HR), by targeting the DNA-end resection factor RBBP8/CtIP for ubiquitination and subsequent proteasomal degradation."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 15 (KLHL15). KLHL15 is a substrate-specific adaptor for Cullin3 E3 ubiquitin-protein ligase complex that target the serine/threonine-protein phosphatase 2A (PP2A) subunit PPP2R5B for ubiquitination and subsequent proteasomal degradation, thus promoting exchange with other regulatory subunits. It also plays a key role in DNA damage response, favoring DNA double-strand repair through error-prone non-homologous end joining (NHEJ) over error-free, RBBP8-mediated homologous recombination (HR), by targeting the DNA-end resection factor RBBP8/CtIP for ubiquitination and subsequent proteasomal degradation. — an NCBI CDD conserved domain (cd18454); members share this curated model.
