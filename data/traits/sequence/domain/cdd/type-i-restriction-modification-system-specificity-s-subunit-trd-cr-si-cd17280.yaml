identifier: CDD:cd17280
label: "Type I restriction-modification system specificity (S) subunit TRD-CR, similar to Marinobacter species EN3 S subunit (S.MspEN3ORF6650P) TRD1-CR1, Methanothermobacter marburgensis str. Marburg S subunit (S.Mma2133ORF14720P) TRD2-CR2 and Nostoc species NIES-3756 S subunit (S.Nsp3756ORF27100P) TRD1-CR1. The recognition sequences of Marinobacter species EN3 S subunit (S.MspEN3ORF6650P), Methanothermobacter marburgensis str. Marburg S subunit (S.Mma2133ORF14720P), and Nostoc species NIES-3756 S subunit (S.Nsp3756ORF27100P) are undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one heteromeric enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases."
