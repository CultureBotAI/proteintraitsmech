identifier: CDD:cd14561
label: "protein tyrosine phosphatase-like domain of tensin-3. Tensin-3 (TNS3) is also called tensin-like SH2 domain-containing protein 1 (TENS1) or tumor endothelial marker (TEM6). It is part of the tensin family of intracellular proteins (tensin-1, -2, -3 and -4), which act as links between the extracellular matrix and the cytoskeleton, and thereby mediate signaling for cell shape and motility. Tensin-3 contributes to cell migration, anchorage-independent growth, tumorigenesis, and metastasis of cancer cells. It cooperates with Dock5, an exchange factor for the small GTPase Rac, for osteoclast activity to ensure the correct organization of podosomes. Tensin-3 contains an N-terminal region with a protein tyrosine phosphatase (PTP)-like domain followed by a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains."
definition: >-
  protein tyrosine phosphatase-like domain of tensin-3. Tensin-3 (TNS3) is also called tensin-like SH2 domain-containing protein 1 (TENS1) or tumor endothelial marker (TEM6). It is part of the tensin family of intracellular proteins (tensin-1, -2, -3 and -4), which act as links between the extracellular matrix and the cytoskeleton, and thereby mediate signaling for cell shape and motility. Tensin-3 contributes to cell migration, anchorage-independent growth, tumorigenesis, and metastasis of cancer cells. It cooperates with Dock5, an exchange factor for the small GTPase Rac, for osteoclast activity to ensure the correct organization of podosomes. Tensin-3 contains an N-terminal region with a protein tyrosine phosphatase (PTP)-like domain followed by a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains. — an NCBI CDD conserved domain (cd14561); members share this curated model.
