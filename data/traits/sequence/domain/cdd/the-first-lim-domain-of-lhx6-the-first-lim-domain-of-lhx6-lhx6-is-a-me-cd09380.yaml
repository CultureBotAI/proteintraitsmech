identifier: CDD:cd09380
label: "The first LIM domain of Lhx6. The first LIM domain of Lhx6. Lhx6 is a member of LHX protein family, which features two tandem N-terminal LIM domains and a C-terminal DNA binding homeodomain. Members of LHX family are found in the nucleus and act as transcription factors or cofactors. LHX proteins are critical for the development of specialized cells in multiple tissue types, including the nervous system, skeletal muscle, the heart, the kidneys, and endocrine organs such as the pituitary gland and the pancreas. Lhx6 functions in the brain and nervous system.  It is expressed at high levels in several regions of the embryonic mouse CNS, including the telencephalon and hypothalamus, and the first branchial arch. Lhx6 is proposed to have a role in patterning of the mandible and maxilla, and in signaling during odontogenesis. In brain sections, knockdown of Lhx6 gene blocks the normal migration of neurons to the cortex. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The first LIM domain of Lhx6. The first LIM domain of Lhx6. Lhx6 is a member of LHX protein family, which features two tandem N-terminal LIM domains and a C-terminal DNA binding homeodomain. Members of LHX family are found in the nucleus and act as transcription factors or cofactors. LHX proteins are critical for the development of specialized cells in multiple tissue types, including the nervous system, skeletal muscle, the heart, the kidneys, and endocrine organs such as the pituitary gland and the pancreas. Lhx6 functions in the brain and nervous system. It is expressed at high levels in several regions of the embryonic mouse CNS, including the telencephalon and hypothalamus, and the first branchial arch. Lhx6 is proposed to have a role in patterning of the mandible and maxilla, and in signaling during odontogenesis. In brain sections, knockdown of Lhx6 gene blocks the normal migration of neurons to the cortex. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09380); members share this curated model.
