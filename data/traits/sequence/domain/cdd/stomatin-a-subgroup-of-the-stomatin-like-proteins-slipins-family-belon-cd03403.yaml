identifier: CDD:cd03403
label: "Stomatin, a subgroup of the stomatin-like proteins (slipins) family; belonging to the SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. Stomatin (or band 7) is widely expressed and, highly expressed in red blood cells. It localizes predominantly to the plasma membrane and to intracellular vesicles of the endocytic pathway, where it is present in higher order homo-oligomeric complexes (of between 9 and 12 monomers). Stomatin interacts with and regulates members of the degenerin/epithelia Na+ channel family in mechanosensory cells of Caenorhabditis elegans and vertebrate neurons and, is implicated in trafficking of Glut1 glucose transporters. This subgroup found in animals, also contains proteins similar to Caenorhabditis elegans MEC-2. MEC-2 interacts with MEC-4, which is part of the degenerin channel complex required for response to gentle body touch."
definition: >-
  Stomatin, a subgroup of the stomatin-like proteins (slipins) family; belonging to the SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. Stomatin (or band 7) is widely expressed and, highly expressed in red blood cells. It localizes predominantly to the plasma membrane and to intracellular vesicles of the endocytic pathway, where it is present in higher order homo-oligomeric complexes (of between 9 and 12 monomers). Stomatin interacts with and regulates members of the degenerin/epithelia Na+ channel family in mechanosensory cells of Caenorhabditis elegans and vertebrate neurons and, is implicated in trafficking of Glut1 glucose transporters. This subgroup found in animals, also contains proteins similar to Caenorhabditis elegans MEC-2. MEC-2 interacts with MEC-4, which is part of the degenerin channel complex required for response to gentle body touch. — an NCBI CDD conserved domain (cd03403); members share this curated model.
