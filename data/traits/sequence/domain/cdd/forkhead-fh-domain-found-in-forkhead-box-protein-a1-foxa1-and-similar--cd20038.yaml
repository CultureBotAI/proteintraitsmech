identifier: CDD:cd20038
label: "Forkhead (FH) domain found in Forkhead box protein A1 (FOXA1) and similar proteins. FOXA1, also called hepatocyte nuclear factor 3-alpha (HNF-3-alpha or HNF-3A) or transcription factor 3A (TCF-3A), acts as a transcription factor that is essential for epithelial lineage differentiation. It has been found to be upregulated in numerous cancers. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein A1 (FOXA1) and similar proteins. FOXA1, also called hepatocyte nuclear factor 3-alpha (HNF-3-alpha or HNF-3A) or transcription factor 3A (TCF-3A), acts as a transcription factor that is essential for epithelial lineage differentiation. It has been found to be upregulated in numerous cancers. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20038); members share this curated model.
