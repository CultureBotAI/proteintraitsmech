identifier: CDD:cd02214
label: "Methanocaldococcus jannaschii MJ1618 and related proteins, cupin domain. This family includes bacterial and archaeal proteins homologous to MJ1618, a Methanocaldococcus jannaschii protein of unknown function with a cupin beta barrel domain. The active site of members of the cupin superfamily is generally located at the center of a conserved barrel and usually includes a metal ion."
definition: >-
  Methanocaldococcus jannaschii MJ1618 and related proteins, cupin domain. This family includes bacterial and archaeal proteins homologous to MJ1618, a Methanocaldococcus jannaschii protein of unknown function with a cupin beta barrel domain. The active site of members of the cupin superfamily is generally located at the center of a conserved barrel and usually includes a metal ion. — an NCBI CDD conserved domain (cd02214); members share this curated model.
