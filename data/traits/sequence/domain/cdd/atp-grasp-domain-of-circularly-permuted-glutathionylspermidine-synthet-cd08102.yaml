identifier: CDD:cd08102
label: ATP-G_cp_GspS-TryS-like1
definition: >-
  ATP-grasp domain of circularly permuted glutathionylspermidine synthetase and trypanothione synthetase like1. ATP-grasp domain of glutathionylspermidine synthetase. This region contains the Glutathionylspermidine synthase enzymatic activity (EC: 6.3.1.8). This is the C-terminal region in bienzymes. Glutathionylspermidine (GSP) synthetases of Trypanosomatidae and Escherichia coli couple hydrolysis of ATP (to ADP and Pi) with formation of an amide bond between spermidine and the glycine carboxylate of glutathione (gamma-Glu-Cys-Gly). Mg ions are utilized as a cofactor. In the pathogenic trypanosomatids, this reaction is the penultimate step in the biosynthesis of the antioxidant metabolite, trypanothione (N1,N8-bis-(glutathionyl)spermidine), and is a target for drug design
