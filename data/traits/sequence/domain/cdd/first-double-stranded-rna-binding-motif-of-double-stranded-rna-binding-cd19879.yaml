identifier: CDD:cd19879
label: "first double-stranded RNA binding motif of double-stranded RNA-binding protein Staufen homolog 1 (Staufen 1) and similar proteins. Staufen 1 may play a role in specific positioning of mRNAs at given sites in the cell by cross-linking cytoskeletal and RNA components, and in stimulating their translation at the site. It binds double-stranded RNA (regardless of the sequence) and tubulin. Staufen 1 contains five double-stranded RNA binding motifs (DSRMs). This model describes the first motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  first double-stranded RNA binding motif of double-stranded RNA-binding protein Staufen homolog 1 (Staufen 1) and similar proteins. Staufen 1 may play a role in specific positioning of mRNAs at given sites in the cell by cross-linking cytoskeletal and RNA components, and in stimulating their translation at the site. It binds double-stranded RNA (regardless of the sequence) and tubulin. Staufen 1 contains five double-stranded RNA binding motifs (DSRMs). This model describes the first motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19879); members share this curated model.
