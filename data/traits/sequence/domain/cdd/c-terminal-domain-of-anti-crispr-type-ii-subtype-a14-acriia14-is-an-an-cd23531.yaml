identifier: CDD:cd23531
label: AcrIIA14_C
definition: >-
  C-terminal domain of anti-CRISPR type II subtype A14. AcrIIA14 is an anti-CRISPR (Acr) protein which was discovered by a combination of self-targeting CRISPR screening and guilt-by-association Staphylococcus genomic searches. Staphylococcus genomes encode inhibitors of Staphylococcus aureus Cas9 (SauCas9), a genome editing alternative to Streptococcus pyogene Cas9 (SpyCas9); SauCas9 is highly active in mammalian cells, and easier to deliver than SpyCas9 due to its smaller size. AcrIIA14 is a potent inhibitor of SauCas9. AcrIIA14 consists of an N-terminal helix-turn-helix (HTH) domain and a C-terminal domain which inhibits SauCas9 activity in vivo and in vitro without affecting the binding of SauCas9 protein to single molecule guide RNA (sgRNA) and target DNA. The AcrIIA14 C-terminal domain binds to a non-conserved region of SauCas9 HNH nuclease domain sterically preventing the movement of the HNH domain toward the scissile phosphodiester linkage in the target DNA strand. In addition, the binding of AcrIIA14 triggers the conformational allostery of the HNH domain and the L1 linker within the SauCas9, driving them to make new interactions with the target-guide heteroduplex, enhancing the inhibitory ability of AcrIIA14. Almost all type II Acr proteins characterized to date directly interact with the Cas9 endonuclease, although by distinct mechanisms. The type II CRISPR/Cas subtype has a distinct CRISPR RNA (crRNA) guided surveillance complex encoded by cas9 (formerly csn1), cas1, cas2, and csn2 (for type IIA) or cas4 (for type IIB) genes, type II-Cs are generally characterized by the absence of both cas4 and csn2; these genes are all located in a single transcriptional unit directly upstream of the CRISPR locus. However, variants of type II-C systems have been identified in archaea that contain cas4, and have cas1, cas2, cas4 downstream of the CRISPR locus. Cleavage of the DNA target in type II systems is carried out by Cas9 which is an RNA-guided double-stranded DNase with two independent nuclease domains, HNH and RuvC. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 2 systems are characterized by effector modules that consist of a single multidomain protein, such as Cas9 in type II. Acr families are named for their type and subtype which are numbered sequentially as they are discovered
