identifier: CDD:cd21924
label: NBR_nanos
definition: >-
  NBR (NOT module binding region) found in Drosophila melanogaster protein nanos. Nanos is a maternal RNA-binding protein that is required for germ cells proliferation and self-renewal. It acts by forming a complex with pum and brat that regulates translation and mRNA stability. The complex binds to the Nanos Response Element (NRE), a 16 bp sequence in the hunchback (hb) mRNA 3'-UTR, and prevents its translation. Nanos is the localized posterior determinant in Drosophila. Drosophila Nanos contains a Nanos effector domain (NED) at its N-terminal half. This model corresponds to a central region of the NED (called the NOT module binding region, NBR) that bound to the NOT module revealed a bipartite interface that contacts both the NOT1 superfamily homology domain (SHD) and the NOT3 NOT-box domains
