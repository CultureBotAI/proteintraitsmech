identifier: CDD:cd16521
label: "RING finger, HC subclass, found in the makorin (MKRN) proteins. The MKRN protein subfamily includes ribonucleoproteins that are characterized by a variety of zinc-finger motifs, including typical arrays of one to four C3H1-type zinc fingers and a C3HC4-type RING-HC finger. Another motif rich in Cys and His residues (CH), with so far unknown function, is also generally present in MKRN proteins. MKRN proteins may have E3 ubiquitin ligase activity."
definition: >-
  RING finger, HC subclass, found in the makorin (MKRN) proteins. The MKRN protein subfamily includes ribonucleoproteins that are characterized by a variety of zinc-finger motifs, including typical arrays of one to four C3H1-type zinc fingers and a C3HC4-type RING-HC finger. Another motif rich in Cys and His residues (CH), with so far unknown function, is also generally present in MKRN proteins. MKRN proteins may have E3 ubiquitin ligase activity. — an NCBI CDD conserved domain (cd16521); members share this curated model.
