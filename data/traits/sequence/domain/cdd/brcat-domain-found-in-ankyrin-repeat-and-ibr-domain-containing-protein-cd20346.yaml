identifier: CDD:cd20346
label: "BRcat domain found in ankyrin repeat and IBR domain-containing protein 1 (ANKIB1) and similar proteins. ANKIB1 is an RBR-type E3 ubiquitin-protein ligase that may function as part of the E3 complex, which accepts ubiquitin from specific E2 ubiquitin-conjugating enzymes and then transfers it to substrates. It contains N-terminal ankyrin repeats, and an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the BRcat domain of ANKIB1 that adopts the same fold as the Rcat domain while lacking the catalytic cysteine residue and ubiquitination activity."
definition: >-
  BRcat domain found in ankyrin repeat and IBR domain-containing protein 1 (ANKIB1) and similar proteins. ANKIB1 is an RBR-type E3 ubiquitin-protein ligase that may function as part of the E3 complex, which accepts ubiquitin from specific E2 ubiquitin-conjugating enzymes and then transfers it to substrates. It contains N-terminal ankyrin repeats, and an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the BRcat domain of ANKIB1 that adopts the same fold as the Rcat domain while lacking the catalytic cysteine residue and ubiquitination activity. — an NCBI CDD conserved domain (cd20346); members share this curated model.
