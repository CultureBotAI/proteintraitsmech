identifier: CDD:cd22570
label: "cytoplasmic domain of T-cell surface glycoprotein CD4 and similar proteins. CD4, also called T-cell surface antigen T4/Leu-3, is an integral membrane glycoprotein that plays an essential role in the immune response and serves multiple functions in responses against both external and internal offenses. In T-cells, CD4 functions primarily as a coreceptor for MHC class II molecule:peptide complex. In other cells such as macrophages or NK cells, it plays a role in differentiation/activation, cytokine expression and cell migration in a TCR/LCK-independent pathway. CD4 participates in the development of T-helper cells in the thymus and triggers the differentiation of monocytes into functional mature macrophages. The model corresponds to cytoplasmic domain of CD4, which is responsible for the interaction with HIV-1 Nef protein that suppresses multiple immune surveillance mechanisms to promote viral pathogenesis."
definition: >-
  cytoplasmic domain of T-cell surface glycoprotein CD4 and similar proteins. CD4, also called T-cell surface antigen T4/Leu-3, is an integral membrane glycoprotein that plays an essential role in the immune response and serves multiple functions in responses against both external and internal offenses. In T-cells, CD4 functions primarily as a coreceptor for MHC class II molecule:peptide complex. In other cells such as macrophages or NK cells, it plays a role in differentiation/activation, cytokine expression and cell migration in a TCR/LCK-independent pathway. CD4 participates in the development of T-helper cells in the thymus and triggers the differentiation of monocytes into functional mature macrophages. The model corresponds to cytoplasmic domain of CD4, which is responsible for the interaction with HIV-1 Nef protein that suppresses multiple immune surveillance mechanisms to promote viral pathogenesis. — an NCBI CDD conserved domain (cd22570); members share this curated model.
