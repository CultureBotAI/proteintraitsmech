identifier: CDD:cd23714
label: beta-trefoil_Ricin_MtaL
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Mushroom tyrosinase-associated lectin-like protein (MtaL) and similar proteins. Mushroom tyrosinase-associated lectin-like protein (MtaL) binds to mature Agaricus bisporus tyrosinase in vivo, but the exact physiological function of MtaL is poorly understood. MtaL contains a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. The tyrosinase enzyme complex is comprised of a H(2)L(2) tetramer. The L subunit has a lectin-like fold, whereas the H subunit contains a binuclear copper-binding site in the deoxy-state, in which three histidine residues coordinate each copper ion. Comparison of the structures of MtaL and a ricin-B-like lectin with a bound disaccharide shows that MtaL may have a similar carbohydrate-binding site that may be involved in glycoreceptor activity
