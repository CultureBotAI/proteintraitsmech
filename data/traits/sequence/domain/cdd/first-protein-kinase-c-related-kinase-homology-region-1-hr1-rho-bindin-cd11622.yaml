identifier: CDD:cd11622
label: "First Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Protein Kinase N. PKN, also called Protein-kinase C-related kinase (PRK), is a serine/threonine protein kinase that can be activated by the small GTPase Rho, and by fatty acids such as arachidonic and linoleic acids. It is involved in many biological processes including cytoskeletal regulation, cell adhesion, vesicle transport, glucose transport, regulation of meiotic maturation and embryonic cell cycles, signaling to the nucleus, and tumorigenesis. In some vertebrates, there are three PKN isoforms from different genes (designated PKN1, PKN2, and PKN3), which show different enzymatic properties, tissue distribution, and varied functions. PKN proteins contain three HR1 domains, a C2 domain, and a kinase domain. This model characterizes the first HR1 domain of PKN. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family."
definition: >-
  First Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Protein Kinase N. PKN, also called Protein-kinase C-related kinase (PRK), is a serine/threonine protein kinase that can be activated by the small GTPase Rho, and by fatty acids such as arachidonic and linoleic acids. It is involved in many biological processes including cytoskeletal regulation, cell adhesion, vesicle transport, glucose transport, regulation of meiotic maturation and embryonic cell cycles, signaling to the nucleus, and tumorigenesis. In some vertebrates, there are three PKN isoforms from different genes (designated PKN1, PKN2, and PKN3), which show different enzymatic properties, tissue distribution, and varied functions. PKN proteins contain three HR1 domains, a C2 domain, and a kinase domain. This model characterizes the first HR1 domain of PKN. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family. — an NCBI CDD conserved domain (cd11622); members share this curated model.
