identifier: CDD:cd20880
label: "protein kinase C conserved region 1 (C1 domain) found in SH3 and cysteine-rich domain-containing protein (Stac1) and similar proteins. Stac1, also called Src homology 3 and cysteine-rich domain-containing protein, promotes expression of the ion channel CACNA1H at the cell membrane, and thereby contributes to the regulation of channel activity. It plays a minor and redundant role in promoting the expression of calcium channel CACNA1S at the cell membrane, and thereby contributes to increased channel activity. It slows down the inactivation rate of the calcium channel CACNA1C. Stac1 contains a cysteine-rich C1 domain and two SH3 domains at the C-terminus. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in SH3 and cysteine-rich domain-containing protein (Stac1) and similar proteins. Stac1, also called Src homology 3 and cysteine-rich domain-containing protein, promotes expression of the ion channel CACNA1H at the cell membrane, and thereby contributes to the regulation of channel activity. It plays a minor and redundant role in promoting the expression of calcium channel CACNA1S at the cell membrane, and thereby contributes to increased channel activity. It slows down the inactivation rate of the calcium channel CACNA1C. Stac1 contains a cysteine-rich C1 domain and two SH3 domains at the C-terminus. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20880); members share this curated model.
