identifier: CDD:cd15681
label: "PHD finger found in protein Jade-3 and similar proteins. Jade-3, also termed PHD finger protein 16 (PHF16), is a plant homeodomain (PHD) zinc finger protein that is closely related to Jade-1, which functions as an essential regulator of multiple cell signaling pathways. Like Jade-1, Jade-3 is required for ING4 and ING5 to associate with histone acetyl transferase (HAT) HBO1 and Eaf6 to form a HBO1 complex that has a histone H4-specific acetyltransferase activity, a reduced activity toward histone H3, and is responsible for the bulk of histone H4 acetylation in vivo. Jade-3 contains a canonical Cys4HisCys3 PHD domain followed by a non-canonical extended PHD (ePHD) domain, Cys2HisCys5HisCys2His, both of which are zinc-binding motifs. This model corresponds to the canonical Cys4HisCys3 PHD finger."
definition: >-
  PHD finger found in protein Jade-3 and similar proteins. Jade-3, also termed PHD finger protein 16 (PHF16), is a plant homeodomain (PHD) zinc finger protein that is closely related to Jade-1, which functions as an essential regulator of multiple cell signaling pathways. Like Jade-1, Jade-3 is required for ING4 and ING5 to associate with histone acetyl transferase (HAT) HBO1 and Eaf6 to form a HBO1 complex that has a histone H4-specific acetyltransferase activity, a reduced activity toward histone H3, and is responsible for the bulk of histone H4 acetylation in vivo. Jade-3 contains a canonical Cys4HisCys3 PHD domain followed by a non-canonical extended PHD (ePHD) domain, Cys2HisCys5HisCys2His, both of which are zinc-binding motifs. This model corresponds to the canonical Cys4HisCys3 PHD finger. — an NCBI CDD conserved domain (cd15681); members share this curated model.
