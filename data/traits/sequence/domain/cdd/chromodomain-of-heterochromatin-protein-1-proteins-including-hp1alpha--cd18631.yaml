identifier: CDD:cd18631
label: "chromodomain of heterochromatin protein 1 proteins, including HP1alpha, HP1beta, and HP1gamma. CHRomatin Organization Modifier (chromo) domain of mammalian HP1alpha (Cbx5), HP1beta (Cbx1), HP1gamma (Cbx5), and similar proteins. HP1 has diverse functions in heterochromatin formation and impacts both gene expression and gene silencing.  HP1 has two conserved protein-protein interaction domains, a single N-terminal chromodomain (CD) which can bind to histone proteins via methylated lysine residues, and a related C-terminal chromo shadow domain (CSD) which is responsible for the homodimerization and interaction with a number of chromatin-associated non-histone proteins; a flexible hinge region separates the CD and CSD and may bind nucleic acid.  HP1 is a highly conserved non-histone chromosomal protein that is evolutionarily conserved from fission yeast to plants and animals. There are three human homologs of HP1 proteins: HP1alpha (also known as Cbx5), HP1beta (also known as Cbx1), and HP1gamma (also known as Cbx3)."
definition: >-
