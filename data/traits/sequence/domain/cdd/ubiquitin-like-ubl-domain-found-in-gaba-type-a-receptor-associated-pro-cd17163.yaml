identifier: CDD:cd17163
label: "ubiquitin-like (Ubl) domain found in GABA type A receptor associated protein like 2 (GABARAPL2, also known as GATE16). Autophagy is an essential intracellular process that targets large protein complexes, bacterial pathogens, and organelles for degradation. GABARAPL2 (GABA type A receptor associated protein like 2), also known as GATE-16 (golgi-associated adenosine triphosphatase enhancer of 16 kDa), has a ubiquitin-like (Ubl) domain and is a sub-family of the autophagy-related 8 (ATG8) protein family. GABARAPL2 participates to the autophagosome maturation, and seems to be involved in constitutive transport under normal conditions and in autophagic processes during stress. GABARAPL2 is characterized as a membrane transport modulator that controls intra-Golgi transport by interacting with NSF and Golgi v-SNARE GOS-28."
definition: >-
  ubiquitin-like (Ubl) domain found in GABA type A receptor associated protein like 2 (GABARAPL2, also known as GATE16). Autophagy is an essential intracellular process that targets large protein complexes, bacterial pathogens, and organelles for degradation. GABARAPL2 (GABA type A receptor associated protein like 2), also known as GATE-16 (golgi-associated adenosine triphosphatase enhancer of 16 kDa), has a ubiquitin-like (Ubl) domain and is a sub-family of the autophagy-related 8 (ATG8) protein family. GABARAPL2 participates to the autophagosome maturation, and seems to be involved in constitutive transport under normal conditions and in autophagic processes during stress. GABARAPL2 is characterized as a membrane transport modulator that controls intra-Golgi transport by interacting with NSF and Golgi v-SNARE GOS-28. — an NCBI CDD conserved domain (cd17163); members share this curated model.
