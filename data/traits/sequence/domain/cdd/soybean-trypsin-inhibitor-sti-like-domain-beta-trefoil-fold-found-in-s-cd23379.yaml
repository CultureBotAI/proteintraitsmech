identifier: CDD:cd23379
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Senna obtusifolia trypsin inhibitor 1 (COTI) and similar proteins. COTI is a specific inhibitor of bovine trypsin. It also exhibits strong inhibitory effect on midgut trypsin from Pieris rapae, Helicoverpa armigera, Spodoptera exigua, and Spodoptera litura. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Senna obtusifolia trypsin inhibitor 1 (COTI) and similar proteins. COTI is a specific inhibitor of bovine trypsin. It also exhibits strong inhibitory effect on midgut trypsin from Pieris rapae, Helicoverpa armigera, Spodoptera exigua, and Spodoptera litura. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23379); members share this curated model.
