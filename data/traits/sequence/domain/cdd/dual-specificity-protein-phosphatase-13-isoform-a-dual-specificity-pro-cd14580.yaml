identifier: CDD:cd14580
label: "dual specificity protein phosphatase 13 isoform A. Dual specificity protein phosphatase 13 isoform A (DUSP13A), also called branching-enzyme interacting DSP or muscle-restricted DSP (MDSP), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. DUSP13A is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. DUSP13A also functions as a regulator of apoptosis signal-regulating kinase 1 (ASK1), a MAPK kinase kinase, by interacting with its N-terminal domain and inducing ASK1-mediated apoptosis through the activation of caspase-3. This function is independent of phosphatase activity."
definition: >-
  dual specificity protein phosphatase 13 isoform A. Dual specificity protein phosphatase 13 isoform A (DUSP13A), also called branching-enzyme interacting DSP or muscle-restricted DSP (MDSP), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. DUSP13A is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. DUSP13A also functions as a regulator of apoptosis signal-regulating kinase 1 (ASK1), a MAPK kinase kinase, by interacting with its N-terminal domain and inducing ASK1-mediated apoptosis through the activation of caspase-3. This function is independent of phosphatase activity. — an NCBI CDD conserved domain (cd14580); members share this curated model.
