identifier: CDD:cd02293
label: "GFOR_LmbZ. The GFOR_LmbZ  CD includes the putative oxidoreductase, LmbZ, of the Streptomyces lincolnensis lincomycin-production gene cluster, and other related sequences.  LmbZ and related predicted proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase (GFOR) which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins."
definition: >-
  GFOR_LmbZ. The GFOR_LmbZ CD includes the putative oxidoreductase, LmbZ, of the Streptomyces lincolnensis lincomycin-production gene cluster, and other related sequences. LmbZ and related predicted proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase (GFOR) which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins. — an NCBI CDD conserved domain (cd02293); members share this curated model.
