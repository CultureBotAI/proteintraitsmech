identifier: CDD:cd05299
label: "C-terminal binding protein (CtBP), D-isomer-specific 2-hydroxyacid dehydrogenases related repressor. The transcriptional corepressor CtBP is a dehydrogenase with sequence and structural similarity to the d2-hydroxyacid dehydrogenase family. CtBP was initially identified as a protein that bound the PXDLS sequence at the adenovirus E1A C terminus, causing the loss of CR-1-mediated transactivation. CtBP binds NAD(H) within a deep cleft, undergoes a conformational change upon NAD binding, and has NAD-dependent dehydrogenase activity."
definition: >-
  C-terminal binding protein (CtBP), D-isomer-specific 2-hydroxyacid dehydrogenases related repressor. The transcriptional corepressor CtBP is a dehydrogenase with sequence and structural similarity to the d2-hydroxyacid dehydrogenase family. CtBP was initially identified as a protein that bound the PXDLS sequence at the adenovirus E1A C terminus, causing the loss of CR-1-mediated transactivation. CtBP binds NAD(H) within a deep cleft, undergoes a conformational change upon NAD binding, and has NAD-dependent dehydrogenase activity. — an NCBI CDD conserved domain (cd05299); members share this curated model.
