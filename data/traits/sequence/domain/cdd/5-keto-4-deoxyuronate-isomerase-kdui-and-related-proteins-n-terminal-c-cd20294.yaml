identifier: CDD:cd20294
label: "5-keto-4-deoxyuronate isomerase (KduI) and related proteins, N-terminal cupin domain. 5-keto-4-deoxyuronate isomerase (KduI; EC 5.3.1.17), also called 5-dehydro-4-deoxy-D-glucuronate isomerase or 4-deoxy-L-threo-5-hexosulose-uronate ketol-isomerase, catalyzes the interconversion of 5-keto-4-deoxyuronate and 2,5-diketo-3-dexoygluconate in the breakdown of pectin. KduI is a bicupin; this model describes the N-terminal cupin domain. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  5-keto-4-deoxyuronate isomerase (KduI) and related proteins, N-terminal cupin domain. 5-keto-4-deoxyuronate isomerase (KduI; EC 5.3.1.17), also called 5-dehydro-4-deoxy-D-glucuronate isomerase or 4-deoxy-L-threo-5-hexosulose-uronate ketol-isomerase, catalyzes the interconversion of 5-keto-4-deoxyuronate and 2,5-diketo-3-dexoygluconate in the breakdown of pectin. KduI is a bicupin; this model describes the N-terminal cupin domain. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd20294); members share this curated model.
