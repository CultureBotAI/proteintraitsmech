identifier: CDD:cd04817
label: "PA_VapT_like: Protease-associated domain containing proteins like VapT from Vibrio metschnikovii strain RH530. This group contains various PA domain-containing proteins similar to V. metschnikovii VapT, including the serine alkaline protease SapSh from the psychotroph Shewanella strain Ac10 and the Apa1 protease from the psychrotroph Pseudoalteromonas Sp. As-11. VapT is a sodium dodecyl sulfate (SDS) resistant extracellular alkaline serine protease showing high activity over a broad pH range and temperature. SapSh has a high level of protease activity at low temperatures. Apa1 is also cold-adapted. The significance of the PA domain to these proteins has not been ascertained. It may be a protein-protein interaction domain. At peptidase active sites, the PA domain may participate in substrate binding and/or promoting conformational changes, which influence the stability and accessibility of the site to substrate."
definition: >-
  PA_VapT_like: Protease-associated domain containing proteins like VapT from Vibrio metschnikovii strain RH530. This group contains various PA domain-containing proteins similar to V. metschnikovii VapT, including the serine alkaline protease SapSh from the psychotroph Shewanella strain Ac10 and the Apa1 protease from the psychrotroph Pseudoalteromonas Sp. As-11. VapT is a sodium dodecyl sulfate (SDS) resistant extracellular alkaline serine protease showing high activity over a broad pH range and temperature. SapSh has a high level of protease activity at low temperatures. Apa1 is also cold-adapted. The significance of the PA domain to these proteins has not been ascertained. It may be a protein-protein interaction domain. At peptidase active sites, the PA domain may participate in substrate binding and/or promoting conformational changes, which influence the stability and accessibility of the site to substrate. — an NCBI CDD conserved domain (cd04817); members share this curated model.
