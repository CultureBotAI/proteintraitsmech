identifier: CDD:cd18470
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 31 (KLHL31). KLHL31, also termed BTB and kelch domain-containing protein 6, or Kelch repeat and BTB domain-containing protein 1, or Kelch-like protein KLHL, is a transcriptional repressor in MAPK/JNK signaling pathway that regulates cellular functions. Overexpression inhibits the transcriptional activities of both the TPA-response element (TRE) and serum response element (SRE)."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 31 (KLHL31). KLHL31, also termed BTB and kelch domain-containing protein 6, or Kelch repeat and BTB domain-containing protein 1, or Kelch-like protein KLHL, is a transcriptional repressor in MAPK/JNK signaling pathway that regulates cellular functions. Overexpression inhibits the transcriptional activities of both the TPA-response element (TRE) and serum response element (SRE). — an NCBI CDD conserved domain (cd18470); members share this curated model.
