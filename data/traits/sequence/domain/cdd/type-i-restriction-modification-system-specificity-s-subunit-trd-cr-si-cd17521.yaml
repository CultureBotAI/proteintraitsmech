identifier: CDD:cd17521
label: RMtype1_S_Sau13435ORF2165P_TRD2-CR2_like
definition: >-
  Type I restriction-modification system specificity (S) subunit TRD-CR, similar to Staphylococcus aureus NCTC 13435 S subunit (S.Sau13435ORF2165P) TRD2-CR2, Escherichia coli E24377A S subunit (S.EcoE24377ORF286P) TRD1-CR1 and Pseudoalteromonas species P1-13-1a S. subunit (S.Psp1bORF2093P) TRD2-CR2. Staphylococcus aureus NCTC 13435 S subunit (S.Sau13435ORF2165P) recognizes 5'... TCTANNNNNNRTTC ... 3', and the recognition sequences of Escherichia coli E24377A S subunit (S.EcoE24377ORF286P) and Pseudoalteromonas species P1-13-1a S subunit (S.Psp1bORF2093P) are undetermined. The restriction-modification (RM) system S subunit generally consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example, Staphylococcus aureus NCTC 13435 S subunit (S.Sau13435ORF2165P) TRD1 recognizes TCTA/TAGA, and -TRD2 recognizes GAAY/RTTC. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one heteromeric enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. In addition, this family includes RMtype1_S_TRD-CR_like domains of various putative Helicobacter type II restriction enzymes and methyltransferases, such as Hci611ORFHP and HfeORF12890P
