identifier: CDD:cd17037
label: T3SC_IA_ShcV-like
definition: >-
  Class IA type III secretion system chaperone protein, similar to Pseudomonas syringae ShcV. This family includes type III secretion system (T3SS) chaperone protein similar to Pseudomonas syringae ShcV. In P. syringae, which is a plant pathogen that can infect a wide range of species, the T3SS allows injection of effector HopPtoV which may play a subtle role in pathogenesis. Chaperone ShcV facilitates secretion of HopProV into plant cells via the amino-terminal third of the effector
