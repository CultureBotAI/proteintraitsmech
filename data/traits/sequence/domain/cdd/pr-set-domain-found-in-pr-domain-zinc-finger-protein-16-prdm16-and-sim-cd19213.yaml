identifier: CDD:cd19213
label: "PR-SET domain found in PR domain zinc finger protein 16 (PRDM16) and similar proteins. PRDM16, also termed PR domain-containing protein 16, or transcription factor MEL1, or MDS1/EVI1-like gene 1, functions as a transcriptional regulator. PRDM16 is preferentially expressed by hematopoietic and neuronal stem cells and is closely related to paralog of PRDM3, both of which are directly linked to various aspects of oncogenic transformation."
definition: >-
  PR-SET domain found in PR domain zinc finger protein 16 (PRDM16) and similar proteins. PRDM16, also termed PR domain-containing protein 16, or transcription factor MEL1, or MDS1/EVI1-like gene 1, functions as a transcriptional regulator. PRDM16 is preferentially expressed by hematopoietic and neuronal stem cells and is closely related to paralog of PRDM3, both of which are directly linked to various aspects of oncogenic transformation. — an NCBI CDD conserved domain (cd19213); members share this curated model.
