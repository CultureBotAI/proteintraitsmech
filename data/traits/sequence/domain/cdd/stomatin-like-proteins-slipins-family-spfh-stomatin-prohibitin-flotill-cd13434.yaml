identifier: CDD:cd13434
label: "Stomatin-like proteins (slipins) family; SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. This model summarizes proteins similar to stomatin, podocin, and other members of the stomatin-like protein family (SLPs or slipins). The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain. Individual proteins of the SPFH superfamily may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. Stomatin interacts with and regulates members of the degenerin/epithelia Na+ channel family in mechanosensory cells of Caenorhabditis elegans and vertebrate neurons and participates in trafficking of Glut1 glucose transporters. Mutations in the podocin gene give rise to autosomal recessive steroid resistant nephritic syndrome. Bacterial and archaebacterial SLPs and many of the eukaryotic family members remain uncharacterized."
