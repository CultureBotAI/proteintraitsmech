identifier: CDD:cd13361
label: "Phospholipase C-beta (PLC-beta) pleckstrin homology (PH) domain. PLC-beta (PLCbeta) is regulated by heterotrimeric G protein-coupled receptors through their C2 domain and long C-terminal extension which forms an autoinhibitory helix. There are four isoforms: PLC-beta1-4. The PH domain of PLC-beta2 and PLC-beta3 plays a dual role, much like PLC-delta1, by binding to the plasma membrane, as well as the interaction site for the catalytic activator. However, PLC-beta binds to the lipid surface independent of PIP2. PLC-beta1 seems to play unspecified roles in cellular proliferation and differentiation. PLC-beta consists of an N-terminal PH domain, a EF hand domain, a catalytic domain split into X and Y halves, a C2 domain and a C-terminal PDZ. Members of the Rho GTPase family (e.g., Rac1, Rac2, Rac3, and cdc42) have been implicated in their activation by binding to an alternate site on the N-terminal PH domain. A basic amino acid region within the enzyme's long C-terminal tail appears to function as a Nuclear Localization Signal for import into the nucleus. PLCs (EC 3.1.4.3) play a role in the initiation of cellular activation, proliferation, differentiation and apoptosis. They are central to inositol lipid signalling pathways, facilitating intracellular Ca2+ release and protein kinase C (PKC) activation. Specificaly, PLCs catalyze the cleavage of phosphatidylinositol-4,5-bisphosphate (PIP2) and result in the release of 1,2-diacylglycerol (DAG) and inositol 1,4,5-triphosphate (IP3). These products trigger the activation of protein kinase C (PKC) and the release of Ca2+ from intracellular stores. There are fourteen kinds of mammalian phospholipase C proteins which are are classified into six isotypes (beta, gamma, delta, epsilon, zeta, eta). PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes.the plasma membrane, but only a few (less than 10%) display strong specificity in binding inositol phosphates. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinases, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, cytoskeletal associated molecules, and in lipid associated enzymes."
definition: >-
  Phospholipase C-beta (PLC-beta) pleckstrin homology (PH) domain. PLC-beta (PLCbeta) is regulated by heterotrimeric G protein-coupled receptors through their C2 domain and long C-terminal extension which forms an autoinhibitory helix. There are four isoforms: PLC-beta1-4. The PH domain of PLC-beta2 and PLC-beta3 plays a dual role, much like PLC-delta1, by binding to the plasma membrane, as well as the interaction site for the catalytic activator. However, PLC-beta binds to the lipid surface independent of PIP2. PLC-beta1 seems to play unspecified roles in cellular proliferation and differentiation. PLC-beta consists of an N-terminal PH domain, a EF hand domain, a catalytic domain split into X and Y halves, a C2 domain and a C-terminal PDZ. Members of the Rho GTPase family (e.g., Rac1, Rac2, Rac3, and cdc42) have been implicated in their activation by binding to an alternate site on the N-terminal PH domain. A basic amino acid region within the enzyme's long C-terminal tail appears to function as a Nuclear Localization Signal for import into the nucleus. PLCs (EC 3.1.4.3) play a role in the initiation of cellular activation, proliferation, differentiation and apoptosis. They are central to inositol lipid signalling pathways, facilitating intracellular Ca2+ release and protein kinase C (PKC) activation. Specificaly, PLCs catalyze the cleavage of phosphatidylinositol-4,5-bisphosphate (PIP2) and result in the release of 1,2-diacylglycerol (DAG) and inositol 1,4,5-triphosphate (IP3). These products trigger the activation of protein kinase C (PKC) and the release of Ca2+ from intracellular stores. There are fourteen kinds of mammalian phospholipase C proteins which are are classified into six isotypes (beta, gamma, delta, epsilon, zeta, eta). PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes.the plasma membrane, but only a few (less than 10%) display strong specificity in binding inositol phosphates. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinases, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, cytoskeletal associated molecules, and in lipid associated enzymes. — an NCBI CDD conserved domain (cd13361); members share this curated model.
