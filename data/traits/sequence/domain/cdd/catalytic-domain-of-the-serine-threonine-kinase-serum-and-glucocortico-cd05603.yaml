identifier: CDD:cd05603
label: "Catalytic domain of the Serine/Threonine Kinase, Serum- and Glucocorticoid-induced Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. SGK2 shows a more restricted distribution than SGK1 and is most abundantly expressed in epithelial tissues including kidney, liver, pancreas, and the choroid plexus of the brain. In vitro cellular assays show that SGK2 can stimulate the activity of ion channels, the glutamate transporter EEAT4, and the glutamate receptors, GluR6 and GLUR1. The SGK2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
