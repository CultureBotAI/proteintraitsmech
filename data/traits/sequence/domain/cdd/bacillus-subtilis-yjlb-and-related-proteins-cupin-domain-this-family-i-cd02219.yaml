identifier: CDD:cd02219
label: "Bacillus subtilis YjlB and related proteins, cupin domain. This family includes bacterial and fungal proteins homologous to YjlB, a Bacillus subtilis protein of unknown function with a cupin beta barrel fold. The active site of members of the cupin superfamily is generally located at the center of a conserved barrel and usually includes a metal ion. The different functional classes in this superfamily include single domain bacterial isomerases and epimerases involved in the modification of cell wall carbohydrates, two-domain bicupins such as the desiccation-tolerant seed storage globulins, and multidomain nuclear transcription factors involved in legume root nodulation."
definition: >-
