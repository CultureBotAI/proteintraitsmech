identifier: CDD:cd21913
label: Nip7_N_arch
definition: >-
  N-terminal domain of archaeal 60S ribosome subunit biogenesis protein Nip7. The N-terminal domain of archaeal 60S ribosome subunit biogenesis protein Nip7 co-occurs with a PUA (PseudoUridine synthase and Archaeosine transglycosylase) RNA binding domain. Nip7 is involved in ribosome biogenesis, taking part in 27S pre-rRNA processing and in formation of the 60S ribosomal subunit. Nip7 and its homologs share a two-domain architecture with the C-terminal PUA domain mediating interaction with RNA, suggesting that Nip7 is an adaptor protein with the C-terminal domain interacting with RNA targets and the N-terminal domain mediating interaction with protein targets
