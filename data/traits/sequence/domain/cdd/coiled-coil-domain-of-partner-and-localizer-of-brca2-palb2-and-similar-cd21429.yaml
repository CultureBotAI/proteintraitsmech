identifier: CDD:cd21429
label: PALB2_cc
definition: >-
  coiled-coil domain of partner and localizer of BRCA2 (PALB2) and similar proteins. PALB2, also called FANCN, is an essential factor for homologous recombination (HR). It plays a critical role in homologous recombination repair (HRR) through its ability to recruit BRCA2 and RAD51 to DNA breaks. It acts as the molecular scaffold in the formation of the BRCA1-PALB2-BRCA2 complex which is essential for homologous recombination. It binds DNA with high affinity for D loop, which comprises single-stranded, double-stranded and branched DNA structures. It may play a role in the extension step after strand invasion at replication-dependent DNA double-strand breaks; together with BRCA2 is involved in both POLH localization at collapsed replication forks and DNA polymerization activity. The model corresponds to a coiled-coil domain of PALB2, which may mediate functionally important protein-protein interactions
