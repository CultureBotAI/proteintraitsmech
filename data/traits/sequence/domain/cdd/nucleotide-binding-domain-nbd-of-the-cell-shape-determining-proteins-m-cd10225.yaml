identifier: CDD:cd10225
label: "nucleotide-binding domain (NBD) of the cell shape-determining proteins MreB, Mbl, MreBH and similar proteins. MreB proteins are bacterial actin homologs that may play a role in cell shape determination by positioning the cell wall synthetic machinery. MreB has also been implicated in chromosome segregation; specifically, MreB is thought to bind to and segregate the replication origin of bacterial chromosomes. The family includes three MreB isoforms, MreB (also called actin-like MreB protein or rod shape-determining protein MreB), Mbl (also called actin-like Mbl protein or rod shape-determining protein Mbl) and MreBH (also called actin-like MreBH protein or rod shape-determining protein MreBH), in cell morphogenesis of Bacillus subtilis. All isoforms can support rod-shaped cell growth normal conditions. They form membrane-associated dynamic filaments that are essential for cell shape determination. They act by regulating cell wall synthesis and cell elongation, and thus cell shape. The feedback loops between cell geometry and their localizations may maintain elongated cell shape by targeting cell wall growth to regions of negative cell wall curvature. Filaments rotate around the cell circumference in concert with the cell wall synthesis enzymes.  The process is driven by the cell wall synthesis machinery and does not depend on their polymerization. They organize peptidoglycan synthesis in the lateral cell wall. MreB, Mbl and MreBH can form a complex. The MreB-like family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of the cell shape-determining proteins MreB, Mbl, MreBH and similar proteins. MreB proteins are bacterial actin homologs that may play a role in cell shape determination by positioning the cell wall synthetic machinery. MreB has also been implicated in chromosome segregation; specifically, MreB is thought to bind to and segregate the replication origin of bacterial chromosomes. The family includes three MreB isoforms, MreB (also called actin-like MreB protein or rod shape-determining protein MreB), Mbl (also called actin-like Mbl protein or rod shape-determining protein Mbl) and MreBH (also called actin-like MreBH protein or rod shape-determining protein MreBH), in cell morphogenesis of Bacillus subtilis. All isoforms can support rod-shaped cell growth normal conditions. They form membrane-associated dynamic filaments that are essential for cell shape determination. They act by regulating cell wall synthesis and cell elongation, and thus cell shape. The feedback loops between cell geometry and their localizations may maintain elongated cell shape by targeting cell wall growth to regions of negative cell wall curvature. Filaments rotate around the cell circumference in concert with the cell wall synthesis enzymes. The process is driven by the cell wall synthesis machinery and does not depend on their polymerization. They organize peptidoglycan synthesis in the lateral cell wall. MreB, Mbl and MreBH can form a complex. The MreB-like family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd10225); members share this curated model.
