identifier: CDD:cd16890
label: "I-type lysozyme. Invertebrate type (I-type) lysozyme, initially identified in starfish and marine bivalves, are found in various invertebrate phyla and are apparently ubiquitous in insects. Lysozymes cleave the beta-(1,4)-glycosidic bond between N-acetylmuramic acid and N-acetylglucosamine in peptidoglycan, the major bacterial cell wall polymer. I-type enzymes share structural similarity and the conserved glutamate catalytic residue of the lysozyme family."
definition: >-
  I-type lysozyme. Invertebrate type (I-type) lysozyme, initially identified in starfish and marine bivalves, are found in various invertebrate phyla and are apparently ubiquitous in insects. Lysozymes cleave the beta-(1,4)-glycosidic bond between N-acetylmuramic acid and N-acetylglucosamine in peptidoglycan, the major bacterial cell wall polymer. I-type enzymes share structural similarity and the conserved glutamate catalytic residue of the lysozyme family. — an NCBI CDD conserved domain (cd16890); members share this curated model.
