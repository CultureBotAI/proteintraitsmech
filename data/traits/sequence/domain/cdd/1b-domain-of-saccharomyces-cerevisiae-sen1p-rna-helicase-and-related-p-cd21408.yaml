identifier: CDD:cd21408
label: 1B_Sen1p-like
definition: >-
  1B domain of Saccharomyces cerevisiae Sen1p RNA helicase and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. Sen1p belongs to a UPF1-like family of helicase superfamily 1 (SF1). UPF1 participates in nonsense-mediated mRNA decay (NMD), a pathway which degrades transcripts with premature termination codons, Sen1p plays a role in the termination of non-coding transcription. UPF1 is a multidomain protein; it includes an N-terminal Cys/His rich zinc-binding domain (CH/ZBD), a 1B regulatory domain, and a SF1 helicase core. Sen1p has a similar domain organization and helicase mechanism to UPF1. However, it has distinct structural features including a more elaborate topology of the 1B barrel domain, and a distinct function from UPF1, an ATPase-dependent ability of promoting transcription termination in vitro. The 1B domain is involved in nucleic acid substrate binding; the 1B domain of the related Equine arteritis virus (EAV) Nsp10 undergoes large conformational change upon substrate binding, and together with the 1A and 2A domains of the helicase core form a channel that accommodates the single stranded nucleic acids
