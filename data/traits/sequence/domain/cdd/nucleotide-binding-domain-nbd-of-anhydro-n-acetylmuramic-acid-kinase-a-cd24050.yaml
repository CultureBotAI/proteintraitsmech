identifier: CDD:cd24050
label: "nucleotide-binding domain (NBD) of anhydro-N-acetylmuramic acid kinase (ANMK) and similar proteins. ANMK (EC 2.7.1.170), also called AnhMurNAc kinase, catalyzes the specific phosphorylation of 1,6-anhydro-N-acetylmuramic acid (anhMurNAc) with the simultaneous cleavage of the 1,6-anhydro ring, generating MurNAc-6-P. It is required for the utilization of anhMurNAc either imported from the medium or derived from its own cell wall murein, and thus plays a role in cell wall recycling."
definition: >-
  nucleotide-binding domain (NBD) of anhydro-N-acetylmuramic acid kinase (ANMK) and similar proteins. ANMK (EC 2.7.1.170), also called AnhMurNAc kinase, catalyzes the specific phosphorylation of 1,6-anhydro-N-acetylmuramic acid (anhMurNAc) with the simultaneous cleavage of the 1,6-anhydro ring, generating MurNAc-6-P. It is required for the utilization of anhMurNAc either imported from the medium or derived from its own cell wall murein, and thus plays a role in cell wall recycling. — an NCBI CDD conserved domain (cd24050); members share this curated model.
