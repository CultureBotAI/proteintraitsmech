definition: >-
  La RNA-binding domain proteins similar to La-related proteins 1 and 2. This domain is found in proteins similar to vertebrate La-related proteins 1 and 2 (LARP1, LARP2). A variety of La-related proteins (LARPs or La ribonucleoproteins), with differing domain architecture, appear to function as RNA-binding proteins in eukaryotic cellular processes
