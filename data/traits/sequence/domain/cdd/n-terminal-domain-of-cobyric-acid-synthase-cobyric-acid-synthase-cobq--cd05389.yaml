identifier: CDD:cd05389
label: "N-terminal domain of cobyric acid synthase. Cobyric acid synthase (CobQ, CbiP) N-terminal domain. CobQ plays a role in the cobalamin (vitamin B12) biosynthesis pathway. CobQ catalyzes the ATP-dependent amidation of adenosyl-cobyrinic acid a,c-diamide at carboxylates positions b, d, e, and g to produce cobyric acid using glutamine or ammonia as the nitrogen source. The C-terminal glutaminase domain catalyzes the hydrolysis of glutamine to glutamate and ammonia. Ammonia is translocated via an intramolecular tunnel to the N-terminal domain for the synthesis of cobyric acid."
definition: >-
  N-terminal domain of cobyric acid synthase. Cobyric acid synthase (CobQ, CbiP) N-terminal domain. CobQ plays a role in the cobalamin (vitamin B12) biosynthesis pathway. CobQ catalyzes the ATP-dependent amidation of adenosyl-cobyrinic acid a,c-diamide at carboxylates positions b, d, e, and g to produce cobyric acid using glutamine or ammonia as the nitrogen source. The C-terminal glutaminase domain catalyzes the hydrolysis of glutamine to glutamate and ammonia. Ammonia is translocated via an intramolecular tunnel to the N-terminal domain for the synthesis of cobyric acid. — an NCBI CDD conserved domain (cd05389); members share this curated model.
