  PDZ domain 2 of syntenin-1, syntenin-2, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 2 of syntenin-1, syntenin-2, and related domains. Syntenins are implicated in various cellular processes such as trafficking, signaling, and cancer metastasis. They bind to signaling and adhesion molecules, such as syndecans, neurexins, ephrin B, and phospholipid PIP2. Through its tandem PDZ domains (PDZ1 and PDZ2) syntenin links syndecans to other cell surface receptors and kinases, such as E-cadherin and ephrin-B, establishing signaling crosstalk. During syndecan binding, syntenin PDZ2 serves as a high-affinity domain, and PDZ1, also necessary for binding, acts as a complementary, low-affinity domain; this is also the case for syntenin binding to proto-oncogene c-Src. The syntenin PDZ domain-PIP2 interaction controls Arf6-mediated syndecan recycling through endosomal compartments; both PDZ1 and PDZ2 interact with PIP2. Different binding partners and downstream regulators of syntenin1 PDZ domains, such as to proto-oncogene c-Src, mitogen-activated protein kinase (MAPK), and focal adhesion kinase (FAK), have been identified that promote the progression and invasion of a variety of cancers, such as melanoma, glioblastoma multiforme, and breast cancer. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This syntenin-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta- strand F. — an NCBI CDD conserved domain (cd06794); members share this curated model.
