identifier: CDD:cd01290
label: Ubiqunol_Ox_IV
definition: >-
  Ubiquinol oxidase subunit IV. Ubiquinol oxidase, the terminal oxidase in the respiratory chains of aerobic bacteria, is a multi-chain transmembrane protein located in the cell membrane. It catalyzes the reduction of O2 and simultaneously pumps protons across the membrane. The number of subunits in ubiquinol oxidase varies from two to five. The function of subunit IV has not been defined but it is proposed to be involved in maintaining the structure around the binuclear center, based on the available crystal structure data. (Note that the structure is not included in this CD because only the backbone atoms are given and no amino acid sequence is assigned to any residues.)
