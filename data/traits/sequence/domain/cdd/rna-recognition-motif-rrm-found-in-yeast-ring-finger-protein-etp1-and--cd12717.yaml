identifier: CDD:cd12717
label: "RNA recognition motif (RRM) found in yeast RING finger protein ETP1 and similar proteins. This subgroup corresponds to the RRM of ETP1, also termed BRAP2 homolog, or ethanol tolerance protein 1, the yeast homolog of BRCA1-associated protein (BRAP2) found in vertebrates. It may be involved in ethanol and salt-induced transcriptional activation of the NHA1 promoter and heat shock protein genes (HSP12 and HSP26), and participate in ethanol-induced turnover of the low-affinity hexose transporter Hxt3p. ETP1 contains an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by a C3HC4-type ring finger domain and a UBP-type zinc finger."
definition: >-
  RNA recognition motif (RRM) found in yeast RING finger protein ETP1 and similar proteins. This subgroup corresponds to the RRM of ETP1, also termed BRAP2 homolog, or ethanol tolerance protein 1, the yeast homolog of BRCA1-associated protein (BRAP2) found in vertebrates. It may be involved in ethanol and salt-induced transcriptional activation of the NHA1 promoter and heat shock protein genes (HSP12 and HSP26), and participate in ethanol-induced turnover of the low-affinity hexose transporter Hxt3p. ETP1 contains an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by a C3HC4-type ring finger domain and a UBP-type zinc finger. — an NCBI CDD conserved domain (cd12717); members share this curated model.
