identifier: CDD:cd05598
label: "Catalytic domain of the Serine/Threonine Kinase, Large Tumor Suppressor. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LATS was originally identified in Drosophila using a screen for genes whose inactivation led to overproliferation of cells. In tetrapods, there are two LATS isoforms, LATS1 and LATS2. Inactivation of LATS1 in mice results in the development of various tumors, including sarcomas and ovarian cancer. LATS functions as a tumor suppressor and is implicated in cell cycle regulation. The LATS subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Large Tumor Suppressor. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LATS was originally identified in Drosophila using a screen for genes whose inactivation led to overproliferation of cells. In tetrapods, there are two LATS isoforms, LATS1 and LATS2. Inactivation of LATS1 in mice results in the development of various tumors, including sarcomas and ovarian cancer. LATS functions as a tumor suppressor and is implicated in cell cycle regulation. The LATS subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05598); members share this curated model.
