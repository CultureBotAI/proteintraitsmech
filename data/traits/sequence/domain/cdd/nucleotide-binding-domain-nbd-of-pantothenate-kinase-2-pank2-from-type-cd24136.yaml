identifier: CDD:cd24136
label: "nucleotide-binding domain (NBD) of pantothenate kinase 2 (Pank2) from type II pantothenate kinase (PanK-II) subfamily. PanK (EC 2.7.1.33), also called pantothenic acid kinase, is the first enzyme in the Coenzyme A (CoA) biosynthetic pathway. It catalyzes the phosphorylation of pantothenate (vitamin B5) to form 4'-phosphopantothenate at the expense of a molecule of adenosine triphosphate (ATP), which is the rate-limiting step in CoA biosynthesis. It cannot utilize a phosphoryl donor other than ATP. Three distinct types of PanK have been identified, PanK-I, PanK-II and PanK-III. Eukaryotic PanK-II enzymes often occur as different isoforms, such as PanK1, PanK2, PanK3 and PanK4. The model corresponds to PanK2."
definition: >-
  nucleotide-binding domain (NBD) of pantothenate kinase 2 (Pank2) from type II pantothenate kinase (PanK-II) subfamily. PanK (EC 2.7.1.33), also called pantothenic acid kinase, is the first enzyme in the Coenzyme A (CoA) biosynthetic pathway. It catalyzes the phosphorylation of pantothenate (vitamin B5) to form 4'-phosphopantothenate at the expense of a molecule of adenosine triphosphate (ATP), which is the rate-limiting step in CoA biosynthesis. It cannot utilize a phosphoryl donor other than ATP. Three distinct types of PanK have been identified, PanK-I, PanK-II and PanK-III. Eukaryotic PanK-II enzymes often occur as different isoforms, such as PanK1, PanK2, PanK3 and PanK4. The model corresponds to PanK2. — an NCBI CDD conserved domain (cd24136); members share this curated model.
