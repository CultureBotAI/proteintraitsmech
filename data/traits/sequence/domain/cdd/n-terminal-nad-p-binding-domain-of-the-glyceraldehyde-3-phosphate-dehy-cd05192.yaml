identifier: CDD:cd05192
label: "N-terminal NAD(P)-binding domain of the glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like family. The GAPDH-like family includes glyceraldehyde-3-phosphate dehydrogenase (GAPDH), native NAD(P)H-dependent amine dehydrogenases (nat-AmDHs), 2,4-diaminopentanoate dehydrogenase (DAPDH), meso-diaminopimelate D-dehydrogenase (meso-DAPDH), and dihydrodipicolinate reductase (DHDPR). GAPDH plays an important role in glycolysis and gluconeogenesis by reversibly catalyzing the oxidation and phosphorylation of D-glyceraldehyde-3-phosphate to 1,3-diphospho-glycerate. nat-AmDHs catalyze the reductive amination of ketone and aldehyde substrates using NAD(P)H as the hydride source. They play important roles in the efficient asymmetric synthesis of alpha-chiral amines. DAPDH is involved in the ornithine fermentation pathway. It catalyzes the oxidative deamination of (2R,4S)-2,4-diaminopentanoate ((2R,4S)-DAP) to yield 2-amino-4-ketopentanoate (AKP). DHDPR catalyzes the NAD(P)H-dependent reduction of 2,3-dihydrodipicolinate (DHDP) to 2,3,4,5-tetrahydrodipicolinate (THDP). It could also function as a dehydratase in addition to the role of a nucleotide dependent reductase. The model corresponds to the N-terminal NAD(P)-binding domain of GAPDH-like family proteins. It contains a Rossmann fold which combines with the catalytic cysteine-containing C-terminus to form a catalytic cleft."
definition: >-
  N-terminal NAD(P)-binding domain of the glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like family. The GAPDH-like family includes glyceraldehyde-3-phosphate dehydrogenase (GAPDH), native NAD(P)H-dependent amine dehydrogenases (nat-AmDHs), 2,4-diaminopentanoate dehydrogenase (DAPDH), meso-diaminopimelate D-dehydrogenase (meso-DAPDH), and dihydrodipicolinate reductase (DHDPR). GAPDH plays an important role in glycolysis and gluconeogenesis by reversibly catalyzing the oxidation and phosphorylation of D-glyceraldehyde-3-phosphate to 1,3-diphospho-glycerate. nat-AmDHs catalyze the reductive amination of ketone and aldehyde substrates using NAD(P)H as the hydride source. They play important roles in the efficient asymmetric synthesis of alpha-chiral amines. DAPDH is involved in the ornithine fermentation pathway. It catalyzes the oxidative deamination of (2R,4S)-2,4-diaminopentanoate ((2R,4S)-DAP) to yield 2-amino-4-ketopentanoate (AKP). DHDPR catalyzes the NAD(P)H-dependent reduction of 2,3-dihydrodipicolinate (DHDP) to 2,3,4,5-tetrahydrodipicolinate (THDP). It could also function as a dehydratase in addition to the role of a nucleotide dependent reductase. The model corresponds to the N-terminal NAD(P)-binding domain of GAPDH-like family proteins. It contains a Rossmann fold which combines with the catalytic cysteine-containing C-terminus to form a catalytic cleft. — an NCBI CDD conserved domain (cd05192); members share this curated model.
