identifier: CDD:cd23947
label: "uncharacterized phosphoadenosine phosphosulfate reductase-like proteins, similar to Escherichia coli YbdN. This subgroup contains Escherichia coli YbdN and other phosphoadenosine phosphosulfate (PAPS) reductase (or PAPS sulfotransferase EC 1.8.4.8)-like proteins. PAPS reductase is part of the adenine nucleotide alpha hydrolases superfamily also including N-type ATP PPases and ATP sulfurylases. A highly modified version of the P loop, the fingerprint peptide of mononucleotide-binding proteins, is present in the active site of the protein, which appears to be a positively charged cleft containing a number of conserved arginine and lysine residues. Although PAPS reductase has no ATPase activity, it shows a striking similarity to the structure of the ATP pyrophosphatase (ATP PPase) domain of GMP synthetase, indicating that both enzyme families have evolved from a common ancestral nucleotide-binding fold. The enzyme uses thioredoxin as an electron donor for the reduction of PAPS to phospho-adenosine-phosphate (PAP)."
definition: >-
  uncharacterized phosphoadenosine phosphosulfate reductase-like proteins, similar to Escherichia coli YbdN. This subgroup contains Escherichia coli YbdN and other phosphoadenosine phosphosulfate (PAPS) reductase (or PAPS sulfotransferase EC 1.8.4.8)-like proteins. PAPS reductase is part of the adenine nucleotide alpha hydrolases superfamily also including N-type ATP PPases and ATP sulfurylases. A highly modified version of the P loop, the fingerprint peptide of mononucleotide-binding proteins, is present in the active site of the protein, which appears to be a positively charged cleft containing a number of conserved arginine and lysine residues. Although PAPS reductase has no ATPase activity, it shows a striking similarity to the structure of the ATP pyrophosphatase (ATP PPase) domain of GMP synthetase, indicating that both enzyme families have evolved from a common ancestral nucleotide-binding fold. The enzyme uses thioredoxin as an electron donor for the reduction of PAPS to phospho-adenosine-phosphate (PAP). — an NCBI CDD conserved domain (cd23947); members share this curated model.
