identifier: CDD:cd12951
label: "RRP7 domain ribosomal RNA-processing protein 7 homolog A (Rrp7A) and similar proteins. The family corresponds to the RRP7 domain of Rrp7A, also termed gastric cancer antigen Zg14, and similar proteins which are yeast ribosomal RNA-processing protein 7 (Rrp7p) homologs mainly found in Metazoans. The cellular function of Rrp7A remains unclear currently. Rrp7A harbors an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal RRP7 domain."
definition: >-
  RRP7 domain ribosomal RNA-processing protein 7 homolog A (Rrp7A) and similar proteins. The family corresponds to the RRP7 domain of Rrp7A, also termed gastric cancer antigen Zg14, and similar proteins which are yeast ribosomal RNA-processing protein 7 (Rrp7p) homologs mainly found in Metazoans. The cellular function of Rrp7A remains unclear currently. Rrp7A harbors an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal RRP7 domain. — an NCBI CDD conserved domain (cd12951); members share this curated model.
