identifier: CDD:cd16274
label: "Coenzyme pyrroloquinoline quinone (PQQ) synthesis protein B and related proteins; MBL-fold metallo hydrolase domainhydrolase domain. PQQB is essential for the synthesis of the cofactor pyrroloquinoline quinone (PQQ) in Klebsiella pneumonia. PqqB is not directly involved in the PQQ biosynthesis but may serve as a carrier for PQQ when PQQ is released from PqqC. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
