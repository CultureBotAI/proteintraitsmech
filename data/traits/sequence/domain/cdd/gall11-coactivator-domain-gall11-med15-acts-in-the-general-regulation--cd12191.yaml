identifier: CDD:cd12191
label: "gall11 coactivator domain. Gall11/MED15 acts in the general regulation of GAL structural genes and is required for full expression for several genes in this pathway, including GALs 1,7, and 10 in Saccharomyces cerevisiae. GAL11 function is dependent on GCN4 functionality and binds GCN4 in a degenerate manner with multiple orientations found at the GCN4-Gal11 interface."
definition: >-
  gall11 coactivator domain. Gall11/MED15 acts in the general regulation of GAL structural genes and is required for full expression for several genes in this pathway, including GALs 1,7, and 10 in Saccharomyces cerevisiae. GAL11 function is dependent on GCN4 functionality and binds GCN4 in a degenerate manner with multiple orientations found at the GCN4-Gal11 interface. — an NCBI CDD conserved domain (cd12191); members share this curated model.
