identifier: CDD:cd19821
label: "B-box-type 1 zinc finger found in B-box (BBX) family of plant transcription factors and similar proteins. The BBX family includes a group of zinc finger transcription factors that contain one or two B-box motifs, and sometimes also feature a CCT (CONSTANS, CO-like, and TOC1) domain. They play important roles in plant growth and development, including seedling photomorphogenesis, photoperiodic regulation of flowering, shade avoidance, and responses to biotic and abiotic stresses. Their B-box motifs show high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs) and are involved in mediating transcriptional regulation and protein-protein interaction in plant signaling. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif; this family contains a modified motif, C3XC2H2, where X can be D, E, C or H."
definition: >-
  B-box-type 1 zinc finger found in B-box (BBX) family of plant transcription factors and similar proteins. The BBX family includes a group of zinc finger transcription factors that contain one or two B-box motifs, and sometimes also feature a CCT (CONSTANS, CO-like, and TOC1) domain. They play important roles in plant growth and development, including seedling photomorphogenesis, photoperiodic regulation of flowering, shade avoidance, and responses to biotic and abiotic stresses. Their B-box motifs show high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs) and are involved in mediating transcriptional regulation and protein-protein interaction in plant signaling. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif; this family contains a modified motif, C3XC2H2, where X can be D, E, C or H. — an NCBI CDD conserved domain (cd19821); members share this curated model.
