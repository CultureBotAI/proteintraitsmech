identifier: CDD:cd18333
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in hypermethylated in cancer 1 protein (Hic-1). Hic-1, also called zinc finger and BTB domain-containing protein 29 (ZBTB29), is a sequence-specific transcriptional repressor that recognizes and binds to the consensus sequence '5-[CG]NG[CG]GGGCA[CA]CC-3'. It may act as a tumor suppressor, and is involved in regulatory loops modulating P53-dependent and E2F1-dependent cell survival, growth control, and stress responses. It also regulates intestinal immunity and homeostasis. Hic-1 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in hypermethylated in cancer 1 protein (Hic-1). Hic-1, also called zinc finger and BTB domain-containing protein 29 (ZBTB29), is a sequence-specific transcriptional repressor that recognizes and binds to the consensus sequence '5-[CG]NG[CG]GGGCA[CA]CC-3'. It may act as a tumor suppressor, and is involved in regulatory loops modulating P53-dependent and E2F1-dependent cell survival, growth control, and stress responses. It also regulates intestinal immunity and homeostasis. Hic-1 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18333); members share this curated model.
