identifier: CDD:cd23286
label: "MIR domain, beta-trefoil fold, found in Saccharomyces cerevisiae dolichyl-phosphate-mannose--protein mannosyltransferase 7 (PMT7) and similar proteins. Dolichyl-phosphate-mannose-protein mannosyltransferases (EC 2.4.1.109), also called PMTs, are responsible for O-linked glycosylation of proteins. They catalyze the transfer of mannose to seryl and threonyl residues of secretory proteins. Protein O-glycosylation is essential for cell wall rigidity and cell integrity. In Saccharomyces cerevisiae, a family of protein mannosyltransferases coded for by seven genes (PMT1-7). The family includes PMT7. Members in this family contain a MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in Saccharomyces cerevisiae dolichyl-phosphate-mannose--protein mannosyltransferase 7 (PMT7) and similar proteins. Dolichyl-phosphate-mannose-protein mannosyltransferases (EC 2.4.1.109), also called PMTs, are responsible for O-linked glycosylation of proteins. They catalyze the transfer of mannose to seryl and threonyl residues of secretory proteins. Protein O-glycosylation is essential for cell wall rigidity and cell integrity. In Saccharomyces cerevisiae, a family of protein mannosyltransferases coded for by seven genes (PMT1-7). The family includes PMT7. Members in this family contain a MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23286); members share this curated model.
