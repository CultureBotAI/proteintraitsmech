identifier: CDD:cd09128
label: "Putative catalytic domain, repeat 2, of uncharacterized phospholipase D-like proteins. Putative catalytic domain, repeat 2, of uncharacterized phospholipase D (PLD, EC 3.1.4.4)-like proteins. PLD enzymes hydrolyze phospholipid phosphodiester bonds to yield phosphatidic acid and a free polar head group. They can also catalyze transphosphatidylation of phospholipids to acceptor alcohols. Members of this subfamily contain two HKD motifs (H-x-K-x(4)-D, where x represents any amino acid residue) that characterizes the PLD superfamily. The two motifs may be part of the active site and may be involved in phosphatidyl group transfer."
definition: >-
  Putative catalytic domain, repeat 2, of uncharacterized phospholipase D-like proteins. Putative catalytic domain, repeat 2, of uncharacterized phospholipase D (PLD, EC 3.1.4.4)-like proteins. PLD enzymes hydrolyze phospholipid phosphodiester bonds to yield phosphatidic acid and a free polar head group. They can also catalyze transphosphatidylation of phospholipids to acceptor alcohols. Members of this subfamily contain two HKD motifs (H-x-K-x(4)-D, where x represents any amino acid residue) that characterizes the PLD superfamily. The two motifs may be part of the active site and may be involved in phosphatidyl group transfer. — an NCBI CDD conserved domain (cd09128); members share this curated model.
