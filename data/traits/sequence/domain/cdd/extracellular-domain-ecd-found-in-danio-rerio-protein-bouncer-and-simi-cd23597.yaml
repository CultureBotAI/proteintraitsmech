identifier: CDD:cd23597
label: "extracellular domain (ECD) found in Danio rerio protein Bouncer and similar proteins. Bouncer (bncr) is an oocyte-expressed fertilization factor that mediates sperm-egg binding and is essential for sperm entry into the egg. It is necessary and sufficient to mediate species-specific gamete recognition and fertilization, which is essential for vertebrate species performing external fertilization. Bouncer contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Danio rerio protein Bouncer and similar proteins. Bouncer (bncr) is an oocyte-expressed fertilization factor that mediates sperm-egg binding and is essential for sperm entry into the egg. It is necessary and sufficient to mediate species-specific gamete recognition and fertilization, which is essential for vertebrate species performing external fertilization. Bouncer contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23597); members share this curated model.
