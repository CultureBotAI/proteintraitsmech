identifier: CDD:cd17105
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1 (EPB41) and similar proteins. EPB41, also termed protein 4.1 (P4.1), or 4.1R, or Band 4.1, or EPB4.1, belongs to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. EPB41 is a widely expressed cytoskeletal phosphoprotein that stabilizes the spectrin-actin cytoskeleton and anchors the cytoskeleton to the cell membrane. EPB41 contains a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1 (EPB41) and similar proteins. EPB41, also termed protein 4.1 (P4.1), or 4.1R, or Band 4.1, or EPB4.1, belongs to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. EPB41 is a widely expressed cytoskeletal phosphoprotein that stabilizes the spectrin-actin cytoskeleton and anchors the cytoskeleton to the cell membrane. EPB41 contains a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17105); members share this curated model.
