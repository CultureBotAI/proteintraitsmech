identifier: CDD:cd17621
label: "phosphoacceptor receiver (REC) domain of RegX3-like OmpR family response regulators. RegX3 is a member of the SenX3-RegX3 two-component system that is involved in phosphate-sensing signal transduction. Phosphorylated RegX3 functions as a transcriptional activator of phoA. It induces transcription in phosphate limiting environment and also controls expression of several critical metabolic enzymes in aerobic condition. RegX3 belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of RegX3-like OmpR family response regulators. RegX3 is a member of the SenX3-RegX3 two-component system that is involved in phosphate-sensing signal transduction. Phosphorylated RegX3 functions as a transcriptional activator of phoA. It induces transcription in phosphate limiting environment and also controls expression of several critical metabolic enzymes in aerobic condition. RegX3 belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17621); members share this curated model.
