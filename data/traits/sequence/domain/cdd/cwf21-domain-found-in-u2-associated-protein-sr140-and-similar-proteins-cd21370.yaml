identifier: CDD:cd21370
label: "cwf21 domain found in U2-associated protein SR140 and similar proteins. SR140, also called U2 snRNP-associated SURP motif-containing protein, U2SURP, or 140 kDa Ser/Arg-rich domain protein, is a putative splicing factor mainly found in higher eukaryotes. Although it was initially identified as a 17S U2 snRNP-associated protein, the molecular and physiological function of SR140 remains unclear. This model represents the cwf21 domain of SR140 and similar proteins. The cwf21 domain is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8."
definition: >-
  cwf21 domain found in U2-associated protein SR140 and similar proteins. SR140, also called U2 snRNP-associated SURP motif-containing protein, U2SURP, or 140 kDa Ser/Arg-rich domain protein, is a putative splicing factor mainly found in higher eukaryotes. Although it was initially identified as a 17S U2 snRNP-associated protein, the molecular and physiological function of SR140 remains unclear. This model represents the cwf21 domain of SR140 and similar proteins. The cwf21 domain is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8. — an NCBI CDD conserved domain (cd21370); members share this curated model.
