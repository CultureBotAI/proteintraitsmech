identifier: CDD:cd04982
label: "Immunoglobulin (Ig) variable (V) domain of T-cell receptor (TCR) gamma chain. The members here are composed of the immunoglobulin (Ig) variable (V) domain of the gamma chain of gamma/delta T-cell receptors (TCRs). TCRs mediate antigen recognition by T lymphocytes, and are heterodimers consisting of alpha and beta chains or gamma and delta chains.  Each chain contains a variable (V) and a constant (C) region. The majority of T cells contain alpha/beta TCRs, but a small subset contain gamma/delta TCRs. Alpha/beta TCRs recognize antigens as peptide fragments presented by major histocompatibility complex (MHC) molecules. Gamma/delta TCRs recognize intact protein antigens directly without antigen processing and recognize MHC independently of the bound peptide. Gamma/delta T cells can also be stimulated by non-peptide antigens such as small phosphate- or amine-containing compounds. The variable domain of gamma/delta TCRs is responsible for antigen recognition and is located at the N-terminus of the receptor. Members of this group contain the standard Ig superfamily V-set AGFCC'C\"/DEB domain topology."
definition: >-
  Immunoglobulin (Ig) variable (V) domain of T-cell receptor (TCR) gamma chain. The members here are composed of the immunoglobulin (Ig) variable (V) domain of the gamma chain of gamma/delta T-cell receptors (TCRs). TCRs mediate antigen recognition by T lymphocytes, and are heterodimers consisting of alpha and beta chains or gamma and delta chains. Each chain contains a variable (V) and a constant (C) region. The majority of T cells contain alpha/beta TCRs, but a small subset contain gamma/delta TCRs. Alpha/beta TCRs recognize antigens as peptide fragments presented by major histocompatibility complex (MHC) molecules. Gamma/delta TCRs recognize intact protein antigens directly without antigen processing and recognize MHC independently of the bound peptide. Gamma/delta T cells can also be stimulated by non-peptide antigens such as small phosphate- or amine-containing compounds. The variable domain of gamma/delta TCRs is responsible for antigen recognition and is located at the N-terminus of the receptor. Members of this group contain the standard Ig superfamily V-set AGFCC'C"/DEB domain topology. — an NCBI CDD conserved domain (cd04982); members share this curated model.
