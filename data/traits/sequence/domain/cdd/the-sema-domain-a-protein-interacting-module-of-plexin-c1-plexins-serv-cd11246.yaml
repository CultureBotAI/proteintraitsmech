identifier: CDD:cd11246
label: "The Sema domain, a protein interacting module, of Plexin C1. Plexins serve as semaphorin receptors. Plexin C1 has been identified as the receptor of semaphorin 7A, which plays regulation roles in both the immune and nervous systems. Unlike other semaphorins which act as repulsive guidance cues, Sema7A enhances central and peripheral axon growth and is required for proper axon tract formation during embryonic development. Plexin C1 is a potential tumor suppressor for melanoma progression. The expression of Plexin C1 is diminished or absent in human melanoma cell lines. Cofilin, an actin-binding protein involved in cell migration, is a downstream target of Sema7A-Plexin C1 signaling. Cofilin is not phosphorylated when Plexin C1 expression is silenced. Thus, melanoma invasion and metastasis may be promoted through the loss of Plexin C1 inhibitory signaling on cofilin activation. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of Plexin C1. Plexins serve as semaphorin receptors. Plexin C1 has been identified as the receptor of semaphorin 7A, which plays regulation roles in both the immune and nervous systems. Unlike other semaphorins which act as repulsive guidance cues, Sema7A enhances central and peripheral axon growth and is required for proper axon tract formation during embryonic development. Plexin C1 is a potential tumor suppressor for melanoma progression. The expression of Plexin C1 is diminished or absent in human melanoma cell lines. Cofilin, an actin-binding protein involved in cell migration, is a downstream target of Sema7A-Plexin C1 signaling. Cofilin is not phosphorylated when Plexin C1 expression is silenced. Thus, melanoma invasion and metastasis may be promoted through the loss of Plexin C1 inhibitory signaling on cofilin activation. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module. — an NCBI CDD conserved domain (cd11246); members share this curated model.
