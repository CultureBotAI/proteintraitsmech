identifier: CDD:cd02081
label: "animal plasma membrane Ca2(+)-ATPases (PMCA), similar to human ATP2B1-4/PMCA1-4, and related Ca2(+)-ATPases including Saccharomyces cerevisiae vacuolar PMC1. Animal PMCAs function to export Ca(2+) from cells and play a role in regulating Ca(2+) signals following stimulus induction and in preventing calcium toxicity. Many PMCA pump variants exist due to alternative splicing of transcripts. PMCAs are regulated by the binding of calmodulin or by kinase-mediated phosphorylation. Saccharomyces cerevisiae vacuolar transporter Pmc1p facilitates the accumulation of Ca2+ into vacuoles. Pmc1p is not regulated by direct calmodulin binding but responds to the calmodulin/calcineurin-signaling pathway and is controlled by the transcription factor complex Tcn1p/Crz1p.  Similarly, the expression of the gene for Dictyostelium discoideum Ca(2+)-ATPase PAT1, patA, is under the control of a calcineurin-dependent transcription factor. Plant vacuolar Ca(2+)-ATPases, are regulated by direct-calmodulin binding. Plant Ca(2+)-ATPases are present at various cellular locations including the plasma membrane, endoplasmic reticulum, chloroplast and vacuole. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  animal plasma membrane Ca2(+)-ATPases (PMCA), similar to human ATP2B1-4/PMCA1-4, and related Ca2(+)-ATPases including Saccharomyces cerevisiae vacuolar PMC1. Animal PMCAs function to export Ca(2+) from cells and play a role in regulating Ca(2+) signals following stimulus induction and in preventing calcium toxicity. Many PMCA pump variants exist due to alternative splicing of transcripts. PMCAs are regulated by the binding of calmodulin or by kinase-mediated phosphorylation. Saccharomyces cerevisiae vacuolar transporter Pmc1p facilitates the accumulation of Ca2+ into vacuoles. Pmc1p is not regulated by direct calmodulin binding but responds to the calmodulin/calcineurin-signaling pathway and is controlled by the transcription factor complex Tcn1p/Crz1p. Similarly, the expression of the gene for Dictyostelium discoideum Ca(2+)-ATPase PAT1, patA, is under the control of a calcineurin-dependent transcription factor. Plant vacuolar Ca(2+)-ATPases, are regulated by direct-calmodulin binding. Plant Ca(2+)-ATPases are present at various cellular locations including the plasma membrane, endoplasmic reticulum, chloroplast and vacuole. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd02081); members share this curated model.
