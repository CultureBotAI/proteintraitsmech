identifier: CDD:cd19894
label: "first double-stranded RNA binding motif of STRBP, ILF3 and similar proteins. This family includes spermatid perinuclear RNA-binding protein (STRBP) and interleukin enhancer-binding factor 3 (ILF3). STRBP is a double-stranded DNA and RNA binding protein that is involved in spermatogenesis and sperm function. It plays a role in regulation of cell growth. ILF3 (also known as double-stranded RNA-binding protein 76 (DRBP76), M-phase phosphoprotein 4 (MPP4), nuclear factor associated with dsRNA (NFAR), nuclear factor of activated T-cells 90 kDa (NF-AT-90), or translational control protein 80 (TCP80)) is an RNA-binding protein that plays an essential role in the biogenesis of circular RNAs (circRNAs) which are produced by back-splicing circularization of pre-mRNAs. Members of this STRBP/ILF3 group contain an N-terminal DZF domain and two double-stranded RNA binding motifs (DSRMs). This model describes the first motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  first double-stranded RNA binding motif of STRBP, ILF3 and similar proteins. This family includes spermatid perinuclear RNA-binding protein (STRBP) and interleukin enhancer-binding factor 3 (ILF3). STRBP is a double-stranded DNA and RNA binding protein that is involved in spermatogenesis and sperm function. It plays a role in regulation of cell growth. ILF3 (also known as double-stranded RNA-binding protein 76 (DRBP76), M-phase phosphoprotein 4 (MPP4), nuclear factor associated with dsRNA (NFAR), nuclear factor of activated T-cells 90 kDa (NF-AT-90), or translational control protein 80 (TCP80)) is an RNA-binding protein that plays an essential role in the biogenesis of circular RNAs (circRNAs) which are produced by back-splicing circularization of pre-mRNAs. Members of this STRBP/ILF3 group contain an N-terminal DZF domain and two double-stranded RNA binding motifs (DSRMs). This model describes the first motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19894); members share this curated model.
