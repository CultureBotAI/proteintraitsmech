identifier: CDD:cd13426
label: "Peptidases of the G1 family, including scytalidoglutamic peptidase and aspergillopepsin. Some members of this family had been classified earlier as carboxyl peptidases insensitive to pepstatin, and the family has also been called the eqolisin family, due to the fact that the conserved catalytic dyad of the family consists of a glutamate (E) and glutamine (Q) residue. The family is found in fungi and bacteria."
definition: >-
  Peptidases of the G1 family, including scytalidoglutamic peptidase and aspergillopepsin. Some members of this family had been classified earlier as carboxyl peptidases insensitive to pepstatin, and the family has also been called the eqolisin family, due to the fact that the conserved catalytic dyad of the family consists of a glutamate (E) and glutamine (Q) residue. The family is found in fungi and bacteria. — an NCBI CDD conserved domain (cd13426); members share this curated model.
