identifier: CDD:cd11393
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana genes coding transcription factors and similar proteins. bHLH proteins are the second largest class of plant transcription factors that regulate transcription of genes that are involve in many essential physiological and developmental process. bHLH proteins are transcriptional regulators that are found in organisms from yeast to humans. The Arabidopsis bHLH proteins that have been characterized so far have roles in regulation of fruit dehiscence, cell development (carpel, anther and epidermal), phytochrome signaling, flavonoid biosynthesis, hormone signaling and stress responses."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana genes coding transcription factors and similar proteins. bHLH proteins are the second largest class of plant transcription factors that regulate transcription of genes that are involve in many essential physiological and developmental process. bHLH proteins are transcriptional regulators that are found in organisms from yeast to humans. The Arabidopsis bHLH proteins that have been characterized so far have roles in regulation of fruit dehiscence, cell development (carpel, anther and epidermal), phytochrome signaling, flavonoid biosynthesis, hormone signaling and stress responses. — an NCBI CDD conserved domain (cd11393); members share this curated model.
