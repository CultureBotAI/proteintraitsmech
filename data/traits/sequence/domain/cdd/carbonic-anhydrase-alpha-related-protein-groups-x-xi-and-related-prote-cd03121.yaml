identifier: CDD:cd03121
label: "Carbonic anhydrase alpha related protein: groups X, XI and related proteins. This subgroup contains carbonic anhydrase related proteins (CARPs) X and XI, which have been implicated in various biological processes of the central nervous system. CARPs are sequence similar to carbonic anhydrases. Carbonic anhydrases are zinc-containing enzymes that catalyze the reversible hydration of carbon dioxide in a two-step mechanism. CARPs have lost conserved histidines involved in zinc binding and consequently their catalytic activity. CARP XI plays a role in the development of gastrointestinal stromal tumors."
definition: >-
