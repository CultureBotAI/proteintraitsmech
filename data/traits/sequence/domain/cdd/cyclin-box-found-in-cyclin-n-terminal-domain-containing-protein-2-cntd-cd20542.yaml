identifier: CDD:cd20542
label: CYCLIN_CNTD2
definition: >-
  cyclin box found in Cyclin N-terminal domain-containing protein 2 (CNTD2) and similar proteins. CNTD2 is an atypical cyclin upregulated in human cancer tissues. It promotes cell proliferation and migration, as well as increases tumor growth in vivo. It can function as a prognostic factor and drug target. CNTD2 contains one cyclin box. The cyclin box is a protein binding domain
