identifier: CDD:cd11433
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in hypoxia-inducible factor (HIF) family. The HIF family contains bHLH-PAS transcription regulators involved in oxygen homeostasis, including HIF1a, HIF2a, and HIF3a. They have been implicated in development, postnatal physiology as well as disease pathogenesis. HIF1a, also termed HIF-1-alpha, or HIF1-alpha, or ARNT-interacting protein, or Basic-helix-loop-helix-PAS protein MOP1, or Class E basic helix-loop-helix protein 78 (bHLHe78), or Member of PAS protein 1, or PAS domain-containing protein 8 (PASD8), functions as a master transcriptional regulator of the adaptive response to hypoxia. HIF2a, also termed HIF-2-alpha, or HIF2-alpha, or endothelial PAS domain-containing protein 1 (EPAS-1), or Basic-helix-loop-helix-PAS protein MOP2, or Class E basic helix-loop-helix protein 73 (bHLHe73), or Member of PAS protein 2, or PAS domain-containing protein 2 (PASD2), or HIF-1-alpha-like factor (HLF), is a bHLH-PAS transcription factor involved in the induction of oxygen regulated genes. HIF3a, also termed HIF-3-alpha, or HIF3-alpha, or endothelial PAS domain-containing protein 1 (EPAS-1), or Basic-helix-loop-helix-PAS protein MOP7, or Class E basic helix-loop-helix protein 17 (bHLHe17), or Member of PAS protein 7, or PAS domain-containing protein 7 (PASD7), or HIF3-alpha-1, or inhibitory PAS domain protein (IPAS), is a bHLH-PAS transcriptional regulator in adaptive response to low oxygen tension. It plays a role in the regulation of hypoxia-inducible gene expression."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in hypoxia-inducible factor (HIF) family. The HIF family contains bHLH-PAS transcription regulators involved in oxygen homeostasis, including HIF1a, HIF2a, and HIF3a. They have been implicated in development, postnatal physiology as well as disease pathogenesis. HIF1a, also termed HIF-1-alpha, or HIF1-alpha, or ARNT-interacting protein, or Basic-helix-loop-helix-PAS protein MOP1, or Class E basic helix-loop-helix protein 78 (bHLHe78), or Member of PAS protein 1, or PAS domain-containing protein 8 (PASD8), functions as a master transcriptional regulator of the adaptive response to hypoxia. HIF2a, also termed HIF-2-alpha, or HIF2-alpha, or endothelial PAS domain-containing protein 1 (EPAS-1), or Basic-helix-loop-helix-PAS protein MOP2, or Class E basic helix-loop-helix protein 73 (bHLHe73), or Member of PAS protein 2, or PAS domain-containing protein 2 (PASD2), or HIF-1-alpha-like factor (HLF), is a bHLH-PAS transcription factor involved in the induction of oxygen regulated genes. HIF3a, also termed HIF-3-alpha, or HIF3-alpha, or endothelial PAS domain-containing protein 1 (EPAS-1), or Basic-helix-loop-helix-PAS protein MOP7, or Class E basic helix-loop-helix protein 17 (bHLHe17), or Member of PAS protein 7, or PAS domain-containing protein 7 (PASD7), or HIF3-alpha-1, or inhibitory PAS domain protein (IPAS), is a bHLH-PAS transcriptional regulator in adaptive response to low oxygen tension. It plays a role in the regulation of hypoxia-inducible gene expression. — an NCBI CDD conserved domain (cd11433); members share this curated model.
