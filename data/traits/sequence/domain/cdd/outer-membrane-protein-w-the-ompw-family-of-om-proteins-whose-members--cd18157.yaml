identifier: CDD:cd18157
label: "outer membrane protein W. The OmpW family of OM proteins, whose members include Pseudomonas aeruginosa OprG and Escherichia coli OmpW, belong to a family of small outer membrane proteins found in Gram-negative bacteria. While their function is unknown, recent studies of E.coli OmpW have suggested that they are involved in the protection of bacteria against various forms of environmental stress and are involved in the transport of small hydrophobic molecules across the bacterial outer membrane."
