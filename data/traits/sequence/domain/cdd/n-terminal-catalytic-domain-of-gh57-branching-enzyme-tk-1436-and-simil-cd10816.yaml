identifier: CDD:cd10816
label: "N-terminal catalytic domain of Gh57 branching enzyme TK 1436 and similar proteins. The subfamily is represented by a novel branching-enzyme TK1436 of hyperthermophilic archaeon Thermococcus kodakaraensis KOD1. Branching enzymes (BEs, EC 2.4.1.18) play a key role in synthesis of alpha-glucans and they generally are classified into glycoside hydrolase family 13 (GH13). However, TK1436 belongs to the GH57 family. It functions as a monomer and possesses BE activity. TK1436 is composed of a distorted N-terminal (beta/alpha)7-barrel domain and a C-terminal five alpha-helical domain, both of which participate in the formation of the active-site cleft."
definition: >-
  N-terminal catalytic domain of Gh57 branching enzyme TK 1436 and similar proteins. The subfamily is represented by a novel branching-enzyme TK1436 of hyperthermophilic archaeon Thermococcus kodakaraensis KOD1. Branching enzymes (BEs, EC 2.4.1.18) play a key role in synthesis of alpha-glucans and they generally are classified into glycoside hydrolase family 13 (GH13). However, TK1436 belongs to the GH57 family. It functions as a monomer and possesses BE activity. TK1436 is composed of a distorted N-terminal (beta/alpha)7-barrel domain and a C-terminal five alpha-helical domain, both of which participate in the formation of the active-site cleft. — an NCBI CDD conserved domain (cd10816); members share this curated model.
