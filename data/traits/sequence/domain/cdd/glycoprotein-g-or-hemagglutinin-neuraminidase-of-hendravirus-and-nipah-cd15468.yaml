identifier: CDD:cd15468
label: "Glycoprotein G, or hemagglutinin-neuraminidase of Hendravirus and Nipah virus. The glycoprotein (G) of Nendravirus and Nipah virus  has a variety of functions during viral infection; it participates in virus attachment to host cells and has a stimulating effect on membrane fusion during the entry of the virus into the host cell. This models characterizes the globular ectodomain of glycoprotein G. The receptors for Hendravirus and Nipah virus have been identified as ephrin B2 (EFNB2) and ephrin B3 (EFNB3)."
definition: >-
  Glycoprotein G, or hemagglutinin-neuraminidase of Hendravirus and Nipah virus. The glycoprotein (G) of Nendravirus and Nipah virus has a variety of functions during viral infection; it participates in virus attachment to host cells and has a stimulating effect on membrane fusion during the entry of the virus into the host cell. This models characterizes the globular ectodomain of glycoprotein G. The receptors for Hendravirus and Nipah virus have been identified as ephrin B2 (EFNB2) and ephrin B3 (EFNB3). — an NCBI CDD conserved domain (cd15468); members share this curated model.
