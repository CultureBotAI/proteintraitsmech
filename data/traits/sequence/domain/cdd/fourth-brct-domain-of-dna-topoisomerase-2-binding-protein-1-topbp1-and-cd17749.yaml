identifier: CDD:cd17749
label: "fourth BRCT domain of DNA topoisomerase 2-binding protein 1 (TopBP1) and similar proteins. TopBP1, also called DNA topoisomerase II-beta-binding protein 1, or DNA topoisomerase II-binding protein 1, functions in DNA replication and damage response. It binds double-stranded DNA breaks and nicks as well as single-stranded DNA. TopBP1 contains six copies of BRCT domain. The family corresponds to the fourth BRCT domain."
definition: >-
  fourth BRCT domain of DNA topoisomerase 2-binding protein 1 (TopBP1) and similar proteins. TopBP1, also called DNA topoisomerase II-beta-binding protein 1, or DNA topoisomerase II-binding protein 1, functions in DNA replication and damage response. It binds double-stranded DNA breaks and nicks as well as single-stranded DNA. TopBP1 contains six copies of BRCT domain. The family corresponds to the fourth BRCT domain. — an NCBI CDD conserved domain (cd17749); members share this curated model.
