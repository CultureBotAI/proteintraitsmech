label: AT4G37440_like
definition: >-
  Uncharacterized protein domain conserved in plants. This domain contains an extensive protein sequence fragment that appears conserved in a number of plant proteins, including the gene product of Arabidopsis thaliana locus AT4G37440, which has been identified in transcriptional profiling as expressed at different levels in white cabbage cultivars
