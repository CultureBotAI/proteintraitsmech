identifier: CDD:cd06885
label: "The phosphoinositide binding Phox Homology domain of Sorting Nexins 17 and 31. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Members of this subfamily include sorting nexin 17 (SNX17), SNX31, and similar proteins. They contain an N-terminal PX domain followed by a truncated FERM (4.1, ezrin, radixin, and moesin) domain and a unique C-terminal region. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. SNX17 is known to regulate the trafficking and processing of a number of proteins. It binds some members of the low-density lipoprotein receptor (LDLR) family such as LDLR, VLDLR, ApoER2, and others, regulating their endocytosis. It also binds P-selectin and may regulate its lysosomal degradation. SNX17 is highly expressed in neurons. It binds amyloid precursor protein (APP) and may be involved in its intracellular trafficking and processing to amyloid beta peptide, which plays a central role in the pathogenesis of Alzheimer's disease. The biological function of SNX31 is unknown."
definition: >-
  The phosphoinositide binding Phox Homology domain of Sorting Nexins 17 and 31. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Members of this subfamily include sorting nexin 17 (SNX17), SNX31, and similar proteins. They contain an N-terminal PX domain followed by a truncated FERM (4.1, ezrin, radixin, and moesin) domain and a unique C-terminal region. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. SNX17 is known to regulate the trafficking and processing of a number of proteins. It binds some members of the low-density lipoprotein receptor (LDLR) family such as LDLR, VLDLR, ApoER2, and others, regulating their endocytosis. It also binds P-selectin and may regulate its lysosomal degradation. SNX17 is highly expressed in neurons. It binds amyloid precursor protein (APP) and may be involved in its intracellular trafficking and processing to amyloid beta peptide, which plays a central role in the pathogenesis of Alzheimer's disease. The biological function of SNX31 is unknown. — an NCBI CDD conserved domain (cd06885); members share this curated model.
