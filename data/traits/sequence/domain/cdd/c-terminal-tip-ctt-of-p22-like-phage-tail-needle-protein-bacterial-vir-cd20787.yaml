identifier: CDD:cd20787
label: "C-Terminal Tip (CTT) of P22-like phage tail needle protein. Bacterial viruses of the P22-like family encode a specialized tail needle essential for genome stabilization after DNA packaging. The tail needle (gp26) is a highly stable homo-trimeric fiber found in the tail apparatus of bacteriophage P22. The tail needle protein contains three domains: N-terminal tip (NTT), a central alpha-helical coiled coil core, and a C-terminal tip (CTT) that folds an inverted coiled-coil. The tail needle protein subgroups differ primarily in the structure of their CTT (P22-like and Sf6-like). The tail needle CTT is responsible for contacting the host outer membrane and during the adsorption/DNA delivery process tail needle is released into the host."
definition: >-
  C-Terminal Tip (CTT) of P22-like phage tail needle protein. Bacterial viruses of the P22-like family encode a specialized tail needle essential for genome stabilization after DNA packaging. The tail needle (gp26) is a highly stable homo-trimeric fiber found in the tail apparatus of bacteriophage P22. The tail needle protein contains three domains: N-terminal tip (NTT), a central alpha-helical coiled coil core, and a C-terminal tip (CTT) that folds an inverted coiled-coil. The tail needle protein subgroups differ primarily in the structure of their CTT (P22-like and Sf6-like). The tail needle CTT is responsible for contacting the host outer membrane and during the adsorption/DNA delivery process tail needle is released into the host. — an NCBI CDD conserved domain (cd20787); members share this curated model.
