identifier: CDD:cd17551
label: "phosphoacceptor receiver (REC) domain of cyclic di-GMP phosphodiesterase response regulator RpfG and similar proteins. Cyclic di-GMP phosphodiesterase response regulator RpfG, together with sensory/regulatory protein RpfC, constitute a two-component system implicated in sensing and responding to the diffusible signal factor (DSF) that is essential for cell-cell signaling. RpfC is a hybrid sensor/histidine kinase that phosphorylates and activates RpfG, which degrades cyclic di-GMP to GMP, leading to the activation of Clp, a global transcriptional regulator that regulates a large set of genes in the DSF pathway. RpfG contains a CheY-like receiver domain attached to a histidine-aspartic acid-glycine-tyrosine-proline (HD-GYP) cyclic di-GMP phosphodiesterase domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of cyclic di-GMP phosphodiesterase response regulator RpfG and similar proteins. Cyclic di-GMP phosphodiesterase response regulator RpfG, together with sensory/regulatory protein RpfC, constitute a two-component system implicated in sensing and responding to the diffusible signal factor (DSF) that is essential for cell-cell signaling. RpfC is a hybrid sensor/histidine kinase that phosphorylates and activates RpfG, which degrades cyclic di-GMP to GMP, leading to the activation of Clp, a global transcriptional regulator that regulates a large set of genes in the DSF pathway. RpfG contains a CheY-like receiver domain attached to a histidine-aspartic acid-glycine-tyrosine-proline (HD-GYP) cyclic di-GMP phosphodiesterase domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17551); members share this curated model.
