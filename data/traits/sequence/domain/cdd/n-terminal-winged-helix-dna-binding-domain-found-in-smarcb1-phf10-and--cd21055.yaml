identifier: CDD:cd21055
label: "N-terminal winged helix DNA-binding domain found in SMARCB1, PHF10 and similar proteins. The family includes SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily B member 1 (SMARCB1) and PHD finger protein 10 (PHF10), both of which have an N-terminal winged helix DNA-binding domain that is structurally related to the SKI/SNO/DAC domain found in a number of metazoan chromatin-associated proteins. SMARCB1, also termed BRG1-associated factor 47 (BAF47), or integrase interactor 1 protein (INI1), or SNF5, or SNF5L1, is a core component of the BAF (hSWI/SNF) complex, an ATP-dependent chromatin-remodeling complex that plays important roles in cell proliferation and differentiation, in cellular antiviral activities and inhibition of tumor formation. PHF10, also termed BRG1-associated factor 45a (BAF45a), or XAP135, is involved in transcription activity regulation by chromatin remodeling. It is a component of the neural progenitors-specific chromatin remodeling complex (npBAF complex) and plays a role in the proliferation of neural progenitors."
definition: >-
  N-terminal winged helix DNA-binding domain found in SMARCB1, PHF10 and similar proteins. The family includes SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily B member 1 (SMARCB1) and PHD finger protein 10 (PHF10), both of which have an N-terminal winged helix DNA-binding domain that is structurally related to the SKI/SNO/DAC domain found in a number of metazoan chromatin-associated proteins. SMARCB1, also termed BRG1-associated factor 47 (BAF47), or integrase interactor 1 protein (INI1), or SNF5, or SNF5L1, is a core component of the BAF (hSWI/SNF) complex, an ATP-dependent chromatin-remodeling complex that plays important roles in cell proliferation and differentiation, in cellular antiviral activities and inhibition of tumor formation. PHF10, also termed BRG1-associated factor 45a (BAF45a), or XAP135, is involved in transcription activity regulation by chromatin remodeling. It is a component of the neural progenitors-specific chromatin remodeling complex (npBAF complex) and plays a role in the proliferation of neural progenitors. — an NCBI CDD conserved domain (cd21055); members share this curated model.
