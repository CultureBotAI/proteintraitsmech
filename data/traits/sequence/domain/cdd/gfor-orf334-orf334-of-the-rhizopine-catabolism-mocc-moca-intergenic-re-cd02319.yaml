identifier: CDD:cd02319
label: GFOR-ORF334
definition: >-
  GFOR-ORF334. ORF334 of the rhizopine catabolism mocC-mocA intergenic region of Rhizobium meliloti L5-30; and related predicted oxidoreductases. The deduced ORF334 product is more closely related to the Zymomonas mobilis glucose-fructose oxidoreductase than to MocA which is predicted to perform an NAD(H)-dependent dehydrogenase reaction in the rhizopine catabolism pathway. Members of the GFOR_ORF334 CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase (GFOR) family of proteins
