identifier: CDD:cd10903
label: Vitellogenin_vertebrate_osmoreg
definition: >-
  Vitellogenin-like proteins found in vertebrates. Vitellogenin-like; This subfamily contains neofunctionalized vitellogenin-like proteins that appear to have lost their lipid-binding role and, instead, are cleaved into polypeptides to perform other roles in the oocyte. Many of these are from marine organisms, where it has been shown that some vitellogenin genes fuction in osmoregulation in the egg through proteolysis of the nascent protein in the mature yolk into peptides to adjust the hydration of the egg in the saline environment. Other members of the subfamily are found in birds, where the exact role is not known
