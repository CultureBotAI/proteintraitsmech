identifier: CDD:cd18961
label: "chromodomain of Caenorhabditis elegans chromodomain protein 4, and similar proteins. CHRomatin Organization Modifier (chromo) domain of Caenorhabditis elegans CEC-4, and similar proteins. CEC-4 is a perinuclear heterochromatin anchor, it mediates the anchoring of H3K9 methylation-bearing chromatin at the nuclear periphery in early to mid-stage embryos. It is necessary for anchoring, but does not affect transcriptional repression. CEC-4 contributes to the efficiency with which muscle differentiation is induced following ectopic expression of the master regulator, HLH-1 (MyoD in mammals). A chromodomain is a conserved region of about 50 amino acids, found in a variety of chromosomal proteins, and which appears to play a role in the functional organization of the eukaryotic nucleus. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain."
