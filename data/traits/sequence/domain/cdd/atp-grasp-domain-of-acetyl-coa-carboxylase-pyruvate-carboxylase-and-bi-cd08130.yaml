identifier: CDD:cd08130
label: "ATP-grasp domain of acetyl CoA carboxylase, pyruvate carboxylase, and biotin carboxylase enzymes. Acetyl-CoA carboxylase (ACC) catalyzes the carboxylation of acetyl CoA to malonyl CoA. Biotin carboxylase (BC, EC 6.3.4.14), a MgATP-dependent protein, forms one of the subunits of ACC and PC. In Escherichia coli, ACC is a biotin-containing multienzyme complex that consists of three separate proteins with distinct functions: MgATP-dependent BC, biotin carboxyl carrier protein (BCCP), and carboxyltransferase (CT). ACC catalyzes the first step in fatty acid synthesis. In the first half-reaction BC interacts with BCCP to catalyze carboxybiotin via formation of carboxyphosphate intermediate. This reaction utilizes bicarbonate and ATP as substrate. Pyruvate carboxylase (PC, EC 6.4.1.1) catalyzes the carboxylation of pyruvate to oxaloacetate in a similar catalytic mechanism as ACC. Both ACC from Escherichia coli, and PC from Aquifex aeolicus belong to this family. Members of this group belong to bacteria, plants, and archea."
definition: >-
  ATP-grasp domain of acetyl CoA carboxylase, pyruvate carboxylase, and biotin carboxylase enzymes. Acetyl-CoA carboxylase (ACC) catalyzes the carboxylation of acetyl CoA to malonyl CoA. Biotin carboxylase (BC, EC 6.3.4.14), a MgATP-dependent protein, forms one of the subunits of ACC and PC. In Escherichia coli, ACC is a biotin-containing multienzyme complex that consists of three separate proteins with distinct functions: MgATP-dependent BC, biotin carboxyl carrier protein (BCCP), and carboxyltransferase (CT). ACC catalyzes the first step in fatty acid synthesis. In the first half-reaction BC interacts with BCCP to catalyze carboxybiotin via formation of carboxyphosphate intermediate. This reaction utilizes bicarbonate and ATP as substrate. Pyruvate carboxylase (PC, EC 6.4.1.1) catalyzes the carboxylation of pyruvate to oxaloacetate in a similar catalytic mechanism as ACC. Both ACC from Escherichia coli, and PC from Aquifex aeolicus belong to this family. Members of this group belong to bacteria, plants, and archea. — an NCBI CDD conserved domain (cd08130); members share this curated model.
