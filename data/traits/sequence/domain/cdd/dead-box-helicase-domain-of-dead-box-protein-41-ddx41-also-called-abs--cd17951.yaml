identifier: CDD:cd17951
label: "DEAD-box helicase domain of DEAD box protein 41. DDX41 (also called ABS and MPLPF) interacts with several spliceosomal proteins and may recognize the bacterial second messengers cyclic di-GMP and cyclic di-AMP, resulting in the induction of genes involved in the innate immune response. Diseases associated with DDX41 include \"myeloproliferative/lymphoproliferative neoplasms, familial\" and \"Ddx41-related susceptibility to familial myeloproliferative/lymphoproliferative neoplasms\". DDX41 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 41. DDX41 (also called ABS and MPLPF) interacts with several spliceosomal proteins and may recognize the bacterial second messengers cyclic di-GMP and cyclic di-AMP, resulting in the induction of genes involved in the innate immune response. Diseases associated with DDX41 include "myeloproliferative/lymphoproliferative neoplasms, familial" and "Ddx41-related susceptibility to familial myeloproliferative/lymphoproliferative neoplasms". DDX41 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17951); members share this curated model.
