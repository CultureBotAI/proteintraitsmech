identifier: CDD:cd19491
label: "XRCC3 recombinase. XRCC3 (X-ray repair complementing defective repair in Chinese hamster cells 3) recombinase, a RAD51 paralog, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. XRCC3, together with the other RAD51 paralogs, RAD51B, RAD51C, RAD51D, and XRCC2, helps recruit RAD51 to the break site."
definition: >-
  XRCC3 recombinase. XRCC3 (X-ray repair complementing defective repair in Chinese hamster cells 3) recombinase, a RAD51 paralog, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. XRCC3, together with the other RAD51 paralogs, RAD51B, RAD51C, RAD51D, and XRCC2, helps recruit RAD51 to the break site. — an NCBI CDD conserved domain (cd19491); members share this curated model.
