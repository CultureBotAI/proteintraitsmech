identifier: CDD:cd21392
label: "Immunoglobulin Constant-2 domain of Cluster of Differentiation 160 (CD160). CD160 is expressed at the cell surface as a tightly disulfide-linked multimer and is tightly associated with peripheral blood NK cells and CD8 T lymphocytes with cytolytic effector activity. Structurally similar to The B and T lymphocyte attenuator (BTLA), which appears to act as a negative regulator of T cell activation and growth. CD160 is a ligand for HVEM (herpes virus entry mediator), and considered a proposed immune checkpoint inhibitor with anti-cancer activity along with anti-PD-1 antibodies. CD160 has also been proposed as a potential target in cases of human pathological ocular and tumor neoangiogenesis that do not respond or become resistant to existing antiangiogenic drugs."
definition: >-
  Immunoglobulin Constant-2 domain of Cluster of Differentiation 160 (CD160). CD160 is expressed at the cell surface as a tightly disulfide-linked multimer and is tightly associated with peripheral blood NK cells and CD8 T lymphocytes with cytolytic effector activity. Structurally similar to The B and T lymphocyte attenuator (BTLA), which appears to act as a negative regulator of T cell activation and growth. CD160 is a ligand for HVEM (herpes virus entry mediator), and considered a proposed immune checkpoint inhibitor with anti-cancer activity along with anti-PD-1 antibodies. CD160 has also been proposed as a potential target in cases of human pathological ocular and tumor neoangiogenesis that do not respond or become resistant to existing antiangiogenic drugs. — an NCBI CDD conserved domain (cd21392); members share this curated model.
