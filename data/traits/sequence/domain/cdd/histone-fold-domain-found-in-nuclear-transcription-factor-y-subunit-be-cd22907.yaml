identifier: CDD:cd22907
label: "histone-fold domain found in nuclear transcription factor Y subunit beta (NF-YB) and similar proteins. NF-YB, also called CAAT box DNA-binding protein subunit B, or nuclear transcription factor Y subunit B, is a component of the sequence-specific heterotrimeric transcription factor (NF-Y), which specifically recognizes the 5'-CCAAT-3' box motif found in the promoters of its target genes. NF-Y can function as both an activator and a repressor, depending on its interacting cofactors. NF-Y is a heterotrimeric transcription factor composed of three components, NF-YA, NF-YB and NF-YC. NF-YB and NF-YC must interact and dimerize for NF-YA association and DNA binding."
definition: >-
  histone-fold domain found in nuclear transcription factor Y subunit beta (NF-YB) and similar proteins. NF-YB, also called CAAT box DNA-binding protein subunit B, or nuclear transcription factor Y subunit B, is a component of the sequence-specific heterotrimeric transcription factor (NF-Y), which specifically recognizes the 5'-CCAAT-3' box motif found in the promoters of its target genes. NF-Y can function as both an activator and a repressor, depending on its interacting cofactors. NF-Y is a heterotrimeric transcription factor composed of three components, NF-YA, NF-YB and NF-YC. NF-YB and NF-YC must interact and dimerize for NF-YA association and DNA binding. — an NCBI CDD conserved domain (cd22907); members share this curated model.
