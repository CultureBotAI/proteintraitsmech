identifier: CDD:cd16194
label: "Penta-EF hand, calcium binding motifs, found in calpain-12 (CAPN12). CAPN12, also termed calcium-activated neutral proteinase 12 (CANP 12), is a calpain large subunit mainly expressed in the cortex of the hair follicle. It may affect apoptosis regulation. CAPN12 contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain."
definition: >-
  Penta-EF hand, calcium binding motifs, found in calpain-12 (CAPN12). CAPN12, also termed calcium-activated neutral proteinase 12 (CANP 12), is a calpain large subunit mainly expressed in the cortex of the hair follicle. It may affect apoptosis regulation. CAPN12 contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. — an NCBI CDD conserved domain (cd16194); members share this curated model.
