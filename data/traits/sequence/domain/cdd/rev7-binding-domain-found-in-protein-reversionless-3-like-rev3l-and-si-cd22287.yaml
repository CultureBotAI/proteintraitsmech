identifier: CDD:cd22287
label: "REV7 binding domain found in protein reversionless 3-like (REV3L) and similar proteins. REV3L, also called REV3-like, or REV3, or DNA polymerase zeta catalytic subunit (POLZ), is the catalytic subunit of the DNA polymerase zeta complex, an error-prone polymerase specialized in translesion DNA synthesis (TLS). REV3L lacks an intrinsic 3'-5' exonuclease activity and thus has no proofreading function. The model corresponds to a conserved region that is responsible for the binding of REV7."
definition: >-
  REV7 binding domain found in protein reversionless 3-like (REV3L) and similar proteins. REV3L, also called REV3-like, or REV3, or DNA polymerase zeta catalytic subunit (POLZ), is the catalytic subunit of the DNA polymerase zeta complex, an error-prone polymerase specialized in translesion DNA synthesis (TLS). REV3L lacks an intrinsic 3'-5' exonuclease activity and thus has no proofreading function. The model corresponds to a conserved region that is responsible for the binding of REV7. — an NCBI CDD conserved domain (cd22287); members share this curated model.
