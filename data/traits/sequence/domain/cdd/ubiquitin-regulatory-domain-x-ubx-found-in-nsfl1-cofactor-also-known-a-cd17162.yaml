identifier: CDD:cd17162
label: "Ubiquitin regulatory domain X (UBX) found in NSFL1 cofactor (also known as UBX domain-containing protein 2C (UBXN2C) and similar proteins. UBXN2C, also termed NSFL1C, or NSFL1 cofactor p47, or p97 cofactor p47, UBX1, or UBXD10, belongs to the UBXD family of proteins that contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. UBXN2C is a major adaptor of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. The main role of the UBXN2C/p97 complex is in regulation of membrane fusion events. It plays an essential role in the reassembly of Golgi stacks at the end of mitosis. UBXN2C also functions as an essential factor for Golgi membrane fusion, which associates with the nuclear factor-kappaB essential modulator (NEMO) subunit of the IkappaB kinase (IKK) complex upon tumor necrosis factor (TNF)-alpha or interleukin (IL)-1 stimulation, induces the lysosome-dependent degradation of polyubiquitinated NEMO without p97, and thus inhibits IKK activation. Moreover, UBXN2C regulates a membrane fusion process, which is required by the maintenance of the endoplasmic reticulum (ER) network, through phosphorylation by Cdc2 kinase."
definition: >-
  Ubiquitin regulatory domain X (UBX) found in NSFL1 cofactor (also known as UBX domain-containing protein 2C (UBXN2C) and similar proteins. UBXN2C, also termed NSFL1C, or NSFL1 cofactor p47, or p97 cofactor p47, UBX1, or UBXD10, belongs to the UBXD family of proteins that contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. UBXN2C is a major adaptor of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. The main role of the UBXN2C/p97 complex is in regulation of membrane fusion events. It plays an essential role in the reassembly of Golgi stacks at the end of mitosis. UBXN2C also functions as an essential factor for Golgi membrane fusion, which associates with the nuclear factor-kappaB essential modulator (NEMO) subunit of the IkappaB kinase (IKK) complex upon tumor necrosis factor (TNF)-alpha or interleukin (IL)-1 stimulation, induces the lysosome-dependent degradation of polyubiquitinated NEMO without p97, and thus inhibits IKK activation. Moreover, UBXN2C regulates a membrane fusion process, which is required by the maintenance of the endoplasmic reticulum (ER) network, through phosphorylation by Cdc2 kinase. — an NCBI CDD conserved domain (cd17162); members share this curated model.
