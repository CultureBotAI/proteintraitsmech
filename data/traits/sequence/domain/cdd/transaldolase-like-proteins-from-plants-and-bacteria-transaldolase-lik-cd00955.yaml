identifier: CDD:cd00955
label: "Transaldolase-like proteins from plants and bacteria. Transaldolase-like proteins from plants and bacteria. Transaldolase is found in the non-oxidative branch of the pentose phosphate pathway, that catalyze the reversible transfer of a dihydroxyacetone group from fructose-6-phosphate to erythrose-4-phosphate yielding sedoheptulose-7-phosphate and glyceraldehyde-3-phosphate. They are members of the class I aldolases, who are characterized by using a Schiff-base mechanism for stabilization of the reaction intermediates."
definition: >-
