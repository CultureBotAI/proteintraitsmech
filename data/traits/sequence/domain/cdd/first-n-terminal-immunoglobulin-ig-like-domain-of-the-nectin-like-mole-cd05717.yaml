identifier: CDD:cd05717
label: "First (N-terminal) immunoglobulin (Ig)-like domain of the nectin-like molecules; member of the V-set of Ig superfamily (IgSF) domains. The members here are composed of the N-terminal immunoglobulin (Ig)-like domain of the nectin-like molecules Necl-1 (also known as cell adhesion molecule 3 (CADM3)), Necl-2 (CADM1), Necl-3 (CADM2), and similar proteins. At least five nectin-like molecules have been identified (Necl-1 to Necl-5). They all have an extracellular region containing three Ig-like domains, a transmembrane region, and a cytoplasmic region. The N-terminal Ig-like domain of the extracellular region belongs to the V-type subfamily of Ig domains, is essential to cell-cell adhesion, and plays a part in the interaction with the envelope glycoprotein D of various viruses. Necl-1, Necl-2, and Necl-3 have Ca(2+)-independent homophilic and heterophilic cell-cell adhesion activity. Necl-1 is specifically expressed in neural tissue, and is important to the formation of synapses, axon bundles, and myelinated axons. Necl-2 is expressed in a wide variety of tissues and is a putative tumour suppressor gene which is downregulated in aggressive neuroblastoma. Necl-3 accumulates in central and peripheral nervous system tissue and has been shown to selectively interact with oligodendrocytes. This group also contains Class-I MHC-restricted T-cell-associated molecule (CRTAM), whose expression pattern is consistent with its expression in Class-I MHC-restricted T-cells."
definition: >-
  First (N-terminal) immunoglobulin (Ig)-like domain of the nectin-like molecules; member of the V-set of Ig superfamily (IgSF) domains. The members here are composed of the N-terminal immunoglobulin (Ig)-like domain of the nectin-like molecules Necl-1 (also known as cell adhesion molecule 3 (CADM3)), Necl-2 (CADM1), Necl-3 (CADM2), and similar proteins. At least five nectin-like molecules have been identified (Necl-1 to Necl-5). They all have an extracellular region containing three Ig-like domains, a transmembrane region, and a cytoplasmic region. The N-terminal Ig-like domain of the extracellular region belongs to the V-type subfamily of Ig domains, is essential to cell-cell adhesion, and plays a part in the interaction with the envelope glycoprotein D of various viruses. Necl-1, Necl-2, and Necl-3 have Ca(2+)-independent homophilic and heterophilic cell-cell adhesion activity. Necl-1 is specifically expressed in neural tissue, and is important to the formation of synapses, axon bundles, and myelinated axons. Necl-2 is expressed in a wide variety of tissues and is a putative tumour suppressor gene which is downregulated in aggressive neuroblastoma. Necl-3 accumulates in central and peripheral nervous system tissue and has been shown to selectively interact with oligodendrocytes. This group also contains Class-I MHC-restricted T-cell-associated molecule (CRTAM), whose expression pattern is consistent with its expression in Class-I MHC-restricted T-cells. — an NCBI CDD conserved domain (cd05717); members share this curated model.
