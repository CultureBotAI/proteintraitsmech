identifier: CDD:cd17721
label: "second (C-terminal) BRCT domain of breast cancer type 1 susceptibility protein (BRCA1) and similar proteins. BRCA1, also termed RING finger protein 53 (RNF53), is a RING finger protein encoded by BRCA1, a tumor suppressor gene that regulates all DNA double-strand break (DSB) repair pathways. BRCA1 is frequently mutated in patients with hereditary breast and ovarian cancer (HBOC). Its mutation is also associated with an increased risk of pancreatic, stomach, laryngeal, fallopian tube, and prostate cancer. It plays an important role in the DNA damage response signaling, and has been implicated in various cellular processes such as cell cycle regulation, transcriptional regulation, chromatin remodeling, DNA DSBs, and apoptosis. BRCA1 contains an N-terminal C3HC4-type RING-HC finger, and two BRCT repeats at the C-terminus. The family corresponds to the second BRCT domain."
definition: >-
  second (C-terminal) BRCT domain of breast cancer type 1 susceptibility protein (BRCA1) and similar proteins. BRCA1, also termed RING finger protein 53 (RNF53), is a RING finger protein encoded by BRCA1, a tumor suppressor gene that regulates all DNA double-strand break (DSB) repair pathways. BRCA1 is frequently mutated in patients with hereditary breast and ovarian cancer (HBOC). Its mutation is also associated with an increased risk of pancreatic, stomach, laryngeal, fallopian tube, and prostate cancer. It plays an important role in the DNA damage response signaling, and has been implicated in various cellular processes such as cell cycle regulation, transcriptional regulation, chromatin remodeling, DNA DSBs, and apoptosis. BRCA1 contains an N-terminal C3HC4-type RING-HC finger, and two BRCT repeats at the C-terminus. The family corresponds to the second BRCT domain. — an NCBI CDD conserved domain (cd17721); members share this curated model.
