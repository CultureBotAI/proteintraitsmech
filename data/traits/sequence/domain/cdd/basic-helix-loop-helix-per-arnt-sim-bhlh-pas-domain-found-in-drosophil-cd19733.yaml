identifier: CDD:cd19733
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in Drosophila melanogaster protein trachealess and similar proteins. Protein trachealess is a bHLH-PAS transcription factor that acts as an inducer of tracheal cell fates in Drosophila. It is necessary for the development of the salivary gland duct and the posterior spiracles."
definition: >-
