identifier: CDD:cd08679
label: "C2 domains found in Dedicator Of CytoKinesis 1 (DOCK 180) and related proteins. Dock180 was first identified as an 180kd proto-oncogene product c-Crk-interacting protein involved in actin cytoskeletal changes.  It is now known that it has Rac-specific GEF activity, but lacks the conventional Dbl homology (DH) domain. There are 10 additional related proteins that can be divided into four classes based on sequence similarity and domain organization: Dock-A which includes Dock180/Dock1, Dock2, and Dock5; Dock-B which includes Dock3/MOCA (modifier of cell adhesion) and Dock4; Dock-C which includes Dock6/Zir1, Dock7/Zir2, and Dock8/Zir3; and Dock-D, which includes Dock9/Zizimin1, Dock10/Zizimin3, and Dock11/Zizimin2/ACG (activated Cdc42-associated GEF).  Most of members of classes Dock-A and Dock-B are the GEFs specific for Rac.  Those of Dock-D are Cdc42-specific GEFs while those of Dock-C are the GEFs for both. All Dock180-related proteins have two common homology domains: the C2 domain (AKA Dock homology region (DHR)-1, CED-5, Dock180, MBC-zizimin homology (CZH) 1) and the DHR-2 (AKA CZH2, or Docker). DHR-2 has the catalytic activity for Rac and/or Cdc42, but is structurally unrelated to the DH domain. The C2/DHR-1 domains of Dock180 and Dock4 have been shown to bind phosphatidylinositol-3, 4, 5-triphosphate (PtdIns(3,4,5)P3). The C2 domain was first identified in PKC. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins.  Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1.  However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain.  C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions."
definition: >-
  C2 domains found in Dedicator Of CytoKinesis 1 (DOCK 180) and related proteins. Dock180 was first identified as an 180kd proto-oncogene product c-Crk-interacting protein involved in actin cytoskeletal changes. It is now known that it has Rac-specific GEF activity, but lacks the conventional Dbl homology (DH) domain. There are 10 additional related proteins that can be divided into four classes based on sequence similarity and domain organization: Dock-A which includes Dock180/Dock1, Dock2, and Dock5; Dock-B which includes Dock3/MOCA (modifier of cell adhesion) and Dock4; Dock-C which includes Dock6/Zir1, Dock7/Zir2, and Dock8/Zir3; and Dock-D, which includes Dock9/Zizimin1, Dock10/Zizimin3, and Dock11/Zizimin2/ACG (activated Cdc42-associated GEF). Most of members of classes Dock-A and Dock-B are the GEFs specific for Rac. Those of Dock-D are Cdc42-specific GEFs while those of Dock-C are the GEFs for both. All Dock180-related proteins have two common homology domains: the C2 domain (AKA Dock homology region (DHR)-1, CED-5, Dock180, MBC-zizimin homology (CZH) 1) and the DHR-2 (AKA CZH2, or Docker). DHR-2 has the catalytic activity for Rac and/or Cdc42, but is structurally unrelated to the DH domain. The C2/DHR-1 domains of Dock180 and Dock4 have been shown to bind phosphatidylinositol-3, 4, 5-triphosphate (PtdIns(3,4,5)P3). The C2 domain was first identified in PKC. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. — an NCBI CDD conserved domain (cd08679); members share this curated model.
