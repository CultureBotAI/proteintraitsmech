identifier: CDD:cd16514
label: "second RING finger, HC subclass, found in the LON peptidase N-terminal domain and RING finger protein family. The LON peptidase N-terminal domain and RING finger protein family includes LONRF1 (also known as RING finger protein 191 or RNF191), LONRF2 (also known as RING finger protein 192, RNF192, or neuroblastoma apoptosis-related protease), LONRF3 (also known as RING finger protein 127 or RNF127), which are characterized by containing two C3HC4-type RING-HC fingers, four tetratricopeptide (TPR) repeats, and an ATP-dependent protease La (LON) substrate-binding domain at the C-terminus. Their biological functions remain unclear. This model corresponds to the second RING-HC finger."
definition: >-
  second RING finger, HC subclass, found in the LON peptidase N-terminal domain and RING finger protein family. The LON peptidase N-terminal domain and RING finger protein family includes LONRF1 (also known as RING finger protein 191 or RNF191), LONRF2 (also known as RING finger protein 192, RNF192, or neuroblastoma apoptosis-related protease), LONRF3 (also known as RING finger protein 127 or RNF127), which are characterized by containing two C3HC4-type RING-HC fingers, four tetratricopeptide (TPR) repeats, and an ATP-dependent protease La (LON) substrate-binding domain at the C-terminus. Their biological functions remain unclear. This model corresponds to the second RING-HC finger. — an NCBI CDD conserved domain (cd16514); members share this curated model.
