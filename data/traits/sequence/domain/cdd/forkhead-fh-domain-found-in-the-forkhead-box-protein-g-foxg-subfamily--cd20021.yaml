identifier: CDD:cd20021
label: "Forkhead (FH) domain found in the Forkhead box protein G (FOXG) subfamily. The FOXG subfamily includes a winged helix transcription factor FOXG1, which is also called brain factor 1 (BF-1), brain factor 2 (BF-2), Forkhead box protein G1A, Forkhead box protein G1B, Forkhead box protein G1C, Forkhead-related protein FKHL1, Forkhead-related protein FKHL2, or Forkhead-related protein FKHL3. FOXG1 acts as a transcription repression factor which plays an important role in the establishment of the regional subdivision of the developing brain and in the development of the telencephalon. It is repetitively used in the sequential events of telencephalic development to control multi-steps of brain circuit formation ranging from cell cycle control to neuronal differentiation in a clade- and species-specific manner. Individuals with mutations in FOXG1 harbor \"FOXG1-related encephalopathy\", characterized by two clinical phenotypes/syndromes including microcephaly, developmental delay, severe cognitive disabilities, early-onset dyskinesia and hyperkinetic movements, stereotypies, epilepsy, and cerebral malformation for those with deletions or intragenic mutations of FOXG1. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein G (FOXG) subfamily. The FOXG subfamily includes a winged helix transcription factor FOXG1, which is also called brain factor 1 (BF-1), brain factor 2 (BF-2), Forkhead box protein G1A, Forkhead box protein G1B, Forkhead box protein G1C, Forkhead-related protein FKHL1, Forkhead-related protein FKHL2, or Forkhead-related protein FKHL3. FOXG1 acts as a transcription repression factor which plays an important role in the establishment of the regional subdivision of the developing brain and in the development of the telencephalon. It is repetitively used in the sequential events of telencephalic development to control multi-steps of brain circuit formation ranging from cell cycle control to neuronal differentiation in a clade- and species-specific manner. Individuals with mutations in FOXG1 harbor "FOXG1-related encephalopathy", characterized by two clinical phenotypes/syndromes including microcephaly, developmental delay, severe cognitive disabilities, early-onset dyskinesia and hyperkinetic movements, stereotypies, epilepsy, and cerebral malformation for those with deletions or intragenic mutations of FOXG1. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20021); members share this curated model.
