identifier: CDD:cd07777
label: "nucleotide-binding domain (NBD) of sedoheptulokinase (SHK) and similar proteins. SHK (EC 2.7.1.14), also called heptulokinase, or carbohydrate kinase-like protein (CARKL), is encoded by the carbohydrate kinase-like (CARKL/SHPK) gene. It acts as a modulator of macrophage activation through control of glucose metabolism. SHK catalyzes the ATP-dependent phosphorylation of sedoheptulose to produce sedoheptulose 7-phosphate and ADP. The presence of Mg2+ or Mn2+ might be required for catalytic activity. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of sedoheptulokinase (SHK) and similar proteins. SHK (EC 2.7.1.14), also called heptulokinase, or carbohydrate kinase-like protein (CARKL), is encoded by the carbohydrate kinase-like (CARKL/SHPK) gene. It acts as a modulator of macrophage activation through control of glucose metabolism. SHK catalyzes the ATP-dependent phosphorylation of sedoheptulose to produce sedoheptulose 7-phosphate and ADP. The presence of Mg2+ or Mn2+ might be required for catalytic activity. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07777); members share this curated model.
