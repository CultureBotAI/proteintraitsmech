identifier: CDD:cd17878
label: Ribosomal_L2_organelles_bacteria
definition: >-
  bacterial and organelles ribosomal protein L2. Ribosomal protein L2 is a core element of the ribosomal large subunit that is highly conserved among all three kingdoms. Ribosomes are the particles that catalyze mRNA-directed protein synthesis in all organisms. Ribosomes consist of a large and a small subunit, which assemble during the initiation stage of protein synthesis. Ribosomal protein L2 contacts almost every domain of the large subunit rRNA and participates in an intersubunit bridge with the small subunit rRNA. L2 is a primary RNA-binding protein and plays an important role in ribosome assembly. Mitochondrial and chloroplastic ribosomes are similar to bacterial ribosomes
