identifier: CDD:cd14731
label: "Uncharacterized proteins similar to L-lysine epsilon-oxidase from Marinomonas mediterranea. L-lysine epsilon-oxidase is responsible for oxidative deamination of L-lysine, producing L-2-aminoadipate-6-semialdehyde. Hydrogen peroxide is a side-product of this enzymatic reaction, which requires the cofactor CTQ (cysteine tryptophylquinone). CTQ most likely forms a Schiff base with the free amino acid substrate. The protein is known for its broad-spectrum antibacterial activity; the latter is most likely caused by hydrogen peroxide synthesis. Although members of this related family share features of the active site, their functions are not known. Homologs of LodA have been detected in various gram-negative bacteria, and they appear to be associated with the formation of biofilms."
definition: >-
