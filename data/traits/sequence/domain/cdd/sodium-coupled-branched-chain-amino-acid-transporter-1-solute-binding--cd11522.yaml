identifier: CDD:cd11522
label: "Sodium-coupled branched-chain amino-acid transporter 1; solute-binding domain. SBAT1 (also called B0AT2, v7-3, NTT7-3) is a high-affinity Na(+)-dependent transporter for large neutral amino acids, including leucine, isoleucine, valine, proline and methionine. Human SBAT1 is encoded by the SLC6A15 gene, a susceptibility gene for major depression. SBAT1 is expressed in brain, and may have a role in transporting neurotransmitter precursors into neurons. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Sodium-coupled branched-chain amino-acid transporter 1; solute-binding domain. SBAT1 (also called B0AT2, v7-3, NTT7-3) is a high-affinity Na(+)-dependent transporter for large neutral amino acids, including leucine, isoleucine, valine, proline and methionine. Human SBAT1 is encoded by the SLC6A15 gene, a susceptibility gene for major depression. SBAT1 is expressed in brain, and may have a role in transporting neurotransmitter precursors into neurons. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11522); members share this curated model.
