identifier: CDD:cd23396
label: Toxin_R_bind_C_BoNTX_like
definition: >-
  C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type X (BoNT/X) and similar proteins. BoNT/X, also called bontoxilysin-X, is a new serotype of botulinum toxin, which causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. There are two co-receptors of BoNT/X precursor, complex polysialylated gangliosides found on neural tissue and specific membrane-anchored proteins found in synaptic vesicles. Like BoNT/B/D/F/G, BoNT/X cleaves vesicle-associated membrane proteins (VAMP) 1, 2 and 3, but at a novel site (Arg66-Ala67 in VAMP2). Unlike other BoNTs, BoNT/X is the only toxin that also cleaves non-canonical substrates VAMP4, VAMP5, and Ykt6. The family also includes Enterococcus botulinum-like toxin eBoNT/J and Paraclostridium bifermentans mosquitocidal protein 1 (PMP1). eBoNT/J might be a precursor of a toxin that binds to an unknown eukaryotic cell receptor(s) and be taken up into the host cell via the endocytic pathway. It strongly resembles a botulinum-type toxin, with the appropriate domains and residues to have proteolytic function, although its C-terminus (which binds to a eukaryotic host cell) is different enough from clostrial botulinum toxins that it might bind another cell target. eBoNT/J shows no toxicity to mice, although it cleaves human VAMP-2 and SNAP-25 in neurons. PMP1 is a clostridial-like neurotoxin that selectively targets anopheline mosquitoes. It cleaves mosquito syntaxin but does not cleave human syntaxin despite the cleavage site being conserved. PMP1 is not implicated in toxicity, although it has conserved SxWY motif. Members in this family comprise three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry
