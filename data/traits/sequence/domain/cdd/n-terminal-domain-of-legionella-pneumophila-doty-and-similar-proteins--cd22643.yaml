identifier: CDD:cd22643
label: "N-terminal domain of Legionella pneumophila DotY and similar proteins. DotY is a component of membrane-embedded T4 coupling complex (T4CC), which consists of the DotL ATPase, the DotM and DotN proteins,and DotY and DotZ. The DotLMNYZ hetero-pentamer and plays an essential role in the recruitment and delivery of effectors to the Type IV secretion (T4S) machinery in Legionella pneumophila, a bacterial pathogen that utilizes a T4S system to inject effector proteins into human macrophages. This model corresponds to the N-terminal domain of DotY, which is responsible for interaction with DotZ. DotY and DotZ are integral parts of the T4CC and play significant roles in the translocation of effectors. They are unique to the Legionella genus."
definition: >-
  N-terminal domain of Legionella pneumophila DotY and similar proteins. DotY is a component of membrane-embedded T4 coupling complex (T4CC), which consists of the DotL ATPase, the DotM and DotN proteins,and DotY and DotZ. The DotLMNYZ hetero-pentamer and plays an essential role in the recruitment and delivery of effectors to the Type IV secretion (T4S) machinery in Legionella pneumophila, a bacterial pathogen that utilizes a T4S system to inject effector proteins into human macrophages. This model corresponds to the N-terminal domain of DotY, which is responsible for interaction with DotZ. DotY and DotZ are integral parts of the T4CC and play significant roles in the translocation of effectors. They are unique to the Legionella genus. — an NCBI CDD conserved domain (cd22643); members share this curated model.
