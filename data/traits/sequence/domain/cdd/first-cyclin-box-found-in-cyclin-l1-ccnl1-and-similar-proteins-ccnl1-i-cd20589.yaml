identifier: CDD:cd20589
label: CYCLIN_CCNL1_rpt1
definition: >-
  first cyclin box found in cyclin-L1 (CCNL1) and similar proteins. CCNL1 is an L-type cyclin involved in the regulation of RNA polymerase II (pol II) transcription. It functions in association with cyclin-dependent kinases (CDKs). CCNL1 contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain
