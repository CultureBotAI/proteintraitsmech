identifier: CDD:cd00597
label: GH10_xylanase
definition: >-
  GH10_xylanase. The endo-beta-1,4-xylanases of glycosyl hydrolase family 10 (GH10) depolymerize a plant cell wall component called xylan, the second most abundant polysaccharide, by hydroyzing its glycosidic bonds using a double displacement catalytic mechanism that leads to retention of the anomeric configuration at the site of cleavage. This family includes the endo-1,4-beta-xylanases, the endo-1,3-beta-xylanases, and the cellobiohydrolases. These enzymes have distinct catalytic and cellulose binding domains, with a separate non-catalytic domain in some xylanases that confers enhanced thermostability. The catalytic domain, represented by this alignment model, is an eightfold TIM-barrel containing a deep active-site groove or substrate binding cleft which extends along the length of the domain and can accomodate four to seven xylose residues, consistent with its 'endo' mode of action. This cleft is divided into regions called subsites that bind each of the xylose moieties. These subsites are given a negative or positive number dependent on whether they bind the glycone or aglycone region of the substrate, respectively, with glycosidic bond cleavage occurring between the -1 and +1 subsites. The xylanases of glycosyl hydrolase family 11 (GH11), which are not included in this hierarchy, differ structurally from those of GH10, with a beta-jelly roll fold rather than a TIM-barrel fold
