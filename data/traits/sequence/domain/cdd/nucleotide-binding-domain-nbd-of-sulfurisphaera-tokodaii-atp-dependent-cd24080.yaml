identifier: CDD:cd24080
label: "nucleotide-binding domain (NBD) of Sulfurisphaera tokodaii ATP-dependent hexokinase (StHK) and similar proteins. The family includes a group of uncharacterized proteins similar to Sulfurisphaera tokodaii ATP-dependent hexokinase (StHK). Hexokinase (EC 2.7.1.1) catalyzes the phosphorylation of glucose to glucose 6-phosphate by using ATP as a phosphoryl donor. StHK is a novel hexokinase that can phosphorylate not only glucose but also GlcNAc, glucosamine, and mannose. It differs from other known hexokinases and glucokinases in that its activity is strongly inhibited by ADP. It is distinct in its broad substrate specificity from the GlcNAc kinases, which are specific for GlcNAc."
definition: >-
  nucleotide-binding domain (NBD) of Sulfurisphaera tokodaii ATP-dependent hexokinase (StHK) and similar proteins. The family includes a group of uncharacterized proteins similar to Sulfurisphaera tokodaii ATP-dependent hexokinase (StHK). Hexokinase (EC 2.7.1.1) catalyzes the phosphorylation of glucose to glucose 6-phosphate by using ATP as a phosphoryl donor. StHK is a novel hexokinase that can phosphorylate not only glucose but also GlcNAc, glucosamine, and mannose. It differs from other known hexokinases and glucokinases in that its activity is strongly inhibited by ADP. It is distinct in its broad substrate specificity from the GlcNAc kinases, which are specific for GlcNAc. — an NCBI CDD conserved domain (cd24080); members share this curated model.
