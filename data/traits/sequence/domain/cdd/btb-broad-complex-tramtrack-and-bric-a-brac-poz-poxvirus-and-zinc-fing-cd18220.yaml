identifier: CDD:cd18220
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 34 (ZBTB34). ZBTB34 acts as a transcriptional regulator. It downregulates specificity protein (Sp) transcription factors Sp1, Sp3, and Sp4 in pancreatic cancer cells. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 34 (ZBTB34). ZBTB34 acts as a transcriptional regulator. It downregulates specificity protein (Sp) transcription factors Sp1, Sp3, and Sp4 in pancreatic cancer cells. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18220); members share this curated model.
