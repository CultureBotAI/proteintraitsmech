identifier: CDD:cd14241
label: "Phenolic Acid Decarboxylase. This family of bacterial and fungal phenolic acid decarboxylases catalyzes the non-oxidative decarboxylation of phenolic acids to produce 4-vinyl derivates. Phenolic acid, like ferulic, p-coumaric, and caffeic acids, are important lignin-related aromatic acids and are natural constituents of plant cell walls. They act as crosslinkers between lignin polymers and hemicellulose/cellulose in plants. Their degradation is important from a biotechnological viewpoint."
definition: >-
  Phenolic Acid Decarboxylase. This family of bacterial and fungal phenolic acid decarboxylases catalyzes the non-oxidative decarboxylation of phenolic acids to produce 4-vinyl derivates. Phenolic acid, like ferulic, p-coumaric, and caffeic acids, are important lignin-related aromatic acids and are natural constituents of plant cell walls. They act as crosslinkers between lignin polymers and hemicellulose/cellulose in plants. Their degradation is important from a biotechnological viewpoint. — an NCBI CDD conserved domain (cd14241); members share this curated model.
