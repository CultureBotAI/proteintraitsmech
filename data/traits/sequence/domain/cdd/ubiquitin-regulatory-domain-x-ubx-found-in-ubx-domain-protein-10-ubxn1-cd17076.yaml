identifier: CDD:cd17076
label: "Ubiquitin regulatory domain X (UBX) found in UBX domain protein 10 (UBXN10) and similar proteins. UBXN10, also termed UBX domain-containing protein 3 (UBXD3), belongs to the UBXD family of proteins that contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. UBXN10 functions as a cofactor of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. UBXN10 localizes to cilia in a p97-dependent manner, and both p97 and UBXN10 are required for ciliogenesis. Additionally, UBXN10 interacts with the intraflagellar transport B (IFT-B) and regulates anterograde transport into cilia."
definition: >-
  Ubiquitin regulatory domain X (UBX) found in UBX domain protein 10 (UBXN10) and similar proteins. UBXN10, also termed UBX domain-containing protein 3 (UBXD3), belongs to the UBXD family of proteins that contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. UBXN10 functions as a cofactor of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. UBXN10 localizes to cilia in a p97-dependent manner, and both p97 and UBXN10 are required for ciliogenesis. Additionally, UBXN10 interacts with the intraflagellar transport B (IFT-B) and regulates anterograde transport into cilia. — an NCBI CDD conserved domain (cd17076); members share this curated model.
