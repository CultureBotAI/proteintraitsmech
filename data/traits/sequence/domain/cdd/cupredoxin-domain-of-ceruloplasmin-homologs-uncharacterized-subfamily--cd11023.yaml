identifier: CDD:cd11023
label: "cupredoxin domain of ceruloplasmin homologs. Uncharacterized subfamily of ceruloplasmin homologous proteins. Ceruloplasmin  (ferroxidase) is a multicopper oxidase essential for normal iron homeostasis.  Ceruloplasmin also functions in copper transport, amine oxidase and as an antioxidant preventing free radicals in serum. The protein has 6 cupredoxin domains and exhibits internal sequence homology that appears to have evolved from the triplication of a sequence unit composed of two tandem cupredoxin domains. This model represents the first domain of the triplicated units."
definition: >-
  cupredoxin domain of ceruloplasmin homologs. Uncharacterized subfamily of ceruloplasmin homologous proteins. Ceruloplasmin (ferroxidase) is a multicopper oxidase essential for normal iron homeostasis. Ceruloplasmin also functions in copper transport, amine oxidase and as an antioxidant preventing free radicals in serum. The protein has 6 cupredoxin domains and exhibits internal sequence homology that appears to have evolved from the triplication of a sequence unit composed of two tandem cupredoxin domains. This model represents the first domain of the triplicated units. — an NCBI CDD conserved domain (cd11023); members share this curated model.
