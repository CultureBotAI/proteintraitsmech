identifier: CDD:cd04873
label: "ACT domains of the bacterial signal-transducing uridylyltransferase /uridylyl-removing (UUR) enzyme, GlnD. This ACT domain family, ACT_UUR_ACR-like, includes the two C-terminal ACT domains of the bacterial signal-transducing uridylyltransferase /uridylyl-removing (UUR) enzyme, GlnD; including those enzymes similar to the GlnD found in enteric Escherichia coli and those found in photosynthetic, nitrogen-fixing bacterium Rhodospirillum rubrum. Also included in this CD are the four ACT domains of a novel protein composed almost entirely of ACT domain repeats (the ACR protein) and like proteins. These ACR proteins, found in Arabidopsis and Oryza, are proposed to function as novel regulatory or sensor proteins in plants. This CD also includes the first of the two ACT domains that comprise the Glycine Cleavage System Transcriptional Repressor (GcvR) protein and related domains, as well as, the N-terminal ACT domain of a yet characterized Arabidopsis/Oryza predicted tyrosine kinase. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  ACT domains of the bacterial signal-transducing uridylyltransferase /uridylyl-removing (UUR) enzyme, GlnD. This ACT domain family, ACT_UUR_ACR-like, includes the two C-terminal ACT domains of the bacterial signal-transducing uridylyltransferase /uridylyl-removing (UUR) enzyme, GlnD; including those enzymes similar to the GlnD found in enteric Escherichia coli and those found in photosynthetic, nitrogen-fixing bacterium Rhodospirillum rubrum. Also included in this CD are the four ACT domains of a novel protein composed almost entirely of ACT domain repeats (the ACR protein) and like proteins. These ACR proteins, found in Arabidopsis and Oryza, are proposed to function as novel regulatory or sensor proteins in plants. This CD also includes the first of the two ACT domains that comprise the Glycine Cleavage System Transcriptional Repressor (GcvR) protein and related domains, as well as, the N-terminal ACT domain of a yet characterized Arabidopsis/Oryza predicted tyrosine kinase. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04873); members share this curated model.
