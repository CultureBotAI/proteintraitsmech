identifier: CDD:cd15763
label: "FYVE-related domain found in Rab effector Noc2 and similar proteins. Rab effector Noc2, also termed No C2 domains protein, or rabphilin-3A-like protein (RPH3AL), is a Rab3 effector that mediates the regulation of secretory vesicle exocytosis in neurons and certain endocrine cells. It also functions as a Rab27 effector and is involved in isoproterenol (IPR)-stimulated amylase release from acinar cells. Noc2 contains an N-terminal Rab3A effector domain which harbors a conserved zinc finger, but lacks tandem C2 domains. The FYVE domain of Noc2 resembles a FYVE-related domain that is structurally similar to the canonical FYVE domains but lacks the three signature sequences: an N-terminal WxxD motif (x for any residue), the central basic R(R/K)HHCRxCG patch, and a C-terminal RVC motif."
definition: >-
  FYVE-related domain found in Rab effector Noc2 and similar proteins. Rab effector Noc2, also termed No C2 domains protein, or rabphilin-3A-like protein (RPH3AL), is a Rab3 effector that mediates the regulation of secretory vesicle exocytosis in neurons and certain endocrine cells. It also functions as a Rab27 effector and is involved in isoproterenol (IPR)-stimulated amylase release from acinar cells. Noc2 contains an N-terminal Rab3A effector domain which harbors a conserved zinc finger, but lacks tandem C2 domains. The FYVE domain of Noc2 resembles a FYVE-related domain that is structurally similar to the canonical FYVE domains but lacks the three signature sequences: an N-terminal WxxD motif (x for any residue), the central basic R(R/K)HHCRxCG patch, and a C-terminal RVC motif. — an NCBI CDD conserved domain (cd15763); members share this curated model.
