identifier: CDD:cd20325
label: "FXYD domain-containing ion transport regulator 7. FXYD domain-containing ion transport regulator 7 (FXYD7) has a potential splice variant with an additional 3 residues. In rats, expression of FXYD7 was restricted to the brain, with highest levels in the cerebrum, followed by brainstem, and hippocampus, and relatively weak expression in the hypothalamus. Immunofluorescence microscopy demonstrated colocalization with synaptophysin and modest colocalization with glial fibrillary acidic protein, indicating predominant expression in neurons and lower expression in astroglial cells. The FXYD7 gene maps to chromosome 19."
definition: >-
  FXYD domain-containing ion transport regulator 7. FXYD domain-containing ion transport regulator 7 (FXYD7) has a potential splice variant with an additional 3 residues. In rats, expression of FXYD7 was restricted to the brain, with highest levels in the cerebrum, followed by brainstem, and hippocampus, and relatively weak expression in the hypothalamus. Immunofluorescence microscopy demonstrated colocalization with synaptophysin and modest colocalization with glial fibrillary acidic protein, indicating predominant expression in neurons and lower expression in astroglial cells. The FXYD7 gene maps to chromosome 19. — an NCBI CDD conserved domain (cd20325); members share this curated model.
